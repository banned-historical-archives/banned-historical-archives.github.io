rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"光荣归于伟大的毛泽东思想印度尼西亚共产党代表团写信祝贺我国新的核爆炸指出毛泽东的道路是印尼人民争取解放的唯一道路","authors":[],"parts":[{"type":"paragraph","text":"据新华社三日讯 中共中央收到了印度尼西亚共产党中央委员会代表团优素夫·阿吉托罗普祝贺我国成功地进行新的核爆炸的贺信。"},{"type":"paragraph","text":"信中说：“这次核爆炸的成功是马克思列宁主义、毛泽东思想的光辉的伟大胜利，是无产阶级文化大革命的辉煌成果。这是全世界人民的伟大胜利，并且成为正在为反对帝国主义和殖民主义以争取民族解放和独立而斗争的各国人民的强大的推动力。”"},{"type":"paragraph","text":"信中指出，中华人民共和国的核武器是全世界反帝人民的所有物。信中说：“我们完全相信这个真理：为了销毁核武器，革命人民绝对需要拥有核武器，这正如毛泽东同志所说的：‘我们是战争消灭论者，我们是不要战争的；但是只能经过战争去消灭战争，不要枪杆子必须拿起枪杆子。’”"},{"type":"paragraph","text":"信中说：“中华人民共和国在发展核武器方面所取得的一个又一个的成就，大大地鼓舞了印度尼西亚人民的战斗精神。印度尼西亚共产党人和印度尼西亚革命人民更加深信，毛泽东思想是战无不胜的并且是能够克服一切困难的，因此，毛泽东的道路，武装的革命反对武装的反革命的道路，人民战争的道路，是为推翻苏哈托——纳苏蒂安法西斯军事政权和取得印度尼西亚人民的解放的唯一的道路。”"},{"type":"paragraph","text":"优素夫·阿吉托罗普在信件的最后写道：“光荣归于马克思列宁主义，光荣归于毛泽东思想！”“祝当代最伟大的马克思列宁主义者毛泽东同志万寿无疆！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d10b924d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
