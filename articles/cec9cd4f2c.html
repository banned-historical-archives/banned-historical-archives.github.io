ear":1968,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我来到毛主席身旁"},{"type":"paragraph","text":"总后勤部学习毛主席著作积极分子代表大会代表、某军马场蒙族牧工"},{"type":"paragraph","text":"宝德其其格"},{"type":"paragraph","text":"选一朵最红最红的茶英花，"},{"type":"paragraph","text":"骑一匹最快最快的追风马。"},{"type":"paragraph","text":"带着马场工人的颗颗红心，"},{"type":"paragraph","text":"奔向光彩夺目的东方朝霞……"},{"type":"paragraph","text":"一路欢歌一路唱，"},{"type":"paragraph","text":"我来到北京——"},{"type":"paragraph","text":"毛主席的身旁。"},{"type":"paragraph","text":"最最幸福的时刻来到了，"},{"type":"paragraph","text":"毛主席接见我们后勤战士代表，"},{"type":"paragraph","text":"实现了我们日夜盼望的最美好的理想。"},{"type":"paragraph","text":"《东方红》歌曲千遍唱，"},{"type":"paragraph","text":"幸福的热泪如雨淌。"},{"type":"paragraph","text":"过去咱牧民做牛马，"},{"type":"paragraph","text":"牧主的皮鞭抽身上。"},{"type":"paragraph","text":"是您领咱闹革命，"},{"type":"paragraph","text":"砸碎枷锁把家当。"},{"type":"paragraph","text":"敬爱的领袖毛主席，"},{"type":"paragraph","text":"您是俺的亲爹娘。"},{"type":"paragraph","text":"您是各族人民心中的红太阳！"},{"type":"paragraph","text":"站在草原望北京，"},{"type":"paragraph","text":"日日夜夜把您想。"},{"type":"paragraph","text":"想念您，就日夜捧读您的书。"},{"type":"paragraph","text":"想念您，就把您的最"},{"type":"paragraph","text":"新指示化力量。"},{"type":"paragraph","text":"想念您，胸怀世界养军马。"},{"type":"paragraph","text":"想念您，刀山火海也敢闯！"},{"type":"paragraph","text":"大青山拉起马头琴，"},{"type":"paragraph","text":"牧工齐把颂歌唱："},{"type":"paragraph","text":"万岁万岁毛主席！"},{"type":"paragraph","text":"敬祝毛主席"},{"type":"paragraph","text":"万寿无疆！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cec9cd4f2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
