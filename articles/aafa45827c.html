ear":1976,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"市财政局二分局党总支举办干部和理论小组成员学习班，认真学习马克思主义哲学，运用辩证唯物主义和历史唯物主义的观点，通过局部看全体，透过现象看本质，分析历史看现状，撕下了党内不肯改悔的走资派的面纱，揭露了他们的真面目。"},{"type":"paragraph","text":"第一，刮右倾翻案风的人不是“说话走火”、“提法不妥”、“用词不当”，而是顽固地站在地主、资产阶级的立场上，从政治上、思想上、组织上全面地向党进攻，猖狂地向无产阶级反攻倒算。他们顽固坚持的恰恰是刘少奇、林彪相继推行，并且接连破产的修正主义路线。"},{"type":"paragraph","text":"第二，刮右倾翻案风的人打的是关心“四个现代化”的幌子，干的是扼杀社会主义的新生事物，贩卖唯生产力论黑货的罪恶勾当。他们搞“四个现代化”是假象，复辟资本主义是真意。"},{"type":"paragraph","text":"第三，刮右倾翻案风的人表面上喊着“团结”的口号，实际上他们却肆无忌惮地分裂以毛主席为首的党中央，是制造分裂的根源。他们扯起孔老二“兴灭国，继绝世，举逸民”的破旗，步着刘少奇、林彪的后尘，推行了一条同毛主席革命路线根本对立的修正主义路线。"},{"type":"paragraph","text":"第四，刮右倾翻案风的不肯改悔的走资派戴着“革命派”的面具，掩盖着他投降派的真象。"},{"type":"paragraph","text":"通过学习和批判，同志们认识到运用对立统一规律观察社会和分析问题，路线是非分得清，真假马克思主义辨得明。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aafa45827c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
