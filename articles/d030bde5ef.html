:[],"dates":[{"year":1962,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见苏发努冯亲王"},{"type":"paragraph","text":"周恩来总理会见并宴请苏发努冯亲王"},{"type":"paragraph","text":"新华社23日讯　毛泽东主席今晚接见老挝爱国战线党主席、老挝临时民族团结政府副首相苏发努冯亲王，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时陈毅副总理在座。"},{"type":"paragraph","text":"新华社23日讯　周恩来总理今天上午会见老挝爱国战线党主席、老挝临时民族团结政府副首相苏发努冯亲王，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见以后，周恩来总理和夫人设午宴招待苏发努冯亲王和他的夫人。"},{"type":"paragraph","text":"会见和宴会时在座的，有副总理陈毅、罗瑞卿、外交部副部长章汉夫，中共中央委员伍修权等。陈毅副总理的夫人、罗瑞卿副总理的夫人和章汉夫副部长的夫人，也参加了宴会。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"左图：毛泽东主席和苏发努冯亲王亲切握手　新华社记者　吕厚民摄"},{"type":"paragraph","text":"右图：周恩来总理会见并宴请苏发努冯亲王　新华社记者　杜修贤摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d030bde5ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
