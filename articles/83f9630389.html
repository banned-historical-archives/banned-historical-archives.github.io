script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴西《工人阶级报》盛赞周总理亚非之行的成就  美帝国主义和修正主义反华阴谋破产  锡兰首任驻华大使赞扬中国对外援助八项原则","authors":[],"dates":[{"year":1964,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴西《工人阶级报》盛赞周总理亚非之行的成就"},{"type":"paragraph","text":"美帝国主义和修正主义反华阴谋破产"},{"type":"paragraph","text":"锡兰首任驻华大使赞扬中国对外援助八项原则"},{"type":"paragraph","text":"据新华社里约热内卢十二日电　巴西《工人阶级报》半月刊在最近一期上发表题为《和平政策和各国人民解放》的评论说，周恩来总理最近对非洲和亚洲国家的访问“清楚地表明他的国家所执行的和平和保卫被压迫国家人民独立的政策”；这次访问“为促进亚非国家团结起来进行反对帝国主义的斗争作出了巨大贡献”。"},{"type":"paragraph","text":"评论强调指出，“中国人民政府极力争取同世界各国和人民加强友好联系。周恩来在他访问非洲期间，为中国和他足迹所到的十个非洲国家之间的牢固合作奠定了基础，为促进亚非国家团结起来进行反对帝国主义的斗争作出了巨大贡献。美国垄断资产阶级则千方百计地阻止为争取自己的政治、经济独立而斗争的各国人民之间的这种团结。”评论说，但是美帝国主义的这一切做法都是徒劳的。"},{"type":"paragraph","text":"评论说，“中国的对外政策最近取得的成就表明，使尽一切手段企图孤立中国的美帝国主义者已经遭到失败，而亚洲这个伟大的社会主义国家正在赢得最大多数的朋友。”评论强调说，“这样，诬蔑中华人民共和国、肆无忌惮地宣传中国执行好战政策的修正主义者便暴露了他们的真面目。”"},{"type":"paragraph","text":"新华社科伦坡十三日电锡兰首任驻华大使威尔莫特·佩雷拉十日在锡兰《每日太阳报》上发表题为《外国的援助》的文章中指出，中国的援助是在平等和尊重主权的基础上提供的，它并没有要求得到任何特权。"},{"type":"paragraph","text":"佩雷拉援引中国和马里联合公报中列举的中国向外国提供援助时所遵循的八项原则作为例子来说明这个问题。"},{"type":"paragraph","text":"他在文章中驳斥了本国和外国报纸对中国的诬蔑，即所谓周恩来总理最近在访问锡兰期间所答应提供的经济援助将使中国有机会干涉锡兰内政。"},{"type":"paragraph","text":"文章并以在成立锡兰石油公司和接管外国石油企业的时候美国停止了对锡兰的所谓援助这一事例来说明帝国主义者提供的所谓援助的概念是什么。"},{"type":"paragraph","text":"文章还赞扬了中国的自力更生政策。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83f9630389"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
