hors":["周恩来"],"dates":[{"year":1966,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"周恩来接见北京外语学院少数派师生谈话纪要","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖总理接见外语学院的少数派代表，谈了该院两条路线斗争展览会的问题。〗","type":"appellation"},{"text":"（关于展览会到外地展览）","type":"paragraph"},{"text":"总理：要提高一步，改进一下，可以出去。出去就要打响这一炮！","type":"paragraph"},{"text":"总理：要去看看这个展览会，然后再出去。","type":"paragraph"},{"text":"总理：你们学校党委检查了没有？","type":"paragraph"},{"text":"同学：没有。","type":"paragraph"},{"text":"总理：我看你们就是对上面有兴趣，你们学校党委反而没事干了。","type":"paragraph"},{"text":"同学：工作组利用过去的思想汇报或党团组织生活会上的汇报，拿来整人。","type":"paragraph"},{"text":"总理：这是不健康的党风，这是王明搞的那一套，从苏联学来的。以后安子文也是这样，这是很不健康的党风，主席很反对。","type":"paragraph"},{"text":"同学：有人不但汇报自己，还汇报别人。","type":"paragraph"},{"text":"总理：这是全国很大的问题，一定要纠正。","type":"paragraph"},{"text":"总理：你们这些人代表多少组织？","type":"paragraph"},{"text":"同学：七、八个。","type":"paragraph"},{"text":"总理：观点是否一致？","type":"paragraph"},{"text":"同学：一致。","type":"paragraph"},{"text":"总理：怎么这么多，观点一致要少而精嘛！（谈到纠察队时）大学要什么纠察队，大家都是红卫兵嘛！纠察队好象是管红卫兵的，我建议取消。","type":"paragraph"}],"comments":[],"origin":"一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（4）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fd53bf1a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
