script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中阿人民战斗友谊牢不可破武汉集会欢迎阿中友协代表团沙姆布利在讲话中指出:中共代表团声明和《人民日报》社论是对现代修正主义者的有力回击","authors":[],"dates":[{"year":1962,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社武汉17日电】　武汉各界人民一千六百多人今晚隆重集会，热烈欢迎以佩蒂·沙姆布利为首的阿中友好协会代表团。"},{"type":"paragraph","text":"大会在晚上七时开始。中共湖北省委书记处书记许道琦首先在大会上讲话。他热烈赞扬具有革命传统的英雄的阿尔巴尼亚人民的顽强的革命意志和无所畏惧的战斗精神，“一手拿镐，一手拿枪”，沿着社会主义道路阔步前进，不断地粉碎了帝国主义和现代修正主义的一切挑衅、讹诈和封锁，胜利地实现了发展国民经济的两个五年计划，取得了社会主义建设的光辉成就。"},{"type":"paragraph","text":"许道琦说，以恩维尔·霍查同志为首的阿尔巴尼亚劳动党始终高举着马克思列宁主义的旗帜，同以铁托集团为代表的现代修正主义者进行了不调和的斗争。"},{"type":"paragraph","text":"许道琦说，中阿两国人民的友谊和团结是在反对我们共同的敌人——帝国主义、各国反动派和现代修正主义的斗争中进一步巩固和发展起来的，是建筑在马克思列宁主义和无产阶级国际主义原则的基础之上的，因而是永恒的，牢不可破的，是任何力量也不能分离的。"},{"type":"paragraph","text":"沙姆布利团长在热烈的掌声中讲话。他介绍了阿尔巴尼亚解放十八年来取得的伟大成就。他说，这些成就是我国人民在疯狂的帝国主义和现代修正主义对我国进行封锁的条件下，进行顽强的忘我劳动的结果，是执行阿尔巴尼亚劳动党正确的总路线的结果，是苏联、人民中国以及其它社会主义各国人民国际主义援助的结果。"},{"type":"paragraph","text":"沙姆布利团长热烈地祝贺中国革命的伟大胜利，同时热情地赞扬中国人民在中国共产党和毛泽东同志的领导下所取得的伟大成就。"},{"type":"paragraph","text":"沙姆布利团长说，阿尔巴尼亚劳动党和阿尔巴尼亚劳动人民同中国共产党和兄弟的中国人民一向是保卫和平的坚强战士。我们两国党和两国人民坚决支持全世界人民反对帝国主义的斗争，因为和平并不能从天而降，不能用对帝国主义的讹诈采取投降的办法来保卫和平，也不能用各国人民的命运和自由作交易的方法来保卫和平。恰恰相反，因为这样做就等于解开了帝国主义好战分子的手脚，增加了他们的侵略欲望，堵塞了解决国际争端的途径。"},{"type":"paragraph","text":"沙姆布利团长说，中国《人民日报》发表了中国共产党代表团在捷共代表大会的声明和《全世界无产者联合起来反对我们的共同敌人》的社论。这两篇文献，有力地回击了现代修正主义者的攻击。阿尔巴尼亚劳动党完全支持中国共产党这一声明，并将把反对现代修正主义的斗争坚持到底。"},{"type":"paragraph","text":"沙姆布利团长最后说，我们必将取得反对帝国主义和现代修正主义斗争的胜利。帝国主义和现代修正主义，都不能使历史的车轮向后转，它们将被历史的车轮压得粉身碎骨。马克思、恩格斯、列宁、斯大林的战无不胜的共产主义的鲜明红旗将迎风招展，社会主义和共产主义将在世界范围内取得胜利。"},{"type":"paragraph","text":"许道琦和沙姆布利团长的讲话，不断为热烈的掌声打断。讲话结束时，全场再次响起经久不息的掌声。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d7581a3a7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
