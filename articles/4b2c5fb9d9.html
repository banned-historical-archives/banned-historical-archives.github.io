script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议资产阶级报刊对进步学生运动的造谣污蔑  意大利米兰进步学生集会示威  学生用棍棒和石块同前来镇压的反动警察通宵搏斗","authors":[],"dates":[{"year":1968,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议资产阶级报刊对进步学生运动的造谣污蔑"},{"type":"paragraph","text":"意大利米兰进步学生集会示威"},{"type":"paragraph","text":"学生用棍棒和石块同前来镇压的反动警察通宵搏斗"},{"type":"paragraph","text":"新华社八日讯　罗马消息：意大利北部工业大城市米兰的进步学生，七日晚上举行集会和示威游行，抗议意大利的资产阶级报刊对意大利进步学生运动进行造谣污蔑的卑劣行径。学生们还用棍棒和石块同前来镇压的反动警察进行了通宵的搏斗。"},{"type":"paragraph","text":"示威学生在举行了抗议集会以后，走向代表意大利北部大资产阶级利益的《晚邮报》的印刷厂，举行示威。他们高举标语牌，上面写着：“权力属于工人！”等战斗性口号。有的学生勇敢地卧倒在运送《晚邮报》的汽车前面，不让这些污蔑意大利进步学生运动的报纸运到各地去。警察野蛮殴打示威学生。学生们翻倒了几十辆汽车作为街垒，并用棍棒、石块、玻璃瓶等向警察进行英勇还击。群情激昂的学生们，还用石块砸碎了附近的大资产阶级的商店和大楼的玻璃窗。菲亚特汽车厂大楼的窗户也被砸得粉碎。"},{"type":"paragraph","text":"警察对示威学生进行了疯狂的镇压，二百多名学生横遭逮捕。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b2c5fb9d9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
