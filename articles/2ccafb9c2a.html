<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央统战部”关于改进政协全国委员会日常工作问题的意见”","authors":[],"dates":[{"year":1956,"month":6,"day":16}],"is_range_date":false,"parts":[{"text":"中央统战部”关于改进政协全国委员会日常工作问题的意见”","type":"title"},{"text":"恩来、小平同志并报中央：","type":"appellation"},{"text":"自从二届政协全国委员会成立以来，由于团结面的扩大，和广泛地吸收了政协委员以及各方面的有关人士参加了政协全国委员会的各种活动，政协全国委员会的日常工作自去年冬季以来已经比较过去增多，工作面日渐在扩大，工作内容也日渐在充实，在加强政治协商方面，在反映各方面的问题和意见方面，在加强与党外人士的联系以及进行其他统战活动等方面都起了不少的作用。但是，对于党外人士的关系上，根据政协全国委员会机关党组的检查，还存在着相当严重的关门保守思想和包办代替作风，这主要表现在：没有认真地团结和推动党外人士共同进行工作，对于在政协全国委员会机关的党外人士没有使他们真正有职有权；对于某些应该同他们协商的问题没有充分协商，甚至没有协商，因此使党外人士的积极性不能得到充分发挥，影响了政协全国委员会日常工作进一步的开展。中央统战部最近讨论了改进政协会委会日常工作的问题，提出了如下的意见：","type":"paragraph"},{"text":"（一）当前政协全国委员会工作的中心问题是如何进一步开展工作，使党外人士真正有事做的问题，需要多想法子使能够作事的人有事可作，并有作事的条件；在政协全国委员会机关工作的党员同志，特别是党员负责同志，凡事必须和党外人士多商量，要善于倾听他们的不同意见；对于日常具体工作和不属原则性的问题，要善于同他们妥协，多按照他们的意见办事。凡属分工给他们负责的工作，必须使他们真正有职有权，对于党内同志的包办代替作风，必须予以彻底纠正。","type":"paragraph"},{"text":"（二）增加常委会的会议活动，并且使会议经常化，今后拟规定每两个月开会三次，在会议内容方面，除正式的政治协商外，还可以就某些国家事务和有关统一战线的问题听取报告和座谈。","type":"paragraph"},{"text":"（三）设常务副主席，负责领导日常工作。过去陈叔通是常务副主席，但是二届全国委员会成立后未向他明白交待清楚。现提议由陈叔通、李维汉、章伯钧、鲍尔汉四人为常务副主席，并拟推陈叔通领先。","type":"paragraph"},{"text":"对于全体副主席，为了使他们经常了解政协日常工作的情况，听取他们的意见，今后拟每月举行一次工作汇报会，由秘书长和其他工作负责人汇报工作情况。","type":"paragraph"},{"text":"（四）在常委会下除已经设立学习委员会外，现拟增设地方工作委员会，加强对地方政协工作的研究和综合。地方委员会主任拟由章伯钧担任，并且设副主任若干人。委员会下设立办公室进行日常具体工作。","type":"paragraph"},{"text":"（五）全委会各工作组的活动应适当放宽，让他们多同各方面接触，多反映一些情况，多作一些研究。","type":"paragraph"},{"text":"（六）改进政协全国委员会会刊的编辑工作，在会刊内容方面，除报导政协全国委员会和地方委员会的工作情况和经验，以及政协参加单位的有关统一战线的活动外，凡属各工作组的报导，政协委员和民主人士的来信、来稿和他们的视察报告，以及人民来信中有关统一战线工作的问题和意见都可以选登。在编辑工作上，应当采取各党各派言论自由的方针，可以发表有不同意见的文章和辩论文字。会刊争取每月出一期或者两期。","type":"paragraph"},{"text":"（七）近年来，政协全国委员会在接待来访的外宾工作已日渐增多，政协全国委员会应该在这方面多做些工作。但是，过去接待和谈话的形式过于严肃和拘束，今后可以放手让党外人士和外宾自由接触，在方式上，可以集体谈或个别谈；可以在会内谈也可以在会外谈，听任他们自由选择。这样做，对内对外都会有好的影响。同时，中央一个时期的外交政策和方针，可以由中央负责同志也可以由国际活动指导委员会的负责同志向民主人士作报告，使他们心中有数。","type":"paragraph"},{"text":"（八）调整秘书处的人事。在现有秘书处的干部配备上，拟增党外人士所占的比重，并且注意安排中、右分子。过去在处长、副处长6人中党外人士仅有1人，今后党员和非党人士的比例人数拟为3比4或4比5。此外，各民主党派应该都有人参加秘书处的工作。秘书处编制因此要多几个名额。","type":"paragraph"},{"text":"副秘书长名单中缺乏右派分子，可增加一两个右派分子，个别的如×××可以更换。","type":"paragraph"},{"text":"以上意见，是否有当，请批示，以便同党外人士协商处理。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ccafb9c2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
