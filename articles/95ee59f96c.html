tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"介绍我文化大革命的伟大胜利","authors":[],"parts":[{"type":"paragraph","text":"据新华社布拉柴维尔电 为了庆祝中华人民共和国成立二十周年举办的、介绍中国无产阶级文化大革命的伟大胜利的图片展览会，于九月二十七日至十月三日在这里举行。一千多人参观了这个展览会。"},{"type":"paragraph","text":"许多观众在留言簿上热情地写下了他们对中国人民的伟大领袖毛主席的敬爱和对中国人民二十年来所取得的巨大成就的祝贺。一位刚果（布）朋友写道：“祝毛主席万寿无疆！光荣属于中国人民！”"},{"type":"paragraph","text":"一位喀麦隆朋友写道：“中国人民在毛主席亲自发动和领导的无产阶级文化大革命中所取得的成就，给我留下了极其深刻的印象。我所看到的这一切奇迹，只有依靠战无不胜的毛泽东思想才能创造出来。中国人民的胜利，也就是全世界被压迫人民的胜利，全世界被压迫人民决心用强大的毛泽东思想武装起来，以便同美帝国主义和现代修正主义进行有效的斗争。毛主席万岁！万岁！万万岁！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95ee59f96c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
