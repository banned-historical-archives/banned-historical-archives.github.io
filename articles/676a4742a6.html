script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"097e8dc4-78a1-46bb-8b7e-467bb84632b7","name":"中央首长重要讲话（1967年）","internal":false,"official":false,"type":"img","author":"毛泽东、江青、康生、张春桥、关锋，1967年左右","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/097e8dc4-78a1-46bb-8b7e-467bb84632b7/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/097e8dc4-78a1-46bb-8b7e-467bb84632b7/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/097e8dc4-78a1-46bb-8b7e-467bb84632b7/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/097e8dc4-78a1-46bb-8b7e-467bb84632b7/4.jpg"],"article":{"title":"江青同志在“全国在京革命师生向资产阶级反动路线猛烈开火誓师大会”上的讲话","alias":"","parts":[{"type":"paragraph","text":"汇青同志十月六日下午在《金国在京蓝命师生向资产阶"},{"type":"paragraph","text":"级反动路孟烈开火音师大会》上的讲话户身"},{"type":"paragraph","text":"同志们、同学们：出"},{"type":"paragraph","text":"你俨好：我受党中央和毛主储的爱托居你低好1中央女化蓝命小粗他"},{"type":"paragraph","text":"全体同志向你们居好，向你假致崇高的无产阶微女化大革命的敬礼。"},{"type":"paragraph","text":"我征支持你们这种大无退的无产阶微英雄行为，我们学习你假这种这井"},{"type":"paragraph","text":"不怕困难，不怕牺性的革命精。我伊坚决支持和你们站在一起，杨卫执行党中央关于无产阶效文化大革命的决定，即十六条。"},{"type":"paragraph","text":"一个虞正的无产阶级革命者一定要掌指原则，掌担政馈，掌握策略。我希望同志们在斗争中掌握稳政策，善于斗争，在毛漫东思想的基础上在斗争的考验中发展壮大左派队伍，团结大多教愿意革命的人，团结那受蒙薇的人，孤立和打击那一小报党内走餐本主义道路的当权派。"},{"type":"paragraph","text":"党中央在十月五日批准了军队无产阶级文化大革命的紧急指示，现"},{"type":"paragraph","text":"一个虞正的无产阶级革命者一定要掌指原则，掌担政馈，掌握策略。我希望同志们在斗争中掌握稳政策，善于斗争，在毛漫东思想的基础上在斗争的考验中发展壮大左派队伍，团结大多教愿意革命的人，团结那受蒙薇的人，孤立和打击那一小报党内走餐本主义道路的当权派。"},{"type":"paragraph","text":"党中央在十月五日批准了军队无产阶级文化大革命的紧急指示，现"}],"authors":["江青"],"dates":[{"year":1966,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"descri
