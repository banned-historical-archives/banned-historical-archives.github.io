命分子的指示的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":11}],"is_range_date":false,"parts":[{"text":"毛泽东转发西南军区党委关于镇压反革命分子的指示的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"军委直属各军事领导机关及军事学院，各大军区党委，志愿军党委，并转各省军区党委：","type":"appellation"},{"text":"请你们也照西南军区党委会一样，对于学习四个镇反文件及传达报告的问题，对于清匪问题（在有清匪任务的地方），对于留有旧军官旧人员的问题，此外还有在机关中部队中混入其他反革命分子的问题，及保密问题，对于这些问题，不论过去已有检讨或尚未有检讨，均一律重新作一次检讨，并对自己直属机关部队及各兵团军师，发出必要的指示并定期完成任务。我们认为在一切军事机关学校部队中引起注意镇压反革命分子问题，并作出正确的处理，是目前时期的重要政治任务，凡对此任务忽视者，应当受到批评。你们的检讨及指示，应送军委一份。","type":"paragraph"},{"text":" 毛泽东一九五一年三月十一日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ee10376a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
