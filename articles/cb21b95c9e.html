:[{"year":1946,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"快快检查翻身"},{"type":"paragraph","text":"襄垣城关查出地主高租剥削"},{"type":"paragraph","text":"【本报长治讯】襄垣城关发现地主仍旧高租剥削农民，若干破产地主呈伪装积极分子，骗取斗争果实。月初，该县城关干部积极分子九十余人，集会逐户检查翻身运动，发现四十户封建地主，尾巴仍未割掉；西关地主秦富堂，租给农民张许州八亩地，每年得租五石，今年还照旧出租，未经清算。贫苦农民尚有六十二户未翻透身，如南关李金锁还租种二十五亩。全城还有斗争果实八十二亩土地、六头牲口，四十五石粮食，二百八十余间房，大洋十二万五千余元，及许多衣物均未分配，已分配的亦有很多不公，三户破产地主竟假装积极分子骗取了群众果实，经检查后，许多村干部都说：“过去认为自己翻了身啦就觉得群众也差不多啦，不想到农民还没彻底翻身”。最后领导上即响亮的提出：要进行一次挨户检查，果实要迅速分配，不应该分的要退还，今冬一定要把翻身搞彻底，大家情绪很高，都说：“再努一把劲，把身翻个透。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb21b95c9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
