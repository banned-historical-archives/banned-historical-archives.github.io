ates":[{"year":1964,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　以苏共中央委员、交通部长鲍·巴·别谢夫为首的苏中友好协会代表团，由铁道部副部长郭鲁、中苏友好协会总会副秘书长李沾吾等陪同，昨天下午从郑州乘火车到达上海。"},{"type":"paragraph","text":"中共上海市委书记处书记、上海市中苏友好协会会长石西民，中共上海市委书记处候补书记、上海市中苏友好协会理事张春桥，上海市中苏友好协会副会长巴金、秘书长白彦、副秘书长张耀辉、袁冬林和有关方面的人士李明哲、蔡贡、李静一、朱益栋、盛利、朱宝根，以及各界群众数百人，到车站热烈欢迎。少先队员向全体苏联同志献了鲜花。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61b54ad6e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
