ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"复林彪、罗荣柜、楚荣臻电","alias":"","parts":[{"type":"paragraph","text":"复林彪、罗荣桓、聂荣臻电"},{"type":"paragraph","text":"（1949年2月5日）"},{"type":"paragraph","text":"依整个形势看，武汉、京、沪、长沙、南昌、杭州、福州、广州均有按照北平方式解决的可能。虽然仍有再打几仗的可能，但是各地逐一和平解决的可能是很大的，太原亦有此种可能性。因此争取傅作义站在我们方面有十分必要。太原如能照北平样和平解决，阎锡山又能作上述傅作义那样的表示，我们亦可照待遇傅作义那样待遇他。只要李、白能站在有利于人民事业的一方面，依照北平办法解决京、沪、汉等处问题，我们即会以对待傅的态度对待他们。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的复林彪、罗荣桓、聂荣臻电的主要"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":2,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":101,"page_end":101},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db2288ed8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
