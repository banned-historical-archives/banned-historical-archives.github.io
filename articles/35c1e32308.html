art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中共和毛泽东得到全世界人民真正支持美帝和苏联修正主义严重不安紧密配合掀起反华运动","authors":[],"parts":[{"type":"paragraph","text":"新华社二十二日讯 墨尔本消息：澳大利亚共产党（马克思列宁主义者）机关报《先锋报》最近发表文章指出，中国共产党及其领袖毛泽东得到全世界被压迫人民的真正支持，这使得美帝国主义和苏联修正主义者严重不安，它们正互相配合，掀起一个猖狂的反华运动。"},{"type":"paragraph","text":"《先锋报》在二月间出版的第三卷第四期里刊载一篇题为《反华运动正在猖狂进行》的文章说，“空前猖狂的反华运动正在全世界进行。美帝国主义者说中国是他们的头号敌人。他们把自己的主要的武装部队部署在中国周围。他们一刻也不停止反华宣传……在全世界，他们的走狗也掀起了同样的叫嚷。”"},{"type":"paragraph","text":"文章指出，“苏联修正主义者跟美帝国主义者一样猖狂地进行他们的反华运动。他们在共产主义语汇的掩饰下进行他们的反华运动。因此，这是更加肮脏的运动，但是这是同样的运动。谁都不能否认这些运动是一致的。它们是紧密配合的。”"},{"type":"paragraph","text":"文章指出，“苏联领导人已经向美帝国主义者保证，要结束越南战争。他们同汉弗莱、哈里曼等人都讨论了这个问题。但是，苏联修正主义者承担了一个办不到的任务，而他们的失败使他们愤怒欲狂。因此，他们更加对中国大发雷霆。”"},{"type":"paragraph","text":"文章着重指出，苏联修正主义者大肆反华是因为他们遭到了挑战。“这个挑战就是，全世界一切被压迫人民从内心对中华人民共和国、对中国共产党及其领袖毛泽东表示巨大的真正支持。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35c1e32308"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
