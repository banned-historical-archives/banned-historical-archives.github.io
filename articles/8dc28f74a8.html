script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美“援”带来一场恶梦  希腊资产阶级报纸埋怨不已","authors":[],"dates":[{"year":1958,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美“援”带来一场恶梦"},{"type":"paragraph","text":"希腊资产阶级报纸埋怨不已"},{"type":"paragraph","text":"本报讯近来，希腊资产阶级报纸对美国借“援助”之名，损害希腊利益的做法加以尖锐的抨击。"},{"type":"paragraph","text":"“独立新闻报”写道，“援助如此之少，它只相等于国民总收入的1.5％。公众不要误解，以为援助有多大的意义。……公众要想想，希腊因为这种援助而使国家在经济上和政治上不能独立，从而使它的利益蒙受损失。美国经济使团的代表很少促进国家的工业化。而美国人还直接或间接地妨碍了和正在妨碍着同东方国家的经济贸易的发展。”报纸并指出，现在“应该是改变这种政策的时候了”。"},{"type":"paragraph","text":"“黎明日报”写道，“臭名远扬的美国援助，早已就成了希腊的一场恶梦。从一开始它就成了华盛顿干涉我们内政的原因。据一家政府报纸在少有的几分钟的老实时间里曾经写道，美元成了被诅咒的东西，它把希腊变成了一个可怜的被保护国”，它还说：“为此美国要求希腊出卖塞浦路斯人，为此，美国强使我们承担破坏我们经济的特别军费和强使我们奉行敌视人民民主国家的政策”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8dc28f74a8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
