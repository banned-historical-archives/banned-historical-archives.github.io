ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"给臧克家等的信","alias":"","parts":[{"type":"paragraph","text":"给藏克家“等的信"},{"type":"paragraph","text":"（1957年1月12日）克家同志和各位同志："},{"type":"paragraph","text":"惠书早已收到，迟复为歉！遵嘱将记得起来的旧体诗词，连同你们寄来的八首，一共十八首，抄寄如另纸，请加审处。"},{"type":"paragraph","text":"这些东西，我历来不愿意正式发表，因为是旧体，怕谬种流传，贻误青年；再则诗味不多，没有什么特色。既然你们以为可以刊载，又可为已经传抄的几首改正错字，那末，就照你们的意见办吧。"},{"type":"paragraph","text":"《诗刊》出版，很好，祝它成长发展。诗当然应以新诗为主体，旧诗可以写一些，但是不宜在青年中提倡，因为这种体裁束缚思想，又不易学。这些话仅供你们参考。"},{"type":"paragraph","text":"同志的敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五七年一月十二日[1]臧克家，当时任中国作家协会书记处书记、《诗刊》主编。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":225,"page_end":225},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c7e7210ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
