rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席关心咱通信兵","authors":["王蔚"],"parts":[{"type":"paragraph","text":"晴空万里太阳红，"},{"type":"paragraph","text":"革命战士齐欢腾，"},{"type":"paragraph","text":"军营里花笑人欢唱，"},{"type":"paragraph","text":"毛主席来看通信兵。"},{"type":"paragraph","text":"毛主席对咱微微笑，"},{"type":"paragraph","text":"咱心里甜得象蜜涌，"},{"type":"paragraph","text":"心里甜来身上暖，"},{"type":"paragraph","text":"一轮太阳面前升。"},{"type":"paragraph","text":"毛主席跟咱握握手，"},{"type":"paragraph","text":"咱的手变得巧又灵，"},{"type":"paragraph","text":"手按电键奏凯歌，"},{"type":"paragraph","text":"月月都是“万组红”。"},{"type":"paragraph","text":"毛主席给咱讲讲话，"},{"type":"paragraph","text":"咱心里点亮一盏灯，"},{"type":"paragraph","text":"胸怀宽阔眼睛亮，"},{"type":"paragraph","text":"敌人阴谋看得清。"},{"type":"paragraph","text":"毛主席摸摸咱摩托车，"},{"type":"paragraph","text":"摩托车变成一条龙，"},{"type":"paragraph","text":"穿云破雾送捷报，"},{"type":"paragraph","text":"技术越练越精通。"},{"type":"paragraph","text":"毛主席看看咱的枪，"},{"type":"paragraph","text":"咱的枪支显神通，"},{"type":"paragraph","text":"叫它打哪就打哪，"},{"type":"paragraph","text":"枪枪打在靶当中。"},{"type":"paragraph","text":"毛主席到咱宿舍走一走，"},{"type":"paragraph","text":"咱宿舍变得暖融融，"},{"type":"paragraph","text":"好象慈母身边守，"},{"type":"paragraph","text":"做梦做的是幸福梦。"},{"type":"paragraph","text":"一轮红日挂心中，"},{"type":"paragraph","text":"毛主席关心咱通信兵，"},{"type":"paragraph","text":"咱永远都听毛主席话，"},{"type":"paragraph","text":"赤胆忠心为革命。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a97e27099"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
