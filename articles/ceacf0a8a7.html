art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"美国副总统蒙代尔到京邓小平副总理到机场迎接","authors":[],"parts":[{"type":"paragraph","text":"据新华社八月二十五日讯 美利坚合众国副总统沃尔特·弗·蒙代尔和夫人一行，今天下午五时三十五分乘专机到达北京，开始对我国进行正式访问。"},{"type":"paragraph","text":"国务院副总理邓小平、外交部长黄华、水利部长钱正英等到机场欢迎蒙代尔副总统和夫人。在飞机舷梯旁，邓小平副总理握着蒙代尔副总统的手说：“我非常高兴同你们再次见面。我代表中国政府和中国人民热烈欢迎你们。”蒙代尔副总统满面笑容地说：“我给您带来了您的好朋友卡特总统和美国人民对您的问候和爱慕之情。”"},{"type":"paragraph","text":"蒙代尔先生是中美今年一月建交后来中国访问的美国最高领导人。他将在北京、西安、广州三个城市逗留一星期。在这期间，华国锋总理、邓小平副总理以及我国其他领导人和政府部长将同蒙代尔副总统和随同来访的美国政府官员会晤，就当前一些国际问题和进一步发展双边关系交换意见。蒙代尔副总统还将在北京大学就美中关系的历史意义发表演讲。"},{"type":"paragraph","text":"在飘扬着中美两国国旗的机场上举行了欢迎仪式。军乐团先后奏美利坚合众国国歌和中华人民共和国国歌。"},{"type":"paragraph","text":"邓小平副总理陪同蒙代尔副总统检阅了中国人民解放军陆海空三军组成的仪仗队。"},{"type":"paragraph","text":"到机场迎接蒙代尔副总统和夫人一行的还有：外交部副部长章文晋，外贸部副部长郑义山，冶金部副部长徐驰，石油部副部长秦文彩，民航总局局长沈图，中国驻美国大使柴泽民和夫人等。"},{"type":"paragraph","text":"美国驻中国大使伍德科克和夫人以及大使馆官员也到机场迎接。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ceacf0a8a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
