" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"老志诚在首都音乐界批判刘雪庵大会上的发言","authors":["老志诚"],"dates":[{"year":1957,"month":10}],"is_range_date":false,"parts":[{"text":"老志诚在首都音乐界批判刘雪庵大会上的发言","type":"title"},{"text":"老志诚","type":"authors"},{"text":"刚才苏灵扬、陶佩霞二位同志已经揭露了刘雪庵反党反社会主义的言行。他从华东合并过来不久就和我谈过入盟的问题。那时盟只是一个小组，他说“你可以参加盟，音乐系还有很多对象，你入了可以带动许多人来参加”。我说我的活动多，又想，参加是自愿，不一定我带动。后来盟发展很快，听了林传鼎的话又要发展。可是我已婉言表示拒绝。一直拖延了七八个月，直到三月份我要出国，很忙，有一次他到我屋内，向我要以前由他交给我的一张表，我一直放在办公桌内未填好，他就拿走替我填了，以后就通过我入盟，这是我参加盟的经过。时间是拖了很久，他总是不断向我宣传。我想入盟不是坏事，但他是想把盟做为政治资本。还想发展卫老，他想把院领导搞成“三对一”的局势，从后来整风时的表现我看清了他，刚来时他是以进步姿态出现的。过去也听说过他的一些事情，写过“何日君再来”影响很坏，他是少将级，给国民党做过不少工作。我们曾经怀疑过他，那时艺师筹委会某同志说“他还是靠拢党的”。但在整风期间露出他的真面目来了。他到处点火，在教务科、在盟会上、在音协会上的发言，是向党进攻，恶劣地挑拨党与专家的关系。我问他为何这样发言，他说：“我倚老卖老，怎样不了我”。“何日君再来”麻醉了许多人，他说：“今天还应该唱，生活中也需要轻音乐。”(音协不久前召开过轻音乐座谈会，他想借此钻空子)可以看出，他过去以进步姿态出现骗取党的信任。肃反时他是很积极的，篡夺了系里的领导。提出“一定要上班下班”以“左”来迷惑人。到艺师后表现“积极”，什么都抓，他命令教务科经常向他汇报工作、助教向他汇报进修情况，不归他管的人事工作他也来管，有职无权是胡说。他不满足现在的地位，野心很大，企图利用发展盟做为自己的政治资本。在以盟的名义召开讨论教学计划会议时，特别约请了教育部方面的人和北京市音乐教师来参加。最后他发言表观他如何有能力领导学校、野心勃勃想篡夺党在学校中的领导权。我看他还不仅如此，教育部曾谦虚地说过：“我们对艺术教育是外行，希望你们多做工作”。他便以此在校内常说全国艺术教育以艺师为首，艺师以他为首。他在检讨中说：“我怎么想也想不出要篡夺领导权，怎么傻的人也不会这样”。但在鸣放期间狐狸尾巴露出来了，盟的宣言他篡改了，他的立场很明显了。他的几次检讨不但没有进一步，反而摆起“光荣历史”，抗拒不交代，我要正告刘雪庵，你这样下去就要自绝于人民了，这是没有出路的。经过今天的大会对你的批判和帮助，你要真正地检查自己，把自己丑恶的面目暴露出来，彻底交代你一切反党罪恶言行，向人民低头认罪，重新做人，才是你的出路。否则只有走上自绝于人民的道路。","type":"paragraph"},{"text":" 来源：《首都音乐界反右派斗争资料(一)》，(首都音乐界整风联合办公室编印，1957．11．)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"166e13987f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
