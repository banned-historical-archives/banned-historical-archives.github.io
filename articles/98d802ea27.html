tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"成绩越大越要看到薄弱环节","authors":["福州部队活学活用毛泽东思想先进集体某部六连"],"parts":[{"type":"paragraph","text":"我们连队长期坚守在祖国东南最前沿的小岛上，在对敌斗争中作出了一些成绩，被上级树为活学活用毛泽东思想先进集体和四好连队的标兵。今年上半年，我们发动大家找本连队的薄弱环节，有的同志说：“找不到问题。”"},{"type":"paragraph","text":"为什么找不到问题？我们组织全连同志学习了毛主席关于“肯定一切，就是只看到好的，看不到坏的，只能赞扬，不能批评。说我们的工作似乎一切都好，这不合乎事实”的教导，学习了一九六○年军委扩大会议决议中关于防止骄傲自满的论述，用十天时间进行了一次“小整风”。通过整风，同志们说：“找不到问题”本身就是问题，就是骄傲自满情绪在作怪，有了这种盲目性，就会固步自封，有先进学不到，有问题看不见，有批评听不进，有缺点改不掉。只有坚持一分为二，在胜利的形势下找出薄弱环节，才能更好地落实两个“决议”，争取更大的胜利。"},{"type":"paragraph","text":"全连同志破除了形而上学的思想方法，从落实中找出了不落实的地方。炊事班同志原来认为自己从战时着想准备了几套炊具，感到“找不到问题”了，现在他们从打恶战出发，又准备起担架，练习战场救护的本领，以便打起仗来更好地支援火力班。为了更好地学先进，党支部还针对揭露出来的问题，组织骨干到兄弟单位去学习。由于不断地克服了薄弱环节，连队革命化、战斗化建设更加扎扎实实。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98d802ea27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
