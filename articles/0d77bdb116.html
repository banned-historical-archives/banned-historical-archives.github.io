script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"左倾错误造成混乱　涉县提出有偏即纠","authors":["赵伟俊"],"dates":[{"year":1948,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"左倾错误造成混乱"},{"type":"paragraph","text":"涉县提出有偏即纠"},{"type":"paragraph","text":"【涉县消息】涉县于上月二十三日召开区分委、区长等负责干部会议，检查春耕和纠偏。从各区汇报看，二十多天的时间，只作了一般的宣传动员，谁种谁收。有些干部没有抓紧解决生产中的具体障碍。虽然群众情绪比较安定了，但个别村混乱现象仍然存在。如三区有坏分子组织假贫雇团捣乱专权，提出口号是：“有啥没啥，贫雇说话。”盲目与干部对立，反对给军属代耕：“他们自愿参军，吃公家饭，穿公家衣，还给他们代耕干啥？没有劳力自己雇人。”二区白泉水坏分子给干部判罪，谁该罚、打、拖、杀、刮等，造成干部大恐慌。东达城贫雇代表打人，派差给自己做活，群众不同意，他就乱戴帽子。九区贫雇杨木新等操纵政权，村中大小事都要经过他们批准。老实正派的贫雇不同意，干部不动，中农不敢吭气。怕平分，怕挨斗，生产情绪不高。其次县委一再提出的纠正侵犯中农利益，干部只口头应付，左倾思想没有扭转。借口无法补偿，斗错中农不肯纠正，查封中农不肯开放，留下尾巴，准备再斗。如五区原曲，去年四次复查时封门四十六户，据区干部说，内有富农一户，富裕中农二户，其余都是中农，甚至还有贫农。但是干部去启封开门时，仍然一律告诉人家：“财产已登记，不能短少，将来群众要照单交清。”被查封中农反映：“开放等于不开放，咱是给人家当保管”。所有权不归还，中农仍背着怕斗争的包袱，还不能安心生产。二区白泉水强迫中农借粮，至今还没纠正。"},{"type":"paragraph","text":"县委在总结中，肯定提出有偏即纠，并指出有些干部对假贫雇团处理不大胆，是对人民事业不负责。有的贫雇团是自己组织起来的，怕失掉自己威信，不敢公开宣布解散，停止其活动，采取调和办法，是完全错误的。有些同志不能彻底纠正侵犯中农利益的偏向，怕走错路，就是想留下尾巴，再斗中农。必须迅速克服，严肃态度，掌握原则，大胆处理，扫除生产障碍，积极推进生产。不能等待将来民主整党填补运动中再解决。（赵伟俊）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d77bdb116"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
