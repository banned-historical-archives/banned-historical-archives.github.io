主义者越是反对，世界人民越是支持","authors":[],"dates":[{"year":1967,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼泊尔朋友说中国文化大革命是伟大创举"},{"type":"paragraph","text":"文化大革命给世界人民指出光明大道"},{"type":"paragraph","text":"现代修正主义者越是反对，世界人民越是支持"},{"type":"paragraph","text":"据新华社加德满都电  一些尼泊尔朋友在最近接见新华社记者时热烈赞扬中国无产阶级文化大革命。他们说：“中国无产阶级文化大革命好得很”，这场革命“是用毛泽东思想武装起来的中国人民对世界人民的伟大贡献。”"},{"type":"paragraph","text":"一位名叫巴哈杜尔的朋友说，由伟大的领袖毛主席领导的中国无产阶级文化大革命正在大踏步前进。它大大鼓舞了全世界人民反对美帝国主义和现代修正主义的斗争。"},{"type":"paragraph","text":"他说：“伟大英明的毛泽东思想照得我们的心里亮堂堂，无产阶级文化革命给了世界革命人民巨大的鼓舞。让我们欢呼世界人民最伟大的最正确的领袖毛主席万岁！中国无产阶级文化大革命万岁！”"},{"type":"paragraph","text":"另一位名叫纳拉扬的朋友说：“无产阶级文化大革命拔掉了中国的修正主义根子，这对世界人民来说，是一件大好事。这是用毛泽东思想武装起来的中国人民对世界人民的伟大贡献。”"},{"type":"paragraph","text":"他说：“目前，帝国主义、现代修正主义和一切反动派正在开动宣传机器来诬蔑中国的无产阶级文化大革命。他们散布关于文化大革命的各式各样的谣言。他们象苍蝇一样地散布细菌。但是世界人民决不会相信他们的谎言。世界人民相信真理，那就是伟大的毛泽东思想。”"},{"type":"paragraph","text":"一位名叫戈文达的尼泊尔朋友对新华社记者说：“中国的无产阶级文化大革命，不仅对中国有非常重要的意义，而且对世界人民也有非常重要的意义”。"},{"type":"paragraph","text":"他说：“中国的无产阶级文化大革命促使世界革命人民沿着光明大道前进，鼓舞世界人民在反对美帝国主义和现代修正主义的斗争中取得胜利。为此，世界革命人民非常感谢最伟大和英明的领袖毛主席”。"},{"type":"paragraph","text":"另一位名叫帕戴伊的朋友说：“由毛主席发动和领导的中国无产阶级文化大革命，是世界历史上一个伟大的创举。这场革命不仅保证中国永不变色，而且也给世界人民指出了光明大道。”"},{"type":"paragraph","text":"他说，现代修正主义者诽谤中国文化大革命是因为他们非常害怕中国文化革命，非常害怕伟大的毛泽东思想。“现代修正主义者同美帝国主义者和一切反动派联合起来对中国文化大革命进行诬蔑。但是全世界人民坚决支持中国文化大革命。现代修正主义者越是反对中国的文化大革命，世界人民越是支持中国的文化大革命”。他高呼：“世界人民的伟大领袖毛主席万万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e8b32b428"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
