道衡","华南师范学院"],"dates":[{"year":1957,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"第三次声明","type":"title"},{"text":"华南师范学院“史本三”徐道衡","type":"authors"},{"text":"《还我河山》一文昨天已开了辩论会，现在我们再次声明：","type":"paragraph"},{"text":"一、我们承认：这样一个涉及到中苏两国关系的问题，采用大字报的形式提出来，从客观影响上看是不好的。","type":"paragraph"},{"text":"二、我们承认：《还我河山》笼统提出收回领土问题，尽管我们内容上阐述了对苏联要采取谈判方式解决，但也用这标题来对待我们的友邦是错误的。","type":"paragraph"},{"text":"三、虽然我们要求苏联归还这些领土，但我们并不坚持一定要苏联交还这些领土，如果能对这一问题作合法的解释，可以不交还。","type":"paragraph"},{"text":"四、昨天的辩论会并没有解决我们所提出的根本问题，因此我们准备再一次辩论会继续辩论(按：后来没开成)。由于目前我们正在准备考试，所以不再在大字报上争论。","type":"paragraph"},{"text":" 《还我河山》作者1957年6月24日","type":"paragraph"},{"text":" 来源：华南师范学院学生会 编辑出版《华南师范学院反右派斗争初战记》，1957年9月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddd500e1b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
