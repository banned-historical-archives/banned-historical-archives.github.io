" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于感谢苏联政府援助我国经济建设的电报","alias":"","parts":[{"type":"paragraph","text":"关于感谢苏联政府援助我国经济建设的电报\""},{"type":"paragraph","text":"（1953年9月15日）苏维埃社会主义共和国联盟部长会议主席马林科夫同志："},{"type":"paragraph","text":"中华人民共和国中央人民政府委员会，在一九五三年九月十五日举行的会议上，满意地听取了中华人民共和国政府代表团的代表李富春同志所作的关于与苏联政府商谈苏联政府对我国经济建设援助问题的报告。中央人民政府委员会一致认为，由于伟大的苏联政府同意在建设和改建中国的九十一个新的企业以及正在建设和改建的五十个企业中给以系统的经济的和技术的援助，中国人民将能够在学习苏联的先进经验和最新技术成就的努力之下，遂步地建立起自己的强大的重工业，这对于中国工业化、使中国逐步地过渡到社会主义和壮大以苏联为首的和平民主阵营的力量，都具有极其重大的作用。"},{"type":"paragraph","text":"[1]本篇一是毛泽东给苏维埃社会主义共和国联盟部长会议主席马林科夫的电报，对苏联政府援助我国经济建设表示感谢。本篇二是毛泽东给张闻天的电报。"},{"type":"paragraph","text":"关于感谢苏联政府援助我国经济建设的电报"},{"type":"paragraph","text":"两个国家在一次商谈中解决了九十一个企业的建设问题，解决了长期的援助问题，这在历史上是创举，完全体现了伟大的斯大林所说的真理：“这个合作的经验表明，没有一个资本主义国家能像苏联那样给予各人民民主国家以真正的帮助和技术精湛的帮助。问题不仅在于这种帮助是极度便宜的，技术上是头等的。问题首先在于这种合作的基础，是互相帮助和求得共同经济高涨的真诚愿望。”"},{"type":"paragraph","text":"在商谈过程中，苏联政府根据它三十多年来的伟大社会主义建设的丰富经验，对于我国五年计划任务提出了各项原则的和具体的建议。这些建议将帮助我们在中国经济建设过程中尽可能地避免许多错误和少走许多弯路。"},{"type":"paragraph","text":"我谨代表中国政府和中国人民对于苏联政府和苏联人民这种伟大的、全面的、长期的、无私的援助，表示衷心的感谢。中国政府和中国人民愿以自己的不懈的努力来加强苏中两国的经济合作和友好同盟，以利为世界和平事业的共同奋斗。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东一九五三年九月十五日于北京"},{"type":"paragraph","text":"二张闻天同志："},{"type":"paragraph","text":"今日中央人民政府委员会通过了以我的名义致马林科夫同志关[1]张闻天，当时任中国驻苏联大使。毛泽东全集第三十三卷于感谢苏联政府援助我国建设问题的电文，现随电发去。请你面见马林科夫同志，并以中文为正本，俄文为副本亲递上述电报，以资郑重。"},{"type":"paragraph","text":"毛泽东一九五三年九月十五日"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":9,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":339,"page_end":341},"tags":[{"name":"毛泽东","type":"人物"},{"name":"张闻天","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74d7967eb9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
