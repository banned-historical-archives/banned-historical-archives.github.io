art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为革命节约每一滴油某部运输连贯彻执行毛主席的“备战、备荒、为人民”的伟大方针，开展节约活动取得显著成效","authors":[],"parts":[{"type":"paragraph","text":"在党的“九大”精神鼓舞下，运输连为革命节约取得了可喜成绩。这时，有的同志认为“节油到顶”了。党支部针对这一活思想，组织全连同志认真学习毛主席关于“人类总得不断地总结经验，有所发现，有所发明，有所创造，有所前进”的教导，大破自满松劲情绪，大立不断革命、彻底革命的思想。大家用一分为二的观点，找差距，订措施，去夺取更大胜利。战士陈育平，原先以为节油达到百分之三十八，已经差不多了。不久，有个同志又创造了节油百分之四十一的新成绩，使他震动很大。他主动检查了自己的“节油到顶”的思想，虚心学习其他同志先进经验，很快又创造了节油百分之四十三点七的新纪录。"},{"type":"paragraph","text":"现在，运输连“为革命节约每一滴油”的活动，正在扎扎实实地开展。干部战士决心以实际行动，为伟大领袖毛主席争光！为伟大的社会主义祖国争光！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab4765d526"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
