ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺匈牙利解放十七周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺匈牙利解放"},{"type":"paragraph","text":"十七周年的电报"},{"type":"paragraph","text":"（1962年4月3日）布达佩斯匈牙利社会主义工人党中央委员会第一书记、匈牙利人民共和国工农革命政府总理卡达尔·亚诺什同志，匈牙利人民共和国主席团主席道比·伊斯特万同志："},{"type":"paragraph","text":"在匈牙利解放十七周年的时候，我们谨代表中国共产党、中国政府和中国人民，向你们，并且通过你们，向匈牙利社会主义工人党、匈牙利工农革命政府和匈牙利人民，致以热烈的、兄弟般的祝贺。"},{"type":"paragraph","text":"一年来，兄弟的匈牙利人民，在匈牙利社会主义工人党和匈牙利工农革命政府的领导下，为建设社会主义，为维护欧洲和世界和平，进行了忘我的劳动和不懈的努力，并且取得了巨大的成就。中国人民为此感到由衷的高兴，并且真诚地祝匈牙利人民继续取得新的、更大的胜利。"},{"type":"paragraph","text":"中匈两国是社会主义兄弟之邦。我们两国人民的友谊，是建立在马克思列宁主义和无产阶级国际主义的基础上的，因此是永恒的和牢不可破的。中国人民将同匈牙利人民一起，为加强中匈两国的团结和整个社会主义阵营的团结，为争取和平、民族解放、民主和毛泽东全集第四十五卷社会主义共同事业的胜利而继续奋斗。"},{"type":"paragraph","text":"祝中匈两国人民的兄弟友谊万古长青！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1962年4月3日"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":111,"page_end":112},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2df53db69"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
