ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"对河北阜平、曲阳灾区救济问题的批语","alias":"","parts":[{"type":"paragraph","text":"对河北阜平、曲阳灾区"},{"type":"paragraph","text":"救济问题的批语!!"},{"type":"paragraph","text":"（1951年1月22日）周："},{"type":"paragraph","text":"应当批准此项要求。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿二日"},{"type":"paragraph","text":"[1]这个批语，写在河北省人民政府主席杨秀峰1951年1月14日关于阜平、曲阳两县灾情及解决办法给省人民政府转呈中央人民政府政务院等的报告上。报告说：河北阜平、曲阳山区，今年、水、风、虫各灾均重，人民生活极为困难，尤以阜平为甚。历史上山区人民衣着困难，灾后棉衣破烂、棉被缺少情况更严重。许多灾民衣不蔽体或以夹填棉，冰天雪地无法出门生产。阜平全县及曲阳山区均系老区之老区，华北机关曾长驻此地，群众与我血肉相关。中央前拨我省寒衣数量较之募得总数比例很小，可否再增拨棉被、寒衣各十几万套。同时，阜、曲两县山田滩地冲毁沙压，畜牧业远非战前可比，如不从长期扶植生产封山育林着手，则山地困难不易解决，故逐年贷款扶助生产实有必要。以阜、曲两县言，今年贷150万斤米，以本省全省山地生产贷款补助说，有2000万斤米之数，即可做出很多事情。如是三五年后，可以收很大效果，较之年年救济并不多费。"},{"type":"paragraph","text":"[2]周，指周恩来，当时任中央人民政府政务院总理。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":57,"page_end":57},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3edf311a04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
