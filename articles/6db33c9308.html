tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见智利外长库维略斯"},{"type":"paragraph","text":"邓小平副总理十九日上午会见智利外长埃尔南·库维略斯·萨利亚托，同他进行了友好的谈话。"},{"type":"paragraph","text":"朝鲜劳动党召开中央政治委员会扩大会议"},{"type":"paragraph","text":"在金日成主席的主持下，朝鲜劳动党中央委员会政治委员会扩大会议十月十五日在咸兴举行。会议讨论了建立新的水产指导体制，实现水产业的现代化、科学化和把农业、工业提高到新阶段，提前完成新的前景计划等问题。金日成主席就提前完成第二个七年计划，掀起新的建设高潮问题作了重要指示。"},{"type":"paragraph","text":"会议通过了相应的决定。"},{"type":"paragraph","text":"国家科委和中国科学院召开科研机构党的工作座谈会"},{"type":"paragraph","text":"国家科委党组和中国科学院党组最近召开科研机构党的工作座谈会。到会的同志认为，为实现新时期的总任务，出又多又好的科技成果，出又红又专的科技人才，这是摆在每一个科研机构面前的基本任务，也是衡量每一个科研机构党的工作有无成绩和成绩大小的主要标准。科研机构的党的工作，必须围绕着这个基本任务进行，必须为实现这个基本任务服务。科研机构党的组织应当紧密地围绕科研这个中心，认真抓好科研工作中的思想政治工作。科研机构中的党的干部，都应当既懂政治又懂业务。这样，才能实现党对科学技术的领导。"},{"type":"paragraph","text":"国务院批准恢复和新建一批高等院校"},{"type":"paragraph","text":"经国务院批准，最近又恢复和新建了七所高等学校。它们是：北京政法学院、西北政法学院、中央财政金融学院、吉林财贸学院、云南艺术学院、中国戏曲学院、北京舞蹈学院。"},{"type":"paragraph","text":"全国田径达标赛破五项全国纪录"},{"type":"paragraph","text":"从十月五日开始在武汉举行的今年全国田径达标赛，十七日结束。法国田径队应邀参加了这次比赛。比赛结果，法国队获得十七项第一名。中国运动员也取得了良好成绩，有十三人次打破了五项全国纪录。"},{"type":"paragraph","text":"教育部、财政部、国家劳动总局联合通知 规定高校教师兼课和编译教材应给予报酬"},{"type":"paragraph","text":"最近，教育部、财政部、国家劳动总局，根据按劳分配的原则，制订了关于高等学校兼课教师应给予酬金、高等学校教师编译的教材出版后应发给稿酬的暂行规定，并且联合发了通知，要各地试行。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6db33c9308"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
