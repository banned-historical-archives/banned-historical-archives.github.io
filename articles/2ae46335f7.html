ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"为《河南日报》题写报头","alias":"","parts":[{"type":"paragraph","text":"为《河南日报》题写报头川"},{"type":"paragraph","text":"（1949年11月1日）河南日报"},{"type":"paragraph","text":"[1]1949年9月，中国人民政治协商会议第一届全体会议在北京召开。河南省人民政府主席吴芝圃出席会议，大会期间请毛泽东在百忙之中为《河南日报》题写报头。10月下旬，毛泽东题写的《河南日报》报头由中共中央办公厅寄到河南省委。毛泽东共题写了4组“河南日报”字样，经河南日报编委会研究决定并报省委批准，选定了毛泽东圈定的第一组“河南日报”报头，并于1949年11月1日启用。1952年7月1日，在纪念中国共产党成立31周年之际，河南日报编委会决定后报请省委批准，改用毛泽东圈定的第四组“河南日报”报头，一直沿用到现在。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":485,"page_end":485},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ae46335f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
