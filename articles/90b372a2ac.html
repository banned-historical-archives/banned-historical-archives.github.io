" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陕西鄠县人民委员会布告--事由：为取缔反动会道门组织由","authors":[],"dates":[{"year":1959,"month":4,"day":15}],"is_range_date":false,"parts":[{"text":"陕西鄠县人民委员会布告--事由：为取缔反动会道门组织由","type":"title"},{"text":"查“双香门”、“三宝门”、“同善社”、“明心善社”、“济世道”、“三霄道”、“四正香”、“花盛坛”。“黑煞道”、“一心天道龙华圣教会”等反动会道门组织，解放前利用封建迷信，诈骗群众财物，大量发展反动组织，欺骗群众，进行各种危害人民的罪恶活动。解放后仍造谣惑众，诈骗财物，制造混乱，进行反革命活动，严重的破坏了工农业生产和社会治安。为了保障社会主义建设的顺利进行和人民生命财产的安全，特明令取缔一切反动会道门组织，并规定办法如下：","type":"paragraph"},{"text":"一、自布告之日起，上述反动会道门组织，不论其名目如何，均应立即解散，停止一切活动，凡双香门之“堂主”、三宝门之“老师”、济世道之“首令”、三霄道之“总领师”、明心善社之“支社长”、一心天道龙华圣教会之“办事人”、四正香之“堂主”、花盛坛之“上机师”等以上道首，均须在布告之日起15日内向本县公安机关所指定之登记站进行登记退道，彻底坦白，交清组织活动情况和道产，并向政府具结悔过，听候处理。","type":"paragraph"},{"text":"二、所有参加反动会道门组织的道徒，亦必须在布告之日起15日内向公安机关指定地点签名退道，交清组织关系和活动情况后，安心生产，政府定会从宽处理。","type":"paragraph"},{"text":"三、凡保存反动会道门组织的所有财产、文件、书籍、迷信用具、印戳等物资，保管人应一律自动交出，不得隐藏或毁坏。","type":"paragraph"},{"text":"四、政府对待一切反动会道门组织之道首、道徒的政策是，“坦白从宽，抗拒从严”，对能自动登记并坦白罪恶的道首，政府将根据情况从宽处理或免于处分。凡能幡然悔悟，积极帮助政府揭发反动会道门之各种罪恶活动，对取缔工作有功者，可将功折罪，立大功者并可受奖。抗拒登记或破坏取缔工作者，必须依法严办。","type":"paragraph"},{"text":"五、在取缔后，不论道首、道徒，均须停止一切复辟活动。违者，定要以反革命论处，依法从严惩办。","type":"appellation"},{"text":"以上办法，除责令公安局和乡人民委员会立即遵照执行外，并望广大人民群众积极予以协助。","type":"paragraph"},{"text":"此布","type":"appellation"},{"text":" 县长\t张鸿儒","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90b372a2ac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
