<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中央人民政府燃料工业部  在反贪污反浪费反官僚主义运动中从多方面对资产阶级思想展开斗争","authors":[],"dates":[{"year":1952,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中央人民政府燃料工业部"},{"type":"paragraph","text":"在反贪污反浪费反官僚主义运动中从多方面对资产阶级思想展开斗争"},{"type":"paragraph","text":"中央人民政府燃料工业部自本月四日起，各级负责干部在干部大会上做了自我检讨以后，根本转变了在这以前有些领导干部对于反贪污、反浪费、反官僚主义运动不够重视和不敢放手发动群众的情况。现在，群众已经普遍地发动起来，展开了批评与自我批评。从来不大发言的和历来站在运动以外的人，也都抢着发言、提意见，情绪十分热烈紧张。这是中央人民政府燃料工业部成立以来从来没有过的、空前热烈的民主运动。"},{"type":"paragraph","text":"很多人为领导干部的诚恳的检讨所感动。一个工程师听了陈郁部长的检讨以后说：“现在我更体会到新旧社会的不同。”有的人感动得当场流泪。煤矿管理总局地质室的同志们表示：“领导同志都能这样反省，我们保证三天以内把自己的问题交代清楚。”石油管理总局陈大椿听了领导干部的检讨后，夜晚睡不着，三更时候起床向同志们坦白自己拿公款存在银行里，贪污利息四万元。四日以后，自动坦白贪污的十四人，贪污款项共二千一百万元（连同四日以前坦白的共七十七起，贪污款项共一亿三千余万元）。"},{"type":"paragraph","text":"到本月十日止，中央人民政府燃料工业部的反贪污、反浪费、反官僚主义运动的主要锋芒是反对官僚主义。领导干部对于下层实际情况不了解，不研究，高高在上或辛辛苦苦，都受到了严格的批评。群众要求领导干部非常严格。他们对那些检讨得不深刻的领导干部表示不满，要求他们一次又一次地检讨。在运动中揭发的问题的范围很广，连“民主作风”、“干部政策”、“组织机构，任务分工”、“上下级关系”和“不安心工作”等，都被提出来了。"},{"type":"paragraph","text":"群众对于非党的领导干部和工程技术人员的批评也很多，批评了他们的雇佣观点、作客思想、技术上的保守观点、不接受苏联专家建议以及单纯技术观点。群众对于他们在工作中不负责任、敷衍塞责的态度，批评得特别尖锐，说他们是“旧人员自居”，“上推下靠”，“春天做计划，夏天办公文，秋天批准，冬天一刀两断（即总结工作过年）。”这些非党领导干部和技术人员，虽然还有部分人有“过关”思想，但大部分人已经认识到：这个运动对于他们不是反对资产阶级思想侵蚀问题，而是如何肃清自己的资产阶级思想残余和改造自己的问题。"},{"type":"paragraph","text":"目前，中央人民政府燃料工业部在群众觉悟不断提高的基础上，准备在技术人员较多的单位（计划、修建两司），把运动从普遍检讨和检举的高潮，逐渐地引向深入检查计划、修建工作中的雇佣观点以及单纯技术观点和因官僚主义所造成的生产和基本建设中的严重浪费。经理部门则深入检查各局的财务工作和各采购单位的贪污浪费。中央人民政府燃料工业部组织了六个检查组，检查机关的财务、电业成本、器材积压、机关开支、事业费开支等，并准备以检查出来的具体的浪费现象和贪污案件教育群众，使运动更加深入。"},{"type":"paragraph","text":"（中央燃料工业部节约检查委员会办公室）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ec3f426c1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
