"dates":[{"year":1967,"month":11,"day":6}],"is_range_date":false,"parts":[{"text":"陈永贵谈大寨","type":"title"},{"text":"陈永贵","type":"authors"},{"text":"摘要：","type":"paragraph"},{"text":"今年是无产阶级文化大革命的胜利年，是大丰收年，昔阳全县比去年增产百分之四十多。去年党内一小撮走资派统治，全县粮食是八千万斤，不够吃，还吃六百万斤供应粮。今年是特大丰收，到目前为止，实有产量已报上来的是一亿二千万斤，增产百分之四十六多一点。大寨是特大丰收，大寨按人口平均产粮六百多斤，每人平均当年增产粮食一百多斤。今年三百多人口的大寨增产二十二万多斤。这是毛泽东思想的伟大胜利，是无产阶级文化大革命的伟大胜利。","type":"paragraph"}],"comments":[],"origin":"《红旗周刊》（首都红代会北京外国语学院红旗战斗大队，1967年12月4日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈永贵","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b69317f5f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
