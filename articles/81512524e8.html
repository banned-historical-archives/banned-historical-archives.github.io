<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国人民解放军总参和总政举行报告会庆祝阿尔巴尼亚人民军建军二十周年张宗逊上将指出中阿人民及军队深厚战斗友谊经得起任何风浪考验　哈图上校强烈谴责美帝和各国反动派以及现代修正主义者猖狂反华","authors":[],"dates":[{"year":1963,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京9日电】　中国人民解放军总参谋部和总政治部，今天举行报告会，热烈庆祝英雄的阿尔巴尼亚人民军建军二十周年。"},{"type":"paragraph","text":"阿尔巴尼亚驻我国大使马利列出席了报告会。大使馆武官哈图上校在会上作了报告。"},{"type":"paragraph","text":"报告会由中国人民解放军副总参谋长张宗逊上将和总政治部副主任傅钟上将主持。张宗逊上将在讲话中，代表中国人民解放军全体官兵，向兄弟的阿尔巴尼亚人民军全体官兵，表示最热烈的节日祝贺。他指出，阿尔巴尼亚人民军在以恩维尔·霍查同志为首的阿尔巴尼亚劳动党的领导下，二十年来，经历了一条光荣的、战斗的道路。在战后，这支英雄的军队，“一手拿枪、一手拿镐”，以不畏强暴，不怕任何艰险的战斗精神，警惕地守卫在社会主义阵营的西南前哨，坚决反对以美国为首的帝国主义及其走狗的侵略挑衅，坚决反对现代修正主义者的诬蔑威胁和种种阴谋破坏活动，为保卫社会主义阵营的安全，保卫世界和平，作出了重大的贡献。"},{"type":"paragraph","text":"张宗逊上将说，中阿两国人民及其军队，有着深厚的战斗友谊。这种友谊是建立在马克思列宁主义的基础上的，是牢不可破的，是经得起任何风浪考验的。我们将永远同英雄的阿尔巴尼亚人民团结在一起，并肩前进，从胜利走向胜利。"},{"type":"paragraph","text":"哈图上校在热烈的掌声中，应邀向两千多人民解放军陆、海、空军官兵作了报告。他在报告中叙述了阿尔巴尼亚人民军的光荣战斗历史，并且介绍了阿尔巴尼亚人民军现代化建设的成就。他在叙述了阿尔巴尼亚人民军在斗争中所取得的巨大胜利以后指出，无论过去和今后，阿尔巴尼亚人民军永远无限地忠实于阿尔巴尼亚劳动党，忠实于人民和人民政权，忠实于用血汗解放出来和正在建设的祖国。他说，我军今天钢铁般地团结在党和政府的周围。阿尔巴尼亚人民军完全支持党为保卫社会主义阵营和国际共产主义运动的纯洁性所进行的斗争。"},{"type":"paragraph","text":"哈图上校强烈谴责美帝国主义和世界各国反动派以及现代修正主义者猖狂反华的可耻阴谋活动。他指出，世界上这些腐朽没落势力猖狂反华的目的，不外是妄想阻挠中国人民建设自己的幸福生活和损害世界各国人民对中华人民共和国的尊重和支持。但是，真理象太阳一样是掩盖不住的。这些腐朽势力是阻挡不住伟大中国人民前进的。中华人民共和国是各被压迫国家人民的光辉榜样，鼓舞着被压迫人民走上自身解放和进步的道路。"},{"type":"paragraph","text":"哈图上校说，阿尔巴尼亚人民军以有中国人民解放军这样一个忠实而坚定的战友而感到自豪。尽管我们两军战士之间相隔万水千山，但他们感到十分亲近。他们互相鼓励，友谊正在日益加强，并为对方的每一个胜利而欢呼。"},{"type":"paragraph","text":"参加报告会的，有肖向荣中将、潘振武少将、贾若瑜少将、王永浚少将、罗文坊少将、况玉纯少将、王平水空军少将、刘义海军少将、丁本淳少将、王焕如少将、姚国民少将、陈伯禄少将、罗华生少将等。"},{"type":"paragraph","text":"报告会后，人民解放军总政治部文工团演出了中阿两国的歌舞节目。"},{"type":"paragraph","text":"6日，人民解放军北京地区部队某部，为庆祝阿尔巴尼亚人民军建军二十周年也举行了报告会。北京地区部队首长滕海清中将陪同哈图上校出席了报告会。哈图上校应邀在会上作了报告。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\07\\637a030101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e阿尔巴尼亚人民军的战士在一个运河的建筑工地上进行劳动。　(新华社发)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81512524e8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
