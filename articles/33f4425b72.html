script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"《还我河山》作者的声明","authors":["“史本三”徐道衡","华南师范学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"《还我河山》作者的声明","type":"title"},{"text":"华南师范学院“史本三”徐道衡","type":"authors"},{"text":"自从昨天我们贴出了《还我河山》的大字报后，根据反映，有反对我们的意见的，也有支持我们的意见的。史本四同学还邀请我们开辩论会。为了明确这一问题，我们诚恳地接受他们的意见，并与史本四同学联系，决定于6月23日(星期日)下午3时在西27课室进行辩论。对这一问题有兴趣的同学(不管是反对或是同意我们的意见的，或者是对这一问题模糊不清的)，也都欢迎参加。","type":"paragraph"},{"text":"因为我们要开辩论会，所以便不再出版大字报，并且把出版的大字报收回，以免引起不必要的影响。“一群不大懂历史科学的人们”希望同我们进行专题辩论，我们也接受他们的意见，对他们的文章，我们认为不能令人信服的理由，也不作大字报答覆，准备在辩论会中辩论。","type":"paragraph"},{"text":" 来源：华南师范学院学生会 编辑出版《华南师范学院反右派斗争初战记》，1957年9月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33f4425b72"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
