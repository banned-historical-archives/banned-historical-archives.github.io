ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"接受印度驻华大使潘尼迦呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受印度驻华大使潘尼迦呈递国书时的答词"},{"type":"paragraph","text":"（1950年5月20日）大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使呈递的印度共和国总统所授予的国书，并感谢贵大使的祝贺。"},{"type":"paragraph","text":"中印两国，国境毗连，在历史及文化上均有悠久而密切的关系，近世纪来，又都为挣脱自己民族的厄运，进行过长期而勇敢的斗争。存在于贵我两国人民间的了解、同情与关怀是深切的。现在中印两国正式外交关系的建立，不但将使已存在于两国人民间的友谊日益发展与巩固，而且与此而俱来的亚洲两大国家人民的真诚合作，必将大有助于亚洲与世界的持久和平。"},{"type":"paragraph","text":"我热烈欢迎贵大使出任印度共和国驻中华人民共和国首任特命全权大使，并愿在贵大使加强两国合作的工作中予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并祝贵国元首健康。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":415,"page_end":415},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd9e70d01d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
