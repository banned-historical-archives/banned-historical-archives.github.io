["中国人民大学","孙国梅","孟繁森","张炳钧","濮仲文","王铁生","秦荣兴"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——关于“大民主”","type":"title"},{"text":"中国人民大学张炳钧孟繁森濮仲文秦荣兴孙国梅王铁生","type":"authors"},{"text":"“大民主、小民主都是民主，为什么不可以用呢？并且宪法上没有规定来反对它，有什么权利来加上‘反动’两个字呢？如果善良的愿望表示每人都反对这件事情，游行一下，又为什么不可以呢？”（中国人民大学贸易系学生  张炳钧）","type":"paragraph"},{"text":"“我认为不采纳群众意见就要用大民主来解决”。（中国人民大学历史系学生  孟繁森）","type":"paragraph"},{"text":"“首先承认人民有权利采用大民主方式包括对待政府的缺点，真是这样要我们警惕，反对官僚主义，为人民解决问题。人民主方式一般是应用以对付敌人的，但不能绝对的说，而要具体分析，如波兹南事件，就属于人民内部的事情。”（中国人民大学计划系学生  濮仲文）","type":"paragraph"},{"text":"“为什么允许罢工？因有官僚主义，不罢不行，不是谁愿罢，不愿罢的问题。”（中国人民大学总务处办事员  秦荣兴）","type":"paragraph"},{"text":"“匈牙利当时罢工游行是可以起来反对官僚主义的，根据一定时间地点可以采用大民主反对官僚主义。","type":"paragraph"},{"text":"采取示威游行罢工来反对官僚主义对社会主义建设是有利的。”（中国人民大学马列主义教研室助教  孙国梅）","type":"paragraph"},{"text":"歪曲毛主席的讲话，说“闹事才能克服三害。”（中国人民大学工业经济系助教  王铁生的材料）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2aa9559130"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
