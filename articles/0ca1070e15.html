nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"关锋给谭厚兰等同学的信","parts":[{"type":"title","text":"57．关锋给谭厚兰等同学的信"},{"type":"paragraph","text":"(1966年8月4日)谭厚兰等同志们："},{"type":"paragraph","text":"昨天晚上邀你们谈话，给你们提了一些意见，对不对请你们考虑。你们最近一些作法存在些缺点和错误，这不要紧，昨天我说过，不要灰心丧气。我们按照毛主席教导，坚持真理，修正错误。如果有人抓你们的缺点和错误不放，不要怕，要顶着，你们首先起来揭发黑帮分子程今吾，首先起来批评孙有余为首的工作组，这样一个革命的行动，任何人也是抹煞不了的，当然你们要象毛主席教导的那样，虚心向群众学习，我赞你们展开大辩论。以上意见，请你们参考。(电话记录，林杰同志转达)"},{"type":"paragraph","text":"关锋"},{"type":"paragraph","text":"66年8月4日晚"}],"authors":["关锋"],"dates":[{"year":1966,"month":8,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":91,"page_end":91,"alias":""},"tags":[{"name":"关锋","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ca1070e15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
