rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让毛主席的革命路线深入人心","authors":[],"parts":[{"type":"paragraph","text":"在无产阶级革命派大联合大夺权的新形势下，指挥连组成毛泽东思想宣传队，到驻地附近农村同群众一起活学活用毛主席著作，宣传毛主席的革命路线，这种做法很好。"},{"type":"paragraph","text":"当前，我们向人民群众宣传毛泽东思想，就是要紧密结合无产阶级文化大革命的实际，结合两条路线斗争的实际，大力宣传毛主席的革命路线，使广大革命群众更深刻地理解毛主席的革命路线，更自觉地贯彻毛主席的革命路线。这是对无产阶级革命派的有力的支援。"},{"type":"paragraph","text":"向群众宣传毛主席的革命路线，也是对自己的教育。我们要把学习、宣传、贯彻和保卫毛主席的革命路线结合起来，拜广大的无产阶级革命派为师，同他们团结在一起，战斗在一起，胜利在一起。我们要在火热的革命群众运动中，改造自己，锻炼自己，提高自己，永远做一个保卫毛主席的革命路线的忠诚战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3af30f57b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
