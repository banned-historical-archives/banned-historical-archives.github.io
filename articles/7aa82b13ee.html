script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议码头垄断资本的残酷剥削美国西海岸码头工人再次罢工罢工使美国太平洋沿岸的二十四个港口陷于瘫痪","authors":[],"dates":[{"year":1972,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一九七二新华社北京年一月十八日电　华盛顿消息:美国西海岸的一万五千名码头工人冲破重重阻力，于十七日再次掀起罢工斗争，抗议码头垄断资本的残酷剥削，要求增加工资和保证工作权利。"},{"type":"paragraph","text":"罢工工人在各港口设置了纠察线，一些码头工人还张贴传单，号召举行罢工斗争。罢工使美国太平洋沿岸从华盛顿州的西雅图到加利福尼亚州的圣地亚哥的二十四个港口陷于瘫痪，停泊在港口的货船无法装卸，严重地影响了美国的进出口贸易。"},{"type":"paragraph","text":"西海岸码头工人具有顽强的斗争精神。去年七月一日起，他们为了抗议码头垄断资本家顽固拒绝工人的合理要求，英勇坚持了长达一百天的罢工斗争，沉重地打击了美国垄断资本。"},{"type":"paragraph","text":"美国统治集团对码头工人的再次罢工惊慌失措，一再扬言要进行镇压。但是，码头工人不怕威胁，正在继续坚持斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7aa82b13ee"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
