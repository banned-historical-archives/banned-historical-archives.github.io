dates":[{"year":1946,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"集宁群众运动教训"},{"type":"paragraph","text":"清算各种封建剥削全体农民才能翻身"},{"type":"paragraph","text":"【新华社集宁六日电】集宁四区群众于七月清算地主非法剥削中，因单纯以租佃形式确定清算对象，以致侵犯了部分中富农利益。在被清算的四十八家中，剥削特重的大地主只有四户，而中富农即占十八户，该村另有三家应该清算的大地主则未清算，清算后对各户的赔偿，又完全违反照顾雇贫农的原则，如受剥削最重的三户雇农平均每户只得到赔偿土地十亩零三分，七十二户贫农平均每户得到赔偿地二十三亩，六十九户中农则平均每户得地四十七亩，五户富裕中农每户平均得地六十三亩，五户富农平均每户得地四十三亩，全村无地和少地的农民绝大部分未获得赔偿的土地。据初步检查形成上述偏向原因，除最主要的为单纯地从租佃关系上进行清算外。第一、干部没有掌握政策，没有深入教育组织群众，群众清算形成自流。第二、缺乏细密的调查研究，步骤和计划还未明确即行动起来。第三、清算方法上未着重查黑地及清算大地主移转于贫雇农身上的负担，而过分强调了减“分收”地租和退出多收租。事实上在绥蒙区种“分收”地的是一部分中农（贫雇农多无牛不能种），所以只是中农得到赔偿，贫雇农得不到土地。现领导上纠正这一偏向，被清算的中农土地立即退还原主，伤害富农利益重大的亦作适当的补充。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72dafc8d5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
