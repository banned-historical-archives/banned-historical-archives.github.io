ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"对陕北公学第十一至第二十队学员的讲话","alias":"","parts":[{"type":"paragraph","text":"对陕北公学第十一至第二十队学员"},{"type":"paragraph","text":"的讲话！"},{"type":"paragraph","text":"（1938年3月29日）"},{"type":"paragraph","text":"有了人民、国民党和共产党的进步这三个条件，中国不会亡国。有人说地方太小了，好的地方已被敌人占去，即使抵抗也不行。然而我是顽固党的最后胜利派，仍旧主张我们会胜利。王羲之说“大块假我以文章”，岂只大地方可以做文章吗？小块也行。有人说中国亡了，我说不会亡，城市亡了，乡村未亡；大路亡了，小路未亡；白天亡了，夜里未亡。抗战不仅需要大大发展共产党，而且需要非党布尔什维克，例如鲁迅就是非党布尔什维克。"},{"type":"paragraph","text":"[1]这是毛泽东第五次到陕北公学，对第十一至第二十队学员讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":125,"page_end":125},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd52637fd9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
