 苏修攻击文化大革命是害怕苏联人民起来造他们的反","authors":[],"dates":[{"year":1967,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿拉伯朋友指出我文化大革命是历史上最深刻的革命"},{"type":"paragraph","text":"文化大革命将加速世界走向共产主义"},{"type":"paragraph","text":"苏修攻击文化大革命是害怕苏联人民起来造他们的反"},{"type":"paragraph","text":"据新华社讯　阿拉伯革命人民热情赞扬中国无产阶级文化大革命是马克思列宁主义关于无产阶级专政理论的新发展。"},{"type":"paragraph","text":"叙利亚一位进步人士著文说：“中国无产阶级文化大革命是历史上的一场最深刻的阶级斗争。它动摇着旧社会的基础，触及着人们的灵魂深处，开辟了社会主义运动史的新纪元。它是无产阶级革命理论光辉的新开端，是马克思列宁主义关于无产阶级专政理论的新发展，是世界革命实现其理想的旗帜。”"},{"type":"paragraph","text":"伊拉克一位青年说：中国的文化大革命“将加速世界走向共产主义的进程。因此，它的胜利不仅属于中国人民，而且属于世界工农和其他进步力量。”"},{"type":"paragraph","text":"叙利亚一位进步人士写文章驳斥帝国主义、现代修正主义和各国反动派对中国文化大革命的诬蔑。他在文章中说，中国文化大革命“是为了避免象在苏联所发生的那样的修正主义的、堕落的、资产阶级的一代的出现。正因为如此，美英帝国主义者和叛徒赫鲁晓夫修正主义者发疯似地对文化大革命进行造谣诬蔑和发动歇斯底里的攻击。”另一位叙利亚进步人士在文章中说，苏联修正主义领导集团攻击中国无产阶级文化大革命，是因为“害怕苏联人民起来反对他们，造修正主义的反，制止资本主义复辟”。"},{"type":"paragraph","text":"一位在阿联学习的巴勒斯坦学生说：“毛主席教导我们要同敌人进行斗争，而苏联修正主义者却要我们投降。”他谈到，有一次，有个苏修分子在听说他毕业后想当一名为祖国的解放而斗争的战士时，竟然说什么：“你真傻。以色列是得到美国人支持的，如果你去同以色列打仗，你就会白白送死。”我当时气愤地回答说：“我宁肯站着死，也不愿跪着生。即使我在武装斗争中死去，但是我们的祖国一定会得到解放，我们的民族尊严一定会得到维护。”这位学生说，从那以后，他更加清楚地认清了苏修的叛徒嘴脸。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a47c6f5284"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
