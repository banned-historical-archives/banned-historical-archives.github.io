ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"请求苏联帮助越南解决汽车和汽油问题","alias":"","parts":[{"type":"paragraph","text":"请求苏联帮助越南解决汽车和汽油问题！"},{"type":"paragraph","text":"（1950年12月8日）菲利波夫同志："},{"type":"paragraph","text":"在胡志明?同志领导下的越南人民解放军今年七月在中国帮助之下，第一步装备了两个师，并于今年九月作战取得了第一次的胜利。第二步，从现在起，正在装备第三个师及两个炮兵团，连前总共有四万人，可以集中作战。将来再装备第四个师及第五个师。中国派了一百个顾问到越南，帮助他们工作。他们必须攻克北部主要据点河内、海防等处，即完全统一越南北部，才能向中部及南部作战。现在胡志明政府统治的主要地区即越南北部解放区，土地很宽，人口则只有约一百万，而脱离生产的军政党人员则共有十七万人。因此，他们在经济上无法自己维持，在很大的程度上必须依靠中国的帮助。军械、弹药、粮食、被服及其他物资经常要从中国运去，但这种运输有八百公里只能使用汽车和人畜力，而汽车和汽油是我们自前最缺少的，所以有极大的困难。为克服这种困难，如果可能的话，我请求你帮助越南一千辆六轮嘎司六三汽"},{"type":"paragraph","text":"[1]这是毛泽东给斯大林的电报。[2]菲利波夫，即斯大林。[3]胡志明，当时任越南民主共和国主席。毛泽东全集第二十九卷车及工程车六辆，吊车四辆，和一年用的汽油五万四千大桶（七千九百四十一吨）及其他机器油料并备份汽车零件。详细货单俟得你复电同意后再经沙哈罗夫同志转上。其中五百零五辆汽车请于一九五一年一月至三月运到。另五百零五辆则可于一九五一年六月至七月运到。"},{"type":"paragraph","text":"是否可行？望复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五〇年十二月八日[1]沙哈罗夫，当时任苏联驻中国总军事顾问。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":434,"page_end":435},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e31dcc86f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
