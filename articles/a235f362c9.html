dates":[{"year":1967,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:以中国赫鲁晓夫为首的党内最大的一小撮走资派，为了他们复辟资本主义的政治需要，长期以来，对工人阶级的工会组织灌输了一整套反动谬论。胡说什么“只要是依靠工资收入为主要生活来源的，都可以加入工会”，“生产运动就是工人运动”，“以生活促生产”等等，并且大肆鼓吹“文化福利论”。力图把工人运动引向修正主义的轨道，使广大工人群众远离毛泽东思想，不突出政治，不关心阶级斗争，局限在生产技术和个人物质生活的小圈子里。这是中国赫鲁晓夫及其同伙一个极其险恶的反革命复辟的阴谋。"},{"type":"paragraph","text":"我们伟大领袖毛主席教导我们:“应当向工会同志和工人群众进行教育，使他们懂得，决不可只看到眼前的片面的福利而忘记了工人阶级的远大利益。”当前正在开展的史无前例的无产阶级文化大革命，是要从根本上铲除资本主义复辟的土壤，挖掉修正主义的根子，这就是我们工人阶级最根本的远大利益。我们一定要把炮口对准以中国赫鲁晓夫为首的资产阶级司令部。忘记了这一点，就是忘记了阶级斗争，就有迷失方向的危险。我们工人阶级要坚决遵循毛主席的教导，以“斗私，批修”为纲，牢牢掌握斗争大方向。在当前，必须充分放手发动群众，积极开展在建党路线问题上的大学习、大批判，并和批判中国赫鲁晓夫的修正主义工运路线结合起来，打一场气势磅礴的人民战争。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a235f362c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
