script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"突出政治，按毛泽东思想办企业  淮北盐场提前完成全年产盐计划","authors":[],"dates":[{"year":1966,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"突出政治，按毛泽东思想办企业"},{"type":"paragraph","text":"淮北盐场提前完成全年产盐计划"},{"type":"paragraph","text":"据新华社南京电　我国著名的四大盐场之一——江苏省淮北盐场广大职工，高举毛泽东思想伟大红旗，战胜重重困难，已在八月底完成了全年的产盐计划。盐的质量也有显著提高。"},{"type":"paragraph","text":"今年以来，淮北盐场开展了群众性的突出政治大讨论。通过大讨论，广大职工破忽视政治和单纯生产技术观点，更加坚定了按照毛泽东思想办好企业的信心。今年春晒初期，淮北盐场天时三阴两晴，这给生产带来了不利因素。广大干部群众带着这个问题，学习了毛主席关于在战略上藐视敌人、在战术上重视敌人，关于集中优势兵力打歼灭战等教导，坚定了敢于斗争、敢于胜利的信心和决心。他们采取“两手抓”的办法，好天防阴天，阴天做好晴天生产准备，充分利用有效天时，处处争得主动，生产不断发展。"},{"type":"paragraph","text":"史无前例的无产阶级文化大革命极大地鼓舞了盐场广大职工，他们以毛泽东思想为武器，口诛笔伐，积极揭发、批判反党反社会主义的资产阶级右派分子，横扫一切牛鬼蛇神。同时，以更加昂扬的斗志，搞好生产。七、八月份的原盐产量，都是成倍地超过计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df4d4ecc5f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
