判派性，促进了革命大联合和革命三结合","authors":[],"dates":[{"year":1968,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市长宁、徐汇、静安、普陀等七个区举办了有中学红卫兵小将参加的毛泽东思想学习班，取得较显著的成绩。"},{"type":"paragraph","text":"最近一个月来，参加学习班的红卫兵小将通过学习毛主席最新指示，彻底批判了资产阶级、小资产阶级派性，增强了无产阶级党性，巩固和发展了革命的大联合，目前已有十三所中学成立了革命委员会。"},{"type":"paragraph","text":"各区学习班的基本做法是:"},{"type":"paragraph","text":"一、大抓阶级教育，坚决打倒派性。学习班针对“唯我独左”、“唯我独革”的思想，从落实毛主席最新指示这个根本着手，狠抓阶级教育，提高革命学生的阶级觉悟。邀请西藏翻身农奴和老工人忆苦思甜，组织参观阶级教育展览会，并在学习班中开展了群众性的忆苦教育活动，激发学员对伟大领袖毛主席、对新社会无限热爱；对旧社会、对中国赫鲁晓夫无比仇恨，认清了谁是真正的敌人，并反复学习、讨论了毛主席“革命的红卫兵和革命的学生组织要实现革命的大联合”的最新指示。原来一些对立情绪较大的红卫兵和革命学生组织通过学习认识到:“我们之间没有什么根本的利害冲突，过去闹分裂，打内战，搞武斗，有的是受了资产阶级、小资产阶级派性的影响，有的是受了坏人的利用。今天毛主席号召我们联合起来，我们再也没有理由不联合!”有的两派各自认真检查了自己的错误缺点，表示一定要按照毛主席的最新指示联合起来，共同对敌。"},{"type":"paragraph","text":"二、以毛主席的好党员为标准，斗私批修，增强党性。学习班在开展阶级教育的基础上，着重组织学员学习了毛主席“党组织应是无产阶级先进分子所组成，应能领导无产阶级和革命群众对于阶级敌人进行战斗的朝气蓬勃的先锋队组织”的最新指示，同时学习英雄李文忠同志，使大家在头脑中有个无限忠于毛主席的好党员的英雄形象，并以毛主席的好党员为标准，对照检查自己。通过斗私批修，大家认识到派性一旦和“权”字攀上了亲家，手里掌握了一个小摊头，必然会从思想上的宗派主义发展到组织上的“独立王国”，以致给敌人钻了空子。只有斗掉“私”字，才能打倒派性，树立党性，才能紧跟毛主席的伟大战略部署。许多革命小将斗掉了“私”字，打倒了派性，思想境界高了，眼光看得远了。由于克服了派性，增强了党性，不少学校在发展、巩固革命大联合的基础上实现了革命的三结合，在讨论革命委员会的委员名单时，大家不计席位，不讲名次。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9969495c52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
