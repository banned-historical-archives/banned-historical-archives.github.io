script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"散布资产阶级思想毒素的“一题数解法”","authors":[],"dates":[{"year":1955,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江苏金山县张埝中心小学顾宏明和四川南部完全小学刘实教师来信:"},{"type":"paragraph","text":"编辑同志:赵余勋所著算术问题“一题数解法”一书(商务印书馆出版)，不但在性质上、内容上和我们算术教学的目的和要求是不相符合的。而且它严重地在散布着资产阶级思想的毒素。有些举例和我们目前国家的政策完全背道而驰。"},{"type":"paragraph","text":"在这本书中，还散布着资产阶级唯利是图、投机取巧和暴利思想。譬如在第110页的一例:甲乙二人共有资本780元，甲得利50%……。又如第175页，99题:某人以同数的款子借给甲乙二人，甲年利率10%，乙年利率12%……共计利息多少?书中有很多题目都是讲些买卖、获利……等等。在这里我们闻到的是一股浓厚的资本主义的臭味。"},{"type":"paragraph","text":"同时，在第161页又有这样的例题:某米商买米，买进每元一斗二升，卖出每元一斗一升，共计获利370元，问这个商人买米多少?这样举例，和目前国家粮食统购统销的政策是完全相抵触的。"},{"type":"paragraph","text":"这本书的作者是以彻头彻尾的资产阶级思想和观点出发来取材的。这书的本身和解放前那种有毒的算术升学指导之类是一模一样。它的内容有和差问题、倍数问题、经度问题、钟面问题、寒暑表问题、单比例、复比例、连锁比例、按分比例、混合比例、方阵问题等，总之有70%以上不适合小学学生学习的。尤其使我们感到奇怪的是，在这书中竟会出现人民币、国币(即伪币，24页例5)和铜元三种不同的货币。这更是极端荒谬的。"},{"type":"paragraph","text":"我们认为作者和商务印书馆对待这本书的态度是非常不严肃的。希望他们以对人民负责的态度，重新处理这本书。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"179230cc2d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
