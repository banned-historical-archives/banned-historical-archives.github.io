<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京卫戍区召开工矿企业支左部队政治工作会议　坚决贯彻执行毛主席的最新指示　积极促进革命派实现革命大联合","authors":[],"dates":[{"year":1967,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京卫戍区召开工矿企业支左部队政治工作会议"},{"type":"paragraph","text":"坚决贯彻执行毛主席的最新指示"},{"type":"paragraph","text":"积极促进革命派实现革命大联合"},{"type":"paragraph","text":"据新华社二十一日讯　中国人民解放军北京卫戍区召开的工矿企业支左部队政治工作会议，二十日在首都革命大联合的凯歌声中胜利闭幕。到会人员满怀喜悦的心情，坚定地表示：坚决贯彻执行毛主席的最新指示，积极帮助无产阶级革命派和广大革命群众实现革命的大联合，做首都革命大联合的坚强促进派。"},{"type":"paragraph","text":"这次会议总结和交流了帮助工矿企业开展革命大批判，实现革命大联合和革命“三结合”的经验。会议期间，到会人员学习了伟大领袖毛主席的最新指示：在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。毛主席的最新指示，给大家指明了前进的方向。大家紧跟毛主席的伟大战略部署，以“只争朝夕”的革命精神，边学习，边宣传，边行动，纷纷向所在单位的支左人员传达布置，有的把革命群众组织的负责人请到会场来，共同学习，共同研究如何响应毛主席的伟大号召，迅速实现革命大联合。三天之内，支左人员到达的工矿企业有百分之八十以上实现了革命的大联合。"},{"type":"paragraph","text":"会议期间，国务院副总理、北京市革命委员会主任委员谢富治，北京卫戍区司令员傅崇碧等接见了到会全体同志。谢富治同志作了重要指示，他要求大家一定要高举毛泽东思想伟大红旗，坚决贯彻执行毛主席的革命路线，紧跟毛主席的伟大战略部署，牢牢掌握斗争大方向，加紧促进首都工人阶级实现革命大联合，把北京市工矿企业的无产阶级文化大革命推向一个新的阶段。"},{"type":"paragraph","text":"到会的同志认为，执行伟大领袖毛主席关于人民解放军应该支持左派广大群众的指示，最根本最首要的，就是用毛泽东思想武装左派广大群众。当前最重要的任务，就是要大力宣传毛主席的最新指示，和广大革命工人在一起，活学活用毛主席最新指示，增强无产阶级党性，克服小资产阶级派性，牢固地树立毛泽东思想的绝对权威，坚决同各种破坏革命大联合的错误倾向作斗争，提高革命警惕性，严防阶级敌人的挑拨离间和一切破坏活动。"},{"type":"paragraph","text":"会上，指战员们还研究了实现革命大联合以后支左工作的任务。他们指出，必须看到，实现革命大联合只是万里长征走完了第一步。工人阶级联合起来以后，就要全力以赴，深入地开展革命的大批判，把以中国赫鲁晓夫为首的党内最大的一小撮走资本主义道路当权派，从政治上、思想上、理论上彻底批倒批臭，搞好本单位的斗批改。在革命的大批判中，不断发展和巩固革命的大联合。通过革命的大批判，发动广大工人阶级对资产阶级和一切剥削阶级的思想进行一次大扫荡，从政治上、思想上筑起一道反修防修的铜墙铁壁。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a3303e85d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
