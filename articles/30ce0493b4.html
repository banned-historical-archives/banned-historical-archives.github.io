art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想接过来传下去","authors":["学员李步焰战士李德义张立民"],"parts":[{"type":"paragraph","text":"最近毛主席指示我们：人民解放军应该是一个大学校。现在党中央决定大量出版毛主席著作，这将给我们这个大学校送来大量最最好的教材，使全军这个毛泽东思想大学校办得更好，使全国这个毛泽东思想大学校办得更好。这是党中央对全国人民政治上的最大关怀，尤其是对我们青年一代的最大关怀；同时对我们每一个革命战士提出了更高的要求和希望，希望我们每个人都成为无产阶级革命事业的红色接班人。我们决不辜负党和毛主席的希望，一定按照林彪同志的指示，坚决“读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士”。象刘英俊那样努力学习最高指示，忠实执行最高指示，热情宣传最高指示，勇敢捍卫最高指示。在当前这场触及人们灵魂的无产阶级文化大革命中锻炼自己，坚决把毛泽东思想接过来，传下去！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30ce0493b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
