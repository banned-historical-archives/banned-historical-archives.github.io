script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"金日成主席金一总理致电毛主席朱委员长周总理  最热烈祝贺我国四届人大胜利召开","authors":[],"dates":[{"year":1975,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金日成主席金一总理致电毛主席朱委员长周总理"},{"type":"paragraph","text":"最热烈祝贺我国四届人大胜利召开"},{"type":"paragraph","text":"新华社一九七五年一月十九日讯　朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成同志和政务院总理金一同志，一月十九日打电报给毛泽东主席、朱德委员长和周恩来总理，最热烈地祝贺我国第四届全国人民代表大会第一次会议胜利召开、朱德同志当选为人大常务委员会委员长和周恩来同志被任命为国务院总理。贺电全文如下：北京中国共产党中央委员会主席　毛泽东同志，中华人民共和国全国人民朱　德同志，代表大会常务委员会委员长中华人民共和国周恩来同志：国务院总理"},{"type":"paragraph","text":"在中华人民共和国第四届全国人民代表大会第一次会议胜利闭幕、朱德同志在这次会议上当选为中华人民共和国全国人民代表大会常务委员会委员长、周恩来同志被任命为中华人民共和国国务院总理的时候，我们谨代表朝鲜劳动党中央委员会、朝鲜民主主义人民共和国中央人民委员会、政务院和全体朝鲜人民，并以我们个人的名义，向你们，并通过你们向中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会、国务院和兄弟的中国人民，表示最热烈的祝贺。"},{"type":"paragraph","text":"中华人民共和国第四届全国人民代表大会第一次会议，显示了由中国人民的伟大领袖毛泽东同志亲自发动和领导的无产阶级文化大革命和批林批孔运动取得的光辉胜利，显示了全党、全军和全国人民的坚强团结，在中国人民的政治生活中，是一个具有重要意义的历史事件。"},{"type":"paragraph","text":"目前，兄弟的中国人民在第四届全国人民代表大会第一次会议成就的鼓舞下，正在更加意气风发地投入社会主义革命和社会主义建设。"},{"type":"paragraph","text":"朝鲜人民一向把中国人民在革命斗争和建设事业中取得的巨大成就看作是自己的成就一样感到由衷的高兴。"},{"type":"paragraph","text":"我们相信，朝中两党、两国政府和两国人民建立在马克思列宁主义和无产阶级国际主义基础上的战斗的友谊团结和兄弟般的合作关系，今后在反对帝国主义、争取社会主义和共产主义事业胜利的共同斗争中，必将得到进一步加强和发展，并借此机会，衷心祝愿你们和兄弟的中国人民在建设繁荣昌盛的中华人民共和国的斗争中，取得新的成就。"},{"type":"paragraph","text":"朝鲜劳动党中央委员会总书记"},{"type":"paragraph","text":"金日成"},{"type":"paragraph","text":"朝鲜民主主义人民共和国主席"},{"type":"paragraph","text":"朝鲜民主主义人民共和国"},{"type":"paragraph","text":"金　一"},{"type":"paragraph","text":"政务院总理"},{"type":"paragraph","text":"一九七五年一月十九日于平壤"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50c6191559"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
