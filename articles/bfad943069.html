thubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"中共中央对卫生部党组关于组织西医离职学习中医总结报告的批示","alias":"","parts":[{"type":"paragraph","text":"中共中央对卫生部党粗关于粗西医离职"},{"type":"paragraph","text":"学习中医班总结报告的批示"},{"type":"paragraph","text":"（一九五八年十一月十八日）"},{"type":"paragraph","text":"中国医药学是我国人民几千年来同疾病作斗争的经验总结。它包含着中国人民同疾病作斗争的丰富经验和理论知识，它是一个伟大的宝库，必须继续努力发掘，并加以提高。"},{"type":"paragraph","text":"记者对一切事物应保持冷静的头脑"},{"type":"paragraph","text":"（→九五八年十一月二十三日×××傅达）作报纸工作的，作记者的，对虚和实的问题，要有正确的看法，正确的态度。"},{"type":"paragraph","text":"矛盾有正面，有侧面。看问题一定要看到矛盾的各个方面。群众运动有主流，有支流，到下面去看，对运动的成绩和缺点要有证的观点，不要把任何一件事情绝对化。好事情也不要全信，坏事情也不要只看到它的消极一面。比方瞒产：我对隐瞒产量是寄予同情的。当然不说实话是不好的。但为什么瞒产？有很多原因，最主要的原因是想多吃一点，好多年吃不饱，不够吃，想多吃一点，值得同情。瞒产除了不老实这一点以外，没有什么不好。隐了产量，粮食依然还在。产的思想要批判，但对发展生产没有大不了的坏处。"},{"type":"paragraph","text":"虚报不好，比瞒产有危害性。报多了，拿不出来，如果根据多报的数字作生产计划，有危险性，作供应计划，更危险。为什么虚报？干部作风固然有关系，但也因为有人喜欢虚报。如果虚报一万斤，你说这不是事实，他就不报了，因为他说他报的不实；如果你说他报的还不够，他就更会虚报。"},{"type":"paragraph","text":"紧张好不好？没有紧张就没有跃进，跃进必然紧张，紧张形势有好处。"},{"type":"paragraph","text":"我写《湖南农民运动考察报告》的时候，当时湖南的形势是：农会的威信很高，农会说一句，地主富农非照办不可。说坏话的人站不住脚。这种空气，说明革命高潮。现在农村有一种形势，人人说干劲，个个说跃进，无人敢说坏话。这是好的，不能说不好。另一方面也应当看到，提意见的人少了，这也不好。有些任务分明完不成，有些作法显然不妥当，也不敢提意见，这就不好了。大家鼓足干劲，苦战几昼夜，要的。但有许多人累得病了；甚至死了，就不好了。所以，对紧张这件事情，要两面看，适当加以调整。，记者到下面去，不能人家说什么，你就反映什么，要有冷静的头脑，要作比较。"},{"type":"paragraph","text":"强迫命令，不好。为什么要有强迫命合？一定的强迫命合是需要的。如果什么事都命合，就不好了。有些事情也并非强迫命令，例如党委的决议，一定要办。总要有集中。集中的过程要有民主。要提倡民主作风，反对强迫命今。在一定的范围之内“强追命合”，不反对。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":176,"page_end":176},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfad943069"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
