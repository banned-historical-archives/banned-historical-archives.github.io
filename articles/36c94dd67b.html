art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"西藏军区开始学习遵照毛主席的指示；正确对待藏族内部和藏汉民族的问题；做好西藏地方工作","authors":[],"parts":[{"type":"paragraph","text":"本报讯 26日，西藏军区政治部洪流副主任向团职以上军官传达了毛主席关于正确处理人民内部矛盾问题的讲话。传达前后，军官们以极关切的心情阅读了人民日报的有关社论。许多同志说，现在提出这个问题是意义重大十分适时。过去在有些问题上，由于敌我界限不明，把内部矛盾当成敌我矛盾处理，造成了不良后果。很多同志都非常注意今后应该怎样遵照毛主席讲话的精神，去对待藏族内部的问题，解决藏汉民族的隔阂，处理官兵关系，军队与政府的关系，整编中个人和组织的关系以及改造落后分子等问题。正在军区参加党代表大会的代表们听过传达以后，表示回到部队后要好好学习，根据毛主席讲话的精神去做好西藏地方的工作。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36c94dd67b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
