script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"旧社会苦井万丈深——资产阶级罪恶录（图片）","authors":[],"dates":[{"year":1965,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"旧社会苦井万丈深"},{"type":"paragraph","text":"——资产阶级罪恶录"},{"type":"paragraph","text":"在社会主义时期，思想文化战线上最主要的任务，是彻底反对资本主义，兴无产阶级思想，灭资产阶级思想。"},{"type":"paragraph","text":"为了贯彻执行兴无灭资的伟大任务，除了要对宣扬资产阶级思想的作品进行严肃的批判以外，还需要以无产阶级的立场和观点，努力创作一些暴露资本主义和资产阶级种种罪恶的文艺作品，使广大人民群众，尤其是完全没有经历过旧社会的青年人，认识到资产阶级的丑恶实质，提高社会主义的觉悟。"},{"type":"paragraph","text":"四川的美术家们根据这种要求，最近在阶级教育展览会上，吸取了一些揭露解放前中国资产阶级罪恶行为的素材，又访问了旧社会苦大仇深的老工人，创作了一批揭露资本家对工人的种种剥削和压榨的作品。这里选载的一组组画，是对旧社会工人苦难生活的真实写照，也是对资本家丑恶面目的有力揭露。"},{"type":"paragraph","text":"一场骗局（木刻组画）　　李少言　李焕民"},{"type":"paragraph","text":"一、一批钢板到岸，怎样运进工厂？"},{"type":"paragraph","text":"二、招工当场测验，看谁体力最好。"},{"type":"paragraph","text":"三、一趟两趟三趟，忍饥负重摔倒。"},{"type":"paragraph","text":"四、老板得意忘形，脸上露出奸笑。"},{"type":"paragraph","text":"五、钢料全运到厂，一场考试完了。"},{"type":"paragraph","text":"六、失业工人受骗，心中怒火燃烧。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abfcddf885"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
