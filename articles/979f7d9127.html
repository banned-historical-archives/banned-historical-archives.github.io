script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级国际法体系是否存在，上海法学界展开热烈争论","authors":[],"dates":[{"year":1958,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海研究国际法的专家学者22日举行座谈，就国际法体系问题展开争论。座谈会是由上海法学会、华东政法学院和“法学”编辑部联合召开的。"},{"type":"paragraph","text":"争论集中在资产阶级国际法的体系是否还存在的问题上。丘日庆、周子亚、刘家骥、杨殿陛等认为:以民族主义为基础的资产阶级国际法的体系，在世界上出现了资本主义与社会主义两种不同制度的国家后，就已经消亡了。丘日庆认为，一方面资本主义国家间的侵略性协定是违反共同国际法的，另一方面如法国飞机轰炸突尼斯问题等，他们虽都是资本主义国家，但他们之间的这些纠纷却不是依照资产阶级国际法，而都是依照作为共同国际法的联合国宪章来解决的，由此可以说明资产阶级国际法体系已不存在；如果承认尚存在资产阶级国际法的体系，在理论上就有可能使资产阶级国家借口遵循资产阶级国际法而为所欲为。周子亚也认为，如承认有资本主义国际法，就不能说资本主义国家的侵略行为是破坏国际法的了，这对对敌斗争是不利的。刘家骥说，认为存在资产阶级国际法的论点根据之一是由于世界上尚存在不少资本主义国家，那么，是否能够因为现在世界上也存在封建主义国家，而说现在也存在封建阶级的国际法。"},{"type":"paragraph","text":"何海晏、江海潮、胡文治等反对上述论点。他们认为由于资本主义国家间的侵略性的协定如北大西洋公约、巴格达条约等的存在以及美国帝国主义建立了广泛的军事基地等事实，说明资本主义国际法是客观存在的，不是任何人假想出来的。何海晏说，承认资产阶级国际法的存在，是承认客观事实；承认存在不等于承认它合法；在理论上并不存在任何危险，适足以提高我们的斗争性。如果明明敌人存在，而我们却视若无睹，那才是真正的危险。而突尼斯是在进行民族独立运动的国家，他们与帝国主义国家间的关系适用共同国际法并不能说明资产阶级国际法已不存在，只能说明共同国际法正在日益代替资产阶级国际法而起作用而已。至于资本主义国家间订立的协定虽宣称是遵照联合国宪章，实质上则是违反联合国宪章的，如果我们也说它是根据共同国际法，那就犯了只从形式而不是从本质分析问题的错误。"},{"type":"paragraph","text":"(辉)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"979f7d9127"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
