],"dates":[{"year":1971,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴拿马政府外交部向美国发出照会"},{"type":"paragraph","text":"抗议美国在运河区进行剥削"},{"type":"paragraph","text":"新华社十七日讯　巴拿马城消息：巴拿马政府外交部十六日公布了向美国政府发出的一项照会，抗议美国在巴拿马运河区通过饮食业进行剥削。"},{"type":"paragraph","text":"这一抗议照会是在巴拿马外交部长胡安·安东尼奥·塔克一周前接见巴拿马酒店业主协会、烹调工人工会和学生联合会的代表后发出的。这些组织控告美国在它霸占的巴拿马运河区开设酒吧间，利用不纳税的特权，低价卖酒，使许多巴拿马饮食业受到影响，不得不关门停业。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75130756b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
