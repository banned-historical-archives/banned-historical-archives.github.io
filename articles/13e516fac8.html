" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央纪律检查委员会关于党员自杀开除党籍问题对广东省委纪律检查委员会的答复","authors":[],"dates":[{"year":1979,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"中央纪律检查委员会关于党员自杀开除党籍问题对广东省委纪律检查委员会的答复","type":"title"},{"text":"广东省委纪委：","type":"appellation"},{"text":"五月十四日的报告[粤纪(79)1号)收悉。","type":"paragraph"},{"text":"(一)同意你们对党员自杀情况的分析。自杀的原因复杂；","type":"paragraph"},{"text":"处理时应根据实际情况作具体分析，区别对待，不应笼统地一概定为叛党行为，开除党籍。","type":"paragraph"},{"text":"(二)对文化大革命前，有些党员由于种种原因自杀而被开除党籍者，现在家属、亲友提出申诉，或党组织认为存在问题时，应当实事求是地予以复议。","type":"paragraph"},{"text":"一九五八年中央监委编印的《党的监察工作问题解答》中，对党员自杀问题所规定的处理办法不能包括所有的情况，应从实际出发进行处理。","type":"paragraph"},{"text":" 中央纪律检查委员会","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13e516fac8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
