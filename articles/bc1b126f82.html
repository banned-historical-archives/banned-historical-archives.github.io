" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海私营棉纺业近况——据棉纺业公会五月四日统计","authors":[],"dates":[{"year":1950,"month":5,"day":16}],"is_range_date":false,"parts":[{"text":"上海私营棉纺业近况——据棉纺业公会五月四日统计","type":"title"},{"text":"目前停工者共有新生、崇信、勤丰、鸿章、信和、大安、通益、三明、纬昌、恒昌、中新等十一家，共有纱锭一七○、六二四枚，约占可能开工锭数百分之十二·五(内恒昌纱厂最近可能复工，该厂职工派代表三人去香港找到薛姓老板，薛愿拨款四百美金交职工“保本生产”自力维持。该厂仅有一○四○纱锭，该厂如果复工，应从上列统计中除去)。","type":"paragraph"},{"text":"困难严重者，共有国信、德丰、大丰、荥丰一、二厂、中纺一、二厂、新裕一、二厂、申新六、七、九、二、五厂、启新、合丰等十六厂，计有纱锭五七三、七一六枚，占可能开工锭数的百分之四十一·五(以上十六厂中，申新除七厂决定暂停外，已在改组机构，并将由政府贷款六十五亿，可维持下去，其他各厂也将有一部分能帮助其勉强开工，故百分比将减少)。","type":"paragraph"},{"text":"情况略好，可以勉强维持者，有统益、永安一、二、三、四、五厂，新中、广勤、华阳、安达、兆丰、公安、申新一厂、大同、大中一、二厂，昌兴、鼎鑫、恒大、中华第一厂、保丰、仁德、和新、安乐、恒丰等二十四厂，计有纱锭六一三、五四八枚，占可能开工锭数的百分之四四·三。","type":"paragraph"},{"text":"以上共五十一个厂，尚有鸿丰厂，系职工组织生产管理委员会自己维持，该厂有纱锭二四、○○○枚，占可能开工锭数的百分之一·七。(上海分社五月十六日)","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年5月19日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc1b126f82"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
