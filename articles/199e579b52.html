" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2230","name":"建设部关于善始善终做好城镇私房遗留问题处理工作的通知","author":"建设部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"建设部关于善始善终做好城镇私房遗留问题处理工作的通知","dates":[{"year":1989,"month":9,"day":19}],"is_range_date":false,"authors":["建设部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"上海市房屋土地管理局上海市房地产业协会，上海房地产管理文件汇编（1949-1997）下卷，1952","tags":[{"name":"房地产","type":"主题/事件"},{"name":"还产","type":"主题/事件"},{"name":"建房","type":"主题/事件"},{"name":"私房","type":"主题/事件"},{"name":"文革","type":"主题/事件"}],"parts":[{"type":"title","text":"建设部关于善始善终做好城镇私房遗留问题处理工作的通知"},{"type":"subtitle","text":"（1989）建房字第431号"},{"type":"paragraph","text":"各省、自治区建委（建设厅），直辖市及计划单列城市房地产管理局："},{"type":"paragraph","text":"近两年来，各地贯彻执行中办发[1987]7号文以及我部[1987]城房字第575号文的精神，落实城镇私房政策，处理遗留问题，总的形势是好的。但也出现了一些新的问题。为了善始善终地做好城镇私房遗留问题的处理工作，现作如下通知："},{"type":"paragraph","text":"一、 要继续认真贯彻执行中办发[1984]44号、中办发[1987]7号文件和我部[1987]城房字第575号文《关于进一步处理好城镇私房遗留问题的通知》的精神，已有政策规定要解决的问题，要力争多解决一些。"},{"type":"paragraph","text":"二、 对中办发[1987]7号文下达前，房屋产权人（华侨和去台军政人员）已提出申请，并交验了部分证件，但由于证件或其他手续（包括继承、弃权、公证、认定身份等）不齐，房地产管理部门通知补办，而房屋产权人现已补办完手续的，应按原政策规定，妥善处理。"},{"type":"paragraph","text":"中办发（1987）7号文下达前，对华侨和去台军政人员，法院改判撤销代管，予以发还的房产，原则上也可按此办理。"},{"type":"paragraph","text":"三、 各城市的房地产管理部门或落实私房政策办公室要进一步做好“文革产”的扫尾工作和私改遗留问题的处理工作，尤其要做好代管房产的清理。要掌握基本情况（包括代管对象、代管房的变化、申请人身份等），进行典型案例分析，做到情况明、政策准、处理得当。"},{"type":"paragraph","text":"四、 各大城市私房遗留问题（包括宗教房产）的处理任务还很重。各地房地产管理部门要及时向市领导汇报情况，提出建议，当好参谋，并保证必要的办事人员和经费。已基本完成处理任务的城镇，也要集中一段时间做好扫尾工作，并把少数留下的问题转到正常工作去解决。"},{"type":"paragraph","text":"一九八九年九月十九日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"199e579b52"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
