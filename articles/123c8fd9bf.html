s":[],"dates":[{"year":1958,"month":3,"day":27}],"is_range_date":false,"parts":[{"text":"首都作家座谈文艺界反右派斗争成果","type":"title"},{"text":"《人民日报》讯：３月２６日出版的第六期“文艺报”发表了关于周扬同志“文艺战线上的一场大辩论”一文的座谈记录。参加“文艺报”座谈会的是北京的一部分作家、评论家郑振铎、邵荃麟、艾芜、臧克家、林默涵、王瑶等十二人。座谈会一致认为周扬同志的文章内容丰富，对文艺工作者有很大的教育意义，对今后文艺工作指出了鲜明的方向和令人兴奋的光明远景。周扬同志运用毛主席“在延安文艺座谈会上的讲话”的根本原则，不但总结了去年文艺界反右派斗争的成果，也对长期以来我国左翼文艺运动中的分歧和争论，提供了总结的基础。","type":"paragraph"},{"text":"大家认为文章明确地指出了文艺界右派分子向党进攻的历史的和阶级的根源。我国文艺上的无产阶级和资产阶级两条文艺路线的斗争已有三十多年的历史。以鲁迅为首的革命文艺同“新月派”、“第三种人”、“民族主义文学”派的斗争，就是这一斗争的最初一个回合；后来是对冯雪峰、胡风等隐藏在革命文艺阵营内部的斗争；抗日战争时期是对丁玲、萧军、王实味的斗争，以及在国民党统治区对胡风、冯雪峰的斗争；直到去年的“大辩论”仍然是两条道路的斗争的继续和发展，但这一次是总的清算。资产阶级思想的镣铐的解除，为无产阶级文艺开辟了广阔的道路。一支完全新型的文艺队伍正在建成，社会主义文艺的光辉远景已经展示在面前。","type":"paragraph"},{"text":"许多同志认为这次斗争的一个最深刻的教训就是文艺家必须改造自己，大家都说周扬同志所说的“个人主义，在社会主义社会，是万恶之源”是一针见血的警句。坚决彻底丢掉个人主义包袱，把心交给党，这是今天文艺家的唯一道路。","type":"paragraph"},{"text":"参加座谈的同志表示，周扬同志的文章对于修正主义文艺思想进行了深刻有力的批判，揭穿了它的假面具和实质。作家们深深地感到修正主义的危害性，只有扫除了这些障碍，才能使我们的文艺队伍在新的基础上团结起来，使社会主义的文艺事业得到发展和繁荣。","type":"paragraph"},{"text":"——原载《人民日报》1958年3月27日，原标题为“无产阶级文艺光芒万丈，首都作家座谈文艺界反右派斗争成果”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"123c8fd9bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
