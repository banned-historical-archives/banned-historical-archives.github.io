进行到底","authors":[],"dates":[{"year":1958,"month":6,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那26日电】　以西罗基为首的捷克斯洛伐克政府代表团25日在阿尔巴尼亚部长会议主席谢胡陪同下，访问了阿尔巴尼亚南部的科尔察和爱尔巴桑等城市。代表团到处都受到阿尔巴尼亚人民的热烈欢迎。"},{"type":"paragraph","text":"在科尔察举行的群众欢迎大会上，西罗基和谢胡讲了话。他们严正地谴责了南斯拉夫的修正主义。"},{"type":"paragraph","text":"西罗基说:自命为共产党的南共公开反对莫斯科宣言，反对社会主义，反对国际工人运动的团结和马克思列宁主义。由于这些敌对活动，南共受到应有的回击并在整个共产主义运动中孤立起来，这是毫不奇怪的。在不久以前举行捷共第十一次代表大会上，54个兄弟党一致斥责了南斯拉夫修正主义。"},{"type":"paragraph","text":"西罗基指出，南共纲领是对马克思列宁主义的背叛，是为帝国主义服务的。共产党和工人党有义务对南斯拉夫修正主义作斗争。他说，社会主义阵营的团结、国际共产主义运动的团结是不可摧毁的，是坚如钢铁的。在为社会主义和和平的斗争中，这种团结永远是全世界劳动群众最有力的武器。"},{"type":"paragraph","text":"谢胡说，南斯拉夫修正主义者是马克思列宁主义的叛徒。为了一些美元，他们负起了美帝国主义的为颠复社会主义国家和国际共产主义运动，挑拨各个社会主义国家与苏联的关系，分裂社会主义阵营的任务。美帝国主义及其仆从南斯拉夫修正主义者在这方面已经可耻地失败了，将来还要失败。"},{"type":"paragraph","text":"谢胡说，我们将毫不调和地把对现代修正主义的斗争继续进行到底，直到在政治上和思想上彻底粉碎现代修正主义为止。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢胡","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fd6ff2076"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
