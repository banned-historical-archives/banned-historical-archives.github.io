rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席建党思想建设党支部","authors":["“支左爱民模范”李文忠生前所在六连党支部"],"parts":[{"type":"paragraph","text":"“每一个支部，都是要重新在群众里头进行整顿。要经过群众，不仅是几个党员，要有党外的群众参加会议，参加评论。”毛主席这一最新指示，给我们指出在无产阶级专政下依靠群众整党建设的道路。"},{"type":"paragraph","text":"在实践中我们体会到，依靠不依靠群众整党建党，这决不是方法问题，而是执行什么路线的原则问题，是关系到党能不能带领群众继续革命的大问题。毛主席教导我们：“共产党基本的一条，就是直接依靠广大革命人民群众。”毛主席亲自发动和领导的无产阶级文化大革命，就是极其广泛、深刻的整党运动。正是通过这一场群众性的整党运动，大大锻炼了我们的党，进一步巩固了我国的无产阶级专政。"},{"type":"paragraph","text":"我们在整党建党工作中，遵照毛主席的教导，实行开门整党，采用了“请进来、走出去”的方法，让党员虚心听取群众的批评，群众热情地帮助党员，使广大党员受到了深刻地教育，提高了继续革命的觉悟，密切了党群关系。我们一定不折不扣地遵照毛主席的建党思想建设我们的党支部，培养和造就更多的象李文忠同志那样的无产阶级专政下继续革命的先锋战士，为巩固无产阶级专政，彻底埋葬帝、修、反，解放全人类作出我们的贡献。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8208bf1449"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
