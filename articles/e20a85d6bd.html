rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"春潮曲——反击右倾翻案风、促工业生产誓师会速写","authors":["王恩宇"],"parts":[{"type":"paragraph","text":"带着反击右倾翻案风的狂飚，"},{"type":"paragraph","text":"带着保卫天安门广场的捷报，"},{"type":"paragraph","text":"带着战斗的烟尘，大批判的怒火，"},{"type":"paragraph","text":"走来了——无数旌旗，各路英豪！"},{"type":"paragraph","text":"带着机床和汽锤铿锵的音符，"},{"type":"paragraph","text":"带着冲天炉和装配线跃进的风貌，"},{"type":"paragraph","text":"带着全厂职工的雄心壮志，"},{"type":"paragraph","text":"送来了——新的战表，新的指标！"},{"type":"paragraph","text":"在这里，把反修的锋刃加钢淬火，"},{"type":"paragraph","text":"在这里，把进军的战鼓奋力猛敲，"},{"type":"paragraph","text":"将满腔豪情写进学大庆的规划，"},{"type":"paragraph","text":"推动社会主义车轮迅猛飞跑。"},{"type":"paragraph","text":"会场上，声声誓言冲云天，"},{"type":"paragraph","text":"会场外，摩拳擦掌干劲高，看滚滚春潮汇洪流呵，催得那台台机床更欢跃。"},{"type":"paragraph","text":"“誓和修正主义路线对着干！”"},{"type":"paragraph","text":"工人的怒吼地动山摇——"},{"type":"paragraph","text":"我们要的是社会主义的现代化，"},{"type":"paragraph","text":"决不容党内资产阶级易辙改道！"},{"type":"paragraph","text":"深入批邓，警钟长鸣，"},{"type":"paragraph","text":"工人阶级誓做批修的尖刀；"},{"type":"paragraph","text":"抓纲带目——大干社会主义，"},{"type":"paragraph","text":"千斤重担咱铁肩敢挑！"},{"type":"paragraph","text":"旌旗猎猎，炉火熊熊，机声隆隆，"},{"type":"paragraph","text":"乘东风，掀起革命生产新高潮，"},{"type":"paragraph","text":"我们用大干快上的丰硕战果，"},{"type":"paragraph","text":"铸成回击复辟狂的排排重炮！"},{"type":"paragraph","text":"任前面还有多少级台风，"},{"type":"paragraph","text":"我们胜利的信念决不动摇。"},{"type":"paragraph","text":"有毛主席革命路线指引航程，"},{"type":"paragraph","text":"看每张日历，都将化作火红的捷报！"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e20a85d6bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
