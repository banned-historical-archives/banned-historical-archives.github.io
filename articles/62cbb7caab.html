电祝贺","authors":[],"dates":[{"year":1952,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】　北京卅一日消息:苏联部长会议主席斯大林打电报给我中央人民政府毛泽东主席，祝贺人民解放军建军二十五周年。电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席"},{"type":"paragraph","text":"毛泽东同志:"},{"type":"paragraph","text":"值此中华人民共和国英勇的人民解放军建军二十五周年之际，主席同志，请您接受我衷心的祝贺。为了和平与安全，谨祝中国人民解放军获得进一步的巩固。"},{"type":"paragraph","text":"约·斯大林"},{"type":"paragraph","text":"一九五二年七月三十日于莫斯科"},{"type":"paragraph","text":"【中央人民电台广播】　北京卅一日消息:苏联外交部部长维辛斯基打电报给周恩来总理兼外交部长，祝贺人民解放军建军二十五周年。电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理"},{"type":"paragraph","text":"兼外交部部长"},{"type":"paragraph","text":"周恩来同志:"},{"type":"paragraph","text":"值此中华人民共和国人民解放军光荣的建军二十五周年之际，总理同志，请您接受我热烈的祝贺。"},{"type":"paragraph","text":"安·维辛斯基"},{"type":"paragraph","text":"一九五二年七月三十日于莫斯科"},{"type":"paragraph","text":"【中央人民电台广播】　北京卅一日消息:苏联陆军部部长华西列夫斯基元帅打电报给我人民解放军朱德总司令，祝贺人民解放军建军二十五周年。电文如下:中华人民共和国人民解放军总司令朱德同志:"},{"type":"paragraph","text":"值此中国人民解放军建军二十五周年纪念的日子，总司令同志，我谨以苏联军队和我本人的名义向您致以衷心的祝贺，并诚挚地预祝您在巩固中华人民共和国武装力量的富有成果的工作中获得更进一步的成就。"},{"type":"paragraph","text":"苏联陆军部部长　安·华西列夫斯基元帅"},{"type":"paragraph","text":"一九五二年七月三十日于莫斯科"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62cbb7caab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
