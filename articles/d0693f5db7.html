":["喻屏"],"dates":[{"year":1970,"month":12,"day":28}],"is_range_date":false,"parts":[{"text":"喻屏写给专案组的申辩材料（摘录）","type":"title"},{"text":"喻屏","type":"authors"},{"text":"〖喻屏，中共中央东北局候补书记。文革中经中共中央批准打倒的刘少奇在东北及辽宁的第三号“代理人”。专案组将其历史上在国民党狱中曾“自首叛变”问题作为逼供重点。〗","type":"subtitle"},{"text":"一、我被捕后的情况，要历史地全面地如实向红色政权、沈阳军区党委和中央反映；","type":"paragraph"},{"text":"二、定案前，要把组织掌握的材料和我见面；","type":"paragraph"},{"text":"三、专案组的定案材料，要是和我的交待材料不同，请把我的交待材料附上。以便红色政权、沈阳军区党委和中央对照研究！","type":"paragraph"},{"text":"我被捕后的问题有多大，我自己清楚。如果专案组仍然按照多次讲的那样，根据现在掌握的但并不真实的材料给我定案，这肯定是一桩错案！","type":"paragraph"}],"comments":[],"origin":"高振河《喻屏传》，北京：中共党史出版社，2005年8月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0693f5db7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
