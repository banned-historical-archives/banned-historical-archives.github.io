<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打倒右倾分裂主义","authors":[],"dates":[{"year":1968,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"右倾分裂，是一小撮阶级敌人同我们作反革命斗争的一种手段，是当前运动的重要危险。"},{"type":"paragraph","text":"搞右倾分裂主义的人，总是把斗争矛头指向以毛主席为首、林副主席为副的无产阶级司令部。他们采取了“用孙行者钻进铁扇公主肚子里兴妖作怪的政策”，在革命队伍内部进行破坏活动，妄图分裂无产阶级司令部，分裂中国人民解放军，分裂新生的革命委员会，想把我们的无产阶级专政和无产阶级文化大革命的成果毁于一旦。"},{"type":"paragraph","text":"右倾分裂活动，同社会上的右倾翻案妖风是相呼应的，是适应了一小撮走资派、叛徒、特务的翻案复辟要求的，是一股反革命逆流。在无产阶级专政机构内大搞右倾分裂主义的人，他们是不折不扣的资产阶级代表人物，是国民党反动派的代理人。我们同这一小撮资产阶级阴谋家、野心家的斗争，是两个阶级、两条道路、两条路线之间的一场你死我活的大搏斗。"},{"type":"paragraph","text":"一切大搞右倾分裂主义的人，都是反革命两面派。他们当面是人，背后是鬼。对上封锁，对下欺骗。当面说得好听，背后又在捣鬼。他们总是打着“红旗”反红旗，往往以极“左”的革命词句把自己巧妙地伪装起来，并借以蛊惑人心，去干各种反革命的勾当。对于这伙打着“红旗”反红旗的家伙，我们“必须在各个工作部门中保持高度的警惕性，善于辨别那些伪装拥护革命而实际反对革命的分子，把他们从我们的各个战线上清洗出去，这样来保卫我们已经取得的和将要取得的伟大的胜利”。"},{"type":"paragraph","text":"还值得我们注意的是，那些反革命两面派，资产阶级阴谋家，野心家，为了进行他们的分裂主义活动，他们一定要大搞宗派主义、山头主义。在自己的势力范围之内，任人唯亲，结党营私，顺我者昌，逆我者亡，大搞“独立王国”。"},{"type":"paragraph","text":"分裂主义、宗派主义、山头主义等等，统统都是唯我主义。它不是无产阶级的意识形态，而是剥削阶级的意识形态，是资产阶级意识形态。这种意识形态和共产主义意识形态，是不相容的，同无产阶级的党性不相容的。它是反马列主义、反毛泽东思想的，反共产主义的，反党的，破坏团结的。这种思想增长一分，共产主义就减少一分，党的团结就减少一分，我们的力量就瓦解一分，我们的革命事业受损失就大一分。所以我们一定要把分裂主义彻底打倒。"},{"type":"paragraph","text":"毛主席教导我们说，一切反革命力量“他们的阶级本能引导他们老是在想:他们自己怎样了不起，而革命势力总是不行的。他们总是高估了自己的力量，低估了我们的力量”，他们搬起石头砸了自己的脚，一旦革命群众用毛泽东思想照见了他们的原形，就一定能够把他们打倒。一切右倾分裂主义者都逃脱不了可耻的下场。"},{"type":"paragraph","text":"无产阶级文化大革命的伟大实践，无论是正面的经验，或者是反面的教训，都教育我们懂得了一条真理:我们一定要牢牢掌握斗争大方向，始终把斗争矛头指向一小撮叛徒、特务、顽固不化的走资派。这个斗争的大方向一时一刻也不能动摇。那一天离开斗争大方向，我们就要犯错误，那一步离开斗争大方向，我们就要栽跟斗。所以，我们一定要牢牢掌握斗争大方向，紧跟毛主席的伟大战略部署，去夺取无产阶级文化大革命的全面胜利。"},{"type":"paragraph","text":"无产阶级革命派联合起来!坚决击退右倾翻案的妖风!打倒右倾保守主义!打倒右倾分裂主义!打倒右倾投降主义!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aec8e1c87d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
