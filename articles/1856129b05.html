、李德生、郭沫若、姬鹏飞、肖劲光、彭绍辉同志等出席　周恩来总理和阿巴斯副总统在洋溢着团结友好热烈气氛的宴会上讲话","authors":[],"dates":[{"year":1971,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十七日电　国务院总理周恩来今天晚上在人民大会堂宴会厅举行盛大宴会，热烈欢迎苏丹民主共和国副总统兼国防部长和人民武装部队总司令哈立德·哈桑·阿巴斯少将和由他率领的苏丹政府高级代表团全体成员。"},{"type":"paragraph","text":"苏丹民主共和国驻中国大使馆临时代办奥莫拉比和夫人，大使馆的外交官员和在北京的苏丹朋友，应邀出席了宴会。"},{"type":"paragraph","text":"柬埔寨国内特使英·萨利，柬埔寨王国民族团结政府军需、军备大臣杨森安将军，财经大臣秀木，外交第二副大臣万比尼，应邀出席了宴会。"},{"type":"paragraph","text":"军委副主席叶剑英，国务院副总理李先念，中国人民解放军总政治部主任李德生，人大常委会副委员长郭沫若，外交部代部长姬鹏飞，国防部副部长肖劲光，中国人民解放军副总参谋长彭绍辉等，出席宴会作陪。"},{"type":"paragraph","text":"宴会厅主席台的帷幕中央并排悬挂着苏丹国旗和中国国旗。七时半，当阿巴斯副总统等苏丹贵宾来到宴会大厅时，乐队奏起迎宾曲。"},{"type":"paragraph","text":"周恩来总理和阿巴斯副总统先后在宴会上讲了话(全文另发)，受到全场热烈鼓掌欢迎。他们讲话以后，乐队分别奏苏丹国歌和中国国歌。"},{"type":"paragraph","text":"宴会自始至终洋溢着中国、苏丹两国人民团结友好的热烈气氛。席间，宾主亲切交谈，频频举杯，祝愿中国、苏丹两国人民的友谊和两国友好合作关系日益发展，祝愿亚非拉人民团结反帝事业不断取得新的胜利。"},{"type":"paragraph","text":"出席宴会的还有:"},{"type":"paragraph","text":"人大常委会委员谢扶民、季方；"},{"type":"paragraph","text":"我国政府有关部门、中国人民解放军、北京市革命委员会、中国人民对外友好协会的负责人邝任农、周希汉、封永顺、刘金轩、王迪康、韩宗正、陈洁、王猛、谢华、潘友宏、谢鑫鹤、宋养初、刁炳章、丁国钰、丁西林、狄福才、杜文达、张政德、戴征远、马仁辉、何英、柴成文、苑化冰、韩叙、程飞、王明俊、戴佩宸等。"},{"type":"paragraph","text":"各国驻中国外交使节也应邀出席了宴会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1856129b05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
