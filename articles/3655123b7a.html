ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"东北八九两月完成作战准备","alias":"","parts":[{"type":"paragraph","text":"东北八九两月完成作战准备！"},{"type":"paragraph","text":"（1946年8月8日）东北局，并转各满、各省委："},{"type":"paragraph","text":"甲、鱼日司徒向周转达蒋介石五条：（一）让出苏皖边区。（二）让出胶济线。（三）让出承德及其以南。（四）东北在十月十五日以前退至黑龙江、兴安、嫩江及延吉，其余均交出。（五）鲁晋两省须让出六月七日后占领地区。周答绝对不能接受，一条也不行。乙、你们须积极准备作战，务于八九两月准备完毕，待命行动。在两个月内，人不犯我，我不犯人。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"未齐[1]这是毛泽东为中共中央起草的给中共中央东北局的电报。"},{"type":"paragraph","text":"[2]司徒，即司徒雷登，1946年7月11日起出任美国驻中国大使，积极支持国民党政府进行反人民内战。"},{"type":"paragraph","text":"[3]周，指周恩来。"},{"type":"paragraph","text":"[4]1945年日本投降以后，国民党政府将原东北的辽宁、吉林、黑龙江三省划分为辽宁、辽北、安东、吉林、松江、合江、黑龙江、嫩江及兴安九省。这里黑龙江、兴安、嫩江是当时东北九省中的三个省。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":57,"page_end":57},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3655123b7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
