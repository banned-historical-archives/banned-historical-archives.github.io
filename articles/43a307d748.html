art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"康生、江青为什么要迫害李六如","authors":["王美兰"],"parts":[{"type":"paragraph","text":"1967年的一天，几个“造反派”扬言是中央文革派来的，诬蔑六如同志是“叛徒”、“反党分子”，要抄家揪斗。后来才知道，康生一次接见湖南造反派时说：“李六如是叛徒，反党分子。”唯恐听者不认识，还着重地说：“就是写《六十年的变迁》的那个李六如。”"},{"type":"paragraph","text":"1942年延安整风之后，李六如同志作为毛主席办公室的秘书长，曾写过一个书面意见交给党组织，内容是陈述他对整风中某些人过左做法的不同意见，并且认为某些人对知识分子实行“残酷斗争、无情打击”是不妥当的。后来他从毛主席一次谈话中得知：对他写的这一材料，个别人有意见，这“个别人”主要就是指那个整人的康生。"},{"type":"paragraph","text":"在六如同志任秘书长期间，目睹江青专横跋扈、反复无常，服务人员敢怒而不敢言。六如同志经过反复考虑，决定把大家对江青长期积压在心头的意见向毛主席作一次汇报，提请江青注意，以便挽回影响。正当六如同志和毛主席说话之间，江青走了进来，当即大哭大闹，说毛主席和六如同志合伙来欺负她，还竖眉瞪眼拍桌子，说六如同志没资格批评她。毛主席喝她住口，说：“你摆什么老资格，秘书长参加革命比你早得多！”事后，毛主席要江青向六如同志道歉，江青执意不肯。从此，江青每次遇见六如同志都昂首而过，不予理睬。六如同志也绝不低声下气给她陪笑脸。"},{"type":"paragraph","text":"“文化大革命”期间，每当从报纸上或广播里得知江青又在到处发表讲话时，六如同志会重重地叹口气，叮嘱亲人做好思想准备，随时应付最坏的情况发生。果然，不久康生就扔过来两顶“帽子”，一连串的打击也就接踵而来。"},{"type":"paragraph","text":"（摘自《战地》1980年第6期王美兰文）"}],"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43a307d748"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
