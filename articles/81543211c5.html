rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"图片","authors":["杜修贤陈捷牛畏予刘长忠王敬德冯文罔"],"parts":[{"type":"paragraph","text":"中共中央副主席、国务院总理周恩来参加了河北省邯郸市各界人民庆祝“五一”国际劳动节大会。图为周总理和工业劳动模范张思孝握手。新华社记者 杜修贤摄"},{"type":"paragraph","text":"在四川省、成都市各界人民庆祝“五一”国际劳动节大会上，中共中央副主席、人大常委会委员长朱德接见了参加大会的先进生产者。图为朱德副主席和成都市先进生产者樊光荣握手。新华社记者 陈 捷摄（传真照片）"},{"type":"paragraph","text":"“五一”国际劳动节，中共中央副主席、国务院副总理陈云在天坛公园和崇文机械厂工人在一起。新华社记者 牛畏予摄"},{"type":"paragraph","text":"“五一”国际劳动节，董必武、邓小平、彭真、贺龙、陈毅、李富春等党和国家领导人，在景山公园和首都人民一起欢度节日。新华社记者 刘长忠摄"},{"type":"paragraph","text":"① 北京各城市人民公社在欢庆“五一”国际劳动节的同时，庆祝城市人民公社诞生一周年。图为一年前走上生产岗位的城市人民公社的妇女们，带着自己的孩子，在天安门广场欢度佳节。 本报记者 牛嵩林摄"},{"type":"paragraph","text":"② 在中国工人运动史上有着光辉历史的长辛店工人，在5月1日，集会庆祝“五一”国际劳动节。来自古巴、巴西、马里、阿尔及利亚和印度尼西亚的国际友人也参加了长辛店的庆祝大会。 新华社记者 王敬德摄"},{"type":"paragraph","text":"③ 正在大闹春播的北京市大兴县红星人民公社西红门生产大队的社员，在5月1日，集会庆祝“五一”国际劳劝节。这是青年女社员牟秀英在清唱评剧。新华社记者 纳一摄"},{"type":"paragraph","text":"④ 解放军某部阎玉寰同志在景山公园和少先队员一起欢度“五一”。这是他正给小朋友们讲毛主席关怀战士学文化的革命故事。 冯文冈摄（北京日报供稿）"}],"alias":""},"tags":[{"name":"朱德","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81543211c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
