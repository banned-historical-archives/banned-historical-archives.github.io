:[{"year":1952,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523l020801.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(5)“星四灵餐会”最初由高功懋、邱仁基等发起，联合重庆较大私营钢铁机器厂十二家组成的，作为垄断政府加工定货，排挤中小厂商和盗窃国家财产的“指挥部”。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523l020802.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(6)他们先后以“请客”、“送礼”、“借钱”等手段，把国营钢厂基本建设处生产科长周绍文、外包工程师陈松柏等勾结在一起，又把监督加工定货的重庆市工商局副局长孙济世和西南工业部科长钱绍武也拉了过去。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523l020803.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(7)从此国营钢厂的外包工程，在周绍文操纵下，从来不用招标方式，而是交“星四聚餐会”去“统一分配”。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523l020804.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张伯诚,汪伟光,王木天\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(8)“星四聚餐会”得到统一分配的特权后，它的首脑分子高功懋在四百多种加工定货中，首先“分配”给他自己的民生机器厂二百多种，然后让会员厂挑选。"},{"type":"paragraph","text":"张伯诚　汪伟光　王木天　合绘"},{"type":"paragraph","text":"钱子凡　改编\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱子凡\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45803bc477"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
