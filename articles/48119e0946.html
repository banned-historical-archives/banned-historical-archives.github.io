ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"关于应对国民党军火力袭击的批语","alias":"","parts":[{"type":"paragraph","text":"关于应对国民党军火力袭击的批语"},{"type":"paragraph","text":"（1958年6月26日）退彭照办"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月二十六日"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央军委委员、国务院副总理兼国防部部长彭德怀1958年6月26日呈送的电话记录上写的批语。"},{"type":"paragraph","text":"[2]中国人民解放军总参谋部作战部1958年6月26日上午电话报告：福州军区判断，国民党军最近可能对我组织一次大的火力袭击。据此，福州军区提出两项应对措施。一是消极方面的，采取撤离等防范措施，高炮加强对空作战。二为积极方面的，即组织还击。总参谋长栗裕指示：除火炮防敌袭击外，另调一些高射炮部队，集中火力打击敌飞机。如有机会再打地面目标，并同意作战部关于积极进行还击准备，待敌暴露目标后狠狠给敌以打击的建议。彭德怀6月26日12时批示：“即送主席阅后审批。我同意第二项措施，采取积极还击并加强对空火力。”"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":441,"page_end":441},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48119e0946"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
