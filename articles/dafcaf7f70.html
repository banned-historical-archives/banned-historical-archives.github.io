ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"在聂荣臻关于国内防疫工作报告上的批语","alias":"","parts":[{"type":"paragraph","text":"对钟赤兵关于民航机构设置"},{"type":"paragraph","text":"和领导关系的建议的批语"},{"type":"paragraph","text":"（1952年3月11日）周总理："},{"type":"paragraph","text":"钟赤兵对民航局的建议值得注意。现在民航事业行政和业务混杂，领导多头，飞机和工厂浪费，他提议予以改变。请召集一会议予以研究，决定适当解决办法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十一日[1]钟赤兵，当时任人民革命军事委员会民用航空局局长。"},{"type":"paragraph","text":"[2]指钟赤兵1952年3月10日关于民航局工作问题给毛泽东并中央的报告中提出的建议。这些建议是：（一）将民航现行机构分立为民航局和民航公司。前者为行政管理机关，尽量紧缩精简；后者为经营业务机构，按经济核算制来执行业务，在业务上财务上是独立的企业单位。（二）将民航局拨归空军建制，以利统一领导。（三）现有人员和干部由空军统一调整，不适合的转业建设，多余飞机交空军，工厂设备交重工业部，以达到通盘筹划和充分利用之效。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":500,"page_end":500},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dafcaf7f70"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
