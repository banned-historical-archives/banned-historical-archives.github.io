ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于朝鲜停战谈判时间地点等事宜","alias":"","parts":[{"type":"paragraph","text":"关于朝鲜停战谈判时间地点等事宜!"},{"type":"paragraph","text":"（1951年6月30日）菲利波夫同志："},{"type":"paragraph","text":"敌军司令官李奇微，已于本日发表通知，建议在元山港内一个丹麦船上由交战双方的代表举行关于停战的会议。并称，必须有适当的保证，方能实行停战。关于此事，有几点请您考虑示复，并请您直接通知金日成同志："},{"type":"paragraph","text":"（一）金日成同志似应于七月二日或七月三日发表答复李奇微的通知，在此通知内说明：同意举行双方代表谈判停战的会议，并建议会谈的时间、地点和代表人数。"},{"type":"paragraph","text":"（二）关于谈判地点，李奇微建议在元山港内。查此港是北朝鲜的设防海港，敌军正阴谋于此登陆，似不宜同意在此港开会，可否建议以三八线上的开城为会议地点。"},{"type":"paragraph","text":"（三）为使我方代表对于会谈内容有充分的时间作准备，似宜建议以七月十五日为开会日期。"},{"type":"paragraph","text":"（四）因为时间迫促与会议的重要性，我建议，请您直接与金日[1]这是毛泽东给斯大林的电报。[2]菲利波夫，即斯大林。[3]李奇微，当时任“联合国军”总司令、美国远东军总司令。[4]金日成，当时任朝鲜民主主义人民共和国首相。毛泽东全集第三十卷成同志通讯，密切地指导此次会议，同时将您的意见告知我们就行了。"},{"type":"paragraph","text":"毛泽东一九五一年六月三十日十四时"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":6,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":401,"page_end":402},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e946400b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
