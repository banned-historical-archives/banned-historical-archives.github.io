rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一时一刻不脱离群众","authors":["海军某部驻天津市水产系统毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"我们怀着无比激动的心情，反复学习了伟大领袖毛主席的最新指示：“革命委员会的基本经验有三条：一条是有革命干部的代表，一条是有军队的代表，一条是有革命群众的代表，实现了革命的三结合。革命委员会要实行一元化的领导，打破重叠的行政机构，精兵简政，组织起一个革命化的联系群众的领导班子。”毛主席的最新指示，象光辉灿烂的指路明灯，照亮了革命委员会建设和巩固的锦绣前程。我们一定要认真学习，深刻领会，不折不扣地贯彻执行。"},{"type":"paragraph","text":"去年三月间，我们介入天津市水产系统无产阶级文化大革命，在毛泽东思想的光辉照耀下，我们和水产系统无产阶级革命派共同努力，终于在去年十月下旬实现了全系统自下而上的革命三结合，建立起各级革命委员会。毛主席教导我们：“我们人人要有彻底的革命精神，我们不要有一时一刻脱离群众。”在一年多的实践中，我们深深体会到，要帮助革命委员会紧跟毛主席的伟大战略部署，夺取无产阶级文化大革命的全面胜利，最根本的一条，就是要帮助革委会遵照毛主席“不要有一时一刻脱离群众”的伟大教导，永远走联系群众的道路。"},{"type":"paragraph","text":"水产系统各级革命委员会刚刚成立不久，三结合领导班子中的一些同志，密切联系群众、艰苦朴素的作风一度不如过去了，出现了坐办公室多，深入群众、参加劳动少的现象。针对这个问题，我们除了和他们一起反复学习毛主席关于“我们共产党人不是要做官，而是要革命”，“坚持群众路线，遇事多和群众商量，做群众的小学生”等教导外，还专门在革命委员会中开办了“密切联系群众，永葆革命青春”的学习班，把我军活学活用毛主席著作，坚持四个第一，大兴三八作风，发扬三大民主，坚持群众路线等优良传统带到革命委员会中，帮助革命委员会的成员经常深入群众，和群众一起学习，一起劳动，自觉地保持劳动人民的本色。"},{"type":"paragraph","text":"目前，水产系统各级革命委员会在阶级斗争的风浪中，越来越巩固，越来越健全，牢固树立起无产阶级权威，发挥出巨大的革命作用，使革命和生产出现了一派热气腾腾的景象。"},{"type":"paragraph","text":"今后，我们一定更高地举起毛泽东思想伟大红旗，继续把学习、执行、宣传、捍卫毛主席的最新指示当做自己的神圣职责，帮助革命委员会全面落实毛主席的最新指示，在夺取无产阶级文化大革命的全面胜利中为人民立新功。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77d3ae0069"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
