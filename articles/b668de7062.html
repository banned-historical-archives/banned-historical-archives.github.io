967,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席像章永放光芒"},{"type":"paragraph","text":"在缅甸某工厂有这样一个动人的故事：一位女工得到一枚毛主席像章，她感到很幸福，一直把毛主席像章端端正正地戴在胸前，每次换衣服的时候，总是把毛主席像章珍藏起来。一天早上，这位女工赶着要上班，因为时间紧迫，一时没能找到毛主席像章，心情很焦急。父亲见女儿这样热爱毛主席，便安慰她说：“你上班去吧！我一定为你找！”她父亲一直找了三个多钟头，终于把毛主席像章找到了。接着这位老人走了十多里路，赶到工厂去，把毛主席像章送给他的女儿。这位女工手捧毛主席像章，高兴极了，立即戴起来。她说：“我最爱毛主席像章，我要让毛主席的像章永远在我胸前放射灿烂的光芒。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b668de7062"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
