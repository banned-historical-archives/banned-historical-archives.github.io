uthors":[],"dates":[{"year":1957,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"民革、九三河南省地方组织积极扩张自己的势力","type":"title"},{"text":"新华社郑州22日讯\t民革、九三学社河南省地方组织的少数右派分子，在整风期间积极发展自己的组织。","type":"paragraph"},{"text":"民革河南省委宣傅处长李静之，在整风运动开始以后，以个别佈置任务的形式，指示下级组织发展党员；对象是：1、我肃反的对象；2、被我党开除的叛徒，3、对党严重不满的分子；4、解放战争中国民党起义的军官。先后已发展党员三、四人。据中共河南省委统战部的干部对记者说，李静之的行动与民革中委有关。今年2月份，民革河南省委召开代表会议；民革中央委员会的常委委员于振澐在参加这次会议上说，我们民革发展党员太慢，在发展党员的问题上不能太老实了，人家(指其他民主党派)现在是“百家争鸣”，我们现在是“百家争人”。李静之是这次被点名的右派分子，他的反动行为目前正被揭发。","type":"paragraph"},{"text":"九三学社洛阳市小组召集人朱××，在大“鸣”大“放”的阶段中，表现非常活跃，他以帮助党整风的名义，积极奔走各机关、企业、学校等参加对党提意见的会议。他通过这些会议选择对党最不满的人作为发展对象，到目前为止，已发展社员十馀人；其中五人已经填表。(刘健生)。","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参考》，第2239期，1957年6月25日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d7fa331d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
