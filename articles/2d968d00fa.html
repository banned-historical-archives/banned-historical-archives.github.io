1958,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"感谢毛主席"},{"type":"paragraph","text":"我今年七十六岁了，在我十九岁那年，我的弟弟十六岁，因家庭生活困难，兄弟两人给地主当长工。有一年黄河泛滥成灾，田苗冲毁，只得逃荒外流。那时还以为自己时运不好，便身入佛堂，吃斋行善，盼仙成神，到后来遭日本鬼子侵略，生活越来越困难。解放后政府帮助搞生产，有了吃穿，今年6月里，农业合作社决定我享受五保待遇，住着新房，吃的是新米白面。想起来我兄弟两人吃斋行善四十八年，“佛爷”没封我成神，现在毛主席领导下，我不愁吃穿，仿佛成神，怎能不感谢共产党呢？"},{"type":"paragraph","text":"河南长垣县先锋二社　宋喜川"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d968d00fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
