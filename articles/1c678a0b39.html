tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席西哈努克亲王观看中柬艺术家演出","authors":[],"parts":[{"type":"paragraph","text":"新华社19日讯 今天下午，在首都各界人民举行欢迎柬埔寨国家元首诺罗敦·西哈努克亲王、庆祝中柬友好和互不侵犯条约签订大会以后，中国和柬埔寨两国的艺术家在人民大会堂举行了盛大的文艺演出。"},{"type":"paragraph","text":"诺罗敦·西哈努克亲王和刘少奇主席一起观看了中柬两国艺术家的表演。"},{"type":"paragraph","text":"观看演出的，还有西哈努克亲王的夫人、公主和王子，柬埔寨王位最高委员会副主席宾努，首相福·波伦，第一副首相涅·刁隆等贵宾。"},{"type":"paragraph","text":"董必武副主席、朱德委员长、周恩来总理、陈毅副总理、彭真市长等领导人，也同贵宾们一起观看演出。"},{"type":"paragraph","text":"中柬两国艺术家演出的精彩节目，热烈歌颂了中柬两国人民的深厚友谊。中国艺术家演出了“欢迎您，西哈努克亲王”大合唱和西哈努克亲王所创作的“金边——王都”歌曲。柬埔寨皇家舞蹈团的艺术家表演了柬埔寨“拉玛亚纳”舞剧中的几个片断和“柬中友谊舞”。在“柬中友谊舞”中，每个演员手执中柬两国国旗，一面起舞，一面欢呼两国人民的友谊。这时，全场掌声雷动，人们完全沉浸在友谊的欢乐之中。"},{"type":"paragraph","text":"演出结束以后，西哈努克亲王和柬埔寨其他贵宾们，同刘少奇、董必武、朱德、周恩来、彭真、陈毅等国家领导人，在乐曲声和暴风雨般的掌声中一起走上舞台，同中柬两国的演员热烈地握手。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c678a0b39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
