rs":[],"dates":[{"year":1966,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在史无前例的无产阶级文化大革命推动下"},{"type":"paragraph","text":"全国纺织工业多快好省继续跃进"},{"type":"paragraph","text":"据新华社二十日讯  我国一百五十万纺织工人以史无前例的无产阶级文化大革命作为强大动力，把全国纺织工业生产推向了一个新高潮。"},{"type":"paragraph","text":"今年以来，纺织工业战线的形势大好，呈现了一片热气腾腾的革命景象。广大纺织工人怀着对伟大领袖毛主席的无限热爱、无限信仰、无限崇拜的深厚感情，活学活用毛主席著作，以伟大的毛泽东思想为一切工作的指导方针，立下为革命纺纱织布，为人民更好地解决穿衣问题的雄心壮志，阶级觉悟迅速提高，革命精神大振，干劲倍增，保证了革命和生产双胜利。"},{"type":"paragraph","text":"今年头八个月纺织工业生产一直是持续跃进的局面。棉、毛、丝、麻、化学纤维、纺织机械等主要产品，都超额完成了国家计划，比去年同期有了较大幅度的增长。其中，棉纱产量增长百分之十八，比新中国建立以来任何一年的同期产量都高。我国每千锭每小时的生产能力，继续保持着世界先进水平。产品质量稳定提高，成本下降。全国主要化学纤维厂人造毛的成本，比去年降低五分之一，达到了棉花的价格水平。在这同时，纺织职工还创造出许多具有世界先进水平的新技术、新工艺、新设备和新材料，为我国纺织工业今后全面跃进创造了良好条件。江苏省无锡丝绸印染厂职工创制成功丝绸自动筛网印花机和其他配套设备，使我国丝绸印花工业摆脱了笨重的手工操作。（附图片）"},{"type":"paragraph","text":"图为丝绸自动筛网印花机在印花。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bc9efbab6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
