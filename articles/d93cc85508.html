" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"攻击毛主席和党的幹部","authors":["东北财经学院","傅鹏","姜纯洪","巩玉龙","李宝印","王凤舞","王继唐","窦履敬","符百诚"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"攻击毛主席和党的干部","type":"title"},{"text":"东北财经学院姜纯洪王凤舞王继唐窦履敬巩玉龙傅鹏符百诚李宝印","type":"authors"},{"text":"“毛主席可能到长江边沾一沾水，就说他横渡长江啦！报纸报的是不真实的。”“你们说毛主席对一切问题的看法真有远见。我看毛主席放屁，你们也会说是香哩！”(姜纯洪)","type":"paragraph"},{"text":"“苏院长肃反时犯了严重的错误。”(王凤舞)","type":"paragraph"},{"text":"“苏院长不能当院长。”(邵恩吉)","type":"paragraph"},{"text":"“陈、苏两副院长和院党委在肃反中都是官僚主义者。”(王继唐)","type":"paragraph"},{"text":"“院领导不关心同学的生活，使同学们不能安心学习，我们长期得不到温暖，长期得到的是痛苦。”(窦履敬)","type":"paragraph"},{"text":"“党群关系，领导和被领导是老爷与奴隶的关系。……平时扳起面孔，认为自己进步，别人落后只当作工作，总之招之即来，挥之即去的老爷作风。”(窦履敬)","type":"paragraph"},{"text":"“党员干部是官们、老爷们。”(巩玉龙)","type":"paragraph"},{"text":"“你们(党支委)宗派主义到什么程度了，你们再这样下去的就会垮台。”(傅鹏)","type":"paragraph"},{"text":"“我国是由知识分子领导的。我国的领袖及中央高级干部是知识分子出身的。据我所知，只有陈云是工人阶级出身的。工人文化水平低，没有一个能领导我们国家的。”(符百诚)","type":"paragraph"},{"text":"“关于一长制的问题吗，据我做工会工作所了解的情况，工厂的党委书记跟着厂长的屁股后跑，厂长有事不找党委，党委有事得找厂长。”“建设共产主义国家的干部，必须通过考试(指考自然科学)。老党员干部不行，根据革命功劳的大小给以待遇。”(李宝印)","type":"paragraph"},{"text":" 来源：《我院学生中的右派言论汇编》（中共东北财经学院委员会编，1957）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d93cc85508"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
