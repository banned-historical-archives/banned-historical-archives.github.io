year":1966,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我用毛泽东思想解决困难"},{"type":"paragraph","text":"我正以极大的兴趣阅读毛主席著作的每一句话。"},{"type":"paragraph","text":"我今年二十九岁，当过钳工，现在在大学念书。暑假时到工地、森林区当工人。这并不是为了挣钱，而是我认识到半工半读的重要性。可惜目前在西德持有这种认识的人还不多。但是，中国红军刚开始时，不也是很弱小的吗？"},{"type":"paragraph","text":"现在，我逐渐开始在生活中看到了毛泽东思想的规律。我也开始用毛泽东思想来解决遇到的困难。用这种新的方式来对付困难，是非常有力而奏效的。"},{"type":"paragraph","text":"革命在唯一正确的毛泽东思想指导下，将烧掉所有的帝国主义先生们。我们知道，在走向革命胜利的主流中，也隐藏着漩涡和暗礁。例如邓拓、吴晗之流。但毛主席的话就是船舵。"},{"type":"paragraph","text":"我完全赞成你们对帝国主义、各国反动派和现代修正主义者的政策。"},{"type":"paragraph","text":"〔西德〕伯哈特"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"354f510e9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
