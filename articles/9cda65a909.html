ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"程子华黄志勇部暂在原地待命","alias":"","parts":[{"type":"paragraph","text":"程子华黄志勇部暂在原地待命!"},{"type":"paragraph","text":"（1948年11月28日）程、黄，并告林、罗、刘²："},{"type":"paragraph","text":"二十七日二十时电悉。（一）为不使傅军早日警觉起见，你们暂在原地待命，在三天内不要动。（二）现在问题是杨成武?是否能在柴、怀、张、宣?地区抓住一○五军（即暂四军），如能抓住该军，则在下花园\"之一〇一军（即新二军）一个师，在怀来之一〇四军（即暂三军）一个师，亦有被我杨罗耿?抓住之可能，否则这"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军第二兵团司令员程子华和参谋长黄志勇的电报。"},{"type":"paragraph","text":"[2]林、罗、刘，指林彪、罗荣桓、刘亚楼，当时分别任东北野战军司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[3]指1948年11月27日20时程子华、黄志勇关于部队拟于28日夜开始移动，12月1日拂晓前到达平谷地区集结给中共中央军委和林彪、罗荣桓、刘亚楼的电报。"},{"type":"paragraph","text":"[4]傅，指傅作义，当时任国民党军华北“剿匪”总司令部总司令。[5]杨成武，当时任华北军区第三兵团司令员。"},{"type":"paragraph","text":"[6]柴、怀、张、宣，指河北柴沟堡（今怀安县县治）、怀安、张家口和宣化。"},{"type":"paragraph","text":"[7]下花园，镇名，即今河北省张家口市下花园区。[8]杨罗耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团些敌人均有东撤之可能。（三）一○四军主力两个师已由怀来向东移至南口\"地区。（四）你们各部现在位置即告。"},{"type":"paragraph","text":"军委二十八日十二时"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":293,"page_end":294},"tags":[{"name":"杨成武","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cda65a909"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
