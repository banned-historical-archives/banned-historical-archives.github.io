rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"工农兵最迫切的心愿","authors":["武汉部队学习毛主席著作积极分子/营房科副科长宋乐山"],"parts":[{"type":"paragraph","text":"大量出版毛主席著作，是给全国人民发最好的革命武器。广大工农兵最爱读毛主席的书，他们以万分急迫的心情盼望能买到毛主席的书。有一次，我出差，在列车上帮助列车员发售《毛泽东著作选读》，因为数量很少，大家都争先恐后地买。有一位六十多岁的老大爷，挤上来非要买一本不可。有人说：“你不识字，让给别人吧！”他激动地说：“我不识字，耳朵还很灵，我可以叫儿子姑娘念给我听。”有个小学生，用返途的车费买了一本。我问她回去没钱买车票怎么办？她回答说：“我走着回去，走路怕啥，不读毛主席的书，走错了路，才不得了哩！”广大工农兵热爱毛主席著作的感人情景教育了我，使我深刻地体会到：毛主席著作是革命人民的命根子，广大工农兵对毛主席著作的深愿感情，就是对党的深厚的感情，就是对中国人民和世界人民的深厚感情。我是搞营具采购的，经常外出，远离领导，我要永远把毛主席的书当作最高指示、最好的领导，走到哪里就读到哪里，用到哪里。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83ffa543a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
