script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"七律·重庆谈判","alias":"","parts":[{"type":"paragraph","text":"七律·重庆谈判"},{"type":"paragraph","text":"(1945年）有田有地皆吾主！，无法无天是尔民？。重庆有官皆墨吏3，延安无土不黄金4。炸桥挖路为团结，"},{"type":"paragraph","text":"夺地争城回是斗争。"},{"type":"paragraph","text":"[1]有田有地，指革命根据地。皆吾主，都是我们作主。另有一说，有田有地，指富人。皆吾主，指他们统治着人民。"},{"type":"paragraph","text":"[2]无法无天，指共产党不听蒋介石国民党政府的指挥，不遵蒋介石所谓的“法”。在重庆谈判期间，蒋介石说，共产党要交出军队，否则就是无法无天。还说，天无二日，国无二主。尔，你的，指国民党政府。尔民，你的老百姓，这里是讽刺国民党政府的说法。"},{"type":"paragraph","text":"[3]重庆，1938年至1946年，国民党政府迁驻陪都重庆。墨，脏污。墨更，贪官污吏。《佐传·昭公十四年》：“贪以败官为墨。”"},{"type":"paragraph","text":"[4]延安，1937年至1947年为中共中央所在地。黄金，有多重含意，既是说，延安位于秦晋黄土高原，又表现那里是祖国的大好河山，一片大好形势。"},{"type":"paragraph","text":"[5]炸桥挖路，指破坏敌人的交通。遍地哀鸿川遍地血，"},{"type":"paragraph","text":"无非一念救苍生口。"},{"type":"paragraph","text":"[1]哀鸿，鸿雁哀鸣。《诗·小雅·鸿雁》：“鸿雁于飞，哀鸣。”这里比喻流离失所的难民。附件："},{"type":"paragraph","text":"重庆谈判期间国共两党的会谈情况一览表"},{"type":"paragraph","text":"两党代表"},{"type":"paragraph","text":"会谈内容"},{"type":"paragraph","text":"地点时间"},{"type":"paragraph","text":"中共军队组编数目、101号"},{"type":"paragraph","text":"蒋介石、毛泽东"},{"type":"paragraph","text":"驻地、解放区、政治1945.9.3"},{"type":"paragraph","text":"会议、国民大会"},{"type":"paragraph","text":"周恩来、王若飞、张群、101号"},{"type":"paragraph","text":"军队整编和解放区1945.9.4"},{"type":"paragraph","text":"邵力子、张治中"},{"type":"paragraph","text":"军队组编数目和省区"},{"type":"paragraph","text":"周恩来、王若飞、张群、"},{"type":"paragraph","text":"101号1945.9.8"},{"type":"paragraph","text":"划分邵力子、张治中"},{"type":"paragraph","text":"政治会议、国民大会周恩来、王若飞、张群、"},{"type":"paragraph","text":"（张治中在会上首先"},{"type":"paragraph","text":"101号1945.9.10"},{"type":"paragraph","text":"提出“政治协商会邵力子、张治中"},{"type":"paragraph","text":"议”一词)"},{"type":"paragraph","text":"周恩来、王若飞、张群、101号"},{"type":"paragraph","text":"国民大会、代表名额1945.9.11"},{"type":"paragraph","text":"邵力子、叶楚伦、张厉生"},{"type":"paragraph","text":"国民大会、政治会"},{"type":"paragraph","text":"议、施政纲领、各党"},{"type":"paragraph","text":"周恩来、王若飞、张群、"},{"type":"paragraph","text":"101号1945.9.12"},{"type":"paragraph","text":"邵力子、张厉生"},{"type":"paragraph","text":"派参加政府及承认解"},{"type":"paragraph","text":"放区周恩来、王若飞、张群、"},{"type":"paragraph","text":"省区划分、地方政府"},{"type":"paragraph","text":"101号1945.9.15"},{"type":"paragraph","text":"邵力子"},{"type":"paragraph","text":"人选及军队驻地等"},{"type":"paragraph","text":"军事问题101号"},{"type":"paragraph","text":"蒋介石、毛泽东、赫尔利1945.9.17"},{"type":"paragraph","text":"军队缩编数目、驻地"},{"type":"paragraph","text":"周恩来、王若飞、张群、"},{"type":"paragraph","text":"101号1945.9.19"},{"type":"paragraph","text":"和解放区邵力子、张治中"},{"type":"paragraph","text":"改编军队和解决解放"},{"type":"paragraph","text":"周恩来、王若飞、张群、"},{"type":"paragraph","text":"101号1945.9.21"},{"type":"paragraph","text":"区邵力子、张治中"},{"type":"paragraph","text":"地点时间"},{"type":"paragraph","text":"会谈内容"},{"type":"paragraph","text":"两党代表"},{"type":"paragraph","text":"周恩来、王若飞、张群、"},{"type":"paragraph","text":"103号1945.9.27"},{"type":"paragraph","text":"军队缩编和解放区"},{"type":"paragraph","text":"邵力子、张治中"},{"type":"paragraph","text":"周恩来、王若飞、张群、103号"},{"type":"paragraph","text":"军队整编技术1945.9.28"},{"type":"paragraph","text":"邵力子、张治中"},{"type":"paragraph","text":"政治协商会议和解放"},{"type":"paragraph","text":"周恩来、王若飞、张群、"},{"type":"paragraph","text":"103号1945.10.2"},{"type":"paragraph","text":"邵力子、张治中"},{"type":"paragraph","text":"区周恩来、王若飞、张群、"},{"type":"paragraph","text":"政治协商会议、解放"},{"type":"paragraph","text":"103号1945.10.5"},{"type":"paragraph","text":"区邵力子、张治中"},{"type":"paragraph","text":"商讨修改周恩来起草"},{"type":"paragraph","text":"周恩来、王若飞、张群、103号"},{"type":"paragraph","text":"的《国共双方代表会1945.10.8"},{"type":"paragraph","text":"邵力子、张治中"},{"type":"paragraph","text":"谈纪要》"},{"type":"paragraph","text":"参政员毛泽束"},{"type":"paragraph","text":"在渝市之熊民国三十四年八月六"},{"type":"paragraph","text":"3D4"},{"type":"paragraph","text":"\u003e记录毛泽东在重庆谈判期间主要活动的《参政员毛泽东在渝市之动态》。"},{"type":"paragraph","text":"国共两党主要谈判地点一中山四路曾家岩德安里101号蒋介石、宋美龄官邸。1945年10月10日，国共重庆谈判签订的《双十协定》。《双十协定》签订地点。1945年10月11日，毛泽东在张治中的陪同下离开重庆返回延安。1945年10月11日，陈诚代表蒋介石到九龙坡机场为毛泽东送行。1945年10月11日，毛泽东和张镇将军握手告别。1945年10月11日，重庆各界人士到机场送行。"},{"type":"paragraph","text":"1945年10月11日，毛泽东在机场和前往送行的南方局、办事处、新华日报工作人员告别。1945年10月11日，毛泽东和送行的张澜握手。1945年10月11日，毛泽东从重庆返回延安。图为毛泽东等在延安机场。1945年10月11日，毛泽东在延安机场。1945年10月11日，毛泽东在延安机场。1945年10月11日，毛泽东等在延安机场。1945年10月11日，毛泽东在延安机场。1945年10月11日，毛泽东在延安机场，"}],"authors":["毛泽东"],"dates":[{"year":1945}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":407,"page_end":421},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"772723b8a1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
