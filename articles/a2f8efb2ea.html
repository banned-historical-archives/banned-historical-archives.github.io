art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛泽东颂歌”演唱会将举行","authors":[],"parts":[{"type":"paragraph","text":"据新华社北京9月18日电 一台以“毛泽东颂歌”为题的“原人原唱”大型演出将出现在今年国庆节的北京舞台上。在这台集中了强大演员阵容和丰富表现手段的大型歌舞晚会上，一批脍炙人口的歌颂毛泽东同志的歌曲和一批深受人们欢迎的老中青歌唱家将与观众见面。"},{"type":"paragraph","text":"这台晚会集中了近年来国内舞台上罕见的演员阵容：才旦卓玛、郭兰英、王昆、寇家伦、吕文科、刘淑芳、张越男、苏盛兰、徐有光等老艺术家以忘我的激情重登舞台；六十年代、七十年代活跃在歌坛的马玉涛、胡松华、于淑珍、郭颂、罗天蝉、邓玉华、刘秉义、李双江、李文章、胡宝善、克里木、方初善、王凯平、卞小贞等著名歌唱家将再展歌喉。演出将于10月1日、2日在北京首都体育馆举行。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2f8efb2ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
