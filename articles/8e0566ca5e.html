[{"year":1980,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇同志《关于作家的修养等问题》发表"},{"type":"paragraph","text":"新华社北京7月2日电 刘少奇同志《关于作家的修养等问题》的重要谈话已在新出版的《文艺研究》第三期上正式发表。"},{"type":"paragraph","text":"刘少奇同志1956年3月5日在中国作家协会第二次理事会扩大会议期间同周扬、刘白羽同志的这次谈话，虽然不长，但是涉及面较广。他针对当时文艺界的实际，就八个方面的问题谈了意见。这八个问题是：关于业余作家，关于作家的修养，关于减轻作家的文学行政工作，关于文学编辑，关于作家体验生活，关于党、政府和负责同志对作品的批评以及作家怎样对待这些批评，关于稿酬，关于社会主义的积极性和热情。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e0566ca5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
