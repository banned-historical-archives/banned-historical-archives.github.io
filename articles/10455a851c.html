tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席会见蒙博托总统等扎伊尔贵宾","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年十二月十七日讯 毛泽东主席今天会见了扎伊尔共和国总统蒙博托·塞塞·塞科及其随行人员。"},{"type":"paragraph","text":"会见时，毛主席同蒙博托·塞塞·塞科总统亲切握手，互致问候。毛主席对蒙博托·塞塞·塞科总统再次访问我国，对其他扎伊尔贵宾前来我国访问，表示欢迎。"},{"type":"paragraph","text":"参加会见的蒙博托·塞塞·塞科总统的随行人员是：外交和国际合作事务国务委员翁巴—迪—吕泰特、青年和体育国务委员桑帕萨·卡韦塔·米隆贝、党校校长潘加·卡桑达、国民教育国务委员马博利亚·伊南戈·特拉·布瓦托、总统办公室主任比森吉马纳·鲁韦马、扎伊尔驻中国大使恩古武卢·卢邦达和总统主要顾问莫科洛·瓦·姆庞博。"},{"type":"paragraph","text":"毛主席同扎伊尔贵宾一一握手以后，同蒙博托·塞塞·塞科总统、翁巴—迪—吕泰特和莫科洛·瓦·姆庞博进行了亲切友好的谈话。"},{"type":"paragraph","text":"国务院副总理邓小平，外交部副部长王海容、副司长齐宗华、罗旭、唐闻生参加了会见和谈话。（附照片）"},{"type":"paragraph","text":"毛泽东主席同蒙博托·塞塞·塞科总统亲切握手。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10455a851c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
