art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“有了毛主席；我们就有了希望”","authors":[],"parts":[{"type":"paragraph","text":"在非洲人民心目中，毛泽东思想就是革命，就是希望，就是胜利。中国青年代表团今年访问布拉柴维尔时，在街上碰到一位刚果（布）青年组织的干部，手里拿着一本中国刊物《万年青》。他翻开印有毛主席象片的一页，深情地端详着，对中国朋友说：“你们看，毛主席正在深思。他看得多么远，想得多么宽啊！毛主席，他不仅考虑着中国的问题，他还思考着世界的问题。毛主席，他不仅想到今天，他还想到未来。”说着，他的眼光闪亮起来，久久凝视着前方……。在坦桑尼亚，一位到过中国的青年组织负责人，怀着对毛主席的无比信赖，对中国朋友说：“毛泽东是东方的红太阳。有了毛主席，我们就有了希望。我们流尽最后一滴血，也要跟着毛泽东。”这个非洲朋友说话的时候声调激动，充满信心，好象在他的面前一个光采夺目的非洲已经展示出来了。"},{"type":"paragraph","text":"（摘自《中国青年报》）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a5a254e8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
