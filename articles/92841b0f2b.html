<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"修正主义战争文学的黑样板","authors":["凌隆钧"],"dates":[{"year":1968,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东师范大学红卫兵　凌隆钧"},{"type":"paragraph","text":"我们伟大领袖毛主席英明指出:“利用小说进行反党活动，是一大发明。凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。”正因为《红日》是反对毛主席的光辉军事思想，为国民党反动派招魂的大毒草，所以《红日》一出笼，立即得到反革命修正主义文艺黑线总头目周扬的赞扬和喝采。在全国第三次文代会上，周扬把《红日》吹捧为“中国第一部战争文学的巨著”，使《红日》成为修正主义战争文学的黑样板，从此，吴强爬上了修正主义战争文学主将的“宝座”。并且开动机器，让《红日》大量出版，流毒全国。"},{"type":"paragraph","text":"不仅如此，周扬一伙从一个更大的反革命目标出发，还把吴强和《红日》推荐给苏修。真是“心有灵犀一点通”，叛徒特务是亲家。《红日》这部大毒草立即得到苏修的赏识和青睐，很快地就被翻译成俄文出版。吴强立即为《红日》俄文版写序。富有反革命经验的吴强，对苏修的意图心领神会。为了迎合苏修叛徒集团疯狂反对毛泽东思想的政治需要，吴强把《红日》中文版序言中装门面，作幌子的“毛泽东的战略战术思想”几个字也一笔删掉了!把矛头直指我们伟大领袖毛主席，直指战无不胜的毛泽东思想。在俄文版序言中，他竟无耻地声称，他与苏修叛徒集团是“共同奋斗的亲密战友”。真是一语泄露了天机。吴强与苏修本来就是一丘之貉!《红日》俄文版序言是一纸公开叛变的宣言书，它公开宣言反对毛主席，反对毛泽东思想，公开宣言把自己出卖给苏修叛徒集团。"},{"type":"paragraph","text":"为了充分发挥《红日》这部毒草小说的反革命作用，文艺黑线的总头目周扬在一九六○年又派国民党反动派特务吴强作为中国作家代表团的团长赴苏访问。苏修还专门为吴强召开了一个军事小说作家座谈会，交流反革命经验。就这样，吴强便成了以苏修叛徒集团为中心的现代修正主义文艺黑线上的黑干将。难怪吴强一离开中国，就情不自禁地说:“在苏联，我感到就象在家里一样!”真是恬不知耻，卑鄙至极!"},{"type":"paragraph","text":"吴强之所以在《红日》出版之后，得到周扬的赏识，飞黄腾达，原因只有一个，这就是《红日》的出笼，适应了帝、修、反在中国复辟资本主义的政治需要。我们一定要高举毛泽东思想伟大红旗，把吴强和他的大毒草《红日》彻底批深批臭!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92841b0f2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
