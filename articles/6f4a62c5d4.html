ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于将介石反共情况的估计给周恩来的通报","alias":"","parts":[{"type":"paragraph","text":"关于蒋介石反共情况的估计"},{"type":"paragraph","text":"给周恩来的通报"},{"type":"paragraph","text":"（1941年2月26日）"},{"type":"paragraph","text":"蒋介石除对我秘密党及办事处逞凶外，他处绝无办法，苏北方面韩德勤完了，王懋功、冷欣等决不能去，我打李长江后有发展。皖西方面，我挺进团已到桐城、潜山。大别山方面，我李先念正向鄂东发展，桂系已应付不暇。淮北方面，李仙洲亦绝不能深入。皖南方面，我正派曾希圣过江收容，再在芜湖一带创立根据地，项英一部在浙境孝丰活动。三四月间德必攻英，英必被打得七零八落，那时蒋必大慌。故国内外形势日益于我有利。蒋介石反共是一定的，但大举是不可能的，蒋介石手忙脚乱之时快要到了。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":2,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":454,"page_end":454},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f4a62c5d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
