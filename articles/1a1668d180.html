ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"望以有力兵团东渡辽河歼灭营口一带之敌","alias":"","parts":[{"type":"paragraph","text":"望以有力兵团东渡辽河歼灭营口一带之敌!"},{"type":"paragraph","text":"（1948年10月27日）林、罗、刘："},{"type":"paragraph","text":"本日十七时电悉。（一）围歼五个军，俘敌数万，极为欣慰。（二）当面敌人解决后，望以有力兵团（不少于三个纵队）星夜兼程东进，渡辽河，歼灭营口、牛庄3、海城一带之敌，阻塞敌人向海上的逃路。（三）廖兵团?被歼后，蒋介石将从葫芦岛运一部兵力加强营口，并令沈阳一带敌军向营口迅速退却，此点你们必须充分地估计到。（四）如果在目前数日内，沈阳一带敌军已经或正在向营口逃跑，则你们全军须迅速向营口、海城方向进击。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十七日二十三时半"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]指1948年10月27日17时林彪、罗荣桓、刘亚楼给中共中央军委的电报。电报说：“一、廖兵团五个军已全部被包围和被击溃，已俘敌数万，俘虏中已查出副军长一名、师长一名，目前正在猛烈扩张战果中。二、由锦西北上之敌，本日向我塔山阵地进犯，我正顽抗中。”"},{"type":"paragraph","text":"[3]牛庄，镇名，位于辽宁省海城市西北。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":124,"page_end":124},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a1668d180"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
