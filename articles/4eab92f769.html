<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"戴岂心公开叫嚣：“我们要自搞一套”！","authors":["新华社"],"dates":[{"year":1957,"month":8,"day":6}],"is_range_date":false,"parts":[{"text":"戴岂心公开叫嚣：“我们要自搞一套”！","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社上海４日电:上海水产学院最近揭发出一个阴险毒辣的反社会主义、反对党的领导的小集团，这个集团的头子是水产学院九三学社支社主任委员、水产加工系教授戴岂心。","type":"paragraph"},{"text":"早在１９５２年戴岂心调来水产学院不久，他就纠结一些对党不满的人形成反党小集团。","type":"paragraph"},{"text":"在这次“鸣”“放”中，戴岂心在九三、民盟的联席会上，他说：“水产学院之所以有问题，主要是党委领导不行。”“我们要自搞一套。”","type":"paragraph"},{"text":"戴岂心诽谤党委两位副书记说：“只能在家里带孩子。”他几次挑拨引诱刘副院长（非党员）“与党抗衡”；及至引诱不成，他即马上摆出狰狞面孔骂刘副院长，甚至狂妄地说：“刘如不照我的意思做，要搞大民主给他看。”","type":"paragraph"},{"text":"戴岂心甚至得意忘形地叫道：“我的目的就是要在幕后控制水产学院，要变水产学院为资本主义性质的学校，要由我戴岂心指挥。”","type":"paragraph"},{"text":"为了控制水产学院的领导权，戴岂心等又集中攻击人事科，先造谣污蔑“人事科乱得很，糟得很”，“学校主要矛盾在人事科”，然后把他的爪牙打入整风中成立的人事处理小组，说什么“我们是法官。我们要以审判者的姿态审判人事科长。”大叫“要立即撤换××科长。要公开思想改造与肃反档案材料”。说什么“人员调动一定要通过工会”。事实上，戴岂心早有一个“组阁计划”，谁任什么职务，谁抓什么，都计划好了，只缺人事科长一职。但是他曾向人说过：“人事科长难道不能由非党人士充任么？”全院二十一个教研组，被戴岂心集团控制的就有十八个。","type":"paragraph"},{"text":"在这次反右派斗争中，全校师生揭露了戴岂心的凶恶面目以后，戴岂心百般狡赖，他说：“不要紧，我的朋友研究过，共产党的规律是开始大张旗鼓，最后就无声无息了。”这个反党小集团骨干分子之一的骆启荣遵命大耍无赖手段，公然叫嚣“我就是拒不交代，顽抗到底”，“杀我的头也可以”。","type":"paragraph"},{"text":"戴岂心等右派分子的顽抗态度，激起了学院教职员工的万分愤慨，他们向这个反党小集团的头子戴岂心表示说：“你一年不投降，斗你一年，你顽抗一辈子，就斗你一辈子！”","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月6日，原标题为“彻底打退右派对高等学校的进攻，戴岂心公开叫嚣：‘我们要自搞一套’！”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4eab92f769"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
