tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席指引的道路我们走定了","authors":["北京空军学习毛主席著作积极分子代表大会代表？副班长","马林华"],"parts":[{"type":"paragraph","text":"十一月十三日，我见到了全国人民和全世界人民心中最红最红的红太阳毛主席。在这万分幸福的时刻，心潮逐浪热泪流，我什么话也说不出来了，只是一个劲地高呼：毛主席万岁！万万岁！祝毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"临来开会时，我们支农的狮子沟大队的贫下中农社员拉着我的手说：小马！到了北京见到了毛主席，可别忘了给咱贫下中农问候他老人家，咱贫下中农日夜想念他老人家，他老人家指引的道路我们走定了。今天终于实现最美好的心愿，我见到了毛主席。我要把毛主席身体非常非常健康，精力非常非常充沛的特大喜讯告诉他们，让大家和我一起分享这最大最大的幸福！"},{"type":"paragraph","text":"毛主席啊，毛主席！是您亲自发动和领导的无产阶级文化大革命，摧毁了反革命的资产阶级司令部，斩断了中国赫鲁晓夫伸向农村的魔爪，彻底粉碎了他妄图复辟资本主义的罪恶阴谋。当您老人家发出“抓革命，促生产”的伟大号召后，广大贫下中农最听您的话，掀起了抓革命、促生产的新高潮。狮子沟大队的农业生产今年取得了有史以来最大的丰收。是您老人家的“斗私，批修”的伟大号召，进一步促进了社员破私立公，实现了革命的大联合和革命的“三结合”。"},{"type":"paragraph","text":"毛主席啊，毛主席！我们向您老人家宣誓：我们一定要把您交给的“三支”“两军”任务完成得好上加好，把山沟办成毛泽东思想的大学校，让您的光辉思想占领一切阵地！我们一定虚心地向贫下中农社员学习，在群众斗争的大风雨中锻炼改造自己，把自己造就成为坚强的无产阶级革命事业的可靠接班人。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e2caae89a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
