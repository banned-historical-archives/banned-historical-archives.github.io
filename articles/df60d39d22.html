authors":["新华通讯社","粮食部"],"dates":[{"year":1961,"month":12,"day":15}],"is_range_date":false,"parts":[{"text":"各地入库秋粮发热、霉变情况仍很严重","type":"title"},{"text":"新华通讯社粮食部","type":"authors"},{"text":"本刊讯  最近各地入库秋粮水分大，发热、霉变、生虫等事故仍十分严重。据黑龙江、吉林、江苏、浙江等十一个省的不完全统计，高水分粮食达五十八亿五千万斤。湖北、陕西、吉林、河北、浙江、贵州、四川等省有发热粮食二亿五千万斤。河北、陕西、贵州、四川、吉林等省霉坏粮食达一百五十余万斤。江苏、湖北、湖南三省库存虫害粮达十一亿斤。类似现象其他地区也有发生。","type":"paragraph"},{"text":"以上情况，已经引起了各地党政领导的重视，并已采取措施加强粮食保管工作。","type":"paragraph"},{"text":"(粮食部保管检验处供稿)","type":"paragraph"},{"text":"来源：1961年12月15日新华社《内部参考》","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df60d39d22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
