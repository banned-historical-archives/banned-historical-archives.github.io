authors":["刘立文","南开大学"],"dates":[{"year":1957,"month":5,"day":28}],"is_range_date":false,"parts":[{"text":"我的确怀疑我们现在是否具有宪法上所规定的自由","type":"title"},{"text":"南开大学刘立文","type":"authors"},{"text":"[刘立文：南开大学中文系学生]","type":"subtitle"},{"text":"我的大字报贴出后遭到一群人的猛扑，有人警告我，说我是反革命，这是不值一驳的废话。你说我是反革命，你就应该马上通知公安局逮捕我，否则你就是包庇反革命。","type":"paragraph"},{"text":"我的确怀疑我们现在是否具有宪法上所规定的自由，我提几个具体问题：","type":"paragraph"},{"text":"1、如果保障人身自由，为什么在肃反斗争时可以由非司法检察公安机关对人实行软禁？","type":"paragraph"},{"text":"2、如果有新闻自由，为什么学习〈再论〉时大家那些不同意见不于刊登？为什么游国恩、吴祖湘的谈话在报纸发表时被取消了主要意思，只剩不关痛痒的几句话(见5月20日文汇报)。","type":"paragraph"},{"text":"3、如果有出版自由，为什么一部著作经一家出版社否定，便等于被判处死刑？","type":"paragraph"},{"text":" 来源：1957年5月31日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"050bdb2131"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
