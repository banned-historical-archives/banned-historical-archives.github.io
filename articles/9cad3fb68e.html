更加确信，毛泽东思想是日本革命事业的理论基础","authors":[],"dates":[{"year":1966,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京29日电　东京消息:日本各界著名人士热烈欢呼中国再一次成功地进行核爆炸。"},{"type":"paragraph","text":"日本知名人士西泽隆二说:中华人民共和国以惊人的速度成功地进行核爆炸，必将使美帝国主义和现代修正主义吓得发抖。他指出，这次新的核爆炸的成功，是毛泽东思想的又一新胜利。"},{"type":"paragraph","text":"亚非人民团结日本委员会理事长坂本德松说，这次新的核爆炸，是在由毛主席亲自领导的规模宏伟的无产阶级文化大革命中获得成功的，这说明，中国在阶级斗争、生产斗争、科学实验三方面都取得了伟大的硕果。坂本说，正在美帝国主义和苏联现代修正主义相互勾结，对越南展开“以炸迫和”阴谋的时候，中国核爆炸的成功，是具有重大的意义的。"},{"type":"paragraph","text":"日中友好协会(正统)总部副会长伊藤武雄说:中国的新的核爆炸，是对于美日反动派和苏联现代修正主义追随者的重大打击。尽管他们拼命地进行恶意宣传，但是越来越多的日本人民认识到，中国的核爆炸对于维护世界和平是有着重要意义的。"},{"type":"paragraph","text":"日本出版工会协议会中央执行委员长楢桥国武说:正当美帝国主义企图扩大侵略战争时，中国把核武器的科学技术提高到一个新的水平，这将成为阻止侵略战争扩大的巨大力量，也是对争取民族独立的日本工人阶级的巨大鼓舞。"},{"type":"paragraph","text":"早稻田大学学生佐山忠说，中国核爆炸的成功是毛泽东思想的胜利。他说，日本人民更加确信，毛泽东思想是日本革命事业的理论基础。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cad3fb68e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
