ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"致林彪、罗荣植、刘亚楼电","alias":"","parts":[{"type":"paragraph","text":"致林彪、罗荣桓、刘亚楼电川"},{"type":"paragraph","text":"（1948年10月22日）林、罗、刘："},{"type":"paragraph","text":"本日十三时半电?悉。沈敌总退却情况已明，你们决心及处置都是正确的。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十二日二十一时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]1948年10月22日13时半，林彪、罗荣桓、刘亚楼致电军委并东北局，电文内称：“1．谍息，五十三军一三○师及原在辽阳之五十二军第二师，均已到巨流河、新昆地区。在铁岭之五十二军部队，亦有撤退象征，可见敌现已开始向锦州总退却。2．决心照原定计划在新立屯、黑山地区与敌决战。攻锦各部已接近集结地区，两三天内可以在北镇、黑山地区集结完毕，长春方面之十二纵已达四平附近，各独立师今日黄昏开始南下。3．已令六纵今晚出动，明日包围彰武之敌一个师，以拖住敌之尾，吸引敌回头兵援，分散"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":98,"page_end":98},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0f192a591"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
