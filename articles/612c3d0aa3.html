":[{"year":1971,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议美国垄断资本剥削"},{"type":"paragraph","text":"哥斯达黎加工人罢工"},{"type":"paragraph","text":"新华社讯　圣约瑟消息：哥斯达黎加美资"},{"type":"paragraph","text":"“联合果品公司”的四千名工人最近罢工，抗议美国垄断资本的残酷剥削，要求增加工资和改善生活条件及其他福利待遇。"},{"type":"paragraph","text":"这次工人的罢工已经扩展到哥斯达黎加整个南部地区，使得美资“联合果品公司”在哥斯达黎加的全部种植园陷于瘫痪。"},{"type":"paragraph","text":"为支持“联合果品公司”工人反抗美国垄断资本的斗争，哥斯达黎加戈尔菲托港的全体码头工人举行了声援罢工。这一罢工使美资"},{"type":"paragraph","text":"“联合果品公司”堆积在码头准备出口的香蕉无法运送。“联合果品公司”工人的斗争还得到哥斯达黎加学生的支持。（附图片）"},{"type":"paragraph","text":"英国各行业工人不久前举行全国规模的大罢工，抗议英国政府炮制镇压工人斗争的“劳资关系法案”。"},{"type":"paragraph","text":"新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"612c3d0aa3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
