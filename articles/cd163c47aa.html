rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让毛主席的建军路线永放光芒","authors":["二级战斗英雄/副部队长王平东"],"parts":[{"type":"paragraph","text":"一轮红日高高升起，灿烂的光辉照亮了大地。多么光荣，多么幸福，我们见到了最最敬爱的伟大领袖毛主席！"},{"type":"paragraph","text":"毛主席啊，毛主席！广阔宇宙，盛不下您对我们的无限恩情；四海为墨，写不尽我们对您的无限热爱。我们海军战士的成长，每一步都离不开您的光辉思想的哺育。是您老人家发出英明的战斗号召：“为了反对帝国主义的侵略，我们一定要建立强大的海军。”是您老人家亲目视察了海军舰艇部队，对人民海军给予无限关怀和殷切期望！但是，中国赫鲁晓夫和反革命修正主义分子彭德怀、罗瑞卿，对抗您光辉的建军路线，拚命鼓吹“海军特殊”论、“唯武器”论，妄图把我们引上邪路。我们高举您光辉思想的伟大红旗，抵制了彭德怀、罗瑞卿推行的资产阶级军事路线。我们深刻认识到，要建立强大的海军，必须坚决贯彻您的无产阶级建军路线。"},{"type":"paragraph","text":"毛主席啊，毛主席！最近您教导我们：“无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。”反复学习您的最新指示，我们深刻认识到，中国赫鲁晓夫和彭德怀、罗瑞卿，就是帝国主义、资产阶级和国民党反动派的代理人，是无产阶级专政下最危险的敌人。在您的最新指示指引下，我们深入地开展了革命大批判。狠批中国赫鲁晓夫和反革命修正主义分子彭德怀、罗瑞卿的“海军特殊”论、“唯武器”论、“军事第一”、“技术第一”等反动谬论。通过革命大批判，广大指战员的路线斗争觉悟大大提高，对您的革命路线更加无比热爱，对中国赫鲁晓夫的资产阶级反动路线更加仇恨。"},{"type":"paragraph","text":"毛主席啊，毛主席！我们深深体会到，批修越狠，对您老人家越亲；批修越深，跟您老人家越紧。我们要学习门合同志的彻底革命精神，把革命大批判深入持久地开展下去，让您的无产阶级革命路线千秋万代永放光芒！DW：北海舰队"}],"alias":""},"tags":[{"name":"罗瑞卿","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd163c47aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
