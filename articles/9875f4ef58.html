es":[{"year":1950,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"克里姆林宫举行盛大宴会"},{"type":"paragraph","text":"斯大林主席欢宴毛主席"},{"type":"paragraph","text":"【新华社北京十七日电】塔斯社莫斯科十七日讯：二月十六日，苏联部长会议主席斯大林，在克里姆林宫欢宴中华人民共和国中央人民政府主席毛泽东先生及政务院总理兼外交部长周恩来先生。"},{"type":"paragraph","text":"赴宴者有：毛泽东先生，周恩来先生，东北人民政府副主席李富春先生，中华人民共和国驻苏大使王稼祥先生，陈伯达教授，新疆省人民政府副主席赛福鼎先生，伍修权先生，欧阳钦先生，边章五将军，师哲先生和叶子龙先生。"},{"type":"paragraph","text":"苏方出席者有：什维尔尼克、莫洛托夫、马林科夫、贝利亚、伏罗希洛夫、米高扬、卡冈诺维奇、赫鲁舍切夫、布尔加宁、维辛斯基、华西列夫斯基元帅、孟希科夫、葛罗米柯、佐林、苏联驻中华人民共和国大使罗申、陆军上将施蒂门柯、准上将日加列夫、海军上将尤马谢夫及苏联驻中华人民共和国商务代表米古诺夫。"},{"type":"paragraph","text":"宴会在亲切而友好的气氛中进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9875f4ef58"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
