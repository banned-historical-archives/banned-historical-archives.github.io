<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d","name":"斯大林选集（诸夏怀斯社2017年5月）","internal":false,"official":false,"type":"pdf","author":"斯大林，诸夏怀斯社2017年5月","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d.pdf"],"article":{"title":"与哥穆尔卡和明茨关于波兰局势的谈话内容","alias":"","parts":[{"type":"paragraph","text":"与哥穆尔卡和明茨"},{"type":"paragraph","text":"关于波兰局势的谈话内容"},{"type":"paragraph","text":"（1945年11月14日）"},{"type":"paragraph","text":"抄送莫洛托夫、贝利亚、马林科夫、米高扬、维辛斯基"},{"type":"paragraph","text":"秘密"},{"type":"paragraph","text":"送莫洛托夫同志并四人小组悦"},{"type":"paragraph","text":"谈话未做记录（波兰人认为不需要做记录），因此我以问答形式转述本次谈话的内容。"},{"type":"paragraph","text":"波兰人问：苏联领导人对波兰，其中包括对波兰共产党人的态度是否已经改变？"},{"type":"paragraph","text":"斯大林答：没有也不可能改变。我们对波兰人和对波兰共产党人像从前一样友好。"},{"type":"paragraph","text":"问：是否需要通过一部关于对大型工业和银行实施国有化的法案？"},{"type":"paragraph","text":"答：在贝奈斯通过这样一项法案之后，在波兰也必须通过这样一项法案的时刻已经到来。"},{"type":"paragraph","text":"问：在波兰是否需要允许以租让或其他某种形式吸收外国资本？"},{"type":"paragraph","text":"答：这个问题非常重要，因此需要由波兰人自己去深思熟虑。"},{"type":"paragraph","text":"注：波兰人只字未提他们当时曾经拒绝了苏联关于建立合股公司的建议。我得到的印象是波兰人不反对在这方面向外国资本做出让步。"},{"type":"paragraph","text":"问：是否应当接受波兰社会党关于取消粮食收购和宣布实行没有限价的自由市场运作的建议。"},{"type":"paragraph","text":"答：不论这样做是多么令人不快，波兰人迟早都不得不采取这一措施，因为在非苏维埃制度下，又是在没有战争的情况下，是不可能长久地保持粮食收购和限价体制的。"},{"type":"paragraph","text":"司：我是否反对波兰人向美国人或者英国人借债，我是否认为可以在或多或少对其在波兰的使用自由加以限制的条件下接受这种借贷？"},{"type":"paragraph","text":"答：债可以借，但是要在没有任何限制波兰使用借款权利的条件的情况下。"},{"type":"paragraph","text":"问：可否同法国签订互助条约？"},{"type":"paragraph","text":"答：可以，但是要使该条约完全符合波兰与苏联之间签订的互助条约的精神。"},{"type":"paragraph","text":"问：是否应当深究关于特欣的问题\"，苏联能否在波兰同捷克斯洛伐克人就特欣问题举行的谈判中给波兰以支持？"},{"type":"paragraph","text":"答：我不主张深究这个问题，因为在波兰得到了西里西亚的能产焦炭的煤之后，波兰已经没有理由再要求把特欣划给波兰人了，因此苏联也就不可能在这件事情上给波兰人以支持。最好还是尽快消除这个同捷克斯洛伐克之间的纠纷问题，限制特欣地区的波兰人迁居波兰并恢复同捷克斯洛伐克的良好关系。在特欣地区波兰人迁居波兰的问题上，苏联在波兰人同捷克斯洛伐克举行的谈判中可以支持波兰人。"},{"type":"paragraph","text":"问：是否应当邀请联共（布）的代表出席不久将召开的波兰工人党代表大会？"},{"type":"paragraph","text":"答：最好还是不要邀请，以免反对派们说波兰工人党代表大会是在联共（布）的监督下进行的。"},{"type":"paragraph","text":"问：可否在波兰工人党代表大会上宣布说波兰工人党是早在战争之前已被取缔的波兰共产党路线和传统的继承者？"},{"type":"paragraph","text":"答：不需要这样做，因为尽管敌人们把波兰共产党说成是联共（布）的代理人，但实际上该党当时已经变成了毕苏茨基分子的代理"},{"type":"paragraph","text":"①）指波捷之间关于特欣地区归属问题的争论。人。最好在波兰党代表大会宣布说，波兰工人党是一个新的政党，它同波兰共产党的路线和传统并无联系。"},{"type":"paragraph","text":"问：我们关于把波兰的大选再推迟一年举行更为适宜的意见是否正确？"},{"type":"paragraph","text":"答：我想大选最好不迟于1946年的春天举行，因为不论从国内的还是国际的方面考虑，再往后推迟此次选举都将是困难的。"},{"type":"paragraph","text":"问：奥苏布卡-莫拉夫斯基表现很不好，如果他在近期内不能改正，我们想在选举进行之前就以朗格先生（现任波兰驻美国大使，是一位温和的波兰社会党人，据波兰人认为，他对共产党人颇具好感）取代他。您的意见如何？"},{"type":"paragraph","text":"答：如果你们没有别的办法，如果在目前情况下不能提贝鲁特为替补人选（波兰人认为这一作法不适宜），那么你们可以通过试试借助朗格来分化波兰社会党。请你们去同万达·利沃夫娜商量一下，她同朗格很熟。"},{"type":"paragraph","text":"后来的谈话涉及的是有关从罗科索夫斯基的储备中借给波兰人3吨谷物种籽问题和关于满足波兰人有关铁路运输方面的请求问题。但这些事情你们均已知晓。"},{"type":"paragraph","text":"斯大林"},{"type":"paragraph","text":"1945年11月14日于莫斯科"},{"type":"paragraph","text":"选自新编《斯大林全集》"},{"type":"paragraph","text":"档案附卷十第315—317页"},{"type":"paragraph","text":"①）罗科索夫斯基元师，时任苏联北方军队集群总司令，1949年起任波兰国防部长和部长会议副主席。"}],"authors":["斯大林"],"dates":[{"year":1945,"month":11,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":2797,"page_end":2799},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8e61697fd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
