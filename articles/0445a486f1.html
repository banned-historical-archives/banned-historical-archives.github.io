ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"引证不良战例以为鉴戒","alias":"","parts":[{"type":"paragraph","text":"引证不良战例以为鉴戒"},{"type":"paragraph","text":"（1948年10月28日）各同志："},{"type":"paragraph","text":"兹将林罗十月二十三日发给他们部队的一个指示电\"转发给你们作参考。关于作战在以迅速动作将敌分割包围之后，不要慌忙攻击，要待准备好了之后，然后举行攻击一项问题，请你们加以注意。电中所举沙后所、王道屯的不良战例，是在九月间他们两个独立师攻击兴城、绥中时候的事。这种情形，恐怕不但东北部队有，你们所属部队也会有的，不过你们在战术问题方面给我们反映太少，我们无从知道。这个问题确实值得注意，请你们在全军十部中进行教育，引证不良战例以为鉴戒。如果得到你们同意，请将此电及林罗电发给各纵队，引起大家的注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十八日"},{"type":"paragraph","text":"[1]指1948年10月23日9时林彪、罗荣桓、刘亚楼、谭政给各纵并报中共中央东北局和中共中央军委的电报。电报说：各级干部每次攻击之前，均须走在部队前面，亲自侦察地形和布置攻击准备。但并不是指随便暴露目标，或在部队冲锋时也跑在前面，“须严戒沙后所、王道屯的打法。那种打法在未侦察地形状况，未等部队大部到齐，未将兵力火力很好配备，未将敌人退路截断，即仓促地乱打乱冲”。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":127,"page_end":127},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0445a486f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
