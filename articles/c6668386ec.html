ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"以锦州地区为战略板纽布置工作","alias":"","parts":[{"type":"paragraph","text":"以锦州地区为战略枢纽布置工作"},{"type":"paragraph","text":"（1945年11月14日）冀热辽分局，并告东北局、普察冀局及黄、梁\"："},{"type":"paragraph","text":"以锦州为中心之地区为我主力集中作战之战略枢纽，冀热辽分局必须兼顾东南两面，除南面以粉碎从北平向承德进攻之蒋军为目标创造战场、布置工作前已电告外，望迅即派大批干部并有得力领导同志去朝阳建立领导中心，将干部分配于朝阳、凌源、阜新、绥中、兴城、锦西、锦州、义州各县，其任务为发动民众，镇压反动，组织民兵游击队及地方军，创造战场，援助锦州、山海关主力之作战，并为我军建立稳固后方，设立兵站线，供给粮食，收容伤病，输送干部，确保锦、朝铁路线于我手。在这一工作上，分局应接受东北局之指导意见。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"戌寒[1]黄，指黄克诚，当时任新四军第三师师长兼政治委员。梁，指梁兴"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":11,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":97,"page_end":97},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6668386ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
