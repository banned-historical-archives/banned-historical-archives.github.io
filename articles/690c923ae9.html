art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国将对第三世界尽到自己的力量","authors":[],"parts":[{"type":"paragraph","text":"据新华社5月24日讯 中共中央副主席邓小平今天上午会见了由第一副议长埃米利亚诺·依萨萨·埃纳奥和副议长维克托·卡德纳斯·哈米略率领的哥伦比亚参议院代表团，同他们进行了友好的谈话。"},{"type":"paragraph","text":"邓小平说，中哥两国建交不久，但交往不少，代表团这次来访象征着两国关系的发展。他说，中哥两国同属第三世界，有许多共同点，通过相互之间的交往加强彼此的了解，才能真正增进彼此之间的友谊。中国将努力发展自己的国家，并对第三世界尽到自己的力量。"},{"type":"paragraph","text":"依萨萨第一副议长说，中国是具有悠久文化传统的国家，我们对中国人民的毅力和智慧表示钦佩。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"690c923ae9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
