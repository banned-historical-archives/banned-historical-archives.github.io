script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在深入批邓，掀起反击右倾翻案风斗争新高潮的大好形势下又一批新影片将在“五一”节期间上映","authors":[],"dates":[{"year":1976,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年四月二十九日电　在全国各族人民深入批邓，掀起反击右倾翻案风斗争新高潮的大好形势下，又一批新摄制的故事片、戏曲片、美术片、科教片和新闻纪录片，将在“五一”节期间与广大工农兵见面。"},{"type":"paragraph","text":"这次上映的新故事片有四部:彩色故事片《牛角石》，描写广大贫下中农在党的领导下，坚持社会主义道路，同推行“三自一包”修正主义路线的党内走资派作斗争的故事。彩色故事片《阿夏河的秘密》，反映我国少数民族少年儿童积极参加阶级斗争，机智勇敢地破获一个盗窃集团的事迹。故事片《长空雄鹰》，通过对中国人民志愿军空军某部粉碎美帝“空中绞杀战”的战斗描绘，表现了我人民志愿军英勇顽强的斗争精神，歌颂了毛主席的军事思想和无产阶级国际主义精神。此外，还有描写抗日小英雄斗争事迹的彩色短故事片《金锁》。"},{"type":"paragraph","text":"三部彩色戏曲片，是从全国文艺调演中选择的山东吕剧《管得好》、莱芜梆子《三定桩》、山东吕剧《半边天》，分别拍摄而成的。"},{"type":"paragraph","text":"这次上映的彩色美术片，有剪纸影片《金色的大雁》，描写了藏族少年儿童同反动牧主破坏活动作斗争的故事；还有动画片《试航》，是根据同名小说改编的，反映了我国造船工业上的两条路线斗争。"},{"type":"paragraph","text":"新上映的新闻纪录片，有进行革命传统教育和两条路线斗争教育的《井冈山》，有反映工业学大庆、农业学大寨的成就，歌颂毛主席独立自主、自力更生方针的《百舸争流》、《西藏高原大寨花》、《新径人民展宏图》、《凯旋的勘探一号》、《战金山——前进中的上海石油化工总厂》、《堡堂盛开大寨花》，以及进行阶级教育的《仇满万人坑》。"},{"type":"paragraph","text":"科教片《东风赞》、《液压滑模施工》、《太阳能热水器》、《不重磨刀具》、《消烟除尘》、《机器插秧好》、《电子雕刻印花》、《改造田间小气候》、《5406菌肥好》、《天然气的开采和利用》、《雷电》、《巧用水泵》等，介绍了工农业等各条战线的新成就、新技术、新经验，宣传了辩证唯物主义。"},{"type":"paragraph","text":"这批新影片的摄制完成，是反击右倾翻案风斗争的丰硕成果。广大电影工作者，在各级党组织的领导下，认真学习毛主席的一系列重要指示，奋起批判邓小平的反动罪行和他推行的修正主义路线，在反击右倾翻案风的斗争中激发了极大的革命热情。他们坚持抓革命、促生产，发扬不怕疲劳和连续作战的战斗作风，胜利完成这批影片的摄制工作，以实际行动回击了右倾翻案风。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山东文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"363e408510"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
