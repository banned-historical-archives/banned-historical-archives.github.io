rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席革命路线的伟大胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社二十七日讯 争取安哥拉彻底独立全国联盟打电报向中国共产党第九次全国代表大会表示热烈祝贺。贺电全文如下："},{"type":"paragraph","text":"中国北京"},{"type":"paragraph","text":"中国亚非团结委员会："},{"type":"paragraph","text":"争取安哥拉彻底独立全国联盟和它的争取安哥拉解放武装部队向毛泽东主席、代表大会主席团的同志们、中国共产党和兄弟的中国人民致以最热诚的革命的祝贺。现在，正当中国共产党第九次全国代表大会的具有历史意义的会议即将结束的时候，争取安哥拉彻底独立全国联盟以热烈的革命精神祝贺中国共产党第九次全国代表大会。"},{"type":"paragraph","text":"这次代表大会的召开对于中国人民和全世界革命人民具有重大历史意义。它标志着毛泽东主席的正确革命路线的伟大胜利和无产阶级文化大革命的胜利。无疑，中国共产党第九次全国代表大会是对世界革命运动和正在同葡萄牙殖民主义进行斗争的安哥拉革命人民的巨大支持。"},{"type":"paragraph","text":"人民的代表大会万岁！"},{"type":"paragraph","text":"无产阶级文化大革命万岁！"},{"type":"paragraph","text":"毛主席的正确路线万岁！"},{"type":"paragraph","text":"人民战争万岁！"},{"type":"paragraph","text":"争取安哥拉彻底独立全国联盟"},{"type":"paragraph","text":"一九六九年四月二十一日"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"669bbaf051"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
