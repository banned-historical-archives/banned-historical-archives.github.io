ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"对国共两党谈判提出的八项原则性意见","alias":"","parts":[{"type":"paragraph","text":"对国共两党谈判提出的"},{"type":"paragraph","text":"八项原则性意见！"},{"type":"paragraph","text":"（1945年9月2日）"},{"type":"paragraph","text":"一、在国共两党谈判有结果时，应召开有各党各派和无党派人士代表参加的政治会议；"},{"type":"paragraph","text":"二、在国民大会问题上，如国民党坚持旧代表有效，中共将不能与国民党成立协议；"},{"type":"paragraph","text":"三、应给人民以一般民主国家人民在平时所享有之自由，现行法令当依此原则予以废止或修正；"},{"type":"paragraph","text":"四、应予各党派以合法地位；五、应释放一切政治犯，并列入共同声明中；六、应承认解放区及一切收复区内的民选政权；"},{"type":"paragraph","text":"七、中共军队须改编为四十八个师，并在北平成立行营和政治委员会，由中共将领主持，负责指挥鲁、苏、冀、察、热、绥等地方之军队；"},{"type":"paragraph","text":"八、中共应参加分区受降。[1]毛泽东于9月2日上午约王世杰到桂园商谈，周恩来、王若飞在重庆谈判期间，毛泽东和蒋介石合影。重庆谈判期间，毛泽东和蒋介石合影。重庆谈判期间，毛泽东和赫尔利、蒋介石合影。重庆谈判期间，国共两党代表合影。重庆谈判期间，毛泽东和蒋介石相互敬酒。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间的毛泽东。重庆谈判期间，郭沫若赠送给毛泽东的欧米茄手表。"},{"type":"paragraph","text":"饮云缘"},{"type":"paragraph","text":"重庆谈判期间，中苏文协召开大会，毛泽东出席大会。图为大会会场和相关报道。"},{"type":"paragraph","text":"九四五鲜毛潭薄《毛泽东与蒋介石》（中国画）"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":9,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":366,"page_end":382},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4540e1a3d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
