<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津市高等学校打虎战绩很大　已捕获老虎八、九十只","authors":[],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"parts":[{"text":"天津市高等学校打虎战绩很大　已捕获老虎八、九十只","type":"title"},{"text":"【本刊讯】天津市各高等学校的三反斗争目前正达到激烈阶段。各校自今年一月初以来，已打出老虎约八、九十只。这些事实，有力地驳斥了有些人认为学校是“清水衙门”的错误论调，和证明资产阶级向教育部门猖狂进攻的严重性。","type":"paragraph"},{"text":"在运动中发现各校的贪污分子不仅有直接掌管财物的职工，还有自命“清高”的大学教授。贪污分子中很多都与奸商相互勾结，通同偷盗国家物资。譬如天津大学自解放后，政府曾拿出八十余亿元为该校增设了燃料大楼、教职工宿舍、库房等建筑四、五处，但由于该校从以校委会副主席赵玉振为主谋的，纠合校内部分职员(事务主任王德昌、校委会秘书韩少苏、会计科科长董冀平、会计盛家骧等)集团贪污受贿，商人从中偷工减料，致使国家遭受到很大的损失。据统计，只燃料大楼一项工程损失即达百分之五十(原包价为三十五亿八千万元)，该项工程完成后只一年光景，即发现该大楼地基一角已下陷，窗子也有的坏了。又如南开大学东院总务组职员傅璧臣(已逮捕)，勾结私商四合顺经理于和平(已逮捕)，曾经大量的偷盗了南大的电工器材价值一亿多元，傅犯更公开在校内设立小仓库，专供于和平大宗盗取。","type":"paragraph"},{"text":"利用职权在学校公开的贪污盗窃，这种现象几乎是很普遍的。南大就有以黄子坚(南大秘书长)为首勾结该校财务组韩茂之的一个贪污集团。黄子坚在解放后隐匿校产就有好几个亿，另还有个人及集体贪污情事尚在调查。在天津、南大、津沽等校的图书馆内并均发现有大宗的书籍被偷窃盗卖，他们偷书的花样很多，各校图书馆主任都有问题，他们把书偷走后又卖给学校，或卖给劝业场旧书摊上。","type":"paragraph"},{"text":"还有些人是名为教授而身为资本家的高等学校的“坐探”，如津沽大学机械系教授赵蕴山担任好几个资本家的机械顾问，该校建筑系十二个教授中有六个就有事务所(宋明哲身为某营造厂顾问，当该校计划在饭厅中装电扇事尚未决定时，而他就早泄漏给某营造商了。)他们在学校内一贯散布资产阶级思想毒素，替资本家吹嘘。天津大学采研系教授邓曰谟是资本家，他自己有一个事务所。据说在一九四九年他给农垦局设计高里区扬水站工程时，就曾以少报多，偷工减料，以次铁换好钢，由于他在设工时是用一些七拼八凑的零件，因此使这件工程在完成后有很多毛病，漏水、漏油、漏气。又如南大经济研究所郑钟锟(图书馆副馆长)，杨学通教授、鲍觉民，勾结私商，利用学术地位盗卖经济情报，杨学通自己坦白承认就卖过两次，得过私商一只最好的金表。又听说他们并曾公开向教育部要过有关经济的内部刊物，遭教育部拒绝。据说他们并曾把经济情报泄露给在美国的何濂(曾代张伯苓做南开校长，国民党要人)。","type":"paragraph"},{"text":"(摘自“天津日报”三月四日《情况通报》)","type":"paragraph"}],"comments":[],"origin":"1952年3月6日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21edf4881c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
