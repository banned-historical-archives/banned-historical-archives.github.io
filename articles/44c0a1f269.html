<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖北省委关于“五反”中对工商户的处理等几个问题的指示","authors":[],"dates":[{"year":1952,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"湖北省委关于“五反”中对工商户的处理等几个问题的指示","type":"title"},{"text":"各地“五反”除个别城市外大体皆已结束，多数总结报告已送省委，少数还未送来，我们从已有之报告中看到有以下几个问题，请各地、市委注意。","type":"paragraph"},{"text":"一、关于严重违法户和完全违法户之规定，各地在报告中均未详加说明，很难看出是否处理恰当。中央在争取“五反”斗争胜利结束的指示中，对于工商户分类标准规定：“应以其违法所得数目和违法情节作为同等重要的条件，二者应结合起来加以评定。”对于大户的处理规定：“一般是根据其违法数目和情节，更重要的是根据其政治条件。”这个规定是很重要的，各地是否认真依照此一规定进行处理，或有否偏向，应进行检查，力求作得正确。","type":"paragraph"},{"text":"二、关于补税退财问题，也看不出是否依照中央指示的“退现款、折公股、打欠条”三种办法处理。如果有未依此原则处理者，有因全部退现款而影响到该工商业者不能经营，于人民不利者，应即设法用贷款或其他办法予以补救。如正在追退现款，违法的工商业者困难不能全部交纳者，即应依照中央指示，按五、三、二比例处理。","type":"paragraph"},{"text":"三、各地通过“五反”运动是很好发展工会会员、党团员及提拔培养干部的机会，这一机会不应错过，应该认真地通过建设阶段，整顿与扩大工会组织，在工人店员中发展一批经过考验，联系群众，真正的积极分子入党入团。对于这一问题有些地方似作得不够，应该注意解决。","type":"paragraph"},{"text":"四、“五反”后正当经营的工商业者，得到保护鼓励，已开始积极经营，使各城市出现了工商业的上升气象，但遭到打击的一部分工商业者，目前仍有不少不敢大胆经营，应对这些工商业者进行宣传，说明今后只要守法，在工人监督下进行合法正当的经营，政府即将坚决保护，即会有发展前途，以解除其顾虑，鼓励其大胆地进行正当的工商业活动。这样对恢复与繁荣市场、加强城乡交流有利。","type":"paragraph"},{"text":"（本文源自：中共湖北省委党史研究室、中共湖北省委统战部编 《中国资本主义工商业的社会主义改造 湖北卷》  出版社：中共党史出版社  出版日期：1993年）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44c0a1f269"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
