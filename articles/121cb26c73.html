:[],"dates":[{"year":1972,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年十二月十六日电　越南劳动党、越南民主共和国国会和政府代表团团长、越南劳动党中央政治局委员、国会常务委员会主席长征，团员、越南劳动党中央政治局委员、国会常务委员会副主席黄文欢，团员、部长、中央农业委员会常务副主任严春菴，在出国访问途中，于今天下午乘专机到达北京。"},{"type":"paragraph","text":"同机到达北京的还有以越南民主共和国国会常务委员会副主席、越南妇女联合会主席阮氏十为团长的越南妇女联合会代表团，她们也是在出国访问途中路经北京的。"},{"type":"paragraph","text":"中共中央政治局委员张春桥，人大常委会委员胡愈之，外交部副部长韩念龙，中共中央对外联络部负责人申健，以及区棠亮、陆维钊、高建中、田树千等同志，前往机场迎接越南战友。"},{"type":"paragraph","text":"前往机场迎接的还有:正在北京的越南民主共和国外贸部副部长李班，越南民主共和国驻中国大使吴船和大使馆外交官员，越南南方共和驻中国大使阮文广和大使馆外交官员。"},{"type":"paragraph","text":"苏联驻中国大使托尔斯季科夫也到机场迎接。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"121cb26c73"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
