githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/d106aabf-7562-4574-a8bb-dfabdf5e4a64/1.jpg"],"article":{"title":"叶剑英同志在接见联络总站工作人员的讲话","alias":"","parts":[{"type":"paragraph","text":"叶剑英同志"},{"type":"paragraph","text":"在接见联格总站工作人员的讲活"},{"type":"paragraph","text":"革命的（根本）问题是政权的问题，夺取政权就要靠武装。现在政权已掌握在手中，经济革命已取得重大胜利，主要就是进一步把存在每个人头脑里所有资产阶极东西进行革命。不但要革到资产阶的，也要革自已的。要搞好这个草命，时间很长，不管城市、乡村都要进行，这个运动是主席亲自抓的。通过文化大革命把我们提高一步。就是要解决集体和个人，全局与局部的关系问题，这个间题已经到了提出解决的时候了。这样解决了。就可以大为提高人的思想革命化，大为提高战斗力。还有年青一代。十几年来他们受了旧的影响，灌输了一些资产阶级思想，我们要彻底肃清。要在这一代培养他们造反有理的革命精神，这样将来就不怕出修正主义。如果将来有一天有人敢搞修正主义。那么全国就把他推翻。另一方面就是挖修正主义根子。"},{"type":"paragraph","text":"文化大革命就是一场大的动员，大的战备，大的反对修正主义，是关系到我国和世界革命的前途，命运间题。现在一要抓粗积；二要抓政策；三要抓起律，！四要抓团结。但是不要急，要通过一段时间。"},{"type":"paragraph","text":"一完一"},{"type":"paragraph","text":"毛主席语录"},{"type":"paragraph","text":"革命不是请客吃饭，不是做文章，不是面锈花，不能那样雅致，那样从容不迫，文彬彬，那样温良恭傲让。草命是暴动，是一个阶推翻一个阶级的暴烈的行动。"},{"type":"paragraph","text":"《湖南农民运动考察报告》（一九二七"},{"type":"paragraph","text":"年三月），《毛泽东选集》第一卷第一八真"}],"authors":["叶剑英"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b3c97eeb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
