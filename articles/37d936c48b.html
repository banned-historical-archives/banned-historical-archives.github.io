script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"现代修正主义分子吹捧的“议会道路”再次破产印修拼凑的喀拉拉邦政府垮台","authors":[],"dates":[{"year":1969,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十七日电　新德里消息:印度修正主义分子搞的“和平过渡”的黑样板——喀拉拉邦政府，二十四日宣告倒台。这个曾经被现代修正主义分子大肆吹捧的政府的垮台，又一次揭穿了他们用来欺骗人民的所谓“议会道路”的破烂货色。"},{"type":"paragraph","text":"喀拉拉邦议会在二十四日举行投票，把邦政府首席部长南布迪里巴德赶下了台。"},{"type":"paragraph","text":"喀拉拉邦“联合政府”是由南布迪里巴德等印修分子，伙同丹吉叛徒集团等反动党派，于一九六七年三月印度“第四届大选”后拼凑起来的。这个政府本来是印度大地主大资产阶级在国大党统治日益不稳，难以在各邦保持清一色的国大党一党政府的情况下，利用印修分子以及其他反动政客，制造出来的一个愚弄人民的工具，借以维持日益动荡不稳的反动统治。南布迪里巴德之流为了适应印度大地主大资产阶级的需要，在上台以后也竭力散布反革命修正主义的谬论，来欺骗人民。但是，这个“联合政府”上台以来的所作所为充分暴露出，这个政府是帝国主义和印度大地主大资产阶级的奴仆。它充当国大党一手把持的中央政府的走狗，一再血腥镇压邦内人民的革命斗争。"},{"type":"paragraph","text":"这个“联合政府”同国大党邦政府一样，越来越遭到劳动人民的强烈反对，日子越来越混不下去。同时，组成喀拉拉邦政府的形形色色的修正主义分子和其他反动政客争权夺利的狗咬狗争斗越来越激烈。最近几个月来，这个“联合政府”的所有部长都被揭发犯有贪污罪行。丹吉叛徒集团采取先发制人的手段，在邦议会中要南布迪里巴德在十八日前下令调查他支持的一个部长的贪污丑行。南布迪里巴德却在十七日宣布调查属于丹吉叛徒集团和社会党等反动党派的四个部长的贪污丑行。双方为此在议会里大吵大闹。在议会外面，双方的支持者甚至大打出手，先后打死了十五个人。后来，丹吉叛徒集团伙同其他反动党派从邦政府中撤出七个部长，并在议会中投反对票，拆了南布迪里巴德的台。"},{"type":"paragraph","text":"列宁曾经指出:“只要旧的、资产阶级的、官僚的国家机构原封不动地保留下来”，“无论在哪一种有‘社会主义者’参加的‘联合’内阁里，……这些社会主义者实际上都是资产阶级政府的装饰品和屏风，是这个政府躲避人民愤怒的避雷针，是这个政府欺骗群众的工具”。不论印度修正主义分子怎样竭力充当印度反动政府的装饰品和屏风，但是事实一再表明他们的“议会道路”是一个欺骗人民的骗局。现在，印度的广大革命人民唾弃了印修分子的“议会道路”黑货，拿起枪杆子，积极开展革命的武装斗争，并且取得越来越多的胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37d936c48b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
