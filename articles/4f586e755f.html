ates":[{"year":1949,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二日电】　据塔斯社莫斯科一日讯:莫斯科各报皆刊载新华社关于中国人民政治协商会议闭幕和毛泽东当选为中华人民共和国中央人民政府主席的消息。塔斯社亦于同日转播人民政治协商会议宣言的全文和新华社驳斥国民党反动集团代表蒋廷黻在联合国大会无耻的反苏演说的社论“中国人民对全世界的庄严宣言”全文。又据本社布拉格三十日消息:伦敦工人日报于第一版首要地位以通栏大字标题“中国否认国民党在联合国的代表权”综合报道中国人民政协会议关于中央人民政府的组织和否认国民党在联合国代表权的决议，以及维辛斯基在联大痛斥蒋廷黻对苏联的“控诉”的演说。"},{"type":"paragraph","text":"【北京二日消息】据塔斯社莫斯科消息:莫斯科各报刊载北京消息:描述中国人民热烈庆祝中华人民共和国诞生的情形。又北京收抄站连日收到塔斯社广播中国人民政治协商会议进行情况，塔斯社廿九日转播了新华社所发人民政协通过共同纲领的消息。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f586e755f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
