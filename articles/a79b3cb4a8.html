ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"对化工部关于第二个五年化肥预计发展报告的批语","alias":"","parts":[{"type":"paragraph","text":"对化工部关于第二个五年化肥预计"},{"type":"paragraph","text":"发展报告\"的批语"},{"type":"paragraph","text":"（1958年2月3日）退总理："},{"type":"paragraph","text":"可以印发。要署部长姓名。另注明“密件，注意保存”字样。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月三日上午三时"},{"type":"paragraph","text":"重工业各部，每部都做出一个至几个这样的文件，在几天内交来。"},{"type":"paragraph","text":"[1]指化工部1958年2月1日提交的关于第二个五年化学肥料预计发展的报告。主要内容是：第二个五年计划到1962年化肥的预计产量；第一个五年计划化肥厂建设项目建成后生产预计；第二个五年计划新建、扩建和原有的化肥厂生产预计。报告的说明中说：按照农业发展纲要四十条，我们曾将1962年化肥的生产水平定为700万吨，最近又重新研究了这个问题，认为根据各方面的条件，到1962年有可能进一步提高到1000万吨的水平。报告还预测了达到1000方吨化肥产量后将取得的经济效果和为完成这一计划所需要的投资、技术力量及原料资源等情况。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":2,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":513,"page_end":513},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a79b3cb4a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
