<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国共产党河北省委员会关于开除刘青山、张子善党籍的决议","authors":[],"dates":[{"year":1951,"month":12,"day":4}],"is_range_date":false,"parts":[{"text":"中国共产党河北省委员会关于开除刘青山、张子善党籍的决议","type":"title"},{"text":"（一九五一年十二月四日河北省委员会通过，并经中共中央华北局批准）","type":"subtitle"},{"text":"刘青山，前任天津地方委员会书记，河北省安国县人，雇工出身，现年三十五岁，一九三一年入党。张子善，现任天津地方委员会书记，前天津专区专员，河北省深 县人，学生出身，现年三十七岁，一九三三年入党。刘青山、张子善参加革命斗争均已二十年左右，他们在国民党血腥的白色恐怖下，在艰苦的八年抗日战争和三年 多的人民解放战争中，都曾奋不顾身地为党的事业和人民群众的解放，进行过英勇的斗争，树立过功绩。他们本是可以继续给党、给国家、给人民做更多的事情的。 可是，他们却在全国胜利后两年多的和平环境中，经不起资产阶级自私自利思想作风的侵袭和引诱，堕落蜕化了。他们完完全全变成党、国家和人民的无可饶恕的叛徒了。","type":"paragraph"},{"text":"刘青山、张子善为贪图可鄙的不正当的个人享受，为满足其极端腐化的生活需要，竟凭借职权，不顾国法党纪，不管人民疾苦，盗窃机场建筑款、救灾粮、治河款、 干部家属救济粮、地方粮及剥削克扣民工工资、骗取银行贷款等共达一百五十五亿四千九百五十四万元的巨额，借机关生产名义，进行违法经营，并交送四十九亿巨 款给奸商张文义倒卖钢铁木材，瓦解国营厂矿，任其投机倒把，扰乱金融，使人民资财损失达十四亿元之多。","type":"paragraph"},{"text":"刘青山、张子善等在获得非法暴利、大量贪污后，则任意浪费挥霍，过着可耻的腐化生活。刘青山吸食毒品竟至成瘾，据他们现在自供，刘、张二人开支及送礼即达三亿多元。为消灭贪污罪证，张子善并亲手一次焚毁单据三百七十八张。","type":"paragraph"},{"text":"刘青山、张子善这种违法乱纪的非法罪恶行为，自然会遭到一切忠诚的共产党员和正直的政府工作人员的指责和反对的，因此，这些人们就成为刘青山、张子善等贪污罪犯极端痛恨的眼中钉。刘、张二人为遂行其贪污挥霍的卑鄙企图，就采取了敌对分子的手段来对待党的组织和人民干部。首先，他们在政治上极力造成一个“惟 我独尊”和“挥霍有道”的空气。刘青山说“老子们拚命打了天下，享受些又怎么样！”“老子们打天下，小子们来享受！”张子善则说是天津地委内只能有“一个 头”、“一个领袖”。有一个无耻之徒竟在“七一”纪念大会上高呼“向我们英明的领袖张专员致敬”，“在英明领袖张专员领导下前进”，而张则对人说：“应向这个同志学习”。其次，他们在组织上除极力压抑民主、取消批评与自我批评、施行其家长制的统治外，凡是坚持党的原则，维护人民利益，对刘、张所为提出不同 意见和反对他们的同志，莫不遭受其打击与排挤；凡是意志薄弱和他们气味相投、共同作弊的分子，则大肆拉拢，造成一个公然行盗的小宗派集团。这个小集团在思想上和组织上又是和资产阶级分子千丝万缕地结成了不解之缘。这就是刘青山、张子善等反党的“组织”原则。再次，刘、张“做贼心虚”，为了掩盖其罪恶勾当， 则在上下左右之间公行贿赂，到处拉人下水，恶风所及，邪气上升，以达其腐蚀党的组织和人民干部的目的。","type":"paragraph"},{"text":"由此可见，刘青山、张子善已不仅仅是两个普通的贪污罪犯，两个普通的窃盗，而是像党的二中全会所预见的，他们是经不起敌人糖衣炮弹的攻击，向敌人投降了的，并很快地实际上成为反动分子在党内的代理人，肆无忌惮地从内部来腐蚀党和瓦解党。刘青山、张子善公然责令干部，要动员党的组织——无产阶级的先锋队， “保证完成”他们剥削民工三十亿元的“任务”。他们要把天津地区的党变成贪污罪犯们的驯服的工具，这就是刘青山、张子善贪污事件的特别严重的地方。这一 点，也正是曾经是一个革命者的刘青山、张子善身败名裂、背叛党和背叛人民的根本原因，正是河北省的党组织必须把刘、张贪污事件作为重大教训的意义所在，正 是我党必须坚决把刘青山、张子善开除出党并交政府依法制裁的理由。","type":"paragraph"},{"text":"在党中央和华北局的正确领导下，河北省党代表会议终于揭发了刘、张的罪行，并把他们开除出党，这是河北党的组织的一大胜利！希望河北全省同志，接受这一痛心的教训，为开展全省规模的反贪污、反浪费、反官僚主义运动，肃清资产阶级的腐化影响，在党中央和毛主席的英明领导下，为进一步从政治上、思想上、组织上 巩固河北党的组织而奋斗。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5ff89a8c9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
