":["谢富治"],"dates":[{"year":1967,"month":6,"day":3}],"is_range_date":false,"parts":[{"text":"谢富治传达中央给北京红代会的指示","type":"title"},{"text":"谢富治","type":"authors"},{"text":"六月三日晚谢副总理和傅崇碧同志受中央指示前往红代会传达两条命令：","type":"paragraph"},{"text":"一、红代会的人都不能利用北京名义，跑到各地自作主张，破坏无产阶级专政秩序。在徐州的都应该接到通知后，一天内应当立即回来。红代会要派人去说服。如还不听，可同军队、公安机关协同强制回来。","type":"paragraph"},{"text":"二、红代会和各大专院校，要坚决执行中央指示和市革命委员会的决定，立即将我市各院校派往各省、市和北京各单位的同学调回本校。","type":"paragraph"}],"comments":[],"origin":"红代会《政法公社》主办《政法公社（校内版）》第18期 1967年6月6日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c2e62d681"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
