胜"],"dates":[{"year":1991,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东和他的儿子》在京首映"},{"type":"paragraph","text":"王震薄一波等出席首映式"},{"type":"paragraph","text":"本报北京６月７日讯  记者吴坤胜报道：试映以来颇受观众好评的影片《毛泽东和他的儿子》，今天在人民大会堂举行首映式。影片感人肺腑的场面使观众情不自禁地流下了热泪。"},{"type":"paragraph","text":"由潇湘电影制片厂拍摄的这部影片，是向中国共产党诞生７０周年的献礼片。影片突出描写了革命领袖毛泽东的父子情、父女情、夫妻情、战友情以及和人民群众的鱼水情，具有较强的感染力。王震、薄一波、杨得志、陈丕显、耿飚、洪学智、谷牧、杨成武、邓力群等出席了由广播电影电视部、中共湖南省委和省人民政府联合举办的首映式。薄一波在首映式上讲了话。毛泽东的亲属刘思齐、邵华等也参加了首映式。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50aedda565"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
