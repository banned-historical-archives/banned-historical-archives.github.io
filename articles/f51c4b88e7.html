":[{"year":1975,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英副主席会见并宴请朝鲜人民军友好参观团"},{"type":"paragraph","text":"新华社一九七五年六月二十八日讯  中共中央军委副主席叶剑英今天晚上会见了以朝鲜人民军副总参谋长赵明善中将为团长、朴相润大校为副团长的朝鲜人民军友好参观团全体成员。会见时，叶剑英副主席同赵明善团长等一一亲切握手，并同朝鲜战友进行了热情友好的谈话。会见后，叶剑英副主席设宴招待了朝鲜战友。"},{"type":"paragraph","text":"中国人民解放军副总参谋长张才千、总政治部副主任魏伯亭，国防部外事局局长柴成文、副局长尹佐珍参加了会见和宴请。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国驻中国大使馆武官姜松哲大校也参加了会见和宴请。（附图片）"},{"type":"paragraph","text":"右图：叶剑英副主席六月二十八日会见朝鲜人民军友好参观团全体成员。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1975,"month":6,"day":29}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英副主席会见并宴请朝鲜人民军友好参观团","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年六月二十八日讯 中共中央军委副主席叶剑英今天晚上会见了以朝鲜人民军副总参谋长赵明善中将为团长、朴相润大校为副团长的朝鲜人民军友好参观团全体成员。会见时，叶剑英副主席同赵明善团长等一一亲切握手，并同朝鲜战友进行了热情友好的谈话。会见后，叶剑英副主席设宴招待了朝鲜战友。"},{"type":"paragraph","text":"中国人民解放军副总参谋长张才千、总政治部副主任魏伯亭，国防部外事局局长柴成文、副局长尹佐珍参加了会见和宴请。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国驻中国大使馆武官姜松哲大校也参加了会见和宴请。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英六月二十八日会见以朝鲜人民军副总参谋长赵明善中将为团长、朴相润大校为副团长的朝鲜人民军友好参观团全体成员。"},{"type":"paragraph","text":"新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f51c4b88e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
