{"year":1959,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社平壤29日电】　朝鲜劳动人民纷纷写信给中国人民的伟大领袖毛泽东同志和中国人民，热情地祝贺中华人民共和国成立十周年。"},{"type":"paragraph","text":"朝鲜黄海北道金川郡朝中友谊农业社的全体社员在中国国庆前夕写给毛泽东主席一封信，这封信是用金字写在一大幅红绸上的。信中写道:伟大的中国人民在以主席同志为首的中国共产党的领导下，在建设社会主义祖国的大跃进和为提高劳动人民生活的斗争中获得了巨大成就。信中说:我们全体社员对伟大的中国人民在社会主义建设中取得的一切成就，就象自己取得成就一样而感到欢欣鼓舞。"},{"type":"paragraph","text":"信中说:我们全体社员沿着以我们敬爱的领袖金日成同志为首的朝鲜劳动党所指出的道路，为了完成社会主义建设，正在快马加鞭地继续进军。为了不断发展朝中两国人民间的演好合作，我们将尽一切的努力。"},{"type":"paragraph","text":"信中最后说:为了中国人民在大跃进中取得更大的成就，为了全世界的巩固和平，衷心祝愿主席同志万寿无疆。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0da0c46b0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
