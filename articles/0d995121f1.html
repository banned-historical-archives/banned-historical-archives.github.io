ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"对新华社关于四川省委加强工业战线工作的报道的批语","alias":"","parts":[{"type":"paragraph","text":"对新华社关于四川省委加强工业战线工作的报道的批语"},{"type":"paragraph","text":"（1959年1月25日）小平叫同志："},{"type":"paragraph","text":"此件极好，应当仿行。请印发到会各同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿五日[1]小平，即邓小平，当时任中共中央总书记。"},{"type":"paragraph","text":"[2]新华通讯社1959年1月23日编印的《内部参考》第二六九二期上登载的这则报道说，中共四川省委今年1月12日、19日两次召开电话会议，要求各市委确定“一开头就抓紧、自始至终抓紧”的领导思想，进一步加强工业战线上的政治思想教育工作和组织工作，克服一部分领导干部中存在的松劲情绪，以扭转当前钢和钢材产量下降的情况。为了保证完成今年以钢铁为中心的整个工业计划，省委要求各市委都要做好各项具体工作，订出切实可行的措施。"},{"type":"paragraph","text":"[3]指当时正在北京召开的各省、市、自治区党委书记会议。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":1,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":183,"page_end":183},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d995121f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
