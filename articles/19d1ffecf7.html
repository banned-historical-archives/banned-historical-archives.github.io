ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于在谈判中要求顾祝同停止汤、草两军东进问题致叶挺、项英电","alias":"","parts":[{"type":"paragraph","text":"关于在谈判中要求顾祝同停止汤、覃两军东进问题致叶挺、项英电\""},{"type":"paragraph","text":"（1940年11月10日）"},{"type":"paragraph","text":"希夷见顾时，请要求顾电蒋停止汤恩伯、覃连芳两军东进，否则引起战事，由彼方负责。覃军两师已到商城、固始，覃及各师长均集立煌，计划攻皖东。汤军九个师在南阳准备东开，形势紧急。请质问顾，一面苏北言和，皖南令我北移，一面派二十万大军东进，是何用意，是否彼方已准备决裂。希夷谈判时，应以此项大局为第一位问题，其余都是第二位问题。"},{"type":"paragraph","text":"[1]这是毛泽东致叶挺、项英电的主要内容。1940年11月11日新四军"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":216,"page_end":216},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19d1ffecf7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
