[],"dates":[{"year":1960,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"勃列日涅夫当选苏联最高苏维埃主席团主席"},{"type":"paragraph","text":"刘少奇主席致电祝贺"},{"type":"paragraph","text":"新华社8日讯　中华人民共和国主席刘少奇，在5月8日打电报给勃列日涅夫，祝贺他光荣地当选为苏联最高苏维埃主席团主席。电报全文如下：苏维埃社会主义共和国联盟最高苏维埃主席团主席列·勃列日涅夫同"},{"type":"paragraph","text":"志："},{"type":"paragraph","text":"欣悉您光荣地当选为苏联最高苏维埃主席团主席，我谨代表中国人民和中华人民共和国政府，并以我个人的名义，向您表示衷心的祝贺。"},{"type":"paragraph","text":"祝您在伟大的苏联共产主义建设事业中，在加强以苏联为首的社会主义阵营团结和捍卫世界和平的事业中获得新的、更巨大的成就。"},{"type":"paragraph","text":"祝中苏两国人民的伟大兄弟友谊和坚如磐石的、牢不可破的团结更加巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇　一九六○年五月八日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43bdf9f8d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
