ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"对晋绥作战的部署叫","alias":"","parts":[{"type":"paragraph","text":"对晋绥作战的部署！]"},{"type":"paragraph","text":"（1946年6月25日）贺、李，并告聂、刘："},{"type":"paragraph","text":"（一）同意贺李意见，从绥东调两个旅南下夺取同蒲北线。（二）留两个旅固守绥东，如遇傅?部进攻，由聂刘令陈正湘?兵团协同歼灭之（蒋?计划是令傅以一个军向绥东行牵制性攻击，另-一个军即二十二军向陕北行牵制攻击)。（三）运动时注意隐蔽。（四）派人至傅作义处妥为联络。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"已有"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋绥军区司令员贺龙和政治委员李井泉的电报。"},{"type":"paragraph","text":"[2]聂、刘，指聂荣臻、刘澜涛，当时分别任晋察冀军区司令员兼政治委员和副政治委员。"},{"type":"paragraph","text":"[3]绥，指绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。[4]傅，指傅作义，当时任国民党军第十二战区司令长官。[5]陈正湘，当时任晋察冀野战军第四纵队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":426,"page_end":426},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab3778460b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
