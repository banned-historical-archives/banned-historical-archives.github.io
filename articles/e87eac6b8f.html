art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命就是要夺权","authors":["学习毛主席著作积极分子/哈尼族战士皮斯"],"parts":[{"type":"paragraph","text":"毛主席教导我们：革命的根本问题是政权问题。无产阶级和劳动人民有了政权就有了一切，没有政权，就丧失一切。无产阶级文化大革命开展以来，党内走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子，利用他们掌握的党权、政权和财权，打击群众，抵制运动，大搞反革命经济主义，以达到他们破坏无产阶级文化大革命的罪恶目的。这个事实再次证明，当前所进行的夺权斗争，是一场惊心动魄的阶级斗争，是一场在无产阶级专政条件下无产阶级同资产阶级的生死大搏斗。"},{"type":"paragraph","text":"我的名字叫皮斯。皮斯这两个字，用我们民族话来解释，就是活着的鬼。一九四六年，母亲生下我和弟弟，因为是双胞胎，国民党反动派和头人就说我和弟弟是鬼，要把我们母子三人烧死。父亲和他们说理，被头人活活打死。我们母子三人逃到深山，头人就把我们叫做皮斯。这就是我名字的来历。在深山老林里，我们住岩洞，穿树皮，过了整整四年的非人生活。一声春雷震天响，毛主席领导人民用枪杆子夺得了政权，党和政府派人把我们找回来。旧社会把我们逼成鬼，新社会我们才变成人。把世界上的所有树叶当作纸，把世界上的所有树枝当作笔，也写不完我对毛主席的无限热爱。澜沧江的水再深，也没有毛主席的恩情深。没有毛主席，就没有我们劳动人民的一切。"},{"type":"paragraph","text":"为什么我们劳动人民在旧社会那样苦，就是因为我们没有掌握印把子，大权攥在国民党反动派和头人手里。今天我已成为一个光荣的人民战士了。我永远不忘阶级苦，不忘无产阶级专政，不忘毛主席的恩情。"},{"type":"paragraph","text":"党内一小撮走资本主义道路的当权派和顽固坚持资产阶级反动路线的家伙们，他们仗着手里的权，对抗毛主席，对抗党中央，向无产阶级革命派专政，把无产阶级革命派打成“反革命”，进行白色恐怖，残酷镇压。这真是胆大包天！我听到这些，肺都要气炸了。我们绝对不能允许！现在，无产阶级革命派大联合，夺走资本主义道路当权派的权。这个权夺得好！我们坚决遵照伟大领袖毛主席的指示，满腔热忱地、毫不含糊地、全心全意地支持无产阶级革命派起来夺权，一定要把党权、政权、财权、文权从党内一小撮走资本主义道路当权派的手里夺回来，使我们无产阶级铁打的江山永不变色。"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e87eac6b8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
