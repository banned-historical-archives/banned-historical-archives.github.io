rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东邓小平江泽民论哲学社会科学》出版本书系统收录了中国共产党三代领导核心对哲学社会科学的有关论述和对发展我国哲学社会科学研究的指导性意见","authors":["曲志红"],"parts":[{"type":"paragraph","text":"我党历来高度重视、关心和支持哲学社会科学发展和研究，2004年年初，党中央根据党的十六大精神制定颁布了《中共中央关于进一步繁荣发展哲学社会科学的意见》。这是新世纪、新阶段我国在全面建设小康社会中指导哲学社会科学繁荣发展的纲领性文件，具有重要和长远的指导意义。为了学习贯彻落实党中央的这项重大决策和部署，帮助各级领导干部和广大哲学社会科学工作者系统学习和把握我们党关于发展哲学社会科学的指导思想、基本方针和基本要求，中国社科院专门组织专家学者编辑了这部《毛泽东邓小平江泽民论哲学社会科学》。"},{"type":"paragraph","text":"本书分为哲学社会科学的性质和特点、哲学社会科学的地位和作用、马克思主义必须中国化、哲学社会科学必须坚持以马克思主义为指导与时俱进不断发展创新、坚持深入群众深入实际以社会实践作为检验真理的唯一标准、坚持“二为”方向贯彻“双百”方针、加强党的领导促进哲学社会科学优秀人才不断成长、提高全民族的思想道德和科学文化水平8个专题，分别收入毛泽东、邓小平和江泽民的有关论述、讲话和文稿。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46d9d361eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
