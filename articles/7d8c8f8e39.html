s":[{"year":1963,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的好战士——雷锋"},{"type":"paragraph","text":"吴敏　高山画"},{"type":"paragraph","text":"⑤在那黑暗的年月里，雷锋的父亲身遭国民党、日寇的残害，一九四五年，吐血而死。那年雷锋才五岁。"},{"type":"paragraph","text":"⑥雷锋的哥哥十二岁就进工厂当徒工，患了肺痨病，被资本家解雇，悲惨死去。迫于生活，他母亲后来也自杀死了。"},{"type":"paragraph","text":"⑦父亲、哥哥、弟弟、母亲四个亲人，相继死去了，七岁的雷锋便变成了孤苦伶仃的孩子，他只好到山上打柴维持生活。"},{"type":"paragraph","text":"⑧一九四九年，雷锋的家乡解放了，农会主席彭德茂找到了雷锋说：“孩子，要记住，咱们的救命恩人是共产党啊！”　（待续）〔解放军画报社供稿〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d8c8f8e39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
