art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理会见国际激光会议的科学家","authors":[],"parts":[{"type":"paragraph","text":"据新华社五月十九日讯 国务院副总理邓小平今晚会见了参加国际激光会议的中外科学家。"},{"type":"paragraph","text":"会见之前，北京市人民政府举行了招待会。方毅副总理、林乎加市长和王正平教授在招待会上先后讲话。"},{"type":"paragraph","text":"方毅副总理代表邓小平副总理向远道而来的各国科学家表示热烈欢迎。"},{"type":"paragraph","text":"参加会见的外国科学家有来自奥地利、英国、意大利、日本、瑞士、美国、西德等七个国家的六十多位激光科学家、技术专家和他们的家属。一百多位中国科学家也参加了会见。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"393b1c6de0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
