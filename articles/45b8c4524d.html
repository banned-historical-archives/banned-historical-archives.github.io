script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决把“剥削有功”论者拉下马","authors":["阎正昌"],"dates":[{"year":1967,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决把“剥削有功”论者拉下马"},{"type":"paragraph","text":"来自兰考的战士　阎正昌"},{"type":"paragraph","text":"鼓吹“剥削有功”的党内头号走资本主义道路的当权派，胡说什么：“现在剥削是救人，不准剥削是教条主义，现在必须剥削，要欢迎剥削。”难道剥削是救人吗？难道贫下中农是欢迎剥削吗？这完全是地主阶级反动派的逻辑，完全是对贫下中农的污蔑。"},{"type":"paragraph","text":"解放前，我的家乡兰考县的人民，和全国人民一样，受着地主反动派的剥削和压迫，过着暗无天日的生活。那时，流传着这样一首歌谣：狂风卷沙满天黄，大地一片白茫茫。水旱蝗汤祸压祸，尸骨遍野谁埋葬？我们村除了二三十户地主富农外，几乎家家都逃过荒，要过饭。一九四一年大旱灾时，地里的庄稼颗粒不收，地主乘机逼租要粮，大放高利贷，逼得三分之二的贫下中农只好卷起行李，逃奔外乡。那时，反动政府对人民的死活根本不管。有时为了欺骗人民，也拨下来一点微乎其微的粮款，可是，就是这样一点粮款，也都进了地主的腰包。那一年，我们村就饿死了三百八十多人，有六十多户人家卖儿卖女。我的爷爷、伯父为地主出力卖命一辈子，到头来，还饿死在荒沙滩上。"},{"type":"paragraph","text":"我们对这样惨绝人寰的剥削能欢迎吗？不，一千个不，一万个不。我们对剥削的唯一回答是反抗，是造反。兰考县人民在党和毛主席的英明领导下，大造地主阶级、反动派的反，推翻了剥削阶级的统治，获得了解放。解放后，人民翻身作了主。为了改变一穷二白的落后面貌，全县人民在党和毛主席的英明领导下，自力更生，奋发图强，和阶级敌人作斗争，和大自然作斗争，生活一天天好起来，寸草不长的盐碱地上，出现了块块绿洲。一九六二年，党派焦裕禄同志来到我们兰考当县委书记。在他的带领下，经过兰考人民三年努力，沙滩变成绿洲果园，碱窝变成了米粮仓。我们那个穷棒子村，去年向国家出售了二十万斤余粮。兰考人民都振臂高呼："},{"type":"paragraph","text":"“伟大的中国共产党万岁！”“伟大的领袖毛主席万岁！”"},{"type":"paragraph","text":"党内头号走资本主义道路的当权派，你反对毛泽东思想，妄想把历史的车轮扭向后转，提倡剥削和压迫，再叫我们过旧社会那样悲惨的生活。我们革命战士不答应，兰考人民不答应，全中国人民也绝不答应。我们要造你的反，把你拉下马，把你打倒！不获全胜，决不收兵！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45b8c4524d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
