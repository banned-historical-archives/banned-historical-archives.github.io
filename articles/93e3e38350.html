命分子","dates":[{"year":1963}],"is_range_date":false,"authors":["组织工作文件汇编"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 621","tags":[{"name":"反革命","type":"主题/事件"},{"name":"四清","type":"主题/事件"}],"parts":[{"type":"title","text":"什么是新的反革命分子"},{"type":"paragraph","text":"所谓新的反革命分子，是指那些没有历史反革命身分但有反革命破坏行为的人。有下列反革命破坏行为之一的人，应当定为新的反革命分子：（1）以反对社会主义制度、打倒共产党、推翻人民政府为目的，组织反革命集团，张贴或散发反革命标语传单，进行各种反革命破坏，以及制造反革命谣言的；（2）在战备时期，配合敌军行动，进行各种破坏活动的；（3）组织或积极参加反革命武装暴乱的；（4）叛国投敌的；（5）主动和特务机关、特务分子、反革命分子联系，进行各种破坏活动的；（6）出卖国家机密的。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93e3e38350"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
