的对待犯罪分子的政策的正确、英明、伟大的又一次证明。许多罪大恶极的罪犯能够被改造过来，这表现了无产阶级专政的伟大威力，是真正的革命人道主义的体现。","authors":[],"dates":[{"year":1961,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京16日电】　全国人民代表大会常务委员会今天举行第四十七次会议，会议审议了国务院的建议，通过关于特赦确实改恶从善的蒋介石集团和伪满洲国的战争罪犯的决定。"},{"type":"paragraph","text":"会议在通过这个决定之前进行讨论时，委员们在发言中指出，我国在1959年和1960年两次特赦之后，今年国务院建议第三次特赦确实已经改恶从善的战争罪犯，这一事实再一次证明了中国共产党和毛泽东主席所制定的对待犯罪分子实行惩办与宽大相结合、劳动改造与思想教育相结合的政策，是正确的、英明的、伟大的。委员们说，这些消极因素能够化为积极因素，许多罪大恶极的罪犯能够被改造过来，这表现了无产阶级专政的伟大威力，是真正的革命人道主义的体现，这说明那些对人民犯了罪的人，只要他们真正愿意转变，向人民低头认罪，最终是会得到人民宽恕的。委员们一致表示赞同国务院的建议，并且随即通过了上述决定。"},{"type":"paragraph","text":"会议还通过了任免事项。"},{"type":"paragraph","text":"政协全国委员会常务委员列席了今天的会议。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8817d793a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
