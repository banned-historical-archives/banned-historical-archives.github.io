art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"衷心祝愿伟大领袖毛主席万寿无疆","authors":[],"parts":[{"type":"paragraph","text":"新华社八日讯 东京消息：日本毛泽东思想学院最近发表声明，热烈祝贺中国共产党第九次全国代表大会隆重开幕，并且衷心祝愿毛主席万寿无疆。"},{"type":"paragraph","text":"声明指出，中国共产党第九次全国代表大会的召开，不仅将使世界革命堡垒的中国更加巩固，而且将进一步鼓舞世界革命人民的斗志。"},{"type":"paragraph","text":"声明说：“我们在满腔热情地欢呼‘九大’隆重开幕的同时，衷心祝愿世界革命人民的伟大领袖毛主席万寿无疆。”"},{"type":"paragraph","text":"声明说：“我们要全力以赴，把被实践证明是当代马克思列宁主义顶峰的毛泽东思想与日本革命的具体实践结合起来。”"},{"type":"paragraph","text":"声明指出，美帝国主义和苏联现代修正主义极力污蔑中国共产党第九次全国代表大会，是它们为了掩盖自己纸老虎的虚弱本质的悲鸣。声明还指出，苏修社会帝国主义对革命的堡垒——中国进行武装挑衅，这正是反动派垂死挣扎的表现。声明说：“人民，只有人民，才是创造世界历史的动力。”世界革命人民要坚持斗争，彻底打倒美帝国主义和苏修社会帝国主义。"},{"type":"paragraph","text":"声明说：“我们决心高举毛泽东思想伟大红旗，积极开展粉碎（日美）‘安全条约’的斗争，为争取日本革命的胜利而奋斗。”"},{"type":"paragraph","text":"声明最后写道：“中国共产党第九次全国代表大会胜利召开万岁！”“战无不胜的毛泽东思想万岁！”“敬祝毛主席万寿无疆！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f2d7e5922"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
