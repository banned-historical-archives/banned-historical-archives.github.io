script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"应邀参加越南民主共和国成立三十周年庆祝活动陈锡联副总理率我党政代表团离京抵河内邓小平、张春桥、李先念、吴德等到机场欢送　范文同、春水、黄国越、潘仲慧等到机场热烈欢迎","authors":[],"dates":[{"year":1975,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年八月三十一日电　以中共中央政治局委员、国务院副总理陈锡联为团长，中共中央委员、人大常委会副委员长乌兰夫为副团长的中国共产党和中国政府代表团，今天上午乘专机离开北京前往河内。"},{"type":"paragraph","text":"代表团是应越南劳动党中央委员会和越南民主共和国政府的邀请，前去参加越南民主共和国成立三十周年庆祝活动的。"},{"type":"paragraph","text":"代表团团员有:外交部副部长韩念龙、中联部副部长申健、中国驻越南民主共和国大使符浩(已在河内)、外交部亚洲司司长沈平和礼宾司副司长刘华。"},{"type":"paragraph","text":"到机场欢送代表团的有:中共中央副主席、国务院副总理邓小平，中共中央政治局常委、国务院副总理张春桥，中共中央政治局委员、国务院副总理李先念，中共中央政治局委员、人大常委会副委员长吴德，中共中央委员、中联部部长耿飚，中共中央委员、外交部部长乔冠华，外交部副部长仲曦东、王海容、马文波、何英，中联部副部长张香山等。"},{"type":"paragraph","text":"在北京的越南民主共和国外贸部副部长李班、越南民主共和国驻中国大使阮仲永、越南南方共和驻中国大使馆临时代办阮成功，也到机场送行。"},{"type":"paragraph","text":"新华社河内一九七五年八月三十一日电　以中共中央政治局委员、国务院副总理陈锡联为团长，中共中央委员、全国人民代表大会常务委员会副委员长乌兰夫为副团长的中国共产党和中国政府代表团，应邀参加越南民主共和国成立三十周年庆祝活动，八月三十一日乘专机到达河内。"},{"type":"paragraph","text":"越南劳动党中央政治局委员、政府总理范文同，越南劳动党中央书记处书记春水，越南劳动党中央委员、越中友好协会会长黄国越，越南劳动党中央委员、政府副总理潘仲慧，越南劳动党中央委员、越南人民军副总参谋长陈文光中将，外交部副部长黄文进，河内市行政委员会主席陈维兴以及河内市各界群众代表到机场热烈欢迎中国党政代表团。"},{"type":"paragraph","text":"中国党政代表团团员、中国驻越南大使符浩和大使馆外交官员以及在越南工作的中国工程技术人员代表也到机场迎接。"},{"type":"paragraph","text":"到机场迎接的还有许多国家驻越南的外交使节。"},{"type":"paragraph","text":"上午十一时十分，中国党政代表团乘坐的专机在嘉林机场降落。陈锡联副总理、乌兰夫副委员长等走下飞机，范文同总理、春水书记、黄国越会长、潘仲慧副总理等迎上前去，同他们热烈握手，亲切拥抱。河内市的女青年向中国同志献了鲜花。欢迎群众挥舞彩旗和花束，高呼“越中友谊万岁”的口号，热烈欢迎中国党政代表团。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李先念","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cae714f12c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
