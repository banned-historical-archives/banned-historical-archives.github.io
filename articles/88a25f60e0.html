tes":[{"year":1959,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布拉格3日电】　捷克斯洛伐克作家联盟代表会议3月1日到2日在布拉格举行。"},{"type":"paragraph","text":"会议主要研究了文学在完成社会主义文化革命中的任务，讨论了过去一个时期文学工作的成就和缺点，特别着重讨论了文学创作思想方面的问题。"},{"type":"paragraph","text":"捷共中央委员、著名的文艺理论家斯托尔在会上作了主要报告。他在报告中着重批判了南斯拉夫修正主义的美学观点和文学理论。他说，反对这些理论的斗争和分析它的虚伪性，是作家联盟报纸的首要任务，也是文学事业得以健康发展的条件之一。"},{"type":"paragraph","text":"斯托尔指出，马克思主义的文艺的力量在于它从不离开客观的真实性，它是和革命的工人运动的根本利益完全一致的。他说，不论文学作品或文学理论作品，都决不能离开政治、社会关系和所属的时代。作家对马克思列宁主义思想掌握得愈好，作品的艺术性就愈高，只有鲜明的思想才能创造出鲜明的艺术形象。"},{"type":"paragraph","text":"斯托尔强调指出，艺术的繁荣只能通过加强文学的党性、思想性以及作家对生活的本质的认识来实现。而这就要求作家更多地接近人民的生活。"},{"type":"paragraph","text":"代表们对报告展开了热烈的讨论。许多发言的人都指出作家和生活的密切联系以及掌握马克思列宁主义理论的必要性。"},{"type":"paragraph","text":"捷共中央政治局委员亨德里赫和捷共中央书记考茨基出席了这次会议。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88a25f60e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
