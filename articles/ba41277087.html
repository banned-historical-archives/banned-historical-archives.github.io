script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"进一步落实毛主席“抓革命，促生产”的伟大号召  大寨贫下中农决心夺取明年更大丰收  冬季农田水利基本建设开展得既轰轰烈烈又扎扎实实","authors":[],"dates":[{"year":1968,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"进一步落实毛主席“抓革命，促生产”的伟大号召"},{"type":"paragraph","text":"大寨贫下中农决心夺取明年更大丰收"},{"type":"paragraph","text":"冬季农田水利基本建设开展得既轰轰烈烈又扎扎实实"},{"type":"paragraph","text":"新华社太原十三日电　在党的八届扩大的十二中全会公报鼓舞下，今年战胜特大雹灾夺得大丰收的山西省昔阳县大寨公社大寨大队的广大贫下中农和干部，更高地举起毛泽东思想伟大红旗，认真开展两条路线斗争史的学习运动，进一步落实毛主席“抓革命，促生产”的伟大号召，干劲冲天地展开了冬季农田水利基本建设活动，决心为明年农业生产的新飞跃打好基础。"},{"type":"paragraph","text":"今年，英雄的大寨人依靠战无不胜的毛泽东思想，经过顽强的斗争，战胜了旱、风、虫等灾害，特别是雹灾带来的损失，在大灾之年夺得了大丰收。丰收以后，大寨党支部及时组织广大贫下中农、革命干部和社员群众总结抗灾斗争的经验，展开了为什么大灾之年能够大丰收的专题讨论。贫下中农说：这不是天收，不是地收，是无产阶级文化大革命带来的大丰收。无产阶级文化大革命是我国社会主义生产的伟大推动力。大寨大灾之年大丰收，是大寨人活学活用毛主席著作的结果，是落实毛主席“抓革命，促生产”伟大号召的结果，是开展革命大批判的结果，是斗私批修、实现思想革命化的结果。通过群众性的总结抗灾斗争经验，英雄的大寨人战天斗地，改造大自然的信心更高，干劲更足，决心实现明年农业生产的新飞跃。"},{"type":"paragraph","text":"大寨贫下中农、革命干部和社员群众，通过在家庭、饭场、工地和打谷场上办的毛泽东思想学习班，认真学习两条路线斗争史，进一步提高阶级斗争和两条路线斗争的觉悟，抓革命、促生产的积极性空前高涨。他们在两条路线斗争史的学习运动中，实行了六结合，即学习两条路线斗争史和热烈赞颂毛主席的英明伟大相结合，和大谈文化大革命的伟大成就相结合，和活学活用毛主席著作相结合，和落实党的八届十二中全会公报相结合，和开展革命大批判相结合，和进一步斗私批修相结合。他们联系本地斗争实际，学习毛主席的一个观点，批判刘少奇的一个反动论点，肃清一股修正主义流毒，更加提高了坚决执行毛主席无产阶级革命路线的自觉性。社员们在整修大寨田的工地上开批判会，愤怒控诉叛徒、内奸、工贼刘少奇及其在山西、晋中、昔阳的代理人大反大寨的罪行，更加激发了无比高昂的革命激情。他们决心多修大寨田，多打粮食，为毛主席的无产阶级革命路线增光。"},{"type":"paragraph","text":"现在，一场既轰轰烈烈又扎扎实实的冬季农田水利基本建设战斗，已经在虎头山上展开了。全大队百分之三十的劳力突击积肥，百分之七十的劳力整修土地。今年，大寨整修土地的最突出特点是：要求高标准、高质量，多建水平梯田，把旱地变成水浇地。在工地上，大寨干部带头挑重活、关键活干，并和社员们一块学习毛主席语录，一块读报，一块开批判会。大队党支部书记陈永贵同志坚持和社员在一起劳动，一同商量制定农田建设的规划。一天，他出外开会，下午就要走了，上午还整整和社员在工地上劳动了四个小时。老英雄贾进才身体有病，医生要他休息，他在家怎么也坐不住，又悄悄地跑到工地打石头。大寨贫下中农在干部的带头下，男男女女多出勤，多投工，齐心协力，热火朝天地大搞冬季农田水利基本建设。他们决心创造出新的成绩，迎接党的第九次全国代表大会的召开，迎接更加光辉的一九六九年。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"山西文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba41277087"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
