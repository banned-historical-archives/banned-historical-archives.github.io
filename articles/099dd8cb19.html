],"dates":[{"year":1981,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东、周恩来、刘少奇、朱德论社会主义精神文明》即将出版"},{"type":"paragraph","text":"新华社北京八月七日电　中国人民解放军战士出版社编辑出版的《毛泽东、周恩来、刘少奇、朱德论社会主义精神文明》一书，即将出版。"},{"type":"paragraph","text":"全书约十万字，编选、收集了毛泽东著作十八篇，周恩来著作六篇，刘少奇著作三篇，朱德著作三篇，共三十篇（部分文章是节录）。其中，毛泽东同志的《吴玉章同志六十寿辰祝词》（一九四○年四月十五日）、周恩来同志的《跟着新生的力量走》（一九五○年七月十一日）、《我们现在建设社会主义，将来的前途是共产主义》（一九六一年九月二十二日）等文章，第一次公开发表。这些著作重点论述了共产主义思想、理想、信念、道德、纪律，革命的立场和原则，人与人的同志关系。有些文章出版社加了题解和注释。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"099dd8cb19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
