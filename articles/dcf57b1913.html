" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"谢富治戚本禹与北京三个工人革命造反组织座谈纪要","authors":["戚本禹","谢富治"],"dates":[{"year":1967,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"谢富治戚本禹与北京三个工人革命造反组织座谈纪要","type":"title"},{"text":"谢富治戚本禹","type":"authors"},{"text":"〖北京三个工人革命造反组织及其它革命组织参加了座谈〗","type":"appellation"},{"text":"谢副总理首先介绍了参加接见的中央文革戚本禹，北京市委刘建勋、吴德、高扬文，卫戍区司令员傅崇碧，然后讲了座谈宗旨：今天和大家谈一谈北京市工人革命造反派大联合问题已经酝酿好多次了，学校的大联合，大专院校明天就要开大会了，但北京工人是最主要的方面，然后就是工人、农民、学生、机关、干部、军队……在大联合中产生权力机构，今天就是大家谈，主要厂矿三个总部怎么联合起来，联合起来力量大，在毛主席革命路线基础上联合，工农兵大联合的主力，由临时代表会筹备临时机关，现在先解决第一个问题。大联合。","type":"paragraph"},{"text":"谈到北京革命造反公社，戚本禹同志说：造反公社是综合的，工人要回厂。","type":"paragraph"},{"text":"以下革命造反总部、北京革命造反公社作了汇报。","type":"paragraph"},{"text":"谢富总理说：北京市要成立一个权力机构，工、农、兵、学、商多方面组织，大学红代会，中学也要产生，工人代表产生工人革命联合会，不是从你们革命造反公社产生，你们那儿搞个联合机构，这儿再搞一个，哪天才搞成？提到三结合要革命领导干部站出来，按毛主席指示搞三方面权力机构，你们北京革命造反公社，也是个联合，小联合，其实你们就好好搞工人的联合，院校去搞他们的联合。","type":"paragraph"},{"text":"谈到清理组织，谢副总理说：一家调查有片面性，三家调查才全面，石景山钢厂对百货大楼的事情简直不着边，分系统就可以了解，先从上边和也有道理，谢副总理还驳斥了北京革命没有形成真正的革命派的说法，工人汇报有学生支持保守派，谢副总理说：大学联合起来，散兵就要收回去，联合起来没空子钻，迅速解决按系统联合，从下而上，从上而下，搞工、农、兵、学、商的联合。","type":"paragraph"},{"text":"有人说：夺权中调离一些保守派出机要岗位，他们说，我们违反十条。谢副总理说：根本不是那个讲法，调离岗位是指生产岗位，不给工作，谈到对保皇派的看法，有人说看他过去，就可以知道他的现在，看他的过去和现在就可以知道他的将来。因此保守派不变。戚本禹同志讲：主席那是讲一个阶级。","type":"paragraph"},{"text":"最后，解放军报社记者，张根成同志发言：由于工作的关系和工厂一些同志及各校下厂同志有此接触，了解了一些情况，然而不熟悉，认为决定北京市经济命脉的大厂，三个工人组织，北京公社成员组织一个核心，照顾到各方面，大厂另一方面各系统各行业，27个大厂加三个大组织成核心，最后讨论筹备小组，大家表示同意。","type":"paragraph"}],"comments":[],"origin":"1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（2）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcf57b1913"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
