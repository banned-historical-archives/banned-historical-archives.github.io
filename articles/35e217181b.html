":[{"year":1991,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　展示全国农村体育活动最高水准的首届全国体育先进县田径比赛，经过两天角逐，昨晚在上海县体育馆降下帷幕，山东莱州县获得男子团体冠军飞鹰杯。福建莆田县获得女子团体冠军伊思丽杯。获男子二至六名的是辽宁大连金州市、黑龙江肇东县、湖南益阳市、吉林大安县、浙江长兴县；获女子二至六名的依次是广西百色县、广东斗门县、山东莱州县、湖南益阳市和新疆霍城县。(王洪文、曹敏军)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王洪文","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35e217181b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
