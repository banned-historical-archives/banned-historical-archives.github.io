script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝爱国战线中央发言人就万象未遂政变发表声明  谴责极右集团发动政变阴谋破坏谈判  再次宣布坚决继续谈判，直到成功","authors":[],"dates":[{"year":1973,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝爱国战线中央发言人就万象未遂政变发表声明"},{"type":"paragraph","text":"谴责极右集团发动政变阴谋破坏谈判"},{"type":"paragraph","text":"再次宣布坚决继续谈判，直到成功"},{"type":"paragraph","text":"新华社河内一九七三年八月二十二日电　老挝爱国战线驻越南民主共和国代表团团长坎派·布法，八月二十一日下午在河内举行记者招待会，公布了老挝爱国战线中央委员会发言人八月二十一日发表的关于万象未遂政变的声明。"},{"type":"paragraph","text":"声明说：“八月二十日早晨，在万象发生了政变。政变分子以‘革命军事委员会’的名义宣布推翻梭发那·富马亲王。但是，仅几小时以后，政变被粉碎了。为首分子有的被杀死，有的被活捉，有的逃窜。”"},{"type":"paragraph","text":"声明说：“这次政变是在老挝双方在万象的谈判正进展到将要签订关于在老挝恢复和平和实现民族和睦的协定的议定书却又陷于僵局的情况下发生的。"},{"type":"paragraph","text":"“政变发生后，在万象和外国的舆论都认为：政变的主谋不是别人，正是萨纳尼空极右集团。这个集团得到泰国反动当局的直接支持，并同流亡泰国的富米·诺萨万集团相勾结。"},{"type":"paragraph","text":"“政变的目的是破坏万象谈判，使老挝局势再次趋于紧张，妄图取消双方已经商定的条文，不让履行或迫使修改已经签订的协定。”"},{"type":"paragraph","text":"声明说：“众所周知，万象萨纳尼空集团和流亡在泰国的富米·诺萨万之流早就是美帝国主义的忠实走狗。美国政府仍然继续抱有在老挝推行新殖民主义的企图，并且还继续使用它们来实现这一企图。因此，美国政府不能逃避对他们的走狗的这一破坏和冒险行动所负的责任。”"},{"type":"paragraph","text":"声明严厉谴责万象极右反动势力发动政变和采取种种行动来破坏目前在万象为签订议定书所进行的谈判。声明说，“老挝爱国战线任何时候都坚持自己希望建立和平与民族和睦的诚意，并且再次宣布坚决继续谈判，直到成功，同时要求万象方面放弃他们的无理要求，在一九七三年七月二十七日在万象最后商定的议定书草案的基础上迅速签订关于（在老挝）恢复和平和实现民族和睦的协定的议定书。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac9512c6d8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
