<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卫生局清洁所及所属单位克服右倾思想 反贪污斗争获得很大战果并在乘胜追击","authors":[],"dates":[{"year":1952,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　市卫生局清洁所暨所属六个清洁管理站的反贪污斗争，由于坚决克服了右倾思想，并充分运用攻心斗智战术，已获得重大战果。截至三月十二日止，已捕获一批“老虎”，现正再接再厉地乘胜追击中。"},{"type":"paragraph","text":"清洁所主要业务是负责全市的粪便清除、管理和运销工作，管辖全市三十个粪码头和四百多个公私厕所，平均每日出粪一万一千五百车(每车约三担半粪)，供应市郊农民种菜需要。几十年来，这些粪码头一直把持在一批封建把头、包商、地痞、流氓手里。解放后，他们大都被留用。由于这批分子受资产阶级反动思想薰染太深，贪污成性，仍不肯老老实实接受改造，继续运用过去贪污伎俩，里勾外连，大肆盗窃活动，使这些粪码头无形中变成封建残余分子和资产阶级向广大农民和人民政府猖狂进攻的据点。他们的贪污活动多是集体性的，手段极其卑鄙、恶劣，不仅涂改账册、私售粪票、勊扣力资、粪便走私、利用预收款放高利贷等等，而且也向船户、农民“打秋风”、“邀会”、“拿开销”。为了巩固他们的贪污集团，彼此又藉“攀亲”、“结义”等方式，建立封建关系，进一步拉拢。两年多来，仅据这批盗窃犯初步供认，直接吞没的款项即达十亿元，国家和农民所遭受的损失尚难估计。"},{"type":"paragraph","text":"当三反运动展开后，贪污犯暗地里都订立了“攻守同盟”、撒赖逃避，使初期打“虎”工作遭遇到一些困难，如曹家渡码头估价员谈裕堂有贪污行为，被另一贪污分子孙阿三检举，并当面对质，列举了时间、人物和事实，他仍矢口抵赖。关桥码头管理员许鸿祥在群众的围攻下，竟用哭、跪、掌自己耳光等卑劣手段，伪装自己已彻底坦白，来欺骗领导和群众。淮安路码头调筹员徐和庆更丑态百出，伪装自杀。"},{"type":"paragraph","text":"日晖港码头估价员周鹤，白天受着打“虎”队员围攻，却仍贼性不改，晚间继续想法“弄钱”。这些要赖顽抗的流氓作风，激起广大群众的极度愤怒，纷纷要求严办这批狡猾无耻的大贪污犯。"},{"type":"paragraph","text":"任凭贪污犯多么刁滑、顽固，“攻守同盟”订得多么牢，由于打虎队运用了三宝齐放、攻心斗智的战术，通过调查、访问、以“虎”攻“虎”、算大账、算细账、做好家属工作等方式，终于把虎穴一一攻破。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4bcc03ba4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
