部中进行反官僚主义反命令主义，反违法主义斗争的总结报告（节录）","authors":[],"dates":[{"year":1953,"month":6,"day":19}],"is_range_date":false,"parts":[{"text":"中共雅安县委关于在县，区，乡三级干部中进行反官僚主义反命令主义，反违法主义斗争的总结报告（节录）","type":"title"},{"text":"去年抗旱中布置各区，乡挖塘，修埝，只要数目，不求实际。乡干部说：“上级叫挖塘，不得不挖，检查结果，全县修塘116口，有45口是不装水的看塘。”二区修塘35口，其中有27口不能用。 今年修三区八步乡联合埝，花工2572个，贷款590万元，由于勘测不详细，盲目施工，结果修不通。仅浪费民工和贷款值米38.6石。… 浪费的成本占群众今年总收入的一半以上。 …. 去年葵龙乡发生严重病，而当时省，专，区均派有工作组在当地工作，建团建政个搞一套。群众死亡没人关心，以致疾病蔓延4个月，群众死亡103人。… 去年动员民工到宝兴修路，上级要动员石工，县府原文照发要石工，区上没石工，就动员土工去，结果到了宝兴没工做，几百人耽搁了十几天功夫，工资米未得到，还负了600万伙食费，不少民工没饭吃，讨口回家，群众中影响很坏。… 五区水口乡在修塘时强迫群众去修，把有病的人也叫到塘边晒太阳，对不积极修塘的罚跪在塘边等强迫命令。… 水口乡乡长张登楼… 为了怕说自己落后，于是带头在互助组内搞农具折价归公，动员农具户和有牛户把耕牛农具都归到组内，争取当模范互助组。 … 全乡20多个互助组就有 10多个都实行农具归公, 严重的侵犯了农民私有财产。  (pp. 3-4)","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4d1485eba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
