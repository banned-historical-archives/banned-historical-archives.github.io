<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关于处理本厂闹事问题的总结","authors":["上海市公私合营大统油工会"],"dates":[{"year":1957,"month":7,"day":12}],"is_range_date":false,"parts":[{"text":"关于处理本厂闹事问题的总结","type":"title"},{"text":"上海市公私合营大统油工会","type":"authors"},{"text":"本厂在1956年1月份日停工后，由于一部分工人的计件工资未妥善处理，终于闹事，前后共计一月。","type":"paragraph"},{"text":"闹事的起因","type":"subtitle"},{"text":"一、工资问题","type":"paragraph"},{"text":"本厂工人130人（党员19人，团员4人），其中47%工人既有基本工资，又有计件工资，工厂工会认为公司停工2个月正常，由于油厂工作的季节性，外调工人工资70.91元。但两个月后，公司却决定继续停工，工资差别明显，工人意见变大。","type":"paragraph"},{"text":"二、官僚主义作风","type":"paragraph"},{"text":"本厂党、政、工会组织曾就工人意见向上进行过反映，但公司对基层意见不予重视。7个月的停工期间，工会工作做得不够，工人思想存在反感。","type":"paragraph"},{"text":"三、社会影响","type":"paragraph"},{"text":"当时已有一些厂在闹，有的外调厂也在闹，本厂工人受到影响。","type":"paragraph"},{"text":"闹事的过程","type":"subtitle"},{"text":"1957年1月，工人在厂中开会要求调走工资。1月29日。党政工作作专题报告，但仍未获总公司同意。工人中的活动分子到各机关反映问题，而公司的处理意见使工人更加不满。于是要求工会代写报告，并参与签名。","type":"paragraph"},{"text":"签名者情况：","type":"paragraph"},{"text":"1、党员、团员和部分积极分子感到做法不妥","type":"paragraph"},{"text":"2、65%的中间分子认为签名后工资即可以到手","type":"paragraph"},{"text":"3、闹事积极分子占20%，态度坚决","type":"paragraph"},{"text":"5月13日劳动局答复，闹事分子不满意，遂将事态扩大。事件达到最高潮","type":"paragraph"},{"text":"在这种形势下，工会干部思想复杂","type":"paragraph"},{"text":"1、部分主要干部认为工资问题应由上级负责，但群众压力在他们身上，因而深感不适","type":"paragraph"},{"text":"2、一般干部感到工人的要求合理，但作法不对头，不能分辨是非，认为应由厂方负责","type":"paragraph"},{"text":"3、个别干部伺机讨好群众，哗众取宠","type":"paragraph"},{"text":"4、个别工厂委员是闹事积极分子","type":"paragraph"},{"text":"由于工厂委员人事不统一，矛盾日益尖锐。次日上午，工会召开联席会议，下午召开群众大会，工人提出了尖锐的45条批评。工会在支部领导下，终于统一了思想，并分散进入群众进行宣传教育，情绪暂时稳定。","type":"paragraph"},{"text":"市劳委和公司最后与群众达成协议，在5月18日，在此过程中，部分闹事的头子仍掀风浪。支部采取了以下措施：","type":"paragraph"},{"text":"首先是继续安定群众情绪，在18日宣布一周内给出具体答复，问题基本解决。5月28日，工资奋发，闹事分子已无事可闹。","type":"paragraph"},{"text":"处理闹事的体会","type":"subtitle"},{"text":"一、工会必须在党的统一领导下，思想一致，步调口径一致，而达到一致的关键在于充分发扬民主。","type":"paragraph"},{"text":"在闹事开始时，工会干部思想不统一，缺乏战斗力，后来在支部的领导下忠于统一了思想，齐心协力地开展了群众工作。","type":"paragraph"},{"text":"二、努力克服官僚主义，放下架子，深入群众，了解群众思想动向，把群众团结起来。对于深入群众由以下方法：","type":"paragraph"},{"text":"1、参加群众的活动，掌握动态，缩短了干部与群众的距离","type":"paragraph"},{"text":"2、到群众家里及调外厂，和群众当面交换意见","type":"paragraph"},{"text":"3、分别对象进行了联系","type":"paragraph"},{"text":"通过这些活动，了解群众思想动态，进行分析，作出判断。同时也可以了解闹事头子的策略。击垮他们的阴谋，同时也应注意团结少数闹事头子，分化闹事者的领导人员。","type":"paragraph"},{"text":"三、千百倍的加强思想工作","type":"paragraph"},{"text":"采取心平气和的方法，坚持说理，原则上不动摇，从而消除部分工人的模糊看法。","type":"paragraph"},{"text":"四、依靠上级的帮助和支持","type":"paragraph"},{"text":"五、处理中存在的问题和教训","type":"paragraph"},{"text":"1、工会在处理过程中还不够冷静，工作进展不顺便泄气。泄密现象也有所发生。","type":"paragraph"},{"text":"2、工作有时做得太仓促，许多干部在思想上未有充足的准备","type":"paragraph"},{"text":"3、巩固工作做得不够。在群众中大是大非仍未分清","type":"paragraph"},{"text":"通过这次闹事，暴露了工会在工作中存在的一些问题：","type":"paragraph"},{"text":"1、内部民主问题，不同意见在以前未得到发表，主席说了算，一言堂作风","type":"paragraph"},{"text":"2、工厂委员会内部不够团结，在泄密一事上即有所体现","type":"paragraph"},{"text":"3、工会的官僚主义作风，特别是对容易的事未做好，干部的骄傲自满情绪有所增长。","type":"paragraph"},{"text":" 1957年7月12日","type":"paragraph"},{"text":" 上海市档案馆，C1-1-2272，第128-139页。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc0367ea3b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
