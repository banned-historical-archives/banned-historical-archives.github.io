作安排给周恩来总理的信(节录)","authors":["中共南京市委书记","柯庆施"],"dates":[{"year":1952,"month":6,"day":3}],"is_range_date":false,"parts":[{"text":"柯庆施关于南京“五反”运动结束后工作安排给周恩来总理的信(节录)","type":"title"},{"text":"中共南京市委书记柯庆施","type":"authors"},{"text":"[柯庆施，时任中共南京市委书记、南京市市长。]","type":"subtitle"},{"text":"有关南京生产事业的情况曾于5月7日以专电报告，现当“五反”运动结束阶段时，社会经济的严重情况已进一步暴露，我们面临的问题已更严重。南京现有102万人口，整个工商业22000余户中商业多于工业，而工商业中独立手工业户及家庭商店又占60%以上，较大规模的生产事业很少，目前拥有资金1O亿以上就算大户，全市资金总额不过3200余亿元。2万余工商业户中专事偷税漏税、贩卖金银美钞等违法行为为生者，估计不下5000户。目前我们收容救济的人有11000左右（以工代赈5000人，教养院3500，游兵、小偷各1000余），需要经常救济者3.4万人。解放迄今，疏散了30余万，屡散屡聚，至今仍有102万人。","type":"paragraph"}],"comments":[],"origin":"《“三反”“五反”运动 （江苏卷）》， 北京：中共党史出版社，2003年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a846c1874e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
