ph","text":"级进攻。在无产阶级文化大革命中，为什么在我们的队伍里有教育工人阶队伍"},{"type":"paragraph","text":"形形色色的无政府主义、山头主义、个人主义的思想表现呢？这"},{"type":"paragraph","text":"就是资产阶级思想在工人阶级队伍内部的反映，是查产阶级向《文汇报》社"},{"type":"paragraph","text":"工人阶进攻的一种表现。如果我们不千百倍地加强我们的队在我们最最敬爱的伟大领袖毛主席的亲切关怀下，在中央"},{"type":"paragraph","text":"伍建设，不注意排除和克服这些阶级对我们的影响，那就会在这文化革命小粗的大力支持下，上海工人革命造反派代表会取"},{"type":"paragraph","text":"场斗争中打败仗，甚至有丧失我们阶级队伍的危险。得很大的成功，已经胜利幕了。这是毛泽东思想的辉煌胜利，是毛主席革命路的辉煌胜利。"},{"type":"paragraph","text":"力，就一定要在阶级斗争中，在两条路綫斗争中建设。任何革命中央文化革命小粗上海市工人革命造反派代表会的贺"},{"type":"paragraph","text":"的队伍在和平环境中，如果不经斗筝风浪，就得不到炼，就会电指出：“会经在无产阶文化大革命中作过光辉贡献的上海工"},{"type":"paragraph","text":"出间题。我们一定要紧跟毛主席的伟大战略部署，狠抓革命的人阶极，必将经过此次会，进一步粗织和教育自已的阶级队"},{"type":"paragraph","text":"大批。特别要彻底批判中国赫鲁晓夫的修正主义建党路綫，伍，高举毛泽东思想的伟大红旗，坚决执行毛主席关于斗私，批"},{"type":"paragraph","text":"彻底批中国赫鲁晓夫的“全民工会”“福利工会”、工联主义等修的最新指示，深入开展革命的大批，巩固和发展革命的大"},{"type":"paragraph","text":"修正主义的理，在斗争中清理，建设我们的队伍，使我们的队联合和革命的三结合，抓革命、促生产，搞好工厂企业的斗、批、"},{"type":"paragraph","text":"伍永远沿着毛主席的革命路綫的轨道胜利前进。改，为彻底完成无产阶级文化大革命的历史任务而奋斗。”这是毛主席、党中央对上海工人阶和一千万上海人民的互大关怀，"},{"type":"paragraph","text":"是要大力向工人群众灌输毛泽东思想。工人阶级不能自发地产无限期望，也是放在上海工人阶面前的重大任务。"},{"type":"paragraph","text":"生马克思列宁主义，自发的工人运动只能产生工联主义。在工"},{"type":"paragraph","text":"为了完成这样艰互伟大的历史任务，根本的关键，在于进一步用毛泽东思想粗织和教育工人阶级队伍，大大提高我们队伍"},{"type":"paragraph","text":"人革命造反派已处于掌权地位的情况下，学习毛泽东思想就更"},{"type":"paragraph","text":"加重要。革命造反派的各负责人，更要带头学习。不管怎样的毛泽东思想的水平，大大地增强战斗力，把上海工人阶级建成一支在中国共产党对领导下的，用毛泽东思想武装起来的，朝"},{"type":"paragraph","text":"忙，也一定要挤出时间来每天坚持学习毛主席著作，尤其要坚持气蓬勃的、革命化战斗化的工人阶级队伍。"},{"type":"paragraph","text":"在“用”字上狠下功夫，学用结合，立竿见影，不断地改造自己，加工人阶级是先进的阶级。但是，工人阶井非生活在真空"},{"type":"paragraph","text":"速思想革命化。在当前，特别重要的就是要落实伟大袖毛主席-144"},{"type":"paragraph","text":"列宁粗织和教育工人阶的队伍，使我们的队伍纯洁、有战斗粗织和教育工人阶杀的队伍，千条万条，最根本的一条，就"},{"type":"paragraph","text":"-145-的最新指示，把毛泽东思想学习班办得更好，把活学活用毛主席著作的群众运动深人持久地开展下去。这样，我们才抓住了队伍建设的根本，才能无往而不胜上海工人阶级具有光荣的革命传统。无产阶毅文化大革命开展以来，上海工人革命造反派坚定地站在毛主席革命路义一边，处处听毛主席的话，步步紧跟毛主席的伟大战略部暑，冲锋陷阵，英勇无畏，在夺取上海无产阶文化大革命的决定性胜利的战斗中作出了光辉的献。我们只有时时刻刻不脱离毛泽东思想，时时刻刻不离群众，勇于向革命老干部学习，向革命新干部学习，向群众学习，向不同观点的人学习，在斗争中学会斗争，才能在政治上更加成熟起来。上海工人阶极的队伍建设好了，就从根本上保了上海文化大革命的彻底胜利，井将对全国无产阶级文化大革命的胜利发展作出应有的献。："},{"type":"paragraph","text":"一九六七年十二月六日146-进一步粗织和教育自己的阶队伍"},{"type":"paragraph","text":"热烈欢呼上海工人革命造反派代表会胜利召开"},{"type":"paragraph","text":"《工人造反报》社"},{"type":"paragraph","text":"在我们最最敬爱的伟大领袖毛主席的无限关怀下，在全国、全市一片空前大好的革命形势下，在上海市革命委员会的直接导下，上海工人革命造反派代表会胜利地召开了。这是对一年多来无产阶级文化大革命取得辉煌成就的检。这是决心把无产阶文化大革命进行到底的誓师大会。是毛泽东思想的叉一伟大胜利！是毛主席革命路的叉一伟大胜利！"},{"type":"paragraph","text":"这次会的主要任务，就是中央文革小粗在贺电中指出的：“进一步粗和教育自己的阶级队伍”，把我们上海工人阶级建成一支在中国共产党对领导下的、用毛泽东思想武装的、朝气蓬勃的、革命化、战斗化的队伍。"},{"type":"paragraph","text":"我们上海工人阶级是有光荣革命传的。在这场史无前例的无产阶杀文化大革命中，在两个阶、两条道路、两条路的生死大搏斗中，我们上海工人革命造反派为了捍卫毛主席，为了捍卫毛主席的革命路，为了彻底摧毁资产阶级司合部，高举战无不胜的毛泽东思想伟大红旗，冲锋陷阵，充分发了主力军作用。一年多来的无产阶级文化大革命实践明，我们上海工人革命造反派是一百年来上海革命工人战斗传统的继承者，是一支无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命"},{"type":"paragraph","text":"+147"}],"authors":["《文汇报》社论"],"dates":[{"year":1967,"month":12,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":80,"page_end":81},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53b37a4c44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
