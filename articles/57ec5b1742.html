tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大型画册《毛泽东》出版以生动画面再现伟人风采","authors":["孪纫？"],"parts":[{"type":"paragraph","text":"本报北京12月18日讯 记者陈先义报道：为纪念毛泽东诞辰100周年，中共中央文献研究室和新华通讯社编辑的大型画册《毛泽东》，已由中央文献出版社出版，从今日起在全国发行。"},{"type":"paragraph","text":"这本装帧精美的大型画册，通过一幅幅画面，生动地展现了中国人民的伟大领袖毛泽东光辉的一生，突出地反映了他永垂史册的革命业绩，真实地纪录了他对中国革命和建设的艰辛探索，栩栩如生地再现出他伟人的气魄和特有风采、魅力。画册还以较多的画面，再现了毛泽东同战友、党外人士、各界代表、人民群众、港澳台同胞、海外侨胞以及外国知名人士在一起的亲切情景，并多角度地展示他的神韵，从不同侧面反映了他丰富多采的日常生活。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57ec5b1742"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
