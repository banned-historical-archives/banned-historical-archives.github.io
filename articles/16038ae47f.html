土改问题的电报","authors":[],"dates":[{"year":1951,"month":2,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央转发桂北区党委关于县城郊区土改问题的电报","type":"title"},{"text":"华东局、西北局、西南局：","type":"appellation"},{"text":"现将中南局转发桂北区党委一月十五日电发给你们参考。","type":"paragraph"},{"text":" 中  央二月十三日","type":"paragraph"},{"text":"桂北区党委电如下：","type":"subtitle"},{"text":"各县多以县城的郊区作土改试点，原因是：这些郊区靠近县的领导机关，过去较有基础，行动又便于指导，但农民一起来，往往牵涉到工商业，对市民震动颇大，不易掌握。故规定今后每县县城郊区土改必须放到该到土改接近完成时再搞。那时干部对土改更有经验，对于政策与群众情绪的掌握会更稳。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16038ae47f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
