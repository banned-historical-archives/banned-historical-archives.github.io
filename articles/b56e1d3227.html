rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"缅怀毛泽东同志丰功伟绩《伟人的瞬间》摄影画册出版乔石会见出席出版座谈会的同志","authors":[],"parts":[{"type":"paragraph","text":"新华社北京9月7日电 一本形象地再现毛泽东同志生平事迹的大型摄影画册——《伟人的瞬间》近日与广大读者见面。今天下午，有关方面为此举行画册出版座谈会，缅怀毛泽东同志的丰功伟业。"},{"type":"paragraph","text":"中共中央政治局党委、全国人大常委会委员长乔石，全国政协副主席杨汝岱，在座谈会开始前会见了出席会议的同志并同大家合影留念。"},{"type":"paragraph","text":"这本画册通过毛泽东同志在一些重要的历史事件、国务活动和日常生活中的历史照片，以丰富多彩的摄影语言真实而生动地再现了毛泽东同志在革命和建设时期，与老战友、党外知名人士、广大基层群众的革命情谊和领袖风采。其中，有许多照片是鲜为人知的。画册图文并茂，对一些照片的历史背景作了简要的文字说明，使人们能够更加具体生动地了解毛泽东同志的光辉形象，更加深刻地感受他的魁力和人格的力量。"},{"type":"paragraph","text":"一些当年曾在毛泽东同志身边工作过的老同志出席座谈会并发言，抒发对老一辈无产阶级革命家的深切思念。"},{"type":"paragraph","text":"座谈会由画册的编辑出版单位辽宁美术出版社、中国老摄影记者联谊会、中国当代摄影学会等联合举办。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b56e1d3227"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
