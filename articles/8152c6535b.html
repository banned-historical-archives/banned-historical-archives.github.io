s":["沈阳师范学院","赵文英"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于联合政府式的联合学生会的论点","type":"title"},{"text":"沈阳师范学院赵文英","type":"authors"},{"text":"(赵文英：沈阳师范学院外语系学生)","type":"subtitle"},{"text":"一、提出的理由：","type":"subtitle"},{"text":"(1)学生会是独立的组织，不应由党团员包办，应照顾到非党团员群众各民族。","type":"paragraph"},{"text":"二、内容：","type":"subtitle"},{"text":"(1)在组织成员上，为了符合目前社会力量对比，可规定党团员占60％的比例应照顾各民族。","type":"paragraph"},{"text":"(2)在组织机构上，把学术研究和事务工作并列，各占一半。","type":"paragraph"},{"text":"(3)在选举上，采取竞选方式。","type":"paragraph"},{"text":"三、解散过去学生会理由：","type":"subtitle"},{"text":"(1)过去学生会选举不民主，等额选举民主基础不强，我要拟一个实际不存在的候选人名单，管保能选上。","type":"paragraph"},{"text":"(2)现在学生会陷入瘫痪状态，没有支持“鸣放。”付主席(右派)辞职，生活部长(左派)不称职。","type":"paragraph"},{"text":"(3)最活跃最积极的党团员在领导学术问题上毫无能为力。”","type":"paragraph"}],"comments":[],"origin":"《右派言论选辑》（社会主义教育参考资料之一，内部材料　仅供参考，沈阳师范学院社会主义教育办公室 1958．3）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8152c6535b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
