tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席等前往观看","authors":[],"parts":[{"type":"paragraph","text":"据新华社13日讯 苏联国家大剧院芭蕾舞团今晚在北京展览馆剧场演出了古典舞剧“吉赛尔”。在舞剧中扮演女主角的著名苏联人民演员乌兰诺娃，以优美绝伦的舞姿和丰富深厚的感情，完美地创造了一个忠实于爱情的纯真少女的动人形象。首都两千多名观众今晚尽情地欣赏了这位芭蕾舞艺术大师和全体演员的卓越表演。"},{"type":"paragraph","text":"刘少奇主席、宋庆龄副主席、朱德委员长、中共中央副主席林彪、总书记邓小平，中共中央政治局委员彭真、陈毅，书记处书记王稼祥、谭政，全国人民代表大会常务委员会副委员长沈钧儒、陈叔通、林枫，国务院副总理罗瑞卿，最高人民法院院长谢觉哉，最高人民检察院检察长张鼎丞，国防委员会副主席傅作义等，都出席观看了今晚的演出。"},{"type":"paragraph","text":"两幕舞剧“吉赛尔”是法国十九世纪著名作曲家阿道尔夫·亚当的杰作，它描写了一个纯朴的农家姑娘的爱情故事。“吉赛尔”自从1841年在巴黎首次公演以后，百多年来一直深受各国观众的热烈欢迎。"},{"type":"paragraph","text":"乌兰诺娃充满诗意与纯朴感情的美妙表演，给首都观众得到了一次难忘的艺术享受。蓝色的帷幕徐徐揭开以以，乌兰诺娃以极轻快的舞步走上舞台，她那种柔和的姿态和细致入微的喜悦表情，完美地表达了农村少女吉赛尔对纯真的爱情生活的无限憧憬。当吉赛尔发现她所爱的阿尔伯特对她的欺骗行为时，乌兰诺娃又很细致地表达了女主人公对爱情的困惑、绝望等复杂的内心感受。而在第二幕吉赛尔的幽灵出来拯救阿尔伯特的时候，乌兰诺娃那轻盈的舞步和动人的表情，更深深地扣住了两千多观众的心弦。在演出中，观众多次鼓掌，赞扬乌兰诺娃的卓越表演。在演出结束的时候，乌兰诺娃和全体演员在热烈的掌声中谢幕达六次之多。"},{"type":"paragraph","text":"演山结束后，刘少奇、宋庆龄、朱德、彭真、陈毅等，上台同苏联演员们一一握手，并在一起合影。首都的文化工作者向演员们赠送鲜花。"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2496a7bf22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
