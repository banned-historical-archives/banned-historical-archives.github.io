":["吴兴华"],"dates":[{"year":1987,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武警湖南总队首先从领导干部抓起"},{"type":"paragraph","text":"开展反对资产阶级自由化正面教育"},{"type":"paragraph","text":"本报讯　记者吴兴华报道：中国人民武装警察部队湖南省总队党委认真抓好部队坚持四项基本原则、反对资产阶级自由化的正面教育。"},{"type":"paragraph","text":"党中央提出开展坚持四项基本原则，反对资产阶级自由化斗争之后，武警湖南总队党委先后专门召开了四次党委会，在认真学习《中共中央关于当前反对资产阶级自由化若干问题的通知》的同时，研究如何深入对部队进行正面教育。总队党委认为，正面教育是要扎扎实实提高干部、战士的马列主义、毛泽东思想水平，认清资产阶级自由化的危害性，才能在今后的思想政治工作中，坚持四项基本原则。"},{"type":"paragraph","text":"武警湖南总队党委在向部队进行坚持四项基本原则，反对资产阶级自由化的正面教育中，首先紧紧抓好各级领导的学习，组织各级领导到基层宣讲、辅导，以各级领导自身学习的成果带动部队的学习。目前，全总队已先后有69名支队以上干部深入基层宣讲，辅导基层干部和战士的学习。"},{"type":"paragraph","text":"武警湖南总队党委还采取专题教育的方法，扎扎实实抓好部队坚持四项基本原则，反对资产阶级自由化教育，解决政治方向和政治原则问题。他们针对取消党的领导、主张“全盘西化”，走资本主义道路和提出资产阶级的自由、民主三个主要观点，分成四个专题，即资产阶级自由化是在大好形势下出现的一股逆流；没有共产党就没有新中国；只有社会主义才能救中国；用实际行动捍卫四项基本原则是武警战士的神圣职责。围绕这些问题，学习《邓小平文选》中的有关篇章和毛泽东同志的《论人民民主专政》等有关著作；学习中国近代史和现代史；广泛开展两种社会制度和党的十一届三中全会前后情况对比活动；剖析两种社会民主、自由的实质，使干部战士从历史和现实的事实中，进一步坚定了坚持四项基本原则的政治立场不可动摇的信念；坚定了对改革、开放、搞活方针的信念，从而坚定了对十一届三中全会以来的路线、方针、政策无比正确的信念。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d76f8fd3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
