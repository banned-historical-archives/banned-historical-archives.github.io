tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"印中友协德里分会举行毛主席90诞辰纪念会","authors":[],"parts":[{"type":"paragraph","text":"据新华社新德里12月27日电 印度一中国友好协会德里分会26日晚举行纪念会，纪念毛泽东主席诞辰九十周年。"},{"type":"paragraph","text":"出席纪念会的有印中文协德里分会主席拉格帕特莱和印中友协秘书长马利克等人。"},{"type":"paragraph","text":"拉格帕特莱在讲话中回顾了毛泽东主席对中国人民所作出的贡献。他说，毛泽东将马克思主义的普遍真理同中国的实际相结合，领导中国人民取得了革命的胜利。他还谈到中国所取得的巨大成就，并说他在几次访华期间亲眼目睹了这些成就。"},{"type":"paragraph","text":"在会上发言的其他人赞扬毛泽东主席在革命斗争中的功绩，并谈到解放以后中国人民所取得的进步。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41820fdfc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
