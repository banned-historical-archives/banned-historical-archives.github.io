hors":["范文同"],"dates":[{"year":1971,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十八日电　越南劳动党和越南民主共和国政府代表团团长、越南民主共和国政府总理范文同同志，十一月二十七日在结束了对中国的友好访问、乘飞机即将离开中国国土的时候，打电报给中华人民共和国国务院总理周恩来同志，对毛泽东主席、中国党、政府和人民在代表团访问中国期间给予的热情、亲切和隆重的接待，表示衷心的深切的感谢。电报全文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国国务院总理周恩来同志:"},{"type":"paragraph","text":"在即将离开兄弟的中国国土的时候，我们越南劳动党和越南民主共和国政府代表团，对敬爱的毛泽东主席、中国党、政府和人民在我们对中华人民共和国进行友好访问期间，给予我们极其热情、亲切和隆重的接待，向您表示衷心的深切的感谢!"},{"type":"paragraph","text":"中国党、政府和人民重申支持越南人民彻底战胜美帝国主义侵略者和成功地建设社会主义的决心，鼓舞着我们全国同胞和战士更加奋勇前进，争取彻底的胜利，同时，鼓舞着我们为了印度支那各国各自的独立和自由，同老挝人民和柬埔寨人民团结一心，彻底战胜美国侵略者及其走狗。"},{"type":"paragraph","text":"我们感到高兴的是，我们代表团已经圆满完成了自己的任务，为巩固和发展“同志加兄弟”的越中友谊作出了贡献!"},{"type":"paragraph","text":"我谨向总理同志致以最崇高的和兄弟般的敬意!"},{"type":"paragraph","text":"范文同"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"817fe7eb45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
