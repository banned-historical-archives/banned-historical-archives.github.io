tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛泽东同志诞辰100周年","authors":[],"parts":[{"type":"paragraph","text":"中国延安精神研究会、中共陕西省委宣传部和陕西人民出版社今天联合在京举行座谈会并推出系列丛书及画册，纪念毛泽东诞辰100周年。"},{"type":"paragraph","text":"由中国老区建设促进会主办的纪念毛泽东诞辰100周年座谈会近日在北京举行。伍修权、杨成武等一批老同志以及来自老区的代表和有关部门负责同志共200多人出席座谈会。"},{"type":"paragraph","text":"老促会会长杨成武在讲话中回顾了毛泽东同志的历史功绩和在以毛主席为首的党中央领导下中国革命、建设所取得的成就。他说，纪念毛泽东，最重要的是要把毛泽东思想贯彻到实际工作中去，在以江泽民同志为核心的党中央领导下，按照邓小平同志建设有中国特色社会主义的理论，开创新局面。他希望各界关心和支持老区的建设，使老区人民尽快脱贫致富。"},{"type":"paragraph","text":"为纪念毛泽东同志诞辰100周年，湖南出版社出版的《毛泽东回湖南纪实》一书近日与读者见面。"},{"type":"paragraph","text":"由河南省委党史委和有关单位组织摄制的纪实性艺术片《毛泽东在河南》，日前举行首播和录像带首发式。"},{"type":"paragraph","text":"曾以全国第一个消灭血吸虫病而闻名的江西省余江县，近日举行读书报告会、征文比赛、知识抢答赛等一系列活动，纪念毛泽东同志诞辰100周年。"},{"type":"paragraph","text":"中国革命摇篮井冈山所在地——江西省吉安地区近日举行韶山——井冈山“燎原”火炬接力活动，以此缅怀毛泽东的丰功伟绩。"}],"alias":""},"tags":[{"name":"杨成武","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c7f3e912d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
