" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"高校的右派言论——攻击诬蔑党的发展组织工作","authors":["全国部分高"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"高校的右派言论——攻击诬蔑党的发展组织工作","type":"title"},{"text":"全国部分高","type":"authors"},{"text":"“西安初解放时党员有一千多，现在有四万多，质量也就受了影响。……目前入党，正如鲁迅说的，‘既英雄又稳当’，起码可以作个领导。所以，这几年来学校所吸收的党团员，照已揭露出的情况看，坏学生多于好学生。因此，建议吸收党员要：（一）在学生中应尽先在前十名成绩中挑选。（二）在高级知识分子中应不偏重学自然科的，……。（三）大革命时代的老党员因形势脱了党的人，今天民主人士中很多，究竟大多数还是一贯进步的，人望也好；听说入党偏很难，我不懂，我以为应再多吸收他们。”（西安师范学院  王捷三）","type":"paragraph"},{"text":"“党在发展组织与培养积极分子是唯成分论，成分决定一切，党培养干部重德不重才，党对有才干的人不加重用，现在的干部低能。”（中南矿冶学院  陈凌生）","type":"paragraph"},{"text":"“现在党的组织建设工作，就是个人崇拜和发展私人势力，这样的党就成为宗派主义和不受欢迎的集团。”（兰州大学  方文信）","type":"subtitle"},{"text":"“入党靠送情报和打击别人作为手段。”（中山大学  顾绶昌）","type":"paragraph"},{"text":"“中大发展党员都是那些唯唯诺诺的，不敢批评党的人，历史系发展的党员都是走私人路线。”（中山大学  端木正）","type":"paragraph"},{"text":"“我院（指北京体院——原编者注）入党的同志都是老老实实的听话的人，好提意见好说话的人都不能入党。党组织应该解释这种老老实实是什么意思？党组织把好说话的都看成异己分子。我嫉姤党的威信这样高，我很担心毛主席是否会犯错误。”（北京体育学院  张世杰）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8127bc2c4c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
