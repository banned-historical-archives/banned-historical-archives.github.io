nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"陈伯达就八月十八日《人民日报》刊登南开大学“卫东”编辑部文章一事接见南大“八·一八”总部负责人的讲话","parts":[{"type":"title","text":"933.陈伯达就八月十八日《人民日报》刊登"},{"type":"paragraph","text":"南开大学“卫东”编辑部文章一事接见南大“八·一八”总部负责人的讲话"},{"type":"paragraph","text":"(1967年8月19日)"},{"type":"paragraph","text":"8月19日在人大会堂，陪同接见的有：《人民日报》负责人唐平铸同志。陈伯达同志在①本书编者按：原件无日期，此日期系编者酌加。听取“八·一八”总部负责人江浩同志汇报后，讲：“《人民日报》登的“卫东”那篇文章，没有调查研究，选错文章的时候也有嘛！你们都是红代会的，我对你们没有偏见。”“‘卫东’队压制你们是不对的，不能解雇工人，不应该打‘八·一八’同学、干部，他们压制你们是不对的，应该叫同志们安心工作。”伯达同志还接着鼓励说：“你们搞调查是很好的，你们要实事求是地把天津的问题好好搞一搞。”最后，唐平铸同志代表《人民日报》社检查说：“登卫东那篇文章，我们没有进行调查，可能不符合你们学校的实际情况。因为现在有很多革命干部没有站起来，“卫东”的《要大胆使用干部》文章比较适时，所以发了。”他接着说：“你们可以随时来找我，咱们可以谈谈怎么办！”"}],"authors":["陈伯达"],"dates":[{"year":1967,"month":8,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":364,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"唐平铸","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3c57c6b73"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
