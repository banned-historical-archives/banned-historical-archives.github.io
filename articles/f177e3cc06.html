hors":["张高庆"],"dates":[{"year":1966,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　南京部队某部海防文工团的同志，满怀革命激情，连日来高举毛主席画像，敲锣打鼓走上街头、到部队驻地、舰艇、居民点，宣传无产阶级文化大革命的新胜利，受到广大工农兵群众的热烈欢迎。"},{"type":"paragraph","text":"在无产阶级文化大革命中，海防文工团的同志怀着对党对毛主席无比热爱和对反党反社会主义黑帮的刻骨仇恨，运用各种文艺形式愤怒的声讨了邓拓、吴晗、廖沫沙等反党分子和一切牛鬼蛇神。他们以高度的革命热情，编写了快板、对口词、相声、数来宝、歌曲等等文艺节目，热情地歌颂了无产阶级文化大革命的新胜利，深刻地揭露了反党黑帮的反党反社会主义严重罪行。在演出时，有时候一天连演六场。他们高声歌唱《大海航行靠舵手》《社会主义好》《伟大的国家伟大的党》等革命歌曲；表演相声《向反党反社会主义黑线开火》、对口词《欢呼文化大革命新胜利》等节目，受到广大群众的热烈欢迎。某部五好战士看了演出后激动地说:“文工团的演唱说出了我们的心里话，每只歌都唱在我们的心坎上。我们工农兵就是要永远跟党走，跟毛主席走，坚决把这伙反党黑帮彻底打倒，把无产阶级文化大革命进行到底。”驻地民兵兴奋地说:“文工团的演出反映了我们广大工农兵热爱党，热爱毛主席的心情。我们民兵一定要一手拿枪，一手拿笔，坚决保卫党中央、保卫毛主席，不彻底打倒一切牛鬼蛇神，决不收兵。”一位社员看了演出后说:’“海防文工团的演出，大大激发了我们的斗志，长了我们广大工农兵的志气，灭了资产阶级的威风，鼓舞了我们向反党分子斗争的决心。”　(张高庆)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f177e3cc06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
