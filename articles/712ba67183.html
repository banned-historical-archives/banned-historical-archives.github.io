script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美资产阶级报刊评新总统登场  肯尼迪政府困难重重前景不妙","authors":[],"dates":[{"year":1961,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美资产阶级报刊评新总统登场"},{"type":"paragraph","text":"肯尼迪政府困难重重前景不妙"},{"type":"paragraph","text":"据新华社21日讯　美国许多资产阶级报刊在评论肯尼迪政府上台时，虽然表示希望这个政府能够挽救美帝国主义在国内外江河日下的局面；但是，它们不得不承认，这个新政府将不是“开市大吉”，而是面临着重重无法克服的困难，前景不妙。"},{"type":"paragraph","text":"华盛顿《明星晚报》最近刊载布朗的一篇文章说，“在这个共和国（美国）的历史上，谁也没有面临过比当选总统肯尼迪所面临的更复杂和更艰巨的问题”。"},{"type":"paragraph","text":"美国报刊普遍认为，肯尼迪“重振”美国威信，挽救破产的美国“实力地位”政策的努力将是十分困难的。美国一些通讯社最近广泛引用肯尼迪的“空间特别小组”的一个“紧急报告”，这个报告承认，美国目前不但在所谓“可靠的威慑力量”所需要的军事导弹以至超音速民用飞机方面落在苏联之后，而且“十之八九”，在把有人的空间运载工具发射入围绕地球的轨道的竞赛中也将要失败。一些报刊并且还谈到了苏美经济发展速度的悬殊。谈到如何对付高涨中的民族独立运动，提前发行的1月23日的《美国新闻与世界报道》杂志惴惴不安地说，“差不多在世界各地，从非洲、亚洲到加拿大和拉丁美洲，反美（运动）看来正在高涨”。这家周刊在1月16日的一期中再次对美国在亚洲反共阵线的不稳表示不安说，“在好几个亚洲国家都会发现一种中立主义的趋向，一种越来越加强的愿意同共产主义打交道的意愿。”"},{"type":"paragraph","text":"西方阵营内的矛盾重重也使美国报刊感到很大忧虑。《美国新闻与世界报道》杂志在1月16日一期中还说，“当选总统在世界各地面临危机”，“当肯尼迪和腊斯克的班子将要上台的时候，他们发现（美国）用很高代价建立并曾抱有很大希望的用来推行（美国）主义的庞大的联盟组织正在分崩离析。”"},{"type":"paragraph","text":"美国报刊普遍承认，在国内方面，肯尼迪政府面临经济危机和对外支付危机日益加深的棘手局面，而且将没有什么解决问题的妙方。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"712ba67183"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
