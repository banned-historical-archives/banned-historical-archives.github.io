[{"year":1996,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《亲情》再现毛泽东廉洁形象"},{"type":"paragraph","text":"由湘潭市广播电视局、湖南省电视台联合摄制的电视剧《亲情》，是一部歌颂以毛泽东同志为代表的我们党一心为公、清正廉洁的光荣传统的成功之作。《亲情》的剧情是：１９４９年建国初，毛泽东同志在为国操劳、日理万机之中，热情地接待了分几路来京看望他的湖南亲友。对亲友想靠他“谋事做”的要求，毛泽东从坚持党的宗旨、维护新生人民政权崇高的崭新形象的高度出发，妥善加以处理。所有亲友经过毛泽东同志的言传身教，服从大局，放弃个人要求，愉快离京回乡，安心生产。毛泽东同志用自己的工资和稿酬帮助他们缓解困难。"},{"type":"paragraph","text":"在日前由中国广播电视学刊等单位召开的座谈会上，首都电视界有关专家充分肯定《亲情》是一部展示毛泽东大情感、大亲情和领袖伟大廉洁精神的优秀作品；认为在党中央倡廉反腐的今天，《亲情》所蕴含的“当官要廉洁”、“当官要过亲情关”等多层面的主题，有着重大现实和深远的历史意义。"},{"type":"paragraph","text":"据悉，该剧将于９月上旬在中央电视台播出。（焦炽公清）"},{"type":"paragraph","text":"（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"339e28d9be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
