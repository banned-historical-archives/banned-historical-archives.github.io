torical-archives/banned-historical-archives8/main/maoquanji4-1.pdf"],"article":{"title":"湖南秋收暴动要有军队帮助","alias":"","parts":[{"type":"paragraph","text":"湖南秋收暴动要有军队帮助!！"},{"type":"paragraph","text":"（1927年8月18日）"},{"type":"paragraph","text":"一、湖南的秋收暴动的发展，是解决农民的土地问题，这是谁都不能否认的。但要来制造这个暴动，要发动暴动，单靠农民的力量是不行的，必须有一个军事的帮助。有一两团兵力，这个暴动就可起来，否则终归于失败。二、暴动的发展是要夺取政权，要夺取政权，没有兵力的拥卫去夺取，这是自欺的话。我们党从前的错误，就是忽略了军事，现在应以百分之六十的精力注意军事运动，实行在枪杆上夺取政权，建设政权。"},{"type":"paragraph","text":"[1]这是毛泽东和易礼容在改组后的中共湖南省委第一次会议上讨论湖"}],"authors":["毛泽东"],"dates":[{"year":1927,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":65,"page_end":65},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1eb533b0c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
