tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"隆重悼念叶剑英同志","authors":[],"parts":[{"type":"paragraph","text":"据新华社广州10月29日电 广州地区各界代表五千人今天在广东省人民政府礼堂举行吊唁仪式，沉痛悼念叶剑英同志。"},{"type":"paragraph","text":"广东省人民政府礼堂一片庄严肃穆气氛。吊唁礼堂的灵堂摆放着常青树、柏树和鲜花，正面的中央悬挂着叶剑英同志的遗像。遗像下面放着叶剑英同志的子女携晚辈献的花圈，上面写着：“最敬爱的爸爸您永远活在我们心中”。礼堂内陈放着中共广东省委、省顾委、省人大常委会、省政府、省政协、省纪委、中共广州军区党委、广州军区、新华社香港分社、广州市党政领导机关、省市各民主党派、侨联、工商联，以及全国政协副主席茅以升、王恩茂，广州地区党政军负责人林若、尤太忠、张仲先，中顾委委员任仲夷、刘田夫等送的花圈。"},{"type":"paragraph","text":"在广州的全国政协、民革中央领导人，中顾委、中纪委、全国人大常委会委员，以及广州地区党政军负责人、老红军、老干部，省市各民主党派、人民团体、宗教界的负责人和叶剑英同志的部分亲属参加了今天的吊唁仪式。"},{"type":"paragraph","text":"为了悼念叶剑英同志，今天广州各党政军机关、人民团体、工厂、商店、学校、车站、码头、机场都下半旗志哀。叶剑英同志的家乡梅县从10月22日至今天，已有二万五千多人参加吊唁活动。"},{"type":"paragraph","text":"又讯 为悼念长期担任党和国家重要领导职务的卓越领导人叶剑英元帅，新华社香港分社10月29日在香港举行隆重悼念仪式。前往参加悼念活动的香港各界同胞和外国友好人士共四千七百多人。"},{"type":"paragraph","text":"澳门中外各界人士一千三百多人10月29日隆重悼念叶剑英元帅。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e054dee8d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
