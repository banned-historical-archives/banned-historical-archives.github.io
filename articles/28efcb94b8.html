结论","authors":[],"dates":[{"year":1983,"month":12,"day":26}],"is_range_date":false,"parts":[{"text":"中共重庆市委统战部关于康心如先生错划右派问题的改正结论","type":"title"},{"text":"康心如，男，1898年生。陕西省城固县人。民建会员，解放前历任重庆美丰银行、民生公司等六十余企业的董事长、总经理、董监事等职。曾任国民党国大代表、重庆临参会参议长。解放后曾任市人民委员会委员、市政协常委、市民建、工商联副主委、全国工商联执委等职。1957年6月划为极右分子，1958年5月处理为保留市政协委员、市工商联执委和民建会籍，撤消其他一切职务，由行政13级降为17级。1960年10月摘帽，1961年迁居北京，1969年病逝。","type":"paragraph"},{"text":"根据中央〔1978〕55号文件精神，原划康心如先生为右派分子的问题属于错划，应予改正，恢复政治名誉，消除影响。","type":"paragraph"},{"text":" 中共重庆市委统战部 (公章)1980年7月29日1983年12月26日修改","type":"paragraph"},{"text":"1981年3月29日，《重庆日报》头版正下方刊登了追悼会消息，全文如下：","type":"subtitle"},{"text":"原市民建、市工商联副主任委员康心如追悼会在市政协礼堂举行","type":"subtitle"},{"text":"本报讯  原中国民主建国会重庆市委员会副主任委员、重庆市工商业联合会副主任委员、市投资公司经理康心如追悼会，昨天上午在市政协礼堂举行。","type":"paragraph"},{"text":"康心如同志于1969年11月16日因病逝世，终年79岁。","type":"paragraph"},{"text":"追悼会由民建重庆市委员会主任委员刘昆水主持。中国人民银行重庆市分行行长白银彰致悼词。","type":"paragraph"},{"text":"悼词说，康心如同志是一个爱国的民族工商业者。青年时代受孙中山先生民主革命思想的影响，加入同盟会，积极参加辛亥革命活动。解放前，他主要从事金融事业。对我省、我市民族工商业、金融事业的发展，起了一定的作用。解放后，他积极协助党和政府宣传贯彻党对私营工商业进行社会主义改造的方针、政策，作出了有益的贡献。曾被选为重庆市人民代表大会代表，省、市政协委员。1957年被错划为右派，现已改正，恢复名誉。","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"重庆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28efcb94b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
