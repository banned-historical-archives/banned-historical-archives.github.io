ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"在薄一波反映家乡人民公社情况的来信上的批语","alias":"","parts":[{"type":"paragraph","text":"在薄一波反映家乡人民公社情况的"},{"type":"paragraph","text":"来信上的批语"},{"type":"paragraph","text":"（1959年10月8日）印发政治局书记处各同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月八日尚昆办。"},{"type":"paragraph","text":"[1]薄一波，山西省定襄县人。当时任中共中央政治局候补委员、国务院副总理。1959年10月7日他给毛泽东写信说：“我的家乡一和平人民公社的党委书记韩生智同志给我写来一封信，我看了感到十分兴奋：一、公社化后粮食大增产，工业也搞得很好；二、今年每人平均分到三十斤麦子（保证了国家征购任务后），我的家乡主粮是杂粮；三、公共食堂五十九座，看来是基本上都到公共食堂了；四、群众情绪高涨等等。特将这封令人兴奋的信打印送您一阅。”"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":10,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":433,"page_end":433},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66cd9c6499"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
