节录）","authors":[],"dates":[{"year":1951,"month":2,"day":10}],"is_range_date":false,"parts":[{"text":"华东局关于镇压反革命活动补充指示（节录）","type":"title"},{"text":"自中央“双十指示”以来华东全区已捕反革命8万余人，处决2万2千余人，计浙江捕3万人，杀1万人左右。山东捕1万3千余人，杀3千余人。福建杀3千5百人，捕不详。苏南捕1万3千余人，杀2千2百人。苏北捕2千9百余人，杀770人，皖北捕1万1千人，杀870人。皖南捕6700余人，杀1600人。上海市捕1300余人，杀126人（上海自解放至今年一月底共捕特务9500余人，杀262人）。南京自解放以来共捕500余人，杀50人。…个别地方发现捕人过多和杀人草率的现象。但若干地区特别是大中城市还是杀人不够。…凡是未经判决群众自动打死人的地方各方意见很多。例如上海附近的松江分区经判决杀了600多人，无人讲话，但群众动手打死了32人，则地主资产阶级到处大喊大叫。","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d89c7e2dc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
