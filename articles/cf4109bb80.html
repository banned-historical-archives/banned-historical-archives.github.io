script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抵制资产阶级经营思想　热情为广大群众服务华山照相馆自觉坚持社会主义方向","authors":[],"dates":[{"year":1979,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　华山照相馆职工坚持把大多数群众的需要作为主要业务，受到顾客欢迎。"},{"type":"paragraph","text":"该馆职工由于坚持为大多数群众服务，所以营业繁忙，每天拍、印照片近一千份左右。三月中旬，上海焦化厂需要更换工作证和会员证，但吴泾地区没有一家照相馆，工人拍照很不方便。他们了解这一情况后，就派了两位同志下厂服务，利用一切空余时间，为工人拍、印了四百张证件照，大大方便了群众。"},{"type":"paragraph","text":"该馆职工还不怕麻烦，尽量满足一些顾客的特殊需要。如为一些垂危病人拍遗像照，这项业务往往时间急，要求高，但他们总是随叫随到，主动去医院或病人家里服务。他们还下乡为社员服务。对一些工厂、科研单位急需拍的机器、产品、科研成果等图纸、样品，也能迅速拍好印好，支援生产和科研工作。"},{"type":"paragraph","text":"该馆职工还注意克服重视大生意、轻视小生意的错误倾向，坚持社会主义方向，自觉抵制资产阶级思想的侵蚀。在橱窗陈列中，他们坚持把工农兵和知识分子中先进人物的形象作为主要内容，不用一些奇异古怪的照片来招徕生意。对少数顾客提出的拍摄不健康照片的要求，能进行抵制。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf4109bb80"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
