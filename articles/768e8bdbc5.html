art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"努力奋战人定胜天——唐山灾区军民抗震救灾纪实","authors":[],"parts":[{"type":"paragraph","text":"北京部队某部八连同灾区群众一起认真学习毛主席重要指示和党中央慰问电，深入批判邓小平反革命的修正主义路线，把抗震救灾工作做得又快又好。"},{"type":"paragraph","text":"铁道兵某部指战员和广大铁路职工，发扬大无畏的革命精神，团结战斗，迅速将遭受地震破坏的京山铁路修复通车。"},{"type":"paragraph","text":"某部指战员和唐山市人民群众一起，发扬自力更生的革命精神，共同规划，一起动手搭起一排排简易房，使受灾群众迅速搬进新屋。"},{"type":"paragraph","text":"某部“抗震救灾爱人民模范连”指战员本着因地制宜、就地取材和逐步完善的精神，帮灾区群众搭起能防雨、防寒、防震、防火的四防简易房子，深受群众欢迎。（照片五）某部指战员和开滦煤矿马家沟矿的职工一起奋战抗灾，使部分矿井很快恢复了生产。"},{"type":"paragraph","text":"某部八二炮连指战员和灾区群众以泰山压顶不弯腰的英雄气概和地大震、人大干的钢铁意志，誓在大灾之年夺丰收。"},{"type":"paragraph","text":"某部“全心全意为人民服务的先进卫生科”，在抗震救灾斗争中热情支持新生事物，积极帮助灾区恢复健全合作医疗。（本组照片均由本报通讯员、本报记者摄）（照片）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"768e8bdbc5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
