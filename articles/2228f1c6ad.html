ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"转发《福建的经验》的批语","alias":"","parts":[{"type":"paragraph","text":"转发《福建的经验》的批语\""},{"type":"paragraph","text":"（1959年3月24日）"},{"type":"paragraph","text":"福建的经验发各省、市、区党委参考。其中第二、第三两段所说的问题，应当引起充分注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五九年三月二十四日"},{"type":"paragraph","text":"[1]指中共福建省委1959年3月20日晚9时关于公社所有制和分配问题的意见给毛泽东并中央的电报。毛泽东在批转这个报告时，将题目改为《福建的经验》。"},{"type":"paragraph","text":"[2]中共福建省委报告中第二、三段所说的问题，即关于生产队的部分所有制问题和人民公社总收入的分配比例问题。报告指出，解决生产大队和生产队（原高级社下属的生产队）的关系，即解决生产队的部分所有制问题，是广泛地调动广大干部和社员的积极性的一个重大问题。但这种生产队又不能成为三级所有制的基本核算和分配单位，因为它规模太小、力量薄弱，在许多方面不便于生产的发展，而群众也习惯以原高级社作为统一的分配和核算单位。因此生产队的部分所有制既不能太大，也不能太小。关于人民公社总收入的分配问题，福建省委同意中央指示的比例。公共积累部分，1959年拟提高为15%左右（公社10%，生产大队和生产队5%，生产小队由小型副业收入中另外积累百分之几）。社员的消费部分，坚持按劳分配，工资制和供给制相给合，供给部分今年不可过多，工资部分应当高于供给部分。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":381,"page_end":381},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2228f1c6ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
