s":[{"year":1961,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席周恩来总理"},{"type":"paragraph","text":"电贺伊拉克共和国国庆"},{"type":"paragraph","text":"新华社13日讯　中华人民共和国主席刘少奇今天打电报给伊拉克共和国最高权力委员会主席穆罕默德·纳吉布·鲁巴伊，祝贺伊拉克共和国国庆（7月14日）。电文如下：巴格达伊拉克共和国最高权力委员会主席穆罕默德·纳吉布·鲁巴伊阁下："},{"type":"paragraph","text":"值此伊拉克共和国国庆之际，我谨代表中华人民共和国和中国人民，并且以我个人的名义，向阁下和伊拉克人民表示衷心的祝贺。祝中、伊两国间的友谊进一步发展。祝贵国国家繁荣、人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"1961年7月13日"},{"type":"paragraph","text":"新华社13日讯　中华人民共和国国务院总理周恩来今天打电报给伊拉克共和国总理阿卜杜勒·卡里姆·卡塞姆，祝贺伊拉克共和国国庆（7月14日）电文如下：巴格达伊拉克共和国总理阿卜杜勒·卡里姆·卡塞姆阁下："},{"type":"paragraph","text":"欣逢贵国国庆三周年，我谨代表中华人民共和国政府，并且以我个人的名义，向阁下、伊拉克共和国政府和人民表示热烈的祝贺。"},{"type":"paragraph","text":"三年来，中伊两国的关系，在和平共处五项原则和万隆精神的指导下，获得了进一步的发展。我深信，通过我们双方的共同努力，存在于我们两国之间的这种友好关系，必将日益加强。祝伊拉克人民在建设自己的国家、反对帝国主义和殖民主义、维护世界和平的事业中取得新的成就。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1961年7月13日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a14c1ee816"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
