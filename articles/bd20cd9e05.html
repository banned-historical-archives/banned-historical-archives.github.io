art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"读一辈子毛主席的书","authors":[],"parts":[{"type":"paragraph","text":"有一天，一个名叫迪亚洛·卡乌苏拉耶的几内亚学生，从边疆城市昆达拉给在首都科纳克里的一个中国朋友写信，要求给他一本《毛主席语录》。他在信中说：“大海航行靠舵手，万物生长靠太阳。干革命一定要靠毛泽东思想。毛泽东是革命人民的伟大领袖和统帅。”"},{"type":"paragraph","text":"他说：“当我从北京电台听到伟大舵手毛主席的语录，听到中国人民在文化大革命中取得胜利的时候，我就觉得我仿佛是在新中国，在北京，在伟大导师毛主席的身边。”"},{"type":"paragraph","text":"两个月以后，这位几内亚学生又给中国朋友写信。他在信中说：“从你那里得到毛主席的著作，我高兴极了。毛主席的著作是全世界革命人民的精神食粮，是强大的思想武器，是取之不尽的力量源泉。”"},{"type":"paragraph","text":"他写道：“毛泽东思想是普照全世界的太阳。毛泽东思想教育我们，鼓舞我们，指导我们对帝国主义和各国反动派进行斗争。我决心一辈子读毛主席的书。”他最后高呼：“毛主席万岁！光辉的毛泽东思想万岁！祝毛主席万寿无疆！”"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd20cd9e05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
