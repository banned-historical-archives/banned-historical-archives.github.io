<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央军委十条命令","authors":[],"dates":[{"year":1967,"month":4,"day":6}],"is_range_date":false,"parts":[{"text":"中央军委十条命令","type":"title"},{"text":"林彪同志：","type":"appellation"},{"text":"此件很好。","type":"paragraph"},{"text":" 毛泽东四月六日","type":"paragraph"},{"text":"毛主席指示，中国人民解放军介入地方文化大革命，大力支持左派，这是一个伟大的、具有战略意义的决定，是一个崭新的历史任务。我军广大指战员，积极响应伟大领袖毛主席的号召，在支左工作中起了很大的作用。最近我们检查了某些军区的支左工作，有的做得好，有的做得不好。目前出现了许多新问题，应当及时引起注意。为此，特发布命令如下：","type":"paragraph"},{"text":"（一）对群众组织，无论革命的、或者被反动分子所控制的，或者情况不清楚的，都不准开枪，只能进行政治工作。","type":"paragraph"},{"text":"（二）不准随意捕人，更不准大批捕人。对于确实查明的反革命分子要逮捕。但必须证据确凿，经过批准手续。","type":"paragraph"},{"text":"（三）不准任意把群众组织宣布为反动组织，加以取缔。更不准把革命组织宣布为反革命组织。对于犯有某些错误的群众组织，要积极进行帮助教育。对于确实查明被反动分子控制的群众组织，要做分化争取工作，孤立其最坏的头头，争取被蒙蔽的群众。必须公开宣布其为反动组织加以取缔的，要经中央批准。","type":"paragraph"},{"text":"（四）对于过去冲击过军事机关的群众，无论左、中、右，概不追究。只对业已查明特别坏的右派头头，要追究，但应尽量缩小打击面。不能仅仅根据是否冲击过军事机关这一点来划分左、中、右。","type":"paragraph"},{"text":"（五）对待较大的群众组织采取什么态度，应就地深入调查研究，进行阶级分析；采取重大行动前，应向中央文革和全军文革请示报告。","type":"paragraph"},{"text":"（六）一概不要进行群众性的“请罪”运动。也不要强迫群众写检讨。群众自动写的检讨书，退还其本人。有些长期不觉悟并且坚持错误观点的群众，不要急于要他们认错，而要给以时间，让他们在斗争中自己教育自己。不允许体罚和变相体罚。例如，戴高帽，挂黑牌，游街，罚跪，等等。","type":"paragraph"},{"text":"（七）在军队中要深入进行以毛主席为代表的无产阶级革命路线同资产阶级反动路线的两条路线斗争的教育。学习毛主席著作，必须结合两条路线的斗争。广泛搜集揭露反动路线和一小撮党内走资本主义道路当权派的各种具体材料，印发到连队进行教育，使广大指战员了解他们的反动事实，进行彻底批判，肃清其恶劣影响。","type":"paragraph"},{"text":"（八）对派到地方上去或主持支左的干部，要详细交待政策。要防止赵永夫式的反革命分子（赵永夫原青海省军区副司令员，是一个混进党内军内的反革命分子，他玩弄阴谋手段，篡夺军权，对革命群众组织进行残酷的武装镇压）或思想很右的人来主持支左工作。","type":"paragraph"},{"text":"（九）在支左工作中，要学会做群众工作，相信群众，依靠群众，有事同群众商量，善于采用说服教育的方式，而不应采取简单粗暴和命令的方式。","type":"paragraph"},{"text":"（十）对业已违反了上述诸条做法的，都要立即改正，积极进行善后处理。今后，坚决按以上各条办事。","type":"paragraph"},{"text":"这个命令，要在我军所有机关、连队内部用电报、电话迅速传达，广泛张贴。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第二集）》， 北京：1967年6月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13ab33d237"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
