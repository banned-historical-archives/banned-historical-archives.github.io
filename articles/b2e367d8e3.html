art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"团结绝大多数群众把矛头对准一小撮阶级敌人","authors":["南京部队第三届活学活用毛泽东思想积极分子代表大会代表某团副参谋长/南京红旗水泥厂革委会常委","巴月明"],"parts":[{"type":"paragraph","text":"毛主席亲自主持制定的划时代文献——中共中央一九六六年五月十六日的《通知》发出两周年的时候，我们重新学习《通知》这个光辉的文件，回忆在南京红旗水泥厂同群众一起向阶级敌人作斗争的过程，深深体会到，革命委员会要成为有无产阶级革命权威的战斗指挥部，就必须把绝大多数群众团结在毛泽东思想伟大红旗下，组成浩浩荡荡的革命大军，共同对敌。只有这样，才能彻底孤立敌人，狠狠地打击敌人，陷敌于“人民战争”的汪洋大海之中。"},{"type":"paragraph","text":"红旗水泥厂革命委员会成立以后，摆在我们面前的问题是如何正确区分两类不同性质的矛盾，团结广大革命群众和革命干部，共同把矛头指向一小撮阶级敌人。我们革委会全体成员认真学习毛主席关于“组织千千万万的民众，调动浩浩荡荡的革命军，是今天的革命向反革命进攻的需要”的教导，大摆当前阶级斗争的新形势，大谈团结对敌的重要性，使大家认识到，毛主席的无产阶级革命路线就是相信群众，依靠群众，团结绝大多数群众共同对敌的路线，能不能团结广大革命群众共同前进，是对毛主席革命路线忠不忠的大问题。很多同志深有体会地说：我们多团结一名群众，就多一分执行和捍卫毛主席无产阶级革命路线的力量，就多一分胜利。"},{"type":"paragraph","text":"为了团结广大革命群众共同对敌，我们革委会以“斗私，批修”为纲，大办学习班，狠抓阶级斗争和路线斗争教育。我们把学习班变成向阶级敌人进攻的战场，狠批中国赫鲁晓夫的资产阶级反动路线，揭发批判走资派挑动群众斗群众、企图分裂工人队伍、搞垮革命委员会的罪行，教育了广大革命群众，进一步从思想上巩固了革命大联合和革命三结合。"},{"type":"paragraph","text":"毛主席说：“开展谈心活动，这个方法很好。”在进行阶级斗争和路线斗争教育的同时，我们革委会在各级建立了十六个思想互助小组，广泛深入群众，谈心交心，把毛泽东思想送到群众的心坎里。有个工人经过数次谈心以后，提高了阶级觉悟，奋起揭发厂内走资派成立地下班子，采取“拉出去，打进来”的办法，伺机从无产阶级革命派手里夺权的罪行，把这个走资派暴露在光天化日之下。有一次，我们部队同志和革委会成员分头跑了几十里路，到一些群众家里访问，同他们一起学习毛主席著作和毛主席最新指示，一起忆苦思甜，一起斗私批修。毛泽东思想照亮了他们的心。他们纷纷站在毛主席像前，热泪盈眶地作了自我批评，决心紧跟毛主席的伟大战略部署，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"“群众齐心了，一切事情就好办了。”革命委员会团结了广大群众，组织起浩浩荡荡的革命大军，又准、又狠、又稳地打击一小撮阶级敌人，真正成为带领群众向阶级敌人冲锋陷阵的战斗指挥部，使厂里的无产阶级文化大革命运动蓬蓬勃勃地向前发展。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2e367d8e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
