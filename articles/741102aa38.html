反英勇斗争","authors":[],"dates":[{"year":1967,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日中友协（正统）总部声明决心维护日中两国人民战斗团结"},{"type":"paragraph","text":"号召活学活用毛主席著作同帝修反英勇斗争"},{"type":"paragraph","text":"新华社东京电　高举日中友好旗帜的日中友好协会（正统）总部十月三十日，在这个组织成立一周年的时候发表声明表示：要活学活用毛主席著作，勇敢地同帝国主义、现代修正主义和各国反动派进行斗争，坚决粉碎堕落为修正主义的日共宫本集团及其操纵下的伪日中友协组织，为进一步巩固日中两国人民的战斗团结而奋斗。"},{"type":"paragraph","text":"声明谴责日共宫本修正主义集团的反华活动，重申一九六六年十月十二日，日中两国友好协会代表团在北京发表的共同声明，正确地表达了日本人民反对日共宫本集团的反华活动、期望日中友好的战斗意志。"},{"type":"paragraph","text":"声明谈到了在日共宫本集团妄图以暴力来破坏共同声明的时候，团结在日中友好协会（正统）总部中的大多数人民，为维护日中友好而进行的不屈不挠的勇敢斗争。他们通过斗争，把更多期望日中友好的人们团结在日中友好协会（正统）总部的旗帜之下。"},{"type":"paragraph","text":"声明还指出，正当中国无产阶级文化大革命胜利前进，而走投无路、陷于绝境的美帝国主义、各国反动派和以苏修统治集团为核心的现代修正主义，在国际上掀起反华活动的时候，佐藤政府和日共修正主义分子也变本加厉地进行露骨的反华活动。但是，它们的反华行径，在日本人民中间正在遭到越来越强烈的反对。"},{"type":"paragraph","text":"声明强烈谴责日共宫本集团疯狂地攻击中国七亿人民和世界人民心中最敬爱的伟大领袖毛主席。"},{"type":"paragraph","text":"声明着重指出，目前国际和日本国内，处于一派大好形势，对日本人民的斗争非常有利。中国无产阶级文化大革命的伟大胜利是这种大好形势的决定力量，它极大地鼓舞和激励了世界各国人民。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"741102aa38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
