script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度人民反暴政反饥饿烈火熊熊  西孟加拉邦群众袭击反动政府机构并筑街垒打退警察进攻  喀拉拉邦群众愤怒焚烧印度官员和印共修正主义头目人像","authors":[],"dates":[{"year":1967,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度人民反暴政反饥饿烈火熊熊"},{"type":"paragraph","text":"西孟加拉邦群众袭击反动政府机构并筑街垒打退警察进攻"},{"type":"paragraph","text":"喀拉拉邦群众愤怒焚烧印度官员和印共修正主义头目人像"},{"type":"paragraph","text":"据新华社讯　新德里消息：印度西孟加拉邦和喀拉拉邦人民最近奋起开展反暴政、反饥饿斗争，并且用暴力反抗警察的血腥镇压。在这两个邦政府中当官的印共修正主义分子，过去吹嘘他们能够利用邦政权为人民谋福利；他们还保证不动用警察去镇压人民斗争。现在，大量事实证明他们只不过是在撒谎。"},{"type":"paragraph","text":"到十二日为止，西孟加拉邦各地人民的反暴政、反饥饿示威已进入第六天。他们奋勇抵抗警察的迫害，袭击反动政府机关。几千名示威者蹲在铁道上，使整个邦的铁道交通中断。"},{"type":"paragraph","text":"在西孟加拉邦首府加尔各答以北大约一百公里的纳巴德维普镇，由于市场上一连几天买不到粮食，一千多名饥饿的群众十日愤怒地向反动政府表示抗议，并且放火焚烧政府机关。"},{"type":"paragraph","text":"十一日，群众继续进行反饥饿示威。他们包围了县官，罚他在县政府里站了四个钟头。他们还包围警察局。同时，这个市镇附近的饥饿的农民也纷纷起来袭击反动政府机关，拦截火车和公路上的汽车。"},{"type":"paragraph","text":"十二日，群众的斗志更加昂扬，他们为了防止印度反动派从外地调去军警进行血腥镇压，切断了电话线和铁道线，把河上的渡船藏起来。他们还筑起了街垒，用石块等做武器打退反动警察的进攻。反动警察向群众开枪，打死四人，打伤约三十人。"},{"type":"paragraph","text":"据报道，西孟加拉邦三千六百万人中大约有两千多万人几个星期来实际上没有粮食吃，他们被迫以草根和野果充饥。西孟加拉邦政府根本无法解决粮荒问题，它明知道中央政府也没有粮食，但是为了应付差使，就由邦首席部长打电话给总理英迪拉·甘地要求拨给粮食，而英迪拉·甘地耍了个花招，她含糊其词地说，“将尽力满足”西孟加拉邦的粮食需要，企图搪塞过去。"},{"type":"paragraph","text":"在喀拉拉邦，群众性的反暴政、反饥饿斗争已经开展了大约半个月。八月七日，群众在邦首府特里凡德琅举行大规模示威。大部分学校的学生举行罢课，参加示威。他们拦住了邦政府的一些部长的汽车。十一日，特里凡德琅的示威群众焚烧了邦首席部长、印共修正主义头目南布迪里巴德和邦粮食部长、丹吉集团分子托马斯的假人像。邦政府派警察到车站用暴力镇压参加斗争的群众。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44039a23f0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
