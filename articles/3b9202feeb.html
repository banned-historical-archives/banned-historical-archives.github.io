thors":[],"dates":[{"year":1957,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报武汉专讯】　记者李厚成报道:全国横渡长江游泳竞赛的前夕，正是长江大桥的钢梁铺上上了第一块枕木、武钢动工建造第一号高炉和武汉市各阶层热烈展开反右派斗争的时候，我就在这个难忘的日子里，访问了武汉市副市长孙耀华同志。孙副市长是全国网球协会主席，武汉市体委主任，也是武汉体育学院院长。"},{"type":"paragraph","text":"孙副市长高兴而激动的叙述了毛主席三次横渡长江的英雄故事。他说:毛主席早在青年时代就征服了湘江，在去年还没有横渡长江的前几天，他老人家重又在长沙渡过了湘江。孙副市长用敬慕的口吻盛赞了毛主席游泳技术的高明，他说，毛主席可以静止在水面上躺上几分钟，而且还可以从容不迫地仰面眺望大江两岸的风光。毛主席在去年5月31日第一次横渡长江时，足足游了两小时，游程不下40华里。在6月2、3日的第二、三次渡江时，也游上了一小时。当毛主席第一次渡江后，在船艇上休息时，毛夫人问主席累不累，主席说如果给我一个馒头，再游上一小时决无问题。可想而知，毛主席的水性实在了不起。"},{"type":"paragraph","text":"孙副市长敬佩地谈到了毛主席横渡长江后，所作的“水调歌头”的词，他说，毛主席这首词的主题是游过长江后发抒自己的思想感情，这词最初的题目是“长江”，后改“游泳”，可以说全词以游泳为经，以长江为纬，交织而成。孙副市长对毛主席这首词所以受到人们传诵的原因，发表了他的看法说:主要有丰富的生活体验和博古通今的学问。"},{"type":"paragraph","text":"孙副市长还谈到毛主席渡过长江后，大大鼓舞了群众对渡江的信心。他说，这次武汉市的渡江比赛，报名就有5000多人，如果放宽尺度，恐怕不难超过万人。"},{"type":"paragraph","text":"最后他说，明年武汉市将重点开展划船、游泳等水上运动，并把横渡长江作为武汉市的传统体育项目。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b9202feeb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
