tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席语录","authors":["毛泽东"],"parts":[{"type":"paragraph","text":"抗大的教育方针是：坚定正确的政治方向，艰苦朴素的工作作风，灵活机动的战略战术。这三者是造成一个抗日的革命的军人所不可缺的。"},{"type":"paragraph","text":"——《被敌人反对是好事而不是坏事》"},{"type":"paragraph","text":"团结、紧张、严肃、活泼。"},{"type":"paragraph","text":"——为“抗大”制定的校训"},{"type":"paragraph","text":"三大纪律如下："},{"type":"paragraph","text":"（一）一切行动听指挥；（二）不拿群众一针一线；（三）一切缴获要归公。"},{"type":"paragraph","text":"八项注意如下："},{"type":"paragraph","text":"（一）说话和气； （二）买卖公平；"},{"type":"paragraph","text":"（三）借东西要还；（四）损坏东西要赔；"},{"type":"paragraph","text":"（五）不打人骂人；（六）不损坏庄稼；"},{"type":"paragraph","text":"（七）不调戏妇女；（八）不虐待俘虏。"},{"type":"paragraph","text":"——《中国人民解放军总部关于重行颁布三大纪律八项注意的训令》"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3be2f6d64e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
