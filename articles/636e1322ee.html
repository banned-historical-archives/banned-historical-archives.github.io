art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"丁莱夫同志追悼会在北京举行叶剑英邓小平彭真徐向前聂荣臻杨尚昆等送花圈杨得志主持追悼会张震致悼词","authors":[],"parts":[{"type":"paragraph","text":"新华社9月21日讯 人民解放军总参谋部通信部原顾问丁莱夫，因病医治无效，于8月28日逝世。丁莱夫同志追悼会9月20日在北京八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"叶剑英、邓小平、彭真、徐向前、聂荣臻、杨尚昆、杨得志、余秋里、胡乔木、姚依林、秦基伟、谷牧、廖汉生、洪学智、刘澜涛、杨成武等领导同志，中共中央军委、国防部、广播电视部、中国人民解放军总参谋部、总政治部、总后勤部、北京部队、中共山东省委等单位，送了花圈。"},{"type":"paragraph","text":"姚依林、刘澜涛、杨成武以及丁莱夫同志生前友好，广播电视部、总参谋部的代表一千多人参加了追悼会。"},{"type":"paragraph","text":"迫悼会由杨得志同志主持，张震同志致悼词。"},{"type":"paragraph","text":"悼词说，丁莱夫同志早在上学时期就积极投入了革命活动，1936年4月加入中国共产党，1937年4月奔赴延安，参加中国工农红军。他是我党的优秀党员，无产阶级的忠诚战士，我党我军的优秀政治工作领导干部。在近五十年的革命生涯中，他忠于党，忠于人民，为共产主义事业贡献了毕生的精力。"},{"type":"paragraph","text":"丁莱夫同志遗像。（新华社发）RW：丁莱夫"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"杨得志","type":"人物"},{"name":"姚依林","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭真","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"刘澜涛","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"636e1322ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
