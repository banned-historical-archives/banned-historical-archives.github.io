art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"蒙古军事代表团到京彭德怀元帅设宴招待贵宾","authors":["郝建国"],"parts":[{"type":"paragraph","text":"本报28日讯 蒙古人民共和国访华军事代表团，今天上午乘专机到达北京。"},{"type":"paragraph","text":"当贵宾们走下飞机时，受到了彭德怀元帅，黄克诚大将、王树声大将、李聚奎上将、常乾坤空军中将、周希汉海军中将、肖向荣中将等和陆海空军军官三百余人热烈欢迎。"},{"type":"paragraph","text":"代表团团长巴特·道尔吉中将由彭德怀元帅陪同，检阅了仪仗队。接着举行欢迎仪式。"},{"type":"paragraph","text":"彭德怀元帅致欢迎词。他代表解放军全体官兵向贵宾们表示热烈欢迎。"},{"type":"paragraph","text":"彭怀怀元帅说：中蒙两国人民和军队之间有着长期的、兄弟般的战斗友谊。在我国第二次革命战争时朋，蒙古人民对于我国的革命斗争，即寄予极大的同情和关怀；在抗日战争时期，蒙古人民又曾经出兵和我们一起，共同打败了日本法西斯侵略者。在和平建设时期，我们也互相给予支援。今天，以道尔吉中将为首的蒙古人民共和国访华军事代表团又来到我国访问，我深信，代表团在中国的活动，一定地更进一步地增进中蒙两国人民之间，特别是中蒙两国军队间的友谊和团结。"},{"type":"paragraph","text":"道尔吉中将在热烈掌声中讲了话。他说：蒙古人员及其军队完全赞同和支持中华人民共和国政府为制止美国和蒋介石集团的粗暴罪行，为解放中国不可分割的领土台湾及其临近岛屿，为维护亚洲及世界和平屡次所采取的措施。并为这个神圣事业作出贡献充满着热望。"},{"type":"paragraph","text":"蒙古人民共和国访华军事代表团由七人组成。团长是蒙古人民共和国军事和公安部长巴特·道尔吉中将。团员是：哈什巴特上校、乌尔日帕拉姆上校、纳木吉尔道尔日中校、图穆尔—奥奇尔中校、宾巴上校、甘加尼亚姆大尉。"},{"type":"paragraph","text":"到机场欢迎的还有我外交部副部长姬鹏飞、我公安部副部长杨奇清、汪金祥。"},{"type":"paragraph","text":"蒙古人民共和国驻华大使鲁布桑和各国驻华武官也到机场欢迎。"},{"type":"paragraph","text":"本报28日讯 彭德怀元帅今晚举行宴会，欢迎蒙古人民共和国访华军事代表团。"},{"type":"paragraph","text":"陈毅元帅、黄克诚大将、王树声大将、刘亚楼空军上将、陈士榘上将、李聚奎上将、刘志坚中将、肖向荣中将、周希汉海军中将等出席了宴会。"},{"type":"paragraph","text":"彭德怀元帅接见蒙古人民共和国访华军事代表团。"},{"type":"paragraph","text":"本报记者 郝建国摄"}],"alias":""},"tags":[{"name":"王树声","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d73b09e3b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
