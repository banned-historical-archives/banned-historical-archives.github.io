:["刘淑清"],"dates":[{"year":1972,"month":10,"day":20}],"is_range_date":false,"parts":[{"text":"刘建章妻子给毛泽东的信（要点）","type":"title"},{"text":"刘淑清","type":"authors"},{"text":"〖刘建章，原铁道部副部长。〗","type":"subtitle"},{"text":"信中说，刘建章一九二六年入党，今年六十二岁，不知何故于一九六八年二月被拘留审查，至今已近五年。一九七二年六月八日，中央专案组通知我们家属到狱中探视，发现他体质很坏，面黄肌瘦，连说话有时也咬字不清。监狱生活条件差，每天饮水只有三杯的定量，每日“放风”也只有三十分钟的时间，有关政治上的大事更是不得而知。信中请求改变目前这种审查方式，允许家属经常探望，或准许刘建章回家等待审查结论并治病。","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bc4f9b0d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
