],"dates":[{"year":1950,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社重庆三十日电】　重庆的小学生最近收到南京、天津、济南等城市的小学生寄来的四十多封信，祝贺重庆的小朋友们在解放以后获得了自由快乐的生活。南京市一个名叫淑敏的小学生在信中愉快地说:“你们现在也和我们一样过着自由的日子了。”天津的小朋友白萍在信上写着:“我们远在渤海边的人，为你们获得解放而庆祝，为祖国获得解放而欢欣。”济南市立庆祥街小学全体同学向重庆小学生祝贺解放的信中充满了兴奋的情绪写着:“现在我们都是毛泽东时代幸福的儿童。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8c99c7ea2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
