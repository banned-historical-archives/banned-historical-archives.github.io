script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海汽轮机厂组成各种形式的理论学习　小组把刻苦学习和参加实际斗争结合起来运用马克思主义理论武器，向资产阶级意识形态展开全面进攻","authors":[],"dates":[{"year":1974,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海汽轮机厂广大职工在批林批孔斗争中组成各种形式的理论学习小组，认真学习马列主义、毛泽东思想，逐步形成了一支以工人为主体的理论队伍，发挥了积极作用。"},{"type":"paragraph","text":"“我们的斗争需要马克思主义。”这个厂的工人理论队伍是在斗争中逐步发展壮大起来的。早在一九六九年四月，广大职工在党的九大“团结、胜利”路线的鼓舞下，建立了一支工人“土记者”队伍，大造革命舆论，积极参加意识形态领域里的斗争。批林整风开始后，广大职工在深入批判林彪反革命的修正主义路线的过程中认识到，只有“认真看书学习，弄通马克思主义”，才能批臭修正主义，才能提高识别真假马克思主义的能力和增强反修防修的自觉性。他们在各车间党支部的支持下，组织起近百个学马列小组。厂党委也坚持举办干部马列读书班，培训了一批骨干。批林批孔运动开始以后，这个厂的党委充分发挥工会、共青团等组织的作用，依靠各车间党组织，充分调动车间、班组革命大批判积极分子的积极性。同时，党委又进一步扩大工人学马列小组，还把一批学习骨干集中起来，分别成立了政治经济学小组、自然辩证法小组、国际时事研究小组、哲学小组、书评小组、文艺创作小组等，出现了向资产阶级意识形态展开全面进攻的大好形势。"},{"type":"paragraph","text":"这支理论队伍的成员扎根在车间班组，在业余时间进行生气勃勃的学习、讨论，他们自己举办讲座，召开批判交流会，出大批判专栏和黑板报。理论学习小组的同志们努力学习马列主义理论，运用马列主义的立场、观点、方法来指导现实斗争。政治经济学小组的同志学习了马克思的光辉著作《哥达纲领批判》。马克思在这篇著作中指出:社会主义是刚刚从资本主义社会中产生出来的，“它在各方面，在经济、道德和精神方面都还带着它脱胎出来的那个旧社会的痕迹。”因此，社会主义社会的上层建筑和经济基础就必然存在着既相适应又相矛盾的状况。大家认识到，当前开展的批林批孔运动是上层建筑领域里坚持马克思主义，坚持无产阶级革命，促使上层建筑更好地适应社会主义经济基础的重要措施。通过学习，大家进一步加深了对批林批孔运动伟大意义的理解，提高了斗争自觉性。他们回班组后积极宣传这场运动的意义，带头学，带头批，在班组里发挥了骨干作用。哲学小组的同志学习了马列和毛主席的有关著作后，运用马克思主义的哲学思想，狠批林彪、孔老二鼓吹的“中庸之道”。国际时事研究小组的同志联系当前国际阶级斗争形势，开展了“帝、修、反都是尊孔派”的专题讨论，狠批林彪投降、卖国的罪行。"},{"type":"paragraph","text":"在批林批孔运动中，该厂理论队伍的同志发扬知难而进的精神，刻苦学习理论。每次组织学习活动时，他们都把车间、部门里学习中的一些问题带上来讨论研究，把各个理论学习小组的一些成功经验带回去，推动班组的学、批、联。供应科型砂仓库学习小组组长周子诚，为了搞好小组学习，自己先学一步，多学一点，然后在小组学习会上进行讲解，但小组学习的效果还是不够理想。后来，老周参加了厂部的哲学小组，看到哲学小组采取的是轮流主讲、集体讨论的方法，效果较好。老周从中受到很大的启发，回去后就把小组分成几个小小组，每次学习前让各个小小组分头准备，学习时轮流主讲，然后互相补充，或提出一些问题展开讨论。这样就充分发挥了小组里每个同志的积极性，使小组的学习和批判搞得生气勃勃。冷锻车间青年工人小潘，刚开始学习历史上儒法两家斗争的有关材料时，因为文言文难理解，意思弄不清，产生畏难情绪。后来她参加了厂部书评小组讨论柳宗元的《封建论》，经过同志们的启发帮助，逐步理解了全文意思，并且懂得了秦汉时期儒法两家关于“分封制”与“郡县制”的斗争，就是倒退与前进，复辟与反复辟的两条路线斗争，当前开展的批林批孔运动，就是坚持继续革命，反对复辟倒退的斗争。于是，她写出了《历史斗争是现实斗争的一面镜子》的学习体会。回到自己班组后，她又根据自己的学习体会，向老师傅们讲述了历史上儒法斗争的情况，促进了班组大学习、大批判的开展。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"儒法斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08007e8a68"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
