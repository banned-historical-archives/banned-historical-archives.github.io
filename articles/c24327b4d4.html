rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想不断提高两条路线斗争觉悟","authors":["李晋"],"parts":[{"type":"paragraph","text":"什么是对毛主席最大的忠？门合同志以实际行动作出了明确的回答：就是坚决执行、勇敢捍卫毛主席的革命路线。在建国以来的历次阶级大搏斗中，他一贯站在毛主席革命路线一边，二十年如一日。一九六四年反革命修正主义分子罗瑞卿刮起了大比武的妖风，门合同志以天不怕、地不怕的革命英雄主义精神，捍卫了毛主席的无产阶级建军路线，始终不渝地把活学活用毛泽东思想摆在第一位，坚决抵制了罗瑞卿的资产阶级军事路线，实现了他“时刻为毛主席的革命路线放好哨，站好岗，打好仗”的钢铁誓言。"},{"type":"paragraph","text":"门合同志所以能做到时刻为毛主席的革命路线放好哨，站好岗，打好仗，是他活学活用毛泽东思想，在用字上狠下功夫的结果。他真正把毛泽东思想化为了自己的灵魂，用毛泽东思想统帅了自己的一切。他掌握了毛泽东思想这个政治上的“望远镜”和“显微镜”，就能分辨什么是正确路线，什么是错误路线，就能在阶级斗争的大风大浪里方向明、脚跟稳，坚定地站在毛主席的革命路线一边。我们学习门合同志，就要象他那样对毛泽东思想认真领会，句句照办，用明察秋毫的毛泽东思想去观察一切，分析一切，对待一切；就要象他那样，用毛泽东思想彻底改造自己的世界观，不断提高两条路线斗争觉悟，自觉地站在执行、捍卫毛主席革命路线的最前哨。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c24327b4d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
