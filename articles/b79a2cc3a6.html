script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日中友协全国大会隆重开幕松本强调日中两国人民的友谊是任何人都阻挠不了的　安斋库治斥美帝和现代修正主义联合进行反华大合唱","authors":[],"dates":[{"year":1964,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京26日电】　东京消息:日中友好协会全国大会二十五日在东京隆重开幕。"},{"type":"paragraph","text":"出席大会的有全国四十六个都、道、府、县的代表和观察员共四百五十多人。共产党、社会党和许多群众团体的代表应邀出席了大会。"},{"type":"paragraph","text":"正在日本访问的中国经济友好访日代表团团长南汉宸、中国经济贸易展览团团长张化东、中国展览会访日友好参观团团长齐维礼和三个代表团的部分团员也应邀出席了大会。"},{"type":"paragraph","text":"大会宣布开幕后，日中友好协会会长松本治一郎首先致词，他强调说:“日中两国人民之间的友谊是任何人都阻挠不了的。让我们站在为争取日中关系正常化征集三千万人签名的运动的最前列，来回答中国人民的友谊。”"},{"type":"paragraph","text":"他指出，要打倒日中友好的敌人。他说:美帝国主义及其仆从在世界上日益孤立。正因为这样，他们正在采取越来越疯狂的行动。迫害在巴西的中国人员和加紧对老挝的干涉，就是两个证据。日本人民决不能容忍这种行为。"},{"type":"paragraph","text":"他说，协会员人数比两年前增加一倍半。在过去一年中建立了二十五个新的分支组织。"},{"type":"paragraph","text":"协会理事长宫崎世民在大会上报告了协会过去一年的工作。"},{"type":"paragraph","text":"南汉宸应邀在会上讲话。他首先赞扬日中友好协会在成立以来的十四年中对促进中日友好作出的贡献。"},{"type":"paragraph","text":"他说，现在中日友好是主流，谁都不能阻挠这种潮流。事实证明，在日本，哪一个党派、团体和个人高举中日友好的旗帜，并且切实地做中日友好工作，就能够得到两国人民的拥护。"},{"type":"paragraph","text":"日共中央政治局候补委员安斋库治在会上讲话时指出，在美帝国主义和现代修正主义联合进行反华大合唱，企图孤立和“遏制”中国的时候，日中友好协会举行大会要进一步加强日中友好关系，这说明了日本人民绝不在美帝国主义和现代修正主义面前屈服，而要坚决保卫日本人民利益，并且站在这个立场上独立自主地来决定自己的行动。"},{"type":"paragraph","text":"他号召人们建立更广泛的统一战线，来孤立美帝国主义和追随它的反动势力。"},{"type":"paragraph","text":"日中文化交流协会理事长中岛健藏、社会党代表成田知己和日本工会总评议会代表兼田富太郎也在会上讲了话，强调日中友好。兼田富太郎还强烈谴责美帝国主义和巴西政变当局迫害中国贸易工作人员和记者。"},{"type":"paragraph","text":"大会在二十六日举行分组会，大会将举行三天。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b79a2cc3a6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
