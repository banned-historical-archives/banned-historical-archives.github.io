ar":1950,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】北京二十日消息:印度共和国驻我国第一任特命全权大使潘尼迦在今天下午五点钟偕秘书雁谒森、古玛尔向我国中央人民政府毛泽东主席呈递国书，在场的有中央人民政府秘书长林伯渠、中央人民政府政务院总理兼外交部部长周恩来、中国人民解放军代理总参谋长聂荣臻、外交部办公厅主任王炳南、中央人民政府典礼局局长余心清，外交部交际处处长王倬如。潘尼迦大使呈递国书时，曾向毛泽东主席致颂词，毛泽东主席致答词。"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea4b67c525"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
