ar":1954,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资产阶级的广告术"},{"type":"paragraph","text":"超琪"},{"type":"paragraph","text":"第一机械工业部第三机器工业管理局最近发出一个通报，指出所属单位刊登产品广告中的若干虚夸现象："},{"type":"paragraph","text":"一、还没有试造就编入产品样本。例如大连起重机器厂的三吨汽车起重机，沈阳重型机器厂的一种苏联式圆锥破碎机等等。"},{"type":"paragraph","text":"二、试制了还没有成功就刊登广告，招揽主顾。例如大连起重机器的电磁吊车，太原矿山机器厂的一五○公尺水平钻机，沈阳矿山机器厂的桅杆起重机等等。更为严重的是抚顺重型机器厂，试制半立方公尺和一立方公尺的电铲还没有完成，也不顾管理局的指示，竟用苏联的产品照片在工人日报上刊登广告。"},{"type":"paragraph","text":"三、沈阳重型机器厂承制鞍山钢铁公司的电动泥炮，原是专案订货，用户只有几家，完全不需要登广告，但也登了。"},{"type":"paragraph","text":"当然，介绍和宣传产品是很必要的。这可以帮助使用者确切了解产品的性能，便于他们的选择，也可以扩大产品的销路，对国家对人民都有好处。可是，这种介绍必须是实事求是的，不能夸大，不能把没有说成有，更不应该把别人的说成自己的。如果这样，就不是宣传而是对用户的欺骗。在我们国家里，使用以上产品的大多是国营企业，欺骗它们，使他们遭到损害，也就是使国家受到损害。因此必须立即停止这种行为，反对这种资产阶级的广告术。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b1dc90e5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
