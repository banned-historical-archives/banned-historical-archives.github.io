ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对反映刘景范情况来信的批语","alias":"","parts":[{"type":"paragraph","text":"对反映刘景范情况来信\"的批语"},{"type":"paragraph","text":"（1974年12月21日）此案审查已久，不必再拖了，建议宣布释放，免于追究。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿一日送汪主任酌办。"},{"type":"paragraph","text":"[1]地质部原副部长刘景范的嫂子同桂荣（刘志丹烈士的妻子）1974年12月17日给毛泽东等写信说，今天我去看望刘景范，发现他身体很坏，精神不好，患有肝病、十二指肠溃疡病，手脚浮肿，肚子膨胀，可能是肝硬变，如果不及时治疗，担心坚持不了多长时间。特此请求：一、他的问题已经审查8年了，如果已经审查清楚，能否赶快把他释放出来治病？二、如果他的问题还不能下结论，是否可以把他放出来一面治病，一面继续审查？"},{"type":"paragraph","text":"[2]根据毛泽东的批示，中共中央办公厅主任汪东兴1974年12月21日指出：“同桂荣同志写给毛主席的信，主席已有批示。此件请印发在京中央政治局同志。并送两份给中央专案组一办，遵照批示办理。”"}],"authors":["毛泽东"],"dates":[{"year":1974,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":523,"page_end":523},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"367013bd0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
