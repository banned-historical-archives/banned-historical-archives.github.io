rs":[],"dates":[{"year":1979,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用叶剑英同志的国庆讲话统一思想"},{"type":"paragraph","text":"栖霞县委解决前段不敢解决的一些问题"},{"type":"paragraph","text":"据新华社济南十月二十七日电  山东省栖霞县委认真学习叶剑英同志国庆重要讲话，总结半年多来贯彻执行三中全会精神的情况，继续开展真理标准问题的讨论，进一步解放思想，解决了一些前一段不敢解决的问题。"},{"type":"paragraph","text":"（一）合理调整农业生产的内部结构，纠正单一经营思想，逐步走农工商综合经营的路子。要在抓好粮食生产的同时，根据本地实际，发展多种经营。允许社队利用农副产品加工糕点、调味品、果脯、果汁、果酒等副食品，提倡有条件的社队兴办饭馆、旅馆、照相等饮食服务业。除了允许社员的粮油上市以外，在完成国家征购任务后，也允许集体的粮油上市。"},{"type":"paragraph","text":"（二）克服“恐富症”，鼓励社员在经济收入上“冒尖”。前一段，县委不敢提倡社员广开生财之道。这次县委决定，在劳动计酬上，认真执行“按劳分配，多劳多得”的原则，鼓励和扶持社员在不影响参加集体生产的前提下，努力发展家庭副业，饲养猪、羊、兔、鸡、鸭、鹅等家畜家禽的数量不受限制，以前强行没收社员的自留树坚决退回，支持社员种好自留地，鼓励他们在经济收入上“冒尖”。"},{"type":"paragraph","text":"（三）既合理扩大集体福利事业，又注意克服分配上的平均主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dac3a21456"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
