script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"先解决受降、伪军、自治三大问题才能恢复交通","alias":"","parts":[{"type":"paragraph","text":"先解决受降、伪军、自治三大问题"},{"type":"paragraph","text":"才能恢复交通！"},{"type":"paragraph","text":"（1945年11月5日）甲乙戌微致丙丁："},{"type":"paragraph","text":"支电悉。"},{"type":"paragraph","text":"（一）目前我在谈判中，在恢复交通问题上有几点提法已处于被动，必须考虑成熟，恢复主动；决定《解放日报》明日发表中共发言人谈话，强调必须立即制止内战，必须先解决受降、伪军、自治三大问题，才能恢复交通，否则即是帮助内战；在受降问题上必须由解放区担任受降，其他军队撤回原防。"},{"type":"paragraph","text":"（二）邯郸战役?缴获大批文件证明政府有全盘反共内战计划，请你考虑可否借此转弯，采取强硬态度，不要撤回原提四点，只说政府一面谈判，一面大举进攻，现并大举调兵，所谈尽是欺骗，我们不能信任；如欲取信，必须立即解决受降（包括撤兵驻防）、伪"},{"type":"paragraph","text":"[1]这是中共中央给在重庆的中共代表团的电报。[2]指周恩来1945年11月4日给中共中央的电报。[3]即《国民党进攻的真相》。[4]邯郸战役，也称平汉战役。[5]指周恩来、王若飞1945年10月26日在给中共中央的电报中提出的军、自治三大问题。"},{"type":"paragraph","text":"（三）不但我们在之交通线彼不得进，我们不在彼亦不得进，已进者须撤退，否则一一定是内战。"},{"type":"paragraph","text":"（四）交通线上可以双方不驻兵，彼方已驻者须退返原防，不能让其驻在我解放区。"},{"type":"paragraph","text":"（五）双方军队撤离交通线后，应由解放区自治政府管理。"},{"type":"paragraph","text":"（六）不能同意组织交通考察团，应先解决受降（包括撤兵驻防）、伪军、自治三问题，亦即解决内战危险问题，由解放区负责恢复交通，目前则绝对不能恢复。"},{"type":"paragraph","text":"（七）不要急忙回答彼方所提六点，也不怕他们发表，实际上吴国桢\"已于四日向合众社发表，此间今晚发表批评。"},{"type":"paragraph","text":"（八）同意东北问题暂缓提出。"},{"type":"paragraph","text":"（九）关于揭发内战及美军干涉两点，已令几个机关动员来做，材料可大增加。"},{"type":"paragraph","text":"（十）西安息，蒋令胡宗南立即去郑州，发动大举进攻，彼方一不做二不休，深堪注意。"},{"type":"paragraph","text":"[1]吴国桢（1903一1984)，湖北建始人。当时任国民党中央宣传部部长。[2]蒋，指蒋介石。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":11,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":62,"page_end":63},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34687cf784"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
