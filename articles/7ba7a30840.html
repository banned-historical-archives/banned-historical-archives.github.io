思想上巩固和发展革命大联合","authors":[],"dates":[{"year":1967,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在我们伟大领袖毛主席亲临上海视察文化大革命的特大喜讯鼓舞下，在毛主席最新指示的教导下，华东化工学院化工红旗总部和新化工总部今日凌晨实现了革命大联合，他们以这个实际行动响应了前天市革命委员会扩大会上发出的“没有联合的单位要在国庆节前尽快实现革命大联合”的号召。"},{"type":"paragraph","text":"化工红旗总部和新化工总部都是革命群众组织。但由于党内一小撮走资本主义道路当权派的挑动；由于资产阶级反动路线流毒没有肃清；由于组织内部小资产阶级思想和派性的影响，从一月份就开始打“内战”，越打越激烈，多次发生严重武斗，双方情绪十分对立。"},{"type":"paragraph","text":"最近，我们伟大领袖毛主席视察上海文化大革命和发出最新指示的喜讯，大大鼓舞了华东化工学院的红卫兵革命小将和广大革命师生，他们表示坚决听毛主席的话，照毛主席的指示办事，尽快地联合起来。在实现革命大联合的过程中，他们反复学习了毛主席关于革命的红卫兵和革命的学生组织要实现革命的大联合，两派是革命群众组织，要无条件实现革命大联合的最新指示，坚决排除小资产阶级派性带来的种种障碍，终于实现了革命的大联合。"},{"type":"paragraph","text":"在实现革命大联合过程中，上海市革命委员会领导成员曾到该校作了重要讲话，帮助这二个革命群众组织提高认识，希望他们联合以后更高地举起毛泽东思想伟大红旗，狠斗私心杂念，大批修正主义，从思想上巩固革命大联合，发展革命大联合，以实际行动迎接建国十八周年光辉节日。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ba7a30840"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
