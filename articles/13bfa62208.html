art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高举毛泽东思想红旗为祖国争取更大荣誉国家体委、全总、妇联、团中央致电祝贺胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社二十日讯 中华人民共和国国务院副总理贺龙今天打电报给参加第二十八届世界乒乓球锦标赛中国乒乓球代表团团长荣高棠和中国乒乓球队全体同志，祝贺中国乒乓球队获得男、女团体冠军。电报全文如下："},{"type":"paragraph","text":"卢布尔雅那"},{"type":"paragraph","text":"参加二十八届世界乒乓球锦标赛中国乒乓球代表团"},{"type":"paragraph","text":"荣高棠同志并中国乒乓球队全体同志："},{"type":"paragraph","text":"欣闻你们双获得团体赛冠军，全国人民都为你们取得的巨大胜利欢欣鼓舞。"},{"type":"paragraph","text":"这一胜利，是高举毛泽东思想的伟大红旗、突出政治、坚持四个第一、大学解放军的结果，是思想过硬、技术过硬的总体现。"},{"type":"paragraph","text":"你们不愧为用毛泽东思想武装起来的坚强的战斗集体，是一支拥有千军万马力量的队伍，只要你们继续高举毛泽东思想的伟大红旗，发扬不断革命精神，再接再厉，不骄不馁，一定能够为祖国取得更大的荣誉。"},{"type":"paragraph","text":"最后，特向你们表示热烈的祝贺和慰问。"},{"type":"paragraph","text":"贺龙"},{"type":"paragraph","text":"一九六五年四月二十日"},{"type":"paragraph","text":"据新华社二十日讯 国家体委、全国总工会、全国妇联、共青团中央今天分别打电报给中国乒乓球队，祝贺他们获得男女团体赛冠军的胜利。RW：贺龙；国务院副总理；贺电"}],"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13bfa62208"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
