art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘主席会见并欢宴胡主席刘少奇周恩来朱德邓小平等领导人到机场热烈欢迎","authors":["侯波杜修贤"],"parts":[{"type":"paragraph","text":"新华社2日讯 毛泽东主席、刘少奇主席今天晚上会见并设宴欢迎越南劳动党中央委员会主席、越南民主共和国主席胡志明。"},{"type":"paragraph","text":"在会见的时候，毛泽东主席、刘少奇主席同胡志明主席进行了亲切的谈话。"},{"type":"paragraph","text":"参加会见和宴会的党和国家的其他领导人有周恩来、朱德、邓小平、彭真、陈毅、李富春、李井泉、杨尚昆。参加会见和宴会的还有中共中央委员伍修权，外交部副部长罗贵波。"},{"type":"paragraph","text":"正在北京的越南劳动党中央政治局委员、越南民主共和国国会常务委员会副主席黄文欢，越南民主共和国驻中国大使陈子平，也参加了会见和宴会。"},{"type":"paragraph","text":"新华社2日讯 应邀前往苏联参加10月社会主义革命四十三周年庆祝典礼的越南劳动党中央委员会主席、越南民主共和国主席胡志明在去莫斯科途中，今天下午乘专机到达北京。"},{"type":"paragraph","text":"胡志明主席受到刘少奇、周恩来、朱德、邓小平等党和国家领导人的热烈欢迎。"},{"type":"paragraph","text":"胡志明主席乘坐的银色飞机下午四点十五分在首都机场降落时，机场上响起了热烈的掌声。这时，刘少奇、周恩来、朱德、邓小平等党和国家领导人到飞机前迎接胡志明主席，并向胡志明主席致以亲切的热烈的问候。"},{"type":"paragraph","text":"机场上举行了隆重的欢迎仪式。乐队高奏越中两国国歌后，胡志明主席由刘少奇主席陪同检阅了陆、海、空三军仪仗队。胡志明主席接受了首都少年儿童献花 。"},{"type":"paragraph","text":"今天到机场欢迎胡志明主席的还有中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，中共中央政治局委员、国务院副总理陈毅、李富春，中共中央书记处书记谭政，候补书记杨尚昆，全国人民代表大会常务委员会副委员长郭沫若、陈叔通，中共中央委员、全国人民代表大会常务委员会副委员长林枫，中共中央委员刘宁一、伍修权，政协全国委员会副主席包尔汉，国防委员会副主席博作义，外交部副部长罗贵波。"},{"type":"paragraph","text":"到机场欢迎的还有政府机关各部门、各民主党派、各人民团体和北京市的负责人，中国人民解放军高级将领和首都各界群众。"},{"type":"paragraph","text":"正在北京的越南劳动党中央政治局委员、越南民主共和国国会常务委员会副主席黄文欢，越南驻中国大使陈子平和使馆人员，在京的越南留学生、实习生，各国驻中国使节和外交官员也到机场欢迎。"},{"type":"paragraph","text":"新华社2日讯 应邀前往苏联参加十月社会主义革命四十三周年庆祝典礼的越南劳动党中央委员会主席、越南民主共和国主席胡志明，今天上午乘飞机路过武汉时，在武汉机场作了短时间的停留。"},{"type":"paragraph","text":"胡志明主席在武汉机场上受到了热烈的欢迎和欢送。武汉市的少先队员向胡志明主席献了鲜花。前往机场迎送的有中共湖北省委书记处书记、湖北省省长张体学，中共湖北省委书记处书记、湖北省副省长赵辛初，以及武汉市党政负责人，中国人民解放军驻武汉部队首长，湖北省和武汉市政协负责人等。"},{"type":"paragraph","text":"胡志明主席由张体学省长等陪同进午餐后，即乘飞机离开武汉。"},{"type":"paragraph","text":"毛主席和胡主席亲切谈话。 新华社记者 侯波摄"},{"type":"paragraph","text":"胡志明主席在刘少奇主席陪同下步出机场。 新华社记者 杜修贤摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"李富春","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfd8d19a69"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
