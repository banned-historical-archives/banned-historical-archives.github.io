script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德国统一社会党代表大会继续举行董必武的讲话受到热烈欢迎代表们一致严厉谴责现代修正主义","authors":[],"dates":[{"year":1958,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社柏林12日电】　德国统一社会党第五次代表大会今天上午9点钟继续开会。大会执行主席昂纳克宣布开会后，首先请中国共产党代表团团长、中共中央政治局委员董必武讲话。这时全场起立，热烈地鼓掌表示欢迎。"},{"type":"paragraph","text":"董必武在致词和宣读中共中央贺电的过程中，不断地暴发出热烈的掌声。当他谈到“我们现在正处在一个东风压倒西风的时代”时，全场活跃，响起了长时间的热烈鼓掌，并且有人发出欢呼声。当他谈到“中国人民在中国共产党的正确领导下，一定能够在15年或更短时间内在重要工业产品的产量方面赶上和超过英国”，以及“帝国主义侵略集团和为帝国主义政策效劳的修正主义分子是注定要失败的”时，又一次博得了全场长时间的掌声。"},{"type":"paragraph","text":"董必武致词完毕后，全场起立，报以长时间的热烈鼓掌。乌布利希、格罗提渥和马特恩一一和董必武亲切握手。这时全场高呼:“以毛泽东同志为首的伟大的光荣的中国共产党万岁!”"},{"type":"paragraph","text":"【新华社柏林11日电】　在德国统一社会党第五次代表大会的第二天会议上，一个由民主德国全国各主要国营企业的几十个职工代表组成的代表团来到了会场。他们高举红旗和黑、红、金三色国旗走到主席台前，代表全国数百万职工向大会报喜和祝贺。代表团的一位发言人向大会报告了生产战线上的许多捷报，作为全体职工向大会的最诚挚的献礼。"},{"type":"paragraph","text":"在今天下午和晚上的大会讨论中发言的有德国统一社会党中央政治局委员艾伯特，政治局候补委员穆肯贝格尔，罗斯托克专区党委第一书记麦维斯，来比锡专区党委第一书记弗勒利希，艾尔福特市委第一书记丹姆等。应邀参加大会的德国共产党代表团团长、德共中央第一书记雷曼也在大会上讲了话。"},{"type":"paragraph","text":"艾伯特在发言中对比地说明了在民主德国工农政权下所实行的社会主义民主的优越性和在西德实行的资产阶级议会民主的欺骗性。他还批评了西德社会民主党反共政策和对议会民主存幻想的错误。"},{"type":"paragraph","text":"穆肯贝格尔在发言中对农业上的修正主义作了原则性的批判。"},{"type":"paragraph","text":"麦维斯在发言中指出，“粉碎修正主义是实现我们的目标的先决条件”。他说，“德国统一社会党今天所以能够向德国工人阶级指出社会主义的伟大远景，正是因为它经过彻底的争辩之后，给了修正主义以决定性的打击。”"},{"type":"paragraph","text":"德共代表团长雷曼今晚的致词把大会引向了新的高潮。他的祝词受到全场的热烈鼓掌和欢呼。他在分析了西德的阶级斗争形势后，着重斥责了南共领导集团的修正主义谬论。大会将在12日上午继续举行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3564ce7c0d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
