ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发山东分局关于镇反工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发山东分局关于镇反工作报告的批语"},{"type":"paragraph","text":"（1951年3月30日）"},{"type":"paragraph","text":"山东有些地方存在着劲头不足的偏向，有些地方存在着草率从事的偏向，这是全国各省市大体上都存在的两种偏向，都应注意纠正。特别是草率从事的偏向，危险最大。因为劲头不足，经过教育说服，劲头总会足起来的，反革命早几天杀，迟几天杀，关系并不甚大。惟独草率从事，错捕错杀了人，则影响很坏。请你们对镇反工作，实行严格控制，务必谨慎从事，务必纠正一切草率从事的偏向。我们一定要镇压一切反革命，但是一定不可捕错杀错。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":194,"page_end":194},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28fd876f1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
