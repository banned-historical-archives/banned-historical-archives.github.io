hors":[],"dates":[{"year":1968,"month":6,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西德工人反剥削反迫害斗争日益发展"},{"type":"paragraph","text":"大学生涌上街头示威声援工人的正义斗争"},{"type":"paragraph","text":"新华社波恩二十六日电　西德国内阶级矛盾不断激化，广大工人群众反对垄断资本剥削和政治迫害的斗争日益发展。"},{"type":"paragraph","text":"西德国营萨尔茨吉特尔化学康采恩设在上埃肯什维克的一家氮气工厂的三百五十多名化学工人，为了抗议资本家阴谋关闭工厂和解雇工人，自本月二十四日起举行无限期罢工。二十五日，工人们打着旗帜到工厂管理委员会示威，要求厂方取消这个无理决定。同一天，属于同一家康采恩的设在戈斯拉和吕纳堡的两家分厂的一千多名工人举行了声援性罢工和声势浩大的示威，分头走向这家康采恩的总管理委员会，强烈抗议资方对工人权利的“最粗暴的侵犯”。"},{"type":"paragraph","text":"在这以前，蒂森康采恩所属的三家钢管厂的两千多名工人十二日举行罢工，强烈抗议资方无理解雇工人和削减工资。其中，设在莱斯霍尔茨的钢管厂的数百名工人还曾愤怒地走上街头，抗议垄断资本家在半年内已无理解雇了三百三十名工人。"},{"type":"paragraph","text":"在弗赖堡，美国资本控制的里敦康采恩所属的一家机械工厂，无理解雇了一名积极参加反对“紧急状态法”斗争的工人，激起了全厂工人的强烈愤怒。为了声援这家工厂的工人，弗赖堡的一百五十多名大学生曾涌上街头举行了示威游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a97e455dcf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
