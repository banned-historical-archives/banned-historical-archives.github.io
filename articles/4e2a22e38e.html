中直第四医院肃反运动中所犯“左”倾错误与无组织无纪律错误的报告的指示","authors":[],"dates":[{"year":1955,"month":10,"day":23}],"is_range_date":false,"parts":[{"text":"中共中央批转卫生部五人小组关于检查中直第四医院肃反运动中所犯“左”倾错误与无组织无纪律错误的报告的指示","type":"title"},{"text":"上海局、各省市委，中央和军委各部门，中央国家机关各部门党组（请省委转军区、省军区）：","type":"appellation"},{"text":"现将中央卫生部五人小组《关于检查中直第四医院肃反运动中所犯“左”倾错误与无组织无纪律错误的报告》转发给你们。中央认为，中央卫生部五人小组的报告是正确的。只有坚决反对无组织无纪律现象和“左”倾错误，才能保证运动的健康发展，才能达到团结占人数百分之九十几的好人的全部、肃清一切特务分子和不要冤枉一个好人的目的。必须在各级领导干部中反复进行此项教育，以免重复错误。一切确实发生“左”的偏向的单位就要采取措施加以克服，不要讳言“左”的偏向。同必须克服右的偏向一样，我们必须认真地克服“左”的偏向，才能使肃反运动自始至终地得到健康的发展。","type":"paragraph"},{"text":" 中央1955年10月23日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e2a22e38e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
