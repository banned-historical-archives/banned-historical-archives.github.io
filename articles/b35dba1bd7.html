ors":[],"dates":[{"year":1974,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年四月十七日电　以乔森潘副首相为团长、英·萨利特别顾问为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，由叶剑英副主席、韩念龙副部长陪同，结束了对四川省的友好访问，今天下午路经湖北省宜昌市，从宜昌乘专机回到北京。"},{"type":"paragraph","text":"乔森潘团长、英·萨利副团长是在十六日上午在重庆乘坐“东方红”三十二号轮船，沿着波涛滚滚的长江顺流东下，通过雄伟险峻的长江三峡，观看了长江两岸的壮丽景色。"},{"type":"paragraph","text":"柬埔寨贵宾今天下午路经宜昌市时，湖北省、宜昌地区和宜昌市的负责人姜一、吴端山、王群、马杰、楚建平、马维清等’曾前往迎送。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b35dba1bd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
