uthors":[],"dates":[{"year":1971,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无锡市革委会设宴欢迎西哈努克亲王"},{"type":"paragraph","text":"西哈努克亲王在叶剑英等同志陪同下游览太湖"},{"type":"paragraph","text":"新华社无锡二十六日电　无锡市革命委员会今天晚上举行宴会，热烈欢迎柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，以及其他柬埔寨贵宾。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英陪同西哈努克亲王和夫人参加了宴会。"},{"type":"paragraph","text":"江苏省革命委员会副主任杨广立、迟明堂，无锡市革命委员会主任王晏以及中国人民解放军驻无锡部队负责人出席了宴会。"},{"type":"paragraph","text":"应邀出席宴会的柬埔寨贵宾还有：西哈努克亲王的姑母诺罗敦·凯卡妮娅公主，国家元首办公厅主任西索瓦·梅达维亲王，古伦夫人，柬埔寨王国民族团结政府军需、军备大臣杨森安将军和夫人，柬埔寨驻中国大使凯密等。"},{"type":"paragraph","text":"宴会充满了中柬两国人民团结战斗的热烈气氛。王晏同志首先在宴会上讲话。他在讲话中热烈赞扬英雄的柬埔寨人民，在西哈努克亲王和柬埔寨民族统一阵线的领导下，在抗美救国战争中所取得的辉煌胜利。他表示，无锡市人民和全国人民一起，坚决拥护我国政府二月十二日的声明，决心遵照我们伟大领袖毛主席的“全世界人民团结起来，打败美国侵略者及其一切走狗！”的伟大号召，坚决支持柬埔寨人民和印度支那人民的抗美救国战争，直到取得彻底胜利。"},{"type":"paragraph","text":"西哈努克亲王在讲话中感谢无锡人民向柬埔寨人民表达的战斗情谊和支持。他说，美帝国主义面对印度支那人民的节节胜利，决不会甘心它的失败，还在加紧扩大侵略印度支那的战争。印度支那三国人民决心团结一致，坚决斗争，把美国侵略强盗赶出印度支那，赶下大海去，直到取得彻底胜利。印度支那三国人民深信，只要坚持持久战争，一定能够取得抗美救国战争的最后胜利！"},{"type":"paragraph","text":"宴会后举行了文艺晚会。革命文艺工作者演出了评弹、杂技等文艺节目。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召以及杨玲同志也出席了宴会。"},{"type":"paragraph","text":"今天上午，西哈努克亲王和夫人由叶剑英同志以及杨广立、迟明堂、王晏等同志陪同，乘船游览了太湖，并观看了捕鱼、彩船及革命群众在彩船上的文艺表演。下午，部分柬埔寨贵宾参观了无锡缫丝一厂。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"557606da67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
