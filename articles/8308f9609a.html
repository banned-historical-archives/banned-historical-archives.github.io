公社和农村工作情况的报告","authors":[],"dates":[{"year":1959,"month":5,"day":10}],"is_range_date":false,"parts":[{"text":"中央批转湖北、河北、广东三个省委关于人民公社和农村工作情况的报告","type":"title"},{"text":"各省、市、自治区党委：","type":"appellation"},{"text":"现将湖北、广东、河北三个省委向中央和主席的报告，转发各地参考。正确总结一九五八年农业生产大跃进中的经验和教训，发扬优点，克服缺点，力求在今年把工作 做得更好一些，这对于今年的大跃进更有保证。农业生产指标必须实事求是，经过一切努力能够达到的，必须力争达到；经过一切努力还达不到的，就应当修改，不要硬性的往下派。春荒尚有一个多月至两个月的时间才能基本上过去，决不要再忽视，还应当十分警惕可能发生夏荒。湖北省委对人民公社十八个问题的若干补充规定很好，各地可以参照执行。","type":"paragraph"},{"text":" 中 央一九五九年五月十日","type":"paragraph"},{"text":"（附文件略）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8308f9609a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
