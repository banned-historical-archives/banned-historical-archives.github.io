京大学","张元勋","沈泽宜"],"dates":[{"year":1957,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"大字报诗——是时候了","type":"title"},{"text":"北京大学沈泽宜张元勋","type":"authors"},{"text":"（沈泽宜、张元勋：北京大学中文系学生）","type":"subtitle"},{"text":"(一)","type":"paragraph"},{"text":"是时候了，","type":"paragraph"},{"text":"年轻人","type":"paragraph"},{"text":"放开嗓子唱!","type":"paragraph"},{"text":"把我们的痛苦","type":"paragraph"},{"text":"和爱情","type":"paragraph"},{"text":"一齐都泻到纸上！","type":"paragraph"},{"text":"不要背地里不平，","type":"paragraph"},{"text":"背地里愤慨，","type":"paragraph"},{"text":"背地里忧伤。","type":"paragraph"},{"text":"心中的甜、酸、苦、辣","type":"paragraph"},{"text":"都抖出来","type":"paragraph"},{"text":"见一见天光。","type":"paragraph"},{"text":"让批评和指责","type":"paragraph"},{"text":"急雨般落到头上，","type":"paragraph"},{"text":"新生的草木","type":"paragraph"},{"text":"从不怕太阳光照耀！","type":"paragraph"},{"text":"我的诗","type":"paragraph"},{"text":"是一支火炬。","type":"paragraph"},{"text":"烧毁一切","type":"paragraph"},{"text":"人世的藩篱，","type":"paragraph"},{"text":"它的光芒无法遮拦，","type":"paragraph"},{"text":"因为它的火种","type":"paragraph"},{"text":"来自——“五四”！！！","type":"paragraph"},{"text":"(二)","type":"subtitle"},{"text":"是时候了，","type":"paragraph"},{"text":"向着我们的今天","type":"paragraph"},{"text":"我发言!","type":"paragraph"},{"text":"昨天，我还不敢","type":"paragraph"},{"text":"弹响沉重的琴弦，","type":"paragraph"},{"text":"我只可用柔和的调子","type":"paragraph"},{"text":"歌唱和风和花瓣！","type":"paragraph"},{"text":"今天，我要鸣起心里的歌，","type":"paragraph"},{"text":"作为一支巨鞭，","type":"paragraph"},{"text":"鞕笞死阳光中一切的黑暗！","type":"paragraph"},{"text":"为什么，有人说，团体里没有温暖？","type":"paragraph"},{"text":"为什么，有人说，墙壁隔在我们中间","type":"paragraph"},{"text":"为什么，你和我不敢坦率地交谈？","type":"paragraph"},{"text":"为什么………………？","type":"paragraph"},{"text":"我含着愤怒的泪，","type":"paragraph"},{"text":"向我辈呼唤：","type":"paragraph"},{"text":"歌唱真理的弟兄们","type":"paragraph"},{"text":"快将火炬举起","type":"paragraph"},{"text":"火葬阳光下的一切黑暗!!!","type":"paragraph"},{"text":" 中文系　沈泽宜　张元勋五月十九日","type":"paragraph"}],"comments":[],"origin":"《校内外右派言论汇集》(北京大学经济系政治经济学教研室，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1407525282"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
