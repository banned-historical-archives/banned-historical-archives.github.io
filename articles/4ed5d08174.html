thors":["朱庭训","洪居敬","西北农学院","谭克川","郑必理","韦宣强"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于官僚主义、宗派主义、和主观主义的根源","type":"title"},{"text":"西北农学院朱庭训洪居敬谭克川韦宣强郑必理","type":"authors"},{"text":"1．“官僚主义在我们国家，不仅有精神基础，而且有物质基础。有官必僚，反‘僚’必反‘官’”，有人问：“那么毛主席呢？”他说“必要时当然一样。”“储安平的‘党天下’笼统的看起来不对，但作为宗派主义和官僚主义的根源，则是存在的。”“人们认为沟墙应从两面拆，我认为墙是共产党造成的，所以共产党应主要负责。”(园59级学生　朱庭训)","type":"paragraph"},{"text":"4．“真正一党专政的结果形成了官僚主义和盲目服从，盲目崇拜，也失去了竞争心……也是党失去了纯洁和先进的特征……而党与非党之间形成利益上的对立。”(化57级学生　洪居敬)","type":"paragraph"},{"text":"5．“按照道理讲社会主义制度是不会产生官僚主义和宗派主义的，可是事实上产生了官僚主义和宗派主义。”(农60级学生　谭克川)","type":"paragraph"},{"text":"6．“以党代政是造成宗派主义的主要原因。”“以党代政是宗派主义产生的主要根源，大小工作都要安个党员作头儿。”(经59级学生　韦宣强)","type":"paragraph"},{"text":"8．“拆墙有人认为从两面，我认为主要是共产党造成的，共产党应当主动的拆墙。”(园59级学生　朱庭训)","type":"paragraph"},{"text":"9．“汇报制度在党内形成了主观主义。”(农60级学生  郑必理)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ed5d08174"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
