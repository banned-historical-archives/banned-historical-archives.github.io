,"dates":[{"year":1965,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"墨西哥哈拉将军向毛主席致敬"},{"type":"paragraph","text":"毛主席领导人民取得惊人进步"},{"type":"paragraph","text":"本报讯  不久以前访问我国的墨西哥社会名流埃里维尔托·哈拉将军，最近写信向毛泽东主席表示感谢和敬意，并赞扬我国人民建设的成就。"},{"type":"paragraph","text":"哈拉将军在给毛主席的信里说：“伟大的中华人民共和国是为争取自由和人类尊严而斗争的光辉范例。为了实现这一崇高的任务，您和您忠实的天才的合作者在过去作了不屈不挠的努力，现在又动员您所培养出来的青年干部们的力量继续奋斗”，并在惊人的进步中取得胜利，继续引导伟大的中国人民在通往美好未来的道路上勇敢前进。哈拉将军最后写道，“在祝贺您紧张地为广大人类工作时，我向您再次致以衷心的特别的敬意。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7de7ae64e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
