<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“党群关系有一条洪沟”","authors":["中国人民大学","姚永年","李之杰","李光济","汪传散","薛新卓","韩光远"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“党群关系有一条洪沟”","type":"title"},{"text":"中国人民大学李光济李之杰韩光远薛新卓汪传散姚永年","type":"authors"},{"text":"“社会主义成员在政治待遇上分党、团、群三派，党员各方面比团员高一级，团员比群众高一级。","type":"paragraph"},{"text":"党群关系有一条洪沟，有人入党后觉得自己了不起，压在群众头上。可以作为打击别人抬高自己的一种新形式，以达到使上级信任自己，提升自己。可以畅所欲为的骑在人民头上作土皇帝。党员的统治法宝是谁对他不满有意见就是对党组织不满，因此政治上有问题。群众象小媳妇样，党外人士思想受到压制造成精神上的奴役，群众有冤无处申诉。共产党只代表一党的阶层。”（中国人民大学历史系学生　李光济）","type":"paragraph"},{"text":"“旧社会里人的地位高低，是看有钱没有钱；现在呢？要看是不是党员。党员地位就高，到处受欢迎，这对非党人士说来，确实是个很大的压力。团员就不如党员的社会地位高，民主人就更甭说了。不入党，甚至连对象都找不到。”（中国人民大学新闻系学生  李之杰）","type":"paragraph"},{"text":"“党群间墙有三种，一种是钢骨水泥之墙，一种是砖头瓦块之墙，这两种墙要拆已经很困难了，但另外还有一种粪土之墙，其臭不可闻，拆也没有人愿意拆，要拆的话必须拿自来水龙头冲洗才行。”","type":"paragraph"},{"text":"“我热爱共产党，尊重、相信党，我与党间有墙，按理讲对党的心情应该很接近，如果有墙应该是一边唯心，不为人民服务，一边不唯心，为人民服务，但通过这几年学习，耳闻目睹，如果这墙是唯物，唯心，没有拆的可能，只能爬过去，就知识分子讲愿意爬，党在接，可是事实上没有爬过去，谁也没有爬过去，感到这墙不单是墙，而是墙上有人，占墙为王，是墙头主义，危害性大，比官僚主义、宗派主义砌墙砌得快，高而大，与后两者有关系，后两者是前者基础，没有官僚主义，宗派主义就没有墙头主义，因此整党过程中真正能把官僚主义宗派主义去掉，墙头主义就没有了，墙就抵倒了。”（中国人民大学统计系讲师  韩光远）","type":"paragraph"},{"text":"“党派存在束缚了人民性格的自由发展，口是心非的伪君子特别多，把人民分成党、团、群等小集团，并开展着集团之间的斗争，使人民天生的友谊交往的性格被这人为的障碍所抑制与破坏。”（中国人民大学计划系学生  薛新卓）","type":"paragraph"},{"text":"“党对非党群众不信任，芝麻大的事也派党员领导……党员是侦察兵，是监视群众的耳目。非党群众的积极性很难发挥，别人只好看党员脸色行事。”（中国人民大学马列主义研究班研究生　汪传散）","type":"paragraph"},{"text":"“党内官僚主义习气的人和唯唯诺诺的人太多。党内高级干部几年来脱离人民群众是严重的，只听汇报，只根据汇报来决定政策。党内一般干部水平低，又不大动脑筋，上面布置什么就搞什么。真正深入群众的干部是少的，甚至是个别的。无论党内党外大家都是为自己多，相信人不为己，天诛地灭。”“唯唯诺诺的人就是接受党的领导努力学习，不轻易发表意见的同志”，把他们看作是“唯唯诺诺”、“糊涂”、“没有思想”、“起不了作用”的人。他主张对这些人进行“改造”，要把他们“变成不要完全相信党的政策，不要完全相信马列主义，要能独立思考、凭自己的想法得出结论”的人。（中国人民大学马列主义研究班研究生  姚永年的材料）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b05784bc96"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
