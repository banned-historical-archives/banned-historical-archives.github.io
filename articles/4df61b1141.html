rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"赞扬我国人民勤奋学习毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"据新华社六日讯 坦桑尼亚驻中国大使姆瓦卢科为由卡什米里中校率领的坦桑尼亚军事代表团访问中国，今晚举行招待会。"},{"type":"paragraph","text":"中国人民解放军副总参谋长彭绍辉、总后勤部副部长唐天际，以及有关方面负责人应邀出席。"},{"type":"paragraph","text":"坦桑尼亚军事代表团全体成员出席了招待会。"},{"type":"paragraph","text":"姆瓦卢科大使对中国人民和军队给予坦桑尼亚军事代表团的热情接待，表示感谢。他赞扬说，在中国无产阶级文化大革命运动中，使我们到处亲眼看到中国人民在勤奋地学习和运用你们敬爱的伟大导师、伟大领袖、伟大统帅、伟大舵手毛泽东主席的著作。你们的国民经济肯定地得到了发展。我们要学习你们人民自力更生，奋发图强的精神。"},{"type":"paragraph","text":"姆瓦卢科大使还赞扬中国人民是支持非洲人民反对帝国主义和殖民主义斗争的真正朋友。"},{"type":"paragraph","text":"彭绍辉在讲话中说，坦桑尼亚朋友对我们伟大领袖毛主席的尊敬，对战无不胜的毛泽东思想的热爱，对我国社会主义建设和国防建设的成就，对我国无产阶级文化大革命的热情赞扬，使我们深受感动。"},{"type":"paragraph","text":"他赞扬坦桑尼亚政府和人民坚决反对帝国主义和新老殖民主义，自力更生地建设自己的国家和加强自己的国防力量，并积极支持非洲被压迫民族的反帝斗争。"},{"type":"paragraph","text":"彭绍辉指出，在反对以美国为首的帝国主义、新老殖民主义的斗争中，中国和坦桑尼亚两国人民之间的友谊，必将获得进一步的巩固和发展。"},{"type":"paragraph","text":"招待会始终充满着热烈友好的气氛。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4df61b1141"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
