script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"顽强斗争粉碎垄断资产阶级和黄色工会的种种破坏阴谋  英国钢铁工人坚持罢工进入第八周  工人的战斗团结精神使英国政府、职工大会和钢铁公司老板感到胆战心惊","authors":[],"dates":[{"year":1969,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"顽强斗争粉碎垄断资产阶级和黄色工会的种种破坏阴谋"},{"type":"paragraph","text":"英国钢铁工人坚持罢工进入第八周"},{"type":"paragraph","text":"工人的战斗团结精神使英国政府、职工大会和钢铁公司老板感到胆战心惊"},{"type":"paragraph","text":"新华社伦敦二十日电英国钢铁公司塔尔伯特港工厂的一千三百名高炉工人坚持罢工已达八个星期之久，表现了英国钢铁工人反对垄断资本主义的英勇战斗精神。"},{"type":"paragraph","text":"这个工厂的高炉工人为了要求增加工资，在六月二十六日开始举行罢工。他们还对工厂里十分恶劣的工作条件表示强烈不满。罢工领导人之一说，工厂的条件迫使高炉工人举行罢工。例如工人们不得不长期挤在到处滴油的小房间里吃饭。高炉工人已经被这类情况折磨了三四十年，公司的老板“实在使我们忍无可忍了”。"},{"type":"paragraph","text":"这个工厂的钢铁工人还受到失业的严重威胁。根据这家公司的一个计划，今后三年要从这个工厂的工人中裁减三分之一左右，其中就包括有四百名高炉工人。"},{"type":"paragraph","text":"这次罢工从一开始就受到黄色工会的阻挠和破坏，但是高炉工人自己组织了一个十人罢工委员会来领导这次罢工，在八个星期的罢工过程中召开了十二次以上由全体罢工工人参加的群众大会，对罢工作出重要的决定。"},{"type":"paragraph","text":"罢工工人依靠内部的团结，在全厂钢铁工人的支持和同情下，对垄断资产阶级和黄色工会进行了顽强的斗争，屡次击败他们破坏罢工的阴谋。"},{"type":"paragraph","text":"为了对罢工工人施加压力，破坏罢工，英国钢铁公司在八月初悍然宣布了关闭这家工厂，解雇了一万二千名工人。同时，大大小小的黄色工会的头目们进行了疯狂的活动，不断对罢工工人施加压力，要罢工工人接受他们的“和平方案”，企图骗取罢工工人在他们的要求得到满足以前就停止罢工。"},{"type":"paragraph","text":"然而，罢工工人不顾黄色工会头目们的干涉，继续坚持罢工。在罢工工人举行的群众会上，每当那些工贼出头露面向罢工工人进行“呼吁”时，就立即被愤怒的罢工工人轰下台。英国资产阶级报纸承认，罢工工人的战斗精神和团结，使工党政府、英国职工大会和国营英国钢铁公司感到“震惊”。"},{"type":"paragraph","text":"塔尔伯特港工厂是英国钢铁公司在南威尔士马格姆阿贝的一个大钢铁厂。它是一个“国有化”企业。它生产供给英国汽车工业需要的钢板的百分之三十。十八年中，由于罢工而关闭工厂，这是第七次。目前的罢工已使英国垄断资产阶级损失五百万英镑以上，它沉重地打击了垄断资产阶级。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0dca0ae702"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
