"],"dates":[{"year":1999,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高效益取决于高素质"},{"type":"paragraph","text":"许昌火电厂为职工“充电”"},{"type":"paragraph","text":"本报讯河南许昌市火电厂广开继续教育渠道，多种形式为职工“充电”，全厂有120名职工近几年取得大中专以上学历，各类专业技术人员由建厂初期的5人发展到106人，职工素质普遍提高，持证上岗率达到100％。"},{"type":"paragraph","text":"许昌火电厂专门设有“企业助学奖金”，对通过自学取得本科或专科文凭的职工给予奖励。1997年，该厂与市工会一起开办了热电中专班，聘请专家学者到厂授课，既为职工求学提供了方便，又避免了学非所用的“拿文凭”现象。目前首期学员中已有53名通过14门课程的毕业考试，其中15名品学兼优的学员被送出去继续深造。"},{"type":"paragraph","text":"为了营造浓厚的学技术、学文化的氛围，该厂经常开展丰富多彩的岗位练兵、技术比武活动，对活动中产生的技术标兵、比武状元，除给予个人奖励外，还对其所在集体给予表彰。对于企业引进的专业技术人员，坚持“先培训后上岗”，使他们尽快发挥作用。"},{"type":"paragraph","text":"该厂十分注重对生产技术骨干进行高层次的“充电”。近5年来，他们先后派出班组长106人次，到大专院校进行微机、电气、汽机、热工等专业的深造，其中有16人已经走上了企业中层领导岗位。"},{"type":"paragraph","text":"职工科学文化素质的提高，推进了企业由粗放型向科学化管理的转变。自1993年以来，由该厂专业技术人员立项开发和参与完成的重大技改、节能项目达126项，年增效益300多万元，其中有18项获省市级科技进步奖。（范廷僚刘文革）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d89f4c400"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
