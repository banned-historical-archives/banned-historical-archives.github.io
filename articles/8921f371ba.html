":[{"year":1996,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"电视片《毛泽东在浙江》开播"},{"type":"paragraph","text":"据新华社杭州8月30日电（胡作华、慎海雄）大型电视纪录片《毛泽东在浙江》今天上午在杭州举行了首播式。"},{"type":"paragraph","text":"反映一代伟人毛泽东从50年代至70年代在浙江工作、生活情况的6集电视文献纪录片《毛泽东在浙江》，艺术地记录了毛泽东同志生前43次到浙江、在他的“第二故乡”800多个日日夜夜的工作和生活情况。全片分为《武林修大法》、《忧乐万家心》、《胜地读书声》、《泥土芬芳路》、《诗兴满吴越》和《悠悠两浙情》等6个部分。"},{"type":"paragraph","text":"该片由中共中央文献研究室和中共浙江省委宣传部等单位联合摄制，由浙江籍青年导演黄克敏执导。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8921f371ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
