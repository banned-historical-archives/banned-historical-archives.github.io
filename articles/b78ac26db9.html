、乔冠华副团长等也送了花圈","authors":[],"dates":[{"year":1974,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社巴黎一九七四年四月六日电　法国总统乔治·蓬皮杜逝世的哀悼仪式四月六日在巴黎圣母院举行。"},{"type":"paragraph","text":"法国代理总统阿兰·波埃、法国总理皮埃尔·梅斯梅尔以及法国政府、议会和各种团体的成员参加了哀悼仪式。"},{"type":"paragraph","text":"中华人民共和国特使、中国驻法国大使曾涛也参加了哀悼仪式。"},{"type":"paragraph","text":"参加仪式的还有五十多个国家的代表。"},{"type":"paragraph","text":"这一天，法国各地也举行了哀悼仪式。各政府机关和学校都停止活动，对蓬皮杜总统逝世表示哀悼。"},{"type":"paragraph","text":"蓬皮杜总统的葬礼已于四日在巴黎郊区奥维利埃举行。"},{"type":"paragraph","text":"毛泽东主席、中华人民共和国代主席董必武、国务院总理周恩来给蓬皮杜总统送了花圈。路经巴黎的中国出席联合国大会第六届特别会议代表团团长、国务院副总理邓小平，副团长、外交部副部长乔冠华，以及路经巴黎返任的中国驻美国联络处主任、前中国驻法国大使黄镇，中国驻法国大使曾涛，也送了花圈。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"乔冠华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b78ac26db9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
