script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"共产党员犯了错误以后，畏罪自杀，或因被诬陷，受到冤枉自杀的，应该如何处理","authors":[],"dates":[{"year":1958,"month":11}],"is_range_date":false,"parts":[{"text":"共产党员犯了错误以后，畏罪自杀，或因被诬陷，受到冤枉自杀的，应该如何处理","type":"title"},{"text":"一个共产党员犯了严重错误而自杀，是自绝于党、自绝于人民的可耻行为，为了严肃党纪，教育党员群众，必须开除其党籍。","type":"paragraph"},{"text":"如果本人并无错误或所犯错误情节并不严重，而是被诬陷或被夸大错误事实，因本人觉悟较低，不明政策而自杀的，或自杀未死，除应严格指出其错误外，对确无错误纯系被诬陷者，可免予处分，并予以平反；对有某些错误，但本人对其错误确已有认识，并表示悔改的，可不开除其党籍，酌情予以其他党纪处分。但自杀致死者，则应在党内宣布除名。","type":"paragraph"}],"comments":[],"origin":"摘自1958年11月中央监委办公厅编《党的监察工作问题解答》，转载于铁道部政治部审干办公室《审干工作政策选编》， 1982年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab1bee906e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
