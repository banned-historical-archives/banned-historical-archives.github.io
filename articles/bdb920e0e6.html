script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"杀人不见血的剥削","authors":["徐瑞全"],"dates":[{"year":1967,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"徐瑞全"},{"type":"paragraph","text":"天下乌鸦一般黑，没有一个资本家不靠剥削起家的。《林家铺子》的老板如果不剥削职工，“林源记”的招牌也挂不上去。"},{"type":"paragraph","text":"我是一九三九年进永安公司附属商店大东冷饮室的，整年累月地替资本家卖命，每月只有三、五元，折米二、三斗。"},{"type":"paragraph","text":"“大东”做了十年，我连老母也养不活，更谈不上养活全家。象我这样的情况已经够苦的了，但比我更苦的同事还有。有一年:冷饮室来了两个中学生，进来时年轻力壮，过了几年，就患了肺病，贫病交迫，活生生地被逼死了。"},{"type":"paragraph","text":"资本家杀人不见血的剥削，我们是领受够了。可是党内头号走资本主义道路当权派竟宣扬资本家“剥削有功”，简直混账透顶!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdb920e0e6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
