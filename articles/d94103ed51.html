script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批转北京市委《关于计算工商户违法所得几项补充规定的报告》","authors":[],"dates":[{"year":1952,"month":6,"day":11}],"is_range_date":false,"parts":[{"text":"中共中央批转北京市委《关于计算工商户违法所得几项补充规定的报告》","type":"title"},{"text":"中央同意北京市委六月二日报告中关于计算工商户违法所得的几项补充规定，特转发各地参照执行，并望通知所有进行“五反”处理工作的城市市委，随时纠正在核实定案中对工商户违法所得计算偏高偏低的现象，务求公平合理。","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"中共北京市委《关于计算工商户违法所得几项补充规定的报告》","type":"subtitle"},{"text":"（1952年6月2日）","type":"subtitle"},{"text":"北京市对于工商户违法所得的计算，普遍的是偏高偏多，虽经不断纠正，但在核实定案时，仍未能克服。如福兴面粉厂为粮食公司加工，虽系按该公司库存面粉规格交货，但在计算违法所得时，却被以次货顶好货折算；新隆水暖工业行包装暖汽炉片时，因我们原设计不实际而有所改变，此一间屋子少用了炉片即被算做偷工减料，另一间屋子多用了却没有从违法所得中被扣除。仁立实业公司因物价波动，存货增值，计算时增值部分被算做纯益，而追补所得税；有的公司，因存货贬值赔钱计算时却被置之不管。因此，惹起了一些工商户纷纷议论。为此，我们特对违法工商户违法所得的计算问题，再作如下补充规定：","type":"paragraph"},{"text":"一、关于偷工减料方面。","type":"paragraph"},{"text":"1、加工订货中有下列情况的，只要产品质量规格合乎原订标准，不应认为偷工减料，即：原来没有限定必须使用委托加工者所供给的原料，而厂方以自己的原料加工交货，又并未以次料换好料者；因企业设备技术较好，合理使用原料，因而节省了原料者；因设备技术，劳动力组织等较为进步而较原合同节省了人工者。","type":"paragraph"},{"text":"2、因业主改变设计而多用的工料，应和少用的工料合并计算，然后再计算偷工减料若干。","type":"paragraph"},{"text":"3、转包工程及加工订货中的偷工减料，应由直接签订合同承包之厂商负责，一般不必追究间接承包之厂商，以免把违法所得重复计算。","type":"paragraph"},{"text":"二、关于偷税漏税方面。","type":"paragraph"},{"text":"1．帐外资财，如非属于同一营业中之“后帐”，一般应不予追究。其有牵涉偷漏税收者，如数目较大，应该补税；如数目较小，即不予追究。","type":"paragraph"},{"text":"2．布店与染厂双方，按照合同，以同一质量之白布与色布按合理折合率进行交换，实际是变相收付染费，并无加工费以外之利得者，应按加工征税，不应按销货征税。","type":"paragraph"},{"text":"3．座商偷漏其应代征代缴的临时商业税或特种消费行为税者，应一宗一宗地分笔计算，并按照税则扣除每一宗的免征点以下的税额，超过免征点以上之部分应补税，不应把多宗合并计算，而只除一个免征点。","type":"paragraph"},{"text":"4．因偷漏一九五○年营业税而偷漏所得税，且该项所得税又系于一九五一年度征收者，数目较大的应该补缴，数目较小的亦可不予追缴。在计算时，所有偷漏税，均按缴纳年度计算，例如应在一九五一年缴纳者即算一九五一年的，在一九五○年缴纳者即算一九五○年的，不再另行分算，以免发生不必要的纠纷和困难。","type":"paragraph"},{"text":"5．将行贿所用之款以其他科目列入开支，而未缴纳所得税者，原则上应算在收益内，并照章缴纳所得税，以示惩戒。但数目较小的，在给予警告处分后，可免予追补。","type":"paragraph"},{"text":"三、偷窃标底而有偷工减料行为者，按偷工减料处理；如无偷工减料行为者，一般不予追究。","type":"paragraph"},{"text":"四、工商户中在顾主要求下开假发票而无违法所得者，只给予批评申斥，不再按行贿给予处分。","type":"paragraph"},{"text":"以上办法妥否，请指示。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d94103ed51"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
