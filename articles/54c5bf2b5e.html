art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"不要做情绪的“奴隶”","authors":["王柳根"],"parts":[{"type":"paragraph","text":"不要做情绪的“奴隶”"},{"type":"paragraph","text":"我相信不少青年战友都有过这样的经历，当自己被激怒时，会把对方恨得咬牙切齿，但过后回想当时的失态和不切实际的想法，又会感觉是多么的可笑和愚昧！是的，情绪这东西很奇怪，你控制得好，你就成了它的主人；你控制得不好，你就成了它的奴隶。许多造成严重后果的违法行为，并不是当事人不懂法，也不是他本性不好，而是因为不能忍受一时之气，小矛盾酿成大争斗，结果追悔莫及。"},{"type":"paragraph","text":"亚里士多德有一句名言：“发脾气是值得赞扬的。如果你能做到，在适当的场合，向正确的对象，在合适的时刻，使用恰当的方式，因为公正的理由而发脾气。”这位哲学家其实就是在告诫我们，要学会控制自己的情绪，不要一时冲动，成了情绪的奴隶。"},{"type":"paragraph","text":"有时候，别人的言行是很难理解的，这其中包括批评与侮辱，我们没必要去苛求别人。但是，批评和侮辱跟溅在衣服上的泥点没有两样，如果立即去抹，一定会弄得一团糟。倒不如把溅有泥点的衣服挂在一边，专心干别的事，等泥点晾干了再去处理它就非常容易了——要么轻轻掸几下就没事，要么会发现泥点淡得再也找不着了。"},{"type":"paragraph","text":"在某国军队中，有这样一条耐人寻味的军规：一名军人可以检举战友的错误，被检举人也有权反驳，但如果长官发现检举和反驳的军人曾在近期内发生过冲突，那么两个人都将受到惩罚。发生过冲突的军人双方至少要等一周，等情绪完全冷静下来后，才可以投诉对方。虽然这条军规有所偏颇，有主观臆断的印记，但还是能在一定程度上起到让官兵冷静反思的效果，其中蕴含的良苦用心值得我们深思。"},{"type":"paragraph","text":"俗话说，年轻气盛。对广大青年官兵来说，军人除了要具备英勇果敢的素质外，遇事还要三思而行，特别是当情绪激动时，不妨给自己降点温，正确地控制情绪。这一点，对我们维护青年官兵间的和谐关系尤为重要。 （王柳根）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54c5bf2b5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
