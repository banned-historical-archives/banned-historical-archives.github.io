rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"华总理参观日立造船公司"},{"type":"paragraph","text":"华国锋总理六月一日上午参观了日立造船公司的堺工厂，并挥笔题词：“唇齿相依，一衣带水”，从而结束了一场“日本什么地方离开中国最近”的风趣横生的“争论”。"},{"type":"paragraph","text":"日立造船公司的堺工厂，是华总理这次访日期间的最后一个参观项目。在参观工厂后，华国锋同日立造船公司董事长永田敬生、总经理木下昌雄等进行了友好谈话。永田敬生说，在日本，人们对“一衣带水”有一场争论，日本离中国的最近点，有的说是福冈，有的认为是长崎。他说：“我是熊本人，我主张熊本离中国最近。”他问华总理怎么看。华总理说：“‘唇齿相依’，‘一衣带水’，都是形容关系很近的意思。中日两国一衣带水，这既包括日本的西方，南方，也包括北方、东方，我们中国和整个日本都很近，都是一衣带水的关系，这样就不用争论了。”他的这番话博得了宾主双方和在场几十名记者热烈的掌声和欢笑。"},{"type":"paragraph","text":"华总理在永田敬生董事长、冈田涉二郎厂长等陪同下，乘车参观了工厂的设施和生产情况。"},{"type":"paragraph","text":"华总理会见松下幸之助"},{"type":"paragraph","text":"华国锋总理六月一日早晨在大坂他下榻的饭店会见松下电器产业公司最高顾问松下幸之助时说，希望中日两国出现千千万万个鉴真大师，世世代代友好下去。"},{"type":"paragraph","text":"八十三岁高龄的松下幸之助表示，虽然他年事已高，但是要学习鉴真大师的精神，为日中友好作出贡献。"},{"type":"paragraph","text":"华国锋邀请松下幸之助在他认为适当的时候再次到中国去访问。松下幸之助愉快地接受了邀请。"},{"type":"paragraph","text":"邓副总理等会见参加青藏高原科学讨论会的中外新学家"},{"type":"paragraph","text":"国务院副总理邓小平、方毅五月三十一日晚上在人民大会堂会见了参加青藏高原科学讨论会的中外科学家。"},{"type":"paragraph","text":"会见结束后，方毅为青藏高原科学讨论会闭幕举行招待会。为期七天的青藏高原科学讨论会，五月三十一日下午闭幕。参加这次科学讨论会的十七个国家的近三百名专家、学者，在会上宣读了二百五十多篇论文，对青藏高原的隆起及其对自然环境和人类活动的影响等一系列问题，进行了广泛的探讨。 （均据新华社）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f6078537e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
