典"],"dates":[{"year":1987,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京2月17日电　(记者张荣典)国务院总理赵紫阳今天在这里说，中国反对资产阶级自由化，决不会影响改革和开放。"},{"type":"paragraph","text":"据外交部新闻司官员介绍，赵紫阳是今天上午在同加蓬总统哈吉·奥马尔·邦戈的会谈中谈到中国当前形势时指出上述这一点的。赵紫阳说，建设具有中国特色的社会主义，要坚持四项基本原则和开放、改革。这两者要同时进行，它们是紧密相连的，缺一不可。他说，“我们现在的做法，只会促进安定团结，而决不会出现任何动乱。”"},{"type":"paragraph","text":"赵紫阳说，前一个时期政治思想战线上有极少数人搞资产阶级自由化，影响到安定团结，这就提醒我们必须加强政治思想工作。他说，十一届三中全会制定了建设具有中国特色的社会主义的路线。现在我们反对资产阶级自由化，决不会影响到改革和对外开放，而是为了更好、更全面地贯彻和执行十一届三中全会以来的路线、方针、政策。"},{"type":"paragraph","text":"赵紫阳对邦戈总统说，目前中国政治上安定团结，经济上稳步发展，各项改革正在深入进行，民主和法制在不断扩大和完善。他说，“我相信总统这次在北京和到外地访问会目睹这些实际情况。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae38a29419"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
