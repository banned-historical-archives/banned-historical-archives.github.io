ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"要采取追击的战略","alias":"","parts":[{"type":"paragraph","text":"要采取追击的战略！"},{"type":"paragraph","text":"（1958年7月）"},{"type":"paragraph","text":"依靠我国有利的地形，特别是星罗棋布的岛屿，就可能把进攻的敌人主力歼灭在海岸和海上，不许敌人主力深入我国国土，并且还要在敌人发动进攻的基地上给以打击。我们将不但胜利地保卫祖国，而且要在歼灭了侵略的敌人主力之后，采取追击的战略，进而将敌人的出发根据地的侵略武装力量加以解除，借以根绝侵略后患，同时也就解放敌国被压迫人民。"},{"type":"paragraph","text":"[1]这是毛泽东对中共中央军委委员、国务院副总理兼国防部部长彭德怀1958年7月19日在中共中央军委扩大会议上总结讲话第三部分《战略方针和国防建设工作》一段文字所作的修改。文中宋体字排印的是毛泽东加写和改写的文字。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":514,"page_end":514},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19d13ff01f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
