year":1963,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席说:“房子是应该经常打扫的，不打扫就会积满了灰尘；脸是应该经常洗的，不洗也就会灰尘满面。我们同志的思想，我们党的工作，也会沾染灰尘的，也应该打扫和洗涤。”这段话对我启发最大。我们居住在闹市，资产阶级思想和旧上海的习惯势力会影响我们。我初来连队，和老同志一起送肥去生产地，当时就有人问我:“你们这些年轻小伙子拉大粪不怕脏吗?你们解放军为什么要拉大粪?”我觉得这些话不是味儿。我们要经常接受党的教育，不断努力学习毛主席著作，把资产阶级思想影响打扫、洗涤干净，巩固无产阶级思想阵地。　易桂生"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf477dc31f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
