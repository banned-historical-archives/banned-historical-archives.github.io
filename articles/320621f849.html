s":["周恩来"],"dates":[{"year":1967,"month":2,"day":1}],"is_range_date":false,"parts":[{"text":"周恩来对第一轻工业部接管工作的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"周总理看了一轻部及院校十一个革命造反派组织于一月三十一日签注的关于大联合的公告，说：","type":"paragraph"},{"text":"这个公告基本上不错嘛，两方面都照顾到了嘛。","type":"paragraph"},{"text":"你们双方都没有检查自己，只是责怪别人，现在，我给你们读一段报纸。","type":"paragraph"},{"text":"（总理读一月三十日《人民日报》上的文章“打倒‘私’字，实行革命造反派大联合”上的一段）","type":"paragraph"},{"text":"我建议你们，部里派四人，院所派六人，每个学院组织派三人，共计十八个人开个圆桌会议，组织夺权委员会，先检查自己，不要老提以前的，选出六个常委轮流值班。","type":"paragraph"},{"text":"每个单位的问题自己解决，整风解决，通过一个过渡阶段以后再解决。","type":"paragraph"}],"comments":[],"origin":"1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（2）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"320621f849"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
