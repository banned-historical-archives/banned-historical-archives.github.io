es":[],"article":{"title":"中央宣传部批转国家文物事业管理局《关于图书馆馆藏涉及刘少奇同志问题书刊处理意见的请示报告》","dates":[{"year":1980,"month":4,"day":14}],"is_range_date":false,"authors":["中共中央宣传部","国家文物事业管理局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国家出版事业管理局办公室, 出版工作文件选编(1976.10-1980.12), 507-509","tags":[{"name":"刘少奇","type":"主题/事件"},{"name":"图书","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"文物图书","type":"主题/事件"},{"name":"瞿秋白","type":"主题/事件"}],"parts":[{"type":"title","text":"中央宣传部批转国家文物事业管理局《关于图书馆馆藏涉及刘少奇同志问题书刊处理意见的请示报告》"},{"type":"subtitle","text":"1980年5月20日 中宣发〔1980〕13号"},{"type":"paragraph","text":"我们同意国家文物事业管理局《关于图书馆馆藏涉及刘少奇同志问题书刊处理意见的请示报告》。现批转给你们，望参照执行。"},{"type":"paragraph","text":"主送：各省、市、自治区党委宣传部"},{"type":"paragraph","text":"附：国家文物局关于图书馆馆藏涉及刘少奇同志问题书刊处理意见的请示报告"},{"type":"subtitle","text":"1980年4月14日"},{"type":"paragraph","text":"根据你部中宣发〔1980〕4号《关于处理涉及刘少奇同志问题的图书的通知》精神，结合图书馆工作的特点，现将图书馆馆藏中涉及刘少奇同志的书刊提出以下处理意见："},{"type":"paragraph","text":"一、 凡是刘少奇同志的著作及有关刘少奇同志的传记、回忆录、访问记等，均应立即清理开放。"},{"type":"paragraph","text":"二、 凡是文化大革命以来涉及刘少奇同志问题的书刊，应贯彻中央决定的要“消除过去对刘少奇同志错误处理所造成的影响”的精神，各图书馆必须进行一次严肃认真的清理，区别对待。"},{"type":"paragraph","text":"三、 凡是通篇诬蔑刘少奇同志的书刊，或者个别章节、段落有严重诬蔑刘少奇同志的无学术价值的书刊，均应封存停止借阅。"},{"type":"paragraph","text":"四、 凡有丑化刘少奇同志形象的美术作品、新闻图片，以及有指名诬蔑刘少奇同志的歌曲集、剧本和演唱材料，均应封存停止借阅。"},{"type":"paragraph","text":"五、 文化大革命以来党和国家的文件汇编涉及刘少奇同志问题的，不陈列，读者需要时可提供借阅。"},{"type":"paragraph","text":"六、 有学术价值的书刊，如果只是在前言、后记或其他个别地方有少量穿靴戴帽式的诬蔑刘少奇同志不实之词的，在没有经过修改的再版书之前，为了保持馆藏书刊的完整，需要开放借阅时，可按国发〔1978〕81号国务院文件第四条不作技术处理的规定办理，有了再版书时，应将旧版书提存；对有一定学术价值的，但在前言、后记或其他地方有严重诬蔑刘少奇同志不实之词的，可改作内部借阅，也不作技术处理；无学术价值的应予封存。"},{"type":"paragraph","text":"对涉及瞿秋白等同志问题的书刊，亦参照上述办法处理。凡是应封存的书刊，应妥善存放，不得散失。"},{"type":"paragraph","text":"以上意见如无不妥，请批转各省、市、自治区有关部门参照执行。"},{"type":"paragraph","text":"主送：中央宣传部"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7f9fd2cde"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
