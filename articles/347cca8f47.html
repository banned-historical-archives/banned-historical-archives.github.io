script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们的伟大领袖毛主席和他的亲密战友林副主席会见阮昆副总理和他率领的越南政府经济代表团毛主席、林副主席向来自抗美斗争前线的越南同志亲切招手致意，并同阮昆副总理等进行了长时间的、十分友好的谈话　参加会见和谈话的有:周恩来总理、康生副委员长、黄永胜总参谋长、李先念副总理","authors":[],"dates":[{"year":1970,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十五日电　我国各族人民的伟大领袖毛主席和他的亲密战友林副主席，二十三日十分亲切地会见了越南劳动党中央委员会书记处书记、越南民主共和国政府副总理兼国家计划委员会主任阮昆同志，和由他率领的越南民主共和国政府经济代表团全体同志。"},{"type":"paragraph","text":"毛主席和他的亲密战友林副主席来到会见厅时，越南战友非常高兴，热烈鼓掌。毛主席、林副主席向来自抗美斗争前线的越南同志亲切招手致意，并且同代表团全体同志一起照了像。"},{"type":"paragraph","text":"然后，毛主席、林副主席同阮昆副总理，代表团副团长李班、吴船、陈参同志，进行了长时间的、十分友好的谈话。"},{"type":"paragraph","text":"参加会见和谈话的有:中共中央政治局常委、国务院总理周恩来，中共中央政治局常委、人大常委会副委员长康生，中共中央政治局委员、中国人民解放军总参谋长黄永胜，中共中央政治局委员、国务院副总理李先念。"},{"type":"paragraph","text":"有关方面负责人李强、方毅、阎仲川、韩念龙、申健、苑化冰同志，会见时在场。"},{"type":"paragraph","text":"我国各族人民的伟大领袖毛主席和他的亲密战友林彪副主席，九月二十三日十分亲切地会见了越南劳动党中央委员会书记处书记、越南民主共和国政府副总理兼国家计划委员会主任阮昆同志，和由他率领的越南民主共和国政府经济代表团全体同志。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1970\\09\\709q010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e右上:毛主席和阮昆副总理热烈握手。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1970\\09\\709q010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e右下:会见时合影。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"李先念","type":"人物"},{"name":"黄永胜","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"347cca8f47"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
