art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席林彪同志观看《智取威虎山》周恩来陈伯达康生李富春李先念谢富治江青萧华杨成武等同志陪同观看 乐队高奏《大海航行靠舵手》，全场观众长时间高呼：“毛主席万岁！万万岁！”","authors":[],"parts":[{"type":"paragraph","text":"新华社十六日讯 我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪同志，今晚观看了上海京剧院演出的革命现代京剧《智取威虎山》。"},{"type":"paragraph","text":"八时，毛主席健步来到剧场。这时，乐队高奏《大海航行靠舵手》，观众们挥动红色宝书《毛主席语录》，长时间地高呼：“毛主席万岁！”“毛主席万万岁！”"},{"type":"paragraph","text":"演出开始时，一位报幕的演员走到台前，激动地高声颂道：“首先，敬祝我们心中最红最红的红太阳毛主席万寿无疆！万寿无疆！敬祝毛主席的亲密战友林彪副统帅身体健康！永远健康！”全场观众再次连续高呼“毛主席万岁！”"},{"type":"paragraph","text":"同毛主席和林彪同志一起观看演出的，还有中央其他领导同志和有关方面的负责同志周恩来、陈伯达、康生、李富春、李先念、谢富治、江青、萧华、杨成武、粟裕、张春桥、王力、关锋、戚本禹、姚文元、叶群、汪东兴等。"},{"type":"paragraph","text":"演出结束以后，在一片雷鸣般的热烈掌声中，毛主席和林彪、周恩来、陈伯达、康生、李富春、江青等同志，走上舞台，向演员们鼓掌，并同他们合影。这时，全场欢腾，人们一遍又一遍地高呼：“毛主席万岁！”“毛主席万万岁！”"},{"type":"paragraph","text":"毛主席和林彪同志以及周恩来同志亲切接见上海京剧院演出革命现代京剧《智取威虎山》的演员。"},{"type":"paragraph","text":"演出结束后，毛主席和林彪同志以及周恩来等同志走上舞台，同演员一起合影。 《人民日报》记者 吕相友摄（照片）RW：毛泽东；社会活动"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"李富春","type":"人物"},{"name":"李先念","type":"人物"},{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc6dd91734"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
