"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"致毛主席电"},{"type":"paragraph","text":"【新华社北平七日电】北平各界人民纪念“七七”抗日战争十二周年大会致毛主席电："},{"type":"paragraph","text":"在“七七”抗日战争十二周年的今天，我们北平市二百万人民以无限感奋的心情向你致崇高的敬礼。我们经历了日本帝国主义和国民党反动派的血腥统治，受尽了惨酷的摧残，在苦难的日子里，你指示给我们奋斗的方向和道路，鼓励着我们，引导着我们，使我们最后获得了解放；以你为首的中共中央迁到北平随时就近指导我们，更使我们感到极大的快乐和光荣。现在，国民党反动统治已被推翻，我们多年来殷切盼望的独立、自由、民主、统一、富强的新中国已经开始实现，我们瞻望新中国光辉灿烂的前途，怀着坚定的信心，在你的英明领导下，我们一定完成你所指示的任务：肃清反动派的残余，镇压反动派的捣乱；并尽一切可能，用极大力量从事人民经济事业与文化教育事业的恢复和发展，建设起一个崭新的人民民主的北平，建设起一个崭新的人民民主专政的新中国，并成为捍卫世界民主和平的有力的堡垒。"},{"type":"paragraph","text":"北平市各界人民纪念“七七”抗日战争十二周年大会"},{"type":"paragraph","text":"一九四九年七月七日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a48f4369f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
