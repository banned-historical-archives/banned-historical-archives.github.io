ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于修改在庆祝五一劳动节大会上的讲话稿给刘少奇的信","alias":"","parts":[{"type":"paragraph","text":"关于修改在庆祝五一劳动节大会上的"},{"type":"paragraph","text":"讲话稿给刘少奇的信"},{"type":"paragraph","text":"（1950年4月29日）少奇同志："},{"type":"paragraph","text":"报告略有些修改，已送恩来阅后还你。陈云在请假中不看文件，没有送他看。"},{"type":"paragraph","text":"修改的主要点如下：不要说“今年是困难的最后一年”，因今后几年内都会有困难，而且仍将是相当严重的困难，不过将一年一年地减少罢了。其他说到困难“很快就可以过去”的话都删掉了。举东北为例一段合并到前面一段中去。国际形势一段说得策略一些。解释富农策略一段觉累赘，留待将来去说。纠正命令主义一段说得全面一些，并且不要太突出地去说财经干部。口号加了一句\"。"},{"type":"paragraph","text":"如时间来得及，请于你讲后即刻付排，送清样给我再看一次，然后发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿九日上午五时"},{"type":"paragraph","text":"[1]这句口号是：全中国各民族各民主阶级各民主党派各人民团体的团结合作万岁！"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":4,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":321,"page_end":321},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b213cdf71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
