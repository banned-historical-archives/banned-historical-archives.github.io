script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本革命人民热烈欢呼毛主席建军路线的光辉胜利　中国人民解放军是伟大的人民军队","authors":[],"dates":[{"year":1968,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本革命人民热烈欢呼毛主席建军路线的光辉胜利"},{"type":"paragraph","text":"中国人民解放军是伟大的人民军队"},{"type":"paragraph","text":"新华社十一日讯　东京消息：日本革命人民最近向中国记者发表谈话，高度赞扬世界革命人民的伟大领袖毛主席关于建立人民军队、关于“枪杆子里面出政权”的光辉思想，并且热情赞扬毛主席亲自缔造、亲自领导，林彪副主席直接指挥的中国人民解放军。"},{"type":"paragraph","text":"日本革命新闻工作者芳崎说，毛主席在古田会议的决议中教导说：“中国的红军是一个执行革命的政治任务的武装集团。特别是现在，红军决不是单纯地打仗的，它除了打仗消灭敌人军事力量之外，还要负担宣传群众、组织群众、武装群众、帮助群众建立革命政权以至于建立共产党的组织等项重大的任务。”这是毛主席关于建立人民解放军的光辉路线。中国人民解放军正是贯彻了毛主席这一建军路线的一支伟大的人民军队。"},{"type":"paragraph","text":"芳崎在谈到毛主席关于“枪杆子里面出政权”的教导的伟大国际意义时指出，今天，亚洲以及其他地区的许多国家的革命人民正在遵循毛主席的伟大教导，建立了人民的军队，为推翻反动统治、夺取政权而战斗。他说，日本人民也必须把毛泽东思想运用到日本的革命实践中去。"},{"type":"paragraph","text":"交通工人柿并说，毛主席的建军思想具有伟大意义。特别是在今天，国际上现代修正主义思潮泛滥，帝国主义与现代修正主义加紧勾结，并向各国革命人民进攻的时候，毛主席的光辉的建军思想对国际共产主义运动的发展更具有重大意义。"},{"type":"paragraph","text":"柿并说，在毛主席建军思想指导下建立起来的中国人民解放军是一个执行革命的政治任务的武装集团，它是真正为人民服务的，是把解放被压迫人民为崇高目的的。这一支军队之所以有强大的力量，是因为它是用毛泽东思想武装起来的。"},{"type":"paragraph","text":"柿并说，中国人民解放军在反对美帝国主义侵略，保卫社会主义中国方面，所立下的功勋，再一次证实了毛主席指出的伟大真理：“武器是战争的重要的因素，但不是决定的因素，决定的因素是人不是物。”柿并还说，毛主席精辟地指出：“战争的伟力之最深厚的根源，存在于民众之中。”中国人民解放军是一支来自人民并为人民服务的军队。"},{"type":"paragraph","text":"革命新闻工作者后藤说，林彪副主席为邮电部发行《中国人民解放军》特种邮票的题词：“中国人民解放军是毛泽东思想武装起来的队伍，是全心全意为人民服务的队伍，因而是战无不胜的队伍。”表达了毛主席的建军思想和建军路线。"},{"type":"paragraph","text":"后藤指出，中国无产阶级文化大革命所以取得伟大胜利，最根本的原因是：这个大革命是由伟大领袖毛主席亲自发动和领导的，是以战无不胜的毛泽东思想指导的，有用毛泽东思想武装起来的亿万革命人民，同时，也因为有一支高举毛泽东思想伟大红旗的、中国无产阶级专政的坚强柱石——中国人民解放军。"},{"type":"paragraph","text":"后藤热情赞扬中国人民解放军在中国无产阶级文化大革命中建立的丰功伟绩。他说，中国人民解放军不仅自己努力活学活用毛泽东思想，而且还广泛传播了林彪副主席提出的活学活用毛主席著作的号召，有力地推动了全中国人民活学活用毛泽东思想的伟大群众运动。"},{"type":"paragraph","text":"后藤强调指出，正因为中国人民解放军活学活用毛泽东思想最好，所以从这一支人民军队中涌现出大批象雷锋、王杰、门合这样的具有共产主义思想的英雄人物。"},{"type":"paragraph","text":"工会工作者松本说，中国无产阶级文化大革命的辉煌胜利，使我们更加深刻地认识了毛主席的建军路线的伟大及其重要性。松本说，毛主席的伟大建军路线，粉碎了否定突出无产阶级政治、主张单纯军事观点的资产阶级军事路线。"},{"type":"paragraph","text":"松本赞扬中国人民解放军根据毛主席的教导，在无产阶级文化大革命中，支持左派广大群众向党内一小撮走资派夺权，并派代表参加革命三结合的各级革命委员会，加强和巩固了中国无产阶级专政。"},{"type":"paragraph","text":"电力工人广中和交通工人芝原说，毛主席教导我们：“革命的中心任务和最高形式是武装夺取政权，是战争解决问题。这个马克思列宁主义的革命原则是普遍地对的，不论在中国在外国，一概都是对的。”广中和芝原说，我们必须通过斗争实践在日本工人阶级当中，树立用革命的暴力反对反革命的暴力的思想。为此，就必须彻底肃清日共宫本修正主义集团和右翼社会民主主义者在工人阶级内部散布的“合法主义”的流毒。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fc39f0a33"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
