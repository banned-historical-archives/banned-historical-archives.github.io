陪同参观","authors":[],"dates":[{"year":1971,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西哈努克亲王参观新安江水电站受到热烈欢迎"},{"type":"paragraph","text":"叶剑英同志以及浙江省杭州市革委会负责人等陪同参观"},{"type":"paragraph","text":"新华社杭州十九日电　柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，今天参观了新安江水力发电站。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英以及浙江省、杭州市革命委员会负责人熊应堂、赖可可、王子达等陪同参观。"},{"type":"paragraph","text":"西哈努克亲王和夫人乘车到达新安江水电站时，受到群众的热烈欢迎。水电站革委会的负责人向贵宾们介绍了广大工人和干部遵照毛主席的教导，发扬自力更生精神建设水电站的情况。西哈努克亲王赞扬中国工人阶级在毛主席领导下取得的这一成就。他祝愿中国人民在社会主义建设中取得更大的胜利。西哈努克亲王和夫人还游览了新安江水库，并观看了捕鱼。"},{"type":"paragraph","text":"西哈努克亲王和夫人在参观新安江水电站的往返途中，受到了富阳、桐庐、建德三个县城的工人、人民公社社员、干部和学生的夹道欢迎。欢迎群众挥动着中、柬两国国旗和花束，热情高呼口号：“热烈欢迎西哈努克亲王！”“向战斗的柬埔寨人民致敬！”“坚决支持印度支那三国人民的抗美救国战争！”"},{"type":"paragraph","text":"随同西哈努克亲王和夫人参观的有：西哈努克亲王的姑母诺罗敦·凯卡妮娅公主，柬埔寨王国民族团结政府军需、军备大臣杨森安将军和夫人，国家元首办公厅主任西索瓦·梅达维亲王，柬埔寨驻中国大使凯密等。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召以及杨玲同志也陪同参观。（附图片）"},{"type":"paragraph","text":"柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人等柬埔寨贵宾，二月十九日在叶剑英、熊应堂、赖可可、王子达等陪同下参观了新安江水力发电站。　新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cb0becfdf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
