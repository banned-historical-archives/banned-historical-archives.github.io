一切企图化成灰烬","authors":[],"dates":[{"year":1964,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那4日电】　据此间报纸报道，阿尔巴尼亚劳动党中央第一书记恩·霍查最近作为党中央的代表，参加了科尔察区第八次党代表会议，并且参观了科尔察的一些工业企业，视察了农村的春耕情况。"},{"type":"paragraph","text":"霍查在参观“镰刀和鎚子”针织厂时受到全厂职工的热烈欢迎。他参观了各个车间，并观看了工人织成的美丽产品。霍查对增加生产、提高质量、降低成本的可能性十分关心。他说，要永远考虑人民的要求和需要。霍查对正在这个工厂实习的学生的工作也十分关切。"},{"type":"paragraph","text":"霍查在参观手工业纺织合作社时，询问了工人的工作和生活情况，同工人们就进一步增加生产和改进产品质量、降低成本以便满足国内消费者和出口的需要进行了交谈。工人们保证一定竭尽一切努力来完成党的指示。"},{"type":"paragraph","text":"霍查在离开这个合作社之前说，阿尔巴尼亚人民首先是依靠自己的力量然后才靠朋友的援助来建设自己的国家，我们任何时候也不停止在建设社会主义的道路上前进，并将使我国人民的敌人——帝国主义和现代修正主义的一切企图化成灰烬。工人们十分注意地倾听霍查的讲话，并报以热烈的掌声。"},{"type":"paragraph","text":"恩维尔·霍查还参观了科尔察纺织厂、机械厂和供应农村的产品展览会等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63ee6c743f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
