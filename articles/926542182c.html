ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"皖南新四军北移的部署","alias":"","parts":[{"type":"paragraph","text":"皖南新四军北移的部署1]"},{"type":"paragraph","text":"（1940年12月14日）叶、项："},{"type":"paragraph","text":"（一）蒋介石为使我军移动不生变化起见，确已命令顾祝同通知路军加以协助，故阻碍是不会的，但你们仍需注意警戒。（二）移动时间蒋限十二月底移完，我们正交涉展限一个月，但你们仍须于本期内尽可能移毕。（三）速向顾祝同请领应得之饷弹。（四）蒋以新军正在移动，不同意项副军长来渝，因此中央决定项随军队渡汇，然后经华北来延安。（五）关于小姚行动，以苏南游击区是否便于指导东南各省为断，如有此条件，以随曾山去苏南为有利，如不可能，则去江北。（六）叶、项二人均以随主力去皖东为适宜，资材吸后方机关移苏南者可由周子昆、小姚负责指挥。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十四日[1]这是毛泽东为中共中央书记处起草的关于皖南新四军北移的部署给"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":277,"page_end":277},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"926542182c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
