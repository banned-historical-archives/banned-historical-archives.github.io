ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"中央关于新疆三区代表和彭德怀会谈问题的电报","alias":"","parts":[{"type":"paragraph","text":"中央关于新疆三区代表和彭德怀?会谈问题的电报"},{"type":"paragraph","text":"（1949年10月15日）力群，并告彭："},{"type":"paragraph","text":"十三日电悉。自治区军政代表至彭处谈话，第一步是询问情况，在彭对情况未明了前难于提出初步方案。此次出席政协的赛福鼎阿里木江二人，不久可由京乘飞机赴酒泉与彭见面，一切问题均可和赛阿二人商谈。故自治区暂时可以不另派代表去酒泉，待赛阿与彭谈话并回至伊犁后，如有必要再派代表为宜。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十月十五日"},{"type":"paragraph","text":"[1]指新疆北部伊犁、塔城、阿勒泰地区的维吾尔、哈萨克等少数民族的人民，为反对国民党反动统治于1944年11月举行的武装起义后形成的三区人民自治区域。"},{"type":"paragraph","text":"[2]彭德怀，当时任中共中央西北局第一书记、中国人民解放军第一野战军司令员兼政治委员。"},{"type":"paragraph","text":"[3]力群，即邓力群，当时是中共中央派驻新疆的联络员。[4]指新疆三区。"},{"type":"paragraph","text":"[5]赛福鼎，当时任新疆保卫和平民主同盟中央委员会代主席。阿里木江，当时任新疆保卫和平民主同盟塔城区分会主席。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":419,"page_end":419},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8463d9bb2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
