art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"收藏毛主席像章2.1万枚","authors":["闵永军罗相武"],"parts":[{"type":"paragraph","text":"为纪念毛泽东同志诞辰100周年，近日，江苏省金湖县制药厂退伍军人、工人朱少多展出了自己收藏多年的2.1万枚毛主席像章。"},{"type":"paragraph","text":"今年36岁的朱少多出于对伟大领袖毛主席的崇敬和热爱，已将自己积攒的8000多元全用来购买毛主席像章。他收藏的2.1万枚毛主席像章，品种达6000多种，“文革”期间全国29个省、市、自治区和8大军区制造的毛主席像章他都有。一枚特大“毛主席双面章”是人工绘画、贴花、自制而成的精品，在全国也属罕见，长宽分别为40厘米和28厘米，有个外地收藏家出价1万元要收买，被他婉言谢绝了。朱少多撰写的《划时代的藏品——毛泽东像章》一书近期也将出版。"},{"type":"paragraph","text":"黄旌整"},{"type":"paragraph","text":"广州军区某部官兵参观广东收藏家李锦棠收藏的毛主席像章。 黄旌整摄RW：朱少多；事迹"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a4ff2c5d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
