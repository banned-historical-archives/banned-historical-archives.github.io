art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛主席”来到战士中间","authors":["陈宏范达穷"],"parts":[{"type":"paragraph","text":"雨过天晴的下午。51402部队营院里，塔柏苍翠，月季飘香。忽然有人喊了一声：“毛主席来了！”军营里立即沸腾起来。原来，在电影《毛泽东和他的儿子》中饰演毛泽东的王仁、饰演刘思齐的徐扬、导演张今标及其他演职人员来到了军营。"},{"type":"paragraph","text":"刚在剧场演出，未及卸装的王仁同战士们热情地打着招呼。他那魁梧的身材，睿智明亮的眼睛，以及下巴上那颗特有的黑痣……使得战士们把他当成了伟大领袖毛泽东。"},{"type":"paragraph","text":"在一片“主席”长“主席”短的称呼中，大家滔滔不绝地谈论起影片《毛泽东和他的儿子》来。团长芇福成说：“这部影片，是所有反映毛泽东的故事片中最成功的一部。”王仁指着一旁的导演张今标同志说，“这部影片首先是写得好，导演得好。”"},{"type":"paragraph","text":"“编导的确下了功夫。”指导员王伟说：“在这部影片中，编导不仅表现了毛泽东送子参军和岸英牺牲后的复杂感情，而且巧妙地把毛泽东对杨开慧和毛岸英的思念，把毛岸英小小年纪便吞尽了生活的苦果，尝遍了流浪乞讨的辛酸以及他到苏联留学、在延安参加劳动等成长的情节穿插其中，从而使影片既集中、凝炼，又内涵丰富。”"},{"type":"paragraph","text":"最后，政委王国华说：“毛泽东领导中国革命，拯救亿万人民于水深火热之中，他是伟大的；毛泽东使贫困落后的泱泱大国逐步走向繁荣昌盛，他是伟大的；而他那感人至深的亲情，同样也是伟大的。”"},{"type":"paragraph","text":"最精彩的场面，是战士们争先恐后地同“主席”合影。不时闪亮的闪光灯，留下了一个个难忘的瞬间……"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43ccd6da2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
