ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"毛泽东等悼念格罗提渥逝世的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等悼念格罗提屋逝世的电报"},{"type":"paragraph","text":"（1964年9月22日）柏林德国统一社会党中央委员会第一书记、德意志民主共和国国务委员会主席瓦尔特·乌布利希同志，德意志民主共和国部长会议第一副主席维利·斯多夫同志，德意志民主共和国人民议院主席约翰尼斯·狄克曼教授博士，民主德国全国阵线全国委员会主席埃里希·柯伦斯教授博士："},{"type":"paragraph","text":"惊悉德意志民主共和国部长会议主席、德国统一社会党中央政治局委员、德意志民主共和国国务委员会副主席、争取德国工人阶级统一的坚强战士、德意志民主共和国卓越的政治活动家、中国人民的朋友奥托·格罗提渥同志不幸逝世，我们怀着沉痛的心情向你们表示深切的哀悼并请向格罗提渥同志的家属转达亲切的慰问。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六四年九月二十二日"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":9,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":163,"page_end":163},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ca5dbd968"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
