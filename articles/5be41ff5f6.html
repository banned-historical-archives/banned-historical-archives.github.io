开","authors":[],"dates":[{"year":1983,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一月二日电　叶剑英、邓颖超同志分别给全国归侨、侨眷、侨务工作者先进个人和先进集体表彰大会题了词和写了贺信。"},{"type":"paragraph","text":"叶剑英同志的题词是:“海内外同胞齐心协力振兴中华”。"},{"type":"paragraph","text":"邓颖超同志的贺信全文如下:"},{"type":"paragraph","text":"全国归侨、侨眷、侨务工作者"},{"type":"paragraph","text":"先进个人和先进集体表彰大会:"},{"type":"paragraph","text":"尊敬的代表们，值此表彰大会隆重召开之际，我谨以个人的名义，向大会致以热烈的祝贺，向与会的先进个人与先进集体代表，并通过你们，向战斗在各条战线上的归侨、侨眷和侨务工作者致以崇高的敬意和亲切的问候!"},{"type":"paragraph","text":"广大归侨、侨眷和国外爱国侨胞，过去是，现在是，将来仍然是我们伟大祖国建设的一支不可忽视的力量。希望你们很好学习、宣传和维护五届人大五次会议通过的新宪法，在党的十二大精神指引下，发扬成绩，再接再厉，紧密团结广大归侨、侨眷和国外侨胞，同全国各族人民一道，坚定信心，振奋精神，为开创我国社会主义现代化建设的新局面，为早日完成祖国统一大业的神圣使命而努力奋斗!"},{"type":"paragraph","text":"祝大会完满成功。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5be41ff5f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
