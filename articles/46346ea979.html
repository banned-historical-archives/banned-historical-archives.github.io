ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于将介石发布“一.一七”命令后国共关系的变化及我之对第","alias":"","parts":[{"type":"paragraph","text":"关于蒋介石发布“一·一七”命令后"},{"type":"paragraph","text":"国共关系的变化及我之对策\""},{"type":"paragraph","text":"（1941年1月20日）"},{"type":"paragraph","text":"（一）蒋介石已将我们推到和他完全对立的地位，一切已无话可说。"},{"type":"paragraph","text":"（二）中央决定将各办事处逐步撤销，人员陆续撤回，八路军总部不再向蒋呈报任何文电。"},{"type":"paragraph","text":"（三）延安军委已经发表命令谈话，收到望广泛散播。"},{"type":"paragraph","text":"（四）现在这样的国共关系，已对我们、对革命没有任何利益。并且破裂是蒋发动的，对我们甚为有利。"},{"type":"paragraph","text":"（五）问题是口口口口口口口口口口口相左，三个月来几经往复，尚未解决，故目前我们在政治上取猛烈攻势，而在军事上暂时还只能取守势，惟须作攻势的积极准备，以备在四个月或六个月后能够有力地转入攻势。在准备时期，边区及晋西北方面不作大的军事调动，以免震动。八路人员暂时亦不发表反蒋言论。"},{"type":"paragraph","text":"[1]这是毛泽东关于蒋介石发布“一一七”命令后国共关系的变化及鹅"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":372,"page_end":372},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46346ea979"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
