art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想武装起来的中国人民不是好惹的对美机在公海上轰炸扫射我渔船；打死打伤我渔民的明目张胆的严重挑衅；表示最强烈的抗议？","authors":[],"parts":[{"type":"paragraph","text":"新华社二十九日讯 美帝国主义军用飞机二十八日又在公海上轰炸扫射悬挂有中华人民共和国国旗的我渔船，打死我渔民及其子女三人，打伤十八人，打沉我渔船一艘，打坏三艘。我国国防部发言人对美国军用飞机这种明目张胆的严重挑衅，表示最强烈的抗议。"},{"type":"paragraph","text":"眨�我广西壮族自治区东兴各族自治县江平公社〖ZI/字符〗574"},{"type":"paragraph","text":"我国国防部发言人指出，美国政府派遣军用飞机在公海上破坏我渔业生产，疯狂地对从事和平劳动的我渔船进行轰炸扫射，杀害我渔民，表明约翰逊政府是当代最野蛮、最残暴的侵略强盗。我们坚决抗议美帝国主义的强盗行为。我们严正警告美国政府：必须立即停止这种海盗行为。用毛泽东思想武装起来的伟大的中国人民不是好惹的。美帝国主义欠下的血债，我们是一定要清算的。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57fb04a06f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
