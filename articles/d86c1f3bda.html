rs":["哈尔滨医学院","赵士杰"],"dates":[{"year":1957,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"在市高等学校九三学社座谈会上的发言","type":"title"},{"text":"哈尔滨医学院赵士杰","type":"authors"},{"text":"（赵士杰：哈尔滨医学院副教授、九三学社社员）","type":"subtitle"},{"text":"党委治校不够合适，应改变治校机构。就目前来说，不应“党委治校”，因为现在存在着宗派主义。如果仍是“党委治校”，党员作校长，领导校内一切，很容易引起宗派主义。应改变校内机构，建立常委、校长为当然委员，重大事情召开委员会议讨论决定。此外，可另设一由党派和民主人士组成的监督机构，负责监督和协助常委研究工作。此外，建设基层党团组织不应干预行政事务，人事处的行政权限，也应有明确范围，行政委员会应有权聘请教师。（5月31日哈尔滨日报）","type":"paragraph"}],"comments":[],"origin":"《鸣放言论（二）》（哈尔滨：“学习生活”编辑室编，1957年7月10日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d86c1f3bda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
