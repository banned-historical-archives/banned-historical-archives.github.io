,"dates":[{"year":1968,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"东风水泥厂清除修正主义流毒"},{"type":"paragraph","text":"半年多实现三十多项技术革新"},{"type":"paragraph","text":"湖北省黄石市东风水泥厂广大革命职工，以毛泽东思想为武器，狠批中国赫鲁晓夫的反革命修正主义的办工业路线，促进了革命职工的思想革命化，在半年多的时间里完成了三十多项技术革新项目，其中仅自制和改制的九项设备，就为国家节省了五十六万元资金和二百多吨钢材。"},{"type":"paragraph","text":"东风水泥厂是个老厂，为了进一步发展生产，急需增添一些技术装备。东风水泥厂的广大革命职工带着这个问题，学习了毛主席“自力更生”、“勤俭办工厂”和关于突出无产阶级政治、大搞群众运动的伟大教导，结合本厂实际，狠批中国赫鲁晓夫宣扬的“专家治厂”、“技术第一”等反革命修正主义黑货，把中国赫鲁晓夫等党内一小撮走资派斗倒斗臭、清除反革命修正主义路线流毒的革命大批判，提高了革命职工的无产阶级觉悟，焕发起革命职工的冲天干劲。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdd045b6b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
