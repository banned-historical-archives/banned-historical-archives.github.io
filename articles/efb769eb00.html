rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做无限忠于毛主席的好党员","authors":["“无限忠于毛主席革命路线的好干部”门合同志生前战友费荣庆"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“无产阶级文化大革命，还有些事没有做完，现在还要继续做，譬如讲斗、批、改。”中央两刊的重要社论，号召我们用毛主席关于无产阶级专政下继续革命的伟大学说武装自己，人人争当无产阶级专政下继续革命的先进分子，这是时代的需要，是完成斗、批、改各项战斗任务的需要，是继续革命的需要。"},{"type":"paragraph","text":"怎样才能做一个无限忠于毛主席的好党员？我深深体会到：必须自觉地用毛主席关于无产阶级专政下继续革命的伟大理论武装自己的头脑，自觉地在灵魂深处爆发革命，做到不为名，不为利，不怕苦，不怕死，一心为人民，一心为革命，“完全”“彻底”为中国人民和世界人民服务。无限忠于毛主席革命路线的好干部、我的战友门合同志，就是无产阶级专政下继续革命的先进分子的优秀代表。"},{"type":"paragraph","text":"在举国上下热烈欢庆中国共产党诞生四十八周年的大喜日子里，回顾我党在毛主席无产阶级建党路线的指引下，从胜利走向胜利的光辉战斗历程，展望无限美好的革命远景，我们豪情满怀，斗志昂扬，决心更好地活学活用毛泽东思想，以门合同志为榜样，发扬一不怕苦、二不怕死的彻底革命精神，争当在无产阶级专政下继续革命的先进分子。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efb769eb00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
