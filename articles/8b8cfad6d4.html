art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"港澳爱国同胞举行集会表示坚决响应毛主席的伟大号召，同祖国人民和世界人民一起，为打败美国侵略者及其一切走狗作出应有的贡献","authors":[],"parts":[{"type":"paragraph","text":"新华社香港二十八日电 香港爱国同胞一千七百多人二十七日举行集会，隆重纪念朝鲜祖国解放战争二十周年，愤怒声讨美帝国主义霸占我国领土台湾的滔天罪行。大会强烈地表达了香港爱国同胞坚决支持朝鲜人民反对美帝国主义侵略、争取祖国统一的正义斗争的坚强信念；表达了香港爱国同胞决心遵循伟大领袖毛主席的教导，为解放我国的神圣领土台湾，完成统一祖国的伟大事业而奋斗的战斗意志。"},{"type":"paragraph","text":"港九工会联合会会长陈耀才在会上说，二十年前，穷凶极恶的美帝国主义发动了侵朝战争。经过三年的时间，就被朝中人民所打败，戳穿了美帝这只纸老虎，为全世界被压迫人民和被压迫民族的反帝斗争树立了光辉的榜样。"},{"type":"paragraph","text":"他说，二十年前，美帝国主义被赶出中国大陆以后，不甘心失败，又悍然用武力霸占我国领土台湾省，继续与中国人民为敌，不断派遣军舰飞机侵犯我国领海领空，唆使蒋介石匪帮窜扰我国大陆沿海地区。美帝国主义还阴谋制造“两个中国”，妄图把台湾永远从中国分割出去。在美蒋的反动统治下，台湾同胞一直处于水深火热之中。我们时刻都在怀念着一千四百万台湾同胞，并且为他们每一个反美斗争的胜利而感到鼓舞。他说，台湾是我们伟大祖国的神圣领土，台湾人民是我们的骨肉同胞。美帝国主义必须从台湾滚出去。我们一定要解放我国的领土台湾，完成统一祖国的伟大事业。"},{"type":"paragraph","text":"新华社香港分社副社长祁烽在大会上讲话，热烈赞扬朝鲜人民所取得的祖国解放战争的伟大胜利，愤怒声讨美帝国主义霸占我国领土台湾的滔天罪行。他说，中国人民下定决心，并且充满信心，一定要解放我国的神圣领土台湾，这是谁也阻挡不了的！当前，值得我们特别警惕的是，美帝国主义正在急迫地起用日本军国主义充当侵略亚洲的打手。美日反动派的勾结，严重地威胁着中朝两国人民的安全。他说，美日反动派互相勾结，猖狂捣乱，他们必将受到更加严厉的惩罚。"},{"type":"paragraph","text":"香港广大爱国工人、农民、渔民、学生、文化界和工商业者的代表也在大会上讲了话。他们满怀豪情，畅谈国内外一派大好革命形势。一致表示要坚决响应伟大领袖毛主席发出的“全世界人民团结起来，打败美国侵略者及其一切走狗！”的伟大号召，同祖国人民和世界各国人民一起，为打败美国侵略者及其一切走狗作出应有的贡献。"},{"type":"paragraph","text":"二十七日，澳门各界爱国同胞一千多人也举行了集会，愤怒声讨美帝国主义霸占南朝鲜和我国领土台湾的滔天罪行。爱国文艺工作者还演出了反美斗争的文艺节目。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b8cfad6d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
