ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"毛泽东等祝贺金日成当选朝鲜民主主义人民共和国主席的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺金日成当选朝鲜民主主义人民共和国主席的电报\""},{"type":"paragraph","text":"（1972年12月29日）平壤朝鲜民主主义人民共和国主席金日成同志："},{"type":"paragraph","text":"欣闻您当选为朝鲜民主主义人民共和国主席，我们谨代表中国共产党、中华人民共和国和中国人民，并以我们个人的名义，向您致以热烈的祝贺。"},{"type":"paragraph","text":"几十年来，在您的英明领导下，英雄的朝鲜人民走过了光辉的战斗历程，不断地从胜利走向胜利。今天，朝鲜人民的社会主义革命和社会主义建设事业，正在日新月异地向前发展，朝鲜民主主义人民共和国更加繁荣昌盛。朝鲜人民所取得的辉煌成就，是以您为首的朝鲜劳动党所制定的正确路线的伟大胜利。您当选为朝鲜民主主义人民共和国主席，再一次显示了朝鲜人民对您的无限热爱，显示了朝鲜人民坚如磐石般的团结。我们衷心祝愿您今后在领导朝鲜人民进行革命、建设和统一祖国的事业中，取得新的更大的成就。"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国代主席董必武联名给朝鲜民主主义人民共和国主席金日成的电报。1972年12月，朝鲜召开第五届最高人民会议第一次会议，通过新的《朝鲜民主主义人民共和国宪法》，金日成当选为国家主席。"},{"type":"paragraph","text":"毛泽东等祝贺金日成当选朝鲜民主主义人民共和国主席的电报"},{"type":"paragraph","text":"祝中朝两国人民在长期的共同斗争中用鲜血凝成的伟大友谊和战斗团结不断加强和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国代主席董必武"},{"type":"paragraph","text":"一九七二年十二月二十九日于北京"},{"type":"paragraph","text":"1972年，毛泽东和周恩来在中南海书房会见朝鲜劳动党中央委员会总书记金日成。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":365,"page_end":366},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6b06e99d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
