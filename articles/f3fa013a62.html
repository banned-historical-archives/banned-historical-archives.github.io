tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"支左的根本原则是按毛泽东思想办事","authors":["8157部队驻陕西毛纺厂毛泽东思想宣传队王年松"],"parts":[{"type":"paragraph","text":"从广播里听到了北京针织总厂和驻厂支左的8341部队的先进经验介绍，感到非常亲切，受到莫大鼓舞。北京针织总厂不愧为贯彻毛主席的无产阶级革命路线和伟大战略部署的一个典范，8341部队不愧为支左的一面红旗。8341部队支左的三条原则，最高度、最深刻地概括了支左工作的经验，是支左部队的行动纲领。我们对照支左的亲身经历，深刻体会到，做到了这三条，支左工作就胜利，无产阶级文化大革命就向前发展。"},{"type":"paragraph","text":"我们进厂初期，由于没有明确树立当小学生的思想，没有把做艰苦、细致、深入的思想政治工作，当作首要问题来抓，工作中出现了不少问题，形成了比较困难的局面。后来，我们遵照伟大领袖毛主席的教导，主动到群众中去当小学生，征求意见。我们认真作了研究分析，对照毛主席的有关论述进行检查。在提高认识的基础上，向群众作了三次自我批评，并在实际工作中改正了错误。群众敲锣打鼓，表示欢迎，说：“你们真是毛主席派来和我们一起闹革命的。”对于一部分受蒙蔽的群众，我们就主动同他们接近，利用休息时间，到他们家里去访问，同他们谈心。我们耐心地向他们宣传毛泽东思想，使他们提高了阶级觉悟，很快地站到毛主席的无产阶级革命路线上来。对于厂里严重对立的两派组织，我们也是坚定不移地按照毛主席的教导，做艰苦细致深入的思想政治工作，广泛开展谈心活动。一次谈不好，就两次三次地谈。会上谈不好，就到车间、家庭里去谈。实践证明，革命群众最听毛主席的话。只要我们大力宣传毛泽东思想，耐心地向他们做思想政治工作，什么问题也能解决。经过我们长期工作，全厂终于实现了革命的大联合，并于十一月十九日成立了革命委员会。"},{"type":"paragraph","text":"我们今后一定要很好地学习8341部队和北京针织总厂无产阶级革命派的先进经验，以他们为榜样，坚决贯彻执行支左的三条原则，牢牢掌握斗争大方向，步步紧跟毛主席的伟大战略部署，把支左工作搞得更好，夺取无产阶级文化大革命的新胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3fa013a62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
