rs":[],"dates":[{"year":1966,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼中友协代表团团长赞扬我文化大革命"},{"type":"paragraph","text":"中国人民经过文化大革命觉悟更高"},{"type":"paragraph","text":"据新华社广州二十一日电　尼中友协代表团团长加内什曼·什雷斯塔在这里对本社记者说，中国要使社会主义建设获得圆满成功，进行无产阶级文化大革命，破四旧，立四新是十分重要的和必要的。他说：这次文化大革命一定会获得成功，因为它得到了绝大多数的中国人民支持。我们很高兴在无产阶级文化大革命高潮中来到中国访问。我们发现经过文化大革命的中国人民，在建设自己的国家时觉悟更高。更重要的是中国人民都学习毛主席著作，把毛主席著作作为思想上的武器。因此，我认为文化大革命，对那些幻想中国“和平演变”和企图在中国复辟资本主义的人来说，是个沉重的打击。"},{"type":"paragraph","text":"他称赞中国社会主义建设取得的伟大成就，是毛泽东主席领导的结果。他颂扬毛主席是不平凡的、卓越的伟大领袖，并衷心祝愿毛主席万寿无疆。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"破四旧","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5682bc8c16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
