script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"程潜陈明仁两将军  电复毛主席朱总司令　决遵命改编为消灭残匪而战","authors":["程潜　陈明仁"],"dates":[{"year":1949,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"程潜陈明仁两将军"},{"type":"paragraph","text":"电复毛主席朱总司令"},{"type":"paragraph","text":"决遵命改编为消灭残匪而战"},{"type":"paragraph","text":"【新华社北平二十七日电】程潜、陈明仁两将军八月十九日电复毛主席、朱总司令。电文如下："},{"type":"paragraph","text":"北平毛主席、朱总司令：八月十六日电敬悉。辱荷藻饰，惭感交并。承示团结部属，与人民解放军亲密合作，并准备改编为人民解放军，以革命精神教育部队，改变作风，力求进步，为消灭残匪，解放全国人民而奋斗。潜等责无旁贷，遵命竭力以赴。自解放军暨代表团进驻长沙以来，推诚相处，军民欢腾，秩序安宁。至于军政机构，正次第重组，部队正作初步整编，进行均甚顺利，凡此差可告慰。来日艰巨，潜等菲陋，当秉临深履薄之诫。尚盼随时指示为祷。"},{"type":"paragraph","text":"程潜、陈明仁　　八月十九日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65aa991a21"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
