ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"同意先打黄维","alias":"","parts":[{"type":"paragraph","text":"同意先打黄维]"},{"type":"paragraph","text":"（1948年11月24日）刘、陈、邓，并告粟、陈、张："},{"type":"paragraph","text":"梗二十二时电悉。（一）完全同意先打黄维；（二）望粟陈张遵刘陈邓部署，派必要兵力参加打黄维；（三）情况紧急时机，一切由刘陈邓临机处置，不要请示。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十四日十五时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军司令员刘伯承、第一副司令员陈毅和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]粟、陈、张，指粟裕、陈士、张震，当时分别任华东野战军代司令员兼代政治委员、参谋长和副参谋长。"},{"type":"paragraph","text":"[3]指1948年11月23日22时刘伯承、陈毅、邓小平关于先歼黄维兵团的部署给栗裕、陈士、张震并报中共中央军委的电报。电报说：现歼击黄维之时机甚好，而李延年、刘汝明仍迟迟不进。因此，我们意见除王张十一纵外，请粟陈张以两三个纵队对李刘防御，至少以4个纵队加入歼黄维作战。只要黄维全部或大部被歼，较之歼灭李、刘更属有利。如军委批准，我们即照此实行。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":268,"page_end":268},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8e29a968d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
