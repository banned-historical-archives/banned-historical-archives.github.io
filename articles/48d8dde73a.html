art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"欢聚在毛主席像旁","authors":["维吾尔族","艾山玉山"],"parts":[{"type":"paragraph","text":"小阿扎提回来了！"},{"type":"paragraph","text":"迎着天山的彩霞，披着北京的阳光。"},{"type":"paragraph","text":"脸上荡漾着幸福的微笑，"},{"type":"paragraph","text":"胸前闪耀着毛主席的像章。"},{"type":"paragraph","text":"小阿扎提和乡亲们热情握手，"},{"type":"paragraph","text":"他的脸象路边盛开的红花一样，"},{"type":"paragraph","text":"他从怀里捧出一张珍贵的照片，"},{"type":"paragraph","text":"“看！我们心中最红最红的红太阳！”"},{"type":"paragraph","text":"塔里木铺开壮丽的画卷，"},{"type":"paragraph","text":"博格达放声把赞歌高唱，"},{"type":"paragraph","text":"各民族沐浴在金红的霞光里，"},{"type":"paragraph","text":"小阿扎提讲起见到毛主席的幸福时光……。"},{"type":"paragraph","text":"小吐尼莎听得拍手起舞，"},{"type":"paragraph","text":"库尔班大叔笑得满脸放光；"},{"type":"paragraph","text":"捧着伟大领袖毛主席的照片，"},{"type":"paragraph","text":"春风吹暖各民族人民的心房！"},{"type":"paragraph","text":"“小阿扎提见到了毛主席！”"},{"type":"paragraph","text":"喜讯张开翅膀飞遍整个村庄。"},{"type":"paragraph","text":"人们欢聚在毛主席像旁载歌载舞，"},{"type":"paragraph","text":"心儿一齐向着天安门上的红太阳！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48d8dde73a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
