script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“毛主席万岁！”","authors":[],"dates":[{"year":1967,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“毛主席万岁！”"},{"type":"paragraph","text":"永远记住一句中国话"},{"type":"paragraph","text":"一次，越南有个工人一见到中国同志就用中国话热情高呼：“毛主席万岁！”他告诉中国同志说：“我学过中国话，但是我记得最牢的就是：‘毛主席万岁！’别的忘了没关系，这句话可永远不能忘，也永远不会忘。见了中国同志，我就要用中国话高呼毛主席万岁！因为我热爱毛伯伯。”"},{"type":"paragraph","text":"决心学会五个汉字"},{"type":"paragraph","text":"马里有位老司机，是一个文盲。有段时期，他给在马里工作的中国朋友开车。他非常恳切地要求中国朋友教他写五个汉字——毛主席万岁。他每天都请中国朋友教他写。虽然汉字较难写，但是他毫不怕困难，写得非常认真，一遍，两遍，三遍……不知写了多少遍。每当中国朋友告诉他写对了的时候，他就乐呵呵地，高兴极了。经过用心练习，这位老司机终于能流利地写出五个漂亮的汉字：毛主席万岁。"},{"type":"paragraph","text":"高呼“毛主席万岁！”"},{"type":"paragraph","text":"有一次，中国专家乘车从马里的港口——库里科罗驰往首都巴马科，路上忽然听到有人用中国话高呼：“毛主席万岁！”“毛主席万岁！”专家们都感到很奇怪：是谁在那里高喊这句亲切的口号呢？他们知道，在马里，有许多人爱从中国专家那里学得几句中国话。因此，在有中国专家的地方，听到马里人讲中国话是不奇怪的。可是，在库里科罗这个地方，中国专家以前从未到过，怎么也会有人这样流利地用中国话呼口号呢？显然，“毛主席万岁！”这句最鼓舞人心的中国话已经在马里广泛流传开了。中国的专家们都怀着激动而好奇的心情向车外望去。他们看到，在不远的山坡上，正迎车站着一位五、六岁的儿童，他挥动着小手，不停地高呼：“毛主席万岁！”那清脆悦耳的童音，经久不息地在中国同志的耳际回荡。"},{"type":"paragraph","text":"我们热爱毛主席"},{"type":"paragraph","text":"在捷克斯洛伐克的一个城市里，有位又聋又哑的捷克斯洛伐克人，一次见到了一名中国留学生，顿时显得非常高兴。于是，他亲亲热热地拉住那位同学便走，一起到了一家咖啡馆。这位中国学生感到突然，搞不清是怎么回事。后来，只见这个聋哑人用手指在桌面上一个字母一个字母地比划着。等他比划完了，中国同学才恍然大悟，原来他想说：“我和我周围的同事都热爱中国共产党，热爱毛主席。”当聋哑人看出中国同学已经领会了他的心意时，更显得兴高采烈，脸上堆满了幸福的微笑。（新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0659147d22"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
