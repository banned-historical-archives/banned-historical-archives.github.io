art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"排除“四人帮”干扰 争分夺秒为战备四八○四厂修船能力创建厂以来最高水平","authors":["莫瑞兰/余国民/俞林森"],"parts":[{"type":"paragraph","text":"本报讯 南海舰队四八○四工厂，在粉碎“四人帮”以后，全厂同志解放思想，干劲倍增，抢时间，挖潜力，不断提高舰船修理能力。去年，他们创造了建厂十七年来生产最高水平，修船吨位比前年提高百分之三十。今年一月份又实现了开门红，已修复的五艘舰船，试航合格率达百分之百。"},{"type":"paragraph","text":"这个厂在排除“四人帮”干扰之后，有股子为战备争分夺秒的精神。去年，某部队一艘驱逐舰的一项重要设备急需大修，生产厂排不上号，部队却等着用。抢修工程难度很大，厂里设备和技术力量不足，当上级征询他们意见时，厂党委和工人们都表示：决不能让部队守着军舰出不了海，耽误备战，我们来修！工厂立即成立了由何厂长负责的抢修队，并由老工人、技术员和领导干部组成攻关小组。图纸不全，就到同类舰参照实物绘制，设备不足，就自己改装，以土代洋；碰上技术难题，就集体攻坚。在上级业务部门和有关单位大力配合下，抢修工程提前完成，保证了部队的战备训练，受到了海军领导机关的通报表扬，电工车间荣记集体三等功。"},{"type":"paragraph","text":"为了尽快提高舰艇在航率，他们立足现有条件，大挖生产潜力。去年全厂搞了三次大的会战，共修舰船三十二艘；同时大搞技术革新，提高了现有设备利用率，使全厂提前三十七天完成了修理任务。这个厂加强了生产管理，严格规章制度，千方百计缩短舰船修理周期。由于提高了修理质量，去年修理的舰船中，一次试航合格率达百分之八十八点五，超过了上级规定的标准。（莫瑞兰、余国民、俞林森）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee90f44c2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
