rt":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为传播毛泽东思想而战斗","authors":[],"parts":[{"type":"paragraph","text":"一位尼日利亚朋友最近写了一首诗，热情颂扬世界革命人民的伟大领袖毛泽东主席。他在诗中写道："},{"type":"paragraph","text":"毛泽东是红太阳，"},{"type":"paragraph","text":"毛泽东思想是阳光；"},{"type":"paragraph","text":"一轮红日从中国升起，"},{"type":"paragraph","text":"阳光普照，激励着一切被压迫人民。"},{"type":"paragraph","text":"那点燃中国革命的星星之火，"},{"type":"paragraph","text":"如今正在全世界燎原，"},{"type":"paragraph","text":"毛泽东思想已经传遍全世界。"},{"type":"paragraph","text":"您的思想万古长青，"},{"type":"paragraph","text":"您的著作宏伟无边。"},{"type":"paragraph","text":"毛泽东，伟大的革命巨人，"},{"type":"paragraph","text":"您把赫鲁晓夫的阴谋粉碎，"},{"type":"paragraph","text":"也把美帝吓得浑身发抖。"},{"type":"paragraph","text":"让我投到您的怀抱，"},{"type":"paragraph","text":"承受您的思想阳光的抚育，"},{"type":"paragraph","text":"然后返回非洲，"},{"type":"paragraph","text":"为您的思想的真理去宣传，"},{"type":"paragraph","text":"为您的为自由而战的真理去传播。"},{"type":"paragraph","text":"为劳动人民，就要投身于战斗。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e249bcf69"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
