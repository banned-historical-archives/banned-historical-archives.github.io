"authors":[],"dates":[{"year":1966,"month":6,"day":15}],"is_range_date":false,"parts":[{"text":"中共广州市东平农场委员会专政对象登记表--霍渭文","type":"title"},{"text":"","type":"appellation"},{"text":"广东省广州市郊区 公社 大队 生产队（ 村）","type":"paragraph"},{"text":"专政对象登记表","type":"paragraph"},{"text":"户主姓名 霍渭文 编号81","type":"paragraph"},{"text":"   问题性质 右派分子   姓名 现名 霍渭文 性别 男 家庭出身 中农   曾用名 霍泉、霍然 年龄 47 本人成份 职员   文化程度 高中 民族 汉 现在职业及职务     原籍 广州顺德鸡州 现住 广州市郊东平农场   何时何地何人介绍参加过何种反动组织，任何种职务 1940.11在曲江西厢乡任教时由同乡三青团某团部组织长陈平绍个别介绍参加三青团，经查是一般团员，无活动。   家庭成员及主要社会关系中的姓名、政治面貌及社会职业 爱人：黄颂仪，40岁，小学教师。 女：霍慧儿，16岁，霍慧中，12岁。 子：霍继，14岁，霍然，10岁。 外母：余清，81岁，继母：马溪瑶，72岁。   个人简历 1934－1941.8.先后在香港大光青华英文书院、广州培道中学，广东国民大学学校读书。 1941－1943.4.曾当教员兼教务主任，文昌地籍处理登记员。1943.4－46.3.梅县贷税分局等处任叶务员等。 46.7－47.6.在鸡州任教员兼付乡长，任广州岭南日报、大众晚报记者，后失业。 1948.6－1949.10在饶平贷税处新会国税所等地任查验员。1952－58.6广州税局第一分局任科员、付科长等职。 58.6－现在九佛农场东平农场。   何时何地受过何种处分 三反运动中犯错误记大过1次，因失证章记小过1次。 1956任市税局失过工作证 1958.1整风运动划为右派分子   ","type":"paragraph"},{"text":"注：(1) 专政对象包括解放后外出、外逃的和四清运动中新划出来的。","type":"paragraph"},{"text":"(2) “问题性质”一栏，分别填写属于那一种“分子”。","type":"paragraph"},{"text":" (3) “主要问题”一栏，包括解放前后的主要罪恶和主要问题。","type":"paragraph"},{"text":"   主要问题 霍一贯对组织和新社会不满，在平时和各项中心工作中发表些不满言论和谬论，整风期间攻击党和社会主义，如把三反缺点夸大描绘成为一塌糊涂，为自己翻案，煽动别人不满，还宣扬资本主义民主，否认我国人民民主制度，甚至污蔑我们的领导者，为统治阶级的官僚以随便胡作胡为，而一般干部是被统治者：是奴隶，没有民主，挑拨党群关系丑化党员领导，攻击党的干部政策和知识分子政策，把干部政策污蔑为宗派主义，对知识分子只有使用而无培养……此外还诋毁土改政策、肃反运动、粮食统购统销政策，并到处放火煽动等，在斗争过程中态度不老实，诸多抵赖和顽抗，在事实面前避重就轻，被斗垮后表现不够好，且不服气。   大队贫下中农协会意见 同意列为专政对象 中共红路支部 签名 1966年 月 日   大队党支部意见 右派份子，列入专政对象。 签名 中国共产党广州市东平农场委员会 1966年6月15日   大队工作队意见 同意列为专政对象 签名  1966年6月15日   备考 右派分子继续监督改造。 中共广州市委农村四清总团三元里分团  66.6.15.   ","type":"paragraph"},{"text":"填表人 1966年 月 日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcb07ffe99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
