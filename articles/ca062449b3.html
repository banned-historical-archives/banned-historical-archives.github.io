script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"介绍各派学说和适量的唯心主义与资产阶级学说北大在教学中积极贯彻百家争鸣使学生扩大了视野，增进了识别香花毒草的能力，提高了钻研学问的积极性","authors":[],"dates":[{"year":1962,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京讯】　北京大学在教学中积极贯彻“百花齐放、百家争鸣”的方针，提高了教师、学生钻研学问的积极性。"},{"type":"paragraph","text":"哲学、经济、法律等系，根据教学需要，在高年级和研究生中开设了不同学派与不同学说的课程和适量的唯心主义与资产阶级学术思想课程。哲学系从1956年到现在，就先后开设了二十多门唯心主义和资产阶级学术思想课程。生物系从1956年开始，先后开设了“米丘林学派”和“摩尔根学派”的遗传学。这些课程，多数是有专门研究的老教师开设的，也有一些是青年教师经过准备后开设的，还有些课是请校外专家来讲授的。这些课程的授课教师一般都能比较认真地进行备课。在讲授资产阶级学术思想课程中，他们首先全面如实地介绍，能批判就批判，不能批判就不勉强批判。学生一般也都认真学习，阅读有关参考资料，并在学习的基础上重点组织课堂讨论，把学习和批判结合起来。这样不仅使学生增进了知识，扩大了视野，也培养了识别香花毒草的能力。哲学系高年级学生在学习和讨论新托马斯主义以后，进一步了解了这一现代资产阶级哲学流派为帝国主义利益服务的反动本质。生物系的青年教师和学生，认真学习和研究了米丘林和摩尔根这两个学派的不同学说之后，不少人开始综合运用两派的长处，对遗传学的研究，既注意了有机体和环境的统一关系，也注意了机体内部的传递关系。"},{"type":"paragraph","text":"在文理科的基础课教学中，教师一般能在全面完成教学大纲要求的前提下，介绍各种不同的学术观点，发表自己的学术意见。例如:“中国哲学史”课讲庄子时，主讲教师汤一介着重介绍了冯友兰、关锋、任继愈等人的不同论点，阐述了自己的意见；配合教学，还举办了学术讲座，请冯友兰、任继愈详细阐述自己的论点。在讲授以后，师生又各抒己见，展开讨论。这样的讲授和讨论，引起了教师和学生深入钻研的兴趣。"},{"type":"paragraph","text":"在马克思列宁主义的理论课的教学中，教师除了严格根据马克思列宁主义的经典著作和中央的文件决议，讲授马克思列宁主义的基本原理和党的方针政策外，也向学生就某些学术问题介绍不同的见解。在课堂讨论时，各种不同意见展开自由争论。如哲学系辩证唯物主义与历史唯物主义课的教师讲授存在与意识的关系时，就向学生介绍哲学界关于思维与存在同一性问题的各种主要论点，以利于更加深入地阐明唯物主义反映论的基本观点。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca062449b3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
