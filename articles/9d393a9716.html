" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"中央转发华北局关于继续开展新三反的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发华北局关于继续开展"},{"type":"paragraph","text":"新三反的报告的批语"},{"type":"paragraph","text":"（1953年3月6日）各中央局、分局，并转省市区党委、地委和县委："},{"type":"paragraph","text":"华北局三月一日的文件“很好，发给你们参考，并登党刊。华北局对于开展反对官僚主义反对命令主义反对违法乱纪的斗争已做出第一个总结，并作了有分别的部署，望你们都仿照这样做。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"三月六日"},{"type":"paragraph","text":"[1]指中共中央华北局1953年3月1日关于继续开展反官僚主义、反命令主义、反违法乱纪的报告。报告中说，华北地区反对官僚主义和反对违法乱纪的斗争，已取得了一些成绩和经验，但运动开展得很不平衡，许多领导认识不足，注意不够，仍处被动。为此，华北局提出：结合当前工作，继续在全区范围内开展斗争；并采取有领导、有重点地逐步深入的办法，切忌急躁情绪和急风暴雨方式；首先组织各系统的领导机关干部学习有关文件，联系思想，结合实例，进行检查；不同地区和不同部门，应有不同的检查重点；3月初再召开一次省市处理人民来信会议，检查处理人民来信情况。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":46,"page_end":46},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发华北局关于继续开展新三反的报告的批语","authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":6}],"is_range_date":false,"parts":[{"text":"中央转发华北局关于继续开展新三反的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局分局并转省市区党委地委和县委：","type":"appellation"},{"text":"华北局三月一日的文件很好，发给你们参考，并登党刊。华北局对于开展反对官僚主义反对命令主义反对违法乱纪的斗争已做出第一个总结，并作了有分别的部署，望你们都仿照这样做。","type":"paragraph"},{"text":" 中央三月六日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d393a9716"},"buildId":"7OZsUMojoSd8vSDc8SCl
