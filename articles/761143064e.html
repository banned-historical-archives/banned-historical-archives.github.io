torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"致彭德怀电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀电！"},{"type":"paragraph","text":"（1936年10月10日）"},{"type":"paragraph","text":"朱、张已到会宁，询问见面人员与地点，中央已复。我们意见，以兄西去就他们为宜。朱、张来电称中央及毛、周、彭，自称西北军委，又一电称执行毛、周、彭所示任务，亦事实上承认我们军委。我们方面曾有两电去，称朱总司令、张总政委，以后即照此种方式解决，以便顺利执行宁夏战役。朱、张以两总名义，依照中央与军委之决定指挥各军作战。为使之增加对于执行军事任务之坚决性，防止可能的动摇性（在目前是防止对宁夏战役之某种可能的动摇），兄须加以特别之注意。"},{"type":"paragraph","text":"见面时对老问题请一概不谈。[1]这是毛泽东致彭德怀电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":10,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":212,"page_end":212},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"761143064e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
