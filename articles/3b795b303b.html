year":1993,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"由长春电影制片厂摄制的历史巨片《重庆谈判》(上、下集)，去年10月22日正式开机。重庆市各级党、政、军领导也为拍摄工作提供方便，为此甚至在车辆已经很拥挤的市中心，断绝交通数小时，这在重庆是绝无仅有的。"},{"type":"paragraph","text":"去年12月初长影厂在重庆举行了《重庆谈判》新闻发布会，中央重大革命历史题材领导小组组长丁峤也专程赶来参加表示祝贺，他还兴致勃勃的在随后拍摄的“欢送毛泽东离渝的宴会上”扮演了重要的群众角色呢。"},{"type":"paragraph","text":"在新中国的电影画卷里，近年来毛泽东与蒋介石的形象已出现过不止一次，但他们的“戏”都是背对背做出来的。然而，这一次不同，影片首次使毛泽东与蒋介石同时出现在一个画面中，让他们面对面交锋。"},{"type":"paragraph","text":"目前影片已完成了重庆的全部外景，将在南京、延安、上党等地继续拍摄，预计今年国庆节前完成，并作为向毛泽东诞辰100周年的献礼。"},{"type":"paragraph","text":"(摘自《大众电影》)"},{"type":"paragraph","text":"\u003cIMG alt=请插入9号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1993\\02\\932m070601.JPG\"\u003e"}],"comments":[],"origin":"《大众电影》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"重庆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b795b303b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
