<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"乱了阶级敌人  锻炼了革命群众  赣州地区文化大革命形势比以往任何时候都好","authors":[],"dates":[{"year":1967,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乱了阶级敌人  锻炼了革命群众"},{"type":"paragraph","text":"赣州地区文化大革命形势比以往任何时候都好"},{"type":"paragraph","text":"据新华社南昌电　江西省赣州地区无产阶级文化大革命形势空前大好，比以往任何时候都好。广大人民群众经过一年多两个阶级、两条道路、两条路线斗争的锻炼，得到了充分的发动，受到了深刻的教育。伟大的毛泽东思想已经在全区人民的心目中树立起绝对的权威。"},{"type":"paragraph","text":"在江西省，赣州地区的两条路线斗争是最尖锐、最激烈的。这个地区的党内一小撮走资本主义道路当权派，竭力推行中国赫鲁晓夫的资产阶级反动路线，曾经在人民群众中挑起对立的两大派，蒙蔽一部分群众，疯狂镇压无产阶级革命派。无产阶级革命派为了保卫毛主席的无产阶级革命路线，进行了英勇斗争。那时候，这个地区好象乱了。其实，在最高统帅毛主席的英明领导下，结果是：乱了隐藏在无产阶级专政机构内部的敌人，锻炼了广大的革命群众，资产阶级反动路线彻底破产，毛主席的无产阶级革命路线取得了决定性胜利。"},{"type":"paragraph","text":"目前，赣州全区百分之九十的革命群众已经按系统实现了革命的大联合。革命大批判紧密结合本单位的斗批改，正在蓬勃展开。全区绝大部分县和部分公社已经建立起新的临时领导机构。工业生产连续两个月超额完成国家计划，部分工厂创造了历史上最高生产水平。农、林、牧、副、渔都有新的发展，粮食获得了历史上最大的丰收。"},{"type":"paragraph","text":"赣州地区形势大好的一个重要标志是人民群众充分发动起来了。广大革命群众遵循伟大领袖毛主席“你们要关心国家大事，要把无产阶级文化大革命进行到底”的伟大号召，积极行动起来，投入了伟大的无产阶级文化大革命。一年多来，在全区的工厂、农村、机关、学校、部队，人人都在关心国家大事。过去一家人碰到一块，说闲话、拉家常。现在，父子、夫妻、兄弟、姐妹、亲友，从十几岁的娃娃到白发苍苍的老太太，碰到一块就讨论无产阶级文化大革命的问题，逐渐懂得在无产阶级专政条件下怎样进行革命，怎样防止资本主义复辟的大道理。"},{"type":"paragraph","text":"广大无产阶级革命派和革命群众，在一年多来的无产阶级文化大革命中，把活学活用毛主席著作摆在高于一切、大于一切、先于一切、重于一切的位置上。许多人做到“身不离毛主席的书，口不离毛主席的话，行动不离毛主席的教导”，处处按照毛泽东思想办事。在毛泽东思想的哺育下，经过文化大革命运动的锻炼，一大批无产阶级革命事业的接班人正在茁壮成长。"},{"type":"paragraph","text":"目前，赣州地区无产阶级革命派和革命群众，正乘着大好形势的浩荡东风，以“斗私，批修”为纲，深入开展革命的大批判和本地区、本单位的斗批改，夺取文化大革命的彻底胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9201312412"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
