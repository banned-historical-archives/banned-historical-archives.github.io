" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来接见四川省工人代表时的讲话","authors":["周恩来"],"dates":[{"year":1966,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"周恩来接见四川省工人代表时的讲话","type":"title"},{"text":"周恩来","type":"authors"},{"text":"你们十一月二十七日要求来北京时，就有七十九名工人强行上车来北京，他们到北京来，我们是要招待的，但是我们不能承认他们的这个行动是革命的。","type":"paragraph"},{"text":"（对廖志高同志）听说你们已经签字承认他们抢车是革命行动，这是错误的。（对工人代表）你们批评省委的错误，是对的，但不应该抢车，你们抢车是错误的。你们斗争的大方向是正确的，但不一定每项行动我们都支持。你们造反，看造什么反。你们到了北京，我们要管你们。四川省委承认你们抢车是革命行动，这是不对的。","type":"paragraph"},{"text":"（工人反映，厂领导上还在转移黑材料）对类似问题，可以派人和工人共同检查。材料如果真正交完了就算了嘛。如果现在还在转移黑材料，就要罪上加罪。","type":"paragraph"},{"text":"你们来京要求解决问题，我们三家在一起，三头对面，大家都要讲真话。我事先没有跟寥志高谈过，大家都要诚恳坦白。现在正在绵阳、广元的工人，可以派一百名代表到北京来，最多不超过三百名。我们抽时间跟你们谈，但具体问题还是回四川解决。","type":"paragraph"},{"text":"工人到北京问题，我们不能松口。我们停止运送红卫兵，主要是为了抓紧运输生产资料、燃料及其它物资，你们是工人阶级，应该懂得这个道理。文化革命不能影响生产，不仅不能影响生产、破坏生产，而且应当促进生产。你们要替中央考虑，中央的意见很坚决，就是不赞成你们全体来北京，只能派代表来，你们已经是最高指标的代表团了。","type":"paragraph"},{"text":"这次派十辆大汽车运送工人，你们四川省委同意这样做，我们不能同意这样做。我在这里正式宣布，这种做法是错误的。","type":"paragraph"},{"text":"（对廖志高同志）你们是瘫痪下来了，你们都想把矛盾上交给中央。你们来了，我们当然要帮助你们解决问题，但是对于你们的这种做法，我们感到很恼火。","type":"paragraph"}],"comments":[],"origin":"一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（4）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a7cf457e8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
