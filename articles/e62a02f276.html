<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共西藏工委全面安排党内整风运动","authors":["袁定乾"],"dates":[{"year":1958,"month":1,"day":17}],"is_range_date":false,"parts":[{"text":"中共西藏工委全面安排党内整风运动","type":"title"},{"text":"袁定乾","type":"authors"},{"text":"新华社拉萨17日电  中共西藏各级党组织已于14日开始整风。","type":"paragraph"},{"text":"西藏地区这次党内整风运动，是按照中共中央1957年4月27日“关于整风运动的指示”和同年10月15日中央“关于在少数民族中进行整风和社会主义教育的指示”，结合西藏具体情况进行安排的。西藏工委明确指出，这次整风运动应当以去年最高国务会议第十一次扩大会议和中央召开的宣传工作会议上毛主席代表中央作的两个报告的指导思想。","type":"paragraph"},{"text":"为了达到改进工作，改进作风，改造个人，加强党内团结和作好西藏工作的目的，工委规定：在整风中各级党的领导机关和领导干部，要认真检查批判脱离群众和脱离西藏人民的官僚主义作风，检查批判不从全党出发(例如上级和下级、个人和党、地方和军队、这一工作部门和那一工作部门、汉族干部和藏族干部、老干部和新干部之间的不正常关系)、不从团结藏族人民和广大党外群众出发的宗派主义，检查不从西藏实际情况出发的主观主义。工委还要求全体党员干部认真检查个人主义、自由主义和违法乱纪的现象。汉族党员干部，还要着重检查批判大汉族主义思想和违犯民族政策的现象，巩固长期建藏思想；藏族党员干部要着重检查地方民族主义思想，提高社会主义觉悟，树立无产阶级的民族观点。","type":"paragraph"},{"text":"根据中央指示精神和内地整风经验，工委决定把这次整风运动划分为四个阶段，即：(一)大鸣大放阶段(边整边改)，(二)大争大辩论阶段(边整边改)，(三)着重整改阶段(继续鸣放)，(四)各人研究文件，批评教育提高自己阶段。","type":"paragraph"},{"text":"大争大辩论阶段，将根据中央“关于在少数民族中进行整风和社会主义教育的指示”中所提出的五个问题，结合西藏地区的实际情况和鸣放中发现的一些大是大非问题进行辩论。启发党员干部用摆事实、讲道理，辩明有关国家政治生活特别是西藏地区的政治生活中各方面的大是大非。步骤是从许多小是小非的辩论，逐步引导到大是大非的辩论。","type":"paragraph"},{"text":"西藏这次党内整风，对反右派问题不作为一个阶段来进行。但工委指示，如发现右派，可在大争大辩论阶段(即第二阶段)适当结合进行反右派斗争。","type":"paragraph"},{"text":"工委规定，这次整风，所有党、政、群、团机关及企业、事业、学校内的藏汉族党员和共青团员，原则上应该全部参加，但对参加整风的藏族党、团员要分别对待，思想批判原则上只在藏族老党员中进行，对于藏族新党员和团员，除听取其意见外，主要是进行社会主义教育。","type":"paragraph"},{"text":"此外，由于历史原因和社会原因，西藏地区的一些上层分子，不仅民族主义倾向有所滋长，而且还存在着不尊重国家的统一领导甚至企图分裂祖国大家庭的严重的分离主义倾向。因此，工委决定，除在党内进行整风外，还要在适当时期采取适当方式在党外藏族干部、上层人士以及社会上，进行一次正面的社会主义教育，特别是进行深入的爱国主义教育，以提高西藏人民的爱国主义，克服分离主义倾向，加强党的领导，进一步巩固民族团结和祖国的统一。","type":"paragraph"},{"text":" ——新华社《内部参考》1958年1月22日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e62a02f276"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
