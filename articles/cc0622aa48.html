980,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见佩尔蒂尼"},{"type":"paragraph","text":"新华社北京9月20日电  中共中央副主席邓小平同意大利总统山德罗·佩尔蒂尼，今天下午在人民大会堂进行了热情友好的会见。"},{"type":"paragraph","text":"邓小平在会见大厅门口等候佩尔蒂尼。他向前来采访的几十名意大利记者问好，大家热烈鼓掌。"},{"type":"paragraph","text":"邓小平同佩尔蒂尼见面时，两人都快步向前，紧紧拥抱。邓小平说：“我们虽然是第一次见面，可是我们今天是以老朋友、老战友的身份相见的。”佩尔蒂尼接着说：“这是一个游击队战士拥抱另一个游击队战士。”许多摄影机和照像机记录着战友之间的这次见面。邓小平问意大利记者，他们中间有多少人参加过反法西斯战争。其中两个人举起手来。邓小平说：“那时候，你们当中的其他人年纪还小嘛。”大家向邓小平和佩尔蒂尼表示感谢。记者们退出会见大厅后，邓小平和佩尔蒂尼进行了交谈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc0622aa48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
