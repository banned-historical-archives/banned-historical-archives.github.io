<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河北省夏收分配中各种矛盾日趋尖锐","authors":["新华社记者　文英"],"dates":[{"year":1957,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"河北省夏收分配中各种矛盾日趋尖锐","type":"title"},{"text":"新华社记者　文英","type":"authors"},{"text":"新华社保定5月31日讯　据中共河北省委最近召开的征购会议和农业厅召开的县农业局长会议反映，河北省多数地区的小麦生长不好，减产不少。随着麦收季节的逼近，各产麦区夏收分配中的各种矛盾日趋尖锐、紧张。","type":"paragraph"},{"text":"河北省共计种麦四千另九十四万多亩(其中废弃面积达一百七十六万多亩)，预计平均亩产九十六点六斤，相当计划的84％，比去年减产17．2％，今年麦田面积虽比去年多四百六十九万亩，但预计总产量要比去年减少一亿五千七百八十一万斤。","type":"paragraph"},{"text":"据各地反映，减产的主要原因是：一、耕种粗糙，管理不善；二、肥力不足；三、前期冷，后期旱，影响了小麦的生长。","type":"paragraph"},{"text":"由于收成不好，又当青黄不接，群众担心国家多购，增加了紧张心理，加深了夏收分配中的各种矛盾。这些矛盾，主要表现在以下几方面：","type":"paragraph"},{"text":"一、国家征购和社员要求多留多吃的矛盾，是分配中矛盾的焦点。各地乡、社甚至某些区县干部和广大社员，都对麦后三个月留粮九十至一百斤不满，抵触情绪很大，不少社员因此生产情绪低落。","type":"paragraph"},{"text":"一般乡社干部反映，去年因为受灾少吃还有可说；今年再不让社员吃饱讲不过去。他们说：留粮不够吃，要从亩数、产量上找(少报)，这是领导上逼着我们闹鬼。因此，全省各地少报麦田亩数和低估产量成为普遍现象。大兴县由八十斤降为三十五斤(其中有减产有瞒产)；清苑县羊庄社的小麦，估计每亩实产可达一百一十斤，但该社只报五十斤，石家庄专区藁城县禅房社，老农估产二百五十斤，社干只估产二百斤。由于低估产量，仅保定专区十二个县统计，就比专区估产计划减少粮食四千五百二十万斤。从各县三级干部会议上核定的产量情况看，一般社瞒产量都在30％左右。有些县的产量至今尚未定下来了，征收、统购任务分配不下去。据已经开过三级干部会议的五十九个县统计，有三十个县没有把产量和征、购任务核定下来，有些县的会不欢而散。","type":"paragraph"},{"text":"由于很多社员对消费指标低不满，已使生产受到影响。邢台县康庄铺社第五生产队，原有十辆水车人拉着浇麦，听到人、畜消费指标后，马上停工了。清苑县朱庄子社第二生产队有七十户，许多天来，只有六个人参加劳动。","type":"paragraph"},{"text":"据各地反映，已有不少社员打好了和国家争夺小麦的主意。有的地区已产生酝酿抢麦和社员私自拔麦的现象。静海县小南庄、清宁铺两个社，已按人口多少把麦田分到各户，叫社员明抢暗收。季气较早的大名县，已发生社员私割小麦(都是小片的)事件二十六起。","type":"paragraph"},{"text":"二、国家和社的矛盾还表现在国家收回到期贷款、农产品预付定金、工业品赊销款和社员要求多增加收入的问题上。根据已经作好和正在制定预分方案的合作社的情况来看，大都没有把归还国家这些到期款项列入分配方案之内。","type":"paragraph"},{"text":"三、社的扣留和社员多分的矛盾。有些社为了满足社员多分的要求，不顾社的生产需要，计划把所有粮食分给社员。也有的社只顾社里生产需要，不顾社员需要而扣留过多。","type":"paragraph"},{"text":"四、一些联村社的内部矛盾，在这次分配中又暴露出来。据各地反映：有的联村社内，麦田多的富村扬言不让全社统一分配，不让调粮；麦田少的村则坚持统一分配，按劳取酬。临漳县香菜营联村社和永年县小骡马社，麦田多的村已选好了人，准备在大社来拉麦子的时候，卧轨挡车。有的麦田少的村也作了抢麦的准备。","type":"paragraph"},{"text":"五、社员和社员之间，因为劳力多、强和劳力少、弱，以及出工不平衡的矛盾，也在各地普遍存在。劳力强出工多的社员主张坚决按劳取酬，出工少的社员说，反正社里不能让我挨饿。据各地调查，出工少的大体是这些人：(1)因自搞副业没有出工；(2)工人、干部和军官家属因有外援，家中的妇女和半劳力不愿参加劳动；(3)闹退社没有在社里干活；(4)因懒惰经常不参加生产；(5)因患病和劳力少实在不能劳动。对这些减收户，不少社员的意见是，除对后者加以照顾外，其它几种都不应给他们照顾。有些社员主张，他们缺的粮食，都不应由社统一扣留，让他们到粮点去买(即让他们负担购销差价)。","type":"paragraph"},{"text":"来源：1957年6月5日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9ff505979"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
