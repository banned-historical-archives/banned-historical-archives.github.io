s":[{"year":1983,"month":5,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社广州五月十三日电　叶剑英委员长十日上午在广州亲切会见了广东省农垦总局的领导成员，赞扬广东农垦系统的同志为发展祖国橡胶事业做出了巨大贡献，勉励大家把农垦事业搞得更好。"},{"type":"paragraph","text":"中共中央政治局委员王震参加了会见。"},{"type":"paragraph","text":"叶剑英说:“广东农垦系统的同志取得了很大成绩，为国家为人民立了大功，为祖国橡胶种植业的发展开辟了一条康庄大道，党和人民感谢你们。”他说:“许多外国人不相信北纬十七度以北能种橡胶，你们通过科学实验和辛勤劳动，在北纬十八度至二十四度区域大面积种胶成功，这在世界上是没有先例的，是个了不起的创造。”叶委员长称赞农垦、军垦的同志在新疆、北大荒、海南岛等地，发扬光荣革命传统，为保卫祖国、建设祖国做出了很大贡献。他希望大家百尺竿头更进一步，为四化建设做出更大贡献。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0bdf6e083"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
