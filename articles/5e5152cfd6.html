["李富春"],"dates":[{"year":1967,"month":11,"day":15}],"is_range_date":false,"parts":[{"text":"李富春接见统战部三组织的指示","type":"title"},{"text":"李富春","type":"authors"},{"text":"一、张经武回来交给群众，可以开中小型会，是认识问题，还是立场问题，是被坏人利用、还是陷进去，要由群众来决定。","type":"paragraph"},{"text":"二、三个组织都是革命群众组织，“东方红”要搞刘郢的材料积极起来，要斗私批修，双方不要揭对方的疮疤，你们要联合，从思想上联合，要思想上解决问题。刘郢、洪涛揪出来了，孙超也算一个，要特别警惕，不要受坏人挑动。","type":"paragraph"},{"text":"三、统战部的问题很严重，比团中央修得更透。李维汉是刘邓司令部在统战部的代理人，你们要把领导层摸清楚，要把领导层的阶级阵线搞清楚，并要摸索社会主义时期的统战工作，对当权派组织专案，当权派不能参加。","type":"paragraph"},{"text":"四、解放一批干部，提到日程上来。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"李富春接见统战部三组织的指示","parts":[{"type":"title","text":"983.李富春接见统战部三组织的指示"},{"type":"paragraph","text":"(1967年11月15日)"},{"type":"paragraph","text":"一、张经武回来交给群众，可以开中小型会，是认识问题，还是立场问题，是被坏人利用、还是陷进去，要由群众来决定。"},{"type":"paragraph","text":"二、三个组织都是革命群众组织，“东方红”要搞刘郢的材料积极起来，要斗私批修，双方不要揭对方的疮疤，你们要联合，从思想上联合，要思想上解决问题。刘郢、洪涛揪出来了，孙超也算一个，要特别警惕，不要受坏人挑动。"},{"type":"paragraph","text":"三、统战部的问题很严重，比团中央修得更透。李维汉是刘邓司令部在统战部的代理人，你们要把领导层摸清楚，要把领导层的阶级阵线搞清楚，并要摸索社会主义时期的统战工作，对当权派组织专案，当权派不能参加。"},{"type":"paragraph","text":"四、解放一批干部，提到日程上来。"}],"authors":["李富春"],"dates":[{"year":1967,"month":11,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":437,"page_end":437,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e5152cfd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
