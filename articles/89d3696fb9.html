dates":[{"year":1979,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平、方毅副总理会见中美高能物理联合委员会美方成员"},{"type":"paragraph","text":"新华社北京六月十一日电  国务院副总理邓小平、方毅今天晚上会见中美高能物理联合委员会美方成员。"},{"type":"paragraph","text":"今年年初邓副总理访美期间，方毅副总理和美国能源部长施莱辛格签订了中美在高能物理领域进行合作的执行协议。美方成员是根据上述协议前来北京参加中美高能物理联合委员会第一次会议的。联合委员会美方主席由能源部能源研究办公室副主任李斯教授担任，成员都是美国著名科学家和各大高能中心的负责人，其中有哥伦比亚大学教授李政道。"},{"type":"paragraph","text":"会见时，邓小平、方毅副总理对美国朋友前来我国表示欢迎，并就扩大两国科技合作的问题同他们进行了友好的谈话。"},{"type":"paragraph","text":"会见时在座的有：国家科委副主任赵东宛，中美高能物理联合委员会中方主席、中国科学院高能物理研究所所长张文裕教授以及联合委员会中方成员。"},{"type":"paragraph","text":"美国驻中国大使伍德科克和夫人参加了会见。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见中美高能物理联合委员会美方成员。 新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1979,"month":6,"day":12}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平、方毅副总理会见中美高能物理联合委员会美方成员","authors":[],"parts":[{"type":"paragraph","text":"据新华社六月十一日讯 国务院副总理邓小平、方毅今天晚上会见中美高能物理联合委员会美方成员。"},{"type":"paragraph","text":"今年年初邓副总理访美期间，方毅副总理和美国能源部长施莱辛格签订了中美在高能物理领域进行合作的执行协议。美方成员是根据上述协议前来北京参加中美高能物理联合委员会第一次会议的。联合委员会美方主席由能源部能源研究办公室副主任李斯教授担任，成员都是美国著名科学家和各大高能中心的负责人，其中有哥伦比亚大学教授李政道。"},{"type":"paragraph","text":"会见时，邓小平、方毅副总理对美国朋友前来我国表示欢迎，并就扩大两国科技合作的问题同他们进行了友好的谈话。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89d3696fb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
