<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"把作战重点放在锦州锦西方面是正确的","alias":"","parts":[{"type":"paragraph","text":"把作战重点放在锦州锦西方面是正确的"},{"type":"paragraph","text":"（1948年10月4日）林、罗、刘，并告东北局："},{"type":"paragraph","text":"三日九时电悉。（一）你们决心攻锦州，甚好甚慰。"},{"type":"paragraph","text":"（二）你们决定以四纵和十一纵全部及热河两个独立师对付锦西、葫芦岛方面之敌，以一、二、三、七、八、九共六个纵队攻锦州，以五、六、十、十二共四个纵队对付沈阳援锦之敌，以九个独立师对付长春之敌，这是完全正确的。你们这样做，方才算是把作战重点放在锦州、锦西方面，纠正了过去长时间内南北平分兵力没有重点的错误（回头打长春那更是绝大的错误想法，因为你们很快就放弃了此项想法，故在事实上未生影响）。我们过去一个月中曾有"},{"type":"paragraph","text":"[1]林、罗、刘，指林彪、罗荣桓、刘亚楼，当时分别任东北野战军司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[2]指林彪、罗荣桓、刘亚楼1948年10月3日9时给中共中央军委的电报。电报说：“我们拟仍攻锦州。只要我军经过充分准备，然后发起总攻，仍有歼灭锦敌的可能，至少能歼灭敌之一部或大部。目前如回头攻长春，则太费时间，即令不攻长春，该敌亦必自动突围，我能收复长春，并能歼敌一部。”电报还汇报了把作战重点放在锦州、锦西方向的具体兵力部署，并表示，尽早开始总攻，力求迅速解决战斗，战斗目的主要放在歼灭敌人上。"},{"type":"paragraph","text":"[3]热河，即热河省。多次电报叫你们如此做，你们到现在才想通这一重要点，不是平分兵力，而是以主力放在两锦方面。虽然在时间上应当一开始就如此做，从你们部队开始行动起到今天差不多已有一个月之久，你们才把攻击重点问题弄清楚，重新增加两个纵队到两锦方面去，可能对于作战要受一些影响（是否有影响及影响之大小，要看作战结果如何才能定），但是平分兵力的错误算是纠正了。从这件事你们应取得两个教训：第一个教训是，你们的指挥所应先于部队移动到达所欲攻击的方向去（这一点我们在很早就向你们指出了），由于你们没有这样做，致使你们的眼光长期受到限制；第二个教训是，在通常的情况下必须集中主力攻击一点，而不要平分兵力。"},{"type":"paragraph","text":"（三）攻击锦州的时间愈快愈好，但因你们兵力尚未到齐，你们指挥所方才接近锦州附近，部队的攻城动员准备工作尚未进行，当然应当稍待时日，等候兵力到齐和完成准备工作，然后开始攻击。但是你们应当力求缩短这一准备过程，不要延迟太久，当然决不要有任何的慌忙。"},{"type":"paragraph","text":"（四）关于不应当回头攻长春的理由，不是如你们所说的“太费时间”以及“即令不攻长春，该敌亦必自动突围，我能收复长春，并能歼敌一部”，而是如我们昨日十七时及十九时两电\"所说的那些理由，即你们如果真的回头攻长春，你们将要犯一个大错误。就拿突围一点来说，自前该敌突围愈迟愈有利，不突围更有利。"},{"type":"paragraph","text":"（五）在此以前我们和你们之间的一切不同意见，现在都没有了，希望你们按照你们三日九时电的部署，大胆放手和坚持地实施，争取首先攻克锦州，然后再攻锦西。"},{"type":"paragraph","text":"[1]指毛泽东1948年10月3日17时和19时为中共中央军委起草的给林彪、罗荣桓、刘亚楼的两封电报。"},{"type":"paragraph","text":"（六）蒋介石已到沈阳，不过是替丧失信心的部下打气。他讲些做些什么，你们完全不要理他，坚决按照你们三日九时电部署做去。"},{"type":"paragraph","text":"军委四日六时"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":522,"page_end":524},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2463e9130a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
