art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中共中央设宴欢送日共代表团刘少奇 周恩来 朱德等同志出席宴会 日共代表团离京去我国南方访问","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社十日讯 中共中央九日晚上举行宴会，欢送日本共产党中央政治局委员、中央书记处书记袴田里见和由他率领的日本共产党代表团。"},{"type":"paragraph","text":"中共中央副主席刘少奇、周恩来、朱德等出席了宴会。"},{"type":"paragraph","text":"出席宴会的日本共产党代表团团员有：日共中央政治局委员松岛治重，中央书记处书记米原昶，中央委员西泽富夫。"},{"type":"paragraph","text":"在充满兄弟情谊的宴会上，刘少奇同志和袴田里见同志先后祝酒，宾主为马克思列宁主义在全世界的胜利而干杯。"},{"type":"paragraph","text":"出席宴会作陪的，有中共中央政治局候补委员陆定一、薄一波，中央书记处候补书记杨尚昆，中央委员邓颖超、廖承志、林枫、刘宁一、伍修权，中央候补委员赵毅敏，以及各有关方面负责人。"},{"type":"paragraph","text":"据新华社十日讯 日本共产党中央政治局委员、中央书记处书记袴田里见和由他率领的日本共产党代表团，由中共中央候补委员赵毅敏等陪同，今天上午乘专机离开北京，前往我国南方访问。"},{"type":"paragraph","text":"中共中央副主席周恩来，中央书记处候补书记杨尚昆，以及首都各界群众两千多人到机场欢送。"},{"type":"paragraph","text":"袴田里见同志和日共代表团团员米原昶、西泽富夫同志，同欢送群众告别时，人们挥舞红旗、彩带和花束，高呼“马克思列宁主义万岁！”“国际共产主义运动团结万岁！”“中日两国人民友好万岁！”“全世界无产者联合起来！”少先队员向日共代表团的同志献了鲜花。"},{"type":"paragraph","text":"日共代表团团员松岛治重暂留北京休养，今天也到机场送行。"},{"type":"paragraph","text":"图 日共代表团离京去我国南方访问。图为袴田里见同志等由周恩来同志等陪同步入机场。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"赵毅敏","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aafaf9eade"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
