script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要有自知之明　严于解剖自己中共崇明县委领导成员在批修整风中联系实际反骄破满，决心更好地带领群众沿着毛主席的革命路线胜利前进","authors":[],"dates":[{"year":1972,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　中共崇明县委在批修整风运动中，联系实际，反骄破满，认真开展批评和自我批评，使县委一班人努力做到有自知之明，更好地带领群众沿着毛主席的革命路线胜利前进。"},{"type":"paragraph","text":"去年，中共崇明县委带领干部和群众，以路线为纲，开展农业学大寨群众运动，取得了显著的成绩。报纸和电台都作过宣传报道，兄弟县也纷纷来取经。在一片赞扬声中，县委有的领导成员沾沾自喜，缺少一分为二的思想，对粮食总产量高的一面看得多，对单产不怎么高的一面看得少，增了产自以为了不得。由于滋长了骄傲自满思想，放松了农村两条道路斗争，所以，今年有些单位出现了自由种植的现象，夏熟作物的种植面积没有全部落实，致使全县夏粮产量下降。贫下中农批评县委领导说:思想骄，工作松，作风飘，这样下去要跌大跤。县委针对这件事，在“三夏”战斗结束后，及时召开了县委扩大会议，认真总结正反两方面的经验教训，使大家进一步懂得了，一个革命者，要保持谦虚谨慎、不骄不躁的优良作风，很重要的一条，就是要有自知之明，对于自己，对于自己的工作应该坚持二分法，既要看到成绩的一面，更要看到缺点、不足的一面。如果在成绩面前，缺乏自知之明，陷入盲目性，就不能取得领导斗争的主动权，就是落后的开始。"},{"type":"paragraph","text":"在扩大会上，县委许多成员还联系自己的工作，认真学习毛主席的《放下包袱，开动机器》、《整顿党的作风》等著作和关于批修整风的一系列指示，反复学习毛主席所指出的我党历史上由于几次骄傲而使革命遭到损失和失败的经验教训，从理论和实践的结合上进一步体会到，自知之明，就是要一分为二，要实事求是，一切从实际出发，按科学态度办事。去年，这个县有些单位在玉米地上搞育秧试验，有成功的，也有失败的。县委没有认真总结经验，就把局部成功的东西错误地当作全部成功的经验，加以全面推广，提出一部分后作稻的秧苗在玉米地上培育。后经上级领导指出，才没有这样做。这件事使许多县委领导成员感慨尤深，他们说，由于骄傲自满，就心血来潮，忘乎所以了，因而产生了唯心的工作指导。这个教训一定要记取。他们联系刘少奇一类骗子搞唯心论的先验论，反对唯物论的反映论的反革命罪行，总结自己在两条路线斗争中的经验教训，进一步认识到，继续保持和发扬党的谦虚谨慎、不骄不躁的优良作风，是贯彻执行毛主席无产阶级革命路线和政策的重要保证。"},{"type":"paragraph","text":"这次县委扩大会，把加强党的思想作风建设，作为批修整风的一个重要内容，发动各级干部和群众向县委提意见。在这个基础上，县委成员坚持用一分为二的方法解剖自己，主动地讲自己的弱点、缺点和错误。一位县委常委在小组会上认真检查了自己骄傲自满的思想，说:去年产量高，心里乐陶陶，说话声音高。过去开会坐在后头，现在开会坐在前头，神气十足。正是这种资产阶级思想作怪，阻碍了自己继续革命。县委书记和其他常委同志都分别在小组或大会上主动进行自我批评，无情面地解剖自己，使参加会议的基层干部深受教育。通过这次会议，县委成员的精神面貌和思想作风起了很大变化。他们纷纷深入基层，进行调查研究，决心谦虚谨慎，戒骄戒躁，同广大干部、群众一起艰苦奋斗，努力把农业生产搞上去。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3153cc4d3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
