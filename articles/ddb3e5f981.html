script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"痛击右倾翻案风　促进春季爱国卫生运动杨浦区许多单位纷纷行动起来　消灭越冬和早春蚊蝇","authors":[],"dates":[{"year":1976,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　杨浦区除害灭病办公室最近邀请基层单位的部分干部和群众，召开大型座谈会，畅谈除害灭病战线“旧貌变新颜”的大好形势，痛击右倾翻案风，有力地推动了当前春季爱国卫生运动的开展。"},{"type":"paragraph","text":"刮右倾翻案风的人大肆诬蔑我国社会主义革命和社会主义建设的大好形势，散布了一系列“今不如昔”的谬论。参加座谈会的同志怀着无产阶级的革命义愤，联系除害灭病工作实际，摆事实，讲道理，狠批这一反动谬论。"},{"type":"paragraph","text":"革命大批判进一步推动了除害灭病工作。许多单位的干部和群众积极开展春季爱国卫生运动，以实际行动回击右倾翻案风。上海酿造一厂连续两次开展了春季爱国卫生突击活动，挖阴井、填洼地、除杂草，使全厂卫生面貌有了进一步改善。为了重点抓好消灭早春蚊蝇，各车间工人群众，对蚊蝇栖息的重点场所进行了围歼，并把二十多只捕蝇笼和三十余只诱蚊缸，布放在全厂各个角落，消灭露头蚊蝇。杨浦区清洁管理站广大清洁工人，冒春寒，战风雨，多次开展突击活动，清除马路积土七百四十多吨，挖掘长期阻塞的坑池一百四十多只，并洗刷马路陈旧标语，不仅改善了市容，同时增积到优质肥料五万多担。"},{"type":"paragraph","text":"定海街道党委切实加强了对春季爱国卫生运动的领导，他们坚持每周四组织干部、群众扑打残存的蚊蝇和处理积水洼地，并组织专业队伍，对蚊子的栖息场所作重点处理。最近，他们还组织了三百多名机关、里弄干部和卫生联防人员，分成三十多个战斗队，深入到复兴岛地区和里弄，边检查边宣传，并开展挖蝇蛹活动，取得了较大的战果。上海自行车三厂食堂职工在党组织的领导下，发扬“世上无难事，只要肯登攀”的革命精神，克服人手少、任务重的困难，利用业余时间，攀高墙，除污垢，刷墙壁，还因陋就简搞防尘防蝇设施，改进消毒设备。控江街道党委在春季爱国卫生运动中，充分发挥卫生联防组的积极作用。最近，他们组织十个卫生联防组的一百多名卫生联防人员，对五百多处重点蚊蝇栖息场所进行了搜索、处理，取得了很大成绩。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddb3e5f981"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
