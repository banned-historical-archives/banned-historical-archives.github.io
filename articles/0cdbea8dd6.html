:[],"dates":[{"year":1955,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　根据上海学术文化界胡适思想批判讨论会的总的计划和指示，上海市教育局于昨天下午召集了全市各中等学校、各区文教科干部和部分小学的教职员代表举行了关于学习社会主义教育思想，批判资产阶级唯心主义教育思想的动员大会。会上由上海市副市长刘季平作了关于“学习社会主义教育思想，批判资产阶级唯心主义教育思想”的报告。"},{"type":"paragraph","text":"刘副市长在报告中指出，教育工作中的资产阶级唯心主义教育思想是阻碍全面发展教育的贯彻和教育质量的提高，形成教育工作与祖国目前社会主义建设的需要脱节的最主要原因。只有逐步地清除了这种资产阶级反动的教育思想的影响，才能进一步提高教师的社会主义觉悟，增强教师之间的团结，使教育工作能更好地为社会主义建设服务。"},{"type":"paragraph","text":"到会的各校教职员代表准备把刘副市长的报告及时地向本校教职员进行传达。很多学校的教职员对自己的工作和学习也都作了安排，准备迎接这一次学习。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cdbea8dd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
