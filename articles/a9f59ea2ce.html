art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席对济南战役的一个批示","authors":["王明清"],"parts":[{"type":"paragraph","text":"济南战役中，人民解放军所表现出的英勇顽强、不怕牺牲的战斗精神，是惊天地、泣鬼神的。"},{"type":"paragraph","text":"1948年9月24日21时，济南战役全部胜利结束。在缴获的敌人档案材料中，有一份对我九纵七十三团突击队一位受伤被俘的班长的审问记录。审问记录这样写道："},{"type":"paragraph","text":"问：你来干什么？"},{"type":"paragraph","text":"答：毛主席命令我来打济南。"},{"type":"paragraph","text":"问：你有把握吗？"},{"type":"paragraph","text":"答：完全有把握、有信心。"},{"type":"paragraph","text":"问：你已被俘了，怎么办？"},{"type":"paragraph","text":"答：我们的人多得很。"},{"type":"paragraph","text":"……"},{"type":"paragraph","text":"这位班长最后被反动派枪杀了，连个姓名都没留下来。济南战役中，九纵伤亡近万人，其中有名有姓有登记的烈士只有1365人，大多数英烈都没有留下姓名。但他们却都是响当当的英雄。兵团谭震林政委把这一情形和十三纵一○九团百余名伤员为了不失突破时机，坚决不下火线，让后续部队踩着自己受伤的身体往上冲而全部英勇牺牲的事迹，报告给毛主席。毛主席看后，为战士有这样的气节和觉悟而深为感动，亲自复电批示：报告中所提"},{"type":"paragraph","text":"的济南战役中一些自我牺牲，以求人"},{"type":"paragraph","text":"民解放的英勇感人战绩，应告新华社"},{"type":"paragraph","text":"记者及政治部人员，将它写成通讯或"},{"type":"paragraph","text":"文章，说明人民军队的力量及其因军"},{"type":"paragraph","text":"队民主造成的高度觉悟和自我牺牲的"},{"type":"paragraph","text":"精神，是举国无敌的。"},{"type":"paragraph","text":"与此同时，中央军委于济南解放的当日，由毛主席亲自批准并签署命令，授予九纵七十三团“济南第一团”、十三纵一○九团“济南第二团”的光荣称号。这是建国前直接由中央军委授予一个团级单位的最高荣誉。"}],"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9f59ea2ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
