script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"设立炮兵司令部直属军委","alias":"","parts":[{"type":"paragraph","text":"设立炮兵司令部直属军委"},{"type":"paragraph","text":"（1941年2月7日）彭、左："},{"type":"paragraph","text":"关于炮兵问题，为保存与训练我们的炮兵，总部之炮兵团（前访又留一部），聂军区、贺师?之山炮兵，应集中延安附近训练，设立炮兵司令部直属军委。否则将来日寇封锁线加密，前方炮兵团有不能通过之可能。但在国共未全部破裂之前，我又才能打出法，大概今年是\"可能出去的，炮兵西开，华北又没有炮用。"},{"type":"paragraph","text":"毛朱王[1]这是毛泽东和朱德、中共中央军委副主席王稼祥给彭德怀和八路军参谋长左权的电报。[2]聂军区，指八路军晋察冀军区，司令员兼政治委员聂荣臻。[3]贺师，指八路军第一二○师，师长贺龙。[4]才，似为“不”字之误。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":2,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":419,"page_end":419},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aaad72b47c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
