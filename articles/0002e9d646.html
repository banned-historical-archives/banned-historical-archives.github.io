art":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"地雷：现代战场上的“土行孙”","authors":["刘文革/沈基飞"],"parts":[{"type":"paragraph","text":"地雷：现代战场上的“土行孙”"},{"type":"paragraph","text":"■刘文革沈基飞"},{"type":"paragraph","text":"在一般人的想象中，地雷是一个黑乎乎、一动也不能动的“笨蛋”，只能“守株待兔”。其实不然。今天，随着高新技术的广泛应用，现代地雷变得日益聪明。"},{"type":"paragraph","text":"“寻的”地雷——它能够主动识别、搜寻和攻击预定目标。当它被放置在固定地域后，其灵敏的警报系统便开始工作，一旦目标进入其“势力范围”，就会自动腾空而起，扑向目标。美军有一种名为“大黄蜂”的“寻的”地雷，专门用于攻击坦克装甲顶部。"},{"type":"paragraph","text":"智能反坦克地雷——是利用高容量计算机芯片和先进的电子部件制造而成。布设后，它们彼此之间可构成网络，相互传递信息并执行战斗行动。实际上，这种智能反坦克地雷已经打破了传统的雷与弹的界限，能够自动地对目标进行探测、识别、确认和攻击。"},{"type":"paragraph","text":"会跑的地雷——美军研制的智能引信地雷，具备一些类似人体的感知能力，可对目标的各种物理场进行判定。当坦克进入地雷控制的半径为100米地域的范围时，由微机控制发射智能弹药，在空中主动攻击目标。"},{"type":"paragraph","text":"会叫的地雷——俄军研制了一种会叫的CM信号雷。这种雷看上去像支铅笔，雷体上有一个噪音发生器和一个闪烁火焰装置。当绊线拉开引信后，地雷首先发出一种能持续8-10秒的汽笛叫声，然后发射出闪烁的火焰。这种雷设置在战场上，起战斗警戒作用。"},{"type":"paragraph","text":"反直升机地雷——这是一种奇怪的地雷，样子像八爪章鱼。别看它丑陋，却一身绝活。它可以腾空而起，专找敌方的“软肋”炸；可以通过预编程序，关闭雷场，让己方直升机顺利通过，防止误伤；也可以用钢丝吊挂在降落伞下，在空中飘浮，形成空中雷区。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0002e9d646"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
