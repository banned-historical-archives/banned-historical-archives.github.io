al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"湘潭教育促进会简章","alias":"","parts":[{"type":"paragraph","text":"湘潭教育促进会简章！"},{"type":"paragraph","text":"（1920年7月27日）第一条本会定名为湘潭教育促进会。第二条本会以促进湘潭教育为宗旨。第三条本会会址设议会后街第四号。第四条本会会务如左："},{"type":"paragraph","text":"一、对于教育行政之建议。二、对于县教育会组织之根本研究。三、对于全邑教育经费整理扩充及支配之研究。四、对于普及教育具体计划之研究。五、对于本县教育临时发生事项之研究。"},{"type":"paragraph","text":"[1]本文未署作者姓名。1920年7月26日湖南《大公报》刊登的《发起湘潭教育促进会》记载：7月25日，毛泽东与在省湘潭教育界人士开会，决定成立湘潭教育促进会，会议推出筹备员龙彝、吴毓珍、马文义、毛泽东4人，担任章程起草人。同年7月28日该报在刊登此简章时，在前面加有如下一段话：7月27日湘潭教育促进会开成立会时，“由起草员宣读章程”后，即“票举干事，总务吴毓珍，文牍毛泽东、龙彝，庶务朱矫，交际马文义、宋焕达、戴星炳、黄泽需，各干事就职”。此简章后收入1921年5月1日编印的《湘潭教育促进会会报》第一期，文字略有改动。"},{"type":"paragraph","text":"[2]此字原缺，1921年5月1日《湘潭教育促进会会报》第一期收编的该文此处为“四”。六、对于教育学理之研究及新文化之传播。"},{"type":"paragraph","text":"七、凡本会研究所得之结果，得编发会报或单行本。第五条凡赞成本会宗旨，能服务教育事业者，由会员二人之介"},{"type":"paragraph","text":"绍，得为本会会员。第六条凡会员违背本会宗旨或损害本会名誉者，由会员过半数之"},{"type":"paragraph","text":"出席，出席会员三分之二通过，取消其会员资格。第七条本会议事细则另订。第八条本会设干事八人。其职务如左："},{"type":"paragraph","text":"一、总务干事一人，执行一切会务。二、文渎干事二人，掌纪录及文书事项。三、庶务干事二（一）人，掌收支会计事项。四、交际干事四人，掌对外交际事项。五、编辑会报及他项印刷物时，由干事临时推定会员若干人为"},{"type":"paragraph","text":"编辑员。第九条本会会员每人纳入会金光洋一元。如会中刊发文报或须他"},{"type":"paragraph","text":"项特别费用时，干事会临时召集会员开会募集。第十条本简章有未尽事宜，经会员三分二之同意，得修正增减之。"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":7,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":235,"page_end":236},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a22a896d2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
