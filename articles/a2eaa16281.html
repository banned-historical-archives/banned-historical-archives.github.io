authors":["蒋志敏"],"dates":[{"year":1981,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"萧县县委正确对待犯错误干部"},{"type":"paragraph","text":"在“文革”中犯错误的干部大多数精神振奋、工作积极"},{"type":"paragraph","text":"本报讯　记者蒋志敏报道：中共安徽省萧县县委正确对待犯错误的干部，在帮助他们真正认识错误之后，积极鼓励和支持他们大胆工作。"},{"type":"paragraph","text":"萧县原是安徽省所谓“农业学大寨”的样板县。十年浩劫期间，由于受极“左”路线的影响，不少干部犯了错误。县委实事求是地分析了这些干部犯错误的原因，认为他们是在一个特定的历史条件下犯的，个人虽然要负很大的责任，但绝大多数还是好同志，应当做好思想转化工作，团结他们一道工作。对那些错误比较严重的干部，县委负责同志多次主动找他们谈心，帮助他们分析犯错误的原因，启发他们勇于同错误决裂，轻装上阵，继续为党工作。"},{"type":"paragraph","text":"在犯错误的干部真正认识错误以后，县委及时地安排了他们的工作。据统计，1978年以来，在124名犯错误的公社负责人以上干部中，除5名因严重违法乱纪受到刑事处分和14名原来是工人、农民、教师返回原岗位的以外，其余 105名都陆续安排了工作。其中，有55人安排了相当于“文革”前的领导职务，50人的职务作了调整，安排了一般工作。县委明确要求各级党组织，对他们的工作要积极支持，有了成绩同样予以表扬。"},{"type":"paragraph","text":"一位曾任过县财办副主任兼县粮食局局长的干部，在检查、认识了错误后，县委安排他担任了县农办副主任，分管多种经营工作。这个同志到任后，精神振奋，埋头苦干，经常深入基层调查研究，提出不少建议，为全县多种经营的发展作出了贡献。为此，县委多次对他进行表扬和鼓励。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"安徽文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2eaa16281"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
