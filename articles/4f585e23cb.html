"year":1946,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"渤海临参会"},{"type":"paragraph","text":"电毛主席祝贺“七一”"},{"type":"paragraph","text":"【新华社一日电】“七一”中共廿五周年诞生纪念日，山东渤海解放军临参会议长刘樵庭、副议长刘冠甲暨全体参议员，于昨日致电中共中央毛主席祝贺“七一”中共二十五周年诞生纪念日，电文略谓：二十五年之历史，证明贵党为我国忠诚地为人民服务之唯一大党，先生为我国人民之伟大领袖，我渤海区八百万人民，已从自己翻身经验中，找到了明确方向与最亲挚的朋友。而今国内法西斯分子在美帝国主义分子援助之下，企图挑起全国内战，继续封建独裁，奴役全国人民，我区八百万人民，誓与贵党及全国人民并肩携手，为建立独立、和平、民主、幸福的新中国奋斗到底！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f585e23cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
