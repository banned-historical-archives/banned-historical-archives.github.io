script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿干镇煤矿革委会遵照毛主席关于联系群众的教导  接受群众监督  为革命掌好权用好权","authors":[],"dates":[{"year":1969,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿干镇煤矿革委会遵照毛主席关于联系群众的教导"},{"type":"paragraph","text":"接受群众监督  为革命掌好权用好权"},{"type":"paragraph","text":"据新华社兰州十九日电　甘肃阿干镇煤矿各级革委会在解放军支左人员帮助下，遵照伟大领袖毛主席关于“国家机关的改革，最根本的一条，就是联系群众”的教导，密切联系群众，接受群众的监督，调动了群众的积极性，推动了革命、生产的发展。"},{"type":"paragraph","text":"阿干镇煤矿革委会成立后，在部分领导成员中产生了“政权到手，革命到头”的思想，一度出现讲排场，铺张浪费的现象。个别群众代表浮在上面多了，下井劳动少了，甚至有人想调换个轻松的工作。"},{"type":"paragraph","text":"驻矿解放军支左人员发现这些问题以后，立即组织革委会成员学习毛主席关于阶级斗争的一系列论述和光辉的“老三篇”。毛主席关于“务必使同志们继续地保持谦虚、谨慎、不骄、不躁的作风，务必使同志们继续地保持艰苦奋斗的作风”和“全心全意地为人民服务，一刻也不脱离群众”的教导，极大地教育了革委会成员。在这个基础上，解放军支左人员又组织他们进行忆苦思甜，参观阶级教育展览。许多同志回忆了自己在旧社会的阶级苦，谈了在新社会的幸福生活，大大地激发了对伟大领袖毛主席的无限热爱，提高了阶级斗争和两条路线斗争的觉悟。原来想要调个轻松工作的同志，也激动地说：“我一定要听毛主席的话，永远保持工人阶级的本色，密切联系群众，用毛泽东思想为革命掌好权、用好权。”"},{"type":"paragraph","text":"为了密切联系群众，把革委会置于群众监督之下，在解放军支左人员帮助下，革委会负责同志代表革委会在全矿工人大会上作了自我批评。这件事，在全矿震动很大。工人们反映说：“革委会有错就检查，这样的革委会我们信得过。”"},{"type":"paragraph","text":"为了进一步听取群众的意见，革委会还进行了开门整风。革委会成员到群众中去征求意见，又把工人代表请进革委会，反映工人的意见和要求。然后革委会把群众的意见作了归纳、分析，边整边改，立竿见影。这次开门整风，又一次教育了革委会成员。大家深深认识到，革委会和群众的关系只能是鱼和水的关系，鱼儿永远离不开水，革委会永远离不开群众。只有深深扎根于群众之中，才能不断巩固革委会。"},{"type":"paragraph","text":"认识提高后，各级革委会成员纷纷到工人中去，自觉地坚持参加集体生产劳动。矿和各井口革委会除留少数人主持日常工作外，大多数成员都深入基层，坚持跟班劳动。在机关主持工作的常委，每星期也至少劳动一天。在劳动中，革委会成员以身作则，勇于挑重担，那里有困难就到那里去，那里危险就出现在那里。"},{"type":"paragraph","text":"阿干镇煤矿各级革委会成员，由于扎根于群众之中，密切联系群众，因而使革委会有了坚实的群众基础。工人群众象爱护眼睛一样爱护革委会，支持革委会。他们随时向革委会反映革命和生产中的问题，使革委会能够及时地了解阶级斗争的新动向、新特点，及时地掌握基层的情况，及时提出有效措施。在工人群众的爱护、支持下，革委会越来越巩固，生产不断上升。全矿在去年提前五十四天超额完成原煤生产计划的基础上，今年上半年又提前十二天完成了原煤生产计划，原煤产量比去年同期提高了将近一倍，第三季度又提前十四天完成了生产计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af5f09bc99"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
