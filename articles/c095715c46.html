art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席最信任我们革命人民","authors":["陈明良"],"parts":[{"type":"paragraph","text":"毛主席会见首都革命群众的消息传来以后，一股幸福的暖流，顿时传遍我的全身。我对着毛主席的象激动地欢呼：“毛主席万岁！”我好象站在伟大领袖的身边，好象站在毛主席会见的革命群众的人山人海里。"},{"type":"paragraph","text":"毛主席历来教导我们：“人民，只有人民，才是创造世界历史的动力。”毛主席是我国各族人民的伟大领袖，和广大人民心连心。不久前，毛主席在横渡长江的时候，群众欢呼“毛主席万岁！”毛主席高呼“人民万岁！”这是多么真挚的亲密的感情啊！毛主席这样信任我们，这样关怀我们，我们怎能不感到幸福呢！"},{"type":"paragraph","text":"毛主席号召全国人民要关心国家大事，要把无产阶级文化大革命进行到底。毛主席的伟大号召，给了我国亿万人民巨大鼓舞，是我们正在进行的轰轰烈烈的无产阶级文化大革命的强大精神力量。我和全国人民一样，热烈地响应毛主席的伟大号召，关心国家大事，努力学习毛泽东思想，忠实贯彻毛泽东思想，热情宣传毛泽东思想，勇敢捍卫毛泽东思想。以毛泽东思想为武器，横扫一切牛鬼蛇神，把无产阶级文化大革命进行到底，不获全胜，决不收兵！RW：毛主席；会见群众"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c095715c46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
