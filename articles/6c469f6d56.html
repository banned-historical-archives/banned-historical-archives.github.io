r":1981,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"右倾顽症和左倾顽症"},{"type":"paragraph","text":"某单位学习中央工作会议文件，清理左倾思想时，一位负责同志说：我们有的老同志过去患了“右倾顽症”，现在又患了左倾顽症。"},{"type":"paragraph","text":"这话怎讲？原来在社会主义改造中，有些老同志并不右，只因为坚持了实事求是原则，就被视为“小脚女人”。二十多年来，一直批他们的右，批久了，听惯了，有的同志竟以为自己真的得了右倾顽症。其实，得“右倾顽症”是假，患“恐右病”是真。三中全会以后，党中央纠正“左”的错误，推行一系列符合实际情况、有利生产发展、受到群众欢迎的政策，有的同志却觉得“右”了、偏了，惶惶不可终日，甚至同中央精神唱反调。这不是患了左倾顽症是什么？"},{"type":"paragraph","text":"3月10日《人民日报》社论中有一段很重要的话：“二十多年来，‘左’的思想和错误影响了全党。由于经常在‘左’的指导思想下工作和生活，一般说来，我们每个同志尤其是领导干部，‘左’的东西只有多少之分，深浅之分，觉悟迟早之分，而没有有无之分。”当初正确地反“左”的，因反“左”而受批判的，后来也受到“左”的影响，甚至得了左倾顽症。这个事实，可以说是这段话的一条很好的注脚。  文哲"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c469f6d56"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
