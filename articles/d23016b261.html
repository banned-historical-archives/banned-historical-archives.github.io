<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在阶级斗争中活学活用毛主席最新指示  河北省玉田县革委会在解放军支左小组帮助下，深入到阶级斗争尖锐复杂的地方举办学习班，增强了革委会成员的阶级斗争观念","authors":[],"dates":[{"year":1968,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在阶级斗争中活学活用毛主席最新指示"},{"type":"paragraph","text":"河北省玉田县革委会在解放军支左小组帮助下，深入到阶级斗争尖锐复杂的地方举办学习班，增强了革委会成员的阶级斗争观念"},{"type":"paragraph","text":"本报讯　为了很好地落实毛主席关于“无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续”的最新指示，河北省玉田县革命委员会，在解放军支左小组的帮助下，到阶级斗争尖锐、复杂的地方开办毛泽东思想学习班，在斗争中学，在斗争中用，提高了革委会成员的阶级斗争和路线斗争觉悟，从而牢牢地把握住向阶级敌人进攻的主动权，进一步巩固和加强了无产阶级专政，使全县革命和生产出现了一派大好景象。"},{"type":"paragraph","text":"这个县的革命委员会成立以后，部分成员一度产生了“松劲”情绪，以为革命委员会有权威了，无政府主义思潮刹住了，一些暗藏的阶级敌人挖出来了，工作做得“差不离”了。上面的“弦”一松，基层单位对毛主席最新指示的落实，就出现了“夹生饭”的现象。针对这种情况，县革命委员会调查了部分公社、机关和学校的阶级斗争尖锐复杂的情况，受到很大教育。他们带着这些问题，召开了常委会，汇集情况，研究问题。大家认识到：在大好形势下，革委会一些成员滋长了“自满”情绪，松懈了战斗意志，是对毛主席关于阶级斗争的最新指示理解不深、执行不力的表现。因此，他们决定在阶级斗争尖锐、复杂的地方举办有县革委会成员以及基层革委会负责同志参加的毛泽东思想学习班，联系阶级斗争事实，学习毛主席关于阶级斗争的最新指示。"},{"type":"paragraph","text":"学习班所在的地方，是全县阶级斗争比较激烈复杂的一个大队。在毛主席关于阶级斗争的最新指示的光辉照耀下，这个大队的领导班子放手发动群众，大搞回忆对比的阶级教育，增强了贫下中农对伟大领袖毛主席无比深厚的阶级感情，激发大家对中国赫鲁晓夫及一小撮阶级敌人的刻骨仇恨。他们带着强烈的敌情观念向阶级敌人发动进攻，挖出了两个潜伏近二十年的国民党特务。学习班抓住这两个活靶子，和贫下中农一道进行批判斗争。贫下中农愤怒揭发控诉了这两个特务勾结没有改造好的地、富、反、坏、右分子，在幕后操纵群众组织不断挑起武斗，把矛头指向贫下中农，扭转斗争大方向的种种罪行。活生生的阶级斗争事实，大大增强了学习班成员的阶级斗争观念，激起他们的革命斗争意志。"},{"type":"paragraph","text":"学习班还请了几个先进单位的代表，介绍他们怎样落实毛主席的最新指示，稳、准、狠地打击一小撮阶级敌人的经验。县革命委员会的每一个成员，都受到了深刻的教育。有的成员深有体会地说：“阶级斗争尖锐的地方，是我们学习毛主席关于阶级斗争的教导的最好的课堂，基层革命干部和贫下中农是我们最好的老师，亲身实践得来的第一手材料最生动。革命委员会要想掌握带领全县革命人民向阶级敌人进攻的主动权，必须走出办公室指挥战斗！”参加学习班的领导干部一致认识到：这任务那任务，全面落实毛主席的最新指示是最根本的任务；抓这抓那，不抓阶级斗争就是瞎抓；千忙万忙，不深入第一线指挥战斗就忙不到点子上。"},{"type":"paragraph","text":"学习班刚结束，县革命委员会立即集中力量狠抓阶级斗争。除了留下三个委员值班以外，其他委员和一般工作人员组成毛泽东思想宣传队，深入下去宣传毛主席的最新指示，实行面对面领导，抓典型，带全局。他们深入一些阶级斗争比较复杂的村子，放手发动群众打“人民战争”。大安镇石河大队，领导班子刚建立，一小撮阶级敌人就在背后捣鬼，破坏革命大联合，恶毒攻击大队领导班子。宣传队进村以后，便帮助大队领导班子发动群众开展革命大批判，向阶级敌人猛烈进攻，使全大队的革命和生产出现了新气象。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d23016b261"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
