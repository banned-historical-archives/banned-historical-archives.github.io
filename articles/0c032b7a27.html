ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对《上海市税务机关征税中违反政策现象严重》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对《上海市税务机关征税中违反政策"},{"type":"paragraph","text":"现象严重》一文“的批语"},{"type":"paragraph","text":"（1953年3月21日）薄一波同志："},{"type":"paragraph","text":"上海税务局应加整顿，对严重违法乱纪分子应作适当处置，争取主动，免被资本家告发，陷于被动。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月廿一日"},{"type":"paragraph","text":"[1]这篇文章载于《人民日报》1953年3月18日编印的《党报通讯》第四期。文中说，上海市税务局自去年开展劳动竞赛以来，不断发生为“完成任务”、为“争取红旗”而预借货物税、营业税等严重违反政策的现象。商人们反映：“你们搞劳动竞赛是为了光荣，我们却要早付钱。”更严重的是有些税务局竟用侵犯人权的非法手段去强征税款。这种行为已引起商人极大不满，有的商人在市场上公开谩骂政府。"},{"type":"paragraph","text":"[2]薄一波，当时任政务院财政经济委员会副主任兼财政部部长。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":87,"page_end":87},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c032b7a27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
