ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"关于召集各协作区主任座谈会给邓小平的信","alias":"","parts":[{"type":"paragraph","text":"关于召集各协作区主任座谈会"},{"type":"paragraph","text":"给邓小平的信"},{"type":"paragraph","text":"（1958年5月29日）小平同志："},{"type":"paragraph","text":"本日有事商量，请通知柯、陶、王、张、林、欧、李七位协作区主任委员留一天，我想有些事和他们谈一谈，或者由常委召开会议，或者由我、你、彭真主持。明天酌定。昨天会议上气氛不大好，值得座谈一会儿。各省、市、自治区第一书记也以留一天为宜，待座谈会本日开后，明日再开一次政治局扩大会。以为如何？如以为可，请即执行。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月廿九日上午五时[1]邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[2]柯，指柯庆施，当时任华东经济协作区主任委员。陶，指陶铸，当时任华南经济协作区主任委员。王，指王任重，当时任华中经济协作区主任委员。张，指张德生，当时任西北经济协作区主任委员。林，指林铁，当时任华北经济协作区主任委员。欧，指欧阳钦，当时任东北经济协作区主任委员。李，指李井泉，当时任西南经济协作区主任委员。"},{"type":"paragraph","text":"[3]彭真，当时任中共中央书记处书记。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":5,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":388,"page_end":388},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f7ce5d8d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
