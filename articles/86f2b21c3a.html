ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"扫除文盲，发展农村文化教育事业*","alias":"","parts":[{"type":"paragraph","text":"扫除文盲，发展农村文化教育事业"},{"type":"paragraph","text":"（1956年）"},{"type":"paragraph","text":"从一九五六年开始，按照各地情况，分别在十二年内，基本上扫除青年和壮年中的文盲，普及小学教育。要求做到一般的社有小学和业余文化学校，一般的乡有农业中学，以便进一步提高农村基层干部和农民的文化水平。农村办学应当采取多种形式，除了国家办学以外，必须大力提倡群众集体办学。提倡勤工俭学。"},{"type":"paragraph","text":"随着农业生产的发展，合作社应当根据可能的条件，按照勤俭建国、勤俭办社、勤俭持家的原则，逐步改进和开展文化娱乐工作和体育活动。"}],"authors":["毛泽东"],"dates":[{"year":1956}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":210,"page_end":210},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86f2b21c3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
