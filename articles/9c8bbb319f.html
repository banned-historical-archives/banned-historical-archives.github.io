rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"听毛主席的话 接受工农群众的再教育","authors":["张淑君/陶金峰/王登铭/王佩昌/胡建萍"],"parts":[{"type":"paragraph","text":"向工农群众学习不要图表面，要学根本。脸晒黑了不等于思想炼红了，手上磨出了厚茧不等于就工农化了。重要的是通过向工农群众学习，不断在灵魂深处爆发革命，经过长期的甚至是痛苦的磨练，使自己的世界观来一个根本的转变。 ——沈阳部队某部军马场知识青年 胡建萍"},{"type":"paragraph","text":"接受工农兵的再教育，一要虚心，二要诚恳，三要认真。一句话，要放下知识分子的架子。因为，“这种架子是不好的，是有害的，是阻碍他们前进的”。有了这个架子，就不会有接受再教育的自觉要求，更不会有自我革命的强烈愿望。那样，将会一无所获，一事无成。 ——二七二○部队修理厂仪表员 王佩昌"},{"type":"paragraph","text":"取得一点成绩，得到同志们的称赞，只能看作是在和工农群众相结合的大道上迈出了第一步。不能因此沾沾自喜，自以为与工农群众结合得“差不多”了。要看到向工农群众学习，只有起点而没有终点；如果把第一步当成最后一步，就会脱离广大工农群众，就会倒退，甚至栽跟头。 ——一六七七部队文书 王登铭"},{"type":"paragraph","text":"实践使我体会到：思想上认识到的，不等于行动上就能做到。学与用的脱节，这往往是一些知识青年的弱点。所以，向工农群众学习，要端正学风，不能把向工农群众学习的决心停留在嘴上，要脚踏实地，联系实际，一步一个脚印向前进。 ——五七五一部队战士 陶金峰"},{"type":"paragraph","text":"要克服知识青年的脆弱性和动摇性，就必须投身到三大革命斗争实践中去，与工农群众同呼吸，共战斗，才能在艰苦的斗争环境中逐渐洗刷掉自己身上的政治灰尘，才能“把自己的思想感情来一个变化，来一番改造”。 ——四四一一部队司药 张淑君"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c8bbb319f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
