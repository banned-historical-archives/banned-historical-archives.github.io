院","宋家丁","杨振常","范宏贵"],"dates":[{"year":1957,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"是谁之过欤？","type":"title"},{"text":"中央民族学院宋家丁范宏贵杨振常","type":"authors"},{"text":"（宋家丁、范宏贵、杨振常：中央民族学院历史系民族学研究班学生,“蜜蜂社”成员）","type":"subtitle"},{"text":"人间憾事何其多　　妻病母悲家不和","type":"paragraph"},{"text":"只因有了官僚味    工作分配漏洞出","type":"paragraph"},{"text":"查语文系1956年毕业生工作分配拖时约一年之久，于分配工作之时，学校及语文系领导主观妄测，凭印象办事，遂致颇多之人，工作分配不适，作了官僚主义的牺牲品。","type":"paragraph"},{"text":"有傅良臣者，家有双亲、爱妻慈子，居于北京西郊，本着照顾干部，填凭(平)人间天河的原则，傅良臣是应留在北京的，但院系领导不察下情，忍心傅氏抛妻弃子远居云南，傅曾呈述理由，希望照顾，但院方藉口木已成舟，拒不更改，近闻傅妻神经失常，夫妻终日吵架，父母亦悲痛欲绝，请问领导，人皆有不忍之心，汝何独无之耶！过而能改，善莫大焉，汝何独不知也耶？","type":"paragraph"},{"text":"又查，去年语文系毕业生分配，党员悉留于北京，留于地方者，率皆政治不开展，业务学习不好之辈，似此宗派——官僚——主观——之工作方法，吾人甚恶焉！要求领导迅速改正。","type":"paragraph"},{"text":"傅——事要合理解决！","type":"paragraph"},{"text":"使用干部要才德并重！","type":"paragraph"},{"text":" 蜜蜂","type":"paragraph"}],"comments":[],"origin":"《关于“野草”、“蜜蜂”社反动小集团的材料》，中共中央民族学院整风办公室编，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ffbf295c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
