ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于谭震林、陈不显任职问题的批语和电报","alias":"","parts":[{"type":"paragraph","text":"对林业部关于一九五一年全国森林火灾情况报告的批语"},{"type":"paragraph","text":"（1952年3月4日）"},{"type":"paragraph","text":"应给吉林（松江）、黑龙江两省党政负责人以处分，不知是否已有处分？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日"},{"type":"paragraph","text":"[1]指中央人民政府林业部1952年2月22日关于1951年全国森林火灾情况给陈云并转周恩来的报告。报告中说，1951年上半年全国共发生森林火灾4270次，森林被害面积达3450万亩，损失木材677万立方米。森林被害面积相当于同期内造林面积的12倍。这些火灾以东北为最严重，主要是松江、黑龙江两省。东北所损失的木材占全国森林火灾损失木材数的99%以上。森林火灾绝大部分是由于群众烧荒引起，最主要的根源是由于某些领导干部孤立地强调春耕是“压倒一切的中心任务”，怕布置防火工作妨碍了春耕，怕不准群众烧荒完不成丰产任务，因而忽视了护林防火工作。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":4},{"year":1952,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":474,"page_end":474},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b6135d3d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
