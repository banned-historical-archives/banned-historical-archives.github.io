<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji6","name":"毛泽东全集第6卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"为开展香田运动","alias":"","parts":[{"type":"paragraph","text":"为开展查田运动"},{"type":"paragraph","text":"（1933年9月1日）"},{"type":"paragraph","text":"中央政府为了彻底消灭封建残余势力，特发布查田运动训令，并在今年六月间召集查田运动大会，号召广大群众起来，在所有农村中进行坚决的查田运动，几个月来，已经得到了极大的成绩。但是还有许多地方没有开展这个运动，有些地方或包庇地主富农，或侵犯中农利益，或不开群众大会作宣传，或不得群众同意就去没收，或不把没收的东西发给群众，或镇压反革命不坚决，这些都是极大的错误。中央政府为了赶快消灭封建残余，使中农贫农工人群众得到全部土地革命利益，特为布告各地政府及广大工农群众一体．明白，大家起来拥护中央政府的命令，在下列各条办法之下，进行坚决的阶级斗争，争取查田运动的完全胜利。"},{"type":"paragraph","text":"（一）各地政府及查田委员会，必须抓紧查田的领导，推动工会贫农团及一切群众团体切实进行查田运动。首先要向群众作普遍的宣传，使群众人人明白查田运动的意义，大家起来自己动手查田查阶级。"},{"type":"paragraph","text":"（二）查田不是分田，查阶级不是查中农贫农雇农阶级，因此不应该按家按亩插起牌子遍查，而是要发动一切革命群众，专门清查地主富农阶级。"},{"type":"paragraph","text":"（三）贫农团是查田运动的中心力量，应该大大发展贫农团，每个贫农都可不要介绍自己报名加入。农村工人都应加入贫农团，去领导查田斗争的发展。中农可以参加贫农团的会议旁听。"},{"type":"paragraph","text":"（四）中农的利益绝对不能侵犯，不能随便把中农当做富农，有些富裕中农分子，过去虽然有点小小剥削，同样不能当富农看待。所有中农群众都应该团结在贫农团的周围，向地主富农一致进攻。"},{"type":"paragraph","text":"（五）富农是自己劳动兼靠剥削为生，因此只能分坏田，不应该把富农当中农看待。但同时也不能把富农当地主看待，完全没收富农家产的办法是错误的。"},{"type":"paragraph","text":"（六）地主自己不劳动，或只有极小一点附带劳动，他们是封建剥削阶级，应该完全没收其土地财产。地主阶级的壮丁，应该编成劳役队，加以训练，使之参加国家的或当地的劳动工作。"},{"type":"paragraph","text":"（七）地主阶级的财物没收之后，除现款外，应该一概赶快发给本村的贫苦群众。没收的土地，除留出公共事业田之外，应赶快分给群众。"},{"type":"paragraph","text":"（八）混进苏维埃中的地主富农分子，贪污腐化，消极怠工，命令强迫，以及包庇地主富农的分子，工农群众应该在工农检察部领导之下，向着这些坏分子作斗争，错误轻的纠正错误，错误重的清洗出去，巩固苏维埃政权。"},{"type":"paragraph","text":"（九）一切参加反革命活动的分子，应该受到严厉的镇压，罪大的实行枪决。工农群众应该与苏维埃的保卫局及裁判部好好配合起来，彻底肃清反革命。"},{"type":"paragraph","text":"（十）查田运动的工作，应该与扩大红军，扩大赤卫军少先队，推销经济建设公债，发展合作社，发展农业工业生产，发展出口入口贸易，全部实行劳动法，发展列宁学校及识字运动，修理桥梁道路，进行苏维埃选举运动等项工作，切实配合起来，广大工农群众都应在当地苏维埃领导之下，齐心合力，进行各项必要的工作，以便迅速粉碎帝国主义国民党的五次“围剿”，争取革命在全中国的胜利。"},{"type":"paragraph","text":"主席毛泽东副主席项英张国焘一九三三年九月一日"},{"type":"paragraph","text":"聘刻想念毛主席水不忘挖拼人1933年9月，毛泽东带人为瑞金沙洲坝人民挖的水井。"}],"authors":["毛泽东"],"dates":[{"year":1933,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":421,"page_end":424},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4b399a3e2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
