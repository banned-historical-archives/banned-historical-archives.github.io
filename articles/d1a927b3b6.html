script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马罗山报告党章强调党的团结  指出必须反对修正主义、教条主义、宗派主义","authors":[],"dates":[{"year":1957,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马罗山报告党章强调党的团结"},{"type":"paragraph","text":"指出必须反对修正主义、教条主义、宗派主义"},{"type":"paragraph","text":"据新华社布达佩斯30日电　马罗山在6月27日开幕的匈牙利社会主义工人党全国代表会议上作了关于党章的报告。"},{"type":"paragraph","text":"马罗山首先指出，匈牙利社会主义工人党是匈牙利共产党和匈牙利劳动人民党革命事业的继承者，是匈牙利共产党成立以前工人运动传统的继承者，是由劳动人民党的成立而体现出来的工人团结的继承者。匈牙利社会主义工人党这一名称同样体现了匈牙利劳动人民党所建立起来的团结。党应该注意同现在尚未入党的前劳动人民党党员，包括前社会民主党同志们保持互相信任的关系。"},{"type":"paragraph","text":"马罗山说，中央委员会清楚地看到过去领导所犯的宗派主义和教条主义的错误及其后果，并且为纠正这些错误而斗争。但是中央委员会承认劳动人民党十二年工作的伟大成就，反对社会主义的敌人和诽谤者，保卫这些成就。"},{"type":"paragraph","text":"马罗山在谈到党的领导作用时指出，党的领导作用在很多地方被误解了和歪曲了，党的领导作用、政治思想上的领导需要通过在国家机关、经济和社会组织中工作的共产党员来实现这一正确的原则被忽视了，常常把党的领导限制在指示和发布命令上。这就损害了党的威信，削弱了群众对党的信任。"},{"type":"paragraph","text":"党章草案规定，社会主义工人党是工人阶级的先锋队，是劳动人民的党。它团结了匈牙利人民中最进步的力量，团结了工人阶级、劳动农民和知识分子中的最优秀人物。我们的党员不会像劳动人民党那样多，但是阶级性更显著，更团结。"},{"type":"paragraph","text":"马罗山谈到党的团结和巩固的重要性。他说，党只有在思想、政治和组织上团结一致，党才能进行胜利的斗争。但是，这种团结决不是无原则的。我们曾经因为让修正主义者在党内为反革命打下基础而付出了很大的代价。十月事件要求每个党员不仅要提高警惕性，并且要积极投入揭露敌人的斗争。"},{"type":"paragraph","text":"党章草案说，党只有在坚决反对一切偏向的斗争和保卫党的团结中，才能完成自己的任务。党必需反对修正主义、教条主义、宗派主义。党内不容许任何派别活动。党内团结的一个最重要的环节是党的领导的团结。"},{"type":"paragraph","text":"接着，他谈到领导者的义务。他说，党的团结的问题与实现民主集中制原则是密切相关的。对民主集中制进行修正主义的解释是最坏不过的，因为它破坏无产阶级的自觉纪律，破坏中央领导机构和党的决议的威信。民主集中制是党的组织原则。目前在保卫民主的同时，必需加强集中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1a927b3b6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
