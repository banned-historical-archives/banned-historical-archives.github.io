rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"火车开进侗家寨","authors":["杨军（侗族）〖HH/换行〗DW：五一一七六部队"],"parts":[{"type":"paragraph","text":"我的家乡，地处湖南西部。这里山高路陡，谷深岭多。解放前，人们无论干啥，全得肩挑背驮，翻山爬坡。人民多么渴望改变交通面貌啊！然而，这在解放前，只能是梦想。解放了，红日照侗乡。随着工农业生产的发展，交通状况也相应得到改善。一九六○年，政府决定在我们那里修建铁路，家乡人民无不欢欣鼓舞，广大贫下中农纷纷汇集到施工战场。可是开工不久，叛徒、内奸、工贼刘少奇跳出来，以种种借口进行阻挠和破坏。热气腾腾的铁路工程被迫下了马，人们只好把这口气咽在肚子里。"},{"type":"paragraph","text":"轰轰烈烈的无产阶级文化大革命摧毁了刘少奇的修正主义路线。伟大领袖毛主席十分关怀山区各族人民的社会主义革命和建设。一九七○年，被迫下马的湘黔铁路又要开工了。消息传开，山区沸腾起来。各族人民把最优秀的儿女送到了工地。我们村一位七十多岁的贫农张大爷，苦战一个多月，编织了六百多双草鞋送到工地，勉励民工们大干苦干，早日修通“北京路”。"},{"type":"paragraph","text":"在党和毛主席的亲切关怀下，家乡人民团结一心，艰苦奋斗，仅花一年多时间，就把铁路建成了。通车那一天，当从毛主席身边开来的列车徐徐驶进车站时，万代受苦的山里人激动得热泪盈眶，兴奋地跟着火车奔跑。“文化大革命万岁！”“毛主席万岁！万万岁！”的欢呼声震荡山谷，经久不息。邓小平睁眼说瞎话，恶毒地攻击无产阶级文化大革命，只能被时代的列车碾得粉碎！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c28dd7fe0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
