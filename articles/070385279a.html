art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是我们的命根子","authors":["人民日报"],"parts":[{"type":"paragraph","text":"党的八届十一中全会公报发表的当天晚上，首都全城一片欢腾，锣鼓喧天。革命群众队伍，象洪流一样涌向党中央群众接待站，送喜报，表决心，坚决拥护党和毛主席向全国人民发出的伟大号召。"},{"type":"paragraph","text":"八月十日晚，毛主席在党中央所在地的接待站，会见了首都革命群众。北京朝花制鞋厂的老工人邸长宝（中）见到了我们伟大的领袖毛主席。他回厂后怀着无限兴奋的心情向全厂职工报喜，给工人同志以极大鼓舞。大家一致表示，一定按照毛主席的指示，关心国家大事，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"北京钢厂炼钢车间工人，欢欣鼓舞，纷纷写大字报，表示最热烈、最坚决地拥护党的八届十一中全会公报。"},{"type":"paragraph","text":"北京郊区人民公社的社员们，满怀无限喜悦的心情，向毛主席和党中央送来喜报，表示坚决为实现党的八届十一中全会公报提出的战斗任务而奋斗。"},{"type":"paragraph","text":"八月十四日，新出版的《毛泽东选集》在首都新华书店各门市部发行了。广大革命群众和解放军干部战士买到毛主席著作后，情不自禁地当场就学习起来。"},{"type":"paragraph","text":"八月十三日晚上，福建前线炮兵某部指战员，在阵地上收听了党的八届十一中全会公报的广播后，群情沸腾，热烈欢呼：“中国共产党万岁！”“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"中共中央关于无产阶级文化大革命的决定公布后，首都广大革命师生，络绎不绝地来到中共中央接待站，向毛主席和党中央送喜报和决心书。"},{"type":"paragraph","text":"首都大专学校十二万名革命师生买到了《毛泽东选集》。这是中央民族学院各族革命师生买到《毛泽东选集》后，如获至宝，欣喜若狂，一次又一次地振臂高呼：“战无不胜的毛泽东思想万岁！”"},{"type":"paragraph","text":"本版照片为新华社记者、人民日报记者、本报记者摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"070385279a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
