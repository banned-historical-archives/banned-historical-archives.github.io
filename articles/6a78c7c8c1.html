dates":[{"year":1983,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英委员长致五届人大常委会26次会议的信亲爱的同志们："},{"type":"paragraph","text":"我担任第五届全国人民代表大会常务委员会委员长已经五年了，任期将满。第六届全国人民代表大会即将召开。为社会主义事业奋斗到底，这是我的夙愿，但毕竟年迈多病，力不从心。值此换届之际，请求这次常委会会议考虑我的实际情况，在六届人大选举中，向各选举单位建议，不再提名选我为全国人民代表大会代表，当然六届人大也就不再将我列为人大常委会委员长候选人。我诚恳地希望这个请求能够得到批准。"},{"type":"paragraph","text":"我们社会主义祖国的形势越来越好，政治安定，经济繁荣，文化进一步发展，外交取得很大成就，又有成千上万的中青年优秀干部被选拔到各级领导岗位上。在和人大常委会的同事们行将告别之际，我内心极感欣慰。"},{"type":"paragraph","text":"在去年召开的五届全国人大五次会议上，制定了一部能保障和促进我国社会主义现代化建设的新宪法。古代人们曾把法律铸在铜器上，以昭信守，以垂久远。我们应当继续深入宣传新宪法，使它铭刻在每个人的心上，成为人民群众手中捍卫社会主义制度和人民民主的有力武器，使新宪法得到彻底实施。这是我衷心的祝愿！"},{"type":"paragraph","text":"叶剑英"},{"type":"paragraph","text":"一九八三年二月二十五日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a78c7c8c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
