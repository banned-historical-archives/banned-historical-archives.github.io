","崔德甫"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"武士“道”万岁","type":"title"},{"text":"北京大学崔德甫","type":"authors"},{"text":"（崔德甫：北京大学中文系学生）","type":"subtitle"},{"text":"我的同班同学们!","type":"appellation"},{"text":"你们的大作我已拜读了，“君们”显然比我更健忘，路翎的戏剧不让排演，鲁黎的诗集不给出版，因为他们是“他们”！请问“君们”，这不是排斥异已是什么？这不是闹大大的小宗派是什么？郭副总理他今天可以称“胡风兄”明天可以因称他为“文坛皇帝”(其实他是当之无愧的！够崇拜了吧，“君们”？)而破口大骂，这本无足怪，乃文坛之常情也。遗憾的是，“君们”这条“道”还没有联络得好：自封为王的“君们”尴尬面孔尚未收敛，“君们”却又“忘了”！“千把锁也锁不住”，对极，谁说“君们”没有自知之明，“质问我们亲爱的主席”诚惶诚恐，我的个人崇拜尚未训练到家，“君们”能教我以“道”么？正统是不能碰的，那么：“噫嘻，武士‘道’万岁！”(崔德甫)","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fead5af4a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
