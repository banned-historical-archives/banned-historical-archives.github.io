authors":[],"dates":[{"year":1969,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以只争朝夕的革命精神印制发行革命宝书"},{"type":"paragraph","text":"新疆两年多来发行毛主席著作三千六百万册"},{"type":"paragraph","text":"据新华社乌鲁木齐电　新疆维吾尔自治区出版、印刷、发行战线上的革命工人，怀着对伟大领袖毛主席无限热爱的深厚无产阶级感情，以“只争朝夕”的革命精神，大量印制、发行毛主席著作和毛主席的光辉画像，向“九大”献礼。"},{"type":"paragraph","text":"两年多来，新疆全区发行的毛主席著作有三千六百万册，超过了无产阶级文化大革命前发行总和的四十多倍。毛主席著作的大量印制、发行，有力地促进了各族革命人民活学活用毛泽东思想群众运动的蓬勃发展，使战无不胜的毛泽东思想在新疆得到了大传播、大普及。"},{"type":"paragraph","text":"伟大领袖毛主席的亲密战友林副主席指出：“永远高举毛泽东思想伟大红旗，用毛泽东思想武装全国人民的头脑，坚持在一切工作中用毛泽东思想挂帅，是我党政治思想工作最根本的任务。”新疆印刷、发行战线上的各族革命工人，把印制毛主席著作，传播毛泽东思想看作是最大的幸福、最光荣的任务。他们克服了许多技术上的困难，以最快的速度、最好的质量，大量印制毛主席的革命宝书。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cfd52cb30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
