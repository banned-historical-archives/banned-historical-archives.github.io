明霞"],"dates":[{"year":1966,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级的“教授治校”"},{"type":"paragraph","text":"反党分子匡亚明有“四个第一”：科学研究成果第一；“学者”“权威”第一；学习成绩第一；物质条件第一。这“四个第一”，反映了他的修正主义思想。"},{"type":"paragraph","text":"匡亚明这个资产阶级代表人物，一进南京大学，第一件大事就是登门拜访资产阶级教授、学者，急于了解他们有没有“充分发挥作用”。几天以后，他第一次在全校大会上，就说什么在南大这样现代的大学中，竟还有草房课堂，条件实在太差，提出了一个庞大的基本建设计划。"},{"type":"paragraph","text":"匡亚明说，衡量一个高等学校的好坏，就看这个学校有没有一个高水平的学报，有没有许多出名的“学者”、“权威”，有没有又新又尖的科学研究成果。他为了提高学报水平，为了多出“科学研究成果”，大大提高学报的稿费标准。他强调科学研究任务重，竟说专业科学研究人员平时可以不参加体力劳动，可以不参加城乡社会主义教育运动，甚至可以不参加政治学习。他极力吹捧资产阶级“学者”、“权威”，千方百计地扩大学报委员会的权力。这实质上是反对党在学校中的领导作用，是资产阶级的“教授治校”的翻版。"},{"type":"paragraph","text":"他在学生中大力培养修正主义的接班人，对那些“高分”学生（入学考试成绩平均九十分以上，不问政治条件）特别关心。一九六三年，学生刚进大学校门，他就召开了“高分”学生座谈会，号召他们个人奋斗，用功苦读，成名成家，并恶毒地歪曲党的重在表现的阶级政策。一九六五年底，他又再次召集“高分”学生座谈，进一步灌输修正主义思想。"},{"type":"paragraph","text":"毛主席教导我们：“不破不立，不塞不流，不止不行”。一切革命的同志们，让我们高举毛泽东思想伟大红旗，在无产阶级文化大革命中，彻底揭露批判反党反社会主义分子匡亚明所执行的反毛泽东思想的修正主义教育路线，彻底清算匡亚明的“四个第一”及其流毒。让我们欢呼真正的社会主义的新南京大学的诞生。无产阶级文化大革命万岁！"},{"type":"paragraph","text":"数学系　陆文钊　周树棠　高玉寰　孙慧澄　李明霞"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d4ad331cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
