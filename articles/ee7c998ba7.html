ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"给胡乔木的信","alias":"","parts":[{"type":"paragraph","text":"给胡乔木\"的信"},{"type":"paragraph","text":"（1943年12月20日）乔木："},{"type":"paragraph","text":"请你就延安能找到的唯物史观社会发展史，不论是翻译的，写作的，搜集若干种给我。听说有个什么苏联作家写了一本猴子变人的小说？，我曾看过的一本赖也夫的社会学3，张伯简也翻过（或是他写的）一本《社会进化简史》，诸如此类，均请收集。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十日[1]胡乔木（1912—1992)，江苏盐城人，当时任毛泽东的秘书。"},{"type":"paragraph","text":"[2]指苏联科普文学作家伊林和他的夫人谢加尔合著的《人怎样变成巨人》一书。"},{"type":"paragraph","text":"[3]指赖也夫斯基著、陆一远翻译的《唯物的社会学》一书，1929年8月上海新宇宙书店出版。"},{"type":"paragraph","text":"[4]张伯简（1898一1926)，云南剑川人，中国共产党早期党员，曾编纂《社会进化简史》（1925年11月出版，国光书店发行）一书。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":12,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":273,"page_end":273},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee7c998ba7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
