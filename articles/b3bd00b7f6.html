作者认真学习《红旗》杂志《评斯坦尼斯拉夫斯基“体系”》文章，决心把大学习和大批判紧密结合起来，继续打一场思想领域里的进攻战，彻底肃清反革命修正主义余毒","authors":[],"dates":[{"year":1969,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《红旗》杂志第六期、第七期合刊发表了《评斯坦尼斯拉夫斯基“体系”》的文章以后，本市广大革命工人、革命干部和革命的文艺工作者都认真地进行了学习和座谈。一致认为，这是思想文化领域里射向资产阶级顽固堡垒的一发重型炮弹，大长了无产阶级的志气，大灭了资产阶级的威风，真是大快人心!"},{"type":"paragraph","text":"上海火柴厂、上海自行车厂、上海搪瓷六厂的革命工人学习了这篇革命大批判文章，他们遵照毛主席关于“要批判资产阶级”的教导，深深地感到，批判斯坦尼这不仅是文艺界的事情，革命工人也应关心，也要投入战斗，他们表示，一定要高举毛泽东思想伟大红旗，奋起革命大批判的铁扫帚，把斯坦尼“体系”扫进历史的垃圾堆。不少同志学习了这篇革命大批判的文章，进一步激发了自己的阶级责任感，表示要牢牢掌握笔杆子，坚持开展革命大批判，把笔杆子当作投向阶级敌人的匕首，当作狠批资产阶级的锐利武器。"},{"type":"paragraph","text":"不少工人同志愤怒地驳斥斯坦尼所宣扬的所谓“从自我出发”的谬论。沪东造船厂的一位老师傅指出:斯坦尼胡说什么“演员不论演什么角色，他总应该从自我出发”等等，完全是彻头彻尾的资产阶级谬论。七○二九厂、上海重型机床厂的工人老师傅都说，批判斯坦尼的文章就是好，斯坦尼戏剧“体系”是货真价实的资产阶级文艺黑货，我们一定要把它彻底批倒批臭，决不能让它的阴魂重新占领我们的文艺舞台。"},{"type":"paragraph","text":"昨天，当《红旗》杂志发表的《评斯坦尼斯拉夫斯基“体系”》的文章在报上转载以后，驻文化系统工宣队团部，趁革命大批判的排炮齐鸣的大好形势，立即召集了所属各单位的工宣队、军宣队、革委会负责人和革命群众代表会议进行了动员，要求结合当前阶级斗争的新动向和已出现的各种资产阶级的反动思潮，开展对于斯坦尼和孔子幽灵的革命大批判。不少同志回到本单位之后，立即雷厉风行地组织和发动群众，讨论学习计划，研究作战方案，成立批判小组。他们决心把大学习和大批判紧密地结合起来，继续打一场思想领域里的进攻战。广大革命的文艺工作者学习了这篇批判斯坦尼的文章，都受到深刻的教育。一些中毒较深的文艺工作者，也表示要认真学习毛主席的革命文艺理论，努力改造世界观，彻底肃清斯坦尼戏剧“体系”的反革命修正主义余毒。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3bd00b7f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
