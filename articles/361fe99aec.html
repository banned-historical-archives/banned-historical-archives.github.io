":["中国人民大学","孙国梅","朱华荣","郭振淮"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——诬蔑镇压反革命运动","type":"title"},{"text":"中国人民大学朱华荣孙国梅郭振淮","type":"authors"},{"text":"“镇反杀反革命77万多人，太多了，过去历代王朝都没有一下子杀这么多。”","type":"paragraph"},{"text":"“镇反时杀人如麻，刑场上到处是尸体。”（中国人民大学法律系助教  朱华荣）","type":"paragraph"},{"text":"“镇反是一个‘报复’，是因为国民党过去打了你们，你们现在要报复”。他同情和怜悯反革命分子，他认为“年青的反革命可以不抓。可以让他们劳动改造。”（中国人民大学历史系助教  孙国梅的材料）","type":"paragraph"},{"text":"“各次运动的偏差和错误不是个别的，而是普遍的，不是从团结出发，而是从整人出发。肃反运动偏差是社会问题，不是从团结愿望出发，达到团结目的，造成压力，成绩少、缺点错误多。","type":"paragraph"},{"text":"社会上有千千万万人受到迫害，在社会上被错斗了多少人，这是个社会问题。","type":"paragraph"},{"text":"过去各次运动都是整人，时代过去了，我们应该吸取教训。”（中国人民大学计划系讲师  郭振淮）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"361fe99aec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
