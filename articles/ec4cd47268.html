ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"在西藏军区关于印军入侵雅斜儿情况报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在西藏军区关于印军人侵雅斜儿"},{"type":"paragraph","text":"情况报告上的批语"},{"type":"paragraph","text":"（1959年9月4日）周、陈同志："},{"type":"paragraph","text":"雅斜儿的印军跑了，廿六日跑的，是在廿五日migiiadm（米基顿）即朗久区一打?的影响之下跑掉的。请与总参谋部联系，侵地未跑的还有几处，告我为盼！又，雅斜儿在什么地方，亦请查告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月四日"},{"type":"paragraph","text":"[1]指中国人民解放军西藏军区1959年9月1日24时关于对雅斜儿印军侦察情况给总参谋部、外交部的报告。"},{"type":"paragraph","text":"[2]周，指周恩来。陈，指陈毅，当时任国务院副总理兼外交部部长。"},{"type":"paragraph","text":"[3]1959年8月25日，一支印度武装部队侵入属于我国领土的朗久地区，袭击我马及墩（即毛泽东批语中的“米基顿”）边防哨所，挑起武装冲突。我边防部队为了自卫，被迫予以还击。"},{"type":"paragraph","text":"[4]雅斜儿，位于东经93°12'，北纬23°38，是在中国境内，而且在“麦克马洪线”以北。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":341,"page_end":341},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec4cd47268"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
