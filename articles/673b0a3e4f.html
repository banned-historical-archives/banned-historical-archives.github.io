art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"成功的尝试——电视剧《毛泽东和他的乡亲》观后","authors":["高晓明"],"parts":[{"type":"paragraph","text":"近年来，荧屏上涌现了一大批以毛泽东同志的革命生涯为题材的影视作品，给观众留下了深刻印象。湖南电视台等单位摄制的《毛泽东和他的乡亲》一片，在表现毛泽东的内心矛盾世界方面有着独到之处，使人耳目一新。"},{"type":"paragraph","text":"该片通过60年代初毛泽东的一个亲戚、生产队长贺凤生，带着父亲的遗愿和乡亲们的嘱托，进京见毛主席反映农村的饥荒为线索，通过毛泽东三次接见他，层层展开了毛泽东的内心矛盾世界。第一次接见时，毛泽东和贺凤生只谈及家里的一些琐事，留下了“还有话说”的悬念。第二次，毛泽东是在“百姓没有粮，屁股落不得床”的心理矛盾中接见他的。这时的主席，对大跃进是错误还是正确，思想冲突达到白炽化程度。贺凤生将乡下的公共食堂双蒸饭、草叶粑粑、夜间饿着肚子打着火把“车水”……一件件讲给主席听，震撼了领袖的心。当贺凤生问这些事情的出现，问题是不是在下面时，毛泽东郑重地告诉他，主要的在上面，步子迈得大了。这体现了主席对大跃进的失误，已有了越来越明确的认识。第三次接见，是主席请贺凤生吃饭。李讷精心打扫菜盘的情景，使主席又想起了饥饿的全国百姓，主席久久仰望天空，以悲痛心情感慨道：“我这个主席没当好啊！”至此，一个能虚心听取群众意见的伟大领袖的形象，便得到了成功的表现。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"673b0a3e4f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
