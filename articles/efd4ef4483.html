],"dates":[{"year":1966,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社广州3日电　也门工会代表团团长穆罕默德·阿卜杜拉·哈吉在这里向本社记者畅谈访华观感时热烈赞扬中国在工业、农业和文化各方面所取得的巨大成就。他说，中国人民所取得的一切成就，特别是一九五八年以来的大跃进，是由于执行自力更生方针的结果，是由于工人和农民不断进行斗争的结果，更是由于中国共产党和中国领导人特别是毛泽东主席的教导和指引的结果。"},{"type":"paragraph","text":"穆罕默德·阿卜杜拉·哈吉特别高度评价了中国的人民公社。他说，人民公社的建立和存在，对中国来说是非常必要的。他指出，在克服自然灾害方面，人民公社更显示出了它的优越性。他说:“当我们了解到中国农民在旧社会里所遭受的苦难，而今天又看到公社社员为增加生产从而改善自己的生活水平而进行着辛勤劳动时，使我们认识到，人民公社的存在有着它巨大的重要意义。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efd4ef4483"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
