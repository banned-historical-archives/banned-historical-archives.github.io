ors":[],"dates":[{"year":1968,"month":5,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"遵照毛主席伟大教导，坚持节约闹革命"},{"type":"paragraph","text":"辽宁阜新发电厂为国家节约大量资金"},{"type":"paragraph","text":"据新华社沈阳二十二日电　辽宁省阜新发电厂广大革命职工，在人民解放军毛泽东思想宣传队的帮助下，认真贯彻执行毛主席“抓革命，促生产”和“要节约闹革命”的伟大指示，取得了革命、生产双胜利。现在，这个厂的革命委员会和六个分厂、五个运行班的革命领导班子，都已经建立起来。全厂通过革命大批判，实现了二百五十多项技术革新，解决了许多年来一直被认为无法解决的“老大难”问题。革命极大地促进了生产，两年来全厂月月、天天完成发电任务，为国家节约了大量资金。今年以来，这个厂的革命和生产又有了新的发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"辽宁文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dc110062f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
