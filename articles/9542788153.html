es":[{"year":1977,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"遵守纪律就是“奴隶主义”吗？"},{"type":"paragraph","text":"解放军某部　季洪余　蒋成湘"},{"type":"paragraph","text":"长期以来，“四人帮”故意混淆遵守纪律和奴隶主义这两个根本不同的概念，把遵守党的纪律，诬蔑为“奴隶主义”。"},{"type":"paragraph","text":"遵守纪律就是“奴隶主义”吗？不对。"},{"type":"paragraph","text":"遵守纪律和奴隶主义，从表面上看，二者都有个共同的表现形式：服从。但是，服从并不等于奴隶主义。问题在于服从谁和为什么服从。"},{"type":"paragraph","text":"无产阶级并不笼统地反对服从。恩格斯在《论权威》中就明确指出“权威又是以服从为前提的”。（《论权威》，《马克思恩格斯选集》第2卷第551页）毛主席亲自为我党制订的个人服从组织，少数服从多数，下级服从上级，全党服从中央的原则，条条都讲了服从。无产阶级的政党要组织千千万万的群众，领导革命斗争，没有统一的领导，没有服从能行吗？"},{"type":"paragraph","text":"我们党的组织纪律，体现了无产阶级的意志。遵守党的组织纪律，并不是服从哪一个人，而是服从无产阶级的意志，服从无产阶级和人民群众的利益。这种服从，是以主人翁的姿态，建立在高度自觉的基础上的服从。这种服从，怎么会是奴隶主义呢？试问，革命前辈在敌人的监狱里、刑场上仍然严守党的纪律，保守党的机密，大义凛然、视死如归；国际主义战士邱少云，在烈火烧身的危急关头，照样牢记上级潜伏待命的指示，坚持一动不动，这和那种奴隶成性、逆来顺受有一丝一毫的共同之处吗？"},{"type":"paragraph","text":"奴隶主义的服从则完全不同。它主要反映了剥削阶级与被剥削阶级、统治阶级与被统治阶级的关系。这种服从，是被统治、被剥削的阶级违背自己的意志，被迫地服从敌对阶级的压迫、剥削和统治。它和无产阶级为了本阶级和最广大人民的利益的服从有着根本的区别。"},{"type":"paragraph","text":"“四人帮”表面上反对奴隶主义，实际上大搞奴隶主义。江青蛮横地声称：“不听我的话，就是不听党的话！”他们手中没有真理，身边没有群众，就必然打起“奴隶主义”这面黑旗，实行法西斯统治，妄图胁迫一些人服服帖帖地跟着他们搞修正主义。这只能是痴心妄想。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9542788153"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
