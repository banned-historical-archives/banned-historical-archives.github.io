ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发师哲关于陪同费德林访问情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发师哲关于陪同费德林2"},{"type":"paragraph","text":"访问情况报告的批语"},{"type":"paragraph","text":"（1951年4月21日）漱石，子恢，剑英，小平，仲勋，一波，高岗同志并转各省委区党委大中市委："},{"type":"paragraph","text":"下面是师哲同志的报告”，其中说到各地招待外宾的缺点，请加注意，尔后不要过分和不适当。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月二十一日[1]师哲，当时任中共中央编译局局长。[2]费德林，苏联汉学家、作家，当时任苏联驻中国大使馆文化参赞。"},{"type":"paragraph","text":"[3]指师哲1951年4月20日关于陪同费德林访问的情况给毛泽东的报告。报告说到一些地方同志组织不必要的夹道欢迎和宴会。在浦口车站和上海站，为了让友人通过，让成千的群众不准行走。还有个别领导干部随便送礼物，不适当地题字，乱送不适当的材料和文件，在某些场合讲些有失立场和无分寸的话，造成不好影响。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":251,"page_end":251},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebed9d05e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
