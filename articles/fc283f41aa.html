thors":[],"dates":[{"year":1975,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在蓬勃开展的“工业学大庆”的群众运动中，本市电影放映系统最近举办了科教影片集中放映的活动。全市共放映了一千一百四十四场，观众达四十七万七千余人次。这次科教影片的集中放映，推动了工业战线正在蓬勃开展的技术革新和技术革命运动，起到了“文艺为工农兵服务，为无产阶级政治服务，为社会主义服务”的战斗武器作用，受到了广大工农兵群众的热烈欢迎。"},{"type":"paragraph","text":"这次集中放映的八十余部科教影片和三十余部科技新闻影片，生动地反映了在无产阶级文化大革命和批林批孔运动的推动下，我国人民在社会主义革命和建设事业中所取得的新成就，热情地宣传了马克思主义的光辉哲学思想，进一步普及了科学技术知识，介绍了先进技术和先进经验，对于增进广大人民群众的科技知识，鼓舞人民在攻克技术难关的同时战胜各种思想障碍的斗志，帮助人民如何正确地认识客观世界并进而改造客观世界，发挥了应有的战斗作用。大隆机器厂的工人同志看了《自动线》、《可控硅》等影片以后，受到了很大的鼓舞和启发，他们遵照伟大领袖毛主席关于“独立自主、自力更生”的方针，发扬大干快上的革命精神，最近试制成功硬质合金堆焊新工艺，改变了以往钻头依靠进口的被动局面，提高工作效率一倍以上，质量也有所提高，为祖国的石油机械工业填补了一项空白，赶上了世界先进水平。中华化工厂的工人同志看了《烟囱除尘》等治理“三废”的影片以后，增强了治理“三废”的信心，最近试制成功了大炉清烟的除尘装置，并将可以充分利用的余热支援邻近的兄弟厂，节约原煤百分之二十，基本上实现了“废渣(塑料原料下脚)不产生，废气基本净，废水大减轻”的预定目标，为保护附近居民的健康作出了努力，受到了附近居民的一致好评。"},{"type":"paragraph","text":"科教影片集中放映的工作开展以来，电影放映队的同志和部分影院职工积极做好宣传放映工作。有些工厂放映队的同志也积极支援、踊跃参战，出现了许多把影片送到工厂、送进车间进行放映的生动事例。普陀、南市等区的电影管理站还专门召开了全区所属基层单位的经验交流会。杨浦、南市等区的跑片员同志为了放映好科教影片，为工厂服务，有时连续到三、四个区去跑片放映。虹口区电影管理站的同志和区科技协会的同志一起，在映前组织宣传活动，讲解有关科技知识，辅导基层单位的技术革新工作，为放映好科教影片做了大量的工作。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc283f41aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
