al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"给易礼容的信","alias":"","parts":[{"type":"paragraph","text":"给易礼容的信"},{"type":"paragraph","text":"（1920年1月13日）润生\"兄："},{"type":"paragraph","text":"前日接来信，昨复一信，谅到。长沙张慎厂先生闻将来京，过汉时，我有一信请交他。京中无事可为，张以不来京、径赴沪为好，望转达。"},{"type":"paragraph","text":"弟泽东"},{"type":"paragraph","text":"九，一，一三"},{"type":"paragraph","text":"[1]润生，即易礼容（1898-1997)，湖南湘潭人，湖南商业专科学校学生，新民学会会员。曾与毛泽东等一起创办长沙文化书社，并任经理。中共湘区委员会早期负责人之一。曾任湖南省农民协会委员长、中共湖南省委代理书记等职。后脱党。新中国成立后，曾任全国政协委员、常委，中华全国总工会第六至九届执行委员。时为湖南省学生联合会负责人之一，为参加组织驱逐军阀张敬尧的斗争正在武汉。"},{"type":"paragraph","text":"[2]张慎厂，即张效敏，字慎庵（庵，也写作厂），曾任长沙《民治日报》主笔。五四时期曾写有《什么是集产主义》等文，介绍马克思主义、无1920年1月8日，进步团体辅社成员在北京陶然亭合影。左四为毛泽东。"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":1,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":165,"page_end":166},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8cbde9ff4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
