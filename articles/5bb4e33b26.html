ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"中央决定林彪罗荣柜慧荣臻组织总前委叫","alias":"","parts":[{"type":"paragraph","text":"中央决定林彪罗荣桓聂荣臻组织总前委！"},{"type":"paragraph","text":"（1949年1月10日）林、罗、聂，平津前线各兵团，平津两市委、两军管会，华北局，东北局："},{"type":"paragraph","text":"为着统一领导夺取平津，并于尔后一个时期内（大约有三个月）管理平津唐?及其附近区域一切工作起见，中央决定以林彪罗荣桓聂荣臻三同志组织总前委，林彪为书记，所有军事、政治、财政、经济、粮食、货币、外交、文化、党务及其他各项重要工作均归其管辖，以一事权而免分歧。两市委、两军管会关于上述工作均直向总前委请示，由总前委向中央负责。总前委与华北局为平行关系，有事用函电或当面商决。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"子灰"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给东北野战军司令员林彪、政治委员罗荣桓和华北军区司令员聂荣臻等的电报。平津战役总前委林彪、罗荣桓、聂荣臻在一起。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":1,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":517,"page_end":518},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bb4e33b26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
