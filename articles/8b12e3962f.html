ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"关于批陈整风运动重点在批陈的批语","alias":"","parts":[{"type":"paragraph","text":"关于批陈整风运动重点在批陈的批语2]"},{"type":"paragraph","text":"（1971年2月19日）"},{"type":"paragraph","text":"都同意。请告各地同志，开展批陈整风运动时重点在批陈，其次才是整风。不要学军委座谈会，开了一个月，还根本不批陈。更不要学华北前期，批陈不痛不痒，如李、郑主持时期那样。"},{"type":"paragraph","text":"[1]陈，指陈伯达。"},{"type":"paragraph","text":"[2]这个批语写在周恩来1971年2月19日关于全国计划工作会议情况等问题给毛泽东的报告上。报告中讲道，为广泛深入地听取意见，今晚拟开政治局会议，约大区和各省、市、区主要负责人见面，征求他们对今年计划和各项工作的意见。同时，“还拟谈谈‘批陈整风”的传达问题，现在华北各地各军区按主席批准的北京军区党委建议的范围传达，效果甚好，全国亦拟在他们明后日回去后照华北传达范围办理”。周恩来在报告中还谈到了拟在中央政治局会议上讨论的其他几个问题。"},{"type":"paragraph","text":"[3]指1971年1月9日开始的中共中央军委座谈会。从9日起，出席这次座谈会的人员都参加了华北会议。"},{"type":"paragraph","text":"[4]李，指李雪峰，原任中国人民解放军北京军区第一政委。郑，指郑维山，原任中国人民解放军北京军区司令员。华北会议前期由他们共同主持。会议的最后一天，即1971年1月24日，他们被宣布“调离原职，继续进行检查学习”。1979年12月6日，中共中央发出《关于为所谓“华北山头主义”平反的通知》，为他们平反。"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":2,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":175,"page_end":175},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批陈整风","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b12e3962f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
