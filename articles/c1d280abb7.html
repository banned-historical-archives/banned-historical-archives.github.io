s":["阿富汗共产党（毛主义）"],"dates":[{"year":2006}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"阿富汗共产党（毛主义） 二〇〇六年"},{"type":"paragraph","text":"亲爱的同志们，"},{"type":"paragraph","text":"我们由衷地高兴地祝贺你们党的全体党员和支持者，在加拿大经过几年的斗争后完成了建立革命共产党，一个马列毛主义党的斗争，成功地召开党的成立大会。我们真诚地祝愿你们的大会成功举行，并以认真和有原则的方式朝着大会的目标前进。"},{"type":"paragraph","text":"亲爱的同志们，"},{"type":"paragraph","text":"加拿大是一个帝国主义国家，并且是帝国主义俱乐部“G8”的一员。在G8中，加拿大是仅次于俄罗斯的最强大的帝国主义国家。此外，加拿大帝国主义被认为是美帝国主义在政治、经济和军事上的亲密盟友。在这样一个国家里成立了一个革命共产党，一个工人先锋党，对全世界的革命者和劳动群众来说，都是一个伟大的消息。"},{"type":"paragraph","text":"同时，由于其他特殊原因，加拿大革命共产党的成立对阿富汗共产党（毛主义）来说，也是一个十分重要和让人高兴的消息。此时，加拿大帝国主义的武装部队是侵略阿富汗的帝国主义占领军的重要组成部分。在过去几个月里，一个加拿大将军指挥着北约在阿富汗的所有占领军。在同一时期，加拿大部队和在这位将军指挥下的其他部队在坎大哈省大规模屠杀平民，杀害了数千名妇女、男子和儿童，又使数千人受伤。火箭和大炮的轰炸造成的破坏是如此之大和无可估量，以至于坎大哈省的潘杰瓦伊和泽里这两个区域的三十万群众都以不同的方式受到了影响。我们相信，你们党对帝国主义罪行的揭露，将在帝国主义堡垒激起巨大的群众反抗，促进加拿大无产阶级的革命斗争。"},{"type":"paragraph","text":"阿富汗共产党(毛主义)希望与你们党有密切的联系和牢固的关系。无产阶级国际主义将是并一直是我们建立和加强这种关系的指南。你们党和我们在加拿大的支持者之间的这种关系已经建立，我们期望这种关系能够加强、扩大和继续下去。然而，我们认为光是只有这种关系是不够的。无产阶级国际主义的原则和相互斗争的需要，要求我们提高两党关系的水平。"},{"type":"paragraph","text":"我们再次为你们的大会的召开，和在加拿大建立了革命共产党，祝贺你们和全世界的革命共产党人！"},{"type":"paragraph","text":"国际共产主义运动万岁！"},{"type":"paragraph","text":"马列毛主义万岁！"},{"type":"paragraph","text":"无产阶级国际主义万岁！"},{"type":"paragraph","text":"加拿大革命共产党万岁！"},{"type":"paragraph","text":"阿富汗共产党（毛主义）"},{"type":"paragraph","text":"2006年11月"},{"type":"paragraph","text":""}],"alias":""},"tags":[{"name":"毛主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1d280abb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
