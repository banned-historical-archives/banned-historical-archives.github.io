<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批转华东局关于用“依靠贫农和中农的巩固联盟”的提法进行宣传的意见","authors":[],"dates":[{"year":1954,"month":1,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央批转华东局关于用“依靠贫农和中农的巩固联盟”的提法进行宣传的意见","type":"title"},{"text":"华东局并各中央局、分局，并转各省委、市委、地委、县委，中央和军委各部委，中央人民政府各部委党组：","type":"appellation"},{"text":"1953年12月30日来电悉。","type":"paragraph"},{"text":"中央同意华东局关于用“依靠贫农和中农的巩固联盟”的说法去向农民进行宣传的意见，并将华东局来电转发各地参考。","type":"paragraph"},{"text":"关于党的农村工作的阶级路线问题，在中央所批准的《中宣部关于党在过渡时期总路线的学习和宣传提纲》这一党内文件中的提法是：“必须依靠贫农（包括土地改革后变为新中农的老贫农），巩固地与中农联合，逐步发展互助合作，逐步由限制富农剥削到最后消灭富农剥削。”在《人民日报》1954年1月9日公布的《中共中央关于发展农业生产合作社的决议》这一公开文件中的提法是：“贯彻执行党在目前时期关于依靠贫农和中农的巩固联盟，逐步发展互助合作限制富农剥削——这一系统的政策。”这两个提法中的“依靠贫农，巩固地与中农联合”和“依靠贫农和中农的巩固联盟”，其基本内容是一致的；但在党内必须说清楚“依靠贫农”以及依靠贫农去团结中农的重要意义，而在公开文件及向农民宣传时，则应强调依靠贫农与中农的巩固联盟。在对待富农的政策问题上，两个提法的内容是有些不同的；其原因是在于前者说的是整个过渡时期农村工作的阶级路线，因此对待富农的政策必须是“逐步由限制富农剥削到最后消灭富农剥削”；而后者说的是目前时期农村工作的政策，因此对待富农的政策还只是“限制富农剥削”。中央在党内文件和公开文件中要采取上述不同提法的目的是：使我们的党员和干部对党在整个过渡时期的农村工作的阶级路线获得明确的、全面的、系统的了解和认识后，在目前时期的实际工作中仍能继续坚持稳步前进的精神，避免可能发生的过早地消灭富农剥削的急躁倾向。因此，在各地依照中宣部的提纲向党员和干部进行教育的同时，应当向他们说清楚：必须依照《中共中央关于发展农业生产合作社的决议》中的提法去向群众进行口头和文字的宣传，而不要过早地向群众去大讲“消灭富农剥削”这一类的话。","type":"paragraph"},{"text":" 中央1954年1月16日","type":"paragraph"},{"text":"（此件及华东局的来电可登党刊）","type":"paragraph"},{"text":"华东局关于“依靠贫农和中农的巩固联盟”口号的请示","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"我们正在开省委书记会检查粮食统购统销工作。看见中央宣传部印发的“为动员一切力量把我国建设成为一个伟大的社会主义国家而斗争”的提纲，其中第三节第二段中提到：“必须依靠贫农（包括土地改革后变为新中农的老贫农），巩固地与中农联合，逐步发展互助合作，逐步由限制富农剥削到最后消灭富农剥削。”我们认为这种提法是明确的、适当的，唯据浙江反映，在农村中宣传“依靠贫农，团结中农……”的口号时，对老中农仍有某些不好的影响，他们认为自己是团结的对象，故不甚积极；同时对新中农的情绪也有一些影响。因此，我们考虑，在党内教育及具体政策的执行上，应以中宣部提纲中规定的口号为根据，但在目前对农民进行口头宣传时，是否可以说成“依靠贫农和中农的巩固联盟，逐步发展互助合作，逐步由限制富农剥削到消灭富农剥削（目前向群众进行宣传时不要讲消灭富农剥削——中央注）”。浙江在个别地区已根据这样的提法进行了宣传，宣传后中农（新老一样）情绪很高，认为自己是人民政府依靠的对象，必须积极带头才对得起政府。我们认为目前农村中，中农已占极大多数，这样提法在宣传效果上是有很大好处的，在政治原则上也似乎没有什么大毛病。","type":"paragraph"},{"text":"当否，请指示。","type":"paragraph"},{"text":" 华东局1953年12月30日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b36813443a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
