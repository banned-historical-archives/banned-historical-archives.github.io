ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"给达赖喇嘛的信","alias":"","parts":[{"type":"paragraph","text":"给达赖喇嘛的信"},{"type":"paragraph","text":"（1953年3月10日）达赖喇嘛先生："},{"type":"paragraph","text":"感谢你一九五二年八月十六日及九月三日（藏历水龙年七月十四日）的信和礼物。"},{"type":"paragraph","text":"西藏地方政府及人民，在你领导之下，协助人民解放军的入藏部队，加强团结，并争取协议的逐步实现，使我感到很大的欣慰。"},{"type":"paragraph","text":"你所派的致敬团和参观团代表都肯努力工作和学习，你的办事处已正式成立，办事处的人员也努力工作。"},{"type":"paragraph","text":"中央对西藏的政策除已明确地写在和平解放西藏办法的协议中者外，我在接见致敬团和参观团的代表时曾又简要地告诉过他们。这些简要的话，柳霞·土登塔巴已经在他对西藏的广播中谈到，想你已经知道了。"},{"type":"paragraph","text":"建设新西藏所需要的帮助，凡属能够办到的，中央当尽可能地办到，但因交通阻隔，有些事情一时无法办到，只好等待以后再办。西藏致敬团和参观团的代表们在这里所提出的要求，中央人民"},{"type":"paragraph","text":"[1]达赖喇嘛，即达赖喇嘛·丹增嘉措，西藏宗教领袖之一。"},{"type":"paragraph","text":"[2]柳霞·土登塔巴，1952年10月任西藏致敬团团长率团来北京，受到毛泽东的接见。1952年11月22日，他在对西藏的广播讲话中，转达了毛泽东同西藏致敬团和参观团谈话的要点。"},{"type":"paragraph","text":"给达赖喇嘛的信政府就是本着以上这种精神处理的。兹不赘述。以后你和班禅额尔德尼需要中央帮助之处，均可告诉张代表或请张代表用电报转告我。"},{"type":"paragraph","text":"祝你领导西藏地方政府和人民逐步地建设，使西藏日渐繁荣，西藏僧俗人民的生活日加改善，藏族的前途日加光明，祖国的边防日加巩固。并祝健康"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五三年三月十日"},{"type":"paragraph","text":"随函附送：扩音机两个、附带喇叭四个，电转一个、附带片子十二张，黄缎四匹，长白山人参一个，貂皮衣筒一件。"},{"type":"paragraph","text":"[1]班禅额尔德尼，即班禅额尔德尼·确吉坚赞，西藏宗教领袖之一。[2]指中央人民政府驻西藏代表张经武。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":61,"page_end":62},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c28324dc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
