nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"谢富治接见首都大专院校造反派时的讲话","parts":[{"type":"title","text":"506．谢富治接见首都大专院校造反派时的讲话"},{"type":"paragraph","text":"(1967年2月10日)"},{"type":"paragraph","text":"1．各校到外地去的人(包括各校派到各地的联络站)都要回来整整风，整顿思想。"},{"type":"paragraph","text":"2．首都的夺权到了关键时刻，它是毛主席居住的地方。但现在还没有建立起一个统一的组织。北京应搞一个工农兵学的筹备小组，中央文革支持，夺权要三结合。(即群众革命造反派以及执行毛主席路线的党政负责人、军队负责人)大专院校推选20名代表参加筹备小组，两、三天就搞出来。"},{"type":"paragraph","text":"3．过去看你(指一个组织)革命不革命是看你的革命造反精神，而现在看你能不能为革命的大联合出力。"}],"authors":["谢富治"],"dates":[{"year":1967,"month":2,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":219,"page_end":219,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6f13762e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
