script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国部分资产阶级舆论  对美国拖延谈判表示不满","authors":[],"dates":[{"year":1951,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国部分资产阶级舆论"},{"type":"paragraph","text":"对美国拖延谈判表示不满"},{"type":"paragraph","text":"【新华社二十二日讯】伦敦消息：美国方面拖延朝鲜停战谈判的行为，已引起侵朝主要帮凶国家英国的一部分资产阶级舆论的不满和焦虑。伦敦《旁观者》周刊最近在社论中指出双方本来已经可以获致协议以后，认为美方首席谈判代表“乔埃中将与他的同僚们似乎一意尽可能地阻碍这种和谐”。《星期日泰晤士报》十八日发表了该报驻华盛顿记者的电讯，该记者抱怨说：“自从北朝鲜答应沿交战线而不是沿三八线休战后，谈判仍在拖延，同时不幸又发生了关于暴行的事件（按指美国军方捏造的朝鲜人民军和中国人民志愿军屠杀俘虏的谎言）”，这样，就使得许多人发生“疑惧”。伦敦《泰晤士报》也在九日的评论中主张：在双方同意划定军事分界线以后，“应该做的事就是停火”。"},{"type":"paragraph","text":"在最近英国议会的辩论中，有若干议员就朝鲜停战谈判迟迟未能获得协议一事提出质询。十四日，有好几个议员要求邱吉尔政府指派英国代表参加朝鲜停战谈判，以“加速谈判的进行”。他们警告说：人们对朝鲜停战谈判的拖延“越来越感到不安”。十六日，议员锡尔佛曼、休士等十一人在下院提出动议，要求政府“迅速采取一切适当的步骤，保证朝鲜战争在双方已经同意的停火线的基础上立即停火”。在十九日关于外交政策的辩论中，工党议员唐纳黎说：英国公众对朝鲜停战谈判的情形，感觉非常不安。他要求“英国政府告诉美国政府：朝鲜战争已经延续得够长了”。另一个工党议员克斯尔夫人也对美国的拖延谈判表示不满，她说：现在各方疑虑丛生，认为“我们的盟国并不要停火”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbd53eae4f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
