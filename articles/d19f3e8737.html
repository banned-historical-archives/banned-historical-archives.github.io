script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗“火花报”发表社论欢迎遣返病伤战俘协定  指出朝中建议为结束朝鲜战争创造条件  美国人民渴望停止流血反对资产阶级的“和平恐慌”","authors":[],"dates":[{"year":1953,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗“火花报”发表社论欢迎遣返病伤战俘协定指出朝中建议为结束朝鲜战争创造条件"},{"type":"paragraph","text":"美国人民渴望停止流血反对资产阶级的“和平恐慌”"},{"type":"paragraph","text":"【新华社布拉格十七日电】罗马尼亚“火花报”四月十四日发表社论，欢迎遣返病伤被俘人员协定，认为这项协定是导致立即恢复停战谈判、最后解决战俘问题并缔结停战协定的第一个胜利。社论指出，以苏联为首的和平力量，一开始就为和平解决朝鲜问题而斗争。目前的朝中方面的建议，已为清除停战道路上的最后障碍从而结束朝鲜战争创造了条件。"},{"type":"paragraph","text":"社论说，罗马尼亚人民支持了旨在和平解决朝鲜问题并重新建立和平的一切行动。全世界各国人民，对于旨在结束朝鲜战争的每一个行动和走向这个目标的每一步进展，都予以赞助和热烈的支持，这是完全正当的，因为这既符合于那些有子弟在朝鲜战场上流血的人们的利益，又符合于日益坚决地保卫和平与人类前途的全世界人民的利益。那些一心要阻碍结束朝鲜战争的人们，只能在舆论面前暴露出和平之敌的面目，并且他们是一定要失败的。"},{"type":"paragraph","text":"社论最后说，全世界各国人民现在希望美方也用行动来表明它的和平解决朝鲜问题的愿望，希望美方同意立即在板门店恢复停战谈判，缔结停战协定，并在朝鲜建立和平。"},{"type":"paragraph","text":"【新华社布拉格十七日电】美国人民欢迎朝中和平建议，渴望停止在朝鲜的流血。他们对于资产阶级报纸企图把这种新的和平希望形容成一种“令人忧虑”的事情表示愤怒。四月十日纽约“工人日报”转载别家美国报纸发表的两封具有代表性的读者来信，说明了美国人民的这种情绪。肯塔基州路易斯维尔地方的“信使日报”发表的麦·克林的信指责全国各报经济栏的“和平恐慌”的标题。克林说：“把这种标题用普通的话来解释，就是说：‘我们唯恐我们的年青人不必再在朝鲜送命，因为假使战争停止的话，生意便没有那么好了，同时我们中有些人可能会失业……’这种说法多么令人气愤？”"},{"type":"paragraph","text":"克林驳斥这种说法的荒谬，指出和平才真是符合美国人民的利益的，他说：“浪费掉的数十百亿的美元可以用在建设性的事情上，这就可以使我们生活在一个较好的国家和世界里面。”"},{"type":"paragraph","text":"这封信在结尾时敦促拯救美国士兵的生命，以慰他们家里人的切望。"},{"type":"paragraph","text":"另一封信是马萨诸塞州斯普林腓特的一个退伍军人考门·史密斯写给“斯普林腓特每日新闻”的。"},{"type":"paragraph","text":"史密斯写道，现在朝鲜和平是比以前任何时候都更为接近了，“在这样一个时候，本应产生期望与一定程度的乐观情绪……然而，实际的情况却似乎恰恰相反。”他责怪报纸发出悲观论调、华尔街害怕经济萧条和美国最高级官员表示怀疑。"},{"type":"paragraph","text":"他接着描述了美国人民对这个不得人心的朝鲜战争不感兴趣的情况，并说：“现在正是值得欣慰的时机，因为战争可能快要结束了。不管停战后的情况如何，总比战场上不停地死人好些。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d19f3e8737"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
