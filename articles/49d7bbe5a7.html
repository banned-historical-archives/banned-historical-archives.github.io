庭审判工贼","authors":[],"dates":[{"year":1960,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国垄断资本的殖民剥削"},{"type":"paragraph","text":"巴拿马香蕉种植工人坚持罢工"},{"type":"paragraph","text":"罢工者组织起民警和革命法庭审判工贼"},{"type":"paragraph","text":"新华社27日讯　据拉丁美洲通讯社26日自巴拿马城报道，在巴拿马奇里基省的美国“联合果品公司”香蕉种植园的工人的大规模罢工已经进行了二十天。罢工者要求撤销减少工资的决定。虽然遭到了行政当局和国民警卫队的迫害，但是罢工者依然控制了广大的地区。他们组织了自己的民警和革命法庭来审判一切破坏罢工的人。"},{"type":"paragraph","text":"罢工者和他们的家庭得到了全国各地劳动人民的援助。学生和工人给他们捐献的大批款项和粮食送到了香蕉种植园。"},{"type":"paragraph","text":"“联合果品公司”的巴拿马香蕉种植园工人呼吁危地马拉、洪都拉斯、尼加拉瓜、哥斯达黎加和厄瓜多尔的香蕉种植园的工人采取联合行动，来共同反对这个美国垄断组织。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49d7bbe5a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
