<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"今日之苏联  资本主义大泛滥  黑市猖獗　走资派投机倒把大发横财  物价昂贵　劳动人民横遭剥削生活难","authors":[],"dates":[{"year":1969,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"今日之苏联  资本主义大泛滥"},{"type":"paragraph","text":"黑市猖獗　走资派投机倒把大发横财"},{"type":"paragraph","text":"物价昂贵　劳动人民横遭剥削生活难"},{"type":"paragraph","text":"新华社十七日讯　目前，苏联市场供应紧张，黑市猖獗。这是苏修叛徒集团全面复辟资本主义所带来的严重恶果。苏联土库曼加盟共和国首都阿什哈巴德黑市猖獗的情况就是其中的一个实例。"},{"type":"paragraph","text":"阿什哈巴德是一座有二十四万人口的城市。据苏修报刊透露，在这个城市的商店里，商品奇缺，而黑市投机商却十分猖獗。有许多商品，工厂生产出来后，不经过商店就直接流到黑市上。人们无可奈何地说：要买东西吗？请上黑市吧！然而，黑市的售价，要比商店高出三倍，劳动人民又怎么能买得起呢？"},{"type":"paragraph","text":"为什么这个城市的商品这样奇缺、黑市这样猖獗呢？惯于吹牛、扯谎的苏修报刊辩解说，这是“因为共和国没有改善地方工厂的工作”。显然，这是弥天大谎。实际上，苏修叛徒集团近年来加紧实行所谓国民经济“新体制”，按资本主义经营管理原则对国民经济实行大改组，他们越“改善”，资本主义就越泛滥，越“改善”，黑市就越猖獗。他们不是什么不“改善”，而是在彻底地“改善”到资本主义的轨道上去。"},{"type":"paragraph","text":"必须指出的是，在猖獗的黑市活动中，苏修一小撮走资派扮演了极其可耻的投机商角色，他们利用职权，进行投机倒把活动，残酷地掠夺苏联人民。例如，阿什哈巴德的黑市猖獗就和市贸易管理局局长阿拉谢夫等密切地联系着。"},{"type":"paragraph","text":"阿拉谢夫为了掠夺人民，竟挖空心思，发明了一种“新办法”，叫“阿拉谢夫分配表”。这个“新办法”规定，市场上奇缺的商品由阿拉谢夫亲自控制，分配给基层单位。可是，阿拉谢夫和他的同伙却趁机把大批商品盗入黑市，大牟暴利。阿拉谢夫的“老战友”、这个市的中央商场的经理季利基利耶夫也仿效阿拉谢夫的办法，私卖了四千米奇缺的纺织品，捞了一大笔“油水”。"},{"type":"paragraph","text":"这些“局长”、“经理”们大干这些卑鄙勾当时，还和所谓“人民监察机关”、“民警局”内的要员互相勾结，坐地分赃。当他们干的这些丑事暴露出来时，为了遮人耳目，“民警局”不得不做做官样文章去“侦查”“侦查”，自然这种“侦查”是不会有什么结果的。而当这些人靠着“老交情”，又“安安稳稳地、高高兴兴地”到新的领导岗位时，“民警局”也就“停止了侦查”。令人寻味的是，“民警局”把那些进行所谓“侦查”的人称之为"},{"type":"paragraph","text":"“同违反苏联商业法现象作斗争中表现杰出的人”，为了奖励这些人所用的奖品，却都是从阿拉谢夫“总指挥的后备”物资中拨给的。"},{"type":"paragraph","text":"从阿什哈巴德黑市猖獗的情况，人们可以清楚看出，苏联各地市场供应紧张，黑市猖獗，是与大大小小的阿拉谢夫之流为非作歹分不开的。他们在其总后台——窃踞苏联党政大权的勃列日涅夫叛徒集团的卵翼庇护下，不仅没有也不可能受到应有的惩处，反而官运亨通，飞黄腾达。但是，苏联人民总有一天要给他们惩处的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4015ff4f68"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
