<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"五届人大首次会议举行预备会宋副委员长主持会议并讲话李副主席等领导人出席　预备会议选举了五届人大首次会议主席团和秘书长，一致通过了五届人大首次会议议程","authors":[],"dates":[{"year":1978,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二月二十五日电　第五届全国人民代表大会第一次会议今天下午在人民大会堂举行预备会议。"},{"type":"paragraph","text":"会议由第四届全国人民代表大会常务委员会副委员长宋庆龄主持。"},{"type":"paragraph","text":"出席会议的有中共中央副主席李先念，党和国家其他领导人韦国清、乌兰夫、方毅、许世友、纪登奎、苏振华、李德生、吴德、余秋里、张廷发、陈永贵、陈锡联、耿飚、聂荣臻、倪志福、彭冲、陈慕华、赵紫阳、赛福鼎、陈云、谭震林、李井泉、菜畅、邓颖超、阿沛·阿旺晋美、周建人、许德珩、胡厥文、王震、谷牧。"},{"type":"paragraph","text":"宋庆龄副委员长在会上讲话。她指出:召开第五届全国人民代表大会，是根据中共中央提出的建议，经人大常委会决定的。几个月来，在以华主席为首的党中央的直接领导下，召开五届人大的准备工作已经就绪。第五届全国人民代表大会第一次会议定于明天下午正式开幕。"},{"type":"paragraph","text":"预备会议选举了第五届全国人民代表大会第一次会议主席团和秘书长。当会议宣布英明领袖华主席和叶剑英、邓小平、李先念、汪东兴副主席等二百五十四人当选为大会主席团时，全场热烈鼓掌，经久不息。李先念同志当选为大会秘书长。会议一致通过第五届全国人民代表大会第一次会议的议程:"},{"type":"paragraph","text":"一、华国锋总理作政府工作报告；"},{"type":"paragraph","text":"二、修改中华人民共和国宪法，叶剑英副主席作关于修改宪法的报告；"},{"type":"paragraph","text":"三、选举和决定国家领导工作人员。"},{"type":"paragraph","text":"此外，这次会议还要审议《一九七六至一九八五年发展国民经济十年规划纲要(草案)》，讨论中华人民共和国国歌。"},{"type":"paragraph","text":"今天的预备会议还通过了代表资格审查委员会主任委员、副主任委员和委员的名单。"},{"type":"paragraph","text":"大会主席团在预备会议结束以后，举行了第一次会议。会上，推选了常务主席，他们是:华国锋、叶剑英、邓小平、李先念、汪东兴、宋庆龄、聂荣臻、刘伯承、乌兰夫、吴德、韦国清、陈云、郭沫若、谭震林、李井泉、张鼎丞、菜畅、邓颖超、赛福鼎、疗承志、姬鹏飞、阿沛·阿旺晋美、周建人、许德珩、胡厥文。"},{"type":"paragraph","text":"主席团会议以后，举行了五届人大代表资格审查委员会会议。资格审查委员会主任委员纪登奎作了资格审查报告。他说，全国三十个省、市、自治区和人民解放军共选出五届人大代表三千五百名。河北，北京、辽宁选出的代表中各有一名因发现有严重错误，已由原选举单位撤销代表资格，现有代表三千四百九十七名。代表资格全部有效。"},{"type":"paragraph","text":"这一届全国人民代表大会的代表具有广泛的代表性，其中工人占百分之二十六点七，农民占百分之二十点六，人民解放军占百分之十四点四，革命干部占百分之十三点四，知识分子占百分之十五，爱国人士占百分之八点九，归国华侨占百分之一。代表中妇女占百分之二十一点二。中年、青年代表占百分之六十二点九。全国五十四个少数民族都有代表，他们的代表占百分之十点九。大多数代表是阶级斗争、生产斗争、科学实验三大革命运动中的劳动模范、战斗英雄、先进工作者。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\02\\782Q010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e第五届全国人民代表大会第一次会议二月二十五日下午在人民大会堂举行预备会议。图为党和国家领导人(左起)乌兰夫、聂荣臻、李先念、宋庆龄、吴德、韦国清在主席台上。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"李先念","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"陈云","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"644eeab716"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
