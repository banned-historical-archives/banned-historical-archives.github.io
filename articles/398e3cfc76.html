个故事》VCD光盘出版","authors":["吴珺"],"dates":[{"year":2003,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京大学举行纪念毛泽东诞辰110周年理论研讨会"},{"type":"paragraph","text":"《百幅手迹怀伟人——毛泽东的110个故事》VCD光盘出版"},{"type":"paragraph","text":"本报北京12月5日讯  记者吴珺报道：今天，北京大学召开纪念毛泽东诞辰110周年理论研讨会。与会者围绕毛泽东与20世纪的中国、毛泽东与中国特色社会主义、毛泽东与北京大学等专题展开热烈讨论。"},{"type":"paragraph","text":"与会者表示，毛泽东思想是随着时代的发展而发展的科学。邓小平理论和“三个代表”重要思想是对毛泽东思想的继承、丰富和发展。当前，全党正兴起学习贯彻“三个代表”重要思想新高潮。我们既要全面把握“三个代表”重要思想同马克思列宁主义、毛泽东思想、邓小平理论一脉相承的特征，也要全面把握它在继承前人基础上不断与时俱进的特征。在新的历史条件下，坚持“三个代表”重要思想，就是真正坚持马克思列宁主义、毛泽东思想和邓小平理论，高举“三个代表”重要思想的旗帜，就是真正高举马克思列宁主义、毛泽东思想和邓小平理论的旗帜。"},{"type":"paragraph","text":"来自中央文献研究室、中央党史研究室、中央党校、中国社会科学院、中国人民大学和北京大学的100多位专家学者参加了会议。"},{"type":"paragraph","text":"据新华社北京12月4日电大型历史文献电视纪录片《百幅手迹怀伟人——毛泽东的110个故事》VCD光盘日前出版发行。"},{"type":"paragraph","text":"这部电视片由国家档案局中央档案馆和广西尤特文化传播公司制作，全片共110集，每集讲述一个历史故事，并以电视形式披露了几百幅毛泽东的手迹和十几段原始讲话录音，是迄今为止运用毛泽东手迹和原始讲话录音最多、最集中的文献电视片。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"398e3cfc76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
