"authors":[],"dates":[{"year":1966,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马来亚民族解放同盟驻中国代表团长祝贺我核试验"},{"type":"paragraph","text":"苏联修正主义者和美帝遭到新的失败"},{"type":"paragraph","text":"新华社十九日讯　马来亚民族解放同盟驻中国代表团团长沙尔玛，今天写信给中国亚非团结委员会主席廖承志，热烈祝贺我核爆炸成功。"},{"type":"paragraph","text":"贺信中说，中国拥有核武器和发展核武器，对所有被压迫人民是一种巨大的鼓舞和推动。这次新的爆炸，将进一步鼓舞马来亚人民粉碎英、美新殖民主义的产物——“马来西亚”，以及争取真正独立、民主和统一的马来亚的斗争。"},{"type":"paragraph","text":"贺信说，这一次核爆炸，使美帝国主义及其帮凶的核讹诈，苏联现代修正主义者企图勾结美帝国主义来维持其核垄断和破坏亚、非、拉美和所有被压迫民族和人民的革命斗争的阴谋，遭到了新的失败。"},{"type":"paragraph","text":"马来亚人民和世界所有爱好自由的人民一起，对中国人民在保卫世界和平方面所作的这一个新的贡献，感到欢欣鼓舞。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afd2db81aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
