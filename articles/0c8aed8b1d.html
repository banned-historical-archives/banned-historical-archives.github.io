席","authors":[],"dates":[{"year":1969,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刚果（布）全国革命委员会主席、国家元首恩古瓦比致电"},{"type":"paragraph","text":"热烈祝贺毛主席当选中国共产党主席"},{"type":"paragraph","text":"新华社二日讯　毛泽东主席收到了刚果（布）全国革命委员会主席、国家元首马里安·恩古瓦比的贺电。贺电全文如下：北京毛泽东主席阁下："},{"type":"paragraph","text":"值此你再度当选中国共产党主席之际，我高兴地代表刚果人民及其政党和政府向你致以最热烈的祝贺。伟大的中国人民对你再次表示了坚定不移的信任，这就向全世界表明：他们正是在你的英明领导下，要把已经具有如此巨大规模的国家建设事业继续进行下去。我热烈地祝愿阁下身体健康，祝愿我们两国人民之间十分圆满存在的战斗友谊日益加强。"},{"type":"paragraph","text":"顺致最崇高的敬意。"},{"type":"paragraph","text":"刚果（布）全国革命委员会主席、国家元首"},{"type":"paragraph","text":"马里安·恩古瓦比少校"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c8aed8b1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
