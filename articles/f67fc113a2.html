ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"没收汉好及参加暴动首领土地财产问题的指示","alias":"","parts":[{"type":"paragraph","text":"没收汉妊及参加暴动首领土地财产问题的指示！"},{"type":"paragraph","text":"（1940年7月20日）"},{"type":"paragraph","text":"汉奸首领及参加暴动之反动分子头目的土地财产可以没收，交民主政权，具体处理。但应极谨慎，仅仅对付极少数个别的汉奸首领及发动暴动首领，且应经过当地革命政权之正式判定和群众之拥护，而不应对一切汉奸、一切反动分子、顽固分子均没收其财产土地，变成相当普遍的没收土地与分配土地运动。又指出，极力扩大统一战线工作，拉拢一切动摇分子，只打击当前直接向我进攻的某一部分，以暂时中立其余部分。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、王稼祥关于没收汉奸及参加暴动首领土地财产"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":7,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":102,"page_end":102},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f67fc113a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
