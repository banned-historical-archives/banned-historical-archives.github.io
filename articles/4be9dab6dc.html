tes":[{"year":1990,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界乒乓球明星赛"},{"type":"paragraph","text":"马文革获第二站亚军"},{"type":"paragraph","text":"新华社雅典５月２８日电（记者李成贵）１９９０年世界全明星乒乓球循回赛第二站比赛２８日在这里结束，瑞典选手瓦尔德内尔获得冠军，马文革获得亚军。"},{"type":"paragraph","text":"马文革和瓦尔德内尔是在经过两轮比赛分别淘汰了各自的对手后进入决赛的。决赛中，马文革第一局以２１∶２３输给瓦尔德内尔。第二局双方从８平打到１６平，马文革连续大力抽杀，曾一度以２０∶１６领先。瓦尔德内尔在关键时刻沉着应战，追到２０平后，又以２４∶２２拿下第二局。第三局比赛马文革在１６∶１９落后的情况下，毫不手软，在追到２０平后，一次接球失误，一次扣球出界，以２０∶２２输了第三局。"},{"type":"paragraph","text":"世界明星们是２７日由西班牙抵达雅典的。在西班牙巴塞罗那举行的第一站比赛中，瑞典的阿佩伊伦获得冠军，波兰的格鲁巴获得亚军。中国选手马文革和于沈潼以１∶２的相同比分分别输给了阿佩伊伦和瓦尔德内尔。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4be9dab6dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
