art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"湘潭电线厂制成铝杆连铸连轧生产线","authors":[],"parts":[{"type":"paragraph","text":"新华社长沙一九七六年七月三十日电 湖南省湘潭电线厂职工贯彻执行独立自主、自力更生的方针，自行设计、制造成功了铝杆连铸连轧生产线。这一生产线最近已正式没入生产。这是对邓小平鼓吹的“洋奴哲学”、“爬行主义”的有力批判。"},{"type":"paragraph","text":"铝杆连铸连轧生产线同湘潭电线厂原来的熔压工艺相比，产量成倍增长，产品合格率由百分之八十左右提高到百分之九十九以上，减轻了工人的劳动强度，操作工人由五十九人减少到九人，节约大量煤电，并缩短了工艺流程，车间占地面积也比原来减少三分之二。这条生产线建成投产，为多快好省地发展电线电缆生产闯出了一条新路。"},{"type":"paragraph","text":"湘潭电线厂是一个生产电线电缆的企业。轧制铝杆是这个厂生产的第一道工序。过去轧制铝杆要先将铝块熔炼铸成铝锭，经过裁锭、修锭、加热，再在压延机上轧成铝杆。这种工艺，流程长，用人多，效率低，劳动强度大，煤、电耗费多。早在无产阶级文化大革命以前，工人们根据自己长期生产的实践经验，就设想搞熔炼和热轧一次进行的连铸连轧新工艺，但在刘少奇修正主义路线的影响下，这一设想长期没有成为现实。文化大革命中，经过批判修正主义路线，这个厂开始了这条生产线的试制工作。在试制过程中，三结合的试制小组不断地清除修正主义路线和崇洋迷外思想的干扰，大胆创新，攻克了许多技术上的难题，结果在去年国庆节前初步建成了这条生产线。在批邓、反击右倾翻案风的伟大斗争中，厂党委组织职工认真学习毛主席文化大革命以来特别是有关反击右倾翻案风的一系列重要指示，深入批判邓小平散布的“依靠工农兵是相对的”和“今不如昔”等谬论，进一步调动了工人群众的社会主义积极性。他们对这条生产线进行反复调试、改进，使这一新工艺得到了完善和提高，现已投入正常生产。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ecd28433d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
