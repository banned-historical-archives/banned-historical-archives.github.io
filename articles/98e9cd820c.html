":[],"dates":[{"year":1977,"month":10,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英明领袖华主席在党的十一大政治报告中指出:“四人帮”抓的史学，“随心所欲地伪造历史，别有用心地吹‘女皇’、批‘宰相’、批‘代理宰相’、批‘现代大儒’，变成了古为帮用的影射史学。”华主席的重要指示，尖锐地揭露了“四人帮”利用历史，大造篡党夺权反革命舆论的反动实质，为我们进一步揭批“四人帮”，彻底肃清他们的流毒和影响，提供了强大的思想武器。日前，复旦大学历史系广大革命师生，认真学习十一大文件，坚持贯彻十一大路线，愤怒揭发批判“四人帮”及其御用写作班子梁效、罗思鼎之流炮制影射史学，疯狂推行反革命政治纲领的种种卑劣手法和罪恶行径，决心把揭批“四人帮”的伟大斗争进行到底。这里发表的是部分师生的发言纪要。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98e9cd820c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
