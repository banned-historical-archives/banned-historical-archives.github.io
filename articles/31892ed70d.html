rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"董必武同志在北京逝世全党全军全国人民，要学习董必武同志的革命精神和高尚品质，在毛主席为首的党中央领导下，团结一致，坚持党的基本路线，坚持无产阶级专政下的继续革命，为巩固和加强无产阶级专政，为把我国建设成为社会主义的现代化强国而奋斗","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年四月三日讯 中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会、国务院讣告"},{"type":"paragraph","text":"中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会、国务院沉痛宣告：中国共产党中央委员会委员、中央政治局常务委员会委员、全国人民代表大会常务委员会副委员长董必武同志，因病医治无效，于一九七五年四月二日七时五十八分在北京逝世，终年九十岁。"},{"type":"paragraph","text":"董必武同志是中国共产党的创始人之一，是中国共产党的优秀党员，是中国人民的伟大的革命战士，是党和国家卓越的领导人之一。"},{"type":"paragraph","text":"董必武同志在长期的革命斗争中，为党为人民建立了不朽的功绩，受到了全党全军全国人民的衷心爱戴。"},{"type":"paragraph","text":"全党全军全国人民，要学习董必武同志的革命精神和高尚品质，在毛主席为首的党中央领导下，团结一致，坚持党的基本路线，坚持无产阶级专政下的继续革命，为巩固和加强无产阶级专政，为把我国建设成为社会主义的现代化强国而奋斗。"},{"type":"paragraph","text":"中国人民的伟大的无产阶级革命家董必武同志永垂不朽！"},{"type":"paragraph","text":"董必武同志治丧委员会名单"},{"type":"paragraph","text":"新华社一九七五年四月三日讯 董必武同志治丧委员会名单"},{"type":"paragraph","text":"毛泽东 周恩来 王洪文 康 生 叶剑英 邓小平 朱 德"},{"type":"paragraph","text":"张春桥 韦国清 刘伯承 江 青（女）  许世友 华国锋"},{"type":"paragraph","text":"纪登奎 吴 德 江东兴 陈永贵 陈锡联 李先念 李德生"},{"type":"paragraph","text":"姚文元 吴佳贤（女）  苏振华 倪志福 赛福鼎"},{"type":"paragraph","text":"宋庆龄（女）  郭沫若 徐向前 聂荣臻 陈 云 谭震林"},{"type":"paragraph","text":"李井泉 张鼎丞 蔡 畅（女）  乌兰夫 阿沛·阿旺晋美"},{"type":"paragraph","text":"周建人 许德珩 胡厥文 李素文（女）  姚连蔚 王 震"},{"type":"paragraph","text":"余秋里 谷 牧 孙 健 沈雁冰 江 华 金祖敏"},{"type":"paragraph","text":"谢静宜（女） 杨坡兰（女）"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31892ed70d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
