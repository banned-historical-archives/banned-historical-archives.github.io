ves/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"顾建棠等人在市建工局礼堂集会上的讲话（节录）","alias":"","parts":[{"type":"title","text":"四月十五日顾建棠等人在市建工局礼堂集会上的讲话（节录）"},{"type":"paragraph","text":"顾建棠说：“现在要象抗日战争那样搞统一战线，打土豪，分田地。要解决问题，就要斗争。武汉可能容易些，专县困难些。有些问题解决了，不见得路线问题解决了。要继续斗，不可沽名学霸王。上面要斗，下面要斗，上下结合。今后的斗争更艰苦，不能期待走资派的恩惠，不能听信走资派的甜言蜜语，要发扬勇敢战斗的精神，斗下去。今后我们要上促下动，打谈结合，独立自主，立足基层。上面动下面不动，不可能触动走资派。我们是打打谈谈，谈谈打打，谈是为了打。”“同志们说我们是外紧内松，现在要内紧外松。社会上的活动要搞，但更重要的是在各基层扎扎实实的搞”。"}],"authors":["顾建棠"],"dates":[{"year":1976,"month":4,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"中共武汉市委材料组，一九七六年十二月","page_start":15,"page_end":15},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ce83621dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
