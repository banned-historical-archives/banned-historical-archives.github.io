，反而更加巩固了","authors":[],"dates":[{"year":1963,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那31日电】　据阿尔巴尼亚通讯社报道，阿尔巴尼亚劳动党中央委员会第一书记恩维尔。霍查最近视察了阿尔巴尼亚南部的吉诺卡斯特和台佩莱纳等地区。他是在视察了萨兰达区以后到这些地区的。"},{"type":"paragraph","text":"霍查在上述地区参观了工厂、工地、学校、农业社和文化机关，访问了工人住宅区、农业社社员家庭、革命烈士家属等，同地方党、政领导人和劳动群众进行了亲切的谈话。他每到一处，都受到群众的热烈欢迎。"},{"type":"paragraph","text":"在同吉诺卡斯特区的党、政领导干部谈话时，霍查说。阿尔巴尼亚明年的计划是巨大的，但是完全可以完成的。"},{"type":"paragraph","text":"他说，阿尔巴尼亚的国民经济不仅没有由于帝国主义和修正主义的封锁而动摇，反而更加巩固了。取得这一切胜利的保证是劳动党的马克思列宁主义的正确领导和阿尔巴尼亚人民的伟大的爱国主义。"},{"type":"paragraph","text":"霍查在同各地劳动群众的谈话中，还谈到了有关国际共产主义运动的一些的题。他一再指出，阿尔巴尼亚劳动党同其他共产党和工人党一起，为维护马克思列宁主义的纯洁性而进行坚决斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f1c831099"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
