rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"加强党委集体领导下的首长分工负责制","authors":["远治马哲万清"],"parts":[{"type":"paragraph","text":"本报讯 乌鲁木齐部队某通信团党委在学习五中全会公报时，结合学习邓小平同志关于目前的形势和任务的报告，认真分析了党委工作状况，决定搞好党委集体领导下的分工负责制，加强和改善对部队各项工作的领导。"},{"type":"paragraph","text":"作为团一级党的组织，怎样加强和改善党的领导？团党委抓住本单位去年军事训练进步幅度小、年终考核成绩差和冬菜贮备不充裕等影响比较大的问题，发动党委成员，一个一个进行了剖析。大家回顾去年一年的工作，充分发表意见，一致认为，部队工作中暴露的问题，一个重要的原因是没有认真地实行党委集体领导下的首长分工负责制，以致抓了施工丢了训练，抓了工作丢了生活。经过分析，党委认识到，党委成员分好工，实行责任到人，是加强和改善党的领导急需要解决的问题。他们根据一九八○年的工作任务和重点，进行了明确分工。"},{"type":"paragraph","text":"这个团党委对领导干部分管的工作，提出了具体要求。要求抓军事训练的同志，在一九八○年切实抓好干部轮训和骨干培养，抓好基础训练，打好翻身仗。抓后勤工作的同志，要认真关心群众生活，努力抓好部队半机械化养猪场建设，搞好农场和连队的农副业生产，力争在一年内，使连队生活有一个较大的改善。团党委规定，分工负责各项工作的同志，每半个月要向党委汇报一次工作情况。团党委还要求每个领导干部要勤奋学习，努力精通业务技术。要带头模范执行党的路线、方针政策和决议，遵守党的纪律，带领部队艰苦奋斗，创造优异成绩迎接党的十二大召开。"},{"type":"paragraph","text":"（远治、马哲、万清、松林）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5e3bf995b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
