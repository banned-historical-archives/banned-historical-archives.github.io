ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"部署强大力量准备马鸿透逃跑时轩灭之","alias":"","parts":[{"type":"paragraph","text":"部署强大力量准备马鸿逵逃跑时歼灭之"},{"type":"paragraph","text":"（1947年6月30日）彭、习："},{"type":"paragraph","text":"马鸿逵选次令其所部见小敌则抵抗，见大敌则保存实力转移逃避。环县敌人逃跑是一证，马万荣?部骑兵此次在定边（似与我侦察部队作战）稍战即逃赴盐池又是一证。因此，你们打三边4时，除注意攻坚外，应部署强大力量准备于其逃跑时歼灭之。此外，请注意每次作战集中全力只打一点，得手后再打第二点，哪怕打一个团也是如此。这样可保证全歼，且常保有余力在自己手中，足以应付意外情况。以上请酌办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三十未"},{"type":"paragraph","text":"[1]彭、习，指彭德怀、习仲勋，当时分别任西北野战兵团司令员兼政治委员和副政治委员。"},{"type":"paragraph","text":"[2]马鸿逵，当时任国民党政府主席西北行辕副主任。"},{"type":"paragraph","text":"[3]马万荣，当时任国民党政府主席西北行辕所属骑兵第十旅第二十团团长。"},{"type":"paragraph","text":"[4]三边，指陕西西北的定边、安边和靖边。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":6,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":106,"page_end":106},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0de4679c3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
