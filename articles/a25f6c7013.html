script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"虞美人　枕上（一九二一年）","authors":["毛泽东"],"dates":[{"year":1994,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"虞美人"},{"type":"paragraph","text":"枕上（一九二一年）"},{"type":"paragraph","text":"堆来枕上愁何状，"},{"type":"paragraph","text":"江海翻波浪。"},{"type":"paragraph","text":"夜长天色总难明，"},{"type":"paragraph","text":"寂寞披衣起坐数寒星。"},{"type":"paragraph","text":"晓来百念都灰尽，"},{"type":"paragraph","text":"剩有离人影。"},{"type":"paragraph","text":"一钩残月向西流，"},{"type":"paragraph","text":"对此不抛眼泪也无由。"},{"type":"paragraph","text":"（根据作者审定的抄件刊印，手迹是未经修改的原稿，有几处与发表的文字不同。）"},{"type":"paragraph","text":"注释："},{"type":"paragraph","text":"［虞美人］词牌名，又名《虞美人令》、《一江春水》、《玉壶冰》、《忆柳曲》等。"},{"type":"paragraph","text":"［离人］指作者的夫人杨开慧。杨开慧１９０１年生，湖南长沙人。１９２０年冬，同毛泽东在长沙结婚。１９２１年加入中国共产党，在中共湘区委员会负责机要兼交通联络工作。１９３０年１１月被国民党反动派杀害。"},{"type":"paragraph","text":"［残月］拂晓时形状如钩的月亮。宋代梅尧臣《梦后寄欧阳永叔》：“五更千里梦，残月一城鸡。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a25f6c7013"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
