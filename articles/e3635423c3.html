art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"闪耀着毛主席革命文艺路线胜利的光辉","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 斯德哥尔摩消息：正在这里举行的“中国现代陶瓷展览会”，受到瑞典广大群众的热烈欢迎和赞扬。观众们高度评价中国人民在毛主席的革命文艺路线指引下，在无产阶级文化大革命期间创造出来的新型的陶瓷艺术品。"},{"type":"paragraph","text":"展览会是一月二日在这里的里尔杰瓦尔契艺术陈列馆隆重开幕的。它是由里尔杰瓦尔契艺术陈列馆、瑞典——中国协会和中国驻瑞典大使馆联合举办的。"},{"type":"paragraph","text":"在展览会开幕这一天，里尔杰瓦尔契艺术陈列馆大厅正面墙壁的正中央悬挂着毛主席的巨幅画像，两边挂着五星红旗。七百多人出席了开幕式。"},{"type":"paragraph","text":"开幕式上，许多参观者怀着崇敬的心情瞻仰了“毛主席和林彪副主席在中国共产党第九次全国代表大会上”的巨幅彩色瓷像。一位从乡间来的老人表示，他看到中国人民伟大领袖毛主席的巨像，十分高兴，他说：“毛主席慈祥的面孔使我感到浑身有力量。”"},{"type":"paragraph","text":"观众们对展出的中国现代陶瓷艺术品给予了高度评价和热烈赞扬。一位进步的艺术家说：“这次展览会闪耀着毛主席革命文艺路线胜利的光辉。文艺必须‘是为人民大众的，首先是为工农兵的’，是为社会主义革命事业服务的。在这里，我们从由毛泽东思想指导的中国革命文艺中找到了正确的方向。”还有一位参观者说：“中国的现代艺术具有强烈的政治特点，富有强烈的战斗性和生命力。它不仅有助于我们对中国的认识，而且使我们受到了很大的鼓舞。”"},{"type":"paragraph","text":"革命样板戏《沙家浜》、《红灯记》以及芭蕾舞剧《白毛女》的人物瓷像，受到观众的热烈赞扬。"},{"type":"paragraph","text":"一位非洲朋友在参观了《收租院》的泥塑像后激动地说：“《收租院》泥塑像使人们深深认识到‘枪杆子里面出政权’这个真理。”"},{"type":"paragraph","text":"观众们在看了展览会之后，在留言簿上写下了热情洋溢的语句，赞颂中国人民的伟大领袖毛主席的英明领导，赞扬中国无产阶级文化大革命以及中国社会主义建设所取得的成就。一位瑞典朋友以有力的笔法写下了五个中国大字：“毛主席万岁！”"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3635423c3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
