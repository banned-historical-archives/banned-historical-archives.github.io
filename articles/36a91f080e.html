art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"塞上草原擂战鼓批倒批臭刘少奇","authors":["总后勤部黄城子军马场指导员陈华营"],"parts":[{"type":"paragraph","text":"在无产阶级文化大革命中，我们队每一个牧工，都把开展革命大批判看成是紧跟毛主席伟大战略部署、忠于毛主席革命路线的实际行动，天天学习毛主席关于无产阶级专政下继续革命的伟大学说，天天批判刘少奇及其代理人的反革命修正主义路线，莽莽的内蒙草原，到处燃烧起革命大批判的熊熊烈火。"},{"type":"paragraph","text":"经过革命大批判，全队牧工两条路线斗争觉悟大提高。去年冬天，突然刮来特大的暴风雪，把一个队的马群冲散了。全队牧工学习了毛主席的光辉“老三篇”，狠批了刘少奇“公私溶化论”、“活命哲学”，个个斗志昂扬，与暴风雪展开了激烈的搏斗，把跑散在几百里草原上的马匹全部找回来。革命大批判，促进了人的思想革命化，带动了军马生产大幅度上升，比文化大革命前增长近三倍。"},{"type":"paragraph","text":"“宜将剩勇追穷寇，不可沽名学霸王。”我们最热烈地响应党的八届扩大的十二中全会的伟大号召，继续深入地开展革命大批判，肃清刘少奇等党内最大的一小撮走资派的反革命修正主义的思想，用战无不胜的毛泽东思想在塞上草原筑起反修的钢铁长城！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36a91f080e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
