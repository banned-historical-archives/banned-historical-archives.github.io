慕华副部长和阿里·萨利姆·比德部长在协定上签字","authors":[],"dates":[{"year":1974,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年十一月十三日电　中华人民共和国政府和也门民主人民共和国政府经济技术合作协定今天晚上在北京签字。"},{"type":"paragraph","text":"也门民主人民共和国总统委员会主席萨勒姆·鲁巴伊·阿里和我国国务院副总理邓小平出席了签字仪式。"},{"type":"paragraph","text":"我国外经部副部长陈慕华和也门民主人民共和国计划部长阿里·萨利姆·比德分别代表本国政府在协定上签字。"},{"type":"paragraph","text":"民主也门方面出席签字仪式的还有由鲁巴伊主席率领的也门民主人民共和国代表团团员阿里·萨利赫奥巴德穆克比勒、穆罕默德·萨利赫穆提厄、阿卜杜勒阿齐兹阿卜杜勒·瓦利、海达尔·阿布巴克尔·阿塔斯、法德勒穆赫辛、穆罕默德·苏莱曼·纳赛尔，代表团团员、也门民主人民共和国驻中国大使萨卡夫，代表团随行人员。"},{"type":"paragraph","text":"中国方面出席签字仪式的还有有关方面负责人姬鹏飞何英陈维稷、陶琦杜星垣黄树则张耿和、程远行、高建中李步霄，以及中国驻也门民主人民共和国大使崔健。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e8f37bcd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
