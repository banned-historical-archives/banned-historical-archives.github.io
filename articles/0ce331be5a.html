1967,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"原上海旅行服务社革命群众"},{"type":"paragraph","text":"旧上海市委内最大的一小撮走资本主义道路的当权派，秉承中国的赫鲁晓夫的投降主义哲学，适应资产阶级的需要，要我们“大办旅行服务”，公开把旅行服务拉上了为资产阶级服务的邪路。"},{"type":"paragraph","text":"在他们的黑指示下，旅行社服务的方向发生了激剧的变化，开办的班次由以短途为主，发展到以中、长途为主，服务对象也起了显著变化。参加长途旅行的几乎全是资产阶级的老爷、太太、寓公、寓婆等有闲阶级。一九六二年，资产阶级为了抗拒社会主义改造，公开提出要游山玩水。旧上海市委内一小撮反革命修正主义分子，唯恐得罪资产阶级，多次给工商联签发“通行证”。还说什么“费用不要限制”，以他们“满意”为原则。于是，一批资产阶级分子，打着“市人民代表”、“市政协委员”等头衔，到处招摇过市，住高级饭店，进出汽车代步，餐餐山珍海味，还公开叫嚣:“只要舒服，钞票不在乎!”旅行名目也越来越多，夏令有“避暑旅行”，冬季举办“南国观光”，中秋有“观湖赏月”，清明鬼节还搞“踏青扫墓”。还有什么“飞机旅行”、“新婚旅行”等等，为腐朽的资产阶级生活方式，披上了“合法”的假面具。"},{"type":"paragraph","text":"针对这些触目惊心的情况，旅行社的革命职工曾多次提出停办这种旅行服务，但旧上海市委内最大的一小撮走资本主义道路的当权派，坚持资产阶级反动立场，一再回答说，“社会有需要”，“停办是不对的”，要坚持“大办旅行服务”的方针，以博得资产阶级的欢心。他们如此挖空心思为一小撮资产阶级分子服务，积极推行“和平演变”，证明他们是十足的资产阶级在我们党内的代理人。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ce331be5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
