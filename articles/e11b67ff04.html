ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"给毛岸英的信","alias":"","parts":[{"type":"paragraph","text":"给毛岸英的信"},{"type":"paragraph","text":"（1947年9月12日）岸英儿："},{"type":"paragraph","text":"别后，晋西北一信，平山一信，均已收到。看你的信，你在进步中，甚为喜慰。永寿\"这孩子有很大进步，他的信写得很好。复他一信，请你译成外国语，连同原文，托便带去。我们在此很好，我的身体比在延安要好得多，主要是脑子休息了。你要看历史小说，明清两朝人写的笔记小说（明以前笔记不必多看），可托周扬同志设法，或能找到一些。我们这里打了胜仗，打得敌人很怕我们。"},{"type":"paragraph","text":"问你好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四七年九月十二日[1]永寿，即毛岸青，毛泽东的次子。[2]周扬，当时任晋察冀总学委主任。"},{"type":"paragraph","text":"狗已收乳别缘，省西"},{"type":"paragraph","text":"2RA兰乐h年"},{"type":"paragraph","text":"明十日毛泽东致毛岸英信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":271,"page_end":272},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e11b67ff04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
