script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本西德资产阶级报纸议论纷纷  美国所谓“有限行动”难以置信  军事冒险无助于美国挽回失败","authors":[],"dates":[{"year":1964,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本西德资产阶级报纸议论纷纷"},{"type":"paragraph","text":"美国所谓“有限行动”难以置信"},{"type":"paragraph","text":"军事冒险无助于美国挽回失败"},{"type":"paragraph","text":"据新华社讯　东京消息：据日本广播协会电台报道，日本的资产阶级报纸发表社论，抨击美国对越南民主共和国的军事冒险行动。"},{"type":"paragraph","text":"《朝日新闻》七日的社论说，“美国说是不采取扩大（战争）的方针，而只限于有限行动，但是又直接轰炸了北越本土。对此，我们感到非常惊异，并且担心美军的行为背后存在着冒险主义的想法。”"},{"type":"paragraph","text":"社论说，“美国必须意识到，假如它扩大对北越的轰炸，就将陷入严重局面。如果美国企图靠攻击北越来挽回它在老挝和南越的颓势，解决印度支那战争，那末，它必须认清，再没有比这更脱离现实的判断和政策了。”"},{"type":"paragraph","text":"据报道，《读卖新闻》六日的社论强调说，“美国的作战行动在客观上意味着对北越扩大战争。”这家报纸指出，再没有比美国认为进行局部战争也不会受到反击的“这种出于主观愿望的判断更危险的了。”"},{"type":"paragraph","text":"据新华社波恩七日电　西德一些报纸在评论美国对越南民主共和国的突然袭击时指出，美国的这种扩大南越战争的行动是经过长期策划后采取的，并对那种认为美国这种行动合乎国际法的看法表示怀疑。"},{"type":"paragraph","text":"波恩《总汇报》六日的社论说：“自从任命参谋长（联席会议主席）泰勒为驻西贡大使以来，美国就进行了一切军事准备，以便通过扩大战争来防止它在越南丛林战中的这样一种失败，这种失败对于它在亚洲的整个地位将是毁灭性的。”"},{"type":"paragraph","text":"这家报纸还说：“时间对他们不利这一点，美国人在近几周来是越来越清楚了。”"},{"type":"paragraph","text":"《南德意志报》六日在谈到美国对越南民主共和国的空袭时说，美国是否有理由进行这种空袭“按照国际法的惯用原则至少是可以争论的”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9fab6894f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
