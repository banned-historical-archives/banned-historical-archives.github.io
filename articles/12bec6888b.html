","authors":[],"dates":[{"year":1964,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"1964.01.27","type":"title"},{"text":"审判机关：四川省高级人民法院","type":"paragraph"},{"text":"填写日期：1964年元月27日","type":"paragraph"},{"text":"姓名：魏昭","type":"paragraph"},{"text":"性别：男","type":"paragraph"},{"text":"年龄：36","type":"paragraph"},{"text":"民族：汉","type":"paragraph"},{"text":"出身：地主","type":"paragraph"},{"text":"成分：学生","type":"paragraph"},{"text":"文化程度：高中","type":"paragraph"},{"text":"籍贯：湖北省均县","type":"paragraph"},{"text":"捕前住址：四川省新胜县","type":"paragraph"},{"text":"捕前职业、政治面目：劳教就业人员","type":"paragraph"},{"text":"逮捕机关：四川省公安厅","type":"paragraph"},{"text":"案件类别：反革命集团","type":"paragraph"},{"text":"刑期：死缓","type":"paragraph"},{"text":"简历：","type":"subtitle"},{"text":"解放前读书，48年隐瞒历史混入我军，随军入川，又混入我党，曾任重庆市区人委付科长，55年肃反中受到党内警告处分，57年整风中，猖狂向党进攻，被划为右派分子，开除党籍，送劳动教养。","type":"paragraph"},{"text":"参加过何种反动组织：","type":"subtitle"},{"text":"46年曾参加三青团反动组织。","type":"paragraph"},{"text":"犯罪事实（时间、地点、手段、动机、结果等）","type":"subtitle"},{"text":"送劳教后，不思悔改，62年2月，与周居正勾结，积极组织反革命集团，被委任为“中央委员”、“书记处书记”，任直属“永胜茶场盟委负责人。多次密谋策划，主张参照现代修正主义者的反动理论，制定了该集团的反革命纲领，积极策谋将“中华工农民主联盟”改为“中国马克思列宁主义者联盟”，自称为“真正的马列主义者”提出“高举马列主义旗帜和中国革命的三面大旗，在中国实现民主社会主义而奋斗”的反革命总路线。又共谋建立“盟委地下贸易委员会”。亲自发展成员2人，并指使成员到外地发展组织，造谣诬蔑，等等，妄图伺机暴动，推翻我人民民主政权。","type":"paragraph"},{"text":"证据（人证、物证）","type":"subtitle"},{"text":"有反革命纲领、路线及同案人犯周居正、罗铁夫、廖廉康等人证明。","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12bec6888b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
