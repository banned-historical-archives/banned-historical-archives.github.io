thors":[],"dates":[{"year":1971,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国二百五十万公务人员和教师举行大罢工"},{"type":"paragraph","text":"这次罢工给垄断资产阶级以沉重打击"},{"type":"paragraph","text":"新华社巴黎四日电　法国邮政、教育、卫生和服务性行业约二百五十万公务人员和教师四日举行了二十四小时全国性大罢工，要求增加工资。"},{"type":"paragraph","text":"在巴黎，数万名公务人员在市中心举行了示威游行。在里昂和图卢兹也都有数千名群众举行了示威游行。在马赛、里昂、尼斯、波尔多、南锡等城市，罢工者都举行了集会。"},{"type":"paragraph","text":"这次罢工严重影响了法国的政治经济活动和公共卫生，给垄断资产阶级以沉重打击。据报道，在巴黎和马赛，邮递工作完全中断，垃圾由于无人清除堆积在人行道上。在法国中部，特别在克莱蒙费朗，教育、邮政部门和服务性行业都几乎全部停止工作。在法国北部，市政机构完全陷于瘫痪，利尔烟草制作场也全部停工。"},{"type":"paragraph","text":"据法新社报道：近一千名记者四日在内政部前也举行了示威，抗议警察对一名记者使用暴力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"066fecf683"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
