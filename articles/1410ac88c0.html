uthors":[],"dates":[{"year":1976,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在反击右倾翻案风的斗争中，本市电车一场二十路、二十七路车队的广大干部和工人群众，坚持抓革命、促生产，取得了显著成绩。工人们一致表示，一定要以阶级斗争为纲，多出车，开好车，努力提高安全服务质量，以实际行动痛击右倾翻案风。"},{"type":"paragraph","text":"二十路、二十七路电车行驶在繁华的南京路上，春节前后，外地来沪乘客增多，客流量大大提高。这两路车队的干部、工人就想方设法，挖掘潜力，增加车辆，多开班次，今年比去年同期增加了百分之九左右。为了方便工农兵乘客携带行李物品到西站赶火车，他们加强了调度，积极做好宣传工作。在乘客拥挤的市百一店这个站，每天增放十多个班次的空车，受到乘客的欢迎。在春节前，西站有一班火车要在深夜十二点五十二分到达。车队的干部、工人不怕疲劳，千方百计把旅客送走。青年工人还举办集体住宿的抗大式学习班，组织学习、批判，并在深夜开义务加班车。部分老工人在晚上十点多钟下班后，仍等在车队里开义务加班车。这样，每天至少可增开三、四辆车，多时可增开八辆车到西站接送旅客。一月二十五日，有八辆车在火车站等客。这天正值下雨，又碰到火车晚点，大家一直等到下半夜三点多钟。火车一到，工人们热情地帮助旅客拎行李，扶老携幼，并把他们及时送回各自的目的地。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1410ac88c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
