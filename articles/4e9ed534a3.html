<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"努力取得普通劳动者的资格","authors":["龚群"],"dates":[{"year":1976,"month":7,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"龚群"},{"type":"paragraph","text":"上海市第五建筑工程公司干部到工地搞三同的经验很好。它告诉我们:领导干部要使自己避免变成吸工人血的党内资产阶级分子，就必须努力取得普通劳动者的资格。"},{"type":"paragraph","text":"这一点，十分重要。"},{"type":"paragraph","text":"领导干部只有取得普通劳动者的资格，才能避免处于同工人阶级尖锐的阶级斗争状态。脱离劳动，是蜕变为走资本主义道路当权派的开始。在社会主义革命的历史阶段中，党内确实有资产阶级。党员中的一部分，也可能会变成新的资产阶级分子。这是阶级斗争的规律。摆在各级领导干部面前的一个严峻问题是:如何使自己不变过去?坚持参加集体生产劳动，取得普通劳动者的资格，是反修防变、坚持无产阶级专政下继续革命的一个重要措施。"},{"type":"paragraph","text":"领导干部只有取得普通劳动者的资格，才能取得指挥革命和生产的发言权、领导权。毛主席指出:“管理也是社教。如果管理人员不到车间小组搞三同，拜老师学一门至几门手艺，那就一辈子会同工人阶级处于尖锐的阶级斗争状态中，最后必然要被工人阶级把他们当作资产阶级打倒。不学会技术，长期当外行，管理也搞不好。以其昏昏，使人昭昭，是不行的。”毛主席的尖锐批评击中了那些党内走资派的要害。自己脱离实际，脱离群众，幼稚得很，无知得很，却又毫无自知之明，在那里说三道四、指手划脚，动辄还要训人骂人，这不是既可笑又可恶吗?这样的人去领导革命、管理生产，怎么会搞得好呢?"},{"type":"paragraph","text":"有些同志嘴上也在说要和工人划等号，可是办起事来，或者人到了基层单位，又往往把等号竖了起来，变成了一道隔墙。等号变成了隔墙，他又成了昏昏然的聋子和瞎子，群众的心声听不见，新生事物看不清，在那里“闭塞眼睛捉麻雀”，自然是连最起码的知识也得不到，最后，必然会同工人阶级处于尖锐的对立状态。这些同志还是吃了“领导高明”论的亏。所以，不破“领导高明”论，即使到了群众之中，也不会放下官架子，那仍然和工人划不成等号。"},{"type":"paragraph","text":"正是从这点来看，市建五公司领导干部到工地后，认真拜工人为师，了解工人的愿望，代表工人的意愿，同时学几门手艺的事迹，更值得称道。本报今天发表的调查中提到，这个公司的干部同工人心连心，想工人所想，急工人所急，还在劳动中普遍掌握了三门以上的土建技术，干部组成的建筑队能够独立地建造房屋。不熟悉工人，怎么能代表工人、领导工人?不学会一门至几门手艺，怎么叫普通劳动者、怎么能在劳动中和工人有共同语言?市建五公司的干部们参加劳动不是为了摆个样子，也不是为了应付上级领导部门的检查，他们在劳动中象个工人的样子，真正取得了普通劳动者的资格。"},{"type":"paragraph","text":"取得普通劳动者的资格决不是一劳永逸的。一劳永逸的想法是违反辩证法的。即使过去曾经取得了普通劳动者的资格，但是你现在不劳动了，“逸”起来了，又浮上去做官当老爷了，那么，工人群众完全有权利重新取消你的普通劳动者资格。如果进而变为吸工人血的走资派，工人阶级又完全有权利将这些新的走资派打倒。新老干部，概莫能外。泥工出身的党委副书记董福金在文化大革命前的教训，我们应当引以为戒。社会主义革命还有一段很长的历史行程，我们应当铭记党的基本路线和基本纲领，不断在人们相互关系方面限制资产阶级法权，密切干群关系，一辈子与工农划等号，为实现共产主义的伟大目标而奋斗到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e9ed534a3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
