主义的斗争","authors":[],"dates":[{"year":1964,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京1日电】　东京消息:日本共产党大坂府党代表大会在五月三十一日一致通过决议，谴责志贺义雄和铃木市藏的叛党行为，并保证要粉碎他们破坏党的阴谋活动。这次代表大会是在五月三十日开幕，共举行了两天。"},{"type":"paragraph","text":"决议表示，完全拥护中央委员会第八次全体会议所通过的决议和声明，决心要为巩固党和加强党的活动而努力，并且要进一步加强对现代修正主义和现代教条主义的斗争。"},{"type":"paragraph","text":"出席大会的代表们，在会上揭露了右翼社会民主党人和反党修正主义分子在大坂的群众组织中进行破坏活动的事实，并讨论了同这种破坏活动作斗争的问题。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"067a9bbff5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
