script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抵制资产阶级思想腐蚀  福建打击贩卖、播放黄色录像犯罪活动  逮捕法办十人，破获长乐县一起案件","authors":["张铭清"],"dates":[{"year":1983,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抵制资产阶级思想腐蚀"},{"type":"paragraph","text":"福建打击贩卖、播放黄色录像犯罪活动"},{"type":"paragraph","text":"逮捕法办十人，破获长乐县一起案件"},{"type":"paragraph","text":"本报讯　记者张铭清报道：福建省采取有力措施，排除各种阻力，坚决查禁和严厉打击复制、贩卖和组织播放反动、黄色下流录像制品的违法犯罪活动。经初步查明，涉及这种犯罪活动的有省直机关和福州市有关单位238人，其中有不少人是干部子弟，现已逮捕法办10人，收容审查18人。"},{"type":"paragraph","text":"今年初，在长乐县古槐公社屿头大队，破获了一起放映淫秽录像案件。这个大队从1982年10月开始，由私人集资购买12套录像设备。先后弄来16部黄色录像片，非法进行营业性播放，每张票价高达10元左右。此案查获后，发现录像片来源涉及省直机关和福州市一些单位。中共福建省委认为，打击复制、贩卖和播放黄色录像犯罪活动，是一场抵制资产阶级思想腐蚀、反对精神污染的严重斗争。省委成立了查禁黄色录像领导小组，针对一些单位斗争不力的状况，要求各级领导亲自部署，专人负责，克服软弱状态。不论涉及哪个单位、涉及什么人，都要一抓到底，彻底查清。经过认真调查，黄色录像制品的来源和复制、贩卖、组织播放的有关人员，已经初步查明。目前正在进一步清查。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e6c5f0f51"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
