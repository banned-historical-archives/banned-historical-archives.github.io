ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对粟裕关于部署部队进驻福建新建机场的请示的批语","alias":"","parts":[{"type":"paragraph","text":"对栗裕关于部署部队进驻福建新建机场的请示的批语！"},{"type":"paragraph","text":"（1955年5月19日）退贺、粟照办。请注意研究周总理所提意见"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十九日"},{"type":"paragraph","text":"[1]这个批语写在中国人民解放军总参谋长栗裕1955年5月12日给中共中央军委的报告上。报告说，福建地区新建机场将于6月底竣工，为配合外交斗争，保护浙闽沿海航线的安全，防止和打击敌机对福建沿海主要城市的空袭，并为解放金门、马祖创造条件，当上述基地竣工后，我即应进驻部队。"},{"type":"paragraph","text":"[2]贺，指贺龙，当时任中共中央军委委员、国务院副总理。"},{"type":"paragraph","text":"[3]周恩来在栗裕的报告上批有以下意见：“各项均妥，只第四项执行时应注意时机和有利条件。”“摧毁敌人雷达后，敌人仍可再设，因之必须在我较有把握条件下方可进行空炮联合作战，否则易遭过多损失。”栗裕报告的第四项，是关于马祖敌设雷达的处置方法。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":5,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":99,"page_end":99},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f940c6a5dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
