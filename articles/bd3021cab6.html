script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴西资产阶级议会民主制成了可怜的幌子  政变集团独揽大权滥施暴政  大批议员和公职人员被解职　四万人身陷囹圄惨遭迫害","authors":[],"dates":[{"year":1964,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴西资产阶级议会民主制成了可怜的幌子"},{"type":"paragraph","text":"政变集团独揽大权滥施暴政"},{"type":"paragraph","text":"大批议员和公职人员被解职　四万人身陷囹圄惨遭迫害"},{"type":"paragraph","text":"据新华社八日讯　里约热内卢消息：在四月初发生亲美反动军事政变的巴西，目前已处于军事独裁的恐怖统治下。大规模的镇压和逮捕仍在继续进行。"},{"type":"paragraph","text":"由政变军人组成的“最高革命司令部”在颠复古拉特政府之后，一面调兵遣将控制全国局势，在各政府机关中派驻军事代表，一面授权自己“执行宪制权力”，发号施令，成为掌握独裁大权的中央“影子内阁”，从而使立法和行政机构形同虚设。"},{"type":"paragraph","text":"“最高革命司令部”违反宪法颁布的所谓“制度法”，授权军事首脑剥夺任何人的政治权利或议员资格，并授权临时总统随时宣布戒严状态、修改宪法，解除以至逮捕公职人员。到本月七日为止，根据这项法令被剥夺政治权利的巴西军政界著名人士已达二百多人，其中大批联邦议员和州议员同时被取消议员资格。"},{"type":"paragraph","text":"政变军人还直接接管了很大一部分州一级的政权。据巴西报纸报道，继东北部和北部各州的政权相继落入军人之手后，军方在本月初又废黜了里约热内卢州州长巴德歇尔·西尔维拉而任命第一军前参谋长保罗·托里斯继任这个职务。"},{"type":"paragraph","text":"为了大规模清洗所谓“共产党嫌疑分子”，政变当局在各级政府中都成立了“特别调查委员会”，对数以万计的公职人员加以“审查”，其中还有许多人被撤职。"},{"type":"paragraph","text":"在军队方面，政变当局已勒令数以百计的军官退入后备役。"},{"type":"paragraph","text":"与此同时，政变当局在各地的大规模逮捕和迫害活动仍在继续进行。监狱已人满为患，连船只也被用来当作囚牢。据六日到达乌拉圭的众议员布里佐拉揭露，目前被捕入狱的将近四万人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd3021cab6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
