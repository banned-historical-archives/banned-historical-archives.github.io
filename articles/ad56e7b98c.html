art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"三中全会路线不会改变反对资产阶级自由化的斗争主要在政治思想领域进行","authors":[],"parts":[{"type":"paragraph","text":"据新华社北京1月26日电 中共中央政治局委员、国务院副总理李鹏今天晚上在这里说，党和人民绝对不会放弃和改变十一届三中全会以来党的路线、方针和政策，因为这些路线、方针和政策已经使中国的社会主义建设事业得到了前所未有的发展，广大人民生活有了较大程度的改善。"},{"type":"paragraph","text":"李鹏是在国家外国专家局在人民大会堂为外国老专家举行的迎春招待会上讲这番话的。"},{"type":"paragraph","text":"李鹏说，最近，我们党中央作了重大的人事变动，目的是为了更好地贯彻和执行十一届三中全会以来党的路线、方针和政策。我们的路线、方针、政策没有变，也不会变。"},{"type":"paragraph","text":"李鹏说，我们三中全会以来的路线既包括改革、开放、搞活，也包括坚持四项基本原则，两者缺一不可。"},{"type":"paragraph","text":"他指出，搞资产阶级自由化、就是否定四项基本原则、主张资本主义制度。我们目前进行的反对资产阶级自由化的斗争，主要是在政治思想领域当中进行。如果不旗帜鲜明地反对这种错误思潮，就会破坏我们的四化大业，改革、开放、搞活也就不能保证沿着正确的方向前进。但我们不搞政治运动，不会重复过去“左”的错误作法。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad56e7b98c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
