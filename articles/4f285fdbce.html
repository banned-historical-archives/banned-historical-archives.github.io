ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对李素文要求多到基层接触实际的来信的批语","alias":"","parts":[{"type":"paragraph","text":"对李素文要求多到基层接触实际的来信的批语"},{"type":"paragraph","text":"（1975年11月14日）似可同意。请登奎同志商李素文同志酌处。"},{"type":"paragraph","text":"十一月十四日"},{"type":"paragraph","text":"[1]中共中央委员、全国人大常委会副委员长李素文1975年11月1日给毛泽东写信说，我长期在基层做财贸工作，最近又接触一些上层的财贸工作，深感现在财贸战线上的形势虽然很好，但桥梁还不那么畅通，纽带联得不那么紧，总想在这方面做点工作，认真执行主席关于实行三个三分之一的指示，扎扎实实地搞些调查研究。今年调我到中央抓财贸工作，这是党对我的信任，但是我担心在上边时间长了会陷到文件堆里，忙于送往迎来。希望能多给我一些机会到基层接触群众，接触实际，多做些调查研究，把财贸工作做好。另外，现在一些妇女工作也让我出面，对这一工作我实在不熟悉，建议由其他熟悉的同志担当，使我集中力量搞好财贸工作。"},{"type":"paragraph","text":"[2]登奎，即纪登奎，当时任中共中央政治局委员、中央组织宣传组组员、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":11,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":96,"page_end":96},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f285fdbce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
