白重暄"],"dates":[{"year":1998,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报西安专电　引起广泛关注的油画《毛主席去安源》近日又起风波，原“毛泽东思想的光辉照亮了安源工人运动展览会”(以下简称“安展”)军宣队队长杨彦杰称，他有资料(包括回忆)可以证明该油画系集体创作，执笔人是陈省而非刘春华。"},{"type":"paragraph","text":"离休后现居住西安的杨彦杰，1968年11月担任“安展”军宣队队长，至今仍保存着“安展”从安源和全国各地搜集到的文字记录汇编、展出几经修改的讲解词、闭展后的总结报告和全体人员的合影。据杨彦杰说，“安展”当时设有的书画展，主要有来自博物馆的画家范曾、陈省(此人画油画，据说后来因杀妻被处决了)，还有当时仅24岁，学装潢美术的红卫兵刘春华等人。整个展出期间坚持在绘画美工方面挑大梁一直到最后的是陈省。陈省这个人如果还在世的话，恐怕就不会出现今天的油画《毛主席去安源》拍卖风波。因为，他最清楚油画《毛主席去安源》是画在从博物馆找来的一块旧布上的(见闭馆总结)；画笔和油色涂料等等，都是他平时用过的。许多人都知道油画《毛主席去安源》是陈省画的。但1968年7月1日公开发表该画时，署名作者却是刘春华或写刘春华执笔。记得和陈省谈起这事时，陈说:“刘春华同志是红卫兵小将，咱是臭老九!”就这样以讹传讹，直至闭馆总结上仍然写油画《毛主席去安源》作者刘春华。不过紧接作者刘春华之后，便清楚写着刘春华是个年仅24岁的红卫兵小将，是学装潢工艺美术的，根本不会画油画……“他们如何如何克服困难……终于完成了画作。”“他们”所指当然就不是一个人了，充其量刘春华只不过是作者之一，但不是主要的。这些情况，当时“安展”的许多工作人员都很清楚，绝非像刘春华所说的“从构思到创作就我一人”。他还回忆说，《毛主席去安源》在全国引起关注后，展览结束后，全部展品移交给了历史博物馆，共有100多幅。假如这批画还在库的话，可以请专家对《一九二一年冬毛主席深入安源矿井同工人交谈》和《毛主席去安源》两幅油画进行技术鉴定，看是否出自同一人之手，以弄清事实，还历史本来面目。"},{"type":"paragraph","text":"杨彦杰表示:陈省早已作古了，为这件事上正名，于他于我均无实际意义，但这对历史有意义，对国家有意义，对艺术创作有意义。我们都应该对国家对民族对子孙后代负责，对自己的言行负责，这也是我几十年来奉行的人生信条。我的回忆只是个人的，也许有偏颇的地方，这需要当年的参与者们共同来核实印证。但我绝不会昧着良心信口雌黄。(白重暄)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd3d513ef3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
