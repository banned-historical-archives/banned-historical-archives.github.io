[{"year":1994,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"电视剧《毛泽东在西柏坡》将播出"},{"type":"paragraph","text":"本报北京１２月２５日讯记者易凯报道：为纪念毛泽东同志诞辰１０１周年，石家庄市委宣传部、市文化局、河北省影视中心联合摄制的４集电视连续剧《毛泽东在西柏坡》，将于近期在中央电视台播出。"},{"type":"paragraph","text":"该剧通过毛泽东在西柏坡高瞻远瞩、运筹帷幄、博采众议、正确地指挥三大战役、粉碎国民党武装偷袭、构制新中国未来蓝图等重大历史事件，通过他与民众、战友、部下、子女等多层次思想感情的交流，塑造了这位历史伟人的真知灼见、博大胸怀和高尚情操。引人注目的是，该剧领袖人物全部由新人出演，其中饰演毛泽东的是非专业演员彭江。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0d4e56679"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
