<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大平首相会见谷牧副总理时表示  日中经济贸易关系将取得更大进展  谷牧副总理同园田外相会谈并参观钢铁和石油化工厂","authors":[],"dates":[{"year":1979,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大平首相会见谷牧副总理时表示"},{"type":"paragraph","text":"日中经济贸易关系将取得更大进展"},{"type":"paragraph","text":"谷牧副总理同园田外相会谈并参观钢铁和石油化工厂"},{"type":"paragraph","text":"据新华社东京九月三日电  日本首相大平正芳今天上午在首相官邸亲切会见谷牧副总理。大平首相说，“我内心正在考虑，争取年内访问中国。日本国民也期望华国锋总理早日访问日本。”"},{"type":"paragraph","text":"会见时，谷牧副总理首先向大平首相转达了华国锋总理、邓小平副总理对他的亲切问候。谷副总理说：“大平首相为发展中日两国和平友好关系作出过重大贡献。中国人民对你有着深厚的感情。中国政府和人民随时准备热烈欢迎你访问中国。”"},{"type":"paragraph","text":"大平首相表示相信，通过谷牧副总理这次访日，日中两国关系，尤其是经济贸易关系将取得更大进展。他说，“关于两国经济关系，希望今后在继续保持、发展民间的关系同时，政府尽力予以协助和支持。”"},{"type":"paragraph","text":"会见时在座的，日方有外务大臣园田直、内阁官房长官田中六助等。中方有江苏省革命委员会主任许家屯、中国国际贸易促进委员会主任王耀庭、国家基本建设委员会副主任谢北一等。中国驻日本大使符浩也在座。"},{"type":"paragraph","text":"据新华社东京九月三日电  日本外相园田直和中国国务院副总理谷牧九月三日上午在东京日本外务省举行会谈，双方一致表示将为进一步发展两国经济合作关系作出努力。"},{"type":"paragraph","text":"园田外相说，日中两国关系，自从缔结日中友好和平条约以后，已从朋友关系变成亲戚关系，而且这一关系越来越巩固。"},{"type":"paragraph","text":"他说，以谷牧副总理这次访日为契机，将进一步加强以支援中国现代化为中心的日中紧密关系。"},{"type":"paragraph","text":"关于对中国提供政府贷款问题，双方一致表示：将继续就这一问题进行接触，积极工作，争取在今年内大平首相访华时取得成果。"},{"type":"paragraph","text":"同一天，谷牧副总理等还先后拜会了日本建设相渡海元三郎、通商产业相江崎真澄、经济企划厅长官小坂德三郎、运输相森山钦司。在亲切友好的交谈中，宾主都为日中两国关系的顺利发展感到高兴。日本朋友都表示要为进一步发展两国政府间的经济合作关系作出贡献。"},{"type":"paragraph","text":"新华社东京九月三日电  谷牧副总理及其一行九月二日在参观新日本制铁公司君津制铁所后，听取了新日铁董事长稻山嘉宽就中国发展钢铁工业提出的见解。"},{"type":"paragraph","text":"稻山认为，中国现在发展钢铁工业和日本发展钢铁工业的情况和条件已大不相同，因此要找到适合中国条件的发展钢铁工业的办法。他说，现代钢铁工业从某种意义上讲，是一门综合艺术。他坦率地指出，根据他访问中国所看到的情况，似乎各部门都是平行的，水电、设备、运输、港口，各抓各的，事情不太好办。他衷心希望能尽快改善这种状况。"},{"type":"paragraph","text":"稻山是在制铁所工人俱乐部和中国客人共进午餐时发表这番见解的。"},{"type":"paragraph","text":"上午，稻山董事长和新日铁总经理斋藤英四郎、日本国际贸易促进协会理事长荻原定司等陪同谷牧副总理一行参观。"},{"type":"paragraph","text":"斋藤总经理向中国客人介绍了新日铁的生产和技术发展水平。其特点是：充分利用东京湾高效率海上运输，合理的工厂布局；大型而高效率的设备；最大限度地利用电子计算机实现了连贯性生产的技术管理系统；重视环境保护和绿化。"},{"type":"paragraph","text":"斋藤高兴地说：“新日铁正在配合中国具有世界先进技术水平的宝山钢铁总厂的建设，并接受（中国）实习人员的培训工作。我们将动员全所的一切力量支援宝山钢铁厂的建设。”"},{"type":"paragraph","text":"当天下午谷牧一行还冒雨参观了三井石油化学公司千叶工厂。"},{"type":"paragraph","text":"中国客人在这两个工厂参观中，均受到厂方负责人和工人们的热烈欢迎。（附图片）"},{"type":"paragraph","text":"九月三日上午，日本首相大平正芳在首相官邸会见了谷牧副总理，并进行了亲切交谈。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"谷牧","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63d1c9e8ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
