<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席“抓革命，促生产，促工作，促战备”的伟大方针指引下  上海一批工厂提前完成全年生产计划","authors":[],"dates":[{"year":1969,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席“抓革命，促生产，促工作，促战备”的伟大方针指引下"},{"type":"paragraph","text":"上海一批工厂提前完成全年生产计划"},{"type":"paragraph","text":"据新华社上海二十二日电　在伟大领袖毛主席“抓革命，促生产，促工作，促战备”的伟大方针指引下，上海有一批工厂已提前完成了一九六九年全年的生产计划。这些工厂分属于冶金、仪表电讯、机电、纺织和轻工等行业。其中有无产阶级文化大革命以来，月月、季季、年年都提前完成国家生产计划的上海无线电一厂；有不为名、不为利，为革命甘心当好“配角”的上海合金轴瓦厂；有坚持狠抓革命，猛促生产，取得显著成果的上海浦江电表厂、变压器厂、第一铜带厂、东风有色合金厂，以及上海力车厂、水平仪厂、挤出机厂、无线电二十七厂、汽油机厂、油箱厂和火柴厂等等。"},{"type":"paragraph","text":"党的“九大”以来，上海工业战线广大革命工人认真贯彻“九大”精神，进一步开展活学活用毛泽东思想的群众运动，坚持用革命统帅生产，使整个工业战线出现了更加生气勃勃的大好形势。首都钢铁公司发出开展社会主义革命竞赛的建议后，推动上海工业战线进一步掀起了抓革命、促生产的新高潮。上海无线电一厂从无产阶级文化大革命以来，月月、季季、年年提前完成国家生产计划，一部分同志因此一度滋长了骄傲情绪。党的“九大”以后，全厂各车间、部门、班组都普遍举办了毛泽东思想学习班，制订了落实“九大”各项战斗任务的措施，有力地推动了革命和生产的飞跃发展，全厂提前五十五天完成了全年生产计划。"},{"type":"paragraph","text":"在抓革命、促生产、促工作、促战备的社会主义革命竞赛热潮中，许多工厂的革命工人活学活用毛泽东思想，发扬敢想敢干的革命精神，大力开展技术革新活动，搞成了大批新技术、新工艺，为提前完成全年国家计划创造了条件。上海合金轴瓦厂今年的轴瓦生产任务比去年增加了百分之二十，并且主动承担了农村柴油机需要的配件喷油嘴和拖拉机配件齿轮的生产任务。在生产任务增加的情况下，工人们掀起了轰轰烈烈的群众性技术革新运动，先后实现了五十三项主要的技术革新和工艺改革项目，成倍地提高了劳动效率，节约了大量的人力物力，保证全厂提前五十天超额完成了全年生产计划。上海标准件七厂、上海螺帽六厂等单位，由于大搞技术革新，节约了大量的原材料。上海变压器厂工人群众在毛主席关于“中国人民有志气，有能力，一定要在不远的将来，赶上和超过世界先进水平”的教导鼓舞下，经过反复试验，试验成功了用薄钢板压成散热片的最新技术，节约钢材百分之四十五，生产效率提高百分之三十。"},{"type":"paragraph","text":"目前，上海这批已经提前完成今年生产计划的工厂正在乘胜前进。工人们一面发扬连续作战的革命作风，抓紧年底以前几十天时间，继续为国家生产更多更好的产品；一面在加紧维修重要设备，积极为明年的生产做好准备，以夺取新的更大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c07fa1701"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
