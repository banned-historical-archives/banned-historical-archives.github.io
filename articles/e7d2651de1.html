art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"朱德委员长致电哀悼拉扎克总理逝世李先念副总理，阿沛·阿旺晋美副委员长等 前往马来西亚驻华使馆吊唁 邓小平副总理和外交部、外贸部等送了花圈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年一月十六日讯 中华人民共和国全国人民代表大会常务委员会委员长朱德一月十五日打电报给马来西亚最高元首叶海亚·佩特拉，对马来西亚总理拉扎克逝世表示深切的哀悼和慰问。电报全文如下："},{"type":"paragraph","text":"吉隆坡"},{"type":"paragraph","text":"马来西亚最高元首苏丹·叶海亚·佩特拉·伊卜尼·苏丹·易卜拉欣陛下："},{"type":"paragraph","text":"惊悉马来西亚总理敦·哈吉·阿卜杜勒·拉扎克·宾·达图·侯赛因阁下不幸逝世，我谨代表中国政府和中国人民向陛下，向马来西亚政府和人民，表示深切的哀悼和慰问。"},{"type":"paragraph","text":"拉扎克总理为改善和发展中马两国关系进行了不懈的努力，为实现中马两国关系正常化作出了重要贡献。这将留在我国人民的记忆中。"},{"type":"paragraph","text":"请向拉扎克总理的家属转达诚挚的慰问。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长 朱德"},{"type":"paragraph","text":"一九七六年一月十五日于北京"},{"type":"paragraph","text":"新华社一九七六年一月十六日讯 国务院副总理李先念、人大常委会副委员长阿沛·阿旺晋美今天下午前往马来西亚驻中国大使馆，吊唁马来西亚总理敦·阿卜杜勒·拉扎克·宾·达图·侯赛因逝世。"},{"type":"paragraph","text":"邓小平副总理，我国外交部、外贸部和北京市革命委员会送了花圈。"},{"type":"paragraph","text":"前往吊唁的还有外交部长乔冠华，外贸部副部长周化民，北京市革命委员会副主任杨寿山，以及外交部司长朱传贤、副司长程瑞声。"},{"type":"paragraph","text":"吊唁时，马来西亚驻中国大使何森和大使馆外交官员在场。"},{"type":"paragraph","text":"新华社一九七六年一月十五日讯 吉隆坡消息：马来西亚代总理侯赛因·奥恩宣布，马来西亚总理敦·阿卜杜勒·拉扎克因病于一月十四日在伦敦逝世，终年五十三岁。"},{"type":"paragraph","text":"敦·阿卜杜勒·拉扎克是一九七○年九月就任马来西亚总理的。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7d2651de1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
