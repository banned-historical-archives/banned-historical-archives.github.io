art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国企业扭亏增盈工作取得很大成绩“四人帮”干扰破坏造成的企业发生亏损，盈利逐年下降的局面已经扭转","authors":[],"parts":[{"type":"paragraph","text":"一九七七年全国企业扭转亏损增加盈利工作取得了很大成绩。"},{"type":"paragraph","text":"全国扭亏增盈工作，是从去年下半年开始抓起来的。不到半年，全国企业比上一年减少亏损的金额，超过全国职工从去年十月开始增加工资的一年的总额。国营企业利润总额达到历史最高水平。出现了盈利逐月上升，亏损逐月减少的可喜趋势。“四人帮”干扰破坏造成的企业发生亏损，盈利逐年下降的局面，已经扭转。"},{"type":"paragraph","text":"去年，全国大多数企业的利润都显著增加。石家庄市纺织工业局所属企业，一九六七年至一九七六年每年增产增收，十年上缴利润、税金共达二十六亿元，相当于固定资产总值的九倍。去年的利润比一九七六年又增长百分之二十一，上缴利润、税金共四亿元以上。山西省煤炭局直属的十三个煤矿，去年消灭了亏损，盈利一亿三千多万元。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab0c1e021b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
