art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"哥伦比亚国会授予叶剑英金质特级十字勋章","authors":[],"parts":[{"type":"paragraph","text":"据新华社北京5月25日讯 正在这里访问的哥伦比亚参议院副议长伊萨萨和卡德纳斯受哥伦比亚国会的委托，授予叶剑英委员长金质特级十字勋章，以表彰他在促进两国议会友好关系方面所表现的对哥伦比亚政府、议会和人民的友好感情。"},{"type":"paragraph","text":"授勋仪式今天晚上在哥伦比亚大使馆举行。伊萨萨主持了授勋仪式。卡德纳斯宣读了哥伦比亚国会今年5月15日通过的关于授予叶剑英金质特级十字勋章的决议。"},{"type":"paragraph","text":"韦国清副委员长受叶剑英的委托，接受勋章。韦国清说，叶剑英衷心感谢哥伦比亚国会给予他的这一崇高荣誉，并认为，这不仅是给他个人的荣誉，也是哥伦比亚人民对中国人民真挚友情的珍贵表示。他衷心祝愿中哥两国的友好合作关系和两国人民的兄弟友谊不断巩固和发展。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bf019b1cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
