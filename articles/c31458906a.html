ors":[],"dates":[{"year":1982,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人大前夕叶剑英同志对本报记者发表重要谈话"},{"type":"paragraph","text":"希望党员做执行新宪法的模范"},{"type":"paragraph","text":"本报讯　十一月二十四日上午，叶剑英委员长在住宅里接见本报记者纪希晨、蒋铎、罗自苏，发表了重要谈话。"},{"type":"paragraph","text":"叶委员长精神很好，愉快地谈到即将召开的全国人民代表大会第五届第五次会议。他说，这次大会将要通过新的宪法。这部新宪法是党领导全国人民广泛讨论和修改后制订的。这是人民自己制订的宪法，人民有责任监督宪法的执行，监督政府按宪法办事。宪法通过以后，全体共产党员，要宣传新宪法，作执行新宪法的模范。"},{"type":"paragraph","text":"记者问到对青年一代的希望时，叶委员长说：我是老年人了，八十五岁了。中国的未来是青年们的。青年人朝气蓬勃，中国的未来毕竟是他们的。为了未来，青年人要跟老年人合作，保证宪法的实施。"},{"type":"paragraph","text":"叶委员长对老干部寄予殷切的希望。他说，老干部经历了历史的曲折，走过弯路，革命的时间比较长。他们有丰富的经验，斗争的阅历比较深。我们的高级干部跟着毛主席革命几十年，受过毛主席长期的教育和培养。如果没有毛主席的领导，我们可能还在上海的租界里过生活。老干部应当把自己的回忆作为教材来教育青年，把失败的教训，成功的经验，传授给青年人。这个新宪法就是经过长期斗争，用无数次的成功和失败换来的，要十分珍惜，要把我们党的优良传统发扬光大。"},{"type":"paragraph","text":"谈到军队的现代化建设时，叶委员长说，军队是国家政权的支柱。我们军队的士气很高，上下也很团结，这是我们进步的地方。工厂的干部和工人制造了先进的武器，我们使用武器的人，要学会掌握这些武器。军队应当执行宪法，捍卫宪法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c31458906a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
