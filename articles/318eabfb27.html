及一些国际重大问题，进行了广泛的交谈","authors":[],"dates":[{"year":1979,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见英国朋友"},{"type":"paragraph","text":"同英中文化协会执委会代表团就我国实现四个现代化、民主集中制以及一些国际重大问题，进行了广泛的交谈"},{"type":"paragraph","text":"新华社北京三月二十一日电  邓小平副总理今天上午会见英中文化协会执委会代表团时，就中国实现四个现代化、民主集中制以及一些国际重大问题，同英国朋友们进行了广泛的交谈。"},{"type":"paragraph","text":"代表团是由这个协会的会长马尔科姆·麦克唐纳率领的。七十八岁的麦克唐纳先生多次访问中国。邓副总理愉快地说：“我同你首次见面。但是周恩来总理和陈毅副总理都曾会见过你。”邓副总理还对麦克唐纳先生和英中文化协会自一九七四年成立以来为促进英中两国友好交往作出的贡献表示赞赏。英国驻中国大使珀西·柯利达参加了会见。会见时在座的有对外友协副会长楚图南、谢邦定，外交部长助理宋之光。"},{"type":"paragraph","text":"邓副总理会见由马尔科姆·麦克唐纳会长率领的英中文化协会执委会代表团。新华社记者  王传国摄（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"318eabfb27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
