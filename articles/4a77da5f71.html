rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓副主席会见德鲁洛维奇大使"},{"type":"paragraph","text":"中共中央副主席、国务院副总理邓小平五月八日下午会见了即将离任的南斯拉夫驻中国大使德鲁洛维奇。"},{"type":"paragraph","text":"邓副总理会见加尔万部长一行"},{"type":"paragraph","text":"国务院副总理邓小平五月八日下午会见墨西哥国防部长加尔万上将一行，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，对小平副总理对墨西哥贵宾们来中国访问表示热情欢迎。他指出，中国和墨西哥两国关系很好。加尔万将军一行的访问是中墨两国友好关系发展的新篇章。他请加尔万部长回国后，转达华国锋主席、叶剑英委员长和他本人对洛佩斯总统的问候。"},{"type":"paragraph","text":"加尔万部长请邓副总理向华国锋主席转达洛佩斯总统的问候。"},{"type":"paragraph","text":"会见时在坐的有国防部副部长粟裕，中国人民解放军副总参谋长何正文，外交部副部长王海容等。"},{"type":"paragraph","text":"会见以后，邓小平副总理设宴招待加尔万部长一行。"},{"type":"paragraph","text":"纪登奎副总理会见西萨摩亚农业代表团"},{"type":"paragraph","text":"国务院副总理纪登奎五月八日下午会见由西萨摩亚农林部长弗依玛诺·米米奥率领的西萨摩亚农业代表团，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"陈锡联副总理会见民主也门教育部长"},{"type":"paragraph","text":"国务院副总理陈锡联五月八日下午会见民主也门教育部长赛义德·阿卜杜勒·海尔·努班及其随行人员，同他们进行了亲切友好的谈话。 （均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a77da5f71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
