","河南医学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"张静吾的右派言论","type":"title"},{"text":"河南医学院张静吾","type":"authors"},{"text":"[张静吾：河南医学院副院长、民盟河南省委委员、河南省人民政协常务委员]","type":"subtitle"},{"text":"马列主义灵活运用辩证法是共产党咋办咋有理。","type":"paragraph"},{"text":"我的意见是“民主办校”，我建议组成“校务委员会”，把它由谘询机构变成决策机构，应当包括学校领导人，但只是作为成员之一，参加这机构的成员应当轮流当主席，院专和党委书记不固定当主席。","type":"paragraph"},{"text":"卢长山是白脸奸臣是千真万确的，像这样的白脸奸臣多得很。","type":"paragraph"},{"text":"土改叫我扫地出门，违犯了政策，我认为土地改革只要下道命令，不需斗争就可成功。","type":"paragraph"},{"text":"镇反是党不杀耕牛，给人脸抹灰。","type":"paragraph"},{"text":"学校领导非得把老教授的威信打垮，不能树立，他们的威信，这就是整人的真正原因，就像农村斗地主一样，不斗倒地主农民不能翻身；在学校里好像不斗倒老年青年就不能进步。","type":"paragraph"},{"text":"“一臣不事二主”是共产党合并咱呢，还是咱合并共产党？","type":"paragraph"}],"comments":[],"origin":"《右派言论集》（河南医学院马列主义教研室编印，1958年4月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"245d81b95f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
