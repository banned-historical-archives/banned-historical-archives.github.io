":["杨登渠","王天铎"],"dates":[{"year":1984,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昆明军区党委书记谢振华说"},{"type":"paragraph","text":"彻底否定“文革”才能消除派性增强党性"},{"type":"paragraph","text":"本报讯　记者王天铎、杨登渠报道：人民解放军昆明军区党委书记谢振华4月16日向全体党员提出要求，在整党的全过程中都要学习《关于建国以来党的若干历史问题的决议》，彻底否定“文革”，消除派性，增强党性。"},{"type":"paragraph","text":"昆明军区在十年动乱中是个“重灾区”，一度派性严重，至今派性还没有彻底消除。谢振华指出：在这次整党中，一定要把根除派性作为一个重点问题认真解决。为此，党委提出五项措施："},{"type":"paragraph","text":"一、根据若干历史问题的决议精神，彻底否定“文革”，从而认清在“继续革命”、“一个阶级推翻一个阶级”那一套理论指导下的派性活动，都是错误的，谈不上你高我低，更不能容许用那一套来搅混今天干部和工作中的功过是非。"},{"type":"paragraph","text":"二、根据《关于党内政治生活的若干准则》中的规定：把正常工作关系或一般的工作失误和派性及派性活动区别开来，不能用它来混淆是非，扩大派性的消极影响。"},{"type":"paragraph","text":"三、党委和领导干部必须旗帜鲜明，坚持党性，反对派性。对有派性活动的人要严肃批评教育，发现用派性干扰整党的要作严肃处理。"},{"type":"paragraph","text":"四、对极少数派性严重、仍在进行派性活动，不适宜在现职岗位上工作的人，要调动他们的工作。"},{"type":"paragraph","text":"五、开展广泛的谈心活动，提倡有话当面讲，以消除同志之间的隔阂。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbe43fe637"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
