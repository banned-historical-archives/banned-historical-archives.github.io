script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为把我国建设成为社会主义现代化强国而奋斗  国务院隆重嘉奖工交基建战线先进企业和劳模  华国锋叶剑英邓小平李先念等领导同志出席祝贺李先念同志在会上讲话一百一十八个先进企业的代表和二百二十二名劳模接受国家授予的崇高奖励","authors":[],"dates":[{"year":1979,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为把我国建设成为社会主义现代化强国而奋斗"},{"type":"paragraph","text":"国务院隆重嘉奖工交基建战线先进企业和劳模"},{"type":"paragraph","text":"华国锋叶剑英邓小平李先念等领导同志出席祝贺李先念同志在会上讲话一百一十八个先进企业的代表和二百二十二名劳模接受国家授予的崇高奖励"},{"type":"paragraph","text":"新华社北京九月二十八日电  国务院今天下午在人民大会堂举行隆重授奖仪式，嘉奖工业、交通、基本建设战线的先进企业和劳动模范。"},{"type":"paragraph","text":"由全国各地区和工业、交通、基建各行业评选出来的一百一十八个全国先进企业的代表和二百二十二名全国劳动模范，身佩红花登上主席台，接受国家给予的崇高奖励。"},{"type":"paragraph","text":"中共中央主席、国务院总理华国锋，中共中央副主席、人大常委会委员长叶剑英，中共中央副主席、政协全国委员会主席邓小平，中共中央副主席、国务院副总理李先念，以及中共中央政治局委员、候补委员，人大常委会副委员长，国务院副总理，中央军委负责人，政协全国委员会副主席，最高人民法院院长、最高人民检察院检察长等领导同志出席了今天的大会，向获奖的全国先进企业和全国劳动模范热烈祝贺。"},{"type":"paragraph","text":"参加今天大会的还有党政军各部门的负责人、群众代表，以及北京市工交基建战线的先进单位、模范人物的代表，共九千多人。"},{"type":"paragraph","text":"今天下午，人民大会堂喜气洋溢，华灯辉煌。会场悬挂着两幅大标语。一幅是：“充分发挥先进集体、劳动模范的带头作用、骨干作用、桥梁作用，团结全体职工，为把我国建设成社会主义现代化强国而奋斗！”一幅是：“大力开展以优质高产多品种低消耗为中心的增产节约运动！”"},{"type":"paragraph","text":"余秋里副总理主持了今天的大会，宣读了《国务院关于表彰工业交通基本建设战线全国先进企业和全国劳动模范的决定》。《决定》说明了表彰先进企业和劳动模范的重要意义，并要求全国先进企业和全国劳动模范谦虚谨慎，戒骄戒躁，再接再厉，积极做出新贡献。《决定》号召全国工业、交通、基本建设等战线的企业和职工，向全国先进企业和全国劳动模范学习，在增产节约运动中掀起一个比学赶帮超社会主义劳动竞赛的新高潮，以优异的成绩迎接明年全国职工劳动模范代表大会的召开。"},{"type":"paragraph","text":"李先念同志在会上讲了话。他代表党中央和国务院向出席授奖仪式的全国劳动模范、全国先进企业的代表们致以热烈的祝贺，向战斗在全国各地各条战线上的劳动模范、先进企业和职工同志们表示亲切的慰问和敬意。"},{"type":"paragraph","text":"他高度评价了先进企业、劳动模范在我国三十年社会主义革命和社会主义建设中作出的巨大贡献。"},{"type":"paragraph","text":"他说，你们起了推动历史前进的作用。国家和人民给你们以荣誉，这是完全应该的。光荣属于全心全意为社会主义事业贡献力量的劳动者！"},{"type":"paragraph","text":"李先念同志强调说，摆在工人阶级面前的历史任务是光荣而艰巨的。当前最主要的是要坚决贯彻三中全会“解放思想，开动机器，实事求是，团结一致向前看”的方针，认真解决思想路线问题，以保证四个现代化的顺利实现。（全文见第二版）"},{"type":"paragraph","text":"在欢快的乐声中，党和国家领导人把“嘉奖令”授予全国先进企业的代表，把金质奖章和全国劳模证书授给全国劳动模范。这时，台上台下掌声雷动，一片欢腾。北京市五百名少先队员手执五彩花束进入会场，向来自全国的劳动模范和先进企业的代表朗诵了题为《献给推动历史前进的先驱》的献词。"},{"type":"paragraph","text":"全国劳动模范陈福汉在会上宣读了《工业、交通、基本建设战线全国先进企业和全国劳动模范倡议书》。倡议书提出，要在新长征中继续发挥带头、骨干、桥梁作用，谦虚谨慎，戒骄戒躁，再接再厉，勇往直前，去争取更大的胜利。"},{"type":"paragraph","text":"授奖仪式结束以后，党和国家领导人及党政军有关部门负责人同全国先进企业的代表、全国劳动模范一起照了像。（附图片）"},{"type":"paragraph","text":"工业、交通、基本建设战线全国先进企业、全国劳动模范授奖仪式在京举行。党和国家领导人华国锋、叶剑英、邓小平、李先念同志等向全国先进企业颁发嘉奖令。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02cf4e2d1f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
