ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给赛福鼎和帕哈太克里乡农民的信","alias":"","parts":[{"type":"paragraph","text":"给赛福鼎?和帕哈太克里乡农民的信"},{"type":"paragraph","text":"（1952年8月30日）赛福鼎同志："},{"type":"paragraph","text":"根据你的意见，对疏附县帕哈太克里乡的农民同志们的来信，写了一封回信，烦为转交为荷！"},{"type":"paragraph","text":"致以同志的敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年八月卅日"},{"type":"paragraph","text":"二喀什区疏附县帕哈太克里乡全体农民同志："},{"type":"paragraph","text":"感谢你们今年三月在庆祝土地改革胜利时写给我的信。你们已经从地主阶级封建土地所有制的束缚中获得解放，希望你们在爱国"},{"type":"paragraph","text":"[1]赛福鼎，即赛福鼎·艾则孜，当时任中央人民政府委员、新疆省人民政府副主席。"},{"type":"paragraph","text":"给赛福鼎和帕哈太克里乡农民的信丰产的口号之下，更加团结，努力生产，改善自己的物质生活；并在这个基础之上，一步一步地提高自己的文化水平。"},{"type":"paragraph","text":"毛泽东一九五二年八月三十日"},{"type":"paragraph","text":"航守中央人民席具备美新疆者氏所府"},{"type":"paragraph","text":"福装毛泽东致赛福鼎信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":216,"page_end":217},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61d18d7cc4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
