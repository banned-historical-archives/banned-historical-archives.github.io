art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"庆祝坦桑尼亚成立一周年罗金巴纳临时代办举行招待会 邓小平代总理李先念副总理出席","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十六日讯 坦桑尼亚联合共和国驻中国大使馆临时代办罗金巴纳，今晚在北京饭店举行招待会，庆祝坦桑尼亚联合共和国成立一周年。"},{"type":"paragraph","text":"国务院代总理邓小平，副总理李先念，人大常委会副委员长郭沫若、张治中，政协全国委员会副主席高崇民，国防委员会副主席蔡廷锴等，应邀出席招待会。"},{"type":"paragraph","text":"罗金巴纳临时代办和李先念副总理在招待会上讲话，祝中国和坦桑尼亚两国的友好关系日益发展。"},{"type":"paragraph","text":"李先念副总理在讲话中强烈谴责美帝国主义正在肆无忌惮地侵略越南并加紧准备扩大印度支那的战争，野蛮地镇压刚果（利）人民的革命斗争并一再策划颠覆刚果（利）周围的邻国。亚非人民反对帝国主义和新老殖民主义的斗争，从来是互相支持，互相鼓舞的。在亚非人民和全世界人民的声援下，越南人民抗美救国的伟大斗争必胜，刚果（利）人民争取独立自由的正义斗争必胜。RW：罗金巴纳；坦桑尼亚外交官；访华；李先念；国务院副总理；接见外宾"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d90afa77c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
