script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"cb043827-1a6a-46f3-863d-a430958e5a0d","name":"无产阶级文化大革命参考资料（1966年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"毛主席对中央首长的讲话","alias":"","parts":[{"type":"paragraph","text":"毛主席对中央首长的讲话"},{"type":"paragraph","text":"毛主席：“五、廿五”聂元梓大字报是廿世纪六十年代的中国巴黎公社的宣言书。意义超过巴黎公社。这种大字报我们写不出来。"},{"type":"paragraph","text":"（儿个少先队员给他爸爸贴大字报，爸爸忘了过去，有给我们讲毛泽东思想，而是问我们在学校的分数，好的给奖。）"},{"type":"paragraph","text":"毛主席叫陈伯达同志搏告这些小朋友，大字报写的很好！毛主席：我向大家，青年是文化大革命的大军，要把他们充分发撑出来。"},{"type":"paragraph","text":"回到北京后，感到很难过，冷冷清清，有些学校大门都关起来了。甚至有些镇压学生运动。去压学生运动！只有北洋军！共产党怕学生运动是反马克思主义的。有人天天走群众路，为人民服务，而实际上是走资产阶级路，为资产阶级服务。"},{"type":"paragraph","text":"团中央应该站在学生这边，可是，他站在锁压同学那边，反对文化大革命？美帝、苏修、日修、反动派。"},{"type":"paragraph","text":"借“内外有别”是怕革命，大字报贴出来，又盖起来，这样的情况不能允许。这是方向错，赶快扭转，把一切框框打个稀巴烂！"},{"type":"paragraph","text":"我们相信群众，做群众的学生，才能当群众的先生。现在这个文化大革命是个惊天动地的事情，能不能，敢不敢过社会主义这一关？这一关是最后消灭阶级，缩短三大差别。"},{"type":"paragraph","text":"反对，特别是餐产阶级“权威”思想，这就是破，如果没有这个破，社会主义就立不起来，要做到一一斗二批三改也是不可能的。"},{"type":"paragraph","text":"光坐办公室听汇报不行，只有依靠群众，相信群众闹到底，准备革命到自已头上来。党政领导，党员负责同志，应当有这个准备，现在要把革命闹到底。从这方面自已，改造自已，这样才能赶上，不然就只有靠在外面。"},{"type":"paragraph","text":"有些同志斗别人很凶，斗自已不行，这样自已永久过不了关。"},{"type":"paragraph","text":"靠你们引火烧身，爆风点火。放不放？因为是烧到自已头上。同志这样回答：准备好。不行就自已罢自已的官，生为共产党具，死为共产党真。坐沙发吹风扇生活不行。"},{"type":"paragraph","text":"给群众定框框不行，北京大学看到学生起来，定框框，美其名日：“纳人正规”，其实纳入邪勒。有些学校给学生戴“反革命分子”帽子。"},{"type":"paragraph","text":"（外办的张彦跑到外面给人廿儿个“反革”帽子。）毛主席説：这样就把群众放到对立面去了。不怕坏人，究竞坏人有多少？广大学生大多数是好人。"},{"type":"paragraph","text":"（有人提出乱的时候，打乱档案怎么办？）"},{"type":"paragraph","text":"毛主席：怕什么人，环人来，证明是坏人，好人你怕什么，要将一个怕字换来一个敢字，要最后证明社会主义关是不是过，你们要政治街帅，要到群众里面去，和群众在一起，把无产阶级文化大革命搞的更好。"},{"type":"paragraph","text":"抄自政法毛泽东主义红卫兵《材料集》"},{"type":"paragraph","text":"北航复具军人红卫兵按化学教研室翻印+15 ·"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":25,"page_end":25},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cfbddf3eb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
