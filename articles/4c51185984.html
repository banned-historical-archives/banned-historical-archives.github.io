script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"关于各野战军的进军部署","description":"根据毛泽东手稿刊印。","dates":[{"year":1949,"month":5,"day":23}],"parts":[{"text":"关于各野战军的进军部署","type":"title"},{"type":"paragraph","text":"总前委，刘张李，粟张，并告林罗，彭贺："},{"type":"paragraph","text":"（一）粟张养午电悉。你们应当迅速准备提早入闽，争取于六、七两月内占领福州、泉州、漳州及其他要点，并准备相机夺取厦门。入闽部队只待上海解决，即可出动。"},{"type":"paragraph","text":"（二）二野亦应准备于两个月后以主力或以全军向西进军，经营川、黔、康。二野目前任务是准备协助三野对付可能的美国军事干涉，此项准备是必需的，有此准备即可制止美国的干涉野心，使美国有所畏而不敢出兵干涉。但在上海、宁波、福州等处被我占领，并最好由三野以一部兵力协助山东攻占青岛（假如上海占领后，青岛敌军尚未撤退）以后，美国出兵干涉的可能性就很少了，那时二野就可以西进了。（三）四野现有两个军渡江，尚有六个军已至陇海、长江之间，约于六月上旬可渡江，另有四个军正由新乡、安阳地区出发，约六月中旬可以渡江。四野主力（六个军及两广纵队）于七月上旬或中旬可达湘乡、攸县之线，八月可达永州、郴州之线，九月休息，十月即可尾白崇禧退路向两广前进，十一月或十二月可能占领两广。一野（四个兵团三十五万人）年底以前可能占领兰州、宁夏、青海，年底或年初准备分兵两路：一路由彭率领位于西北，并于明春开始经营新疆；一路由贺率领经营川北，以便与二野协作解决贵州、四川、西康三省。（四）如果上海、福州、青岛等地迅速顺利解决，美国出兵干涉的可能性业已消失，则二野应争取于年底或年底以前占领贵阳、重庆及长江上游一带，并打通长江水路。如果二野能于八月一日左右开动或更早一点开动，则上述任务是可能完成的。但此项任务在二野内部暂时不要下达，因为中央对此尚是一种拟议，最后决定要待上海、福州占领之后。（五）胡宗南全军正向四川撤退，并有向昆明撤退消息，蒋介石、何应钦及桂系正在做建都重庆、割据西南的梦，而欲消灭胡军及川、康诸敌，非从南面进军断其退路不可。因此，除二野应准备经贵州入川之外，四野在消灭白崇禧占领广西之后，应以一部经百色入云南，请林、罗即令曾泽生军早日出动南下。该军是否已从热河出发，盼林、罗查告。（六）你们意见如何，盼告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"辰梗"}],"comment_pivots":[{"part_idx":1,"offset":10,"index":1},{"part_idx":1,"offset":18,"index":2},{"part_idx":2,"offset":8,"index":3},{"part_idx":3,"offset":33,"index":4},{"part_idx":3,"offset":303,"index":5},{"part_idx":3,"offset":580,"index":6},{"part_idx":3,"offset":606,"index":7},{"part_idx":3,"offset":703,"index":8},{"part_idx":3,"offset":718,"index":9}],"is_range_date":false,"authors":["毛泽东"],"comments":["刘张李，指刘伯承、张际春、李达，当时分别任第二野战军司令员、副政治委员兼政治部主任和参谋长。粟张，指粟裕、张震，当时分别任第三野战军副司令员兼第二副政治委员和参谋长。","林罗，指林彪、罗荣桓，当时分别任第四野战军兼华中军区司令员和第一政治委员。彭贺，指彭德怀、贺龙，当时分别任第一野战军司令员兼政治委员和西北军区司令员。","指粟裕、张震一九四九年五月二十二日午时关于请示入闽部队何时出动给中共中央军委的电报。","康，指西康省，一九五五年撤销，当时辖区为今四川省西部、西藏自治区东部。","白崇禧，当时任国民党军华中军政长官公署长官。","胡宗南，当时任国民党军西安绥靖公署主任。","何应钦，当时任国民党政府行政院院长兼国防部部长。","曾泽生军，指曾泽生任军长的第四野战军第五十军。","热河，即热河省。见本卷第82页注〔8〕。"],"page_start":311,"page_end":312,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c51185984"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
