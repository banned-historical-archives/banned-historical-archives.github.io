ors":[],"dates":[{"year":1967,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"缅甸朋友欢呼人类有史以来最光辉的革命"},{"type":"paragraph","text":"中国文化大革命加速帝修反的灭亡"},{"type":"paragraph","text":"据新华社仰光电　缅甸朋友热烈欢呼中国无产阶级文化大革命，指出这场伟大的革命加速了帝国主义、修正主义和一切反动派的灭亡。"},{"type":"paragraph","text":"一位缅甸朋友欢呼，中国无产阶级文化大革命将铲除一切牛鬼蛇神，进一步巩固中国的无产阶级专政。他说，世界革命人民把中国无产阶级文化大革命看作是他们自己的事业的一部分，并给予完全的和衷心的支持。"},{"type":"paragraph","text":"一位缅甸知识界的人士说，人类有史以来，进行了各种各样的革命斗争，在这些革命中，中国的无产阶级文化大革命是规模最大，最光辉的伟大的革命斗争。文化大革命使人类历史进入一个崭新的阶段，它的伟大胜利将震撼全世界，大大促进世界人民的革命运动，加速帝国主义、修正主义和一切反动派的灭亡。"},{"type":"paragraph","text":"另一位缅甸朋友说，文化大革命将使中国——世界革命的基地和反帝斗争的支柱——永远沿着革命道路前进，因此，文化大革命对中国，对世界人民的革命事业都具有重大的意义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af77b9ca76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
