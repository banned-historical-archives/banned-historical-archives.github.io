script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"电勉吴化文","alias":"","parts":[{"type":"paragraph","text":"电勉吴化文!!"},{"type":"paragraph","text":"（1948年10月22日）吴军长、杨旅长、赵旅长、何旅长，并转全体官兵均鉴："},{"type":"paragraph","text":"贵军长等率部起义，发表通电，决心参加人民解放事业，极为欣慰。中国共产党站在人民立场上，对于任何国民党军队的官兵们，不问其过去行为如何，只要他们能够在人民解放战争的紧要关头，幡然觉悟，脱离国民党政府的反动领导，加入人民解放军阵营，坚决反对美国帝国主义及其走狗国民党反动派，即表示热烈欢迎。贵军长等此次义举，符合人民的希望，深堪庆贺。尚望团结全军，力求进步，改善官兵关系、军民关系，为革命战争在全国的胜利奋斗。"},{"type":"paragraph","text":"毛泽东十月二十二日"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":99,"page_end":99},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c69e946a3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
