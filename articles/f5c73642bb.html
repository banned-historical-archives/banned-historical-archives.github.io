争面目暴露","authors":[],"dates":[{"year":1965,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共《赤旗报》号召在参院选举中粉碎叛党分子的破坏阴谋"},{"type":"paragraph","text":"现代修正主义者逃避反美侵越斗争面目暴露"},{"type":"paragraph","text":"新华社八日讯　东京消息：日本共产党机关报《赤旗报》今天发表社论，号召在即将举行的参议院选举中，粉碎同现代修正主义的世界潮流结合在一起、并受到美国和日本反动派怂恿的反党修正主义者的阴谋。"},{"type":"paragraph","text":"社论说：“在美帝国主义正在越南扩大侵略战争和日益陷于孤立的情况下，现代修正主义的世界潮流在‘和平共处’的虚伪借口下逃避反对美帝国主义的斗争，一味追随美帝国主义，从而在世界人民面前暴露了他们的机会主义和修正主义的真面目及其破产。”社论指出：“反对和出卖我们党的志贺义雄、内藤知周、春日庄次郎和其他修正主义者，力图联合起来，以便达到攻击日本共产党的唯一和丑恶的目的，弥补日益明显的政治和组织上的破绽，从而作好准备，以满足修正主义世界潮流的期望。”"},{"type":"paragraph","text":"社论指出：“他们让神山茂夫在东京都选区参加参议员竞选的消息一透露，立即激起了党内外的愤怒，结果是，党变得空前团结，党和群众之间的联系进一步加强了。”社论说：“即使按照某些外国势力的期望和在它们的支持下，建立了新的反党集团，显然，腐朽的现代修正主义集团将孤立于日本人民，走上彻底垮台和破产的道路。”"},{"type":"paragraph","text":"社论强调说：“但是，现代修正主义者拒不承认他的国际路线的全面失败，继续在攻击和破坏我们的党。反党的修正主义者以拼命阻挠野坂参三主席的胜利当选作为他们的最大目标，他们追随美帝国主义和日本垄断资本集团的国际路线，配合它们对我党进行进攻。决不能小看他们的阴谋。”"},{"type":"paragraph","text":"社论最后呼吁说：“必须揭露他们的反党和反革命的背叛的实质和阴谋，激起广大群众的愤怒，迫使他们走投无路，从而放弃参与即将举行的选举的图谋。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5c73642bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
