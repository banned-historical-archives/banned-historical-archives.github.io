art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想改造灵魂","authors":[],"parts":[{"type":"paragraph","text":"在当前这场触及人们灵魂的无产阶级文化大革命中，认真地组织党员学习毛主席关于思想上完全入党的教导，有着极为重要的意义。"},{"type":"paragraph","text":"思想上完全入党，这是摆在党的思想建设面前的一项极为严肃的任务。对老一些的党员来说，有一个保持无产阶级晚节的问题。老党员只靠过去的一点“本钱”，不加紧自我改造，进一步实现思想革命化，要保证一辈子革命下去，永远做一个共产主义战士，这是不可能的。新党员一般没有经过严重考验，有些人组织上入了党，思想上并没有完全入党。因此，对新党员来讲，实际上有一个思想上入党的问题。这两部分党员的问题，都必须很好解决。"},{"type":"paragraph","text":"毛主席教导我们：“世界观的转变是一个根本的转变”。我们党员中相当数量的同志是非无产阶级出身，他们带着种种非无产阶级思想到党内来。剥削阶级的各种旧思想、旧习惯，也在不断侵袭我们。思想上完全入党，就是要彻底和一切剥削阶级思想决裂，大灭资产阶级思想，大兴无产阶级思想，用毛泽东思想改造自己的灵魂。"},{"type":"paragraph","text":"要思想上完全入党，就要认真读毛主席的书，听毛主席的话，照毛主席的指示办事。要投身到三大革命运动的洪流中去接受考验与锻炼，在阶级斗争的大风大浪中去经风雨、见世面。我们要彻底克服形形色色的资产阶级个人主义，真正把自己锤炼成一个无限忠于毛主席，无限忠于毛泽东思想的坚强的无产阶级先锋战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec48ee84ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
