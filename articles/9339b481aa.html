"dates":[{"year":1956,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏加诺总统拜会毛泽东主席"},{"type":"paragraph","text":"毛泽东主席邀请贵宾共进晚餐"},{"type":"paragraph","text":"新华社30日讯　印度尼西亚共和国总统苏加诺和同他一起来中国访问的高级官员，今天下午五时三十分在中南海勤政殿拜会了中华人民共和国主席毛泽东。"},{"type":"paragraph","text":"拜会时，在座的有朱德副主席，刘少奇委员长，周恩来总理和副委员长宋庆龄、林伯渠、李济深、沈钧儒、郭沫若、黄炎培、彭真、李维汉、陈叔通、赛福鼎，副总理陈云、彭德怀、邓小平、邓子恢、贺龙、陈毅、乌兰夫、李先念，最高人民法院院长董必武，最高人民检察院检察长张鼎丞，国防委员会副主席程潜、张治中、傅作义、龙云，外交部副部长张闻天，中国驻印度尼西亚大使黄镇。"},{"type":"paragraph","text":"拜会时，印度尼西亚驻中国大使维约普拉诺托也在座。"},{"type":"paragraph","text":"新华社30日讯　中华人民共和国主席毛泽东今晚邀请印度尼西亚共和国总统苏加诺共进晚餐。"},{"type":"paragraph","text":"印度尼西亚共和国外交部长阿卜杜加尼和印度尼西亚驻中国大使维约普拉诺托也应邀出席。"},{"type":"paragraph","text":"出席作陪的，有朱德副主席、刘少奇委员长、周恩来总理、宋庆龄副委员长和陈毅副总理。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9339b481aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
