tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“是毛主席教我这样做的”","authors":[],"parts":[{"type":"paragraph","text":"一天，吉林省怀德县孔家屯二队的贫下中农们围坐在学习室里，正在兴奋地谈论着活学活用毛泽东思想的心得和体会。忽然，大队革委会主任崔福急匆匆地跑进来说：“大路上一个妇女要生孩子了，谁家给腾间房子！”崔福的话刚落音，大家就争着往自己家里请。五好社员范永清怕自己争不到，一边叫小女儿淑香回家收拾房子，一边向崔福说：“我们家房子宽敞，到我们家去。”崔福说：“好，到老范家去。”"},{"type":"paragraph","text":"要生孩子的青年妇女叫刘玉敏，姐姐家在梨树县，因为生头一个孩子心里不踏实，特地从黑龙江赶到姐姐家来。没想到在半路上肚子一阵阵疼，眼看就要生了。来接她的姐夫很发愁，他知道按老风俗，别人到家里来生孩子是不吉祥的。怎么办呢？他正发愁，一群人跑来，簇拥着把刘玉敏接到了范永清家。"},{"type":"paragraph","text":"范永清的老伴郑淑珍和女儿范淑云，七手八脚收拾好房子，张罗着把孕妇抬进里屋。一会儿，接生员来了。大伙有的烧水，有的端盆，这家送来了鸡蛋，那家送来了小米，不大功夫，孩子生了下来。范大娘正忙着，只听门外有个孩子喊：“大娘啊，小鸡掉到大酱缸里啦！”范大娘出门一看，一缸大酱被小鸡整脏了。她一边拾掇，一边想：难怪有人说，外人在家生孩子不吉祥！嘴里不由得冒出一句“真丧气”，手脚也慢了下来。这些，家庭小课堂辅导员淑云都看在了眼里。"},{"type":"paragraph","text":"晚上，淑云领着全家学习毛主席的教导：“一切革命队伍的人都要互相关心，互相爱护，互相帮助。”她接着说：“旧社会，地主老财装鬼弄神搞迷信，说什么外人在家里生孩子不吉祥。今天学习，咱们就批判这个封建迷信。”女儿刚说完，老范接着讲了一段苦难家史。"},{"type":"paragraph","text":"那是一九四七年冬天，大雪足有几尺厚。国民党反动派整天抓丁抢粮。家里呆不住，老范那临产的二嫂只好到河西去躲一躲。半路上，肚子疼得厉害，眼看就要分娩了。正是大年三十晚，冰天雪地，滴水成冰，到那去找房子啊！求东家拜西家，有钱人家都说不吉利，不让进屋去。二嫂只好在篱笆障子根下避避风，生下了孩子。为了不忘这个仇恨的日子，二嫂给孩子取名叫“障根”。"},{"type":"paragraph","text":"听了家史，淑云说：“无产阶级文化大革命大破‘四旧’，大立‘四新’，我们可不能让‘四旧’出来害人。”这些话，句句敲在范大娘的心上，她激动地说：“对！封建迷信是地主老财唬弄人的，咱可不上那个当。”"},{"type":"paragraph","text":"第二天一早，范大娘走进里屋，向刘玉敏亮了思想，说：“昨天我说那话你听见啦？你可别见怪，这都是老封建的流毒。咱们听毛主席的话，错了就改，不信那个邪。”说完，她把大鸡蛋挑出来，做给玉敏吃。刘玉敏感动地拉着范大娘的手说：“大娘啊，你真比我亲妈还要亲，我该怎么感谢你呀！”范大娘说：“还是毛主席亲，是毛主席教我这样做的，要感谢恩人毛主席。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48317bc623"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
