script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"这是资产阶级的艺术观","authors":["麦茵"],"dates":[{"year":1952,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"读者　麦茵"},{"type":"paragraph","text":"韩义同志错误思想的危害性是必须引起警惕的。这是代表着一小部分文艺工作者对当前开展文艺活动的看法。"},{"type":"paragraph","text":"韩义同志的言论，是一种“巧妙”的烟幕。它用以掩饰自己的不敢正视现实，掩饰对自己的可怜“估价”，想藉口离开当前激烈斗争的“火线”、去拥抱那些“水晶宫”之类“艺术品”的演出。"},{"type":"paragraph","text":"不想以火热感情投身现实的政治斗争中去改造自己、不想以反映和表现这伟大斗争作为光荣而且迫要的任务!韩义同志要我们的艺术工作怎样搞呢?"},{"type":"paragraph","text":"韩义同志的思想是有它历史的和社会的原因，这就是已破碎了的资产阶级“艺术观”在作祟。"},{"type":"paragraph","text":"请韩义同志及那些也有同样想法的同志去看一下(或复习一下)一九四六年八月廿六日联共(布)党中央委员会“关于话剧场上演剧目及其改善方策的决议”，那里尖锐地指出韩义同志类型的思想及其当走的道路。它指出那些“剧作家都规避不谈现代的根本问题，不知道人民的生活和需要，不善于描写苏维埃人的优秀的特点和素质。这些剧作家忘记了。苏维埃戏剧艺术，只有当它积极宣传那成为苏维埃制度主要基础、苏维埃国家的政策的时候，才能完成它在劳动者教育事业方面的重大任务”。"},{"type":"paragraph","text":"因此，韩义同志必须认识自己，批判自己，积极地起来投入三反、五反的运动中来改造和提高自己。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf727b3d87"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
