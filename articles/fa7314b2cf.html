art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是胜利的旗帜","authors":["马国政"],"parts":[{"type":"paragraph","text":"我坚决响应党中央的号召，更高地举起毛泽东思想伟大红旗，干一辈子革命，学一辈子毛主席著作。干到老学到老，彻底改造世界观，树立无产阶级的雄心壮志，作彻底的革命派，将中国革命和世界革命进行到底。在这次无产阶级文化大革命中，我决心站到斗争的最前列，同一切牛鬼蛇神坚决斗争，捍卫伟大的毛泽东思想，保卫祖国的社会主义江山。"},{"type":"paragraph","text":"我是一个政治工作干部，不仅自己要努力学习毛主席著作，还要积极宣传毛泽东思想，捍卫毛泽东思想，和广大群众一起，永远忠于党，忠于毛主席，忠于毛泽东思想，为实现伟大的共产主义理想而奋斗。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa7314b2cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
