art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席语录发下来（大鼓）","authors":["曾石龙黄汉英"],"parts":[{"type":"paragraph","text":"军营一片红花开，"},{"type":"paragraph","text":"毛主席语录发下来，"},{"type":"paragraph","text":"手捧语录望北京，"},{"type":"paragraph","text":"歌儿飞向中南海。"},{"type":"paragraph","text":"毛主席呀毛主席，"},{"type":"paragraph","text":"战士对您最热爱，"},{"type":"paragraph","text":"日日夜夜想念您，"},{"type":"paragraph","text":"盼望到您身边来，"},{"type":"paragraph","text":"语录好比金凤凰，"},{"type":"paragraph","text":"展翅千里落营寨，"},{"type":"paragraph","text":"看到了语录看到了您，"},{"type":"paragraph","text":"热血激荡心花开。"},{"type":"paragraph","text":"毛主席呀毛主席，"},{"type":"paragraph","text":"您的教导咱记心怀，"},{"type":"paragraph","text":"您说要学张思德，"},{"type":"paragraph","text":"咱愿为人民终生放光彩！"},{"type":"paragraph","text":"您说要学老愚公，"},{"type":"paragraph","text":"咱迎着困难朝前迈！"},{"type":"paragraph","text":"您说要学白求恩，"},{"type":"paragraph","text":"咱永当世界革命派。"},{"type":"paragraph","text":"毛主席语录随身带，"},{"type":"paragraph","text":"有空咱就学起来，"},{"type":"paragraph","text":"野营路上学语录，"},{"type":"paragraph","text":"万道雄关脚下踩；"},{"type":"paragraph","text":"练兵场上学语录，"},{"type":"paragraph","text":"杀声如雷传天外；"},{"type":"paragraph","text":"战士立场坚似铁，"},{"type":"paragraph","text":"风吹浪打不摇摆！"},{"type":"paragraph","text":"军营一片红花开，"},{"type":"paragraph","text":"毛主席语录发下来，"},{"type":"paragraph","text":"咱要永远干革命，"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7ed93e50e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
