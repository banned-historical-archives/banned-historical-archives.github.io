script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"祝贺保加利亚解放十一周年毛主席刘委员长周总理的贺电","authors":[],"dates":[{"year":1955,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京八日电】　中华人民共和国主席毛泽东、全国人民代表大会常务委员会委员长刘少奇、国务院总理兼外交部长周恩来，致电保加利亚人民共和国国民议会主席团主席达米扬诺夫、部长会议主席契尔文科夫、外交部长涅伊切夫，祝贺九月九日保加利亚解放十一周年。电文如下:"},{"type":"paragraph","text":"保加利亚人民共和国国民议会主席团主席格·达米扬诺夫同志:"},{"type":"paragraph","text":"保加利亚人民共和国部长会议主席伏·契尔文科夫同志:"},{"type":"paragraph","text":"保加利亚人民共和国外交部长明·涅伊切夫同志:"},{"type":"paragraph","text":"值此保加利亚从法西斯主义的奴役下解放十一周年之际，我们谨代表中华人民共和国政府和人民向你们，并通过你们向保加利亚人民共和国政府和人民致衷心的祝贺。"},{"type":"paragraph","text":"中华人民共和国政府和人民怀着极其兴奋的心情注视着保加利亚人民共和国十一年来在光荣的保加利亚共产党的领导下，在社会主义建设事业中所取得的巨大成就。这些成就使保加利亚人民获得了日益繁荣的幸福生活，并加强了以苏联为首的和平、民主、社会主义阵营的力量。祝兄弟的保加利亚人民在实现第二个五年计划和保卫欧洲和世界和平的事业中获得更大的胜利。我们深信中保两国的兄弟友谊必将随着我们两国社会主义建设事业的推进而更加巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会"},{"type":"paragraph","text":"常务委员会委员长"},{"type":"paragraph","text":"刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理兼外交部长　周恩来"},{"type":"paragraph","text":"一九五五年九月七日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f55514a48d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
