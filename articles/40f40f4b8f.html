ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"关于学习和宣传中央“七七”宣言的通知","alias":"","parts":[{"type":"paragraph","text":"关于学习和宣传中央“七七”宣言\"的通知"},{"type":"paragraph","text":"（1946年7月8日）各局，转各省委、区党委："},{"type":"paragraph","text":"（一）中央“七七”宣言应在党内开展讨论，团结全党同志执行中央路线，将党内一部分同志中存在的悲观失望情绪根本扫除。（二）引导党外人士在座谈会中讨论时局，争取他们同意我党主张，团结一切进步分子及中间派和我党一致行动。（三）将宣言中各项要点在报纸刊物上作文发挥或作讲演，例如，美国反动派与中国反动派互相勾结危害中国；一切反动派进攻必须打败与能够打败；中国法西斯猖獗不是表示他们强大与有生命力，而是表示他们软弱与回光返照；国际国内民主力量发展壮大足以打败一切反动派；宣言中四项要求的重要性与必须实现；一部分人对国际与中国光明前途认识不足是错误的；爱国主义的统一战线之重要性；团结一切美国民主人士之重要性等。（四）将宣言印成单张，向大城市及国民党军队广为散发。"},{"type":"paragraph","text":"中宣部午齐"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":472,"page_end":472},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"指示"}]},{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"关于学习和宣传中央“七七”宣言的通知","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":7,"day":8}],"parts":[{"text":"关于学习和宣传中央“七七”宣言的通知","type":"title"},{"type":"appellation","text":"各局，转各省委、区党委："},{"type":"paragraph","text":"（一）中央“七七”宣言应在党内开展讨论，团结全党同志执行中央路线，将党内一部分同志中存在的悲观失望情绪根本扫除。"},{"type":"paragraph","text":"（二）引导党外人士在座谈会中讨论时局，争取他们同意我党主张，团结一切进步分子及中间派和我党一致行动。"},{"type":"paragraph","text":"（三）将宣言中各项要点在报纸刊物上作文发挥或作讲演，例如，美国反动派与中国反动派互相勾结危害中国；一切反动派进攻必须打败与能够打败；中国法西斯猖獗不是表示他们强大与有生命力，而是表示他们软弱与回光返照；国际国内民主力量发展壮大足以打败一切反动派；宣言中四项要求的重要性与必须实现；一部分人对国际与中国光明前途认识不足是错误的；爱国主义的统一战线之重要性；团结一切美国民主人士之重要性等。"},{"type":"paragraph","text":"（四）将宣言印成单张，向大城市及国民党军队广为散发。"},{"type":"paragraph","text":"中宣部"},{"type":"paragraph","text":"午齐"}],"comment_pivots":[{"part_idx":0,"offset":15,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["指《中国共产党中央委员会为纪念“七七”九周年宣言》。"],"page_start":162,"page_end":
