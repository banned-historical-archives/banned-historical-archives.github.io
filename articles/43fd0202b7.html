验的总结","authors":[],"dates":[{"year":1951,"month":3,"day":22}],"is_range_date":false,"parts":[{"text":"中央公安部关于镇反工作中两个突出经验的总结","type":"title"},{"text":"毛主席批示","type":"subtitle"},{"text":"中央公安部三月二十二日报告的两点总结很好，请你们注意照办。","type":"paragraph"},{"text":"最近一时期的镇反工作有两个突出的经验：","type":"paragraph"},{"text":"第一、有计划有准备地大规模地在同一时间内搜捕大批反革命份子。从北京、天津、河北、平原、察哈尔的实际行动证明，这是一种收廓社会反革命的有效的不可少的步骤，这种方式给敌人打击最大，给群众教育极深刻，社会波动亦不大。只要掌握准备充分、对象准确，组织严密、指挥统一、行动迅速、严明纪律、及时宣传等项原则，就可以保证不会抓错，而取得群众拥护与社会同情。","type":"paragraph"},{"text":"第二、北京、天津、张家口等城市的经验证明，召开城市中市级和区级的各界代表会，和协商委员扩大会，并有各民主党派、民主人士、少数民族、宗教界、工商界的许多代表人物参加，以揭露反革命罪恶，宣传镇反政策，消除民主人士的思想疑虑，动员各阶层坚决镇压反革命的方法是成功的。综合这几个地方的经验：","type":"paragraph"},{"text":"（1）是负责首长亲自主持公安机关作镇反情况报告，有准备地分类作报告，介绍政策，介绍重大案件和首恶人犯，不是报告所有人犯。用活人活事讲解政策，激发对反革命的仇恨，取得各界人士的拥护。","type":"paragraph"},{"text":"（2）是会上展览反革命罪证、图片等，须要供词和真凭实据打消各种疑虑。","type":"paragraph"},{"text":"（3）会前要充分准备，会中要坚持原则，既定处决的案犯，一致不能变动。","type":"paragraph"},{"text":"（4）要上下结合动员群众的力量，说服民主人士。","type":"paragraph"},{"text":"（5）要分别对待，对诚心拥护但有疑虑者，要耐心解释，提高其认识；对别有用心者，要用事实铁证，使他无话可说。我们认为这种做法应当推广。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43fd0202b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
