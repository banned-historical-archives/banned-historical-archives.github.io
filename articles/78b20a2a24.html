tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学了毛主席最新指示 我的心里更亮堂","authors":["五好战士","王云章"],"parts":[{"type":"paragraph","text":"《解放军报》十一月九日刊登了我们伟大领袖毛主席关于全国无产阶级文化大革命形势大好的极为重要的指示。毛主席的最新指示，最精辟、最深刻、最科学地概括了全国无产阶级文化大革命的大好形势，是我们观察形势、分析形势的总原则、总方针，是我们正确认识形势的指路明灯。对于毛主席的最新指示，我们要最最热烈地学习，最最热情地宣传，最最坚决地贯彻执行。"},{"type":"paragraph","text":"我们伟大领袖毛主席无比英明地指出：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。形势大好的重要标志，是人民群众充分发动起来了。从来的群众运动都没有象这次发动得这么广泛，这么深入。”我心里细琢磨，可不是吗！一年来，全国广大革命群众，正是按照毛主席的“你们要关心国家大事”的教导，在工厂、田间、炕头，展开了大辩论、大批判，捍卫毛泽东思想，批判修正主义。正由于这样，才拔除了无产阶级专政机构内部最大的隐患，扫除了资产阶级的污泥浊水，提高了人民群众的阶级觉悟，大树特树了毛泽东思想的绝对权威。为防修、反修打下了牢固的群众基础，从根本上巩固了无产阶级专政。毛泽东思想从来没有像今天这样的大普及；人民群众的思想觉悟，从来没有像今天这样飞跃提高；全国亿万人民的思想从来没有像现在这样统一。"},{"type":"paragraph","text":"学习了毛主席的最新指示，我心里更亮堂了，认识到，看革命形势的好坏，首先要看用毛泽东思想发动群众的广度和深度。群众的动向，决定革命形势的本质。用毛泽东思想观察分析形势，首先要把着眼点放在群众身上。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78b20a2a24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
