es":[{"year":1957,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京30日电】　毛泽东主席今天致电马来亚联合邦最高元首端古·阿卜杜勒·拉赫曼祝贺马来亚独立，电文如下:"},{"type":"paragraph","text":"马来亚联合邦最高元首端古·阿卜杜勒·拉赫曼陛下:"},{"type":"paragraph","text":"欣闻马来亚联合邦宣布独立，我代表中国人民并且以我个人名义谨向陛下和马来亚人民表示热烈的祝贺。祝马来亚联合邦繁荣和马来亚人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东"},{"type":"paragraph","text":"1957年8月30日【新华社北京30日电】　周恩来总理兼外交部长今天致电马来亚联合邦总理兼外交部长东古·阿卜杜勒·拉赫曼祝贺马来亚独立，电文如下:"},{"type":"paragraph","text":"马来亚联合邦总理兼外交部长东古·阿卜杜勒·拉赫曼阁下:"},{"type":"paragraph","text":"我荣幸地代表中华人民共和国政府通知阁下，中华人民共和国政府已经决定承认马来亚联合邦。祝马来亚人民在缔造自己的国家和建设幸福生活的事业中获得新的成就。祝我们两国之间的友好关系日益加强和发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理"},{"type":"paragraph","text":"兼外交部长周恩来"},{"type":"paragraph","text":"1957年8月30日于北京"},{"type":"paragraph","text":"【新华社北京30日电】　吉隆坡消息:在马来亚联合邦宣告独立的前夕，这个国家的首都吉隆坡正在紧张地筹备进行庆祝。全市充满节日气氛。"},{"type":"paragraph","text":"在今天的子夜，全国的清真寺将击鼓，在许多山上将燃起巨大的篝火，表明庆祝独立的开始。"},{"type":"paragraph","text":"英国女王的代表格罗斯特公爵昨天已经到达吉隆坡。他带来了英国的移交政权的文件，将于8月31日交给就要就任马来亚联合邦第一任总理的现任首席部长阿卜杜勒·拉赫曼，从而结束英国在这个国家的殖民统治。"},{"type":"paragraph","text":"马来亚联合邦九个州的苏丹、摄政等选出来的最高元首、原森美兰州的统治者阿卜杜勒·拉赫曼也将在明天宣誓。他将在9月2日举行登位典礼。"},{"type":"paragraph","text":"二十多个国家应邀到马来亚参加庆祝典礼的贵宾已经到达吉隆坡，他们住在一家新的旅馆里。"},{"type":"paragraph","text":"马来亚为了纪念宣告独立还建筑了一所可容2万人的体育馆。今天拉赫曼主持体育馆的开幕典礼。明天他就将在这里接受格罗斯特公爵递交的移交政权的文件。"},{"type":"paragraph","text":"在英国于171年前最早占领的马来亚岛屿——槟榔屿，今天举行了英国国旗最后一次的降旗礼。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26f8e9a181"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
