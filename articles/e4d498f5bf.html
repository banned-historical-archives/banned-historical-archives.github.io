ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对“生产长一寸，福利长一分”口号的意见","alias":"","parts":[{"type":"paragraph","text":"对“生产长一寸，福利长一分”"},{"type":"paragraph","text":"口号的意见！"},{"type":"paragraph","text":"（1953年8月21日）"},{"type":"paragraph","text":"但在指出“生产长一寸，福利长一分”这种说法不甚确切时，不要使工人们觉得今后好像只要生产，不要福利了，而要说明这句话不如“在增加生产的基础上逐步地改善工人的生活”这样说较为确切些。"},{"type":"paragraph","text":"[1]这是毛泽东在审阅《中共中央关于引用毛主席或中央其他负责同志言论应注意事项的规定》时加写的一段文字。1953年7月22日，中国公路运输工会主席、全总执行委员安力夫给全国总工会党组并中央写信，提出用传为毛泽东讲的“生产长一寸，福利长一分”的口号，来表明生产与福利、个人利益与整体利益、眼前利益与长远利益的关系，是不够完整不够确切的，提议用“要在增加生产的基础上逐步地改善工人的生活”来代替这种说法。7月30日，全总党组就此向毛泽东并党中央请示。中央为此做出了上述规定。规定中说：“‘生产长一寸”这句话，毛主席是说过的，而福利长一分”这句话，则是别人加上去的，把这两句话连接起来，编成口号，把它当作全是毛主席讲的，加以引证，乃是一种在政治上不严肃的表现。”毛泽东加写的文字紧接在这段文字之后。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":8,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":297,"page_end":297},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4d498f5bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
