,"dates":[{"year":1959,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彭德怀元帅致电马利诺夫斯基元帅"},{"type":"paragraph","text":"祝贺苏军建军四十一周年"},{"type":"paragraph","text":"新华社22日讯　我国国防部长彭德怀元帅今天打电报给苏联国防部长罗·雅·马利诺夫斯基元帅，祝贺苏军建军四十一周年。电文如下：苏维埃社会主义共和国联盟国防部长罗·雅·马利诺夫斯基元帅同志："},{"type":"paragraph","text":"当光荣的苏联陆海军建军四十一周年的时候，我谨代表中国人民解放军全体官兵并以我个人名义向您，并通过您向苏联武装力量全体指战员致以衷心的、热烈的祝贺。"},{"type":"paragraph","text":"英勇的苏联武装力量在保卫苏维埃祖国、保卫社会主义事业和世界和平事业方面建立了卓越的功勋。中国人民解放军十分钦佩苏联军队对于人类正义事业的伟大贡献，并把它看作自己的光辉榜样。"},{"type":"paragraph","text":"祝世界和平的支柱——强大的苏联武装力量的战斗威力不断提高。祝中苏两国军队之间的牢不可破的战斗友谊日益加强。"},{"type":"paragraph","text":"中华人民共和国国防部长　彭德怀"},{"type":"paragraph","text":"1959年2月22日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78da204c0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
