script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海农民革命造反总司令部筹委会发出紧急通告立即煞住群众斗群众的歪风把斗争矛头对准党内一小撮走资本主义道路当权派和社会上的牛鬼蛇神，彻底粉碎资产阶级反动路线的新反扑，全面掀起抓革命促春耕的新高潮","authors":[],"dates":[{"year":1967,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高指示"},{"type":"paragraph","text":"“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑，他们决不会违背这个逻辑的。”"},{"type":"paragraph","text":"“凡属于思想性质的问题，凡属于人民内部的争论问题，只能用民主的方法去解决，只能用讨论的方法、批评的方法、说服教育的方法去解决，而不能用强制的、压服的方法去解决。”"},{"type":"paragraph","text":"急通告"},{"type":"paragraph","text":"当前，正当毛主席的革命路线彻底战胜资产阶级反动路线的关键时刻，正当革命左派大团结、大联合、大夺权斗争取得胜利的关键时刻，党内一小撮坚持走资本主义道路的当权派和社会上没有改造好的地、富、反、坏、右分子，仍然不甘心于他们的失败，他们绞尽脑汁地想方设法，妄图在郊区农村煽动一部分受蒙蔽的工人、农民、学生，挑起武斗，制造一股群众斗群众的反革命逆流，以达到他们在春耕前夕“停生产、压革命”的不可告人的可耻的反革命目的。"},{"type":"paragraph","text":"革命造反派的战友们，我们万万不要上当。我们一定要以毛泽东思想为武器，牢牢地掌握斗争大方向。十六条中明确指出:“在辩论中，必须采取摆事实、讲道理、以理服人的方法。”“在进行辩论的时候，要用文斗，不用武斗。”现在，我们已发现青浦、松江等县个别的地方，发生了严重的群众斗群众的事件，造成了极其不良的后果。那些“害人虫”和一小撮别有用心的人，正在幕后拍手称快。革命的同志们!我们一定要百倍地警惕，集中兵力，把斗争矛头对准党内一小撮走资本主义道路的当权派和社会上的牛鬼蛇神，彻底粉碎资产阶级反动路线的新反扑，全面地掀起“抓革命，促春耕”的新高潮!"},{"type":"paragraph","text":"革命的同志们!在大方向一致的前提下，不要在枝节问题上争论不休。我们要加强团结，绝对不允许干出使亲者痛、仇者快的事情来!我们真诚地希望，革命干部站起来!和革命群众紧密地团结在一起，战斗在一起，胜利在一起，一起“杀”到“生产火线”上去。同时，我们要坚决追查和严办煽动群众斗群众的罪魁祸首。"},{"type":"paragraph","text":"抓革命，促生产，掀起春耕生产新高潮!"},{"type":"paragraph","text":"革命左派大联合大夺权斗争万岁!"},{"type":"paragraph","text":"无产阶级专政万岁!"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁!"},{"type":"paragraph","text":"我们最最敬爱的全世界革命人民的伟大导师——毛主席万岁!万岁!!万万岁!!!"},{"type":"paragraph","text":"上海农民革命造反"},{"type":"paragraph","text":"总司令部筹备委员会"},{"type":"paragraph","text":"一九六七年二月十八日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6781bd75f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
