script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沈阳军区四千多名干部深入基层单位  开展反对资产阶级自由化的正面教育","authors":["孙忠同","黄明松"],"dates":[{"year":1987,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沈阳军区四千多名干部深入基层单位"},{"type":"paragraph","text":"开展反对资产阶级自由化的正面教育"},{"type":"paragraph","text":"新华社沈阳3月16日电  （记者黄明松、通讯员孙忠同）1月下旬以来，沈阳军区4000多名各级领导干部和机关干部深入基层，为部队宣讲党的四项基本原则，开展反对资产阶级自由化的正面教育。"},{"type":"paragraph","text":"为了帮助基层把这次正面教育顺利进行下去，沈阳军区团以上各级党委和机关干部在搞好自身学习的基础上，分头深入基层，特别是偏远单位，把中央的精神传达给每个战士。军区司令员刘精松深入到驻内蒙古草原某部炮团，同干部战士一起学习、座谈，并对战士们提出的“当前这场反对资产阶级自由化斗争的性质”、“反对资产阶级自由化与发扬民主、贯彻‘双百’方针”等十多个问题，进行了解答，帮助大家提高了认识。"},{"type":"paragraph","text":"各级领导干部注意引导基层干部战士学习马克思主义基本理论，从根本上提高明辨是非的能力。大连陆军学院的领导同志深入到各系学员队，用自身学习马克思主义理论和中央文件的体会，帮助学员们从政治理论上划清民主与法制、宪法赋予我们的自由与资产阶级自由化、社会主义民主与资产阶级民主的本质区别。"},{"type":"paragraph","text":"深入到基层的各级干部还引导大家通过批驳资产阶级自由化言论，总结经验教训，增强新形势下坚持四项基本原则的自觉性。许多单位发动干部战士逐条剖析和批驳资产阶级自由化的言论，认清这些错误言论的实质。某集团军政委王清涛和政治部主任易广顺在某团组织干部战士分层次开展学习活动。全团有1000多人写了文章，在班、排、连召开的讨论会上发了言。大家表示，一定要通过这场斗争，进一步明辨是非，更加坚定地按党的四项基本原则规范自己的言行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"852705d13a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
