ar":1976,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一个学习尾山农场七英雄和优秀红卫兵郑霞萍先进事迹的热潮正在五原中学掀起。广大红卫兵、学生积极开展各种活动，表示要象尾山农场七英雄，象郑霞萍那样胸怀共产主义大目标，树立共产主义理想，把自己锻炼成为无产阶级革命事业的可靠接班人；当前要深入批判邓小平授意炮制的《论总纲》、《汇报提纲》、《条例》这三株反党、反马克思主义的大毒草，把批邓、反击右倾翻案风的斗争进行到底。这里刊登了五原中学红卫兵学习郑霞萍的一组小故事。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcde775b65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
