tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"抓点首先抓活学活用毛泽东思想驻宝安县坪山公社支左人员帮助革委会在抓点中狠抓根本；有力指导面上工作","authors":[],"parts":[{"type":"paragraph","text":"本报讯 驻广东省宝安县坪山公社支左人员，在帮助革委会成员抓点中，狠抓点上的活学活用毛泽东思想，搞好人的思想革命化，及时总结经验在面上推广，有力地推动了全公社斗、批、改运动的深入发展。"},{"type":"paragraph","text":"前一段时间，这个公社有的革委会成员在抓点中，往往注意抓具体工作任务多，忽视抓活学活用毛泽东思想这个根本，因此点的变化不显著，也不能有力地指导面上的工作。针对这个问题，支左人员便帮助革委会成员反复学习毛主席关于政治是统帅，是灵魂，“政治工作是一切经济工作的生命线”的伟大教导，并帮助他们以“抓点首先要抓什么”为题，展开讨论。通过学习和讨论，使大家认识到，抓点，最重要的就是要抓好点上活学活用毛泽东思想，搞好人的思想革命化。从此，革委会在抓点的过程中，紧紧抓住活学活用毛泽东思想，搞好人的思想革命化这个根本。"},{"type":"paragraph","text":"秀新大队过去是个“老大难”单位，斗、批、改运动一直进展得较慢。公社革委会主任邓彦彰带领人员深入到这个大队，进行周密细致的调查研究，发现这个大队落后的主要原因是大队领导班子继续革命觉悟不高，思想革命化不好，不能很好地发挥战斗指挥部的作用。于是，他们便组织大队领导班子活学活用毛主席关于无产阶级专政下继续革命的伟大理论，深入开展革命大批判，狠批大叛徒刘少奇的“阶级斗争熄灭论”，肃清“刘毒”；同时，发动广大贫下中农用毛泽东思想向大队领导班子进行批评帮助，从而使大队领导班子增强了政权观念，提高了继续革命觉悟，积极带领广大贫下中农活学活用毛泽东思想，狠抓阶级斗争，深入开展革命大批判，迅速打开了斗、批、改的局面，由“老大难”单位一跃成为公社的先进典型。接着，支左人员和革委会及时采用广播、简报、召开现场会、组织讲用团等形式，推广了秀新大队狠抓根本的先进经验，使全公社掀起了一个用毛泽东思想指导抓点、以点带面的热潮。以后，公社革委会主要领导干部都深入到基层，带头活学活用毛泽东思想，认真抓好基层思想建设，使全公社斗、批、改更加生气勃勃地向前发展。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62acef09fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
