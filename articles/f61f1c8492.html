ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"华侨要遵守所在国的法令","alias":"","parts":[{"type":"paragraph","text":"华侨要遵守所在国的法令！"},{"type":"paragraph","text":"（1956年9月18日）"},{"type":"paragraph","text":"中国政府一向鼓励华侨要遵守所在国的法令，不要从事政治活动，并且鼓励他们把他们的人力和财力为所在国的利益服务。当然，也可能有些华侨做了些不利于印尼利益的事，但是这和中国政府是毫无关系的。如果发生了这种情况，中国政府和印尼政府应该很好地合作，对他们进行教育。对华侨包括华侨商人的正当利益应该加以保护，但是对那些不法的、欺骗和敲诈人民的奸商则应该加以惩罚。我们在“三反”“五反”运动期间，就曾经对奸商严厉地惩罚过。我们现在和新加坡还没有外交关系，如果将来建立了关系，我们也可以对当地的华侨进行些教育工作。"},{"type":"paragraph","text":"[1]这是毛泽东和印度尼西亚驻华大使苏卡佐·维约普拉诺托谈话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":35,"page_end":35},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f61f1c8492"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
