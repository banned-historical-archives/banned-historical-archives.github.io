script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"深入批判资产阶级唯心主义中国人民大学教师已完成三十多篇论文　东北人民大学和东北师大确定研究专题","authors":[],"dates":[{"year":1955,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最近，中国人民大学的教师们完成了三十多篇从文学、哲学、历史、经济等领域中批判资产阶级唯心观点的论文。“五四以来胡适派怎样歪曲了古典文学”“肃清反动的资产阶级哲学思想实用主义的影响”等多篇论文曾受到学术界的重视。何干之所写的“关于几个历史问题的反动观点”的论文，将在中国科学院主持的学术讨论会上提出报告。"},{"type":"paragraph","text":"中国人民大学最近有三十三个教研室修订了研究计划，增加了有关批判资产阶级唯心论的研究题目五十多个，和关于我国过渡时期的经济法则问题等研究题目二十多个。关于胡风反马克思主义文艺思想的批判引起了中国语言文学、辩证唯物主义与历史唯物主义等教研室的重视。他们准备从胡风的文艺思想和他的哲学基础等方面进行系统的批判。"},{"type":"paragraph","text":"现在，全校的教师正有计划地学习有关文件，并听了周扬和艾思奇的关于“胡风的错误的文艺思想”和“批判胡风的错误思想”的报告。最近苏联专家还作了“实用主义——美国帝国主义资产阶级的反动哲学”的报告。"},{"type":"paragraph","text":"东北人民大学和东北师范大学文科各系和政治理论课各教研室的教师，最近共确定了七十项新的科学研究题目，计划对胡适派资产阶级唯心主义和胡风的反马克思主义的文艺思想展开深入和系统的批判。东北人民大学为便利教师进行这项科学研究，蒐集了大量资料，专门设立了“批判胡适派资产阶级唯心主义参考室”。东北师范大学中文系部分教授已完成了批判胡适文学观的论文，现在又开始编著有关批判胡风文艺思想的文章。东北人民大学已召开了两次关于红楼梦的研究方法和胡风的文艺思想批判的报告会。【新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3de1284838"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
