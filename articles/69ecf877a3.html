{"year":1958,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海人民对美帝国主义在台湾海峡地区军事挑衅表示极大的愤怒，普遍进行读报，提高对当前形势的认识，更加鼓足干劲的来完成生产任务，以千百倍地加强祖国的力量，巩固祖国的国防。7日报上刊登周总理关于台湾海峡地区局势的声明后，当天上海报纸零售量增加到三十七万两千份，比平常增加两倍以上。昨天报上登出毛主席在最高国务会议上的讲话，上海报纸零售量增加到五十三万，比平常零售额增加到三倍半。"},{"type":"paragraph","text":"连日来，全市广大读者都到各新华书店购买有关台湾问题的文件、书籍和宣传画。凡是积存下的这方面的书籍及宣传画大都已销售一空。上海人民美术出版社的六幅宣传画昨天开始在书店发行。有关台湾海峡地区局势的图解、台湾省地图，也为广大读者所需要。南京路新华书店第一书店还设立了“一定要解放台湾”的书籍专柜。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69ecf877a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
