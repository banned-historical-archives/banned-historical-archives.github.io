<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国人大代表、国防科委副主任钟赤兵同志追悼会在北京举行叶剑英、陈锡联、苏振华、王震、聂荣臻、江华、粟裕等同志参加了追悼会","authors":[],"dates":[{"year":1975,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年十二月二十七日电　第四届全国人民代表大会代表、国防科委副主任钟赤兵同志，因病医治无效，于一九七五年十二月二十日在北京逝世，终年六十一岁。"},{"type":"paragraph","text":"钟赤兵同志追悼会今天下午在八宝山革命公墓礼堂举行。人大常委会、国务院、中央军委、中国人民解放军总参谋部、总政治部、总后勤部等单位和钟赤兵同志的生前友好送了花圈。"},{"type":"paragraph","text":"叶剑英、陈锡联、苏振华、王震、聂荣臻、江华、粟裕等同志参加了追悼会，并向钟赤兵同志的家属于陆琳同志及其子女表示亲切慰问。"},{"type":"paragraph","text":"追悼会由国防科委主任张爱萍主持，政委陶鲁笳致悼词。悼词中说:“钟赤兵同志于一九二九年参加中国共产主义青年团，一九三○年参加中国工农红军，同年转为中国共产党党员。历任宣传员，连、团、师政治委员，军委后方梯队政治委员，陕北军事部部长，军委一局局长，第四野战军后勤部长兼政治委员，第四野战军特种兵政治委员，军委民航局局长，军委防空部队政治委员，武装力量监察部副部长，广州部队副司令员等职。曾被选为第一届、第二届全国政协委员，第三届全国人大代表。”"},{"type":"paragraph","text":"“钟赤兵同志是中国共产党的优秀党员，是我军优秀的政治工作人员。几十年来，在毛主席、党中央领导下，在长期革命战争中，在社会主义革命和社会主义建设中，认真学习马克思主义、列宁主义、毛泽东思想，贯彻执行毛主席的无产阶级革命路线，忠于党，忠于人民，作战英勇，政治坚强，立场坚定，作风正派，坚持无产阶级专政下继续革命，积极拥护无产阶级文化大革命，热情支持社会主义新生事物，勤勤恳恳地为人民服务，为中国人民的解放事业和我国的国防建设，贡献了自己的一生。”"},{"type":"paragraph","text":"参加追悼会的还有中国人民解放军各总部、各军兵种、军事院校、北京部队、北京卫戍区和国家机关的负责同志以及钟赤兵同志的生前友好张才千、向仲华、彭绍辉、李达、王尚荣、伍修权、梁必业、徐立清、傅钟、黄玉昆、张宗逊、谭政、陈士渠、宋时轮、肖华、肖克、唐亮、肖劲光、王宏坤、张廷发、张达志、向守志、陈鹤桥、黄新廷、莫文骅、谭善和、吴克华、吕正操、秦基伟、傅崇碧、刘福、彭嘉庆、鲁瑞林、方强、武新宇、周子健、刘西尧、王诤、汪洋、范子瑜、姚依林、万里、张劲夫、康克清、苏静、余立金、杨寿山、宋任穷、谭冠三、李聚奎、孔原、傅秋涛、陈奇涵、张震、何长工、郭化若、钱学森、朱光亚、李敏、何连芝、薛明、陈琼英、林月琴。"},{"type":"paragraph","text":"参加追悼会的还有国防科委的干部、战士数百人。"},{"type":"paragraph","text":"追悼会结束后，钟赤兵同志骨灰盒安放在八宝山革命公墓。骨灰盒上覆盖着中国人民解放军军旗。"},{"type":"paragraph","text":"钟赤兵同志生病住院期间，叶剑英、苏振华、徐向前、聂荣臻、陈云、余秋里等同志曾前往医院看望。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"王震","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d951fc82c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
