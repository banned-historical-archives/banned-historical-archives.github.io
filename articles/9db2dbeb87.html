" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——攻击党、反对党的领导","authors":["刘凤理","岳安良","张旭","张耀国","河南农学院","阴维华"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——攻击党、反对党的领导","type":"title"},{"text":"河南农学院阴维华张耀国张旭刘凤理岳安良","type":"authors"},{"text":"阴维华（农59级学生）：取消班三角，成立争鸣小组领导鸣放。要成立不打击不报复委员会。取消党委制的问题应交大家讨论决定。取消党委制，吸收更多的人参加学校领导，会把学校办得更好些。","type":"paragraph"},{"text":"张耀国（农59级学生）：看！他们紧握着权威的把柄，发号施令，说一不二，真不愧为“金口玉言”呀！权威人士们：请你们高抬贵手，把人家的资产阶级帽子（注：指对资产阶级思想严重者的批评），摘下来吧，班上权威人士，把她（范宝英因病退学）逼走了。党员都不敢鸣放，是被教条束缚住了，还是顽固不化！","type":"paragraph"},{"text":"张旭（林60级学生）：我爱国不爱党，我这一生也不入党。谁说党好，谁就能入党，我就是不说党好。我看见党员就不高兴。不管有无文化，在任何工作岗位上，和大小机关里，都要安上一个党员，这是为什么？搞镇反运动是党没有良心。我不能让这些官僚们（注：指党的领导干部）继续领导下去，我要求他们下台，我要合乎我理想的人来领导。林60级党小组，团支部，现在大风已来临了，你们还藏在龟壳里不伸头吗？我沉默寡言，完全是他们（注：指党、团员）逼的。我要死在河南农学院。","type":"paragraph"},{"text":"刘凤理（农58级学生）：我不能让党组织牵着鼻子走路。我赞成民主办校、教授治校。我赞成铁托说的工人委员会，党不能直接领导。","type":"paragraph"},{"text":"岳安良（农58级学生）：储安平的党天下论，我非常同意，不过这种提法太露骨，不策略，应该加一个引号。要想参加共产党的组织：一对错皆从；二中左勿右；三盲干乱干。说成绩是基本的，就是教条主义，就是掩盖缺点。我特别佩服谭惕吾提出的双轨制度，即同级党委不要直接领导同级行政机构，党只起监督作用。同时党员在一个部门中也不应起直接的领导作用。以党代政是有的，党管的太宽，一切问题都是党研究、决定，拿出来就执行。","type":"paragraph"},{"text":"人民内部矛盾表现在领导和被领导方面。矛盾是党造成的。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9db2dbeb87"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
