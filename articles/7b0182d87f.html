script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美英资产阶级大为震惊承认越南法军面临危机","authors":[],"dates":[{"year":1950,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美英资产阶级大为震惊承认越南法军面临危机"},{"type":"paragraph","text":"【新华社十五日讯】塔斯社纽约十三日讯：反动的纽约时报驻西贡记者宝丁承认：由于越南民主共和国人民解放军最近的胜利，法国帝国主义者在印度支那正遭遇到严重的危机，面临着“黯淡的前途”。该记者着重指出在高平和七溪之间作战的越南人民解放军所表现的力量，并承认：法军损失大批武器，损失兵力数千人。"},{"type":"paragraph","text":"该美国记者不得不承认：不受人民欢迎的保大政权正在崩溃之中。"},{"type":"paragraph","text":"【新华社十五日讯】据法新社伦敦讯，伦敦《泰晤士报》十三日在评论越南战局时承认：法军最近在北越的大败，也使英国资产阶级大为震惊。该报在叙述法军的惨败后，认为法军的失败“来得太突然”。该报追述今年二月间英国和美国曾承认保大傀儡政权，那时英国和美国宣布支持法国在越南的政策，并且认为法国已“不再是孤单的了。”美国的援助又增加了“可喜的希望”。但是，正在“大有希望的时候，希望突然破灭了。这对法越双方的后果如何，目前还不能估量”。该报指出：特别使英国资产阶级感到惊惶的原因是“在印度支那遭到的任何挫折，都要削弱整个东南亚的共同阵线”。"},{"type":"paragraph","text":"英国保守党机关报《每日电讯》报十一日发表的社论，亦承认法军的失败，使“法越军队遭到人员和威信的严重损失”。该报结论认为，“印度支那无论在政治或军事方面的情况，都是对法国人不惬意的”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b0182d87f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
