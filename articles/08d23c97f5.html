ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"保密问题值得引起我们极大注意","alias":"","parts":[{"type":"paragraph","text":"保密问题值得引起我们极大注意"},{"type":"paragraph","text":"（1950年9月1日）陈毅\"同志，并告饶\"："},{"type":"paragraph","text":"在此所谈各问题，你写电报时，为保密计，请用有线电发来，不要用无线电。嗣后凡机密电报，均请注意用有线电，不用无线电。只有非机密者用无线电。党政军均是如此。党政军对下面亦应如此，凡有有线电设备之处，均用有线电，以达保密之自的。在此敌我斗争日益尖锐之时，保密问题值得引起我们极大注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月一日"},{"type":"paragraph","text":"[1]陈毅，当时任中共中央华东局第二书记、华东军区司令员、上海市市长。"},{"type":"paragraph","text":"[2]饶，指饶漱石，当时任中共中央华东局第一书记、华东军政委员会主席、华东军区政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":125,"page_end":125},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08d23c97f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
