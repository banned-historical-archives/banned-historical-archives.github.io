ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"祝贺毛雷尔当选罗马尼亚人民共和国大国民议会主席团主席的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺毛雷尔当选罗马尼亚人民共和国"},{"type":"paragraph","text":"大国民议会主席团主席的电报"},{"type":"paragraph","text":"（1958年1月12日）罗马尼亚人民共和国大国民议会主席团主席扬·格·毛雷尔同志："},{"type":"paragraph","text":"欣悉你光荣地获得罗马尼亚人民的重大信任，当选为罗马尼亚人民共和国大国民议会主席团主席，我代表中国人民，并且以我个人的名义，向你表示衷心的祝贺。"},{"type":"paragraph","text":"中罗两国人民在共同的社会主义道路上，已经结成了亲密的、牢不可破的友谊。这种友谊对于加强以苏联为首的社会主义各国的团结和维护世界和平作出了并且将继续作出重大的贡献。祝你在为罗马尼亚人民的幸福和社会主义建设的事业中取得卓越的成就。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东"},{"type":"paragraph","text":"一九五八年一月十二日"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":439,"page_end":439},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89cf778855"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
