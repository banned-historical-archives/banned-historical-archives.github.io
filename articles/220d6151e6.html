art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"着重学习毛主席战争与和平的理论成都部队系统研究了学习方针与主要内容该部党委认为；这一学习对部队将有很大推动作用","authors":["石庆铨"],"parts":[{"type":"paragraph","text":"本报讯 成都部队最近召开了名单位负责理论教育的宣传干部和理论教员会议，采取短期读书班与教育准备会相结合的形式，系统地研究了“战争与和平”的教学问题。"},{"type":"paragraph","text":"会议学习了毛主席有关战争与和平问题的理论和纪念列宁的三篇文章。会议明确地指出了：战争与和平问题是当前国际阶级斗争的一个重大问题；在这一问题上的对立的观点，是马克思列宁主义与现代修正主义分歧的重要方面。我们一定要把这个问题学好。到会同志一致认为：毛主席关于战争与和平问题的理论，是毛泽东思想的重要组成部分，战争与和平问题的学习，要着重学习毛主席关于这一问题的理论。因此，在教学中必须以毛泽东思想为指导、以毛主席的有关著作为主要内容，用阶级斗争观点和不断革命论的观点来学习。要通过学习，提高干部的阶级觉悟，用阶级斗争的观点和阶级分析的方法，批判现代修正主义和资产阶级的和平主义的理论；树立正确对待战争与和平问题的马克思列宁主义的立场和观点。"},{"type":"paragraph","text":"会议认为，在教育中应抓住以下各点：（一）揭露美帝国主义的假和平、真备战的两面手法，认清帝国主义的侵略本性是永远也不会改变的，了解战争是阶级斗争的必然产物，现代战争的根源是帝国主义制度等理论，有力地批判现代修正主义者散布的帝国主义本性已经改变的反动论点；（二）理解战争与和平的辩证关系，树立正确对待战争与和平问题的态度；（三）理解武装夺取政权是无产阶级争取解放的根本道路，批判现代修正主义的改良主义思想；（四）理解人民群众是历史的主人，帝国主义和一切反动派都是纸老虎，认识建立世界反帝统一战线的重要性，坚决支持殖民地人民的斗争，争取无产阶级世界革命的胜利，批判现代修正主义者的唯武器论的谬论。"},{"type":"paragraph","text":"会议还认为，为使这一课题的学习达到预期的目的，除了认真贯彻理论联系实际的理论教育方针之外，还必须加强党委对各级中心组和讲师团的领导，发挥中心组既是学习组、又是讲师团和指导组的作用。"},{"type":"paragraph","text":"又讯 成都部队党委于6月中旬召开了会议，专门研究了战争与和平问题的学习。会议认为，战争与和平问题，是当前国际斗争的重大问题。学好这一课题，可以提高干部对现代修正主义思潮的辨别与批判能力，提高战斗意志；对于目前正在轰轰烈烈地开展着的培养三八作风运动和学习毛泽东思想的运动，都有很大推动作用。因此，学习战争与和平问题也是加强部队政治思想工作的重大问题，各级党委必须抓紧这个学习，并要求各级领导干部要带头学好。部队政治部也发出了指示，要求各级政治机关把抓好这一学习做为当前政治工作中的一项重大任务。各级领导要大抓6、7月，要在当前国际反帝斗争的大好形势中，掀起学习热潮，以增强斗志，促进战备训练和各项工作的大跃进。（石庆铨）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"220d6151e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
