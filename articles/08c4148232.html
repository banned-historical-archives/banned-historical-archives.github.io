ar":1977,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副主席会见并宴请丁肇中教授"},{"type":"paragraph","text":"邓副主席说，科学是老老实实的事，一点不能弄虚作假。我们一定要搞好科学研究。“四人帮”最蠢，胡说什么知识越多越反动，把知识分子说成是“臭老九”。科学技术是人类共同创造的财富。学会先进的东西才能超过先进。"},{"type":"paragraph","text":"新华社一九七七年八月十七日讯 邓小平副主席今天会见了美国麻省理工学院物理教授丁肇中和夫人及其女儿。"},{"type":"paragraph","text":"邓副主席同丁肇中教授和夫人、孩子热烈握手，一起照了像，并且进行了亲切的交谈。邓副主席说，科学是老老实实的事，一点不能弄虚作假。我们一定要搞好科学研究。“四人帮”最蠢，胡说什么知识越多越反动，把知识分子说成是“臭老九”。邓副主席指出，科学技术是人类共同创造的财富。学会先进的东西才能超过先进。丁肇中教授说，我们这次来中国参观，看到大家很有干劲，都想把科技搞上去。我相信中国这么大，人口这么多，搞科研的历史这么久，一定会出人材，会很快赶上科学先进水平。"},{"type":"paragraph","text":"会见后，邓副主席设宴招待丁肇中教授和夫人等。"},{"type":"paragraph","text":"参加会见和宴会的有中国科学院副院长方毅、吴有训，中国科学院负责人刘华清，有关方面负责人和科学工作者张文裕、郝汀、李滔、朱永行。（附图片）"},{"type":"paragraph","text":"邓小平副主席八月十七日会见美国麻省理工学院物理教授丁肇中和夫人及其女儿。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1977,"month":8,"day":18}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副主席会见并宴请丁肇中教授","authors":[],"parts":[{"type":"paragraph","text":"邓副主席说，科学是老老实实的事，一点不能弄虚作假。我们一定要搞好科学研究。“四人帮”最蠢，胡说什么知识越多越反动，把知识分子说成是“臭老九”。邓副主席指出，科学技术是人类共同创造的财富。学会先进的东西才能超过先进。"},{"type":"paragraph","text":"新华社一九七七年八月十七日讯 邓小平副主席今天会见了美国麻省理工学院物理教授丁肇中和夫人及其女儿。"},{"type":"paragraph","text":"邓副主席同丁肇中教授和夫人、孩子热烈握手，一起照了像，并且进行了亲切的交谈。邓副主席说，科学是老老实实的事，一点不能弄虚作假。我们一定要搞好科学研究。“四人帮”最蠢，胡说什么知识越多越反动，把知识分子说成是“臭老九”。邓副主席指出，科学技术是人类共同创造的财富。学会先进的东西才能超过先进。丁肇中教授说，我们这次来中国参观，看到大家很有干劲，都想把科技搞上去。我相信中国这么大，人口这么多，搞科研的历史这么久，一定会出人材，会很快赶上科学先进水平。"},{"type":"paragraph","text":"会见后，邓副主席设宴招待了肇中教授和夫人等。"},{"type":"paragraph","text":"参加会见和宴会的有中国科学院副院长方毅、吴有训，中国科学院负责人刘华清，有关方面负责人和科学工作者张文裕、郝订、李滔、朱永行。"},{"type":"paragraph","text":"邓小平副主席八月十七日会见美国麻省理工学院物理教授丁肇中和夫人及其女儿。新华社记者摄
