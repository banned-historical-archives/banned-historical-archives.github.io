"dates":[{"year":1958,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社柏林16日电】　10日开幕的德国统一社会党第五次代表大会在举行了7天会议、通过了决议和选出新的中央委员会以后，在今天胜利闭幕。"},{"type":"paragraph","text":"在今天早晨举行的秘密会议上，大会以秘密投票方式选出了本届大会的中央委员会和中央检查委员会。"},{"type":"paragraph","text":"在随后举行的公开会议上，选举委员会主席马克斯。奥皮茨宣布了新的中央委员会选举结果。全场以长时间的热烈鼓掌祝贺皮克、乌布利希、格罗提渥重新当选。"},{"type":"paragraph","text":"在格罗提渥致闭幕词以后，大会在庄严的国际歌声中胜利结束。"},{"type":"paragraph","text":"【据新华社柏林16日电】　今天下午在德国统一社会党第五次代表大会的末次会议上，格罗提渥致闭幕词。他以代表大会的名义向各国兄弟党代表团表示最诚挚的感谢。"},{"type":"paragraph","text":"格罗提渥接着强调指出，党的第五次代表大会揭开了德国历史的新的一章。他说，巩固和平的最好途径是“通过我们向社会主义的跃进来实现。因为只有社会主义才能保障和平。”他又说，党代表大会证明，德国的重新统一在目前的条件下，只能通过建立两个德国的邦联来实现。"},{"type":"paragraph","text":"格罗提渥说，“我们可以马上说出我们要求作为重新统一的前提条件，这就是:肃清西德的军国主义和法西斯分子以及立即停止波恩的冒险的战争政策。”"},{"type":"paragraph","text":"格罗提渥强调指出，这次党代表大会再一次证实了德国统一社会党的历史重要性。所有力图阻挠我们前进的修正主义分子和机会主义分子都遭到了明显的挫败。他说，“在我们这里没有他们的位置”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6106b786f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
