uthors":[],"dates":[{"year":1967,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本朋友赞扬中国文化大革命增强了世界革命人民信心"},{"type":"paragraph","text":"革命造反派夺权夺得对夺得好"},{"type":"paragraph","text":"据新华社香港二十五日电　日中友好协会（正统）总部常任理事兼事务局长三好一日前在这里对记者发表访华观感说，中国的无产阶级文化大革命正沿着毛主席的革命路线胜利前进，这给予日本人民、越南人民和亚非拉各国人民无比的鼓舞，并加强了世界革命人民的反帝反修斗争和争取解放的信心。他说，中国无产阶级文化大革命已进入一个更广阔、更深入的新阶段，形势的发展好得很。七亿中国人民满怀信心，夺取无产阶级文化大革命的新胜利，坚决要把革命和生产搞得更好，实现毛主席提出的“抓革命，促生产”的伟大号召。"},{"type":"paragraph","text":"他说，中国全国革命的工人、农民、学生、干部和其他革命的群众，都坚定地站在以毛主席为代表的无产阶级革命路线的一边，在无产阶级革命造反的大旗下联合起来，彻底打退资产阶级反动路线的新反扑，把政治的权力，经济的权力，文化的权力，统统要夺过来，掌握在自己的手里，更进一步巩固无产阶级专政，使国家永不变色。他说，由于中国无产阶级文化大革命的意义重大，影响深远，使美帝、苏修和各国反动派害怕得要死。中国把无产阶级文化大革命搞得越深，美帝、苏修和各国反动派就越害怕得厉害。"},{"type":"paragraph","text":"三好一指出，中国无产阶级文化大革命确是一场史无前例的伟大的革命，是一场激烈的阶级斗争，是无产阶级要消灭资产阶级的革命。这场大革命不仅对中国的将来产生深远的影响，并对全世界人民的革命事业作出了巨大的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fc43b18be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
