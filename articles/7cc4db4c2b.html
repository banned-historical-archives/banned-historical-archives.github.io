ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于要少讲空话多讲办法的批语","alias":"","parts":[{"type":"paragraph","text":"关于要少讲空话多讲办法的批语！"},{"type":"paragraph","text":"（1959年3月20日）"},{"type":"paragraph","text":"这个经验有用，可转各地。对基层干部和广大群众，要少讲空话，多讲办法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月二十日"},{"type":"paragraph","text":"[1]这个批语写在中共中央办公厅1959年3月17日编印的《情况简报》（六级千部会议专辑）第四十八号上。这辑简报登载了中央办公厅曹幼民发自济南的一封信，信中介绍了山东省六级干部会议对公社管理体制、积累和消费的比例、今年小麦的分配、粮棉油统购等政策的意见。来信还谈到，关于怎样以最快的方法向群众贯彻上述意见，山东省历城县东郊人民公社已摸到了一些经验：一是向群众贯彻得越快越有利；二是不要光摆解决思想问题的架子，而要着重把怎么办讲清楚。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":374,"page_end":374},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cc4db4c2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
