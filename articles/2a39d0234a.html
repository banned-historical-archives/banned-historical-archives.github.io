art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让毛泽东思想占领一切阵地","authors":["驻伊春某部三连"],"parts":[{"type":"paragraph","text":"从广播里听到我们最最敬爱的伟大领袖毛主席和党中央的号召：“人民解放军大力协助地方，支持工业生产工作。”我们的心情万分激动。这是毛主席对我们解放军的最大关怀，最大信任，最大鼓舞，最大鞭策，我们禁不住纵情欢呼：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"回顾我们在支持伊春林区无产阶级革命派夺权斗争中，坚决贯彻了毛主席“抓革命，促生产”的伟大号召，和革命派的战士们一起，活学活用毛主席著作，狠抓革命，猛促生产，迅速改变了林区的生产面貌。这是毛泽东思想的伟大胜利，是以毛主席为代表的无产阶级革命路线的伟大胜利。我们进一步深刻地体会到，协助地方抓革命、促生产，最最重要的，是用毛泽东思想武装广大革命群众，让毛泽东思想占领一切阵地。有了毛泽东思想，就有了一切；离开了毛泽东思想，就会丧失一切。"},{"type":"paragraph","text":"我们虽然做出了一些成绩，但是离毛主席和党中央的要求还很远很远。这不过是万里长征刚刚迈出了第一步。今后，我们要坚决执行党中央的这一决定，更高地举起毛泽东思想伟大红旗，读毛主席的书，听毛主席的话，照毛主席的指示办事，全力以赴，协助地方，把林区的生产搞得更好，为夺取革命、生产双丰收而英勇奋斗。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a39d0234a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
