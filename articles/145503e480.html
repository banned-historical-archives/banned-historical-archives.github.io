ar":1963,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席在仰光观看文艺表演"},{"type":"paragraph","text":"新华社仰光二十一日电  中华人民共和国主席刘少奇和夫人王光美今晚在国宴结束后，由缅甸联邦革命委员会主席奈温将军和夫人陪同，在这里的国宾馆观看了文艺表演。"},{"type":"paragraph","text":"出席观看的还有参加国宴的宾主双方的其他人员。"},{"type":"paragraph","text":"文艺表演是由缅甸联邦文化部的文工团演出的。他们表演了中国的两个古典舞《春江花月夜》和《弓舞》以及一个蒙古族舞。这些舞蹈是他们在中国艺术家的指导下学会的。中国贵宾非常欣赏缅甸艺术家学中国舞蹈的娴熟程度和精湛技艺。他们还表演了缅甸歌舞。这些描写缅甸现代农村生活的歌舞赢得了全场的掌声。"},{"type":"paragraph","text":"表演结束时，刘少奇主席和夫人、陈毅副总理和夫人，在奈温主席和夫人的陪同下，登上舞台同艺术家们握手并向他们献花篮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"145503e480"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
