尔滨市红五类子弟造反大会会刊《红后代》编辑部"],"dates":[{"year":1966,"month":9,"day":22}],"is_range_date":false,"parts":[{"text":"鬼见愁──红色恐怖万岁","type":"title"},{"text":"哈尔滨市红五类子弟造反大会会刊《红后代》编辑部","type":"authors"},{"text":"我们高呼：红色恐怖万岁！","type":"paragraph"},{"text":"今天，我们搞红色恐怖，明天，我们还要搞红色恐怖，只要有不符合毛泽东思想的东西存在，我们就要造反，就要搞红色恐怖！","type":"paragraph"},{"text":"毛主席说：“革命不是请客吃饭，不是做文章，不是绘画绣花，不能那样雅致，那样从容不迫，文质彬彬，那样温良恭俭让。革命是暴动，是一个阶级推翻一个阶级的暴烈的行动。”我们要砸烂旧世界，要横扫一切牛鬼蛇神，要在全中国，全世界树立毛泽东思想的绝对权威，就必须对一切旧的东西大杀大砍。文文雅雅、慢慢腾腾怎么能行呢！？怎么能在框框里干革命呢？！","type":"paragraph"},{"text":"有人一见到红色恐怖，听到我们喊造反有理，就胆战心惊、大发雷霆。什么“不按党的方针政策办事呀！”什么“这样太乱了吧。”统统都是胡说八道。天下，是我们的！江山，是我们的！我们翻身了，我们执政了。我们造了牛鬼蛇神的反，罢了牛鬼蛇神的官，专了它们的政，我们扬眉吐气了，谁敢在我们面前专横跋扈，不可一世，我们就叫它去见阎王。害怕红色恐怖的家伙们，实话告诉你们：对红色恐怖持有什么态度，是真假革命者的试金石。","type":"paragraph"},{"text":"我们是天生的造反者，我们是旧世界的批判家。我们的父兄，在战火纷飞的战斗岁月里跟着毛主席踏遍了万水千山，夺得了政权，打下了江山。今天，我们──革命事业的继承者，毛泽东思想的红卫兵，跟着最高统帅毛主席又燃起了无产阶级文化大革命的熊熊烈火。头可断，血可流，毛泽东思想不能丢！血未干，仇未忘，无产阶级专政不能放！上刀山，下火海，党的领导不能篡。我们红色的后代起来了，起来保政权、捍江山。","type":"paragraph"},{"text":"毛主席教导我们：“不止不行，不塞不流，不破不立。”我们造反是造定了，我们还要在红色恐怖的烈火上加油，烧！烧！烧！！烧掉旧世界，建立无产阶级的新世界，建立毛泽东思想的红世界。","type":"paragraph"},{"text":"造反有理！造反到底！","type":"paragraph"},{"text":"红色恐怖万岁！","type":"paragraph"},{"text":" （哈尔滨市红五类子弟造反大会会刊《红后代》社论）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d83a9e82a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
