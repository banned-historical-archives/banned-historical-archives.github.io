script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把毛主席语录印在脑子里","authors":["霍云春"],"dates":[{"year":1966,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把毛主席语录印在脑子里"},{"type":"paragraph","text":"战士　霍云春"},{"type":"paragraph","text":"以前班里成篇成段地学习毛主席著作，读过不久我就忘记了。因此，我干工作同毛主席的教导不大沾边，盲目性挺大。"},{"type":"paragraph","text":"有一次看场院，我带班。吃早饭时，有人对我说，有值班的就行了，你可以吃饭去。我一听，就走了。领导发觉后批评我，我还觉得自己满有道理。后来在同志的帮助下，我学习了毛主席的一段语录：“人民解放军的全体指挥员、战斗员，绝对不可以稍微松懈自己的战斗意志，任何松懈战斗意志的思想和轻敌的思想，都是错误的。”我才明白这件事是自己做错了。"},{"type":"paragraph","text":"尝到了学习《毛主席语录》的甜头以后，我就结合自己的思想情况和劳动任务，背了一些毛主席语录。在背运稻子时，我牢记毛主席拣重担子挑的教导，作到了“三拣”：拣远的背，拣有泥的湿的背，拣大捆的背。有一次我背了十多捆，过一条水沟，一步没迈过去，掉到了沟底，溅了一身泥水。这时我思想上有些动摇，想起连里规定每人每次背八至十捆，我何必背这么多？想到这里，就准备拿下几捆。但刚一解绳，想起了毛主席的教导：“工作就是斗争”、“下定决心，不怕牺牲，排除万难，去争取胜利”，我得到了很大鼓舞，就全部背起来了，一面走，一面背毛主席的话，终于背到了场里。"},{"type":"paragraph","text":"我体会到：要使自己的一切行动都变为自觉的行动，就必须首先把毛主席的指示印在脑子里。这是把毛主席著作学好用活的前提。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c585f37099"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
