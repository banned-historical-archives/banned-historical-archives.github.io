" crossorigin="">{"props":{"pageProps":{"books":[{"id":"8d4ea23c-eec1-49ad-a944-1b111e0020cd","name":"红旗一九七四年第七期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/8d4ea23c-eec1-49ad-a944-1b111e0020cd.pdf"],"article":{"title":"党是领导一切的","alias":"","parts":[{"type":"paragraph","text":"在斗争中加强党的建设党是领导"},{"type":"paragraph","text":"切的"},{"type":"paragraph","text":"《人民日报》社论今天是中国共产党诞生五十三周年。"},{"type":"paragraph","text":"我们的党，是在阶级斗争和两条路线斗争的风浪宁成长壮大的。在批林批孔运动中，各级党委和广大党员又经受了新的考验和锻炼。斗争的实践进一步证明：我们的党是伟大的、光荣的、正确的党。经过八年来的无产阶级文化大革命，经过党的九大和十大，我们党更加坚强，更加团结，更加朝气蓬勃。"},{"type":"paragraph","text":"毛主席教导我们：“中国共产党是全中国人民的额导核心。没有这样一个核心，社会主义事业就不能胜利。”党、政、军、民、学，东、西、南、北、中，党是领导一切的。当前的批林批孔运动，必须在党委统一领导下进行。只有加强党的领导，才能把各方面的力量组织起来，在毛主席无产阶级革命路线的基础上，统一认识，统一政策，统一计划，统一指挥，统一行动。在运动中，根据“要摘马克患主义，不要搞修正主义，要团结，不要分裂；要光明正大，不要搞阴谋诡计”的原则，党委内部开展正确路线对错误路线的斗争，正确思想对错误思想的斗争，对自己工作中的缺点错误进行批评和自我批评，是党内生活的正常现象。"}],"authors":["《人民日报》编辑部"],"dates":[{"year":1974,"month":7,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":6,"page_end":6},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"党是领导一切的","authors":["《人民日报》编辑部"],"dates":[{"year":1974,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"党是领导一切的","type":"title"},{"text":"《人民日报》编辑部","type":"authors"},{"text":"今天是中国共产党诞生五十三周年。","type":"paragraph"},{"text":"我们的党，是在阶级斗争和两条路线斗争的风浪中成长壮大的。在批林批孔运动中，各级党委和广大党员又经受了新的考验和锻炼。斗争的实践进一步证明：我们的党是伟大的、光荣的、正确的党。经过八年来的无产阶级文化大革命，经过党的九大和十大，我们党更加坚强，更加团结，更加朝气蓬勃。","type":"paragraph"},{"text":"毛主席教导我们：“中国共产党是全中国人民的领导核心。没有这样一个核心，社会主义事业就不能胜利。”党、政、军、民、学，东、西、南、北、中，党是领导一切的。当前的批林批孔运动，必须在党委统一领导下进行。只有加强党的领导，才能把各方面的力量组织起来，在毛主席无产阶级革命路线的基础上，统一认识，统一政策，统一计划，统一指挥，统一行动。在运动中，根据“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的原则，党委内部开展正确路线对错误路线的斗争，正确思想对错误思想的斗争，对自己工作中的缺点错误进行批评和自我批评，是党内生活的正常现象。它使我们党的组织更富有战斗力，能够更有力地来领导运动，而决不意味着可以削弱党的领导。","type":"paragraph"},{"text":"加强党的领导，最根本的，是坚定不移地贯彻执行毛主席的无产阶级革命路线和政策。要相信群众，依靠群众，放手发动群众，善于把党的政策变为群众的行动。要坚决支持群众的无产阶级革命精神，欢迎群众的批评监督，这是我们党和国家兴旺发达的标志。要深入到群众中去，及时总结群众斗争的经验，集中起来，坚持下去。对于群众运动中出现的某些违背马克思主义的错误思想，要坚持原则，加以引导。毛主席指出，关于党和群众的关系的问题，应当是：“凡属人民群众的正确的意见，党必须依据情况，领导群众，加以实现；而对于人民群众中发生的不正确的意见，则必须教育群众，加以改正。”我们应当这样做。","type":"paragraph"},{"text":"“思想上政治上的路线正确与否是决定一切的。”各级党委要坚持毛主席的无产阶级革命路线，始终站在斗争的前列，牢牢掌握批林批孔斗争的大方向，大胆地领导运动。要在斗争中，使自己成为能够领导无产阶级和革命群众，用马克思主义占领上层建筑领域的战斗堡垒。现在，批林批孔运动已经取得了很大的成绩。要把这个运动深入、普及、持久地进行下去，还需要全党作极大的努力。许多地方的工农兵理论队伍和专业理论工作者，已经积极行动起来，研究两千多年来不同历史时期儒法两家两条路线的斗争历史，吸取历史上阶级斗争的经验，坚持社会主义道路，反对资本主义复辟，巩固无产阶级专政，搞好当前反修防修的斗争。这是运动走向深入的表现。各级党委要掌握新情况，研究新问题，取得领导运动的主动权。要在党的领导下充分发挥各级革命委员会的作用。工、农、妇、青等革命群众组织，也要在党的一元化领导下发挥自己的作用，努力团结百分之九十五以上的群众和干部。","type":"paragraph"},{"text":"“一切行动听指挥，步调一致才能得胜利”。让我们在以毛主席为首的党中央领导下，团结起来，争取批林批孔斗争的更大胜利，争取抓革命、促生产、促工作、促战备的新胜利！","type":"paragraph"},{"text":" （载《人民日报》一九七四年七月一日，社论）","type":"paragraph"}],"comments":[],"origin":"载《人民日报》一九七四年七月一日，社论","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0651a7f61d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
