,"dates":[{"year":1946,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【法国新闻社北平四日电】据此间中共代表宣布，北平军警当局昨晨曾逮捕共产党员四十五人，其中四十一人系新华通讯社及解放出版社编辑部及营业部职工，新华通讯社亦已被封。"},{"type":"paragraph","text":"【合众社北平四日电】北平宪兵及警察昨日清晨在中共十八集团军北平办事处逮捕中共军官八人，其中一人任职于调处总部。顷悉八人中之五人已于今日获释。又新华通讯社及解放日报职员四十二人自被捕后迄今仍未释放。警察当局称渠等所以被捕系因拒绝警察搜查所致。中共方面则谓警察先于周三晨三时搜查新华通讯社旋于五时复来，并捕去大批职员。北平市长熊斌称:渠对此事并无所知，但将立即加以调查。叶剑英氏于事后告报界称:平市府当局及国军当局均谓不知此事，足证“特务机关仍在恣意滋事，破坏全国和平”。据报载:叶氏曾提出六项要求如下，(一)负责搜查之人必须追究后加以惩处。(二)国军当局及北平市府应在报端公开道歉，(三)赔偿损失，(四)保证以后不再发生同样事件，(五)被捕之人必须释放，(六)新华通讯社必须解封。"}],"comments":[],"origin":"法国新闻社,合众社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95f8453ac4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
