art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"朱委员长周总理电唁哥沙曼王后逝世代表毛主席、中国政府和人民向西哈努克亲王表示深切哀悼，并致以亲切慰问","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年四月二十八日讯 中华人民共和国全国人民代表大会常务委员会委员长朱德和国务院总理周恩来四月二十八日致电柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王，对西索瓦·哥沙曼王后的逝世表示深切的哀悼。唁电全文如下："},{"type":"paragraph","text":"尊敬的柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王："},{"type":"paragraph","text":"惊悉西索瓦·哥沙曼王后不幸病逝，我们代表毛泽东主席、中国政府和中国人民向亲王表示深切的哀悼，并致以亲切的慰问。"},{"type":"paragraph","text":"西索瓦·哥沙曼王后是一位杰出的爱国者。在朗诺叛国集团发动反动政变后，王后不畏强暴，大义凛然、坚贞不屈，令人钦敬。"},{"type":"paragraph","text":"希望亲王化悲痛为力量，同柬埔寨人民一起，为建设一个独立、主权、和平、中立、不结盟、民主和繁荣的柬埔寨而作出贡献。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长 朱德"},{"type":"paragraph","text":"中华人民共和国国务院总理 周恩来"},{"type":"paragraph","text":"一九七五年四月二十八日"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"198dd9a382"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
