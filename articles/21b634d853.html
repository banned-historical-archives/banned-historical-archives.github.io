],"dates":[{"year":1950,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市鱼商同业，为改造业务，走向新生道路，发展鱼业起见，经该业公会精密研究检讨鱼商业的过去与未来，拟订了“关于改革鱼业有关问题的报告”，列举改革办法，经会员大会一致通过。该业公筹会本着大会决议的精神，关于取销同业收取外佣二分半问题，经劳资双方代表数度协议。为了提高社会信誉及减轻广大消费者负担起见，决自今日起实行取销外佣。同时因同业专营或兼营代理部份所收佣金，并不一律，有高至一角不等，亦经大会决议调整为一律每元七分，于昨日一并通告会员一致遵行。"},{"type":"paragraph","text":"按鱼商同业，分河鲜、海鲜、咸干三组。一部份河鲜及全部海鲜同业在鱼市场集中营业，一部份河鲜及全部份咸干同业集中在十六铺营业。该业收取外佣的起源，自一九三六年间，全部收入归劳方津贴。由于劳资双方的密切合作，主动的将多年封建剥削的外佣彻底废除，起了牙行商业带头改造的作用。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21b634d853"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
