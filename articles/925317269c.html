torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"红军领袖贺缓远守军抗日胜利","alias":"","parts":[{"type":"paragraph","text":"红车领袖贺绥远守车抗日胜利"},{"type":"paragraph","text":"（1936年11月21日）绥远傅存怀将军台鉴："},{"type":"paragraph","text":"足下孤军抗日，迭获胜利，日伪军不能越雷池一步，消息传来，全国欢腾，足下之英勇抗战，为中华民族争一口气，为中国军人争一口气，非特足以媲美十九路军，且令口口重兵，专以残杀本国同胞为其唯一事业者，羞愧至死！近闻少数卖国汉奸意欲假手于某有力者，假抗日之名，实际上控制足下之爱国行为，吾人深信足下必能以对民族之大义感化万安，不仅使汉奸卖国贼无所售其计，且转而口口抗日力量之团结也。红军抗日援绥且早决心，无口少数汉奸卖国贼竟仍高唱其抗日必先剿共之口调，驱使口国口口实行进攻红军，以求削弱国防力量，而迎日本帝国主义根绝中国抗日运动之要求，抗日人民红军誓以其全力与若辈无耻之徒相同口，庶几民族解放之大口口，而我全国人民与血性军人所高举着不致堕落，永增光辉，吾人深信吾人现所努力口停止内战抗日救国之行动，必能对于足下之抗日义举遥为声援敬以一瓣心香祝将军之胜利。并希以此竟传达贵军全体将士。"},{"type":"paragraph","text":"毛泽东朱德叩"},{"type":"paragraph","text":"二十一日"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":11,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":12,"page_end":12},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"925317269c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
