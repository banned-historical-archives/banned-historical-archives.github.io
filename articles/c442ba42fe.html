art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"8月13日；毛泽东作《抗日战争胜利后的时局和我们的方针》讲演","authors":[],"parts":[{"type":"paragraph","text":"1945年8月13日，毛泽东同志在延安干部会议上作《抗日战争胜利后的时局和我们的方针》的讲演，科学地预测了抗日战争阶段过去后时局发展的方向，提出了我党关于和平与战争的方针。"},{"type":"paragraph","text":"毛泽东同志在讲演中指出，日本帝国主义投降后，中日民族矛盾得到解决，中国人民同美蒋反动派之间的矛盾，立即上升为主要矛盾。目前这个斗争表现为蒋介石要篡夺抗战胜利果实和我们反对他的篡夺的斗争。"},{"type":"paragraph","text":"毛泽东的讲演，在中国的两个命运的决战时刻，以敢于斗争、敢于胜利的光辉思想和灵活巧妙的斗争艺术，武装了全党全军和全国人民，为动员全国军民保卫抗战胜利果实和夺取全国革命胜利，作了重要的思想准备。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c442ba42fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
