ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"为审阅中央关于学校工作的指示稿给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"为审阅中央关于学校工作的指示稿"},{"type":"paragraph","text":"给刘少奇等的信"},{"type":"paragraph","text":"（1951年11月12日）刘、周、朱、彭真、胡乔木、杨尚昆同志："},{"type":"paragraph","text":"此件经彭真同志起草，并征求各中央局书记意见加以修改，又经陈伯达同志作了一次修改，我看过，可用。"},{"type":"paragraph","text":"现送请你们审阅，如有意见，请即提出，如无意见，请尚昆再打清样二份，一份连原稿送陈伯达，一份送我，看一遍，即可发出。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十二日"},{"type":"paragraph","text":"[1]周，指周恩来。朱，指朱德。彭真，当时任中共中央书记处候补书记。胡乔木，当时任中共中央宣传部副部长、毛泽东和中央政治局的秘书。杨尚昆，当时任中共中央办公厅主任。"},{"type":"paragraph","text":"[2]指中共中央关于在学校中进行思想改造和组织清理工作的指示稿。这个指示于1951年11月30日印发各中央局，并转分局、省委、市委、区党委、地委、各同级政府的党组和教育公安两部门的党组或党委、青年团团委。"},{"type":"paragraph","text":"[3]陈伯达，当时任中共中央宣传部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":60,"page_end":60},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"书信"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fa9f9f2cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
