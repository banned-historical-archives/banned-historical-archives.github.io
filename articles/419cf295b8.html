script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"6217a650-402c-431d-bc67-8fb48f4f35d2","name":"邓小平言论摘录（续编）（1976.4）","internal":false,"official":false,"type":"img","author":"北京大学、清华大学材料组编，1976.4","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/9.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/10.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/11.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/12.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/13.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/14.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/15.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/16.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/17.jpg"],"article":{"title":"邓小平在国务院办公会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"听×××的。很明显，邓小平不仅仅是答某人翻案的问题，而是要从政治上、思想上，组织上全面否定文化大革命。"},{"type":"paragraph","text":"（九）邓小平在接见全国工业书记"},{"type":"paragraph","text":"会议代表时的讲话（补充）"},{"type":"paragraph","text":"（一九七五年三月五日）"},{"type":"paragraph","text":"△不拉手了，现在工业情况还不好，等你们工业搞上去了再拉手。"},{"type":"paragraph","text":"△工业方面，确实值得引起严重注意。现在生产能力都没有发挥出来。去年一年，工业生产情况是不好的。当然，不平衡，有些行业好一些，石油是好的，电是好的。地区上有三分之一还可以，但有的地方受牵制。"},{"type":"paragraph","text":"第二个问题讲铁路。铁路不解决，计划统统打乱，什么计划都要落空。解决办法，还是集中。….·中央决定，是重申，根据铁路的特性，重申集中统一。"},{"type":"paragraph","text":"△这次确定，铁路的人事调动，还是由铁道部统一管理。铁路与地方闹派性的人是相联系的，他们懂得抓薄弱环节，把铁路一堵就到北京了。你那个××市，铁路的问题，省里就有人支持。要把铁路这条线同地方切断，把铁路上里通外线的割断。根据中央决定，铁道部有这个权。地方解决不了的，铁道部解决，调开那里，同样还在铁路，到哪里都"},{"type":"paragraph","text":"18工作嘛。这个话要讲济楚，以后就这么办。向全体职工动员时，也这样讲。当然是调头头。调动后，他又钻出个头头怎么办钻出来再调。"},{"type":"paragraph","text":"△闹得厉害的人，两派的头头都要调离。八个书记，有的不干事，有的可调省冶金局当顾问，当顾问去嘛，何必占着茅坑不拉屎。×快到二十年了，就没有人？没有从别的地方调。总之不能拖，拖到哪一年呢？社会主义等他怎么行呢？"},{"type":"paragraph","text":"（十）邓小平在国务院办公会议上"},{"type":"paragraph","text":"的讲话（补充）"},{"type":"paragraph","text":"（一九七五年五月二十一日）"},{"type":"paragraph","text":"（当××同志汇报到整个国民经济产值一至四月份比去年同期增长百分之八时）"},{"type":"paragraph","text":"和去年同期相比这个语言要取消。"},{"type":"paragraph","text":"电网有个体制问题，大电网有的跨省，有的超过了过去的大区，该集中的必须集中，大电网集中到中央，委托水电部来管。集中了，在电力不够时，才能牺性某些方面保重点。要写个报告，首先解决这个问题。"},{"type":"paragraph","text":"△（当××同志汇报到钢铁工业上得不理想时）不能说是上，象鞍钢这样大企业要稳定正常生产，不拼"},{"type":"paragraph","text":"19设备，这样才算过得硬。"},{"type":"paragraph","text":"这详讲还不够，应该说，这样独纱下去，对钢铁工业是。破坏不讲质过，不讲设备维修，并成这个样子，是很大的破上不！"},{"type":"paragraph","text":"主席讲矫忙必须过正，解决老大准不过正就不能娇托。更乖要的是，要严格，该调的调，该批的批，该斗的斗，不能慢吞香的，总是等待。"},{"type":"paragraph","text":"△我赞成这个文件（按指的铁工业座谈会文件），要给你们上方宝剑。现在治金部中心要抓四个问题：第一，要建立一个强有力的，敢宇当头的，有能力的领导班子。从部到厂都要这样：第二，坚决同资产阶级派性作斗争。…甚至有的单位，三个人两派，一个人闹派性，两个人害怕。"},{"type":"paragraph","text":"△一个是派性，一个是怕，首先要解决怕字。怕的人，一要支持他不要怕，再怕，不转变，也得调。不能让他站在位子上怕一辈子。部、省，企业都要研究班子问题，不行的坚决调，不要拖。部和省要研究一致了就调，调了公司再调厂，车间以上都要调整好。"},{"type":"paragraph","text":"电力问题，要集中管理，由水电部来管，要赶紧写个文件出来。"},{"type":"paragraph","text":"交通部的远洋，长航，现在可以考虑，要集中管理了。"},{"type":"paragraph","text":"20"},{"type":"paragraph","text":"（十一）邓小平的其他言论（摘录）"},{"type":"paragraph","text":"邓小平授意胡乔木在国务院政治研究室组织人写鼓吹"},{"type":"paragraph","text":"“三项指示为纲”的文章。胡乔木说，这是很重要的文章，邓小平很赞成写，一定要写好。邓小平说，只要写成就可以作为《红旗》杂志或《人民日报》的社论发表。"},{"type":"paragraph","text":"（1976年3月×××同志的揭发）"},{"type":"paragraph","text":"一九七五年九月，胡乔木讲过这样的话：“我已组织政研室的同志写一篇‘以三项指示为纲的文章。这篇文章拟作为人民日报》的社论发表。如《人民日报不发表，拟经邓小平同意后交《红旗》杂志发表。文章发表后就是一个拳头打出去了。”"},{"type":"paragraph","text":"（1976年2月18日×××同志的揭发）"},{"type":"paragraph","text":"胡乔木同志说，我之所以要写评《水浒》的文章，是由于我不同意说现在党内还有投降派，还有宋江，有些文章说宋江架空显盖，影射邓小平，我不赞成这种说法。"},{"type":"paragraph","text":"胡还说，我提出要写“以三项指示为纲”和评《水浒》两篇文章，曾向党内不肯改悔的走资派报告过，他说很好，如果写得好，可送他，还可在《人民目报》发表。"},{"type":"paragraph","text":"21"}],"authors":["邓小平"],"dates":[{"year":1975,"month":5,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":12,"page_end":13},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"以三项指示为纲","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平在国务院办公会议上的讲话","authors":["邓小平"],"dates":[{"year":1975,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"邓小平在国务院办公会议上的讲话","type":"title"},{"text":"邓小平","type":"authors"},{"text":"摘要:","type":"paragraph"},{"text":"要建立一个强有力的，“敢”字当头的，有能力的领导班子。","type":"paragraph"},{"text":"现在，在干部中有一个主要问题，就是怕，不敢摸老虎屁股。我看这是第一位的，资产阶级派性是第二位的。一个部门，一个企业的领导，不能怕这怕那。要找一些不怕打倒的人。条件就是中央支持他，省委支持他。允许犯错误，允许改正错误。没有这一些，扭转不过来。只要他按中央和国务院的指示办事，有错也不要紧，工作中那有不犯错误的。","type":"paragraph"},{"text":"我就是犯过大错误的人，现在也难免说错话。我这个人象维吾尔族的姑娘，辫子多，一把就抓几个。","type":"paragraph"},{"text":"不管是哪一级的领导，不能总是怕这怕那。现在干部中有一个主要问题，就是怕字当头，不敢摸老虎屁股。我们一定要支持你们，也允许你们犯错误。要找那些敢于坚持原则，有不怕个人被打倒的精神，敢于负责，敢于斗争的人。","type":"paragraph"},{"text":"鞍钢、武钢都有派性的问题。对派性不能“怕”字当头，要采取毛主席说过的原则，寸土必争，寸土不让，要搞就要坚决搞。","type":"paragraph"},{"text":"要“敢”字当头，要严格。该调的就调，该批的就批，该斗的就斗，不能慢吞吞的，总是等待。","type":"paragraph"},{"text":"我们同资产阶级派性作斗争，也要采取毛主席说过的原则，寸土必争，寸土不让，要搞就要坚决搞。","type":"paragraph"},{"text":"如果闹派性严重，而又不改正的，就坚决调开。调出去又钻出来新的，那就再调，一年调它三百六十次行不行？总是党性要占上风，派性要克服。什么事情不能拖延不决。","type":"paragraph"},{"text":"过去我们对铁道部说，只等一个月。现在我们对七机部也提出只等一个月，到六月三十日为止。从七月一日起，要搞成一个“七一”派，毛主席派，党性派，过一个月以后，那就不客气了，对什么人也不等，管你是老虎屁股、狮子屁股，都要摸、都要斗、坚决地斗。","type":"paragraph"},{"text":"落实政策，特别是对老工人，对有经验的干部，一定要落实好政策，因为运动一来往往伤害了这一部分人。我们说经验主义不好。可是把主义两字去掉，经验是宝贵的，不能忽视。这些工人和干部摸到的经验是可贵的。要培养多少年才行啊。这些人积极性不调动起来是不行的。","type":"paragraph"},{"text":"我们反对唯生产力论，但是搞社会主义建设，不能不搞生产，不能不搞科学技术，我们强调劳动生产率，强调科学技术，不能称作唯生产力论，如果不讲这些，还能谈得上社会主义建设总路线吗？！我们总是要把革命和生产都搞好才行嘛。","type":"paragraph"},{"text":"（当××同志汇报到整个国民经济产值一至四月份比去年同期增长百分之八时）","type":"paragraph"},{"text":"和去年同期相比这个语言要取消。","type":"paragraph"},{"text":"电网有个体制问题，大电网有的跨省，有的超过了过去的大区，该集中的必须集中，大电网集中到中央，委托水电部来管。集中了，在电力不够时，才能牺牲某些方面保重点。要写个报告，首先解决这个问题。","type":"paragraph"},{"text":"（当××同志汇报到钢铁工业上得不理想时）","type":"paragraph"},{"text":"不能说是上，象鞍钢这样大企业要稳定正常生产，不拚设备，这样才算过得硬。","type":"paragraph"},{"text":"这样讲还不够，应该说，这样继续下去，对钢铁工业是破坏！不讲质量，不讲设备维修，弄成这个样子，是很大的破坏！","type":"paragraph"},{"text":"主席讲矫枉必须过正，解决老大难不过正就不能矫枉。更重要的是，要严格，该调的调，该批的批，该斗的斗，不能慢吞吞的，总是等待。","type":"paragraph"},{"text":"我赞成这个文件（按指钢铁工业座谈会文件），要给你们上方宝剑。现在冶金部中心要抓四个问题：第一，要建立一个强有力的，敢字当头的，有能力的领导班子。从部到厂都要这样。第二，坚决同资产阶级派性作斗争。……甚至有的单位，三个人两派，一个人闹派性，两个人害怕。","type":"paragraph"},{"text":"一个是派性，一个是怕，首先要解决怕字。怕的人，一要支持他不要怕，再怕，不转变，也得调。不能让他站在位子上怕一辈子。部、省、企业都要研究班子问题，不行的坚决调，不要拖。部和省要研究一致了就调，调了公司再调厂，车间以上都要调整好。","type":"paragraph"},{"text":"电力问题，要集中管理，由水电部来管，要赶紧写个文件出来。","type":"paragraph"},{"text":"交通部的远洋、长航，现在可以考虑，要集中管理了。","type":"paragraph"},{"text":"来源：清华大学、北京大学材料组编《邓小平言论摘录（续编）》，一九七六年四月；","type":"paragraph"},{"text":"一九六七年三月中国科学院运动办公室印《不肯改悔的走资派邓小平言论摘录》","type":"paragraph"}],"comments":[],"origin":"清华大学、北京大学材料组编《邓小平言论摘录（续编）》，一九七六年四月；\n　　　　　一九六七年三月中国科学院运动办公室印《不肯改悔的走资派邓小平言论摘录》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"419cf295b8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
