根基  中国文化大革命是实现社会主义和共产主义事业的最可靠保证","authors":[],"dates":[{"year":1967,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"多米尼加“六·一四”革命运动发表声明祝贺我国庆"},{"type":"paragraph","text":"伟大的中国革命动摇了世界帝国主义的根基"},{"type":"paragraph","text":"中国文化大革命是实现社会主义和共产主义事业的最可靠保证"},{"type":"paragraph","text":"据新华社四日讯　多米尼加“六·一四”革命运动中央委员会就中华人民共和国成立十八周年发表声明，热情赞扬中国革命的胜利和社会主义建设的伟大成就，赞扬中国无产阶级文化大革命。"},{"type":"paragraph","text":"声明指出：“勤劳的中国人民，在光荣的中国共产党的正确领导下，在光焰无际的毛泽东思想的指引下，依靠斗志昂扬的中国人民解放军，经过了长期不屈不挠的战争，终于在一九四九年十月一日宣告了中华人民共和国的成立”。声明说：“伟大的中国革命的胜利动摇了世界帝国主义和殖民主义的基础，并且从根本上改变了世界力量的对比而使之有利于社会主义。”"},{"type":"paragraph","text":"声明说：“英勇勤劳的中国人民在中国共产党的英明领导下，高举毛泽东思想红旗，遵循马克思列宁主义的正确路线，忠实地执行了自力更生的政策，坚持不懈地发展了社会主义的农业和工业，在思想战线上不屈不挠地、坚决地、坚韧不拔地同资产阶级的立场和思想展开了斗争，同修正主义和教条主义进行不调和的斗争，并且推动了三大革命运动：阶级斗争、生产斗争和科学实验，从而在社会主义建设中取得了卓绝的成就，为过渡到共产主义奠定了基础。”"},{"type":"paragraph","text":"声明强调指出：“中国革命的发展无可置疑地证明了以下这个马克思列宁主义的论断：在社会主义社会中，还存在阶级斗争。”声明指出，为了同党内一小撮走资本主义道路的当权派作斗争，中国广大人民和无产阶级革命派，在毛泽东主席的天才领导下，进行了无产阶级文化大革命，“这个革命是阶级斗争史上的空前事件，它是在中国和世界其它国家实现社会主义和共产主义事业的最牢靠的保证。”"},{"type":"paragraph","text":"声明最后重申，多米尼加“六·一四”革命运动“坚定不移地支持英雄的中国人民、光荣的中国共产党、无产阶级文化大革命和中国人民的伟大领袖毛泽东同志对帝国主义、现代修正主义和各种反动分子进行的坚决的、一贯的、和不妥协的斗争。”"},{"type":"paragraph","text":"多米尼加“六·一四”革命运动驻古巴代表团最近在哈瓦那对新华社记者发表声明，热烈祝贺中华人民共和国成立十八周年。声明赞扬中国无产阶级文化大革命说，这一革命是“对马克思列宁主义作出的一个宝贵贡献。”"},{"type":"paragraph","text":"声明最后说：“中国人民今天所走的正确道路，完全证明了毛泽东同志在他关于阶级斗争、无产阶级政权和反帝反修斗争的著作中所提出的论点是正确的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6988758f8b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
