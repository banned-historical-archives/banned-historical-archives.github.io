<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共陕西省委办公厅给工业厅关于在公私合营企业中进行“三反”工作的报告问题批答","authors":[],"dates":[{"year":1952,"month":2,"day":1}],"is_range_date":false,"parts":[{"text":"中共陕西省委办公厅给工业厅关于在公私合营企业中进行“三反”工作的报告问题批答","type":"title"},{"text":"1月28日的来函阅悉，关于在公私合营企业中进行“三反”工作的问题，提出如下意见：","type":"paragraph"},{"text":"（一）解放前的贪污、盗窃案可概不加追究，因为，解放前的私营厂矿是资本家剥削劳动人民的工具，它本身带有许多舞弊，贪污、盗窃等思想行为，现在，领导上如有意识地号召坦白，可能牵扯的打击面过宽，而我们的重点应该是集中火力搞清合营后的贪污、盗窃案。","type":"paragraph"},{"text":"（二）解放后的贪污、盗窃案，大部可能与解放前之贪污案有关，如追究也不易搞清，故只号召坦白，进行思想检讨，提高政治觉悟为目的，所贪污的财物，除贪污、盗窃国家和工人的外，一般不必追究退还（自动献交公司者不限）。这样作我们可争取主动，以便有重点有计划地进行这一工作。","type":"paragraph"},{"text":"另关于公私合营后的“三反”问题同意你们的意见。","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"陕西省工业厅关于在公私合营企业中进行“三反”工作的报告","type":"subtitle"},{"text":"（1952年1月28日）","type":"subtitle"},{"text":"本厅所属各厂矿的“三反”运动，1月7日已作了具体布置，除西安面粉厂、化工三厂与农业机械厂筹建处直接受厅领导外，指示中规定其他厂矿的“三反”运动，必须在当地党、政统一领导下进行，除经常向所在地党政报告请示“三反”进度、情况和问题外，并定期向本厅作书面报告。但迄今除农具厂筹建处、面粉厂、化工三厂和新秦公司作了简单报告外，其它单位尚无报告。为了检查铜川、宝鸡和西安11厂矿的“三反”工作，拟于本月31日至2月2日召集各单位领导“三反”运动负责人开座谈会。目的是检查和督促各厂矿限期完成。我们计划于2月20日前基本结束。石泉、南郑、延安、榆林等地工厂本月27日电催各厂速作报告。请省委电告上述各地委注意检查他们的“三反”。","type":"paragraph"},{"text":"我们自今尚未看到中央关于在公私合营企业中进行“三反”的指示，和各地区关于这一方面的经验介绍。新秦公司各厂因系公私合营，情况与国营、公营企业不同。我们意见在合营企业中同样应进行“三反”。但其特点是：合营前全部为私人资本家的企业。工人职员贪污（或偷窃）浪费了资本家的财产（是社会财产）。应明确划分为三个时期：即解放前，解放后和合营以后（1951年11月1日）。因为三个时期情况各不相同，所以处理办法也应有所区别。①解放前的贪污（或偷窃），欢迎坦白、但不作贪污（或偷窃）论，其所贪污之财物一般的可不必令其退还，只作思想检讨，藉以进行反贪污（或偷窃）的思想教育。②解放后除欢迎与鼓励坦白和思想检讨外，并应将所贪污（或偷窃）之财产（尤其是机器零件、工具、器材、油料及物资）全部或一部、献交公司（不应全部归还资方所有，因为我们帮助资本家反贪污、既不易反彻底，又容易被落后职工所误解、做起来也有困难。如动员献交新公司，估计容易打通思想，被职工所乐意接受）。一律免予处分。③合营后仍有贪污（或偷窃）者，除欢迎彻底坦白并检举别人进行深刻检讨，退出全部赃款（物）外，并应分别情节轻重，悔改程度，予以处分。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a72b55600e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
