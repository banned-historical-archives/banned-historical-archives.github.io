nth":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京部队石家庄步兵学校近几年来为部队培养了大批的指挥员。这是年青的学员以整齐的步伐通过主席台。"},{"type":"paragraph","text":"中央军委主席邓小平在检阅台上向受阅部队亲切招手致意。"},{"type":"paragraph","text":"炮兵部队通过主席台。"},{"type":"paragraph","text":"解放军某部拖带着我国自行设计制造的地对空导弹，接受检阅。"},{"type":"paragraph","text":"空军某部飞行大队，在空中做了九机编队拉烟表演，受到党和国家领导同志的赞扬。"},{"type":"paragraph","text":"海军某部干部战士英姿勃勃地通过了主席台。"},{"type":"paragraph","text":"隆隆的炮车，载着高度警惕的战士，接受检阅。"},{"type":"paragraph","text":"火箭炮车上载着优秀的炮手，威武雄壮地通过了主席台。"},{"type":"paragraph","text":"（本版照片为北京部队司令部供稿）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2c0858025"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
