卢劲","陶文革"],"dates":[{"year":1998,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社香港8月3日电　(记者卢劲、陶文革)中国外交部长唐家璇在菲律宾参加了第5届东盟地区论坛外长会及中国与东盟对话会后返回北京途经香港时，今晚对新闻界发表谈话，阐述了中国政府对印尼华人华侨问题的立场和看法。"},{"type":"paragraph","text":"他说，在今年5月，印尼一些城市发生骚乱时，当地不法份子对许多华人华侨商店进行烧、砸、抢的洗劫，不少华人华侨妇女还遭受强暴。中国人民和世界各地的华人社会及团体对此感到十分义愤，“我认为，这是理所当然的”。"},{"type":"paragraph","text":"唐家璇说，中国政府对这一事件十分重视，极为关注在印尼的华人华侨的处境，并多次通过外交途径要求印尼方面惩处凶手，采取有力、有效措施，确保华人华侨的人身安全和合法权益，防止再度发生类似事件。"},{"type":"paragraph","text":"唐家璇说，“不久前，我利用出席东盟地区论坛外长会议之机，在会上发言时提出了印尼的华人华侨问题，会后又约印尼外长阿拉塔斯进行了双边会晤。会晤中，我强烈要求印尼政府高度重视这一事件，尽快采取措施，确保华人华侨的安全和合法权益，对不法罪犯严加惩处。”"},{"type":"paragraph","text":"唐家璇说，阿拉塔斯外长在会晤中表示，发生这类事件是印尼的耻辱。哈比比总统也认为，这是一次极不人道的事件，已下令成立专门调查委员会。印尼承诺，将对肇事者绳之以法，并采取措施，防止再次发生这种事件。"},{"type":"paragraph","text":"唐家璇表示:现在，我们正拭目以待印尼方面的调查委员会将发表怎样的调查结果，作出怎样的结论。我们也在密切注视印尼方面将采取哪些有力、有效措施，来确保在印尼的华人华侨的安全和权益，杜绝再度发生类似事件。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25b38412b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
