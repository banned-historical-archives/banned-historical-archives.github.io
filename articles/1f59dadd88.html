uthors":[],"dates":[{"year":1952,"month":6,"day":26}],"is_range_date":false,"parts":[{"text":"贵阳市资产阶级五反后的态度","type":"title"},{"text":"【西南总分社六月廿六日讯】贵阳市工商户大部已处理完毕，处理后的反映是：(一)经宽大处理的大户普遍高兴、感激，感到“喜出望外”。如西药业的中西药房和西药合营公司资方，本准备倾家荡产将全部资金赔光了事，但得到宽大处理，补退仅五百万元的通知后，对政府的宽大说不尽的感激。(二)中等户感到宽大“也好”，但不及大户那么高兴。(三)小户感到不满，认为对大户太宽大了。原因是：第一、与大户矛盾未解决。大、小户间由于经济力量悬殊，总存在着矛盾，五反初期，很多平时受排挤的小户都想借此“整”一下大户，现在却见大户受了宽大处理，有些不服气。第二、小户虽然也受了宽大，但因小户减免不过几十万、几百万，大户一减免就是上千万、上亿，以数字比，相形之下仍觉得大户比小户便宜。","type":"paragraph"},{"text":"目前营业较好的行业和从事工业生产的资本家经营较积极。如西药业，因现在是旺季，营业额都有增加，因此，西药业一般资方都已考虑进货，经营态度都较五反初期积极。但经营商业，目前营业又不特别好的行业的资方顾虑较多。如百货、花纱、绸布业生产一般未很好动起来，中、小户尚好，大户顾虑更多。同时，资本家内部矛盾也在五反中增多，现在互相观望，谁也不愿拿出钱来，如新生公司(百货)资方朱志国，存有大批资金，但却天天向职工叫苦强调资金困难。贸易运销业资方一般顾虑多，不敢大胆经营。有的资方进货、卖货都要问劳方，一方面说明其不大胆，同时也是想把经营责任完全推到劳方身上。再如新森济等商号的资方愿保留一部分账外资金，不愿拿出来生产，原因是对政府政策怀疑，认为留些钱在自己手里总好些，恐怕生意作大了，将来政府要的钱也多。经过五反，由于工商业曾一度停滞，与有的工商业户补退较多，部分工商户资金确是较困难，目前都要求政府贷款，但因同业公会和基层工会都正在整理中，所以贷款尚未放手发出。此间银行也正开会研究贷款问题。","type":"paragraph"}],"comments":[],"origin":"1952年7月5日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f59dadd88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
