art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总后勤部某仓库勤务一连指战员；收听了林副主席政治报告；连夜畅谈无产阶级文化大革命的伟大胜利；大家说：无产阶级文化大革命是巩固无产阶级专政的最好形式","authors":[],"parts":[{"type":"paragraph","text":"总后勤部某仓库勤务一连的指战员，连夜认真学习林副主席的政治报告，他们满怀激情地说：伟大领袖毛主席不仅创立了无产阶级专政下继续革命的伟大学说，而且为我们找到了进行这场革命的最好形式，就是无产阶级文化大革命。毛主席亲自发动和领导的这场无产阶级文化大革命，是毛主席对马克思列宁主义的理论和实践的一个伟大的新贡献。"},{"type":"paragraph","text":"毛主席教导我们：“过去我们搞了农村的斗争，工厂的斗争，文化界的斗争，进行了社会主义教育运动，但不能解决问题，因为没有找到一种形式，一种方式，公开地、全面地、由下而上地发动广大群众未揭发我们的黑暗面。”大家回顾了这场无产阶级文化大革命的战斗历程，对毛主席的这一伟大教导，感到特别亲切。大家深刻地认识到：伟大领袖毛主席替我们找到的无产阶级文化大革命这个最好形式，公开地、全面地、由下而上地发动了亿万群众，进行了大鸣、大放、大字报、大辩论，把刘少奇这个叛徒、内奸、工贼的真面目彻底揭露出来，摧毁了他的资产阶级黑司令部，把混入党内的叛徒、特务、走资派揭露出来，粉碎了他们复辟资本主义的阴谋。“这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的。”"},{"type":"paragraph","text":"思想政治领域中的阶级斗争是长期的。指导员乔志发说：“刘少奇被打倒了，但他的反革命修正主义思想的余毒还没有肃清。我们一定要响应林副主席的政治报告中提出的战斗号召，继续高举革命大批判的旗帜，用毛泽东思想批判资产阶级，批判修正主义，彻底肃清大叛徒刘少奇的反革命修正主义思想的余毒。我们一定要牢牢握紧枪杆子，拿好笔杆子，紧跟伟大领袖毛主席，把无产阶级文化大革命进行到底！”"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f85405e408"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
