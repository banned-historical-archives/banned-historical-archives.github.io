hors":[],"dates":[{"year":1963,"month":8,"day":21}],"is_range_date":false,"parts":[{"text":"林彪关于了解中国历史与秘书李德的两次谈话","type":"title"},{"text":"马（克思）恩（格斯）全集1至13卷摘录，已经让叶群读过一遍，有用处，以后用这种方式继续搞。摘录主要摘思想性的原话，体现了马（克思）、恩（格斯）思想的概括性的语句，叙事性的东西可以省略，现在已出到13卷，以后陆续出陆续搞。……","type":"paragraph"},{"text":"现在主要搞文史资料，了解辛亥革命以后的历史，现在先搞军事的，再搞政治的、经济的。目的是了解中国几千年来的历史，各时代各统治阶级的情况，一项一项地搞，学习历史，学习历史的经验。","type":"paragraph"},{"text":"中国的历史，从上古到民国，恐怕只有民国这一段最真实。写这一段历史的人，都亲自参加了这一段的实际，作了如实的揭露。而过去的历史，大都属于传说、迷信、被歪曲了、被强加上统治阶级的意志。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ddab1f768"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
