ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"给傅斯年的短笔和条幅","alias":"","parts":[{"type":"paragraph","text":"给傅斯年的短笺和条幅！!"},{"type":"paragraph","text":"（1945年7月5日）孟真先生："},{"type":"paragraph","text":"遵嘱写了数字，不像样子，聊做纪念。今日闻陈胜、吴广之说，未免过谦，故述唐人诗以广之。"},{"type":"paragraph","text":"敬颂旅安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月五日"},{"type":"paragraph","text":"竹帛烟销帝业虚，关河空锁祖龙居。坑灰未烬山东乱，刘项原来不读书。"},{"type":"paragraph","text":"唐人咏史一首，书呈孟真先生。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]1945年6月2日，褚辅成、黄炎培、冷通、王云五、傅斯年、左舜生、章伯钧7位国民参政员联名致电毛泽东、周恩来，提出访问延安，并“希望继续商谈，以使抗战胜利早日到来”。这是毛泽东写给傅斯年的短笺和条幅。傅斯年（1896—1950)，字孟真，山东聊城人，祖籍江西永丰，历史学家、学术领导人、五四运动学生领袖之一、中央研究院历史语言研究所的创办者。傅2"},{"type":"paragraph","text":"常约前市黄盛网"},{"type":"paragraph","text":"程龙居公发都颂愈年"},{"type":"paragraph","text":"德毛泽东给傅斯年的短笺和条幅的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":7,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":161,"page_end":162},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8487823391"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
