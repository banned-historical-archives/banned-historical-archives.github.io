ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发陈不显关于苏南镇反工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发陈不显关于苏南镇反工作报告的批语"},{"type":"paragraph","text":"（1951年2月11日）各中央局，并转所属分局，省市区党委："},{"type":"paragraph","text":"下面是苏南区党委书记陈不显同志给饶漱石\"同志的报告？，发给你们作参考。我认为陈不显同志的进一步镇反计划是完全正确的，那些镇压反革命尚不甚坚决和明确的地方，应当以此为法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十一日[1]饶漱石，当时任中共中央华东局第一书记。"},{"type":"paragraph","text":"[2]陈不显1951年2月4日关于进一步镇反计划的报告指出，要加紧剿匪，再抓一批恶霸不法地主，捕杀一批职业会道门头子、典传师、大坛主，加强对特务的侦破和镇压，全面登记反动党团和特务，抓杀一批为群众所痛恨的罪大恶极者和继续进行反革命活动者。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":118,"page_end":118},"tags":[{"name":"毛泽东","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40cacf0b32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
