恐惧和不安","authors":[],"dates":[{"year":1951,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"格罗提渥建议和平解决德国问题"},{"type":"paragraph","text":"法英进步舆论表示热烈拥护"},{"type":"paragraph","text":"资产阶级报纸也无法掩饰其恐惧和不安"},{"type":"paragraph","text":"【新华社二十日讯】据塔斯社消息：德意志民主共和国总理格罗提渥声明及人民议会决议所提出的召开全德会议以举行全德选举并加速缔结对德和约的建议，在西欧各国舆论中引起极大的反响。"},{"type":"paragraph","text":"法、英等国进步舆论热烈拥护格罗提渥的声明。法国《人道报》说：格罗提渥的建议是和平解决德国问题的建议。它反对华盛顿美英法三外长会议所决定的恢复法西斯国防军、与德国报复分子单独媾和的计划，而要避免战争，统一德国。美国建议德国继续希特勒的政策，而格罗提渥却建议在统一的德国的范围内为和平而斗争。因此格罗提渥的建议立刻在西德广大人民中获得最热烈的响应。《今晚报》指出：西德波恩“政府”坚持其拒绝格罗提渥建议的无理的敌对政策，就必然要在西德人民面前暴露它意图维持德国分裂状态、并帮助把西德变成世界战争的危险基地的面目。"},{"type":"paragraph","text":"英国《工人日报》发表社论指出：格罗提渥建议是走向和平的唯一途径，而华盛顿会议武装德国复仇主义者的决议是要把全世界抛入战争。该报号召英国人民立刻行动起来，为反对华盛顿会议决议而斗争是每一个英国爱国者为了民族所必须负起的神圣责任。"},{"type":"paragraph","text":"法国资产阶级报纸无法抹煞格罗提渥建议的重大意义，巴黎各报在九月十七日都不得不一致刊登了格罗提渥声明和人民议会决议的消息。英国资产阶级舆论虽然力图缩小格罗提渥建议的意义，但是却掩饰不了它们因为华盛顿会议武装西德计划将受到格罗提渥建议的严重打击而感到的恐惧和不安。《观察家》报驻波恩记者在评论格罗提渥声明时说：这次建议的内容要比以前几次提出的都更为实际。《曼彻斯特卫报》忧虑地说：阿登纳不应简单地立即拒绝这个建议就了事，这个建议是值得探讨的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3409c5c008"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
