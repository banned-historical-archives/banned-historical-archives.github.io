art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为革命造反派大联合大夺权贡献力量某部战士业余演出队在列车上宣传毛主席的革命路线","authors":["战旗兵"],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队某部战士业余演出队，为了贯彻执行毛主席关于人民解放军应该积极支持左派广大群众的指示，随同部队在铁路上值勤的人员，到列车上为旅客巡回演出，大力宣传毛泽东思想，宣传毛主席的革命路线，为革命造反派大联合大夺权作出贡献。"},{"type":"paragraph","text":"演出队的同志“发扬勇敢战斗、不怕牺牲、不怕疲劳和连续作战（即在短期内不休息地接连打几仗）的作风”，深入工人宿舍、饭堂、站台、候车室、列车车厢等场所巡回演出。他们以高度的革命热情，歌颂毛主席的革命路线，歌唱无产阶级革命派的大联合大夺权，揭露和批判资产阶级反动路线。一次，在由北京至大连的直达快车上，他们在车厢里演出了“粉碎反革命经济主义，打退资产阶级反动路线的新反扑”的节目，旅客们看了后，受到很大教育。兰州化工炼油厂的一位工人说：“你们对阶级敌人揭露得彻底，批判得深刻，帮助我们更好地理解了毛主席的教导。”葫芦岛造船厂一位造反派的工人说：“你们的节目说出了我们的心里话。”"},{"type":"paragraph","text":"这个演出队的同志，还辅导旅客学习毛主席著作，教唱革命歌曲，使列车上充满着浓厚的政治空气。春节前夕，他们在列车上还组织了一次歌颂晚会。晚会上，旅客们尽情地欢呼歌唱毛主席，表达了革命群众对最最敬爱的领袖的无限忠诚，无限热爱。"},{"type":"paragraph","text":"演出队的同志们在宣传演出过程中，十分注意向革命群众学习。革命群众对毛主席无限热爱的深厚阶级感情，深深地感染了每个同志。大家表示：一定要在当前阶级斗争的大风大浪里，活学活用毛主席著作，搞好无产阶级文化大革命，加速自己世界观的改造。（战旗兵）"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14bfbe466f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
