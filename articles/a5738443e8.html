ar":1965,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我是复旦大学数学系应届毕业生，从小生活在资产阶级知识分子的家庭里。由于家庭的资产阶级思想的影响，我在毕业分配问题上，就有过思想斗争，怕到外地去，怕外地生活艰苦。"},{"type":"paragraph","text":"去年冬天，我参加了郊区社会主义教育运动。我住的红星大队，有个“讨饭圩”。“讨饭圩”里的几十户农民中，解放前只有两户是没有讨过饭的。他们辛勤劳动一年，可是大熟收下来的粮食只能吃三四个月，其他时间没有吃，只好到外地去讨饭。有时讨不到饭，不得不到海滩上去拾灰菱白来充饥。我看到了农民在旧社会的血泪史，也更加清楚地认识到了自己的家庭。我感到自己必须坚决抛弃过去所向往的那种资产阶级的所谓“幸福”生活，坚决地把根子扎到贫下中农中去。"},{"type":"paragraph","text":"通过社会主义教育运动，我又看到，我们完全是党和劳动人民培养长大的。我们坐的是劳动人民打下的江山，吃的是劳动人民打下的粮食，穿的是劳动人民做出的衣服，学的是劳动人民在实践中积累起来的知识。如果没有党和劳动人民，哪里会有我这样一个大学生呢?我毕业后绝对不能将知识作为个人生活的“资本”。我决心要向贫下中农学习，发扬艰苦奋斗的精神，毕业后到边疆去，到艰苦的地方去，将自己所有的知识、所有的力量贡献给祖国。党要我到哪里去，我就到哪里去，干一辈子革命，决不讨价还价，决不犹豫!"},{"type":"paragraph","text":"复旦大学数学系应届毕业生　陈月娥"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5738443e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
