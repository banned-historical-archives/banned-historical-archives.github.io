rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"努力弄清对资产阶级全面专政的问题七连党支部组织干部战士认真学习无产阶级专政理论","authors":[],"parts":[{"type":"paragraph","text":"本报讯 六七六一部队七连党支部，发动干部战士逐条逐句学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁论无产阶级专政的语录，并且联系阶级斗争实际反复思考，努力从理论和实践的结合上弄懂对资产阶级全面专政的问题。"},{"type":"paragraph","text":"在学习中，党支部首先引导大家刻苦攻读，对语录一条一条地学，一条一条地议，并结合学习马列著作和毛主席著作的有关章节，力求弄清楚每一条语录的历史背景、中心大意和精神实质。六班在学习第一条语录时，为了从理论上弄清阶级斗争必然要导致无产阶级专政这个问题，战士们自学了《共产党宣言》、《国家与革命》、《论人民民主专政》、《关于正确处理人民内部矛盾的问题》等马列著作和毛主席著作的有关章节，还读了一点社会发展史和政治经济学基础知识。经过反复学习、反复思索，进一步理解了为什么阶级斗争必然导致无产阶级专政这个问题。火箭二班在学习列宁关于“在共产主义下，在一定的时期内，不仅会保留资产阶级法权，甚至还会保留没有资产阶级的资产阶级国家”这条语录时，对这段话的意义不大理解。班长吴乾统就引导全班战士围绕这个问题，学习、议论了四、五次，终于弄懂了这个问题。"},{"type":"paragraph","text":"在刻苦攻读的基础上，七连党支部还组织大家紧密联系无产阶级专政的历史经验，联系林彪反党集团妄图复辟资本主义的罪行，联系现实的阶级斗争、路线斗争实际，进行深入的讨论，从理论和实践的结合上加深了无产阶级必须对资产阶级全面专政的理解。"},{"type":"paragraph","text":"通过认真学习，七连同志对无产阶级专政理论有了进一步认识，提高了继续革命的觉悟，自觉地抵制资产阶级思想的侵蚀和影响。今年复员退伍的战士，坚决服从革命需要，愉快地走上了农业第一线，有的回乡第二天就积极参加了集体生产劳动。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"385a65d05c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
