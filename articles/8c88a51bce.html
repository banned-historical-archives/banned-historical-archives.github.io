rs":[],"dates":[{"year":1966,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宁夏回族自治区党委常委扩大会议强调"},{"type":"paragraph","text":"用毛泽东思想解决突出政治的问题"},{"type":"paragraph","text":"据新华社银川二十八日电  中共宁夏回族自治区委员会最近举行的常委扩大会议指出，突出政治的根本问题，是要活学活用毛主席著作。会议号召全区干部特别是县以上干部，把学习毛主席著作放在一切工作的首位，在“用”字上狠下功夫，用毛泽东思想来改造自己的思想和改进工作。"},{"type":"paragraph","text":"会议认为，几年来，宁夏各级党组织和广大干部在突出政治方面，是有成绩的。主要是：第一，加强了对学习毛主席著作运动的领导，广大群众和干部自觉地学习毛主席著作，形成了前所未有的群众性热潮。第二，对阶级斗争的认识有明显的进步。第三，进一步增强了群众观点，坚持走群众路线。第四，各地区、各系统的政治工作逐步加强。"},{"type":"paragraph","text":"会议指出，目前在突出政治方面的问题是：在有些党员和干部中，存在着单纯的生产观点、单纯的业务观点、单纯的技术观点；有些人把政治同生产、政治同业务、政治同技术并列起来，搞折衷主义。有的对突出政治的重大意义认识不足，忙于业务，忽视或放松思想政治工作，陷入事务主义。"},{"type":"paragraph","text":"会议强调要用毛泽东思想来解决突出政治方面存在的问题，进一步推进毛主席著作学习运动的深入发展。当前要："},{"type":"paragraph","text":"一、学好毛主席关于政治统帅一切的指示。广大干部特别是负责干部，要采取整风的方法，联系实际，开展批评和自我批评，提高对突出政治的重要性的认识。各地区各部门要对突出政治的问题进行一次认真的检查，落实措施。二、要抓好县以上领导干部带头学、带头用的问题。言教要结合身教，身教胜于言教。领导干部学好用好了，在改造思想、改进工作中做出了榜样，就是最实际、最有力地加强对学习毛主席著作的领导。三、要用毛泽东思想改造客观世界和主观世界，首先是改造主观世界。四、要树立活学活用毛主席著作的先进典型，总结推广他们的经验。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"宁夏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c88a51bce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
