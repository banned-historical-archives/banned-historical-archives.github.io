script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国巴基斯坦友好万岁!　全世界人民大团结万岁!首都万人集会热烈欢迎阿尤布·汗总统刘少奇主席周恩来总理陈毅副总理等出席大会　彭真市长和阿尤布·汗总统讲话，共祝中巴两国友好关系的新发展","authors":[],"dates":[{"year":1965,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京5日电　首都各界一万人今天下午在人民大会堂隆重集会，热烈欢迎巴基斯坦伊斯兰共和国总统穆罕默德·阿尤布·汗元帅。"},{"type":"paragraph","text":"中华人民共和国主席刘少奇，国务院总理周恩来，北京市市长彭真和夫人张沽清，国务院副总理陈毅和夫人张茜，全国人民代表大会常务委员会副委员长林枫，出席了欢迎大会。"},{"type":"paragraph","text":"彭真市长和阿尤布·汗总统在大会上讲话，共祝中巴两国友好关系的新发展。彭真市长代表首都人民向阿尤布·汗总统赠旗。红色的锦旗上用金线绣着:“中国人民和巴基斯坦人民，在维护民族独立，增强亚非团结和保卫世界和平的事业中，永远携手前进!”"},{"type":"paragraph","text":"宏伟壮丽的人民大会堂今天充满一片友谊气氛。主席台中央的帷幕上并排悬挂着中国和巴基斯坦国旗，主席台对面的巨幅标语上写着:“中国巴基斯坦友好万岁!”“全世界人民大团结万岁!”"},{"type":"paragraph","text":"三时许，阿尤布·汗总统，总统的女儿奥兰泽布夫人，外交部长布托和夫人等贵宾，由刘少奇主席等陪同走上主席台。这时，乐队高奏迎宾曲，参加大会的工人、学生、机关干部、解放军官兵以及首都穆斯林群众，全体起立，长时间地热烈鼓掌。少先队员跑上主席台向全体贵宾献花。"},{"type":"paragraph","text":"大会开始后，乐队高奏巴基斯坦和中国国歌。"},{"type":"paragraph","text":"彭真市长首先讲话，他代表首都和全中国人民热烈欢迎巴基斯坦贵宾。他赞扬巴基斯坦在阿尤布·汗总统的领导下努力维护民族独立和国家主权，反对外来的干涉和威胁，并且在加强亚非团结、保卫世界和平的事业中起了积极的作用。"},{"type":"paragraph","text":"彭真颂扬了近年来中巴友好关系的新发展，并且相信阿尤布·汗总统这次来访必将使两国友好合作关系大大地向前迈进一步。他说，中巴友好合作关系的发展，不仅符合两国人民的利益，而且有利于亚非人民团结反帝和维护世界和平的斗争。"},{"type":"paragraph","text":"彭真说，亚非国家应该根据万隆会议十项原则和平共处，友好合作。我们亚非国家，不论是大国或是小国，都应该互相尊重，平等相待。亚非国家之间的许多争端是历史遗留下来的，不同于帝国主义对亚非国家的侵略和干涉。我们亚非国家应当在平等的基础上，友好解决这种争端。答应了的话，应该兑现，不能出尔反尔。不能采取强加于人的大国沙文主义态度。帝国主义和殖民主义惯于采取这种态度，我们历来是痛恨的。在我们亚非国家中，任何国家采取这种态度是同样不能容忍的。我们中国人民坚决反对用大国沙文主义的态度对待别的国家，也绝不容许任何国家用这种态度来对待我们。"},{"type":"paragraph","text":"阿尤布·汗总统在热烈的掌声中应邀讲话。他在讲话中对中国人民给予他们的盛情接待表示衷心感谢，并且热情地赞颂了中国人民所取得的成就和巴中友谊。他说，同中国友好是我们的长期政策，而不是权宜之计。"},{"type":"paragraph","text":"总统说，我们有着一条共同的边界，我们双方使它成为一条和平与安宁的边界。我们两国按照已经确定的原则和互让的精神解决了边界问题。"},{"type":"paragraph","text":"总统对中国向巴基斯坦提供的援助表示特别珍视。他说，中国为了帮助另一个亚洲国家自力更生，自己作出了牺牲。"},{"type":"paragraph","text":"他说，除了邻国关系和历史联系使我们团结起来而外，还有一个共同的决心把我们团结在一起，那就是决心把一切形式的帝国主义和殖民主义的最后残余从亚洲、非洲和拉丁美洲大陆上连根铲除掉。"},{"type":"paragraph","text":"总统说，巴中两国都保证要促进亚非人民的团结，反对一切形式的帝国主义和殖民主义，都承担义务要遵守万隆会议十项原则。他表示相信，巴中双方的共同努力可以对第二次亚非会议的成功作出巨大贡献。"},{"type":"paragraph","text":"他在讲话中再一次对中国在查谟和克什米尔争端问题上所采取的公正立场表示十分赞赏，并且表示支持中国关于召开世界各国首脑会议讨论完全禁止和彻底销毁核武器的创议。他重申巴基斯坦主张恢复中国在联合国的权利。"},{"type":"paragraph","text":"他说，联合国必须重新改组。总统说，由于亚非出现了那么多的独立国家，从而改变了世界上的力量对比，因此通过对联合国的权力和责任作更现实的分配的方式来改组联合国，是实际可行的。"},{"type":"paragraph","text":"彭真市长和阿尤布·汗总统的讲话，在会场上激起了一阵阵的掌声。"},{"type":"paragraph","text":"参加今天大会的，还有政协全国委员会副主席高崇民，国防委员会副主席蔡廷锴，以及政府有关部门、人民团体和北京市的负责人张奚若、蒋光鼐、韩念龙、万里、吴晗、乐松生、方石珊，中国驻巴基斯坦大使丁国钰和夫人常乃志。"},{"type":"paragraph","text":"巴基斯坦驻中国大使罗查和夫人，在北京的巴基斯坦和其他亚非国家的朋友，出席了大会。"},{"type":"paragraph","text":"大会结束以后，首都文艺工作者为贵宾们演出了中巴两国的歌舞节目。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\03\\6536010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e杜修贤\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e图为首都大会主席台，左起第五人是阿尤布·汗总统"},{"type":"paragraph","text":"(新华社传真杜修贤摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d477c6c27"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
