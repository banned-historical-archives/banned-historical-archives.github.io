script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《人民之声报》发表文章  揭露美苏玩弄裁军骗局的实质  各国人民应不断提高警惕粉碎帝国主义修正主义的阴谋","authors":[],"dates":[{"year":1972,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》发表文章"},{"type":"paragraph","text":"揭露美苏玩弄裁军骗局的实质"},{"type":"paragraph","text":"各国人民应不断提高警惕粉碎帝国主义修正主义的阴谋"},{"type":"paragraph","text":"新华社地拉那一九七二年三月十五日电　阿尔巴尼亚《人民之声报》三月十五日发表文章，揭露美帝国主义和苏联社会帝国主义玩弄裁军骗局的实质。"},{"type":"paragraph","text":"文章说：“莫斯科和华盛顿一样，大肆鼓吹裁军，与此同时，却进行完备的军备竞赛。这已经是双方玩弄的老把戏了。”"},{"type":"paragraph","text":"文章在揭露了美苏近年来搞的一系列所谓裁军骗局后说：“完备的地上、地下、水中和空中的核试验，为肆无忌惮的军备竞赛而耗费的巨额开支，以及苏美的侵略和秘密阴谋，暴露了它们的真正面目和目的。恩维尔·霍查同志在阿尔巴尼亚劳动党第六次代表大会上指出：‘不断地扩充军备是帝国主义生存的条件，这是由帝国主义的经济制度的特点和侵略政策所决定的。因此只要存在着帝国主义和社会帝国主义国家，世界上就永远不会实现裁军。帝国主义者和修正主义者武装自己和发展进攻性力量，以便霸占和重新瓜分世界、镇压革命、破坏社会主义国家和奴役各国人民。’”"},{"type":"paragraph","text":"文章说：“两个帝国主义超级大国为了给肆无忌惮的扩充军备进行辩护，抛出了所谓不仅为了它们自己的安全，而且也为了‘自由世界’和‘社会主义大家庭’的安全的借口。谁威胁着它们呢？难道那些没有掌握核武器的国家威胁着它们吗？白宫和克里姆林宫的头目们关心的不是军备竞赛威胁着各国人民的安全和世界和平，而担心的是如何维持它们的核垄断和它们之间的平衡。”"},{"type":"paragraph","text":"文章最后说：“帝国主义和修正主义的裁军叫嚣与世界人民所希望的真正彻底的裁军毫无共同之处。美苏所需要的裁军叫嚣是为了掩饰肆无忌惮的军备竞赛，是为发动新的战争和侵略进行狂热的准备。只要存在着帝国主义和社会帝国主义，裁军就不可能实现。这就是说，各国人民应该对帝国主义和修正主义的阴谋诡计不断提高警惕，为彻底粉碎它们的阴谋诡计而斗争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42f974f149"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
