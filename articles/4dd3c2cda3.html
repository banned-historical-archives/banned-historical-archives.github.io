ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于研究广东对部分副食品实行派购办法的批语","alias":"","parts":[{"type":"paragraph","text":"关于研究广东对部分副食品"},{"type":"paragraph","text":"实行派购办法的批语"},{"type":"paragraph","text":"（1959年10月23日）李先念同志："},{"type":"paragraph","text":"广东派购办法，请你研究一下，看是否可以推广。你那里开什么会议没有？如有会议，可和较多的同志一道研究一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月廿三日"},{"type":"paragraph","text":"[1]这个批语写在新华通讯社1959年10月17日编印的《内部参考》第二八八九期上。该期登载的《广东实行派购办法，猪和家禽的收购量大增》一文说，广东商业部门在八、九月内贯彻执行中共广东省委和省人委关于实行猪、鸡、鸭、鹅和蛋品的派购办法的指示后，这些副食品的收购量大增。实行派购办法是根据市场情况和国家需要，对人民公社的各级集体经济组织和社员派购一定数量的猪、鸡、鸭、鹅和蛋品，要求人民公社和社员向国家履行一定的交售任务。派购一般只占产量的很少一部分，大部分产品仍归饲养集体和社员个人支配。由于这种办法兼顾了国家、公社和个人的利益，受到了社员的普遍拥护。"},{"type":"paragraph","text":"[2]李先念，当时任中共中央书记处书记、中央财经小组副组长、国务院副总理兼财政部部长。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":10,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":456,"page_end":456},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4dd3c2cda3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
