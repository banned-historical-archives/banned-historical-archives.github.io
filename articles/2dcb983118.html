sercontent.com/banned-historical-archives/banned-historical-archives11/main/data/1768/1768.pdf"],"article":{"title":"廖汉生、詹大南同志在南京军区常委扩大会上揭发张春桥的罪行","alias":"","parts":[{"type":"paragraph","text":"·供批判“四人帮”参考·"},{"type":"paragraph","text":"廖汉生、詹大南同志在南京军区常委"},{"type":"paragraph","text":"扩大会上揭发张春桥的罪行"},{"type":"paragraph","text":"一九七六年十一月廖汉生、詹大南同志在南京军区常委"},{"type":"paragraph","text":"扩大会上揭发张春桥的罪行"},{"type":"paragraph","text":"廖汉生政委、詹大南副司令员等揭发了“四人帮”拼命扩大资产阶级法权，，大肆挥霍国家资财，贪婪地吸工人血的许多事实。张春桥的女儿结婚，请了五十桌客，收的礼物有西德进口的二十九时电视机两部，国产电视机七、八部，可以开一个电视公司。王洪文在上海有十辆小汽车，六七十个服务员。开“十大”的时侯他叫锦江饭店做法国菜，用飞机送到北京，第二天又叫上海派飞机送中国菜。徐景贤选了三百多部旧戏影片，什么《大劈棺》、《纺棉花》，乱七八糟的都有，送到北京给“四人帮”欣赏。上海市委还花了几千万外汇，买外国的黄色片，供“四人帮”寻欢作乐。到会同志极为气愤地说：“简直比外国皇帝还厉害”，“要是能到美国去，张春桥的女儿就是孔二小姐”，“张春桥讲土围子，他们就是土围子”，，“姚文元讲暴发户，他们才是真正的暴发户”"},{"type":"paragraph","text":"一1一"}],"authors":["廖汉生","詹大南"],"dates":[{"year":1976,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"张春桥","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dcb983118"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
