rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"揭发违法乱纪问题受到领导表扬","authors":["刘玉才刘长河"],"parts":[{"type":"paragraph","text":"本报讯 在学习新宪法的热潮中，沈阳部队炮兵某团共产党员刘坤、共青团员戴福安同志，积极维护党和人民的利益，维护宪法法律的尊严，勇于揭发直接领导违法乱纪的问题，受到团营领导的表扬。"},{"type":"paragraph","text":"刘坤和戴福安是二营营部汽车司机。近年来，他们发现自己的直接领导、营部车务助理员有侵占国家财产、投机倒把等不法行为。今年四月份，通过新宪法的学习，他们进一步明确了，作为一个革命战士，不仅要自觉遵纪守法，而且应该以当家做主的精神，对一切危害人民利益的不法行为作坚决斗争，不能明知不对，少说为佳。于是，他们主动找营团领导，揭发了那个助理员采取各种手段，将部队的三点六立方米木材和营具等化公为私运回家中；违反国家政策，通过拉关系走后门，从地方农场私买一千二百斤粮食和八十斤豆油，自己食用，还卖给亲友一部分，造成很坏的影响；私自将部队的汽车机油一百三十公斤送给地方，接受人家的送礼；低价从外地买回土豆，高价卖出，非法牟利等问题。营团党委对此十分重视，及时组织调查，证明刘坤、戴福安揭发的问题完全属实。团党委坚决维护法纪，对这个助理员的问题进行了严肃处理，给他以党内处分，对其捞取的公物全部退赔。同时在全团干部战士中表扬了刘坤、戴福安敢于同违法乱纪行为作斗争的行动，号召全体干部战士向他们学习，认真学习和遵守新宪法，用实际行动保卫新宪法。（刘玉才 刘长河）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32640a2fe1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
