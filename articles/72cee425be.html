script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蒙古人民革命胜利卅一周年乌兰巴托隆重举行庆祝大会毛主席及周总理分别致电祝贺","authors":[],"dates":[{"year":1952,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:蒙古人民共和国是一个位于我国北面的兄弟国家，在历史上两国人民有过悠久的经济、文化的密切联系。一九二一年七月，蒙古人民在苏联红军的帮助下，推翻了帝俄、日阀与中国反动派的压迫，以及国内王公、贵族、喇嘛的黑暗统治，组成了人民自己的政权。一九二四年十一月，正式建立了蒙古人民共和国。经过三十年来的建设，各方面都有崭新的成就，人民生活也大大提高。这个国土一百五十万平方公里(比我国东北还大)，而人口仅有一百万左右的国家，现在正向社会主义的前途迈进。"},{"type":"paragraph","text":"【新华社北京十一日电】　塔斯社乌兰巴托十一日讯:大呼拉尔主席团、蒙古人民共和国部长会议、蒙古人民革命党中央委员会、党的乌兰巴托市委员会、乌兰巴托市小呼拉尔主席团以及各人民团体与蒙古军队的代表，于七月十日举行庆祝大会，庆祝蒙古人民革命胜利三十一周年。"},{"type":"paragraph","text":"庆祝会主席团里的人有:蒙古人民共和国部长会议主席泽登巴尔，大呼拉尔主席团主席布曼增迪，副主席泽狄布，蒙古人民革命党中央委员会书记达姆巴，副总理苏兰扎布、沙拉普、拉莫苏伦、迈达尔与鲁布桑，人民革命党中央委员会政治局委员热姆巴尔多尔齐，以及政治局候补委员苏索巴马。"},{"type":"paragraph","text":"主席团委员有:苏联驻蒙古人民共和国特命全权大使伊月尼科夫、中华人民共和国驻蒙古人民共和国特命全权大使吉雅泰、朝鲜民主主义人民共和国驻蒙古人民共和国特命全权大使金龙镇以及由李承烨任团长的朝鲜政府代表团的团员。"},{"type":"paragraph","text":"在一阵热烈的掌声中，苏联共产党(布)中央委员会政治局与蒙古人民革命党中央委员会政治局被选为名誉主席团。"},{"type":"paragraph","text":"苏索巴马作了关于蒙古人民革命第三十一周年的报告。每当他提到斯大林的名字与苏联的时候，就爆发一阵掌声。"},{"type":"paragraph","text":"苏索巴马报告以后，苏联大使伊凡尼科夫、中华人民共和国大使吉雅泰、朝鲜政府代表团团长李承烨都致贺词。"},{"type":"paragraph","text":"在极热烈的气氛中，参加庆祝会的人通过一封致世界劳动人民天才领袖与导师、蒙古人民最好的朋友斯大林的信。"},{"type":"paragraph","text":"【本报讯】　据新华社北京十一日电:我中央人民政府毛泽东主席和政务院周恩来总理在九日分别致电蒙古人民共和国大呼拉尔主席团主席布曼增迪和部长会议主席泽登巴尔，庆祝蒙古人民革命胜利第三十一周年纪念。"}],"comments":[],"origin":"新华社,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72cee425be"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
