script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举毛泽东思想红旗奔驰在草原上的文化轻骑兵  内蒙古“乌兰牧骑”来京演出  演员们旺盛的革命热情和生动活泼的风格激动人心","authors":[],"dates":[{"year":1964,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举毛泽东思想红旗奔驰在草原上的文化轻骑兵"},{"type":"paragraph","text":"内蒙古“乌兰牧骑”来京演出"},{"type":"paragraph","text":"演员们旺盛的革命热情和生动活泼的风格激动人心"},{"type":"paragraph","text":"新华社十日讯　活跃在内蒙古草原上的文化轻骑兵——“乌兰牧骑”的十二名演员代表，今晚在全国少数民族群众业余艺术观摩演出会上作了汇报演出。"},{"type":"paragraph","text":"演出会上，这十二名多才多艺的蒙古族和朝鲜族演员，表演了十五个精采节目，每个演员都是多次出场，连续参加好多节目和好几种艺术形式的演出。有些演员刚演完歌剧，又演出舞蹈，舞蹈完了，再弹起琴弦为别人伴奏。表演反映出旺盛的革命热情和生动活泼的风格，激动得许多艺术工作者和观众久久不能平静。"},{"type":"paragraph","text":"“我们是文化轻骑兵，一颗红心为牧民，穿过沙漠跨草原，高举红旗向前进……”，这个红色文化队的全部十二名演员背起行李、道具，迈着雄健的步伐走上舞台，合唱了这首雄壮的文化轻骑队之歌，显示出他们高举毛泽东文艺思想红旗，向辽阔的草原上奋勇前进的豪迈气概。"},{"type":"paragraph","text":"“乌兰牧骑”代表队今晚演出的歌舞、表演唱、“好来宝”、诗朗诵和小歌剧等风格多样的节目，所反映的全是内蒙古草原和农村现实斗争生活的新题材。小歌剧《团结桥畔》，表现了蒙古族和汉族人民齐心合力发展农牧业生产、建设社会主义新农村、新牧区的动人情景。舞台上，一位蒙古族老大娘听说前来帮助修理柴油机的汉族女社员张桂兰受了重伤，心如油煎，立即动员全队牧民为她输血；大娘的媳妇不顾啼哭着的爱女，先给桂兰的孩子喂奶……，这些情节生动细腻地描绘了蒙古、汉族姐妹兄弟在共同斗争中凝成的阶级情谊。舞蹈《好社员》、表演唱《请帖》等节目，突出地表现了蒙古族牧民热爱集体羊群和见荣誉就让的高尚风格。《歌唱梁万生》，热情赞颂了昭乌达盟一位著名的老英雄，带领社员艰苦奋斗征服自然的事迹。这些节目都赢得了观众热烈掌声。"},{"type":"paragraph","text":"“盛满奶酒的花碗啊，凝结着牧民的心意，飞向美丽的北京，献给敬爱的领袖毛主席。”在亲切真挚的歌声中，一位身穿鲜艳民族服装的姑娘，头顶六只花碗，随着欢快的音乐旋律，矫健地旋转飞舞，紧紧扣住了观众的心弦。这个节目在观众热烈掌声的要求下，重演了两次。在“乌兰牧骑”里成长起来的朝鲜族贫农出身的姑娘宋正玉，自编自演了这个蒙古族《顶碗舞》，这是她用一年左右的时间在燥热炙人的沙窝子里和排练场上，起早贪黑苦练出来的。"},{"type":"paragraph","text":"在内蒙古各地的“乌兰牧骑”内，有很多象宋正玉这样为广大牧民而勤学苦练的演员，现在他们不仅有着充沛的革命热情，而且也练出了一专多能的硬本领。"},{"type":"paragraph","text":"“乌兰牧骑”演员们长年累月在浩瀚的草原上巡回演出，坚持和牧民同吃同住同劳动，培养了阶级感情，获得了丰富的创作源泉。他们今晚演出的十五个节目中，有三分之二是各地“乌兰牧骑”深入牧区生活，由集体或个人新创作出来的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43d9e8d2f1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
