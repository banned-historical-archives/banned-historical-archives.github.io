ear":1979,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见美籍教授林家翘博士"},{"type":"paragraph","text":"新华社北京九月二十二日电  国务院副总理邓小平今天上午会见了美国科学院院士、麻省理工学院教授林家翘博士。"},{"type":"paragraph","text":"会见时，邓小平副总理就我国当前的政治、经济形势和教育、科研的发展等问题，同林家翘教授进行了亲切的谈话。"},{"type":"paragraph","text":"国务院副总理、中国科学院院长方毅参加了会见。"},{"type":"paragraph","text":"会见以后，邓小平副总理和方毅副总理同林家翘教授共进午餐。"},{"type":"paragraph","text":"参加会见和宴会的还有教育部副部长浦通修，清华大学校长刘达，副校长何东昌、张维，中国科学院秘书长郁文等。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见美国麻省理工学院教授林家翘。方毅副总理参加会见。  新华社    记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb2bae5950"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
