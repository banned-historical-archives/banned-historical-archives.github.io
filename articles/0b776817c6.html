tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忠于伟大领袖毛主席","authors":["战士","蔡宗周","袁康平"],"parts":[{"type":"paragraph","text":"伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席最近教导我们：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。形势大好的重要标志，是人民群众充分发动起来了。从来的群众运动都没有象这次发动得这么广泛，这么深入。”毛主席的最新指示，是对无产阶级文化大革命形势最科学、最精辟的概括，说出了亿万革命群众的心里话。从我们深入农村宣传毛泽东思想过程中，所见所闻的生动事实，充分证明了毛主席的最新指示无比英明、无比正确。"},{"type":"paragraph","text":"整个农村到处是一派大好形势，广大贫下中农精神面貌焕然一新。无论在地头、在田间、在学习会上，广大贫下中农，人人学习“老三篇”，个个投入革命的大批判。他们对伟大领袖毛主席无限热爱、无限忠诚、无限信仰、无限崇拜。对中国赫鲁晓夫充满着刻骨的仇恨。举一个例子来说吧！有一位贫农老大爷今年已经七十三岁了，眼睛花、身体不好，但在文化大革命中，通过解放军宣传毛泽东思想，宣传文化大革命的伟大意义，在他心里点燃一团烈火，决心跟着毛主席闹革命。老大爷每天领着全家老少向毛主席请教、汇报。每顿饭前，都要小孙子领着全家读毛主席语录，这位大爷还经常召开家庭学习毛主席著作讲用会和对党内一小撮走资派的批判会。在一次家庭批判会上，老大爷激动地说：“中国赫鲁晓夫的心比狼还狠，比蛇还毒，他胡说什么我们“欢迎剥削”，要“吃小亏，占大便宜”，妄想将我们拖回旧社会，吃二遍苦。我们坚决不答应！是毛主席他老人家教我们向白求恩和张思德学习，全心全意为人民服务。我虽然年老了，也要好好听毛主席的话，关心国家大事，好好为人民服务。……”"},{"type":"paragraph","text":"这位贫农老大爷无限忠于毛主席、无限忠于毛泽东思想、无限忠于毛主席革命路线的生动事迹，只是亿万贫下中农的一个小小的缩影。通过这件事例，充分说明这场伟大的文化大革命真正把亿万人民群众发动起来了，毛泽东思想从来没有象今天这样深入人心，从来没有象今天这样大普及。毛泽东思想与广大革命群众相结合，就从根本上筑起了反修防修的钢铁长城。在我们伟大统帅毛主席的指挥下，无产阶级文化大革命一定能取得彻底胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b776817c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
