art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的话是指路灯","authors":["盛炽"],"parts":[{"type":"paragraph","text":"我原来是志愿军一个文工队员。在朝鲜战场上，我们按毛主席的教导，深入连队，给战士演出，还搬炮弹、救护伤员。思想感情和战士打成了一片。以后调到艺术学院当教员，受到了周扬的资产阶级文艺黑线的影响，盲目地钻专业，忽视政治学习，虽然练得很能踢腿，很能弯腰，但没有了工农兵的思想感情。自己受了毒害，还影响了同学。通过一九六四年文艺整风，又参加了一期农村社会主义教育，认真学习了毛主席著作，使我们又走上了正路。同学们方向明确了，掌握了一专多能：能跳、能说、能唱，受到了工农兵群众的欢迎。我们深刻认识到：毛主席的文艺路线是我们文艺工作者的命根子，按毛主席的指的路去走，就能有所创造，有所前进。听周扬黑帮的话，就要陷进泥坑。"},{"type":"paragraph","text":"DW：解放军艺术学院"}],"alias":""},"tags":[{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"798b3325b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
