script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"浙江省中学教职员批判资产阶级思想收获巨大","authors":[],"dates":[{"year":1952,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"参加华东革大浙江分校进行思想改造学习的浙江省中等学校教职员四千三百余人，在批判资产阶级思想的十天学习中获得了很大的收获。"},{"type":"paragraph","text":"资产阶级思想，特别是名利思想和雇佣观点严重地腐蚀着教师们。一位教师沉痛地检查了自己的错误后，用一句话概括了自己的思想活动:‘名我所欲也，利我所欲也，两者不可兼得，衡其轻重而取之。’在这种思想的支配下，他不安心于当前工作，不顾人民事业的利益，一味寻求个人的名位、利录。由于教师们存在着严重的名利思想，不仅损害了人民教育事业，而且通过教学直接向学生传播，造成严重的恶果。还有不少教师，过去还存在闹宗派、不团结、轻视工农、轻视劳动以及贪污、浪费等极端错误的思想、行为。"},{"type":"paragraph","text":"通过检查和批判，教师们都认清了这种错误思想的严更危害，从而树立了主人翁思想。同时，对于党与政府对知识分子的政策也有了更深刻的体会，在思想上更向党与政府紧紧靠拢。许多教师说:‘党对我们这样苦口婆心地进行教育，真比亲身父母还亲。’目前，参加学习的全体教职员正在这个胜利的基础上，怀着高度的信心和决心展开‘批判封建、法西斯、买办思想’的学习，争取在思想战线上获得更光辉的胜利。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2ea693ac8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
