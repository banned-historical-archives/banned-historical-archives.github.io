":{"title":"中共中央组织部就部分干部要求更改年龄问题给河北省委组织部的答复","dates":[{"year":1989,"month":3,"day":2}],"is_range_date":false,"authors":["中共中央组织部","中共河北省委组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局, 干审工作政策文件选编 (下), 1605-1606","tags":[{"name":"河北","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部就部分干部要求更改年龄问题给河北省委组织部的答复"},{"type":"paragraph","text":"1989年3月2日·干档字〔1989〕1号"},{"type":"paragraph","text":"你部《关于部分干部要求更改年龄的请示》收悉。经研究，原则同意你部关于“干部的年龄（出生年月）、个人不得随意更改”的意见。"},{"type":"paragraph","text":"干部的年龄（出生年月）是客观存在的自然情况，不得随意更改。干部在填写《干部履历表》及其他表格时，要实事求是。各级组织部门审核干部填报的年龄时，要以本人档案中的原始记载为依据，严格把关。如档案中的年龄记载前后不一致，以经组织认可的年龄为主要依据。如确属填写有误需要改正的，要按干部管理权限报有关组织审核批准，并将有关材料归入本人档案，以备查考。"},{"type":"paragraph","text":"附："},{"type":"paragraph","text":"河北省委组织部的请示"},{"type":"paragraph","text":"中共中央组织部："},{"type":"paragraph","text":"去年，在省人大换届及干部任免时，有些同志提出自已的年龄(出生年月)不对，要求改小年龄。省管干部在填写干部履历表时，有些干部自行更改了年龄（出生年月）。去年十月份，省委组织部、河北省财政厅等六个部门《关于解决部分离休干部待遇问题的通知》下发以后，有的同志又提出自己的年龄已到七十岁，要求变更。有的同志的干部档案中年龄（出生年月）填写一致也要求更改;有的还以公安局发的身份证作为依据，要求更改。地、县管理的干部中也有不少这类问题。要求更改年龄（出生年月），是当前干部中新出现的一个比较突出的问题。由于没有政策规定，情况复杂，感到很不好办。我们意见，干部的年龄（出生年月），个人不得随意更改；原则上应以“文化大革命”前的干部本人档案中的记载为主要依据，一般不更改，如干部档案中年龄（出生年月）确系填写有误，或原填写是旧历要求换算成公历的，需按干部管理权限经组织批准方能变更。"},{"type":"paragraph","text":"以上妥否，请批示。"},{"type":"paragraph","text":"中共河北省委组织部"},{"type":"paragraph","text":"一九八九年一月二十六日"}],"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7194373522"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
