,"dates":[{"year":1952,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:最近在本市大上海等戏院上映的香港长城影片公司出品的影片“娘惹”，挂着反封建婚姻的旗帜，实际上是消极的、不健康的，是传布资产阶级思想的。与长城公司以前出品的“方帽子”“花凤仙”等影片一样，是一张坏影片，对部份落后观众起了坏的影响。"},{"type":"paragraph","text":"像我们学校——圣约翰中学，过去是一所教会学校，多数同学曾受美国奴化教育的毒素，也是美国好莱坞的影片迷。二年多来的爱国主义教育，同学们对于进步的苏联片和国片都很爱好。但在“娘惹”上映后，又引动了很多同学争着去看，个别同学甚至逃课去看，惟恐买不到票子。有一位同学，他看了一遍之后觉得“不过瘾”，还要去看第二遍，他说:“要仔细地欣赏它”。我想这种用“欣赏”而不是用批判的眼光去看“娘惹”的同学，在其他学校也可能存在着。"},{"type":"paragraph","text":"本市高中以上的学校即将普遍展开思想改造运动，目前各校正在进行学习；影片“娘惹”的上映，非但没有积极的教育意义，而是消极的传布着资产阶级的思想毒素，对于落后的同学已发生了很坏的影响。因此，我认为，华东影片经理公司在这时排出这部影片是非常不妥当的。"},{"type":"paragraph","text":"圣约翰中学学生　朱继洲"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff6afcf48a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
