script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji13","name":"毛泽东全集第13卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在抗大的讲话","alias":"","parts":[{"type":"paragraph","text":"在抗大的讲话"},{"type":"paragraph","text":"（1938年12月13日）"},{"type":"paragraph","text":"中共中央六中全会估计到广州武汉失守以后，战争形势要逐渐进入新阶段，我们的任务就在于如何增加力量来停止敌之进攻，准备我之反攻。"},{"type":"paragraph","text":"这里，最基本的推动全盘工作的正确方针是培植干部。"},{"type":"paragraph","text":"在今天，广大的敌人占领区域没有普遍的游击队的活动，千百万群众没有人去组织，去领导他们进行抗日战争。这就是说，中国还有很多地方，没有共产党，没有抗日武装，没有把这些生动力量统统都发掘和发挥出来，这些工作都要人去做的。1938年，毛泽东在抗日军政大学演讲。《毛主席在抗大》（素描）"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":79,"page_end":81},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55eb0b33ed"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
