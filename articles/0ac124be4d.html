art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把连队办成毛泽东思想的好学校在“三支”“两军”任务中为人民立新功","authors":["沈阳部队“学习毛主席著作的模范红九连”"],"parts":[{"type":"paragraph","text":"我们听到中央军委决定明春召开全军学习毛主席著作积极分子代表大会的消息，个个欢欣鼓舞，人人喜笑颜开。大家说：这个决定是毛主席、林副主席、中央军委对全军同志的最大关怀，是全军同志政治生活中的一件大喜事。这次会议的召开，正当世界进入毛泽东思想的伟大新时代，具有极其重大的历史意义和政治意义。这次大会，是我们积极响应林副主席伟大号召，活学活用毛主席著作的大总结，是对全军活学活用毛主席著作群众运动的大推动，是对党内最大的一小撮走资本主义道路当权派的大打击；对毛泽东思想在全世界的广泛传播，也将产生巨大的影响。"},{"type":"paragraph","text":"中央军委的决定，是掀起活学活用毛主席著作新高潮的动员令。它鼓励我们，在执行“三支”“两军”光荣任务中，更好地活学活用毛主席著作。我们一定要在阶级斗争的大风大浪中，学出新水平，用出新水平，更加坚定地站在毛主席的无产阶级革命路线一边，坚决支持无产阶级革命派，在无产阶级文化大革命中立新功，以实际行动迎接这次大会的召开。"},{"type":"paragraph","text":"这些天来，大家回顾了“红九连”成长的历史，总结交流了活学活用毛主席著作的体会，使我们更加热爱毛主席，更加热爱毛泽东思想。“红九连”从井冈山到现在的成长历史，就是在毛泽东思想指引下胜利前进的历史。我们就是靠毛泽东思想，把连队办成革命的大学校，红色的大熔炉。我们连是沿着毛主席指引的路走过来的，今后我们要更加坚定地朝着毛主席指引的方向胜利前进。在当前执行的“三支”“两军”任务中，我们一定要更高地举起毛泽东思想的伟大红旗，更好地活学活用毛主席著作，把连队办成毛泽东思想的好学校。我们要在“三支”“两军”战线上，当好宣传毛泽东思想的尖兵，成为捍卫毛主席的无产阶级革命路线的勇士；要当好革命群众的小学生，和革命群众一起，把所在单位办成毛泽东思想的大学校。在尖锐复杂的阶级斗争中，不论风多大，浪多高，我们都将对毛泽东思想坚信不疑，对贯彻毛主席的无产阶级革命路线坚定不移。我们要和广大革命群众一起，紧紧掌握斗争大方向，把无产阶级文化大革命进行到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ac124be4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
