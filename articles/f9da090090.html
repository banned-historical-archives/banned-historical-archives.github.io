script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江西历史学会举行学术讨论会探讨中国奴隶制与封建制分期问题","authors":["宏森"],"dates":[{"year":1961,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报南昌讯】　江西省历史学会于11月24日起举行关于“中国奴隶制与封建制分期问题”的学术讨论会。"},{"type":"paragraph","text":"讨论会收到的论文、资料共约十万字。有谷霁光的《关于古史分期问题几个关键问题的商榷》，谢康的《古代史分期问题中之问题——史料的处理与解释》，乐典的《西周已经进入初期封建社会》，姚公骞的《试谈古史分期的几个问题》等共十余篇论著。这些文章，有的主张封建社会始于西周；有的认为封建社会出现于春秋战国之际；有的倾向于封建社会起于魏晋；也有的主张封建社会应以东周为始点。"},{"type":"paragraph","text":"讨论会由江西省历史学会副主任谷霁光、欧阳琛主持。他们认为，资产阶级史学家片面地以相对主义等理论为依据，反对这一问题的讨论，其旨在否定社会历史发展的客观规律，否定历史唯物主义的科学理论。而无产阶级的历史科学，则以马克思主义的理论为指导，以尊重客观的历史事实为前提，研究、论证和揭示社会历史发展规律的科学性，从而有力地批判资产阶级的种种谬论。可见，组织讨论古史分期问题，也是有它的理论与实践意义的，也正是为我们史学界人士学习和运用马克思主义、毛泽东思想提供了很好的条件。"},{"type":"paragraph","text":"讨论会将延续三周左右，目前已讨论过两次。"},{"type":"paragraph","text":"中共江西省委书记、省长邵式平，对讨论会的召开，甚为关怀，每次会都亲自出席。　(宏森)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9da090090"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
