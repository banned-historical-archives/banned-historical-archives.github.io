script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"必须加强对青年的思想教育 坚决煞住资产阶级歪风邪气","authors":[],"dates":[{"year":1969,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们高桥地区的几家工厂，去年进来了一大批青年艺徒。不少青年已成为活学活用毛泽东思想的积极分子，他们是一支抓革命、促生产的骨干力量，在革命、生产方面已发挥了很好的作用，深受工人老师傅的欢迎。"},{"type":"paragraph","text":"但是，也有少数青年由于缺乏在无产阶级专政下继续革命的思想准备，对资产阶级使用“软刀子”的进攻缺少警惕，有的被打开了“缺口”，受到资产阶级思想的侵蚀。少数青年，平时开会、学习不参加，吃饭下班跑在前头，对养金鱼、打扑克、看黄色书刊兴致勃勃，早婚的现象也很突出。我们认为，青年历来是无产阶级同资产阶级激烈争夺的对象。在当前新的形势下，资产阶级变换了新的手法，就是采取散布种种腐朽的个人主义来毒害青年，消磨青年的革命斗志，利用糖衣炮弹，从生活上寻找“突破口”，妄想引诱青年走上只图个人安逸，本关心国家大事的歪道。"},{"type":"paragraph","text":"这些情况反映了阶级斗争的新动向，必须引起各单位的革委会和革命家长的严重注意。认真抓好青年的思想政治工作，是当前摆在我们面前的一项十分重要的任务。我们必须继续深入开展革命的大批判，狠批刘少奇所散布的反革命修正主义的“幸福观”，一定要把青年培养成具有“一不怕苦，二不怕死”精神的无产阶级革命事业的接班人。"},{"type":"paragraph","text":"本报高桥地区工厂通讯　组"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f80a4fd46"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
