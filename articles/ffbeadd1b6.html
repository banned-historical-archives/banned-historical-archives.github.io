script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"国民党不全面长期停战我绝不片面停战","alias":"","parts":[{"type":"paragraph","text":"国民党不全面长期停战"},{"type":"paragraph","text":"我绝不片面停战]"},{"type":"paragraph","text":"（1946年7月9日）周、叶："},{"type":"paragraph","text":"（一）一月十三日后，顽在关外占我二十余县及重镇，在关内除收复者外，亦占十余县，最重要者为占我二千余村镇，五百万人口之中原解放区被占是其中之最显著者。（二）顽如能全面长期停战，我自可停止报复，否则绝无片面停止理由。（三）大同太原两点决暂时不打，待顽攻苏北，或承德，或他处时再打，但山西其余各县凡能打者我必打之，除非全局及五师能真正和平解决，不应考虑派小组到山西来束缚自己手足。（四）朔县、繁峙是攻占，山阴、宁武、代县是顽自己放弃，尚拟攻占怀仁、应县、醇县、五台、定襄、忻县、介休、灵石、霍县、孝义、中阳、石楼、汾西、蒲县、"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给周恩来和北平军事调处执行部中共方面委员叶剑英的电报。"},{"type":"paragraph","text":"[2]小组，指北平军事调处执行部军调执行小组。[3]山阴，指山阴城，位于山西山阴县南部。[4]醇县，旧县名，1958年撤销，部分划归山西宁武县，部分与代县合县、大宁等县，使几个解放区打成一片，以为丧失中原解放区之代价。"},{"type":"paragraph","text":"甲乙午佳"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":475,"page_end":476},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffbeadd1b6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
