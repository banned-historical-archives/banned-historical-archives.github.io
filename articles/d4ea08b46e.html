script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对腐朽的资产阶级教育制度和美日反动派罪恶统治  东京大学学生举行“总奋起”大会","authors":[],"dates":[{"year":1968,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对腐朽的资产阶级教育制度和美日反动派罪恶统治"},{"type":"paragraph","text":"东京大学学生举行“总奋起”大会"},{"type":"paragraph","text":"宫本叛徒集团为反动政府出谋献策阴谋破坏学生运动遭到学生强烈反对"},{"type":"paragraph","text":"据新华社二十四日讯　东京消息：坚持罢课斗争将近三百天的东京大学学生二十三日下午举行了“总奋起”大会，反对腐朽的资产阶级教育制度和美日反动派的罪恶统治。"},{"type":"paragraph","text":"学生们在会上表示要坚决粉碎东京大学代理校长加藤一郎提出的旨在破坏学生运动的所谓“建议”，并表示要对东京大学“实行全面封闭”。会后，学生们冲向充作大学反动当局指挥据点的法学系研究室，赶走了盘踞在那里的反动教授，并且占领了这个研究室。学生们立刻在研究室的门口筑起障垒。至此，东京大学主要建筑物全部被学生占领。"},{"type":"paragraph","text":"同一天下午，正在坚持斗争的东京外国语大学的学生，由于反动学校当局拒绝学生们提出的进行“团体交涉”的要求，勇敢地占领和封闭了这个大学的第二号楼。在这以前，这个大学的第一号楼已被学生们封闭，这样，这个大学已完全被学生们占领。"},{"type":"paragraph","text":"日本的学生运动的蓬勃发展，使佐藤反动政府惊慌失措。日本首相佐藤荣作二十三日下午在东京举行的日本“经济团体联合会”（日本大垄断资本的大本营）的理事会上，不得不承认，日本的“大学问题”，已经从“个别的大学的纠纷”“发展成为全体学生的运动”。佐藤咬牙切齿地辱骂日本学生，并且凶狠地表示，“既然事态已经发展到如此地步”，他就要对日本的学生运动下毒手。"},{"type":"paragraph","text":"充当美日反动派忠实帮凶的日共宫本修正主义集团被日本学生运动的发展吓破了胆，竭力向佐藤反动政府出谋献策，要求佐藤反动政府进一步野蛮镇压学生运动。日共修正主义集团的头目宫本显治二十二日下午在官方的“日本广播协会电台”，出席了一个题为“大学纷争与政治责任”的座谈会。宫本无耻地要求反动的学校当局对所谓“暴力学生”采取“毅然”态度，竭力表示日修将为维护腐朽的资产阶级教育制度而效犬马之劳。"},{"type":"paragraph","text":"二十四日，日共宫本修正主义集团企图在东京大学医学系召开黑会，选举同大学当局进行所谓谈判的代表。他们的这一卑鄙的叛卖行径，激起了东京大学进步学生的强烈反对，一千多名学生在校园里同宫本修正主义分子进行了激烈的斗争，粉碎了他们企图破坏学生斗争的阴谋。"},{"type":"paragraph","text":"东京日本大学的学生奋起向佐藤反动政府和反动教育当局展开斗争，要求教育制度民主化，并同反动的右翼分子勇敢地进行斗争。"},{"type":"paragraph","text":"新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4ea08b46e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
