art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想指挥我们打胜仗","authors":["萧喜来"],"parts":[{"type":"paragraph","text":"一天夜里，一条美蒋操舟机，隐蔽地向我们阵地开来，企图进行偷袭。我们全连同志，从干部到战士，个个磨拳擦掌，恨不得一口就吃掉这些敌人。"},{"type":"paragraph","text":"我带领二班，首先进入前沿阵地。我们按照毛主席和林副主席近战夜战的教导，大胆放近敌人，直到敌人离我们十多米的时候，我才命令开火。刹那间，子弹、手榴弹一齐射向敌人，敌人马上乱了阵。操舟机上那挺重机枪，很快就变成了哑巴。已经爬上岸来的敌人指挥官，没命地向另外两个匪徒嘶叫：“快跑！快跑！”"},{"type":"paragraph","text":"战斗中，我们连的机枪手吴国富负了重伤。当他听到敌人喊跑的时候，忍着剧痛，又爬起来继续射击。入伍不到六个月的新战士孙瑞安想起毛主席的教导，发扬火力消灭敌人是主要的，保存自己是第二位的，就一跃而起，站在工事上面向敌人猛烈射击。就这样，我们只用了几分钟，就协同兄弟分队歼灭了匪徒，缴获了敌人的船只和全部武器装备。"},{"type":"paragraph","text":"实战证明：掌握了毛泽东思想，人就会变得最勇敢、最聪明，就会无敌于天下。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd089acfd0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
