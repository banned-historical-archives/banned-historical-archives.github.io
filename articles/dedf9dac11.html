art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚持用毛泽东思想掌好权","authors":["南京棉毛纺织厂革委会主任/军队代表张进孝"],"parts":[{"type":"paragraph","text":"在举国欢庆建国二十周年的大喜日子里，我们认真学习了林副主席的重要讲话和中央两报一刊的重要社论，受到了极大的教育。社论指出：“为了进一步巩固无产阶级专政，必须认真注意进一步巩固和完善三结合的各级革命委员会。”斗争实践告诉我们，革委会三方面代表，只有在毛泽东思想的原则基础上统一起来，坚持用无产阶级党性掌权，才能进一步巩固和发展革命的三结合。"},{"type":"paragraph","text":"┟廾�纺织厂革委会成立后，领导成员革命热情高，干劲大，大部分委员能够团结一致，带领群众紧跟毛主席的伟大战略部署，认真搞好斗、批、改�5�是，也有少数同志把自己看作是某一派的代表，影响了革委会的集中统一的领导�J率到逃�了我们，资产阶级派性的毒根不铲掉，毛主席的最新指示和党的政策就落实不了，革命的三结合就巩固不了，无产阶级专政就不牢靠�\u003e�队代表千带头万带头，首先要带头听毛主席的话，坚决站在无产阶级党性和党的政策的立场上，帮助革委会的各方面代表克服资产阶级派性，提高为无产阶级掌好权、用好权的自觉性�R虼耍�我们和革委会其他成员一起，运用整风的方法，反复学习毛主席的《关于纠正党内的错误思想》和《整顿党的作风》等光辉著作，对一些同志存在的宗派主义、山头主义等错误思想，进行说理的、恰如其分的批评，用毛泽东思想〖JZ/加重〗统一认识，统一政策，统一计划，统一指挥，统一行动。"},{"type":"paragraph","text":"颐歉镂�会研究把一个革命群众代表从车间调到生产指挥组工作，但另一名革命群众代表却借故不同意�N颐嵌哉庵智榭鼋�行了分析，这两个群众代表原来是两派群众组织的头头，由于资产阶级派性没有根除，对立情绪很大�U攵哉庵智榭觯�我们和那个持不同意见的革命群众代表一起学习毛主席关于〖JZ/加重〗“要提倡顾全大局。每一个党员，每一种局部工作，每一项言论或行动，都必须以全党利益为出发点，绝对不许可违反这个原则”"},{"type":"paragraph","text":"由于革委会坚持活学活用毛泽东思想，狠抓了自身革命化，进一步巩固了无产阶级的领导权，革委会不断得到巩固和完善，全厂面貌焕然一新。今后，我们决心进一步用毛主席关于无产阶级专政下继续革命的伟大理论武装头脑，深入开展革命大批判，认真抓好政治、思想、文化和经济领域的阶级斗争，排除各种非无产阶级思想对革委会的侵蚀，进一步巩固无产阶级专政。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dedf9dac11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
