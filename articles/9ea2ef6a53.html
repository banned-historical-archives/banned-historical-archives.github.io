tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平答意大利记者问","authors":[],"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"这篇答记者问，内容十分重要。邓小平同志所阐明的许多问题，正是目前我国人民政治生活中十分重要的事情，也是世界人民所关心的重要问题。我军指战员一定要认真学习，并通过这一学习，进一步加深对党的路线、方针、政策的理解，统一思想，同心同德，为建设四化、保卫四化作出贡献！"},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"记者说："},{"type":"paragraph","text":"邓小平同志说："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"邓小平同志在谈到粉碎“四人帮”后建毛主席纪念堂问题时说：应该说，那时建毛主席纪念堂是违反毛主席自己的意愿的。五十年代，毛主席提议所有的人身后都火化，只留骨灰，不留遗体，并且不建坟墓。那是鉴于苏联斯大林的教训。毛主席是第一个签名的。我们都签了名。差不多中央高级干部、全国的高级干部都签了名。现在签名册还在。粉碎“四人帮”以后做的这些事，都是从为了求得比较稳定这么一个思想考虑的。"},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"过去没有规定，但实际上存在终身制。这不利于更新，不利于年轻人上来，这是我们制度上的缺陷。这个缺陷在六十年代还看不出来，那时我们还年轻。这不是一个人的问题，是整个制度的问题，更多的是我们的方针、四个现代化能否实现的问题。所以我们说，老同志开明一点好，想带个头。"},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"问："},{"type":"paragraph","text":"答："},{"type":"paragraph","text":"（未完待续。原载《半月谈》总第12期）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ea2ef6a53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
