art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席接见阿尔巴尼亚两个代表团同日接见印度尼西亚最高法院院长等","authors":[],"parts":[{"type":"paragraph","text":"新华社三十日讯 刘少奇主席今天下午接见由阿尔巴尼亚劳动党央委员、劳动党科尔察区委第一书记皮罗·康迪率领的阿尔巴尼亚中国友协代表团，由阿尔巴尼亚通讯社社长、劳动党地拉那市委委员阿耶特·西米季乌率领的阿尔巴尼亚通讯社代表团。"},{"type":"paragraph","text":"刘少奇主席同阿尔巴尼亚的同志们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有中共中央候补委员、中阿友协会长蒋南翔，新华通讯社社长吴冷西、副社长朱穆之，对外文委副主任张致祥等。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使馆临时代办斯库洛伏蒂也在座。"},{"type":"paragraph","text":"新华社三十日讯 刘少奇主席今天下午接见印度尼西亚最高法院院长维尔约诺·普罗佐迪和夫人，印度尼西亚国内法编纂委员会主席苏山多·蒂托普罗佐和夫人，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有最高人民法院副院长吴德峰、张志让等。"},{"type":"paragraph","text":"印度尼西亚驻中国大使馆临时代办苏弗雷·尤淑夫也在座。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"166c0b77f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
