ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"八路军是共产党领导的与人民结合的军队叫","alias":"","parts":[{"type":"paragraph","text":"八路军是共产党领导的"},{"type":"paragraph","text":"与人民结合的军队！"},{"type":"paragraph","text":"（1942年10月25日）"},{"type":"paragraph","text":"此件很好。讲前即印发到会者，讲后还要印发全军干部，到营级止，当作干部教育材料。但不对外发表，要注意保存。讲时，可考虑要李鼎铭3等人来听。"},{"type":"paragraph","text":"对政府与人民中的缺点，即使怎样的严重，亦应该善意的提而不能恶意的报复与攻击，才是一个革命军人对待革命政府与命人民的正当态度，不然就是军阀的态度。[1]这是毛泽东在贺龙《整军报告提纲》上写的批语和在提纲第三部分怎样来进行整军）上加写的三段话。[2]指贺龙1942年11月4日在中共中央西北局高干会议上作的《整军告提纲》。[3]李鼎铭（1881—1947），陕西米脂人。1941年11月在陕甘宁边区"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"凡此所讲\"，我们相信是一定能够在全军执行的。因为我们八路军有很好的品质，我们是全国最好的军队，我们是共产党领导的军队，是与人民结合一起的军队，是有光荣历史传统的军队。我们相信，我们一定能够发扬我们的光荣传统，克服自己的弱点，完成整军的任务。"},{"type":"paragraph","text":"毛泽东深入部队调查研究。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":201,"page_end":202},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70e5fcd504"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
