" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华南工学院反右派斗争进展很大  右派分子被批驳后陷于孤立","authors":["南方日报　流星"],"dates":[{"year":1957,"month":9,"day":19}],"is_range_date":false,"parts":[{"text":"华南工学院反右派斗争进展很大  右派分子被批驳后陷于孤立","type":"title"},{"text":"南方日报　流星","type":"authors"},{"text":"本报讯　华南工学院进一步深入展开反右派斗争，已经有了很大进展；教师和职员中的右派分子，经过群众的揭露和批驳之后，已陷于孤立。","type":"paragraph"},{"text":"华南工学院从本月3日开始，即开展了一个大规模的反右派斗争。在不到半个月的时间内，大多数教工和学生都积极参加辩论会。经过深入的说理斗争，不但批驳得一些顽固狡猾的右派分子理屈词穷，而且也使一些隐蔽的右派分子原形毕露。该院民盟支部主任委员、糖品教研组主任杨倬，是一向仇视党和社会主义的右派分子。他任民盟支部主委后，忠实执行章罗联盟大发展的组织路线；大放大鸣期间，他以反宗派主义为名向党猖狂进攻，到处煽风点火，鼓动“多找些党的缺点提意见”，别人没意见提时，他就谩骂说：“你们是阉过的鸡，不会啼”。他还疯狂地在教师间进行挑拨，叫嚣“党团退出学校”，妄图推翻党的领导。经过揭露，这个右派分子终于被挖出来了。此外，龙庆忠、赖之机等右派分子也露出了原形。","type":"paragraph"},{"text":"在大辩论中，该院教务长冯秉铨反对社会主义教育路线、反对党的领导的右派谬论也受到了严正的驳斥。冯秉铨污蔑党的领导不懂业务，办坏了高等教育，说：“我们要办高等学校，他们却要办百货商店”，说“高教部不懂高等教育事业的特点，不懂高级知识分子的特点”等等。他又大肆诋毁各项政治运动，大叫“运动之风何时去，学术之风何时来”，在教育路线问题上，他反对教学改革。他反对“理工分家”，并说他向来就反对“克服超学时”、“全面负责”、“课堂解决问题”等，并污蔑教学改革是走“学生路线”，是“全国皆然”的错误。冯秉铨的以资产阶级教育路线来反对社会主义教育路线的底子，在大辩论中完全暴露无遗了。教师们指出他的反社会主义的教育路线是和右派分子钱伟长一模一样的。","type":"paragraph"},{"text":"在斗争中，师生们也受到了一次生动实际的政治教育；一些过去认识模糊的人，思想逐步明确，投入战斗。师生们都深深感觉到，这次反右派斗争的收效是极大的。朱惠照主任等说：“这次反右派斗争，比过去思想改造、肃反等运动的教育效果还大。”有些同学说：“参加反右派斗争，胜读三年政治书。”还有的同学提出：“今后的社会主义教育，仍可采取辩论方式，用这些具体的材料作教材，把反右派斗争继续深入下去。”","type":"paragraph"},{"text":" 来源：《南方日报》1957年9月19日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d727590e3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
