宴请范文同同志和越代表团其他同志","authors":[],"dates":[{"year":1964,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南党政代表团回国途中到达北京"},{"type":"paragraph","text":"邓小平彭真陆定一等同志到机场热烈欢迎"},{"type":"paragraph","text":"邓小平同志宴请范文同同志和越代表团其他同志"},{"type":"paragraph","text":"新华社十三日讯　以越南劳动党中央政治局委员、越南民主共和国政府总理范文同为首的越南民主共和国党政代表团，参加了十月社会主义革命四十七周年庆典后，从苏联回国途中，今天下午乘飞机到达北京。"},{"type":"paragraph","text":"中共中央总书记、国务院副总理邓小平，中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，中共中央政治局候补委员、国务院副总理陆定一前往机场热烈欢迎。"},{"type":"paragraph","text":"到机场欢迎的，还有刘宁一、罗贵波、王新亭、李强、曹瑛、杨琳、孙晓村、范瑾等有关方面负责人。"},{"type":"paragraph","text":"越南驻中国大使陈子平，苏联驻中国大使契尔沃年科，越南南方民族解放阵线常驻中华人民共和国代表团团长陈文成也在机场迎接。"},{"type":"paragraph","text":"今天晚上，邓小平同志设宴招待范文同同志和越南党政代表团其他同志。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b85f15d9e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
