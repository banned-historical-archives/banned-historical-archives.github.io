art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"欢呼毛主席革命文艺路线的新胜利——4877部队干部、战士座谈驻京陆海空三军革命文艺战士的联合演出","authors":["史辉/胡波"],"parts":[{"type":"paragraph","text":"4877部队部分干部、战士看了驻京陆海空三军革命文艺战士的联合演出，怀着万分激动和喜悦的心情进行了座谈，大家异口同声地称赞这次演出的成功！一致认为这是一曲响彻云霄的胜利凯歌，是无产阶级文化大革命的丰硕成果，是毛主席革命文艺路线的新胜利。"},{"type":"paragraph","text":"歌颂了我们心中最红最红的红太阳"},{"type":"paragraph","text":"于福科"},{"type":"paragraph","text":"胡必高"},{"type":"paragraph","text":"史长旭"},{"type":"paragraph","text":"歌颂了工农兵的英雄形象"},{"type":"paragraph","text":"王小创"},{"type":"paragraph","text":"胡必高"},{"type":"paragraph","text":"三军革命文艺战士高举毛泽东思想伟大红旗，擂动革命的战鼓，浩浩荡荡地“杀”上了舞台，造了党内最大的走资本主义道路的当权派的反，造了那些资产阶级反动“权威”的反，把几千年颠倒的历史又颠倒了过来，让工农兵真正占领了舞台。这个反造得好！他们穿上工农兵的衣服，说出工农兵的话，唱出工农兵的歌，塑造了工农兵的形象，真是叫我们越看越高兴，越看越亲切。这样的好节目，我们永远也看不够！"},{"type":"paragraph","text":"参加座谈会的同志一致指出：三军革命文艺战士的演出，是向党内最大的走资本主义道路的当权派发动的一次猛烈攻击，是向资产阶级反动路线进行的大批判，是摧毁反革命修正主义文艺黑线的炮弹。他们的节目，像投枪，像匕首，刺向了党内最大的一小撮走资本主义道路的当权派，刺向了那些资产阶级反动“权威”，同时又像战鼓，鼓舞人民去战斗，激励人民去斗争。大家决心学习三军革命文艺战士的革命精神，积极地投入当前两条路线的教育和两条路线的斗争中去，高举革命的批判旗帜，批臭大毒草《修养》，打倒中国的赫鲁晓夫，把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"（史辉、胡波整理）"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bddb3adb9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
