art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"卡博、巴卢库同志观看革命现代京剧《沙家浜》康生、李先念、江青、萧华等同志陪同观看","authors":[],"parts":[{"type":"paragraph","text":"新华社二十九日讯 阿尔巴尼亚劳动党中央政治局委员、书记处书记希斯尼·卡博、中央委员贝哈尔·什图拉等阿尔巴尼亚同志，今晚观看革命现代京剧《沙家浜》。"},{"type":"paragraph","text":"一起观看演出的，还有阿尔巴尼亚劳动党中央政治局委员、部长会议副主席兼国防部长贝基尔·巴卢库，阿尔巴尼亚劳动党中央委员、阿尔巴尼亚人民军政治部主任希托·恰科，和由他们率领的阿尔巴尼亚军事代表团全体同志。"},{"type":"paragraph","text":"中共中央政治局常委、书记处书记、人大常委会副委员长康生，中共中央政治局委员、国务院副总理李先念，中央文革小组第一副组长江青，中共中央委员、中国人民解放军总政治部主任萧华，中共中央委员、国防部副部长王树声，中国人民解放军总后勤部副部长张贤约等，陪同阿尔巴尼亚同志观看演出。"},{"type":"paragraph","text":"演出结束时，卡博、巴卢库、什图拉、恰科同志在康生、李先念、江青、萧华等同志陪同下，走上舞台同演员们亲切握手，热烈祝贺他们演出成功。这时，全场欢腾，同声高唱《大海航行靠舵手》并热烈欢呼“毛主席万岁！”"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使瓦西里·纳塔奈利同志也观看了演出。"},{"type":"paragraph","text":"演出结束后，卡博、巴卢库同志及由他们率领的代表团，在康生、李先念、江青、萧华、王树声同志陪同下，上台和演员合影。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"李先念","type":"人物"},{"name":"王树声","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"982528cf9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
