:[],"dates":[{"year":1978,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南斯拉夫《文学》月刊"},{"type":"paragraph","text":"刊登毛主席《在延安文艺座谈会上的讲话》"},{"type":"paragraph","text":"新华社贝尔格莱德九月九日电 南斯拉夫《文学》月刊今年第九期全文刊登了毛主席著作《在延安文艺座谈会上的讲话》，并发表了评论。"},{"type":"paragraph","text":"评论说，“自毛泽东一九四二年五月在文艺座谈会上发表这篇著名讲话以来，已有三十五年了”，但“直到今天，这篇讲话在中国仍不失为一部艺术法典”。评论说，“以毛泽东为首的党的高级领导人和汇集到解放区的艺术家们，在同蒋介石和日本法西斯侵略者进行斗争的情况下，在吸取中国革命已有的丰富经验的同时，确定了文艺领域中的未来方向，以期创造为中国革命的主力军——工农兵服务的新文艺”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7267d506ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
