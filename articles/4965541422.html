art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"党和国家领导人朱德王洪文叶剑英邓小平等会见金日成主席率领的朝鲜党政代会见是在十分亲切友好的气氛中进行的","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年四月十八日讯 我国党和国家领导人朱德、王洪文、叶剑英、邓小平、江青、姚文元、陈锡联、纪登奎、华国锋、汪东兴、吴德、陈永贵、吴桂贤、苏振华、倪志福、徐向前、聂荣臻、李素文、王震、余秋里、谷牧、孙健，今天晚上会见了金日成主席和由他率领的朝鲜民主主义人民共和国党政代表团。"},{"type":"paragraph","text":"参加会见的朝鲜党政代表团团员是：金东奎、吴振宇、朴成哲、全文燮、许锬、桂应泰、郑松南、吴克列、玄峻极。"},{"type":"paragraph","text":"会见是在十分亲切友好的气氛中进行的。中、朝两国领导同志还在一起照了像。"},{"type":"paragraph","text":"参加会见和合影的还有："},{"type":"paragraph","text":"朝鲜党政代表团的随行人员，玄峻极大使的夫人和朝鲜驻中国大使馆的外交官员，以及代表团专车乘务组工作人员。"},{"type":"paragraph","text":"我国有关部门的负责人耿飚、乔冠华、李强、方毅、杨成武、梁必业、张宗逊、马宁。"},{"type":"paragraph","text":"我国党和国家领导人朱德、王洪文等，四月十八日会见金日成主席和由他率领的朝鲜民主主义人民共和国党政代表团。朱德同志和金日成主席亲切握手。 新华社记者摄"},{"type":"paragraph","text":"金日成主席在邓小平同志等我国党和国家领导人陪同下，同欢迎群众见面。西哈努克亲王、宾努亲王也到车站迎接金日成主席等朝鲜贵宾。 新华社记者摄"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4965541422"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
