":1983,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《浙江学刊》今年第三期发表沙文汉遗作《中国奴隶制度的探讨》一文。沙文汉同志是一九二五年入党的老党员，曾任浙江省省长等职。他被错划为“右派分子”以后，想研究近代史，因为不能借到史料，就转向中国古代社会的历史研究。他认为，关于中国古代社会史的讨论，从表面上看，问题好象集中在奴隶社会与封建社会的分期问题上，但真正的分歧恐怕还在于人们对古代中国社会的特点，特别是对奴隶制度特点的认识上。奴隶制的特点不搞清楚，则各个时期的社会性质、特点也必然搞不清楚，从而分期问题也就无法解决了。作者认为，中国奴隶制确是一种建立在国有土地制基础上的国有奴隶制度。至于其中有一部分奴隶被使用于贵族自己所经营的庄园里直接为某贵族私人所有，则亦不过是这种奴隶制的一种派生现象而已。这种国有奴隶制度，它是氏族社会末期，氏族贵族利用土地公有制和氏族成员对于部落整体的神圣义务，逐步剥夺氏族成员的权利，把他们降贬为奴隶而形成的。这种奴隶制度和我们所熟知的西方古典世界的那种奴隶制度是很不相同的。不但在奴隶制的表现形式上各有各的特点，即其发展与崩溃过程也各有不同的情况。看来它是与西方古典世界并行的另一种形式的奴隶制度，不是发达的程度上有所区别，而是发展的形态上各不相同。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"浙江文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e54831eb94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
