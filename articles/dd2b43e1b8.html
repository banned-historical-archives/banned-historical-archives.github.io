s":[],"dates":[{"year":1959,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"四川省泸州地委整社简报","type":"title"},{"text":"……（上缺）党委书记打电话给分支书布置工作时说：“现在主要是抓生产，不要管算账了”。形成虎头蛇尾，干部处理迟迟不行动，隆昌付庆公社，算账已结束，现在又发现五管区有1100元未上账，10多个存折不定期分散在干部手里。","type":"paragraph"},{"text":"此外，据合江、纳溪、泸县、古兰等县反映，在算账中发生了自杀事件四起（其中一个自杀未遂），据初步了解与算账工作有关，各地必须引起注意，对算账工作进行一次执行政策情况的检查，在工作方法上要有策略。对已发生死人的，应进行调查，弄清情况，加以处理，总之要把算账工作作深作透，推动生产。……（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd2b43e1b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
