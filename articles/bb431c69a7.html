art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"干革命就要学习毛主席著作","authors":["北京部队学习毛主席著作积极分子/五好战士杨泽会"],"parts":[{"type":"paragraph","text":"我参加了首都百万革命群众举行的庆祝无产阶级文化大革命的大会，亲眼看到我们最敬爱的领袖毛主席，听了林彪副主席的战斗号召，心里十分激动。"},{"type":"paragraph","text":"解放前，我爷爷、父亲扛长工，奶奶当奶妈，三婶要饭被地主的狗咬死了，三叔去告状被关进了牢房。旧社会给我们劳动人民的苦难说不完。是党和毛主席救了我全家。"},{"type":"paragraph","text":"我入伍后，伟大的毛泽东思想又把我哺育成为一个人民战士。"},{"type":"paragraph","text":"我的亲身经历使我深深地感到，毛主席是我的再生父母、救命恩人。我虽然文化水平不高，但我知道，毛主席的话，句句是真理，一句顶一万句，干革命就得学习毛主席著作。我请别人念毛主席著作给我听，记不住一篇文章就记一段，记不住一条语录就记关键的几句，用符号标出来。打开书本，看到符号，就知道毛主席告诉我应该做什么，怎么做，就坚决照办。"},{"type":"paragraph","text":"我已经尝到了学习毛主席著作的甜头，我要更坚决地响应林副主席提出的学习毛主席著作的号召，在斗争中活学活用毛主席著作，向一切牛鬼蛇神开火，把它们斗倒、斗垮、斗臭，使它们永世不得翻身。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb431c69a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
