ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于派部队制止赣州武斗的批语","alias":"","parts":[{"type":"paragraph","text":"关于派部队制止赣州武斗的批语！"},{"type":"paragraph","text":"（1967年7月6日）林彪、恩来同志："},{"type":"paragraph","text":"赣州问题严重，涉及整个赣南十多县，调一个师去，只能管南昌、吉安、宜春、抚州等处，对赣南鞭长莫及。是否可从广州军区调一个师，至少一个团进驻赣州，将事情办好后仍返广东。此事请先考虑，待面商。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月六日"},{"type":"paragraph","text":"[1]这个批语写在中共中央军委办公厅1967年7月4日编印的《群众来信摘抄》第五十五号上。这期摘抄登载了江西赴京控告团、江西赣州赴京控告分团7月4日的电话汇报，反映赣州武斗情况严重，人员伤亡很大，断粮断水，交通全部堵塞，要求中央立即派部队前往制止武斗。"},{"type":"paragraph","text":"[2]林彪，当时任中共中央军委副主席。恩来，即周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":7,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":529,"page_end":529},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7967be69f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
