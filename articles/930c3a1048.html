rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"抓革命促战备反击右倾翻案风内蒙古军区某部边防五连指战员坚持以阶级斗争为纲做好战备工作，警惕地守卫着祖国北大门","authors":[],"parts":[{"type":"paragraph","text":"本报讯 驻守在祖国北部边疆的内蒙古军区某部边防五连指战员，认真学习毛主席关于反击右倾翻案风的重要指示，深入批判“三项指示为纲”的修正主义纲领，进一步提高了以阶级斗争为纲，坚持党的基本路线的自觉性，促进了各项战备工作的落实，更加警惕地坚守着祖国的边防。"},{"type":"paragraph","text":"五连党支部在反击右倾翻案风的斗争中，带领全连指战员认真学习毛主席关于“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目”的重要指示，运用马克思主义关于阶级斗争的理论和耳闻目睹的大量事实，批判党内那个不肯改悔的走资派抛出的“三项指示为纲”这一修正主义纲领。通过学习和批判，大家进一步认识到，党内那个不肯改悔的走资派抛出“三项指示为纲”，就是要取消阶级斗争这个纲，篡改党的基本路线，复辟资本主义。如果让他的复辟阴谋得逞，劳动人民就要吃二遍苦，受二茬罪。翻案不得人心，反击大快人心。全连各班、排都召开了专题批判会，写出了一百多篇集中批判“三项指示为纲”的文章。"},{"type":"paragraph","text":"五连党支部在带领干部战士批判“三项指示为纲”的过程中，还对社会帝国主义进行了揭露和批判，增强干部战士常备不懈的战备观念。大家认识到，我们是祖国的边防战士，在反击右倾翻案风的斗争中，一定要警惕社会帝国主义、帝国主义的破坏和捣乱，切实做好各项战备工作。干部战士团结一致，斗志昂扬地守卫着祖国北大门。他们为了随时应付敌人的突然袭击，时时刻刻都保持着高度的警惕。各班、排都建立了战争检查值班制度，经常检查督促，使战争工作落到实处。不论是平时，还是假日，他们都能做到一声令下，立即出动。最近的一天夜里，连队奉命到边境线上执行一项紧急巡逻任务。当时气温急剧下降，同志们发扬一不怕苦、二不怕死的革命精神，以压倒一切敌人的英雄气概，一路急行军到达指定地点，查明情况，胜利地完成了巡逻任务。"}],"alias":""},"tags":[{"name":"内蒙古文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"930c3a1048"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
