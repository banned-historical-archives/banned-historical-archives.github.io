要旗帜鲜明反对资产阶级自由化","authors":["罗玉文"],"dates":[{"year":1989,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杨白冰在解放军艺术学院毕业典礼上强调"},{"type":"paragraph","text":"发扬革命传统　创作上乘作品"},{"type":"paragraph","text":"军队文艺工作者要旗帜鲜明反对资产阶级自由化"},{"type":"paragraph","text":"新华社北京7月11日电  （记者罗玉文）“军队的文艺工作者要以充满时代精神的，健康清新的，在内容和形式上都是上乘的艺术作品，为繁荣军队文艺，壮大无产阶级文艺阵地作出贡献。”这是人民解放军总政治部主任杨白冰今天下午在解放军艺术学院89届干部大专班学员毕业典礼上说的。"},{"type":"paragraph","text":"来自解放军和武警部队近200名学员，在解放军艺术学院的五个系、八个专业经过两年的学习，于今天毕业。"},{"type":"paragraph","text":"杨白冰在讲话中说，回顾这几年的情况，我们军队的文艺工作坚决贯彻了邓小平同志关于文艺工作的一系列指示，总的状况是好的。部队的作家、艺术家们努力表现新的历史条件下我军新一代指战员崭新的精神风貌，积极反映国家和军队改革的步伐，涌现了一大批优秀作品，受到了广大群众的欢迎。"},{"type":"paragraph","text":"杨白冰指出，有国家就不可能没有军队，有军队就不可能没有文艺工作。军队文艺工作的根本宗旨就是为部队提供优质的精神食粮，团结人民，打击敌人，鼓舞士气，振奋精神，为全面提高部队战斗力服务。把握了这一点，我们就不会在形形色色的社会思潮面前迷失方向。他强调说，军队的文艺工作者任何时候都要坚持四项基本原则，旗帜鲜明地同资产阶级自由化作斗争。要发扬军队文艺工作的革命传统，创作出内容和形式都是上乘的作品去影响和带动整个文艺界。军队的文艺工作者不仅要艺精，还要德高。要投身到火热的斗争中去，向人民群众学习，向部队干部战士学习，向英模学习。"},{"type":"paragraph","text":"总政治部副主任周文元和驻京各大单位主管文艺工作的领导同志，参加了今天的毕业典礼大会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90f2e1d74c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
