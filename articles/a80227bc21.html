script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"紧跟伟大领袖毛主席，将革命进行到底","authors":["山西省平顺县西沟大队全体贫下中农"],"dates":[{"year":1969,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"紧跟伟大领袖毛主席，将革命进行到底"},{"type":"paragraph","text":"山西省平顺县西沟大队全体贫下中农"},{"type":"paragraph","text":"正当我们以实际行动热烈欢庆党的“九大”胜利闭幕的大喜日子里，四月二十七日，又传来了振奋人心的好消息：我们敬爱的林彪副主席在大会上作的报告发表了。全村革命群众齐集在扩音喇叭下，聚精会神地细听广播。林副主席的报告，句句说到了我们的心眼里，把我们想要说的话都说了。林副主席的报告，高举马克思主义、列宁主义、毛泽东思想的伟大红旗，传达了伟大领袖毛主席的声音，向我们提出了今后的战斗任务，是指导我国社会主义革命和社会主义建设的伟大纲领。"},{"type":"paragraph","text":"听完林副主席的报告，我们回顾了西沟在集体化道路上的斗争史，更加深刻地认识到两个阶级、两条道路、两条路线斗争的尖锐性和复杂性，更加深切地体会到伟大领袖毛主席的革命路线，确实是我们贫下中农的幸福线，生命线。三十年来，我们西沟大队广大贫下中农和革命群众，紧跟伟大领袖毛主席，坚决按照毛主席的指示办事，取得了一个又一个的胜利。"},{"type":"paragraph","text":"农业合作化之前，大叛徒刘少奇及其一伙抛出了“发展富农经济”的黑货，企图把我们引上邪路。我们打心眼里明白，有富农就没有我们贫下中农，这是一条使我们重新陷于贫困饥饿的黑暗的道路。我们没听这种鬼话。我们坚决响应毛主席关于“组织起来”的伟大号召，办起了互助组。合作化后，刘少奇这伙坏蛋又疯狂反对毛主席的革命路线，大砍农业合作社。我们又紧跟毛主席，战胜了阶级敌人的猖狂进攻。人民公社化后，刘少奇及其一伙，又刮起了“三自一包”的黑风，妄图使我们离开社会主义道路，达到他们复辟资本主义的罪恶目的。伟大领袖毛主席亲自发动和领导的无产阶级文化大革命，彻底摧毁了以刘少奇为首的资产阶级司令部，这是毛主席革命路线的伟大胜利。"},{"type":"paragraph","text":"毛主席教导我们：“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。所以，我们不能说最后的胜利。几十年都不能说这个话。不能丧失警惕。”我们一定牢记毛主席的教导，念念不忘阶级斗争，念念不忘无产阶级专政，永远紧跟伟大领袖毛主席，将革命进行到底！"},{"type":"paragraph","text":"在党的第九次全国代表大会上，我们贫下中农的代表被选为中央委员。我们庄稼汉当上了中央委员，这是古今中外没有的事，这是伟大领袖毛主席他老人家对我们贫下中农和劳动人民的最大关怀，最大信任，也是我们的最大光荣和最大幸福。我们一定要更好地开展活学活用毛泽东思想的群众运动，坚决完成林副主席报告中提出的各项战斗任务，狠抓革命，猛促生产，夺取今年农业生产的更大丰收。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a80227bc21"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
