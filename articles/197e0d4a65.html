ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1942年2月11日）"},{"type":"paragraph","text":"报纸要以自己国家的事为中心，这正是表现一种党性。现在《解放日报》还没有充分表现我们的党性，主要表现是报纸的最大篇幅都是转载国内外资产阶级通讯社的新闻，散布他们的影响，而对我党政策与群众活动的传播，则非常之少，或者放在不重要的位置。《解放日报》应把主要注意力放在中国抗战、我党活动和根据地建设上面，要反映群众的活动，充实下层消息。过去《红色中华》是以苏区建设为中心，《新华日报》受了限制。提议根本改变《解放日报》现在的办报方针，使它成为贯彻我党政策与反映群众活动的党报。"},{"type":"paragraph","text":"一过去的在职干部教育存在以下四个缺点，应加以改正。一、没"},{"type":"paragraph","text":"[1]本篇一是在中共中央政治局会议上，毛泽东在讨论《解放日报》问题时讲话的一部分；本篇二是在中共中央政治局会议上，毛泽东在讨论《中有着重本身业务的学习，今后应以业务教育为中心；二、对政治教育的忽视，今后应注重时事与政策的教育，对下级干部特别要着重当地政治情况及具体政策的教育；三、对文化水平低的工农老干部没有以文化教育为主，今后应强调文化教育；四、无组织无自的地进行理论学习，今后应学习实用的革命理论，真正做到理论与实际联系。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":2,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":443,"page_end":444},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"197e0d4a65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
