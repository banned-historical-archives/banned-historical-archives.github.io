tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛泽东著作 打牢思想根基三连引导干部战士深入开展精神文明活动","authors":["张爱琰/王保明"],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队某团三连党支部引导干部战士结合现实思想学习毛泽东著作，促进了精神文明活动的开展，连队跨入了先进行列。"},{"type":"paragraph","text":"精神文明活动开展一段时间后，三连有的战士做了好事没受到表扬，就不坚持了；有的做好事积极，对本职工作却不大上心。党支部分析这些现象，认为必须引导干部战士打牢思想根基。他们结合精神文明教育，组织全连认真学习毛泽东著作，连里成立了辅导组，班、排培养了理论骨干，重点学习了《为人民服务》、《纪念白求恩》、《关于纠正党内的错误思想》等文章。通过学习，使干部战士树立全心全意为人民服务的思想，并用以检验自己的行动。饲养员杨占林在开展精神文明活动中，虽然做了一些好事，但没有解决不安心本职工作的问题。他通过学习《为人民服务》，对照张思德的事迹，受到很大的启发。他一心扑在养猪工作上，每天到三里以外的山上打猪草。由于打牢了思想根基，干部战士在精神文明活动中行动更加自觉了。全连今年做了大量好事，十六名干部战士探亲都能按时归队，四名家里有困难的老战士做到了走留听从党的安排。"},{"type":"paragraph","text":"（张爱琰、王保明）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4aa44490cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
