art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的最新指示句句照办字字照办","authors":["五好战士红舟"],"parts":[{"type":"paragraph","text":"我在执行支左任务中，有一段时间，对经常和我们接触的革命群众组织，总是看他们优点多，缺点少，甚至对他们犯了一些原则错误，也迁就。而对其他一些革命群众组织，则看缺点多，看优点少。有些事情，不是用毛泽东思想去衡量，而是从个人感情出发。毛主席教导我们：“必须善于把我们队伍中的小资产阶级思想引导到无产阶级革命的轨道，这是无产阶级文化大革命取得胜利的一个关键问题。”我在帮助革命派克服小资产阶级派性，实现革命大联合的时候，自己思想不端正，怎么能引导革命群众克服派性呢？认识提高以后，我便主动地和其他革命群众组织的同志接触，积极宣传毛主席“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织”的教导，热情地帮助他们紧紧掌握斗争大方向，把千仇万恨集中在党内一小撮走资本主义道路当权派身上，铲平小山头，实现革命大联合，把小资产阶级的派性引上无产阶级党性的轨道。经过艰苦细致的思想工作，几个革命群众组织终于实现了革命的大联合。"},{"type":"paragraph","text":"通过这件事，我深深体会到，只有不断把自己当作革命的对象，才能成为革命的一份力量。只有狠斗自己的私心，把“私”字扫地出门，让“公”字安家落户，才能真正理解、坚决执行和勇敢捍卫毛主席的无产阶级革命路线，紧跟毛主席的伟大战略部署，积极支持左派广大群众，做好“三支”“两军”工作。今后，我一定要更好地活学活用毛主席著作，把毛主席的指示字字句句落实到行动中去，以毛主席“斗私，批修”的伟大战略方针为纲，破私立公，彻底改造世界观，同广大无产阶级革命派团结在一起，战斗在一起，胜利在一起，把无产阶级文化大革命进行到底。"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3eab7ec77f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
