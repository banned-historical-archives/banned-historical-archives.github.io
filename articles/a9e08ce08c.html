ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"悦王铭章将军联","alias":"","parts":[{"type":"paragraph","text":"挽王铭章将军联！"},{"type":"paragraph","text":"（1938年5月）奋战守孤城，视死如归，是革命军人本色；决心歼强敌3，以身殉国，为中华民族争光。"},{"type":"paragraph","text":"[1]1938年台儿庄战役中，国民党军师长王铭章率部坚守滕县，使部队争得时间完成战斗任务，而王铭章本人却因城破与全师将士殉难。在武汉，国民政府举行公祭。毛泽东和中共中央其他领导人陈绍禹、秦邦宪、吴玉章、董必武联名送了这副挽联。王铭章（1893一1938），四川新都人。早年参加反清爱国运动。后在四川陆军军官学校专攻军事。1935年任国民革命军第四十一军一二二师师长。1938年3月任第四十一军前敌总指挥，在台儿庄（今属枣庄市）战役中，率部坚守滕县，与日军浴血奋战三昼夜，在17日的战斗中不幸中弹牺牲。"},{"type":"paragraph","text":"[2]守孤城，指王铭章率部固守滕县。[3]强敌，指日寇。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":252,"page_end":252},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9e08ce08c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
