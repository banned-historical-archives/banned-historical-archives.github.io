["戚本禹"],"dates":[{"year":1967,"month":7,"day":16}],"is_range_date":false,"parts":[{"text":"戚本禹关于农民进城问题的讲话","type":"title"},{"text":"戚本禹","type":"authors"},{"text":"决战时，敌人处于死亡的命运，就拼命挣扎，正象列宁所说的“必须以十倍的疯狂进行反扑”，要失他们的天堂了，必然要彻底反抗，若不反抗，不符合阶级斗争规律。现在一些阶级敌人操纵一些专政机关，什么公检法，人民武装部，对群众实行资产阶级专政，抓革命派，解散革命群众组织，要革命群众请罪。有的操纵一些组织对革命群众专政，有的利用农民进入城市，什么要“农村包围城市”，煽动农民进城，说什么进城保卫国家财产，并且给工分，有的发枪给了他们。他们提出“农村包围城市”的口号是反动的口号。毛主席当时提的口号是伟大的战略思想，你现在提，是包围无产阶级革命派，打砸抢挑动武斗，表现了他们纸老虎的本质，表现他们要灭亡，这样看更好，他要灭亡，要死亡，他不压制才奇怪呢，还会搞出新的花样来反扑。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e6c31ec0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
