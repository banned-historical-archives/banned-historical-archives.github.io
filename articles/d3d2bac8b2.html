hors":[],"dates":[{"year":1950,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在美日反动派统治下"},{"type":"paragraph","text":"日本人民苦难日深"},{"type":"paragraph","text":"失业工人被迫自杀、奴隶买卖盛行"},{"type":"paragraph","text":"【新华社二十九日讯】据塔斯社纽约二十六日讯：报道日本群众处境不幸的消息，在报纸上愈来愈常见了。美帝国主义者和他们的日本仆从，正企图变日本为殖民地国家。"},{"type":"paragraph","text":"美国的新闻日报最近刊载东京通讯说：由于大批的失业，千百万名日本人注定了要挨饿。可怖的贫穷和毫无改善他们处境的希望，迫使着他们自杀。该报指明：据国家地方警察本部的官方材料，日本每天都有二十人自杀。"},{"type":"paragraph","text":"新闻日报描述了许多人民因饥饿和贫穷感到生活无望而自杀的事件。该报说：有一个日本人，自从去年秋天就一直没有找到工作，他把他的妻子和孩子溺死，然后自杀。另一事件，夫妇二人及八个孩子，因无法谋生而全家自杀。"},{"type":"paragraph","text":"失业和穷困使得可耻的奴隶制度，又在日本复活了。近来，成百的孩子们在山形、岩手、神奈川、琦玉等县被卖为奴隶。有一位四十二岁的妇女在没有希望找到工作而无法谋生的时候，便把自己和她的两个孩子一起出卖给别人当奴隶。"},{"type":"paragraph","text":"买卖奴隶已在日本发展到了这样大的规模，以致日本涌现出许多以“买卖奴隶”为业的贩子。报纸消息说：具体的调查证实，日本东北地方从事买卖儿童的贩子有二十多个。日本报纸每日新闻描述了大坂和名古屋一群贩卖儿童的人的罪行，他们把数百个无法谋生的女孩子卖给妓院。据日本厚生省的材料，日本有十二万九千个孩子无家可归。而实际数字要比这大得多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3d2bac8b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
