ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"视察人民大会堂时的指示","alias":"","parts":[{"type":"paragraph","text":"视察人民大会堂时的指示！"},{"type":"paragraph","text":"（1959年9月5日）"},{"type":"paragraph","text":"人民大会堂的建成确实是成绩伟大，你们这么大的功劳，是不是立块碑吧！那将多大呀！照相吧！也站不下呀！"},{"type":"paragraph","text":"要向老红军学习，不为名，不为利，不计报酬，不怕牺牲。红军打仗也没有礼拜天，没有休息，没有加班费，还是学习老红军吧，要和老红军一样。"},{"type":"paragraph","text":"大跃进就是好，有人说大跃进不好，十三陵水库，人民大会堂就是大跃进的产物。没有大跃进就没有大会堂。让那些右派来看看，究竟是不是大跃进！"},{"type":"paragraph","text":"[1]1959年9月5日，毛泽东视察人民大会堂工程。本篇一是毛泽东视察了礼堂的一二层和上海厅后的指示；本篇二是毛泽东看了宴会厅，询问了工程情况后的指示。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":345,"page_end":345},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e5f49aff5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
