script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决捍卫毛主席的革命路线","authors":[],"dates":[{"year":1971,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决捍卫毛主席的革命路线"},{"type":"paragraph","text":"藏族共产党员干贝，在党的“九大”以后，为了尽快地把“九大”精神传达到玉树草原的每一座帐房，首先同大队干部一起办起了传达“九大”精神的学习班，制定了贯彻落实“九大”精神的计划。接着，他又同大队干部分头到贫苦牧民中去传达“九大”精神，让“九大”的东风吹遍十八盘山的每一条峡谷。"},{"type":"paragraph","text":"干贝来到第一生产队，这里有一位在旧社会被折磨得两腿瘫痪的老贫苦牧民，他就到这位老贫苦牧民的帐房。老人看见干贝，特别感动，坚决要求参加生产队贯彻“九大”精神的学习班，可是老人不能走动。干贝想，落实毛主席的号令一个人也不能漏，就立即背上老人去学习。学习班一共举行了六天，干贝每天都把老人背来背去，刮风下雨也未停过。"},{"type":"paragraph","text":"干贝无限热爱伟大领袖毛主席，自觉执行毛主席革命路线的深厚无产阶级感情，是在斗争实践中培养起来的。"},{"type":"paragraph","text":"一九六二年，正当全国人民沿着毛主席指引的航向同自然灾害作斗争，不断取得胜利的时候，“三自一包”的妖风刮到了玉树草原。刘少奇的代理人到处兜售“包产到户”。当时担任红旗大队党小组长的干贝，反复组织贫下中牧学习毛主席的教导：“只有社会主义能够救中国”，带领大家同刘少奇的反革命修正主义路线作斗争。贫下中牧说：“毛主席指引的路，谁也不能变！”干贝说：“对！毛主席指引的革命路，我们走定了。就是豁出命来，也要捍卫毛主席的革命路线！”他和贫下中牧一起坚决顶住了刘少奇“三自一包”的黑风。"},{"type":"paragraph","text":"尖锐的两条路线斗争实践，使干贝认清了一条真理：“不读毛主席的书，两眼黑糊糊；读了毛主席的书，心里亮堂堂。”在他的倡导下，玉树草原组织了第一个学习毛主席著作小组。这时，有的人讥嘲讽刺，并企图用生产挤垮学习毛主席著作的小组。干贝带领贫下中牧坚决斗争，他说：“毛主席是贫下中牧的救命恩人，毛泽东思想是贫下中牧的命根子。我们按照林副主席的指示活学活用毛主席著作，谁要来干扰，我们贫下中牧一齐同他拚！”在干贝的带领下，贫下中牧活学活用毛泽东思想的群众运动一浪高过一浪。在无产阶级文化大革命中，干贝受到了更深刻的教育和锻炼，做到：活学活用毛泽东思想不间断，紧跟毛主席的伟大战略部署不停步，誓死保卫毛主席革命路线的决心不动摇。"},{"type":"paragraph","text":"干贝多次被评为活学活用毛泽东思想积极分子。一九六九年，在一次执行任务中，他又荣立二等功。他所领导的红旗牧业大队是玉树草原的一面活学活用毛泽东思想的红旗。"},{"type":"paragraph","text":"干贝牢记毛主席关于“我们应该谦虚，谨慎，戒骄，戒躁，全心全意地为中国人民服务”的教导，始终保持着谦虚谨慎的作风，成绩面前找差距，赞扬声中找缺点，在继续革命的征途上，不断为捍卫毛主席的革命路线而斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07567fa219"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
