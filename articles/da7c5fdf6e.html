tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"胡锦涛观看《历史巨人毛泽东》大型纪念展览","authors":["徐耀中"],"parts":[{"type":"paragraph","text":"这个展览以大量珍贵历史图片和文物，展现了毛泽东的光辉一生。胡锦涛循着生平·思想·事业；生活·情操·风采；继承·发展·前进的展览顺序，边观看图片、实物，边听取介绍。在珍贵的毛泽东的手稿、信扎、文献、藏书和实物面前，胡锦涛神情专注，不时询问和了解一些新的情况和问题。"},{"type":"paragraph","text":"在复原的毛泽东在延安枣园办公的窑洞前，当胡锦涛听到陪同人员介绍说，这是翻修时拆下的原物时，立即问：允不允许参观者在这里照相？中国革命博物馆陪同人员回答说：允许的，参观者很喜欢在这里照相留念。在复原的毛泽东在中南海菊香书屋卧室的一角前，那用砖块垫起一只床腿向里边倾斜、半边放满了书的木床、那挂在屏风后半旧不新的睡衣、那张古朴的木制方桌和显得十分窄小的办公桌深深地吸引了胡锦涛的视线，他观看了好一会儿，并说这反映了毛主席的生活习惯。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡锦涛","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da7c5fdf6e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
