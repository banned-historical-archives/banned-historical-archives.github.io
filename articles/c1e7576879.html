script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南《人民报》强调必须警惕美帝破坏社会主义国家揭露肯尼迪推行“和平演变”阴险策略指出肯尼迪蓄谋已久妄图使社会主义国家走上南斯拉夫修正主义者的道路","authors":[],"dates":[{"year":1963,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社河内23日电】　越南《人民报》十六日发表署名黎平的文章，揭露美国肯尼迪政府一方面扩军备战反对社会主义阵营国家、另一方面阴谋利用糖衣炮弹促使社会主义国家向资本主义“和平演变”的两手策略。文章强调指出，社会主义国家人民对美帝国主义这种阴险策略绝不能放松警惕。"},{"type":"paragraph","text":"《人民报》这篇题为《必须粉碎美国阴谋侵略和破坏社会主义国家的阴险计划》的文章指出，“最近，美国当局经常谈到美国对社会主义国家的‘诚意’，谈到‘改善’美国和帝国主义阵营同社会主义国家之间的关系。”很显然，这种所谓“诚意”的实质是:“企图通过‘改善东西方关系’、‘自由交换消息’，来实现它们从内部破坏社会主义国家的‘和平演变’的计划。”"},{"type":"paragraph","text":"文章说，“美帝国主义千方百计地妄图破坏社会主义国家。肯尼迪集团正在开足马力进行军备竞赛，发动特种战争，同时还加紧准备局部战争和全面战争，反对社会主义阵营国家。另一方面，在企图统治全世界的所谓‘和平战略’的‘总战略’下，肯尼迪集团还阴谋利用糖衣炮弹，在社会主义国家内部‘促进和平演变’，妄图达到它们在社会主义国家恢复资本主义的恶毒目的。与此阴谋政策的同时，美帝国主义还加紧在社会主义阵营中制造分裂，妄图使这些国家走上南斯拉夫修正主义者的道路。”"},{"type":"paragraph","text":"文章强调指出，肯尼迪的这种策略蓄谋已久。在他担任美国总统以前所写的《和平战略》一书中，他就提出:美国希望看到越来越多的国家走上南斯拉夫的道路。"},{"type":"paragraph","text":"文章说，“按照上述方针，美帝国主义及其集团采取各种方法向社会主义国家散布颓废的‘美国生活方式’的毒素和资产阶级反动思想，如狭隘民族主义、享乐思想、和平主义等等，以便实现‘政治上的颠复’”，而“铁托修正主义集团在实现肯尼迪的这一‘和平战略’中，正充当了美帝国主义的得力走狗。”"},{"type":"paragraph","text":"文章说，“我们的时代，是以美国为首的帝国主义和其它反动势力为一方同社会主义阵营和全世界人民为一方进行极其激烈的阶级斗争的时代。现阶段是全世界范围内的革命力量正处于向帝国主义进行连续进攻的阶段。社会主义国家人民面对社会主义阵营和全世界人民最危险的敌人——美帝国主义，绝不能放松警惕。社会主义国家人民比任何时候都需要更加坚决地维护和加强社会主义阵营和国际共产主义运动的团结，维护马克思列宁主义的纯洁性，维护和发展社会主义的物质和精神成果，坚决粉碎以美国为首的帝国主义从内部和外部进行破坏的一切阴谋。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1e7576879"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
