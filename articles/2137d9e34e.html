art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"念念不忘阶级斗争","authors":["青海红卫第一机床厂毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席最近教导我们：无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。我们从参加支左工作的实践中深深体会到，毛主席光辉的最新指示，是颠扑不破的伟大真理。"},{"type":"paragraph","text":"我们参加支左的青海红卫第一机床厂，去年九月在阶级斗争的暴风雨中成立了革命委员会。从革委会成立的第一天起，阶级敌人就怕得要死，恨得要命。他们耍着反革命两面派的权术，千方百计地进行阴谋破坏活动。他们有时藏在阴暗角落里，制造种种流言蜚语；有时直接把矛头指向革命委员会和驻厂毛泽东思想宣传队。阶级敌人的这些活动，目的只有一个，就是妄图搞垮新生的革命政权。现实的阶级斗争告诉我们，革命委员会成立以后，阶级斗争并没有结束，无产阶级反对资产阶级和一切阶级敌人的斗争，必须继续进行下去。"},{"type":"paragraph","text":"面对这种现实，我们遵照毛主席关于“阶级斗争，一抓就灵”的教导，帮助革命委员会大办毛泽东思想学习班。用“千万不要忘记阶级斗争”的光辉思想，武装广大革命群众，对阶级敌人进行了充分的揭露批判。在这场向阶级敌人进攻中，揪出了混进革命队伍内部的坏分子，提高了广大革命群众阶级斗争的觉悟，从政治上、思想上、组织上巩固了新生的革命政权，全厂革命生产，呈现出一派热气腾腾的景象。"},{"type":"paragraph","text":"我们深深体会到：革命委员会成立后，决不能以为天下太平了，可以放松对于阶级敌人的进攻了，必须牢记毛主席的教导，念念不忘阶级斗争。当前，我们要更好地学习和掌握毛主席的最新指示，以战无不胜的毛泽东思想为武器，继续深入地开展革命大批判，彻底粉碎右倾保守主义、右倾分裂主义和右倾投降主义，夺取无产阶级文化大革命的全面胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2137d9e34e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
