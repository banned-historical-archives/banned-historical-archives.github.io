script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度贱民开展斗争反对剥削和压迫","authors":[],"dates":[{"year":1976,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度贱民开展斗争反对剥削和压迫"},{"type":"paragraph","text":"新华社一九七六年一月四日讯新德里消息：据印度报纸报道，印度贱民在一九七五年多次开展斗争，反对歧视、剥削和压迫。"},{"type":"paragraph","text":"在印度历史上遗留下来的种姓（世袭的阶级）制度中，贱民属于社会最底层，祖祖辈辈只能从事“卑贱”的行业，受到最深重的剥削和压迫。"},{"type":"paragraph","text":"据报道，一九七五年三月，印度中央邦乌贾因县一百多贱民举行示威，抗议当地警官率领一批警察殴打贱民一家四口的暴行。四月，在比哈尔邦加齐普尔县拉苏普尔村，地主残暴地打死贱民二人，烧毁了贱民住房二百多家，还污辱贱民妇女。贱民忍无可忍，奋起反抗。这个邦的罗塔克县杜格普拉村贱民举行婚礼时，路过村中庙宇，被地主开枪打死五人，贱民愤怒地用刀斧抵抗。比哈尔邦的博杰普尔县和巴特那县还发生了无地贱民以武力反抗地主迫害的斗争。"},{"type":"paragraph","text":"贱民加强抗暴斗争是被迫的。印度内政部副部长莫赫辛曾承认，近年来迫害贱民的事件日益增多，在比哈尔邦、北方邦、中央邦、喀拉拉邦、马哈拉施特拉邦、安得拉邦和古吉拉特邦，迫害贱民的情况特别严重。印度报纸透露了许多骇人听闻的迫害贱民的事件。例如，一些贱民因进入庙宇，走过地主居住的街道，甚至因使用了公共浴室而被打死、打伤。许多地区还发生了烧毁贱民的住房，抢劫贱民粮食、财产，破坏贱民的水井和污辱贱民妇女的事件。"},{"type":"paragraph","text":"贱民经常遭受着深重的剥削。在比哈尔邦的农村中，没有土地的贱民有百分之七十二的家庭负债，而高利贷的利率通常是百分之一百。印度报业托辣斯透露，班达县一个贱民的曾祖父向地主借了九十三卢比，他家当了四代农奴，但现在这笔债不但没有还清，反而增加到一千卢比。"},{"type":"paragraph","text":"印度当局残暴地镇压敢于起来进行抗暴斗争的贱民。最近，比哈尔邦政府出动警察开枪打死贱民约二十人。"},{"type":"paragraph","text":"苏联当局的喉舌《真理报》在一九七五年八月二十六日胡说什么印度“贱民的生活在独立以来的年代中已有很大改变”，印度领导人“为反对种姓制度对贱民的歧视而进行了斗争”等等。但是，仅从印度资产阶级报刊透露的贱民的悲惨境况中就可以看出，《真理报》为印度反动统治阶级涂脂抹粉完全是徒劳的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c645153946"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
