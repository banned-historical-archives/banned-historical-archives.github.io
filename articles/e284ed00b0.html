ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"在延边自治州党委要求中央文革小组去电制止冲突报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在延边自治州党委要求中央文革小组"},{"type":"paragraph","text":"去电制止冲突报告！上的批语"},{"type":"paragraph","text":"（1967年1月21日）总理："},{"type":"paragraph","text":"应当把延边反革命派手中的权力夺过来，请你部署一下。毛远新去延边工作一个月，那里大有起色。他今天去哈尔滨，如尚未走，可找他谈一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿一日"},{"type":"paragraph","text":"[1]中共延边自治州委1967年1月19日给中央文化革命小组并东北局、吉林省委的这个报告说，18日下午3时，延边“无产阶级革命造反司令部”系统同延边“无产阶级革命造反大军”因为《延边日报》的接管问题发生武斗，已造成伤亡，规模很可能还会进一步扩大。州委三次派人到双方做工作，要求他们派出代表协商解决，均未成功。现在他们不信任州委，州委无法进行工作，事态发展又十分严重，急请中央文革给双方来电话或电报，制止冲突。"},{"type":"paragraph","text":"[2]总理，指周恩来。"},{"type":"paragraph","text":"[3]毛远新，毛泽东的侄子，当时是“黑龙江省红色造反者革命委员会”的负责人。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":1,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":275,"page_end":275},"tags":[{"name":"毛泽东","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e284ed00b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
