script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"玻利维亚重申维护不干涉原则  布里佐拉说巴西应遵循古巴道路消灭美国剥削  巴西报纸揭露美国施加压力要挟巴西放弃不干涉的立场","authors":[],"dates":[{"year":1962,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"玻利维亚重申维护不干涉原则"},{"type":"paragraph","text":"布里佐拉说巴西应遵循古巴道路消灭美国剥削"},{"type":"paragraph","text":"巴西报纸揭露美国施加压力要挟巴西放弃不干涉的立场"},{"type":"paragraph","text":"据新华社30日讯　拉巴斯消息：玻利维亚外交部28日发表声明说，玻利维亚除了将奉行它在最近美洲国家组织华盛顿会议上遵循的路线外，还将继续执行这个政府在埃斯特角外长会议上的路线。"},{"type":"paragraph","text":"大家知道，在埃斯特角会议上，玻利维亚政府曾经申明它坚持自决权和不干涉原则，拒绝同古巴政府绝交。"},{"type":"paragraph","text":"据新华社28日讯　拉巴斯消息：玻利维亚外交部长何塞·费尔曼·贝拉德27日就古巴局势发表一项公报说，玻利维亚继续忠于各国人民自决和不干涉原则。"},{"type":"paragraph","text":"前一天，玻利维亚众议院通过一项决议，重申玻利维亚忠于上述原则。决议还说，玻利维亚“对美国政府没有同美洲国家组织协商就采取反对古巴的措施表示遗憾”。"},{"type":"paragraph","text":"据新华社里约热内卢电"},{"type":"paragraph","text":"巴西南里约格朗德州州长布里佐拉24日晚上通过里约热内卢电台和电视台发表讲话说，美国加于美洲国家组织的关于支持美国封锁古巴的决议“是同我们有深刻分歧的”。他说，“巴西人民的意志是：不许任何人触动古巴”。"},{"type":"paragraph","text":"布里佐拉透露，巴西政府曾经指示它的驻美洲国家组织大使佩纳·马里纽不支持任何对古巴的暴力措施。他说，尽管佩纳·马里纽在表决决议草案的某些部分时弃了权，但是，实际情况是，他没有执行政府的指示。"},{"type":"paragraph","text":"他说，巴西必须遵循古巴的道路，把帝国主义的企业收归国有，以消灭美国剥削。"},{"type":"paragraph","text":"布里佐拉还谴责美国占据古巴的关塔那摩。他说，美国如果对古巴使用暴力的话，“我相信革命者们都将贡献出自己的生命，而美国在拉丁美洲将是毫无保障的。”"},{"type":"paragraph","text":"新华社30日讯　里约热内卢消息：巴西报纸《公报》28日刊登的一篇文章揭露，美国政府威胁要削减巴西咖啡的进口额，企图借以迫使巴西改变它在古巴问题上采取的维护不干涉和自决权原则的立场。文章说，美国还可能以停止“援助”来对巴西施加压力。"},{"type":"paragraph","text":"这家报纸还说，巴西南里约格朗德州州长布里佐拉最近发表的支持古巴人民和反对美国对古巴实行封锁的演说，引起美国统治集团的强烈不满。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f55ba3de7f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
