政府赠送两只大熊猫","authors":["卢劲","李海堂","陶文革"],"dates":[{"year":1999,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吴仪在太平洋地区经济理事会年会上说"},{"type":"paragraph","text":"积极稳步推进市场开放"},{"type":"paragraph","text":"吴仪代表中央政府向香港特区政府赠送两只大熊猫"},{"type":"paragraph","text":"据新华社香港5月17日电 （记者陶文革、卢劲）国务委员吴仪在今天开幕的太平洋地区经济理事会第三十二届年会上说，在经济全球化迅速发展的形势下，所有国家和地区相互开放市场是必然的潮流；同时，由于各国经济发展的不平衡，市场开放只能从实际出发，积极而又稳步地推进。"},{"type":"paragraph","text":"吴仪在年会的欢迎宴会上发表讲话时说，一年多来，亚洲经济笼罩在金融危机的阴影之中。在国际社会的关心和支持下，有关国家的政府和人民经过种种努力正在摆脱危机、走出困境。她表示相信，经过这场劫难，解决了存在的问题，亚洲经济的基础会更加坚实，发展前景将更加光明。"},{"type":"paragraph","text":"吴仪指出，根据中国的经验，必须在保持社会稳定的前提下，加快改革，扩大开放，促进发展。她说，最近中国在电信、金融、保险、商贸、旅游等领域的开放又迈出了重要步伐。今后中国仍将积极创造条件，继续推进全方位的对外开放。"},{"type":"paragraph","text":"她还强调，中国加入世界贸易组织“态度是积极的，立场是不变的”，但中国不会为了加入世贸而牺牲国家的根本利益。"},{"type":"paragraph","text":"她说：“我希望任何国家和工商界人士，不能对中国加入世贸的要价过高。否则，不仅不利于中国经济的稳定和发展，也不利于经济全球化的进程。”"},{"type":"paragraph","text":"上午，香港特别行政区行政长官董建华在年会开幕式上作基调发言。"},{"type":"paragraph","text":"为期6天的太平洋地区经济理事会本届年会主题为“太平洋地区下个世纪面临的挑战”，本地区许多政界和经济界知名人士与会。"},{"type":"paragraph","text":"据新华社香港5月17日电（记者李海堂）香港海洋公园大熊猫园今天下午正式开园。国务委员吴仪、香港特区行政长官董建华等为大熊猫园开幕剪彩。"},{"type":"paragraph","text":"吴仪代表中央政府正式向香港特区政府赠送大熊猫“安安”和“佳佳”，她希望这对“国宝”能给香港同胞带来快乐。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66889ef90f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
