art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"北加里曼丹人民武装在战斗中成长沙捞越出现“毛主席是咱们心中的红太阳”大字报","authors":[],"parts":[{"type":"paragraph","text":"北加里曼丹人民自从一九六二年发动武装起义反对美英帝国主义的新殖民主义工具“马来西亚”以来，一直高举争取民族独立和解放的旗帜，坚持武装斗争，不断取得胜利。"},{"type":"paragraph","text":"最近几个月来，北加里曼丹人民武装主动出击，使敌人惊慌不安。今年六月间，人民武装在沙捞越第二省伏击一支“马来西亚”傀儡集团的巡逻队。“马来西亚”的“陆军发言人”惊呼，这次伏击战组织得很好。人民武装目前在南部第一、第二和第三省特别活跃，曾经一度袭击沙捞越首府古晋的一个警察署。"},{"type":"paragraph","text":"由于印度尼西亚法西斯军人政权同拉赫曼傀儡集团勾结，妄图联合扑灭北加里曼丹人民武装的火焰，北加里曼丹人民武装给予印尼反动派以应得的惩罚。七月二十日，他们配合印尼人民武装，打了一场漂亮仗，在袭击山口羊的印尼空军机场中，当场打死打伤印尼空军官兵数十人，缴获武器弹药和其它军用物资四百多箱，然后从容撤退。这个机场是印尼和“马来西亚”反动派设在边境地区的联合镇压北加里曼丹人民的一个重要据点。"},{"type":"paragraph","text":"沙捞越人民在斗争中无限热爱毛主席。在第三省省会诗巫七月间出现了热情歌颂“毛主席是咱们心中的红太阳”的大字报。北加里曼丹人民武装不断成长壮大，目前，游击队不仅能够打仗，并且深入农村动员群众、组织群众。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8147f651c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
