"title":"教育部关于中小学民办教师转为公办教师后工龄计算问题的答复（摘录）","dates":[{"year":1977,"month":11,"day":25}],"is_range_date":false,"authors":["广东省教育局","教育部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 322","tags":[{"name":"工龄","type":"主题/事件"},{"name":"公办教师","type":"主题/事件"},{"name":"民办教师","type":"主题/事件"}],"parts":[{"type":"title","text":"教育部关于中小学民办教师转为公办教师后工龄计算问题的答复（摘录）"},{"type":"subtitle","text":"(一九七七年十一月二十五日)"},{"type":"paragraph","text":"广东省教育局："},{"type":"paragraph","text":"……关于中小学民办教师转为公办教师后工龄计算问题，仍照国务院……(国文办字377号)的第二条，即“各级学校的教师、职员和工人，解放后在两个以上私立或民办学校的连续工作时间，凡是经过一定手续调动的，应当计算为连续工龄”的规定执行。国务院人事局（57）国人事字第906号和一九五六年二月二十三日国务院人事局人事字第431号文件均不能作为计算民办教师工龄的依据。"},{"type":"paragraph","text":"(摘自〔77〕教计字477号文件)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3b03f4080"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
