tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想照亮了东方人民的道路伊拉克军官和政府官员热情赞扬我国建设成就","authors":[],"parts":[{"type":"paragraph","text":"据新华社巴格达25日电 伊拉克的许多高级军官和政府高级官员继续参观在这里举行的中国经济建设成就展览会。他们都盛赞中国工农业的巨大成就，并表示要为加强中伊两国人民的友谊而努力。"},{"type":"paragraph","text":"伊拉克作战副参谋长、国防部作战部部长法德里·齐亚·马哈茂德准将等三十多名军官24日在中国大使馆副武官宋文中少校的陪同下参观了展览会，并观看了中国影片“欢庆十年”。伊拉克军官赞扬中国的建设成就，还特别称赞他们在电影中看到的训练有素的中国人民解放军。马哈茂德准将在留言簿上写道，“我喜欢展出的重型机器、消费品和精密仪器。所有这一切都表明人民中国在工农业和技术方面达到了很高的水平，同时这还表明中国人民为提高他们的水平所作的巨大努力”。纳伊夫·艾哈迈德准将写道，“我所看到的工农业产品和建筑器材无可争辩地证明了中国人民在各方面所取得的进步，并确实证明，东方各国人民的能力并不比西方各国人民的能力要差。我祝贺伟大的中国人民取得成就和进步，并祝中国和伊拉克两国人民的友谊万古长青。”"},{"type":"paragraph","text":"土地改革部总监穆卡拉姆·塔拉巴尼在参观后写道，“我亲眼看到（中国）在社会、政治和经济生活各方面所取得的辉煌成就。所有这一切表明，当人们获得彻底解放以后，他就能够创造一切物质和文化财富……尽管有种种障碍，但是毛泽东思想正在发扬光大，它照亮了东方被压迫人民的道路。我们的人民非常珍视中国人民的友谊，并为加强这种有利于人类的友谊和巩固世界和平而努力。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce477eeb16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
