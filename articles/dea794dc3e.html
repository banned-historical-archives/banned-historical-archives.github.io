" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河北省农村在社会主义教育中发生许多自杀事件","authors":[],"dates":[{"year":1957,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"河北省农村在社会主义教育中发生许多自杀事件","type":"title"},{"text":"新华社保定12日讯  河北省各地农村在整风和社会主义教育中，发生许多自杀事件。据不完全统计，五十三个县发生一百零五起，死九十五人。据七十九起自杀事件统计，有地主、富农、反革命分子四十五人；坏分子五人；顽伪人员一人；富裕中农四人；中、贫农十九人；军属二人；村、社干部三人。","type":"paragraph"},{"text":"从六十四起自杀事件分析，有三种原因：","type":"paragraph"},{"text":"一、畏罪自杀的十二起。蓟县王家堡地主王友维，被群众揭发出藏匿枪支，吸食毒品、辱污玩弄妇女等等事实后，于8月4日晚服毒自杀。","type":"paragraph"},{"text":"二、在社会主义教育中对党的政策宣传不够深透，使一些有问题的人，摸不着底，恐慌自杀的三十八起。如蓟县城关品杨宾（平分时贫农团主席），曾在1947年敌人扫荡蓟县时给地、富要回一部分被分的财物，开展辩论后极为恐慌，于8月25日自杀。宣化县东坊子村贫农郝凤林，因在7月份说过缺粮，向社要过粮，辩论后表现恐慌，于9月16日晚上吊自杀。","type":"paragraph"},{"text":"三、由于斗争方法简单生硬，甚至采用打、拉等办法，使被斗对象感到无路可走，造成自杀的十四起。承德县何家乡程景恕，因造谣“今年闰八月，八路要垮台了”而被斗，斗争中被群众打了一顿。会后乡支书又用生硬的态度要他写反省，于9月2日上吊自杀。玉田县存庄乡富农郭金祥（社员），因说社不好而被痛打，并令其继续交代，与9月10日晚自杀。","type":"paragraph"},{"text":"省委已发出“关于农村社会主义教育运动中防止自杀事件的通报”。","type":"paragraph"},{"text":"（谷克东编自省委的农村基层整风情况）","type":"paragraph"},{"text":"新华通讯社编：《内部参考》，第2332期，1957年10月14日.","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dea794dc3e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
