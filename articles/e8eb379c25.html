script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在开展反对资产阶级自由化斗争中  吉林省委加强党员干部正面教育","authors":["吴恒权"],"dates":[{"year":1987,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在开展反对资产阶级自由化斗争中"},{"type":"paragraph","text":"吉林省委加强党员干部正面教育"},{"type":"paragraph","text":"本报讯　记者吴恒权报道：反对资产阶级自由化的斗争开展以来，中共吉林省委根据党中央的部署，积极主动地加强对全省党员、机关干部进行正面教育，提高了党员、干部对反对资产阶级自由化斗争的性质和深远意义的认识，增强了坚持四项基本原则的自觉性。"},{"type":"paragraph","text":"吉林省委认为，在反对资产阶级自由化的斗争中，加强对党员、机关干部的正面教育，就要有计划、有步骤地组织广大党员和机关干部，特别是县以上的领导干部认真学习马克思主义基本理论，学习党的路线和政策。"},{"type":"paragraph","text":"在对党员和机关干部进行正面教育中，吉林省委要求全省县以上的领导干部，重新认真学习党的十一届三中全会以来党中央，特别是邓小平同志代表中央常委集体关于坚持四项基本原则，反对资产阶级自由化的一系列重要论述，进一步统一认识，明确反对资产阶级自由化的性质和意义。在学习中，广大党员和机关干部要通过对否定四项基本原则的错误言论的分析、批评，解决根本政治原则和政治方向问题。与此同时，省委有关部门分期分批地组织全省干部继续深入学习关于改革、开放、搞活的有关理论和政策。通过学习和实践，使广大干部尤其是领导干部进一步发扬艰苦奋斗，勤俭建国，多作贡献，严守纪律的优良传统。"},{"type":"paragraph","text":"今年2月初，吉林省委宣传部根据省委对党员、机关干部进行正面教育的安排，分别议出了学习的专题和思考题，列出必读书目，编写了学习材料。"},{"type":"paragraph","text":"目前，省委宣传部、省教育委员会联合编印了四万多字的党中央和中央领导同志关于坚持四项基本原则、反对资产阶级自由化重要论述的学习材料三万多册。省委宣传部还编写了十一万多字的《四项基本原则是立国治国之本》一书，为党员和干部的学习提供了方便。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吉林文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8eb379c25"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
