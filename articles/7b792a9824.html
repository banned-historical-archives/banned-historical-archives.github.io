script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持用毛泽东思想教育改造知识分子驻南开大学工人、解放军宣传队认识到如果对知识分子只团结使用，而忽视了帮助教育，就不利于他们的改造，因而也就不能真正地团结他们","authors":[],"dates":[{"year":1969,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社天津二日电　天津市驻南开大学工人、解放军毛泽东思想宣传队，认真学习“九大”光辉文献，在进一步落实毛主席的知识分子政策的过程中，对广大知识分子既大胆地团结、使用，又坚持不懈地用毛泽东思想对他们进行再教育，帮助他们肃清叛徒、内奸、工贼刘少奇修正主义教育路线的流毒，克服知识分子的动摇性和革命不彻底性，逐步树立起无产阶级世界观。这样，这个学校的广大知识分子在斗、批、改运动中既能心情舒畅地发挥革命的积极性，又能注意认真改造自己的世界观，不断促进思想革命化。"},{"type":"paragraph","text":"驻南开大学工人、解放军毛泽东思想宣传队坚决执行毛主席关于“无产阶级文化大革命的斗、批、改阶段，要认真注意政策”的指示，认真落实党的知识分子政策，使这个学校包括教授、讲师在内的百分之九十五以上的知识分子，都在斗、批、改的革命群众运动中发挥了积极作用。在这种大好形势下，宣传队进一步学习了毛主席有关知识分子的论述，大家深刻地认识到:就知识分子的多数人来说，“用无产阶级世界观完全代替资产阶级世界观，那就还相差很远。”如果对他们只团结使用，而忽视了帮助教育，就不利于他们的改造，因而也就不能真正地团结他们。因此，驻校宣传队坚持不懈地用毛泽东思想教育、改造这些知识分子，正确贯彻毛主席的知识分子政策。"},{"type":"paragraph","text":"在对知识分子进行再教育的过程中，驻南开大学宣传队从实践中深刻地认识到，许多知识分子长期脱离无产阶级政治、脱离工农兵群众、脱离三大革命斗争的实践，这是他们革命不彻底和容易动摇的一个重要原因。宣传队便利用一切机会，组织全校广大知识分子到工农兵中去，到三大革命斗争的实践中去。最近，他们组成几十支教育革命小分队深入到工厂、农村和解放军连队，让知识分子到工农兵群众中去接受教育、改造和锻炼，收到了很好的效果。"},{"type":"paragraph","text":"驻校宣传队在实践中体会到，帮助知识分子克服动摇性和革命的不彻底性，要狠抓世界观的改造，从根本上提高他们的毛泽东思想觉悟。要带领广大知识分子在斗争中活学活用毛泽东思想，坚持深入持久地开展革命大批判，肃清刘少奇反革命修正主义思想的流毒。前不久，宣传队针对部分师生的活思想，组织他们活学活用毛主席的“老三篇”等光辉著作，以毛泽东思想为武器狠批刘少奇“读书做官论”的翻版“读书无用论”，提高了革命师生为革命读书的思想觉悟。他们在深入工厂、农村和解放军连队进行教育革命的调查时，一方面虚心接受工农兵的再教育，一方面积极探索社会主义大学如何办，决心为教育战线的斗、批、改贡献自己的力量。"},{"type":"paragraph","text":"驻南开大学工人、解放军宣传队遵照毛主席关于“要认真总结经验”的教导，很注意引导广大知识分子不断总结改造思想的点滴经验，从中找出克服自己的摇摆性和革命不彻底性的规律性东西。他们经常组织革命师生召开活学活用毛泽东思想讲用会，开展谈心活动，斗私批修，总结经验。许多革命师生深有体会地说:总结经验的过程，就是活学活用毛泽东思想的过程。经常总结经验，斗私批修，就能够明确方向，坚定信心，少走弯路，沿着毛主席的革命路线奋勇前进。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b792a9824"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
