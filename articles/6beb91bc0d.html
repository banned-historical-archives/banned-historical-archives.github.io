tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把对“四人帮”的仇恨化作刻苦练兵的动力","authors":[],"parts":[{"type":"paragraph","text":"本报讯 南京部队某部“上甘岭一等功臣连”干部战士，把对“四人帮”的刻骨仇恨化作刻苦练兵的强大动力，严格训练，严格要求，练兵场上出现一片热气腾腾的景象。"},{"type":"paragraph","text":"华国锋同志任中共中央主席、中央军委主席和粉碎王张江姚反党集团篡党夺权阴谋的特大喜讯传到这个连以后，干部战士无不欢欣鼓舞，人心振奋。他们结合连队在革命战争年代里跟随伟大领袖毛主席南征北战的光荣历史，愤怒揭发批判“四人帮”破坏部队建设，妄图把我军变成他们复辟资本主义的工具的滔天罪行，进一步认清了我军在巩固无产阶级专政中的地位和作用，激发了大家为反侵略、防复辟，保卫以华国锋主席为首的党中央而苦练杀敌本领的革命热情。在学习与批判中，党支部认真总结了按毛主席的无产阶级建军路线抓好军事训练的经验，坚持无产阶级政治挂帅，批判“四人帮”散布的种种谬论，克服那种一抓军事就是单纯军事观点的思想障碍，重新制订了提高连队军政素质的具体措施，掀起练兵热潮。在上甘岭战斗中荣立集体一等功的炊事班，顶着风沙坚持苦练野炊本领，并且每天抽出两个同志参加班排训练，多练几手杀敌本领。"},{"type":"paragraph","text":"全连同志自觉从实战要求出发，努力练出实战本领。一天晚上，连队突然接到上级命令，要他们在两小时内赶到某地执行战备演练任务。接到命令后，全连只用八分钟就迅速出发，提前二十分钟赶到目的地。到达后，上级命令他们立即追歼逃跑的残“敌”。干部战士发扬连续作战的精神，强行军十余里，赶到逃“敌”之前设置伏击，圆满完成了任务，受到了上级的通报表扬。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6beb91bc0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
