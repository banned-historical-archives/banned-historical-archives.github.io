art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"贯彻毛泽东文艺方向塑造工农兵英雄形象参加演出的工农兵和专业人员说；我们的每个节目；都是向反党反社会主义黑线开火的子弹！","authors":[],"parts":[{"type":"paragraph","text":"席著作，并且普遍学习了《解放军报》最近发表的《高举毛泽东思想伟大红旗，积极参加社会主义文化大革命》、《千万不要忘记阶级斗争》两篇社论和《评“三家村”》等文章，通过学习，提高了政治觉悟，进一步懂得了艺术必须为无产阶级政治服务，为阶级斗争服务的道理。他们说：“我们的每一个节目，都是向反党反社会主义黑线开火的子弹！”许多戏曲演员也带着坚决捣毁反党黑线的战斗热情，将在这次音乐会上大唱革命歌曲。这届音乐会共将演出十个专场，每个专场都有鲜明主题。其中包括有毛主席诗词演唱，英雄赞歌，学大庆学大寨，人民战争胜利万岁，革命现代戏曲演唱等。在这十个专场演出的近二百个节目中，有一百三十个节目是工农兵群众和上海音乐舞蹈工作者的新作；一部分是上届“上海之春”音乐会中演出的受到广大群众欢迎并通过进一步加工的优秀节目。此外，还吸收了外地的部分优秀节目。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22328817ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
