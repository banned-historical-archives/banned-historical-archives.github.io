art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作就是真理中国人民在共产党和毛主席领导下取得巨大成就","authors":[],"parts":[{"type":"paragraph","text":"正在我国访问的桑给巴尔非洲设拉子党工人部代表团团长阿里·姆达霍马·姆林达十四日在上海对新华社记者说，毛泽东是一位伟大、英明的领袖。每一个想了解真理的人都应该读毛泽东主席的书，听毛泽东主席的话。毛泽东主席著作就是真理。"},{"type":"paragraph","text":"他说：“我喜欢阅读毛泽东主席的著作，因为毛泽东主席的著作是真理。我读了以后，得到了鼓舞。”"},{"type":"paragraph","text":"姆林达谈到了他在访问中国期间，看到中国人民在中国共产党和毛泽东主席的领导下所取得的巨大成就。他说：“通过这次访问，我看到了中国是真正贯彻自力更生方针的国家。今天世界上新独立的国家想站住脚跟，就要以中国为榜样，采取自力更生方针”。他说：“无论在工厂或农村，中国人民都在勤奋地工作着。他们的工作不是为了个人生活，也不是为了奖金或者当模范，而是为了建设他们的国家，为了他们的国家不再受帝国主义欺侮，而这要归结于中国共产党和毛泽东主席坚强正确的领导”。"},{"type":"paragraph","text":"他赞扬中国对非洲人民真诚无私的援助。他说：“中国人民和非洲人民是合作一致的，中国给非洲的援助，是说话算话，说了就做，这种援助是看得到的”。"},{"type":"paragraph","text":"在谈到当前国际形势时，他说，一切被帝国主义压迫和剥削的民族和人民应该象毛泽东主席所指出的那样，结成最广泛的统一战线来对付美帝国主义的侵略。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"545d1ed1f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
