"authors":[],"dates":[{"year":1949,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席电复傅作义"},{"type":"paragraph","text":"反动的国民党文武官员，只要翻然悔悟，确有事实表现，均表欢迎。"},{"type":"paragraph","text":"【新华社北平二日电】毛泽东主席对于傅作义四月一日通电发出复电。电文称：傅作义将军："},{"type":"paragraph","text":"四月一日通电读悉。南京国民党反动政府发动反革命内战的政策，是完全错误的。数年来中国人民由于这种反革命内战所受的浩大灾难，这个政府必需负责。但是执行这个政策的国民党反动政府的文武官员，只要他们认清是非，翻然悔悟，出于真心实意，确有事实表现，因而有利于人民解放事业之推进，有利于用和平方法解决国内问题者，不问何人，我们均表欢迎。北平问题的和平解决，贵将军与有劳绩。贵将军复愿于今后站在人民方面，参加新民主主义的建设事业，我们认为这是很好的，这是应当欢迎的。"},{"type":"paragraph","text":"毛泽东　一九四九年四月二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70ccf17373"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
