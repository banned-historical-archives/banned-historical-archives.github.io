script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德国州议会选举爆冷门　极右翼政党获合法议席","authors":["杨华升"],"dates":[{"year":1998,"month":4,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德国州议会选举爆冷门"},{"type":"paragraph","text":"极右翼政党获合法议席"},{"type":"paragraph","text":"据新华社波恩4月26日电（记者杨华升）德国东部萨克森—安哈尔特州（萨安州）议会选举26日爆出冷门，以仇外和排外为主要竞选纲领的右翼极端主义政党德意志人民联盟（德人联）夺得13％的选票，与社会民主党（社民党）、基督教民主联盟（基民盟）和民主社会主义党（民社党）同时获得合法进入该州议会的资格。"},{"type":"paragraph","text":"根据德国两大全国性电视台在选举结束后5个小时宣布的抽样测算结果，德国社民党获得36％的选票，击败基民盟成为该州议会第一大党；基民盟得票率为22％，约比上次下降1／3。"},{"type":"paragraph","text":"萨安州议会选举被此间舆论看作是将于今年9月27日举行的全国大选的一次“民意测验”。萨安州是原民主德国的一部分，面积2.5万平方公里，人口约300万，是德国统一之后东部5个州中经济发展最差、新纳粹势力较猖獗的地区之一。"},{"type":"paragraph","text":"社民党总理候选人、下萨克森州总理格哈德·施罗德认为，萨安州的选举结果实际上是科尔在德国东部被罢选，是科尔在政治上的失败。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"807ecf6c92"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
