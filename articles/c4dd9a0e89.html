" crossorigin="">{"props":{"pageProps":{"books":[{"id":"d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d","name":"斯大林选集（诸夏怀斯社2017年5月）","internal":false,"official":false,"type":"pdf","author":"斯大林，诸夏怀斯社2017年5月","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d.pdf"],"article":{"title":"同王明等谈中共在抗日战争中的路线方针","alias":"","parts":[{"type":"paragraph","text":"同王明等谈中共在抗日战争中的路线方针"},{"type":"paragraph","text":"（1937年11月11日）"},{"type":"paragraph","text":"在克里姆林宫同斯大林谈话。"},{"type":"paragraph","text":"季米特洛夫、王明、康生、王稼祥。"},{"type":"paragraph","text":"斯大林：」共产国际书记处的决定已经过时了。"},{"type":"paragraph","text":"“这就是人们坐在办公室里冥思苦想的结果！”"},{"type":"paragraph","text":"“要用一切手段加强对托派的斗争”（决定中的话）。“这是不够的。托派必须追捕、枪毙、消灭。他们是全世界的奸细、最恶毒的法西斯走狗！\""},{"type":"paragraph","text":"（1）对于中国共产党现在基本的问题是：融入全民族的浪潮并取得领导地位。"},{"type":"paragraph","text":"（2）现在主要的问题是战争，而不是土地革命、没收土地。"},{"type":"paragraph","text":"（税收必须有利于战争。）"},{"type":"paragraph","text":"中国共产党人从一个极端走到另一个极端一一以前是没收一切，现在是什么都不没收。"},{"type":"paragraph","text":"（3）口号就是一个："},{"type":"paragraph","text":"“争取中国人民独立的胜利战争。”"},{"type":"paragraph","text":"“争取自由中国，反对日本侵略者。”"},{"type":"paragraph","text":"（4）中国人怎样打击外部敌人一一这是决定性的问题。当这一问题结束时再提出怎样互相打的问题！"},{"type":"paragraph","text":"①）王明时任中共驻共产国际代表，此次谈话后即回延安，却完全违背斯大林的谈话精神，竭力推行所谓“一切通过统一战线，一切服从统一战线”的右倾投降主义路线。一一本书编者注"},{"type":"paragraph","text":"（5）现在中国人所处的条件比我们在1918-1920年时的条件更加有利。"},{"type":"paragraph","text":"当时在我们这里，国家在社会革命方面是被分割的。"},{"type":"paragraph","text":"在中国，民族革命、争取民族独立和自由，把国家和人民团结起来了。"},{"type":"paragraph","text":"（6）中国有巨大的人力资源，我认为蒋介石说中国将取得胜利是对的。只是必须在已经打响的战争中坚持下来。"},{"type":"paragraph","text":"（7）因此必须创建自己的军事工业。"},{"type":"paragraph","text":"生产飞机。飞机容易生产，但是运输很困难。"},{"type":"paragraph","text":"（我们会提供制造飞机的材料！）必须创立飞机制造业。"},{"type":"paragraph","text":"还要生产坦克。"},{"type":"paragraph","text":"（制造坦克的材料我们能够提供！）"},{"type":"paragraph","text":"如果中国有自己的军事工业，谁都不可能战胜它。"},{"type":"paragraph","text":"（8）八路军必须要有30个师，而不是3个师。"},{"type":"paragraph","text":"这可以通过建立后备团的形式做到，以便补充现有的师。"},{"type":"paragraph","text":"必须建立新的团队。要日夜进行军事训练。"},{"type":"paragraph","text":"（9）在八路军还没有炮兵的时候，它的策略不该是直接进攻，而应该是骚扰敌人，把他们引进自己一方并在后方打击他们。"},{"type":"paragraph","text":"必须炸毁日本军队的交通线、铁路桥。"},{"type":"paragraph","text":"（10）不管英国还是美国，它们都不愿意中国胜利。出于它们帝国主义的利益，它们害怕中国胜利。"},{"type":"paragraph","text":"中国的胜利将影响印度、印度支那等。"},{"type":"paragraph","text":"它们希望日本由于打仗而削弱，但是不允许中国站起来。"},{"type":"paragraph","text":"它们希望有日本这条拴起来的狗吓唬中国，就像过去吓唬沙皇俄国那样，但是不希望这条狗有独吞猎物的可能。"},{"type":"paragraph","text":"（11）对于中国的党代表大会来说，讨论理论问题是不适宜的。理论问题可以往后放放，等到战争结束以后。"},{"type":"paragraph","text":"谈论中国发展的非资本主义道路，现在比起过去，机会更少了。"},{"type":"paragraph","text":"（资本主义在中国不是止在发展吗！）"},{"type":"paragraph","text":"（12）建立民族革命联盟的问题迟迟未决。"},{"type":"paragraph","text":"（13）在武汉的八路军和党的合适的代表。"},{"type":"paragraph","text":"选自新编《斯大林全集》《季米特洛夫日记选编》2002年版第59一61页"},{"type":"paragraph","text":"档案附卷七第269一271页"},{"type":"paragraph","text":"1）指当时中国共产党准备召开的第七次代表大会。一一本书编者注"}],"authors":["斯大林"],"dates":[{"year":1937,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":2709,"page_end":2711},"tags":[{"name":"王明","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4dd9a0e89"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
