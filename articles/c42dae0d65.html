art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见将离任的尼泊尔驻华大使"},{"type":"paragraph","text":"国务院副总理邓小平二十日上午会见了即将离任的尼泊尔驻中国大使拉纳和夫人。"},{"type":"paragraph","text":"会见时在座的有外交部副部长韩念龙，副司长梁枫、高建中。"},{"type":"paragraph","text":"廖承志副委员长会见日本青年朋友"},{"type":"paragraph","text":"人大常委会副委员长、中日友协会长廖承志二十日上午会见了以深谷隆司为团长的日本世界青少年交流协会访华团。"},{"type":"paragraph","text":"廖承志副委员长同日本青年朋友们进行了亲切友好的谈话。他希望中日两国青年共同努力，为进一步发展中日友好事业贡献力量。"},{"type":"paragraph","text":"教育部决定放宽报考研究生的年龄限制"},{"type":"paragraph","text":"为了广开才路，早出人才，快出人才，教育部最近给各地发出通知，决定放宽报考研究生的年龄限制，凡是一九三八年三月一日以后出生的都可以报名。"},{"type":"paragraph","text":"教育部的通知还决定，凡是一九六四、一九六五年入学后因故中断学习而分配工作的研究生，重新报考一九七八年研究生时，在贯彻择优录取原则的前提下，经德智体全面衡量，在考生条件相同时，可以优先录取。他们入学后经学校考核，如果基础课合格，可以免修，直接进入专业课学习或进行科学研究工作，学习年限也可以适当缩短。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"廖承志","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c42dae0d65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
