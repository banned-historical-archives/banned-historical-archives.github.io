art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”的“青”与“亲”","authors":["高军〖HH/换行〗DW：五一○二八部队"],"parts":[{"type":"paragraph","text":"“青”与“亲”两个字，声音不同，意思也截然不一样。然而，“四人帮”却围绕这两个字，大搞阴谋诡计，蓄意破坏毛主席规定的革命事业接班人的五项条件和老中青三结合的原则，大搞资产阶级帮派体系。他们的手法有三："},{"type":"paragraph","text":"一个是：以“亲”代“青”。“四人帮”打着“扶植青年干部”、“培养接班人”的旗号，大造“唯青是优”的反革命舆论。他们的恶毒用心，是以此排挤、打击革命老干部。其实，对于真正优秀的“青”，他们也并不喜欢，也是千方百计地排斥、打击的。他们喜欢的不是“青”而是“亲”。请看，他们搞到关键性岗位上的那些“青”，哪一个屁股上没有“四人帮”的“亲”字的纹章。可见，“四人帮”搞的，原来是“唯亲是优”。"},{"type":"paragraph","text":"另一个是：树“亲”拉“青”。“四人帮”给那些粗腿抱得紧、小报告打得勤、马屁拍得响的人，戴上“造反派”、“新生力量”、“接班人的样板”等等桂冠，加官晋爵，破格提拔，美其名为“爱护青年”。他们树“亲”是为了拉“青”，就是妄图拉拢腐蚀一些青年干部，成为追随他们的亲信、死党，拴在他们搞复辟的破车上，充当他们篡党夺权的马前卒。"},{"type":"paragraph","text":"再一个是：以“青”保“亲”。广大党员和群众对于“四人帮”树的张铁生那样的“青”，理所当然地表示坚决反对。在这种情况下，“四人帮”为了保护他们的亲信和死党，就给人扣上什么“反对老中青三结合”、“看不起儿童团”、“压抑新生力量”等等大帽子。他们以“青”保“亲”，让他们的亲信和死党在“青”的保护色下，继续为他们篡党夺权效劳。“四人帮”篡党夺权的罪恶阴谋破产了，他们演的这一出丑剧也只好收场了。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"889335c738"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
