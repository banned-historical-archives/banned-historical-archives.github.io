ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"和邓小平在长沙的一次谈话（节录）","alias":"","parts":[{"type":"paragraph","text":"和邓小平在长沙的一次谈话（节录）"},{"type":"paragraph","text":"（1974年11月12日）毛泽东（以下简称毛）：你开了一个钢铁公司！邓小平（以下简称邓）：主席也知道了。毛：好！邓：我实在忍不住了，不止一次了。毛：我赞成你！邓：她在政治局搞了七八次了。毛：强加于人哪，我也是不高兴的。她们都不高兴。"},{"type":"paragraph","text":"邓：我主要是感觉政治局的生活不正常。最后我到她那里去讲了一下，钢铁公司对钢铁公司。"},{"type":"paragraph","text":"毛：这个好。"},{"type":"paragraph","text":"邓：最近关于我的工作的决定，主席已经讲了，不应再提什么意见了，但是看来责任是太重了一点。"},{"type":"paragraph","text":"毛：没办法呢，只好担起来喽。[1]指江青。[2]指当时在谈话现场的王海荣和唐闻生。"}],"authors":["毛泽东"],"dates":[{"year":1974,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":516,"page_end":516},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e83c314ae4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
