ates":[{"year":1962,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级报纸承认"},{"type":"paragraph","text":"美国在美洲外长会议上遭到挫败"},{"type":"paragraph","text":"据新华社6日讯　纽约消息：美国资产阶级报纸承认，美国在最近结束的美洲国家外长会议上没有能够达到它预定的反古巴目的。《纽约先驱论坛报》说，“在埃斯特角举行的美洲国家会议根本并不像腊斯克所说的那样是美国的有普遍影响的胜利。拉丁美洲最大的国家主张不要对古巴现有的秩序采取积极的步骤。"},{"type":"paragraph","text":"《纽约时报》说，在华盛顿有许多人，包括某些外交官，批评埃斯特角会议是“失策的”。报纸说，美国不得不放低自己的要求，即使那样，也没有能够防止发生严重分裂的窘境。报纸说，会议“造成了美国和最大的拉丁美洲国家之间的公开分裂。”"},{"type":"paragraph","text":"这家报纸强调指出，“合起来代表着拉丁美洲政治舆论的一个重要部分的阿根廷、巴西、智利、墨西哥、玻利维亚和厄瓜多尔，都拒绝屈从于美国。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc5309ea51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
