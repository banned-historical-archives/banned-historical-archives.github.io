hors":["清华大学","钱伟长"],"dates":[{"year":1957,"month":6,"day":21}],"is_range_date":false,"parts":[{"text":"“我不清楚章伯钧在六月六日会上的讲话”","type":"title"},{"text":"清华大学钱伟长","type":"authors"},{"text":"(转载大字报：6月21日热O班汽O班同学访钱伟长)","type":"subtitle"},{"text":"(编者按：当日北京日报刊登了右派分子陶大镛吐露六月六日会议的情况)","type":"paragraph"},{"text":"为了要证实今日北京日报刊载的陶大镛的谈话，我们于21日晚，访问了钱伟长先生。","type":"paragraph"},{"text":"钱先生说：他可以给我们讲讲事情的经过，他说：六月四日，为了科学规划事，他和曾昭抡、史良等多人会见章伯钧，在会上大家也谈到了整风运动的情况，钱先生也谈了谈我校整风的情况(如毕业设计问题，“弱者”问题等等)，同时钱先生建议章伯钧，请示中央统战部，以后整风运动中，民盟应该怎么办？那天就是谈这些。","type":"paragraph"},{"text":"会后钱先生接到章伯钧通知，请他去，钱先生说他以为是中央统战部有了指示，六月六日他在史良陪同下去见章伯钧。他们的谈话是在政协文化俱乐部，到会的还有曾昭抡、费孝通、陶大镛等多人，在会上谈的是整风问题，章伯钧讲些什么话，钱先生说他不大清楚，因为中途他小便一次，他说事情经过就是这样。","type":"paragraph"},{"text":"我们又问，现在我校有很多同学看了北京日报今日所载之消息后说钱先生是两面派，您是否可以讲一次话。他说这几天不准备和同学们讲话，因为话越讲越多。至于有人说他是右派，他对这不承认。他说他的立场一贯是稳的，他对共产党是忠诚的，他和章伯钧毫无关系。没有个人欲望，若有个人之欲望他就不搞行政工作，而去科学院搞研究工作了，他说他每日晚上工作到二、三点钟，全是为了社会主义事业。","type":"paragraph"},{"text":"我们又问起几位同学访问钱先生的事情，钱先生说他们是干部，我对他们要求是高的，我做了付校长应该对他们提出一些意见。","type":"paragraph"}],"comments":[],"origin":"《捍卫高等教育和科学事业的社会主义方向》，清华大学新清华编辑委员会编，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55e0604248"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
