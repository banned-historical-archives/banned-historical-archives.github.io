art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底挖掉修正主义的老根","authors":["战士陈水吉李光兴"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“在我国社会主义革命取得基本胜利以后，社会上还有一部分人梦想恢复资本主义制度，他们要从各个方面向工人阶级进行斗争，包括思想方面的斗争。”中国赫鲁晓夫就是这种梦想恢复资本主义制度，从各个方面向工人阶级进行斗争的总代表。长期以来，他竭力推销一心为私的资产阶级世界观，宣扬什么“不是大公无私，而是大公有私”等等，就是妄图用“私字经”来腐蚀我们的灵魂，使我们无产阶级革命战士变成资产阶级思想的俘虏，以便他在我国实现资本主义复辟。真是狼心狗肺，罪大恶极！"},{"type":"paragraph","text":"我们现在是社会主义社会。林副主席说：“在这种情况下，要想巩固这个制度，那就必须要破除资产阶级和其他剥削阶级的旧文化，破除用各种各样形式所表现出来的维护私有制、恢复私有制的旧意识形态。”这就要求我们大破“私”字。不把“私”字彻底铲除，社会主义制度就不能巩固，无产阶级专政就不能巩固。我们就是要坚决和“私”字斗争到底，天天斗，事事斗。我们一定永远忠于毛主席，永远高举毛泽东思想伟大红旗，彻底挖掉修正主义的老根，把“私”字扫地出门，让中国赫鲁晓夫的“私字经”见鬼去吧！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c23882e10f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
