:["北京大学","叶于泩"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"整风而外，可以考虑的几点建议","type":"title"},{"text":"北京大学叶于泩","type":"authors"},{"text":"（叶于泩：北京大学哲学系学生）","type":"subtitle"},{"text":"宪法规定的言论、出版、集会、结社的自由完全实现了吗？","type":"paragraph"},{"text":"宪法规定的人民的选举权真正实现了吗？今后三害俱全的干部会不会仍旧有稳坐“钩鱼台”的可能？如果宪法规定的不可以实现，那么什么法制不可以违犯？如果法律、制度没有实现的可靠保证，那末要它何用？如果群众不能对领导实行严格的监督，那么领导的正确性又用什么来保证。","type":"paragraph"},{"text":"一切的最终保证在于实行彻底的社会主义民主。","type":"paragraph"},{"text":"1．允许私人办报刊、出版社，取消出版的检查制度，开放禁书。","type":"paragraph"},{"text":"2．实现集会、结社自由。让现存的各民主党派与共产党有同等的活动机会，同等的竞赛机会。","type":"paragraph"},{"text":"3．改造人民代表大会，让拥护公有制的各种意见在会上充分争鸣；国家大事的决定，要在公开讨论中形成。","type":"paragraph"},{"text":"4．严格的、具体的规定共产党在政权机关中的地位作用。","type":"paragraph"},{"text":"5．改进选举制度、让选举人自己提名、推荐，候选人名额应超过应选名额，让选举人有选举的余地。","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d387729103"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
