,"dates":[{"year":1967,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京30日电　莫斯科消息:苏修统治集团中一名重要人物叶戈雷契夫，突然被解除他担任的莫斯科市委第一书记的职务，由苏共中央政治局候补委员格里申接替叶戈雷契夫，担任苏共莫斯科市委员会第一书记。"},{"type":"paragraph","text":"据透露的消息说，解除叶戈雷契夫职务时苏共莫斯科市委会全体会议，只进行了十五分钟，会议议程也只有一个项目，即格里申接替叶戈雷契夫的职务。格里申在接任这一新职务时，他原来担任的金苏工会中央理事会主席职务还未来得及找人接替。这表明苏修统治集团内部勾心斗角日益尖锐。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"494c2fce65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
