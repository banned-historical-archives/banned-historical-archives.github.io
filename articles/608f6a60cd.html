方百计破坏亚非团结","authors":[],"dates":[{"year":1963,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京21日电】　巴基斯坦参加中国国庆观礼团团长、巴基斯坦著名公众领袖巴沙尼今天在这里向中国首都新闻界发表谈话，呼吁亚非各国政府和人民毫不迟疑地立即促进第二次亚非会议的召开， 以进一步加强亚非各国人民团结起来反对帝国主义的斗争。"},{"type":"paragraph","text":"他说，巴基斯坦阿尤布总统和印度尼西亚苏加诺总统在今年六月发表的一项联合公报中，已经表示主张在最近的将来召开第二次亚非会议。我希望所有第一次亚非会议的参加国和接受万隆会议精神的国家，都能够很快作出响应，促使第二次亚非会议的迅速召开。"},{"type":"paragraph","text":"他指出，在当前帝国主义正千方百计地破坏亚非团结的时候，第二次亚非会议的召开具有更加迫切的重要意义。他希望亚非各国能够在这次会议上团结一致地、真诚地、和平地讨论亚非国家间的问题，以巩固亚非国家在反帝斗争中已经取得的成就，进一步加强亚非各国的团结。"},{"type":"paragraph","text":"这位著名的巴基斯坦公众领袖表示，他希望亚非各国政府首脑能够就召开第二次亚非会议的问题很快进行接触，以加快召开这次会议的准备工作。他还表示，当他见到亚非各国的领导人时，将向他们表达自己关于召开这次会议的观点。"},{"type":"paragraph","text":"巴沙尼指出，美帝国主义和其他帝国主义千方百计地竭力破坏亚非团结，其目的是为了压迫和剥削亚非国家人民。他认为美帝国主义采取的政策同一些老牌帝国主义比较起来是“旧瓶装新酒”、“换汤不换药”。他说，美帝国主义正采取各种办法来压迫其他国家，在其他国家建立政治与经济的控制，镇压进步运动，取消民主，而代之以独裁统治。"},{"type":"paragraph","text":"他说，亚洲、非洲、拉丁美洲千百万人民遭受苦难的根源，就在于帝国主义的压迫。他说，我们应该团结起来，为在亚非拉地区铲除帝国主义的压迫而斗争。"},{"type":"paragraph","text":"他强调指出，只有被压迫民族与被压迫人民团结起来进行斗争，才能铲除帝国主义的压迫。也只有铲除帝国主义的压迫，才能建立真正的持久和平。"},{"type":"paragraph","text":"他的谈话中热情地赞颂了巴中两人民的友谊和中国的社会主义建设成就。他说，巴中两国人民的友谊是建立在促进两国人民的幸福、繁荣和两国的建设事业的基础之上的，也是为了促进世界和平，实现亚非拉各国人民间的团结，以及为了在亚非拉地区铲除殖民主义的。"},{"type":"paragraph","text":"巴沙尼谈到中国的建设成就时说， 中国的日益强大将增强世界其他地区被压迫人民的斗争，同时世界其他地区被压迫人民的斗争也支持了中国人民的斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"608f6a60cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
