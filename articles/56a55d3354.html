<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华沙盛会欢迎匈党政代表团哥穆尔卡说西方“裁军计划”重点是收集军事情报　卡达尔强调无产阶级专政和反对修正主义的斗争","authors":[],"dates":[{"year":1960,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社华沙19日电】　华沙各界人民19日晚上在华沙文化科学宫举行盛大集会，欢迎匈牙利党政代表团。参加群众大会的有3000多人。"},{"type":"paragraph","text":"波兰党政领导人哥穆尔卡、萨瓦茨基、西伦凯维兹等参加了大会。"},{"type":"paragraph","text":"波兰统一工人党中央委员会第一书记哥穆尔卡和匈牙利党政代表团团长、匈牙利社会主义工人党中央委员会第一书记卡达尔都在会上讲了话。"},{"type":"paragraph","text":"哥穆尔卡在讲话中谈到了波兰和匈牙利两国之间友好关系的巨大发展。他说，我们与匈牙利党政代表团的会谈表明，双方对目前国际形势和巩固和平的共同任务的估价是完全一致的。匈牙利党政代表团这次访问，将加强我们之间的友谊。"},{"type":"paragraph","text":"他在谈到目前国际形势时说，由于世界上和平力量的增长，特别是由于社会主义阵营力量的增长，由于苏联和所有社会主义国家的始终如一的和平外交政策，从一定时期以来在国际关系中有了缓和。"},{"type":"paragraph","text":"哥穆尔卡在谈到西方国家提出的“裁军计划”时说，它的重点不是裁军，而是收集军事情报。在他们的计划中，丝毫不提取消设在外国领土上的军事基地的事，也丝毫不谈禁止试验核武器的问题。哥穆尔卡还强调说，北大西洋公约组织欧洲部队总司令诺斯塔德将军在十国裁军委员会会议以前所宣布的建立北大西洋公约组织联合核武装部队的计划，绝不是希望裁军的表现。不容置疑，这一计划包括用原子武器武装西德国防军。"},{"type":"paragraph","text":"哥穆尔卡说，舆论愈来愈清楚地懂得，提出在裁军之前进行监督的问题，实际上就是拒绝裁军。"},{"type":"paragraph","text":"哥穆尔卡还指出，在欧洲，在那些不愿实现裁军的势力中，占主导地位的是西德军国主义者和复仇主义者。"},{"type":"paragraph","text":"在谈到最高级会议时，哥穆尔卡说，全世界对即将举行的政府首脑会议寄予希望，期待对和平事业说来最迫切的问题能够得到具体解决。除了裁军外，最迫切的问题首先是缔结对德和约、特别是解决西柏林问题。哥穆尔卡说，最高级会议应该本着和平的利益解决西柏林问题，在当前情势下，最好的办法莫过于变西柏林为自由城市。"},{"type":"paragraph","text":"哥穆尔卡最后强调指出了发展波兰同所有社会主义国家的友好和合作、加强社会主义阵营的团结的重要性。"},{"type":"paragraph","text":"卡达尔在讲话中谈到了匈牙利人民共和国的发展。他强调说，平定1956年匈牙利反革命叛乱的经验证明，没有工人阶级革命政党的领导作用，就不可能保持工人阶级的政权，就不可能建设社会主义。没有无产阶级专政就不可能建设社会主义，没有力量坚强的国家政权就不可能保卫自己的胜利果实。卡达尔还说，目前匈牙利正进行着两方面的斗争——反对教条主义和修正主义，而主要火力是反对修正主义。他说，社会主义的民主制度只给支持社会主义的力量以自由，而不能给社会主义的敌人以自由。"},{"type":"paragraph","text":"卡达尔谴责了西德政府执行的“冷战”政策。他说，重新武装德国军国主义的政策和行动、经常训练法西斯流亡分子集团、前参战分子在\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1960\\03\\603m0402AA.JPG\"\u003e旗号下举行集会、煽动复仇、反对奥得—尼斯分界线——所有这一切说明，西德军国主义者并没有放弃侵略计划。正是因为如此，尽管从地理上讲奥得-尼斯河分界线距离匈牙利人民共和国很远，但是，它对我们来说是神圣不可侵犯的和不可动摇的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56a55d3354"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
