元","authors":[],"dates":[{"year":1951,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市合作社联合社办理之第二季度四月份重点配售，已于四月廿五日至五月二日全部办竣。此次经评定享受重点配售的共四十四个基层社，社员总人数为十万余人。配售内容为食米三十市斤，合作煤球五十市斤(郊区社员改配豆油一市斤半)。此次申请配售食米者四十三社，申请配售合作煤球者四十一社，申请配售豆油者二社，总计配售金额为二十亿五千五百七十八余万元，为社员减除中间剥削达一亿七千余万元。"},{"type":"paragraph","text":"由于此次享受配售合作社较三月份增加了二十六个社，而时间又太匆促，总共办理申请日期仅五天，故一般配售量均减少；与三月份相较，食米减少三·三九%，煤球减少一三·九%。如人民轮船公司因为社员分散无法统计，故食米全部未配。诸翟乡合作社因来不及统计，直延至五月二日才办理申购手续，所以影响了完成原有计划的配售数量。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f329b26016"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
