script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加强党的领导的重大决策鼓舞了全国人民五中全会公报深得党心民心为刘少奇同志彻底平反打碎了广大党员、干部的精神枷锁","authors":[],"dates":[{"year":1980,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京三月二日电　党的十一届五中全会公报，极大地鼓舞着正在社会主义现代化建设道路上奋勇前进的全国人民。两天来，各地广大共产党员和人民群众满怀喜悦的心情，认真学习全会公报，热烈赞扬和拥护全会对于加强和改善党的领导所采取的一系列重大措施。"},{"type":"paragraph","text":"二月二十九日十一届五中全会胜利闭幕。当晚八时，从首都北京到上海、天津和全国其他城市，成千上万人围坐在收音机旁或电视机前，聚精会神地收听全会公报。沈阳部队许多年过半百的领导干部，戴着老花眼镜坐在电视机前，边听边作记录。他们听完了电视广播，又听录音。大家欢欣鼓舞，齐声叫好:拥护，拥护，坚决拥护。"},{"type":"paragraph","text":"在两天来的学习、座谈会上，广大党员和人民群众对于这次全会着重讨论和解决关于坚持党的领导和改善党的领导的问题，感到特别兴奋。大家认为，要实现四化，关键在于坚持党的领导。全会作出了加强和改善党的领导的一系列重大决策，我们的四化建设就有了根本保证。全国三千八百万党员搞好了，党的领导加强了，就能带动九亿人民在前进的道路上无往而不胜。一些地方的党委在学习公报时，已经初步拟订了搞好党的建设的措施，有的提出要进一步搞好各级领导班子的建设，有的决定以《中国共产党章程》(修改草案)和《关于党内政治生活的若干准则》为教材，在今年内普遍轮训共产党员。"},{"type":"paragraph","text":"广大共产党员和人民群众热烈拥护这次全会增选出的中央政治局常委和新选出的总书记、书记处成员。许多人说，一些年富力强，有领导经验，在全国人民中有威望的领导同志，充实到中央领导机关，这反映了我们党人才辈出。有的同志说:由这样一批实干家组成党中央书记处，我们感到有信心，有希望。"},{"type":"paragraph","text":"五中全会为刘少奇同志平反昭雪，党心大快，人心大快，各地广大军民表示坚决拥护。人们说，刘少奇同志的冤案，是党的历史上最大的冤案，五中全会作出了为刘少奇同志彻底平反的历史性决议，恢复了刘少奇同志作为伟大的马克思主义者和无产阶级革命家、党和国家的主要领导人之一的名誉，这表明我们党严肃认真，光明磊落，表明我们党是坚持实事求是原则的马克思主义革命党。这不但不会损害党的威信，反而证明我们党坚强有力，充满信心，更能提高党的威望。刘少奇同志的家乡——湖南省宁乡县县委干部在讨论中说，党的五中全会决定为刘少奇同志平反，全党高兴，全国人民高兴，宁乡人民更高兴。县里已经订购四万多册刘少奇同志的著作《论党》和《论共产党员的修养》，准备发到各社队和车间班组学习。黑龙江省委直属机关的许多党员、干部在讨论中说，“四人帮”诬蔑学习《论共产党员的修养》的党员是修正主义的党员，抓生产就是生产党。这些都是加在广大党员、干部头上的精神枷锁。现在，五中全会为刘少奇同志平反，就从根本上打碎了这些枷锁，这将激发起广大干部、群众的积极性，同心同德搞好四化。"},{"type":"paragraph","text":"各地群众对全会作出的免除或提请免除四位犯有严重错误的同志所担负的党和国家的领导职务，建议全国人民代表大会在宪法中取消“四大”等项决议和决定，表示衷心拥护。他们说，全会决定的各项重大措施，对于推动全国安定团结、生动活泼的政治局面的进一步发展，对于加快社会主义现代化建设的步伐，都将起到极大的推动作用。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f2eec8168"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
