<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于计划供应粮食和取缔粮食投机的宣传要点","authors":[],"dates":[{"year":1953,"month":10,"day":29}],"is_range_date":false,"parts":[{"text":"中共中央关于计划供应粮食和取缔粮食投机的宣传要点","type":"title"},{"text":"中央人民政府为了保证人民生活和国家建设所需要的粮食，决定一面用合理的价格向农民实行计划收购粮食，一面对城市人民和农村缺粮人民实行计划供应粮食，并且严格管理经营粮食的工商业，取缔粮食投机。这些办法关系到国家和全体人民的根本利益。我们应该拥护政府实行这些办法。","type":"paragraph"},{"text":"（一）什么是粮食的计划供应？","type":"subtitle"},{"text":"这就是由国家来保证城市里的每个人和农村里的每个缺粮户都能够不受奸商剥削，而按照国家规定的价格和适当的分量，买到各人所必需的粮食。但是不准任何人多买粮食，不准任何人囤积居奇和投机倒把。","type":"paragraph"},{"text":"（二）怎样取缔粮食投机活动？","type":"subtitle"},{"text":"主要的办法就是严格管理经营粮食的工商业：（1）禁止跨行跨业经营粮食，不是粮食业（例如油盐业、杂货铺等）就不准买卖粮食和从事粮食加工，同时实行粮食业的专营专业。（2）凡是粮食加工工厂，都由粮食部门委托加工，或者介绍给合法的消费户按照国家规定的程度从事加工，加工厂不得自购原料和自销成品。（3）粮食零售商，由粮食部门在严格监督之下委托代销粮食。（4）饭馆、面食店，只准购买所需要的粮食，禁止囤积投机。（5）成立粮食检查机关，和粮食工商业的全体职工以及全体城乡人民合作，监督粮食业资本家遵守政府法令。（6）对国营的、地方国营的、公私合营的、合作社经营的粮食加工厂和粮店，亦由当地粮食部门统一领导和管理。","type":"paragraph"},{"text":"（三）为什么要实行粮食计划供应和取缔粮食投机？","type":"subtitle"},{"text":"因为要保障人民生活，保障国家建设。全国的粮食并不缺，虽然1953年有一部分农村遭灾，但是在大多数地方还是好年景，粮食总产量在3200多亿斤以上，全国全年每人平均可以摊到500多斤，和1952年一样多，比1951年、1950年和解放前的产量都高得多，所以粮食是够吃的。不过国家建设发展，城市需要的粮食增加了，农民生活改善，经济作物区扩大，乡村需要的粮食也增加了，所以粮食必须实行统一的调剂。但是丧心病狂、唯利是图的奸商，却利用这个时机，实行抢购和囤积粮食，并且散布谣言，扰乱人心，投机倒把，破坏国家购粮、售粮工作。","type":"paragraph"},{"text":"因此，为了保障人民生活，保障国家的建设，不让奸商造成粮食恐慌和物价波动，必须坚决实行粮食的计划供应和取缔粮食投机。","type":"paragraph"},{"text":"苏联在经济建设时期也长期地实行着配给制，粮食的配给制直到1947年才取消。这是因为粮食生产的增加不容易赶上经济建设时期粮食需要的增加。由此可见，为了有计划地进行经济建设，保证全国人人有饭吃，保证粮价和物价稳定，有计划地供应粮食是完全必要的。","type":"paragraph"},{"text":"（四）实行粮食计划供应和取缔粮食投机活动，对城乡人民有无不利？","type":"subtitle"},{"text":"这样做对城乡人民是有利无害的，因为第一，可以保证大家都吃到每人所需要的合理价格的粮食；第二，可以保证粮价和一般物价平稳。","type":"paragraph"},{"text":"当然开始时也会感到一些不便：第一，暂时有一些不习惯；第二，为了便于全国统一供应，粗粮细粮不能不有所搭配，必须大家都吃得粗一点，并且有什么粮食吃什么粮食。但是为了国家建设，为了使现在全国城乡人民都有饭吃，为了使将来全国人民都能过幸福的生活，大家应该吃得粗一点，应该实行节约。而且吃粗米粗面杂粮，对营养是有好处的。","type":"paragraph"},{"text":"取缔粮食投机只对危害人民的奸商不利。所有从事加工和代销的私营粮食商人，只要服从国家的法令和监督，都可以得到合理的加工费和代销费。","type":"paragraph"},{"text":"（五）国家有力量实行粮食的计划供应和取缔粮食投机","type":"subtitle"},{"text":"（1）全国粮食是够吃的，只要不让奸商投机倒把，而由国家统一供应，不但够吃够用，而且还会有积余。（2）国家现在有充分的存粮，并且从1953年起，决定向农民实行计划收购粮食，私商不能再向农民购粮，所以粮食供应完全有保证。（3）国家在全国各城市、各集镇、各工矿区都有相当多的国营粮店和供销合作社。再委托一部分私商代售粮食，所以粮食的供应工作也可以有保证。","type":"paragraph"},{"text":"人民政府向来是说到做到的。任何不法分子如果敢于破坏国家法令，继续囤积和倒卖粮食，或者在代卖粮食时投机舞弊，一定要受到严厉的制裁。","type":"paragraph"},{"text":"（六）市民群众的任务","type":"subtitle"},{"text":"第一，全体市民都要拥护政府办法，说服有不满情绪的人，并且人人都做到不囤积粮食，不兼做粮食买卖，不向不法商人卖出或买进粮食。还要协助政府，监视和检举不法分子的粮食投机活动。","type":"paragraph"},{"text":"私营粮食工商业的职工店员，应该做好政府委托的粮食加工和代销工作，并且帮助对资本家实行监督。其他私营工商业的职工店员，也应该帮助政府制止不法分子非法买卖粮食囤积粮食的行为。","type":"paragraph"},{"text":"私营粮食工商业者应该服从政府法令，在国营粮食公司的领导和监督下做好加工和代销业务。","type":"paragraph"},{"text":"第二，全体市民都要节约粮食消费，制止浪费，拥护吃粗米粗面杂粮、有什么粮食吃什么粮食的办法。节约既可减少自己开支，又可减少国家供应，帮助国家建设，一举两得。只要每人每天节约一两粮食，全国一年就可以节约一百多亿斤。毛主席和中央人民政府已经号召全国党政军民节约粮食，吃粗米粗面杂粮，各机关、学校、解放军、志愿军都已实行，全国人民应该一致响应这个号召。","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部办公厅、中央档案馆编研部编：《中国共产党宣传工作文献选编》（1949－1956）北京：学习出版社，2009.","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ece7e838d2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
