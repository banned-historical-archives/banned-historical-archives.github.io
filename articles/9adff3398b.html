<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2147","name":"在彭德怀同志追悼会上邓小平同志致悼词","author":"邓小平","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"在彭德怀同志追悼会上邓小平同志致悼词","dates":[{"year":1978,"month":12,"day":25}],"is_range_date":false,"authors":["邓小平"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共浙江省委党校党史教研室, “文化大革命”时期资料选辑(重要事件的平反和拨乱反正), 86-87","tags":[{"name":"邓小平","type":"主题/事件"},{"name":"彭德怀","type":"主题/事件"}],"parts":[{"type":"title","text":"在彭德怀同志追悼会上邓小平同志致悼词"},{"type":"paragraph","text":"新华社北京十二月二十四日电 中共中央副主席邓小平同志在彭德怀同志追悼会上的悼词，全文如下："},{"type":"paragraph","text":"同志们："},{"type":"paragraph","text":"我们怀着十分沉痛的心情，为彭德怀同志举行追悼会。"},{"type":"paragraph","text":"彭德怀同志是我党的优秀党员、老一辈无产阶级革命家，是平江起义的主要领导者、红三军团的创立者，是我们党、国家和军队的杰出领导人，曾担任过党政军的许多重要职务。他在林彪、“四人帮”的迫害下，于一九七四年十一月二十九日在北京逝世，终年七十六岁。今天，华国锋同志为首的党中央本着实事求是的精神，认真落实党的政策，给彭德怀同志做出了全面的、公正的评价，为他恢复了名誉。"},{"type":"paragraph","text":"彭德怀同志在近半个世纪的革命斗争中，在伟大导师毛泽东同志的领导下，南征北战，历尽艰险，为中国革命战争的胜利，为人民军队的成长壮大，为保卫和建设社会主义祖国，作出了卓越的贡献。他的一生，是革命的一生，是忠于党、忠于人民的一生。他的不幸逝世，是我党我军的重大损失。"},{"type":"paragraph","text":"彭德怀同志具有很强的组织领导能力和军事指挥才能。第二次国内革命战争时期，他曾担任中国工农红军师长、军长、三军团总指挥，中共中央军事委员会副主席；长征后期担任过以毛泽东同志为政治委员的陕甘支队司令员；到达陕北以后，担任过红军前敌总指挥。抗日战争时期，担任八路军副总司令，中共中央北方局代理书记。解放战争时期，担任中国人民解放军副总司令、第一野战军司令员兼政治委员。中华人民共和国成立以后，担任中共中央西北局第一书记，西北军政委员会主席，中共中央军事委员会副主席，中央人民政府革命军事委员会副主席，中国人民志愿军司令员兼政治委员，国防委员会副主席，国务院副总理兼国防部长；一九六五年，担任建设大三线的副总指挥。他曾任党的第六届、第七届、第八届中央委员会委员、政治局委员。他还当选为第一届和第二届全国人民代表大会代表。"},{"type":"paragraph","text":"彭德怀同志是湖南省湘潭县人，出身贫寒，当过苦工。大革命时期，他曾在国民革命军任营长、团长。大革命失败后，他坚持反对新军阀，秘密组织士兵委员会，支持工会、农会和学生会的革命活动。在严重的白色恐怖下，彭德怀同志毅然决然地选择了马克思列宁主义的道路，于一九二八年四月光荣加入中国共产党。"},{"type":"paragraph","text":"一九二八年七月，在中国革命处于低潮的时刻，彭德怀同志领导了著名的平江起义，编为红军第五军，坚持湘鄂赣的游击战争，开辟了湘鄂赣根据地。到同年十一月间，红五军主力奔赴井冈山。从此，他在毛泽东同志领导下，坚持井冈山斗争，参加反“围剿”作战和震惊中外的二万五千里长征，指挥过许多重要的战役和战斗。长征到达陕北后，他还参与指挥了红军胜利的东征。"},{"type":"paragraph","text":"抗日战争时期，彭德怀同志协助朱德同志率领八路军，挺进敌后，在艰苦的岁月里，开辟了华北广大的抗日根据地，为赢得伟大的抗日战争的胜利，作出了卓越贡献。"},{"type":"paragraph","text":"解放战争时期，彭德怀同志坚决贯彻执行毛泽东同志的伟大战略决策，在敌我力量悬殊、十分艰难的条件下，指挥部队驰骋疆场，英勇奋战，消灭了蒋胡军，解放了大西北。"},{"type":"paragraph","text":"新中国刚成立，美帝国主义把侵略朝鲜的战火烧到鸭绿江边。彭德怀同志当此严重时刻，坚决执行党中央、毛泽东同志的指示，肩负中国人民的重托，担任中国人民志愿军司令员，率领中华英雄儿女，抗美援朝，保家卫国，同朝鲜人民和人民军并肩战斗，直至胜利，光荣地履行了无产阶级国际主义义务。彭德怀同志回国后，致力于我国国防建设和经济建设事业，不辞辛苦，成绩卓著。"},{"type":"paragraph","text":"彭德怀同志热爱党，热爱人民，忠诚于伟大的无产阶级革命事业。他作战勇敢，耿直刚正，廉洁奉公，严于律己，关心群众，从不考虑个人得失。他不怕困难，勇挑重担，对革命工作勤勤恳恳，极端负责。"},{"type":"paragraph","text":"彭德怀同志是国内和国际著名的军事家和政治家，一直受到广大党员和群众的怀念和爱戴。"},{"type":"paragraph","text":"我们要学习彭德怀同志的革命精神和高贵品质，高举毛泽东思想的伟大旗帜，在华国锋同志为首的党中央领导下，团结一致，同心同德，在马列主义、毛泽东思想指导下，解放思想，开动机器，为实现新时期的总任务，为加快建设社会主义的现代化强国而奋勇前进！"},{"type":"paragraph","text":"彭德怀同志永垂朽！"},{"type":"subtitle","text":"（原载1978年12月25日《解放军报》）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9adff3398b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
