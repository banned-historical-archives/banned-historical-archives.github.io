script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉扎克总理离京到沪受到热烈欢迎离京时，我国领导人华国锋、吴德、阿沛·阿旺晋美等和首都群众数千人到机场热烈欢送　李先念副总理等陪同贵宾到沪访问　市革委会领导同志和两千多名群众到机场热烈欢迎　上海市革委会设宴热烈欢迎马来西亚贵宾","authors":[],"dates":[{"year":1974,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年六月一日电　拉扎克总理和随同来访的其他马来西亚贵宾由国务院副总理李先念、外交部副部长韩念龙陪同，今天上午乘专机离开北京前往上海进行访问。"},{"type":"paragraph","text":"我国领导人华国锋、吴德、阿沛·阿旺晋美，外交部长姬鹏飞，外贸部长李强，国防部副部长肖劲光，以及人大常委会委员，政府部门、北京市革命委员会、对外友协、中国伊斯兰教协会负责人和首都群众数千人，前往机场热烈欢送马来西亚贵宾。"},{"type":"paragraph","text":"在飘扬着马来西亚国旗和中国国旗的首都机场上，举行了隆重的欢送仪式。乐队奏马来西亚国歌和中国国歌。拉扎克总理由我国领导人陪同检阅了中国人民解放军陆、海、空三军仪仗队。欢送的群众在机场上载歌载舞，高呼口号，热烈祝贺中马两国正式建立外交关系，欢呼两国关系进入了一个崭新的阶段。"},{"type":"paragraph","text":"陪同拉扎克总理前往上海访问的还有外交部亚洲司副司长程瑞声、礼宾司副司长朱传贤等。"},{"type":"paragraph","text":"各国驻中国外交使节也到机场送行。"},{"type":"paragraph","text":"新华社上海一九七四年六月一日讯　马来西亚总理拉扎克以及随同来访的其他马来西亚贵宾，由国务院副总理李先念、外交部副部长韩念龙陪同，今天上午乘专机从北京到达上海进行访问。"},{"type":"paragraph","text":"上海市革命委员会副主任马天水、徐景贤、冯国柱和两千多名群众，前往机场热烈欢迎马来西亚贵宾。"},{"type":"paragraph","text":"虹桥机场上飘扬着中马两国国旗。拉扎克总理等马来西亚贵宾走下飞机，马天水副主任等迎上前去，同他们热烈握手，表示欢迎。当马来西亚贵宾来到欢迎队伍面前同群众见面时，人们挥舞花束和彩带，青少年们欢乐起舞，热烈祝贺中国和马来西亚两国政府联合公报的发表，祝贺中马两国友好关系进入一个崭新的阶段。"},{"type":"paragraph","text":"上海市革命委员会今天晚上举行宴会，热烈欢迎拉扎克总理以及其他马来西亚贵宾。李先念副总理，韩念龙副部长，马天水、徐景贤、冯国柱副主任出席了宴会。"},{"type":"paragraph","text":"马天水副主任和拉扎克总理先后在宴会上祝酒。马天水副主任在祝酒时热烈祝贺中马两国政府联合公报的发表，两国外交关系的正式建立。他说，近年来上海人民高兴地接待过来自马来西亚的体育、医学、贸易等方面的代表团。上海港同马来西亚的贸易往来也有了新的增长。我们深信，拉扎克总理的这次访问，必将进一步促进和发展中马两国的友好合作关系。"},{"type":"paragraph","text":"拉扎克总理在祝酒时感谢上海市人民的热情欢迎和款待。他说，上海是马来西亚人民所熟悉的城市。他赞扬勤劳的上海市人民作出的贡献。拉扎克总理说，我对中华人民共和国的访问，将永远留在我的记忆之中，其中也包括在上海期间的美好回忆。"},{"type":"paragraph","text":"宴会后，贵宾们出席了文艺晚会。观看了上海文艺工作者演出的杂技节目。"},{"type":"paragraph","text":"今天到机场欢迎和出席宴会的还有:上海市革命委员会、中国人民解放军驻上海部队和上海各有关方面负责人李彬山、陈德学、胡开德、陈阿大、王景、沈芬娣、翁品芳、陆济川。"},{"type":"paragraph","text":"拉扎克总理等贵宾到达上海后，由李先念副总理，韩念龙副部长，马天水、徐景贤、冯国柱副主任等陪同，参观了上海工业展览会。下午，贵宾们来到上海市少年宫参观时，受到在这里庆祝自己节日的三千多名少年儿童的热烈欢迎。拉扎克总理等贵宾观看了孩子们进行的文艺、体育和科技等丰富多彩的游园活动。随后，贵宾们游览了上海市容，登上上海大厦，俯瞰了上海全景。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\06\\7462010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e马来西亚总理拉扎克等贵宾，由国务院副总理李先念，外交部副部长韩念龙陪同，于昨天乘专机到达上海进行访问。上海市革命委员会副主任马天水、徐景贤、冯国柱等，以及二千多名群众到机场热烈欢迎。新华社记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"徐景贤","type":"人物"},{"name":"马天水","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b97b72063e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
