{"year":1973,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学习马克思主义批判修正主义"},{"type":"paragraph","text":"中共吉林省延边朝鲜族自治州委员会委员  延吉县东盛公社东盛大队九队党支部书记　黄顺玉"},{"type":"paragraph","text":"党的十大胜利闭幕的喜讯传到祖国边疆的时候，我们那个小山村，一下子欢腾起来。“延边人民热爱毛主席”的歌声，“毛主席万岁”的口号声连成一片，全村男女老幼载歌载舞，热烈欢呼毛主席革命路线的伟大胜利！"},{"type":"paragraph","text":"我们围在收音机旁，一遍又一遍地收听新闻公报、周恩来同志的政治报告、王洪文同志的关于修改党章的报告和大会通过的《中国共产党章程》。十大的文件表达了全党、全军、全国各族人民的心愿。我们坚决拥护党中央永远开除资产阶级野心家、阴谋家、反革命两面派、叛徒、卖国贼林彪的党籍；永远开除林彪反党集团主要成员、国民党反共分子、托派、叛徒、特务、修正主义分子陈伯达的党籍，撤销其党内外一切职务。一致拥护党中央对林彪反党集团其他主要成员的处理和所采取的全部措施。"},{"type":"paragraph","text":"在欢庆胜利的幸福时刻，回顾伟大领袖毛主席领导全党、全军、全国人民从胜利走向胜利的战斗历程，心情非常激动。我们伟大的党是在两个阶级、两条路线的激烈搏斗中发展壮大起来的。我们党的历史就是毛主席的无产阶级革命路线战胜形形色色机会主义路线的历史。我深深地感到，毛主席的革命路线是革命人民的生命线，要革命，就要沿着毛主席的革命路线前进！"},{"type":"paragraph","text":"执行毛主席的革命路线，识别和抵制错误路线，不能光凭朴素的阶级感情，主要的是要有路线斗争觉悟。历次的路线斗争，归根结底就是搞马列主义，还是搞修正主义？要搞马列主义，就得读马列的书和毛主席的书，不学习就没法辨别真假，分清是非，继续革命。咱们贫下中农常说：“打狼没有枪不行，种田没有锄头不行，干革命不学习马列主义、毛泽东思想不行。”二十多年来，尤其是在党的九届二中全会以后，联系党内两条路线斗争和农村三大革命运动的实际，我反复学习了《毛泽东选集》、《共产党宣言》、《哥达纲领批判》、《国家与革命》等著作，越学心里越亮堂。这次党中央又向我们发出了学习马克思主义、列宁主义、毛泽东思想，批判修正主义，批判资产阶级世界观的号召，我决心更加努力学习马列著作和毛主席著作，深入批判林彪的反革命修正主义路线，进一步从我们党的十次路线斗争中吸取历史经验，进一步认识我国社会主义革命时期阶级斗争和两条路线斗争的特点和规律，提高识别真假马克思主义的能力，增强执行毛主席革命路线的自觉性，用实际行动建设边疆、保卫边疆，在十大确定的政治路线的指引下，在以毛主席为首的新的中央委员会的领导下，去夺取更大的胜利！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbdb8ddff1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
