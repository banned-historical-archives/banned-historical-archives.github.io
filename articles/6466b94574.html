"周恩来"],"dates":[{"year":1967,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"周恩来对财贸联委代表的讲话","type":"title"},{"text":"周恩来","type":"authors"},{"text":"(1967年7月1日晚  中南海会议厅;周恩来接见财贸联委、财贸各派代表的讲话)","type":"subtitle"},{"text":"(摘录)","type":"subtitle"},{"text":"听说你们要联合召开庆祝党诞生46周年大会，什么时候开？多少单位？(众：时间未定，有26个单位)好，总共26个。我经常讲过，有对立面不是坏事，不要一听不同意见就紧张，失掉信心。只要不打架，在一些问题上争一争，有什么不好？可以推动事物前进。双方大方向一致的，要求大同，存小异，合了以后，也有矛盾，具体问题可以在内部商量解决。你们为“七一”联合召开大会，这是最好的题目，这是个最值得纪念的日子。中央的三个文件、《红旗》社论，要认真学习、宣传。你们参加会的单位，还可以扩大，小的组织也可以参加。26个，再加几个有什么不好？不要单从人多人少看问题，人多观点不容易统一，人少意见容易坚持，各有短长。你们同意一起开会，我一定去，坐一会也行，不可能时间长，起码一刻钟。我可以为你们借场地。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6466b94574"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
