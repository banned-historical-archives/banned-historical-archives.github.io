script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对修正主义的哲学路线","authors":[],"dates":[{"year":1958,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“哲学研究”1957年第6期发表了吴传启的“修正主义比教条主义更危险”一文，从三个方面批判了修正主义的哲学路线。第一，有些人企图取消马克思主义的党性和阶级性，力图恢复资产阶级唯心主义，把党性和科学性对立起来。在这方面，贺麟是一个代表人物。党内右派分子徐懋庸是这条哲学路线的积极拥护者和宣扬者。第二，有些人利用“继承文化遗产”这个口号来反对马克思主义，企图恢复唯心主义。冯友兰的“一般”、“特殊”论的实质就是如此。张岱年在“道德的阶级性与继承性”一文中极力宣扬超阶级的道德。右派分子朱启贤提出了一个所谓“哲学命题的二重性”的方案，为恢复唯心主义打开方便之门。第三，还有一些人说马克思主义理论体系“不完整”，“马克思主义的世界观残缺不全”等等，企图用唯心主义来“充实”和“补充”马克思主义，也就是恢复唯心主义。这方面最突出的人物就是右派分子朱启贤。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15ff26019a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
