（节录）","authors":[],"dates":[{"year":1954,"month":8,"day":6}],"is_range_date":false,"parts":[{"text":"西昌地委关于宝兴县发生饿死人的报告（节录）","type":"title"},{"text":"宝兴县第四区新兴乡新杨村贫农杨齐氏 30多岁，患脚痛病， 家有一个几岁的小孩。本年3月5日几告断粮， 7日该乡将情况反映到区， 区粮干高焕文将报告关锁未及时处理或向上反映。 乡继有向区作第二次报告， 区委书记安永宁到县汇报工作时才反映到县；但张副县长（分工领导民政工作）也未作出指示和处理。 4月2日， 该乡又第三次向区报告， 区上以救济粮款尚未拨下为由， 叫乡暂以自由借贷方式解决。 最后借到1万元买会粮食， 吃了一顿不解决问题， 因久饿不耐爆食及于4月5日死去。 (p. 2)","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d0c808712"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
