" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"部份灾区人口外流有发展","authors":["“内务部工作简报”编"],"dates":[{"year":1962,"month":4,"day":6}],"is_range_date":false,"parts":[{"text":"部份灾区人口外流有发展","type":"title"},{"text":"“内务部工作简报”编","type":"authors"},{"text":"本报讯    最近，河南、山东、湖北、河北、甘肃等省部分灾区人口外流有发展。据河南省3月上半月不完全的统计，商丘、开封、新多、安阳、南阳、信阳六个专区外流的有三十二万人。开封地区近半个月外出讨饭的即有一万三千多人，比2月份增加两倍多。山东省的德州、聊城、惠民三专区，2月中旬流到收成较好的南部地区的灾民，已由过去的二十万人增加到二十三万人。甘肃省有七十五个县、市发生人口外流情况，已外流一万二千八百多人，比去年12月份增加七千二百多人。贵州、四川省群众流入广西、湖北省、区的也不少。","type":"paragraph"},{"text":"据内务部工作组和一些流入地区反映，最近陇海、津浦铁路沿线，有河南省的商丘、兰考、民权、开封，山东省的德州、惠民，及河北省沧州等地的大批灾民，向安徽宿县专区各县流动。徐州、蚌埠之间的二十七个车站，每天上下车的人，平均有二万至二万五千人，比平时增加四倍。由于灾民的流动量很大，徐州车站每天上不上车的有一万多人，宿县车站仅3月16日一昼夜就有八千八百多人没有上去车。许多灾民买不上票，就强行爬车，商丘车站从3月10日到16日七天内爬车的即达二万一千多人。秩序很乱，经常发生轧死、轧伤人的事故，仅河南境内3月份就发生事故二十多起。","type":"paragraph"},{"text":"目前，灾民流出地区，正在进一步安排生活，加强生产自救工作，减少灾民外流；流入地区也正采取措施，对灾民进行收容遣返工作，对一部分愿意安家落户的，帮助他们解决困难。铁道部门为了减少灾民上下车麻烦和减轻沿线镇负担，组织了直通列车，整批送返。（据“内务部工作简报”编）","type":"paragraph"},{"text":"来源：“内务部工作简报”编，转载于1962年4月6日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2d9b718aa"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
