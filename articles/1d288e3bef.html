rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"增强同走资派作斗争的自觉性","authors":["铁道兵某部制配连党支部"],"parts":[{"type":"paragraph","text":"《人民日报》、《红旗》杂志、《解放军报》“七一”社论传达了毛主席一九六四年关于社教运动的重要批示。毛主席指出：“这些走资本主义道路的领导人，是已经变成或者正在变成吸工人血的资产阶级分子”，“这些人是斗争对象，革命对象”。在批判邓小平、反击右倾翻案风的斗争中，毛主席指出：“搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”毛主席的这些重要指示，深刻揭露了刘少奇、林彪、邓小平一类党内走资派的阶级本质，充分揭示了社会主义时期阶级斗争、路线斗争的特点和规律，是我们反修防修、坚持无产阶级专政下继续革命的指路明灯。"},{"type":"paragraph","text":"推行修正主义路线，是走资派最本质的政治特征。我们同走资派斗，最要紧的是解决路线问题，用马克思主义路线战胜他们反革命的修正主义路线。走资派代表着腐朽没落的资产阶级的利益，是用一条反革命的修正主义路线联系起来的复辟资本主义的政治派别。象刘少奇、林彪、邓小平这类党内走资派，掌握了党和国家很大一部分权力，他们可以利用职权结党营私，拼凑资产阶级司令部，推行反革命的修正主义路线，并蒙蔽一些路线觉悟不高的人跟着他们的修正主义路线跑。事实证明，由党内走资派出马颠覆无产阶级专政，比社会上的资产阶级更厉害得多，危险得多。“走资派还在走”是贯穿整个社会主义历史时期的社会现象，我们决不可因为已经取得的胜利而松懈自己的战斗意志，必须牢固树立同党内资产阶级长期作战的思想。"},{"type":"paragraph","text":"无产阶级文化大革命以来，我们党支部组织干部战士联系阶级斗争和路线斗争实际，认真学习毛主席关于无产阶级专政下继续革命的理论，坚持以阶级斗争为纲，排除林彪资产阶级军事路线的干扰，使连队不断沿着毛主席无产阶级建军路线胜利前进。在反击右倾翻案风的斗争中，党支部又带领全连同志反复学习和领会毛主席关于资产阶级“就在共产党内”的重要指示，分析走资派的本质、特征和产生的阶级根源、思想根源、经济基础，进一步提高了阶级斗争、路线斗争觉悟和识别修正主义的能力。广大干部战士集中火力，深入批邓，以实际行动同邓小平的反革命的修正主义路线对着干，连队涌现出大量的好人好事，掀起了抓革命促战备的高潮，较好地完成了上级交给的各项任务。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d288e3bef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
