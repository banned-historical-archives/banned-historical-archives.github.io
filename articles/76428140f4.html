art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"昔日奴隶娃子今成“脚印专家”","authors":["柴建国"],"parts":[{"type":"paragraph","text":"拉吉幼年是一个贫苦的奴隶娃子，从8岁起就给牧主放牛。1959年平息西藏上层反动集团发动的武装叛乱，实行民主改革后，党送他上了学。1962年拉吉从北京政法干校毕业，志愿来到边防派出所工作。为了维护祖国边疆的安宁，拉吉把从书本上学到的知识用于实践，根据痕迹学的有关原理开始潜心探索脚印的奥秘。他的行囊里经常装着各式各样的鞋子，只要一有时间就把鞋掏出来，在草地上、石子路上捺上印迹，然后趴在地上反复观察。经过多年的潜心钻研，拉吉终于掌握了精深的专业知识，成为有名的“脚印专家”。在无数次的边防巡逻执勤中，拉吉运用自己的聪明才智，做出了特殊贡献。一次，他根据一双脚印和一堆牛粪提供的线索，及时发现了一伙歹徒，并生擒了首恶分子。拉吉入伍以来，多次受到上级嘉奖，先后两次荣立一等功。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76428140f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
