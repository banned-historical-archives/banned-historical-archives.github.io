tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周总理姚文元王国权同志会见日本朋友同黑田寿男、宫崎世民和中岛健藏、宫川寅雄等进行了亲切友好的谈话","authors":[],"parts":[{"type":"paragraph","text":"新华社十五日讯 国务院总理周恩来、中共中央政治局委员姚文元、中日友协副会长王国权今天会见由黑田寿男、宫崎世民率领的日中友好协会（正统）访华代表团和由中岛健藏、宫川寅雄率领的日中文化交流协会代表团，同日本朋友进行了亲切友好的谈话。"},{"type":"paragraph","text":"中岛健藏的夫人中岛京子参加了会见。"},{"type":"paragraph","text":"参加会见的日中友好协会（正统）访华代表团成员有秘书长三好一，团员：岩村三千夫、楢崎富男、穗积七郎、荒哲夫、栗原俊夫、羽根荣一、雨宫礼三、古谷庄一郎、田上光、吉田法晴、赤津益造、田中稔男；"},{"type":"paragraph","text":"日中文化交流协会代表团成员有秘书长白土吾夫，团员：木村伊兵卫、杉村春子、香川峰云、菅野长吉、吉村公三郎、香坂顺一、小山内宏、安藤彦太郎、加藤周一、德间康快、长岛健、下中邦彦、熊井启、三留理男，秘书：佐藤纯子、木村美智子。"},{"type":"paragraph","text":"会见时，有关方面负责人和工作人员张香山、徐明、刘希文、王晓云、肖向前、林波、陈抗、金苏城、李孟竞、周斌、王效贤、叶启滽、段元培、张庶秋、赵春胜在座。"}],"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1aa4e3c7ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
