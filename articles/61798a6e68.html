art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘主席同党和国家其他领导人接见出席军队和地方一些会议的人员","authors":[],"parts":[{"type":"paragraph","text":"被接见的部队同志是：出席全军后勤工作会议、全国干部工作会议、公安部队政工会议、铁道兵政工会议、空军训练工作会议的全体人员，两次击落美帝军用无人驾驶高空侦察机的有功人员和为京汇报演出的战士业余演出队的全体人员。"},{"type":"paragraph","text":"新华社十七日讯 毛泽东主席、刘少奇主席以及党和国家其他领导人周恩来、邓小平、董必武、彭真、陈毅、李富春、贺龙、陈伯达、康生、薄一波、叶剑英、谢富治，今天下午接见了来北京参加一些全国性会议的人员。他们是：出席中国人民解放军全军后勤工作会议、全军干部工作会议，中国人民公安部队政治工作会议，中国人民解放军铁道兵政治工作会议和中国人民解放军空军训练工作会议的全体人员；两次击落美帝国主义军用无人驾驶高空侦察机的有功人员；来北京汇报演出的中国人民解放军战士业余演出队的全体人员；出席中华全国青年联合会第四届委员会第二次会议，中华全国学生第十八届代表会议，全国体育工作会议，以及中国农业银行全国分行行长会议和政治工作会议的全体人员。"},{"type":"paragraph","text":"毛主席、刘主席同党和国家其他领导人接见来北京参加一些全国性会议的人员。图为接见时合影。"},{"type":"paragraph","text":"本报记者 牛嵩林摄RW：毛泽东；主席；接见刘少奇；主席；接见；附图片"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61798a6e68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
