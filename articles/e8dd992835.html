script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠批刘贼“活命哲学”和资产阶级幸福观加强对青年的晚婚教育","authors":[],"dates":[{"year":1970,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"当前，各条战线上抓革命、促生产、促工作、促战备的形势大好。可是，少数青年在这大好形势之下，缺乏继续革命的自觉性，受到资产阶级糖衣炮弹的侵蚀，不是把精力集中在抓革命、促生产上，而是热衷于早谈恋爱早结婚。例如上海自动化仪表一厂，最近作了一个统计:自从去年九月一日开始到目前为止，已有三十七人办理了结婚登记手续，其中就有十三人不符合晚婚条件。又如上海仪表厂个别青年为了达到早婚的目的，不办登记手续，政治影响很坏。更严重的是有的工厂的个别头头，不是以身作则，很好地宣传晚婚，提倡晚婚，带头晚婚，而是带头早婚。"},{"type":"paragraph","text":"我们认为，晚婚还是早婚，决不是什么“生活小事”，而是关系到能否进一步落实毛主席“备战、备荒、为人民”的伟大战略方针的问题。毛主席说:“新中国要为青年们着想，要关怀青年一代的成长。”各级领导必须遵照毛主席的教导，狠抓对青年的晚婚教育，进一步促进青年思想革命化。"},{"type":"paragraph","text":"春节即将来到了，按照旧习惯，春节结婚的总是比较多。所以，当前更要抓紧做好宣传教育工作，大力提倡晚谈恋爱、晚结婚，形成革命的新风气。同时要在恋爱、婚姻问题上，开展革命大批判，进一步用毛泽东思想武装起来，彻底批判封建主义、资本主义、修正主义的流毒，肃清大叛徒刘少奇的“活命哲学”以及腐朽的资产阶级“幸福观”的流毒，树立无产阶级革命的人生观，以金训华同志为榜样，“活着就要拼命干，一生献给毛主席”，在新的一年里，作出新的贡献。"},{"type":"paragraph","text":"本报徐汇区工厂第三通讯　组"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8dd992835"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
