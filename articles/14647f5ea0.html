<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国的艺术反映了文化大革命的光辉成果  日本人民热情赞扬我东方红杂技团的精采表演","authors":[],"dates":[{"year":1967,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国的艺术反映了文化大革命的光辉成果"},{"type":"paragraph","text":"日本人民热情赞扬我东方红杂技团的精采表演"},{"type":"paragraph","text":"据新华社讯　据东方通讯社报道：中国东方红杂技团在日本进行的精采表演，受到了广大日本人民的热烈欢迎，他们欢呼中国无产阶级文化大革命的胜利，对伟大领袖毛主席表示了无比的崇敬和爱戴。"},{"type":"paragraph","text":"京都大学教授井上清看了演出后热情地赞扬中国杂技艺术的革命化。他说：“东方红杂技团运用杂技艺术的形式，大力表演工农兵的英雄形象，充分地反映了中国人民响应毛主席的抓革命，促生产，促工作，促战备的号召而迸发出来的冲天干劲，这是把杂技艺术推向一个新阶段的重要改革。这也显示了文化大革命的光辉成果，这是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"日中友好协会（正统）兵库县总部社会活动家郡司和男看了杂技团的表演后极为感动。他说，中国的杂技表演表明，用毛泽东思想武装起来的中国人民是伟大的人民。尽管日共修正主义分子对伟大的毛主席进行了恶毒的攻击，但是，这丝毫不能减弱毛泽东思想的太阳般的光辉，也不能阻挡毛泽东思想在日本人民中间广泛的传播。"},{"type":"paragraph","text":"日中友好协会（正统）兵库县总部社会活动家坂上重夫说：“中国杂技团的表演太好了。我们无限热爱世界人民伟大的领袖毛主席。每当舞台上映出了慈祥的光辉的毛主席的形象时，我就产生一种说不出来的肃然起敬的感情。我们只要按照毛主席的指示办事，就一定会取得斗争的胜利。”"},{"type":"paragraph","text":"大坂日中友好学院院长大塚有章，热烈赞扬中国东方红杂技团的演出。"},{"type":"paragraph","text":"他说：“中国杂技团的表演充满了中国七亿人民的敢于斗争、敢于胜利的英勇气概。”他说，经过无产阶级文化大革命的锻炼发展起来的中国杂技艺术使我们确信，人民群众只要以伟大的毛泽东思想武装起来，就能创造奇迹。"},{"type":"paragraph","text":"在京都，一位七十六岁的老人，在留言簿上写道：“沿着毛主席指出的光辉道路前进，就是胜利。”另一位来自大坂的观众写道：“以歌颂工农兵为主题的高超技艺，好得很。”“中国杂技体现了毛主席文艺为工农兵服务的方针。”"},{"type":"paragraph","text":"京都一位五十二岁的教师在留言中写道：“中国杂技团的精采演出，使人深深感到中国无产阶级文化大革命的伟大。杂技演员那种强有力的、健康的、充满着对毛主席无限敬爱的表演，反映了在毛主席英明领导下的文化大革命的光辉胜利。”一个十九岁的女学生在看完杂技演出后，对中国记者说：“我们以有毛主席这样英明的世界人民的伟大领袖而感到无比幸福。”她还对中国记者说：“请转达日本青年对中国人民的问候，祝愿毛主席万寿无疆！”"},{"type":"paragraph","text":"日中友好协会（正统）京都总部理事长近藤良男说：“七亿中国人民正在毛泽东思想的指引下，展开‘斗私，批修’，为使社会主义中国永不变色而斗争。东方红杂技团的优秀节目，是在毛主席亲自发动和领导下从胜利走向胜利的无产阶级文化大革命中创作出来的，是沿着毛主席的无产阶级文艺路线前进的。中国杂技团的访日公演，一定会给日本人民的革命斗争带来新的鼓舞和力量。”"},{"type":"paragraph","text":"东方红杂技团在名古屋能够公演，是由于日中友好协会（正统）爱知县总部克服了各种困难，在同日共修正主义的阻挠和破坏作顽强斗争中实现的。这个组织的会长、著名物理学者有山兼孝对杂技团团长说，“现在的杂技和以前的大不相同了，看了它，给人增加了很大的力量。”理事长村井泷一热情地说：“东方红杂技团的精采表演，为日中两国人民播下了友谊的种子。”"},{"type":"paragraph","text":"名古屋的一位十八岁的青年工人在留言簿上表达了观众的感想。他写道："},{"type":"paragraph","text":"“精采的演出，表明中国无产阶级文化大革命是破私立公的大革命，这样的革命，是当代马克思列宁主义的顶峰——毛泽东思想的胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14647f5ea0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
