s":[],"dates":[{"year":1963,"month":1}],"is_range_date":false,"parts":[{"text":"林彪关于召开全军政治工作会议的指示","type":"title"},{"text":"[林彪听取萧华会议准备情况的汇报，表示由于身体的原因不能参加会议，遂作口头指示。]","type":"paragraph"},{"text":"要坚持四个第一、三八作风和四好运动，抓住不放，长期抓下去，把全军几百万人的积极性调动起来，抓好就可以转化为物质力量，一个连就等于几个连，几百万人就等于几千万人。同样的数量就有不同的品质。我们的装备数量就是这么些，要凭工作去提高品质，提高战斗力，凭工作把它转化为物质力量。政治工作做好了，一本万利，一通百通。","type":"paragraph"},{"text":"四个第一不仅平时要坚持，在环境困难、任务紧急和战斗频繁的情况下，更要坚持，环境越是艰苦，政治思想工作越要活跃；物质的东西越少，精神的东西越要多。越是在困难的情况下，越要发挥政治思想工作的威力。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58296b2962"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
