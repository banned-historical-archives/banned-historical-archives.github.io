<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji26","name":"毛泽东全集第26卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"推退占领杭州上海的时间","alias":"","parts":[{"type":"paragraph","text":"推迟占领杭州上海的时间！"},{"type":"paragraph","text":"（1949年5月3日）总前委，华东局并粟、张："},{"type":"paragraph","text":"（一）总前委陷辰电悉。（二）谭王吉已迫近杭州，不知来得及停止否。杭州城内除周暑率少数人为后卫尚未退走外，军队、"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给总前委和中共中央华东局等的电报。"},{"type":"paragraph","text":"[2]粟、张，指粟裕、张震，当时分别任第三野战军副司令员兼第二副政治委员和参谋长。"},{"type":"paragraph","text":"[3]指1949年4月30日辰时总前委给中共中央军委和粟裕、张震的电报。电报说，根据南京经验，我党我军未作适当准备就仓卒进入大城市，必然陷于非常被动的地位。就军事上说，杭州、上海很快即可拿下；就政治上说，我们许多重要准备都未作好，加以上海、杭州干部尚在长江北岸，部队本身困难亦多，政策及入城守则尚未深入教育，连续行军作战尚未整理，大批俘虏尚未处置，如不经过10天左右的整训，进城之后一定发生许多问题。因此，以尽可能推迟半月到一月入上海为好，杭州亦以迟一点进为好。为此建议：1．七兵团应照粟张命令迫近杭州，先以有力部队截断敌之退路，尔后派人与守敌谈判投降，拖延一点时间，以便自已作入城准备。2．推迟进占浏河时间。3．华东局、三野前委及七兵团加紧进入上海、杭州的准备，限期完成，以免仓卒被动。"},{"type":"paragraph","text":"[4]谭王吉，指谭震林、王建安、吉洛（姬鹏飞），当时分别任第三野战军第一副政治委员和第三野战军第七兵团司令员、副政治委员兼政治部主任。"},{"type":"paragraph","text":"[5]周暑，当时任国民党军京沪杭警备总司令部副总司令、浙江警备司警察及省政府均已向宁波撤退，城内治安由临时组织的民警维持。在此种情形下，谭王吉似可以不即去占领杭州，暂时由原来已经成立的治安委员会（以救济委员会名义出现）、地方绅士吕公望等维持，以待我方干部之到达。是否可以如此，请粟张决定。（三）上海在辰灰以前确定不要去占，以便有十天时间作准备工作。在辰灰以后，则应作两方面的计划：甲、即去占领上海。这是假定汤恩伯\"在十天内由海上退走，：上海成了无政府状态，追使你们不得不去占领。你们的准备主要地应放在这点上。否则，你们将陷入被动。过去，你们在三个月准备渡江期间，没有抽出一个月时间令军队学习政策和接管城市事项，没有作很快占领诸城的精神准备和组织准备，吃了亏。现在只好在十天内补足此种缺点。乙、拖长时间至半个月或二十天或-个月再去占领。只要汤恩伯不走，就应如此。占领浏河?的时间亦可推迟。我们前已电告你们，何时占领上海，要等候我们的命令，此点请粟张注意。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"辰江二时[1]汤恩伯，当时任国民党军京沪杭警备总司令部总司令。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":375,"page_end":376},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"055692cc46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
