tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"某军对干部战士进行毛泽东思想教育","authors":["刘道湘高山叶克田"],"parts":[{"type":"paragraph","text":"本报讯 某军采用讲座形式，对干部战士进行比较系统的毛泽东思想教育，收到了显著效果。"},{"type":"paragraph","text":"这个军的政治机关组织力量，以《关于建国以来党的若干历史问题的决议》为指导，以《决议》提到的毛泽东同志的四十三篇著作为主要内容，编写了教育的通俗教材，对毛泽东思想的六个方面和毛泽东思想活的灵魂的三个方面的理论，逐一进行介绍。"},{"type":"paragraph","text":"在举办学习讲座时，他们首先向大家系统地介绍毛泽东思想的形成和发展过程，讲清各个历史时期的情况，讲清党和毛泽东同志的重要实践活动和理论活动，讲清毛泽东思想在当时的主要理论以及对革命实践的巨大指导作用，使干部战士从总体上、概貌上对毛泽东思想有了初步了解。然后依据《决议》对毛泽东思想的科学概括，一课一课地讲解毛泽东思想的基本内容和精神实质。比如在讲解实事求是的观点时，就详细介绍了毛泽东同志在第一次和第二次国内革命战争时期、抗日战争时期、解放战争时期以及社会主义革命和建设时期的重要论述，使大家清楚地看到，实事求是的根本观点，象一条红线贯穿于毛泽东思想的各个方面，贯穿于中国革命和建设的全过程。因此，它是毛泽东思想的出发点和根本点，是毛泽东思想活的灵魂。"},{"type":"paragraph","text":"通过学习，“这个军的干部战士既提高了理论水平，又学到了中国革命史的知识，特别是通过比较系统的学习毛泽东思想，进一步加深了对坚持四项基本原则重要性的认识。（刘道湘、高 山、叶克田）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3efec557d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
