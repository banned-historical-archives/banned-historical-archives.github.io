ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"关于收集和研究上海税收办法的批语","alias":"","parts":[{"type":"paragraph","text":"关于收集和研究上海税收办法的批语"},{"type":"paragraph","text":"（1949年11月4日）薄一波同志："},{"type":"paragraph","text":"请将此项情报抄送黄敬，并收集上海税收办法，加以研究。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月四日[1]薄一波，当时任政务院财政经济委员会副主任。"},{"type":"paragraph","text":"[2]指中共上海市委在1949年11月1日给中央的电报中转述的英国侨民致英政府备忘录要点。转述的要点有：“英侨情况，现亦略好转。对身受政府一视同仁之待遇，无不感激。惟对某些税收制度及劳资问题，尚有意见。例如，税收方法、税率及制度，全国应一致。在天津之合并征收所得税及营业税，似非合理，更依照“付税能力’强定工商业税，亦不科学，对工商业均有严重不良影响。惟上海之营业税法及印花税法，系参酌本市实际情况而定，人民无不称善。”"},{"type":"paragraph","text":"[3]黄敬，当时任中共天津市委书记、天津市人民政府市长。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":495,"page_end":495},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc4b9f54d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
