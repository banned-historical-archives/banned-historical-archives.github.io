ear":1957,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席　周总理"},{"type":"paragraph","text":"电贺芬兰国庆"},{"type":"paragraph","text":"新华社5日讯　毛泽东主席5日致电芬兰总统乌尔霍·卡勒瓦·吉科宁，祝贺芬兰共和国成立四十周年。电文如下：芬兰共和国总统乌尔霍·卡勒瓦·吉科宁阁下："},{"type":"paragraph","text":"当芬兰共和国成立四十周年纪念的时候，我谨代表中国人民并以我个人的名义向芬兰人民和阁下表示热烈的祝贺。祝芬兰共和国繁荣，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东　1957年12月5日于北京"},{"type":"paragraph","text":"新华社5日讯　周恩来总理今天致电芬兰总理赖内尔·冯·菲安特，祝贺芬兰共和国成立四十周年。电文如下：芬兰共和国总理赖内尔·冯·菲安特阁下："},{"type":"paragraph","text":"值此芬兰共和国成立四十周年之际，我谨向阁下和芬兰共和国政府致诚挚的祝贺。祝中芬两国间的友好关系继续发展和巩固。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来　1957年12月5日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"634db72fce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
