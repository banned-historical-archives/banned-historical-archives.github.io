" crossorigin="">{"props":{"pageProps":{"books":[{"id":"234331e5-1061-47d5-bd8d-8ff71a70f57f","name":"文革通讯第27期","internal":false,"official":false,"type":"pdf","author":"浙江工农兵美术大学毛泽东主义红卫兵战斗队、毛泽东主义红卫兵","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives15/main/234331e5-1061-47d5-bd8d-8ff71a70f57f.pdf"],"article":{"title":"党内最大的走资本主义道路的当权派对留苏学生所放的毒必须肃清","alias":"","parts":[{"type":"paragraph","text":"第27期"},{"type":"paragraph","text":"文革通讯团的斗、批、改问题，特别强调如何正确处理两类矛盾问题。"},{"type":"paragraph","text":"▲北京准备出版四本批判资料：一、刘少奇的反革命修正主义言汇（约三十万字）。二、邓小平的反革命修正主义言汇。三、刘少奇的文献（约一百万字）。四、批判刘邓大字报。"},{"type":"paragraph","text":"▲最近北京体院毛泽东主义红卫兵在体育馆斗争反革命修正主义分子荣高棠，陪斗的有李梦华、陈光。会上庄则、徐寅生用亲身经历，控了刘氏黑《修养》对他的毒害，表示要与荣高棠划清界限。"},{"type":"paragraph","text":"由人阳制出"},{"type":"paragraph","text":"中电单子"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派对留苏学生所放的毒必须肃清"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派，为了使其反革命复辟阴谋得，利用职权在留苏学生问题上发出黑指示，妄图把留苏学生培养成修正主义苗子。的终工婚开"},{"type":"paragraph","text":"其罪恶如下：县而一、大肆美化苏修。中国的赫鲁晓夫、头号野心家刘少奇在一次与留苏学生的谈话批留苏学生看不起苏联，他胡什么“这样傲是民族主义的表现”，“我们毕竟还比人家落后得多”，“不要以为人家处处不如我们”，“苏联确实比中国好”。"},{"type":"paragraph","text":"二、为苏修的大搞物质刺激、实行资本主义复辟涂脂抹粉。刘少奇什么“苏联的情况与以前不同了，人们在一起讲生活，女人涂胭脂，抹口红，戴玉石戒指”。又什么“苏联人讲生活是时候了，在苏联无剥，戴玉石戒指，就明动得好，不动就不能穿得那么漂亮。”简直是胡八道。"},{"type":"paragraph","text":"三、他又鼓吹业务挂帅，分数挂帅，胡：（“祝你们以五分回来，一步是四分，三分就不太好，两分的话就捆起背包回来。"},{"type":"paragraph","text":"四、要留苏学生学习苏修政治，并恶毒攻击三面旗。他一次在列宁格勒接见一千多中国留苏学生的讲话中，只字不提反修，却明目张胆地攻击三面红旗，他把人民公社胡成是“实验”，却把我们与苏修领导集团的斗争成是苏修反对我们“实验”。在另一次讲话中，刘什么“政治上得两分的话也要捆背包回来。”这个大混蛋竟要留苏学生去得苏修“政治”的五分，真是可恶至极品信萌收彩工计健超心中"},{"type":"paragraph","text":"刘少奇罪行点滴"},{"type":"paragraph","text":"出银重竞资刘少奇宁波、舟山之行：（1）信口开河大讲空话："},{"type":"paragraph","text":"一九五八年十月至十一月当舟山同志向他汇报时海岛燃料困难，都要从内地运入时，刘少奇信口开河地指示道：“在海岛上可以搞潮汛发电”并特别巽想天开地：“海岛产量不是高：你们舟山近海可以大种海带…··大搞近海养鱼，晒干了当燃料，燃料问题不就解决了？，”"},{"type":"paragraph","text":"（2）“伺候人比同候石头高”刘少奇在宁波地委、县委书记座谈会上听汇报，有人个别人不愿干服务行业。刘：“矿工是伺候石头的，工人是伺候机器的，服务行业是伺候人，伺候人总比伺候石头和机器高尚些！"},{"type":"paragraph","text":"刘少奇在一九五六年五月二十八日对广播事业局党组作“黑指示”，可以请外国人，找外国人不一定要通过党的关系，可以出高价请好的，不要受工资标准的限制，既然搞世界性的事业，不多搞点人多花点是不行的。一副卖国性。"},{"type":"paragraph","text":"王光美“普院”求签："},{"type":"paragraph","text":"刘少奇、王光美游舟山“普院”寺时，王光美在如来佛面前求签，结果求来了下中签，十分懊恼。"},{"type":"paragraph","text":"迎时5事大龟"},{"type":"paragraph","text":"陈昌奉等及各地先进人物都拿起笔作刀枪，向刘、邓猛烈开火武派冶育站武义主本资理"},{"type":"paragraph","text":"跟随毛主席长征的老红军战士，江西省军区某部负责人陈昌奉在《江西日报》发表《誓死保卫毛主席的革命路》的文章。文章揭露刘少奇在毛主席（发表）《持人战》等光辉著作时，刘却在中央党校、马列主义学院、延安大学大讲《修养》，大肆宣扬投降哲学、叛徒哲学。浓各地著名先进人物都粉粉发表批判文章怒声讨中国的赫鲁晓夫。其中有：航空兵英雄中队队长董小海，空军战斗英雄刘玉堤，一级战斗英雄、南京部队某部副营长胡修道、爱民模范黄裕昌，学习毛著标兵廖初江、丰福生、黄i示、江苏省的全国动模范陈永康著文《决拔掉这颗定时炸弹》、上海的模杨富珍、彭加木、戚荣繁等也发表批判文章。"}],"authors":["《文革通讯》编辑部"],"dates":[{"year":1967,"month":5,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":4,"page_end":4},"tags":[{"name":"王光美","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c617e7eb7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
