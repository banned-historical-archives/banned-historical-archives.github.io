958,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京2日电】　毛泽东主席今晚在中南海勤政殿接见了应邀访问中国的六个社会主义国家的来宾。"},{"type":"paragraph","text":"这六个社会主义国家的来宾是:以契尔文科夫同志为首的保加利亚国民议会代表团、以巴卢库同志为首的阿尔巴尼亚军事访华代表团、以萨拉扬同志为首的罗马尼亚军事访华代表团、以道尔吉同志为首的蒙古军事访华代表团、以科斯托夫同志为首的索非亚市人民会议代表团、以叶夫列莫夫同志为首的苏联原子能代表团、以契列德尼钦科同志为首的苏中友好协会代表团、以布尔金同志为首的波中友好协会代表团。"},{"type":"paragraph","text":"接见时在座的有:刘少奇、周恩来、朱德、邓小平、彭德怀、彭真、陈毅、聂荣臻等同志。"},{"type":"paragraph","text":"接见时，上述六个兄弟国家的驻华使节也在座。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8916d9cd75"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
