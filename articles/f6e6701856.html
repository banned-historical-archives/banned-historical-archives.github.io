art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"万斯国务卿举行告别宴会万斯国务卿和黄华外长先后在宴会上祝酒","authors":[],"parts":[{"type":"paragraph","text":"据新华社一九七七年八月二十五日讯 美国国务卿赛勒斯·万斯和夫人今天在北京举行告别宴会。"},{"type":"paragraph","text":"应邀出席宴会的有我国外交部长黄华和何理良同志，中国驻美国联络处主任黄镇和朱霖同志，外交部副部长王海容，有关方面负责人和曾经访问过美国的知名人士郝德青、贝时璋、周培源、吴蔚然、林平、钱其琛、唐闻生、刘华、朱永行、马家骏、李川、李富荣、林慧卿。"},{"type":"paragraph","text":"美国驻中国联络处主任伦纳德·伍德科克和联络处官员以及万斯国务卿的随行人员，出席宴会作陪。"},{"type":"paragraph","text":"万斯国务卿和黄华外长先后在宴会上祝酒。"},{"type":"paragraph","text":"万斯国务卿在祝酒时，感谢中国方面在过去四天中给予他们的款待。他说，我回国后将向卡特总统报告说，这是一次良好的访问。在我同华主席、邓副总理和黄外长的会见中，我们就许多重要的全球性问题和双边问题很认真和坦率地交换了意见。我相信我们已增进了相互了解和确认了重要的共同关心之点。"},{"type":"paragraph","text":"他说，在本届美国政府同中国领导人的第一次全面磋商中，我已经清楚地说明，我们政策的出发点是，我们继续信守上海公报并承诺朝向关系完全正常化的目标前进。我期待着在今后的岁月中进一步就这个问题和其他问题进行讨论。"},{"type":"paragraph","text":"黄华外长在祝酒时说，在过去短短的几天里，我们双方就共同关心的问题进行了多次会谈。特别是，在此期间，中共中央主席、国务院总理华国锋和国务院副总理邓小平先后会见了万斯先生，并同他进行了认真的、有意义的谈话。中美两国领导人直接交换意见，增进相互了解，这对双方都是有益的。"},{"type":"paragraph","text":"他说，正如我们多次指出的，中美两国社会制度不同，我们双方的意识形态不同，在我们之间自然存在着原则分歧，但是，在目前国际形势下，我们两国面临共同关切的问题，也有不少共同点。我们认为，只要双方都能按照上海公报的原则做出真诚的努力，中美关系就一定会象两国人民共同希望的那样不断向前发展。"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6e6701856"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
