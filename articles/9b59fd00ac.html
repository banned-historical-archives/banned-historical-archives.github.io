ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发西南军区党委关于三反运动情况简报的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发华东局关于划分浪费与贪污界限的四类标准的批语"},{"type":"paragraph","text":"（1952年1月15日）各中央局，并转分局、省市区党委；各大军区，志愿军，并转各级军区和各军："},{"type":"paragraph","text":"中央同意华东局一月十三日电所述划分浪费与贪污界限的四类标准（第一条略有修改），这和天津市委的三类标准是基本上一致的，望各地注意这种划分，以利开展三反斗争。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一月十五日"},{"type":"paragraph","text":"[1]指中共中央华东局1952年1月13日给山东分局、各省委、区党委、市委并报中央的电报。电报说，浪费基本上可分为四种类型：第一，由于经验不够或全无经验而造成的浪费。如无经验的施工设计造成的损失（中央转发此电时，毛泽东将原电中以下文字“一二次一般为不可避免，重犯则为官僚主义”改写为“应严加检讨，不许重犯。第一次犯错误，可不予深责”）。第二，由于制度未建立或在短期内无法建立而造成的浪费。过去的可不追究，但应进行检查，建立制度，以便今后贯彻执行。第三，经过组织批准或决定的个人超支，以及机关生产在补助和提高集体生活方面造成的浪费。今后应加注意和改正，但对过去不必追究。第四，个人享受腐化、生活特殊及腐化性的挥霍。这是迹近贪污的浪费或由贪污而来的浪费，应特别加以审查和揭发。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":271,"page_end":271},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b59fd00ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
