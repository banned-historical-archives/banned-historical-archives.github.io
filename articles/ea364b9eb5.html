art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远高扬的旗帜记党的七大确定毛泽东思想为党的指导思想","authors":["张军"],"parts":[{"type":"paragraph","text":"据新华社延安5月22日电（记者张军）杨家岭，这个原本寂寂无闻的陕北小山村，因中国共产党和中共中央的到来名扬中外。"},{"type":"paragraph","text":"这里见证了中国共产党历史上一次又一次重要会议：延安文艺座谈会、中共六届七中全会、中共七大……"},{"type":"paragraph","text":"党史专家、中国延安干部学院教授任学林说，七大的重大历史功绩是确定了党的政治路线，确立毛泽东思想为党的指导思想并写入党章。七大总结中国新民主主义革命20多年曲折发展的历史经验，克服党内的错误思想，使全党特别是党的高级干部对中国民主革命的发展规律有了比较明确的认识。它为党领导人民去争取抗日战争的胜利和新民主主义革命在全国的胜利，奠定了政治上、思想上和组织上的深厚基础。"},{"type":"paragraph","text":"在杨家岭革命旧址讲解员张雪冬导引下，参观者来到一座中西合璧式的建筑物前——中央大礼堂。1945年4月23日至6月11日，中国共产党第七次全国代表大会在这里召开。出席大会的正式代表547人，候补代表208人，代表全党121万党员。毛泽东在会上致开幕词和闭幕词，并作了《论联合政府》的政治报告。"},{"type":"paragraph","text":"走进中央大礼堂，里面的陈设仍然保持着66年前的风貌。主席台正中是毛泽东、朱德的巨幅画像；会场后面墙上，悬挂着“同心同德”4个大字；两侧墙上悬挂4幅“坚持真理”、“修正错误”标语；靠墙边插着24面红旗，象征着中国共产党24年奋斗的历程；插红旗的“V”字形木座是革命胜利的标志；在主席台的正上方，悬挂着一条引人注目的横幅：“在毛泽东的旗帜下胜利前进！”"},{"type":"paragraph","text":"党的七届一中全会，选举了中央政治局委员、中央书记处书记和中央委员会主席，选举毛泽东为中央委员会主席、中央政治局主席、中央书记处主席。中国共产党实现了政治上、思想上、组织上的真正成熟，达到了空前的团结统一。毛泽东思想开始写在党的旗帜上，成为全党的指导思想。"},{"type":"paragraph","text":"七大会期50天，是党的历史上时间最长的一次全国代表大会；七大共举行全体会议21次，是党的历史上举行全体会议最多的一次全国代表大会。"},{"type":"paragraph","text":"七大还总结历史经验，把党在长期奋斗中形成的优良传统作风概括为三大作风，即理论和实践相结合的作风，和人民群众紧密联系在一起的作风，批评和自我批评的作风。"},{"type":"paragraph","text":"延安革命纪念馆馆长张建儒说，杨家岭这处简陋的窑洞内毛主席居住了5年时间。在艰苦岁月里，他和普通群众一样吃小米饭、穿粗布衣。《毛泽东选集》1至4卷收录的159篇文章中，写作于延安的有112篇，写于杨家岭这孔窑洞的有40篇。"},{"type":"paragraph","text":"杨家岭，这里的旗帜永远高扬。"},{"type":"paragraph","text":"杨家岭，这里的历史永远辉煌。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea364b9eb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
