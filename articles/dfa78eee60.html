的家属复仇","authors":[],"dates":[{"year":1951,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"西南各地残余反革命分子煽动被镇压者的家属复仇","type":"title"},{"text":"【西南总分社五日讯】西南各地发现残余反革命分子煽动被镇压的反革命分子家属复仇。这部分家属为数不少，有的由于生活无着，且受反动宣传影响较深。各地公安机关过去未注意对他们的教育工作，群众也歧视他们。故这些人暗中对政府不满，甚至怀抱敌意，采取破坏活动。重庆、川西、川北、川东等地公安机关近来采取集中学习，召开座谈会等办法，加强对反革命家属的教育。","type":"paragraph"}],"comments":[],"origin":"1951年7月6日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfa78eee60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
