ar":1967,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"农村怎样开展教育革命?我们带着这个问题曾经多次访问贫下中农、农村知识青年和革命干部，并邀请他们举行座谈，征求他们的意见。"},{"type":"paragraph","text":"在谈到教育要革命时，一位贫农干部一针见血地指出:“毛主席发动和领导这场无产阶级文化大革命，根本问题是为了解决政权问题，培养革命接班人的问题。我们贫下中农想来想去也是这两个问题最大，最重要。毛主席提出教育要革命，为来为去也是为了这两个大问题。”另一位贫农插话说:“我们培养出来的学生一定要抓住‘三杆’，就是枪杆、竹杆(锄头)、笔杆。这‘三杆’不掌牢，将来印把子不牢靠!”"},{"type":"paragraph","text":"在谈到今后的学校应当开些什么课的时候，贫下中农都异口同声地说:千重要，万重要，毛泽东思想课最重要。进行教育革命，就是要用毛泽东思想武装下一代，保证下一代不出修正主义。一位老贫农说:老师教小囡，第一，毛主席的书一定要读好，思想、政治最重要。第二，要勿脱离劳动，否则将来要变成“白脚爪”。第三，字一定要识，要能读，能写、能算。这位老贫农的几句话，概括了怎样培养革命接班人的问题。"},{"type":"paragraph","text":"阶级斗争是一门主课。怎样上好阶级斗争课?贫下中农主张请老贫农讲“三史”，让学生参加各种批判会、斗争会，参加对四类分子的监督改造工作。他们还建议让学生看毒草电影，看了就批判；建议把社会上的阶级斗争，拣几个典型的，交给学生去讨论，教育他们增强阶级和阶级斗争观点，用阶级分析的方法去看待一切社会现象。"},{"type":"paragraph","text":"贫下中农对教育革命的见解多么中肯!多么精辟!开展农村教育革命，除了依靠学校中的广大革命师生外，更要依靠广大的贫下中农。"},{"type":"paragraph","text":"(佘山五七学校　王惠华记)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a80b8fa3e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
