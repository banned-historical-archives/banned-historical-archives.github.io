rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"党中央批准为所谓“以黄罗斌为首的地主资产阶级篡夺白银公司领导权”事件彻底平反","authors":[],"parts":[{"type":"paragraph","text":"据新华社兰州四月四日电 新华社记者郗永年报道：在“四清”运动中曾经通报全国的所谓“以黄罗斌为首的地主资产阶级篡夺白银公司领导权”事件，现已查明是个错案。最近党中央批准中央组织部、甘肃省委和冶金部党组为这个错案彻底平反。"},{"type":"paragraph","text":"最近，白银公司召开了落实政策平反大会，公开宣布平反，推倒加在黄罗斌、李子奇、常耀华、崔国权等同志身上的一切诬蔑不实之词，撤销对他们原来所作的处分，恢复名誉、恢复党籍、厂籍和原工资级别，妥善安排他们的工作。"},{"type":"paragraph","text":"平反这一错案，深得人心。白银公司的广大干部、群众高兴地说，党中央搬掉了压在我们心上多年的大石头，现在我们能够安心搞生产了。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6a6acbf4f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
