ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"在陈正人对《关于正确处理人民内部矛盾的问题》第三稿的意见信上的批语","alias":"","parts":[{"type":"paragraph","text":"在陈正人对《关于正确处理人民内部矛盾的问题》第三稿的"},{"type":"paragraph","text":"意见信上的批语"},{"type":"paragraph","text":"（1957年6月8日）陈伯达同志："},{"type":"paragraph","text":"此件请参酌。如果文件今晚搞不完，明日下午二时交我也可以。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月八日[1]陈正人，当时任中共中央农村工作部副部长。[2]陈伯达，当时任中共中央政治研究室主任、毛泽东的秘书。"},{"type":"paragraph","text":"[3]指陈正人1957年6月7日写给毛泽东的对《关于正确处理人民内部矛盾的问题》第三稿的意见信。信中建议在稿中“大规模的群众性的阶级斗争已经结束”这一句前面加上“革命时期”4个字。并说，“我理解这句话的意思，是指两个革命一一人民民主革命、社会主义革命一一已经基本胜利，革命（社会改革）已基本结束，我们已进入社会主义建设时期，但阶级斗争仍然存在。这种斗争，不但表现为长期的思想上的斗争，也表现为政治的及其他形式的斗争（如经济的）”。后来公开发表的《关于正确处理人民内部矛盾的问题》一文采纳了这一建议。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":6,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":116,"page_end":116},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72d94cd7aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
