rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"组织干部学习刘少奇同志《论修养》","authors":["张文彪陈太生"],"parts":[{"type":"paragraph","text":"本报讯 上海警备区某师党委联系实际学习五中全会公报，进一步提高了对于坚持和改善党的领导的重要性的认识，决心进一步搞好党的建设，提高党的战斗力。"},{"type":"paragraph","text":"今年以来，这个师的负责同志曾带领机关干部到三个团调查党的建设和党员思想状况。学习公报时，他们认真分析了部队在党的建设上存在的一些问题，研究了加强党的建设、提高党的战斗力的四条措施。四条措施是：（一）对党员经常进行党的思想和政治路线教育，提高执行党的路线、方针、政策的自觉性。（二）整顿各级党委和支部，大力表彰好的党组织，对问题多的由师团分别派出工作组帮助整顿。（三）加强党课教育，以刘少奇同志《论共产党员的修养》和党章为基本教材，加强党员的思想修养，做一个合格的党员。（四）从师团党委自身抓起，自觉维护党规党法，按党的原则办事，要求下级党组织和党员做到的，自己首先做到。"},{"type":"paragraph","text":"近几天，这个师正在集训各级党委（支部）书记和政治干部，组织他们学习刘少奇同志的《论共产党员的修养》和党的基本知识，师党委五位成员认真备课，亲自讲课。目前师团党委领导成员正分别深入部队，抓好各级党委和支部学习贯彻五中全会精神，为加强部队党的建设尽心尽力，扑下身子大干。"},{"type":"paragraph","text":"（本报通讯员 张文彪 本报特约通讯员 陈太生）"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20e84a57f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
