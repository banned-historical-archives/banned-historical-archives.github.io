<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席的指示深深打动了农民的心全国广大农户积极要求参加农业合作社","authors":[],"dates":[{"year":1955,"month":10,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"浙江、山东、福建、河北、广东、热河等省各级党委，最近先后认真传达和学习了毛主席关于农业合作化问题的指示，进行了农业合作化的全面规划工作。毛主席的指示传达到这些省的农村以后，深深打动了广大农民的心，大大激发了农民要求入社的热情。"},{"type":"paragraph","text":"浙江省目前已有两千一百多个乡进行农业合作化的全面规划工作。在规划过程中，各地贫农、下中农得到了很大的鼓舞，大多数都迫切要求入社。现在有些乡已结合整顿原有的农业生产合作社扩大老社和建立新社。到10月上旬，嘉兴、建德、温州、宁波、金华等专区已建成和正在建立的共有六千五百多个新社，两千七百多个老社也在吸收新社员，十万零三千多户贫农、下中农加入了农业生产合作社。"},{"type":"paragraph","text":"山东省到9月底为止，已新建农业生产合作社七万八千多个，超过了中共山东省委员会原订的规划数字。加上原有的老社，全省农业生产合作社已发展到十六万六千二百二十个，入社农户五百万左右，占全省农户百分之四十六以上。各地新建社目前正纷纷进行农田基本建设，添购农具耕畜，扩大秋种面积。"},{"type":"paragraph","text":"福建省参照全省农业合作化全面规划，决定从今年秋季起到明年年底止，在山林地区发展林业和农林业相结合的生产合作社共一万四千五百五十三个(全省农业生产合作社明年春耕前将发展到三万八千多个)。福建省有百分之八十以上的地区是山区或半山区。1954年7月起，福建省山林地区试办了一百零四个林业、农业全部入股，统一经营的林业生产合作社和农林生产合作社，又试办了一批私有林地入股、造林和农业统一经营的农林生产合作社。这些合作社的林业和农业生产，比当地仅以合作造林、统一经营农业的农业生产合作社或农林生产合作社都有不同程度的增产。"},{"type":"paragraph","text":"河北省农业合作化运动的新高潮已在全省各地形成。截至10月初，全省加入老社和新社的农户已达一百三十七万多户，其中百分之八十以上的农户都是贫农和下中农。仅据四万五千多个老社的统计，就吸收了五十五万九千多户新社员。在同一时期，还新建了四万九千多个社，有一批新社最近也可建成。由于农民入社热情高涨和各级党组织积极领导，全省原定在今冬明春发展社的计划，现在已完成百分之七十六点六。"},{"type":"paragraph","text":"中共广东省委员会在最近修订了全省农业合作化的全面规划，修订后的全面规划确定:广东省农业生产合作社经过今秋到明春的发展后，入社农户将占全省农户总数的百分之三十三。在重点地区，入社农户要发展到占当地农户总数的百分之三十七点四。新修订的规划贯彻后，广东省重点地区在明春就将有二千个乡基本上实现合作化，这对保证粮食增产计划的完成和工业原料的供应有极大的作用。"},{"type":"paragraph","text":"中共热河省委员会和各县、旗委员会在9月份都作了合作化全面规划的典型试验工作。在进行典型试验的村(相当于关内的乡)中，有些是合作化运动开展较好的，有些是互助合作基础较差的，也有些是农户居住分散的山村。经过规划，各种类型村的合作化运动都更加健康地发展起来。仅据二十个村的统计，今冬准备加入老社和建立新社的农户，就比各村老社原有农户总数增加一倍以上。"},{"type":"paragraph","text":"各地原有的农业生产合作社有百分之八十以上今年比单干农民增产一成到三成，这是推动合作化运动迅速发展的重要因素之一。夏秋以来，各地又早作了酝酿准备，全党动手，加强领导，因而运动得以正常、健康地发展。农村中的广大贫农和下中农，表现了近几年来从所未有的兴奋积极，成批地加入了农业生产合作社，其中许多积极分子都成为办社骨干。"},{"type":"paragraph","text":"——据新华社讯"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd8f54b423"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
