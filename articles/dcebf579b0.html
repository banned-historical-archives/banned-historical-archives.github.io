rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想解决人和武器的关系一连发挥主观能动性积极掌握射击技术","authors":["王春光"],"parts":[{"type":"paragraph","text":"本报讯 在射击训练中，决定的因素是人不是武器。某部一连联系战士思想实际运用毛主席的思想，有效地解决了这个问题。"},{"type":"paragraph","text":"这个连在开训以后，有些战士怀疑手中武器有毛病，对争取优良成绩信心不足。党支部除进行个别谈话和召开党团支部大会进行教育外，专门组织了一次人和武器关系的辩论晚会。会上，由在一连兼任指导员的支队政治副主任王祥，向全连战士读了毛主席“论持久战”中关于批判唯武器论和林彪元帅关于政治工作领域中四个关系中的人和武器的关系部分，并密切联系战士中的思想实际，作了具体讲解。同时，还援引抗日战争时期，老同志用没有准星或准星不正的武器杀伤敌人的故事，说明人和武器的关系中，人是决定因素的道理，并着重指出只要在训练中发挥主观能动性，勤学苦练，就能够熟练地掌握武器，圆满完成射击练习。接着，连长姚二忙向大家介绍了全连的武器情况，说明怀疑手中武器是没有根据的。经过这次学习，提高了战士的思想，坚定了争取优良成绩的信心。副班长郑志桐说：“首长这么一讲，使我懂得了人和武器的关系，再好的武器，如果没有人去掌握，便不能发挥作用。射击打靶也是一样，只要在训练中发挥主观能动性，勤学苦练，就一定能掌握射击技术。”新战士谢成军说：“过去我没有打过靶，对射击心里没有底。听了报告，认识到只要苦练，是一定能打好的。”怀疑武器有毛病的顾虑消除以后，战士们勤学苦练的情绪更为高涨，自动地通过拔河、举重等活动，来锻炼臂力；广泛地开展了互助活动，认真练好射击基本动作，争取在实弹射击中取得良好的成绩。 （王春光）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcebf579b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
