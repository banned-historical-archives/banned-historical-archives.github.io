tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无限忠于毛主席 不断的前进进步","authors":["某部“钢铁红二连”"],"parts":[{"type":"paragraph","text":"在纪念古田会议决议发表四十一周年、一九六○年军委扩大会议决议发表和开展四好运动十周年的大喜日子里，我们全连指战员满怀战斗的激情，热烈欢呼毛主席建军路线的伟大胜利！"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“四个第一好，这是个创造。”“解放军的思想政治工作和军事工作，经林彪同志提出四个第一、三八作风之后，比较过去有了一个很大的发展，更具体化又更理论化了。”林副主席主持军委工作以来，高举毛泽东思想伟大红旗，创造性地运用毛泽东思想，提出了加强我军革命化、战斗化建设的一系列重大措施。他亲自主持制定的一九六○年军委扩大会议决议，继承和发扬了古田会议决议的光荣传统，明确地指出了新的历史时期我军政治工作的方向，提出了正确处理政治工作领域中的四个关系问题，号召全军“高举毛泽东思想红旗，把毛泽东思想真正学到手”，“人人读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士”。林副主席跟毛主席跟得最紧，毛泽东思想伟大红旗举得最高，对毛泽东思想领会得最深、用得最好，执行和捍卫毛主席革命路线最忠诚、最勇敢、最坚定。林副主席是全党学习、贯彻、宣传和捍卫毛泽东思想的典范，永远是我们学习的光辉榜样。"},{"type":"paragraph","text":"十年来，我们连在贯彻执行一九六○年军委扩大会议决议，活学活用毛泽东思想，开展创造四好连队运动中，坚持以林副主席为光辉榜样，不断加深对伟大领袖毛主席的无产阶级感情，从根本上加强连队建设。我们狠抓了两条建军路线斗争史的教育，经常组织大家联系实际，学党史，讲军史，忆连史，深刻理解林副主席在各个历史时期中，是怎样坚决执行和英勇捍卫毛主席的无产阶级革命路线的，不断提高大家执行毛主席无产阶级建军路线的自觉性。"},{"type":"paragraph","text":"敬爱的林副主席是我们连的第一任连长。在战争年代，林副主席带领我们紧跟伟大统帅毛主席，南征北战，英勇杀敌，从胜利走向胜利。一九五九年，林副主席又亲自回连队探望，并亲笔题词，勉励我们在新的历史时期要“不断的前进进步”。我们把林副主席的这一光辉指示，当作加强连队革命化、战斗化建设的强大动力，并且开展了以林副主席为光辉榜样，无限忠于毛主席的活动。全连同志每做一件事，都想想毛主席是怎么教导的，林副主席是怎样紧跟的，我们应当怎样做；每执行一项任务，都想到为毛主席和林副主席争光，从而有力地促进了活学活用毛泽东思想群众运动和创造四好连队运动的深入开展，加强了连队革命化、战斗化建设，使我们连多年被评为活学活用毛泽东思想先进集体和四好连队标兵。"},{"type":"paragraph","text":"实践告诉我们：以林副主席为光辉榜样，不断加深对伟大领袖毛主席的无产阶级感情，深入开展活学活用毛泽东思想的群众运动，是连队建设最根本的方向。坚持这个方向，连队建设就能“不断的前进进步”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ebdfe5a7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
