script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"珠海经济特区一切照旧干反对资产阶级自由化并没有吓跑外来投资者，一至三月实际利用外资比去年同期增八成多。","authors":[],"dates":[{"year":1987,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　据《羊城晚报》报道:中共珠海市委书记、珠海市市长梁广大日前对记者说，我们这里的经济工作“一切照旧干”，正在从几个方面采取措施促进珠海市更加开放。反对资产阶级自由化，给经济特区创造了一个更为安定的投资环境。"},{"type":"paragraph","text":"梁广大说，最近珠海市正在逐条检查中央发布的关于鼓励外商投资22条的执行情况，认真查一查国家给投资者的权益，真正给了没有。8月份起，我们还召开了一些外资企业座谈会听取意见，公开向他们申明:我们不但不害怕他们赚钱，而且欢迎他们在珠海赚钱。凡中外双方不协调的企业，要求我方首先检查自己，这样坦诚相见，投资者反映很好。"},{"type":"paragraph","text":"作为一个实际步骤，梁广大说，今年以来珠海积极地开展引进。对前几年签订的合同，排除困难，组织上马。例如与加拿大合资的多层次线路版厂，属高科技项目，1984年签订了协议；但因种种原因搁了下来，最近经过努力，这个项目已动工。又如玻璃纤维厂、高压电缆厂等，最近有的已破土动工，有的终于达成协议。"},{"type":"paragraph","text":"为了更好地推动开放改革，梁广大表示，珠海在与有关方面磋商后，今年准备有计划地邀请外国驻华使团和驻港澳的代表来珠海考察，研究投资的可能性。珠海也准备到海外试办一些实业。"},{"type":"paragraph","text":"梁广大说，有些人，包括我们的一些同志，开头担心反对资产阶级自由化会吓跑一些港澳和国外投资者，其实不然。反对资产阶级自由化，创造了一个更安定的投资环境。事实也正是如此。今年以来，国外和港澳来珠海考察洽谈的人数不比去年少，有的还组织团体来。今年1至8月，珠海市实际利用外资比去年同期增加了83.8%。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00825c0261"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
