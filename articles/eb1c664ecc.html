" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于如何对待革命的群众运动","authors":[],"dates":[{"year":1959,"month":8,"day":15}],"is_range_date":false,"parts":[{"text":"毛泽东关于如何对待革命的群众运动","type":"title"},{"text":"一个文件摆在我的桌子上，拿起来一看，是我的几段话和列宁的几段话，题目叫做《马克思主义者应当如何正确地对待革命的群众运动》。不知是哪一位秀才同志办的，他算是找到了几挺机关枪，几尊迫〔击〕炮，向着庐山会议中的右派朋友们，乒乒乓乓地发射了一大堆连珠炮弹。共产党内的分裂派，右得无可再右的那些朋友们，你们听见炮声了吗?打中了你们的要害没有呢?你们是不愿意听我的话的，我已“到了斯大林晚年”，又是“专横独断”，不给你们“自由”和“民主”，又是“好大喜功”，“偏听偏信”，又是“上有好者，下必有甚焉”，又是“错误一定要错到底才知道转\u003c弯\u003e”，“一转\u003c弯\u003e就是一百八十度”，“骗”了你们，把你们“当作大鱼钓出来”，而且“有些像铁托”，所有的人在我面前都不能讲话了，只有你们的领袖才有讲话的资格，简直黑暗极了，似乎只有你们出来才能收拾时局似的，如此等等，这是你们的连珠炮，把个庐山几乎轰掉了一半。好家伙，你们哪里肯听我的那些昏话呢?但是据说你们都是头号的马列主义者，善于总结经验，多讲缺点，少讲成绩，总路线是要修改的，大跃进得不偿失，人民公社搞糟了，大跃进和人民公社都不过是小资产阶级狂热性的表现。那么，好吧，请你们看看马克思和列宁怎样评论巴黎公社，列宁又怎样评论俄国革命的情况吧!请你们看一看：中国革命和巴黎公社，哪一个好一点呢?中国革命和1905—1907的俄国革命相比较，哪一个好一点呢?还有，1958—1959中国建设社会主义的情况，同俄国1919年、1921年列宁写那两篇文章的时候的情况相较，哪一个好一点呢?你们看见列宁怎样批判叛徒普列汉诺夫，批判那些“资本家老爷及其走狗”，“垂死的资产阶级和依附于它的小资产阶级民主派的猪狗们”吗?如未看见，请看一看，好吗?","type":"paragraph"},{"text":"“对转变中的困难和挫折幸灾乐祸，散布惊慌情绪，宣传开倒车，——这一切是资产阶级知识分子进行阶级斗争的工具。无产阶级是不会让自己受骗的。”怎么样?我们的右翼朋友们。","type":"paragraph"},{"text":"既然分裂派和站在右边的朋友们，都爱好马列主义，那么，我建议：将这个集纳文件提供全党讨论一次。我想，他们大概不会反对吧?","type":"paragraph"},{"text":" 毛泽东八月十五日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb1c664ecc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
