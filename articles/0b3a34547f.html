s":[],"dates":[{"year":1957,"month":8,"day":1}],"is_range_date":false,"parts":[{"text":"北京有些高等学校有扩大打击面趋向","type":"title"},{"text":"最近在反右派斗争深入以后，一些高等学校由于具体领导不够，曾发生打击面过宽的现象。突出的有以下几件：1、北京师范学院党委批准的重点20人，最近检查系、班是否有右派分子漏网，党委未经讨论审查，就将右派分子增加为113人（新增加的重点也经党委批准），其中历史系本科一年级一个班学生54人，重点10人，占18%；该年级另一个班学生50人，重点8人，占16%；中文系本科二年级一个班学生48人，重点7人，占14%，2、钢铁学院最近在团员中开展思想批判，该院二、三、四年级共有团员2,300人，准备批判的210人，占9%，截至27日，已批判120人，不少批判会开得象斗争会，已有三个批判对象因害怕批判而逃跑，14个批判对象因害怕而自动申请退团。3、航空学院除党委批准的重点61人外，还对中间分子282人开展了思想批判（其中多数是中国偏右分子）。","type":"paragraph"},{"text":"（北京市委“整风简讯”7月27日）","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部《宣教动态》第二七六期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b3a34547f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
