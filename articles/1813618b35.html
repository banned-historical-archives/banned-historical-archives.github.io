,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一天，一架大型客机快要起飞了。一位尼泊尔小朋友蹦跳着奔向客机。他一进机舱，就恭恭敬敬地向毛主席像敬了个礼，并高呼:“祝毛主席万寿无疆!”"},{"type":"paragraph","text":"在机舱里，这位小朋友特别活跃。他一会儿向服务员索取金光闪闪的毛主席像章，一会儿又要毛主席像，而且希望多要一些。他说:“我们那儿有许多小朋友，他们热爱毛主席，我要把毛主席像章带给他们戴。”旅客们很喜欢他，让他为大家唱歌跳舞。他便认真地为旅客们唱毛主席语录歌。他的热情表演，博得了热烈的掌声。这位小朋友一遍又一遍地高呼:“毛主席万岁!”(新华社北京三十一日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1813618b35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
