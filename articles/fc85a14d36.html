art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席的话指挥自己的行动","authors":["战士刘文俊"],"parts":[{"type":"paragraph","text":"我住院的时候，班长要我治好病就很快回来，不要在中途耽搁。我记住了班长的话。但在出院返回部队途中，要在昆明换车；到了昆明，赶到汽车站买第二天的车票时，车票已经卖完了。这时我想，入伍两年多了，要不是生病住医院，平时哪里有机会来昆明一趟。既然买不着车票，就在昆明玩两天，班长也不会批评我。这个思想刚在我脑子里出现，毛主席的教导就响在我的耳边：“这个军队之所以有力量，是因为所有参加这个军队的人，都具有自觉的纪律；……”晚回家一天，说清了情况，虽然班长不会批评我，可是革命纪律我们应该自觉地遵守。毛主席亲手为我们制订的“三大纪律八项注意”第一条就是要一切行动听指挥。人民解放军是无产阶级专政的柱石，特别是在当前伟大的无产阶级文化大革命中，毛主席把“三支”“两军”的任务交给了我们，同时我们地处祖国边疆和援越抗美的前哨，战备任务也很重，如果我们不能把毛主席的话变成我们的自觉行动，不严格要求自己，把部队搞得松松垮垮，怎么能完成好“三支”“两军”和保卫国防的光荣任务呢？当时我下决心走路回去。第二天，天还没亮，我就出发了。生病后的身体还没有得到很好的恢复，当我走了三十里左右的时候，口干舌燥，两腿瘫软发麻，十分疲劳。这时候，我拿出《毛主席语录》来读：“下定决心，不怕牺牲，排除万难，去争取胜利。”看看语录本上的毛主席像，念着毛主席语录，就使我浑身增添了无穷无尽的力量。我坚持前进。终于在当天晚上八点钟左右，走完了七十八公里的路程，回到了连队。（陆廷荣记）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc85a14d36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
