<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1967,"month":6,"day":5}],"page_start":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"正确处理革命组织之间的矛盾","authors":["某部毛泽东思想宣传队孙殿义"],"parts":[{"type":"paragraph","text":"我们来到青岛市通用机械厂时，革命委员会已掌管全厂大权。但是另一个群众组织“东方红”不承认革委会，革委会也不去联合“东方红”，双方存在对立情绪，以致不能集中力量打击敌人，影响了本厂的斗批改。我们经过调查研究，了解到这两个组织都是革命群众组织，他们大方向是一致的，只是在一些枝节问题上纠缠不清。"},{"type":"paragraph","text":"我们带着这个问题学习了毛主席关于正确处理人民内部矛盾的教导。毛主席说：“马克思主义者从来就认为无产阶级的事业只能依靠人民群众，共产党人在劳动人民中间进行工作的时候必须采取民主的说服教育的方法，决不允许采取命令主义态度和强制手段。”在人民内部用民主的说服教育的方法处理问题，是我党的光荣传统，也是我们正确处理人民内部矛盾必须严格遵守的原则。遵照毛主席的教导，我们着重帮助这两个群众组织整风，做扎扎实实的思想工作，启发他们自觉革命。我们首先和他们一起摆事实，讲道理，辨明是非，认清利害。“东方红”的同志开始认为：革委会有两个负责人曾经执行过资产阶级反动路线，不能让他们掌权。经过全面的、具体的分析，大家认识到，这两个同志过去是受了蒙蔽，而且很早就认真地作了检查，带领革命群众猛杀回马枪，在斗争中已成长为革命的闯将，应该信任他们。接着，我们又一起摆了两个组织互相对立的害处。两家对立，影响了本厂的斗批改，常常使亲者痛，仇者快。这样一摆，大家心明眼亮，大为震动，产生了团结的愿望。然后，革委会的同志首先引火烧身，主动征求“东方红”同志的意见，公开向群众检查了自己风头主义的毛病。“东方红”的同志也诚恳地作了检查。两个革命群众组织经过整风，诚心诚意地作了自我批评，满腔热情地进行互相帮助。他们还反复学习了“老三篇”和古田会议决议，深刻地认识到：两家对立，是“私”字作怪。“私”字是产生无政府主义、风头主义、小团体主义的总根子，是实行革命大联合的大敌。他们决心在改造客观世界过程中，努力改造主观世界。两个革命群众组织终于停止了“内战”，实现了革命的大联合，壮大了革命队伍，并且一齐把炮口对准党内最大的一小撮走资本主义道路的当权派，对准本地区、本单位党内一小撮走资本主义道路的当权派，把本厂的斗批改推向了新的高潮。"}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9469b769da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
