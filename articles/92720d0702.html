art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做毛泽东思想的宣传队","authors":[],"parts":[{"type":"paragraph","text":"毛主席早在我军创建初期就指出，我军是一个执行革命的政治任务的武装集团，除了打仗之外，还要负担宣传群众、组织群众、武装群众等项重大任务。"},{"type":"paragraph","text":"毛主席说：解放军对敌人是战斗队，对自己是工作队。"},{"type":"paragraph","text":"遵照毛主席的指示，我军历来把做好群众工作，当好工作队，作为自己的光荣职责。这个工作队，最根本的，就是用毛泽东思想去宣传群众，组织群众，武装群众。这个工作队，就是毛泽东思想的宣传队。"},{"type":"paragraph","text":"参加邢台地震区抗灾斗争的北京部队某部，组成万人宣传队，走遍十九个县、市，向三百九十多万群众广泛传播毛泽东思想，使伟大的毛泽东思想，在人民群众中深深地扎下了根子，转化为战胜灾害、重建家园、发展生产的巨大物质力量。他们不愧为一支出色的毛泽东思想的宣传队。"},{"type":"paragraph","text":"灾区群众说：“俺不信天，不信地，一心信仰毛主席！”“毛主席的话，俺一百个听，一百个信，一百个照办！”毛泽东思想同群众一见面，同群众一结合，无论哪一方面就会发生很快的变化。真是“人变、地变、村庄变”，“人换精神地换貌”。"},{"type":"paragraph","text":"林彪同志说：我国是一个伟大的无产阶级专政的社会主义国家，有七亿人口，需要有一个统一的思想，革命的思想，正确的思想，这就是毛泽东思想。中国要兴旺，就要用毛泽东思想去武装人民群众。"},{"type":"paragraph","text":"我军是一个毛泽东思想的大学校。我们一定要努力学习毛泽东思想，坚决贯彻毛泽东思想，积极宣传毛泽东思想，勇敢捍卫毛泽东思想。"},{"type":"paragraph","text":"只有学好、用好毛泽东思想，才能宣传好毛泽东思想。要象万人宣传队那样，把宣传和学习、宣传和运用完全统一起来。要按照毛主席的教导做出好样子，用自己的行动体现毛泽东思想。这种宣传最生动，最有力量。"},{"type":"paragraph","text":"对群众做宣传，对自己也是最好的教育。工厂、农村都是我们的课堂，群众斗争是最好的教材，工人阶级、贫下中农是最好的教员。到群众中去，向群众学习，就能使我们更好地领会毛泽东思想，大大提高学习毛泽东思想的自觉性，提高阶级观点和群众观点，促进部队的思想革命化。"},{"type":"paragraph","text":"到群众中去，做群众工作。军队爱人民，人民爱军队。这样，就会使军民永远打成一片。军民团结如一人，试看天下谁能敌！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92720d0702"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
