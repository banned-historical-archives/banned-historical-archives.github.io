script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"严重违反万象协定及其议定书  老挝万象极右派继续加紧侵犯解放区","authors":[],"dates":[{"year":1974,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"严重违反万象协定及其议定书"},{"type":"paragraph","text":"老挝万象极右派继续加紧侵犯解放区"},{"type":"paragraph","text":"新华社一九七四年三月十五日讯据巴特寮通讯社报道，老挝万象极右派在美国的支持下，从二月十八日至三月初不断违反万象协定，加紧侵犯老挝解放区的活动。"},{"type":"paragraph","text":"在三月份头三天里，万象极右派对老挝各爱国力量控制的波里坎塞省坎科县解放区进行了多次非法侦察。"},{"type":"paragraph","text":"万象极右派还在二月十八日和二十二日接连派遣万象军队三一一营的部队对沙湾拿吉省富文县解放区的两个村庄进行“扫荡”活动，给当地人民造成了生命和财产的损失。"},{"type":"paragraph","text":"在二月份前三周里，万象极右派对各爱国力量控制的琅南塔省三个县的解放区进行了十九次非法侦察飞行。从二月十八日到三月初，他们对沙湾拿吉省的法兰县和九号公路地段每天至少进行十架次侦察飞行，威胁该地区的人民。"},{"type":"paragraph","text":"巴特寮通讯社指出，万象极右派的上述行动严重地违反了万象协定及其议定书。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e03a830316"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
