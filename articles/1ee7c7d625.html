ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"原子弹吓不倒中国人民","alias":"","parts":[{"type":"paragraph","text":"原子弹吓不倒中国人民！"},{"type":"paragraph","text":"（1955年1月28日）"},{"type":"paragraph","text":"中国和芬兰是友好的国家。我们的关系，是建立在和平共处五项原则的基础之上的。"},{"type":"paragraph","text":"中国同芬兰从来没有发生过冲突。在欧洲国家中，在历史上，中国只同英国、法国、德国、沙皇俄国、意大利、奥匈帝国、荷兰等国有过战争，都是这些国家从老远跑来侵略中国的，比如英法联军和包括美国、日本在内的八国联军对中国的进攻。参加侵朝战争的有十六个国家，其中有土耳其、卢森堡等国。这些侵略国家都说他们是爱好和平的，却把朝、中两国说成是侵略国。"},{"type":"paragraph","text":"今天，世界战争的危险和对中国的威胁主要来自美国的好战分子。他们侵占中国的台湾和台湾海峡，还想发动原子战争。我们有两条：第一，我们不要战争；第二，如果有人来侵略我们，我们就予以坚决回击。我们对共产党员和全国人民就是这样进行教育的。美国的原子讹诈，吓不倒中国人民。我国有六亿人口，有九百六十万平方公里的土地。美国那点原子弹，消灭不了中国人。即使美国的原子弹威力再大，投到中国来，把地球打穿了，把地球炸毁了，对于太阳系说来，还算是一件大事情，但对整个宇宙说来，也算不"},{"type":"paragraph","text":"[1]这是毛泽东在芬兰首任驻中国大使孙士教递交国书的时候谈话的要点。"},{"type":"paragraph","text":"原子弹吓不倒中国人民了什么。"},{"type":"paragraph","text":"我们有一句老话，小米加步枪。美国是飞机加原子弹。但是，如果飞机加原子弹的美国对中国发动侵略战争，那末，小米加步枪的中国一定会取得胜利。全世界人民会支持我们。第一次世界大战的结果，在俄国把沙皇、地主和资本家扫光了。第二次世界大战的结果，在中国把蒋介石和地主推翻了，东欧国家和一些亚洲国家也解放了。美国如果发动第三次世界大战，那末，算它要打八年或十年吧，其结果是美国和英国及其他帮凶国家的统治阶级要被扫光，世界上大部分地方都要变成共产党领导的国家。世界大战的结果，不是有利于好战分子，而是有利于共产党和世界革命人民。他们要发动战争，那就别怪我们搞革命，也就是他们口口声声所说的我们搞“颠覆活动”。他们不搞战争，还可以在地球上多存在一些时候。他们发动战争越早，他们在地球上被消灭也就越早。那时候就要建立人民的联合国，可能设在上海，也可能设在欧洲一个什么地方，也可能还设在纽约，如果那时美国好战分子已被扫光的话。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":435,"page_end":436},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"原子弹吓不倒中国人民","authors":["毛泽东"],"dates":[{"year":1955,"month":1,"day":28}],"is_range_date":false,"parts":[{"text":"原子弹吓不倒中国人民","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"[这是毛泽东在芬兰首任驻中国大使孙士教递交国书的时候谈话的要点。]","type":"paragraph"},{"text":"中国和芬兰是友好的国家。我们的关系，是建立在和平共处五项原则的基础之上的。","type":"paragraph"},{"text":"中国同芬兰从来没有发生过冲突。在欧洲国家中，在历史上，中国只同英国、法国、德国、沙皇俄国、意大利、奥匈帝国、荷兰等国有过战争，都是这些国家从老远跑来侵略中国的，比如英法联军和包括美国、日本在内的八国联军对中国的进攻。参加侵朝战争的有十六个国家，其中有土耳其、卢森堡等国。这些侵略国家都说他们是爱好和平的，却把朝、中两国说成是侵略国。","type":"paragraph"},{"text":"今天，世界战争的危险和对中国的威胁主要来自美国的好战分子。他们侵占中国的台湾和台湾海峡，还想发动原子战争。我们有两条：第一，我们不要战争；第二，如果有人来侵略我们，我们就予以坚决回击。我们对共产党员和全国人民就是这样进行教育的。美国的原子讹诈，吓不倒中国人民。我国有六亿人口，有九百六十万平方公里的土地。美国那点原子弹，消灭不了中国人。即使美国的原子弹威力再大，投到中国来，把地球打穿了，把地球炸毁了，对于太阳系说来，还算是一件大事情，但对整个宇宙说来，也算不了什么。","type":"paragraph"},{"text":"我们有一句老话，小米加步枪。美国是飞机加原子弹。但是，如果飞机加原子弹的美国对中国发动侵略战争，那末，小米加步枪的中国一定会取得胜利。全世界人民会支持我们。第一次世界大战的结果，在俄国把沙皇、地主和资本家扫光了。第二次世界大战的结果，在中国把蒋介石和地主推翻了，东欧国家和一些亚洲国家也解放了。美国如果发动第三次世界大战，那末，算它要打八年或十年吧，其结果是美国和英国及其他帮凶国家的统治阶级要被扫光，世界上大部分地方都要变成共产党领导的国家。世界大战的结果，不是有利于好战分子，而是有利于共产党和世界革命人民。他们要发动战争，那就别怪我们搞革命，也就是他们口口声声所说的我们搞“颠覆活动”。他们不搞战争，还可以在地球上多存在一些时候。他们发动战争越早，他们在地球上被消灭也就越早。那时候就要建立人民的联合国，可能设在上海，也可能设在欧洲一个什么地方，也可能还设在纽约，如果那时美国好战分子已被扫光的话。","type":"paragraph"}],"comments":[],"origin":"《毛泽东选集》第五卷","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"maoxuan-jinghuo","name":"毛泽东选集1-7（静火版）","internal":false,"official":false,"author":"静火","type":"pdf","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/maoxuan-jinghuo.pdf"],"article":{"title":"原子弹吓不倒中国人民","parts":[{"text":"原子弹吓不倒中国人民","type":"title"},{"type":"paragraph","text":"中国和芬兰是友好的国家。我们的关系，是建立在和平共处五项原则的基础之上的。"},{"type":"paragraph","text":"中国同芬兰从来没有发生过冲突。在欧洲国家中，在历史上，中国只同英国、法国、德国、沙皇俄国、意大利、奥匈帝国、荷兰等国有过战争，都是这些国家从老远跑来侵略中国的，比如英法联军和包括美国、日本在内的八国联军对中国的进攻。参加侵朝战争的有十六个国家，其中有土耳其、卢森堡等国。这些侵略国家都说他们是爱好和平的，却把朝、中两国说成是侵略国。"},{"type":"paragraph","text":"今天，世界战争的危险和对中国的威胁主要来自美国的好战分子。他们侵占中国的台湾和台湾海峡，还想发动原子战争。我们有两条：第一，我们不要战争；第二，如果有人来侵略我们，我们就予以坚决回击。我们对共产党员和全国人民就是这样进行教育的。美国的原子讹诈，吓不倒中国人民。我国有六亿人口，有九百六十万平方公里的土地。美国那点原子弹，消灭不了中国人。即使美国的原子弹威力再大，投到中国来，把地球打穿了，把地球炸毁了，对于太阳系说来，还算是一件大事情，但对整个宇宙说来，也算不了什么。"},{"type":"paragraph","text":"我们有一句老话，小米加步枪。美国是飞机加原子弹。但是，如果飞机加原子弹的美国对中国发动侵略战争，那末，小米加步枪的中国一定会取得胜利。全世界人民会支持我们。第一次世界大战的结果，在俄国把沙皇、地主和资本家扫光了。第二次世界大战的结果，在中国把蒋介石和地主推翻了，东欧国家和一些亚洲国家也解放了。美国如果发动第三次世界大战，那末，算它要打八年或十年吧，其结果是美国和英国及其他帮凶国家的统治阶级要被扫光，世界上大部分地方都要变成共产党领导的国家。世界大战的结果，不是有利于好战分子，而是有利于共产党和世界革命人民。他们要发动战争，那就别怪我们搞革命，也就是他们口口声声所说的我们搞“颠覆活动”。他们不搞战争，还可以在地球上多存在一些时候。他们发动战争越早，他们在地球上被消灭也就越早。那时候就要建立人民的联合国，可能设在上海，也可能设在欧洲一个什么地方，也可能还设在纽约，如果那时美国好战分子已被扫光的话。"}],"comment_pivots":[],"dates":[{"year":1955,"month":1,"day":28}],"is_range_date":false,"authors":["毛泽东"],"comments":[],"page_start":972,"page_end":972,"description":"这是毛泽东同志在芬兰首任驻中国大使孙士教递交国书的时候谈话的要点。","alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]},{"id":"xuanji5","name":"毛泽东选集第五卷（1977）","internal":false,"type":"pdf","official":true,"author":"毛泽东","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/毛泽东选集(1977)5.pdf"],"article":{"title":"原子弹吓不倒中国人民","description":" 这是毛泽东同志在芬兰首任驻中国大使孙士教递交国书的时候谈话的要点。","dates":[{"year":1955,"month":1,"day":28}],"parts":[{"text":"原子弹吓不倒中国人民","type":"title"},{"type":"paragraph","text":"中国和芬兰是友好的国家。我们的关系，是建立在和平共处五项原则的基础之上的。"},{"type":"paragraph","text":"中国同芬兰从来没有发生过冲突。在欧洲国家中，在历史上,中国只同英国、法国、德国、沙皇俄国、意大利、奥匈帝国、荷兰等国有过战争,都是这些国家从老远跑来侵略中国的，比如英法联军和包括美国、日本在内的八国联军对中国的进攻。参加侵朝战争的有十六个国家,其中有土耳其、卢森堡等国。这些侵略国家都说他们是爱好和平的，却把朝、中两国说成是侵略国。"},{"type":"paragraph","text":"今天,世界战争的危险和对中国的威胁主要来自美国的好战分子。他们侵占中国的台湾和台湾海峡，还想发动原子战争。我们有两条：第一,我们不要战争；第二,如果有人来侵略我们，我们就予以坚决回击。我们对共产党员和全国人民就是这样进行教育的。美国的原子讹诈，吓不倒中国人民。我国有六亿人口，有九百六十万平方公里的土地。美国那点原子弹,消灭不了中国人。即使美国的原子弹威力再大,投到中国来,把地球打穿了,把地球炸毁了,对于太阳系说来,还算是一件大事情,但对整个宇宙说来,也算不了什么。"},{"type":"paragraph","text":"我们有一句老话,小米加步枪。美国是飞机加原子弹。但是,如果飞机加原子弹的美国对中国发动侵略战争,那末,小米加步枪的中国一定会取得胜利。全世界人民会支持我们。第一次世界大战的结果，在俄国把沙皇、地主和资本家扫光了。第二次世界大战的结果，在中国把蒋介石和地主推翻了，东欧国家和一些亚洲国家也解放了。美国如果发动第三次世界大战,那末,算它要打八年或十年吧,其结果是美国和英国及其他帮凶国家的统治阶级要被扫光，世界上大部分地方都要变成共产党领导的国家。世界大战的结果，不是有利于好战分子，而是有利于共产党和世界革命人民。他们要发动战争,那就别怪我们搞革命,也就是他们口口声声所说的我们搞“颠覆活动”。他们不搞战争，还可以在地球上多存在一些时候。他们发动战争越早，他们在地球上被消灭也就越早。那时候就要建立人民的联合国,可能设在上海,也可能设在欧洲一个什么地方,也可能还设在纽约,如果那时美国好战分子已被扫光的话。"}],"comment_pivots":[],"is_range_date":false,"authors":
