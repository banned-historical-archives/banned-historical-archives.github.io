art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席挥手我前进","authors":["“支左爱民模范”李文忠生前所在部队"],"parts":[{"type":"paragraph","text":"在学习讨论中，大家指出，在全党全军全国人民愤怒批判邓小平反革命的修正主义路线，奋起反击右倾翻案风的大好形势下，一小撮阶级敌人公然在首都天安门广场放火、打人，进行反革命破坏活动，这表明阶级敌人狗急跳墙作垂死挣扎。它从反面告诉我们，毛主席亲自发动和领导的这场反击右倾翻案风的伟大斗争，打在邓小平这个不肯改悔的走资派身上，疼在党内外资产阶级心上。这伙凶恶的敌人公然为邓小平的修正主义路线喝彩，妄图推出邓小平当匈牙利反革命事件的头子纳吉，这充分表明邓小平是资产阶级的总代表，对无产阶级专政是极其危险的。"},{"type":"paragraph","text":"在无产阶级文化大革命中，“支左爱民模范”李文忠同志，紧跟毛主席的伟大战略部署，旗帜鲜明、立场坚定，毛主席指向哪里，就战斗在哪里，为保卫毛主席，保卫党中央，保卫毛主席的革命路线，保卫无产阶级文化大革命，贡献出了自己的一切。今天，在反击右倾翻案风的斗争中，我们要以李文忠同志为榜样，为执行和保卫毛主席的革命路线而战斗。我们要认真学习毛主席的一系列重要指示，发扬勇敢战斗精神，深入批判邓小平妄图颠覆无产阶级专政、复辟资本主义的反动罪行，粉碎阶级敌人的一切破坏阴谋，把反击右倾翻案风的伟大斗争进行到底，夺取更大的胜利。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5833fecd61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
