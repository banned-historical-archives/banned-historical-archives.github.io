al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"关于西征战役的作战原则","alias":"","parts":[{"type":"paragraph","text":"关于西征战役的作战原则！"},{"type":"paragraph","text":"（1936年7月14日）德怀同志："},{"type":"paragraph","text":"甲、在对敌两团以上兵力作战时，似宜集结更优势之兵力，期于一举消灭之。"},{"type":"paragraph","text":"乙、在作战条件不具备时，不妨再引退些，把敌诱至条件具备之情况下，以便一举消灭，这里须要更多的忍耐性。"},{"type":"paragraph","text":"丙、扩大与训练部队，使红军生息强大，造成将来战略上大举反攻之主要的条件。"},{"type":"paragraph","text":"丁、对何柱国指挥“进剿”之东北军，宜决定消灭其一部，这样做不会妨碍大局，反有利于大局。"},{"type":"paragraph","text":"戊、对西征以来的整个指挥，我都是同意的。以上各条，在你的过去部署中大概都包括了，现提出来，请特别考虑一番。"},{"type":"paragraph","text":"泽东"},{"type":"paragraph","text":"十四日十七时"},{"type":"paragraph","text":"[1]这是毛泽东给红军第一方面军司令员、西方野战军司令员兼政治委员彭德怀的电报。所发现的抄件中，有个别不同之处，均按原稿排印。"},{"type":"paragraph","text":"[2]何柱国，当时任国民党军西北“剿匪”总司令部骑兵军军长。"},{"type":"paragraph","text":".188"},{"type":"paragraph","text":"1936.7 14.德怀同志："},{"type":"paragraph","text":"甲在对致两团以上兵力作戟时，似宣集结更优势之六力期于一举淌浅之，"},{"type":"paragraph","text":"乙.在作氧像件不奥修的时，不妨在引退些，把效至有利修件下以便一举淌减.这裡酒要多忍耐性。"},{"type":"paragraph","text":"的丙.扩大共训练部际使红革生鬼强大将来"},{"type":"paragraph","text":"造啡就略上大举反攻之主要的偏件。"},{"type":"paragraph","text":"了.对何柱国指挥健到全部陈北事宜决定淌减其一部，这详五不会妨等大局，良有利格态局。"},{"type":"paragraph","text":"是出"},{"type":"paragraph","text":"戊。对西征从来的整徊抬掉，我仅是同率.上各候，在你的过去部要中大概都色了，理提出事特别考虑—愁。"},{"type":"paragraph","text":"泽束毛泽东关于西征作战给彭德怀的电报。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":496,"page_end":497},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff404c3768"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
