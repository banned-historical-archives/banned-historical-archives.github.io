tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东军事思想理论研讨会在京举行重点探讨如何运用毛泽东军事思想和邓小平关于新时期军队建设思想指导我军的现代化建设","authors":["笆阏？"],"parts":[{"type":"paragraph","text":"本报北京10月9日讯 特约记者景抒展报道：毛泽东诞辰100周年前夕，跟随毛主席南征北战的老红军战士同来自三总部机关、全军各大单位、院校、武警部队及首都理论界的领导同志和专家学者聚集一堂，隆重举行毛泽东军事思想在中国的胜利与发展理论研讨会，历时3天，今天在国防大学落下帷幕。"},{"type":"paragraph","text":"这次理论研讨会是经军委、总部同意召开的。旨在通过对毛泽东军事思想指引我军从胜利走向胜利的历史回顾，深刻领会毛泽东军事思想在中国产生、胜利、发展的根本原因、历史条件和科学体系，以及邓小平对毛泽东军事思想作出的巨大历史性贡献，并重点探讨如何运用毛泽东军事思想和邓小平关于新时期军队建设思想指导我军的现代化建设。"},{"type":"paragraph","text":"李德生、王平、廖汉生、余秋里、伍修权、陈锡联等老同志以及130多位高级将领和专家学者参加了研讨会。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3eae437574"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
