thors":[],"dates":[{"year":1967,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿扎里主席主持苏丹—中国友协俱乐部开幕式"},{"type":"paragraph","text":"希望中国文化大革命取得完全胜利"},{"type":"paragraph","text":"据新华社喀土穆十六日电　苏丹国家最高委员会主席伊斯梅尔·阿扎里十四日晚上在喀土穆主持了苏丹—中国友好协会俱乐部的开幕式。"},{"type":"paragraph","text":"阿扎里主席在这个仪式上的讲话中赞扬了中国无产阶级文化大革命，并表示希望伟大的中国人民在毛泽东主席领导下开展的这场文化大革命取得完全胜利。"},{"type":"paragraph","text":"阿扎里主席表示祝苏丹—中国友好协会在促进两国人民的联系方面取得圆满成功。"},{"type":"paragraph","text":"阿扎里主席还在留言簿上写下了热情的留言：“我希望这种友谊成为可爱的苏丹和伟大的中国之间最好的纽带”。"},{"type":"paragraph","text":"苏丹—中国友好协会主席阿卜杜勒·瓦哈卜·宰因·阿卜丁博士和中国驻苏丹大使馆临时代办雪呐也先后在仪式上讲了话。"},{"type":"paragraph","text":"阿卜杜勒博士说，苏丹和中国两国人民之间的友谊将在两国人民共同努力下越来越密切和深厚。雪呐在讲话中赞扬了苏丹人民在帝国主义侵略者统治期间同他们进行的英勇斗争。他表示深信，苏丹—中国友好协会将对加强两国人民的相互了解和友谊作出进一步的贡献。"},{"type":"paragraph","text":"出席开幕式的有四百人。其中有：苏丹最高法院首席法官巴比克尔·阿瓦达拉，苏丹制宪议会议员、前部长古巴拉·阿瓦德以及许多社会知名人士。"},{"type":"paragraph","text":"当俱乐部开放的时候，成群结队的参观者挤进俱乐部里的图书馆，如饥似渴阅读毛主席的著作和关于中国文化大革命的小册子。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bd622d158"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
