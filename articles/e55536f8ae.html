tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛主席《送瘟神》发表二十周年 学习华主席为血防工作的题词","authors":[],"parts":[{"type":"paragraph","text":"据新华社上海十月二十日电 中共中央南方十三省、市，自治区血防领导小组于十月三日下午在上海召开大型座谈会，隆重纪念毛主席《送瘟神》诗篇发表二十周年，学习华主席为血防工作的题词。"},{"type":"paragraph","text":"华主席最近为血吸虫病防治工作的题词是：“加强领导，依靠群众，为实现毛主席‘一定要消灭血吸虫病’的遗愿而奋斗！”"},{"type":"paragraph","text":"中共中央政治局委员、中共中央血防领导小组组长彭冲出席座谈会，并讲了话。中共上海市委书记王一平、市革命委员会副主任杨恺也出席了座谈会。"},{"type":"paragraph","text":"座谈会由中共中央血防领导小组副组长、卫生部副部长钱信忠主持。他在会上宣读了华主席的题词。"},{"type":"paragraph","text":"参加座谈会的有从事血吸虫病防治研究工作几十年，为消灭血吸虫病作出重要贡献的老专家、老教授，还有工业、农业、水利、商业、卫生、科研等各有关方面的代表。他们在会上畅谈了毛主席《送瘟神》诗篇发表二十年来我国血防工作取得的重大成就。代表们兴奋地说：在纪念毛主席《送瘟神》诗篇发表二十周年的日子里，华主席为血防工作题词，这是华主席为首的党中央对疫区广大人民的关怀，是卫生战线的大事，对于加快“送瘟神”的步伐，推动除害灭病工作不断向前发展，使卫生工作更好地为新时期的总任务服务，具有十分重要的意义。"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e55536f8ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
