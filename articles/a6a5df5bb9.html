art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"范文澜两本编著受到毛泽东称赞","authors":[],"parts":[{"type":"paragraph","text":"范文澜"},{"type":"paragraph","text":"两本编著受到毛泽东称赞"},{"type":"paragraph","text":"作为著名历史学家，范文澜在延安时期曾经奉命编著过两本书：一本是《中国通史简编》，一本是《中级国文选》。比起那些皇皇巨著来，这两本书也许算不上什么，可它们却倾注了范文澜的大量心血，也受到了毛泽东的高度赞扬。"},{"type":"paragraph","text":"原来，为提高干部队伍素质，范文澜到延安后就受领任务：编写一本供一般干部学习中国历史用的历史课本，以及一本供工农干部学文化用的文化课本。当时由于缺乏集体编写的经验，《中国通史简编》基本上是范文澜在通稿之后，一个人再重新编写。《中级国文选》则集中了在哲学、文学、历史方面造诣较深的人士共同编写。这两本书发挥了很大的作用。毛泽东先后称赞：“这是件大好事”、“打开了学文化的大门”。（李宪联）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"范文澜","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6a5df5bb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
