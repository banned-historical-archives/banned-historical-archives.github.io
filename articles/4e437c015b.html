"year":1965,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来朱德邓小平吊唁黄炎培副委员长"},{"type":"paragraph","text":"新华社二十四日讯　中共中央副主席、国务院总理、政协全国委员会主席周恩来，中共中央副主席、人大常委会委员长朱德，中共中央总书记、国务院副总理邓小平，今天上午前往中山公园中山堂吊唁黄炎培副委员长。"},{"type":"paragraph","text":"今天上午前往中山堂吊唁的，还有国务院副总理李富春、李先念，人大常委会副委员长郭沫若、程潜、林枫、刘宁一，政协全国委员会副主席徐冰、高崇民、李四光、傅作义、沈雁冰、李烛尘、李德全，最高人民法院院长杨秀峰等。"},{"type":"paragraph","text":"前往吊唁的，还有中国民主建国会副主任委员南汉宸、施复亮、胡子昂，全国工商联副主任委员荣毅仁、乐松生、罗叔章，各民主党派负责人季方、陈其尤、苏子蘅等。"},{"type":"paragraph","text":"二十三日，人大常委会副委员长杨明轩，政协全国委员会副主席许德珩，人大常委会、国务院、政协全国委员会的机关干部，中国民主建国会的成员，以及黄炎培副委员长的生前友好共一千多人，也前往中山堂吊唁。部分国家驻中国的使节和外交官员，也曾前往中山堂吊唁黄炎培副委员长，并献了花圈。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"党和国家领导人周恩来、朱德、邓小平、郭沫若、杨明轩、程潜、林枫等在黄炎培副委员长遗象前默哀。　新华社记者　张彬摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e437c015b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
