torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"关于打曾万钟的部署叫","alias":"","parts":[{"type":"paragraph","text":"关于打曾万钟的部署！"},{"type":"paragraph","text":"（1936年11月12日）彭："},{"type":"paragraph","text":"甲、王均已死。曾万钟所率三旅，马旅远至宁安堡，沈旅今（文）日由关不得儿出发向丁家塘大道攻进，李旅?由三不拉出发向马家塘攻进。我军布置得好，有打着可能。"},{"type":"paragraph","text":"乙、打曾敌并相当休息后，似宜以一方面军先行出动，经毛居井或其以西南进，三十一军、四军跟进，二方面军最后出动，方免拥挤及其暴露。如何，请依据实况酌定。但二方面军现时即应以一"},{"type":"paragraph","text":"[1]这是毛泽东给红军前敌总指挥兼政治委员、第一方面军司令员彭德怀的电报。"},{"type":"paragraph","text":"[2]王均，原任国民党军西北“剿匪”总司令部第一路副总司令兼第一纵队司令、第三军军长，1936年11月9日死于飞机失事。"},{"type":"paragraph","text":"[3]曾万钟，原任国民党军西北“剿匪”总司令部第三军第七师师长，王均死后，继任第一纵队司令、第三军军长。"},{"type":"paragraph","text":"[4]马旅，指国民党军西北“剿匪”总司令部第一路第一纵队第十二师第三十四旅，旅长马鲲。"},{"type":"paragraph","text":"[5]沈旅，指国民党军西北“剿匪”总司令部第一路第一纵队第七师第二十一旅，旅长沈元镇。"},{"type":"paragraph","text":"[6]李旅，指国民党军西北“剿匪”总司令部第一路第一纵队第七师第十九旅，旅长李世龙。部置王以哲\"右纵队前进道上，迟阻敌进，并掩护一、四方面军。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十二日二十一时"},{"type":"paragraph","text":"[1]王以哲，当时任国民党军西北“剿匪”总司令部第二路第六纵队（第六十七军）司令。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":288,"page_end":289},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"275ea17871"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
