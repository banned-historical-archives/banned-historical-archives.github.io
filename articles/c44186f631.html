script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美资跨国公司的剥削和讹诈拉美香蕉出口国展开联合斗争","authors":[],"dates":[{"year":1974,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一九七四年七月八日电　最近几个月来，拉丁美洲香蕉出口国为维护民族利益、反，对美资跨国公司的剥削和讹诈，不断展开联合斗争。"},{"type":"paragraph","text":"中美洲的巴拿马、哥斯达黎加、尼加拉瓜、洪都拉斯、危地马拉和南美的哥伦比亚、厄瓜多尔等七个国家出口的香蕉占世界市场香蕉出口总量的百分之八十。一九七二年，这七个国家的香蕉总出口量近二亿二千九百六十万箱(每箱四十磅)。但是，长期以来，拉丁美洲大部分国家的香蕉生产和销售受美资跨国公司控制，其中主要是美国联合果品公司，标准果品公司和蒙特公司。由于美资跨国公司的垄断，二十五年来，拉美的香蕉价格同工业制成品价格差距越来越大，严重地损害了拉美香蕉出口国的利益。"},{"type":"paragraph","text":"拉美香蕉出口国强烈要求改变这种不合理的状况。一九七二年，厄瓜多尔、哥伦比亚、哥斯达黎加三国就签署了《瓜亚基尔宣言》，宣布采取联合行动反对跨国公司的掠夺和剥削。今年三月上旬，拉美七个香蕉生产国在巴拿马城举行部长级会议，决定对出口香蕉每磅征收一美分至二点五美分的附加税，并倡议建立香蕉出口国联盟。到目前为止，巴拿马、洪都拉斯、哥斯达黎加和哥伦比亚都已经宣布征收不同程度的香蕉出口附加税。三月底，拉丁美洲的香蕉出口国又在哥伦比亚首都波哥大开会，通过了成立香蕉出口国联盟的协议草案。"},{"type":"paragraph","text":"美资跨国公司对维护民族利益的拉美香蕉出口国采取了报复行动。美国标准果品公司无理宣布拒绝购买洪都拉斯的香蕉，故意造成大批当地香蕉工人失业。但是，拉美香蕉出口国互相支援、坚持斗争，在美资跨国公司的威胁面前显示了团结。五月九日，哥斯达黎加、巴拿马和洪都拉斯领导人在哥斯达黎加首都圣约瑟举行会议，决心在跨国公司的压力面前团结一致保卫它们的主权和经济利益。接着，巴拿马向洪都拉斯和哥斯达黎加各提供一百万美元，支持它们反对跨国公司的斗争。六月上旬，巴拿马、哥斯达黎加和哥伦比亚的国家和政府首脑举行会议，讨论如何协调三国的香蕉出口政策，以便同跨国公司的剥削行径进行斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c44186f631"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
