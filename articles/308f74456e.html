ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"请考虑将东北第十一纵派往通县北平方向活动","alias":"","parts":[{"type":"paragraph","text":"请考虑将东北第十一纵派往通县北平方向活动"},{"type":"paragraph","text":"（1948年10月29日）林、罗、刘："},{"type":"paragraph","text":"蒋介石、傅作义为挽救危局刺激人心起见，令十六军、三十五军、九十四军、骑四师、骑十二旅附坦克及爆炸部队向石家庄进攻，其九十四军、骑四师、骑十二旅等部昨日已进至保定以南之方顺桥3。除令杨罗耿?率部回援外，请你们考虑将现在锦西附近之十一纵派至冀东向通县、北平方向活动，威胁北平，是否可能，盼告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"酉艳"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]傅作义，当时任国民党军华北“剿匪”总司令部总司令。[3]方顺桥，村名，位于河北省满城县西南。[4]杨罗耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":132,"page_end":132},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"308f74456e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
