ates":[{"year":1949,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报广州十八日专电】　代表广州市廿八万工人的广州市工人代表会议，十六日上午开幕，会期三天，十八日闭幕。出席工人代表三百五十八人，包括各种不同部门的工人代表。市总工会筹备会主任廖似光在报告中指出广州市工人参加了很多重要工作，如劳军和肃清地下钱庄等；她并且提出大家要改变劳动态度，恢复生产，发展生产，改善劳资关系，签订集体合同，组织自己的工会。军管会主任叶剑英在讲话中指出，目前工人生活难免仍有困难，但必须提高阶级觉悟，忍受暂时的困难，恢复和发展生产，使全体人民的生活改善，工人生活才能改善。大会进行得非常顺利，工人情绪高涨。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"585dcfe35f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
