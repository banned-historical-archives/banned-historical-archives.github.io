ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"四纵应留南口八达岭防御","alias":"","parts":[{"type":"paragraph","text":"四纵应留南口八达岭防御1"},{"type":"paragraph","text":"（1948年12月14日）林、罗、刘，并程、黄："},{"type":"paragraph","text":"昨日十五时半林罗刘来电?已悉，部署甚好。北平、通县之敌是否撤退，我们至今还未得到证明。我们原来极担心平、通东南兵力不足，现知三、六、十三个纵已到或正向该地前进，敌人又不会经通津公路退却，则有三、五、六、十及十一等五个纵队位于平、通以南已很够用。四纵应留在南口、八达岭进行防御，待情况判明后再定该纵行止较为适宜。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十四日一时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼等的电报。"},{"type":"paragraph","text":"[2]指1948年12月13日15时半林彪、罗荣桓、刘亚楼给程子华、黄志勇、吴克华、莫文骅并中共中央军委的电报。电报说：“1．南口、昌平、沙河镇我军昨日皆已占领。2.我三纵本晨已到达通县以南，并歼敌地方团一部。3．我四纵可暂进至南口后，占领八达岭、南口阵地，进行防御，待查明平敌确实企图后，再定行止。4．我十纵、六纵继续向通县、北平以南前进。我五纵、十一纵应继续向宛平、北平以南前进。5．我九纵昨已占唐山，并继"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":400,"page_end":400},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a719e3edf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
