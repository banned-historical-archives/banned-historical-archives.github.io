和保卫世界和平的真正堡垒　谴责帝国主义现代修正主义对中国人民别有用心的诽谤","authors":[],"dates":[{"year":1963,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社里约热内卢2日电】　巴西各界人士数百人昨天晚上在里约热内卢举行集会和酒会，庆祝中华人民共和国成立十四周年。"},{"type":"paragraph","text":"在集会上，巴西著名教授保罗·克萨尔，工会代表万德里诺·德奥利维拉，《工人阶级报》社长毛里西奥·格腊布伊斯和巴西共产党领导成员林肯·奥埃斯特先后发表了讲话。发言者一致指出中国革命的世界意义，并且赞扬了中国人民坚持反对帝国主义的斗争、克服困难的大无畏精神。他们强调指出，中国共产党保卫着马克思列宁主义的纯洁性，并且高举世界人民的革命旗帜；它是加强和保卫世界和平的真正的堡垒。发言者还谴责了帝国主义和现代修正主义对中国人民的别有用心的诽谤。"},{"type":"paragraph","text":"这次集会的主席保罗·克萨尔教授在讲话中说，中国人民的巨大成就不是靠乞求任何人取得的，而是在毛泽东主席领导下，通过自己的史诗一般的斗争取得的。"},{"type":"paragraph","text":"工会代表万德里诺说，解放了的中国人民所高举的革命旗帜鼓舞着各国人民的斗争。他说，中国革命的经验很重要，正在为争取民族解放而斗争的巴西人民应该学习这些革命经验。"},{"type":"paragraph","text":"巴西共产党领导成员林肯·奥埃斯特说，庆祝十月一日对于仍然处于帝国主义威胁和剥削下的各国人民具有极其重大的意义。他指出，中国革命照亮了拉丁美洲各国人民的斗争道路。"},{"type":"paragraph","text":"《工人阶级报》社长格腊布伊斯在讲话中指出，中国共产党经受过长期的艰苦和极其复杂的斗争的考验。"},{"type":"paragraph","text":"他说，拥有毛泽东这样英明领袖的中国共产党已经成为当代世界的极其强大的理论阵地，成为马克思列宁主义革命原则的坚决的维护者。他说，帝国主义者和修正主义者总是诽谤真正的革命者，但是历史已经判定，今后将继续判定谁是真正的马克思列宁主义者。历史已经判定，今后将继续判定谁是革命运动的污垢。"},{"type":"paragraph","text":"这些人士的讲话不断博得与会者的掌声。特别是当讲话者提到中国人民的伟大领袖毛泽东的名字时，掌声响彻整个大厅。"},{"type":"paragraph","text":"庆祝酒会是在里约热内卢的巴西中国文化协会办事处举行的。参加酒会的包括将军、法官、教授、作家、艺术家、记者、学生以及各政党、团体的代表和在巴西的其他拉丁美洲国家人士。"},{"type":"paragraph","text":"最近访问过中国的女医生马里亚，奥古斯托，米兰达代表巴西中国文化协会在庆祝酒会上讲了话。她说，她对中国的最深刻的印象是，中国人民是勤劳、勇敢和热爱和平的。她说，在中国，人们感受不到好战的气氛，人们感受到的是团结的、前进的好形势。"},{"type":"paragraph","text":"中国经济贸易展览会筹备工作小组的全体人员和新华社记者应邀参加了上述庆祝集会和酒会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dadacdeb80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
