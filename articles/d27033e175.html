script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南南方人民武装严惩蚕食解放区的西贡军队  西贡政权控制区人民展开斗争反对压迫和剥削","authors":[],"dates":[{"year":1974,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南南方人民武装严惩蚕食解放区的西贡军队"},{"type":"paragraph","text":"西贡政权控制区人民展开斗争反对压迫和剥削"},{"type":"paragraph","text":"新华社河内一九七四年八月二十日电　据越南南方解放通讯社报道，越南南方人民解放武装力量八月初以来继续严惩蚕食解放区的西贡军队，取得新的战果。"},{"type":"paragraph","text":"广义省人民解放武装力量八月三日对西贡军队在义行县南部解放区非法建立的由二十个据点组成的一个据点群发动进攻。经过三个多小时的战斗，人民解放武装力量全歼守敌一个营、一个连和两个排，并且收复了这个地区。八月十七日，人民解放武装力量进攻广义市西南二十六公里的明隆县城；经过激战，一举攻克了敌人用来蚕食解放区的出发基地——明隆军事支区和县城，消灭和瓦解西贡军队四个连和十六个排，并且使六千名群众获得解放。"},{"type":"paragraph","text":"广南省人民解放武装力量八月三日和四日再次打击企图重占农山—忠福解放区的西贡军队，重创敌人从广义省调来的两个营，击毁敌人坦克和装甲车六辆，击落飞机一架，缴获许多武器、弹药和军用物资。八月四日晚上，广南省解放军还攻克了桂山县西部的敌人据点群中的最后两个据点。"},{"type":"paragraph","text":"嘉莱省解放军八月四日打击蚕食清安南面解放区的西贡军队第二十四别动联团第八十一营。经过一小时战斗，解放军重创了这个营，使近一百五十名敌军丧失战斗力，并缴获敌人一批武器和无线电收发报机。"},{"type":"paragraph","text":"平隆省禄宁市人民解放武装力量防空部队八月六日坚决惩罚轰炸禄宁市的西贡空军，使两架敌机中弹起火。"},{"type":"paragraph","text":"新华社河内一九七四年八月二十日电　越南南方西贡政权控制区各城市的工人最近不断开展斗争，反对阮文绍集团的压迫和剥削，要求民主自由权利。"},{"type":"paragraph","text":"据西贡报纸报道，西贡—嘉定地区和头顿市的码头工人八月十一日举行特别会议并发表声明，抗议头顿市“市长”六月十四日唆使暴徒行凶，打伤五名码头工人。工人们还强烈要求惩罚头顿市“市长”和对工人行凶的暴徒。岘港、归仁、芽庄、金兰、芹苴和永隆六个城市的码头工人和工会也派代表出席了这次会议，支持西贡—嘉定地区和头顿市码头工人的正义斗争。最近，西贡政权控制区的两千多名铁路工人举行第十一次铁路工人大会，一致通过决议，要求阮文绍集团给工人补发一九七三年拖欠的工资。"},{"type":"paragraph","text":"西贡、芽庄、绥和等城市许多行业的工人最近也纷纷开展斗争，反对阮文绍集团勒索和解雇工人，并且要求增加工资、改善生活和解决就业问题。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d27033e175"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
