rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"修正主义者支持西藏叛匪原形毕露","authors":[],"parts":[{"type":"paragraph","text":"新华社2日讯 贝尔格莱德消息：南斯拉夫“政治报”4月30日以新华社电头发表4月29日新华社广播的一条关于中国人民政治协商会议第三届全国委员会第一次会议通过政治决议的消息时，竟采用偷天换日的手法，篡改上述消息的内容。"},{"type":"paragraph","text":"这家报纸把新华社消息中所说“中国人民政治协商会议强烈地谴责了原西藏地方政府和上层反动集团勾结帝国主义和外国干涉者所发动的背叛祖国的武装叛乱”改成了“中国人民政治协商会议全国委员会谴责了西藏的武装起义。起义是 ‘前西藏政府和上层分子协同帝国主义者和外国干涉者一起发动的’。”"},{"type":"paragraph","text":"在这里，人们可以看到“原西藏地方政府”没有了“地方”字样，变成了“前西藏政府”；“上层反动集团”没有了“反动集团”字样，变成了“上层分子”；在“背叛祖国的武装叛乱”一语中，把“叛乱”说成是“起义”，并且删去了“背叛祖国”字样。此外，这家报纸在转载新华社消息中所说的“决议强烈地谴责了印度某些扩张主义分子……”时，把“印度扩张主义分子”改为“印度某些人士”。"},{"type":"paragraph","text":"值得注意的是，经过这些篡改已面目全非的消息是冠以新华社的电头的。这种不顾新闻道德的手法，反映了南斯拉夫修正主义分子是多么迫不及待地为支持西藏反动集团的叛国罪行和外国干涉我国内政而尽力。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74c3dfd9e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
