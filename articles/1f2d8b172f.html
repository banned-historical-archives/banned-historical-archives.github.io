:1967,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海工人革命造反总司令部闸北区联络站"},{"type":"paragraph","text":"我们以极其兴奋的心情，认真地学习了《人民日报》九月十八日《毛主席最新指示的辉煌胜利》这篇重要社论。这是毛主席和以毛主席为首的无产阶级司令部，对我们上海无产阶级革命派的最大鼓舞、最大鞭策。我们上海工人革命派，决不辜负毛主席他老人家对我们的期望，我们要在革命大批判、革命大联合和“三结合”的新高潮中，立新功，建新劳!"},{"type":"paragraph","text":"每到无产阶级文化大革命的重要关头，毛主席总是及时地、英明地给我们指出前进的方向。在当前无产阶级文化大革命进入到两个阶级、两条道路、两条路线总决战的关键时刻，毛主席他老人家又给我们发出最新指示:在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。毛主席的话完全说到了我们工人的心里。前一时期，我们闸北区的两个工人革命群众组织，长期联合不起来，但一学习毛主席这一最新指示，就迅速地联合起来了。我们深深地体会到:毛泽东思想就是我们的命根子，只要我们能按照毛主席指示办事，就能无往而不胜。"},{"type":"paragraph","text":"今天，我们实现了革命的大联合，这仅仅是我们共同战斗的开始，摆在我们无产阶级革命派面前的战斗任务还很艰巨，还要将无产阶级文化大革命进行到底，夺取彻底的胜利。我们不仅要进一步巩固和发展区联络站的革命大联合，还要到基层去，同广大革命群众一起活学活用毛主席著作，紧跟毛主席的伟大战略部署，以“只争朝夕”的革命精神，帮助和推动基层单位实现和巩固革命的大联合，以崭新的战斗姿态，迎接伟大的国庆节。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f2d8b172f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
