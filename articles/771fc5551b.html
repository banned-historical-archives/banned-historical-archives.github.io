<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1963,"month":5,"day":7}],"page_start":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"好八连的思想工作好在哪里；炮兵某部指导员的体会是：处处用毛泽东思想挂帅；把思想工作做深做细；干部处处做战士的表率；","authors":["王宜昌"],"parts":[{"type":"paragraph","text":"本报讯 炮兵某部指导员以“好八连的思想工作好在哪里”为题，联系实际进行讨论。大家体会最深的是，好八连处处用毛泽东思想挂帅，思想工作做得深、做得细，干部处处起表率作用。"},{"type":"paragraph","text":"光测连指导员倪灿公说：“作为一个指导员，怎样更好地用毛泽东思想武装战士的头脑，这是一个迫切需要解决的问题。好八连的干部在这方面给我们做出了榜样。他们牢牢记住了毛主席的教导，用毛主席的教导去教育战士。这样，战士的思想就健康，连队的工作就过硬。我们学习好八连，首先就应该从他们的指导员学起。”电话连指导员高连升说：“好八连的思想工作做得深，做得细，他们能够抓住小事情，讲出大道理。‘闪光的一分钱’对我很有启发。我们碰到这类事也进行表扬，但往往是就事论事，缺乏思想性，所以教育效果就不如人家好。他们说的‘国家是自己的，自己是国家的’这句话很好，说‘我们少穿一尺布是为了人民多穿一尺布’，也有很高思想性。他们就是这样把一些具体事情同国家利益、人民利益联系起来，对战士的教育很深刻。”"},{"type":"paragraph","text":"大家还用好八连的事迹对照检查薄弱环节。声测连副指导员刘孝金说：“我们连前年是四好连队，去年掉队了。原因就是思想工作没有做好，抓不住苗头，看不出动向。在生产中本来应该进行本连和整体关系的教育，可是我们没有去进行，结果有的战士只顾自己不管别人，风格不高。我们是技术兵种，干部中容易只重视抓技术，不重视抓思想。去年我没有注意这个问题，这是应该记取的教训。”"},{"type":"paragraph","text":"在座谈中大家还认为：好八连的作风所以能够一代代传下去，除了思想工作做得好，还有一条最重要的原因就是干部处处做战士的表率。测地连副指导员谭远清说：“过去有些事情自己说到了，可是没有做到。战士们不仅看你怎样说，还要看你怎样做，你自己没有做到，怎能带动战士！无怪我的工作没有力量。今后，我一定以好八连的干部为榜样，改进自己的思想作风和工作方法。” （王宜昌）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"771fc5551b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
