script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一个与工农相结合的好青年","authors":[],"dates":[{"year":1976,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一个与工农相结合的好青年"},{"type":"paragraph","text":"辽宁省新金县唐家房公社下张生产队的贫下中农，都称赞下乡知识青年王永惠，是一个与工农相结合的好青年。"},{"type":"paragraph","text":"小王是一九六九年下乡的。在农村，他虚心接受贫下中农的再教育，努力学习革命理论，阶级斗争和路线斗争觉悟不断提高。"},{"type":"paragraph","text":"一九七一年秋天，王永惠担任了下张生产队的队长。当时，下张生产队是个后进队，粮食亩产只有二三百斤。王永惠坚信：只要按照毛主席的革命路线办事，后进的面貌一定能改变。"},{"type":"paragraph","text":"在大队党支部的领导下，王永惠以阶级斗争为纲，坚持党的基本路线，组织群众在政治夜校里认真学习马列著作和毛主席著作，深入进行社会主义思想教育，狠批资本主义倾向。通过学习和批判，外流的人员回来了，资本主义倾向刹住了，干部、群众提高了社会主义积极性，掀起了学大寨的高潮。这一年，从六月份起，一连几十天没下一滴雨。面对严重干旱的威胁，王永惠和干部们组织社员学习大寨贫下中农艰苦创业的革命精神，全队男女老少，起早贪黑，挑水抗旱。王永惠虽然膀关节患有慢性病，但是他一根扁担不离肩，带头大干。在全队干部、群众的努力奋战下，终于战胜了特大干旱，迎来了丰收。这一年，全队的粮食亩产跨过了《纲要》，达到四百二十斤。"},{"type":"paragraph","text":"王永惠在成绩面前不停步。他和贫下中农一起，认真总结经验，坚持深入开展批林批孔运动，革命和生产的形势越来越好。一九七四年，粮食亩产跨过“黄河”，全队实现了一人一猪。去年春天，有人向王永惠建议搞烧碱的副业，说这是个“来财买卖”，原料燃料都可以想办法弄到。王永惠了解到，要搞原料就得套购，破坏国家计划，就断然拒绝了这个“来财买卖”。他积极引导群众，利用本地资源，办起了条织、草织副业。路线端正，生产跃进。去年，全队的粮食总产达到了十六万斤，平均亩产七百二十五斤，比一九七一年提高了一点五倍。"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，王永惠和贫下中农一起，口诛笔伐，批判邓小平反革命的修正主义路线和反对社会主义新生事物的罪行，更加坚定了他与工农相结合一辈子的决心。　本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"856ef56327"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
