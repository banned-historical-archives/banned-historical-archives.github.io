"金辛"],"dates":[{"year":1952,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“无罪的人”可以帮助我们和资产阶级划清思想界限"},{"type":"paragraph","text":"编辑同志：我认为“无罪的人”是一部带有积极教育意义的优秀影片。从影片中的女主角克鲁契宁娜和她的儿子聂兹那莫夫一生所遭受的悲惨命运，使我们很快联想到旧中国的妇女儿童，他们不也是经常遭受着歧视、玩弄和摧残吗？这部影片深刻地揭露了旧俄贵族和资产阶级的丑恶面貌，因此，它同样能够帮助我们认识中国的封建地主和资产阶级的丑恶面目。在“三反”“五反”运动中放映这部影片，它对于我们认识和划清资产阶级的思想界限，是有莫大帮助的。"},{"type":"paragraph","text":"翦天予"},{"type":"paragraph","text":"编辑同志：我以紧张、激动的心情，看完了苏联影片“无罪的人”。好像影片里的事情，不是发生在很远、很久以前的帝俄时代，而是发生在不久以前的蒋介石匪帮统治的时代。在那个人吃人、人压迫人的社会里，多少母亲被迫失去了儿子，多少孤儿尝尽了人间地狱的痛苦。当时许多所谓私生子不能抬起头来见人，不能直起腰来说话，他们体会不到什么是爱，他们只有仇恨。这种情况完全是摩罗夫一类人物造成的。从摩罗夫身上，我们看到了没落的剥削阶级的肮脏灵魂。"},{"type":"paragraph","text":"金辛"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9078a609a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
