ors":[],"dates":[{"year":1983,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"改革教学加强干部正规化培训"},{"type":"paragraph","text":"叶剑英赵紫阳李先念给全国党校工作会议祝词"},{"type":"paragraph","text":"新华社北京2月22日电　叶剑英、赵紫阳、李先念同志在第二次全国党校工作会议开幕之际，分别给会议写来了祝词。"},{"type":"paragraph","text":"叶剑英同志的祝词说：“中央党校由短期轮训干部转向正规化培训干部，已经在改革中起了带头作用，值得我们大家学习。望通过这次会议更好地总结经验，不断提高教学质量，为党源源输送既有高的马克思主义、毛泽东思想的政治思想水平，又有精的文化科学技术知识的干材；并推动各级党校的教学改革。”"},{"type":"paragraph","text":"赵紫阳同志在祝词中说，“希望中央党校和各级党校认真总结经验，改革教学工作，加强干部的正规化培训，既要对干部进行马列主义、毛泽东思想的基本理论的教育，又要丰富他们有关经济建设的知识，提高领导现代化建设的水平和管理能力，为干部队伍的革命化、年轻化、知识化、专业化做出更大的贡献。”"},{"type":"paragraph","text":"李先念同志的祝词说：“我们党历来是重视党校工作的，十一届三中全会以来，党校工作有了很大进步。为了适应全面开创社会主义现代化建设新局面的需要，党校的教学也要进行改革，进一步提高教学质量，为党培养出更多的懂得马列主义、毛泽东思想和社会主义建设规律的干部。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f2b0cec05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
