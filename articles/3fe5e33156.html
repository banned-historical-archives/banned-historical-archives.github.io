<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"cnd","name":"文革博物馆","internal":false,"type":"db","official":false,"author":"","article":{"title":"复旦大学已调查到的文革死亡记录","authors":["佚名"],"dates":[],"comment_pivots":[],"comments":[],"is_range_date":false,"description":"","page_start":0,"page_end":0,"parts":[{"text":"１９６６年，物理系教师毛青献，被说成“资产阶级知识分子”，指控他讲过“黑话”。他在复旦大学的灯光球场被“斗争”，身上浇了墨汁。毛青献不堪侮辱，在学校跳楼身亡。","type":"paragraph"},{"text":"１９６６年，谈家桢教授的妻子傅曼芸被“斗争”后，不堪屈辱，自杀身亡。","type":"paragraph"},{"text":"１９６６年，中层干部叶绍箕被“斗争”后自杀身亡。","type":"paragraph"},{"text":"１９６６年８月８日上午，化学系教授赵丹若被化学系的学生“斗争”，戴高帽，罚跪，脸上涂黑，游街，并且被打。“斗争会”开了一个小时二十分钟。“斗争会”结束后不久，赵丹若倒地气绝身亡。","type":"paragraph"},{"text":"１９６７年，新闻系副主任伍必熙，在复旦大学第八宿舍３号楼西侧４楼跳楼自杀，尸体无人收拾，在３号楼下的水泥地上整整放了近一天。","type":"paragraph"},{"text":"１９６７年，化学系总支副书记戚翔云（住复旦大学第五宿舍）在“隔离审查”中跳楼自杀身亡。","type":"paragraph"},{"text":"１９６８年５月１５日，化学系教授严志弦被毒打致死。红卫兵把打得还剩一口气的严志弦教授架到家门口，大声砸门，然后就把重伤的严志弦撂下就走了。他的妻子说，早晨出去还是活活的一个人，回来还没过门槛，就咽气了。","type":"paragraph"},{"text":"１９６８年１１月３０日，中文系主任朱东润之妻邹莲舫，因丈夫被打成反动学术权威，她作为家庭妇女也遭到复旦宿舍居民批判，并被罚带病打扫宿舍大院。１９６８年１１月３０日含冤自缢。死后还遭到批判，定为“畏罪自杀”。","type":"paragraph"},{"text":"１９６８年，外文系教授樊英被迫害自杀身亡。","type":"paragraph"},{"text":"１９６８年，生物系教授焦启源（住复旦第九宿舍），在“隔离审查”时自杀身亡。","type":"paragraph"},{"text":"１９７０年，上海复旦大学附属幼儿园园长、共产党支部书记李秀英（家住复旦第四 宿舍Ｂ区１４号），惨遭迫害后在复旦学生楼３楼跳楼自杀。","type":"paragraph"},{"text":"文革中，历史系教师范明如自杀身亡。","type":"paragraph"},{"text":"文革中，历史系共产党总支书记吴维国自杀身亡。","type":"paragraph"},{"text":"文革中，历史系教师陈显道自杀身亡。","type":"paragraph"},{"text":"文革中，体育教师钱行素因其曾任“东亚体育学校”校长的丈夫无辜被判刑，她受牵连被迫害，绝望中钱行素在厕所上吊自杀身亡。","type":"paragraph"},{"text":"文革中，副校长李铁民自杀身亡。","type":"paragraph"},{"text":"文革中，干部郭仁杰自杀身亡。","type":"paragraph"},{"text":"文革中，外语系刘德中教授夫妇自杀身亡。","type":"paragraph"},{"text":"复旦大学附属中学教导主任朱本初被“批斗”和关押和殴打，他从学校的二楼跳下死亡。","type":"paragraph"},{"text":"————————————————————————————————————本期编辑：      《华夏文摘》执行编辑：      《ＣＮＤ》总编：华新民（美国）    思语（美国）           陈天寒（美国）国际统一刊号 ~}Issn  1021-8602投稿专用地址：~}hxwz@cnd.org  ~{其它事项请电邮：~}cnd-cm@cnd.org如需有关《ＣＮＤ》和《华夏文摘》各种免费期刊和服务的信息，获取中文文件：~}hxwz-info@cnd.org  ~{英文文件：~}cnd-info@cnd.org《华夏文摘》万维网服务站（ＷＷＷ）地址：ｈｔｔｐ：／／ｗｗｗ．ｃｎｄ．ｏｒｇ／————————————————————————————————————\u003c/pre\u003e\u003c/html\u003e","type":"paragraph"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fe5e33156"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
