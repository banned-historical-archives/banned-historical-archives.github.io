谣和破坏案件178起","authors":[],"dates":[{"year":1954,"month":11,"day":16}],"is_range_date":false,"parts":[{"text":"广西邑宁专区在粮食统购中发现各种造谣和破坏案件178起","type":"title"},{"text":"【广西分社16日讯】桂西僮族自治区邑宁专区在粮食统购过程中，敌人的造谣、破坏日趋严重。自粮食统购开始至11月13日止，据15个县的不完全统计：共发现各种造谣、破坏案件178起。其中凶杀1起、纵火12起、伏击干部1起、割电线18起、贴反动标语、造谣等案件88起，打击干部、歪曲政策和未查明的破坏案件有72起。","type":"paragraph"},{"text":"敌人的造谣及反动标语的内容主要是反对我解放台湾，如将我们的标语“一定要解放台湾”改为“不要解放台湾”，又说：“美国运了很多东西到台湾，台湾解放不了。”其次是破坏互助合作组织，如武鸣四区准备转社的组员房子被敌人纵火烧毁。","type":"paragraph"},{"text":" （刘远修据自治区粮食工作简报编写）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年11月24日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baa47f79f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
