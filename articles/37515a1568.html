"dates":[{"year":1972,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年十一月二十三日电　出席联合国大会第二十七届会议的中华人民共和国代表团团长、外交部副部长乔冠华，以及部分顾问和工作人员丁原洪、程远行、李宝成、沈若芸、罗旭、张允义，今天下午乘专机回到北京。"},{"type":"paragraph","text":"到机场迎接的有军委副主席叶剑英，外交部部长姬鹏飞，副部长韩念龙、仲曦东、马文波、何英、符浩、余湛，部长助理章文晋、王海容，外贸部副部长周化民，外经部副部长陈慕华，以及有关方面负责人邝任农、周发言、缪海稜、戴征远、岳志坚、李青川、丁国钰、杨骥、周秋野、安致远、王栋、李庭荃、彭华、曹克强、何功楷、沈韦良、龚普生、陈德和、王明修、朱传贤、张占武等。"},{"type":"paragraph","text":"乔冠华副部长回国途中先后访问了英国、法国、罗马尼亚。"},{"type":"paragraph","text":"英国驻中国大使艾惕思，法国驻中国大使马纳克，罗马尼亚驻中国大使馆临时代办基伏，也到机场迎接。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37515a1568"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
