script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广西省委批判右倾思想  决定开展冬季大生产运动","authors":[],"dates":[{"year":1957,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广西省委批判右倾思想"},{"type":"paragraph","text":"决定开展冬季大生产运动"},{"type":"paragraph","text":"本报南宁电　中共广西省委在10月25日晚召开的电话会议，要求全省各地在今冬明春开展一个群众性的大规模的五大生产运动。五大生产运动的内容是：兴修水利、大力积肥、冬种冬耕、护林造林、以养猪为主的副业生产。全省在今冬明春将扩大灌溉面积五百万亩，其中抗旱能力在五十天以上的灌溉面积三百五十万亩；冬种面积一千零六十三万亩，其中粮食作物五百五十八万亩，绿肥二百二十五万亩，其他油菜、冬种烤烟、饲料、蔬菜等二百八十万亩；造林五百万亩（不包括国营林场）。中共广西省委第一书记刘建勋在会议上的讲话中号召各地根据三中全会精神，在今冬明春掀起一个大生产高潮。刘建勋指出，目前，不少领导机关和各级干部在农业生产问题上有右倾保守思想，劲头不大，害怕冒进，以为计划订得愈保守愈好。刘建勋要求各级党委必须使广大干部充分估计到今年农村经过整风和大辩论后，必然会大大鼓舞农民的生产积极性，必须教育干部发扬共产党人不怕任何困难的精神，勇敢向前迈进。为了掀起一个生产大高潮，各地要在进行两条道路的大辩论以后，开展一个关于全国农业发展纲要中的四十条的大辩论。各个地委负责同志在发言中对开展今冬明春的五大生产运动表现了坚强的信心。宜山地区的冬种任务，原来分配的是二百三十三万亩，但这个区却自动增至二百六十五万亩；造林任务原来分配的是一百二十五万亩，但这个专区却准备造林一百五十万亩；全区兴修水利灌溉面积也准备达到一百二十万亩。桂西僮族自治州各省属县的冬种任务，原来分配的是一百五十万亩，但这些地区却准备冬种二百万亩。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘建勋","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27fc87bd7c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
