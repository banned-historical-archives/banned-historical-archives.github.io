,"authors":["新华社"],"dates":[{"year":1952,"month":3,"day":30}],"is_range_date":false,"parts":[{"text":"上海市广泛发动群众检举违法资本家","type":"title"},{"text":"新华社","type":"authors"},{"text":"上海市六十万私营工厂商店的工人店员经有计划有步骤的教育和训练，积极投入“五反”运动。早在运动开始之前，上海市增产节约委员会曾广泛发动工人店员检举违法资本家的违法行为。到二月二十日止，经工人店员检举的材料已达三十多万件。为了有计划有步骤地发动群众参加“五反”运动，上海市首先训练了一万多工人店员，作为运动骨干。这些工人店员除一部分准备参加“五反”检查队外，其余全部投入发动群众工作。从三月十七日开始，市增产节约委员会集中了工人、青年、妇女各群众团体的力量，在市、区两级建立了专门发动群众的领导机构。市级群众团体并抽出了四百多干部帮助各区发动工人店员。到三月二十五日止，各区又先后训练了工人店员达四万多人。经过训练的工人店员，明确认识了“五反”运动的伟大意义和方针政策，对违法资本家非常仇恨。如鸿大船厂工人经训练后，控诉了该厂资方破坏治淮工程的罪行。鸿大船厂奸商在制造治淮挖泥船的炉子时曾大量偷工减料，以致炉子爆破，使工程延迟，造成严重损失。各区并举办了高级职员学习班，进行阶级教育，讲清政策，解除顾虑。在杨树浦等区高级职员学习班上，高级职员纷进行控诉，并表示要站稳立场，和工人团结一起，纷揭发资本家非法罪行。新成区高级职员学习班上，当场就有十五人检举了资方偷漏税款等违法行为。","type":"paragraph"},{"text":"上海“五反”运动正式开始时，全市工人店员有组织地收听了陈毅市长的广播报告，并普遍进行了讨论。中国纺织工会上海市委员会蓬莱区第四联合工作委员会全体职工和新成区“五反”工作队等十多单位的代表，在大会上听完陈毅市长的报告后，当场便呈递了为“五反”运动彻底胜利而斗争的保证书。会后新成区华达印刷厂六十多个职工集体写信给陈毅市长，保证要大胆检举资方违法行为。全市十三万搬运工人已掌握了大批违法商人大量盗窃国家资财的材料。他们表示，如果奸商不坦白，他们就坚决检举。新成区在陈毅市长报告后的第二天便接到工人店员的检举信一千七百多件。大中原厂会计孙寿民学习陈毅市长的报告后，立即检举了二十二件资方违法的事实。现在，全市大规模地发动群众的工作，正有组织有秩序地开展。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1952年3月29日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce71cc6a7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
