art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"面向实际立竿见影六连哲学班通过评演习学习毛主席军事思想","authors":["宋涛郑映荣"],"parts":[{"type":"paragraph","text":"8月15日的解放军报“思想战线”副刊曾经报道了0055部队一支队六连哲学班开学的消息。这些天来，这个哲学班已经在面向实际、认真学习毛主席军事思想的过程中，立竿见影地获得了令人兴奋的成效。"},{"type":"paragraph","text":"本来，六连哲学班的成立，就是在全连干部、战士迫切需要理论指导自己的实践的情况下出现的。过去，这个连的干部们，听说马克思主义哲学能帮助自己改进思想方法和工作方法，就想学点哲学，但又想到自己文化水平低，害怕学不好，便放弃了这个念头，直到今年“八一”前夕，连长刘德士和三排长陈金福，看到各地工人、农民学哲学的消息，并学习了他们的经验，又看到唯物辩证法在生产大跃进中所起的作用，才恍然大悟，提高了信心，增强了决心。他们研究后，认识到哲学本来就是无产阶级进行生产斗争和阶级斗争的思想武器，每个革命者事实上早就在运用了，仅仅是有人还不够自觉而已；认识到哲学并不那么神秘，只要有实际斗争经验的人，就一定能够学到。于是，他们向党支部提出了办哲学班的建议，得到了支部的大力支持和全连干部的积极响应。这个消息在士兵中间传开后，不少士兵也要求参加学习。这样，这个班便办起来了。现在这个班人数已从开学时的十二人增加到二十四人。"},{"type":"paragraph","text":"开学以来，他们紧紧掌握了面向实际和学以致用的原则，认真钻研了毛主席军事著作，处处以毛主席的思想来研究实际问题，改进训练方法与工作方法。"},{"type":"paragraph","text":"现在他们正在研究“中国革命战争的战略问题”的第一章“如何研究战争”，学习毛主席在战争问题上具体情况具体分析的思想。第一次讨论，就提出了本连训练中一个实际问题：某次连举行夜间进攻战术演习，二排担任正面主攻，一、三排是侧翼配合。当部队跑步进入冲锋出发位置后，一、三排即按事先侦察得到的情况，组织好火力掩护，迅速发起了冲击。可是，正面主攻的二排这时却停下来了，不管眼前的地形条件和侧翼已经打响的实际情况，还在按部就班地展开队形，指示冲击道路和冲击目标，等等。这次演习，由于协同动作不好，结果很不成功。在学习中，大家对这个事例进行了分析，认为处置每次具体的战斗，应该从具体情况出发，不能千篇一律，按事先拟定的方案、想定办事。大家认为，夜间攻击一定要迅速勇猛，出敌不意，二排所面临的情况是向眼前一个明显山头冲锋，虽然是夜间，目标、道路却看得极清楚，事先又有侦察得到的情况，因此没有必要再去拖延时间，影响战机。"},{"type":"paragraph","text":"这一讨论对全体干部都有很大的启发，尤其是二排副排长，他不仅弄清了这次演习失败的原因，也察觉到了以往士兵反映自己讲课不好懂的道理，原来就是自己犯了教条主义。因此，讨论后，他又把毛主席论战争规律的文章反复地读，读了想，想了再读，体会就越来越深了。他在自己的笔记中写道：“指挥与训练部队都必须运用毛主席的思想，把理论与当时当地的情况结合起来，经常用理论作指导去研究当时当地的情况，研究具体的战争规律。”经过这一番努力，他的思想和工作有了明显的进步。在最近一次夜间攻坚战术演习中，便能机动灵活地指挥部队动作，以很短时间准确地完成了全部的进攻、防御、反冲击等动作。他说：要照搬在步校学习的方案，单是组织战斗一项也要好几十分钟。"},{"type":"paragraph","text":"目前，六连党支部已指示这个哲学班，今后一个时期的学习目标，是深入地分析研究本连过去训练和工作中的教条主义表现，并找出克服的方法，以便提高连队的训练水平。 （宋涛 郑映荣）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"694ed64b3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
