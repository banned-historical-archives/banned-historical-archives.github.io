ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"给章士钊的信","alias":"","parts":[{"type":"paragraph","text":"给章士钊的信"},{"type":"paragraph","text":"（1966年1月12日）行严先生："},{"type":"paragraph","text":"一九六五年十二月十六日惠书及附件均已收读，极为感谢！三国志一部亦已收到，可作纪念，便时气代致谢意。大著《柳文指要》康生同志已读完交来叫，兹送上。有若干字句方面的意见，是否有当，请酌定。顺颂春安"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六六年一月十二日[1]章士钊，字行严，当时任全国人大常委会委员、中央文史研究馆馆长。"},{"type":"paragraph","text":"[2]《三国志》，西晋陈寿撰写的一部纪传体魏、蜀、吴三国史，分魏志、蜀志、吴志，共六十万卷。三志原本各自独立，后世将它合为一书。"},{"type":"paragraph","text":"[3]《柳文指要》，是章士钊所著的一部专门研究唐代文学家柳宗元文集的著作。1965年8月5日，毛泽东曾将这部书稿批转给中共中央书记处书记康生阅读。12月5日，康生给毛泽东写信说，“我读完之后，觉得主席八月五日信中对此书的评价，是十分中肯完全正确的。”“因此书有些人已知道主席看过，所以我提了几点意见，用纸条标出。请主席看看，是否需要作词句的删改。”《柳文指要》一书，后经作者修改，在1971年由中华书局正式出版。毛泽东全集第四十八卷"},{"type":"paragraph","text":"附件两纸，另康生同志来信\"一件，均附上。又及[1]指康生1965年12月5日给毛泽东的信。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":293},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1623639edc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
