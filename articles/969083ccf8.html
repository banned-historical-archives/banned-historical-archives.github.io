al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"给肃子升的信","alias":"","parts":[{"type":"paragraph","text":"给萧子升的信"},{"type":"paragraph","text":"（1916年2月19日）子升\"学长惠鉴："},{"type":"paragraph","text":"承上月三十日赐示，昨日始收到，敬悉一是。《甲寅》杂志第十一第十二两卷，欲阅甚殷，仍欲请兄剩暇向徐先生一借。星期日上午可否出城一游？如借得，即请携来；如无，则须借之杨先生。若是日天晴，可同往否？相违尺数日，情若千里三秋。肃此，敬颂"},{"type":"paragraph","text":"学安。不一。"},{"type":"paragraph","text":"弟泽东上言"},{"type":"paragraph","text":"二月十九日[1]子升，即萧子升。[2]杨先生，似指杨昌济，此时杨已从长沙城内迁至岳麓山下居住。"}],"authors":["毛泽东"],"dates":[{"year":1916,"month":2,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":218,"page_end":218},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"969083ccf8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
