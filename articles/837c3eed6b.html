s":[],"dates":[{"year":1975,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社万象一九七五年五月七日电　据《巴特寮新闻》报道，今年以来，四万多名在战争期间被美国和老挝极右派强迫迁入万象方面控制区的群众返回了他们在解放区的家园。"},{"type":"paragraph","text":"从今年一月底以来，返回川圹省解放区的群众共有两万三千多名；返回桑怒省解放区的有一万七千八百多名；从三月下旬到四月下旬的一个月内，返回琅南塔、沙耶武里和乌多姆塞三个省解放区的群众就有一万多名。在中、下寮各省，许多群众也纷纷返回家园，今年头三个月，仅返回甘蒙省解放区的群众就有一千六百多名。"},{"type":"paragraph","text":"返回家园的群众，受到了解放区各级政权和人民群众的热烈欢迎。解放区军民还积极帮助返回家乡的群众建造房屋，开垦荒地，安排生活。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"837c3eed6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
