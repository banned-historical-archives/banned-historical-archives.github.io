hors":[],"dates":[{"year":1966,"month":6,"day":3}],"is_range_date":false,"parts":[{"text":"中共中央关于文化大革命的八条指示（概  要）","type":"title"},{"text":"刘少奇主持中央政治局常委扩大会议拟定关于运动的“八条规定”。当时，中央曾指示各级党委“不仅参加运动，而且要负起领导责任”，但由于各校党组织普遍受到冲击，月初，中央决定向大中学校派出工作组，力求使运动有领导地进行。3日，又作出了“八条规定”，其中主要内容是：内外有别；大字报不要上街；开会要在校内开，不要开大规模的声讨会；不要上街示威游行；不要串联；不要包围黑帮住宅；防止坏人破坏；注意保密。这八条规定没有形成成文的规定，而是口头传达下去。在这期间，毛泽东在杭州，刘少奇多次给毛泽东打电话请示汇报，没有得到明确答复。4日，刘少奇、邓小平乘专机去杭州向毛泽东汇报情况，并请毛泽东回京主持工作，毛泽东委托刘少奇相机处理运动问题。","type":"paragraph"}],"comments":[],"origin":"根据首都揪斗批刘少奇联络总站编《刘少奇在无产阶级文化大革命中的反革命修正主义言论》，北京：1967年8月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f4a77f188"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
