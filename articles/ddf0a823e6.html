ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在中共中央书记处会议上的讲语","alias":"","parts":[{"type":"paragraph","text":"在中共中央书记处会议上的讲话！"},{"type":"paragraph","text":"（1939年4月5日）"},{"type":"paragraph","text":"（一）道德教育问题。今后教育要注意人格的教育与人格的陶冶，人格的教育即思想意识的锻炼。（二）新老干部问题。过去在干部中主要反对骄傲自大，这是当时的情形。现在新干部人数多了，要注意教育新干部。新老干部要结合起来，老干部是骨干，有经验，有办法，同时要欢迎新干部，帮助新干部。（三）抗大的工作。过去对于抗大的招生工作没有很好地组织，今后归干部教育部执行。抗大要组建图书馆，进行捐钱捐书。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央书记处会议上听取罗瑞卿关于抗大工作检查的报告后讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":4,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":274,"page_end":274},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddf0a823e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
