场送行","authors":[],"dates":[{"year":1972,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"出席第二十七届联合国大会"},{"type":"paragraph","text":"乔冠华等离开北京赴纽约"},{"type":"paragraph","text":"周恩来叶剑英李先念姬鹏飞等到机场送行"},{"type":"paragraph","text":"新华社一九七二年十月一日讯　出席联合国大会第二十七届会议的中华人民共和国代表团团长、外交部副部长乔冠华，今天凌晨乘专机离开北京，前往巴黎，然后赴纽约。"},{"type":"paragraph","text":"同机离开北京的代表团顾问和工作人员有：丁原洪、杨虎山、程远行、章含之、马杰先、李宝成、沈若芸、罗旭、张希先、倪华明、张允义。"},{"type":"paragraph","text":"随团新华社记者彭迪、钱行也同机前往。"},{"type":"paragraph","text":"前往机场欢送的有：国务院总理周恩来，军委副主席叶剑英，国务院副总理李先念，外交部部长姬鹏飞，副部长韩念龙、马文波、何英、符浩、余湛，部长助理章文晋、王海容，对外经济联络部部长方毅，对外贸易部部长白相国，以及有关方面负责人武衡、邝任农、杨德中、丁国钰、李青川、缪海稜、戴征远、杨骥、林佳楣、安致远、王栋、韩叙、陈德和、许寒冰、龚普生、王明修、张颖、凌青、翟荫塘、高梁、刘剑、张瑞霭等，以及离京人员的家属。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察和一些国家驻中国的使节，也前往机场送行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"611459be5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
