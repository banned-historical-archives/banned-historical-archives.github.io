":1968,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻上海外国语学院工宣队"},{"type":"paragraph","text":"上海汽车电机厂工人　赵国华"},{"type":"paragraph","text":"东方朝霞放异彩，"},{"type":"paragraph","text":"军号声声震天外，"},{"type":"paragraph","text":"工人宣传队员早出操，"},{"type":"paragraph","text":"迎着红太阳奔过来。"},{"type":"paragraph","text":"红艳艳的袖章手臂戴，"},{"type":"paragraph","text":"随身背起红色宝书袋，"},{"type":"paragraph","text":"胸前宝像金光闪，"},{"type":"paragraph","text":"毛主席面前站队来。"},{"type":"paragraph","text":"毛主席面前站队来，"},{"type":"paragraph","text":"心潮滚滚浪翻腾，"},{"type":"paragraph","text":"上层建筑咱占领，"},{"type":"paragraph","text":"伟大的历史使命肩上担。"},{"type":"paragraph","text":"“土”工人领导“洋”秀才，"},{"type":"paragraph","text":"浑身上下都是胆，"},{"type":"paragraph","text":"牛鬼蛇神一脚踢，"},{"type":"paragraph","text":"冰山绝顶也敢攀。"},{"type":"paragraph","text":"工人阶级上征途，"},{"type":"paragraph","text":"领导一切向前迈，"},{"type":"paragraph","text":"毛主席对我们最信任，"},{"type":"paragraph","text":"我们对毛主席最最忠。"},{"type":"paragraph","text":"彻底砸烂旧世界，"},{"type":"paragraph","text":"崭新的世界由我们来主宰，"},{"type":"paragraph","text":"革命意志坚如钢，"},{"type":"paragraph","text":"一定搞好上层建筑斗、批、改。"},{"type":"paragraph","text":"毛主席面前站队来，"},{"type":"paragraph","text":"心潮滚滚浪翻腾，"},{"type":"paragraph","text":"千歌万曲一个音，"},{"type":"paragraph","text":"毛主席万岁万万岁!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd97946b1f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
