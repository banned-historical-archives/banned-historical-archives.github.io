tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东才溪乡调查纪念馆新馆落成开馆等五则","authors":[],"parts":[{"type":"paragraph","text":"毛泽东才溪乡调查纪念馆新馆落成开馆"},{"type":"paragraph","text":"10月20日，位于福建上杭县的“毛泽东才溪乡调查纪念馆”新馆落成开馆。据上杭县政府介绍，新馆总投资2000多万元，占地面积9350平方米，设立毛泽东《才溪乡调查》纪念馆、“九军十八师”展览馆、才溪英雄烈士馆、今日才溪馆等4个馆。"},{"type":"paragraph","text":"（据新华社）"},{"type":"paragraph","text":"湖北蕲春县呈现大学生报名应征热"},{"type":"paragraph","text":"蕲春县人武部根据今冬征兵工作征集对象的新变化，突出大学生主体，积极联合县教育局、基层武装部、民兵连和大学生家长，采取打电话、上门宣讲等方式方法，激发了大学生应征热情，掀起了报名应征的热潮。目前，已有215名蕲春籍大学生报名应征，报名人数创历史新高。"},{"type":"paragraph","text":"（蓝健文）"},{"type":"paragraph","text":"武警江门市支队采取措施加大法制教育力度"},{"type":"paragraph","text":"武警广东省总队江门市支队坚持每月一堂法制教育课，通过“法律知识知多少”法律知识竞赛、“法在我心中”演讲比赛、专题辅导、案例剖析、警示宣传等形式，普及法律知识，并利用网络资源，及时刊登官兵学法、守法、用法的经验体会，强化了官兵的法纪观念和责任意识。"},{"type":"paragraph","text":"（阳树新）"},{"type":"paragraph","text":"莱州边检站开展口岸安全隐患排查行动"},{"type":"paragraph","text":"近日，山东莱州边检站组织开展口岸安全隐患大排查行动。在排查中，共巡查港区安全重点部位7处，检查进出港车辆104台次、人员192人次，核查现场作业人员363人，发现未持入港证件的作业人员2名，进一步规范了现场作业秩序，确保了口岸辖区安全稳定。"},{"type":"paragraph","text":"（张英杰）"},{"type":"paragraph","text":"晋源区人武部推行民兵干部“双带”工程"},{"type":"paragraph","text":"近年来，太原市晋源区人武部在专武干部、民兵干部中积极推行“带头创业致富、带领群众致富”工程，先后涌现出80多位带头致富的民兵干部，为全区的经济发展做出了应有的贡献。"},{"type":"paragraph","text":"（高百平、崔超）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70e8b0eeba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
