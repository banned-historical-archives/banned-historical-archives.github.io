" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji26","name":"毛泽东全集第26卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"致林彪、罗荣柜、萧克等电","alias":"","parts":[{"type":"paragraph","text":"致林彪、罗荣桓、萧克等电\""},{"type":"paragraph","text":"（1949年5月17日）"},{"type":"paragraph","text":"据刘伯承、邓小平等十六日电，南浔线上之桂敌已开始沿浠水及赣江西岸向南撤退。刘、邓已令陈兵团两个军的主力出丰城、高安之线，准备在赣江两岸兜截南撤之敌，配合十二兵团之作战。南浔线上之敌既已向南向西撤退，陈部已出赣西截敌，我们昨电叫你们令四十三军等齐干部然后前进，已不适用。你们应令四十三军不等干部到齐，即向南浔路前进，协同陈兵团歼灭逃敌。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致林彪、罗荣桓、萧克并告刘伯"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":401,"page_end":401},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c249c01282"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
