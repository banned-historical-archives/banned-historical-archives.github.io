ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"给戴毓本的信","alias":"","parts":[{"type":"paragraph","text":"给戴毓本的信"},{"type":"paragraph","text":"（1951年1月14日）毓本先生："},{"type":"paragraph","text":"十二月廿八日给我的信收到了，甚慰。假如你下了决心，又能吃苦，我同意你来北京进人民革命大学学习一时期，然后再做你所熟习的工作。或者不进学校，来京径做医务工作也好。来时可持此信向中共中央统一战线部李维汉部长接洽。如果你在湖南已有工作，并能安下去，则以不来为好。此复，顺致敬意"},{"type":"paragraph","text":"习梅兄同此。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十四日"},{"type":"paragraph","text":"[1]戴毓本，杨开慧在湖南长沙福湘女校、岳云中学读书时的同学，五四运动后曾在毛泽东创办的自修大学学习。"},{"type":"paragraph","text":"[2]习梅，即彭习梅，戴毓本的丈夫。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":541,"page_end":541},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fe24d4205"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
