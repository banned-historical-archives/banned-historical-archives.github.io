ors":["吕金庆","西南农学院"],"dates":[{"year":1957,"month":6,"day":9}],"is_range_date":false,"parts":[{"text":"再论“党中央应重新估价农民的革命性”","type":"title"},{"text":"西南农学院吕金庆","type":"authors"},{"text":"我们重申“党中央应重新估价农民的革命性”的意见，我们只要求党中央重新估价农民的革命性，我们认为：解放后，工人阶级“最革命”的因素的三大敌人的压迫没有了，一无所有的现状根本改变了；他们不仅在经济上翻了身也在政治上成了国家的领导阶级，他们与先进生产方式仍有密切连系，因此工人阶级反帝反封建的革命性在一定程度上削弱了，加以近几年来，工人阶级队伍本身在成员上有了很大的改变，因此工人阶级的革命性没有以前丰富了(在今天的社会主义建设中)，而且工人阶级的人还是少数，这是一个方面，也是中国的特点。另一方面，农民又在党的领导下完成了合作化，他们走资本主义的可能性完全被消灭了，然而他们在经济生活上改善却不大(甚至没有什么改善)，比起工人来说，是要“穷”一些，因此他们最迫切的要求社会主义，因此在行动上也就格外的积极(比如努力生产卖余粮，买公债等问题上)，因此我们说农民革命性比较稳步高涨了，不用说农民是占全国人口的大多数，所以我们要求党中央应该重新估价农民的革命性。","type":"paragraph"},{"text":"我们应该肯定党对于农业合作化的领导的必要和可能性；工人阶级的优越性等。只是由于和本文没有什么关系罢了，我们请大家充分的考虑我们的题意。","type":"paragraph"},{"text":"我们认为工农联盟的内容在实际生活中体现得不够，一方面是农民没有充分参加国家大事的讨论，譬如在全国人民代表大会中农民代表不多(现我们缺乏具体数字)，而且有很多农民代表是党员，党员是属于工人阶级的先进分子。在统一战线中也没有农民统战的内容。另一方面我们承认工农生活应有差异，但目前的差异过大了。也因为农民负担过重；这因为农产品价格太低(而农民和工人的劳动量是差异不大的)，因此建议党中央扩大农民参政机会和适当提高农产品价格，在农业社贯彻党的领导，老农治社扩大社员民主权利。我们的意见中缺乏数字是由于我们的社会地位所决定的。","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第一集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36f0f7d0de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
