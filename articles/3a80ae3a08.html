ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"和谢伟思的谈话","alias":"","parts":[{"type":"paragraph","text":"和谢伟思的谈话!"},{"type":"paragraph","text":"（1945年4月4日）"},{"type":"paragraph","text":"中国共产党对美国的政策，是寻求友好的美国支持在中国实现民主和在对日作战中进行合作。对国民党的政策仍旧是：一方面批评并试图激励其进步，另一方面提出能够作为实现真正统一、民主和使全国一切力量致力于赢得战争的基础的妥协。这个妥协必须意味着国民党和蒋介石专政的结束，这个妥协必须包括承认共产党军队是国家军队的一部分，解放区政权是合法的地方政府。对于国民，我们不打第一拳，不放第一枪。但是蒋介石现在计划召开的国民大会一定会带来内战。一旦受到攻击，我们将予以反击。一旦中国发生内战，希望美国对国共双方采取不插手政策。[]这是毛泽东在住处和周恩来、朱德、董必武同谢伟思进行的最后一"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":4,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":377,"page_end":377},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a80ae3a08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
