dates":[{"year":1976,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上钢五厂供应科工人理论小组，认真学习列宁的《卡尔·马克思》和毛主席的《矛盾论》、《关于正确处理人民内部矛盾的问题》等有关著作，集录了革命导师有关论述社会主义革命的性质、对象、任务、前途以及阶级斗争规律、阶级关系变动等六个方面的语录，并运用马克思主义哲学思想，讨论和研究社会主义时期阶级关系的变化，开展宣讲活动。他们写出了《从阶级关系的变化看资产阶级就在共产党内》、《从邓小平继承和发展“二月提纲”看走资派还在走》、《从\u0026lt;关于加快工业发展的若干问题\u0026gt;看党内确实有资产阶级》、《从走资派搞复辟的危险性看文化大革命不搞不行》等四篇宣讲稿，并分头到全科九十八个班组进行宣讲。通过宣讲，广大工人懂得了“革命中的阶级对比关系是随着革命的进展而变化的”，(《谈谈全民革命的问题》，《列宁全集》第十二卷第三九三页)进一步认清了资产阶级确实就在共产党内，激发了对党内最大的不肯改悔的走资派邓小平的无产阶级义愤，人人口诛笔伐，掀起了批判邓小平的新高潮。广大工人和理论队伍的同志深有体会地说:“毛主席关于资产阶级就在共产党内的科学论断，是在深刻分析了社会主义时期阶级关系的变化的基础上提出来的，是对马克思列宁主义的重大发展。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4f1cc6425"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
