":[{"year":1969,"month":10,"day":18}],"is_range_date":false,"parts":[{"text":"第一号号令","type":"title"},{"text":"1969年10月18日21时半林副主席指示﹕","type":"appellation"},{"text":"一﹑近两天来﹐美帝苏修等有许多异常情况﹐苏修所谓谈判代表团预定明（１９） 日来京﹐我们必须百倍警惕﹐防止苏修搞欺骗﹐尤其19﹑20日应特别注意。","type":"paragraph"},{"text":"二﹑各军区特别是「三北」各军区对重武器﹐如坦克﹑飞机﹑大炮要立即疏散隐蔽 。","type":"paragraph"},{"text":"三﹑沿海各军区也应加强戒备﹐防止美帝﹑苏修可能突然袭击﹐不要麻痹大意。","type":"paragraph"},{"text":"四﹑迅速抓紧布置反坦克兵器的生产﹐如四O(毫米)火箭筒﹑反坦克炮等（包括无后座力 炮和八五[毫米]反坦克炮）。","type":"paragraph"},{"text":"五﹑立即组织精干的指挥班子﹐进入战时指挥位置。","type":"paragraph"},{"text":"六﹑各级要加强首长值班﹐及时掌握情况。 执行情况﹐迅速报告。","type":"paragraph"}],"comments":[],"origin":"根据文件原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"756ea15420"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
