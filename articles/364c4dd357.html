":["陈蓬生"],"dates":[{"year":1956,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"广西有些社员要求退社","type":"title"},{"text":"陈蓬生","type":"authors"},{"text":"新华社南宁28日讯：最近两个多月来，广西省平南、昭平、陆川、玉林、凌乐等县，已有二百来户社员要求退社。","type":"paragraph"},{"text":"田东县三百乡有四个在今年2月间建立的初级社（瑶族人民组成）已经散伙。闹退社的社员，大都是十来户到几十户集体提出要求，有的集体到地委、县委农村工作部去要求批准退社。","type":"paragraph"},{"text":"退社的原因主要如下：","type":"paragraph"},{"text":"1·农业社的生产搞得不好，社员情绪不安。劳动管理不好，社员怕吃苦。","type":"paragraph"},{"text":"2·社里对生活困难的社员照顾不够，对社员家庭副业生活没有很好安排。","type":"appellation"},{"text":"3·社员对粮食统销不满。","type":"paragraph"},{"text":"4·社干领导作风不民主。","type":"appellation"},{"text":"5·社建工作粗糙，思想发动不充分，生产资料评价入社不合理，建社后对觉悟较低的社员没有及时进行教育，对建社时遗留的问题没有及时解决。","type":"paragraph"},{"text":"目前，还有些社员表现动摇，存在着“退不退，看分配”的思想。","type":"paragraph"},{"text":"来源：根据1956年6月28日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西有些社员要求退社","authors":["陈蓬生"],"dates":[{"year":1956,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"广西有些社员要求退社","type":"title"},{"text":"陈蓬生","type":"authors"},{"text":"新华社南宁28日讯：最近两个多月来，广西省平南、昭平、陆川、玉林、凌乐等县，已有二百来户社员要求退社。","type":"paragraph"},{"text":"田东县三百乡有四个在今年2月间建立的初级社（瑶族人民组成）已经散伙。闹退社的社员，大都是十来户到几十户集体提出要求，有的集体到地委、县委农村工作部去要求批准退社。","type":"paragraph"},{"text":"退社的原因主要如下：","type":"paragraph"},{"text":"1·农业社的生产搞得不好，社员情绪不安。劳动管理不好，社员怕吃苦。","type":"paragraph"},{"text":"2·社里对生活困难的社员照顾不够，对社员家庭副业生活没有很好安排。","type":"paragraph"},{"text":"3·社员对粮食统销不满。","type":"paragraph"},{"text":"4·社干领导作风不民主。","type":"paragraph"},{"text":"5·社建工作粗糙，思想发动不充分，生产资料评价入社不合理，建社后对觉悟较低的社员没有及时进行教育，对建社时遗留的问题没有及时解决。","type":"paragraph"},{"text":"目前，还有些社员表现动摇，存在着“退不退，看分配”的思想。","type":"paragraph"}],"comments":[],"origin":"根据1956年6月28日新华社《内部参考》。","comment_pivots":[],"description":
