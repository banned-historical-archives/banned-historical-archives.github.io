tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我军事友好代表团会见巴基斯坦总统齐亚·哈克总统同张才千团长会谈","authors":[],"parts":[{"type":"paragraph","text":"据新华社伊斯兰堡十月二十日电 以中国人民解放军副总参谋长张才千为团长、中国人民解放军空军副司令员曹里怀为副团长的中国军事友好代表团，十月二十日晚在拉瓦尔品第会见了巴基斯坦总统兼陆军参谋长齐亚·哈克。"},{"type":"paragraph","text":"齐亚·哈克总统请张才千团长转告华国锋总理和邓小平副总理，他再次邀请他们在合适的时候访问巴基斯坦。"},{"type":"paragraph","text":"参加会见的有：巴基斯坦陆军副参谋长伊克巴尔汗、海军参谋长尼亚齐、空军参谋长沙米姆。会见后，齐亚·哈克和夫人设宴招待中国军事友好代表团全体成员。"},{"type":"paragraph","text":"据新华社伊斯兰堡十月二十一日电 巴基斯坦总统兼陆军参谋长齐亚·哈克同中国军事友好代表团团长、中国人民解放军副总参谋长张才千今天在拉瓦尔品第联合参谋总部举行会谈。"},{"type":"paragraph","text":"会谈是在友好的气氛中进行的。双方就进一步加强中巴两国的友好关系和共同关心的问题交换了意见。"},{"type":"paragraph","text":"巴基斯坦国防部长塔尔普尔今天会见并设宴招待中国军事友好代表团。双方进行了友好的谈话。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4d47459b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
