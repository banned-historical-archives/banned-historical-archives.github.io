uthors":[],"dates":[{"year":1949,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共广州市委会"},{"type":"paragraph","text":"召开地方党员大会"},{"type":"paragraph","text":"叶剑英代表中共中央向坚持地下斗争的党员致敬"},{"type":"paragraph","text":"【新华社广州三日电】中国共产党广州市委会于上月三十日召开本市地方党员大会，出席全市党员三百三十余人。中共中央华南分局第一书记叶剑英、第三书记方方均亲临参加。叶剑英在掌声雷动中起立讲话。他首先代表中共中央向广州市坚持地下斗争的全体党员致敬。他指出今天这么多的同志聚在一起，是一个胜利的大会师。这个伟大胜利是和党中央正确的政治路线和毛主席的正确领导分不开的。接着他详细阐释了目前的形势和人民民主专政的意义，着重说明了思想学习和政策学习的重要。号召大家虚心学习。他并希望大家完成三个任务：（一）巩固革命秩序，肃清匪徒特务；（二）密切联系群众，团结各阶层的革命人民，孤立反动派；（三）和广大人民团结起来，大力发展生产。继由方方和朱光分别就公开党的问题和党员在今天的新形势下的责任问题讲话。大会在宣布了中共广州市委员会的名单后宣告结束。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcea669b1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
