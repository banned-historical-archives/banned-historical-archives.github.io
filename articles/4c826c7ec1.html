s":[{"year":1976,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海医疗器械厂广大职工，在厂党委带领下，奋战十天十夜，赶制出了手术床一百台，支援抗震救灾斗争。"},{"type":"paragraph","text":"今年七月底，这个厂接受了为灾区生产一百台手术床的任务。一台手术床有一千二百个大小零件，按照正常的生产周期，要完成这些任务至少需要一个月，厂党委立即召开了全厂职工大会进行动员，工人们决心同邓小平反革命的修正主义路线对着干。在兄弟单位的配合下，经过全厂职工的努力奋战，终于提前完成了赶制一百台手术床的任务。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c826c7ec1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
