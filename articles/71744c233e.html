script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度《组织家》周报发表文章  揭露苏联对印度的剥削和控制","authors":[],"dates":[{"year":1979,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度《组织家》周报发表文章"},{"type":"paragraph","text":"揭露苏联对印度的剥削和控制"},{"type":"paragraph","text":"新华社北京三月十日电  新德里消息：印度《组织家》周报三月九日发表全印民主律师协会主席卡特朱的一篇文章，揭露苏联剥削和控制印度。"},{"type":"paragraph","text":"文章说：“苏联在巴劳尼修建的炼油厂使印度花费了七千六百万美元的巨款。这家炼油厂的年炼油能力为二百万吨。而美国菲利普斯石油公司修建的炼油能力为二百五十万吨的炼油厂只花费了三千六百万美元。”"},{"type":"paragraph","text":"文章说：“其他工业例如钢铁、药品等也是一样，苏联以真正的朋友给予便宜‘援助’的面貌出现，然而一打进印度经济，就把价格提到国际水平甚至更高。”文章说：“波卡罗钢厂就是苏联真实意图的一个明明白白的证据。这家工厂第一期工程生产能力为一百七十万吨，印度花费了四十八亿六千万卢比。而法国在敦刻尔克和日本在福山建造的年生产能力为一百五十万吨的钢厂分别只花费了十四亿四千万卢比和十四亿八千万卢比。这说明俄国人向印度索取了三倍于国际价格的费用。”"},{"type":"paragraph","text":"文章说：“苏‘援’工程一律具有一种‘监狱看守’性质。这就是说，在建成后的几年中仍由俄国人保持对工厂的完全控制，而不交给印度人。”它说：“一旦得到了苏‘援’，就会造成国家永远依赖苏联的局面，因为在工厂建成后，还不得不长期向苏联购买备件和维护设备。”文章指出，苏援工程提供的机器设备还是一些过时的技术，三等的货色。"},{"type":"paragraph","text":"文章指出：“关于印苏贸易，一般可以说是属于传统的新殖民主义类型。”文章说，苏联还把低价从印度买进的初级产品，转手以高价卖给西欧，而苏联卖给印度的货物价格一般要比西方高百分之十五至二十。"},{"type":"paragraph","text":"文章在谈到苏印武器交易的问题时说，苏联把它的空军使用了二十年的过时的米格21飞机以高价向不发达国家倾销。这些飞机的部件还必须来自苏联。文章说：“毫无疑问，如果俄国切断备件供应，印度空军的活动能否维持一个月以上就是个疑问。”文章说：“在海军方面也对苏联有很大的依赖性，最新的舰只，包括潜艇、导弹艇和护卫舰，几乎全都是苏联建造的。这些军舰的修理，甚至连检修也必须由驻在维沙卡帕特南的苏联人员（目前约有七十名俄国人）和驻其他港口的苏联人员来干。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71744c233e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
