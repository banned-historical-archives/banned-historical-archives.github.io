dates":[{"year":1955,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市私立卫平小学代理校长　赵志骏"},{"type":"paragraph","text":"10月29日文汇报揭发了我校前教师刘梅华摧残儿童的罪恶行为，是完全正确的也是必要的。"},{"type":"paragraph","text":"党和政府是如此信任和期待着我们教育工作者能为社会主义事业培养出全面发展的建设人材，而刘梅华却以封建主义的观点、法西斯的手段摧残着下一代。她的罪恶行为令人不能容忍。"},{"type":"paragraph","text":"刘梅华的恶劣行为充分说明了她不仅不配做一个人民教师，而且也违反了国家严禁体罚儿童的法令。我们完全拥护人民政府坚决把她清洗出人民教师队伍的决定。"},{"type":"paragraph","text":"这一事件也给我们一次深刻的教育。特别是作为学校负责人的我，以前对刘梅华的体罚行为没有引起足够的重视。这样也给刘梅华能以较长期的矇骗隐蔽其体罚儿童的罪行。去年发现了刘梅华的体罚行为后，我们行政也没有及时采取积极措施，而只是停留在一般化教育方式上面。直到上学期，才在全体教师会议上进行了公开的揭发和严格的批评，并开始着手收集具体材料。这种对于封建的、法西斯的奴化教育和摧残儿童的恶劣行为不进行斗争的软弱态度，说明了我在贯彻国家严禁对儿童体罚的法令中，在保护儿童的成长中，不是采取认真负责的态度。同时也说明了我在思想上对剥削阶级教育观点和方法的残余影响估计不足，没有真正的全面的树立起热爱儿童、热爱教育事业的观点。这种思想的实质也就是以为随着旧社会制度的死亡，旧教育观点和方法也会自然死亡。这是一种严重的右倾思想。事实证明旧教育观点是会长期的潜伏在人们思想深处的。它必须要通过不断的斗争和批判，才能清除。要是一旦有适合它发育的气候和土壤，它就会发出臭气，甚至得到滋长。而我存在着的右倾思想、对恶劣行为采取软弱态度与平时不深入教学的工作作风，却正好是帮助它滋长的气候和土壤。"},{"type":"paragraph","text":"我们一定要从这一事件中吸取教训。根据上级指示，进一步领导全体教师检查存在我校中的旧教育观点和方法的残余影响，继续深入批判，充分认识它的危害性；结合‘小学教学计划’的贯彻和‘小学生守则’的全面推行，在实践中不断清除剥削阶级教育思想的影响，提高教师们的政治觉悟，树立以社会主义精神教育儿童的观点。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d5d271f00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
