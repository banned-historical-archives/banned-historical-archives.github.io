<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南党内外人士对人民日报社论的反应","authors":[],"dates":[{"year":1957,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"云南党内外人士对人民日报社论的反应","type":"title"},{"text":"新华社昆明12日电　云南党内外人士读了近几天的人民日报社论，普遍认为是“收”了。","type":"paragraph"},{"text":"一些右倾派分子尽力把开展正确的反批评和我们对右派的反击曲解为打击报复。他们公然说：这一下看到共产党整风的“库存”了，原来整风的目的如此！“不仅要‘收’，而且也开始‘整’了”。","type":"paragraph"},{"text":"云南大学贴出大字报提出质问：“共产党整自己的风还是整别人？”昆明中学中有人说：“原说放、收、整三阶段论，固然不出所料”。右派中有的人原来准备猛烈攻击我党的，现在却表示“话已都说完”，不再发言。昨日统战部四个小时的座谈会上，发言者寥寥。","type":"paragraph"},{"text":"中间分子，反驳反动言论的人已经增多，有人认为社论很好，形势会急转直下。但是也有不少糊涂观念：","type":"paragraph"},{"text":"一、对我反击右派和所谓“堵塞言路”分不清楚，认为我们反击就是压制批评，还说我们是一面说大“放”大“鸣”，一面又在筑墙。","type":"paragraph"},{"text":"二、认为反击的时间过于早了。","type":"paragraph"},{"text":"三、有的人担心自己的发言中也有片面之处。有人说，我也批评过“党员专权”，是否会和储安平的“党天下”拉成一起。有人说我批评过党员脱离群众，是否会把我当作葛佩琦看待。","type":"paragraph"},{"text":"党内兴奋，一般表现是扬眉吐气，人心大快但是也人两种值得注意的情绪：","type":"paragraph"},{"text":"第一，认为火已经烧不着自己，因此松了气。把反击右派和我们诚意接受正确批评和如何对怀着善意的不正确批评混淆起来。","type":"paragraph"},{"text":"第二，一般党员中不认识这是反击右派，说：原说要大“放”，言者无罪，不会报复，但是却马上来社论和工人抗议，觉得说不过去。","type":"paragraph"},{"text":"此外，一些在运动中叛变跟着右派走的党团员，有作检讨的；也有写信给支部请求审查和说明情况的。","type":"paragraph"},{"text":" 来源：　　1957年6月14日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"268721e046"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
