"https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4.pdf"],"article":{"title":"发起“文化书社”缘起（摘要）","alias":"","parts":[{"type":"paragraph","text":"逐限敬尧文电"},{"type":"paragraph","text":"（一九二○年一月）"},{"type":"paragraph","text":"·……吾湘不幸，受兵凶，连宜数年，疮痰满目。上岁张敬尧入湘以后，纵狠之兵，奸焚却杀，聘猛虎之政，缝刮靠捐。卖公地，卖湖田，卖矿厂，卖纱厂，公家之财产已馨；加米捐，加盐税，加捐，加田税，人民之膏脂全干。泊乎今日，富者贫，贫者死，困苦流离之况，合人不忍卒开。被张贼兄弟累餐各数干百，尚不自厌，连此仅存之米盐公款，竟思搜入私囊以甘心。去年张贼会碳使湘痞李九等电京查问此款，至去长沙设立米盐公股清查处；开近复贿合郭人漳等以旅京湘事持会名义向熊秉三先生问该款，无理取开；推其用意，无非欲搜尽湖南财产，吃尽湖南人民，以鲍其欲壑。吾湘遭此互创之际，哀哀子遗，非有互资，何以善后，米盐公款为我三千万人民忍饥食淡所蓄，秉必不易，利用尤殷，倘被鲸吞，此却难复。被张贼之暴庚酷害，毒我湘人，已成惯技，独不能我同此食毛践士之败类，自杀父母之邦，甘与仇敌作狗。人之无良，至于此极！公民等对于郭人漳等此种恶劣行为，蓄不承认。总之此款在张贼未去湘乱未宁以前，只可暂归湘辩保管，不得变动，俟湘事保定后，再由全省民意公决用途，此际倘来无耻之徒，希图破坏者，即为公敌。凡我湘人，应知自卫，稍纵即逝，衍母忽焉。湖南公民代表毛泽东等五十五人（下略）"},{"type":"paragraph","text":"（抄自中国革命历史博物馆）发起“文化书社”缘起（摘要）"},{"type":"paragraph","text":"（一九二○年七月三十一日）"},{"type":"paragraph","text":"没有新文化，由于没有新思想；没有新思想，由于没有新研究；没有新研究，由于没有新材料。湖南人现在脑子饥荒，实在过于肚子饥荒，青年人尤其嗷待哺。文化书社愿以最迅速、最简便的方法，介貂中外各种新杂志，以充青年及前进的全体湖南人新研究的材料。也许因而有新思想、新文化的产生，那是我们心向祷之，希望不尽的。"},{"type":"paragraph","text":"文化书社由我们一些互相了解，完全信得过的人发起，不投的本，永远不得收回，亦永远不要利息，·此书社但永远为投本的人所共有。书社发达了，本身到了几百元，彼此不因为利；失败至于只剩一元，彼此无怨；大家共认地球之上，长沙城中，有此“共有”的一个书肚罢了。"},{"type":"paragraph","text":"（摘自《光辉的五四》第91真，中国青年出版社1959版。）"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":7,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":58,"page_end":58},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4159f332ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
