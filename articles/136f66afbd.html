不会改变两党一致外交政策","authors":[],"dates":[{"year":1960,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级报刊评美大选结果"},{"type":"paragraph","text":"肯尼迪将继续推行扩军备战政策"},{"type":"paragraph","text":"美国新闻处说肯尼迪不会改变两党一致外交政策"},{"type":"paragraph","text":"本报讯　美国的资产阶级报刊和通讯社最近在评论美国大选结果时纷纷指出，肯尼迪当选下届美国总统，并不会使美国的外交政策发生任何根本的变化。"},{"type":"paragraph","text":"在美国大选结果揭晓的头一天，美联社驻华盛顿记者海托华就报道称，“人们预料肯尼迪不会根据他的竞选演说而着手彻底改变美国外交政策”。许多评论都承认，下届民主党政府仍将基本上奉行共和党的对外政策。美国官方宣传机构美国新闻处在一则专电中说，肯尼迪“极少可能改变”美国战后以来“对外交事务所采取的两党一致的态度”，而且“事实上肯尼迪已经表示他赞成任命共和党的人担任国防和外交政策方面的高级职位。”"},{"type":"paragraph","text":"“纽约时报”也认为，“在大多数基本问题上”，民主党与共和党的"},{"type":"paragraph","text":"“意见在很大程度上是一致的”。"},{"type":"paragraph","text":"“纽约时报”并且要美国在“国外的朋友们”放心，肯尼迪上台以后，“美国的目的将继续是同它们一起保卫和维护”西方国家的“信念”，反对世界共产主义事业的"},{"type":"paragraph","text":"“推进”。"},{"type":"paragraph","text":"从美国报刊的大多数评论中可以看出，为了美国垄断资本的利益，肯尼迪将比艾森豪威尔政府更加卖力地推行扩军备战和扩张侵略政策。合众国际社记者汉斯莱说，肯尼迪“新政府所面临的任务”，是要使“西方世界”在反对共产主义的“无情斗争中处于更主动的地位”。他说，“肯尼迪表明，要确立一项更加有效的外交政策，必须有如下的背景或基础，即增加美国军事力量，使政府在对付赫鲁晓夫时，能够表示更强硬的意见。”美联社在11日也报道称，肯尼迪在加紧扩军备战以加强美国军事力量方面“一直是很肯定的，他的计划包括导弹计划一直到改组和改进行动缓慢的五角大楼的等等计划。”美联社还说，肯尼迪将大力加速发展远程导弹，以“弥合”同苏联之间的导弹“差距”，同时“使地面常规部队现代化，以便在不可能进行核战争的地方进行有限战争”。"},{"type":"paragraph","text":"在谈到最高级会议的问题时，许多评论指出，肯尼迪仍将坚持美国过去一贯从“实力地位”出发的做法。“纽约邮报”记者香农说，"},{"type":"paragraph","text":"“肯尼迪打算尽可能长久地不同俄国进行关于柏林问题和其他问题的一切谈判（除了关于禁止核试验的谈判以外），一直到我们的军事实力恢复到他认为是适当的水平”。合众国际社也承认，“除非事先有迹象表明能够就某些问题达成协议”，否则肯尼迪将“不再设法在最高级会议上同赫鲁晓夫打交道”。大家知道，这种对谈判提出先决条件的态度，实际上就是艾森豪威尔政府过去用来阻挠和破坏最高级会议的一个手法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"136f66afbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
