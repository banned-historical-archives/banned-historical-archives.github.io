art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国马列主义、毛泽东思想研究规划会在旅大举行","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 马克思列宁主义、毛泽东思想是我们党指导思想的理论基础。我们同林彪、“四人帮”斗争的中心之一，就是反对他们伪造、篡改，割裂马列主义、毛泽东思想，反对他们把马列主义、毛泽东思想变成僵死的教条。粉碎“四人帮”以来，特别是关于实践是检验真理唯一标准问题讨论以来，理论工作者思想上获得了很大的解放，研究马列主义、毛泽东思想的热情高涨。在这种热烈的研究气氛中，不久前在旅大市举行了全国马克思列宁主义、毛泽东思想研究规划会。"},{"type":"paragraph","text":"会议讨论和通过了以下一些事项：一、修改马列主义、毛泽东思想研究规划草案。二、通过马列著作研究会章程，成立马列著作研究会，推选了该会的临时干事会，并准备出版该会会刊。三、筹备成立毛泽东著作研究会。四、会后立即抓好以下工作，尽快在北京举行马克思主义书展，广泛收集国内外出版的有关马列主义、毛泽东思想的书籍报刊，编出书目，选择重点书刊和资料进行编译和做出提要；出版研究马克思主义的刊物和资料；举行学术讨论会，第一次将在本年年底或明年年初举行。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1807d59179"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
