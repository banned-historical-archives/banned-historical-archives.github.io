tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东“绿化祖国”碑亭揭幕","authors":["钤潞？"],"parts":[{"type":"paragraph","text":"据新华社北京10月28日电 （记者李月红）为了纪念毛泽东同志诞辰100周年，位于京西旅游避暑胜地小西山的毛泽东“绿化祖国”碑亭，今天下午揭幕。"},{"type":"paragraph","text":"毛泽东“绿化祖国”碑亭是首都绿色文化碑林中的主体建筑。这个碑亭上书刻着毛泽东五十年代向全国人民发出的号召“绿化祖国”、“实行大地园林化”，碑廊镶嵌着毛泽东、周恩来、刘少奇、朱德以及邓小平等领导同志的题词。碑馆正中是江泽民总书记的题词，同时书刻着党和国家其他领导人、老革命家、社会知名人士、书法家、艺术家的题词、诗文；艺术碑墙上刻着《森林法》和北京市的市树、市花。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7aabb4aa4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
