对待反革命的几个政策问题”","authors":[],"dates":[{"year":1951,"month":11}],"is_range_date":false,"parts":[{"text":"公安部转发东北公安部长汪金祥关于“对待反革命的几个政策问题”","type":"title"},{"text":"汪金祥部长在第六次东北公安会议的报告中，根据东北实际情况，对可杀可不杀，可扑可不扑，可管可不管等一系列政策问题，作出了比较具体的规定，这种解决问题的方法是正确的。各大行政区公安部，各省（市）公安厅（局）可仿效这种办法，根据你们所辖地区的具体情况，清理积案经验，作出具体规定。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"东北公安部长汪金祥在第六次东北公安会议上的报告《对待反革命的几个政策问题》（节录）","type":"subtitle"},{"text":"1951.11.00","type":"subtitle"},{"text":"……","type":"paragraph"},{"text":"第一、反动封建会门、道门：一贯道之公共坛主、点传师，或等于一贯道之公共坛主、点传师以上的各种反动会道门头子，除早已登记自首悔过，确实停止活动者外，应予逮捕。其中罪大恶极的职业道首应判处死刑，其余根据罪恶大小，分别判处徒刑，劳动改造。一般的家庭坛主的小头子，以及纯迷信的家庭妇女点传师，罪恶不大的不要逮捕，但应登记悔过自新，向群众宣布管制。一贯道之三才，或等于三才之类的少年无知被骗分子，采取短期集训办法，搜集材料，进行教育，不加处罚。迷信会、道徒，一律教育争取，不究既往。","type":"paragraph"},{"text":"……","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d558185c7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
