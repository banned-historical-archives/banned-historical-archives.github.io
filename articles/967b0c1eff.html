ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对中共中央、国务院给苏共中央、苏联部长会议的复信稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中共中央、国务院给苏共中央、苏联部长会议的复信稿的批语"},{"type":"paragraph","text":"（1965年7月11日）康生、冷西同志："},{"type":"paragraph","text":"此件已阅，写得很好。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十一日"},{"type":"paragraph","text":"[1]中共中央、国务院1965年7月10日的这份复信稿，据理驳斥了苏共中央、苏联部长会议1965年4月17日来信中对中方不同意举行越、中、苏三国最高级会唔所进行的攻击和诬蔑，指出：我们细心地观察了你们几个月来在越南问题上所进行的种种活动，认为你们在越南问题上，对美国实行绥靖主义，企图在政治上同美帝国主义进行交易，出卖越南人民解放事业的利益；对兄弟国家实行大国沙文主义，企图实行军事上的控制，把我们套在你们的美苏合作主宰世界的马车上。你们4月3日提出的举行越、中、苏三国最高级会唔的建议，就是贯彻你们这条路线的一个重要步骤。复信稿还对苏方提出把分歧撇在一边、采取联合行动的说法进行了批驳。指出：你们所说的“联合行动”，就是要兄弟党服从你们老子党的命令，就是要兄弟党、兄弟国家成为你们推行美苏合作主宰世界的政策的工具。"},{"type":"paragraph","text":"[2]康生，当时任中共中央政治局候补委员、中央书记处书记。冷西，即吴冷西，当时任新华通讯社社长、《人民日报》总编辑。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":7,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":87,"page_end":87},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"967b0c1eff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
