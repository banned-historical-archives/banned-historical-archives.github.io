1976,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报评论员"},{"type":"paragraph","text":"三十万瓩双水内冷汽轮发电机组胜利投产，是我国发电设备制造工业发展史上的一件大事。"},{"type":"paragraph","text":"这是一则极其振奋人心的消息。"},{"type":"paragraph","text":"这是文化大革命和批邓斗争的一曲凯歌!"},{"type":"paragraph","text":"这则消息，生动地说明了‘独立自主、自力更生’方针的胜利和邓小平洋奴哲学的破产。"},{"type":"paragraph","text":"这两点，都是值得庆贺的。"},{"type":"paragraph","text":"因为三十万瓩双水内冷汽轮发电机组不是从天上掉到人间的，也不是太太平平问世的。"},{"type":"paragraph","text":"英勇的工人阶级跟刘少奇斗，斗得了三十万瓩机组的制造权。"},{"type":"paragraph","text":"英勇的工人阶级跟林彪斗，斗得了三十万瓩机组的安装权。"},{"type":"paragraph","text":"英勇的工人阶级跟邓小平斗，斗得了三十万瓩机组的生存权。"},{"type":"paragraph","text":"七斗八斗，斗出了三十万瓩机组。"},{"type":"paragraph","text":"员三十万瓩机组设计、制造、安装、运行的十年，就是斗争的十年。"},{"type":"paragraph","text":"“不斗争就不能进步。”这真是千真万确的真理啊!"},{"type":"paragraph","text":"只要有了一条马克思主义的正确路线，坚持‘独立自主、自力更生’的方针，加上工人阶级的一双万能的报手，外国有的，我们会有；外国没有的，我们也会有。"},{"type":"paragraph","text":"不相信吗?摆在我们面前的三十万瓩机组，就是一本个明证。"},{"type":"paragraph","text":"不相信的人当然有。党内最大的不肯改悔的走资派邓小平，就是其中之一。我们自己能造发电机，邓小平却用‘买机’压‘造机’，杀掉母鸡换鸡蛋吃；工人阶级造出了大型发电机组，邓小平妄图一刀砍掉；邓小平不惜用中国劳动人民的血汗，去换取外国资本家的余唾，把中国工业发展的命运，系在西方资产阶级的腰带上。这是典型的崇洋卖国政策。邓小平比李鸿章，实在是有过之而无不及。死了张屠夫，不吃带毛猪。三十万瓩机组不是在斗争中多快好省地造出来了吗?大运河畔发出的震天轰响，淹没了邓小平之流崇洋媚外的哀鸣。"},{"type":"paragraph","text":"邓小平之流抓住三十万瓩机组一些不够完善的地、万大做文章，更是枉费心机。这样一个大容量机组，在调试过程中出现一些技术上的缺点，并不奇怪。苏修安装一台三十万瓩机组，就花了四年的时间。国外一台新机组的调试，一般也要用二、三年的时间。而我国的三十万瓩机组工程从一九七三年六月十九日破土动工，到一九七四年九月二十七日建成并网发电，只用了十五个月。国产三十万瓩机组从运行发电到调整完善只花了一年多的时间，而苏修却用了三年多的时间。为什么邓小平对中国工人阶级自己的伟大创造，如此不屑一顾、深恶痛绝呢?这只能得出一个结论:邓小平是一个地地道道的七十年代的洋务派。"},{"type":"paragraph","text":"如今，三十万瓩机组的烟囱高入云端，强大的电流源源不断地送往工厂、农村，给社会主义建设增添了强大的动力。我们已经取得了很大的胜利，但决不可松懈自己的斗志。彻底肃清邓小平反革命的修正主义路线的影响，还要花很大的气力。斗争出硕果，斗争才能巩固和发展批邓的硕果。三十万瓩机组还要前进，社会主义建设要大步向前。我们必须继续牢牢抓住阶级斗争这个纲，迎着风浪，冲破阻力，趁热打铁，乘胜前进!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2a83a850a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
