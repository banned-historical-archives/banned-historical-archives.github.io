rs":[],"dates":[{"year":1979,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宜春地区推广榜样经验批判极左路线"},{"type":"paragraph","text":"调整农业内部比例  发展多种经营"},{"type":"paragraph","text":"据新华社南昌七月十三日电  中共江西省宜春地委最近召集县委和公社党委书记到五业兴旺的高安县灰埠公社开会，联系实际批判林彪、“四人帮”的极左路线，为调整农业内部比例关系扫除思想障碍，收到了比较好的效果。"},{"type":"paragraph","text":"今年，宜春地区油菜籽比去年增产五成以上，蚕豆、豌豆、大小麦增产二成，棉花、大豆、芝麻、花生等经济作物，也都比往年种得好，管得细，长势喜人。但是，林牧副渔和各种经济作物的生产水平还很低，许多项目还没有恢复到历史最高水平。在一九七八年的总收入中，农业占百分之七十一，而林业只占百分之四，牧业只占百分之十二点一，渔业只占百分之零点四。宜春地委感到，这种比例失调状况不加以调整，就很难实现农业的高速度。而要做好这项工作，最根本的还是帮助一些干部打碎套在身上的极左路线的精神枷锁。"},{"type":"paragraph","text":"榜样是最有说服力的。一九七五年，灰埠公社顶住“四人帮”极左路线的干扰，扭转只抓粮食的“单打一”倾向，利用本地资源发展工副业。几年来，共扩建和新建了陶瓷厂、石灰厂、水泥厂等十多个企业，年产值达到三百多万元。用八十八万多元直接投入农业生产，使百分之八十以上的荒山和农田得到了改造，粮食生产逐年上升，各种经济作物迅速发展，集体收入从一九七四年的十八万元，上升到去年的七十九万元。农业机械化水平也有了很大提高。这个公社先后添置了大中型拖拉机三十二台，手扶拖拉机九十台，其他农用机具一千二百多台（件）。排灌、植保、农副产品加工等，初步实现了机械化和半机械化。大家看到灰埠公社的榜样，感触很深，都说多种经营好，“单打一”再不能搞了。"},{"type":"paragraph","text":"在这次会上，宜春地委还推广了一些地方根据党的政策，发展农林牧副渔生产的一些具体做法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"635d3322de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
