规定","authors":[],"dates":[{"year":1967,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"中共中央、国务院关于机要译电人员参加文化大革命运动的几项规定","type":"title"},{"text":"在无产阶级文化大革命运动中，机要译电工作人员，应当坚决站在以毛主席为代表的无产阶级革命路线一边，向党内一小撮走资本主义道路当权派进行斗争。为了确保党和国家的核心机密，坚决响应毛主席提出的“抓革命，促生产”的伟大号召，特作如下规定：","type":"paragraph"},{"text":"一、中共中央、国务院已在二月三日发出关于全国革命师生和红卫兵停止串连的决定，机要译电人员应该毫无例外的坚决执行，不要再到外地和外机关进行串连活动，凡是已经离开工作岗位外出串连的，要限期立即返回。","type":"paragraph"},{"text":"任何非机要译电单位的人员，不得到机要译电部门进行串连活动。","type":"paragraph"},{"text":"二、机要译电工作人员必须坚守岗位，各中央局，各省、市、自治区和各专区的机要译电人员，不要集中起来搞地区性的联合行动，开地区性的会议。对工作中的意见，可以书面向上级领导反映。","type":"paragraph"},{"text":"三、运动期间，机要译电人员必须确保密码通讯畅通；机要译电人员不得擅自扣押任何电报。","type":"paragraph"},{"text":"四、机要译电部门的革命群众组织，未经领导批准，无权擅自向全国机要译电部门和有关单位发通报或转发电报。","type":"paragraph"},{"text":"五、机要译电部门的文化大革命运动，应该有领导的进行，革命群众组织无权擅自接管机要译电和密码业务。","type":"paragraph"},{"text":"六、在运动中，要进一步纯洁机要译电队伍，发现不适合作机要工作的，须经上级批准后，予以调离或暂不接触机密，把混进来的反革命分子、自首变节分子、蜕化变质分子以及地、富、反、坏、右分子（不是指家庭出身），从机要译电队伍中彻底清除出去。","type":"paragraph"},{"text":"七、机要译电部门的大字报，一律不得涉及有关密码译电业务问题。如发现确属失密的，应立即加以改变，并报告上级领导。","type":"paragraph"},{"text":"八、以上规定，革命群众要严格遵照执行。如有违反者，将根据情节，给以国家法律和党的纪律处分。","type":"paragraph"},{"text":"以上规定适用于机要学校、训练班和密码工厂。","type":"paragraph"},{"text":" 一九六七年二月二十一日","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[一]》，武汉：1968年4月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5a8fd6325"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
