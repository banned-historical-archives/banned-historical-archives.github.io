script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北大、人大、经济研究所协作编写  《当代资产阶级经济学说》资料性教材","authors":["范家骧"],"dates":[{"year":1962,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北大、人大、经济研究所协作编写"},{"type":"paragraph","text":"《当代资产阶级经济学说》资料性教材"},{"type":"paragraph","text":"北京大学经济系、中国人民大学经济系和中国科学院经济研究所受教育部文科教材办公室的委托，协作编写一部《当代资产阶级经济学说》资料性教材。这部教材的《凯恩斯主义》、《人民资本主义》、《经济计量学》等部分的初稿现已写成，其余几个部分如《垄断经济学》和《福利经济学》正在编写提纲。在编写过程中，曾举行了几次座谈会，讨论了下列问题："},{"type":"paragraph","text":"（一）编写资料性教材的目的与要求。大家认为，编写《当代资产阶级经济学说》资料性教材的目的在于扩大经济系学生的知识领域，使他们对目前在主要资本主义国家中流行的资产阶级经济学的主要流派及其反动本质有一个比较系统的了解；增强学生对形形色色的资产阶级反动的、反科学的经济学说的识别和批判能力。编写这部教材的要求是：具体地反映出几个主要流派的基本内容，说明它们产生的历史条件和思想渊源，指出它们对资产阶级经济思想、对帝国主义国家政治和经济政策所起的反动作用。"},{"type":"paragraph","text":"（二）如何批判地介绍当代资产阶级经济学说。大家认为，这部教材虽然是资料性的，着重于介绍当代资产阶级经济学说，但不是客观主义的介绍，而是要运用马克思列宁主义的观点和立场作批判式的介绍，要寓批判于介绍之中。"},{"type":"paragraph","text":"（三）关于《凯恩斯主义》初稿的讨论。大多数同志认为，在介绍《凯恩斯主义》的基本内容时，应该注意到它的各个论点之间的逻辑联系。如《乘数论》是凯恩斯就业论中的重要部分。因此，在编写中就要注意凯恩斯通过“乘数”来说明所谓的投资增量和收入增量（或就业增量）之间的函数关系。有的同志认为凯恩斯关于投资等于储蓄的论点既是恒等概念，也是均衡概念。它是凯恩斯收入分析方法的基本运用，应当着重加以说明。"},{"type":"paragraph","text":"（范家骧）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77e62690cd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
