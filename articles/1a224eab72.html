964,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"同济大学建筑系工农班六年级　何义芳"},{"type":"paragraph","text":"我们班的图书馆设计小组的同学读了七月二十四日《文汇报》发表的《从码头苦工到大学生》和《颗颗红心向着党》的文章后，个个心情无法平静。"},{"type":"paragraph","text":"解放前在申新六厂做工的钱亚青说:“解放前，我在纱厂里做工，受尽‘拿摩温’(工头)的欺压。工人连大小便都没有自由，吃饭也限定时间，几十个人只有一只桶，盛饭时围着饭桶团团转。好不容易盛着一碗饭，吃饭时间几乎过了。而且饭里尽是石子和米蛀虫。一九五四年，我进工农速成中学时，已经二十七岁了。有人劝我:‘你不要去读书了吧!女同志结婚，生孩子，事情多，年岁大了，八十岁学吹打，何苦呢?’我想到旧社会的苦，更想到阶级的重托，想到党的期望，我坚决要攀登科学高峰，改变祖国一穷二白的面貌，决不让旧日子重来。至今，十年过去了，我坚持下来，完成了党交给我的学习任务。在毕业前夕，我坚决要求到祖国最艰苦、最需要的地方去。”"},{"type":"paragraph","text":"陈芝萍同学在谈感想的时候，伸出了一只左手对大家说:“大家看，我这只手的食指为什么伸不直呢，这是在旧社会做工时被机器打坏的。当时怕停生意，还不敢让资本家知道。后来，烂得见了骨头，还不敢吭声。直伸了怕手痛，就老是弯着，等到三个月后好了，就永远伸不直了。回忆过去，我永不忘本，要做坚强的革命后代。这次学校宣布的分配地区中有一些边远地区，班里数我身体最好，请组织上考虑让我去。”"},{"type":"paragraph","text":"小组同学通过这两篇文章的阅读、漫谈，勾起了往年无数卒酸的回忆。旧社会给我们的只是受鞭打、失业的“自由”。解放后我们真正做了国家的主人。我们要饮水思源，感谢党和毛主席，坚决把革命重担挑起来，锻炼成为坚强的革命接班人。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a224eab72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
