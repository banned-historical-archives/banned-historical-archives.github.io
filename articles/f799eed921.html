" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"甘肃引洮工程会宁工区七大队民工李富荣给省委负责同志的信","authors":[],"dates":[{"year":1959,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"甘肃引洮工程会宁工区七大队民工李富荣给省委负责同志的信","type":"title"},{"text":"甘肃省委负责同志:","type":"appellation"},{"text":"引洮工程会宁工局（区）第七大队，我是引洮民工，名叫李富荣，现年27岁，家中成份是贫农，本人出身农民，文化成（程）度初小，自小给地主拉过8年长工，自家贫苦，未得上学读书，在1951年光荣的参加了中国人民解放军。在1957年中旬复员回乡。到农村以后，积极肯干，对党的政策拥护执行。群众比较信养（仰）自己。但是那（拿）今年来说，有二件事，无法进行解说，首先将这二件问题反映一下。","type":"paragraph"},{"text":"第一：现在农村到处乱叫乱喊，农民到处讨要吃饭，发生一种紧张现象，有的地方还供应面粉，每人每天4两，有的地方放手不关（管）有解散了食堂。社员抱上自己的小孩出门要饭，一天路途不断走着，随走随睡卧地不起。人的脸上都变了样子，看起来十分严重，再者，恐慌当中我见意（建议）省级领导应该急（及）时调查急救。千万不敢迟延下去，有的地方社员生命都很危险。","type":"paragraph"},{"text":"第二件：社员吃不饱，就不能安心生产，也对我们的农业大丰收也有一种很大因想（影响）。如现在农田无人管理，庄稼得不到组够（足够）的追肥，有不能锄光净草。如草和粮食长在一起，粮食就得不包粒。粮食是祖国建设当中第一条，是宝中之宝，所以为了祖国建设，就需有足够的食品。如因想（影响）了农业大丰收，也就说是因想（影响）了祖国建设。这二件事情特别是农民饿肚一件，这件事情发生没要说了，但是给农民社员给了一个很大因想（影响），也对我们的共产主义建设带来了一种很大妨碍。现在我见意（建议）省级领导同志，迅速调查这件事情，赶快处理，免得槽秋（遭殃）。","type":"paragraph"},{"text":"最后，因为我是一个后补党员，又是一个军人，也懂得为人民服务的道理，所以发生事件，我也弄不明白，给领导反映一下，如不对者给一处分。可能这二件事情的反映，恐怕没有我的好结果，可是自己只有一个念头，只要祖国顺利建设，人民幸福，就是领导给多大处分我死愿意。总的说来，为了祖国为了人民，自己的身子我也赦（舍）得。","type":"paragraph"},{"text":"鞠躬","type":"appellation"},{"text":" 李富荣  6月12日","type":"paragraph"},{"text":"发信地址：引洮工程会宁工区第七大队四中队","type":"paragraph"}],"comments":[],"origin":"中共甘肃省委办公厅《人民来信》档案。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f799eed921"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
