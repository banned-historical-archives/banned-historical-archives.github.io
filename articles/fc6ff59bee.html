" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共湖南省委关于对私营工商业改造工作的几点意见","authors":[],"dates":[{"year":1956,"month":2,"day":3}],"is_range_date":false,"parts":[{"text":"中共湖南省委关于对私营工商业改造工作的几点意见","type":"title"},{"text":"省委对私营工商业改造第二次会议后，各地、市委迅速地开了会作了传达，认为省委这次会议的召开是及时的，对当前工作的意见和措施是正确的。各地并立即根据省委这次会议的精神采取了具体措施，这是相好的。但从各地电话反映的情况来看，在省委这次会议精神传达之后，有些干部还有不同的看法，如有的怀疑在前段改造高潮中，采取先批准公私合营的做法是不是搞快了，认为工作中的缺点是由此而来；有的反映清产核资问题原来规定不具体，现在虽然规定具体了，但已经搞完，不好执行；有的认为原封不动，特别是对小商贩改造的三种形式不过瘾。省委认为，这些思想问题，必须很好解决，才能把会议精神贯彻下去。鉴于春节即届，市场供应紧张，因此，在各县的扩大干部会议上，必须强凋以下几点：","type":"paragraph"},{"text":"（一）对前段工作的检查总结，必须首先明确地肯定成绩，同时实事求是地仔细研究分析一下某些缺点和错误，借以教育提高干部、鼓舞干部的工作积极性。各县会议结束，干部回到各自的工作地区和单位以后，也要采取同样的办法，肯定成绩，检查缺点，明确方针政策。如清产核资、人事安排、商业网调整、生产改组、生产合作等工作中存在的问题，要召开干部会、工商业者代表会、职工代表会、手工业者代表会等，宣传贯彻省委这次私改会议精神，分别加以解决。","type":"paragraph"},{"text":"（二）必须原封不动维持原有生产经营秩序，只有这样，才能保证不误生产经营，保证年关供应。这不仅要向干部讲清楚，而且要向所有的工商业者、手工业者作宣传。长沙市将原封不动，照旧生产经营的精神在工商业者手工业者中宣传贯彻后，反映良好。特别在小商贩中经营上已有突出的转变。在批准公私合营后打算吃大锅饭，等待观望的情绪已基本消除，积极组织资源，营业额显著上升，这说明原封不动，照旧生产经营的措施是十分正确的，特别是对小商贩，由于保留了他们原来的独资经营形式，又参加了公私合营，更可以发挥他们的积极性。有些同志认为过去大张旗鼓地宣传公私合营，现在又搞代销或经销，怕群众不满意是不必要的。当然，原封不动并不是永远维持现状，而是要经过一个时期的考察研究，逐步加以改革，在目前情况下，对于私营工商业，必须照旧生产，照旧经营。对于手工业生产合作社，凡是生产上协作关系不大特别是服务性行业不要盲目地、性急集中生产，这些行业仍旧分散生产，更可以便民利民。","type":"paragraph"},{"text":"（三）春节在即，有些资本主义企业合营后发不出工资的，我们应主动帮助原经理、厂长解决；对手工业者、小商小贩有些采取在工资中扣入社股金的，应一律停止。已扣的应该退还。对资本家在企业的长支或抽资，有的地方也采取在他们工资中扣除的办法，亦应一律停止。","type":"paragraph"},{"text":"以上希立即贯彻切实执行。","type":"paragraph"}],"comments":[],"origin":"湖南省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc6ff59bee"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
