ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致陈毅电","alias":"","parts":[{"type":"paragraph","text":"致陈毅电"},{"type":"paragraph","text":"（1940年10月14日）"},{"type":"paragraph","text":"建设苏北根据地是很大工作。同意陈毅统一苏北军事指挥，同意胡服去苏北与陈会合，布置一切。注意苏北与皖东打成一片，不要使中间有间断。尊重李明杨、韩国钧等中立态度及其利益，注意收集蒋、顾、韩的反共证据（人证物证），注意收集知识分子，注意调节各阶层利益，实行政权中的“三三制”，预防“左”的危险，注意组织财政经济工作，从长期战争出发，勿使人力物力浪费。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、王稼祥关于建设苏北根据地等问题致陈毅并告"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":10,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":152,"page_end":152},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd664fa1ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
