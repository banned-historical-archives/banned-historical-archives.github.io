tes":[{"year":1967,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市体委革委会，围绕建党路线问题，掀起了大学习、大批判的新高潮。十一月廿七日晚召开了全市体育系统的动员大会。会后，各基层体育单位，立即开展大学习、大批判活动。"},{"type":"paragraph","text":"在这次批判修正主义建党路线中，各单位以此作为当前中心任务，全面带动本单位的斗批改。在这次大学习、大批判中，革命领导干部进一步亮了相。有的党员干部联系自己由于受到黑《修养》的毒害，充当了资产阶级反动路线的驯服工具的沉痛教训，更加看清了中国赫鲁晓夫阴谋篡党的狼子野心。他们决心在这次大学习、大批判中，清除黑《修养》的流毒，做个永远忠于毛主席的好党员。革命派同志认真学习了毛主席的建党理论，狠批狠揭中国赫鲁晓夫妄想把我们的党篡改为“全民党”、“福利党”，变为他复辟资本主义的工具的罪行。他们一致指出，只有通过对毛主席建党学说的大学习和对中国赫鲁晓夫修正主义建党路线的大批判，才能真正用毛泽东思想来整顿我们的党，使党成为勇敢战斗，朝气蓬勃的无产阶级先锋队组织。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34f401bc2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
