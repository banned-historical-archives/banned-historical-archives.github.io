" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"关于国家预算的指示","alias":"","parts":[{"type":"paragraph","text":"关于国家预算的指示"},{"type":"paragraph","text":"（1954年6月）"},{"type":"paragraph","text":"增产、节约、多留后备力量，是巩固国家预算的可靠的三道防线。"},{"type":"paragraph","text":"1954年，毛泽东在杭州。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":146,"page_end":146},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"9646ca98-820c-44ef-b8ca-c656fd59b7fd","name":"毛泽东思想万岁（1949.10-1957.12）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/9646ca98-820c-44ef-b8ca-c656fd59b7fd.pdf"],"article":{"title":"关于国家预算的指示","alias":"","parts":[{"type":"paragraph","text":"青少年的教育"},{"type":"paragraph","text":"（一九五三年）"},{"type":"paragraph","text":"鲁迅有一篇文算，题目是“从孩子的照相起”，鲁迅很懂得这个事情，他提倡孩子要活，要顽皮。他“良之类并不是恶德，但发展开去，对一切事无不剔良，却决不是美德，也许简直倒是没出息。”（《鲁迅全集》第六卷第84页）在有些地方要我们的后一代学我们；但有些地方就决不要后代再学我们，再学我们就糟糕。我们总是中孔夫子的毒太深了，不仅学校如此，就是托儿所也要很好注意。现在不把孩子送到托儿所还好，一送到托儿所就“机械化”了。在这些方面，我们要下很大的功夫，用很多方法，把我们的青年、儿童变成朝气蓬勃，生龙活虎-一样。有这样的人民，建立这样一个国家，那我们中国就了不起。要懂得人在幼年、青年的时候，正是性格、品质慢慢形成的时候，如果在这方面不会数育他们，将来的损失就很大。"},{"type":"paragraph","text":"给李×的一封信××兄："},{"type":"paragraph","text":"七月二十日的信及两篇文章，收到看过了，觉得很好。特别是政治思想一篇对读者帮助更大。似乎有些错处，例如“实用主义者主张物的第一性和意的第二性。”此外，在批判实用主义时，对实用主义所的实用和效果，和我们所的大体同样的名，需加以比较明，一般人对这些还是混淆不清的。宇宙“是一篇未完的草稿……..”九句话，也须作明确的批判。你的文章通俗易懂，这是很好的。在再写文章时，建对-一些哲学的基本概念，利用适当的场合，加以明，使一般干部能够看懂。要利用这个机会。使几百万的不懂哲学的党内外干部都懂得一点马克思主义哲学。未知以为如何？"},{"type":"paragraph","text":"顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年二月二十八日关于国家预算的指示"},{"type":"paragraph","text":"（一九五四年六月）增产、节约、多留后备力量，
