<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底批判资产阶级的“智育第一”","authors":["董尚志"],"dates":[{"year":1976,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彻底批判资产阶级的“智育第一”"},{"type":"paragraph","text":"贵州省水城钢铁厂“七·二一”工人大学　董尚志"},{"type":"paragraph","text":"“智育第一”，是资产阶级统治学校的精神支柱，是刘少奇一类骗子推行的唯生产力论在教育战线的反映。文化大革命前的十七年中，在学校里，资产阶级用“智育第一”专无产阶级的政，对工农实行文化专制。现在，刮右倾翻案风的人又竭力鼓吹“智育第一”。我们必须给予彻底的批判。"},{"type":"paragraph","text":"“智育第一”否定毛主席的教育方针。毛主席指出：“教育必须为无产阶级政治服务，必须同生产劳动相结合。”“我们的教育方针，应该使受教育者在德育、智育、体育几方面都得到发展，成为有社会主义觉悟的有文化的劳动者。”按照这个教育方针，衡量学生首先要看政治质量，看学生在阶级斗争、路线斗争和无产阶级专政下继续革命的觉悟，看他们能不能成为反修防修、巩固无产阶级专政的战士。在无产阶级政治统帅下，也要看学生是不是掌握了对三大革命运动有用的文化科学知识。还要看学生有没有健强的体魄，以适应社会主义革命和建设的需要。"},{"type":"paragraph","text":"右倾翻案风的鼓吹者同毛主席的教育方针大唱反调，把智育凌驾于一切之上，只注重书本知识，把“有社会主义觉悟”和“劳动者”扔到九霄云外，这是彻头彻尾的资产阶级政治第一。"},{"type":"paragraph","text":"“智育第一”否定理论与实践统一的原则。奇谈怪论的制造者诬蔑开门办学“降低了教育质量”，目的之一就是反对理论与实践相结合。文化大革命前，修正主义教育路线把学生整天关在高楼深院里，学生除了学到就那么大点用处的书本知识外，什么阶级斗争、无产阶级专政，工人怎样做工，农民怎样种田，统统不知道。如果说培养这种“四体不勤、五谷不分”的精神贵族就是"},{"type":"paragraph","text":"“教育质量高”，那末，这种“高质量”只能为资产阶级复辟资本主义效劳，而决不是社会主义革命和建设所需要的。只有批判“智育第一”，坚持开门办学，把学校教育同三大革命运动紧密结合起来，才是培养无产阶级革命事业接班人的正确途径；只有按照“实践——认识——实践”的原则组织教学，才能使学生既学到有用的理论知识，又掌握丰富的实践知识，提高分析问题和解决问题的能力。"},{"type":"paragraph","text":"“智育第一”剥夺了劳动人民享受文化教育的权利。劳动人民是物质财富和精神财富的创造者，但在剥削阶级统治的社会里，却被剥夺了享受文化教育的权利。文化大革命前十七年，在修正主义教育路线统治下，用“智育第一”的关卡，把广大劳动人民排斥在学校门外。今天，刮右倾翻案风的人又用“智育第一”的所谓质量观，诬蔑从有实践经验的工人、农民中间选拔出来的学生是“降低了教育质量”，就是妄图把工农兵再次赶出学校大门。如果听任搞右倾翻案的人翻修正主义教育路线的案，学校就会成为他们复辟资本主义的工具，国家就会改变颜色，这是我们工人阶级坚决不能答应的。我们一定要坚持以阶级斗争为纲，把这场反击右倾翻案风的斗争进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9adac5ac6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
