:[],"dates":[{"year":1967,"month":1,"day":29}],"is_range_date":false,"parts":[{"text":"国务院关于今年春节不放假的通知","type":"title"},{"text":"文革无产阶级文化大革命开始了新阶段。当前正处在无产阶级革命派大联合，以排山倒海之势，向党内一小撮走资本主义道路的当权派展开全面夺权斗争的关键时刻。根据广大革命群众的要求，为了坚决执行我们伟大领袖毛主席提出的抓革命、促生产的方针，夺取革命、生产双胜利，将无产阶级文化大革命推向新的高潮，国务院决定：一九六七年春节不放假；职工探亲假在文化大革命期间暂停执行，以后再补。","type":"paragraph"},{"text":" 国务院一九六七年一月二十九日","type":"paragraph"}],"comments":[],"origin":"根据文件的群众组织翻印件，翻印者未注明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5c8c5aaa8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
