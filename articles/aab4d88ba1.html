es":[{"year":1993,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者　王宝娣)昨天，上海部分离休老干部和毛泽东同志生前视察过的上钢一厂、上海电机厂、上海机床厂、江南造船厂、上海第一棉纺织厂、申新纺织第九厂、上海港务局的领导干部，在上海展览中心座谈纪念毛泽东诞辰一百周年，深情缅怀毛主席的丰功伟绩，重温他的亲切教导，追溯往昔，人们心潮澎湃，展望未来，更加豪情满怀。"},{"type":"paragraph","text":"座谈会由市委组织部、市委老干部局联合举行。市委常委、市委组织部部长罗世谦出席会议并讲话。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aab4d88ba1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
