tes":[{"year":1983,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十一月十九日电　表现毛泽东同志重要革命实践的大型彩色宽银幕故事片《四渡赤水》，将于毛泽东同志诞辰九十周年之际在全国上映。"},{"type":"paragraph","text":"由八一电影制片厂最新摄制的《四渡赤水》，分为上下集。影片反映了中国工农红军在二万五千里长征途中所进行的一次重要战役——黔北赤水河之战。这是一九三五年遵义会议确立了毛泽东同志在全党的领导地位不久，由毛泽东同志亲自指挥的光辉战例。影片生动地再现了当年红军英勇奋战的壮丽场面，塑造了毛泽东和朱德、周恩来、刘伯承等老一辈无产阶级革命家的光辉形象。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f0780e24e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
