:[{"year":1973,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英副主席会见美国友好人士罗辛吉和夫人"},{"type":"paragraph","text":"新华社一九七三年七月三十日讯  中共中央军委副主席叶剑英，今天下午会见了正在我国访问的美国友好人士罗辛吉和夫人。"},{"type":"paragraph","text":"罗辛吉先生早在一九四六年作为美国“外交政策协会”记者来过中国，在当时的“北平军事调处执行部”曾访问过中国共产党方面的代表叶剑英同志，并访问过延安和冀鲁豫解放区。"},{"type":"paragraph","text":"叶剑英副主席对罗辛吉和夫人来访表示热烈欢迎。罗辛吉先生高兴地说，二十七年后再次来到中国，深感中国的社会面貌和人民的精神面貌都发生了很大的变化，看到了人们正在勤勤恳恳地为自己的国家而献身。叶剑英副主席回答了罗辛吉先生关心的问题，谈到了中国人民在革命和建设中所取得的成就，介绍了我国的对内对外政策。"},{"type":"paragraph","text":"会见进行了一个半小时。在座的还有杨公素、凌青、王笑一、朱葆琛等有关方面负责人和工作人员。（附图片）"},{"type":"paragraph","text":"叶剑英会见美国友好人士罗辛吉和夫人　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1973,"month":7,"day":31}],"page_start":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英副主席会见美国友好人士罗辛吉和夫人","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年七月三十日讯 中共中央军委副主席叶剑英，今天下午会见了正在我国访问的美国友好人士罗辛吉和夫人。"},{"type":"paragraph","text":"罗辛吉先生早在一九四六年作为美国“外交政策协会”记者来过中国，在当时的“北平军事调处执行部”曾访问过中国共产党方面的代表叶剑英同志，并访问过延安和冀鲁豫解放区。"},{"type":"paragraph","text":"叶剑英副主席对罗辛吉和夫人来访表示热烈欢迎。罗辛吉先生高兴地说，二十七年后再次来到中国，深感中国的社会面貌和人民的精神面貌都发生了很大的变化，看到了人们正在勤勤恳恳地为自己的国家而献身。叶剑英副主席回答了罗辛吉先生关心的问题，谈到了中国人民在革命和建设中所取得的成就，介绍了我国的对内对外政策。"},{"type":"paragraph","text":"会见进行了一个半小时。在座的还有杨公素、凌青、王笑一朱葆琛等有关方面负责人和工作人员。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英，七月三十日会见了美国友好人士罗辛吉和夫人。 新华社记者摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dda18a1e9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
