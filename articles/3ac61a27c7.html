tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"舟桥兵一连行军野营坚持学习毛主席著作","authors":["廖启才"],"parts":[{"type":"paragraph","text":"本报讯 舟桥兵某部一连在野营训练中坚持学习毛主席著作，发扬了克服困难的精神，推动了野营训练。"},{"type":"paragraph","text":"野营出发前，这个连的党团支部和革委会专题研究了野营中如何组织学习毛主席著作的问题，并且作了具体布置。98％的人都带上了《毛泽东选集》或毛主席著作单行本。"},{"type":"paragraph","text":"指导员赵永清亲自领导这一学习。在行军中，他把每辆车组织成一个临时学习小组，边走边学；到了驻训阶段就采取排、班、小组和个人相结合的办法学习。他们分秒必争，每天作业完毕，就一边烤衣服，一边读毛主席著作。仅在行军和驻训的十天中，每个班和团小组都组织学习了五次以上，有的班学习了八次，炊事班也学习了六篇文章。"},{"type":"paragraph","text":"在学习中，他们始终坚持活学活用，边学边实践。有些班看到少数同志在艰巨任务面前有畏难情绪，就组织大家学习“战争的目的”（《论持久战》中的一节）和《愚公移山》等文章。经过学习讨论，许多战士纷纷表示：咱们是人民战士，在任何情况下都不能向困难低头。有一次架设浮桥，螺杆掉下河去，战士刘石泉不顾寒冷跳下水去摸；当风雨大作时，他也坚持不懈地进行作业。炊事班学习了“三大纪律八项注意”，在行军中做到了秋毫无犯。当人们问到一连的同志们是怎样克服困难的，他们回答：“是毛主席的思想给了我们力量。”（廖启才）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ac61a27c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
