art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"结合读报学习毛主席语录","authors":["郑传贤张杰高伯箴李石生"],"parts":[{"type":"paragraph","text":"6598部队九连，很注意通过读报，组织战士每天学习一条毛主席语录，方法是：两结合、一总结。"},{"type":"paragraph","text":"读写结合。读报前，选出一篇重点文章，把它的中心思想及各段的要点写在黑板上，同时写出当天学习的毛主席语录。"},{"type":"paragraph","text":"读讲结合。读报时，讲明文章各段观点，讲生动事例，讲部队情况和任务。"},{"type":"paragraph","text":"一总结。用毛主席的语录总结文章的中心思想，使战士们天天通过活的事实，较深刻地体会到毛泽东思想的英明伟大；帮助战士更好地学习毛主席著作。"},{"type":"paragraph","text":"副连长刘昭丰在紧张的训练中，为了读《解放军报》三月十九日《怎样对待“压力”》一文，利用休息时间读了数遍，翻阅了毛主席有关文章，认真备课。战士们反映：这种读报方法好，听得懂，记得牢，既提高了读报质量，又学习了毛泽东思想。  （郑传贤、张杰、高伯箴）"},{"type":"paragraph","text":"某部团长李崇在深入连队了解学习毛主席著作时，利用报上刊登的有关文章，指导战士活学活用毛主席著作。 李石生摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c8a61829a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
