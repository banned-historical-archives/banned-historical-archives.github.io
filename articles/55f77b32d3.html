art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周总理陈毅副总理检阅海军部队勉励官兵活学活用毛泽东思想，坚持四个第一，大兴三八作风，从实从严从难训练部队，作好一切准备，粉碎敌人的进攻；","authors":["赵一昌张鸿"],"parts":[{"type":"paragraph","text":"本报讯 三月十日，周恩来总理和陈毅副总理检阅了东海舰队某舰艇部队和海军某航空兵部队，观看了海、空协同作的表演。周总理、陈副总理勉励海军官兵活学活用毛泽东思想，坚持四个第一，大兴三八作风，从实从严从难训练部队，作好一切准备，粉碎敌人的进攻。"},{"type":"paragraph","text":"这天下午，停靠在东海某军港的各型舰艇上，彩旗飘扬。海军干部战士们穿着整齐的服装列队迎接周总理和陈副总理。"},{"type":"paragraph","text":"周总理、陈副总理，在东海舰队陶勇司令员、刘浩天政委的陪同下，检阅了部队。当周总理踏上旗舰甲板的时候，军舰主桅上升起了五星红旗。"},{"type":"paragraph","text":"接着，舰艇编队出海，海，空协同作战表演开始了。"},{"type":"paragraph","text":"周总理和陈副总理登上旗舰指挥台，展望着祖国辽阔的海面。忽然，海面的远方出现了一队鱼雷快艇，箭一般地向靶舰驶去。这时，空中又出现三批飞机，闪电般地向靶舰俯冲“投弹”。在海军航空兵的掩护下，鱼雷快艇迅速接近目标，在距离××链的地方发射了“鱼雷”。胜利地表演了海、空协同作战以后，鱼雷快艇从旗舰左舷驶过。航空兵编队掠过旗舰的桅顶，接受周总理和陈副总理的检阅。周总理满面笑容向他们挥手示意。"},{"type":"paragraph","text":"周总理看完表演后，给参加表演的部队题词。题目是："},{"type":"paragraph","text":"“四个第一，"},{"type":"paragraph","text":"三八作风，"},{"type":"paragraph","text":"活学活用毛泽东思想，"},{"type":"paragraph","text":"从实从严从难训练部队。”"},{"type":"paragraph","text":"陈副总理的题词是：“作好一切准备，粉碎敌人的进攻。”"},{"type":"paragraph","text":"周总理勉励大家要很好地贯彻这些根本的东西，并要求部队从实战出发，搞好训练。"},{"type":"paragraph","text":"周总理和陈副总理离舰时，和干部战士亲切握手。在码头上和受阅部队的干部战士合影留念。"},{"type":"paragraph","text":"周恩来总理、陈毅副总理在陶勇司令员、刘浩天政委陪同下，检阅舰艇部队。      张鸿摄"},{"type":"paragraph","text":"周恩来总理给参加表演的部队题词。"},{"type":"paragraph","text":"赵一昌摄RW：周恩来；检阅陈毅；检阅"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55f77b32d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
