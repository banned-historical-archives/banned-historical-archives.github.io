s":[{"year":1977,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会:"},{"type":"paragraph","text":"我们怀着极大的喜悦获悉贵党胜利召开十届三中全会，追认华国锋同志为中国共产党中央委员会主席、中国共产党中央军事委员会主席，恢复邓小平同志的职务，永远开除王、张、江、姚反党集团的党籍，决定召开第十一次全国代表大会。日本工人党对贵党取得的历史性胜利表示衷心祝贺。中国共产党在高举毛泽东同志的伟大旗帜、更加紧密地团结在以华国锋同志为首的党中央周围、贯彻执行毛泽东同志的无产阶级革命路线方面所取得的巨大胜利，必将鼓舞世界和日本的共产主义运动并促进其发展。"},{"type":"paragraph","text":"我们坚信中国共产党定能团结起来取得更大的胜利。　日本工人党中央委员会"},{"type":"paragraph","text":"一九七七年七月二十六日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9bb81908c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
