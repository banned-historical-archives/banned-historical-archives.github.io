ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"中央关于三三制政权问题的指示","alias":"","parts":[{"type":"paragraph","text":"中央关于三三制政权问题的指示！"},{"type":"paragraph","text":"（1948年5月31日）华北局、东北局、华东局、西北局、中原局、晋绥分局、冀察热辽分局并告各前委："},{"type":"paragraph","text":"中央去年二月一日指示三三制仍应执行，废除三三制的意见是错误的，但自去年“二·一”至今的一年多时间内，很多解放区不得中央同意，擅自修改这一指示，从政治上及组织上打击三三制党外人士，其中除少数是罪有应得者外，大多数的打击是过“左”的错误行动。而各地对于此项重大问题，事前既不向中央请示，至今亦很少甚至没有向中央反映情况。兹特责成各局于电到后半月至一月内，将当地地委一级、区党委一级、中央局或分局一级共三级的党外知名人士列一总名单，注明简历、现状及我党对他的待遇意见，电告中央。和此项名单调查报告之同时，由各中央局、中央分局及工作委员会（如华中工委）负责将自己对统一战线三三制及党外人土问题对中央作一总结报告，是为至要。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"辰世[1]这是毛泽东为中共中央起草的给华北局等的电报。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":5,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":283,"page_end":283},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8a75361e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
