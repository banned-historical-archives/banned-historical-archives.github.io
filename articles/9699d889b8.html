:["戚本禹"],"dates":[{"year":1967,"month":9,"day":4}],"is_range_date":false,"parts":[{"text":"戚本禹给毛泽东的检讨信（要点）","type":"title"},{"text":"戚本禹","type":"authors"},{"text":"〖戚本禹，中央文革小组组员，《红旗》杂志副总编辑、中共中央办公厅秘书局副局长。〗","type":"subtitle"},{"text":"关锋、王力犯了很严重的错误，表现形式是“左”倾盲动。（一）错误地估计了全国的形势，把斗争过程中的反复现象，看作是全国出现了资本主义复辟，看不到革命群众的斗争成果和力量。（二）错误地估计了中国人民解放军，在报纸、电台到处号召“抓军内一小撮”。（三）怀疑一切，随便动摇毛主席司令部的领导。他们犯错误的思想根源是个人主义，自我膨胀， 自以为了不起，比谁都革命，听不得不同意见。","type":"paragraph"},{"text":"我对他们的有些问题察觉不出，王力在外交部问题上犯的错误，就同我有关。我从心里愿意努力改造自己，永远做一个忠于毛泽东思想的小兵。","type":"paragraph"},{"text":" 1967年9月4日","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十二册，中央文献出版社1998年1月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"王力","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9699d889b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
