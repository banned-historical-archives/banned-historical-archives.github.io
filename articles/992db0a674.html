rs":[],"dates":[{"year":1949,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亚澳工会会议朝鲜代表团向毛主席朱总司令献旗"},{"type":"paragraph","text":"朱总司令受旗后致词答谢"},{"type":"paragraph","text":"【新华社北京二十九日电】出席亚澳工会代表会议的朝鲜职工代表团，今日下午三时代表朝鲜全体工人阶级向我国中央人民政府毛泽东主席和中国人民解放军朱总司令献旗。由朱总司令代表受旗。朝鲜代表团团长崔＠德在说明了广大的朝鲜北部和南部工人阶级对于中国革命胜利的欢欣和对于中国人民领袖毛主席、朱总司令的景仰后，即将一面绣着毛主席像的锦旗和两枝朝鲜工人自造的冲锋枪呈献给他们。朱总司令于受旗后致词答谢，并与代表团全体团员合影留念。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"992db0a674"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
