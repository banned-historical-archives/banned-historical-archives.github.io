script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"龙江公社革委会按照毛主席教导注意工作方法  把点上的经验拿到面上去推广","authors":[],"dates":[{"year":1969,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"龙江公社革委会按照毛主席教导注意工作方法"},{"type":"paragraph","text":"把点上的经验拿到面上去推广"},{"type":"paragraph","text":"据新华社南宁十一日电　广西鹿寨县龙江公社革委会成员深入基层蹲点调查研究，以点上的经验指导面上的工作，推动了斗、批、改运动的深入发展。"},{"type":"paragraph","text":"龙江公社革委会成立后，由于人少工作多，部分革委会成员对以点带面的领导方法认识不足，怕"},{"type":"paragraph","text":"“蹲了一个点，丢了一大片”，因此，整天忙于事务，满足于一般号召；有的成员虽然蹲了点，但人在点上，心在面上，没有扎扎实实地调查研究，总结经验，并且运用点上的经验指导面上的工作。因而，领导一般化，工作无起色。"},{"type":"paragraph","text":"驻这个公社的柳州专区毛泽东思想宣传队针对这种情况，组织革委会成员认真学习毛主席关于“任何领导人员，凡不从下级个别单位的个别人员、个别事件取得具体经验者，必不能向一切单位作普遍的指导”的教导，使大家认识到，抓点，是重要的领导方法。领导通过抓点取得第一手材料，才能找出规律性的东西，取得指导运动的主动权。宣传队和公社革委会遵照毛主席关于抓主要矛盾的教导，对全公社的革命形势进行了全面的分析研究，带着当前运动中必须解决的主要问题，到基层去蹲点。例如，在贯彻落实“九大”精神中，他们针对不少生产队不同程度地存在着的不团结的问题，到矛盾尖锐的生产队去调查研究，解决矛盾，总结经验。龙江大队大河第二生产队，是这个公社阶级斗争比较尖锐复杂的一个生产队。阶级敌人利用宗派关系混淆阶级阵线，拉拢腐蚀干部。到这个队蹲点的宣传队和公社革委会成员，举办了毛泽东思想学习班，组织干部、社员学习毛主席的教导：“社会主义社会是一个相当长的历史阶段。在社会主义这个历史阶段中，还存在着阶级、阶级矛盾和阶级斗争，存在着社会主义同资本主义两条道路的斗争，存在着资本主义复辟的危险性。”他们结合革命大批判，回忆本队阶级斗争和两条路线斗争的历史，摆当前阶级斗争的新动向，提高了干部、贫下中农的阶级斗争和两条路线斗争觉悟，揪出了一个隐藏得很深的阶级敌人。宣传队和公社革委会及时推广了这个队抓阶级斗争的经验，有力地促进了全公社斗、批、改的深入发展。"},{"type":"paragraph","text":"龙江公社革委会成员在蹲点调查研究中，联系面上的实际，有的放矢地推广点的经验。由于资产阶级派性作怪，登顶生产队一些社员群众一度不团结，使革命和生产受到影响。公社革委会便组织大河一队的由“一对崩”变为“一对红”的“对子”，到登顶生产队去报告活学活用毛泽东思想，增强革命团结的体会。登顶生产队的社员群众听了他俩的报告后说：大河一队的贫下中农听毛主席的话，搞好了团结，我们应该向大河一队学习。他们开办了毛泽东思想学习班，各自多做自我批评，消除资产阶级派性，迅速增强了革命团结。"},{"type":"paragraph","text":"全坡大队古董二队是龙江公社的“老大难”单位。针对这个队的问题，宣传队和公社革委会便带着勇于斗私批修的典型到这个队讲用，并在这个队举办毛泽东思想学习班，以毛泽东思想为武器，狠批刘少奇的反革命修正主义路线，批判资本主义倾向；同时，在社员之间广泛开展谈心活动，对社员进行细致的思想教育工作，提高了广大社员继续革命的觉悟。这样，很快改变了古董二队的落后面貌。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"574f5901a3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
