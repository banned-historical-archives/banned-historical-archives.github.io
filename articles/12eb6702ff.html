<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习解放军，做文化大革命的主人","authors":["吴蔚鑫","夏锐冠","朱振天","谷光辉"],"dates":[{"year":1966,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们是革命的青年，是无产阶级文化大革命的主人。这个主人的资格是毛主席给的。我们要听毛主席的话，凡是符合毛主席指示的，我们就坚决照办，凡是违背毛主席指示的，我们就坚决反对。"},{"type":"paragraph","text":"二十八日，《人民日报》发表的社论《革命青少年要向解放军学习》使我们又一次听到了毛主席和党中央的声音。我们一定要向解放军学习，要无愧于无产阶级文化大革命主人的光荣称号。我们要以革命的精神、战斗的姿态投入斗争，当好主人。"},{"type":"paragraph","text":"我们要象解放军那样，敢于斗争，敢于革命；善于斗争，善于革命。首先，我们要做旧世界的批判者，要“敢”字当头，“干”字领先。但是我们认为，是不是敢于坚持真理，修正错误，是不是敢于发表自己的正确意见，敢于维护革命利益和国家、人民的利益，也是衡量一个人是不是敢想、敢说、敢做、敢闯、敢革命的一个重要方面。我们一定要不断地用毛泽东思想对照自己，用十六条衡量自己。凡是正确的，就坚决做，带头做，做到底，誓死不动摇；凡是有错误、有缺点的，就坚决、及时改正。一旦发现有不利于运动深入地、健康地向前发展的现象，我们就一定要从革命的利益出发，明确表示自己的态度。毛主席教导我们，要把革命气概和实际精神结合起来。首先我们一定要有大无畏的革命气概，要“锋芒毕露”，对剥削阶级的旧思想、旧文化、旧风俗、旧习惯，要恨得深，要坚决打倒。与此同时，还要“应用马克思列宁主义的理论和方法，对周围环境作系统的周密的调查和研究。不是单凭热情去工作”。我们是文化大革命的主人，就得有个主人的样子，就一定要学会自己教育自己，自己管理自己，就一定要讲究斗争方法，一定要经得起阶级斗争的考验。"},{"type":"paragraph","text":"这几天，我们在认真学习了毛主席的指示和党中央关于无产阶级文化大革命的决定以后，走上了街头，向“四旧”发动了猛烈的进攻；同时我们又进行革命的宣传，散发了大量倡议书，倡议全市红卫兵和一切革命同志认真学习十六条，运用十六条，按十六条的精神办事。我们的行动得到了全市红卫兵和广大革命群众的热情支持。"},{"type":"paragraph","text":"我们决不辜负党和毛主席的期望，要在游泳中学会游泳，在斗争中学会斗争，一定要当好无产阶级文化大革命的主人。"},{"type":"paragraph","text":"华东师大中文系四年级　朱振天　谷光辉　吴蔚鑫　夏锐冠"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12eb6702ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
