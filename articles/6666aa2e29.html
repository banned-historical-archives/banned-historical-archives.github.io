ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"在中共六届七中全会主席团会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共六届七中全会主席团会议上的讲话1]"},{"type":"paragraph","text":"（1944年11月23日）"},{"type":"paragraph","text":"来一个协定，去一个协定，现在又来一个协定，我们坚持同赫尔利在延安签订的协定是有道理的，现在蒋介石不同意，要发动一个尖锐的批评。我们开七大宣布组织解放区联合委员会，这是-个步骤；另外一个步骤是解放区联合委员会暂时不搞，还是提成立联合政府。可调一些人到广西、广东去，中国的国土蒋介石丢到哪里，我们就到哪里。华中来电决定向南发展基本上可同意。还要准备几千干部到满洲去。"},{"type":"paragraph","text":"[1]这是毛泽东在中共六届七中全会主席团会议上讨论国共两党谈判、国内形势等问题时讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":11,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":210,"page_end":210},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6666aa2e29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
