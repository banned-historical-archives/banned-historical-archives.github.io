r":1977,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"献给毛主席纪念堂"},{"type":"paragraph","text":"李小雨"},{"type":"paragraph","text":"誓　言用凿石的、锯木的、搅拌机的声响，用电焊的、熔铸的、马达的火光，更用亿万人民深情的颂扬，建造光辉的毛主席纪念堂。中国，人民的泪水快要流干，一切创伤，只能用实现毛主席的遗愿来补偿；纪念堂呵——请收下我们的誓言：让红旗永远飘扬在天安门广场！毛主席呵，人民知道该怎样向您汇报，华主席呵，我们紧跟你奔向前方；来吧，在新的时代里大显身手，用我们翻天覆地的铁锤、镰刀、钢枪……"},{"type":"paragraph","text":"石料的歌一锤一錾，我们开山凿石，一方一块，我们精磨细刻——白的栏杆，红的基石，黑的陵座。白色的大理石，白得象雪，黑色的泰山石，黑得象钢，红色的花岗石，红得象火。伟大领袖和导师毛主席呀，比雪更纯洁，比钢更坚强，比火更"},{"type":"paragraph","text":"炽热，他是鲜红的太阳永不落……"},{"type":"paragraph","text":"向日葵纪念堂前的葵花，请告诉我，你们默默地垂着头，在想些什么？是在倾听谆谆的教诲？是在回忆殷切的嘱托？脚下，铺着井冈山的泥土，身边，滚过延河水的清波。我韶山的小弟弟、小妹妹呵，你们寄来的种子，如今即将收获。在纪念堂前长得这样坚强、茁壮，是毛泽东思想给了你们无尽的光和热……"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3287add2aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
