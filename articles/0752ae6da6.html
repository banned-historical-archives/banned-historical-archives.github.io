友姚文元、韦国清陪同游览了桂林风景区芦笛岩","authors":[],"dates":[{"year":1975,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黎笋率党政代表团离天津到达桂林访问"},{"type":"paragraph","text":"中共广西壮族自治区委员会举行宴会热烈欢迎越南战友姚文元、韦国清陪同游览了桂林风景区芦笛岩"},{"type":"paragraph","text":"新华社南宁一九七五年九月二十七日电　以越南劳动党中央委员会第一书记黎笋为团长，越南劳动党中央委员会政治局委员、政府副总理黎清毅为副团长的越南党政代表团，由中共中央政治局委员姚文元陪同，今天上午由天津乘专机到达桂林参观访问。"},{"type":"paragraph","text":"中共中央政治局委员、人大常委会副委员长、中共广西壮族自治区委员会第一书记、自治区革命委员会主任韦国清，中共广西壮族自治区委员会书记、自治区革命委员会副主任刘重桂，中共桂林市委员会书记、桂林市革命委员会主任钟枫和桂林市两千多名群众，到机场热烈欢迎越南党政代表团。"},{"type":"paragraph","text":"到机场欢迎贵宾的还有广西壮族自治区、桂林市和有关方面的负责人廖炜雄、江景河、史清盛、区镇、唐廷国、慕石起、钟秀琛、潘树彬、崔金才等。"},{"type":"paragraph","text":"越南民主共和国驻南宁总领事阮荫也到机场迎接。"},{"type":"paragraph","text":"当越南党政代表团的同志走下飞机时，韦国清等同志迎上前去，和黎笋、黎清毅等同志热情握手。身穿鲜艳民族服装的青少年们，敲起锣鼓，欢乐起舞，热情欢迎越南贵宾。黎笋同志等不断向欢迎群众挥手致意。"},{"type":"paragraph","text":"当晚，中共广西壮族自治区委员会、广西壮族自治区革命委员会、中共桂林市委、桂林市革命委员会举行宴会，欢迎越南党政代表团。姚文元、韦国清、刘重桂、钟枫等出席了宴会。"},{"type":"paragraph","text":"韦国清同志在宴会上祝酒时赞扬越南人民取得的民族解放的伟大胜利，开创了越南历史的新篇章。他说，我们广西地处祖国南疆，和越南山水相连。广西各族人民将同全国人民一道，为不断巩固和发展中越两国人民之间的革命友谊，贡献自己的力量。"},{"type":"paragraph","text":"黎清毅同志在祝酒时说，桂林市和广西壮族自治区人民同越南人民的情谊是十分深厚和亲切的。广西人民为越南人民的正义斗争事业和社会主义事业作了宝贵的贡献。他赞扬广西人民以艰苦奋斗、自力更生的精神进行社会主义革命和建设。黎清毅同志说，在我们向同志们告别的时候，越南党政代表团向中国人民致以团结、胜利的敬意和表示美好的祝愿。"},{"type":"paragraph","text":"下午，越南党政代表团在姚文元、韦国清的陪同下，游览了桂林风景区芦笛岩。"},{"type":"paragraph","text":"陪同代表团到达桂林访问的还有外交部副部长韩念龙、中联部副部长申健。"},{"type":"paragraph","text":"越南党政代表团今天上午乘飞机离开天津时，中共天津市委、市革委会和人民解放军天津警备区的负责人解学恭、吴岱、王一、徐信、孙敬文等到机场送行。（附图片）"},{"type":"paragraph","text":"黎笋、黎清毅等越南同志游览桂林风景区芦笛岩。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0752ae6da6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
