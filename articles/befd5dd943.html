<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席声明极大地激励了人民的战斗意志首都卅万人强大示威游行声讨美帝“美帝国主义从多米尼加滚出去!”的吼声成天震响　在京的拉丁美洲、亚洲、非洲友人和留学生同首都人民一起参加反美示威","authors":[],"dates":[{"year":1965,"month":5,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京13日电　今天，反对美国武装侵略多米尼加的怒火，燃遍了整个北京城。全市有三十万人举行大规模的示威游行和集会，强烈谴责美国强盗的侵略罪行，表示坚决支持英勇的多米尼加人民的抗美爱国斗争。"},{"type":"paragraph","text":"毛泽东主席昨天发出的支持多米尼加人民反对美国武装侵略的声明，极大地激励了首都人民的战斗意志。今天，全城沸腾，到处震荡着这样的声音:“我们完全拥护毛主席的声明和我国政府的声明!”“美帝国主义从多米尼加滚出去!”“全世界人民团结起来，打倒美帝国主义!”"},{"type":"paragraph","text":"强大的示威游行从清晨一直持续到傍晚。市内主要街道上，成天震响着战斗的口号声和革命歌曲声。参加游行示威的人们，不断从大街小巷涌向市中心的天安门广场。有三十多个文艺团体，在天安门广场举行了反对美帝侵略多米尼加的示威演出。在郊区的工厂、学校和农村人民公社，也有成群结队的人们分别举行集会和游行。在不少游行队伍的前面，许多人化装成英勇的多米尼加人民，用绳索套住了“美国强盗”的脖子，许多人表演着多米尼加人民把美国侵略者打得抱头鼠窜的情景，表现了多米尼加人民不畏强暴的战斗精神。正在北京的拉丁美洲和亚洲、非洲一些国家的朋友们和留学生，也同首都人民一起参加了今天反美大示威。"},{"type":"paragraph","text":"许多工人、农民、民兵和大学教授，在今天的示威游行中纷纷向记者发表谈话，有的在各单位举行的集会上发表演说，表达了首都各阶层人民支持多米尼加人民正义斗争的坚决意志，表示要同全世界人民一起，把反对美帝国主义的斗争进行到底。"},{"type":"paragraph","text":"北京电子管厂工人民兵、机枪射手张士兴，扛着轻机枪同本厂工人一起参加游行。他在游行中对记者说，我们坚决支持多米尼加人民的抗美斗争，并且时刻警惕着美帝国主义的一切侵略阴谋。我们决心紧握手中枪，苦练杀敌本领，和全世界革命人民一道，狠狠打击美帝国主义。"},{"type":"paragraph","text":"解放前亲眼看到美帝国主义在北京横行霸道的一些老职工，今天怀着旧恨新仇，参加了游行。六十岁的工人吴文治激动地说，解放前美国兵驻在东交民巷时，我们从这里过，连走路都不自由。今天，它还在到处做坏事，不把它打倒，世界人民就不能安身。"},{"type":"paragraph","text":"离北京城一百多里的顺义县焦庄户，有着地道战斗争的光荣传统。这个山村的二百多民兵，今天在当年地道口的广场上，举行了集会和游行。曾在抗日战争时期担任地雷小组长的老贫农焦现富说，过去日本帝国主义、蒋介石匪帮都被我们打败了，美帝国主义现在又在屠杀多米尼加、越南人民，我们绝不允许它行凶。"},{"type":"paragraph","text":"在北京大学和中国人民大学举行的集会上，一些老教授激昂地发表讲话，纷纷表示要同多米尼加人民和全世界革命人民站在一起，打倒全世界人民的共同敌人美帝国主义。"},{"type":"paragraph","text":"首都三十多个文艺团体在天安门广场举行的示威演出，有将近三千名文艺工作者参加。他们怀着对美帝国主义的无比仇恨和对多米尼加人民英勇抗击美帝的崇高敬意，连夜创作、排练了大批节目。他们演出的活报剧、诗朗诵、快板、对口词等，把美帝国主义侵略多米尼加的强盗嘴脸暴露在光天化日之下，不断激起示威群众振臂高呼:“向英勇的多米尼加人民致敬!”“美帝国主义从多米尼加滚出去!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"befd5dd943"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
