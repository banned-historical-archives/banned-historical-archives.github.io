tes":[{"year":1955,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中华人民共和国主席毛泽东，全国人民代表大会常务委员会委员长刘少奇，国务院总理周恩来致电阿尔巴尼亚人民共和国人民议会主席团主席列希、部长会议主席谢胡、外交部长什图拉，祝贺阿尔巴尼亚解放十一周年。电文如下:阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希同志:阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志:阿尔巴尼亚人民共和国外交部长贝哈尔·什图拉同志:"},{"type":"paragraph","text":"当阿尔巴尼亚人民获得解放十一周年之际，我们谨代表中国人民和中国政府向你们，并且通过你们向英雄的阿尔巴尼亚人民和政府致热烈的衷心的祝贺。"},{"type":"paragraph","text":"十一年来，具有光荣革命传统的阿尔巴尼亚人民在阿尔巴尼亚劳动党的领导下，在巩固人民民主政权，捍卫祖国独立和创造繁荣幸福的新生活方面已获得了光辉的成就。中国人民为兄弟的阿尔巴尼亚人民的成就感到欢欣，并且祝中阿两国人民的兄弟友谊和团结在我们两国建设社会主义和维护世界和平的共同事业中更加巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会　常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理兼外交部长　周恩来"},{"type":"paragraph","text":"1955年11月26日于北京"},{"type":"paragraph","text":"——新华社讯"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0ab73d988"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
