thors":["周恩来","毛远新"],"dates":[{"year":1967,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"毛远新传达周恩来对哈尔滨军事工程学院的指示","type":"title"},{"text":"毛远新周恩来","type":"authors"},{"text":"12月4日下午两点，毛远新同志来西苑旅社，找边世军等军工同志传达了3日晚周总理关于军工大联合问题的指示。基本精神是：","type":"paragraph"},{"text":"毛主席、党中央、周总理非常关心哈军工问题，要求军工两派尽快实现革命大联合，以团结对敌；要做榜样，立新功。军工两派的联合，将促进黑龙江问题的解决和东北三省的革命大联合，同时，对反帝反修具有重大意义。中央决定，军工两派的联合问题在北京解决要求双方达成协议，希望双方协商的基本内容是：","type":"paragraph"},{"text":"（1）各级权力机构群众团体代表对等，结合干部由双方协商决定；","type":"paragraph"},{"text":"（2）双方立即停止相互攻击的宣传活动；","type":"paragraph"},{"text":"（3）以此为榜样，向全省全市发出大联合的呼吁，等等。","type":"paragraph"},{"text":"同时，哈一机的问题中央也决定在京解决。","type":"paragraph"}],"comments":[],"origin":"1967年12月8日清华大学井冈山斗批改战团编印《学习资料》第63期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c973a7db3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
