ar":1989,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界杯乒乓球赛马文革打入四强"},{"type":"paragraph","text":"新华社内罗毕9月7日电　第十届世界杯乒乓球赛7日在这里产生了四强，比利时的塞韦、中国的马文革、波兰的格鲁巴和瑞典的阿佩伊伦分别战胜对手，进入半决赛。"},{"type":"paragraph","text":"8日将进行半决赛，由马文革对塞韦，格鲁巴对阿佩伊伦，胜者于9日争夺冠军。"},{"type":"paragraph","text":"在7日进行的1／4决赛中，塞韦以3∶2险胜联邦德国的伯姆，马文革以3∶1胜队友于沈潼，阿佩伊伦以3∶0轻取波兰的库哈尔斯基，而格鲁巴则险些栽在巴西的鹿野的拍下，双方打成2平后，第五局仅以2分的优势（21∶19）取得胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b0c8be430"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
