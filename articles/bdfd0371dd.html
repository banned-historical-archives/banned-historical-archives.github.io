<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"会理县委扩干会上学习过渡时期总路线结合检查去年冬今春工作所存在的问题和缺点综合材料","authors":[],"dates":[{"year":1954,"month":4,"day":2}],"is_range_date":false,"parts":[{"text":"会理县委扩干会上学习过渡时期总路线结合检查去年冬今春工作所存在的问题和缺点综合材料","type":"title"},{"text":"......有的农民反映说：“啥子社会主义，余粮都卖完了”。个别农民更反映说：“吃光卖光，好到集体农庄”。第六区油房村农民汪德恩不敢参加互助组，说：“参加了互助组，干部把我家底摸清了，叫卖多少余粮就没说头”。农民…认为总路线就是卖余粮，卖了余粮就是实行了总路线，因此生产情绪受到了阻扰。第六区大村乡杨文富说：“总路线就是卖余粮有啥搞头，以后做出来够吃算了，免得麻烦”。特别突出的是七区云甸乡有五户农民不要土地，要交给政府。","type":"paragraph"},{"text":"对逐步破坏生产资料私有制思想上感到恐怖。第二区爱民乡王元庆互助组，组长王元庆在赶街时听说以后生产资料要公有，回去就把互助组解散了，认为现在发展生产，以后生产资料要公有，不是“往自淘神”。","type":"paragraph"},{"text":"高山地区农民对国家工业化与农业改造缺乏信心，对社会主义消极，认为高山深沟，不能用机器，别人是社会主义了，自己还是“没事”。","type":"paragraph"},{"text":"在雇工与换工，高利贷与农民之间互助性的借贷，商业与副业的具体问题上仍分不清社会主义与资本主义的思想政策界线，在这些问题上顾虑很大，怕戴上资本主义的帽子，严重的影响了生产。","type":"paragraph"},{"text":"认为社会主义就是绝对平均，吃大锅饭。…","type":"paragraph"},{"text":"个别地区在动员群众卖余粮上，…以粗暴的态度，甚至用斗争地主的方法及肉刑及变相肉刑等对待农民…","type":"paragraph"},{"text":"1．捆吊农民。第三区干部在购粮中共捆4个人；第八区干部刘焕坤也因购粮捆了村干部。干部廖加祥把红格乡的一个农民禁闭在区政府，其他几个地区又有如此现象。","type":"paragraph"},{"text":"2．欺哄吓诈软硬兼施。第五区干部刘长方说：“黄牛不打不下田，毛子不紧不出钱，不整就怕粮食搞不出来。”区干部王静珍在开会时将卖了余粮和未卖余粮的农民分开坐，说：“你们愿意走哪条路？不卖就是走资本主义的路。”赵仁资在会上的口号是：“打倒不卖粮食的顽固份子，打倒坚决走资本主义道路的顽固份子。”干部范洪元叫根本无余粮的在会上假报以带动余粮户说：“反正我不找你要”。干部张文学对农民说：“卖给合作社和仓库保管的好，二天还好的。”同时采用所谓一软一硬的办法，即先在会上骂一顿，然后另外一个个拉下去动员。","type":"paragraph"},{"text":"3．斗争。第三区大桥乡生产委员会严炳坤对余粮户提出“贫富斗争”，说：“你不拿出来，我们就要进行贫富斗争”。第八区石头村将中农唐明发站在板凳上斗争。（69-71页）","type":"paragraph"}],"comments":[],"origin":"中共西康省委西昌，德昌，会理，会东，昭觉县委关于扩干会议的总结报告（1954-55），四川省档案馆。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdfd0371dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
