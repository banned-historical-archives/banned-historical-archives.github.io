rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的群众路线是革命胜利的根本路线","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 英国——越南团结阵线书记曼钱达说，光辉的毛泽东思想是在帝国主义走向最后灭亡，民族解放和社会主义走向必然胜利时代的最强大和战无不胜的武器。生活在毛泽东时代是莫大的幸福。"},{"type":"paragraph","text":"他在接见新华社记者时说：“过去从来没有一个人对五大洲人民产生过象毛泽东在当代所产生的这样巨大的影响。”"},{"type":"paragraph","text":"曼钱达说：“毛泽东创造性地发展和丰富了马克思列宁主义的革命科学。”"},{"type":"paragraph","text":"他指出，“毛泽东的伟大的群众路线思想——‘从群众中来，到群众中去’，不但显示了对人民群众的热爱、关心和信任，而且在事实上，这是争取革命斗争胜利的根本的指导路线。谁掌握了这一思想并去实践，谁就一定能够克服一切困难和击败一切反动势力。”"},{"type":"paragraph","text":"曼钱达还说，毛主席畅游长江的消息表明他身体健壮，这是一个大喜讯。他说：“我从心底里祝毛主席长寿。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a97529b78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
