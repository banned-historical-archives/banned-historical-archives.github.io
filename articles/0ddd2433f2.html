ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于将捕人杀人的批准权一律提高一级的电报","alias":"","parts":[{"type":"paragraph","text":"关于将捕人杀人的批准权"},{"type":"paragraph","text":"一律提高一级的电报"},{"type":"paragraph","text":"（1951年5月16日）子恢叫同志，并告饶、邓、习："},{"type":"paragraph","text":"五月十一日电收到。为了不使步骤混乱难于掌握（目前中南西南两区已有难于掌握的形势，必须严重注意），捕人杀人的批准权必须一律提高一级，不许有例外。在土改区可由省派代表至专区，由专区派代表至县，掌握材料，用电话向专区请示批准捕人，向省请示批准杀人，这样对于捕杀少数人仍是便利的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十六日[1]子恢，即邓子恢，当时任中共中央中南局第三书记。"},{"type":"paragraph","text":"[2]饶，指饶漱石，当时任中共中央华东局第一书记。邓，指邓小平，当时任中共中央西南局第一书记。习，指习仲勋，当时任中共中央西北局第一书记。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":309,"page_end":309},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ddd2433f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
