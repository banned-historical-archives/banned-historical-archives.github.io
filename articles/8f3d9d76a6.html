art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"谈形势讲传统话未来薄一波在首都各界青年迎新春座谈会上强调学习马列主义、毛泽东思想，学习党的十一届三中全会以来的文件精神，学习中国历史","authors":["邹爱国"],"parts":[{"type":"paragraph","text":"他说，只要我们四千多万共产党员和五千多万共青团员坚定共产主义的信念，团结一致，艰苦奋斗，就一定能使中华民族迈进世界先进民族之林。"},{"type":"paragraph","text":"薄一波和乔石、胡乔木、王兆国、王鹤寿等同志，今天下午在人民大会堂江苏厅和首都一百多名优秀青年一起谈形势、讲传统、话未来，喜迎丁卯年新春。"},{"type":"paragraph","text":"薄一波在热烈的掌声中讲话说，听了青年同志的发言。感到我们的事业大有希望，后继有人。他回忆了战争岁月老一辈革命家的英勇斗争。他说，我们搞四个现代化建设，需要老老实实地艰苦创业。要有民族自尊心和自信心，要有吃苦在前、享受在后的精神。党的十一届三中全会以后，我国人民生活有了很大提高，但是我们国家人口众多，目前还不富裕，不能提倡高消费，还要大力提倡艰苦奋斗、勤俭建国。"},{"type":"paragraph","text":"薄一波说，从中国一百多年的历史看，没有共产党就没有新中国。中国要搞社会主义必须有中国共产党的领导，必须坚持四顶基本原则。搞资产阶级自由化，中国是建不成四个现代化的，改革、开放也不会成功。他希望青年同志接过老一辈的旗帜，把中国的社会主义现代化事业搞好。"}],"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f3d9d76a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
