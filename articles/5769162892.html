量比去年同期增长百分之三十七","authors":[],"dates":[{"year":1966,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"活学活用毛主席著作促进人的思想革命化"},{"type":"paragraph","text":"我国化肥工业大幅度增产"},{"type":"paragraph","text":"一月到九月的化肥产量比去年同期增长百分之三十七"},{"type":"paragraph","text":"据新华社南京十六日电　我国化肥工业战线广大职工高举毛泽东思想伟大红旗，大搞思想革命化，推动化肥生产取得了新胜利。今年一到九月，全国化肥产量，比去年同期增长百分之三十七。氮肥的质量稳定，磷肥的质量提高。电力、原料、材料的消耗普遍下降，生产成本降低。"},{"type":"paragraph","text":"化肥工业战线职工们指出，这一巨大成就的取得，是毛泽东思想的胜利，是无产阶级文化大革命开的花，结的果。今年以来，各地化肥厂都把活学活用毛主席著作放在一切工作的首位。尤其是在无产阶级文化大革命高潮中，广大职工怀着无比深厚的阶级感情，在斗争中活学活用毛主席著作。广大职工运用毛泽东思想这个最强大最锐利的武器，向党内走资本主义道路的当权派和资产阶级反动"},{"type":"paragraph","text":"“权威”猛烈开火，破除一切阻碍生产力发展的旧规陋习，进一步解放了生产力。广大职工敢想敢干敢革命，在短时期内创造了许多新技术、新工艺、新设备、新产品。已经用于生产的几种新型触媒产品，就是这样创造出来的。"},{"type":"paragraph","text":"化肥工业战线广大职工今年以来，响亮地提出用同样品种、同样数量的原料材料，为国家增产更多更好的化肥支援农业的口号。全国主要化肥厂今年以来生产合成氨节约的焦炭和白煤，可以用来增产近二十万吨化肥。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5769162892"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
