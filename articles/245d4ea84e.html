ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"致中共普西北区委等电","alias":"","parts":[{"type":"paragraph","text":"致中共晋西北区委等电"},{"type":"paragraph","text":"（1939年12月23日）"},{"type":"paragraph","text":"晋西北新派力量加上我们力量，可能造成优势，在反投降派的斗争中，如果方针不错，是有胜利把握的。你们对巩固新军及进步政权还须大胆地坚决地继续进行，并注意很有理由地应付阎锡山。阎已令赵承绶调兵进攻四纵队，武装冲突势不可免。应立即准备作战，继续巩固新军。武装冲突不应由新军先发动，而应在赵承绶进攻时，新军占有利阵地，取防御姿态反攻而消灭之。第一二○师师部现在还不宜立刻到晋西北，但应立即准备于必要时转移。"},{"type":"paragraph","text":"[1]这是毛泽东和王稼祥关于晋西事变致中共晋西北区委，第-二O师，八路军总部，彭绍辉、罗贵波等电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":12,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":233,"page_end":233},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"245d4ea84e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
