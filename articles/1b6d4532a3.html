":[],"dates":[{"year":1974,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海星火锅炉厂在深入开展批林批孔运动中，揭矛盾，促转化，极大地激发了干部、群众的社会主义积极性，有力地促进了生产的发展。今年头三个月，生产月月上升。第一季度，全厂总产值提前七天超额完成了计划，比去年同期增长百分之五十以上，产品质量稳定提高。与此同时，还完成了一大批技术革新项目。"},{"type":"paragraph","text":"批林批孔运动开展以来，厂党支部引导群众集中批判林彪的“克己复礼”反动纲领。许多老工人通过回忆对比，表示既要当批林批孔的尖兵，又要做促生产的闯将，用实际行动巩固和发展无产阶级文化大革命的胜利成果，巩固无产阶级专政。这个厂的下料组是头道工序，但是生产一直跟不上需要。通过批判林彪的“克己复礼”，小组面貌焕然一新。同志们把多割一块铁板、多铇一块铁板，看作是批林批孔、打击帝、修、反的实际行动。大家相互协作，争分夺秒地投入战斗，目前不仅已完成三、四月份二百五十台锅炉的落料任务，而且把五、六月份投产的锅炉封头的料也落好了。"},{"type":"paragraph","text":"这个厂的工人在狠批林彪“克己复礼”的同时，还联系本单位阶级斗争和路线斗争的实际，狠批林彪、孔老二鼓吹的“上智下愚”、“生而知之”等反动谬论，破除迷信，解放思想，掀起技术革新的热潮。机修组有位老工人，和组内同志一起研究，花了五天时间，搞出了管孔模，把汽水分离器管钻孔的三道工序合并为一道，使班产量从原来的十几根，提高到一百多根。今年以来，这个组还搞出了封头切割机、环直缝两用翻转机、自动拌面机等十一个革新项目。在机修组的带动下，全厂的生产和技术革新搞得热气腾腾。零件组、下料组、电工组、金工组的工人都搞出了一些工艺革新。外包组原来每月包三十台锅炉，工人们改进了操作方法后，提高到四十台。三个装配组改变了过去以组为单位装配锅炉的做法，实行了“一条龙”大流水操作，生产效率提高百分之五十。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b6d4532a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
