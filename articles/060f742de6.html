art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛泽东号”机车组的光辉历程","authors":[],"parts":[{"type":"paragraph","text":"“毛泽东号”机车组是铁路战线的开路先锋。自一九四六年命名以来，在阶级斗争中一往无前，在生产斗争中敢打敢拚，步步走在毛主席的革命路线上。战火纷飞的战争年代，他们转战关内外，为打倒蒋介石，解放全中国，做出了卓越的贡献。社会主义时期，他们坚持无产阶级专政下继续革命，哪里有困难就到那里去，出色地完成了党和人民交给的任务。在他们的带动下，全铁路涌现出六百二十多名学习“毛泽东号”的模范机车组。英明领袖华主席为“毛泽东号”机车题字后，他们更加意气风发，斗志昂扬，决心同“周恩来号”、“朱德号”机车组携起手来，并肩战斗，努力赶超世界先进水平，当好向铁路现代化进军的火车头。"},{"type":"paragraph","text":"“毛泽东号”机车组三十余年成就简图（图片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"060f742de6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
