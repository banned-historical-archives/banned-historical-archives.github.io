rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"朝鲜最高人民会议代表团到沈阳访问贵宾门在离开北京时受到各界人民热烈欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社沈阳1日电 由朴金喆团长率领的朝鲜最高人民会议代表团，今天上午在归国途中由天津乘专车到达沈阳参观访问。贵宾们在沈阳车站受到辽宁省和沈阳市各界二千多人的热烈欢迎。"},{"type":"paragraph","text":"今天，沈阳车站站台上悬挂着欢迎朝鲜贵宾的巨幅标语。穿着各色鲜艳夏装的男女青年和手捧鲜花的少先队员们，早就齐集站台等候贵宾们到来。八时三十分，贵宾乘坐的专车驶进车站时，乐队奏起欢迎曲，男女青年们欢欣鼓舞地挥动着中朝两国国旗、彩旗和鲜花，欢呼声与锣鼓声响成一片。"},{"type":"paragraph","text":"贵宾们走出车厢，同前来欢迎的中共辽宁省委第一书记黄火青，辽宁省省长黄欧东，中国人民解放军沈阳驻军首长陈锡联上将、赖传珠上将，中共沈阳市委第一书记焦若愚，沈阳市市长刘宝田等省市党政军负责人，以及各民主党派辽宁省地方组织和各人民团体负责人等一一握手。一群少先队员把一束束鲜花献给全体贵宾。"},{"type":"paragraph","text":"当主人们陪同贵宾穿过夹道欢迎的人群走出车站时，欢迎群众摇动鲜花、彩旗，高呼“向英雄的朝鲜人民致敬”、“金日成首相万岁”等口号。"},{"type":"paragraph","text":"贵宾们离开车站以后，由黄火青、黄欧东等陪同，乘车参观了沈阳市容。今天适逢假日，街上熙熙攘攘的人群，不断地向贵宾们热烈鼓掌表示欢迎。"},{"type":"paragraph","text":"今天，贵宾们在沈阳还参观了辽宁工业展览馆和沈阳重型机器厂，游览了北陵公园。"},{"type":"paragraph","text":"晚上，贵宾们出席了辽宁省省长黄欧东为欢迎他们而举行的宴会。黄欧东省长和朴金喆团长先后在宴会上讲话，热情地赞颂两国人民的伟大友谊。黄欧东省长说，朝鲜是辽宁省隔江相望的近邻，全省人民对英雄的朝鲜人民抗击美帝国主义的侵略，保卫中国人民的安全感受最深。他代表省市党政机关和省市人民，向兄弟的朝鲜人民表示衷心的感谢和崇高的敬意。朴金喆团长在讲话中说，辽宁省同朝鲜不仅在地理上很近，而且有着伟大的朝中友谊的纽带把我们连结在一起。他还说，朝中两国人民以鲜血凝成的伟大友谊，将和鸭绿江水一样万古长流，世界上没有任何力量能够破坏我们两党和两国人民间的牢不可破的友谊。"},{"type":"paragraph","text":"据新华社讯 由朴金喆团长率领的朝鲜最高人民会议代表团，6月30日上午乘专车离开北京。首都各界群众三万多人怀着无限的惜别之情，热烈地夹道欢送英雄的朝鲜人民的友谊使者。朱德、邓小平等党和国家领导人到车站欢送。彭真同志和朴金喆团长在讲话中，再次赞扬中朝人民战斗友谊和伟大团结。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac6d062a7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
