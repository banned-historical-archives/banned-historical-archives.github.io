uthors":[],"dates":[{"year":1951,"month":9,"day":1}],"is_range_date":false,"parts":[{"text":"冯超给周总理的信 （节录）","type":"title"},{"text":"[冯超，当时在苏北盐城之民政科工作。]","type":"subtitle"},{"text":"周总理：","type":"appellation"},{"text":"在解放区过去土改时有些外出人员多年不归，村中认为这些人员已经牺牲或在外安家，再无回归可能，因而没有留给土地；或因当时对这些人员的政策不够明确，抱着仇视态度，不给留土地；或因该区土地很少，按现有人口尚不够分配，因而未留；更有虽留了部分公田，后又因长期无人代管，致有土地慌，或为少数干部把持。…近年来由于全国基本上得到解放，远离千里的部队同志因病或残废复员回家，解放战士遣散回籍，北上逃亡人员（包括贫苦农民因上海流散难民回乡及逃亡地主）的不断回籍归置，造成不少人无土地分配的状况。据我们经验，八个县统计这种人有数百之多，各县府不断请求处理办法，但土改已结束，不能从已确定产权的户抽出土地来分给这些回归人员，这真是一个严重的问题。（pp.142－43）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"095912dfe8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
