<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓拓同右倾机会主义分子是一伙","authors":["钟祥瑞"],"dates":[{"year":1966,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻沪空军某部　钟祥瑞"},{"type":"paragraph","text":"邓拓和右倾机会主义分子完全是一伙，他猖狂地执行着一条右倾机会主义即修正主义的路线，充当了反动阶级和右倾机会主义分子向党进攻的喉舌。"},{"type":"paragraph","text":"在我们国家经济暂时困难时期，右倾机会主义分子向党发起了进攻，恶毒地攻击党，大肆诬蔑总路线、大跃进和人民公社。这时，邓拓为了积极地配合行动，里应外合，一齐进攻，急急“破门而出”，抛出了他的《燕山夜话》。邓拓的《燕山夜话》，是彻头彻尾的反党反社会主义的黑话，是射向党的心脏的一支大毒箭。"},{"type":"paragraph","text":"右倾机会主义分子谩骂我们的大跃进是“升虚火”、“发高烧”，是“小资产阶级狂热性”。邓拓咒骂我们的大跃进是“吹牛皮”、“说大话”，这难道不是一个鼻孔出气吗?在党的领导下，全国人民意气风发，斗志昂扬，立志改变我国一穷二白的面貌，经过艰苦奋战，实现了工农业生产大跃进，创造了许多史无前例的奇迹。难道这是“发高烧”，难道这是“吹牛皮”、“说大话”?不!这完全是邓拓之流在大肆放毒。"},{"type":"paragraph","text":"右倾机会主义分子诬蔑我们的大跃进是“主观主义的产物”。邓拓攻击我们是“用空想代替了现实”、“没有任何可靠的根据”。这不是和右倾机会主义分子一唱一和，密切配合吗?我们有党和毛主席的英明领导，有优越的社会主义制度，有六亿五千万勤劳勇敢的人民，有广阔的大地和丰富的资源，完全能够以最快的速度，把我国建设成一个强大的社会主义国家，这决不是一小撮反党反社会主义分子所能诬蔑的。"},{"type":"paragraph","text":"右倾机会主义分子恶意诽谤人民公社“办早了”、“搞糟了”。邓拓在一旁拼命叫喊“一个鸡蛋的家当”、“全部毁掉了”，在事实面前“碰得头破血流”。这同右倾机会主义分子穿的不是同一条裤子吗?难道我国的社会主义建设是“全部毁掉了”?不，这是邓拓在睁眼说瞎话。我们出了大庆油，我们出了大寨粮，我们造了一万二千吨水压机，我们成功地爆炸了两颗原子弹和进行了一次含有热核材料的核爆炸，所有这一切，都给了邓拓一记响亮的耳光!给了他们这一伙反党反社会主义分子当头一棒!"},{"type":"paragraph","text":"总之，右倾机会主义分子破口大骂我们，邓拓也来个泼妇骂街；右倾机会主义分子恶毒诬蔑我们，邓拓也血口喷人；右倾机会主义分子向党进攻，邓拓也气势汹汹地向党杀来。两者唱的是同一个反调，演的是同样一个角色，同样一幕丑剧。邓拓和右倾机会主义分子完全是一伙，他猖狂地执行着一条右倾机会主义即修正主义的路线，充当了反动阶级和右倾机会主义分子向党进攻的喉舌，是典型的修正主义的活标本。"},{"type":"paragraph","text":"当然，随着阶级斗争的进一步深入，邓拓等一小撮反党反社会主义分子向党进攻的手法，也更加隐蔽，狡猾，迂回，曲折。他们以谈历史、讲故事、说笑话作幌子，借古讽今，含沙射影，放出了大量毒箭。他们梦想用这种手法，来蒙蔽人民，欺骗人民，实现反党反社会主义的阴谋。"},{"type":"paragraph","text":"工农兵的眼睛是雪亮的，不管邓拓的手腕多么巧妙，伪装得多么隐蔽，休想逃脱人民的手掌。右倾机会主义分子在人民的铁拳下，早已碰得头破血流。邓拓等一小撮反党反社会主义分子，在人民的铜墙铁壁面前，也将碰得头破血流。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"740d8a38df"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
