script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邯郸扭转右倾偏向　市委亲自动手加强职工工作","authors":["志坚"],"dates":[{"year":1949,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邯郸扭转右倾偏向"},{"type":"paragraph","text":"市委亲自动手加强职工工作"},{"type":"paragraph","text":"【本报讯】邯郸市委开始加强职工工作。这是经过上月学习，初步明确了依靠工人阶级建设城市的思想之直接结果。至此，邯市三年来忽视依靠工人阶级的偏向，已初步得到纠正。按该市于一九四五年十月解放后，即进行建党工作，但没有扎根在工人身上。据去年十一月统计，全市工人、农民、手工业者等成份党员七百四十五名，工人成份只有十一名，近几月来又经发展，工人成份党员才仅有二十六名。该市职工工作也有三年的历史，解放后经店员增资运动，工会会员虽数达千名，但除店员有少许活动外，其他部门职工活动则极少。一九四七年八、九月间，职工工作更陷于半停顿状态。一九四七年整党后，提出城市要发展工商业，市委觉得不组织工人不行，于去年四月才又抽调干部组织了市职工筹委会，开始整顿职工工作。去年七、八月间，该市曾发现私营大兴等工厂非法剥削工人，因当时市委思想不明确，对劳资两利政策不敢坚决贯彻，事件拖到十月才解决。此后市委对职工工作开始注意，如去冬举办了两期工人夜校，组织了工人消费合作社，并对工人工作作出决定，同时指示邯郸日报应以工人为主要对象等。市委于上月学习后，思想上真正初步明确了工人阶级是党的基本阶级，必须依靠工人阶级团结其他阶层来建设城市，回忆了过去忽视依靠工人阶级的偏向，遂即更进一步加强职工中党的建设和职工工作，增加了职工干部，市委赵玉清、薛经纶亲自参加领导职工工作，职工会并制订了工作计划。但因对过去执行政策的偏向还没有进行彻底检查，对干部还没有进行进一步的教育以致不少干部对依靠工人阶级尚存在糊涂观念。有的说：“在邯郸市上看不到工人。”贸易、银行部门有的同志认为自己作的不是职工工作，感到为工人服务困难。而该市工会至今会员虽达二千余名，组织却很薄弱，市政府则对工人中的一些问题尚未好好解决，据闻个别私营工厂（如裕民印刷局）尚存有十六小时工作的非法剥削制度，工人尚缺乏文化教育。目前该市市委、职工会、市政府及企业部门急需进一步深入检查，纠正过去执行政策的偏向，认真学习党的政策，同时要认真加强职工教育，才能把职工工作做好。"},{"type":"paragraph","text":"（志坚）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f9bd14105"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
