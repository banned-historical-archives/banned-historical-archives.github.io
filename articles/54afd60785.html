ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"毛泽东等祝贺阿尔巴尼亚人民共和国成立十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺阿尔巴尼亚人民共和国"},{"type":"paragraph","text":"成立十周年的电报"},{"type":"paragraph","text":"（1956年1月10日）阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希同志：阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志：阿尔巴尼亚人民共和国外交部长贝哈尔·什图拉同志："},{"type":"paragraph","text":"值此阿尔巴尼亚人民共和国成立十周年之际，我们谨代表中华人民共和国政府和人民向你们，并且通过你们向阿尔巴尼亚人民共和国政府和人民致热烈的兄弟般的祝贺。"},{"type":"paragraph","text":"十年来，阿尔巴尼亚人民在政治、经济和文化各方面都取得了光辉的成就，并且正充满信心地向着社会主义的道路前进。最近阿尔巴尼亚参加联合国的事实定将使阿尔巴尼亚今后在维护世界和平和促进国际合作的事业中发挥更大的作用。"},{"type":"paragraph","text":"中国人民和阿尔巴尼亚人民之间永恒的、牢不可破的友谊万岁！"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来"},{"type":"paragraph","text":"1955年1月10日于北京"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":1,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":141,"page_end":141},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54afd60785"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
