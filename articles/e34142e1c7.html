3,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"长期以来，夏代是“中国奴隶社会确立”之说，一直流行不衰。莫金山在《广西社会科学》今年第一期撰文认为这一学说多存疑义。文章说，不论是范文澜的《中国通史》、郭沫若的《中国史稿》，还是其他著作，他们笔下的“夏朝奴隶社会”都回避了“形成”或“确立”奴隶社会的一些关键性问题。诸如，夏代奴隶使用在哪些部门?奴隶制占据什么社会地位?夏代阶级结构如何?等等，因而他们的“奴隶社会”说，总给人以论证不严，史料不足，空空荡荡的感觉。夏朝成了没有奴隶的奴隶社会。文章对中国进入文明社会的道路方式发表了己见，认为夏代是“中国奴隶社会”的确立之说，并不符合中国历史实际，并未如实反映中国历史特点。因此吁请史学家们对这一学说再认真审视。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e34142e1c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
