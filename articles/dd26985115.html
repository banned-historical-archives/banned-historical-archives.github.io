script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"努力巩固和建设解放区　不断粉碎万象极右派破坏活动  老挝人民为保卫胜利成果维护万象协定而斗争","authors":[],"dates":[{"year":1975,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"努力巩固和建设解放区　不断粉碎万象极右派破坏活动"},{"type":"paragraph","text":"老挝人民为保卫胜利成果维护万象协定而斗争"},{"type":"paragraph","text":"新华社万象一九七五年二月二十日电  新华社记者报道：万象协定签署已经两年。两年来，老挝人民为保卫革命胜利成果、履行和维护万象协定，坚持不懈地进行斗争，取得了许多胜利。"},{"type":"paragraph","text":"万象协定的签订是老挝人民在老挝爱国战线的领导下进行长期抗美救国战争的胜利成果。它使老挝人民的革命斗争进入了一个新的阶段。"},{"type":"paragraph","text":"在这个新阶段中，巩固和建设解放区是老挝人民保护革命胜利成果、维护万象协定的一个重要方面。两年来，解放区广大军民，提高革命警惕，紧握手中枪，不断粉碎万象极右派出动飞机、军队和派出特务到解放区进行的破坏和蚕食活动，击退了得到美国支持的西贡军队的种种侵扰活动。与此同时，解放区军民在爱国战线中央的领导下，发扬自力更生、艰苦奋斗的革命精神，大力医治战争创伤，恢复和发展经济。在一九七四年，解放区军民开垦了四千多公顷的荒地，修建了六十多座中小型灌溉工程和数千个堤坝和水渠。这一年，不少地方粮食作物取得了好收成。解放区的农村、城镇之间的道路网正在加紧修建。去年单是沙湾拿吉、丰沙里、琅南塔等七个省就建成了九百公里长的道路。解放区的文教、卫生事业也在迅速发展。目前，解放区已拥有全国五分之四的土地和二分之一的人口，从南到北已连成一片，更加巩固和发展，日益成为全国坚强的革命根据地。"},{"type":"paragraph","text":"为了维护万象协定，解放区人民还同右派控制区人民一起，不断揭露和反对万象极右派种种破坏协定的活动。一九七三年八月，老挝人民粉碎了万象极右派策划的一次短命政变。接着老挝双方在同年九月十四日签订了万象协定的议定书。一九七四年，在全国人民的支持下，老挝各爱国力量和万象方面的爱好和平人士又不断粉碎万象极右派的阻挠和破坏，成立了以梭发那·富马亲王为首相的临时民族联合政府和以苏发努冯亲王为主席的民族政治联合委员会；初步实现了万象和琅勃拉邦两城市的中立化。"},{"type":"paragraph","text":"临时民族联合政府和民族政治联合委员会的成立，是老挝人民在实施万象协定、实现自己的民族愿望和基本民族权利的斗争中取得的一个重大胜利。"},{"type":"paragraph","text":"一九七四年五月二十四日，民族政治联合委员会第一届全体会议一致通过了体现老挝人民利益的十八点政治纲领。今年一月二十八日，临时民族联合政府正式颁布了十八点政治纲领。这一纲领受到老挝全国人民的热烈欢迎。"},{"type":"paragraph","text":"但是，万象极右派并不甘心自己的失败。他们正在加紧拼凑力量，密谋进行破坏。他们想方设法阻挠和破坏万象协定的履行和临时民族联合政府的工作；企图暗杀民族政治联合委员会的成员；阴谋反对临时民族联合政府关于解散万象议会的决定；继续派遣军队对解放区发动蚕食进攻；并且残酷地镇压右派控制区爱国人民的正义斗争。他们甚至还密谋发动反动政变，企图颠覆临时民族联合政府。"},{"type":"paragraph","text":"目前，老挝人民正密切注意万象极右派的动作，加强团结，提高警惕，为彻底履行万象协定及其议定书，为实现十八点政治纲领，为建立一个和平、独立、中立、民主、统一和繁荣的老挝而坚持斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd26985115"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
