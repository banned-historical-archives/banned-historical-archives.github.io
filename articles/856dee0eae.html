ear":1963,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京6日电】　中共中央副主席、国务院总理周恩来，中共中央副主席、全国人民代表大会常务委员会委员长朱德，中华人民共和国副主席董必武，中共中央总书记邓小平，以及党和国家的其他领导人贺龙、李先念、谭震林、薄一波、罗瑞卿、聂荣臻，今天下午接见了从广西、宁夏、甘肃、湖南、广东、吉林、辽宁、黑龙江、青海、内蒙古、新疆等省、自治区前来北京参加“五一”国际劳动节庆祝活动的少数民族参观团，内蒙古、新疆少数民族青年学习参观团，中央民族学院应届毕业生，以及全国供销合作总社县社主任训练班的学员。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"856dee0eae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
