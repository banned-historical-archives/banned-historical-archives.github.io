"authors":[],"dates":[{"year":1958,"month":8,"day":15}],"is_range_date":false,"parts":[{"text":"中共云南省委关于教育工作大跃进的指示","type":"title"},{"text":"文教部并教育厅党组：","type":"appellation"},{"text":"中等教育的大跃进，正规中学今年达10万人已有安排，农业中学10万人也已安排（已有5万人，今年高小毕业生留在乡村的估计2万人，城市民办中学估计可达万人，连同过去高小生还未入农业中学的，以及早的扫完文盲又已大体达高小程度的青年农民可入中学等，这样完成农业中学和城市民办中学达10万人以上可无问题）。惟有厂矿企业的业余中学10万人尚未安排（估计过去历年到企业的高小毕业生有几万人，今年将进厂6万人，加上早已扫完文盲的转业军人和中、青年工人大体达到高小程度可入中学的职工，企业中还可办一两万人的高中班，这样今年达到10万人以上也无问题）。这一任务很重，时间很紧，应请教育厅首先摸清情况分配按地区（专区、自治州、省辖市）在8月底以前下达指标，只准超额，不准完不成，并限期完成，团和工会应大力协助文教部门完成这一任务。","type":"paragraph"},{"text":" 省委","type":"paragraph"},{"text":"[此件标题为编者所加。]","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25b0374688"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
