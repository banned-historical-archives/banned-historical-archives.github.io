script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"战后日本新动向将发展文化艺术左倾政党不久出现","authors":[],"dates":[{"year":1945,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央社东京一日专电】日本人士表示，中美两国各予协助，日本将在文化艺术及农业方面积极发展，预料日本新政党，最初将大政趋向左倾，此亦不过换汤不换药者，但日本此次投降，显示日皇在日本民间，拥有强大势力，一般日人于八月十四日以前，均信日本如不能战胜，至少可获得妥协之和平，彼等认为日本至少能再使美国蒙受一百万人之损失，因料美国民众鉴于似此损失，将举国华然，要求与日本复交，妥协和平，日皇宣佈投降时，举国为之震惊，然其于民间所拥之势力，实较强大，据消息灵通之日人称，目前之内阁，乃临时组织，佥料情况安定后，即将举行民主方式之普选。"}],"comments":[],"origin":"中央社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d4a033e0b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
