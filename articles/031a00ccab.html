art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"对“爬行主义”“洋奴哲学”的有力批判","authors":["新疆军区活学活用毛泽东思想先进集体某部八连"],"parts":[{"type":"paragraph","text":"我国第一颗人造地球卫星发射成功，是我国发展空间技术的一个良好开端，是对叛徒、内奸、工贼刘少奇鼓吹的“爬行主义”、“洋奴哲学”的有力批判。它大长了中国人民和世界革命人民的志气，大灭了帝、修、反的威风。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“帝国主义者和国内反动派决不甘心于他们的失败，他们还要作最后的挣扎。”目前，美帝国主义、社会帝国主义的日子越来越不好过，为了摆脱内外交困、走投无路的绝境，一方面对内实行法西斯专政，另一方面疯狂地扩军备战，到处侵略。因此，我们在胜利的形势下，一定要保持清醒的头脑，绝对不可以稍微松懈自己的战斗意志。我们要更加深入地开展活学活用毛泽东思想的群众运动，牢固树立无产阶级战争观，把阶级斗争觉悟提得高高的，把革命干劲鼓得足足的，把各项工作做得好好的，把战备思想的根子扎得深深的。如果帝、修、反胆敢来犯，就坚决、彻底、干净、全部消灭之。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"031a00ccab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
