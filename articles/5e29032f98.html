],"dates":[{"year":1949,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保护人民确立革命秩序"},{"type":"paragraph","text":"北平区成立军管会"},{"type":"paragraph","text":"叶剑英主任就职视事"},{"type":"paragraph","text":"【新华社平郊十一日电】中国人民解放军北平区军事管制委员会已于一月一日成立，该会主任叶剑英亦于是日到职视事，并发布第一号布告如下："},{"type":"paragraph","text":"案奉中国人民解放军总部电令：“北平城郊国民党匪军业已就歼，北平城内国民党匪军亦就歼在即，北平将告解放。为着保障全体人民的生命财产，维护社会安宁，确立革命秩序，着令在北平城郊东至通州，西至门头沟，南至黄村，西南至长辛店，北至沙河的辖区内，实行军事管制，成立在中国人民解放军平津前线司令部指挥之下的北平军事管制委员会，为该区军事管制时期的权力机关，统一全区军事和民政的管理事宜。一俟北平解放，即加入北平全市为其管制区域。并任命叶剑英为北平区军事管制委员会主任。”本会遵即于一月一日成立，本主任亦于一月一日到职视事，遵照中国人民解放军平津前线司令部约法八章，实施军事管制。特此布告周知。"},{"type":"paragraph","text":"主任叶剑英"},{"type":"paragraph","text":"中华民国三十八年一月一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e29032f98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
