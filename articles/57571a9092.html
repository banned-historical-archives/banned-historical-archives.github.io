的伟大胜利市革委会举行盛大国庆文艺晚会中共上海市委、市革委会、驻沪部队负责人等出席","authors":[],"dates":[{"year":1974,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市革命委员会昨晚在文化广场举行盛大的国庆文艺晚会，热烈庆祝伟大的中华人民共和国成立二十五周年，热烈欢呼无产阶级文化大革命的伟大胜利和批林批孔运动普及、深入、持久开展的大好形势，热烈欢呼在毛主席革命路线指引下我国社会主义革命和社会主义建设的伟大胜利。"},{"type":"paragraph","text":"中共上海市委、市革命委员会、中国人民解放军驻上海部队负责人等出席了文艺晚会。"},{"type":"paragraph","text":"出席晚会的还有本市工人、贫下中农、解放军指战员、革命干部、革命知识分子、红卫兵，以及在沪的港澳同胞、海外华侨、外籍华人、外国来宾、外国专家、外国留学生和实习生、外国海员等一万五千人。"},{"type":"paragraph","text":"昨晚，文化广场充满了欢乐的节日气氛。来自各条战线的干部、群众满怀革命豪情，喜气洋洋地进入会场。他们热情洋溢，欢聚一堂，充分体现了经过无产阶级文化大革命和批林批孔运动，本市军民在毛主席、党中央领导下，团结战斗、生气勃勃的景象，反映出他们在毛主席革命路线指引下，不断发展大好形势，团结起来，争取更大胜利的坚强信心。"},{"type":"paragraph","text":"晚会上，上海市工人文化宫和沪东、普陀区、南市区工人文化宫的业余文艺学习班联合演出了气势磅礴的大合唱，上海舞蹈学校和上海歌剧院联合演出了革命现代舞剧《草原儿女》、《沂蒙颂》，受到到会同志和外国朋友的热烈欢迎。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\10\\74a1040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中共中央副主席、国务院总理周恩来九月三十日晚上在人民大会堂举行盛大招待会，热烈庆祝中华人民共和国成立二十五周年。图为招待会盛况。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"本报,新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57571a9092"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
