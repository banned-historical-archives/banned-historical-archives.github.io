rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《广州市长叶剑英》","authors":["薛知〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"本报讯 薛知报道：在伟大的无产阶级革命家叶剑英同志诞辰100周年之际，中共广东省委宣传部、珠江电影制片公司电视部、中央电视台影视部、广东电视台联合摄制了七集电视剧《广州市长叶剑英》。"},{"type":"paragraph","text":"该剧描写1949年底叶剑英同志受党中央毛主席的委托，挥师南下，解放广东，并担任第一任广州市长时的革命斗争经历。在接管工作、金融、粮食、剿匪等方面的尖锐而激烈的斗争中，叶剑英市长带领广大干部和群众，坚定不移地执行党的政策，粉碎了敌特猖獗一时的破坏活动和暗杀阴谋，表现了他的大智大勇、多谋善断，以及无私无畏、为政清廉的革命风范。"},{"type":"paragraph","text":"中央电视台将在5月6日第二套节目黄金时间播出。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6db2420e4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
