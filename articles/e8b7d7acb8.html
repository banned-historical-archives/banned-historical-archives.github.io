<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"按照毛主席说的去干","authors":[],"dates":[{"year":1966,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"按照毛主席说的去干"},{"type":"paragraph","text":"麦贤得刚领到入伍后的第二次津贴费，听说新华书店流动售书组到营区卖书来了。他一口气跑到卖书的地方。人群围满了书摊，他使劲挤进去，赶快拣了三本：《为人民服务》《愚公移山》《纪念白求恩》，他把书紧紧地按在胸前，好象怕别人抢去似的。"},{"type":"paragraph","text":"麦贤得把毛主席的书带在身上，有空就看，连放电影前、熄灯前的几分钟他也不放过。有人问他：“部队生活这么紧张，你有时间学习吗？”他想了想，认真地说：“雷锋同志说，学习要有钉子精神，能钻，能挤，就会有时间。”有个时期，晚上经常停电，麦贤得就用玻璃瓶做了个小油灯，一停电他就点起来。在昏黄的灯影里读着毛主席的书，他觉得心头象充满阳光一样温暖，一样明亮。"},{"type":"paragraph","text":"麦贤得读毛主席的书，最能联系实际。他学了就用，学一点、用一点。（编者插话：这学一点用一点非常重要。麦贤得、雷锋、王杰，都有这个特点，很值得我们学习。他们学习毛主席著作的最可贵之处，就在于能够联系实际——联系自己的思想、工作、生活，读一遍、想一遍，学一点、用一点，很实在。学习中只有有了这种实在精神，才能成为一个坚强的革命战士。）他自己刚入伍时有些想家，读了《为人民服务》《纪念白求恩》就对照检查自己，很快安下心来。班里有个新战士，刚入伍也是有些想家，情绪常波动。麦贤得想：毛主席说过，我们都是来自五湖四海，为了一个共同的革命目标，走到一起来了，一切革命队伍的人都要互相关心，互相爱护，互相帮助。我应该多帮助战友才对呀！麦贤得首先从生活上热情照顾这位同志，给他洗脏衣服，一连洗了几次。两人变得很亲近了，麦贤得便和他一起学习《纪念白求恩》，一边读书，一边谈感想，越拉越热呼，那位新战士激动地说：“白求恩是个外国人，为了中国人民的革命事业，那样全心全意地工作，我要是不好好干，就对不起党，对不起祖国！”麦贤得高兴地紧握着他的手：“对，我们来革命，就是要和一切反动派斗争到底！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8b7d7acb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
