art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“老三篇”照亮深山沟毛主席说：“我们大家要学习他毫无自私自利之心的精神，从这点出发，就可以变为大有利于人民的人？”","authors":[],"parts":[{"type":"paragraph","text":"山东省五莲县石场公社李崮寨，座落在一个深山沟里。原先，这个深山沟里全部十二家贫农，老老少少没有一个识字的。七年前，只识几个字的贫农刘太臻，拿毛主席著作当课本，办起了这里自古以来的第一所庄户小学。"},{"type":"paragraph","text":"刘太臻开始办学时，公社党委一个同志送给他一本《愚公移山》。他只知道这书是毛主席写的，可书上写的什么，他不认识，只好揣着这本书跑到船舫小学请老师念。毛主席的话给了刘太臻无比的勇气和力量，他就三天一趟，两天一次地翻过山去向小学的老师学，风雨无阻，边学边教，并且带动全村的人都学起毛主席著作来了。"},{"type":"paragraph","text":"自从毛主席著作进了山，这个深山沟就大变了样。许多青年，有的事情不要工分抢着干。山沟的路不好走，青年动手修。山上有些地方没树，大家挖了自家的树苗栽上。段德玉学习了“毫不利己专门利人”这句话，主动当起“义务代销员”，十天八天就几十里地来回跑一趟，代社员买卖东西，既不误队里的活，队里给补助工分也不要。特别是，由于社员们觉悟提高了，把劲使到生产上，从前年开始，就再也不要国家供应粮食，做到自给有余了。今年春节刚过，全山沟又学《愚公移山》，男女老少大动员，造起了“大寨田”。"},{"type":"paragraph","text":"村里的老年人过去曾这样对刘太臻说：“太臻呵，想不到孩子们上了你的庄户学，识了几个字，还真管用。”太臻说：“不是上我的学，他们是上毛主席的学，念毛主席的书。我识那几个字，升半豆子做豆腐，多大本钱大伙知道。可是毛主席的话开人心，一个字值万金啊！”正是因为社员们听毛主席的话，精神大改变，做到了家在深山沟，眼看全世界。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3adc9dd55c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
