["中南矿冶学院","傅继辉","李传秾","邓荣保","黄海波"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——“肃反搞错了”","type":"title"},{"text":"中南矿冶学院黄海波邓荣保李传秾傅继辉","type":"authors"},{"text":"“肃反肃反是出卖良心，出卖得愈干净愈好。”","type":"paragraph"},{"text":"“肃反后，人与人的关系变得虚伪了。”（中南矿冶学院　黄海波）","type":"paragraph"},{"text":"“肃反搞错了，而错误的根源在于群众性的斗争，群众只能检举不能斗争。反革命90％以上都是公安机关查出来的。”","type":"paragraph"},{"text":"“肃反伤害了600—700人，只培养了少数积极分子，右派分子写反动标语，打工人、上街游行……等向党进攻，都是由于肃反带来的结果。”（中南矿冶学院  邓荣保）","type":"paragraph"},{"text":"“肃反从讨论本单位是否有反革命和不利于革命的言行入手，这样方式是不好的，会引起同志彼此间之猜疑。”（中南矿冶学院  李传秾）","type":"paragraph"},{"text":"“肃反不是‘有反必肃，有错必纠’，而是十六个字：‘肃反乱来，有错必瞒，一点分析，大有问题。’后来又加上：‘斗错无关，上级靠山。’”“当时肃反没有斗到我，假如斗到我，我准备采取最后手段，建议我院对魔鬼集团（指党委——原编者注）开庭审判。”（中南矿冶学院  傅继辉的材料）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f786c56c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
