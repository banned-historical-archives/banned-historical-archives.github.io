script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"争分夺秒运土忙","authors":[],"dates":[{"year":1976,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"医务室内静悄悄的，突然，门‘吱呀’一声，一个人冲了进来，说:‘医生，有止痛片吗?’医生抬头一看，只见那人三十开外，穿着一身沾满油污的工作服。‘有，你怎么啦?’那位工人把衣服一撩，满不在乎地让医生诊治。医生上前一看，见他背上鼓起了一个鸡蛋大小的肉疙瘩，又红又肿，就说，‘这可能是脂肪瘤，最好到医院去检查……’话音未落，那位工人摇摇头，拿起止痛片急急忙忙向工地奔去。"},{"type":"paragraph","text":"这位工人姓张，他是上海电力建设公司一处挖土机驾驶员。"},{"type":"paragraph","text":"当‘三十万’工程第二战役打响后，张师傅所在的操作班接到了主厂房基础的四万方挖土任务。为了抢时间，争速度，早日完成挖土任务，班里的同志豪迈地提出:‘奋战三十天，突破土方关。’"},{"type":"paragraph","text":"盛夏，骄阳似火。在主厂房的地方，三部挖土机正张着大嘴扑向土层，顷刻，就堆成一座黑黝黝的山丘，汽车又川流不息地满载着泥土运走。此时，挖土机驾驶室内温度表的水银柱已超过了四十度，汗水湿透了张师傅的工作服，一直流到脚上，他却全然不顾，完全沉浸在忘我的战斗中。"},{"type":"paragraph","text":"几天以后，张师傅的背上由于操作用力，加上来回转动，背脊和椅子长久磨擦，渐渐地磨起了一个疙瘩。起初，张师傅毫不在意，在背上垫了一条毛巾继续工作。又过了几天，背上的疙瘩慢慢地大了起来，又红又肿，班里的同志都劝他休息一会。‘休息，时间就是电，“三十万”早一天发电，就能早一天为社会主义建设出力。我怎么能去休息呢?’说着，他又坐进了驾驶室。"},{"type":"paragraph","text":"就这样，经过一个月的连续奋战，终于胜利完成了四万方挖土任务。"},{"type":"paragraph","text":"四万方土，少说也可以堆成相当于国际饭店那么高、那么大的山丘，但它毕竟是可以用数字计算的，而工人阶级在社会主义建设中焕发出来的冲天干劲和英雄气概，是无法用数字计算的。党内最大的不肯改悔的走资派邓小平竭力鼓吹物质刺激，反对无产阶级政治挂帅。这个‘脂肪瘤的故事’，不就是对邓小平的有力批判吗?"},{"type":"paragraph","text":"华东电管局通讯员学习班"},{"type":"paragraph","text":"复旦大学新闻系学员"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da235629c2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
