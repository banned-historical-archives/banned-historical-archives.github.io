<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武大整风和反右派斗争成绩很大","authors":["湖北日报"],"dates":[{"year":1957,"month":7,"day":22}],"is_range_date":false,"parts":[{"text":"武大整风和反右派斗争成绩很大","type":"title"},{"text":"湖北日报","type":"authors"},{"text":"暑假到来，全校整风运动和反右派斗争暂告一段落，校内民主党派暑假期间整风将继续进行","type":"subtitle"},{"text":"【本报消息】武汉大学两月以来的整风运动和反击右派的斗争，在党的正确领导和全体师生员工积极参加之下，已经取得很大成绩，特别是反击右派的斗争由广泛开展到深入展开，开展说理斗争，坚持以理服人，使右派头目陷于孤立。由于暑假已到，全校整风运动和反击右派斗争在21日暂时告一段落。暑假期间，校内民主党派的整风运动将继续进行。","type":"paragraph"},{"text":"武汉大学的整风运动从4月24日开始以来，总的来说，运动的发展是基本健康的，并且取得了很大成绩。通过整风，使武大党委不仅初步地解决党的领导作风问题，而且还提高了帮助党整风的广大群众的思想认识觉悟。通过整风，密切了党群关系，进一步的消除了群众过去在思想上与党的隔阂。同时，党委在整风中比较彻底地解决了“三反”和“肃反”的遗留问题，从而使党的威信在群众中提高，使广大师生员工清楚地认识到党的大公无私、认真负责和伟大、正确。","type":"paragraph"},{"text":"由于绝大多数的师生员工都是抱着帮助党、爱护党的态度参加党的整风，因而他们在整风中积极地、善意地对党的工作的缺点和错误提出了批评和意见，到目前止，一共提出了三千一百九十二条批评和意见(其中有些是重复相同的)。党委根据这些意见都组织专门小组认真作过研究，并且已经处理了大约占20％的批评与意见，一部分正在处理，一部分还在研究。无论是处理了的或者是亟待处理和研究的，都使领导上初步认识了官僚主义、宗派主义、主观主义的严重性以及给工作带来的损失。","type":"paragraph"},{"text":"但是正当武大的整风运动正常地向前推进和积极处理来自群众中的善意批评的时候，资产阶级右派分子疯狂地向党大举进攻，他们组成了右派小集团，与党争夺领导权，并且借整风名义企图想把正常的整风运动拉出轨道。武大党委在这紧要的斗争关头，积极领导群众转入了反击右派的斗争，在斗争中锻炼和提高了广大群众的思想觉悟，并且通过反右派斗争，涌现出一批新的积极分子，不少的原来处于中层状态和为右派言行蒙蔽过的人也开始清醒过来，与右派分子撕破情面，划清思想界限，积极投入斗争。不少人在这场两条道路的斗争中，懂得了什么叫做真正的无产阶级立场，并说：“过去拥护共产党是个抽象的认识，现在才深刻的体会到拥护具体的党的组织的重要性。”","type":"paragraph"},{"text":"在广大群众思想认识提高的基础上，在一个多月来的时间里，武大师生员工全体动员起来，给右派中的骨干分子程千帆、吴开斌等以沉重的回击，初步揭露出了他们反党、反社会主义的真面目，并通过大字报和辩论会的形式，揭露和批判了各种右派言行。由于坚持说理斗争、思想批判，使右派集团内部开始分化，右派中的骨干分子开始孤立。但是，在反击右派斗争中，也曾有过温情主义和简单急躁的两种倾向苗头。","type":"paragraph"},{"text":"昨日上午，在全校师生员工大会上，中共武大党委书记刘真代表党委会作了关于整风运动和反击右派斗争的小结报告。报告中除肯定了这段的成绩与缺点外，还提出在下学期开学时，整风运动和反右派斗争将继续进行下去。","type":"paragraph"},{"text":" 来源：《湖北日报》1957年7月22日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d7d59adde"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
