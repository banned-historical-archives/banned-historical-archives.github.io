ar":1978,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华总理致电卡特总统"},{"type":"paragraph","text":"新华社北京一月一日电  中华人民共和国国务院总理华国锋一月一日打电报给美利坚合众国总统吉米·卡特，热烈祝贺中美两国建立外交关系。电报全文如下：华盛顿美利坚合众国总统吉米·卡特阁下总统先生："},{"type":"paragraph","text":"值此中华人民共和国与美利坚合众国建交之际，我谨代表中国政府和中国人民并以我个人的名义向阁下并通过你向美国政府和美国人民致以热烈的祝贺。"},{"type":"paragraph","text":"我认为，中美建交是两国关系中的历史性事件。它不仅符合中美两国人民的根本利益，而且将对国际形势产生有利的影响。我相信，它也必将为推进中美两国人民的友谊和两国良好关系的发展开辟广阔的前景。"},{"type":"paragraph","text":"中华人民共和国国务院总理  华国锋"},{"type":"paragraph","text":"一九七九年一月一日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"011537a9e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
