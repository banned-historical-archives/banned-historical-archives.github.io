" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"关于国庆阅兵问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于国庆阅兵问题的批语\""},{"type":"paragraph","text":"（1956年7月13日）刘、周、朱、陈、彭真、小平阅，退彭办。乃由国防部长阅兵，并照旧发布命令，不要改变。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十三日"},{"type":"paragraph","text":"[1]这个批语写在中共中央军委1956年6月13日关于今年首都国庆节阅兵问题给毛泽东并中央的请示报告上。报告提出，国庆由谁阅兵问题，军委会议讨论时有两种意见，一是从今年起由各元帅轮流担任，一是仍由国防部长担任，究应如何，请中央确定。报告还提出，近年来，国庆节阅兵所发布的命令内容大体相同，今年阅兵时拟不发布命令，是否可以，请中央决定。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。朱，指朱德。陈，指陈云，当时任中共中央书记处书记。彭真，当时任中共中央书记处候补书记、中共北京市委书记、北京市市长。小平，即邓小平，当时任中共中央秘书长。"},{"type":"paragraph","text":"[3]彭，指彭德怀，当时任中共中央军委委员、国务院副总理兼国防部部长，主持军委日常工作。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":7,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":399,"page_end":399},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d04c0fef4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
