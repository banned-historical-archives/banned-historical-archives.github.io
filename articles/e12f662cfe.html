" crossorigin="">{"props":{"pageProps":{"books":[{"id":"a4b34da2-312b-4b54-a5ba-79f369386796","name":"红旗一九六五年第三期","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/a4b34da2-312b-4b54-a5ba-79f369386796.pdf"],"article":{"title":"某公三哭","alias":"","parts":[{"type":"paragraph","text":"某"},{"type":"paragraph","text":"哭"},{"type":"paragraph","text":"[散曲]"},{"type":"paragraph","text":"赵朴初（一）哭西尼"},{"type":"paragraph","text":"一九六三年十一月作"},{"type":"paragraph","text":"【秃厮儿带过哭相思】我为你勤傍妆台，浓施粉黛，封你笑颜开。我为你赔折家财，抛离骨肉，卖掉祖宗牌。可怜我衣裳颠倒把相思害，才盼到一些影几来，又知命赛事多乖。"},{"type":"paragraph","text":"真奇怪，明智人，马能赛，狗能馨，为啥总统不能来个和平赛？你的灾压根儿是我的灾。上帝啊！数我三魂七魄飞天外。翼个是如丧考姚，（昏迷苦。我带头为你默哀，我下令向你膜拜。血泪几染不红你的坟台，黄金见还不尽我的相思价。我这一片痴情呵，且付与你的后来人，我这里打叠精神，再把风流卖。"},{"type":"paragraph","text":"（二）哭东尼"},{"type":"paragraph","text":"一九六四年五月作【史皇天带过高夜啼】掐指儿日子才过半年儿，谁料到西尼哭罢哭东尼？【多吏锋地）（BENGKOK）（见本文第22直）"},{"type":"paragraph","text":"即作为薪体划籍多长或多吏的一块农村土地。（收抽成（KOLEKTELUN）（见本文第22直）"},{"type":"paragraph","text":"这是乡长通过从征收的多村税腻中抽出一部分的办法而取得的工资，在荷兰殖民税治时期，这种税收抽成占税收的8%。[\"波罗哥要\"]（POLOGORO)（见本文第22直）"},{"type":"paragraph","text":"这是为了满足农村官吏的需要，农民必须负扭的一种额外赋税或负担。例如：农民买卖牲口，历子，土地等的时候，就必须巍纳一定数鼠的脱款：宰性口就必须交一部分肉：举办婚礼，割礼等宴席，就必须把食品送到多长的家。【农村协商会1（RFMBUG-DESA）（见本文第38直）"},{"type":"paragraph","text":"即在乡长的主持下举行的寂村居民会义。过去只是那有士地的人才有权参加这种会识。在那些革命运动开始发展的地方，所有客卢都有权参加，而在那些革命运动已轻强大的地万，所有成年居民都有权参加。[\"吉农\"箭联副舖1（KIDUNG)（见本文第39直）"},{"type":"paragraph","text":"“吉农”是罪达族或爪唑的诗歌，一般是在夜开和有喜宇日子里朗，例如在小孩平安生或籍子女办婚事后。诗歌的内容-般是对至家安康的配头，或朗人民所喜爱的历史书。阿飞型楼房）（GEDUNGDJENGKI）（见本文第45真）"},{"type":"paragraph","text":"阿“飞型楼房的秸构是上面部分比下面部分大，门闻垦顶向上翘起来，或正面屋糖高出后面屋糖。【“达友舞”]（TAIUB）（见本交第47直）"},{"type":"paragraph","text":"这是以“加木当”（爪哇乐器）非奏的舞蹈。“达友舞”是由一个女艺人边舞边唱，在她的前后各有两个男人作舞。跳舞时，他们照例应薇相避往来而不得相建。恶地主和官惊资本家则把这“达友舞”加以色情化，即男舞伴可以“自由”地进行下流的和悔辱女艺人的行动。【互济会】（LELIURAN)（昆本文第50真）"},{"type":"paragraph","text":"立济会是在耕种、遗房等工作中进行合作，互济和互助等活动的亲撒，互济会向会具筹第些铁，作为共同购买某种需要的求西。嘉集大米）（PEREIEK）（见本文第50真）"},{"type":"paragraph","text":"即在每次煮敏前募集大米。在“募集大米”运动中，农妇把下的米分山一点，并收集起求，用以帮助缺粮的农民或缺粮的其他地方，或把这些大米卖，将所得的铁缴纳会费或扣献铅粗作为代表大会的经费。"},{"type":"paragraph","text":"（根据雅加达“革新”出版社一九六四年版选出）"}],"authors":["赵朴初"],"dates":[{"year":1963,"month":11},{"year":1964,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":58,"page_end":59},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e12f662cfe"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
