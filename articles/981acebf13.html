泽东"],"dates":[{"year":1965,"month":4,"day":21}],"is_range_date":false,"parts":[{"text":"对民兵工作的指示","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"搞四清，要把民兵搞好。首先要落实组织，有没有队长、班长，组织起来没有？首先是有没有，然后讲政治，不要地、富、反、坏之类，要贫下中农，中农子弟进步的也可以要。地富子女中进步的也可以。真打起来他们会分化的，一部分组织维持会，插白旗，杀共产党，一部分跟我们走。地主富农、资本家也会分化，不会全部跟敌人的。是要争取多数，孤立少数，不然就要失败。利用矛盾，争取多数孤立少数，各个击破。","type":"paragraph"},{"text":"民兵，第一是组织，第二是政治，第三是军事。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"981acebf13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
