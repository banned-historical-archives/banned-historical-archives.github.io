":[],"dates":[{"year":1972,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来江青李先念郭沫若等会见秘鲁贵宾"},{"type":"paragraph","text":"宾主进行了亲切友好的谈话"},{"type":"paragraph","text":"新华社一九七二年四月十六日讯　周恩来总理、江青同志、李先念副总理、郭沫若副委员长等，今天下午会见了秘鲁共和国总统夫人孔苏埃洛·冈萨雷斯·德贝拉斯科和由渔业部长哈维尔·坦塔莱安·巴尼尼将军和工商部长阿尔贝托·希门尼斯·德卢西奥将军率领的秘鲁政府代表团。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的秘鲁政府代表团成员有：玛格丽塔·阿尔布卢·德坦塔莱安夫人，索伊拉·德希门尼斯·德卢西奥夫人，何塞·格拉姆·乌尔塔多将军和夫人罗莎·德格拉姆，胡安·贝拉斯科·冈萨雷斯等。"},{"type":"paragraph","text":"秘鲁驻中国大使巴尔德斯和夫人也参加了会见。"},{"type":"paragraph","text":"中国方面参加会见的有：外贸部部长白相国、副部长李强，农林部部长沙风，外交部副部长乔冠华，国防部副部长肖劲光，对外经济联络部副部长陈慕华，中国人民解放军副总参谋长彭绍辉，人大常委会委员谢扶民、林巧稚、罗叔章，有关方面负责人及工作人员高修、丁西林、林佳楣、于立群、丁国钰、谢静宜、王海容、吴凡吾、孙锁昌、张星桥、杨阳、陶大钊、邓兰珍、刘静言等。（附图片）"},{"type":"paragraph","text":"这是会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35eccd0518"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
