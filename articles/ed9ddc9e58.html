s":["陈毅"],"dates":[{"year":1958,"month":3,"day":28}],"is_range_date":false,"parts":[{"text":"陈毅副总理谈民主党派人士自我改造","type":"title"},{"text":"陈毅","type":"authors"},{"text":"新华社２８日讯陈毅副总理今天上午在中国人民政治协商会议全国委员会举行的整风报告会上，作了关于各民主党派人士自我改造问题的报告。","type":"paragraph"},{"text":"报告会由政协全国委员会副主席李济深和沈钧儒主持。","type":"paragraph"},{"text":"陈毅副总理在报告中指出，民主党派人士在自我改造中，第一，要艰苦和认真地学习马列主义。第二，社会实践是检验真理的标准，就是说学习必须联系实际，否则流为空谈。现在新中国伟大的建设规模的社会实践驳翻了右派的一切谰言。第三，通过切身体验才能深切地懂得马列主义的正确性。所以不仅要　注重全体的社会实践，还要注重个人的具体实践。第四，政治学习与思想改造要强调自愿原则，要照顾年老体弱等条件，要有步骤地学习，采取和风细雨的方式，逐步地积累，从数量上的积累造成质量的变化。","type":"paragraph"},{"text":" --原载《人民日报》1958年3月29日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed9ddc9e58"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
