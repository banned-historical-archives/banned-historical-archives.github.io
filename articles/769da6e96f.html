" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"必须用一切方法敌于南线","alias":"","parts":[{"type":"paragraph","text":"必须用一切方法歼敌于南线！"},{"type":"paragraph","text":"（1946年6月11日）张、粟、邓、谭，并告陈："},{"type":"paragraph","text":"鱼电悉。（一）国民党攻我淮南路东，现又攻我路西及南通区，我向国民党某区取主动攻势，在政治上是没有问题的。（二）军事上究竟应否攻宜陵、白塔，由你们根据实情决定之。（三）我必须用一切方法歼灭敌人于南线，保卫九百万人口的南线各区。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"已真"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给华中军区司令员张鼎丞、副司令员粟裕、政治委员邓子恢和副政治委员兼政治部主任谭震林的电报。"},{"type":"paragraph","text":"[2]陈，指陈毅，当时任新四军军长兼山东军区司令员。"},{"type":"paragraph","text":"[3]指1946年6月6日华中军区给中共中央、新四军军部并告淮北、淮南军区的电报。电报说：国民党军主力4个军极可能以泰州为出发点攻占我兴化、东台、高邮。我如失东台、兴化，则苏中900万人口之富裕区即无法坚持。为转变此不利形势，我军决集中兵力攻占扬州、泰州线之宜陵、白塔，吸引国民党军主力出来决战，在此地求得打两三个大仗，歼敌2至3个师，相机夺取泰州，以巩固南线。建议山东部队一部提早进攻海州，使国民党军不敢南下。"},{"type":"paragraph","text":"[4]淮南路东，指华中淮南军区所辖之津浦铁路（今京沪线天津至浦口"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":380,"page_end":380},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"769da6e96f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
