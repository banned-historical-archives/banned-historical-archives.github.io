关于党员党籍处理问题的通知","dates":[{"year":1967,"month":2,"day":12}],"is_range_date":false,"authors":["中共中央"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"广州工交红司《组织部》, 广州中教红司, 无产阶级文化大革命有关批资平反文件汇编, 18","tags":[{"name":"党籍","type":"主题/事件"},{"name":"档案","type":"主题/事件"},{"name":"现行反革命","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央关于党员党籍处理问题的通知"},{"type":"paragraph","text":"各级党委、各级军区党委："},{"type":"paragraph","text":"最近，有些单位的党组织或群众组织按照某些群众的要求，开除了一些党员的党籍，有的还当场烧毁了入党志愿书等档案材料。对此中央认为："},{"type":"paragraph","text":"一、除了逮捕法办的现行反革命分子应该立卽开除其党籍外，一般党员的党籍处理，应该放在运动后期进行。"},{"type":"paragraph","text":"二、按照党章规定，党员的处分，必须由党组织执行，群众及其组织，无权对党员进行党纪处分。"},{"type":"paragraph","text":"三、有关党员的入党申请书等档案材料，不得烧毁。"},{"type":"paragraph","text":"这个通知可以在农村、城市和部队各单位内普遍张贴。"},{"type":"subtitle","text":"中共中央 1967年2月12日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a861cfb78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
