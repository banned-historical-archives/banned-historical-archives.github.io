hors":[],"dates":[{"year":1970,"month":10,"day":10}],"is_range_date":false,"parts":[{"text":"毛泽东第二次会见金日成首相的谈话（摘录）","type":"title"},{"text":"……","type":"paragraph"},{"text":"毛主席：……这些话是作为一种商量，当作问题提出来的，因为我们自己还是作为问题提出来的。譬如究竟是帝国主义战争为主要倾向，还是革命为主要倾向？虽然是这么讲：帝国主义的危险依然存在，但革命是主要倾向。我看还要看。苏联既然能够侵占捷克，它一定就不能侵犯别个国家了吗？这也是当作一个问题，应当考虑的问题。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"毛主席：有些人总说我们是好战分子、冒险主义者，但是我们冒险也就是你打来了嘛，你的什么飞机、什么船来了我们才打嘛，你来冒险我才防御嘛。所以世界上的事情是“欲加之罪，何患无辞”啊。比如讲我们两家的所谓罪名是冒险主义者，它们总是有理由说就是了。你们无非是打了一条船，一架什么飞机这些东西；至于我们打了什么东西，他们也没有说。我们只是讲空话，吹牛皮就是了。我说，也做点实事了，比如说对巴勒斯坦帮点忙了。就是这些。嗯？","type":"paragraph"},{"text":"周总理：巴基斯坦抵抗印度的时候，我们也帮了一点军火。","type":"paragraph"},{"text":"毛主席：比如东南亚现在的战争，你不帮也不行啊。我说你不帮就是叛变革命啊！","type":"paragraph"},{"text":"……","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9942d2febe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
