ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"请会商朝鲜和平谈判准备问题","alias":"","parts":[{"type":"paragraph","text":"请会商朝鲜和平谈判准备问题！"},{"type":"paragraph","text":"（1951年6月29日）金日成同志，并告彭德怀同志："},{"type":"paragraph","text":"六月二十九日的电报收到了。"},{"type":"paragraph","text":"我认为一方面，人民军和志愿军应当积极注意作战，不使敌人乘机获。另方面，你们两人应当马上会商一次，就和平谈判问题加以考虑，准备派出适当的谈判代表，并以你们考虑的意见和谈判代表的人选告我。至于假如李奇微提出要求谈判的时候如何回答的问题，可在李奇微提出要求时再行考虑回答的内容和措词。"},{"type":"paragraph","text":"兹将葛罗来柯同志与美国驻苏大使寇克的谈话要点，发给你们，请加研究。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月二十九日[1]这是毛泽东给朝鲜民主主义人民共和国首相金日成的电报。[2]彭德怀，当时任中国人民志愿军司令员兼政治委员。[3]李奇微，当时任“联合国军”总司令、美国远东军总司令。[4]葛罗米柯，当时任苏联外交部部长。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":6,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":397,"page_end":397},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c768c96b22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
