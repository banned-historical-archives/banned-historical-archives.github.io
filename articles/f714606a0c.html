script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席等观看缅甸艺术家演出演出开始前接见了缅甸文化代表团团长","authors":[],"dates":[{"year":1960,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京9日电】　毛泽东主席和董必武副主席、朱德委员长、李富春副总理等，今晚在中南海怀仁堂观看了缅甸文化代表团的精采演出。毛泽东主席等在演出开始以前接见了缅甸文化代表团团长苏敏上校。"},{"type":"paragraph","text":"在今天的晚会上，缅甸艺术家们共表演了十一个缅甸和中国的艺术节目。晚会在中缅友谊之歌声中开始，又在中缅边界条约颂歌声中结束。艺术家们表演的每一个节目都受到了一千多名观众的热烈欢迎。"},{"type":"paragraph","text":"在演出结束以后，首都的少年儿童向缅甸艺术家们献了鲜花。毛泽东主席、董必武副主席、朱德委员长等，由缅甸驻中国大使叫温和缅甸文化代表团团长苏敏上校陪同，登上舞台同艺术家们会见。这时候，缅甸艺术家们长时间地鼓掌并不停地欢呼:“毛主席万岁!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f714606a0c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
