":["颜世贵"],"dates":[{"year":1994,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京铁路分局丰台机务段举行座谈会"},{"type":"paragraph","text":"纪念“毛泽东号”机车命名４８周年"},{"type":"paragraph","text":"本报北京１２月１０日讯记者颜世贵报道：在毛泽东诞辰１０１周年前夕，北京铁路分局丰台机务段今天召开纪念“毛泽东号”机车命名４８周年座谈会，以此缅怀毛泽东思想对机车全体乘务员的哺育。"},{"type":"paragraph","text":"“毛泽东号”机车诞生于１９４６年１０月３０日。截至今年１１月底，“毛泽东号”已安全运行６００万公里，相当于绕地球１５１圈，多拉货物４３５万吨，节约燃料１３９１吨。"},{"type":"paragraph","text":"毛泽东同志的亲属和曾在毛泽东同志身边工作过的人员参加了今天的座谈会。（附图片）"},{"type":"paragraph","text":"12月10日，毛泽东同志的亲属及当年的身边工作人员毛新宇（左一）、李讷（左二）、邵华（右一）、张玉凤（右二）来到北京丰台机务段，参加纪念“毛泽东号”机车命名48周年和机车安全运行600万公里活动。"},{"type":"paragraph","text":"这是现任“毛泽东号”机车长王志祥在向客人介绍情况。"},{"type":"paragraph","text":"新华社记者李明放摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68a1dbd4a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
