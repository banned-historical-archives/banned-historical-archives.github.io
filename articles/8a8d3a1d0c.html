art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"复员军人江家福写信给毛主席他愿意献身于农村建设，但是希望学一些农业生产知识；","authors":["中士江家福"],"parts":[{"type":"paragraph","text":"编者按："},{"type":"paragraph","text":"敬爱的毛主席："},{"type":"paragraph","text":"我是个即将复员的士兵。几年来，在党的培养下，我的知识、能力和社会主义觉悟，都有了很大的提高，想起来，对党真是感激不尽。"},{"type":"paragraph","text":"“从生产中来，到生产中去”，我认为这样安置复员军人是非常合理的，因为我们都是劳动者。我将坚决地服从国家的分配，同战友们勇敢地走向建设新农村的岗位。"},{"type":"paragraph","text":"亲爱的毛主席，你是最了解我们的，我们不同意有些人认为从事农业生产“不重要”“没出息”的说法，我们时刻在想怎样将全部精力投入生产，为祖国的社会主义建设多干一点事情。可惜的是，我们本钱不多。"},{"type":"paragraph","text":"“农村有广阔的天地，有不少的生产潜力待发掘”，因此，我们恳切地希望在复员之前，在不另设学校、不多花钱的条件下，让我们学习一些有关农村建设和农业生产技术等方面的知识，以便于我们回乡后发挥更大的作用，不辜负党对我们的期望。"},{"type":"paragraph","text":"我们是热爱劳动的，生产中的任何困难我们都不怕，我们唯一的希望就是领导部门能答复这个要求。"},{"type":"paragraph","text":"敬礼 中士 江家福"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a8d3a1d0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
