art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席","authors":["战士易孔祥"],"parts":[{"type":"paragraph","text":"听了党的八届十一中全会的公报，大家心情万分激动，不约而同地齐声高呼：共产党万岁！毛主席万岁！万万岁！"},{"type":"paragraph","text":"党中央公报，最科学、最完整地总结了八届十中全会以来，全国在毛泽东思想伟大红旗的光辉照耀下，自力更生，奋发图强，取得的辉煌成就。同时正确地分析了国内外阶级斗争的大好形势，在我们已经取得的各项巨大成就的基础上，将把我国的社会主义革命和社会主义建设继续胜利地推向前进！将把世界革命胜利地推向前进！"},{"type":"paragraph","text":"我们伟大的党和伟大的领袖毛主席，是广大革命人民心中永远不落的红太阳，是我们乘风破浪的伟大舵手。我们坚决要听毛主席的话，听党的话，高高地举起毛泽东思想伟大红旗，在阶级斗争、生产斗争和科学实验三大革命运动中去和一切敌人、一切困难进行搏斗，坚决把我国的社会主义革命和世界革命进行到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c505ee5f90"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
