rt":9,"page_end":9,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"战无不胜的毛泽东思想万岁��","authors":["钱嗣杰《人民日报》/蒋铎"],"parts":[{"type":"paragraph","text":"毛主席是我们心中最红最红的红太阳。毛泽东思想是我们的命根子。我们人民解放军，永远忠于毛主席，忠于毛泽东思想，忠于毛主席的无产阶级革命路线，忠于伟大领袖毛主席的亲密战友林彪同志。"},{"type":"paragraph","text":"新华社记者 钱嗣杰摄"},{"type":"paragraph","text":"我们伟大领袖毛主席是中国人民解放军的缔造者，是我们的伟大统帅。跟着毛主席，就无往而不胜。我们坚决响应林彪副主席的号召，读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士。我们坚决贯彻执行毛主席的无产阶级革命路线，彻底批判资产阶级反动路线。坚决贯彻执行毛主席的无产阶级军事路线，彻底批判资产阶级军事路线。我们坚决支持无产阶级革命派，誓在无产阶级文化大革命中为人民立新功。"},{"type":"paragraph","text":"《人民日报》记者 蒋铎摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5426d4b63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
