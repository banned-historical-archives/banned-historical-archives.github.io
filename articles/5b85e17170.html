ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于准备同意讨论交换重伤病俘问题的电报","alias":"","parts":[{"type":"paragraph","text":"关于准备同意讨论交换重伤病俘问题的电报"},{"type":"paragraph","text":"（1953年3月23日）丁国钰\"同志，并告金、彭："},{"type":"paragraph","text":"（一）三月二十一日十二时电悉。对方最近在板门店的行动，带有明显的挑畔和威胁的性质，因此应该提高警惕，设想坏的情况，并作必要准备，但另一方面，对方这些行动的目的则显然是逼我谈有关停战的主题，实质上表示对方着急。艾森豪威尔上台后在五洲采取一系列措施，企图从杜鲁门?造成的束缚中解脱出来，争取主动，其建议交换伤病俘可能是对方有意在板门店转湾（弯）的一个试探行动。在分析对方具体行动时，必须注意问题的这两个侧面。对于对方可能拒绝接受我方文件甚至拒绝召开联络官会议的情况，你们应就事论事，在会内外据理力争，予以痛厅，但不要逼对方正式表示是否要最后破裂，对方亦不会作此种表示。对于违反协议事件，过去我们采取不分轻重一事一抗的方针，本已有些被动。"},{"type":"paragraph","text":"[1]丁国钰，当时参与朝鲜停战谈判朝中代表团的领导工作。"},{"type":"paragraph","text":"[2]金，指朝鲜民主主义人民共和国首相金日成。彭，指中国人民志愿军司令员兼政治委员彭德怀。"},{"type":"paragraph","text":"[3]艾森豪威尔，当时任美国总统。[4]杜鲁门，美国前总统。毛泽东全集第三十三卷最近一星期内，如无重大事件，望不要向对方送抗议。"},{"type":"paragraph","text":"（二）关于克拉克\"二月二十二日建议先行交换可以行走的重伤病俘虏一事，我方准备同意讨论此事，复文尚须数日才能拟好，暂时不要向外边透露。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月二十三日[1]克拉克，当时任侵朝的“联合国军”总司令。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":90,"page_end":91},"tags":[{"name":"毛泽东","type":"人物"},{"name":"丁国钰","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b85e17170"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
