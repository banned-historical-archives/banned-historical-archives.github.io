rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"成都部队组织在职干部自修毛主席军事著作","authors":["方衍"],"parts":[{"type":"paragraph","text":"本报讯 成都部队在职干部学习毛主席军事著作的活动，已经在直属单位中陆续开始。每周以不少于四小时的时间，系统地学习“中国革命战争的战略问题”、“论持久战”、“十大军事原则”。"},{"type":"paragraph","text":"成都部队是在举办干部集训的同时，采取这个措施的。领导机关认为，集训与在职学习必须同时并举，即使经过短期集训的，也只有保持经常的自修，才能巩固和不断提高军事素养。为了迅速掀起在职干部学习热潮，要求各级首长首先带头学好，以自己的学习经验和心得去指导在职干部自学。在学习方法上，强调各级党委要加强领导，每学一个文件之前，尽可能把干部集中起来，由首长作启发报告，帮助干部掌握重点；然后在各自岗位上抓紧时间，精读文件，组织小型漫谈，写学习心得。"},{"type":"paragraph","text":"为了使自学不致于自流，成都部队在领导这个学习过程中，将不断进行考核、评比，总结推广学习经验。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa866cef07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
