["卢鹏","宁文俞","河南医学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"反对党的领导干部的右派言论","type":"title"},{"text":"河南医学院卢鹏宁文俞","type":"authors"},{"text":"(卢鹏：河南医学院外科基础教研组助教；宁文俞：工会文化教员)","type":"subtitle"},{"text":"学校“四大金刚八大台柱”都是杀人不见血的东西。","type":"paragraph"},{"text":"我的肉体在毛泽东照耀下，我的精神却在卢长山压榨下，程耀吾来后是换汤不换药。(卢鹏)","type":"paragraph"},{"text":"卢长山盲目无知，不学无术，藉党的领导作威作福，他不配作高等学校的领导。(宁文俞)","type":"paragraph"},{"text":"程耀吾你残杀青年，残害过我，解放前我背了四年红包袱，解放后我背了九年黑包袱。(卢鹏)","type":"paragraph"},{"text":"我一定要把卢专山赶出河南医学院，要使程耀吾在群众压力下深刻受到教育，将“四大金刚八大台柱”压下去。也不主张把他们赶出去，全国30多所高等学校都把他们赶出去谁来搞工作？让他们留下来当教员。(卢鹏)","type":"paragraph"}],"comments":[],"origin":"《右派言论集》（河南医学院马列主义教研室编印，1958年4月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"834812d58a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
