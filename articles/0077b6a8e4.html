框，他们——在生产实践中创造出新的生产设备","authors":[],"dates":[{"year":1968,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们上海造纸机械厂铸造车间的大型化铁炉上料很落后，每开一次炉，大炉工人要把二十余公斤重的一块块生铁搬上磅秤过磅，再一块块地搬到运输小车上，工人的劳动强度很大。今年六月，以一个文化程度很低的普通行车工为主，在青年电工的配合下，经过不到一个月时间的反复试验，成功地革新了一台“文革秤”。这架秤安装在普通的桥式起重机上，只要一按电钮，就能在仪表中反映出按照化铁炉需要而供应的生铁重量，大大提高了化铁炉上料的工效和有效地减轻了大炉工人的劳动强度，还节约了四个劳动力。“文革秤”的革新成功，为化铁炉上料自动化创造了条件。"},{"type":"paragraph","text":"另一个铸铜小组的工人，也早已下决心改变落后的熔铜炉，要把原来用勺子到炉内舀铜水的旧方法，改装成手转的柴油熔铜炉，这样，工人不但可与高温隔离，又可以从笨重的体力劳动中解放出来。工人同志的革命倡议，在文化大革命前，却遭到这个车间的资产阶级技术“权威”的反对。他采用了一套美国的设计方案，使用了一只美国的机动柴油喷头，试了几十次，柴油烧掉了十余吨，不要说铜就是铝也没有熔化掉，出足了丑洋相。"},{"type":"paragraph","text":"无产阶级革命派掌权后，过去被资产阶级技术“权威”称为“大老粗”的工人，依靠小组集体的智慧，经过一个多月的试验，终于革新成功了一座利用废油下脚燃烧的坩锅熔铜转炉，熔出的铜水，质量完全符合要求。现在的转炉与旧炉子相比，成本低，出炉不揭炉盖，工人与高温已基本隔离，并且能任意控制铜水的多少，提高工效三倍以上。"},{"type":"paragraph","text":"以上两个事例，都雄辩地证明了我们伟大领袖毛主席关于“卑贱者最聪明!高贵者最愚蠢”的教导是颠扑不破的伟大真理。"},{"type":"paragraph","text":"上海造纸机械厂　本报通讯　员"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0077b6a8e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
