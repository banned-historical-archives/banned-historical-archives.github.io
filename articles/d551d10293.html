:[],"dates":[{"year":1973,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年九月四日电　巴基斯坦总统乔德里·法兹尔·埃拉希九月一日打电报给毛泽东主席，最衷心地祝贺毛主席再次当选为中国共产党中央委员会主席。电文如下:"},{"type":"paragraph","text":"“在你再次当选为中国共产党中央委员会主席的时候，我非常愉快地代表巴基斯坦政府和人民，并以我个人的名义，向阁下表示我们最衷心的祝贺和最良好的祝愿。祝巴基斯坦伊斯兰共和国和中华人民共和国之间存在着的那种如此令人高兴的友谊和合作的关系在今后得以进一步发展。我借此机会祝阁下健康、幸福、长寿，并祝友好的中国人民，在阁下鼓舞人心的领导下，不断进步，日益繁荣。”"},{"type":"paragraph","text":"新华社北京一九七三年九月四日电　巴基斯坦总理佐勒菲卡尔·阿里·布托九月一日打电报给毛泽东主席，最衷心地祝贺毛主席再次当选为中国共产党中央委员会主席。电文如下:"},{"type":"paragraph","text":"“我们巴基斯坦人非常高兴地获悉阁下再次当选为中国共产党中央委员会主席。"},{"type":"paragraph","text":"在这一幸福的时刻，我向阁下表示我们最衷心的祝贺。"},{"type":"paragraph","text":"我相信，友好的中国人民，在阁下英明领导下，将进一步加强团结，巩固他们解放以来所取得的伟大进步，并在国际舞台上发挥更大的作用。我毫不怀疑，把巴基斯坦和中国如此紧密联系起来的多方面的友谊和合作的纽带将在今后的岁月里不断增强。"},{"type":"paragraph","text":"主席先生，请接受我最良好的祝愿，祝你健康、幸福、长寿，并接受巴基斯坦人民最良好的祝愿，祝伟大的中国人民取得更大的进步、繁荣和光荣。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d551d10293"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
