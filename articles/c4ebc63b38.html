ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于接济湖南教育界老人给王首道的信","alias":"","parts":[{"type":"paragraph","text":"关于接济湖南教育界老人"},{"type":"paragraph","text":"给王首道的信"},{"type":"paragraph","text":"（1950年10月11日）首道同志："},{"type":"paragraph","text":"张次卷、罗元鲲两先生，湖南教育界老人，现年均七十多岁，一生教书未作坏事，我在湖南第一师范读书时张为校长，罗为历史教员。现闻两先生家口甚多，生活极苦，拟请湖南省政府每月每人酌给津贴米若干，借资养老。又据罗元鲲先生来函说：曾任我的国文教员之袁仲谦先生已死，其妻七十岁饿饭等语，亦请省府酌予接济。以上张、罗、戴三人事，请予酌办见复，并请派人向张、罗二先生予以慰问。张、罗通讯处均是妙高峰中学。戴住新化，问罗先生便知。"},{"type":"paragraph","text":"顺致敬意！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十一日[1]王首道，当时任湖南省人民政府主席。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":230,"page_end":230},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4ebc63b38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
