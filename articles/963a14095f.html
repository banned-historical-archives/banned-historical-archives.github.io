],"dates":[{"year":1989,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都戒严部队参观天安门广场"},{"type":"paragraph","text":"官兵瞻仰毛主席遗容并敬献花圈"},{"type":"paragraph","text":"新华社北京7月3日电  首都戒严部队某部官兵今天上午来到毛主席纪念堂，瞻仰了毛主席遗容，并敬献了花圈。花圈的挽联上写着：“伟大领袖毛泽东主席永垂不朽”。"},{"type":"paragraph","text":"戒严部队某部许多官兵是第一次来到北京，他们听说去天安门广场参观都非常兴奋。今天一早，他们怀着胜利的喜悦，排着整齐的队列，以仰慕的心情，来到天安门广场。他们在瞻仰了毛泽东主席遗容后，还参观了毛泽东主席故居、人民大会堂、天安门广场和故宫。这一活动是总政治部组织安排的。据悉，戒严部队还将分期分批瞻仰和参观。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"963a14095f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
