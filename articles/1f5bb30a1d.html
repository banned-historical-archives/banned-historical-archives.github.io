script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热烈歌颂无产阶级文化大革命伟大胜利本市举办画展和摄影展览","authors":[],"dates":[{"year":1976,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在伟大领袖毛主席亲自发动和领导的反击右倾翻案风斗争取得伟大胜利的凯歌声中，市美术创作办公室举办了《无产阶级文化大革命好》画展，于五月十六日起在上海美术展览馆正式展出。"},{"type":"paragraph","text":"这个展览会以其崭新的面貌告诉广大群众:无产阶级文化大革命的急风暴雨，摧毁了反革命的修正主义文艺黑线的统治，给上海美术战线带来了天翻地覆的革命变化。在毛主席革命路线的指引下，一支以工农兵为主体的革命美术队伍正在茁壮成长，社会主义美术创作日益繁荣。广大业余、专业美术工作者在“到处莺歌燕舞”的大好形势鼓舞下，把画笔当作批邓的战斗武器，夜以继日，积极创作，以实际行动反击右倾翻案风。这次展出的一百六十余件各种美术样式的作品，从不同的角度，满腔热情地歌颂了伟大领袖毛主席亲自发动和领导的无产阶级文化大革命，强烈地表达了革命人民的共同心声——无产阶级文化大革命就是好!邓小平要搞复辟倒退，我们决不答应!"},{"type":"paragraph","text":"整个展览会分为三部分:第一部分集中地反映了无产阶级文化大革命的战斗历程，再现了亿万革命人民在以毛主席为首的党中央的领导下，按照毛主席的伟大战略部署奋勇前进的战斗情景。第二部分从不同侧面歌颂了文化大革命中涌现出来的新生事物。第三部分突出地反映了深入开展批判邓小平、反击右倾翻案风的斗争。"},{"type":"paragraph","text":"整个画展旗帜鲜明，密切配合现实的阶级斗争和路线斗争，富有战斗性。"},{"type":"paragraph","text":"(本报通讯　员)"},{"type":"paragraph","text":"本报讯　在热烈欢呼无产阶级文化大革命十周年的日子里，在批判邓小平、反击右倾翻案风的凯歌声中，《无产阶级文化大革命好摄影展览》定于五月二十三日起展出。"},{"type":"paragraph","text":"无产阶级文化大革命十年来，本市摄影战线发生了深刻的变化，社会主义摄影创作空前繁荣。广大专业和业余摄影工作者以阶级斗争为纲，在批判刘少奇、林彪、邓小平反革命的修正主义文艺路线的斗争中，得到了极大的锻炼，提高了执行和捍卫毛主席革命路线的自觉性。这次展出的二百四十多幅作品，真实、生动地记录了无产阶级文化大革命十年来团结、战斗的胜利情景，热烈欢呼无产阶级文化大革命的伟大胜利，纵情歌唱社会主义新生事物的茁壮成长，有力地反击了邓小平对文化大革命的恶毒攻击。"},{"type":"paragraph","text":"影展共分三部分:第一部分运用文化大革命十年来部分历史资料照片，展示了上海无产阶级文化大革命沿着毛主席指引的航向奔腾向前的战斗景象。第二部分反映全市各条战线经过文化大革命的战斗洗礼，社会主义新生事物层出不穷，茁壮成长，“到处莺歌燕舞”。第三部分反映全市人民认真学习毛主席的重要指示，乘胜前进，掀起批邓、反击右倾翻案风的新高潮，夺取革命、生产新胜利，以实际行动为巩固和发展文化大革命胜利成果而英勇奋战。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f5bb30a1d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
