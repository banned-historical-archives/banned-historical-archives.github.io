script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国生产目的讨论会闭幕  与会同志指出，多年来生产目的不明确的根本原因是左倾路线的影响","authors":[],"dates":[{"year":1980,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国生产目的讨论会闭幕"},{"type":"paragraph","text":"与会同志指出，多年来生产目的不明确的根本原因是左倾路线的影响"},{"type":"paragraph","text":"据新华社北京12月10日电　历时7天的全国社会主义生产目的讨论会今天在北京闭幕。"},{"type":"paragraph","text":"会议参加者认为，虽然我国进行了三十多年的社会主义建设并取得了许多成就，但确实存在着对社会主义生产目的不明确的问题。长期以来，由于只追求经济增长速度、盲目地扩大基本建设规模，忽视人民生活的改善；片面地发展重工业，忽视农业和轻工业的发展，造成了生产建设和人民生活严重脱节，积累和消费比例严重失调的状况，这是背离社会主义生产目的和要求的。"},{"type":"paragraph","text":"与会同志指出，努力满足人民的物质和文化生活的需要是社会主义生产的目的。他们认为，在生产建设中，必须首先根据人民的消费需要，安排好消费资料的生产，并安排好生产消费资料的生产资料的生产及国民经济各部门适当的比例关系。也只有从这一点出发，才能搞好国民经济的调整。"},{"type":"paragraph","text":"会议参加者分析了多年来生产目的实现不好的许多原因，指出最根本的原因是左倾路线的影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28e9a7f0ff"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
