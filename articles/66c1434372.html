script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"地拉那隆重集会庆祝解放日霍查列希谢胡等党政领导人出席　蒂奥多西在会上讲话谴责修正主义者投降帝国主义","authors":[],"dates":[{"year":1963,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那29日电】　阿尔巴尼亚劳动党中央委员会、部长会议、民主阵线全国委员会和劳动党地拉那市委员会，二十八日晚上在地拉那联合举行盛大集会，隆重庆祝阿尔巴尼亚解放十九周年。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央第一书记霍查，人民议会主席团主席列希，部长会议主席谢胡等党政领导人出席了庆祝会。"},{"type":"paragraph","text":"出席大会的还有:阿尔巴尼亚劳动党中央政治局委员们，党中央委员，各部部长，各人民团体负责人，人民军高级将领，烈士家属，老游击队员，地拉那劳动人民代表和文化艺术新闻界人士等。"},{"type":"paragraph","text":"各国驻阿尔巴尼亚外交使节也出席了大会。"},{"type":"paragraph","text":"正在阿尔巴尼亚访问的由方毅率领的中国政府贸易代表团，由李达上将率领的中国人民国防体育协会代表团，由李琦涛率领的中国青年代表团和中央工艺美术学院副院长陈叔亮应邀出席了庆祝会。"},{"type":"paragraph","text":"来阿尔巴尼亚作友好访问的越南、朝鲜和古巴朋友们也应邀出席庆祝会。"},{"type":"paragraph","text":"庆祝会在庄严的阿尔巴尼亚国歌声中开始。大会由劳动党中央政治局委员、工会中央理事会主席努什主持。劳动党中央政治局候补委员、部长会议副主席兼国家计划委员会主席蒂奥多西在会上讲了话。"},{"type":"paragraph","text":"蒂奥多西在讲话中回顾了阿尔巴尼亚人民长期为民族独立和解放而进行的英勇斗争，他叙述了阿尔巴尼亚人民在解放后的十九年中所取得的伟大成就。他说，一九六三年的工业总产量将为一九三八年的三十倍，农业总产量将为一九三八年的二·四倍。他揭露美帝国主义在世界各地进行侵略和战争，美帝国主义的侵略、好战本质决不会改变。他谴责现代修正主义者投降帝国主义，破坏社会主义阵营和国际共产主义运动的团结。蒂奥多西最后说，阿尔巴尼亚人民深信:和平和社会主义力量必将战胜帝国主义力量，马克思列宁主义必将战胜现代修正主义。"},{"type":"paragraph","text":"蒂奥多西的讲话受到了大会热烈的欢迎，全场一再报以暴风雨般的掌声，并欢呼阿尔巴尼亚劳动党万岁!霍查万岁!"},{"type":"paragraph","text":"大会一致通过了给阿尔巴尼亚劳动党中央的致敬电。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢胡","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66c1434372"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
