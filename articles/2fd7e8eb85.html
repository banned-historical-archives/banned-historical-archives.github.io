script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"任务之在佛协五届全国代表会议上说　反对资产阶级自由化不涉及宗教界人士","authors":["张宿堂"],"dates":[{"year":1987,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"任务之在佛协五届全国代表会议上说"},{"type":"paragraph","text":"反对资产阶级自由化不涉及宗教界人士"},{"type":"paragraph","text":"新华社北京2月25日电　（记者张宿堂）国务院宗教事务局局长任务之今天上午在中国佛教协会第五届全国代表会议上说，宗教信仰自由政策是我国一项长期的政策；反对资产阶级自由化的斗争严格限于共产党内，主要在政治思想领域内进行，这场斗争不涉及宗教界人士。"},{"type":"paragraph","text":"任务之说，坚持四项基本原则，是全国各族人民团结前进的共同的政治基础。当然，正如党的十一届六中全会决议指出的，坚持四项基本原则，并不要求宗教信徒放弃他们的信仰，只要求他们不进行反对马列主义、毛泽东思想的宣传，要求宗教不得干预政治、司法和教育。"},{"type":"paragraph","text":"任务之说，党的十一届三中全会以后，党和政府重申和恢复了宗教信仰自由政策，宗教工作进行了拨乱反正。由于落实了政策，广大信教群众享受到了宗教信仰自由的民主权利，宗教活动逐步走上正常轨道，促进了安定团结，调动了信教群众参加社会主义现代化建设的积极性。同时，也应当看到，随着宗教政策的逐步落实，在改革、开放的情况下，宗教方面也出现了一些新的情况和问题，需要认真研究解决。"},{"type":"paragraph","text":"任务之认为，要用共同理想动员和团结各民族佛教徒，为社会主义两个文明建设作贡献。要加强对寺庙的管理，不断提高宗教界人士的爱国主义、社会主义觉悟和法制观念，使宗教活动在宪法、法律和政策允许的范围内进行，要不断提高我国佛教界的思想、文化和道德素质。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fd7e8eb85"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
