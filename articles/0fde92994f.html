hors":["蒋树芝"],"dates":[{"year":1984,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"记者在一家医院观看了一例花费时间很长的手术。外科医生从上午八时半左右进入手术室，经过各种准备工作后，十时许开始进行紧张的手术。手术过程中，外科医生滴水未进。时近下午二时半，有些医生轮流出去吃午饭，担任主刀的一位医生却离不开，继续饿着肚子做手术，直到下午四时才去吃饭。"},{"type":"paragraph","text":"张涤生教授感慨地对记者说，手术结束后医生吃不上热菜热饭的问题，通过你们报纸的呼吁，现在基本上已得到解决。而手术过程中医生饿肚子的问题至今还未解决。十年内乱前，到就餐时都由护士给手术医生喂些牛奶、鸡蛋，这一做法至今还未恢复。由于外科医生经常因做手术饿肚子，健康情况不佳。"},{"type":"paragraph","text":"他们科里的十几名医疗骨干，都患有疾病，有的有高血压，有的有心脏病，生胃病的就更普遍了。他自己就曾因经常做手术饿肚子造成胃出血。外科医生长期挨饿，实在使人担忧。不少国家的手术室都备有冰箱，随时供应饮料及食品。我们不要求设冰箱，但恢复给手术医生喂牛奶、鸡蛋，为什么也难以办到?记者也曾多次向医院有关部门提出过这一问题，但得到的回答大多是“这样做较麻烦，一时解决不了。”"},{"type":"paragraph","text":"解决外科医生做手术时饿肚子的问题，其实并不复杂。建议医疗单位从关心知识分子的健康考虑，想方设法别让手术医生饿着肚子做手术。"},{"type":"paragraph","text":"本报记者　蒋树芝"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fde92994f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
