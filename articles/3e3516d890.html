命和生产出现新面貌","authors":[],"dates":[{"year":1967,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用毛泽东思想做为大联合的灵魂"},{"type":"paragraph","text":"贵阳棉纺厂按行政部门搞联合"},{"type":"paragraph","text":"组织纪律性大大加强，革命和生产出现新面貌"},{"type":"paragraph","text":"新华社贵阳二十八日电　贵阳棉纺厂在向党内一小撮走资本主义道路当权派夺权以后，按车间等行政部门搞联合，对革命和生产都起了很好的促进作用。"},{"type":"paragraph","text":"这个厂一千多名革命造反派分属十七个组织。联合夺权以后，都想掌大权，矛盾更尖锐了。于是就开会“统一思想”，但由于没有以毛泽东思想挂帅，加之组织上自立门户，吵了半个月没有结果。在群众一再要求下，各组织开门整风。整风时，反复学习“老三篇”和《红旗》杂志社论。以毛泽东思想做为大联合的灵魂，大破“私”字，横扫宗派主义、小团体主义等错误思想。如总部的一些较大的革命造反团体，他们说：“我们成立最早，功劳最大，要联合，最好是一些人数不多的组织解散，并入我们的组织。”群众就反驳道：“革命不分先后，组织不分大小，怎样联合对革命有利，就该怎样联合。死抱住总部不放，实际上是小山头主义。”还有些人怕按部门大联合成为大杂烩。大家又分析，按部门搞联合，互相最了解，正可以防止大杂烩。"},{"type":"paragraph","text":"在搞通思想的基础上，准备车间首先成立了联合战斗队，掌管车间一切权力。这个车间各组织的成员都宣布退出原来的总部，声明除了上级联合总部的命令以外，不再执行任何一个总部的命令。现在已有五个车间和一部分班组按这个形式联合起来。联合以后，革命和生产都出现了新面貌。凡联合的班组，大都建立了毛主席著作学习制度。过去一些“没有参加组织就好象没有人要”似的中间群众，也团结到联合战斗队周围，参加了班里每天下班后一小时半的学习和运动。组织纪律性大大加强了，生产面貌也变化很大。有的工人同志过去一人看二十四台机器，现在看三十六台，并主动提出看四十八台。"},{"type":"paragraph","text":"二月二十日全厂召开了大联合誓师大会。自下而上按部门大联合这一新生事物得到了普遍的赞扬。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e3516d890"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
