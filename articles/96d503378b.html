<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西壮族自治区高级人民法院关于李超文的刑事裁定书","authors":[],"dates":[{"year":1984,"month":3,"day":17}],"is_range_date":false,"parts":[{"text":"广西壮族自治区高级人民法院关于李超文的刑事裁定书","type":"title"},{"text":"上诉人（即一审被告人）：李超文，男，46岁，汉族，广西容县杨梅公社六美大队人，捕前在容县杨梅公社务农，无前科。现在押。","type":"paragraph"},{"text":"上诉人李超文因强奸、故意杀人一案，不服玉林地区中级人民法院1983年12月24日（83）刑审字第103号的刑事判决，向本院提出上诉。","type":"paragraph"},{"text":"本院依法组成合议庭进行审理，现查明：","type":"paragraph"},{"text":"上诉人李超文任六美乡（大队）民兵营长期间，于1967年11月上旬，非法搜查本乡沙槽生产队归国华侨周恒志家，发现一小块硫磺便诬说是黄色炸药，把周恒志抓去公社、大队批斗，同月14日晚上，上诉人李超文持枪押送被斗打致重伤的周恒志回家时，以搜查为名，强令周的妹妹周XX（16周岁）回房内，用暴力胁迫进行强奸。李超文强奸周XX后，害怕周恒志揭露其罪行，就诬陷周恒志私藏炸药搞破坏，积极策划杀害周恒志。同年11月17日晚上，大队召开群众批斗会李超文亲自带领他人把周恒志押往沙洲，指挥民兵和亲自用木棍猛打，当场把周恒志打死，上诉人李超文打死周恒志后，害怕周的父亲周德报复，又与其他大队干部策划杀害周德，以消除后患。当晚，上诉人又亲自带民兵韦海光等人把周德押到周恒志的尸体旁边，指使他人用木棍将周德打死，李超文还验尸确认已死才离开现场。上诉人李超文杀害周恒志父子二人后，于同月20日晚上，又持刀闯入周家，用暴力再次强奸周XX。在此期间，上诉人李超文还参与策划打死杨灼南、杨焰陵2人，强奸黄XX1人。","type":"paragraph"},{"text":"上述罪行事实清楚，证据确凿。","type":"paragraph"},{"text":"本庭认为，上诉人李超文身为民兵干部，目无国法强奸妇女，为了掩盖其罪行，捏造罪名诬陷无辜，杀人灭口。手段恶劣，情节特别严重。原判定罪准确，量刑适当，审判程序合法。上诉人李超文在上诉中否认其怕强奸罪行被揭露而杀人灭口，与事实不符，显属无理辩解。要求减轻处刑没有正当理由，不能允许。依据《中华人民共和国刑事诉讼法》第136条第一项的规定，经本院审判委员会1984年第十三次会议讨论决定，裁定如下：","type":"paragraph"},{"text":"一、上诉无理，予以驳回；","type":"paragraph"},{"text":"二、维持玉林地区中级人民法院（83）刑审字第103号的刑事判决，即判处李超文死刑，剥夺政治权利终身。","type":"paragraph"},{"text":"本裁定为终审裁定，不得再上诉。待报最高人民法院核准后执行。","type":"paragraph"},{"text":" 广西壮族自治区高级人民法院刑事审判庭审判长　　　　徐克代理审判员　　秦洁平代理审判员　　黄廷杰1984年3月17日书记员\t\t　　谢伟知","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96d503378b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
