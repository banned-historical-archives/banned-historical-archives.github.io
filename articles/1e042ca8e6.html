器并使其完善","authors":[],"dates":[{"year":1963,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杜尔总统谈裁军和反对帝国主义问题"},{"type":"paragraph","text":"只要还存在帝国主义和剥削制度"},{"type":"paragraph","text":"就应保持军队和武器并使其完善"},{"type":"paragraph","text":"新华社科纳克里二十六日电　几内亚总统塞古·杜尔说，“目前，到处都在谈裁军。但是，我们认为，只要存在帝国主义和人剥削人的制度，军队和武器就应当保持并使其完善，以便抵抗帝国主义的侵略和解放被压迫的人民。”"},{"type":"paragraph","text":"杜尔总统二十四日在几内亚军事学校第二届毕业典礼上讲了这番话。科纳克里电台广播了他的讲话。"},{"type":"paragraph","text":"他还指出，必须区分“两种军队的性质：是侵略和奴役的军队还是争取解放和自由的军队”。"},{"type":"paragraph","text":"杜尔总统说，“非洲的反对帝国主义的斗争任务还远远没有完成。除了老殖民主义以外，还加上了新殖民主义。这种使用新的武器、方法和收买手段来策动暗杀和颠复的新殖民主义，是更狡猾、更恶毒和更危险的。非洲各国人民对这些敌人应该保持最高度的警惕，坚决对它们展开斗争，直到非洲完全解放。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e042ca8e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
