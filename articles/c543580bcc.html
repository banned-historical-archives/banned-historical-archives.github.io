rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忠于毛主席","authors":["内蒙古军区五好战士童国义"],"parts":[{"type":"paragraph","text":"八月三十一日，毛主席再次接见了各地红卫兵和革命师生，是对全国革命群众极大的关怀和鼓舞。我们驻守在内蒙古地区的战士，听到毛主席接见革命群众的消息，就象飞到了北京，就象亲眼看到了我们伟大的领袖毛主席。我们的热血沸腾了，革命的干劲无限增长。"},{"type":"paragraph","text":"广大革命青少年现在正在广泛向解放军学习，这是对我们部队极大的鼓舞和鞭策。我们一定要更加百倍地努力读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士；永远忠于党，忠于毛主席，忠于毛泽东思想，忠于人民的革命事业。在当前文化大革命中，特别要认真活学活用毛主席关于阶级和阶级斗争的论述、关于无产阶级文化大革命的论述，处处按照毛主席的教导办事，誓作红卫兵小将们的坚强后盾，誓把无产阶级文化大革命进行到底！"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c543580bcc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
