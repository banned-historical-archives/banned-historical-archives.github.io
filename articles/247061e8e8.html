art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大型系列电视剧《叶剑英》正式开机","authors":["孙洪涛刘建新"],"parts":[{"type":"paragraph","text":"据新华社广州4月10日电（通讯员孙洪涛、记者刘建新）大型系列电视剧《叶剑英》开机典礼，今天在广州举行。这是我国第一部以元帅为题材的大型系列传记电视剧。"},{"type":"paragraph","text":"由中央电视台影视部、珠江电影制片公司、海南影业公司联合摄制的大型电视剧《叶剑英》，计划拍摄50集。电视剧从一个侧面反映了中国革命的历史和叶剑英元帅的革命生涯，是对全国人民、特别是对青少年进行革命人生观教育和革命传统教育的好作品。今日正式开机的《叶剑英》第一部（10集），主要再现叶帅1924年至1927年从一个民主主义战士转变为共产主义战士的历程。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"247061e8e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
