tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"专家学者在宁学习研讨毛泽东军事思想","authors":["任君曹锦华"],"parts":[{"type":"paragraph","text":"本报南京11月11日电 任君、记者曹锦华报道：今天，毛泽东军事思想与高技术局部战争学术研讨会在南京陆军指挥学院结束。"},{"type":"paragraph","text":"与会者认为，未来局部战争的表现形式和外部形态变了，但战争的本质没有变，内在规律没有变，毛泽东关于研究战争的辩证思维方法、人民战争思想、灵活机动的战略战术、人民军队建设等一整套基本原理、原则，依然适用。邓小平同志把毛泽东军事思想与新时期军队建设实践相结合，创立了新时期军队建设思想。我们要继承和发扬毛泽东军事思想，就要认真学习、深入贯彻邓小平新时期军队建设思想，分析新情况、解决新问题。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9eea33fafc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
