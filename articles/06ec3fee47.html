thors":[],"dates":[{"year":1964,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席刘少奇主席周恩来总理"},{"type":"paragraph","text":"接见参加亚非文学交流座谈会的亚非国家作家"},{"type":"paragraph","text":"新华社二十四日讯　毛泽东主席、刘少奇主席、周恩来总理，今天下午接见参加亚非文学交流座谈会的亚非国家的作家，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"被接见的各国朋友是：亚非作家常设局访问亚洲代表团团长巴格里·西里格尔（印度尼西亚），团员：班达哈罗（印度尼西亚）、霜多正次（日本）、恩朗德（喀麦隆）、让·让·查理（喀麦隆）、马陶雷（津巴布韦）、杜宣（中国）；柬埔寨作家代表团团长马来琴，团员孙苏伦、翁萨伦；在北京的亚非国家的作家普瑞玛瑞特纳（锡兰）、康德萨密（锡兰）、梭勃伦·艾地（印度尼西亚）、艾尔曼（印度尼西亚）、努尔苏曼托（印度尼西亚）、努尔查曼（印度尼西亚）、古腊（泰国）、凯尔（苏丹）。"},{"type":"paragraph","text":"接见时在座的，有对外文委副主任曹瑛，中国作家刘白羽、张光年、袁水拍、叶君健、李季、黄钢、胡可、袁鹰、韩北屏。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"毛主席刘主席周总理同参加亚非文学交流座谈会的亚非国家的作家合影。前排左六是巴格里·西里格尔团长。　新华社记者　钱嗣杰摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06ec3fee47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
