ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对曾志等要求给陶铸甄别的来信的批语","alias":"","parts":[{"type":"paragraph","text":"对曾志等要求给陶铸甄别的来信的批语!"},{"type":"paragraph","text":"（1975年10月30日）印发在京政治局同志。请汪东兴同志酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月三十日"},{"type":"paragraph","text":"[1]原中共中央政治局常委、中央书记处常务书记、国务院副总理陶铸的妻子曾志、女儿陶斯亮1975年10月分别给毛泽东写信，反映陶铸生前对个人历史问题的态度，对专案组关于陶铸所谓历史问题的结论提出质疑，希望能换一些同志对陶铸进行甄别工作，并在中央讨论、主席审批前将历史结论向家属说明。中共中央办公厅将这两封来信和毛泽东的批语一起作为1975年第二六二号文件印发中央政治局。1978年12月，中共十一届三中全会审查和纠正了过去对陶铸的错误结论，肯定了他对党和人民的贡献，使他的冤案得到平反。"},{"type":"paragraph","text":"[2]汪东兴，当时任中共中央政治局委员、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":85,"page_end":85},"tags":[{"name":"陶铸","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89b7c8ca36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
