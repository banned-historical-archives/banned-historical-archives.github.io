","authors":[],"dates":[{"year":1973,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年二月十三日电　罗马尼亚共产党总书记、罗马尼亚社会主义共和国国务委员会主席尼古拉·齐奥塞斯库和罗马尼亚社会主义共和国部长会议主席扬·格奥尔基·毛雷尔打电报给毛泽东主席、董必武代主席和周恩来总理，就中国四川省甘孜藏族自治州境内发生地震，向受灾地区人民表示最深切的慰问。电报全文如下:"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东同志，"},{"type":"paragraph","text":"中华人民共和国代主席　董必武同志，"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来同志:"},{"type":"paragraph","text":"惊悉四川省西部在一九七三年二月六、七、八日发生强烈地震，使生命财产遭到损失，我们代表罗马尼亚共产党中央委员会、罗马尼亚社会主义共和国国务委员会和部长会议，并以我们个人的名义向你们、中国共产党中央委员会、中华人民共和国国务院和灾区居民表示最深切的慰问，向遇难者家属转达最诚挚的哀悼。"},{"type":"paragraph","text":"罗马尼亚共产党总书记、罗马尼亚社会主义共和国国务委员会主席　尼古拉·齐奥塞斯库"},{"type":"paragraph","text":"罗马尼亚社会主义共和国部长会议主席　扬·格奥尔基·毛雷尔"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四川文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e13400c5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
