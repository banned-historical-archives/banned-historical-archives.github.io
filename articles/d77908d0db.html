authors":[],"dates":[{"year":1964,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社柏林七日电　应邀参加德意志民主共和国成立十五周年庆祝活动的中国政府代表团团长乌兰夫今天下午在代表团团员、中国驻德意志民主共和国大使张海峰的陪同下，拜访了不久前逝世的德意志民主共和国部长会议主席格罗提渥的夫人，转交了周恩来总理和夫人邓颖超给她的慰问信。乌兰夫副总理代表周恩来总理和邓颖超同志对格罗提渥夫人再次表示慰问。格罗提渥夫人对此表示感谢，并请乌兰夫副总理转达她向毛泽东同志和她所认识的中国同志的问候。格罗提渥夫人和乌兰夫副总理进行了亲切友好的谈话。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d77908d0db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
