":[{"year":1961,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京24日电】　参加苏联共产党第二十二次代表大会的中国共产党代表团团长、中共中央副主席周恩来同志，在今天中午乘专机由莫斯科回到北京。"},{"type":"paragraph","text":"中共中央主席毛泽东同志到机场迎接周恩来同志。"},{"type":"paragraph","text":"到机场迎接的，还有中共中央副主席刘少奇、朱德，总书记邓小平，中央政治局委员李富春、贺龙、李先念、谭震林，中央政治局候补委员陆定一，中央书记处候补书记杨尚昆，中央委员邓颖超、刘宁一、伍修权等同志。"},{"type":"paragraph","text":"周恩来同志走下飞机以后，毛泽东主席以及其他同志迎上前去，同他亲切握手。少年先锋队员向周恩来同志献鲜花。"},{"type":"paragraph","text":"苏联驻中国大使馆临时代办苏达利柯夫和使馆官员也到机场迎接。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1961\\10\\61ap010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e吕厚民\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e参加苏联共产党第二十二次代表大会的中国共产党代表团团长、中共中央副主席周恩来同志，10月24日乘专机由莫斯科回到北京。"},{"type":"paragraph","text":"中共中央主席毛泽东，副主席刘少奇、朱德等在机场迎接周恩来同志。"},{"type":"paragraph","text":"(新华社传真　吕厚民摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3e6db16f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
