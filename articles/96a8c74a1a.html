r":1946,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北平四日专电】　此间解放报新华社被查封后，中共代表叶剑英曾于前日假北京饭店招待记者，指斥政府此项措施，为摧残舆论之民事暴行，呼吁同业警惕并声援。据叶氏称:该报为致力和平民主事业，远在三月前已声请登记，今竟藉口未经呈准登记遭查封。而新生报虽申请较晚，但郄获准，由此可知一切。继称，该报停刊非惧暴力，而欲以此促当局觉悟，不可相逼过甚，否则该报于不获圆满答复下，仍将不避迫害继续发刊，以尽对和平民主之职责。(金)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96a8c74a1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
