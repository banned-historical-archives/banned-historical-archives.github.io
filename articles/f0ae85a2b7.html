uthors":[],"dates":[{"year":1959,"month":3,"day":13}],"is_range_date":false,"parts":[{"text":"十一万外逃边民已有七万人回到云南","type":"title"},{"text":"据云南德宏、思茅、临沧、丽江四个地委书记的汇报，过去跑出国的十一万人，到2月中旬已有七万人回来。外逃的原因是：(1)在某些干部中特别是汉族干部中，有忽视民族特点，忽视边疆具体条件的倾向，产生急于进行民主改革工作，引起少数民族群众的误解和疑虑。(2)不少群众外出是属于季节性的贸易，特别是秋收秋种以后，出出进进是一种常事。(3)在这些外逃人员中，地、富、反、坏分子约占四分之一以上。他们中有些是为了暂时“避风”，有些是与政府坚决为敌的分子。","type":"paragraph"},{"text":"来源：1959年3月13日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0ae85a2b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
