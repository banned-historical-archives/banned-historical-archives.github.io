" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于朝鲜主力战场的新闻报道的指示","alias":"","parts":[{"type":"paragraph","text":"关于朝鲜主力战场的新闻报道的指示！"},{"type":"paragraph","text":"（1950年11月17日）乔木："},{"type":"paragraph","text":"一切有关朝鲜主力战场的新闻，都应将朝鲜人民军与中国人民志愿部队联在一起说，不应只提人民军而不提中国人民志愿部队，如“新华社十五日讯”那样，这样的电讯发到前线和全国都没有好处。关于朝鲜消息，塔斯社的一些不关重要的电讯都不应转发，新华社应自己派人去采访发电，或在北京根据内部情报自己写电讯。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十七日报纸应写社论鼓励志愿军。"},{"type":"paragraph","text":"《参考消息》上，无根据地乱安题目，帮助美国人恐吓中国人，也应加以整顿。"},{"type":"paragraph","text":"[1]这是毛泽东写给中共中央宣传部副部长、中央人民政府新闻总署署长胡乔木的信。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":376,"page_end":376},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b95f7a4585"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
