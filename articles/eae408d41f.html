ear":1946,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"忻县地主宿殿臣自动清算额外剥削"},{"type":"paragraph","text":"【新华社兴县二十六日电】忻县有县参议员、二区田家堰地主宿殿臣先生，自动邀请佃户清算过去的额外剥削，他说：“过去地主对群众剥削欺压，根本就不合理，这是旧社会的坏制度；现在新民主主义政权下，那些不道德的老帐，都应该清算掉，让大家都快快活活的劳动生产”。宿殿臣先生此种开明态度，博得群众热烈赞扬，因此清算大会在和谐气氛中进行，共计清算出“吃帐”（佃户在春天借四石粮秋后扣二十石），“收场”（地主在夏秋收场时，佃户无偿的去替地主做工）等额外剥削共合白洋二千二百余元，折出土地三十一亩，群众情愿让其少赔补约三分之一。佃户们说：“宿殿臣先生自动开明，承认过去不对，我们少算些心里也高兴”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eae408d41f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
