示报告”（概要）","authors":[],"dates":[{"year":1972,"month":10,"day":14}],"is_range_date":false,"parts":[{"text":"中共中央转发中共上海市委“关于筹建共青团上海市委的请示报告”（概要）","type":"title"},{"text":"1972年10月14日，中共中央转发中共上海市委《关于筹建共青团上海市委的请示报告》。中央批语要求：各省、市、自治区，经过整团建团，在绝大部分基层团组织建立的基础上，可以建立县、地两级共青团委员会，并着手筹备工作，在条件具备的时候，把省、市、自治区一级的团委建立起来。中央批语要求，各级党委要加强共青团工作的领导，中央拟成立一个共青团工作小组，负责调查研究，总结经验，协助中央联系和处理各地共青团的工作。中央批语还指出：全国少年儿童组织统称红小兵，各级共青团组织要加强对红小兵的领导。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8ba7a1f63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
