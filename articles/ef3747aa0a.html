{"year":1999,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《开国领袖毛泽东》座谈会召开"},{"type":"paragraph","text":"本报北京10月19日讯记者刘琼报道：长篇电视连续剧《开国领袖毛泽东》开播以来，全国平均收视率达到10％以上。近日，由《求是》杂志社、《光明日报》文艺部、《文艺报》、中国电视艺术委员会、中央电视台影视部和本报文艺部共同组织的《开国领袖毛泽东》座谈会在京召开。"},{"type":"paragraph","text":"座谈会气氛热烈，大家一致认为，该剧通过繁杂的历史现象，抓住反映事物本质的历史材料，既尊重历史又不完全拘泥于历史的具体细节，成功地做到历史真实和艺术真实的辩证统一，在重大革命历史题材创作方面探索出一些新鲜经验，值得总结和借鉴。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef3747aa0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
