":["周恩来","毛泽东"],"dates":[{"year":1950,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"祝贺罗马尼亚解放六周年"},{"type":"paragraph","text":"毛主席电巴洪主席"},{"type":"paragraph","text":"周总理电格罗查主席"},{"type":"paragraph","text":"【新华社二十二日讯】八月二十三日为罗马尼亚人民共和国解放六周年纪念。我中央人民政府毛泽东主席与政务院周恩来总理分别致电该国国民议会主席团康斯坦丁·依·巴洪主席及部长会议伯特鲁·格罗查主席，表示祝贺。电文如下："},{"type":"paragraph","text":"（一）毛主席贺电罗马尼亚人民共和国国民议会主席团康斯坦丁·依·巴洪主席阁下："},{"type":"paragraph","text":"我代表中华人民共和国中央人民政府及中国人民，值此罗马尼亚解放六周年之际，谨向阁下及罗马尼亚人民致祝贺之忱。并深信罗马尼亚人民在经济、文化的建设上将有更进一步的成功。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席  毛泽东"},{"type":"paragraph","text":"一九五○年八月二十一日于北京"},{"type":"paragraph","text":"（二）周总理贺电罗马尼亚人民共和国部长会议伯特鲁·格罗查主席阁下："},{"type":"paragraph","text":"欣逢罗马尼亚解放六周年之际，我热烈祝贺罗马尼亚人民的幸福与进步。"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理兼外交部部长  周恩来"},{"type":"paragraph","text":"一九五○年八月二十一日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c0b00bedc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
