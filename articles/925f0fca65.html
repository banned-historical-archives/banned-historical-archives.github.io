团结，发动群众，牢牢掌握斗争大方向","authors":["东闻"],"dates":[{"year":1967,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　东海舰队某部驻东方红造船厂毛泽东思想宣传队，协助无产阶级革命派抓革命大批判中的活思想，有针对性地宣传毛泽东思想，进一步推动了革命的大批判。"},{"type":"paragraph","text":"这个厂的无产阶级革命派，在海军毛泽东思想宣传队的帮助下，前个时期掀起了活学活用毛主席著作的热潮，开展了革命大批判，全厂很快实现了革命派的大联合。但是大联合之后，革命造反总部个别队委产生了太平观念；有的则因相互间工作不够协调，彼此有一些意见，对大批判不如以前抓得那么好了。有一次批判会，由于领导同志间通气不够而开得不理想。看到这种情况，毛泽东思想宣传队的同志感到，革命大批判是一切工作的纲，也是支左的纲，要搞好支左工作，必须抓好大批判。但是如何抓呢?他们反复学习了毛主席的有关论述，认识到帮助革命派抓好大批判，主要还是从政治思想上帮助。于是，针对革命派同志的活思想，和他们一起学习了《将革命进行到底》、“老三篇”和有关开展革命大批判的社论文章，一起批判了中国赫鲁晓夫假认罪、真反扑的滔天罪行，一起分析了厂内两条路线斗争的情况，使这个厂的无产阶级革命派深刻认识到革命大批判是进一步从政治上、思想上、理论上夺权，不搞好大批判就是忘记了国家大事，就可能丧失已经夺得的政权。同时，革命派掌权后，只有通过大批判，用毛泽东思想武装头脑，才能真正为无产阶级掌好权、用好权。大家决心加强团结，紧跟毛主席的伟大战略部署，把革命大批判搞好。"},{"type":"paragraph","text":"这个厂革命造反总部负责大批判的同志，在认识提高以后，就满腔热情地抓起了大批判。但是，他们把精力用在订计划、派任务上多了，而深入群众做思想发动工作和具体的帮助少了。这时，毛泽东思想宣传队同志便同队委们一起学习了毛主席关于群众路线和反对单纯军事观点的教导，认真总结了经验教训。大家深深感到革命大批判是群众运动，一定要相信和依靠群众，不能迷信自己或单靠计划。必须用毛泽东思想动员和武装群众，组成浩浩荡荡的文化革命大军，打一场人民战争。于是，他们注意了抓两头，深入群众抓活思想，大造革命舆论；注意和本单位斗批改相结合，充分发动群众参加革命大批判。"},{"type":"paragraph","text":"这个厂的无产阶级革命派在深入开展革命大批判的过程中，遇到了阶级敌人的干扰和破坏。厂里有些保守派，在阶级敌人的暗中挑动和社会上一股反动思潮的影响下，前一时期公开成立了“支联站”；他们刮经济风，故意挑起什么“辩论”，并企图绑架革命造反总部的常委等，把矛头指向革命造反总部，妄图在全厂制造“第二次大乱”。面对这种情况，革命造反总部虽然尽量克制自己，排除干扰，坚持开展革命大批判，但有时感到气愤不过，也容易感情用事。毛泽东思想宣传队同志又及时同总部队委们一起坐下来学习毛主席关于抓主要矛盾的教导，分析了厂内的阶级斗争形势，研究了怎样做受蒙蔽群众的工作。他们感到，革命大批判是一场严峻的阶级斗争，必然会遇到阶级敌人的拼命反抗，挑起事端，制造混乱，牵制革命力量，干扰斗争大方向，破坏革命大批判。这说明敌人最害怕革命大批判。“凡是敌人反对的，我们就要拥护”。敌人越是反对革命大批判，我们就越要抓革命大批判。也只有集中全力彻底斗倒批臭中国赫鲁晓夫及其在各方面的代理人，其它势力才能随之瓦解，受蒙蔽群众才能认清敌我，更快地觉悟过来。于是，革命造反总部的同志在毛泽东思想宣传队的帮助下，坚定不移地搞革命大批判。革命群众在批判会上用大量事实深刻揭露和批判了中国赫鲁晓夫及其在本厂代理人的反革命罪行，使广大群众进一步受到了两条路线斗争的教育，认清了斗争大方向。有些原来受蒙蔽参加“支联站”“小喇叭转播站”的群众，也认清了什么是资产阶级反动路线，认清了谁是自己的敌人，转而支持革命造反总部，有的后来还参加了造反队。通过这件事，这个厂的无产阶级革命派和广大群众更加清楚地认识到，革命大批判是纲，是旗帜，坚持开展革命大批判，牢牢掌握斗争大方向，就抓住了主要矛盾，文化大革命运动就能飞速前进。现在，有些过去称为“逍遥派”的同志也投入到大批判中来了。痛打“落水狗”的大字报和革命大批判专栏普遍搞了起来，有力地推动了革命和生产的顺利进行。该厂革命委员会最近在革命大批判高潮中已经建立，生产也逐步上升。"},{"type":"paragraph","text":"(东闻)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"925f0fca65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
