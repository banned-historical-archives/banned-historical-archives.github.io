<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"严肃批判右倾思想订出精密打“虎”计划中南区一级机关第一个战役获极大胜利现正总结经验调整队伍继续向贪污分子进攻","authors":[],"dates":[{"year":1952,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社汉口廿三日电】　中共中央中南局、中南军政委员会直属机关已胜利完成第一个战役的打“虎”计划，现在正在总结经验，调整队伍，继续向贪污分子特别是大贪污分子进攻。"},{"type":"paragraph","text":"第一个战役的胜利，是在反对右倾思想的基础上获得的。在战役开始前，右倾思想相当严重，突出地表现在对贪污分子的情况估计不足，心中无数，因此打“虎”计划一般都订得很低。二月七日中共中央中南局召开高级干部会议，通过算细账、查“虎”情的办法。以无可争辩的事实对右倾思想进行了严肃的批判，从而展开了群众性的打“虎”运动。各机关都有组织有计划地进行了细致的调查研究工作，使贪污分子在铁的证据前面无可躲藏。中国新民主主义青年团中南团校行政科副科长萧自诚，他在负责修建校舍中接受奸商李义龙贿赂，听任李义龙偷工减料，大量盗窃国家财产。萧在这次运动中认为“别人没有拿到他的材料”，软拖硬抗，拒不坦白。团校打“虎”队在纠正有倾思想后，即把已有的材料反复研究，肯定了“以坏砖换好砖六十四万块，偷卖洋灰六百包和工程逾期不罚款”是三个重点问题，并把这些问题的关系人、时间、地点、账目反复清查，终于案情大白，迫使贪污分子承认了贪污受贿的事实。许多机关以手面干净的干部为骨干，组织了打“虎”队、查“虎”队，专案专人，包查包捉，效果良好。打“虎”队伍在紧张的战斗中不断地巩固和扩大。民主检查阶段中洗过澡的人绝大多数在反贪污斗争中受到严格的锻炼和考验，中小贪污分子坦白自己和检举别人后，纷纷放下包袱，归队参战，不少的人还立了功。"},{"type":"paragraph","text":"目前各机关正在总结前一阶段经验，并调整队伍，准备向大贪污分子进攻。由于所有的大贪污分子都和资产阶级直接有关，他们不是叛徒就是坐探，因此如何使反贪污、反浪费、反官僚主义的队伍和反行贿、反偷税漏税、反盗骗国家资财、反偷工减料、反盗窃国家经济情报的队伍分工合作，密切地结合起来，是一个具有关键性的问题。武汉市反贪污联合检查委员会正在具体组织这两路大军的胜利会师。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ea7d2d080"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
