ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"关于目前英南工作的意见","alias":"","parts":[{"type":"paragraph","text":"关于目前冀南工作的意见！"},{"type":"paragraph","text":"（1938年8月8日）"},{"type":"paragraph","text":"我们一般方针应积极参加与掌握河北地方行政机关，不应放松。目前我们要加紧建立与强固各县政府，推选或委派最得力同志去任县长，并可派定临时专员，造成既成事实，再与鹿商讨交涉。为此，有请杨秀林3去路东并带干部暂时主持冀南政府工作的必要，请迅速决定行动。"},{"type":"paragraph","text":"[1]这是毛泽东关于目前冀南工作的意见和胡服（刘少奇)致徐向前、邓小平、宋任穷转晋冀豫省委等电的主要内容。"},{"type":"paragraph","text":"[2]鹿，指鹿钟麟，当时任国民党政府河北省主席。"},{"type":"paragraph","text":"[3]杨秀林，即杨秀峰，在1938年8月14日冀南行政主任公署成立时被选为主任。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":8,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":419,"page_end":419},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdd3d8669f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
