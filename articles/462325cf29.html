tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"文化大革命育新人","authors":["洪之"],"parts":[{"type":"paragraph","text":"数风流人物，还看今朝。读过《反修前哨的钢铁战士》这篇通讯，谁不为蔺庆春同志的英雄事迹所感动！"},{"type":"paragraph","text":"在珍宝岛自卫反击的战场上，他奋不顾身，严惩苏修侵略者，不愧是钢铁战士；在战胜伤残重返战斗岗位的磨练中，他斗志高昂，坚韧不拔，同样不愧是钢铁战士。他一身铮铮硬骨，一颗耿耿丹心，为了保卫无产阶级专政，“一只脚也要做合格的战斗员”，充分显示了一个无产阶级革命战士的英雄本色。"},{"type":"paragraph","text":"烈火炼纯钢，革命育英雄。我们赞颂英雄，怎能不欢呼锤炼出无数英雄人物的伟大的无产阶级文化大革命！正是这场大革命空前广泛地普及了马克思主义、列宁主义、毛泽东思想，深刻地改变了人们的精神面貌，造就了千百万无产阶级革命事业的接班人。蔺庆春同志就是在文化大革命中成长起来的、又是在文化大革命中奔赴反修前哨的一代新人。从他身上，人们欣喜地看到了我军光荣传统的发扬光大，看到了无产阶级文化大革命的丰硕成果。"},{"type":"paragraph","text":"毛主席为我们党制定的基本路线告诉我们，在整个社会主义的历史阶段，始终存在着阶级、阶级矛盾和阶级斗争，存在着社会主义同资本主义两条道路的斗争，存在着资本主义复辟的危险性，存在着帝国主义、社会帝国主义进行颠覆和侵略的威胁。反修防修、巩固无产阶级专政、防止资本主义复辟，是无产阶级文化大革命所要解决的根本问题。在文化大革命的大风大浪中锻炼成长的蔺庆春同志，面对苏修社会帝国主义的疯狂侵略，仇恨满怀，浑身是胆，表现了大无畏的革命精神。他所以有这种精神，就在于他时刻不忘无产阶级专政赋予自己的崇高职责，在于他竭尽全力去实践党的基本路线。"},{"type":"paragraph","text":"学习蔺庆春同志的革命精神，我们要认真学习无产阶级专政的理论，进一步深刻认识无产阶级文化大革命的重要性和必要性，热情歌颂文化大革命，勇敢捍卫、努力发展文化大革命的胜利成果。让我们象蔺庆春同志那样，坚决执行毛主席的无产阶级革命路线，做一个反修防修的钢铁战士。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"462325cf29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
