cle":{"title":"中央转发中央统战部‘对于国家机关中民主人士的退职退休和下放问题的意见’的报告","dates":[{"year":1958,"month":2,"day":4}],"is_range_date":false,"authors":["中央","中央统战部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 395-396","tags":[{"name":"国家机关","type":"主题/事件"},{"name":"民主人士","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"统一战线","type":"主题/事件"},{"name":"退休","type":"主题/事件"},{"name":"退职","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"中央转发中央统战部“对于国家机关中民主人士的退职退休和下放问题的意见”的报告\n（一九五八年二月四日）\n中央批示:\n      中央同意中央统战部“对于国家机关中民主人士的退职退休和下放问题的意见”，现在转发给你们，望各地参照执行。\n      在精简机构编制中，国家机关有的部门准备将一部分参事、专员按照退职、退休的办法处理。根据我们对财政部、交通部、农业部的了解，这些人大体上有以下几种情况：\n      一、解放前参加过民主革命活动或者为我党作过若干工作的；\n      二、起义人士；\n      三、烈士亲属；\n      四、与上层民主人士有比较密切关系的；\n      五、留用的或者解放后新参加工作的原国民党政府、企业高级职员；\n      六、公私合营企业中的个别高级职员。"},{"type":"paragraph","text":"他们中的多数，确属年老体弱，基本上已丧失工作能力。但是由于这些人有的在民主革命中有过贡献或一定历史关系；有的在一定阶级、阶层中还有影响；有的与上层民主人士有比较密切的联系。安排他们的时候，就是从政治上出发，而主要不是作为一种工作职务来考虑的。因此，让他们退职、退休，在政治上对我们是不利的。我们意见，目前对于担任参事、专员、顾问的人，除了确属本人自愿者外，一般仍应按照1956年6月23日“国务院关于参事室参事和文史研究馆馆员不适用退休、退职等办法的通知”办理，我们不去动员他们退职、退休。他们所占编制，可以不作为工作编制，由国务院和地方各级人民委员会统一掌握。"},{"type":"paragraph","text":"机关干部下放中，也涉及到民主人士。我们意见：除了在民主党派中央和地方各级委员会中担任重要职务，民主党派组织认为工作需要，不能离开的人，暂不下放以外，其他人员应该和机关干部统一处理。凡是合乎下放条件的人，应该在自愿的基础上组织他们上山下乡，参加劳动锻炼或者到基层去工作一段时期，作为改造他们的立场、思想、作风的重要方法之一。"},{"type":"paragraph","text":"以上意见如认为可行，请批发各地参照执行。"},{"type":"paragraph","text":"一九五八年一月二十四日"},{"type":"paragraph","text":"(摘自《组织工作文件选编》）"}],"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0578af7e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
