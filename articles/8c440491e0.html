ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"转发周小舟关于处理少数违法乱纪干部的意见的批语","alias":"","parts":[{"type":"paragraph","text":"转发周小舟关于处理少数违法乱纪干部的意见的批语"},{"type":"paragraph","text":"（1959年4月17日）尚昆："},{"type":"paragraph","text":"此件请转各地方同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月十七日[1]周小舟，当时任中共湖南省委第一书记。[2]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"},{"type":"paragraph","text":"[3]指周小舟1959年4月14日请中共湖北省委第一书记王任重、浙江省委第一书记江华转毛泽东的报告。报告说，我们日内即将召开地委书记会议，讨论执行上海会议关于人民公社的十三条指示。会后即可分批召开县的六级干部会议。对于少数违法乱纪的干部，完全应该依法严肃惩处，现已处理了少数分子。但是我们认为不必集中在一次会议上处理，而以实事求是精神调查清楚后随即处理比较适当。至于某些不称职的干部，在公社代表大会上应该尽量改选掉。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":449,"page_end":449},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c440491e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
