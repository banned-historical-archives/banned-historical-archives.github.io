art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“我看毛主席著作经常到深夜……”","authors":[],"parts":[{"type":"paragraph","text":"中国专家在马里帮助建设“吉奥利巴”卷烟厂的时候，工地工会主席是中国专家宿舍的常客。他常常说："},{"type":"paragraph","text":"“在家里，我看毛主席的著作，经常看到深夜。从毛主席著作中，知道了很多革命道理，知道了如何工作，如何生活的道理。”他说：“自从马里宣布独立以来，世界上有很多国家的人来到马里，想帮助马里进行‘建设’。美国人来了，法国人来了，英国人来了，苏联人来了。但是，有些人来到马里，到处走了走，看了看。最后向我们耸耸肩，两手一摊说：马里太穷了，没有什么可搞的，就走了。唯有中国朋友，来到马里之后，看到了马里的实际情况。认为这是殖民主义者所造成的后果。中国朋友没有走，留下来帮助我们建设。现在，全马里都知道是中国朋友帮助我们建烟厂，糖厂，火柴厂……。有哪一个国家能与中国朋友相比呢？中国的政策是正确的，是真正想帮助我们这些年青的国家搞建设的。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ec237771e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
