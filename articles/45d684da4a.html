"四川"],"dates":[{"year":1957,"month":6,"day":19}],"is_range_date":false,"parts":[{"text":"给冯元春的信","type":"title"},{"text":"四川史克芬","type":"authors"},{"text":"铁路二局史克芬给冯元春的信","type":"subtitle"},{"text":"(据说“史克芬”是铁路二局一个党员的化名)","type":"subtitle"},{"text":"冯元春同志：","type":"appellation"},{"text":"我昨天听了你的演讲后，我很欣喜和赞叹，对于这种新型的创举，万不料被你早鸣，我向你表示敬仰。但我觉得你的论述内容还不够充实，这方面的材料我搜的不少，对这个问题，我前几天也有所思豫，总是虑而不敢易举。我愿与你合作研究，把我们共同论点求得更具体更有说服力，如何，千急覆告。","type":"paragraph"},{"text":"(最好约定时间地点面谈为宜，如何？)","type":"paragraph"},{"text":"革命敬礼","type":"appellation"},{"text":" 铁路二局史克芬上57.6.19回信请写：本市西门外理学路铁路二局收发室转史克芬收","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选集》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45d684da4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
