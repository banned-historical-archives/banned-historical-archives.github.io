<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“资产阶级法权”应改译为“资产阶级权利”","authors":[],"dates":[{"year":1977,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共中央马恩列斯著作编译局"},{"type":"paragraph","text":"伟大领袖和导师毛主席关于理论问题的指示发表以后，“四人帮”乘机别有用心地在“资产阶级法权”问题上大作文章，肆意歪曲马列观点，篡改毛主席指示，制造种种谬论，造成理论上思想上的极大混乱。在深入揭批“四人帮”这些谬论的过程中，“资产阶级法权”这个译名也引起了广泛的注意。不少同志对这个译名提出了意见。为此我们进行了多次讨论，征求了有关方面意见，还邀请了部分理论工作者和翻译工作者座谈。经过讨论，认为“资产阶级法权”这个译法不确切，应作修改。"},{"type":"paragraph","text":"首先，“法权”一词不能确切地表达外文原词的词义。“资产阶级法权”一词，在马恩著作(德文)中是das bürgerliche Recht，在列宁著作(俄文)中是буpжyaзноe пpавo。Recht和пpаво是个多义词，主要包含“法”、“权利”的意思，用在不同场合，分别指“法”或“权利”。英译本和日译本都根据原著行文的含义，分别译为law(法、法律)或right(权利)，法或权利。经恩格斯亲自校订过的英译本《资本论》第一卷，就将Recht一词分别译为“法”或“权利”。中文同英、日文一样，没有同Recht、пpabo相应的多义词。而“法权”这个词意思含混，不能起到多义词的作用。因此，在翻译马列著作时，应当根据原著行文的含义，分别确定译为“法”或“权利”。"},{"type":"paragraph","text":"其次，所说的“资产阶级法权”一语，出自马克思的《哥达纲领批判》。马克思在论述社会主义社会实行按劳分配原则时指出:“至于消费资料在各个生产者中间的分配，那末这里通行的是商品等价物的交换中也通行的同一原则，即一种形式的一定量的劳动可以和另一种形式的同量劳动相交换。”“所以，在这里平等的权利按照原则仍然是资产阶级的法权……”(原译文)。这里的“权利”和“法权”，在德文中均为Recht，都是在“权利”意义上使用的。因为马克思在这里是从权利关系上，而不是从法律关系上论述社会主义的分配。把这句话中的同一个词Recht分别译为“权利”和“法权”，造成了概念的混乱，甚至导致理论上的错误理解。有些读者对“法权”一词作望文生义的解释，说它是“法定权利”、“合法的权利”、“合制度规定的权利”。这样就在“权利”的含义上随意加进了法的内容，不符合马克思的原意。有些读者则把“法权”理解为“法”，说“资产阶级法权是资产阶级的利益和意志在法律上的表现，是资本主义经济基础的反映并为它服务的”。这样解释，似乎社会主义的按劳分配还体现了资产阶级的利益和意志。这在理论上完全是错误的。"},{"type":"paragraph","text":"我们还查阅了《哥达纲领批判》和《国家与革命》的各种英、日文译本。德文das bürgerliche Recht，俄文буржуазное право，在英译本中均译为bourgeois right(资产阶级权利)，日译本中均译为フんショ\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\12\\77ce0208AA.JPG\"\u003e的权利(资产阶级权利)。"},{"type":"paragraph","text":"根据以上考虑，我们决定将《哥达纲领批判》和《国家与革命》两书中提到的das bürgerliche Recht、буржуазноеправо改译为“资产阶级权利”。"},{"type":"paragraph","text":"(原载十二月十二日《人民日报》)"}],"comments":[],"origin":"《人民日报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea36dc6879"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
