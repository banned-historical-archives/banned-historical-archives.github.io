["周恩来"],"dates":[{"year":1967,"month":8,"day":4}],"is_range_date":false,"parts":[{"text":"周恩来办公室给总政治部的通知","type":"title"},{"text":"周恩来","type":"authors"},{"text":"八月四日上午11点30分，总政负责同志给国家体委系统革命造反联络总部来电，传达了关于体委由中央文革直接领导的指示。总政负责同志电话：","type":"paragraph"},{"text":"总理办公室于八月四日上午打电话通知总政：","type":"paragraph"},{"text":"国家体委总政管不过来，决定由中央文革直接管，由戚本禹同志管。总政将从体委撤出来。","type":"paragraph"},{"text":"同日上午，中央文革也来电话通知：","type":"paragraph"},{"text":"中央文革派三名记者，到体委了解文化大革命情况。他们已于四日下午五时到达体委。","type":"paragraph"}],"comments":[],"origin":"国家体委系统革命造反联络总部《体育前哨》第15期 1967年8月13日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"994587a8a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
