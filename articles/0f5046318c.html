ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"致华东局等电","alias":"","parts":[{"type":"paragraph","text":"致华东局等电"},{"type":"paragraph","text":"（1948年11月24日）"},{"type":"paragraph","text":"同意你们对孙良诚?所采取的方针和态度。因为孙良诚是在被包围后未经战斗自愿放下武器的，和别的俘虏官有区别，故对孙及其于部的待遇应比较好一些。可将他们集合送入军校学习（除反动分子外）。对孙本人给以礼遇，不要放走，要他努力帮助我们进行刘汝明、刘汝珍、曹福林?及刘部各师长的策反工作。一○七军军官中凡有适合做此项工作者均应加以训练，派去刘部工作。对刘部工作甚为重要。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致华东局并告华中工委，刘伯承、陈毅、邓小平、粟裕、陈士、张震电的主要内容。"},{"type":"paragraph","text":"[2]孙良诚，原为国民党军第一绥靖区副司令官兼第一○七军军长，1]月13日在睢宁向华东野战军苏北兵团投诚。"},{"type":"paragraph","text":"[3]刘汝明、曹福林、刘汝珍，当时分别任国民党军第八兵团司令官，"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":276},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f5046318c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
