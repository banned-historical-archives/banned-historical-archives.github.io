ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"接受缅甸大使吴拉茂呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受缅甸大使吴拉茂呈递国书时的答词"},{"type":"paragraph","text":"（1951年9月27日）大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使呈递的缅甸联邦总统的国书，并感谢贵大使的祝贺。"},{"type":"paragraph","text":"中缅两国在历史、文化上有着悠久而密切的关系；两国人民在长期争取民族独立自由的斗争中，更有了深切的同情与了解。我深信贵我两国外交关系的发展，不但将使已存在于两国人民间的友谊日益增进与巩固，而且必将有助于亚洲的和平与安定。"},{"type":"paragraph","text":"我热烈地欢迎阁下出任缅甸联邦驻中华人民共和国的特命全权大使，并愿对贵大使加强两国友好合作的工作，予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并祝贵国元首健康。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":9,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":508,"page_end":508},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"595ffa611e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
