ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"给司徒美堂“的信","alias":"","parts":[{"type":"paragraph","text":"给司徒美堂的信"},{"type":"paragraph","text":"（1949年1月20日）司徒美堂先生："},{"type":"paragraph","text":"去年十月二十三日惠书，因交通阻梗，今始获悉。热情卓见，感佩殊深。中国人民解放斗争日益接近全国胜利，召开新的政治协商会议，建立民主联合政府，团结全国人民及海外侨胞的力量，完全实现中国人民的独立解放事业，实为当务之急。为此，函待各民主党派各界民主人士共同商讨。至盼先生摒挡公务早日回国，莅临解放区参加会议。如旅途尚需时日，亦祈将筹备意见先行电示，以利进行。谨电欢迎，并盼赐复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四九年一月二十日"},{"type":"paragraph","text":"[1]司徒美堂（1868一1955)，广东开平人，爱国华侨领袖。曾任美洲致公党主席。1949年应邀回国参加中国人民政治协商会议第一届全体会议。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":1,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":38,"page_end":38},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1c485e9df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
