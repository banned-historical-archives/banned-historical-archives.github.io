thors":["关锋"],"dates":[{"year":1967,"month":8,"day":9}],"is_range_date":false,"parts":[{"text":"关锋对北京地质学院关于批判朱成昭的电话指示","type":"title"},{"text":"关锋","type":"authors"},{"text":"〖田春林：北京地质学院“勤务组”负责人〗","type":"appellation"},{"text":"田春林同志：","type":"appellation"},{"text":"听说你们那里因为地院革委会确定朱红、黄占起两同志随我去一趟的问题有很大的争论，我希望不要因为这个问题引起争论，妨碍掌握斗争大方向，既然争论很大，这次你们那里可以不去人。","type":"paragraph"},{"text":"希望你们紧紧掌握斗争大方向，正确处理人民内部矛盾，坚持在毛泽东思想基础上的团结，发展和巩固革命的大联合，把斗争矛头指向党内最大的一小撮走资本主义道路的当权派，搞好革命的大批判，同时把朱成昭批深批透。你们那里批判朱成昭和大方向一致。8月2日，你向我提出一些问题，我讲了几句话，大致也是这个意见。","type":"paragraph"},{"text":" 关锋八月九日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"关锋","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d82c4b4098"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
