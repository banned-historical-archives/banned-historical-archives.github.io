,"dates":[{"year":1969,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本家的残酷剥削"},{"type":"paragraph","text":"英国许多行业工人纷纷举行罢工"},{"type":"paragraph","text":"新华社伦敦二十八日电　英国许多行业的工人连日来纷纷举行罢工，抗议垄断资本家的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"伦敦的地下铁道列车员二十八日举行了二十四小时的罢工。这次罢工是列车员冲破反动工会头目种种压制在七天中举行的第二次罢工。目前，三十多列地下铁道的火车被迫停止行驶，地下铁道三分之二以上的运输业务陷于停顿。市内交通陷于一片混乱。"},{"type":"paragraph","text":"曼彻斯特和默尔西河畔的几千名面包工人的罢工已进行了一个星期，并在继续坚持中。利物浦面包工人二十八日还举行群众大会，表示对压制罢工的工会头目不信任。约克郡的面包工人以及威克菲尔德两家面包房的职工也举行了罢工，表示支持利物浦面包工人的罢工。"},{"type":"paragraph","text":"曼彻斯特和默尔西河畔二十个工地的建筑工人二十八日举行半天罢工，要求增加工资。五百多名工人还在曼彻斯特举行了示威。"},{"type":"paragraph","text":"在斯塔福德，五百名女工在二十四日举行罢工，要求同工同酬。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3603a4a3ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
