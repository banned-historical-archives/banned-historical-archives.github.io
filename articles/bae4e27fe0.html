地震后短短两个月，开滦煤矿的七个矿中，已有六个矿出了煤","authors":[],"dates":[{"year":1976,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社唐山一九七六年十月二日电　在伟大的领袖和导师毛主席亲手缔造的中华人民共和国成立二十七周年的时候，从唐山地震灾区传来了振奋人心的消息:开滦煤矿继马家沟矿第一个部分恢复生产之后，又有赵各庄、唐家庄、吕家坨、唐山、林西等五个矿出煤。至此，唐山丰南地区地震后短短两个月，开滦煤矿的七个矿中，已有六个矿出了煤。这是毛主席革命路线的伟大胜利，是开滦矿工化悲痛为力量，以自己的实际行动，表达了对伟大领袖毛主席深切的悼念。"},{"type":"paragraph","text":"在沉痛悼念伟大的领袖和导师毛主席的日子里，开滦煤矿党委带领广大职工回忆毛主席对开滦矿工的亲切关怀，并做出了继承毛主席遗志，誓把无产阶级革命事业进行到底的决定。各单位的工人理论队伍重新修订学习计划，协助党委，组织广大工人、干部掀起认真学习、深入批邓的新高潮；成千上万名矿工，流着眼泪，奔向矿井，用更大的干劲投入了恢复生产的战斗；不少因地震受伤在家休养的工人，拄着棍子来到矿山，要求分配任务；一部分家属也自动组织起来，帮助矿工搞好后勤服务工作。百里矿区响彻着一个声音:化悲痛为力量，遵照毛主席“按既定方针办”的嘱咐，将毛主席开创的无产阶级革命事业进行到底!"},{"type":"paragraph","text":"开滦煤矿的广大职工，以毛主席的伟大革命理论和革命实践激励自己，把无限悲痛变成学习毛泽东思想的强大动力，掀起了认真学习，深入批邓的新高潮。广大职工通过批邓进一步焕发了革命精神，决心克服一切困难，以最快的速度恢复煤炭生产，以实际行动悼念伟大领袖毛主席。他们从倒塌的仓库里，找出了能用的物资；从废墟中拣出旧砖头，盖成简易厂房；收集废旧设备，修修补补重新使用。在赵各庄、林西、唐山和唐家庄矿，井架或井塔因地震遭受破坏，工人们就边抢修边提煤；绞车房震坏了，工人们冒着余震的危险冲进去，打上柱子把房盖撑起来，坚持在下面工作。赵各庄矿巍山采区的工人，开始在回风道里出煤时，为了安全生产，按规定不能使用电机车，这样煤炭运输就成了问题。工人们不畏困难，同前来支援的解放军战士一起，硬是往返步行六华里，一车一车地把煤推到井口。唐山矿职工，化悲痛为力量，两次修改计划，排除千难万险，修复了一千四百多米巷道和各生产系统，使这个矿在国庆节前胜利地出了煤。"},{"type":"paragraph","text":"开滦煤矿五个矿在出煤的过程中，得到全国十一个省市和人民解放军的大力支援。有的省提出，三个人的工作两人干，抽出一个到唐山。前来支援的各地职工与开滦工人团结战斗，日夜奋战，对开滦煤矿的恢复生产做出了重要贡献。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bae4e27fe0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
