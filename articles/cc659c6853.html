民流入东北的指示","authors":[],"dates":[{"year":1953,"month":10,"day":23}],"is_range_date":false,"parts":[{"text":"中共中央关于注意控制关内受灾省份灾民流入东北的指示","type":"title"},{"text":"华东局、山东分局、华北局、中南局并东北局：","type":"appellation"},{"text":"据东北局来电称：最近安徽、山东等地灾民仍不断流入松江、吉林等省，各该地区已尽量予以安置，对实在无法安置者，亦发给路费，动员其返乡。中央认为东北局的意见和处置是对的。东北区今年灾情较重，各项基本建设工程、各厂矿及林业等方面，目前又已不需要更多劳力。关内各省今后不经东北局同意，不要介绍灾民到东北去寻找工作，对盲目流向东北的灾民，应设法劝阻，以免各处流浪，给东北造成许多困难。","type":"paragraph"},{"text":" 中央1953年10月23日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc659c6853"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
