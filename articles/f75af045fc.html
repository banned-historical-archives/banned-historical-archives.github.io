tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"古巴人民未受帝国主义的欺骗现代修正主义者叫嚷所谓“肯尼迪的保证”是制造对美帝的幻想削弱人民的警惕性","authors":[],"parts":[{"type":"paragraph","text":"新华社地拉那13日电 阿尔巴尼亚《人民之声报》13日就“加勒比海危机”一周年发表评论说，事实证明，现代修正主义者宣传的所谓肯尼迪的不侵犯古巴的“保证”只是一句空话。经验越来越清楚地告诉古巴人民，必须坚决进行反对帝国主义的侵略活动和侵略计划的斗争，才能保障古巴的自由和独立。"},{"type":"paragraph","text":"评论说，一年前，美帝国立义严重威胁古巴的自由和独立，在加勒比海地区制造紧张局势，但是，由于古巴人民及其政府的英勇立场，由于同古巴站在一起的全世界进步和爱好和平人民的有力支持，帝国主义的计划失败了。古巴人民维护了祖国的尊严和革命胜利的果实。"},{"type":"paragraph","text":"评论说，古巴人民识破了帝国主义的目的，帝国主义不会放弃它们的侵略计划，加勒比海的和平没有获得保障。事实证明，帝国主义的诺言只是空话，现代修正主义者宣传所谓“肯尼迪的保证”，其目的是制造对帝国主义的幻想，是要削弱人民的警惕性。"},{"type":"paragraph","text":"评论指出，古巴共和国在联合国的代表，列举许多事实证明这一年来美帝国主义继续不断地进行各种反对古巴的侵略活动，这一系列活动再一次证明，美帝国主义没有放弃对古巴的侵略，它继续威胁着古巴的自由和独立。"},{"type":"paragraph","text":"评论说，在这种情况下，古巴政府通过自己在联合国的代表，声明不在莫斯科三国条约上签字，这是可以理解的。评论指出，古巴政府的这一立场是符合古巴真正的安全自由和独立的利益的，这一立场再次说明，古巴人民及其政府为真正和平而斗争，而不受帝国主义及其支持者的宣传的欺骗。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f75af045fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
