["陈再道"],"dates":[{"year":1967,"month":4,"day":11}],"is_range_date":false,"parts":[{"text":"陈再道对武汉造反派的讲话记要","type":"title"},{"text":"陈再道","type":"authors"},{"text":"〖在武汉军区副司令孔庆德接见造反派的大会上，陈再道讲了话。下为记要。〗","type":"paragraph"},{"text":"1、你们是革命左派，（指新华工、新湖大、二司、三司），我们坚决依靠你们。","type":"paragraph"},{"text":"2、三字兵你们要作分化瓦解工作。","type":"paragraph"},{"text":"3、我们支持三字兵是错误的。","type":"paragraph"},{"text":"4、我们有缺点有错误，通过内部解决，以后见行动。","type":"paragraph"},{"text":"5、江青同志意见，成立支左监督小组。","type":"paragraph"},{"text":"《湖北日报》成立监督小组，（新华工两人、新湖大、二司、三司、新华农各一人）登造反派文章，树立你们的威信。","type":"paragraph"},{"text":"7、要彻底批判刘少奇，王任重是当地最大的走资本主义道路的当权派。连同其《龚同文》一起批判。","type":"paragraph"},{"text":"来源：","type":"paragraph"},{"text":"《打倒反革命修正主义分子——陈再道》  武汉钢二司武汉大学总部宣传部  毛泽东思想武汉军区政治部红旗总部合编  河南二七公社宣传部翻印  1967年9月","type":"paragraph"}],"comments":[],"origin":"打倒反革命修正主义分子——陈再道》　武汉钢二司武汉大学总部宣传部　毛泽东思想武汉军区政治部红旗总部合编　河南二七公社宣传部翻印　1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈再道","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fc30edb51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
