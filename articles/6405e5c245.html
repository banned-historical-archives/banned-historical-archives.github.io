ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"祝贺诺沃提尼当选捷克斯洛伐克共和国总统的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺诺沃提尼当选捷克斯洛伐克"},{"type":"paragraph","text":"共和国总统的电报"},{"type":"paragraph","text":"（1957年11月21日）亲爱的安托宁·诺沃提尼同志："},{"type":"paragraph","text":"欣悉你当选捷克斯洛伐克共和国总统，谨以中国人民和我个人名义向你表示衷心的祝贺。"},{"type":"paragraph","text":"以你为首的捷克斯洛伐克共产党中央委员会在建设社会主义、巩固以苏联为首的社会主义阵营的团结和维护世界和平的事业中作出了卓越贡献。捷克斯洛伐克人民授予你最高国家职位，证明捷克斯洛伐克共产党和人民对你无限的信任和爱戴。"},{"type":"paragraph","text":"祝你在领导捷克斯洛伐克共和国的社会主义的建设和维护世界和平的伟大事业中取得巨大的成就。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东一九五七年十一月二十一日"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":11,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":356,"page_end":356},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6405e5c245"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
