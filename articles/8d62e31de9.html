nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"戚本禹给地质部机关“革命造反兵团”的一封电话信","parts":[{"type":"title","text":"677．戚本禹给地质部机关“革命造反兵团”的一封电话信"},{"type":"paragraph","text":"(1967年4月10日)"},{"type":"paragraph","text":"“革命造反兵团”的同志："},{"type":"paragraph","text":"四月五日来信收到，谢谢！"},{"type":"paragraph","text":"地质学院“东方红”的同志曾向我谈过地质部的情况，他们认为旷伏兆同志是个比较好的同志，要以参加革命三结合的领导班子。我向有关方面对旷伏兆同志的情况进行了一些调查，觉得地质学院“东方红”的同志对旷伏兆同志的看法大体上是对的。我希望你们考虑革命小将的意见，支持旷伏兆同志，迅速建立地质部领导班子，抓革命，促生产，在革命和生产战斗中为人民作出新的贡献。同时，也希望旷伏兆同志能够很好地依靠和团结广大革命群众(包括炮轰过自己的，反对过自己的革命同志)，虚心向群众学习，改正自己的错误，把地质部的文化大革命进行到底！"},{"type":"paragraph","text":"以上只是地质学院“东方红”的同志和我的一种意见，供你们参考。"}],"authors":["戚本禹"],"dates":[{"year":1967,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":656,"page_end":656,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d62e31de9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
