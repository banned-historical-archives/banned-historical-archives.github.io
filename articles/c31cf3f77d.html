周恩来"],"dates":[{"year":1967,"month":10,"day":20}],"is_range_date":false,"parts":[{"text":"周恩来关于哈密问题的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"总理秘书传达周总理关于哈密断绝交通问题的指示：","type":"paragraph"},{"text":"“铁路交通是国家的命脉，而且关系到国际影响问题，尤其目前冬季来临，粮食、煤炭的运输任务非常繁忙，铁路的断绝会对国家造成很大损失，因此总理指示，委托七三三五部队驻哈密××航校派出部队监督哈密铁联，红联（三促观点）于十月十四日已达成的四项协议的执行，保证哈密站运输畅通。”","type":"paragraph"},{"text":"“总理指示：哈密车辆厂，××厂两个工厂和工务段和机务段只能在厂内闹革命，不准到铁路线上去串连，不准在工作时间辩论，不要影响铁路运输。总理指示：今后不准任何人向铁路上打枪打炮，这是违背国法的。维护交通安全这是当前国家的最大利益。”","type":"paragraph"},{"text":" （抄自《四一八通讯》十二期，一九六七年十月二十三日）","type":"paragraph"}],"comments":[],"origin":"抄自《四一八通讯》十二期，一九六七年十月二十三日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c31cf3f77d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
