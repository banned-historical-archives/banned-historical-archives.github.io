hors":[],"dates":[{"year":1968,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举“毛泽东思想万岁”红旗举行反美示威"},{"type":"paragraph","text":"日本福冈人民怒吼：美军滚出去！"},{"type":"paragraph","text":"新华社十七日讯　据东方通讯社报道：日本福冈县爱国人民十六日再次举行示威游行，强烈要求撤除美国板付空军基地。"},{"type":"paragraph","text":"这天下午，福冈和其他县日中友好协会（正统）总部的一百名积极分子，不顾佐藤反动政府的警察的威胁和镇压，高举着“毛泽东思想万岁！”的红旗，在板付美军基地大门前举行了集会。"},{"type":"paragraph","text":"日中友好协会（正统）福冈县总部理事长柏木正一在会上发表讲话说：伟大的领袖毛主席指出：“当前，世界革命进入了一个伟大的新时代。”在日本，到处都展开了把美帝国主义赶出日本的英勇斗争。我们一定要废除日美“安全条约”，争取日本的独立。"},{"type":"paragraph","text":"日中友好协会（正统）熊本县和佐贺县总部的代表和亚非人民团结委员会的代表也在会上发表了讲话。"},{"type":"paragraph","text":"同时，来自福冈县各地的约八百名爱国青年工人和学生，在福冈市政厅前面集会并到市内各主要街道和板付空军基地举行示威游行。他们在板付空军基地门前同日中友好协会（正统）的示威者汇合在一起，同守卫美军基地的佐藤政府六百名武装警察展开了英勇的搏斗。他们一面高呼：“美军滚出板付！滚出日本！”“粉碎日美安全条约！”“撤除美国空军山田火药库！”一面用石块还击用短棍毒打示威群众的警察。几百名市民聚集在示威群众的周围，鼓励他们的英勇斗争。"},{"type":"paragraph","text":"据新华社东京电　日本爱国学生二百多人，不顾反动武装警察的恫吓和镇压，不久前在东京王子美军野战医院附近举行示威游行，要求撤除这个美军医院。"},{"type":"paragraph","text":"爱国学生和支持他们的许多居民聚集在王子火车站前的广场上举行了集会。在集会上，学生代表纷纷发表讲话，严厉谴责美帝国主义的侵越战争，号召日本人民行动起来，支援越南人民的抗美救国战争。学生们还谴责了美帝国主义在越南问题上玩弄“和谈”骗局。"},{"type":"paragraph","text":"学生代表在讲话中还热烈支持法国、欧洲和北美人民的革命斗争。"},{"type":"paragraph","text":"集会结束后，全体与会者斗志昂扬地到美军野战医院举行游行。许多市民也参加了游行队伍。（附图片）"},{"type":"paragraph","text":"图为日本爱国工人和学生，不畏强暴，不怕牺牲，英勇地截住为美帝侵越战争运输军火的列车时的情形。　新华社发（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c03004720f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
