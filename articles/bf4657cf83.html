ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给易礼容的信","alias":"","parts":[{"type":"paragraph","text":"给易礼容的信"},{"type":"paragraph","text":"（1952年6月10日）礼容兄："},{"type":"paragraph","text":"六月九日来信收到。参加土改有收获，甚好。承告以各事，甚谢。"},{"type":"paragraph","text":"人们说你近年政治上进步不大，这种批评是值得注意的，我从去年的一次谈话中亦有此感觉，主要的是劳动人民的立场还没有站稳。此次参加土改，可能对你有帮助。政协全委会每周或每两周有一次学习座谈会，许多老先生都在学习，建议你去参加，请你自己酌定。此复。顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十日"},{"type":"paragraph","text":"[1]易礼容，当时任政协第一届全国委员会委员、中华全国总工会劳保部部长。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":6,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":134,"page_end":134},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf4657cf83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
