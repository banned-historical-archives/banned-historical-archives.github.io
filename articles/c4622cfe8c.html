[{"year":1952,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"王孙"},{"type":"paragraph","text":"在五反运动第一战役中，资产阶级子弟们的劝说、检举他们亲属行为，对运动是起了一定的推动作用的。许多不法资本家在他们子弟的帮助教育下，坦白交代了自己的问题，获得了政府的宽大处理。这是值得我们兴奋的。也说明资产阶级的子弟是可以争取和应当争取的，我们要好好的动员他们。"},{"type":"paragraph","text":"但是，目前尚有不少资产阶级出身的同学们，虽已在理论上认识到资产阶级的丑恶本质，有时也很激动地要求参加五反实际斗争，检举自己的亲友。但是，有时自己转念一想，或者当自己坐沙发椅子上听着无线电的时候，或者当自己吃着好的菜饭的时候，不禁又想起:如果我检举了父亲，家庭破了产(?)，还能不能有这样舒适的享受呢?干革命工作，将来能不能有这样的享受呢?想到这里的时候，满腔热情又冷却了一半，顾虑又产生了。于是又犹豫不决了。"},{"type":"paragraph","text":"产生这种错误思想的青年们，还是没有建立起对资产阶级丑恶本质和生活方式的憎恨心理，仍然留恋于资产阶级那套腐朽生活和物质享受。这种思想是会严重地阻碍我们参加实际斗争的，即使我们参加了仍然不可能在困难时候坚持到底的，必然会使我们成为五反斗争或其他工作中的逃兵，今天必须使我们在思想上断绝和资产阶级的那些腐朽堕落的生活、思想相通的“后路”，不再留恋它们，不再受它们的影响。这才能保证我们在五反斗争中丝毫不致动摇。只有这样，我们才能真正树立起无产阶级的思想；只有无产阶级的思想才能克服资产阶级的思想；只有无产阶级的思想才能使我们勇往直前，绝不后顾，不再被资产阶级种种“花招”所蒙蔽，使五反取得彻底胜利。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\04\\5249060301.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4622cfe8c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
