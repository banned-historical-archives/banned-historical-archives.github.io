<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"老母道匪特组织案破获 匪首张雨霖等九名正法","authors":["沪市新闻处"],"dates":[{"year":1951,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"老母道匪特组织案破获 匪首张雨霖等九名正法","type":"title"},{"text":"沪市新闻处","type":"authors"},{"text":"【沪市新闻处讯】继匪特组织“顺政国皇帝”案之后，本市人民政府公安局在华东各地公安局协助之下，又破获了庞大的潜伏达二十余年之久、曾得美帝、日伪、蒋匪幕后策动的反动道门“老母道”匪特组织。匪首张雨霖、张志成、陈庆祺、王功三、梁文凯、戴云程、倪国章、王在三、王俊成以下十八名悉数落网。","type":"paragraph"},{"text":"匪首张雨霖，原名张湘波，于一九二○年即拜“老母道”头目、满清余孽张公英(号雨霖、满清“库伦将军”)、张荫堂为师，张公英死后，张湘波即用张雨霖及“库伦将军”封号，以传教为名，四出招摇撞骗，阴谋进行反动活动；后又与特务匪首戴笠相识，遂假特务和尚静波的清凉寺作该反动“老母道”道址，蛊惑无知入道。一九三○年，张荫堂死后，遂独搅道务。抗日战争期间，张匪又与日伪相勾结，充当汪伪“军事委员会委员”，嗣后又勾串汉奸特务张志成、陈庆祺等匪归入宗门，以壮声势。并于一九四三年间，在本市愚园路一二六号设立“老母宫”，诱引封建道徒、汉奸、特务、失意政客、投机商人、反动地主、流氓地痞入道，传授“护身法”“迷魂法”等艺咒；又自建小朝庭，拟订荒谬编制，委诸匪以政军、财长等伪职，伺机而动。","type":"paragraph"},{"text":"本市面临解放时，蒋匪帮覆灭在即，张匪等竟妄图策动匪众，配合蒋匪阻挡我军进攻，终因我军进军神速，无由得逞。本市解放后，张匪即隐身潜伏，后以政府之宗教信仰自由政策为可欺，又与诸匪密谋，组织匪“农众自卫军”，委张匪志成等以“总指挥”、“传令官”等名义，分赴北京、天津、济南、苏北、皖北等地与当地的反动道门“九宫道”、“万国道德会”、“小刀会”、“黄沙道”、“大玄门”、“小玄门”、“离卦道”、“一心天道”、“吕祖道”连络，发展人枪，委以“中”、“中”、“东”、“西”、“合”、“人”各路总政、军、财长等匪职；一面又与梁匪文凯、吴匪念之等计议前往香港与其主子美帝及蒋匪残余联络，作为内应，伺机聚众分别进行大规模叛乱，策应美蒋匪军登陆。去年农历三月初三，张匪认为“天时”将到，命诸匪于农历七月初七实行全国叛乱，并估计去秋世界大战必然爆发，其主子美帝与日寇将在青岛登陆，遂决定叛乱行动先在胶济线上开始，以资策应。去年五月，其西路“总政长”孙匪忠元于山东单县首先叛乱，抢粮二万八千斤，杀害村干、妇女各一人，幸经我军及时剿灭；张匪志成、王匪功三两匪亦于同年六月在济南阴谋活动时落网，全案遂告破获；匪首张雨霖等十三名移解本市人民法院依法严惩。","type":"paragraph"},{"text":"土述以张雨霖为首的匪类甘为美帝蒋匪爪牙，组织反动道门，蛊惑无知，扩展组织，阴谋叛乱抢掠，系属罪大恶极，无可宽贷，人民法院乃将张雨霖、张志成、陈庆祺、王功三、梁文凯、戴云程、倪国章、王在三、王俊成九匪首判处极刑，于十九日上午在监狱刑场正法。吴念之、姚绍秀、王又山、陈永江四犯分别判处五年至十五年徒刑；从犯张承日、张兆麟、章敬.....","type":"paragraph"}],"comments":[],"origin":" 《文汇报》1951年2月21日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5d5b663bf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
