al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致林彪、慧荣臻电","alias":"","parts":[{"type":"paragraph","text":"致林彪、聂荣臻电"},{"type":"paragraph","text":"（1936年4月16日）林、聂："},{"type":"paragraph","text":"甲、关麟征受我宋支队及三十军在克城、义泉之威胁停止于蒲县，杨澄源假称与我数千对战，亦在乡宁未动，汤恩伯在吉县以南。乙、估计数日内无与上述诸敌作战之良好机会。丙、红军第一军团明十七日起：一、以两个师打马头关至永和关之河防。二、以两个师相机夺取大宁，不论大宁夺取与否，此两个师应位置于大宁及蒲、大、三县之交，发动群众，拒止蒲县、吉县敌之急进。三、打河防之部队于任务完成后，住《驻）于永、大、之间准备作战。"},{"type":"paragraph","text":"[1]这是毛泽东和红军第一方面军司令员彭德怀给第一方面军第一军团"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":4,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":389,"page_end":389},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be629db5d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
