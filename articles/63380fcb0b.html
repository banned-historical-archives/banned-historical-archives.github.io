:["吴开斌","武汉大学"],"dates":[{"year":1957,"month":5,"day":28}],"is_range_date":false,"parts":[{"text":"战斗的誓言——打倒“三害”！","type":"title"},{"text":"武汉大学吴开斌","type":"authors"},{"text":"[吴开斌：武汉大学中文系学生]","type":"subtitle"},{"text":"“三害”在武大根深蒂固，流毒全校，师生员工深受其害，“三害”不除，群众痛苦不能解除，正气不能上升，学校不能办好，珞珈山上也不能有光明！","type":"paragraph"},{"text":"党中央和毛主席号召要除“三害”，革命的青年应立即行动起来，投入战斗。","type":"paragraph"},{"text":"我们誓与“三害”斗争到底，决不退缩，决不退缩，也决不因为某些人的冷淡而烟消火灭，偃旗息鼓。","type":"paragraph"},{"text":"“三害”一日不除，我们一日不罢休！","type":"paragraph"},{"text":"与“三害”誓不两立，不共戴天！","type":"paragraph"},{"text":"打倒“三害”！","type":"paragraph"}],"comments":[],"origin":"《武汉大学右派言论汇编》（中共武汉大学社会主义思想教育办公室，1957.12）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63380fcb0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
