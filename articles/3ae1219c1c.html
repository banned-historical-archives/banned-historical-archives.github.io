art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席会见并宴请罗工人党中央代表团","authors":["邹健东"],"parts":[{"type":"paragraph","text":"新华社十日讯 中国共产党中央委员会主席毛泽东，今天下午会见罗马尼亚工人党中央委员会代表团团长、罗马尼亚工人党中央委员会政治局委员扬·格·毛雷尔，代表团团员：政治局委员埃·波德纳拉希、尼·齐奥塞斯库和基伏·斯托伊卡，以及代表团全体工作人员。"},{"type":"paragraph","text":"毛泽东同志同扬·格·毛雷尔同志以及代表团团员进行了友好的谈话。"},{"type":"paragraph","text":"会见时在场的有：中共中央副主席刘少奇，中央总书记邓小平，中央政治局委员彭真，中央政治局候补委员康生，中央委员伍修权等。"},{"type":"paragraph","text":"会见时，罗马尼亚驻中国大使杜米特鲁·乔治乌也在场。"},{"type":"paragraph","text":"新华社十日讯 中国共产党中央委员会主席毛泽东今晚设宴，招待罗马尼亚工人党中央委员会代表团团长、罗马尼亚工人党中央委员会政治局委员扬·格·毛雷尔，代表团团员：政治局委员埃·波德纳拉希、尼·齐奥塞斯库和基伏·斯托伊卡，以及代表团的工作人员。罗马尼亚驻中国大使杜米特鲁·乔治乌应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会的有：中共中央副主席刘少奇，中央总书记邓小平，中央政治局委员彭真、李富春、李先念、谭震林，中央政治局候补委员康生，中央书记处候补书记杨尚昆，中央委员伍修权等。"},{"type":"paragraph","text":"毛泽东主席和以扬·格·毛雷尔同志（前左四）为首的罗马尼亚工人党中央委员会代表团全体成员合影。 新华社记者 邹健东摄"}],"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ae1219c1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
