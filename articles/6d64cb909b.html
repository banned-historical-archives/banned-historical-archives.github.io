script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南市奸商勾通傀儡开设押店剥削居民利息高至三分十天一结","authors":[],"dates":[{"year":1939,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南市区域、自沦入日伪掌握后、人民处于重重压迫下、经济日益枯渴、最近有投机商人、勾通伪组织、在南市大境里荣庆坊一号、开设协昌押店、规定军器、钟表、施衣、木器、五金铜铁、及贵重物件均不收受、专当普通衣物、利息按期三分、十天为一期、当本二角至九角、一个月满期、一元至五元、三个月满期、五元至十元、六个月满期、当入时尚有种种不规则之扣费、故实际所收利息、超过加一、其收括人民、几等猛虎、一般贫苦民众、明知前往押当、不啻饮鸠止渴、但迫于环境限制、亦无可奈何、故人民经济、处种种剥削下、前途殊不堪设想、该押店营业甚佳、开设时间虽暂、获利甚丰数日前大境路八八号、前甡兴当原址、又新设伟信押店、利息与收当物件办法、均与协昌押店相同。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d64cb909b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
