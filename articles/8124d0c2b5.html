[{"year":1967,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东文艺思想的光辉照耀全世界"},{"type":"paragraph","text":"歌舞《北京—地拉那》，是兄弟般战斗友谊的象征。毛主席派来的文艺战士，唱出了中阿两国人民团结、战斗的心声：万岁，我们亲密的朋友恩维尔！万岁，伟大的领袖毛泽东。"},{"type":"paragraph","text":"“是你们给我们带来了信心，是你们给我们带来了力量。”日本人民热烈欢迎，日本人民同声赞扬：“毛泽东的文艺战士，毛泽东的红卫兵小将。”"},{"type":"paragraph","text":"巴勒斯坦青年学拿枪，重建家园意志强。毛泽东的文艺兵带来了七亿颗赤诚的心，坚决支持你们，争取民族解放。"},{"type":"paragraph","text":"中国文艺战士到也门，工地，田野，山谷变成了演出场，也门朋友热烈赞扬中国歌舞，说它闪耀着毛泽东思想的光芒。"},{"type":"paragraph","text":"中国—几内亚人民心连心，团结反帝，并肩前进。两国艺术家同台欢舞鼓斗志，誓把艺术献人民。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8124d0c2b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
