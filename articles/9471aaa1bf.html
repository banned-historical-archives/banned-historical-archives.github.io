ors":["岳安良","河南农学院"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——“阶级分析方法已经过时”","type":"title"},{"text":"河南农学院岳安良","type":"authors"},{"text":"（岳安良：河南农学院58级学生）","type":"paragraph"},{"text":"阶级分析方法已经过时，应按物质分配，将社会成员分为四个集团：","type":"paragraph"},{"text":"（1）工人集团；","type":"paragraph"},{"text":"（2）农民集团；","type":"paragraph"},{"text":"（3）知识分子集团；","type":"paragraph"},{"text":"（4）国家干部集团。","type":"paragraph"},{"text":"这四个集团中，工人集团由共产党代表说话；知识分子集团由民主党派说话；如果有一个替农民说话的党派，我一定参加。生产资料私人所有制已经消灭了，资产阶级的经济基础已在改变，再强调进步与落后、再强调阶级矛盾，就会影响人民内部的团结。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9471aaa1bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
