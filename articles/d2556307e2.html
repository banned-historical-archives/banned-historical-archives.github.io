script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市民主党派负责人和知名人士认真学习邓副主席报告满怀信心看未来　坚定不移搞四化","authors":[],"dates":[{"year":1980,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天，市政协和市委统战部召开各民主党派负责人和各界知名人士会议，认真学习、热烈讨论邓小平同志关于目前形势和任务的报告。"},{"type":"paragraph","text":"市政协副主席、市委统战部部长张承宗主持了会议。市政协、市委统战部和各民主党派负责人刘靖基、卢于道、刘良模、王致中、杨宣武、唐君远、叶尚志、刘人寿等出席了会议。"},{"type":"paragraph","text":"在沪的全国政协委员应邀出席了会议。"},{"type":"paragraph","text":"各民主党派负责人、各界知名人士在讨论中一致认为，邓小平同志的重要报告，是一个从实际出发、切合时宜的报告，对做好当前工作，完成今后任务，巩固和发展革命的爱国的统一战线，具有重大指导意义。大家表示，一定要深入学习，努力贯彻。"},{"type":"paragraph","text":"大家在讨论中谈到，邓小平同志的报告对人民群众所关心的一些重大问题作了回答，学习后心明眼亮，感到我们民族大有希望，社会主义事业前途无量。有的同志说，前一时期，谈问题多了些，讲成就少了些，其实是身在此山中，不知此山大。解放前长期侨居国外的老同志说，有些小青年对实现四化信心不足，眼睛看着西方，其实，资本主义有着不可克服的矛盾，如贫富悬殊、种族歧视、通货膨胀、经济危机、能源危机等等，都是他们的社会制度本身所不能解决的。只有社会主义有着光明的前途。大家纷纷表示，要满怀信心看未来，坚定不移搞四化。"},{"type":"paragraph","text":"各民主党派和各界知名人士在学习讨论中表达了在中国共产党领导下，专心致志搞四化的坚强决心。在谈到极少数所谓“民主派”和“持不同政见者”反对共产党领导时，有的民主党派负责人说，只有坚定不移地拥护共产党的领导，才有出路，这是历史所证明了的。邓副主席的重要报告还讲到了发扬党的优良传统，发挥党员先锋模范作用的问题，大家学习后，更感到中国共产党是大有希望的党。许多学者、老科学家和有业务专长的人士满怀信心地表示，一定要紧密团结在共产党的周围，在四化建设中充分发挥自己的聪明才智。"},{"type":"paragraph","text":"大家在讨论中说，要力争在八十年代实现台湾归回祖国、统一祖国的大业，关键在于把国内的事情办好。回顾三年来我国社会主义建设所取得的巨大成就，大家坚信，只要在党的领导下，继续进行艰苦的努力，我国的国民经济就会发展得更快，实现祖国统一的物质基础就会更雄厚了。许多同志表示，要利用自己的有利条件，动员各方面的力量，为统一祖国贡献力量。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2556307e2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
