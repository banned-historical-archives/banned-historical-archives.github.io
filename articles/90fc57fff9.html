script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于同意四十三军以一个团先行渡海致林彪电","alias":"","parts":[{"type":"paragraph","text":"关于同意四十三军以一个团先行渡海"},{"type":"paragraph","text":"致林彪电"},{"type":"paragraph","text":"（1950年2月12日）中央转林彪同志："},{"type":"paragraph","text":"二月十日廿时电悉，同意四十三军以一个团先行渡海，其他部队陆续分批寻机渡海。此种办法如有效，即可能提早解放海南岛。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十二日上午四时[1]林彪，当时任中国人民解放军第四野战军司令员、中南军区司令员。"},{"type":"paragraph","text":"[2]指林彪等1950年2月10日20时给中共中央并毛泽东的电报。电报说：据邓华、赖传珠来谈，海南岛作战我军如一次以一个军登陆则船只问题极难解决，同时又无法对付敌之海空军扰乱。因此，他们建议在此时间内，采取先行偷渡的办法，到达海南岛后即与冯白驹部会合，打小规模的运动战与游击，然后大部队再设法渡海。我们同意第四十三军一个团先行渡海，并同意其他部队陆续渡海。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":2,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":197,"page_end":197},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90fc57fff9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
