,"files":[],"article":{"title":"中央组织部关于转发《中共中央对湖南省委关于‘文化大革命’中冤假错案补发工资问题的请示报告的批复》的通知","dates":[{"year":1981,"month":6,"day":20}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局, 干审工作政策文件选编 (上), 773","tags":[{"name":"工资","type":"主题/事件"},{"name":"平反","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中央组织部关于转发《中共中央对湖南省委关于“文化大革命”中冤假错案补发工资问题的请示报告的批复》的通知"},{"type":"subtitle","text":"1981年6月20日·中组发〔1981〕14号"},{"type":"paragraph","text":"为了妥善地解决“文化大革命”中冤假错案平反后补发工资的问题，现将《中共中央对湖南省委关于“文化大革命”中冤假错案补发工资问题的请示报告的批复》转发给你们。请参照执行。"},{"type":"paragraph","text":"中共中央对《湖南省委关于“文化大革命”中冤假错案补发工资问题的请示报告》的批复"},{"type":"paragraph","text":"湖南省委："},{"type":"paragraph","text":"三月六日省委来电收悉。基本同意你们的意见。对于“文化大革命”中因冤假错案被停发、扣发的工资，原则上应予补发。考虑到你省财政困难的情况，目前可以采取困难补助的办法，待财政经济情况好转以后，再予补发。何时补发完毕，可由省委决定。但补发工资时，应将所发的困难补助金予以扣除。"},{"type":"paragraph","text":"中共中央一九八一年四月二十日"}],"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5352edfb07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
