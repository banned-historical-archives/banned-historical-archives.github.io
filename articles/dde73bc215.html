art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以雷锋为榜样 促进青年革命化共青团中央要求各级团组织在毛主席号召“向雷锋同志学习”两周年时，继续深入开展学习雷锋活动；","authors":[],"parts":[{"type":"paragraph","text":"本报讯 中国共产主义青年团中央委员会二月中旬发出通知，要求各级团组织在毛主席号召“向雷锋同志学习”两周年的时候，继续深入地开展学习雷锋的活动。"},{"type":"paragraph","text":"两年来，全国广大青年热烈响应毛主席的伟大号召，广泛深入地开展了“向雷锋同志学习”的活动，受到了深刻的共产主义思想教育，有力地促进青年革命化。雷锋同志的平凡而伟大的共产主义精神，已经在青年中开花结果。各个战线上千千万万的雷锋式的青年正在成长。"},{"type":"paragraph","text":"团中央通知要求各级团组织，继续深入地开展“向雷锋同志学习”的活动，进一步引导各个战线上的青年，以雷锋同志为榜样，努力学习毛泽东思想，发扬全心全意为人民服务的革命精神，树立奋发图强的革命雄心壮志。在三大革命运动中，在今年新的生产高潮中，不断有所发现，有所发明，有所创造，有所前进。"},{"type":"paragraph","text":"通知还要求各级团组织检查一次在青年中继续开展学习雷锋活动的情况，总结经验，解决问题，进一步推动这一学习活动的开展。同时，注意树立和宣传本地区学习雷锋的青年先进人物。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dde73bc215"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
