,"dates":[{"year":1957,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"建议","type":"title"},{"text":"山西张庄","type":"authors"},{"text":"(张庄：榆次一中教师)","type":"subtitle"},{"text":"（一）把党支部的收音机放到教工俱乐部让全体教工收听当前国内外动态。","type":"paragraph"},{"text":"（二）建议我校党政工团领导干部集体参加大灶一个月，与学生同甘共苦，以体验生活，并希全体同学们热烈地欢迎我们的领导同志。","type":"paragraph"},{"text":"（三）团外学生中模范很多，建议教导处把没进行选举的原因向全校学生加以解释，这样他们就不会再认为学生中有一大群私生子了。","type":"paragraph"},{"text":"（四）建议同学对害党害人民的假积极分子，不管是谁，只要看准了就把他的丑恶鬼脸揭露出来，然后团结教育他，给他治病。但不要忙着结束争鸣。","type":"paragraph"},{"text":"（五）建议同学们要用严肃正直的态度，对待问题，不要胡闹，也不要忘了给毛主席喊万岁，因为我们的园丁是伟大的毛泽东。","type":"paragraph"},{"text":" 榆次一中教师  张庄1957年6月5日","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（三）》（中共山西省委整风办公室编印，1957年10月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b34d841fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
