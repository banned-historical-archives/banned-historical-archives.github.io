生活感到很大威胁","authors":[],"dates":[{"year":1951,"month":4,"day":28}],"is_range_date":false,"parts":[{"text":"湘乡、醴陵等区部分乡暂停土改贫雇农生活感到很大威胁","type":"title"},{"text":"【新湖南报讯】湘乡、醴陵等县部分乡暂停土改后，有些贫雇农因感生活无着落，故情绪低落。湘乡三区桥亭乡有些贫雇农民觉得不分田无生路而痛哭，甚至有好几个人想服毒自杀。醴陵石羊乡有的贫雇农不满地说：“早就打算搞些肥料好作田，现在为什么又不分田了。”有的农民气愤地说：以前说是早完成秋征早分田，修好塘坝好分田，但现在又不土改了，干部说话不负责任，我们没有饭吃啦！","type":"paragraph"},{"text":"邵阳专区已发现农民自发分田的现象。当地地主企图以急速分田来逃避斗争，因此煽动农民分田。益阳也有类此事情发生。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年4月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56cc17d437"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
