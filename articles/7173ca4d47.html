<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"内蒙扎赉特旗在粮食统购中的问题","authors":[],"dates":[{"year":1954,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"内蒙扎赉特旗在粮食统购中的问题","type":"title"},{"text":"【本刊讯】内蒙扎赉特旗在粮食统购工作中，由于党、团员和村干部积极带头卖余粮，目前已取得一定成绩。但从全旗来看，还存在以下几个问题：","type":"paragraph"},{"text":"一、有些区村干部在工作中存在急躁冒进情绪，企图一下子完成粮食统购任务。因而忽视了进一步对广大农民的教育，特别是对余粮户的教育工作和余粮调查工作。如巴彦高勒努图克河南嘎查粮食统购任务是四千五百石，干部认为完成任务不成问题，因此没有很好的进行宣传与调查工作。虽然以后发动农民自报售粮数字超过了原定任务，但并未能通过这次粮食统购工作提高农民的阶级觉悟和爱国热情；特别是还没有真正把余粮户的余粮收购完。如有些余粮户今年实际上打一百多石粮，结果自报卖六、七十石，除自己吃用外还剩许多粮。又如乌珠尔努图克五家户嘎查为了及时完成粮食统购任务，事前也未很好向农民进行宣传动员，因此不仅部分农民对粮食统购工作抱怀疑态度，甚至个别党团员也抱怀疑态度。该嘎查在粮食统购工作中，事先未调查余粮户现存有多少粮，而是先向农民调查已售给合作社多少粮食，结果农民报已售给合作社二千五百石(实际只售一千二百多石)，造成农民普遍隐报实产。致使工作组在工作上弄得非常被动。","type":"paragraph"},{"text":"二、物资供应仍赶不上群众的实际需要。具体事实如下：1、旗社对音德尔镇街居民所食用的粗粮，有供不应求之势，有时群众在街内买不着米吃。如政府干部本巴家，因为买不着米曾吃过好几次土豆。特别是自从正式实行粮食统购统销后，群众思想更加恐慌。在街内经常买不着小米，而旗社仅有的高粱米有时也不够卖。而在市场上又不准群众私自购买。致使群众非常不满，说：“这叫什么事啦，拿钱还买不着小米吃，有钱还得挨饿。”2、农民急需的豆饼很缺乏。他们不满地说：“干部宣传保证物资供应，要啥有啥。现在连豆饼都买不着啦。”有时也来一些豆饼，但在价格上比邻区(东北)高。3、农民在大批售粮的同时，需要买很多生产与生活资料，以便扩大再生产。但合作社在这些方面准备很差。例如很多农民要买胶皮轮车买不着。因此奸商即趁机进行投机捣把活动。如乌珠尔努图克巨宝屯嘎查联合屯尤宽礼，在合作社买一辆胶皮轮车，转手再卖给农民，即从中赚了六十万元。此外巴岱努图克群众反映：“现在合作社的布都是粗布和花其布，我们穿这布的时候已经过去啦，我们现在需用的是上等斜纹和细布。但现在合作社又没有。”","type":"paragraph"},{"text":"三、由于该旗连年丰收，群众生活已逐渐上升，农村的资本主义因素亦日益向前发展。很多农民为了买胶皮轮车拉脚赚钱，而不参加互助组，甚至还有的农民向别人借钱、借马买胶皮轮车。据现在不完全统计，仅绰勒努图克五家户一个嘎查，就买了二十二辆胶皮轮车，温德尔嘎查买了十四辆。(摘自内蒙日报、绥远日报一月七日“内部参考资料”)","type":"paragraph"},{"text":"1954年1月14日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7173ca4d47"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
