art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们大队的大变化","authors":["缪成凯〖HH/换行〗DW：八一五九四部队"],"parts":[{"type":"paragraph","text":"我是一九七三年自盖县太阳升公社入伍的。无产阶级文化大革命以前，拨给我们队三台手扶拖拉机。可是，在大队一个走资派的把持下，手扶拖拉机只能用于副业拉脚，使农业机械化变成了副业机械化，影响了农业生产，每年还要由国家供给很多回销粮。贫下中农气愤地说：“我们不向国家卖余粮，反吃国家的，机械化用于副业，真是肥了个人，害了国家，这样的机械化不要更好。”"},{"type":"paragraph","text":"毛主席亲自发动和领导的无产阶级文化大革命运动开始以后，贫下中农组织起来，夺了走资派的权。广大贫下中农和革命干部一起，认真学习毛主席关于“农业的根本出路在于机械化”的教导，端正了方向，订出了发展农业机械化的规划，将大队的机械化从资本主义的死胡同里拯救出来。"},{"type":"paragraph","text":"手扶拖拉机用到农田基本建设上来，拉沙治碱，把荒废的土地开垦成稳产高产的良田。大家从实践中体会到农业机械化的好处，接着又新买了三台胶轮拖拉机和一台手扶拖拉机。在党支部的领导下，向大寨学习，与天斗，与地斗，与资本主义倾向斗，经过两年的时间，大田园田化，水田条田化，旱能浇，涝能排，亩产从过去的三、四百斤，上升到近千斤，粮食不但能自给，还向国家卖了余粮。一九七○年上级决定我大队增加一部分蔬菜种植，但仍然向国家卖了余粮。贫下中农高兴地说：“要不是文化大革命，我们大队农业机械化哪能发展起来，咱村哪能有这样的变化啊！”"},{"type":"paragraph","text":"最大的不肯改悔的走资派邓小平，胡说什么“今不如昔”，我们大队农业机械化的变化，就是给邓小平的当头一棒！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22e42138f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
