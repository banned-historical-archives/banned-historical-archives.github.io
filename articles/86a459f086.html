会议精神的报告的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":2}],"is_range_date":false,"parts":[{"text":"毛泽东转发中南局传达讨论政治局扩大会议精神的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"子恢同志，并告漱石，小平，仲勋，一波，高岗，剑英同志：","type":"appellation"},{"text":"子恢同志三月二十二日的报告收到了，同意这个报告所提出的各项方针和计划。将土改过程明确地划分为三个阶段是很必要的，各新区均应教育干部照三个阶段的各项步骤去做，不要省略和跳跃。土改后，农村的任务规定为生产教育民主三项，也是对的，即除生产教育两项任务之外，还有一项建立民主生活的任务。在中南这样的地区，各省召集一次苏区代表会议是必要的，但请注意在报纸上公布消息时采用老红色区域的名称，不要用“苏区”这个名称。在工厂企业内，凡未进行过控诉旧制度和克服官僚主义这两项工作的，均普遍进行一次，很有必要。在镇反问题上，报告内指出要强调加紧宣传、防止不准两点是很对的。防止不准的办法是，拘捕前由地委市委一级精细地审查名单，然后按名单进行拘捕。这即是说，将过去规定的县有捕人权，收回到地委一级来。报告内说“河南各县实行县开名单，交农代会讨论，专署批准，办法很好，应推广执行”，应当就是将县一级的捕人权收回到地委一级。天津专署的办法也是如此，这个办法是最稳当的。关于党政军首脑机关及要害部门的清理，应当在现在就定出计划，着手进行。西南的经验已通报你们了。最近饶漱石同志的报告规定了具体的步骤和办法，已发通报，请仿照去做。","type":"paragraph"},{"text":" 毛泽东四月二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86a459f086"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
