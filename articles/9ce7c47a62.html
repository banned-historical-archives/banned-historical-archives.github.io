<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级用拖延手段对抗五反运动本市所得税申报情况不佳各工商业户应赶快申报依限缴纳　二月份营业税缴款书即开始分发","authors":[],"dates":[{"year":1952,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市各工商业户应汇算清交的一九五一年所得税，为适应国家财政调度，上海市人民政府曾于本年二月七日以沪府秘三字第四八七一号布告规定，限于二月二十五日以前申报。总分支机构合并报交者，如因交通关系，确不及于二月二十五日以前办理申报者，在报请税务局核准后，得延长其申报期限，但最长只能延至三月五日为止。所有各工商业户应纳税款，并须于三月七日至二十日之期间内如数纳库。据调查，截至昨天(廿三日)为止，各业向税务局稽核处办理申报者:国际贸易业一五五户中，申报者仅八七户；房地产业四八户中，申报者仅三六户；棉布商业七二户中，申报者仅二十户；其他各业办理申报者只有一、二户。部份行业，如造纸工业、铜料冶制工业、钢铁商业、棉纺工业、金属品冶制工业、水泥工业、纺织用品工业、医疗器械工业、造漆工业、制革工业、文教用品业、铅印工业、内衣织造工业、毛巾被单工业等自报查帐户，连一家都还没有申报。根据以上情况，资产阶级企图用拖延所得税申报来对抗五反运动，事实已很显然。为保证国家税收，广大人民都有责任督促未申报的工商业户赶快申报，不应让其拖延。"},{"type":"paragraph","text":"【上海市新闻处二十三日讯】本市各工商业户应行汇算清交的一九五一年所得税，其申报期限将于二十五日截止。各区税务分局即将根据各工商业户所自报的所得额，依照税法规定的税率，计算他们应纳的税额，填发交款书，通知交纳。如交纳有一九五一年上期估征所得税的，即就前项应纳税额减去估征所得税后的余额，填发交款书，通知交纳。一九五一年汇篇清交所得税的纳税期限，自三月七日起至三月二十日止，由各区税务分局分别排完各工商业户交纳税款的日程，并在交款书上注明。希望各工商业户于接到交款书后，务必注意注明的交纳日期，以便在规定期限以前，向金库交纳。如有逾限交纳的，应依税法的规定，按日照所欠税额加收百分之一的滞纳金。"},{"type":"paragraph","text":"【又讯】各工商业户应纳的营业税，为适应国家财政调度的需要，和配合一九五一年所得税的汇算清交，亦自三月份起，改于次月四日至十日一周内，交纳上月份应纳的营业税。此项决定，已由本市人民政府税务局发表公告。因此，各工商业户二月份营业应纳的营业税，亦即将由各区税务分局排定交纳日程，分发营业税交款书，通知在三月四日至十日期内，向金库交纳。现距交纳二月份营业税和一九五一年所得税的期限，已经没有多少天了，希望全市工商界预储税款，如期清交，以尽对国家应尽的纳税义务。"}],"comments":[],"origin":"本报,上海市新闻处","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ce7c47a62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
