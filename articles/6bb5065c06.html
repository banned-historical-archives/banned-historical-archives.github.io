rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忠于毛主席的无产阶级革命路线","authors":["报道组"],"parts":[{"type":"paragraph","text":"本报讯 3018部队二连，在两条路线斗争教育中，活学活用毛主席著作，使干部战士进一步认清了两条路线斗争的实质，大大增强了无限忠于毛主席的无产阶级革命路线的阶级感情。"},{"type":"paragraph","text":"在两条路线斗争教育开始时，有的同志提出，我们党在毛主席英明领导下取得了伟大胜利，为什么到现阶段党内还会出现这样激烈的两条路线斗争呢？二连带着这个问题，组织干部战士认真学习了毛主席的教导：“党内不同思想的对立和斗争是经常发生的，这是社会的阶级矛盾和新旧事物的矛盾在党内的反映。党内如果没有矛盾和解决矛盾的思想斗争，党的生命也就停止了。”然后，用毛主席的这一教导作武器，引导大家重温了党的斗争历史。这使大家看到，我们伟大的党，就是在伟大领袖毛主席的英明领导下，不断地同各种错误路线进行斗争中发展壮大起来的。同时，也使大家深刻认识到，有阶级存在，就有阶级斗争。社会上的阶级斗争，必然要反映到党内来，这是不以人们的意志为转移的。毛主席亲自发动和领导的无产阶级文化大革命，就是发动亿万革命群众自己解放自己、自己教育自己，向党内一小撮走资本主义道路当权派进行总反击的伟大革命运动。这场斗争，比历次的革命运动都更加深刻，因此，两条路线的斗争也必然是非常激烈的。接着，他们又引导大家通过自己在文化大革命中所见所闻，畅谈以毛主席为代表的无产阶级革命路线的巨大威力及其取得的伟大胜利，大摆党内一小撮走资本主义道路当权派的罪恶事实。大家进一步认识到，通过这场两个阶级、两条路线的斗争，毛主席的无产阶级革命路线必将更加深入人心，为广大革命群众所掌握。我们的党一定会更加纯洁、更加巩固，我们的社会主义事业一定会更加兴旺起来。"},{"type":"paragraph","text":"二连通过两条路线斗争的教育，干部战士进一步加深了对毛主席和以毛主席为代表的无产阶级革命路线的深厚阶级感情，大大增强了活学活用毛主席著作的自觉性。大家表示，一定要结合两条路线斗争，活学活用毛主席著作，用毛泽东思想武装自己的头脑，增强阶级斗争观念，任何时候都要坚定地站在以毛主席为代表的无产阶级革命路线一边。一九六○年入伍的班长杨朋令说：毛主席号召我们要关心国家大事。当前无产阶级革命派大联合，向党内一小撮走资本主义道路当权派展开夺权的斗争，这是关系到保证我国千秋万代不变颜色的头等重要的大事情。我一定要坚决执行毛主席关于人民解放军应该积极支持左派广大群众的伟大战斗号令，坚守战斗岗位，坚决支持无产阶级革命派把夺权斗争进行到底。"},{"type":"paragraph","text":"（报道组）"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bb5065c06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
