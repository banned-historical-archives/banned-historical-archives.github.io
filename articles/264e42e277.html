tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想帮助我战胜了疾病","authors":["学习毛主席著作积极分子拉西（蒙古族）"],"parts":[{"type":"paragraph","text":"我学习了林彪同志关于把活学活用毛主席著作的群众运动推向新阶段的指示，联想到自己的经历，心情十分激动。"},{"type":"paragraph","text":"九年前我得了一种病，经国内外专家多次会诊，都认为没有治愈的希望，有的说我最多还能活二年。开始，我很悲观。党组织及时给我送来了金光闪闪的《毛泽东选集》，嘱咐我从毛主席著作中寻找解决思想问题的钥匙。当天晚上，我反复读着《纪念白求恩》，由此联想了许多问题：白求恩是一个外国人，为了中国革命，把生死置之度外，以至献出了自己宝贵的生命。我是中国共产党党员，是党和毛主席把我从牧主的皮鞭下救出来的，为了革命的需要，个人的生命又有什么可惜呢？接着，我又学习了《为人民服务》和《愚公移山》，进一步树立了无产阶级的生死观。我再也不感到死的可怕了，反而充满了战胜病魔的信心和勇气，决心活一天就要为党拚命工作一天。后来病情有些恶化，领导上几次劝我去疗养，我想到党和国家的需要，觉得绝不能放下工作而去疗养。我没有离开工作岗位，而且浑身是劲地把一项工作坚持完成，取得了一定的成绩。后来，同志们把我评为先进工作者。"},{"type":"paragraph","text":"九年了，我不但没有死，而且坚持工作，活得很好，身体情况也逐渐有所好转。是什么力量延长了我的生命？是伟大的毛泽东思想！今后我一定要响应林彪同志的号召，更好地读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"264e42e277"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
