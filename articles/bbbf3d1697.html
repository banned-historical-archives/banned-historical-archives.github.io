<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"就英舰侵入我国领海事  叶剑英将军发表声明","authors":[],"dates":[{"year":1950,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"就英舰侵入我国领海事"},{"type":"paragraph","text":"叶剑英将军发表声明"},{"type":"paragraph","text":"香港英方海陆空军的越境挑衅行为所引起的后果，  应由香港英方当局负担完全责任。"},{"type":"paragraph","text":"【新华社广州二十四日电】广东省人民政府主席兼中国人民解放军广东军区司令员叶剑英将军本日就英舰侵入我国领海事发表声明，全文如下："},{"type":"paragraph","text":"兹接获我国海防部队报告：“八月十七日晨有英舰一艘，来自万山群岛之佳逢岛方面，经我外伶仃担捍岛间海峡突侵入我之领海范围。我岛上人民解放军防卫部队当即发出警告。讵该英舰竟向我军发炮二十余发，弹片直落入我驻守防地。该舰并于驶返港境后，又连续发炮二发向我军轰击。”本人接获关于英舰此种侵犯我国领海事件之报告，已不止一次。英舰的此种挑衅行为，和它的帝国主义对外政策，是分不开的；和港方的空军与陆军对我国的挑衅行为是互相配合的。"},{"type":"paragraph","text":"在此事以前，在八月二日晨八时三十分，曾有英机四架侵入我国垃圾岛上空侦察，盘旋一周，向东南飞去。自八月二日至六日，一连数天英机不断侵入我国万山群岛领空侦察，每次均有二架至四架之多。"},{"type":"paragraph","text":"较此更早，在七月六日上午十时，英空军喷火式飞机一架，即曾侵入我国深圳上空数英里，盘旋十五分钟之久，始向西逸去。七月二十七日上午十时，竟有全副武装之英军五名，带来福枪四枝，轻机枪一挺，弹药数百发，并带指南针双筒望远镜，及沙头角军用地图等，由港警署派警察一名，送至沙头角边界。该五名英军，即深入我边界二华里，远至元墩河河边，为我发觉，令写悔过书后，押送出境。"},{"type":"paragraph","text":"依上所述情况，这一连串事件均系香港英方的军舰、飞机、及英军越界侵犯我中华人民共和国领土领海领空的非法行为。香港英方当局，并在上述事件发生后，曾屡次将事件之真相掩饰成为“偶然”或“纯地方性事件”，甚至歪曲事实，污蔑我方。"},{"type":"paragraph","text":"但是，事实是不容抵赖的。所有上述这些事件，都毫无例外地发生于广东省边界及广东所属一切岛屿的领土领海和领空上。仅此一点，已足构成香港英方有意越境侵犯的行为。"},{"type":"paragraph","text":"以上各种一再发生的事实，完全证明了香港英国当局这种一系列的越境挑衅行为，显然属于一种有计划地侵犯我国主权的行为。因此，我现就此事郑重声明：所有上述因香港英方海陆空军的越境挑衅行为所引起的一切后果，应由香港英方当局负担完全责任。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbbf3d1697"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
