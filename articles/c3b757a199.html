art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”给浙江教育战线造成严重恶果","authors":[],"parts":[{"type":"paragraph","text":"据新华社杭州一九七七年十一月三十日电 浙江省许多教育工作者，最近在各种座谈会、批判会上，义愤填膺地揭批了“四人帮”炮制“两个估计”、摧残浙江省教育事业的罪行。"},{"type":"paragraph","text":"浙江省是我国文化教育事业比较发达的省份之一，是我国文化革命的主将鲁迅的故乡。解放以后，在毛主席革命路线的指引下，全省教育事业有了很大发展。一九六五年与一九四九年相比，全省大学增长二点二倍，在校大学生增长四点三倍；中等专业学校学生增长六点七倍；普通中学学生增长四点四倍；小学学生增长四点五倍。文化大革命前十七年，全省高等和中等专业学校共向各条战线输送了十三万五千多名建设人才，许多人现在已经成为各条战线的骨干力量。但是，近几年来，浙江教育事业前进的步伐却变慢了，学校教育质量也明显下降。为什么素称“文化之乡”的浙江省，近几年来教育事业反而落在全国后面？广大教育工作者指出，这是“四人帮”干扰破坏造成的严重恶果。“四人帮”挥舞“两个估计”的大棒，毁我教育，乱我学校，害我师生，罪恶累累，罄竹难书。"},{"type":"paragraph","text":"许多教育工作者在批判中指出，“四人帮”及其爪牙利用“两个估计”破坏党的教育事业，手段是极其卑劣的。他们利用“两个估计”，胡说文化大革命前十七年“叛徒、特务、走资派，把持了教育部门的领导权”，全盘否定党对教育事业的领导，在他们重新组建的省教育局里，原处长以上干部没有留下一个。有一个县，文化大革命前的学校领导干部被免职了一百八十六人，占百分之四十三。“四人帮”一伙在打击一大批坚持毛主席革命路线的领导干部的同时，却把一些地富反坏，流氓阿飞、打砸抢者塞进教育战线的领导岗位，大修“突击入党”、“突击提干”。早在“两个估计”出笼前的一九六八年，叛徒江青就专程把在浙江的一个亲信接到北京，面授机宜，要他“树立队伍”。这个亲信如获至宝，拚命投机钻营，于一九七四年篡夺了浙江省教育革命领导小组的大权，并把由他兼任党委书记的一个学院搞成“双突”的样板。新生反革命分子翁森鹤也一手控制了省工宣队办公室。这种局面直到一九七五年七月才结束。广大教育工作者一针见血地指出：“四人帮”抛出“两个估计”，就是要否定一切，打倒一切，就是要你下台，他上台，把教育战线作为他们向党进攻的阵地。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3b757a199"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
