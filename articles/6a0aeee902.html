ar":1957,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京3日电】　在布歇——莫努里政府9月30日倒台以后，法国总统戈蒂连日在进行关于继任人的谈判。1日晚间，戈蒂接见了国民议会共产党议会党团主席雅克·杜克洛和社会党议会党团领导人戴克松。杜克洛同总统会谈以后对记者说，他把共产党对阿尔及利亚问题上的立场告诉了总统。"},{"type":"paragraph","text":"巴黎各报在关于法国政治形势的评论中预言政府危机将会持续下去。报纸强调指出，各资产阶级政党内部混乱不堪，新政府成立后立刻就会碰到以下一系列复杂的问题:阿尔及利亚的战争、经济问题、财政问题和社会问题。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a0aeee902"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
