批语","authors":[],"dates":[{"year":1955,"month":8,"day":31}],"is_range_date":false,"parts":[{"text":"对中央转发安徽省委关于农业合作化的报告的批语","type":"title"},{"text":"一","type":"subtitle"},{"text":"上海局、各省市委、自治区党委：","type":"appellation"},{"text":"现将安徽省委一九五五年八月二十一日关于农业合作化的报告一件，发给你们参考。中央认为安徽省委的方针是正确的。安徽省委尖锐地批判了在农业合作化问题上的右倾机会主义思想，这种批判是完全必要的。安徽省委还在十个具体问题上提出了自己的意见。中央认为安徽可以按照这些意见去做，在做的中间再考验这些意见的正确性，如有某些需要修改的地方，那时可以进行修改。中央认为这十条意见应当提到全国各省市各自治区，在适当的会议上，加以讨论，征求意见，并于今年国庆节以前报告中央。","type":"paragraph"},{"text":" 中央一九五五年八月三十一日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"周、陈阅后，即送刘、朱、陈、彭真、小平、子恢阅，尚昆用电报即速发去。另抄在京各中委、各副秘书长，农村工作部、农业部党组。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffbbce47c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
