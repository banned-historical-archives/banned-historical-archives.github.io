ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于请彭真等来庐山参加会议给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"关于请彭真等来庐山参加会议"},{"type":"paragraph","text":"给刘少奇等的信"},{"type":"paragraph","text":"（1959年7月16日）少奇、恩来、尚昆："},{"type":"paragraph","text":"在北京的人，例如彭真、陈毅、黄克诚、安子文”，若干部长，三委“若干副主任，（不要太多，十人左右即可。）是否可以请他们来此参加最后一星期的会议？主持北京的工作，则由此间调动几位同志回去，或以在京二把手顶住几天。以上请酌。又陈云病情如何，是否有可能请他来此参加七天会，请征询陈云意见，能来则来，不能则不要来。此点亦请酌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十六日上午七时[1]彭真，当时任中共中央政治局委员、中央书记处书记。[2]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"},{"type":"paragraph","text":"[3]陈毅，当时任中共中央政治局委员、国务院副总理兼外交部部长。黄克诚，当时任中共中央书记处书记、中央军委秘书长、中国人民解放军总参谋长。安子文，当时任中共中央委员、中央组织部部长。"},{"type":"paragraph","text":"[4]指国家经济委员会、国家计划委员会和国家基本建设委员会。[5]陈云，当时任中共中央副主席、国务院副总理，正因病休养。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":190,"page_end":190},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68e128d938"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
