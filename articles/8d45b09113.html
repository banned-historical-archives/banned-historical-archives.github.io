tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英王树声向仲华余湛会见秘鲁陆军军事代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年十月二十一日讯 军委副主席叶剑英，国防部副部长王树声，中国人民解放军副总参谋长向仲华，外交部副部长余湛，今天晚上会见了秘鲁陆军参谋长埃德加多·梅尔卡多·哈林中将和夫人，以及由梅尔卡多中将率领的秘鲁陆军军事代表团全体成员，同他们进行了友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团成员有：豪尔赫·巴兰迪亚兰·帕加多尔少将和夫人，奥斯卡·莫利纳·帕略恰少将和夫人，丹尼尔·梅萨·夸德拉少校。"},{"type":"paragraph","text":"秘鲁驻中国大使巴尔德斯和夫人，以及大使馆外交官员会见时在座。"},{"type":"paragraph","text":"会见时在座的还有，中国人民解放军总政治部副主任田维新、总后勤部副部长张贤约，有关方面负责人和工作人员杜义德、邝任农、柴成文、周荣国、尹佐珍、于乔、邵恒章等。"},{"type":"paragraph","text":"叶剑英、王树声、向仲华、余湛会见秘鲁陆军军事代表团时合影。 新华社记者摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王树声","type":"人物"},{"name":"向仲华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d45b09113"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
