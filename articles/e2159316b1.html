" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共通俗读物出版社总支委员会关于开除右派分子蓝钰党籍的决定","authors":["(蓝钰)"],"dates":[{"year":1958,"month":2,"day":5}],"is_range_date":false,"parts":[{"text":"中共通俗读物出版社总支委员会关于开除右派分子蓝钰党籍的决定","type":"title"},{"text":"(蓝钰)","type":"authors"},{"text":"蓝钰，男，三十九岁，家庭出身城市贫民，本人成份学生。一九三八年参加工作，同年入党，现任通俗读物出版社副总编辑。","type":"paragraph"},{"text":"蓝钰在整风鸣放期间，趁着党整风的机会，和社会上的右派分子一起，向党进行了恶毒的攻击。其主要反党罪行是：","type":"paragraph"},{"text":"一、在人民日报和文化部召开的座谈会上，对党的出版事业进行了全面的攻击，并提出了一个比较完整的资本主义出版工作纲领。他还向一些地方出版社的领导人进行游说、煽动，企图迫使文化部接受他的反动主张，并利用别人在报刊上发表文章，宣传他的反动观点。","type":"paragraph"},{"text":"二、包庇、鼓励和支持“时事手册”的右派小集团向党进攻。","type":"paragraph"},{"text":"三、宣扬修正主义的观点，提倡极端民主，毫无批判地在社内介绍右派分子林希翎的谬论，提倡没有政治界线的“独立思考”。","type":"paragraph"},{"text":"以上主要反党罪行表明，蓝钰是一个资产阶级右派分子，为了纯洁党的队伍，经总支全体党员大会通过，决定开除其党籍，行政上撤职、降级。","type":"paragraph"},{"text":" 原载《关于清除党内右派分子的决定汇编(四)》，中共中央监察委员会办公厅编，一九五九年十二月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2159316b1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
