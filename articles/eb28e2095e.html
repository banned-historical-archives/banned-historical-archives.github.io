],"dates":[{"year":1947,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北平十四日专电】　军调部明日即算正式结束了，全体职员一律遣散，三方面将发表联合公告，叶剑英定十七日离平，行前决发表年来调处感想，蔡文治亦拟就小册一本，向政府报告年来经过，又:明日有飞机十三架，分别遣送政府及共方人员。据悉:共方已仅余卅余人，美方因人数众多，将延期至四月七日撤完。　(木)"},{"type":"paragraph","text":"【合众社北平十四日电】　北平军调总部实行遣散后，第一批政府代表计十七人，业于十四日晨分乘美军运输机二架返京。此十七人皆系政府宪兵，曾协助美国与中共守卫军调总部。"},{"type":"paragraph","text":"共方代表亦续在撤退中，美机三架，亦于今日载中共代表廿九人携带行李与配备等物飞返哈尔滨。"},{"type":"paragraph","text":"大部份美方代表，将于三月一日与三月七日自青岛与塘沽分乘“波尼伏莱斯”号与“勃斯塔将军”号离华回国，尚有二百余人，则定于四月四日乘“韦格尔将军”号离华，至此，美方代表撤退工作即告完毕。"},{"type":"paragraph","text":"共方代表叶剑英将军，今日通知告伦将军称:共方一切事务可于二月十五日宣告结束。此后共方许子清少将(译音)，仍留平为连络官，直至三月五日前，共方事务结束后，再行乘飞机撤退。"}],"comments":[],"origin":"本报,合众社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb28e2095e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
