art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"迅速广泛地传播毛泽东思想滕县军民联合组织毛泽东思想宣传队深入农村，就地了解情况，就地进行宣传，就地支援生产","authors":["王希悦/时而思/齐卫东"],"parts":[{"type":"paragraph","text":"本报讯 山东滕县驻军某部干部战士和地方革命群众组织、革命干部，组成联合的毛泽东思想宣传队，深入宣传毛主席“抓革命，促生产”的伟大方针，有力地促进了革命和生产。"},{"type":"paragraph","text":"抓革命、促生产，威力最大的武器是毛泽东思想！在春耕大忙季节，怎样使农村广大贫下中农最迅速、最及时地听到毛主席的声音，更好地学习和掌握毛泽东思想呢？滕县驻军某部领导机关认为，光靠部队同志组织宣传队下乡宣传，还满足不了群众的要求。他们按照毛主席相信群众，依靠群众，让群众自己教育自己的教导，抽出干部战士深入农村，分点分片地和当地革命群众组织、革命干部密切联系，广泛协商，组成联合的毛泽东思想宣传队，就地了解情况，就地进行宣传，就地帮助群众搞好春耕生产。按着这种办法，全县很快组成了一批联合的毛泽东思想宣传队，广泛开展宣传活动，使毛主席“抓革命，促生产”的伟大方针家喻户晓，并且帮助群众用毛泽东思想回答和解决了许多现实问题。"},{"type":"paragraph","text":"经过两个多月的实践，证明这种联合的毛泽东思想宣传队，很适应农村文化大革命的要求，促进了革命群众组织、革命干部和部队更加紧密地结合在一起，集中力量抓好革命，猛促春耕。在共同抓革命、促生产的过程中，也进一步促进了革命群众和革命干部的互相了解，有利于建立和健全各级生产领导班子，加强春耕生产的领导。这种联合的毛泽东思想宣传队，还能调动各方面的力量，形成群众性的用毛泽东思想指导春耕生产的热潮。这种宣传队的形式，也有利于部队干部战士向地方革命群众、革命干部学习，进一步密切军队和地方的关系。目前，这个县的联合的毛泽东思想宣传队已经遍布全县每个角落，在生产大队广泛宣传毛泽东思想，对推动抓革命、促生产，起了很好的作用。"},{"type":"paragraph","text":"不久前，滕县驻军某部总结了第一批联合的毛泽东思想宣传队的经验，并根据群众的要求，加强了力量。部队的同志们决心和全县贫下中农、革命群众、革命干部一起，进一步深入宣传毛泽东思想，更好地贯彻毛主席“抓革命，促生产”的伟大方针，夺取革命、生产双胜利。"},{"type":"paragraph","text":"（王希悦、时而思、齐卫东）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22a839be39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
