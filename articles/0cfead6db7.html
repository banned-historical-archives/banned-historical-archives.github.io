ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"给郭梓材、刘天民的信","alias":"","parts":[{"type":"paragraph","text":"给郭梓材、刘天民\"的信"},{"type":"paragraph","text":"（1954年10月29日）梓材、天民二兄："},{"type":"paragraph","text":"十月十五日来信收到。"},{"type":"paragraph","text":"寄上人民币叁百万元，为补助日用之费。嗣后有困难，尚可设法帮助。不要来京，以省往返之劳。此候双安"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年十月廿九日"},{"type":"paragraph","text":"[1]郭梓材，幼年曾与毛泽东在井湾子私垫读书，又一起在长沙参加新军，解放后曾在湘潭建中猪厂任会计。刘天民，郭梓材的妻子，大革命时期曾在毛泽东、杨开慧的影响下参加革命工作，解放后长期从事小学教育工作，曾任湘潭市政协委员。"},{"type":"paragraph","text":"[2]这里是以当时流通的人民币计算的。按中国人民银行1955年3月1日起发行的新人民币折算，合300元（新币1元等于旧币1万元）。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":332,"page_end":332},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cfead6db7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
