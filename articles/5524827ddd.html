script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度等国民族资产阶级反对美国操纵市场","authors":[],"dates":[{"year":1953,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度等国民族资产阶级反对美国操纵市场"},{"type":"paragraph","text":"【新华社十八日讯】塔斯社德里讯：东南亚国家的民族资产阶级越来越坚决地反对美国操纵资本主义世界市场，并要求他们的政府扩大与苏联和人民民主国家的贸易与事务关系。"},{"type":"paragraph","text":"印度商业界的喉舌“印度财政”要求立即废除所谓日内瓦关税贸易总协定，这个协定是美国垄断资本的工具。"},{"type":"paragraph","text":"这个刊物指出，不仅印度，而且其他国家也对日内瓦关税贸易总协定越来越感到不满。"},{"type":"paragraph","text":"据巴基斯坦杂志“喀喇蚩商业周刊”说，与苏联以及人民民主国家进行贸易，是那些遭受很大的经济困难的亚洲国家的唯一出路。这个刊物说，那些在经济上仍直接受西方殖民国家控制的亚洲国家特别要求这样做。"},{"type":"paragraph","text":"这个周刊说，由于只和西方国家进行贸易的结果，亚洲国家的经济情况越来越恶化，出口不断减少，工业企业都在减少生产。这个周刊最后说：因此，落后的亚洲国家特别希望发展对苏联以及人民民主国家的自由和不受限制的贸易。"},{"type":"paragraph","text":"【新华社十八日讯】据塔斯社德里讯：一心要想挤垮英国资本的美国垄断资本在印度日益猖狂的活动，使得两国之间的矛盾更加尖锐化。据孟加拉报纸报道，不久以前，英国资本在印度钢铁公司还保有独一无二的支配地位。但是，目前美国已经通过它所控制的国际复兴开发银行把英国资本挤出这家公司。为了借取一亿二千六百万卢比的贷款，这家公司已把它全部的不动产，包括在邦帕尔的钢厂和它的煤、云母、铁砂、铜以及其他战略原料，都抵押给国际复兴开发银行作为交换条件。此外，这家公司每年要付七百二十万卢比给国际复兴开发银行作为利息。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5524827ddd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
