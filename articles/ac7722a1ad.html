ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"关于宪政问题","alias":"","parts":[{"type":"paragraph","text":"关于宪政问题"},{"type":"paragraph","text":"（1944年3月1日）各中央局、中央分局，并转各区党委："},{"type":"paragraph","text":"关于宪政问题：（一）在国际国内形势逼迫及舆论要求下，国民党不得不于十一中全会\"允许于抗战结束后一年内实行宪政，并允许各地在其种种限制下讨论宪政问题。虽其目的在于欺骗人民，借以拖延时日，稳固国民党的统治，但是只要允许人民讨论，就有可能逐渐冲破国民党的限制，使民主运动推进一步。（二）中央决定我党参加此种宪政运动，以期吸引一切可能的民主分子于自己周围，达到战胜日寇与建立民主国家之目的。（三）除我党代表已参加重庆方面国民党召集的宪政协进会会议外，延安亦已举行宪政座谈会。各根据地亦可于适当时机举行有多数党外人士参加的座谈会，借以团结这些党外人士于真正民主主义的目标之下。并向党内干部说明党对宪政运动的政策，防止过左过右的偏向，检查“三三制”执行情形，力求巩固与非党人士的民主合作。"},{"type":"paragraph","text":"中央政治局三月一日"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":3,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":329,"page_end":329},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"关于宪政问题","description":"根据毛泽东手稿刊印。","dates":[{"year":1944,"month":3,"day":1}],"parts":[{"text":"关于宪政问题","type":"title"},{"type":"paragraph","text":"各中央局、中央分局并转各区党委："},{"type":"paragraph","text":"关于宪政问题：（一）在国际国内形势逼迫及舆论要求下，国民党不得不于十一中全会允许于抗战结束后一年内实行宪政，并允许各地在其种种限制下讨论宪政问题。虽其目的在于欺骗人民，借以拖延时日，稳固国民党的统治，但是只要允许人民讨论，就有可能逐渐冲破国民党的限制，使民主运动推进一步。（二）中央决定我党参加此种宪政运动，以期吸引一切可能的民主分子于自己周围，达到战胜日寇与建立民主国家之目的。（三）除我党代表已参加重庆方面国民党召集的宪政协进会会议外，延安亦已举行宪政座谈会。各根据地亦可于适当时机举行有多数党外人士参加的座谈会，借以团结这些党外人士于真正民主主义的目标之下。并向党内干部说明党对宪政运动的政策，防止过左过右的偏向，检查“三三制”执行情形，力求巩固与非党人士的民主合作。"},{"type":"paragraph","text":"中央政治局"},{"type":"paragraph","text":"三月一日"}],"comment_pivots":[{"part_idx":2,"offset":38,"index":1},{"part_idx":2,"offset":317,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["指一九四三年九月六日至十三日召开的国民党五届十一中全会。","“三三制”，见本卷第25页注〔8〕。"],"page_start":101,"page_end":101,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","na
