art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"民主德国军事代表团离京回国毛主席接见了代表团全体人员彭德怀元帅为他们设宴饯行","authors":[],"parts":[{"type":"paragraph","text":"本报讯 以德意志民主共和国副总理兼国防部长维利·斯多夫上将为首的德意志民主共和国军事代表团，3日由北京乘专机回国。"},{"type":"paragraph","text":"斯多夫上将在临别时讲话说：我们谨向中国人民解放军的同志致以敬意。我们将把你们给我们的许多深刻印象带回到我们的祖国，带回到伟大的社会主义阵营的西线。我们将把你们高度的训练水平和对社会主义事业的坚定的政治信念，告诉给我们的士兵和军官。"},{"type":"paragraph","text":"彭德怀元帅祝代表团一路平安。他对斯多夫上将说：请你把中国人民和军队的无限关怀和敬意，带给德意志民主共和国的人民和军队。让我们的战斗友谊万古长青。"},{"type":"paragraph","text":"德意志民主共和国军事代表团在我国曾访问了沈阳、旅大、南京、上海、杭州、广州等城市和该地驻军。他们在返京途中，还在武汉参观了长江大桥，并为长江大桥题词留念。"},{"type":"paragraph","text":"又讯 2日晚上，毛泽东主席接见了德意志民主共和国军事代表团全体人员。毛主席同客人们进行了一小时的谈话。他请客人们转达他向皮克总统和乌布利希同志的问候，并祝德意志民主共和国一切都好。在接见的时候，代表团向毛主席赠送了礼品。"},{"type":"paragraph","text":"又讯 国务院副总理兼国防部长彭德怀元帅，在2日举行宴会，为代表团饯行。彭德怀元帅在宴会上说：你们这次访问，进一步加深了我们两国人民和军队之间的互相了解。中国人民现在是、将来也永远是德国人民的忠实的朋友，德国人民在争取和平统一自己祖国的斗争中，毫无疑问地可以得到中国人民的全力支持。斯多夫上将在讲话中说：我们跟中国人民解放军陆、海、空军部队的战友们，在真挚而深刻的相互信任的基础上交流了经验；我们双方对巩固和平以及保卫社会主义建设的斗争取得了完全一致的看法。最后，他对中国同志给予的盛情招待表示感谢。"},{"type":"paragraph","text":"彭德怀元帅在机场上和斯多夫上将握手告别。 本报记者 郝建国摄"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"422b88af5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
