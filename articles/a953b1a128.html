hubusercontent.com/banned-historical-archives/banned-historical-archives2/main/7f1148c2-92d9-4fcf-987d-99f144e1a069.pdf"],"article":{"title":"七律·七一抒情","alias":"","parts":[{"type":"paragraph","text":"生查子"},{"type":"paragraph","text":"家书[四首]"},{"type":"paragraph","text":"屈指渐成人，"},{"type":"paragraph","text":"家书苣万金，四海皆昆仲。养育亦多情，形影常来梦。文武须双重。何事最关心：是否勤劳动？"},{"type":"paragraph","text":"其"},{"type":"paragraph","text":"1"},{"type":"paragraph","text":"青春只一回，"},{"type":"paragraph","text":"斗夺如海洋，早晚云霞涌。流水片时停，毒菌争传种。转眼能抛送。百炼化为钢，只有投群众。"},{"type":"paragraph","text":"其"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"如此墩和婚，"},{"type":"paragraph","text":"牡丹富贵王，弹指凋尘土。岂是少扶持？不耐风和雨。何足名花数？稻麦不争芳，粒粒酬辛苦。"},{"type":"paragraph","text":"其"},{"type":"paragraph","text":"四"},{"type":"paragraph","text":"顺水好行船，"},{"type":"paragraph","text":"纵观天地间，陵谷多奇趣。东海有长鲸，常与波涛伍。向下游去。若要凳英雄，先到艰难处。"},{"type":"paragraph","text":"律"},{"type":"paragraph","text":"[四首]"},{"type":"paragraph","text":"七一抒情"},{"type":"paragraph","text":"千年不遇我逢辰。如此江山如此人，"},{"type":"paragraph","text":"写就雷霆不朽文。挥将日月长明笔，"},{"type":"paragraph","text":"笑荆棘等浮云。指顾崎幅成坦道，"},{"type":"paragraph","text":"万目环球看大军。族旗猎猎春风暖，其"},{"type":"paragraph","text":"n"},{"type":"paragraph","text":"儿分儿合到注洋。滚滚江流万里长，"},{"type":"paragraph","text":"中道常迎九曲。源头尽望千堆雪，"},{"type":"paragraph","text":"奔雷动地享潮狂。激源冲天春汛怒，层懿叠峰今安在？"},{"type":"paragraph","text":"一入塘溟喜浩茫。其"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"四季风光任不同。历经春夏共秋冬，勤逐炎凉看黄鸟，"},{"type":"paragraph","text":"独欺冰雪挺套松。寒虫向壁寻残梦，"},{"type":"paragraph","text":"勇士乘风薄太空。"},{"type":"paragraph","text":"早彩笔作长虹。天外莫愁迷道路，"},{"type":"paragraph","text":"其"},{"type":"paragraph","text":"9"},{"type":"paragraph","text":"家突狼奔猎者？六洲环顾满疮瘦，"},{"type":"paragraph","text":"头不向寇优低。肝胆誓分兄弟难，"},{"type":"paragraph","text":"胜利从来等作旗。自由合酒血成碧，"},{"type":"paragraph","text":"欣荣试看比基尼。休向英雄夸核弹，"},{"type":"paragraph","text":"律"},{"type":"paragraph","text":"西藏自治区成立"},{"type":"paragraph","text":"千斤勘镇化尘埃。百万农奴站起来，"},{"type":"paragraph","text":"大道今从东土开。弥陀空诗西天愿，"},{"type":"paragraph","text":"他年雪岭起楼台。此日金珠歌髋亩①，"},{"type":"paragraph","text":"立马高原聘壮怀。"},{"type":"paragraph","text":"人民城郭朝朝异，"},{"type":"paragraph","text":"金珠，巅语解放。11"}],"authors":["胡乔木"],"dates":[{"year":1965,"month":7,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":42,"page_end":43},"tags":[{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a953b1a128"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
