1954,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜民主主义人民共和国最高人民会议常任委员会委员长金枓奉同志:"},{"type":"paragraph","text":"朝鲜民主主义人民共和国内阁首相金日成同志:"},{"type":"paragraph","text":"朝鲜民主主义人民共和国外务相南日同志:"},{"type":"paragraph","text":"值此中朝经济及文化合作协定签订一周年之际，谨向朝鲜人民，朝鲜民主主义人民共和国政府和你们表示热烈的祝贺。"},{"type":"paragraph","text":"这一协定的签订和实施使中朝两国人民在并肩抗击美国侵略者的战争中所结成的战斗友谊获得了进一步的巩固和发展。中国人民以钦佩和欢欣的心情祝贺朝鲜人民在执行恢复与发展国民经济的三年计划中所获得的辉煌成就。"},{"type":"paragraph","text":"朝鲜人民和朝鲜民主主义人民共和国政府为争取朝鲜的和平统一所作的不懈斗争，一向为中国人民和中国政府深切关怀和同情。"},{"type":"paragraph","text":"朝鲜问题必须在尊重朝鲜人民的民族权利和有利于保障亚洲和世界和平的原则下获得解决。中国人民将继续全力支持朝鲜人民这一正义事业，直到最后的胜利。"},{"type":"paragraph","text":"中朝两国人民兄弟般的和日益巩固的友谊万岁!"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理兼外交部长　周恩来"},{"type":"paragraph","text":"一九五四年十一月二十二日于北京"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf02394299"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
