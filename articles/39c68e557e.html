script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"强烈抗议及动当局无理逮捕工人　反对垄断资产阶级残酷剥削意大利米兰市十万工人示威","authors":[],"dates":[{"year":1969,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五日电　罗马消息:意大利十万冶金和机器制造工人四日在米兰市举行了声势浩大的示威游行，强烈抗议反动当局无理逮捕罢工工人，反对垄断资产阶级的残酷剥削。一万五千租米兰市的大、中学生参加了这次示威游行，支持工人的正义斗争。"},{"type":"paragraph","text":"工人们高举着要求释放被捕工人，谴责警察暴行和要求增加工资的标语牌，学生们高唱《国际歌》、高呼谴责政府的口号，他们肩并着肩，冒着严寒和风雪，在米兰闹市区、法庭和市政府前愤怒地举行示威，把米兰市反动当局吓得胆战心惊，急急忙忙出动大批警察看守当地的政府机构。游行从上午十时开始，一直继续到下午一时，米兰市中心的交通完全陷于瘫痪。"},{"type":"paragraph","text":"随着意大利产业工人斗争的蓬勃发展，罢工斗争的浪潮目前正向中央和地方政府机关和其他部门扩展。意大利各省、市政府机关雇用的五十万工人和公务员从三日开始举行三天全国大罢工。意大利政府的财政、预算、税务和海关等机构的职工连日来也举行了轮番罢工。"},{"type":"paragraph","text":"意大利的中学教师，也在一日至三日举行了全国性的罢教，使全国大多数中学被迫停课。"},{"type":"paragraph","text":"与此同时，意大利十一万银行职工在四日举行四十八小时全国罢工。在首都罗马，两千名罢工的银行雇员还在市中心举行了示威。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39c68e557e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
