ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"中央转发华北局关于改造绥远起义部队的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发华北局关于改造绥远起义部队的报告的批语"},{"type":"paragraph","text":"（1950年9月12日）西北局及军区党委，西南局及军区党委，中南局及军区党委，华东局及军区党委："},{"type":"paragraph","text":"关于改造绥远傅部及绥远地方的工作总结，华北局的意见是正确的，发给你们做参考。你们所属起义部队的改造工作全般情况如何，望加以总结，向我们做一次专题报告。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"九月十二日"},{"type":"paragraph","text":"[1]指原隶属傅作义的董其武部。该部1949年9月在绥远宣布起义，后改编为中国人民解放军第二十三兵团。"},{"type":"paragraph","text":"[2]指中共中央华北局1950年9月10日关于绥远工作近况和存在的问题给毛泽东并中央的综合报告。报告中说，由于坚持执行对起义部队团结改造的方针，8个月来绥远在改造起义部队和地方工作方面都取得了一定的成绩，对存在的问题准备采取以下措施：（一）除继续做好团结改造上层的工作外，要加强群众工作，给群众做出几件善政来；（二）在起义部队中采取有效办法加强政治工作，逐步树立党对部队的领导，达到改造和巩固部队的目的；（三）继续剿匪肃特，镇压反革命，安定社会秩序；（四）在整党整干中克服一些同志在改造起义部队问题上存在的“左”倾情绪和畏惧困难、失却信心的思想偏向。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":9,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":153,"page_end":153},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发华北局关于改造绥远起义部队的报告的批语","authors":["毛泽东"],"dates":[{"year":1950,"month":9,"day":12}],"is_range_date":false,"parts":[{"text":"中央转发华北局关于改造绥远起义部队的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"西北局及军区党委，西南局及军区党委，中南局及军区党委，华东局及军区党委：","type":"appellation"},{"text":"关于改造绥远傅部及绥远地方的工作总结，华北局的意见是正确的，发给你们做参考。你们所属起义部队的改造工作全般情况如何，望加以总结，向我们做一次专题报告。","type":"paragraph"},{"text":" 中央九月十二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bd64a9e6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
