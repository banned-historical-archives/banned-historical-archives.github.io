art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"葵花向阳开，苗家心向毛主席","authors":["铁道兵学习毛主席著作积极分子代表大会代表/苗族战士陈启辉"],"parts":[{"type":"paragraph","text":"葵花朵朵向阳开，苗家心向毛主席。我见到了各族人民日日想、夜夜盼的最伟大的救星、我们心中最红最红的红太阳毛主席。"},{"type":"paragraph","text":"吃过黄连的人，最知蜂蜜甜。在那吃人的旧社会，地主头人霸天下，苗家穷人当牛马。毛主席啊，毛主席！是您老人家救我们出了火坑，领导我们走上了社会主义的光明大道。苗族人民天天唱山歌：“棉暖不如皮，糖甜不如蜜，爹娘恩情重，比不上毛主席。”我们驻地彝族同胞听说我要到您老人家身旁来开会，全村的男女老少都聚集在松明子前开会，决定绣一幅锦旗献给您。全村九十多个人都穿针引线，彻夜不眠在锦旗上绣上了各族人民的共同心愿：“祝愿毛主席万寿无疆！”九个金光闪闪的大字。临走的时候，他们再三叮嘱，要我替彝家多喊几声“毛主席万岁！”"},{"type":"paragraph","text":"毛主席啊，毛主席！我参军时虽然是个文盲，在部队里我一边学习毛主席著作，一边学文化，行军路上，劳动当中，我都时刻不停地默念您老人家的教导，我还采用绘图、作标记、查字典的方法，把您老人家的话一字一句地印在脑子里。特别是认真学习了您老人家在无产阶级文化大革命中的最新指示，在“用”字上狠下功夫。"},{"type":"paragraph","text":"毛主席啊，毛主席！我要永远读您的书，听您的话，照您的指示办事。海可枯，石可烂，紧跟您老人家革命到底的红心永不变！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49234ece71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
