ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"励志联叫","alias":"","parts":[{"type":"paragraph","text":"励志联1]（1938年）失败者成功之母，"},{"type":"paragraph","text":"困难者胜利之基！"},{"type":"paragraph","text":"[1]1937年10月25日，毛泽东和英国记者贝特兰谈话。当贝特兰问“如何克服投降主义”时，毛泽东说：“言论上指出投降主义的危险，行动上组织人民群众制止投降运动。投降主义根源于民族失败主义，即民族悲观主义，这种悲观主义认为中国打了败仗之后再也无力抗日。不知失败正是成功之母，从失败经验中取得了教训，即是将来胜利的基础。悲观主义只看见抗战中的失败，不看见抗战中的成绩，尤其不看见失败中已经包含了胜利的因素，我们应当向人民指出战争的胜利前途，使他们明白失败和困难的暂时性，只要百折不回地奋斗下去，最后胜利必属于我们。”这副对联就是对这一段话的精神的高度概括，为鼓舞全国军民夺取抗战胜利而作。朱败世成功母，困班比利芒!毛泽东题写的励志联。"}],"authors":["毛泽东"],"dates":[{"year":1938}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":105,"page_end":106},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15eab17ae2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
