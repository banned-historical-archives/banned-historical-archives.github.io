ear":1993,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京12月7日电　中共中央总书记、国家主席江泽民为今天开幕的外交部毛泽东外交思想研讨会发来贺词。贺词全文如下:其琛同志并转外交部毛泽东外交思想研讨会。"},{"type":"paragraph","text":"欣悉外交部在毛泽东诞辰一百周年之际，举办毛泽东外交思想研讨会，旨在学习、继承和发扬毛泽东外交思想，进一步作好新时期的外交工作，为加快我国的四化建设争取一个有利的国际环境。我认为这是具有深远和现实意义的事情，衷心祝愿研讨会圆满成功。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58c56e3e1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
