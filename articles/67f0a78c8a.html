ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"对北京市夺权筹备工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"对北京市夺权筹备工作报告的批语"},{"type":"paragraph","text":"（1967年3月9日）总理："},{"type":"paragraph","text":"工人代表大会还没有开，中学和农民的代表大会还无消息。开全市代表大会并选举革委会，似以在三月下旬为宜，请与谢富治同志酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月九日"},{"type":"paragraph","text":"[1]这个批语写在中共中央政治局候补委员、国务院副总理谢富治等1967年3月5日给毛泽东等的报告上。报告中说，中央文革指示我们几个人负责筹备北京市的夺权工作。经过一个月的配酿协商，准备在最近成立90多人的临时权力机构一北京市临时革命委员会。如主席、中央同意，我们拟在本周召开会议，成立临时革命委员会。"},{"type":"paragraph","text":"[2]总理，指周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":357,"page_end":357},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67f0a78c8a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
