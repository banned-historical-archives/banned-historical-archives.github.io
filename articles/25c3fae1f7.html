ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"给周世钊的信","alias":"","parts":[{"type":"paragraph","text":"给周世钊?的信"},{"type":"paragraph","text":"（1961年12月26日）世钊同志："},{"type":"paragraph","text":"惠书收到，迟复为歉。很赞成你的意见。你努力奋斗吧。我甚好，无病，堪以告慰。秋风万里芙蓉国，暮雨朝云薛荔村。西南云气来衡岳，日夜江声下洞庭。同志，你处在这样的环境中，岂不妙哉？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六一年十二月二十六日[1]周世钊，当时任湖南省副省长。"},{"type":"paragraph","text":"[2]参见谭用之《秋宿湘江遇雨》（《全唐诗》卷七百六十四），下句原为“暮雨千家薛荔村”。"},{"type":"paragraph","text":"[3]这是湖南长沙岳麓山云麓宫望湘亭上的一副对联，录自清末诗人黄道让的七律《重登岳麓》（《雪竹楼诗稿》卷六），上句原为“西南云气开衡岳”。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":499,"page_end":499},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25c3fae1f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
