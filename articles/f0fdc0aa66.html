tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大力普及毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"驻上海空军某部九连，与驻地生产大队合办夜校，同人民群众一起学习毛主席著作，有力地推动了农村和连队活学活用毛主席著作的群众运动，扩大了毛泽东思想的阵地。这是一件十分重要的工作。"},{"type":"paragraph","text":"当前正在轰轰烈烈开展的无产阶级文化大革命，是一场用毛泽东思想统一全国人民思想的大革命。在这种新的形势下，我军广大指战员，都应该像九连的同志们那样，在搞好自己活学活用毛主席著作的基础上，自觉地积极地担当宣传毛泽东思想的任务，使我们每个单位都成为毛泽东思想的播种机，每个同志都成为毛泽东思想的宣传员。"},{"type":"paragraph","text":"“夜校是我们的好课堂，贫下中农是我们的好老师”。军民同办学校，也是我们向人民群众学习的好机会。在和贫下中农一起学习毛主席著作的过程中，可以更好地学习他们的好思想、好作风，学习他们活学活用毛主席著作的深厚的阶级感情，学习他们以毛泽东思想为指针，破私立公、灭资兴无的革命精神，促进我们部队的思想革命化。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0fdc0aa66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
