tes":[{"year":1982,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报福州专讯　中共福建省委、福州部队党委主持编辑的《福建革命史画集》最近由福建人民出版社出版。叶剑英同志为画集书写了题名。"},{"type":"paragraph","text":"这本画集共编入革命历史文物图片资料一千五百多幅，有近十万字的文字介绍，比较全面地概述了福建民主革命斗争的光辉历史，表现了福建人民特别是革命老根据地人民前仆后继、英勇奋斗的革命精神，记录了毛泽东、周恩来、刘少奇、朱德等老一辈无产阶级革命家在福建革命实践活动的历史功绩，反映了无数共产党员、共青团员、党外民主人士和爱国华侨以及广大革命群众为祖国的独立、自由和解放事业而英勇奋斗的事迹。画集的编辑工作，前后经历了二十多年时间。已故的老一辈无产阶级革命家陈毅、张鼎丞、邓子恢等同志，生前对画集的编辑出版工作曾给予很大关怀和指导。谭震林、叶飞、范式人等同志也作了大量指导工作并仔细审阅了画集的内容。许多老红军、老干部提供了历史资料，老根据地广大群众捐献了大批革命文物。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e5e5a85fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
