script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不顾反动政府镇压　英勇顽强进行战斗  日本学生坚持斗争反对反动教育制度  学生们在斗争中痛斥日共修正主义分子的破坏阴谋","authors":[],"dates":[{"year":1968,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不顾反动政府镇压　英勇顽强进行战斗"},{"type":"paragraph","text":"日本学生坚持斗争反对反动教育制度"},{"type":"paragraph","text":"学生们在斗争中痛斥日共修正主义分子的破坏阴谋"},{"type":"paragraph","text":"新华社十三日讯　东京消息：日本各地大学生不顾佐藤反动政府的警察镇压和日共修正主义集团的破坏，正在顽强地继续展开斗争，反对腐朽的教育制度，反对美日反动派把大学的研究工作用于军事目的。"},{"type":"paragraph","text":"日本大学广大学生四个月来一直坚持斗争，反对腐朽的教育制度。他们同佐藤政府派出的武装警察进行了多次的英勇战斗，并连续举行大规模集会和示威。尽管在这些战斗过程中有四百五十名学生被捕，但是学生们无所畏惧地坚持斗争。学生们提出的以古田为首的全体董事总辞职的要求被佐藤拒绝之后，日本大学学生更加愤怒。他们坚持自卫斗争。"},{"type":"paragraph","text":"十月九日两千名学生头戴盔帽，手持匕首，在经济学部前面集会。会后学生们还到附近街道上举行了声势浩大的示威游行。"},{"type":"paragraph","text":"在东京大学，医学系的学生也坚持斗争，反对反动的“实习医生制度”和大学当局对学生的无理惩罚。这一斗争已经扩大到其他学系并得到了广大学生的支持。十月十二日，随着法律系学生决定参加罢课，使这所大学的这次罢课，成为第一次全校性罢课斗争。"},{"type":"paragraph","text":"东京庆应大学的学生，正在进行斗争，反对大学当局接受美军当局提供的经费为美军研究细菌武器。他们要求大学当局公开承认自己的罪行并在学校内外明确宣布拒绝接受美军当局提供的经费。"},{"type":"paragraph","text":"在这场斗争中，庆应大学的学生揭露了受日共宫本修正主义集团控制的“民主青年同盟”支持美日反动派破坏学生运动的卑鄙阴谋。"},{"type":"paragraph","text":"另外，东京外国语大学、东京中央大学、神奈川大学、福岛大学等学校的学生也都继续坚持斗争，反对美日反动派强加于他们的腐朽教育制度，要求大学民主化。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"907539bfb1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
