art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席种过的地（外二首）","authors":["和谷岩"],"parts":[{"type":"paragraph","text":"一块小小的石碑，"},{"type":"paragraph","text":"立在山下谷田里，"},{"type":"paragraph","text":"鲜亮的红字告诉人们："},{"type":"paragraph","text":"这是毛主席种过的土地。"},{"type":"paragraph","text":"这片地是一页光辉的历史，"},{"type":"paragraph","text":"记载着一次决定性的“战役”，"},{"type":"paragraph","text":"这儿播下了领袖的心血，"},{"type":"paragraph","text":"收获过一个划时代的胜利。"},{"type":"paragraph","text":"在那艰苦的战争年代，"},{"type":"paragraph","text":"毛主席用汗水浇灌过这块土地，"},{"type":"paragraph","text":"他站在绿色的田埂上，"},{"type":"paragraph","text":"为战斗的中国安排下万年大计。"},{"type":"paragraph","text":"一张镐头从这儿挥动，"},{"type":"paragraph","text":"千万张镐头一齐举起。"},{"type":"paragraph","text":"一把种籽从这儿撒下，"},{"type":"paragraph","text":"千山万岭披上新绿。"},{"type":"paragraph","text":"“自己动手，丰衣足食”，"},{"type":"paragraph","text":"八个大字象一座金桥，"},{"type":"paragraph","text":"千军万马沿着它走向胜利！"},{"type":"paragraph","text":"光荣的传统先从这儿讲，"},{"type":"paragraph","text":"红色的家谱要从这儿续，"},{"type":"paragraph","text":"千里长河这儿是源头，"},{"type":"paragraph","text":"万丈高楼这儿是根基。"},{"type":"paragraph","text":"光荣的小石碑啊，"},{"type":"paragraph","text":"你立在延安山脚下，"},{"type":"paragraph","text":"也立在中国人民心坎里。"},{"type":"paragraph","text":"你教人牢牢记住，"},{"type":"paragraph","text":"革命的胜利来之不易。"},{"type":"paragraph","text":"你让人从心眼里，"},{"type":"paragraph","text":"喜爱那大地泥土的香气。"},{"type":"paragraph","text":"你能让子孙们忘记什么叫困难；"},{"type":"paragraph","text":"让我们的红色江山永远立于不败之地！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc7a12a3dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
