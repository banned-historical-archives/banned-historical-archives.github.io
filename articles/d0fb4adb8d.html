torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"关于胡、曾、关敌南下及我军部署致周恩来电","alias":"","parts":[{"type":"paragraph","text":"关于胡、曾、关敌南下及我军部署"},{"type":"paragraph","text":"致周恩来电"},{"type":"paragraph","text":"（1936年12月23日）周："},{"type":"paragraph","text":"甲、胡、曾、关准备南下，判断不走海静即走固镇，但不会走庆阳。现周、孔\"退金积，再向中宁堡，顾祝同到宁夏后尚须与胡、关会商，判断须一星期后才能开始动作。"},{"type":"paragraph","text":"乙、提议作如下部署："},{"type":"paragraph","text":"一、固原、平凉、西峰、镇原四点东北军位置四个师筑屯粮，为死守计，必要时固原、西峰再增加一个师，马洪《鸿）宾守黑城镇李旺堡线。"},{"type":"paragraph","text":"二、庆阳、合水由萧劲光占领。"},{"type":"paragraph","text":"三、罗炳辉为司令员，宋时轮为副司令员，宋任穷为政委，指挥二十八军、三十二军、骑一团及二十九军主力，尾敌前进威肋敌侧后。"},{"type":"paragraph","text":"四、准备调四方面军向兰州平凉，由兰州补充其被服弹药，如何盼复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二十三日十二时[1]指周祥初、孔令恂。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":210,"page_end":210},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0fb4adb8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
