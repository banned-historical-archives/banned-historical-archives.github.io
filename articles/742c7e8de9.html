、自治区已超额完成征购计划。南方早稻、北方春麦的征购入库情况也很好","authors":[],"dates":[{"year":1968,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十五日电　在毛主席一系列最新指示的指引下，在小麦、早稻等粮食作物获得丰收的基础上，全国各地广大贫下中农，怀着对伟大领袖毛主席无限热爱、无限信仰、无限崇拜、无限忠诚的深厚无产阶级感情，掀起了踊跃向国家交售粮食的高潮。"},{"type":"paragraph","text":"据有关部门截至九月十日的统计:全国二十个主产冬麦的省、市、自治区，已经超额百分之零点七六完成了冬小麦征购计划。部分地区还在继续入库。当前，南方的早稻、北方的春麦的征购入库情况也很好。安徽省已提前在八月底超额完成了早稻征购计划，江西、浙江等省也接近完成任务。全国到九月十日已征购入库的早稻和春麦，比去年同期增加百分之十六点七。这是毛泽东思想的伟大胜利，是毛主席无产阶级革命路线的伟大胜利。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。各地农村广大贫下中农、革命群众和革命干部，在今年粮食征购过程中，举办了各种类型的毛泽东思想学习班，用毛泽东思想为武器，狠批了中国赫鲁晓夫等党内一小撮走资派在粮食问题上推行的反革命修正主义黑货，有力地推动了粮食征购入库工作。江西省弋阳县的广大贫下中农从今年早稻收割起，就坚持用战无不胜的毛泽东思想统帅粮食征购入库，从公社到大队、生产队，层层举办毛泽东思想学习班，认真学习毛主席一系列最新指示和有关粮食工作指示，深入开展革命的大批判，使广大群众大大提高了阶级斗争和两条路线斗争觉悟。全县收割一结束，广大贫下中农立即掀起了向国家交售粮食的热潮，只用十天时间就超额百分之二点五完成了全年粮食征购任务，用实际行动支援了社会主义革命和社会主义建设。"},{"type":"paragraph","text":"各级革命委员会在粮食征购过程中，充分发挥了一元化的领导作用。他们高举毛泽东思想伟大红旗，突出无产阶级政治，坚决落实毛主席的最新指示和有关粮食工作指示，认真贯彻执行党的方针政策，有力地推动了粮食征购工作顺利的开展。"},{"type":"paragraph","text":"粮食部门的广大革命职工，在人民解放军的大力协助下，狠抓阶级斗争，突出无产阶级政治，始终坚持活学活用毛泽东思想，促进了思想革命化。他们密切联系群众，把粮站办成了毛泽东思想宣传站、为贫下中农服务站，及时地做好了粮食接收入库工作。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"742c7e8de9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
