保护工人利益","authors":[],"dates":[{"year":1950,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京三日电】　中央人民政府政务院接受中国搬运工会第一届代表大会关于设立搬运公司废除各地搬运事业中封建把持制度之建议的决定(一九五○年三月三十一日政务院第二十六次政务会议通过)全文如下:"},{"type":"paragraph","text":"中国搬运工会第一届代表大会关于设立搬运公司、废除各地搬运事业中封建把持制度向中央人民政府的建议，经本院审查后，认为各地搬运事业中存在的包工头、把头、脚行头等把持码头、勒索商旅、并对工人实行残酷剥削的情形，实为各地城市中最显著的封建残余制度，应当采取适当办法予以废除，以保护搬运工人生活，扫除货物流通的障碍，并便利发展生产繁荣经济的事业。中国搬运工会第一届代表大会关于本问题的建议是正当的、合理的，所拟暂行处理办法，亦是切实可行的。因此特决定如下:"},{"type":"paragraph","text":"(一)接受中国搬运工会第一届代表大会关于设立搬运公司废除各地搬运事业中封建把持制度的建议，并批准关于废除各地搬运事业中封建把持制度暂行处理办法，即予公布施行。"},{"type":"paragraph","text":"(二)要扫除搬运事业中封建恶霸势力，必须依靠搬运工人的觉悟和组织。因此各地人民政府在进行此项工作时，应首先帮助搬运工人组织起来，建立巩固搬运工会的组织，以便依靠搬运工会的支持与拥护建立统一的搬运公司。"},{"type":"paragraph","text":"(三)各有关城市的人民政府应委派得力干部担任搬运公司经理和副经理，并指派公安机关代表，贸易机关代表及搬运工会选出之代表若干人，组成搬运公司管理委员会，以经理为主席，搬运工会的代表一人为副主席。"},{"type":"paragraph","text":"(四)各有关城市的人民政府接到本决定后，应即召集有关机关团体讨论执行本决定的办法，采取稳步进行，并报请大行政区人民政府(或军政委员会)批准执行，华北五省二市应报请本院批准执行。各地执行情形，应随时报告本院。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f62dfdad6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
