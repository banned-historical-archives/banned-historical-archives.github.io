二一","authors":[],"dates":[{"year":1951,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向毛主席报告增加生产降低成本的成绩"},{"type":"paragraph","text":"阳泉铁厂炼铁工人努力增产使每吨铁降低成本百分之二一"},{"type":"paragraph","text":"敬爱的毛主席：我们在你的领导下，在抗美援朝运动中，发挥了爱国主义生产积极性、创造性的精神，加强了政治学习，钻研业务技术，职工师徒相互学习，并有工程师帮助，促使技术、操作、设备、料量等各方面均大大改进和提高。在十月八日至二十七日十九天过程中，我厂小型二高炉的炼铁生产，连创六次史无前例超额完成日产计划百分之一四三的纪录，高炉利用系数由三·四立方公尺降到一·六五八立方公尺的新纪录，初步计算，每吨降低成本百分之二一，并提前四天完成月产计划，带动全厂的炼铁任务提前三天完成月产计划。以此生产大胜利，作为向中国人民志愿军出国作战一周年的献礼。"},{"type":"paragraph","text":"由于你的领导及全体职工的努力，才有此收获。为此除向你报喜外，我们还要在现有基础上，再接再厉，克服工作中的一切困难，将经济建设与政治斗争任务贯彻到底，为进一步提高质量再创更高新纪录，提前超额完成国家一九五一年的生产任务而奋斗。　国营阳泉铁厂全体职工"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a1e43a4a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
