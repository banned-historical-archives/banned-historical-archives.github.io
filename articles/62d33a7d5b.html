:["云南大学","张熙","张铁波","李寿国","王孔渊","秦鸿谋","谭东北","贺斌"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"攻击丑化党员的右派言论（二）","type":"title"},{"text":"云南大学秦鸿谋王孔渊李寿国贺斌张铁波谭东北张熙","type":"authors"},{"text":"“党员特权思想严重，发展到了专横的地步，党员‘只许州官放火，不许百姓点灯’，党员是顺我者生，逆我者死；党员碰不得，碰了就倒霉；党员都是靠抱着金字招牌吃饭的人。党内宗派主义严重，不见他们互相有斗争。党员飞扬拔扈，已经是既不可敬，又不可爱了。如果取消党员的称号，他们与群众没有区别。”（秦鸿谋）","type":"paragraph"},{"text":"“革命是为了消灭阶级，为什么现在划分党、团员、群的阶级？在朝鲜是党团员冲锋在前，现在有些党员是在受享上冲锋。”（王孔渊）","type":"paragraph"},{"text":"政治经济学教科书内云：带来剩余价值的货币谓之资本，根据这点，我主为一个人入党后就可以叫党员资本了，因为党员这一块金牌子可以获得许多剩余价值：","type":"paragraph"},{"text":"（1）有牌子就有一切——名誉、地位、待遇。","type":"paragraph"},{"text":"（2）有牌子可以进行各种冒名顶替的活动成为各种代表。","type":"paragraph"},{"text":"（3）可以用牌子去感动利诱女朋友。","type":"paragraph"},{"text":"（4）可以随便干涉别人生活。","type":"paragraph"},{"text":"（5）可以迎接外宴。","type":"paragraph"},{"text":"（6）总之，宪法上规定的人民所享受的一切权利，是指有金牌子的人而言的。惨哉！痛哉！群众的地位何在！”（李寿国）","type":"paragraph"},{"text":"“团支部是森罗殿，党支部是活阎王。党的档案制有如国民党的特务制度，组织上可以随便给你鉴定几条。”（贺斌）","type":"paragraph"},{"text":"“墙和沟是党员造成的，积极分子是筑墙控沟的义勇队。”（张铁波）","type":"paragraph"},{"text":"“青年团与过去的‘三青团’没有区别，开黑名单……”（谭东北）","type":"paragraph"},{"text":"“有不少的党员，","type":"paragraph"},{"text":"把自己的金字招牌，","type":"paragraph"},{"text":"当着‘天方夜谭’上的‘神灯’，","type":"paragraph"},{"text":"想一辈子受用不尽。","type":"paragraph"},{"text":"这金字招牌的用法是这样：","type":"paragraph"},{"text":"如果你需要点甚么，","type":"paragraph"},{"text":"你就把它敲出当当的响声，","type":"paragraph"},{"text":"你面前马上出现了你的仆人。","type":"paragraph"},{"text":"“你要甚么？我的主人，","type":"paragraph"},{"text":"是小卧车？还是洋房？","type":"paragraph"},{"text":"是要天上的那个月亮，","type":"paragraph"},{"text":"还是要月宫中的那个姑娘！","type":"paragraph"},{"text":"一切你都用不着悲伤，","type":"paragraph"},{"text":"一切都象你想的那样。”","type":"paragraph"},{"text":"“但是呵，我的主人！","type":"paragraph"},{"text":"你要小心，","type":"paragraph"},{"text":"不要把金字招牌，","type":"paragraph"},{"text":"敲得过响过长。","type":"paragraph"},{"text":"如果敲得过火了，","type":"paragraph"},{"text":"它就会发生破响。”（张熙）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62d33a7d5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
