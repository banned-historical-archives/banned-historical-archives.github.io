s":[{"year":1948,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"榆社县委检查生产决心纠左"},{"type":"paragraph","text":"克服农村无政府状态"},{"type":"paragraph","text":"【太行消息】榆社县委近召开全县扩干会，检查前一段春耕生产。由于领导上只重视填补，对生产领导忽视，区干部经过整编，光怕犯错，怕失掉立场，惹起贫雇不满，对坏的“贫雇团”不敢大胆解散或停止其活动，对中农不敢补偿，不敢取消管制，结果大部村庄是二流子们冒充贫雇，趁机报复干部，随便撤职、甚至吊打干部；干部党员躺倒不干，形成农村三不和（贫雇、干部、中农）的无政府状态，对生产工作影响很大。三区王家沟被党处分过的王业明，在村活动组织起假贫农团，专门打击干部。王根元老汉说：“有些干部过去不好，大部分可都是好干部，你们可不能丧良心，一律都反对。”王业明威胁群众说：“不行！不服从大家就是“活神仙”（活埋的意思）。周村每天有专人监视干部。段家庄少数人还用石头打干部。杨家庄老实贫雇（羊工）王三货，悄悄向区干部说：“现在社会不算了，不管住些可不行。”另外，普遍的伤害了中农利益。如一区王景村中农出差一天得米十一斤，贫农得二十二斤。下车村合作社随便借中农牲口。二区银＠村这次借款，大部让中农出了；王千祥按分该出六千元，结果出了一万七千元。三区周村非填补村，九户中农因恐慌害怕，借出地四十余亩；赵庄不叫中农随便砍自己的树等等。"},{"type":"paragraph","text":"汇报后，结合中央局对太岳区党委的纠左指示，对照自己，进行了专门检讨，大家都认识了前段盲目的左倾观点，如不分是非好坏，一律仇视支部党员，片面为贫雇，损害中农利益。同时确定了处理办法：对支部应号召党员在生产中起模范带头作用。好的支部要坚决依靠。吸收中贫农代表参加，成为村的生产领导核心，彻底克服目前农村中的无政府状态。对一些坏分子，应给以坚决的批评。在大家思想上，应树立完整的群众路线思想。执行政策中，对错斗的中农，原东西在，要坚决退回。对地主富农要适当安置。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04637794ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
