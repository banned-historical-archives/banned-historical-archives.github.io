" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈伯达谢富治与首都部分大专院校代表的讲话","authors":["谢富治","陈伯达"],"dates":[{"year":1967,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"陈伯达谢富治与首都部分大专院校代表的讲话","type":"title"},{"text":"陈伯达谢富治","type":"authors"},{"text":"（摘要）","type":"subtitle"},{"text":"(“新北大公社”同学说“团”、“O”、“飘派”他们说聂元梓、孙蓬一执行资产阶级反动路线)","type":"paragraph"},{"text":"伯达：不要这么说嘛，为什么上纲上得这么高？什么问题都要上纲！人家改正错误也不行！要给人家改错误的机会，不要逼得人家没有路走。对聂元梓是这样，对孙蓬一也是这样，炮轰聂元梓，打倒孙蓬一，实际上就是打倒聂元梓(“新北大公社”同学：他们要孙蓬一靠边站)让孙蓬一靠边站就是要打倒，我批评一个同志就要打倒，行吗？要有无产阶级革命派的态度，还是让他工作么！北大有缺点，我攻了一下，聂元梓同志接受了嘛，对同志就要批评、帮助。","type":"paragraph"},{"text":"伯达：(有人反映武汉问题时)北京革命派、红代会做了很多工作，但要促进外地革命派大联合。","type":"paragraph"},{"text":"谢富治：我们关心这问题，所以这次带北航同志去帮助造反派“和稀泥”。","type":"paragraph"},{"text":"伯达：你们一定要学习好毛主席的伟大著作《关于正确处理人民内部矛盾的问题》，要学深、学透，按毛主席指示办事，人民内部矛盾一定按同志式原则来处理。(问北大一同学)你们同聂元梓同志是敌我矛盾还是人民内部矛盾？(答：是人民内部矛盾)有人喊炮轰聂元梓，其实就是打倒聂元梓，醉翁之意我是知道的。那天我到北大搞了几条协议，我不当工作组，不包办代替，你们自己解放自己，自己教育自己，这是无产阶级文化大革命的特点。","type":"paragraph"},{"text":"我的话是随便说的，清华“414”不要与蒯大富太过意不去，过分了就会走向反面，在人民内部，革命派之间“害人之心不可有”，要好好学习毛主席关于处理人民内部矛盾这篇著作，不能学一阵就忘了就丢了(韩爱晶同志插话：要善良)善良有两性，有资产阶级的善良，也有无产阶级的善良，我那天到清华去，目的是要帮助蒯大富的，帮助“团”派的，不要不准革命，“414”不要咄咄逼人，希望大家好，给人家改正错误机会，这是我们伟大领袖毛主席说过的话。听说那天我还没有离开清华，“414”就贴大字报，所以我那天只好发表声明，你们不要把你们的意见强加给我，我也不把自己的意见强加于你们。","type":"paragraph"},{"text":"谢富治：以后不要叫这派那派，我看都是一个派，那派都有他特点，“414”也有他缺点。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"聂元梓","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33ea85bf77"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
