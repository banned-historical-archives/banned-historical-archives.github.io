ar":1977,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席武昌旧居陈列馆落成开放"},{"type":"paragraph","text":"新华社武汉电　在隆重纪念伟大的领袖和导师毛主席逝世一周年的时候，武昌毛泽东同志旧居陈列馆落成，并于九日正式开放。"},{"type":"paragraph","text":"陈列馆座落在武昌都府堤四十一号毛泽东同志旧居右侧，由三个部分组成。第一部分介绍在大革命的高潮中，毛主席为领导中国人民反帝、反封建的革命斗争，于一九二六年冬来到了当时革命的中心武汉。第二部分介绍的是毛主席在武汉写作并发表光辉著作《湖南农民运动考察报告》，领导全国伟大的农民革命斗争的革命实践。第三部分介绍了毛主席当年顶逆流，战恶浪，为挽救革命而进行的英勇斗争。陈列馆通过大量珍贵的革命文物和丰富的历史照片，生动地反映了伟大领袖毛主席一九二六年冬至一九二七年秋在武汉的伟大革命实践活动，着重宣传了毛主席关于农民革命和武装斗争的光辉思想，热情歌颂了毛主席领导中国人民同以蒋介石为代表的国民党右派和以陈独秀为代表的党内右倾投降主义路线进行针锋相对斗争的丰功伟绩。"},{"type":"paragraph","text":"陈列馆还介绍了我们敬爱的周恩来总理和董必武副委员长等老一辈无产阶级革命家当年和毛主席站在一起，坚持毛主席的无产阶级革命路线，为中国人民的解放事业英勇斗争的光辉业绩。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51fe5c35a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
