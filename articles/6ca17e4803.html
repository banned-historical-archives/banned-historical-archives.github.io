":1957,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“中国共产党建立以前马克思主义者对无政府主义者的斗争”(史学月刊第八期)是一篇研究党史的论文，作者张发亮说，无政府主义是中国马克思主义者在建党以前与建党时期中的主要斗争对象之一。据作者引证，无政府主义思想在中国传播始于1905年前后，最初传播它的是资产阶级和小资产阶级的革命知识分子。他们与马克思主义者曾在思想战线和实际工作中发生一系列斗争。在1920年全国各地成立共产主义小组和社会主义青年团时，也有一些无政府主义者参加。因为他们反对无产阶级专政，后来相继退出。因而共产主义小组更加纯洁，为建党奠定了组织准备。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ca17e4803"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
