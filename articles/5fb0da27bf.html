rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作是金钥匙","authors":["杨永纯"],"parts":[{"type":"paragraph","text":"大半年，我一直有一个思想疙瘩解不开。和我一同入伍的一个同志，不仅被评为五好战士，记上了二等功，而且还光荣地被吸收入了党。我自己呢？虽然工作学习都不坏，但既没有入党，也没有评上功。对于这种情况，我认为是领导上对那位同志特别关心，帮助特别多；相反，认为领导上对自己帮助比较少。"},{"type":"paragraph","text":"最近在学习毛主席著作“矛盾论”中，读到了内因和外因的关系这一节。毛主席说：一切事物的发展，主要地不是由于外因而是由于内因，“唯物辩证法认为外因是变化的条件，内因是变化的根据，外因通过内因而起作用”。读到这一节，我停下来了，反复地咀嚼这几句话，读了又想，想了又读，心里恍然清亮了。毛主席在这里虽然主要是说的社会的发展，但是个人的进步快慢又何尝不是这样呢？自己考虑问题时恰恰违反了毛主席的这个指示，把外因看成事物发展的根据了！一发觉自己思想方法的错误，自己也就能平心静气地来作比较了。这一比较，就发现自己确确实实有许多地方比不上那位同志。例如在工作中，当领导上不在时，我往往就马虎一点，他就不是这样。排长不在家时，他还主动领导全排把任务完成得很出色。再说在思想作风上，他一贯不辞辛劳，谦虚，团结，可是我由于年年受奖，不自觉地背上了自满的包袱，看不到或者不愿意去看别人的长处和成绩。经过这样比较，自己不仅疙瘩解开了，而且发现了自己各方面的缺点，引起了自己很大警惕，并且明确了进一步努力的方向。"},{"type":"paragraph","text":"从这次学习“矛盾论”，我深深得到这个体会：毛主席的著作，是一把金钥匙，认真地学习它，就能使自己不断提高，不断前进。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fb0da27bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
