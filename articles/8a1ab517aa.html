art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国共产党代表团向乔治乌—德治陵墓献花圈","authors":[],"parts":[{"type":"paragraph","text":"新华社布加勒斯特十八日电 前来参加罗马尼亚工人党第四次代表大会的中国共产党代表团团长、中共中央总书记邓小平和代表团团员，中共中央政治局候补委员、中央书记处书记康生，中共中央委员伍修权和中共中央机关副部长王力等，十八日上午在罗马尼亚工人党中央政治局委员、罗马尼亚国务委员会主席基伏·斯托伊卡陪同下前往罗马尼亚首都“为人民、祖国的自由和社会主义而斗争的英雄纪念塔”，向乔治乌—德治和其他烈士陵墓献了花圈。花圈上写着：“乔治乌—德治和其他烈士们永垂不朽中国共产党代表团敬献”。"},{"type":"paragraph","text":"陪同献花圈的还有罗马尼亚工人党中央委员瓦西里·帕蒂利内茨，党中央候补委员、罗马尼亚驻华大使杜米特鲁·乔治乌，布加勒斯特市党委书记特·杜达斯，布加勒斯特市人民会议副主席扬·伊斯帕斯等和中国驻罗大使馆外交官员。RW：乔治乌—德治；罗马尼亚烈士"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a1ab517aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
