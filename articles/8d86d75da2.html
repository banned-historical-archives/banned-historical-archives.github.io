script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想武装工人“学习毛主席著作辅导讲座”开讲","authors":[],"dates":[{"year":1963,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　最近，上海工人文化宫举办的“学习毛主席著作辅导讲座”，已于5月31日开讲。"},{"type":"paragraph","text":"第一讲由上海总工会的同志讲《关于正确处理人民内部矛盾的问题》。另外，《论人民民主专政》、《中国社会各阶级的分析》两篇文章和《毛泽东同志论帝国主义和一切反动派都是纸老虎》的著作，将由中共上海市委党校的教师担任。讲座共分六讲，预定每星期开讲一次。"},{"type":"paragraph","text":"这个讲座是为了帮助工人理论学习的骨干学习毛主席著作、推动基层单位的理论学习而举办的。参加这次听讲的有八百余人，其中有几年来一直坚持理论学习的求新造船厂、上海市第一百货商店、国营上海第一印染厂等单位的学习骨干，也有最近在学习雷锋、学习“南京路上好八连”的活动中组织起来的毛主席著作学习小组的积极分子。"},{"type":"paragraph","text":"这个讲座开办后，受到工人的普遍欢迎。由于另外还有不少人要求参加听讲，因此举办单位准备适当地增加听讲人数。(宫)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d86d75da2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
