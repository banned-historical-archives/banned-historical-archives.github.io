tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席指引的文艺方向前进","authors":["吴式堂"],"parts":[{"type":"paragraph","text":"毛主席来了。毛主席乘坐的敞篷汽车开到了广州部队海上文化工作队的队列跟前。全队同志激动得一个劲地高呼：“毛主席万岁！”"},{"type":"paragraph","text":"毛主席慈祥地望着大家，全队同志感到无比幸福，无比温暖。这时，同志们的心飞到了南海前哨，想到守岛战士对同志们说过的话：“你们如果到北京，一定替我们守岛战士向毛主席问好，祝他老人家万寿无疆！”"},{"type":"paragraph","text":"同志们带着守岛战士对毛主席的无限热爱到北京来接受毛主席检阅。到北京后，有的队员曾买了许多毛主席的照片，寄给守岛战士。队员晨光，还把一件最珍贵的礼物——毛主席纪念章，送给她在连队当兵时的班长。现在，同志们就好象和守岛战士坐在一起，接受毛主席的看望，因此，呼口号越呼越有劲。"},{"type":"paragraph","text":"敬爱的领袖毛主席，不时地向欢呼的革命群众招手致意。看到领袖的身影和手势，队员许纯梅，不由得回想起十年前的一次幸福会见的情景。那是一次准备出国访问的演出之前，她下汽车以后刚走到门口，毛主席从后面走过来了！她转身一看，高兴得楞住了：这不是毛主席他老人家吗？她激动得忘记了走路。毛主席见她出神地站在门口，走过来亲切地向她招了招手说：“小鬼，走呀，快走呀！”她这才醒悟了过来，激动地说：“主席，您老人家先走！”"},{"type":"paragraph","text":"当时她就想：毛主席啊，我一定要紧紧跟着您老人家革命一辈子！十年来，每当她思想上、工作上遇到问题和困难的时候，耳边就仿佛响起了毛主席亲切的声音：“小鬼，走呀，快走呀！”立即就增添了无穷的力量。就这样，她和队里的同志们，走过了千山万水，战胜了种种艰难险阻，不怕苦，不怕累，坚持为兵服务。"},{"type":"paragraph","text":"看着毛主席，许纯梅和队里的同志们，都从心里向毛主席宣誓：我们一定永远听您的话，永远沿着您指引的文艺方向向前走。"},{"type":"paragraph","text":"毛主席的汽车走远了，队员们紧紧望着汽车开去的方向。这时，人人心中都有许多话要说，要唱，有的马上提笔写诗，有的马上谱曲，同志们恨不得插上翅膀飞回海岛，把歌儿唱给守岛战士听，告诉大家：毛主席永远和我们在一起。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03a50aadda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
