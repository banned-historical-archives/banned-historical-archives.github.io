<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"鱼水·油水·水火","authors":["任欣"],"dates":[{"year":1976,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"鱼水·油水·水火"},{"type":"paragraph","text":"任欣"},{"type":"paragraph","text":"广西大新县一百○五岁的贫下中农女社员赵氏亨，最近给《人民日报》写了一封信，热情赞颂“社会主义制度优越，文化大革命最好”。"},{"type":"paragraph","text":"社会主义制度优越在何处，文化大革命好在哪里，这个在旧社会度过七十八年苦难生活的老人，感受很多，可谈的事儿当然不会少。值得注意的是：她在信中没有讲别的，只是说了“当‘官’的同群众之间的关系”。她说：“现在的干部，脚上有牛粪，手上有老茧，当‘官’不象官。他们常下乡来，同我们贫下中农一起劳动、一起学习、一起批判资本主义”，“跟过去大不同”啦！"},{"type":"paragraph","text":"这个干群关系，事关社会制度的性质，事关限制资产阶级法权，事关反修防修，确实是个大问题。"},{"type":"paragraph","text":"“只许州官放火，不许百姓点灯”，“三年清知府，十万雪花银”。在旧社会，官民关系是对立的阶级关系，是压迫被压迫、剥削被剥削的关系。"},{"type":"paragraph","text":"在社会主义社会里，干部是人民的勤务员，他们同群众的关系应该是阶级兄弟的关系，平等的关系。"},{"type":"paragraph","text":"今天，我们广大的干部遵循毛主席的一贯教导，坚持无产阶级专政下的继续革命，坚持走社会主义道路，全心全意为人民服务，和工人、贫下中农实行“三同”，坚持参加集体生产劳动，和群众打成一片，以普通劳动者的姿态出现在群众之中，平等待人。百岁老人所称赞的，就是这种人类历史上新型的“官”民关系。人们形象地把这种干部群众之间密切的关系比喻为鱼水关系。"},{"type":"paragraph","text":"由于阶级、阶级矛盾、阶级斗争的存在，由于资产阶级法权的存在，由于修正主义路线的影响，由于资产阶级世界观的作祟，有些干部同群众的关系，却并非鱼水一般。在这个问题上，经验教训不少。有的犯过走资派错误的干部，在和群众的关系上，就经历了这样的变化过程：鱼水关系——油水关系——水火关系。"},{"type":"paragraph","text":"鱼是在水中游来游去的，油是浮在水面上漂来漂去的。官做大了，薪水高了，养尊处优，脱离劳动，脱离群众，他同群众的关系就会成为油水关系，想不到一块，干不到一起。发展下去，还有变成水火关系的危险。"},{"type":"paragraph","text":"一九六四年，毛主席在关于社会主义教育运动的一个批示中，曾经指出：“官僚主义者阶级与工人阶级和贫下中农是两个尖锐对立的阶级。”"},{"type":"paragraph","text":"水火不相容。刘少奇、林彪、邓小平一类的走资派，他们同群众的关系，如同水与火。他们高踞于群众之上，做官当老爷，搞修正主义，走资本主义道路，同工人、贫下中农处于尖锐的阶级对立之中，是吸工人、贫下中农血的资产阶级分子，是革命的对象。"},{"type":"paragraph","text":"无产阶级专政的社会主义国家，如果被搞修正主义的“大官”们篡夺了领导权，就会出现资本主义复辟。"},{"type":"paragraph","text":"为了反修防修，为了限制资产阶级法权，一切革命干部，都必须摆正自己同群众的关系，要象鱼水关系，不要变成油水关系，更不要演变为水火关系。经过无产阶级文化大革命的教育和锻炼，我们不是更应该大大提高这种自觉性吗！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eff3f0bd6c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
