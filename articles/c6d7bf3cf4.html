script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"延安革命精神鼓舞世界人民去年有六十三个国家的千余外国朋友访问延安　他们把访问延安作为向毛主席学习的重要一课","authors":[],"dates":[{"year":1966,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在过去一年中，延安人民先后接待了五大洲六十三个国家的一千二百多名外国朋友前来访问。随着中国国际威望的增长，延安已成了全世界革命人民向往的地方。"},{"type":"paragraph","text":"这几年来，访问延安的外国朋友逐年增多。一九六二年来访的有十个国家、六十人；一九六三年有十三个国家、三百四十多人；一九六四年增加到五十七个国家、五百八十多人；一九六五年来访的人数是解放以来最多的一年。"},{"type":"paragraph","text":"在来访的外宾中，有国家领导人，政党的负责人，社会活动家，工会、妇女、青年团体的代表，作家、艺术家和新闻记者等等。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\02\\6629030301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e日本青年在延安参观当年毛主席住过的窑洞。\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6d7bf3cf4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
