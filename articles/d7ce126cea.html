rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛主席永远活在我们心中》","authors":[],"parts":[{"type":"paragraph","text":"这是一部悼念伟大领袖和导师毛主席逝世的诗集。由人民文学出版社出版。收入韶山、井冈山、遵义、延安、北京和大庆、大寨等地区和单位的诗一百四十七首。这些含着悲痛泪水写出的诗篇，以深厚的无产阶级感情，歌颂了毛主席半个多世纪以来为中国革命和世界革命所建立的丰功伟绩，抒发了广大工农兵群众对毛主席的无限崇敬和深切怀念，表达了我国各族人民继承毛主席遗志，把无产阶级革命事业进行到底的决心。吟诵这些诗，会激励我们永远高举毛主席的伟大旗帜，在英明领袖华主席的领导下，抓纲治国，抓纲治军，把无产阶级专政下的继续革命不断推向前进。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7ce126cea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
