script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高呼“工人和学生在斗争中团结起来”等口号　反对垄断资产阶级反动统治  罗马十万工人和学生举行声势浩大示威游行  意大利一百三十万冶金和机械制造工人已坚持斗争数月","authors":[],"dates":[{"year":1969,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高呼“工人和学生在斗争中团结起来”等口号　反对垄断资产阶级反动统治"},{"type":"paragraph","text":"罗马十万工人和学生举行声势浩大示威游行"},{"type":"paragraph","text":"意大利一百三十万冶金和机械制造工人已坚持斗争数月"},{"type":"paragraph","text":"新华社讯　罗马消息：来自意大利全国各地的十万名冶金和机械制造工人和数千名学生十一月二十八日在首都罗马共同举行了声势浩大的示威游行，反对垄断资产阶级的残酷剥削和压迫。青年工人和进步学生在游行时高呼口号：“工人阶级必须赢得一切！”“这仅仅是开始，让我们继续战斗下去！”"},{"type":"paragraph","text":"今年九月以来，意大利全国一百三十万冶金和机械制造工人一直举行轮番罢工和示威游行。十一月二十八日的示威是他们迄今为止举行的最大的一次示威。数万名冶金和机械制造工人的代表，从米兰、都灵、热那亚、威尼斯等城市和全国各地赶到罗马参加了这次示威。"},{"type":"paragraph","text":"数千名罗马大、中学生也参加了这次示威。当学生队伍和工人队伍汇合时，他们高呼：“一切权力归于工人！”工人和学生还共同高呼：“工人和学生在斗争中团结起来！”"},{"type":"paragraph","text":"示威的工人和学生，打着无数面红旗，举着“工人阶级将取得胜利”和要求提高工资的标语牌，唱着《国际歌》，高呼着谴责资产阶级反动统治的口号，组成了一支长达五公里的队伍，浩浩荡荡地穿过罗马市，并在示威结束后举行了大规模的群众集会。整个示威持续了六个多小时，十万群众抗议的呼声震撼了意大利首都。"},{"type":"paragraph","text":"在这之前，四千名冶金和机器制造工人十一月二十六日在意大利第二大城米兰的市政厅前举行了游行示威，抗议反动当局无理逮捕了四名罢工工人。这四位工人所属的三个工厂的全体工人举行了罢工，对反动当局镇压工人运动的暴行表示愤怒的抗议。（附图片）"},{"type":"paragraph","text":"意大利米兰地区一百多万工人不久前举行总罢工，抗议生活费用和房租飞涨，反对政府向工人征收沉重的所得税。图为米兰皮雷利橡胶工厂工人举行罢工示威。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d5abd20ac"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
