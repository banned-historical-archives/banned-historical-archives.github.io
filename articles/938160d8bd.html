:[],"dates":[{"year":1966,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"喜看《东方红》  心向毛泽东"},{"type":"paragraph","text":"日本观众盛赞我《东方红》纪录片"},{"type":"paragraph","text":"据新华社东京四日电　中国大型彩色纪录片音乐舞蹈史诗《东方红》在东京上映，激荡着日本观众的革命胸怀，他们热情赞颂中国人民的伟大领袖毛主席。"},{"type":"paragraph","text":"一位叫大前的印刷工人说：“《东方红》使我看到了毛主席思想的伟大生命力。目前在亚洲、非洲有几亿人民正在认真地学习毛主席的著作，同帝国主义者进行着有效的斗争。”他说，“谁不认真学习中国革命，谁就没有资格谈论革命，而且也不可能干革命”。"},{"type":"paragraph","text":"一位名叫小川的青年说，“我不知道世界上还有什么人能够像毛主席这样深受人民的爱戴”。"},{"type":"paragraph","text":"二十二岁的青年工人神田看了《东方红》后在留言簿上写道：“在世界上，走过了最艰苦的道路的人民是中国人民；在世界上进行过最不屈不挠的英勇斗争的人民是中国人民；在世界上最伟大聪明的人民是中国人民；而今在世界上最幸福的人民是在毛泽东思想和中国共产党领导下的中国人民”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"938160d8bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
