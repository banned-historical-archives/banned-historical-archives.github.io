"authors":["南开大学","章迺汉","阎树栋","陈本敬"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"两张大字报：“反对外行领导内行”、“人民呼声”","type":"title"},{"text":"南开大学陈本敬阎树栋章迺汉","type":"authors"},{"text":"[陈本敬：南开大学物理系助教；阎树栋、章迺汉：南开大学数学系助教]","type":"subtitle"},{"text":"第一张大字报：","type":"paragraph"},{"text":"1、反对外行领导内行。","type":"paragraph"},{"text":"2、要求人事材料公开。","type":"paragraph"},{"text":"3、要求有科学研究及图书、仪器。","type":"paragraph"},{"text":"4、要求重视青年教师。","type":"paragraph"},{"text":"5、要国务院像重视工业一样的重视科学。","type":"paragraph"},{"text":"6、反对将工农速中的学生保送入大学。","type":"paragraph"},{"text":"7、反对党团员有特殊权利的大裙带关系。","type":"paragraph"},{"text":"第二张大字报：","type":"paragraph"},{"text":"人民呼声","type":"paragraph"},{"text":"争自由、争民主、争人权","type":"paragraph"},{"text":"打碎黑罐撕破黑带，反对愚民政策，实行信仰自由，支持同学的意见，选修政治课。","type":"paragraph"},{"text":"要求通过真正的民主，选举人民代表；反对包办式的选举制。","type":"paragraph"},{"text":"对祖国科学事业负责，对青年负责；反对留助教，派留学生，升等升级，开课重德不重才的卑鄙制度。","type":"paragraph"},{"text":"给青年助教以合理工资待遇。反对把头制；不学无术的人退出学校的领导地位。人类灵魂的工程师们不要沉默了，让我们参加到同学们的斗争行列中去！","type":"paragraph"}],"comments":[],"origin":"《南开大学右派反动言论选辑(第二集)》(南开大学社会主义思想教育教研组，1957.10)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef7a99c1d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
