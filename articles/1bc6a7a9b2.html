script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度农村封建剥削残酷透顶  地主敲骨吸髓　农民倾家荡产","authors":[],"dates":[{"year":1969,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度农村封建剥削残酷透顶"},{"type":"paragraph","text":"地主敲骨吸髓　农民倾家荡产"},{"type":"paragraph","text":"据新华社十日讯　新德里消息：印度《解放》月刊六月号发表关于西孟加拉邦一个村庄的典型调查报告，揭露印度地主阶级残酷剥削和压榨农民的罪恶行径。报告指出，地主阶级是印度农村的主要剥削者，是帝国主义的支柱，是国大党在农村的支柱。"},{"type":"paragraph","text":"报告说，印度农村的封建主义是根深蒂固的。封建王公和大地主直到今天还是农村的主要剥削者。在国大党政府执政期间是这样，现在在印度修正主义分子控制的“联合阵线”政府执政期间还是这样。在西孟加拉邦穆尔谢达巴德县农村人口中，雇农约占百分之四十，贫农和下中农占百分之三十，中农占百分之二十，地主和富农占百分之十。"},{"type":"paragraph","text":"报告说，大地主各拥有五千比加（一比加相当于二华亩）到一万比加土地。有的大地主甚至拥有大约四万比加土地。这些大地主把土地出租给二地主或富农，农民遭受着两层和三层的压榨。"},{"type":"paragraph","text":"报告说，印度农村的剥削基本上是封建性质的，它有四种剥削形式：（一）地租剥削（缴纳物品或现金）；（二）劳役剥削，即强迫为地主进行无偿劳动；（三）各种税收的剥削；（四）高利贷剥削。报告说，半佃农从住在城里的二地主那里租种土地，必须自己承担耕种的一切费用，把收成的百分之六十至七十交给地主。报告还举例说明印度贫农遭受高利贷的残酷剥削情况。报告说，在青黄不接时，如果农民向地主借价值一百卢比的稻谷，必须在两个月内以百分之五十的利息即价值一百五十卢比的稻谷来偿还这笔债务。实际上，借稻谷的农民必须偿还的比这个数字还要多好几倍。因为，在冬季收割结束后，稻谷的价格往往下降到收割以前价格的百分之六十，农民必须用出售更多的稻谷的价款才能还清两个月以前所借的债务。其结果是，农民被迫在下一年又借稻谷。这个过程继续下去，直到农民的土地、犁和耕牛全部抵押给地主，使自己变成一个一无所有的雇农。（附图片）"},{"type":"paragraph","text":"这位衣不遮体的印度老农民被地主榨干了血汗，无依无靠，只得在饥饿线上挣扎。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bc6a7a9b2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
