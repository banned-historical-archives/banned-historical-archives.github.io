" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"毛泽东等祝贺阿尔巴尼亚解放十五周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺阿尔巴尼亚"},{"type":"paragraph","text":"解放十五周年的电报"},{"type":"paragraph","text":"（1959年11月28日）阿尔巴尼亚劳动党中央委员会第一书记恩·霍查同志，阿尔巴尼亚人民共和国人民议会主席团主席哈·列希同志，阿尔巴尼亚人民共和国部长会议主席穆·谢胡同志："},{"type":"paragraph","text":"欣逢阿尔巴尼亚解放十五周年纪念日，我们谨代表中国共产党、中华人民共和国政府和中国人民向你们，并且通过你们向兄弟的阿尔巴尼亚人民、阿尔巴尼亚劳动党和阿尔巴尼亚人民共和国政府致最衷心和最热烈的祝贺。"},{"type":"paragraph","text":"中国人民怀着无限愉快的心情看到：十五年来，富有光荣革命传统的、勤劳勇敢的阿尔巴尼亚人民，在阿尔巴尼亚劳动党和阿尔巴尼亚人民共和国政府的领导下，在政治、经济、文化各个领域中都取得了巨大的成就。解放前，阿尔巴尼亚曾经是一个经济落后的国家，现在，她已经成为一个经济繁荣、文化发达的社会主义国家。自前，阿尔巴尼亚人民正斗志昂扬地为实现修订扩大了的第二个五年计划进行着忘我的劳动，在建设社会主义的道路上飞跃前进。阿尔巴尼亚人民所取得的这些巨大成就再一次证明：人民一经成为自己命运的主人，在马克思列宁主义政党的领导下，就一定能"},{"type":"paragraph","text":"毛泽东等祝贺阿尔巴尼亚解放十五周年的电报够做出翻天覆地的事业。"},{"type":"paragraph","text":"阿尔巴尼亚人民坚持不渝地为巩固以苏联为首的社会主义阵营的坚强团结、捍卫马克思列宁主义的纯洁性和反对现代修正主义而斗争，并且作出了重大的贡献。阿尔巴尼亚政府始终一贯地执行和平外交政策，为维护巴尔干地区和世界的和平，加强各国人民的友好团结进行了巨大的努力，赢得了世界各国人民的普遍赞扬。"},{"type":"paragraph","text":"随着我们两国社会主义建设事业的突飞猛进，中阿两国人民之间的兄弟友谊一定会继续加强，中阿两国之间的友好合作关系也一定会日益紧密。"},{"type":"paragraph","text":"祝兄弟的阿尔巴尼亚人民在建设社会主义的事业中取得更大的成就。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九五九年十一月二十八日"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":493,"page_end":494},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"368c0f4551"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
