script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝中社发表揭露铁托修正主义集团的第五篇文章  “企业自治”的实质是资本主义复辟","authors":[],"dates":[{"year":1962,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝中社发表揭露铁托修正主义集团的第五篇文章"},{"type":"paragraph","text":"“企业自治”的实质是资本主义复辟"},{"type":"paragraph","text":"新华社平壤16日电　朝鲜《劳动新闻》今天发表了朝鲜中央通讯社揭露南斯拉夫修正主义集团的第五篇文章，题目是《铁托修正主义集团标榜的"},{"type":"paragraph","text":"“企业自治”的本质和后果》。"},{"type":"paragraph","text":"文章指出，帝国主义的奴才铁托集团，提出了社会主义国家和它的经济职能在过渡时期将被取消的资本主义理论，十多年来并在这一“理论”基础上一直实施着作为南斯拉夫经济政策基础的“企业自治”。"},{"type":"paragraph","text":"文章说，铁托集团宣称，同社会主义所有制和国家对经济管理相对立的“企业自治”，是"},{"type":"paragraph","text":"“更高、更彻底的社会主义关系”，是“真正的经济民主”，是"},{"type":"paragraph","text":"“同取消国家的经济职能相联系的唯一正确的道路”。可是，今天南斯拉夫的经济情况表明，“企业自治”只不过是追求利润、以弱肉强食为最高法则的资本主义经济管理方法，其结果给南斯拉夫带来了资本主义复辟和经济破产。"},{"type":"paragraph","text":"文章指出，铁托集团自1950年实施“企业自治”以来，把原来国有化的工厂、矿山、交通运输、贸易、农林、公共事业等部门和其它经济部门的企业全部交给了所谓“劳动者理事会”或“管理委员会”，进行“独立”管理。其实，“企业自治”下的企业，并不是由工人管理，而是由少数企业管理者管理，劳动者谈不上管理企业的权力，而却不得不呻吟在无权、失业和贫穷中。"},{"type":"paragraph","text":"文章揭露说，1961年南斯拉夫失业人数每月平均为十九万一千人，这比1960年增加了20％；而今年头四个月，每月平均失业人数竟达到二十七万八千人。企业管理者拿着高额薪金，放肆地进行贪污、受贿等舞弊行为，而工人的实际工资从去年12月到今年5月之间就减少了四分之一。由于批评管理人员而被“逐出企业”的人更是屡见不鲜。"},{"type":"paragraph","text":"文章说，在铁托集团“企业自治”制度下，能在市场上使竞争的对方失败、并能取得更多利润的企业，就是所谓“成功”的企业。"},{"type":"paragraph","text":"文章还指出，“企业自治”给南斯拉夫的经济造成了无政府状态和投机行为以及垄断化倾向。1961年，南斯拉夫有六百一十八个企业破产，今年头五个月由于商品销售困难而破产的企业就有二百五十九个。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e235a6f17"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
