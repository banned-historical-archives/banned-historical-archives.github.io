980,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见法国总统"},{"type":"paragraph","text":"新华社北京10月17日电  中共中央副主席邓小平今天上午在人民大会堂会见了法国总统吉斯卡尔·德斯坦。会见开始时，邓小平说，总统阁下在1974年就准备来中国看一看，现在这个愿望实现了，我们很高兴。我对总统阁下和夫人来我国访问表示欢迎。吉斯卡尔·德斯坦说，我很高兴作这次访问。你们正在制定新的方针，我很愿意更好地了解你们国家新的情况。记者退场后，两位领导人进行单独交谈。会见以后，邓小平设午宴款待吉斯卡尔·德斯坦总统和夫人等法国贵宾。"},{"type":"paragraph","text":"今天上午，国务院副总理兼外交部长黄华同法国外交部长让·弗朗索瓦—蓬塞举行了会谈。双方就当前的国际形势，着重就阿富汗、柬埔寨和中东形势交换了意见。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"339bfb098b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
