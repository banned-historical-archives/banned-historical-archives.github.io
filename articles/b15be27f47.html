级必须掌握革命领导权采取革命行动具有武装力量　指出消灭帝国主义剥削和达到社会主义是我们时代的根本问题","authors":[],"dates":[{"year":1963,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社科伦坡4日电】　锡兰工白领袖、锡兰共产党政治局委员桑穆加塔桑十月二日在这里举行的庆祝中华人民共和国成立十四周年的集会上发表演说，谈“中国革命的历史和教训”。他说:“中国革命的教训对于我们所有在帝国主义和殖民主义剥削的枷锁下遭受苦难的人们来说都有重要的意义，中国的榜样将为世界其他各地的人民所效法。”"},{"type":"paragraph","text":"参加这次庆祝集会的有工人、知识分子和僧侣等一千多人，桑穆加塔桑的讲话赢得了全体与会者雷动般的掌声。"},{"type":"paragraph","text":"他在详细地介绍了中国革命的历史和当前的形势之后说:“革命要取得胜利，就必须以马克思列宁主义的科学教导为指南，必须有能够把马克思列宁主义运用到自己本国的实际条件中去的领袖，革命的领袖必须具备对自己社会进行阶级分析的明确概念，能够分辨敌友，工人阶级必须在革命的每一阶段同一切友好的力量结成统一战线，革命的领导权必须掌握在工人阶级手中，必须采取革命的行动，工人阶级必须有自己的武装力量。”"},{"type":"paragraph","text":"他指出，“这就是可以从中国革命中学到的教训。”"},{"type":"paragraph","text":"他驳斥了帝国主义者和现代修正主义者诬蔑中国领导人要通过毁灭半个世界来推进世界革命的荒谬说法。他说，“我从来没有看到过更严重的这样睁着眼睛说瞎话的事例。”"},{"type":"paragraph","text":"他还驳斥了诬蔑中国领导人想以原子战争堆积死尸的指责，他说:“这的确是有趣的论据!显然，在这些大人先生们看来，同帝国主义斗争就等于堆积死尸。可是我们不同帝国主义斗争将会怎么样呢，帝国主义将会继续堆积死尸。它并不停止。这些大人先生们也许不了解，在帝国主义统治下过日子是怎么一回事。”"},{"type":"paragraph","text":"他说，“世界三分之二的人口处于帝国主义和殖民主义的剥削之下。我们怎样消灭帝国主义剥削和达到社会主义呢?这是我们时代的根本问题。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b15be27f47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
