"authors":[],"dates":[{"year":1951,"month":7,"day":27}],"is_range_date":false,"parts":[{"text":"津市“圣母军”仍在进行反动活动","type":"title"},{"text":"【天津分社二十七日讯】津市“圣母军”反动组织的死硬分子，仍在继续进行破坏活动，他们采取的办法有以下几个：(一)宣传“圣母军”是宗教，说“只有天津取缔圣母军，北京为什么不取缔呢?世界上为什么不取缔呢?”(二)以集体登记的方法，防止分化；(三)打击促进会积极分子，分化促进会；(四)应付政府，不理促进会；(五)造谣：说八月国民党就回来了；(六)教团员毁灭证据，造假记录，“多说不如少说，少说不如不说”。","type":"paragraph"}],"comments":[],"origin":"1951年7月28日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6aac489646"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
