rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"魏地拉总统离京前往杭州访问"},{"type":"paragraph","text":"阿根廷共和国总统魏地拉将军和夫人及其随行人员，由国务院副总理姬鹏飞和夫人许寒冰陪同，八日上午乘专机离开北京前往杭州参观访问。"},{"type":"paragraph","text":"在悬挂着中、阿两国国旗的首都机场上举行了欢送仪式。军乐团奏阿根廷国歌和中国国歌。魏地拉总统在姬鹏飞副总理陪同下，检阅了中国人民解放军陆、海、空三军仪仗队。"},{"type":"paragraph","text":"魏地拉总统和夫人在登上飞机前，同前来欢送的人大常委会副委员长谭震林，外贸部长李强，外交部副部长章文晋，交通部副部长郭建等，热情握手告别。"},{"type":"paragraph","text":"陪同魏地拉总统和夫人前往杭州访问的，还有中国驻阿根廷大使徐中夫和夫人段爱生，阿根廷驻中国大使保利诺·丹·阿·穆萨基约等。"},{"type":"paragraph","text":"魏地拉总统和夫人等阿根廷贵宾七日游览了颐和园。"},{"type":"paragraph","text":"《刘少奇同志永垂不朽》一书出版发行"},{"type":"paragraph","text":"《刘少奇同志永垂不朽》一书将在北京和全国各地新华书店陆续发行。"},{"type":"paragraph","text":"这本书收入了邓小平副主席在刘少奇同志追悼大会上的悼词，刘少奇同志治丧委员会公告、名单，《人民日报》社论《恢复毛泽东思想的本来面目——论为刘少奇同志平反》，以及刘少奇同志生平年表，并附有新华社记者写的有关文章三篇。这本书是人民出版社编辑出版的。"},{"type":"paragraph","text":"耿飚副总理结束访美离檀香山回国"},{"type":"paragraph","text":"耿飚副总理一行结束了在美国的访问，六月六日离开檀香山经东京回国。"},{"type":"paragraph","text":"美国驻太平洋地区武装部队总司令罗伯特·朗海军上将和夫人和夏威夷州长的夫人到机场为中国客人送行。"},{"type":"paragraph","text":"五日晚上，罗伯特·朗为耿飚举行了招待会。他在招待会上致词时说，耿飚的这次访问进一步加强了美中两国防务机构之间的联系，促进了两国关系的发展。"},{"type":"paragraph","text":"耿飚说，中美关系的发展不仅符合两国人民的利益，而且符合全世界人民的利益。他指出，要使太平洋地区真正太平，不仅需要美国，而且也需要太平洋沿岸国家作出努力。（均据新华社）"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0495917d3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
