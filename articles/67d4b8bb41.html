ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1938年2月28日）"},{"type":"paragraph","text":"中国抗战最后是必然胜利的，但必须经过许多困难。国民党的腐败与共产党力量的不足，日本的兵力不足与野蛮政策，再加上复杂的国际条件，造成了中国抗战的长期性，即持久战。中国抗战应有战略退却，前一段没有大踏步的进退，只是硬拼，这是错误的。应该知道保存实力到最后便能取得最后的胜利。日军的继续进攻，将使中国被割断为许多块，因此在原则上应分割指挥；以便于发展。将来战争的具体形势，是内线外线作战互相交错，日军包围我们，我们在战役上也包围日军。中国抗战要争取外援，但主要是靠自己，强调自力更生。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上关于抗日军事问题讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":2,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":48,"page_end":48},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67d4b8bb41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
