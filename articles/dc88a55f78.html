满热情友好气氛","authors":[],"dates":[{"year":1966,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京27日电　中国共产党中央委员会今晚举行宴会，招待由团长、日本共产党中央委员会总书记宫本显治，副团长、日共中央政治局常务委员、中央书记处书记冈正芳率领的日本共产党代表团全体同志。"},{"type":"paragraph","text":"中共中央副主席周恩来、朱德，政治局委员、书记处书记彭真、谭震林，政治局候补委员、书记处书记康生等同志，出席了宴会。"},{"type":"paragraph","text":"出席宴会作陪的，还有中共中央委员廖承志、林枫、刘晓、刘宁一、萧华，中央候补委员赵毅敏，以及中共中央机关、国家机关、各人民团体和中共北京市委的负责同志。"},{"type":"paragraph","text":"在北京的部分日本同志应邀出席了宴会。"},{"type":"paragraph","text":"宴会上宾主亲切交谈，充满了热情友好的气氛。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc88a55f78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
