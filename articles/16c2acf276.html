hors":["金凤"],"dates":[{"year":1949,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"北平各大学 热心学理论","type":"title"},{"text":"金凤","type":"authors"},{"text":"【本报讯】北平解放后各大学学生正普遍阅读钻研“新民主主义论”、“论联合政府”等书籍，并进一步有系统地学习唯物史观和新人生观等，提高理论水平。清华大学学生大半为理工科学生，在认识了业务学习必须结合政治学习以后，除努力学习科学文化知识外，现已邀请艾思奇同志作唯物史观的系统演讲。在讲到“论思想意识”时，听讲的人每次有二千多。除学生外，还有教授、讲助教、职员。北京大学由何干之同志讲授社会发展史，听讲者除选课学生外，还有不少旁听学生、教授、讲助教和城内的中学教师。礼堂里坐不下，就在礼堂外面听。艺术专科学校则每星期有专题演讲，由诗人艾青、作家胡风、音乐家贺绿汀等先后联系艺专实际情况，讲授新文艺、新艺术诸问题。","type":"paragraph"},{"text":"（金凤）","type":"paragraph"},{"text":"1949年5月27日人民日报电子版","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16c2acf276"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
