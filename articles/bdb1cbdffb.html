tes":[{"year":1991,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　由上海京剧院一团恢复排演的现代京剧《智取威虎山》昨天在人民大舞台与观众见面。"},{"type":"paragraph","text":"《智取威虎山》是上海京剧院一团在1958年创作并演出的优秀现代戏，“文革”中被江青等窃为己有，又被掺入私货。上海京剧院广泛听取观众意见后认为，这出戏着力塑造了一位革命战士的优秀形象，并成功地将戏曲的传统技巧与现代生活结合在一起，有文有武，对于向观众进行革命传统教育，普及京剧知识都有一定价值，一团在复排时删去了一些在“文革”中贴上去的语录，舞台调度也按照生活规律重新作了处理，去掉了“三突出”的东西。"},{"type":"paragraph","text":"剧中扮演杨子荣的是34岁的青年演员何\u003cIMG alt=请插入9号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1991\\10\\91AI0204AA.JPG\"\u003e。著名演员王梦云和尚长荣分别在剧中饰李母和李勇奇。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdb1cbdffb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
