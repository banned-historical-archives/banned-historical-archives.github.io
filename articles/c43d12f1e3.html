ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于各地成立革命委员会的程序的批语","alias":"","parts":[{"type":"paragraph","text":"关于各地成立革命委员会的"},{"type":"paragraph","text":"程序的批语"},{"type":"paragraph","text":"（1967年3月10日）"},{"type":"paragraph","text":"各省、市亦宜照此\"办理。凡条件不成熟者，要等待条件成熟，然后举行。处于无政府状态者，则先实行军管。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十日"},{"type":"paragraph","text":"[1]指周恩来1967年3月10日给毛泽东的报告。报告中说，昨夜得到主席关于北京市革命委员会成立之前要先开工人、农民、中学生代表会或群众大会的指示，我已告谢富治并给常委和文革小组各同志传阅，他们都很赞成。今早，我照此方针，以电话告天津解学恭（当时任中共天津市委第一书记），要他考虑先开大学、中学、工人、农民、机关革命派代表会议，然后再开全市革命组织协商会议和群众大会，宣布成立革命委员会的程序。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":3,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":358,"page_end":358},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c43d12f1e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
