ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"中央转发河北省委关于扩军工作的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发河北省委关于扩军工作的报告的批语"},{"type":"paragraph","text":"（1953年2月2日）各中央局、各大军区："},{"type":"paragraph","text":"此件\"请华东、西南、西北、中南、东北各中央局各大军区加以注意，以利在本区扩军运动中，纠正偏向，完成任务。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月二日"},{"type":"paragraph","text":"[1]指中共河北省委1953年1月24日关于扩军工作给华北局并各地委的报告。报告中说，目前河北省的扩军工作，已进入审查、集中、巩固新兵的阶段。从集中到县的部分新兵的审查情况看，全省完成扩军任务已有充分把握。但在地区之间发展不平衡，一些落后地区宣传工作与组织工作脱节，普遍发动与个别动员脱节。有的单纯强调自愿，忽视义务教育，把自愿看成自发，“坐等兵来”。在宣传中，只说大道理，不联系实际，也有的乱讲，甚至错误地宣传三不归（不死不归，不残不归，不打完帝国主义不归），形成对部分军属和新兵的思想压力。有的追求所谓“全民报名”形式，放松了对骨千分子的培养，障碍了扩军工作的开展。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":465,"page_end":465},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33b7c81bda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
