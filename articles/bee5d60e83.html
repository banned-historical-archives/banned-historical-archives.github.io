],"dates":[{"year":1952,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新乡专区领导干部右倾麻痹"},{"type":"paragraph","text":"几乎让大贪污犯溜走了"},{"type":"paragraph","text":"编辑同志：平原省新乡专区花纱布公司以至新乡专署、新乡地委等单位的领导同志，在反贪污、反浪费、反官僚主义运动中，有右倾麻痹思想，结果造成不良影响。当运动开始时，新乡专区花纱布公司领导同志对在职人员说：“咱们公司没有多大贪污数字，最多也超不过一千万元。”他的话被这个公司的会计、贪污分子关惠五钻了空子。关惠五假装诚心悔过，坦白自己贪污一千二百万零七百元。公司的检查小组听了关的坦白后，觉得数目有整有零，于是就信以为真，不加追查，还说：“坦白的很好。”二月一日，新乡专区召开检举贪污分子大会上，关惠五竟被当作贪污分子中自动坦白的典型，由新乡专署的专员当场宣告“予以免罪”，并大大地表扬了他的“坦白精神”。会后，关惠五背地里向和他一起贪污的人说：“他们（指地委和专署领导人）还领导整风？我这么大的数字都整不出来，只向他们说了一个零儿，就真认为我交代的很清楚、很坦白；而且还受到了表扬，这真是笑话！”直到最近，新乡地委接到别人对关惠五的检举材料，才知道关惠五是个最狡猾的盗窃国家资财一亿七千多万元的“大老虎”。"},{"type":"paragraph","text":"上面的事实，说明了新乡专区花纱布公司、新乡专署和新乡地委等单位领导同志的右倾麻痹思想是极严重的。这种右倾思想，直接阻碍了这个地区的反贪污、反浪费、反官僚主义运动。我认为除应给予蓄意蒙骗、不彻底坦白的大贪污分子关惠五以严厉的法律制裁外，并应责成新乡地委和新乡专区花纱布公司的负责干部对自己的右倾思想进行深刻检讨。石玉屏"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bee5d60e83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
