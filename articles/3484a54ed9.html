art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我乒乓球队答谢全国人民的关怀他们体会到只有活学活用毛泽东思想才能从胜利走向更大胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社十四日讯 参加第二十八届世界乒乓球锦标赛的中国乒乓球队，在今天出版的《体育报》上发表了一封公开信，对他们在锦标赛前后和锦标赛期间收到的国内外许多来信和来电中所给予的鼓励和关怀表示感谢。"},{"type":"paragraph","text":"公开信说，我们能够在世界锦标赛中取得优胜，是党的领导和关怀的结果，是全国人民鼓舞和勉励的结果。我们按照党的教导，学习了毛主席的著作，使我们明确了努力的方向。伟大的毛泽东思想照亮了我们前进的道路。我们深深体会到，只有活学活用毛泽东思想，才能不断前进，从挫败到胜利，从胜利到更大的胜利。"},{"type":"paragraph","text":"信中说，我们虽然取得了一些成绩，但是比起伟大祖国社会主义革命和建设事业其他方面的巨大成就，我们的贡献是很小的。而且，我们还存在不少缺点，在政治上、思想上、技术上都迫切需要提高。我们一定听毛主席的话，继续大学解放军，虚心向各个战线上的同志们学习，不辜负党和人民对我们的鼓励和期望。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3484a54ed9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
