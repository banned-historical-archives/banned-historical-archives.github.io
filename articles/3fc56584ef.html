ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对关于增强党的团结的决议草案的修改","alias":"","parts":[{"type":"paragraph","text":"对关于增强党的团结的"},{"type":"paragraph","text":"决议草案的修改\""},{"type":"paragraph","text":"（1954年1月）"},{"type":"paragraph","text":"阶级是由党领导着的，党又是由它的中央委员会领导着的，党的中央委员会还紧紧地依靠着一批忠实的有能力的高级干部。因此，党的中央委员会和省（市）委员会以上的负责干部和武装部队的高级负责干部的团结，尤其是决定革命胜利的最主要的关键。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"党的团结的利益高于一切，因此应当把维护和巩固党的团结作为指导自己言论和行动的标准，即有利于党的团结的话就说，不利"},{"type":"paragraph","text":"[1]中共中央关于增强党的团结的决议草案，是在北京起草后送到杭州请毛泽东审阅的。在毛泽东主持下，有跟他一起去杭州的同志参加，对决议草案作了大量的修改，但最初的改稿未能保存下来。现在看到的是1954年1月9日杨尚昆从杭州带到北京的决议草案稿。收入本篇的毛泽东的两处修改，就是改在这份决议草案稿上的。文中用宋体字排印的是毛泽东加写和改写的文字。"},{"type":"paragraph","text":"对关于增强党的团结的决议草案的修改于党的团结的话就不说，有利于党的团结的事就做，不利于党的团结的事就不做。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":507,"page_end":508},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fc56584ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
