”斗争报告的批示","authors":[],"dates":[{"year":1952,"month":3,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央转发贾拓夫关于西安市“五反”斗争报告的批示","type":"title"},{"text":"各中央局、分局转省市区党委：","type":"appellation"},{"text":"（一）贾拓夫同志关于西安市“五反”斗争的报告是好的，发给各地参酌仿行。","type":"paragraph"},{"text":"（二）“五反”中，市委和各区委及其所领导的一切力量，其工作方向，应分为前后两期。在前期，应以百分之八十的力量放在弄清占百分之九十五左右的工商户即前三类工商户的问题，并作出结论，组成“五反”统一战线这一方面，而只以百分之二十的力量放在后二类工商户方面；在后期，则反过来，以百分之八十的力量放在后二类工商户方面，而以百分之二十的力量处理前三类工商户的未了问题。决不可颠倒这个秩序，以致拖延时间，既不能迅速组成“五反”统一战线，又使经济生活不能早日恢复正常状态。望各地充分注意此点。","type":"paragraph"},{"text":" 中  央三月二十五日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e7ea5d298"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
