" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-291","name":"山西省交通厅关于离休老干部优先购票乘坐长途汽车的通知","author":"山西省交通厅","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"山西省交通厅关于离休老干部优先购票乘坐长途汽车的通知","dates":[{"year":1983,"month":11,"day":17}],"is_range_date":false,"authors":["山西省交通厅"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 488-489","tags":[{"name":"干部","type":"主题/事件"},{"name":"离休","type":"主题/事件"},{"name":"山西","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"山西省交通厅关于离休老干部优先购票乘坐长途汽车的通知"},{"type":"subtitle","text":"〔83〕晋交办字第387号"},{"type":"paragraph","text":"一、各地对离休老干部购票、乘坐长途汽车要给予方便。从八四年元月起，凡持“离休干部优待证”购票、乘车的老干部，可以优先购票、乘车，不必排队等候。二、敬老尊贤是社会主义精神文明的内容之一。各公路客运单位要加强对职工的思想教育，把对老干部的服务工作做为一项重要服务内容认真抓好，并进行评比检查。对服务热情周到的，要给予表扬，对差的，要批评教育，以促进树立敬老尊贤的良好社会风尚。三、在贯彻执行中有何问题，望及时向厅反映。一九八三年十一月十七日"}],"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3965d5a651"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
