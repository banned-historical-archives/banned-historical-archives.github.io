script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反抓丁　反剥削　反对扼杀言论自由  越南南方敌占区人民展开抗暴斗争","authors":[],"dates":[{"year":1972,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反抓丁　反剥削　反对扼杀言论自由"},{"type":"paragraph","text":"越南南方敌占区人民展开抗暴斗争"},{"type":"paragraph","text":"据新华社河内一九七二年八月十三日电　越南南方敌占区各城市人民，不顾美伪集团的法西斯镇压，继续展开反对美伪的斗争。"},{"type":"paragraph","text":"美帝走狗阮文绍继今年五月颁布“九项紧急措施”，六月强迫伪国会通过“特别权力”之后，又在七月十五日抛出了包括禁止罢工、示威和扼杀言论自由的所谓“保证后方安全法令”，大肆抓丁、抽税，妄图用法西斯恐怖统治，挽救美伪集团灭亡的命运。但是敌占区各阶层人民奋起反抗，最近掀起了反对敌人抓丁的斗争。许多地方的青壮年组成了自卫队，以棍棒、石头、匕首为武器，老人、妇女等组成放哨队、报信队，随时准备对付前来强行抓丁的敌人。许多地方的群众还拦阻抓丁的军车，夺回被抓走的青年。阮文绍颁布“保证后方安全法令”后的第三天，朔庄市爆发了七千人的大示威，反对阮文绍集团把四百多名僧侣抓去当兵。示威群众高举标语牌并同前来镇压的伪军警进行激烈搏斗，烧毁敌人一辆吉普车，砸坏了三辆摩托车，并摧毁了敌人关押四百多名僧侣的朔庄市运动场的围墙。被抓的僧侣也用棍棒反击敌人，打伤一名军官，打坏一辆吉普车。"},{"type":"paragraph","text":"西贡和其他城市的工人、小商贩和工商业者反对美伪集团加紧剥削和敲诈的斗争，也不断发生。七月十九日下午，在边和省胡乃美军基地工作的数百名女工，不愿受敌人的污辱，严厉地惩罚了美国侵略军，打伤多名，其中有一名美军少校被打得头破血流。"},{"type":"paragraph","text":"西贡新闻界反对美伪集团扼杀言论自由的斗争也继续发展。一些报纸不顾阮文绍的法西斯法令，继续揭露和谴责美国—阮文绍集团加强法西斯统治的阴谋手段，并且报道各城市人民的迫切愿望与斗争情况。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a98c6d7417"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
