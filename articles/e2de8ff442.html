<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"凤阳县武店公社党委关于整风整社情况的报告","authors":[],"dates":[{"year":1961,"month":4,"day":18}],"is_range_date":false,"parts":[{"text":"凤阳县武店公社党委关于整风整社情况的报告","type":"title"},{"text":"武店公社3年死亡14,952人(1960年就死亡11,992人)，占总人口的27％，严重的地方死亡人口达50％以上。凤淮大队小唐家96人，死掉52人，占54.16％。3年外流人口达3,766人。","type":"paragraph"},{"text":"全社被体罚的群众有1,285人，其中被处死95人，被扣饭的1,622户，3,760人，不仅如此，干部还贪污腐化，多吃多占，甚至拦路抢劫，正如群众说的:“偷、抢、扒、拿，无所不为”。在坏人当道的情况下，群众政治上受压迫，经济上受摧残，生活穷困，身体衰弱，无心生产和过日子，纷纷外逃。","type":"paragraph"},{"text":"公社7个书记中有6个有问题，有3个是五类干部。……赵楼大队副赵传举恶毒地说：“群众是奴隶，不打骂不扣饭就不行”，“全大队没有一个好人”。去年一年他打过30多个社员，有的被打伤，有的被处死。群众称他是“活阎王”。……全社原有生产小组长以上干部1,163人，犯有违纪错误的达265人，占22.2％。这些干部利用各种手段处罚群众，捆绑吊打、拘留关押、扣粮扣饭、罚劳役等。全社被体罚的群众有1,285人，其中被处死的95人，被扣饭的1,622户，3,760人。不仅如此，他们还贪污腐化，多吃多占，甚至拦路抢劫……","type":"paragraph"},{"text":"1958年以来，特别是1959年冬和1960年春，大批人口外流和非正常死亡，牲畜大量减少，农具严重破坏，房屋倒塌，土地荒芜，粮烟产量下降。据调查统计：","type":"paragraph"},{"text":"全社3年死亡14,952人(1960年就死亡11,992人)，占总人口的27％，严重的地方死亡人口达50％以上。凤淮大队小唐家96人，死掉52人，占54.16％。3年外流人口达3,766人。","type":"paragraph"},{"text":"大家畜减少2594头，占原有的37.3％，大型农具毁坏2655件，占原有的43.3％。","type":"paragraph"},{"text":"房屋减少5895间，占原有房屋的17.4％。","type":"paragraph"},{"text":"粮食减产，1960年只收了1,100万斤，比1959年的1,631万斤减少531万斤，比1958年的2,493万斤减少1,385万斤。1960年全社18万亩土地有收益的只有10万亩，种上无收的2万亩，荒掉的6万亩，占总田亩的33％。","type":"paragraph"}],"comments":[],"origin":"1961年4月18日《武店公社党委关于整风整社情况的报告》，见《乡村三十年──凤阳农村社会经济发展实录(1949—1983)》(北京：农村读物出版社，1989)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2de8ff442"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
