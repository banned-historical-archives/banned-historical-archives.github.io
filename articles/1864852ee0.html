script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"希腊马克思列宁主义组织祝贺我国庆毛主席领导中国人民从胜利走向胜利","authors":[],"dates":[{"year":1970,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京六日电　中国共产党中央委员会主席毛泽东同志，中国共产党中央委员会副主席林彪同志和中国共产党中央委员会收到了希腊马克思列宁主义组织的贺信，信件最热烈地祝贺中华人民共和国成立二十一周年。贺信全文如下:毛泽东主席，林彪副主席，中国共产党中央委员会，亲爱的同志们:"},{"type":"paragraph","text":"值此中国革命胜利二十一周年之际，希腊马克思列宁主义者和全体革命共产党人向中国共产党致以最热烈的敬意。"},{"type":"paragraph","text":"欢乐的心情交织着我们为红色中国而感到的自豪。无比强大的红色中国巍然屹立在东方，这些日子她正在庆祝建国二十一周年。这个震撼环宇的新胜利，丰富了被压迫阶级、被压迫人民和被压迫民族的斗争的宝库。在巴黎公社之后，伟大的十月无产阶级革命和中国革命为在当代席卷全球的被压迫者进行的各种形式的复杂斗争开辟了新的道路和前景。中国革命还为拥有七亿人口的幅员广阔的中国奠定了社会主义的基础。在篡夺了列宁和斯大林的党和国家政权的叛徒集团无耻地背叛了马克思主义原则和世界革命的利益之后，中国就成了全世界共产党人和一切革命者的先锋队和根据地。"},{"type":"paragraph","text":"亲爱的同志们，革命在全中国取得胜利的前夕，敬爱的毛泽东主席曾经指出:“夺取全国胜利，这只是万里长征走完了第一步。如果这一步也值得骄傲，那是比较渺小的，更值得骄傲的还在后头。”二十一年内发生的事实证明了这一天才的预见。中国人民生活水平的提高，重大的科学技术成就，无产阶级文化大革命的胜利，第九次全国代表大会的光辉成就，这一切使我们坚信，这一长而光荣的“短小的序幕”将继续下去，直到社会主义在中国和全世界取得最后的、彻底的胜利。"},{"type":"paragraph","text":"这一信念是建立在中国共产党党员和干部以及其他干部的坚韧不拔的战斗性之上的。他们在敬爱的毛泽东主席的领导下，带领英雄的中国人民从胜利走向胜利。这一信念也是建立在我们战无不胜的旗帜的正确性之上的。我们的旗帜是努力奋斗和牺牲的旗帜，是成功和胜利的旗帜。"},{"type":"paragraph","text":"亲爱的同志们，在希腊人民和他们优秀的儿子遭受着美国占领者及其当地的法西斯代理人的压迫的时候，希腊的马克思列宁主义者，不管他们在什么地方，都在竭尽全力完成落在他们身上的反对帝国主义及其同伙社会帝国主义的斗争任务和义务。"},{"type":"paragraph","text":"我们相信，曾经多次以自己的斗争证明是不会屈服的希腊人民，也决不会在这次新的考验面前屈服，而将继续斗争，直到取得给他们带来独立、自由和民族繁荣的最后胜利。"},{"type":"paragraph","text":"全世界马克思列宁主义者的战斗团结万岁!"},{"type":"paragraph","text":"伟大的中国革命胜利二十一周年万岁!"},{"type":"paragraph","text":"祝世界革命的基地、全世界共产党人和革命者的希望与骄傲——中国的人民民主万古长青和日益发展!"},{"type":"paragraph","text":"中国人民英雄的领导者——以全世界共产党人敬爱的领袖毛泽东主席为首的中国共产党万岁!"},{"type":"paragraph","text":"被压迫人民和民族反对帝国主义、社会帝国主义和一切反动派的战斗团结万岁!"},{"type":"paragraph","text":"我们不朽的和战无不胜的旗帜——马克思列宁主义、毛泽东主席的思想万岁!"},{"type":"paragraph","text":"希腊马克思列宁主义组织"},{"type":"paragraph","text":"于巴黎"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1864852ee0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
