ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"同意陆军大学设在南京","alias":"","parts":[{"type":"paragraph","text":"同意陆军大学设在南京"},{"type":"paragraph","text":"（1950年9月13日）同意陆大设在南京"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十三日"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府人民革命军事委员会代理总参谋长聂荣臻1950年9月13日报告的批语。"},{"type":"paragraph","text":"[2]聂荣臻的报告说：关于陆大校址问题，曾拟以香山作为临时校址，先行开学，择地修建校舍，后拟将长辛店营房改作陆大临时校舍。今天约苏联军事顾问柯托夫、康略夫一同去看，他们均认为作陆大校舍太不合适，提议在长春、天津、南京等地另找地址。又据由华东方面来的同志谈，南京原国民党办的陆大校址设备颇全，可容3000人，现华东军政大学校部即驻此。同时南京附近尚有原伪各军校址数处，似可调整。我认为，为节省开支与时间，同时北京又无适当校舍，暂设在南京为好（利用伪陆大设备）。如主席同意，当派人去南京看房子，商量调整房舍。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":156,"page_end":156},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2237473156"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
