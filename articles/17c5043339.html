<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日社会党书记长江田被迫辞职  多数代表在党代会上猛烈批判江田右倾路线","authors":[],"dates":[{"year":1962,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日社会党书记长江田被迫辞职"},{"type":"paragraph","text":"多数代表在党代会上猛烈批判江田右倾路线"},{"type":"paragraph","text":"新华社28日讯　东京消息：日本社会党昨天召开为期三天的第二十二次代表大会。出席大会的四百多名代表听取了书记长江田三郎的报告后，围绕江田三郎的所谓“社会主义新理想”展开了激烈的争论。由于代表们纷纷抨击江田三郎推行右倾路线，江田被迫于昨天夜里向委员长河上丈太郎提出辞呈，并且表示他不参加下任书记长的选举。"},{"type":"paragraph","text":"据报道，在昨天大会上，铃木茂三郎—佐佐木更三派、和平同志会派的代表批判江田的路线，并指出江田关于“社会主义新理想”的讲话违背社会党的纲领。在发言的二十二位代表中，有十六人明确反对江田的方针，只有二人支持江田。"},{"type":"paragraph","text":"东京和福冈的社会党地方组织在会上联合提出批判江田的决议。大会以二百三十二票对二百一十一票通过了这项决议。这项决议宣布，江田所坚持的“社会主义新理想”在社会党内引起了混乱，并对此表示遗憾。决议要求江田进行反省。日本电台说，这项决议实际上是对江田提出不信任案。"},{"type":"paragraph","text":"与此对抗，支持江田的派系提出了一项为江田辩护的决议，但它因为得不到过半数票的支持，未能通过。"},{"type":"paragraph","text":"据报道，社会党委员长河上丈太郎昨天深夜召开中央执行委员会紧急会议，研究江田辞职问题。河上今天宣布，他已让江田在大会于最后一天改选领导人以前继续担任书记长职务。社会党内各派正在酝酿担任书记长的新人选。"},{"type":"paragraph","text":"社会党的这次代表大会预定通过1963年度运动方针和对外政策。大会听取了执行机构拟定的1963年运动方针草案。草案主张社会党要达到五项政治目标：一、在地方选举中获得胜利，解散国会和推翻池田内阁；二、为反对经济萧条和“贸易自由化”的影响以及争取降低物价和改善人民生活而斗争；三、争取修改使工人受害的“企业合理化”计划，建立使小农能维持他们的经济的农业结构；四、阻止日本同南朝鲜建交，宣布日本为无核武器地区，在日本和亚洲建立巩固的和平；五、通过这些斗争阻止修改宪法，并争取使宪法应用于人民生活的各个领域。"},{"type":"paragraph","text":"草案谈到对外政策时强调社会党要继续奉行不结盟的“积极中立政策”。草案不谈美帝国主义对日本的威胁，只说"},{"type":"paragraph","text":"“随着日本垄断资本扩充它们的实力，产生了对日本的和平和安全非常危险的局势。”"},{"type":"paragraph","text":"草案在提到社会党对中国的态度时指出：“虽然在第八届禁止原子弹和氢弹世界大会期间同中国的意见出现了某些分歧，社会党的促进同中国的友谊和争取同中国恢复外交关系的基本政策并没有改变。”"},{"type":"paragraph","text":"草案对民主力量的统一斗争，采取不合作的态度。而主张“组织自己的行动”。"},{"type":"paragraph","text":"大会在第二天分组继续讨论江田的报告和运动方针草案。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17c5043339"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
