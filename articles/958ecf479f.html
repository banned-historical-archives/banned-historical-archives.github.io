script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺古巴人民武装起义十二周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺古巴人民武装起义"},{"type":"paragraph","text":"十二周年的电报"},{"type":"paragraph","text":"（1965年7月25日）哈瓦那古巴社会主义革命统一党全国领导委员会第一书记、古巴革命政府总理菲德尔·卡斯特罗·鲁斯同志，古巴共和国总统奥斯瓦耳多·多尔蒂科斯·托拉多同志："},{"type":"paragraph","text":"在古巴人民庆祝武装起义十二周年的时候，我们代表中国人民、中国共产党和中国政府，向兄弟的古巴人民、古巴社会主义革命统一党和古巴革命政府，表示热烈的祝贺。"},{"type":"paragraph","text":"十二年前古巴人民发动的七月二十六日武装起义，开辟了古巴人民革命走向胜利的道路。革命胜利以后，古巴人民坚持斗争，反对美帝国主义的侵略和干涉政策，保卫了自已的祖国和革命的果实，为维护世界和平作出了重大的贡献。"},{"type":"paragraph","text":"古巴人民的革命和胜利，两个哈瓦那宣言的革命精神，鼓舞了拉丁美洲人民争取解放的斗志和信心。现在，拉丁美洲人民反美帝、反独裁的民族民主革命运动正在走向新的高涨。"},{"type":"paragraph","text":"中古两国人民的战斗友谊是在反对美帝国主义的斗争中锻炼成长的，是建立在马克思列宁主义和无产阶级国际主义的原则基础上的，是经得住考验的。在反对美帝国主义、争取世界和平、民族解"},{"type":"paragraph","text":"毛泽东等祝贺古巴人民武装起义十二周年的电报放、人民民主和社会主义的共同斗争中，中国人民将永远同古巴人民相互支持，共同前进。"},{"type":"paragraph","text":"祝古巴人民的革命和建设事业不断取得新的胜利。祝中古两国人民的战斗友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年七月二十五日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":7,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":120,"page_end":121},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"958ecf479f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
