script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周总理接见陈子平大使时严正指出不管美帝怎么办中国将继续根据越南人民利益和要求 随时采取一切必要行动援越抗美到底尽管美帝国主义、各国反动派和现代修正主义使用各种手段中伤和挑拨我们两国人民的关系，历史的发展决定了我们两国人民要团结在一起，战斗在一起，胜利在一起，这是历史发展的必然趋势，是不以人们意志为转移的。","authors":[],"dates":[{"year":1966,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京17日电　中华人民共和国国务院总理周恩来，今天下午接见了越南民主共和国驻中国大使陈子平。"},{"type":"paragraph","text":"陈子平大使向周恩来总理递交了越南民主共和国主席胡志明十七日发表的《告全国同胞书》。"},{"type":"paragraph","text":"陈子平大使表示，越南人民决不在敌人的威胁面前屈服，越南南北方人民将给予敌人以更沉重的打击，粉碎美帝国主义企图用战争威胁来迫使越南人民屈膝投降的阴谋。越南人民将克服一切困难，不惜任何牺牲，决心把抗美救国斗争进行到底。"},{"type":"paragraph","text":"陈子平大使代表越南劳动党、越南民主共和国政府和越南人民，感谢中国共产党、中国政府和中国人民对越南人民抗美救国斗争一贯给予的最坚决、最及时、最有力和最有效的支持。陈子平大使指出，中国共产党是伟大的、光荣的马克思列宁主义的党，中国人民是用马克思列宁主义和毛泽东思想武装起来的伟大的人民，中国是一个彻底革命的国家，有了七亿中国人民的支持和所有社会主义国家人民的支持，越南人民的抗美救国斗争，一定会取得最后胜利。"},{"type":"paragraph","text":"周恩来总理感谢陈子平大使交来胡志明主席的《告全国同胞书》，并且对越南劳动党、越南民主共和国政府和全体越南人民把抗美救国斗争进行到最后胜利的坚定决心，表示热烈的赞扬和支持。"},{"type":"paragraph","text":"周恩来总理说，中越是唇齿相依、患难与共的两个社会主义国家，我们两国人民在反对帝国主义的斗争中，从来是相互同情和相互支持的。目前首先是越南人民的伟大的抗美救国斗争支持了我们，全力支援越南人民是中国人民义不容辞的国际主义义务。不管美帝国主义怎么办，中国将继续根据越南人民的利益，根据越南人民的要求，随时采取一切必要的行动，支援越南人民的伟大斗争，直到最后胜利。"},{"type":"paragraph","text":"周恩来总理在谈到中越两国人民革命的友谊时指出，尽管美帝国主义、各国反动派和现代修正主义使用各种手段中伤和挑拨我们两国人民的关系，历史的发展决定了我们两国人民要团结在一起，战斗在一起，胜利在一起，这是历史发展的必然趋势，是不以人们的意志为转移的。"},{"type":"paragraph","text":"周恩来总理表示相信，在胡志明主席的领导下，三千一百万越南人民，坚决斗争，不惜一切牺牲，必将取得最后胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04db575fef"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
