script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"花言巧语骗来移民 千方百计横加剥削","authors":[],"dates":[{"year":1957,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京21日电】　纽约消息:“纽约邮报”最近在连续登载的四篇通讯中透露出纽约州北部的黑人和来自波多黎各的移民工人所过的非人生活。"},{"type":"paragraph","text":"波多黎各的工人被美国包工头诱骗到美国做工。雇主和包工头本来答应移民工人每天平均挣7、8块钱的工资，但结果有些工人每星期所得的工资远远不及这个数字，有些时候甚至只挣2角5分。"},{"type":"paragraph","text":"一遇霜冻或干旱，耕作和收割就要推迟许多天。农场工人就没有工作，得不到工资，只得吃空他们仅有的一点点积蓄，然后就只好借债。移民欠雇主和包工头的债是永远还不清的。穷凶极恶的雇主和工头可以任意削减工人的工资。他们甚至还用恫吓或暴力扣除工人的全部工资。许多移民工人从一开始做工一直到离开时始终欠着债。"},{"type":"paragraph","text":"虽然州里的法律规定最低限度的劳动年龄是14岁，但是生活逼迫9岁、10岁的移民儿童天天要在地里干整天的活。只有在吃饭的时间才能休息一下。"},{"type":"paragraph","text":"移民工人和黑人的劳动安全是没有任何保障的。通讯里叙述一个在农场上采樱桃时从树上跌下来而跌肿了腿的女工的遭遇。工头立即对这个女工痛加咒骂，并且把她赶出农场，因为她不能再干活了。她只得到两块钱的工资，作为她两三个星期的劳动的报酬。"},{"type":"paragraph","text":"移民工人和黑人住在破烂的小棚子里。这些小棚子是用涂柏油的纸、硬纸板和铅皮搭成的。这种看上去要倒塌的破房子还要经得起美国北部的风霜和寒冷。两星期前，就有一所房子着火烧毁。一个23岁的移民工人被活活地烧死。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cfe807849"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
