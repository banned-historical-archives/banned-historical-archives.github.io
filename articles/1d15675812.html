ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给欧阳山尊、朱丹、成随的信","alias":"","parts":[{"type":"paragraph","text":"给欧阳山尊、朱丹、成荫“的信"},{"type":"paragraph","text":"（1942年11月23日）欧阳山尊、朱丹、成荫同志："},{"type":"paragraph","text":"你们的信收到了，感谢你们！你们的剧我以为是好的，延安及边区正需看反映敌后斗争生活的戏剧，希望多演一些这类的戏。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月二十三日"},{"type":"paragraph","text":"[1]欧阳山尊（1914—2009)，湖南浏阳人。曾任八路军一二〇师政治部战斗剧社社长。1942年10月至1943年4月任鲁迅艺术文学院晋西北分院院长。朱丹（1913—1978），后改名朱丹西，北京人。当时任八路军一二O师政治部战斗剧社副社长。成荫（1917—1984），上海松江人。当时任八路军一二O师政治部战斗剧社政治指导员。"},{"type":"paragraph","text":"[2]指成荫等创作的反映当时敌后斗争生活的《晋察冀的乡村》《荒村之夜》《虎列拉》《自家人认自家人》《求雨》等剧。1942年冬，八路军一二O"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":11,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":285,"page_end":285},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d15675812"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
