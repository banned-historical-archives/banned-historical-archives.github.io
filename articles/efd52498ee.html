tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席最关心我们干部","authors":["北京部队某部连长黄国良"],"parts":[{"type":"paragraph","text":"在全国军民热烈响应毛主席的要斗私，批修的伟大号召，掀起大办毛泽东思想学习班的高潮中，传来了伟大领袖毛主席的最新指示：“军队办学习班要有战士参加。”毛主席的这一最新指示，是我军建设的千年大计，万年大计。我坚决拥护，绝对照办！"},{"type":"paragraph","text":"毛主席最了解我们干部，最关心我们干部。毛主席的这一最新指示，真是说到我们的心坎里。回想起我刚当干部的时候，还能和战士同吃、同住、同娱乐，心连着心，有什么话都能互相讲；后来由于渐渐脱离了群众，与战士的距离也就越来越远了。自从响应林副主席的号召，活学活用毛主席著作以来，我的思想有了很大的进步。尤其通过这次参加毛泽东思想学习班，和战士坐在一起活学活用毛主席著作，斗私批修，一起忆苦思甜，一块促膝谈心，使我真正认识到，战士学习毛主席著作最好，最听毛主席的话，最忠于毛主席，对毛主席的感情最深，斗私批修最坚决、最彻底。许多生动的事实教育了我，使我学到了不少东西。我决心在两个阶级、两条道路、两条路线斗争的大课堂中，永远虚心向战士学习，永远和战士心连心。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efd52498ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
