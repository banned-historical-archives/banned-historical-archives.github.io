ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"加紧准备粉碎蒋介石严重进攻","alias":"","parts":[{"type":"paragraph","text":"加紧准备粉碎蒋介石严重进攻！！"},{"type":"paragraph","text":"（1940年11月1日）"},{"type":"paragraph","text":"（甲）蒋介石已通知我们应在十一月二十日以前，将在华中与山东新四军、八路军一律开至华北。近日蒋又令汤恩伯、李品仙各率部立开豫皖，准备期满后向华中进攻，皖南、鄂中亦必有进攻布置。（乙）你们应立即开始加紧军事政治各方面的准备，补充兵员，厉行整训，征集资材，加紧根据地的创造与巩固，加强友军中统战工作，预先向内部与民众宣传，并预计如何打破蒋介石的这一严重进攻。预先向内部民众宣传反共如何是罪恶，是为至要。"},{"type":"paragraph","text":"[1]毛泽东和朱德、王稼祥致电刘少奇、叶挺、项英、张云逸、陈毅、蕙克诚、彭雪枫、李先念，发出加紧准备粉碎蒋介石严重进攻的指示。这是"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":175,"page_end":175},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b201cc9fb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
