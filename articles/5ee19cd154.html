script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持四项基本原则　反对资产阶级自由化  国家机械委党组开展正面教育","authors":["袁建达"],"dates":[{"year":1987,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持四项基本原则　反对资产阶级自由化"},{"type":"paragraph","text":"国家机械委党组开展正面教育"},{"type":"paragraph","text":"本报讯　记者袁建达报道：新组建的国家机械工业委员会党组，在新旧机构交接和转变管理职能的繁忙工作中，对领导干部进行坚持四项基本原则、反对资产阶级自由化的正面教育，促进改革、开放顺利进行。"},{"type":"paragraph","text":"在最近结束的全国机械工业厅局长座谈会上，机械委党组书记、主任邹家华强调，要组织广大干部和职工，认真学习党中央关于坚持四项基本原则，反对资产阶级自由化的文件，开展正面教育，在重大问题上分清是非，统一认识。"},{"type":"paragraph","text":"这个委的党组成员带头学习党中央有关文件，还采取短期脱产轮训的办法，分期分批组织机关司局级党员干部和在京直属企事业单位党政主要领导干部，认真学习文件和中央领导同志的重要讲话。"},{"type":"paragraph","text":"到目前为止，他们先后举办了5期轮训班，有170多名领导干部参加了学习。中国汽车工业总公司党委根据国家机械委党组的要求，也举办了两期领导干部脱产学习班，轮训了公司机关近40名司局级干部。"},{"type":"paragraph","text":"参加学习的领导干部以解决根本政治原则和端正政治方向为目的，回顾党的十一届三中全会以来全国经济战线，特别是机械、兵工工业持续发展的大好形势，认真读书，一致感到党中央及时向全党发出开展反对资产阶级自由化斗争意义深远，至关重要。"},{"type":"paragraph","text":"参加学习的同志认为，反对资产阶级自由化，必须以党的十一届三中全会以来的路线为准绳，防止以“左”批右，在认真开展反对资产阶级自由化的同时，要坚决贯彻执行改革、开放、搞活的政策。不少同志表示要认真研究如何改进作风，改进工作，不能因为反对资产阶级自由化，而掩饰自己工作中的缺点错误。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ee19cd154"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
