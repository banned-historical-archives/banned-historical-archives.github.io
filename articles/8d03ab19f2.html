76,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"鸡毛确实要上天了"},{"type":"paragraph","text":"邓小平诬蔑赤脚医生“知识少”、“水平低”，胡说赤脚医生“不能一步登天”。但是，事实是对邓小平最有力的批判。"},{"type":"paragraph","text":"去年四月份，陕西省神木县城关公社乔庄则大队一位贫农的女孩李姣娥患了胸脓肿。她的父亲把她带到城关公社高家塔合作医疗站，请赤脚医生治疗。高三璋等几位赤脚医生决心尽最大努力，治好李姣娥的病。"},{"type":"paragraph","text":"李姣娥开始很怕医生，又哭又叫。几位赤脚医生认为只有帮助孩子消除恐惧感，得到孩子的配合，才能做好手术。于是，有的买来了糖果，有的找来了玩具，有的同孩子拉话。李姣娥看到这些赤脚医生这么可亲，很快就和他们熟了，消除了恐惧，较好地配合了治疗。"},{"type":"paragraph","text":"穿胸手术要求较高，穿刺浅了，不出脓，穿刺深了，可能要损伤肺。高三璋对于这种手术经验不多。事先，他翻阅了大量资料，做了充分准备工作。手术开始了，一个同志在旁边稳定孩子情绪，高三璋屏住呼吸，仔细体会针感，当他感到针头有一种空心感的时候，就果断地抽出针芯，黄绿色的脓液顿时涌流了出来。手术以后，经过二十多天的精心治疗和护理，李姣娥健康地走出了高家塔合作医疗站。"},{"type":"paragraph","text":"高家塔合作医疗站，从一九六五年建立以来，门诊、出诊病人四万余人次；高三璋和其他几位赤脚医生一起，抢救垂危病人二百多人次，动手术二百多例。这些生动的事实不正是对邓小平最有力的批判吗！邓小平诬蔑赤脚医生“知识少”、“水平低”，咒骂赤脚医生“不能一步登天”，他以为翻案的冷风一吹，就会把社会主义新生事物的春苗吹掉，就会把毛主席定的“城市老爷卫生部”的案翻过来。他却打错了如意算盘。春苗茁壮，顶风傲霜。正如毛主席指出的：“穷人要翻身了。旧制度要灭亡，新制度要出世了。鸡毛确实要上天了。”经过文化大革命，赤脚医生、合作医疗和其它社会主义新生事物茁壮成长。无产阶级、贫下中农掌握了医疗卫生大权。党内最大的不肯改悔的走资派邓小平想阻止历史车轮前进，那是白日作梦！"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d03ab19f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
