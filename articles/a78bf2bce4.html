ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"给刘昆林“的信","alias":"","parts":[{"type":"paragraph","text":"给刘昆林的信"},{"type":"paragraph","text":"（1945年1月11日）昆林同志："},{"type":"paragraph","text":"来信收到。此信及以前各信均已转给中组部，并请他们找你一谈。"},{"type":"paragraph","text":"你长期不被信任，难怪你不满意。但真金不怕火烧，还是应该有耐心，等候同志们了解你，除此都不是出路。看你此次的信，你的问题似乎可以获得解决了，更希望你耐心等候。"},{"type":"paragraph","text":"这一向颇忙，我们暂时不谈。你在延安有一个停留，将来再谈吧。"},{"type":"paragraph","text":"此致同志的敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十一日[1]刘昆林（1898一1980)，湖南桃江人。当时是中共中央党校学员。"},{"type":"paragraph","text":"刘民林惑两壮局报待所圆·毛体"},{"type":"paragraph","text":"为念的的礼!平十月毛泽东致刘昆林信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":1,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":283,"page_end":284},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a78bf2bce4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
