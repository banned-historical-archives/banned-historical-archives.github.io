ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对谢富治在沈阳冶炼厂蹲点的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对谢富治在沈阳治炼厂"},{"type":"paragraph","text":"蹲点的报告“的批语"},{"type":"paragraph","text":"（1964年12月5日）一波同志："},{"type":"paragraph","text":"[1]指中共辽宁省委沈阳冶炼厂工作队1964年11月12日报送的《沈阳冶炼厂资本主义经营管理方法种种》的简报。这个简报是公安部部长谢富治率领工作队在沈阳冶炼厂蹲点的报告。报告中说，冶炼厂职工在两个半月的“五反”运动中，初步揭发的严重问题是：一、打击报复和把头作风；二、领导干部特殊化；三、不讲阶级路线，任用坏人；四、搞资本主义经营管理。群众对第四个问题意见最大。他们揭发的资本主义经营管理方法有八种表现：（一）弄虚作假，欺骗国家；（二）损公利厂，不顾整体；（三）损人利已，剥削友邻；（四）贱买贵卖，唯利是图；（五）买空卖空，投机倒把；（六）奖金挂帅，物质刺激；（七）科学实验，为名为利；（八）胡花滥用，浪费惊人。资本主义经营管理有三个危害：（一）阻碍技术革新，阻碍生产发展；（二）腐蚀干部队伍，腐蚀工人阶级；（三）破坏团结，破坏协作。冶炼厂搞资本主义经营管理的根子是：（一）苏联旧企业框框和修正主义的影响。（二）资本主义（包括封建主义）旧势力的影响。（三）和来自上边的影响也不无关系。（毛泽东在这句话后面批注：“不是不无关系，而是主要根源。”）"},{"type":"paragraph","text":"[2]一波，即薄一波，当时任中共中央政治局候补委员、国务院副总理兼国家经济委员会主任。毛泽东全集第四十七卷"},{"type":"paragraph","text":"此件是否可以转发中央各部委，各中央局，各省、市、区党委领导同志看看，请酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月五日"},{"type":"paragraph","text":"二送朱、贺、罗、陈毅、定一、康生、冷西阅后，退一波。"},{"type":"paragraph","text":"我们的工业究竟有多少在经营管理方面已经资本主义化了，是三分之一，二分之一，或者还更多些，要一个一个地清查改造，才能知道。而要这样做，必须派政治上很强的工作队分期分批去做。谢富治同志这个报告很可一看。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月五日"},{"type":"paragraph","text":"[1]中共中央1964年12月7日以中发[64]775号文件将谢富治的蹲点报告和毛泽东关于这个报告的批语转发各中央局，各省、市、自治区党委，中央各部委，国家机关各党委、党组。"},{"type":"paragraph","text":"[2]朱，指朱德。贺，指贺龙，当时任中共中央政治局委员、国务院副总理。罗，指罗瑞卿，当时任中共中央书记处书记、国务院副总理。陈毅，当时任中共中央政治局委员、国务院副总理兼外交部部长。定一，即陆定一，当时任中共中央书记处书记、国务院副总理。康生，当时任中共中央政治局候补委员、中央书记处书记。冷西，即吴冷西，当时任新华通讯社社长、《人民日报》总编辑。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":297,"page_end":298},"tags":[{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"103cab9197"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
