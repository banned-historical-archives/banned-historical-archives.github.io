art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"反对广告宣传中的资产阶级自由化倾向","authors":[],"parts":[{"type":"paragraph","text":"会议指出，广告作为一种传播经济信息的手段，在促进生产，扩大流通，指导消费，活跃经济，方便人民生活等方面发挥了积极的作用。但是，近几年来在广告经营和广告内容、设计等方面还存在着一些问题，出现了精神污染现象。有些经营广告的单位有“一切向钱看”思想，不问广告内容真实与否，谁给钱就登谁的广告，致使内容虚假、欺骗群众的广告时有出现。有的单位用给个人回扣的办法，乱拉广告，搞不正之风。有的广告低级庸俗，伤风败俗，不符合社会主义精神文明；有的广告在宣传某些商品特别是外国商品时，不注意国家的政策和我国国情，造成不良影响。"},{"type":"paragraph","text":"为了防止和清除精神污染，全国广告管理干部会议要求各地工商行政管理部门加强对广告的管理，对于违反国家政策、法令，有损我国民族尊严和有淫秽、丑恶、迷信内容的广告，以及有诽谤性宣传和违反国家保密规定的广告，要禁止刊登、播放、设置和张贴。要求广告经营单位端正经营思想，反对“一切向钱看”的思想和唯利是图的作法。法。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cb9381720"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
