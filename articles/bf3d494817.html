ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"对刘少奇在全国组织工作会议上的报告稿的批语","alias":"","parts":[{"type":"paragraph","text":"对刘少奇在全国组织工作会议上的"},{"type":"paragraph","text":"报告稿的批语"},{"type":"paragraph","text":"（1951年3月30日）看过，同意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月卅日"},{"type":"paragraph","text":"第十七页上删去两句\"，因为不能或不愿加入那些人民团【体】的人们，例如资产阶级，富农，民主党派，民主人士，并不都是不良分子或落后分子。"},{"type":"paragraph","text":"代表们讨论中或者有些好意见，可据以修改或充实这个报告。"},{"type":"paragraph","text":"[1]刘少奇报告稿第三部分“关于发展新党员的问题”中原来的一段话是：“党所领导的人民群众的团体，例如：新民主主义青年团、工会、农民协会、合作社、妇女联合会、文化工作者的团体等，都是党联系人民群众的纽带，也是党向人民群众进行共产主义教育的场所。凡有这些团体组织的地方，那里的工人、农民、青年、妇女或其他劳动人民入党，必须是这些团体的团员或会员，不能或不愿加入这些团体的人，也就是说，人民中的不良分子或落后分子，一般的不应该接收他们入党。”毛泽东审阅时，删去了其中的“也就是说，人民中的不良分子或落后分子”。"},{"type":"paragraph","text":"对刘少奇在全国组织工作会议上的报告稿的批语"},{"type":"paragraph","text":"又：三年准备十年建设的思想，请你在会议中讲一下，使他们有所准备。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":198,"page_end":199},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf3d494817"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
