tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"结合实际学了就用","authors":["学习毛主席著作积极分子/昆明部队某部副政治指导员陶圣光"],"parts":[{"type":"paragraph","text":"林彪同志说，学习毛主席著作，要真正学到，会用，就必须结合实际。这个指示太重要了。今年三月，我们连接受一项生产任务，当时任务重，时间紧，劳动强度大，环境艰苦。我和同志们学习了毛主席“下定决心，不怕牺牲，排除万难，去争取胜利”的教导以后，想到学了就要用，就要行动，我就按照毛主席的教导，拣重担子挑。哪里的土不好挖，我就挖哪里。哪件工具不好用，我就用哪件。手上打了二十多个泡，我就用手帕包起来坚持劳动。后来被战士们发现，说什么也不让我再干了。我笑着说：“这算啥，革命哪能怕苦怕疼！”继续和大家一块干。战士们的劲头更大了。就这样，我们一直干到天黑，超额完成了任务。"},{"type":"paragraph","text":"这件事使我认识到，学习毛主席著作，只有结合实际，才学得懂，记得住，用得上。今后我一定按照林彪同志的指示，紧密结合自己的思想实际和工作实际，学了就用，落实行动，在用字上狠下功夫，把毛泽东思想真正学到手。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7edad5756a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
