ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"占领粤桂川滇黔五省所面临的两个问题须立即去办","alias":"","parts":[{"type":"paragraph","text":"占领粤桂川滇黔五省所面临的"},{"type":"paragraph","text":"两个问题须立即去办！"},{"type":"paragraph","text":"（1949年5月28日）"},{"type":"paragraph","text":"（一）不但华东方面急需大量人民票？，这是应当迅速支付的；华中方面要求增加人民票的电报估计不久也会来，这是应当预作准备的；而且必须准备今年九月以后占领粤桂川滇黔五省所需要的人民票，也需立即开始筹办。（二）九月份以后占领粤桂川滇黔五省所需要的干部以三万名计算，也须马上做出计划，通知各区遵办。"},{"type":"paragraph","text":"[1]邓小平、饶漱石、陈毅、曾山23日致电中央及中财部请求拨300亿元人民票应急。毛泽东将此电报批送周恩来、朱德、刘少奇、陈云，请他们商酌相关问题，这是批示中关于占领粤桂川滇黔五省的两大问题。曾山，当时任华东财经委员会主任、上海市副市长。"},{"type":"paragraph","text":"[2]人民票，这里是指当时流通的人民币。中国人民银行1955年3月1"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":441,"page_end":441},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a77b1b221a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
