art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在毛泽东思想光辉照耀下胜利前进","authors":["于素荣"],"parts":[{"type":"paragraph","text":"正当全国人民满怀战斗豪情、热烈庆祝党的“九大”胜利召开一周年的大喜日子里，传来了振奋人心的大喜讯：我国第一颗人造地球卫星发射成功了！当我听到卫星播送的《东方红》乐曲，激动的心情久久不能平静。去年十月一日，在天安门观礼台上，正是在《东方红》乐曲声中，我见到了日夜想念的伟大领袖毛主席。今天听到卫星播送的《东方红》乐曲，我的心又飞到了毛主席的身边。"},{"type":"paragraph","text":"毛主席啊，毛主席！我国科学技术的飞速发展，我们伟大社会主义祖国所取得的一切成就，都是在您老人家的光辉思想照耀下取得的。无数事实证明，您老人家的光辉思想是战无不胜的精神原子弹，是我们各项工作的根本指导方针。"},{"type":"paragraph","text":"毛主席啊，毛主席！我的每一点进步，也都是您老人家的光辉思想哺育的结果。在“九大”精神的鼓舞下，在连队党支部和同志们的帮助下，我努力学习您老人家关于无产阶级专政下继续革命的伟大理论，逐渐懂得了：革命战士的一生，应当是斗争的一生，同帝、修、反斗，同国内的一小撮阶级敌人斗，同自己头脑里的各种非无产阶级思想斗，同一切艰难困苦斗，一直战斗到生命的最后一刻。我把您老人家关于两个“务必”的伟大教导牢牢地铭刻心头，时刻想着为巩固无产阶级专政、为实现共产主义的远大目标而奋斗。毛主席啊，毛主席！回顾入伍一年来的成长过程，我深深体会到，要做一个继续革命的先锋战士，就必须用您老人家关于无产阶级专政下继续革命的伟大理论武装头脑，统帅行动。今后，我一定要进一步用您老人家的光辉思想武装头脑，在继续革命的伟大征途上奋勇向前，争取更大的胜利。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad50cad3da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
