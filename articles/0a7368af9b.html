"year":1950,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东号"},{"type":"paragraph","text":"（中篇连载）"},{"type":"paragraph","text":"丁克辛  轻影  作  庄言  插图"},{"type":"paragraph","text":"三十四、“你自动来了，太美啦！”"},{"type":"paragraph","text":"原来老英雄昨天添乘（注一）回来，就从运转主任那里得到了“毛泽东号”要进关的消息；运转主任还说："},{"type":"paragraph","text":"“说不定还会叫你去呢。”"},{"type":"paragraph","text":"老英雄当下心里就有了底：张代表准要叫他去的。于是就对运转主任说："},{"type":"paragraph","text":"“今儿回家呀，不在机务段住了。”"},{"type":"paragraph","text":"锦州、长春、沈阳相继解放之后，伙伴们就嚷进关，而且互相打赌，看谁去谁不去。当时老英雄就说："},{"type":"paragraph","text":"“先不要嚷，等到真要进关不要又拉稀！”"},{"type":"paragraph","text":"那时候老英雄原是有准备的，现在机会真的来了，还能错过？决定请求进关，不过他做事素来仔细，考虑周到，他想这事先得跟家里人商量好，因此当天晚上他就回家了。"},{"type":"paragraph","text":"不料家里人都没有意见，真叫老英雄欢喜不尽。老父亲说共产党来了工人不愁吃穿，以前没吃的，现在吃饱了，以前没住处，现在有房子住了，有困难还要救济，还有什么不放心的？老伴也说，他进关工资还在这里开，家里又纺线，饿不着，家里的事不用他管。小女儿云香更高兴，抱住他的脖子，说这回爸爸进关，英雄的名儿就更大了，全中国都会知道。"},{"type":"paragraph","text":"可是睡下以后，他想起了一个问题：“大家要是不欢迎他上车怎么办？他是已经离开车的人了！”这样一想，翻来覆去，好久睡不着。……"},{"type":"paragraph","text":"第二天一早，他怀着忐忐忑忑的心到段上找到郭树德他们。恰好他们正在开会，有人老远一见他，就大声喊："},{"type":"paragraph","text":"“老英雄上车不上车？”"},{"type":"paragraph","text":"老英雄赶紧走上几步笑着说："},{"type":"paragraph","text":"“大家要我，我就上车。”"},{"type":"paragraph","text":"人们一阵子呱哒呱哒大鼓掌，表示热烈的欢迎，这时他心里的石头才噗通落了地。"},{"type":"paragraph","text":"郭树德马上说道："},{"type":"paragraph","text":"“老英雄，大家都欢迎你，你自动来了，太美啦！说吧，你需要多少安家费？我借给你。我人口比你少，没关系。”"},{"type":"paragraph","text":"老英雄一下子就握住了郭树德的双手，挤着泪花说道："},{"type":"paragraph","text":"“郭大车，我没有什么困难，可不能再让你费心了！”"},{"type":"paragraph","text":"郭树德道："},{"type":"paragraph","text":"“咱们工人阶级，共产党毛主席领导咱们，谁有困难应当互相帮助，我有了困难，还要你多帮助哩。”"},{"type":"paragraph","text":"别人也都说："},{"type":"paragraph","text":"“咱们这次进关，大家更要团结互助，对老英雄要特别照顾。”"},{"type":"paragraph","text":"这叫老英雄感动得不知说什么好。"},{"type":"paragraph","text":"注一：指导司机等跟着跑车叫添乘。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a7368af9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
