":[{"year":1952,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社北京七日电:日本资产阶级通讯社共同社四日发表了该社政务次长津吉秀夫的一篇文章，这篇文章承认:日本吉田卖国政府和它的美国主人最近签订的奴役日本的美日“行政协定”，已遭到日本人民的强烈反对。津吉秀夫说:“行政协定”“在‘日本’国内的反应是出乎意料的坏”。他指出:“大多数国民对行政协定所采取的态度和从前在和约与安全条约签字时的态度相比较，表现出很高的批评力。”甚至若干“对政治极为冷淡”的知识分子“对这个协定也都感到强烈的不满和不安”。津吉秀夫又说:在国会中，各在野党派将“行政协定”问题联系着对吉田政府预算草案的审议，“向政府猛烈攻击”，“发出了尖锐的批评。”津吉秀夫承认:日本各阶层人民对“行政协定”的严厉抨击是“理所当然的事”。他说:因为，“不难预料”，“这个协定的后果将直接成为国民生活中痛苦的重担”。向美国驻军提供军事基地、物资、劳务和维持费、治外法权以及关于所谓“紧急状态”的规定等，“都对国民生活有极大的影响”。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54b7b63650"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
