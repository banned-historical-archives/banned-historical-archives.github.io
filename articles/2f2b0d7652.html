tps://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/ff92c783-256c-487a-abd2-8e59e9be6390.pdf"],"article":{"title":"毛泽东接见中央军委会议同志时的谈话（节录）","alias":"","parts":[{"type":"paragraph","text":"毛泽东接见参加中央军委会议同志时的谈话（节录）"},{"type":"paragraph","text":"（术经之席审闵）"},{"type":"paragraph","text":"（一九七三年十二月二十一日）（同未德网忘提手时说）老总啊，你好吗？你是红司令啊！人家讲你是黑司令，我总是批他们，我说是红司令，还不是红了吗？（对来德阅志）来、毛啊：你是朱（借），我是来（）身上的毛啊！我看贺龙同搞做了。我要负责呢。当时我对他讲T：你呢，不同，你是一个方面军的旗帆，要保护你。总也保护他呢。不过这个人经常身上有武器。（总理：一小手枪，后未交了。）要翻案呢，不然少了想龙不好。杨一余、集也要翻案呢，都是林搞的。我是听了林一面之终，所以我射了错误。小平讲，在上海的时供，-18-"},{"type":"paragraph","text":"87对多墙理搞突热我么，他不消意。我赞成免。也是听了称起的话，登了罗墙阅死。有几次听一要之待，就是不好呢，向同忘们做点自我批评完。SELFCRITICISM（自我批评），自我找评。：民停中办"}],"authors":["毛泽东"],"dates":[{"year":1973,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":89},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f2b0d7652"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
