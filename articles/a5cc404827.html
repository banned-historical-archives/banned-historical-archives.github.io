ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"关于转载上海工商界批评高方的报道的批语","alias":"","parts":[{"type":"paragraph","text":"关于转载上海工商界批评高方的报道的批语"},{"type":"paragraph","text":"（1957年9月25日）乔木、冷西同志："},{"type":"paragraph","text":"批评高方，写得很好，请转载在人民日报上。以后请鼓励这样有充分说服力的批评。现在的批评中，有很大一部分缺乏充分的说服力，提倡浮夸，很不切实。右派浮夸，左派不应当浮夸。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿五日"},{"type":"paragraph","text":"[1]指1957年9月22日《新民报》晚刊刊登的《摆事实，讲道理，比过去，看现在一工商界舌战右派高方》的报道。1957年9月29日，《人民日报》作了转载，题为《这次辩论进行得好一介绍上海工商界对右派分子高方的说理斗争》。高方，当时任上海统益纱厂总管理处副总经理。"},{"type":"paragraph","text":"[2]乔木，即胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。冷西，即吴冷西，当时任新华通讯社社长、《人民日报》总编辑。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":9,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":234,"page_end":234},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5cc404827"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
