art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"非洲人民对中国共产党和毛主席寄予无限希望和信任","authors":[],"parts":[{"type":"paragraph","text":"刚果（布）新闻与公民教育部办公厅主任戈马·恩干加说：中华人民共和国不断地保卫和建设着社会主义，实行和平政策，但是不拿和平作买卖，并且不遗余力地维护社会主义阵营各国在真正的马克思列宁主义和无产阶级国际主义基础上为团结。同时，还尽一切力量支持亚洲、非洲和拉丁美洲被压迫为人民反对以美帝国主义为首的帝国主义、新老殖民主义的野蛮侵略。人们始终可以听到中国的正义呼声，它为人类的解放日益起着重要的作用。亚洲、非洲和拉丁美洲人民在共同的斗争中所结成的坚强友谊，得到了中国的珍视和保护。据我个人在好客的中国逗留期间的观察和体验，我深深地感到这一点。"},{"type":"paragraph","text":"兄弟的中国人民！请你们放心，全非洲人民、特别是刚果（布）人民，对你们共和国的光荣的党和亲爱的毛泽东主席是寄予无限的希望和同情的。他们对你们的革命的历史作用的信任是不可动摇的。万恶的美帝国主义者和现代修正主义者反对中华人民共和国，道理很简单，因为他们看到六亿五千万中华儿女不肯再受剥削，不肯再在他们面前屈膝。"},{"type":"paragraph","text":"让他们去仇恨吧，这太好了。如果敌人向你道贺，那你就应立即想到你犯了严重错误。"},{"type":"paragraph","text":"兄弟的中国人同，我谨向你们表现出的勇气和英明的毛主席致敬。我很敬佩毛泽东同志。我向你们和毛主席，表示衷心的祝贺，祝你们在社会主义光荣大道上取得更加辉煌的成就。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92f329c29e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
