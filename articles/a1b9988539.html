"authors":[],"dates":[{"year":1966,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京27日电　人民文学出版社和文物出版社分别出版的《毛主席诗词》(三十七首)简体字横排袖珍本，将于国庆节前后陆续在全国各地新华书店普遍发行。文物出版社还影印了大量的毛主席诗词手稿单页，也将在国庆节前后陆续向全国各地发行。"},{"type":"paragraph","text":"毛主席诗词是毛主席光辉著作的重要组成部分。亿万革命群众无限热爱我们伟大的领袖毛主席，迫切希望得到《毛主席诗词》。几年来，虽然出版了好几种版本的《毛主席诗词》，但远远不能满足广大革命群众，特别是工农兵读者的需要，他们迫切要求出版能够随身携带、便于工农兵阅读的简体字横排袖珍本《毛主席诗词》。出版社和印刷厂的革命职工为了满足革命群众的要求，争取在国庆节前出书，他们争分夺秒，日夜赶印，充分发挥了革命干劲。"},{"type":"paragraph","text":"文物出版社影印出版的毛主席诗词手稿，除继续印制已经发行的小型单页以外，最近又新出了八种适于在室内悬挂或张贴的中型单页(三开或四开)。这八种手稿的题目是:《水调歌头·游泳》、《菩萨蛮·黄鹤楼》、《采桑子·重阳》、《清平乐·会昌》、《忆秦娥·娄山关》、《七律·长征》、《清平乐·六盘山》、《七绝·为李进同志题所摄庐山仙人洞照》。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1b9988539"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
