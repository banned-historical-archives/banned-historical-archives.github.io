<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"繁荣诗歌创作的光辉文献——学习《毛主席给陈毅同志谈诗的一封信》","authors":["石方禹"],"dates":[{"year":1978,"month":1,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石方禹"},{"type":"paragraph","text":"春回大地，阳光普照，文艺园地清除了“四人邦”的蔓藤荆棘，又是一片花团锦簇的美妙景色。在这大好春光中，我们欣读《毛主席给陈毅同志谈诗的一封信》，压制不住满腔喜悦的心情。伟大的领袖和导师毛主席的诗篇光芒万丈，是我们学习的典范。毛主席历来十分关心诗歌的创作和发展，曾多次作了光辉指示；给陈毅同志谈诗的一封信，总结了我国诗歌创作的丰富经验，指明了诗歌创作的艺术规律和艺术方法，并且为我国新诗的发展指明了方向和道路。这是我们诗歌工作者感到无限幸福的一件大事，也是我国文艺界的一件大事。"},{"type":"paragraph","text":"“诗要用形象思维”。毛主席在这封信中，三次指明了这个诗歌创作和一切文艺创作的规律和方法，读之使人感到真理的光辉总是那样明亮、朴素，而更为重要的是为我们提供了批判“四人邦”的又一锐利武器。"},{"type":"paragraph","text":"诗是语言的艺术，而且是概括性很强的语言艺术，但它不是一般的抽象语言或逻辑语言，而是形象的语言，形象之中又寓有哲理光辉，寓有语言本身不能完全包罗的思想和意境，所以诗是艺术的十八般武器中难度较大的一种。叙事诗应当在系统完整的情节的自然流露中塑造人物形象，表现主题思想。抒情诗也同样要求有一定的情节，尽管它可能是片断的，极为浓缩的；它所表达的思想感情，也是阶级社会中特定的人物的思想感情，哪怕它有时是通过第一人称的“我”来表达的。一首好的抒情诗，往往是可以通过电影导演和摄影师拍摄为画面的。例如毛主席的光辉诗句“西风烈，长空雁叫霜展月。霜晨月，马蹄声碎，喇叭声咽。”这里不但有情节，有画面，有动作，甚至连画面的季节、色调、音响效果，以至于画面的剪辑，都跃然纸上，读之令人浮想联翩，沐浴在无限的革命乐观主义的思想光辉之中，无限意境油然而生。这是生动的形象的语言。我们可以在伟大领袖毛主席的许多光采照人的诗篇中找到类似的诗句，它们生动地告诉我们:伟大的无产阶级革命导师和伟大的无产阶级诗人毛泽东同志是如何运用形象思维创作出不朽的诗篇。毛主席的诗词具有高度的思想性，是百读不厌，永垂不朽的，也是我们学习运用形象思维构思诗歌作品的光辉典范。"},{"type":"paragraph","text":"一切思维都从属于生活，都是客观生活的反映，这是唯物主义反映论的颠扑不破的真理。诗歌同其它文艺形式一样，是现实生活的反映。诗歌形象，是诗人对社会上各种人物和各种生活形式、斗争形式的观察、研究分析、体验的产物。人民群众的生活，永远是诗歌形象的母亲。离开生活，便没有形象本身，也便没有真实的艺术。正是因为有了叱咤风云戎马倥偬的井冈山的斗争和万里长征的雪山草地刀光剑影，伟大领袖毛主席才给我们留下诸如《忆秦娥·娄山关》这样光华夺目的诗篇!"},{"type":"paragraph","text":"可是，万恶的“四人邦”出于篡党夺权的反革命政治的需要，大搞阴谋文艺，竭力把文艺创作的思想搞乱，同林彪和陈伯达狼狈为奸，相互勾结，竭力否定文艺创作的特殊规律和方法，竟然恶毒批判形象思维，妄图从根本上否定艺术创作上客观存在着的形象思维，公然把矛头指向我们的伟大领袖和导师毛主席，这激起我们广大诗歌工作者的极大忿慨。“四人邦”否定形象思维，实际上是否定文艺工作者深入工农兵生活的重要性，否定社会生活是艺术创作的沅泉。他们大肆鼓吹“主题先行”，“从路线出发”，恰恰说明他们是一伙贩卖唯心主义认识论的政治骗子，其狼子野心是利用文艺进行篡党夺权的反革命活动，为复辟资本主义制造舆论。在“四人邦”罪恶魔爪控制之下的上海戏剧午台和电影银幕，一时出现了一批所谓“民主派就是走资派”的人物，这是他们对于社会主义生活的无耻捏造和恶毒毁谤，也是他们反革命政治纲领的演绎和杜撰，本来经不起生活的无情检验。无独有偶的是在诗歌领域中，也出现了一首所谓批“资产阶级法权”(应为资产阶级权利)的“长诗”，恶毒咒骂我们的久经革命斗争锻炼的老干部是果着“铜锈”、戴着“法权项链”的新的“奴隶主”。这首诗是贩卖“四人邦”的政治等于艺术、概念混同形象的绝妙反面教材，它足以说明“四人邦”鼓吹“从路线出发”，“主题先行”等等谬论，会把我们的诗歌创作引向多么可悲的死胡同中去。在“四人邦”蓄意搞乱了的创作思想的混水中，也曾经冒出了一些空喊豪言壮语，或者玩弄文字游戏的“诗篇”，而生活的空虚和形象的贫乏却是这些作品所无法遮盖的。毛主席曾经严峻地指出，在“四人邦”的文化专制主义的严密控制之下，“没有小说，没有诗歌”，“四人邦”是破坏我国社会主义诗歌创作的凶恶敌人。"},{"type":"paragraph","text":"诗歌创作是社会主义文艺百花园中十分重要的一个领域，建国以来许多诗人在诗歌创作所表现的主题和形式，以及技巧和风格等方面，都进行过多方面的探索。《毛主席给陈毅同志谈诗的一封信》科学地总结了诗歌艺术的规律和方法，也指明“将来趋势，很可能从民歌中吸引养料和形式，发展成为一套吸引广大读者的新体诗歌。”这是繁荣我国社会主义诗歌的极为重要的文献。作为诗歌工作者，我们要学习毛主席的光辉思想，努力创作，努力实践，创一代诗风，让诗歌的花朵鲜艳夺目地盛开。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"528fa01767"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
