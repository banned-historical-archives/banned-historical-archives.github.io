中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"对全党干部研究列宁《左派幼稚病》一书的第二章的指示","alias":"","parts":[{"type":"paragraph","text":"工作，我们有了暂察冀区平山县的典型经验。关于如何在老区调剂土地而不是平分土地（因为那里已经平分了）的工作，我们有了陕甘宁德县黄家川的典型经验。现今又有了暂区转县这样一个平分土地的经验（虽不完全）。这个经，值得印成一个小册子，发给每个乡村的工作干部，这种叙逃典型经验的小册子，比我们的导机关发出的决和指示文件，要生动丰富得多，能够使缺乏经验的同志得到下手的办法，能够有力的击破在党内严重地存在着的无马列主义的命合主义和尾巴主义。各中央局、中央分局及前委的领导同志们，在对自己领导的各项重要工作发出决和指示之后，应当注意收集和传播经过选择的典型的经验，使自已领导的群众运动按着正确的路向前发展。现在是成千万的人民群众依照党所指出的方向向着封建的买办的反动制度展开进攻的时侯，导者的责任，就是不但指出斗争的方向，规定斗争的任务，而且必须总秸具体的经验，向群众迅速传播这些经验，使正确的获得推广，错的不致重犯。"},{"type":"paragraph","text":"对《关于新区工作问题的检讨》的批示"},{"type":"paragraph","text":"（一九四八年四月）"},{"type":"paragraph","text":"××同志的这种负的自我检讨是很好的，有了这样的自我检讨，就有使广大干部逐步学会党的策略观点与政策观点的可能；而没有全盘的策略观点与政策观点，中国革命是永远不能胜利的。最可怕的是领导干部的自满自足，自已缺乏策略观点和政策观点，而又对中央的指示熟无赌（不看这些指示，不研究这些指示，忙于不应该忙的事务工作，而忽略了策略指导和政策指导，这种自已责任上的主要工作）。我们要求各地负责同志每两月做一次粽合性的工作报告，就是要求将这种策略与政策的规定，策略与政策在实行后的结果，及根据这种果而做出的自我检讨（这些就是各地负青同志日常工作的主要工作）向中央作报告。"},{"type":"paragraph","text":"对全党干部研究列宁《左派幼稚病》一书的"},{"type":"paragraph","text":"第二章的指示"},{"type":"paragraph","text":"（一九四八年六月）"},{"type":"paragraph","text":"请同志们看此书的第二章，使同志们懂得必须消灭现在存在于我们工作中的某些严重的无律状态，或无政府状态。"},{"type":"paragraph","text":"《整风文献》中国共产党中央委员会关于南斯拉夫"},{"type":"paragraph","text":"共产党问题的决"},{"type":"paragraph","text":"（一九四八年七月十日）"},{"type":"paragraph","text":"（一）中国共产党中央委员会完全同意由保、罗、匈、波、苏、德、捷、意各国共产党所参加的情报局会关于南斯拉夫共产党问题所通过的决。举行这个会并通过这个决"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":112,"page_end":112},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8a1d7b9bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
