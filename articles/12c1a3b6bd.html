script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"明确了新时期工人阶级的历史使命和工会工作的基本方针、任务  中国工会第九次全国代表大会胜利闭幕  汪东兴副主席等出席闭幕式，朱学范同志致闭幕词","authors":[],"dates":[{"year":1978,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"明确了新时期工人阶级的历史使命和工会工作的基本方针、任务"},{"type":"paragraph","text":"中国工会第九次全国代表大会胜利闭幕"},{"type":"paragraph","text":"汪东兴副主席等出席闭幕式，朱学范同志致闭幕词"},{"type":"paragraph","text":"新华社北京十月二十一日电　中国工会第九次全国代表大会圆满地完成了各项任务，今天下午在人民大会堂胜利闭幕。"},{"type":"paragraph","text":"这次大会历时十一天。代表们通过学习、讨论，明确了新时期工人阶级的历史使命和工会工作的基本方针、任务。"},{"type":"paragraph","text":"大会一致通过了关于倪志福同志代表中华全国总工会第八届执行委员会向大会所作的工作报告的决议，一致通过了关于修改中国工会章程的决议。"},{"type":"paragraph","text":"大会选举产生了中华全国总工会第九届执行委员会。其中执行委员一百九十三名，候补执行委员八十五名。"},{"type":"paragraph","text":"下午四时，举行了隆重的大会闭幕式。"},{"type":"paragraph","text":"中共中央副主席汪东兴同党和国家其他领导人余秋里、倪志福、陈慕华、王震、谷牧、康世恩出席了闭幕式。"},{"type":"paragraph","text":"闭幕式开始，首都六百多名佩戴着红领巾的少年儿童，手持鲜花，在嘹亮的鼓号声中热烈欢呼着涌进会场。两名少先队员满怀激情地朗颂了献给新时期的中国工人阶级的诗《崇高的敬礼》，二十三名少年儿童登上主席台，向党和国家领导人以及大会执行主席献了花。这时，全场掌声雷动，一片欢腾。"},{"type":"paragraph","text":"接着，朱学范同志致闭幕词。他说，华主席、叶委员长为大会的题词和邓副主席代表党中央、国务院向大会的致词，把马列和毛主席关于工人运动的理论具体运用于解决我国工人运动在新时期面临的问题，指明了我国工人阶级新的伟大历史使命，指明了我国工人运动前进的方向。这一切，必将对我国工人运动和工会工作的发展产生巨大的和深远的影响。"},{"type":"paragraph","text":"他说，具有光荣革命传统的我国工人阶级，绝不辜负华主席、党中央的殷切期望，有志气、有能力、有信心、有决心，加快步伐，勇往直前，为在本世纪内把我国建设成为社会主义的现代化强国作出更大的贡献。"},{"type":"paragraph","text":"在热烈的掌声中，朱学范宣布大会胜利闭幕。乐队高奏《国际歌》。"},{"type":"paragraph","text":"在这次大会期间，有四十一位代表在全体会议上发言，五十六位代表作了书面发言。石油、冶金、水电、纺织、化工、邮电、交通、商业等工交财贸各部，分别邀请各行业的代表举行了座谈。"},{"type":"paragraph","text":"整个大会开得热气腾腾，使全体代表受到极大的教育和鼓舞。他们决心把这次会议的精神，带回自己的战斗岗位，把党中央的战斗号令，迅速变成广大工人群众的自觉行动，朝着四个现代化的伟大目标奋勇前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"汪东兴","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12c1a3b6bd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
