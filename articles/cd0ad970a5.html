s":[{"year":1977,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马西埃总统和夫人由李副总理陪同瞻仰毛主席遗容"},{"type":"paragraph","text":"新华社一九七七年九月二十一日讯　赤道几内亚共和国总统马西埃和夫人今天上午由国务院副总理李先念和林佳楣同志陪同，前往毛主席纪念堂瞻仰了毛泽东主席的遗容。"},{"type":"paragraph","text":"马西埃总统在毛主席坐像前默哀，并献了花圈。花圈的缎带上写着：“伟大的毛泽东主席，中国人民、第三世界和全世界的伟大导师，当代杰出的革命家，强大的现代中国的最伟大缔造者，您的赤道几内亚兄弟悼念您，您永远活在我们之中”。"},{"type":"paragraph","text":"由马西埃总统率领的赤道几内亚共和国代表团全体成员也前往瞻仰。（附图片）"},{"type":"paragraph","text":"赤道几内亚共和国总统马西埃和夫人，由国务院副总理李先念和林佳楣同志陪同，前往毛主席纪念堂，瞻仰毛主席遗容。马西埃总统和夫人在毛主席坐像前肃立默哀，并献了花圈。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd0ad970a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
