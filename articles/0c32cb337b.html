script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴特寮电台广播  揭露老挝极右派部队侵犯解放区  右派军队士兵不愿卖命纷纷摆脱控制向人民投诚","authors":[],"dates":[{"year":1974,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴特寮电台广播"},{"type":"paragraph","text":"揭露老挝极右派部队侵犯解放区"},{"type":"paragraph","text":"右派军队士兵不愿卖命纷纷摆脱控制向人民投诚"},{"type":"paragraph","text":"新华社一九七四年七月二十五日讯　据巴特寮电台广播，老挝极右派最近接连出动飞机和部队侵犯老挝解放区。"},{"type":"paragraph","text":"广播说，从七月六日至十二日，极右派出动各种类型飞机达一百三十五架次，接连对琅勃拉邦省南博等地以及二十三号公路沿线地区进行侦察飞行。"},{"type":"paragraph","text":"在此之前，在临时民族联合政府刚成立后的十七天中，即从四月六日至二十二日，极右派接连出动数十架飞机侵入波里坎塞省解放区，对芒坎格和芒欣奔进行侦察和挑衅飞行。四月十六日，极右派出动飞机多批，对川圹省的查尔平原、丰沙万、康开等地区和七号公路沿线进行侦察飞行。六月二十六日，极右派出动许多架飞机，侵入沙湾拿吉省解放区上空进行挑衅。当地军民立即给予还击，击落入侵的敌机一架。"},{"type":"paragraph","text":"广播在揭露老挝极右派出动部队进犯沙湾拿吉省解放区时说，四月三日，极右派出动军队进攻沙湾拿吉省更谷县的一些村庄，屠杀人民，并且抢走一些财物。"},{"type":"paragraph","text":"广播还揭露美国军事人员改头换面继续赖在老挝，指挥老挝极右派的部队。"},{"type":"paragraph","text":"新华社一九七四年七月二十五日讯　据巴特寮电台广播，老挝右派军队不少士兵不愿为老挝右派和美帝国主义卖命，毅然摆脱右派的控制，向人民投诚。"},{"type":"paragraph","text":"七月十日和十一日，有三名右派军队的士兵携带武器在琅南塔省芒努县向人民投诚。"},{"type":"paragraph","text":"据统计，自万象协定签订以来，老挝右派军队官兵向爱国军民投诚的已达六百一十八人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c32cb337b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
