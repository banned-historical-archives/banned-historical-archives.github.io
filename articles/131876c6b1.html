<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1975,"month":5,"day":5}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苏修高喊“互利”是假大搞剥削是真保舆论要求“经互会”改变不平等的工农业产品比价","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年五月四日讯 保加利亚舆论继续要求苏修控制的“经互会”提高农产品和食品价格，改变不平等的工、农业产品比价，以减少农产品出口国所受的损失。"},{"type":"paragraph","text":"保加利亚《国际关系》季刊一九七四年第四期发表文章，抱怨“经互会”内部现行农产品和食品贸易价格不符合“互利原则”。文章援引苏联一个经济学家的材料指出，一九七一年“经互会”成员国相互贸易的合同价格根本脱离了世界市场价格，机器和设备的价格比世界价格高百分之十九，而农产品和食品价格比世界价格低百分之十九。文章说，“由于许多客观原因，农业和食品工业的生产费用继续上涨”，世界市场的农产品近年来也因这种趋势而提高了价格，但是“经互会”国家这方面的贸易价格“几乎未变”。这样，“经互会”内出口农产品和食品的国家就“不能保证收回生产费用”，“互利变成了对出口国的不利和损失”。"},{"type":"paragraph","text":"不久前在保加利亚出版的一些书籍也指出，“经互会”内现行的工、农业产品比价“在很大程度上已经过时”，“经互会”现行的价格制度“存在着一系列缺陷”，不利于出口农产品的国家。"},{"type":"paragraph","text":"按照“经互会”的“国际分工”，保加利亚是一个生产和出口大量农产品和食品的国家。它出口给苏联的新鲜蔬菜、水果、卷烟占它这些产品总产量的百分之五十左右，食品罐头占百分之七十八。长期以来，由于“经互会”内不平等的工、农业产品比价，保加利亚受到很大损失。一九七一年，保加利亚向苏联的出口总值为十四亿零九百二十万列弗（保加利亚货币），其中农产品和食品占百分之四十四点二。如按前述苏联经济学家的计算，这一年“经互会”的农产品和食品的贸易价格比世界市场低百分之十九，仅此一项，苏联就剥削了保加利亚一亿四千六百多万列弗。"},{"type":"paragraph","text":"近年来，保加利亚农业和食品工业生产成本不断提高。据保加利亚报纸报道，“为发展供出口的农业生产所需要的资金比发展供出口的机器制造产品的生产所需要的资金多将近五倍至八倍”。面临这种情况，保加利亚舆论曾多次呼吁，要求提高农产品出口价格，改变不平等贸易的状况。然而，由苏联控制的“经互会”对保加利亚的要求置之不理，致使这个矛盾依然尖锐存在。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"131876c6b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
