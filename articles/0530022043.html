ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"对日本战犯原秀夫亲属来信的批语","alias":"","parts":[{"type":"paragraph","text":"对日本战犯树原秀夫亲属来信的批语"},{"type":"paragraph","text":"（1957年2月21日）请周?办理。此人及其他重病战犯宜予释放。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月廿一日"},{"type":"paragraph","text":"[1]指日本战犯神原秀夫的女儿神原公子、神原贵子和妻子神原房子1956年年底写给毛泽东的信。信中说：1956年11月20日，日本《朝日新闻》记者报道，毛泽东主席在接见日本冈山县学术文化视察团时曾说：“战犯神原如果有病的话，可以考虑释放。”原过去在国家战争政策的压力下，进行了细菌研究，的确是一个犯了罪的人。但作为他的亲人，是没有一天不在祈望着他的健康和自由的。今得知原旧病暂时痊愈，又患了咳血症，恳请毛主席先生宽宥他，让他回国治疗。来信并表示：为了向中国的许多牺牲者表示哀悼之意，一定要尽全力为日中友好和世界和平而努力活动。"},{"type":"paragraph","text":"[2]周，指周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":2,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":289,"page_end":289},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0530022043"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
