:[{"year":1953,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京据电】　芬兰共和国新任驻我国特命全权公使孙士敦在二日下午五时偕商务参赞马狄拉、二等秘书勃朗斯坦特和档案秘书耶拉，向我中央人民政府毛泽东主席呈递国书。在场者有中央人民政府秘书长林伯渠，政务院总理兼外交部部长周恩来，人民革命军事委员会代总参谋长聂荣臻，外交部办公厅主任王炳南，中央人民政府典礼局局长余心清，外交部西欧非洲司司长宦乡、交际处处长王倬如。孙士敦公使呈递国书时向毛泽东主席致颂词，毛泽东主席致答词。"},{"type":"paragraph","text":"芬兰公使孙士敦简历"},{"type":"paragraph","text":"孙士敦生于一九零二年七月一日。一九三三年，牙科医学士；一九三四—四一年和一九四四—四五年，任赫尔辛基市参议会议员；一九三四—三六年，任赫尔辛基市政府委员，一九三六—四一年和一九四五年，任议会议员，一九四五年起，任驻苏维埃社会主义共和国联盟特命全权公使，一九四九年起，任驻罗马尼亚人民共和国特命全权公使，一九四六年，出席巴黎和平会议的芬兰代表团顾问。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9f49a2259"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
