<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海市工商界知识分子讨论毛主席报告时畅谈工商界为什么会有松劲思想？","authors":[],"dates":[{"year":1957,"month":5,"day":3}],"is_range_date":false,"parts":[{"text":"上海市工商界知识分子讨论毛主席报告时畅谈工商界为什么会有松劲思想？","type":"title"},{"text":"本刊讯　上海市工商界知识分子此次讨论毛主席在宣传工作会议上的讲话时，小组发言十分踊跃。(4月20日)中心小组开会，以“工商界是否存在着松劲思想”为主题展开了讨论。大多数人都承认松劲思想是存在的，但均强调客观原因，很少从主观上检查。","type":"paragraph"},{"text":"姚梓良分析工商界松劲原因","type":"appellation"},{"text":"姚梓良分析工商界松劲原因，他说：“解放前是非常积极，解放后是不得不积极，合营后是可以不积极。解放前为了赚钱，在唯利是图的本质推动下当然非常积极。解放后加工订货，上级限制交成品，税局要税款，工人要工资，你能不积极吗？合营以后，笃定拿定息，就可以不积极了”。胡子婴、盛康年都同意这分析。","type":"paragraph"},{"text":"董寅初说种种制度限制了私方的积极性","type":"subtitle"},{"text":"董寅初说：“全行业合营后，同业公会无事可做；增产节约运动开会，私方人员被邀请列席而不作为一个正式出席者，当然负不起责任来。这说明私方人员的松劲思想，不是主观原因而是受了制度的限制。工商界普遍产生不求有功但求无过的思想，也是这个原因。以国际贸易业为例，私方人员绝大多数工作都很积极，但怕负责任。他们提了很多有益意见，总是没有下文，只好默然而息。例如我们把许多可以控制世界市场的商品(如桐油之类)卖给东欧各国。这些国家转手抛出去，使市场价格下降，中国受到很大损失，为什么不直接在欧洲市场交易？领导上对小事抓得紧，对这样大的问题，反而不管，真是抓了芝麻，丢了西瓜”。","type":"paragraph"},{"text":"他又说：“资本家很爱面子，给了他适当的安排，他为了要表现自己有才干，可以称职，是不会发生松劲思想的。例如每年春光明媚鸟语花香的时候；很多人都要春游，但是今年还没有听见资本家有些打算，(指国际贸易业)难道有了定息反而节约吗？爽气点说：“非不欲也，怕受批评。”“党的领导，我们认为是好的，必要的，但层次太多，党员自己意见有时也不一致。这就影响到私方人员的积极性。”","type":"paragraph"},{"text":"丁佐臣感慨万分谈童养媳的遭遇","type":"subtitle"},{"text":"丁佐臣是一位专家，他听了董的话，感慨万分地说：“私方人员本来好像童养媳；受歧视是可以理解的。全行业合营后，阶级关系起了变化，养媳圆房成为正式的儿媳妇，仍然得不到阿婆的信任。原因是小姑小叔太多，稍不如意，就在阿婆前飞短流长，这样私方人员怎么积极起来呢？”","type":"paragraph"},{"text":"孙鼎痛恨教条主义，主张私方人员要有哭秦庭的精神","type":"subtitle"},{"text":"孙鼎说：“计划管理，基本建设都是好名词，但落在某些公方人手中都教条化了。学习苏联先进经验，当然是正确的。某些人却把它作为拒绝改进技术的挡箭牌，作为避免改进操作方法的防空洞。我认为要发扬工商业知识分子的积极性，必须把学习苏联先进经验与个人独立思考结合起来。党号召要依靠群众，这也是对的，但应该同时重视发扬个人智慧。我建议私方技术人员本着爱国热情，要有哭秦庭的精神，主张不贯彻决不罢休。(指申包胥哭秦庭求援，意思是要下决心，对不合理的意见斗争到底。)","type":"paragraph"},{"text":"金学成畅谈改善党群关系","type":"subtitle"},{"text":"金学成也附和大家意见说：“什么公私关系，阶级关系，共事关系，一切都是党群关系。近来党群关系有所改善是肯定的，但还没有完全改善，要努力，改善了这个关系，大家积极性就提高了。”","type":"paragraph"},{"text":"荣毅仁、王子建谈长期共存互相监督","type":"subtitle"},{"text":"荣毅仁、王子建两人先后对“长期共存、互相监督”发表了一些意见。荣认为监督作用是两方面的，相互发挥做得不够。王子建认为监督的含义不仅是批评，而且建议也应在内。","type":"paragraph"},{"text":"胡厥文谈松劲与不松劲的界线","type":"subtitle"},{"text":"胡厥文说：“克服松劲情绪，首先在于提高思想认识。提高到什么程度呢？大家还没有一致的意见。我认为松劲不松劲的界线是这样的：对企业的关心，同对合营以前一样的关心，就不算松劲，但公方必须使私方有职有权，否则他要关心也不可得。”","type":"paragraph"},{"text":"胡子婴等谈阿婆与小姑","type":"subtitle"},{"text":"胡子婴说：“松劲不松劲用什么尺度来量呢？我同意厥老看法，今天对企业的关心与私营时代一样的关心，就不是松劲，这样衡量是公平的。合营前工商业者接受改造，进步较快，都是由于有外力推动。现在不同了，没有税局来查账，没有人来催交货，工人也不会伸手向你要工资。这些不太勉强接受改造的人，自然就落得松一松劲。不过客观原因我也认为是有的。第一是上级抓得过紧，权力不肯下放，使得下面缩手缩脚，积极性很难发挥。其次是要提高领导的修养，一个公正无私的阿婆，是不会听小姑小叔的谗言的，小姑、小叔的话自然也就不起作用了。偏偏今天做阿婆的最喜欢搜集这一套，引得小姑小叔走弯路。所以要解决这个问题，私方固然要加强学习，公方同样也要重视学习。松劲情绪的产生，就是意识落后于形势，我们掌握了这个规律，早一点跟上去，不使它落后于形势，那就是提高思想，加强学习。”","type":"paragraph"},{"text":"盛丕华吟诗话团结","type":"subtitle"},{"text":"盛丕华说：“古诗说得好：‘三日入厨下，洗手作羹汤，未谙姑食性，先遣小姑尝。’我们要发挥积极性，克服松劲思想，不要怕小姑小叔，要团结小姑小叔，一致搞好工作。”","type":"paragraph"},{"text":"(转载自新闻日报情况汇报三百八十七期)","type":"paragraph"}],"comments":[],"origin":"1957年5月3日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73ae08b257"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
