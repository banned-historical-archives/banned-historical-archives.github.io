script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平、张春桥、陈锡联、吴桂贤等同志亲切会见参加第三届全运会的台湾省体育代表团全体成员同他们进行了亲切的谈话，对他们冲破困难，远涉重洋和从祖国各地来到首都北京参加第三届全运会，表示热烈欢迎。整个会见，充满了骨肉团聚的欢乐气氛","authors":[],"dates":[{"year":1975,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年九月六日电　党和国家领导人邓小平、张春桥、陈锡联、吴桂贤，今天下午在人民大会堂亲切会见了参加第三届全国运动会的台湾省体育代表团的全体体育工作者和运动员。"},{"type":"paragraph","text":"会见中，邓小平等同志和台湾省体育代表团全体成员一起照了像，接着，同台湾省体育代表团团长蔡啸，副团长黄文钦、黄于燕，以及全团成员，进行了亲切的谈话，对他们冲破困难，远涉重洋和从祖国各地来到首都北京参加第三届全国运动会，表示热烈欢迎，祝贺他们在这次运动会中与各兄弟省、市、自治区体育代表团的体育工作者、运动员互相学习，共同提高，取得好的成绩。整个会见，充满了骨肉团聚的欢乐气氛。"},{"type":"paragraph","text":"有关方面的负责人廖承志、罗青长、庄则栋、马文波、田维新、于桑、丁国钰、林丽韫、李金德、赵正洪、路金栋，参加了会见。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03c6693d01"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
