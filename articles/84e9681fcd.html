art":10,"page_end":10,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东妙语解读“抗大教育方针”","authors":["聂中涛"],"parts":[{"type":"paragraph","text":"毛泽东妙语解读“抗大教育方针”"},{"type":"paragraph","text":"“坚定正确的政治方向，艰苦朴素的工作作风，灵活机动的战略战术。”是毛泽东为中国人民抗日军政大学（简称“抗大”）的题词。红军长征胜利到达陕北后，为了适应革命形势发展的需要，在环境艰苦、物资匮乏、战争频繁的历史条件下，党中央和毛泽东高瞻远瞩，先后创办了20多所院校。在这众多的院校中，中国人民抗日军政大学是其中的突出代表，被誉为“革命熔炉”。1938年3月，毛泽东为抗大题词，并对这三句作为“抗大教育方针”的题词进行了系统阐述。许多抗大学员还记得毛泽东当年演讲时的情景，尤其是他在阐述中引用了我国古典小说《西游记》中的人物作比喻，更是令人记忆犹新。毛泽东说：“唐僧这个人一心一意去西天取经，遭了九九八十一难，百折不回，他的方向是坚定不移的。但他也有缺点，麻痹、警惕性不高，敌人换个花样就不认识了。猪八戒有许多缺点，但有一个突出的优点，就是不怕艰苦，臭柿子胡同就是他拱开的。孙猴子很灵活，很机动，但他最大的缺点是方向不坚定，三心二意……”毛泽东以这个生动的比喻勉励大家要坚决地全面地贯彻抗大教育方针。最后，他还特别提到唐僧的那匹小白马，风趣地说：“你们别小看了那匹小白龙马。它不图名、不图利，埋头苦干，把唐僧一直驮到西天，把经取了回来。这是一种朴素、踏实的作风，是值得我们效法的。”"},{"type":"paragraph","text":"毛泽东制定的教育方针，为抗大建设指明了方向。抗大从总校到各分校，自始至终都坚决贯彻执行了这一方针，从而为革命事业造就出一批批杰出的人才，保证我党我军最终取得了抗日战争的伟大胜利。（聂中涛）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84e9681fcd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
