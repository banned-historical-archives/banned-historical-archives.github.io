" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在沈阳医学院座谈会上的讲话","authors":["任永忠","沈阳医学院"],"dates":[{"year":1957,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"在沈阳医学院座谈会上的讲话","type":"title"},{"text":"沈阳医学院任永忠","type":"authors"},{"text":"学校领导忽视知知分子的待点，用搞运动的方法领导学校，产生了很多缺点。应当肯定，历次政治运动都有很大的收获，对认清是非、敌我有很大作用，但是也不能隐讳运动式的领导有很多缺点，特别是对于知识分子更不适宜。“三反”和思想改造时，让学生帮助教师改造，教师在学生面前过关，严重地损伤了知识分子的自尊心，使以后老师上课时抬不起头来。反浪费运动时，把许多不属于浪费范围里的仪器，也送到了浪费展览会上去展览，结果许多有用的机器弄得五股分尸，热电板改成了电炉子，天枰法码丢失了，反浪费造成了新的浪费。肃反运动也发生了一些偏差，使一些人受到了不应有的折磨。甚至在学校提拔人的工作上，也是有的时候这个人红，有的时候那个人红，一个时候上去，一个时候下来，颠簸不平，每个运动过去以后，照例提拔一批人。几年来，人们都清楚地看到了祖国建设的飞跃发展，为祖国国际地位的提高受到很大的感动，可是这些运动使人心不静，老乱哄哄的，因此，潜力不能充分发挥出来。","type":"paragraph"},{"text":"党的政策是正确的，毛主席的指示很清楚，为什么下边一作就变样了呢？这是宁左勿右和矫枉过正现象在作祟。毛主席在湖南农民运动考察报告里的矫枉必须过正的主张是正确的，因为那是对待敌人的统治，而今天已经是人民的政权了，“过正”所造成的损失是人民，我们就不能那样干了。今天学校领导似乎还是采用土地革命时期的办法来办学校，把教师看成土地革命中的地主、富农，把学生看成基本群众——贫雇农，把青年教师当成中农。不听有经验的教师们的话，过多地听青年学生和党团员的话，这显然是对学校很不利的。","type":"paragraph"},{"text":"近一年来，以上各种缺点都有很大改进，处处显示了欣欣向荣的气象，但是改得还不够，希望在这次整风中充分动员一切积极因素，使情况大为好转。","type":"paragraph"}],"comments":[],"origin":"《章伯钧张百生等人言论集》（中国旅大市委宣传部编，一九五七年七月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87f7b57ed8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
