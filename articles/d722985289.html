主席团名单","authors":[],"dates":[{"year":1959,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"贺龙副总理号召体育工作者和运动员"},{"type":"paragraph","text":"反右倾鼓干劲开好全运会"},{"type":"paragraph","text":"全运会筹委会通过全运会主席团名单"},{"type":"paragraph","text":"新华社8日讯　第一届全国运动会筹备委员会7日下午举行第二次会议。会议听取和一致通过了全运会筹备委员会秘书长黄中关于“第一届全运会筹备工作报告”。会议讨论和通过了中华人民共和国第一届运动会主席团名单（附后），至此，去年9月成立的第一届全国运动会筹备委员会的工作，已经完满地结束。"},{"type":"paragraph","text":"国务院副总理兼国家体育运动委员会主任贺龙在这次会议上作了重要讲话。他说：第一届全国运动会的规模很大，各地选拔工作做得很好。贺龙副总理号召全体体育工作者和运动员学习党的八届八中全会决议精神，反右倾、鼓干劲，把这次全国运动会开好。"},{"type":"paragraph","text":"中华人民共和国第一届运动会主席团名单"},{"type":"paragraph","text":"（按姓氏笔划为序）万　里　马腾霭　马约翰　王一伦  王中青  王　昭　车向忱　卢　汉  卢绍武　石新安　刘长胜　刘西元  刘志坚  刘卓甫　刘培善　刘子奇  刘宁一　刘渭波　余　修　孙君一"},{"type":"paragraph","text":"宋季文  李　达　李耕涛　李德全  何能彬　陈伟达　林　恺　孟夫"},{"type":"paragraph","text":"唐哈丰阿  胡启立　胡耀邦　张青季  张锋伯　张文海　荣高棠　钟师统  徐萌山  栗树彬　袁敦礼　黄　中  曹达诺夫　章　蕴　贺　龙"},{"type":"paragraph","text":"贺进民  贺炳炎　嵇文甫　董守义　程子华  韩复东　谭冠三　谭政"},{"type":"paragraph","text":"管文蔚  蔡廷锴　蔡　畅　杨　杰　杨秀峰  钱俊瑞"},{"type":"paragraph","text":"新华社8日讯　中华人民共和国第一届运动会主席团第一次会议在7日下午召开。会上讨论和通过了中华人民共和国第一届运动会指挥部以及各部门负责人名单；通过了第一届全国运动会开幕式和闭幕式程序。"},{"type":"paragraph","text":"第一届全国运动会指挥部由荣高棠任总指挥，李达、黄中、张青季、李梦华任副总指挥。指挥部下设指挥部办公室和竞赛部、宣传部、行政管理部、团体操表演部、外宾接待部等部室。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d722985289"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
