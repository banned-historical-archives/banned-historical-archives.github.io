art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广泛地传播毛泽东思想","authors":["叶裕生/石业梁/陈柱深"],"parts":[{"type":"paragraph","text":"举办毛主席著作讲习所"},{"type":"paragraph","text":"七连协助驻地生产队举办毛主席著作讲习所，热情地向贫下中农传播毛泽东思想。讲习所的辅导员，都是连队活学活用毛主席著作的积极分子。四个月来，他们共辅导了二十多课。社员们说，进了讲习所，学了毛泽东思想，前进方向更明确了。（叶裕生、石业梁、陈柱深）"},{"type":"paragraph","text":"跨海传真理"},{"type":"paragraph","text":"驻黄海前沿某岛一个小分队，长期坚持向附近一个小岛宣传毛泽东思想。这小岛只有十八户人家，远离公社，被风浪阻隔，有时多日看不到报纸。小分队便派出宣传组，过海宣传。他们说，风大浪大，没有我们宣传毛泽东思想的决心大；哪里有群众，我们就要把毛泽东思想送到哪里。他们采用辅导、读报、出墙报、教歌、放电影等多种方法，宣传毛泽东思想。岛上的贫下中农夸他们是毛泽东思想的红色宣传员。（施承、毕英惠）"},{"type":"paragraph","text":"处处撒红种 天天作宣传"},{"type":"paragraph","text":"去年，三连流动执勤，走到哪里，把毛泽东思想宣传到哪里，处处撒红种，天天作宣传，行程千余里，一路不断线。他们先后帮助八个生产队建立了学习毛主席著作辅导站，培养了一百多名学习骨干。贫下中农赞扬他们是毛主席派来的送宝人。（魏宣东）"},{"type":"paragraph","text":"活跃在边防线上的宣传队"},{"type":"paragraph","text":"满洲里边防检查站，由五个战士组成了一支宣传队，利用节假日，深入街头、田边、车站，积极为群众演出，热情宣传毛泽东思想。两个月来，演出了五十多场，观众达六千多人。演出的每个节目，都表现了对伟大领袖毛主席的无限热爱。（马自来、王梅燕）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e28c0f1e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
