<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝极右派破坏万象协定的罪行","authors":[],"dates":[{"year":1975,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝极右派破坏万象协定的罪行"},{"type":"paragraph","text":"老挝各爱国力量和万象政府方面代表于一九七三年二月二十一日和九月十四日先后在万象签署了关于在老挝恢复和平和实现民族和睦的协定和协定议定书。两年来，老挝各爱国力量方面一直严格遵守和认真执行。而万象极右派势力却在美国政府的支持下，不断违反和加紧破坏万象协定的实施，犯下了大量新罪行。"},{"type":"paragraph","text":"一、蓄意违反和破坏有关停火条款。"},{"type":"paragraph","text":"万象协定规定：“在整个老挝领土全部和同时实行就地停火”，“绝对禁止使用陆军或空军向对方暂时控制的地区发动一切进攻、蚕食、威胁和侵犯的活动”。协定签字墨迹未干，万象极右派的军事头目就在第二天上午举行秘密会议，策划进攻各爱国力量控制的解放区。他们大肆叫嚷：“这项协定同军方没有什么关系，军方必须继续执行任务”。"},{"type":"paragraph","text":"仅在万象协定签订后的一年内，万象极右派破坏协定的行动竟达数千次之多。他们派遣成百股别动队对解放区进行破坏，派出军队、“特种部队”和雇佣军在飞机、大炮和装甲车掩护下，向老挝爱国力量控制的地区发动一次又一次的蚕食进攻，使人民的生命财产受到重大损失。他们还使用各种飞机对解放区进行侦察、轰炸和袭击。据不完全统计，仅从一九七三年二月二十二日至三月三十一日，出动各种类型飞机对各爱国力量管辖地区进行的侦察、轰炸和袭击达三千多架次。"},{"type":"paragraph","text":"二、不断制造事端，破坏万象和琅勃拉邦市的中立化，阻挠临时民族联合政府和民族政治联合委员会的正常工作。"},{"type":"paragraph","text":"万象极右派极力拖延和阻挠爱国力量人员进驻这两个城市工作。他们制造种种事端，对进驻的各爱国力量人员进行侦察、封锁和挑衅活动，分裂和破坏老挝各爱国力量和人民之间的关系。仅一九七三年十二月份，他们就派了三百多名特务，在夜晚进行抢劫、暗杀和恐怖活动，并制造谣言，诬蔑各爱国力量。万象极右派还企图暗杀民族政治联合委员会的成员，反对临时民族联合政府颁布和施行政治纲领，反对关于解散万象“国民议会”的决定。"},{"type":"paragraph","text":"三、阴谋发动军事政变，重新挑起战争。"},{"type":"paragraph","text":"一九七三年八月二十日，万象好战极右集团曾策划反动政变，企图阻挠签署议定书。政变失败后，他们并不甘心，又于一九七三年十二月二十日，在富科特山召开了反动军官会议，为另一次政变作准备。右派军队还在吉乃莫进行了军事演习。一九七四年六月二十一日和二十二日，万象极右派的军事头目西苏·纳占巴塞伙同一些反动军官在沙湾拿吉开会，制订调整军队、建立基地和分裂老挝的计划。西苏·纳占巴塞向右派军队各级指挥部发布了破坏和平与民族和睦的命令，并对持不同意见的军官进行排斥、撤职，甚至逮捕入狱。今年五月三日和四日，西苏·纳占巴塞和一些反动军官在萨纳尼空集团的支持下，又密谋发动政变，并对发动政变的武器、人力配备和战术等作了详尽的策划。"},{"type":"paragraph","text":"极右派的这些严重罪行和阴谋活动受到了老挝爱国军民的有力反击。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e13586445"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
