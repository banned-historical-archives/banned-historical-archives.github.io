r":1949,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席当选上海人民感到骄傲"},{"type":"paragraph","text":"【本报记者上海二日专电】人民领袖毛泽东当选中央人民政府主席及中央人民政府委员选出的消息传出后，上海各界欢欣若狂，第三野战军驻沪各部全体指战员表示要用实际行动来拥护毛主席当选。全市各业职工及各界人士一致为找到了自己真正的领袖而欢呼。铁路工人陈杏生兴奋地说我们有了英明的伟大的人民领袖毛主席而感到骄傲，我们为中国人民有了毛主席的领导而欢呼。产业界刘靖基、高教联、小学教联及民主妇联等负责人，亦均表示毛主席的当选使我们对于今后新民主主义的建设胜利，增加了无限的信心。此间解放日报、新闻日报、大公报、文汇报等都发表社论，表示热烈的祝贺和衷心的拥护。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad7f476319"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
