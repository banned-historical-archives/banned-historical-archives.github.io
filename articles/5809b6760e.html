hors":["周恩来"],"dates":[{"year":1967,"month":3,"day":18}],"is_range_date":false,"parts":[{"text":"周恩来就国防工业各部军管一事给毛泽东的信","type":"title"},{"text":"周恩来","type":"authors"},{"text":"主席、林彪、伯达、康生、向前、萧华、成武各同志：","type":"appellation"},{"text":"遵照主席指示精神，经与富春、荣臻、剑英三同志商量（萧华在作报告，未参加），已向国防工办和国防工业部门（二机、三机、四机、五机、六机、七机）宣布，准备实行军管。其办法拟每一部门只派出三人的军管代表小组，运用原有的机构领导业务，同时推动各革命群众组织进行开门整风，实现无产阶级革命派大联合，帮助需要批判的各级领导干部检讨亮相，分别处理，以便最后实现各部门的革命三结合。","type":"paragraph"},{"text":"对国防工业各部研究院、所和科学院所属承担国防任务的各研究所，拟同意聂荣臻同志意见（见附件），交国防科委实行军事接管，并基本同意他所提出的调整改组原则。待方案商定后再报批。","type":"paragraph"},{"text":"国务院工交、财贸、农林、卫生各部门正遵照毛主席指示，分别进行排队，拟在工作瘫痪部门，亦实行军管，其办法如国防工业各部。定后将分别报批。","type":"paragraph"},{"text":"这些需要派出的军管代表，拟经由军委、总政从军事科学院、高等军事学院、政治学院德才兼备的老干部中选派。","type":"paragraph"},{"text":"以上各项妥否，请主席批示。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5809b6760e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
