script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发天津十一区打大虎的经验的批语","alias":"","parts":[{"type":"paragraph","text":"对军事学院两份三反报告的批语"},{"type":"paragraph","text":"（1952年2月8日）刘、朱、周、林、聂、罗荣桓、肖华“及军委各部门。请肖华同志以电话告刘伯承同志："},{"type":"paragraph","text":"（一）二月三日二月四日两个报告看到了，很好。（二）军事学院包括各附属单位在内，可能有大老虎几十只至百余只，中小老虎几百只，请他注意搜捕。（三）像朱由芹一类的人要严惩。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月八日"},{"type":"paragraph","text":"[1]林，指林彪，当时任人民革命军事委员会副主席。聂，指聂荣臻，当时任中国人民解放军代总参谋长。罗荣桓，当时任人民革命军事委员会总政治部主任。肖华，当时任人民革命军事委员会总政治部副主任。"},{"type":"paragraph","text":"[2]刘伯承，当时任中国人民解放军军事学院院长兼政治委员。"},{"type":"paragraph","text":"[3]指中国人民解放军军事学院党委1952年2月3日报送军委主席、副主席、总政治部的三反情况简报第三号，和刘伯承1952年2月4日关于朱由芹贪污腐化及对其处理意见的请示报告。"},{"type":"paragraph","text":"[4]朱由芹，原任中国人民解放军军事学院院务部副部长，在三反运动中受开除党籍和行政撤职、降级处分。1980年2月，军事学院党委对朱由芹在三反运动中的错误和所受处分进行复查，认为他在分管机关生产的工作中有一定的错误，但原处分的主要事实依据有很大出入。经总政治部批准，于1980年4月撤销了对朱由芹的开除党籍和行政撤职、降级处分，恢复准军级待遇。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":359,"page_end":359},"tags":[{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"728b7dfb67"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
