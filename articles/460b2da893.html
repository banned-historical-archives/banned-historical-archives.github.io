文件的修改给东北局的指示","authors":[],"dates":[{"year":1949,"month":10,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央关于劳资关系暂行处理办法等文件的修改给东北局的指示","type":"title"},{"text":"东北局：","type":"appellation"},{"text":"（一）沈阳市人民政府《关于劳资关系暂行处理办法》、《关于处理劳资争议程序暂行办法》、《关于私营工商业企业劳资双方订立集体合同暂行办法》三个草案已收阅。其中各项内容，基本上一律应按照最近经少奇”同志修改过的全国工会工作会议所拟的此三种草案之各项条文加以修改与补充。附发少奇同志修改过的草案一份供参考，你们按此草案修改后，即可正式公布。","type":"paragraph"},{"text":"（二）同意你们《关于劳资关系暂行处理办法》中增补之各项内容：","type":"paragraph"},{"text":"1、第四条中之“但特殊技术工人自请解雇时，资方为生产和工作的需要，亦可协商延长劳方离厂时间，以候资方延聘适当技术人员接替，但合计以不超过半个月为限。劳方离厂前，劳资双方必须维持生产与待遇之原状”。","type":"paragraph"},{"text":"2、第五条中之“资方应尊重劳方对生产建议之权，对劳方之合理建议，资方须切实考虑采纳实行”。","type":"paragraph"},{"text":"3、第九条：临时工、外包工及季节工，其解雇与复工办法暂依照雇用时双方所规定之条件办理之（季节工应有复工优先权）。如对原有规定发生争执时，双方或任何一方得申请劳动局调处之。","type":"paragraph"},{"text":"（三）订立劳资集体合同问题，根据最近北京的经验，是解决劳资争议问题的最有效的办法，但在进行这一工作时，不一定在一次集体合同中解决劳资双方的全部问题，可以根据劳资双方迫切要求的主要问题，先订立以某一个或几个问题为中心内容的集体合同，以后如有问题再补充商订。这样更可迅速解决劳资争议问题，而免拖延时日。这一经验特提供你们参考应用。","type":"paragraph"},{"text":"（四）东北除旅大外，处理劳资关系问题的环境条件基本上是相同的，因此，这三个条例似可由东北人民政府公布，在东北全境实施，免得各市各来一个，增加一些不必要的麻烦，请你们斟酌情况决定办理。","type":"paragraph"},{"text":" 中央酉感","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"460b2da893"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
