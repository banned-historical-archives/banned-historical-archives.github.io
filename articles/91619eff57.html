art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忠于毛主席海空万里擎红旗","authors":["“海空雄鹰团”全体指战员〖HH/换行〗DW：“海空雄鹰团”"],"parts":[{"type":"paragraph","text":"党的“九大”新闻公报传达了伟大领袖毛主席的最新指示：“我们希望这一次代表大会，能够开成一个团结的大会，胜利的大会，大会以后，在全国取得更大的胜利。”毛主席的伟大号召，象吹遍祖国大地的强劲东风，是指引我们夺取更大胜利的光辉灯塔。公报宣布大会在毛主席的亲自主持下，一致通过了林副主席所作的政治报告，一致通过了中国共产党章程。特大喜讯传来，我们海空战士千遍万遍地敬祝毛主席万寿无疆！万寿无疆！万寿无疆！"},{"type":"paragraph","text":"“忆往昔峥嵘岁月稠。”翻开我们党在毛主席英明领导下英勇奋斗的伟大史册，那一章不闪耀着战无不胜的毛泽东思想的光辉！从黄浦江畔的第一声春雷，到湘江之滨秋收起义的火把；从遵义会议放出革命朝霞，到天安门升起第一面五星红旗；从“一月革命”的风暴，到党的第九次全国代表大会的隆重开幕，我们党四十八年的历史，就是伟大领袖毛主席继承、捍卫和发展了马克思列宁主义的光荣史，是毛主席的革命路线战胜“左”右倾机会主义的斗争史。毛主席啊，毛主席！您领导我们党驾驭着历史的车轮，辗碎了多少挡道的顽石；您指挥着时代的航船，战胜了多少险滩暗礁。在您的正确路线的指引下，我们党从几个小组、几十个党员，到今天发展成为强大的中华人民共和国的领导者。"},{"type":"paragraph","text":"毛主席啊，毛主席！回顾我们团的战斗历程，步步都是您老人家的光辉思想指引，我们革命战士的成长，个个都是您的光辉思想的哺育。您的光辉思想，永远是我们翱翔万里的罗盘。您的革命路线，永远是我们前进的航线。在您亲自发动和领导的无产阶级文化大革命中，我们紧跟您的伟大战略部署，高举您的革命批判大旗，把大叛徒刘少奇和反革命修正主义分子彭德怀、罗瑞卿顽固推行的资产阶级反动军事路线砸了个稀巴烂。是您老人家给我们这些旧社会的放牛娃、苦孩子添上了翅膀，把一架架美帝国主义的“王牌”强盗飞机打成了破铜烂铁。我们空军战士的成长，不靠天，不靠地，靠的是战无不胜的毛泽东思想。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想。”在党的“九大”隆重开幕的大喜日子里，我们决心用光辉的毛泽东思想把我们的红心炼得更红更红，永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席的无产阶级革命路线，让祖国的万里海空，永远放射出毛泽东思想的万丈光芒！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91619eff57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
