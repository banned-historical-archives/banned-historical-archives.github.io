ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"给江庸的信","alias":"","parts":[{"type":"paragraph","text":"给江庸的信"},{"type":"paragraph","text":"（1949年8月19日）翊云先生："},{"type":"paragraph","text":"大示敬悉。时局发展甚快，新政协有迅速召开之必要，拟请先生及颜俊人先生参加，不识可以成行否？许先生事，已嘱法学方面的同志注意延接。率复。敬颂道安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十九日"},{"type":"paragraph","text":"[1]江庸（1878—1960），号翊云，福建长汀人，法学家。1949年春和颜惠庆、章士钊、邵力子等以私人资格北上同中国共产党商议和谈问题。同年秋，应邀参加中国人民政治协商会议第一届全体会议。建国后，曾任中央人民政府政治法律委员会委员、上海市文史研究馆副馆长。"},{"type":"paragraph","text":"[2]颜俊人，即颜骏人（1877一1950），名惠庆，上海人。曾任北洋政府国务总理、外交总长和国民党政府驻美公使、驻苏大使。1949年秋，应邀参加中国人民政治协商会议第一届全体会议。建国后，任华东军政委员会副主席，中央人民政府政治法律委员会委员。"},{"type":"paragraph","text":"[3]指江庸向毛泽东推荐法学界的许藻一事。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":152,"page_end":152},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a621dfbcc7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
