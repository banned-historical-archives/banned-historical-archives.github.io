会令取缔反动会门组织","dates":[{"year":1950,"month":8,"day":17}],"is_range_date":false,"authors":["刘伯承"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 462","tags":[{"name":"反动","type":"主题/事件"},{"name":"特务","type":"主题/事件"},{"name":"土匪","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"西南军政委员会令"},{"type":"title","text":"取缔反动会门组织"},{"type":"subtitle","text":"（一九五〇年八月十七日）"},{"type":"paragraph","text":"查我西南解放以来，特务土匪与封建地主、恶霸相勾结，组织并操纵会门，其意在控制农民，反对组织农民协会，反对减租退押，反对土改，拥护封建势力，造谣惑众，武装叛乱，破坏社会秩序，危害人民生命财产，极为人民所痛恨。经我大军基本剿灭后，一部匪特复转入暗中活动，更以会门团体为掩护，进行反革命阴谋，企图骚扰破坏。经本会第一次全体委员会议一致决议：此种会门纯系封建残余非法反动组织，应予严格取缔，俾以确保治安，巩固革命秩序。除另定具体取缔办法，分令各级人民政府及有关机关坚决执行外，特予明令公布。此令。"},{"type":"subtitle","text":"主席 刘伯承"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f8d1cb6f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
