h":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奴隶是由原始社会向奴隶社会过渡而逐渐形成的一个阶级。原始社会崩溃时期，强大的部落征服弱小部落时，往往把战争俘获的人作为奴隶，所以奴隶没有任何人身自由，带着枷锁劳动，是奴隶主手中会说话的工具。奴隶被奴隶主视为一种财产，他们的劳动成果完全被奴隶主占有，奴隶主对奴隶可以任意打骂、买卖和杀掉。在奴隶社会，四个奴隶加一束干肉才能换取一匹马。奴隶主死了要用几十个至几百个奴隶为他殉葬。在奴隶社会，由于奴隶主对奴隶的残酷压榨，激起奴隶们不断反抗。在我国春秋战国时期，就有柳下跖领导的奴隶起义。由于奴隶的不断起义和前赴后继的斗争，奴隶社会逐渐瓦解，过渡到封建社会。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a96d1a5802"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
