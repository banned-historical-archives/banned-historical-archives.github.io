" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"中原军区部队突围后的形势和任务","alias":"","parts":[{"type":"paragraph","text":"中原军区部队突围后的形势和任务！"},{"type":"paragraph","text":"（1946年7月5日）郑、李，并告王、戴，王、张："},{"type":"paragraph","text":"（一）蒋介石以武庭麟宋瑞珂作战不力，未能堵我西进，令查办，并称，此次“剿匪”关系整个战局及建国前途，要求努力作战。从各“剿匪”将军反映，一切“剿匪”部队，均未完成任务，我方损失甚微，彼方毫无所获。（二）据整编七十五师第六旅午江反映，我王戴部4已至平林市附近，该旅长林曦祥率部由安陆向北准备追击。据武庭麟称，该师午江开始由柳林西进，但粮食困难；"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中共中央中原局代理书记兼中原军区政治委员郑位三和中原军区司令员李先念的电报。"},{"type":"paragraph","text":"[2]王、戴，指王树声、戴季英，当时分别任中原军区副司令员兼第一纵队司令员和第一纵队政治委员。王、张，王，不详，张，指张体学，当时任鄂东军区司令员。"},{"type":"paragraph","text":"[3]武庭麟，当时任国民党军整编第十五师师长。宋瑞珂，当时任国民党军整编第六十六师师长。"},{"type":"paragraph","text":"[4]王戴部，指王树声率领的中原军区左路突围部队。该部由中原军区第一纵队（欠第一旅）和第二纵队第十五旅（欠一个团）组成。戴季英未随该路行动。"},{"type":"paragraph","text":"[5]平林市，镇名，位于湖北应山县西南。曾元\"宋瑞珂两部何日行动尚无反映；第三师之第三第二十两旅，程潜令其抽兵确保随枣3，判断该两旅除守备襄樊者外，仅能各抽一部增防随、枣据点。（三）现在一切主要敌军均被你们抛在后面，你们各路，每路应以一小部附电台任后卫，远距离与敌保持接触，迟滞敌人，主力争取时间休息。（四）你们任务是活动于鄂西北、豫西南广大地区，一面保存自己，同时钳制大量敌人，对全局贡献极大。（五）江汉军区部队应令其在原地坚持，不要带走，该区仍是你们很好回旋地区之一，不要轻易放弃。（六）整个时局变化于我有利，反动派外强中干，弱点甚多。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"午微[1]曾元，当时任国民党军整编第四十一师师长。[2]程潜，当时任国民党政府军事委员会委员长武汉行营主任。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":460,"page_end":461},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王树声","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79500d549f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
