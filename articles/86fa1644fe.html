script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉美工人农民学生开展反剥削反压迫斗争  智利美资一电话公司工人罢工，使国内外电话联系中断  哥伦比亚学生示威并占领校舍，要美国“和平队”滚蛋","authors":[],"dates":[{"year":1969,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拉美工人农民学生开展反剥削反压迫斗争"},{"type":"paragraph","text":"智利美资一电话公司工人罢工，使国内外电话联系中断  哥伦比亚学生示威并占领校舍，要美国“和平队”滚蛋"},{"type":"paragraph","text":"据新华社八日讯　拉丁美洲一些国家的工人、农民和学生最近不断展开斗争，反对美国和本国垄断资产阶级的剥削和压迫，要求改善生活条件。"},{"type":"paragraph","text":"在智利，美资“智利电话公司”的五千二百名工人和职员五日开始举行罢工，要求增加工资，抗议美国资本家的残酷剥削。这次罢工使智利同国外的电话联系及国内一些地区的电话联系中断。同时，首都圣地亚哥附近孔查利市的三百名工人六日开始举行不定期罢工，要求改善生活条件，反对无理解雇工人。"},{"type":"paragraph","text":"秘鲁孔德斯塔夫莱五百多名矿工从二月二十八日起向首都利马举行长达二百五十公里的进军游行，要求增加工资和释放被捕的工会领导人。距离利马八十公里的马拉的“劳尔”矿的矿工也在三月三日举行了进军游行，他们的家属也参加了抗议活动。矿工的斗争遭到秘鲁当局的野蛮镇压，但英勇的矿工坚持他们的正义斗争。另外，秘鲁首都一家印刷厂的一百六十名工人不久前举行罢工，要求增加工资。"},{"type":"paragraph","text":"巴西东北部阿尔科内斯族印第安农民最近展开斗争，反对地主霸占他们的土地。最近，狠心的地主把这里的印第安农民蛮横地驱逐出去，霸占了肥沃的土地。"},{"type":"paragraph","text":"阿根廷西特罗恩厂的工人五日举行示威游行，抗议资方解雇工人。他们的示威得到了学生的支持。"},{"type":"paragraph","text":"哥伦比亚学生反对美国“和平队”干涉哥伦比亚内政的斗争正在扩大。最近，哥伦比亚西部佩雷拉城工艺技术大学的学生占领了该校校舍，要求美国“和平队”的十个队员滚蛋。这些“和平队”队员在那里挂着“教授”招牌，进行干涉活动。这次斗争是二月二十七日开始的，学生们举行了示威游行，高呼反美口号，并筑起街垒同前来镇压他们的反动军警作斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86fa1644fe"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
