art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见越南南方朋友发表重要声明","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社29日讯 毛泽东主席今天下午接见了正在北京访问的越南南方民族解放阵线代表团的朋友。毛主席在接见时发表了《反对美国——吴庭艳集团侵略越南南方和屠杀越南南方人民的声明》。"},{"type":"paragraph","text":"被接见的越南南方朋友是：越南南方民族解放阵线代表团团长、越南南方民族解放阵线中央委员阮氏萍，代表团团员：越南南方劳动解放协会中央委员黎成南，越南南方诗人青海。"},{"type":"paragraph","text":"毛主席同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有，中国人民保卫世界和平委员会主席郭沫若，中国亚非团结委员会主席廖承志。"},{"type":"paragraph","text":"新华社29日讯 以越南南方民族解放阵线中央委员阮氏萍为首的越南南方民族解放阵线代表团，应中国人民保卫世界和平委员会和中国亚非团结委员会的邀请，前来参加首都各界人民支持越南南方人民和佛教徒反对美帝国主义和吴庭艳集团的爱国正义斗争大会，今天上午乘飞机到达北京。"},{"type":"paragraph","text":"代表团团员有越南南方劳动解放协会中央委员黎成南，越南南方诗人青海。"},{"type":"paragraph","text":"到机场欢迎越南南方朋友的，有廖承志、包尔汉、戚云、赵国强、王照华、孙晓村、王明远等有关方面负责人。"},{"type":"paragraph","text":"越南民主共和国驻中国大使陈子平也到机场欢迎。"},{"type":"paragraph","text":"毛泽东主席和越南南方民族解放阵线代表团的朋友们亲切交谈。"},{"type":"paragraph","text":"新华社记者 吕厚民摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"廖承志","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbca77f024"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
