rs":[],"dates":[{"year":1978,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一九七八年八月二十一日至二十九日，中共中央主席、国务院总理华国锋同志，应南共联盟主席、南斯拉夫总统铁托同志的邀请，对南斯拉夫进行了正式友好访问。访问期间，华国锋主席受到铁托总统、南斯拉夫其他党政领导人和南斯拉夫人民隆重热烈的欢迎。华主席的访问，以取得中南全面合作的丰硕成果面圆满结束，标志着在中南两党、两国和两国人民的友好关系史上树立了新的里程碑。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十一日，华主席和铁托总统在白宫亲切交谈。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十一日，华主席在白宫前接受少先队员的献花。左一为铁托总统。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十二日，华国锋主席参观贝尔格莱德军事博物馆。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十三日，华主席参观“贝尔格莱德”农业联合企业时，接受该厂职工赠送的纪念品。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十六日，华主席在铁托总统陪同下乘船游览亚得里亚海。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十八日，华主席和铁托总统在布里俄尼岛亲切握手。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十二日，华主席应邀出席在贝尔格莱德人民剧院举行的文艺晚会。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\7894040108.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e八月二十二日，华主席在铁托总统陪同下，接受贝尔格莱德市几十万群众隆重热烈的欢迎。"},{"type":"paragraph","text":"本版照片均为新华社记者　摄\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6b8baed1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
