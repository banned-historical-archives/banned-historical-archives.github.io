ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"审定《中共中央关于日本情势的声明》时改写的一段话","alias":"","parts":[{"type":"paragraph","text":"审定《中共中央关于日本情势的"},{"type":"paragraph","text":"声明》时改写的一段话"},{"type":"paragraph","text":"（1950年6月12日）"},{"type":"paragraph","text":"自有共产主义运动以来的历史，特别是世界第二次大战以来的历史，都是和历来的反动派，和各国帝国主义，和现在的美国帝国主义的一切妄想背道而驰。反动派的历史都是失败的历史，革命人民的历史都是胜利的历史。反动派有时也显得很猖，取得一些镇压人民的“胜利”，但最后无不失败。革命人民有时也会遭受一些挫折，但最后无不胜利。全世界的历史都是这样写的，无一例外。中国人民革命的胜利，就是最近的证据。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":471,"page_end":471},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c3e2c8d66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
