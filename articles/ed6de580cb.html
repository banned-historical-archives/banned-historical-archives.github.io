":["喻屏"],"dates":[{"year":1970,"month":9,"day":5}],"is_range_date":false,"parts":[{"text":"喻屏写给专案组的思想汇报（摘录）","type":"title"},{"text":"喻屏","type":"authors"},{"text":"〖喻屏，中共中央东北局候补书记。文革中经中共中央批准打倒的刘少奇在东北及辽宁的第三号“代理人”。专案组将其历史上在国民党狱中曾“自首叛变”问题作为逼供重点。〗","type":"subtitle"},{"text":"我没有干在政治上反对、诬蔑党（我坚信在敌人的档案中不会有我此罪行的材料！），在组织上破坏党（我坚信找不到因我而被捕的受害者！）的勾当！","type":"paragraph"},{"text":"我几次恳求组织进行复查，但每次提出这个要求，都受到专案组的严厉谴责，并说有人证、物证，根本不存在复查问题。","type":"paragraph"},{"text":"这就使我请组织进行复查的恳求更加强烈了，现在我这个恳求仍未改变！","type":"paragraph"},{"text":"这不仅关系到我自己的命运，而且关系到我的家庭特别是孩子们的前途——背一辈子黑锅！","type":"paragraph"},{"text":"在这样严重的问题面前，我不能不郑重地再次向党说明真实情况。","type":"paragraph"},{"text":"〖要求专案组〗向上级反映，将我写的材料转报红色政权、沈阳部队党委和中央！","type":"paragraph"}],"comments":[],"origin":"高振河《喻屏传》，北京：中共党史出版社，2005年8月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed6de580cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
