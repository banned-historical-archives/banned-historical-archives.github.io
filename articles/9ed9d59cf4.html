s":["张向群","张胜平","郭立军"],"dates":[{"year":2003,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"联合国秘书长安南说"},{"type":"paragraph","text":"伊拉克已陷入无政府状态"},{"type":"paragraph","text":"10万难民聚集两伊边境"},{"type":"paragraph","text":"新华社联合国4月10日电（记者郭立军）联合国秘书长安南10日在纽约联合国总部接受记者采访时说，目前在伊拉克已经没有一个正在实施有效控制的政府。他敦促美英联军保障当地人民的正常生活。"},{"type":"paragraph","text":"安南说，根据他所了解的情况，伊拉克首都巴格达出现了抢劫和混乱情况，伊已陷入无政府状态。他说：“安理会曾多次重申，根据《日内瓦公约》及其它国际法的有关规定，（美英）联军作为占领方有责任保证当地人民的正常生活。”"},{"type":"paragraph","text":"安南说，联合国监测、核查和视察委员会与国际原子能机构在监督销毁伊大规模杀伤性武器方面的授权仍然存在，核查工作只是由于战争才被迫中断。他表示希望核查人员能在条件允许的情况下迅速恢复工作。"},{"type":"paragraph","text":"据新华社联合国4月9日电（记者郭立军）联合国秘书长安南9日在纽约联合国总部接受记者采访时说，目前应考虑的不是未来哪一方将控制伊拉克首都巴格达，而是应如何迅速恢复这座城市的秩序，保护平民的安全。"},{"type":"paragraph","text":"安南说，他并不掌握巴格达战事的确切情况，现在不论是讨论伊拉克政权的命运，或是哪一方将在未来实际控制这座城市都为时过早。"},{"type":"paragraph","text":"安南对巴格达医院缺医少药的情况表示关注。他说，联合国有关部门将与国际卫生组织和国际红十字会合作，尽一切可能在最短时间内把药品送入巴格达。"},{"type":"paragraph","text":"据新华社德黑兰4月10日电（记者张胜平、张向群）据伊朗伊斯兰共和国通讯社10日报道，目前在伊拉克与伊朗接壤的边境地区已经聚集了大约10万名伊拉克难民。"},{"type":"paragraph","text":"报道援引伊朗内政部官员的话说，伊拉克难民从9日开始就陆续抵达两伊边境地区，到10日已有接近10万人到达与伊朗西部省份伊拉姆省麦赫兰市邻近的伊拉克边境地区。伊朗方面已经开始向难民分发救济物资，但没有允许难民进入伊朗境内。"},{"type":"paragraph","text":"这位官员重申了伊朗不允许伊拉克难民入境的立场，但表示将在两伊边境伊拉克一侧向难民提供人道主义援助。他指出，由于难民数量众多，当地需要更多的食品和药物，伊朗方面无法单独满足这些需求。他呼吁国际社会提供紧急援助。"},{"type":"paragraph","text":"此前，伊朗内政部副部长、伊拉克危机委员会负责人艾哈迈德·胡塞尼曾表示，伊朗已经在边境建造了10座可容纳40万人的难民营。"},{"type":"paragraph","text":"伊拉克战争爆发后，伊朗为防止难民涌入而关闭了与伊拉克的边界。在1991年海湾战争中及战后，共有130万伊拉克难民进入伊朗境内，迄今仍有20万难民滞留，给伊朗带来了沉重的经济负担。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ed9d59cf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
