ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复彭德怀电","alias":"","parts":[{"type":"paragraph","text":"复彭德怀电!"},{"type":"paragraph","text":"（1949年8月26日）"},{"type":"paragraph","text":"（一）完全同意二十五日二十四时电的部署。（二）六十二军暂留临夏，必要时亦宜令其移兰州参战。（三）务请注意筹足至少一个月的粮食、弹药，准备持久坚决歼灭两马。"},{"type":"paragraph","text":"[1]这是毛泽东复彭德怀电的主要内容。"},{"type":"paragraph","text":"[2]彭德怀25日24时电告：攻城部队25日拂晓对兰州守敌发起攻击，与敌恶战一天，敌我伤亡相等。马鸿逵部4个军8万人左右，正倾巢援兰州，似有放弃宁夏模样，如能经过傅作义迟延宁马10日或半月出动，对我有利。根据上述情形，我军拟留六十二军停临夏，一、二两军东移，参加攻击兰州之敌及便于适时打击增援兰州的宁夏马鸿部。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":179,"page_end":179},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e8b381302"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
