,"authors":[],"dates":[{"year":1969,"month":11,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对腐朽的资产阶级教育制度　粉碎日美“安全条约”"},{"type":"paragraph","text":"日本札幌市大学生同警察英勇搏斗"},{"type":"paragraph","text":"一千多名工人和市民参加学生反抗警察镇压的斗争"},{"type":"paragraph","text":"据新华社八日讯　据东方通讯社报道：从六月份以来为反对日本腐朽的资产阶级教育制度和为粉碎日美“安全条约”而坚持斗争的札幌市北海道大学学生，七日同前来镇压的三千名武装警察进行了六个多小时的英勇斗争。"},{"type":"paragraph","text":"七日上午，三千名武装警察包围了这所大学，其中二千名警察跟在水龙车后面，冲进校园，用高压水龙和催泪弹袭击早已被学生封锁了的五座大楼。学生们在楼房周围挖起了战壕，砍下路旁的树木筑成障垒，并点火焚烧，以阻挡警察靠拢。他们在楼顶上向警察投掷石块和燃烧瓶，与警察进行英勇的斗争。"},{"type":"paragraph","text":"与此同时，另一批大约六百名学生在校园里同警察进行了搏斗。"},{"type":"paragraph","text":"在校园周围闻讯赶来的一千名青年工人和市民，也参加了反抗反动警察镇压的斗争。（附图片）"},{"type":"paragraph","text":"日本人民举行反美大示威。图为东京的工人、学生和市民的示威游行队伍。　　　　　　　　　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f96c9de97f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
