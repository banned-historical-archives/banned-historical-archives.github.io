script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"残酷剥削卖血的人　新生输血社伪造证书四负责人送法院中山及纺建等医院粗枝大叶作风　应进行检讨","authors":[],"dates":[{"year":1950,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　南昌路四十三弄三十六号“新生铁血库输血服务社”负责人任坤祥、俞佐朝、朱荣贵、陶立祥等，因剥削输血者，伪造医药化验所之血液检验报告书及图章，已为卢家湾公安分局拘捕，讯问终结，即转送人民法院处理。"},{"type":"paragraph","text":"俞佐朝与陶立祥，在四年之前，创设“新生铁血库输血服务社”；本年四月间，任坤祥与朱荣贵，也加入合伙。该社一向从事中间剥削将卖血者的血液，介绍卖给输血者，从中抽取二三成不等的佣金。"},{"type":"paragraph","text":"售血者先要到该社登记，再送到北四川路八一二号永伟医药化验所检验血型，有无梅毒，及血色素(须百分之七十以上方合格)。起初该社还照章进行。去年十一月间起，竟伪造“永伟医药化验所”图章，并把用过的合格检验报告书上的照片撕去，另换同一血型他人的照片，而至各医院混售血液，本年二月间，即以此偷天换日手法，大量供应中山医院需要输血的病家。"},{"type":"paragraph","text":"上月十七日，纺建第一医院需要“○”型血液，该社任坤祥、朱荣贵两人即介绍汪勇(原为顾阿根的检验书，将顾的照片撕下，另换汪的照片)前往输血四○○C.C.。四○○C.C.血液的代价是十八万元，任坤祥却向汪勇说:“侬要心里明白，阿拉是帮侬忙格。”即仅给以十万元，余八万元即作为所谓“佣金”了(如果佣金以三成而论，也只五万四千元，应给汪勇十二万六千元)。汪勇虽与之争论，也无结论。"},{"type":"paragraph","text":"七月六日，汪勇即将此情形，报告卢家湾公安分局，该局派员前往传讯该社负责人时，并抄出伪造“永伟医药化验所”的假图章一枚，伪造与涂改的血液反应检验报告书四张等。"},{"type":"paragraph","text":"按:新生输血服务社的“喝血”行为应当严予处置，伪造检验报告书混售血液更为罪大恶极；本市各医院为对病人负责起见，应当注意——并改善这一事实。中山医院及纺建第一医院这种粗枝大叶作风也应该检讨。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02ee461dd1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
