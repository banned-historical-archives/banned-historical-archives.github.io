制若干问题的报告》（概要）","authors":[],"dates":[{"year":1975,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"中央军委转发总参谋部、总政治部、总后勤部《关于院校编制若干问题的报告》（概要）","type":"title"},{"text":"1975年5月14日，中共中央军委转发解放军总参谋部、总政治部，总后勤部《关于院校编制若干问题的报告》。《报告》明确了军队各类院校的训练分工、学员定额及抽调比例、院校机关和学员队的设置。《报告》同时还规定了各类院校的教工人员与学员的编配比例，大专院校和军政干部学校教工人员与学员的比例分别为1：l.9和1：2，教员与学员比例分别为1：5和1：6，中等专业技术学校和军医学校教工人员与学员的比例分别为1：2.3和1：2．5，教员与学员比例均为1：6指挥院校实行三级训练体制：军政大学培训师以上干部和少数优秀的团职干部，军政大学干部学校培训营团干部和部分优秀的连职干部，教导队轮训连排干部。工程技术院校和专业训练队分别训练高等和中等技术人员。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f55cfe4d22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
