头目阴谋破坏示威游行遭到可耻失败","authors":[],"dates":[{"year":1968,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议美帝侵略越南声援越南人民斗争"},{"type":"paragraph","text":"澳大利亚学生示威怒冲美国领事馆"},{"type":"paragraph","text":"一小撮修正主义头目阴谋破坏示威游行遭到可耻失败"},{"type":"paragraph","text":"据新华社墨尔本五日电　澳大利亚墨尔本和悉尼的学生，四日分别举行示威游行，反对美帝国主义侵略越南。"},{"type":"paragraph","text":"在墨尔本，数百名学生和劳动人民一起，举着越南民主共和国国旗和越南南方民族解放阵线的旗帜，在美国驻墨尔本领事馆外面举行示威，同警察进行了激烈的搏斗。示威者在向美国领事馆冲击时，统治当局派出了骑警向学生乱冲乱撞，但是遭到示威者的猛烈反击。愤怒的学生用石块砸碎了领事馆的玻璃窗，并把挂在领事馆屋顶上的一面美国星条旗扯下来烧毁。示威者还指着领事馆里的美国人高呼口号：“（美国）从越南滚出去！”“美帝国主义者是肮脏的侵略者！”“刽子手！”“不许干涉澳大利亚！”"},{"type":"paragraph","text":"青年学生在同警察的搏斗中表现十分坚决。警察非法逮捕了五十五个学生。当警察用警车把学生带走时，示威者打碎了四辆警车的窗子，并前往警察局前示威，要求释放被捕者。"},{"type":"paragraph","text":"一些修正主义的领导人企图破坏这次示威游行，他们极力想使学生“平静下来”，并妄图解散示威队伍。但是他们的阴谋遭到了可耻的失败。"},{"type":"paragraph","text":"在警察局举行示威后，有几百人又不顾警察的镇压，来到萨瑟恩克罗斯旅馆，一些美国人正在那里举行集会活动。示威群众冲进旅馆，把美国星条旗扯下来，在大楼前烧毁。"},{"type":"paragraph","text":"在悉尼，三百名学生再次在悉尼联邦议会办公处外面举行示威，抗议美国的侵越战争和警察的暴行。大批警察被派来袭击示威者，但示威者英勇反击，毫不退却，终于冲进了议会办公处大楼，举行了静坐示威。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"543cabd7ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
