ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于对付将桂军攻击之部署致叶挺等电","alias":"","parts":[{"type":"paragraph","text":"关于对付蒋桂军攻击之部署"},{"type":"paragraph","text":"致叶挺等电"},{"type":"paragraph","text":"（1940年9月22日）"},{"type":"paragraph","text":"（一）桂军五个师，李仙洲三个师，周岩三个师，已集中皖西一带，桂军一个师已越过淮南路东，汤恩伯九个师连日由鄂开豫，已在南阳集中，不日东进，估计各军全部开至新黄河淮南路一带进攻出发地，并开始向我彭雪枫、张云逸攻击之时间约在下月中旬左右，那时我除令彭雪枫、张云逸以游击战争暂时支持皖东与淮北两地外，我苏北主力即须动手解决韩德勤。"},{"type":"paragraph","text":"（二）皖南部队及军部以在动手解决韩德勤之前移至苏南为有利。准备情形如何，几天可以开完，盼告。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":9,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":138,"page_end":138},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1db7f09710"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
