rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"朝；罗；老；阿；柬；越等国领导人分别致电毛主席；华总理等我国领导人就我国河北省唐山、丰南一带发生强烈地震表示深切慰问","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年七月三十一日讯 朝鲜、罗马尼亚、老挝、阿尔巴尼亚、柬埔寨和越南的党和国家领导人最近分别打电报给毛泽东主席、华国锋总理等我国党和国家领导人，就我国河北省唐山、丰南一带发生强烈地震，表示深切的慰问。"},{"type":"paragraph","text":"这些慰问电是：朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成和朝鲜民主主义人民共和国政务院总理朴成哲给毛泽东主席和华国锋总理的慰问电；罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库和罗马尼亚社会主义共和国政府总理马尼亚·曼内斯库给毛泽东主席和华国锋总理的慰问电；老挝人民革命党中央委员会总书记、老挝人民民主共和国政府总理凯山·丰威汉和老挝人民民主共和国主席、老挝人民民主共和国最高人民议会主席苏发努冯给毛泽东主席、吴德副委员长和华国锋总理的慰问电；阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡给华国锋总理的慰问电；民主柬埔寨政府总理波尔布特给华国锋总理的慰问电；越南社会主义共和国政府总理范文同给华国锋总理的慰问电。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"河北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4334c3435"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
