"authors":[],"dates":[{"year":1967,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　海军东海舰队驻上海部队指战员从广播里收听到上海市革命委员会公布的《当前上海文化大革命的形势和任务》的决议草案后，一片欢腾，热烈欢呼:“毛主席万岁!万岁!万万岁!”他们说，中央人民广播电台广播这个决议草案，是毛主席对我们无产阶级革命派最有力的支持，最亲切的关怀，最巨大的鼓舞。指战员们一致表示，坚决不折不扣地执行伟大领袖毛主席关于人民解放军应该支持左派广大群众的指示，进一步进行“三结合”联合夺权斗争，坚决保卫上海市革命委员会，保卫无产阶级文化大革命。"},{"type":"paragraph","text":"广大指战员们说，目前上海无产阶级文化大革命形势大好，好得很!上海市革命委员会的成立，标志着上海无产阶级革命派实行大联合，向党内一小撮走资本主义道路的当权派进行夺权斗争，已经取得了初步胜利。但这决不意味着夺权斗争的结束。“宜将剩勇追穷寇，不可沽名学霸王。”我们一定遵照毛主席和党中央的最新指示，紧紧地和上海无产阶级革命派团结在一起，战斗在一起，进一步开展“三结合”联合夺权斗争，把党内一小撮走资本主义道路的当权派所篡夺的领导权统统夺过来，牢牢地掌握在无产阶级革命派手里。"},{"type":"paragraph","text":"某部四好单位323舰的指战员们说，我们的伟大领袖毛主席教导我们:“枪杆子里面出政权”，“没有一个人民的军队，便没有人民的一切”。这是千真万确的真理。我们是毛主席亲手缔造的人民军队，是无产阶级专政的柱石。保卫无产阶级文化大革命，是我们应尽的天职。"},{"type":"paragraph","text":"我们守卫在东海的最前哨，百倍地注视着帝、修、反的一切阴谋活动。我们同时密切地注视着国内阶级敌人散布的流言蜚语，高度警惕敌人攻击和破坏无产阶级专政机构。我们宣誓:誓死捍卫毛主席，捍卫毛主席的革命路线，捍卫无产阶级文化大革命；坚决执行最高统帅毛主席的命令，坚决支持左派广大群众，坚决捍卫上海市革命委员会。"},{"type":"paragraph","text":"指战员们说，我们已经做好了一切准备，弹上膛，刀出鞘，严阵以待，国内外的一切阶级敌人，胆敢轻举妄动，破坏上海市革命委员会，破坏无产阶级文化大革命，我们一定坚决、彻底、干净、全部地把它们消灭!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cafeb8eb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
