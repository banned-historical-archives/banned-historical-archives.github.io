tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"强边固防三题——学习毛泽东人民战争思想体会点滴","authors":["朱成友李杰"],"parts":[{"type":"paragraph","text":"中国革命战争的历史告诉我们，要进行和赢得战争，就必须广泛深入地发动和依靠群众，把支援战争的伟力深深扎根于民众之中。"},{"type":"paragraph","text":"强化国防教育。应使广大人民群众懂得，“民”是国防的基础，“军”是国防的骨干，实行武装的“军”与非武装的“民”相结合，才能筑起真正的钢铁长城。在边疆地区，建立起以军队为骨干、以人民为基础的人民防线，是强边固防之本。"},{"type":"paragraph","text":"加速经济发展。边疆经济的发展，是增强固边御敌的物质基础。由于历史的原因，我国边疆地区科学、文化、教育比较落后，阻碍了经济的发展，与强边固防的要求形成了突出的矛盾。因此，在经济发展的大潮中，边防部队在加强现代化建设的同时，要大力支援边疆经济建设，改善人民的物质文化生活，促进各族人民的共同繁荣。军队打胜仗，人民是靠山。只有边疆各族人民有了雄厚的物质条件和富裕的生活，才能使强边固防获得可靠坚实的基础。"},{"type":"paragraph","text":"加强民族团结。邓小平同志在任西南军区政治委员时就明确提出，“西南的国防与民族问题是分不开的。有了民族团结，就有了国防；没有民族团结，就没有国防”。边防部队点多线长，同边疆各族人民群众有着频繁的往来与联系，军民共同担负着保卫边疆和建设边疆的任务，许多事情都是边疆军民携手并肩进行的。真正的铜墙铁壁是人民，要尊重少数民族的风俗习惯，并帮助他们提高科学文化水平，发展生产，改善生活。要加强民族区域自治，提高他们的主人翁意识，热爱祖国，热爱社会主义，热爱共产党，增强边疆各族人民的凝聚力和向心力。"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45e94dba76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
