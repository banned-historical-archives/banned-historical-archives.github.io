" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津市委关于蔡公琪同志所犯错误的处分决定","authors":[],"dates":[{"year":1952,"month":8,"day":9}],"is_range_date":false,"parts":[{"text":"天津市委关于蔡公琪同志所犯错误的处分决定","type":"title"},{"text":"蔡公琪，男，三十七岁，河北省博野县人，一九三八年入党，现任市人民政府公共卫生局第二副局长。所犯错误如下：","type":"paragraph"},{"text":"一、乱用私人十六人，其中“三反”中发现有贪污者九人，有政治问题者一人。尤为严重的，是蔡公琪曾以私人感情为主，将自动脱党的开小差的及停止党籍或开除党籍情况未定者接上党的关系，使这些人又重新混入党内，已查明者有三人。另收容从部队开小差的一人，部队来找此人，蔡又将其放走。","type":"paragraph"},{"text":"二、通过其所属干部卢瑞源，向私人开业大夫旧同学“借”钱近三百万元，其中有该局所属单位之干部及工作人员数人。其爱人在妇产科医院工作，生小孩时，全院自院长至工友每人送礼一份，少者四、五千元，影响甚坏。","type":"paragraph"},{"text":"三、蔡公琪在卫生局所属的材料厂仓库、医政科仓库拿取毯子、布疋、蚊帐纱、呢绒、小孩毛衣、奶粉、药棉、毛巾、肥皂等二十八种物品，另药品三十余种。其中有些是蔡公琪用的，有的是蔡批给别人用的，此帐查不清。另自机关生产中购买日用品、表等合计一百一十余万元。以上共折款一千六百余万元。","type":"paragraph"},{"text":"四、蔡生活腐化，曾与小孩保姆发生不正常男女关系，并介绍她到妇产科医院当助理护士。","type":"paragraph"},{"text":"一九五O年曾检查与批评过蔡公祺，前述贪污浪费除少数药品及第二项一部分，其他都是一九五O年查出者，已经做过处理，并已经有了改正。其任用私人，私自给失掉党的关系的人接上关系，大部是这次检查出来的。似此对党严重的不负责任，造成党组织不纯，比他的贪污浪费更为恶劣。但念其平时工作积极努力，市委决定，经华北局批准，给予留党察看一年处分，建议行政上降职。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6421b5f3ce"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
