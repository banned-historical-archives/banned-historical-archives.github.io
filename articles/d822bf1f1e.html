year":1938,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【路透社东京二十五日电】极右党东和会(译音)、今日开会通过决议案、吁请政府对欧洲大局取强有力之政策、及对德国关捷克问题之要求、予以无限制之赞助、并有言曰、如民治国与共产国包围德日两国、则吾人应实施相当之外交与军略手段、以固现有之反共友谊云、该决议案已送呈日内阁矣。"},{"type":"paragraph","text":"【路透社东京十五日电】此间德大使署接本国官方情报后、已于今日下午发表公报、纠正外间所传关于捷克问题之惊人谣言、公报曰、希特勒与张伯伦在戈台斯堡之谈话、对于维持和平之目的、完全同意、德国报纸与人民，现皆以安详自恃之态度、注视苏台德日耳曼问题、关于欧洲大局之若干国际惊人谣言、适与相反。"}],"comments":[],"origin":"路透社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d822bf1f1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
