script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《旧中国民族资产阶级》简评","authors":["忠民"],"dates":[{"year":1991,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"忠　民"},{"type":"paragraph","text":"上海社会科学院黄逸峰、姜铎、唐传泗、徐鼎新新著《旧中国民族资产阶级》(江苏古籍出版社一九九○年十月出版)是近年来国内学术界对民族资产阶级进行专门研究的一部甚有份量的学术专著。"},{"type":"paragraph","text":"民族资产阶级的经济基础是民族资本主义工商业。该书集中了上海社会科学院经济研究所三十多年有关经济史研究成果，写作、出版前后历时十年，以极为翔实、丰富的史料，全面地阐述了旧中国民族资本主义工商业艰辛备尝、曲折崎岖的发展历程，考察了民族资本以及民族资产阶级在旧中国各个历史时期的发展水平和发展规模，修正了不少过去流行的一些不尽准确、过于粗疏的估计或见解。"},{"type":"paragraph","text":"《旧中国民族资产阶级》一书以相当的篇幅叙述分析了民族资产阶级在近代中国历次重大政治运动中的表现和作用。书中以令人信服的史料表明，旧中国的民族资产阶级虽然在当时特定的社会条件下有过一次次重大的政治失误，并且不可避免地表现出妥协动摇性，但就其阶级的基本方面来说，民族资产阶级既不甘心依附于帝国主义和封建势力，也不甘心于追随官僚买办资产阶级，而是要求独立自主地发展资本主义。当这一政治追求事实上难以实现时，民族资产阶级顺应大势所趋，接受中国共产党的领导，支持和帮助中国共产党完成了新民主主义革命大业，充分体现了民族资产阶级的革命性和进步性。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cfb988375"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
