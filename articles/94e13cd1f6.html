1975,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席指引着我们前进"},{"type":"paragraph","text":"〔珞巴族民歌〕红太阳照亮了珞巴山村，千年的乌云一扫尽；砸碎了颈上的铁锁链，奴隶翻身作了新西藏的主人。过去我们被迫在密林里刀耕火"},{"type":"paragraph","text":"种，三大领主骂我们是“野人”；如今，我们自力更生挥铁臂，让沉睡的土地在手中回春。山顶是亮晶晶的白雪，山腰是青幽幽的松林；新开的梯田稻花香，新修的水渠绕山村……战天斗地夺高产，丰收的歌儿唱不尽。大寨红花结硕果，边疆面貌日日新。斟满香喷喷的青稞酒，向着明亮亮的北斗星，站在雪山顶上纵情歌唱，让颂歌驾着彩云飞北京：我们美丽的家乡日新月异，全靠毛主席革命路线指引；紧握枪杆保卫边疆，反修防修，巩固无产阶级专政。珞巴人民沿着社会主义金光"},{"type":"paragraph","text":"道，永远跟党和毛主席胜利向前"},{"type":"paragraph","text":"进！"},{"type":"paragraph","text":"（高鹰整理）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94e13cd1f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
