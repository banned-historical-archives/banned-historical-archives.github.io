":1979,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见铃木善幸一行"},{"type":"paragraph","text":"指出面对霸权主义的扩张，中日要进一步发展友好关系和加强自己力量"},{"type":"paragraph","text":"谈到国民经济调整时说，引进外国先进技术和吸收外国资金的做法不变"},{"type":"paragraph","text":"新华社北京五月三十一日电  邓小平副总理今天上午在会见日本自民党众议员铃木善幸时指出，面对着霸权主义在亚太地区的扩张，中国和日本需要进一步发展友好关系和各自加强自己的力量。"},{"type":"paragraph","text":"铃木先生说，日本对亚洲的稳定给予最大的关注。他指出，亚洲的和平与稳定是建立在力量均衡基础上的。日本和中国加强合作，对亚洲的安全将发挥作用。"},{"type":"paragraph","text":"邓副总理回答说，反对霸权主义的力量需要联合起来。"},{"type":"paragraph","text":"邓副总理在谈到实行国民经济的调整时说，中国需要引进外国先进技术和吸收外国资金，这个做法不变。在这方面，中国希望同日本更多地合作。"},{"type":"paragraph","text":"参加会见的日本朋友还有池田行彦、中西启介、原田升左右、今井勇、材津昭吾。"},{"type":"paragraph","text":"日本驻中国大使馆临时代办伴正一参加了会见。"},{"type":"paragraph","text":"会见时在座的有中日友协副会长张香山等。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见日本铃木善幸先生。  新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2999d6ba60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
