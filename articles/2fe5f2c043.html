恩来、叶剑英、李先念、郭沫若等前往车站欢送","authors":[],"dates":[{"year":1972,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年八月十日电　柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，由中共中央军委副主席、人大常委会副委员长徐向前陪同，于今日凌晨乘专车离开北京，前往济南进行正式访问。"},{"type":"paragraph","text":"柬埔寨国内特使英·萨利陪同访问。"},{"type":"paragraph","text":"随同访问的柬埔寨贵宾有:王国民族团结政府首相府大臣吉春，诺罗敦·凯卡妮娅公主，博夫人，诺罗敦·尤瓦那王子和夫人，诺罗敦·伦赛公主，诺罗敦·西哈莫尼王子，诺罗敦·诺林达拉邦王子，古伦夫人，洪金宽大使和夫人。"},{"type":"paragraph","text":"前往车站欢送的有:柬埔寨民族统一阵线中央政治局主席、王国民族团结政府首相宾努亲王和夫人，王国民族团结政府大臣沙林察和夫人、秀木和夫人、杨森安将军和夫人、秀蒲拉西、万比尼第二副大臣的夫人，暹安大使的夫人等。"},{"type":"paragraph","text":"我国国务院总理周恩来、中共中央军委副主席叶剑英、国务院副总理李先念、人大常委会副委员长郭沫若、外交部长姬鹏飞、中共中央对外联络部部长耿飚、北京市革命委员会主任吴德，以及有关方面负责人韩念龙、郭鲁、林佳楣、于立群、许寒冰、韩叙、梁枫、孙浩等，前往车站送行。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召陪同柬埔寨贵宾前往济南。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fe5f2c043"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
