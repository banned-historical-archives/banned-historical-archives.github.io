ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对《人民日报》拟发的一组批判胡风的文章的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对《人民日报》拟发的一组批判胡风的文章的批语和修改"},{"type":"paragraph","text":"（1955年5月）提高警惕，揭露胡风。²"},{"type":"paragraph","text":"二按语不用，另换一个。3"},{"type":"paragraph","text":"[1]指《人民日报》总编辑邓拓1955年5月15日晚10时报送毛泽东审阅的一组拟在《人民日报》发表的文章的清样。这组文章的总标题原为《胡风的反党反人民集团必须彻底批判》。"},{"type":"paragraph","text":"[2]这是毛泽东为这组文章重拟的总标题。这组文章后来发表在1955年5月18日《人民日报》。此后，《人民日报》又以这个标题开辟专栏，陆续发了几组批判胡风的文章。"},{"type":"paragraph","text":"[3]这个批语写在邓拓送审的为发表这组文章而写的《人民日报》编者按上。后来《人民日报》按照毛泽东的批示另拟了一个。本篇三就是毛泽东对另拟的编者按中一句话的修改，文中用宋体字排印的是毛泽东加写和改写的文字。这个按语载于1955年5月18日《人民日报》。对《人民日报》拟发的一组批判胡风的文章的批语和修改"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"如果我们不提高警惕，不把他们的问题弄清楚，不把他们的破坏活动加以制止，而让他们继续不断地“联络人”“争取人”“从事开辟工作”“大大地加强实力”，即是说让他们一天一天发展和扩大下去，他们就要用他们的“集束手榴弹”给我们的革命事业以严重的损害。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":95,"page_end":96},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90e7882a2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
