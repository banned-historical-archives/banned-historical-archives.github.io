动中吸收新党员预备期问题的意见》","authors":[],"dates":[{"year":1965,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央批转《中央组织部关于在“四清”运动中吸收新党员预备期问题的意见》","type":"title"},{"text":"现将中央组织部关于在“四清”运动中吸收新党员预备期问题的意见发给你们。在农业集体化和“四清”运动中，经过考察，确实优秀、可靠的贫下中农积极分子，吸收入党时，可以由工作队党委决定经分团委或者县委批准，缩短或者不要预备期。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"中央组织部关于在“四清”运动中吸收新党员预备期问题的意见","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"据河北、湖北、陕西等省反映，在开展“四清”运动的地方，发现有些生产大队党支部问题很严重，支部委员中，一部分甚至全部不能再担任领导职务，在一般党员中，又没有适当的人，可以补充或者重新组成支部领导班子。而这些地方，在运动中又都涌现出了一些积极分子，他们中有的人在入党以后即可以担任支部的领导职务。可是，按照党章规定，新党员都要有一年的预备期，预备党员不能被选为支部委员。这样，这些支部的领导核心就建立不起来，支部工作要受到影响。因此，他们建议对那些准备要担任支部领导工作的新党员，可以不要预备期，从入党的那天起，就成为正式党员。","type":"paragraph"},{"text":"我们原则上同意这个意见。在开展“四清”运动的地方，接收不要预备期的党员，只限于个别在社会主义教育运动中经过考验的确实优秀的，主要是需要立即担任支部书记或支部委员的那些新党员。至于点上接收的其他党员和面上接收的党员，仍应按照党章规定，都要有预备期。接收不要预备期的党员，可以由县社教工作团党委批准。以上意见如可行，请批转各地。","type":"paragraph"},{"text":" 中央组织部一九六五年二月十三日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批转《中央组织部关于在“四清”运动中吸收新党员预备期问题的意见》","authors":[],"dates":[{"year":1965,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央批转《中央组织部关于在“四清”运动中吸收新党员预备期问题的意见》","type":"title"},{"text":"现将中央组织部关于在“四清”运动中吸收新党员预备期问题的意见发给你们。在农业集体化和“四清”运动中，经过考察，确实优秀、可靠的贫下中农积极分子，吸收入党时，可以由工作队党委决定经分团委或者县委批准，缩短或者不要预备期。","type":"paragraph"},{"text":"附：","type":"subtitle"},{"text":"中央组织部关于在“四清”运动中吸收新党员预备期问题的意见","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"据河北、湖北、陕西等省反映，在开展“四清”运动的地方，发现有些生产大队党支部问题很严重，支部委员中，一部分甚至全部不能再担任领导职务，在一般党员中，又没有适当的人，可以补充或者重新组成支部领导班子。而这些地方，在运动中又都涌现出了一些积极分子，他们中有的人在入党以后即可以担任支部的领导职务。可是，按照党章规定，新党员都要有一年的预备期，预备党员不能被选为支部委员。这样，这些支部的领导核心就建立不起来，支部工作要受到影响。因此，他们建议对那些准备要担任支部领导工作的新党员，可以不要预备期，从入党的那天起，就成为正式党员。","type":"paragraph"},{"text":"我们原则上同意这个意见。在开展“四清”运动的地方，接收不要预备期的党员，只限于个别在社会主义教育运动中经过考验的确实优秀的，主要是需要立即担任支部书记或支部委员的那些新党员。至于点上接收的其他党员和面上接收的党员，仍应按照党章规定，都要有预备期。接收不要预备期的党员，可以由县社教工作团党委批准。以上意见如可行，请批转各地。","type":"paragraph"},{"text":" 中央组织部一九六五年二月十三日","type":"paragraph"},{"text":"(根据文件的翻印件打印，翻印者未注明)","type":"appellation"}],"comments":[],"origin":"根据文件的翻印件打印，翻印者未注明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f587272742"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
