rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"不断进行思想发动 正确处理纲目关系机炮二连狠批“四人帮”，干劲鼓得足","authors":[],"parts":[{"type":"paragraph","text":"本报讯 执行繁重的生产任务的连队，能不能抓好揭批“四人帮”的斗争？五二八六○部队机炮二连的干部战士用抓纲带目的行动作了很好的回答。"},{"type":"paragraph","text":"这个连担负为全师和兄弟单位挖煤的任务，每天分两班下井生产。少数同志一度认为，只要能多出煤，揭批差一点没关系。党支部专门召开支委会研究，并在全连开展讨论。在抗震救灾中荣立集体一等功的二排同志们说，揭批“四人帮”是一场严重的阶级斗争，事关我们党，我们国家，我们军队的前途与命运。时间紧，我们讲。打倒“四人帮”，我们浑身有的是劲。党支部“一班人”也认为，由于“四人帮”的干扰和破坏，部队建设确实存在不少问题，不发动战士积极投入揭批“四人帮”的斗争，联系连队的实际，肃清其流毒和影响，就不能很好地落实华主席提出的今年的四项战斗任务，就不能把连队全面建设好，也不能把生产任务完成好。"},{"type":"paragraph","text":"认识一提高，行动就自觉。干部战士自觉坚持每天学习毛主席著作一个半小时，掌握揭批武器。共青团、革命军人委员会紧密配合揭批斗争，墙报、黑板报、漫画遍本营区。全连出现了“生产不忘抓纲，愤怒批判‘四人帮’”的动人景象。大学大批促进了大干。全连日产煤量大幅度上升，由原来的五十多吨上升到六十多吨，最高达到七十四吨。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7932a682e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
