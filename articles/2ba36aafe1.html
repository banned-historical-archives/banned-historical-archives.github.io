<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"几内亚艺术家举行最后一场访华演出曹荻秋市长、金仲华副市长热烈祝贺演出的巨大成功　塞古大使在闭幕式上讲话，热烈赞扬我国文化大革命","authors":[],"dates":[{"year":1966,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　几内亚国立佐利巴舞蹈团昨晚在本市举行最后一场访华演出，获得了上海观众的热烈赞赏。"},{"type":"paragraph","text":"演出前，举行了隆重的闭幕式。上海市市长曹荻秋和夫人石斌，上海市副市长金仲华，市文化局局长孟波，对外文委代表郑之辅，以及本市有关方面负责人和文艺界人士出席了闭幕式并观看演出。演出前曹荻秋市长会见了舞蹈团总团长西索柯·阿马杜，副总团长库雅特·索里·康迪亚和夫人，行政负责人萨纳·马马杜·拉米纳和夫人，艺术指导西索柯·阿普西塔夫人，舞台总监督恩·迪阿依·阿布杜拉依，同他们亲切交谈。"},{"type":"paragraph","text":"几内亚驻中国大使卡马拉·塞古和夫人也参加了会见。"},{"type":"paragraph","text":"上海市副市长金仲华在闭幕式上讲话。他指出，中几两国人民在反对帝国主义和新老殖民主义的斗争中，从来都是互相鼓舞、互相支持的，在共同的斗争中我们结成了深厚的战斗友谊。这次几内亚艺术家们的访问演出，必将为进一步加强中几两国人民的友谊和文化交流作出新的贡献。"},{"type":"paragraph","text":"几内亚驻中国大使卡马拉·塞古在讲话中，介绍了几内亚人民在取得独立后进行清除殖民主义影响的文化革命情况。他说，几内亚在塞古·杜尔总统的领导下，我们对整个文化部门进行了改造，包括教育、文化和艺术。佐利巴舞蹈团就是文化革命的产物。所以，我们更容易理解中国正在进行的伟大的文化大革命，我们欢呼中国的文化大革命，并向你们表示祝贺。卡马拉·塞古大使说，佐利巴舞蹈团在中国访问演出所取得的成就，是几内亚和中国人民共同的成就。最后他祝几中两国文化交流不断发展，祝两国人民反对帝国主义的战斗友谊不断巩固。"},{"type":"paragraph","text":"昨晚，来自西非的几内亚艺术家演出的《几内亚的前天》《几内亚的昨天》《几内亚的今天》三大部分的大型歌舞，以高昂的斗争激情和浓厚的民族色彩，歌颂了几内亚人民争取自由、反对帝国主义的斗争和正在建设的幸福生活，这些节目受到了上海观众的高度评价。"},{"type":"paragraph","text":"昨晚，几内亚艺术家又一次演唱了《战斗的非洲歌颂毛泽东和他伟大的事业》，热情地歌颂了毛泽东思想，真切地表达了几内亚人民和非洲人民对毛泽东主席和他的伟大著作的无比尊敬和热爱。艺术家们还用中国话演唱了《东方红》《社会主义好》《毛泽东的光辉》《大海航行靠舵手》等中国歌。在演唱这些歌曲时，全场观众随着歌声有节奏地鼓掌，表达了中几两国人民的战斗友谊。"},{"type":"paragraph","text":"演出结束时，曹荻秋市长、金仲华副市长等在卡马拉·塞古大使陪同下走上舞台，同几内亚艺术家们热烈握手，祝贺艺术家们在中国访问演出的巨大成功。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\06\\666r020201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市市长曹荻秋等在演出结束时，上台祝贺几内亚佐利巴舞蹈团演出成功。"},{"type":"paragraph","text":"本报记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"曹荻秋","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ba36aafe1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
