<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"白城县工作落后的建政村粮食统购中的情况","authors":[],"dates":[{"year":1953,"month":12,"day":5}],"is_range_date":false,"parts":[{"text":"白城县工作落后的建政村粮食统购中的情况","type":"title"},{"text":"【东北总分社五日讯】黑龙江省白城县第十区建政村是个落后村，村支部领导不强，阶级分化很大。全村有一户富农，十九户富裕中农，八十八户中农，三十六户贫农，一户雇农。从财产占有上看，以牲畜为例，三十六户贫农只有二十九头畜力，其中十九个还是小毛驴，而十九户富裕中农有畜力五十八头，其中马二十六头。全村二十二个互助组中，没有一个真正的常年组。夏锄时，大部分是各干各的，因而没有发挥组织起来的作用和优越性，互助组反不如单干户打粮多。全村二十一名党员，有两名单干，十三名参加互助组后又退组单干。有八名党员是富裕中农。","type":"paragraph"},{"text":"在粮食统购试点工作中，一些富裕户的党员带头把粮食卖给国家不够积极。支部书记贾炳忠在几次会议上都坚持说：人要吃一石二斗(按粮食品种不同，一斗约重五十五斤到六十斤)，大小马平均两石，毛驴七斗或一石，并说：“不这样算就没法向群众解释。”贾炳忠今年打粮二十五石，收回别人借去的七石，共三十二石，但他在积极分子座谈会上表示只能卖七石，并说：“我不能带头报卖多少，好像给共产党拉套似的。”在给自己算吃粮时，一个生下三天的小孩也留了一石二斗。后经教育他才同意卖了十九石。党员王殿文跟家里人说：“看咱们的命啊，早不丰收晚不丰收，赶上一个丰收，国家还要实行计划购粮，真倒霉!”","type":"paragraph"},{"text":"试点工作在训练积极分子阶段，群众就沉不住气了。不少人问：“县里来这些人干啥?”“紧打傢伙(指开会)没好戏。”计划购粮布置后，引起以下一些反映：“县里这么些人来买粮食，国家一定是缺粮。”“抓粮抓的这么厉害，大半是运往外国去。”“粮食还得涨价哩。”“多留点，这回再缺粮就不好借了。”富裕户顾虑多，而且存在不满情绪。富裕户姓鄂的农民找工作组同志到他家谈话，大发牢骚，说：“国家是好国家，政策不是好政策，穷的好，富的倒霉啊！我多打粮是粪筐子死不离身，现在看透了，有了就是吃喝。”张士维说：“这比‘满洲国’还厉害，在‘满洲国’时，粮食还能藏起来，现在自己的底都叫人家摸去了。”坏分子亦乘机造谣破坏。","type":"paragraph"},{"text":"工作组在试点中针对这些思想已进行了宣传教育。(马新仁)","type":"paragraph"}],"comments":[],"origin":"1953年12月10日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b44880561"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
