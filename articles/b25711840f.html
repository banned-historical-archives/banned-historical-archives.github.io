al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致林彪、鼓荣臻等电","alias":"","parts":[{"type":"paragraph","text":"致林彪、聂荣臻等电"},{"type":"paragraph","text":"（1935年11月9日）林、聂，徐、程："},{"type":"paragraph","text":"一、探悉：童英彬（斌）令其一〇六师十号以前进出（至）黑水寺、龙益湾、锯家角、崇家湾筑确，以掩护尔后该军东进，并有将占领该地南北地区说，似该军主力一二日内尚难进至直罗镇。二、明十号部署如下：（甲）一军团在原地不动。（乙）子华率七十五师进至桃花砭、张村驿之间地区荫蔽集结。（丙）海东指挥张村驿、羊泉地区部队肃清金村、东村、套通、久原一带团匪。这一任务对于今后作战甚为重要。（丁）海东速令独立营发动直罗镇、黑水寺一带及其附近地区群众坚壁清野，务将粮食、锅头搬尽，并令骑兵速向大（太）白镇侦察。（戊）我们在原地不动。"},{"type":"paragraph","text":"彭毛九日二十时"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":11,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":48,"page_end":48},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b25711840f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
