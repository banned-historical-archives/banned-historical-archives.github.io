art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英不拘一格选教员","authors":["刘述通"],"parts":[{"type":"paragraph","text":"1948年5月，叶剑英同志受命创办华北军政大学，并任校长兼政委。当时，全校的教员缺额达四分之三。为此，叶剑英同志果断地提出，请那些从敌营垒中过来的有真才实学的人来任教。他亲自写信，派人四出“招贤”，经多方努力，很快集中了二三百名具有一定军事理论水平或技术专长的旧军官。"},{"type":"paragraph","text":"叶剑英同志要求学校各级领导和有关同志，对旧军官做到政治上平等，思想上重视，态度上诚恳，生活上关心。并且经常利用业余时间，同他们谈思想、谈学习、拉家常，坦诚相见。在他和学校领导的耐心帮助教育下，这些旧军官出身的教员的政治思想水平和业务能力不断提高，在教学中发挥了各自的聪明才智，做出了积极的贡献。"},{"type":"paragraph","text":"（刘述通辑）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1f8b1226c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
