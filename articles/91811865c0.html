:["朱习华"],"dates":[{"year":1984,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘正威在河南省第四次党代会上说"},{"type":"paragraph","text":"根除派性必须彻底否定“文革”"},{"type":"paragraph","text":"本报讯　记者朱习华报道：增强党性，根除派性，首先在认识上要彻底否定“文化大革命”。这是中共河南省委书记刘正威在13日开幕的河南省第四次党代会上所作的报告中指出的。"},{"type":"paragraph","text":"刘正威说，目前从全省看，“闹派性已经为广大群众所厌弃。但是，也确有少数人派性至今尚未克服，有的拒不认错，仍有怨气和不满情绪，进行派性活动，不服从组织分配。有的竟走上了包庇罪犯或反革命的道路。还有的以派划线，自封本派是正确路线的代表，以一贯正确自居。凡是坚持派性的人，都是没有从思想上根本否定‘文化大革命’。”"},{"type":"paragraph","text":"刘正威强调指出：“根除派性，旗帜一定要鲜明，态度一定要坚定，最根本的办法就是要学好文件，增强党性教育，要广泛地开展谈心活动，进行深入细致的思想工作，消除隔阂，增强团结，要正确处理好政策问题”，“坚持派性屡教不改的人，应受到党纪处分。”对于“文革”中造反起家的人，帮派思想严重的人和打砸抢分子，“不论是哪一派的，只要是‘三种人’，都必须清理出来。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91811865c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
