" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"凃长望要退党","authors":[],"dates":[{"year":1957,"month":7,"day":18}],"is_range_date":false,"parts":[{"text":"凃长望要退党","type":"title"},{"text":"预备党员、中央气象局局长、九三学社秘书长凃长望，整风运动开始后，已三次向气象局党组织负责人提出要退党。理由是：参加党，会议太多，无法工作。据气象局党组织分析，这不是真实原因。党的活动每周不超过一次，并不影响工作。真实原因估计有四个：1、运动中看到批判党的意见很多，发生动摇。2、可能想扩大“九三”势力，和党争天下(现正积极发展“九三”组织)。3、对两年候补期有意见。4、整风中受到一些批评。四个原因中前两个是主要的。","type":"paragraph"},{"text":"自气象局成立以来，凃即要求入党。去年4月被吸收入党时，因其曾脱过党，故确定候补期为二年。远在二十多年前，凃在英国留学时曾参加党(与杨秀峰同志同时)，回国后见情况不好(31、32年间，国民党剿共最凶时)，只缴过两次党费，后便自动脱党。","type":"paragraph"},{"text":"凃这次入党后表现不算好。平时谈话中流露出对“肃反”不满，他认为最好的三个干部都被斗了，他不同意事先不调查就斗。实际情况不是那样。这些人虽然不是现行反革命，但都有严重历史问题，经过运动也都弄清楚了。如他认为是好干部之一的冯秀藻，曾经是地下党员，三九年(平法惨案前)在长沙被捕，后又在重庆第二次被捕，被捕后自首出卖了组织，后来参加了国民党，去美国留学，运动中弄清了这些问题。冯现在自己对肃反并无意见。凃一贯站在资产阶级知识分子的立场上。气象局的技术人员级评得较高，和他也有关系。有人说他们有技术上的宗派。他对派留学生出国的问题上也很有意见。气象局提出的名单到公安部没通过，他便要写信责问公安部，并要联合科学院共兴问罪之师。","type":"paragraph"},{"text":" (原载人民日报“情况汇编”第二十四期)","type":"paragraph"},{"text":" 来源：1957年7月18日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"815b897a9b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
