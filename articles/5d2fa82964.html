" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"李英儒在戏剧口会议上谈斗刘邓陶实况","authors":["李英儒"],"dates":[{"year":1967,"month":8,"day":6}],"is_range_date":false,"parts":[{"text":"李英儒在戏剧口会议上谈斗刘邓陶实况","type":"title"},{"text":"李英儒","type":"authors"},{"text":"中南海内部斗了刘、邓、陶，中南海的造反派都到他们家里斗的，这里面有中央首长的意见，戚本禹同志插了意见，我们作具体工作的人员都参加了。","type":"paragraph"},{"text":"揪刘少奇的时候，我们认为他不能低头，可是刘少奇走一步向群众鞠一躬，臭妖婆王光美也跟着，王光美吓的不敢抬头。把实况录音机一打开，百万人的喊口号声，我们一百五十多个拳头都指向刘少奇，差一点就打上，把刘少奇吓坏了。","type":"paragraph"},{"text":"邓小平和他的妖婆也一起揪出来了，他老婆和他一样高，如果我有劲，我一手可以揪一个。大家问他：“杨尚昆按窃听器的事你知道不？”邓说知道。“主席怎么说的，说谁再按，开除党籍，你为什么还让他干？”他说：“我是反革命。”几次的这样说，他是反革命。","type":"paragraph"},{"text":"斗争陶铸时，你问他，他老哇啦哇啦的说，由于他老婆有病，没有揪出她来。","type":"paragraph"},{"text":"这次斗争会拍了电影，拍了三千尺，以后就出来彩色的，以后能让大家看。","type":"paragraph"},{"text":"对刘少奇，我们是引而不发。让大家看看他的丑态就可以了，我们一定要知道斗争刘、邓、陶的目的，就是为大批判、大联合，在毛主席的革命路线下联合起来。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王光美","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d2fa82964"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
