script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"在第一次接见红卫兵大会上与林彪同志的谈话","alias":"","parts":[{"type":"paragraph","text":"在八居十一中全会开幕式上的罐话"},{"type":"paragraph","text":"（一九六六年八月十二日）"},{"type":"paragraph","text":"关于第九次大会的问题，恐怕要准备一下。第九次大会什么时候召集的问题，要准备一下，已经多年了。八大二次会议到后年就十年了，现在需要开九次大会。大概是在明年适当的时候再开，现在要准备。建议委托中央政治局同它的常委来筹备这件事，好不好？"},{"type":"paragraph","text":"至于这次大会所决定的问题，究竟是正确的还是不正确的，要看以后的实践。我们所决定的那些东西，看来群众是欢迎的，比如中央的-一个重要决定就是关于文化大革命，广大学生和革命的教师是支持我们的。而过去那些方针广大的革命学生跟革命教师是抵抗的，我们是根据这些抵抗来制定这个决定的。但是究竟这个决定能不能实行，还要靠我们在座的与不在座的各级领导去做。比如依靠群众吧，一-种是实行群众路线的，一-种是不实行群众路线。决不要以为决定上写了，所有的党委，所有的同志都会实行，总有一部分人不愿意实行，可能比过去好一些，因为过去没有这样公开的决定，并且这样的决定有组织上的保证。这同组织有些改变。政治局委员，政治局候补委员，书记处书记，常委的调整，就保证了中央这个决定以及公报的实行。"},{"type":"paragraph","text":"对犯错误的志同，也要给他出路，要准许他改正错误。不要认为别人犯了错误就不许他改正错误。我们的政策是“惩前后，治病救人”，“一看二帮”，“团结一一批评一团结”。我们这个党不是党外无党，我们是党外有党，党内也有派，从来都是如此，这是正常现象。我们过去批评国民党，国民党说党外无党，党内无派。有人就说：“党外无党，帝王思想，党内无派，千奇百怪。”我们共产党也是这样，你说党内无派？它就是有，比如说对群众运动就有两派，不过是占多占少的问题。如果不开这次全会，再搞几个月，我看事情就要坏得多。所以我看这次会是开得好的，是有效果的。"},{"type":"paragraph","text":"在第一次接见红卫兵大会上"},{"type":"paragraph","text":"与林彪同志的谈话"},{"type":"paragraph","text":"（一九六六年八月十八日）这个运动规模很大，确实把群众发动起来了，对全国人民思想革命化，有很大意义。在天安门城楼上与北大附中X×X舒要"},{"type":"paragraph","text":"（九六六年八月十八日）毛主席问×××：“陆平现在干什么？”×××同答说：“陆平在北大扫地。”"},{"type":"paragraph","text":"毛主席说：“陆平只能扫地，就象我一样，我到了你们学校也只能扫扫地，别的干不来，我是你们的勤务员。”毛主席又说：“张承先也是个坏人，把你们红旗拆散了，你们要"},{"type":"paragraph","text":"·268·"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":281,"page_end":281},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab874cfc0e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
