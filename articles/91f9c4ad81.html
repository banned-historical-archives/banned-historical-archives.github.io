<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刻苦钻研　学而不厌上海电化厂五车间电工组工人坚持认真读马列和毛主席著作收到了较好效果","authors":[],"dates":[{"year":1972,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海电化厂五车间电工组全体同志在批修整风中，坚持认真读马列和毛主席的书，发扬刻苦钻研、学而不厌的精神，收到了较好的效果。"},{"type":"paragraph","text":"去年上半年，这个组的同志开始学习列宁的《国家与革命》，大家的劲头很高，恨不得一下子就把这本书读完。但是，学了几次以后，有人就感到“人名记不清，地名搞不清，历史背景弄不清”，想打“退堂鼓”了。针对这种畏难情绪，小组核心成员进行了认真的分析研究，认识到，有的同志所以会产生畏难情绪，实际上是对学马列的重大意义认识不足。为此，他们和小组同志一起批判了刘少奇一类骗子打着马列主义招牌吓唬人，用假马克思主义欺骗人，靠谣言和诡辩迷惑人的罪行，使大家进一步认识到:当电工“线路”搞不清不行，干革命“路线”分不清更不行。如果不学马列，势必是真假难辨、路线难分，在复杂的阶级斗争和路线斗争中就会迷失方向。有的同志说，马克思主义“是领导无产阶级革命事业走向胜利的科学”，我们工人一定要学好，也一定能学好。大家发扬了愚公移山精神，克服了畏难情绪，树立了学习信心，每天坚持学习，厂休日、节日也同样坚持学。"},{"type":"paragraph","text":"要坚持学习，并不是一帆风顺的。今年初，这个组的任务特别繁忙，既要保证正常生产，又要搞好节电工作，还要大搞技术革新。在这种情况下，小组里出现了松劲情绪，学习时迟到的多了，发言的人少了，有人还说:“学习是长远的事，工作放在眼前不做不行”。这话引起了这个小组核心成员的深思:在工作多、任务重的情况下，还要不要坚持看书学习?他们组织小组同志联系路线斗争实际，学习了毛主席关于“认真看书学习，弄通马克思主义”、“要搞马克思主义，不要搞修正主义”等教导，深深体会到，毛主席的伟大指示不仅是我党历次路线斗争的经验总结，而且指出了我们在无产阶级专政下继续革命的根本方向，因此不仅现在要这样做，将来也要这样做。大家的思想认识提高了，学习又出现了新气象，坚持做到生产任务再重，学习决不放松。"},{"type":"paragraph","text":"这个组的同志在学习马列著作和毛主席著作的过程中，发扬刻苦钻研、学而不厌的精神。他们在批判刘少奇一类骗子散布的反动的天才史观时，开始有些同志纠缠在枝节问题上争论不休，一时深不下去。后来，大家反复学习了列宁的《国家与革命》的有关章节，认识到，一切修正主义者不管使用什么手段，其根本目的都是为了颠覆无产阶级专政，而刘少奇一类骗子鼓吹反动的天才史观，也正是为了妄图达到这个罪恶目的。在学习中，他们还联系实际进行讨论，进一步认识到，一切真知都是来源于实践这一颠扑不破的真理。这个组在大搞技术革新、大搞节电的工作中，先后搞成了多项革新项目。其中单氯干燥工段改装了交流接触器后，每年就可节电五万余度。对这些成绩应当怎么看待呢?他们感到这并不是因为某个人特别聪明而搞出来的，而是在毛主席关于“要节约闹革命”和“备战、备荒、为人民”的方针指引下，依靠党的领导，经过全组同志动脑筋，想办法，不断实践，同时吸取了外厂的先进经验，得到了兄弟小组的支援才搞出来的。这样结合实际讨论，提高了认识，弄通了问题，收到了实效。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91f9c4ad81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
