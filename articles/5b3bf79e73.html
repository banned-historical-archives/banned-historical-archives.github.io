到早、中、晚三班工人的需要，方向对头，表示欢迎","authors":[],"dates":[{"year":1970,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　杨浦区烟糖公司所属许多商店革命职工遵照毛主席要“完全”、“彻底”为人民服务的伟大教导，根据地段特点，从方便工农兵出发，先后开设两班制，设立了早夜服务柜，最早的从清晨五时开始营业，打烊时间最晚的延续到深夜十二时。目前杨浦区各主要马路上都有早夜服务的食品商店，他们全心全意地为三班制工人服务，为送菜的贫下中农服务，为广大居民服务。"},{"type":"paragraph","text":"杨浦区烟糖公司一些商店开设早夜服务柜的过程，也是活学活用毛泽东思想，开展革命大批判的过程。有的商店在讨论开设早夜服务柜时，抓住了两条路线斗争这个纲，狠抓革命大批判。他们回顾过去旧区委财贸部派人来店蹲点时搞的通宵商店，根本不是为工农兵，而是为了赚钱。因此手拿算盘开通宵，营业结束看赚头，横算竖算不合算，开了不久就关门。这次大庆食品商店在开设早夜服务柜时，也有同志怕“夜里生意少，费用大，要亏本”。针对这种活思想，商店的领导在“天天读”中就组织职工带着问题学习“老三篇”，展开讨论，还对照了星火日夜商店的先进事迹，狠批刘贼的“利润挂帅”。广大职工认识到，怕“生意少”，怕“亏本”的思想，是叛徒、内奸、工贼刘少奇之流的“大利大干，小利小干，无利不干”的修正主义谬论的余毒没有肃清的反映。思想一提高，这个食品店便实行早、中两班制，从早晨六时到晚上十一时半都对外服务。革命群众高兴地说:“这样的商店能照顾到早、中、晚三班工人的需要，方向对头”，表示欢迎。红明食品商店自实行通宵服务后，曾经出现“一个通宵只做几十元‘生意’，不合算”的思想。这种思想一抬头，店领导和群众就运用毛主席的哲学思想，分析了事物的主流和本质，认识到通宵服务“生意”虽少，但是售出的商品却是工农兵所迫切需要的，正是急工农兵之所急。"},{"type":"paragraph","text":"许多早夜服务商店在实践中合理安排劳动力，解决人少班头增加的矛盾。松潘商店等单位，在开设早夜服务前，曾顾虑营业时间从早上到深夜十一、二时，一班变两班，站柜台的人少了，营业一忙，人力安排就有困难。但是他们感到困难再大也难不倒用毛泽东思想武装起来的财贸战士。他们根据营业忙闲和职工的具体情况，采取早夜翻班，穿插班头的办法，妥善解决了营业忙闲的劳力安排问题。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b3bf79e73"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
