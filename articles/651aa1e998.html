art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"钢八连带头人带头学英雄","authors":["陈庆法"],"parts":[{"type":"paragraph","text":"本报讯 在华国锋、叶剑英、邓小平、徐向前、聂荣臻同志为《新一代最可爱的人》一书题词发表的当天，“英勇善战钢八连”党支部就作出决定：“一班人”要带头学英雄。"},{"type":"paragraph","text":"担任训练先行连任务的钢八连听到广播后，就利用晚上时间组织了学习和讨论，支委会认真研究了开展学英雄活动的措施，特别强调领导带头。他们提出的口号是：“一班人”一定要象老连长、战斗英雄吴成良带领连队严惩越南侵略者那样，忘我战斗，带领全连圆满完成训练先行连任务。"},{"type":"paragraph","text":"这个英雄连的带头人，说到做到，不放空炮。连长姚文德自去年参加自卫还击作战以后，还没有回过家。上级批准他二月六日离队，连通行证都开好了，可他就是不肯走，定要等到把连队全年的训练计划安排好了以后再考虑。指导员李先进是战斗英雄吴勇的战友，刚调到八连任职不久。支部作出决定后，他天天训练到现场，又作示范，又用吴勇、吴庆良“一不怕苦、二不怕死”的事迹鼓励战士们一丝不苟练硬功。副连长唐孝华是二等残废，现在肺部还有一块弹片没取出来。他见三排长探亲走了，主动要求住在三排代理排长工作。"},{"type":"paragraph","text":"干部们的行动，有力地带动了战士们开展学英雄的活动。党中央和中央军委领导同志为《新一代最可爱的人》一书题词发表后，几天来，纷纷扬扬的雪花在钢八连驻地一直下个不停，可是，八连的训练场上却一天也没有沉寂。战士们卧在泥泞的地上，嘴鼻喷出团团白雾，雪化在背上，泥浸入裤管，仍然坚持刻苦地进行训练。"},{"type":"paragraph","text":"（本报特约通讯员 陈庆法）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"651aa1e998"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
