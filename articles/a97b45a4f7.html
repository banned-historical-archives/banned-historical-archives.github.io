script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《团结报》揭露苏联领导的进一步堕落  苏联领导为了反华不惜同傀儡并坐  赫鲁晓夫修正主义勾结美帝主宰世界阴谋永不得逞","authors":[],"dates":[{"year":1966,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《团结报》揭露苏联领导的进一步堕落"},{"type":"paragraph","text":"苏联领导为了反华不惜同傀儡并坐"},{"type":"paragraph","text":"赫鲁晓夫修正主义勾结美帝主宰世界阴谋永不得逞"},{"type":"paragraph","text":"新华社地拉那三十日电　阿尔巴尼亚《团结报》三十日发表题为《看赫鲁晓夫修正主义者堕落到何等地步》的文章说，赫鲁晓夫修正主义者在印度德里举行的“联合国亚洲及远东经济委员会”会议上，再次同蒋介石傀儡集团、“马来西亚”、南越和南朝鲜傀儡集团以及美国和英国坐到一条板凳上，这反映了苏联现政府的破了产的政治路线。"},{"type":"paragraph","text":"文章指出，这再一次表明了美国和苏联修正主义者从主宰世界的私利和欲望出发，把他们在亚洲的阴谋行动协调一致起来，以便不致危害他们的利益，不要打破这一地区“现状”。这方面的例子是很多的。赫鲁晓夫修正主义者对越南人民正义事业和英勇斗争所采取的立场，是典型的卑鄙无耻的、叛徒的立场。"},{"type":"paragraph","text":"文章指出，赫鲁晓夫修正主义者和亚洲地区这些傀儡集团的合作标志着赫鲁晓夫修正主义者在政治上和外交上进一步堕落的一个新的阶段，因为同它们合作就意味着背叛了中国、朝鲜、越南等国人民的崇高利益，意味着践踏了最起码的无产阶级国际主义原则，意味着他们根本不区别制度之间、阶级之间、政治立场之间的界限。"},{"type":"paragraph","text":"文章说，是什么东西促使赫鲁晓夫修正主义者同各国人民的敌人相互勾结呢？回答是很简单的。赫鲁晓夫修正主义者和美帝国主义者现在正在一起策划反对中华人民共和国的阴谋。他们正在建立所谓“遏制”中国的墙，以“孤立”中国并通过从印度开始直到日本的一系列巨大的军事基地来“包围”中国。这一阴谋目前正在进一步扩大。他们企图破坏亚洲各国人民的民族解放斗争，扑灭人民革命并消灭争取自由和民族独立的一切努力。赫鲁晓夫修正主义者在“为和平而合作”的幌子下进行的投降主义的欺骗宣传，被用来毒化各国人民，诽谤中华人民共和国。"},{"type":"paragraph","text":"文章说，在约翰逊及其最亲密的合作者的讲话中，没有一次不提到同赫鲁晓夫修正主义者进行这种“合作”的必要性。帝国主义者正在依靠这种“合作”，从内部来夺取堡垒。"},{"type":"paragraph","text":"文章还指出，赫鲁晓夫修正主义者最近同日本军国主义者举行了各种会议，通过会议他们越来越加强同日本军国主义者的“友好”和联系。"},{"type":"paragraph","text":"文章最后说，赫鲁晓夫修正主义者同这些傀儡集团一起参加阴谋会议，表明他们已经堕落到何等地步，表明他们是多么热心地为帝国主义主子心甘情愿地效劳。但是，不管他们怎么努力，他们永远也不会达到他们的罪恶目的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a97b45a4f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
