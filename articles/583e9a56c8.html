"year":1951,"month":8,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【无锡讯】无锡惠山的坭人，是国内著名的美术品。解放后，坭人制造商更向工农兵方向发展，并获得了很大的成绩。毛主席、朱总司令、孙中山、马、恩、列、斯等伟人像，已成为主要产销品；‘百万雄师下江南’等新石膏画片，也层出不穷。为了适应需要，锡市美协最近由雕塑组精心设计塑制毛主席半身胸像一座，费时达二月，现已完工，经呈准苏南新闻出版处审核后，即至惠山遴聘技工翻模，准备大量发行，现上海美术工场与永安公司石膏部已在锡订购一批，即可运沪推销。(尔)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"583e9a56c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
