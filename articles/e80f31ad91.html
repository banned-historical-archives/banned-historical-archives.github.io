rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习李德宪勇于创新的精神在训练中活学活用毛主席著作提高部队战斗力","authors":[],"parts":[{"type":"paragraph","text":"本报讯 南海舰队鱼雷艇某部副中队长李德宪在训练中活学活用毛主席著作，把辩证唯物论运用到军事科学中，发扬敢于革命、敢于创造、敢于突破框框的革命精神，依靠群众，创造成功鱼雷攻击心算法，使鱼雷艇长从烦琐的计算中解放出来，迅速提高作战技术和鱼雷攻击命中率。最近，海军司令部、政治部发出指示，要求各部队的干部战士，各院校的教员学员和工作人员，认真学习李德宪的革命精神，更好地突出政治，落实四好，加强战备。"},{"type":"paragraph","text":"指示中指出，学习李德宪，就是要活学活用毛主席著作，更自觉地用毛泽东思想改造自己，指导行动；在战备和各项工作中进一步贯彻辩证唯物论，反对一切形而上学和烦琐哲学。当前，特别要强调以毛主席一分为二的观点，实践的观点和发展的观点武装头脑，反对一切不符合实战需要的烦琐哲学。高度发扬敢于革命、敢于创造的革命精神，敢于革掉一切不符合我军光荣传统和束缚群众积极性的框框，一定要使战备和各项工作随着形势的发展，不断有所发现，有所发明，有所创造，有所前进。"},{"type":"paragraph","text":"指示最后指出，把时刻想到打仗、时刻准备打仗的思想，进一步贯穿到每个人的行动中去，贯穿到各行各业的工作中去，以旺盛的战斗意志和高度的战备观念，做好一切工作，随时准备歼灭美国侵略者和蒋介石匪帮！RW：李德宪；创新精神"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e80f31ad91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
