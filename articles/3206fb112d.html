ors":[],"dates":[{"year":1960,"month":1,"day":6}],"is_range_date":false,"parts":[{"text":"内务部关于处理右派分子退职问题的复函","type":"title"},{"text":"河北省人民委员会人事局：","type":"appellation"},{"text":"你局最近电话询问原国务院人事局一九五八年五月三十一日国人事字第1654号通知中第三项规定：“……凡是按照留用察看以下几类处理的右派分子，如果本人要求退职，经过机关批准，可以按照退职处理……”，其中是否包括按照留用察看处理的右派分子的问题，原规定的精神，按照留用察看处理的右派分子是不包括在内的。只有按照四、五、六类办法处理的右派分子，如果本人要求退职，经过机关批准，才可以按照退职处理。此复。","type":"paragraph"},{"text":" 一九六○年一月九日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3206fb112d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
