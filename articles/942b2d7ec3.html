tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见并设宴招待西哈努克亲王","authors":["孟庆彪侯波"],"parts":[{"type":"paragraph","text":"新华社17日讯 毛泽东主席今天下午在中南海勤政殿接见柬埔寨国家元首诺罗敦·四哈努克亲王和夫人。毛泽东主席同西哈克亲王进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有刘少奇主席、朱德委员长、周恩来总理和夫人。"},{"type":"paragraph","text":"同时被接见的，有随同西哈努克亲王来我国访问的柬埔寨王位最高委员会副主席宾努，首相福·波伦，第一副还有西哈努克亲王的公主和王子，以及柬埔寨的一些高级官员。"},{"type":"paragraph","text":"接见时我国方面在座的，还有全国人民代表大会常务委员会副委员长郭沫若、黄炎培、彭真，国务院副总理陈对外贸易部部长叶季壮，外交部副部长姬鹏飞，我国驻柬埔寨大使王幼平和夫人。"},{"type":"paragraph","text":"接见时，柬埔寨驻中国大使兰·涅特和夫人也在座。"},{"type":"paragraph","text":"接见以后，毛泽东主席设宴招待西哈努克亲王以及柬埔寨的其他贵宾们。"},{"type":"paragraph","text":"毛泽东主席和西哈努克亲王亲切握手。"},{"type":"paragraph","text":"图为接见时合影。前排左起第八人是诺罗敦·西哈努克亲王，第七人是西哈努克亲王夫人，第十人是宾努阁下六人是涅·刁隆阁下。新华社记者 侯波 孟庆彪摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"942b2d7ec3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
