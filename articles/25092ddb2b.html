art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"批透极左 分清香臭","authors":[],"parts":[{"type":"paragraph","text":"林彪、“四人帮”推行极左路线，使广大农民吃尽了苦头。农民靠自己的辛勤劳动富起来了，却被批成“走资本主义道路”。什么“穷革命”、“富则修”等论调，使许多生活有了改善的社员群众被打成了“暴发户”、“新富农”。有些地方受林彪、“四人帮”极左路线的影响，不加区分地滥用“堵资本主义路”、“割资本主义尾巴”、“改造小生产者”等等口号，翻来复去地斗争从事正当劳动的农民，搞了许多错案、冤案，严重地挫伤了农民的积极性，破坏了农业生产的发展。"},{"type":"paragraph","text":"粉碎“四人帮”后，党的农村政策逐步落实，许许多多蒙受不白之冤的农村基层干部和社员得到平反昭雪。党的十一届三中全会为我国农业的高速度发展作出了重大决策，强调在经济上充分关心农民的物质利益，在政治上切实保证农民的民主权利。现阶段党在农村的一系列政策合乎国情，顺乎民心，赢得了农村广大干部群众的热烈赞扬和拥护，为发展我国农村的生产力开辟了广阔的前景。实践已越来越显示出党的农村经济政策的威力。我们革命战士一定要联系实际地认真学习，深刻领会，在思想上进一步肃清林彪、“四人帮”极左路线的流毒，跟上重心转移的大好形势。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25092ddb2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
