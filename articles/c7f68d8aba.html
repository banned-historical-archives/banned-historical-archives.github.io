["北京地质勘探学院","孙增垣","李亚铃","蔡荣荣","郭成兴"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“人民代表大会是表决机器”","type":"title"},{"text":"北京地质勘探学院蔡荣荣郭成兴李亚铃孙增垣","type":"authors"},{"text":"蔡荣荣说：","type":"paragraph"},{"text":"「人民代表大会是表决机器，没有真正起到最高权力机关的作用。」「人民代表大会所讨论的内容，甚至很小的具体问题，如年度计划都由党中央提出，应该由有关部门提出，否则就是以党代政了，党中央只能从总的方向，方针政策上提出意见……」","type":"paragraph"},{"text":"郭成兴说：","type":"paragraph"},{"text":"「我国人民代表大会能否代表人民利益？」","type":"paragraph"},{"text":"李亚铃在一篇〈当了人民代表代表谁〉的文章中，说他当了半年的人民代表，还不知道干些什么，他的代表是怎样产生的，说组织上既没向群众宣布，又不给指示工作。","type":"paragraph"},{"text":"孙增垣说：","type":"paragraph"},{"text":"「宪法是一本粉饰太平，在国际上吹嘘、而实际上并没有付诸实现的一张毫无实际意义的空头支票，人权方面没有实际的保证。」","type":"paragraph"},{"text":"「人民代表视察工作，是表面一套，做个样子，只说好，不说坏。」","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7f68d8aba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
