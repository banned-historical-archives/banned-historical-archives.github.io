art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命乐观主义的歌声振奋人心四川省革命残废军人课余演出队到京表演彭德怀副总理盛赞他们的高尚风格","authors":["韩荣志"],"parts":[{"type":"paragraph","text":"本报28日讯 今晚，四川省革命残废军人教养院课余演出队，在国务院礼堂进行了精彩的表演。"},{"type":"paragraph","text":"这个课余演出队是由三十个重残人员、八个护理人员组成的。过去，他们把自己的鲜血洒在抗美援朝战争中；今天他们又拿起了文艺武器，积极参加祖国的社会主义建设。"},{"type":"paragraph","text":"今晚演出的十九个节目，个个精彩。下肢瘫痪、一等残废军人何长俊的女声民歌独唱，失去一只手的一等残废军人易如元的竹笛独奏，是那么优美动听。一等残废革命军人张家琛的风琴独奏：“我爱我的祖国”，使人很难相信他没有双手，是用胳膊的滚动而奏出这首歌曲的。鄂尔多斯舞和“花儿与少年”，两个富有生活气息和民族色彩的民间舞蹈，使人心旷神怡。"},{"type":"paragraph","text":"今晚，到场观看的有国务院副总理彭德怀、人大常务委员会副委员长李济琛、沈钧儒、陈叔通、国防委员会副主席张治中等。节目完毕后，他们一一上台和演员们握手，祝贺。这时，演出队同志把两个瘫痪休养员亲自编织的一个棕绿提包、一个枕套敬献给彭德怀副总理。"},{"type":"paragraph","text":"彭德怀副总理对革命残废军人这种高尚的革命乐观主义精神非常赞扬。”他说：“残废军人同志们：你们高度的革命乐观主义精神和共产主义精神，将鼓舞六亿人民多快好省地建设社会主义，将教育人民解放军全体官兵更好地保卫社会主义建设。”"},{"type":"paragraph","text":"本报记者 韩荣志摄"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a40a52e54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
