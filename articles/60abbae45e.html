rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想彻底改造世界观","authors":["刘成勋"],"parts":[{"type":"paragraph","text":"中国赫鲁晓夫极力鼓吹“自然而然革命化”。他嘴上喊的是“革命化”，实际是要我们“修正主义化”。"},{"type":"paragraph","text":"什么是革命化？革命化就是无产阶级化，就是用毛泽东思想彻底改造我们的世界观，用毛泽东思想指导我们的一切言论、行动。毛泽东思想是当代马克思列宁主义的顶峰，是最高最活的马克思列宁主义，是改造人们灵魂的最强大的思想武器。中国赫鲁晓夫鼓吹“自然而然革命化”，就是公开否定先进理论对革命的指导作用，就是公开反对用毛泽东思想去改造人的思想，改造社会的面貌，就是要让资产阶级思想在党内自由泛滥。"},{"type":"paragraph","text":"人的头脑是没有真空的，无产阶级思想不去占领，资产阶级思想就会去占领。不用毛泽东思想武装起来，修正主义思想就会乘虚而入。中国赫鲁晓夫反对我们活学活用毛主席著作，目的也正是要贩卖他的黑《修养》，妄想用他那套修正主义的黑货来腐蚀我们的灵魂，使我们“修正主义化”，成为他篡党篡政、复辟资本主义的工具。中国赫鲁晓夫的罪恶阴谋永远也不会得逞！"},{"type":"paragraph","text":"我们革命战士无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的革命路线。我们要一辈子学习毛主席著作，使毛泽东思想在我们头脑里深深扎根。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60abbae45e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
