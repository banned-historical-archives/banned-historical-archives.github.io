":[{"year":1948,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席电勉吴化文将军"},{"type":"paragraph","text":"希望团结全军力求进步"},{"type":"paragraph","text":"【新华社陕北二十二日电】济南起义的吴化文将军等发表通电，已志昨讯。兹悉，中共中央毛主席于今日致电祝贺。电文如下：吴军长、杨旅长、赵旅长、何旅长并转全体官兵均鉴："},{"type":"paragraph","text":"贵军长等率部起义，发表通电，决心参加人民解放事业，极为欣慰。中国共产党站在人民立场上，对于任何国民党军队的官兵们，不问其过去行为如何，只要他们能够在人民解放战争的紧要关头，幡然觉悟，脱离国民党政府的反动领导，加入人民解放军阵营，坚决反对美国帝国主义及其走狗国民党反动派，即表示热烈欢迎。贵军长等此次义举，符合人民的希望，深堪庆贺。尚望团结全军，力求进步，改善官兵关系、军民关系，为革命战争在全国的胜利而奋斗。"},{"type":"paragraph","text":"毛泽东　十月二十二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8626c6892a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
