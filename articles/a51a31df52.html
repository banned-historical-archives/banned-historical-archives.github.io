rs":[],"dates":[{"year":1950,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保部长会议主席、保共领袖科拉罗夫同志逝世"},{"type":"paragraph","text":"毛主席、中共中央致电吊唁"},{"type":"paragraph","text":"【新华社北京二十四日电】塔斯社索非亚二十三日讯：保加利亚政府新闻处发表保加利亚共产党中央委员会与保加利亚人民共和国部长会议的公报如下：“保加利亚共产党中央委员会与部长会议，以深深悲痛的心情宣布，保加利亚人民共和国部长会议主席华西尔·科拉罗夫同志——季米特洛夫同志最亲密的忠实的战友，保加利亚共产党最老的领袖之一，保加利亚共产党中央委员会政治局委员，国际劳工运动的著名领袖，在长期卧病之后，已于一九五○年一月二十三日一时四十五分逝世。”"},{"type":"paragraph","text":"保加利亚共产党中央委员会与保加利亚人民共和国部长会议宣布，全国于一月二十三日至二十五日致哀三天，并由政府成立委员会办理治丧事宜。"},{"type":"paragraph","text":"【新华社北京二十四日电】中央人民政府毛泽东主席电唁保加利亚部长会议主席科拉罗夫逝世，电文如下："},{"type":"paragraph","text":"保加利亚部长会议契尔文科夫副主席阁下："},{"type":"paragraph","text":"惊悉保加利亚部长会议主席科拉罗夫先生病故，敬向贵国政府和人民致深切的哀悼。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席  毛泽东"},{"type":"paragraph","text":"一月二十四日"},{"type":"paragraph","text":"【新华社北京二十四日电】中国共产党中央委员会今日收到保加利亚共产党中央委员会书记契尔文科夫关于保部长会议主席、保共领导者科拉罗夫逝世的讣电，电文如下：中国共产党中央委员会亲爱的同志："},{"type":"paragraph","text":"我们怀着深深的悲哀通知你们，保加利亚部长会议主席，我们党的最老的领袖之一，我们的华西尔·科拉罗夫同志因长时间患病，于一月二十三日上午一时四十五分逝世。葬仪订于一月二十五日举行。"},{"type":"paragraph","text":"保加利亚共产党中央委员会书记"},{"type":"paragraph","text":"Ｖ·契尔文科夫"},{"type":"paragraph","text":"中共中央特复电致唁，电称：亲爱的契尔文科夫和保加利亚共产党中央委员会的同志们："},{"type":"paragraph","text":"对于保加利亚部长会议主席和保加利亚共产党领导者科拉罗夫同志的逝世，谨致哀悼。"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"一月二十四日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a51a31df52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
