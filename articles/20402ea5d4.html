art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"古巴男子篮球队举行访华首次友谊赛邓代总理陆副总理观看比赛并接见客队负责人","authors":[],"parts":[{"type":"paragraph","text":"新华社十六日讯 古巴青年男子篮球队今晚在北京工人体育馆同中国人民解放军男子篮球队进行访华首次友谊比赛。结果，主队以七十九比五十三获胜。上半时主队以四十四比二十四领先。"},{"type":"paragraph","text":"国务院代总理邓小平，副总理陆定一和一万多人观看了这场比赛。在比赛前，邓小平、陆定一接见了客队领队莫伊塞斯·奥特罗和教练马里奥·金得罗，并且到运动场上同双方队员一一握手和合影。"},{"type":"paragraph","text":"主队选手今晚的配合较好，靠中、远距离投篮得了不少分。其中倪德宽得分最多，共十八分。客队队员身材高大，弹跳力好，但是他们的投篮不够准确，所以得分较少。他们中得分最多的是十九岁的帕布耳·加尔夏，共得了十二分。"},{"type":"paragraph","text":"古巴青年男子篮球队十八日和十九日还将在北京先后同“前卫”男子篮球队和北京男子篮球队进行友谊赛。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20402ea5d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
