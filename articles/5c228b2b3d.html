演唱了毛主席的二十多首诗词，受到听众热烈欢迎。","authors":[],"dates":[{"year":1964,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“上海之春”举行毛主席诗词演唱会专场"},{"type":"paragraph","text":"一百多位歌唱家演奏家和青年音乐工作者，热情地演唱了毛主席的二十多首诗词，受到听众热烈欢迎。"},{"type":"paragraph","text":"据新华社上海五日电　第五届“上海之春”音乐会四日晚上在上海音乐厅首次举行毛主席诗词演唱会专场。一百多位歌唱家、演奏家和青年音乐工作者，怀着崇敬的心情热情地演唱了毛主席的二十多首诗词。他们的演唱受到了全场听众热烈的欢迎和赞扬。"},{"type":"paragraph","text":"这次演唱的节目，都是上海各音乐团体经过多次试奏、试唱以后挑选出来的。其中大部分的曲谱是作曲家们最近谱成的新作或是新近加工改编的作品。今年元旦新发表的十首毛主席的诗词中，已经有四首谱上曲在这次音乐会上演唱。专场演出的表演形式多种多样，有独唱、合唱、交响大合唱和评弹等；伴奏也采用民族乐器，钢琴和管弦乐队等不同的乐器。"},{"type":"paragraph","text":"上海交响乐团和上海合唱团演出的交响大合唱《英雄的诗篇》，是一部由《清平乐（六盘山）》、《西江月（井冈山）》、《菩萨蛮（大柏地）》、《十六字令三首》和《七律（长征）》等描写长征前后的诗词组成的大型作品。全曲成功地表现了红军刚强豪迈、不怕困难的革命乐观主义精神。"},{"type":"paragraph","text":"上海合唱团的合唱《蝶恋花（答李淑一）》，是根据评弹的谱曲改编成的。全曲用钢琴伴奏。这个乐曲由合唱和领唱的配合运用，把原来评弹演出的情感，更加突出渲染。演出时，由嗓音宽厚的青年歌唱家靳小才领唱，听来使人感到霞光万丈、满天花雨的壮丽景象，加上雄壮浑厚的合唱，不仅加深了曲调所刻划的意境，而且更好地表达了对革命先烈的热烈、真挚的感情。"},{"type":"paragraph","text":"这次会上评弹演员演唱了五首毛主席的诗词，都是演员们自己谱的曲。余红仙演唱的《卜算子（咏梅）》、蒋月泉谱曲的《沁园春（雪）》和刘韵若谱曲的《七绝（为女民兵题照）》，在谱曲和演唱方面都有新的创造，成功地体现了主席诗词的意境。"},{"type":"paragraph","text":"歌唱家女高音周小燕、男高音蔡绍序、男中音葛朝祉，分别独唱了《渔家傲（反第一次大‘围剿’）》、《满江红（和郭沫若同志）》、《水调歌头（游泳）》等九首。他们都以高昂的激情唱出了毛主席诗词的伟大气魄。"},{"type":"paragraph","text":"参加这次演出的音乐家们，为了理解毛主席诗词的意境，都反复诵读钻研毛主席诗词和毛主席的有关著作。对自己的谱曲一遍又一遍作了修改，对演唱的声调，力求精益求精。上海市人民评弹团的演员们早就成立了毛主席著作学习小组，并且专门邀请了作家去系统地讲解毛主席的诗词。他们从一九六○年开始为《蝶恋花（答李淑一）》谱曲以来，到现在已经谱了十二首诗词。这次演出的五首都经过多次试演和集体讨论、修改。交响大合唱《英雄的诗篇》的作曲者朱践耳，从今年年初起就着手修改这部作品。在修改过程中反复学习揣摩，并听取了别人的意见。这次演出后许多听众都称赞这部作品比过去有了显著的提高。"},{"type":"paragraph","text":"毛主席诗词演唱会专场，原定演出两场，但因听众踊跃，“上海之春”音乐会决定在八日再加演一场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c228b2b3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
