script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"妄图配合西方垄断资产阶级扑灭学生运动革命烈火  苏修叛徒大喷毒涎","authors":[],"dates":[{"year":1969,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"妄图配合西方垄断资产阶级扑灭学生运动革命烈火"},{"type":"paragraph","text":"苏修叛徒大喷毒涎"},{"type":"paragraph","text":"据新华社二十一日讯　在西欧、北美资本主义“心脏”地区蓬勃发展的革命群众运动猛烈地冲击着资本主义旧世界的时候，苏修叛徒集团开动宣传机器，对西欧、北美的学生斗争竭尽污蔑、攻击、诽谤之能事，妄想配合西方垄断资产阶级扑灭学生运动的革命烈火。苏修叛徒集团这一卑鄙的行径，再一次证明了它是维护帝国主义和资本主义“秩序”的忠实奴才。"},{"type":"paragraph","text":"苏联《世界经济和国际关系》杂志最近发表的一篇署名文章，就是苏修叛徒集团在这方面的罪行的一次明显的暴露。这篇文章用修正主义的所谓“社会心理特征的分析”代替阶级分析，胡诌什么青年学生之所以要反抗斗争，并不是由于资本主义的压迫和剥削，而是由于学生具有什么“骚动的性格”，容易被“社会愤怒”所感染。文章攻击学生的造反行动是什么“感情冲动”，具有“不合理的特征”。这些胡言乱语充分暴露了苏修叛徒集团同西方帝国主义者一个鼻孔出气的丑恶嘴脸。"},{"type":"paragraph","text":"这篇文章对学生运动把斗争矛头指向垄断资产阶级的罪恶制度的革命行动，对青年学生在革命群众运动中的先锋作用极为仇视。它咬牙切齿地大骂学生运动不应该从“总体”上否定“现存社会”，攻击青年学生不应该把资本主义的“现存社会组织连同其道德文化统统立即打碎”。这更是苏修叛徒集团极力维护资本主义“现存社会”的罪恶行径的证明。"},{"type":"paragraph","text":"苏修叛徒集团对青年学生冲破修正主义的束缚，向资本主义制度勇敢挑战的革命造反精神最为恼火。文章大骂学生不能“科学地、深刻地理解”苏修贩卖的破坏群众斗争的黑货，不懂得苏修向资产阶级进行“必要的妥协”的叛徒哲学，说什么这是“乌托邦主义和左倾狭隘主义”，从而给“民主力量带来了无可怀疑的损失”。众所周知，给西欧、北美革命群众运动带来“无可怀疑的损失”的不是别人，而正是以苏修叛徒集团为首的现代修正主义者。"},{"type":"paragraph","text":"苏修叛徒集团在文章中，还别有用心地说什么学生运动依靠自己的力量是无法摆脱他们的“弱点”的，要学生们同修正主义者控制的“政治和工会组织结成联盟”。这显然是企图把西欧、北美蓬勃发展的学生运动从政治上、思想上、组织上纳入修正主义的轨道。这是苏修叛徒集团妄想破坏西欧、北美学生运动的恶毒阴谋。"},{"type":"paragraph","text":"西欧、北美的广大青年学生高举“对反动派造反有理”的大旗，向垄断资产阶级发动了猛烈的冲击。西欧、北美的广大青年学生正日益清楚地认识到，要反对帝国主义就必须反对修正主义，并正在斗争中冲破各种修正主义的罗网。苏修叛徒集团的任何破坏勾当都阻挡不住西欧、北美革命群众运动的胜利发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43854be5e4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
