<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“法律面前人人平等”的口号不是资产阶级提出的","authors":[],"dates":[{"year":1980,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不少发表过的文章都说，“法律面前人人平等”的口号，最早是资产阶级提出的，或者说是在资产阶级革命时期，资产阶级为了反对封建专制和封建特权提出来的。"},{"type":"paragraph","text":"其实，这种说法，并不确切。"},{"type":"paragraph","text":"“法律面前人人平等”这个口号，最早见于公元前五世纪著名政治家伯里克利斯的著名演说。他提出:“我们的制度(按指雅典奴隶制民主制度)之所以被称为民主政治，因为政权在全体公民手中，而不是在少数人手中。解决私人争执的时候，每个人在法律上都是平等的。”这个演说及其所提出的公民在法律面前平等的问题，在世界历史上和世界法律思想史上都是很著名的。"},{"type":"paragraph","text":"在封建社会之末资产阶级革命时期，资产阶级借用了“法律面前平等”的口号来与封建地主的特权相抗争，这是完全合乎历史发展趋势的。"},{"type":"paragraph","text":"资产阶级的平等的原则，是建筑在商品生产关系基础上的。在资本主义商品经济制度下，一切都能买，一切也都能卖。这种商品货币关系的贸易自由的平等，贯穿到社会生产的各方面。如果说，在封建制度下，曾有许多障碍限制了商品交换的广泛发展，那么，资产阶级革命就首先铲除了这种特权的限制，使商品贸易自由有了广阔发展的余地。为此，资产阶级就需要用法律来宣布所有商品占有人形式上的一律平等。资产阶级的平等原则，只不过是商品生产的反映。它在最初只是限制废除封建特权，丝毫没有触动剥削制度和阶级的存在，只不过是在资本主义剥削制度的基础上产生的政治上层建筑之一。"},{"type":"paragraph","text":"(摘自辽宁《社会科学辑刊》1980年第4期)"}],"comments":[],"origin":"《社会科学辑刊》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07d80763ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
