tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席革命路线是“三支”“两军”生命线","authors":[],"parts":[{"type":"paragraph","text":"本报讯 在无产阶级文化大革命一派大好形势下，天津驻军支左联络站，于十一月十四、十五日召开了天津“三支”“两军”部队表扬先进、交流经验大会。"},{"type":"paragraph","text":"出席这次大会的，有在“三支”“两军”工作中做出优异成绩的延安中学军训团、水产局支左部队、驻平原针织厂毛泽东思想宣传队、羊毛衫厂毛泽东思想宣传队、公安局战斗区分局支左小组和驻天津永红无线电厂毛泽东思想宣传队员王献根等一百二十二个先进集体的代表和八百七十八个先进个人。在大会上，有十一个集体和个人介绍了先进经验和先进事迹。"},{"type":"paragraph","text":"驻天津陆海空三军广大指战员，从今年一月响应伟大领袖毛主席关于“人民解放军应该支持左派广大群众”的伟大号召，介入天津无产阶级文化大革命以来，高举毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的无产阶级革命路线，相信群众，依靠群众，和广大革命群众团结在一起，战斗在一起，胜利在一起，为天津的无产阶级文化大革命做出了重大贡献。他们把光焰无际的毛泽东思想作为“三支”“两军”工作的灵魂，把毛主席的革命路线作为“三支”“两军”工作的生命线；他们立场坚定，旗帜鲜明，对敌人狠，对人民和，同天津广大革命群众一起，揪出了中国赫鲁晓夫在天津的代理人；他们满腔热情地向广大革命群众宣传毛泽东思想，用战无不胜的毛泽东思想武装广大革命群众的头脑，帮助无产阶级革命派紧紧掌握斗争大方向；他们遵循毛主席、党中央的指示，做了大量的群众工作，促进了天津的革命大批判，革命大联合和革命三结合；他们热情支持革命左派，团结、教育争取受蒙蔽的群众，把浩浩荡荡的革命大军带领到毛主席指引的革命航道上，紧跟毛主席，把无产阶级文化大革命进行到底；他们坚决地捍卫了无产阶级专政，维护无产阶级司令部的权威，维护社会秩序；他们和广大革命群众一起，狠抓革命、猛促生产，使工农业生产不断发展；他们和广大无产阶级革命派一起，举办了四千七百多个毛泽东思想学习班，参加学习的有几十万人，使全市成了活学活用毛主席著作的大学校，到处成为斗私批修的战场。"},{"type":"paragraph","text":"十五日下午，大会举行了发奖仪式。驻天津部队负责人向先进集体和先进个人发了奖。天津驻军支左联络站负责人作了总结报告，要求大家牢记毛主席“我们应该谦虚，谨慎，戒骄，戒躁，全心全意地为中国人民服务”的教导，再接再厉，把“三支”“两军”工作提高到新的水平，为无产阶级文化大革命做出新的贡献。天津市革命委员会筹备小组代表向大会作了热烈的祝贺，热情赞扬天津驻军在“三支”“两军”中作出的重大贡献。（本报记者）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5896786852"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
