<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"九三学社中央发出社内整风指示","authors":[],"dates":[{"year":1957,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"九三学社中央发出社内整风指示","type":"title"},{"text":"九三学社中央常务委员会在28日举行第十七次会议，通过“关于社内整风运动的指示”，全文如下：","type":"paragraph"},{"text":"各分社、分社筹委会、中央直属小组：","type":"appellation"},{"text":"中央常务委员会第十六次扩大会议决定社内立即开始整风。关于社内整风特作如下规定，希即遵照执行：","type":"paragraph"},{"text":"(一)社内整风是彻底揭露和批判反对社会主义、反对共产党领导、反对人民民主专政的反动思想、言论和行为，在政治上和思想上同右派分子划清界限。并对他们进行必要的坚决斗争，提高社会主义觉悟，更加紧密地团结在共产党的周围，全心全意地为建设社会主义而努力。为此，各级组织必须：","type":"paragraph"},{"text":"甲、组织社员认真学习毛主席“关于正确处理人民内部矛盾的问题”的讲演和周总理在第一届全国人民代表大会第四次会议上的“政府工作报告”。并把人民日报刊载有关整风和对右派分子进行批判的社论，作为必读的参考文件。通过学习，使全社进一步认清“只有社会主义能够救中国”的历史发展规律，和“领导我们事业的核心力量是中国共产党”的真理，学会识别资产阶级右派分子孤立资产阶级右派分子的本领。","type":"paragraph"},{"text":"乙、遵照毛主席在报告中所指示的辨别是非的六项政治标准，特别是社会主义道路和党的领导这两条标准，来检查、端正各级领导和社员的政治方向和立场。同时要对社内外右派分子的言论和行动进行揭露和批判，责成他们深入检查，坦白交代，并用实际行动来改正错误。","type":"paragraph"},{"text":"对于那些思想认识模糊、立场不够坚定、为右派分子的反动谬论所迷惑的同志。要对他们进行说服教育。端正思想认识。坚定政治立场，使他们同右派分子严格地划清界限，进而向右派分子作坚决的斗争。","type":"paragraph"},{"text":"(二)社内整风必须根据“从团结的愿望出发，经过批评和自我批评，在新的基础上达到新的团结”的准则，采用严肃认真同和风细雨相结合的方针，以达到“惩前毖后，治病救人”的效果。这次社内整风运动是一场反右派的尖锐政治斗争，也是一次既严肃认真又和风细雨的思想教育运动，对于反党、反社会主义的重大政治错误，必须彻底揭露和批判。","type":"appellation"},{"text":"(三)各级组织在整风工作中，应主动地争取党的领导和帮助，和党取得密切联系，欢迎党组织和党员向社提意见，帮助社进行整风；同时社员同志仍应继续向党提意见，帮助党进行整风。","type":"appellation"},{"text":"(四)社中央现已成立中央整风工作委员会，在委员会下设立中央整风办公室，领导全社整风，地方组织和基层组织应立即成立整风领导机构，领导整风工作，并根据需要设立整风办公室。各级整风领导机构应着重吸收进步分子参加，绝不能让右派分子参加整风领导工作。地方组织的整风领导机构人选应报请中央整风工作委员会备案。基层组织的整风领导机构人选应报请分社整风领导机构核定。","type":"paragraph"},{"text":"(五)各地分社、分社筹委会、中央直属小组应将整风情况随时报告社中央。","type":"paragraph"},{"text":" 来源：1957年6月29日《光明日报》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6a8b42a8e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
