[{"year":1955,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天津市文艺界展开对胡风的资产阶级唯心主义文艺思想的批判。在二十日举行的文艺界第一次讨论会，有作家、翻译家、艺术家和各高等院校的文学教授等九十多人参加。在会上发言的人从各方面揭露了胡风文艺思想的反马克思主义实质和它的危害性。有的发言者还针对属于胡风小集团的天津的文艺工作者阿垅的错误观点进行了批判。"},{"type":"paragraph","text":"河北师范学院中国语言文学系的教师和天津人民艺术剧院的干部也先后举行了批判胡风文艺思想的讨论会。南开大学中国语言文学系古典文学教研组已把对胡风文艺思想的批判列入工作计划。"},{"type":"paragraph","text":"西安文艺界人士在学习第二次全苏作家代表大会文件中，结合对胡风资产阶级唯心主义的文艺思想展开批判。"},{"type":"paragraph","text":"三月初旬，中国作家协会西安分会负责人向西安文艺界人士八百多人作了报告，揭露和批判了胡风的反马克思主义文艺思想的实质。西安市文学艺术团体的领导干部及作家等六十多人已组成八个小组，准备对胡风反马克思主义文艺思想进行专题研究。【据新华社讯】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35fd7aa792"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
