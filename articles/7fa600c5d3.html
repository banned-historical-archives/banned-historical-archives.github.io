维桢副总理一行","authors":[],"dates":[{"year":1977,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年九月十五日电　越南共产党中央政治局委员、越南社会主义共和国政府副总理兼外交部长阮维桢，今天下午由外交部副部长韩念龙陪同，前往毛主席纪念堂瞻仰了毛泽东主席的遗容。"},{"type":"paragraph","text":"阮维桢副总理在毛主席坐像前默哀，并献了花圈。花圈的缎带上写着:献给中国人民的伟大领袖、越南人民的敬爱朋友毛泽东主席。"},{"type":"paragraph","text":"阮维桢副总理的随行人员也随同瞻仰。"},{"type":"paragraph","text":"新华社北京一九七七年九月十五日电　外交部长黄华今天晚上设宴招待越南社会主义共和国政府副总理兼外交部长阮维桢一行。"},{"type":"paragraph","text":"越南驻中国大使馆临时代办陈中应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会作陪的有外交部副部长韩念龙，副司长何理良、梁枫、傅顺和。"},{"type":"paragraph","text":"阮维桢副总理一行是在前往参加联合国大会第三十二届会议的途中，于今天中午到达北京的。他们将于明天离开北京。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fa600c5d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
