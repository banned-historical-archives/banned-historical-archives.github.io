":[{"year":1968,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十六日电　刚果(金)爱国武装西线政治委员会一位负责人发表谈话，热烈赞扬在伟大导师毛主席亲自主持下制定的中共中央一九六六年五月十六日的《通知》，是当代马克思列宁主义的光辉的文献。"},{"type":"paragraph","text":"他说，毛主席创造性地发展了马克思列宁主义。毛主席在这篇具有历史意义的文献中，精辟地为在无产阶级专政条件下防止资本主义复辟指明了正确的道路。他说，这是毛主席在马克思列宁主义理论和实践方面对全世界无产阶级作出的最重大的贡献之一。"},{"type":"paragraph","text":"他说，在我们心中的红太阳毛主席领导下开展的中国无产阶级文化大革命，极大地鼓舞了全世界的革命战士，使他们勇敢地同以美帝国主义为首的帝国主义、新老殖民主义和现代修正主义进行斗争。"},{"type":"paragraph","text":"据新华社开罗十五日电　一位博茨瓦纳朋友十五日在这里对新华社记者发表谈话，热烈欢呼伟大的历史文件中共中央一九六六年五月十六日的《通知》发表两周年。"},{"type":"paragraph","text":"他说，两年前在伟大领袖毛泽东主席亲自主持下制定的这个伟大的马克思列宁主义文件，吹响了无产阶级文化大革命前进的号角。"},{"type":"paragraph","text":"他说，通过毛主席亲自发动的无产阶级文化大革命，全世界被压迫人民充分认识到毛泽东主席是当代伟大的马克思列宁主义者，他捍卫和发展了马克思列宁主义。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e37d50c5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
