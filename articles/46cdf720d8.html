<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"十六年来全组职工认真执行制度精心保养机车  “毛泽东号”安全行车一百五十万公里","authors":[],"dates":[{"year":1963,"month":7,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"十六年来全组职工认真执行制度精心保养机车"},{"type":"paragraph","text":"“毛泽东号”安全行车一百五十万公里"},{"type":"paragraph","text":"包乘组人员几经更换，但对国家高度负责的精神像接力棒一样一直下传。他们从第一个五年计划开始以来，月月全面超额完成运输任务。"},{"type":"paragraph","text":"新华社二十三日讯　著名的“毛泽东号”机车包乘组从一九四七年到现在的十六年多的时间里，已经安全行车一百五十万多公里。安全运行的里程等于环绕地球赤道跑了三十七圈。“毛泽东号”机车是我国货运机车中安全行驶里程最多、时间最长的一台机车。"},{"type":"paragraph","text":"这个机车包乘组长期安全行车的秘诀在哪里？司机长对记者说，最主要的原因，是在这台机车上工作的每一个职工，都有高度的责任感。"},{"type":"paragraph","text":"司机在每次行车中，都全神贯注，遇到大风大雪大雾天气，更是加倍警惕，不看准信号决不开车。有时候，夜间行车困倦了，他们就站起来开车，或者用冷水洗脸，振作精神，坚持执行铁道部颁布的安全行车制度。"},{"type":"paragraph","text":"有一次，这台机车在丰台机务段转盘上掉头，当时机车行驶的速度比人走的还慢。副司机陈福汉看见车下有一团旧棉丝，想拣来擦车，不在意地从车上跳下来，被同组司机看见了。组内马上对这件事进行了讨论，指出这看来是小事，但违反制度不在于大小，而在于思想上对制度的不重视。在慢速度情况下跳车没出问题，下次在行车速度较快的情况下也敢跳车了，许多事故就是这样发生的。"},{"type":"paragraph","text":"这种严肃认真执行安全制度的精神，使他们避免了几十次意料不到的行车事故。"},{"type":"paragraph","text":"十六年来，在这台机车上工作的乘务人员，无论在严冬酷暑，或是在狂风暴雨中，从无一日间断过对机车的维护保养。一个小螺丝松了，也马上扭紧，决不让机车带一点“小病”行驶。他们常说：没有高质量的机车，要保证运输的绝对安全是很困难的。在他们精心保养下，机车质量一直保持全国先进水平，为安全运输创造了条件。"},{"type":"paragraph","text":"这台机车的司机长虽然五次更迭，人员轮换了七十多个，但是这种高度负责的精神，却像接力赛跑里的接力棒一样，一直传了下来。"},{"type":"paragraph","text":"新司炉骆志祥刚上车的时候，擦车不认真，不是擦得不干净，就是漏擦了一些地方。司机长蔡连兴立即把保养机车和安全行车的关系告诉他，并向他讲述了在艰苦的战争年月里，老司机们克服困难，精心保养机车的故事，使骆志祥改变了劳动态度。蔡连兴向骆志祥说的一席话，正是十年前的司机长李永对他讲过的。"},{"type":"paragraph","text":"这台机车的乘务员们经过长期摸索，创造了一套安全、高效、低耗的操作方法。从第一个五年计划开始到现在，他们月月全面超额完成运输任务，为国家多运了五十六万多吨货物，节约了五千五百多吨煤。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46cdf720d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
