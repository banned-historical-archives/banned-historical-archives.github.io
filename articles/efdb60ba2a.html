{"year":1979,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"十月十六日下午五时，华国锋总理在吉斯卡尔·德斯坦总统和雅克·希拉克市长陪同下，在巴黎戈德弗鲁瓦旅馆前，揭开周恩来同志纪念牌前的棕色帷幕。"},{"type":"paragraph","text":"悬挂在旅馆外墙正面的一方带有墨绿色花纹的大理石纪念牌呈现在人们眼前。"},{"type":"paragraph","text":"纪念牌上端镶嵌着已故周恩来总理的半身铜像，下面镌刻着六行金字:“周恩来，(一八九八——一九七六)，一九二二至一九二四年在法国期间住在这所房子里。”在周恩来总理的法文名字上方，还刻有“周恩来”三个中国字，书法俊逸，是邓小平副总理亲笔写的。"},{"type":"paragraph","text":"这时，在场的成千名群众热烈地鼓掌。雷动的掌声传向意大利广场，传向巴黎的四方。"},{"type":"paragraph","text":"今天来参加揭幕仪式的人挤满狭窄的戈德弗鲁瓦街。除了法国政府官员、巴黎市议会议员、中国大使馆工作人员、中国留学生和华侨代表外，许多巴黎的普通市民也闻讯赶来。街道两旁房屋的窗口、阳台甚至房顶上，都有人观看这一庄严隆重的仪式。许多人争着照相，以便把这个场面记录下来，留作纪念。在旅馆的对面，临时搭起一个平台。台上，华国锋总理和吉斯卡尔·德斯坦总统坐在前排紫红色的大靠椅上。后排是希拉克市长、余秋里副总理、黄华外长、法国内政部长克里斯蒂昂·博内和外交部长让·弗朗索瓦—蓬塞。"},{"type":"paragraph","text":"希拉克市长、吉斯卡尔·德斯坦总统相继走到扩音机前讲话。他们都用诗一般的语言赞颂周恩来总理一生的革命业绩，回顾他在法国勤工俭学的生活以及他对法国的情谊。吉斯卡尔·德斯坦总统深情地说，周恩来总理决定把自己的骨灰洒在中国的土地上。“对这位不愿为自己留纪念碑的人，我们希望在他开始战斗的这个地方来向他致敬”。这些话使在场的人都深受感动。"},{"type":"paragraph","text":"华国锋总理在致词时，高度评价了周恩来同志的不朽功勋，他的革命精神和高贵品质。他指出，设立这个纪念牌，“既是对周恩来总理的永久怀念，又是中法人民友好的象征”。"},{"type":"paragraph","text":"在纪念牌揭幕后，华国锋总理、吉斯卡尔·德斯坦总统、希拉克市长一起走进旅馆，登上三楼，参观周恩来同志居住过的第十六号房间。这个房间大约只有四点五平方米，除了放一张单人床、一张小桌子外，简直不能再放其他东西。这个房间和外面的走道刚刚刷新。但是，人们从这个狭小简陋的房间仍然可以想象到当年周恩来同志在这里艰苦工作和生活的情景。"},{"type":"paragraph","text":"在华国锋总理等离去以后，参加揭幕仪式的人们和群众拥入旅馆，沿着楼梯、走道排着长队，去瞻仰周恩来同志的这一旧居。队伍川流不息，直到夜晚。"},{"type":"paragraph","text":"旅馆的主人一家今天格外高兴。老太太郭博尔夫人和她的儿子、媳妇都穿上新衣，迎接客人和来访的记者。郭博尔夫人对记者说，设立这个纪念牌，是旅馆的荣誉。她是从别人那里接手经营这家旅馆的。她在接手时，曾经听到历届主人流传下来的关于周恩来同志在这里生活和战斗的情景的叙述。这些都使她深为感动。"},{"type":"paragraph","text":"参加仪式的华侨中有过去到法国勤工俭学的老人王守义，他拿着相机不停地摄影。他今天感情激动地含着泪水对记者说，周恩来同志受到勤工俭学学生的普遍敬重。他曾经听过周恩来同志在咖啡馆里对中国学生和工人的讲话。他还记得，周恩来同志当时号召大家团结起来，为改造和建设中国而奋斗。今天，中国人民为祖国现代化建设所做的努力正是在继承周恩来同志的遗志。"},{"type":"paragraph","text":"新华社记者　姚云"},{"type":"paragraph","text":"(新华社巴黎十月十六日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"
