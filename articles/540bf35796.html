script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印修分子把持的西孟加拉邦政府是大地主大资产阶级的统治工具  公然纵容反动军警开枪屠杀工人","authors":[],"dates":[{"year":1969,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印修分子把持的西孟加拉邦政府是大地主大资产阶级的统治工具"},{"type":"paragraph","text":"公然纵容反动军警开枪屠杀工人"},{"type":"paragraph","text":"据新华社讯　新德里消息：在印度修正主义分子参与执政的西孟加拉邦，最近一再发生反动军警屠杀印度人民的血腥事件。这进一步暴露了印度修正主义分子走“议会道路”搞出来的“联合阵线政府”的反动本质。"},{"type":"paragraph","text":"据报道，西孟加拉邦科西普尔（在邦首府加尔各答北郊）一个官办军火工厂六千多名工人，三月八日早晨在工厂门口集会，抗议厂方无理解雇工人，要求恢复五十五名工人的工作。会后，工人准备进厂，但工厂反动当局竟不让工人进去。当工人群众表示愤怒抗议时，把守这个工厂的印度反动武装人员残暴地向工人多次开枪，四名工人当场被打死，八人受伤，一名工人事后伤重而死。"},{"type":"paragraph","text":"另据报道，三月三十一日，离加尔各答不远的特莱尼帕拉县和恰莫达尼县的人民举行示威，反对西孟加拉邦政府的反动统治。反动警察向示威群众开枪，打死三人，打伤二十五人，还逮捕了一百八十多人。这个事件发生后，西孟加拉邦政府副首席部长、印修分子乔蒂·巴苏凶相毕露地诬蔑这次游行示威是要“瓦解联合阵线的统治”，妄图证明反动警察开枪屠杀人民的血腥罪行是“合法”的。事实表明，印修分子把持的邦政府，只是大地主大资产阶级的统治工具。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"540bf35796"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
