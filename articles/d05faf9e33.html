<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央人民政府政务院关于保障一切散居的少数民族成分享有民族平等权利的决定","authors":[],"dates":[{"year":1952,"month":2,"day":22}],"is_range_date":false,"parts":[{"text":"中央人民政府政务院关于保障一切散居的少数民族成分享有民族平等权利的决定","type":"title"},{"text":"（一九五二年二月二十二日政务院第一百二十五次政务会议通过）","type":"subtitle"},{"text":"由于各种的历史原因，国内某些少数民族成分，在好多年以来，甚至在好几代以来，即星散地居住在汉族地区。他们大多居住在城市和集镇。他们曾经在反动统治下长期地忍受着民族的压迫和歧视，有的因此不得不隐瞒自己的民族出身，改变自己的民族成分，遮盖自己的民族特点，以求生存。中华人民共和国创立以后，民族压迫业已宣告废除，民族平等业已付诸实施，为保障这些散居的少数民族成分享有民族平等的权利，特作如下的决定：","type":"paragraph"},{"text":"一、依据中国人民政治协商会议共同纲领第五条和第九条的规定，一切散居的少数民族成分的人民，均与当地汉族人民同样享有思想、言论、出版、集会、结社、通讯、人身、居住、迁徙、宗教信仰、游行示威的自由权，任何人不得加以歧视。","type":"paragraph"},{"text":"二、一切散居的少数民族成分，依法享有选举权与被选举权。其人数较多者，当地人民政府可采取适当办法，使有代表参加政权机关；遇有关少数民族的提案和意见，应与其他方面的提案和意见同样予以重视；有关某一少数民族的特殊问题，须与该少数民族代表充分协商。","type":"paragraph"},{"text":"三、一切散居的少数民族成分，无论在社会上，在工厂、学校、团体、机关和部队中，均有自由保持或改革其民族的生活方式、宗教信仰和风俗习惯的权利，别人不得干涉，并须加以尊重和照顾。","type":"paragraph"},{"text":"四、一切散居的少数民族成分，有分别加入当地各种人民团体及参加各种职业的权利，各人民团体及各种职业部门，不得因其民族成分的关系而加以拒绝或歧视。","type":"paragraph"},{"text":"五、凡散居的少数民族成分，有其本民族语言、文字者，得在法庭上以本民族语言、文字进行诉辩。","type":"paragraph"},{"text":"六、一切散居的少数民族成分如遭受民族的歧视、压迫或侮辱，有向人民政府控告的权利。各级人民政府对此种控告须负责予以处理；对于歧视、压迫或侮辱行为严重者，应依法予以惩治。","type":"paragraph"},{"text":"七、一切散居的少数民族成分，在享受民族平等权利遇有困难无法解决时，得提请当地人民政府予以适当帮助。","type":"paragraph"},{"text":"八、本决定的原则同样适用于散居在各少数民族自治区的其他少数民族成分和汉族成分。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d05faf9e33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
