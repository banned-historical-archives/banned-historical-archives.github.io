art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"加强党的领导 坚持社会主义方向一些同志对《苦恋》从政治内容到艺术技巧作了具体分析和严肃批评","authors":[],"parts":[{"type":"paragraph","text":"新华社9月9日讯 首都部分文艺工作者最近举行座谈会，讨论文艺界如何加强领导，改变涣散软弱状态，增强团结，改进工作等问题。在座谈会上发言的同志们表示拥护邓小平同志7月17日同中央宣传部门有关负责同志的谈话，和胡耀邦同志在全国思想战线问题座谈会上的讲话，提出要认真开展批评和自我批评，克服各种错误倾向，特别是对于那种要脱离社会主义轨道，脱离党的领导、搞自由化的倾向，要进行正确的有力的批评和必要的斗争。一些同志在发言中对电影文学剧本《苦恋》，从政治内容到艺术技巧作了具体的分析和严肃的批评。有些同志在发言中作了自我批评。"},{"type":"paragraph","text":"这次座谈会是由文化部和中国文联联合召开的。周巍峙、林默涵、陈荒煤主持了座谈会。中共中央书记处书记、宣传部部长王任重到会听了大家的发言。"},{"type":"paragraph","text":"文艺界在京部分领导干部、作家、艺术家、评论家五十多人参加了座谈会。周扬、刘白羽、张光年、艾青、姚雪垠、陈播、赵寻、阮章竞、陈荒煤、吴作人、魏巍、金山、林默涵、曹禺、林杉、魏传统、王蒙、苏一平、张水华、周巍峙在座谈会上发了言。还有一些同志作了书面发言。"},{"type":"paragraph","text":"周扬"},{"type":"paragraph","text":"刘白羽"},{"type":"paragraph","text":"张光年"},{"type":"paragraph","text":"姚雪垠"},{"type":"paragraph","text":"赵寻"},{"type":"paragraph","text":"陈荒煤"},{"type":"paragraph","text":"林默涵"},{"type":"paragraph","text":"曹禺"},{"type":"paragraph","text":"王蒙"}],"alias":""},"tags":[{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d97487d995"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
