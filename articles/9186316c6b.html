<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"金日成首相向全国人民发表新年贺词  号召把千里马运动推向新的高潮  指出美帝国主义进一步陷入困境，修正主义者原形继续被揭露","authors":[],"dates":[{"year":1964,"month":1,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金日成首相向全国人民发表新年贺词"},{"type":"paragraph","text":"号召把千里马运动推向新的高潮"},{"type":"paragraph","text":"指出美帝国主义进一步陷入困境，修正主义者原形继续被揭露"},{"type":"paragraph","text":"新华社平壤一日电　朝鲜民主主义人民共和国内阁今天上午举行一九六四年新年宴会。金日成首相在宴会上向全国人民发表了新年贺词。"},{"type":"paragraph","text":"金日成首相说，“我们要使一九六四年成为改善我国人民生活的巨大转变的一年，成为进一步加强我国政治和经济威力的一年，成为使我们社会主义祖国更加光辉灿烂的一年。”"},{"type":"paragraph","text":"金日成回顾了朝鲜劳动人民一九六三年在社会主义建设方面所取得的巨大成就。他说：我们胜利地超额完成了一九六三年度国民经济计划。国家的经济基础更加坚实，人民的物质文化生活得到了进一步的改善。据初步统计，一九六三年工业总产值比前一年增长了百分之八。现在，我国的工业是自主的现代化的社会主义工业，它成了使国家富强、使人民生活进一步提高的牢固的物质基础。去年粮食总产量有了增长，特别是稻谷产量大大增加的结果，使我们能够更好地解决人民的食粮问题。科学、教育、保健、文学、艺术、体育等一切部门都取得了迅速的发展。"},{"type":"paragraph","text":"金日成说：今天，我们祖国处于空前民族繁荣的时期。我国人民的智慧和才能得到了发展，群众的革命热情和创造性积极性正在高涨。所有的人为了日益繁荣的社会主义祖国而自豪，歌颂美好的社会主义新生活的幸福，充满了战斗气息和革命乐观主义。全党全民团结一致，高举马克思列宁主义旗帜，为了更美好的未来，为了革命的最后胜利而奋勇斗争。"},{"type":"paragraph","text":"金日成揭露了美帝国主义及南朝鲜军事集团“还政于民”的丑剧，谴责了美帝国主义强占南朝鲜的行为。他号召南朝鲜人民展开反美救国斗争，赶走美国侵略者，打倒傀儡政权。"},{"type":"paragraph","text":"金日成在谈到目前国际形势时说：“今天，整个国际局势朝着有利于人民的革命事业发展。国际舞台上的社会主义力量不断增长。亚洲、非洲和拉丁美洲的民族解放斗争的火焰正在熊熊燃烧。所有资本主义国家以工人阶级为首的人民群众的革命力量正在继续成长。"},{"type":"paragraph","text":"“以美国为首的帝国主义者进一步陷入了困境，修正主义者的原形继续被揭露。"},{"type":"paragraph","text":"“马克思列宁主义深入到越来越多的人民的心中。在世界各地，我们的革命同志和朋友继续增多，他们在反对帝国主义及其走狗的斗争中联合起来。任何力量都遮盖不了马克思列宁主义的伟大真理，阻挠不了人民革命斗争的前进。”"},{"type":"paragraph","text":"金日成首相强调说：我们党和我国人民高举马克思列宁主义和无产阶级国际主义的旗帜，为社会主义阵营的团结和国际共产主义运动的团结而坚决斗争；同全世界革命人民紧密团结，为反对帝国主义和现代修正主义而进行顽强的斗争。"},{"type":"paragraph","text":"金日成最后谈到了朝鲜人民今年的战斗任务。他指出，就像劳动党七届四中全会上所明确指出的，今年国民经济的基本方针是：在为将来进一步扩大和加强重工业创设条件和进行准备的同时，充分运用业已建立的重工业基础，来加速发展轻工业和农村经济，特别是消费品的生产，进一步提高人民的生活水平。"},{"type":"paragraph","text":"金日成首相说，全体劳动人民应当在社会主义建设的各个部门中把千里马运动推向新的、更伟大的高潮。"},{"type":"paragraph","text":"金日成最后号召全体朝鲜人民钢铁般地团结在党的周围，一手拿武器，一手拿镰刀和锤子，坚决保卫祖国，更好、更快地建设社会主义。"},{"type":"paragraph","text":"朝鲜其他党政领导人崔庸健、朴金喆、金昌满、李孝淳、金光侠等出席了宴会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9186316c6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
