（节录）","authors":[],"dates":[{"year":1951,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"川北区党委关于第一期土改运动的总结（节录）","type":"title"},{"text":"运动中的偏差：","type":"paragraph"},{"text":"1.单纯经济观点，为搞东西而搞东西，不强调思想上发动群众，政治上打垮地主威风，而是单纯追求数字。","type":"paragraph"},{"text":"2.界限不明，范围不严，未能区别守法与不法，封建与非封建，而把守法地主，富农，小土地出租者一样惩处。未能把惩治斗争约束在合理合法范围内，而是用算剥削账的办法，使地主感到没有底子，因而坚决顽抗，同时又失掉社会舆论同情，是/使运动陷于孤立。","type":"paragraph"},{"text":"3.不实行分别对待，不讲策略，应该照顾的而不照顾，对小地主搞的狠，而对顽抗之大地主，一部分中地主却表现无办法，对地主成分之军烈属，有些开明人士和地主兼工商业者，不加照顾，或照顾不够。","type":"paragraph"},{"text":"4.相当普遍使用肉刑拷打，形成硬逼底财，不但对群众中发生肉刑拷打现象不加劝告，甚至干部带头拷打或暗示拷打，致造成地主普遍恐慌自杀过多。土改区共自杀1800多，其中反革命份子罪该处死者是少数，小地主占绝大多数，还有个别被连累的农民。产生上述偏差之主要原因，一方面是由于区党委对上述严重现象及时了解差，而发现后通告各地警惕停止不太及时，不太坚决，恐怕影响下面干部不敢放手。另一方面是由于下面干部水平底，思想作风上简单粗糙，抓住一头往往就忘记另一头。（未完）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b04463b2c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
