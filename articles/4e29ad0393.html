" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1337","name":"中纪委关于广西正厅、局级党员干部和区党委委员、候补委员在‘文革’中违犯党纪的处分批准权限的复文","author":"中共中央纪委","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中纪委关于广西正厅、局级党员干部和区党委委员、候补委员在‘文革’中违犯党纪的处分批准权限的复文","dates":[{"year":1984,"month":6,"day":19}],"is_range_date":false,"authors":["中共中央纪委","中共广西区党委"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区党委整党办公室, 处理“文革”遗留问题、清理“三种人”文件汇编(第一册), 296-298","tags":[{"name":"处分","type":"主题/事件"},{"name":"党纪","type":"主题/事件"},{"name":"批准","type":"主题/事件"},{"name":"权限","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中纪委关于广西正厅、局级党员干部和区党委委员、候补委员在“文革”中违犯党纪的处分批准权限的复文"},{"type":"paragraph","text":"中共广西壮族自治区委员会："},{"type":"paragraph","text":"六月十三日电悉。"},{"type":"paragraph","text":"作为一种特殊情况，同意将你区正厅、局级党员干部和区党委委员、候补委员，在“文革”中违犯党纪的处分批准权限下放给你们。区党委委员受撤销职务以上处分的，报中央备案。"},{"type":"paragraph","text":"其他违纪的处分，仍按党章和批准权限的规定报批。"},{"type":"paragraph","text":"中央纪委"},{"type":"paragraph","text":"一九八四年六月十九日"},{"type":"paragraph","text":"关于厅、局级党员干部在“文革”中违犯党纪的处分批准权限问题的请示"},{"type":"paragraph","text":"中央纪检会并报中央书记处："},{"type":"paragraph","text":"一九八三年七月六日中央纪律检查委员会《关于处分违犯党纪的党员批准权限的具体规定》中，对各省、市、自治区的厅长、局长、主任、部长、地、市委书记、行署专员、市长以上干部和省、市、自治区委员会委员、候补委员给予党纪处分，由中央纪律检查委员会批准，报中央备案。一九八四年二月二十四日中纪委又重申要按照这一规定，履行报批手续。"},{"type":"paragraph","text":"根据我区当前处理“文革”遗留问题的实际情况，按照一九八三年十月五日中共中央组织部中组发〔83〕15号《关于改革干部管理体制若干问题的规定》，对原由中央管理的省一级的部、厅、局和地、市领导班子，改由省委自行管理的精神，考虑到我区自去年三月以来，因“文革”问题停职、免职、撤职审查的厅、局级党员干部有十五人，区党委委员、侯补委员九人，这些人有的属于造反起家、派性严重或与杀人有关，需要给予必要的党纪处分。为了及时做好这些人的定案处理工作，建议将我区厅、局级党员干部和区党委委员在“文革”中违犯党纪的处分批准权限下放给自治区党委。"},{"type":"paragraph","text":"以上请示当否？请批复。"},{"type":"paragraph","text":"中共广西壮族自治区委员会"},{"type":"paragraph","text":"一九八四年六月十三日"}],"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e29ad0393"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
