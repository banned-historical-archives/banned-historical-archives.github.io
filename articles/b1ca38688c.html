ates":[{"year":1966,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"带头学好毛主席著作"},{"type":"paragraph","text":"时时刻刻都想着人民"},{"type":"paragraph","text":"焦裕禄同志是县委书记，我也是县委书记，担子本来是一样的重，党的要求是一样的高，焦裕禄同志为革命作出那么大的贡献，而我的工作却做得不够好。原因在那里呢？千条万条，重要的一条就是没有象焦裕禄同志那样真正把毛泽东思想学到手，有效地运用到改造主观世界和客观世界中去。"},{"type":"paragraph","text":"承认差距是一回事，缩短差距又是一回事，因此，我决心奋发图强，在革命化的道路上，迎头赶上去。本来，在一个县里，县委书记是革命的带头人，头脑中要时时刻刻想着人民，才能完全、彻底地为人民服务。今后，我一定以焦裕禄同志作榜样，首先带头学好用好毛主席著作，彻底改造自己，树立起全心全意为全中国人民和全世界人民服务的革命世界观，扔掉一切个人杂念，深入第一线，和全县人民一起，脚踏实地地大搞三大革命运动，为彻底改变全县面貌坚决奋斗。"},{"type":"paragraph","text":"河北围场县委书记  赵梦久"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1ca38688c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
