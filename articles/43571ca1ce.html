<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"迟群与清华大学机械系压五班学员座谈时的讲话（摘录）","authors":[],"dates":[{"year":1976,"month":9,"day":9}],"is_range_date":false,"parts":[{"text":"迟群与清华大学机械系压五班学员座谈时的讲话（摘录）","type":"title"},{"text":"昨天晚上9点和江青同志还在研究组织给主席看的材料，五号通知我们主席病情恶化，后又稳定下来，我们一直想到主席会好的。我们在搞北京上海出版工作和大批判的文章。我一直忙到今早3点回来，刚睡一会，就把我喊起来，通知主席逝世了，告诉我们停止抄写材料，我怎么去通知他们呢，还是抄下去吧，留着做个纪念。你们不要记录。","type":"paragraph"},{"text":"主席一生是战斗的一生，最后一直是在关心国家大事，留给我们的是用实际行动告诉我们关心国家大事，关心世界大事，最后主席没有留下什么遗嘱，（还）是要东西看，有什么比这更加高贵，无产阶级革命家，这样高贵的品德作风。","type":"paragraph"},{"text":"正象你们所讲，主席和我们永别了，但主席思想是永存的，永远在指挥我们战斗，帝修反有什么可怕的，用毛泽东思想武装起来的人民是不可战胜的，对国内反动派也一样，为什么95％以上的人民不能战胜1—2％的反动派，在理论上是说得通的，实践上是有经验的，还要勇气、力量，为什么不能对1—2％阶级敌人进行专政呢？相信主席教导是永远正确的。","type":"paragraph"},{"text":"有人一遇风浪就动摇悲观，是小资产阶级世界观，典型表现是对形势前途缺乏信心。主席逝世后，有人担心领导权在谁手里的问题。国家前途问题，这是小资产阶级动摇性。一遇风浪就动摇，马克思、恩格斯那时只有两个人，向全世界发表《宣言》，说资本主义必然灭亡，共产主义必然胜利，他们敢讲，当时相信他们的人并不多，他们离我们已经一百多年了。列宁缔造了第一个社会主义国家，当时他们国家被帝国主义包围，困难重重，后来被赫鲁晓夫、勃列日涅夫葬送了，但列宁提供了十月革命的经验，毛主席讲十月革命一声炮响……","type":"paragraph"},{"text":"毛主席十几次被撤职、罢官、被整，最厉害的时候，连秘书都没有，住在山洞里，周围抬头看到山路上国民党兵在走动，这么困难的条件下，毛主席坚持斗争，写下“战地黄花分外香”，毛主席和一个个机会主义分子斗争，从陈独秀开始，一直到邓小平，因为他坚信马列，毛主席领导我们把一个幼稚的党、年青的党变成一个成熟的党、有经验的党，要学习毛主席继续革命，彻底革命。","type":"paragraph"},{"text":"相信你们讲的不是空话，以后会看到你们的实践。","type":"paragraph"},{"text":"毛主席病情是从9月2号开始恶化的，关于毛主席病情和大家讲了，以后根据中央讲的，这里讲的不要到外面讲了。","type":"paragraph"},{"text":"（根据压五班部分师生追忆整理）","type":"paragraph"}],"comments":[],"origin":"北京大学运动办公室编《材料之四，供批判用》，1976年11月8日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"迟群","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43571ca1ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
