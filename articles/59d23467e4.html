ates":[{"year":2001,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"电视文献纪录片《毛泽东与湖南》在长沙首播"},{"type":"paragraph","text":"本报长沙5月15日电记者吴兴华报道：由中央文献研究室和中共湖南省委联合摄制的电视文献纪录片《毛泽东与湖南》，昨天在长沙举行首播式，向建党80周年献上了一份厚礼。"},{"type":"paragraph","text":"《毛泽东与湖南》通过展现毛泽东各个历史时期在湖南的主要革命实践活动，用生动的形象和感人的事迹，从一个侧面反映和再现了毛泽东的革命生涯、光辉业绩和伟人风范，反映和再现了中国共产党始终追求、努力实践“三个代表”的光辉历程和奋斗历史，有助于我们深入了解毛泽东思想的历史渊源、发展轨迹和丰富内涵，帮助我们进一步加深对邓小平理论和党的基本路线的理解，坚定社会主义的理想信念。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59d23467e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
