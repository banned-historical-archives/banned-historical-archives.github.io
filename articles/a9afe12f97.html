<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1977,"month":4,"day":3}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"美国已故著名黑人学者杜波依斯的夫人追悼会在京举行华国锋总理送了花圈 陈永贵副总理、邓颖超副委员长等参加追悼会","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年四月二日讯 美国已故著名黑人学者杜波依斯的夫人雪莉·格雷厄姆·杜波依斯的追悼会，今天下午在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"杜波依斯夫人是一九七六年二月二十二日来我国治病的。当时经检查发现，她患的是晚期乳癌，而且已经扩散。经尽力医治无效，不幸于一九七七年三月二十七日在北京逝世。"},{"type":"paragraph","text":"追悼会会场正中悬挂着杜波依斯夫人的遗像。遗像下面安放着杜波依斯夫人的骨灰盒。"},{"type":"paragraph","text":"国务院总理华国锋送了花圈。国务院副总理陈永贵，人大常委会副委员长郭沫若、邓颖超，外交部部长黄华和何理良同志，卫生部副部长黄树则，对外友协会长王炳南，以及对外友协、首都医院革委会也送了花圈。送花圈的还有坦桑尼亚、加纳、赞比亚驻中国的大使馆。"},{"type":"paragraph","text":"陈永贵副总理，邓颖超副委员长，黄华外长，黄树则副部长，王炳南会长，有关方面人士楚图南、林林、杨纯、于立群、何理良、章央芬，以及首都医院的医护人员和其它方面代表参加了追悼会。"},{"type":"paragraph","text":"参加追悼会的还有坦桑尼亚驻中国大使卢辛德的夫人和大使馆的外交官员，赞比亚、加纳、几内亚驻中国的使节和大使馆的外交官员，以及在京的一些外国朋友和杜波依斯夫人的生前友好。"},{"type":"paragraph","text":"陈永贵副总理、邓颖超副委员长等向杜波依斯夫人的儿子大卫·杜波依斯，杜波依斯夫人的弟弟大卫·格雷厄姆和弟媳梅特丽斯·格雷厄姆，表示亲切慰问。"},{"type":"paragraph","text":"追悼会由对外友协副会长林林主持。王炳南会长致悼词。"},{"type":"paragraph","text":"悼词中说："},{"type":"paragraph","text":"杜波依斯夫人原籍美国，六十年代移居非洲，现在是坦桑尼亚国籍。她是一位杰出的黑人妇女和著名作家。长期以来，她和已故的杜波依斯博士一样，追求进步、主持正义、反抗压迫，不屈不挠地致力于美国人民和黑人解放的正义斗争。她热爱非洲人民，把非洲人民的解放事业视为自己的神圣义务，为之积极工作，努力奋斗，对非洲人民和第三世界的团结反帝事业作出了有益的贡献。"},{"type":"paragraph","text":"杜波依斯夫人敬仰毛主席，热爱新中国，同情和支持我国的社会主义革命和社会主义建设事业，是中国人民真诚的朋友。她曾五次访华，每次都对中国人民所取得的成就和进步给予热情的赞扬，广为宣传，为增进中国同美国以及第三世界人民之间的友谊和了解做了大量工作。特别令人感动的是，杜波依斯夫人这次在重病中仍念念不忘要收集材料写书介绍新中国。她对中国人民的这种友好情谊和顽强的战斗精神，将永远铭记在我们心中。"},{"type":"paragraph","text":"杜波依斯夫人与我们永别了。中国人民失去了一位亲密的朋友，美国人民、非洲人民和第三世界人民失去了一位英勇的战士。我们深信，杜波依斯夫人生前为之奋斗的被压迫人民和被压迫民族的解放事业定将获得最后胜利。"},{"type":"paragraph","text":"杜波依斯夫人患病住院期间，国务院副总理吴桂贤和邓颖超副委员长等曾到医院探望。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"陈永贵","type":"人物"},{"name":"黄树则","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9afe12f97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
