ates":[{"year":1962,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社上海20日讯】　上海勤艺沪剧团根据已故革命作家柔石的同名小说改编的沪剧《为奴隶的母亲》，演出已超过四百场，目前还在继续演出，始终受到观众们热烈的欢迎。"},{"type":"paragraph","text":"《为奴隶的母亲》是柔石被国民党反动派杀害前一年(1930年)写的一篇优秀的现实主义作品。这篇小说描写当时浙江农村中一个青年农民，被旧社会反动派压迫和剥削得难以生活下去，无奈把他的妻子典租给了一个秀才，这个农村妇女与自己的儿子也因此分离。她在秀才家里受尽了精神上和肉体上的折磨，生了一个孩子，又不准认她是娘，她成了一个丧失自由以至丧失母亲权利的奴隶。"},{"type":"paragraph","text":"上海勤艺沪剧团1954年初次把这篇小说的故事搬上舞台。以后在1958年、1960年又到南京、苏州、西安、洛阳、三门峡等地和在上海演出，每次都博得观众好评。这次在上海重新演出前，剧团又修改了剧本，进行提炼与加工，体现了原作朴实无华的风格。尤其是通过著名的沪剧演员杨飞飞低沉柔和的唱腔，表现出了“为奴隶的母亲”对旧社会悲愤的控诉，感人很深。"},{"type":"paragraph","text":"中国戏剧家协会上海分会为这出戏的改编和重新演出举行了座谈会。许多文学、戏剧界人士认为勤艺沪剧团在继承整理传统剧目的同时，对反映现代生活的现实主义作品不断加工改编，很有意义。会上对戏中改编的一些情节进行了讨论。同时对戏曲如何改编现实主义作品的问题也作了初步的探索。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8935cdeee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
