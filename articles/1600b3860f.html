ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"四言诗·戏改江沧”《别赋》","alias":"","parts":[{"type":"paragraph","text":"四言诗?戏改江淹！《别赋》"},{"type":"paragraph","text":"（1939年7月）春草碧口色，春水绿波。送君延安，3"},{"type":"paragraph","text":"快如之何！4"},{"type":"paragraph","text":"[1]江淹（444—-505），南朝梁代文学家，字文通，济阳考城（今河南兰考东）人。历仕宋、齐、梁三代。梁代时官至金紫光禄大夫。少孤贫好学，早年即以文章著名，晚年才思衰退，所作诗文不如前期，人谓“江郎才尽”。诗歌多拟古之作。赋以《恨赋》《别赋》最为有名。原有集，已散佚，后人辑有《江文通集》。"},{"type":"paragraph","text":"[2]碧，青绿色。"},{"type":"paragraph","text":"[3]君，你。延安，当时中共中央所在地。送君延安，在延安送别奔赴抗日前线或赴全国各地从事革命工作的同志。"},{"type":"paragraph","text":"[4]快，快活，舒畅。之，这里是语助词，无实义。如之何，即如何，怎么样。快如之何，快活得怎么样。犹言快活极了！"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":493,"page_end":493},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1600b3860f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
