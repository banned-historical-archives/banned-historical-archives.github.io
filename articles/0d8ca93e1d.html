script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批臭资产阶级的“名记者”","authors":["洪遵斌"],"dates":[{"year":1968,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"洪遵斌"},{"type":"paragraph","text":"我们伟大的领袖毛主席教导我们:“共产党员无论何时何地都不应以个人利益放在第一位，而应以个人利益服从于民族的和人民群众的利益。因此，自私自利，消极怠工，贪污腐化，风头主义等等，是最可鄙的”。而中国赫鲁晓夫却鼓吹“把记者姓名写在前面，……让记者有名有利。”还叫嚣为成为“在全中国是最有名的记者”而奋斗。这些黑话，就是要让资产阶级的个人主义在记者的头脑中膨胀起来，去成为“闹名誉、闹地位、闹出风头”往上爬的个人野心家，成为骑在劳动人民头上的精神贵族。所谓‘让记者自由发挥’，提高记者的‘积极性’，就是要记者拼命去为他复辟资本主义制造舆论，效犬马之劳!这是一把杀人不见血的软刀子，我们决不能受骗上当!"},{"type":"paragraph","text":"报刊是阶级斗争和无产阶级专政的重要工具。我们的编辑、记者和一切革命的新闻工作者都应该是无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命路线的新闻战士，应该是站在阶级斗争最前列的流动哨兵，自觉地为毛主席的革命路线放好哨，站好岗，打好仗!从而使我们的报纸的每篇文章、每条报道都发挥革命的冲锋枪、迫击炮的威力，为捍卫毛主席的革命路线大喊大叫!而中国赫鲁晓夫狂热鼓吹‘要让记者有名有利’，就是要记者脱离无产阶级政治，成为极端的利己主义者，象西方资产阶级记者那样的无耻政客，这样，报纸就变成为复辟资本主义的工具，这是不能容忍的!"},{"type":"paragraph","text":"毛主席早就深刻地指出:“在我们的许多工作人员中间，现在滋长着一种不愿意和群众同甘苦，喜欢计较个人名利的危险倾向，这是很不好的。”革命的新闻工作者一定要遵循毛主席的教导，把自己培养成为不为名、不为利的无产阶级的新闻战士!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d8ca93e1d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
