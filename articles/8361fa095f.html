经学院","马哲民"],"dates":[{"year":1957,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"对全院教工的讲话","type":"title"},{"text":"中南财经学院马哲民","type":"authors"},{"text":"摘要：","type":"subtitle"},{"text":"“鸣放”以来的问题是，党领导学校有些也不合理，党的宗派主义、主观主义和官僚主义，宗派主义最突出，在以上几个问题上（指肃反、人事安排、工资改革、生活福利等——编者）都反映了宗派主义，起码是两重宗派主义，党和非党的，中大和非中大的，甚至还有三重四重。","type":"paragraph"},{"text":"我们对鸣与争要有正确的理解，鸣放本身就是争，放就是为了争，既然有矛盾就要争，这也是辩证的。在学校里把一般性问题说了，但象无产阶级专政问题，中央的体制应该怎样？这些问题都未说……","type":"paragraph"},{"text":"中国六亿人口，绝大多数是小资产阶级，如农民、小手工业者、改造中的资产阶级、知识分子都是民主主义，所以要扩大民主生活。对这些人不能专政。将来工人阶级也就要改变，我们不能把这一个阶级观念老放在脑子里不变。","type":"paragraph"},{"text":"今后人民内部关系，不仅是平等，目标基本上一致，剥削被剥削，统治被统治的差别没有。就共产党员来说，就应该大公无私，不能戴宗派主义的帽子，要贯彻真正的人道主义，要认清大家都是人……这样就可以把狭隘的阶级仇恨消除掉。","type":"paragraph"},{"text":"共产党要热爱人民……不能蹂躏人民，打击人民。今后人民内部的差别是共同进步中有进步快慢之分，而没有更大的区别。工人阶级的特殊性、共产党员的独特性不要强调。","type":"paragraph"}],"comments":[],"origin":"《右派言论选集》（湖北人民出版社，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8361fa095f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
