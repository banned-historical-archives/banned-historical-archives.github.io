art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席周恩来总理接见埃文化代表团并观看演出","authors":[],"parts":[{"type":"paragraph","text":"新华社20日讯 中华人民共和国主席刘少奇、国务院总理周恩来今晚接见了埃塞俄比亚文化代表团团长贝·特塞玛，副团长扎·加布雷梅津和主要演员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时，团长贝·特塞玛将埃塞俄比亚皇帝海尔·塞拉西一世陛下给刘少奇主席的信呈递给刘少奇主席，并将皇帝陛下赠送的礼品转交给刘少奇主席、周恩来总理。"},{"type":"paragraph","text":"刘主席请代表团把中国政府和中国人民的问候转达给皇帝海尔·塞拉西一世陛下，并感谢他赠送的礼物。"},{"type":"paragraph","text":"接见时在座的有国务院副总理习仲勋。接见时在座的还有对外文化联络委员会代主任张致祥，副主任屈武、朱光，外交部副部长黄镇，文化部副部长徐平羽等。"},{"type":"paragraph","text":"据新华社20日讯 第一次出国来我国访问的埃塞俄比亚文化代表团，今晚在首都剧场举行开幕式和首次演出。"},{"type":"paragraph","text":"刘少奇主席、周恩来总理、习仲勋副总理等国家领导人观看了代表团的演出。"},{"type":"paragraph","text":"演出结束后，刘少奇主席、周恩来总理，习仲勋副总理等国家领导人步上舞台同埃塞俄比亚的艺术家们热烈握手，祝贺他们演出成功。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"习仲勋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a6116b664"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
