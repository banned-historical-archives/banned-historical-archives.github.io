" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1551","name":"中共江西省委组织部转发中央组织部《关于彻底平反纠正冤假错案进一步作好落实干部政策工作的意见》的通知","author":"中共江西省委组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共江西省委组织部转发中央组织部《关于彻底平反纠正冤假错案进一步作好落实干部政策工作的意见》的通知","dates":[{"year":1981,"month":3,"day":2}],"is_range_date":false,"authors":["中共江西省委组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共江西省纪律检查委员会，中共江西省委党史资料征集委员会，江西平反冤假错案，79-80","tags":[{"name":"党籍","type":"主题/事件"},{"name":"开除","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中共江西省委组织部转发中央组织部《关于彻底平反纠正冤假错案进一步作好落实干部政策工作的意见》的通知"},{"type":"subtitle","text":"（1981年3月2日）"},{"type":"paragraph","text":"现将中央组织部中组发（1981）5号《关于彻底平反冤假错案进一步作好落实干部政策工作的意见》转发给你们，望认真贯彻执行。"},{"type":"paragraph","text":"我省落实干部政策的工作，虽然取得了很大成绩，但是，按照党的干部政策的要求，还存在一些问题，有不少工作要做。目前，审干工作检查验收多数地区已基本结束，省直单位，有的正在进行，少数单位尚未开展。已经检查验收的地区和单位，发现和纠正了一些定性偏高，处理偏严的案件。去年11月全省审干工作座谈会以后，有的地区又组织力量，搞了验收后的“回头看”的工作，这种做法是好的。因此，要求尚未进行检查验收的地区和单位，必须抓紧进行,千万不能走过场；检查验收已基本结束的地区和单位,要抓住定为敌我矛盾、开除党籍、开除公职和改变“文革”前结论的这个重点，进行一次“回头看”的工作。要一个单位一个单位,一个案件一个案件地抓，一抓到底。各级党委要继续加强领导，肃清“左”的思想影响，克服“差不多”的思想，把政策真正落到实处，经得起历史的检验。鉴于落实干部政策的工作任务还很繁重，各地、市委组织部要保留审干工作机构，配齐必要的专职干部，县以上党委组织部门审干机构未撤销的应保留，已撤销了机构的，要有一定力量负责做好这项工作。"},{"type":"paragraph","text":"附：中共中央组织部关于彻底平反纠正冤假错案进一步作好落实干部政策工作的意见（略）"}],"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df8a2abb77"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
