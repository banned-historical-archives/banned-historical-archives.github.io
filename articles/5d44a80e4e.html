[],"dates":[{"year":1963,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇周恩来朱德邓小平等领导人接见出席十二个专业会议全体人员"},{"type":"paragraph","text":"新华社二十五日讯　党和国家领导人刘少奇、周恩来、朱德、邓小平、彭真、陈毅、贺龙、李先念、谭震林、康生、薄一波、聂荣臻，今天下午接见了出席中华全国手工业合作社第二次社员代表大会，中国人民解放军全军医学科学委员会全体会议，中国人民解放军第三次农副业生产会议，水利电力部黄河中游水土保持会议，中国水利学会会员代表大会，冶金工业部工作会议，化学工业部工作会议，建筑工程部工作会议，中国人民银行工作会议，纺织工业部财务工作会议，全国农业、基建、财贸统计工作会议和全国城市妇女工作会议的全体人员，以及中华全国供销合作干部学校全体学员。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"刘少奇、周恩来、朱德、邓小平等党和国家领导人接见出席十二个专业会议的全体人员，以及中华全国供销合作干部学校全体学员。"},{"type":"paragraph","text":"新华社记者　杜修贤摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d44a80e4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
