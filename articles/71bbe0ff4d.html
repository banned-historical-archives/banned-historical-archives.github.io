rs":["何玉辉","北京地质勘探学院","李燕吉","王佐堂"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“双百方针是多少人为民请愿的结果”","type":"title"},{"text":"北京地质勘探学院李燕吉王佐堂何玉辉","type":"authors"},{"text":"李燕吉在党的「百花齐放百家争鸣」方针提出后说：","type":"paragraph"},{"text":"「不再提出来就不行了，瞧文艺界多方面的贫乏情形，这是多少人为民请愿的结果，如胡风就是。「百花齐放，百家争鸣」方针和胡风所提出的三十万言意见书有相同的地方……很钦佩胡风。」","type":"paragraph"},{"text":"王佐堂说：","type":"paragraph"},{"text":"「百家争鸣是胡风提出的，毛主席是『歪打正着』。」","type":"paragraph"},{"text":"「共产党提出『长期共存互相监督』的方针，而实际各民主党派的存在是不平等的。既然提出这一方针，那么为什么民主党派不能发展呢？」「九三学社现在人家还不知道是高级社还是低级社呢？这证明党过去对民主党派是不重视的。」","type":"paragraph"},{"text":"何玉辉说：","type":"paragraph"},{"text":"「在国内，我把八大看作一个转折点，我想『百花齐放百家争鸣』看作一种标志，标志一切都通过争论来解决。过去说了些反话就当作落后，有时甚至于当成为反革命，现在是结束了。」","type":"paragraph"},{"text":"「过去有好些人都把话别在心里未说出来，假如不解决，就迟早会发生匈牙利事件，后来毛主席说：无论如何要让人民说话时，我更是非常高兴了。」","type":"paragraph"},{"text":"何宜章说：","type":"paragraph"},{"text":"「共产党和民主党派有矛盾，为何不取消它？」","type":"paragraph"},{"text":"林墨荫说：","type":"paragraph"},{"text":"「我院的民主党派为什么只是做视词，只做扩大会议成员，院报为什么不见他们的尖锐批评，这能说是互相监督吗？」","type":"paragraph"},{"text":"金荣新说：","type":"paragraph"},{"text":"「民主党派都是些老头，二十年后都死了，怎么会长期共存呢？」","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71bbe0ff4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
