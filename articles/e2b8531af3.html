" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"目前吉林地区部分右派分子动态","authors":["任冰如编"],"dates":[{"year":1957,"month":9,"day":23}],"is_range_date":false,"parts":[{"text":"目前吉林地区部分右派分子动态","type":"title"},{"text":"任冰如编","type":"authors"},{"text":"新华社长春23日讯　目前吉林地区有一部分右派分子尚在顽抗、抵赖，甚至继续进行反动活动，其表现大致有以下几种：一、坚持谬论，拒不检讨，不肯低头认罪。如电力设施分院右派分子程在熔，虽经几次说理斗争，但仍坚持说我们没有真正的民主、自由，三大主义是社会主义制度产生的；二、而无赖，反噬好人。如科普右派分子任新民在辩论会上，诬称支部书记用女人引诱他，威胁批判他的人有历史问题，并在会上举起茶杯引诱他，威胁批判他的人有历史问题，并在会上举起茶杯宣布退会；三、拒绝到会，逃避斗争。如铁路分局右派分子郑建中借口有病不上班，拒绝到会；银行右派分子刘正惇，会前偷偷蹓走，在桌子上留下一纸条，上写：“请你们缺席批判”；公安局右派分子王起生，在开会时举手向主席报告说，他要退席，抬腿就走；四、畏罪自杀。继人民大学右派分子丁则良在京投湖自杀之后，又有师大讲师右派分子王俊懿于8月30日自缢身死；最近得知师大学生右派分子左宝臣于放假期间在黑山县其家中投井自杀。也有的右派分子企图以假自杀威胁组织，蒙混过关，如市人委右派分子王众，服少量安妥杀鼠剂假装自杀；五、行凶报复或张贴反动标语。人大学生右派分子何鼎深用剪刀刺伤积极分子。师专学生右派分子周福彦声言要杀死几个。师大学生右派分子罗国华(共青团员)曾四次书写内容极其反动的传单和匿名恐吓信，当被破获后，罗还供称要趁国庆节同学不在时，纵火烧毁校部大楼，并寻机杀共产党员。该校行动委员会(右派小集团)骨干分子汪承隆、招宝光，最近还密议要到北京密访人大右派分子林希翎；六、逃往外地或企图逃往外国。自8月到目前，已发生三起逃跑事件(找回两名)。人大学生右派骨干分子胡显中，在暑假时曾到北京英国代办处，向该处三等秘书叙述了他在中国的“痛苦”，请求帮助他去英国。人大学生右派分子廉加熔、师大学生右派分子汪承隆均曾写信给南斯拉夫大使馆，对南表示钦赞和向往，并要求寄回一些关于南斯拉夫情况的材料。","type":"paragraph"},{"text":" 来源：新华社《内部参考》1957年9月27日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2b8531af3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
