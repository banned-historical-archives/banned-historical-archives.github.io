tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”倒打一耙","authors":["三四一一八部队理论组"],"parts":[{"type":"paragraph","text":"“四人帮”对于倒打一耙的把戏，玩得十分熟练、精彩，不愧为猪八戒的徒子徒孙。不信请看："},{"type":"paragraph","text":"明明是“四人帮”成天欣赏《游龙戏凤》、《四郎探母》之类的反动旧戏，成天泡在西方黄色电影里，还喋喋不休吹捧吕后、慈禧太后等等历史的僵尸。可是他们却反过来痛骂别人：“崇洋媚外”、“复古派”、“封资修文艺的吹鼓手”！"},{"type":"paragraph","text":"明明是他们妄图篡党窃国，利用文艺为自己涂脂抹粉，歌功颂德：话剧《冲锋向前》里的姜婶，有着江青的影子；电影《盛大的节日》里，有个王洪文式的“造反派”头头；还有一部长篇小说，竟是张春桥的“纪念碑”……。可是他们回过头来，却要追查电影《创业》和《闪闪的红星》为哪个“老家伙”树碑立传。简直是无耻之尤！"},{"type":"paragraph","text":"再说对所谓“文化工作危险论”的批判吧。“四人帮”一伙念着“三突出”之类的紧箍咒，抡着摧残百花的狼牙棒，一味吹毛求疵，求全责备，百般刁难，动不动就是“黑线回潮”、“右倾翻案”。这样一来，搞得许多文艺工作者提心吊胆，手足无措，根本无法创作。有的作家愤然搁笔，表示抗议。凡此种种不正常的现象，完全是“四人帮”一手造成的。可是他们倒打一耙，却要批判什么“危险论”。他们一面说：“不危险，大胆干吧！”而一旦你干得对不上他们的“口径”，就被加以重罪，甚至遭到残酷的迫害。这不是推人下井、落井下石又是什么呢？"},{"type":"paragraph","text":"“四人帮”倒打一耙确实是比较毒辣，然而因为他们反党、反人民，结果自己被打断了脊梁骨。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c076401e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
