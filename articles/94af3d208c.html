<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"三反简讯","authors":[],"dates":[{"year":1952,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"三反简讯","type":"title"},{"text":"▲华东大行政区一级机关打虎运动第一个战役共捕获老虎二百九十二只，内大虎六十七只，连同以前所获大虎数，共计九十五只，约占预算数(预算数大虎为七百只)的百分之十五。第二个战役计划打大虎八十只，大、中、小老虎合计要打出三百六十只(缺部分单位计划数)。在华东一级机关的打虎司令会议上，认为这一计划太小，至少要增加一倍，须完成预算数的百分之六十。","type":"paragraph"},{"text":"目前打虎队一般存在下列四种情况：(一)养虎纵虎，表现软弱，既不研究情况，亦不搜集材料，愁眉不展，或左或右，乱打乱碰。(二)对自己信任的人不敢大胆怀疑。(三)打虎很勇敢，但只会打山野老虎，不会打成窝老虎，只做武松，不做李逵。(四)在打虎运动中犯官僚主义与命令主义的毛病(上海市比较严重)，只讲数字任务，不讲政策、办法。","type":"paragraph"},{"text":"▲陕西省级机关打虎运动，从二月一日到十一日已捉到中小老虎八十五只。目前省级各机关虽有打虎决心，但力量不足，缺乏坚强的指挥员与大量的援兵，因此战绩甚微。全省各专区、县的三反运动已先后展开，估计二月底省、专区两级的三反运动可以结束，然后再进行区、乡的三反运动。全省中、小城市的五反运动除南郑、宝鸡、渭南等地已开始进行外，其他各地尚未开始。","type":"paragraph"},{"text":"▲太原市工商界“五反”运动在二月上半月的围攻大奸商斗争中，初步统计：共查获奸商漏税和偷工减料等盗骗国家资财达四百一十四亿余元。现在有不少干部满足于已有成绩，产生“差不多”和“收场”的右倾思想，没有耐心继续搞下去。这种情绪在领导上也或多或少地存在着。如领导“五反”运动的太原市委组织部长刘凯基说：“数字大致差不多了，只是问题的焦点还没突破。”因此，目前工作干部有松劲情绪。但事实上，就已知材料来看，仍有许多关键问题没有搞清。据太原市工商界节约检查委员会估计，至少还有三百余户工商业者的问题没有完全搞出来。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年2月21日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94af3d208c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
