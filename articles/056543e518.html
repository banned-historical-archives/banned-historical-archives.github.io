ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于同意罗瑞卿对三反中暴露的反革命分子的处理意见的电报","alias":"","parts":[{"type":"paragraph","text":"中央关于县区乡三级暂不进行三反和五反的指示"},{"type":"paragraph","text":"（1952年2月24日）各中央局，并转分局，省市区党委，地委："},{"type":"paragraph","text":"（一）县区乡三级的三反，除省委地委为了典型试验之目的，可以个别地进行以外，一律待春耕完成以后再做，以免引起混乱，此点前已通知。（二）县区乡某些违法资本家中的五反，目前一律不要进行。已进行者，一律停止。将来何时进行及如何进行，中央将根据情况另行通知。（三）中等城市例如四平街、营口、石家庄、新乡、苏州、宁波、宜昌、衡州、江门、梧州、宝鸡、汉中、自流井、遵义等的违法资本家中何时进行五反及如何进行五反，须由各中央局、分局、省委区党委根据中央二月十五日指示\"严格审查控制，逐一批准，以免混乱。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月二十四日"},{"type":"paragraph","text":"[1]指1952年2月15日中共中央关于五反中对各类资本家的处理意见的指示。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":436,"page_end":436},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"056543e518"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
