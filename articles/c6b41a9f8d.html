r":1988,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"该刊原名《毛泽东哲学思想研究动态》，由上海社会科学院哲学研究所和中国马克思主义哲学史学会毛泽东哲学思想研究会合办，创刊于一九八0年，现经有关部门批准，改名为《毛泽东哲学思想研究》，并于今年八月在国内外公开发行。"},{"type":"paragraph","text":"该刊改名后将进一步扩大报道范围，丰富报道内容，积极反映国内外研究毛泽东哲学思想的最新理论成果；结合我国社会主义改革实际，研究社会主义初级阶段的理论问题；加强对国内外哲学研究的评述；探讨马克思主义哲学的历史使命和时代特点；积极参与国际范围的学术交流，以推进马列主义哲学、毛泽东哲学思想的研究工作在社会主义新的实践中的发展。该刊视野开阔、内容新颖、信息量大，对研究、教学、理论宣传工作具有一定的参考价值。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6b41a9f8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
