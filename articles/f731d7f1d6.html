s":[],"dates":[{"year":1967,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"中共中央“关于制止西藏武斗的五项指示”","type":"title"},{"text":"一、会议听取两派情况的全面汇报以后，中央认为：造总、大联指均定为群众组织，以便实现大批判、大联合。两派的性质暂不下文字的东西。","type":"paragraph"},{"text":"二、拉萨各派组织，必须马上停止武斗，不准调农牧民进城，立即恢复交通运输，抓革命促生产、促战备、促工作，认真学习中央文件、江青等同志讲话和报纸的社论，这些是对各革命群众组织的考验。","type":"paragraph"},{"text":"三、要防止挑拨离间，调拨民族关系。","type":"paragraph"},{"text":"四、报纸是传达毛主席和党中央声音的。","type":"paragraph"},{"text":"五、如何做得好，这是对各革命群众组织的考验，还有一点要向造总同志传达的，“专打”不能定为群众组织、中央认为它是有错误的。","type":"paragraph"},{"text":" 中共中央一九六七年九月十八日","type":"paragraph"}],"comments":[],"origin":"根据台湾《中共研究》编辑部编《中共文化大革命重要文件汇编》，台北：1973年4月出版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f731d7f1d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
