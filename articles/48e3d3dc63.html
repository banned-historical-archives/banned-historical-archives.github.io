script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英美法资产阶级报纸言论陷于混乱  一面恫吓埃及一面承认吓不了埃及","authors":[],"dates":[{"year":1956,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英美法资产阶级报纸言论陷于混乱"},{"type":"paragraph","text":"一面恫吓埃及一面承认吓不了埃及"},{"type":"paragraph","text":"据新华社30日讯　伦敦消息：英国许多报纸在评论埃及把苏彝士运河收归国有这件事的时候，用最恶毒的字眼对埃及总统纳赛尔进行人身攻击。例如，把纳赛尔比作希特勒。"},{"type":"paragraph","text":"一些报纸在发出反埃及的言论的时候，企图使人相信，似乎埃及收回苏彝士运河是不符合国际法准则的。还有些报纸企图围绕苏彝士运河问题制造战争歇斯底里气氛，并且提出一种冒险主张：用武力“平服”埃及。但是好战的殖民主义者提出的这种计划遭到了英国头脑清醒的政治家和社会名流的谴责。前国防部长、工党人士辛威尔在贝尔格姆郡的一次会议上讲话说：“无论发生了什么事，我们也不要卷入新战争”。"},{"type":"paragraph","text":"出版几百万份的、通常很好地考虑中等阶层英国人的意见的“人民报”七月二十九日的社论说：“好战的话加深战争的危险。……说这种话是不智的。在这种冲突中第一个埃及士兵的死亡就会燃起整个中东的大火。大家就会公正地指责我们，说我们为了帝国主义的事业而挑起战争。”"},{"type":"paragraph","text":"“星期日泰晤士报”指出：“武装干涉是不正确的、也是不必要的办法。”可是，这家报纸又和其他一些右翼报纸一样，鼓吹对埃及施行经济和财政上的压力。"},{"type":"paragraph","text":"据新华社30日讯　华盛顿消息：埃及把苏彝士运河收归国有的决定引起美国报界的广泛反应。"},{"type":"paragraph","text":"七月二十八日的“华盛顿邮报发表社论说：西方国家为了对付埃及的行动“所能够采取的手段会有什么效果是可以怀疑的，因为制裁和类似的经济措施可能会使纳赛尔更加决心要刁难西方。”"},{"type":"paragraph","text":"“华盛顿邮报”承认埃及的行动是英美在帮助建设阿斯旺水坝问题上玩弄阴谋手段所促成的。"},{"type":"paragraph","text":"许多纽约报纸用非常放肆和侮辱性的语调来评论埃及的行动。"},{"type":"paragraph","text":"“纽约时报”在七月二十八日的社论中蛮横地要求用“经济和法律”压力来对付埃及，但是它同时承认这件事是不能用武力解决的。在“纽约先驱论坛报”驻伦敦记者的报道中，提出了用美国棉花在世界市场上倾销的办法来威胁埃及。"},{"type":"paragraph","text":"据新华社30日讯　塔斯社巴黎二十九日讯：法国右翼报纸以十分愤怒的语调评论埃及政府把苏彝士运河公司收归国有的决定。“震旦报”、“回声报”和其他一些资产阶级报纸竭力把这一决定说成是“非法行为”，是“向西方的挑战”，并且要求西方政府用种种办法来对埃及施加压力。"},{"type":"paragraph","text":"可是，“费加罗报”承认，一些右翼报纸说埃及的决定好像是“威胁着和平”，这是没有根据的。“费加罗报”警告不要冒险地在苏彝士运河区使用武力。这家报纸指出，这样做就会引起阿拉伯国家的坚决反抗，“亚洲的舆论就会一致反对西方”。"},{"type":"paragraph","text":"其他一些报纸的评论中也指出，西方某些政界人士企图恐吓埃及，这是一定要失败的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48e3d3dc63"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
