rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“怕”和“敢”","authors":["驻西安交通大学工人/解放军毛泽东思想宣传队军向阳"],"parts":[{"type":"paragraph","text":"在落实毛主席的各项无产阶级政策中，有的人“怕”字当头：怕别人说自己右倾，怕否定自己的斗争成绩，怕打击报复，怕沾包等等。总之，有着无穷的忧虑。"},{"type":"paragraph","text":"为什么怕？根子还在一个“私”字上。怕这怕那，无非是怕对自己不利。首先想到的不是革命的利益，而是个人的利益。用毛泽东思想挂帅，一切从革命利益出发，就无所畏惧，种种的“怕”字都会一扫光。"},{"type":"paragraph","text":"可见，在落实政策中必须不断地斗私。大破“私”字，大立“公”字，对伟大领袖毛主席心怀一个“忠”字，“怕”字就会换成“敢”字，就能坚决地、不折不扣地全面落实毛主席的各项无产阶级政策。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f72cd6a1c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
