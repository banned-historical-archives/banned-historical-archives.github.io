ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1942年3月11日）"},{"type":"paragraph","text":"我党现有八十万党员，五十万军队，但党报是弄得不好的。我们自去年八月起已开始改造党的工作，但党报尚未实现彻底的改造。今年中央要抓住党校、党报、中宣部这三个重要部门的工作。党报是集体的宣传者与组织者，对党内党外影响极大，是最尖锐的武器。要达到改造党的目的，必须首先改造党报的工作。报社的同志要了解经过党报来改造党的方针，现在报社的同志没有了解这个方针。报纸必须地方化，要反映地方情形。党报要反映群众，执行党的政策。党性是一种科学，是阶级性的彻底表现，是代表党的利益的，无论什么消息都要想想是否对党有利益。党报要允许同情者作善意的批评。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上讨论秦邦宪提出的改造《解放"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":3,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":475,"page_end":475},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"559b7caafa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
