" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji3","name":"毛泽东全集第3卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"全国农协执委就职通电","alias":"","parts":[{"type":"paragraph","text":"全国农协执委就职通电"},{"type":"paragraph","text":"（1927年4月9日）武汉中央党部、国民政府、全国总工会、各省省党部、省政府、全省农民协会、全省总工会、全省商民协会、全省学生联合会、全省教职员联合会、国民革命将士、各报馆公鉴："},{"type":"paragraph","text":"全国农民运动之发展，已有一日千里之势。现在成立省农民协会者，已有五省，成立省农协筹备处者，已有十余省，全国有组织之农民，已在一千万以上，急须有一全国之中心组织，以统一全国农民之战线。三月三十日，粤湘鄂赣等省农民协会代表，及河南武装农民自卫军代表，在武昌举行联席会议，推举邓演达、毛泽东、潭延间、谭平山、徐谦、孙科、唐生智、张发奎、彭湃、易礼容、陆沉、萧入鸽、方志敏等十三人，为临时执行委员，组织中华全国农民协会临时执行委员会，就职视事，并推定邓演达为宣传部长，毛泽东为组织部长，彭湃为秘书长。吾国农民之痛苦，皆为国际帝国主义之侵略，与国内封建阶级之压迫，农民之解放，即国民革命之成功，故国民革命势力之进展农民亦随之组织起来，同人深此为信不易之道，誓立于革命的地位，领导全国农民，努力奋斗，以完成国民革命。与一切帝国主义者及封建阶级作最后之斗争，谨此电闻诸希教正。"},{"type":"paragraph","text":"中华全国农民协会临时执行委员会青印之除民·D有一日千里2费吾国展民之热苦·雪德阁翔推气0等"},{"type":"paragraph","text":"名教的风装·公服服福4年一会宾袋"},{"type":"paragraph","text":"潮中山常搁·国汉府。"},{"type":"paragraph","text":"111211142都区定行"},{"type":"paragraph","text":"行酬席合缘爱以自街"},{"type":"paragraph","text":"全国晨协教委就职通电"},{"type":"paragraph","text":"心场合代为"},{"type":"paragraph","text":"中一三人·窝露些教行委"},{"type":"paragraph","text":"等下会，名省我"},{"type":"paragraph","text":"华全圆泰民协会露一三人·窝露些教行委是，彭游鹤映富是寳伟部长·毛饰东为信就爆就拳"},{"type":"paragraph","text":"学鹏合育·委省部下有（孕省商民铭"},{"type":"paragraph","text":"圆民第命察十代我，杯农"},{"type":"paragraph","text":"正推"},{"type":"paragraph","text":"服眼民聚毛器"},{"type":"paragraph","text":"足河黑缘"},{"type":"paragraph","text":"办际"},{"type":"paragraph","text":"城"},{"type":"paragraph","text":"登时桃行委员售询印教"},{"type":"paragraph","text":"不易之之翔线民车"},{"type":"paragraph","text":"+口有五省。切"},{"type":"paragraph","text":"1.绿维之慈民惠口有五省。正·中华全国愿民校德之门手"},{"type":"paragraph","text":"Si"},{"type":"paragraph","text":"我，口有十馀客="},{"type":"paragraph","text":"国·以税一全闵民之，象须有O"},{"type":"paragraph","text":"国土装光及洪以"},{"type":"paragraph","text":"国之胃江，完霞消务"},{
