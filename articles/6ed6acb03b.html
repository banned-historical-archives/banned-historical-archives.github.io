],"dates":[{"year":1951,"month":11,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太原私营大方工程公司"},{"type":"paragraph","text":"把头严重地剥削工人工人要求迅速处理"},{"type":"paragraph","text":"编辑同志：我们都是建筑工人，最近由南京来到太原私营大方工程公司万柏林工地做工。该公司还存在着严重的封建把头剥削工人的现象，而资方却置之不闻。比如大方工程公司包给封建把头庄德华的砖墙工程，单价是二十砖墙为三十万元，十五砖墙为十六万元，十砖墙为十二万元；但庄德华包给我们，单价就成了二十砖墙十五万元，十五砖墙八万元，十砖墙六万元，获非法利润竟达一倍。又如在来往搬运中，劳资双方曾说明五十步以内归工人，五十步以外归庄德华，但现在我们搬运已远至一百五十步至二百步了。我们来的时候，订的合同是做一百天的工作，可是，现在还不到三个月，就没有工作了。我们希望有关部门迅速处理此事。"},{"type":"paragraph","text":"建筑工人  张盛旺、霍培宽等"},{"type":"paragraph","text":"（代笔人  成    名、长    安）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ed6acb03b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
