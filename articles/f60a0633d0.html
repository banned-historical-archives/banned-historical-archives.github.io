tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广东数百万贫下中农组成毛泽东思想宣传队","authors":[],"parts":[{"type":"paragraph","text":"据新华社广州九日电 广东省农村由数百万贫下中农组成的毛泽东思想宣传队构成的宣传网，在宣传贯彻党的八届扩大的十二中全会公报中，发挥了巨大的作用，受到了广大贫下中农和革命群众的热烈赞扬。"},{"type":"paragraph","text":"在党的八届扩大的十二中全会公报发表的当天晚上，广东全省农村从海南岛到潮汕平原，从珠江三角洲到南岭山麓，八个专区、行政区都出动了十几万到几十万由贫下中农组成的毛泽东思想宣传队，迅速展开宣传活动。这些宣传大军，有的举着火把，有的踏着月色赶路，把公报送到各个地方，送到最偏僻、交通最不方便的生产队和村庄。惠阳县潼湖公社新光大队新溪生产队的一些老贫农，在十一月一日晚听了宣传队对公报的宣传，十分感动地对宣传队说：“过去，叛徒、内奸、工贼刘少奇及其代理人对我们贫下中农封锁毛主席的声音，真是罪该万死！今晚你们不辞劳苦，星夜赶了十多里路，很快就把毛主席的声音传给我们，这是毛主席革命路线的伟大胜利，是我们贫下中农的最大幸福。”"},{"type":"paragraph","text":"由于贫下中农毛泽东思想宣传队连日来广泛深入地展开宣传活动，党的八届十二中全会公报已在广东农村家喻户晓。广大贫下中农和革命群众怀着无限忠于毛主席、无限忠于毛泽东思想、无限忠于毛主席革命路线的深厚无产阶级感情，正以实际行动全面落实全会提出的各项战斗任务，他们以前所未有的规模，兴起了革命大批判和斗、批、改的新高潮。全省农村革命大批判正在如火如荼地展开。新会县的贫下中农人人口诛笔伐叛徒、内奸、工贼刘少奇，全县新办起了四千七百多个革命大批判专栏。目前，广东农村即将进入晚稻收获季节，广大贫下中农决心把搞好晚稻收获、多卖余粮作为落实公报的一项具体行动。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f60a0633d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
