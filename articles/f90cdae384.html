art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"世界革命的带路人就是毛泽东","authors":[],"parts":[{"type":"paragraph","text":"据新华社阿尔及尔九日电 最近应邀访问中国和参加“五一”观礼归来的阿尔及利亚工人总联合会代表团团长梅贾海尔·阿卜代尔卡达尔五日在这里接见新华社记者时说：“我们认为，毛泽东是伟大的政治家。世界革命应该有带路人，而这个带路人现在就是毛泽东，因为他的著作、他的理论不仅符合中国革命的实际，而且也符合世界无产阶级革命的实际。”"},{"type":"paragraph","text":"阿卜代尔卡达尔说，毛主席提出的农村包围城市的理论是具有特别重要意义的。这个带根本性的理论不仅当时符合中国革命的实际，而且现在也符合世界革命的实际，因为今天从世界范围来说，大城市就是美国，而广大农村就是革命的亚洲、非洲和拉丁美洲。"},{"type":"paragraph","text":"他热烈赞扬中国人民和工人阶级在毛主席领导下执行的正确的社会主义建设方针和在工农业等各方面所取得的伟大成就。他说，“中国所实行的是真正的马克思列宁主义的路线。”他又说，中国之所以能够在这么短的时间内取得了这么伟大的成就，是因为中国有伟大的政治领袖和伟大的战略家毛泽东。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f90cdae384"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
