tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广泛开展“三大讲” 深入揭批“四人帮”","authors":["穆奎元/王纯忠/姚国安"],"parts":[{"type":"paragraph","text":"本报讯 山东省禹城县人民武装部在深入揭批“四人帮”的第三战役中，学习大庆和石化部的经验，放手发动群众，紧密联系本单位实际，广泛开展“三大讲”活动，把学习和批判推向新的高潮。"},{"type":"paragraph","text":"最近，这个武装部在揭批“四人帮”的第三战役中，学习大庆和石化部的经验，领导带头，发动干部战士职工人人动口，联系本单位和个人的实际，大讲在“四人帮”横行时，党受其害，国受其害，军受其害，本部受其害，个人受其害的深仇大恨；大讲英明领袖华主席继承毛主席遗志，一举粉碎“四人帮”的丰功伟绩；大讲同“四人帮”斗争的经历和在十一次路线斗争中的经验教训。贫农家庭出身的参谋刘进福，曾经因为抵制“四人帮”的反革命政治纲领，被扣上“走资派的亲信”的大帽子。当他讲到英明领袖华主席继承毛主席遗志，除掉“四害”，挽救了党，挽救了革命，也挽救了他个人时，含着热泪说：“没有毛主席就没有我们贫下中农的翻身解放，没有华主席我们就得重吃二遍苦，受二茬罪。”有个一九四六年参加革命，解放前逃过荒要过饭的干部，曾受“四人帮”的毒害，跟着说过错话，办过错事。他讲述自己做了一些亲者痛、仇者快的事，感到非常痛心。他表示一定要认真总结经验教训，积极投入揭批“四人帮”的战斗。大家越讲，对毛主席革命路线越亲，对华主席越热爱，对“四人帮”越仇恨。"},{"type":"paragraph","text":"通过“三大讲”，干部战士摆出了“四人帮”的主要流毒和影响，看到了“四人帮”对军队建设的严重危害。武装部党委把受“四人帮”毒害的表现一条条列出来，抓住危害最大的问题，组织大家进行剖析，论危害，挖根源，进一步分清路线是非，总结经验教训。一些受“四人帮”影响犯了错误的同志，深挖了犯错误的思想根源。他们共同找出的原因，一是学习差，不能完整地准确地领会和掌握毛泽东思想的体系。二是私心重，世界观没有得到彻底改通。大家吸取教训，学习马列、毛主席著作的空气更浓了。"},{"type":"paragraph","text":"“三大讲”以后，这个武装部增强了革命团结。大家把千仇万恨集中在“四人帮”身上，消除了隔阂，解开了疙瘩。上级和下级、干部和战士在政治上互相关心，生活上互相照顾，工作上互相支持，共同为抓纲治国、抓纲治军作贡献。"},{"type":"paragraph","text":"（穆奎元、王纯忠、姚国安）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c65f8f9e79"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
