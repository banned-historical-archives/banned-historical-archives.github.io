<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级是怎样进攻我们学校的?","authors":["尤苏"],"dates":[{"year":1952,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革大外专　尤苏"},{"type":"paragraph","text":"目前有些人仍以为在学校里是没有什么可反的，这种想法完全不合事实，毫无根据。而且，这样的麻痹思想的存在，将会影响我们思想改造运动的开展。由于我们学校里的三反运动与政府机关同时开展，所以比一般学校要进行得早些，通过各种事实，我们痛切地认识到资产阶级对我们的疯狂进攻，竟至连学校也没有例外，目前我们学校已经查出的大小老虎有将近卅个之多，事实俱在，这样严重的问题，难道还不值得我们引起高度警惕吗?"},{"type":"paragraph","text":"我们校里的同学在党团教育下，基本上多建立了全心全意为人民服务的革命人生观，这是必须肯定的事实。然而也有个别同学，不愿虚心学习，改造自己，以至“身披革命外衣，内藏资产阶级灵魂”，迷恋于资产阶级堕落腐化的生活方式，包干制发的钱不够化，于是动起坏脑筋来，如王寿柏同学为了请女同学客，表示阔气，曾一再无耻窃取同学的衣物变卖，还留恋着资产阶级阿飞式的恋爱方式，直到事发后才受到教育，纠正过来。我们学校里一个小小的合作社，可是在里面工作的同学就有不少人贪过污，只赵承先一人的初步坦白，就已承认了好几十万，一个革命学校的学生在这样一个小小的合作社里为大众服务，就犯了这样严重的错误，要是不通过三反，改造自己，那么将来这种坏习惯作风带到工作岗位上去，就有毁灭自己的危险!"},{"type":"paragraph","text":"这次我校三反运动中，问题最严重的像高级班的张韶，不愿肃清资产阶级家庭给他的恶劣影响，并任其在思想上蔓延滋长，只求腐化享乐，不愿安心过包干制的学习生活，想尽各种方法用最卑劣的手段来提高自己的生活水准，因此在工作中一贯贪污，最后甚至把朱熙同学捐给我们最可爱的人的军用无线电收音机也加以盗卖，把脏款供自己的挥霍，他这种恶劣的思想行为竟发展到这样的地步；而且据他自己坦白，曾经要想开小差逃往香港，向往能过一种海盗式生活，证明资产阶级腐化思想的侵蚀，最后就可能使人掉入反革命的泥坑!可怕不可怕!现在张韶已经坦白出来，我们也正在继续对他大力抢救，要是我们不经三反，不经改造，让一切坏思想潜伏蕴藏着不加揭露，不加开力，任其蔓延滋长又是多么危险，多么值得我们引起注意，提高警惕啊!我们必须在这个伟大的运动中勇敢积极地参加斗争，改造自己，我们应该在这个运动中更清楚地看到在中国共产党领导下我们广大青年无限美好的未来，把资产阶级的进攻坚决压下去，划清思想界线，使自己得到改造，得到教育，成为新民主主义社会积极的参加者和建设者，为争取我们社会主义灿烂的明天而斗争!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0102c2c6b1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
