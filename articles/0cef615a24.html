al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致彭德怀并转林彪电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀并转林彪电！"},{"type":"paragraph","text":"（1935年12月21日）"},{"type":"paragraph","text":"在日本进占华北的形势下，陕南游击战争不能把它提到比陕北等处的游击战争更加重要的地位，实际上后者是更重要的。尤其不能把游击战争提到似乎比主力红军还重要的地位（如提出红军主要干部去做游击战争），这样的提法是不妥当的。林在某些问题上的观点是同我们有些分歧的，中央认为有当面说明之必要。现在前方军事不紧张，因此仍望林来中央一行，并在此一个时期，这于林是有好处的。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）致彭德怀并转林彪电的主要内容。据《聂荣臻回忆录》载：“中央政治局召开瓦窑堡会议以前，曾征求军团领导干部对战略问题的意见。林彪在信中就正式向中央提出，要到陕南去打游击，说这比在陕北巩固和扩大根据地更重要，而且要求把红军主要干部调出，由"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":117,"page_end":117},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cef615a24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
