ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"在驻罗马尼亚使馆关于与西方国家使节来往问题的报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在驻罗马尼亚使馆关于与西方国家使节来往问题的报告\"上的批语"},{"type":"paragraph","text":"（1959年10月）值得一看，看后想一想。"},{"type":"paragraph","text":"刘、周、朱、林、彭真、陈毅、稼祥、乔木、定一、康生、伯达同志阅，阅后退毛。"},{"type":"paragraph","text":"[1]指中国驻罗马尼亚大使馆1959年10月9日关于兄弟国家使节与西方国家使节来往问题给外交部的报告。报告说，近来某些兄弟国家驻罗使节对与西方国家使节来往兴趣很大，强调要扩大同西方国家的接触。他们认为加强同西方国家使节的联系，有助于和平共处和改善东西方的关系。为此，他们分工合作，一方面对我们及其他兄弟国家使节进行工作，另一方面计划通过一定的形式，扩大同西方国家驻罗使节的接触。对此，我们已表明，和平共处不能完全抛开斗争，适当的接触是可以的，但不能抱过大的希望。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。朱，指朱德。林，指林彪，当时任中共中央副主席、国务院副总理。彭真，当时任中共中央政治局委员、中央书记处书记。陈毅，当时任中共中央政治局委员、国务院副总理兼外交部部长。稼祥，即王稼祥，当时任中共中央书记处书记、中央对外联络部部长。乔木，即胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。定一，即陆定一，当时任中共中央政治局候补委员、中央文教小组组长、中央宣传部部长、国务院副总理。康生，当时任中共中央政治局候补委员、中央文教小组副组长。伯达，即陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":472,"page_end":472},"tags":[{"name":"康生","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f3809a73a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
