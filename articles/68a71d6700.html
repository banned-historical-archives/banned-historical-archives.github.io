集团认识模糊","authors":["朱成"],"dates":[{"year":1955,"month":6,"day":13}],"is_range_date":false,"parts":[{"text":"热河省直属机关部分干部对胡风反革命集团认识模糊","type":"title"},{"text":"朱成","type":"authors"},{"text":"【热河分社十三日讯】热河省省直各部门有三十七个单位，在九、十两日负责干部向全体人员作了关于胡风反革命集团的传达报告，传达后讨论的情况表明：绝大多数人都能比较正确地认识胡风问题。但也有一些不正确的认识，如有的人提出这样的问题：“胡风问题和国家工业化有啥关系呀！何必整他！”并认为：“一个赤手空拳的文人，不会有啥作用！”","type":"paragraph"},{"text":"有的人对胡风表示惋惜，说：这样大的干部、作家，弄到这个程度真可惜！建工局有人说，国民党统治时期，清华大学有的教授骂蒋介石，蒋没有整他，胡风说我们不好，我们怎么就整他呢?言外之意，说我们“度量小”。","type":"paragraph"},{"text":"有人问：胡风反革命集团分子彭柏山、刘雪苇和饶漱石有无联系应该追查。","type":"paragraph"},{"text":"此外，有问题的人，在听了传达报告后，表现恐慌不安，有的行动失常。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年6月20日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68a71d6700"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
