authors":[],"dates":[{"year":1970,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央关于内部刊物扩大订阅范围的通知（概要）","type":"title"},{"text":"1970年7月5日，中共中央关于内部刊物扩大订阅范围的通知。通知决定：对新华社出版的内部刊物《参考资料》、《国际共运参考资料》、《参考消息》，从8月1日起扩大订阅范围。《参考资料》和《国际共运参考资料》扩大发行到省、军级；《参考消息》扩大发行到工矿企业车间和农村生产大队、解放军连队的党支部。12月6日，中共中央为进一步明确以上3份刊物的订阅范围，再次发出通知，建议凡中央委员、候补中央委员，省革委会委员及军级党委委员等均可订阅《参考资料》、《国际共运参考资料》、《参考消息》的订阅范围也相应作了调整。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"704471dfde"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
