dates":[{"year":1951,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"严肃处理封建把头剥削工人事件！编辑同志："},{"type":"paragraph","text":"山东省建筑工程公司所领导的第一建筑大队和第二建筑大队，封建把头剥削现象非常严重。比如第二大队长李广文任用中队长孙兆乾（系封建把头）掌握工地，使其利用职权剥削工人。今年六月工地开工后，大队部发给孙兆乾三个月（六、七、八月）工资共三亿七千多万元，让他发给工人，但孙兆乾并未全部发给工人，也未清算账目。以第四分队第一组来说，工人应得工资为七百九十七万元，孙兆乾只发给十七万余元。像这样情形是很多的。工人因为没有钱，所以吃的用的都要通过孙兆乾的手，于是孙又利用这点，将面、油等转卖给工人。进行剥削。工地将完工时，工人非但得不到应得的工资，反而欠了孙兆乾钱。孙兆乾对于工人的安全也是毫不注意的，如有一次某工人因公受伤，孙竟说：“死了我不负责任。”为了纠正这种错误，现该公司决定整理两个大队的组织和举办工人福利。公司行政和工会也作了批评与检讨，并正根据工人要求，分别处理第二大队长李广文和封建把头孙兆乾等。"},{"type":"paragraph","text":"牟龙海  赵怀章"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李广文","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fae7313f15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
