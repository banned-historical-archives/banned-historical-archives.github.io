tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"巴卢库同志等在上海观看舞剧《白毛女》张春桥、张才千同志陪同观看演出","authors":[],"parts":[{"type":"paragraph","text":"新华社上海一九七二年十一月二十四日电 贝·巴卢库同志和阿尔巴尼亚人民共和国军事友好代表团其他成员，今天晚上出席文艺晚会，观看了上海市舞蹈学校演出的革命现代舞剧《白毛女》。"},{"type":"paragraph","text":"陪同观看演出的有张春桥同志和上海市革命委员会、中国人民解放军驻上海部队负责同志周纯麟、王秀珍、刘耀宗、冯国柱、武占魁、申元军、孙林瑞、杨新亚、章尘等，以及陪同代表团访问的张才千、朱开印同志。"},{"type":"paragraph","text":"演出结束后，在《真正的朋友》的乐曲声中，巴卢库同志等阿尔巴尼亚战友，由张春桥、张才千同志等陪同走上舞台，同演员们亲切握手，并赠送了花篮。"},{"type":"paragraph","text":"今天上午，恰科和佩尔拉库等阿尔巴尼亚同志，在周纯麟、刘耀宗同志陪同下，参观了上海县七一人民公社，受到社员们的热烈欢迎。远方来的战友们观看了公社的农具厂、畜牧场和打谷场，他们赞扬公社社员在中国共产党的领导下取得的成就。社员们热烈欢呼：“恩维尔·霍查同志万岁！”“毛主席万岁！”"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c5cde7ccc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
