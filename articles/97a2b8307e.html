ates":[{"year":1968,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对矿主的压迫和剥削"},{"type":"paragraph","text":"西班牙八千多名矿工举行罢工"},{"type":"paragraph","text":"新华社二十四日讯　马德里消息：西班牙奥维亚多的八千多名煤矿工人二十三日举行罢工，强烈抗议矿主寻找各种借口对工人进行横蛮的压迫和剥削。"},{"type":"paragraph","text":"这次罢工浪潮是在十月份开始的。由于矿主不顾工人死活，煤矿安全设备很差，不断造成工伤事故。不久前，矿工们为一名因工伤事故牺牲的工人举行葬礼，对矿主表示抗议。矿主竟以耽误工作时间为借口，蛮横地迫害工人。矿主的罪行，激起了工人的巨大愤怒。他们掀起了抗议矿主罪行的罢工浪潮。"},{"type":"paragraph","text":"工人的罢工斗争给了矿主以沉重打击。据估计，到目前为止，罢工已使得煤产量减少三万五千吨，使矿主损失了四千二百万比塞塔（西班牙币名）。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97a2b8307e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
