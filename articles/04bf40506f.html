杨焕尧","authors":["人民日报"],"dates":[{"year":1957,"month":8,"day":9}],"is_range_date":false,"parts":[{"text":"汉阳检察、司法机关接受群众要求  逮捕汉阳事件主谋者杨焕尧","type":"title"},{"text":"人民日报","type":"authors"},{"text":"本报武汉９日电: 汉阳县一中反革命暴乱事件主谋者杨焕尧已经当地政府依法逮捕。８月７日晚上，汉阳县第一中学师生举行集会，对杨焕尧开展斗争。杨焕尧在会上曾企图抵赖他在这次暴乱事件中的主谋责任；经过学校全体师生揭发大量材料后，他不得不承认自己的罪行。参加斗争大会的群众对杨焕尧的罪行感到万分愤慨，一致要求政府将杨犯逮捕法办。当地检察、司法机关接受群众要求，当场将杨犯予以逮捕。","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月10日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04bf40506f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
