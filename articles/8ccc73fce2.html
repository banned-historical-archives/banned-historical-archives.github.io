art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"军民同批林彪资产阶级军事路线","authors":[],"parts":[{"type":"paragraph","text":"沈阳部队领导机关，最近选派一部分干部战士，到地方省、市机关、“五·七”干校、工厂、商店、学校和科研部门等单位，同地方干部和群众一起批判林彪资产阶级军事路线，既促进了批林批孔运动深入发展，也进一步密切了军民关系。沈阳变压器厂的同志说：“前几年解放军来工厂支左，和我们一起批判刘少奇的资产阶级反动路线；现在解放军又来宣讲毛主席对辽沈战役的指示，同我们一起批判林彪的资产阶级军事路线，这体现了军民永远是一个战壕里的战友，永远心连心。”（本报通讯员）"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ccc73fce2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
