" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji2","name":"毛泽东全集第2卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"赵女士的人格问题","alias":"","parts":[{"type":"paragraph","text":"赵女十的人格问题"},{"type":"paragraph","text":"（1919年11月18日）"},{"type":"paragraph","text":"前日我做了一段批评，说赵女士的死因，是由赵女士的环境所决定，即是由赵女士所处的社会及母夫两个家庭所决定。我因此要论一论赵女士的人格。"},{"type":"paragraph","text":"一个人问我：赵女士有没有人格？我说，我有两个答：一个是赵女士没人格。一个是赵女士有人格。"},{"type":"paragraph","text":"怎样说是赵女士没人格？赵女士要是有人格，便不会死。何以呢？人格这件东西，是由于对手方面的尊崇才有的。他的先决问题，是要意志自由。赵女士的意志自由么？不自由的。怎么不自由？因为赵女士有父母。在西洋，一个人的父母，和他子女的意志自由是不生影响的。西洋的家庭组织，父母承认子女有自由意志。中国则不然，父母的命令，和子女的意志完全不相并立。赵家父母明明迫着他的女儿恋爱不愿意恋爱的人，遗容有什么自由意志？你不愿恋爱我，而我迫着要恋爱你，这是一种强奸。这叫做“直接强奸”。他的女儿不愿意恋爱那人，而他逼着要他女儿恋爱那人，这也是一种强奸。这叫做“间接强奸”。中国的父母都是间接强奸自己的子女。这结论是在中国家庭制度（父权母权）婚姻制度（父母代辨\u003c办）政策）的底下应该发生的。赵女士要是有人格，必是有自由意志；要是有自由意志，必是他的父母能够尊崇他容许他。赵女士的父母能够尊崇他容许他，赵女士还会乘着那囚笼槛车似的彩轿以至于自杀其中吗？而今确有此事实，所以我的答是：（一）赵女士没有人格。"},{"type":"paragraph","text":"怎样又说他有人格呢？这是指赵女士的本身了。赵女士虽二十一年（他二十一岁）处在不容他有人格的家庭之中，他的父母虽二十一年不令他有人格，但在他二十一年最后的一瞬间，他的人格忽然现在来了。呜呼，呜呼！不自由，无宁死。雪一般的刀上面，染了怪红的鲜血。柑子园\"尘秽街中被血洒满，顿化成了庄严的天衢。赵女士的人格也随之涌现出来，顿然光焰万丈。所以我的答是：（二）赵女士有人格。"},{"type":"paragraph","text":"于是我的良心逼着我说下面两句：（一）天下类于赵女士父母的父母都要入狱。（二）愿率天【下】人齐声高呼：“赵女士万岁！”"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":114,"page_end":115},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a586274e9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
