锡联、姚连蔚等应邀出席拉纳大使和陈锡联副总理在充满中尼两国人民热烈友好气氛的招待会上先后祝酒","authors":[],"dates":[{"year":1975,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一九七五年十月二十五日电　为贾伦德拉亲王和科玛尔公主、迪伦德拉亲王和普雷克希娅公主访问中国，尼泊尔驻中国大使拉纳和夫人，今天晚上举行招待会。"},{"type":"paragraph","text":"国务院副总理邓小平、陈锡联，人大常委会副委员长姚连蔚，外交部长乔冠华、副部长韩念龙，人大常委会委员贝时璋，外贸部副部长周化民，外经部副部长陈慕华，财政部副部长王丙乾，北京市革命委员会副主任刘锡昌，国家文物事业管理局局长王冶秋，以及有关方面负责人，应邀出席了招待会。"},{"type":"paragraph","text":"随两位亲王访问的尼泊尔外交大臣阿里亚尔等尼泊尔贵宾出席了招待会。"},{"type":"paragraph","text":"拉纳大使首先在招待会上祝酒。他说，这次两亲王和两公主对伟大友好邻邦中国进行的访问，使他们有机会同老朋友重叙友谊，并同中国领导人卓有成效地交换了意见，这种交换意见使我们两国进一步加深了友谊。他说，中国对两亲王和两公主所表达的友好感情和给予他们的亲切接待，显示了现存于我们两国之间的十分友好的睦邻关系。两亲王和两公主殿下对此表示极其高兴和满意。"},{"type":"paragraph","text":"大使说，明天，两亲王等一行将离开北京赴外地参观访问。他们毫不怀疑外地的参观访问将使他们进一步看到中国在毛主席领导下所取得的进展。他提议为尼中两国人民永恒的友谊干杯。"},{"type":"paragraph","text":"陈锡联副总理在招待会上祝酒时说，几天来，我们双方就进一步发展中尼两国的友好合作关系进行了诚挚友好的会谈，再次共叙中尼两国人民的深厚友谊。我们两国之间多年来的交往充分证明，我们的友谊是建立在牢固的基础之上的，有着广阔的发展前途。明天，贵宾们即将去我国南方访问。我相信，你们的访问，必将为进一步加深我们之间的了解、增进我们之间的友谊作出新的贡献。"},{"type":"paragraph","text":"陈锡联副总理祝贵宾们旅途愉快，访问成功，并请他们回国后向尼泊尔人民转"},{"type":"paragraph","text":"达中国人民的最良好祝愿和最亲切的问候。"},{"type":"paragraph","text":"招待会自始至终充满了中尼两国人民热烈友好的气氛。"},{"type":"paragraph","text":"新华社北京一九七五年十月二十五日电　尼泊尔王国贾伦德拉亲王和科玛尔公主、迪伦德拉亲王和普雷克希娅公主以及外交大臣阿里亚尔等，今天下午由国务院副总理陈锡联陪同，参观了北京积水潭医院，受到了医务工作者们的热烈欢迎。"},{"type":"paragraph","text":"贵宾们参观了医院的病房、针灸科，了解了中西医结合治疗骨折的情况，观看了断臂再植的电视纪录片。"},{"type":"paragraph","text":"今天下午，贵宾们还由陈锡联副总理等陪同，游览了风景秀丽的颐和园。"},{"type":"paragraph","text":"今天上午，尼泊尔贵宾们由人大常委会委员贝时璋、国家文物事业管理局局长王冶秋陪同，参观了故宫博物院。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c25fa4917c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
