script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴特寮通讯社揭露万象极右派严重违反协定  奔·西巴色团长同富马亲王举行会谈","authors":[],"dates":[{"year":1974,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴特寮通讯社揭露万象极右派严重违反协定"},{"type":"paragraph","text":"奔·西巴色团长同富马亲王举行会谈"},{"type":"paragraph","text":"新华社一九七四年二月十三日讯　巴特寮通讯社最近揭露老挝万象极右派，在从一月二十一日至二月十日的三周内制造违反万象协定及其议定书的事件达四百二十四起。"},{"type":"paragraph","text":"在此期间，万象极右派出动飞机对各爱国力量控制的解放区进行了四百一十三架次非法的空中侦察飞行，其中包括对九号公路地段的侦察飞行一百八十五架次，对下寮地区的侦察飞行一百五十六架次。万象极右分子还七次向琅勃拉邦和沙湾拿吉等省的解放区偷偷运进别动队和侦探，进行破坏活动。他们在加紧进行破坏活动的同时，还派遣两个机动营，对解放区的一些村庄发动蚕食进攻。特别是二月八日，极右分子曾两次唆使恶棍向各爱国力量代表团在万象的驻地进行射击。"},{"type":"paragraph","text":"巴特寮通讯社指出，上述这些违反协定的事件是在老挝双方刚刚签署有关在万象和琅勃拉邦市双方警卫部队、联合警察和行政权力的一些规定的文件时发生的。这是万象极右派企图破坏老挝和平和民族和睦的丑恶阴谋，即首先企图阻挠万象和琅勃拉邦两城市实现中立化，阻挠民族联合政府和民族政治联合委员会的成立。"},{"type":"paragraph","text":"新华社一九七四年二月十二日讯　据巴特寮电台二月十一日广播，老挝各爱国力量代表团团长、苏发努冯亲王的特别代表奔·西巴色，十一日上午继续与富马亲王会谈关于成立临时民族联合政府和民族政治联合委员会的问题。"},{"type":"paragraph","text":"这次会谈进行了一个小时。"},{"type":"paragraph","text":"在此之前，奔·西巴色团长曾于二月十日上午拜会了富马亲王，向富马亲王递交了苏发努冯亲王的信件，并就成立临时民族联合政府和民族政治联合委员会的事宜同富马亲王交换了意见。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6821f6307"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
