tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席会见施密特总理和夫人等贵宾毛主席同施密特总理、库特·克沙伊德勒部长、保尔斯大使、卡尔·维尔纳 赞纳司长在友好的气氛中进行了范围广泛的谈话。邓小平副总理等在座","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年十月三十日讯 毛泽东主席今天下午会见了德意志联邦共和国总理赫尔穆特·施密特和夫人汉内洛蕾·施密特，以及随同访华的其他正式成员。"},{"type":"paragraph","text":"参加会见的施密特总理的访华正式成员是：德意志联邦共和国交通、邮电部部长库特·克沙伊德勒，外交部国务部长卡尔·默尔施，总理府议会国务秘书玛丽·施莱夫人，国务秘书、联邦新闻局局长克劳斯·伯林，德意志联邦共和国驻中国大使保尔斯和夫人，总理府政治司司长卡尔·维尔纳·赞纳。"},{"type":"paragraph","text":"会见时，毛主席对施密特总理前来我国进行正式访问，表示欢迎。毛主席同德意志联邦共和国贵宾一一握手后，同施密特总理、库特·克沙伊德勒部长、保尔斯大使、卡尔·维尔纳·赞纳司长，在友好的气氛中进行了范围广泛的谈话。"},{"type":"paragraph","text":"会见时在座的有邓小平副总理，王海容副部长，王殊大使，唐闻生、徐维勤副司长。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7016f44fdc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
