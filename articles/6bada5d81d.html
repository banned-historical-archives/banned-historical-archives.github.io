ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"关于派工人随同军管人员进驻军队院校的批语","alias":"","parts":[{"type":"paragraph","text":"关于派工人随同军管人员"},{"type":"paragraph","text":"进驻军队院校的批语！"},{"type":"paragraph","text":"（1968年8月）"},{"type":"paragraph","text":"如工人条件成熟，所有军事院校均应派工人随同军管人员进去。打破知识分子独霸的一统天下。"},{"type":"paragraph","text":"[1]这个批语写在中共中央军委办事组1968年8月20日建议对部分军事院校实行军管的报告上。报告建议，对目前还“没有成立革委会，没有实行革命的大联合，长期打·内战”，存有不少严重问题”的53所军队院校实行军事管制。军管除派领导干部及一般干部参加外，拟从部队抽调一批学习毛主席著作积极分子和部分五好战士参加，组织强大的毛泽东思想宣传队进入学校。1968年9月2日，中央军委、中央文革发出《关于工人进军事院校及尚未联合起来的军事院校实行军管的通知》，并在通知中引用了毛泽东的这个批语。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":287,"page_end":287},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bada5d81d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
