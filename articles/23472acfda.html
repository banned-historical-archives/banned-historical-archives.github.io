script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"出席亚非作家紧急会议的印尼作家代表团长电阿联作协秘书长  谴责现代修正主义者策划召开分裂会议","authors":[],"dates":[{"year":1966,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"出席亚非作家紧急会议的印尼作家代表团长电阿联作协秘书长"},{"type":"paragraph","text":"谴责现代修正主义者策划召开分裂会议"},{"type":"paragraph","text":"新华社十七日讯　出席在北京举行的亚非作家常设局会议和即将召开的亚非作家紧急会议的印度尼西亚作家代表团团长阿甘姆·维斯比，十七日打电报给阿联作家协会秘书长优素福·西巴伊，强烈谴责现代修正主义者策划的预定六月十九日在开罗非法召开的分裂会议。电报全文如下："},{"type":"paragraph","text":"印度尼西亚进步作家强烈谴责在作家协商的幌子下据说定于六月十九日在开罗举行的非法的分裂会议。"},{"type":"paragraph","text":"亚非人民革命事业的叛徒现代修正主义者一直是美帝国主义破坏亚洲、非洲、拉丁美洲和全世界人民革命的帮凶，他们无疑是这次开罗分裂会议的幕后策划人。"},{"type":"paragraph","text":"这一行动就是破坏越南人民的英勇斗争。"},{"type":"paragraph","text":"我们强烈谴责邀请纳苏蒂安和苏哈托法西斯军事政权的代表的做法，纳苏蒂安和苏哈托的双手沾满了印度尼西亚爱国者的鲜血，阿联代表团曾经同三大洲会议和在北京召开的亚非新闻工作者协会书记处会议的参加者一道谴责了纳苏蒂安和苏哈托。"},{"type":"paragraph","text":"开罗会议显然是为了破坏亚非作家和人民的团结，因为这次会议恰恰是在科伦坡的亚非作家常设局决定在六月二十七日在北京举行亚非作家支持越南人民斗争紧急会议，以及常设局最近在北京举行关于这次紧急会议的筹备会议以后策划的。"},{"type":"paragraph","text":"亚非作家和人民的斗争历史，特别是越南人民的斗争历史，将把这种卑鄙的分裂和破坏活动作为对他们的革命事业的公开背叛记载下来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23472acfda"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
