邀请将访问印度尼西亚","authors":[],"dates":[{"year":1956,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京14日电】　印度尼西亚总统苏加诺即将结束他在中国的访问并将于10月15日首途回国。在苏加诺总统和他的随行人员离开中国之前，双方发表联合新闻公报如后:"},{"type":"paragraph","text":"联合新闻公报"},{"type":"paragraph","text":"应中华人民共和国毛泽东主席的邀请，印度尼西亚共和国苏加诺总统自1956年9月30日至10月14日正式访问了中华人民共和国。"},{"type":"paragraph","text":"陪同苏加诺总统访问的，有:外交部长鲁斯兰·阿卜杜加尼；印度尼西亚国会第一副议长蔡努尔·阿里芬；第二副议长阿鲁季·卡塔威纳塔；国会议员苏基曼博士、来梅纳博士和苏塔托·哈迪苏迪比约，以及印度尼西亚政府民政和军事的高级官员。随行人员中也包括一些印度尼西亚的新闻记者。"},{"type":"paragraph","text":"在他们逗留北京的期间，苏加诺总统和外交部长鲁斯兰·阿卜杜加尼，同随行人员中的其他印度尼西亚领导人员一起，同毛泽东主席进行了几次会谈，周恩来总理和中华人民共和国的其他领导人员也参加了这些会谈。"},{"type":"paragraph","text":"会谈是在热诚、谅解和互相尊重的气氛下举行的，涉及了各种国际问题和两国间目前的关系。他们是在亚非会议的精神和原则的指导下讨论这些问题的。这种精神和原则曾经在阿里·沙斯特罗阿米佐约总理和周恩来总理于1955年发表的联合声明中加以重申。"},{"type":"paragraph","text":"双方讨论的事项中包括中华人民共和国在联合国的代表权问题、西伊里安问题和进一步支持埃及政府用和平方法并且在完全尊重埃及的主权和尊严的情况下解决苏伊士运河问题。"},{"type":"paragraph","text":"他们也讨论了扩大印度尼西亚共和国和中华人民共和国之间的贸易关系，并且表示希望最近即将在北京举行的贸易谈判能在平等互利的基础上为两国获得满意的结果。"},{"type":"paragraph","text":"最后，苏加诺总统邀请毛泽东主席在他方便的时候访问印度尼西亚。毛泽东主席接受了这一邀请，他的访问日期将在以后决定。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb8fec8316"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
