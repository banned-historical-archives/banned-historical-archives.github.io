script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"洗清资产阶级对我的恶劣影响","authors":["周杏琪"],"dates":[{"year":1952,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海女中学生　周杏琪"},{"type":"paragraph","text":"今年一月间我曾经检举了两个贪污分子——我的舅父和表兄，当时我为什么能站稳立场，不顾父母和亲戚的阻挠，坚决提出检举呢?今天回想起来，主要是由于认为自己是一个青年团员，团章上明白规定着一个青年团员应当和一切损害人民和国家利益的行为作坚决斗争，所以我既发现了贪污分子，就不能放过他们，当时我的认识也仅到此为止，没有体会到这种贪污浪费现象，同时是资产阶级向人民政府进行猖狂进攻的结果。"},{"type":"paragraph","text":"三反、五反运动发展到今天，使我受到了更深刻的阶级教育，我重新检查了自己的历史，发觉家庭和资产阶级教育对我的恶劣影响，同时更认识了资产阶级的丑恶本质，我的父亲过去表面看来似乎很“进步”，但自从我检举了舅父和表兄的贪污行为之后，他对我的态度显然起了变化，他常对我说:“我过去辛苦做事，无非为了想赚些钱来培植你们，可是现在我灰了心，你们将来读好书还不是去当供给制干部?我对你们又有什么指望?”从这里就可看出我的父亲是把养儿育女看成一桩买卖的，他看到我将来要去为人民服务，不能为他“服务”，他就灰心丧气起来。"},{"type":"paragraph","text":"最近我听了许多次报告，尤其看到许云影、马六珂、张爱华等动人事例后，使我深深感动，我逐渐认清了资产阶级的丑恶面貌，更坚定了自己的立场。"},{"type":"paragraph","text":"我感激党、团对我的教育和培养，由于小学和初中时代读的都是教会学校，我曾经受到帝国主义分子的毒害，曾经沾染上资产阶级的享乐腐化思想，但是通过这次三反、五反运动，我彻底清算了这种坏思想、坏作风，今天我保证响应团市工委的三大号召，决心搞好工作、学习，决心练好身体，使自己成为祖国的坚强建设者和保卫者。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\04\\524e060501.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94bd00668c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
