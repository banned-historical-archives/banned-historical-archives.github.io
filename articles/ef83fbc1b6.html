art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”与马尔托夫","authors":["李祥隆/张辉冠〖HH/换行〗DW：三九四四一部队"],"parts":[{"type":"paragraph","text":"新党章和历来的党章一样，规定：“……承认党的章程，自愿参加党的一个组织并在其中积极工作……方可加入中国共产党。”这个明确规定，体现着伟大导师列宁和毛主席光辉的建党思想，它是无产阶级政党根本的组织原则之一。"},{"type":"paragraph","text":"一九○三年，革命导师列宁为了把党建成工人阶级先进的有严密组织的队伍，提出的党章第一条就是：凡承认党纲、在物质上支持党并参加党的一个组织的人，都可以成为党员。因为党员参加党的一个组织，过党的组织生活，执行党的政策和决议，党才能成为有组织的整体，才有战斗力。而以马尔托夫为首的机会主义者，则主张不必把参加党的一个组织作为党员条件。马尔托夫甚至提出：每一个罢工者、示威者，都有权自行宣布自己是党员，既无须参加党的一个组织，也用不着服从党的纪律。马尔托夫的谬论，立即受到列宁的严厉批判。列宁指出：“无产阶级在争取政权的斗争中，除了组织而外，没有别的武器。”（《列宁选集》第一卷第五一○页）列宁斥责马尔托夫的主张是把党员的觉悟水平降低到“罢工者”的水平，这样组成的党是涣散的、没有定型的、没有战斗力的。"},{"type":"paragraph","text":"害党害国的“四人帮”，在党员要不要参加党的一个组织这个重要问题上，也承袭了马尔托夫的衣钵。张春桥甚至叫嚷：党组织究竟还要不要？是不是可以用群众组织来代替？后来他又进一步宣称：要让造反队来发挥党支部的作用。在他们看来，党员和要求入党的人，根本无须参加党的一个组织，只要入了“造反队”，就可以是党员了。"},{"type":"paragraph","text":"当年，马尔托夫竭力宣扬“党员不必参加党的一个组织”，其目的是要破坏俄国的革命力量，把党搞成无政府主义的集团；“四人帮”鼓吹“造反队就是党支部”等等，其罪恶用心则是要改变我们党的性质和组织形式，使党变为他们复辟资本主义的工具。"},{"type":"paragraph","text":"每个共产党员和要求入党的同志，都要自觉地学习和贯彻执行新党章，狠批“四人帮”的谬论，从思想上懂得党员“参加党的一个组织并在其中积极工作”的重要意义，为共产主义奋斗终身。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef83fbc1b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
