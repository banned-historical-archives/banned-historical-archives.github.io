)","authors":["周景芳"],"dates":[{"year":1967,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"周景芳在彻底批判反革命《二月提纲》大会上的讲话(摘录)","type":"title"},{"text":"周景芳","type":"authors"},{"text":"革命组织同保守组织甚至反动组织中，受欺骗、受蒙蔽的群众之间的矛盾是人民内部矛盾。他们同样是资产阶级反动路线的受害者，是我们的阶级兄弟，应该耐心帮助，耐心地作政治思想工作。敢于到受蒙蔽受欺骗的群众中去作思想工作，也要敢于让别的同志去作思想工作。不敢去作保守组织群众的工作是不对的。有的退出原来的组织起来革命啦，就不要说他们是变种，不要岐视他们。","type":"paragraph"},{"text":"有人说革命派与保守派讲联合是放弃了原则。现在应当联合起来，平起平坐，这不是降低了革命造反派的威信，而是提高了威信。实行革命的大联合，掌握斗争大方向，这就是最大的原则。要集中力量，团结对敌，一切小是小非，都要服从这个大道理，是什么妨碍我们的大联合呢？是什么使我们要打内战呢？我看有下面三点原因：","type":"paragraph"},{"text":"一、 阶级敌人进行挑动和破坏，暗地里捣鬼，挑动群众斗群众。","type":"paragraph"},{"text":"二、两类不同性质的矛盾，没有严格区分，处理方法不当。","type":"paragraph"},{"text":"三、有些小偏差，存在小团体主义、无政府主义、山头主义，不顾全大局，打内战妨碍大联合。","type":"paragraph"},{"text":"上面所谈几点，主要对革命派取得了优势地位、占领了地位的单位谈的，是对北京市总的情况，一般情况讲的。各单位应根据自己的情况确定方针和战斗布署。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"周景芳在彻底批判反革命《二月提纲》大会上的讲话(摘录)","parts":[{"type":"title","text":"798.周景芳在彻底批判反革命《二月提纲》大会上的讲话(摘录)"},{"type":"paragraph","text":"(1967年6月14日)"},{"type":"paragraph","text":"革命组织同保守组织甚至反动组织中，受欺骗、受蒙蔽的群众之间的矛盾是人民内部矛盾。他们同样是资产阶级反动路线的受害者，是我们的阶级兄弟，应该耐心帮助，耐心地作政治思想工作。敢于到受蒙蔽受欺骗的群众中去作思想工作，也要敢于让别的同志去作思想工作。不敢去作保守组织群众的工作是不对的。有的退出原来的组织起来革命啦，就不要说他们是变种，不要岐视他们。"},{"type":"paragraph","text":"有人说革命派与保守派讲联合是放弃了原则。现在应当联合起来，平起平坐，这不是降低了革命造反派的威信，而是提高了威信。实行革命的大联合，掌握斗争大方向，这就是最大的原则。要集中力量，团结对敌，一切小是小非，都要服从这个大道理，是什么妨碍我们的大联合呢？是什么使我们要打内战呢？我看有下面三点原因："},{"type":"paragraph","text":"一、阶级敌人进行挑动和破坏，暗地里捣鬼，挑动群众斗群众。"},{"type":"paragraph","text":"二、两类不同性质的矛盾，没有严格区分，处理方法不当。"},{"type":"paragraph","text":"三、有些小偏差，存在小团体主义、无政府主义、山头主义，不顾全大局，打内战妨碍大联合。"},{"type":"paragraph","text":"上面所谈几点，主要对革命派取得了优势地位、占领了地位的单位谈的，是对北京市总的情况，一般情况讲的。各单位应根据自己的情况确定方针和战斗布署。"}],"authors":["周景芳"],"dates":[{"year":1967,"month":6,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":279,"page_end":280,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2e7959662"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
