" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu1","name":"十年文革中首长讲话传信录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"胡乔木的一张大字报","parts":[{"type":"title","text":"176.胡乔木的一张大字报"},{"type":"paragraph","text":"(1966年10月12日)北京邮电学院全体革命同志："},{"type":"paragraph","text":"六月十八日我在邮电学院曾说：以朱春和为首的工作组是革命的，这是完全错误的。是为资产阶级反动路线效劳。派工作组到学校，就是资产阶级反动路线。就是与以毛主席为代表的无产阶级革命路线相对抗的，施行资产阶级反动路线，就必然要镇压革命群众运动，破坏无产阶级文化大革命。邮电学院发生的情况完全证实了这点。我在8月24日的答复邮电学院侯泽民、郑义增等十六同学的来信时，已经承认我那次关于工作组的话是错误的，并请他们转告全体同学。现在特再次诚恳地向你们承认错误，并对于你们彻底批判资产阶级反动路线的革命斗争，表示最热烈最坚决地拥护和支持。"},{"type":"paragraph","text":"无产阶级文化大革命万岁！"},{"type":"paragraph","text":"以毛主席为代表的无产阶级革命路线万岁！"},{"type":"paragraph","text":"我们的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"此致革命敬礼"},{"type":"paragraph","text":"胡乔木"},{"type":"paragraph","text":"十月十二日"}],"authors":["胡乔木"],"dates":[{"year":1966,"month":10,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":279,"page_end":280,"alias":""},"tags":[{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25caabe479"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
