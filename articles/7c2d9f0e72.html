rs":[],"dates":[{"year":1970,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"泰国共产党电贺我成功发射人造卫星"},{"type":"paragraph","text":"中国新成就是毛泽东思想的伟大胜利"},{"type":"paragraph","text":"新华社二十九日讯　中国共产党中央委员会收到了泰国共产党中央委员会二十六日发来的电报。电报最热烈地祝贺中国成功地发射第一个人造地球卫星。电报全文如下：中国共产党中央委员会亲爱的同志们："},{"type":"paragraph","text":"我们获悉中华人民共和国于本月二十四日成功地发射人造地球卫星进入宇宙空间轨道的特大喜讯。我们代表全体党员、人民解放军战士和全体泰国革命人民，最热烈地祝贺伟大的中国共产党和中国人民所取得的这一伟大成就。"},{"type":"paragraph","text":"这一辉煌成就是毛泽东思想的伟大胜利，是毛泽东主席的无产阶级革命路线的伟大胜利，是中国无产阶级文化大革命的又一丰硕成果，是伟大的中国人民高举中国共产党第九次全国代表大会团结胜利的旗帜的结果，实现了毛泽东主席的“我们也要搞人造卫星”的伟大号召。"},{"type":"paragraph","text":"中国发展空间技术的这一伟大胜利，使全世界革命人民极为欢欣鼓舞，同时也使帝国主义、现代修正主义和各国反动派极为恐慌，并且是对正在加紧推行侵略政策和战争政策的美帝国主义和苏修社会帝国主义的一个沉重打击。"},{"type":"paragraph","text":"中国科学技术的迅速发展，使得社会主义中国这个世界革命的堡垒更加坚强壮大，并且给予正在为争取独立、民主和社会主义而斗争的全世界革命群众以巨大的支持和鼓舞。正在拿起武器同美帝国主义侵略者及其仆从他侬卖国集团进行激烈斗争的泰国人民，把我们伟大的兄弟的中国人民的这一成就和胜利，看作自己的成就和胜利，看作是对我们的斗争的巨大鼓舞和支持。"},{"type":"paragraph","text":"我们祝贺伟大的中国共产党和中国人民取得更加辉煌的成就。"},{"type":"paragraph","text":"泰中两国人民牢不可破的战斗友谊万岁！"},{"type":"paragraph","text":"伟大的、光荣的、正确的中国共产党万岁！"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"全世界无产阶级的伟大导师毛泽东主席万岁！"},{"type":"paragraph","text":"泰国共产党中央委员会"},{"type":"paragraph","text":"一九七○年四月二十六日于泰国"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c2d9f0e72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
