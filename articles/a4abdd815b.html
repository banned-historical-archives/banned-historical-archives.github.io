art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我党政代表团举行盛大答谢宴会孙德胜阮良朋黎笋长征范文同同志等由周恩来叶剑英邱会作同志陪同出席周恩来同志范文同同志讲话，宾主祝贺中越两国的战斗团结不断巩固发展","authors":[],"parts":[{"type":"paragraph","text":"新华社河内十日电 中国党政代表团七日晚上在迎宾馆举行盛大宴会，最热诚地感谢越南劳动党中央委员会和越南民主共和国政府对代表团的极其隆重、热烈的欢迎和接待。"},{"type":"paragraph","text":"座落在河内市中心的迎宾馆，七日晚张灯结彩，喜气洋洋，大厅里充满着中越两国战友间十分亲切友好的热烈气氛。"},{"type":"paragraph","text":"七时整，越南民主共和国主席孙德胜同志，越南民主共和国副主席阮良朋同志，越南劳动党中央委员会第一书记黎笋同志，越南劳动党中央政治局委员、国会常务委员会主席长征同志，越南劳动党中央政治局委员、政府总理范文同同志等，由中国党政代表团团长、中共中央政治局常委、国务院总理周恩来同志，副团长：中共中央政治局委员、中共中央军委副主席叶剑英同志，中共中央政治局委员、中国人民解放军副总参谋长邱会作同志陪同，走进宴会大厅。这时，大厅里响起了长时间的热烈的掌声。"},{"type":"paragraph","text":"应邀出席宴会的，还有越南劳动党中央政治局委员、政府副总理兼国防部长武元甲同志，越南劳动党中央政治局委员黎德寿同志，越南劳动党中央政治局委员、政府副总理兼外交部长阮维桢同志，越南劳动党中央政治局委员、政府副总理黎清毅同志，越南劳动党中央政治局委员、国会常务委员会副主席黄文欢同志，越南劳动党中央政治局候补委员陈国环同志，越南劳动党中央书记处书记黎文良、素友、阮文珍、黄英同志，越南劳动党中央委员、政府副总理杜梅同志，越南劳动党中央委员、越南祖国战线中央委员会主席团委员、越中友好协会会长黄国越同志，河内市行政委员会主席陈维兴同志，越南驻中国大使吴船同志以及越南党政各部门、各政党、各群众团体的负责人和人民军高级干部。"},{"type":"paragraph","text":"越南南方共和驻北方特别代表团代理团长阮富帅也应邀出席了宴会。"},{"type":"paragraph","text":"在热烈的掌声中，周恩来同志和范文同同志先后发表了讲话（全文见本版）。他们的讲话不断被掌声所打断。"},{"type":"paragraph","text":"宴会进行中，宾主亲切交谈，一再举杯祝贺越南人民和印度支那三国人民在抗美救国战争中取得的伟大胜利，祝贺中越两国人民之间的兄弟情谊和战斗团结不断巩固和发展，祝贺中国党政代表团对越南的友好访问取得圆满成功。"},{"type":"paragraph","text":"中国党政代表团团员耿飚、韩念龙、王幼平、苑化冰同志，随行人员杨德中、曹克强、韩叙等同志参加了宴会。"},{"type":"paragraph","text":"中国驻越南大使馆全体外交人员、在越南工作的中国工程技术人员代表也出席了宴会。"},{"type":"paragraph","text":"各国驻越南外交使节也应邀出席了宴会。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"邱会作","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4abdd815b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
