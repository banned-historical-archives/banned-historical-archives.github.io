<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉大学教师对实行高等学校教师工作日和教学工作量的意见","authors":[],"dates":[{"year":1954,"month":7,"day":27}],"is_range_date":false,"parts":[{"text":"武汉大学教师对实行高等学校教师工作日和教学工作量的意见","type":"title"},{"text":"【武汉七月二十七日讯】武汉大学教师对高等学校教师工作日和教学工作量办法(草案)有抵触思想。武大教师对这个草案已讨论了两次，提出了一百四十条问题和意见。一部分年老体弱的教师，怕实行工作量以后，工作太重，身体吃不消。如化学系讲师李国材说：“实行工作量等于让教师比体力。”物理系女教师周如松说：“要实行工作量，我只好进厨房了。”(意思是体力支持不了)尹景瑚副教授听到另外的老教授谈：“慢慢实行吧，不然，我们只好进棺材了。”因此有些老教师想退修。如物理系教授桂质廷说：“我不如退修了，教一门课，拿百分之六十的薪水算了。”至于学识能力差的教师，认为实行工作量后，作教师不如作职员轻松。年青的教师，思想抵触不大，因为他们原来的工作就不轻，而且热情也高。一般的情况是：原来工作重的意见不多，原来工作轻的意见多。武大理科课程多教师较少，现在数学系教师的工作量按草案规定的标准已达到了百分之一百二十，他们没有意见，而现在政治经济系教师的工作量只相当于草案规定的百分之三十，因此多不愿实行工作量制。","type":"paragraph"},{"text":"据武大副校长张勃川对记者谈：教师们也提出了一些有道理的意见。比如化学系和中文系的教师提出：指导外校进修生，可算作工作量，而指导和培养本校师资，反不算工作量是不合理的。","type":"paragraph"},{"text":"讨论中间也有些教师提出了一些问题。有人问：“‘按劳取酬’与‘雇佣观点’有何异同？”“美国看卷子另外算钱，实行工作量有无这种味道？”有人说：“苏联进入社会主义以后才实行工作量和工作日，我们才解放四年就实行，未免过早。”又有人说：“各课难易不同，班次大小不一，如仅在形式上满足工作量，恐怕要降低教学质量。”","type":"paragraph"},{"text":" (方约)","type":"paragraph"},{"text":"1954年8月6日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c71b6f7f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
