tes":[{"year":1950,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　中国蚕丝公司为了照顾蚕农利益，根据华东贸易部本年度收购出口物资的任务，以便在春季鲜茧登场时及时收购，并为了防止中间商人剥削蚕农起见，收购方式将考虑通过当地农民协会和合作社，收购价格，将根据各地具体情况，按食米标准，决定鲜茧每担为中白粳三石五斗至四石不等。据苏南各地来人报告，今年蚕汛稍早，估计今年鲜茧产量，可维持去年数量，约可缫制二万担生丝。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"216aa1b43c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
