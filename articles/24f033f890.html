ates":[{"year":1968,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十六日电　一位名叫巴利的喀麦隆战士最近发表谈话，热烈欢呼伟大的历史文件中共中央一九六六年五月十六日的《通知》发出两周年。"},{"type":"paragraph","text":"巴利说，在毛主席亲自主持下制定的《通知》，是一个意义重大的马克思列宁主义文献。"},{"type":"paragraph","text":"巴利说，两年来，无产阶级文化大革命的辉煌胜利，证明了毛主席在这个伟大的历史文件中所作出的科学论断是多么英明!“这场文化革命的伟大胜利使中国成为世界革命坚不可摧的、伟大的根据地。这场文化革命在政治和意识形态方面为加速帝国主义、新老殖民主义和修正主义的崩溃，为社会主义在全世界取得胜利，创造了极其有利的条件。”"},{"type":"paragraph","text":"巴利怀着对战无不胜的毛泽东思想的深厚感情强调指出:“毛泽东思想是一盏指路明灯，照亮了伟大的世界革命的道路，照亮了无产阶级文化大革命的道路，照亮了巩固无产阶级专政的道路。”他说，毛泽东思想是已经取得政权的工人阶级巩固无产阶级专政的根本保证，是从社会主义过渡到共产主义的保证。毛泽东思想是放之四海而皆准的真理。对待毛泽东思想的态度是区分革命和不革命的根本标准."}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24f033f890"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
