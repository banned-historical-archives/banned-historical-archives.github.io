" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"包围张宣之敌务使不能逃跑","alias":"","parts":[{"type":"paragraph","text":"包围张宣之敌务使不能逃跑！"},{"type":"paragraph","text":"（1948年11月29日）杨、李，杨、罗、耿，程、黄："},{"type":"paragraph","text":"（一）杨李在包围张宣?之敌后，即应迅速完成阻击工事，务使敌人不能逃跑（注意不使敌人黑夜逃跑），以吸引东面敌人增援。如张宣敌在你们到达前即已向怀来逃跑，你们即应猛追到怀来，务必抓住一部敌人。（二）杨罗耿一闻杨李包围了张宣之敌，即应迅速前进包围怀来之敌。（三）程黄仍在现地待命，使敌放心西进增援。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十九日二十四时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第三兵团司令员杨成武和副政治委员兼政治部主任李天焕等的电报。"},{"type":"paragraph","text":"[2]杨、罗、耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。程、黄，指程子华、黄志勇，当时分别任东北野战军第二兵团司令员和参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":299,"page_end":299},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"386b2a2da7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
