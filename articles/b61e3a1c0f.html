一九七四年初到去年年底，全国已举行七批文艺调演，演出多种形式的节目共一百多台。通过调演，推动了以革命样板戏为标志的无产阶级文艺革命的发展　最近文化部召开今年文艺调演预备会议，各地正在积极进行调演的各项准备工作","authors":[],"dates":[{"year":1976,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年一月十七日电　为了进一步贯彻毛主席的革命文艺路线，巩固和发展无产阶级文化大革命和文艺革命的伟大成果，繁荣社会主义的文艺创作，一九七六年将继续在北京举行全国文艺调演。"},{"type":"paragraph","text":"从一九七四年一月的华北地区文艺调演开始，到去年年底的全国木偶、皮影戏调演为止，两年来已经举行了七批文艺调演·在这些文艺调演中，来自全国各省、市、自治区的革命文艺工作者，以党的基本路线为指导，积极投入批林批孔运动，认真学习毛主席的《在延安文艺座谈会上的讲话》，不断批判修正主义文艺路线，推动了调演工作的顺利进行。他们共演出地方戏曲移植革命样板戏、京剧、话剧、歌剧、各种地方戏曲、音乐、舞蹈、曲艺、木偶、皮影戏等多种文艺形式的节目共一百多台，观众达二百多万人次。通过这些文艺调演，推动了以革命样板戏为标志的无产阶级文艺革命的发展，促进了社会主义文艺的繁荣。"},{"type":"paragraph","text":"今年将继续举行的全国文艺调演，有独舞、双人舞、三人舞调演，曲艺调演，杂技调演，反映农业学大寨运动题材的专题文艺调演和话剧调演。"},{"type":"paragraph","text":"最近，文化部召开了一九七六年全国文艺调演的预备会议。会议期间，各省、市、自治区的代表纷纷表示，要坚持党的基本路线，认真学习无产阶级专政理论，以阶级斗争为纲，继续批判反革命的修正主义文艺路线，贯彻执行毛主席关于文艺工作的一系列重要指示，搞好今年的文艺调演，使文艺更好地为反修防修，巩固无产阶级专政服务。目前，各地正在积极进行一九七六年文艺调演的各项准备工作。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b61e3a1c0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
