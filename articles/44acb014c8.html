script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"读者身边的书店书亭是解放后的新兴事业，适合广大读者的需要，有待大量发展，以便更广泛地发扬新民主主义文化、传播毛泽东思想。","authors":["李伟明"],"dates":[{"year":1951,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为广泛的发扬新民主主义文化、传播毛泽东思想、便利广大读者能随时购到所需要的书刊，上海市书亭管理处一年来在本市各区先后设立了各种类形不同的书亭十数起，专门经销新华书店的书刊。读者购书可以少跑路，同时服务周到，营业时间长，上午七时开门到下午九时打烊，到现在书亭已与广大的读者发生了密切的联系，并成为解放后新上海的新兴事业。"},{"type":"paragraph","text":"书亭为加强对广大读者服务，配合抗美援朝爱国主义教育宣传，在尽可能的条件下，设法增设阅览室以及时事展览图片架。在本月八日开幕的巴黎大戏院书亭，开辟了阅览室，观众在电影未放映前，可以在该室随意阅读或选购书刊，另外筹备在南京西路马霍路口文汇报读者服务处原址，增设书亭，除了供应书刊外，并扩大原有之书报阅览室以及接受文汇报读者意见的收发。"},{"type":"paragraph","text":"为符合二届二次人代会决议的市政建设方针:‘为生产服务，为工人阶级服务。’除了正在劳动公园设立的一个书亭外，现在正在计划在沪东、沪西工厂区内普遍设立书亭，以供工人同志购阅书刊，目前建立的计有:平凉路底国棉十九厂、杨树浦路底、江宁路宜昌路口被服一厂，长寿路胶州路口国棉一厂等四处、上述地点已向有关当局申请，俟获准后即可开始筹建。"},{"type":"paragraph","text":"书亭——是一个初创的事业，经验少、缺点多，今后希望广大的读者协助支持，并欢迎建议及批评，使书亭真正的成为每一个读者身边的书店。(李伟明)"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\09\\519c040201.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44acb014c8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
