灵","authors":["李吟","杜志民"],"dates":[{"year":1983,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"部队诗歌创作座谈会在京举行"},{"type":"paragraph","text":"与会同志表示：决不让资产阶级自由化思潮污染诗歌和读者心灵"},{"type":"paragraph","text":"本报讯 为了繁荣部队诗歌创作，解放军文艺社和解放军报社文化处最近在北京联合召开了部队诗歌创作座谈会。部队诗人、诗作者以及评论工作者共30余人参加了会议。"},{"type":"paragraph","text":"会议期间，诗人、中国作家协会党组副书记朱子奇同志和诗人、中国作家协会书记处书记柯岩同志应邀介绍、分析了近几年我国诗歌界创作和评论方面的情况，对所谓“崛起的诗群”诗歌理论和作品作了批驳。总政文化部副部长、诗人李瑛同志也到会就诗人的职责和诗与政治、诗与生活的关系等问题作了发言。"},{"type":"paragraph","text":"召开全军性的诗歌创作座谈会，部队诗歌作者济济一堂，切磋诗艺，建国以来这是第一次。座谈会根据党的十二届二中全会关于文艺要高举社会主义旗帜，抵制和清除精神污染，坚持“二为”方向的精神，分析了近几年来部队诗歌创作的情况，肯定了成绩，找出了不足，明确了部队诗歌创作进一步发展的方向。与会同志认为，部队诗歌有着可以自豪的传统；近几年来的诗歌创作，总的来看，也是比较健康的，是一个稳步前进的势头。题材趋向广泛，对生活的开掘逐步加深。在表现手法上，也作出了可喜的探索。出现了一些较好的作品，涌现了一批有才华的诗歌新作者。但是，比起军事题材小说和报告文学取得的成绩来，部队诗歌发展的幅度还不能令人满意。表现在作者的视野还不够广阔，作品的时代感还不够强烈。立意精深、感情浓烈、气魄宏大的力作还属少见。有些作者对诗歌的民族化问题，对继承我国诗歌的优良传统，重视不够，以致在一定程度上脱离了读者。也有个别作者在错误思潮影响下，写了一些不好的作品。这些问题都有待于通过加强批评和创作实践加以解决。"},{"type":"paragraph","text":"许多同志谈到：部队读者不喜欢那些谜语一样的诗，对诗歌创作和评论中的资产阶级自由化倾向，对“崛起的诗群”鼓吹者所造成的思想混乱和精神污染以及艺术上的畸形表示不满。与会同志表示，在坚持解放思想，继续贯彻“双百”方针，进行艺术探索的同时，一定要高举社会主义文艺的旗帜，明确为人民服务、为社会主义服务的方向。在文艺战线的斗争中，要保持清醒的头脑，当前要特别警惕资产阶级自由化思潮的影响，不让它们污染我们的诗歌和读者的心灵。要加强马列主义、毛泽东思想的学习，坚持深入生活，努力开阔视野，以期写出更多具有中国气派和部队特色，无愧于我们伟大的人民和伟大的时代的优秀诗篇。　　　　　　　　　　　　杜志民　李　吟"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dea65f3b40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
