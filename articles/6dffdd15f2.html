rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"新版《毛泽东选集》下发部队发放仪式在北京军区某师举行","authors":["穆福田/陈先义"],"parts":[{"type":"paragraph","text":"本报北京7月31日讯 穆福田、记者陈先义报道：一套套新版《毛泽东选集》，为节日的军营增添了喜庆气氛。根据军委、总部首长的决定，拨专款为部队突击赶印的新版《毛泽东选集》，已于“八一”建军节前夕陆续发往部队。今天上午，承担新版《毛选》出版发行任务的解放军出版社的领导同志，带着军委、总部首长的关怀，驱车为北京军区某师送书；北京军区在该师隆重举行了新版《毛泽东选集》发放仪式。"},{"type":"paragraph","text":"在今天的新版《毛选》发放仪式之后，北京军区政治部及解放军出版社的领导与该师官兵一起就新版《毛选》下发进行座谈。与会的干部战士表示：在反“和平演变”斗争尖锐复杂的形势下，我们一定认真地读好新版《毛选》，以毛泽东思想为武器，打好我们面临的这场没有硝烟的战争，促进部队革命化、现代化、正规化建设。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dffdd15f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
