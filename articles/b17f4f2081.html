ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"致博作义公函","alias":"","parts":[{"type":"paragraph","text":"致傅作义公函1]"},{"type":"paragraph","text":"（1949年1月15日）"},{"type":"paragraph","text":"贵将军身为战争罪犯，如果尚欲获得人民谅解，减轻由战犯身份所应得之罪责，即应在此最后时机，遵照本军指示，以求自赎。办法如下：（一）自动放下武器，并保证不破坏文化古迹，不杀革命人民，不破坏公私财产、武器弹药及公文案卷。如贵将军及贵属能够做到这些，则本军保证贵部官兵生命、财产之安全。对于贵将军的战犯罪责，亦有理由向人民说明情况，取得人民谅解，予以减轻或赦免。（二）如果贵将军及贵属不愿意自动放下武器，而愿意离城改编，则本军为保全北平不受破坏起见，也可以允许这样做。本军可以充许贵军离开北平，开入指定地点，按照人民解放军的制度改编为人民解放军。上述两项办法，任凭贵将军及贵属自由选择。本军并愿再一次给予贵将军及贵属以考虑及准备之充分时间。此项时间，规定由一九四九年一月十七日上午一时起，至一月二十日下午十二时止。如果贵将军及贵属竟敢悍然不顾本军的提议，欲以此文化古城及二百万市民财产为牺牲，坚决抵抗到底，则本军为挽救此古城免受贵将军及贵属毁灭起见，将实行攻城。"},{"type":"paragraph","text":"[1]这是毛泽东关于敦促傅作义尽快接受和平解决北平问题的条件，为"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":1,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":533,"page_end":533},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b17f4f2081"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
