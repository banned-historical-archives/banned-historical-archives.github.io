script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴基斯坦总统伊拉希致电  祝贺华国锋主席当选为中共中央主席","authors":[],"dates":[{"year":1977,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴基斯坦总统伊拉希致电"},{"type":"paragraph","text":"祝贺华国锋主席当选为中共中央主席北京中国共产党中央委员会主席、中华人民共和国国务院"},{"type":"paragraph","text":"总理华国锋先生阁下阁下："},{"type":"paragraph","text":"我非常高兴地向阁下表示我们热烈的祝贺，祝贺你当选为中国共产党中央委员会主席。"},{"type":"paragraph","text":"第十一次党代表大会的胜利召开是伟大的中国人民在实现伟大领袖毛泽东主席规定的崇高目标的前进道路上的一个里程碑。"},{"type":"paragraph","text":"我深信，在阁下的英明和富有献身精神的领导下，中国人民将在建设国家的斗争中取得更大的胜利，并将继续对人类的进步作出自己重要的贡献。我相信，把巴基斯坦和中国如此紧密地联系在一起的多方面的传统友好合作关系将在今后日益增强。"},{"type":"paragraph","text":"请阁下接受我最良好的祝愿，祝你健康、幸福和长寿，并请接受巴基斯坦人民的最良好的祝愿，祝伟大的中国人民取得越来越大的进步、昌盛和光荣。"},{"type":"paragraph","text":"巴基斯坦伊斯兰共和国总统"},{"type":"paragraph","text":"法兹尔·伊拉希·乔德里"},{"type":"paragraph","text":"一九七七年八月二十四日于拉瓦尔品第"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1e26f0044"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
