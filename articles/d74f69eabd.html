ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"中原野战军各纵待李延年北进时担任南线防御","alias":"","parts":[{"type":"paragraph","text":"中原野战军各纵待李延年北进时"},{"type":"paragraph","text":"担任南线防御1]"},{"type":"paragraph","text":"（1948年12月21日）刘、陈、邓，并告粟、谭："},{"type":"paragraph","text":"（一）杜聿明?要求补足四百吨粮弹方能突围，近日阴雨，补给甚少，现蒋顾?正增加补给，判断其突围实施时机大约在亥有左右。蚌埠方面李延年现仅以几支搜索队向包家集、何集之线前进，估计在本月底下月初我军歼击杜聿明战况紧急之时，有再以八九个师向蚌埠西北行动一次之可能。（二）在上述情况下，你们应令中野各纵迅速完成战后整备，待李延年第三次北进时担任南线防御，并准备于华野对杜聿明作战接近解决之际，放敌深入，围歼其"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军司令员刘伯承、第一副司令员陈毅和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]粟、谭，指粟裕、谭震林，当时分别任华东野战军代司令员兼代政治委员和副政治委员。"},{"type":"paragraph","text":"[3]杜聿明，当时任国民党军徐州“剿匪”总司令部副总司令兼前进指挥部主任。"},{"type":"paragraph","text":"[4]蒋，指蒋介石。顾，指顾祝同，当时任国民党军参谋总长。[5]李延年，当时任国民党军第六兵团司令官。[6]包家集，似为鲍集，位于安徽省怀远县东北。何集，村名，位于安一部。（三）粟谭仍应坚持十天休整计划，即使杜聿明于此时期内突围，仍应以一部抗击之，待我完成休整计划并重新部署以后再举行攻击，并准备按照打黄维\"的办法逐次解决之。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"马丑"},{"type":"paragraph","text":"[1]黄维，原任国民党军第十二兵团司令官。在淮海战役第二阶段中，该兵团于1948年12月15日在安徽潍溪县南部双堆集附近，被中原野战军和"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":441,"page_end":442},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d74f69eabd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
