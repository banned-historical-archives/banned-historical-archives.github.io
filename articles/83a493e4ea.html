script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向苏联人民灌输赫鲁晓夫修正主义苏联当局竭力推行反华教育把反华文件和书籍列入各种课目的教学大纲","authors":[],"dates":[{"year":1965,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社莫斯科1日电　目前正在苏联书店里大量出售的苏联各种课目的教学大纲，把一些反华文件和书籍列为“阅读文件”，以此向苏联人民灌输赫鲁晓夫修正主义，推行反华教育。这些反华文件和书籍有苏斯洛夫在苏共中央一九六四年二月全会上的反华报告，苏共中央一九六三年七月给各级党组织和党员的公开信，苏共中央一九六四年二月全会的决议，苏共中央马克思列宁主义研究院提纲——“第一国际一百年”，《共产党人》杂志一九六四年第五期的编辑部文章——“争取国际共产主义运动在马克思列宁主义原则上的团结”，苏联政治书籍出版局出版的“中国共产党党内生活的某些方面”一书，一九六四年九月二日的《真理报》编辑部文章——“关于毛泽东同一批日本社会党人的谈话”，《思想》出版社一九六四年出版的“为马克思列宁主义的纯洁性而斗争”一书。"},{"type":"paragraph","text":"这些反华文件和书籍被分别列入下列各种课目的教学大纲中:政治书籍出版局一九六四年出版的《共产主义建设者的道德标准研究大纲》，苏联高等和中等专业教育部社会科学教有局颁发的《政治经济学和经济学说史副博士准备考试书目》，政治书籍出版局出版的《政治教育系统一九六四一一九六五年学年标准教学计划——我国共产主义建设，发展世界社会主义体系，共产党和工人党在现阶段的战略与策略等问题》，苏联高等和中等专业教育部社会科学教育局颁发的、供技术与农业中等专业学校专用的《政治经济学教学大纲》，苏联高等和中等专业教育部发行的《政治经济学测验和学年论文题集》，苏共中央社会科学学院政治经济学教研室编写的《政治经济学基础大纲》，苏联高等和中等专业教育部颁发的《“苏共历史”教程教学大纲》，苏共中央社会科学学院哲学教研室编写的《共产主义教育基础研究大纲》。"},{"type":"paragraph","text":"在上述所有八个“大纲”、“计划”、“书目”和“题集”中都把苏斯洛夫在苏共中央二月全会上作的反华报告规定为“阅读文件”。"},{"type":"paragraph","text":"上述“大纲”、“计划”中规定阅读的反华文件和书籍充满了赫鲁晓夫修正主义的滥调，公开恶毒攻击坚持马克思列宁主义的中国共产党，歪曲和篡改马克思列宁主义的基本原理，兜售苏共第二十次代表大会、第二十二次代表大会和苏共纲领的现代修正主义货色。"},{"type":"paragraph","text":"苏联书店目前还正在出售大批反华小册子。除前已报道的正在出售的苏斯洛夫在二月全会上的反华报告和苏共中央公开信以及一系列小册子外，还有下列一些反华小册子:前苏共中央主席团委员、书记处书记库西宁(已死)在苏共中央二月全会上的讲话，他在讲话中攻击我国政权是“领袖专政、独裁专政”，中共“不是工人阶级的先锋队”，并恶毒诬蔑毛主席；《共产党人》杂志一九六四年第十三期的文章“列宁的和平共处政策和阶级斗争”，文章诽谤中国领导拿“亿万人的生命进行肮脏投机”，“提出野心勃勃的扩张主义纲领”，“玩弄最反动势力的民族主义感情”；苏联作家西蒙诺夫发表在《真理报》上的诬蔑中国领导人奉行“种族主义”、“分裂主义”的文章——“不要走入迷途”；《真理报》五月十日至十二日在“马克思列宁主义是各国共产党人的国际性学说”的总标题下发表的三篇文章，攻击和歪曲中国共产党对国际共产主义运动的总路线的正确立场；苏联《共产党人》杂志的编辑部文章——“反对文学艺术中的教条主义和庸俗化”，文章攻击中国共产党实行的马克思列宁主义的、为工农兵服务的文艺政策是“教条主义和宗派主义”的政策，诽谤我“百花齐放，百家争鸣”是“声名狼藉”的口号；一九六四年四月付印的斯·维斯科夫写的“争取没有武器的世界，争取没有战争的世界”，作者在这本书中指名攻击中共领导人，大肆吹捧赫鲁晓夫。"},{"type":"paragraph","text":"在莫斯科列宁博物馆、马克思和恩格斯博物馆的展览厅里还都把苏斯洛夫在苏共中央二月全会上的反华报告、苏共中央公开信以及其它一些反华文件作为“展览品”展出。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83a493e4ea"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
