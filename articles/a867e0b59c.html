中滋长起来的强迫命令作风的通报","authors":[],"dates":[{"year":1952,"month":6}],"is_range_date":false,"parts":[{"text":"华东局关于检查、纠正三反以后在干部中滋长起来的强迫命令作风的通报","type":"title"},{"text":"5月X日转来昌潍地委关于三反以来干部中强迫命令作风普遍滋长的通报及分局对该通报的批示都很重要。这种滥用“限期发动”、“指名坦白”办法于一切工作及以“打虎精神”为名将强迫命令作风合法化的歪风，在其他地区也难免发生，如听其自流发展是很危险的。希各地即将上述通报转发到所有的地委、县委，并联系总结三反中正确和不正确的两种作法，向全体干部进行传达教育，着重从正反两面说明是非，使大家明确的了解：在三反运动中那些作法是对的或错的；那些作法只能在某种条件下采用，而不可一般地采用；以及那些作法是无论在何时何地都不能采用的。同时应严加检查并仿照山东所采取的措施，对可能发生和已经发生的强迫命令作风加以有效的防止和纠正，至要。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a867e0b59c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
