script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉美国家职工展开反压迫反剥削斗争","authors":[],"dates":[{"year":1968,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拉丁美洲一些国家的工人和职员最近不断展开反对压迫、反对剥削的斗争。"},{"type":"paragraph","text":"智利拉佩尔发电厂六千名工人二十一日举行罢工，抗议厂方大批解雇工人。二十二日，美资智利电力公司近五千名工人也举行了罢工，要求增加工资。"},{"type":"paragraph","text":"在乌拉圭，私营企业的工人和职员二十日举行了二十四小时总罢工，反对当局实行所谓“紧急安全措施”和冻结工资。私营银行职员在十九日就宣布了罢工。"},{"type":"paragraph","text":"厄瓜多尔曼塔港“伊内卡帕”鱼类包装厂的数百名工人十六日占领了工厂，并且扣留了经理和厂长，坚持要求企业主对被解雇的工人支付补偿费。工人们的战斗行动，使这个工厂正在进行的七十五吨鱼的装箱工作完全停顿。"},{"type":"paragraph","text":"在玻利维亚，圣克鲁斯市的银行职员最近上街游行示威，抗议当局无理解雇职员。示威群众英勇地还击了反动军警的野蛮镇压。　(据新华社)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76d42a38b6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
