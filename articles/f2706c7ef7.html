ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"杂言诗·八连颂","alias":"","parts":[{"type":"paragraph","text":"杂言诗·八连颂"},{"type":"paragraph","text":"（1963年8月1日）好八连，天下传。为什么？意志坚。为人民，几十年。拒腐蚀，永不沾。因此叫，好八连。解放军，要学习。全军民，要自立。不怕压，不怕迫。不怕刀，不怕戟。不怕鬼，不怕魅。不怕帝，不怕贼。奇儿女，如松柏。上参天，傲霜雪。"},{"type":"paragraph","text":"纪律好，如坚壁。"},{"type":"paragraph","text":"[1]这是毛泽东在中国人民解放军建军36周年时为人民解放军某部八连题写的杂言诗。1949年5月，这个连队进驻上海南京路，身居闹市，一尘不染，勤俭节约，克己奉公，热爱人民，助人为乐。1963年4月25日，国防部批准授予该连“南京路上好八连”的光荣称号。毛泽东全集第四十五卷"},{"type":"paragraph","text":"军事好，如霹雳。政治好，称第一。思想好，能分析。分析好，大有益。益在哪？团结力。军民团结如一人，试看天下谁能敌。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":490,"page_end":491},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2706c7ef7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
