rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东著作选读》战士本增订出版总政治部指出；这一选读本连同《毛主席语录》；就是战士的基本政治读物，就是连队政治教育的基本教材，要求战士在服役期间基本学完？新的选读本已开始在全军发行？","authors":[],"parts":[{"type":"paragraph","text":"过去，由于一小撮反党反社会主义黑帮分子把持宣传出版部门，对毛主席著作的出版发行工作疯狂压制，长期以来，《毛泽东选集》不能充分供应。为了满足部队广大战士学习毛主席著作的迫切需要，总政治部根据军委、林彪副主席的指示，于一九六一年八月印发了供战士学习的《毛泽东著作选读》，受到了广大战士的热烈欢迎。近几年来，随着我军活学活用毛主席著作群众运动的深入发展，许多同志都要求增加选读本的文章，包括增加毛主席在全国胜利以后新发表的一些重要文章。总政治部接受广大战士的要求，于去年十月决定增订再版。新的选读本增加了毛主席关于阶级斗争和国际形势方面的论著，《实践论》、《矛盾论》等哲学著作和关于思想改造的论著，等等，由原来的八万字增加到二十三万字。"},{"type":"paragraph","text":"新选读本的出版说明指出，“这一选读本连同《毛主席语录》，就是战士的基本政治读物，就是连队政治教育的基本教材，要求战士在服役期间基本学完。”根据林彪副主席关于“减少分量，增加次数，抓住主要问题反复学”的指示，总政治部还规定《中国社会各阶级的分析》、《关于纠正党内的错误思想》、《纪念白求恩》、《为人民服务》、《愚公移山》等十六篇（节）文章，必须反复阅读，反复讲解，反复讨论，反复运用。广大战士一致表示，要坚决执行林彪副主席的指示，活学活用，在用字上狠下功夫，一定要把我军学习毛主席著作的群众运动推向一个新的高潮。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28d0e3cb69"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
