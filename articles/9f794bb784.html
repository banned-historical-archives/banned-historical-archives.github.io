art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华总理邓副总理电唁大平首相逝世邓颖超副委员长、黄华外长对大平首相不幸逝世表示深切哀悼","authors":[],"parts":[{"type":"paragraph","text":"据新华社六月十二日讯 中华人民共和国国务院总理华国锋六月十二日致电日本国内阁总理大臣临时代理伊东正义，对大平正芳首相不幸逝世表示深切的哀悼。电报说："},{"type":"paragraph","text":"惊悉大平正芳首相不幸逝世，不胜悲痛，谨代表中国政府和中国人民表示深切的哀悼。"},{"type":"paragraph","text":"大平首相是国际上富有远见卓识的政治家，是中国人民尊敬的老朋友。他生前为日中两国邦交正常化、为发展两国和平友好合作关系付出了心血，做出了重大贡献。他的逝世是中日友好事业的重大损失。"},{"type":"paragraph","text":"大平首相去年访问我国和我最近应大平首相邀请访问日本，为迈向二十一世纪的中日和平友好合作关系奠定了坚实的基础。大平首相说，中日友好不仅是中日两国的共同财富，而且应该成为亚洲和世界的共同财富。我相信，大平首相的这一愿望一定能够实现。中日友好合作关系一定会不断发展并对亚洲和世界的和平与稳定作出贡献。中日两国人民一定能够世世代代友好下去。"},{"type":"paragraph","text":"谨向大平夫人和家属表示亲切的慰问。"},{"type":"paragraph","text":"据新华社六月十二日讯 中华人民共和国国务院副总理邓小平和卓琳同志六月十二日致电日本国内阁总理大臣临时代理伊东正义，对大平正芳总理大臣不幸逝世表示深切的哀悼。电报说："},{"type":"paragraph","text":"惊闻大平正芳总理大臣不幸病逝，不胜哀悼。大平总理多年来为发展日中关系、维护亚洲和世界的和平做出了重大贡献。中国人民将永远缅怀他。"},{"type":"paragraph","text":"请转致对大平总理的夫人和家属的亲切慰问。"},{"type":"paragraph","text":"新华社六月十二日讯 中华人民共和国全国人民代表大会常务委员会副委员长邓颖超和中华人民共和国外交部部长黄华六月十二日分别致电日本国内阁总理大臣临时代理伊东正义，对大平正芳首相不幸逝世表示深切的哀悼。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f794bb784"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
