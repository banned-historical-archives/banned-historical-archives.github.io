script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"个修正主义的黑纲领","authors":[],"dates":[{"year":1976,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大众制药厂工人理论小组"},{"type":"paragraph","text":"不肯改悔的走资派抛出“三项指示为纲”，决不是偶然的提法上的错误，也不是什么认识上的问题，而是他们从政治上，思想上，组织上疯狂地向无产阶级全面进攻的修正主义纲领。“阶级斗争是纲，其余都是目”。这是马克思主义的基本思想。不肯改悔的走资派把安定团结，发展国民经济同学习理论、反修防修并列起来，说成是一切工作的“总纲”，就是从根本上否定阶级斗争为纲，反对把学习无产阶级专政理论放在首位。学习无产阶级专政理论，就是要使全国人民都知道“列宁为什么说对资产阶级专政”，知道无产阶级和资产阶级的斗争是社会主义社会的主要矛盾，修正主义是主要危险，最危险的是代表地主资产阶级利益的走资派。而不肯改悔的走资派却在“三项指示为纲”的幌子下，叫嚷什么当前的主要矛盾是四个现代化与科学技术落后、文化教育落后的矛盾，当前的主要危险是不学文化等等，这就很清楚地暴露了他们修正主义的嘴脸。他们一方面利用全国人民要求加快建设社会主义的迫切心情，把“三项指示为纲”作为大旗，欺骗人民；另一方面又把“三项指示为纲”作为大棒，赤裸裸地反攻倒算。他们说:“只要人家说你复辟了，你的工作就干好了”。“复辟了”就是“干好了”，真是不打自招。这句话再清楚不过地告诉我们，“三项指示为纲”的要害是复辟资本主义。他们所说的“安定”，就是要恢复资产阶级统治的秩序；他们所要的“团结”，就是被打倒的地主资产阶级重新上台对工农群众实行法西斯专政；他们要的“搞上去”，决不是社会主义的国民经济，而是要恢复没落的资本主义制度。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09d609a1b3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
