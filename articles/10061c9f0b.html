ates":[{"year":1957,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"当前福建右派动向","type":"title"},{"text":"新华社福州12日电     本社记者徐晓报导： 自人民日报的“这是为什麽”等社论发表后，各民主党派在福建的地方组织中的右派分子为之大震，他们迅速把对我四面围攻(即各种问题都攻击到了)的策略，改为集中目标攻击，以退为进。他们当前的口号是：“我们是在向党提意见，帮助党整风呀！”“是帮助共产党整风， 不是我们自己整风呀！”以此号召其成员和舆论不要分散攻击目标。","type":"paragraph"},{"text":"就目前情况来看，右派动向有三：","type":"paragraph"},{"text":"第一，且战且退，前一段倡狂进攻之势速减，少数右派分子还在不时发出攻击言论。","type":"paragraph"},{"text":"第二，伪装起来，右派主脑分子开始时昏经隐蔽真面目，他们在座谈会上的反动言论不准登报，有的是下攻上不攻，即右派主脑分子多在幕后指挥，不亲自出头，只让其二、三把手露面进攻，谈到要害时，主脑分子从中插话，以收画龙点睛之效。","type":"paragraph"},{"text":"第三，耍无赖，现在已出现有的右派主脑分子装病，数请不到会。目前他们特别强调： ( 1 )提意见是响应党的号召，说错了不能怪我，发言难免有些偏激，应该言者无罪。(2)散佈翻案空气，说报上登他们的话是断章取义。(3 )散佈怀疑党的整风是否有诚意的空气。(4)强调储安平、葛佩琦的发言有代表性，你们这样围攻使很多人不服气。","type":"paragraph"},{"text":"中共福建省委针对目前情况提出：要继续“放”，继续“鸣”，要大争大鸣，动员和号召党团员起来击退右派的倡狂进攻；并强调在向右派反击时，要作到有理、有力、有节。斗争要达到的目的： ( 1 )使中间派和右派划清界限，把中间派争取过来。( 2)使民主党派中的左派得势，向右派夺取领导权。(据省委 召开的地市委书记会议上会报材料写的)","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参考》，第2231期，1957年6月15日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10061c9f0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
