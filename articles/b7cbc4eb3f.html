<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"福建民兵坚决响应毛主席号召抓革命促生产促战备  一手拿枪一手拿锄大闹春耕","authors":[],"dates":[{"year":1967,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"福建民兵坚决响应毛主席号召抓革命促生产促战备"},{"type":"paragraph","text":"一手拿枪一手拿锄大闹春耕"},{"type":"paragraph","text":"新华社福州二十六日电　地处海防前线的福建省广大民兵，在加强战备的同时，积极响应毛主席关于“抓革命，促生产”的伟大号召，一手拿锄，一手拿枪，在轰轰烈烈的无产阶级文化大革命中，掀起了大闹春耕生产的热潮。广大民兵一致表示："},{"type":"paragraph","text":"“抓革命，促生产”是我们伟大统帅毛主席的指示，毛主席的话句句要听，字字照办，坚决贯彻执行。"},{"type":"paragraph","text":"最近，福建前线民兵反复学习了《中共中央给全国农村人民公社贫下中农和各级干部的信》以及《人民日报》《抓革命，促生产，打响春耕生产第一炮》的社论，人人精神焕发，个个干劲倍增，誓夺今年工农业生产大丰收。他们说：毛主席信得过我们贫下中农，把革命和生产两副重担交给我们，这是我们贫下中农的最大光荣，我们决不辜负毛主席的期望，上刀山下火海也要不折不扣地完成这一光荣任务。许多民兵还纷纷写信和写决心书给各地武装部门，表示要永远忠于毛主席，忠于毛主席的革命路线，坚决执行“抓革命，促生产”的伟大号召，在春耕生产中当先锋，打头阵。"},{"type":"paragraph","text":"经过深入学习，广大民兵满怀胜利信心，迅速把“抓革命，促生产”的方针落实到了行动上。他们一面积极参加无产阶级文化大革命，一面大搞春耕生产。闽侯县东方红公社立新大队民兵，以“下定决心，不怕牺牲，排除万难，去争取胜利”的精神鼓舞自己，迎着寒风，跳到冰冷刺骨的河水里大挖泥肥。在民兵带动下，目前全大队已积好烂泥肥二万多担。莆田县湄洲公社下山大队民兵为了夺取粮食丰收，打算首先解决水源，他们自动组织了春耕突击队，白天开水井、挖水渠，晚上搞文化大革命。他们砌水井没有石料，女民兵张幼妹带领十多个民兵开山劈石，苦战了十五天，就打出了块石五十多立方米，终于建成了两口大水井。莆田县涵江公社苍林大队民兵连，在文化大革命的紧张情况下，主动修水利、挖水渠，大搞积肥。在民兵的积极带动下，全大队目前已经积了七千多担土杂肥，完成了积肥任务的百分之九十五，并且修筑了一条长达两华里的水渠，解决了水源。"},{"type":"paragraph","text":"福建省广大民兵在大搞生产的同时，他们日夜巡逻放哨，密切注视着敌人的动静，随时准备配合解放军歼灭胆敢来犯的敌人。广大民兵一致表示：我们地处海防前哨，面对着金门、马祖、台湾，敌人总是要千方百计进行捣乱的。我们不仅要抓革命促生产，还要抓革命促战备，遵照毛主席“绝对不可以稍微松懈自己的战斗意志”的教导，提高警惕，搞好战备，誓死保卫无产阶级文化大革命，保卫我们无产阶级铁打的江山。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"抓革命，促生产，为夺取春耕生产的胜利而奋斗！"},{"type":"paragraph","text":"中央工艺美术学院东方红公社创作"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7cbc4eb3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
