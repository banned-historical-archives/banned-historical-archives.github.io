script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿报谴责苏联领导人充当美帝“遏制中国”的帮凶  中国坚定地奉行彻底革命政策  帝国主义和修正主义反华必败","authors":[],"dates":[{"year":1966,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿报谴责苏联领导人充当美帝“遏制中国”的帮凶"},{"type":"paragraph","text":"中国坚定地奉行彻底革命政策"},{"type":"paragraph","text":"帝国主义和修正主义反华必败"},{"type":"paragraph","text":"新华社地拉那十五日电　阿尔巴尼亚《人民之声报》十五日发表一篇题为《帝国主义和修正主义的反华运动必将遭到可耻失败》的编辑部文章指出，在美帝国主义把全球战略的侵略矛头移向亚洲、特别是指向中华人民共和国的时候，他们伙同现代修正主义领导人掀起了一场疯狂的反华运动，企图用震耳欲聋的反华叫嚣来掩盖真理，掀起反共的歇斯底里，诽谤伟大的中国人民。美帝及其仆从在臭名远扬的“遏制中国”的口号下，正在策划危险的阴谋，准备进攻中国，并准备加紧侵略和扩大亚洲战争，用这种反华叫嚣为美国政府目前正在策划的战争阴谋打掩护。"},{"type":"paragraph","text":"文章指出，亚洲今天存在着汹涌澎湃的革命高潮和反帝斗争。亚洲各国人民、以及非洲和拉丁美洲各国人民都是由于受到美国的侵略、干涉以及美国的压迫才起来进行斗争的。只要美帝国主义进行侵略，只要它还是用一切手段和一切方式来压制和奴役别人，那么被压迫人民和国家也就只有用一切手段和方式来反对美帝国主义。"},{"type":"paragraph","text":"文章说，伟大的人民中国在亚洲、非洲、拉丁美洲人民和世界其他国家人民中间享有巨大的尊敬和威望，在国际舞台上有着十分巨大的影响，这是因为中国的革命榜样帮助这些国家的人民找到了争取自己解放的道路。"},{"type":"paragraph","text":"文章指出，人民中国为加强亚非各国人民的反帝团结、为维护和平与加强国际安全进行了不懈的斗争。人民中国奉行着彻底的革命政策，大力揭露了帝国主义者和赫鲁晓夫修正主义者互相勾结建立世界霸权的共同阴谋。"},{"type":"paragraph","text":"文章指出，正是因为中国遵循这一正确立场，中国遭到了美帝国主义的疯狂仇恨，它今天把中国看成是它建立世界霸权的主要的和最大的障碍。文章说，中国的革命、反帝、爱好和平的政策是使美帝国主义者不能得逞的巨大力量。"},{"type":"paragraph","text":"文章说，赫鲁晓夫修正主义领导人在支持帝国主义“遏制中国”的反华运动中扮演着十分卑鄙和可耻角色。苏联修正主义领导人千方百计地给中国马克思列宁主义的，爱好和平的对外政策抹黑、破坏它的威信。最近，他们的反华宣传和反华活动已经同帝国主义完全协调一致。他们采取了一系列更加恶毒的、同美帝国主义对中国的“火力包围圈”直接相联的步骤。长期以来背叛了世界各国人民利益的苏联领导人已经成为美帝国主义实现“遏制中国”政策的忠实支持者和帮凶。"},{"type":"paragraph","text":"文章接着指出，美帝国主义者及其支持者的这些疯狂的反华行动，只能表明他们的虚弱，只能表明他们遭受了失败，而又无法阻止革命斗争的发展。如果美帝国主义由于疯狂，完全丧失理智，胆敢进攻中国，那末，它将在那里遭到不可避免的死亡。"},{"type":"paragraph","text":"文章说：人民中国一向出色地履行着她的光荣的国际主义义务。中国人民和以毛泽东同志为首的光荣的共产党，高举着马列主义和无产阶级国际主义的胜利旗帜，站在反对帝国主义、反对现代修正主义的斗争最前线。在从意识形态上和政治上完全粉碎修正主义、捍卫马列主义纯洁性的斗争中，他们过去和现在都作出了具有重大世界历史意义的卓越贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe77b3448c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
