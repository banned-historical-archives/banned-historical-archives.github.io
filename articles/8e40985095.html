uthors":[],"dates":[{"year":1956,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京11日专电】　全国工商联代表大会第二天上午，由工商联副主任委员荣毅仁代表工商联第一届执委会作了“三年来的工作报告”。下午进行分组讨论。今日下午讨论的中心是:关于薄一波副总理报告中赎买政策部分。各地代表发言颇为热烈。尤其是中、小工商业者代表们，都感谢党和毛主席对他们的关怀，有的说生活在中国的资产阶级既幸运，又光荣；也有人在发言的第一句中便说，昨夜便兴奋了一晚。上海好几位代表以“很笃定”形容自己的心情。可是不同的阶层，在具体问题上也有不同的心情:听到至少在第二个五年计划期间定息不取消的人，则有点喜出望外，准备这次摘掉资产阶级帽子的人，思想上虽然通了些，可是，总觉得又要等几年，心里不好受。中小工商业者则普遍欢迎，可是也有人打听戴上那顶小资产阶级或上层小资产阶级的新帽子后，能不能进工会享受劳保待遇?代表们的不同心情中，有一种声音是共鸣的:国家这样看得起我们，我们应该勤俭办好企业，国家要我们拿定息，我们拿了钱也绝不能大吃大喝、铺张浪费。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e40985095"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
