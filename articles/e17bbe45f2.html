hors":[],"dates":[{"year":1978,"month":11,"day":24}],"is_range_date":false,"parts":[{"text":"湖南日报政治处关于摘帽问题给朱正的回信","type":"title"},{"text":"朱正：","type":"paragraph"},{"text":"来信已收到。","type":"paragraph"},{"text":"在抓纲治国初见成效的大好形势下，华主席、党中央高举毛主席伟大旗帜，继承毛主席遗志，贯彻党的十一大路线，作出全部摘掉右派分子帽子的英明决定。这对于调动一切积极因素，化消极因素为积极因素，促进安定团结，巩固无产阶级专政，实现新时期的总任务，有着重要意义。","type":"paragraph"},{"text":"对于贯彻执行中央十一、五十五号文件精神，我们作了一些准备工作，待省委具体部署后，对你反映的问题，我们会认真研究处理的，并会把研究的意见告诉你。在这期间望你努力学习马列、毛主席著作，坚守岗位，努力搞好本职工作，为社会主义事业作出更多的贡献，以不辜负华主席、党中央对我们的关怀与期望。","type":"paragraph"},{"text":" 湖南日报政治处一九七八年十一月廿四日","type":"paragraph"},{"text":" 来源：朱正《小书生大时代》，北京大学出版社，1999年。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e17bbe45f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
