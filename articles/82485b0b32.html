ear":1949,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席朱总司令接见青代大会代表"},{"type":"paragraph","text":"【北平新华广播电台广播】中共中央毛主席、朱总司令、刘少奇同志在十二日接见中华全国青年第一次代表大会的全体代表，当全国的青年代表们看见了中国人民伟大的领袖时，他们发出热烈的欢呼，鼓掌声和“毛主席万岁”“朱总司令万岁”的口号声，长时间地不断地响着。在庄严的军乐声中，大会向毛主席、朱总司令献旗，鲜红的大旗上写着“毛主席、朱总司令：我们向你们学习，在你们的旗帜下前进”。接着，由东南、西南、华南、台湾等代表团献旗，他们的代表热情地表示出他们要尽一切力量来迎接人民解放军南下，为解放全中国而努力。刘少奇同志和朱总司令向代表们讲了话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82485b0b32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
