ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对棉花收购、分配和战略储备情况摘报的批语","alias":"","parts":[{"type":"paragraph","text":"对棉花收购、分配和战略储备"},{"type":"paragraph","text":"情况摘报的批语"},{"type":"paragraph","text":"（1965年4月29日）江青："},{"type":"paragraph","text":"此件可阅。形势大好。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿九日我今日离此去别地爬山。又及"},{"type":"paragraph","text":"[1]指中共中央办公厅机要室1965年4月18日编印的《文电摘要》第五十八号登载的《关于棉花收购、分配和战略储备情况》。摘报说，全国供销合作总社党组报告：1964年棉花生产在上年丰收的基础上，又获得了大幅度的增产。预计可收购3100万担，比1963年增加1000万担，超过了1957年度（2700万担）的水平。由于棉花收购增多，供应上比较主动。今年安排供应纺纱用棉2438万担，可纺纱630万件，比上一年度增加41%。絮棉平均每人供应四点九两，比上一年度增加了二两。国家储备200万担外，周转库存比原计划增加210万担。拟从1964年度收购的棉花中拿出200万担，作为战略储备。还打算从1965年度新棉中再拿出100万担作为战略储备，要求在1965年年底全部入库。"},{"type":"paragraph","text":"[2]指武汉市。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":4,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":32,"page_end":32},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a192784ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
