ear":1980,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平接受卢森堡电视台记者采访"},{"type":"paragraph","text":"新华社北京四月二十九日电　国务院副总理邓小平今天上午接受了卢森堡电视台制片主任鲍利、音响师努斯鲍姆、摄影师桑蒂尼的电视采访。"},{"type":"paragraph","text":"邓小平就卢森堡朋友提出的关于中国的政治、经济和国际形势、国际共运等问题一一作了回答。"},{"type":"paragraph","text":"据了解，卢森堡朋友拍摄的这部电视纪录片，将在欧洲电视联合会成员卢森堡广播电视台、英国广播公司、西德电视二台、法国电视一台、意大利广播电视台和丹麦广播电台组织的电视联播节目中播放。鲍利先生曾两次访华，并拍摄了一部可放映四十分钟的电视纪录片，在今天的采访结束时，他把这部电视影片的拷贝赠送给邓小平。（附图片）"},{"type":"paragraph","text":"邓小平副总理四月二十九日接受了卢森堡电视台记者的采访。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f0e9383cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
