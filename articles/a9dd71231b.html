script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"团结菜贩减轻中间剥削 蔬菜联合营业处成立暂做批发业务菜贩可享优待办法","authors":[],"dates":[{"year":1950,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市郊合作总社为使蔬菜生产者与消费者直接交易联系，减轻中间剥削；曾于本年三月十六日成立‘上海市郊合作社蔬菜联合办事处’。先后在江湾、真茹、大场、龙华、北新泾五郊区建立了蔬菜供销站，减低行佣，收购菜农产品；并与人民革命大学、大夏、同济等团体订立合约，以较市价低一成的价格，直接供应蔬菜；三个月来，对于减轻中间剥削，团结菜贩，曾获得一定成绩。现该处为进一步协助稳定蔬菜市场价格，并谋与消费团体取得更密切的联系，减轻生产者行佣负担，团结菜贩起见，决定了在市处设立两个营业处。第二营业处设在河南北路彭泽路菜市场。已于本月一日正式营业。第一营业处设在西藏路泥城桥北市场内，定今日开业。两个营业处暂都限于批发业务，只收内佣五分。对菜贩亦有资金通融办法(即先运菜后付钱)，消费团体如要大批购买，该处可以包送。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9dd71231b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
