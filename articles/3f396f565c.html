script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"撤换领导不力的干部　克服了右倾思想上海市土产公司反贪污斗争战果辉煌贪污分子夏元吉等在坦白检举大会上坦白了不法行为","authors":[],"dates":[{"year":1952,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　中国土产公司上海市公司于三月七日下午六时一刻，举行坦白检举大会，会上并吸收贪污分子家属参加。"},{"type":"paragraph","text":"大会由上级增产节约委员会特派员王佐群同志担任主席。他说明从上海土产公司上次坦白检举大会以来的二十天中，由于大力与右倾思想作斗争，并坚决撤换了打“虎”不力的领导干部；同时由于同志们在斗争中提高了自己，取得了新的打“虎”经验，已使运动猛烈展开，取得成绩；二十天中，打出“老虎”六十四只。如业务科，本来“老虎”一只也没有打出来，自呈请上级把存在“思想老虎”的科长单裕民撤职后，立即打出了八只“老虎”。王佐群并号召全体同志再接再厉，有勇有谋，争取更大的成绩。"},{"type":"paragraph","text":"贪污分子夏元吉、陆世贤、周水端在大会上坦白了自己罪行。因坦白较为诚恳，并表示要求立功赎罪，参加打虎队，群众表示满意。在群众要求下，主席点名大贪污犯孙唯一(第一营业部主任)上台坦白。他谈了一些鸡毛蒜皮的事，对自己罪行拒不交代，态度非常恶劣，立即激起群众无比愤怒，高喊“拒不坦白，严厉惩办!”嘘他下台，当场由孙唯一的同谋犯、胁从分子童百先上台检举大贪污犯孙唯一的滔天罪行。"},{"type":"paragraph","text":"该公司经理李明在控诉大贪污犯黄公杰的罪行(见另文)并宣布已由人民政府逮捕后；当场宣布夏元吉、陆世贤、周水端等一批贪污分子，尚能主动坦白，准予戴罪立功，请求上级宽大处理；又宣布孙唯一等贪污犯迅速向自己部门领导上坦白。"},{"type":"paragraph","text":"市工商局副局长杨延修同志在会上讲话，他说明土产公司上海市公司打“虎”成绩取得的原因，说明资产阶级是如何猖狂的向我国营企业进攻，如何进行无耻盗窃的行动，又反复说明政策。他并号召同志们一面再接再厉，围剿“老虎”；一面要抽出力量，搞好日常业务。"},{"type":"paragraph","text":"会议在紧张、热烈的气氛中进行，“放下包袱，彻底坦白，检举别人，戴罪立功!”与“拒不坦白，加重处分!”的口号声，响彻整个会场。大会在结束前，主席王佐群同志号召贪污分子家属应积极帮助贪污分子进行坦白。"},{"type":"paragraph","text":"大会给全体与会者一个显明的印象:贪污分子拒不坦白，就要走黄公杰的路；只有彻底坦白自己的罪行，才能得到宽大处理，还能戴罪立功。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f396f565c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
