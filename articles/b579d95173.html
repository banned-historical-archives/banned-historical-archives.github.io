ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对一个工人关于物价上涨的来信的批语","alias":"","parts":[{"type":"paragraph","text":"对一个工人关于物价上涨的"},{"type":"paragraph","text":"来信的批语!"},{"type":"paragraph","text":"（1962年3月4日）先念同志："},{"type":"paragraph","text":"请你找几个内行同志在一起，研究一下，看这个文内所提两项办法是否可能做到，怎样做到，何时做到。如有结果，请告我。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日"},{"type":"paragraph","text":"[1]这个批语写在中共中央办公厅秘书室1962年2月23日编印的《群众反映》第十三期上。这一期登载了上海市工人金祥根1962年2月12日给毛泽东的信，信中说，最近物价不断提高，真使人坐卧不宁。我们工人响应党的号召，节衣缩食，10多年来积蓄的一些钱，眼看着一天天地贬值，心里比刀割还难过，现在有很多人看到这种情况，不想再储蓄了。为此，我提出两项建议：（一）政府尽最大努力稳住物价，使人民对币值有充分的信心。（二）每月公布物价总指数，存款采取保本保值的办法。"},{"type":"paragraph","text":"[2]先念，即李先念，当时任中共中央书记处书记、中央财经小组副组长、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":95,"page_end":95},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b579d95173"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
