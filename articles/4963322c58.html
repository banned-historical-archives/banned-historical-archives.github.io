script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"aee1f9e8-a37b-4f7a-8a7c-bcea461eb5fc","name":"红旗一九七五年第二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/aee1f9e8-a37b-4f7a-8a7c-bcea461eb5fc.pdf"],"article":{"title":"中华人民共和国第四届全国人民代表大会第一次会议关于政府工作报告的决议","alias":"","parts":[{"type":"paragraph","text":"到底。"},{"type":"paragraph","text":"我们必须坚持无产阶级国际主义，坚决、彻底、干净、全部地消灭大国主义。我们永远不称霸，永远不做超级大国，永远站在全世界被压迫人民和被压迫民族一边。"},{"type":"paragraph","text":"在毛主席为首的党中央领导下，我国人民奋发图强，战胜种种艰难险阻，只用了二十多年的时间，就把一个贫穷落后的国家变成初步繁荣昌盛的社会主义国家。我们再用二十多年的时间，一定能够在本世纪内把我国建设成为社会主义的现代化强国。我们应当继续努力，发扬成绩，克服缺点，谦虚谨慎，戒骄戒躁，乘胜前进。在毛主席革命路线指引下，团结起来，争取更大的胜利！"},{"type":"paragraph","text":"中华人民共和国第四届全国人民代表大会第一次会议"},{"type":"paragraph","text":"关于政府工作报告的决议"},{"type":"paragraph","text":"（一九七五年一月十七日通过）"},{"type":"paragraph","text":"第四届全国人民代表大会第一次会议批准周恩来总理代表国务院向大会所作的《政府工作报告》。会议认为，从三届人大以来，国务院在毛主席为首的中国共产党中央委员会的领导下，在毛主席无产阶级革命路线的指引下，经过无产阶级文化大革命和目前正在全国普遍开展的批林批孔运动，对内对外的各项工作都取得了巨大的成就。到会代表深信，我们再用二十多年的时间，一定能够在本世纪内把我国建设成为社会主义的现代化强国。"}],"authors":[],"dates":[{"year":1975,"month":1,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":30,"page_end":30},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"中华人民共和国第四届全国人民代表大会第一次会议关于政府工作报告的决议","alias":"","parts":[{"type":"paragraph","text":"抵准，不受逮捕。第二十九条中华人民共和国对于任何由于拥护正义事业、参加革命运动、进行科学工作而"},{"type":"paragraph","text":"受到追害的外国人，给以居留的权利。"},{"type":"paragraph","text":"第四章国旗、国徽、首都第三十条国旗是五星红旗。"},{"type":"paragraph","text":"函徽，中词是五星照耀下的天安门，周围是谷穗和齿轮。首都是北京。"},{"type":"paragraph","text":"（新华社1975年1月19日讯，载1月20Ⅱ《人民[1报》）华人民共和国第四届全国人民代表大会"},{"type":"paragraph","text":"第一次会议关于政府工作报告的决议"},{"type":"paragraph","text":"（一九七五年一月十七日通过）"},{"type":"paragraph","text":"第四居全国人民代表大会第一次会议批准周恩来总理代表国务院向大会所作的《政府工作报告》。会议认为，从三届人大以来，国务院在毛主席为首的中国共产党中央委员会的领导下，在毛主席无产阶级革命路线的指引下，经过无产阶级文化大革命和目前正在全国普遍开展的批林批孔运动，对内对外的各项工作都取得了巨大的成就。到会代表深信，我们再用二十多年的时间，一定能够在本世纪内把我国建设成为社会主义的现代化强国。"},{"type":"paragraph","text":"（新华社1975年1月20日讯，载1月21日《人民日报》）中华人民共和国全国人民代表大会公告"},{"type":"paragraph","text":"（一九七五年一月十九日）"},{"type":"paragraph","text":"中华人民共和国第四届全国人民代表大会第一次会议于一九七五年一月十七日根据中国共产党中央委员会的提议，任命了中华人民共和国国务院总理、副总理、各部部长、各委员会主任。现公告如下：总理周恩来"},{"type":"paragraph","text":"副总理陈锡联"},{"type":"paragraph","text":"副总理纪登奎副总理邓小平"},{"type":"paragraph","text":"副总理华国锋：总理张春侨副总理李先念"},{"type":"paragraph","text":"副总理陈水贵"}],"authors":[],"dates":[{"year":1975,"month":1,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":228,"page_end":228},"tags":[{"name":"周恩来","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中华人民共和国第四届全国人民代表大会第一次会议关于政府工作报告的决议","authors":[],"dates":[{"year":1975,"month":1,"day":17}],"is_range_date":false,"parts":[{"text":"中华人民共和国第四届全国人民代表大会第一次会议关于政府工作报告的决议（一九七五年一月十七日通过）","type":"title"},{"text":"第四届全国人民代表大会第一次会议批准周恩来总理代表国务院向大会所作的《政府工作报告》。会议认为，从三届人大以来，国务院在毛主席为首的中国共产党中央委员会的领导下，在毛主席无产阶级革命路线的指引下，经过无产阶级文化大革命和目前正在全国普遍开展的批林批孔运动，对内对外的各项工作都取得了巨大的成就。到会代表深信，我们再用二十多年的时间，一定能够在本世纪内把我国建设成为社会主义的现代化强国。","type":"paragraph"},{"text":" （新华社一九七五年一月二十日讯）","type":"paragraph"}],"comments":[],"origin":"原载《人民日报》1975年`1月19日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"t
