nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"林杰讲话─揪出军内“一小撮”，我们的军队就更强大，更巩固","parts":[{"type":"title","text":"897.林杰讲话"},{"type":"paragraph","text":"─揪出军内“一小撮”，我们的军队就更强大，更巩固"},{"type":"paragraph","text":"(1967年8月9日晚)"},{"type":"paragraph","text":"现在全国不仅是温州的问题，温州是浙江的一个焦点，看来全国有一些地方的形势很紧张，越紧张越有好处。毛主席说过，那里乱子出得越大，那里就越有希望。现在两个阶级，两条路线的斗争已经到了关键时刻。军内“走资派”是在支左过程中暴露的，如赵永夫、陈再道。军内“走资派”必然勾结地方“走资派”，对他们，就是要发动亿万群众，把他们揪出来打例，揪出军内“一小撮”，我们的军队就更强大，更巩固，这与拥军是一致的。"}],"authors":["林杰"],"dates":[{"year":1967,"month":8,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":339,"page_end":339,"alias":""},"tags":[{"name":"林杰","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e010e6a4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
