ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"对新疆赵锡光、鲍尔汉、马良骏等祝贺中央人民政府成立的复电","alias":"","parts":[{"type":"paragraph","text":"对新疆赵锡光、鲍尔汉、马良骏等"},{"type":"paragraph","text":"祝贺中央人民政府成立的复电"},{"type":"paragraph","text":"（1949年10月10日、21日）赵锡光将军："},{"type":"paragraph","text":"一日电悉。新疆和平解放，全国欣慰。望南疆驻军全体官兵，团结一致，为改造自己成为人民军队而努力。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十日鲍尔汉主席，并转新疆省临时人民政府全体委员："},{"type":"paragraph","text":"感谢你们的祝贺。望与人民解放军及全新疆各民族人民团结一致，推行共同纲领，为建设新新疆而努力。"},{"type":"paragraph","text":"毛泽东一九四九年十月二十一日对新疆赵锡光、鲍尔汉、马良骏等祝贺中央人民政府成立的复电"},{"type":"paragraph","text":"三马良骏先生，并转全疆回胞均鉴："},{"type":"paragraph","text":"感谢你们的祝贺。希望你们协助人民解放军和人民政府，团结各族人民，遵照共同纲领，实行真正的人民民主，为建设新新疆而努力。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"朱德一九四九年十月二十一日"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":10},{"year":1949,"month":10,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":388,"page_end":389},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e78fce128c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
