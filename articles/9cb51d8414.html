","authors":[],"dates":[{"year":1967,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）主席希尔赞扬中国文化大革命对世界革命作出重要贡献"},{"type":"paragraph","text":"革命造反派夺权夺得好"},{"type":"paragraph","text":"新华社墨尔本三日电　澳大利亚共产党（马克思列宁主义者）主席爱·弗·希尔，在二日一期的澳共（马列）机关报《先锋报》上发表文章，热烈赞扬毛泽东思想和在毛泽东思想指导下进行的中国无产阶级文化大革命。文章指出：“这场革命的成功对于世界革命斗争有着极为重要的意义。这是对世界革命运动发展的一个十分重要的贡献。”"},{"type":"paragraph","text":"希尔同志在这篇题为《我们向震撼世界的中国无产阶级文化革命致敬》的文章中写道：中国“正在发生巨大的变化”，“革命群众造反了，革中国共产党内那些走资本主义道路当权派的命。他们必须造反，他们必须坚持不懈地造反。这是好得很的造反。他们必须夺回被资产阶级分子篡夺的权。他们必须把权力夺归自己。”"},{"type":"paragraph","text":"文章指出：“毛泽东思想是为无产阶级革命的彻底胜利而进行的阶级斗争的最高指导。如果照毛泽东思想办事，那末无产阶级革命的胜利就有了保证。如果压制、无视毛泽东思想，或者对它采取消极态度，那末无产阶级革命就要失败。"},{"type":"paragraph","text":"“毛泽东思想是帝国主义崩溃、社会主义胜利时代的马克思列宁主义。马克思列宁主义是无产阶级对资产阶级造反的理论和实践。毛泽东思想就是当代发展到最高峰的这种理论。”"},{"type":"paragraph","text":"文章接着写道：中国的无产阶级文化大革命“已经把马克思列宁主义的顶峰毛泽东思想传播给中国的亿万人民，传播给全世界亿万人民。这意味着无产阶级革命的蓬勃高涨。……敌人对此肯定要反对，并且已因此而很感不安。我们当然支持它，当然为它感到欢欣鼓舞。现在中国和全世界人民都从学习毛泽东著作中得到很大的教育，毛泽东著作给了革命斗争光辉的指导。”"},{"type":"paragraph","text":"文章最后表示坚信，中国的无产阶级文化大革命定将取得辉煌的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cb51d8414"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
