ial":false,"type":"unknown","files":[],"article":{"title":"Internal documents that are inconsistent with facts must also be more correct","dates":[{"year":1982,"month":2,"day":2}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态：1982 (选编) , 28","tags":[],"parts":[{"type":"title","text":"Internal documents that are inconsistent with facts must also be more correct"},{"type":"paragraph","text":"In a letter from the Ministry of Education Party cell on January 19 this year, comrade Hu Qiaomu expressed the following opinions: \"All reports in internal publications that in some part contain inconsistencies with facts must in the same publications publish still more correct declarations, making every effort to cultivate a trustworthy and responsible style, in the same way as public reporting. The appearance of parts inconsistent with facts in material for internal reference is difficult to avoid; once they have appeared, one must still proceed with a responsible attitude.\""},{"type":"subtitle","text":"(Issue 6, February 2)"},{"type":"paragraph","text":"Translated by Michael Schoenhals"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f3c3d4d5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
