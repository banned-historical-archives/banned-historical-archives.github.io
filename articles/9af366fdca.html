" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-4756","name":"国务院关于停办农垦学校问题给安徽省军管会的批复","author":"国务院","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"国务院关于停办农垦学校问题给安徽省军管会的批复","dates":[{"year":1968,"month":3,"day":18}],"is_range_date":false,"authors":["国务院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国务院知青办, 知青工作文件选编, 71","tags":[],"parts":[{"type":"title","text":"国务院关于停办农垦学校问题给安徽省军管会的批复"},{"type":"subtitle","text":"（一九六八年三月十八日）"},{"type":"subtitle","text":"（68）国发文45号"},{"type":"paragraph","text":"一九六八年二月十二日报告收悉。关于停办你省过去用安置经费办的农垦学校的问题，仍请省军管会负责继续处理。坚持知识青年下乡上山的正确方向，动员各校现有学生到农村社队落户，一定要高举毛泽东思想伟大红旗，突出无产阶级政治，以斗私批修为纲，充分做好思想政治工作。所需安置经费可列入今年年度安置计划指标内，不必专案另报。一定要坚决贯彻执行伟大领袖毛主席“要进一步节约闹革命”的指示，充分利用各校现有的生产生活资料，能不花钱的事就不花钱，依靠群众，坚持发扬我党艰苦奋斗的光荣传统。"}],"alias":""},"tags":[{"name":"安徽文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9af366fdca"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
