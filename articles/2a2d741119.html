art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟毛主席从胜利走向胜利","authors":["北京部队空军学习毛主席著作积极分子/护士长张盛梅"],"parts":[{"type":"paragraph","text":"毛主席穿着一身军装，满面红光，精神焕发，出现在天安门城楼上。我万分激动、淌着热泪高呼：“毛主席万岁！万万岁！”一九六四年，我参加国庆观礼，曾见到了毛主席。现在，他老人家比两年前更健康、更年青了！在这文化大革命的关键时刻，毛主席穿上军装和我们在一起，意义无比重大。最敬爱的领袖毛主席，您是我们的伟大统帅。过去，您穿着军装，领导我们推翻了三座大山，在社会主义革命和社会主义建设中取得了一个又一个的伟大胜利；今天，您又穿上军装，亲自指挥我们打响了文化大革命的“战役”，一定能把“一斗、二批、三改”搞彻底，打倒一切牛鬼蛇神，取得更加伟大的胜利！"},{"type":"paragraph","text":"毛主席是我们革命事业的伟大舵手，是我们革命战士心中的红太阳！我党我军斗争的历史，就是毛泽东思想胜利的历史；我党我军几十年来一系列伟大胜利。就是毛泽东思想的伟大胜利。我自己进步成长，也完全靠的是毛泽东思想的雨露阳光。我是一个苦孩子，是党解放了我，是毛泽东思想哺育了我。入伍后，我反复学习了毛主席著作，使我心明眼亮，把自己的苦和全中国人民的苦、全世界人民的苦联系起来了，把自己的工作和全中国人民的幸福、全世界人民的解放联系起来了，心中有了阶级的大事，人民的大事，国家的大事，世界的大事，浑身就有了使不完的劲儿。毛泽东思想是我们智慧和力量的源泉，毛泽东思想百战百胜。真是千胜利，万胜利，都是毛泽东思想的伟大胜利！"},{"type":"paragraph","text":"我们坚决响应毛主席把无产阶级文化大革命进行到底的伟大号召，大破资产阶级思想，大立毛泽东思想，永远紧紧跟着毛主席在阶级斗争的大风大浪里奋勇前进！不管在什么时候，不管是什么人，只要反对毛泽东思想，我们就把他砸个稀巴烂！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a2d741119"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
