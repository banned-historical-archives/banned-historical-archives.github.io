:[{"year":1997,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东诗词交响合唱音乐会在京举行"},{"type":"paragraph","text":"新华社北京５月２６日电（记者秦杰）为纪念毛泽东同志《在延安文艺座谈会上的讲话》发表５５周年，中国唱片总公司和广东省出版总公司昨天和今天在北京音乐厅联合主办“毛泽东诗词交响合唱音乐会”。"},{"type":"paragraph","text":"新中国成立以来，一大批著名的作曲家怀着深厚的敬意为毛泽东诗词谱曲，这些极富魅力的音乐作品赢得了人民的喜爱，成为中国音乐史册中的重要篇章。"},{"type":"paragraph","text":"这台晚会由中国交响乐团合唱团担任合唱，中央歌剧芭蕾舞剧院交响乐团伴奏，严良堃指挥。"},{"type":"paragraph","text":"一批老、中、青歌唱家和著名播音员在晚会上表演了毛泽东诗词作品。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"512f7e35b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
