year":1976,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋、姚文元同凯山、西巴色会谈"},{"type":"paragraph","text":"新华社一九七六年三月十五日讯　中共中央政治局委员、国务院代总理华国锋，中共中央政治局委员姚文元，同老挝党政代表团团长、老挝人民革命党总书记、老挝人民民主共和国政府总理凯山·丰威汉，副团长、老挝人民革命党中央委员会政治局委员、政府副总理兼外交部长奔·西巴色，今天下午举行会谈。"},{"type":"paragraph","text":"会谈在兄弟般亲切友好的气氛中进行。"},{"type":"paragraph","text":"老挝方面参加会谈的有：老挝党政代表团团员西宋喷·洛万赛、西沙瓦·乔本潘、梅索·塞宋平、西沙纳·西山、塔汶·西扎伦，代表团随行人员坎佩·平芒、苏利马、布阿西、坎蓬·布达坎、坎宁、宋萨瓦、邦·苏林富米。"},{"type":"paragraph","text":"中国方面参加会谈的有：耿飚、乔冠华、方毅、姚依林、张才千、韩念龙、沈平、朱传贤、邱力行、国鹰等有关方面负责人。"},{"type":"paragraph","text":"华国锋、姚文元同志同凯山、西巴色同志举行会谈。"},{"type":"paragraph","text":"新华社记者摄（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7aca5d7208"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
