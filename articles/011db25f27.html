rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底摧毁资产阶级司令部","authors":["高等军事学院“红联”兵团"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“帝国主义者和国内反动派决不甘心于他们的失败，他们还要作最后的挣扎。”一年多来无产阶级文化大革命的伟大实践，使我们深深地懂得了这个真理。一切阶级敌人，是决不会在一次较量过后，就认输投降的。他们必然要作拚死的挣扎。"},{"type":"paragraph","text":"随着阶级斗争的深入发展，迫使敌人不断地改变反革命策略。他们从右的方面或极“左”的方面，或者同时从“左”、右两个方面，干扰毛主席的伟大战略部署，把他们的黑手伸到革命派内部来，祭起“打倒一切，怀疑一切”的“法宝”，把矛头直接指向毛主席的无产阶级司令部，指向毛主席亲自缔造和领导的，林副主席亲自指挥的人民解放军。大搞反革命地下活动的所谓“五·一六兵团”，就是一小撮阶级敌人操纵的反革命组织。他们炮打无产阶级司令部，妄图破坏和分裂我们人民解放军，从而达到破坏无产阶级文化大革命的目的。是可忍，孰不可忍！"},{"type":"paragraph","text":"以毛主席为首的无产阶级司令部和中国人民解放军，绝不允许敌人破坏和分裂。"},{"type":"paragraph","text":"保卫以毛主席为首的无产阶级司令部，是关系到中国人民千秋万代根本利益的大事，是关系到全世界人民革命根本利益的大事。我们高等军事学院“红联”兵团的全体战士，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的无产阶级革命路线。我们决心紧跟毛主席的伟大战略部署，牢牢掌握斗争大方向，誓做革命的大批判的模范，做革命大联合的模范，做爱民的模范。保持高度的革命警惕性，严防阶级敌人的破坏和捣乱。为保卫无产阶级文化大革命立新功。"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"011db25f27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
