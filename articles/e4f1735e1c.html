],"dates":[{"year":1950,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十八日电】　马来亚民族解放军继续在各地展开广泛的作战，反击英国殖民地当局发动的所谓“反匪月”。据英美各通讯社报道，本月十七日夜，马来亚民族解放军烧毁了离柔佛七英里的肯帕斯车站。路透社承认这是马来亚南部多时以来首次的铁路大破坏。二十日夜，解放军又在柔佛附近袭击了由新加坡开往吉隆坡的火车，击伤英国军官三名及廓尔喀士兵一名。二十一日，解放军并在霹雳州北部击毙了一个马来亚锡矿的英国老板及其助手一名，护送他们的两个特种警察及一名司机也被击伤。同日，解放军在吉打州双溪大年地区袭击了英殖民地当局的警察巡逻队，击毙英国警长一名，击伤警察四名。同日晚，解放军在槟榔屿用手榴弹击伤了一名英国“志愿军”班长及六名“志愿兵”。解放军于二十二日在吉隆坡市郊袭击了保安警察，五名警察被击伤。英国自由党的新闻纪事报二十二日承认:“不论官方如何再三保证，马来亚的情况却是每况愈下，而不是日趋好转”(法新社)。据美联社伦敦消息:英殖民大臣葛里菲斯二十二日在下院宣布:至三月三日为止的三个月中，马来亚游击队共击毙英军官兵十一人，警察七十六人，击伤官兵二十四人，警察六十二人。"},{"type":"paragraph","text":"另一方面，英国正继续加强其对马来亚人民武装的镇压，据路透社二十一日消息:英国已任命前驻缅甸总司令布雷格中将为马来亚作战总司令，以统一指挥对游击队的战争，英陆军大臣斯特拉彻二十一日在众院称，已有五十六辆装甲汽车及其他作战物资运往马来亚，另有六十辆将于本月内运去。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4f1735e1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
