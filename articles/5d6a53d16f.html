script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发扬先辈坚强斗争光荣传统　贯彻马克思列宁主义正确路线阿尔巴尼亚发表庆祝独立五十周年的决定各国人民不怕帝国主义，也不怕原子武器。唾弃现代修正主义者要求各国　人民向帝国主义妥协让步，危害民族独立、社会主义和世界和平的企图","authors":[],"dates":[{"year":1962,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那21日电】　阿尔巴尼亚劳动党中央委员会、人民议会主席团和部长会议21日联合发表了关于庆祝阿尔巴尼亚独立五十周年的决定。"},{"type":"paragraph","text":"决定指出，1912年11月28日阿尔巴尼亚宣布民族独立，是伟大的具有历史意义的胜利。它实现了阿尔巴尼亚人民世世代代的理想。阿尔巴尼亚人民为实现这一理想，在同强大、狡猾和野蛮的敌人进行的斗争中，血流成河，作出了无数的牺牲。阿尔巴尼亚人民要世世代代感激和纪念那些不辞辛苦，终生奋斗，流血牺牲的卓越的爱国者。"},{"type":"paragraph","text":"决定说，阿尔巴尼亚解放十八年以来，已经发生了巨大的变化。现在，阿尔巴尼亚的工厂矿山在十二天内生产的工业产量，相当于1938年阿尔巴尼亚全年的产量。这些巨大的胜利是阿尔巴尼亚人民劳动与斗争和阿尔巴尼亚劳动党马克思列宁主义正确领导的结果。在取得这些胜利时，阿尔巴尼亚人民也不断得到苏联、中国和其他社会主义国家的援助和支持。"},{"type":"paragraph","text":"决定指出，维护国家的自由、独立和建设社会主义的保证，过去和今后都首先是阿尔巴尼亚人民在以霍查同志为首的劳动党中央周围的钢铁般的团结。党和人民的这种团结，是在民族解放战争的战火中产生的；是在艰苦困难的岁月里用鲜血锤炼出来的；是在建设社会主义的劳动和斗争中加强起来的；是在同帝国主义及其走卒现代修正主义者的不断斗争中巩固起来的。这种团结经受了许多考验，坚不可摧。在阿尔巴尼亚人民钢铁般的团结面前，帝国主义者和南斯拉夫修正主义者的一切阴谋诡计都碰了壁，并遭到了粉碎。但是，帝国主义者永远不会放弃其千方百计阻挠阿尔巴尼亚人民进行和平劳动的计划，不会放弃侵犯阿尔巴尼亚的自由和独立并颠复阿尔巴尼亚社会主义制度的活动。阿尔巴尼亚人民必须不断提高警惕，加强祖国的防御能力。阿尔巴尼亚人民非常清楚，只要帝国主义存在一天，就存在着战争的危险。以美国为首的帝国主义者永远是侵略者，是各国人民的自由和独立的最凶恶的敌人。已经受到沉重打击的帝国主义正在进行垂死挣扎。但是，任何力量也挽救不了帝国主义的死亡。历史的车轮不会倒转。各国人民不怕帝国主义，也不怕原子武器。各国人民唾弃现代修正主义者的要求各国人民向帝国主义妥协让步，危害民族独立、社会主义和世界和平的企图。"},{"type":"paragraph","text":"决定说，阿尔巴尼亚劳动党中央委员会、人民议会主席团和部长会议号召阿尔巴尼亚全国工人、农民、人民知识分子、青年和妇女学习和发扬先辈的争取自由、独立和为建立人民政权而进行斗争的光荣传统，加强在阿尔巴尼亚劳动党周围的团结，贯彻执行劳动党的马克思列宁主义正确路线，实现劳动党第四次代表大会的决议，完成进一步加强和繁荣祖国的宏伟计划。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d6a53d16f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
