art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中罗两国关系发展很好","authors":[],"parts":[{"type":"paragraph","text":"据新华社6月17日讯 中共中央副主席邓小平今天上午会见了罗马尼亚外长斯特凡·安德烈。"},{"type":"paragraph","text":"安德烈向邓小平转达了齐奥塞斯库同志和罗共中央领导同志的热情友好问候和良好祝愿。他说，我这次访问，同赵紫阳、谷牧和黄华同志进行了很好的建设性的谈话。罗马尼亚祝愿人民中国强大起来。我们将努力发展同中国的友好关系，并加强同中国的团结。"},{"type":"paragraph","text":"邓小平说，中罗两国关系发展很好。我们两国对重大国际问题的看法有着广泛的一致。我们两党两国领导人经常交流情况是很有益处的。他请安德烈外长回国后转达对齐奥塞斯库同志的亲切问候。"},{"type":"paragraph","text":"邓小平向罗马尼亚同志介绍了我国国内政治经济形势。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5882c174d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
