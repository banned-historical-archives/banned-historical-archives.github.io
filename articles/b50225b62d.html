script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《大众日报》重视批判资产阶级自由化观点","authors":["孔瑞"],"dates":[{"year":1991,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《大众日报》重视批判资产阶级自由化观点"},{"type":"paragraph","text":"去年１１月以来，《大众日报》“理论学习”专刊发表了多篇文章，批判资产阶级自由化观点。如刘志福、刘相的《评“真理多元论”》（１１月１５日）指出，“真理多元论”的实质是否定马克思主义的指导地位，为否定四项基本原则提供认识论基础。张树青的《评“个人本位论”》（２月５日）指出，所谓“个人本位论”，是以资产阶级人道主义、人性论为基本出发点，抽象地宣扬个人的价值、个人的自由、个人的幸福，造成极为严重的社会影响。覃正林的《评“社会主义早产论”》（３月２６日）指出，“社会主义早产论”歪曲了马克思主义关于社会发展规律的观点。社会发展的一般规律正是通过个别发展阶段在发展形式或顺序上的特殊性表现出来和起作用的。没有特殊就没有一般。坚持资产阶级自由化的人以马克思的五种社会形态理论为据说中国社会的发展违背了马克思关于社会发展规律的原理，是不能成立的。陈乃圣的《公有制是社会主义制度最本质特征——评资产阶级自由化对公有制的非难》（５月７日）指出，社会主义公有制不可能在创建之初就十分完善，必须随着生产力的发展不断地、及时地进行调整和改革。造成我国部分公有制企业无人负责、吃大锅饭和效率低下的原因并非公有制，而是旧的经济体制的弊端。李伦思的《坚持计划经济与市场调节的有机结合——兼评“市场万能论”》（５月２１日）指出，计划经济在社会主义经济运行和发展中有着不可替代的作用。市场并不是万能的，市场调节有明显的局限性，主要表现是：市场调节具有一定的盲目性和自发性；具有滞后性；市场会造成社会收入分配不公和贫富两极分化；市场本身也具有一定局限性。"},{"type":"paragraph","text":"今年７月份以来，该刊设立了《学习江泽民“七一”重要讲话》专栏，发表了不少学习体会文章。刘岑的《多党制不适合中国国情》（８月１３日），结合学习江泽民同志“七一”重要讲话，批判了个别搞资产阶级自由化的人提出的中国也应实行西方多党制的谬论。为纪念中国共产党成立７０周年，该报从５月１４日起，开辟了“党建笔谈”专栏，发表的文章有《高扬党的马克思主义理论旗帜》、《坚持党员标准的阶级性先进性》等。　　　（孔瑞）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江泽民","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b50225b62d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
