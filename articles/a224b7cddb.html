tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席读书入迷","authors":["李爱忠"],"parts":[{"type":"paragraph","text":"1952年，在去山东的专列上，毛泽东读一本小说，直到深夜一点，卫士端来一碗面条请他吃。他坐起身，却仍在看书，卫士把面碗摆在他面前，又将筷子插入他右手，他目光盯着书，筷子机械地插入面碗便不动了，左手按着书还在读。卫士不敢打搅，直到毛泽东翻书页时才提醒：“主席，吃完再看吧！面条要凉了。”"},{"type":"paragraph","text":"毛泽东像是根本没听见，抓着那一页书翻过来翻过去，反复四五遍。他看的什么书呢？"},{"type":"paragraph","text":"“主席，要不……我再给你热热去！”卫士试探着伸手去捧碗。"},{"type":"paragraph","text":"“嗯，不要。”毛泽东嘴朝碗沿边靠近，动作很慢，因为他的眼睛始终是盯着书，呼噜一声，一筷子面条进嘴。偏这时有几个靠近书缝的字看不到，他的一只左手又要将书展开一些，便有些力不从心。卫士借机过去帮忙，便看清了那本书。是周立波的《暴风骤雨》。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a224b7cddb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
