rs":[],"dates":[{"year":1964,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见肯尼亚政府代表团"},{"type":"paragraph","text":"周总理陈毅副总理同奥廷加部长等会谈"},{"type":"paragraph","text":"新华社十日讯　毛泽东主席接见了肯尼亚内政部长奥廷加和由他率领的肯尼亚政府代表团全体成员：总理办公厅国务部长穆隆比、财政和经济计划部助理秘书克里里、总理办公厅外事部助理秘书基伊卢、代表团秘书奥德罗，以及随团来访的奥廷加部长的私人秘书奥蒂诺。毛主席同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有：国务院副总理陈毅，内务部长曾山等。"},{"type":"paragraph","text":"接见时，肯尼亚驻华使馆参赞凯罗也在座。"},{"type":"paragraph","text":"新华社十日讯　国务院总理周恩来和副总理兼外交部长陈毅，同肯尼亚内政部长奥廷加和总理办公厅国务部长穆隆比，今天下午在友好的气氛中举行了会谈。"},{"type":"paragraph","text":"中国方面参加会谈的有曾山、叶季壮、姬鹏飞、方毅、卢绪章。"},{"type":"paragraph","text":"肯尼亚方面参加的有：驻华大使亨利·穆利，政府代表团成员克里里、基伊卢、奥德罗，随团来访的奥廷加部长私人秘书奥蒂诺。（附图片）"},{"type":"paragraph","text":"毛泽东主席接见由肯尼亚内政部长奥廷加率领的肯尼亚政府代表团全体成员。左二是奥廷加部长，左四是穆隆比部长。"},{"type":"paragraph","text":"新华社记者　孟庆彪摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"585d82ff39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
