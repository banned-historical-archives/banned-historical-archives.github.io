  所有马列主义者和革命者一定要为彻底粉碎修正主义而斗争到底","authors":[],"dates":[{"year":1966,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《人民之声报》揭露苏共新领导比赫鲁晓夫走得更远"},{"type":"paragraph","text":"苏修集团外交政策的核心是联美反华"},{"type":"paragraph","text":"所有马列主义者和革命者一定要为彻底粉碎修正主义而斗争到底"},{"type":"paragraph","text":"新华社地拉那十七日电　阿尔巴尼亚《人民之声报》十六日发表编辑部文章指出，苏共新领导在反革命叛徒的道路上比赫鲁晓夫走得更远、更彻底。"},{"type":"paragraph","text":"文章说，苏共新领导超过了两年前下台的赫鲁晓夫本人，他们竭尽全力地进行活动，进一步分裂国际共产主义运动。他们组织了一九六五年三月莫斯科分裂会议。他们为铁托集团彻底翻案，在思想上和政治上与铁托集团完全同流合污。他们不惜一切支持各国共产党内外的所有托洛茨基分子、机会主义者、叛徒和分裂主义者，而对社会主义的阿尔巴尼亚和阿尔巴尼亚劳动党，却顽固地奉行赫鲁晓夫的大国沙文主义的敌视政策。文章强调指出，最疯狂的是赫鲁晓夫修正主义者掀起了反华运动，同美帝国主义者和各国反动派结成了联合阵线，妄图诽谤和中伤伟大人民中国的具有深远意义的革命政策，并同美帝国主义和各国反动派一起组成反对中国的“包围圈”。今天，反华路线和反华活动是苏联修正主义领导集团对外政策的最主要的组成部分。"},{"type":"paragraph","text":"文章指出，苏共新领导在国内正在实行完全恢复资本主义的路线，在国际上则推行苏美合作主宰世界的路线。"},{"type":"paragraph","text":"文章在谈到越南问题的时候说，赫鲁晓夫修正主义者和美国侵略者穿着一条连裆裤，反对越南人民的正义事业，千方百计地企图把美帝国主义从彻底失败中挽救出来，出卖越南人民。苏联修正主义者是美国“和谈”骗局的吹鼓手。他们蛊惑人心地叫嚷“联合行动”，其目的就是把越南问题纳入苏美合作的轨道，使越南完全屈服于美帝国主义，变越南为反对中华人民共和国和亚洲其他爱好和平国家的另一个侵略基地。"},{"type":"paragraph","text":"文章说，所有的马克思列宁主义者和革命者的任务，就是把揭露和完全孤立现代修正主义、争取从思想上和政治上彻底粉碎它的坚决斗争胜利地进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d4b9244e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
