year":1947,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"冀察热深刻检查"},{"type":"paragraph","text":"群运中右倾思想"},{"type":"paragraph","text":"【新华社冀察热三日电】冀察热区自上而下展开检查在发动群众中的右倾思想。该区今春再次进行土地改革后，察东北即开展反“倒算”运动，平北巩固区进行清算复查，边沿区及平原游击区结合武装斗争初步进行清算、分田；察北宝源等游击地区也展开清算复仇斗争。但由于各级干部不敢大胆放手，以致局面未能很快打开。日前本区中共区党委牛树时，在干部会上检讨了发动群众中的右倾思想。全区就由上而下展开深刻的检查运动。乙化（新设县密云西部）滦平扩大干部会中，检讨出干部思想上存在着：“不怕农民得不到土地，反怕地主生活不好；不怕农民不能统治，反怕地主逃亡；不怕农民不翻身，反怕地主受委屈；不怕农村革命秩序不建立，反怕封建统治秩序混乱”等错误思想。中共察东地委会经检讨后，一致决心把立场从过去太师椅子（指地主）上搬回到农民土地上。刻冀察热全区反“倒算”及清算复查的土地改革运动，正轰轰烈烈全面展开中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a2c9540a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
