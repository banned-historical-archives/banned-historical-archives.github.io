script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"坚持为人民服务","alias":"","parts":[{"type":"paragraph","text":"坚持为人民服务！]"},{"type":"paragraph","text":"（1944年9月18日）"},{"type":"paragraph","text":"同志们！你们是从部队里选举出来的，你们代表了八路军、新四军，同时你们还代表了我们抗日根据地的九千万人民，也代表了全中国四万万五千万人民来开会。虽然你们不是全国人民直接选举的，但实际上你们所执行的纲领和工作任务，代表了全中国人民的要求-一打倒日本帝国主义，解放中华民族。"},{"type":"paragraph","text":"武汉失守以来，特别是最近二年以来，中国抗战形势发生了显著的巨大的变化。现在八路军、新四军及华南人民抗日部队抗击了在华敌伪军的六分之五，国民党只抗击了六分之一。豫湘战役？，敌人如入无人之境，情形极为严重。中国不亡，是由于有了我们共产党和八路军、新四军，主要地是由我们支持了抗战局面。这就是今天中国的抗战形势。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央办公厅举办的招待八路军留守兵团全体模范学习代表及从敌后转战归来参加整训的各部队战斗英雄代表大会上的讲话。"},{"type":"paragraph","text":"[2]豫湘战役，指日本侵略军发动的打通大陆交通线作战的第一、第二阶段。1944年4月中旬，日军以14万兵力首先发起河南战役，国民党守军蒋鼎文、汤恩伯、胡宗南部在日军进攻面前不断败退，至5月25日，郑州、洛阳等38个县市相继陷落。5月27日，日军又发动湘北作战，6月18日侵占长沙。6月22日，开始对军事要地衡阳发动攻击，遭到中国守军的顽强抵"},{"type":"paragraph","text":"我们的部队，不论在前方打敌人或在后方保卫陕甘宁边区，不论生产或练兵，不论军民关系、官兵关系，都有很大的进步；但是我们还有缺点，我们要改正缺点，进一步提高自己。在去年拥政爱民运动中，我们运用了自我批评的方法，我们有缺点还可以互相批评。军队要有统一领导和纪律，才能战胜敌人；正确的自我批评，对于领导和纪律，不但不会削弱它，而且只会增强它。当然，这种自我批评只有在我们的部队里才有，在国民党军队里这是不可能的。因为我们的军队是真正人民的军队，我们的每一个指战员以至每一个炊事员、饲养员，都是为人民服务的。我们的部队要和人民打成一片，我们的干部要和战士们打成一片。与人民利益适合的东西，我们要坚持下去，与人民利益矛盾的东西，我们要努力改掉，这样我们就能无敌于天下。我们的军队一向就有两条方针：第一对敌人要狠，要压倒它，要消灭它；第二对自己人，对人民、对同志、对官长、对部下要和，要团结。这是党中央和西北局的方针，也是全体人民所要求的方针。我们的心和全中国人民的心紧紧地结合在一起，一定要打倒日本帝国主义，解放中华民族！"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":127,"page_end":128},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0edbb67115"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
