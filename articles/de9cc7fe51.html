ear":1968,"month":4,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一位智利朋友，曾应邀参加我国国庆节的活动。那时，他十分欣喜地登上天安门广场的观礼台，他忽然发现自己胸前戴的毛主席像章失落了，他急得满头大汗，不停地来回寻找。一位中国工作人员帮他找了很久都没有找到。这时，毛主席接见革命队伍的时间快要到了，智利朋友非常焦急地说:“毛主席是全世界革命人民心中的红太阳，我无限热爱毛主席，我戴上毛主席像章，就好象心中升起了红太阳，就觉得前进有了方向，革命有了力量。现在我就要见到全世界革命人民的伟大导师毛主席了，胸前没有毛主席像章怎么行呢!”智利朋友无限热爱毛主席的真挚感情，使中国工作人员很感动，立刻把自己戴的一枚金光闪闪的毛主席像章送给他。智利朋友幸福的笑了，他紧紧地握着中国工作人员的手连声说:“谢谢!谢谢!”《东方红》的乐曲响了，全世界人民的伟大导师，我们最最敬爱的伟大领袖毛主席登上天安门城楼。这时，智利朋友和中国人民一样，以无比喜悦的心情，高高举起红彤彤的《毛主席语录》，尽情地欢呼:“毛主席万岁!万万岁!”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de9cc7fe51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
