大大发挥出来。这个厂的——老工人试制成功高精度手表机床","authors":[],"dates":[{"year":1968,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"手表工业在我国是一项新兴发展的工业。在文化大革命前，我们上海手表厂技术大权掌握在一小撮走资派及反动技术“权威”手里，他们扼杀、压制我们工人的创造发明。拿机床设备来说，这些资产阶级老爷们只迷信“洋机床”，说什么“手表机床制造精度高，否则生产出来零件不合格”，“工人造国产手表机床不可能”。把工人们的创造发明压了下去。"},{"type":"paragraph","text":"无产阶级文化大革命开展以来，在毛泽东思想的光辉照耀下，工人们的聪明才智大大发挥出来。我厂机修车间一位识字不多的老工人和其他车间的工人同志一起，怀着对毛主席的一片忠心，按照毛主席关于“实践、认识、再实践、再认识”的教导，终于在去年年底和今年七月先后试制成功一台高精度中国式铣方机和一台新型结构气压半自动表壳车。这两台机床比进口机床结构简化，占地面积小，速度快，工作效率高。工人同志对这两台机床无不拍手叫好。"},{"type":"paragraph","text":"上海手表厂　一青年"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be5cc1164c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
