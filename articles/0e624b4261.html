67,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我心爱毛主席像章"},{"type":"paragraph","text":"一艘波兰商船来我国青岛港运货。一位波兰海员看见我工作人员戴着伟大导师毛主席的像章，他就鼓起勇气对我工作人员说：我们非常热爱毛主席，你能不能给我买一枚毛主席像章？我工作人员立即把自己心爱的像章赠给他。这个船员把金光闪闪的毛主席像章捧在手里，看了又看，连连点头表示感谢。接着，他小心地用洁净的手帕把毛主席像章包了起来，自豪地说：我有了毛主席像章了。今后，每逢过年过节，过星期天，我要把它戴在礼服上。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e624b4261"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
