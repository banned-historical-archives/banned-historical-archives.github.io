script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"黑田寿男在北京发表谈话表示要与美日反动派、宫本修正主义集团和苏联社会帝　国主义作斗争，真正有效地推进日中友好运动","authors":[],"dates":[{"year":1970,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十二日电　日本社会党活动家代表团团长黑田寿男，八月二十日在北京发表了以下谈话:"},{"type":"paragraph","text":"这次，我们社会党活动家代表团应邀访问取得无产阶级文化大革命胜利的、生气勃勃的贵国，受到了各方面人士充满战斗友谊的欢迎和款待，对此表示衷心的感谢。"},{"type":"paragraph","text":"不久前，中朝两国政府联合公报和印度支那人民最高级会议共同声明相继发表，在全亚洲形成了打倒美帝国主义的强有力的统一战线。"},{"type":"paragraph","text":"参加这一统一战线的各国人民，把反对日本军国主义的斗争作为统一战线的一个重要组成部分，并且决心加强这一斗争。"},{"type":"paragraph","text":"日本人民正在掀起反对美帝国主义，反对复活了的日本军国主义的群众斗争，这一斗争是和亚洲各国人民反对美帝、反对日本军国主义的斗争连结在一起的。我们正是抱着这种认识来贵国访问的，因此，这次访问具有非常重要的意义。"},{"type":"paragraph","text":"五月二十日，毛主席发表了庄严声明，号召全世界人民团结起来，打败美国侵略者及其一切走狗，我们热烈支持这一声明。"},{"type":"paragraph","text":"现在，我们正在对美帝国主义及其走狗、复活了军国主义的佐藤反动派进行斗争。他们把美日军事同盟发展成美、日、蒋介石集团、朴正熙集团的侵略亚洲的军事同盟，进一步推行敌视中国的政策。用战斗友谊连结在一起的日中两国人民，为了打败美帝国主义及其一切走狗，必须进一步加强团结。"},{"type":"paragraph","text":"日本共产党宫本修正主义集团说什么日本军国主义尚未复活，在客观上帮助了美日反动派，因此，要真正进行反对美帝国主义和日本军国主义的斗争，就不能不同宫本修正主义集团展开斗争。同时，从苏联社会帝国主义在柬埔寨问题和中东问题上采取的态度来看，要真正进行反对美帝国主义的斗争，就不能不同苏联社会帝国主义展开斗争。"},{"type":"paragraph","text":"不同这四个敌人进行斗争，就不能打败侵略和战争的主要势力、全世界人民最凶恶的敌人美帝国主义及以它为后盾的日本军国主义。"},{"type":"paragraph","text":"同时，我们认为站在这一立场上进行斗争才是真正有效地推进日中友好运动的途径。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30e884735c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
