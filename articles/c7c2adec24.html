art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想统帅一切无往而不胜","authors":["副师长于学孟〖HH/换行〗DW：成都部队"],"parts":[{"type":"paragraph","text":"毛主席啊，红太阳！革命战士时时刻刻盼望见到您老人家。一月二十五日，您和您的亲密战友林副主席亲切接见了我们。在这最最幸福的时刻，我们心潮澎湃豪情放，热血沸腾喜泪流。我们千遍万遍地高呼：“毛主席万岁！毛主席万万岁！”"},{"type":"paragraph","text":"毛主席啊，毛主席！回顾我们走过的战斗历程，哪一步不是您老人家亲自指引；翻开中国革命的光荣史册，哪一页不闪耀着您伟大思想的万丈光芒！"},{"type":"paragraph","text":"去年八月下旬，在您老人家关于“工人阶级必须领导一切”的伟大号召下，我们配合工人毛泽东思想宣传队开进成都工学院，领导学院的斗、批、改，用毛泽东思想武装革命师生。在斗争的实践中，我们深深体会到，您的光辉思想威力无比，千难万难，按照您的光辉思想办事就不难。"},{"type":"paragraph","text":"成都工学院是一所拥有七千人的综合性工科大学，在文化大革命中，由于党内一小撮走资派的破坏，两派学生严重对立，一直联合不起来。宣传队进校后，一小撮阶级敌人怕得要死，恨得要命，疯狂地抵制和破坏我们宣传毛泽东思想。我们坚决执行林副主席的指示：“我们要用毛泽东思想统一全党的思想，统一全国人民群众的思想。”把学习和宣传毛泽东思想放在高于一切、大于一切、先于一切、重于一切的地位。我们遵照您老人家“办学习班，是个好办法，很多问题可以在学习班得到解决”的教导，帮助革命师生举办各种类型的学习班，活学活用您的一系列最新指示，狠批刘少奇的反革命修正主义教育路线。开展谈心活动，帮助革命师生斗私批修，引导他们自觉地批判山头主义、宗派主义、个人主义、反动的资产阶级“多中心即无中心论”，提高了他们的阶级斗争和两条路线斗争觉悟，使两派革命群众组织迅速实现了革命大联合和革命三结合。革命群众共同对敌，揪出了一小撮叛徒、特务和死不改悔的走资派，学院的无产阶级文化大革命出现了一派生气勃勃的大好形势，掀起了斗、批、改的高潮。目前，广大革命师生在工人、解放军毛泽东思想宣传队的领导下，正在为全面实现党的八届十二中全会提出的各项战斗任务，夺取无产阶级文化大革命的全面胜利而奋斗。"},{"type":"paragraph","text":"毛主席啊，毛主席！无数事实说明：用您的光辉思想统帅一切、推动一切、改造一切，是一切工作的根本。用您的思想统帅一切，就无往而不胜。我们一定更高地举起您的光辉思想的伟大红旗，用您的光辉思想改造学校的面貌，实现无产阶级在上层建筑其中包括在各个文化领域的专政。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7c2adec24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
