script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"昆明各校教师对公布的胡风反革命集团的材料有怀疑","authors":[],"dates":[{"year":1955,"month":6,"day":16}],"is_range_date":false,"parts":[{"text":"昆明各校教师对公布的胡风反革命集团的材料有怀疑","type":"title"},{"text":"【云南分社十六日讯】昆明各学校教师在声讨胡风反革命集团的斗争中，有少数人对人民日报公布的胡风反革命集团材料有怀疑。工学院教授徐骏平说，报上揭露的材料是摘录后贯串起来的。怀疑是否有些牵强。有的人说：材料是双关的，可以从进步方面理解，也可以从反动方面理解。师范学院有的说：为什么一下就搞出这些材料?是不是真的?小学教师中有些对党不满分子也问：为什么现在才提出来?是否真的像报上登的那样？","type":"paragraph"},{"text":"有些人产生怀疑或顾虑。昆明工学院教授熊鸿皋说，“反对文艺为政治服务就是反革命，那技术不与政治相结合也是反革命了。”该院教授徐骏平说：“假如我们对党提意见有错误，将来是不是要算总帐?”师范学院中文系教授姜宏夫准备把以前寄给上海新文艺社的稿子要回来，怕其中有错误搞成政治问题。","type":"paragraph"},{"text":" (张廷干编)","type":"paragraph"}],"comments":[],"origin":"1955年6月27日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2375d4046a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
