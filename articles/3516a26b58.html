ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"关于华北三纵七纵的行动部署","alias":"","parts":[{"type":"paragraph","text":"关于华北三纵七纵的行动部署！"},{"type":"paragraph","text":"（1948年10月29日）周："},{"type":"paragraph","text":"请告聂？，如敌本日（二十九）进至望都及其以南，明日进至定县以北，则我三纵应于三十日进袭方顺桥3、望都一线，萧克指挥之一个旅应加上去，使七纵集中向北反攻。三七两纵应于本夜取得联络，统受郑维山指挥，可能打一胜仗。如敌本日不动，或本日仅进至望都而明日在望都不动，则三纵可在满城以南休息一日，与七纵取好联络，后天再打。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二十九日早"},{"type":"paragraph","text":"[1]这是毛泽东给周恩来的信。1948年10月24日，国民党军华北“剿匪”总司令部秘密调遣第九十四军、骑兵第四师等部组成“援晋兵团”，以救援太原为名，企图偷袭石家庄和中共中央所在地西柏坡。中共中央和毛泽东及时发现和揭露了国民党的阴谋，并预作防范准备。11月初，国民党军偷袭部队由定县以北唐河地区退回保定。"},{"type":"paragraph","text":"[2]聂，指聂荣臻，当时任华北军区司令员。[3]方顺桥，村名，位于河北省满城县西南。[4]萧克，当时任华北军区第三副司令员。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":129,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3516a26b58"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
