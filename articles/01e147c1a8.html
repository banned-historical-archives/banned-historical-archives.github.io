script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"起来!饥寒交迫的奴隶印农民扩大反封建斗争坚决要求废除地主的土地租赁制　印尼工人大规模展开罢工","authors":[],"dates":[{"year":1950,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【十五日电】塔斯社德里十一日讯:据印度“麦消尔”报载称，印度中部的农民，已展开大规模的反抗封建地主剥削与王公们专制统治的斗争。在印杜尔土邦的各村落中，千百农民们参加该地所举行的大会和示威，要求废除封建地主的土地租赁制度。印度国大党印杜尔支部的领袖们——当地的地主，已在他们的土地上组织了“特别队伍”与农民作战，由于印度当局的加紧镇压，中印度农民们的组织被迫转入地下。但印度当局的这种措施，并不能打击农民们为争取他们的权利而斗争的意志。例如在冈礼奥土邦的华德奥礼村，警察击袭参加该地农民会议的农民们，想要逮捕农民领袖戈脱·沙海，但农民们保护了他们的领袖。"},{"type":"paragraph","text":"【新华社北京十五日电】　印尼工人继续在各大城市进行大规模罢工斗争，据塔斯社海牙十三日引雅加达消息称:由于外国殖民者和本国资本家残酷剥削的结果，千千万万的印尼工人家属均处于死亡的边缘上，许多工人的工资竟低到使他们仅能获得一小撮米和些微蔬菜作为他们每日的食粮。大规模罢工现在正在雅加达、万隆、三宝垄、棉兰以及婆罗洲等地的许多企业中进行。政府方面正使用许多残暴的措施，逮捕了罢工领袖。荷兰统一工会联合会的中央机构，已决定捐款支援印尼工人，但荷兰政府禁止汇款。另据安尼塔社消息:本月二日开始的三宝垄码头工人罢工，迄十日止仍在坚持中。万隆由于一万六千名工人罢工，已有一百二十五家工厂陷于停顿状态。据估计，两月来爪晆和苏门答腊两地因要求增加工资而罢工的工人，总数已达十万人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01e147c1a8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
