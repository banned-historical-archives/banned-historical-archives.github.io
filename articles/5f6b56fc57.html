十万贫苦农业工人罢工交通运输工人决定再接再厉展开斗争","authors":[],"dates":[{"year":1969,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削　争取改善生活和劳动条件"},{"type":"paragraph","text":"意大利工人继续掀起罢工斗争浪潮"},{"type":"paragraph","text":"一百五十万贫苦农业工人罢工交通运输工人决定再接再厉展开斗争"},{"type":"paragraph","text":"新华社二十二日讯 罗马消息：意大利各行各业的工人为了反对垄断资本的残酷剥削、争取改善生活和劳动条件，继续掀起罢工斗争的浪潮。"},{"type":"paragraph","text":"十九日，一百五十万贫苦农业工人奋起举行二十四小时罢工，抗议资方残酷剥削工人，拒不答应他们的合理要求。"},{"type":"paragraph","text":"继十七日全国铁路和市政交通运输工人举行大罢工之后，全国电车工人二十二日又开始举行三十八小时罢工。同时，铁路系统的部分工作人员也冲破了黄色工会头子的束缚举行四十八小时罢工。此外，交通运输部门的工人还决定在最近几天举行一连串的罢工，争取改善生活和劳动条件。"},{"type":"paragraph","text":"意大利最大的汽车公司“菲亚特”汽车公司在都灵的一些工厂十八日也爆发了工人罢工斗争。一个工厂的二百五十名罢工工人还愤怒地打破办公大楼的门，冲进了办公室。"},{"type":"paragraph","text":"同一天，意大利全国各省的财务人员举行全国性罢工，使财务机构都关了门。"},{"type":"paragraph","text":"全国的医院麻醉师仍在坚持他们十七日开始的为时一周的罢工，要求改善劳动条件。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f6b56fc57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
