动陷于停顿，工人学生市民举行强大示威游行","authors":[],"dates":[{"year":1968,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对残酷剥削　要求增加工资"},{"type":"paragraph","text":"意大利南部八省市工人举行总罢工"},{"type":"paragraph","text":"这些省市的主要经济活动陷于停顿，工人学生市民举行强大示威游行"},{"type":"paragraph","text":"新华社二十四日讯　罗马消息：意大利南部马切拉塔、特拉莫等八个省市的工人二十三日举行声势浩大的总罢工，反对垄断资本家的残酷剥削和要求增加工资。这些省市的全部主要经济活动，由于工人总罢工而陷于停顿。与此同时，罢工的工人、学生和居民还分别举行了强大的示威游行。"},{"type":"paragraph","text":"这次罢工和示威游行是整个意大利南部人民正在开展的广泛斗争的一部分，这场斗争是反对意大利的垄断资本家对工人阶级的残酷剥削。长期以来，资本家利用这些地区的贫困状况和工人们面临的严重失业，竭力压低工人们的工资，以榨取更多的利润。"},{"type":"paragraph","text":"此外，意大利撒丁区的矿工二十三日也开始举行要求改善工作条件和生活条件的“斗争周”。矿工们都停工一小时作为斗争的开始。在“皮雷利”橡胶托辣斯，工人要求提高工资和缩短工时的斗争也越来越激烈。“皮雷利”集团在米兰的主要工厂的五千多工人，二十二日举行了声势浩大的示威游行，并且在二十三日举行了第三次二十四小时罢工。这个托辣斯在意大利其它地方的工厂的工人，也正在举行罢工和示威游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daa898329c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
