art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想的宣传员","authors":["张仇美"],"parts":[{"type":"paragraph","text":"一天下午，在株洲火车站候车室里，有一位从北京来的女红卫兵，刚下火车，就参加了车站宣传活动。哪里有旅客，她就到哪里去宣传。她针对不同人员，不同问题，选择有关的毛主席语录和“十六条”、《人民日报》社论的有关章节，向旅客宣传，和旅客一起学习。"},{"type":"paragraph","text":"她看到对面有几十个旅客进来候车，急忙跑过去了解情况，知道这些人多数是农民，就向他们讲《抓革命，促生产》的社论，讲清抓革命与促生产的关系。有一位中年农民说：“红卫兵同志，你读的这篇文章，太好啦！我没有文化，看不懂报纸，听你一讲，全明白了！”"},{"type":"paragraph","text":"这位红卫兵来到母婴候车室，发现有两个带小孩的妇女，为了一张小孩睡的床发生争执。这位红卫兵热情地请她俩坐下来，翻开《毛主席语录》，给她们读开了：“我们都是来自五湖四海，为了一个共同的革命目标，走到一起来了。”“一切革命队伍的人都要互相关心，互相爱护，互相帮助。”这位红卫兵读完语录，又联系她们争床的事，作了一些讲解和说服工作。毛主席的话，打通了这两位妇女的思想，立刻互相道了歉。最后，她们把两个小孩放在这张床上一起睡觉了。小孩睡得又甜又香，大人有说有笑。她们握着这位红卫兵的手感激地说：“你真是毛主席教导出来的好红卫兵。”"},{"type":"paragraph","text":"毛主席怎样说，红卫兵就怎样做。（图片）"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33e0c4e3d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
