hors":[],"dates":[{"year":1954,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社鞍山十二日电】　超额完成一、二月份生产计划，并在二月二十日和三月五日连创日产量最高纪录的鞍山钢铁公司炼钢厂职工，在三月十一日写信给毛主席，保证提前完成三月份的生产计划，超额完成第一季度国家计划。他们给毛主席的信全文如下:"},{"type":"paragraph","text":"敬爱的毛主席:"},{"type":"paragraph","text":"在您的英明正确领导和关怀下，我厂全体职工经过党在过渡时期的总路线的教育，提高了劳动热情，生产情况逐月稳步上升。在三月四日，全体职工在纪念革命导师斯大林同志逝世一周年大会上，一致宣誓要化悲痛为力量，用多出钢铁的实际行动来纪念斯大林同志。第二天我们就创造了开工以来日产量最高纪录，超过一九五三年最高日产量百分之七点六。这一天，全厂各个平炉炉底利用系数达到七点六八，而且保证了安全生产，钢的质量完全合格，平均每炉钢熔炼时间是十点零一分，比国家计划缩短了六十五分钟。特别是四号平炉，在这一天出钢四次，连出三炉快速炼钢。我们决心保持已得成绩，在党的总路线的光辉照耀下，再接再厉，努力学习苏联先进经验，多出好钢，为祖国社会主义工业化的早日实现而奋斗。并向您提出下列几项保证:"},{"type":"paragraph","text":"一、保证提前一天完成三月份国家计划，提高产品合格率百分之零点六九；"},{"type":"paragraph","text":"二、保证超额完成第一季度国家计划百分之八点五，降低成本六十亿元；"},{"type":"paragraph","text":"三、保证超额完成第一季度优质钢任务。"},{"type":"paragraph","text":"此致"},{"type":"paragraph","text":"敬礼"},{"type":"paragraph","text":"鞍山钢铁公司炼钢厂全体职工"},{"type":"paragraph","text":"一九五四年三月十一日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62e84327f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
