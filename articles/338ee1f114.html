art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"善辨风向的青年干部","authors":[],"parts":[{"type":"paragraph","text":"广州红卫机车车辆厂一车间党支部书记叶惠棠，是在文化大革命中成长起来的一个青年干部。他朝气蓬勃，敢于抵制邓小平的右倾翻案风，体现了在文化大革命中锻炼出来的新干部的可贵品质。"},{"type":"paragraph","text":"去年夏季前后，党内最大的不肯改悔的走资派邓小平大刮右倾翻案风，抛出了“三项指示为纲”这个修正主义纲领，否定以阶级斗争为纲，篡改党的基本路线，妄图复辟资本主义。这股右倾翻案风也刮到广州红卫机车车辆厂。一天，厂中心学习组学习时，有人传达“上边”来的指示，当讲到“要把三项指示作为一切工作的总纲”时，叶惠棠皱了皱眉头，心里琢磨开了：毛主席教导我们“千万不要忘记阶级斗争”。我们要紧紧抓住无产阶级同资产阶级两个阶级的斗争、社会主义同资本主义两条道路的斗争这个纲。为什么现在又出来一个“三项指示为纲”呢？他越想越觉得不对头，便霍地站起来说：“这个说法不对，我们只能有一个纲，就是以阶级斗争为纲，牢记党的基本路线！”一时，大家你一言我一语地讨论起来。有的说：“这可是上级领导的指示呵！”叶惠棠说：“毛主席明明白白地教导我们，整个社会主义过渡时期存在着阶级和阶级斗争，存在着资本主义复辟的危险性，因此，只能以阶级斗争为纲。”"},{"type":"paragraph","text":"在这场讨论的一个星期之后，全厂车间以上的理论辅导员进行了一次政治开卷测验，有一个题目也涉及到“三项指示为纲”的问题。有两个辅导员，看着这个题目，也感到有问题。“找小叶研究研究！”于是，他们找到叶惠棠，提出了自己的疑问。"},{"type":"paragraph","text":"这些天来，叶惠棠也一直在琢磨这件事。他认为，以阶级斗争为纲，坚持党的基本路线，是在整个社会主义历史阶段指导我们各项工作的总纲。如果以“三项指示为纲”，实际上就是要把阶级斗争这个纲一笔抹掉。叶惠棠把自己的想法告诉了两个理论辅导员，使他们受到很大启发。他们中一个人交了“白卷”，对这个问题不予理会，一个人直截了当地在测验卷上指出了所谓“三项指示为纲”是错误的。这一事实充分说明，群众是真正的英雄，经过文化大革命，广大干部和群众阶级斗争、路线斗争的觉悟大大提高，一切搞翻案、搞复辟的人，必将遭到全国人民的抵制和批判。"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"338ee1f114"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
