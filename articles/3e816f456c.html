art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见日本社会党第八次访华团"},{"type":"paragraph","text":"邓小平副总理二十六日上午在会见日本社会党朋友们时指出，签订中日和平友好条约，从政治角度来考虑，从长远利益来考虑，就好解决。"},{"type":"paragraph","text":"邓小平副总理说：对于签订中日和平友好条约，中国的态度是一贯的、明确的。这就是以中日两国政府联合声明为基础，不要从这个声明后退。"},{"type":"paragraph","text":"邓副总理会见的是以社会党委员长飞鸟田一雄为团长、副委员长下平正一为副团长的日本社会党第八次访华团。他同社会党朋友们进行了亲切友好的谈话。"},{"type":"paragraph","text":"邓副总理对社会党朋友们为发展中日友好事业作出的努力表示感谢。他说：中日两国人民要友好起来，亚洲各国人民要友好起来，使太平洋真正成为太平的洋。"},{"type":"paragraph","text":"会见时在座的有中日友协会长廖承志等。"},{"type":"paragraph","text":"邓小平副总理会见挪威外交大臣弗吕登伦"},{"type":"paragraph","text":"国务院副总理邓小平二十五日上午会见了挪威外交大臣克努特·弗吕登伦及其随行人员。"},{"type":"paragraph","text":"会见时，邓小平副总理同弗吕登伦外交大臣就双边问题和共同关心的国际问题进行了友好的谈话。当弗吕登伦外交大臣谈到中国五届人大规定的实现四个现代化的宏伟目标时，邓副总理说，要接近当前世界科学技术水平不是很容易的事。我们不能闭关自守，我们要善于学习。要学习世界上一切先进的东西，包括国际上的先进科学技术。我们要同先进国家交往、合作，包括挪威在内。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e816f456c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
