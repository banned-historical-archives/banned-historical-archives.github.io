art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是战无不胜的法宝","authors":["海军航空兵/荣立二等功鲍锡明"],"parts":[{"type":"paragraph","text":"在赴朝抗美作战中，我们年青的空军，缺少现代化的装备，许多飞机是从国民党手中缴获的旧东西，飞行人员只训练过几十个小时。但是，面对着美帝国主义的“空中优势”，我们毫不畏惧，对美国那些曾飞过几千小时的飞贼，我们根本就不把他们放在眼里。我们为什么能做到这样呢？是毛主席关于帝国主义和一切反动派都是纸老虎的英明教导，给了我们无限的力量，无穷的勇敢，使我们用螺旋桨飞机打下了美帝国主义的喷气式飞机，我们的新飞行员打败了美帝国主义的老飞贼，取得了辉煌的胜利。"},{"type":"paragraph","text":"在战争中，我们遵循毛主席的教导，打垮了拿枪的敌人，在文化大革命中，我们也一定坚决执行毛主席的指示，彻底打垮那些反党反社会主义反毛泽东思想的黑帮分子。这些不拿枪的敌人，也统统是纸老虎。他们在革命群众还没有起来的时候，耀武扬威，装腔作势，样子看来十分吓人。当革命群众一旦发动起来，他们就现了原形，变成了纸的，一点威风也没有了。在文化大革命中，我一定要更加积极地读毛主席的书，掌握毛泽东思想，做毛泽东思想的“红卫兵”，把一切牛鬼蛇神彻底斗倒、斗臭、斗垮，使他们永世不得翻身，坚决保卫无产阶级的铁打江山。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3cb9b04b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
