art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢庆“非洲解放日”十五周年对外友协举行招待会 邓副总理等出席","authors":[],"parts":[{"type":"paragraph","text":"据新华社五月二十四日讯 邓小平副总理今天晚上同在京的非洲朋友一起，出席由中国人民对外友好协会举行的庆祝“非洲解放日”十五周年招待会。邓小平副总理向非洲朋友致以热烈的节日祝贺，祝贺非洲人民在团结反霸、反帝、反殖事业中取得重大的胜利。"},{"type":"paragraph","text":"同非洲朋友欢聚一堂的还有国务院副总理陈慕华，人大常委会副委员长姬鹏飞，政协全国委员会副主席王首道，文化部长黄镇，对外友协会长王炳南，外交部副部长何英，中国人民解放军副总参谋长张才千，中联部副部长吴学谦等。"},{"type":"paragraph","text":"出席招待会的非洲朋友有非洲国家驻中国的外交使节和夫人以及大使馆的外交官员，在京的非洲国家的专家以及留学生代表，正在北京访问的非洲国家的外宾等。"},{"type":"paragraph","text":"招待会上洋溢着中国人民同非洲人民战斗团结和革命友谊的热烈气氛。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dd039b0b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
