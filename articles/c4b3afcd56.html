" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-142","name":"中共中央组织部、劳动人事部关于纠正江西、浙江部分学校学员参加革命工作时间问题的通知","author":"中共中央组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央组织部、劳动人事部关于纠正江西、浙江部分学校学员参加革命工作时间问题的通知","dates":[{"year":1986,"month":5,"day":29}],"is_range_date":false,"authors":[" 劳动人事部","中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 97-98","tags":[{"name":"干部学校","type":"主题/事件"},{"name":"江西","type":"主题/事件"},{"name":"浙江","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部、劳动人事部关于纠正江西、浙江部分学校学员参加革命工作时间问题的通知*"},{"type":"subtitle","text":"组通字〔1986〕27号"},{"type":"paragraph","text":"中共江西省委组织部、江西省劳动人事厅："},{"type":"paragraph","text":"最近，我们陆续收到一些省市、部委组织部门和劳动人事部门的来信，对赣组〔1985〕71号《关于我省烈士子弟学校和江西工农中学的学生参加革命工作时间问题的通知》和赣劳人险〔86〕第11号《关于我省烈士子弟学校、江西工农中学学习期间计算工龄的通知》提出意见。这两个文件关于上饶、宁都、赣州、吉安、浮梁的五所烈士子第学校和江西工农中学学生的参加革命工作时间可从入校（开学）算起、在校学习期间可计算连续工龄的规定，与中组发〔1982〕11号《关于确定建国前干部参加革命工作时间的规定》、组通字〔83〕49号《关于建国前我党开办的华北人民革命大学、延安中学等校学员参加革命工作时间问题的通知》等文件精神不符。按规定，凡参加革命工作前在各类中、小学学习的学生，包括在延安中学、延安保育小学学习的，均不应计算参加革命工作时间和工龄。赣组〔1985〕71号和赣劳人险〔86〕第11号两个文件的规定不妥，请你们纠正。"},{"type":"paragraph","text":"中共中央组织部"},{"type":"paragraph","text":"劳动人事部"},{"type":"paragraph","text":"一九八六年五月二十九日"},{"type":"subtitle","text":"老干字〔86〕80号"},{"type":"paragraph","text":"中共浙江省委组织部："},{"type":"paragraph","text":"浙组函〔1985〕29号收悉。经研究，在杭州青年干部学校学习后，由组织决定到正规学校继续学习的学员，尽管兼做了一些社会工作，但不是正式脱产干部，其参加革命工作时间也不能从入杭州青年干部学校时算起。浙组〔1985〕49号通知与中组部历来规定不一致，请予以纠正，并做好有关同志的思想工作。"},{"type":"paragraph","text":"中共中央组织部"},{"type":"paragraph","text":"一九八六年六月二十四日"},{"type":"paragraph","text":"*标题是编者加的"}],"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"name":"浙江文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4b3afcd56"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
