ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于同意朝鲜新解放区借粮办法的电报","alias":"","parts":[{"type":"paragraph","text":"军委关于香告志愿军伤亡失踪人数"},{"type":"paragraph","text":"致彭德怀等电"},{"type":"paragraph","text":"（1950年12月31日）彭、邓、朴、洪，并告九兵团："},{"type":"paragraph","text":"我志愿军全部从十月十九日入朝鲜境作战至十二月三十一日止，包括西北两战役东北战役?战场上的伤亡失踪人数，冻死冻伤、病死及因病离队、在运动中炸死炸伤人数在内，每军数及全军总数，请查明电告为盼。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十二月卅一日[1]彭德怀，当时任中国人民志愿军司令员兼政治委员。"},{"type":"paragraph","text":"[2]邓、朴，指邓华，朴一禹，当时均任中国人民志愿军副司令员兼副政治委员。洪，指洪学智，当时任中国人民志愿军副司令员。"},{"type":"paragraph","text":"[3]这里的西北两战役和东北战役，也就是中国人民志愿军在朝鲜战场进行的第一次战役和第二次战役。西北两战役，一指第一次战役，一指第二次战役西线战场的作战；东北战役，指第二次战役东线战场的作战。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":487,"page_end":487},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"416d030640"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
