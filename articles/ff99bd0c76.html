torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"忆秦嫩·爱山关","alias":"","parts":[{"type":"paragraph","text":"忆秦娥?娄山关川"},{"type":"paragraph","text":"（1935年2月）西风烈，长空雁叫霜晨月。霜晨月，马蹄声碎，"},{"type":"paragraph","text":"喇叭声咽2。"},{"type":"paragraph","text":"[1]娄山关，在贵州省第二大城市遵义城北娄山的最高峰上，是防守贵州北部重镇遵义的要冲。中央红军长征时，于1935年1月占领遵义，召开了在革命历史上有伟大意义的遵义会议。会后，红军经娄山关北上，原准备在泸州和宜宾之间渡过长江，没有成功，就折回再向遵义进军，在途中经半天激战打败了扼守娄山关的贵州军阀王家烈部一个师，乘胜重占遵义。这首词写的就是这次攻克娄山关的战斗。前阙写红军拂晓时向娄山关进军的情景；后阙写红军攻占和越过徒称天险的娄山关时，太阳还没有落山。词中的“西风”“雁叫”“霜晨”都是当地二月间的真实情景。毛泽东自注：“万里长征，千回百折，顺利少于困难不知有多少倍，心情是沉郁的。过了岷山，豁然开朗，转化到了反面，柳暗花明又一村了。以下诸篇（按：1958年出版的《毛主席诗词十九首》，《忆秦娥·娄山关》排在《十六字令三首》之前，“以下诸篇’指《十六字令三首》《七律·长征》《念奴娇·昆仑》《清平乐·六盘山》），反映了这一种心情。”"},{"type":"paragraph","text":"[2]咽，在这里读入声。本义是声音因梗塞而低沉，这里用来描写在清雄关漫道真如铁，而今迈步从头越。从头越，苍山如海，"},{"type":"paragraph","text":"残阳如血。2[1]从头越，重新跨越。"},{"type":"paragraph","text":"[2]苍山如海，残阳如血，据毛泽东说，是在战争中积累了多年的景物观察，一到娄山关这种战争胜利和自然景物的突然遇合，就造成了他自以为附录：1934年的原版本"},{"type":"paragraph","text":"西风烈，梧桐叶下黄花发，黄花发，马蹄声碎，喇叭声咽。雄关漫道真如铁，而今迈步从头越。从头越，苍山如海，残阳如血。"},{"type":"paragraph","text":"颈珑意山成烤马鱼三月财而道步凤年球区禹瑞碑潮心翠园窝爱视享恒素州一九三口毛泽东写于1934年的《忆秦娥·娄山关》。"},{"type":"paragraph","text":"汽的线汽血山毛泽东手书《忆秦娥·娄山关》。"},{"type":"paragraph","text":"刺3"},{"type":"paragraph","text":"1935年2月20日前后，中央红军第二次渡过赤水再次占领遵义。毛泽东写下了《忆秦娥·娄山关》。图为娄山关。"},{"type":"paragraph","text":"《忆秦娥·娄山关》（诗意画）官B《西风烈》(诗意画）36《雄关漫道真如铁失而今迈步从头越》（油画）《而今迈步从头越》(油画)《而今迈步从头越》（油画）靠关汉连点如欣五合运步比南造"},{"type":"paragraph","text":"头越《从头越》（诗意画）《苍山如海》(诗意画）《残阳如血》（诗意画）"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":148,"page_end":163},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff99bd0c76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
