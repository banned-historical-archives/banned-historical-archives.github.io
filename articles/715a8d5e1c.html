uthors":["沈进　蒋铎"],"dates":[{"year":1967,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无产阶级文化大革命的伟大成果"},{"type":"paragraph","text":"——一九六七年秋季中国出口商品交易会剪影"},{"type":"paragraph","text":"在伟大的毛泽东思想的光辉照耀下，在无产阶级文化大革命的凯歌声中，一九六七年秋季中国出口商品交易会在广州隆重开幕了。"},{"type":"paragraph","text":"这次交易会，以崭新的面貌和空前盛大的规模，反映了我国人民高举毛泽东思想伟大红旗，在无产阶级文化大革命中“抓革命，促生产”的伟大成果，反映了我国社会主义建设的伟大成就，反映了我国对外贸易事业的蓬勃发展。来自世界各国、各地区的贸易界朋友，海外华侨和港澳同胞，无不为之欢欣鼓舞，热情赞颂毛泽东思想的伟大胜利。帝国主义、现代修正主义和各国反动派，狂犬吠日，对我们的交易会进行了无耻的诽谤和恶毒的攻击。交易会欣欣向荣的景象，给了敌人以沉重的打击。"},{"type":"paragraph","text":"在交易会上，我们高兴地看到了世界各国朋友和海外华侨、港澳同胞对我们最伟大的领袖、世界革命人民的伟大导师毛主席无限热爱的动人情景。今天的世界，已经进入以毛泽东思想为伟大旗帜的革命新时代。学习和运用毛泽东思想已经成为一个世界范围的群众运动。战无不胜的毛泽东思想将在全世界更迅速、更广泛地传播，毛泽东思想的无际光焰照亮全世界！"},{"type":"paragraph","text":"本报记者　沈进　蒋铎"},{"type":"paragraph","text":"前来交易会参观的外国朋友们在毛泽东巨型塑像前合影留念，以表达对中国人民的伟大领袖毛主席的无限热爱。"},{"type":"paragraph","text":"交易会服务部是最繁忙的地方，每天都有许多来宾在这里购买毛主席像章。这是港澳同胞在选购金光闪闪的毛主席像章。"},{"type":"paragraph","text":"来自五大洲的外国朋友们，怀着无限崇敬的心情，仰望着当代最伟大的马克思列宁主义者、世界革命人民心中最红最红的红太阳毛主席像。"},{"type":"paragraph","text":"毛主席的书，世界革命人民最爱读。两位外国海员来到交易会，捧着渴望已久的红色宝书《毛主席语录》学起来。"},{"type":"paragraph","text":"毛主席把我们的心紧紧地连在一起。交易会的工作人员向刚果（布）朋友赠送毛主席像章。"},{"type":"paragraph","text":"来自反美斗争前线的越南同志，参观交易会展出的纺织品和轻工业品，赞扬我国社会主义建设的伟大成就。"},{"type":"paragraph","text":"无产阶级文化大革命促进了我国工农业生产的发展。来自世界各国的朋友们，以浓厚的兴趣观看交易会陈列馆的展品，热烈赞扬我国无产阶级文化大革命的伟大成就。"},{"type":"paragraph","text":"在无产阶级文化大革命的推动下，我国农业生产获得了普遍丰收。这是来宾们参观农副产品展览馆的情景。"},{"type":"paragraph","text":"外国朋友们参观农副产品展览馆。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"715a8d5e1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
