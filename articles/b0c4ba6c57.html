al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"关于军事行动问题的报告","alias":"","parts":[{"type":"paragraph","text":"关于军事行动问题的报告！"},{"type":"paragraph","text":"（1936年5月28日）"},{"type":"paragraph","text":"我们在六、七、八月要以洪德城为中心创造新的根据地。东边蒋介石、阎锡山以三十个团向我们进攻，是我们的主要敌人。蒋介石对陕、甘加紧部署，企图将我们与二、六军团和四方面军隔开，与东北军隔开，与苏联隔开，在西北军阀特别多，于我们有利。我们的阵势在西，而蒋介石集中兵力在东。我们的工作：第一，在安塞以西、洪德城附近四五百里地区做赤化工作；第二，对东北军完成主要方面的准备工作，特别是政治上的，内部的团结，干部的创造等；第三，坚持陕北游击战争，最好是在白龙山及神木地区，变“太平世界”为“不太平世界”，方式以小游击队活动为最好，短小精悍，在每区中应有一大的游击队。"},{"type":"paragraph","text":"[1]1936年5月28日，中共中央政治局在陕北瓦窑堡召开会议，会议"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":5,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":432,"page_end":432},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0c4ba6c57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
