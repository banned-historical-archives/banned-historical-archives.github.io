" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"最高国务会议举行扩大会议, 毛主席就正确地处理人民内部矛盾的问题讲了话","authors":[],"dates":[{"year":1957,"month":2,"day":27}],"is_range_date":false,"parts":[{"text":"最高国务会议举行扩大会议, 毛主席就正确地处理人民内部矛盾的问题讲了话","type":"title"},{"text":"新华社２日讯毛泽东主席在2月27日到3月1日召集了扩大的最高国务会议。","type":"paragraph"},{"text":"毛主席在2月27日下午的会上就“正确地处理人民内部矛盾的问题”讲了话。","type":"paragraph"},{"text":"2月28日整天和3月1日上午，出席最高国务会议扩大会议的全体人员对毛主席的讲话分组进行了讨论。3月1日下午，进行了大会讨论。在大会上发言的有李济深、章伯钧、黄炎培、马叙伦、陈嘉庚、陈叔通、郭沫若、程潜、马寅初、许德珩、达浦生、刘文辉、车向忱、盛丕华、孙蔚如、黄琪翔。","type":"paragraph"},{"text":"出席这次会议的各方面人士共有一千八百多人。","type":"paragraph"},{"text":" 来源：1957年3月3日《人民日报》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83284043fa"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
