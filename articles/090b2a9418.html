ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于加强国内外联络以制止投降分裂致周恩来电","alias":"","parts":[{"type":"paragraph","text":"关于加强国内外联络以制止投降分裂致周恩来电"},{"type":"paragraph","text":"（1940年11月6日）恩来同志："},{"type":"paragraph","text":"江电所示重要情报今晨才阅悉。蒋加入英美集团有利无害，加入德意日集团则有害无利，我们再不要强调反对加入英美集团了，强然我们也不应该提倡（因为他是帝国主义战争集团）。目前不但共产党中国人民苏联这三大势力应该团结，而且应与英美作外交联络，以期制止投降，打击亲日亲德派活动。根据三日来电，如能由上述四种势力的联合与配合好转可能性还是有的。剿共则亡党亡国，投降则日寇必使中国四分五裂，必使蒋崩溃，请你利用时机向国民党各方奔走呼号，痛切陈词，以图挽救。是否于适当时机请求规蒋面陈一次，亦请你考虑。向各方活动，应动员多数人员出马(党的、非党的)。蒋夫人处的活动值得注意，桂林方面请告克农亦如此办。"},{"type":"paragraph","text":"毛泽东鱼辰"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":201,"page_end":201},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"090b2a9418"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
