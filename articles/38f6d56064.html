<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央对中南局关于土改中所留机动田处理办法的意见","authors":[],"dates":[{"year":1951,"month":4,"day":23}],"is_range_date":false,"parts":[{"text":"中央对中南局关于土改中所留机动田处理办法的意见","type":"title"},{"text":"中南局并告华东、西南、西北局：","type":"appellation"},{"text":"四月九日来电“关于土改中所留机动田的处理办法”已阅悉。","type":"paragraph"},{"text":"（一）同意来电第一和第四两点意见，即将多留的机动田分给农民，最后做到只在田多人少地区保留少数的机动田，而一般地方不留。","type":"paragraph"},{"text":"但在处理中，切勿将根据土地改革法第二十六条的决定，为建设铁路、公路、河道、飞机场等而保留的土地，也当做机动田分掉。","type":"paragraph"},{"text":"（二）机动田的公粮负担，应与一般田地一样，根据法令统一作为国家收入，不作地方收入。如将机动田应出的公粮做为地方收入，则不仅不能克服来电所指出的地方上多留机动田的现象，反而会助长这种现象。","type":"paragraph"},{"text":"（三）耕种机动田者是否向政府交租问题，我们认为现在还是按土地改革法的规定，暂时以低租租给贫苦农民耕种为好。否则耕种机动田者既不出租，计算负担时又不与其他的农业收入合并计算，则来电所指出的苦乐不均的现象将更加重了。但在按来电所提第四点办法实行之后，即在全面复查后，将所留机动田完全分配给农民，一般不再留机动田，而只在地多人少地区酌留若干机动田，这少数机动田，是可以考虑不收田租；而责成承种农民把田种好，不得只使用不施肥，并订出一套承种机动田的办法，避免苦乐不均现象的发生，此点你们现在可选择若干地点先行试验。请华东、西南、西北局亦注意处理这个问题。","type":"paragraph"},{"text":" 中央四月二十三日","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"江西省委并各省委、分局、市委、铁路局并报中央:","type":"appellation"},{"text":"土改中所留各乡机动田的处理问题，确是很大问题，根中南土委调查了五个乡，则有三乡留田超过百分之一，竟有留到百分之九者（广东惠堌县新乐乡留百分之九——三百余亩湖南长沙县樊唐乡留百分之五点七——三百余亩，湖北、武昌县锦绣乡留百分之五——二百余亩），而且管理办法不一，以致受益人苦乐不均，田地日趋荒芜，所有收入大部浪费。为此，特规定：","type":"paragraph"},{"text":"（一）除国营农场及农业试验场外，各乡田机动田至多只留百分之一，多留的应坚决分给少地的贫雇农，满足贫雇农的土地要求。","type":"paragraph"},{"text":"（二）按最多不能超过百分之一所留下的机动田，按土改法规定由乡区管理，归给农民耕种，只出负担不出租子。此种机动田负担应提早核实一亩产量，固定在一定数字上，计算时且不与使用户所有合并累进，另立机动田户头，谁种谁交，所收负担粮食为县地方粮收入，暂由县统一管理，用在乡村小学上，不准随便动用。何人可以借种由乡农民协会评议，尽先借给贫雇农，并应教育使用者不得只用不施肥损坏土地。","type":"paragraph"},{"text":"（三）原定收租又交负担办法是不妥的，土改后公家还收租也不好。","type":"paragraph"},{"text":"（四）关于筹设国营农场的地点，地亩场数及农业试验场情况，请各省于五月底以前查报。各乡所留百分之一机动田，拟在查田定产及全面复查后，完全分配给农民，只保持地多人少区的机动田。关于此事，可在今冬作具体布置，亦请加以考虑。以上办法是否可行，请中央指示。","type":"paragraph"},{"text":" 中南局\t四月九日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38f6d56064"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
