64,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京9日电】　毛泽东主席今天下午接见阿拉伯也门共和国总统阿卜杜拉·萨拉勒元帅和他率领的阿拉伯也门共和国访华代表团全体成员。"},{"type":"paragraph","text":"被接见的代表团成员有:副总理穆罕默德·拉埃尼准将，副总理阿卜杜·拉赫曼·埃里亚尼，国防部副部长哈迪·埃萨准将，总统事务国务部长穆罕默德·卡伊德·塞弗，国务部长阿卜杜·加尼·穆塔哈尔，总统顾问阿卜杜拉·道比上校，总理顾问哈桑·迈基博士，总统法律顾问艾哈迈德·弗·阿布·奥荣，总统办公室主任穆贾赫德·哈桑中校，总统府秘书长阿里·马塔里等。"},{"type":"paragraph","text":"毛泽东主席同也门贵宾们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有刘少奇主席、周恩来总理以及方毅、曾涌泉、宫达非、葛步海。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\06\\646a010601.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e孟庆彪\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛泽东主席和阿卜杜拉·萨拉勒总统亲切交谈。"},{"type":"paragraph","text":"(新华社传真　孟庆彪摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfdcc84bd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
