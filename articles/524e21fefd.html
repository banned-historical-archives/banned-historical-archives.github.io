rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在用的过程中加深对毛主席的忠诚","authors":["学习毛主席著作积极分子六八四六部队助理军医马毅"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“对于马克思主义的理论，要能够精通它、应用它，精通的目的全在于应用。”在斗争实践中，我认识到毛主席一贯倡导的革命学风的核心，就是一个“用”字。"},{"type":"paragraph","text":"有一次，我听说驻地附近的一位贫农妇女下肢瘫痪了，躺在床上连身也不能翻。疾病折磨着这位阶级姐妹，我心里难过极了，很想为她解除痛苦，但一转念，觉得困难很多，又犹豫起来了。就在这时，我想起了毛主席的教导：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”决心照毛主席的指示办事，为这位贫农妇女治疗。"},{"type":"paragraph","text":"可是，当我动手为她看病时，了解到她已有半年不能下床，怕脏的思想又在我脑子里露头了。尽管第一次还是给她看了，但心里总觉得不大舒服。晚上，我带着这个问题又学习了《为人民服务》，认识到不能光在口头上讲为人民服务，要把这五个大字真正落实在行动上。打这以后，我坚持每天跑一里多路，登门为她治疗。针对她的病情，我一边为她针灸，一边给她按摩。开始疗效不好，我思想上产生过动摇。但是一想到毛主席的教导：“我们的同志在困难的时候，要看到成绩，要看到光明，要提高我们的勇气。”信心就坚定起来了，想尽一切办法，坚持为她治疗。尽管以后还遇到过许多困难，我都没有动摇。就这样，经过连续认真的治疗，这位贫农妇女终于恢复了健康。"},{"type":"paragraph","text":"实践使我进一步认识到：活学活用毛泽东思想，在“用”字上狠下功夫，是对毛主席、毛泽东思想的根本立场、根本态度问题。在用的过程中经历的每一个斗争，特别是在斗争中的每一个关键时刻，能不能坚决地用，狠狠地用，都是对毛主席忠诚的一次严峻考验。无产阶级的立场越坚定，对毛主席的无产阶级感情越深厚，在关键时刻，对毛主席的指示用得就越狠，落实得就越好。我们革命战士，要自觉地在用的过程中检验自己对毛主席的忠诚，加深自己对毛主席的忠诚。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"524e21fefd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
