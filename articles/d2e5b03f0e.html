”，不联系单位实际和个人思想，这种否定是不彻底的","authors":[],"dates":[{"year":1984,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《人民日报》二十七日发表以《彻底否定“文革”要解剖要害问题》为题的评论员文章。"},{"type":"paragraph","text":"文章说:全军第一期整党单位，都拿出一段时间，集中进行彻底否定“文革”的教育。从思想上彻底否定“文革”，是一个理论联系实际的过程:重新学习六中全会《决议》，进一步弄清“文革”的那一套理论是根本违背马克思主义的；紧密联系本单位的实际，联系个人的思想，彻底清除“文革”的影响，集中解决某些要害问题。如果只是抽象地谈论应当彻底否定“文革”，却不具体地否定本单位按照“文革”的错误理论和办法进行的一切活动，澄清自己对“文革”的糊涂和错误认识，那么这种否定是不彻底的。"},{"type":"paragraph","text":"各地方、各部门情况不同，都有自己在整党中必须解决的主要问题。总后勤部机关以“保邱反邱”划线，作为看人看事、判断是非的依据，特别是在调整班子、任免干部、评级调资中，涉及具体人具体事，以此划线，常常为此争论不休，成为派性的祸根。总后党委经过反复研究，决定集中力量解剖如何看待“反邱保邱”这个关键问题，摆事实，讲道理，使最初反邱以后长期受迫害的某些同志主动卸下“一贯正确”的包袱，感动一些犯过错误的同志，跟着放下“消极挨整”的包袱。这样做，真正体现了这次整党联系实际，实事求是，解剖典型，就事论理的精神，促使机关干部与干部间，领导与群众间，在弄清思想的基础上，提高了党性，增强了团结。"},{"type":"paragraph","text":"有人担心，进行彻底否定“文革”的教育，会引起纠缠历史旧账，引起新的隔阂。这种担心是多余的。我们进行彻底否定“文革”的教育，统一对“文革”的认识，不是统一到某一派的看法或某些人的观点上，而是把大家的思想统一到十一届六中全会的《决议》的精神上来，根除派性，增强团结。这同那种争高低、比输赢的纠缠历史旧账，是完全不同的两回事。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2e5b03f0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
