:[],"dates":[{"year":1957,"month":8,"day":5}],"is_range_date":false,"parts":[{"text":"姜卓廉——学生中的右派女头目","type":"title"},{"text":"《人民日报》讯：河南农学院学生会主席姜卓廉在整风开始后，和其他右派分子勾结猖狂向党进攻。她挥手高喊“十二级大风暴已经来临，战斗开始了”。姜卓廉利用学生会的名义到处点火，在林学系学生并系问题上，她贴出大字报煽动学生到北京请愿。她又跑到地质部地质训练班，介绍鸣、放“经验”，唆使学生开大会首先打击党的领导。她还发动学生去“支援”郑州师专的“鸣放”。在校内，她又和右派分子曾展森为首的反党小集团勾结在一起，污蔑“农学院的肃反是违法乱纪”。她利用学生会通过决议成立“肃反调查小组”，宣称这个小组不受党的领导，并要挟党组织让他们查看档案材料，她还召开“控诉大会”，进行反动活动。学生都擦亮眼睛，与她展开了斗争。","type":"paragraph"},{"text":"姜卓廉为什么这样痛恨党的领导呢？原来她出身于三千亩地的大地主家庭，父亲姜文修曾任国民党区长、县参谋长、军民合作站站长，摧残压榨过不少劳动人民，在土改中被人民政府镇压了。她的四叔、五叔都是恶霸地主，在土改时畏罪潜逃。姜卓廉就是站在维护她家庭利益的反动立场上，向党进攻的。","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月5日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec7c04c40e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
