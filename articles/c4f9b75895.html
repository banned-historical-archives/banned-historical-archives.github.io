tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛泽东思想给了我无穷的力量”","authors":["新华社"],"parts":[{"type":"paragraph","text":"日本革命青年山崎在毛泽东思想鼓舞下勇敢地投入反美斗争，并且在斗争中迅速地成长起来。"},{"type":"paragraph","text":"山崎学习了毛主席的光辉著作《愚公移山》后，认识到美帝国主义和追随美帝的日本反动派，是日本人民的敌人，是压在日本人民头上的两座大山，只有搬掉这两座大山，才能取得彻底解放。"},{"type":"paragraph","text":"一次，在美国核动力航空母舰闯进佐世保港时，山崎怀着对美帝国主义的满腔怒火，同伙伴们一道参加示威，向敌人展开了英勇的斗争。他拿着扩音喇叭，走在游行队伍的最前面，带领群众高呼反美口号，高唱毛主席语录歌，鼓舞游行群众奋勇前进。当日本反动警察疯狂地向示威群众喷水、发射催泪弹，并用装甲车冲撞游行队伍时，山崎更加燃起了对美日反动派的仇恨烈火。他领着群众高声朗读毛主席语录：“下定决心，不怕牺牲，排除万难，去争取胜利。”向敌人发起了猛烈的反击。"},{"type":"paragraph","text":"斗争的胜利，增强了山崎的革命意志和争取更大胜利的信心。他说，“群众斗争教育了我，使我深刻地认识到，‘群众是真正的英雄’，美帝国主义和日本反动派不过是纸老虎。只要我们敢于斗争，敢于胜利，就一定能够战胜美帝国主义和日本反动派。”"},{"type":"paragraph","text":"山崎通过斗争实践，更加深刻地体会到学习毛主席著作的重要性。他说，“毛泽东思想给了我无穷的力量，学了毛主席著作，方向明，干劲大”。在毛泽东思想指引下，山崎更加坚决地投入了反对美日反动派的斗争，他参加了抗议美国强盗飞机坠毁九州大学的斗争、要求美军撤除板付基地的斗争和要求撤除美军山田弹药库的斗争等，一次又一次地和前来镇压的反动警察进行了激烈的搏斗，在反美斗争中政治觉悟不断提高。 （据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4f9b75895"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
