,"dates":[{"year":1967,"month":9,"day":10}],"is_range_date":false,"parts":[{"text":"广西军区公告","type":"title"},{"text":"广西军区","type":"authors"},{"text":"广西军区关于撤消南宁警备区司令部、政治部致《新工总、倒海翻江负责人的忠告、警告书》的公告","type":"subtitle"},{"text":"五月廿九日南宁警备区司令部，政治部发表了致《新工总，倒海翻江等负责人的忠告、警告书》（以下简称忠告警告书），这个忠告警告书是十分错误的。我们违背了毛泽东思想，站在资产阶级反动路线的立场上，把矛头指向革命组织和革命群众，抓住造反派的某些缺点错误，随便上纲，压制打击了革命造反派，加深了军队和人民群众之间的矛盾，造成了严重的后果。现在我们郑重宣布：决定将忠告警告书撤销，并向新工总，倒海翻江公开道歉。","type":"paragraph"},{"text":" 中国人民解放军南宁警备区司令部政治部一九六七年九月十日","type":"paragraph"},{"text":"","type":"appellation"}],"comments":[],"origin":"广西“4.22”战报编辑部、红代会北京经济学院红旗公社红旗报编辑部《“4.22”战报 红旗》联合版 1967年9月24日第4版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4301e784a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
