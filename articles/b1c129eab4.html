ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"在黄镇关于印尼寻求贷款问题的报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在黄镇“关于印尼寻求贷款问题的"},{"type":"paragraph","text":"报告上的批语"},{"type":"paragraph","text":"（1958年7月31日）陈毅同志："},{"type":"paragraph","text":"此件?第二页第二段所说向我贷款事，黄镇是否曾有报告？如有，请送一阅。此件阅后退毛。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月卅一日[1]黄镇，当时任中国驻印度尼西亚大使。[2]陈毅，当时任国务院副总理兼外交部部长。"},{"type":"paragraph","text":"[3]指黄镇1958年7月27日给外交部的报告。其中第二页上说，根据印尼向苏联要求贷款的情况，以及印尼当前继续执行镇压颠覆活动的政策，要取得美国的贷款尚有许多困难，印尼既已向我政府迫切地提出了贷款的要求，我馆意见，我政府可酌量贷予一部分。这将和过去的米、布贷款一样，会起到雪中送炭的作用。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":7,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":513,"page_end":513},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1c129eab4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
