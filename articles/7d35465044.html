ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"给黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给黄炎培的信"},{"type":"paragraph","text":"（1958年2月29日）黄任老："},{"type":"paragraph","text":"惠书敬悉。自前形势，确实是好的，如能予以适当的指导，定将产生很大的力量。一个月前赐书中论及深葬事，适获我心，将来适当时机，可能推广实行。"},{"type":"paragraph","text":"顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五八年二月廿九日"},{"type":"paragraph","text":"[1]黄炎培，字任之，当时任中国民主建国会主任委员、全国人大常委会副委员长。"},{"type":"paragraph","text":"[2]指黄炎培1958年2月23日给毛泽东的信。信中谈了他在农历除夕同民建中央小组到北京市参观商业时看到的情况：商场中没有过去出现的拥挤现象，许多商店的售货员春节加班应市；一些公私合营企业互送挑战书、保证书，提出开展比思想、比学习、比卫生、比朴素、比干劲、比钻劲活动，说明私方人员包括民建会员决心抛弃资产阶级立场，转向社会主义立场了。"},{"type":"paragraph","text":"[3]指黄炎培1958年1月29日给毛泽东的信。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":2,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":58,"page_end":58},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d35465044"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
