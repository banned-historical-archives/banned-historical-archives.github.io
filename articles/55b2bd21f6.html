art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛泽东与新中国”学术研讨会举行","authors":["张心阳/王握文"],"parts":[{"type":"paragraph","text":"“毛泽东与新中国”学术研讨会举行"},{"type":"paragraph","text":"本报长沙9月11日电记者张心阳、王握文报道：在共和国即将迎来60华诞之际，“毛泽东与新中国”学术研讨会暨中国中共文献研究会毛泽东思想生平研究分会成立大会在湖南长沙举行。"},{"type":"paragraph","text":"与会代表就毛泽东对新中国建立与发展的历史贡献、毛泽东与中国社会主义基本制度的确立、毛泽东与马克思主义中国化、毛泽东与中国特色社会主义等话题进行了探讨和交流。会议认为，毛泽东是中国共产党、中华人民共和国和人民军队的主要缔造者和领导者，是伟大的马克思主义者和伟大的无产阶级革命家、战略家、理论家，其伟大功绩主要在于领导中国人民摆脱了帝国主义和封建主义的反动统治，使中华民族巍然屹立于世界民族之林，领导党和人民实现了中国社会从新民主主义到社会主义的历史性转变，在中国建立了社会主义基本制度，开创了人民当家作主的新时代，奠定了中国共产党的执政地位和国际上的大国地位，开辟了沿着社会主义道路实现中华民族伟大复兴的新纪元，是中国社会主义制度的奠基人，没有毛泽东就没有新中国。"},{"type":"paragraph","text":"全国人大常委会原副委员长王汉斌，中共中央文献研究室、中共湖南省委、中国中共文献研究会的主要领导同志，毛泽东的亲属和原身边工作人员等共200余人出席会议。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55b2bd21f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
