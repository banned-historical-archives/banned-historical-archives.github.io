script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"班禅额尔德尼启程返西藏  电毛泽东主席致敬","authors":[],"dates":[{"year":1951,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"班禅额尔德尼启程返西藏"},{"type":"paragraph","text":"电毛泽东主席致敬"},{"type":"paragraph","text":"【新华社西宁十四日电】班禅额尔德尼在离开青海省返西藏前致电毛泽东主席，西北军政委员会彭德怀主席、习仲勋、张治中副主席和中国人民解放军入藏部队各首长致敬。毛主席复电勉励。此外，班禅额尔德尼还致电札什伦布政教僧俗官员并日喀则的全体僧俗民众。"},{"type":"paragraph","text":"各电电文如下："},{"type":"paragraph","text":"一、致毛泽东主席电"},{"type":"paragraph","text":"敬爱的毛主席："},{"type":"paragraph","text":"在您的英明正确领导下，使好多年来没有也不可能解决的西藏问题获得了解决。这不仅使全国大陆胜利统一，而且拯救了西藏民族与西藏人民于苦海，走向光明幸福的大道。现值班禅离青返藏之际，谨以至诚向您致以崇高的敬意，并以至诚坚决表示：这次返藏以后，一定要在您、中国共产党和中央人民政府领导之下与达赖佛紧密团结，共商一切，为彻底实现和平解放西藏办法的协议，驱除帝国主义在西藏的影响，巩固国防和建设新西藏而奋斗。二、致西北军政委员会彭德怀主席、习仲勋、张治中副主席电"},{"type":"paragraph","text":"西北解放以后，敬蒙您们的关怀，班禅得到了自寄居内地以来从来没有过的温暖。现因西藏业已和平解放，达赖佛屡电促班禅返回，班禅已决定于十二月十五日动身返藏。兹特向您们致以崇高的谢意，并愿意返藏后以促成和平解放西藏办法的协议早日全部实现的实际行动来报答您们。"},{"type":"paragraph","text":"三、致人民解放军入藏部队张国华司令员、谭冠三政治委员，"},{"type":"paragraph","text":"范明司令员、慕生忠政治委员并全体指挥员和战斗员电"},{"type":"paragraph","text":"您们为了西藏人民的解放受尽了千辛万苦，先后胜利抵达拉萨，进驻日喀则城及江孜重镇。您们这种英勇卓绝的行动表现了对和平解放西藏办法的协议执行的真诚，给西藏人民带去了无限光明和幸福，从而帝国主义在西藏的影响将被迅速驱除，使西藏人民建设事业得到有力保障。兹值班禅返藏之际，除先电致敬外，并向您们保证返藏之后，誓以个人力之所及，在帮助人民解放军入藏部队加强军民团结方面尽最大努力。"},{"type":"paragraph","text":"四、致札什伦布政教僧俗官员并日喀则全体僧俗民众电札什伦布政教僧俗官员并日喀则全体僧俗民众："},{"type":"paragraph","text":"和平解放西藏办法的协议的签订，迄今将近半年。我本应早日返藏与大家共同建设新西藏，但由于远居内地，准备较繁，以致拖延时日。现在在中央人民政府与西北军政委员会、青海省各级人民政府的积极帮助下，筹备工作已告结束，并于十二月十五日（藏历十月十七日）由青海省启程返藏。望全藏人民今后在毛主席、共产党和中央人民政府的领导下，在达赖佛及大家亲密团结和全国广大人民群众的协助下，为彻底实现和平解放西藏办法的协议，建设一个繁荣幸福的新西藏，使西藏广大人民和全国各民族人民一道走向光明伟大的胜利途径而共同努力。毛主席复电"},{"type":"paragraph","text":"青海省人民政府转班禅额尔德尼先生：感谢你的来电。我完全同意你的这种志愿，即在中国共产党和中央人民政府领导下，与达赖喇嘛紧密团结，为彻底实行和平解放西藏办法的协议，驱除帝国主义在西藏的影响，巩固国防和建设新西藏而奋斗。并祝你顺利地到达目的地。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五一年十二月十三日"},{"type":"paragraph","text":"班禅额尔德尼致达赖喇嘛电"},{"type":"paragraph","text":"达赖佛：屡奉电示。为了建设新西藏，你促我早日返藏，为我筹备一切，并令第五代本候命保护。这些盛情厚意，使我万分感谢。现我已决定于今年十二月十五日（藏历铁兔年十月十七日）返藏，谨电奉闻；并以至诚向您保证：这次返藏后，在毛主席、共产党与中央人民政府领导下，进一步加强我藏族内部的团结，并与国内各兄弟民族人民亲密合作，为迅速彻底实现和平解放西藏办法的协议，建设一个繁荣幸福的新西藏而共同奋斗。"},{"type":"paragraph","text":"班禅额尔德尼"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7f9932f9c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
