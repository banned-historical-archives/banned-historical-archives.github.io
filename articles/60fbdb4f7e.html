陈佩芬"],"dates":[{"year":1966,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海统益纺织厂基干民兵　施宝珍　华厚怀　卢嘉修　陈佩芬"},{"type":"paragraph","text":"反党反社会主义分子贺绿汀，大肆吹捧资产阶级的所谓“学者”、“专家”、“权威”，说他们“知识渊博”、“工作优良”，似乎他们是“国家栋梁”，少了他们我们就不行，就会办不了学、听不到音乐了。他还猖狂挑战说:“谁有工作能力，就让谁来领导”。这个资产阶级的“权威”，妄想我们把社会主义的音乐阵地，让位给资产阶级。瞧!贺绿汀的反动气焰，是何等嚣张!"},{"type":"paragraph","text":"贺绿汀竟敢凭借他那套资产阶级的臭东西，向广大工农兵挑战，妄图要挟我们，这真是太不自量了。我们工农兵，没有你们这批资产阶级“权威”，不但可以照样地歌唱，而且会唱得更好。请看，第七届“上海之春”的四千多名演员中，我们工农兵就占了百分之七十，参加演出的节目占有很大比重。这个铁的事实，不正是给你们这些资产阶级“权威”们一记响亮的耳光吗!"},{"type":"paragraph","text":"其实贺绿汀这一小撮所谓音乐“专家”，又有什么了不起呢?你们这些时时刻刻都在搞反党反社会主义勾当，日日夜夜都在做资本主义复辟美梦的坏东西，肚里还能有什么好货呢?你们这些自以为“知识渊博”的人，说穿了，不过就是一群披着人皮的恶狼，是几条社会主义的蛀虫而已。对于我们伟大革命事业说来，不但不需要你们这些所谓“专家”、“权威”，而且只有坚决地把你们彻底清除!清除得越早、越快、越彻底就越好。"},{"type":"paragraph","text":"上海音乐学院的全体革命师生们，你们这次把贺绿汀这只大毒虫揪出来了，你们揪得好!打得好!我们民兵誓作你们的后盾。我们欢呼把隐藏在音乐队伍里的一只毒虫揪出来，让我们把它踩在脚底下。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60fbdb4f7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
