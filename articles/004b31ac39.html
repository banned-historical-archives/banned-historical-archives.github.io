dates":[{"year":1975,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社万象一九七五年五月九日电　万象市数万名工人、学生、职员、市民、军人、警察和各界群众五月九日上午集会和示威游行，反对万象极右派破坏和平和制造经济困难的罪行，敦促国防大臣西苏·纳占巴塞等万象方面的大臣立即辞职，要求美国中央情报局等美国特务机构全部撤出老挝。"},{"type":"paragraph","text":"这次集会和示威游行是由老挝恢复和平和实现民族和睦协调委员会的二十一个群众组织发起和组织的。"},{"type":"paragraph","text":"二十一个群众组织的负责人在集会上相继发表演说。他们揭露和谴责西苏等人亲美卖国、破坏和平、欺压人民、贪污舞弊和制造经济困难等罪行，并且号召广大群众团结起来，拿起武器，奋起斗争，解放万象和全老挝。他们的演说不时地被雷鸣般的掌声、口号声和欢呼声所打断。"},{"type":"paragraph","text":"会后，与会群众举行了游行示威。沿途，许多群众自动加入游行队伍，使队伍迅速扩大至三万多人。马路两旁，成千上万的群众，对游行队伍热烈鼓掌和欢呼。"},{"type":"paragraph","text":"当游行队伍经过美国驻老挝大使馆时，示威群众高呼“美国佬，滚出去!”等口号。之后，游行队伍又聚集到国家体育场继续集会。二十一个群众组织发表一项联合声明，谴责帝国主义和新、老殖民主义，对老挝的侵略和干涉。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"004b31ac39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
