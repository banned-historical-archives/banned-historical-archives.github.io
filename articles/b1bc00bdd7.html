[{"year":1966,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向资产阶级“权威”开火"},{"type":"paragraph","text":"聂元梓等同志揭露了宋硕、陆平、彭珮云黑帮的阴谋，向他们开火了。这是你们突出了政治，活学活用毛主席著作的结果。你们按照毛主席的教导办事，“舍得一身剐，敢把皇帝拉下马”的大无畏英雄气概，值得大家赞扬和学习。你们的这种精神，启发了我们。我们革命青年决不能相信资产阶级“权威”。对这些“权威”的言行，必须用毛泽东思想加以检查，凡是不符合和违背毛泽东思想的，我们必须揭露和批判，毫不含糊。"},{"type":"paragraph","text":"扬州师范学院数理系学生　朱鹏　李茂生"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1bc00bdd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
