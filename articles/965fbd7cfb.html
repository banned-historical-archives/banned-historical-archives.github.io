"dates":[{"year":1964,"month":11,"day":21}],"is_range_date":false,"parts":[{"text":"林彪关于军训工作的指示","type":"title"},{"text":"[林彪听副总参谋长张宗逊关于军训工作的汇报后的指示。1964年11月22日，全军军训工作会议17号文件印发。11月26日，毛泽东批示：“此件已阅，很好。”]","type":"paragraph"},{"text":"这几年训练工作有成绩，已有的成绩要巩固，不能减弱，不能退下来。只能进，不能退。各军种、兵种都要搞天天练，各有重点，各有过硬的本领，像打乒乓球一样，不天天练就打不赢对方。打拳也是这样，不练是不行的。写大小字也是这样，不是一两天就能写好的。原子条件、火力越发展、越需要加强近战、夜战，攻防都是一二百米内解决战斗。部队、院校、兵种都要继续前进，继续搞中央军委方针、原则的落实，要坚持、要传播，不要失传，成绩不要退下来。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"965fbd7cfb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
