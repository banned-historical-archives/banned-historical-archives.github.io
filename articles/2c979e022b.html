art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一致谴责南共修正主义","authors":[],"parts":[{"type":"paragraph","text":"综合新华社讯 捷克斯洛伐克共产党第十一次代表大会在19日、20日下午和晚上与21日上午，继续讨论捷共中央报告。"},{"type":"paragraph","text":"三天来捷共代表发言的有捷陆军政治部主任普尔赫利克、捷共中央政治局委员柯别茨基、捷共中央书记亨德里赫等人。普尔赫利克在发言中强调了在军队中加强党的领导和扩大民主的重要性。柯别茨基谈到捷科学在完成社会主义建设中的事业中的任务，并赞扬了苏联在科学校术方面所取得的卓越成就。亨德里赫发言中指出对现代修正主义的斗争意义，不逊于列宁粉碎伯恩斯坦和第二国际的斗争。"},{"type":"paragraph","text":"三天来兄弟党代表发言的有苏联共产党代表团团长、苏共中央主席团委员、中央书记基里钦科、中国共产党代表团团长、中共中央政治局委员董必武、保共中央政治局委员拉·达米杨诺夫、波兰统一工人党中央政治局委员洛加一索文斯基、罗马尼亚工人党代表团团长、中央政治局委员德勒吉奇、法国共产党代表团团长、法共政治局委员、书记处书记皮佑、意大利共产党代表团团长、意共领导机构成员维·斯巴诺、阿尔巴尼亚劳动党代表团团长、中央政治局委员卡博、匈牙利社会主义工人党代表团团长、中央政治局委员福克·耶诺、蒙古人民革命党代表团团长、中央政治局委员杜格苏伦、奥地利共产党代表团团长柯普勒尼希、印度尼西亚共产党总书记艾地、西班牙共产党代表，印度共产党代表巴苏以及芬兰、墨西哥、阿根廷、约旦、苏丹、伊朗、瑞士、委内瑞拉、卢森堡、荷兰和澳大利亚等国兄弟党代表。"},{"type":"paragraph","text":"在发言中热烈祝贺捷共在社会主义建设中的成就，并一致谴责南共修正主义，指出南共领导是为美帝国主义服务的叛徒。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c979e022b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
