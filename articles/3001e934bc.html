ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对《湖北省委召集五个公社工业书记座谈公社工业问题》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对《湖北省委召集五个公社工业书记"},{"type":"paragraph","text":"座谈公社工业问题》一文的批语"},{"type":"paragraph","text":"（1959年12月）此文\"请阅，送各同志。退毛。"},{"type":"paragraph","text":"[1]指新华通讯社1959年12月1日编印的《内部参考》第二九二三期上登载的《湖北省委召集五个公社工业书记座谈公社工业问题》一文。文章介绍了这次座谈会的情况：一、会议认为公社工业具有巨大的优越性。具体表现在：1.有力地支援了农业生产。2.支援了国家建设，增加了公社收入。3.增加了公社资金的积累。二、确定1960年公社工业的发展方针是：集中力量为农业生产大跃进服务，以农具和农产品加工工业为重点，全面提高和发展。三、必须从上而下地加强对公社工业的领导，完善公社管理体制。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":509,"page_end":509},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3001e934bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
