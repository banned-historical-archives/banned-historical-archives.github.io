主义的坚定立场受到观众热烈赞扬","authors":[],"dates":[{"year":1961,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　“阿尔巴尼亚劳动党领导人民解放祖国和建设社会主义图片展览会”，在上海市展出两个星期后，已于昨日胜利闭幕。十四天来，共有九万五千多观众参观了展览会。"},{"type":"paragraph","text":"每天从早到晚，展览馆门口都可以看到观众排着长长的行列在等候入场参观。不少观众在场内来回反复观看，仔细摘录有关的文字材料。许多观众在留言处写下了观后感。他们祝阿尔巴尼亚人民在以恩·霍查为首的劳动党中央的领导下，在社会主义建设中取得更大的成就。他们对阿尔巴尼亚劳动党和人民坚决反对帝国主义、反对现代修正主义，表示热烈赞扬。沪东造船厂一位工人写道:“看到展出的图片，就好象看到了英雄的阿尔巴尼亚人民，看到了他们英勇的斗争和伟大的胜利。我热爱你们的伟大领袖霍查同志!”海军战士夏振青写道:“看了展览会后使我确信，阿尔巴尼亚劳动党过去和今天所走的道路，始终是正确的马克思列宁主义道路。我坚信阿尔巴尼亚一定会取得更大的胜利和成就。”交通大学工程力学系七十二班的部分同学写道:“中阿两国人民在为共同的理想而斗争中结成了深厚友谊。我们欢呼阿尔巴尼亚人民的胜利，把您们的胜利看作是我们的胜利。”观众晓柯写了一首歌颂阿尔巴尼亚的诗:“您是暴风雨中的山鹰，您是战火中的尖兵，您是马克思列宁主义的保卫者，您忠实于伟大的列宁!向您致敬——英雄的阿尔巴尼亚!”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8861ddb906"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
