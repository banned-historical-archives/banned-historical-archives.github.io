大学大用毛泽东思想，使革命大批判更加深入持久地向前发展","authors":[],"dates":[{"year":1968,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据《人民日报》报道　北京市第七中学的革命师生，紧跟毛主席的伟大战略部署，狠抓革命大批判。他们采取革命大批判和本校阶级斗争实际相结合，革命大批判和活学活用毛泽东思想相结合，革命大批判和教育革命相结合的方法，充分调动了广大革命师生的主动性和积极性，使革命大批判更加深入持久地向前发展。"},{"type":"paragraph","text":"为了把革命大批判和本校阶级斗争实际紧密结合起来，七中革委会注意掌握阶级敌人的新动向。他们发现，校内一小撮阶级敌人还在猖狂进行活动，胡说什么“革委会和驻校解放军执行新的资产阶级反动路线”，“太过火了”。革委会同志分析了这些谬论，认识到这是一小撮阶级敌人在猖狂进行右倾翻案活动，其目的是妄图搅乱阶级阵线和搞垮新生的革委会。革委会彻底揭发了阶级敌人的阴谋活动，从而提高了广大革命师生对敌斗争观念，他们积极参加革命大批判，把这一小撮阶级敌人的反动谬论批驳得体无完肤。"},{"type":"paragraph","text":"为了把革命大批判和大学毛主席著作密切结合起来，七中找到了“宣讲团”的形式。“宣讲团”以学生为主，由学生、教师、干部和解放军组成。“宣讲团”在革委会的领导下，学习毛泽东思想，宣传毛泽东思想；批判中国赫鲁晓夫，批判本校的走资派、叛徒和特务。在每次专题批判前，全校“宣讲团”一起学习毛主席有关著作和语录，共同拟定宣讲提纲，深入各教学班，把所要批判的专题讲深讲透。通过宣讲，革命师生进一步掌握了毛泽东思想这个威力无比的武器，弄清楚了要批判的内容和重点。所以每次宣讲后，都出现了革命大批判热潮。这样做，即使刚刚入校的新生都能积极地投入革命大批判。广大革命师生每次学习毛主席一个观点，批判中国赫鲁晓夫一条谬论，肃清其散布在学校的流毒。"},{"type":"paragraph","text":"毛主席教导我们:“学制要缩短，教育要革命，资产阶级知识分子统治我们学校的现象，再也不能继续下去了。”"},{"type":"paragraph","text":"七中广大革命师生遵照毛主席的教导，把革命大批判和教育革命紧密地结合起来。他们把课堂变成革命大批判的“战场”，用毛泽东思想为武器，批判中国赫鲁晓夫及其代理人推行的“业务挂帅”、“分数第一”等等修正主义黑货，控诉他们毒害学生的滔天罪行。当时，有的教师对批判旧语文课不感兴趣，说什么:语文嘛，就要有语文的特点，就要讲究它的字、词、句和篇章、结构。革命师生一针见血地指出，这种论调是单纯业务观点，这是不突出无产阶级政治的表现，实质上是修正主义教育路线的流毒还没有肃清。通过革命大批判，使广大新生积极地投入到教育革命的实际斗争中来。"}],"comments":[],"origin":"《人民日报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db084cd99a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
