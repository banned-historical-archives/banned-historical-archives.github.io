rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"图片","authors":["毛泽东"],"parts":[{"type":"paragraph","text":"柳夷同志："},{"type":"paragraph","text":"还是八月间的你的信，今天才复你，不知对于你的问题还有帮助否？不知你还在三大队否？我因忙积累至今才复，对你不起！"},{"type":"paragraph","text":"你的意思是恳切的，如果陕公抗大党的同志所说：你的表现够上入党资格，仅仅过去加入与脱离国民党一点无人证明，是确实的，而你在延又有九月之久，并无其他不能入党的问题存在，我以为是可以入党的。此事解决办法，可持此信与三大队负责同志商酌，你的原信也随同交给他们看，要求他们最后考虑你的问题。如尚不能解决，可持此信到抗大政治部张主任处。你所指出的几个缺点是有理由的，你的信可送给政治部参考。最后告你的，马列学院必须党员并须学养较高者才能进去。"},{"type":"paragraph","text":"此复。并致"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月卅日"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85aab3aa8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
