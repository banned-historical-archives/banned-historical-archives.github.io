" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"自治区党委关于第二期第二批整党工作的意见（节录）","authors":[],"dates":[{"year":1985,"month":8,"day":5}],"is_range_date":false,"parts":[{"text":"自治区党委关于第二期第二批整党工作的意见（节录）","type":"title"},{"text":"我区自去年二月开展整党以来，区直机关第一期整党已于今年二月结束。第二期第一批（地、市机关和区直二层机构）整党也将于八月份基本结束。根据中指委的部署和我区整党工作的进展情况，第二期第二批整党即将在全区县级单位铺开。为了搞好这批整党工作，提出以下几点意见：","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"（二）要进一步明确这次整党的指导思想，认真解决存在的主要问题。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"四是要巩固和发展安定团结的局面。我区经过处理“文革”遗留问题工作，思想上政治上的拨乱反正取得了很大成绩，安定团结的局面已经基本形成，但是当前早一些地方和单位，影响安定团结的因素还存在，主要是还有些“文革”遗风和派性残余。因此，整党中还要继续进行彻底否定“文革”的教育，联系实际，进一步肃清“左”的影响，使每个党员和干部都能坚决排除派性干扰，扫除“文革”遗风，从党性出发，从全局出发，实事求是地对待自己、对待同志、对待历史问题，充分肯定处遗成果，团结一致向前看。在具体工作上，一要进行做好“三种人”的核查和清理工作，决不能让这些人漏掉，更不能让他们混进各级领导班子和第三梯队来。二要进行抓紧做好受审查干部的定案处理和解脱的收尾工作。在处遗中受审查、受处分的同志要正确对待自己的错误，认真总结经验教训，不能文过饰非，企图翻案，甚至搞小动作，攻击或否定处遗工作。对这种现象要严肃处理。三要对个别处理畸轻畸重案件或处分不当的干部，要实事求是地纠正。自治区第五次党代会提出“加强团结，锐意改革，为实现广西经济尽快翻身而努力奋斗”的目标和号召，这是全区广大党员、干部和各族人民的共同愿望，也是广西的大局。我们一定要照顾这个大局，坚决维护安定团结。在党内和领导班子内部要坚持民主集中制，充分发扬民主，注意倾听群众的意见。另一方面，要坚决反对自由主义，注意克服一些地方出现的一些不正常现象，如不负责任的背后议论，道听途说，散布流言蜚语，甚至搞假材料，写匿名信等等，我们要通过整党，坚决根除派性，增强党性，克服宗派主义和自由主义倾向，消除各种不团结因素，切实加强党的团结和人民的团结，特别要加强领导班子的团结。要教育党员和干部识大体，顾大局，以党和人民的利益为重，不纠缠历史旧帐，不计较个人得失和恩怨，要在党性原则基础上，团结一致向前看，同心同德，和衷共济，致力于改革和经济建设，实现广西经济尽快翻身的目标。","type":"paragraph"},{"text":" （此件原载区党委整党办公室《整党通报》50，一九八五年八月十五日）","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"maoistlegacy.de-1198","name":"自治区党委关于第二期第二批整党工作的意见（节录）","author":"","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"自治区党委关于第二期第二批整党工作的意见（节录）","dates":[{"year":1985,"month":8,"day":5}],"is_r
