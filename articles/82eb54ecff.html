s":[{"year":1966,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为配合当前伟大的无产阶级文化大革命的深入开展，上海人民美术出版社最近绘制了四种宣传画:《高举毛泽东思想伟大红旗把无产阶级文化大革命进行到底》、《以毛泽东思想为武器，横扫一切牛鬼蛇神彻底揭露彻底批判彻底打倒不获全胜决不收兵》、《毛泽东思想的阳光照亮无产阶级文化大革命的道路》、《毛主席是我们心中的红太阳》。这些宣传画表现了工农兵群众、革命干部和革命知识分子，高举毛泽东思想伟大红旗，在无产阶级文化大革命的大道上奋勇前进，表现了全国各族人民坚决把革命进行到底的决心和信心。这四种宣传画将于本月十五日左右在全市新华书店发售。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82eb54ecff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
