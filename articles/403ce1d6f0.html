题对华东局组织部的答复","authors":[],"dates":[{"year":1954,"month":3,"day":29}],"is_range_date":false,"parts":[{"text":"中央组织部关于农村富农党员的处理问题对华东局组织部的答复","type":"title"},{"text":"二月十七日来函及附件阅悉。同意你们对于旧富农成份的党员应坚决清除出党，对新富农成份的党员则按照中央一九五二年六月“关于农村中富农成份的党员的党籍问题的规定”处理的意见。","type":"paragraph"},{"text":"对经过土改、整党、发展互助合作等运动的教育和经过去冬今春总路线的宣传教育后，仍不按行党的政策，而保持剥削行为富农成份的党员，不论其为旧富农或新富农都应无例外地清除出党。至于个别由于迷失农村经济发展方面而产生了某些剥削行为，但并未发展成为富农成份的党员，则须对他们抓紧教育；如经过教育后，本人有决心立即放弃剥削行为而其他方面亦均未丧失党员条件者，则不应以富农成份论处。同时还须注意对于过去系富农成份而已经放弃剥削的党员，或本人家庭虽为富农成份，但本人并未直接参与剥削行为的党员，亦不应按富农成份论处。","type":"paragraph"}],"comments":[],"origin":"根据中央文件原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"403ce1d6f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
