script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"关于练兵的指示","alias":"","parts":[{"type":"paragraph","text":"关于练兵的指示！"},{"type":"paragraph","text":"（1946年5月1日）各局："},{"type":"paragraph","text":"关于练兵指示："},{"type":"paragraph","text":"（一）国民党反动派除在东北扩大内战外，现正准备发动全面内，在此种情况下，我党必须有充分准备，能够于国民党发动内战坚决彻底粉碎之；（二）准备工作中，除精简老弱（复员）、充实部队、减租减发展生产、整理财政等项外，各地必须抓紧练兵工作；(三）三个月来各地练兵工作抓得不很紧，没有造成热潮，有的了，有的没有练，此种现象应即刻检讨改正；（四）接此指示后，立即下令全军练兵，上级督促检查，将此看快定胜负的关键之一；（五）练兵内容，军事上练三大技术\"，练守城，练夜战，政治提高战胜顽军、保卫解放区之决心与信心;（六）执行情形速告。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"辰东这是毛泽东为中共中央起草的给各中央局的电报。"},{"type":"paragraph","text":"发活强、片家尔德、刘第、山东革中CAA"},{"type":"paragraph","text":"4己核糕"},{"type":"paragraph","text":"东北"},{"type":"paragraph","text":"检实示(网民先皮动孤除先大内外必正兴循严动全回内我;在此缠情：次下我志法强有充分弹循，能够格国医艺苏动，内我时阴波激底血粉碎之;(二)学俏二作中，除精荫老弱(复灵)，充实部院，减瘤减鸢，落合现财政芒次外，各地还须孤繁续你;(三)三月表然地绩实工作孤得不很没肩造成想潮，背的续了，有的没有绿，此千种"},{"type":"paragraph","text":"y讨队企，（の)格天龙临上续三大技术提高我读蛋信心;（州缺行信水毛泽东为中共中央起草的《关于练兵的指示》的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":293,"page_end":294},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c74404a5b1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
