ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1940年4月29日）"},{"type":"paragraph","text":"广东省委过去的工作成绩是，发展了进步势力，即发展了党；争取了中间势力，主要在军队方面；同顽固势力的斗争也有成绩。但没有大力发展党领导的武装力量是一个缺点。今后工作方针，应把发展党领导的武装力量作为发展进步势力的中心，应将工作重心放在武装工作和战区工作。现在应上山还是下水呢？现在-一切偏僻的地方都成为国民党的地区，我们不要上山，而要下水，深入敌后活动。对于时局估计，要准备最坏局面，要在最坏一点上来布置工作。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上听取中共广东省委书记张文彬"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":4,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":542,"page_end":542},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"539786e357"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
