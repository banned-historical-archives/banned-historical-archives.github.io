art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"歌唱领袖毛主席","authors":["振峰/辰生/洪炉"],"parts":[{"type":"paragraph","text":"一心想见毛主席（维吾尔族独塔尔弹唱）"},{"type":"paragraph","text":"在光荣的劳动里，"},{"type":"paragraph","text":"我的心灵多么欢畅，"},{"type":"paragraph","text":"一心想见毛主席，"},{"type":"paragraph","text":"这是我最大的愿望。"},{"type":"paragraph","text":"想念毛主席（布依族笔管歌）"},{"type":"paragraph","text":"毛主席啊毛主席，"},{"type":"paragraph","text":"幸福生活全靠您，"},{"type":"paragraph","text":"您的话儿永记起，"},{"type":"paragraph","text":"我们永远跟着您。"},{"type":"paragraph","text":"想念毛主席（彝族民歌对唱）"},{"type":"paragraph","text":"想去，想去，"},{"type":"paragraph","text":"想去北京城。"},{"type":"paragraph","text":"想念，想念，"},{"type":"paragraph","text":"想念毛主席。"},{"type":"paragraph","text":"丝巾献给毛主席（乌孜别克族民间舞蹈）"},{"type":"paragraph","text":"金针银线绣丝巾，"},{"type":"paragraph","text":"丰收的景象绣上面，"},{"type":"paragraph","text":"丝巾献给毛主席，"},{"type":"paragraph","text":"感激的心意表不完。"},{"type":"paragraph","text":"唱歌唱给主席听（瑶歌《拉法》）"},{"type":"paragraph","text":"站在山头望北京，"},{"type":"paragraph","text":"唱歌唱给主席听，"},{"type":"paragraph","text":"山高路远难听见，"},{"type":"paragraph","text":"千里相隔共条心。"},{"type":"paragraph","text":"毛主席光辉照心上（藏族山歌）"},{"type":"paragraph","text":"金色的首都北京城，"},{"type":"paragraph","text":"升起了不落的太阳，"},{"type":"paragraph","text":"毛主席的光辉照心上，"},{"type":"paragraph","text":"心儿永远暖洋洋。"},{"type":"paragraph","text":"问候恩人毛主席（黎族民歌）"},{"type":"paragraph","text":"做个水库在山峰，"},{"type":"paragraph","text":"水力发电声隆隆，"},{"type":"paragraph","text":"槟榔包心跟水去，"},{"type":"paragraph","text":"问候恩人毛泽东。"},{"type":"paragraph","text":"水家歌唱毛主席（水族大歌）"},{"type":"paragraph","text":"太阳白天红通通，"},{"type":"paragraph","text":"北斗星晚上亮晶晶，"},{"type":"paragraph","text":"它们都比不上毛主席，"},{"type":"paragraph","text":"主席的思想日夜放光明。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"079c8d2c46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
