ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"七绝·贾谊","alias":"","parts":[{"type":"paragraph","text":"七绝·贾谊"},{"type":"paragraph","text":"（1964年）贾生才调世无伦，哭泣情怀吊屈文。梁王堕马寻常事，"},{"type":"paragraph","text":"何用哀伤付一生。同"},{"type":"paragraph","text":"[1]贾生才调世无伦，本句借用李商隐《贾生》句：“贾生才调更无伦。”贾生，指贾谊（前200一前168），西汉洛阳（今河南洛阳东）人，时称贾生，西汉政论家、文学家。初被汉文帝召为博士，不久迁为太中大夫。文帝想任他为公卿，因遭大臣周勃、灌婴等排挤，贬为长沙王太傅。才调，指才气、才能。"},{"type":"paragraph","text":"[2]吊屈文，贾谊贬为长沙王太傅后，渡湘江时有感于屈原忠而见疏，作《吊屈原赋》，“因以自喻”。"},{"type":"paragraph","text":"[3]梁王堕马寻常事，何用哀伤付一生，贾谊后被征拜为梁怀王太傅，因梁怀王堕马而死，他认为自己“为傅无状”，忧郁自伤，不久去世。毛泽东非常赞赏贾谊的才华，认为他因哀伤而死不值得，并感到很惋惜。"}],"authors":["毛泽东"],"dates":[{"year":1964}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":412,"page_end":412},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4054116356"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
