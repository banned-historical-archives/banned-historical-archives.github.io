"],"dates":[{"year":1993,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宫泽内阁宣布总辞职"},{"type":"paragraph","text":"特别国会推迟选举日暂呈无政府状态"},{"type":"paragraph","text":"本报东京８月５日电记者张国成报道：今天上午，日本宫泽内阁在首相官邸举行的临时会议上决定本届内阁总辞职。"},{"type":"paragraph","text":"宫泽首相在会议上发表了讲话。他说，本届大选的结果，应理解为日本国民对自民党的严厉批判。面对这一事实，他决定引咎辞去内阁首相职务。他表示，为了恢复国民对政治的信任，希望早日实现彻底的政治改革。他希望新内阁能保持日本在内政和外交政策上的连续性。"},{"type":"paragraph","text":"会议结束后，宫泽离开了首相官邸。"},{"type":"paragraph","text":"宫泽内阁是１９９１年１１月成立的。去年１２月宫泽首相曾对内阁进行改组。今年６月１８日，日本众议院通过了对内阁的不信任案，随即国会解散，举行大选。在预定召开特别国会的今天，宫泽内阁已完成了它的历史使命。"},{"type":"paragraph","text":"又讯原定于今天下午举行的日本第１２７届特别国会，因在议长人选和会期等问题上自民党与“７党１会”争执不下，会议延迟到晚上９时半才草率开幕。会议决定，选举议长和首相等议程延期到明天进行。一分钟后即散会。"},{"type":"paragraph","text":"由于宫泽已辞职，而新首相未能产生，日本暂呈无政府、无首相状态。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a7a8af813"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
