" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共山东省监察委员会关于开除于梅仙党籍的决定","authors":[],"dates":[{"year":1956,"month":1,"day":7}],"is_range_date":false,"parts":[{"text":"中共山东省监察委员会关于开除于梅仙党籍的决定","type":"title"},{"text":"于梅仙（又名李萍），现年43岁，山东省无棣县人，家庭出身中农，本人成份教员，1934年入党，曾任县委书记，地委副书记兼组织部长等职，其主要错误：","type":"paragraph"},{"text":"一、奸污幼女，于在1952年养病期间，将其表兄张嵩亭（反革命分子）之女张薇新（9岁）收为干女儿，改姓名为于凝新。此后，于即对此幼女长期进行奸污，两三年来奸污共达几十次之多。直至1955年于在北京养病，于凝新前去探望，于2月4日夜于又想奸污她，该女不从，由房内跑到院中喊叫说于梅仙强奸她，问题也暴露出来，造成极坏的影响。","type":"paragraph"},{"text":"二、丧失立场包庇反革命分子。于之表弟王玉銮系一勾结特务杀人犯，1951年镇反时潜逃在于的家中，于不向政府检举而将其隐藏起来，后被政府发觉逮捕处死。另于之表兄张嵩亭是一反革命分子，曾任国民党刘茂恩部少校参谋，和中校炮兵团长，于有意识的隐瞒其历史，欺骗党的组织，说张在过去是我党地下关系，拉进了革命队伍中来作为自己的通讯员，对其进行包庇。","type":"paragraph"},{"text":"三、违犯棉布统销政策。1954年9月开始实行棉布计划供应时，于梅仙听了棉布计划供应的报告后，于翌日去商店抢购棉布，店员劝阻无效，执意买布30余尺。事后组织上对其进行教育，仍未认识自己的错误。另外，于梅仙在长期（从1945年开始养病至今）休养中，不要党的关系（党的关系在何处未查明），不缴纳党费。","type":"paragraph"},{"text":"于梅仙犯有以上严重错误，组织上曾对他进行过多次教育，他不仅不悔改认罪，反而坚持错误，企图寻找种种借口掩饰，数次以自杀威胁组织，并于1955年5月18日潜逃（现已归案）。由此说明于梅仙在政治上思想上已完全蜕化变质。为严肃党纪纯洁党的组织，经省委决定，中央监察委员会批准开除其党籍。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"953d2e2ad3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
