tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席声明指出了全世界人民前进道路","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十七日讯 毛主席《支持刚果（利）人民反对美国侵略的声明》发表三周年前夕，在中国的各国朋友向本社记者发表谈话，纪念这一光辉文件的发表，热烈欢呼世界革命人民遵照伟大领袖毛主席的教导，团结起来，在反对美帝国主义及其一切走狗的斗争中取得了伟大的胜利。"},{"type":"paragraph","text":"各国朋友在谈到毛主席这一声明的伟大历史意义时，热情地表达了他们对毛主席的无限热爱。他们情不自禁地高呼：“毛主席万岁！”敬祝毛主席万寿无疆，表示要更高地举起毛泽东思想伟大红旗，在世界革命人民的伟大导师毛主席的指引下，鼓起勇气，敢于战斗，不怕困难，前赴后继，向帝国主义、修正主义和各国反动派猛烈开火，消灭一切魔鬼。"},{"type":"paragraph","text":"苏丹朋友穆罕默德·瓦菲兴奋地说，"},{"type":"paragraph","text":"巴勒斯坦朋友巴思姆·哈克姆说，"},{"type":"paragraph","text":"日本齿轮座剧团团长藤川夏子说，"},{"type":"paragraph","text":"哥伦比亚朋友列奥布尔多·克鲁斯说，"},{"type":"paragraph","text":"意大利朋友玛丽娅·雷吉斯夫人和朱塞佩·雷吉斯指出，"}],"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30921ed8bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
