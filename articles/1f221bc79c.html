s":[{"year":1962,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席　周恩来总理"},{"type":"paragraph","text":"电贺锡兰独立十四周年"},{"type":"paragraph","text":"新华社3日讯　中华人民共和国主席刘少奇今天打电报给锡兰总督奥利弗·古涅狄莱克爵士，祝贺锡兰独立十四周年。电文如下：锡兰总督奥利弗·古涅狄莱克爵士阁下："},{"type":"paragraph","text":"值此贵国独立十四周年之际，我谨代表中华人民共和国和中国人民，并且以我个人的名义向阁下和锡兰人民表示衷心的祝贺。祝中锡两国人民间的传统友谊与日俱增。祝锡兰国家繁荣，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"1962年2月3日"},{"type":"paragraph","text":"新华社3日讯　中华人民共和国国务院总理周恩来今天打电报给锡兰总理西丽玛沃·班达拉奈克夫人，祝贺锡兰独立十四周年。电文如下：锡兰总理西丽玛沃·班达拉奈克夫人阁下："},{"type":"paragraph","text":"欣逢贵国独立十四周年，我谨代表中华人民共和国政府，并且以我个人的名义向阁下和锡兰政府致以热诚的祝贺。"},{"type":"paragraph","text":"中国人民高兴地看到，在和平共处五项原则和万隆会议十项原则的指导下，中锡两国间的深厚友谊获得了顺利的发展，两国间各方面的友好合作关系也日益紧密。我深信，在两国政府和人民的共同努力下，这种友谊和友好合作将不断巩固和增进。"},{"type":"paragraph","text":"祝阁下和锡兰人民在发展民族经济和民族文化、反对殖民主义、促进亚非各国的友好团结和维护亚洲和世界和平的事业中取得进一步的成就。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1962年2月3日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f221bc79c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
