script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本朋友热情歌颂毛泽东思想","authors":[],"dates":[{"year":1966,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本朋友热情歌颂毛泽东思想"},{"type":"paragraph","text":"新华社东京十四日电　大坂一位名叫志水美津子的日本妇女在给中国广东省友好代表团的一封信中，热情洋溢地歌颂了毛泽东思想和日中两国人民的真挚友情。她写道：“你们高举毛泽东思想的伟大红旗，把大坂的夜空映得通红。”这封信是在日中友好协会大坂府联合会十一日举行的欢迎中国广东省友好代表团的盛会上送给代表团的。信是用日文写成的一首诗，题目是《好朋友》。这首诗全文如下："},{"type":"paragraph","text":"来了，来了，"},{"type":"paragraph","text":"好朋友们来了！"},{"type":"paragraph","text":"你们跨过大海，"},{"type":"paragraph","text":"带来了清爽宜人的中国六月的和风，"},{"type":"paragraph","text":"你们代表团虽然只有七个人，"},{"type":"paragraph","text":"但，你们有七亿中国人民做后盾，"},{"type":"paragraph","text":"我们的友情是多么深厚和无限宽阔！"},{"type":"paragraph","text":"你们用贵国语言"},{"type":"paragraph","text":"对素不相识的我们倾吐友情。"},{"type":"paragraph","text":"请给我们"},{"type":"paragraph","text":"谈谈中国的情况："},{"type":"paragraph","text":"谈谈人人称赞的当代难得的伟大人物——毛泽东主席；"},{"type":"paragraph","text":"谈谈你们是怎样把他的哲学思想运用到实践中去；"},{"type":"paragraph","text":"谈谈来自中华人民共和国的你们亲手写下的革命故事；"},{"type":"paragraph","text":"谈谈你们是怎样荡涤旧思想；"},{"type":"paragraph","text":"谈谈你们所体验的一切。"},{"type":"paragraph","text":"是的，"},{"type":"paragraph","text":"你们的谈话，我们每听一次"},{"type":"paragraph","text":"心坎上都会刻上一道新的年轮，"},{"type":"paragraph","text":"你们的谈话，"},{"type":"paragraph","text":"使我们懂得了"},{"type":"paragraph","text":"人应当怎样生活和为什么而活着，"},{"type":"paragraph","text":"你们的谈话，"},{"type":"paragraph","text":"使我们得到锻炼和成长！"},{"type":"paragraph","text":"今晚——"},{"type":"paragraph","text":"一九六六年六月十一日，"},{"type":"paragraph","text":"你们高举毛泽东思想的伟大红旗，"},{"type":"paragraph","text":"把大坂的夜空映得通红！"},{"type":"paragraph","text":"美帝国主义和它的娄罗——反动派，"},{"type":"paragraph","text":"象狗一样焦虑地摇晃着尾巴，"},{"type":"paragraph","text":"梦想从我们的友情中嗅出什么味道来，"},{"type":"paragraph","text":"这简直是痴心妄想！"},{"type":"paragraph","text":"犹如太阳每天从东方升起，"},{"type":"paragraph","text":"你们和我们永不变心，"},{"type":"paragraph","text":"你们和我们是永恒的"},{"type":"paragraph","text":"好朋友。"},{"type":"paragraph","text":"朋友们，"},{"type":"paragraph","text":"让我们高声歌唱，"},{"type":"paragraph","text":"唱两支鼓舞我们前进的歌曲——"},{"type":"paragraph","text":"一支毛泽东思想的赞歌，"},{"type":"paragraph","text":"一支《东京—北京》的友谊之歌！"},{"type":"paragraph","text":"让我们心连着心，"},{"type":"paragraph","text":"用中文和日文合唱，"},{"type":"paragraph","text":"尽情高歌！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ef5630206"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
