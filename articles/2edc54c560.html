ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"准备力量向苏浙地区发展","alias":"","parts":[{"type":"paragraph","text":"准备力量向苏浙地区发展"},{"type":"paragraph","text":"（1944年11月2日）饶、张、赖："},{"type":"paragraph","text":"美军可能在杭州湾登陆？，而我们在那一带工作还很薄弱。为了配合美军登陆及准备夺取杭州、上海、苏州、南京等大城市，除粟裕?带两团南进外，请你们考虑下列步骤："},{"type":"paragraph","text":"（一）设立苏浙军区，以粟裕为司令员，谭震林为政委，统一指挥苏南及全浙，将来必要时设立中央分局领导之。"},{"type":"paragraph","text":"（二）除即调两团外，准备再从一、三、二、四各师调五至六个团南进。"},{"type":"paragraph","text":"（三）从军直及各地抽调大批干部，加以两三星期训练，陆续派往苏浙。"},{"type":"paragraph","text":"（四）对各大城市工作作具体布置。（五）对苏浙各区（浙东区、沪东区、杭嘉两区、浙西区、浙南"},{"type":"paragraph","text":"[1]这是毛泽东和刘少奇给新四军代政治委员兼政治部主任饶漱石、副军长张云逸、参谋长赖传珠的电报。"},{"type":"paragraph","text":"[2]1944年夏，美军为抗击日军，准备在中国杭州湾附近登陆，要求中国共产党领导的八路军、新四军配合。但到日本投降为止，美军这一计划并没有实现。"},{"type":"paragraph","text":"[3]粟裕，当时任新四军第一师师长兼政治委员。区、苏南各区）作具体布置。"},{"type":"paragraph","text":"以上各项哪些可行，哪些不可行，哪些应急，哪些应缓，请提出意见。"},{"type":"paragraph","text":"毛刘戌冬"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":11,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":179,"page_end":180},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2edc54c560"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
