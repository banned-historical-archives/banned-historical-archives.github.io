给四川省委的复示","authors":[],"dates":[{"year":1956,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央关于对私营企业债务处理问题给四川省委的复示","type":"title"},{"text":"4月4日电悉。同意你们对五反退补和处理资不抵债户尽量缩小的意见。但对破产还债的面，控制在5％，是否还可以压缩？请你们加以斟酌。根据上海市处理的经验，在工业中私营企业原有资不抵债户占10％，从宽处理结果压缩到2％以下。其办法为破产户留下不超过原有资金的10％，比如原有资金5000元，可以留下500元作股定息，因而资本家在合营企业中工作得到了安置，满足了资本家最主要的职业要求，因此皆大欢喜。此种办法，政府所费不大，政治影响很好，提供你们研究。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44d833dc2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
