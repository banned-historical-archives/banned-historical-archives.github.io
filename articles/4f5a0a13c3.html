" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批准北京市委为1976年“天安门事件”平反","authors":[],"dates":[{"year":1978,"month":11,"day":14}],"is_range_date":false,"parts":[{"text":"中共中央批准北京市委为１９７６年“天安门事件”平反","type":"title"},{"text":"１１月１４日，北京市为１９７６年“天安门事件”平反。经中共中央政治局常委批准，中共北京市委决定如下：","type":"paragraph"},{"text":"北京市委关于为天安门事件平反的决定","type":"subtitle"},{"text":"1978.11.14","type":"subtitle"},{"text":"1976年清明节，广大群众到天安门广场沉痛悼念敬爱的周恩来，愤怒声讨“四人帮”，完全是革命行动。因参加此事件而被捕的三百三十八人中没有一个人是反革命。对于因悼念周恩来、反对“四人帮”，而受到迫害的同志，一律平反，恢复名誉。","type":"paragraph"}],"comments":[],"origin":"根据文件原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f5a0a13c3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
