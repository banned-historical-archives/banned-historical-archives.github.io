art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席和刘少奇、周恩来同志会见胡志明主席","authors":[],"parts":[{"type":"paragraph","text":"新华社10日讯 毛泽东主席和刘少奇、周恩来同志，今晚在中南海颐年堂会见了胡志明主席和越南劳动党中央政治局委员黄文欢同志，并且进行了亲切友好的谈话。"},{"type":"paragraph","text":"据新华社讯 中国共产党代表团团长、中共中央副主席周恩来，代表团团员：中共中央政治局候补委员康生、中央书记处书记李雪峰、中央委员刘宁一，在参加了苏联共产党第二十一次代表大会以后，已经在9日下午由莫斯科乘飞机回到北京。"},{"type":"paragraph","text":"越南劳动党代表团团长、越南劳动党中央委员会主席胡志明和代表团团员、越南劳动党中央政治局委员黄文欢，在参加了苏联共产党第二十一次代表大会以后回国途中，也在同日下午乘飞机到达北京。"},{"type":"paragraph","text":"前往机场欢迎他们的，有中共中央副主席刘少奇，总书记邓小平，政治局委员彭真、陈毅等人。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7bfe53fb30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
