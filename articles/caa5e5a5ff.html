军政委员会的电报","authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":28}],"is_range_date":false,"parts":[{"text":"总政关于在有较多起义军官的部队组织军政委员会的电报","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"华东、中南、西北、华北各军区政治部：","type":"appellation"},{"text":"据西南军区政治部十月二十一日来电称：云南军区建议，在起义部队暂十二军及暂十三军的军师团三级，组织军政委员会。该项建议说，“为了便于团结和发扬暂十二、十三军留用军、师、团军官之积极性，和更好的组织他们进行工作，凡我军师团三级（有留用之单位）都组织军政委员会，吸收他们参加，形成行政上的集体领导。比较大的问题，先经党委会讨论决定后，即可通过该委员会执行。同时，并以此进行工作检讨和互相批评，以养成其组织性纪律性”。我们同意他们的意见，可否望示等语。我们已批准此项建议。各军区所属部队凡有较多起义军官参加的军队，在团以上各级均可组织军政委员会，以利团结和改造。","type":"paragraph"},{"text":" 军委总政治部十月廿八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"caa5e5a5ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
