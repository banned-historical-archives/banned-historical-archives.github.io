art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"镇江青年争相入伍全市报名两万多人","authors":["王致同许星"],"parts":[{"type":"paragraph","text":"本报讯 通讯员王致同、许星报道：江苏省扬中县三位烈士家长送子参军的消息（见本报九月二十一日一版）在镇江市城乡传开后，所属四县两区的适龄青年和家长反响强烈，全市出现“青年争相报名，家长送子应征”的动人景象。"},{"type":"paragraph","text":"据市征兵办公室提供的数字，全市报名青年已达两万余人。在扬中县，许多党政干部被烈属们爱国爱军的崇高思想所感动，带头支持子女报名应征。全县报名人数占适龄青年总数的百分之九十以上。一位年过半百的家庭妇女领着儿子报名时激动地说“保卫祖国人人有责，扬中三烈属失去儿子又送子女当兵，我送一个儿子去还有什么可说的呢？”许多厂矿的青年也自愿放弃较高的工资收入报名应征。谏壁电厂工人曾海灵的哥哥在老山战斗中负伤致残，荣立二等功。他在家庭支持下，六次到厂人武部请求批准入伍。丹阳县建山乡老党员殷长顺已送了两个儿子当兵，今年又积极支持刚满十八岁的三儿子报名。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"715fe2192e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
