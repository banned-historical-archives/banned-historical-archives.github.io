","authors":[],"dates":[{"year":1962,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"赵辛初同志在省委工作会议上的讲话（节录）","type":"title"},{"text":"稳定所有制，这个问题在学习会（指中共湖北省委第三期高干轮训班）上谈得很多，也是根本的问题。过去几年最大的教训就是打乱了所有制，刮了“五风”。在中央的领导下，从一九六○年下半年起，我们就开始解决这个问题，从贯彻六十条到实行以生产队为基本核算单位以来，现在问题基本上解决了，群众的情绪比较高了，但是工作不平衡，有些具体政策还没有落实，群众思想还不很稳定。","type":"paragraph"},{"text":"转载于《湖北省农业合作经济史料》（下册），湖北人民出版社，1985年。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49229fae3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
