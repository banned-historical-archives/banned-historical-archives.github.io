rt":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总参指挥自动化工作站补习班成果斐然","authors":["李文革/张国强"],"parts":[{"type":"paragraph","text":"短短3年内，仅有百余官兵的总参指挥自动化工作站就有13名战士考上军队各大技术院校，8名仅有初中文凭的战士取得国家承认的大专学历，战士们不仅人人掌握了一手过硬的计算机操作技术，而且有14名战士取得全国计算机等级考试资格证书。原因何在？战士们的答案是：部队举办的双休日文化补习班给我们创造了成才的机会和天地。"},{"type":"paragraph","text":"无论如何也要把战士们培养成才。新一届党委班子上任伊始就叫响了这个口号。而单位的优势也恰好是内外环境相对优越。于是，他们先后投资3万多元，腾出2间机房作为专用教室。购买了全军统考、全国自考资料，计算机书籍及VCD光盘等相关学习用品。在全站挑选出3名具备一流技术水平的工程师和高级工程师担任教员，单位首长亲自挂帅，机关司政后三个部门密切协作，于1997年正式成立了战士双休日科学文化补习班。根据战士需要，补习班开设数学、物理、化学、语文、政治、英语、计算机知识、汽车驾驶等8个科目。（李文革、张国强）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb2829f9f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
