script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联工人反迫害反剥削的斗争","authors":[],"dates":[{"year":1974,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联工人反迫害反剥削的斗争"},{"type":"paragraph","text":"苏修叛徒集团在国内全面复辟，对苏联广大劳动人民实行剥削和法西斯专政，促使国内阶级矛盾日益激化。苏联工人阶级和广大劳动人民，为反对苏修领导集团的剥削和压迫，不断展开斗争。他们不顾一系列反动法令、条例等的限制，不怕反动军警的镇压，一再举行游行示威、怠工和罢工。"},{"type":"paragraph","text":"一九六七年哈萨克的奇姆肯特市，爆发了大规模群众抗暴斗争。这次斗争是由一名出租汽车司机被捕而引起的。这名出租汽车司机被警察打了一顿。警察把他交给他的妻子时，他已人事不省。最后终于死亡。之后，其他的出租汽车司机揭发了这件事情的经过，激起了市民的愤怒。工人们冲击并捣毁了警察总局，还捣毁了另一个警察局，然后举行游行。在他们到达目的地以前，当局出动了军队进行镇压，向游行队伍开枪，打死了几十人。"},{"type":"paragraph","text":"一九六七年十一月，哈尔科夫拖拉机厂数千工人举行了罢工。"},{"type":"paragraph","text":"一九六八年后，苏联的一些革命组织多次发表文章和传单，号召苏联工人阶级和劳动人民推翻苏修叛徒集团的统治。一九六九年五月，基辅水电站工人举行游行示威。"},{"type":"paragraph","text":"一九七二年九月，第聂伯罗彼得罗夫斯克市数千工人举行罢工和游行示威。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e52af7af0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
