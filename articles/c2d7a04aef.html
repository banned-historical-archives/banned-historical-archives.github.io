<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"青少年要争做批判资产阶级的战斗员","authors":[],"dates":[{"year":1974,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命形势大好，“社会主义到处都在胜利地前进”。无产阶级文化大革命以来，广大革命群众深入揭发批判了刘少奇、林彪推行的反革命修正主义路线，坚持意识形态领域里的社会主义革命，沉重地打击了资产阶级和一切剥削阶级的旧思想、旧文化、旧风俗、旧习惯。但是，斗争仍然是长期的、激烈的，当前在某些角落里“四旧”歪风有所抬头，就是证明。我们要继续遵照毛主席关于“要抓意识形态领域里的阶级斗争”的教导，大力发扬无产阶级“四新”，狠狠批判地主资产阶级“四旧”。革命的青少年要争做批判资产阶级的战斗员。"},{"type":"paragraph","text":"最近，本市以共青团员、红卫兵、红小兵为主力的青少年队伍，纷纷走上街头，深入里弄，破旧立新，移风易俗，向剥削阶级的意识形态发动了一次新的进攻。在马列主义、毛泽东思想的哺育下，革命青少年正是这样发扬“五敢”精神，冲杀在阶级斗争的第一线，坚决与剥削阶级的传统观念和习惯势力决裂，在批判和抵制资产阶级香风毒雾的斗争中，在两个阶级争夺青少年的斗争中，建立了值得歌颂的业迹。从我们这一代青年人身上，闪烁着共产主义理想的光芒。"},{"type":"paragraph","text":"但是，有些青年同志不是这样看。他们认为批判“四旧”是领导的事，我们只要同它“划清界限”就行了。这种态度是消极的。破旧立新，移风易俗，要人人关心，人人参加，造成强大的社会舆论。如果你看到资产阶级在散布臭气毒害青年，光义愤而不斗争，怎么能说是划清了界限呢?无产阶级要按照自己的世界观改造世界，资产阶级也要按照自己的世界观改造世界，从这个角度来认识面临的斗争，就能从义愤到行动，以勇敢的姿态去积极地批判资产阶级。"},{"type":"paragraph","text":"当然，要真正成为一个战斗员是不容易的。列宁曾经深刻地指出:“工人阶级自发地倾向于社会主义，然而最流行的(而且时时刻刻以各种形式复活起来的)资产阶级思想体系，却自发地而又最厉害地迫使工人接受它。”这对青年来说，也是同样的道理。因此，我们要认真学习马克思主义，自觉地接受艰苦斗争的锻炼，提高阶级斗争和路线斗争觉悟。要充分发扬青年朝气蓬勃，对旧事物疾恶如仇，对新事物十分敏感的特点，及时发现斗争的动向，认真研究斗争的特点，善于总结斗争的经验，使他们在斗争中更快地成长起来、成熟起来。当前，破旧立新，移风易俗，在群众中主要是要进行深入细致的宣传活动和深入细致的思想工作，要讲政策，要务实效，不要搞形式主义的东西，也不要搞什么街头劝阻之类的活动，要把革命的原则性和斗争策略的灵活性辩证地统一起来。"},{"type":"paragraph","text":"毛主席指出:“新中国要为青年们着想，要关怀青年一代的成长。”我们社会，我们无产阶级，特别是我们党的各级领导，都要处处为青少年着想，从政治、思想、学习、生活、娱乐等各方面去关心他们，特别是要坚决支持和帮助他们更好地去批判资产阶级、批判修正主义。这是在意识形态方面战胜资产阶级的需要，也是培养千百万无产阶级革命事业接班人的需要。让我们把青年人推到阶级斗争的风口浪尖上去，让革命的暴风雨把年青的一代锤炼得越来越坚强吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2d7a04aef"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
