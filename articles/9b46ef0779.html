<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"范文同总理等参观北京东方红汽车制造厂叶剑英同志等陪同参观　越南贵宾受到工人们的热烈欢迎","authors":[],"dates":[{"year":1973,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年六月五日电　越南劳动党中央委员会政治局委员、越南民主共和国政府总理范文同，以及吴船大使等越南劳动党和越南民主共和国政府代表团的同志，今天由中共中央政治局委员、中央军委副主席叶剑英，第一机械工业部部长李水清陪同，参观访问了北京东方红汽车制造厂，受到工人们的热烈欢迎。"},{"type":"paragraph","text":"东方红汽车制造厂今天红旗招展，彩带飞舞，全厂到处都洋溢着“越中情谊深，同志加兄弟”的热烈友好气氛。在厂区的通道上，两千多名工人欢欣鼓舞，列队迎候贵宾们的到来。在工厂的各个车间里，热烈欢迎越南战友的标语、墙报、黑板报，琳琅满目。在这些墙报、黑板报上，刊登着工人们写的欢迎文章和充满热情的颂诗，用美好的语言表达了中国人民对越南人民的深厚情谊。工人们说:中越两国山连山、水连水，我们两国人民的友谊比山高，比水长。"},{"type":"paragraph","text":"上午十时许，范文同总理和其他越南同志来到了，全厂呈现一片欢腾景象。工厂负责人冯克等迎上前去，同范文同总理等热烈握手。扩音器里不断播送着中国和越南的歌曲。欢迎群众敲起锣鼓，挥舞花束和彩带，迎着越南贵宾热情高呼:“热烈欢迎越南贵宾!”“向英雄的越南人民学习!”“向英雄的越南人民致敬!”“中越两国人民的伟大友谊和战斗团结万岁!”"},{"type":"paragraph","text":"在热烈的欢呼和掌声中，范文同总理等越南战友走进工厂车间，观看了吉普车的生产工序。在参观过程中，范文同总理不断停下来同工人们热烈握手，祝贺他们在生产上取得的成绩。工人们热情地向英雄的越南人民的使者鼓掌，祝贺越南人民在抗美救国斗争中取得的伟大胜利。"},{"type":"paragraph","text":"在参观总装车间以后，工人们在车间里举行了欢迎集会。范文同总理向近两千名职工发表了十分亲切的讲话。他说，越南和中国是山水相连的邻邦，两国人民是亲兄弟姐妹。我们有着共同的斗争目标:反对帝国主义，争取民族解放，建设社会主义新生活。范文同总理在谈到越南人民抗美救国斗争的伟大胜利时说，我们今天是来和你们一起欢庆胜利的。范文同总理还用汉语说:“这是我们的共同胜利。”他的讲话激起了长时间的掌声。工人们高呼:“越南人民的胜利就是我们的胜利!”范文同总理讲话结束时，一位工人代表激动地走上讲台，感谢范文同总理给工人们带来了越南人民的深情厚意。范文同总理紧握着这位工人的手，并高高举起。这时，车间里响起了雷鸣般的掌声。"},{"type":"paragraph","text":"随后，范文同总理代表越南劳动党和越南民主共和国政府代表团把一面锦旗赠给东方红汽车制造厂的工人们。锦旗上绣着:“越南人民和中国人民的伟大友谊和战斗团结万古长青!”"},{"type":"paragraph","text":"厂党委书记、革委会主任冯克代表全厂工人接受了锦旗并向越南战友表示衷心的感谢。他说，范文同总理这次来厂访问，对我们是一个极大的鼓励。我们将更加努力生产，以实际行动支援越南人民和印度支那人民的正义斗争。"},{"type":"paragraph","text":"冯克主任代表工人们向越南战友赠送了北京吉普车的模型。"},{"type":"paragraph","text":"陪同越南贵宾参观的还有外交部亚洲司司长陆维钊、礼宾司副司长朱传贤，中国驻越南民主共和国大使王幼平。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b46ef0779"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
