ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"和林彪等人的一段谈话","alias":"","parts":[{"type":"paragraph","text":"和林彪等人的一段谈话"},{"type":"paragraph","text":"（1968年5月11日）"},{"type":"paragraph","text":"对广大人民群众是保护还是镇压，是共产党同国民党的根本区别，是无产阶级同资产阶级的根本区别，是无产阶级专政同资产阶级专政的根本区别。"},{"type":"paragraph","text":"[1]林彪，在中共八届十一中全会上继续当选为中央政治局常委，不久被称中央副主席。"},{"type":"paragraph","text":"[2]这是毛泽东1968年5月11日和林彪、周恩来、陈伯达（当时任中共中央政治局常委、中央文化革命小组组长）、康生（当时任中共中央政治局常委、中央文化革命小组顾问）、谢富治（当时任中共中央政治局候补委员、北京市革委会主任）等人谈话的一部分。6月2日《人民日报》《解放军报》社论《七千万四川人民在前进一热烈欢呼四川省革命委员会成立》中，用黑体字引用了这段话。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":5,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":207,"page_end":207},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1dd2901ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
