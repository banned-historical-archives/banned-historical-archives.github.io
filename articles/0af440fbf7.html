art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"爹亲娘亲不如毛主席亲","authors":["“八·六”海战荣立一等功王瑞昌"],"parts":[{"type":"paragraph","text":"二十七日凌晨，正当我们面向东方放声高唱《东方红》的时候，从广播里传来了毛主席接见在京学习和开会的军事干部的喜讯。我们顿时热血沸腾，情不自禁地高呼：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"毛主席啊，毛主席！您老人家跨过千山万水，走遍大江南北，视察华北、中南、华东地区无产阶级文化大革命刚刚回到北京，就在百忙中接见了我们部队的代表，这是对我军全体指战员的最大关怀、最大爱护、最大鼓舞、最大信任！真是“天大地大不如党的恩情大，爹亲娘亲不如毛主席亲”！"},{"type":"paragraph","text":"毛主席啊，毛主席！我们人民解放军是您老人家亲手缔造和亲自领导的人民军队。它不仅是中国人民的伟大长城，而且是全世界人民进行革命斗争的强大后盾。它使帝国主义、修正主义和各国反动派闻之丧胆，见之落魄！我们人民解放军之所以能够成为一支无往不胜、无坚不摧的强大力量，正是由于遵照您的教导，“紧紧地和中国人民站在一起，全心全意地为中国人民服务”的结果。今天，我们战斗在“三支”“两军”的前线，一定更高地举起“拥军爱民”的伟大旗帜，和左派广大群众同呼吸、共命运，做无产阶级革命派的坚强后盾。我们在“三支”“两军”斗争实践中深深体会到：毛泽东思想是做好支左工作的灵魂。我们一定要用光焰无际的毛泽东思想武装自己，支持左派。用毛泽东思想指挥亿万革命大军，在无产阶级文化大革命中冲锋陷阵，夺取更大的胜利！"},{"type":"paragraph","text":"军民团结如一人，试看天下谁能敌？"},{"type":"paragraph","text":"毛主席啊！我们战斗在“三支”“两军”的前线，一定要和广大无产阶级革命派一起，紧跟您的伟大战略部署，搞好革命的大批判，促进革命的大联合，彻底批倒批臭以中国赫鲁晓夫为首的资产阶级司令部，在无产阶级文化大革命运动中，为人民立新功！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0af440fbf7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
