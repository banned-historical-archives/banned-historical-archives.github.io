存在错误思想","authors":[],"dates":[{"year":1951,"month":11,"day":20}],"is_range_date":false,"parts":[{"text":"福州部分干部和工商界对增产节约运动存在错误思想","type":"title"},{"text":"【福建分社二十日讯】为积极推行增产节约运动，中共福州市委已组成增产节约委员会与工作组，分头在财政收支人员机构、公营企业等方面选择重点进行调查研究，以便根据具体情况制定增产节约的实施方案。目前该市有不少干部和知识分子对增产节约还存在一些糊涂思想。有人认为“我们已经很苦了，没有什么好节约了”。有人把节约看成是“把三顿饭改为二顿把干饭改为稀饭”。有些工厂企业部门片面地强调节约，忽视从积极方面增加生产。许多工商界人士把“增产节约运动”片面地看做“就是为了捐献”，因而情绪不高。该市党政领导机关与市协商委员会现正积极动员与布置全市各机关团体与各界人民认真地学习政协全国委员会此次会议的各项决议与文件，以端正对增产节约的看法，使增产节约的运动能够稳步开展。","type":"paragraph"}],"comments":[],"origin":"1951年11月28日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"068233eac6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
