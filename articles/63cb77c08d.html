落实毛主席的各项无产阶级政策","authors":[],"dates":[{"year":1969,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十九日电　驻中国科学院微生物研究所工人、解放军毛泽东思想宣传队和研究所革命委员会，带领全所革命群众提高阶级斗争和两条路线斗争觉悟，认真落实毛主席的各项无产阶级政策，有力地推进了斗、批、改运动的发展。"},{"type":"paragraph","text":"在伟大的斗、批、改运动中，驻微生物研究所的工人、解放军毛泽东思想宣传队同革委会的同志一起，认真学习党内两条路线斗争的历史和党的各项政策。通过学习，他们深深认识到，毛主席的各项无产阶级政策，是毛主席无产阶级革命路线的具体体现，是团结人民，战胜敌人的法宝。同时，他们也认识到，毛主席的无产阶级政策同叛徒、内奸、工贼刘少奇的资产阶级反动政策是根本对立的。因此，他们带领全所革命群众不断提高阶级斗争和两条路线斗争觉悟，狠抓毛主席各项无产阶级政策的落实不放松。"},{"type":"paragraph","text":"在执行党的政策的过程中，有的人有宁“左”勿右的思想，也有的人怕犯错误。宣传队和革委会的同志认为，产生这些错误思想的原因很多，但根本的问题是阶级斗争和两条路线斗争觉悟不高。宣传队和革委会通过举办以落实政策为中心内容的各种类型的毛泽东思想学习班，发动群众深入开展革命大批判，斗私批修等办法，帮助大家提高阶级斗争和两条路线斗争觉悟，落实党的政策。通过这些活动，广大群众增强了执行党的政策的自觉性。他们遵照毛主席关于“对反革命分子和犯错误的人，必须注意政策”的教导，对阶级敌人、有一般政治历史问题的人和犯错误的人，逐个进行了具体分析，作了适当的处理。这样做，团结了一切可以团结的力量，打击了一小撮阶级敌人，也使一些犯过错误的人很快提高了觉悟，痛下决心，把立足点移到毛主席的革命路线上来。这个研究所原党委书记兼副所长犯了严重错误，但不是死不改悔的走资派。在宣传队和革委会的领导下，革命群众对他进行了深入、细致的帮助和教育，在他有了觉悟的时候，及时解放了他，并给他安排了工作。这个干部总结了自己犯错误的惨痛教训，激动地说:“群众用毛泽东思想批判我，教育我，为的是要我回到毛主席的革命路线上来，跟着伟大领袖毛主席千一辈子革命。”"},{"type":"paragraph","text":"在发动群众对修正主义科研路线深入持久地开展革命大批判的基础上，宣传队和革委会还举办了科学研究人员参加的毛泽东思想学习班，认真落实毛主席对知识分子的无产阶级政策。很多参加学习班的科学研究人员十分激动地表示:一定要同大叛徒刘少奇的反革命修正主义路线彻底决裂，坚决走知识分子与工农相结合的道路，努力为建设社会主义贡献自己的力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63cb77c08d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
