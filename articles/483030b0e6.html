固分子已无法挽救其彻底完蛋的命运。中国将更加强大，成为马列主义和社会主义的永远不可摧毁的堡垒","authors":[],"dates":[{"year":1967,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社地拉那2日电　阿尔巴尼亚《人民之声报》一日发表一篇题为《毛泽东主席点燃的文化大革命火焰正在胜利地烧掉修正主义、资本主义在中国的一切垃圾》的编辑部文章，热烈欢呼中国无产阶级文化大革命的形势好得很。"},{"type":"paragraph","text":"文章说，中国无产阶级文化大革命正在胜利进行。亿万城乡革命劳动人民在毛泽东思想的指导下，向一小撮走资本主义道路的当权派和资产阶级反动路线发起了全面的进攻。他们在毛泽东主席的领导下，在中共中央的支持下，正在从一小撮走资本主义道路的当权派手中一个一个地夺权。"},{"type":"paragraph","text":"文章说，以毛泽东同志为代表的革命路线的另一伟大胜利是，城乡革命群众给企图破坏社会主义经济、破坏工农联盟的资产阶级右派分子和修正主义者的反革命经济主义以严厉打击。工人、农民、学生和革命干部在反对资产阶级反动路线的正义斗争中，得到无产阶级专政的支柱——中国人民解放军的大力和全面的支持。这个斗争正在进入一个决定性的阶段。"},{"type":"paragraph","text":"文章说，无产阶级文化大革命沉重地打击了帝国主义和现代修正主义，特别是有力地打击了幻想中国发生“和平演变”的苏联修正主义领导集团。帝国主义者和现代修正主义者被这场革命吓得惶惶不安。"},{"type":"paragraph","text":"文章说，帝国主义和修正主义的任何阴谋、诬蔑和诽谤都不能使中国无产阶级文化大革命离开正确的道路，不能阻挡中国无产阶级文化大革命的蓬勃发展。"},{"type":"paragraph","text":"文章说，目前正在中国进行的以毛泽东同志为代表的革命路线同资产阶级反动路线之间的斗争清楚地向我们指出，在无产阶级和资产阶级之间存在着不可调和的对抗性矛盾，不是无产阶级当权，就是资产阶级当权。因此，中国的工人、农民、学生和革命干部按照伟大领袖毛泽东同志的教导，从一小撮混进党内的资产阶级代表人物手中夺权是完全正确的。如果不及时采取革命措施，就意味着国家迟早要改变颜色。"},{"type":"paragraph","text":"文章热情欢呼中国目前的革命形势好得很。一小撮坚持资产阶级反动路线的顽固分子，已经处于完全孤立的地位，处于革命群众的不断打击之下，没有任何力量能够挽救他们彻底完蛋的命运。"},{"type":"paragraph","text":"文章最后说，世界上没有任何力量能够阻挡无产阶级文化大革命向前发展。在毛泽东同志和中国共产党的领导下，中华人民共和国将变得更加强大，将成为马克思列宁主义和社会主义的永远不可摧毁的堡垒。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"483030b0e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
