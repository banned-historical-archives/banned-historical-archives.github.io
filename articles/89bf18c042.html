<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"社会主义民主比资产阶级民主优越百万倍","authors":["高铭暄"],"dates":[{"year":1990,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"社会主义民主比资产阶级民主优越百万倍"},{"type":"paragraph","text":"中国人民大学教授  高铭暄"},{"type":"paragraph","text":"最近几年出国的人比过去多了，进来的书也比过去多了。有的人开口就讲西方国家多么多么民主，什么三权分立、议会政治、多党制等等，讲得天花乱坠。西方一些人写的书也总是津津乐道他们那一套。这对一部分青年确实产生了不容忽视的影响。在有些人眼里，好像只有西方国家的民主才叫民主，社会主义国家的民主就不算民主。在去年那场政治风波中有的人甚至打出“争民主”的旗号。这真是是非颠倒、黑白混淆。为什么会造成这种情况呢？我看除了国内资产阶级自由化势力和国际敌对势力别有用心地进行煽动以外，主要还是因为没有运用马克思主义观点观察问题，没有从本质上去把握问题。"},{"type":"paragraph","text":"按照马克思主义的观点，任何民主都是有阶级性的。在当代世界，存在着两种根本不同的民主，即资产阶级民主和社会主义民主。西方国家的民主是资产阶级民主，它是对资产阶级内部实行民主和对无产阶级实行专政的统一。马克思说：“资产阶级的力量全部取决于金钱，所以他们要取得政权就只有使金钱成为人在立法上的行为能力的唯一标准。……他们通过选举权和被选举权的财产资格的限制，使选举原则成为本阶级独有的财产。平等原则又由于被限制为仅仅在‘法律上的平等’而一笔勾销了，法律上的平等就是在富人和穷人不平等的前提下的平等，即限制在目前主要的不平等的范围内的平等，简括地说，就是简直把不平等叫做平等。”（《马克思恩格斯全集》第２卷，第６４７—６４８页）列宁也说过：“资产阶级民主同中世纪制度比较起来，在历史上是一个大进步，但它始终是而且在资本主义制度下不能不是狭隘的、残缺不全的、虚伪的、骗人的民主，对富人是天堂，对被剥削者、对穷人是陷阱和骗局。”（《列宁选集》第３卷，第６３０页）这些都是对资产阶级民主虚伪性的极其深刻的揭露。"},{"type":"paragraph","text":"与资产阶级民主不同，社会主义民主是全体人民在社会主义公有制基础上，享有管理国家和其他社会事务的权利。社会主义从本质上说就是民主的，没有社会主义民主就没有人民民主专政的社会主义国家，就没有社会主义。因此，社会主义民主是社会主义制度的本质属性。"},{"type":"paragraph","text":"社会主义民主与资产阶级民主相比有巨大的优越性："},{"type":"paragraph","text":"第一，享有民主的人要广泛得多。社会主义民主是社会上绝大多数人享有的民主。在我国，广大在旧社会被剥削、被压迫的劳动人民第一次成为民主的主体，行使当家作主管理国家和社会的权力。我国社会主义民主的主体包括工人、农民、知识分子和一切拥护社会主义、拥护祖国统一的爱国者，他们占我国人口的９５％以上。试问在哪一个资本主义国家，劳动人民能成为民主的主体？"},{"type":"paragraph","text":"第二，民主的内容要深刻得多。社会主义民主是建立在生产资料公有制基础之上的。社会主义公有制使无产阶级和其他劳动群众在经济上获得解放，享有对生产资料不同形式的所有权和支配权，反映在政治上，他们也就成了国家的主人。在我国，依照宪法和法律的规定，人民不仅享有一般的民主自由权利，而且行使管理国家事务，管理经济和文化事业，管理社会事务的权力。而资产阶级民主是建立在生产资料私有制的基础之上的。它依附于金钱和财富。谁有钱，谁占有财富，谁就享有民主。在这种制度下，广大劳动人民只能处于依附于资本、受制于资本的地位，而没有任何摆脱这种地位的权利。试问劳动人民的这种无权地位，能和他们在社会主义民主制度下所享有的广泛权利相提并论吗？"},{"type":"paragraph","text":"第三，实现民主的保障条件要坚实得多。社会主义民主是名符其实的。在我国，人民是生产资料的主人，这是人民行使民主权利的物质保证；宪法和法律明确规定公民的合法权利和利益不受侵犯，这是人民行使民主权利的法律保证；国家为实现社会主义民主而制定的一系列组织措施，这是人民行使民主权利的组织保证。而且随着国家经济文化的发展，这些保障条件愈益增多和强化。所以，社会主义民主是人类历史上最真实的民主。它决不是资产阶级国家那种对劳动人民说来仅仅是形式的民主所能比拟的。"},{"type":"paragraph","text":"列宁曾斩钉截铁地指出：“无产阶级民主比任何资产阶级民主要民主百万倍……”（《列宁选集》第３卷，第６３４页）。从民主的广度和深度、内容和形式的统一来看，这的确是一句发人深省的至理名言。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89bf18c042"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
