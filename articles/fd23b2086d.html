长座谈会（概况）","dates":[{"year":1986,"month":4,"day":26}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部办公厅, 党的宣传工作会议概况和文献(1951——1992年), 778","tags":[{"name":"宣传","type":"主题/事件"}],"parts":[{"type":"title","text":"全国宣传部长座谈会"},{"type":"paragraph","text":"• 概况 •"},{"type":"paragraph","text":"1986年全国宣传部长座谈会于4月26目至5月7日在北京召开。参加会议的有各省、自治区、直辖市和八大城市党委宣传部长，共80多人。会议议题是：座谈讨论当前宣传战线面临的形势；认真搞好六届人大四次会议文件的学习和宣传工作；研究如何提高宣传干部队伍素质，以适应改革开放和社会主义商品经济发展的需要；如何改进新时期党的思想工作，加强精神文明建设等问题。会前通知与会同志事先学习胡耀邦同志《关于理论工作问题》的讲话和中央关于当前工作的有关指示。"},{"type":"paragraph","text":"会议期间先后请文化部王蒙、科委吴明瑜、外交部钱其琛、中联部李淑铮、广播部艾知生、体改委童大林、外宣小组郁文和对公办杨斯德等单位的负责同志到会讲话。"},{"type":"paragraph","text":"中央宣传部部长朱厚泽主持会议。"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd23b2086d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
