ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1939年8月2日）"},{"type":"paragraph","text":"对此次参政会采取积极方针是对的，因为现在是处在和战问题的重要关头。对上次参政会采取消极态度也是必要的。参加国民参政会的目的，在于暴露坏分子的阴谋，暴露汪精卫派等的阴谋。要注意反对暗藏的汪精卫派及准备投降的某些银行家及军人派，使国民党政府抗战的基础转到中产阶级方面来继续抗战，现在有分化大资本家的可能。对党派问题及团结问题，我认为在国民参政会上要提出来，不提出反易于处于防御地位。保障民权、保证团结、保证在敌后的发展、保障财政问题、反对投降分子等提案都是必要的。会议还讨论对英外交政策问题，决定反对英日共同声明?，反对张伯伦的妥协政策。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上讨论对一届四次国民参政会的态度问题时讲话的一部分。"},{"type":"paragraph","text":"[2]指《有田一克莱琪协定》。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":8,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":503,"page_end":503},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3682014314"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
