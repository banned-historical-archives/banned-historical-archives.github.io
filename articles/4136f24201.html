传新制度的优越性，……","authors":[],"dates":[{"year":1967,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"发扬革命小将的"},{"type":"paragraph","text":"节约闹革命精神"},{"type":"paragraph","text":"上海师院附中一红卫兵来信反映，该校有六七个学生，靠一些简单的工具，组织了一个电工小组，从今年三月到现在，不论寒天、盛暑，起早摸黑，修理好不少课室设备，为国家节约了大量资金。来信热情洋溢地歌颂了革命小将的先进事迹，希望报纸加以宣传。(按:据初步调查，来信反映的情况属实。对于这位不具名的红卫兵小将，我们特此表示感谢。)"},{"type":"paragraph","text":"希望记者深入农村"},{"type":"paragraph","text":"松江县农村一位小学教师，对本报很少报道和反映农村学校的文化大革命提出意见。他说，农村有的学校复课闹革命还是搞得较好的，但报社从未去联系过。希望记者同志下来走一走，看一看，听听贫下中农和农村教师的意见和要求。(按:我们诚恳接受这位读者的批评，并已派记者到松江去作了调查，和贫下中农、革命干部、革命的教师一起总结了一个公社开展教育革命的经验，准备最近在报上发表。)"},{"type":"paragraph","text":"这样的事情也应该反映"},{"type":"paragraph","text":"上海市南市区金星妇女油酱商店全体革命职工来信反映，该店在去年年底受到经济主义妖风的影响，一度实行店休和缩短营业时间，以致周围人民群众很有意见。后来该店同志活学活用毛主席著作，以“斗私，批修”为纲，树立全心全意为人民服务的思想，恢复了正常的营业时间，很受周围群众欢迎。(按:这个店的革命职工，能够按照毛主席的教导，“为人民的利益坚持好的，为人民的利益改正错的”。这种精神值得发扬，我们根据她们提供的情况进行了采访，已于十一月二十日在报上发表了。)"},{"type":"paragraph","text":"多介绍些外地的先进经验"},{"type":"paragraph","text":"本市读者李林英同志来信，认为本报对本市的先进的典型报道了一些，但对外地的新成就、新经验却不够注意。无产阶级文化大革命的形势，在全国范围内都是空前大好，各地报纸上就有不少好文章、好报道，介绍很多好经验，应该经常加以转载，便于上海的无产阶级革命派向外地的无产阶级革命派学习。如果我们不虚心向外地学习，就会养成一种“老大自居”的思想。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4136f24201"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
