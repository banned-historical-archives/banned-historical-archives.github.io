ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"对一封反映安徽省灵璧县灾情的来信的批语","alias":"","parts":[{"type":"paragraph","text":"对一封反映安徽省灵璧县"},{"type":"paragraph","text":"灾情的来信的批语"},{"type":"paragraph","text":"（1958年10月2日）曾希圣同志："},{"type":"paragraph","text":"是否属实，请派人去那里查一下，酌量处理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二日"},{"type":"paragraph","text":"[1]这封写于1958年9月5日无署名的给毛泽东的信中说，安徽省灵璧县冯庙乡、杨町乡、尹集乡由于遭受风灾，谎报亩产，强行旱改稻及多报栽种亩数等原因，灾情严重，到目前为止已饿死不下500余人，还有许多人卧床不起，请求中央派人调查处理。信中还反映冯庙乡的乡社干部吊打一户地主、一户中农逼要银洋的事情。按照毛泽东的批示，安徽省委派出检查组进行了调查，并于1958年12月26日报告毛泽东，说信中反映的问题基本上是属实的，对此省委作了自我检查，并采取了措施，进行了处理。"},{"type":"paragraph","text":"[2]曾希圣，当时任中共安徽省委第一书记。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":10,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":289,"page_end":289},"tags":[{"name":"毛泽东","type":"人物"},{"name":"曾希圣","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b5fdd8d9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
