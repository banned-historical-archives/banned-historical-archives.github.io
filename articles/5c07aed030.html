":["周恩来"],"dates":[{"year":1970,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"周恩来对贺龙专案组请示报告的批示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"“东兴同志，这全部是公开文件，请你考虑是否需全部调阅。我记得在下放邓小平、谭震林时，已将两人从专案组撤消。现专案组既又重新提出查此人，可否先告专案组将邓小平以三反罪行、招降纳叛线索写一报告来，以便拟此查阅。周恩来。”","type":"paragraph"},{"text":"附一","type":"paragraph"},{"text":"贺龙专案组的报告","type":"subtitle"},{"text":"康生、永胜、法宪、叶群同志：","type":"appellation"},{"text":"关于邓小平的三反罪行，招降纳叛等问题，经过调查，我们已掌握了不少材料和线索，但其中有些问题的核实和查证，还需要查阅一些档案材料。为此，我们拟到中央档案馆、中办机要室等单位查阅有关材料，并对必要的部分拍照取证。","type":"paragraph"},{"text":"是否妥当，请批示。","type":"paragraph"},{"text":"附：申请查档目录表。","type":"paragraph"},{"text":" 贺龙专案组1970年11月28日","type":"paragraph"},{"text":"附二：","type":"paragraph"},{"text":"吴法宪对贺龙专案组报告的批示：","type":"subtitle"},{"text":"可否查这些档案，呈请总理、汪东兴同志批示。","type":"paragraph"},{"text":" 1970.11.30","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"贺龙","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c07aed030"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
