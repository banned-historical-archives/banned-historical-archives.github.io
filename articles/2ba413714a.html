<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"向反党算权的阴谋家、野心家猛烈开火","alias":"","parts":[{"type":"paragraph","text":"向反党篡权的阴谋家、野心家猛烈开火"},{"type":"paragraph","text":"（一九七六年十月二十一日）"},{"type":"paragraph","text":"《文汇报》编辑部"},{"type":"paragraph","text":"中共中央、人大常委会、国务院、中央军委关于建立伟大的领袖和导师毛泽东主席纪念堂的决定和中共中央关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定发表以来，上海一千方军民热烈欢呼、坚决拥护，最紧密地团结在以华国锋同志为首的党中央周围，以马克思主义、列宁主义、毛泽东思想为锐利武器，愤怒声讨那些背叛马列主义、毛泽东思想，篡改毛主席指示，搞修正主义，搞分裂，搞阴谋论计，反党篡权的阴谋家、野心家的反革命罪行。“群众是真正的英雄”。人民战争的熊熊烈火，烧掉了他们一张义一张的“虎皮”、把他们的反革命真面目暴露在光天化日之下，真是大快入心！"},{"type":"paragraph","text":"那些背叛马克思主义、列宁主义：毛泽东思想，篡改毛主席指示，反党篡权的人，把马克思主义的词句唱得比谁都响，其实是一伙打看红旗反红旗的地地道道的马列主义、毛泽东恩想的叛徒。他们反对毛主席的革命路线，反对毛主席制定的“要搞马克思主义，不要指候正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的三项基本原则。他们自有一伙，狼独为奸、结成一帮，另搞一套，打击别入，以显其“正确”。他们利用手中控制的舆论工具，歪曲事实，颠倒是非，制造谣言，欺骗群众，突出地宣扬他们自己。他们当面是人，背后是鬼，两面三刀、祸国殃民，从“内里蛙空”革命事业。真是机关算尽，坏事做绝。他们是党内资产阶级的典型代表，是不肯改悔的正在走的走资派，是无产阶级最危险、最凶恶的敌人。假如他们的阴谋得遥，我们的党就要变修，我们的国家就要变色。但是，那些搞反党算权阴谋活动的阴谋家、野心家，人心丧尽，极为虚弱，极为孤立，一当他们的阴谋被揭露之后，就迅速变成了一堆不齿于人类的狗屎堆。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“敌人是不会自行消灭的。”我们要在以华国锋同志为首的党中央的英明领导下，一切行动听从以华国锋同志为首的党中央的指挥，继承毛主席的遗志，撤起学习马列著作和毛主席著作的新高潮，坚持以级阶级斗争为纲、坚持党的基本路线，坚持无产阶级专政下的继续革命，动员起来，向反党纂权的阴谋家、野心家猛烈地开火。我们要彻底揭露和批判那些背叛马克思主义、列宁主义、毛泽东思想，纂改毛主席指示、搞修正主义，搞分裂，搞阴谋诡计，反党繁权的人的反革命罪行，一定要把他们揭深揭透，批倒批臭。在这场关系到我们党和国家前途和命运的伟大斗争中，我们要提高革命警惕，严防国内外阶级敌人造谣惑众，破坏捣乱。要继续批邓、反击右倾翻案风。要很好地抓革命、促生产、促工作，促战备，努力把各项工作做好，进一步巩固和发展无产阶级文化大革命的胜利成果，决不辜负以华国锋同志为首的党中央对上海人民的热情关怀和殷切期望。"},{"type":"paragraph","text":"“尔曹身与名俱灭，不废江河方古流。”那些反党篡权的阴谋家、野心家彻底跨台了，好得很。历史的潮流是不能阻挡的。清除了这些钻进革命阵营中的“驻虫”后，社会主义革命的洪流，将更加酒涌澎湃地朝前发展。在以华国锋同志为首的党中央的英明领导下，我们的党在世界的东方。"},{"type":"paragraph","text":"在以华国锋同志为首的党中央的统一指挥下，奋勇前进！上海人民愤怒声讨和揭发批判反党篡权"},{"type":"paragraph","text":"的走资派的反革命罪行"},{"type":"paragraph","text":"（一九七六年十月二十一日）"},{"type":"paragraph","text":"上海人民愤怒声讨那些背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席指示，搞修正主义，搞分裂，搞阴谋诡计、反党纂权的走资派的反革命罪行，其势如长空呼啸的狂飚，大海奔腾的怒涛，席卷浦江两岸。昨天下午，本市工人阶级和各界革命群众代表一百万人举行声势浩大的集会，坚决拥护以华国锋同志为首的党中央，热烈欢呼中央两项英明决定，愤怒声讨和揭发批判那些背叛马克思主义，列宁主义、毛泽东思想，算改毛主席指示，搞修正主义，搞分裂，搞阴谋论计，反党篡权的走资派的反革命罪行。到会代表重温了毛主席关于“要搞马克思主义、不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，愤怒地指出：那些篡改毛主席指示，违背“三要三不要”基本原则的人，就是分裂党、搞行帮的党内资产阶级的典型代表，就是不肯改悔的正在走的走资派，上海工人阶级和革命群众誓同他们斗到底！"},{"type":"paragraph","text":"昨天，人民广场一片沸腾。上午十一时许，各界群众代表就怀着对反党篡权的走资派的无比愤慨，列成队伍，开着宣传车，高举战旗、标语牌，象无数股洪流涌进广场，旗海翻涌，如怒涛滚滚；口号震天，似重炮排排，显示出向反党纂权的走资派展开猛烈反击的强大阵容！"},{"type":"paragraph","text":"会上，上海第十七棉纺织厂、上海第三十棉纺织厂、文汇报和解放日报、上海机床厂、共青团上海市委、市委办公室招待处等单位的工人、机关工作人员代表发了言。在他们发言时，全场不断高呼口号：“热烈欢呼、坚决拥护中央两项英明决定！”“一切行动听从以华国锋同志为首的党中央指挥！”“彻底清算那些反党纂权的走资派的反革命罪行！”“掀起学习马列著作和毛主席著作的新高潮！”"},{"type":"paragraph","text":"工人代表在发言中从党内资产阶级的反动本质上，揭露了那些阴谋纂党夺权的走资派的反革命罪行。他们愤怒地指出，这些搞修正主义、反党算权的人，窃取“左派”名声，以“一，贯正确”自居，不惜采取一切卑劣手段、搞行帮，分裂党、吹吹拍拍，安插亲信，打击革命派，已经变成吸工人血的党内资产阶级，与工人阶级处于尖锐的阶级对立状态之中，这些人是我们工人阶级的最凶恶的敌人。"},{"type":"paragraph","text":"机关革命群众代表在声讨反党算权的走资派反革命罪行的同时，还对他们的反革命手法作了充分揭露，提出，这些党内资产阶级的典型代表要反党复权，使用的一个阴险恶毒的反革命手法就是：利用手中窃取的一部分权力，疯狂地纂改毛主席的指示。他们乔装打扮，伪装革命，把马克恩主义的词句唱得比谁都响，实际上是一伙假马克思主义的骗子，尽管他们靠这点骗术能在党内混上八年、十年，甚至更长一些时间，但背叛马列主义、毛泽东思想的人、终究逃脱不了历史的惩罚！"}],"authors":["《文汇报》编辑部"],"dates":[{"year":1976,"month":10,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":605,"page_end":606},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ba413714a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
