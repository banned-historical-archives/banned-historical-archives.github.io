tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席巨幅彩色涂塑画像试制成功","authors":[],"parts":[{"type":"paragraph","text":"新华社上海二十六日电 我们伟大领袖毛主席的巨幅彩色涂塑画像，在上海试制成功。这是上海印刷系统的革命职工在胜利完成今年大量印制《毛泽东选集》的光荣任务后取得的又一成就。"},{"type":"paragraph","text":"毛主席巨幅彩色涂塑画像高二点五米，宽二米，表面涂上一层塑料，光洁透明，在各种气候条件下都不易受潮和褪色。这种巨幅画像，适宜于在街道、会场、工厂、农村、部队等场所挂置。"},{"type":"paragraph","text":"上海印刷九厂和上海全市一百多个协作单位的革命职工，怀着对毛主席无限热爱的深厚阶级感情，参加了试制工作。他们干劲冲天，夜以继日，顽强地克服了试制工作中一个又一个困难，经过几百次试验，终于制成了革命人民盼望已久的毛主席巨幅彩色涂塑画像。"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4a192eceb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
