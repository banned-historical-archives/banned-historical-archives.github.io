ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"对普英像党和八路军的任务的指示","alias":"","parts":[{"type":"paragraph","text":"对晋冀豫党和八路军的任务的指示！"},{"type":"paragraph","text":"（1938年8月24日）"},{"type":"paragraph","text":"目前普冀豫全区的中心任务，是以最快的速度创造晋冀豫边区成为坚持抗战的巩固根据地。为此，党和八路军的任务是：建立完全在党领导下的有战斗力的游击兵团和地方游击队，广泛组织不脱离生产的自卫军，争取改造友军；逐步改造政权机关，使之成为抗日民主政权，准备将来召集晋冀豫边区政府代表大会；召开全区若干县的群众团体代表会议，动员群众参战，满足人民一些迫切要求；大力发展党，建立健全党的领导机关，办学校、训练班，培养干部。"},{"type":"paragraph","text":"毛洛胡"},{"type":"paragraph","text":"二十四日"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）、胡服（刘少奇）对晋冀豫党和八路军的任务作出的指示。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":8,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":432,"page_end":432},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c83adff04b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
