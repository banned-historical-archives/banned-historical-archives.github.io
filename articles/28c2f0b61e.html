成员进行了十分亲切友好的谈话","authors":[],"dates":[{"year":1973,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来、张春桥、姚文元、耿飚会见朝鲜《劳动新闻》代表团"},{"type":"paragraph","text":"同郑浚基为团长的代表团全体成员进行了十分亲切友好的谈话"},{"type":"paragraph","text":"新华社一九七三年四月十六日讯中共中央政治局常委、国务院总理周恩来，中共中央政治局委员张春桥、姚文元，中共中央委员、中联部部长耿飚，今天下午会见了以朝鲜劳动党中央委员、《劳动新闻》总编辑郑浚基为团长的朝鲜《劳动新闻》代表团全体成员，同他们进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团成员有：朝鲜《劳动新闻》党的生活部长李金哲、编辑局副局长赵俊奎、国际部长徐东范、评论员李绿英、记者金相台。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国驻中国大使玄峻极，大使馆一等秘书朱轸极和朝鲜《劳动新闻》、朝鲜中央通讯社驻北京记者严泰龙，也参加了会见。"},{"type":"paragraph","text":"我有关方面负责人和工作人员石少华、鲁瑛、王揖、陈浚、缪海稜、顾文华、张志、陆维钊、王珍、师海云、孙轶青、张庭延、廉正保等，会见时在座。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"图为会见时合影。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28c2f0b61e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
