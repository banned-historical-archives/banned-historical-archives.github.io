year":2000,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"欧洲部分极右翼政党和团体"},{"type":"paragraph","text":"意大利“三色火焰派”和“法西斯与自由派”  由意大利全国联盟分裂出来的极右翼团体。这些新法西斯极右翼团体奉行激进的极右翼政治主张，他们颂扬墨索里尼的“历史功绩”，主张恢复历史上失去的领土，支持北约干涉科索沃，宣扬极端排外主义。"},{"type":"paragraph","text":"法国国民阵线  成立于1972年10月，前身是被取缔的极右组织“新秩序党”，党员多为中小工商业者。该党具有比较系统的政治纲领，其核心内容是排外主义和种族歧视。该党领导人勒庞曾3次参加总统竞选，其政治目标不仅要在法国执政，而且要复兴欧洲极右翼力量，为此该党与欧洲许多右翼政党联系密切。该党候选人虽然未能进入国民议会，但在地方和地区议会中有几十名议员，并拥有12名欧洲议会议员。"},{"type":"paragraph","text":"德国人民联盟  1964年11月28日在汉诺威成立，由德意志帝国党和其他右翼组织联合组成。是联邦德国最大的新纳粹势力的右翼党派。宣扬种族主义，反对外籍工人在联邦德国工作；反对社会民主，要求实行中央集权；推卸法西斯德国发动二战的责任，为纳粹罪行辩护；主张保卫日耳曼文化，建立一个“强大的、有权威的国家”。由于政府对极右翼政党的活动限制较严，公众对其也较忌讳，因此该党连同德国共和党、德国国家民主党等右翼党派在1998年的大选中仅获得3.3％支持率，但在州议会选举中得票较多。"},{"type":"paragraph","text":"比利时弗拉芒集团  成立于1979年5月，由弗拉芒人民党和弗拉芒民族党组成的竞选联盟演变而来。是弗拉芒极端民族主义组织，领导人为勃洛克。该党在1999年议会大选中获得10％的选票，在安特卫普市的选票甚至高达28％，目前该党在议会拥有15个席位，发展势头较猛，令政府头疼。"},{"type":"paragraph","text":"丹麦人民党  全国第三大党，领导人为皮娅·克雷斯高。对内主张保障私人企业的自由发展和竞争，反对政府干预，要求加强国防，压缩国家和公共开支。党员多为大中企业主、大农庄主、高级职员和商人。1998年议会选举中获得了7.5％的支持率，近来支持率已升至20％。"},{"type":"paragraph","text":"挪威进步党  1973年由自由主义者派别创立。该党反对税收、主张私有制、减少国家福利和限制移民。在1997年的选举中，获得15％的选票，是挪威主要政党之一。"},{"type":"paragraph","text":"奥地利自由党  1955年在独立者联盟的基础上成立，1995年改用现名。该党具有浓重的纳粹色彩。曾任该党主席的约尔格·海德尔是近年欧洲舆论注意的右翼人物之一，他积极主张限制移民，并为纳粹德国的就业政策辩护。在1999年大选中获27％的选票，成为国内第二大党。今年2月与人民党组成联合政权，成为目前在西欧唯一参政的极右翼政党。（未央）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43d16e59ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
