知","authors":[],"dates":[{"year":1962,"month":4,"day":3}],"is_range_date":false,"parts":[{"text":"中共中央关于严格控制往大城市遣送人员的通知","type":"title"},{"text":"各中央局，各省、市、自治区党委：","type":"appellation"},{"text":"据上海反映，上海内调支援各地的职工，最近遣回上海的不少，每天有几百人在市劳动局要工作。类似这样的现象，在其他大城市也有发生。因此，请你们注意各地在精减职工时，对从大城市出身的职工，特别是技术工人一般不要精减；如非减不可时，对从别的大城市出身的职工和家属，都应该就近安置，不要遣送回原籍城市。其中如果有极少数必须遣送回去的，一定要事先同原籍城市联系好以后，再行遣送，不能简单从事，以免造成困难。","type":"paragraph"},{"text":" 中  央一九六二年四月三日","type":"paragraph"},{"text":"（发至地、市党委）","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52627fd830"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
