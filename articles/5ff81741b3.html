"山西","朔风","李鸿仁","王化堂","高元江"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"中专教师的右派言论（一）","type":"title"},{"text":"山西朔风王化堂李鸿仁高元江","type":"authors"},{"text":"朔风（省建筑工程学校教师）：","type":"paragraph"},{"text":"“今后用人应是唯材主义。因解放几年来，旧知识分子得到了不少改造，和共产党员差不多了，因此应实行用人唯材主义”。","type":"paragraph"},{"text":"王化堂（机械工业学校教师）：","type":"paragraph"},{"text":"“百分之七十的农民并不愿入社，是共产党硬宣传起来的，干部开会开的，因此，搞得太快了，农民没有积极性，增产二百亿斤粮食不确实”。","type":"paragraph"},{"text":"李鸿仁（机械工业学校教师）：","type":"paragraph"},{"text":"“农民生活不如解放前好了，现在是要啥无啥，从古至今没有吃过360斤粮食，都没有像现在吃不饱”。","type":"paragraph"},{"text":"高元江（太原工业学校教师）：","type":"paragraph"},{"text":"“农民生活就是没有提高，好多农民不愿卖粮，干部非叫卖不行，有的农民因此自杀，但自杀了也得卖，总之，农民很苦，老是吞糠嚥菜”。","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（四）》（中共山西省委整风办公室编印，1957年11月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ff81741b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
