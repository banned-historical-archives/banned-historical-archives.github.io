tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"绝不给修正主义文艺半点自由","authors":["五好战士马保超"],"parts":[{"type":"paragraph","text":"中国赫鲁晓夫大力鼓吹创作“自由化”。一九五六年六月，他公然提出所谓“开放政策”。反革命修正主义文艺黑线总头目周扬，对主子的意旨心领神会，随即便四蹄奔忙，从修正主义的垃圾堆里找来了“创作自由”的黑招牌，大嚷大叫：“艺术不要给他们任何限制”，让他们“自由竞赛”。并发脾气说：“不要只写工农兵”，“熟悉古代的写古代”，“有资本主义思想的东西我们不必怕”。周扬的罪恶目的，就是妄图把文艺引导到脱离无产阶级政治，脱离阶级斗争现实的邪路上去。"},{"type":"paragraph","text":"毛主席教导我们说：“我们的文学艺术都是为人民大众的，首先是为工农兵的，为工农兵而创作，为工农兵所利用的。”毛主席的英明教导是我们革命文艺的方向。我们的创作就是为广大工农兵的，就是为无产阶级政治服务的。周扬之流声嘶力竭地鼓吹不要给任何限制的“创作自由”，就是为大批毒草出笼鸣锣开道，积极地为资本主义复辟做舆论准备。在周扬之流的指挥下，封建主义的朽货，修正主义的垃圾，资本主义的破烂，一时充斥文艺阵地，疯狂地向党、向社会主义进攻。用心何其毒也！"},{"type":"paragraph","text":"今天，我们把被周扬之流篡夺的文艺大权夺过来了。我们对封、资、修的东西就是要专政，就是要限制。我们一定要把文艺阵地变成宣传毛泽东思想的阵地。天是毛泽东思想的天，地是毛泽东思想的地。真正的创作自由是我们用毛泽东思想武装起来的工农兵的。让周扬之流鼓吹的那套“创作自由”见鬼去吧！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"912e815a54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
