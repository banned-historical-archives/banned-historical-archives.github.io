东局电","authors":[],"dates":[{"year":1950,"month":10,"day":13}],"is_range_date":false,"parts":[{"text":"中央关于高利贷者的阶级成份问题复华东局电","type":"title"},{"text":"关于农村中长期大量放债所属成份及其待遇问题，答复如下：","type":"paragraph"},{"text":"凡长期出放大量债款，并依此为其生活之全部或主要来源者，其成份应订为高利贷者或债利生活者（为避免高利和低利之争执，可不用高利贷者这一名词）。在土地改革中，不动债利生活者的财产，但解放前农民及其他劳动人民所欠的债利生活者的债务，应按处理解放前农民所欠富农债务的办法处理之。即利倍本者停息还本，利两倍于本者本息停付。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5123f8634"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
