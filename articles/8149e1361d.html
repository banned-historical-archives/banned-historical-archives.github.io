tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国政协民族委员会召开毛泽东与民族工作座谈会","authors":["孙勇"],"parts":[{"type":"paragraph","text":"全国政协副主席阿沛·阿旺晋美深情地回忆了毛主席民族工作思想对西藏和平解放、民主改革和社会主义建设所做的卓越贡献。他说，毛泽东同志对西藏工作事必躬亲，亲自制定了一系列特殊的方针和政策。我曾有幸多次见到毛主席，并聆听他老人家的教诲。回忆往事，犹如昨日，倍感亲切。毛泽东思想在西藏工作上的胜利，也标志着我们党在民族工作上的伟大胜利，其核心就是实事求是，一切从实际出发。"},{"type":"paragraph","text":"赛福鼎·艾则孜副主席回忆了从1949年到1976年的27年里向毛主席汇报、请示工作和在毛主席家作客中的难忘情景。他说，毛主席非常重视民族问题，始终支持和关心少数民族。毛泽东民族工作思想的精髓在于：把国内民族革命视为中国革命总体的一部分；坚持各民族平等团结；积极帮助少数民族发展经济和文化。"},{"type":"paragraph","text":"安士伟、多杰才旦、黄光学、李学智等同志也在座谈会上发言。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8149e1361d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
