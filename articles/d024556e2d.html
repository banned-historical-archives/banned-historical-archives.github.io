<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想武装头脑  日本青少年活学活用《毛主席语录》的故事","authors":[],"dates":[{"year":1967,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用毛泽东思想武装头脑"},{"type":"paragraph","text":"日本青少年活学活用《毛主席语录》的故事"},{"type":"paragraph","text":"在日本，越来越多的青少年积极用毛泽东思想来武装自己的头脑。他们积极活学活用毛主席著作，同日共修正主义分子进行斗争。"},{"type":"paragraph","text":"《红星》在斗争中成长"},{"type":"paragraph","text":"不久前，东京一所高级中学里出版了一种油印的杂志——《红星》。封面上印着毛主席语录：“世界是你们的，也是我们的，但是归根结底是你们的。你们青年人朝气蓬勃，正在兴旺时期，好象早晨八、九点钟的太阳。希望寄托在你们身上。”《红星》出版以后，学生们争相传阅，毛主席的语录，字字都象颗火种，在这些年轻人的心灵上点燃起革命的热情。有的学生说，我们应当象中国的红卫兵一样，关心国家大事，关心民族的前途，做一个勇敢的革命者。倡议创办《红星》的一位同学说，毛泽东思想是战胜帝国主义、修正主义、反动派的锐利的思想武器。我们自己要好好学习，用毛泽东思想武装头脑，也要让所有的同学都好好学习毛泽东思想。因此我们决心继续出版《红星》杂志。"},{"type":"paragraph","text":"他们在坚持学习《毛主席语录》中，注意联系实际斗争，逐渐看清了美日反动派和日本修正主义分子的真面目。"},{"type":"paragraph","text":"办《红星》杂志的这位同学向中国记者谈到这一阶段斗争的体会时说，毛主席告诉我们：“人民，只有人民，才是创造世界历史的动力。”这句话鼓舞了我们斗争的勇气。开始我们以为我们是少数，可是斗争一展开，就发现许多同学支持我们，大多数同学对学校反动当局的迫害表示不满。"},{"type":"paragraph","text":"《红星》这一名字，表现了日本青年对伟大领袖毛主席的无限敬仰，也表现了他们对日本无产阶级革命事业的热诚。《红星》正在斗争中锻炼成长。"},{"type":"paragraph","text":"不怕压力  宣传真理"},{"type":"paragraph","text":"在下关一所高级中学的图书馆里，放着一册红彤彤的《毛主席语录》，每天都有很多学生前来争相阅读。这是这个学校的一个学生主动地送给图书馆的。这位少年从两年前就开始阅读毛主席著作，而且是北京广播的热心听众。他说：“毛主席不仅是中国人民的导师，也是日本人民的导师。全世界人民只要用毛泽东思想武装起来，就将所向无敌”。"},{"type":"paragraph","text":"去年十二月九日在下关市一个集会的会场前，他向参加会的人散发欢迎中国妇女代表团的传单。这时跳出来一个修正主义分子不让他散发，并且恶毒地谩骂他是“事大主义”、“分裂主义”。但是他毫无惧色，据理反驳，坚决把这个修正主义分子顶了回去。同时，他引用毛主席语录，摆出事实，耐心地向群众宣传真理。他说，毛主席教导我们：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”我们应当看清朋友和敌人，向破坏日中友好的敌人坚决斗争。群众听了都支持他的行动。"},{"type":"paragraph","text":"这位少年向中国记者介绍这次斗争情况时说，当时，修正主义分子虽然很凶，但是我一点也不怕，因为我记住了毛主席的话：“一切反动派都是纸老虎。”"},{"type":"paragraph","text":"·新华社记者·"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d024556e2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
