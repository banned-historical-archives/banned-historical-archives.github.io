" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来就传达毛泽东四月二十三日批示问题给政治局委员的信","authors":["周恩来"],"dates":[{"year":1975,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"周恩来就传达毛泽东四月二十三日批示问题给政治局委员的信","type":"title"},{"text":"周恩来","type":"authors"},{"text":"洪文同志阅后请转政治局同志和参加会议同志审阅：","type":"appellation"},{"text":"五月三日政治局同志面听主席指示后，我提议政治局常委五人先谈一谈，弄清当时没听清楚的问题和如何传达主席四月十三日批示的问题。经过五月四、七两晚的会谈，洪文同志传达主席的指示，说红旗五期写了文章，主席的批示不要下达了。于是我们就考虑到中央是否需要再发一个文件，从正面阐明无产阶级专政的理论和在中国如何实施限制资产阶级法权、逐步缩小三大差别等政策问题：（这在主席二十多年来提倡和规定的政策中已有许多），以利于学习和实践。当时，春桥同志说，如要搞文件，就需要一段时间。此事，请中央政治局同志讨论后报主席。","type":"paragraph"},{"text":"关于弄清当时没听清楚的问题，主要是文章中提到主席在一九五九年批判彭德怀反党集团时，提到“现在，主要危险是经验主义”，是在文元同志文章中，不在春桥同志文章中，三月份解放军报、人民日报两篇社论，也是根据文元同志文章引用的。小平同志也说，他向主席请教的是指的春桥同志在总政三月一日召开各大单位主任座谈会上的讲话，（当时还提到江青同志在政治局会议正式提出了这个问题—邓注）这在各大军区政治部向总政反映讨论情况三四月份电报中可以看出。当时，春桥同志说，在批林整风时，他就认为从一九五九年后批经验主义不够，所以与我商量又将主席批印的《经验主义还是马克思列宁主义》的《哲学小辞典》选辑重印一批发出。我们认为当时问题已弄清楚，就不要忙于向主席反映。现在政治局既开正式会讨论主席批示和指示，我已请洪文同志向会议上说明，现在补报如上。","type":"paragraph"},{"text":"如大家同意，亦请将此报告转呈主席一阅。","type":"paragraph"},{"text":" 周恩来一九七五年五月二十一日","type":"paragraph"},{"text":"王洪文五月二十二日批：请剑英、小平、春桥、江青、文元、先念、锡联、登奎、国锋、吴德、 振华、志福、桂贤、海容、静宜、闻生同志阅","type":"paragraph"},{"text":"张春桥五月二十二日批：总理的信，有些话不确切。但我不反对报主席。","type":"paragraph"},{"text":"江青五月二十四日批：许多情况不了解。同意报主席。","type":"paragraph"},{"text":"姚文元五月二十四日批：常委会讨论情况我不了解。如还讨论了别的问题，建议也说明一下。","type":"paragraph"},{"text":"王洪文五月二十四日批：继续传阅，传完后送总理阅，是否呈主席请总理定。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"书信"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98b54fdc4f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
