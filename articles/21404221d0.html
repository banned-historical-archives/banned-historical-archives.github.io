学院","梁致礼"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"梁致礼的右派言论","type":"title"},{"text":"成都工学院梁致礼","type":"authors"},{"text":"(梁致礼：成都工学院教师)","type":"subtitle"},{"text":"“苏联经济是民主的，就是政治不民主。中国是学苏联的政治也是不民主，如像解放前选人民代表，还可以竞选，解放后就是决定了，然后叫大家去选，就是不民主。”","type":"paragraph"},{"text":"“解放前还可以骂一骂国民党，还有自由，解放后谁敢骂共产党啊！骂了你就会脱不到手，就会把你关起。”“今天少数人专多数人的政”","type":"paragraph"},{"text":"“知识分子已经改造得差不多了，每个干部都应知道他自己的档案。”“档案不公开，谁知道给他打的是‘花脸、红脸’，还是‘粉脸’呢？”","type":"paragraph"},{"text":"“档案科、保密资料室应该撤消与人事科合并。”“既然有了人事科就不应该再有档案科、保密资料室也用不着了，现在还有什么密可保。”","type":"paragraph"},{"text":"“人事部门的工作，民主党派、无党派人士都可以参加，不一定要清一色的党团员。”","type":"paragraph"},{"text":"主张民主办校，听说东北有些工厂成立由工人选出的代表组成厂务委员会实行民主办厂。学校也有工会又有民主党派未常不可以实行民主办校。","type":"paragraph"},{"text":"“党委干部，尽是‘思想干部’，实际是‘抽象干部’。那些人是拿钱不做事的，是一天到晚指指划划，不务正业的人。”","type":"paragraph"},{"text":"“解放前特务监视人，解放后积极分子到处散布。”“积极分子不顾别人的死活，踏在别人的脊背上，作为自己上升的条件。”","type":"paragraph"},{"text":"主张党委不要专职干部：“党委工作究竟有好多，我看每天抽一两个钟头来搞一下就行了。人家民主党派没有脱产干部还是把工作搞起来了。党委部门多余的副部长下放到膳食科、出版科。党员应该是吃苦在前，享乐在后，应该带头做艰苦工作。下放后，一方面加强基层领导，一方面也可以搞具体工作。”","type":"paragraph"},{"text":" 来源：《右派言论选集》（中共成都工学院委员会办公室，1957年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21404221d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
