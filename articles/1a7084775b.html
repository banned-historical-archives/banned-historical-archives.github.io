" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"新疆分局干部学校解决学员宗教思想的经验","authors":["《宣传通讯》编辑部"],"dates":[{"year":1952,"month":1,"day":10}],"is_range_date":false,"parts":[{"text":"新疆分局干部学校解决学员宗教思想的经验","type":"title"},{"text":"《宣传通讯》编辑部","type":"authors"},{"text":"新疆分局干部学校的学员中，有许多是信奉伊斯兰教与喇嘛教的少数民族青年，他们绝大多数有着不同程度的宗教信仰。第一期开学讲“猴子变人”，很引起学员的反感。第二期时接受了这一教训，坚持了各民族有宗教信仰自由及共产党人是唯物主义和无神论者的原则。他们的经验证明，采取以下步骤来解决学员的宗教思想问题是比较好的方法。第一、开学即向民族学员讲清宗教信仰自由政策，以高度革命热情为他们改善生活、治疗疾病、开展文娱活动，使他们感到革命队伍中的温暖，因而在无形中冲淡了他们对宗教的信仰。第二、讲社会发展史时先不讲猴子变人，而密切联系新疆的阶级情况，讲奴隶社会与封建社会；并科学地讲解风、云、雷、雨、生、死等宇宙现象，以便在阶级观点与科学观点上启发学员。第三、在新疆，阶级压迫是与宗教压迫分不开的，讲到奴隶社会时，学员很自然的就要诉苦，并联系着批判了宗教，因而要求讲猴子变人，这时让民族干部引导学员多联系社会实际，以各种事例进行启发，特别是民族干部谈自己的思想转变过程，对学员帮助更大。第四、组织觉悟快而原来宗教信仰很深的学员讲自己的思想转变过程。第五、待五种生产方式讲完后，学员在科学观点及阶级观点上都有了些基础，一定要求讲猴子变人，这时学校在百分之八九十以上民族青年的要求下讲劳动创造人类，劳动创造世界，学员听了不但不感到刺激，反而如释重负，大多数民族学员从此解除了宗教信仰。","type":"paragraph"},{"text":"分局干校的经验还证明：当宗教问题在学院的思想上获得解决后，还必须给以政策教育，使之不要违反宗教信仰自由的政策，避免过左情绪，并在必要时通过宗教去联系群众，引导群众到阶级斗争的实践中来，这是可以做到而且有好处的。","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部《宣传通讯》1952年第1期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a7084775b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
