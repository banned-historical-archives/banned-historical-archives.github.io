","authors":[],"dates":[{"year":1967,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市糖业烟酒公司毛泽东思想学习班的同志，在关于建党问题的大学习、大批判过程中，就怎样的党员才是毛主席的好党员这个问题展开了一场辩论。"},{"type":"paragraph","text":"辩论是从发展新党员应该具备什么条件的讨论引起的。一位同志说，做一个党员，必须政治可靠，业务精通，老实听话。"},{"type":"paragraph","text":"这些话，立即引起了争论。许多党员和非党同志不同意这个看法。认为老实听话，是中国赫鲁晓夫“驯服工具论”的变种，是中国赫鲁晓夫的“共产党员的党性，表现在服从党、尊重组织的绝对性”的流毒。有个受资产阶级反动路线蒙蔽而站错了队的党员干部，在辩论中用自己的切身教训说，过去，自己对上级说的，总认为是对的，即使觉得有些地方不对，也一切照办，还认为这是党性强的表现，结果陷入了盲目服从，在无产阶级文化大革命中就站错了队。一位工人出身的共产党员说，我们共产党员，要做鲁迅所说的“孺子牛”，即做无产阶级和人民大众的“牛”，“完全”、“彻底”为人民服务，决不做中国赫鲁晓夫所希望的没有政治头脑、没有灵魂、只会盲目服从的、老实听话的“驯服工具”。我们做毛主席的好党员、就要用毛泽东思想武装自己的头脑，按毛主席的指示办事，按毛泽东思想行动。对上级领导也是这样，凡是符合毛泽东思想的，我们坚决拥护，坚决执行；凡是不符合毛泽东思想的，就坚决抵制，坚决造反。"},{"type":"paragraph","text":"一位基层店的党员同志说，毛主席教导我们:“没有正确的政治观点，就等于没有灵魂。”我们做毛主席的好党员，不但要在生产上起模范作用，更重要的是，要在阶级斗争中当闯将，起一个无产阶级先锋战士的作用，永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席的革命路线。"},{"type":"paragraph","text":"经过辩论，大家提高了认识，有的同志还联系过去的教训，认识到自己中黑《修养》的毒太深了，表示今后一定要更加努力地活学活用毛主席著作，用“老三篇”为武器，不断“斗私，批修”，改造世界观，争取做毛主席的好党员。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98266e88df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
