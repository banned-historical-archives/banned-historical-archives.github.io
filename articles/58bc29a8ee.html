art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"钻研文件检查作风动手调查某坦克学校干部学习毛主席调查研究","authors":[],"parts":[{"type":"paragraph","text":"本报讯 某坦克学校全体干部认真学习毛主席关于调查研究的文件，把学习文件、检查工作、实际行动紧密结合起来。"},{"type":"paragraph","text":"他们在反复学习文件的基础上，首先发动大家以毛主席关于调查研究的指示为武器，认真对照思想，检查工作。通过群众性的检查证明：自从贯彻军委扩大会议决议以来，许多工作由于重视了调查研究，做到了按实际情况办事，所以效果比较好。但也有不少工作，由于没有认真进行调查研究，效果不好。大家在检查中指出，毛主席批评的那种不做调查、凭主观办事的“极坏的作风”，在某些干部中还时有流露。归纳起来，有六种表现：一是单从好的愿望出发，好心办坏了事情；二是以感想代替政策，轻率地处理原则问题；三是观气色、瞎估计，了解情况只看表面现象；四是根据道听途说进行批评表扬，以至张冠李戴；五是不懂装懂，凭主观想象乱出点子；六是心中无数，干了再说。在充分的事实面前，使大家深刻地认识到调查研究的重要性，同时又看清了自己工作中的缺点，鼓舞了积极改进工作的愿望。"},{"type":"paragraph","text":"为了进一步学会怎样进行调查研究，他们又组织干部结合本身业务，人人做调查研究，亲口尝一尝梨子的滋味，进一步通过实践来认识和掌握调查研究的方法。在统一组织下，经过短短一个多月的时间，仅政治部、训练部、校务部三个部门就做了若干个专题调查，有的单位甚至80％的干部参加了调查工作。经过亲身实践之后，大家又进一步总结了调查研究的十大好处：一是发现问题又快又准，二是心里踏实好下决心，三是解决问题及时有力，四是先进经验适时传播，五是掌握规律工作主动，六是上下通气心情舒畅，七是深入群众改进作风，八是三风五气一扫而空，九是培养干部又红又专，十是毛泽东思想体会更深。概括说来，既给各项工作带来了莫大好处，又深刻地懂得了调查研究的好处，初步掌握了调查研究的方法。成为今后在工作中普遍发扬实事求是作风的良好开端。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58bc29a8ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
