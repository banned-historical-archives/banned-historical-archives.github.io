":[],"dates":[{"year":1962,"month":9}],"is_range_date":false,"parts":[{"text":"四川省统计局人口统计","type":"title"},{"text":"[编者注：本说明是谁写的，难以考证；数字亦有矛盾处，但是忠于原件]","type":"appellation"},{"text":"1961年农村劳动比1957年减少情况说明","type":"subtitle"},{"text":"我省1957年农村人口6,284.8万人，其中劳动力2,696.1万人，占42.90%；1961年农村人口5,556.0万人，其中劳动力2,464.7万人，占44.4%；1961年农村人口比57年减少788万人，占11.6%；1961年农村劳动力比57年少1,231.3万人，占8.6%。","type":"paragraph"},{"text":"以上情况，据我们了解，主要是从1958年以来，我省遭受了连续三年的自然灾害，农业歉收，，疾病流行广，人口死亡率也随着上升。特别是身体衰弱的老年人，死亡就更多。因此，我省总减少的比例较大，劳动力的减少比例就更大。故61年农村劳动力人口的比例比57年略大，这种情况基本上是符合实际的。","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8481fa283f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
