script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"丹麦发掘出有男奴隶陪葬的女海盗墓","authors":[],"dates":[{"year":1982,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"丹麦发掘出有男奴隶陪葬的女海盗墓"},{"type":"paragraph","text":"据丹麦报纸报道，去年12月在丹麦盖尔德鲁普市附近发掘出一个有男奴隶陪葬的女海盗墓。"},{"type":"paragraph","text":"墓中有一具女海盗的骨架，旁边放着一把标枪、一把匕首和一块古怪的骨制物。标枪的木柄保存完好，匕首套上的纺织套饰仍依稀可见，另外还有陪葬食物的痕迹。特别值得注意的是，墓中还发现一具陪葬的男奴隶的尸体。有痕迹表明他是被吊死后陪葬的。丹麦的考古学家估计，女海盗年龄30多岁，身高157厘米，是在公元800至850年早期海盗时期入葬的。"},{"type":"paragraph","text":"（荣）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8394814b7a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
