出卖和宰杀牲畜","authors":[],"dates":[{"year":1954,"month":12,"day":16}],"is_range_date":false,"parts":[{"text":"热河省购粮中有些地方不给牲畜留粮农民纷纷出卖和宰杀牲畜","type":"title"},{"text":"【热河分社十六日讯】热河省有些村庄在购粮中，人、畜消费量的标准计算较低，或只给人留口粮，不给牲畜留饲料，因而有些农民出卖或宰杀牲畜的现象较多。","type":"paragraph"},{"text":"凌源县十区，农民卖驴的现象较前增多，有的把驴杀了卖肉。北票县三家子村有一百多只羊，因购粮时只给人留了口粮，没给牲畜留饲料，现在已卖了二十多只，杀了三十多只。平泉县曹家店村购粮后三天内就杀了二十七口肥猪。会州城村有养猪一百一十八头，因购粮后缺乏饲料，大部分都要杀掉，据调查：只有三十六头能喂肥卖给国家。有的把鸡杀掉吃了，甚至还有把狗打死的现象。(朱成)","type":"paragraph"},{"text":"1954年12月22日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e62a31885e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
