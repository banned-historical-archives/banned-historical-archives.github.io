script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5082","name":"中共中央、国务院、中央军委、中央文革小组关于解决铜川问题的指示","author":"中共中央","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央、国务院、中央军委、中央文革小组关于解决铜川问题的指示","dates":[{"year":1967,"month":11,"day":9}],"is_range_date":false,"authors":["中共中央","中央军委","中央文革小组","国务院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央办公厅、国务院秘书厅文化革命联合接待室, 无产阶级文化大革命有关文件汇集（第五集）, 1-3","tags":[],"parts":[{"type":"title","text":"中共中央、国务院、中央军委、中央文革小组关于解决铜川问题的指示"},{"type":"subtitle","text":"（一九六七年一月九日）"},{"type":"paragraph","text":"陕西省军区、驻陕部队支左委员会："},{"type":"paragraph","text":"为了解决铜川的问题，兹决定："},{"type":"paragraph","text":"—、由兰空工程部队抽调一个团(二千人）加强铜川支左力量，协同原驻铜川的部队，大力宣传毛泽东思想，宣传伟大领袖毛主席最新重要指示，坚决贯彻九•五命令，制止武斗，封存收交武器。在执行上述指示时，部队一律徒手，坚持五不（吵不动气，駡不还口，打不还手，打伤不开枪，出入不带枪），向群众宣传毛泽东思想，进行政治思想工作，宣传九•五命令收缴武器，实行革命大联合等。如有人向部队开枪，打死打伤部队的人时，报中央请示处理。"},{"type":"paragraph","text":"二、由二十一军派得力干部（师以上干部）吸收兰空，铜川市武装部干部参加组成铜川市及渭北煤矿军管会，对市、矿统一实行军管。"},{"type":"paragraph","text":"三、铜川两派九月二十五日已达成贯彻九•五命令的十项协议，中央已另电加以批转（略有文字修改），希望两派重新签字，坚决贯彻执行，并由军管会监督执行。"},{"type":"paragraph","text":"四、在两个协议签字前，陕西省军区和二十一军对八•一九公告作公开检讨，宣布撒销该公告。五、指名抽调原当权派及两派组织的部分负责人到北京学习（编入陕西省军区学习班内）。"},{"type":"paragraph","text":"六、 由军管会召集两派进一步协商，贯彻毛主席最新重要指示，搞革命大联合，抓革命，促生产，尽快把煤炭生产抓上去。以上各项，请立即会同各有关方面，贯彻执行。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2c8f57b8c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
