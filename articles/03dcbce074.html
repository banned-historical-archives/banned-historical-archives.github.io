thors":[],"dates":[{"year":1950,"month":9,"day":22}],"is_range_date":false,"parts":[{"text":"皖北重灾区灾民正大量外逃","type":"title"},{"text":"【南京分社9月22日讯】据宁市生产救灾委员会材料，皖北重灾区灾民，最近仍在大量逃荒。自本月1日至20日，逃往宁沪及沿线各大城市的皖北区灾民共6752人，平均每日为340人左右。南来灾民大部系老弱妇孺。他们说：“几两救济米吃不饱，逃荒比坐在家里靠救济好。”但这些人逃荒到城市后，因都是老弱，最难找到生活，唯有依靠乞讨或收容救济。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年9月30日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03dcbce074"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
