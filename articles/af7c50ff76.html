,"dates":[{"year":1994,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界明星乒赛香港站比赛结束"},{"type":"paragraph","text":"马文革王涛分获冠亚军"},{"type":"paragraph","text":"新华社香港６月１７日电（记者杨国强）’９４爱普生世界明星乒乓球巡回赛香港站比赛今晚在这里结束，中国名将马文革以３∶１击败队友王涛，夺得桂冠；王涛位居亚军。"},{"type":"paragraph","text":"在今晚的冠军争夺战中，马文革在以１１∶２１先失一局的情况下，越战越勇，以２１∶１８、２１∶１７、２１∶１１连拿３局。这是马文革自１９９１年以来，第二次在香港夺得这项赛事的桂冠。"},{"type":"paragraph","text":"决定第三、四名的比赛本应在世界排名第十三的加拿大的黄文冠和世界排名第五的韩国的金泽洙之间进行。后因金泽洙因伤退出了比赛，结果，黄文冠获得了第三名。"},{"type":"paragraph","text":"中国男队总教练蔡振华对今晚中国选手的表演表示满意。他认为，马文革和王涛是中国目前最优秀的选手，他们的球技旗鼓相当。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af7c50ff76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
