  澳大利亚二万工人大罢工反对垄断资本残酷剥削","authors":[],"dates":[{"year":1968,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在进步学生运动推动下奋起反对统治集团的反动经济政策"},{"type":"paragraph","text":"意大利兰契亚诺市工人再次总罢工"},{"type":"paragraph","text":"澳大利亚二万工人大罢工反对垄断资本残酷剥削"},{"type":"paragraph","text":"新华社五日讯　罗马消息：意大利南部兰契亚诺市工人在进步学生运动的推动下，四日举行了一周内第二次总罢工，反对统治集团向劳动人民开刀的经济政策。"},{"type":"paragraph","text":"四日上午，由罢工工人和市民组成的一万人的示威队伍，同前来镇压的警察进行了英勇的搏斗。反动警察使用催泪弹、警棍和铁链袭击示威群众。在青年学生和工人的带头下，示威者用石头、木棍进行自卫反击，并英勇地把警察扔过来的催泪弹扔了回去。示威群众还把汽车推倒在大街上作为路障，并同警察进行了肉搏战。激烈的战斗持续了大约两小时。当天晚上，示威者还同警察发生了新的冲突。"},{"type":"paragraph","text":"在那不勒斯，一个公共事业机构的工人和雇员举行示威，抗议资方不发给工资。"},{"type":"paragraph","text":"在西西里自治区首府巴勒摩，罢工工人在过去几天内同警察进行了激烈的搏斗。由于工人罢工，市内所有的公用事业已完全陷于停顿。"},{"type":"paragraph","text":"新华社墨尔本四日电澳大利亚二万多名管道工人、煤气安装工人和码头工人，举行大罢工，反对垄断资本对他们的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"从三日午夜开始，澳大利亚全国二万二千多名管道工人和煤气安装工人，举行了二十四小时的全国大罢工，要求增加工资。"},{"type":"paragraph","text":"墨尔本的大约三千五百名码头工人，以及布利斯班的数百名码头工人，也在三日和四日先后举行罢工，罢工使这两大城市的港口完全陷于瘫痪。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db91bd568c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
