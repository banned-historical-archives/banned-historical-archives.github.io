:[],"dates":[{"year":1988,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联学者在芬兰发表讲演"},{"type":"paragraph","text":"改革意味着从幼稚和左倾观点中解放出来"},{"type":"paragraph","text":"新华社赫尔辛基五月十六日电  苏联世界社会主义制度经济研究所教授达希特谢夫今天在这里发表的讲演中指出，改革将会使社会主义在苏联和其它社会主义国家得到复兴，改革也将对东西方关系发展和发展中国家产生重大影响。"},{"type":"paragraph","text":"达希特谢夫是应芬兰共产党（团结派）的邀请前来芬兰进行讲学访问的。"},{"type":"paragraph","text":"他认为，改革意味着从幼稚想象和左倾观点中解放出来，这将涉及经济管理、国家所有制、政治体制以及党在社会中的地位等领域。"},{"type":"paragraph","text":"他强调，民主是改革的前提条件，没有深入的社会民主改革，就不可能实现经济的有效增长。"},{"type":"paragraph","text":"在谈到六月份即将召开的党的代表大会时，他指出，这次大会将解决社会生活和党的生活民主化问题。"},{"type":"paragraph","text":"他说，大会还将对党在社会中的任务作出明确的规定，行政与经济工作不再属于党的工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91d13ce275"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
