<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以廖初江、丰福生、黄祖示为榜样 活学活用毛主席著作实现革命化展览会已接纳了近十万参观群众，起了很大促进作用","authors":[],"dates":[{"year":1965,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在上海展出的“廖初江、丰福生、黄祖示学习毛主席著作展览”，从三月二十八日到四月二十二日止，前往参观的已有九万九千六百余人。"},{"type":"paragraph","text":"这个展览从预展开始，每天前往参观的人们，都川流不息。在观众中间，有工人、战士、干部、学生，还有店员和里弄妇女，有白发苍苍的老人，也有刚带红领巾的少年，他们怀着一定要把毛泽东思想真正学到手的强烈愿望，细心观看，绝大多数同志还边看边记。不少观众好学不倦，从早上到下午，一连看了好些时候，饭也忘记了吃。有人说:“精神的粮食跟人体所需要的粮食一样，不可缺少。”这个展览对观众的教育很大。他们热情洋溢地在留言簿上写下了两千一百多篇观后感，有的人还给展览办公室寄来了感谢信。"},{"type":"paragraph","text":"去年，廖初江同志曾去求新造船厂“传经”，这个厂的铜工弯管小组的工人在参观这个展览时，感到特别亲切。他们第一天就去参观，回厂后，学习了毛主席关于总结经验的指示，纷纷表示，要虚心学习他们的先进经验，进一步把毛主席著作学好。小组长张银荣说:“学习三位同志的经验，首先要学习他们的谦虚精神，真心诚意地学，把他们的经验消化，使这个‘精神原子弹’发挥巨大的物质力量。”东海舰队某部三○一船是学习毛主席著作的先进集体，他们参观了展览后，当晚即举行座谈会，许多官兵一致表示，要更好地向三位同志学习。副机电长杨炳金，是九年服役九年红的好战士，现在，他被评为先进工作者。他说:“我是抱着学习的态度去参观的，目的是为了比比自己不足的地方，吸取经验，找出办法。”五好战士宗长安说:“参观了展览，开阔了眼界，真是:‘不过秦岭，不知天外有天’。”"},{"type":"paragraph","text":"这个展览是一个学习毛泽东思想的大课堂。上海幼儿师范学校的四十六个学生在担任讲解员过程中，推动了他们学习毛主席著作的积极性。为了做好这个工作，事前，他们学习了《为人民服务》和《纪念白求恩》两篇文章，经过参观、学习、试讲，四月十一日、十二日两天下午，他们放弃了休息，热情地向观众作了讲解。开始，他们的讲解象背书那样，缺乏深厚的阶级感情，为了改正这个缺点，重新学习了《中国社会各阶级的分析》，认识到毛主席著作是劳动人民翻身家解放的书，应该带着阶级感情讲解，后来，他们的讲解有了较大的进步，群众反映说:你们讲得很生动，廖初江、丰福生、黄祖示学习毛主席著作的事迹经过你们的介绍，既形象又具体。一些学习毛主席著作的积极分子也从这个展览中得到很大的鼓舞。交通大学学生陈光荣说:“我一定要以廖初江、丰福生、黄祖示为榜样，带着阶级感情学，把自己‘摆进’毛主席著作中去，真正地把毛泽东思想学到手。”"},{"type":"paragraph","text":"这个展览对许多单位的毛主席著作学习也有重大的促进作用。上海市人民淮剧团的同志，参观这次展览后，在廖初江、丰福生、黄祖示三位同志事迹的鼓舞下，学习毛主席著作小组从原来的一个小组七个人，发展到现在的七个小组，有五十二人参加。上海市第六人民医院的同志参观后，结合讨论了报上发表的三位同志学习毛主席著作的经验，以它为武器，正在总结前一个时期学习毛主席著作的收获，准备进一步展开学习毛主席著作的热潮。"},{"type":"paragraph","text":"上海工人文化宫展览厅内每天只能容纳四千人，为了满足广大群众向廖初江、丰福生、黄祖示同志学习的要求，不少单位的群众推派一人去参观，然后由他回去“传达”。介绍三位同志学习毛主席著作事迹的挂图，在全市范围内，已经销售一万八千套，上海市房地产管理局买了五十套，还组织了三十个讲解员，经过短期的集训，正向它的直属单位的八千多名职工巡回展出。由上海人民出版社出版的载有丰福生、黄祖示等同志学习经验的《怎样学习毛主席著作》一书，已经发行六十七万五千册。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b8b6b5dc8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
