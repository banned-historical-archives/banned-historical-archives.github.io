art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忠于伟大的领袖毛主席〔朗诵诗〕","authors":["战士连高武义德赵芳才"],"parts":[{"type":"paragraph","text":"旭日东升，"},{"type":"paragraph","text":"光芒万丈；"},{"type":"paragraph","text":"人群如海，"},{"type":"paragraph","text":"歌声嘹亮。"},{"type":"paragraph","text":"北京市革命委员会成立了，"},{"type":"paragraph","text":"像一声春雷响彻四方。"},{"type":"paragraph","text":"千万面红旗迎风飘扬，"},{"type":"paragraph","text":"千万颗红心要跳出胸膛。"},{"type":"paragraph","text":"“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"欢呼声向五洲四海荡漾。"},{"type":"paragraph","text":"我们热烈欢呼！"},{"type":"paragraph","text":"欢呼毛泽东思想的伟大胜利，"},{"type":"paragraph","text":"我们纵情歌唱！"},{"type":"paragraph","text":"歌唱我们心中最红最红的红太阳。"},{"type":"paragraph","text":"北京，"},{"type":"paragraph","text":"世界革命的灯塔；"},{"type":"paragraph","text":"北京，"},{"type":"paragraph","text":"世界被压迫人民解放的希望；"},{"type":"paragraph","text":"北京，"},{"type":"paragraph","text":"无产阶级文化大革命的发源地；"},{"type":"paragraph","text":"北京，"},{"type":"paragraph","text":"我们伟大领袖毛主席居住的地方。"},{"type":"paragraph","text":"党内最大的一小撮走资本主义道路当权派，"},{"type":"paragraph","text":"妄图把北京变成反革命复辟的基地。"},{"type":"paragraph","text":"是毛主席点燃革命烈火，"},{"type":"paragraph","text":"把无产阶级文化大革命道路照亮。"},{"type":"paragraph","text":"是毛主席指出前进的方向。"},{"type":"paragraph","text":"把资产阶级反动路线打得马翻人仰。"},{"type":"paragraph","text":"光焰无际的毛泽东思想，"},{"type":"paragraph","text":"使我们取得了一个又一个胜利，"},{"type":"paragraph","text":"战无不胜的毛泽东思想，"},{"type":"paragraph","text":"给了我们无穷无尽的力量。"},{"type":"paragraph","text":"最最敬爱的伟大领袖毛主席啊！"},{"type":"paragraph","text":"我们心中最红最红的红太阳。"},{"type":"paragraph","text":"我们坚决响应您的伟大号召，"},{"type":"paragraph","text":"把您的教导牢记心上。"},{"type":"paragraph","text":"我们坚决和无产阶级革命派站在一起，"},{"type":"paragraph","text":"把党内最大的一小撮走资本主义道路当权派打倒。"},{"type":"paragraph","text":"我们坚决支持无产阶级革命派，"},{"type":"paragraph","text":"把无产阶级的大权牢牢掌。"},{"type":"paragraph","text":"我们坚决支持无产阶级革命派，"},{"type":"paragraph","text":"狠抓革命、猛促生产。"},{"type":"paragraph","text":"把首都办成毛泽东思想的大学校，"},{"type":"paragraph","text":"让伟大首都永远闪耀着毛泽东思想的光芒。"},{"type":"paragraph","text":"誓死保卫毛主席，"},{"type":"paragraph","text":"誓死捍卫党中央。"},{"type":"paragraph","text":"我们永远忠于毛主席的无产阶级革命路线，"},{"type":"paragraph","text":"我们永远忠于伟大的毛泽东思想。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d6524486b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
