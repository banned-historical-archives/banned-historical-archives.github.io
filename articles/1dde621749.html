<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"张建浜大队坚决遵照毛主席的指示办事超额完成夏季粮油征购任务潘家宅生产队交售小麦种子时，不慎掉进了一斤大麦，贫农保管员和另外两位社员花了三个多小时，终于一粒粒地拣了出来，保证了国家种子的纯度","authors":[],"dates":[{"year":1967,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海宝山县吴淞公社张建浜大队的革命社员和革命干部，通过学习毛主席的光辉著作《关于正确处理人民内部矛盾的问题》，遵照毛主席关于“统筹兼顾”、“顾全大局”、“备战、备荒、为人民”的教导，超额完成了今年的夏季粮油征购任务。到本月十七日为止，已经超售三麦一万八千多斤。"},{"type":"paragraph","text":"在毛主席“抓革命，促生产”的伟大号召下，在中国人民解放军强有力的支援下，这个大队今年夏熟作物取得了大丰收，三麦平均亩产四百三十九斤，油菜籽平均亩产二百二十四斤。"},{"type":"paragraph","text":"丰收之后，在粮油的分配上，怎样正确处理国家、集体、个人三者之间的关系呢?开始有的社员也曾有少售多吃的思想。特别是对山农二○五的小麦，有的社员说:“这种小麦碾成面粉，又白又软，吃口好，要多留一些作口粮。”后来他们带着这个问题认真学习了毛主席的光辉著作《关于正确处理人民内部矛盾的问题》，他们说:“毛主席教导我们:‘我们作计划、办事、想问题，都要从我国有六亿人口这一点出发，千万不要忘记这一点。’我们大队的这种好品种是国家调来的，现在国家需要，我们就应该多出售，这是我们贫下中农应尽的光荣义务。”他们还说:“一事当前，我们不能先替自己打算。先国家、后集体、再个人是我们应有的风格。”"},{"type":"paragraph","text":"无产阶级文化大革命和活学活用毛主席著作的群众运动，大大提高了这个大队的社员和革命干部的觉悟。他们深深体会到，完成国家的夏季粮油征购任务，是关系到国家能否保证城市工矿的口粮供应；关系到能否顺利地把无产阶级文化大革命进行到底；关系到能否顺利地进行社会主义建设的大问题。因此他们在完成国家粮油征购任务时，不仅出售快，超额完成，而且做到晒干扬净，把质量最好的粮食卖给国家。如谭家宅生产队的社员，过去常常把打麦场上的下脚麦连同好麦一起出售给国家，今年则把这种麦留作社员的口粮分配，出售给国家的全部是好麦，确保了国家征购的质量。潘家宅生产队在作为种子出售的一万八千多斤小麦中，有一百多斤小麦不慎掉进了一斤左右的大麦，贫农保管员谭根法就和另外两个社员自动拣了三个多小时，最后终于把大麦一粒一粒拣出来了。他们说:“我们应该学习和发扬白求恩同志对工作的极端负责的精神。如果现在不花一些时间把它拣掉，明年就要变成几十斤、几百斤大麦，影响兄弟队的小麦种子的纯度。”"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\06\\676o020401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e唐允仁\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在夏收高潮中，广大革命师生纷纷开赴农村，和贫下中农并肩战斗，虚心向贫下中农学习。这是上海新师大的革命师生在嘉定县马陆人民公社和社员一起收油菜籽。　新华社记者　唐允仁摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1dde621749"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
