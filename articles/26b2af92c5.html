ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"在欢迎民族英雄马占山将军晚会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在欢迎民族英雄马占山将军"},{"type":"paragraph","text":"晚会上的讲话！]"},{"type":"paragraph","text":"（1939年12月22日）"},{"type":"paragraph","text":"今天开会欢迎始终如一抗战到底的马占山将军。我国古代社会即是欢迎有始有终的人，一直到今天都是这样，半途而废的人不被人所欢迎。抗日是一件大事，要始终如一，抗到底。马将军八年前在黑龙江首先抗日，那时红军在南方即致电热烈欢迎，八年之前红军与马将军则已成为抗日同志，我们相信马将军一定抗战到底的。现在有些投降派，半途妥协，他们是虎头蛇尾，我们要和马将军一道，和全国抗战的人一道，我们真诚的欢迎那些始终如一，抗战到底的民族英雄，他们为中华民族解放而奋斗到底，我们就欢迎到底。马将军年逾半百，仍在抗战的最前线与敌周旋，这种精神值得全国钦佩。"},{"type":"paragraph","text":"[1]抗日将领、东北挺进军总司令马占山，于1939年冬离重庆返回防"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":228,"page_end":228},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26b2af92c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
