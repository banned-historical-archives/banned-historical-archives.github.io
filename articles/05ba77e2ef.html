script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"泰国渔民坚持斗争反对剥削","authors":[],"dates":[{"year":1974,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"泰国渔民坚持斗争反对剥削"},{"type":"paragraph","text":"新华社讯　曼谷消息：据泰国报纸报道，泰国沿海各地的渔民继续坚持斗争，抗议垄断集团压低鱼产品的收购价格和大幅度提高渔业生产资料价格，要求保障渔民的基本权益。"},{"type":"paragraph","text":"三月二十一日，沙没沙空、沙没巴干、董里等三个主要鱼产区的二千多艘渔船停泊在港口，拒绝出海捕鱼，抗议垄断集团压低鱼产品收购价格。同一天，在泰国中部和南部的沙没颂堪、宋卡、拉廊、春蓬、素叻他尼等府，也有数百艘渔船参加了抗议活动。"},{"type":"paragraph","text":"在沙没沙空和沙没巴干还有数百名渔民分别举行抗议示威，要求当局满足渔民的合理要求。"},{"type":"paragraph","text":"据报道，最近以来，在泰国，渔业所需的燃料油、绳网和冰块等的价格急剧上涨，有的甚至上涨二至三倍。加上垄断集团又压低鱼粉收购价格，使渔民生活更加困苦。"},{"type":"paragraph","text":"泰国渔民为了争取生活权利从二月底三月初就开始了斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05ba77e2ef"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
