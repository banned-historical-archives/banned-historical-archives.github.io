ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在抗大生产运动初步总结大会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在抗大生产运动初步总结大会上的讲话！"},{"type":"paragraph","text":"（1939年4月24日）"},{"type":"paragraph","text":"抗大同别的机关一样，生产的第一阶段的任务已完成了，这证明中共中央所决定的计划是可以实现的。历史上几千年来做官的不耕田，读书人也不耕田，假使全国党政军学，办党的，做官的，大家都干起来，那还不是一个新的中国吗？你们将工农商学兵结合起来了。你们读书叫学，开荒是农，打窑洞做鞋子是工，办合作社是商，你们文是军，你们是工农商学兵结合在一个人身上，文武配合，知识与劳动结合起来，可算是天下第一。最近我写了一篇文章，讲区分革命的、不革命的和反革命的知识分子的标准只有一个，就是看他是不是同工农相结合。我们不但能组织工农，训练工农，并且自己也做工农，这样我们就更加革命化了。"},{"type":"paragraph","text":"[1]这是毛泽东在抗大生产运动初步总结大会上讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":4,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":286,"page_end":286},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"651940a8b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
