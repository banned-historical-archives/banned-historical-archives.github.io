,"dates":[{"year":1958,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保共加强党的宣传工作"},{"type":"paragraph","text":"号召党员提高思想水平反对修正主义"},{"type":"paragraph","text":"据新华社索非亚1日电　保加利亚共产党中央委员会最近举行了一个研究党的思想工作的会议。"},{"type":"paragraph","text":"保共中央宣传鼓动部长格里戈罗夫在会上作了报告。他指出：党的马克思列宁主义宣传工作大大地改进了。现在，党内学习的马克思列宁主义课程有十五种，而过去只有四、五种。学习马克思列宁主义经济理论和社会主义经济学的党员和非党群众约有十一万人，比1955年多两倍。有近七万党员和非党积极分子正在学习目前保加利亚和其他社会主义国家的社会主义建设状况的问题。他特别强调指出，党的宣传和政治鼓动工作必须同修正主义和资产阶级思想的每一个表现进行不调和的斗争。"},{"type":"paragraph","text":"加?夫在会议最后讲话时指出：现在每个党员、每个党组织和全党的最重要的任务就是加强思想战线上的斗争，提高党的宣传工作和群众政治工作水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6bac43216"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
