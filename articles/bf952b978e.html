rs":["李先念"],"dates":[{"year":1967,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"李先念召集外贸部两派代表座谈时的讲话","type":"title"},{"text":"李先念","type":"authors"},{"text":"李先念召集外贸部“井冈山公社”和外贸部“革命造反总部”两派代表座谈纪要(摘录)","type":"subtitle"},{"text":"我和各组织都讲过，不要为我的问题发生意见，不对么！这样我心里难过，我犯错误，造反派为什么不能炮轰、火烧、打倒？！至于打倒不打倒，还有中央、主席、林总和中央文革嘛。你们为这一点发生争执，我犯错误心里很惭愧，很多讲话就是错了，压制了造反派。","type":"paragraph"},{"text":"目前摆在外贸方面的任务非常严重，同志们想一想，同外国人打交道，订了合同，就要守信用。而且任务繁重，港口堵塞。你们也知道消息，农业不错，只是××地发生水灾，这么大国家不发生点灾害不可能，我担心秋旱而不是涝的问题，我的看法比较好的，没有秋旱会有大丰收。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf952b978e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
