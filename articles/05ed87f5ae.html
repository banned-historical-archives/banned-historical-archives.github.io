tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认真学习毛主席著作促进部队建设八一六六○部队深入贯彻《决议》，精神面貌发生可喜变化","authors":["陆灵宣/周广翔"],"parts":[{"type":"paragraph","text":"本报讯 八一六六○部队指战员认真学习毛泽东著作，把学习贯彻《决议》引向深入，推动了各项任务的完成。"},{"type":"paragraph","text":"这个部队的干部战士在学习《决议》后普遍制定了学习计划。在各连党支部的领导下，班排分别成立了学习小组，设立了理论辅导员。在营建任务重、时间紧的情况下，连队每星期用两个晚上组织集体学习，并提倡大家挤时间自学。"},{"type":"paragraph","text":"学习中，要求干部战士联系思想和部队建设的实际，运用毛泽东思想的立场、观点、方法来解决问题。学习《为人民服务》，他们针对部分战士怕苦怕累、不安心服役等思想，重温我军宗旨，讨论当兵扛枪的目的，收到了明显的效果。多数新战士端正了入伍动机，许多老战士也能自觉服从组织需要，安心服役。七连战士吕丙权过去曾感到连队生活艰苦，任务繁重，产生了早点退伍回家的念头。现在，他振奋了精神，焕发了革命热情，积极参加连队各项工作，在营建中吃苦耐劳，勇挑重担，受到领导和同志们好评。"},{"type":"paragraph","text":"指战员们还针对部队居住分散，作风纪律比较散漫的问题，认真学习毛泽东同志的《反对自由主义》和加强组织纪律性的有关论述，认清遵守革命纪律、加强作风培养的意义。认识提高了，行动就自觉，散漫现象有了克服。"},{"type":"paragraph","text":"学习《决议》和毛泽东著作，使干部战士的精神面貌发生了可喜变化。现在，看书学习的多了，做好事的多了，要求进步的多了，争作贡献的多了。营建施工中，同志们不怕困难，积极主动作贡献。"},{"type":"paragraph","text":"（陆灵宣、周广翔）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05ed87f5ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
