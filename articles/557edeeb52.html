" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji49","name":"毛泽东全集第49卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"要埋头工作，善于思考","alias":"","parts":[{"type":"paragraph","text":"要埋头工作，善于思考"},{"type":"paragraph","text":"（1967年2月）"},{"type":"paragraph","text":"五四运动风流人物，有影响的人物，五四运动的右翼是胡适，后来他成了美帝的走狗，五四运动的陈独秀也成了反革命。当时的李大钊，写的文章也不多，但他理头工作，后来成为革命的左派。还有鲁迅，当时他重视社会调查，独立思考，后来成为伟大的马克思主义者。我们要从历史当中吸取教训，不做昙花一现的人物，要理头工作，善于思考，密切联系群众。中国历次的革命及我们亲身经历的革命，真正有希望的人是能想问题的人，不出风头的人。现在大吵大闹的人，一定会成为历史上昙花一现的人物。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":348,"page_end":348},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"557edeeb52"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
