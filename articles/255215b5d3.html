thors":[],"dates":[{"year":1952,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"山东各地地主破坏活动猖狂","type":"title"},{"text":"【山东分社十九日讯】由于美国进行细菌战的影响，农村地主趁机活动，扰乱社会秩序。昌南县有些地主在夜里撒鸡毛和用毒药拌过的小米。第二天就造谣说美国飞机来撒的，在群众中制造恐怖。昌邑县有两个村的地主趁机向农民倒算果实。德州专区在二月到三月期间，发现地主进行造谣、倒果实、拉拢军属反对干部案件一百八十三起，盐山一个县，最近即有十多起倒果实的案件。","type":"paragraph"},{"text":"此外，五莲县松柏区在四月十六日发生匪特会道门组织的重大暴乱事件，暴徒包括五个区，二十个村的人，并以“红头军”为番号。经我一天的捕剿始息灭，毙伤俘匪、道徒八十七人。","type":"paragraph"},{"text":"据最近到省开互助合作会议的各地区干部报告，由于美国进行细菌战和农村对地主管制放松，加上三反对农村的影响，有些干部工作情绪低落，反动分子趁机造谣，所以地主活动很猖狂。值得领导注意。","type":"paragraph"}],"comments":[],"origin":"1952年5月21日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"255215b5d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
