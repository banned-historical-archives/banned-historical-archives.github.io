rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席和中共中央政治局委员们接见政治学院一批毕业学员","authors":["解放军画报/刘峰"],"parts":[{"type":"paragraph","text":"本报2日讯 今天下午七时，毛泽东主席和中共中央政治局委员刘少奇、朱德、陈云、康生、彭真、董必武、林伯渠、彭德怀、邓小平，在怀仁堂接见了中国人民解放军政治学院高干轮训班应届毕业学员等将官、校官七百余人。陪同接见的还有总政治部主任兼政治学院院长罗荣桓元帅和肖华上将、甘泗淇上将等。"},{"type":"paragraph","text":"本届毕业学员都是我军各军种、各兵种部队中的政治工作负责干部，其中有一百多名将官。他们来自全国各地，在学院经过了三个月的辩证唯物主义学习后，普遍丰富了马克思列宁主义理论知识。当他们即将离校的前夕，毛主席于百忙中抽出时间接见他们，他们听到这个消息十分兴奋，立即整装来到怀仁堂后面草坪上等候接见。下午七时，当毛主席和中共中央政治局委员们步入草坪的时候，学员们立即以热烈的掌声和欢呼声迎接他们。毛主席向大家含笑挥手，关切地向学院副院长莫文骅中将询问了学员们的学习和其他情况。"},{"type":"paragraph","text":"接见后，毛主席和中共中央政治局委员们同全体学员们合影留念。"},{"type":"paragraph","text":"毛主席、中共中央政治局委员们和政治学院毕业学员合影"},{"type":"paragraph","text":"解放军画报记者 刘峰摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"109967c086"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
