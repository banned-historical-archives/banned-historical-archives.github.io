<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"泰国革命人民热情开展学习毛主席著作运动  人民武装战士掌握人民战争的战略战术，结合具体实践指导战斗，有效地歼灭敌人，迅速地发展自己的力量","authors":[],"dates":[{"year":1968,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"泰国革命人民热情开展学习毛主席著作运动"},{"type":"paragraph","text":"人民武装战士掌握人民战争的战略战术，结合具体实践指导战斗，有效地歼灭敌人，迅速地发展自己的力量"},{"type":"paragraph","text":"新华社讯　据“泰国人民之声”电台十一月二十八日广播：泰国革命人民积极响应泰国共产党的号召，正在热情地开展活学活用毛主席著作的运动。"},{"type":"paragraph","text":"电台说：大海航行靠舵手，干革命靠毛泽东思想。毛泽东思想是在帝国主义走向全面崩溃、社会主义走向全世界胜利的时代的马克思列宁主义。毛泽东思想是反对帝国主义、现代修正主义和一切反动派的强大的思想武器。泰国共产党高举毛泽东思想伟大红旗，领导泰国人民进行反对美帝侵略者和他侬—巴博卖国集团的革命武装斗争。在泰共领导下，泰国革命人民学习毛主席著作的运动广泛地开展起来，毛泽东思想越来越深入到广大革命人民心里。"},{"type":"paragraph","text":"电台接着说：毛主席的光辉著作“老三篇”越来越多地为广大泰国革命群众所掌握，用作改造自己世界观的武器。这使泰共党员、干部、人民武装战士和革命人民有着翻天覆地的战斗精神，不怕苦和不怕死，坚持用毛泽东思想指导一切工作，使革命斗争向前迈进。"},{"type":"paragraph","text":"电台说，在人民武装队伍里，战士们热情地学习毛主席著作，用毛泽东思想来树立完全、彻底为人民服务的精神，树立为解放国家和解放人民而战斗的精神。他们积极学习毛主席的军事著作，掌握毛主席关于人民战争的战略战术，结合具体实践指导战斗，有效地歼灭敌人，使人民武装斗争迅速地扩展到三十一个府。人民武装已成为不可战胜的强大武装队伍。"},{"type":"paragraph","text":"电台指出，由于学习毛主席著作运动的不断深入，泰共党员、干部、人民武装战士和革命人民加深对毛泽东主席的热爱，无限信仰毛泽东思想。"},{"type":"paragraph","text":"电台最后强调指出，在泰国共产党领导下，泰国广大革命群众，一旦掌握了战无不胜的毛泽东思想这一武器，就会具有无穷的力量，就能战胜任何障碍，就能战胜美帝国主义侵略者及其走狗他侬—巴博卖国集团，最后一定能够解放国家和人民，赢得真正的独立和民主。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b024bb1293"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
