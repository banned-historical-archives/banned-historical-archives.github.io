script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"亚太和联代表雷维·艾利发表谈话广岛世界大会是和平力量的胜利充分暴露了修正主义者的丑恶面目","authors":[],"dates":[{"year":1963,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社香港10日电】　出席第九届禁止原子弹氢弹世界大会的亚洲及太平洋区域和平联络委员会代表雷维·艾利今天对香港新闻记者说:“这次在广岛举行的禁止原子弹氢弹世界大会取得了伟大的成就，这是日本人民的胜利，这是保卫世界和平力量的胜利，大会的成就将对保卫世界和平运动产生重大的影响。”"},{"type":"paragraph","text":"雷维·艾利是在今天从东京到达香港的。他在接见记者时指出，这次世界大会把修正主义者的丑恶面目充分暴露了。他说，苏联代表怀着肮脏的目的来参加这次大会，他们与右派团结，不是与进步力量团结，进行各种阴谋活动，企图破坏和搞垮这次大会。"},{"type":"paragraph","text":"雷维·艾利说，但是苏联代表的阴谋并没有得逞，大会所通过的决议的斗争性的内容表明了这一点，群众不接受他们的错误意见。"},{"type":"paragraph","text":"他还指出，参加大会的绝大部分代表都认为，中国政府7月31日的声明是正确的，为禁止核武器运动指出了明确的方向。他说，代表们都认识到，美英苏三国在莫斯科签订的部分禁止核试验的条约只是一个骗局，对世界爱好和平的人民只有起麻痹欺骗作用。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62c86d920c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
