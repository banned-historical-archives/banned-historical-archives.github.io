script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"确实围住三十五军全力防敌突围","alias":"","parts":[{"type":"paragraph","text":"确实围住三十五军全力防敌突围！！"},{"type":"paragraph","text":"（1948年12月11日）杨、罗、耿，并告程、黄："},{"type":"paragraph","text":"（一）程黄全部南下追歼一○四军，怀来、康庄线上空虚。（二）请令詹牛苏部速进占怀来、康庄线，一部向八达岭迫近，并沿途建立阻击阵地，以防九十四军西进。（三）你们三个纵队主力对三十五军迅速完成诸层阻击阵地，确实围住该敌，抽出一部在沙城、土木构筑向东阻击阵地，以防九十四军的万一西进。（四）目前全力防敌突围，大约十天以后方能攻歼该敌，你们预作攻击准备是可以的，但不要实行攻击。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十一日十时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第二兵团司令员杨得志、政治委员罗瑞卿和参谋长耿飚的电报。"},{"type":"paragraph","text":"[2]程、黄，指程子华、黄志勇，当时分别任东北野战军第二兵团司令员和参谋长。"},{"type":"paragraph","text":"[3]康庄，镇名，位于北京市延庆县南部。[4]詹牛苏，指詹大南、牛树才、苏启胜，当时分别任冀热察军区司令"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":375,"page_end":375},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"815724b416"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
