rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英会见日本友好人士北村博昭","authors":[],"parts":[{"type":"paragraph","text":"新华社6月30日讯 人大常委会委员长叶剑英今天上午在住所会见了日本友好人士、日本亚洲交流协会理事长北村博昭。"},{"type":"paragraph","text":"叶剑英在同北村博昭交谈中，称赞他的已故父亲北村义夫为发展日中友好事业和中国的经济建设做了许多工作。叶剑英说，北村义夫先生是中国人民的好朋友，希望北村博昭先生继承他的遗志，今后为中日友好合作做更多的工作。"},{"type":"paragraph","text":"北村博昭说，他看到叶剑英委员长身体健康，感到十分高兴。他说，我经常到中国来，看到中国的经济调整进行得很顺利，国内形势稳定，为今后的发展打下了很好的基础。"},{"type":"paragraph","text":"会见后，宾主一起合影留念。"},{"type":"paragraph","text":"6月30日，叶剑英委员长在住所会见了日本友好人士、日本亚洲交流协会理事长北村博昭。"},{"type":"paragraph","text":"新华社记者摄RW：叶剑英；接见外宾"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baef151a29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
