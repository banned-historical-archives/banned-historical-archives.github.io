script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"天山南北春耕忙  新疆广大农村用抓革命促生产实际行动回击右倾翻案风","authors":[],"dates":[{"year":1976,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天山南北春耕忙"},{"type":"paragraph","text":"新疆广大农村用抓革命促生产实际行动回击右倾翻案风"},{"type":"paragraph","text":"新华社乌鲁木齐一九七六年三月二十四日电　在反击右倾翻案风的斗争中，新疆维吾尔自治区广大农村，以阶级斗争为纲，掀起了备耕、春耕生产热潮。"},{"type":"paragraph","text":"目前，天山南北的广大农村，到处是大批“三项指示为纲”的修正主义纲领、大闹春耕生产的繁忙景象。全自治区广大农村干部和群众，怀着极大的无产阶级义愤，把大批判的矛头直指党内那个不肯改悔的走资派，批判他炮制“三项指示为纲”的理论基础阶级斗争熄灭论和唯生产力论，批判他的折中主义诡辩手法，进一步提高了阶级斗争和路线斗争觉悟。广大干部和群众以抓阶级斗争促春耕生产的实际行动回击右倾翻案风。目前，在北疆的准噶尔盆地、伊犁河谷和阿勒泰农业区，各族贫下中农和社员群众、农村干部正在继续兴修水利、平整土地、积肥造肥，积极进行备耕生产。"},{"type":"paragraph","text":"在南疆的塔里木盆地、吐鲁番盆地和东疆的哈密地区的戈壁绿洲里，各族社员正在紧张地播种春小麦和油料作物，进行水稻育秧、棉田送肥等生产。季节较早的和田地区，已完成春播计划的百分之七十四，春种的情况，比去年耕作细、施肥多、质量好。去年在学习无产阶级专政理论运动推动下，夺得粮食亩产上《纲要》的吐鲁番地区，今春以来各族社员和干部认真学习毛主席关于反击右倾翻案风的重要指示，举办各种类型的学习班，培训骨干，开展革命大批判，春种的进度快、质量好。到三月中旬，全地区春播计划已完成了百分之八十七。"},{"type":"paragraph","text":"去冬以来，新疆农村广泛地开展了农业学大寨的群众运动，全自治区抽调了四万名干部，组成党的基本路线教育工作团，深入广大农村牧区，带领各族社员大批修正主义，大批资本主义，大干社会主义，推动了备耕生产的蓬勃发展。去冬今春以来，全自治区投入农田水利建设的劳动力达一百五十万，完成水利工程两千多项，打井八百多眼，增加和改善灌溉面积三百多万亩，平整条田二百六十多万亩，为今年的春耕生产打下了良好的物质基础。"},{"type":"paragraph","text":"今春以来，自治区工业、商业部门积极支援春耕生产，为农村调拨拖拉机、播种机、插秧机和机引犁、耙等一千多台，马车、架子车、手推车等各种农用车辆一万多辆和大批零配件。交通运输部门组织支农车队，给春耕第一线抢运化肥、农药、柴油、水泥和农机配件等农用物资，许多工厂还派出机修人员，帮助社队检修农机具，不少医药卫生单位，送医送药到田间、地头，受到了贫下中农的欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"新疆文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f8ab9a574"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
