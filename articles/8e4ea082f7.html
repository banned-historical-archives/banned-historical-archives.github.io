script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴西农民领袖说第　二个哈瓦那　宣言指引　人民求得解放巴西人民支援古巴运动声势日益壮大指出武装斗争是各国人民摆脱压迫和剥削的道路","authors":[],"dates":[{"year":1963,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社哈瓦那27日电】　目前正在古巴访问的巴西东北部农民协会主席儒利奥对古巴《革命报》发表谈话说，“第二个哈瓦那宣言是一个宪章，应该以这个宪章来指引拉丁美洲各国人民为摆脱美帝国主义的统治和打破国内结构以求得解放而进行的斗争。”他说，“巴西农民协会已经担负起在全体巴西农民中宣传这个宣言的任务。”"},{"type":"paragraph","text":"儒利奥是在22日来到古巴的。他的这些谈话发表在今天的《革命报》上。"},{"type":"paragraph","text":"儒利奥说，“巴西人民给予古巴革命以很高的评价，它十分有力地保卫着自决权利和主权。如果帝国主义对古巴发动侵略，群众将起来以巨大的力量进攻一切美国的资产。”"},{"type":"paragraph","text":"儒利奥在谈到委内瑞拉人民的武装斗争时说，我们十分满意地注视着委内瑞拉游击队的斗争。各国人民应该追随这个榜样。通过这个方式可以使群众摆脱压迫和剥削。他说，“如果居于统治地位的寡头势力同意放弃自己的特权的话，和平的道路会是很好的。但是，在历史上还没有过发生这样事件的记载。”"},{"type":"paragraph","text":"【新华社北京27日电】　据拉丁美洲通讯社哈瓦那消息:正在古巴访问的巴西东北部农民协会主席儒利奥对拉丁美洲通讯社发表谈话说，“古巴革命不仅是属于古巴人民的——它已经在整个拉丁美洲深入人心。”他说，巴西各阶层人民支持古巴的运动正在日益发展壮大。"},{"type":"paragraph","text":"他指出，巴西目前所面临的经济局势使人们更加清楚地看到了美帝国主义剥削所达到的程度。"},{"type":"paragraph","text":"儒利奥谈到巴西东北部农民的非人的生活条件和他们所遭受的压迫和剥削。他说，肯尼迪政府由于担心这一地区人民的觉悟，因而派遣了一万二千多名美国特务，挂着神父、技术人员、经济学家和记者的招牌到巴西东北部去，这些人组成了“帝国主义第五纵队”，企图为实现其统治目的创造条件。"},{"type":"paragraph","text":"他说，巴西人民坚决反对美帝国主义的这种渗透。巴西东北部人民同拉丁美洲其他地区人民一起，将在全大陆发展着的革命事业中取得胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e4ea082f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
