ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"占领霍县灵石待胡宗南军","alias":"","parts":[{"type":"paragraph","text":"占领霍县灵石待歼胡宗南军川"},{"type":"paragraph","text":"（1946年8月19日）陈、谢："},{"type":"paragraph","text":"（一）占领赵城²甚慰，望配合二十四旅迅速占领霍县并相机占领灵石。（二）胡²军北进第一步在打通闻喜至临汾段，我以一个旅迟滞其行动，争取时间，占领霍、灵，创造战场，待胡军再向北进时，各个歼灭之。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"未皓"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军第四纵队司令员陈和政治委员谢富治的电报。"},{"type":"paragraph","text":"[2]赵城，旧县名，1954年与洪洞县合并为山西洪赵县，1958年改为山西洪洞县。1946年8月17日，晋冀鲁豫野战军第四纵队占领赵城。"},{"type":"paragraph","text":"[3]·胡，指胡宗南，当时任国民党军第一战区司令长官。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":81,"page_end":81},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5810fac03f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
