国人民在文化大革命中取得的成就","authors":[],"dates":[{"year":1966,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西哈努克亲王在我大使国庆招待会上重申"},{"type":"paragraph","text":"柬埔寨同中国要世世代代友好下去"},{"type":"paragraph","text":"热烈祝贺中国人民在文化大革命中取得的成就"},{"type":"paragraph","text":"新华社金边二日电  中国驻柬埔寨大使陈叔亮一日晚上举行国庆招待会。柬埔寨国家元首西哈努克亲王和夫人出席了招待会。"},{"type":"paragraph","text":"西哈努克亲王向陈叔亮大使热烈祝贺中国人民在毛泽东主席的领导下，在国家建设中和在无产阶级文化大革命中所取得的成就。"},{"type":"paragraph","text":"西哈努克亲王向陈叔亮大使重申，柬埔寨坚决忠于对中国的友谊。他表示“以有伟大的中国作为柬埔寨的头号朋友而感到自豪”。他说，我们的团结是破坏不了的，我们同中国要世世代代友好下去。"},{"type":"paragraph","text":"出席招待会的还有国家元首的私人顾问宾努，王国议会议长蒙达那亲王，首相康托尔亲王，柬埔寨王家武装部队总监涅·刁龙将军，副首相宋双，王宫事务总监桑云等柬埔寨知名人士。"},{"type":"paragraph","text":"出席招待会的还有纳拉迪波亲王。"},{"type":"paragraph","text":"驻柬埔寨的一些外交使节也出席了招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b807b51d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
