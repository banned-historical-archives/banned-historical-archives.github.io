script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji1","name":"毛泽东全集第1卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"七绝·魏都怀古","alias":"","parts":[{"type":"paragraph","text":"七绝?魏都怀古"},{"type":"paragraph","text":"（1918年8月18日）横赋诗2意飞扬，（罗章龙）自明本志3好文章。(毛泽东）"},{"type":"paragraph","text":"萧条异代西畴墓团，（毛泽东）[1]魏都，魏国京都在今河南许昌城东5公里外的地方。"},{"type":"paragraph","text":"[2]横赋诗，汉建安十二年（207）十月，曹操率大军攻吴，号称八十万众，且拥有巨舰千艘。苏轼在《前赤壁赋》中形容道：“方其破荆州，下江陵，顺流而东也，千里，旌旗蔽空，丽酒临江，横赋诗，固一世之雄也。”，杆子较长的矛。《前赤壁赋》说：“‘月明星稀，乌鹊南飞”，此非曹孟德之诗乎？”此两句诗，出自曹操的《短歌行》。诗末四句为：“山不厌高，水不厌深。周公吐哺，天下归心。”表明了他求贤建业的壮志。"},{"type":"paragraph","text":"[3]自明本志，指曹操于建安十五年（210）十二月下发的《让县自明本志令》。当时，汉献帝加封他阳夏、柘等三县共两万户，他上表退回三个封县，并写下了这首文笔苍劲、气势雄伟的手令，以表其态：“江湖未静，不可让位。至于邑土，可得而辞。”他下这道手令的目的，是减少别人的谤议。"},{"type":"paragraph","text":"[4]萧条，冷落凋零的样子。班固《西都赋》：“原野萧条，目极四裔。”西畴墓，指曹操的墓。西畴，西边田野。据《三国志·武帝纪》：建安二十五年二月丁卯，葬高陵。丁卯日为二十一日。高陵，曹操陵墓名，在今河北省临漳县西。"},{"type":"paragraph","text":"铜雀荒伦落夕阳川。（罗章龙）"},{"type":"paragraph","text":"北京大学是中国新文化运动的发源地，毛泽东曾在北京大学图书馆工作半年。图为北京大学红楼。"},{"type":"paragraph","text":"[1]铜雀，楼台名。遗址在邺城（今河北省临漳县西南)。据《三国志·武帝纪》，曹操在建安十五年（210）冬，建铜雀台。杜牧《赤壁》：“东风不与周郎便，铜雀春深锁二乔。”荒伦，荒芜，荒凉，亦作“伦荒”。欧阳修《谢国学解元启》：“论都未成，殆以伦荒而见隔。”"},{"type":"paragraph","text":"19191919年，毛泽东在长沙。"},{"type":"paragraph","text":"在上海送别第一批去法国勤工俭学同学时的讲话"},{"type":"paragraph","text":"（1919年初）"},{"type":"paragraph","text":"我觉得我们要有人到外国去，看些新东西，学些新道理，研究有用的学问拿回来，改造我们的国家。同时也要有人留在本国，研究本国问题。我觉得我对于自己的国家所知道的还太少，假若我把时间花费在本国，则对本国更为有利。育年影摄生学法留别送金生学国中珠"},{"type":"paragraph","text":"1919年3月15日，寰球中国学生会欢送第一批赴法勤工俭学学生合影。最高站立的两人居右者为前来送别的毛泽东。《改造中国与世界》（油画）"}],"authors":["毛泽东"],"dates":[{"year":1918,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":488,"page_end":495},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗章龙","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"036e318e87"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
