<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳大利亚共产党(马列)中央委员会发表声明强烈谴责苏修武装侵捷的滔天罪行捷克斯洛伐克人民必将同他们自己的修正主义领导人和国内的反动派展开斗争，使祖国回到马克思列宁主义的道路上来　澳大利亚革命者决心同苏联、捷克斯洛伐克和各国革命人民同心协力集中火力来打击苏修集团这个修正主义祸害的中心","authors":[],"dates":[{"year":1968,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社墨尔本二十八日电　澳大利亚共产党(马克思列宁主义)中央委员会二十八日发表声明，强烈谴责苏修叛徒集团武装侵略捷克斯洛伐克的滔天罪行。"},{"type":"paragraph","text":"声明说:“俄国占领捷克斯洛伐克，同共产主义、马克思列宁主义毫无共同之处。它是反共和反马克思列宁主义的。所有的革命者都对此加以痛斥。"},{"type":"paragraph","text":"“苏联领导人和，捷克斯洛伐克领导人不是共产党人，也不是马克思列宁主义者。他们早就背弃了共产主义、马克思列宁主义。这两个集团都是共产主义的叛徒。但是，他们闹翻了，就象强盗经常闹翻了一样。"},{"type":"paragraph","text":"“他们之间的争吵，不是共产党人、马克思列宁主义者之间的争论，而是两伙强盗、两个资本主义集团之间的争吵，是关系到如何处理剥削捷克斯洛伐克人民和苏联人民所得来的果实的争吵。"},{"type":"paragraph","text":"“苏联领导人代表的是苏联的资产阶级，捷克斯洛伐克领导人代表的是捷克斯洛伐克的资产阶级。不管他们便用多少共产主义的词句，也掩盖不了他们的资本主义本质。"},{"type":"paragraph","text":"“捷克斯洛伐克领导人发现使捷克斯洛伐克经济倒向西方对他们有更大的好处。苏联领导人对此表示异议。和其他帝国主义国家一样，俄国以武力强行反对。受害的却是捷克斯洛伐克人民。捷克斯洛伐克人民遭受的这场悲剧，是由篡夺了优秀的捷克斯洛伐克共产党领导权的修正主义集团造成的。谁都会看到，美帝国主义的头子约翰逊对苏联这一行动的反应是相当平静的。当然，他对另一个帝国主义的扩张是不喜欢的，但是同时他对这一点却是理解的。他声明，苏联的行动将不会妨碍美帝国主义和苏联之间关系的缓和，即苏美帝国主义将继续进行勾结，主宰世界。"},{"type":"paragraph","text":"“柯西金和约翰逊在葛拉斯堡罗肯定已经就美帝和苏联的势力范围达成协议。势力范围是由这两个国家各自的军事力量决定的。苏联在捷克斯洛伐克边境驻有军队。因此，捷克斯洛伐克是在它的势力范围内。这一切所根据的是帝国主义的强盗逻辑。"},{"type":"paragraph","text":"“捷克斯洛伐克人民无疑将同他们自己的修正主义领导人和出卖他们的捷克斯洛伐克国内的反动派展开斗争。他们一定会回到革命、回到马克思列宁主义的道路上来。他们一定会重建一个真正的马克思列宁主义党，这个党将领导他们展开反对苏联占领，反对捷克斯洛伐克修正主义者和反动派的革命斗争。"},{"type":"paragraph","text":"“同样地，这个事件也大大有助于苏联人民认识苏修集团的真正的法西斯帝国主义本质。这个集团的行为将使苏联人民起来造反和把十月革命的成果坚持到底的日子早日到来。"},{"type":"paragraph","text":"“盗用共产主义名义的全世界各修正主义集团已经发生根本动摇。在这个事件以前，他们早已分崩离析了。现在，这种分崩离析的情况大大加快了。”"},{"type":"paragraph","text":"声明谴责澳大利亚阿隆斯修正主义集团同苏修和捷修是一路货色，是同样阴险的反共老手。"},{"type":"paragraph","text":"声明指出，澳大利亚资本家的代言人谴责苏联侵略捷克斯洛伐克，不是出于任何热爱自由的反法西斯的感情，而是出于资本家们看到争夺的东西被一个竞争的帝国主义者抢走而引起的苦恼。"},{"type":"paragraph","text":"声明说:“澳大利亚的革命者同苏联、捷克斯洛伐克和所有其他国家的革命人民同心协力，集中火力来打击苏修集团这个修正主义祸害的中心，来打击如此无耻地依附这个修正主义世界中心的澳大利亚修正主义集团。”"},{"type":"paragraph","text":"声明最后说:“不管苏联侵略的结果如何，不管苏军是否从捷克斯洛伐克撤走，修正主义集团显然都是叛徒。没有任何东西能挽救他们的灭亡。他们将淹死在人民斗争的汪洋大海之中。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edb007835d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
