tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"罗军队“多依那”艺术团举行访华最后一场演出西哈努克亲王、宾努首相、英·萨利特使和周恩来、叶剑英、姚文元、李先念、纪登奎、李德生等同志出席观看","authors":[],"parts":[{"type":"paragraph","text":"新华社二十八日讯 由迪努·斯泰利安少将率领的罗马尼亚社会主义共和国军队“多依那”艺术团，今天晚上在北京举行访华最后一场演出。"},{"type":"paragraph","text":"柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王，柬埔寨民族统一阵线中央政治局主席、柬埔寨王国民族团结政府首相宾努亲王和夫人，柬埔寨王国民族团结政府和柬埔寨民族统一阵线国内特使英·萨利先生，应邀观看了演出。"},{"type":"paragraph","text":"中共中央政治局常委、国务院总理周恩来，中共中央政治局委员、中共中央军委副主席叶剑英，中共中央政治局委员姚文元，中共中央政治局委员、国务院副总理李先念，中共中央政治局候补委员纪登奎，中共中央政治局候补委员、中国人民解放军总政治部主任李德生，出席观看了演出。"},{"type":"paragraph","text":"罗马尼亚驻中国大使杜马和夫人陪同观看了演出。"},{"type":"paragraph","text":"罗马尼亚军队“多依那”艺术团演出了《歌唱党》、《乔治参军去》、《听从召唤》等罗马尼亚歌舞，和《东方红》、《大路歌》、《丰收舞》等中国歌舞，表达了罗马尼亚人民热爱党，热爱祖国，坚决捍卫国家主权和领土完整的决心，表达了罗马尼亚人民对中国人民的深厚情谊。他们的精采表演，受到了全场观众的热烈欢迎。"},{"type":"paragraph","text":"演出结束后，西哈努克亲王、宾努亲王和夫人、英·萨利先生，周恩来、叶剑英、姚文元、李先念、纪登奎、李德生等同志，走上舞台，同演员们亲切握手，祝贺他们演出成功。"},{"type":"paragraph","text":"观看今晚演出的还有："},{"type":"paragraph","text":"柬埔寨王国民族团结政府大臣沙林察、周成、秀木、杨森安将军和夫人、胡森巴、谢桑、吉春、秀蒲拉西，西哈努克亲王的儿子诺罗敦·尤瓦那王子，柬埔寨国家元首办公厅主任西索瓦·梅达维亲王，王国民族团结政府外交第二副大臣万比尼和夫人，柬埔寨王国驻中国大使凯密；"},{"type":"paragraph","text":"国务院外交部、文化组、中国人民解放军总政治部、对外友协、北京市革命委员会的负责人姬鹏飞、李耀文、吴德、刘贤权、石少华、王国权、丁西林、田维新、狄福才、黄厚民、吴印咸、王迪康、柴成文、丁国钰等。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"name":"李先念","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2c3b7c406"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
