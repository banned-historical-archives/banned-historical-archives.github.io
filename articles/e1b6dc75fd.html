authors":[],"dates":[{"year":1969,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本集团残酷剥削　反对当局对学生的迫害"},{"type":"paragraph","text":"意大利工人和学生继续展开斗争"},{"type":"paragraph","text":"新华社四日讯　罗马消息：意大利工人和学生继续展开斗争，抗议垄断资本集团的残酷剥削和反动当局对学生的迫害。"},{"type":"paragraph","text":"“皮雷利”橡胶托拉斯米兰总厂的一万二千名职工，三月三十一日举行二十四小时罢工，抗议资本家无理解雇六名工人。“皮雷利”托拉斯在意大利其他大城市工厂的工人也举行声援罢工。"},{"type":"paragraph","text":"为了破坏“皮雷利”托拉斯各工厂工人日益高涨的反对垄断资本残酷剥削的斗争，“皮雷利”托拉斯的资本家最近曾宣布了一些欺骗工人的所谓“社会改良”办法，但是，工人拒绝了这种欺骗阴谋，并且更加坚决地进行斗争。在这种情况下，资本家撕下假面具，解雇了六名工人，妄图对工人群众进行恫吓。但是，这进一步促进了工人的斗争，并加强了他们的团结。"},{"type":"paragraph","text":"意大利北部奥斯塔谷的“科涅”炼铁厂的四千五百名工人，一日和二日举行四十八小时罢工，要求提高工资。罢工工人在奥斯塔举行了街头示威。“科涅”炼铁厂高炉车间的工人从三月三十一日就开始举行罢工，罢工目前还在坚持中。"},{"type":"paragraph","text":"意大利各地牛奶场的工人二日开始举行七十二小时的全国性罢工，抗议资本家的残酷剥削。"},{"type":"paragraph","text":"意大利南部加拉勃利亚区的普拉亚市和马拉特亚市的工人二日举行总罢工，抗议当地两个纺织厂企图解雇工人。罢工使这两个城市陷于瘫痪。"},{"type":"paragraph","text":"在波伦亚，八千名中学生一日举行罢课和街头示威，要求释放不久前在一次示威中被警察非法逮捕的五名学生和两名工人。示威者包围了省政府和当地监狱，高呼“释放我们的同志”和“释放所有的工人和学生”等口号。"},{"type":"paragraph","text":"同一天，佛罗伦萨一些高级中学的学生也举行罢课，抗议政府骗人的教育“改革”。学生们还举行了街头示威，并且参加了罢工工人举行的一次游行，表示声援工人的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1b6dc75fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
