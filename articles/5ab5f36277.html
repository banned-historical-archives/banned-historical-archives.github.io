<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"韶山人民怀念毛主席","authors":["吴兴华"],"dates":[{"year":2003,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"韶山人民怀念毛主席"},{"type":"paragraph","text":"本报记者  吴兴华"},{"type":"paragraph","text":"在毛泽东同志诞辰110周年之际，记者访问了毛泽东的家乡韶山市。一到韶山，就看到公路两旁一座座小别墅似的白墙青瓦的农民住房，一排排蔬菜大棚，一处处果园和花圃。村庄里，家家户户客厅正中挂着毛主席画像。市委的同志介绍说，今年韶山市农民人均纯收入预计可达3783元。"},{"type":"paragraph","text":"记者来到坐落在韶山村的毛泽东纪念园边的毛家饭店，74岁的毛家饭店主人汤瑞仁笑盈盈地告诉记者：“我原来住在毛主席故居对面。毛主席一直关心我们农民，特别关心我们妇女。1953年，毛主席给我家捎来了80尺布、100万元钱（相当于现在的100元）。1959年毛主席回韶山，还到我家做过客。1984年，我在韶山办起了第一家饭店，现在，毛家饭店有连锁店50多家，职工有2800多名。近年来，我向社会捐助的钱就有100多万元。没有毛主席，哪来我的今天。”"},{"type":"paragraph","text":"韶山村党支部书记毛雨时告诉记者：“毛主席使我们韶山村人民翻了身，邓小平同志、江泽民同志继承和发展毛泽东思想，实行改革开放，我们韶山村发展旅游，调整农业结构，村民的收入增长近30倍。今年，村民人均纯收入达到5480元，比去年增加280元。现在，全村基本上家家建了楼房，有了电话和电视机、电冰箱、洗衣机等，30多户有了家用小汽车。韶山村人民永远永远忘不了毛主席。”"},{"type":"paragraph","text":"韶山人民对毛主席的崇高品德和艰苦奋斗的生活作风津津乐道。毛主席的侄儿、现在湖南省韶山管理局担任助理巡视员的毛岸平，多次见到毛泽东同志。他在韶山市纪念毛泽东同志诞辰110周年座谈会上深情地说：“毛泽东一生光明磊落，胸怀坦荡，生活简朴，对家乡父老乡亲和建设倍加关爱又不失原则性，他对亲属要求很严格。他的革命精神将永放光芒。”"},{"type":"paragraph","text":"韶山乡韶北村青年农民田海明10年来收集了2万多枚毛主席像章，1万多件书籍、图片和其它肖像艺术品，设计了中国革命里程碑纪念币。他说：“我们韶山人永远铭记毛主席的丰功伟绩，永远忘不了毛主席的恩情。用艺术宣传毛主席的工作，我将继续做下去。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ab5f36277"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
