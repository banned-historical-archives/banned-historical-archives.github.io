tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平同志为韶山毛泽东同志故居和纪念馆题写横匾和馆牌","authors":["杨善清"],"parts":[{"type":"paragraph","text":"去年12月，中共中央批准中共湖南省委的报告，同意将韶山“毛泽东同志旧居”改为“毛泽东同志故居”；将“毛泽东同志旧居陈列馆”改为“韶山毛泽东同志纪念馆”，陈列毛泽东同志传略性生平事迹。"},{"type":"paragraph","text":"为了以实际行动纪念毛泽东同志诞辰九十周年，完整地、准确地宣传毛泽东思想，历史地、科学地陈列毛泽东同志的生平事迹，纪念馆的同志在上级党和政府的领导下，进一步调整和修改了陈列内容。目前，从毛泽东同志诞生到1927年这一段事迹陈列内容的调整修改工作已经完成。陈列内容坚持了历史唯物主义观点，充分肯定了毛泽东建党的伟大功绩和党的创始人的历史地位；出了重点和特点，充实了毛泽东早期活动的史料；较好地处理了领袖、政党、阶级和众的关系，在突出宣传毛泽东的同时，也历史地宣传其他领袖和群众。"},{"type":"paragraph","text":"关于毛泽东同志在整个民主革命时期和社会主义时期的事迹陈列内容，将在下一步进行调整修改。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d219d3a52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
