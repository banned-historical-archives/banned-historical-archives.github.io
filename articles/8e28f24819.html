art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让干部到群众中去斗私批修本溪驻军在协助地方举办毛泽东思想学习班时，认真贯彻毛主席倡导的革命好学风","authors":[],"parts":[{"type":"paragraph","text":"本报讯 驻辽宁本溪市某部在协助当地无产阶级革命派举办的毛泽东思想学习班中，认真贯彻毛主席一贯倡导的革命好学风，把学习班搬到群众中去办。他们组织参加学习的干部抽出一定时间，回原单位向群众汇报学习情况，跟班参加劳动，在“火线”上斗私批修，促进了干部的思想革命化，使干部能够正确地认识群众，进一步增强了群众观点。"},{"type":"paragraph","text":"在学习班没有搬到“火线”以前，有些干部不能正确对待群众。他们到群众中以后，主动征求意见，自觉亮思想、做检查，和群众一起劳动，一起谈心。群众见领导干部这样诚心实意，感到很满意。有的人说：“你们只要听毛主席的话，多到群众里来走一走，看一看，我们就高兴。”群众对干部充满了阶级感情，劳动中有的同志看干部满身是汗，怕他着凉，热情地把自己的棉衣给干部披上，这使干部受到很大教育，他们说：“事实证明，我们以前对群众的认识是错误的，群众是最听毛主席的话的，是最通情达理的，是能够正确对待干部的。”"},{"type":"paragraph","text":"有些干部不能正确对待自己的缺点错误，有怨气。这次和群众一起斗私批修，他们发现广大群众对自己头脑里的“私”字，敢亮，敢斗，坚决改，使干部深深感到自我革命的自觉性远远不如群众高。在和群众谈心中，听到大家愤怒地控诉资产阶级反动路线的罪行，使干部们认识到自己离开了毛主席的革命路线，应该尽快地改正错误，回到毛主席的革命路线上来。活生生的事实，使大家受到深刻的教育。"},{"type":"paragraph","text":"过去由于上下疏远，干群之间有一定隔阂。通过这次和群众一起学习，一起劳动，交流了思想，密切了干群关系。干部把群众当成自己的亲兄弟，群众把干部看作是自己的知心人，彼此政治上互相关心，思想上互相帮助，生活上互相照顾。大家在谈收获时一致反映：到群众中去经风雨，见世面，是斗私批修改造世界观的好方法，是密切干群关系的好措施，是革命的好学风。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e28f24819"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
