" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于山东分局在山东开展新三反斗争的情况的通报","authors":[],"dates":[{"year":1953,"month":3,"day":20}],"is_range_date":false,"parts":[{"text":"中共中央关于山东分局在山东开展新三反斗争的情况的通报","type":"title"},{"text":"山东分局、华东局、各中央局、分局转各省市区党委和地委：","type":"appellation"},{"text":"（一）山东分局三月十四日关于开展反对官僚主义、命令主义、违法乱纪斗争的综合报告很好，其中所提各点经验都是正确的。","type":"paragraph"},{"text":"（二）山东在开展新三反斗争中，采取“抓紧两头、带动中间”的办法，收效很大。这就是：一面由领导机关和负责干部自上而下地层层带动，检讨官僚主义作风；一面抓紧处理最突出的典型坏人坏事，并在这两方面的推动和影响下，教育、启发一般沾染了命令主义作风的干部进行检讨，改正错误。其结果，既迅速改善和密切了党与群众的关系，又切实保护和教育了大多数仅在作风上有毛病而本质上尚好的基层干部。这点经验，特别值得各地加以研究和效法。","type":"paragraph"},{"text":"（三）同意山东分局三月十四日的综合报告作为一、二月份的综合报告，并将该报告以代电印发各地参考。各地党刊可予登载。","type":"paragraph"},{"text":" 中  央一九五三年三月二十日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0114282a9d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
