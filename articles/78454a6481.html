tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想照亮全国铁路运输中枢北京铁路局革命轰轰烈烈，生产热火朝天","authors":[],"parts":[{"type":"paragraph","text":"据新华社三十日讯 北京铁路局系统的无产阶级革命派和革命职工，认真执行毛主席的最新指示，步步紧跟毛主席的伟大战略部署，狠抓革命，猛促生产，革命、生产形势大好，而且越来越好。"},{"type":"paragraph","text":"位居全国铁路运输中枢的北京铁路局，担负着河北、山西和北京两省一市的铁路运输任务。毛主席的“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织”的最新指示下达以后，这个局所属的北京、天津、石家庄、张家口等地区的两派革命群众组织，立即闻风而动，在毛泽东思想的原则基础上，以“只争朝夕”的精神联合起来。现在，北京铁路局所属的一百五十多个主要站、段，已经全部按系统、按行政部门实现了革命的大联合。广大铁路工人革命搞得轰轰烈烈，生产搞得热火朝天。全局列车运行秩序正常，煤炭运输生产指标逐月上升。十一月份平均每天装运煤炭车数，比十月份增长了百分之二十二；十二月上、中旬又比十一月平均增长了百分之十一。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78454a6481"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
