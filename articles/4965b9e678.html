uthors":[],"dates":[{"year":1958,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"陈叔通谈他对党的要求和对一些民主人士的看法","type":"title"},{"text":"新华社上海8日讯　陈叔通最近在上海和罗叔章（民建常委）交谈时，谈到他对党的一些要求以及对某些民主人士的看法。","type":"paragraph"},{"text":"他说，我这一辈子已不妄想做共产党员。我女儿陈惠两年前提出入党要求，今年交心时才把这件事告诉我。我对她说，你胆子太大了，我就是不敢提。但我要求靠拢党，希望共产党对我作更多的帮助。我在工作上接近党员的机会并不多。共产党对我总是客客气气。黄玠然，我对他什么话都讲，要求他帮助，他对我是客气。许涤新，我对他比对黄玠然还愿意交谈，他比黄玠然好一些，但还是客气。我感到不够，希望党指出我的缺点和错误，但对我批评的党员可以说没有。","type":"paragraph"},{"text":"谈到民主党派时，陈叔通说：这些负责人中能够帮助共产党提些政治上的建议性意见的，简直没有多少。李济深？黄炎培？张治中？我接触民盟、民建两个单位的人比较多，以前马叙伦还比较好一些。","type":"paragraph"},{"text":"陈叔通专门谈到了李烛尘。他说，李烛尘背了进步包袱，总以进步分子自居，好像自己什么问题都没有。他和侯德榜共事多年，两人关系不好。这次提人民代表候选人名单，他看到共产党名单中有侯德榜，知道别人已入了党。李烛尘当时脸色很难看。这件事出乎他意料之外。","type":"paragraph"},{"text":"（徐寿铿编）","type":"subtitle"}],"comments":[],"origin":"1958年8月16日_第2558期《内部参考》新华通讯社编。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4965b9e678"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
