art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓副总理、邓副委员长会见即将离任的日本驻华大使"},{"type":"paragraph","text":"邓小平副总理和夫人卓琳、邓颖超副委员长，五月二十四日上午会见了即将离任的日本驻中国大使佐藤正二和夫人。"},{"type":"paragraph","text":"会见时，邓小平副总理和邓颖超副委员长赞扬佐藤大使为发展中日两国友好合作关系所作出的努力和贡献，并希望他离任后经常来中国看看。佐藤大使说：我要感谢中国领导人和中国政府在我任职期间所给予的帮助和合作。"},{"type":"paragraph","text":"巴巴·迪亚拉副主席举行答谢宴会"},{"type":"paragraph","text":"马里全国解放军事委员会副主席阿马杜·巴巴·迪亚拉和他夫人于五月二十四日晚在北京举行答谢宴会。徐向前、陈慕华副总理等应邀出席了宴会。巴巴·迪亚拉副主席和徐向前副总理在祝酒时对马里友好访问团对我国访问取得的积极成果表示满意。"},{"type":"paragraph","text":"索马里军事友好代表团到京"},{"type":"paragraph","text":"索马里第一副总统兼国防部长穆罕默德·阿里·萨马特尔中将和夫人以及由萨马特尔副总统率领的索马里军事友好代表团，应邀前来我国进行友好访问，五月二十四日下午乘飞机到达北京。国务院副总理、军委负责人王震等到机场欢迎。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c76db76602"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
