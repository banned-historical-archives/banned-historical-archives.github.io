"authors":[],"dates":[{"year":1958,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布拉格18日电】　捷克斯洛伐克共产党第十一次代表大会今天上午9时在布拉格著名的伏契克公园国会大厦隆重开幕。这次代表大会是在捷共第十次代表大会召开4年之后、在“完成社会主义建设”的雄壮口号下举行的。"},{"type":"paragraph","text":"1000多名代表和56个兄弟党的代表团和代表参加了今天的开幕式。当以诺沃提尼同志为首的捷共领导人以及基里钦科、董必武等兄弟共产党和工人党代表团团长和团员走向主席台时，爆发了长时间的热烈鼓掌和“和平万岁!”、“捷克斯洛伐克共产党万岁!”、“苏联万岁!”的欢呼声。这充分显示了代表们对党的领导人的衷心爱戴，也显示出社会主义阵营各国和国际工人运动的坚强团结。"},{"type":"paragraph","text":"捷共中央政治局委员西罗基同志致开幕词。他综述了捷共和捷克斯洛伐克人民所走过的光荣道路，分析了当前的形势。"},{"type":"paragraph","text":"西罗基宣布欢迎各国共产党和工人党代表参加大会时，会场气氛达到了高潮。苏联、中国、法国、阿尔及利亚、印度尼西亚等代表团的名字得到最为热烈的掌声。在欢迎苏共代表团时，诺沃提尼和基里钦科两只高举的手紧紧地握在一起。"},{"type":"paragraph","text":"西罗基同志在他的开幕词中称中国共产党第八届代表大会第二次会议和最近举行的保加利亚共产党代表大会是忠于马克思列宁主义和忠于无产阶级国际主义思想的证明。他说，另一方面，南斯拉夫共产主义者联盟代表大会公开反对去年11月的莫斯科宣言，并且通过了绝对违背马克思列宁主义的纲领。西罗基追述了共产党和工人党为消除1949和以后几年的错误和为帮助南斯拉夫共产主义者联盟采取马克思主义立场而作的巨大努力，他说，但是，南斯拉夫共产主义者联盟的领导人一直在继续布在他们的修正主义观点。"},{"type":"paragraph","text":"他说，由于南斯拉夫共产主义者联盟的领导现在向整个国际共产主义运动的共同利益发动进攻，我们和其他所有共产党和工人党认为我们有权利和责任揭露南斯拉夫共产主义者联盟这样一个背叛马克思列宁主义的纲领。他又说，对马克思列宁主义学说和社会主义阵营的团结进行的一切修正主义的攻击都是注定要失败的，国际工人阶级运动将进一步加强它的思想 上和政治上的团结。"},{"type":"paragraph","text":"随后，大会一致通过了大会义程，选举出大会主席团和各种委员会。接着，诺沃提尼在热烈掌声中开始向大会作捷共中央委员会工作和目前主要任务的报告。"},{"type":"paragraph","text":"上午会议在诺沃提尼作了报告后结束，下午代表们就这个报告进行讨论。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f54f30085"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
