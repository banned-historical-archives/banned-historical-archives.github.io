"year":1952,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:长宁区小型五金工厂的工人中有文盲近一千人，五金工会针对这个情况，在长宁区组织了地区的分散学习班，动员有文化水平的工友担任教师，借用小厂里的饭间、会议室或宿舍做课堂，现已先后成立了二十四个学习组，有六百二十多位男女工友参加了学习。在五月底，开了两天全区的学生代表会议，总结了这一阶段的教学工作，学生和教师的代表提出了很多的意见，也互相保证要在下一阶段把教学工作搞得更有成绩。大家在会上一致通过写信给毛主席，向毛主席提出具体的保证，争取在明年年底以前，要做到:一、每个同学都能识到两千个单字；二、能写普通的书信和便条；三、能看劳动报和‘工人’半月刊。"},{"type":"paragraph","text":"上海五金工会长宁区分散学习委员会"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a642a5690"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
