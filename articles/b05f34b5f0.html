ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"齐击第八军并相机攻取潍县","alias":"","parts":[{"type":"paragraph","text":"歼击第八军并相机攻取潍县！"},{"type":"paragraph","text":"（1947年7月5日）陈、粟、谭："},{"type":"paragraph","text":"为吸引正面之敌向东，不使后撤太快，便于我西进两兵团取得胜利？，同时保护后方，请考虑以足够兵力歼击由潍县?向临朐前进之八军，并相机攻取潍县，而将南进计划推迟一步执行。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"微午"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军司令员兼政治委员陈毅、副司令员栗裕和副政治委员谭震林的电报。"},{"type":"paragraph","text":"[2]1947年6月30日，华东野战军为执行6月29日中共中央军委提出的三路分兵的指示，决定由叶飞、陶勇率领第一、第四纵队西进鲁南；由陈士、唐亮率领第三、第八、第十纵队西进鲁西；野战军指挥部率第二、第六、第七、第九纵队和特种兵纵队在正面抗击国民党军。"},{"type":"paragraph","text":"[3]潍县，旧县名，1983年撤销，并入山东潍坊市。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":7,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":122,"page_end":122},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b05f34b5f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
