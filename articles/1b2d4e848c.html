<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宋教仁(一八八二年——一九一三年)，资产阶级民主革命派。辛亥革命后，他醉心于　“议会道路”，鼓吹“实业救国”，使革命党人松懈了斗志，放弃了革命。结果被卖国贼袁世凯派人枪杀。宋教仁——中圈套　“实业”梦幻灭","authors":[],"dates":[{"year":1976,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一天清晨，宋教仁正在书桌上挥笔疾书。他已经整整一宵没有睡觉了，望着快要完稿的《代草国民党大政见》一书，疲惫的脸上露出了欣慰的笑意。他轻轻地拿起桌上的《代草国民党大政见》，心里暗暗想道:“民国政府建成，革命已经大功告成，现在除了努力搞责任内阁制的政治建设外，再去从事其它什么革命活动，那就大可不必了。当务之急是如何富国强民。”想到这里，他不禁抚掌大笑，自言自语道:“对，富国强民，唯有兴办实业!”想罢，他匆匆地把“目前最亟之举”——“开发产业”一项，写进了《代草国民党大政见》书中。在这项下面，他列举了“振兴矿业”、“放垦荒地”、“奖励仿造工业”、“奖励输出商业”等作为急务。写到这里，他眼前仿佛出现了一幅“民富国强”的图景。"},{"type":"paragraph","text":"几天以后，宋教仁到处发表演说。他眉飞色舞，不停地挥着手，慷慨激昂地说:“诸位须知，欲国强必先致富，目前最重要的，莫若开发产业，兴办国有山林，振兴我们的矿业。我们中国有最佳最大的山林，有十分之八、九的矿产尚未开掘，我们只要专心致志于兴办实业，东亚病夫一定会变成东方雄狮。”宋教仁越说越兴奋，简直有点得意忘形了。"},{"type":"paragraph","text":"宋教仁鼓吹“实业救国”的消息传到卖国贼袁世凯耳中，袁世凯得意地笑了。原来，他一上台，也大叫“民国成立，宜以实业为先务”，想用娓娓动听的“实业救国”论，迷惑革命党人，使革命党人松懈斗志。宋教仁的活动正中他的下怀。为了表示“诚意”，袁世凯装模作样地把孙中山、黄兴请到北京，和他们恳谈发展“实业”问题。袁世凯特授孙中山“筹画全国铁路全权”，让孙中山去专心致志“于十年内筑铁路二十万里”，让黄兴担任全国矿务督办，去“专注矿业”。这样，革命党人就上了袁世凯的圈套，一头沉溺到“专力实业”的迷海中去，再也看不到前进的方向。而袁世凯在帝国主义的支持下，口头上叫喊“实业救国”，暗地里却磨刀霍霍。"},{"type":"paragraph","text":"宋教仁听说袁世凯支持革命党人搞“实业救国”，不禁洋洋自得。在一九一二年冬举行的国会选举中，国民党又取得了压倒的多数，宋教仁越想越得意:不久我将出任国务总理，组织责任内阁，那时我振兴实业的蓝图将变为现实，一个富强、自由、平等的“新”中国就将出现。"},{"type":"paragraph","text":"当宋教仁还在做着他未来迷梦的时候，袁世凯却再也忍耐不住了，他决心对辛亥革命进行反攻倒算，向革命党人举起血淋淋的屠刀。一九一三年三月二十日的深夜，宋教仁在上海车站和前来欢送的人群一一告别，兴冲冲地准备前往北京参加国会。突然，一声枪响，宋教仁立即应声而倒。枪声，堵死了宋教仁的“议会道路”；枪声，粉碎了宋教仁“实业救国”的黄粱美梦。"},{"type":"paragraph","text":"辛亥革命后，宋教仁等革命党人被一时的胜利所陶醉，结果，让袁世凯赢得了时间，向革命党人猛扑过来，把中国推向了更加深重的灾难之中。"},{"type":"paragraph","text":"(本版文章均为复旦大学历史系中国近代史组供稿)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"九·一三事件","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b2d4e848c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
