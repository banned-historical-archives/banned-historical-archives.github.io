ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对李克农病况报告的批语","alias":"","parts":[{"type":"paragraph","text":"对李克农病况报告的批语！"},{"type":"paragraph","text":"（1953年3月4日）尚昆同志："},{"type":"paragraph","text":"克农这样对自己病状的处理是很危险的，请你劝他遵医嘱休养，并决不可那样服药法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日"},{"type":"paragraph","text":"[1]这个批语写在中央人民政府卫生部副部长傅连障1953年2月21日关于外交部副部长李克农的病况给周恩来的报告上。报告说，李克农自1943年起，即有发作性心前区疼痛症状，每年发作一二次。去年则加重了，每月发作五六次。今年返京后，每天都发作，昨晚并曾晕倒，昏迷了五六分钟才清醒。今早苏联大夫和黄树则同志会诊，诊断为“冠状动脉硬化”及“过度疲劳”，建议到医院检查治疗，李克农尚未同意。安眠药平常服量为0.2毫克，他竟服过0，8毫克，我已再三劝他不能这样用，如此用下去有中毒的危险。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":37,"page_end":37},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e758e80b44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
