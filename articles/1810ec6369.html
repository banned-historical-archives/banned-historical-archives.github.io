ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"给谢觉故的信","alias":"","parts":[{"type":"paragraph","text":"给谢觉哉的信"},{"type":"paragraph","text":"（1941年8月9日）谢老："},{"type":"paragraph","text":"八日信及安塞报告均收，已看一遍，尚待详看。准备开的总结会议是积极的，非单为辩论个别问题，请准备一积极建议，包括全部财经问题，分列若干条，今年如何办，明年如何办，均列入之，拟好时请交我，以便先加研究，交换意见，然后讨论。林老前有三年计划，亟欲一阅，林老昨示谓待增修重拟，不知在十天左右能脱否？大家希望能统一意志与统一行动，我意须确定一行动纲领，香则无法统一。而此行动纲领，非根据一方案交换意见，过细研，无法讨论与确定。我是毫无研究的人，为欲开此会，故愿加以解，你的各信我都过细地读了。在不妨碍你健康条件之下，如能条文式的方案，或即就林老三年计划，根据新近经验与研究加增饰，那是最好的。我此刻尚未睡，上午如能睡好，下午或派车接你来谈，那时再定。即致"},{"type":"paragraph","text":"毛泽东八月九日早过此两件否？"},{"type":"paragraph","text":"[1]富春，即李富春，当时任中共中央组织部副部长。正人，即陈正"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":8,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":193,"page_end":194},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1810ec6369"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
