宾红十字会","authors":[],"dates":[{"year":1976,"month":8,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"深切同情和慰问菲律宾地震灾区人民"},{"type":"paragraph","text":"华国锋总理致电马科斯总统"},{"type":"paragraph","text":"我国红十字会致电菲律宾红十字会"},{"type":"paragraph","text":"新华社一九七六年八月二十一日讯　华国锋总理八月二十日打电报给菲律宾共和国总统马科斯，就菲律宾南部地区发生地震，表示深切的同情和慰问。电报全文如下：马尼拉菲律宾共和国费迪南德·埃·马科"},{"type":"paragraph","text":"斯总统阁下："},{"type":"paragraph","text":"惊悉菲律宾南部地区由于强烈地震，人民生命财产蒙受损失，我代表中国政府和中国人民向你，并通过你向菲律宾政府和灾区人民，表示深切的同情和慰问。"},{"type":"paragraph","text":"中华人民共和国"},{"type":"paragraph","text":"国务院总理"},{"type":"paragraph","text":"华国锋"},{"type":"paragraph","text":"一九七六年"},{"type":"paragraph","text":"八月二十日"},{"type":"paragraph","text":"新华社一九七六年八月二十一日讯　中国红十字会八月二十日打电报给菲律宾红十字会，对菲律宾南部地区发生地震地区的人民表示深切同情和慰问。电报全文如下：马尼拉菲律宾红十字会："},{"type":"paragraph","text":"中国人民和中国红十字会，对菲律宾南部地区因强烈地震所造成的生命和财产损失，十分关切。请贵会转达中国人民和中国红十字会对灾区人民的深切同情和慰问。我会并决定捐赠价值人民币二十万元的物资，以帮助灾区人民克服暂时困难。"},{"type":"paragraph","text":"中国红十字会"},{"type":"paragraph","text":"一九七六年八月二十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a520414a0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
