script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"委内瑞拉领导人指责某些国家无理阻止石油提价  任何威胁阻挡不了石油输出国的斗争  墨西哥报纸谴责跨国公司对第三世界国家进行渗透和剥削","authors":[],"dates":[{"year":1976,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"委内瑞拉领导人指责某些国家无理阻止石油提价"},{"type":"paragraph","text":"任何威胁阻挡不了石油输出国的斗争"},{"type":"paragraph","text":"墨西哥报纸谴责跨国公司对第三世界国家进行渗透和剥削"},{"type":"paragraph","text":"新华社加拉加斯电　委内瑞拉总统卡洛斯·安德烈斯·佩雷斯最近接连发表谈话，指责某些国家为阻止石油输出国组织提高石油价格而施加压力。"},{"type":"paragraph","text":"委内瑞拉总统说，石油输出国组织并不想任意操纵石油价格，只是使石油价格成为一种谈判的工具，以便使工业化国家向我们发展中国家购买原料和其它基本产品的价格，同我们为购买生产资料和技术所支付的价格取得平衡。"},{"type":"paragraph","text":"他说，石油输出国的斗争的“实质是，第三世界坚定不移地决心争取建立一种国际经济新秩序”。"},{"type":"paragraph","text":"佩雷斯总统还说，“不能容忍世界继续存在这样一种不公正的国际情况，即大部分国家和大部分人民不得不以无法忍受的牺牲，来为少数发达国家的幸福和特权付出代价。”"},{"type":"paragraph","text":"另据报道，委内瑞拉新任驻美国大使伊格纳西奥·伊里瓦伦·博尔赫斯十一月三十日向美国总统福特递交国书时也说，单方面和人为地要求石油输出国冻结石油价格，是不公正的。"},{"type":"paragraph","text":"福特总统在接受国书时曾经表示，石油输出国有义务参与“促进健全世界经济，特别是促进遏制世界通货膨胀”。"},{"type":"paragraph","text":"伊里瓦伦大使回答说：“当特别是工业化国家毫无限制地增加能源的消费的时候，却要求生产石油的国家单方面和人为地限制为保持其购买力而必然要订出的能对通货膨胀有所反映的价格，这是不公正的。”"},{"type":"paragraph","text":"新华社墨西哥城一九七六年十二月八日电墨西哥《至上报》十二月八日发表文章，严厉谴责跨国公司对第三世界国家进行渗透和剥削的罪恶活动。"},{"type":"paragraph","text":"文章以国际电话电报公司、联合果品公司、海湾石油公司和其它一些跨国公司的行径为例强调指出，这些都是“跨国公司习以为常的行为，以满足其主要向包括第三世界人民在内的世界各国人民攫取最大限度利润的不可遏止的欲望和贪婪的野心。”"},{"type":"paragraph","text":"文章回顾了第三世界国家在联合国和其它国际机构中同跨国公司的阴谋进行斗争的过程和取得的成就，并且强调指出，参加保卫发展中国家的权利的斗争的人越来越多，这一点具有重大的政治意义。文章说，各国就反对跨国公司的剥削和渗透的具体行动达成了协议，文章特别提到一九七四年联合国通过的各国经济权利和义务宪章中有关限制跨国公司活动的条款。"},{"type":"paragraph","text":"文章赞扬了第三世界国家在国际机构中所起的日益重要的作用。文章说：“在联合国范围内，第三世界最广泛的运动——不结盟运动内的国家和政府之间在历史目标方面的接近和一致是很突出的并将进一步深化。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c888d9008"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
