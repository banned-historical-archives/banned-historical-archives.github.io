离平壤时，崔庸健、吴振字、朴成哲等前往机场欢送","authors":[],"dates":[{"year":1974,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年四月八日电　以柬埔寨民族统一阵线中央政治局委员、王国民族团结政府副首相兼国防大臣、民族解放人民武装力量总司令乔森潘为团长，副首相府特别顾问英·萨利为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，结束了对朝鲜民主主义人民共和国的友好访问，今天下午乘专机从平壤到达北京。"},{"type":"paragraph","text":"叶剑英、吴德、耿飚、李强、张才千、韩念龙、申健、康矛召等，前往机场迎接。"},{"type":"paragraph","text":"到机场迎接的还有柬埔寨王国民族团结政府首相宾努亲王和夫人，王国民族团结政府官员沙林察、江裕朗、秀木、杨森安将军、谢桑、吉春、秀蒲拉西、万比尼，柬埔寨驻中国大使笃坎敦。朝鲜驻中国大使玄峻极和夫人，以及大使馆外交官员，也到机场迎接。"},{"type":"paragraph","text":"据新华社平壤一九七四年四月八日电　以乔森潘副首相为团长、英·萨利特别顾问为副团长的柬埔寨民族统一阵线和柬埔寨王国民族团结政府代表团，圆满结束对朝鲜民主主义人民共和国的友好访问，四月八日乘专机离开平壤。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国副主席崔庸健和其他党政负责人吴振宇、朴成哲、许锬、金永南等前往机场欢送。机场上举行了隆重的欢送仪式。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"324ef225f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
