tart":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席关于三个世界划分的科学诊断无比正确坂本德松呼吁第三世界人民团结起来推进反霸斗争","authors":[],"parts":[{"type":"paragraph","text":"据新华社东京电 亚非人民团结日本委员会理事长坂本德松十二月十六日在大坂矢田工人学校举办的学习会上发表讲演时指出，“毛主席关于三个世界的理论是科学观察当前世界形势的指针”。他呼吁日本工人阶级和日本人民同中国人民和其它第三世界人民团结起来，推进反对苏美两个超级大国霸权主义的斗争。"},{"type":"paragraph","text":"在有五百多名工人出席的学习会上，坂本德松强调说，毛主席根据战后以来国际力量的发展和变化，把今天的世界划分为三个世界，这一科学论断是无比正确的。"},{"type":"paragraph","text":"他说，苏美两霸的相互争夺是世界不得安宁的根源，尤其是已经完全堕落成为社会帝国主义的苏联是最危险的战争策源地。自从去年赫尔辛基“欧安会”以来，苏联嘴里起劲宣传“缓和”，实际上却在加紧扩军备战。最近几年，苏联在东欧、苏联西部和中部配置的导弹、坦克和飞机急剧增加。苏联的海军活动遍及世界各个重要海域。但是苏联的霸权主义面目日益暴露，正到处碰壁，日子很不好过。"},{"type":"paragraph","text":"坂本说，推进今天世界发展的动力是第三世界。不管苏美两霸，特别是不管苏联怎样破坏阻挠，国家要独立，民族要解放，人民要革命的历史潮流是不可阻挡的。"}],"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b5a1daa0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
