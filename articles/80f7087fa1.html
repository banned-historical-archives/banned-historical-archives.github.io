script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"兴县地主伪装“左倾”群众识破跟踪追查","authors":[],"dates":[{"year":1947,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"兴县地主伪装“左倾”群众识破跟踪追查"},{"type":"paragraph","text":"【新华社晋绥九日电】兴县等地农民，坚决追踪化形地主，彻底查挤封建。在土地改革的大风暴中，晋绥地主阶级目前动向的特点之一，是由初期的“开明”、“献地”，转而改头换面极力钻挖“风雨窑。”兴县碾子村地主张文华，去年要求退伍回了家，最近却以进步面目，请求归队，口口声声说：“不消灭蒋介石不回家。”地主王增祥混进民办小学当教员，不准学生看报，并时常毒打贫苦学生。五寨县东秀庄地主段二，假装左倾，企图用铁叉打死清算对象，博取群众的的信任。神池壶狗儿村地主赵贵基，在群众向他倒算时，伪装投井自杀，全家大小都披麻带孝，备棺设灵，村干部和群众将棺盖揭开一看，里面装的却是一堆沉重的顽石。交城河西庄三大霸王地主张士清的儿子海全，见人就哭穷装酸：“家里弄干了，爷爷们可怜可怜吧！”部分好心群众就误认他是个“大囊子”（没出息之意）。在深入清算中，从张海全家里发现了一大宗财物，并找出一本“底把帐”，帐上日月分明，一笔一笔，开列着减租多少，被清算了多少，谁家分了他什么东西，还捏造了一批假帐，准备将有机会倒算时可任意讹诈，“大囊子”原来是个“毒囊子”。各地揭露化形地主的各种阴谋后，群众的阶级警惕现已更形提高，继续深入追查中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80f7087fa1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
