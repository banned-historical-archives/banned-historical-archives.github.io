ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"给杨尚昆的信","alias":"","parts":[{"type":"paragraph","text":"给杨尚昆\"的信"},{"type":"paragraph","text":"（1953年10月22日）尚昆同志："},{"type":"paragraph","text":"请将联共党史六条结束语印成单张，于今晚或明天发给到组织会议?的各同志，请他们利用停会的两三天时间，加以阅读、研究，可能时还加以讨论，使他们在刘少奇同志及别的同志在大会上讲话讲到这个问题时，已经有所了解。此事（印发结束语）在今日下午领导小组开会时，请告诉刘、饶及胡乔木同志一声。同时可多印一点（可印一二千份），发给北京的干部，并由总党委通知各部门、各党组要他们阅读和讨论。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月廿二日二时[1]杨尚昆，当时任中共中央办公厅主任。[2]指中共中央于1953年9月至10月召开的第二次全国组织工作会议。[3]刘，指刘少奇。饶，指饶漱石，当时任中共中央组织部部长。[4]胡乔木，当时任中共中央宣传部副部长、毛泽东的秘书。[5]总党委，指中央一级直属机关总党委。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":408,"page_end":408},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7af3cc27d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
