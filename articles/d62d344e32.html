ors":[],"dates":[{"year":1967,"month":4,"day":30}],"is_range_date":false,"parts":[{"text":"中央文革小组关于《广西日报》事件的电报","type":"title"},{"text":"广西军区并请转抄印给驻《广西日报》和在报社前静坐的“八·三一广西红卫兵”总部、北京驻邕的革命同志们：","type":"paragraph"},{"text":"（1）进驻报社的同学们，你们立即退出报社，在报社门前静坐的同学们，你们立即退出报社，保证报纸正常出版，否则对当前批判党内最大的走资本主义道路的当权派不利。","type":"paragraph"},{"text":"（2）要维护军管小组、革命组织，要支持军队对报社军管工作，军管小组成员要做必要的调整。组织版面小组吸收革命组织代表参加，协助军管搞好报纸。","type":"paragraph"},{"text":"（3）有意见可以和军管小组商量解决，不要采取静坐，强拉军管小组辩论的方法，应保持军管小组正常工作。","type":"paragraph"},{"text":"（4）对某篇文章有意见，可以进行批判，也可以在报上讨论。","type":"paragraph"},{"text":" 中央文革一九六七年四月三十日","type":"paragraph"}],"comments":[],"origin":"原载北京化工学院毛泽东思想宣传员 《无产阶级文化大革命文件汇编 [第二集]》，北京：1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d62d344e32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
