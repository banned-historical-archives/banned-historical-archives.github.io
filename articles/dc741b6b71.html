ar":1974,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在批林批孔运动深入发展的大好形势下，河北省农村广大干部、社员战胜严重干旱，夺得了今年小麦丰收。"},{"type":"paragraph","text":"今年，河北省小麦丰收的特点是:收获面积和增产幅度比历史上任何一年都大。全省小麦种植面积比去年扩大五百多万亩，总收获面积达到四千三百多万亩。全省夏粮总产量超过历史上最高的一九七二年，比去年增长两成多，比无产阶级文化大革命前的一九六五年翻了一番。全省十个地区，区区增产。"},{"type":"paragraph","text":"河北省小麦主要产区的石家庄地区，今年四百八十二万亩小麦，单位面积产量和总产量都比去年增长一成多。其中，正定县、栾城县和石家庄市在去年平均亩产上《纲要》的基础上，今年超过了五百斤。保定地区的安国县和石家庄地区的晋县、获鹿县，小麦亩产量都上了《纲要》。原来产量较低的衡水地区，今年小麦大幅度增产，全区四百六十多万亩小麦，总产量比去年增长七成，亩产量比去年增长四成。各地还出现许多小麦一季亩产过“长江”、超千斤的生产大队和生产队。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc741b6b71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
