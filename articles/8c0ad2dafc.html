script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji46","name":"毛泽东全集第46卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对七评苏共中央的公开信稿的修改","alias":"","parts":[{"type":"paragraph","text":"对七评苏共中央的公开信稿的修改！"},{"type":"paragraph","text":"（1964年1月28日）"},{"type":"paragraph","text":"苏共领导的修正主义和分裂主义，是国内资产阶级因素泛滥和增长起来的产物，也是帝国主义政策的产物，特别是美帝国主义的核讹诈政策和“和平演变”政策的产物。"},{"type":"paragraph","text":"二马克思列宁主义是科学，科学是不怕论战的，怕论战的不是科学。"},{"type":"paragraph","text":"[1]本篇一中用宋体字排印的是毛泽东1964年1月28日审阅七评苏共中央公开信（1月28日稿）时加写的。本篇二加写在七评苏共中央的公开信（1月28日稿）以下一段话之前：“当前国际共产主义运动的大论战，正在促使世界各国的共产党人、各国的革命者和各国革命人民动脑筋，想问题，促使他们根据马克思列宁主义的基本原理，认真地思索本国革命问题和世界革命问题。经过这场大论战，人们终将能够明辨是非，区别真马克思列宁主义和假马克思列宁主义。马克思列宁主义必将得到进一步的丰富和发展，而达到一个新的高峰。”七评苏共中央的公开信以《苏共领导是当代最大的分裂主义者》为题，在1964年2月4日《人民日报》和《红旗》杂志1964年第二、第三期合刊上发表。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":222,"page_end":222},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c0ad2dafc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
