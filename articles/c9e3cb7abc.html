hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"聂荣臻在北京航空学院的报告","alias":"","parts":[{"type":"paragraph","text":"心，出身不好的，很革命的可以吸收，共产党内还吸收出身不好的呐！"},{"type":"paragraph","text":"对那些出身不好的千万不要看作是铁板一块，主席那条教导，我在政府工作报告中的：“人类的历史就是一个不断的从必然王国向自由王国发展的历史···…··，人类总是不断发展的，自然界也总是不断发展的，永远不会停在一个水平上…·。”出身不好的也是发展的，那个报告写好后给主席看，主席在报告中的一段批语，我们感到是一条重要的指示，所以做为主席的教导发表了。你门一定要通过各种矛盾的斗争，才能有所创造，有所作为，有所前进，这就是证地看问题（对于出身好的，出身不好的）。"},{"type":"paragraph","text":"革命熔嘘火最红、毛泽东时代出英雄，王杰同志好榜样，一颗红心为人民。你们会唱这个歌子瞩？"},{"type":"paragraph","text":"出身不好的，你们不要把他在火外边，老烤着他们不行，也可以把他们吸收进来，在里面把他们熔化，把他们搁在嘘火外面怎么能熔化他们呢？"},{"type":"paragraph","text":"西北工业大学“东风”革命造反队翼西安交通大学电机工程系"},{"type":"paragraph","text":"西工.大211信箱翻印5/9"},{"type":"paragraph","text":"华荣臻同志"},{"type":"paragraph","text":"八月十九日在北航的报告北京航空学院文化革命委具会同志鹤广大革命师生具工同志们："},{"type":"paragraph","text":"最近接到一些同志和教师的来信。要求我到学院来。我十分感谢大家的这种希望和要求，最近我因身体有病不能直接到学院来向革命师生具工们学习，深感遗，我坚决支持你们把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"从来信中大家反映有些意见和分歧，特别是对工作粗的看法。工作租在学院的文化大革命中，有不少缺点和错。特别是组织反干扰的大，是个方向的路的错。大家对他们的批舒是完全应该的。工作租有任、有义务虚心听取大家的批，接受大家的教育。他们作「检封，大家有不同意见，仍然可以提出，我希望这些问题不要影响革命师生具工的团秸，不要成为你们前进的障碍。在伟大的毛泽东思想哺育下的广大革命师生员工是有觉悟，有晚力、有智慧的。在伟大的毛泽东思想的光辉照耀下，坚决按十六条的伟大网文件办事。通过摆事实、罐道理，具体分析，韶真总秸经验教训，我坚信问题一定会得到迅速解决的。我希望广大革命师生真工同志们团精起来，团秸就是力量，把无产阶级文化大革命的熊熊烈火迅速转到一斗二批三改上去，沿着我们敬爱的袖毛主席所指引的方向，奋勇前进，敢勇战斗。"},{"type":"paragraph","text":"无产阶级文化大革命万岁！伟大的、光荣的、正确的中国共产党万岁！战无不胜的毛泽东思想方岁！我们最敬爱的领袖毛主席方岁！"},{"type":"paragraph","text":"毛泽东思想红卫兵首都兵团宣传办公室翻印·94"}],"authors":["聂荣臻"],"dates":[{"year":1966,"month":8,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":104,"page_end":104},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9e3cb7abc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
