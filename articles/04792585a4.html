tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”的流毒影响不能低估","authors":["颜速"],"parts":[{"type":"paragraph","text":"能不能紧紧抓住揭批“四人帮”这个纲，同我们对这场斗争的意义有没有深刻认识有关，也同我们对“四人帮”的流毒影响及其危害是不是充分估计有关。"},{"type":"paragraph","text":"对“四人帮”的流毒影响应该怎么估计呢？"},{"type":"paragraph","text":"我们来看石油化工部。石化部的一位党组副书记在分析石化部的情况时说："},{"type":"paragraph","text":"“我们在同‘四人帮’的斗争中，是胜利者，但是也受了伤。有的是外伤，有的是内伤。‘四人帮’长期控制舆论工具，肆意歪曲马列主义、毛泽东思想，篡改毛主席的伟大指示，散布了大量的反革命谬论，流毒和影响象细菌一样，无孔不入，很深很广，对我们队伍的腐蚀和侵袭，决不能低估。”"},{"type":"paragraph","text":"石化部的这种估计，是合乎实际情况的正确的分析估量。"},{"type":"paragraph","text":"石化部是同“四人帮”的反革命修正主义路线进行了坚决斗争，打了胜仗的一个部门，尚且不低估“四人帮”的流毒影响，和石化部相仿的，以至不如石化部的，对“四人帮”的流毒影响就更不可以低估。"},{"type":"paragraph","text":"王张江姚“四人帮”这伙穷凶极恶的反革命，对党和革命事业的破坏，在我们党的历史上，是危害最大、影响最深的一次大破坏。他们利用被篡去的那一部分权力，打着红旗反红旗，使我们许多同志受了他们的骗，中了他们的毒，上了大当，吃了大亏。教训是很深的。对“四人帮”的流毒和影响，如果不彻底批判，被他们颠倒了的是非就不能纠正过来，被他们搞乱了的思想就不能得到澄清。特别要看到，如果马马虎虎过去，一旦气候条件适宜，他们散布的毒菌就会重新繁殖，象出卖灵魂的马天水，反革命小丑张铁生、翁森鹤那类人物，还会出来搞“地震”。"},{"type":"paragraph","text":"我们部队同石化部一样，在同“四人帮”的斗争中，是打了胜仗的。我们绝大多数同志坚持了毛主席的革命路线，没有被“四人帮”的谣言和诡辩所迷惑，没有被他们的帽子、棍棒所吓倒，没有被他们的反动气焰所压服。这是非常可贵的。它说明我们军队不愧是伟大领袖和导师毛主席亲自缔造、培育的人民军队，是听党的话的，总体看是好的。但是，“四人帮”对军队的破坏干扰并不是不严重。远的不说，从批林批孔以来，他们就一再插手军队，采取打进来、拉出去的手段，搞了很多阴谋活动，企图夺取军队的领导权，把我们军队搞乱。他们不是没有搞成一些事情的。对“四人帮”干扰破坏军队的严重性，尤其是他们散布的流毒和影响，我们决不能低估。"},{"type":"paragraph","text":"现在，我们决不能满足已有的成绩。揭批“四人帮”，不是什么够了的问题，而是很不够。我们部队同石化部相比，不少单位不是什么“差不多”，而是差距很大。我们要学习石化部，认真分析“四人帮”的流毒影响在本部队、本单位的表现，充分发动群众，打一场深揭狠批“四人帮”反革命修正主义路线的极右实质及其在各方面表现的人民战争。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04792585a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
