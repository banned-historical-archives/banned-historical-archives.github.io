中的资产阶级思想存有急躁情绪","authors":[],"dates":[{"year":1954,"month":11,"day":25}],"is_range_date":false,"parts":[{"text":"武汉大学中文系在批判研究“红楼梦”中的资产阶级思想存有急躁情绪","type":"title"},{"text":"【湖北分社二十五日讯】武汉大学中国文学系在批判研究“红楼梦”中的资产阶级思想存有急躁情绪。","type":"paragraph"},{"text":"这一场思想斗争刚刚开始，这个系的领导干部(党员)就急于要联系武大具体问题进行批判，并在学生党团员中开会动员，要他们在座谈会上向教授面对面提意见。教授们看到这个劲头，有些人已顾不得对这个问题进行研究，忙着准备自己的检查反省。外文系教授袁昌英在座谈会上作了自我检查后，回去背地就发牢骚。","type":"paragraph"},{"text":"武汉市委听取汇报后，对武汉大学中文系领导干部这种急躁情绪，已注意纠正。","type":"paragraph"},{"text":" (程晓侯)","type":"paragraph"}],"comments":[],"origin":"1954年11月30日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ce96f2d37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
