art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国人民的胜利是对世界革命人民强有力的支持亿万群众在以毛主席为首、林副主席为副的无产阶级司令部领导下，摧毁了以叛徒刘少奇为代表的资产阶级司令部，巩固了无产阶级专政，沉重地打击了美帝苏修","authors":[],"parts":[{"type":"paragraph","text":"新华社七日讯 中国共产党中央委员会收到了意大利共产党（马克思列宁主义）中央委员会二日发来的贺电，贺电热烈祝贺中国共产党第八届扩大的第十二次中央委员会全会的成功，贺电全文如下："},{"type":"paragraph","text":"中国共产党中央委员会："},{"type":"paragraph","text":"意大利共产党（马克思列宁主义）热烈祝贺中国共产党第八届扩大的第十二次中央委员会全体会议的召开。"},{"type":"paragraph","text":"十二中全会标志着无产阶级文化大革命发展到一个新的历史时期。毛泽东主席亲自发动和亲自领导的无产阶级文化大革命是在中国无产阶级专政的条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命。"},{"type":"paragraph","text":"实践证明，正如毛泽东主席所强调的，这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的。"},{"type":"paragraph","text":"在毛主席的无产阶级革命路线指引下，在以毛泽东同志为首、林彪同志为副的无产阶级司令部的领导下，在这场阶级斗争中，空前广泛、深入地发动了亿万群众，摧毁了以内奸、叛徒、帝国主义和现代修正主义及国民党反动派的走狗刘少奇为代表的妄图篡党、篡政和在中国复辟资本主义的资产阶级司令部。"},{"type":"paragraph","text":"今天，革命委员会的红旗正在全中国飘扬，宣告取得了一个伟大的胜利，一个决定性的胜利。这一伟大胜利所以能够取得，是因为广大革命群众日益掌握了当代的马克思列宁主义——毛泽东思想。"},{"type":"paragraph","text":"这一胜利对以美国为首的帝国主义及其头号帮凶——以苏联修正主义领导集团为中心的现代修正主义——是一次最沉重的打击。它们相互勾结划分世界势力范围。"},{"type":"paragraph","text":"这一胜利对全世界正在进行反对帝国主义、反对修正主义和反动派的斗争的各国人民和革命者是一个强有力的支持。"},{"type":"paragraph","text":"我们的时代是被不可克服的矛盾所困住的帝国主义和现代修正主义日益彻底走向全面失败、社会主义走向全世界胜利的时代。"},{"type":"paragraph","text":"我们的时代是毛泽东思想的伟大时代。"},{"type":"paragraph","text":"意大利共产党（马克思列宁主义）从无产阶级文化大革命的胜利中吸取了新的力量，以便把毛泽东思想运用到意大利的具体实际中，开展以无产阶级和人民群众为首的反对帝国主义、反对修正主义和反动派，争取建立无产阶级专政和争取社会主义的斗争。"},{"type":"paragraph","text":"中国人民及其以毛泽东同志为首的光荣的共产党万岁！"},{"type":"paragraph","text":"无产阶级文化大革命胜利万岁！"},{"type":"paragraph","text":"无产阶级国际主义万岁！"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"意大利共产党（马克思列宁主义）中央委员会"},{"type":"paragraph","text":"一九六八年十一月二日于罗马"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5120883286"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
