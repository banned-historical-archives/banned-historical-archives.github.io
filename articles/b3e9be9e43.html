"dates":[{"year":1990,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界杯乒乓球赛分组预赛"},{"type":"paragraph","text":"陈龙灿马文革三战全胜进入前八"},{"type":"paragraph","text":"新华社东京１１月１２日电  第十一届世界杯乒乓球赛分组预赛今日结束，中国的陈龙灿和马文革均以３战３胜的成绩分获Ｂ组和Ｃ组第一名。"},{"type":"paragraph","text":"奥运会冠军、南朝鲜的刘南奎今天战绩不佳，先以０∶２负于日本的斋藤清，接着以１∶２（２１∶１５、１７∶２１、１２∶２１）败在陈龙灿拍下，结果以１胜２负的成绩名列Ｂ组第三而遭淘汰。斋藤清在以２∶１战胜新西兰的彼·杰克逊后，以２胜１负名列第二，获前八名的复赛权。"},{"type":"paragraph","text":"马文革今天在Ｃ组以２∶１（１１∶２１、２４∶２２、２１∶１７）战胜波兰老将格鲁巴。格鲁巴则以２∶１战胜朝鲜民主主义人民共和国的金成熙后，３战２胜１负，在马文革之后名列第二。"},{"type":"paragraph","text":"昨天已两战两胜的朝鲜名将李根相今天因在Ａ组以０∶２负于世界冠军、瑞典的瓦尔德内尔而不幸被淘汰。这个组的比利时选手让—米歇尔·塞弗表现出色，以２∶１力克瓦尔德内尔和以２∶０轻取埃及的阿·马萨德。这样，这个组出现李根相、瓦尔德内尔和塞弗３人均为２胜１负的局面，只好计算净胜局数来排定名次。结果，瓦尔德内尔和塞弗名列Ａ组前两名，而李根相名列第三未能进入复赛。"},{"type":"paragraph","text":"瑞典的阿佩伊伦在Ｄ组占主导地位，今天先以２∶０轻取日本的松下浩二，后以２∶１力克法国的加蒂安，从而以３战全捷名列小组第一。松下浩二名列第二，他以２∶０战胜加拿大的伍国和后战绩为２胜１负。"},{"type":"paragraph","text":"明天，瓦尔德内尔、塞弗、陈龙灿、斋藤清、马文革、格鲁巴、阿佩伊伦和松下浩二将进行淘汰式的复赛。半决赛和决赛将在１４日进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3e9be9e43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
