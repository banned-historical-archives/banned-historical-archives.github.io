 中国文化大革命的胜利是对各国革命人民的巨大支持","authors":[],"dates":[{"year":1968,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛里塔尼亚《人民报》赞扬中国革命和建设取得伟大成就"},{"type":"paragraph","text":"强大的新中国朝气蓬勃充满信心"},{"type":"paragraph","text":"中国文化大革命的胜利是对各国革命人民的巨大支持"},{"type":"paragraph","text":"新华社努瓦克肖特三日电　毛里塔尼亚人民党机关报《人民报》十月二十八日发表社论，赞扬中国人民在以毛主席为首的中国共产党领导下进行革命斗争的光辉历程和在各方面取得的巨大成就。"},{"type":"paragraph","text":"这篇题为《向中华人民共和国致敬》的社论，特别赞扬中国人民在伟大领袖毛主席的英明领导下，在无产阶级文化大革命中取得的伟大胜利。"},{"type":"paragraph","text":"社论说：“中华人民共和国实际上从它建立以来一直不断地进行政治、经济和思想战线上的革命”。“今天除台湾省以外，所有二十九个省、市、自治区都成立了革命委员会，从而标志着中国无产阶级文化大革命在毛泽东主席的领导下取得了决定性的胜利。”"},{"type":"paragraph","text":"社论指出，强大的新中国，朝气蓬勃，充满着信心。中国一贯不遗余力地支持各国人民反对帝国主义、犹太复国主义及其走狗的斗争。中国文化大革命的胜利，就是对非洲和亚洲各国人民，特别是对阿拉伯和越南人民的斗争的巨大支持。"},{"type":"paragraph","text":"社论说，尽管世界帝国主义和反动派大肆咒骂和诽谤中国，但是毛里塔尼亚没有受骗。毛里塔尼亚已同中华人民共和国建立了友好的关系，毛里塔尼亚国家元首在去年十月访问了这个友好国家。“我国人民对伟大的中国人民及其伟大的党在他们的享有崇高威望的领袖毛泽东主席的领导下所取得的一切成就和一切胜利致以兄弟般的祝贺。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04918095ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
