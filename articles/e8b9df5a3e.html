" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于中南地区土改工作等问题致林彪电","alias":"","parts":[{"type":"paragraph","text":"关于中南地区土改工作等问题"},{"type":"paragraph","text":"致林彪电"},{"type":"paragraph","text":"（1950年1月13日）林彪同志："},{"type":"paragraph","text":"（一）中南全区要在今年冬季进行土改，则今年春夏秋三季必须完成土改的各项准备工作，时间颇紧，必须妥为计划督促，才能有成。饶漱石二月九日给中央的报告中，提到在今年一二三月农闲时间华东各省普遍开一二次区乡农民代表会议完成区乡政权的改造，作为土改先决条件之一，这是极重要的，否则即不能进行土改。你们是否已令各省进行此项工作。（二）饶漱石又说，华东全区多数市县已开了各界人民代表会议，未开的今年一二三月内可以普遍开一次。中南各省情形如何，是否可以于今年一二三月内普遍开一次市的及县的各界人民代表会议。（三）中南局对华南分局的工作指导是否已密切抓紧，如同你们对湘鄂赣豫各省委那样。以上几点请加注意并电告为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十三日[1]林彪，当时任中共中央中南局第一书记、中南军政委员会主席。[2]饶漱石，当时任中共中央华东局第一书记、华东军政委员会主席。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":166,"page_end":166},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8b9df5a3e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
