art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"排除极左干扰 正确地开展思想斗争","authors":["胡洪威"],"parts":[{"type":"paragraph","text":"在向四个现代化进军的新长征中，还要不要开展对各种非无产阶级思想的斗争？怎样开展这种斗争？这是当前需要回答的一个问题。最近，我们到连队进行调查，感到有两种倾向值得注意。一是受林彪、“四人帮”极左路线的影响，把干部战士正当的生活要求和一般的思想认识问题说成是“阶级斗争的反映”，当作“资产阶级思想”来批，动不动就下禁令。一是对干部战士思想上的一些不健康的苗头放任自流，不敢大胆抓，怕犯极左的错误。这两种倾向实际是一个根子，就是对哪些是极左的东西，哪些是正确的东西，没有真正搞清楚。因此，我们认为，要正确认识和开展对各种非无产阶级思想的斗争，必须深入批判林彪、“四人帮”的极左路线，排除干扰，分清是非。"},{"type":"paragraph","text":"一、不能对一般的生活问题随意上纲上线，但要善于小中见大，防微杜渐。"},{"type":"paragraph","text":"二、不能不讲个人利益，但要反对个人利益高于一切的倾向。"},{"type":"paragraph","text":"三、不能动不动就下禁令，但要循循善诱，积极引导。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbd58c9918"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
