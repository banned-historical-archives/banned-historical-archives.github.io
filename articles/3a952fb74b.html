hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"同黑非洲留法学生联合代表团的讲话","alias":"","parts":[{"type":"paragraph","text":"贡代·塞社：这是正确的，我们很同意。主席：整个来说，我们的政府是为人民服务的，人民给我们饭吃，吃了饭不为人民服务，干"},{"type":"paragraph","text":"什么？"},{"type":"paragraph","text":"大使是哪一年来的？卡马拉·马马硬：“一九六三年来的，来了两年半了。我刚来中国不到一个月的时候，陪-个"},{"type":"paragraph","text":"代表团去上海，在上海受到了主席的接见。主席：（微笑）你这次穿的是白衣服，我不认得你了！卡马拉·马马硬：是的。上次在上海我穿了一身全黑的衣服。主席：是不是谈到这里。我也没有什么道理跟你们讲。你们向去后，请向你们的领导人杜尔"},{"type":"paragraph","text":"总统问候。"},{"type":"paragraph","text":"关于民族工作的一次指示"},{"type":"paragraph","text":"（一九六五年九月）"},{"type":"paragraph","text":"要彻底解决民族问题，完全孤立民族反动派，没有大批从少数民族出身的共产主义干部，是不可能的。"},{"type":"paragraph","text":"同黑非洲留法学生联合代表团的谈话（摘录）"},{"type":"paragraph","text":"（一九六五年九月十四日）"},{"type":"paragraph","text":"事情总是有，不能怕。革命也可以叫麻。革命就是，搞经济建设也是翩。怕麻什么事情也搞不成，不怕麻什么事情也可以搞成。·…知识分子就是要能够跟人民的大多数结合起来。跟他们结合的时候就有麻，你要跟他结合，他不跟你结合，这个麻得很！这些人听话，那些人又不听话，就有这些烦。不能怕这些赢烦，无非是在长期的斗争中跟群众站在一道，群众最后会了解你们的，会信任你们的，会在那些眞正为人民利盈服务的人的领导下团结起来的。劳动人民很需要为他们服务的知识分子，但是，不为他们服务的知识分子，他们不高兴，不喜欢。"},{"type":"paragraph","text":"你或者是比他们高一等，站在他们头上，那他们不喜欢。他们喜欢那种平等的人，用平等的态度对待他们，跟他们道参加劳动，了解他们的思想情况，了解他们的要求，为他们的利盒服务，又有知识，他们喜欢这样的人。接见阿尔巴尼亚内务部代表团时谈劳改工作"},{"type":"paragraph","text":"（一九六五年九月十八日）"},{"type":"paragraph","text":"我们的工作是有缺点、错误的，比如劳动改造工作，就还有缺点，主要不是反革命的问题，主要是我们干部的政治水平不高，劳改农场总的方向应该是改造他们，思想工作第一，"},{"type":"paragraph","text":"·242·"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":9,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":255,"page_end":255},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a952fb74b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
