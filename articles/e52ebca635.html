意德才兼备","dates":[{"year":1981,"month":7,"day":2}],"is_range_date":false,"authors":["中央组织部","陈云"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编 (四), 720","tags":[{"name":"胡乔木","type":"主题/事件"},{"name":"中青年干部","type":"主题/事件"}],"parts":[{"type":"title","text":"选拔笔杆子要特别注意德才兼备*"},{"type":"subtitle","text":"（一九八一年七月二日）"},{"type":"subtitle","text":"陈云"},{"type":"paragraph","text":"培养执笔的、写文章的中青年，选择的时候要特别注意，要特别谨慎。一是必须培养能写文章的人，党内没有能写文章的人不行；二是必须培养既能写，又有德的人，叫德才兼备。不是不要培养。至于说专业写作的人，他专门搞这一行的，那只占培养中青年干部中间很少的一个数量。我们第一个若干历史问题的决议是胡乔木写的。第二次还是他写。找胡乔木这样的人不容易。拿笔杆子的人，能写文章的人，选择的时候要特别注意。"},{"type":"paragraph","text":"（摘自中组部《知识分子问题文献选编》）"}],"alias":""},"tags":[{"name":"陈云","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e52ebca635"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
