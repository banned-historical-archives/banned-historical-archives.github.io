ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"和国民党谈判要点","alias":"","parts":[{"type":"paragraph","text":"和国民党谈判要点！]"},{"type":"paragraph","text":"（1937年5月25日）周："},{"type":"paragraph","text":"关于见蒋谈判之问题，除同意来电所提者外，应增加下述各点：（甲）向蒋提出并询问蒋之方针者：（一）保卫绥远、青岛，收复翼东、察北，反对走私、反对经济提携，英日伦敦谈判等对日问题；（二）联俄问题；（三）太平洋集体安全问题；（四）国防军事财政之准备；（五）汉奸亲日派退出政府问题。（乙）须力争办到者：（一）特区政府委员九人名单为林伯渠、张国焘、秦邦宪、徐特立、董必武、郭洪涛、高岗、张冲、杜斌丞。（二）红军设某路军总司令部，总司令朱德，副司令彭德怀（但准备让步设总指挥部），至少四个师，一师长林彪，二师长贺龙，三师长徐向前，四师长刘伯承，先发表上述六人，余俟后呈请委任。为加强抗日政治教育，政治部制度照旧（但准备让步设政训处)。（三）取缔北平陶希圣、杨立奎等凶殴学生，西安扣留解放报及书籍，上海逮捕共党，文化建设杂志，破坏两党合作等行为。（四）取缔利用土匪、流氓、会党破坏红军、苏区之行为。（五）增加红军防地。"},{"type":"paragraph","text":"洛博毛"},{"type":"paragraph","text":"有午"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":5,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":342,"page_end":342},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e8a51c805"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
