s":[{"year":1950,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中央人民政府委员会和毛主席"},{"type":"paragraph","text":"收到许多祝贺的献礼"},{"type":"paragraph","text":"【新华社一日讯】中央人民政府委员会和毛泽东主席，今天收到许多祝贺的献礼，包括西北、西南各省区和各少数民族的献礼。新疆省人民政府献给中央人民政府和毛主席红皮玉一块，锦旗一面，和贺信一件。向中央人民政府和毛主席献旗的还有西南军政委员会民族事务委员会、云南省保山区人民、西康彝族人民、云南各族代表团、中共甘肃临夏地方委员会和临夏分区专员公署、甘肃临夏分区东乡自治区人民政府、甘肃省藏民代表黄祥、贵州省人民政府民族事务委员会、西康藏族代表团、云南省丽江县摩些族人民。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9633bec64f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
