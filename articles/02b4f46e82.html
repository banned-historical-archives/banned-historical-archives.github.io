script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"现代的“奴隶市场”","authors":[],"dates":[{"year":1981,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在意大利、法国、西班牙等国的许多城市中，都设有向国外输出劳动力的场所。那些长期找不到工作的人，为了养家糊口，不得不到国外去碰碰运气。"},{"type":"paragraph","text":"这种被人们称为“奴隶市场”的职业介绍所，每星期日上午“营业”。当“介绍工作”的中间商乘坐最新型的汽车来到时，等候在那里渴求工作的人们便一拥而上。这些衣冠不整的失业者，年龄多在三十至四十岁之间，大部分是泥瓦匠、木工和从事其他短工的人。他们常常被承包商吹嘘的优厚条件所欺骗。合同上写着:每月平均工资一千美元，旅费由承包商负担，工资直接寄给劳工家属等等。失业者一旦签订了合同，就被派往非洲和中东一些国家去做工。工作条件异常艰苦。他们每天必须在烈日下从事十至十二小时的重体力劳动，住的是简陋的茅草棚，喝水有定量，饭也吃不饱。"},{"type":"paragraph","text":"他们拼死换来的钱，甚至在最后一分钟都会被“赖”掉。不久前，欧洲一家承包公司，突然宣布“倒闭”。可怜的人们白白卖了命。有的合同是用阿拉伯文或工人所不懂的文字写成的，承包公司还往往从中钻空子欺骗工人。"},{"type":"paragraph","text":"(摘自《中国青年报》一九八一年九月二十日)"}],"comments":[],"origin":"《中国青年报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02b4f46e82"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
