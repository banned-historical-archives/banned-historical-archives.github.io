art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见返藏工作的藏族学生民族事务委员会设宴欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社15日 民族事务委员会今晚在北京饭店设宴，欢送今年第一批返回西藏参加民主改革和建设工作的两百多名藏族学生。"},{"type":"paragraph","text":"毛泽东主席7日接见少数民族参观团时，同时接见了这批藏族学生，他们受到很大鼓舞。这些学生是刚从中央民族学院等校毕业的，他们从1954年先后来北京学习。在这批学生中，有些是农奴家庭的子弟，有些是贫苦的牧民和手工业者，过去受尽了西藏上层反动分子和帝国主义者的残酷剥削和压迫，西藏和平解放以后，共产党和人民解放军才把他们从残酷、黑暗的农奴制度下解放出来，以后按照他们的志愿先后来中央民族学院学习。"},{"type":"paragraph","text":"参加今晚宴会的，有民族事务委员会副主任汪锋。杨静仁谢鹤等，中央人民政府驻西藏代表张经武和中央民族学院副院长苏克勤等人。"},{"type":"paragraph","text":"汪锋在宴会上讲了话，他祝贺回西藏的藏族学生走上光荣的工作岗位。汪锋说：随着西藏叛乱的平息，西藏实现民族区域自治和民主改革的条件将更加具备；西藏地区的经济和文化，将得到迅速发展。毫无疑问，做好这些工作，都是光荣的任务，也是艰巨的斗争。汪锋在讲话中勉励藏族学生们回到西藏后，要坚决依靠党的领导，密切联系群众，积极工作，努力学习，在建设民主和社会主义新西藏的工作中做出成绩。"},{"type":"paragraph","text":"张经武在讲话中勉励回西藏工作的学生，要永远热爱伟大的祖国，永远听党的话，全心全意地为西藏的劳动人民而努力工作，不断地锻炼自己和提高自己。"},{"type":"paragraph","text":"藏族学生更却拉加代表这批回西藏的学生致词。更却拉加从四岁多就开始过农奴的悲惨生活。他说：我们已经懂得：西藏要进步，就必须在党的领导下走社会主义道路，西藏人民要得到幸福，就必须彻底摧毁黑暗的封建农奴制度。他说：我们向党保证，为了祖国的统一和各民族的团结，为了把西藏建设成为一个繁荣昌盛的民主和社会主义的乐园，’我们坚决站稳立场，向危害人民的封建农奴制度和叛国分子作无情斗争。我们要做党和祖国人民的忠实儿女，永远听党的话，绝不辜负党和祖国人民对我们的希望。"},{"type":"paragraph","text":"藏族学生们在席间频频举杯祝贺西藏的新生。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b008af6c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
