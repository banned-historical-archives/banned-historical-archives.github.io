:[],"dates":[{"year":1954,"month":10,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十二日电】　中华人民共和国毛泽东主席写信给苏联政府代表团团长赫鲁晓夫，衷心感谢苏维埃社会主义共和国联盟政府将现在北京举行的苏联经济及文化建设成就展览会的机床和农业机器展品赠给我国。信的全文如下:"},{"type":"paragraph","text":"亲爱的赫鲁晓夫同志并苏联政府代表团:"},{"type":"paragraph","text":"苏联政府代表团一九五四年十月五日来信敬悉。"},{"type":"paragraph","text":"承苏维埃社会主义共和国联盟政府将现在北京举行的苏联经济及文化建设成就展览会的机床和农业机器等八十三件展品赠给我国，我谨代表中华人民共和国和中国人民向苏联政府致以衷心的感谢。中国人民将把这次慷慨的赠礼看作是苏联人民对中国人民的亲密友谊的具体表现。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年十月十二日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bc809a8ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
