<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广州市高等学校毕业生政治思想情况相当复杂","authors":[],"dates":[{"year":1954,"month":8,"day":26}],"is_range_date":false,"parts":[{"text":"广州市高等学校毕业生政治思想情况相当复杂","type":"title"},{"text":"【广州分社讯】广州市今年高等学校毕业生的政治思想情况相当复杂。今年中山大学、华南工学院、华南医学院、华南农学院和华南师范学院共有毕业生2059人，其中党员28人，团员670人，团员占毕业生人数的23.54%。毕业生中出身剥削阶级家庭的占很大比例，据1868个毕业生的统计：出身资产阶级家庭的占13.6%，富农3.2%，地主29.2%，反动官僚1.4%。中山大学毕业生中，出身于资本家家庭的占35.5%，地主的19%。华南工学院663个毕业生中，出身工人和贫、中农的只占24.9%。华南医学院有32%的毕业生是港、澳学生。","type":"paragraph"},{"text":"在全部毕业生中，对统一分配的态度，据青年团广州市委员会的统计：能愉快服从分配的占49%。有些不正确认识，但容易说服教育的占32%。思想问题很多或很难搞通思想，甚至公开抗拒的占18%强。其中个别学生已跑到香港去了。","type":"paragraph"},{"text":"不服从分配的毕业生中，主要有以下一些思想情绪：怕艰苦，不愿到乡村，愿留在城市，华南医学院原属光华医学院的一班学生90%都要留在城市。很多学生计较地区，北方人不愿在南方，南方人不愿在北方。华南医学院绝大部分学生都要在广州。有些学生计较名利、地位，华南工学院很多学生想到一四一，认为机关没出息，有的学生认为在工矿，“跟苏联专家进步快，三年可成工程师。”华南医学院有一班68%的学生想当助教、研究人员，不愿到工矿当医生，认为是“浪费人才”，当教授专家使人“佩服得五体投地”。很大一部分学生强调个人健康和爱人问题，华南医学院有一半以上毕业生都要求组织上照顾。港澳学生黄佩玉甚至自称家中为她安排留学英美。要组织准予她“每年定期回港省亲”才服从分配。华南工学院建筑系一澳门学生宋学政假称看母亲，想回澳门当小老板。","type":"paragraph"},{"text":" （路平采写）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年8月26日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79f34620bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
