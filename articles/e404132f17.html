art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"管得好","authors":["汪洋海"],"parts":[{"type":"paragraph","text":"根据社会主义革命的性质、对象和任务，工厂企业的工人民兵，不仅要积极参加社会阶级斗争，用无产阶级的面貌管理、改造城市，清除产生资产阶级的社会基础，狠狠打击一小撮阶级敌人的破坏活动，而且要十分关心工厂企业在经营管理等方面的方向路线问题，勇于同党内的资产阶级、同走资派作斗争，同修正主义企业路线作斗争，这是无产阶级民兵义不容辞的责任，是防止资本主义复辟的一项重要任务。管企业的产品质量，管企业的方向路线，既符合“鞍钢宪法”的精神，又符合民兵的根本任务，这本来是正事，那里是什么“闲事”！试问，象企业方向路线这样的事，工人民兵不管，靠谁去管？"},{"type":"paragraph","text":"民兵和人民解放军一样，是无产阶级专政的柱石。凡是定出种种清规戒律，歪曲甚至篡改民兵的任务都是错误的。这类东西，如果是来自人民内部的认识问题，应该认真地进行教育；如果是来自敌人的蓄意破坏，必须予以迎头痛击。"},{"type":"paragraph","text":"邓小平破坏民兵建设的罪状之一，就是借口所谓“整顿”企业管理，强令执勤的工人民兵“一律撤销”，污蔑民兵抓阶级斗争“不正规”。邓小平篡改民兵的任务，妄想把民兵拉回脱离现实阶级斗争的邪路，我们不仅不答应，而且要和他对着干。民兵一定要在党的领导下，在斗争中学会对资产阶级实行全面专政。（汪洋海）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e404132f17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
