["张书政"],"dates":[{"year":1995,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乒乓球世界冠军挑战赛在大连举行"},{"type":"paragraph","text":"王涛胜佩尔森　马文革胜阿佩伊伦"},{"type":"paragraph","text":"本报大连８月１８日电记者张书政报道：科达药业杯乒乓球世界冠军挑战赛今晚在大连起重体育馆举行。"},{"type":"paragraph","text":"这次赛事只有４名运动员，都是世界级乒坛好手。Ａ组是中国的王涛与瑞典名将佩尔森对阵，Ｂ组是中国的马文革与瑞典名将阿佩伊伦对阵。"},{"type":"paragraph","text":"整个比赛只用两个小时。结果，王涛以３∶１战胜佩尔森，４局的比分分别是：２１∶１６，２１∶２３，２１∶１５，２１∶１５。马文革也以３∶１战胜阿佩伊伦，４局的比分为：１７∶２１，２１∶１９，２１∶１９，２１∶１１。"},{"type":"paragraph","text":"赛后，记者采访了临场观阵的国家体委训练局局长、中国乒乓球管理中心主任李富荣。李富荣说，我国首次举办乒乓球世界冠军挑战赛，运动员人数少、水平高，比赛时间短，易举办。这是我国体育竞赛改革的有益尝试，这样的赛事能够引起观众和体育爱好者的关注与兴趣，有利于促进全民健身活动的开展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a702ddcf6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
