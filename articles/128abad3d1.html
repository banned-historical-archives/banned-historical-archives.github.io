art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狐狸落网","authors":[],"parts":[{"type":"paragraph","text":"春雨淅沥，沈阳市一街工人民兵小分队，在夜幕中时隐时现。瞧他们那个紧张严肃的神情，就知道是在执行一项重要任务。"},{"type":"paragraph","text":"这几天，一街小分队的民兵接连破获几起案件。最近又听群众反映，本街一个刑满释放分子，经常偷听敌台广播，并吹捧邓小平，散布“今不如昔”谬论，攻击社会主义制度。针对这一情况，民兵们进行了认真分析研究，制定了具体战斗方案，决定要在作案现场把他抓获。"},{"type":"paragraph","text":"当民兵们突然出现在这个家伙面前时，他先是吃了一惊，马上又装出一副笑脸让民兵进屋。这时，同民兵一起来的街委干部说要查户口。于是，他一边拿出户口本，一边进行自我表白，说他现在遵纪守法，什么问题也没有，还不时对民兵进行奉承。民兵指导员黄忠协用目光扫视了一下屋里的摆设，突然转过身来，伸手“啪”地一声把他的收音机打开。这突如其来的动作，弄得这个家伙茫然不知所措。此时，收音机里传出了敌台的广播。那个家伙掩饰说：“这收音机不好使，波段老错，我可没有收听敌台啊！”豺狼再狡猾也斗不过好猎手，在民兵的严厉质问下，他满脸淌汗，耷拉下脑袋，交代了自己多年来经常偷听敌台广播，散布反动言论的罪行。群众专政威力无穷，这个象狐狸一样狡猾的现行反革命分子，终于受到了应有的惩罚。"},{"type":"paragraph","text":"（沈阳市民兵总指挥部报道组）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"128abad3d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
