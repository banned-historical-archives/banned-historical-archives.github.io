script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"破资产阶级教育体系　立共产主义教育原则上海水产学院教育大革命确保党的领导增加政治学习和生产劳动时间","authors":[],"dates":[{"year":1958,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　“什么是共产主义大学?”“怎样才能建成共产主义大学?”上海水产学院全体师生最近就这些问题展开了热烈的争辩。他们在不断务虚、不断破立后，终于逐步冲破了资产阶级教育体系，从思想上确立了共产主义教育的原则，以革命精神拟订了三个系所属专业的83套教学计划方案，编出了216份教学大纲初稿。"},{"type":"paragraph","text":"拟订教学计划过程中，是自始至终贯穿了两条道路的斗争。有些人冲不出旧教学内容、教学方法、课程设置以及教学组织的框子，主张孤立地划一段时间开展勤工俭学活动，来表示贯彻教育与生产劳动相结合的方针，以增加政治课的时数来表示贯彻教育为政治服务的方针。有的还认为教学计划“没有什么搞头”。"},{"type":"paragraph","text":"根据上述情况，党委组织全体师生进一步学习中央指示和市委关于跃进再跃进的号召，反复进行务虚，进一步解放思想，并指出应采取党委、工农、学生、青老年教师五结合的办法进行教育革命。全体师生一面讨论，一面四出调查访问工厂、渔轮的工人、业务单位以及兄弟学校和市郊的红专大学，还请人介绍老区红军大学、抗日大学的情况，树立了对立面，全院就出现了一个群众性的大鸣大放、大争大辩、大搞教育革命的局面。"},{"type":"paragraph","text":"这次教育革命的主要特点，首先体现在确保党的领导，贯彻教学为政治服务的方针。从组织形式上，党的领导一直贯穿到班级，使教学任务通过组织得到保证，它的组织形式是:全院的院务委员会在党委领导下工作；系的系务委员会在系党总支领导下工作；系的各年级成立党支部，由党、青、老年教师、学生组成年级委员会，具体领导班委会，切实贯彻政治、教学、科学研究、劳动生产相结合的制度；班设班主任或政治辅导员，与业务教师一人和学生三人组成班委会，在班党小组领导下执行年级委员会的决议，班下设红专战斗小组。为了能使教学为政治服务，政治学习时间增至全部学时的四分之一。"},{"type":"paragraph","text":"其次，在整个教育革命中紧紧地抓住了教育与劳动生产相结合的原则，勤工俭学、生产劳动的时间占全部课时的四分之一以上。其特点是以任务带教学。如淡水养殖专业在第二学年主要掌握搞“丰产塘”。所有学课就配合这一任务，学习水化学、饵料学、增殖原理、水产水文学、鱼病防治等课程。有些课程就通过生产现场进行讲解把搞丰产塘中发现的问题作为科学研究的题目。这样，教师学生都可做到边劳动、边教学、边试验、边研究，既贯彻了政治、教学、劳动、科学研究相结合的原则，又体现了教学步骤步步提高的“实践——理论——实践”的过程。"},{"type":"paragraph","text":"水产学院这次教育革命，将原来的五年制改为四年制，在四年中除要学完原来的五年课程外，还要达到研究生水平。(马、麻、邵)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5fec4fd81"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
