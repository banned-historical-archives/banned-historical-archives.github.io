" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"第一军医大学右派分子任传耕继续暴露反党反社会主义思想","authors":["刘大为","李绪荫"],"dates":[{"year":1957,"month":7,"day":11}],"is_range_date":false,"parts":[{"text":"第一军医大学右派分子任传耕继续暴露反党反社会主义思想","type":"title"},{"text":"刘大为李绪荫","type":"authors"},{"text":"《解放军报》记者刘大为、李绪荫报道  第一军医大学的右派分子任传耕最近在反击右派的斗争中，继续暴露和发出反党反社会主义的思想言论。","type":"paragraph"},{"text":"任传耕认为：党的政策不符合人民利益。他说：“关于优先发展重工业的问题，党费了好大力量也难被群众接受；又如统购统销群众不同意，再教育，但是提出时却说是人民的要求，为的是好听。”任传耕还说，集体化是为了“能互相监督，容易支配，开会容易找到；另外是怕造反，谁都认识谁，农村也易于统治，这就像过去把人放到集中营，就差没有壕沟，不容易认出来。”任传耕认为目前许多机关企业命名为“人民”，不过是“美其名”而已。例如人民代表大会，“它是代表共产党的组织，所有决议都是由党中央通过表决形式实施出来的，它很少把基层人民的意见加以讨论和给予表决的机会。”任传耕还认为所有带“人民”字样的事都是党办的，不是一般人办的，倒不如改为“共产党”三字。","type":"paragraph"},{"text":"任传耕又说：“我看右派言论差不多都对，葛佩琦的发言我认为不全对，但国内至少有要杀共产党的人”；“储安平说的‘党天下’正是这样，全中国都是党统治的”；“章伯钧的‘政治设计院’提的对，大家应商量商量”。","type":"paragraph"},{"text":"任传耕还说：“我特别不同意毛主席所说的：对敌人只许老老实实，不许乱说乱动。”他还说：“共产主义的胜利是武力的胜利，不是理论的胜利，党的统治特别专制。别人不用武器连讲话也不行，党如放松这些就不一定统治得好。”","type":"paragraph"},{"text":"任传耕说：“我觉得蒋介石打回来对自己也没有什么不利。”他认为现在的自由并不符合宪法所规定的精神，他说：“讲话不能随便，违反马列主义就不行。嘴只能用来吃饭和谈工作。”他还一再叹息“生不逢时”，并且说：“我想离开这里找块地种种，可是农村集体化了；到山上隐居又怕别人看到一定要检举；到外国去没有政府许可也不行，国防很强无法越境。所以，只好在此苦闷。”","type":"paragraph"},{"text":"这些反动言论是７月１日至３日任传耕在第三临床学院整风小组座谈会上发出的。自从反击右派的斗争开展以来，任传耕采取了且战且退的战法，企图蒙混过关。他曾作过“检讨”，说他还有很多反动言论，让他讲两天也讲不完，并说：“这是你们让我讲的，因此讲出来了只能算作反动思想，不能算作反动言论。”","type":"paragraph"},{"text":"在各次会议上，到会群众除对任传耕的反动言论给以有力的驳斥之外，还进一步揭穿了他的两面手法。群众一致警告任传耕：必须老老实实地交代反党反社会主义言论的动机和根源，不要自绝于人民。","type":"paragraph"},{"text":" ——原载《解放军报》1957年7月11日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88304e433b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
