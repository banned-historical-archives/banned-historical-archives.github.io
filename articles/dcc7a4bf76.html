thors":["周总理"],"dates":[{"year":1967,"month":9,"day":9}],"is_range_date":false,"parts":[{"text":"周总理接见沈阳三方面代表时谈毛主席战略部署","type":"title"},{"text":"周总理","type":"authors"},{"text":"主席的战略部署是：","type":"paragraph"},{"text":"第一段批发一张大字报，十六条，批判反动路线，红卫兵，大串联、四大民主发挥出来，掀起文化大革命的高潮。在这样基础上，掀起一月风暴，夺权，文化大革命向深度发展，推动整个社会，推动到农村，这是全局部署。当然某一省市可能例外了。","type":"paragraph"},{"text":"第二阶段是争取胜利，最中心部署是通过大批判，批判党内头号走资本主义道路当权派，结合本部门，本单位斗、批、改，实现革命大联合革命三结合，建立临时权利机构，完成斗、批、改全面任务，斗争党内走资派，批判资产阶级反动路线，树立无产阶级革命路线的权威。学校也要达到改革学制，工厂经济体制也有许多要改，改都实现了，才能基本胜利，","type":"paragraph"},{"text":"第三年扫尾。第二段应该在大批判中实现大联合群众逐渐觉悟，把过去偏保的，受反动路线影响的，使他们觉悟起来，就有可能站在毛主席革命路线一边。","type":"paragraph"},{"text":"革命群众组织应是大联合的嘛，都在一个工厂，不能搞严重对立，在一个工厂，没有根本利益矛盾，有矛盾也是内部矛盾，求大同存小异，要联合起来，这样才能团结百分之九十五以上群众。","type":"paragraph"}],"comments":[],"origin":"1967年9月22日北京外语学院红旗《红旗周刊》第3版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcc7a4bf76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
