art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在毛主席的阳光下成长","authors":["范带好"],"parts":[{"type":"paragraph","text":"我今年才十五岁，能够参加这次全国运动会，特别是能够见到敬爱的领袖毛主席，这是我终身难忘的事。当毛主席健步登上主席台，全场顿时响起雷鸣般的掌声，我情不自禁地跳了起来。毛主席，我们心中不落的太阳，看到您神彩奕奕，满面红光，我真感到这是劳动人民最大的幸福。"},{"type":"paragraph","text":"毛主席，我是在五星红旗下诞生，在社会主义阳光下成长的，没有尝过旧社会地主资本家剥削压迫劳动人民的苦。但是，从我曾祖父起，是三代雇农，给地主当牛当马。解放后，我们一家人过着丰衣足食的生活，我还进了学校。每当我翻开教科书。我父亲看见书上毛主席的画象，他就热呼呼的对我说：带好，我们家三代人，没一个进过学校门，现在托毛主席的福，你进了学校，要听毛主席的话，永远跟着共产党！"},{"type":"paragraph","text":"我从小就喜欢游泳，党就有意识地培养我，让我进了广州业余体育学校。参加广东少年游泳比赛时，我获得了女子二百米自由泳第四名。参军以后，又进一步学习了毛主席著作，懂得了游泳也是为人民服务，因此，我更加刻苦锻炼。今年七月，在上海举行的全国少年游泳比赛，我又获得了女子二百米自由泳的冠军。所有这些，都是毛主席给我的力量。"},{"type":"paragraph","text":"这次全运会，是我们向世界纪录冲击的新的起点，毛主席又亲临检阅，我受到了极大的鼓舞。我一定要用毛泽东思想挂帅，比出风格，赛出水平，以优异的成绩，向毛主席汇报！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6ba7f5dbc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
