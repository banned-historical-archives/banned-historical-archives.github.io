正主义关于和平走向社会主义的論点只不过是幻想","authors":[],"dates":[{"year":1965,"month":11,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社惠灵顿3日电　新西兰共产党总书记威尔科克斯三日在《人民之声》周报上发表声明，谴责印度尼西亚右派势力猖狂地镇压印度尼西亚共产党，并且呼吁国际共产主义运动最坚决地支持印度尼西亚共产党。"},{"type":"paragraph","text":"声明指出，印度尼西亚最近的局势发展证明了修正主义者坚持的关于和平走向社会主义的论点只不过是幻想。声明说，在印度尼西亚革命事业获得进展之后，“由陆军将领代表的反动势力进行了反扑。他们早就想这样千，并且已经作了几年准备。……他们是以美国帝国主义为首的帝国主义的工具。”"},{"type":"paragraph","text":"声明指出，“只有一种力量能打败他们，那就是以艾地为首的印度尼西亚共产党。”"},{"type":"paragraph","text":"声明说:“今天，在印度尼西亚，右派军人正在猖狂镇压印度尼西亚共产党及其几百万支持者。全世界的反动派对印度尼西亚的事件兴高采烈，但他们未免叫嚷得太早了。这场战斗刚刚开始。”"},{"type":"paragraph","text":"威尔科克斯谈到他亲眼看到印度尼西亚共产党同人民紧密联系的情况。他表示深信“在印度尼西亚共产党领导下的工人和农民终将在这场新的战斗中赢得胜利”，因为“印度尼西亚共产党的领导不是建立在修正主义者的假马克思主义的基础上，而是建立在一九六○年八十一党的声明的革命原则的基础上的。”"},{"type":"paragraph","text":"声明最后呼吁国际共产主义运动最坚决地支持印度尼西亚共产党。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29d94332b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
