tes":[{"year":1982,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"受叶剑英委员长委托"},{"type":"paragraph","text":"彭真会见苏丹人民议会代表团"},{"type":"paragraph","text":"新华社北京8月24日电　人大常委会副委员长彭真，受叶剑英委员长的委托，今天上午在人民大会堂会见了由副议长路易吉·阿杜克率领的苏丹人民议会代表团。"},{"type":"paragraph","text":"彭真代表人大常委会和叶剑英委员长热烈欢迎苏丹贵宾。他说，我们虽然是第一次见面，但两国人民却是老战友。两国人民的战斗友谊可以追溯到上一个世纪。在长期的共同斗争中，两国人民一直相互同情，相互支持。他表示相信，中国和苏丹两国的合作关系和两国人民的友谊今后一定会越来越发展。"},{"type":"paragraph","text":"他说，目前中国人民有困难，苏丹人民也有困难，但我们的朋友遍天下。我们的朋友主要是第三世界的国家和人民。只要大家团结起来，共同战斗，最后的胜利一定属于第三世界。不管超级大国多么厉害，但终究是要失败的，这是不以人们的意志为转移的历史规律。"},{"type":"paragraph","text":"阿杜克说，苏丹和中国是亲密的朋友。两国人民要继续团结战斗，共同反对帝国主义、殖民主义和超级大国的霸权主义，为建立新的国际经济秩序而努力。"},{"type":"paragraph","text":"彭真请阿杜克回国以后转达叶剑英委员长和他本人对尼迈里总统和赛义德议长的问候。"},{"type":"paragraph","text":"会见时在座的有人大常委会委员、副秘书长武新宇，人大常委会副秘书长邢亦民，外交部副部长钱其琛，苏丹驻中国大使马塔尔等。"},{"type":"paragraph","text":"苏丹人民议会代表团将于日内离开北京回国。（附图片）"},{"type":"paragraph","text":"彭真会见由路易吉·阿杜克率领的苏丹人民议会代表团。\t\t　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0e4989604"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
