<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"锡兰工联年会通过决议支持南越人民斗争坚决反对帝国主义　援助世界革命运动印尼和越南工会代表致词赞扬锡兰工联高举革命旗帜　阿哈迪亚特揭露修正主义者害怕帝国主义害怕人民害怕革命的五貌","authors":[],"dates":[{"year":1963,"month":12,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社科伦坡20日电】　锡兰工会联合会间十六届年会二十日一致通过的政治决议说:“世界带回主义，访别是貌帝国主义，是世界人民的主要敌人，必须大胆揭露它和对它进行无情的十家。”"},{"type":"paragraph","text":"决议团。“这次会议反对企图。为带回主义涂脂抹粉或在人民当中散布关于同帝国主义达成协议就能保卫世界和平的幻想。”"},{"type":"paragraph","text":"它说，“工人阶级和进步建功的已回壮大的力量必须用来援助全世界的革命运动，以粉碎世界上的帝国主义和殖民主义体系，在世界范围内实现社会主义。”"},{"type":"paragraph","text":"决议在谈到过渡到社会主义的道路的问题时赶，工人阶级必究准备两种可能性:和平的道路和非和平的道路。仅仅依靠回去的方法就等于把面临资产阶级反革命暴力的工人阶级解除武装。"},{"type":"paragraph","text":"【把新华社科伦坡20日电】　锡兰工会联合会月十六届年全会田在这里一致通过决议，支持南越人民反对美帝国主义和南越傀儡政权的斗争。"},{"type":"paragraph","text":"诀议说:“西兰工会联合会第十六届年会成国际支援南越工人和人民日向越南南方民族解放阵线和越南南方劳动解放协会，井通过它们向在南越进行反对英帝国主义及其傀儡政权的斗争的南越工人和人民表示最热烈的祝贺和最真诚的声援”。"},{"type":"paragraph","text":"【新华社科伦波20日电】　全印度尼西亚中央职工会全国理事会书记阿哈迪亚特二十日上午在纽兰工会联合会第十六届年会的第三天会戴上致词，祝贺锡兰工人阶级在调兰工会联合会的正确领导下所取得的巨大成就。"},{"type":"paragraph","text":"他强调说:“我满怀兴趣地注意到，你们昨天时输得很热烈，而且这些讨论的矛头都是针对修正主义的。”有三百五十万会员的印度尼西亚中央职工会的这位代表说:“整个印度尼西亚工人阶级完全同意你们的意见，就是说，在争取恢复国际工人阶级运动团结的斗争中，我们应当不断地反对老修正主义以及现代修正主义，同时不断地记对老教条主义和现代教条主义。”"},{"type":"paragraph","text":"当他回述他在国际会议上亲自看到的修正主义者的分裂阴谋和活动的丑态和遭到失败的情况时，代表们会心地微笑，并且不时发出欢呼。"},{"type":"paragraph","text":"阿哈迪亚特指出:“现代修正主义者究竟为什么要干这一切勾当?据我看来，这是因为他们非常害怕；害怕什么?一般药来，这些现代修正主义者有三伯:第一、伯帝国主义；第二、伯本国人民；第三、怕革命。”"},{"type":"paragraph","text":"他指出:“因此很清楚，修正主义者不属于革命力量，而属于反革命力量；”"},{"type":"paragraph","text":"他说:“我们必须内修正主义者进行艰巨的斗争，俗是这并不是现我们的主匹敌人现在已被换了人。帝国主义，特别是美国帝国主义、殖民主义和新殖民主义，仍然是亚非各国工人和人民的主要敌人。”"},{"type":"paragraph","text":"当阿哈迪亚特登上主席台时，代表们热烈地高呼表示同印度尼西亚工人和人民团结和友好的口号，并且给他戴上许多花环。"},{"type":"paragraph","text":"越南总工会书记阮明二十日晚间也在年会上致词，他说，锡兰工会联合会高举着无产阶级革命原则的旗帜，高举着锡兰工人阶级团结和斗争的旗帜。"},{"type":"paragraph","text":"他说:“美帝国主义是为取得和加强独立而进行斗争的人民的敌人。”"},{"type":"paragraph","text":"他在致词中详细地谈到了美帝国主义对南越人民犯下的血腥罪行和南越人民在反对美帝国主义的武装斗争中的胜利。他宣布，目前，“占南越人口大约一半的三分之二的南越领土都已经解放了。”"},{"type":"paragraph","text":"当他走上讲台的时候，全场起立向他热烈喝采。代表们纷纷走上讲台，给他戴上了许多花环和向他热烈致意。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f6173c8c0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
