ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对观察家评论稿《联合国往哪里去？》的批语","alias":"","parts":[{"type":"paragraph","text":"对观察家评论稿《联合国往哪里去？》的批语！"},{"type":"paragraph","text":"（1965年2月14日）写得很好，照此发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十四日"},{"type":"paragraph","text":"[1]这个批语写在周恩来1965年2月14日送审的拟在《人民日报》刊登的观察家评论稿《联合国往哪里去？一一评戴高乐的讲话》上。评论说，对于联合国的现状，世界上多数国家是不满意的。法国总统戴高乐2月4日在记者招待会上批评联合国的讲话表明，即使在北大西洋集团内部，也有人认为联合国作为美国家天下的局面应该结束了。现在，从东方到西方，要求彻底改组联合国的呼声越来越高，各种各样的方案已经提了出来。不管哪种方案，一个共同之点，就是要求结束美国把持和操纵联合国的局面。联合国必须改正错误，彻底改组，已经成为当前人心之所向、大势之所趋。这篇文章在1965年2月15日《人民日报》发表。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":2,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":493,"page_end":493},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d83ec3952c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
