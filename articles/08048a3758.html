" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1710","name":"切实做好普及法律常识的宣传教育工作","author":"中共中央宣传部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"切实做好普及法律常识的宣传教育工作","dates":[{"year":1985,"month":6,"day":30}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态(1985选编版), 255-256","tags":[{"name":"法制宣传教育","type":"主题/事件"},{"name":"彭真","type":"主题/事件"}],"parts":[{"type":"title","text":"切实做好普及法律常识的宣传教育工作"},{"type":"paragraph","text":"今年六月份，中央宣传和司法部联合召开了建国以来第一次全国法制宣传教育工作会议，讨论了如何在全国范围内，争取用五年左右时间在全体公民中基本普及法律常识，使我国法制宣传教育工作经常化、制度化、系统化的问题。"},{"type":"paragraph","text":"在全民中普及法律常识教育，一是发展社会主义民主、健全社会主义法制的需要，二是建设高度的社会主义物质文明和精神文明的需要，三是实现社会风气、社会秩序和社会治安根本好转的需要。普及法律常识教育是一项大工程，是全国人民政治生活中的一件大事。如果在五年左右能普及法律常识，使人民成为法律的主人，法律成为人民的武器，做到人人知法、守法，养成依法办事的观念和习惯，那将会把我国社会主义民主和法制建设推向一个新的阶段，使整个国家和社会的面貌发生深刻的变化。"},{"type":"paragraph","text":"普及法律常识，任务是艰巨的。但是，只要各级党委认清健全社会主义法制、普及法律常识的重要意义，统一思想认识，并把这一任务提到重要的议事日程上来，真正做到党委统一领导，司法部门和党委宣传部门主管，各方面协同配合，抓住各级干部尤其是领导干部和青少年这两个普及法律常识的重点，根据实际情况，切实规划，认真实践，搞好试点，不断总结经验，我们就有充分信心达到普及法律常识的目的。"},{"type":"paragraph","text":"彭真同志说：“要做到依法办事，离不开宣传工作”。法制宣传是党的宣传工作部门份内的职责。全民普及法律常识是全党的大事，是党的思想政治教育的重要内容。在新的历史条件下，如何把这一教育同日常的思想政治工作结合起来，这是摆在我们思想政治工作部门和各级政治工作干部、宣传工作干部面前的一个新的课题。党的宣传部门和宣传战线的干部，要充分认识这项工作的重大意义和自己应负的责任，支持和协同司法部门准确有力地开展法制宣传工作和进行普及法律常识的教育。教育者必先受教育。在进行这项教育工作中，各级宣传部门的干部和思想战线的同志一定要先学一步，学得更多一点、更深一点，学得更有成效，以适应新形势的需要。"},{"type":"subtitle","text":"(第22期，6月30日）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08048a3758"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
