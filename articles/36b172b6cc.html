art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席献了花圈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年四月二十八日讯 国务院副总理邓小平、陈锡联，人大常委会副委员长李素文，邓颖超同志，今天下午前往柬埔寨元首府，向柬埔寨西索瓦·哥沙曼·尼亚里丽王后陛下的遗体告别。"},{"type":"paragraph","text":"告别仪式大厅里，摆着毛泽东主席献的花圈。"},{"type":"paragraph","text":"献花圈的还有：朱德委员长、周恩来总理、邓小平副总理和江青同志、邓颖超同志，以及外交部、北京市革命委员会、中柬友协和中国驻柬埔寨大使馆。"},{"type":"paragraph","text":"告别时，柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，柬埔寨民族统一阵线中央政治局主席、柬埔寨王国民族团结政府首相宾努亲王和夫人，以及王室成员、柬埔寨民族统一阵线政治局成员等在场。邓小平副总理向西哈努克亲王和夫人表示亲切慰问，对哥沙曼王后陛下的逝世表示沉痛哀悼。"},{"type":"paragraph","text":"参加告别仪式的还有有关方面负责人李强，刘湘屏、何英、赵朴初、柴泽民、孙浩、梁枫、高建中、赵杰、邢仁先等。"},{"type":"paragraph","text":"今天，天安门广场、新华门、外交部等处下半旗志哀。"},{"type":"paragraph","text":"哥沙曼王后病危期间，邓颖超同志曾到元首府看望哥沙曼王后。"},{"type":"paragraph","text":"今天下午，许多国家驻中国的外交使节也前往元首府向哥沙曼王后陛下的遗体告别。"},{"type":"paragraph","text":"国务院副总理邓小平、陈锡联，人大常委会副委员长李素文，邓颖超同志，四月二十八日下午前往柬埔寨元首府，向柬埔寨西索瓦·哥沙曼·尼亚里丽王后陛下的遗体告别。告别时，西哈努克亲王和夫人，宾努亲王和夫人在场。 新华社记者摄"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36b172b6cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
