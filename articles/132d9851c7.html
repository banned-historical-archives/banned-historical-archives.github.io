<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国民主促进会自我改造竞赛决心书","authors":[],"dates":[{"year":1958,"month":3,"day":2}],"is_range_date":false,"parts":[{"text":"中国民主促进会自我改造竞赛决心书","type":"title"},{"text":"我们，中国民主促进会中央委员会和中央机关的工作人员们，以无限高昂的革命热情表示我们不可动摇的决心：我们争取作坚定的左派。为此，我们提出下列的奋斗目标，要求我们自己，并建议我会全体会员同志们、兄弟党派的同志们、全国知识界的同志们，鼓起革命干劲，互相帮助，互相鼓励，在中国共产党的领导下，在社会主义的光辉旗帜下，展开竞赛，奋发前进！","type":"paragraph"},{"text":"1.永远跟着共产党走，把心交给党。","type":"paragraph"},{"text":"2.一切为了社会主义，把知识献给人民。","type":"paragraph"},{"text":"3.坚决贯彻党的方针政策，积极做好工作。","type":"paragraph"},{"text":"4.积极参加劳动锻炼，在思想感情上与工农打成一片。","type":"paragraph"},{"text":"5.学习马列主义，钻研业务，做到又红又专、更红更专。","type":"paragraph"},{"text":"6.努力克服个人主义，培养集体主义。","type":"paragraph"},{"text":"7.开展批评和自我批评，促进革命，促进团结。","type":"paragraph"},{"text":"8.保证把整风运动搞透搞深，促进我会组织和成员的本质改造，争取在三年内使会员中的左派和中左分子达到80%，使我会成为社会主义性质的政党。","type":"paragraph"},{"text":"签名者：","type":"paragraph"},{"text":"马叙伦  王绍鏊  许广平  杨东蓴  冯宾符  梁纯夫  赵朴初","type":"paragraph"},{"text":"张明养  陈麟瑞  章廷谦  陈  慧  徐楚波  谢冰心  巫宝三","type":"paragraph"},{"text":"雷洁琼  余之介  徐伯昕  严景耀  葛志成  张纪元  顾颉刚","type":"paragraph"},{"text":"吴研因  顾均正  张志公  吴  荣  梁  明  毛启邠  陈选善","type":"paragraph"},{"text":"沐绍良  何钦贤  陈秉立  赵济年  张永昌  姚肃雍  傅彬然","type":"paragraph"},{"text":"李佑民  郑芳龙  张守平  张兰玉  吴美珍  温孝霖  李念武","type":"paragraph"},{"text":"宋玉荣  李延绪  莫亚南  冯亨嘉  王嘉璿  刘鹗业  朱孔厚","type":"paragraph"},{"text":"孙希榘  李婉卿  方健明  田德贞  吴廷劢  王慧颖  白玉光","type":"paragraph"},{"text":"王苏生  徐世信  杨起华  徐  纬  庞安民  吴德咸  郑有金","type":"paragraph"},{"text":"杨梅珍  马玉莲  牛贵山  李连和  廖  钦  曹葆章  李振德","type":"paragraph"},{"text":"孟守廉","type":"paragraph"},{"text":"北京市委会自我改造社会主义竞赛决心书","type":"subtitle"},{"text":"为了迎接当前社会主义大跃进的高潮，我们决心学习工农群众的革命干劲，以勇往直前的精神，比先进、学先进、赶先进，提出自我改造社会主义大跃进的奋斗目标如下：","type":"paragraph"},{"text":"（一）积极响应我会中央马主席等提出的自我改造大跃进的号召，坚决实现八项奋斗目标。","type":"paragraph"},{"text":"（二）向本会辽宁、江苏、浙江、上海、天津、广州各省市委员会挑战，保证在三年内使会员中的左派和中左分子超过80%。","type":"paragraph"},{"text":"（三）要求本会北京市各基层组织和全体会员订出组织改造和自我改造的跃进规划，积极参加比政治、比思想、比工作的竞赛，并认真进行检查评比。","type":"paragraph"},{"text":"（四）向北京市各兄弟党派建议展开本质改造的竞赛，迎接社会主义大跃进的高潮。","type":"paragraph"},{"text":" 中国民主促进会北京市委员会自我改造跃进大会1958.3.2","type":"paragraph"}],"comments":[],"origin":"1957年3月10日《民进整风简报》第12期第2版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"132d9851c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
