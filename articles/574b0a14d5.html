script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市各界人士香茗一杯迎新春芮杏文在会上说，最近中央领导同志多次指出，反对资产阶级自由化不能扩大到经济工作和日常生活领域中去。江泽民指出，现行的经济政策不变","authors":["姚柏生"],"dates":[{"year":1987,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者姚柏生)“香茗一杯迎新春”。市政协、市委统战部昨天上午在锦江小礼堂举行茶话会。市委书记芮杏文在会上说，最近中央领导同志多次指出，反对资产阶级自由化不能扩大到经济工作和日常生活领域中去。"},{"type":"paragraph","text":"本市党政领导江泽民、胡立教、左英、汪道涵、杨堤、陈铁迪、张定鸿、石祝三、王力平、钱学中等也应邀与本市各界人士二百余人聚会。"},{"type":"paragraph","text":"茶话会由市委常委、统战部长毛经权主持。市政协主席李国豪致词，祝贺大家在新的一年里，身体健康，诸事如意。他说，我们要坚持四项基本原则，反对资产阶级自由化，坚持改革和开放，在党的领导下，为改造、振兴上海作出更大的努力。"},{"type":"paragraph","text":"芮杏文在会上向大家介绍了中央人事变动和旗帜鲜明地反对资产阶级自由化的情况，并回答了大家所关心的问题。他指出，我们要充分认识到资产阶级自由化泛滥的危害性，从理论思想领域里拨正方向，更好地坚持四项基本原则，坚持改革、开放、搞活，继续贯彻十一届三中全会以来的路线、方针、政策。"},{"type":"paragraph","text":"江泽民市长也在会上讲话。他说，当前反对资产阶级自由化着重点是端正政治方向，分清是非，切不要搞成左的一套。现行的经济政策不变，这一点是非常重要的。"},{"type":"paragraph","text":"市委副书记杨堤也在会上讲了话。"},{"type":"paragraph","text":"民革上海市委副主委徐以枋，民盟上海市委主委谈家桢、副主委赵超构，民建市委主任委员、市工商联主任刘靖基，致公党上海市委主委董寅初先后在会上发言，他们以切身经历，畅谈坚持四项基本原则，坚持改革开放，反对资产阶级自由化，发展安定团结政治局面的重要性，表示对社会主义四化建设的光明前途充满信心。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江泽民","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"574b0a14d5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
