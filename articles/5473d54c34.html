ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对一篇关于人道主义文章的摘报的批语","alias":"","parts":[{"type":"paragraph","text":"对一篇关于人道主义文章的"},{"type":"paragraph","text":"摘报的批语"},{"type":"paragraph","text":"（1961年12月）"},{"type":"paragraph","text":"为哪一些阶级的个人幸福和集体幸福？范围是全世界呢？还只是本民族？是最大多数的工人、贫苦农民和革命知识分子呢？还是以“全民”为幌子，进行欺骗，实则只是为资产阶级和工人贵族呢？"},{"type":"paragraph","text":"[1]新华通讯社1961年12月23日编印的《内部参考》第二十七期《每日要闻》栏目中登载的一条消息说：波兰《文化评论》刊登哲学家兼政论家沙夫的文章，认为社会主义人道主义“表现了现代共产主义运动的本质和内容”，它的目的是“发展个人和为个人的幸福创造条件”等。沙夫认为“人道主义是科学社会主义的精华，而个人幸福的主张则是人道主义的精华”，并把社会主义人道主义规定为三个“辩证关系”，即“爱与恨之间的辩证关系”“自由和对自由限制之间的辩证关系”“民主和专政之间的辩证关系”。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":526,"page_end":526},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5473d54c34"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
