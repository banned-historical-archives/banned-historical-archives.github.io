"year":1950,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报广州八日专电】　叶剑英主席昨日发表严重声明，警告澳门葡方当局。该声明内指出:去年十一月五日，我军攻占中山县时，在澳门南端与我银坑大马骝洲中间之我国领海海面，发现伪国民党海军第四巡防舰队之舰艇多艘，当即为我炮兵监视不准移动，而葡方竟滥用澳门现存特殊地位侵我领海，劫走待降匪舰，窝藏伪舰队，继续作乱，蓄意对我人民解放军挑衅。声如文内，最后严厉警告葡方这些敌意行为，中国人民不能忍耐的，中国人民解放军对此保留一切行动权利。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b15b15c519"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
