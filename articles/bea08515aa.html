","authors":[],"dates":[{"year":1963,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《团结报》就崔庸健委员长访华发表评论"},{"type":"paragraph","text":"欢迎中朝两党加强反帝反修正主义斗争"},{"type":"paragraph","text":"新华社地拉那十七日电　阿尔巴尼亚《团结报》十六日就崔庸健访华发表评论。"},{"type":"paragraph","text":"这篇题为《在马克思列宁主义旗帜下》的评论说，中华人民共和国和朝鲜民主主义人民共和国之间的真挚友谊和互助合作正在日益发展和加强。朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健对中国的访问再次体现了这一点。"},{"type":"paragraph","text":"评论说，中国共产党和朝鲜劳动党在建设社会主义的实践活动中和在对外政策问题上所遵循的原则，都是依据创造性的马克思列宁主义，依据为加强国际共产主义运动和社会主义阵营的团结、进一步加强反对帝国主义侵略者和现代修正主义者的斗争的。评论说，现代修正主义正在取消马克思列宁主义学说的革命精神，破坏社会主义阵营和阻挠各国人民反对帝国主义的解放斗争。"},{"type":"paragraph","text":"评论说，中朝两党在对外政策问题上的观点和立场的一致，不仅对进一步加强他们之间的合作和在对外政策上取得新的成就具有巨大意义，而且在国际政治的范围中起着很大影响，有助于提高争取自由和独立斗争的亚洲和世界各国人民的革命意志。"},{"type":"paragraph","text":"评论说，全世界人民都为中朝两国人民之间的真挚友谊和合作获得进一步的加强而欢欣鼓舞。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bea08515aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
