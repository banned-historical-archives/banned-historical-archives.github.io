script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"打归缓可稍为推退","alias":"","parts":[{"type":"paragraph","text":"打归绥可稍为推迟！"},{"type":"paragraph","text":"（1948年10月29日）杨、李、李："},{"type":"paragraph","text":"酉俭电?悉。（一）你们打归绥的时间可以稍为推迟，待打公庙的部队回来，集结三个纵队，然后对归绥举行攻击。（二）所谓三面向你们夹击是不可能的。（三）十六军、三十五军、九十四军、骑四师、骑十二旅现正向石家庄进攻，我杨罗耿南下对付该敌，尔后即在平保线?作战，我东北两个纵队、三个独立师、一个骑兵"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第三兵团司令员杨成武、政治委员李井泉和副政治委员兼政治部主任李天焕的电报。"},{"type":"paragraph","text":"[2]指1948年10月28日12时杨成武、李井泉、李天焕给中共中央军委的电报。电报说：据贺龙、张宗逊27日6时电，蒋介石命令包头、绥、榆三处之敌三面夹攻杨部已完成准备，待命出发。另据俘称，宁马骑兵一部已到五加河西。我一纵及六纵十六旅集结于察素齐等地区；二纵以四个步兵团及两个骑兵团，今日西进奔歼公届之敌，另以两个团于包头；六纵主力位于鄂尔格逊、巴拉盖地区机动。我们现在萨县附近。攻取归绥城，我们单独执行有把握，但打援无力量。二兵团南进后，敌援绥兵力有可能在两个军以上。"},{"type":"paragraph","text":"[3]归绥，旧市名，即今内蒙古呼和浩特。[4]公庙，位于内蒙古乌拉特前旗东部。"},{"type":"paragraph","text":"[5]杨罗耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。师不久出冀东威胁平津。在此种情况下，敌很难以两个军援绥\"。"},{"type":"paragraph","text":"军委二十九日二十四时"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":134,"page_end":135},"tags":[{"name":"杨成武","type":"人物"},{"name":"李天焕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9000aad1d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
