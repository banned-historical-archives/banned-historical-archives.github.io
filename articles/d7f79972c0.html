script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判右倾思想　充分挖掘潜力　广东普遍检查和修订了生产计划","authors":["汤戈夫"],"dates":[{"year":1957,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判右倾思想　充分挖掘潜力"},{"type":"paragraph","text":"广东普遍检查和修订了生产计划"},{"type":"paragraph","text":"本报讯　广东各地最近经过传达和贯彻中央关于“想尽一切办法，争取今年农业大丰收”的指示后，批判了右倾思想，对原定的生产计划进行了检查和修改，使生产计划能够真正切合实际，起到计划指导生产的作用。"},{"type":"paragraph","text":"惠阳专区原计划今年粮食总产量四十一亿八千万斤，现在改为四十三亿五千五百万斤；花生原计划种植面积五十五万亩，现提高至六十五万亩，总产量九十九万五千担；生猪生产要求今年内发展到二百十万头，平均每户养猪二头。汕头专区提出今年粮食总产量要达到五十一亿一百四十八万斤。其它地区也都对今年的各项生产指标作了修改。"},{"type":"paragraph","text":"各地修订生产计划，都是以“想尽一切办法”的精神，经过认真的讨论，充分挖掘潜力的基础进行修改的，所以比原定计划更加切合实际。如博罗县委根据去冬今春进行了大规模的水利建设，新建九宗大型水利工程和一百八十八宗中型水利，受益面积达二十多万亩；小型水利四千五百多宗，可消灭去年受旱面积二十六万亩的80％；今年将改良土壤提高低产田的亩产量，以及采取其它措施适当提高单位面积产量等，总共今年可增产稻谷四十万担等条件，将原订生产稻谷三百二十八万零六十七担的计划，改为三百三十五万三千八百零三担，比去年增产12.8％，比原计划增产2.2％。"},{"type":"paragraph","text":"各地在修订生产计划的同时，都提出了保证完成计划的措施。韶关地委决定派出九个地委委员、部长、副部长、副专员到九个县担任县委书记，切实加强对农业生产的领导，抽调地、专机关四百多名干部下乡长期帮助工作外，并提出当前突出的任务是：改造低产田，单造改双造，增加积肥量，和积极推行技术改革等措施，来保证达到增产增收的要求。"},{"type":"paragraph","text":"（汤戈夫）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7f79972c0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
