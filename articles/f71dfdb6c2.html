<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"cnd","name":"文革博物馆","internal":false,"type":"db","official":false,"author":"","article":{"title":"呼吁对卞案不追究当事者个人责任，只公布真相","authors":["唐燕"],"dates":[],"comment_pivots":[],"comments":[],"is_range_date":false,"description":"","page_start":0,"page_end":0,"parts":[{"text":"文革冤案难以数计，四十多年了，其中的绝大多数都已灰飞烟灭。","type":"paragraph"},{"text":"但在文革首善之区的首例打死校长的卞仲耘案不同，它一直受到国内外最广泛的关注，自刘进宋彬彬道歉以来，卞案更引发了经久不衰的热议。更为重要的是，与大多数文革苦主不同，王晶垚老人当时就留下了不少证据，而且至今仍一如既往地怀着理所当然的求真相的执着追求。","type":"paragraph"},{"text":"王晶垚老人的时间不多了，广大民众已经关注、等待了四十多年了！","type":"paragraph"},{"text":"文革刚结束时，我们处理文革冤案采取的是“宜粗不宜细”的原则，是以组织审查取代法律审判的方式。这是当时的形势使然，更是一个巨大的历史遗憾。","type":"paragraph"},{"text":"现在弥补这一遗憾的最有效方式莫过于用法律手段还清历史旧账。民众和解及历史正义只能建立在历史真相的基础之上，而历史真相只能由检察院立案调查。","type":"paragraph"},{"text":"可是据网友小熊说：","type":"paragraph"},{"text":"“八五事件需要检察院立案，王晶垚老人作为原告的一方已经尽了最大的努力，这正是老人最早的思路。","type":"paragraph"},{"text":"根据我在网上读到的材料，这条路王晶垚老人走过了艰难的十年，没有走通。１９７９年，王晶垚提交给检察院的起诉书第一是要求调查和处理直接的凶手，其次才是控告一个挟私报复制造伪证的校外人员袁淑娥，西城区人民检察院以事件”逾期“为由，下达”不予起诉决定书“拒绝立案。王晶垚继续上告了九年，我想他是动用了自己的各种关系，通过各种可通的渠道（普通人可能做不到，既没有他的韧性也没有他的能量），几经曲折，最后他告到全国人民代表大会，１９８９年，最高人民检察院答复全国人民代表大会七届人大二次会议，依旧以事件”逾期“为由，认为北京市西城区人民检察院的免予起诉决定”应予维持“（１９８９年４月２日高检字第１０１号）。","type":"paragraph"},{"text":"王晶垚老人肯定是比我们任何人都希望此事能进入法律程序，２０多年前他就将自己的希望付诸实施，全力以赴，在高检的这份文件上，老人写下”法治其名，人治其实，官官相护，何患无词“。","type":"paragraph"},{"text":"据冯翔《我，没有忘记历史》一文中说：","type":"paragraph"},{"text":"“胡志涛的儿子回忆，１９８０年代初期，追查文革”三种人“时，公安局曾经找到胡志涛调查。胡志涛问：你们能保证追究到我说的每一个人吗？如果不能保证，我就不说。”他对我说，实际上公安局已经锁定了具体人。但他母亲担心如果追究起来会有替罪羊顶罪。“","type":"paragraph"},{"text":"由此看出，在八十年代初公安局就对卞案立案调查过，并已获取了相当的材料。现在即使这些材料需要完备也轻而易举：这些年王友琴、刘进们都做过调查、回忆，并收集到了更多较为详实的材料；与其它文革冤案中不少当事者、证人已去世不同，卞案中当年年龄尚小的中学生打手及目击者们现在都还活着，她们能够履行其作证义务。","type":"paragraph"},{"text":"虽然按照我国《刑事诉讼法》的有关规定，卞案早就”已过追诉时效期限“，为卞案重新立案的确非常有难度。但是我国《刑事诉讼法》第一章第１５条规定：“犯罪已过追诉时效期限的”“不追究刑事责任，已经追究的，应当撤销案件，或者不起诉，或者终止审理，或者宣告无罪”。","type":"paragraph"},{"text":"其实，王晶垚老人只是想求真相，不是非要把当年未成年的“真凶”“置于死地”。所以，有关部门是不是可以按照此第１５条的规定，在宣告“打手”无罪的基础上公布卞案真相？即使这样做不符合规定，既然卞案有着特殊性，能否特事特办，以便给王晶垚老人、给所有文革苦主文革受害者、给广大民众一个交代、一些慰藉呢？","type":"paragraph"},{"text":"吁请所有关注此事的人，特别是刘进宋彬彬们、王友琴及其支持者们摒弃前嫌、团结一致，为有关部门公布卞案真相而努力。□ 原载《共识网》————————————————————————————————————本期编辑：      《华夏文摘》执行编辑：      《ＣＮＤ》总编：华新民（美国）    思语（美国）           陈天寒（美国）————————————————————————————————————\u003c/pre\u003e\u003c/html\u003e","type":"paragraph"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f71dfdb6c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
