ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给谭天佑的信","alias":"","parts":[{"type":"paragraph","text":"给谭天佑的信"},{"type":"paragraph","text":"（1950年4月19日）天佑兄："},{"type":"paragraph","text":"来信并附天民同志照片收到，极为感谢。天民同志为革命事业牺牲生命，深为悼念。尚望吾兄努力进修，多做与人民有益的工作。"},{"type":"paragraph","text":"此复，敬颂康吉！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年四月十九日"},{"type":"paragraph","text":"[1]谭天佑，湖南省韶山市韶山乡竹鸡村人。当时在湘潭市大利生店分销处当店员，后曾在湘潭市副食品公司等单位工作。"},{"type":"paragraph","text":"[2]天民，即谭天民（1907—1927），谭天佑的胞兄。原为乡村教师，1925年加入中国共产党，曾任湘乡县农民协会委员长、中共茶陵特委书记等职。1927年10月被国民党茶陵县政府杀害。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":4,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":296,"page_end":296},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbde7c61a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
