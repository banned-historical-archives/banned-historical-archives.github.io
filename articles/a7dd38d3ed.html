tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为保卫毛主席的革命路线战斗一辈子","authors":["张健","通信兵毛泽东思想学习班"],"parts":[{"type":"paragraph","text":"世界上什么人最亲？伟大的领袖毛主席最亲。世界上什么最幸福？见到了伟大的领袖毛主席最幸福。"},{"type":"paragraph","text":"十一月十四日，我见到了全世界革命人民心中最红最红的红太阳毛主席。看到毛主席他老人家精神焕发，身体那样健康，精力那样充沛，我激动得热泪一股劲地往外涌。多少话想说啊，多少歌想唱！我使出全身的力量鼓掌欢呼，欢呼毛主席万岁！万万岁！敬祝毛主席万寿无疆！万寿无疆！万寿无疆！万寿无疆！"},{"type":"paragraph","text":"毛主席的接见，使我回忆起多少往事啊！参加革命以来，我两次见到了最最伟大的领袖毛主席。第一次是一九四七年二月，在延安飞机场上。那是炮火纷飞的战争年代，我看到了我们日夜想念的伟大领袖毛主席。毛主席的接见，使我受到了极大的鼓舞，浑身充满了力量。我怀着对毛主席的无限热爱，对蒋介石匪帮的刻骨仇恨，紧跟着最高统帅毛主席勇敢战斗。当时只有一个心眼：为了保卫毛主席，就是牺牲生命，也心甘情愿。"},{"type":"paragraph","text":"毛主席啊，毛主席！您是我们心中永远不落的红太阳！今天，在您老人家亲自发动和领导的无产阶级文化大革命取得决定性伟大胜利的大好形势下，我又幸福地见到了您老人家，我的心情倍加激动，千言万语说不尽我对您老人家的无限热爱，无限忠诚，无限信仰，无限崇拜。我决心以实际行动来回答您老人家对我们的最大关怀。一定要更高地举起您老人家光辉思想的伟大红旗，坚决斗私批修，把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"毛主席啊，毛主席！您老人家亲自发动和亲自领导的无产阶级文化大革命，使我受到了极大的锻炼和深刻的教育。我深深懂得：您老人家的无产阶级革命路线，指引我们奔向共产主义。中国赫鲁晓夫制定和推行资产阶级反动路线，是妄图在我国实行资本主义复辟，叫我们重新当牛作马，受地主、资本家压榨和剥削。我恨透了中国赫鲁晓夫，恨透了党内一小撮走资本主义道路当权派。我要坚决遵循您老人家的伟大教导，狠斗“私”字，猛批“修”字，为保卫您老人家，保卫您老人家的光辉思想，保卫您老人家的革命路线战斗一辈子。"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7dd38d3ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
