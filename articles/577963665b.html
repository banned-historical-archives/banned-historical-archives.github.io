script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"联系两条路线斗争实际认真读书  罗源县委成员增强执行毛主席革命路线和政策的自觉性","authors":[],"dates":[{"year":1972,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"联系两条路线斗争实际认真读书"},{"type":"paragraph","text":"罗源县委成员增强执行毛主席革命路线和政策的自觉性"},{"type":"paragraph","text":"据新华社福州一九七二年十二月六日电  中共福建省罗源县委领导成员在批修整风中，结合两条路线斗争实际，认真读马列的书和毛主席的书，增强了执行毛主席革命路线和政策的自觉性，推动了全县革命和生产的发展。"},{"type":"paragraph","text":"罗源县委的七名领导成员，都经过比较长期的革命斗争锻炼，在工作中有一定的经验，也有一些犯错误的教训。在批修整风中，大家联系过去的经验教训谈了自己的体会，都认为，干革命单凭朴素的阶级感情，光有良好的主观愿望是不够的，只有认真读马列和毛主席的书，弄通马克思主义，才能在阶级斗争和路线斗争中，自觉执行毛主席的革命路线和政策。"},{"type":"paragraph","text":"县委成员在学习中，结合阶级斗争和路线斗争的实际，认真思考问题，运用马克思主义理论，指导三大革命运动的实践。他们谈到这个县过去在发展中走过的一段道路，从中总结经验，加深理解。罗源县背山面海，气候温和，四季常青，有发展粮食生产和多种经营的良好自然条件。但是一九六八年以前，这个县的农业生产一直上不去。原因在那里？县委领导成员曾经分头跑遍了全县十一个公社、一百八十多个大队，进行调查研究。他们在起步公社起步大队了解到，由于这个大队狠抓了阶级斗争，批判了资本主义倾向，广大群众发动起来，掀起农业学大寨的群众运动，一九七○年粮食平均亩产达到八百五十九斤，改变了连续四年徘徊不前的状况。通过调查研究，他们增强了阶级斗争和路线斗争观念，进一步发动群众在全县深入开展思想和政治路线方面的教育，批判资本主义倾向，巩固和壮大了集体经济。去年，全县第一次普遍大面积种植了双季稻，并且获得了丰收，全县粮食总产量和亩产都创造了历史最高纪录。联系到这些事实，大家在学习《共产党宣言》、《国家与革命》时，对于马克思主义关于阶级、阶级矛盾和阶级斗争的理论，对于我党在整个社会主义历史阶段的基本路线，有了进一步的体会。"},{"type":"paragraph","text":"今年以来，罗源县委领导成员在认真读书的过程中，进一步分析了农村的情况，联系各地在落实政策中的问题，从理论上分清是非界限，澄清一些糊涂观念，批判刘少奇一类骗子的修正主义路线，提高了执行政策的自觉性。在提高政策水平和思想认识的基础上，县委组织了落实政策调查小组，分头到全县各社、队进行调查研究，帮助基层干部提高政策水平，进一步促进了政策的落实。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"577963665b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
