script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"ad5abecd-54e6-488a-8bc0-1c720f757f33","name":"哪个东方才是红的？毛主义在苏联及东欧的存在（1956-1980）","internal":false,"official":false,"type":"pdf","author":"安德鲁·M·斯密斯","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/ad5abecd-54e6-488a-8bc0-1c720f757f33.pdf"],"article":{"title":"结论：对历史和东欧马克思主义单一的神话的质疑","alias":"","parts":[{"type":"paragraph","text":"结论：对历史和东欧马克思主义单一的神话的质"},{"type":"paragraph","text":"疑"},{"type":"paragraph","text":"“历史是这样创造的：最终的结果总是从许多"},{"type":"paragraph","text":"单个的意志的相互冲突中产生出来的，而其中每一"},{"type":"paragraph","text":"个意志，又是由于许多特殊的生活条件，才成为它"},{"type":"paragraph","text":"所成为的那样。这样就有无数互相交错的力量，有"},{"type":"paragraph","text":"无数个力的平行四边形，而由此就产生出一个总的"},{"type":"paragraph","text":"结果，即历史事变，这个结果又可以看作一个作为"},{"type":"paragraph","text":"整体的、不自觉地和不自主地起着作用的力量的产"},{"type":"paragraph","text":"物。”一一弗里德里希·恩格斯，《至约瑟夫·布"},{"type":"paragraph","text":"洛赫的信》，摘自《历史唯物主义》（莫斯科：进"},{"type":"paragraph","text":"步出版社，1972）第294页"},{"type":"paragraph","text":"在考察了毛主义在六个国家的历史及它们与毛主义在全球60年代的广泛联系以及冷战期间苏东阵营内对异议倾向的主流理解后，情况如何呢？"},{"type":"paragraph","text":"我这项研究的儿乎所有发现都是源自主流文献的边缘：在政府的声明或文件中，在汇编文本中，在有关苏联或中国的更广泛的历史的文本的小段落中，在最新发表的期刊文献中以及一些尚未翻译成英文的作品中。尽管如此，这些文件像我们展示了这样一幅图景：当苏联和东欧的一些人听到了中国歌曲“东方红\"后，看着他们周围的环境，问道“哪个‘东方'才是“红色的'？苏东集团的东方还是东亚？”尽管东欧集团国家的大多数公民只能勉强维持一种被动的生活，完全避开政治，但仍有少数人：受到经济改革和激进的共产党员被边缘化这两个现象的刺激，采取了坚定、明确的立场来表明他们所在的“东方\"并不是红色的。"},{"type":"paragraph","text":"东欧学界对于马克思主义的理解并不是统一的。尽管大多数情况下对马克思主义的理解是在执政党的路线引导下进行的，但仍有很大的空间让集团内所有国家的学者去遵循其他的解释和总结。为什么这种情况在西方学术界没有得到更广泛的讨论？"},{"type":"paragraph","text":"想要听到毛主义故事中主人公的声音当然很困难。许多档案继续对学者关闭，参与这些事件的大多数人要么已经死了，要么过看平静、谨慎的暮年生活，没有参与政治活动或历史保存。不过，止如我在讨论苏联的反修正主义时所说的那样，有一些学术研究正在展开。由斯洛波迪安（Slobodian）和塔卡克斯（Takacs）等学者撰写的长篇新文章表明，对东欧毛主义的英文报道正开始慢慢传播开来。德国和俄罗斯的学者开始编撰与这些运动有关的文献和期刊，并将它们上传到网络上，通晓他们语言的人可以很轻松的获取这些信息。"},{"type":"paragraph","text":"然而，这个过程的速度需要加快。必须有更多的学者愿意编纂这些作品和文件并将其翻译成英文，这些努力必须协调起来，以形成更连贯的史学。关于苏联和苏东集团的异见，西方主流学术话语几乎全部集中在主张通过亲西方，用自由民主的观点来解决社会病的意见观点上。普通大众可以接触到的历史是萨哈罗夫和索尔仁尼琴等人的故事。而那些经常失去自由和生计、以共产主义理论反对各自国家政权而艰苦奋斗的人的历史在哪里？通过发布那些在苏联和东欧的共产主义异见人士的新历史，我们可以更好理解这些国家在跨国层面上展开的社会运动的细微差别，以及这些国家的人们是如何在一个激动人心、充满活力的历史时刻、理解自己与世界其他地区的联系。"}],"authors":["安德鲁·M·斯密斯"],"dates":[{"year":2017}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":67,"page_end":68},"tags":[{"name":"毛主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9397cca6f1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
