al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"在讨论“比例选举制为大会政纲之一”的议案时的讲话","alias":"","parts":[{"type":"paragraph","text":"在讨论“比例选举制为大会政纲之一”的议案时的讲话！"},{"type":"paragraph","text":"（1924年1月29日）"},{"type":"paragraph","text":"现时比例选举制系少数党所运动出来的结果。本党为革命党，凡利于革命的可采用，有害于革命的即应摒弃。比例制有害于革命党，因少数人当选即有力量可以破坏革命事业，是予少数派以机会也。本席根本反对本案，以为不能讨论，不能表决。"},{"type":"paragraph","text":"比例选举制虽为社会党所赞成，但当其未成功时固是如此，若成功后即不尽然。此制很有害于革命之本身，盖以自由给与反对党，革命事业便十分危险。"},{"type":"paragraph","text":"[1]1924年1月29日，国民党召开全国代表大会讨论“比例选举制为大"}],"authors":["毛泽东"],"dates":[{"year":1924,"month":1,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":85,"page_end":85},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98e2afbc40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
