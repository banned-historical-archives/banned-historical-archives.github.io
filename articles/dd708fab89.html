,"dates":[{"year":1969,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"林副主席最忠于伟大领袖毛主席"},{"type":"paragraph","text":"通信兵某部二营全体指战员"},{"type":"paragraph","text":"党的第九次全国代表大会一致通过了林副主席代表党中央所作的政治报告和中国共产党章程。党的章程明确规定了林副主席是毛主席的接班人。这是我国政治生活中具有伟大意义和深远影响的历史事件，这是无产阶级文化大革命的伟大胜利，是马克思主义、列宁主义、毛泽东思想的伟大胜利。它说出了我们的心里话，反映了我们的强烈愿望，我们最坚决地拥护。"},{"type":"paragraph","text":"林副主席是毛主席最亲密的战友，最优秀的学生，最理想的接班人。从井冈山上点起革命的火种到天安门城楼检阅文化革命大军，在四十多年的党内两条路线斗争中，林副主席坚定不移地站在毛主席一边，同陈独秀、王明等的“左”右倾机会主义路线，尤其是同以刘少奇为代表的反革命修正主义路线，进行了长期的不调和的斗争，最忠诚、最坚决、最勇敢地捍卫了毛泽东思想和毛主席的革命路线。林副主席领导和组织毛泽东思想的大普及运动，使亿万工农兵群众迅速地掌握了马克思列宁主义、毛泽东思想。林副主席的伟大革命实践，为全党、全军、全国人民树立了无限忠于毛主席、无限忠于毛泽东思想、无限忠于毛主席革命路线的光辉典范。"},{"type":"paragraph","text":"林副主席是我们最好的副统帅。从南昌起义到平型关大捷，从辽沈战役到海南岛的解放，林副主席忠实、积极、创造性地贯彻和运用毛主席的军事路线，不论在人民军队的建设中，或是在粉碎国民党反动派的“围剿”、打败日本侵略者和消灭蒋家王朝的战争中，都为党为人民立下了不朽的功勋。在我军建设的过程中，林副主席又遵照毛主席的伟大指示，亲自主持制定了《中共中央军委扩大会议关于加强军队政治思想工作的决议》，继承和发扬了古田会议决议的革命精神，指明了在无产阶级专政下我军建设的根本方向。我们伟大领袖毛主席高度地赞扬了林副主席，他老人家说：“四个第一好，这是个创造。解放军的思想政治工作和军事工作，经林彪同志提出四个第一、三八作风之后，比较过去有了一个很大的发展，更具体化又更理论化了。”"},{"type":"paragraph","text":"敬爱的林副主席曾经视察过我们营，给了我们无穷无尽的力量。几年来，我们深入持久地开展以林副主席为榜样，永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席无产阶级革命路线的群众运动，坚决贯彻毛主席的无产阶级建军路线，执行林副主席一系列政治建军的方针原则，坚定不移地开展创造四好连队运动，加强了思想革命化建设。我们一定认真地、刻苦地活学活用毛主席关于无产阶级专政下继续革命的伟大学说，全面落实“九大”提出的各项战斗任务，夺取更大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd708fab89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
