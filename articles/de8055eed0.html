:["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/e7f7880a-12b6-4450-992d-72b1be2d1385.pdf"],"article":{"title":"第二版序言","alias":"","parts":[{"type":"paragraph","text":"第二版序言"},{"type":"paragraph","text":"本版除了个别的文字上的修改，和第一版没有什么不同。尽管这是一本和俄国“马赫主义者”进行论战的著作，可是我希望，它作为一本介绍马克思主义哲学（即辩证唯物主义）以及介绍从自然科学的最新发现中所得出的哲学结论的参考书，将有所神益。至于波格丹诺夫的一些近作，我没有机会阅读，书末附载的涅夫斯基同志的文章提出了必要的意见12。涅夫斯基同志不仅是一位宣传家，而且特别是一位党校工作者，因此，他有充分的可能确信，波格丹诺夫在“无产阶级文化”的幌子下偷贩着资产阶级的反动的观点。"},{"type":"paragraph","text":"尼·列宁1920年9月2日"}],"authors":["列宁"],"dates":[{"year":1920,"month":9,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":15,"page_end":15},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de8055eed0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
