tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"韶山毛泽东纪念园建成","authors":["刘春贤/齐培根"],"parts":[{"type":"paragraph","text":"据新华社长沙12月26日电 （刘春贤、齐培根）韶山毛泽东纪念园经过一年多的施工建设，现已竣工。今天，韶山市举行纪念毛泽东诞辰102周年大会暨毛泽东纪念园开园典礼。"},{"type":"paragraph","text":"纪念园位于毛泽东故居以北约500米处，占地面积20万平方米。纪念园内兴建了毛泽东近半个世纪革命生涯中亲身经历过的地区的自然和人文景观，包括湖南一师井亭、韶山毛泽东故居、嘉兴南湖游船、武汉农民运动讲习所、井冈山茅坪八角楼、井冈山黄洋界纪念碑、瑞金沙家坝水并、遵义会议旧址、泸定桥、延安宝塔、枣园窑洞、西柏坡毛泽东故居等。"},{"type":"paragraph","text":"湖南省委书记王茂林为纪念园开园剪了彩，毛泽东的家人邵华等参加了纪念活动。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e3336f3be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
