tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"正确看待“文革”中入党的党员","authors":[],"parts":[{"type":"paragraph","text":"应该说，“文革”期间入党的党员，大多数同志是好的和比较好的。衡量他们是否符合党章规定的标准，主要看十一届三中全会以来本人在各方面的实际表现。中央关于整党的《决定》指出：“广大青年党员具有思想活跃、勇于创新、朝气蓬勃的特点。但是，他们当中大多数人很少了解马克思主义的基本理论和党的基本知识，缺乏革命实践和党内政治生活的锻炼。由于他们在自己的世界观形成时期，思想上受十年内乱期间无政府主义等消极现象的影响，一般地说，他们正确鉴别政治是非的能力比较薄弱。在这次整党中，要十分注意提高他们的思想政治觉悟，增强他们的党性锻炼，提高他们抵制资本主义思想腐蚀的能力，使他们尽快地成熟起来，能够真正担负起党的事业继承者的历史重任。”这就是我们对待“文革”期间入党党员的根本指导思想和态度。（摘自青海《党的生活》1984年6期）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9778499c82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
