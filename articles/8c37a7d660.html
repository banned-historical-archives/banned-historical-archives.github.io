<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地主席号召文艺工作者高举革命旗帜反对帝国主义和修正主义的文化渗透","authors":[],"dates":[{"year":1965,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社雅加达28日电　印度尼西亚共产党主席艾地号召印度尼西亚革命文艺工作者反对帝国主义和现代修正主义的文化渗透。他说，反对现代修正主义文化渗透的任务是一切革命力量的任务。"},{"type":"paragraph","text":"艾地在二十七日晚上这里开始举行的一次文艺座谈会上发表了这次讲话。这个座谈会是为纪念印度尼西亚第一次革命文学艺术会议召开一周年而举行的。"},{"type":"paragraph","text":"艾地说:“让我们继续高举革命文艺的旗帜，开展革命攻势，让我们把革命形势推向高峰。”"},{"type":"paragraph","text":"艾地在回顾一年来印度尼西亚革命文艺的成就时说:革命文学艺术会议的决议提高了人民的警惕性，提高了他们的战斗力，从而使人民的革命攻势日益强大。他指出，在文化领域内，对美帝国主义文化侵略的打击愈来愈沉重。人民并不仅只满足于打击美国电影，他们还对文化领域内的美国产物发动进攻，焚烧了大批的颓废歌曲的录音带和唱片，到处都对奇装异服、怪异发型和各种败坏道德的音乐和舞蹈采取了行动。"},{"type":"paragraph","text":"他说:“随着政治警惕性的日益提高，人民对现代修正主义者毒化文化的危险的警惕性也日益提高。人民越来越了解到，不仅在政治领域，而且在文化领域，现代修正主义者是帝国主义者的雇佣军，是被用来瓦解革命人民的反帝战斗力和反帝精神的。因此，同反对帝国主义文化渗透的任务一样，反对现代修正主义者文化渗透的任务，不仅是共产党人的任务，而且也是非共产党人的革命人士的任务。总之，是一切革命力量的任务。”"},{"type":"paragraph","text":"艾地说:“印度尼西亚共产党已经和继续远远地抛弃古典和现代的修正主义，远远地抛弃古典和现代的教条主义，反对世界主义(主张抛弃各民族传统的资产阶级反动理论——编者)和沙文主义(把本民族看得高于一切、主张奴役其他民族的资产阶级反动理论——编者)。”"},{"type":"paragraph","text":"艾地在讲话中赞扬一年来革命文艺工作者所取得的成就。他说，在革命文学艺术会议召开之后，涌现了更多更具有群众性的为工农兵服务的新作品。特别是关于农民的文学和艺术作品，有了令人振奋的进步，许多文学家和艺术家同农民一起生活和参加他们的革命斗争。"},{"type":"paragraph","text":"他号召文艺工作者不断学习、宣传和在行动中贯彻马克思列宁主义，此外还要学习、宣传和贯彻苏加诺总统有关文化问题的演说中的正确思想。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c37a7d660"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
