合起来并肩战斗","authors":[],"dates":[{"year":1967,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在击退资产阶级反动路线新反扑的战鼓声中，革命造反派风起云涌。上海中等学校革命教职员工也杀出来了，建立了革命造反组织，向资产阶级反动路线猛烈开火。一月十七日，中等教育系统广大革命教师、教育机关革命干部和红卫兵小将联合集会，愤怒揭发批判上海教育界党内一小撮走资本主义道路的当权派所推行的一条修正主义教育路线。"},{"type":"paragraph","text":"会上揭露的大量事实证明，长期以来，上海中等教育系统，在党内一小撮走资本主义道路当权派的把持下，不突出政治，不突出毛泽东思想。他们对毛主席的教育思想、教育方针阳奉阴违，多方抵制。毛主席教导说:“我们的教育方针，应该使受教育者在德育、智育、体育几方面都得到发展，成为有社会主义觉悟的有文化的劳动者。”党内一小撮走资本主义道路的当权派却强调学生要以主要精力放在读书上，反对学生和工农相结合，反对他们参加三大革命运动。他们甚至胡说什么提高青少年思想觉悟，不能立竿见影，不能空讲阶级觉悟，以此来抵制和排除无产阶级的政治教育。更为严重的是，市委和教育系统一小撮走资本主义道路的当权派，假借贯彻毛主席关于教育工作的指示，以减轻学生负担为名，打着“教学改革”、“全面发展”的旗号，解散学生的毛主席著作学习小组，使一些学校已经形成的学习毛主席著作的群众运动冷了下去。他们还反对学生参加课外政治活动，推行智育第一。升学至上的反革命修正主义的教育路线。"},{"type":"paragraph","text":"在无产阶级文化大革命中，党内一小撮走资本主义道路的当权派和顽固执行资产阶级反动路线的人，自己不革命，还不许群众革命。他们颠倒黑白，混淆是非，把敢于起来革命的群众打成“右派”、“反革命”、“反党分子”，煽动群众斗群众，压制革命师生的群众运动。不久前又玩弄新阴谋，在中等学校也刮起了一股发放“串连费”的妖风，唆使一批教师到外地去串连，妄图转移斗争大方向。"},{"type":"paragraph","text":"会上，革命教师和红卫兵小将代表群情愤慨，怒斥市委推行资产阶级反动路线的罪行。他们并倡议全市中等教育系统的革命造反派联合起来，广大的革命师生团结起来，奋起千钧捧，彻底摧毁隐藏在教育界的一条修正主义黑线，使毛泽东思想伟大红旗插遍教育界的每一个阵地。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"881962fde1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
