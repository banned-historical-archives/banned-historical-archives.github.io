<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"满载日本人民对毛主席的热爱和对中国人民的友谊  我东方红杂技团胜利结束访日演出回国","authors":[],"dates":[{"year":1967,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"满载日本人民对毛主席的热爱和对中国人民的友谊"},{"type":"paragraph","text":"我东方红杂技团胜利结束访日演出回国"},{"type":"paragraph","text":"新华社东京八日电　中华人民共和国东方红杂技团胜利地结束了为期两个月的访日演出，八日上午，满载日本人民对伟大领袖毛主席的无限崇拜的深情和中日两国人民在反对共同敌人美帝国主义斗争中结成的战斗友谊，由东京羽田机场乘飞机回国。"},{"type":"paragraph","text":"日中友好协会（正统）总部会长黑田寿男、日中友协（正统）东京都总部会长西川景文等日中友好团体的朋友和爱国华侨五百多人到机场欢送。"},{"type":"paragraph","text":"到机场欢送的还有来自京都、大坂、福岛、鸟取等远地的日本朋友。"},{"type":"paragraph","text":"日本朋友在机场上悬挂起巨幅横额标语，上边写着“战无不胜的毛泽东思想万岁！”日本朋友和爱国侨胞不断地挥舞着红彤彤的宝书《毛主席语录》，连续高呼：“毛主席万岁！万岁！万万岁！”一遍又一遍地高唱《大海航行靠舵手》等毛主席颂歌。"},{"type":"paragraph","text":"东方红杂技团在离开日本前夕，七日晚上在东京举行了盛大告别酒会。日本各地朋友和爱国华侨近七百人出席了酒会。"},{"type":"paragraph","text":"日中友好协会（正统）总部会长黑田寿男代表日中友协（正统）总部在会上致词，他指出，东方红杂技团的演出，在杂技艺术中具体地体现了伟大的毛泽东思想，反映了无产阶级文化大革命的胜利；也表现了七亿中国人民的反帝反修斗争的精神。"},{"type":"paragraph","text":"黑田指出，东方红杂技团在帮助日本人民理解毛泽东思想和无产阶级文化大革命方面，做出了贡献。"},{"type":"paragraph","text":"黑田指出，正当日中两国人民的友好关系日益加深的时候，日本政府的反华活动日趋露骨。黑田强烈地谴责了佐藤反动政府最近一系列的反华罪行。"},{"type":"paragraph","text":"黑田还愤怒地谴责了宫本修正主义集团最近时期所干的许多反华罪行。"},{"type":"paragraph","text":"黑田指出，无论美帝国主义、现代修正主义和日本的反动势力怎样诽谤和歪曲，中国无产阶级文化大革命必定取得完全胜利。"},{"type":"paragraph","text":"黑田最后满怀激情地敬祝毛主席万寿无疆。"},{"type":"paragraph","text":"在这次酒会上，日中文化交流协会理事长中岛健藏、日本国际贸易促进协会专务理事萩原定司也讲了话。"},{"type":"paragraph","text":"中华人民共和国东方红杂技团团长在酒会开始时首先讲了话。酒会上，宾主频频举杯祝福世界人民心中最红最红的红太阳毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"东方红杂技团在日本访问了北至北海道，南到九州岛等二十二个大中城市，演出了四十五场，有来自日本全国各地的十万观众观看了中国杂技艺术。"},{"type":"paragraph","text":"日本朋友盛赞这次演出的成功，是战无不胜的毛泽东思想的伟大胜利，是中国无产阶级文化大革命的光辉胜利，是日中两国人民战斗友谊的结晶。"},{"type":"paragraph","text":"各地日本朋友坚定地表示，今后一定要按着世界人民的伟大领袖毛主席的教导，进一步增强日中两国人民的战斗友谊，把日中友好运动继续推向前进。（附图片）"},{"type":"paragraph","text":"“东方红杂技团给我们带来了伟大的毛泽东思想”，这是日本朋友对在文化大革命中创造出来的崭新的中国杂技艺术的热情赞语。中国东方红杂技团在日本各地的成功演出，深刻体现了中日两国人民的革命友谊和战斗团结。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcebc08ec5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
