art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英元帅到会作了指示","authors":[],"parts":[{"type":"paragraph","text":"本报讯 历时十一天的炮兵战斗训练积极分子代表会议已于14日闭幕。"},{"type":"paragraph","text":"叶剑英元帅在闭幕式上作了指示。他说：去年是炮兵训练成绩最大的一年。今年应该继续巩固成绩，并把部队的技术水平提高一步。"},{"type":"paragraph","text":"叶剑英元帅说：科学一天天地发展，技术一天天地进步，如果我们只埋头在现有的技术装备中进行训练，我们的训练就会失去方向；但是，如果只看到将来，而不从现有的装备条件出发，那么我们就会脱离实际，同样要犯错误。他指出：一般条件下的训练和使用原子化学武器条件下的训练，不能截然分开，因为任何新的东西都是在旧的基础上发展起来的。他号召炮兵部队在现有装备的条件下，熟练地掌握手中武器装备，为将来作好技术准备，使训练与战备结合起来。"},{"type":"paragraph","text":"邱创成政委在闭幕词中说：在今年的训练中，要坚决贯彻“勤俭建军”的精神，加强训练中的思想工作。他强调指出：要圆满完成今年的训练任务，必须继续贯彻执行群众路线，大力开展优等射手和技术能手运动。"},{"type":"paragraph","text":"会上，炮兵领导机关奖励了一百零八个先进单位和六百五十五名积极分子代表，同时奖励了参加“人民炮兵”杂志社组织的炮兵军官射击竞赛优胜者一百五十四人，以及七十七件重要创造发明的有关人员。"},{"type":"paragraph","text":"会议期间，代表们通过典型报告、互相访问和分业座谈等活动，广泛地交流了经验。总政治部副主任甘泗淇上将曾经到会作了指示。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5104048224"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
