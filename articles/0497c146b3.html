" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——攻击肃反运动","authors":["北京矿业学院","李佩文","李国常","洪念祖"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——攻击肃反运动","type":"title"},{"text":"北京矿业学院洪念祖李佩文李国常","type":"authors"},{"text":"“胡风是个小资产阶级的革命者，要争取文艺界的领导权，这些人只是对毛主席延安文艺座谈会的讲话不满，胡风没有政治背景。胡风以前是用马列主义向蒋介石斗争，为革命出了不少力量。”（北京矿业学院　洪念祖）","type":"paragraph"},{"text":"“肃反运动比法西斯还坏，法西斯还没有拿自己人民那样斗，肃反时不知冤枉了多少人，谁要是自杀了还要说他是威胁人民的行为，是和人民对抗到底，难道没有冤枉死的吗？为什么在新社会里，大学生中有这么多人自杀，旧社会就少见。”（北京矿业学院  李佩文）","type":"paragraph"},{"text":"“肃反斗错了很多人，这不能不联系到党的肃反政策是错误的，全国肃反成绩是次要的，被斗的人是在思想上死亡了，道歉不能弥补这个损失，你们的政策就是宁可错杀一千，不可漏掉一个，肃反是没有根据就斗人，就是大胆怀疑，随便查别人的信，抓住一句话就追，结果没事，是昧着良心说话。”（北京矿业学院  李国常）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0497c146b3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
