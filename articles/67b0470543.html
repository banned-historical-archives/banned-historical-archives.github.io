rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广州部队第二季度上缴粮食66万斤","authors":["江青"],"parts":[{"type":"paragraph","text":"本报讯 广州部队今年第二季度向国家上缴粮食六十六万斤。这些粮食都是广大官兵在供给标准以内节余下来的。"},{"type":"paragraph","text":"广州部队除施工和边防分散执勤的单位以外，在不影响部队体质的前提下，适当地降低了粮食供给标准，军官也减少了购粮定量。仅这一项执行的结果，今年就可以为国家节约粮食二百九十余万斤。"},{"type":"paragraph","text":"在粮食保管工作上，给养工作人员创造了许多办法，减少了粮食的损耗。在炊事人员中推广了“蒸饭”“撒米下锅”等先进煮饭方法，少出或不出锅巴，增加了出饭量。有的单位还研究了部队官兵的饭量规律，根据气候和执行任务的情况下米，大大减少了剩饭。广大官兵在吃饭时也注意爱惜粮食，做到颗粒不剩。 （江青）"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67b0470543"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
