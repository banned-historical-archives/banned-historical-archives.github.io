hors":[],"dates":[{"year":1958,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社广州26日电】　毛主席23日曾在广州接见了奉调回国的印度驻华大使尼赫鲁及其夫人。"},{"type":"paragraph","text":"毛主席和尼赫鲁及其夫人作了长时间的友好、亲切的谈话。"},{"type":"paragraph","text":"尼赫鲁大使说；我带着中、印两国友谊日益增长的深刻印象回国。大使说:我的另一个深刻印象是中国获得的巨大进步。"},{"type":"paragraph","text":"毛主席说:希望印度很快地发展起来。所有赞成五项原则的国家，都希望能想尽一切办法，将近代化的工业，近代化的农业发展起来。"},{"type":"paragraph","text":"拉·库·尼赫鲁特命全权大使还对他在中国期间得到的充分合作表示感谢。毛主席说:你做得成功，加强了两国的友谊。"},{"type":"paragraph","text":"主席接见大使的时候，在座的还有中国人民政治协商委员会广东省委员会主席陶铸等人。"},{"type":"paragraph","text":"尼赫鲁大使及其夫人已在24日取道香港回国。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a42bec744"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
