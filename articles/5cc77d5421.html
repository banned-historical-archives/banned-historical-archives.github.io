rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周扬的“全民文艺”是修正主义的黑货","authors":["宣传干事杜戈平"],"parts":[{"type":"paragraph","text":"周扬三十年代喊出“国防文学”的口号，六十年代又打出“全民文艺”的旗帜，都是彻头彻尾的修正主义、资产阶级的黑货。"},{"type":"paragraph","text":"最近，我参观了著名的泥塑《收租院》，一百一十四个泥塑群象，十分生动逼真地把当年农民怎样被迫交租，怎样受地主和狗腿子种种残酷剥削和压迫，怎样在暗无天日的压榨下奋起反抗，都充分地表现了出来。这些为工农兵服务的无产阶级的艺术作品，革命人民看了无不感动。农民说：“这是替我们穷人说话的塑象，这是我们最欢迎的艺术！”但刘文彩之流的地主阶级，对我们这样的艺术，肯定是不欢迎不接受的。"},{"type":"paragraph","text":"另外还有一些泥塑品，那是旧社会里专门为封建王朝和地主阶级服务的泥菩萨。地主阶级用那些东西来愚弄劳动人民，使劳动人民服服贴贴地当牛作马，永远受他们的剥削和奴役。这是为封建地主阶级服务的艺术，劳动人民是决不欢迎的。不同阶级的艺术为不同的阶级服务，难道不是十分清楚的吗？"},{"type":"paragraph","text":"从这里，我更深刻地理解了毛主席文艺思想的伟大，只有在毛主席文艺思想指导下的文艺，才是真正为全世界革命人民服务的。而周扬的“全民文艺”，只不过是为资本主义在中国复辟，为少数资产阶级和牛鬼蛇神服务的黑文艺。"}],"alias":""},"tags":[{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cc77d5421"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
