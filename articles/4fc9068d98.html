r":1979,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理同拳王阿里亲切交谈"},{"type":"paragraph","text":"据新华社北京十二月十九日电  邓小平副总理今天在人民大会堂会见被誉为当代拳王的穆罕默德·阿里时，邀请他再次来中国访问。前世界重量级拳击冠军阿里今天中午抵达北京，对中国进行一天多的访问。当他见到邓副总理时，激动地拥抱着邓小平说，你为中国人民做了许多好事，我要拥抱你。"},{"type":"paragraph","text":"三十七岁的阿里出生于美国路易斯堡一个贫苦的广告画工家庭，一九六○年荣获在罗马举行的奥运会金质奖章，一九六四年成为世界重量级拳击冠军，此后一直在世界体坛享有盛名。"},{"type":"paragraph","text":"阿里对邓副总理说，他从十岁起就渴望访问中国，可惜这次访问的时间太短。他打算再来中国，并希望逗留三个星期。他说，他将在中国表演拳击，并尽他所能帮助中国培训拳击运动员。"},{"type":"paragraph","text":"邓副总理说，你对中国有深厚感情，非常欢迎你来访问，到各地多看看。拳击运动也可以成为增进中美两国人民的了解和友谊的渠道。"},{"type":"paragraph","text":"会见结束时，阿里对邓副总理说，我是一个美国黑人。美国黑人知道许多关于中国的情况。他说，他回去后将告诉美国公众，中国人民如何热情。（附图片）"},{"type":"paragraph","text":"邓小平副总理同被誉为当代拳王的穆罕默德·阿里亲切交谈。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fc9068d98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
