ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对苏联《论集体农庄所有制的发展前途》一文摘要的批语","alias":"","parts":[{"type":"paragraph","text":"对苏联《论集体农庄所有制的发展"},{"type":"paragraph","text":"前途》一文摘要的批语"},{"type":"paragraph","text":"（1959年9月6日）陈伯达同志阅，退毛。"},{"type":"paragraph","text":"此人根本不研究马、恩、列的思想，并且连斯大林公社必定是集体农庄的高级形式这一观点也否定。总之，作者认为公社无论何时都是有害无益的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月六日"},{"type":"paragraph","text":"[1]指中国驻苏联大使馆1959年9月3日给外交部、中共中央对外联络部报送的苏联经济学硕士H·格洛托夫《论集体农庄所有制的发展前途》一文摘要。这篇文章原载于1959年9月2日《苏维埃俄罗斯报》。该文最后提到公社，认为“借助于社会主义国家巩固集体农庄所有制，提高其公有化的水平，并不意味着将农业组合变成公社”，“而在共产主义下，公社作为一定所有制占有者的集体，也是不可能的，因为那时所有社会财富都是全民财产”。"},{"type":"paragraph","text":"[2]陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":349,"page_end":349},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14edd3e0b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
