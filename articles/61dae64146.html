ors":[],"dates":[{"year":1966,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"破资产阶级“权威”  闯技术革命新路"},{"type":"paragraph","text":"上海元件五厂职工创制成功冷凝器"},{"type":"paragraph","text":"本报讯　上海元件五厂职工发扬工人阶级的革命造反精神，大破资产阶级技术“权威”，打倒了少慢差费的淋水塔；大立无产阶级技术权威，创制了多快好省的冷凝器，既为国家节约了资金，又为降温不用地下水闯出一条新路。目前，这种冷凝器正在全市推广。"},{"type":"paragraph","text":"过去，上海元件五厂是用深井水降温的。上海市有关部门为了防止地下水位降低引起地面下沉，决定停止使用深井水。这个厂就建造淋水塔进行降温，并已施工。淋水塔体积四百立方米，体重一百五十吨，投资六万元。工人们发现这一情况，认为既不安全，又不经济，决心来个革命。他们四出调查访问，提出了建造冷凝器代替淋水塔的方案，并同抱住淋水塔不放的少数技术干部和资产阶级技术“权威”展开了严肃的斗争，进行了多次辩论。学习了毛泽东思想又具有丰富实践经验的工人群众，在厂党委的支持下，把“权威”们摆出的难题一一解决，把“权威”们发出的谬论条条驳倒，终于成功地造出了两台冷凝器。"},{"type":"paragraph","text":"这两台冷凝器与淋水塔比较：建造时间只有三分之一，投资只有五分之一，重量只有十八分之一，用电只有六分之一，用水只有一百五十分之一；降温能力更高，冷却面积更大。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61dae64146"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
