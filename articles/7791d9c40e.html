<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席的教育路线永放光芒","authors":[],"dates":[{"year":1967,"month":11,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的教育路线永放光芒"},{"type":"paragraph","text":"解放军北京部队机关无产阶级革命派"},{"type":"paragraph","text":"我们伟大的领袖毛主席历来重视无产阶级教育革命事业，去年向全国人民发出了伟大的“五·七”指示，最近又发出了最新指示：“进行无产阶级教育革命，要依靠学校中广大革命的学生，革命的教员，革命的工人，要依靠他们中间的积极分子，即决心把无产阶级文化大革命进行到底的无产阶级革命派。”这些指示都具有伟大的历史意义和战略意义，是我国教育事业的指针，是培养无产阶级革命事业接班人的根本措施。"},{"type":"paragraph","text":"教育是为政治服务的。资产阶级和他们的代理人，必定按照他们的世界观改造世界，按照他们的世界观培养和造就资产阶级的接班人。无产阶级也必定按照无产阶级世界观改造世界，按照无产阶级世界观培养和造就无产阶级革命事业的接班人。党内一小撮最大的走资本主义道路的当权派，一贯反对毛主席的无产阶级教育路线，反对毛主席“教育要革命”的伟大指示，竭力推行资产阶级和修正主义的教育路线。事实很清楚，他们是千方百计地同无产阶级争夺青年一代。就是在这个根本性的问题上，在教育战线上存在着两个阶级、两条道路、两条路线的尖锐斗争。我们伟大的领袖毛主席提出的无产阶级教育路线，是我国一切教育工作的指路明灯。“教育为无产阶级政治服务，教育与生产劳动相结合”，“使受教育者在德育、智育、体育几方面都得到发展，成为有社会主义觉悟的有文化的劳动者”的英明决策，是引导青年一代在阶级斗争、生产斗争和科学实验的三大革命运动的大风大浪中，逐步锻炼成长为无产阶级革命事业接班人的唯一正确道路。"},{"type":"paragraph","text":"教育革命也有两条路线。一条是靠少数所谓“权威”、“教授”去冥思苦想，进行所谓“改革”。事实证明，这一条是行不通的，是假改实不革。一条是毛主席相信群众、依靠群众的路线。按照毛主席的革命路线办事，依靠广大革命的学生、革命的教员、革命的工人，依靠无产阶级革命派，就一定能够真正地把教育革命搞好，建立起新的教育制度。一年多来的文化大革命证明，许多院校遵照毛主席的指示办事，已经结出了丰硕之果。我们军队遵照毛主席的伟大指示，一年多来，也结出了丰硕之果。毛泽东思想的大学校到处林立，毛主席的好战士到处涌现，广大指战员成为拿起枪杆能打仗，拿起锤子能做工，拿起锄头犁耙能种田，拿起笔杆子能写文章的亦军、亦工、亦农的毛泽东时代新型的战士。"},{"type":"paragraph","text":"毛主席的最新指示，给我们无产阶级革命派以新的光荣的战斗任务。我们坚决支持学校的广大无产阶级革命派，大胆破旧立新，彻底破除旧的教育制度，建立起闪耀着毛泽东思想光辉的无产阶级教育制度。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7791d9c40e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
