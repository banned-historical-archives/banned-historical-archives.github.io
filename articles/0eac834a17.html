script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"石家庄市委召开工作会议端正思想提高认识  批判极左路线认真落实政策","authors":[],"dates":[{"year":1980,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石家庄市委召开工作会议端正思想提高认识"},{"type":"paragraph","text":"批判极左路线认真落实政策"},{"type":"paragraph","text":"本报讯  7月7日《石家庄日报》第一版发表了石家庄市委召开落实政策工作会议的消息和社论。"},{"type":"paragraph","text":"消息指出：批判极左路线，肃清其流毒和影响，端正思想路线，是当前的重要任务。由于市委过去强调是同“四人帮”对着干的，对极左路线流毒和影响的危害认识不足，以致有许多问题没有解决好。本市大量的冤假错案是林彪、“四人帮”极左路线造成的恶果之一。不认识这一点，党的路线就不能顺利贯彻执行，党的政策也落实不了。林彪、“四人帮”极左路线的流毒和影响，是落实党的政策，搞好各项工作的主要障碍。只有彻底肃清极左路线的流毒和影响，端正思想路线，才能推动各项工作前进。不能认为落实政策的工作“差不多”了，应当看到，目前平反纠正冤假错案的任务是相当繁重的。要坚决、彻底、全部地平反纠正一切冤假错案。不管是那一级组织、那一个领导人定的、抓的，只要错了，都要实事求是地平反纠正。需一个人一个人的问题、一个案件一个案件地进行复查，切实把问题解决好。"},{"type":"paragraph","text":"社论强调：对于落实政策，平反纠正冤假错案是采取积极的态度还是消极的态度？是坚持到底还是草率收兵？这是衡量我们对党的三中全会、四中全会、五中全会制定的路线是否真心拥护的一个重要标志。不可否认，在党的三中全会之后，我市各级党组织同广大干部群众共同努力，在落实党的政策上做了大量工作，取得了不小的成绩。但是用党中央的要求来衡量，我们在这方面确实还存在不少问题，有些问题还相当严重：还有一定数量的冤假错案没有平反，已经平反的还有一些存在不落实的问题；一些在文化大革命中犯有严重错误又拒不认错，对三中全会、四中全会、五中全会精神仍然抱抵触、反对态度的人，还没有得到应有的处理；一些该解决而又可能解决的问题，还没有得到解决；有些老干部尚未得到妥善安排；一些热心社会主义事业而又富有才干的知识分子，还没有得到重用；有些人的问题在其它方面得到了解决，但还有大量的思想工作要做。这些问题的存在，影响了党的思想路线、政治路线和组织路线的贯彻落实，影响了干部群众积极性的发挥，也直接影响了四化建设的发展，以致使我市的工业生产和一些工作在一段时间内处于被动、困难的局面。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0eac834a17"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
