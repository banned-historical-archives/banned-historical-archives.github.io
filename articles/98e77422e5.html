<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东号  （中篇连载）","authors":["丁克辛　轻影","庄言"],"dates":[{"year":1950,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东号  （中篇连载）"},{"type":"paragraph","text":"丁克辛  轻影作  庄言插言"},{"type":"paragraph","text":"七、动起手来"},{"type":"paragraph","text":"要竞赛，首先要爱护机车。"},{"type":"paragraph","text":"有人提议要把机车加以擦洗装修。"},{"type":"paragraph","text":"司机长李永趁此机会就号召大家说："},{"type":"paragraph","text":"“战争时期公家困难，咱们不领擦车布，自己想办法。”"},{"type":"paragraph","text":"多数人赞成，少数人感到麻烦。"},{"type":"paragraph","text":"不过碍着老英雄的面子，还是从家里拿出麻袋、草帘子、破布来，动手擦洗。"},{"type":"paragraph","text":"还有人找来砖头瓦块，说："},{"type":"paragraph","text":"“把连杆（注一）也磨得亮亮的。”"},{"type":"paragraph","text":"“对！”大伙都说：“要干就干个彻底。”"},{"type":"paragraph","text":"大伙干得满有劲。"},{"type":"paragraph","text":"只有商宝恒和郑笃恭不乐意。老商心里想：“我答应比赛是比赛驾驶技术，谁还比赛擦车哩？司机可不干这种下等活！”因此他常常迟到或是不到，到了也是待干不干的看着别人擦。"},{"type":"paragraph","text":"郑笃恭本来就不想干，看老商，马上就跟着学样；有一回他甚至爬到车顶上，仰面一躺，架起两条腿，唱开小戏来。"},{"type":"paragraph","text":"老英雄看不惯这种人，心里光想发火，又怕得罪人家，负责制就更加负不成。"},{"type":"paragraph","text":"他就自己加油干，累得满头大汗，浑身油腻。"},{"type":"paragraph","text":"大家劝他："},{"type":"paragraph","text":"“老英雄，歇歇吧。”"},{"type":"paragraph","text":"他说："},{"type":"paragraph","text":"“不，咱们爱护机车，为的是要靠它吃饭，你以为光为了比赛嘛？”"},{"type":"paragraph","text":"说的有理，大家更加使劲干。"},{"type":"paragraph","text":"机车越擦越干净，越干净就干的越有劲。"},{"type":"paragraph","text":"胡春东并且提议道："},{"type":"paragraph","text":"“机车零件不全；也得想法装修装修。”"},{"type":"paragraph","text":"老英雄接应道："},{"type":"paragraph","text":"“这可是好意见，大伙意见怎么样？”"},{"type":"paragraph","text":"大伙儿都说："},{"type":"paragraph","text":"“行！负责制就得大伙儿负责。”"},{"type":"paragraph","text":"跑车回来，大家不休息，就到废铁堆里东一件西一件的去寻找，把车上不全的零件都安装好。"},{"type":"paragraph","text":"机车两边的风窗，一跑车就灌风，噎人嗓子，工厂一时顾不上修，大伙自己就想法安装起来。"},{"type":"paragraph","text":"跑车再不喝风啦。"},{"type":"paragraph","text":"这还不算，把前灯（注二）也装上了。"},{"type":"paragraph","text":"有了汽笛又装上风笛。"},{"type":"paragraph","text":"还不满足。不知是谁又找来一个灰暗灰暗的铜警钟，满是绿锈，看着很讨厌。郑笃恭就说："},{"type":"paragraph","text":"“过两天把你媳妇的月经带也会找来当宝贝啦。”"},{"type":"paragraph","text":"别人不理他，谁歇班谁就抱起它来擦。"},{"type":"paragraph","text":"今天擦，明天擦，没有几天擦得金光闪亮！装在车头上，进站出站翻着筋斗，当当的响起来。"},{"type":"paragraph","text":"又威风！又漂亮！"},{"type":"paragraph","text":"惹的全段工友们，都羡慕得心里发痒。"},{"type":"paragraph","text":"注一：连接大动轮的，也叫甩子。"},{"type":"paragraph","text":"注二：机车头前的大照灯。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98e77422e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
