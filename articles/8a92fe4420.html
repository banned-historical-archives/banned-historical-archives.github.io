" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-991","name":"劳动部关于曾在敌伪及国民党政府机关工作过的职工的工龄计算问题的复函","author":"劳动部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"劳动部关于曾在敌伪及国民党政府机关工作过的职工的工龄计算问题的复函","dates":[{"year":1963,"month":2,"day":9}],"is_range_date":false,"authors":["劳动部","河北省精简委员会办公室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 380-381","tags":[{"name":"敌伪","type":"主题/事件"},{"name":"工龄","type":"主题/事件"},{"name":"国民党","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"劳动部关于曾在敌伪及国民党政府机关工作过的职工的工龄计算问题的复函\n（一九六三年二月九日）\n河北省精简委员会办公室：\n      你们一九六二年十一月八日关于曾在敌伪及国民党政府机关工作过的职工的工龄计算问题的来函收悉。现简复如下：\n      一、过去曾在敌伪及国民党政府机关工作过的职工的工龄计算问题，在没有新的规定以前，仍应按照现行规定执行。即：职工凡是过去曾在敌伪及国民党政府机关当官吏(指担任委任级和委任级以上职务以及相当于委任级和委任级以上职务的)的时间，均一律不得计算工龄；当雇员和勤杂工、司机的，其这段工作时间，可以计算为一般工龄，但一律不得计算为连续工龄。在敌伪及国民党的报社、通讯社、广播电台工作过的人员的工龄，亦应比照上述人员的处理办法办理。\n      二、“敌伪及国民党政府机关”是指：敌伪及国民党政府的行政、立法、司法、考试、监察等机关，以及海关、税务所等税收机构。"},{"type":"paragraph","text":"三、曾在敌伪及国民党政府和四大家族举办的中央储备银行、中国联合储备银行，中央、中国、交通和农民等银行，邮政储金汇业局、中央合作金库、中央信托局等金融机构担任各种领导工作的时间，不计算工龄；没有担任领导工作的小职员和体力劳动者的工作时间，可以计算为一般工龄。"},{"type":"paragraph","text":"铁路局、电讯局、邮政局的职工的工龄，一般的可以按照劳动保险条例实施细则的有关规定办理。"},{"type":"paragraph","text":"四、职工曾在敌伪及国民党政府机关设置的兵工厂工作过的时间，在计算工龄时应当与在一般企业单位工作的时间作同样处理。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a92fe4420"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
