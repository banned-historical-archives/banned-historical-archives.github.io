:[{"year":1978,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"社会科学院举行凉山彝族奴隶社会问题讨论会"},{"type":"paragraph","text":"本报讯　中国社会科学院于五月三十日至六月二日举行了凉山彝族奴隶社会问题学术讨论会。参加会议的有北京地区从事考古、中国古代史、世界古代史和民族研究的理论工作者以及编写《凉山彝族奴隶社会》一书的同志共七十余人。大家在“百家争鸣”方针指导下，敞开思想，各抒己见，就解放前凉山彝族奴隶社会性质等问题进行了热烈的讨论，并对《凉山彝族奴隶社会》的编写提纲提了意见。"},{"type":"paragraph","text":"到会同志认为，川、滇两省交界处的大小凉山彝族，解放前还保留着现代世界上罕见的人类社会发展历史上的第一个阶级社会——奴隶社会。凉山彝族奴隶社会的客观存在，不仅证明了马克思主义关于奴隶社会是人类社会历史发展的必经阶段的论断的正确性，同时又以它自身的生动材料和鲜明特点丰富了我们对人类历史上奴隶社会形态的认识。因此，写出一部如实反映凉山彝族奴隶社会真正面貌的《凉山彝族奴隶社会》，是很必要、很有意义的。"},{"type":"paragraph","text":"会上，大家还就《凉山彝族奴隶社会》一书所涉及的一些重大理论问题，如亚细亚生产方式，奴隶和奴隶制的类型，解放前凉山彝族社会性质、发展阶段、族源，凉山彝族奴隶社会的形成、发展和演变及其长期存在的原因等问题，进行了认真的探讨。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a65bd7fa9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
