<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"唐山资本家在捐献运动中的表现值得注意","authors":[],"dates":[{"year":1951,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"唐山资本家在捐献运动中的表现值得注意","type":"title"},{"text":"【华北总分社二十二日讯】唐山市的大资本家和中小工商业者在捐献运动中表现不很好。他们想花很少的钱就得到爱国的名，最好藉此多赚点钱。他们的作法有二，或争取主动，先发制人，或等待观望，看风使舵。启新洋灰公司总经理周叔弢于六月六日，即在天津宣布启新公司的唐山工厂捐飞机一架(另天津公司捐一架)并通过天津进步日报捏造该厂工人以积极生产来欢迎他的捐献一架飞机的消息(见六月七日进步日报头版)。其实远在周叔弢捐机以前，该厂工人已酝酿以一年中每月捐献一天工资向资方挑战，并要求资方一年中每月捐出一天的生产量——洋灰八百吨(每吨市价七十多万元，一年九千六百吨共值六十七亿二千万元，可买四架半飞机)。工人们的这种要求急坏了周叔弢。周马上派公司副总经理姚南笙自津至唐谈判，谈判中，周一连打了四次长途电话。据该厂党委谈：工人的要求是不高的。该厂五月份由于工人竞赛的结果，超计划产量的利润共值九十八亿元，工人要求只占此数的百分之一。经过工会与资方协商后，资方始决定唐山工厂半年内共捐两架飞机，一门高射炮(共值三十八亿元)。开滦煤矿资方想发爱国财，订阅不合理的生产捐献计划：计划规定今年产四百五十万吨煤，资方说：“如全年超计划多产五十万吨，捐五万吨，再增产，再超额部分捐出一半。”但据市总工会谈：开滦全年产煤四百五十万吨的计划，不易完成，何况超额？！工人反映：“资本家想发爱国财。”因此，该捐献计划，未被市委采纳。经协商，开滦唐山矿区始捐四架飞机(另有开滦天津经理处与秦皇岛办事处各捐一架)。","type":"paragraph"},{"text":"该市中小工商业者在捐献运动中亦表现疑虑，最初他们估计一架飞机值六十亿元后，就徘徊不定：捐一架吧，要掏“很多”钱；不捐一架吧，面子上不好看。永茂汽车公司经理刘子誉获知飞机价钱后说：“要知道是十五亿元，早就捐开了。”六月十二日，该市工商联合会主任、陶瓷业廉益恒资东高振声特至此京，观看北京工商界捐献的动静。十三日，中小工商界始定捐一架飞机。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年6月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f65884ff0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
