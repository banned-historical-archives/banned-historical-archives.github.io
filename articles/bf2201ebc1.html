[{"year":1966,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"争取文化大革命和农业生产双丰收"},{"type":"paragraph","text":"由国务院、北京新市委派出的工作队，受到北京郊区广大社员的欢迎。他们在帮助麦收工作中，积极向社员宣传毛泽东思想，宣传无产阶级文化大革命的大好形势。"},{"type":"paragraph","text":"中国人民解放军驻京部队、机关、院校等单位广大干部和战士，发扬人民军队既是战斗队又是工作队和生产队的光荣传统，按照党中央、毛主席的指示，积极支援京郊夏收工作。"},{"type":"paragraph","text":"北京房山县交道公社三街大队老贫农喜看丰收麦。"},{"type":"paragraph","text":"少年儿童拾麦穗，争取颗粒都归仓。"},{"type":"paragraph","text":"本版图片系《北京日报》供稿"},{"type":"paragraph","text":"脱粒机器轧轧响，打麦场上人人忙。贫下中农喜丰收，感谢毛主席好领导。图为京郊奶子房大队社员正在用脱粒机抢收小麦。"},{"type":"paragraph","text":"京郊崔各庄生产大队收完小麦，立即抢播玉米。"},{"type":"paragraph","text":"供销社的流动售货车到田头和打麦场售货，支援麦收，深受社员群众欢迎。"},{"type":"paragraph","text":"中国民用航空系统学习毛主席著作积极分子在北京开会期间，响应党中央和毛主席的号召，积极参加京郊麦收。他们在麦收休息时学习毛主席著作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf2201ebc1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
