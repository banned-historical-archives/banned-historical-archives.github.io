","authors":[],"dates":[{"year":1963,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤1日电】　朝鲜民主主义人民共和国最高人民会议常任委员会委员长、朝鲜劳动党中央委员会政治委员会委员、朝鲜劳动党中央委员会副委员长崔庸健，为他今年6月间访问中国归来，今天晚上宴请中国驻朝鲜大使郝德青和大使馆全体外交官员。"},{"type":"paragraph","text":"出席宴会的有陪同崔庸健委员长访问中国的朝鲜最高人民会议常任委员会委员、朝鲜劳动党中央委员会政治委员会委员、朝鲜劳动党中央委员会副委员长李孝淳，朝鲜最高人民会议代议员、朝鲜劳动党中央委员会委员、外务相朴成哲，朝鲜最高人民会议代议员、朝鲜劳动党中央委员会委员、平壤市人民委员会委员长姜希源，朝鲜最高人民会议代议员、朝鲜劳动党中央委员会副部长黄长烨，以及其他随行人员。"},{"type":"paragraph","text":"崔庸健委员长和郝德青大使先后在宴会上举杯，祝中朝两国人民以鲜血凝成的战斗友谊万古长青，祝中朝两国人民在反对美帝国主义和现代修正主义的共同斗争中的伟大团结进一步加强和发展，祝朝鲜人民敬爱的领袖、中国人民亲密的朋友金日成首相身体健康，祝中国人民敬爱的领袖、朝鲜人民亲密的朋友毛泽东主席身体健康。"},{"type":"paragraph","text":"宴会充满了极其亲切友好的气氛。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3ff14c701"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
