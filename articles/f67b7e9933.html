<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决执行勇敢捍卫毛主席的无产阶级革命路线“全心全意为人民服务的先进卫生科”命名大会隆重举行","authors":[],"dates":[{"year":1968,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"到会同志共同敬祝伟大领袖毛主席万寿无疆!万寿无疆!人民解放军北京部队负责人宣读中央军委授予某部卫生科光荣称号的命令并授锦旗。北京部队广大指战员正以“全心全意为人民服务的先进卫生科”为榜样，进一步锤炼无限忠于毛主席的红心，认真学习党内两条路线斗争史，努力提高阶级斗争和两条路线斗争觉悟，为贯彻执行党的十二中全会提出的各项战斗任务，夺取文化大革命的全面胜利作出更大贡献。"},{"type":"paragraph","text":"新华社北京七日电　我们最敬爱的伟大领袖毛主席和他的亲密战友林彪副主席亲自批准，由中共中央军委发布命令，授予人民解放军北京部队某部卫生科以“全心全意为人民服务的先进卫生科”光荣称号的命名大会，在北京隆重举行。"},{"type":"paragraph","text":"大会在《东方红》歌声中开始。到会同志怀着对伟大领袖毛主席的深厚无产阶级感情，手捧红彤彤的革命宝书《毛主席语录》，齐声朗读:“紧紧地和中国人民站在一起，全心全意地为中国人民服务，就是这个军队的唯一的宗旨。”共同敬祝伟大领袖毛主席万寿无疆!万寿无疆!"},{"type":"paragraph","text":"北京部队负责人李雪峰在大会上宣读了中央军委的命令，并把“全心全意为人民服务的先进卫生科”锦旗授给某部卫生科。"},{"type":"paragraph","text":"北京部队负责人郑维山在会上讲话。他说，毛主席和林副主席亲自批准，授予某部卫生科光荣称号，这是对我们的最大关怀，最大鼓舞，最大教育，最大鞭策。他介绍了这个卫生科全心全意为人民服务的模范事迹后，要求广大指战员一定要认真向他们学习，学习他们忠于毛主席，忠于人民，坚决执行、勇敢捍卫毛主席革命路线的坚定立场；学习他们面向连队，面向群众，全心全意为人民服务的崇高品质；学习他们依靠群众，破除迷信，敢于实践的革命精神；学习他们克服困难，严肃认真，一丝不苟的科学态度；学习他们活学活用毛泽东思想，突出无产阶级政治，以政治统帅技术的根本经验。"},{"type":"paragraph","text":"被这个卫生科从腹中切除了九十斤大肿瘤的女社员张秋菊，在会上愤怒控诉了叛徒、内奸、工贼刘少奇的反革命修正主义医疗卫生路线的罪行。她说，是党内头号走资派刘少奇和执行他的反革命修正主义路线的资产阶级技术“权威”叫我活活等死，是我们最敬爱的伟大领袖毛主席和执行毛主席革命路线的解放军救了我。我要一辈子听毛主席的话，做忠于毛主席的好社员。"},{"type":"paragraph","text":"先进卫生科的代表在会上讲话时说，我们所取得的一切成就，都归功于伟大领袖毛主席。我们一定要更高地举起毛泽东思想伟大红旗，彻底批判刘少奇的反革命修正主义路线，坚决执行毛主席的无产阶级革命路线，更好地面向连队，面向农村，全心全意为广大指战员和广大工人、贫下中农服务，不断地为人民立新功。"},{"type":"paragraph","text":"河北省革命委员会代表、部队先进集体代表、部队医疗卫生系统代表等先后在大会上讲了话。"},{"type":"paragraph","text":"从中央军委发布命令以来，北京部队广泛开展了向这个卫生科学习的活动。广大指战员以这个先进卫生科为榜样，进一步锤炼无限忠于毛主席的红心，认真学习党内两条路线斗争的历史，努力提高阶级斗争和两条路线斗争觉悟，为贯彻执行党的八届十二中全会提出的各项伟大战斗任务，夺取无产阶级文化大革命的全面胜利作出更大贡献。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1968\\12\\68c8020101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“全心全意为人民服务的先进卫生科”全体医务人员，在毛主席革命路线的指引下，破除迷信，解放思想，敢于革命，善于革命，成功地为女社员张秋菊从腹中切除了一个九十斤重的大肿瘤，创造了世界医学史上罕见的奇迹，这是毛泽东思想的伟大胜利。他们千万遍地高呼:“毛主席万岁!万万岁!”　丁广师摄(新华社稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f67b7e9933"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
