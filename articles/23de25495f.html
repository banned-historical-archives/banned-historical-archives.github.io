script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《赤旗报》号召发扬东京大会文件精神  团结日本人民击败资产阶级的诬蔑","authors":[],"dates":[{"year":1962,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《赤旗报》号召发扬东京大会文件精神"},{"type":"paragraph","text":"团结日本人民击败资产阶级的诬蔑"},{"type":"paragraph","text":"据新华社13日讯　东京消息：日本共产党中央机关报《赤旗报》今天在社论中号召加倍努力，把广大群众团结到最近举行的禁止原子弹氢弹世界大会拟订的行动方针之下。"},{"type":"paragraph","text":"社论指出，日本全国各地现在都在举行集会，汇报这次世界大会的成就。社论强调说，把大会的成功的结果带到广大阶层的人民中去和击败资产阶级宣传工具所进行的以谎言和诬蔑为基础的反动运动，是共产党、禁止原子弹氢弹世界大会的全体与会者和所有其他和平战士的迫切任务。"},{"type":"paragraph","text":"《赤旗报》说，“事实已经表明，如果把关于大会的情况确切地传达给了公众并进行了民主讨论，就有可能纠正某些人的不正确的意见，就有可能以东京宣言和建议的精神团结所有的和平爱好者。”"},{"type":"paragraph","text":"《赤旗报》强调说，共产党员应该向公众说清楚：共产党为什么反对抗议苏联进行核试验。《赤旗报》在谈到社会党人坚持要向苏联提出抗议的错误意见时说，认为把苏联和美国相提并论，对美国和苏联提出抗议就能够停止或冻结核试验的看法，是一种妄想。《赤旗报》指出，如果我们真诚地希望停止核试验，就必须指出应对阻碍缔结禁止核试验协定的美帝国主义进行斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23de25495f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
