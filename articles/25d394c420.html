<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"体现毛主席、党中央对下乡上山知识青年的深切关怀市革委会派出学习慰问团分赴各地今起分批出发前往安徽吉林黑龙江等省学习慰问","authors":[],"dates":[{"year":1969,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席关于“知识青年到农村去，接受贫下中农的再教育”等一系列最新指示的鼓舞下，本市广大知识青年，紧跟毛主席的伟大战略部署，纷纷下乡上山，奔赴农村，奔赴边疆，受到了各地各级革命委员会和广大贫下中农的热情关怀和教育。广大知识青年在那里认真学习毛主席著作，虚心向贫下中农学习，各方面成长很快，受到了各地革命群众的赞扬。为了进一步落实毛主席的最新指示，贯彻林副主席在“九大”政治报告中提出的“对于那些积极上山下乡的红卫兵和知识青年，要予以鼓励”的精神，认真学习兄弟省各级革命委员会和贫下中农对知识青年进行再教育和做好安置、巩固工作的经验，市革命委员会决定，继今年四月派出赴江西、云南、贵州三省学习慰问团后，又组织了一个由工宣队、红卫兵小将、革命干部、革命家长等方面代表参加的约二百多人的上海市革命委员会学习慰问团。十二日开始，慰问团分批出发，赴安徽、吉林、黑龙江等省，进行学习慰问。"},{"type":"paragraph","text":"这次学习慰问团的任务是，虚心向各地革命委员会、广大贫下中农、广大知识青年学习。学习各地革委会和贫下中农对知识青年进行再教育和搞好安置、巩固工作的先进经验；学习知识青年接受贫下中农的再教育，在农村干革命的先进思想和先进经验；积极宣传毛泽东思想，宣传毛主席最新指示和下乡上山的伟大意义，宣传“九大”精神，宣传上海的大好形势，宣传好人好事；热情转达上海市革命委员会和上海一千万革命人民、广大革命家长对当地各级革命委员会和广大贫下中农的衷心感谢，向战斗在农村、边疆的知识青年表示深切慰问。"},{"type":"paragraph","text":"学习慰问团出发前，举办了毛泽东思想学习班，大大提高了参加学习慰问团同志的继续革命自觉性和两条路线斗争觉悟，他们感到:市革委会组织学习慰问团，是伟大领袖毛主席和以毛主席为首、林副主席为副的党中央委员会对广大知识青年的极大关怀和极大鼓舞，慰问团是代表上海工人阶级、贫下中农去的，是代表上海一千万革命人民去的，责任重大，非常光荣。他们一致表示，决心高举毛泽东思想伟大红旗，突出无产阶级政治，发扬一不怕苦、二不怕死的革命精神，努力活学活用毛泽东思想，加强革命团结，不断促进思想革命化，坚决完成这一光荣而艰巨的任务。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"吉林文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25d394c420"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
