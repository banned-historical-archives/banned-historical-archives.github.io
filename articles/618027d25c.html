hors":[],"dates":[{"year":1970,"month":3,"day":18}],"is_range_date":false,"parts":[{"text":"中共中央对浙江舟山地区问题的批示（概要）","type":"title"},{"text":"中共中央对浙江舟山地区问题作出批示。由于“文化大革命”中“全面内战”的影响，浙江舟山地区一直与浙江省革委会处于对立状态，致使该地区不断发生武斗事件。2月初，南京军区与浙江省革委会召开会议，商议解决该地区问题，并向中共中央提出报告。中共中央在批示中指出：中央同意南京军区党委的报告，同意浙江省革委会提出的解决舟山问题的方案，请你们认真工作，让其实现。舟山地处东海前哨，中央殷切希望舟山地区全体军民，高举毛泽东思想伟大红旗……团结一致，共同对敌，早日实现革命的大联合和革命的三结合。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"浙江文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"618027d25c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
