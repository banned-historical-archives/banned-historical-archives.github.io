ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"对军委关于军事系统向中央汇报工作问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对军委关于军事系统向中央汇报工作"},{"type":"paragraph","text":"问题的报告的批语"},{"type":"paragraph","text":"（1957年2月25日）军委："},{"type":"paragraph","text":"上半年忙，下半年为妥。不要都准备，有四总、空、海即够，看情形酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月二十五日"},{"type":"paragraph","text":"[1]指中共中央军委1957年2月22日关于军事系统各部门，各军种、兵种向党中央主席和中央政治局同志汇报工作问题给毛泽东的报告。报告说，军委经过讨论，初步预定：按总参、总政、总干、训练总监部、武装力量监察部、总后勤部、空军、海军、炮兵、装甲兵、通信兵、工程兵、铁道兵、防化学兵的次序，依次汇报，最好都能分别汇报一次，以使政治局同志多了解一些军队工作情况，多给些指示。但是否每个部门都一一汇报，或只抽其中几个重要部门和军种、兵种汇报，请指示。汇报时间可在3月20日至4月中旬以前。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":2,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":292},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59717514dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
