ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"致王震电","alias":"","parts":[{"type":"paragraph","text":"致王震电！"},{"type":"paragraph","text":"（1945年10月17日）"},{"type":"paragraph","text":"南支在王、王领导下，克服了由于突然事变所产生的极大困难，胜利地北渡长江，保存了基本力量，中央对全体指战员深表慰问之忱。目前五师及王、戴处境较为困难，南支既加入五师野战兵团序列，望在郑、李领导下，协助五师及王、戴争取一个至几个战役的胜利。南支尔后行动当与五师及王、戴的整个行动加以考虑。目前鄂豫我军的胜利行动，对于争取华北及东北的胜利有重大帮助。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致王震电的主要内容。"},{"type":"paragraph","text":"[2]南支，指南下支队。王、王，指王震、王首道。10月上旬该部北返到达大悟山地区，与新四军第五师会合。"},{"type":"paragraph","text":"[3]王、戴，指王树声、戴季英。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":445,"page_end":445},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb96008631"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
