script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-159","name":"中共山西省委办公厅关于省直单位落实政策对象及其家属子女在太原市转办城镇户口有关事项的通知","author":"中共山西省委办公厅","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共山西省委办公厅关于省直单位落实政策对象及其家属子女在太原市转办城镇户口有关事项的通知","dates":[{"year":1987,"month":6,"day":1}],"is_range_date":false,"authors":["中共山西省委办公厅"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 175-176","tags":[{"name":"户口","type":"主题/事件"},{"name":"落实政策","type":"主题/事件"}],"parts":[{"type":"title","text":"中共山西省委办公厅关于省直单位落实政策对象及其家属子女在太原市转办城镇户口有关事项的通知厅字〔1987〕42号"},{"type":"paragraph","text":"在解决落实政策对象及其家属子女城镇户口的过程中，由于有关单位对一些具体问题的要求不尽一致，影响到此项工作的顺利进行。现将省委落实政策领导组对此研究后作出的规定通知如下："},{"type":"paragraph","text":"一、省直单位落实政策对象及其家属子女需在太原市转办城镇户口的，由主管部、委、办、厅、局党组、党委审批并加盖公章（党组无公章的可以行政公章代替），然后由太原市公安局户籍科签发准迁证。"},{"type":"paragraph","text":"二、省直单位在申报转办落实政策对象及家属子女户口时，统一使用省委办公厅厅字〔1987〕31号文件所附的“落实政策对象及其家属子女转户审批表”。同时写出专题报告，将本人受错误处理与平反安置、家属子女受株连致使户口变动和转户人员的转户理由等情况查清写明，并由承办调查人签名盖章。最后，由单位提出对其户口的处理意见并加盖公章。"},{"type":"paragraph","text":"呈报材料须附本人申请，平反结论（法院撤判的除撤判书外，还应有单位的安置决定）复制件；转户人员迁住农村前原所在城镇派出所的户籍（户口底簿或迁移证存根）复印件和在农村的户籍复制件；现户口所在地对其婚姻情况的证明（必要时验看结婚证）；在校中学生需有所在学校的证明；长期病残生活难以自理的成年子女需有当地县以上医院或太原市大医院的诊断书（审批单位还应对其进行目测）；子女因受株连遣送农村后与城镇职工结婚的需有职工单位证明。"},{"type":"paragraph","text":"以上材料除呈报、审批单位留存外，需报太原市公安局户籍科两份。"},{"type":"paragraph","text":"三、调查取证、报批手续等项工作应由单位派人承办，不能让落实政策对象及其家属子女代理。呈报、审批单位要按照规定，严格把关，不得弄虚作假。对违者要追究责任，严肃处理。"},{"type":"paragraph","text":"四、上述办法原则上也适用于省直单位落实政策对象及其家属子女在其他地、市转办户口，具体承办手续可由省直单位与有关地、市落实政策办公室、公安局（处）协商规定。"},{"type":"paragraph","text":"一九八七年六月一日"}],"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b30203b1d0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
