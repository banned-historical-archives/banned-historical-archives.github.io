" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji35","name":"毛泽东全集第35卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"给文炳璋的信","alias":"","parts":[{"type":"paragraph","text":"给文炳璋\"的信"},{"type":"paragraph","text":"（1955年5月1日）炳璋同志："},{"type":"paragraph","text":"二月十五日的信收到。你可去找毛泽荣（逊五）毛仙梅二人，和他们一道来京一行，即持此信为证。其他各人均不要来。请你转告文梅清、文东仙二同志，他们给我的信收到了，他们的问题我不能解决，他们不要来京。韶山方面有要来的，除泽荣、仙梅二人可以来之外，均不可来。问你母亲及各位朋友的好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五五年五月一日此信给毛泽荣、毛仙梅二人一阅。[1]文炳璋，毛泽东的表侄。[2]毛泽荣，又名逊五，毛泽东的堂弟。毛仙梅，毛泽东的堂弟。[3]文梅清、文东仙，毛泽东的表弟。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":5,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":60,"page_end":60},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91414d64f2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
