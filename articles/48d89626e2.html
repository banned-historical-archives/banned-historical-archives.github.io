ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"和萧三的谈话","alias":"","parts":[{"type":"paragraph","text":"和萧三的谈话！"},{"type":"paragraph","text":"（1939年5月5日）"},{"type":"paragraph","text":"《聊斋志异》是封建主义的一种温情主义。作者蒲松龄反对强迫婚姻，反对贪官污更，但是不反对一夫数妻（妾），赞美女人的小脚，主张自由恋爱，在封建社会不能明讲，即借鬼狐说教。作者写恋爱又都是很艺术的，鬼狐都会作诗。"},{"type":"paragraph","text":"蒲松龄很注意调查研究，他泡一大壶茶，坐在集市的人群中间，请人们给他讲自己知道的、流行的鬼狐故事，然后回去加工。不然，他哪能写出四百几十个鬼和狐狸精来呢？"},{"type":"paragraph","text":"[1]这是毛泽东和诗人萧三会面时关于《聊斋志异》谈话的一部分。1939年5月，毛泽东和萧三在延安杨家岭。1939年，毛泽东、萧三和小八路在交谈。1939年，毛泽东在延安和小八路亲切谈话。"},{"type":"paragraph","text":"我4毛潭东无天耳春毛潭东在连按梦两个小八路《“我叫毛泽东”》（中国画)《路遇一一毛主席与小八路》（中国画）《毛泽东和小八路》（中国画）"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":5,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":318,"page_end":324},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48d89626e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
