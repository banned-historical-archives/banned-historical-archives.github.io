ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"对国民党武装和非武装人员的政策","alias":"","parts":[{"type":"paragraph","text":"对国民党武装和非武装人员的政策！"},{"type":"paragraph","text":"（1946年3月30日）东北局："},{"type":"paragraph","text":"寅艳给各地指示电?悉，很好。在用迅速猛烈手段夺取长哈齐时，对其武装部队应取歼灭政策，将其全部解决武装，但对其非武装人员（党政）勿加侮辱与杀害，将其移置乡下软禁以利将来交换。此点应令各地首长明确知道，有所遵循。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"寅三十[1]这是毛泽东为中共中央起草的给中共中央东北局的电报。"},{"type":"paragraph","text":"[2]指1946年3月29日24时中共中央东北局给周保中、陈光、张启龙、陈云、李天佑、李富春、黄克诚、程世才、萧华并告林彪和中共中央的电报。电报说：我军必须迅速完成一切准备，于苏方撤退时以敏捷迅速手段进占长春、哈尔滨、齐齐哈尔各市，争取在一日内全部干净消灭各市顽匪。此举关系东北及中国革命前途甚大，望亲自负责周密部署。抢占与确保长春的决定一环是开原、四平间的作战，请林彪、李富春、黄克诚注意。辽东（南满）军区部队为配合沈阳以北及长、哈、齐之争夺战，除集中主力坚决歼敌一部外，应分出适当兵力牵制大量敌人于南满。后方党政军应积极地有计划地全力歼灭各地股匪。国民党军队中的美式装备。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":222,"page_end":223},"tags":[{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43670264de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
