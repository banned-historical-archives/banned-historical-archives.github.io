<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"贯彻毛主席抓革命促生产指示的又一伟大胜利  我国去年棉花产量创历史最高纪录  无论南方北方新棉区老棉区普告丰收，总产单产都有大幅度增长  江苏战胜几十年罕见的严重干旱获得棉花大丰收","authors":[],"dates":[{"year":1967,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"贯彻毛主席抓革命促生产指示的又一伟大胜利"},{"type":"paragraph","text":"我国去年棉花产量创历史最高纪录"},{"type":"paragraph","text":"无论南方北方新棉区老棉区普告丰收，总产单产都有大幅度增长"},{"type":"paragraph","text":"江苏战胜几十年罕见的严重干旱获得棉花大丰收"},{"type":"paragraph","text":"据新华社三日讯　一九六六年，在伟大的无产阶级文化大革命的推动下，我国棉区的广大群众和干部更深入地活学活用毛主席著作，意气风发地沿着毛泽东思想的轨道奋勇前进，使棉花生产在接连四年持续增产的基础上，又有巨大的发展，为我国棉花生产史上增添了新的光辉的一章。"},{"type":"paragraph","text":"有关主管部门提供的资料表明，一九六六年我国棉花的总产量和单位面积产量，都比历史上收成最好的一九六五年又有大幅度的增长，其中单位面积产量增长幅度还更大一些。无论是南方棉区还是北方棉区，也无论是老棉区还是新棉区，都普遍获得了可喜的丰收，有的地区增产非常显著。河南省的不少原来平均亩产皮棉四五十斤的县，一九六六年一举增加到七八十斤甚至更多；江苏省徐州专区有些县增产一倍左右；增产二三成到四五成的县，河南、湖南、安徽、四川、河北、山东、山西等省都有一批。在浙江、上海、江苏、湖北等原来产量就较高的省、市，平均亩产皮棉百斤以上的县，都比过去又有很大的增加；有一批县平均亩产皮棉已高达一百四十斤左右。平均亩产皮棉达一百五十斤以上的公社和大队，已在许多省、市、自治区大量涌现。这些情况无不有力地说明，我国棉花生产已经进入一个新的发展阶段。"},{"type":"paragraph","text":"一九六六年我国棉花大幅度增产，是各地在无产阶级文化大革命的推动下，按照毛主席和党中央的指示，积极地抓革命、促生产的又一伟大的胜利。这一年，棉区群众和干部进一步高举毛泽东思想伟大红旗，以空前高涨的热情活学活用毛主席著作，特别是活学活用“老三篇”，大破私字，大立公字，社会主义觉悟不断提高。他们越来越自觉地把发展棉花生产和支援国家建设和世界革命联系起来。他们不怕艰苦，不怕困难；敢于斗争，敢于胜利。他们脑子里牢牢地记住毛主席的教导：“在社会主义事业中，要想不经过艰难曲折，不付出极大努力，总是一帆风顺，容易得到成功，这种想法，只是幻想。”所以，尽管一九六六年南北棉区遭到的自然灾害都是相当严重的，有一部分地区从播种到收获，一直处在连续袭来的自然灾害的威胁之中，但用毛泽东思想武装起来的广大棉区群众和干部没有被自然灾害吓倒，他们遵循毛主席的教导，英勇不屈地和自然灾害搏斗。"},{"type":"paragraph","text":"为夺取棉花丰收，一年来南北棉区在大兴农田基本建设的同时，在改革植棉技术方面，作了巨大的努力，收效也很显著。各棉区普遍地以合理密植为中心，开展了群众性的植棉技术改革运动。因此，各地普遍加大了密植程度；良种面积已发展到占全部棉田的百分之八十左右；施肥和田间管理工作也在原有基础上又有新的提高。由于广大群众和干部高度发扬敢于斗争、敢于胜利的精神，加上一年来农田基本建设和植棉技术都有很大发展，抗灾能力大大增强，所以尽管一九六六年自然灾害十分频繁，持续时间也较长，但绝大多数棉区棉花生长情况都比以往任何一年都好。这样，就保证了一九六六年棉花的总产量和单位面积产量，都在原有基础上又有大幅度的增长。"},{"type":"paragraph","text":"一年来，我国棉区群众和干部在发展棉花生产方面取得的成就是巨大的。各地群众和干部正系统总结经验，决心在新的一年内，更高地举起毛泽东思想伟大红旗，在无产阶级文化大革命的新高潮中，进一步抓革命、促生产，使棉花生产更快地向前发展。"},{"type":"paragraph","text":"据新华社南京三日电一九六六年，江苏省各产棉区的广大社员活学活用毛主席著作，进一步发扬不断革命精神，战胜几十年罕见的严重干旱，获得了棉花大丰收。到去年十一月底，全省已收购的皮棉比上年度全省皮棉总产量还多两成以上，单位面积产量也显著地高于一九六五年。和常年相比，总产量和单位面积产量增长的幅度，还更大一些。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"右图：毛主席于一九五八年视察过的河南省新乡县七里营人民公社社员，八年来牢记毛主席的教导，把人民公社越办越好，粮、棉产量连年增加，一九六六年粮棉产量都获得历史上最好的收成。图为七里营公社刘庄大队的社员正在翻晒新棉。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76e5567f41"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
