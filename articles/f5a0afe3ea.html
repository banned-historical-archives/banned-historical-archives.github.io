],"dates":[{"year":1965,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国资本剥削和亲美独裁统治"},{"type":"paragraph","text":"洪都拉斯总罢工进入第九天"},{"type":"paragraph","text":"据新华社圣约瑟电　据这里的“冲击”新闻广播电台八月三日下午报道，尽管独裁政府出动军队进行残暴镇压，洪都拉斯工人坚持的总罢工到三日已进入第九天。"},{"type":"paragraph","text":"洪都拉斯自由工人工会中央联合会拒绝了政府以厂主名义提出的增加工资的建议。罢工逐步具有了政治性，罢工工人提出反对亲美军事独裁政权继续执政。"},{"type":"paragraph","text":"据洪都拉斯广播电台报道，这次自七月二十六日起举行的总罢工，开始是为了要求增加工资。罢工使首都特古西加尔巴的工厂、电影院、商店和机关都关了门。中学和小学停课。许多报纸停止出版。这次总罢工是美国垄断资本在经济上加紧勒索这个人口二百万的中美国家因而引起一系列政治和经济危机的结果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5a0afe3ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
