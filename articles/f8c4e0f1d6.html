script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宫本总书记谴责日本执政党支持美国侵略越南  越南人民一定会把美国强盗赶出去  苏联人民肯定会谴责赫鲁晓夫修正主义者","authors":[],"dates":[{"year":1965,"month":7,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宫本总书记谴责日本执政党支持美国侵略越南"},{"type":"paragraph","text":"越南人民一定会把美国强盗赶出去"},{"type":"paragraph","text":"苏联人民肯定会谴责赫鲁晓夫修正主义者"},{"type":"paragraph","text":"新华社一日讯　东京消息：日本共产党总书记宫本显治强调说：“现在正在越南进行侵略的美帝国主义强盗一定会被赶出去。日本人民以及越南人民对此都满怀信心。”"},{"type":"paragraph","text":"他是在六月三十日晚上日本共产党在东京举行的报告会上说这番话的。"},{"type":"paragraph","text":"宫本显治谴责自由民主党一方面侈谈“和平”，一方面却在支持美国进行侵略。"},{"type":"paragraph","text":"他谴责叛徒神山茂夫参加竞选的阴谋。他说，神山茂夫冒充日共党员参加竞选的目的是为了破坏日本共产党，但他的阴谋决不会得逞。"},{"type":"paragraph","text":"宫本说：“苏联人民肯定会谴责赫鲁晓夫修正主义者。显然，志贺义雄和神山茂夫等到那时将立即被抛弃。”"},{"type":"paragraph","text":"宫本在谈到中国核试验时指出：“这种试验是具有防止美帝国主义进行核战争的防御性质的。由于中国的核试验，亚洲发生核战争的危险比以前减少了。”"},{"type":"paragraph","text":"宫本然后提到，社会党委员长佐佐木更三开始主张，我们不仅应该为禁止核试验，并且应该为禁止核武器本身而斗争。宫本说，这证明了日本共产党是正确的，它一直主张全面禁止一切核武器，并以此作为党的政策之一。"},{"type":"paragraph","text":"他对佐佐木最近发出的一切民主力量为阻止批准“日韩基本条约”而进行联合斗争的号召表示欢迎。"},{"type":"paragraph","text":"他呼吁说：“这反映了绝大多数劳动人民的呼声。让我们在即将举行的选举中发展和加强坚持不懈地要求进行联合斗争的共产党的力量，给予修正主义者和右派以沉重打击。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8c4e0f1d6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
