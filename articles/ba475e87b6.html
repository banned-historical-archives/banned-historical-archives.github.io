派及民主党派分子加入共产党的规定草案的修改","authors":["刘少奇"],"dates":[{"year":1951,"month":7}],"is_range_date":false,"parts":[{"text":"刘少奇对中央关于共产党员加入民主党派及民主党派分子加入共产党的规定草案的修改","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"(本篇用 [  ] 排印的是刘少奇加写和改写的文字。《中共中央关于共产党员加入民主党派及民主党派分子加入共产党的规定》经刘少奇修改和签发，于一九五一年七月十八日发出。)","type":"subtitle"},{"text":"民主党派中的进步分子多要求加入共产党，但民主党派内有地位的进步分子为数不多，对于民主党派这种有地位的进步分子，应说服他们以非党进步分子身分，在民主党派内坚持工作，因为他们不在组织上加入共产党比他们加入共产党的作用还大，故他们不应加入共产党。但共产党在政治上和工作上应注意给他们以指导和照顾。如有个别因工作需要或因在民主党派工作多年而需要吸收或不得不吸收入党者，始得个别吸收之。","type":"paragraph"},{"text":"根据刘少奇修改件刊印。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba475e87b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
