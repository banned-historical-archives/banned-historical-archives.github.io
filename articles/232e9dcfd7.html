ates":[{"year":1950,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十五日电】　中国民主同盟为中苏友好同盟互助条约及其他两个协定的签订致电斯大林大元帅，电文如下:"},{"type":"paragraph","text":"斯大林大元帅:中苏友好同盟互助条约及关于中国长春铁路、旅顺口及大连的协定和贷款给我国的协定的签订，这是您和苏联人民给与新中国的无比的有力的援助。中国人民对于您和苏联人民是万分地感谢!中苏这些条约和协定的签订，不只是加深了中苏两国人民的亲密关系，而且加强了全世界民主和平的力量，给帝国主义战争贩子一有力的打击。您和苏联人民对全世界的民主和平的莫大贡献和保障，使全中国人民和全世界爱好和平人民都衷心地拥护和崇敬。我们为中苏两国人民永久的友好合作和世界和平民主的伟大胜利而祝贺!谨致革命敬礼!　中国民主同盟"},{"type":"paragraph","text":"二月十五日"},{"type":"paragraph","text":"【新华社北京十五日电】　中国民主同盟为中苏友好同盟互助条约及其他两个协定的签订致电毛主席暨周总理，电文如下:"},{"type":"paragraph","text":"毛主席暨周总理钧鉴:你们代表新中国的人民，远去友邦苏联，签订了中苏友好同盟互助条约及关于中国长春铁路、旅大、贷款等协定，我们万分欢欣!这些条约和协定的签订，使新中国的建设事业获得了无比的有力的援助，使中苏两国人民的友好和合作更为密切，使全世界民主和平的力量更加强大巩固。我们中国民主同盟竭诚拥护。我们对于你们的为国辛劳和为世界和平民主事业的努力，谨致诚挚的敬意与慰问。"},{"type":"paragraph","text":"中国民主同盟二月十五日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"232e9dcfd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
