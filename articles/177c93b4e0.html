<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想一旦为群众掌握 就变成不可战胜的物质力量阮友寿主席格里巴同志热烈祝贺我发射核导弹成功","authors":[],"dates":[{"year":1966,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京30日电　毛主席收到了越南南方民族解放阵线中央委员会主席团主席阮友寿发来的电报，最热烈地祝贺我国发射导弹核武器试验成功。电文如下:"},{"type":"paragraph","text":"“敬爱的毛泽东主席:得悉中华人民共和国发射导弹核武器试验成功，我感到无限的高兴。我代表越南南方人民，越南南方民族解放阵线中央委员会，并以我个人的名义，向敬爱的主席，向中国共产党、中华人民共和国政府、中国人民解放军、中国工人兄弟姐妹、科学技术工作者和全体兄弟的中国人民致以最热烈的祝贺。"},{"type":"paragraph","text":"中华人民共和国的这个辉煌的成就，再一次证明了中国科学技术超速度的发展和中华人民共和国国防力量的不断巩固；这对于加强反对以美国为首的帝国主义和殖民主义的力量，保卫亚洲和世界和平，是一个极其巨大和积极的贡献。"},{"type":"paragraph","text":"越南南方人民和越南南方民族解放阵线为这个巨大的成就感到非常兴奋和充满信心，并且把它当作自己抗美救国斗争事业的强大鼓舞力量。我们坚信，伟大的中国人民在以您为首的中国共产党领导下，将取得更加巨大和辉煌的胜利。”"},{"type":"paragraph","text":"新华社北京30日电　中国共产党中央委员会收到了比利时共产党中央委员会书记格里巴发来的电报，对我国发射导弹核武器试验成功，表示热烈的兄弟般的祝贺。电文如下:"},{"type":"paragraph","text":"“我们中央委员会为一九六六年十月二十七日导弹核武器试验获得伟大、圆满的成功，而向你们，并通过你们向全体中国共产党员和革命人民，表示热烈的、兄弟般的祝贺。"},{"type":"paragraph","text":"这是马克思列宁主义、毛泽东思想的新的伟大胜利，是中国社会主义革命的新的伟大胜利，是世界各国人民的新的伟大胜利。"},{"type":"paragraph","text":"响应林彪同志的号召、创造性地运用马克思列宁主义、毛泽东思想的中国人民解放军、科学工作者、技术人员和职工们所取得的这一卓越成就，显示了中国人民由于中国共产党及其以毛泽东同志为首的中央委员会的正确的、马克思列宁主义的政治路线，在各个领域所实现的大跃进。"},{"type":"paragraph","text":"同时，这一成就也显示了，由于无产阶级文化大革命而在阶级斗争、生产斗争和科学实验战线上取得的伟大的进展。马克思列宁主义、毛泽东思想一旦为群众所掌握和领会，就变成不可战胜的物质力量。"},{"type":"paragraph","text":"十月二十七日的试验的成功，是美国一修正主义者进行反对各国人民的核垄断、核讹诈和核威胁阴谋的大失败，是以世界主要的侵略和战争势力美帝国主义为首的帝国主义者及其以在苏联篡夺了政权的集团为中心的修正主义伙伴的大失败。"},{"type":"paragraph","text":"世界各国人民欢呼中国政府再次重申，在任何时候、任何情况下，中国都不会首先使用核武器；世界各国人民看到，美帝国主义者和苏联修正主义者拒绝承担这样的义务，从而再一次暴露了他们自己的真面目。"},{"type":"paragraph","text":"世界各国人民坚决支持中华人民共和国政府和中国人民宣布的要求:全面禁止和彻底销毁核武器。这是美帝国主义者和苏联修正主义者拼命反对的。"},{"type":"paragraph","text":"十月二十七日成功的试验，显示了作为世界革命不可战胜的堡垒和强大力量的中华人民共和国防御力量的发展。这一成功的试验，是对争取世界和平作出的新的贡献，是对世界各国革命人民斗争的巨大鼓舞，特别是对越南人民所进行的把美国纳粹侵略者赶出他们祖国的土地这一具有世界历史意义的英雄斗争的巨大鼓舞。"},{"type":"paragraph","text":"亲爱的同志们，我们谨祝你们、祝中国人民在各方面取得新的伟大胜利，这些胜利也是世界各国人民的胜利。"},{"type":"paragraph","text":"中国共产党万岁!"},{"type":"paragraph","text":"中华人民共和国万岁!"},{"type":"paragraph","text":"各国人民反对以美帝为首的帝国主义者的世界统一战线万岁!"},{"type":"paragraph","text":"马克思列宁主义、毛泽东思想万岁!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"177c93b4e0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
