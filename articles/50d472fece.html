增加工资","authors":[],"dates":[{"year":1969,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议美国资本家的残酷剥削"},{"type":"paragraph","text":"菲律宾六千多工人罢工"},{"type":"paragraph","text":"马尼拉一万多公立学校教师罢教要求增加工资"},{"type":"paragraph","text":"新华社二十二日讯  马尼拉消息：在菲律宾的美国资本企业的工人和菲律宾公立学校教师，最近纷纷举行罢工、罢教，要求增加工资，改善工作条件。"},{"type":"paragraph","text":"据马尼拉报纸透露，美资圣米格尔公司在菲律宾各地的工厂六千名工人，十七日开始罢工，抗议资方无故解雇工人和对工人的残酷剥削。"},{"type":"paragraph","text":"美资伊索标准肥料公司的几百名菲律宾工人最近曾举行罢工，抗议美国资本家的歧视，要求调整工资。美资百事可乐饮料公司的几百名工人不久前也举行罢工，要求增加工资。"},{"type":"paragraph","text":"此外，马尼拉市公立中、小学校教师一万二千人十七日举行罢教，要求提高工资。罢教已经坚持了五天，使马尼拉的九十多所公立中、小学完全停课。奎松市约一千名中学教师十五日在市内游行示威，要求增加工资。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50d472fece"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
