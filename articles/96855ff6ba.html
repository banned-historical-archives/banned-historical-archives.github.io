ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"为延安《山脉文学》杂志题写刊头","alias":"","parts":[{"type":"paragraph","text":"为延安《山脉文学》杂志题写刊头!]"},{"type":"paragraph","text":"（1938年10月27日）山脉文学写下几个字，不知可用否？名称似以“山头文学”为好。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十七日"},{"type":"paragraph","text":"[1]1938年10月下旬成立的群众性的“山脉文学社”，提出“十大文艺活动方式”，筹备出版一个以发表青年文艺爱好者诗文习作为主的《山脉文学》不定期刊。奚定怀给毛泽东写信，向他报告进一步开展群众性抗战文艺活动的打算，并请他为《山脉文学》题写刊头。毛泽东为其题写了刊头。后来，由于印刷条件未获解决，《山脉文学》未能出版，而是改出了油印的《山脉诗歌》。这样，便出现了“山脉诗歌社”。而山脉文学社的活动则持续到1940年9月。贩文"},{"type":"paragraph","text":"文文"},{"type":"paragraph","text":"湾毛泽东给山脉文学社的复信和为《山脉文学》题写的刊头。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":10,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":26,"page_end":27},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96855ff6ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
