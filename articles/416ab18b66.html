tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"既当教师又当社员","authors":["驻辽阳市卫东区毛泽东思想宣传队杨金荣"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“在农村，则应由工人阶级的最可靠的同盟者——贫下中农管理学校。”侯振民、王庆余两位同志关于公办小学下放到大队来办的建议好得很！它能真正贯彻落实毛主席这一最新指示，使农村的教育大权牢牢掌握在贫下中农手里。教员既当教师，又当社员，有利于接受贫下中农的再教育，加强思想革命化，使自己更好地按照毛主席的教育路线办学，把学生培养成无产阶级革命事业的接班人。"},{"type":"paragraph","text":"教员既当教师，又当社员，是符合贫下中农要求的。我们支农所在的河栏公社大东沟大队大石湖生产队小学，存在两种教师。公办教师认为自己是国家发工资，有一个“旱涝保收”的“铁饭碗”，对贫下中农的要求和集体事业不放在心上。而民办教师就不同，他们和社员一条心，想贫下中农所想，急贫下中农所急。民办教师夏宝纯，就是一个突出的例子。夏宝纯刚到大石湖小学教书时，拿一半工资，挣一半工分。后来改为和社员一样评工记分，并把家搬到大石湖，生活、劳动、学习都和贫下中农一起，思想感情发生了很大变化。生产队没有会计，他白天教书，晚上就帮助记账。生产队离医院二十多里，他想到贫下中农看病不方便，就学着给贫下中农看病、打针、用药。他还目己买了理发工具，给社员理发。"},{"type":"paragraph","text":"现在这个队办小学的教师都以夏宝纯为榜样，不断改造思想，加速自己的思想革命化，把贫下中农的需要放在心上，把向社员宣传毛泽东思想看作自己义不容辞的责任。他们在队里办了夜校，晚上和贫下中农一起学习毛主席著作，和社员一起批判叛徒、内奸、工贼刘少奇在农村推行的“三自一包”、“四大自由”等反革命修正主义黑货。毛主席每项最新指示一发表，他们总是抄到红纸上，挨家挨户送上门去，使远离北京的大石湖生产队的贫下中农，紧跟毛主席的伟大战略部署，革命、生产出现一片新气象。贫下中农都说：“象夏宝纯这样的教师，真是实心实意为咱贫下中农服务。”"},{"type":"paragraph","text":"驻辽阳市卫东区毛泽东思想宣传队 杨金荣"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"416ab18b66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
