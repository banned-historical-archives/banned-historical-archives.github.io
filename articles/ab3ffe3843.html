交际舞曲的规定","authors":[],"dates":[{"year":1952,"month":4}],"is_range_date":false,"parts":[{"text":"中央宣传部关于禁止将国歌等歌曲作为交际舞曲的规定","type":"title"},{"text":"据政务院文教委员会转来外交部办公厅报告：北京有些乐队随意将我国及苏联典礼时用的乐曲改编为交际舞曲，或在跳舞时随便演奏，在国际友人中间影响不好。为纠正这种现象，兹特规定下列五种歌曲，均不得改编为交际舞曲，或在跳交际舞时演奏：一、各国国歌及各国人民歌颂他们的祖国的歌曲（如“祖国进行曲”、“歌唱祖国”等）；二、歌颂革命领袖的歌曲（如“斯大林颂”、“东方红”等）；三、我国及各兄弟国家的党歌、国歌、队歌（如“国际歌”、“少共团员之歌”、“少年队队歌”等）；四、我国及兄弟国家的各种军歌（如“解放军进行曲”、“三大纪律八项注意”等）；五、我国及各兄弟国家的典礼音乐（如“阅兵进行曲”等）。望即通知所属各音乐机关及乐队注意遵行。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab3ffe3843"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
