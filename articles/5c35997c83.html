会通电","authors":["全国在京革命师生向资产阶级反动路线猛烈开火誓师大会"],"dates":[{"year":1966,"month":10,"day":6}],"is_range_date":false,"parts":[{"text":"向资产阶级反动路线猛烈开火──全国在京革命师生誓师大会通电","type":"title"},{"text":"全国在京革命师生向资产阶级反动路线猛烈开火誓师大会","type":"authors"},{"text":"我们，最高统帅毛主席的红小兵，来自五湖四海，为了捍卫无产阶级革命路线，捍卫十六条，捍卫毛泽东思想，团结在一起，战斗在一起，举行向资产阶级反动路线猛烈开火的誓师大会。","type":"paragraph"},{"text":"无产阶级文化大革命，是无产阶级和资产阶级两个阶级、社会主义和资本主义两条道路斗争的新阶段。","type":"paragraph"},{"text":"在这埸文化大革命中，以毛主席为代表的无产阶级革命路线同资产阶级反动路线的斗争仍在继续。","type":"paragraph"},{"text":"目前流传极广、流毒极深、影响极坏的谭力夫“发言”，正是右倾机会主义思潮的反映，正是吹捧资产阶级反动路线的代表作！它明目张胆地反对毛泽东思想，疯狂地诋毁十六条，全面地为右倾机会主义翻案，讲出了党内走资本主义道路当权派想讲又不敢公开讲的黑话。这是一株反党反社会主义反毛泽东思想的大毒草，必须坚决把它连根锄掉！","type":"paragraph"},{"text":"革命的红卫兵，革命的人民，和资产阶级反动路线誓不两立。不批倒资产阶级反动路线，就不能正确贯彻执行无产阶级文化革命的十六条，就不能正确进行斗批改，就不能把文化大革命进行到底。","type":"paragraph"},{"text":"一切革命的红卫兵，革命的同志们，捍卫毛泽东思想，捍卫毛主席的无产阶级革命路线，是我们的神圣天职。头可断，血可流，毛泽东思想不可丢！不批倒资产阶级反动路线誓不罢休！不斗倒党内走资本主义道路的当权派决不收兵！","type":"paragraph"},{"text":"坚持资产阶级反动路线的人，不管他是谁，不管他有多高的职位，多老的资格，多大的“声望”，如果他顽固不化，死不回头，我们都要跟他拚个你死我活，把他打翻在地，踏上一脚，使他们永世不得翻身！","type":"paragraph"},{"text":"踢开一切绊脚石，扫除一切害人虫。革命的红卫兵同志们，让我们高举毛泽东思想伟大红旗，团结起来，向资产阶级反动路线猛烈开火！迎着阻力走，迎着阻力行，迎着阻力向前进，誓将无产阶级文化大革命进行到底！胜利一定属于用毛泽东思想武装起来的革命闯将！未来的世界，一定是毛泽东思想普照的红彤彤的世界！","type":"paragraph"},{"text":"坚决捍卫无产阶级革命路线！","type":"paragraph"},{"text":"坚决把无产阶级文化大革命进行到底！","type":"paragraph"},{"text":"战无不胜的毛泽东思想万岁！","type":"paragraph"},{"text":"伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛主席万岁！万岁！万万岁！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c35997c83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
