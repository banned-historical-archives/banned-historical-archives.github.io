ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"对《高举莫斯科宣言的马克思列宁主义革命旗帜》社论稿的修改","alias":"","parts":[{"type":"paragraph","text":"对《高举莫斯科宣言的马克思列宁主义革命旗帜》社论稿的修改!"},{"type":"paragraph","text":"（1960年6月29日）"},{"type":"paragraph","text":"帝国主义好战集团及其在各国的走狗，在全世界上只是一小撮人。各国的工人、农民、大多数的知识分子、被压迫民族的民族资产阶级以及资本主义国家中的和平人士，都是帝国主义战争政策的受害者，他们都站在或者可以站在保卫世界和平、反对帝国主义的方面来，他们占全人类的绝大多数。革命人民有百分之九十以上。大家看，斗争的结果，是落到百分之九十以上的革命人民的手里呢？还是落到不到百分之十的帝国主义及各国反动派的手里呢？请看今日之域中，竟是谁家天下？"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"只有在地球上消灭了帝国主义制度和资本主义制度，真正消灭了阶级的时候，才会真正出现世界的永久和平。"},{"type":"paragraph","text":"[1]文中用宋体字排印的是毛泽东加写的文字。这篇《人民日报》社论于1960年6月29日发表。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":6,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":412,"page_end":412},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e417904ae3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
