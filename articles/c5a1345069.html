,"authors":[],"dates":[{"year":1959,"month":9}],"is_range_date":false,"parts":[{"text":"林彪在中央军委常委会议谈扩大组建空降兵","type":"title"},{"text":"[陈毅、贺龙、徐向前、聂荣臻、叶剑英、罗荣桓等都赞成选择打过上甘岭保卫战的15军改建空降军]","type":"paragraph"},{"text":"现在的中国人民解放军，陆军是强大的，没有问题，海军、空军和各个兵种，也都在发展之中。相比之下，就是空降兵不够，现在只有一个旅。现代战争需要大规模地在敌人后方进行跳伞作战，也就是说我们不但要有空降部队，还要有空降武器，包括空降坦克、空降汽车、空降炮兵等。这样才能适应现代战争的需要。因此，我们需要扩大空降部队的建制。不过由于目前我们运输机的数量有限，就先扩大一个军，成立一个空降军，归空军建制。这个空降军，要从陆军中调一个最强的军来改建。","type":"paragraph"},{"text":"……陈（毅）老总这样重视空降兵，比我的想法又进了一步，就是应当从陆军部队调战斗英雄、模范来。要选战斗经验最多、打得最好的军改建。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5a1345069"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
