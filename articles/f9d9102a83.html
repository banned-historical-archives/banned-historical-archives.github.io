hors":[],"dates":[{"year":1966,"month":8,"day":14}],"is_range_date":false,"parts":[{"text":"中共中央关于八届十一中全会选举结果的通知","type":"title"},{"text":"各中央局，各省、市、自治区党委，中央各部委，国家机关和人民团体各党委、党组，解放军总政治部：","type":"appellation"},{"text":"中国共产党第八届中央委员会第十一次全体会议，补选了中央政治局委员、候补委员，选举了政治局的常务委员会，补选了书记处书记。现将上述选举结果通知你们。此名单传达到县团级，不向党外传达。","type":"paragraph"},{"text":"（一）补选中央政治局委员六人：","type":"paragraph"},{"text":"陶  铸    陈伯达    康  生    徐向前    聂荣臻","type":"paragraph"},{"text":"叶剑英","type":"paragraph"},{"text":"（二）补选中央政治局候补委员三人：","type":"paragraph"},{"text":"李雪峰    宋任穷    谢富治","type":"paragraph"},{"text":"（三）选举中央政治局常务委员会委员十一人：","type":"paragraph"},{"text":"毛泽东    林  彪    周恩来    陶  铸    陈伯达","type":"paragraph"},{"text":"邓小平    康  生    刘少奇    朱  德    李富春","type":"paragraph"},{"text":"陈  云","type":"paragraph"},{"text":"（四）补选中央书记处书记二人：","type":"paragraph"},{"text":"谢富治    刘宁一","type":"paragraph"}],"comments":[],"origin":"根据中共中央文献研究室《“文革”十年资料选编》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"陈伯达","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9d9102a83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
