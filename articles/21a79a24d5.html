art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席声明是对世界革命新的伟大贡献日共山口县委（左派）机关报《人民之星》发表社论热烈响应毛主席的伟大号召，要求日本人民向美帝、日本反动派以及苏修和日修发动持久的猛烈的进攻","authors":[],"parts":[{"type":"paragraph","text":"新华社二十日讯 据东方通讯社报道：日本共产党山口县委员会（左派）机关报《人民之星》二十日发表社论说，毛主席支持美国黑人抗暴斗争的声明，给美国黑人争取自由解放的斗争指出了明确的前进方向。"},{"type":"paragraph","text":"这篇题为《响应毛主席的伟大号召进行持久的猛烈的斗争》的社论指出，毛主席的声明是对世界革命的新的伟大贡献。这个声明不仅给反对美帝国主义种族歧视的美国黑人以极大的支持，而且给进行反美斗争的全世界人民以极大的鼓舞。"},{"type":"paragraph","text":"社论说，毛主席在声明中指出：“殖民主义、帝国主义和一切剥削制度的彻底崩溃，世界上一切被压迫人民、被压迫民族的彻底翻身，已经为期不远了。”这不仅充分揭示了帝国主义和一切反动派的纸老虎本质，同时也教导我们认清了世界革命的发展进程。"},{"type":"paragraph","text":"社论说，为了响应毛主席的伟大号召，日本的广大工人、农民和革命知识分子以及所有的反美爱国人士，必须立即行动起来，更深入地展开反美爱国运动，强有力地支持美国黑人的抗暴斗争；必须把我们的斗争水平提高一步，对美帝和日本反动派以及苏修和日共宫本修正主义集团，发动持久的猛烈的进攻。"},{"type":"paragraph","text":"社论最后说，我们当前十分重要的任务是：加强反对美日反动派复活日本军国主义的斗争；彻底粉碎鼓吹日本人民走议会道路，背叛越南人民的日共宫本修正主义集团；揭露宫本集团同苏修相勾结，为美帝国主义在越南搞“和谈”骗局效劳的罪恶活动。RW：毛泽东；声明"}],"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21a79a24d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
