["新华社"],"dates":[{"year":1960,"month":8,"day":29}],"is_range_date":false,"parts":[{"text":"洛阳流行传染肝炎","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社洛阳讯　传染性肝炎正在洛阳市蔓延。据不完全调查，目前全市有肝炎患者四百十二人。洛阳矿山机器厂患肝炎的职工已达二百零七人，遍布全厂各车间；七个厂级领导干部当中有两人染上肝炎。洛阳拖拉机制造厂，已经住院治疗的肝炎患者有六十人。涧西医院三百名职工中，有九十三人受到传染，化验室的七个工作人员，全部染上肝炎。市直机关、洛北公社以及郊区都发现有肝炎流行。洛阳市委对这一情况十分重视，已作出防治措施。","type":"paragraph"},{"text":"来源： 1960年8月29日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daeb029901"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
