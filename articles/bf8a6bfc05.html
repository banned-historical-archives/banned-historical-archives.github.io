script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"解放军广大指战员坚决拥护党中央英明决定抡起毛泽东思想的“千钧棒” 彻底砸烂资产阶级教育制度","authors":[],"dates":[{"year":1966,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京19日电　中国人民解放军广大指战员和军事院校教职学员，看到中共中央、国务院关于改革高等学校招生考试办法的决定，无不欢欣鼓舞，高呼“中国共产党万岁!”“毛主席万岁!”“无产阶级文化大革命万岁!”很多部队指战员并立即举行座谈，表示坚决拥护党中央和国务院这一英明的决定。"},{"type":"paragraph","text":"广大指战员都说，这次高等学校招生考试制度的大改革，改得好，改得彻底，具有伟大的历史意义，是关系到培养无产阶级革命事业接班人的百年大计，万年大计，完全反映了我们工农兵的心愿。广州部队某部助理员程云章说，无产阶级的教育方针和资产阶级的教育方针，是针锋相对的。反党反社会主义反毛泽东思想的资产阶级代表人物，利用他们盘踞的教育阵地，与党中央和毛主席制定的教育路线相对抗，他们不是培养无产阶级革命事业的接班人，而是培养为他们复辟资本主义事业的接班人。要挖掉修正主义的毒根，就必须彻底砸烂这一套旧的教育制度。空军军校部党委专门开会，座谈讨论了这个决定和《人民日报》的有关社论，一致表示坚决拥护党中央、国务院的决定。大家认为，学校是无产阶级和资产阶级争夺青年一代的重要阵地，彻底破除旧的教育制度，是挖掉修正主义毒根的革命。我们一定要彻底搞好这场无产阶级文化大革命，坚决贯彻执行党中央和毛主席制定的教育路线，把学校办成培养高举毛泽东思想伟大红旗的无产阶级革命事业接班人的重要阵地。"},{"type":"paragraph","text":"一些知识青年出身的战士，还用自己的亲身经历，愤怒控诉旧的教育制度向青年大量散布资本主义、修正主义毒素的罪行，表示要坚决听毛主席的话，在这场文化大革命运动中，把一切旧的教育制度彻底打碎。海军某工程学院学员杨继东说，旧的教育制度，引诱青年追逐个人名利地位，把青年引入资产阶级个人主义的歧途。这种反动的教育制度，不知毒害了多少青年。我们完全拥护党中央、毛主席的英明决定，必须坚决彻底砸烂它!"},{"type":"paragraph","text":"许多部队指战员和军事院校教职学员，对北京女一中高三(四)班和北京四中高三(五)班革命青年学生，敢想、敢说、敢做、敢闯、敢革命的英雄气概和大无畏的革命精神，表示极大的支持和赞扬。许多部队战士还表示:热烈欢迎革命青年学生，到广大工农兵群众中来，让我们一起在阶级斗争、生产斗争、科学实验的三大革命运动中，在大风大浪里锻炼成长，真正做无产阶级革命事业的接班人，把毛泽东思想伟大红旗接过来，传下去，把社会主义革命进行到底!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf8a6bfc05"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
