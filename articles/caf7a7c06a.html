ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"给黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给黄炎培的信"},{"type":"paragraph","text":"（1951年9月22日）黄副总理："},{"type":"paragraph","text":"九月十五日大示收到。贵体康复，甚慰。"},{"type":"paragraph","text":"最近上海报告一份，可以一阅，阅后请予掷还。其中某些部分带有机密性质，请加注意。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿二日"},{"type":"paragraph","text":"[1]黄炎培，民主建国会主要负责人，当时任中央人民政府委员、政务院副总理。"},{"type":"paragraph","text":"[2]指黄炎培1951年9月15日给毛泽东的信。信中说：“昨晚从东北归来了，在大连住一个半月，身体确已恢复正常。最近半个月在大连、沈阳、鞍山、抚顺、长春、吉林、哈尔滨等地，参观了二十来个厂矿，很想整理所得资料，写一报告，如写成，谨当呈请赐教。”"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":9,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":502,"page_end":502},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"caf7a7c06a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
