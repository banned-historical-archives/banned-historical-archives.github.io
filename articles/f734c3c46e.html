ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"不要打只能击溃不能齐灭之仗","alias":"","parts":[{"type":"paragraph","text":"不要打只能击溃不能歼灭之仗!"},{"type":"paragraph","text":"（1946年8月3日）陈、宋，并告刘、邓，张、邓、粟："},{"type":"paragraph","text":"世电悉。凡只能击溃不能歼灭之仗不要打，只要主力在手总有机会歼敌，过于急躁之意见并不恰当。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"未江"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给山东野战军司令员兼政治委员陈毅和参谋长宋时轮的电报。"},{"type":"paragraph","text":"[2]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。张、邓、粟，指张鼎丞、邓子恢、粟裕，当时分别任华中军区司令员、政治委员和副司令员。"},{"type":"paragraph","text":"[3]指1946年7月31日陈毅、宋时轮给中共中央军委和刘伯承、邓小平、张云逸、黎玉、袁仲贤、张鼎丞、邓子恢、粟裕的电报。电报说，陇海线两侧敌主力均有增加，刻在双沟、曹八集正集结15个团兵力，因此情况变化，只能击溃不能歼灭，我军决以主力向灵璧、泗县找桂顽求战，拟先消灭"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":38,"page_end":38},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f734c3c46e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
