":1949,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“毛主席来了”"},{"type":"paragraph","text":"苏金伞"},{"type":"paragraph","text":"“号外！号外！"},{"type":"paragraph","text":"毛主席来了”"},{"type":"paragraph","text":"市民们马上奔跑出来，"},{"type":"paragraph","text":"顾不得放下手里底工作，"},{"type":"paragraph","text":"有的抱着孩子，"},{"type":"paragraph","text":"有的拿着书本，"},{"type":"paragraph","text":"有的已经睡下，"},{"type":"paragraph","text":"忽然跳下床来，"},{"type":"paragraph","text":"一齐涌现在大街上，"},{"type":"paragraph","text":"把卖报的孩子包围："},{"type":"paragraph","text":"“毛主席在哪里？”"},{"type":"paragraph","text":"“毛主席在哪里？”"},{"type":"paragraph","text":"卖报的孩子举起号外，"},{"type":"paragraph","text":"号外上印着毛主席底像。"},{"type":"paragraph","text":"“这不是毛主席，"},{"type":"paragraph","text":"——咱们底毛主席？”"},{"type":"paragraph","text":"号外霎时被抢光了。"},{"type":"paragraph","text":"车夫蹬着三轮，"},{"type":"paragraph","text":"在街上竞赛。"},{"type":"paragraph","text":"大声喊着："},{"type":"paragraph","text":"毛主席来啦！"},{"type":"paragraph","text":"去迎接咱们底毛主席呵！”"},{"type":"paragraph","text":"学生从自习室里跳出来，"},{"type":"paragraph","text":"抢一张号外，"},{"type":"paragraph","text":"拿到油印机上翻印；"},{"type":"paragraph","text":"然后吆喝着，争夺着，"},{"type":"paragraph","text":"闯进每个宿舍；"},{"type":"paragraph","text":"宿舍里底人又跑出来，"},{"type":"paragraph","text":"抓起锣鼓，"},{"type":"paragraph","text":"活蹦乱跳地敲打。"},{"type":"paragraph","text":"“毛主席来了，"},{"type":"paragraph","text":"都来扭秧歌呵！”"},{"type":"paragraph","text":"热闹的大街上，"},{"type":"paragraph","text":"人挤得水泄不通，"},{"type":"paragraph","text":"很自然地形成一支队伍，"},{"type":"paragraph","text":"好象要到一个地方去，"},{"type":"paragraph","text":"好象要去找毛主席；"},{"type":"paragraph","text":"如果他们知道毛主席底所在，"},{"type":"paragraph","text":"他们会把那座房子举起来，"},{"type":"paragraph","text":"把毛主席举到天空；"},{"type":"paragraph","text":"会搂住他底脖子问好，"},{"type":"paragraph","text":"会拉住他底手致谢。"},{"type":"paragraph","text":"但是今天，天晚了，"},{"type":"paragraph","text":"找不着毛主席。"},{"type":"paragraph","text":"只得惋惜地说："},{"type":"paragraph","text":"“毛主席就是从这条街上过去的"},{"type":"paragraph","text":"！”"},{"type":"paragraph","text":"消息传入工厂，"},{"type":"paragraph","text":"工厂马上翻腾了。"},{"type":"paragraph","text":"工人们自动地集合在空场上，"},{"type":"paragraph","text":"好象有人在召集开会。"},{"type":"paragraph","text":"彼此拍着肩膀祝贺："},{"type":"paragraph","text":"“咱们底领袖，"},{"type":"paragraph","text":"咱们阶级底领袖来了；"},{"type":"paragraph","text":"咱们底毛主席，"},{"type":"paragraph","text":"亲爱的毛主席到北平来了！”"},{"type":"paragraph","text":"毛主席离开咱们二十年啦。"},{"type":"paragraph","text":"今天带着解放大军，"},{"type":"paragraph","text":"又回到城市里来，"},{"type":"paragraph","text":"又回到无产阶级底家里来。"},{"type":"paragraph","text":"和他分离，咱们受了好多苦，"},{"type":"paragraph","text":"他回来，咱们作了主人。"},{"type":"paragraph","text":"咱们要开个团员大会，"},{"type":"paragraph","text":"咱们要派代表去向他致敬！”"},{"type":"paragraph","text":"机器哗笑着，"},{"type":"paragraph","text":"电灯也格外亮了；"},{"type":"paragraph","text":"工人们愉快地工作着。"},{"type":"paragraph","text":"今夜——"},{"type":"paragraph","text":"要提高生产量三分之一，"},{"type":"paragraph","text":"来庆祝毛主席莅平纪念日。"},{"type":"paragraph","text":"并且立誓："},{"type":"paragraph","text":"要响应中共七届二中全会底号召，"},{"type":"paragraph","text":"高度地发展生产事业"},{"type":"paragraph","text":"保证"},{"type":"paragraph","text":"毛主席永远在城市里住下去，"},{"type":"paragraph","text":"脚立得象山一样稳。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d484b9a28"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
