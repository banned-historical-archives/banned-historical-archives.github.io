script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"过细地做工作，才能搞好斗、批、改","authors":["驻平谷县灵山公社解放军毛泽东思想宣传队"],"dates":[{"year":1969,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"过细地做工作，才能搞好斗、批、改"},{"type":"paragraph","text":"驻平谷县灵山公社解放军毛泽东思想宣传队"},{"type":"paragraph","text":"在我们热烈地欢庆我军光荣诞生四十二周年的大喜日子里，《人民日报》、《红旗》杂志、《解放军报》社论传达了伟大领袖毛主席的最新指示：“要过细地做工作。要过细，粗枝大叶不行，粗枝大叶往往搞错。”毛主席的最新指示，字字句句说出了我们革命战士的心里话。毛主席的最新指示，将推动我们全面落实毛主席的各项无产阶级政策，认真搞好斗、批、改。"},{"type":"paragraph","text":"在灵山公社的支农工作中，我们深深体会到：要过细地进行工作，就要用毛泽东思想挂帅，就要眼睛向下，深入群众。前些日子，我们在落实毛主席各项无产阶级政策中，取得了很大成绩。在一派大好形势下，有的同志就产生了差不多的思想，工作只求过得去，不求过得硬。针对这种思想，我们立即举办了毛泽东思想学习班，认真学习了毛主席的教导：“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。所以，我们不能说最后的胜利。几十年都不能说这个话。不能丧失警惕。”学习了毛主席关于无产阶级专政下继续革命的伟大学说，对照检查了我们的工作，检查了落实政策中存在的问题，发现我们虽然较好地落实了毛主席的干部政策，但是，对解放出来的干部，我们的思想工作放松了，有的干部不敢工作、怕犯错误的思想，没有得到及时解决。于是，我们就深入到各个大队，一个一个单位、一个一个干部地进行调查，了解他们的思想状况，针对问题，有的放矢地做耐心的思想工作。为了帮助一个干部，我们一连十几次同他促膝谈心，忆苦思甜，同他一起深入批判大叛徒刘少奇在干部问题上推行的资产阶级反动路线，深入进行两条路线斗争教育，使他进一步提高了阶级斗争和两条路线斗争觉悟，带头狠斗“私”字，勇敢地挑起了革命和生产两副重担。经过一段过细的工作，现在全公社解放出来的干部，都积极地投入到抓革命，促生产的群众运动中，大大加快了全公社斗、批、改的步伐。"},{"type":"paragraph","text":"今后，我们一定要更高地举起毛泽东思想伟大红旗，认真学习和贯彻执行毛主席的最新指示，“过细地做工作”，一步一个脚印地落实各项无产阶级政策，完成毛主席交给我们的“三支”“两军”的光荣任务，争取更大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f1a073842"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
