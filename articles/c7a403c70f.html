罪行","authors":[],"dates":[{"year":1977,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"公安部理论学习组的重要文章《坚持毛主席的公安工作路线，加强对阶级敌人的专政》发表后，市公安局党委立即通知所属部门、单位组织广大干警进行学习讨论。十一月二十九日下午，局党委又邀请一部分干部参加座谈会。与会同志认真学习了这篇重要文章，重温了毛主席、周总理和华主席对公安工作所作的一系列重要指示，畅谈了广大公安干警在毛主席公安工作路线的指引下，有力地打击敌人，保护人民，为保卫社会主义革命和社会主义建设，巩固无产阶级专政作出的重大贡献，愤怒控诉、揭发、批判“四人帮”及其余党和亲信挥舞“两个否定”、“一个砸烂”的大棒，全盘否定毛主席的公安工作路线，全盘否定绝大多数公安干警是好的和比较好的，以及残酷迫害广大公安干警的滔天罪行，决心在华主席为首的党中央领导下，认真打好揭批“四人帮”的第三战役，掀起大揭发、大清查、大控诉、大批判的新高潮，把“四人帮”颠倒了的是非彻底纠正过来，恢复和发扬党的公安工作的优良传统和作风，推动公安工作大治快上，为实现四个现代化，为巩固无产阶级专政作出新的贡献。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7a403c70f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
