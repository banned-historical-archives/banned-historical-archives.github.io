示要为进一步开展日中友好运动而努力","authors":[],"dates":[{"year":1971,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"川濑一贯、萩原定司等日本友好人士发表谈话指出"},{"type":"paragraph","text":"毛主席谈话鼓舞日本人民反美斗争"},{"type":"paragraph","text":"表示要为进一步开展日中友好运动而努力"},{"type":"paragraph","text":"新华社一日讯　东京消息：日本各界友好人士在毛主席《支持日本人民反美爱国正义斗争的谈话》发表七周年时，纷纷发表谈话，表示反美斗争的坚强决心。"},{"type":"paragraph","text":"日中友好贸易界知名人士川濑一贯在谈话中说，毛主席的这一谈话精辟地指出了日本人民面临的实际情况。川濑表示今后要为进一步开展日中友好运动而努力。"},{"type":"paragraph","text":"日本国际贸易促进协会专务理事萩原定司说：“毛主席的谈话，在七年后的今天，仍然极大地鼓舞着日本人民，并且更加深入人心。今天，反对美帝国主义和日本军国主义的呼声和行动，在日中友好贸易界也迅速地扩展开来。”"},{"type":"paragraph","text":"亚非人民团结日本委员会事务局长板井庄作说：“毛主席的谈话，对日本革命的根本问题——谁是敌人，谁是朋友，作出了最重要和唯一正确的回答。”"},{"type":"paragraph","text":"日中友好宗教者座谈会事务局长菅原惠庆在谈话中强调说：“当重温毛主席的谈话时，我们感到必须同美帝国主义坚决斗争到底。只有这样，才能实现日本民族的独立、民主、和平与中立，才能实现世界和平。”菅原最后表示衷心祝愿毛主席万寿无疆！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d6b58d659"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
