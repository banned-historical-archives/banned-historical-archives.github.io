script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级政客和报刊评论维也纳会谈  鼓吹加紧扩军备战继续实行“实力”政策","authors":[],"dates":[{"year":1961,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级政客和报刊评论维也纳会谈"},{"type":"paragraph","text":"鼓吹加紧扩军备战继续实行“实力”政策"},{"type":"paragraph","text":"新华社9日讯　华盛顿消息：美国国会两党领袖和许多资产阶级报纸在评论苏美两国政府首脑的会谈结果时，鼓吹加紧扩军备战，继续实行“实力”政策。"},{"type":"paragraph","text":"紧接着肯尼迪发表关于他的欧洲之行的广播演说之后，共和党参议院领袖德克森和众议院领袖哈勒克8日向报界发表声明，大放“冷战”厥词说，“共产党人能够领会的唯一事情是实力”，“我们认为不应花费我们的精力去计划进一步的谈判，而要把我们的精力用于能使克里姆林领会的有力行动”。德克森和哈勒克主张给日内瓦的不继续试验核武器会议规定一个期限，以便美国以后可以随时随意恢复核试验。声明说，“我们现在需要的是艾森豪威尔在伊朗、黎巴嫩、金门、马祖、危地马拉等地所表现的那种领导”。而据共和党全国委员会主席米勒说，肯尼迪目前也正是“重申艾森豪威尔和尼克松说了八年的语言。”"},{"type":"paragraph","text":"民主党的国会议员也一个接着一个表示美国要继续进行“冷战”。参议院外交委员会主席富布赖特说，“我们同俄国的关系是非常严重的，我们不应该轻视我们在今后几个月内面临的困难”。参议院民主党领袖曼斯菲尔德鼓吹美国在推行它的侵略和战争政策时要有“决心”。参议院民主党副领袖汉弗莱说，“我们必须为一个长时期的和继续不断的紧张、不定和危险的时期作准备”。两院原子能委员会主席霍利菲尔德甚至说，“总统在同赫鲁晓夫会晤之后知道，为缔结禁止核试验协定而进一步谈判，的确将是无益的”。"},{"type":"paragraph","text":"《纽约时报》6日刊载一条发自华盛顿的电讯断言：“东西方关系不会立即有所改善”，“一位高级官员说，维也纳没有发生任何能产生冷战有任何缓和的前景的事情。”"},{"type":"paragraph","text":"这家美国大报6日还以《不是放松的时候》发表社论说，关于苏美两国政府首脑的会谈，“到目前为止所能够看到的是，没有任何事务有所改变”，“因此自由世界把任何事情都不能看作是无所谓的，它必须保持强大……”社论说，“这首先意味着要给予北大西洋联盟以肯尼迪总统所谓的‘新生命’。”据这家报纸透露，肯尼迪现在“正努力以‘真正是多边’的核打击力量来武装北大西洋公约组织……美国将会为这支核打击力量提供‘北极星’导弹潜艇、战略轰炸机和远程导弹”，此外，肯尼迪还“正在力促英国接受明确的保卫柏林的‘紧急’计划”。"},{"type":"paragraph","text":"《纽约时报》7日还刊载苏兹贝格的一篇文章说，维也纳会谈“所证明的只是，虽然这个会谈是有礼貌的，然而冷战仍将继续下去”。"},{"type":"paragraph","text":"《华盛顿邮报》5日的社论认为，维也纳会谈的联合声明“是全然阴郁的”。"},{"type":"paragraph","text":"《纽约先驱论坛报》7日刊载艾尔索普的一篇文章说，维也纳会谈“没有产生任何扎实的或预料之外的或戏剧性的结果”。文章说，美国对于苏联在停止核试验问题上的主张已“拒绝合作。这是说，如果苏联人继续拒绝我们已经在日内瓦提出了的宽大的禁止试验条约的话，美国最后将恢复核试验”。"},{"type":"paragraph","text":"《华尔街日报》6日的社论说，“我们不是最高级外交迷”，维也纳会谈“并没有在任何事情上达成协议”。社论也鼓吹美国不要再继续进行停止核试验的谈判，而“恢复对于我们（美国）的武器的发展所必须的试验”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b92c044473"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
