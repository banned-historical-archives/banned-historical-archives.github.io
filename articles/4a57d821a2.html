ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"在《关于党的生活的几个问题（学习材料）》上的批语","alias":"","parts":[{"type":"paragraph","text":"在《关于党的生活的几个问题"},{"type":"paragraph","text":"（学习材料）》上的批语"},{"type":"paragraph","text":"（1961年10月16日）此件\"已阅，除关于六十条者、已圈掉不用【者】国外，其他"},{"type":"paragraph","text":"[1]这是根据《中共中央关于轮训干部的决定》编辑的供干部学习的材料，主要是摘录了马克思、恩格斯、列宁、斯大林、毛泽东、刘少奇和中共中央文件中关于党的生活的若干论述。目录如下：一、执政党的地位，对我们党提出了更高的要求；二、按照党章办事，做一个名符其实的共产党员；三、严格遵守党的民主集中制；四、正确进行党内斗争；五、密切党和群众的联系；六、加强党的团结。"},{"type":"paragraph","text":"[2]《关于党的生活的几个问题（学习材料）》第42页上摘录了毛泽东1958年1月31日《工作方法六十条（草案）》中以下两段话：“以真正平等的态度对待干部和群众。必须使人感到人们互相间的关系确实是平等的，使人感到你的心是交给他的。学习鲁迅。鲁迅的思想是和他的读者交流的，是和他的读者共鸣的。人们的工作有所不同，职务有所不同，但是任何人不论官有多大，在人民中间都要以一个普遍（通）劳动者的姿态出现。决不许可摆架子。一定要打掉官风。”“对于下级所提出的不同意见，要能够耐心听完，并且加以考虑，不要一听到和自己不同的意见就生气，认为是不尊重自己。这是以平等态度待人的条件之一。”在审阅时，毛泽东删去了这两段话。"},{"type":"paragraph","text":"[3]《关于党的生活的几个问题（学习材料）》第44页上摘录了毛泽东1959年3月17日《党内通信》中以下一段话：“我们的公社党委书记同志们，一定要每日每时关心群众利益，时刻想到自己的政策措施一定要适合当前群众的觉悟水平和当前群众的迫切要求。凡是违背这两条的，一定行不通，一定要失败。”这段话在送毛泽东审阅时即已删去。毛泽东全集第四十四卷都可用。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十六日送田家英同志。[1]田家英，当时任中共中央政治研究室副主任、毛泽东的秘书。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":10,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":464,"page_end":465},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a57d821a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
