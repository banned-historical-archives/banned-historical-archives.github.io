art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底揭露苏修充当美帝头号帮凶的真面目许多人向我代表团要毛主席纪念章；表现了对伟大领袖毛主席的热爱","authors":[],"parts":[{"type":"paragraph","text":"据新华社八日讯 出席国际五金机械工会第五次代表会议的中国工会代表团负责人，今天向新华社记者发表谈话说，在十月十八日至二十三日在保加利亚首都索非亚举行的国际五金工会第五次代表会议上，中国工会代表团高举毛泽东思想的伟大红旗，坚持反对帝国主义、现代修正主义，坚持阶级斗争路线，同苏联修正主义者继续推行“和平共处”的阶级投降路线，在越南问题上竭力为美帝国主义“和谈”阴谋效劳，大肆鼓吹所谓“共同斗争”等叛徒行为进行了针锋相对的斗争。"},{"type":"paragraph","text":"中国工会代表团负责人指出，越南问题是这次会议上两条道路斗争的突出问题。会议的总报告和会议在苏联代表团操纵下强行通过的关于越南问题的呼吁书，根本没有支持胡志明主席向全体越南人民发出的打下去，打到底，直到把美国侵略者全部彻底赶出越南的号召书，而别有用心地鼓吹“停止越南战争”，“根据日内瓦协议进行谈判”，极力为美帝国主义玩弄的“以炸迫和”和利用联合国干涉越南问题效劳。"},{"type":"paragraph","text":"中国代表团的负责人指出，苏联代表团在会议上恬不知耻地大肆吹嘘他们对越南的所谓“援助”。中国代表团坚决反对苏联修正主义者的投降路线，并义正词严地质问苏联代表团，是谁不支持“胡志明主席号召书”，而千方百计地推销美帝国主义的“和谈”阴谋？是谁在美国飞机轰炸越南民主共和国首都河内和重要城市海防时，在日内瓦裁军会议上公开宣称：美国轰炸河内、海防不影响苏美合作和达成裁军协议？是谁同美帝国主义在欧洲搞“缓和”，使美国敢于从欧洲抽调大量兵力去南越屠杀越南人民？是谁在美帝国主义加剧侵略越南战争时，却跑到白宫去同屠杀越南人民的刽子手约翰逊、腊斯克进行密谈……？苏联代表团作贼心虚，理屈词穷，不敢回答中国代表团提出的问题，再次暴露了他们在越南问题上的假支持，真出卖，甘作美帝国主义头号帮凶的真面目。"},{"type":"paragraph","text":"中国代表团负责人说，苏联代表团一面高唱“统一行动”，一面积极进行联美反华。他们早在筹备这次会议期间，竟然在工会国际书记处向世界各国工会散发的会议总报告中，把中国不可分割的领土台湾省称作“中国”，明目张胆地为美帝国主义制造“两个中国”的阴谋效劳，直到会议前夕举行的行政委员会会议上中国代表团揭露了他们的这一卑劣的赤裸裸的反华行为，他们还百般进行诡辩。在代表会议上中国代表团对此提出了强烈的抗议，指出苏联修正主义领导集团从去年十月以来，已经九次在东南亚地区同蒋介石匪帮坐在一起开会。他们在这次会议上明目张胆地制造这一事件是配合美帝国主义制造“两个中国”的反华阴谋的又一严重步骤。"},{"type":"paragraph","text":"中国代表团负责人说，用毛泽东思想武装起来的中国工人和人民的革命的、正义的声音，引起许多人的赞扬和敬佩。有的朋友向中国代表团表示“钦佩中国同志的坚定立场”，有的朋友说，“中国同志讲的话是真理，任何人也驳不倒。”有的人说，“由于你们坚持反修斗争，我们更加热爱中国。”在会场内外，许多人向中国代表团要毛主席纪念章，表现了他们对中国人民伟大领袖毛主席的热爱。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f2951b2a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
