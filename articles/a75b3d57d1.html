" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b2b674a1-9042-4317-a7b8-de4267668ba5","name":"毛泽东思想万岁（1958.1-1960）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"在《中央关于在农村建立人民公社问题的决议》中所加的一段话","alias":"","parts":[{"type":"paragraph","text":"接见西哈努克时的讲话(摘录)"},{"type":"paragraph","text":"（一九五八年八月十五日）"},{"type":"paragraph","text":"学生数目也要控制一下。小学没有关系，中学要控制一下。因为没有那么多事等着给他们做。··"},{"type":"paragraph","text":"不要搞普通的学校，要摘些技术学校，农业学校。在《中央关于在农村建立人民公社问题"},{"type":"paragraph","text":"的决》中所加的一段话"},{"type":"paragraph","text":"（一九五八年八月）"},{"type":"paragraph","text":"人民公社建成以后，不要忙于改集体所有制为全民所有制，在目前还是以采用集体所有制为好，这可以避免在改变所有制的过程中发生不必要的。"},{"type":"paragraph","text":"过渡到了全民所有制，如国营工业企业，它的性质还是社会主义的，各尽所能，按劳分配。然后再经过多少年，社会产品极大地丰富了，全体人民的共产主义的思想觉悟和道德品质都极大地提高了，全民教育普及并且提高了，社会主义时期还不得不保存的旧社会遗留下来的工农差别、脑力劳动与体力劳动的差别，都逐步地消失了，反映不牢等的资产阶级法权的残余，也逐步地消失了，国家职能只是为了对付外部敌人的侵略，对内已经不起作用了，在这种时候，我国社会就将进入各尽所能，各取所需的共产主义时代。"},{"type":"paragraph","text":"在北戴河政治局扩大会上的讲话（一）"},{"type":"paragraph","text":"（一九五八年八月十七日）"},{"type":"paragraph","text":"这次会议是政治局扩大会议，省和自治区的负责同志都参加。题目就是印发的这些，同志们还可看题目。"},{"type":"paragraph","text":"重点是第一个问题，明年，五年经济计划问题，主要是工业，农业也有一点。发一个鑫考数字，不太公道，要搞公道一点，正确一点，搞三天，由富春同志负责。"},{"type":"paragraph","text":"第二个问题：今年铁、钢、铜、问题。钢由五七年的530万吨翻一翻，达到1100万"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":108,"page_end":108},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a75b3d57d1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
