ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"东北野战军取捷径迅速人关包围唐山塘活天津之敌","alias":"","parts":[{"type":"paragraph","text":"东北野战军取捷径迅速人关"},{"type":"paragraph","text":"包围唐山塘沽天津之敌"},{"type":"paragraph","text":"（1948年11月18日）林、罗、刘："},{"type":"paragraph","text":"（一）傅作义经过彭泽湘?及符定一3和我们接洽起义。据称傅起义大致已定，目前考虑者为起义时间、对付华北蒋军及与我党联系等问题。现符定一已到石门，明后日即可见面。我们拟利用此机会稳定傅作义不走，以便迅速解决中央军。（二）望你们立即令各纵以一、二天时间完成出发准备，于二十一日或二十二日全军或至少八个纵队取捷径以最快速度行进，突然包围唐山、塘沽、天津三处敌人，不使逃跑并争取使中央军不战投降（此种可能很大）。（三）望你们在发出出发命令后，先行出发到冀东指挥。（四）我们已令杨罗耿?在阜平停止，并准备出张家口附近协同杨成武阻止傅"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]彭泽湘，民主人士。[3]符定一，文字学家。1946年夏应毛泽东的邀请到过延安。[4]石门，即河北石家庄。"},{"type":"paragraph","text":"[5]杨罗耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。作义西退。徐周\"已复电同意停攻太原。（五）如何部署，盼复。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十八日十八时[1]徐周，指徐向前、周士第，当时分别任华北军区第一副司令员、第"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":239,"page_end":240},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"745b6a847c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
