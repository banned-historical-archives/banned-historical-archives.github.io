查结论","authors":[],"dates":[{"year":1986,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"云南人民出版社关于错划罗会真同志为“右派分子”的复查结论","type":"title"},{"text":"罗会真\t女\t1931年生\t江西九江人\t家庭出身职员\t本人成份学生\t1949年11月参加工作\t1954年8月在云南日报社加入中国共产党\t工资文化行政16级（49.50元）后调我社工作任校对组组长\t现在我社黑土凹纸库负责工作。","type":"paragraph"},{"text":"1958年罗会真同志被错划为“右派分子”。受到开除党籍、撤销职务、监督劳动的处分。1979年我社进行复查，中共云南省出版局党组批准，予以改正。恢复党籍、恢复原工资文化行政16级（49.50元）。现根据云办发（85）73号文件精神，再次进行复查，认为罗会真同志在1957年鸣放中所提意见是正常的，不属右派言论，实属错划，应彻底改正。","type":"paragraph"},{"text":" 中共云南人民出版社委员会1986年8月20日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b58865cda8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
