art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席和周恩来总理最热烈祝贺金日成首相六十寿辰","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年四月十四日讯 中国共产党中央委员会主席毛泽东同志和中华人民共和国国务院总理周恩来同志，四月十四日打电报给朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国内阁首相金日成同志，最热烈地祝贺金日成同志六十寿辰。贺电全文如下："},{"type":"paragraph","text":"朝鲜劳动党中央委员会总书记"},{"type":"paragraph","text":"朝鲜民主主义人民共和国内阁首相"},{"type":"paragraph","text":"金日成同志："},{"type":"paragraph","text":"在您诞生六十周年的时候，我们代表中国共产党中央委员会、中国政府和中国人民，并且以我们个人的名义，向您致以最热烈的、兄弟般的祝贺。"},{"type":"paragraph","text":"您是朝鲜劳动党的缔造者和朝鲜人民久经考验的伟大领袖。您几十年来，在极其困难和复杂的斗争环境中，把马克思列宁主义的普遍真理应用于朝鲜革命的具体实践，取得了朝鲜革命的伟大胜利。在您的领导下，英雄的朝鲜人民高举反帝革命旗帜，通过长期的武装斗争，建立并保卫了无产阶级专政的朝鲜民主主义人民共和国。在您的领导下，朝鲜劳动党和朝鲜人民，贯彻执行“政治上自主，经济上自立，国防上自卫”的方针，把一个落后的殖民地国家建设成为坚强的社会主义国家，挺立在反帝斗争的东方前哨，为全世界人民的反帝革命事业作出了重大贡献。"},{"type":"paragraph","text":"在中国人民的长期革命斗争中，以您为首的朝鲜共产主义者和兄弟的朝鲜人民，高举无产阶级国际主义旗帜，给了我们宝贵的支援，中国人民对此是永志不忘的。"},{"type":"paragraph","text":"中朝两党、两国人民，在反对共同敌人的长期斗争中，用鲜血凝成了伟大友谊和战斗团结。这种友谊和团结是建立在马克思列宁主义和无产阶级国际主义原则基础上的，是战胜共同敌人的可靠保证。中国人民坚决支持朝鲜人民反对美帝国主义、日本军国主义及其走狗，实现祖国自主和平统一的正义斗争。"},{"type":"paragraph","text":"我们衷心祝愿您领导朝鲜劳动党和朝鲜人民，在今后的革命事业中，取得新的更大的成就。"},{"type":"paragraph","text":"中国共产党中央委员会主席 毛泽东"},{"type":"paragraph","text":"中华人民共和国国务院总理 周恩来"},{"type":"paragraph","text":"一九七二年四月十四日"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb8b7fdc63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
