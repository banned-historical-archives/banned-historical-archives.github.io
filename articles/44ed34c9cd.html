ates":[{"year":1977,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英同志关于毛主席手书《远望》诗的说明"},{"type":"paragraph","text":"《远望》一诗，为刺责“北极熊”蜕化变修而作，时在一九六五年秋。"},{"type":"paragraph","text":"一九七六年十二月二十八日，我收到毛岸青、邵华两同志信，信云："},{"type":"paragraph","text":"“叶伯伯：记得一九六六年元旦前，我们去看望父亲，父亲挥笔写了伯伯的《远望》诗一首，以教育、鼓励我们革命。”"},{"type":"paragraph","text":"随信惠我影印件一份。我特借得原件，请王冶秋同志加工制版，以为永久珍藏的纪念。"},{"type":"paragraph","text":"叶剑英"},{"type":"paragraph","text":"一九七七年一月十日"},{"type":"paragraph","text":"〔毛主席手迹影印件、叶剑英同志的说明及《远望》诗注释，系文物出版社供稿。叶剑英同志《诗三首》原载《人民文学》一九七七年第三期。《远望》一诗，曾在一九六五年十月十六日《光明日报》发表。〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44ed34c9cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
