[],"dates":[{"year":1973,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社万象一九七三年十二月二十日电　老挝执行协定中央联合委员会中的老挝各爱国力量代表团发言人炮·奔那蓬二十日对记者发表谈话，谴责万象极右派阻挠临时民族联合政府的成立。"},{"type":"paragraph","text":"炮·奔那蓬说，最近，万象极右派连续制造事端来破坏成立联合政府的进程。万象军队的一些军官派兵包围了各爱国力量方面人员在琅勃拉邦市的驻地，进行挑衅。在十三号公路上，极右派军人袭击了一辆公共汽车，然后就此事大肆造谣，企图嫁祸于各爱国力量，挑拨各爱国力量同人民的关系。极右派的T—28飞机还不断在万象和琅勃拉邦市上空盘旋，对进驻两城市的各爱国力量方面人员进行挑衅和威胁。在其他地区，极右派军人也在多处制造事端。他指出，所有这些事件是十分可悲和令人遗憾的。他说，各爱国力量代表团团长陶苏·培拉西已就此向万象方面提出了强烈抗议。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9aec1d38bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
