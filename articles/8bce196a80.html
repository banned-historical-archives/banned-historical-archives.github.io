来　自反美战争前线的英雄的越南南方人民的使者亲切握手，表示热烈欢迎","authors":[],"dates":[{"year":1967,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十二日电　我们伟大领袖毛主席和他的亲密战友林彪副主席，今天下午接见了越南南方民族解放阵线常驻中国代表团团长阮文广，副团长阮明芳，并且接见了越南南方人民代表团团长阮春龙，副团长黎氏芝、山禄和代表团全体成员。"},{"type":"paragraph","text":"陪同接见的，有周恩来、陈伯达、康生、戚本禹、姚文元等同志。"},{"type":"paragraph","text":"越南南方战友来到接见厅时，毛主席和林彪副主席以及中央其他领导同志，同他们一一亲切握手，向来自反美战争前线的英雄的越南南方人民的使者，表示热烈欢迎，并同他们一起照了像。"},{"type":"paragraph","text":"随后，毛主席和林彪副主席以及中央其他领导同志，同越南南方战友进行了极为亲切的谈话。"},{"type":"paragraph","text":"被接见的越南南方人民代表团的成员是:阮俊、阮坡、阮氏蕙、潘清忠、阿玛哈、黎光和阮福。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\12\\67cn010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我们伟大领袖毛主席和他的亲密战友林彪副主席，十二月二十二日接见越南南方民族解放阵线常驻中国代表团团长阮文广，副团长阮明芳，以及越南南方人民代表团团长阮春龙，副团长黎氏芝、山禄和代表团全体成员"},{"type":"paragraph","text":"(新华社传真　钱嗣杰摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bce196a80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
