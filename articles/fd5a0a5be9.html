ates":[{"year":1960,"month":12,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对外国资本的残酷剥削"},{"type":"paragraph","text":"坦噶尼喀钻石工人坚持罢工"},{"type":"paragraph","text":"坦噶尼喀姆瓦杜伊地方的钻石矿工人最近举行罢工，要求提高工资和改善劳动条件。目前罢工还在继续进行中。"},{"type":"paragraph","text":"在工人罢工后，资方曾进行威胁说，如果他们不复工，将把所有罢工的工人解雇。矿工们不理睬资方的威胁，坚持进行罢工，迫使资方不得不撤回这种威胁。"},{"type":"paragraph","text":"矿工们对坦噶尼喀政府16日发表的反对罢工，并说什么如果工人们要求提高工资、外国投资者就不敢在坦噶尼喀投资的声明，表示极大的不满。"},{"type":"paragraph","text":"姆瓦杜伊是坦噶尼喀主要钻石矿区之一，但是，整个这个国家的钻石工业都被外国公司所垄断。"},{"type":"paragraph","text":"（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd5a0a5be9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
