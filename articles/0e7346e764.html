ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对中央关于湖南问题若干决定稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对中央关于湖南问题若干决定稿的"},{"type":"paragraph","text":"批语和修改!"},{"type":"paragraph","text":"（1967年8月4日、7日）改了一点，其余都好。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月四日"},{"type":"paragraph","text":"[1]中共中央关于湖南问题的若干决定稿共四条，主要是：一、湖南省军区党委常委《关于支左工作中所犯错误的检查报告》对前段支左工作进行了认真的自我批评，态度是好的，认识是比较深刻的。二、中央已经决定改组省军区，并着手成立湖南省革命委员会筹备小组，领导全省的“文化大革命”和工农业生产。三、各革命群众组织应在省革委筹备小组的领导下，在毛主席无产阶级革命路线基础上加强团结，开展革命的大批判，狠抓革命，猛促生产，保证完成和超额完成今年的工农业生产任务。四、湖南省赴京汇报代表团双方签订的《关于立即坚决制止武斗协议》很好，各群众组织必须认真执行。中央决定稿曾两次送毛泽东审阅，本篇一、二是分别对这两次送审稿的批语；本篇三是对这个决定稿的修改，其中用宋体字排印的是毛泽东加写和改写的文字。1967年8月10日，中共中央下发了这个决定。对中央关于湖南问题若干决定稿的批语和修改"},{"type":"paragraph","text":"二已阅，同意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月七日下午六时"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"除了军区负责之外，中央文革小组对湖南省军区二月三日关于“湘江风雷”报告所发的“二·四批示”是错误的，“湘江风雷”是一个群众人数较多的革命组织，在大发展中混入了极少数的坏人，造成内部成分不纯，出现了一些缺点错误，但是不应该因此否定这个组织。在这个问题上，中央是有责任的。从这里得到教训，未经调查清楚，何必那样匆匆忙忙地根据一面之词发出“二·四批示”呢？因此，中央要负主要的责任。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":8,"day":4},{"year":1967,"month":8,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":48,"page_end":49},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e7346e764"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
