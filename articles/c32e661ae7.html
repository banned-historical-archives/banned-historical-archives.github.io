script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"古禁止发行两份苏联刊物称其“宣扬资产阶级民主”，不符合古巴的“革命原则”","authors":[],"dates":[{"year":1989,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社哈瓦那8月4日电　古巴共产党中央委员会4日决定禁止在古巴继续发行苏联杂志《莫斯科新闻》周刊和《旅伴》月刊，认为这两种刊物长期“宣扬资产阶级民主”，不符合古巴的“革命原则”。这是古巴政府自1959年取得政权以来第一次对苏联刊物采取这种措施。"},{"type":"paragraph","text":"这一决定是古巴共产党机关报《格拉玛报》宣布的。"},{"type":"paragraph","text":"这家报纸说，古巴一些政府和军队干部以及舆论界不断致信古共中央委员会，要求查封上述苏联刊物。"},{"type":"paragraph","text":"《格拉玛报》发表的编辑部声明说，《莫斯科新闻》和《旅伴》宣扬“资产阶级民主是人民参政的最高形式”，鼓吹“美国的生活方式”，甚至断言“帝国主义已不复存在”。"},{"type":"paragraph","text":"声明认为，这两种刊物还“否定苏联历史”，“污辱谩骂列宁”，宣扬“多元主义、私有制和无政府主义”。"},{"type":"paragraph","text":"据报道，目前在古巴发行的苏联刊物共有36种，每年总发行量为1500万册。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c32e661ae7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
