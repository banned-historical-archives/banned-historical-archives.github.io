nth":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"修正主义是资产阶级意识形态的表现，它麻痹工人阶级的革命意志，要求保存或者恢复资本主义。它打着马克思主义的旗号，对马克思列宁主义的根本原则进行修改和阉割。"},{"type":"paragraph","text":"在十九世纪末年，以伯恩斯坦为代表的老修正主义者，适应资产阶级的需要，企图证明马克思主义已经“过时”。以铁托为代表的现代修正主义者，适应帝国主义的需要，企图证明列宁主义已经“过时”。他们否认在从资本主义向社会主义过渡的时期实行无产阶级革命和无产阶级专政的历史必要性，否认马克思列宁主义政党的领导作用，否认无产阶级国际主义的原则，否认列宁主义关于建立社会主义、共产主义的全部完整的学说。他们以反对“教条主义”为名，其实是反对马克思列宁主义。"},{"type":"paragraph","text":"资产阶级影响的存在，是修正主义的国内根源。屈服于帝国主义的压力，则是修正主义的国外根源。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb1254a554"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
