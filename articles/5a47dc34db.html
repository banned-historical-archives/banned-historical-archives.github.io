:["孟宪励"],"dates":[{"year":1998,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东选集》《邓小平选集》典藏本"},{"type":"paragraph","text":"印刷胶片由中国革命博物馆珍藏"},{"type":"paragraph","text":"本报北京12月24日讯 记者孟宪励报道：由邓小平同志生前题写书名的《毛泽东选集》典藏本今起由人民出版社出版发行，其印刷胶片和由江泽民总书记题写书名的《邓小平选集》典藏本印刷胶片今天由中国革命博物馆珍藏。"},{"type":"paragraph","text":"《毛泽东选集》典藏本和《邓小平选集》典藏本是人民出版社推出的独具特色的领袖著作典藏系列，其中《邓小平选集》典藏本已在今年2月出版。两套典藏本各自编号限量发行1000套，并获公证。"},{"type":"paragraph","text":"在今天的公证、赠送仪式上，出版单位还向中国革命博物馆、北京图书馆和国家版本图书馆等单位赠送《毛泽东选集》和《邓小平选集》典藏本各一套。"},{"type":"paragraph","text":"两套典藏本正文都用象牙道林纸精印，优质金丝楠木精工制作书函，函面各自镶有著名雕塑家程允贤创作的毛泽东、邓小平铜质浮雕像，外加深棕色丝质护盒。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a47dc34db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
