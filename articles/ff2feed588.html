ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"给吴玉章的信","alias":"","parts":[{"type":"paragraph","text":"给吴玉章的信"},{"type":"paragraph","text":"（1947年11月18日）玉章同志："},{"type":"paragraph","text":"来示及意见书，收到读悉。尊体日益强健，热情甚高，极为快慰。贱躯虽间或有些小毛病，但比在延安时好得多了。向川陕鄂边发展根据地一事，业已有所部署，其详请问叶参谋长\"。宪草尚未至发表时期，内容亦宜从长斟酌，以工农民主专政为基本原则，详情由王谢3二同志面达。天寒尚望保重身体。"},{"type":"paragraph","text":"敬祝安好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十八日[1]吴玉章，当时任中共中央委员、中共中央法律委员会委员。"},{"type":"paragraph","text":"[2]这是当时对叶剑英的习惯称呼。抗日战争时期叶剑英曾任第十八集团军参谋长、中共中央军委参谋长。抗战胜利后，曾任中共中央军委副总参谋长。"},{"type":"paragraph","text":"[3]王谢，指王明、谢觉哉。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":404,"page_end":404},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff2feed588"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
