<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西哈努克亲王参观南京长江大桥受到热烈欢迎  许世友叶剑英等同志陪同柬埔寨贵宾参观","authors":[],"dates":[{"year":1971,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西哈努克亲王参观南京长江大桥受到热烈欢迎"},{"type":"paragraph","text":"许世友叶剑英等同志陪同柬埔寨贵宾参观"},{"type":"paragraph","text":"新华社南京二十八日电　柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，今天上午由江苏省革命委员会主任、中国人民解放军南京部队司令员许世友陪同，参观了南京长江大桥，受到革命群众的热烈欢迎。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英，以及江苏省革命委员会、中国人民解放军南京部队和南京市革命委员会其他负责人，也陪同西哈努克亲王和夫人参观了南京长江大桥。"},{"type":"paragraph","text":"今天，南京长江大桥上红旗招展，桥头堡两旁悬挂着“热烈欢迎柬埔寨国家元首诺罗敦·西哈努克亲王！”“中柬两国人民的伟大友谊和战斗团结万岁！”等巨幅标语。"},{"type":"paragraph","text":"上午十时许，西哈努克亲王和夫人以及其他柬埔寨贵宾乘车来到大桥时，桥头锣鼓喧天，江面轮船汽笛齐鸣，革命群众载歌载舞，不断高呼口号，热烈欢迎柬埔寨贵宾。"},{"type":"paragraph","text":"西哈努克亲王和夫人乘船观看了南京长江大桥的全景，还参观了铁路桥和公路桥。长江大桥管理处负责人和建桥工人代表向柬埔寨贵宾介绍了我国工人阶级遵照伟大领袖毛主席的教导，自力更生建造南京长江大桥的经过。西哈努克亲王热情赞扬南京长江大桥是中国工人阶级在毛主席领导下创建的一项伟大工程。他说，中国工人阶级取得这样惊人的社会主义建设成就，是对处在抗美救国战争中的柬埔寨人民的巨大鼓舞和支持。在建桥中创造出优异潜水成绩的工人胡宝玲向西哈努克亲王和夫人表示，大桥工人坚决响应伟大领袖毛主席的号召，决心以抓革命、促生产的实际行动支援柬埔寨人民和印度支那人民的抗美救国战争，直到取得彻底胜利。"},{"type":"paragraph","text":"晚上，西哈努克亲王和夫人以及其他柬埔寨贵宾，观赏了南京长江大桥的夜景。"},{"type":"paragraph","text":"随同西哈努克亲王和夫人参观南京长江大桥的有：西哈努克亲王的姑母诺罗敦·凯卡妮娅公主，国家元首办公厅主任西索瓦·梅达维亲王，古伦夫人，柬埔寨王国民族团结政府军需、军备大臣杨森安将军和夫人，柬埔寨驻中国大使凯密等。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召以及杨玲同志陪同西哈努克亲王和夫人参观了南京长江大桥。"},{"type":"paragraph","text":"今天下午，部分柬埔寨贵宾参观了南京火花玻璃仪器厂和南京市成贤街小学。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人以及其他柬埔寨贵宾，在许世友、叶剑英等同志陪同下，二月二十八日参观了南京长江大桥。这是西哈努克亲王和夫人在参观南京长江大桥铁路桥。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"许世友","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed53fd7e4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
