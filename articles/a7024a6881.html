script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji14","name":"毛泽东全集第14卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"在陕甘宁边区第二届农工展览会开幕典礼上的讲话","alias":"","parts":[{"type":"paragraph","text":"在陕甘宁边区第二届农工展览会"},{"type":"paragraph","text":"开幕典礼上的讲话"},{"type":"paragraph","text":"（1940年1月16日）同志们："},{"type":"paragraph","text":"这个农展会，我还没去看，好不好还不知道，但我听到说还好，比去年的好。去年我是看过的，今年比去年更是好，这是老百姓同志的努力，是政府工作人员努力的结果。政府的人如不同老百姓结合，事情就办不好。有两种政府，一种只知道刮刮刮，另一种则帮老百姓的忙一—边区政府就是这种帮忙政府。老百姓从几百里拿来一包两包面送来展览，这对打日本有大道理，这是老百姓同志的热心。边区政府受老百姓的拥护，作出许多好事，这也是热心作出来的，我们要发展这个热心。但还有一条，只有热心还不行，还要力求进步，今年的展览会就有进步。我们要奖励这些劳动英雄们，因为他们不但热心，而且求进步。这是有八路军，但八路军也就是老百姓，故军队不要忘本，本就是工农，在座有许多八路军同志，你们要向老百姓敬礼，不要骂人。老百姓可以骂我们，我们却不能骂他们，因为他们是主人，因为我们的饭是他们做的，房子是他们做的，我们要军民合作。八路军有两条规矩，一条是官兵合作，一条就是军民合作，大家亲亲密密团结起来，日本一定打倒的。"},{"type":"paragraph","text":"我们边区有二十三个县，一个也不多，一个也不少。但有些磨擦分子，派了兵来一打，打过我们几个县，这是不行的。你们到外面去的同志更要同他们讲一讲，我们要吃团结饭，不要吃磨擦饭，吃了磨擦饭肚子痛，要死人，还要亡国的。我们今天开这个大会，有许多同志，还有张先生及蒙古同志，我们大家要吃团结饭，不要吃磨擦饭。磨擦要同日本帝国主义磨擦，将他磨入海中去，不要在自己内窝子磨擦。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":1,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":293},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7024a6881"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
