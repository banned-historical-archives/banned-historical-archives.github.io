<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拥护华主席　声讨“四人帮”","authors":[],"dates":[{"year":1976,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共上海技术物理研究所委员会"},{"type":"paragraph","text":"我们全所同志以无比激动的心情，热烈欢呼、坚决拥护华国锋同志任中共中央主席、中央军委主席，热烈庆祝粉碎“四人帮”反党集团篡党夺权阴谋的伟大胜利。我们衷心欢迎以华主席为首的党中央派苏振华、倪志福、彭冲三位领导同志主持上海市委工作，热烈欢呼党中央撤销张春桥、姚文元、王洪文在上海的党内外一切职务。"},{"type":"paragraph","text":"以华国锋主席为首的党中央代表了全党全军全国各族人民的共同愿望和迫切要求，一举粉碎了正洪文、张春桥、江青、姚文元反党集团，为我党消除了一大祸害，这是毛主席关于无产阶级专政下继续革命的伟大理论的一次伟大实践，是无产阶级文化大革命的伟大胜利，是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"王张江姚反党集团是隐藏在我们革命队伍里的蛀虫。他们完全背叛了马克思主义、列宁主义、毛泽东思想，是一伙资产阶级阴谋家、野心家，反革命两面派。他们打着马克思主义的旗号，搞修正主义，阴谋篡党夺权，祸国殃民，作恶多端，罄竹难书。长期以来，他们背着党中央，背着上海人民，搞了许多反党阴谋活动，直到他们行将覆灭的时候，还妄图负隅顽抗，进行垂死挣扎。他们是党内资产阶级的典型代表，是不肯改悔的正在走的走资派，是一小撮吸工人血的新资产阶级分子，比资本家还厉害。我们同王张江姚反党集团的斗争，是无产阶级同资产阶级、社会主义同资本主义、马克思主义同修正主义之间的你死我活的斗争。他们妄想搞垮我们党的任何阴谋，都是不能得逞的，是注定要失败的。“四人帮”在上海也同在全国各地一样，丧尽人心，极端孤立，上海人民早就看在眼里，恨在心头。我们热烈欢呼以华主席为首的党中央对“四人帮”采取的英明果断的措施，我们完全信赖、坚决拥护以华国锋主席为首的党中央，决心最紧密地团结在以华主席为首的党中央的周围，一切行动听从党中央的指挥，坚持毛主席提出的“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”三项基本原则，同“四人帮”作坚决的斗争，彻底清算“四人帮”的反革命罪行，彻底清算他们在上海所犯下的滔天罪行，把王张江姚押上历史的审判台，扫进历史垃圾堆。打倒王洪文!打倒张春桥!打倒江青!打倒姚文元!"},{"type":"paragraph","text":"我们一定要响应华国锋主席为首的党中央的号召，在以苏振华同志为第一书记的上海市委领导下，高举马克思主义、列宁主义、毛泽东思想的伟大红旗，掀起学习马列著作和毛主席著作的新高潮，同“四人帮”斗争到底。我们要深入开展科技领域里的社会主义革命，努力发展我国社会主义的科学事业，以实际行动保卫以华国锋主席为首的党中央，永远沿着毛主席指引的航向胜利前进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a26f0b09f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
