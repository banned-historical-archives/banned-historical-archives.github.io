rs":[],"dates":[{"year":1968,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"发挥工人阶级主力军作用　夺取文化大革命全面胜利"},{"type":"paragraph","text":"南宁工代会光荣诞生"},{"type":"paragraph","text":"据新华社南宁二十一日电　在夺取无产阶级文化大革命全面胜利的凯歌声中，广西壮族自治区首府南宁各族工人实现了革命大联合，于三月十八日至二十日胜利地召开了南宁工人阶级首届代表大会，宣告南宁工代会成立。这是南宁工人阶级全面落实毛主席最新指示的丰硕成果，是毛主席无产阶级革命路线的伟大胜利。"},{"type":"paragraph","text":"广西壮族自治区革命委员会筹备小组、人民解放军广西军区和南宁驻军负责人韦国清、魏佑铸、焦红光、伍晋南、安平生、徐其海等参加了成立大会。"},{"type":"paragraph","text":"在无产阶级文化大革命中，南宁各族工人热烈响应伟大领袖毛主席“你们要关心国家大事，要把无产阶级文化大革命进行到底”的伟大号召，同广大革命群众一道，大造中国赫鲁晓夫及其在广西的代理人的反，大造资产阶级反动路线的反，捍卫了毛主席的无产阶级革命路线，为广西无产阶级文化大革命作出了很大贡献。伟大领袖毛主席视察华北、中南和华东地区时所作的一系列最新指示传来后，南宁工人阶级欢欣鼓舞，迅速掀起了认真学习、全面落实的热潮。他们在人民解放军指战员的支持和帮助下，大办毛泽东思想学习班，以“斗私，批修”为纲，大破“私”字，大立“公”字，围剿资产阶级、小资产阶级派性，增强无产阶级党性，反对无政府主义，加强革命的组织性、纪律性，排除来自右的和极“左”方面的干扰，带头实现革命的大联合和促进革命的三结合，为南宁地区广大革命群众作出了榜样。"},{"type":"paragraph","text":"在大会上，魏佑铸同志代表广西壮族自治区革命委员会筹备小组、人民解放军广西军区和南宁驻军，向大会表示热烈祝贺。"},{"type":"paragraph","text":"工代会的代表在讲话中表示，要更高地举起毛泽东思想伟大红旗，夺取文化大革命全面胜利。"},{"type":"paragraph","text":"大会期间，代表们交流了活学活用毛主席著作，落实毛主席的最新指示，实现和巩固革命大联合和革命三结合的经验。"},{"type":"paragraph","text":"大会在热烈的掌声和欢呼声中通过了给伟大领袖毛主席的致敬电。还通过了给人民解放军全体指战员的慰问信和告全市革命职工书。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdea7a196a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
