ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对韶山全体农民来信的批语和复信","alias":"","parts":[{"type":"paragraph","text":"对韶山乡全体农民来信的批语和复信"},{"type":"paragraph","text":"（1954年12月）刘、周、朱、陈、小平、子恢、伯达、尚昆阅，退毛。韶山乡的情况，值得一阅。"},{"type":"paragraph","text":"韶山乡五百八十六户，去年卖余粮十二万斤，今年卖二十万斤，增加了八万斤，生活还比去年好。除此信外，现有四位农民来北京，受我招待，他们都说情形很好。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。朱，指朱德。陈，指陈云，当时任中共中央书记处书记、国务院副总理。小平，即邓小平，当时任中共中央秘书长、国务院副总理。子恢，即邓子恢，当时任中共中央农村工作部部长。伯达，即陈伯达，当时任中共中央农村工作部副部长。尚昆，即杨尚昆，当时任中共中央办公厅主任。"},{"type":"paragraph","text":"[2]指韶山乡全体农民1954年12月13日给毛泽东的信。信中说：“年来，在党和您的正确领导下，您的故乡在实行国家对农业的社会主义改造方面取得了显著的成绩，全乡共有五百八十六户，至今参加互助合作的五百二十户，组织面已达百分之九十二点五。去年全乡卖出余粮十二万斤，今年又卖了二十万斤，支援了国家社会主义工业化。互助合作的道路，使全乡农民大家富裕，共同上升，增加了生产，改善了生活，并以更多的粮食支援国家建设。”"},{"type":"paragraph","text":"对韶山乡全体农民来信的批语和复信"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"毛月秋\"，七十多岁，老党员，现受政府命看守我家乡的那个屋子。21"},{"type":"paragraph","text":"三月秋同志："},{"type":"paragraph","text":"你的信，全体农民的信，收到了，十分高兴。请你转告韶山乡的党政同志及全体农民同志，感谢他们的好意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年十二月廿八日"},{"type":"paragraph","text":"[1]毛月秋，大革命时期曾在韶山任中共慈悦支部书记，新中国成立后在韶山毛泽东旧居做接待工作。"},{"type":"paragraph","text":"[2]这段批语写在毛月秋1954年12月13日为转交韵山乡全体农民的信而写给毛泽东的信上。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":398,"page_end":399},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"903d8d1fa9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
