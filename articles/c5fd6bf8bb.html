script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"34799034-2c67-4e1f-ae74-793ab6bd754b","name":"中共党史教学参考资料 第26册 “文化大革命”参考资料 中册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/34799034-2c67-4e1f-ae74-793ab6bd754b.pdf"],"article":{"title":"毛泽东在一个材料上的批示","alias":"","parts":[{"type":"paragraph","text":"毛泽东对《无产阶级专政胜利万岁》一稿的批语"},{"type":"paragraph","text":"（一九七一年三月十五日）看了一遍，觉得可用。"},{"type":"paragraph","text":"只在十八页上去掉一个词，以便突出马列。十七页上已有了这个词1也就够了。我党多年来不读马、列，不突出马、列，竞让一些骗子骗了多年，使很多人甚至不知道什么是唯物论，什么是唯心论。在庐山闹出大笑话。这个教训非常严重，这几年应当特别注意宣传马、列。"},{"type":"paragraph","text":"三月十五日九时毛泽东在一个材料上的批示"},{"type":"paragraph","text":"（一九七一年三月三十日）"},{"type":"paragraph","text":"此件留待军委办事组各同志一阅。上了陈伯达贼船，年深日久，虽有庐山以来半年的时间，经过各种批判会议，到三月十九才讲出几句真话，真是上贼船容易下贼船难。人一输了理（就是走错了路线），就怕揭，庐山会议上的那种猖狂进攻的勇气，不知跑到那里去了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月三十日"},{"type":"paragraph","text":"毛主席在最后一页批示这还只是申明。下文如何，要看行动。"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":533,"page_end":533},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5fd6bf8bb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
