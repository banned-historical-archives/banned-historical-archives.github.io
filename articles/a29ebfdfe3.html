":"一九八六年第二次全国宣传部长座谈会（概况）","dates":[{"year":1986,"month":8,"day":25}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部办公厅, 党的宣传工作会议概况和文献(1951——1992年), 779","tags":[{"name":"社会主义精神文明","type":"主题/事件"},{"name":"宣传","type":"主题/事件"}],"parts":[{"type":"title","text":"一九八六年第二次全国宣传部长座谈会"},{"type":"paragraph","text":"• 概况 •"},{"type":"paragraph","text":"1986年第二次全国宣传部长座谈会于8月25日至29日在北京召开。"},{"type":"paragraph","text":"参加这次会议的有各省、自治区、直辖市党委宣传部长和哈尔滨、沈阳、大连、西安、南京、武汉、广州、重庆市党委宣传部长以及青岛、厦门、深圳市委宣传部长，共90多人。"},{"type":"paragraph","text":"会议议题是：学习和讨论《中共中央关于精神文明建设的指导方针的决议》(征求意见稿)。"},{"type":"paragraph","text":"中央宣传部部长朱厚泽主持了会议。"},{"type":"paragraph","text":"在讨论中，与会代表一致认为：关于精神文明建设的指导方针专门搞一个决议，这不仅在我党历史上，就是国际共运史山，也是第一次，具有深远的历史意义，代表们对征求意见稿也提出了一些修改意见和建议，如：精神文明建设应有具体措施；要考虑民族地区特点；要深化对商品经济的认识；要充分肯定改革开放对精神文明建设的推动作用等。"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a29ebfdfe3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
