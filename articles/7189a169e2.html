art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见李宗仁先生和夫人","authors":["钱嗣杰"],"parts":[{"type":"paragraph","text":"毛主席说：祖国是比过去强大了一些，但还不很强大，我们至少还得再建设二三十年才能真正强大起来。又说：跑到海外的，凡是愿意回来，我们都欢迎。他们回来，我们都以礼相待。"},{"type":"paragraph","text":"新华社二十七日讯 毛泽东主席今天中午接见李宗仁先生和他的夫人郭德洁女士。"},{"type":"paragraph","text":"毛主席同李宗仁先生及其夫人热烈握手。"},{"type":"paragraph","text":"毛主席说：你们回来，很好，欢迎你们。"},{"type":"paragraph","text":"李宗仁先生说，我们回来后都为祖国的强大感到高兴。"},{"type":"paragraph","text":"毛主席说：祖国是比过去强大了一些，但还不很强大，我们至少还得再建设二三十年才能真正强大起来。"},{"type":"paragraph","text":"李宗仁先生对毛主席说，在海外的许多人士都怀念祖国，他们渴望回到祖国来。"},{"type":"paragraph","text":"毛主席说，跑到海外的，凡是愿意回来，我们都欢迎。他们回来，我们都以礼相待。毛主席建议李宗仁先生到全国各地去看看。"},{"type":"paragraph","text":"今天同时被接见的还有程思远先生。"},{"type":"paragraph","text":"接见时在座的，有彭真同志，郭沫若同志和夫人于立群，中共中央统一战线工作部部长徐冰同志，以及章士钊先生，刘仲容先生。"},{"type":"paragraph","text":"接见后，毛泽东主席和夫人江青同志设宴招待李宗仁先生和夫人郭德洁女士，以及程思远先生。"},{"type":"paragraph","text":"右图 七月二十七日，毛泽东主席接见李宗仁先生（前右四）和他的夫人郭德洁女士（前右六）以及程思远先生（前右二）接见后，毛主席和他们合影留念。"},{"type":"paragraph","text":"新华社记者 钱嗣杰摄RW：毛泽东；社会活动；李宗仁"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7189a169e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
