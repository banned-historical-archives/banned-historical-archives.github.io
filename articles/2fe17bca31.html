al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"和萧三的谈话","alias":"","parts":[{"type":"paragraph","text":"和萧三的谈话[]"},{"type":"paragraph","text":"（1910年）"},{"type":"paragraph","text":"中国也要有这样的人物，我们应该讲求富国强兵之道，才不致蹈安南、高丽、印度的覆辙。你知道，中国有句古话：“前车之覆，后车之鉴。”而我们每个国民都应该努力，顾炎武说得好：“天下兴亡，匹夫有责。”"},{"type":"paragraph","text":"中国疲弱不振，要使他富强，独立起来，要有很长的时间，但是，时间长不要紧，你看！华盛顿经过八年艰苦战争之后，才得到胜利，建立了美国。"},{"type":"paragraph","text":"[1]这是毛泽东1910年在东山学堂读《世界英雄豪杰传》一书时，和书的主人萧子障的谈话。"},{"type":"paragraph","text":"[2]指书中的华盛顿、拿破仑、彼得大帝、迦德邻女皇、惠灵顿、格兰斯顿、卢梭、孟德斯鸠、林肯等人。"}],"authors":["毛泽东"],"dates":[{"year":1910}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":94,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fe17bca31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
