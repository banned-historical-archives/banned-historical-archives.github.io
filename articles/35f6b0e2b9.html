rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为中国文化大革命的伟大胜利欢欣鼓舞","authors":[],"parts":[{"type":"paragraph","text":"中国无产阶级文化大革命的伟大胜利，毛主席革命路线的伟大胜利，使全世界真正的马列主义者感到无比欢欣鼓舞。"},{"type":"paragraph","text":"意大利共产党（马列主义）中央委员会发表声明，表示完全支持中国文化大革命，“在这场决定性的历史考验中站在中国同志一边”。声明热情赞扬毛泽东思想是最伟大最光辉的革命指南，是当代马列主义创造性的最高表现。"},{"type":"paragraph","text":"法国共产主义运动（马列主义者）机关报《新人道报》发表社论指出，中国文化大革命是一个晴天霹雳，为帝国主义、修正主义敲响了丧钟。社论说，中国文化大革命已经发展到工厂农村，无产阶级专政将在中国越来越巩固，用毛泽东思想武装起来的七亿中国人民，既能粉碎美帝国主义进行武装干涉的一切企图，又将阻止修正主义夺取政权的企图。"},{"type":"paragraph","text":"澳大利亚共产党（马列主义者）机关报、玻利维亚共产党机关报，分别发表文章高度赞扬毛主席支持造反的红卫兵运动，赞扬中国无产阶级专政下的大民主。文章说，只有伟大的马克思列宁主义者毛主席，才能预见到群众运动的巨大力量，唤起了人民的首创精神。毛主席无限相信人民。"},{"type":"paragraph","text":"希腊的一批马克思列宁主义者在一封来信中，称颂光芒万丈的毛泽东思想，“把我们时代的马列主义提高到最高峰”。信中说，毛主席亲自领导和发动的文化大革命的每一个步骤，都在铲除现代修正主义的根子，全世界革命者都对此感到欢欣鼓舞。中国人民掌握了毛泽东思想，在北京建立起一座无产阶级世界革命的不可摧毁的堡垒。"},{"type":"paragraph","text":"各国马列主义者都坚信：中国人民沿着毛主席的革命路线前进，文化大革命一定能进行到底，国际共产主义运动和世界革命一定能彻底胜利。他们勇气倍增，斗志昂扬，决心把毛泽东思想运用到本国革命实践中去。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35f6b0e2b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
