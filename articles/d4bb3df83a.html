script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在批邓、反击右倾翻案风斗争推动下  上华大队养猪事业有更大发展","authors":[],"dates":[{"year":1976,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在批邓、反击右倾翻案风斗争推动下"},{"type":"paragraph","text":"上华大队养猪事业有更大发展"},{"type":"paragraph","text":"新华社杭州一九七六年七月二十六日电　在批邓、反击右倾翻案风斗争推动下，浙江省兰溪县上华公社上华大队在连续十一年超过“一人一猪、一亩一猪”的基础上，今年上半年养猪生产又取得了新的成绩。全大队六月份生猪存栏数达到了一千六百八十九头，比去年同期增长百分之七，创造了历史同期最高水平。一至五月，这个大队向国家交售肥猪五百三十三头，比去年同期增长百分之五点一。"},{"type":"paragraph","text":"上华大队是伟大领袖毛主席在《中国农村的社会主义高潮》一书中表彰过的单位之一。这个大队党支部在批邓、反击右倾翻案风的斗争中，认真总结落实毛主席光辉批示的经验，进一步认识到，要大力发展养猪事业，必须狠抓两条路线斗争，批判修正主义，批判资本主义，坚持发展养猪事业的正确方向和道路。反击右倾翻案风斗争开展以来，上华大队的干部和社员联系本地养猪事业中两个阶级、两条道路、两条路线斗争实际，深入开展革命大批判，促进了全大队集体养猪事业的更大发展。"},{"type":"paragraph","text":"在发展养猪事业中，上华大队党支部遵照毛主席关于“除了合作社公养以外，每个农家都要劝他们养一口至几口猪”的教导，在积极发展集体养猪的同时，继续鼓励社员家庭养猪，经常向社员群众讲路线、讲政策、讲养猪的意义，使广大社员牢固树立为革命养猪的思想。目前，全大队社员家庭养猪达到六百○四头，创造了户养的历史最高水平。"},{"type":"paragraph","text":"上华大队党支部遵照毛主席关于“一切合作社都要将养猪一事放在自己的计划内”的教导，切实加强对养猪生产的领导，将养猪事业列入党支部的议事日程。大队建立了畜牧业领导小组，从大队到生产队的集体猪场都设立了畜牧队长和饲养员、赤脚防疫员、青饲料管理员。同时，他们很注意总结先进经验，抓科学养猪，广辟饲料来源。今年，各生产队还把饲料生产列入了全年农业生产计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4bb3df83a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
