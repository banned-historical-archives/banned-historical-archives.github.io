art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"战士高歌颂《通知》","authors":["李炳天"],"parts":[{"type":"paragraph","text":"五月十六日《通知》放光"},{"type":"paragraph","text":"华，"},{"type":"paragraph","text":"三千六百张日历沐红霞；"},{"type":"paragraph","text":"凯歌声中重学《通知》呵，"},{"type":"paragraph","text":"战士心田开春花。"},{"type":"paragraph","text":"《通知》一声春雷响，"},{"type":"paragraph","text":"走资派的宝座塌了架；"},{"type":"paragraph","text":"《通知》的东风行万里，"},{"type":"paragraph","text":"新生事物艳如霞："},{"type":"paragraph","text":"文艺革命鲜花绽舞台，"},{"type":"paragraph","text":"革命样板戏光辉耀万家；"},{"type":"paragraph","text":"红太阳照亮“五·七”路，"},{"type":"paragraph","text":"漫野青松多挺拔。"},{"type":"paragraph","text":"赤脚医生遍神州，"},{"type":"paragraph","text":"“六·二六”指示春雨洒；"},{"type":"paragraph","text":"广阔天地新苗壮，"},{"type":"paragraph","text":"“扎根树”林带锁风沙。"},{"type":"paragraph","text":"教育革命红旗展，"},{"type":"paragraph","text":"学校遍开“朝阳”花；"},{"type":"paragraph","text":"工农兵登台评《水浒》，"},{"type":"paragraph","text":"理论队伍阵容多宏大……"},{"type":"paragraph","text":"啊，万紫千红望不尽，"},{"type":"paragraph","text":"莺歌燕舞多美的画！"},{"type":"paragraph","text":"战士高歌颂《通知》啊，"},{"type":"paragraph","text":"从心里把文化大革命夸。"},{"type":"paragraph","text":"新花艳，新花繁，"},{"type":"paragraph","text":"新花根子在咱心坎扎；"},{"type":"paragraph","text":"邓小平要翻文化大革命的案，"},{"type":"paragraph","text":"我们坚决把他拉下马！"}],"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b683010d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
