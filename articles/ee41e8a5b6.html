ates":[{"year":1974,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴特寮通讯社揭露"},{"type":"paragraph","text":"老挝极右派违反万象协定和议定书"},{"type":"paragraph","text":"据新华社一九七三年十二月二十九日讯　据巴特寮通讯社报道，老挝极右派最近接连不断地违反和破坏万象协定及其议定书所规定的条款。"},{"type":"paragraph","text":"报道说，仅在十二月二十一日为止的一周内，万象极右派就制造违反万象协定的事件达二百三十七起。他们派遣飞机对老挝解放区进行非法侦察活动达二百三十架次。"},{"type":"paragraph","text":"从九月十四日至十一月十四日的两个月中，万象极右派曾出动飞机对从南至北的老挝解放区，特别是对甘蒙、沙湾拿吉、沙拉湾、川圹等省解放区进行侦察和轰炸达一千六百三十多次。"},{"type":"paragraph","text":"他们还出动大批部队，其中包括泰国帮凶军，对解放区发动蚕食进攻二十多次。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee41e8a5b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
