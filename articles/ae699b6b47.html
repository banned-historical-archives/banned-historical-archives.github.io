:["关贵武","哈尔滨师范学院"],"dates":[{"year":1957,"month":6,"day":9}],"is_range_date":false,"parts":[{"text":"在学院教授讲师座谈会上的发言","type":"title"},{"text":"哈尔滨师范学院关贵武","type":"authors"},{"text":"（关贵武：民盟省委宣传部长、哈尔滨师范学院讲师）","type":"subtitle"},{"text":"学院的党的领导，有严重的宗派主义，从人事安排、发展党员、晋级、工薪待遇、进修等方面都可以看出来。在发展组织的问题上，党的领导愿听好话，靠近组织就好。在干部任用上，要看是否是党员，每个科室都得有党员，否则就叫“空白点”。并且，有人认为汇报就是要求进步，我听有人这样说：”汇报汇报，灵丹妙药，入党增薪，妙妙。”这话虽然刻薄，但说明这个意思。打一面官司不好，党员只汇报情况，群众也不知道汇报些什么？","type":"paragraph"},{"text":"是不是党员，一说话就可以知道。因为他们总是板着面孔，缺乏人情味，动不动就教训人，说这是党性强。有些人没入党前还挺好，一入党了，就一跃龙门，声价十倍了。（市委统战部报来的发言记录整理材料）","type":"paragraph"}],"comments":[],"origin":"《鸣放言论（二）》（哈尔滨：“学习生活”编辑室编，1957年7月10日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae699b6b47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
