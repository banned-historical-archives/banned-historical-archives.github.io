小组讨论","authors":[],"dates":[{"year":1978,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京三月二日电　第五届全国人民代表大会第一次会议今天全天举行分组会议，对《中华人民共和国宪法修改草案》和叶剑英副主席关于修改宪法的报告进行了认真的讨论。"},{"type":"paragraph","text":"邓小平副主席作为中国人民解放军选出的人大代表，参加了解放军代表团的小组讨论。他在发言中着重谈了华主席和叶副主席在他们的报告中都十分强调的关于恢复和发扬党的优良传统和作风的问题。他指出，恢复和发扬我们党的优良传统和作风，是实现四个现代化的重要保证，他希望军队的老同志在这方面发挥模范带头作用。今天下午，邓小平副主席还先后到湖南、四川和云南代表团开会的地方，看望了这几个省的人大代表。"},{"type":"paragraph","text":"政协第五届全国委员会第一次会议今天也同时举行分组会议，讨论宪法修改草案和叶剑英副主席的报告。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\03\\7833010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e三月二日，邓小平副主席参加解放军小组讨论。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8701257390"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
