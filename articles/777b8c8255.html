script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠批中国赫鲁晓夫修正主义黑货　贯彻执行抓革命促生产伟大方针  我国沿海渔区革命和生产形势大好","authors":[],"dates":[{"year":1968,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"狠批中国赫鲁晓夫修正主义黑货　贯彻执行抓革命促生产伟大方针"},{"type":"paragraph","text":"我国沿海渔区革命和生产形势大好"},{"type":"paragraph","text":"新华社二十四日讯　我国沿海渔区的广大革命群众和革命干部，在战无不胜的毛泽东思想指引下，坚决贯彻执行毛主席“抓革命，促生产”的伟大方针，高度发扬了敢于斗争、敢于胜利的革命精神，使革命、生产都出现了朝气勃勃的新局面。今年沿海渔区的春汛生产都比去年有发展，其中有一些渔区比去年有较大幅度的增产。各地海水养殖事业也出现了大好局面，其中海带的养殖面积创造了历年来的最高纪录。"},{"type":"paragraph","text":"入春以来，从北方的黄海之滨到南海的北部湾，在广大的沿海渔区内，革命群众和革命干部在人民解放军的帮助下，为夺取无产阶级文化大革命的新胜利和渔业春汛生产的好收成，掀起了一个活学活用毛主席著作和全面落实毛主席最新指示的群众运动的新高潮。广大沿海渔区根据伟大领袖毛主席“办学习班，是个好办法，很多问题可以在学习班得到解决”的教导，纷纷举办各种类型的毛泽东思想学习班。参加学习班的广大革命群众和革命干部，带着革命和生产中的问题努力活学活用毛主席著作和最新指示。渔区的革命群众以毛泽东思想为武器，深入持久地开展革命大批判，狠批了中国赫鲁晓夫等党内一小撮最大的走资派所推行的反革命修正主义路线。春汛开始前，渔民们已对中国赫鲁晓夫及其在各地的代理人所推行的“四大自由”、“三包一奖”、“包产到船”等修正主义黑货展开了批判，并从各个方面肃清其流毒。各个渔区的革命群众和革命干部，通过对修正主义黑货的批判，提高了阶级斗争和路线斗争的觉悟，更加热爱毛主席的无产阶级革命路线，更加热爱社会主义，表示要更加坚定地走社会主义道路。"},{"type":"paragraph","text":"沿海各个渔区同时积极进行春汛生产的准备工作，为夺取春汛生产的丰收打好基础。今年早春天气冷，水温低，风浪大，鱼群洄游规律多变。这给春汛生产增加了不少困难。各个渔区的革命群众和革命干部，活学活用毛泽东思想，高度发扬了敢于斗争、敢于胜利的革命精神，英勇不屈地同各种困难展开了顽强的斗争，加之春汛生产的准备工作进行得比较好，出海的时间普遍较去年提早，出海的船只大都比去年有所增加，这就使得春汛生产在困难较多的条件下，仍然出现了朝气蓬勃的新局面。"},{"type":"paragraph","text":"当前，我国沿海渔区的广大革命群众和革命干部，正高举毛泽东思想伟大红旗继续乘胜前进。他们狠抓两个阶级、两条道路、两条路线的斗争，决心深入地贯彻执行“抓革命，促生产”的伟大方针，努力排除前进途中可能碰到的各种困难，夺取革命和生产的更大胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"777b8c8255"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
