":1997,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"从二十世纪初一些中国人最先接触无政府主义思想开始到五四运动形成传播热潮，无政府主义对中国社会的影响为其他社会思潮所不能攀比。《学术月刊》九七年第七期刊载齐卫年《近代中国无政府主义传播的原因新论》指出:这是因为第一、小生产的经济氛围和小资产阶级成份众多的国情，是无政府主义流传的深厚基础。第二、中国历史袭传的某些思想，提供了无政府主义流行中国的文化认同背景；第三、中国社会改革和革命的急遽变动以及不尽人意的梗阻，构成了无政府主义影响中国的特殊历史氛围。第四、中国社会知识分子主体力量的更新换代，造就了一批热衷无政府主义的传播者；第五、中国时代潮流演进的轨迹与无政府主义某些思想内容的契合，增添了无政府主义的诱惑魅力。总之，无政府主义是一种超现实的理想主义。超越现实的空幻性与贴合时代的现实性，构成了无政府的二律背反。近代中国的无政府主义的最后破灭缘于这个二律背反；同样，它蓬头迭起也与这个二律背反密切相关。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb386ccc80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
