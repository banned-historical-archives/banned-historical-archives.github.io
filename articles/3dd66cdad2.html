康生等同志到机场欢迎","authors":[],"dates":[{"year":1964,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京3日电　由越南劳动党中央政治局委员、越南民主共和国政府总理范文同率领的越南民主共和国党政代表团，在应苏共中央和苏联政府邀请前往莫斯科参加十月社会主义革命四十七周年庆祝活动的途中，今天下午乘飞机到达北京。"},{"type":"paragraph","text":"前往机场欢迎的，有中共中央总书记、国务院副总理邓小平，中共中央政治局候补委员、国务院副总理陆定一，中共中央政治局候补委员康生，中共中央委员伍修权，国防部副部长王树声大将，外交部副部长罗贵波。"},{"type":"paragraph","text":"到机场欢迎的，还有李强、曹瑛、杨琳、孙晓村、范瑾等各有关方面负责人。"},{"type":"paragraph","text":"越南驻中国大使陈子平，苏联驻中国大使契尔沃年科，也到机场欢迎。"},{"type":"paragraph","text":"代表团途经南宁时，中共广西僮族自治区委员会书记处书记、自治区副主席覃应机，自治区副主席莫乃群、卢绍武、傅雨田、李殷丹、钟枫，广西驻军首长傅春早少将，南宁市市长阎光彩等，曾到机场迎送。"},{"type":"paragraph","text":"越南驻南宁总领事馆领事黎光仁及领事馆工作人员，也到机场迎送。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3dd66cdad2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
