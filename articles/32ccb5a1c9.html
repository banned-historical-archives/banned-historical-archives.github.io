{"year":1994,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马文革王晨获乒乓精英赛桂冠"},{"type":"paragraph","text":"本报顺德４月２２日电“发展杯”全国乒乓球精英赛今晚在广东顺德容奇镇结束。马文革、王晨分获男女单打冠军。"},{"type":"paragraph","text":"２０日开始的这次比赛设男女单打两项。２０岁的北京姑娘王晨在女单半决赛中淘汰了头号种子邓亚萍；晚上决赛又以２∶１击败名将乔红，获得女单冠军。乔红、邓亚萍分列第２、３名。"},{"type":"paragraph","text":"男单决赛，马文革以２∶１力克林志刚，获冠军；林志刚获亚军。在争夺第３名的比赛中，小将孔令辉胜王涛。本次比赛战况表明，一些优秀年轻队员的技术水平正向老队员靠拢。但国家队领队姚振绪指出，遇强不弱、遇弱不强还是年轻选手的通病，他们需要多打比赛，加强磨练。（任建民）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32ccb5a1c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
