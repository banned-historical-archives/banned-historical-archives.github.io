"湖北"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“反右杂感”","type":"title"},{"text":"湖北李文咸","type":"authors"},{"text":"（李文咸：湖北省合作干校教学工作人员）","type":"subtitle"},{"text":"他们都是在反右的名义下，各自打算着自己的如意算盘：","type":"paragraph"},{"text":"有的是借运动泄个人私愤，","type":"paragraph"},{"text":"有的想在斗争中一举成名(入党)，","type":"paragraph"},{"text":"有的为了是向领导大献殷情，","type":"paragraph"},{"text":"有的是为了晋级职位又高升。","type":"paragraph"},{"text":"他们有的是为了将功赎罪，","type":"paragraph"},{"text":"也有的是为了苟且偷生，","type":"paragraph"},{"text":"也有的是为了表示自己对组织的忠诚，","type":"paragraph"},{"text":"又有人是为了解除领导上对自己的不满。","type":"paragraph"},{"text":"他们都各有各的美梦来参加这一伟大的运动！","type":"paragraph"},{"text":"斗争！","type":"paragraph"},{"text":"*  　*　　*","type":"paragraph"},{"text":"这场戏我看得差不多了，我应该归去！","type":"paragraph"},{"text":"吾名已受辱……","type":"paragraph"},{"text":"……","type":"appellation"},{"text":"我很骄傲归去，因为我为大家争取了民主，","type":"paragraph"},{"text":"没有胡风在文艺上放一炮！不会有百花齐放百家争鸣的提出。","type":"paragraph"},{"text":"没有我们在民主问题狠狠放一炮！大家是不会取得很好的民主生活。","type":"paragraph"},{"text":"我是以一个纯洁之身来到这个人间，","type":"paragraph"},{"text":"我将以一个清白之身与这个美好的人间脱离，","type":"paragraph"},{"text":"如果说我在这个世界上有点什么痕迹的话，","type":"paragraph"},{"text":"那就是我曾经也作过共青团员。","type":"paragraph"},{"text":"沧浪之水清兮，","type":"paragraph"},{"text":"可以濯我头巾，","type":"paragraph"},{"text":"沧浪之水浊兮，","type":"paragraph"},{"text":"可以洗吾泥足。","type":"paragraph"},{"text":"来源：《右派言论选集(续编)》（中共湖北省委宣传部编，湖北人民出版社，1958）。","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"166f8f4c33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
