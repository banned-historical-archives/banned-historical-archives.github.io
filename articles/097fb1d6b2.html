script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们决不学资产阶级那一套","authors":["上海嘉定县农民革命造反司令部（筹备会）"],"dates":[{"year":1967,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们决不学资产阶级那一套"},{"type":"paragraph","text":"上海嘉定县农民革命造反司令部（筹备会）"},{"type":"paragraph","text":"我们农民革命造反派最听毛主席的话，在这场严重的阶级斗争中一定节约闹革命。"},{"type":"paragraph","text":"解放前，我们的父兄给万恶的地主当牛作马，任人宰割，吃不上穿不着；被反动派逼得家破人亡，出门讨饭，流浪街头，连吃饭的权利也没有，更谈不上政治权利。"},{"type":"paragraph","text":"先烈用鲜血和生命换来了社会主义江山。现在我们又从走资本主义道路的当权派手中夺了权，真正当家作主了。过去，走资本主义道路的当权派挥霍浪费国家财物；现在，我们掌了权，决不能忘记过去的苦难，决不学资产阶级的那一套。"},{"type":"paragraph","text":"我们掌握了财权，决不乱增加开支。我们庄严宣告：我们闹革命，打的不是经济仗，而是政治仗。没袖章，怎么办？我们自己买；没有油印机，怎么办？到附近的学校去借印。一切讲排场、摆阔气、浪费国家财产的思想和行动都要打倒！"},{"type":"paragraph","text":"我们贫下中农最懂得如何抓革命促生产，最懂得勤俭节约。我们要把嘉定农民革命造反司令部办成真正贯彻毛主席指示的节约闹革命的司令部。我们司令部的工作人员没有什么特殊待遇，外出开会，不住旅馆，不要补助。我们革命不为工分，不为名利，为的是使国家永不变颜色。我们司令部原设在一个楼上，这样会使我们高高在上，脱离群众。为此，我们连续搬了三次家。我们决心和群众滚在一起，生活在一起，战斗在一起，胜利在一起。这就是我们的誓言！"},{"type":"paragraph","text":"我们掌握了财权，一定要按毛主席的指示办事，要勤俭节约，决不拿原则作交易，坚决和不合理的现象作无情的斗争。我们还要大力宣传“节约闹革命，保护国家财产”的精神，保证集体财产不受损失，并坚决揭露一小撮人用分光、吃光、用光的手段来破坏生产，破坏社会主义经济，破坏无产阶级文化大革命的阴谋。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"097fb1d6b2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
