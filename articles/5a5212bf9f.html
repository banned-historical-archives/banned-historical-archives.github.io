":1964,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京10日电】　中国共产党中央委员会主席毛泽东，今天下午会见并宴请比利时共产党中央委员会书记雅克·格里巴和由他率领的比利时共产党中央委员会访华代表团团员、比利时共产党中央政治局委员、比利时瓦隆共产党主席亨利·格利纳，代表团秘书、格里巴同志的夫人玛德琳·格里巴。毛泽东主席同他们进行了亲切的谈话。在座的有:中共中央副主席刘少奇，中共中央总书记邓小平，中共中央政治局候补委员、书记处书记康生，中共中央委员刘宁一等。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\06\\646b010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e孟庆彪\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中国共产党中央委员会主席毛泽东六月十日下午会见并宴请比利时共产党中央委员会书记雅克·格里巴和由他率领的比利时共产党中央委员会访华代表团。毛泽东主席和雅克·格里巴亲切握手。"},{"type":"paragraph","text":"(新华社传真　孟庆彪摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a5212bf9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
