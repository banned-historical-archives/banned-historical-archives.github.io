,"dates":[{"year":1951,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"读者来信"},{"type":"paragraph","text":"编辑先生:"},{"type":"paragraph","text":"我们在学习党史中，碰到一个问题，不能解决，就是胡乔木同志的“中国共产党的三十年”一文中，第二次国内革命战争时期一章的第十八段有一句“但在一九三一年一月，以王明、博古两同志为首的以教条主义为特征的一个新的‘左’倾派别，又利用马克思主义‘理论’的外衣，起来攻击三中全会没有纠正所谓李立三同志的‘右倾’……”。“右倾”不知指李立三同志犯的那一次错误，因为我们知道的，是李立三同志曾犯“左”倾冒险主义的错误，“右倾”则实不解，请您详细解答。"},{"type":"paragraph","text":"李山"},{"type":"paragraph","text":"编者覆信"},{"type":"paragraph","text":"李山同志:"},{"type":"paragraph","text":"李立三同志在一九三○年所犯的错误是“左”倾，而不是右倾。他的错误在党的六届三中全会上受到了纠正。这一层，胡乔木同志在“中国共产党的三十年”里已经说明了。"},{"type":"paragraph","text":"那末，以王明、博古两同志为首的新“左”倾派别怎么又“起来攻击三中全会没有纠正所谓李立三同志的‘右’倾”呢?我们应当注意，胡乔木同志在这里给这个“右”字加上了括弧，这就表示这个“右”字是有问题的，李立三同志当时并不“右”倾，而是王明、博古两同志的说法不对。"},{"type":"paragraph","text":"王明、博古两同志当时也批评立三路线的“左”倾错误，但是另一方面又强调立三路线是一贯“右”倾的，他们指责三中全会只纠正了李立三同志的“左”倾，而没有纠正他的“右”倾。王明、博古同志他们特别强调当时党内的主要危险是所谓“右倾机会主义”，“实际工作中的机会主义”与“富农路线”，并且在这些错误的口号之下推行了新的“左”倾路线。"},{"type":"paragraph","text":"王明、博古同志他们这一个新的“左”倾派别是以教条主义为特征的，他们把马列主义的词句生硬的搬到中国来，而不去研究它是否适合中国的实际情况，因此他们是抛弃了马列主义的实质的“理论”家。毛主席曾经再三指出“没有调查就没有发言权”的真理，再三反对教条主义的危害，可是这些犯了“左”倾错误的同志在思想方法上是和毛主席完全不同的。他们对中国社会性质和阶级关系作了主观的错误的估计，在革命问题上就提出了完全错误的要求，否认一切中间营垒和中间派别的存在，要求党向这些中间营垒一律进行“决死斗争”。从这些错误的要求出发，他们无中生有的攻击当时党内的所谓“右”倾。这种“右”倾实际是不存在的，所以我们在学习党史学到这一段时，不必费力研究当时的所谓“右”倾是指什么，而应当了解这一新的“左”倾派别所犯的错误和它给党带来的损害。"},{"type":"paragraph","text":"(编者)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"胡乔木","type":"人物"},{"name":"李立三","type":"人物"},{"name":"王明","type":"人物"},{"name":"博古","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebe4dd9171"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
