ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"在反修报告会上的插话","alias":"","parts":[{"type":"paragraph","text":"在反修报告会上的插话"},{"type":"paragraph","text":"（1964年9月4日）"},{"type":"paragraph","text":"蛇是引出来好打，还是钻黑洞里好打？（对苏斯洛夫报告我们赞成发表，它不发，出了八评后引出来了）"},{"type":"paragraph","text":"一九五六年以来，苏联骂斯大林，我们一论、二论发表后，他就失去了主动权。"},{"type":"paragraph","text":"点名不光我们两家，东欧也点名了。（苏批评罗自力更生，罗回击，用我们评苏联的话）不是内部的事，正在电台上干，公开干了。"},{"type":"paragraph","text":"控制、反控制的冲突，第一位的不是中国，而是东欧国家。（罗已作了同苏断绝经济关系的准备，自己不能制造武器，要求我国去人到罗访问，不讲话都可以使人震惊，去了不讲话，握握手都很重要）"},{"type":"paragraph","text":"准备两手，准备破裂，争取拖。哪天出事，不是出于意料之外。天下大势，合久必分，分久必合。（中苏关系）"},{"type":"paragraph","text":"南昌暴动轰轰烈烈，剩下几个大人，以后发展了三十万人。长征剩下几万人，以后发展起来。山不在高。（巴西老党四万人，成立新党六千人。是四万人可靠，还是六千人可靠）"},{"type":"paragraph","text":"有了修正主义，列宁主义才能万岁！"},{"type":"paragraph","text":"不注意一定出修正主义。注意可能出，可能不出。准备出，可能不出。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":9,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":128,"page_end":128},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e70fbed459"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
