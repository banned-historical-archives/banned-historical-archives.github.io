士的热烈欢迎","authors":[],"dates":[{"year":1970,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反映无产阶级文化大革命的胜利成果"},{"type":"paragraph","text":"我现代陶瓷展览会在巴黎开幕"},{"type":"paragraph","text":"受到法国各界友好人士的热烈欢迎"},{"type":"paragraph","text":"新华社巴黎十四日电　中华人民共和国现代陶瓷展览会十二日在法国首都巴黎开幕，受到法国各界友好人士的热烈欢迎。"},{"type":"paragraph","text":"中国驻法国大使馆临时代办宋之光和大使馆的其他官员、法国外交部和文化事务国务部的官员以及一些国家驻法国的使节和外交官出席了展览会的开幕式。"},{"type":"paragraph","text":"出席展览会开幕式的还有法国文化艺术界、新闻界的朋友和各界友好人士，以及在法国的亚洲、非洲、拉丁美洲朋友和旅法爱国华侨共七百多人。"},{"type":"paragraph","text":"展览会展出的二百余件展品，反映了中国无产阶级文化大革命的胜利成果。陶塑群像《收租院》、革命样板戏《红灯记》和《白毛女》，以及其他工、农、兵英雄形象，引起了观众的极大兴趣。"},{"type":"paragraph","text":"许多观众在参观了展览会以后发表了观感。一位观众说：“为纪念《在延安文艺座谈会上的讲话》发表二十八周年而举办的这个展览会，光辉地体现了毛主席在这个座谈会上所阐明的关于文艺来自人民和为人民而创作的思想的强大生命力和正确性。”"},{"type":"paragraph","text":"另一位观众称赞展品时说，这是反映胜利的社会主义建设的英雄篇章的革命内容和民族与传统风格的完美统一。"},{"type":"paragraph","text":"很多观众在展览会的留言簿上写下了热情洋溢的题词。一位法国朋友写道：“这个展览会具体表明了中国人民的才能以及自从解放以来开始的在发展方面所作出的努力。我确信：在尊敬的毛主席的领导下，中国人民必将在创作具有革命内容、艺术完美的作品方面取得更大的进展。”另一位观众写道：“陶塑群像《收租院》使我深受感动。无产阶级文化革命万岁！战无不胜的反帝斗争武器——毛泽东思想万岁！”"},{"type":"paragraph","text":"还有些观众写道：“无产阶级文化大革命万岁！”“毛主席万岁！万万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e283cd7c17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
