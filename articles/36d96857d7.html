script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿杜德国王点燃第八届亚运会火烛  江萨总理举行招待会预祝亚运会取得圆满成功","authors":[],"dates":[{"year":1978,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿杜德国王点燃第八届亚运会火烛"},{"type":"paragraph","text":"江萨总理举行招待会预祝亚运会取得圆满成功"},{"type":"paragraph","text":"新华社曼谷十二月八日电　八日中午，是曼谷一个喜庆的时刻。泰国国王普密蓬·阿杜德陛下在集叻达王宫亲自点燃第八届亚洲运动会的火烛。这预示着亚洲又一次体育盛会——第八届亚洲运动会明天就在曼谷开幕了。"},{"type":"paragraph","text":"曼谷的集叻达王宫，是泰国现在国王普密蓬·阿杜德居住的地方。这里古树成林，绿草如茵。阿杜德陛下的行宫楼前新搭起了一座彩篷，彩篷前面放着一个镏金小塔，里面装置一支火烛。乐队、仪仗队和近四百名泰国运动员、教练员，很早就迎候在这里。"},{"type":"paragraph","text":"十一点三十五分，阿杜德陛下身穿浅蓝色西装，喜气洋洋地从行宫走出来。乐队高奏泰国国歌。随后，泰国奥委会主席、第八届亚运会组委会副主席他威致词，泰国总理、第八届亚运会组委会主席江萨向国王阿杜德陛下汇报了本届亚运会筹备工作情况。十一点四十三分，乐队奏起亚运会会歌。国王阿杜德通过聚光镜点燃了火烛。这时，鼓乐齐鸣，喜气四溢。"},{"type":"paragraph","text":"接着，阿杜德国王陛下还同参加点火仪式的各国体育代表团团长握手祝贺。"},{"type":"paragraph","text":"从第五届到第八届亚运会，泰国荣任过三次举办国，举行过三次点火仪式。这次的点火仪式允许记者到现场采访。照相机、电影拍摄机的响声，为这个幽静的园林增添了喜悦的气氛。"},{"type":"paragraph","text":"十二时左右，六名泰国运动员将火烛塔抬上彩车，由泰国的乐队、仪仗队和运动员组成的浩浩荡荡的队伍，把火烛塔运送到铜马广场。沿途，许多行人伫立在路旁观赏。"},{"type":"paragraph","text":"早已等候在铜马广场的曼谷市长差罗·探玛里发表了简短的讲话。接着，火烛塔被放在广场的彩篷内，由百余名青少年护卫着。明天，将用这里的火烛作为火种，点燃第八届亚洲运动会的火炬。"},{"type":"paragraph","text":"新华社曼谷十二月八日电　泰国总理、第八届亚运会组织委员会主席江萨，今天预祝亚运会取得圆满成功。"},{"type":"paragraph","text":"在亚运会开幕前夕，泰国江萨总理在曼谷国宾酒店举行招待会，欢迎前来参加本届运动会的亚洲运动会联合会理事会的理事和各个国际体育组织的代表。"},{"type":"paragraph","text":"在招待会前，江萨总理会见了各位代表。"},{"type":"paragraph","text":"中国体育代表团团长徐寅生向江萨总理转达了叶剑英委员长、华国锋总理、邓小平副总理对他的问候。江萨总理表示感谢，并请徐寅生团长转达他对三位中国领导人的问候。"},{"type":"paragraph","text":"在今晚的招待会上，代表们亲切交谈，气氛友好热烈。江萨总理在讲话中指出，这次亚运会能够成功地举行，是由于大家共同努力合作的结果。（附图片）"},{"type":"paragraph","text":"十二月八日中午，泰国国王普密蓬·阿杜德陛下在集叻达王宫亲自点燃第八届亚运会的火烛。　新华社记者　于小平摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36d96857d7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
