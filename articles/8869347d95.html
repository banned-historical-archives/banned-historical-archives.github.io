script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"接受波兰驻华大使布尔金呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受波兰驻华大使布尔金"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1950年6月12日）大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使所呈递的波兰共和国总统所授予的国书，并感谢贵大使的热忱祝贺。"},{"type":"paragraph","text":"中波两国人民间的深厚友谊久已存在。在世界反法西斯大战中，我们曾以无限的同情与关怀注视波兰人民的坚强英勇的斗争，今日对波兰人民重建祖国的辉煌的成就，更寄以极大的钦佩。"},{"type":"paragraph","text":"现中波两国政府及人民均正为世界和平的共同自标而继续努力奋斗，我相信，中波两国在政治、经济、文化上的益加密切的合作，不仅有利于两国人民，而且将会更加强与巩固了世界民主和平的阵营。"},{"type":"paragraph","text":"我热烈欢迎贵大使出任波兰共和国驻中华人民共和国首任特命全权大使，并愿在贵大使巩固两国友谊的工作中予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣、人民兴旺、贵国元首健康。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":472,"page_end":472},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8869347d95"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
