s":[],"dates":[{"year":1964,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《解放日报》第二总编辑王维，昨晚设宴欢迎罗马尼亚《火花报》代表团全体成员。"},{"type":"paragraph","text":"中共上海市委书记处候补书记张春桥出席了宴会，并在宴会前会见了代表团全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加宴会作陪的，有《解放日报》副总编辑夏其言、徐惟诚以及上海各新闻单位负责人赵棣生、田志强、陆灏、束\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\11\\64bi0104AA.JPG\"\u003e秋等。"},{"type":"paragraph","text":"陪同外宾前来上海访问的《人民日报》副总编辑陈浚也出席宴会作陪。"},{"type":"paragraph","text":"罗马尼亚《火花报》代表团一行五人，是应《人民日报》邀请前来我国访问的。该团在团长、罗马尼亚《火花报》副总编辑尼古拉·葛尔布率领下，于十五日下午由南京乘火车到达上海。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7858d1f7fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
