,"authors":[],"dates":[{"year":1971,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十四日电　中共中央政治局委员姚文元，中共中央委员、中联部部长耿飚，中共中央委员倪志福，今天下午会见了由吴光泽同志率领的朝鲜社会主义劳动青年同盟代表团全体成员，双方进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团团员是:金胜国、权成哲、裴明奎，代表团随行人员姜里璜。"},{"type":"paragraph","text":"会见时，朝鲜民主主义人民共和国驻中国大使玄峻极，大使馆一等秘书崔琫哲在座。"},{"type":"paragraph","text":"我有关方面负责人和工作人员申健、杨玉衡、谢静宜、肖簧、石永禄、杨春城、崔龙浩、吕辉祥等，会见时也在座。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d70098a43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
