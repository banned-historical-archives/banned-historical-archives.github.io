举彭真为大会秘书长","authors":[],"dates":[{"year":1980,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京八月二十九日电　五届人大第三次会议今天下午在人民大会堂举行预备会议。"},{"type":"paragraph","text":"预备会议由人大常委会副委员长彭真主持。他在讲话中指出，五届人大第三次会议的各项准备工作已经就绪。他说，这次会议要充分发扬民主，集思广益，群策群力，以完成大会的各项重大任务。"},{"type":"paragraph","text":"会议选举了由二百五十五人组成的大会主席团，选举彭真重大会秘书长。"},{"type":"paragraph","text":"会议通过了五届人大第三次会议议程；通过了由张启龙为主任委员的五届人大第三次会议提案审查委员会人选。"},{"type":"paragraph","text":"会议还通过宋任穷为五届人大代表资格审查委员会主任委员，谭震林为五届人大预算委员会主任委员，增补顾明为五届人大法案委员会副主任委员。"},{"type":"paragraph","text":"新华社北京八月二十九日电　五届人大第三次会议主席团今天下午举行第一次会议。"},{"type":"paragraph","text":"会议通过了五届人大代表资格审查委员会关于代表情况和补选的代表资格的审查报"},{"type":"paragraph","text":"会议推选叶剑英、宋庆龄、聂荣臻、刘伯承、乌兰夫、韦国清、彭真、谭震林、李井泉、张鼎丞、蔡畅、邓颖超、赛福鼎、廖承志、阿沛·阿旺晋美、周建人、许德珩、胡原文、肖劲光、朱蕴山、史良为主席团常务主席。"},{"type":"paragraph","text":"会议还通过了五届人大第三次会议日程和执行主席分组名单，决定乌兰夫、彭冲、武新宇、朱穆之为五届人大第三次会议副秘书长。"},{"type":"paragraph","text":"会议由人大常委会副委员长彭真主持。"},{"type":"paragraph","text":"主席团会议前，举行了代表资格审查委员会会议。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b31fbb699"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
