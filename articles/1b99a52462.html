script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"联系实际肃清中国赫鲁晓夫修正主义路线的流毒斗私批修做好毕业生分配工作徐汇区三十六所学校部分革命干部和革命师生办学习班有成绩","authors":[],"dates":[{"year":1968,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　徐汇区革委会教卫组、红卫兵徐汇军区在军训营解放军同志的大力帮助下，举办毛泽东思想学习班，坚决贯彻毛主席的司令部关于毕业生工作的指示，为做好六六届高初中毕业生的分配工作打下了思想基础。"},{"type":"paragraph","text":"参加学习班的有三十六所学校的革命领导干部、革命教师、红卫兵小将近两百人。"},{"type":"paragraph","text":"毛主席教导我们:“办学习班，是个好办法，很多问题可以在学习班得到解决。”"},{"type":"paragraph","text":"开始，参加学习班的同志各有各的打算。有的干部和教师抱着学习人家经验，听取领导布置的想法；有的认为这次毕业生分配工作任务重，时间短，要求高，弄不好会被人指责为重新执行“资产阶级反动路线”，会被学生骂、被群众斗，有的怕被人说成是“打击报复”，总之对做好这次毕业生分配缺乏信心，希望这项“差使”不要挨到自己头上。部分红卫兵小将抱着听消息、落实分配方案的动机来参加学习班，认为参加区学习班，回校就得带头，怕自己在“四个面向”上不过硬，被人讥笑。"},{"type":"paragraph","text":"学习班针对这些形形色色的思想，开展“三忠于”活动，进行斗私批修，大谈无产阶级文化大革命的大好形势，大议搞好文化大革命开展以来第一次毕业生分配工作的深远意义，大摆革命干部、革命教师和革命红卫兵的责任。通过这些活动和学习讨论，使大家认识到，搞好这次毕业生分配工作是两个阶级争夺青年一代的斗争，是把青年一代培养成为一个“有社会主义觉悟的有文化的劳动者”，还是把青年培养成为高踞于劳动人民之上的精神贵族的问题。"},{"type":"paragraph","text":"学习班在开展“三忠于”活动的同时，还举行“忆苦思甜”讲用会，通过回忆对比，提高大家的阶级觉悟。革命干部和革命教师决心要在搞好这次毕业生分配工作中立新功。革命小将在学习班上表示要到农村去，到边疆去，到工矿去，到基层去，决心在工农群众中，在革命的大风大浪中把自己培养成为无产阶级革命事业的可靠接班人。"},{"type":"paragraph","text":"在学习班上，开展了革命的大批判，狠批中国赫鲁晓夫及其在上海的代理人陈丕显、曹荻秋、杨西光所推行的修正主义教育路线和在毕业生分配工作中的修正主义路线。他们以自己切身的感受控诉了修正主义教育路线对青年一代的毒害；通过革命大批判，进一步肃清“万般皆下品，惟有读书高”、“学而优则仕”等剥削阶级思想的流毒，提高了斗私批修的自觉性，把破私立公提高到两条路线斗争的高度。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b99a52462"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
