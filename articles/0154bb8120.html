tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国新成就是文化大革命胜利成果","authors":[],"parts":[{"type":"paragraph","text":"新华社二十四日讯 中国共产党中央委员会收到了泰国共产党中央委员会发来的电报。电报热烈祝贺中国成功地进行了一次新的氢弹爆炸和首次地下核试验。电报全文如下："},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"亲爱的同志们："},{"type":"paragraph","text":"泰国共产党中央委员会代表全体党员和泰国革命人民，对中华人民共和国于今年九月二十三日成功地进行了首次地下核试验，以及今年九月二十九日在空中成功地进行了新的氢弹爆炸，表示热烈的祝贺。"},{"type":"paragraph","text":"这一次新的巨大成功，是伟大的毛泽东思想的又一胜利，是中国无产阶级文化大革命和中国共产党第九次全国代表大会的胜利成果，是在毛泽东主席和中国共产党领导下的伟大的中国人民的又一胜利。"},{"type":"paragraph","text":"中国发展核武器的这一新的成功，是对美帝国主义、苏修社会帝国主义核垄断和核讹诈的又一次沉重的打击，是对它们的侵略政策和战争政策的沉重打击。同时对于目前正在同帝国主义、现代修正主义和各国反动派进行斗争的泰国人民和全世界人民，是一个有力的支持和巨大的鼓舞。"},{"type":"paragraph","text":"当前，美国—他侬集团在加紧武装镇压泰国人民的同时，配合着玩弄所谓从泰国撤走六千名美军的新骗局。但是，我们党坚决揭露它们这一骗局，并领导人民粉碎它们的镇压，更加广泛地开展人民战争。我们坚信，在伟大的毛泽东思想的指引下，我们党领导的人民战争必将取得最后的胜利。"},{"type":"paragraph","text":"致以共产主义敬礼！泰国共产党中央委员会"},{"type":"paragraph","text":"一九六九年十月七日于泰国"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0154bb8120"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
