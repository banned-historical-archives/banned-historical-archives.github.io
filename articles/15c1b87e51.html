宰杀与外运耕牛现象","authors":[],"dates":[{"year":1950,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"湖南、广西、苏南、川北等地普遍发现宰杀与外运耕牛现象","type":"title"},{"text":"【本刊讯】最近在湖南、广西、苏南、川北等地发现宰杀与外运耕牛现象相当普遍。湘桂路在最近一月来运往广州的耕牛约千头以上；由广西运往广州的，仅在一次列车中即有192头；苏南嘉定8月份内宰杀耕牛40头，崐山张浦区运往上海宰杀的耕牛亦达30头左右；川北南充长乐乡（非产牛区），每场牛的成交量达2、3百头之多。川北各地1斤牛肉仅值700多元人民币，1头牛的肉价可买2头活牛。1头黄牛仅值2万多元，1头水牛亦不超过5万元。这还抵不上一只小猪和一双皮鞋价格。","type":"paragraph"},{"text":"造成以上宰杀与外运耕牛的原因，主要是：（一）匪特造谣说：政府要收每头牛200斤粮食税，又说政府要发放耕牛贷款。因此引起农民的顾虑，认为养牛不值得，要上重税，没有牛反可以向政府贷款。（二）地主有意破坏土改，不仅自己宰杀耕牛，还鼓动他人宰杀。（三）富农和中农认为贫农没有牛，将来一定要用自己的牛，所以尽量找藉口用种种方法把牛宰掉。（四）部分贫农认为把自己的牛杀掉后，可在土改时分到牛，有了牛就不能分到。（五）有些商人与回民贪图重利，非法残害耕牛。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年10月26日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15c1b87e51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
