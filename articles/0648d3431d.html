{"year":1950,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席和周总理"},{"type":"paragraph","text":"电贺越南独立五周年"},{"type":"paragraph","text":"【新华社一日讯】九月二日为越南独立五周年纪念。我中央人民政府毛泽东主席与周恩来总理兼外交部部长分别致电越南民主共和国胡志明主席及该国外交部黄明鉴部长，表示庆贺。电文如下："},{"type":"paragraph","text":"（一）毛主席贺电越南民主共和国政府胡志明主席阁下："},{"type":"paragraph","text":"欣逢越南独立五周年纪念，我谨代表中华人民共和国中央人民政府及中国人民向阁下及越南人民致热烈的庆贺，并祝越南人民在反对帝国主义争取民族解放斗争中获得完全的胜利，在建设独立民主的越南的事业上获得更大的成功。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年八月二十九日于北京"},{"type":"paragraph","text":"（二）周总理贺电越南民主共和国政府外交部黄明鉴部长阁下："},{"type":"paragraph","text":"欣逢越南独立五周年纪念，谨向阁下、贵国政府及越南人民致兄弟般的热烈的庆贺，并衷心希望越南人民在民族解放斗争中获得更进一步的胜利。"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理兼外交部部长  周恩来"},{"type":"paragraph","text":"一九五○年八月二十九日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0648d3431d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
