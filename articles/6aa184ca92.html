rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命群众坚决执行毛主席的政策","authors":["驻成都大学工人/解放军毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"大叛徒、大内奸、大工贼刘少奇，一贯恶毒地攻击伟大领袖毛主席制订的党的无产阶级政策，大肆诬蔑群众对党的政策不接受，不执行。他胡说什么：“群众不接受政策、决定，……也没办法。”看，刘少奇这个老反革命把广大革命群众诬蔑成什么样子。"},{"type":"paragraph","text":"毛主席的无产阶级政策，最集中地代表了广大群众的根本利益，最科学地反映了阶级斗争的客观规律。广大群众最理解、最拥护、最接受毛主席的各项政策。去年，我们进驻成都大学以后，一小撮穷途末路的阶级敌人，诬蔑我们宣传队的同志“不讲政策”，想迷惑和煽动不明真相的群众。在这种情况下，我们一方面揭露敌人，一方面把毛主席关于对待知识分子的政策，原原本本地交给群众，并且不走样地贯彻执行。结果很快地教育了不明真相的人，团结了广大群众，孤立了一小撮阶级敌人。在清理阶级队伍中，我们把毛主席的各项政策，包括“给出路”的这一无产阶级政策，交给群众。广大群众认真进行调查研究，掌握确凿证据，把一小撮埋藏得很深的阶级敌人揪了出来。同时，我们对犯错误的红卫兵小将，热情帮助，坚决保护。从而使毛主席的无产阶级政策发挥了巨大的威力，使清理阶级队伍的工作步步深入。这一切说明，只要把毛主席的各项无产阶级政策交给群众，用毛泽东思想去统一群众的认识，群众就会坚决执行、勇敢捍卫毛主席的各项政策，一切工作就会无往而不胜。"},{"type":"paragraph","text":"大叛徒刘少奇大肆叫嚷“群众不接受政策”，其险恶用心，就是妄图破坏我们党与群众的血肉联系，破坏用毛泽东思想来统一我们的思想和行动，破坏以毛主席为首的无产阶级司令部的领导，以便造成各自为政的混乱局面，达到他浑水摸鱼，复辟资本主义的罪恶目的。这是绝对不能容许的。"},{"type":"paragraph","text":"我们要更高地举起毛泽东思想伟大红旗，用毛泽东思想统帅一切，统一认识，统一政策，统一计划，统一指挥，统一行动，彻底肃清刘少奇一切反革命修正主义思想的流毒，坚决执行毛主席的各项政策，圆满完成斗、批、改的伟大历史任务。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6aa184ca92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
