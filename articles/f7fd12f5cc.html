,"authors":[],"dates":[{"year":1949,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席朱总司令"},{"type":"paragraph","text":"电复陶峙岳鲍尔汉"},{"type":"paragraph","text":"望和出关的人民解放军合作，为建立新新疆而奋斗！"},{"type":"paragraph","text":"【新华社北京二十八日电】毛泽东主席和朱德总司令本日复电回答新疆军政当局陶峙岳将军鲍尔汉主席等二十五日及二十六日的通电。该复电称："},{"type":"paragraph","text":"陶峙岳将军及所属部队将士们："},{"type":"paragraph","text":"鲍尔汉主席及所属政府工作人员们："},{"type":"paragraph","text":"你们在九月二十五日及二十六日的通电收到了。我们认为你们的立场是正确的。你们声明脱离广州反动残余政府，归向人民民主阵营，接受人民政治协商会议的领导，听候中央人民政府及人民革命军事委员会的命令处置，此种态度符合全国人民的愿望，我们极为欣慰，希望你们团结军政人员，维持民族团结和地方秩序，并和现正准备出关的人民解放军合作，废除旧制度，实行新制度，为建立新新疆而奋斗。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"朱德"},{"type":"paragraph","text":"一九四九年九月二十八日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7fd12f5cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
