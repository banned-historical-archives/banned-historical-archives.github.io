script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"绝不忍受美帝及其走狗的法西斯统治  刚果（金）人民奋起反剥削反压迫","authors":[],"dates":[{"year":1968,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"绝不忍受美帝及其走狗的法西斯统治"},{"type":"paragraph","text":"刚果（金）人民奋起反剥削反压迫"},{"type":"paragraph","text":"有压迫，就有反抗。具有反帝、反殖光荣革命传统的刚果（金）人民，过去从未在比利时殖民主义者面前屈服过，今天也绝不会忍受美帝国主义及其走狗蒙博托的法西斯统治。除了爱国武装坚持开展反对美国—蒙博托反动统治的武装斗争以外，在蒙博托集团统治区内的人民群众也在不断进行反剥削、反压迫的斗争。"},{"type":"paragraph","text":"今年初，当美国副总统汉弗莱到达刚果（金）活动时，刚果（金）爱国学生组织了声势浩大的示威。示威群众向这个美国瘟神高呼：“美国杀人犯滚回去！”“打倒美帝国主义！”等口号，并当场焚烧美国星条旗，表示他们同美帝斗争到底的决心。一月十六日，金沙萨的爱国学生散发传单，揭露美帝走狗蒙博托这个杀害卢蒙巴的刽子手的狰狞面目，有力地打击了美帝企图把这条走狗打扮成卢蒙巴事业的“继承人”的阴谋。金沙萨学生的爱国行动得到了刚果（金）其他地方学生的支持。"},{"type":"paragraph","text":"蒙博托集团为了扑灭日益高涨的爱国学生运动，强行解散了刚果（金）学生总联合会，并且把总联合会的主席投进监狱。接着，它企图在刚果（金）最重要的洛瓦宁大学建立一个御用的学生组织，来控制学生的爱国活动。这一阴谋遭到洛瓦宁大学学生们的强烈反对，学生们愤怒地把跑到大学里推行这一阴谋计划的蒙博托的“教育部长”逐出了校门，随后学生们在学校内高高地升起一面红旗，表示他们不屈服于美帝及其走狗蒙博托的反动统治的决心。"},{"type":"paragraph","text":"刚果（金）工人为了反对蒙博托傀儡集团的剥削和压迫，不断进行罢工斗争。据报道，继金沙萨房产公司的工人举行罢工要求增加工资和改善劳动条件之后，另一家利代克斯科纺织厂的几千名工人最近也举行大罢工，抗议工厂当局无理解雇工人。在工人比较集中的加丹加省，一些厂矿的工人也展开了罢工斗争。此外，加丹加省省会卢本巴希的全体教师在五月份进行罢教，抗议蒙博托集团连续几个月不发工资的罪恶行为。最近，开赛省省会路路阿堡的人民群众连续组织游行示威，抗议蒙博托到那里策划反人民的阴谋活动。"},{"type":"paragraph","text":"伟大领袖毛主席英明指出：“当前世界上最大的帝国主义是美帝国主义，在很多国家有它的走狗。帝国主义所支持的人，正是广大人民所唾弃的人。”在刚果（金）广大人民的强烈反对下，美帝走狗蒙博托傀儡集团的日子越来越不好过，只要刚果（金）人民团结起来，坚持开展武装斗争以及其他各种形式的斗争，蒙博托傀儡集团终将被刚果（金）人民所推翻。　（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b13603d15"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
