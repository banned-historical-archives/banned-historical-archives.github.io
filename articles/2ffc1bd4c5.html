script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"贵阳煤矿革命职工大破资产阶级技术“权威”  充分发挥工人阶级在生产技术上的领导作用  全矿生产出现新局面，今年以来，月月超额完成国家计划","authors":[],"dates":[{"year":1968,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"贵阳煤矿革命职工大破资产阶级技术“权威”"},{"type":"paragraph","text":"充分发挥工人阶级在生产技术上的领导作用"},{"type":"paragraph","text":"全矿生产出现新局面，今年以来，月月超额完成国家计划"},{"type":"paragraph","text":"据新华社贵阳二十三日电　贵阳煤矿革命委员会在解放军支左人员帮助下，带领广大革命群众狠批中国赫鲁晓夫的反革命修正主义科技路线，大破资产阶级技术“权威”的“技术垄断”，革命工人和革命技术人员掌握了技术大权，充分发挥了工人阶级在生产技术领域里的领导作用。全矿采煤、掘进、运输等生产，都出现了蓬蓬勃勃的局面。今年以来，原煤平均日产水平，比文化大革命以前的最高日产水平提高百分之五十。"},{"type":"paragraph","text":"贵阳煤矿建矿以来，党内一小撮走资派推行中国赫鲁晓夫的反革命修正主义科技路线，大搞“专家治厂”，鼓吹“技术第一”等反动谬论，认为工人根本不能掌握技术。建矿十年以来，全矿没有提拔一个工人担任技术员工作，技术大权掌握在资产阶级技术“权威”的手里，极大地压制了广大工人群众和革命技术人员的积极性、创造性。"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“卑贱者最聪明！高贵者最愚蠢”，“最聪明、最有才能的，是最有实践经验的战士。”在革命大批判中，这个煤矿革委会领导广大革命职工，高举毛泽东思想伟大红旗，用大量的生动事实，揭露了中国赫鲁晓夫和矿内一小撮走资派推行反革命修正主义科技路线的罪行，暴露了资产阶级技术“权威”的纸老虎原形，大长了无产阶级的志气，大灭了资产阶级的威风。工人队伍中的技术人员茁壮成长。事实证明，那些把工人看作“蠢人”的资产阶级技术“权威”，实际上最蠢最蠢。有个被走资派佩服得五体投地的资产阶级技术“权威”，曾经断定一个煤井没有煤了，叫赶快“下马”报废。可是，工人们凭着多年实践的经验，使这个煤井从资产阶级技术“权威”手里起死回生，继续生产。"},{"type":"paragraph","text":"在无产阶级文化大革命中，这个煤矿的革命工人、革命技术人员、革命干部，在伟大的毛泽东思想指引下，实行三结合，在改革生产技术上创造了建矿以来从未有过的出色的成就。广大工人群众怀着为革命多出煤的雄心壮志，大搞技术革新。最近短短一个月，全矿运输方面就实现了十项重大技术革新，其中包括对走资派依靠资产阶级技术“权威”搞的设备的彻底改造，使运输能力提高了将近一倍。搞这十项技术革新的不是别人，正是过去被资产阶级技术“权威”当面斥为“蠢人”的几个电机工和其他的普通工人。"},{"type":"paragraph","text":"贵阳煤矿革命委员会由于狠批中国赫鲁晓夫的反革命修正主义路线，充分发挥了工人群众在生产技术上的领导作用，今年以来，全矿月月超额完成国家计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ffc1bd4c5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
