级文化大革命的伟大胜利","authors":[],"dates":[{"year":1969,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为庆祝中华人民共和国成立二十周年"},{"type":"paragraph","text":"刚果（布）首都举办我图片展览会"},{"type":"paragraph","text":"介绍中国无产阶级文化大革命的伟大胜利"},{"type":"paragraph","text":"新华社布拉柴维尔十日电　为了庆祝中华人民共和国成立二十周年举办的、介绍中国无产阶级文化大革命的伟大胜利的图片展览会，于九月二十七日至十月三日在这里举行。一千多人参观了这个展览会。"},{"type":"paragraph","text":"刚果（布）行使外交部长职务的国民教育部长亨利·洛佩斯代表刚果（布）政府出席了开幕式，并为这个展览会剪了彩。中国驻刚果（布）大使王雨田也出席了开幕式。"},{"type":"paragraph","text":"在参观展览后，亨利·洛佩斯在留言簿题词，祝愿中国人民在社会主义革命和社会主义建设中取得进一步成就。"},{"type":"paragraph","text":"许多观众在留言簿上热情地写下了他们对中国人民的伟大领袖毛主席的敬爱和对中国人民二十年来所取得的巨大成就的祝贺。一位刚果（布）朋友写道：“祝毛主席万寿无疆！光荣属于中国人民！”"},{"type":"paragraph","text":"一位喀麦隆朋友写道：“中国人民在毛主席亲自发动和领导的无产阶级文化大革命中所取得的成就，给我留下了极其深刻的印象。我所看到的这一切奇迹，只有依靠战无不胜的毛泽东思想才能创造出来。中国人民的胜利，也就是全世界被压迫人民的胜利，全世界被压迫人民决心用强大的毛泽东思想武装起来，以便同美帝国主义和现代修正主义进行有效的斗争。毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"一个刚果（布）工人写道：“刚果工人阶级向中国工人阶级和全体人民致以衷心的祝贺。”"},{"type":"paragraph","text":"这个展览会是“刚果争取各国人民友好协会”和中国驻刚果（布）大使馆联合举办的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2db1c7321"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
