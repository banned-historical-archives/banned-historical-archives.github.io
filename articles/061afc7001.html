art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东的声音唤醒了我","authors":[],"parts":[{"type":"paragraph","text":"一九六五年十月，中国民族歌舞团访问了智利。到处都听到“中国万岁！”“毛泽东万岁！”的欢呼声。"},{"type":"paragraph","text":"在瓦尔帕来索，当歌舞团演完最后一场，幕刚谢，一位中年人穿过密密层层的人群，挤到中国演员跟前来，拉着一位同志，恳求地说：“请给我一枚毛泽东纪念章吧！”当中国演员把一枚金光闪闪的毛主席纪念章别在他胸前的时候，他一边抚摸一边激动地说：“……我读过许多中国报刊和杂志，是毛泽东的声音唤醒了我，他老人家就象我再生的父母一样。我很久以来一直在盼望着能有一枚毛泽东的纪念章呵！”"},{"type":"paragraph","text":"有一次，歌舞团乘火车去康塞普西翁，一到那里，中国演员们就被一群热情的青年人围了起来，他们重复着“契诺！”（西班牙语中国）“北京！”“毛泽东！”……人群中突然有人高呼“毛泽东万岁！”接着是暴风雨般的掌声，和“人民中国万岁！”“中国共产党万岁！”“毛泽东万岁！”的欢呼声。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"061afc7001"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
