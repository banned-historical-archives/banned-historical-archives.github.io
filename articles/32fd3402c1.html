year":1952,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席救活我的三个孩子"},{"type":"paragraph","text":"编辑同志：我是一个有十个孩子的母亲。我深深感觉到生长在毛泽东时代的儿童是最幸福的。一九五○年一月间，我一胎生了三个女孩，因为流血过多，身体虚弱，一点奶也没有。孩子的父亲（是一个电车工人）看着这三个孩子，心里非常焦急。正当我们夫妇两人最苦恼的时候，上海市民主妇女联合会派工作同志来慰问，并把我和三个小孩一同送进上海市立妇幼保健院。我出院以后，三个孩子仍留在保健院里，由上海市民主妇女联合会出资聘请奶姆哺养。现在他们又由中国儿童福利会扶养。他们都长得胖胖的，天真活泼。医生经常给他们检查身体。我时常这样想，这三个孩子要是在旧社会出生，一定要夭折了。她们的父亲也常常说：“有了毛主席，才有这三个孩子，毛主席、共产党的恩情我们是永远忘不了的。”            　程秀英"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32fd3402c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
