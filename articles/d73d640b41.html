<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"平原省委关于平原日报出现荒谬言论所犯错误的检讨","authors":[],"dates":[{"year":1951,"month":10}],"is_range_date":false,"parts":[{"text":"平原省委关于平原日报出现荒谬言论所犯错误的检讨","type":"title"},{"text":"《宣传通讯》编者按：关于9月15日的平原日报上出现的荒谬言论，中央宣传部曾给平原省委信提出批评（刊本刊第21期）。现将平原省委所作检讨刊载于下，这个检讨是正确的。","type":"paragraph"},{"text":"接到10月2日中央宣传部关于我们在党报上发表郝瑞琛反动文章所犯客观主义倾向错误的批评，给我们很大帮助。兹将我们开展郝瑞琛反动思想批判情况及所犯错误检讨报告如下：","type":"paragraph"},{"text":"在武训问题批判运动深入开展中，我们遇到这么一小部分站在反动立场上的人，如郝瑞琛者流，继续散布荒谬言论，进行顽抗。并影响着一部分群众。为了彻底粉碎这些反动言论，揭露他们的立场本质，使群众认识到所谓武训支持者是一撮别有用心的人，就以郝瑞琛为典型展开公开批判。经批判后，一般都已认清这些人的反动本质。从批判中，进一步划清了革命主义、资产阶级改良主义、封建保守主义的界限，提高了干部政治思想水平，使武训问题思想批判运动更深入一步。","type":"paragraph"},{"text":"虽然对郝瑞琛这类思想批判进行了这些工作，且有了不小的收获，但检讨起来，在党报上公布郝瑞琛的反动文章是错误的，起了一定的副作用。郝瑞琛的文章极端反动，向革命领袖、国营经济、工农干部等展开一连串的污蔑，带有很大挑动是非的性质。我们也察觉到这点，于公布同时，发表文章予以严格批判，指出反动本质，免得迷惑一些觉悟不高的人，引起思想混乱。但把这样极端反动荒谬的文章在党报上公布，使之有机会与群众见面是错误的。把“武训传”电影批判性的演出与郝瑞琛文章的批判发表同样看待，这也是很不妥当的。","type":"paragraph"},{"text":"关于对革命领袖的污蔑，我们曾意识到发表时把它删去，但以读者来信形式发表觉得“不好修改其原信”，就以×××代替。没有注意到以×××代替毛主席是极不妥当的，而且这样并未能把污蔑革命领袖的言论删去（当然根本不应在党报上发表）。","type":"paragraph"},{"text":"总之，在郝瑞琛反动思想批判中，虽然我们是要粉碎敌人的反动思想，但由于我们的思想水平不高，政治警惕性差，给予敌人以散布反动毒素的空隙，起了一些副作用。对敌斗争中，竟使反动言论在党报上占有位置与我们言论并存，这是一种客观主义倾向的错误。这种错误主要应由省委负责，并已责成报社编辑部展开检查与学习，从中取得经验教训，进一步加强思想阵线的工作。以上检查是否有当，请予指示。","type":"paragraph"},{"text":" 中共平原省委　10月","type":"paragraph"}],"comments":[],"origin":"中宣部《宣传通讯》1951年23期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d73d640b41"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
