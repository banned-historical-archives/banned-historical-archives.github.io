tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想改造灵魂","authors":[],"parts":[{"type":"paragraph","text":"六四三七部队四六分队连长董来喜同志学习了毛主席关于“共产党员应该作到最有远见”的教导，感受很深。他体会到："},{"type":"paragraph","text":"“共产党员应该看到时代的风云，看到国内外阶级斗争的浪涛，看到世界上被压迫的人民还过着象自己在解放前的那种苦难生活，立志为共产主义事业贡献出全部生命。”"},{"type":"paragraph","text":"北京部队空军某医院护士长张盛梅，几年来反反复复地学习了《为人民服务》《纪念白求恩》，越学越心明眼亮劲头足。她体会到："},{"type":"paragraph","text":"“病员对我们的要求是有限的，但是我们为病员服务却是无限的。多做一点是一点，多做一件是一件，尽心去做，全力去做，自觉去做，这就是我最大的愉快，最高的享受！”"},{"type":"paragraph","text":"某部飞行副中队长袁兆祥，在一次飞行训练中，飞机突然发生故障，急剧地往下掉。为了不让社员的生命财产遭受损失，他毅然让飞机落在一个小河滩上，自己负了伤。他说："},{"type":"paragraph","text":"“为了党的事业，为了人民的利益，上刀山，下火海，是共产党员的神圣职责！”"},{"type":"paragraph","text":"三二五三部队运输连党支部在一次党日里，举办“破私立公”讲用会，共产党员杨仁田在会上发言："},{"type":"paragraph","text":"“私心杂念是进步道路上的绊脚石，如果你不搬掉它，它就要摔倒你。要想搬倒思想上的绊脚石，就要用毛泽东思想来改造自己的灵魂。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fe3c6ec2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
