<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"谭启龙关于社会主义教育的一次谈话","authors":["中共山东省委第一书记","谭启龙"],"dates":[{"year":1964,"month":10}],"is_range_date":false,"parts":[{"text":"谭启龙关于社会主义教育的一次谈话","type":"title"},{"text":"中共山东省委第一书记谭启龙","type":"authors"},{"text":"（摘要；只是个人笔记，未经本人审阅）","type":"subtitle"},{"text":"（一）工作队入村后第一阶段干什么？我看要花很大一段时间去摸情况。做工作在于“情况明”，情况明了才好下决心。我们在未入村前，情况是根本不知道的。关键在于突破这一关）——工作队首先要取得贫、下中农的相信。但是这一步就很不容易办到。他们要观察我们的言、行，直到信任我们，向我们说真心话，就得有一个过程。工作队也要经得起群众考验这一关。情况明了，再决定下一步作法，才能从实际出发，不带框框，不受约束。比如说，有的大队就需要首先进行“夺要斗争”，然后及于其他。总之，群众最为迫切的要求，我们就先去解决，这样他们就会切身感到我们是来真为他们办事的，就会信赖我们，团结在我们的周围。所以工作队入村，千万要不受时间、步骤、框框的限制，要摸清情况，从实际出发。目的是要把革命对象认清，革谁的命要找准。摸情况这一段时间也许要一个月或两个月。","type":"paragraph"},{"text":"（二）工作团大军压境必然会震动很大，一定会有人要躺倒、不干、逃跑等等。为了减少这些副作用，更积极地调动大家的力量。可以即由县委召开一次县的三级干部会，说明来意，讲明政策。如：（1）要求大家自觉放包袱团结对敌；（2）不要抵抗，有错认错，争取从轻处理，抵抗就会错上加错，罪上加罪；（3）不准打击报复。说明反党反社会主义反人民就是反革命，就要办理，等等。这样可以争取多数，减少运动阻力。这个会上还可以布置冬季生产及一些重要的工作。县的这个会，工作团团部有几个人参加就行了，其他人均不参加，直接到村去进行工作。","type":"paragraph"},{"text":"（三）县机关五反运动，现在虽暂不搞，但先要抓情况。可以由工作团马上组织一些同志到一些重点单位去摸情况，看看风向，同他们生活在一起。","type":"paragraph"},{"text":"（四）社会上有批闲散的人，不劳动，如何改造他们？可以在运动中结合加以调查研究。他们到底有多少人？出路何在？如何把他们组织起来？如何才能改造好？我看最主要的是劳动。社会主义社会最突出的表现就是人人劳动，自食其力，都是劳动者，以劳动为荣，剥削为耻。这是防止人变坏的根本问题。人人都要走这条路，现在就要开始，这是一个关键。只有如此才能逐步地消灭阶级，消灭三个差别。","type":"paragraph"}],"comments":[],"origin":"中共山东省委洒阳工作团办公室稿《工作简报》第二期（1964年11月1日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谭启龙","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffb0667d91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
