<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji44","name":"毛泽东全集第44卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"核武器是吓人的东西，不会用的","alias":"","parts":[{"type":"paragraph","text":"核武器是吓人的东西，不会用的!"},{"type":"paragraph","text":"（1961年9月24日）"},{"type":"paragraph","text":"蒙哥马利（以下简称蒙）：现在人们都在谈论核武器的问题，争论很多。我在北京也同刘少奇主席谈起中国的核政策。主席对这个问题有什么看法？"},{"type":"paragraph","text":"毛泽东（以下简称毛）：我对核武器不感兴趣。这个东西是不会用的，越造得多，核战争就越打不起来。要打还是用常规武器打。打常规武器还可以讲点军事艺术，什么战略、战术，指挥官可以临时按照情况有所变化。用核武器的战争就是按电纽《钮》，几下子就打完了。"},{"type":"paragraph","text":"蒙：刘主席告诉我说，因为美国、英国、法国、苏联都有，你们也要搞一点。"},{"type":"paragraph","text":"毛：是，准备搞一点。哪年搞出来，我不知道。美国有那么多，是十个指头。我们即使搞出来，也只是一个指头。这是吓人的东西，费钱多，没有用。"},{"type":"paragraph","text":"蒙：我也想，在你们的各项事业的安排中，发展核武器恐怕要摆在很后的地位。"},{"type":"paragraph","text":"毛：就是，我们用很少一点钱搞试验。我们没有雄厚的经济基础，工业才开始有一点。美国、英国、法国、苏联，有雄厚的工业"},{"type":"paragraph","text":"[1]这是毛泽东和英国陆军元帅蒙哥马利谈话的一部分。"},{"type":"paragraph","text":"核武器是吓人的东西，不会用的基础。我们像穷人、叫化子，穿上漂亮衣服，到外面跑一跑。"},{"type":"paragraph","text":"蒙：我的看法是，正因为有核武器，才阻正了第三次世界大战的爆发。"},{"type":"paragraph","text":"毛：我说过原子弹是纸老虎。"},{"type":"paragraph","text":"蒙：现在英国有很多人示威游行，要求禁止和销毁核武器。我对他们说，首先是撤退外国军队，然后裁军，最后一件事才是销毁核武器。"},{"type":"paragraph","text":"毛：是不是能够像禁止化学武器那样达成一个协议，如在第二次世界大战中那样，大家都不用？核武器也不用？"},{"type":"paragraph","text":"蒙：现在还做不到，首先必须消除东西方之间的猜疑和互不信任。为此就要把军队撤回到各自的国土上去。这就是我为什么没有时间去访问日本的原因，我必须首先推动实现我的三项原则。"},{"type":"paragraph","text":"毛：那好，三项原则实现了，再禁止核武器。"},{"type":"paragraph","text":"蒙：我跟陈毅元帅讲过，希望他和苏联讲一讲，要他们也出来支持我的三项原则。"},{"type":"paragraph","text":"毛：他要到日内瓦去参加老挞问题的那个会”，可能碰到葛罗米柯，找个机会谈一谈，我赞成。"},{"type":"paragraph","text":"[1]指1961年5月16日至1962年7月23日在日内瓦举行的讨论和平解决老挝问题的会议，又称“扩大的日内瓦会议”。1954年日内瓦协议规定了老挝的中立地位和尊重老挝主权、独立、统一、领土完整和内政不受干涉等原则。但是美国违反协议，对老挝进行干涉和侵略，并于1960年挑起老挝内战。为了和平解决老挝问题，柬埔寨国家元首西哈努克亲王倡议召开了这次会议。参加会议的有1954年日内瓦会议的参加国柬埔寨、老挝、越南、南越、中国、苏联、美国、英国和法国，另外还有印度、加拿大、波兰、泰国和缅甸。会议最后签署了《关于老挝中立的宣言》和《关于老挝中立的宣言的议定书》。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":9,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":426,"page_end":427},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a49801f1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
