tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国党建研究会举行学习毛泽东建党思想座谈会等二则","authors":[],"parts":[{"type":"paragraph","text":"全国党建研究会举行学习毛泽东建党思想座谈会"},{"type":"paragraph","text":"据新华社长沙12月9日电全国党的建设研究会8日至9日在毛泽东同志诞生地湖南韶山召开学习毛泽东建党思想暨纪念毛泽东同志诞辰110周年座谈会。北京、上海、湖南、江西、福建、陕西、河北等省市和中央、国家机关有关部门从事党建研究的同志、专家学者，以及一些长期从事党的建设工作的老同志共40余人出席会议。"},{"type":"paragraph","text":"电视文献专题片《独领风骚——诗人毛泽东》拍竣"},{"type":"paragraph","text":"据新华社北京12月9日电为纪念毛泽东诞辰110周年，电视文献专题片《独领风骚——诗人毛泽东》已由中共中央文献研究室、中共江苏省委和中央电视台联合摄制完成。"},{"type":"paragraph","text":"电视文献专题片《独领风骚——诗人毛泽东》以毛泽东的诗词创作为线索，用形象的文学语言、精美的画面构图和丰富的影视资料，真实地反映了毛泽东的生平业绩，形象地展示了毛泽东作为人民领袖的崇高品格和伟大胸襟，生动地刻画了毛泽东既是伟大的政治家、军事家、思想家，又是伟大诗人的形象。从这部专题片中，可以看到毛泽东青年时代反映他“指点江山”青春抱负的作品、战争年代纪录他“马背诗人”岁月的作品、新中国成立后描写他领导党和人民建设新中国历程的作品。"},{"type":"paragraph","text":"据悉，这部专题片将于近期在中央电视台播出。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ff85649f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
