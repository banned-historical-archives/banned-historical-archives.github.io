s":[],"dates":[{"year":1986,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"湖北省委为“汉阳事件”平反的文件","type":"title"},{"text":"武汉市委并汉阳县委：","type":"appellation"},{"text":"省委于一九八五年七月组织复查工作组，对“汉阳事件”进行复查以后，认真讨论了工作组《关于“汉阳事件”的复查报告》和你们的意见，并向中央报送了《关于“汉阳事件”复查情况和处理善后问题的请示报告》。今年元月，中央批复同意省委关于为“汉阳事件”彻底平反的意见，并对处理善后问题作了明确指示。根据中央批复精神，现将有关处理事宜通知如下：","type":"paragraph"},{"text":"一、“汉阳事件”是汉阳一中部份学生为升学率问题自发地进行罢课闹事的事件。原来认定为“反革命暴乱事件”没有根据，是在左倾错误思想影响下造成的一起冤案，应予彻底平反。","type":"paragraph"},{"text":"二“汉阳事件”的平反要着重从政治上解决问题。凡因这一冤案受到刑事处理和党纪、政纪处分的都要彻底平反，不留尾巴。受到株连和影响的，也要采取措施作好工作，消除影响。对主要危害人（即错杀、错判、错劳教的）除在政治上平反外，还要在经济上适当从优给予抚恤或补助，要一次性地解决问题。","type":"paragraph"},{"text":"三、由于“汉阳事件”牵涉面广、时间很长、影响较大，平反工作必须从安定团结的大局出发，对于受害人及其亲属要认真做好思想工作，使他们顾全大局，看到实际存在的某些困难只有在国家富强、人民富裕的基础上，才能根本解决。","type":"paragraph"},{"text":"四、考虑这一冤案是在当时“左”的错误思想影响下造成的，对具体办案人员不宜再追究责任。平反工作中，要严防别有用心的人乘机挑唆煽动，要通过对“汉阳事件”的平反，切实总结经验教训，进一步调动各方面的积极因素，促进和巩固安定团结的大好形势。当前要抓紧时间扎扎实实做好工作，现在不登报、广播，在处理好善后工作后，视情况再作适当安排。","type":"paragraph"},{"text":"五、鉴于为“汉阳事件”彻底平反的善后处理工作量大，情况比较复杂，希望市、县委加强领导，立即组织专门班子，在省、市有关部门的指导帮助下，切实贯彻执行中央的指示，严肃认真地把这项工作抓紧做好。","type":"paragraph"},{"text":"最高人民法院有关王建国的刑事判决书","type":"subtitle"},{"text":"（1986）刑再字7号","type":"subtitle"},{"text":"1986.01.25","type":"subtitle"},{"text":"原审被告人王建国，男，生于一九二四年，湖北省圻春县人，原系湖北县汉阳县第一中学副校长。","type":"paragraph"},{"text":"原审被告人钟毓文，男，生于一九二五年，湖北省汉阳县人，原系汉阳县第一中学教员。","type":"paragraph"},{"text":"原审被告人杨焕尧，男，生于一八九二年，湖北省安陆县人，原系汉阳县文化馆图书管理员。","type":"paragraph"},{"text":"上列原审被告人因现行反革命暴乱一案，经湖北省汉阳县人民法院审理，于一九五七年八月二十三日以（57）刑特字第8、9、10号刑事判决，以现行反革命暴乱罪判处王建国、钟毓文、杨焕尧死刑，立即执行。王建国、钟毓文不服，提出上诉。经湖北省孝感地区中级人民法院审理，于一九五七年八月二十八日以（57）刑上字第113、114号刑事判决，维持原判，驳回上诉。王建国、钟毓文、杨焕尧仍不服，提出申请复核。经本院审核，于一九五七年九月四日以1957年度刑复字第203号刑事判决，核准判处王建国、钟毓文、杨焕尧死刑，立即执行。后同案原审被告人胡斌等不服，提出申诉。湖北省高级人民法院复查后于一九八六年一月十三日报送本院审核。","type":"paragraph"},{"text":"本院依法组成合议庭，对此案进行了重新审理。本庭认为，原判决认定王建国、钟毓文、杨焕尧为首策划、组织和指挥汉阳县第一中学的现行反革命暴乱的犯罪事实全部失实，原以现行反革命暴乱罪判处王建国、钟毓文、杨焕尧死刑不当，应当依法纠正。特改判如下：","type":"paragraph"},{"text":"一、撤销本院1957年度刑复字第203号刑事判决和湖北省汉阳县人民法院（57）刑特字第8、9、10号刑事判决以及湖北省孝感地区中级人民法院（57）刑上字第113、114号刑事判决；","type":"paragraph"},{"text":"二、宣告王建国、钟毓文、杨焕尧无罪。","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"湖北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08c3395fa4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
