<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"愤怒抗议佐藤反动政府的残酷剥削日本数十万交通运输工人罢工冲绳八万群众大示威，反对美日反动派玩弄“归还”冲绳的骗局","authors":[],"dates":[{"year":1971,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十九日电　据东方通讯社报道:日本数十万名交通运输工人以及一些其他行业的工人，十八日在全国各地再次罢工，反对美日反动派的残酷剥削，并要求改善生活条件。"},{"type":"paragraph","text":"在东京、名古屋、大坂、福冈等大城市及其周围地区的十家私营铁路企业的工人，十八日从清晨开始举行二十四小时的罢工。拥有大约二十五万会员的私营铁路工会联合会的所有工人十八日几乎都参加了罢工，全国三万四千多列电气火车完全停驶。这次罢工的规模是一九五八年以来规模最大的一次。"},{"type":"paragraph","text":"为了声援私营铁路工人的罢工，国营铁道工会和动力车工会的工人十八日在北海道、东北地方、中国地方、九州和千叶等县的二十三个地方也举行了罢工。由于这次罢工，使六十二列客车和货车完全停驶，四十三列火车误点。"},{"type":"paragraph","text":"全日本交通工会的七万四千名运输工人继十四日罢工之后，十八日再次在日本各地的工作场所举行四十八小时的罢工。日本各地的卡车司机和出租汽车司机以及属于全国港湾工会的码头工人十八日也举行了二十四小时的罢工。"},{"type":"paragraph","text":"据新华社北京二十日电　据东方通讯社报道:日本冲绳各岛的八万名工人、农民、学生、教师、政府雇员十九日举行声势浩大的罢工或反美集会，反对美日反动派玩弄“归还”冲绳的骗局，并且表示决心把这场斗争进行到底。"},{"type":"paragraph","text":"十九日，冲绳美军基地的工人、市政府的雇员和中、小学教师等五万四千人，不顾美国军事当局和日本反动派的威胁，举行了二十四小时的罢工。工人们还在工厂和车间里举行集会，表示决心全力以赴地进行斗争，粉碎美日反动派“归还”冲绳的骗局。"},{"type":"paragraph","text":"美军基地的工人们从午夜零点，就在基地的周围设置了纠察线，把美军基地封锁起来。特别是聚集在嘉手纳美军基地前面的一千多名工人，同美军及反动警察进行了激烈的对抗。工人们手持红旗，怀着对美日反动派的愤怒，心情举行了示威游行，并振臂高呼“粉碎归还冲绳协议”等口号。"},{"type":"paragraph","text":"十九日下午，工人、农民、政府雇员、教师、大、中学生以及妇女和宗教界人士在那霸市与仪公园举行声势浩大的反美集会，会后举行了示威游行。"},{"type":"paragraph","text":"为了同工人的斗争相呼应，琉球大学、冲绳大学和国际大学的学生举行了罢课，并设置路障，封锁校楼。许多商店也举行了罢市斗争。"},{"type":"paragraph","text":"这次罢工使美日反动派受到了沉重的打击，显示了冲绳人民反对美日反动派军事统治的革命精神和力量，并且有力地推动了日本人民的反美斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33c7068a48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
