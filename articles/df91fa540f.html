团斗争中有违反政策的现象","authors":[],"dates":[{"year":1955,"month":7,"day":25}],"is_range_date":false,"parts":[{"text":"重庆市有少数单位在反对胡风反革命集团斗争中有违反政策的现象","type":"title"},{"text":"【四川分社讯】重庆市有少数单位在反对胡风反革命集团斗争中，有违反政策的现象。如煤管局擅自提出错误的斗争策略：争取同盟军要通过一些中间偏左的人作中间偏右的人的工作。西南煤管局、四区税务局硬性规定肃清本单位反革命分子的百分比。重庆市建筑工程管理局和四区民主妇联，在运动一开始就叫“人人写自传”，“人人交待历史和社会关系”。","type":"paragraph"},{"text":"以上这些偏向，市委了解后都已及时着手纠正。","type":"paragraph"}],"comments":[],"origin":"1955年7月25日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df91fa540f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
