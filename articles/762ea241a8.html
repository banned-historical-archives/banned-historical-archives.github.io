script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对大资本家大庄园主残酷剥削　争取生存权利  智利产业工人和农业工人不断罢工  纽夫莱省两百多庄园七千农业工人不畏强暴坚持罢工","authors":[],"dates":[{"year":1970,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对大资本家大庄园主残酷剥削　争取生存权利"},{"type":"paragraph","text":"智利产业工人和农业工人不断罢工"},{"type":"paragraph","text":"纽夫莱省两百多庄园七千农业工人不畏强暴坚持罢工"},{"type":"paragraph","text":"新华社讯　圣地亚哥消息：智利产业工人和农业工人最近不断开展罢工斗争，反对大资本家和大庄园主的残酷剥削，争取生存权利。"},{"type":"paragraph","text":"智利重要的洛塔煤矿的三千名工人一月二十九日举行不定期罢工，要求增加工资。同一天首都圣地亚哥一千二百名自来水公司工人举行罢工，要求增加工资。圣地亚哥、康塞普西翁和瓦尔帕来索的一千多名工人最近也举行了罢工。"},{"type":"paragraph","text":"智利农业工人也不断举行罢工和占领庄园，抗议大庄园主的残酷剥削。纽夫莱省二百个庄园的七千名农业工人，二十七日举行罢工，抗议大庄园主不付给他们最低工资，并要求制裁残酷剥削他们的大庄园主。在麦哲伦省，三十个庄园的一千五百名农业工人二十二日开始的罢工坚持了八天以上，要求增加工资，抗议大庄园主不履行协议。在圣地亚哥省，一个庄园的三百名农业工人二十七日罢工一天，要求增加工资，抗议地主解雇农业工人。"},{"type":"paragraph","text":"智利工人斗争的高涨是由于美国垄断资本和本国寡头势力加紧掠夺和剥削智利人民，智利经济恶化的结果。据智利官方宣布，去年通货膨胀达百分之二十九点三，而实际上达百分之四十以上。去年一年货币贬值十九次。"},{"type":"paragraph","text":"新华社讯　圣地亚哥消息：智利纽夫莱省两百多个庄园的七千名农业工人一月二十七日开始的罢工仍在坚持。当农业工人关于增加工资和制裁大庄园主的要求遭到无理拒绝时，他们立即占领了九个庄园，并且抓住一些庄园主作为人质加以扣留。农业工人的勇敢行动使当局大为惊恐，三十一日，在纽夫莱省宣布“紧急状态”，并出动大批军警前去镇压。但是，农业工人毫不畏惧，继续斗争，并且在大路上设置了路障，反对军警的武力镇压。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"762ea241a8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
