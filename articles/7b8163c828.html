ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对中央转发西北局关于甘肃临夏检查民族政策执行情况报告的批语和附注","alias":"","parts":[{"type":"paragraph","text":"对中央转发西北局关于甘肃临夏检查民族政策执行情况报告的批语和附注"},{"type":"paragraph","text":"（1953年3月19日）送李维汉同志再阅，在附件中添了一个附注?"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十九日"},{"type":"paragraph","text":"二有些地方民族平等基本实现了，民族隔阁基本消除了，在这些"},{"type":"paragraph","text":"[1]李维汉，当时任中共中央统战部部长、中央人民政府民族事务委员会主任。"},{"type":"paragraph","text":"[2]即本篇二。毛泽东为中央写的这个附注，加括号写在中央转发的西北局1953年2月20日给甘肃省委的复文中“根据临夏县的检查报告，目前存在于汉族干部和汉族群众中主要的是残余的大民族主义倾向”一句话之后。毛泽东全集第三十三卷地方可以说大民族主义只是残余了。但在民族平等还未基本实现，民族隔阁还未基本消除的地方则大民族主义还是严重地存在，不能说只是残余。再则自前时期主要的危险思想是大汉族主义，不要笼统提大民族主义。一中央"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":78,"page_end":79},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b8163c828"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
