art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席的伟大战略思想统帅三支两军工作","authors":["庞朝胜"],"parts":[{"type":"paragraph","text":"“毛主席指示我照办，毛主席挥手我前进。”跨入伟大的七十年代，我们联系三年来的支左实践，反复学习、深刻领会毛主席关于“全世界人民团结起来，反对任何帝国主义，社会帝国主义发动的侵略战争，特别要反对以原子弹为武器的侵略战争！如果这种战争发生，全世界人民就应以革命战争消灭侵略战争，从现在起就要有所准备”的伟大教导，对继续做好三支两军工作的重要意义有了新的认识。"},{"type":"paragraph","text":"在国内外阶级斗争的新形势下，有的同志曾经认为，“三支两军工作可以放松一点了，集中力量抓部队本身的战备工作，才能落实毛主席关于‘提高警惕，保卫祖国’，‘备战、备荒、为人民’的伟大战略思想”。为了统一认识，我们发动大家用毛泽东思想作武器，分析国内外阶级斗争形势，使大家看到，国外的阶级敌人对我们虎视眈眈，国内的阶级敌人也不甘心他们的失败。国内外的阶级敌人总是遥相呼应的，国内外的阶级斗争总是紧密相联的。我们搞部队本身的战备工作和执行三支两军任务，共同课目都是搞阶级斗争，都是为了巩固无产阶级专政。“备”和“支”完全是统一的。"},{"type":"paragraph","text":"统一了这个认识以后，我们就以毛主席关于“提高警惕，保卫祖国”，“备战、备荒、为人民”的伟大战略思想统帅三支两军工作。我们在一个公社支农时，大家自觉以毛主席的伟大战略思想推动和检查斗、批、改，发现三个生产队的领导班子团结得不够好，立即深入进行调查研究，做过细的工作，帮助领导班子解决了团结问题，有力地促进了斗、批、改的深入发展。在继续做好三支两军工作的实践中，同志们都受到了很大的锻炼，阶级觉悟有了很大的提高，有力地促进了部队本身的战备工作。一次，四排要执行一项紧急任务，有的同志离集合地点八里路，赶来也只用了十五分钟。"},{"type":"paragraph","text":"我们通过学习元旦社论，深深体会到毛主席发出的伟大指示，是要全中国和全世界人民百倍提高警惕，从精神上、物质上做好充分的反侵略战争的准备。我们一定象“支左爱民模范”李文忠同志那样，紧跟伟大领袖毛主席，坚决执行毛主席的伟大指示，把三支两军工作搞得更好。如果帝国主义、社会帝国主义胆敢对我国发动侵略战争，一定叫它们碰得粉身碎骨！"},{"type":"paragraph","text":"原排长、现任连长 庞朝胜"}],"alias":""},"tags":[{"name":"三支两军","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ea25b260c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
