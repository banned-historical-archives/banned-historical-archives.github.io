" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"同江西省委同志谈记录","alias":"","parts":[{"type":"paragraph","text":"我帮你什么忙：他才出题目。另外，有别的同志，他就是训话，我出题他不答题，我只好听训。这样的人，还不止一个。世界上有这种人，专门训人的，对我这种人，他就要训，长篇大论地训。"},{"type":"paragraph","text":"宣传和鼓动的区别。宣传者，许多概念联系起来。鼓动者，“-个概念一个口号。比如罢工，提出---个口号，简单得很，就叫鼓动。写文章，做报告，长篇大论，叫宣传。贴标语，叫鼓动（专为-种事动员）。"},{"type":"paragraph","text":"×××发明这个道理，他说讲了两次，-吹是五十分，一次是零分，人家不愿意听了：我历来提倡，听讲话，不要鼓掌。不爱听的，可以打睡。你讲的没有味道，他还不如打睡，保养身体，还是保养身体兔受这场灾难为好。还有一个办法，看小说。我从前在学校听课时就是这样，这就把教员整倒了。（讲了呛书时的故事）这也许是我的毛病，也许是因为先生讲的不引人注意，我就看小说，后来发明了打睡。不要说我这个人没有发明，我也有发明。（大家笑）用这种办法，我整了那些不是交谈式，而是训话式的人；整了那些老师，他只爱讲，不能让学生提问题，不是提问题启发学生。上课有了讲义，就不必讲了，让学生去看，再出点题目，让学生讨论。这次政府工作报告，我就主张不再念的，后来说有些人不识字，还是念好，我让了步，还是念了，也鼓掌了，这种会，鼓掌，我也赞成。"},{"type":"paragraph","text":"在同志们，不要使人怕。对敌人，要使他怕。在同志中，使人怕，那可不行：使人家怕，总是你有鬼，不然为什么使人怕你呢？凡是使人怕的，大概是道理少一点。"},{"type":"paragraph","text":"过去军队里，班长带兵有三个办法，打人、翼人、关禁闭，别无办法。他不搞民主。后来我们说不许打人、人、禁闲现在也取消了。逃兵，逃了算了，何必捉！捉回枪毙，岂有此理！人家为什么逃？无非是在你这里过不下去了。跑了算了。如果你要把他捉回来，那就向他承认错误，请他吃顿饭，有猪肉吃，并且对他说，你还想逃，就逃之，不想逃，就下来。不能用打人、人、闭、捉逃兵的办法。逃兵让他逃，他的积极性已经不高，留他有何用！逃到外国，有什么了不起？！中国那公多人。无非是出去我们一顿。我们的人多得很。赫鲁晓夫、肯尼砸并不是中国人，他也。音乐家付聪，逃到英国去了，我说是好事。这种人留在国内叉有何用？"},{"type":"paragraph","text":"我只讲这两点：-是性质问题，二是工作态度。"},{"type":"paragraph","text":"同江四省委同志谈话制录（摘录）"},{"type":"paragraph","text":"（一九六四年）"},{"type":"paragraph","text":"湖南还提出农村要建立儿童团，少先队，青年联合会，因为现在农村有不少高小程度的小知识分子。"},{"type":"paragraph","text":"（少先队）为什么要按学校组织呢：还是按行政村组织好，还可以把地富儿童组织趣来，使他们受教育。"},{"type":"paragraph","text":"·201·"}],"authors":["毛泽东"],"dates":[{"year":1964}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":214,"page_end":214},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34098dc2b4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
