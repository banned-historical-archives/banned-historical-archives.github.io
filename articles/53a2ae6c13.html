script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"给雷经天的信","authors":["毛泽东"],"dates":[{"year":1981,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"给雷经天的信"},{"type":"paragraph","text":"（一九三七年十月十日）"},{"type":"paragraph","text":"毛泽东雷经天①同志："},{"type":"paragraph","text":"你的及黄克功②的信均收阅。黄克功过去斗争历史是光荣的，今天处以极刑，我及党中央的同志都是为之惋惜的。但他犯了不容赦免的大罪，以一个共产党员红军干部而有如此卑鄙的，残忍的，失掉党的立场的，失掉革命立场的，失掉人的立场的行为，如为赦免，便无以教育党，无以教育红军，无以教育革命者，并无以教育做一个普通的人，因此中央与军委便不得不根据他的罪恶行为，根据党与红军的纪律，处他以极刑。正因为黄克功不同于一个普通人，正因为他是一个多年的共产党员，是一个多年的红军，所以不能不这样办。共产党与红军，对于自己的党员与红军成员不能不执行比较一般平民更加严格的纪律。当此国家危急革命紧张之时，黄克功卑鄙无耻残忍自私至如此程度，他之处死，是他的自己行为决定的。一切共产党员，一切红军指战员，一切革命分子，都要以黄克功为前车之戒。请你在公审会上，当着黄克功及到会群众，除宣布法庭判决外，并宣布我这封信。对刘茜同志之家属，应给以安慰与抚恤。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九三七年十月十日注　释："},{"type":"paragraph","text":"①雷经天，当时是陕甘宁边区高等法院刑庭审判长。"},{"type":"paragraph","text":"②黄克功，少年时加入红军，参加过井冈山的斗争和二万五千里长征，当时任抗日军政大学第六队队长。1937年10月，因对陕北公学女学员刘茜逼婚未遂，将刘茜枪杀致死。经陕甘宁边区高等法院公审，判处黄克功死刑。"},{"type":"paragraph","text":"（新华社7月10日电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53a2ae6c13"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
