[{"year":1985,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国政协常委、年届九十一岁高龄的梁漱溟先生，谈到与毛泽东的早期交往时说:“七七事变后，我在武汉提出要去延安一看。经蒋介石同意，由八路军武汉办事处的董老，西安办事处的林老安排，一九三八年初春即赴延安作八日访。”"},{"type":"paragraph","text":"“毛主席与我曾有两宵深谈。他强调阶级斗争。我讲中国社会散漫流动，贫富贵贱虽有，阶级分化不明不强，有其特殊性。鉴于此，我提出‘伦理本位，职业分途’之说。为此，我们辩论不已，通宵不辍。”嗣后，梁曾二赴延安见到毛泽东。梁先生说:“若论我的共产党朋友，首先是毛泽东。”"},{"type":"paragraph","text":"(摘自《华声报》)"}],"comments":[],"origin":"《华声报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2eb6a85575"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
