" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共河南省委员会关于大张旗鼓地宣传社会主义建设总路线的指示","authors":[],"dates":[{"year":1958,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"中共河南省委员会关于大张旗鼓地宣传社会主义建设总路线的指示","type":"title"},{"text":"党的八大二次会议制定了鼓足干劲、力争上游、多快好省地建设社会主义的总路线，这条总路线，是我国八年来社会主义建设经验的总结，是马克思列宁主义的新发展，它正确地反映了我国人民的最大利益和迫切要求，也体现了我们党和我国劳动人民的伟大的革命气概。","type":"paragraph"},{"text":"为了使这条总路线迅速地在河南全省更广泛更深入的贯彻执行，把建设社会主义总路线的红旗插遍全省，各级党委必须结合八大二次会议精神的传达，大张旗鼓地开展一个广泛深入的宣传运动，使社会主义建设的总路线迅速地达到家喻户晓，深入人心，真正成为照耀全省一切工作的灯塔，促进社会主义建设事业全面跃进再跃进。为此，特作如下指示：","type":"paragraph"},{"text":"一、结合对八大二次会议精神的传达，组织区乡以上全体干部立即学习八大二次会议的文件，并将这些文件列为整风第四阶段学习的主要内容，结合学习文件，进一步检查批判各种形式的右倾保守思想，以提高全体干部鼓足干劲、力争上游、多快好省地建设社会主义总路线的思想自觉。在所有基层党组织中，要采取传达或上党课的办法，组织学习并宣传这条总路线。","type":"paragraph"},{"text":"二、在广大群众中，要大张旗鼓地开展这一宣传运动。各级党政负责干部和夏收夏种工作队的全体同志都要亲自给群众作报告，并迅速地把干部、党员和群众中的积极分子武装起来，组成千军万马的宣传队伍，进行广泛深入的宣传讲解，把社会主义建设总路线传达到每一个乡、社、工厂、矿山、街道、学校和商店，达到家喻户晓，深入人心。在作法上，要特别注意密切结合当前工作和生产，以总路线为武器，运用大鸣大放、大辩论、大字报的方法，检查总结工作，肯定成绩，推广先进经验，批判不利于实现总路线的各种思想倾向，修订跃进规划。在宣传中，要注意鼓励群众振作精神，解放思想，树立敢想、敢说、敢作、敢为的共产主义风格，开展群众性的技术革命和文化革命运动。","type":"paragraph"},{"text":"三、各级党委要充分运用报纸、广播、文化馆（站）、俱乐部、剧团等宣传工具和诗歌、快板、顺口溜、标语和壁画等生动活泼的宣传形式，开展这一宣传运动。河南日报编辑部编写的总路线讲话材料，各县报、市报都要转载。河南人民广播电台组织的总路线讲座，各广播站都要转播。各级报纸、广播电台和广播站，所有文化馆（站）、俱乐部都要制订专题计划，积极参加这一宣传运动。所有宣传队伍要充分运用各种宣传工具，深入田间、车间各个角落，开展一个千军万马的宣传运动，充分发挥广大群众的社会主义积极性、创造性，把建设社会主义总路线，变成广大群众的实际行动。","type":"paragraph"},{"text":"各地、市、县委接此指示后，要立即研究部署，加强领导，保证使这一宣传运动迅速地广泛地开展起来，并将运动中的情况和经验及时报告省委。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9333093afb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
