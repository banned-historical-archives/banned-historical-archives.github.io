美帝国主义和南修正主义者的挑拨阴谋遭到可耻失败","authors":[],"dates":[{"year":1960,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚报纸庆祝阿保友好条约签订十三周年"},{"type":"paragraph","text":"社会主义阵营越团结世界和平越有保障"},{"type":"paragraph","text":"美帝国主义和南修正主义者的挑拨阴谋遭到可耻失败"},{"type":"paragraph","text":"新华社地拉那17日电　阿尔巴尼亚《人民之声报》和《团结报》16日分别发表评论，庆祝阿尔巴尼亚和保加利亚友好互助合作条约签订十三周年（12月16日）。"},{"type":"paragraph","text":"《人民之声报》以《有利于社会主义和和平的兄弟友谊》为题发表评论说，阿保友好互助合作条约是我国人民同苏联人民、同社会主义阵营所有国家人民的共同友谊的不可分割的一部分，它并且加强了这种友谊。"},{"type":"paragraph","text":"评论说，阿尔巴尼亚人民体会到，并且有力地保护着同保加利亚人民的友谊和兄弟合作。因为这种友谊和合作是完全符合社会主义和和平的利益的。评论说，社会主义阵营各国人民愈团结，保障每个社会主义国家独立的保证就越有力，世界和平就越有保障。正因为如此，和平和社会主义的死敌——美帝国主义和它的忠实的代理人贝尔格莱德修正主义者的攻击锋芒首先是针对社会主义阵营各国的团结，他们过去和现在都在千方百计地削弱这种团结。但是，他们的阴谋诡计完全遭到了可耻的失败。阿保友谊发展了和巩固了。它过去和现在都是牢不可破的，它有利于我们两国人民，有利于和平和社会主义。"},{"type":"paragraph","text":"《团结报》的评论说，“我们两国都是社会主义阵营的一员、华沙条约的缔约国，我们都坚决为争取和平和国际安全、反对帝国主义者特别是美帝国主义者的战争策划而斗争。”"},{"type":"paragraph","text":"评论说，我们的友谊将在争取和平、争取社会主义、争取进一步加强社会主义阵营的团结、反对帝国主义和它的代理人现代修正主义，特别是美帝国主义的奴仆贝尔格莱德修正主义者的破坏活动的斗争中，得到不断的加强。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c49a2254b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
