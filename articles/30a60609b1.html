al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"关于二、四方面军迅速出至甘南致朱、张、任电","alias":"","parts":[{"type":"paragraph","text":"关于二、四方面军迅速出至甘南"},{"type":"paragraph","text":"致朱、张、任电川"},{"type":"paragraph","text":"（1936年7月22日）朱、张、任同志："},{"type":"paragraph","text":"（甲）目前陕甘宁为汤恩伯、杨虎城、高桂滋、高双成、张学良、何柱国、于学忠、马鸿逵各部共150余团，在蒋介石命令压迫之下，向我进攻。毛炳文全部、马步芳一部亦被我吸引到甘北附近，正图先击破我再阻止你们北上。"},{"type":"paragraph","text":"（乙）我们正动员全部红军并苏区人民粉碎敌人之进攻，迎接你们北上。"},{"type":"paragraph","text":"（丙）二、四方面军以迅速出至甘南为有利。待你们进至甘南适当地点，即令一方面军与你们配合南北夹击，消灭何柱国、毛炳文等部，取得三个方面军的完全会合，开展西北伟大的局面。"},{"type":"paragraph","text":"（丁）国际电台联络从6日起已畅通，望国焘兄将四方面军情形及意见电告，以便转达国际。"},{"type":"paragraph","text":"育英洛甫泽东恩来博古德怀"},{"type":"paragraph","text":"七月二十二日[1]这是毛泽东和林育英、洛甫（张闻天）、周恩来、博古（秦邦宪）、"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":7,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":530,"page_end":530},"tags":[{"name":"毛泽东","type":"人物"},{"name":"博古","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30a60609b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
