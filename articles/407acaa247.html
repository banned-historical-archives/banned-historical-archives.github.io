ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"给刘少奇、朱德、周恩来、任骗时、胡乔木的信","alias":"","parts":[{"type":"paragraph","text":"给刘少奇、朱德、周恩来、"},{"type":"paragraph","text":"任弼时、胡乔木的信"},{"type":"paragraph","text":"（1948年6月28日）刘、朱、周、任、乔木："},{"type":"paragraph","text":"起草了一个对中原局的复电，请审阅。如同意，请发出。中原局指示可以发给中原以外各中央局、分局、前委，惟须加上复电中增加之文句。此外，该指示中有些错字及缺字，凡文意清楚的可即加改正；凡文意不清楚的，须向中原局问明加以改正，然后发出。有了中原局这个文件，中央就不需要再发这类文件了。"},{"type":"paragraph","text":"毛泽东廿八日早我秦生已着为将水云多你示线月"},{"type":"paragraph","text":"你每我为#用位后"},{"type":"paragraph","text":"红弹不一样船的柔君诗害剧。为同志，清落去。中原马指不可以意给原以肌知快石，归，前素，作强上度电中终加之文尔：此斗，该指中有芳宝及缺学，凡交清楚的可节如政正风"},{"type":"paragraph","text":"生的，须起为中原局同所证丝必菱出"},{"type":"paragraph","text":"明东女明翠透狂费件10毛泽东致刘少奇、朱德、周恩来、任弼时、胡乔木信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":6,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":321,"page_end":322},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"407acaa247"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
