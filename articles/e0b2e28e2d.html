script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"放手开展敌后游击战争","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1938,"month":5,"day":4}],"parts":[{"text":"放手开展敌后游击战争","type":"title"},{"type":"appellation","text":"项英同志："},{"type":"paragraph","text":"在敌后进行游击战争虽有困难，但比在敌前同友军一道并受其指挥反会要好些，方便些，放手些。敌情方面虽较严重，但只要有广大群众，活动地区充分，注意指挥的机动灵活，也会能够克服这种困难。这是河北及山东方面的游击战争已经证明了的。在侦察部队出去若干天之后，主力就可准备跟行。在广德、苏州、镇江、南京、芜湖五区之间广大地区创造根据地，发动民众的抗日斗争，组织民众武装，发展新的游击队，是完全有希望的。在茅山根据地大体建立起来之后，还应准备分兵一部进入苏州、镇江、吴淞三角地区去，再分一部渡江进入江北地区。在一定条件下，平原也是能发展游击战争的，条件与内战时候很大不同。当然，无论何时应有谨慎的态度，具体的作战行动应在具体情况许可之下，这是不能忽视的。薛岳等的不怀好意，值得严重注意。但现时方针不在与他争若干的时间与若干里的防地，而在服从他的命令开到他指定的地方去，到达那里以后就有自己的自由了。尔后不要对他事事请示与事事报告，只要报告大体上的行动经过及打捷报给他。此外，请始终保持与叶同志的良好关系。以上请加以考虑。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月四日"}],"comment_pivots":[{"part_idx":1,"offset":2,"index":1},{"part_idx":2,"offset":321,"index":2},{"part_idx":2,"offset":436,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["项英（一八九八——一九四一），湖北武昌人。当时任中共中央军委新四军分会书记、新四军副军长。","薛岳，一八九六年生，广东乐昌人。当时任国民党军第十九集团军总司令兼第五军军长。","叶，指叶挺（一八九六——一九四六），广东惠阳人。当时任新四军军长。"],"page_start":140,"page_end":141,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0b2e28e2d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
