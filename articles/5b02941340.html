authors":[],"dates":[{"year":1964,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"缅《人民报》说各国人民不会接受修正主义政策"},{"type":"paragraph","text":"赫鲁晓夫分裂国际共运的算盘打错了"},{"type":"paragraph","text":"新华社仰光二日电　缅甸《人民报》今天发表文章指出，苏联共产党领导人已经下定决心要专断、单方面和非法地召开国际会议，要在国际共产主义运动中造成公开的分裂，把中国共产党和其他马克思列宁主义的兄弟党排挤出去。文章说：“赫鲁晓夫之流以为大多数兄弟党的领导人现在是站在他们一边，如果在这个时候召开兄弟党的国际会议，拥有多数的他们就能够把中国共产党和其他维护马克思列宁主义路线的兄弟党排挤出去，并公开宣布中国和其他兄弟党所奉行的路线是非法的。”文章接着指出：“如果他们确是这样盘算的话，那末赫鲁晓夫之流就错了。”文章说：“共产党的本来的意识形态是马克思列宁主义，那些硬要用修正主义来代替马克思列宁主义的人完全是在做白日梦。他们也许能够把奉行机会主义路线的兄弟党的某些领导人拉过去，但是工人阶级和人民非常懂得，只有进行斗争才能为自己赢得胜利，他们是不会接受修正主义的政策的。”"},{"type":"paragraph","text":"文章说：“现在是苏共领导人回到马克思列宁主义的正确道路上来的时候了。他们不应该顽固地坚持走他们的错误道路。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b02941340"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
