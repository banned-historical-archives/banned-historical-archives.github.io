:[{"year":1958,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级报纸承认"},{"type":"paragraph","text":"苏联在联大占了优势"},{"type":"paragraph","text":"据新华社15日讯　据塔斯社纽约14日讯：许多美国报纸在评论联大紧急会议13日会议的时候，竭力把美国总统的建议说成是“建设性”的。但是最清醒的评论家却看出了这些转移人们注意力的建议的真正用意。他们承认，在这些建议里没有任何保证尽快消除中东危机的东西。他们承认，把艾森豪威尔和葛罗米柯昨天的发言作一番比较，那无论如何都是对美国不利的。“华盛顿邮报和时代先驱报”评论员罗伯茨指出，在联合国各国代表团中间，苏联关于美英军队撤出中东的建议很受欢迎。"},{"type":"paragraph","text":"他写道，俄国人现在占了优势，一般说来，他们提出的提案是稳健的。他说，“美国并没有提出任何提案来。总统没有确切地说明，据他看来，联大应当做些什么来为撤军创造条件”。因此，他认为：“关于联合国大会应当做些什么这个问题的讨论，实质上将围绕着苏联的建议来进行。"},{"type":"paragraph","text":"“纽约先驱论坛报”的摩勒逊指出，美国总统在谈到为消除中东危机而必须立即采取的措施时，好像是“故意含糊其词”；而正是在这些问题上，“苏联外交部长却说得极其具体”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"295bf65bda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
