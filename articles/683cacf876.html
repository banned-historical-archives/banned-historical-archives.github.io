经验的介绍","authors":[],"dates":[{"year":1950,"month":3,"day":2}],"is_range_date":false,"parts":[{"text":"西南军区关于川东璧山、涪陵分区剿匪经验的介绍","type":"title"},{"text":"川东军区璧山、涪陵两军分区部份地区近在剿匪政攻方面获得一些经验，特介绍如下：","type":"paragraph"},{"text":"（一）璧山军分区XXX团一个连，初到綦江以北之接龙场时，群众因匪特造谣，均逃跑不见，该连进行了艰苦的政治争取工作，回去找寻群众开会，宣传我党政策；并以实际行动相影响，如替群众担水等，获得了群众的了解，许多土匪相继自首，交出枪枝（其中有四挺轻机枪）。尤其动人的是有一老太太送子自动投案，保证改过自新。","type":"paragraph"},{"text":"（二）涪陵军分区XXX团，在酆都西北之社坛场地区，多次召开群众大会，宣传我党政策，以后，陆续向我自首这大刀会达二百馀人之多。","type":"paragraph"}],"comments":[],"origin":"《西南工作》 第1期  中共中央西南局编印 （党内刊物发至县团） 1950年4月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"683cacf876"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
