art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席啊！我们白衣战士永远忠于您","authors":["高等军事学院卫生处学习毛主席著作积极分子全体代表"],"parts":[{"type":"paragraph","text":"霞光万道，东风浩荡。我们最最幸福、终身难忘的时刻终于来到了，我们心中最红的红太阳毛主席接见了我们。"},{"type":"paragraph","text":"毛主席啊，毛主席！在您亲自发动和领导的这场无产阶级文化大革命中，我们坚决响应您老人家“你们要关心国家大事，要把无产阶级文化大革命进行到底”的伟大号召，在两个阶级、两条道路、两条路线的激烈搏斗中，坚决、勇敢地捍卫了您的无产阶级革命路线，坚决落实您的最新指示，紧跟您老人家的伟大战略部署，去夺取无产阶级文化大革命的全面胜利。"},{"type":"paragraph","text":"毛主席啊，毛主席！我们重温了您老人家对医疗卫生工作的指示，狠批中国赫鲁晓夫及其代理人在医疗卫生工作上推行的修正主义路线。那些资产阶级老爷们从资本主义国家搬来和从现代修正主义那里抄来的一套所谓“医疗制度”、“保健制度”等等，是为复辟资本主义服务的。他们当官作老爷，大谈“养生之道”、“延年益寿”，大设“保健局”，花费大量的人力物力去搞那些所谓“高、深、难”的疾病，对广大劳动人民的多发病、常见病则根本不管。我们一定要遵照您的指示，彻底砸烂资本主义、修正主义的卫生医疗制度，把卫生系统办成红彤彤的毛泽东思想的大学校。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61f0c448d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
