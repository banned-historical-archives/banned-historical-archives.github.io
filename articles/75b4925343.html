教益","authors":[],"dates":[{"year":1967,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"被压迫人民坚决支持中国文化大革命"},{"type":"paragraph","text":"贝专纳人民党领导人说亚非人民从中国革命中受到很大教益"},{"type":"paragraph","text":"据新华社开罗电　贝专纳人民党总书记马鲁平和这个党的其他领导人高度赞扬伟大的毛泽东思想，热烈欢呼目前正在中国胜利进行的无产阶级文化大革命。"},{"type":"paragraph","text":"马鲁平在访问中国后回国途中对这里的新华社记者说，我们在中国访问期间，对中国无产阶级文化大革命作了实际观察，同红卫兵和其他方面的人进行了交谈，最后得出的结论是：“由毛主席亲自领导的这场无产阶级文化大革命，是世界革命史上从未有过的具有世界意义的伟大事件。它定将加强中国无产阶级专政，巩固中国的社会主义制度。它是防止资本主义复辟和在中国出现修正主义的最好的方法。毛主席发动这场文化革命，为被压迫人民的反帝斗争和世界革命的胜利作出了巨大贡献。”"},{"type":"paragraph","text":"马鲁平说：“帝国主义把重返中国的希望，寄托在中国青年一代会象苏联青年那样和平演变上面。但是他们的美梦被无产阶级文化大革命粉碎了。因此，他们十分害怕这场革命，恶毒地诅咒这场革命。”"},{"type":"paragraph","text":"马鲁平接着说：“正如毛主席所说的：‘凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对。’我们被压迫人民坚决支持中国的无产阶级文化革命，认为这场革命是世界人民革命事业胜利的希望。它告诉我们亚非人民，即使在我们获得独立之后，仍然应该警惕帝国主义通过意识形态的渗透卷土重来。我们亚非人民从中国的这一场革命中受到很大的教益。”"},{"type":"paragraph","text":"马鲁平强调说：“谁要想革命，谁就应该学习和运用伟大的毛泽东思想。毛泽东思想是同以美国为首的帝国主义和苏联现代修正主义进行斗争的最好的武器。这一点在越南人民反对美国侵略的斗争中已经得到了证明。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75b4925343"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
