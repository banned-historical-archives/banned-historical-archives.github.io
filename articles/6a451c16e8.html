script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b2b674a1-9042-4317-a7b8-de4267668ba5","name":"毛泽东思想万岁（1958.1-1960）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"对湖北省委报告麻城经验的批语","alias":"","parts":[{"type":"paragraph","text":"本无所谓群众路线。有鉴于此，尔后每年一定要召开两次五级或者六级、或者七级的干部大会，每次会期十天，上基层，夹攻中层，中层干部的错错观点才能改正，他们的僵死头脑才能松劲，他们才有可能进步，否则是毫无办法的。叫他们的话多了，我们也不同化，犯错误，情况不明，下情不能上达，上情不能下达，危险至极。每年这样的大会开两次，对于我们也极有益处，可以使我们明了情况，改正错误，这里说的是城市问题，农村问题同样如此。我在前次通讯中，已经大体说过了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五九年三月二十九日于北京对《陶××同志关于五杀干部"},{"type":"paragraph","text":"会的报告》的批示（节录）"},{"type":"paragraph","text":"一九五九年三月三十日"},{"type":"paragraph","text":"有些地方不是这样，他们怕鬼，不敢将郑州要点立刻一杆子通到生产队，生产小组和全民中去。他们无穷忧虑，怕天下大乱，不可收台。"},{"type":"paragraph","text":"这三条办法好。群众一到，魔鬼生消。本来没有鬼，只是在一些同志的大脑皮层里感觉有鬼，这个鬼的名字叫“怕群众”。"},{"type":"paragraph","text":"牢也罢，反动言论也罢，放出来就好。牢骚是一定要人家发的，当然发者无罪。反动言论放出来后，他们会立刻感觉孤立，他们自己会做批判。不批判也不要紧，群众的眼睛中已经照下了他们的羞象，跑不掉了；也可以实行言者无罪这一条规律。现在是一九五九年了，不是-一九五七年了。"},{"type":"paragraph","text":"旧帐不能不算这句话，是写到郑州讲话去了的，不对。应改做旧帐一般要算。算帐不能实行那个客观存在的价值法则。这个法则是一个伟大的学校，只有利用它，才有可能教会我们的几千万干部和几万万人民，才有可能建设我们的社会主义和共产主义。否则一切都不可能。对群众不能怨气。对干部，他们将被我们毁坏掉，有百害无一利。一个公社竟可以将原高级社的现金收入四百多万元退还原主，为什么别的社不可以退还呢？不要“善财难舍”。须知这是却财不是善财。无偿占有别人劳动是不许可的。"},{"type":"paragraph","text":"对湖北省委报告麻城经的批语"},{"type":"paragraph","text":"一九五九年四月三日"},{"type":"paragraph","text":"算帐才能团结，算帐才能帮助干部从食污浪费的海洋中拨出身来，一身干净；算帐才能数会干部学会经营管理方法；算帐才能教会五亿农民自已管理自已的公社，监督公社的各级干部只许办好事，不许办坏事，实现群众的监督，实现眞正的民主集中制。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":230,"page_end":230},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a451c16e8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
