script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江南造船厂、求新造船厂广大工人纷纷座谈讨论学先进　找差距　揭矛盾两个厂的革委会坚决支持工人革命行动，决心一起狠批修正主义企业路线","authors":[],"dates":[{"year":1970,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天下午，江南造船厂的革命工人看到了沪东造船厂铸工车间第二十二班红哨兵的革命大字报后，纷纷举行座谈会。许多工人同志说:沪东造船厂战友的革命大字报，说出了我们的心里话；江南造船厂在本市造船行业中，厂最大、历史最长、设备最全，可是，我们厂在抓革命、促生产等方面都远远落在其他兄弟厂的后面。他们越谈越有劲，并积极行动起来，学先进，找差距，揭矛盾。有个工段的革命工人贴出了《江南厂怎么办?》的革命大字报。大字报尖锐地指出:"},{"type":"paragraph","text":"几年来江南厂落在兄弟单位的后头，关键在于领导。你们究竟在想些什么?如果你们没有什么办法，为什么不到群众中来走走?!上海船厂小船台造出了大轮船，而我们的万吨船台在发挥什么作用?沪东造船厂战友的革命大字报已经在你们身上猛击了一掌，你们应该认清形势，急起直追，带领群众，为发展祖国的造船事业，狠狠打击帝、修、反打几个硬仗!"},{"type":"paragraph","text":"广大革命工人决心深入开展经济领域的革命大批判，狠批修正主义办企业路线，把厂里的革命、生产等各项工作大大向前推进一步。"},{"type":"paragraph","text":"该厂革委会连夜在厂门口贴出了一张题为《揭露矛盾，找出差距》的大字报，决心在解放军支左人员的帮助下，与群众站在一起，揭露厂里的矛盾，开展革命大批判，掀起一个比学赶帮超的群众运动，迅速改变落后面貌。厂革委会的大字报说:"},{"type":"paragraph","text":"沪东造船厂铸工车间工人的革命大字报，不仅十分鲜明、十分尖锐地揭露了沪东造船厂的矛盾，也击中了我们江南造船厂革委会领导思想上的要害。"},{"type":"paragraph","text":"学习了沪东造船厂工人的革命大字报和报纸上的评论员文章，深深地感到，在我们的头脑里存在着严重的右倾保守思想，不尊重群众的首创精神，不支持群众的合理化建议，有时甚至泼冷水，顶回去，使广大革命群众的革命积极性受到了很大的挫折。为了彻底改变江南造船厂的面貌，欢迎全厂革命工人和干部，大胆揭露厂内存在的问题，特别是厂革委会领导中存在的问题，联系实际，开展革命大批判。"},{"type":"paragraph","text":"本报讯　上海求新造船厂柴油机车间革命工人，看到报上发表的沪东造船厂铸工车间工人的革命大字报后，受到极大的鼓舞。他们立即组织学习和讨论，工人们说，这张革命大字报的发表很好，它吹响了本市工交战线进一步开展经济领域的革命大批判的进军号，它号召我们革命工人要又痛又痒地揭露厂里存在的矛盾，只有揭露矛盾，才能解决矛盾。"},{"type":"paragraph","text":"许多工人老师傅联系本厂在制造三五○柴油机中存在的问题，向厂领导提出了批评。有个工人老师傅说:“工人的干劲很足，领导迟迟不动，我看领导就是有点吃老本，躺在‘一○一’破冰船的功劳簿上睡大觉。”工人们一面讨论，一面写了一张革命的大字报，送到厂革委会去。大字报说，我们革命加拼命，决心在年底造出三五○柴油机，你们打算怎么办?"},{"type":"paragraph","text":"柴油机车间工人的革命大字报有力地促进了厂革委会领导，他们马上召开了厂革委会紧急会议，并作出了四点决定，还贴出了一张大字报，表示坚决支持工人们的革命行动，决心和全厂革命工人一起，深入开展经济领域的革命大批判，揭露厂里存在的矛盾，解决矛盾。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3acb0e7674"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
