康世焜","成都工学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——关于“肃反”","type":"title"},{"text":"成都工学院康世焜","type":"authors"},{"text":"历次运动后，使人与人间空气紧张，大家不敢多交谈，造成每人之间有一条沟，每人都好象被隔离开了，且用个什么东西罩起来了一样，完全打破了人情关系。特别是在肃反中这种气氛更为严重，好些“纪律”使得连好朋友都不敢说一句话，进出口门要搜身，比反动统治时期都还凶。之所以能够随便玩法，原因是我国解放几年一直没有重视法制的建立，在人民群众中引起恐怖思想，究竟还要人民相信党吗？在肃反中随便可以分析别人的谈话。但对方也应有发言权。如真正是反革命分子，大义灭亲都可以。但是被斗争的大多数并非反革命，这就必然影响人民情绪、工作……。以上这些都是领导可以玩法，问题在于法制不全。","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选辑3》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13f62340ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
