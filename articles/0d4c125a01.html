tart":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"誓同“四人帮”反党集团斗争到底","authors":[],"parts":[{"type":"paragraph","text":"华国锋同志任中共中央主席、中央军委主席和以华国锋主席为首的党中央继承毛主席遗志，代表全党全军全国人民的根本利益和共同心愿，一举粉碎“四人帮”篡党夺权阴谋的特大喜讯相继传来，我们全连干部战士群情振奋，欢欣鼓舞。我们热烈庆祝华国锋同志任中共中央主席和中央军委主席，愤怒声讨王洪文、张春桥、江青、姚文元反党集团的反革命罪行。"},{"type":"paragraph","text":"王洪文、张春桥、江青、姚文元反党集团罪行累累，罄竹难书。他们不听毛主席的话，肆意篡改马克思主义、列宁主义、毛泽东思想，反对毛主席的革命路线，反对毛主席的“三要三不要”的基本原则，结成“四人帮”，大搞修正主义，大搞阴谋诡计，进行分裂党、篡党夺权的罪恶活动。“四人帮”是党内资产阶级的典型代表，是不肯改悔的正在走的走资派。伟大的领袖和导师毛主席洞察一切，早就识破了“四人帮”的罪恶阴谋，为我们今天的胜利作了运筹规划。以华国锋主席为首的党中央，忠诚地继承毛主席的遗志，代表全党全军和全国各族人民的根本利益和共同愿望，及时地、果断地解决了伟大的领袖和导师毛主席生前要解决而没有来得及解决的重大问题，为全党、全军、全国各族人民擒了妖魔，除了四害，实在是太好了，好极了！它再一次证明以华国锋主席为首的党中央和全国人民心连着心！"},{"type":"paragraph","text":"粉碎王张江姚反党集团篡党夺权的阴谋，这是毛主席关于无产阶级专政下继续革命的伟大理论的一次伟大实践，是无产阶级文化大革命的伟大胜利，是毛泽东思想的伟大胜利！事实雄辩地表明：我们党不愧为毛主席亲自缔造、锻炼和培育的党，不愧为政治上成熟的马克思列宁主义政党，不愧为伟大的、光荣的、正确的党。要搞垮我们这个党是不容易的。谁要阴谋分裂我们的党，是绝没有好下场的。"},{"type":"paragraph","text":"我们全连干部战士决心最紧密地团结在以华国锋主席为首的党中央周围，一切行动听党中央的指挥，坚决投入到这场关系到党变不变修、国变不变色的伟大斗争中去，同王张江姚反党集团斗争到底。我们热烈响应党中央的号召，掀起学习马列著作和毛主席著作的新高潮。要继续批邓、反击右倾翻案风。要抓革命，促战备，努力加强部队的革命化、战斗化建设。我们是伟大的领袖和导师毛主席亲自缔造和培育的人民军队，毛泽东思想和毛主席的无产阶级革命路线深深扎根在我们心中。我们永远忠于党、忠于人民，一定担负起对内反复辟、对外反侵略的重任，永远沿着毛主席的无产阶级革命路线胜利前进！"},{"type":"paragraph","text":"装甲兵技术学校教练大队坦克一连"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d4c125a01"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
