:["陈云"],"dates":[{"year":1977,"month":3,"day":17}],"is_range_date":false,"parts":[{"text":"陈云在中央工作会议上的书面发言","type":"title"},{"text":"陈云","type":"authors"},{"text":"摘要：","type":"paragraph"},{"text":"粉碎“四人帮”反革命集团，这是我们党的一个伟大胜利，对中国革命具有伟大的历史意义。","type":"paragraph"},{"text":"我对天安门事件的看法：","type":"paragraph"},{"text":"（一）当时绝大多数群众是为了悼念周总理。","type":"paragraph"},{"text":"（二）尤其关心周恩来同志逝世后党的接班人是谁。","type":"paragraph"},{"text":"（三）至于混在群众中的坏人是极少数。","type":"paragraph"},{"text":"（四）需要查一查“四人帮”是否插手，是否有诡计。","type":"paragraph"},{"text":"因为天安门事件是群众关心的事，而且当时在全国也有类似事件。","type":"paragraph"},{"text":"邓小平同志与天安门事件是无关的。为了中国革命和中国共产党的需要，听说中央有些同志提出让邓小平同志重新参加党中央的领导工作，是完全正确、完全必要的，我完全拥护。","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈云","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3d6da354d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
