ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于动员党内外一切力量制止刺共降日的指示","alias":"","parts":[{"type":"paragraph","text":"关于动员党内外一切力量"},{"type":"paragraph","text":"制止剿共降日的指示"},{"type":"paragraph","text":"（1940年11月6日）克农、项英、董老，并告恩来并转告各方："},{"type":"paragraph","text":"目前日、德与亲日、亲德派包围蒋，压迫蒋发动反共战争，投降日寇，我们应向国民党人员及各方奔走呼号，痛切陈词，说明剿共则亡党亡国，投降则日寇必使蒋崩溃，有百害无一利。应动员党内外多数人员出马作上述积极、热烈的活动。说话时不要骂蒋骂国民党，只骂亲日派，要求大家注意自己的存亡问题。我们共产党爱护蒋、爱护抗战与团结，只要不剿共、不投降，等到因剿共、投降而闹到亡党亡国之时，我们就爱莫能助了。要告诉党员与一切抗日人员，只要大家团结与积极活动，制止剿共、投降还有可能性，还来得及，还有这种时间。各地情形望告中央为盼。"},{"type":"paragraph","text":"毛泽东鱼辰"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":200,"page_end":200},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"744e62432c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
