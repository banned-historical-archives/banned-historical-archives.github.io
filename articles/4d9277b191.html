script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"现代修正主义者决不会“勾销”错误铁托再次否认放弃投靠帝国主义政策恶毒污蔑中国“贩卖战争”　确信赫肯通信出现“晴朗化迹象”","authors":[],"dates":[{"year":1963,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京26日电】　贝尔格莱德消息:南斯拉夫总统铁托1月23日在南斯拉夫人民青年联盟代表大会上的讲话中，再次否认南斯拉夫修正主义集团将放弃它的投靠帝国主义的对外政策。他并且大肆污蔑中国奉行“贩卖战争”的政策。"},{"type":"paragraph","text":"据南斯拉夫通讯社报道，铁托在讲话中说:西方某些人猜测说，南斯拉夫由于同苏联和其他社会主义国家的关系改善了，因此现在会放弃同美国和其他西方国家保持良好关系的政策；这种猜测是“完全荒谬的”，“是错误地估价我国对外政策所体现的原则”。他声称，“我们不仅不会放弃这样的政策，而且，就我们而言，我们将努力继续保持这样的政策。”"},{"type":"paragraph","text":"铁托在讲话中恶意地曲解中国共产党关于战争与和平问题的马克思列宁主义观点，污蔑中国以马克思和列宁的名字来掩饰所谓“贩卖战争的政策”，“想把整个世界推入深渊”。他说，“如果那样，亿万人将遭毁灭，人类千百年来以巨大代价所创造的人类的成就将要毁灭，而对于这些，他们毫不在乎。”"},{"type":"paragraph","text":"铁托恶毒地污蔑中国奉行“一种成吉思汗政策”，“是对世界和平的一个巨大危险”。"},{"type":"paragraph","text":"铁托表示他确信，苏联部长会议主席赫鲁晓夫同美国总统肯尼迪最近就核试验问题进行的通信中所使用的友好语调以及赫鲁晓夫在柏林等问题上的最近讲话，是“现在政治地平线上出现了越来越明显可见的晴朗化迹象”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d9277b191"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
