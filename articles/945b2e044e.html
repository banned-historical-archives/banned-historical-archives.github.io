s":["新华社"],"dates":[{"year":1958,"month":3,"day":14}],"is_range_date":false,"parts":[{"text":"各地天主教徒经过大鸣大争得出结论","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社１４日讯全国已有二十六个盛市、自治区在最近先后召开了天主教徒代表会、学习会或座谈会，进行社会主义学习和传达去年７月间召开的中国天主教代表会议的决议。","type":"paragraph"},{"text":"各地会议都是采取大鸣大放、大字报、大争大辩的方式，摆事实讲道理，充分发扬了民主。他们在会上发言中都表示坚决拥护中国共产党的领导，走社会主义道路，坚决独立自主自办教会。沈阳总主教区总主教皮漱石、四川省万县主教段荫明、陕西省盩庢教区主教李伯渔、湖南省常德教区代主教杨高坚等都在各地的会议上指出：天主教徒必须发扬民族自尊心，彻底摆脱帝国主义的控制，坚决反对梵蒂冈的干涉，依靠中国天主教友的力量，独立自主地办好中国天主教会。","type":"paragraph"},{"text":"在各地举行的会议上，少数隐藏在天主教内的右派分子向共产党、向社会主义作了许多恶毒的进攻。河北省保定教区主教范学淹疯狂地叫嚣驱逐帝国主义分子“有罪”，并污蔑人民政府“口是心非”、工农联盟是“狼狈关系”；吉林省四平教区代主教常镇国公然主张“决不能与人民政府合作”，并且还以“跪下祈祷，起来战斗”的反动口号，煽动教徒同人民政府进行“战斗”。这些右派分子还奴颜婢膝地为梵蒂冈的反动政治面目辩护。","type":"paragraph"},{"text":"参加会议的人对右派分子的猖狂进攻极为愤慨。他们列举事实，对右派分子的反动言行进行了有力的驳斥，并且广泛地揭发了梵蒂冈的反动罪行。他们指出，梵蒂冈不但在解放前一贯敌视中国人民，利用天主教为美帝国主义的殖民主义服务。解放几年来，梵蒂冈还不断地破坏中国天主教徒的反帝爱国运动，挑拨中国天主教徒与全国人民的团结，干涉我国内政，直到现在，中国天主教的许多教区仍由已被中国人民驱逐出境的帝国主义分子霸占着主教的名义。爱国天主教徒绝对不能容忍梵蒂冈的这些罪行。","type":"paragraph"},{"text":"---- 原载《人民日报》1958年3月15日，原题为：“憎帝国主义干涉  爱社会主义祖国  中国天主教会坚决独立自主  各地天主教徒经过大鸣大争得出结论”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"945b2e044e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
