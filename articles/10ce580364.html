" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"在华南分局关于新三反给所属的指示上的批语","alias":"","parts":[{"type":"paragraph","text":"在华南分局关于新三反给所属的指示上的批语"},{"type":"paragraph","text":"（1953年3月15日）饶漱石、安子文同志："},{"type":"paragraph","text":"最近有许多关于新三反的文件，文尾多有希望中央指示的话，均请你们予以批复。有些重要的文件，可在中组部的党内刊物上发表，有些则可在人民日报发表（如已付给你看的山东分局及胶州地委的文件）。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十五日此件\"写得很好。"},{"type":"paragraph","text":"[1]指中共中央华南分局1953年2月23日关于新三反给所属并报中南局、中央的指示。指示分析了广东地区存在的官僚主义、命令主义和违法乱纪情况，对华南地区的新三反作了如下布置：（一）必须以反对领导机关的官僚主义为重点，首先从分局、省、广州市反起，遂步推到行署以下。要学习有关文件，有重点地进行检查，并将检查过去与改进今后工作密切结合。（二）由省到县应立即从处理人民来信入手，处理典型事件，并迅速加强政府监察和党的纪检部门的干部，组织力量，集中揭发，造成浓厚的空气。（三）县级以下必须结合当前工作进行。（四）要区别问题性质，切忌简单粗暴。对过去因执行政策有偏差而处理错误的问题，需予纠正，但不能把这些偏差与命令主义和违法乱纪混为一谈。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":72,"page_end":72},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10ce580364"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
