script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"维护生活权利　反对残酷剥削　资本主义世界罢工斗争风起云涌","authors":[],"dates":[{"year":1959,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"维护生活权利　反对残酷剥削"},{"type":"paragraph","text":"资本主义世界罢工斗争风起云涌"},{"type":"paragraph","text":"要求增加工资和缩短劳动日"},{"type":"paragraph","text":"意大利一百万冶金工人罢工"},{"type":"paragraph","text":"新华社17日讯　据塔斯社罗马16日讯：意大利一百万冶金和机器制造工人在16日举行了二十四小时的罢工，这次罢工是意大利劳动人民最近几年来最大的罢工之一。罢工者要求在劳资双方新的集体合同中，规定提高工人工资7％到9％，在工资不减少的条件下缩短劳动日和增加休假日等。"},{"type":"paragraph","text":"意大利三个最大的工会——意大利总工会、意大利劳动人民工会联合会和意大利劳工联盟在这一罢工中采取了一致行动。"},{"type":"paragraph","text":"要求改善工作合同"},{"type":"paragraph","text":"美国橡胶工人坚持罢工斗争"},{"type":"paragraph","text":"新华社讯　塔斯社纽约11日讯：根据美国劳工部公布的初步材料，今年2月美国工会进行了三百次罢工。共计有十四万工人参加了罢工，比一年以前增加了一倍。"},{"type":"paragraph","text":"最大的和坚持最久的罢工是“玻璃板公司”玻璃工厂和“艾利斯·查默斯制造公司”农业机器工厂，以及纽约面包师的罢工。"},{"type":"paragraph","text":"本报讯　纽约消息：美国橡胶工业工人，为了支持在新的工作合同中对增加的养老金、劳动保险和附加福利措施的要求，而举行的罢工已坚持了一周，而且罢工人数不断增加，至16日已有五万八千名工人离开了工作。参加罢工的包括属于美国橡胶公司、费尔斯通公司和固特立公司三家大公司的工人。"},{"type":"paragraph","text":"关于增加工资的谈判破裂"},{"type":"paragraph","text":"玻利维亚石油工人停止工作"},{"type":"paragraph","text":"本报讯　拉巴斯消息：玻利维亚国营石油公司约七千名工人16日举行罢工，使全国石油的生产处于瘫痪。这次罢工是由于关于增加工资的谈判决裂而引起的。"},{"type":"paragraph","text":"生活贫困激起斗争浪潮"},{"type":"paragraph","text":"阿根廷各行业工人连续罢工"},{"type":"paragraph","text":"新华社讯　布宜诺斯艾利斯消息：由于物价不断上涨以及劳动人民的生活日趋贫困，阿根廷许多行业的工人最近连续不断地举行了罢工，要求政府增加工资。"},{"type":"paragraph","text":"在3月底已经举行了五天罢工的全国银行和保险公司的职工，14日又举行了二十四小时罢工，接着在15日宣布无限期总罢工。罢工者强烈抗议警察逮捕十七名工会领袖和职工和对这两个工会的占领。他们要求增加工资一千五百比索。"},{"type":"paragraph","text":"在罗萨利俄市，这个市政机关职工的罢工到14日已经进入第三十三天。他们在街上举行了几次示威游行，要求增加工资。从4月11日开始的阿维杨内达市政机关职工的罢工将无限期地继续下去。"},{"type":"paragraph","text":"在科尔多瓦省，美国企业凯塞汽车工厂三千名工人的罢工已经继续了将近三个星期。这个汽车厂工人的罢工得到全国各汽车厂机械工人的声援。"},{"type":"paragraph","text":"最近几个月来曾经进行多次罢工的布宜诺斯艾利斯码头工人又在13日举行了二十四小时的罢工。他们要求提高工资，反对政府干涉工会权利的法令。消息说，为了抗议政府继续干涉工会事务，纺织工人工会最近宣布要从17日起每天罢工一小时，以后逐日增加罢工一小时，直到政府满足他们的要求为止。"},{"type":"paragraph","text":"据报道，尽管阿根廷政府从今年1月中旬就宣布一切罢工为非法，并且对罢工的工人采取了各种镇压手段，但是这一切措施都没能够阻止工人的罢工斗争。"},{"type":"paragraph","text":"资方被迫答应提高工资"},{"type":"paragraph","text":"日本横滨造船工人斗争胜利"},{"type":"paragraph","text":"新华社讯　东京消息：全日本造船工会所属的三菱日本重工业公司横滨造船所工会的工人在迫使资方答应提高工资九百日元以后，在11日停止罢工。"},{"type":"paragraph","text":"这个工会的工人为了要求提高工资，从4日起就开始了罢工。"},{"type":"paragraph","text":"要求规定最低工资"},{"type":"paragraph","text":"巴西一万六千铁路工人罢工"},{"type":"paragraph","text":"新华社讯　圣保罗消息：巴西圣保罗州一万六千名铁路工人在14日举行了罢工，罢工者要求规定最低工资为每月五千八百克鲁赛罗。这次罢工使巴西这个内地重要的工农业省份的大部分铁路交通陷于停顿。"},{"type":"paragraph","text":"巴西当局已经派出警察来镇压罢工工人。消息说，巴西第二军和州的数千名后备兵在政府的命令下已经处在“戒备状态”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66ce426325"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
