ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"中原部队须求自救之道与准备突围叫","alias":"","parts":[{"type":"paragraph","text":"中原部队须求自救之道与准备突围！"},{"type":"paragraph","text":"（1946年6月1日）郑、李、王："},{"type":"paragraph","text":"（一）美蒋对我极为恶劣，全面内战不可避免。要求美机运款接济你们，恐已希望甚小。你们须求自救之道，如一方面节省用费留出准备突围时费用；另方面麦子已熟，向民众征收粮税。（二）必须准备对付敌人袭击及突围作战，预拟突围后集中行动及分散行动两个计划。大概在突围及突围后一个时期内，以全军集中行动为有利；而在敌人追剿紧急，行军给养均极困难时，便应分为两股或三股，各自独立行动，可以避免集中行动之困难，而利于分别牵制敌人与互相作战略上之策应。（三）目前时机紧迫，你们应充分注意，并团结内部，准备艰苦斗争。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"已东[1]这是毛泽东为中共中央起草的给中原军区政治委员郑位三、司令员"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":363},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7e99606c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
