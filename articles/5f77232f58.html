rs":["江青"],"dates":[{"year":1966,"month":12,"day":13}],"is_range_date":false,"parts":[{"text":"江青接见向《红旗》杂志贺喜群众的讲话","type":"title"},{"text":"江青","type":"authors"},{"text":"〖地点：中南海西门。〗","type":"appellation"},{"text":"同志们、革命小将们：","type":"appellation"},{"text":"你们好！我已经睡觉了，吃了安眠药，听说你们来了，还是来看看你们。你们的造反精神好得很，你们是我们的革命战友，你们是我们的革命小将，我们和你们心连心，要坚决打倒一小撮走资本主义道路的、反动的那么一小撮人。无产阶级专政万岁！没有无产阶级（专政──编者加）就没有大民主！你们都是毛主席的好学生，我和革命小将一道干革命，和反革命修正主义分子斗到底！对不对？（群众答：对！）我们和你们在一起，不要怕！我已经吃过安眠药了，今天同志们、革命小将们来，我还是来看一看。","type":"paragraph"},{"text":"向资产阶级反动路线猛烈开火，我们不把无产阶级文化大革命进行到底，我们不分离，我们在一块儿。你们说是不是这样？（群众：是！）“革命不是请客吃饭，不是作文章，不是绘画绣花……”我背不好，背不全。是我们一定要不怕牺牲，排除万难，向资产阶级反动路线猛烈开火。毛主席非常爱护你们，关心你们，这一点我想革命小将是会懂得的，我们心连心。我吃过安眠药了！我说得不一定对，我来看看同志们。（群众请江青同志回去休息）","type":"paragraph"}],"comments":[],"origin":"来源：一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（4）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"type":"文稿类型","name":"发言"}]},{"id":"jqjianghua","type":"pdf","name":"江青十年讲话汇编","internal":false,"official":false,"author":"江青，本世纪初国内老左编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/jqjianghua.pdf"],"article":{"title":"江青接见向《红旗》杂志贺喜群众的讲话","description":"","dates":[{"year":1966,"month":12,"day":13}],"parts":[{"text":"江青接见向《红旗》杂志贺喜群众的讲话","type":"title"},{"type":"paragraph","text":"〖地点：中南海西门。〗"},{"type":"appellation","text":"同志们、革命小将们："},{"type":"paragraph","text":"你们好！我已经睡觉了，吃了安眠药，听说你们来了，还是来看看你们。你们的造反精神好得很，你们是我们的革命战友，你们是我们的革命小将，我们和你们心连心，要坚决打倒一小撮走资本主义道路的、反动的那么一小撮人。无产阶级专政万岁！没有无产阶级（专政──编者加）就没有大民主！你们都是毛主席的好学生，我和革命小将一道干革命，和反革命修正主义分子斗到底！对不对？（群众答：对！）我们和你们在一起，不要怕！我已经吃过安眠药了，今天同志们、革命小将们来，我还是来看一看。"},{"type":"paragraph","text":"向资产阶级反动路线猛烈开火，我们不把无产阶级文化大革命进行到底，我们不分离，我们在一块儿。你们说是不是这样？（群众：是！）“革命不是请客吃饭，不是作文章，不是绘画绣花......”我背不好，背不全。是我们一定要不怕牺牲，排除万难，向资产阶级反动路线猛烈开火。毛主席非常爱护你们，关心你们，这一点我想革命小将是会懂得的，我们心连心。我吃过安眠药了！我说得不一定对，我来看看同志们。（群众请江青同志回去休息）"}],"comment_pivots":[],"is_range_date":fals
