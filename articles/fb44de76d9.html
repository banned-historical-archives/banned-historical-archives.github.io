<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反剥削　反迫害  资本主义国家工人罢工斗争连绵不断","authors":[],"dates":[{"year":1969,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反剥削　反迫害"},{"type":"paragraph","text":"资本主义国家工人罢工斗争连绵不断"},{"type":"paragraph","text":"法国三万名铁路工人坚持罢工"},{"type":"paragraph","text":"法国三万名铁路司机和司炉十五日晚上开始举行罢工，要求增加工资。"},{"type":"paragraph","text":"罢工的铁路工人是在法国巴黎—西南铁路区工作的，这个铁路区占法国全国铁路四分之一以上。罢工使从巴黎到波尔多地区，到图鲁兹地区和到西班牙边境去的铁路交通受到很大影响。十六日，这个铁路区的三万名工人仍在坚持罢工斗争。"},{"type":"paragraph","text":"意大利普拉托地区纺织工人大罢工"},{"type":"paragraph","text":"意大利中部普拉托地区的纺织工人十八日举行大罢工，抗议当局出动警察镇压工人运动。"},{"type":"paragraph","text":"这次大罢工的直接起因，是反动当局派遣大批警察闯进一个已被工人占领了一星期的工厂，并使用武力强迫工人离厂。反动当局的法西斯行径激起了普拉托地区纺织工人的极大愤慨，他们决定举行大罢工，表示声援这个工厂工人的斗争。"},{"type":"paragraph","text":"这次大罢工使意大利这个纺织业中心完全陷于瘫痪状态。罢工工人在十八日下午还举行了声势浩大的示威游行。"},{"type":"paragraph","text":"普拉托纺织工人的斗争获得了当地学生和市民广泛的同情和支持。学生们在十八日上午为此举行了示威游行。他们在游行时高举着许多标语牌和横幅，上面写着支持工人阶级的正义斗争和号召加强工人和学生之间的团结的口号。"},{"type":"paragraph","text":"日本国营铁路工人举行罢工"},{"type":"paragraph","text":"日本国营铁路工人从十八日清晨起在全国各地举行三小时罢工，反对佐藤反动政府准备急剧增加火车票价和进一步加强对工人的剥削。"},{"type":"paragraph","text":"佐藤反动政府计划把国营铁路的票价猛增百分之十五，同时对铁路工人实行增加劳动强度的所谓“合理化计划”，企图使日本的国营铁路进一步为美日反动派的统治服务。"},{"type":"paragraph","text":"十八日，东京市区和郊区列车上的工人全部罢工，迫使六百次列车停驶。东京周围的铁路交通陷入严重混乱。"},{"type":"paragraph","text":"为了支援东京地区铁路工人的罢工，其他方面的产业工人在十七日夜里聚集在各个车站上，准备对付佐藤反动政府的暴力镇压。"},{"type":"paragraph","text":"十八日清晨，佐藤政府果然向几个地方派出武装警察，镇压铁路工人的罢工。工人们在列车前面布置了纠察队，同警察进行英勇的搏斗。他们还在车厢外面张贴许多标语，上面写着：“粉碎日美‘安全条约’！”“收复冲绳！”表示要同美日反动派斗争到底的坚强意志。"},{"type":"paragraph","text":"塞浦路斯港口工人举行总罢工"},{"type":"paragraph","text":"罢工浪潮席卷地中海上的岛国塞浦路斯。塞浦路斯的港口工人十三日举行总罢工，反对垄断资本的残酷剥削，要求增加工资。这是他们在一个月之内举行的第二次罢工。这次罢工使塞浦路斯的所有港口陷于瘫痪状态。"},{"type":"paragraph","text":"塞浦路斯航空公司的职工从十五日起举行无限期罢工，抗议资本家顽固拒绝工人提高工资的要求。在这之前，工人们已经举行过两次二十四小时的“警告性罢工”。工人们十四日愤怒地宣告，他们决心坚持罢工斗争，直到资本家接受他们提出的要求为止。由于罢工，塞浦路斯航空公司已被迫取消所有班机的飞行。"},{"type":"paragraph","text":"（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb44de76d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
