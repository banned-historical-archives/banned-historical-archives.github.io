半数矿工参加斗争，给垄断资本以沉重打击","authors":[],"dates":[{"year":1970,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削　识破煤矿当局欺骗花招"},{"type":"paragraph","text":"英国十二万五千煤矿工人大罢工"},{"type":"paragraph","text":"全国近半数矿工参加斗争，给垄断资本以沉重打击"},{"type":"paragraph","text":"新华社伦敦九日电  英国煤矿工人为反对垄断资本残酷剥削、要求增加工资而举行的罢工斗争正在迅猛发展。从十月二十六日开始的煤矿工人大罢工，目前已扩大到了全国各主要产煤区。到九日为止，占全国煤矿工人近半数的十二万五千名矿工参加了这一斗争。"},{"type":"paragraph","text":"煤矿工人为举行这次全国性的大罢工曾经作了长时间的酝酿和准备。煤业局及其代理人曾在十月中旬策划所谓“投票表决”的花招，妄想破坏这次罢工。但是越来越多的矿工识破了他们的欺骗勾当，纷纷投入斗争。九日，煤业局又对罢工工人进行种种威胁、恫吓，矿工工会的一些头目也诱骗工人“复工”。但是煤矿工人不理睬这些恫吓和欺骗，纷纷走出矿井，使罢工的矿工人数比上周猛增二倍。"},{"type":"paragraph","text":"南威尔士的五十一个矿井的三万八千名矿工九日几乎全部参加了罢工。这是一九二六年以来南威尔士煤田规模最大的一次罢工。"},{"type":"paragraph","text":"在约克郡煤田，已有四万八千名矿工参加了罢工，使四十四个矿井完全关闭，五个矿井部分停止生产。大批罢工的矿工九日在约克郡的巴恩斯利举行集会。他们在会上愤怒谴责垄断资本残酷剥削工人的罪恶行径。"},{"type":"paragraph","text":"在苏格兰煤田，大约有二万一千名矿工九日再次举行罢工。在德比、肯特、达勒姆和斯塔福德的许多矿井，也有数以千计的矿工举行罢工和拒绝加班加点。"},{"type":"paragraph","text":"煤矿工人的斗争给英国垄断资本以沉重的打击。自矿工罢工以来，煤产量已减少将近一百万吨，钢铁、电力、煤气等使用煤的工业也面临着减产的前景。英国垄断资本的喉舌《金融时报》惊呼，由于煤矿工人罢工，“发生燃料危机的可能性越来越大了”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2eb9e13d91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
