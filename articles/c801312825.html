art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以实际行动反击右倾翻案风","authors":[],"parts":[{"type":"paragraph","text":"“咱队的马治好了！”“咱队的马回来了！”社员们奔走相告，纷纷来到马厩前。就在这时，大队党支部书记王军树领来一位解放军同志。他说：“社员同志们，这就是给咱们队治好伤马的工农兵大学生、军马所医助詹必成同志！”这一介绍，立刻响起了热烈的掌声。"},{"type":"paragraph","text":"事情经过原来是这样的："},{"type":"paragraph","text":"一天傍晚，八一二八一部队军马所医助詹必成正和战友们在一起学习。这时，有一、二十个社员架着一匹伤马，来到军马所求治。詹必成仔细一看，只见那马两眼半闭，四腿伸直，呼吸困难，处于半休克状态。经过了解，原来这马是龙风公社石门子大队中心生产队的。前些日子，他们去县城拉材料，翻了车，马被压伤，有人认为：“这马不行了，即使治好了也是个残废。”社员们焦急万分，架着这匹马走了四十多里路来到军马所求治。了解到这段经过，詹必成深深为贫下中农爱马、爱集体的精神所感动。他觉得面临的是一场考验，党内不肯改悔的走资派攻击我们的“教育质量低”，咱们应该用实际行动反击这股右倾翻案风，为毛主席的革命路线争气。他得到部队领导的支持，立即把马收下了。"},{"type":"paragraph","text":"一场抢救伤马的战斗开始了。詹必成仔细进行了检查诊断，根据马的伤情，首先给马解除半休克状态，接着给马整骨矫正。……经过两天的紧张抢救，使这匹伤马脱离了危险。经过一段时间精心治疗，终于使这匹伤马恢复了健康。"},{"type":"paragraph","text":"（本报通讯员）"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c801312825"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
