{"year":1968,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"动员起来，向无政府主义开火"},{"type":"paragraph","text":"我们工厂围剿无政府主义已经取得了很大胜利。但是，在这场斗争中，也有少数人采取了等待的态度，说：忙什么！等人家都克服了无政府主义，我们这里也就好了。也有人说：我们单位领导上还没有动，我们急什么！因此，在这些单位，无政府主义倾向仍然畅通无阻！"},{"type":"paragraph","text":"不能再这样等下去了！这些同志可曾想到，在你等的时候，阶级敌人一时一刻也没有睡觉。无政府主义配合着资产阶级、小资产阶级派性，时时刻刻都在腐蚀着革命同志的灵魂，阻碍着毛主席最新指示的落实。面对着这样的情况，难道还不应该紧急动员起来，迅速把无政府主义打倒搞臭，更待何时！？"},{"type":"paragraph","text":"毛主席教导我们：“凡是反动的东西，你不打，他就不倒。”对待无政府主义同样需要发动一场“人民战争”，并肃清它的流毒。那种企图不经过斗争，无政府主义会在一天早晨突然自行消灭的想法，是不切实际的幻想。"},{"type":"paragraph","text":"我们希望，目前还有无政府主义的地方，无论是领导同志，还是普通群众，都应当把“等”字换成“斗”字，人人动手，个个喊打，使无政府主义成为过街老鼠，它在哪里出现，就把它消灭在哪里。"},{"type":"paragraph","text":"北京市革命工人　尹向阳"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b776017d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
