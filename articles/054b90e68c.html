<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1432","name":"个人决定任用干部和个人推荐干部有何区别","author":"中共中央组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"个人决定任用干部和个人推荐干部有何区别","dates":[{"year":1983,"month":1}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编 (四), 504-505","tags":[{"name":"干部","type":"主题/事件"}],"parts":[{"type":"title","text":"个人决定任用干部和个人推荐干部有何区别"},{"type":"subtitle","text":"（一九八三年一月）"},{"type":"paragraph","text":"个人决定任用干部和个人推荐干部有根本的区别。"},{"type":"paragraph","text":"个人决定任用干部是“任人唯亲”的一种表现，是违反党的组织原则的行为。我们党的干部管理制度规定，任用提拔干部，必须在党委组织部门或政府人事部门考察了解的基础上，按照党的干部标准和干部条件，由党委集体讨论决定，并报上级组织审查批准；决不允许个人任用提拔干部。这是一项重要的组织原则，任何人都不得违反或破坏。"},{"type":"paragraph","text":"提拔干部，是为了使党的事业后继有人，以便带领人民群众实现四个现代化，决不是为了接替某位领导者个人的职位，继承哪位领导者个人的什么未竟事业。对于这样一件关系到党和国家的前途命运的大事，怎么能由个人专断呢！如果允许这样做，那就等于把党和人民的事业当成个别领导者的事业，把接革命的班变成纯属接某个领导者个人的班。这同我们党的性质和党的干部政策，显然是不相容的，是人民群众所不能允许的。个人决定任用提拔干部，容易从私利出发，利用职权安插亲友，培植私人势力。这不仅违背党的生活准则，也容易使一些不符合干部条件的人，甚至投机钻营分子混进我们的干部队伍和领导班子，这是十分危险的。因此，为了正确贯彻执行党的干部政策，保持我们干部队伍和领导班子的纯洁，必须杜绝个人决定任用或提拔干部，从组织制度上堵塞任人唯亲的漏洞。"},{"type":"paragraph","text":"从党和人民的利益出发，由个人举贤荐能，积极向组织推荐符合条件的优秀人才，这不仅是符合组织原则，应当允许的，也是每个共产党员，尤其是领导干部应尽的责任。知人不荐，嫉贤妒能，埋没人才，不利于党和人民的事业。个人向党组织推荐干部，一定要出以公心，决不能从个人好恶、恩怨出发，或者从个人利害得失出发。凡是个人推荐的干部，一定要通过组织认真地考察了解，能否任用或提拔，完全由有关组织集体讨论决定；决不能把个人提名推荐当作领导决定，硬让组织、人事部门办理手续。如果这样，那就把个人推荐变成个人任命干部了，这是不允许的。我们既不能把个人推荐变成个人决定，也不能把个人决定说成是个人推荐。二者的界限是不容混淆的。"},{"type":"paragraph","text":"（摘自中组部《党的组织工作问答》）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"054b90e68c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
