ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺保加利亚社会主义革命十八周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺保加利亚社会主义革命"},{"type":"paragraph","text":"十八周年的电报"},{"type":"paragraph","text":"（1962年9月8日）索非亚保加利亚共产党中央委员会第一书记托·日夫科夫同志，保加利亚人民共和国国民议会主席团主席迪·加涅夫同志，保加利亚人民共和国部长会议主席安·于哥夫同志："},{"type":"paragraph","text":"在保加利亚社会主义革命十八周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府，向保加利亚人民、保加利亚共产党和保加利亚人民共和国政府，致热烈的祝贺。"},{"type":"paragraph","text":"一年来，兄弟的保加利亚人民在保加利亚共产党和保加利亚人民共和国政府的领导下，取得了社会主义建设的重大成就；同时，在反对帝国主义的侵略政策和战争政策以及维护世界和平的斗争中，作出了积极的努力。对此，中国人民感到高兴。"},{"type":"paragraph","text":"中保两国人民的友谊是牢不可破的。在革命斗争和社会主义建设事业中，两国人民一向相互同情、相互支持。不断加强我们两国人民之间的友好团结，对于促进我们两国的社会主义建设和增强社会主义阵营的力量，具有重要的意义。中国人民将一如既往地在1957年莫斯科宣言和1960年莫斯科声明的基础上，同保加利亚人民携手合作，为争取世界和平、民族独立、民主和社会主义共同事业毛泽东全集第四十五卷的新胜利而奋斗。"},{"type":"paragraph","text":"祝保加利亚人民在建设社会主义的事业中取得新的成就。祝中保两国人民的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六二年九月八日"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":9,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":239},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9355aa762"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
