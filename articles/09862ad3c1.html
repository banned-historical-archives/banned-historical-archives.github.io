谢富治等领导人到机场热烈欢迎","authors":[],"dates":[{"year":1965,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京10日电　国务院总理周恩来结束了对巴基斯坦和坦桑尼亚的友好访问，今天中午乘专机回到北京。"},{"type":"paragraph","text":"回到北京的，还有随同周总理出国访问的外交部副部长章汉夫，国务院副秘书长罗青长，外交部非洲司司长柯华等。"},{"type":"paragraph","text":"朱德、邓小平、彭真、贺龙、陈毅、李先念、康生、罗瑞卿、谢富治等领导人，到机场热烈欢迎周总理胜利归来。"},{"type":"paragraph","text":"少先队员向周总理献了鲜花。"},{"type":"paragraph","text":"到机场欢迎的，还有各方面的负责人邓颖超、廖承志、刘晓、方毅、钱信忠、林海云、周荣鑫、罗贵波、孔原、李一氓、曾涌泉、王炳南、张彦、乔冠华、韩念龙、刘新权、李昌、徐子荣、邹大鹏、钟夫翔、龚子荣、吴冷西、万里、萧向荣、刘少文、徐深吉、张铁生、张杰等。"},{"type":"paragraph","text":"巴基斯坦驻中国大使罗查，坦桑尼亚驻中国大使馆临时代办罗金巴纳，也到机场欢迎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"李先念","type":"人物"},{"name":"彭真","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09862ad3c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
