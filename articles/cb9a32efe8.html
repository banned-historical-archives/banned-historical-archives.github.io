art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见巴基斯坦代表团毛主席同夏哈布丁部长和巴基斯坦其他朋友一一亲切握手，表示欢迎？周恩来总理等陪同接见？","authors":["钱嗣杰"],"parts":[{"type":"paragraph","text":"新华社三日讯 我们最最敬爱的伟大领袖毛主席，今天下午接见了巴基斯坦新闻和广播部长赫瓦贾·夏哈布丁和夫人，以及由夏哈布丁率领的巴基斯坦政府友好代表团全体成员。"},{"type":"paragraph","text":"接见时，毛主席同夏哈布丁部长和巴基斯坦其他朋友，一一亲切握手，表示欢迎。"},{"type":"paragraph","text":"陪同接见的，有国务院总理周恩来，外交部副部长韩念龙。"},{"type":"paragraph","text":"巴基斯坦驻中国大使苏尔坦·穆·汗也在场。"},{"type":"paragraph","text":"（照片一）毛主席和刚果（布）全国革命运动和政府代表团以及刚果（布）全国革命运动青年组织代表团全体成员合影。"},{"type":"paragraph","text":"（照片二）我们最最敬爱的伟大领袖毛主席，十月三日接见了巴基斯坦新闻和广播部长赫瓦贾·夏哈布丁（前左四）和由他率领的巴基斯坦政府友好代表团全体成员。"},{"type":"paragraph","text":"（本版照片均为新华社记者钱嗣杰摄）RW：毛泽东；接见外宾"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb9a32efe8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
