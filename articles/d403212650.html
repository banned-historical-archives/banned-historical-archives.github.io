rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“九大”是毛泽东思想的伟大胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 中国共产党第九次全国代表大会收到了厄立特里亚解放阵线书记奥斯曼·萨拉·沙比的贺电。"},{"type":"paragraph","text":"奥斯曼·萨拉·沙比在贺电中代表厄立特里亚革命人民和在厄立特里亚斗争前沿的自由战士，向中国共产党第九次全国代表大会表示最热烈的祝贺。"},{"type":"paragraph","text":"贺电说，这次代表大会是战无不胜的毛泽东思想的胜利，是毛泽东主席革命路线的胜利，是中国文化大革命的胜利，也是以毛泽东主席为首、林彪副主席为副的无产阶级司令部的胜利。"},{"type":"paragraph","text":"贺电说，革命的中国是世界革命的后方基地，中国的这一伟大胜利，对于正在进行武装斗争的厄立特里亚工人和农民是一个巨大的鼓舞。"},{"type":"paragraph","text":"贺电最后写道：毛泽东思想万岁！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d403212650"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
