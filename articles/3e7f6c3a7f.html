script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"郭沫若廖承志宴请森纳那亚克　森纳那亚克说希望亚非朋友共同打败修正主义分裂主义和破坏分子","authors":[],"dates":[{"year":1966,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"郭沫若廖承志宴请森纳那亚克"},{"type":"paragraph","text":"森纳那亚克说希望亚非朋友共同打败修正主义分裂主义和破坏分子"},{"type":"paragraph","text":"据新华社十日讯　全国人民代表大会常务委员会副委员长、中国文学艺术界联合会主席郭沫若和中国亚非团结委员会主席廖承志，今天举行宴会，热烈欢迎为亚非作家反帝反殖运动作出重大贡献的亚非作家常设局秘书长森纳那亚克和夫人。"},{"type":"paragraph","text":"廖承志和森纳那亚克先后在宴会上讲话。"},{"type":"paragraph","text":"廖承志在讲话中说，亚非作家紧急会议是在森纳那亚克秘书长的指导下取得成功的。我们相信秘书长先生对今后的亚非作家运动将作出更大贡献。"},{"type":"paragraph","text":"廖承志说，亚非作家常设局会议所通过并得到亚非作家紧急会议支持的声明，宣布了从事分裂活动的苏联作家，由于蓄意破坏亚非作家运动，已经自绝于亚非作家的队伍，并且永远丧失了在亚非作家常设局中的一切权利和地位。这一决定为亚非团结运动和其他国际组织开创了一个良好的先例。"},{"type":"paragraph","text":"森纳那亚克在讲话中说，我希望在座的亚非朋友和我们一起，更好地为打败一切修正主义、分裂主义和破坏分子而进行斗争。他表示深信，在中国作家协会的协助下，一定能完成这一任务。"},{"type":"paragraph","text":"亚非作家常设局成员国一些代表应邀出席宴会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"廖承志","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e7f6c3a7f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
