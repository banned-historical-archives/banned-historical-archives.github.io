s":["梁中玉"],"dates":[{"year":1967,"month":12,"day":30}],"is_range_date":false,"parts":[{"text":"梁中玉传达中央首长对昆明部队的指示","type":"title"},{"text":"梁中玉","type":"authors"},{"text":"梁中玉同志（十四军军长）从北京打来电话，传达中央首长对昆明部队十三军、十四军的指示。下面为电话记录：","type":"paragraph"},{"text":"周总理、康老、谢副总理一九六七年十二月二十七日二十三时四十三分至二十八日凌晨三十分，接见昆明部队在京开会的全体同志，作了极为重要的指示，总的精神是：统一思想，克服派性，稳定部队，制止武斗，恢复生产，恢复交通和社会秩序。在讲到稳定部队，提到十三、十四军时，周总理、康老、谢副总理指示，要把这些话立即打电话告诉给两军。中央首长的讲话，主要内容是：关于肃清薄一波影响问题时，康老说：要分析—下。有的人要在十三、十四军肃清薄一波的影响，他们形式上是反薄一波，实际上是扩大薄一波的影响，起码可以说是形左实右，薄一波哪有这么大的影响，他们不是真反薄一波，这是对转战南北有功部队的诬蔑，我们的部队是毛主席亲手缔造，林副主席直接指挥的部队，这种口号是动摇瓦解人民解放军，是自毁长城，恰恰是美帝、苏修、蒋匪帮、走资派所希望的，怎么能用这个口号反对十三军、十四军呢？要教育群众，揭露这个，这是别有用心的，挑拨诬蔑的手段。总理说：是别有用心，不怀好意。是薄一波的部队呢？你们想一想，这个合乎不合乎毛主席思想，要阶级分析嘛！要合乎毛泽东思想。周总理说：这是不是社会口号呢？这是很不利的，是自毁长城。谢副总理说：个别人不怀好意，别有用心，要提高警惕，十三、十四军要挺起胸来。康老说：十三、十四军要挺起胸来，不要怕，要稳定下来，毛主席信任，林副主席信任，中央信任十三、十四军，有人提出把十三、十四军说成李成芳的死党，是保李势力，要坚决反对。十三、十四军是毛主席的部队，要把这些话打电话告诉两军，但不能用这些话去压别人，压对方。","type":"paragraph"},{"text":" 一九六七年十二月三十日","type":"paragraph"},{"text":"来源：云南八·二三《风展红旗》编《毛主席无限关怀云南人民──中央和中央首长对云南无产阶级文化大革命的指示》","type":"appellation"}],"comments":[],"origin":"云南八·二三《风展红旗》编　《毛主席无限关怀云南人民──中央和中央首长对云南无产阶级文化大革命的指示》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a1bc1e8a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
