rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席挥手我前进热烈祝贺工程兵第二届学习毛主席著作积极分子代表大会胜利召开","authors":[],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！工程兵战士永远忠于您。您老人家怎么说，我们就怎么做，您老人家指向哪里，我们就打到哪里，誓将毛泽东思想伟大红旗插遍全世界。某部代表怀着对毛主席无限深厚的阶级感情，来到毛主席身边，敬献一片忠心。"},{"type":"paragraph","text":"梅花欢喜漫天雪。工程兵某部十连，风雪高原帐篷生活十八年，横渡金沙江，架通怒江桥，奋战雀儿山，修建高原机场，摩天岭上开通路，万里疆土筑长城。毛主席指向哪里，他们就奔向哪里；哪里艰苦，他们就战斗在哪里。图为战士们纵情歌唱毛主席。"},{"type":"paragraph","text":"粉身碎骨，捍卫毛主席革命路线的决心不动摇，海枯石烂，忠于毛主席的红心永不变。工程兵某部一连在阶级斗争中活学活用毛主席著作，连续七年评为四好连队。他们曾顶住了反革命修正主义分子罗瑞卿刮起的大比武妖风。在无产阶级文化大革命中，又万炮齐轰中国赫鲁晓夫。图为一连战士的批判会。"},{"type":"paragraph","text":"用毛泽东思想武装起来的战士，最聪明，最有智慧，最富有创造精神。工程兵某部机械股长吕纪兰同志，努力活学活用毛主席著作，艰苦奋斗，勇于实践，不断创新，几年来革新创造了六十多种机械部件，为国防施工作出了贡献。图为吕纪兰同志（右）和一等功荣立者陶乃星同志交流活学活用毛主席著作的经验。"},{"type":"paragraph","text":"紧跟毛主席，就是胜利。工程兵驻北京市岳各庄中学军训团，高举毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，进行深入、细致、艰苦的思想政治工作，帮助革命领导干部站出来，帮助革命小将复课闹革命，取得了显著成绩。图为军训团同志和革命委员会委员们一起交谈领导班子如何进一步加强思想革命化。 本报记者摄"},{"type":"paragraph","text":"心怀一个“忠”字，狠抓一个“用”字，大立一个“公”字。工程兵直属机关无产阶级革命派，步步紧跟毛主席的伟大战略部署，条条落实毛主席的最新指示，坚决贯彻和捍卫了毛主席的无产阶级革命路线。图为他们正在交流学习和落实毛主席最新指示的心得体会。"},{"type":"paragraph","text":"阶级斗争育英雄，支左爱民谱新歌。前志愿军爆破英雄郑定富同志在“三支”“两军”中为人民立下了新功。图为他和革命群众一起交谈活学活用毛主席最新指示的心得体会。 本报记者摄"},{"type":"paragraph","text":"本版照片除署名者外都是工程兵政治部供稿"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d575008c19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
