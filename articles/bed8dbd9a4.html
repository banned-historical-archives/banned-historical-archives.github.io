[{"year":1984,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"青海省决定从国家拨给的专款和地方财政中拿出一千万元，落实党的两项统战政策。其中，五百万元用于补偿‘文革’中党外人士被查抄的财物，五百万元用于补偿各宗教寺庙被查抄财物和拆毁的房屋。"},{"type":"paragraph","text":"在‘文革’中，青海省有八百多位党外人士和一些宗教寺庙被查抄或破坏。党的十一届三中全会以来，政府已给一百多人作了退赔。"},{"type":"paragraph","text":"这次落实政策，凡是个人财物被查抄后分配给群众、兴办集体事业或挪作它用的，一律不收回原物或原物变价款，但对受害者要给予经济补偿。寺院损失的财产，鉴于国家财政还比较困难，经济上只作适当补偿。"},{"type":"paragraph","text":"(据《光明日报》)"}],"comments":[],"origin":"《光明日报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"青海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bed8dbd9a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
