rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"牧民永远忠于毛主席","authors":["政治处"],"parts":[{"type":"paragraph","text":"执行支农任务的兰州部队某师炮团，派出了一支毛泽东思想宣传队，由副指导员李世嘉率领，向驻在马积雪山的牧民宣传毛主席的最新指示。"},{"type":"paragraph","text":"傍晚，大雪铺天盖地下个不停。马积雪山离这里二百多里，海拔四千多米。为了宣传毛泽东思想不过夜，不漏人。宣传队立刻就要登山。角巴老大爷说：“天黑路险我不放心哪！”战士们说：“心中有个红太阳，千难万险无阻挡。”说罢就上了路。"},{"type":"paragraph","text":"一路上，战士们穿密林跨雪原，一口炒面一把雪，歌声嘹亮震山谷。一路上，战士们把毛主席关于“备战、备荒、为人民”的伟大战略方针，写在石崖上，刻在牧民的心坎上。"},{"type":"paragraph","text":"经过三天三夜的长途跋涉，他们登上了马积雪山，这是第一支来到这里的毛泽东思想宣传队。战士们忘记了疲劳，把毛主席像挂在五户牧民的帐篷中央。顿时，雪山顶上出太阳，藏、汉牧民心里亮。战士们和牧民，一盏灯下学宝书，一个帐篷里同讲用。兽医格鲁说：“冰峰上的雪莲花迎着红太阳开放，牧民的心永远忠于毛主席。为革命放牧吃苦最光荣。”"},{"type":"paragraph","text":"现在，马积雪山上家家牧民办起了毛泽东思想学习班，户户牧民坚持“天天读”。在这白皑皑的雪山上，升起了永远不落的红太阳。（政治处）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53ef240221"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
