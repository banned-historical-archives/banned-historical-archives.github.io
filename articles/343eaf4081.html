1,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"方人"},{"type":"paragraph","text":"薛先生送来一帧毛主席的油画像，还配上金色的框。我们挂到礼堂上去，把礼堂上原有的一帧毛主席五彩印制的像换下来。"},{"type":"paragraph","text":"这帧换下来的像，安置在那里最为妥当呢?大家讨论了一下。结果，决定贴在饭厅正中央；我们每一个人吃饭的时候，都可以看到他老人家端端正正地坐在上面。这是有两点教育上的作用:"},{"type":"paragraph","text":"第一:“吃饭不忘种田人!”没有毛主席领导解放我们，在反动政府时代有这样安安逸逸饭吃吗?"},{"type":"paragraph","text":"第二:毛主席给我们吃饭，毛主席也要我们为人民服务；所以每次在毛主席像片下吃饭的时候，应该自己检讨一下:有没有好好地为人民服务!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"343eaf4081"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
