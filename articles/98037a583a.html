ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"宜以五纵六纵十二级堵塞沈敌向营口的退路","alias":"","parts":[{"type":"paragraph","text":"宜以五纵六纵十二纵堵塞沈敌向营口的退路1"},{"type":"paragraph","text":"（1948年10月19日）林、罗、刘："},{"type":"paragraph","text":"既然长春敌人愿意投降，我五纵、六纵、十二纵即可停止去长春，该三个纵队似宜以两个位于沈阳、营口之间，以一个在营口筑工守备，并宜在你们打锦葫以前到达该区，堵塞沈敌向营口的退路。如沈敌向锦葫增援，则该三纵从侧后钳制沈敌。长春附近之九个独立师，亦宜以大部开沈营间，萧萧?则赴该区指挥。如何，望酌复。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"皓寅"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]锦葫，指辽宁锦西和葫芦岛。[3]萧萧，指萧劲光、萧华，当时分别任东北野战军第一兵团司令员和"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":76,"page_end":76},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98037a583a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
