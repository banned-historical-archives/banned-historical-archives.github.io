识的同志，要严肃对照检查，来不得半点含糊","authors":[],"dates":[{"year":1984,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《人民日报》昨天发表题为《就是要彻底否定“文革”》的评论员文章。"},{"type":"paragraph","text":"文章说，在我们国家的政治大舞台上，“文化大革命”这出闹剧已经谢幕多年了。但是，在生活的一些旮旮旯旯里，少数人有时还要掀起一点“文革”的余波微澜。"},{"type":"paragraph","text":"文章指出，十多年前，杭州大学地理系曾搞过侮辱人格的“活人展览”。七位老教师被打扮成“地主”、“资产阶级太太”、“反动学术权威”、“‘牛鬼蛇神’保护人”，受辱于大庭广众之前。当年进驻杭州大学地理系，参与策划这一事件的个别人，至今仍然认为这种摧残知识分子的做法是正确的，是“严格按照党的方针政策，实事求是做耐心过细的思想工作，以政策开道，严禁逼供信，启发帮助他们讲清自己的问题”的。"},{"type":"paragraph","text":"文章说，党的十一届六中全会通过的《关于建国以来党的若干历史问题的决议》明确指出:“‘文化大革命’不是也不可能是任何意义上的革命或社会进步。”这个结论，反映了全党、全国人民的共同认识。但是，在这次整党中，一接触到“文革”中的某些问题，有人就“剪不断，理还乱”了。他们拐弯抹角，千方百计，肯定当时的所作所为，甚至为搞“活人展览”以及比这更丑的恶行辩护。尽管作这种“表演”的只是极少数人，仍然值得引起我们的严重注意。"},{"type":"paragraph","text":"文章接着说，粉碎“四人帮”以后，对参与搞“活人展览”之类恶行的人，除了打砸抢分子外，一般都未予查处(有些地方打砸抢分子也未查处)。这是考虑到“文革”的历史背景，不过多地去追究个人责任，也是为了给这些犯错误的人一个认识错误、改正错误的时间。如果他们至今仍然坚持错误，有的甚至身居要职，被当作“接班人”加以培养，人们就有理由责问，这还有什么是非呢?这样的人究竟会是谁家的“接班人”?"},{"type":"paragraph","text":"文章最后说，这次整党，《关于建国以来党的若干历史问题的决议》是列为必读文件的。认真阅读这个文件，对每个党员都是必要的。尤其是那些在“文革”中犯有严重错误，至今尚无正确认识的同志，更要认真学习，严肃地对照检查，这一课必须补，来不得半点含糊。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8244567fe6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
