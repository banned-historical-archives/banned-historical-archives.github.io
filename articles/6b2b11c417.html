al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"表同情于师范学生","alias":"","parts":[{"type":"paragraph","text":"表同情于师范学生！"},{"type":"paragraph","text":"（1919年9月21日）"},{"type":"paragraph","text":"师范学生因为自己要读书，并推爱于百多个小学生，以为他们也要读书，反对解散附属小学。（见昨日本报）看他们说：“赤子依恋，聚哭校门。校门重闭而不通，员役挥之而不去。旧有之师长见之于街衢，则执手问先生何以教我？”无论什么人见着或听着这种情景，都要流下一滴眼泪。吾湘诸教育家，比较的尚算有脑筋，应该表同情于他们。"},{"type":"paragraph","text":"[1]1919年秋，湖南省立第一师范学校附属小学因校舍问题和经费困难，未能及时开学，并有被停办、解散之势。一师学友会为此写了一篇很长的呈省长文，刊于9月20日湖南《大公报》，要求省署出面，维持附小，“以全失学而便实习”。翌日，毛泽东则发表本文。"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":9,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":104,"page_end":104},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b2b11c417"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
