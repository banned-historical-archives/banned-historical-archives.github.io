:[{"year":1946,"month":11,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以增产保卫毛主席"},{"type":"paragraph","text":"黎城加紧熬硝"},{"type":"paragraph","text":"【本报长治讯】黎城四十六座硝房加紧熬硝，以增加军火生产原料，争取全面抵抗的胜利。一月中已完成今冬任务的四分之一，并在技术上与质量上有许多改进，一区霞庄一口锅每日可出硝二十五斤，成色又好。正社村一月一口锅熬硝八百斤。最近他们听说蒋军进攻陕甘宁边区，各硝房在展开保卫毛主席运动，霞庄硝房王景玉说：“咱熬的越多，反动派死的越多”。领导全县硝房的王富存同志说：“各硝房这样努力，预计至少可超出计划二万斤”。（马琳）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed06b70191"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
