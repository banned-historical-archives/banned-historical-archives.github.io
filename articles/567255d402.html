" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海市电影系统清队领导小组关于解放王丹凤的报告","authors":[],"dates":[{"year":1969,"month":7,"day":8}],"is_range_date":false,"parts":[{"text":"上海市电影系统清队领导小组关于解放王丹凤的报告","type":"title"},{"text":"上海市革命委员会工宣队第一办公室：","type":"appellation"},{"text":"王丹凤，原名王玉凤，女，44岁，浙江鄞县人，家庭出身资产阶级，本人成分职员，原任东方红（天马）电影制片厂演员，文艺五级，民盟盟员，无产阶级文化大革命中被革命群众揪出审查。","type":"paragraph"},{"text":"主要社会关系：","type":"paragraph"},{"text":"同事，朱石麟，香港凤凰影片公司导演","type":"paragraph"},{"text":"同事，龚秋霞，香港长城影片公司演员","type":"paragraph"},{"text":"同事，陈娟娟，香港凤凰影片公司演员","type":"paragraph"},{"text":"同事，李萍倩，香港长城影片公司导演","type":"subtitle"},{"text":"主要问题：","type":"subtitle"},{"text":"一、1942年王丹凤随同大汉奸张善琨、徐欣夫等人前往南京代表电影界汉奸文人去祝贺汪精卫“还都三周年”，在庆祝大会中陪同日本人及汉奸文人吃饭喝酒，游山玩水，丧尽了民族气节。","type":"paragraph"},{"text":"二、1943年王丹凤在伪华影与日寇合作拍摄了为日本帝国主义歌功颂德，为日寇侵华作反动舆论宣传的汉奸影片，“春江遗恨”与“万紫千红”，并且还在报纸上发表文章吹捧日本导员，充分暴露了王丹凤积极充当日寇侵华工具的汉奸嘴脸。","type":"paragraph"},{"text":"三、在伪华影，王丹凤参加社会活动很多，在汉奸梁乐音所举办的为日本帝国主义宣传“中日友好”、“大东亚和平”等音乐会上常有王丹凤的独唱，唱的是糜糜之音，麻醉和毒害上海沦陷区的人民。","type":"paragraph"},{"text":"四、1947年王丹凤在国泰影片公司经老板柳中浩介绍集体参加国民党，领过党证，缴过党费。","type":"paragraph"},{"text":"五、1947年王丹凤随同徐欣夫、顾兰君等组织慰问队去嘉兴慰问青年军。王丹凤亲自登台为匪军唱歌表演，并同伪青年军一起吃饭、联欢，在车站上还受到蒋匪经国接见。","type":"paragraph"},{"text":"六、王丹凤在解放前，拍摄了大量反动黄色的电影，麻醉人民革命斗志。解放后又受到文艺黑线的包庇重用，拍摄了大量反党反社会主义的毒草电影，为资本主义复辟提供舆论准备。","type":"paragraph"},{"text":"在无产阶级文化大革命中，经过革命群众批斗，王丹凤对自己的问题作了比较老实的交代，有悔改的表现。根据伟大领袖毛主席的“扩大教育面，缩小打击面”的教导，我们认为王丹凤属于一般政历问题，回到群众中去接受教育改造。特此报告。","type":"paragraph"},{"text":" 上海市电影系统清队领导小组1969年7月8日","type":"paragraph"},{"text":" 工宣队：吴树和军宣队：谷臣革筹会：许广耀","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"567255d402"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
