year":1966,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想是根本的根本"},{"type":"paragraph","text":"五好职工、杭州硫酸厂工人　李国贤"},{"type":"paragraph","text":"我在实践中深深地体会到，要做到革命和生产双胜利，根本的根本是毛泽东思想挂帅。用毛泽东思想武装头脑，就能在精神战线和物质战线上都取得巨大的胜利。"},{"type":"paragraph","text":"在当前无产阶级文化大革命的新高潮中，我厂职工以毛泽东思想为武器，动笔动口，投入一斗、二批、三改的斗争，在斗争中，大家眼明心亮，斗志昂扬，誓把无产阶级文化大革命进行到底，不获全胜，决不收兵。"},{"type":"paragraph","text":"有了伟大的战无不胜的毛泽东思想，使我们认识到正确的设计不是从天上掉下来的，也不是某些资产阶级“专家”“发明”的，它只能是从我们工人实践中来。于是，我们以毛泽东思想为武器，破除迷信，解放思想，不怕任何艰难困苦，为革命冲锋陷阵，彻底改造了原来由资产阶级“专家”设计的旧设备，使硫酸的生产能力由五千吨上升到一万五千吨。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0fab9c260"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
