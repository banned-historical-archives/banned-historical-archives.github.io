art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《十二个“为什么”揭示了“四人帮”的极右本质》一书出版","authors":[],"parts":[{"type":"paragraph","text":"本报讯 学习华国锋主席在第二次全国农业学大寨会议上重要讲话的一组体会文章《十二个“为什么”揭示了“四人帮”的极右本质》，今年二月在本报发表。最近，这组文章略经修改，编辑成册，已由中国人民解放军战士出版社出版，即将陆续在全军发行。"},{"type":"paragraph","text":"这本书的出版《前言》指出：英明领袖华主席高举毛主席的伟大旗帜，坚决贯彻执行毛主席的革命路线。华主席在第二次全国农业学大寨会议上的讲话中概括的几年来人们反复思索的十二个“为什么”，是对“四人帮”及其反革命的修正主义路线极右实质的深刻揭露，是进行阶级教育和路线教育的极好教材。从理论和实践的结合上认真学习和领会华主席提出的十二个“为什么”，我们就可以充分看清“四人帮”的反革命面目，很好地提高我们的阶级斗争和路线斗争的觉悟。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bf5d1753e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
