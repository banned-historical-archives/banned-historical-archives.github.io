tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"运用幻灯宣传毛泽东思想某团各连能画幻灯片，月月能开幻灯晚会","authors":["吴少华/汪月斌/宋懋昌"],"parts":[{"type":"paragraph","text":"本报讯 南京部队某团十分重视幻灯宣传工作，他们把它当成是突出政治、宣传毛泽东思想的一支轻武器。目前，每个连都能画幻灯图片，月月能举行幻灯晚会。大家互相激励更好地学习毛主席著作，做好工作，争取上幻灯。"},{"type":"paragraph","text":"这个团的幻灯活动，是为了适应突出政治之后，好人好事越来越多，先进经验不断产生的新形势而开展起来的。大家反映：连队增加了幻灯活动，一定会把政治空气搞得更浓，士气搞得更高，使好人好事出得更多。"},{"type":"paragraph","text":"在幻灯宣传活动中，各连都把宣传毛泽东思想摆在首位，用毛泽东思想来回答现实生活中的各种问题。例如，指挥连进行游泳训练时，幻灯组作了很好的配合。一开始，银幕上出现了毛主席的伟大形象，接着是《愚公移山》中的一段话，然后是越南人民的英雄事迹。放映后，同志们反映：“想想毛主席的教导，为反对美帝国主义侵略练游泳，喝口泥水，也变甜了。”在总结放映幻灯经验的时候，同志们还风趣地说：“咱们连呀，常和毛主席见面，毛主席的话常响在咱们的耳边。”"},{"type":"paragraph","text":"他们还经常运用幻灯来宣扬活学活用毛主席著作的好人好事。半年多来，这个团共放映了三十多套幻灯片，有半数是宣扬活学活用毛主席著作的先进人物和先进经验的。三连在宣扬了模范饲养员刘继承学习毛主席著作的事迹后，不但战士们和他对比找差距，党支部还组织干部向他学习，有力地推动了连队工作。 （吴少华 汪月斌 宋懋昌）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99aa83cb9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
