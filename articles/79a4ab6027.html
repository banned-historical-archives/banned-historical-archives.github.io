art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东在北大红楼生活6个月","authors":["钱晓虎"],"parts":[{"type":"paragraph","text":"寻找毛泽东第一次来北京的足迹，最令人留连忘返的地方，当然是北大红楼。"},{"type":"paragraph","text":"通过讲解员的介绍，记者了解到，1918年8月，25岁的毛泽东为组织湖南青年赴法国勤工俭学第一次来到北京。在生活无着落的情况下，非常欣赏毛泽东的原湖南第一师范学校老师杨昌济教授找到蔡元培校长签字，介绍毛泽东到北大图书馆担任助理员，月薪8块银元，勉强维持一个人在北京租房吃饭的基本生计。"},{"type":"paragraph","text":"由于工作的原因，他很快就认识和拜访了当时的北大校长蔡元培、图书馆主任李大钊、文科学长陈独秀、刚刚留美归来的北大年轻教授胡适、《京报》社长邵飘萍等一大批他神交已久的文化界名流，并时常参加他们组织的活动，开阔了视野。可以说，正是在北大的短暂的岁月，特别是结识了中国共产党的两位创始人陈独秀和李大钊，才真正改变了毛泽东的人生志向。"},{"type":"paragraph","text":"在这里，毛泽东还找到了他人生的至爱。毛泽东回忆这段日子说：我在这里还遇见而且爱上杨开慧。她是我以前伦理教师杨昌济的女儿。在我青年时代杨昌济给我留下了很深印象，后来又在北京成为我一位知心朋友。"},{"type":"paragraph","text":"毛泽东在北大红楼工作生活了6个多月。1919年5月，也就是毛泽东回到湖南的一个月后，“五四运动”爆发了。7月14日，毛泽东在《湘江评论》创刊宣言中写道：时机到了！世界的大潮卷得更急了！浩浩荡荡的新思潮业已奔腾澎湃于湘江两岸了……"},{"type":"paragraph","text":"当年12月，毛泽东第二次来北平，短暂停留后即离开。而毛泽东第三次来北平——1949年3月从西柏坡“进京赶考”，已经是30年之后！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈独秀","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79a4ab6027"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
