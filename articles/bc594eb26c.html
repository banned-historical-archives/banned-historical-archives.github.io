art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"张春桥的“管”与“不管”","authors":["李金山"],"parts":[{"type":"paragraph","text":"张春桥窃取总政主任职务后曾声称，总政的工作怎么做他不管，“只保留一个批评权”。"},{"type":"paragraph","text":"这话有“坦白”的一面：他来总政，革命的工作确是半点也没干。别人要做，他还千方百计地阻挠和破坏。总政的同志要为部队制定一个学习毛主席关于无产阶级专政理论问题指示的计划，也被他一阵冷风吹掉了。但也有撒谎的一面：说他什么工作都不管，不是事实。他的所谓“批评权”，实即找岔子、整人，也就是“管”。此外，他在总政还有那么几个亲信在替他奔走。他们炮制反军乱军的“新经验”，召开写“军内走资派”的什么“现场会”，一个个“管”得多起劲呵！"},{"type":"paragraph","text":"透过张春桥的“管”与“不管”，显露出来的却是一副阴谋家的狰狞面目。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc594eb26c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
