[],"dates":[{"year":1979,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市第一百货商店党委、行政和各商品部的干部，认真学习叶剑英同志在庆祝中华人民共和国成立三十周年大会上的讲话，部分先进工作者还进行了座谈，全店干部、群众同心协力，既抓好供应工作，又抓好学习。"},{"type":"paragraph","text":"商店党委书记鲍良弼深有体会地说:“这个讲话充分体现了我们党的实事求是的优良传统，是我们深入进行思想政治路线教育的重要教材，我们一定要深刻领会这个讲话的精神实质，密切联系实际，搞好当前工作。”在初步学习中，许多同志联系实际，畅谈自己的体会和感受，并列举了商店的一些喜人的数字，歌颂了三十年来所取得的巨大胜利。商店在一九四九年十月建店时，商场只有一个楼面，面积仅一千一百平方米，今天已有五个商场楼面，一万八千多个平方米；当时职工人数只二百多人，目前商店已有二千多人。同建店初期相比，现在经营品种增加了八倍多，营业额增加了二十六倍多。有的同志说:“我们商店三十年的发展史，是我们国家三十年发展史的缩影”。"},{"type":"paragraph","text":"在学习中，大家还谈到三十年来的复杂斗争，特别是文化大革命这十年，林彪、“四人帮”所推行的那条极左路线对商店的影响。粉碎“四人帮”以来，商店广大干部和职工虽然积极投入揭批林彪、“四人帮”的反革命阴谋罪行的斗争，但是对照叶剑英同志的国庆讲话，许多同志感到林彪、“四人帮”极左路线的流毒并未肃清，因此，都认为必须把这一批判深入地进行下去。"},{"type":"paragraph","text":"目前，商店党委已作了部署，打算集中一段时间密切联系实际，组织好党员、干部和群众的学习。要求商店党员、干部和群众真正坐下来精读文件，特别是要弄通讲话中那些对国内国外普遍关心的有关我国革命和建设的重大问题，把干部和群众的思想认识再提高一步，把全店职工的思想进一步引导到实现四化的政治路线上来。在学习方法上，强调要密切联系实际，解放思想，开动机器，以理服人，坚持“三不主义”，努力做到三个结合:同批判和肃清“四人帮”的极左路线结合；同真理标准问题讨论补课结合；同推动当前工作、促进增产节约运动相结合，使这次学习真正达到振奋革命精神，激励斗志，大干第四季度，为完成和超额完成商店今年的各项计划指标而努力。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eae80f48b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
