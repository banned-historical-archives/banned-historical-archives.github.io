957,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级经济学家在鸣放中进行了一系列复辟活动。这种活动不仅出现在北京，也出现于其他城市的综合大学及经济研究机关。资产阶级经济学家陈振汉(北大)、李宝震(南开)、刘不同(西北)、粟寄沧(武汉)、秦瓒(云南)、孙毓棠(经济研究所)等是其中的主将。张友仁在“新建设”9月号发表文章，分析了这些阴谋活动的特点。他说，右派第一个步骤是恶意地攻击马列主义政治经济学，破坏创始人的理论威信以及苏联及我国的研究成就，最终否认马列主义政治经济学是一门科学。右派第二个步骤是积极进行资产阶级经济学复辟活动，他们不是老老实实地进行唯心主义经济学的学术讨论，也不是要求在大学开设资产阶级经济学的课程，而是要取消马列主义政治经济学的课程，取得资产阶级经济学的统治地位。张友仁指出，从资产阶级经济学家的复辟活动中得出这样一个教训:我们过去低估了外国特别是旧中国土生土长的资产阶级经济学的危害性，今后必须在学术思想领域中展开批判。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2cad044bb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
