ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给周恩来的指示","alias":"","parts":[{"type":"paragraph","text":"给周恩来的指示！]"},{"type":"paragraph","text":"（1942年9月15日）"},{"type":"paragraph","text":"国内关系总是随国际关系为转移，蒋介石第一次反共高潮，发生于德苏协定、苏芬战争及英美反苏时期；第二次反共高潮发生于德苏协定继续存在、英美苏关系仍未好转，而轴心则成立三国同盟时期，自苏德战起，英美苏关系好转，至于今天，国共两党间即没有大的冲突。我们目前任务，是促成两党谈判，促成具体解决问题。听说蒋介石已回重庆，我们仍要林彪到西安后要求赴重庆，以期打开谈判门路。"},{"type":"paragraph","text":"[1]14日周恩来致电毛泽东说，历来统一战线方针是国共合作为主，地力与小党派为辅。但在武汉时期，太重视国共合作，甚至幻想有些成致完全冷落了各小党派及地方势力，且为国民党所吓住，反令其易于操这不能不是一个教训。重庆时期，在毛泽东确定的斗争三原则和革命的政策指导下，国内外统战工作都得到了新的发展。这是15日毛泽东给周《抗战中的毛泽东与周恩来》（油画）《战争年代》（油画）"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":9,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":157,"page_end":158},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"462257f213"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
