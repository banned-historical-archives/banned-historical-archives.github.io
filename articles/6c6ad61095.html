夫人祝贺斯特朗八十寿辰，接见后设宴招待外国朋友","authors":[],"dates":[{"year":1965,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京24日电　毛泽东主席和夫人江青同志，今天接见美国作家安娜·路易斯·斯特朗以及其他美国朋友。"},{"type":"paragraph","text":"这些美国朋友是:"},{"type":"paragraph","text":"柯弗兰夫妇，艾德勒夫妇，爱泼斯坦夫妇，马海德，李敦白夫妇，米尔顿夫妇，舒子章夫妇。"},{"type":"paragraph","text":"同时被接见的还有:智利的万徒勒里夫妇，印度尼西亚的威利夫妇，新西兰的艾黎。"},{"type":"paragraph","text":"今天是斯特朗女士八十寿辰，毛主席和江青同志首先向她表示贺忱。"},{"type":"paragraph","text":"毛主席和外国朋友们在友好、愉快的气氛中，进行了亲切的交谈。"},{"type":"paragraph","text":"接见时在座的中国同志有:廖承志和他的夫人经普椿，以及吴冷西、姚溱、唐明照、区棠亮、郑森禹、浦寿昌等。"},{"type":"paragraph","text":"接见以后，毛主席和江青同志设宴招待外国朋友。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\11\\65bp010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e十一月二十四日，毛泽东主席和夫人江青同志接见美国作家安娜·路易斯·斯特朗(前右六)，以及其他美国朋友。同时被接见的还有智利、印度尼西亚和新西兰的朋友。图为接见时合影。(新华社传真　钱嗣杰摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c6ad61095"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
