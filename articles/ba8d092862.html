耻攻击","authors":[],"dates":[{"year":1965,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社雅加达12日电　印度尼西亚《人民日报》今天发表社论，表示感谢中国政府和人民真诚支持印度尼西亚退出联合国的决定。"},{"type":"paragraph","text":"社论说，“中国政府是世界上第一个理解和完全支持印度尼西亚共和国退出联合国的行动的政府。”它还说，“没有一个印度尼西亚爱国者不感谢中国政府的真诚支持。”"},{"type":"paragraph","text":"社论说，“我们深信，将会有越来越多的国家出来支持我们。不管会发生什么事情，历史将证明，印度尼西亚共和国的行动是正确而有理的。”"},{"type":"paragraph","text":"社论谴责了日本佐藤政府的反对印度尼西亚退出联合国的态度。社论说，这只能帮助印度尼西亚人民认清佐藤政府是一个反动政府!"},{"type":"paragraph","text":"社论还驳斥了某些日本资产阶级报纸对印度尼西亚退出联合国的攻击，它说，《朝日新闻》企图把印度尼西亚退出联合国同日本退出“国联”相提并论。但是，“日本的新法西斯先生们以及反动分子、保守分子和修正主义分子之流应当明白:这两者之间有根本的区别。日本退出‘国联’加速了战争的爆发，而印度尼西亚退出联合国的果断行动却保卫了世界和平，揭露了在联合国卵翼下的所有侵略者。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba8d092862"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
