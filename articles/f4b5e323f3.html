ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"和国民党联络参课陈宏模等的谈话","alias":"","parts":[{"type":"paragraph","text":"和国民党联络参谋陈宏谟等的谈话！1"},{"type":"paragraph","text":"（1941年9月1日）"},{"type":"paragraph","text":"（一）国民党方面释放叶挺，共产党方面即派董必武一人出席参政会，否则仍不能出席。（二）共产党决不推翻国民党政府，决不越过现有疆界，国民党承认共产党在敌后有发展权利，承认现有防地，承认边区；至于在敌后的国共两军，双方下令互不攻击。（三)恢复新四军，发给欠饷，停止逮捕。（四）何应钦停止反共，共产党即停止反何，并可重新来往，但何若再反共，共产党必再反何。"},{"type":"paragraph","text":"[1]1941年9月1日，毛泽东和国民党联络参谋陈宏谟、郭亚生、周励武谈话4小时。陈等表示蒋介石、何应钦、张治中、吴铁城在国共关系上均愿转圜，要求朱德到重庆去一次。这是毛泽东和他们谈话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":222,"page_end":222},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4b5e323f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
