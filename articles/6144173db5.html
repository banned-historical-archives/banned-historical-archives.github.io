script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"太原前线通讯  “至死不做俘虏”  战犯阎锡山用古代奴隶的酷刑压迫人民统治他的部队","authors":[],"dates":[{"year":1949,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“至死不做俘虏”"},{"type":"paragraph","text":"战犯阎锡山用古代奴隶的酷刑压迫人民统治他的部队"},{"type":"paragraph","text":"“一号，二号……”，站在外科室门外的小护士，正在给那些后来换药的伤员发号牌子。“七号”一个右臂负伤的伤俘，迈着沉重的脚步走了过来，你看他的这张脸呀，又黑又脏干巴巴的没有一点血色，头上戴着一顶破军帽，满是尘土。他把二号牌子递给了小护士，走进了外科室。护士同志把他那破烂不堪的上衣脱了，托起了他的右臂，细心的用着酒精棉花揉擦着伤口消毒，当擦到手腕的上部时护士同志突然一怔，他看见这个伤俘的脸上刺着一串蓝字“至死不做一次俘虏”，医院副院长碰巧过重念了一遍，伤俘立刻低下了头，等他换好药，我在朝阳的墙跟下和他进行以下的谈话："},{"type":"paragraph","text":"“你叫什么名字？”"},{"type":"paragraph","text":"“卜元礼。”"},{"type":"paragraph","text":"“你已经作过一次俘虏？”"},{"type":"paragraph","text":"“嗯！”"},{"type":"paragraph","text":"“你的胳膊上为什么刺着字啊？”"},{"type":"paragraph","text":"他不言语慢慢的托起他自己的右臂挽起他的袖子，让我看那露出来的“至死不做俘虏”六个鲜明的永远洗刷不净的刺印蓝字。他沈默的低着头，痛心万状。"},{"type":"paragraph","text":"我问他：“这难道是你自己刺的？”"},{"type":"paragraph","text":"“唉！这还是前年四月的事哪！正太战役，解放军在平定县范高山解放了我，这是第一次做俘虏。我是陕西上州人，被国民党抓去当的兵，解放军放我回家，可是走到半路上又被阎锡山队伍把我抓去了，把我送到‘反干团’受训，那里的生活苦的没法说，吃不饱还受打，比住牢狱还厉害的多。每天逼着让‘自白’，然后给刺上这几个字，这是为了要条活命啊，如果不刺的话就要被他们乱棒打死，不知多少人的生命，在阎锡山这一个毒辣的手段下被活活打死了。”说到这里他痛苦的说不下去了。这是一篇血的控诉，控诉头等战争罪犯之一阎匪锡山，他对于人民、对于他的军队，曾经如何野蛮地施行侮辱！战犯阎锡山真正是中国近代的封建魔王，他惯用古代奴隶主对待奴隶的酷刑统治人民、统治他的部队，但是这种极端野蛮惨酷的罪行，除了加速他的崩溃而外，又有什么用处呢？"},{"type":"paragraph","text":"太原解放了，现在不仅卜元礼做了二次俘虏，阎匪在山西三十八年的统治也被人民和人民解放军彻底摧垮，连根拔除。  【太原前线电】"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6144173db5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
