<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西北局宣传部报告处理托派分子金礼仁的经过","authors":["《宣传通讯》编辑部"],"dates":[{"year":1951,"month":12,"day":30}],"is_range_date":false,"parts":[{"text":"西北局宣传部报告处理托派分子金礼仁的经过","type":"title"},{"text":"《宣传通讯》编辑部","type":"authors"},{"text":"今年9月中央曾就西北区学校政治教育状况，向西北局和各中央局发出“关于加强大中学校政治教育并重视政治教员人选的指示”（见本刊第21期），并责成西北局宣传部对西北师范学院政治教员、过去曾担任过西安国民党的训练团的教官和极反动的刊物“抗战与文化”编者托派分子金礼仁，加以查究处理，并把结果报告中央宣传部。","type":"paragraph"},{"text":"据最近西北局宣传部报告称：金礼仁1927年曾混入我党，1933年脱党后，任托派上海市委书记，并长期任匪帮要职，谩骂我党。1949年10月入华北人民革命大学学习，1950年8月西北师范学院张师亮教授在京聘教授时，经中央人民政府教育部介绍，将金请到该院任政治教员。金在年来的工作中，仍以其托派思想和观点教学，如在该校参加军干校的动员会上说：“参加军干校是西北青年出头的好机会，西北上没有很大的人物，西北上掌握军权的多不是西北人”。在教学中说：“马克思主义是十九世纪的学说，在二十世纪就不合适了。”又说：“资产阶级黄金时代过去了，将来还有一个小资产阶级黄金时代，农民阶级黄金时代……”因此在今年暑假被解职回西安。西北军政委员会教育部曾和他几次谈话，但他的态度仍顽强，表示再无检讨和反省的必要。检查告一段落，即送入西北人民革命大学进行思想改造和审查。","type":"paragraph"},{"text":"西北局宣传部的报告，并检讨了他们两年来对教员的在职学习和思想改造，均重视不够；对政治教员的配备，也有许多严重问题，金礼仁不过是其中一例。西北军政委员会教育部在金的问题上采取了严重的自由主义态度，西北局宣传部曾给以口头批评；但是长时期不检查学校教育工作，以致在学校教育工作上造成许多严重现象，西北局宣传部应负主要责任。最近半年来西北局宣传部，已开始重视了对学校教育的思想领导和注意了在教员中培养骨干的工作。中小学校教师经今年暑期清查后，学校工作已有改进，对政治教员也做了若干调整。现正拟制明年大中小学教师在职学习方案，以及即将开始实现高等学校教师思想改造计划，准备有步骤地进行知识分子的思想改造工作，加强学校教育中的工人阶级的思想领导。","type":"paragraph"}],"comments":[],"origin":"中宣部《宣传通讯》第二十八期（1951年12月30日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd12d7a714"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
