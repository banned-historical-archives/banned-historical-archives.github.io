art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"指挥连剖析修正主义路线的社会根源","authors":[],"parts":[{"type":"paragraph","text":"本报讯 七七四九部队指挥连党支部在批修中，有的同志把刘少奇一类骗子的反革命罪行孤立地看作只是个别人的行动。党支部组织大家学习了列宁的论述：“机会主义不是偶然的现象，不是个别人物的罪孽、过错和叛变，而是整个历史时代的社会产物。”（《列宁选集》第二卷第六五四页）并到驻地附近胡家寨生产队进行调查。这个生产队的贫下中农解放前受苦受难，如今队里办起了制药厂、砖瓦厂，家家住进了新房子，有的还添置了自行车、手表或缝纫机，成为红河洲农业学大寨的先进单位。广大贫下中农欢欣鼓舞，而没有改造的地主分子却极端仇恨。干部战士把刘少奇一类骗子攻击无产阶级专政和社会主义的黑话，和地、富、反、坏、右分子的鬼话联系起来分析，发现他们唱的是一个调子，从而看清了刘少奇一类骗子的修正主义路线，正是反映了国内外阶级敌人在中国实行资本主义复辟的愿望。同志们表示，要抓住实质，继续把刘少奇一类骗子的修正主义路线批深批透。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b174f9fee7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
