年","authors":[],"dates":[{"year":1967,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:我们怀着激动的心情，向大家推荐工总司交运联络站和上体司写的两篇文章。"},{"type":"paragraph","text":"交运联络站和上体司的无产阶级革命派同志正确处理“七·九事件”的实例，就是活学活用毛主席两类矛盾学说、活学活用毛主席亲自主持制定的十六条的光辉范例。"},{"type":"paragraph","text":"一个月以前，在一小撮阶级敌人挑动下，交运联络站和上体司之间本来比较容易解决的内部矛盾，陡然变得紧张起来。一场大规模武斗，几乎一触即发。在这个紧要关头，交运联络站和上体司的同志没有辜负上海一千万人民的深切期望，他们以十六条为武器，毅然决然地摒弃小团体的利益，在尖锐复杂的形势下，当机立断，严以责己，宽以待人，正确处理两个革命群众组织之间的内部矛盾，粉碎了阶级敌人妄图扩大事态、制造混乱的阴谋。他们不愧为响当当的无产阶级革命派。"},{"type":"paragraph","text":"“政策和策略是党的生命，各级领导同志务必充分注意，万万不可粗心大意。”交运联络站和上体司“七·九事件”的正确处理，充分显示了十六条的巨大威力。只要我们不折不扣地执行十六条和中央各项方针政策，我们就能无往而不胜；任何离开毛泽东思想和党的政策的盲目行动，就必然会把革命事业引入歧途。每个革命同志，特别是革命群众组织的负责人，都应该从交运联络站和上体司的文章中得到深刻的启示。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7e90b2670"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
