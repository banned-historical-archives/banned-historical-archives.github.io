密文件的通报","authors":[],"dates":[{"year":1950,"month":8,"day":28}],"is_range_date":false,"parts":[{"text":"西南公安部关于贵州仁怀局被匪抢劫机密文件的通报","type":"title"},{"text":"据贵州公安厅八月二十六日称：“遵义区之仁怀局由我处带回之文件，途中被匪抢劫。查明重要文件有：通知一、西南公安部通报一、”公安工作材料“十五至二十一号、中公部表册二十六、联络处通知三、重要通报七、其他三。除已令该县追究责任外，以后各县送文件，必须指定专人随身携带，并签具收据。无论任何情况，如有遗失，应受泄漏秘密处分。送文件或随带文件，必须有保证”等。我们认为：这种丢失文件泄漏机密事件是严重的。除同意贵州公安厅的措施外，特通报各地。望结合实际情，研究具体办法，以防类似事件发生。","type":"paragraph"}],"comments":[],"origin":"《西南工作》 第22期，中共中央西南局编印（党内刊物发至县团），1950年10月18日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cee180d5a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
