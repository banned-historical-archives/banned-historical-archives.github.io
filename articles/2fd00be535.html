dates":[{"year":1951,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社沈阳四日电】　东北许多公营厂矿在国庆节前夕提前完成生产任务，并写信向毛主席和东北人民政府高岗主席报喜。"},{"type":"paragraph","text":"截至九月二十六日止，东北工业部所属各厂矿已有二十九种主要产品超额完成今年三个季度的生产计划。其中汽车内胎超过计划百分之四十四点三，原油超过百分之三十四点三，变压器超过百分之二十四，电石超过百分之二十，电灯泡超过百分之十九点六。又据到九月二十九日止的不完全统计，全东北公营厂矿已提前完成九月份及第三季度生产任务的共有五十余个单位。机器第六厂除完成第三季度的生产计划外，并超额完成了价值四千二百十二吨粮食的增产节约任务。此外，沈阳毛织厂、沈阳电机厂、哈尔滨水泥厂以及东北医疗机械厂的机械、钳工、研磨等车间和东北化学制药厂的葡萄糖车间等，更提前完成了全年的生产任务。"},{"type":"paragraph","text":"各厂矿和许多先进车间职工向毛主席和高岗主席的报喜信中都充分表现了工人阶级的胜利信心和力量。机械局第一厂第五车间全体职工在信中写道:“前几天我们接到生产某种部件八千七百五十四件的紧急任务。经过大家研究，改变了操作方法，结果缩短工时一千小时，节省焦炭五吨、钢料五百公斤，共折合粮食三十四吨八百公斤，完成了任务。目前美帝国主义正加紧重新武装日本，并肆意破坏朝鲜停战谈判；我们非常愤恨，决心用实际行动在生产战线上沉重地打击敌人。”机器第八厂第一车间全体职工在信中写道:“我们第三季度的生产任务已提前七天、超额百分之四十四点二五完成，不合格品由第二季度的百分之四十一降低到百分之零点一五，成本也大大降低，共计增产节约的价值已等于一千六百九十四吨零七百五十公斤粮食，超过原增产节约计划九十四吨零七百五十公斤。我们一定再接再厉，向超过增产节约任务一倍的目标前进!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"高岗","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fd00be535"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
