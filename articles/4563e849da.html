rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席给了我无穷力量","authors":["战士巩德"],"parts":[{"type":"paragraph","text":"八月三十一日，我见到盼望已久的我们最最敬爱的领袖毛主席！毛主席身穿草绿色军装，戴着鲜红的帽徽和领章，满面红光，神采奕奕，身体非常健康。我的心情从来没有这样激动！当时我总想多看几眼。汽车从我们面前缓缓通过，但我总觉得一刹那就过去了。我高兴得禁不住跳起来欢呼：“毛主席万岁！毛主席万岁！”"},{"type":"paragraph","text":"我见到了毛主席，觉得毛主席好象在问我：“你革命革得怎样？彻底不彻底呀？”所以，会见后我又感到非常惭愧，惭愧的是自己革命革得还很不彻底，思想和工作都还有不少缺点。对毛主席著作学习得也还不够。这次见到毛主席，给我增添了无穷的力量。我一定遵照林彪副主席的指示，永远高举毛泽东思想伟大红旗，更好地活学活用毛主席著作，在“用”字上狠下功夫。特别是在当前无产阶级文化大革命中，更要狠学狠用，用毛泽东思想作武器，横扫一切牛鬼蛇神，把无产阶级文化大革命进行到底！把社会主义革命进行到底！永做毛泽东思想的红色卫兵，坚决保卫无产阶级的铁打江山。"},{"type":"paragraph","text":"DW：4579部队"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4563e849da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
