torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"一军团主力暂在现地待机","alias":"","parts":[{"type":"paragraph","text":"一军团主力暂在现地待机！"},{"type":"paragraph","text":"（1936年9月18日）彭司令员："},{"type":"paragraph","text":"两次电达朱张，要其速占界石铺，尚未得复。打击胡军，须以四方面军为主力，在其部署与决心未明之前，一军团主力暂时宜在现地待机。如能在固原北部再给何柱国二个打击，使后路无被切断之虞则更稳妥。将来进攻宁夏，一方面军只能从盐池、豫旺、同心城分路前进，而以同心城以西划为四方面军之作战线，故后路保持甚为重要。请酌行。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十八日二十时"},{"type":"paragraph","text":"[1]这是毛泽东给红军第一方面军司令员、西方野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]指1936年9月15日毛泽东、周恩来、彭德怀，17日12时毛泽东、周恩来给朱德、张国焘的电报。"},{"type":"paragraph","text":"[3]胡，指胡宗南，当时任国民党军西北“剿匪”总司令部第一军军长兼第一师师长。"},{"type":"paragraph","text":"[4]何柱国，当时任国民党军西北“剿匪”总司令部骑兵军军长。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":147,"page_end":147},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95e32682f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
