地千余女工在伦敦示威要求同工同酬","authors":[],"dates":[{"year":1969,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削　要求改善工作和生活条件"},{"type":"paragraph","text":"意大利十多万工人和雇员罢工"},{"type":"paragraph","text":"英国各地千余女工在伦敦示威要求同工同酬"},{"type":"paragraph","text":"据新华社二十日讯  罗马消息：意大利人民反对垄断资产阶级的残酷剥削，反对失业和贫困，要求改善工作和生活条件的群众斗争此伏彼起。"},{"type":"paragraph","text":"意大利政府控制的各个社会机构的十多万工人和雇员十九日举行了全国性的罢工，要求增加工资。他们决心把这次罢工进行到底。这次罢工斗争是由全国社会保险局的两万二千名雇员在将近一个月前首先发起的，目前已扩大到意大利政府控制的一切社会机构。"},{"type":"paragraph","text":"与此同时，由于邮递员采取怠工行动，在意大利各个邮局、火车站和飞机场积压了数以吨计的邮件和包裹。"},{"type":"paragraph","text":"在意大利南部的福贾省，一万二千名工人、学生和居民十九日冲进了一家大化学企业。这次示威是四天来举行的第二次，是为反对垄断资本的残酷剥削、抗议失业。"},{"type":"paragraph","text":"据新华社伦敦电　来自英国各地的一千多名女工，十八日在伦敦举行示威游行和集会，反对垄断资本对女工的残酷剥削，要求同工同酬。"},{"type":"paragraph","text":"示威的女工们举着的标语牌上写着“立即实行同工同酬”。示威者在集会的发言中和散发的传单中都揭露了垄断资本对女工的剥削，并要求取消“在就业、受教育和公共生活方面对妇女的歧视。”"},{"type":"paragraph","text":"英国现有女工九百万，约占英国总劳动力的三分之一。虽然英国女工为争取同工同酬斗争了几十年，但是由于垄断资本勾结黄色工会头子进行阻挠破坏，目前仍有百分之九十的女工享受不到同工同酬。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e3395e13c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
