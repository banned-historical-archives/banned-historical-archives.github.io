script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"开展对胡适派反动的资产阶级唯心论思想的斗争华东作家协会昨起举行理事会扩大会议","authors":[],"dates":[{"year":1954,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　为开展对胡适派反动的资产阶级唯心论思想的批判和斗争，以树立和巩固马克思列宁主义的思想战线，加强和提高文艺思想的战斗性，华东作家协会于昨日上午开始举行理事会扩大会议。"},{"type":"paragraph","text":"出席昨日会议的有华东作家协会主席夏衍，副主席巴金、于伶、靳以、许杰，理事方令孺等二十六人，该会在上海的会员和江苏、安徽、浙江、山东各省的部分会员，文艺领导干部，华东美术家协会、华东音乐家协会、上海文联、上海剧影协会的代表，上海青年工人文艺作者，驻沪部队文艺工作者代表，以及报刊、出版社编辑人员，共计一百七十九人。"},{"type":"paragraph","text":"昨日会议由夏衍、孔罗荪传达了最近中国文学艺术界联合会主席团与中国作家协会主席团扩大联席会议上关于检查“文艺报”编辑工作和对“红楼梦”研究中资产阶级唯心论的批判的情况与会议的基本精神；黄源作了关于华东作家协会机关刊物“文艺月报”编辑工作初步检查的报告。"},{"type":"paragraph","text":"会议将就以上报告展开讨论，以检查和改进华东作家协会和“文艺月报”的工作，贯彻和资产阶级文艺思想战斗的任务，并宣布改组华东作家协会为中国作家协会上海分会。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"488af176f6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
