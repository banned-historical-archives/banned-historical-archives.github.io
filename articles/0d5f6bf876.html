art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"欲降千里 驹须有好骑术","authors":["张妙奇李振国"],"parts":[{"type":"paragraph","text":"某师农场引进的化学除草剂“氟乐灵”到手以后，却因缺少科学知识，使应有的效用没有发挥出来，不仅造成了人力、物力的浪费，而且影响了大豆产量。这一教训告诉我们这样一个道理：欲降千里驹，须有好骑术。"},{"type":"paragraph","text":"邓小平同志在全国政协举行的新年茶会上指出，要建立一支坚持社会主义道路的、有专业知识的干部队伍。随着四化建设的发展，部队一些先进的科学技术和装备也必将陆续增多。这就要求我们的干部，既要红，又要专。应该看到，我们有的同志现在具有的专业知识、科学文化水平与先进的技术装备，存在着很大的差距。如果没有紧迫感，不努力赶上去迅速缩短这个差距，一旦先进的科学技术和装备到来，就会束手无策。要想驾驭它、使用它，那是十有八九要碰钉子、吃苦头的。降伏千里驹并非轻而易举，掌握好骑术也不是一日之功，必须从现在就努力做起。那种认为我们单位目前还没有先进的技术装备，学不学科学文化和专业知识无所谓，或者觉得等有了先进装备再学也不迟，等等想法都是不对的。当然，办任何事情，第一次失败的先例并不少见。但是“亡羊补牢，犹未为晚”。只要我们善于吸取教训，虚心学习，勇于实践，逐步积累经验，也是不难转败为胜，为四个现代化做出贡献的。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d5f6bf876"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
