script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度《解放》月刊揭露印修在西孟加拉邦的反革命罪行  印修忠实地为大地主大资产阶级效劳  勾结丹吉叛徒集团欺骗人民镇压革命运动","authors":[],"dates":[{"year":1968,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度《解放》月刊揭露印修在西孟加拉邦的反革命罪行"},{"type":"paragraph","text":"印修忠实地为大地主大资产阶级效劳"},{"type":"paragraph","text":"勾结丹吉叛徒集团欺骗人民镇压革命运动"},{"type":"paragraph","text":"据新华社十八日讯  新德里消息：印度革命月刊《解放》第二期发表文章，揭露印共修正主义分子勾结丹吉叛徒集团，充当大地主、大资产阶级的走狗，欺骗人民，镇压革命运动的反革命面目。"},{"type":"paragraph","text":"文章说：印度反动统治阶级去年十一月解散了印共修正主义分子勾结丹吉叛徒集团和其他反动政客组成的所谓西孟加拉邦联合阵线政府。"},{"type":"paragraph","text":"文章问道：既然联合阵线政府象忠实的走狗一样为大地主和大资产阶级服务，那么它为什么会解散？"},{"type":"paragraph","text":"文章指出：纳萨尔巴里点燃了有席卷大片乡村地区之势的火焰。一个革命的浪潮将要横扫全国。用毛泽东同志的话来说：“它是站在海岸遥望海中已经看得见桅杆尖头了的一只航船，它是立于高山之巅远看东方已见光芒四射喷薄欲出的一轮朝日，它是躁动于母腹中的快要成熟了的一个婴儿。”作为资产阶级——地主专政机构的一部分，联合阵线政府设立了数百处警察营地、营地法庭、流动法庭，等等，来扼杀这个正要出生的婴儿。现在，当把印共革命派领导人投入监狱的时刻，当其他数以百计的革命者要被逮捕，或受迫害的时候，当要对觉醒了的农民采取有组织的暴力行动的时候，如果联合阵线政府还继续执政，“马克思主义”领袖们（按指印共修正主义头目）就会暴露无遗，他们就不能在党的队伍和人民中间兴风作浪了。因此，需要他们转而扮演别的角色。"},{"type":"paragraph","text":"文章揭露说，自称“马克思主义者”的印共修正主义头目，是口是心非的。他们用革命的词句欺骗党员和群众，同一贯反共、反华、反人民的反动政党互相勾结，操纵伪选举，吹捧资产阶级的民主。"},{"type":"paragraph","text":"文章接着揭露了印共修正主义分子在西孟加拉邦搞所谓联合阵线政府，推行为剥削阶级服务的反动政策。文章说：在粮食战线上，联合阵线政府在其当政期间，撤销了对地主征购的命令，听任地主和其他黑市商人在这一年中捞取他们前所未有的巨额利润。所有收购的粮食都是来自最贫苦的农民，而没有动囤积居奇者和投机商人一根毫毛。这的确是一场残酷的阶级斗争。在工业战线上，联合阵线政府提出“不是增加罢工和停工，而是增加生产”和实行“劳资休战”的投降主义口号，瓦解工人的罢工斗争，甚至引用反动法令大肆逮捕工人。在农业战线上，联合阵线政府主张“使土地拥有人得到应得的份额”，即把目前最可恶的封建剥削形式继续保持下去，并且同警察密切配合，镇压贫农对现行制度的种种反抗。文章指出，印共修正主义分子是披着“马克思主义”外衣的大地主和大资产阶级的走狗，直到他们掌权的最后一刻，都忠实地为他们的主子效劳。"},{"type":"paragraph","text":"文章最后说：印度的形势确实大好。劳苦人民憎恨国大党。那些所谓的“社会主义政党”和丹吉叛徒集团的面目已经暴露。不管印共修正主义分子怎样想方设法，他们也象其他“社会主义者”和丹吉叛徒集团一样，决不会有好下场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93f030c13e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
