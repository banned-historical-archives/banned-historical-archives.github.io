ar":1952,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海五反斗争的第一战役已胜利结束。在这一战役中，创造了很多宝贵的经验，争取资本家家属参加战斗，也是重要的经验之一。"},{"type":"paragraph","text":"事实说明，上海解放三年来，青年、妇女都有了很大的进步，资产阶级的家属中，也有很多进步革命的分子。这些人，在五反斗争中将发生很大的力量。如中华铁工厂的资方童伯型，起先不肯坦白，他的弟弟、长女、二女和二女婿都是共产党员，他们开了一夜的家庭会议，说服童伯型，而童的两个参干的儿子也写信来规劝他的父亲。童伯型在重重的包围下，终于彻底坦白，交代了问题。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\04\\5242050401.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b011001933"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
