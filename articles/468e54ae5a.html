ates":[{"year":1984,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"前些日子去亲戚家，看到弄堂的墙壁上，留有“誓死捍卫”和“永远忠于”等“文化大革命”的标语口号的残迹。类似这种残迹，在主要马路上已不大见到，但在次要马路和里弄中时有所见，有的虽经多次粉刷，但陈迹依然隐约可见。这种陈迹，甚至在有的机关内也还能见到。"},{"type":"paragraph","text":"清除“文革”期间标语口号的工作已进行过多次，但不很彻底，清除时大多是用石灰水和水泥浆涂抹，因而经不起风吹雨淋，随着泥灰的剥落，标语口号的字迹又依稀可见了。目前，正在进行彻底否定“文化大革命”的教育，在这个时候，彻底清除“文革”残迹已非一般具体事务工作。建议在迎接建国三十五周年整顿市容环境中，把彻底清除“文革”残迹的工作严肃认真地抓一抓。"},{"type":"paragraph","text":"盛松兴"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"468e54ae5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
