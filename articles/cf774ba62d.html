script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿根廷成立国家安全委员会  官方认为叛乱分子大都属极左组织","authors":[],"dates":[{"year":1989,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿根廷成立国家安全委员会"},{"type":"paragraph","text":"官方认为叛乱分子大都属极左组织"},{"type":"paragraph","text":"新华社布宜诺斯艾利斯１月２５日电  阿根廷总统阿方辛２５日签署法令，决定成立国家安全委员会，以协助政府对付恐怖主义。"},{"type":"paragraph","text":"根据法令，国家安全委员会由内政部长、国防部长、外交部长、陆、海、空三军司令及联合参谋部成员组成。据政府人士说，阿根廷国家情报局长也将参加这个解决国内动乱局势的“危机内阁”。"},{"type":"paragraph","text":"同日，阿方辛还要求总检察长协调各检察长的行动，以便对“危害公共安全的严重罪行进行最迅速和有效的调查”。"},{"type":"paragraph","text":"据认为，这是政府在平息了本月２３日武装叛乱分子偷袭陆军第三步兵团事件后，阿方辛总统所采取的最重要措施。"},{"type":"paragraph","text":"新华社布宜诺斯艾利斯１月２５日电　阿根廷总检察长安德烈斯·达莱斯２５日下午公布了一批攻占陆军第三步兵团团部武装叛乱分子的名单。官方认为，叛乱分子“大都是极左组织成员”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf774ba62d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
