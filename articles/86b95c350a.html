script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在上海参加今年全国体操分区比赛的运动员、　教练员等集会愤怒声讨天安门广场事件的罪魁祸首邓小平决心更紧密地团结在以毛主席为首的党中央周围，掀起一个批判邓小平、反击右倾翻案风、追查反革命的新高潮","authors":[],"dates":[{"year":1976,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　毛主席、党中央的英明决策，极大地激发了正在上海参加一九七六年全国体操分区比赛的运动员、教练员、裁判员、工作人员和工农兵评论员的革命斗志，他们在二十三日举行了“坚决拥护中共中央决议、愤怒声讨邓小平罪行大会”。会上群情激昂，大家热烈欢呼毛主席革命路线的伟大胜利，愤怒声讨党内最大的不肯改悔的走资派邓小平的翻案复辟罪行，愤怒声讨一小撮阶级敌人在天安门广场制造反革命政治事件的罪行，决心更紧密地团结在以毛主席为首的党中央的周围，以实际行动发展大好形势，掀起一个批判邓小平、反击右倾翻案风、追查反革命的新高潮。"},{"type":"paragraph","text":"在批判会上，运动员、教练员等揭发和声讨了制造天安门广场反革命政治事件的一小撮阶级敌人的罪行。安徽队教练员唐其解愤怒地说:在天安门广场制造反革命政治事件的一小撮阶级敌人公开打出拥护邓小平的旗号，胡说什么“由邓小平主持中央工作，斗争取得了决定性胜利”，恬不知耻地为邓小平歌功颂德。事情很清楚，邓小平反革命的修正主义路线集中代表了党内外资产阶级和没有改造好的地、富、反、坏、右的利益。邓小平狂热地搞复辟倒退，大刮右倾翻案妖风，一小撮反革命分子就兴风作浪。邓小平就是天安门广场反革命政治事件的罪魁祸首。湖南队运动员王平说:天安门广场的反革命政治事件，是一小撮阶级敌人的一次大暴露，是一个极好的反面教材，使我们进一步认识到社会主义历史阶段阶级斗争的规律和特点。事实充分说明，邓小平是天安门广场事件的总后台，反革命分子需要邓小平做他们的头子。邓小平罪责难逃，肇事的反革命分子必须追查。"},{"type":"paragraph","text":"发言的同志指出，这次发生在天安门广场的反革命政治事件，又充分说明了邓小平鼓吹的阶级斗争熄灭论的彻底破产。裁判员苏雪倩说:毛主席教导我们，对于阶级斗争要“年年讲，月月讲，天天讲”。但是，邓小平却到处兜售阶级斗争熄灭论的破烂货，叫嚷什么“阶级斗争哪能天天讲”。天安门广场的反革命政治事件又一次戳穿了邓小平的骗局，从反面教育了我们:在整个社会主义历史阶段，千万不能忘记阶级、阶级矛盾和阶级斗争。只有紧紧抓住阶级斗争这个纲，坚持党的基本路线，才能把社会主义革命进行到底。解放军体院队教练员林楷说:天安门广场的反革命政治事件已经被粉碎了，但是我们既要看到斗争后的胜利，更要看到胜利后的斗争。因为“走资派还在走”，斗争还在继续，我们一定要紧跟毛主席的伟大战略部署，坚持以阶级斗争为纲，密切注意阶级斗争新动向。参加批判会的工农兵评论员、运动员、工作人员一致表示，要认真学习毛主席的重要指示，深入批判邓小平的反革命的修正主义路线，把反击右倾翻案风的斗争进行到底。"},{"type":"paragraph","text":"这次全国体操分区比赛(上海赛区)于本月二十四日至三十日举行，参加的有广东、江西、江苏、安徽、浙江、湖南、福建和上海等八个省、市的一百十六名男女运动员，其中江苏和湖南队是去年全运会男女体操团体第一名。市青少年业余体校队参加测验。这些队自十九日到达上海后，坚持以阶级斗争为纲，每天保持一小时以上的学习和批判，每队都出了大批判专栏，运动员们精神振奋，斗志昂扬。赛前，广东、江西、福建、上海等队进行了共同训练，交流了经验。他们决心以政治统帅比赛，为努力提高我国体操运动水平作出贡献。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86b95c350a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
