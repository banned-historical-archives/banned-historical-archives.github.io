<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蒙古人民深为中国工人的无产阶级国际主义精神所感动，他们得出的共同结论是：毛泽东教导的中国工人就是好","authors":[],"dates":[{"year":1966,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蒙古人民深为中国工人的无产阶级国际主义精神所感动，他们得出的共同结论是："},{"type":"paragraph","text":"毛泽东教导的中国工人就是好"},{"type":"paragraph","text":"中国援蒙工人牢记毛主席的教导，根据无产阶级国际主义精神，十年如一日，艰苦奋战在蒙古各地许多建设战线上，为蒙古人民的经济生活作出了贡献。中国工人的崇高精神和行动深深地打动了蒙古人民的心，他们热烈赞扬这些毛泽东派来的好工人。"},{"type":"paragraph","text":"十年来，中国援蒙工人先后为蒙古人民建成了大量的工程项目。其中有长达三百七十七米的大型桥梁，总长度为一百一十多公里的乌兰巴托市内道路和郊区公路，总面积达几十万平方米的大建筑群和许多现代化企业。蒙古人民把这些工程看作是“蒙中两国人民伟大友谊的象征”。"},{"type":"paragraph","text":"当中国援蒙工人修建的乌兰巴托市和平大桥举行移交仪式时，离城一百多里以外的牧区人民也赶来参加。他们情意深长地抚摸着桥栏，用脸紧贴在水磨石上，久久舍不得离开。乌兰巴托第一期住宅工程竣工后，搬进新居的一位蒙古人激动地表示，他要给毛主席拍个感谢电。"},{"type":"paragraph","text":"通过中国援蒙的这些巨大工程，通过中国工人十年来的忘我劳动，蒙古人民清楚地看到，具有高度无产阶级国际主义精神的中国人民是最可信赖的大公无私的朋友和兄弟。他们对中国工人不怕苦、不怕累、干劲大、责任心强的高尚品质赞不绝口。他们说，“中国工人是真心实意帮助我们建设的，没有任何私心”。他们认为中国的援助是“听不见，看得见，摸得着”，而不像有些国家的援助那样，光是“听得见”，可是“看不见，摸不着”。他们高度评价中国援蒙工程的质量和效率，认为“施工进度特别快，工程质量特别好，是蒙古工人建筑施工的典范”。曾经长期同中国工人并肩劳动的蒙古工人诚挚地表示，要把“中国同志的作风和教给的技术传下去”，因为“这是中国同志留给他们最珍贵的礼物”。"},{"type":"paragraph","text":"“毛泽东好，中国好，毛泽东教导出来的中国工人干得好。”这是蒙古人民积十年之经验得出的共同结论。因此，每当蒙古人民向中国援蒙人员倾吐内心的友情时，总是口口声声地说：“毛泽东依赫赛、依赫赛（毛泽东非常好、非常好）。”"},{"type":"paragraph","text":"中国援蒙工人在修建乌兰巴托的一条道路时，一位三十多岁的蒙古人走到工地说：“你们干得就是好，我们蒙古人都看得清楚。你们是在毛泽东思想指导下这样干的。”一位退休老工人在参观了二十二万平方米的住宅工程以后说：“中国工人不但帮助我们建设了许多高楼，乌兰巴托闹大水时还救了很多蒙古人的命。我非常崇拜毛主席，毛主席就是列宁，他是最伟大的领袖。”"},{"type":"paragraph","text":"中国援蒙某单位要移到另一个地方时，周围的蒙古居民特地前来送行。他们说：“中国好，毛泽东好，只有毛主席领导的新中国，才能在最困难的时候帮助我们。我们永远忘不了毛主席的好处。”"},{"type":"paragraph","text":"现在，数千名中国援蒙工人学习了党的八届十一中全会的公报以后纷纷表示：要更高地举起毛泽东思想的伟大红旗，发扬无产阶级国际主义精神，更好地完成援蒙任务，让毛泽东思想在中国援蒙工程上大放光芒。　（据新华社讯）（附图片）"},{"type":"paragraph","text":"我国援蒙工人正在向蒙古工人传授技术。"},{"type":"paragraph","text":"新华社稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4c60594e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
