[],"dates":[{"year":1977,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国挪威工人罢工反对垄断资本剥削"},{"type":"paragraph","text":"希腊教师罢教要求提高工资"},{"type":"paragraph","text":"新华社讯　华盛顿消息：美国通用汽车公司八千六百多名工人一月二十日举行罢工，抗议垄断资本家在劳资谈判中拒绝满足工人的合理要求。"},{"type":"paragraph","text":"罢工工人在通用汽车公司设在底特律以北的七个工厂外面设置了纠察线。另据报道，纽约市港口的看守人二十日曾举行罢工，码头工人表示尊重他们设置的纠察线，拒绝工作。"},{"type":"paragraph","text":"新华社斯德哥尔摩一九七七年一月二十六日电  奥斯陆消息：挪威首都奥斯陆海港约二百名码头工人从一月六日起罢工。目前，这一斗争仍在继续中。在罢工期间，工人拒绝装卸，使挪威这个主要港口陷于瘫痪。"},{"type":"paragraph","text":"奥斯陆海港码头工人为废除不合理工资制度，多年来进行了不懈的斗争。奥斯陆码头工人的罢工斗争，得到挪威全国各地劳动人民的广泛支持。首都和各地的工人纷纷罢工和捐款。学生也举行集会声援奥斯陆码头工人的正义斗争。挪威其他一些港口的码头工人为了支持奥斯陆码头工人的斗争，拒绝给从奥斯陆港口改调到这些港口的船只装卸货物。瑞典码头工人联合会委员会作出决定，瑞典码头工人拒绝给从奥斯陆港改调到瑞典港口的任何船只装卸货物。"},{"type":"paragraph","text":"挪威工人共产党（马列）中央职工委员会两次发表声明，表示坚决支持码头工人的正义斗争。"},{"type":"paragraph","text":"新华社雅典电　大约三万五千名希腊公立小学教师去年十二月十日开始四十八小时罢教，要求提高工资。公立小学教师协会发表的声明说，这次罢教将会成为不定期罢教，因为教师现在的处境很困难，他们除了继续坚持斗争别无其他办法。"},{"type":"paragraph","text":"希腊各地的技术和职业学校的教师从去年十二月九日开始举行四十八小时罢教。"},{"type":"paragraph","text":"希腊的一千六百所公立中学（学生约五十五万人）的教师在去年十一月二十四日和二十五日也曾罢教两天。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5495c6f10c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
