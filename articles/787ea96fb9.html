ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对《人民日报》社论稿《日本人民争取独立的道路》的批语","alias":"","parts":[{"type":"paragraph","text":"对《人民日报》社论稿《日本人民争取独立的道路》的批语"},{"type":"paragraph","text":"（1952年7月14日）少奇同志："},{"type":"paragraph","text":"此件应以庆祝为主题，故改换一个题目，并于最后加了一段鼓励和庆祝的话。“很大的篇【幅】不很切题，但也勉强可用，不好作大改了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十四日"},{"type":"paragraph","text":"[1]毛泽东将社论稿的题目改为《庆祝日本共产党的三十年》。在社论稿末尾，他加写的一段话是：“光荣的英勇的日本共产党在其三十年历史中，获得了丰富的经验。这个党是以马克思列宁主义武装自己的，这个党是联系人民群众的，这个党是学会了批评和自我批评的武器的。因此我们有根据相信，这个党是能够领导日本人民革命获得胜利的。当此日本共产党建党三十周年之际，我们中国共产党人和中国人民谨以兄弟般的友谊致其深切的庆贺之忱。”这篇社论刊载于1952年7月15日《人民日报》。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":171,"page_end":171},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"787ea96fb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
