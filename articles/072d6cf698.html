起自杀案","authors":["蒋青萍"],"dates":[{"year":1956,"month":2,"day":20}],"is_range_date":false,"parts":[{"text":"江苏省在资本主义工商业改造中发生七起自杀案","type":"title"},{"text":"蒋青萍","type":"authors"},{"text":"【江苏分社20日讯】江苏省在资本主义工商业改造中，有七个商业资本家、小商贩和职工自杀，其中有四人身死。自杀案中有四起是因追逼增加资金而引起的。另三起是因歇业已久，生活困难，在这次社会主义改造高潮中又没被批准参加全行业合营或对他们的工作未加以安排，而自感没有出路的。兴化县小商贩徐怀礼今年已六十二岁，家中只有夫妻两人，靠摆五洋摊和兼做木工积蓄了一、二百元。去年12月上旬五洋业召开全体摊贩委员大会，动员增加资金，当场要大家写自认书。徐怀礼勉强承认增资三十元。接着又开大会，继续动员增资，他又增加了十元。12月底接连三天开大会动员并店合营。徐顾虑很多，1月初企图投河自杀未遂。1月8日，该业又开会继续搞通增资思想，徐怀礼由于对参加合作社后能不能兼业及年龄大、不能维持生活等顾虑没有解决，9日上午悬梁自杀。丰县城关区因对杂货业私商张继升自报的资金扣得过紧，致使张要回家卖掉平车入股。张的妻子不同意卖平车，两人发生争吵。张的妻子气得上吊自杀(未死)。清江市万福堂国药店资金短绌，1952年自动闭歇。该店老板章臣科想在这次社会主义改造中参加全行业合营，借此解决生活困难，向同业公会申请参加全行业合营，没有批准。章自感没有出路，1月29日服毒自杀。高淳县潘桥区河城镇赵士金，五十三岁，在福兴肉店当职工已三十年，去年该店困难，被迫退店，运动中要求回店，遭到老板拒绝，自觉无出路悬梁自杀。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1956年2月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"072d6cf698"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
