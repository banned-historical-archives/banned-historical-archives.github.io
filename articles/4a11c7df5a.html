art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"印度工人无限敬仰毛主席","authors":[],"parts":[{"type":"paragraph","text":"我国一艘远洋航行的轮船途经印度加尔各答港，进行维修。印度工人在与中国海员接触时，表达了对伟大领袖毛主席的无限崇敬的心情。他们说，毛主席教导你们造反有理，我们印度人民也要造帝国主义和反动统治的反。"},{"type":"paragraph","text":"一位印度工人说，“印度的粮荒比新闻报道上说的要严重得多，成亿的人缺粮，几百万人长年挨饿。”当中国海员关切地询问为什么印度人民长期过着痛苦的生活时，这些印度工人立刻愤怒地指出，这是由于印度反动政府的反动统治。中国海员也自然地回忆起中国人民在解放前和印度人民十分相似的悲惨景况，并满怀激情地说，是我们伟大的领袖毛主席教导中国人民闹革命，搬掉了压在中国人民头上的三座大山，中国人民才获得了解放。印度工人听了无限羡慕，并且激动地说：“中国朋友说得完全对，毛主席教导你们造反有理，不但对你们适合，今天对我们印度人民来说也是一样，我们也要造帝国主义的反，造反动统治的反！”"},{"type":"paragraph","text":"中国海员把印有毛主席在天安门接见革命群众的图片的《人民画报》和一部英文版《毛主席语录》送给他们，他们立刻高兴得高呼：“毛泽东，好！毛泽东，伟大！”同中国朋友热烈握手以后，他们把《毛主席语录》这本革命宝书高高举起说：“毛泽东思想你们要学，我们也要学，全世界革命人民都要学。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a11c7df5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
