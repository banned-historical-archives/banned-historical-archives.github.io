script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级猖狂进攻一例","authors":[],"dates":[{"year":1952,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5239020801.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二十五)一九五一年四月孙建国找到了过去一起工作的、时任军委后勤部计划处长的朋友罗文，请罗文介绍担任了后勤部供应处副主任。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5239020802.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二十六)于是奸商们更像苍蝇似的围绕着他，孙建国到广州去组织办事处时，奸商边裕民等陪同前往，经过天津时，奸商三、四十人在车站欢送。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5239020803.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二十七)他回北京后，奸商进一步向供应处全面进攻，李孝直和廿多个奸商都打入供应处当了干部，经常以供应处名义在外撞骗，并和私商勾结，大量盗窃国家财产。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5239020804.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二十八)在三反运动中，孙建国自动彻底坦白，并检举了有关的奸商。在北京市公审大贪污犯临时法庭上被判徒刑十年、缓期执行，脏款全部追缴。同案其他各犯另行审判。(完)"},{"type":"paragraph","text":"朱波　原文　钱予凡　改编　杨锦文　画\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e朱波\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱予凡\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e杨锦文\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f663b42070"},"bui
