dates":[{"year":1977,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邮电部发行毛主席逝世一周年和毛主席纪念堂建成纪念邮票"},{"type":"paragraph","text":"新华社一九七七年九月七日讯　为纪念伟大的领袖和导师毛主席逝世一周年，邮电部决定于一九七七年九月九日发行《伟大的领袖和导师毛泽东主席逝世一周年》纪念邮票一套，共六枚。"},{"type":"paragraph","text":"第一枚：毛主席永远活在我们心中。画面是毛主席像，装饰了金色边框。下方用红太阳和大海波涛组成图案。其余五枚的下方均用梅花组成图案。"},{"type":"paragraph","text":"第二枚：毛主席在陕北。"},{"type":"paragraph","text":"第三枚：毛主席在七届二中全会上作具有伟大历史意义的重要报告。"},{"type":"paragraph","text":"第四枚：毛主席在雄伟的天安门上向全世界庄严宣告中华人民共和国成立。"},{"type":"paragraph","text":"第五枚：毛主席和他的亲密战友周恩来同志、朱德同志在一起。"},{"type":"paragraph","text":"第六枚：毛主席检阅无产阶级文化大革命大军。"},{"type":"paragraph","text":"这套邮票的面值均为八分。"},{"type":"paragraph","text":"新华社一九七七年九月七日讯　为纪念伟大的领袖和导师毛泽东主席纪念堂胜利建成，邮电部定于一九七七年九月九日发行《伟大的领袖和导师毛泽东主席纪念堂》纪念邮票一套，共两枚。"},{"type":"paragraph","text":"第一枚：伟大的领袖和导师毛泽东主席纪念堂。画面是宏伟壮丽、金碧辉煌的毛主席纪念堂。背景是苍翠挺拔的青松，象征着伟大领袖和导师毛主席永远活在我们心中，毛主席的丰功伟绩犹如葱郁的松柏永垂青史。"},{"type":"paragraph","text":"第二枚：英明领袖华主席为毛主席纪念堂的亲笔题字。画面是华主席亲笔书写的“毛主席纪念堂”六个金光闪闪的大字。"},{"type":"paragraph","text":"邮票的边框装饰着金色的葵花，象征着亿万人民永远心向毛主席，决心高举和捍卫毛主席的伟大旗帜，紧跟英明领袖华主席，誓将毛主席开创的无产阶级革命事业进行到底。"},{"type":"paragraph","text":"这套邮票的面值均为八分。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9bc368339"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
