rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"三轮车工人抗议蒋匪帮严重剥削","authors":[],"parts":[{"type":"paragraph","text":"据台湾报纸消息，台北市三输车工人五百多人，8月24日集体前往伪“立法院”请愿。请愿的三轮车工人代表向人们诉说，他们的三轮车都是“以毕生血汗所得资财在本市合法购买”的，而当地警察局竟“奉命”不准车辆过户，不发给执照，不承认他们的所有权，因此无法营业，“迫使近万劳工及眷属生活陷于绝境”。8月25日，在台南县火车站前营业的三轮车工人，对蒋匪帮向他们征收“国防特别捐”表示强烈不满，联合向有关部门请愿。三轮车工人高昭明告诉候车的旅客，当地火车站根据“铁路局”规定，对每部三轮车每月坐地收租从八元提高到十一元台币之后，现在又向他们征收“国防特别捐”三成，“弄得三轮车工友个个叫苦连天”，每月收入不能养活家人。"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3ec5a10c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
