ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"在国务院关于召开粮食工作汇报会议的通知上的批语","alias":"","parts":[{"type":"paragraph","text":"在国务院关于召开粮食工作汇报会议的通知上的批语"},{"type":"paragraph","text":"（1955年9月10日）陈云同志："},{"type":"paragraph","text":"这种分批短期检查工作的办法很好，请告一切财经部门仿行。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十日[1]陈云，当时任中共中央书记处书记、国务院副总理。"},{"type":"paragraph","text":"[2]国务院1955年9月8日关于召开粮食工作汇报会议给湖南、湖北、江西、广东、广西、江苏、浙江、安徽、四川等九省人民委员会的通知说，为了迅速交流今年农村粮食定产、定购、定销工作的经验，及时指导运动的开展，发扬成绩，纠正缺点，国务院责成第五办公室于本月12日召开第一批汇报会议，由上述九省各派一名掌管粮食“三定”工作和熟悉情况的财粮贸办公室主任或副主任一人参加。汇报内容主要是各地“三定”工作的主要情况和存在的问题，工作中可能发生的偏差，比如定产粗糙，购销脱节，重购轻销，以及是否有因任务繁忙而将粮食工作滑过去的危险等。会期暂定两天，每省在会上汇报的时间为半小时。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":360,"page_end":360},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eddfec3926"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
