art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伟大的领袖毛主席我要永远跟着您！","authors":["民兵连长罗昌秀"],"parts":[{"type":"paragraph","text":"毛主席会见首都革命群众的消息传来，我心里万分激动！"},{"type":"paragraph","text":"毛主席最爱人民，人民最爱毛主席。最敬爱的领袖毛主席，永远和我们在一起！"},{"type":"paragraph","text":"我们全国人民和全世界革命人民的心，永远跟着毛主席！永远跟着战无不胜的毛泽东思想！"},{"type":"paragraph","text":"亲身的经历告诉我：毛主席是我救命的恩人！毛泽东思想是革命人民的命根子！"},{"type":"paragraph","text":"谁把我这个“白毛女”从人间地狱中拯救出来？"},{"type":"paragraph","text":"是伟大的领袖毛主席！"},{"type":"paragraph","text":"谁教育我明辨是非，分清敌我？"},{"type":"paragraph","text":"是伟大的领袖毛主席！"},{"type":"paragraph","text":"谁把我培养成劳动模范、民兵连长？"},{"type":"paragraph","text":"是伟大的领袖毛主席！"},{"type":"paragraph","text":"谁把我这个旧社会的“鬼”，变成新中国的主人？"},{"type":"paragraph","text":"是最伟大、最伟大的领袖毛主席！"},{"type":"paragraph","text":"毛主席呀，毛主席！您的恩情比天高，比海深。"},{"type":"paragraph","text":"毛主席呀，毛主席！我要永远跟着您！"},{"type":"paragraph","text":"全世界一切被压迫、被奴役的人民，也都和我一样，永远跟着您！"},{"type":"paragraph","text":"毛主席呀，毛主席，我坚决响应您的伟大号召，把无产阶级文化大革命进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3576d78552"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
