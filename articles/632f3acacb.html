script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"墨西哥一些报纸发表社论  谴责苏美超级大国剥削弱国人民","authors":[],"dates":[{"year":1974,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"墨西哥一些报纸发表社论"},{"type":"paragraph","text":"谴责苏美超级大国剥削弱国人民"},{"type":"paragraph","text":"据新华社墨西哥城一九七四年九月二十五日电　墨西哥一些报纸九月二十五日发表社论，谴责苏美两个超级大国对弱国人民的剥削。"},{"type":"paragraph","text":"墨西哥《宇宙报》发表题为《争取建立一种新的世界秩序》的社论中说，两个超级大国——俄国和美国力图拥有尽可能大的势力范围，它们“从不曾停止过对它们势力范围内那些弱国人民的剥削，对他们实行贱买贵卖，通过对教育、科学和技术的垄断来维持这种局面。”"},{"type":"paragraph","text":"社论强调说：“这种状况必须停止，必须根本改变。第三世界的人民必须努力争取这种改变，坚持斗争直到建立一种新的世界秩序，正如墨西哥所提出的，在这种新的世界秩序中，公正将贯彻在各国的经济关系中。”"},{"type":"paragraph","text":"墨西哥《国民报》发表题为《在联合国大会上第三世界的声音》的社论说，联合国成立近三十年来，第三世界国家的比重不断增大。目前这些国家尽管必须不断努力克服各种障碍，但它们正在作为一支突出的决定性力量来制定自己相互声援的政策。正是第三世界举起了建立一种新秩序的旗帜。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"632f3acacb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
