dates":[{"year":1979,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李副总理离京赴非洲四国访问"},{"type":"paragraph","text":"邓副总理等到机场送行"},{"type":"paragraph","text":"新华社北京一月三日电  国务院副总理李先念和夫人林佳楣及其随行人员，今天上午乘专机离开北京路经乌鲁木齐前往坦桑尼亚、莫桑比克、赞比亚和扎伊尔进行正式友好访问。"},{"type":"paragraph","text":"到机场送行的有国务院副总理邓小平、耿飚、方毅、王震、陈慕华，人大常委会副委员长李井泉，外交部部长黄华，国务院办公室主任吴庆彤，外交部副部长张海峰，外贸部副部长贾石，外经部副部长汪道涵等。坦桑尼亚、赞比亚和扎伊尔驻中国的外交使节也到机场送行。"},{"type":"paragraph","text":"李先念副总理的随行人员有外交部副部长何英，外贸部副部长陈洁，外经部副部长程飞等。（附图片）"},{"type":"paragraph","text":"邓小平副总理等到机场为李副总理送行。新华社记者  张桂玉 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f5dea31b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
