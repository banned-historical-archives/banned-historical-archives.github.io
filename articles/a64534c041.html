art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘委员长周总理等致电祝贺","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 毛泽东主席、刘少奇委员长、周恩来总理，及全国人民代表大会常务委员会、中华人民共和国民族事务委员会，在4月20日分别打电报给达赖喇嘛、班禅额尔德尼和西藏自治区筹备委员会，热烈祝贺西藏自治区筹备委员会的成立。"},{"type":"paragraph","text":"在毛泽东主席给达赖喇嘛、班禅额尔德尼和西藏自治区筹备委员会各位委员的贺电中说：“我愉快地祝贺西藏自治区筹备委员会的成立，热忱地希望西藏各阶层人民在你们指导之下更加团结和进步，在发展西藏政治、经济和文化事业上获得更大的成就。”"},{"type":"paragraph","text":"在刘少奇委员长、周恩来总理的贺电中指出：西藏自治区筹备委员会的成立，是西藏人民和我国各民族人民的大喜事；是中国共产党和中央人民政府的民族政策的又一伟大胜利；是西藏全体僧俗人民在达赖喇嘛和班禅额尔德尼领导下，亲密团结和共同努力的结果。并相信：西藏自治区筹备委员会成立以后，在实现西藏民族的区域自治，加强民族团结、培养干部和发展经济、文化事业上都将做出更大的成绩。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a64534c041"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
