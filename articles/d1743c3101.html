es":[{"year":1979,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶委员长电贺沙德利当选阿尔及利亚总统"},{"type":"paragraph","text":"新华社北京二月九日电  中华人民共和国全国人民代表大会常务委员会委员长叶剑英，二月九日打电报给本·杰迪德·沙德利，热烈祝贺他当选为阿尔及利亚民主人民共和国总统。电报全文如下：阿尔及尔阿尔及利亚民主人民共和国总统本·杰迪德·沙德利阁下："},{"type":"paragraph","text":"在阁下当选为阿尔及利亚民主人民共和国总统的时候，我代表中国政府和人民，并以我个人的名义，谨向阁下表示热烈的祝贺。祝阿尔及利亚民主人民共和国政府和人民在反对帝国主义和新老殖民主义，维护民族独立和国家主权，以及在建设自己国家的正义事业中，不断取得新的成就。祝中、阿两国人民的战斗友谊和两国之间的友好合作关系进一步巩固和发展。"},{"type":"paragraph","text":"中华人民共和国全国人民  代表大会常务委员会委员长"},{"type":"paragraph","text":"叶剑英"},{"type":"paragraph","text":"一九七九年二月九日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1743c3101"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
