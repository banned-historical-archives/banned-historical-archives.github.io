:["刘西舟","山西"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"官僚主义的根子应从两方面去找","type":"title"},{"text":"山西刘西舟","type":"authors"},{"text":"（刘西舟：太原函授学校教师、民盟盟员）","type":"subtitle"},{"text":"官僚主义的根子应从两方面去找：","type":"paragraph"},{"text":"第一，应当从经济根源上去找，列宁研究过这个问题。列宁认为，小生产散漫状态、交通闭塞、文化落后、农业工业不协调等，是产生官僚主义的根源。列宁有一句名言：“在一个文盲众多的国家，想实现社会主义是不可能的”。我国的情况就是：人口多，又是大国，经济文化落后，想一下消灭官僚主义，那是小资产阶级天真的想法。想逐步克服官僚主义即要提高文化。我们是要打倒官僚主义分子。第二，旧社会资本主义的残余，官僚主义作风，在我们许多同志思想中很顽固，而且有生命的活力存在着，因此要想克服官僚主义，只有与这种思想作斗争，加强思想改造。","type":"paragraph"},{"text":"我们无产阶级国家应该树立真正的法治，我认为法治上的三个武器，即公安、检察院、法院都拿到一个人手里。我不满意！这三个武器，从理论上说，都掌握在党的手里，是好得很；但从实际上看，不是这样。我们要总结血淋淋的历史教训，因为我们是马克思主义者，我们应根据列宁原则来具体化。在无产阶级专政的国家里，我主张公安、检察院可建立党组织。任何党派都要退出法院。党员可以参加法院工作，但不能过组织生活，这样就能使法院不受党派的影响。波兰事件就说明了法院受了党派的影响，受了党派领袖的支配。历史上英明的、杰出的领袖究竟是少数。如果党派不退出法院，在必要时，他就可以利用这个武器，把我们同志搞倒。这是不是说党不能领导法院呢？党可以通过法律的制定和检察院来领导。所以在实践上说，这样就可以真正达到公安、检察、法院互相监督，互相牵制的作用。每个公民都来参加法律的管理，建立不受行政干搅，不受任何党派、领袖支配的法律，在法制面前人人平等。","type":"paragraph"},{"text":"为了法官、审判员做到对法律服从，人民民主法官应该是终身职务。这样法官才能做人民的包公。","type":"paragraph"},{"text":"在罪犯判刑前应允许单独地、秘密地，不受任何监督地接见亲属一次。","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（二）》（中共山西省委整风办公室编，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4f5c5945b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
