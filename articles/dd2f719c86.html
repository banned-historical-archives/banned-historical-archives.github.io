tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"来自井冈山的喜讯粉碎“四人帮” “江拖”又大上","authors":[],"parts":[{"type":"paragraph","text":"深受“四人帮”之害，今年被迫停产八个月的江西拖拉机厂的广大职工，含着激动的热泪，纵情欢呼我们党又有了自己的英明领袖华主席，放声歌唱华主席为首的党中央一举粉碎“四人帮”，使我国革命在惊涛骇浪中转危为安。他们热烈响应华主席为首的党中央的号召，以雷霆万钧之势，掀起了对“四人帮”的大揭发、大批判和抓革命、促生产的高潮。全厂职工在今年最后的两个月中，用五十五天时间生产出了一千零八台拖拉机，在伟大的领袖和导师毛主席诞辰八十三周年纪念日向以华主席为首的党中央报喜。"},{"type":"paragraph","text":"江西拖拉机厂是我国南方最大的生产水田拖拉机的工厂之一。一九五八年建厂以后，在毛主席革命路线指引下，革命和生产蓬勃发展，为实现我国农业机械化作出了贡献。一九七一年以前，林彪反党集团的黑手曾经伸到这个厂，使这个厂的革命和生产遭到严重破坏。林彪反党集团被粉碎以后，一九七三年，这个厂的拖拉机产量曾达到五千五百台，上缴利润一千多万元，创造了建厂以来的最高纪录。但是，自一九七四年起，由于“四人帮”插手江西，把罪恶的黑手直接伸进这个厂，又把一个好端端的工厂搞得乌烟瘴气，革命、生产遭到严重破坏。一九七四年到一九七六年，三年生产的拖拉机，还不如一九七三年一年的产量。特别是今年，全厂被迫停产八个月之久，给国家造成了严重损失。对“四人帮”插手江西拖拉机厂，广大职工进行了一次又一次的艰苦斗争。今天，在华主席的英明领导下，砸烂了“四人帮”，长期压抑在人们心头的深仇大恨，如决堤之水奔泻而出。广大职工把对“四人帮”的无比仇恨，化为抓革命、促生产的巨大力量。两个月来全厂出勤率和生产效率都达到了建厂以来的最高水平，用五十五天时间就超额完成了预计今年最后两个月生产一千台拖拉机的任务。"},{"type":"paragraph","text":"目前，这个厂的职工们，正积极进行明年的生产准备工作，决心响应第二次全国农业学大寨会议的号召，为尽快实现我国农业机械化做出新的贡献。（据新华社）"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd2f719c86"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
