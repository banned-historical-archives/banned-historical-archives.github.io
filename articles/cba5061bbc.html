ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"给曹云芳的信","alias":"","parts":[{"type":"paragraph","text":"给曹云芳的信"},{"type":"paragraph","text":"（1956年8月11日）云芳同志："},{"type":"paragraph","text":"七月八日的信收到，甚慰。罗哲同志英勇牺牲，早就听到一些消息。一九四五年在重庆的时候，见到张维兄，曾打听你们的下落，他只告知你姐姐王夫人已故，你的情形他不知道。现知你仍健在，并有两个女儿能继承罗哲遗志，我很高兴。罗哲为党艰苦工作，我可作证，当时没有别的证件。恤金由谁领的问题，应由当地政府去作决定，如果决定给继子，不给女几，也就算了，不必为此去争论。坟墓可由家属修理。现寄上三百元，请你酌量处理。今后如果还有困难，可以告我设法。你见过的两个孩子，一个在战争中牺牲了，一个也已病废。你们在贵阳工作有成绩，向你们致贺。"},{"type":"paragraph","text":"顺祝康吉"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五六年八月十一日"},{"type":"paragraph","text":"[1]曹云芳，原是罗哲烈士之妻。大革命时期曾随罗哲一起在毛泽东领导下做革命工作。"},{"type":"paragraph","text":"[2]罗哲，中国共产党党员。大革命时期曾随毛泽东从事农民运动。1928年牺牲。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":8,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":448,"page_end":448},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cba5061bbc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
