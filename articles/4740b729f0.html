script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南斯拉夫修正主义者丑恶面目又一次暴露  竟替“马来西亚”的建立打掩护  印度尼西亚《人民日报》痛斥南《战斗报》的谬论","authors":[],"dates":[{"year":1963,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南斯拉夫修正主义者丑恶面目又一次暴露"},{"type":"paragraph","text":"竟替“马来西亚”的建立打掩护"},{"type":"paragraph","text":"印度尼西亚《人民日报》痛斥南《战斗报》的谬论"},{"type":"paragraph","text":"新华社雅加达九日电　印度尼西亚《人民日报》八日发表评论，抨击南斯拉夫《战斗报》最近就“马来西亚”问题发表的评论中所表现的修正主义观点。"},{"type":"paragraph","text":"评论说，几天前，南斯拉夫驻印度尼西亚大使馆参赞隆帕尔把《战斗报》最近的评论送给《人民日报》的编辑。南斯拉夫参赞在一封信中说：“我想你们会发表文章谈南斯拉夫对马来西亚问题的立场。我愿意把九月二十日的《战斗报》评论的译本送给你们以对你们有所帮助。我希望这对你们是有用的。”"},{"type":"paragraph","text":"《人民日报》全文刊载了《战斗报》的评论。"},{"type":"paragraph","text":"《人民日报》的评论说，《战斗报》的评论的确是“有用的”，因为它暴露了修正主义者在“马来西亚”、民族独立斗争、美帝国主义和联合国这些问题上的观点。"},{"type":"paragraph","text":"评论谈到《战斗报》所谓的“在到昨天为止还是完全的殖民地或半殖民地的地区的联盟的建立和存在”。评论说，照南斯拉夫修正主义者说来，在一九六三年九月十六日以后，北加里曼丹、马来亚和新加坡已不再是殖民地或半殖民地了。根据这种说法，"},{"type":"paragraph","text":"“马来西亚”不再是新殖民主义的阴谋。《战斗报》的评论说，“马来西亚”“似乎变成一个新的不稳定和不安的地区”，但是它没有提到谁造成这种不稳定的局面和谁感到不安。"},{"type":"paragraph","text":"评论说，《战斗报》的评论把“老挝和南越”说成是“这样危险的引起骚乱的根源”。《人民日报》的评论指出，在东南亚的这两个地区，人民正在激烈地进行英勇的爱国斗争，争取摆脱帝国主义和新老殖民主义的统治，首先是以美国为首的一切新殖民主义的统治。正是这种英勇的民族解放斗争被南斯拉夫修正主义者叫做“这样危险的引起骚乱的根源”。相反地，对于美帝国主义者的野蛮暴行，甚至屠杀佛教徒的事件，它一个字也不敢提。"},{"type":"paragraph","text":"评论说，在谈到“人民反对联盟（马来西亚）的呼声时，《战斗报》的评论说，这种‘呼声’没有被听取（也没有被压制）。”评论说，事实上，大家都知道，以美国人米切尔莫尔为首的“联合国小组”是怎样在北加里曼丹进行工作的。苏加诺总统在庆祝印度尼西亚建军节的讲话中批评了“联合国小组”，更不用说美国人米切尔莫尔了；南斯拉夫修正主义者所关心的只是保全米切尔莫尔的面子，美帝国主义的面子！"},{"type":"paragraph","text":"评论说，《战斗报》的评论说什么“马来西亚”“甚至在还没有听到联合国特别调查小组的报告的情况下”就于今年九月十六日宣布成立了。评论指出，每一个公正的人都知道，事实上，正是极端不公正和偏袒的联合国报告促进了马来西亚的建立。苏加诺总统说联合国是“旧有的”，他要求将它“改组”；过去，在印度尼西亚、朝鲜和刚果，最近在北加里曼丹，联合国都一向是偏袒和讨好帝国主义、特别是美帝国主义的。但是，南斯拉夫修正主义却企图美化联合国的丑恶面目和挽救它的声誉！"},{"type":"paragraph","text":"评论最后说：“我们希望南斯拉夫驻雅加达的大使馆将提供《人民日报》更多的材料；至于我们，我们将仅仅发表一些必要的评论文章来向印度尼西亚人民进一步介绍现代修正主义的实质。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4740b729f0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
