art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"江西中部北部平原建成农村电力网广大群众欢呼毛主席给他们送来了光明","authors":[],"parts":[{"type":"paragraph","text":"江西省中部和北部平原地区广大群众，高举毛泽东思想伟大红旗，自力更生建起初具规模的农村电力网，取得改天换地斗争的又一重大胜利。"},{"type":"paragraph","text":"到目前，在这个南起萍乡、临川一线，北至景德镇、九江一线的广大平原地区，已架设两千七百多公里高压输电线，把境内的水力、火力发电站联结起来，开始大量向农村供电。这个地区已安装七万千瓦电力排灌设备，使二百六十万亩农田实现了电力排灌。据有关部门统计，去年实现电力排灌的地区粮食增产百分之二十，棉花增产百分之五十左右。这样大幅度增产，有各种因素，但实现电力排灌起了一定的作用。有了电，使各地的农产品加工工业、小型工业也蓬勃发展起来，千百个农村安上了电灯。广大群众欢呼毛主席给他们送来了光明。"},{"type":"paragraph","text":"江西省中部和北部平原地区包括鄱阳湖滨冲积平原和赣江、旴江、信江、修水、鄱江等江河中下游冲积平原区。这片广大地区有三十二个县、市，是江西省主要粮棉油生产基地。"}],"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50a73a3eff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
