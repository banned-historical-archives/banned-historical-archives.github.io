ates":[{"year":1966,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"××同学:"},{"type":"paragraph","text":"你提出:一、什么样的人才算是真正的人?二、什么样的作风是最朴实的?三、什么样的品德是最高尚的?这三个问题，连起来给你作解答:雷锋就是真正的人，也是最朴实的，品德是最高尚的。雷锋以其短短的一生为人民所作的是千百件平凡的事情，但是在这些平凡的事情上闪耀着的却是共产主义思想的光辉。从雷锋身上，我们看到他的精神面貌和思想品质已经达到了共产主义者的高度。谁要成为真正的人和共产主义者，就必须向雷锋学习，就必须坚决清除个人主义思想，象雷锋那样把集体利益看得高于一切，作一个全心全意为人民服务的集体主义者……"},{"type":"paragraph","text":"你即将离开你的学校，勇敢地去吧，跟着毛泽东前进!这是自己最大的光荣和幸福。愿你在新的工作岗位上，早日成为一名英雄和先进工作者……。"},{"type":"paragraph","text":"刘英俊"},{"type":"paragraph","text":"一九六三年五月十九日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cbfb2ef30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
