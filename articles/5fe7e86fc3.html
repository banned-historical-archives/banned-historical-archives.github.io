art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇同志等题辞祝贺","authors":[],"parts":[{"type":"paragraph","text":"据新华社南京25日电 江苏省盐阜大众报今天是创刊十五周年纪念，中央和江苏省等方面负责同志最近都题辞祝贺。"},{"type":"paragraph","text":"中共中央副主席，全国人民代表大会常务委员会委员长刘少奇同志的祝辞：“热烈祝贺盐阜大众报的十五周年！热烈祝贺在过去革命斗争中有过光荣历史的盐阜区人民，在争取工农业生产大跃进的社会主义建设中，在根本改变我们祖国和盐阜区的经济文化面貌的斗争中，获得更大的光荣。盐阜大众报在这一伟大的改造自然界的历史性的斗争中，应当在各方面起积极促进的作用，鼓舞人民的干劲，力争上游，多快好省地进行一切社会主义的建设事业。”"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理兼外交部长陈毅、国防部副部长黄克诚、中共江苏省委第一书记江渭清等都题了祝辞。"},{"type":"paragraph","text":"盐阜大众报创刊于1943年4月25日，是江苏北部革命根据地出版历史最久的报纸之一。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fe7e86fc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
