ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"继续不断破妥锦榆段铁路","alias":"","parts":[{"type":"paragraph","text":"继续不断破毁锦榆段铁路!!"},{"type":"paragraph","text":"（1946年5月3日）程、萧，并转詹才芳同志："},{"type":"paragraph","text":"詹三十日电悉。破路又有成绩，甚为欣慰。东北正在大战，五六两月将是重要关键，务望鼓励士气，继续不断破毁锦榆段？。为着将破路范围扩展至兴城、锦县起见，请考虑从两个旅中抽出一部向北发展，多带地方工作人员，将兴城、锦县铁路线以西，朝阳、凌源铁路线以东地区广大群众发动起来，并组织游击队，建立巩固根据地。该地区目前情形如何，望詹电告。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"辰江"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给冀热辽军区政治委员程子华和司令员萧克并转冀东军区司令员詹才芳的电报。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":301,"page_end":301},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdfce6ee4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
