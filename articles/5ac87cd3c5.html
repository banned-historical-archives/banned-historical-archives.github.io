al-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"直鹅潭泉部队必须更迅速更集中山","alias":"","parts":[{"type":"paragraph","text":"直捣漳泉部队必须更迅速更集中！]"},{"type":"paragraph","text":"（1932年4月2日）恩来同志："},{"type":"paragraph","text":"1．我昨日到上杭，商应敌布置。拟阳（七日）去白沙和林聂会合。"},{"type":"paragraph","text":"2.敌一部既入闽，我直捣漳泉?部队必须更迅速更集中，否则敌占先着，我军将进退维谷。五军团全部必须立即出发，取直径急行军赴会昌筠门岭，间经武北湘坑、官庄、白沙，于十四日到龙岩。"},{"type":"paragraph","text":"3．中央局、军委宜移长汀。4.三军团行动如何，统盼电示。"},{"type":"paragraph","text":"泽东"},{"type":"paragraph","text":"二日"},{"type":"paragraph","text":"[1]这是毛泽东率中央红军东路军（由第一、第五军团组成）攻漳州途中给中共苏区中央局书记周恩来的电报。"},{"type":"paragraph","text":"[2]林聂，指林彪、聂荣臻，当时分别任中央红军第一军团总指挥和政治委员。"},{"type":"paragraph","text":"[3]漳泉，指福建漳州和泉州。"},{"type":"paragraph","text":"[4]军委，指1931年11月25日成立的中华苏维埃共和国中央革命军事委员会。此后红军第一方面军领导机构奉命撤销，所属部队统称中央红军，"},{"type":"paragraph","text":"130"},{"type":"paragraph","text":"毛主席来1932.4.2恩交同忘：关已第困的了中失别多过移我汀性!"},{"type":"paragraph","text":"1.我昨日到上杭高应放体置凝阳(比白)去白沙和林晶合会。"},{"type":"paragraph","text":"二.改一言既入间我直福泣泉言像必须更忍睡更集中，否则敌结先着我鱼将避退强谷五星国全和心有之品击发的通得急行童处富筠阳痛，间经武北湘杭信在，白沙于一四到龙当。"},{"type":"paragraph","text":"三重国行就如间.明富示。"},{"type":"paragraph","text":"温桌·三二9"},{"type":"paragraph","text":"1932年4月，毛泽东以中华苏维埃临时中央政府主席身份指挥中央红军东路军取得漳州战役的胜利。图为毛泽东关于漳州战役给周恩来的电报。"},{"type":"paragraph","text":"1932年4月，毛泽东指挥东路军取得漳州战役的胜利。图为红一方面军东路军攻占漳州后部队的合影。"}],"authors":["毛泽东"],"dates":[{"year":1932,"month":4,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":49,"page_end":51},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ac87cd3c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
