rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席教育出来的好军队","authors":["梁煜"],"parts":[{"type":"paragraph","text":"去年十二月的一天下午，拉萨市城关区娘热乡的藏民们送公粮去了，留在村里的几个年轻人，到山谷里挖“阿嘎土”（一种盖房子用的硬粘土）。挖着挖着，顶上塌下了一块土岩，五个藏民被埋在里边了。"},{"type":"paragraph","text":"西藏军区总门诊的同志听到这消息后，立即带上担架和急救包，向出事地点跑去。四个受轻伤的很快被救出来了，但贫农布穷老阿爸的十三岁独生子普布，泥土直埋到他的脖子，从脸庞青紫，呼吸困难。同志们不停地挖着，眼看两条腿快要拔出来了，不想却被一把埋在土里的锹柄卡住了。这时，头上的土岩出现了新的裂痕，土从裂缝处唰唰掉下来，土岩又要下塌了。同志们的心象绷紧了的弦，继续冒着生命的危险，紧张地挖土。李秀武坚持在最危险的地方，他浑身冒汗，两腿发麻，但始终不肯让别人换他，直到把小普布救了出来。"},{"type":"paragraph","text":"小普布立即被送进医院。医院一面给抢救小普布，一面组织了医疗小组，到受轻伤的藏民家里去治疗。娘热乡的干部和群众无不称赞说：“只有共产党、毛主席教育出来的军队才有这样好。” （梁煜）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea1860b3ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
