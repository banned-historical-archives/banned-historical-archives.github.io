ors":["汤传明"],"dates":[{"year":1984,"month":10,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(通讯员　汤传明)华东纺织工学院在整党中把彻底否定“文化大革命”、克服派性作为对党员进行思想教育的重要内容，使全院党员增强党性，团结一致开创学校教学、科研工作的新局面。"},{"type":"paragraph","text":"该校“文革”中造反派掌权，造成严重混乱。粉碎“四人帮”已七、八年了，派性的残余仍然存在，在干部提拔、教师晋级、工作安排、住房分配等问题上都有反映。去年五月，该校作为上海市整党试点单位之一，开始整党，但有不少党员和干部对彻底否定“文化大革命”还有模糊认识。"},{"type":"paragraph","text":"针对党内存在的思想问题，党委从四方面深入进行彻底否定“文革”的教育。首先是组织党员重新学习《关于建国以来党内若干历史问题的决议》等有关文件，着重弄清发动“文革”的理论、方针、方法都是错误的。“文革”不是也不可能是任何意义上的革命或社会进步。其次，联系学校和本部门的实际，看“文革”造成的严重后果，确实是“迫害了老年一代，耽误了中年一代，毒害了青年一代”，整个教育事业遭到了摧残。认识到学校的两大派是“文革”的产物，不管哪一派都是错误的。第三，自上而下，领导带头，自觉清理思想，总结经验教训，进一步肃清“文革”的影响。第四，在党内开展消除隔阂，解除疙瘩，增强团结的工作。通过广泛开展谈心活动，许多党员主动诚恳地作自我批评，并向原来对立的同志赔礼道歉，征求意见，使一些“冤家”成了亲密的同志。"},{"type":"paragraph","text":"现在，大家同心同德，为多出人才、多出成果争作贡献。最近，纺织工业部对所属院校学生学习质量进行统测，华纺学生的总成绩获得第一名。整党以来，该校承担的科研项目先后有三项获得国家创造发明奖。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b6dfe1147"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
