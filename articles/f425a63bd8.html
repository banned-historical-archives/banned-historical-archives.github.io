工使垄断资产阶级进出口贸易损失近十亿美元","authors":[],"dates":[{"year":1969,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"显示美国工人阶级不屈不挠的顽强战斗精神"},{"type":"paragraph","text":"美国七万五千码头工人坚持罢工五十六天"},{"type":"paragraph","text":"罢工使垄断资产阶级进出口贸易损失近十亿美元"},{"type":"paragraph","text":"新华社十四日讯　纽约消息：美国东海岸和墨西哥湾七万五千名码头工人的大罢工，到十四日为止已经坚持了五十六天。这是美国码头工人持续最久的一次罢工斗争，在美国工人斗争史上写下了光辉的一页。"},{"type":"paragraph","text":"这次大罢工沉重地打击了美国垄断资本。目前被迫瘫痪在美国东海岸和墨西哥湾各港口的船只已达六百二十一艘，美国垄断资产阶级在进出口贸易方面的损失已近十亿美元，许多从国外掠夺的物资如锡和铅，价格不断上涨，并且将被迫动用国家储备物资。"},{"type":"paragraph","text":"为了破坏这次大罢工，美国反动统治集团彻底剥下了假民主的伪装，公开利用资产阶级专政机器对罢工工人进行镇压。从十日开始，美国反动统治集团就出动大批士兵，到纽约码头上去强行卸下邮件，纽约市法院也在十一日下令强迫码头工人投票赞成垄断资本家提出来的“合同”，妄图用法西斯手段扼杀这次大罢工。但是英勇不屈的码头工人仍在坚持斗争，充分显示了美国工人阶级的顽强战斗精神。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f425a63bd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
