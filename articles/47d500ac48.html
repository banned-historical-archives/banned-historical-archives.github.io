" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“肃反是扩大化的”","authors":["中国人民大学","朱福荣"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“肃反是扩大化的”","type":"title"},{"text":"中国人民大学朱福荣","type":"authors"},{"text":"（朱福荣：中国人民大学历史系学生）","type":"subtitle"},{"text":"摘要：","type":"subtitle"},{"text":"被斗的人是不是现行反革命？如果是，应该交法院按法律办？还是用变相逼供等方式在个别单位进行？……按百分比去抓，因此历史上有一些问题，说怪话的人就倒霉了。领导上按5％交群众斗，群众根据领导上规定的，总是希望把被斗的人斗成是反革命分子。我想在坐的参加过肃反的同志都会有这个心理．情况既不掌握，交群众去斗，就不能不发生错误。肃反并没有充足材料，用主观主义的办法硬斗人家，我们机关就是这样……例子还很多，我认为这如不是扩大化就很难理解了……为什么肃反中要破坏社会主义法制？如知道他是个反革命分子，为什么不抓？如不是，而又斗，是不是要冤枉人？现在问题是为什么调查以前就先斗？斗了人家再进行调查，这样就是对的吗？党中央是根据什么用百分比来斗的？这就是主观主义！，肃反究竟是不是扩大化，这应由党中央说，因党中央掌握全面情况。我的体会就是扩大化。……","type":"paragraph"},{"text":"同意林希翎提出的肃反扩大化。肃反扩大化是有的，而且也是1955年—1956年胡风问题后表现得突出的。肃反的理论根据是斯大林关于阶级斗争尖锐化的错误公式。斗错的人不是三、五个，三、五十个而是不少。肃反扩大化是按错捕、错杀、错斗和应捕应杀应斗的人的比例来算的。我原工作单位，西康省财政厅斗了二十多人，一个反革命也没有。四川财政厅斗了不少人，也没有一个反革命。我们一个科就有两个自杀的（经调查证明：两处均有反革命分子。——编注）。这一切都说明1955—1956年肃反是扩大化的。全国的情况又怎样呢？毛主席说“肃反没有扩大化”。这一提法，作为一个公民我是怀疑的。我是根据我的肃反扩大化的定义，结合我耳闻目击的现象提出疑问的。我们是否能把中央一句话就完全相信呢？毛主席说一句话就叫我相信，叫我们作阿斗吗？我认为斗错的人，不但应给精神安慰，而且要物质赔偿。","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47d500ac48"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
