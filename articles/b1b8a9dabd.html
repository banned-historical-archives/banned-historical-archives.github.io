ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"印发《光明日报》上发表的几首诗的批语","alias":"","parts":[{"type":"paragraph","text":"印发《光明日报》上发表的"},{"type":"paragraph","text":"几首诗的批语"},{"type":"paragraph","text":"（1961年12月29日）这几首诗好，印发各同志"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿九日"},{"type":"paragraph","text":"[1]指《光明日报》1961年12月28日第四版上登载的几首诗：一、著名教育家吴研因的《赏菊》：“不期青女忍相欺，老圃新枝竞吐奇。秋色还如春色好，西风莫漫撼东篱！嫩红老紫百千盆，蟠错如况有根。为证明年花更艳，手题诗句待重温。”二、全国人大代表钱昌照的七律二首。第一首是《芦台农场》：“麦苗肥壮谷登场，谁信当年一片荒？排灌齐全轮作好，芦台今日是粮仓。”第二首是《城农村》：“薯曝墙头菜挂檐，棉田片片麦无边。农村活跃歌声里，绿女红男夕照前。”"},{"type":"paragraph","text":"[2]指参加1961年12月20日至1962年1月10日在北京举行的中共中央工作会议的同志。毛泽东全集第四十四卷"},{"type":"paragraph","text":"二徐业夫同志："},{"type":"paragraph","text":"请即印这几首诗发给各同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"廿九日上午1961年，毛泽东和江青在一起。[1]徐业夫，当时任毛泽东的机要秘书。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":521,"page_end":522},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1b8a9dabd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
