学红卫兵"],"dates":[{"year":1966,"month":6}],"is_range_date":false,"parts":[{"text":"红卫兵誓词","type":"title"},{"text":"清华大学附属中学红卫兵","type":"authors"},{"text":"我们是毛主席的红卫兵，毛主席是我们最高的红司令。在这里，面对着我们的伟大领袖毛主席，面对着我们敬爱的党，面对着全中国和全世界的革命人民，我们宣誓，用我们革命红卫兵的荣誉壮严宣誓：我们保证永远忠于无产阶级！永远忠于毛主席！永远忠于以毛主席为代表的无产阶级革命路线。我们要把全部精力和整个生命献给人类最壮丽的事业──共产主义！对于人民，我们要无限忠诚！对敌人，我们要刻骨仇恨！生，为党的事业而奋斗！死，为人民的利益而献身！\"为有牺牲多壮志，敢教日月换新天。\"我们绝对保证站在以毛主席为代表的无产阶级革命路线一边。哪怕是上刀山、下火海，我们也要用鲜血和生命誓死保卫毛主席！毛主席，我们无限忠于您！坚决跟着您老人家，誓将无产阶级文化大革命进行到底！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f1c04bba0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
