tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理会见英国知名人士代表团","authors":[],"parts":[{"type":"paragraph","text":"据新华社十月十五日讯 邓小平副总理今天上午会见了由英中了解协会副会长、英国作家兼电影制作者费里克斯·格林和英中了解协会主席班以安率领的英国知名人士代表团。"},{"type":"paragraph","text":"会见时，邓副总理在愉快友好的气氛中接受了格林等英国朋友的集体电视采访。"},{"type":"paragraph","text":"这些英国朋友中包括有作家、电影制作者、消费问题专家、科学幻想小说家、博物馆负责人、非洲问题专家等。他们向邓副总理分别提出了一系列感兴趣的问题，如社会主义民主和法制、控制人口增长、环境保护、中国经济发展情况、中国同第三世界国家关系以及对未来中国的展望等。邓副总理一一回答了英国朋友的问题。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26339b6d7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
