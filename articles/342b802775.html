先生和周总理先后祝酒，共祝中巴两国人民友谊不断发展","authors":[],"dates":[{"year":1971,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京七日电　巴基斯坦代表团团长布托今天晚上为代表团访问我国举行答谢宴会。"},{"type":"paragraph","text":"国务院总理周恩来，军委副主席叶剑英，外交部代部长姬鹏飞、副部长韩念龙，中国人民解放军副总参谋长彭绍辉，有关方面负责人邝任农、潘焱、朱培章、刘春、丁国钰、杨德中、柴成文、韩叙、叶成章、张颖、朱传贤等，应邀出席了宴会。"},{"type":"paragraph","text":"宴会在人民大会堂举行，宴会厅里悬挂着中国和巴基斯坦国旗。"},{"type":"paragraph","text":"布托先生首先在宴会上祝酒，对这次访问表示满意。他说，我们进行了非常有成效的讨论，我们将带着完全满意的心情返回巴基斯坦。在我们离开伟大、友好的中华人民共和国之前，我愿再次向你们保证，巴基斯坦在亚洲所要起的作用，是积极的作用，即促进友好、和平、互不干涉内政、人类进步的作用。为此，巴基斯坦人民将同中国人民并肩站在一起。"},{"type":"paragraph","text":"周恩来总理在宴会上祝酒时说，中国和巴基斯坦是友好邻邦。这次巴基斯坦代表团受叶海亚·汗总统阁下的委托前来我国进行友好访问，同我国政府领导人就双方共同关心的问题进行了会谈，取得了满意的结果。这充分体现了我们两国的友好合作关系和两国人民之间的诚挚友谊。他请巴基斯坦贵宾回国以后，转达中国政府和人民对叶海亚·汗总统阁下、巴基斯坦政府和人民的亲切问候和敬意。"},{"type":"paragraph","text":"宴会自始至终洋溢着亲切友好的气氛，宾主一再举杯祝中巴两国人民的友谊不断发展。"},{"type":"paragraph","text":"拉希姆·汗空军中将、苏尔坦·汗等巴基斯坦代表团成员，巴基斯坦驻中国大使凯瑟和夫人、大使馆外交官员和巴基斯坦乒乓球代表团成员，出席了宴会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"342b802775"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
