" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"致叶剑英、李维汉等电","alias":"","parts":[{"type":"paragraph","text":"致叶剑英、李维汉等电！"},{"type":"paragraph","text":"（1946年7月25日）"},{"type":"paragraph","text":"（一）据李先念电，军事调处执行第三十二小组由飞机抛下公函，称该小组及第九小组已到龙驹寨，要李派代表去龙驹寨谈判，然后经三人委员会决定停战驻地及给养问题。如联络不上，则该两小组于二十五去西安停三天，然后去北平请示等语。（二）计时该小组今日已到西安，已令周子健代表李先念去接洽，声明愿意谈判，惟须政府军停止围追以利谈判?。（三）望你注意此事，并适当处理。如政府及马歇尔要谈苏北问题，我们则要谈中原军问题。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致叶剑英、李维汉并告周恩来电的主要内容。"},{"type":"paragraph","text":"[2]周子健，当时任中共驻西安办事处代表。"},{"type":"paragraph","text":"[3]与此同时，在陕南的中原部队根据飞机抛下的执行小组的公函，派出张文津等为代表，直接找陕南国民党军交涉停战。国民党军却继续以重兵围攻，并于七月底秘密杀害了中原部队派出的谈判代表张文津（干部旅旅"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":525,"page_end":525},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c345eb197"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
