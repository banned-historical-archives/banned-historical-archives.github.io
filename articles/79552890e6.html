议长致电邓小平副总理表示祝贺","authors":[],"dates":[{"year":1977,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社雅典一九七七年八月七日电　七月三十日出版的一期希腊《人民之路》周刊全文刊载了中国共产党十届三中全会公报，同时发表按语指出，这次会议对中国革命和世界革命都具有重大意义。"},{"type":"paragraph","text":"按语写道，中国共产党十届三中全会根据毛泽东主席制定的革命总路线通过的决议对万恶的“四人帮”是一个沉重的打击，并且彻底粉碎了资产阶级、修正主义分子和形形色色的机会主义分子企图在中国复辟资本主义的梦想。"},{"type":"paragraph","text":"按语指出，毫无疑问，这些决议将使中国共产党在思想上、政治上和组织上得到进一步的巩固。"},{"type":"paragraph","text":"按语写道，“全会通过的决议也具有重大的国际意义。它对世界范围内反对帝国主义、社会帝国主义和国际反动派的斗争以及反对修正主义和形形色色机会主义的斗争将起到一种新的促进作用。”"},{"type":"paragraph","text":"按语最后写道，“希腊马克思列宁主义共产党的成员及其支持者热烈欢迎这些决议，并且祝愿伟大、光荣、正确的中国共产党，在英明的、马克思主义的领袖华国锋主席为首的党中央的领导下，为实现毛主席的教导，在中国建设社会主义和巩固无产阶级专政方面，在为世界无产阶级、被压迫民族和被压迫人民的革命斗争做出全面贡献方面，取得新的成就。”"},{"type":"paragraph","text":"新华社北京一九七七年八月八日电　意大利参议院议长阿明托雷·范范尼七月二十七日打电报给邓小平副总理，最热烈地祝贺他恢复政府活动。电报全文如下:"},{"type":"paragraph","text":"北京中华人民共和国副总理邓小平阁下"},{"type":"paragraph","text":"值此恢复你的政府活动之际，请接受我最热烈的祝贺和最良好的祝愿。"},{"type":"paragraph","text":"阿明托雷·范范尼"},{"type":"paragraph","text":"一九七七年七月二十七日于罗马"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79552890e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
