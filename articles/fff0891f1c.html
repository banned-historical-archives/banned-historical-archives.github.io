[],"dates":[{"year":1985,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昔日否定“文革”——竟被判徒刑"},{"type":"paragraph","text":"如今落实政策——李天德入党"},{"type":"paragraph","text":"本报讯  据四川日报报道：一个曾被错划为“右派”并三次判刑的知识分子——四川雅安矿山机器厂副厂长李天德，去年12月10日在党旗下宣誓，加入了中国共产党。"},{"type":"paragraph","text":"李天德是四川荣县人，现年四十四岁，1958年被错划为“右派”，此后又以“反革命罪”被两次判刑。1975年，李天德因向党中央、国务院上书《献国策》，提出彻底否定“文化大革命”和不搞个人迷信等主张，以“反革命罪”被判处二十年徒刑。1979年，李天德的冤案得到平反，但结论中仍保留着“犯有政治错误”的尾巴。在这种情况下，李天德虽于1980年就向所在单位党支部递交了入党申请书，但不仅未得到培养，反而于1984年初被某单位以不适合在公安部门工作为由，清理出公安队伍，安排在雅安矿山机器厂技术科工作。"},{"type":"paragraph","text":"去年7月，由省委组织部和雅安地委组织部的主要负责同志出面，为李天德彻底平反，去掉尾巴，并决定李天德任雅安矿山机器厂副厂长，同时将其工资由行政二十一级调整为十九级。李天德去年8月再次向党组织递交了入党申请书。厂党委对他及时进行教育培养，并根据李天德同志的一贯表现，于去年11月21日正式批准李天德同志为中国共产党预备党员。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fff0891f1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
