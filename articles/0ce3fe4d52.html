ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"对抗大第四期第一大队、第二大队，第六大队毕业学员的讲话","alias":"","parts":[{"type":"paragraph","text":"对抗大第四期第一大队、第二大队、"},{"type":"paragraph","text":"第六大队毕业学员的讲话！！"},{"type":"paragraph","text":"（1938年8月2日）"},{"type":"paragraph","text":"中国是半殖民地半封建的国家，对外不独立，对内不民主。根据这一特点中国革命便是战争第一、军事第一，这是早被鸦片战争以来的中国历史所证明了的。枪杆子里出农会、出工会、出政权、，出共产党，枪杆子里出一切，这是真理。我们说枪杆子第一，是在革命的政治前提下，枪杆子必须服从革命的政治。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"中国历朝以来政治路线和组织路线有两条，一条是正当的，一条是不正当的，明君用人在贤，昏君用人在亲，所以用干部要注意。世界上的事情都是老老实实的，所以要讲究老实，有多少讲多少。既反对自大，认为自己盖世无双，又反对自卑，把自己看得太渺小。"},{"type":"paragraph","text":"[1]这是毛泽东对抗大第四期第一大队、第二大队、第六大队毕业学员关于“战争第一”问题和“老老实实”问题讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":8,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":414,"page_end":414},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ce3fe4d52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
