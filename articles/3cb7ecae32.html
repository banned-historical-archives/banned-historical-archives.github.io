rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"问：五届人大通过的新宪法，写进了“惩办新生资产阶级分子”的条文，有什么重要意义？","authors":["黎林"],"parts":[{"type":"paragraph","text":"答：五届人大通过的新宪法，写进了“惩办新生资产阶级分子”的条文，这对于打击敌人，保护人民，巩固无产阶级专政，都有着重要的意义。"},{"type":"paragraph","text":"社会主义社会是从资本主义社会脱胎而来的，在经济、精神、道德方面还存在着资本主义的痕迹，不但老的资产阶级还没有消灭，还可能产生新的资产阶级分子。正如叶副主席《关于修改宪法的报告》中指出的：“这类新生资产阶级分子，人数虽然不多，但他们同旧的没有改造好的地富反坏和资产阶级分子相勾结，成为城乡资本主义势力中最猖獗的部分。”和新生资产阶级分子作斗争是无产阶级专政的一个重要任务。把“惩办新生资产阶级分子”写进新宪法，把他们规定为无产阶级专政的对象，充分体现了我国无产阶级专政的国家性质。这样可以更好地发动人民群众以宪法为武器和新生资产阶级分子作斗争，制裁阶级敌人的一切犯罪行为；也可以使少数资产阶级思想极其严重的人，因慑于社会主义法制，而不敢肆无忌惮地进行违法活动，对于巩固无产阶级专政必将起到积极而有效的作用。"},{"type":"paragraph","text":"五届人大通过的新宪法写进了“惩办新生资产阶级分子”的条文，为了执行这一条文，叶副主席在《关于修改宪法的报告》中，还对什么是新生资产阶级分子作了明确的解释。叶副主席说：“这是指那些新生的，反抗社会主义革命，危害社会主义建设，严重破坏社会主义公有制，侵吞社会财富，触犯刑律的分子。”林彪、“四人帮”践踏社会主义法制，大搞法西斯专政，他们一贯颠倒敌我，混淆革命和反革命的界限。明明他们自己是穷凶极恶的新生资产阶级分子，死不改悔的走资派，却诬蔑坚持毛主席革命路线的广大干部和群众为走资派、新生资产阶级分子，肆意进行残害和打击。叶副主席的明确解释，给了我们识别新生资产阶级分子的锐利武器，更有利于我们揭穿一切阶级敌人混淆敌我界限，打着和“新生资产阶级分子”作斗争的旗号，打击和镇压革命群众的阴谋，更有利于我们正确区分两类矛盾，而把斗争的矛头指向真正的新生资产阶级分子。"},{"type":"paragraph","text":"无产阶级专政下继续革命的过程，是一个阶级斗争的过程，和新生资产阶级分子作斗争，是阶级斗争的重要内容。我们一定要加强社会主义法制观念，贯彻实施新宪法，惩办新生资产阶级分子和坏分子，惩办一切阶级敌人，为巩固无产阶级专政而奋斗！（黎林）"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cb7ecae32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
