ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"给杨尚昆的信","alias":"","parts":[{"type":"paragraph","text":"给杨尚昆的信"},{"type":"paragraph","text":"（1951年3月9日、20日）尚昆同志："},{"type":"paragraph","text":"镇反工作的重要材料，请随时送给我。另件请传阅发出。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月九日"},{"type":"paragraph","text":"二尚昆同志："},{"type":"paragraph","text":"凡各地镇反电报及综合报告，均请清出送我。此外，其他电报，你认为值得看的，也请清出送我。另报六份，请传阅办理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月二十日[1]杨尚昆，当时任中共中央办公厅主任。"},{"type":"paragraph","text":"给杨尚昆的信"},{"type":"paragraph","text":"上次我批发的关于西南财经机关清理反动分子的电报\"，请抄发中央、军委各部门（包括各特种兵）首长及薄一波，叶季壮，滕代远，乔木，彭真。"},{"type":"paragraph","text":"[1]指西南军政委员会公安部1951年3月8日关于财经交通部门清理反动分子的总结报告。"},{"type":"paragraph","text":"[2]薄一波，当时任政务院财政经济委员会副主任兼财政部部长。叶季壮，当时任中央人民政府贸易部部长。滕代远，当时任中央人民政府铁道部部长。乔木，即胡乔木，当时任中央人民政府新闻总署署长。彭真，当时任政务院政治法律委员会副主任。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":9},{"year":1951,"month":3,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":156,"page_end":157},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"236ed392b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
