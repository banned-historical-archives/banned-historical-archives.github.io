dates":[{"year":1976,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"极其悲痛地哀悼伟大的领袖和导师毛泽东主席逝世"},{"type":"paragraph","text":"伟大的领袖和导师毛泽东主席追悼大会开始，党和国家领导人同首都百万群众一起肃立默哀。"},{"type":"paragraph","text":"左起：赛福鼎、苏振华、陈永贵、韦国清、吴德、纪登奎、李先念、江青、张春桥、王洪文、华国锋、叶剑英、宋庆龄、姚文元、陈锡联、汪东兴、许世友、李德生、吴桂贤、倪志福。新华社记者摄"},{"type":"paragraph","text":"中共中央第一副主席、国务院总理华国锋同志致悼词。新华社记者摄"},{"type":"paragraph","text":"首都工人怀着极其悲痛和无限崇敬的心情，最深切地悼念伟大领袖和导师毛主席。他们表示，一定要永远贯彻执行毛主席的革命路线，贯彻执行“鞍钢宪法”，开展工业学大庆运动，为把我国建设成为强大的社会主义国家，为最终实现共产主义而努力奋斗。本报记者摄"},{"type":"paragraph","text":"伟大的领袖和导师毛泽东主席追悼大会，九月十八日下午三时在天安门广场隆重举行。首都党政军机关、工农兵以及各界群众的代表一百万人怀着极其沉痛和无限崇敬的心情参加了追悼大会，决心遵照毛主席的嘱咐，“按既定方针办”，在党中央的领导下，把毛主席开创的无产阶级革命事业进行到底！本报记者  摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"951b3f221d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
