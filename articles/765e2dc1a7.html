rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我男女队双双获得冠军朝鲜男队日本女队获亚军 越南女队日本男队获第三名","authors":[],"parts":[{"type":"paragraph","text":"据新华社四日讯 中国男女乒乓球队今晚双双获得了一九六五年北京国际乒乓球邀请赛的男女团体冠军。他们在决赛中以五比○和三比一分别战胜了朝鲜民主主义人民共和国男子乒乓球队和日本女子乒乓球队。朝鲜男子队和日本女子队分别获得男女团体亚军。获得男女团体第三名的分别是日本男子队和越南民主共和国女子队。"},{"type":"paragraph","text":"董必武副主席，邓小平、陈毅、谢富治副总理等观看了今晚的决赛。"},{"type":"paragraph","text":"林枫副委员长陪同越南民主共和国国会常务委员会副主席黄文欢和由他率领的越南民主共和国国会访华友好代表团也观看了今晚的决赛。"},{"type":"paragraph","text":"陈毅副总理在比赛结束后接见了荣获这届邀请赛男女团体冠军、亚军和第三名的中国、朝鲜、日本、越南等国乒乓球队的运动员和教练，以及参加这届邀请赛的各国乒乓球队的领队，同他们亲切握手，祝贺他们获得胜利。"},{"type":"paragraph","text":"在首先进行的女子团体冠军争夺战中，由于以直握拍传统打法闻名世界的日本队一开始就派横握拍削球手增山德出场，因此引起了观众的浓厚兴趣。增山德削球低而且稳，但中国十八岁的女选手李莉迎战她时，打出了风格，打出了水平，用拉弧圈球和打长短球的办法，打乱了对方的阵脚，以二比○取胜，为中国队赢得了第一分。但是，紧接着，日本队善于侧身猛攻的直握拍选手森泽幸子以二比一力胜中国选手李赫男，把场上比分扳成一平。这时，观众掌声四起，场上气氛开始紧张。"},{"type":"paragraph","text":"第三盘双打，中国队仍由李莉和李赫男出场，日本队上阵的是森泽幸子和另一名直握拍进攻型选手樫合惠津子。双方激战了三局，中国选手才以二比一获胜，得分再次领先。"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"765e2dc1a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
