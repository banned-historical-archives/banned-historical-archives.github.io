1976,"month":4,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"复旦大学　杨宽"},{"type":"paragraph","text":"不肯改悔的走资派邓小平是一个疯狂的复辟派，也是地地道道的孔老二的信徒，他要翻文化大革命的案，算文化大革命的帐，对批林批孔斗争也极为反感。一九七四年八月，在一次有关法家著作注释出版的座谈会上，中央领导同志作了亲切讲话，使大家受到极大的鼓励。当时，独有邓小平坐在一边，冷眼旁观，默不作声，充分表现了他对批林批孔运动极为不满的情绪。革命群众研究儒法斗争历史，努力以马克思主义总结历史经验，注意密切联系现实斗争，古为今用，使批林批孔运动更加深入，对此，邓小平更是大为恼火。在他授意下炮制的《论全党全国各项工作的总纲》一文，就摆出一副贵族老爷的态度，极端蔑视地指责说:这是“热衷于”“所谓的‘儒家’和‘法家’的斗争”。前后联系起来看，邓小平的这种态度决不是偶然的。什么“所谓”，言下之意，就是说，什么儒法斗争，都是人为地制造出来的。真是无耻的诽谤，恶毒的攻击!这也暴露了邓小平顽固地站在儒家的立场上，极力抵制批林批孔运动。邓小平对批林批孔斗争如此仇恨，说明他同刘少奇、林彪一样，都是崇拜孔老二的复辟狂，都是把腐朽没落的孔孟之道作为自己的修正主义路线的理论基础的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"儒法斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fc5a13b01"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
