"authors":[],"dates":[{"year":1951,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"长沙在捐献运动中已发现一些偏向","type":"title"},{"text":"【中南总分社二十二日讯】长沙在捐献运动中已发现一些偏向。有些机关在捐献中发现有盲目比多、挑战的现象，有些人生活并不算好，当场捐了很大的数目，结果影响了他的生活又很后悔。湖南省人民法院某留用人员怕捐少了别人说他不爱国，一下捐了十多万，但第二天就和家里人诉苦。长沙浏正街居民学习组，读过捐献新闻后，便在黑板报上挑战，有一个居民把他买菜的五百元捐出，组长便说：“几顿饭不吃没关系，不要你这五百元。”又说：“我们这组不落人后，大家不出，我个人出十万元。”因此该居民又借了五百元缴上，会后群众议论：“像这样强迫命令出钱还要得?”有些报纸对捐献运动的精神体会不够，在宣传中有不恰当之处，如六月七日新湖南报“大家谈”短文中曾以“为祖国多保存些英雄人物”为题以“多救活一些志愿军”“不能眼睁睁地看着他们牺牲、受伤而无动于衷”来号召捐献。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年6月23日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13cebca667"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
