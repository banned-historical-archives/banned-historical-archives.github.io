rt":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"发扬“不要管我”的革命精神条条落实毛主席的最新指示","authors":["北京部队空军学习毛主席著作积极分子孙敏"],"parts":[{"type":"paragraph","text":"读了《解放军报》社论《“不要管我”》和《无产阶级专政下继续进行革命的无产阶级先进分子的突出代表李文忠》的通讯，我受到了很大的教育，心里久久不能平静。李文忠同志的“不要管我”，集中体现了无产阶级专政条件下继续进行革命的无数无产阶级先进分子忘我的革命精神。无产阶级文化大革命出现了这样大好形势，就是千千万万个象李文忠这样的同志发扬“不要管我”的精神，坚决贯彻执行毛主席的一系列最新指示而创造出来的。"},{"type":"paragraph","text":"我联系自己支左的体会，学习《“不要管我”》的社论和李文忠同志的事迹，深深体会到，只有具有忘我的革命精神，才能使毛主席的最新指示条条落实，句句落实。如果从“我”字出发，处处为我，就不能贯彻执行毛主席的最新指示。我在北京女四中执行军训任务，经过和革命师生共同努力，我们排在全校最早实现按班级的革命大联合，我心里美滋滋的。"},{"type":"paragraph","text":"可是不久，有四个同学一连贴出五张大字报，说我们搞的大联合是“大凑合”，并退出了大联合的行列。当时，我想，这不是“拆我的台”吗？从“拆我的台”这个“私”字出发，去找这四个同学谈话，结果越谈越对立，使大联合受到了影响。"},{"type":"paragraph","text":"指导员蒋世才知道这件事之后，对我进行了耐心的帮助。他说：多团结一个同学，就为贯彻毛主席的革命路线增添一分力量。指导员还亲自深入到群众中去了解情况，找退出大联合行列的同学谈心，用毛泽东思想引导他们，结果，使四个同学又重新加入了革命大联合的行列。"},{"type":"paragraph","text":"从这件事我体会到，只有从“公”字出发，才能使毛主席的最新指示落实。如果从“我”字出发，贯彻毛主席的指示就不会坚决。"},{"type":"paragraph","text":"学习了《“不要管我”》的社论和李文忠同志的事迹，我更深刻地体会到，要贯彻执行毛主席的最新指示，就必须具有李文忠同志那种在无产阶级专政条件下继续革命的忘我精神，为捍卫毛主席革命路线，下定决心，不怕牺牲，排除万难，去争取胜利。"}],"alias":""},"tags":[{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b379d52979"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
