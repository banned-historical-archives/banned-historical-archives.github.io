rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要求政府取缔极右政党","authors":["吕鸿"],"parts":[{"type":"paragraph","text":"示威者来到7月27日发生针对外来移民爆炸事件的火车站静默，向在这次事件中受伤的人致意，并要求德国政府和全体公民一道反对新纳粹。"},{"type":"paragraph","text":"7月27日，德国极右分子在杜塞尔多夫火车站制造了一起炸弹爆炸事件，造成9名来自前苏联的移民受伤，一名孕妇因受伤而导致腹中胎儿死亡。"},{"type":"paragraph","text":"爆炸事件引起了德国社会各界的强烈反应，人们要求政府严厉打击新纳粹势力，并展开了一场要求取缔极右分子的后台德国国家民主党的大讨论。"},{"type":"paragraph","text":"由于极右分子近来在德国各地不断制造暴力事件，德国内政部长席利近日发表讲话说，在与新纳粹的斗争过程中，联邦政府从现在起将随时准备动用边防部队。德国政府日前还决定在各州成立专门工作小组，就是否取缔德国国家民主党进行调查。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a48f4734f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
