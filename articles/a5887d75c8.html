script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b2b674a1-9042-4317-a7b8-de4267668ba5","name":"毛泽东思想万岁（1958.1-1960）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"关于原子弹、氢弹的指示","alias":"","parts":[{"type":"paragraph","text":"分，最好八、九分，十分才足。所以用“鼓足”二字比较好。干劲各有不同，“鼓足干劲”这一句是新话，“力争上游”以前也有，不是新话。·"},{"type":"paragraph","text":"“鼓足干劲，力争上游，多快好省”，外国人看来可能不懂，好象不通，没有主词，本来想加一句“调动一切积极因素”当主词，：现在想不要也行。六亿人民就是主词。六亿人口中绝大多数人的干劲，除了章伯钧、罗隆基、章乃器、××等等这些人可能干劲不大。"},{"type":"paragraph","text":"插红旗，辨别风向，你不插人家插。任何一个大山小山，任何一亩田，看到那些地方没有旗帜就去插。看到白旗就拔。灰的也要拔，灰旗不行，要撤下来。黄旗也不行，黄色工会，等于白旗。任何大山上小山上，要经过瓣论，插上红旗。"},{"type":"paragraph","text":"上次讲的是风向，不是方向，风向即东风还是西风。反冒进，一九五大年大月开始的，那时日有十大关系，多快好省，还有促进会。四月中在政治局扩大会议上，有省市委书记鑫加，那时没有明确的决议就是君子协定，大家赞成，不象这次大会有明确的决议、报告。九五六年十一月二申金会，也没有明确决议，但有报导，重点是千方百计瑜产节约。那股风没有能够挡住，这是件坏事，转为好事，使我们有了比较，成都、南宁都谈过。这次大会，同志们有很多好的发言。·铁托是专门泄气，是那一方面的干劲。莫斯科宣言是我们这方面的干劲。南斯拉夫钢领是灭无产阶级志气，长敌人威风。"},{"type":"paragraph","text":"以后注意辨别风向。大风一来，十二级，屋倒，人倒，这样好辨别。小风不易辨别。宋玉写的《风赋》，值得看。他说风有两种，一种是贵族之风，“种是贫民之风（所谓“大王之风”与“庶民之风”）。风有小风、中风，大风。宋玺说，“风生予地，风起于青萍之末，侵谣溪谷，盛怒于土囊之口。”那时最不容易辨别。"},{"type":"paragraph","text":"接见阿联军事代表团时的谈话（摘录）"},{"type":"paragraph","text":"（一九五八年五月），"},{"type":"paragraph","text":"中国人民得到了阿拉伯联合共和国的友谊，感到非常高兴。··*圣世界人民都支持你们，支持阿拉伯各国人民。我们是站在反殖民主义斗争的一条战线上，相互支持，相宜美怀。"},{"type":"paragraph","text":"关于原子弹、氢弹的指示"},{"type":"paragraph","text":"（一九五八年大月）"},{"type":"paragraph","text":"搞一点原子弹，氢弹，我看有十年功夫完全可能。要下决心，搞尖端技术，赫鲁晓夫不给我们尖端技术极好，如果给了，这个眼是很难还的，搞一些人吃饭不干别的，五年不行，十年，总是可以搞出来的。原子弹要有，氢弹也要快，管它什么国，管它什么弹、原子弹、氧弹，我们都要超过。"},{"type":"paragraph","text":"西方资产阶级有的，东方无产阶级要有，西方资产阶级没有的，东方无产阶级也要有。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":96,"page_end":96},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5887d75c8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
