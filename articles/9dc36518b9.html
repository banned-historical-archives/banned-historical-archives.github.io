art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛主席军事著作新疆军区获初步成效","authors":[],"parts":[{"type":"paragraph","text":"本报讯 新疆军区广大干部努力学习毛主席军事著作。今年训练一开始，新疆军区就分别在南北疆举办了干部集训队；同时，大部分机关、部队、军分区也采取分批轮训或在职自修的方式，组织干部学习毛主席军事著作。新疆军区首长及各部队负责同志都亲自领导这一学习，有些负责同志亲自给干部讲课。不论是参加集训还是在职自修的干部，都阅读了毛主席的“中国革命战争的战略问题”、“论持久战”和“十大军事原则”等重要著作，还学习了有关的参考材料。"},{"type":"paragraph","text":"干部在学习过程中，一般都能联系实战经验，联系部队训练工作，刻苦地钻研。各部队还结合这项学习，编写了大批教材。某骑兵部队在上级协助下，两个多月就编出了切合实战需要的教材二十一份。"},{"type":"paragraph","text":"很多干部在训练中，都注意运用学习的成果，运用我军的作战经验，使训练质量有了显著的提高。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dc36518b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
