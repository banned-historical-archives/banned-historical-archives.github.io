ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对《关于矛盾同一性和斗争性问题的讨论》等文章的批语","alias":"","parts":[{"type":"paragraph","text":"对《关于矛盾同一性和斗争性问题的"},{"type":"paragraph","text":"讨论》等文章的批语"},{"type":"paragraph","text":"（1960年11月12日）请林克?找到这些刊物和报纸（载了那些人的文章的），送我一阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十二日"},{"type":"paragraph","text":"[1]这个批语写在1960年11月12日《人民日报》第七版上，该版在《学术动态》栏目中登载了《关于矛盾的同一性和斗争性问题的讨论》和《河南哲学工作者讨论事物发展的动力问题》两篇述评。第一篇说，最近一个时期，一些哲学工作者就错误思维和存在有没有同一性的问题、同一性和斗争性的关系以及质变状态有没有同一性的问题、事物发展的动力问题进行了讨论。这一讨论是由薛靖在《新建设》1960年第六期发表的《统一性和斗争性的关系》一文引起的。继而言立在《新建设》第七期上发表不同意见。以后，《光明日报》《学术月刊》《文汇报》又发表了周书文、吴秉元、唐凯麟、可几等人的讨论文章。现在这个讨论已初步展开。文章还简要介绍了他们的不同观点。第二篇说，据《中州评论》十八期报道，河南省一些哲学工作者8月底到9月初对事物发展的动力问题展开了讨论，有两种意见，一种认为，不但矛盾斗争是事物发展的动力，矛盾的统一性也是事物发展的动力，但多数人不同意上述意见，认为事物发展的动力不是矛盾双方的统一性，而是矛盾双方的斗争性。"},{"type":"paragraph","text":"[2]林克，当时任毛泽东办公室秘书。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":69,"page_end":69},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06482e6594"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
