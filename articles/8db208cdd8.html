art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理同达达赫总统会谈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年九月十七日讯 国务院副总理邓小平同毛里塔尼亚伊斯兰共和国总统莫克塔·乌尔德·达达赫今天下午举行了会谈。"},{"type":"paragraph","text":"毛里塔尼亚方面参加会谈的有达赫·乌尔德·西迪·哈伊巴，萨勒·阿卜杜勒·阿齐兹，哈姆迪·乌尔德·穆克纳斯，迪奥普·马马杜·阿马杜，阿卜杜拉希·乌尔德·达达赫，巴·马马杜·阿拉萨内，杜尔·艾莎塔·卡内夫人，谢赫·马莱宁·罗贝尔，穆罕默德·乌尔德·西迪·阿里，苏莱曼·乌尔德·谢赫·西迪亚， 耶达利·乌尔德·谢赫，塔基·乌尔德·西迪，穆拉耶·阿卜杜勒·穆米内，苏·穆罕默德·德伊纳。"},{"type":"paragraph","text":"中国方面参加会谈的有姬鹏飞、方毅、何英、陈慕华、郭鲁、薛公绰、汪普庆、罗旭、朱传贤、李步霄、秦凤翥、李樵、杨桂荣、李志洁、王贵栋。"},{"type":"paragraph","text":"我国领导人邓小平、纪登奎、吴德、徐向前以及数千名群众到机场热烈欢迎毛里塔尼亚贵宾。 新华社记者摄"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8db208cdd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
