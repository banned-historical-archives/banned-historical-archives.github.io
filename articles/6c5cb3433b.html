ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"对敌实施战术反击的意见值得认真考虑","alias":"","parts":[{"type":"paragraph","text":"对敌实施战术反击的意见"},{"type":"paragraph","text":"值得认真考虑"},{"type":"paragraph","text":"（1951年8月21日）德怀“同志，并告高\""},{"type":"paragraph","text":"你对邓华3同志八月十八日电丙项作战方案的意见如何。邓华说“在军事上我应有所准备，纵目前不进行战役反击，也当尽可能作战术的反击，收复些地方，推前接触线，更好地了解敌人阵地及其坚固程度”。我认为这个意见值得认真考虑，请你计划一下，九月份能否进行此种战术反击，如何进行法，须用多少兵力，胜利把握如何，敌人的反应将会如何，请就这几点考虑电告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十一日[1]德怀，即彭德怀，当时任中国人民志愿军司令员兼政治委员。[2]高，指高岗，当时任东北军区司令员兼政治委员。[3]邓华，当时任中国人民志愿军副司令员兼副政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":8,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":475,"page_end":475},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c5cb3433b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
