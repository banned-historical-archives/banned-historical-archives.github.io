ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"六纵应加强阻击李延年北进","alias":"","parts":[{"type":"paragraph","text":"六纵应加强阻击李延年北进！"},{"type":"paragraph","text":"（1948年12月4日）刘、陈、邓，粟、陈、张："},{"type":"paragraph","text":"（一）李延年3现使用七个师（其中有五十四军部队）于淮河以北，一部已到曹老集。望令六纵加强阻击，务必不使该敌北进过远，妨碍我解决黄维\"。（二）刘陈邓已使用十三纵突击黄维，该纵暂不能调动。（三）俟黄维解决，六纵、十三纵及中野全力均可使用于打邱李孙。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"四日二十二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军司令员刘伯承、第一副司令员陈毅和政治委员邓小平等的电报。"},{"type":"paragraph","text":"[2]粟、陈、张，指粟裕、陈士、张震，当时分别任华东野战军代司令员兼代政治委员、参谋长和副参谋长。"},{"type":"paragraph","text":"[3]李延年，当时任国民党军第六兵团司令官。[4]曹老集，镇名，位于安徽省固镇县南部。[5]黄维，当时任国民党军第十二兵团司令官。[6]邱李孙，指邱清泉、李弥、孙元良，当时分别任国民党军第二兵"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":330,"page_end":330},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3dd04b0955"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
