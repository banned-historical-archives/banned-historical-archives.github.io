rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想武装起来的中国人民决不能听任美帝国主义胡作非为再次严重警告美国侵略者/血债必须用血来还/美帝胆敢把战争强加在我们头上，我们就毫不留情地砸断美国侵略者的脊骨，坚决、彻底、干净、全部地把它们消灭掉。","authors":[],"parts":[{"type":"paragraph","text":"新华社五日讯 八月二十九日凌晨，美帝国主义军用飞机，悍然向正在北部湾正常航线上行驶的我国小型货船发起攻击，炸沉炸伤各一艘，打死我船员九人，打伤七人。这是美帝国主义对中国人民欠下的又一笔血债，是它在扩大侵略越南战争的同时，又一次明目张胆地对我国进行战争挑衅的严重事件。中国人民对美帝国主义这一血腥罪行表示无比愤慨，我国防部发言人就此提出最强烈的抗议！"},{"type":"paragraph","text":"八月二十九日一时三十分，我小型货船一零一八号、一零一九号，悬挂着我国国旗，在北部湾西部正常航线上航行，突然遭美国军用飞机连续轰炸扫射，达三小时之久。现已查明，我一零一八号船被炸沉，一零一九号船被炸伤。我船员九人被打死，七人受伤。"},{"type":"paragraph","text":"我国防部发言人强调指出，美帝国主义悍然炸沉炸伤我国小型货船，绝不是一次孤立的事件。这是美帝国主义疯狂对我国进行战争挑衅的又一严重步骤。美帝国主义在轰炸越南民主共和国首都河内，并进一步扩大对越南北方轰炸的同时，不顾我国政府和我国人民的多次警告，竟然一而再，再而三地对我国渔船、商船进行威胁挑衅和轰炸扫射，使我国人民生命财产遭受重大损失。我们再次严重警告美国侵略者，血债必须用血来还。用毛泽东思想武装起来的中国人民，决不能听任美帝国主义胡作非为。我们早就把话说在前面了，我们说了话是算数的。如果美帝国主义胆敢把战争强加在我们头上，那我们就毫不留情地砸断美国侵略者的脊骨，坚决、彻底、干净、全部地把它们消灭掉。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a88d45265"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
