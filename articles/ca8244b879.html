rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"谁拥护毛泽东思想，我们就和谁亲 谁反对毛泽东思想，我们就和谁拚","authors":[],"parts":[{"type":"paragraph","text":"有了战无不胜的毛泽东思想，云封雾锁看得清，狂风恶浪顶得住。"},{"type":"paragraph","text":"千变万变，活学活用毛泽东著作不能变；"},{"type":"paragraph","text":"天摇地摇，忠于毛泽东思想的红心不动摇。"},{"type":"paragraph","text":"保卫毛泽东思想，保卫毛主席的无产阶级革命路线，是我们革命的第一要求，生命的第一需要，生活的第一内容。"},{"type":"paragraph","text":"照毛主席指引的革命路线走，谁走得对我们就支持谁，谁走得好我们就学习谁，谁走歪了我们就帮助谁，谁反对走毛主席革命路线，我们就打倒谁。"},{"type":"paragraph","text":"毛泽东思想是我们的命根子，黑《修养》是我们的祸根子。"},{"type":"paragraph","text":"为捍卫毛主席革命路线而生，生的伟大；为捍卫毛主席革命路线而死，死的光荣。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca8244b879"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
