" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b2b674a1-9042-4317-a7b8-de4267668ba5","name":"毛泽东思想万岁（1958.1-1960）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"视察抚顺煤矿时的指示","alias":"","parts":[{"type":"paragraph","text":"视察无顺煤矿时的指示"},{"type":"paragraph","text":"（一九五八年四月二十九日）对于煤的综合利用问题，要好好的研究，这是今后发展的一个重要方向。"},{"type":"paragraph","text":"对当前工作的十七项指示（传达记录）"},{"type":"paragraph","text":"（一九五八年四月），当前有十七个工作"},{"type":"paragraph","text":"（一）十年农业规划：1、水利规划：全国大兴修水利，甘肃省五八年一千一百多万亩，我省原定三十二万亩，有保守，现为九十二万亩（解放前全省为九十四万亩）认为差不多，现在看还落后，五八年要修九十四万到一百万亩，解决水利。，2、肥料：要作到上万斤肥，打千斤粮。3、土壤改良：盐碱地的改良（如柴达木等地）。4、选择优良种子。5、改制、改良（农业技术改良，深耕细作）。6、病虫害的消灭。7、推广新式农具（包括农业机械在内）。8、副业发展：副业与农业的关系，发展副业为了支援农业。9、发展耕蓄。·10、绿化。：11、除四害。12、消灭严重疾病（传染病）。：、、这十二条中央、省、地、县、区、乡、农业生产合作社都要作出规划。"},{"type":"paragraph","text":"（二）另有十二个规划：1、工业规划（主要地方工业）；2、手工业；3、农业4、副业；、5、森林；：6、渔业；7、牧业；8、交通；9、商业；10、文教；11、科学12、卫生。中央、省、地、县都要作出规划。共为二十四条。：（三）反浪费问题。要开展反浪费运动，国务院将发指示，贪污也要反，贪污不是大量，浪费是大量的，特别在建设方面浪费最大。×××同志讲：“浪费很大，各个厂（场）矿都有浪费，反掉浪费就能积累建设资金，他说柴达木建设（工薪）不降，不管有多少油，我主张不降。”增产是两个方面，即增产，节约。增产不节约就浪费了产。（四）正确解决农村积累和消费问题。在合作化开始一二年，为了显示合作化的优越性提出多扣少分。现在是要多积累合作社的资金，一个合作社的积累也是巩固社的，没有社的积累，社就无法巩固。可考虑50%作为社的积累，50%分配。合作化后，农村的情况是25%的农户已达到富裕中农的生产水平。现在不强调生活水准，主要要发展生产，现在不是要吃好，穿好，而是要眞正苦干五年，艰苦奋斗，如果一人少用十元就六十亿，这对国家有好处，有了积累才能建设，有了建设才有希望。积累资金的办法：一种是国家的积累（包括企业事业公益金）。二种是合作社积累（合作社的公积金、公盒金）。三种是国家税收积累。"},{"type":"paragraph","text":"全国取得一条经验，一些建设国家投资就搞不好，凡是自已动手就能搞好建设，要大量"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":4,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":73,"page_end":73},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f32232912"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
