的通报","authors":[],"dates":[{"year":1953,"month":3,"day":25}],"is_range_date":false,"parts":[{"text":"华南分局关于粤西区发生严重自杀情况的通报","type":"title"},{"text":"在当前复查、土改运动中，粤西区发生了完全不应当发生的极其严重自杀现象。特将粤西区党委报告情况，简要通报如下：","type":"paragraph"},{"text":"粤西区土改县自杀人数至3月6日止，全区已达805人。仅自2月3日至3月6月统计：共×人，其中茂名×人；电白×人；信宜×人；化县×人；开平×久。区党委曾发出书面与电话指示达5次，但均来能制止。这种严重情况的继续发展，由于有些地方在追余粮等斗争中仍然用硬追硬逼、捆绑吊打办法。如化县五区一个干部说：“大地主不打搞不出余粮”；电白某乡遇敌顽抗，即施以吊打，近几天来，即自杀了15人；茂名不按政策规定，硬向地主追要余粮的很多；阳春四区徐屋乡组长乘深夜群众不在，亲自捆绑地主吊打；该乡斗争一地主婆时，把全部头发拔光。这些不执行政策，不讲究斗争策略的错误作法，是发生如此严重自杀的直接原因。","type":"paragraph"},{"text":"在干部比过去有经验，分局对各项具体政策更明确规定的今天，发生如此严重的自杀现象是完全不应当的，是无任何理由可以申辩的。这不仅仅是一般的所谓缺乏政策观点和对干部政策教育不够的问题，而且是一种不执行上级指示政策的严重的无组织无纪律的恶劣作风，没有决心采取有效办法制止此种现象的继续发展。因此各地必须严格执行分局3月15日给各区党委关于采取有效措施，坚决制止自杀现象的指示，将某些地区的严重自杀现象停止下来，使当前土改运动更健康发展。","type":"paragraph"}],"comments":[],"origin":"广东省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08282e8a5d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
