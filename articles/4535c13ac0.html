[],"dates":[{"year":1958,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“斯巴达克”临别会“八一”"},{"type":"paragraph","text":"客队女队三比○胜　男队二比三负"},{"type":"paragraph","text":"本报讯　昨天苏联“斯巴达克”男女排球队在北京体育馆同我国排球劲旅“八一”男女队举行一场友谊比赛，结果“斯巴达克”男队以二比三败给“八一”男队，“斯巴达克”女队三比○胜“八一”女队。"},{"type":"paragraph","text":"国务院副总理邓小平、贺龙、陈毅、李富春、聂荣臻、薄一波观看了昨天的比赛，赛后贺龙和陈毅副总理接见了双方队员，并和他们一起照了像。"},{"type":"paragraph","text":"昨晚的比赛是“斯巴达克”男女排球队在我国的最后一次比赛。在此以前，他们曾在北京、武汉先后同中国青年男女队、四川男女队、上海男女队、沈阳男女队、武汉男女队、广州部队队和广州队进行过十四场比赛，客队男队取得六胜一负的战绩，客队女队在七场比赛中也只输了两场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4535c13ac0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
