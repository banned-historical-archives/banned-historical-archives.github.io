art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席访问亚洲四国获巨大成功","authors":[],"parts":[{"type":"paragraph","text":"新华社25日讯 全国人民代表大会常务委员会第九十七次会议、国务院全体会议第一百三十二次会议，今天下午同时举行，听取陈毅副总理关于刘少奇主席访问印度尼西亚共和国、缅甸联邦、柬埔寨王国、越南民主共和国的报告。"},{"type":"paragraph","text":"宋庆龄、董必武副主席出席了会议。"},{"type":"paragraph","text":"陈毅副总理在报告中强调指出，刘少奇主席这次出国访问，取得了巨大成功，进一步加强了我国同亚洲四个近邻国家的相互了解和亲密友谊，对巩固和发展亚洲各国的友好团结，对世界和平和人类进步事业，作出了重要的贡献。陈毅副总理在报告中对印度尼西亚共和国、缅甸联邦、柬埔寨王国、越南民主共和国的国家元首、政府和人民的盛大欢迎和隆重接待，表示衷心感谢。"},{"type":"paragraph","text":"陈毅副总理报告以后，到会的人热烈鼓掌，对刘少奇主席这次出国访问所取得的巨大成就，一致表示赞扬。"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a087cf7fd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
