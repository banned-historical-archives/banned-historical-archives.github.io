art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"希望给部队下发毛主席著作","authors":["副政委宗汝林干事胡洪〖HH/换行〗DW：八八七二四部队"],"parts":[{"type":"paragraph","text":"当前，在贯彻中央工作会议和全军政工会议精神过程中，部队渴望学习毛主席著作。但是，从一九七九年以来，新兵入伍时没有发过毛主席著作。从我们部队的情况来看，现在，连队里有百分之六十的人员没有毛主席著作。学习时，干部战士只好几个人共读一本书，影响了学习效果。由于缺少毛主席著作的人数较多，要买部队又没有经费，即使有经费也一时难以买到。我们希望上级有关部门尽快帮助部队解决这一问题，以满足干部战士的学习需要。"},{"type":"paragraph","text":"八八七二四部队 副政委 宗汝林 干事 胡洪"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7818140220"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
