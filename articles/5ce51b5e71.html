s":[{"year":2000,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛毛新著《父亲邓小平“文革”十年记》在港出版"},{"type":"paragraph","text":"据新华社北京7月9日电 毛毛新著——“我的感情流水账”《父亲邓小平“文革”十年记》一书近日由香港中华儿女出版社出版，香港三联书店发行。"},{"type":"paragraph","text":"本书不同于国内版的特点是，编辑出版过程中，考虑到海外读者对文中涉及的“文革”时期一些人物并不熟悉，于是经过大量工作，多方搜集到100多幅珍贵历史照片和珍贵资料照片，大多是第一次公开发表。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":2000,"month":7,"day":10}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛毛新著《父亲邓小平“文革”十年记》在港出版","authors":[],"parts":[{"type":"paragraph","text":"据新华社北京7月9日电毛毛新著——“我的感情流水账”《父亲邓小平“文革”十年记》一书近日由香港中华儿女出版社出版，香港三联书店发行。"},{"type":"paragraph","text":"毛毛是邓小平的女儿，现名萧榕。《父亲邓小平“文革”十年记》一书是毛毛继《我的父亲邓小平》（上卷）之后，推出的一部以记述无产阶级革命家邓小平作为一个领袖人物在十年动乱之中大起大落、坚贞不屈的波澜壮阔生命历程的新作。作者排除疾病的困扰，历时一年详尽地倾诉了邓小平作为一个父亲、一个普通人的大悲大切、大彻大悟、悲欢离合的人间真情实意。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ce51b5e71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
