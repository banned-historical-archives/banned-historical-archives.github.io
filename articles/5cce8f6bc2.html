es":[{"year":1952,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京九日电】　留英中国学生总会在举行一九五二年大会之际，特电毛主席致敬。电文如下:"},{"type":"paragraph","text":"毛主席:"},{"type":"paragraph","text":"留英中国学生总会，届此一九五二年大会，谨向您及祖国人民致无上敬意。并恭祝在新民主主义建设工作中及保卫祖国、保卫和平、反侵略、反细菌战之斗争中，获得更大的胜利。全体同学一致决意加强内部团结，提高爱国认识，争取早日回国参加建设。"},{"type":"paragraph","text":"敬祝您身体健康并中华人民共和国万岁"},{"type":"paragraph","text":"留英中国学生总会"},{"type":"paragraph","text":"六月三十日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cce8f6bc2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
