art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈祝贺华国锋同志任中共中央主席；中央军委主席","authors":[],"parts":[{"type":"paragraph","text":"博茨瓦纳总统卡马的贺电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"华国锋主席"},{"type":"paragraph","text":"阁下："},{"type":"paragraph","text":"我高兴地获悉你任中国共产党中央委员会主席和中国共产党中央军事委员会主席。我谨借此机会代表博茨瓦纳政府和人民，并以我个人的名义，对你担任贵国这些非常重要的职务表示最衷心的祝贺。你的当选不仅是中国发展中的，而且是第三世界发展中的又一个重要的里程碑。我相信，在你干练的领导下，中国将继续为在世界上完全消灭压迫、不平等和霸权主义作出不懈的努力。我期待着同你合作，进一步发展我们两国和两国人民关系中一贯存在着的友谊。"},{"type":"paragraph","text":"博茨瓦纳共和国总统 塞雷茨·卡马"},{"type":"paragraph","text":"一九七六年十月二十八日"},{"type":"paragraph","text":"〗 加纳国家元首阿昌庞的贺电"},{"type":"paragraph","text":"新华社一九七六年十一月五日讯 加纳国家元首、最高军事委员会主席阿昌庞十一月三日打电报给华国锋主席，祝贺他任中国共产党中安委员会主席。"},{"type":"paragraph","text":"电报说：我们极为愉快地获悉你荣任中国共产党中央委员会主席。这说明中国人民和已故的杰出的毛泽东主席对你十分信任。"},{"type":"paragraph","text":"电报说：“在祝贺你就任现职的时候，我谨代表加纳政府和人民，并以我个人的名义，表示诚挚的希望，希望你在职期间将是中国人民和平和昌盛的新时期，可喜地存在于我们两国间的友好合作关系将进一步得到加强。”"},{"type":"paragraph","text":"孟加拉国总统赛义姆的贺电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会主席华国锋先生阁下"},{"type":"paragraph","text":"阁下："},{"type":"paragraph","text":"孟加拉国政府和人民同我一道对于你就任中国共产党中央委员会主席向你表示最热烈的问候和祝贺。我们对于你对贵国人民的进步和发展事业所作的贡献怀有崇高的敬意，而且相信，友好的中国人民将在你干练的领导下继续前进。我借此机会表示希望，我们两国间传统的友好合作关系在今后将进一步得到加强，以利于两国人民的共同利益。"},{"type":"paragraph","text":"请接受我最良好的祝愿，祝阁下健康和幸福，祝友好的中国人民幸福和昌盛。"},{"type":"paragraph","text":"孟加拉人民共和国总统"},{"type":"paragraph","text":"阿布·萨达特·穆罕默德·赛义姆"},{"type":"paragraph","text":"一九七六年十一月四日于达卡"},{"type":"paragraph","text":"西班牙首相苏亚雷斯的贺电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国总理"},{"type":"paragraph","text":"华国锋先生阁下："},{"type":"paragraph","text":"我祝贺阁下最近的任命，并愉快地借此机会向你表示祝愿，祝中国人民繁荣昌盛。"},{"type":"paragraph","text":"政府首相 阿道弗·苏亚雷斯"},{"type":"paragraph","text":"一九七六年十一月三日于马德里"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c73f94eb08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
