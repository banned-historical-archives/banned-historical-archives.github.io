thors":[],"dates":[{"year":1967,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴《建设报》说文化大革命使中国永葆革命青春"},{"type":"paragraph","text":"红卫兵是中国可靠的革命接班人"},{"type":"paragraph","text":"据新华社拉瓦尔品第电  拉瓦尔品第的《建设报》最近发表文章赞扬在毛泽东思想光辉照耀下的中国无产阶级文化大革命是一场伟大的运动，它将永葆中国革命的青春和热情，根除可能把中国引向资本主义复辟的一切反动的资产阶级影响。"},{"type":"paragraph","text":"文章指出，国际共产主义运动应该从苏联那里吸取重大的教训。现在，一小撮苏联统治集团成员统治着伟大的劳动人民群众，他们的统治竟达到这种程度，劳动人民群众根本不能自由发表意见，这因为苏联的无产阶级专政已蜕变成一小撮特权阶层的专政了。"},{"type":"paragraph","text":"文章说，毛泽东主席是一位伟大的领袖，他发动了这场文化大革命。在这场文化革命中出现的中国红卫兵，是可靠的中国革命的接班人，他们在毛泽东思想的洪炉里得到了锻炼。他们在各地宣传毛泽东思想，向反动思想进行无情的斗争，清除了帝国主义、资产阶级和剥削阶级的一切残余影响。他们是中国人民利益的保卫者。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3eef18f67d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
