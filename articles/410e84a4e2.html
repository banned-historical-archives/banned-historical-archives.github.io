":[{"year":1959,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京4日电】　圣地亚哥消息:智利埃尔特尼恩特铜矿的4000名工人从2日起举行罢工，抗议经营这个矿区的美国布拉登铜公司无理解雇工人和拒不答复工人们以前提出的关于增加工资的要求。"},{"type":"paragraph","text":"位于圣地亚哥附近的埃尔特尼恩特铜矿是智利的主要矿区之一。智利每年出口的铜，其中有40%是这里生产的。"},{"type":"paragraph","text":"【新华社北京4日电】　波哥大消息:美国垄断资本在哥伦比亚的弗龙蒂诺金矿企业的工人2日举行了罢工，要求按照生活费上涨的比例增加工资，废除允许厂主任意解雇工人的“保留条款”，和改进工人的福利措施。"},{"type":"paragraph","text":"弗龙蒂诺金矿位于哥伦比亚西部的帕霍纳莱斯镇，它开采哥伦比亚西部山区的黄金。在美国资本残酷的剥削下，这个矿的1500名工人过着非人的生活。弗龙蒂诺金矿工人的罢工得到哥伦比亚工人联合会和其他一些工会组织的支持。"},{"type":"paragraph","text":"有消息说，在帕霍纳莱斯镇，拥有1000多名工人的托里马中央制糖厂的工人也举行了罢工。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"410e84a4e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
