art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席挥手我前进","authors":["国庆观礼代表/成都部队骑兵某部班长邓少成"],"parts":[{"type":"paragraph","text":"天大地大没有毛主席的恩情大，河深海深没有毛主席的恩情深。当我从毛主席当年率领红军长征时经过的草地，来到首都天安门，看到毛主席健步登上主席台的时候，我的心激动得快要跳出来啦！这时，什么语言也表达不了我对毛主席的无限热爱，什么文字也写不尽我对毛主席的无限忠诚！我千遍万遍地高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"我是一个普通的革命战士，在毛泽东思想的哺育下，由一个不懂事的农村青年成长为一个光荣的共产党员，在思想革命化的大道上迈出了第一步，为革命做了一点我应该做的工作。可是伟大领袖毛主席却给了我这样大的光荣，这样大的幸福。我们祖国有今天，党有今天，军队有今天，人民有今天，全靠伟大领袖毛主席的英明领导，全靠战无不胜的毛泽东思想。一切荣誉归于伟大领袖毛主席，一切成绩归于战无不胜的毛泽东思想！"},{"type":"paragraph","text":"在天安门上，毛主席不断地向我们挥手。毛主席挥手我前进！我要永远高举毛泽东思想的伟大红旗，更好地活学活用毛主席著作，加强战备，随时准备歼灭入侵之敌。只要一声令下，毛主席指向哪里，我们就打到哪里！为了保卫毛主席，保卫毛泽东思想，保卫毛主席的革命路线，我们刀山敢上，火海敢闯，坚决用实际行动为毛主席争光，为伟大的社会主义祖国争光！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea131bc4d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
