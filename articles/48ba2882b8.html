script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"太原市某些建筑企业中  封建把头残余继续剥削工人","authors":["樊明晰"],"dates":[{"year":1951,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太原市某些建筑企业中"},{"type":"paragraph","text":"封建把头残余继续剥削工人编辑同志："},{"type":"paragraph","text":"在山西太原市某些国营和私营建筑企业中，残余的封建把头制度仍然继续剥削工人。太原市在去年曾在建筑业中进行了反把头运动，因此公开的封建把头现在是不多见了。但由于某些建筑公司机构不健全，对依靠工人阶级的观点不明确，所以变象的封建剥削还存在着。据我了解：大部建筑公司为本身固定工人数量过少，所以利用原有的一部分工人（称为“劳合班”），雇用另一部分工人，实行所谓“集体计件”的“评分”工资制。这种作法往往形成大工及长期工赚的多，小工及临时工赚的少的不合理现象。如山西工人建筑公司在兰村工区，把工程全部委托给“劳合班”。“劳合班”将原有工人工资均评为九分，而将中途雇用技术及劳动强度较好的工人评为五分；新大建筑公司也实行这种“评分制”，将大工评为二十五分，小工评为八分。其次是某些把头变成了“小组长”仍然继续剥削工人。如国营新生建筑公司第五工程队修建某项工程所订的“集体合同”，只是由几名工头包办的，大部工人毫无所知。结果工人共做了五千一百一十六方工程，只得到了四千四百方工程的工资。"},{"type":"paragraph","text":"我建议市政机关要严格核定各营造厂商应有的定量基本工人（目前太原尚无一家公司或厂商有足量固定工人）、技术人员、工具和资金，否则必然影响开工时间和工程质量。工人无固定雇主，和自己的工会组织，难免不为把头盘剥，这对发挥工人生产的积极性、钻研技术以提高工作效率的影响很大。"},{"type":"paragraph","text":"樊明晰"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48ba2882b8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
