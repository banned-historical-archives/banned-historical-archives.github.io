"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"去年，在一个大热天，暴雨象打翻了缸的水，从天上倾泻下来，不多久，黄浦区牯岭路街道定兴里内的积水已齐膝深。突然，一阵呼喊声传来:“纸盒浸水了，快去搬呀!”话音未落，只见一个少年奔向里弄纸盒加工组，接着他踏着三轮货车在水中来回运纸盒。由于用力过度，他双脚抽筋从车上摔了下来。参加抢运纸盒的居民们关切地要他歇一会，他却把头一摇说:“吴根生、董克礼为追捕阶级敌人死都不怕，我脚抽筋算得了啥!”望着这个生龙活虎般猛干的少年，人们不由得议论着:"},{"type":"paragraph","text":"“小刘参加向阳院后变化真大!”"},{"type":"paragraph","text":"“可不，八连同志花了大力气呢!听说，他们找他谈心少说也有几十次。”"},{"type":"paragraph","text":"事情还得从头谈起。"},{"type":"paragraph","text":"小刘原是里弄里出名的“皮大王”。八连二班战士程在义等参加定兴里委向阳院工作后，了解到这个情况，心想:办好向阳院，必须紧紧抓住阶级斗争这个纲，大批修正主义，大批资本主义，认真抓好青少年的教育工作，真正把巩固无产阶级专政的任务落实到基层。我们一定要在向阳院这个熔炉中把他锻炼成材!以后，程在义等同志和里弄干部、退休工人一起经常在向阳院里向小刘和其他青少年讲革命故事，组织他们学英雄人物，用共产主义的远大理想激励他们，帮助他们树立革命的人生观。在八连同志的亲切关怀下，小刘开始变了。他学雷锋，做好事，有时还主动提早到学校打扫卫生。"},{"type":"paragraph","text":"程在义和八连的同志们见到这一切有多么高兴啊!可是时隔不久，出了件蹊跷事，向阳院举办了“学习英雄孔宪凤”的学习班，小刘凳子还没坐热，就没了影子。程在义是个有心人，琢磨着小刘可能遇上了什么事。一调查，果然是他原来的一批“小兄弟”又找上他了。"},{"type":"paragraph","text":"程在义马上和里委会干部、民兵小分队进行了研究。大家谈到，当前社会上刮起了一股右倾翻案风，一小撮阶级敌人也乘机跳出来攻击向阳院是“八月荷花一时鲜”，看能结出什么“向阳果”。我们要坚持以阶级斗争为纲，做好后进青年的转化工作，以实际行动回击右倾翻案风。当晚，程在义赶到了小刘家里，一直等到很迟还未见他归来，第二天清早又去他家，终于找着了小刘。经过一番语重心长的谈话后，小刘有些醒悟了。程在义又买了几本学习材料和《青年思想漫谈》等书送给他，并在第二天带他和向阳院的其他青少年去“八连连史展览室”参观。"},{"type":"paragraph","text":"不久，小刘主动给八连和里委会写了思想汇报，表示了要以八连指战员为榜样，誓为共产主义理想奋斗的信念。"},{"type":"paragraph","text":"现在，小刘已踏上了工作岗位，程在义也离开定兴里的向阳院，担负新的战斗任务，但八连同志对向阳院的关怀并未结束。他们在深入批邓、反击右倾翻案风的斗争中，帮助定兴里委会建立了向阳营，由八连战士担任了营副教导员；开展小型多样的活动，进一步深批邓小平反革命的修正主义路线……。向阳院，这株社会主义百花园中的鲜花，在毛泽东思想阳光的哺育下，开放得更加生气盎然、艳丽夺目!"},{"type":"paragraph","text":"(本版故事均为本报通讯　员、本报记者采写)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cb0a377d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
