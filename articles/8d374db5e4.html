script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"解决郝鹏举部应与全部战略方针联系考虑","alias":"","parts":[{"type":"paragraph","text":"解决郝鹏举部应与全部战略方针联系考虑"},{"type":"paragraph","text":"（1947年2月9日）陈、粟、谭，并告饶，刘、邓凹:"},{"type":"paragraph","text":"解决郝鹏举部很好。但就全部战略方针来说，如你们方针是解决南面，则似乎打得早了一点，可能影响敌各部进得更谨慎。打了郝鹏举后你们似应按兵不动（要有极大忍耐心），让敌各部放手北进，然后各个歼灭之。如你们方针是先解决北面，则打郝鹏举并无妨碍。你们须在两个方针之间首先有所决择。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"丑佳"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军司令员兼政治委员陈毅、副司令员粟裕和副政治委员谭震林的电报。"},{"type":"paragraph","text":"[2]饶，指饶漱石，当时任华东军区政治委员。刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":2,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":429,"page_end":429},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d374db5e4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
