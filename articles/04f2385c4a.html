e":"国务院人事局关于劳动年限计算问题的复函（摘录）","dates":[{"year":1957,"month":12,"day":21}],"is_range_date":false,"authors":["国务院人事局","浙江省人民委员会人事局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 390","tags":[{"name":"国务院","type":"主题/事件"}],"parts":[{"type":"title","text":"国务院人事局关于劳动年限计算问题的复函（摘录）"},{"type":"subtitle","text":"（一九五七年十二月二十一日）"},{"type":"paragraph","text":"浙江省人民委员会人事局："},{"type":"paragraph","text":"（57）人福字第1045号函悉。所询问题，答复如下："},{"type":"paragraph","text":"（2）……工作人员原为私人商店店员的时间，可以计算劳动年限；自己没有车子的人力车工人，他们以拉车收入为生活主要来源的工作时间应计算劳动年限；家庭教师，如果当时是以当家庭教师的工资为生活主要来源的，当家庭教师的时间可以计算劳动年限，否则不计算劳动年限；伪消防警，一般不得计算劳动年限，如果是当厂矿企业所属的消防警，当消防警的时间可以计算劳动年限。"},{"type":"paragraph","text":"(摘自〔57〕国人办发字第2844号文件)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04f2385c4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
