ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"对关于目前沿海军事斗争的几项规定的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对关于目前沿海军事斗争的几项规定的批语和修改!"},{"type":"paragraph","text":"（1956年11月21日）退彭。有几处小的修改，请酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月二十一日"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"我们对帝国主义好战分子和蒋介石、李承晚口集团最近的军事示威、挑和寻找制造国际紧张局势借口的阴谋活动，必须提高警惕，加强戒备。必须遵照中央和缓国际紧张局势的既定方针，严守"},{"type":"paragraph","text":"[1]本篇一是毛泽东对中共中央军委委员、国务院副总理兼国防部部长彭德怀1956年11月21日报告的批语。本篇二和三是中共中央军委关于目前沿海军事斗争的几项规定中的两段文字。文中用宋体字排印的是毛泽东加写的文字。"},{"type":"paragraph","text":"[2]李承晚，当时任大韩民国总统。毛泽东全集第三十七卷自卫的立场，采取特别慎重的步骤，决不主动惹事，以免政治上陷于被动，即使在某种情况下失去某些战机，也决不上敌圈套。"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"对越入我国大陆边缘上空的外国运输机，我海（边）防部队不要向其攻击，但应严密监视并即上报。如深入我大陆纵深，在确认为军用机而非民航机时，或发现进行空投特务、散发传单等活动时，则应迫其降落或歼击之。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":11,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":149,"page_end":150},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e949c5a126"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
