script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"为转发一封关于工人监督生产问题来信的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发上海市五反第一期总结报告的批语"},{"type":"paragraph","text":"（1952年4月4日）上海市委，华东局、各中央局、分局，并转省市区党委："},{"type":"paragraph","text":"上海市委四月二日关于五反的十条经验“很好。这是五反以来最完备的一次经验总结，望一切正在推行五反或准备推行五反的城市党组织，注意研究，一体遵行。并可在党刊上发表。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"四月四日"},{"type":"paragraph","text":"[1]上海市五反第一战役从3月21日开始，至3月31日结束，对74家重点户进行了检查。所取得十条经验是：（一）充分准备，不打无把握的仗。（二）五反必须结合生产。（三）明确交代政策，破除各种顾虑。（四）从诉苦运动着手，充分发动群众，引向五反斗争。（五）争取高级职员是取得五反胜利的重要关键。（六）对资本家充分利用矛盾，多方实行分化。（七）充分运用党在资本家中间的影响和力量。（八）在政治上打掉资本家的“威风”，要他们全面交代违法事实，务求详尽确实，务求说清违法事实来龙去脉，数字务求详尽准确。（九）充分发动群众与严密控制相结合，这是保证运动正确发展与彻底胜利达到“反而不乱”的关键。（十）巩固胜利，妥善收兵，做到有始有终。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":544,"page_end":544},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fc65cd93a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
