ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于同意苏联就美国对日和约草案所拟复文的电报","alias":"","parts":[{"type":"paragraph","text":"关于同意苏联就美国对日和约草案"},{"type":"paragraph","text":"所拟复文的电报"},{"type":"paragraph","text":"（1951年5月6日）菲里波夫同志："},{"type":"paragraph","text":"你给我的五月六日的电报收到了，我们完全同意你们对美国政府对日和约草案的答复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五一年五月六日廿四时[1]菲里波夫是斯大林的代号。"},{"type":"paragraph","text":"[2]斯大林在这份电报中向中国政府通报了苏联政府关于准备对日和约问题拟定的给美国政府复文的主要内容。其要点是：准备对日和约草案，不应由美国政府单独进行，而应由中、苏、美、英等国共同进行准备，并吸收所有对日参战国一起参与；对日和约应在开罗宣言、波茨坦宣言和雅尔塔协定的基础上制定，并以日本应当成为和平民主的独立国家，限制日本武装力量使之不得超过自卫的要求，反对日本军国主义复活，以及对日本和平经济事业发展不加任何限制等作为指导原则。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":276},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41d47d43f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
