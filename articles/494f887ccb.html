s":[],"dates":[{"year":1950,"month":7,"day":15}],"is_range_date":false,"parts":[{"text":"苏南失业工人情况","type":"title"},{"text":"（华东总分社7月15日讯）据估计，苏南现有失业工人已达9万2千余人，连家属计共约30万左右。各地对失业工人救济工作，做得很差，故失业工人对我很不满，认为“共产党来了没得饭吃”。据无锡总工会同志谈：失业工人中，商店比工厂严重，分散的工人比集中的工人多。无锡现有失业工人2万多，因城内无法生活，很多都回到乡下去了。很多失业店员都靠摆摊子过活。城里劳动力仍过剩，无锡共有2千多辆黄包车，而黄包车夫却有7千多个。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年7月21日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"494f887ccb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
