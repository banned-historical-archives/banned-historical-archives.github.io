ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对各国驻华使节、外交官在河北、河南两省参观的报道的批语","alias":"","parts":[{"type":"paragraph","text":"对各国驻华使节、外交官在河北、河南两省参观的报道的批语"},{"type":"paragraph","text":"（1959年12月）一个有兴趣的报导\"，宜一看。送各同志阅。退毛。"},{"type":"paragraph","text":"[1]1959年12月7日编印的《外事动态》第一一五期上登载的这一报道说，外交部组织各国驻华使节、外交官于11月12日至21日到石家庄、郑州、洛阳等地参观，外宾们的反映是：一、一致承认我国发展速度快、建设成就伟大。二、对小洋群大炼钢铁的发展感到意外。三、认为人民公社发展情况良好。四、认为看到三门峡工程是这次旅行的高潮。五、承认各地物资供应充足。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":514,"page_end":514},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52f79fa9e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
