art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席建军路线奋勇前进——庆祝中华人民共和国成立二十二周年","authors":[],"parts":[{"type":"paragraph","text":"福州部队活学活用毛泽东思想先进集体某团党委，响应毛主席关于“认真看书学习，弄通马克思主义”的伟大号召，刻苦学习，反复实践，有力地加强了党委成员的思想革命化，促进了部队革命化、战斗化建设。"},{"type":"paragraph","text":"北京部队某部党委成员大兴调查研究之风，坚持唯物论的反映论，深入基层，总结典型经验，推动全盘工作。这是党委书记郑郊同志和战士亲切交谈。"},{"type":"paragraph","text":"南京部队东海前哨守备一连的同志，遵照毛主席关于“人民解放军永远是一个战斗队”的伟大教导，牢固树立常备不懈思想，把各项战备工作做得扎扎实实。这是指战员正在进行战斗演习。"},{"type":"paragraph","text":"我军广大指战员遵照毛主席关于人民解放军既是一个战斗队，又是工作队、生产队的教导，积极参加三支两军工作。图为广东省乐昌县委书记、革委会军队代表韩希昌，深入基层调查研究，带着革命、生产中的问题和基层干部一起学习毛主席的《实践论》。"},{"type":"paragraph","text":"“提高警惕，保卫祖国”。海军某部六○一艇指战员活学活用毛主席的军事思想，抓紧海上军事训练，时刻保持高度警惕，守卫在海防线上。"},{"type":"paragraph","text":"黑龙江生产部队某部指战员，在毛主席光辉的《五·七指示》指引下，为革命多打粮，支援社会主义建设。"},{"type":"paragraph","text":"空军某部杜凤瑞同志生前所在大队指战员，牢记毛主席关于“提高警惕，保卫祖国”的伟大教导，以杜凤瑞为榜样，发扬英勇顽强的战斗作风，决心把大队建设成反侵略战争的空中尖刀。"},{"type":"paragraph","text":"新疆军区驻巩乃斯草原边防某部队指战员，积极宣传毛主席的人民战争思想，帮助民兵搞好“三落实”，共同守卫伟大社会主义祖国边疆。这是军民联防小分队巡逻在深山密林中。（本版照片均为本报通讯员摄）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"738fb7503d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
