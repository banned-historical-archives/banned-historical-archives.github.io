art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底批判修正主义教育路线 大立特立毛主席的教育路线","authors":["陈善淳？胡定芳"],"parts":[{"type":"paragraph","text":"《人民日报》在发表同济大学等几个学校关于教育革命一些设想的编者按中，传达了我们伟大领袖毛主席关于教育革命的最新指示。我们千遍万遍地高呼：伟大领袖毛主席万岁！万万岁！"},{"type":"paragraph","text":"我们曾经和同济大学的无产阶级革命派在军训期间共同战斗了两个月。广大革命师生对资产阶级、修正主义教育路线的控诉和批判，使我们深深地受到了教育。许多青年学生谈到：过去，学校的修正主义分子忠实执行中国赫鲁晓夫的黑指示，不断向学生灌输修正主义的毒素，说什么“要把学生培养成高、精、尖的总工程师”。他们对建筑系的学生说：“你们将来都是总工程师一类的人物，要象会指挥作战的大将，要象一个庞大的乐队总指挥一样。”开学后，让学生参观的第一个建筑，就是教授的“教工俱乐部”；领学生参观的第一个住宅，就是教授住的房子；给学生放的第一次幻灯片，就是西方资产阶级生活方式的大杂烩。这些修正主义分子还借口“建筑师要懂得生活”，让学生多看外国电影、香港电影，要看《桃花扇》、《西厢记》、《茶花女》。我们听了这些控诉，更加认识到毛主席提出的“教育要革命”的伟大意义和深远意义。这一革命将推翻资产阶级知识分子对学校的统治，将彻底打碎资产阶级教育制度，把所有学校办成红彤彤的毛泽东思想的大学校。"},{"type":"paragraph","text":"同济大学的革命师生员工，对修正主义教育路线的控诉和批判，成为他们大搞教育革命的巨大动力。广大革命师生员工坚决响应毛主席关于教育革命的伟大号召，遵照毛主席的“五·七”指示，边学习边实践，把设计、施工、教学紧密结合在一起，经过多次调查研究，提出了教学改革的设想。这是毛主席的教育路线的胜利，是对修正主义教育路线的沉重打击。"},{"type":"paragraph","text":"我们坚决响应毛主席的伟大号召，以“斗私，批修”为纲，在“三支”“两军”工作中，活学活用毛主席著作，同革命的学生、革命的教员、革命的工人，同广大无产阶级革命派战斗在一起，为夺取无产阶级教育革命的彻底胜利贡献自己的力量。"}],"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"941a0a777c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
