es":[{"year":1952,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们要警惕和打退资产阶级糖衣炮弹的进攻"},{"type":"paragraph","text":"编辑同志：读了薄一波同志“为深入地普遍地开展反贪污、反浪费、反官僚主义运动而斗争”的报告后，我又想起了天津专区刘青山、张子善事件。"},{"type":"paragraph","text":"刘青山、张子善事件发表时，我很惊讶。刘青山、张子善是参加革命很久的老干部。他们曾经英勇地对敌斗争，他们对革命有过一定的功劳。那末，刘青山、张子善为什么变质了呢？我暂时得出一个结论：刘青山、张子善本质太坏。但又想，他们既然“本质太坏”，过去如何能“久经考验”？我想不通。"},{"type":"paragraph","text":"薄一波同志的报告指出，刘青山、张子善是被资产阶级的糖衣炮弹毁灭了的。我开始认识到：刘青山、张子善固然本质太坏，但更重要的是他们在今天遇到了更可怕、更毒辣的敌人——资产阶级的腐化堕落思想。他们没有能够过这一关，他们被资产阶级的糖衣炮弹打中了，“被这糖衣炮弹毁灭了”！"},{"type":"paragraph","text":"薄一波同志指出，有一些人“在生活上不是提倡简朴刻苦，而是学习铺张享乐”。像这样的人（连我在内），恐怕不是少数。因此，我深深体会到：如果我们不警惕和打退资产阶级糖衣炮弹的进攻，那就有亡党、亡国的危险。　黄来"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7eaa0b7d86"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
