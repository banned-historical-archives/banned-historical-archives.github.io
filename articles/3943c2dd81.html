s":[],"dates":[{"year":1951,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决清匪反霸减租退押"},{"type":"paragraph","text":"——贵州兴义两个区农民代表会议给毛主席的信中央人民政府毛主席："},{"type":"paragraph","text":"我们兴义农民和其他全国各地农民一样，在您英明的领导下，坚强团结起来站起来了，我们兴义县环城区黄草镇及新开辟的崇仁区，六百零九个农民代表，正以万分兴奋和愉快的心情，自一九五○年十二月一日起进行着首届代表会议，热烈的商讨自己的翻身事业。现在会议已告结束，我们除以坚强的信心和英勇的实际行动来保证贯彻大会的决议，迅速完成清匪、反霸、秋征、减租、退押、禁烟等六大历史任务，求得我们农民的彻底翻身而外，特向您——我们农民的救星致以崇高的敬礼！"},{"type":"paragraph","text":"贵州省兴义县环城区黄草镇崇仁区农民代表会议全体代表"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3943c2dd81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
