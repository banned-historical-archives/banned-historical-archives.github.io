script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西南非洲民族联盟发表声明支持越南人民斗争  谴责修正主义者为美帝侵越效劳","authors":[],"dates":[{"year":1966,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西南非洲民族联盟发表声明支持越南人民斗争"},{"type":"paragraph","text":"谴责修正主义者为美帝侵越效劳"},{"type":"paragraph","text":"据新华社开罗电　西南非洲民族联盟最近发表声明，揭露美帝国主义和修正主义者勾结在越南问题上策划新的“和谈”骗局。声明还表示支持越南人民把抗美救国斗争进行到底，直到取得最后胜利。"},{"type":"paragraph","text":"声明说：美国法西斯已经淹没在越南人民战争的汪洋大海之中，他们一面竭力加紧进行侵略战争，一面狡猾地加紧推行“和谈”骗局。他们各色各样的仆从——从反革命修正主义叛徒直到他们在各国的走狗——正在进行密谋，利用他们的全部机构，如联合国大会等，来策划新的“和谈”阴谋，为美帝国主义效劳。声明说，“经受过考验的越南人民，是决不会让他们得逞的。他们进行丑恶的勾结，只会使他们成为一切主持正义的人们不断抨击的目标。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c30ffd377"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
