script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《海瑞罢官》鼓动右倾机会主义分子卷土重来","authors":["张国民"],"dates":[{"year":1966,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《海瑞罢官》鼓动右倾机会主义分子卷土重来"},{"type":"paragraph","text":"张国民"},{"type":"paragraph","text":"提要　海瑞一生有两次罢官，但根本没有“失败了再干”的思想。吴晗同志蓄意歪曲史实，目的是鼓动失败了的右倾机会主义分子，继续反党反社会主义。"},{"type":"paragraph","text":"一九五九年，在反右倾机会主义的斗争中，党取得了重大的胜利。正当那些自命海瑞的右倾机会主义分子彻底失败、被罢免撤职之时，吴晗同志为什么不写别的，偏偏要选中“海瑞罢官”这个题材，七易其稿，非“破门而出”不可呢？他说过，创作历史剧必须“密切结合当前需要”，选取“有现实意义的题材”。看来，他自己正是这样做的。"},{"type":"paragraph","text":"党批判那些自命海瑞者反人民，他就竭力把海瑞美化成“为民作主”、“为民谋利”、“为民除害”、“受民爱戴”的劳动人民的“救星”。那些自命海瑞者攻击人民公社“搞糟了”，他就大写“江南困苦凄凉相，不退占田不久长”，“退田才能使民安”。党要那些自命海瑞者认罪，他就竭力鼓吹“老来傲骨犹然在，岂肯折腰媚权臣？”“大丈夫顶天立地，岂可怕杀身之祸”。那些自命海瑞者被撤了职，他就说“阴谋陷害理不当”，“海瑞罢官姓名香”，“清名千古永流芳”。党胜利地粉碎了右倾机会主义者的进攻，他就大肆鼓吹“不为失败所吓倒，失败了再干”。"},{"type":"paragraph","text":"这正是同党唱对台戏。这正是“密切结合”右倾机会主义者的“当前需要”，替他们说话，给他们撑腰，要他们顽固到底，重整旗鼓，继续反党、反人民、反社会主义，为复辟资本主义而奋斗。"},{"type":"paragraph","text":"尤其值得指出的是，吴晗同志蓄意歪曲史实，强调海瑞“失败了再干”，其居心是十分险恶的。海瑞一生有两次罢官。一次是上《治安疏》被嘉靖罢官下狱。那次他连死都准备好了，罢官更是意料中事。所以这是心甘情愿的，扯不上“失败”，更扯不上“失败了再干”的问题。另一次是任应天巡抚时。他在这次被罢黜时所上的《告养病疏》中说：“赐臣回籍，永归田里。”同时在给操江御史吴时来的信中说：“生已促装南归，以俟后之君子，而生不与矣。……这等世界，做得成甚事业！”由此可见，海瑞在这次罢官时只是既愤懑而又灰心丧气，根本没有“失败了再干”的思想。吴晗同志之所以要歪曲史实，强调“失败了再干”，正是为了鼓动那些失败了的右倾机会主义者卷土重来，继续反党反社会主义。他现在说自己“完全是为古而古”，“《海瑞罢官》却一点时代气息也闻不到了”，只不过是笨拙的遁辞罢了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9ef96bccc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
