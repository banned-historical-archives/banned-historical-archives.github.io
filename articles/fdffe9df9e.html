ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中国代表团到达纽约机场的书面讲话稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中国代表团到达纽约机场的"},{"type":"paragraph","text":"书面讲话稿的批语"},{"type":"paragraph","text":"（1971年11月）同意。"},{"type":"paragraph","text":"[1]中华人民共和国出席联合国大会第26届会议代表团团长乔冠华1971年11月11日到达纽约机场发表的书面讲话指出，中国政府一贯主张，在和平共处五项原则基础上，同其他国家建立和发展正常的关系；一贯支持被压迫人民和被压迫民族争取自由解放、反对外来干涉、掌握自己命运的正义斗争。我们代表团将遵循我国政府的既定政策，在联合国里同一切爱好和平和主持正义的国家代表一道，为维护国际和平和促进人类进步的事业而共同努力。这个讲话载于1971年11月12日《人民日报》。"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":276},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdffe9df9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
