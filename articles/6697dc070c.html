<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"定县领导干部坚持蹲点调查方法","authors":["记者","谷峰"],"dates":[{"year":1963,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"定县领导干部坚持蹲点调查方法","type":"title"},{"text":"记者谷峰","type":"authors"},{"text":"本报天津十九日电：有计划地组织领导干部，深入农村进行调查研究，总结群众经验，在河北省定县许多领导机关中，开始成为一项经常的工作制度。许多干部已经把下队蹲点，看作是改进领导作风和领导方法的法宝。","type":"paragraph"},{"text":"中共定县委员会书记张铄和副书记刘朝燕，最早开始下队蹲点，常年坚持不断，三年中每人在十三四个点上作过调查研究。在他们的影响下，各级干部纷纷走出机关，下队蹲点。现在，县、区和公社的大部分领导干部，都到农村蹲过点，作过调查研究，其中多的七八次，少的三四次。","type":"paragraph"},{"text":"定县领导机关在一项工作任务布置下去以后，就及时派出领导干部蹲点作调查研究，从群众中寻找解决问题的具体办法。许多事例说明，群众的智慧一旦集中起来，变为领导的经验，就会在指导全面工作中，起到很大的作用。去年春天，大部分地区滴雨未落，农村出现大旱。一些水利条件较差的生产队，认为旱情严重，原有的一些小型提水工具，不能浇灌全部土地，产生了坐等机电水利设备的思想。这个县的有关领导部门几次召开电话会议，发出抗旱指示，但这些地区的抗旱仍迟迟不见行动。这时候，由县委书记带领的工作组，来到了水利条件差而适时浇灌农田的流驼庄大队。他们发现这个全部是沙窝漏地的大队，依靠各种旧式的提水工具，每五天就给一千多亩小麦浇一次水，使小麦能够正常生长。工作组立刻把群众中零星的抗旱方法，加以整理归纳，总结成一套完整的土法抗旱经验。县里的有关部门又及时派出干部向受旱地区介绍推广。结果，一些等待机械、等天下雨的地区，很快就把原有的小型提水工具充分利用起来，日夜浇灌农田，保证了大秋作物的适时播种。","type":"paragraph"},{"text":"怎样才能使更多的干部下队蹲点，并且自觉地蹲下去，有效地进行调查研究呢？中共定县委员会最近总结了这方面的经验。他们采取的主要做法是：各级党委的书记带头到条件差、问题复杂的地方，蹲下来，作出样子，使多数干部从实践中认识到调查研究的重要意义，从而下定决心蹲下去。这个县的梁家营，是出名的后进队。过去，区和公社的干部多次去那里检查工作，督促生产。但是，这里的落后面貌一直没有改变。原因在哪里？区和社的干部心中无数。去年夏天，县委书记张铄邀请区和公社的党委书记一同到这个队蹲点调查，发现这个队的党员和群众，迫切要求改变落后面貌，只是缺少一个坚强的领导。于是，他们帮助党支部首先健全了组织生活，举办了党课，召开贫农下中农社员座谈会，挖后进的根子，并且耐心地帮助干部改进作风，学会正确的领导方法。这样，干部觉得办法多了，社员们觉得有了奔头。经过大家的勤奋努力，工作和生产的落后面貌很快有了转变。区和社的两个书记，从梁家营回去后，立刻蹲到另外的后进队，寻找解决生产关键的大计。","type":"paragraph"},{"text":"及时组织干部交流蹲点中获得的新情况、新问题和新的经验，并且及时有效地运用到当前各项工作中去。这是定县鼓励干部下队蹲点的另一个做法。各级党委还经常召开专门会议，总结和交流调查研究的经验，表扬认真坚持蹲点的干部，帮助一些干部学会正确掌握调查研究的方法。这样一来，各级干部亲眼看到，蹲点作调查研究，能提高思想水平，丰富领导工作经验，调查研究的结果又能在当前工作中起到作用。因此，下队蹲点的自觉性提高了，深入实际的作风大大发扬。","type":"paragraph"},{"text":"这个县的第三个做法是：减少会议，合理安排机关工作，减轻蹲点干部的负担，使他们放心下去，安心蹲住。凡是经过会议讨论决定的，或是上级有明确指示的工作，由守机关的领导干部处理，不必事事开会讨论解决。一切工作问题，凡能在上边解决的，不从点上调干部回机关处理。上级的指示，能在点上传达的，一般不召开会议传达。","type":"paragraph"},{"text":"下队蹲点后，怎样才能收到预期的效果？许多干部在谈到切身体会时说：认真坚持“四同”，是取得群众信任，迅速熟悉基本情况，获得真实材料的最好方法。开始蹲到点上，生产队的一些干部和社员，对于上边去的干部，能否蹲得住，能否帮助他们解决生产和工作中的问题，往往持着观望或怀疑的态度。但是，下队干部落户在贫农下中农家中，又同社员一块下地劳动，谈生产，叙家常，时时关怀他们的生活。这时，他们感到你是平等待人，诚恳相处，从而关心你，信赖你，作到无事不谈，无话不说。有了这个条件，进行调查研究，就容易得多了。","type":"paragraph"},{"text":"这些干部还谈到：下队作调查研究的干部，还必须紧紧依靠党的基层组织，用最大的热情帮助生产队，把当前的生产和工作搞好。工作时，不轻易打乱队里的计划，不给干部增添麻烦；不包办代替，也不要指手划脚。调查研究中，发现的新情况，提出的新问题，总结的新经验，要向基层党组织汇报，并倾听他们的意见。同时，要体贴队干部的困难，关心他们的工作。发现缺点，不要轻易批评，不要冒然指责。要以关怀的态度，出主意，想办法，帮助他们改进工作作风，帮助他们学会掌握正确的工作方法。这样，队里的生产和工作，才会搞好，队干部的工作能力，才会进一步提高；而下队蹲点的干部，在基层组织的具体帮助下，也才会顺利地获得有益的材料，收到预期的效果。","type":"paragraph"}],"comments":[],"origin":" 1963年8月20日《人民日报》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6697dc070c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
