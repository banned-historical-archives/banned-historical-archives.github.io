art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"马拉总理离京前往上海访问 李先念副总理等到机场欢送"},{"type":"paragraph","text":"斐济总理卡米塞塞·马拉和夫人以及随同来访的其他斐济贵宾，结束了在北京的访问，由第一机械工业部部长周子健，外交部副部长王海容陪同，六月十四日上午乘专机离开北京前往上海访问。"},{"type":"paragraph","text":"到机场欢送斐济贵宾的有国务院副总理李先念和夫人林佳楣，人大常委会副委员长许德珩等以及首都群众数千人。"},{"type":"paragraph","text":"邓小平副总理会见扎伊尔朋友"},{"type":"paragraph","text":"国务院副总理邓小平六月十四日上午会见了由扎伊尔国家指导国务委员莫科洛·瓦·姆庞波率领的扎伊尔新闻代表团。"},{"type":"paragraph","text":"会见时，邓副总理同莫科洛团长等扎伊尔朋友进行了亲切友好的谈话。邓副总理说，扎伊尔反抗苏、古雇佣军两次入侵的斗争是正义的，蒙博托总统做得对，扎伊尔人民做得对，中国政府和人民站在扎伊尔一边，坚决支持扎伊尔人民的斗争。世界上支持扎伊尔斗争的国家和人民也是对的。"},{"type":"paragraph","text":"莫科洛团长转达了蒙博托总统对华国锋主席的问候，并感谢中国政府和人民对扎伊尔正义斗争的支持。他说，我们扎伊尔人民将竭尽全力抵抗苏古雇佣军的侵略。"},{"type":"paragraph","text":"扎伊尔驻中国大使图马·瓦库参加了会见。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"421d4ccafd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
