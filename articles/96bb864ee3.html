art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"同心协力 抓纲治国","authors":["遵义军分区“淮海战役模范连”"],"parts":[{"type":"paragraph","text":"在全党全军全国人民遵照英明领袖华主席抓纲治国伟大战略决策取得伟大胜利的大好形势下，在深入揭批“四人帮”，热火朝天地大干社会主义的高潮中，党的十届三中全会胜利召开了！公报传来，我们驻守在革命历史名城遵义的革命战士心情无比激动，迅速集会，认真进行了学习讨论。我们坚决拥护华国锋同志任中共中央主席、中央军委主席！坚决拥护恢复邓小平同志的职务！坚决拥护永远开除王张江姚的党籍，并撤销其党内外一切职务！"},{"type":"paragraph","text":"在这大喜的日子里，我们回顾了全国军民在英明领袖华主席领导下，粉碎“四人帮”九个多月来走过的战斗历程和取得的伟大成绩。大家热烈欢呼英明领袖和统帅华主席的正确领导！"},{"type":"paragraph","text":"在这幸福的时刻，我们再一次重温了遵义会议前后党内两条路线斗争史。大家回顾：敬爱的叶副主席，在史无前例的红军二万五千里长征中，在叛徒张国焘阴谋分裂党、分裂红军，妄图危害毛主席和党中央，党和红军面临严重危险的情况下，坚定地站在以毛主席为首的党中央一边，揭露和挫败了张国焘的罪恶阴谋。大家谈到，在我们党与“四人帮”进行激烈搏斗的一九七六年，在中国革命的又一个危急关头，华主席继承毛主席遗志，力挽狂澜，一举粉碎了祸国殃民的“四人帮”，挽救了党，挽救了革命。叶副主席象当年忠于毛主席那样，辅佐华主席清除“四害”，抓纲治国，受到了全党全军全国人民的敬仰和爱戴。叶副主席不愧是我们党久经考验的老一辈无产阶级革命家。"},{"type":"paragraph","text":"大家谈到，毛主席对邓小平同志早有过明确的全面的评价。邓小平同志重新工作，全党全军全国人民都高兴，这再一次表明华主席、党中央和群众心连心。"},{"type":"paragraph","text":"放眼未来，激情满怀。革命是亿万群众的事业。我们共产党员、革命战士，都要为贯彻落实华主席抓纲治国的战略决策贡献自己的全部力量。我们一定要在华主席为首的党中央领导下，再接再厉，从政治上、思想上、理论上把“四人帮”批深批透，肃清其流毒和影响。一定要响应华主席、叶副主席的号召，认真开展学雷锋、学硬六连的群众运动，加强党支部的建设，把连队建设搞上去，以优异的成绩迎接党的十一大召开！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"张国焘","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96bb864ee3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
