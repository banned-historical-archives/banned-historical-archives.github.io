al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"七绝·呈父亲","alias":"","parts":[{"type":"paragraph","text":"七绝·呈父亲！"},{"type":"paragraph","text":"（1910年）孩儿立志出乡关2学不成名誓不还。埋骨何须桑梓地3，"},{"type":"paragraph","text":"人生无处不青山"},{"type":"paragraph","text":"[1]七绝，七言绝句的简称。父亲，毛泽东的父亲毛贻昌（1870一1920)，字顺生，号良弼。生于清代同治九年九月二十一日（1870年10月5日），卒于民国八年十二月初三（1920年1月23日），时年50岁。"},{"type":"paragraph","text":"[2]乡关，家乡，故乡。"},{"type":"paragraph","text":"[3]桑梓，古代家宅旁边常栽桑树和梓树，看见桑梓，容易引起对父母的怀念，后用作故乡的代称。埋骨何须桑梓地，意思是说，人死之后，何必一定要埋在家乡。"},{"type":"paragraph","text":"[4]青山，象征祖国山河秀丽。人生无处不青山，意思是接上句说，祖国到处都是秀丽的河山，可以作为安息的地方。这两句也就是大丈夫志在四方，好男儿四海为家的意思。毛泽东的父亲毛贻昌。毛泽东的母亲文七妹。"}],"authors":["毛泽东"],"dates":[{"year":1910}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":87,"page_end":89},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"917372d9e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
