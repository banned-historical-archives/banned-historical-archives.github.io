ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"应迅速控制飞机场不使被围美军撤走","alias":"","parts":[{"type":"paragraph","text":"应迅速控制飞机场不使被围美军撤走"},{"type":"paragraph","text":"（1950年12月4日）彭、邓、朴，宋、陶、覃："},{"type":"paragraph","text":"（一）伪首、伪三两师因火车甚少其主力由步行撤退，何时到咸兴尚难定。敌已下令由下碣隅里以飞机撤走被围之美军五、七两团，望宋陶覃迅速控制下碣隅里飞机场不使敌军撤走，并对五、七两团之南退部队予以歼灭，只留下其在柳潭里地区之固守部队围而不歼，以利钓鱼。（二）请宋陶覃将黄草岭、古土水、下碣隅里、函水里至柳潭里一带详细敌我情况，防敌飞走部署及打援部署电告为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月四日十三时"},{"type":"paragraph","text":"[1]彭、邓、朴，指彭德怀，邓华，朴一禹，宋、陶、覃，指宋时轮，陶勇，覃健。"},{"type":"paragraph","text":"[2]下碣隅里，位于咸镜南道长津郡南部。[3]柳潭里，位于咸镜南道长津郡西部。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":417,"page_end":417},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a76520912"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
