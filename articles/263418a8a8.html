art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一机连突出政治不要奖励粮团党委认为，部队完成任务，要靠毛泽东思想挂帅，要从精神上加以鼓励，决不搞物质刺激？一机连的同志们想得好，做得对，风格高，应该好好宣扬？","authors":["温祥/王树宗"],"parts":[{"type":"paragraph","text":"本报讯 某团一营机枪连战士，突出政治，心怀集体，不要上级给他们的奖励粮，受到了团党委的表扬。"},{"type":"paragraph","text":"去年，一机连担负生产任务。他们认真学习毛主席著作，用政治统帅生产，奋发图强，战胜旱灾，夺得了水稻丰收，超产达三万多斤。上级为了表扬他们完成任务出色，按照农场的规定办法奖给了五千斤大米，作为伙食补助。"},{"type":"paragraph","text":"得信最早的是给养员刘臣志。他想：这一下改善伙食可有条件了，兴冲冲地跑去找连长派人领粮。这时候，连长任正余也接到了领奖励粮的通知单。他琢磨了很久，心想：任务是同兄弟连队并肩完成的，本连的食堂又是连续五年的五好食堂，怎能独自享受这份奖励呢！不如退回三千斤，请求上级分给家底薄的兄弟单位。于是，他拿着通知单找指导员陈思均商量。陈思均完全同意连长的看法，他说：“得了成绩应该想到集体，不能只顾自己。”他提议开个支委会，听听大家的意见再决定。"},{"type":"paragraph","text":"支委会上，陈思均先摆出了连长同他商量的意见。他们原以为不会有多大分歧，不想，多数委员不同意。大家一致认为：完成任务是我们的本分，不是要多要少的问题，而是根本就不应该要！"},{"type":"paragraph","text":"军人大会上，任连长刚把党支部的处理意见向大家作了传达，群众纷纷要求发言。打头一炮的是共产党员杨士正，他说：“今年我们取得了一些成绩，这是党委的正确领导和兄弟连队大力支援的结果，这份奖励粮我们不能要！”共青团员杨光勇提出：“我们是人民的子弟兵，时时要想到人民群众。我同意全部上交，请团首长转交给灾区人民！”五好战士、共产党员孙学文说：“我们是毛泽东思想武装起来的革命战士，当我们生活好的时候，不能忘记世界上受苦受难的人民！”战士们越讲越激动，越讲越深刻。归纳起来主要是三条：第一，取得了任何成绩，首先要归功于党，归功于领导，归功于兄弟部队；第二，我们过上了幸福生活，要时刻不忘世界上广大受苦受难的劳动人民；第三，当前，要用一切行动支援越南人民的抗美救国斗争。最后，大家一致通过，把五千斤奖励粮，全部退给上级，并且用全连名义给团党委写了一封信，陈述了具体建议。"},{"type":"paragraph","text":"本来，干部们是想用这件事教育战士，结果战士们却给干部上了一课。陈思均深有感触地说：“处理任何问题，只低着头看自己脚面一小片，就会目光短浅。要想看得远，一定要虚心向群众学习。”"},{"type":"paragraph","text":"团党委接到一机连的信，召开了党委会。大家认为，我们部队完成任务，要靠突出政治，靠毛泽东思想挂帅，因此，要从精神上加以鼓励，决不搞物质刺激。开始发奖励粮时考虑不周，只是按农场的规定办事，没有去很好地考虑其利弊，而一机连的同志突出了政治，想得好，做得对，风格高，应该好好宣扬他们这种一心为公，事事突出政治的精神。团党委最后决定把这五千斤粮退还农场。 （温祥、王树宗）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"263418a8a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
