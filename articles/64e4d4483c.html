:[],"dates":[{"year":1980,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"常德县委做好思想工作  干部心齐劲足"},{"type":"paragraph","text":"力争今年农业有个新突破"},{"type":"paragraph","text":"本报讯  据《湖南日报》报道：湖南省常德县委在落实今年农业规划的过程中，对全县的脱产干部进行了一次考察，发现存在着一些不利于农业大上的思想障碍：少数领导干部对今年大上信心不足。去年上去了的单位，认为基数高了，再上有困难；未上去的，则认为底子薄，大上困难多；还有人认为，去年靠“老天爷”帮忙，捞了个“金满斗”，今年能保住本就不错了。在一般干部中，有的杂念较多，不安心农村工作。社员们反映，有些干部精神不振等退休；有些看不起农业想转行；有些怕艰苦想进城。县委认为，正确的路线、方针、政策要靠干部贯彻执行，干部心齐了，劲足了，农业大上才有可靠的保证。于是，县委抓住春节前一段时间，集中精力做好干部的思想工作。采取的办法：一是学习文件，总结经验，明确任务，树立必胜信心。邓小平同志关于目前形势和任务的重要报告，原原本本向干部传达以后，极大地鼓舞了干部大干四化的信心。他们总结经验教训，挖掘生产潜力，采取扎扎实实的措施，力争在今年来个新突破。二是树立典型，开展对口学习。全县从县直机关部门、区社评选了十名专心致志办农业的优秀干部。广大干部对照先进找差距，振奋了革命精神。一些原来准备退休、转行的同志，收回了申请书，换成了大干四化的决心书。芦荻山公社有个公社干部，只有五十三岁，原来天天吵着要退休，与先进人物一对比，感到了羞愧，决心到艰苦的地方去作出新贡献。三是落实干部岗位责任制，增强责任心。"},{"type":"paragraph","text":"干部齐了心，群众劲更足。农田基本建设目前正在抓紧扫尾；五十多万亩绿肥，由于天旱长势不好，已采取了补救措施；四十多万亩油菜、麦子、蚕豆等作物，普遍追施了肥料；早稻秧田的翻耕，种子的调运、翻晒等项工作都在扎扎实实进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64e4d4483c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
