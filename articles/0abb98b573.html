],"dates":[{"year":1961,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“毛泽东号”安全行车十四年"},{"type":"paragraph","text":"风高天寒夜又创多装低耗新纪录"},{"type":"paragraph","text":"在1960年岁末的一个深夜里，西北风呼啸着，气温下降到零下12度。连续十四年月月多装、快跑、安全、低耗、全面完成运输计划的“毛泽东号”机车的乘务人员，就在这个夜晚，冒着严寒，创造了安全行车第十四年——1960年多装低耗的最高纪录。"},{"type":"paragraph","text":"30日零点十分，“毛泽东号”机车由丰台车站出发。列车开动不久，就遇上一个土坡。司炉祁志忠挥动着铁锹，熟练地往炉门里送煤。压力表上的箭头迅速升到了顶点。副司机高元岭对司机长蔡连兴说：“锅炉气足、水足，可以加速。”“好！”蔡连兴立刻敏捷地推动气阀，车头上喷出一股白烟，列车加速到每小时六十五公里，一鼓作气爬过了土坡。"},{"type":"paragraph","text":"列车刚刚闯过土坡，突然刮起顶头大风。气表下降了，列车的速度缓慢下来。蔡连兴鼓励乘务人员说：“加油！战胜大风。”话音刚落，司机、副司机和司炉就迅速地脱去棉袄，轮换着快速加煤。火苗立刻又窜出炉门，列车又飞快地奔驰起来。"},{"type":"paragraph","text":"深夜一点五十分，这台机车的乘务人员克服了许多困难，驾驶着机车徐徐地驶入天津东边的北仓车站。司机长蔡连兴看看手表，兴奋地告诉乘务员说：“安全正点到达，节约煤两吨多，比上一班创造的最高纪录，还多节约了二百公斤煤，多拉了三百多吨货。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0abb98b573"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
