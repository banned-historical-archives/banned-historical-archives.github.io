ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致董必武等电","alias":"","parts":[{"type":"paragraph","text":"致董必武等电!"},{"type":"paragraph","text":"（1940年11月29日）董老，并告恩来、胡服、项英、德怀、克农："},{"type":"paragraph","text":"“佳电”在各方面起了很好影响，我们应乘此时机更将“佳电”泛散播。朱总号日致胡宗南电，胡感日有回电，态度颇好。我们派南汉宸日内去见胡宗南，作一番大解释工作。胡军及西安紧张气，可能大泄下去，进攻边区可能避免。但我各地军事准备仍不松懈，我们愈有准备，蒋愈不敢进攻，各办事处亦然。否则仍是危险的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二十九日[1这是毛泽东给董必武并告周恩来、刘少奇、项英、彭德怀、李克农"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":251,"page_end":251},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed7f94cf74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
