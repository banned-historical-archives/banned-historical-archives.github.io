览  许多观众赞扬我国社会主义建设取得伟大成就","authors":[],"dates":[{"year":1969,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为庆祝中华人民共和国成立二十周年"},{"type":"paragraph","text":"锡中友协举办“无产阶级文化大革命胜利万岁”图片展览"},{"type":"paragraph","text":"许多观众赞扬我国社会主义建设取得伟大成就"},{"type":"paragraph","text":"新华社科伦坡二十二日电　为庆祝中华人民共和国成立二十周年，锡中友好协会最近在科伦坡和南部的港口城市加勒先后举办以“无产阶级文化大革命胜利万岁”为题的中国图片展览会。"},{"type":"paragraph","text":"展览会共接待了九千多名观众，受到了锡兰人民的热烈欢迎。许多观众在留言簿上写下了热情洋溢的话，表达他们对毛主席和毛泽东思想的高度敬仰和热爱。他们敬祝毛主席万寿无疆。他们还赞扬中国人民在无产阶级文化大革命中所取得的巨大胜利。"},{"type":"paragraph","text":"一个名叫萨伍克·马利加瓦塔的写道：“中国变得这么先进，首先是因为有毛主席的正确路线。”另一个名叫塞马尼拉的写道：“中华人民共和国二十年的发展是巨大的。这一切都应归功于毛主席思想的英明和伟大。”"},{"type":"paragraph","text":"许多观众对中国在社会主义经济建设方面的巨大成就表示十分高兴和钦佩。"},{"type":"paragraph","text":"中国图片展览会还将在锡兰其他一些城市举行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ec4e53124"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
