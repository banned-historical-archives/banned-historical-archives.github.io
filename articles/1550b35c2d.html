云川大使进行了极为亲切友好的谈话","authors":[],"dates":[{"year":1972,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社平壤一九七二年四月十四日电　朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国内阁首相金日成同志，四月十四日接见了前往拜会的中国驻朝鲜大使李云川。"},{"type":"paragraph","text":"李云川大使向金日成同志转交了中国共产党中央委员会主席毛泽东同志、中华人民共和国国务院总理周恩来同志代表中国共产党中央委员会、中国政府和中国人民，并且以他们个人的名义最热烈地祝贺金日成同志六十寿辰的贺电。"},{"type":"paragraph","text":"接见时在座的有朝鲜外务相许锬。"},{"type":"paragraph","text":"金日成同志同李云川大使进行了极为亲切友好的谈话。"},{"type":"paragraph","text":"同一天，李云川大使和夫人张慧文、大使馆参赞戴路以及其他人员，在朝鲜外务省三局副局长裴容在的陪同下，瞻仰了朝鲜人民的伟大领袖金日成同志的旧居万景台。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1550b35c2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
