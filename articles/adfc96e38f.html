art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在毛主席纪念堂工地上","authors":[],"parts":[{"type":"paragraph","text":"以身作则"},{"type":"paragraph","text":"工程兵某部连长龚天林，曾带领全连在伟大的领袖和导师毛主席身边施过工，并受到毛主席的接见。"},{"type":"paragraph","text":"这次在毛主席纪念堂的施工中，龚天林豪情满怀，斗志昂扬，哪里活重活紧他就在哪里干，哪里危险他就出现在哪里。一次拆模顶时，模板顶在十米高的立柱上，拆模必须先移掉立柱，可是稍动立柱模板就会掉下来，险情大。面对这种情况，班长谢中正一个箭步冲了上去。龚天林大喊一声：“危险，我来干！”一把拉住谢中正，然后双手紧紧抱住大立柱，使尽平生气力，一步一步慢慢往外移。他的手被立柱磨破了，衣服被汗水湿透了，终于以坚韧不拔的毅力移出了大立柱。"},{"type":"paragraph","text":"龚天林常说：“兴建毛主席纪念堂是千秋万代的大事，我们要一万个细心，不能有半点马虎。”一次，战士李胜进吊石棉板，有一块板缝差了两毫米，按规定差三、四毫米都在许可范围内。龚连长发现后，耐心地对小李说：万年大计，质量第一。别说差两毫米，就是一丝一毫也不能差。说着，他和小李一起把石棉板取下来，重新钉好。由于龚连长严格要求，严密组织，全连提前七天完成了吊顶任务，质量达到良好以上，上级还在他们连召开了质量现场会。（沈玉章）"},{"type":"paragraph","text":"精心指挥"},{"type":"paragraph","text":"五一○三四部队某团政委杜松平在修建毛主席纪念堂过程中，始终当好大干快上的带头人，受到广大指战员的好评。"},{"type":"paragraph","text":"五月十三日，风雨夹着冰雹越下越大。杜政委开完新的施工部署会议后，中午饭都没顾得上吃，顶风冒雨来到突击抢卸水泥的九连。他二话没说就同大家一起干了起来，还边干边做鼓动工作。杜政委还注意向群众学习，搞好科学施工。以往砌方砖是四人一组，即供灰一人，夹砖两人，砌砖一人。杜政委在五连参加砌砖劳动，经过和大家一起实践摸索，发现供灰的可以一人供两组，夹砖的两人可以管两组。这样，原来两组八人可以减少到五人，四组变六组，人手还有富余。五连的经验在全团推广后，铺砖进度大大加快。（康同尧）"},{"type":"paragraph","text":"突击抢运"},{"type":"paragraph","text":"夜幕降临。已经奋战了一天的工程兵某团十六连指战员，发扬我军不怕疲劳，连续作战的作风，又投入了往二楼突击抢运水泥的战斗。"},{"type":"paragraph","text":"原来，这天收工后，同十六连并肩施工的地方单位有一批水泥需要及时运往二楼。连长李松政闻讯后，立即代表全连向上级请战，并表示：“为早日建成纪念堂，千斤重担我们挑！”"},{"type":"paragraph","text":"上级批准后，李连长对全连同志进行了简短动员，突击抢运水泥的战斗打响了。只见吊车刚把水泥放稳，大家就争先恐后，扛的扛，搬的搬，百十米的途中，你追我赶。没多久，零散水泥扬起的灰尘，与干部战士脸上的汗水沾在一起，烧得麻辣辣的痛。共产党员牛底元，身体有病，坚持不下“火线”。就这样，十六连的同志们大干了两个半小时，终于把八十吨水泥抢运到二楼，为加快施工速度做出了贡献。（报道组）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adfc96e38f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
