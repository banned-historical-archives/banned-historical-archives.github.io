<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"应到蒙城集中以利机动作战","alias":"","parts":[{"type":"paragraph","text":"应到蒙城集中以利机动作战"},{"type":"paragraph","text":"（1948年10月25日）陈、邓，并告饶、粟、谭及刘、邓、李3："},{"type":"paragraph","text":"敬午电悉。开封之敌已逃。你们不要去开封，也不要去商丘附近。应从现地取捷径到蒙城集中，休息数日。然后直取蚌埠，并准备渡淮南进，占领蚌浦段铁路。以你们全军四个纵队十一个旅（只留九纵一个旅守郑州，秦基伟?率九纵主力跟进）控制淮河以南、长江以北、淮南铁路以东、运河以西广大地区，吸引敌人来攻。你们则忽集忽分，机动对敌，准备在该区坚持两三个月，此着为敌人所不及料。敌为防我渡江，必从徐州附近分兵南压，亦有可能从自崇"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军第一副司令员陈毅和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]饶，指饶漱石，当时任华东军区政治委员。粟、谭，指粟裕、谭震林，当时分别任华东野战军代司令员兼代政治委员和副政治委员。"},{"type":"paragraph","text":"[3]刘、邓、李，指刘伯承、邓子恢、李达，当时分别任中原野战军司令员、副政治委员和参谋长。"},{"type":"paragraph","text":"[4]指1948年10月24日午时陈毅、邓小平关于中原野战军主力东进后的作战方案给中共中央军委等的电报。电报说：我们计划27日我军主力占领开封，休息一天，再以五天行军于11月2日进至商丘南及西南地区，于东线打响后，再视情况决定行动。"},{"type":"paragraph","text":"[5]蚌浦段，指蚌埠至浦口的铁路，即今京沪线一段。禧\"系统调兵向东。我华野则可能于两个月内歼灭刘峙?系统五十五个师的三分之一左右，即十八个师左右，取得大胜。如敌以重兵对付你们，则你们可用暂时分散作战的方法，将全军（十二个旅）分散配置于江、淮、巢、运?之间，躲过其压力，以待华野之南下。请你们考虑此案是否可行。最后决定，可待你们到达蒙城以后，如那时认为此策不便，则执行徐蚌作战方案。如那时孙元良好打，亦可向北打孙元良。如黄维跟踪东进，亦可回头打黄维。蒙城是机动地带，可东，可西，可南，可北。在你们到达蒙城以前，敌人亦不知道你们究竟要打哪一点。你们是否同意出蒙城，及郑蒙间里程多少，望告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十五日三时[1]白崇禧，当时任国民党军华中“剿匪”总司令部总司令。[2]刘峙，当时任国民党军徐州“剿匪”总司令部总司令。[3]江、淮、巢、运，指长江、淮河、巢湖和运河。[4]徐蚌，指江苏徐州和安徽蚌埠。[5]孙元良，当时任国民党军第十六兵团司令官。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":107,"page_end":108},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a3ca46754"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
