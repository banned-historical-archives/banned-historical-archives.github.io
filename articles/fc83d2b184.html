<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从奴隶到奴隶","authors":["唐发"],"dates":[{"year":1945,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"唐发"},{"type":"paragraph","text":"读了霍然先生的“西崽和女招待”，不禁起了一点小小的感慨:——"},{"type":"paragraph","text":"考西崽之制，虽然肇自清末，但那精神，却是由来已久的。怀愍被缧，晋室南迁，北方就成了氏羌鲜卑的天下，士庶人家，为了取悦异族，大抵就学会了蒙古话，颜氏家训提及的齐士，就这样说:“吾有一儿，年已十七，颇晓书疏，教其鲜卑语及弹琵琶，稍欲通解，以此伏事公卿，无不宠爱，亦要事也。”这分明是欲以西崽进身的例子。"},{"type":"paragraph","text":"齐士的所谓公卿，属于蒙藏等族，在当时，正是不折不扣的洋大人。西崽精神的存在，我看这时候就已经萌了芽。辽金入宋，为期甚短，所以引人注目的只是政治上的汉奸；满清统治中国，则又淹溃过久，仿佛泯除了种族之间的隔阂，使人们觉得彼此都是“自家人”，分不清谁是舆台，谁是为外族服役的西崽了。"},{"type":"paragraph","text":"不过真正的西崽制度，又正是从清末开端的。那时候也写作细崽，意思是只做一些琐碎小事的杂役。虽然不必再来弹琵琶，然而洋话却总得能够说几句:yes!yes!还有一副低眉顺眼的菩萨相，看上去很可怜，但有时却也非常可恶的，那是洋大人转了背，我们的西崽先生碰着本国同胞，自已忽然觉得伟大起来了的时候。"},{"type":"paragraph","text":"凡老上海，大抵都还记得这一副面相的。"},{"type":"paragraph","text":"三四年来，英美的侨民被送集中营，失去了衣食父母，西崽就大大的没落了。不过媚外的精神却没有死。他们学会了别一种语言，混入“宪兵队”，这并不如霍然先生所说，终于又变成了“东崽”——我以为后者这一个名词是不能存在的。犹如家狗逃入荒山，倒底蜕成为噬人的饿狼一样，本质上已经颇为不同了。"},{"type":"paragraph","text":"我们几年来看见的只是汉奸——不是西崽。"},{"type":"paragraph","text":"这回的重新招考懂英语的侍者，才真是西崽制度的复活，兜来兜去，依旧得兜进低眉顺眼，yes!yes!的圈子里去，这是从奴隶到奴隶的路，决不能等闲视之的!九月十六日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc83d2b184"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
