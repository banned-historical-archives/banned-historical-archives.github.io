<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华侨事务委员会主任廖承志举行招待会  欢迎华侨和港澳同胞来京过“五一”  叶剑英副主席和谢富治副总理出席","authors":[],"dates":[{"year":1966,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华侨事务委员会主任廖承志举行招待会"},{"type":"paragraph","text":"欢迎华侨和港澳同胞来京过“五一”"},{"type":"paragraph","text":"叶剑英副主席和谢富治副总理出席"},{"type":"paragraph","text":"新华社二十九日讯　华侨事务委员会主任廖承志今天中午举行招待会，欢迎前来北京参加“五一”国际劳动节庆祝活动的六百多名华侨和港澳同胞。"},{"type":"paragraph","text":"政协全国委员会副主席、国防委员会副主席叶剑英，国务院副总理谢富治出席了招待会。"},{"type":"paragraph","text":"廖承志在招待会上祝酒，向前来欢度“五一”国际劳动节的华侨和港澳同胞致热烈的节日祝贺。他向在最困难、最艰苦环境下同印度尼西亚右派反动势力进行英勇斗争后回到祖国的我国驻印度尼西亚大使馆工作人员和印度尼西亚华侨，表示亲切的问候和敬意。他请在座的侨胞向全世界支持祖国、爱护祖国，同帝国主义和反动派进行斗争的侨胞，转达祖国人民的亲切问候。"},{"type":"paragraph","text":"叶剑英也在招待会上祝酒。他说，我们伟大祖国在毛主席和中国共产党的英明领导下，一年比一年强盛。拥护我们、同情我们的人民遍于全世界。"},{"type":"paragraph","text":"他说，印度尼西亚右派反动势力最近疯狂屠杀和迫害印度尼西亚人民和印度尼西亚华侨，这只不过是天空上暂时出现的一片乌云。他说，帝国主义和反动派是一定要灭亡的，世界人民的革命斗争是一定要胜利的，世界前途是光明的。"},{"type":"paragraph","text":"招待会上洋溢着亲密团结的气氛。来自五大洲的侨胞同首都各界人士欢聚一堂，他们频频举杯，为伟大祖国的日益昌盛，为毛主席的健康，为侨胞们的爱国大团结，为全世界人民的进步事业和世界革命的发展而干杯。"},{"type":"paragraph","text":"出席招待会的，还有政协全国委员会秘书长平杰三，中共中央统一战线工作部副部长刘述周，华侨事务委员会副主任方方，侨联代主席庄希泉，以及有关方面负责人连贯、邵力子、陈其尤、陈其瑗、王昆仑等。"},{"type":"paragraph","text":"正在北京的我国驻印度尼西亚大使姚仲明和使馆工作人员，暂时被迫从印度尼西亚撤回的我国驻印度尼西亚代表机构的工作人员和新华社驻雅加达分社的工作人员等，也出席了招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2ba5a5fa6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
