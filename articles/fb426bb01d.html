ear":1979,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"康副总理会见美国铝业公司代表团"},{"type":"paragraph","text":"新华社北京一月二十九日电  国务院副总理康世恩今天上午会见了由美国铝业公司董事长克罗姆·乔治率领的美国铝业公司代表团。"},{"type":"paragraph","text":"康副总理对美国客人说，中美两国人民友好的历史是很长的。这次，邓小平副总理访问美国，对中美友好关系的发展一定会有很大的促进。今后，我们两国不仅在政治关系方面，而且在经济贸易、科学文化交流方面都有广阔的发展前景。"},{"type":"paragraph","text":"乔治董事长说，美国人民对中国人民一直是很友好的。今天，邓小平副总理就要在华盛顿同卡特总统会晤。他对美国的这次访问，是美中良好关系发展的新篇章。"},{"type":"paragraph","text":"美国驻中国联络处经济参赞唐伟廉参加了会见。"},{"type":"paragraph","text":"会见时在座的有冶金部副部长高扬文、刘学新等。"},{"type":"paragraph","text":"代表团是一月二十三日抵京的，他们于今天下午离京回国。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb426bb01d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
