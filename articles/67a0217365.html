art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"誓死捍卫毛主席的革命路线","authors":["袁盘良李振孝"],"parts":[{"type":"paragraph","text":"我们在平江地区执行“三支”“两军”任务中，广泛接触了革命老人、革命烈士家属和工人、贫下中农，了解了许多惊心动魄的阶级斗争史实，更加看清了彭德怀这个大阴谋家、大野心家、大军阀的狰狞面目，更加识破了反动影片《怒潮》篡改历史、为反革命修正主义分子彭德怀涂脂抹粉的罪恶阴谋。"},{"type":"paragraph","text":"彭德怀从混入革命队伍以后，就一贯反对毛主席的无产阶级革命路线，忠实执行李立三、王明的机会主义路线。在抗日战争中，他又顽固地推行投降主义路线。建国以后，他仍然坚持资产阶级反动立场，疯狂反对学习毛主席著作，反对突出无产阶级政治，反对毛主席的无产阶级军事路线，积极推行资产阶级军事路线。反动影片《怒潮》却把这样一个反动透顶的老牌机会主义分子，吹捧为革命的“功臣”。它借反对右倾机会主义为名，大肆鼓吹“左”倾盲动主义，把彭德怀的“左”倾盲动左义冒充为毛主席的正确路线加以宣扬，其罪恶目的，就是反对毛主席的建立农村根据地、以农村包围城市的伟大战略思想，为彭德怀的资产阶级军事路线大唱赞歌。真是罪大恶极！"},{"type":"paragraph","text":"两种军事思想、两条建军路线的斗争，归根结底，就是无产阶级和资产阶级两个阶级争夺兵权的斗争。在整个社会主义时期，这种斗争依然长期存在，有时还很激烈。这是无产阶级专政下资产阶级复辟和无产阶级反复辟斗争的一个重要组成部分。我们要取得这场斗争的胜利，就要以林副主席为光辉榜样，对伟大领袖毛主席无限热爱、无限信仰、无限崇拜、无限忠诚，把毛主席的无产阶级建军路线当作我军的生命线，我们一定要最英勇、最忠实地捍卫毛主席的革命路线，彻底肃清中国赫鲁晓夫和反革命修正主义分子彭德怀、罗瑞卿的流毒，永远沿着毛主席的无产阶级建军路线奋勇前进！"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67a0217365"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
