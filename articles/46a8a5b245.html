"authors":[],"dates":[{"year":1951,"month":5,"day":2}],"is_range_date":false,"parts":[{"text":"贵州毕节等十县部分地区灾荒严重","type":"title"},{"text":"【西南总分社2日讯】贵州省毕节、金沙、纳雍等十县部分地区灾荒严重。已发现不少农民以野菜、草根充饥的现象。发生灾荒的原因，主要是该省在解放前，到处种植鸦片，农民生活困苦不堪；去年春季解放初期，蒋匪残余到处组织土匪，进行暴乱，使广大农民春耕生产受到很大破坏，小春歉收；今年入春以来，久不下雨，小春作物萎黄不振，春耕困难，夏收亦成问题。","type":"paragraph"},{"text":"该省人民政府已拨发40万斤救济粮和850万斤大米的种籽贷款，并号召各级人民政府领导从事副业生产渡荒。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1951年5月4日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46a8a5b245"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
