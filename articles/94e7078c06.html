:[{"year":1986,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十月二十九日电　一些国家领导人最近分别给我国领导人发来唁电或唁函，悼念叶剑英同志逝世。他们是:朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成；民主柬埔寨主席诺罗敦·西哈努克亲王、联合政府总理宋双和负责外交事务的副主席乔森潘；斯里兰卡民主社会主义共和国总统朱·理·贾亚瓦德纳；菲律宾共和国总统科拉松·阿基诺；阿拉伯埃及共和国总统穆罕默德·胡斯尼·穆巴拉克；苏丹共和国主权委员会主席艾哈迈德·米尔加尼；大不列颠及北爱尔兰联合王国女王伊丽莎白二世；德意志联邦共和国总统里夏德·冯·魏茨泽克；卢森堡大公让；美国总统罗纳德·里根；加拿大总督让娜·索维夫人；日本国总理大臣中曾根康弘；大不列颠及北爱尔兰联合王国首相撒切尔夫人；荷兰王国首相吕德·吕贝尔斯；日本国众议院议长原健三郎、参议院议长藤田正明。"},{"type":"paragraph","text":"苏联最高苏维埃主席团向李先念主席和彭真委员长发来唁函，悼念叶剑英同志逝世。"},{"type":"paragraph","text":"此外，大不列颠及北爱尔兰联合王国女王伊丽莎白二世、缅甸社会主义纲领党中央委员会主席吴奈温、印度共和国副总统拉玛斯瓦米·文卡塔拉曼向叶剑英同志的亲属发来了唁电。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94e7078c06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
