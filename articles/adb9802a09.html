art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东西藏工作文选》近日修订再版等四则","authors":[],"parts":[{"type":"paragraph","text":"《毛泽东西藏工作文选》近日修订再版"},{"type":"paragraph","text":"中共中央文献研究室、中共西藏自治区委员会、中国藏学研究中心编辑的《毛泽东西藏工作文选》，近日由中国藏学出版社、中央文献出版社再版。"},{"type":"paragraph","text":"《毛泽东西藏工作文选》共收入毛泽东自1949年8月至1961年1月有关西藏工作的文稿102篇。"},{"type":"paragraph","text":"我国商标申请注册量连续6年居世界第一"},{"type":"paragraph","text":"国家工商行政管理总局商标局局长李建昌24日介绍，我国的申请商标注册量增长非常快，从2002年开始，每年都是以20万件的速度往上增长，最高的2006年达到76万件，2007年稍有下降，但也达到了70万件。我国的商标申请注册量连续6年居世界第一。"},{"type":"paragraph","text":"我国网民数量已达2.53亿人居世界首位"},{"type":"paragraph","text":"中国互联网络信息中心（CN鄄NIC）24日发布的《第22次中国互联网络发展状况统计报告》显示，截至6月底，我国网民数量达2.53亿人，首次超过美国跃居世界第一位。尽管如此，我国互联网普及率仅为19.1％，仍然低于21.1％的全球平均水平。"},{"type":"paragraph","text":"解放军将首次在香港举办大型军事题材展览"},{"type":"paragraph","text":"为纪念中国人民解放军建军81周年，中国人民革命军事博物馆将应邀于8月1日至7日在香港会展中心举办“钢铁长城——新中国国防和军队建设成就展”，这是解放军首次在香港举办大型军事题材展览。"},{"type":"paragraph","text":"军事博物馆馆长郭得河少将24日在香港举行的新闻发布会上介绍说，此次展览将展出1600余件展品，包括各类实物及武器装备700多件文物，其中24件是国家一级文物。"},{"type":"paragraph","text":"（均据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adb9802a09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
