ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于华东沿海构筑工事问题致陈毅电","alias":"","parts":[{"type":"paragraph","text":"关于华东沿海构筑工事问题致陈毅电"},{"type":"paragraph","text":"（1951年1月29日）陈毅同志，并告饶及中南军区，广东军区，广西军区，华东军区："},{"type":"paragraph","text":"鉴于广东方面过去时期未经中南军区勘察指导设计，到处做工事，结果无用，浪费极大，此次华东在厦门、平潭、舟山、吴淞四处修筑要塞或工事，在福建修南平同安公路，务请你们注意事先给以指导。第一，不要在指定地区不经研究设计随便修建，以致无用浪费；第二，在指定地区内亦只择最需要者做，不要到处做；第三，大陆海岸线及内地根本不要做；第四，大陆兵力，位于纵深地区，敌来应让其登陆然后相机歼击之，不要到处防守，不要阻其登陆；第五，建筑材料，必要者不可吝惜，照需要支给，但仍须防止浪费，注意废物利用，注意节省。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿九日[1]陈毅，当时任中国人民解放军华东军区司令员。[2]饶，指饶漱石，当时任中国人民解放军华东军区政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":87,"page_end":87},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf9b2f1741"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
