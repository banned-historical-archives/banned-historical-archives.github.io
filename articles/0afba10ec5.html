<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利人民掀起斗争新浪潮  威尼斯群众和西德、法国学生并肩示威抵制资产阶级的铜臭艺术展览意大利印刷工人接连举行罢工使全国几天不能出版报纸","authors":[],"dates":[{"year":1968,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利人民掀起斗争新浪潮"},{"type":"paragraph","text":"威尼斯群众和西德、法国学生并肩示威抵制资产阶级的铜臭艺术展览意大利印刷工人接连举行罢工使全国几天不能出版报纸"},{"type":"paragraph","text":"新华社二十日讯　罗马消息：当法国的工人和学生正在排除万难，英勇顽强坚持斗争的时候，意大利的进步学生、工人和艺术工作者掀起了新的斗争怒潮。连日来，意大利著名城市威尼斯的革命群众，不顾反动当局的残暴镇压，一再举行集会和声势浩大的示威游行，反对腐朽的资本主义制度。意大利各地以及西德、法国的大批学生，纷纷赶往威尼斯，支援当地人民的正义斗争。"},{"type":"paragraph","text":"威尼斯的学生、工人和艺术工作者，十七日晚上在已被学生占领了三个月的美术学院里举行了群众大会，决定采取群众性的斗争行动，抵制即将在威尼斯开幕的国际艺术展览会。他们指出，在资本主义社会中，艺术已堕落成为“统治阶级玩赏的费钱的玩意儿”，两年一度的国际艺术展览会，只是资产阶级谋利的工具。他们谴责政府利用威尼斯的名胜古迹和国际艺术展览会来吸引外国游客，让大资本家发财。"},{"type":"paragraph","text":"十八日，威尼斯一千多名学生、工人和艺术工作者在展览馆前举行了三小时的示威。接着，他们挥舞着一面巨大的红旗，高呼“不要铜臭艺术”，“警察滚出展览会”，以及反对资本主义制度的口号，在市中心举行了示威游行。示威者沿途散发传单，揭露资本主义制度的罪恶，号召人民团结起来，推翻这个腐朽的社会制度。他们在圣马克广场上升起一面鲜艳的红旗。"},{"type":"paragraph","text":"意大利当局对学生们的造反行动恨得要命，怕得要死。它很害怕学生们占领国际艺术展览会和其他著名的博物馆，因此慌忙从其他城市调集了四千多名警察，对学生们进行镇压。这些全副武装的警察，十八日使用了枪托和棍棒，蛮横地驱散示威的队伍，并野蛮地殴打示威者。学生和工人们英勇地进行了反击。"},{"type":"paragraph","text":"威尼斯青年学生的正义斗争在国内外获得广泛的支持。意大利其他城市的大批进步学生这几天川流不息地涌进威尼斯，西德、法国的学生也纷纷赶来，同威尼斯青年并肩战斗。他们在举行会议后决定，十九日傍晚在圣马克广场前再次举行群众大会和示威游行，抗议警察的暴行，谴责腐朽的资本主义制度。他们还决定要继续采取群众斗争的行动，抵制资产阶级的国际艺术展览会，使它无法按期在二十二日开幕。被群众的造反行动吓得胆战心惊的意大利当局连忙下令四千多名警察把守全市战略据点，日夜进行“戒备”。"},{"type":"paragraph","text":"为了表示同情和支持学生们的斗争，许多意大利的和外国的艺术家决定把他们的作品取走，不参加威尼斯的展览会。一个画家说：“这不是一个艺术展览会而是兵营，展览会的负责人就是警察助理。”"},{"type":"paragraph","text":"意大利的一些艺术评论家也发表公报，谴责警察的暴行。他们还强调指出，必须根本改变意大利艺术界的现状，使艺术摆脱政府官僚机构和由富有的投机商组成的少数集团的控制。"},{"type":"paragraph","text":"本报讯　意大利工人继续罢工，坚决同意大利垄断资本和反动政府进行斗争。"},{"type":"paragraph","text":"意大利全国印刷工人，从十三日午夜开始，举行四十八小时罢工，要求增加工资。这次罢工使意大利全国十四日下午、十五日全天和十六日上午没有报纸出版。十九日，他们又举行了第二次四十八小时罢工，并且计划还要在二十二日举行一天罢工。此外，罗马的一些大医院的医生也在十七日举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0afba10ec5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
