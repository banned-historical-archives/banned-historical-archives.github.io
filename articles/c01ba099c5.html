script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"钟汉华同志强调继续批判极左搞好部队建设  结合总结经验教训讨论真理标准","authors":[],"dates":[{"year":1979,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"钟汉华同志强调继续批判极左搞好部队建设"},{"type":"paragraph","text":"结合总结经验教训讨论真理标准"},{"type":"paragraph","text":"新华社成都九月二十四日电  人民解放军成都部队政治委员钟汉华最近强调指出，在深入开展真理标准问题的学习讨论中，要结合总结建国以来，特别是近十多年来的经验教训，批判林彪、“四人帮”的极左路线，把指战员的思想引导到党的三中全会确定的路线、方针、政策上来，加速部队革命化、现代化建设。"},{"type":"paragraph","text":"钟汉华是在成都部队军以上干部汇报各级领导班子学习情况时发表讲话的。他说，前些年，林彪、“四人帮”出于篡党夺权的罪恶目的，肆意歪曲、篡改马列主义和毛泽东思想，颠倒敌我关系，搅乱阶级阵线，残酷迫害广大干部和群众。他们推行的那条极左路线，使得一些同志在思想上产生了一种错觉：好象只有搞阶级斗争、搞政治运动才叫革命，好象无产阶级专政的职能和任务就只是单纯抓阶级斗争，好象一切工作都要永远以阶级斗争为纲，否则，就是“丢纲”、“离线”、“转向”。这种不切实际的错误观点，严重影响着工作着重点的转移。我们讲抓纲，就是讲的抓主题、中心、主要矛盾。党的三中全会根据国内外新形势，特别是国内现阶段的阶级状况、阶级斗争状况和主要矛盾，批判两个“凡是”的观点，确定从以搞阶级斗争为重点转移到社会主义现代化建设上来，这是一个伟大的历史转变，是马列主义、毛泽东思想同我国具体情况相结合的产物，是完全正确的。我们必须从理论和实践的结合上深刻理解这个问题。"},{"type":"paragraph","text":"钟汉华说，过去，林彪、“四人帮”竭力篡改、歪曲马列主义、毛泽东思想，在理论上制造了极大的混乱，使得一些同志不分时间、地点、条件，什么事都得照搬照抄。到底是把毛泽东思想作为行动指南好呢，还是作为万古不变的教条“句句照办”好呢？到底是在实践中不断丰富发展毛泽东思想好呢，还是把毛泽东思想当成“顶峰”好呢？科学的态度只能是前者，而决不能是后者。"},{"type":"paragraph","text":"钟汉华指出，继续深入搞好真理标准问题的讨论是帮助我们端正思想路线、解放思想的重要途径。他要求各级领导干部带头做好以下三个方面的工作：一、把这一学习讨论同总结历史经验结合起来，用实践的观点分析建国以来，特别是近十多年来，我们那些搞对了，那些搞错了。这样，就能更加看清两个“凡是”观点的荒谬性和严重危害性，深刻理解党在新时期的路线、方针、政策；二、要把这一学习讨论同搞好部队建设结合起来。根据我军历史经验和对越自卫还击作战经验以及未来反侵略战争需要，认真研究解决我军革命化、现代化建设中的新问题；三、把这一学习讨论同改造世界观结合起来。坚持实践第一的观点，就要坚持实事求是、从实际出发，就要费力气，就要克服官僚主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c01ba099c5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
