<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川北区党委关于镇反与惩治违法的主要情况及意见向西南局的报告","authors":[],"dates":[{"year":1951,"month":4,"day":19}],"is_range_date":false,"parts":[{"text":"川北区党委关于镇反与惩治违法的主要情况及意见向西南局的报告","type":"title"},{"text":"（一）五月整月，我区均以县为单位集训干部。月初，区党委开扩干会，县委书记参加，对镇压反革命与惩治不法地主两个问题均准备作一精细的检查与布置。","type":"paragraph"},{"text":"（二）我区现已杀掉反革命XX人，土改区占一半，非土改区较少，系我们有意识要他们留一批结合土改再杀。据此，我们仍要大杀一批，批准权只拟将土改完成县收回区党委，其余县暂不收，但亦须要这些县精细计划，切勿草率从事。大杀后，效果很好。这种大杀之必要，过去认识不足。已杀开的地方，错杀是没有的，但判徒刑的比例很少，有的县过去是死刑与徒刑一比九，现在则是九比一。处五年以上徒刑的极少极少，有些同志认为处五年以上不如杀掉省事，而不了解对可以不杀者以判徒刑有利无害。杀开后，如不同时公开对群众进行有杀、有关，以及宽大与镇压相结合的政策教育，则群众以至下面干部主张多杀之情绪很难避免。故批准机关就应严密控制，保持清醒的头脑与实行精致的作风。如果这样，则我区在土改完毕时，可约束总数于XXXX到XXXX。宣传工作，我们曾反复指示各地“要作到家”（即对其家属也要做），但仍很差，主要是对这一工作的重大意义与作用的认识还不普遍与深刻。","type":"paragraph"},{"text":"（三）关于惩治不法地主，土改区又搞出地主油水四百亿元以上，这为贫雇解决了大问题。这个方针完全正确，应在今后土改区坚决贯彻。但各地执行中存有问题，有的发生了多捉或乱捉现象，有的界限不太清，相当普遍地罚款心中无数、肉刑拷打，自杀者过多及对某些工商业处理不当。产生这种情况的主要原因：一是越往下越容易把严重与复杂的斗争看得太简单，太容易，一遇困难（特别是来自敌人方面的困难），就很容易忘记走群众路线，代替包办，急躁和粗野从事。二是越往下，越容易产生因为要强调某一点就不敢同时严格划清界限，约束范围，森严纪律；而出现带原则性偏向后，又不敢正视，怕影响所强调的中心工作，这两者又互为因果，互相交替，这也是下面同志往往事前担心，事后抱怨上级的来由。","type":"paragraph"},{"text":"（四）总之，这两个问题，即要我们继续为下面撑腰，又要我们以耐心教育的方法进行解说，以提高大家的思想策略和作风水准，以便更好地完成任务。是否有当，请指示。","type":"paragraph"}],"comments":[],"origin":"川北区党委编印：《川北区第二次土地改革会议参考文件》，1951年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be2d9431db"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
