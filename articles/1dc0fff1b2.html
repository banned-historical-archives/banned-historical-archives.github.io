thors":[],"dates":[{"year":1962,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京19日电】　新德里消息:据印度报业托辣斯报道，印度副总统宰·侯赛因18日晚间在欢迎南斯拉夫联邦执行委员会副主席爱德华·卡德尔的宴会上，又诽谤中国对印度进行“无端的侵略”，要中国放弃什么“扩张主义的帝国主义政策”。他叫嚷说，印度“已经下定严酷的决心”，使这场同中国的冲突进行到底。"},{"type":"paragraph","text":"侯赛因还表示印度“深深感谢”南斯拉夫修正主义统治集团在印度“困难的时刻对印度表示的同情”。他说，在印度同中国的“分歧日益严重的过去三年来”，南斯拉夫对印度的立场表现出“友好的谅解”。他称赞卡德尔最近在一次记者招待会上诽谤中国“要用武力片面地把解决国家分歧的某种办法强加于印度”的话。他还指出，印度和南斯拉夫对世界面临的许多问题有共同的看法。卡德尔是18日从雅加达到达新德里的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1dc0fff1b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
