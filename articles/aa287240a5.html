script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真学习　热情宣传　坚决贯彻　誓死捍卫驻沪部队迅速执行毛主席的新指示","authors":[],"dates":[{"year":1967,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　前天晚上和昨天早晨，上海警备区部队广大指战员以无比激动的心情收听了中共中央给全国厂矿企业革命职工、革命干部的信的广播，营区顿时一片欢腾。"},{"type":"paragraph","text":"指战员们在座谈中万分激动地说，这是我们最最敬爱的领袖毛主席给全国人民发出了抓革命，促生产的最新的战斗动员令。一致表示对毛主席和党中央的最新指示要认真学习，热情宣传，坚决贯彻，誓死捍卫。"},{"type":"paragraph","text":"警备区某部指战员为了让毛主席和党中央的声音及早地告诉革命职工、革命干部，连夜编写和排练节目，第二天即投入了宣传活动，到街镇、工厂进行宣传。"},{"type":"paragraph","text":"已深入工厂企业的几十个毛泽东思想宣传队的同志们听了广播后，立即出动宣传车，把这一振奋人心的喜事传给广大革命职工和革命干部。革命职工和革命干部激动得热泪盈眶，“毛主席万岁!万万岁!”的欢呼声响彻云霄。"},{"type":"paragraph","text":"又讯:连续四年荣获四好连队光荣称号的驻沪空军某部高炮四连的干部和战士听了党中央的信的广播以后，立即组织了座谈讨论。出席南京部队空军学习毛主席著作积极分子代表大会代表、连长余国富说:“毛主席指向那里，我们就奔向那里。我们要大力协助地方厂矿企业，大力支持工业生产工作，和革命职工，革命干部一起战斗，响应毛主席提出的‘抓革命，促生产’的伟大号召，夺取无产阶级文化大革命的更大胜利。”"},{"type":"paragraph","text":"驻沪空军某部九连指战员兴奋地说，这封信来得太及时了，真是一个大喜讯。他们向毛主席宣誓:一定最热烈的响应毛主席和党中央的号召，勇敢地挑起支持工业生产的重担。只要一声令下，立刻奔向工业战线，和革命职工、革命干部并肩战斗，坚决夺取革命和生产双丰收。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa287240a5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
