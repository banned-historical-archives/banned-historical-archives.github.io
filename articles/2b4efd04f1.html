tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"反对任何国家在任何地区建立霸权","authors":[],"parts":[{"type":"paragraph","text":"据新华社吉隆坡十一月十一日电 邓小平副总理今天在这里表示相信，他这次对马来西亚的访问，必将加深相互了解，促进两国友好关系的进一步发展。"},{"type":"paragraph","text":"邓副总理宣布：“中国政府积极支持第三世界国家提出的商品综合方案和建立共同基金的积极主张，愿同马来西亚等第三世界国家一道，为建立新的国际经济秩序而努力。”"},{"type":"paragraph","text":"邓副总理今晚在他举行的告别宴会上祝酒时说，他在访问期间，同马来西亚总理在真诚、坦率、友好的气氛中进行了富有成效的会谈。他说：“我们都主张在和平共处五项原则的基础上发展国与国之间的关系，反对外来侵略、颠覆、控制和干涉。我们都反对任何国家或国家集团在世界上任何地区建立霸权和势力范围的图谋。”"},{"type":"paragraph","text":"邓副总理说：“我们深信，国家之间、人民之间的合作和友谊，只能建立在真诚、谅解、尊重各自地位和立场的基础上，虚伪、言行不一、抛弃原则，甚至出卖灵魂，是不可能得到尊重和信任的，更不可能得到友谊的。”"},{"type":"paragraph","text":"他指出：“中国政府一向赞成和鼓励华侨按照自愿原则选择居住国国籍，自愿选择了马来西亚国籍的中国血统的人，即成为马来西亚公民，他们应当遵守马来西亚政府的法令和法律，他们应当同其他民族的马来西亚公民一样，对马来西亚国家尽同样的义务，同时也享受平等的权利。取得了马来西亚公民权的中国血统的人，即自动丧失其中国国籍。对于保留中国国籍的华侨，希望他们遵守居住国法令，尊重当地风俗习惯，同当地人民友好相处，为发展居住国的经济、为促进中马两国的友谊而努力，当然他们的正当权益应该得到保护和保障。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b4efd04f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
