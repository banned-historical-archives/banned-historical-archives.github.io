工作的指示","authors":["董必武"],"dates":[{"year":1947,"month":11,"day":24}],"is_range_date":false,"parts":[{"text":"董必武对石家庄市解放初期镇压反革命工作的指示","type":"title"},{"text":"董必武","type":"authors"},{"text":"董必武同志指示：","type":"appellation"},{"text":"镇压反革命是一件很重要的事，反革命不镇压倒就不能管理好石家庄，当然，镇压反革命不是只依靠工作人员，而是要依靠与发动群众。","type":"paragraph"},{"text":"要经过群众的审讯，组织人民清算，组织人民法庭审判处决。","type":"paragraph"},{"text":"工业部门的技术人员，要注意对伪技术人员，不要与对待特务一般看待，如他们不好，工人所痛恨者，且有特务嫌疑者可关起来，慢慢处理，当然，如工人最痛恨者，由群众审讯处决。","type":"paragraph"},{"text":"如私人资本家对他们的机器有破坏者，以反革命论。","type":"paragraph"},{"text":"（1947年11月24日陈用文传达）","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c883cf3e9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
