{"year":1976,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"当年的红卫兵战斗在各条战线上"},{"type":"paragraph","text":"清华大学党委副书记荣泳霖（前左二），政治部副主任吴炜煜（左一），团委书记戴德慈（前左三），都是当年的红卫兵。他们在反击右倾翻案风的斗争中，发扬了当年红卫兵敢于革命的精神，写出革命的大字报，把斗争矛头对准党内不肯改悔的走资派邓小平。"},{"type":"paragraph","text":"河北省临西县下堡寺公社党委第一书记范春阳是十年前受到毛主席检阅的红卫兵。他带领党委一班人把学习马列著作和毛主席著作放在首位，坚决同修正主义作斗争，保证了公社建设的社会主义方向。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"曾在十年前幸福地见到伟大领袖毛主席的红卫兵农秋生（壮族），现在是广西德保县多敬公社党委副书记。她继续发扬敢想敢干的革命造反精神，在批判邓小平、反击右倾翻案风的斗争中起到模范带头作用。"},{"type":"paragraph","text":"开滦煤矿吕家坨矿机电工戴文生（右）、共青团团委书记高振永（中）、采煤四区掘进工董玉宝（左）都是当年的红卫兵小将，在抗震救灾斗争中，他们奋勇抢修矿山设备，立了新功。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"曾在十年前受到毛主席检阅的北京红卫兵郑培庭，于一九六九年来到云南省西双版纳傣族自治州勐海县。他决心扎根边疆，为发展兄弟民族的社会主义教育事业贡献力量。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"辽宁省清原县苍石公社党委书记王玉林（左一），是在文化大革命中经受锻炼的红卫兵小将。他经常和上山下乡知识青年一起劳动，一起谈心，关心他们的成长。　新华社稿"},{"type":"paragraph","text":"曾在十年前任广东省潮安县“红代会”委员的林玉坤，今天是广州部队某部的连长。这是他指挥部队进行作战演习。"},{"type":"paragraph","text":"这些在无产阶级文化大革命期间曾接受伟大领袖毛主席检阅的红卫兵，来到大庆油田后，在毛泽东思想哺育下，正在茁壮成长。"},{"type":"paragraph","text":"当年的红卫兵李庆云（右二），响应毛主席的伟大号召，从长沙市来到岳阳县范家大队落户，担任赤脚医生。她和贫农社员结了婚，决心一辈子为发展农村医疗卫生事业贡献力量。　　　　新华社稿"},{"type":"paragraph","text":"（本版照片除署名者外为本报通讯员摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"598f226002"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
