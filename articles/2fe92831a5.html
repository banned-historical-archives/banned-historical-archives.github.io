"https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4.pdf"],"article":{"title":"对新四军进行游击战的指示","alias":"","parts":[{"type":"paragraph","text":"对新四军进行游击战的指示"},{"type":"paragraph","text":"1938年5月4日毛泽东同志致项英同志"},{"type":"paragraph","text":"项英同志：在敌后进行游击战争虽有困难，敌情方面虽较严重，但只要有广大群众活动地区，充分注意指的机动灵活，也会能够克服这种困难，这是河北及山东方面游击战争已经明了的。在值察部队出去若干天之后，主力就可以跟进，在广德、苏州、镇江、南京、燕湖五区之间广大地区创造根据地，发动民众的抗日斗筝，组织民众武装，发展新的游击队，是完全有希望的。在茅山根据地大体建立起来之后，还应准备分兵一部进入苏州、镇江、吴淞三角地区去，再分一部分渡江进入江北地区。在一定条件下，平时也是能发展游击战争的，条件与内战时候，很大不同。当然，无何时，应有谨慎的态度，具体的作战行动，应在具体的情况许可之下，这是不能忽的。（下略）"},{"type":"paragraph","text":"与世界学联代表团柯乐满先生雅德先生"},{"type":"paragraph","text":"傅路德先生雷克难先生之谈话"},{"type":"paragraph","text":"（一九三八年七月二日）"},{"type":"paragraph","text":"第一个问题：目前边区在中国的意义与作用是什么？请你告诉我们，我们很需要明白这点。"},{"type":"paragraph","text":"答：明白了边区的性，才能明白它在中国的意义与作用。边区是一个什么性质的地方呢？一句话完，是一个民主的抗日根据地。"},{"type":"paragraph","text":"首先，在民：众方面，都有他们自已的组织。边区人民，只要在抗日原则下，都有他们言出版集会结社之自由，不是工人、农民、商人、学生、知识分子、妇女、儿童以及宗教团体、自由职业者的团体都有这种自由。共产党与边区政府从而积极地扶植他们，帮助他们使他们更普遍的发展下去。这里仅仅限制汉奸的活动，对于汉奸，是不给任何自由的。"},{"type":"paragraph","text":"其次，边区已成了直接抗战的区域，这里为八路军的一部分，还有地方武装部队。这些军队，其内部管长与士兵的关系，其对外与人民的关系，也都有一种民主的精神，能够官兵打成-片，军民打成一片，使在抗日战筝中表现不能被战胜的力量。"},{"type":"paragraph","text":"其次，边区的教育，同样是抗日的与民主的，你们从抗日军政大学与陕北公学，就可看出这种精神。"},{"type":"paragraph","text":"其次，经济方面也是这样，以有利抗战为主旨，而以民主精神经营之。例如这里为发达的合作社，得了土地后的农民之于农业，都是按照这种精神，使人民的生活得到改良，同时又有利于抗日事业。这里是有租税的，但没有苛捐杂税，实行一种统一的累进税，符合于上迹的主旨。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":5,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":238},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fe92831a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
