tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"从群众中吸取营养 促进思想革命化","authors":["济南部队学习毛主席著作积极分子？团长","潘祥林"],"parts":[{"type":"paragraph","text":"我们最最敬爱的伟大领袖，世界革命人民心中最红最红的红太阳毛主席最近发出的关于搞好干部和群众关系的最新指示，字字句句是最高真理。她象一盏明灯，照亮了我们思想革命化的必由之路。我们热烈欢呼最新指示的发表，一千遍一万遍高呼：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"毛主席早就教导我们：“人民，只有人民，才是创造世界历史的动力。”又说：“群众是真正的英雄，而我们自己则往往是幼稚可笑的，不了解这一点，就不能得到起码的知识。”我们伟大统帅毛主席最最相信群众，最最关心群众，最最尊重群众的革命首创精神。最最支持群众的革命运动。我们伟大统帅毛主席和群众同呼吸共命运，永远和群众心连心，给全党同志树立了光辉的榜样。"},{"type":"paragraph","text":"一年多来，我先后执行了“支农”“军训”等任务。无产阶级文化大革命的实践，使我对“群众是真正的英雄”这句话的含意有了进一步的认识。我们同用毛泽东思想武装起来的广大无产阶级革命派和革命小将战斗在一起，亲眼看到他们敢闯、敢干、敢造反的大无畏革命精神。正是这些“小人物”，天不怕，地不怕，冲破了重重障碍，把不可一世的庞然大物——党内一小撮走资派揪了出来，打得他们落花流水，人仰马翻。无产阶级革命派是我们很好的老师，从他们身上吸取了最丰富的政治营养。"},{"type":"paragraph","text":"急风暴雨的群众运动，是最好最实际的斗私批修的大课堂，是锻炼自己改造自己最好的红色熔炉。永远和群众在一起，就能更有力地促进我们改造主观世界和改造客观世界。坚决执行毛主席的最新伟大指示，永远相信群众，依靠群众，做群众的小学生，是防止干部蜕化变质的根本措施，是保证党和国家不变颜色的根本措施。"},{"type":"paragraph","text":"毛主席的最新伟大指示，给我们指出了前进的方向，提出了更高的标准和要求。我们要更高地举起毛泽东思想伟大红旗，把毛主席这一伟大指示深深地印在脑子里，牢牢地刻在心坎上，干一辈子革命，一辈子做群众的小学生。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f636e1e3f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
