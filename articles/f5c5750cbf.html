:"一九八八年第二次全国宣传部长会议（概况）","dates":[{"year":1988,"month":10,"day":16}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部办公厅, 党的宣传工作会议概况和文献(1951——1992年), 864","tags":[{"name":"对外宣传","type":"主题/事件"},{"name":"改革","type":"主题/事件"},{"name":"教育","type":"主题/事件"},{"name":"经济","type":"主题/事件"},{"name":"宣传","type":"主题/事件"}],"parts":[{"type":"title","text":"一九八八年第二次全国宣传部长会议"},{"type":"paragraph","text":"• 概况 •"},{"type":"paragraph","text":"1988年第一次全国宣传部长会议于10月16日至19日在北京召开。参加会议的有各省、自治区、直辖市和计划单列市党委宣传部长，港澳工委宣传部长，总政宣传部长，中直和国家机关党委宣传部长，中央宣传系统有关单位负责人，共90多人。"},{"type":"paragraph","text":"会议内容是贯彻十三届三中全会精神，研究如何广泛深入地进行形势教育的问题。"},{"type":"paragraph","text":"中央宣传部部长王忍之主持会议，并在会议开始时就形势教育问题讲了话。"},{"type":"paragraph","text":"中央政治局常委胡启立、中央书记处书记芮杏文分别参加了分组座谈会。"},{"type":"paragraph","text":"会议还讨论了三个文件：《中共中央宣传部关于广泛深入地进行形势教育的通知》；《关于当前经济形势和任务的宣传参考提纲》；《关于在对外宣传中贯彻十三届三中全会精神的意见》。会后，以上三个文件分别以中宣发文〔1988〕23、24、25号发出。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5c5750cbf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
