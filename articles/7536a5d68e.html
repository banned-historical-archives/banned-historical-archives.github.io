],"dates":[{"year":1982,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英会见共青团十一大军队代表"},{"type":"paragraph","text":"希望解放军做全国青年表率"},{"type":"paragraph","text":"新华社北京12月31日电　叶剑英同志今天上午在家里会见了出席共青团十一大的人民解放军部分代表，希望他们同全国青年一起，在保卫祖国、建设祖国的事业中做出更大的贡献。"},{"type":"paragraph","text":"叶剑英同志说，见到扣林山、法卡山英雄们感到很高兴，我自己也觉得年轻了。因身体关系我没有参加你们这次团代会，但我每天都很注意和关心大会的情况，看到这次大会开得这样好，我感到特别兴奋。"},{"type":"paragraph","text":"叶剑英同志说，下一代人如何接好班，我们的革命事业如何一代一代地传下去，党的优良传统如何进一步发扬光大，如何使中华民族振兴起来，这是我们老一代人时常考虑的一件大事。共产主义是光荣而艰巨的事业，需要一代接一代地继续艰苦奋斗。现在，我们的事业正处在新老交替、密切合作的时期，在这方面，我们已经取得了可喜的成效。我感到很放心、很高兴。你们接了班，要把这个历史的重任担当起来。这样，我们的事业就大有希望。"},{"type":"paragraph","text":"叶剑英同志说，你们这次团代会开得朝气蓬勃，开成了动员各族青年沿着党的十二大精神前进的誓师大会，这说明，我们的事业后继有人，我们老年人感到很欣慰。"},{"type":"paragraph","text":"叶剑英同志说，解放军的绝大多数成员是青年，青年工作搞好了，对军队建设具有很大意义。军队的同志要在保卫祖国、建设祖国方面做青年的表率，起先锋模范作用。他说，解放军是人民的子弟兵，要发扬我军的优良传统，在党的领导下，进一步密切同人民的联系；要有历史的责任感和时代的光荣感，在保卫祖国、建设祖国的伟大事业中，冲锋陷阵在最前列，在自己的旗帜上大书共产主义。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"叶剑英同志会见出席团十一大的解放军部分代表。"},{"type":"paragraph","text":"新华社记者　王敬德摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7536a5d68e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
