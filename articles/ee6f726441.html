"知一"],"dates":[{"year":1955,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"知一"},{"type":"paragraph","text":"胡适，这个彻头彻尾的反革命分子，他披着学者的外衣，曾经迷惑过不少人，他的谎言邪说，曾经毒害了不少人。到今天为止，他所散布的反动的、伪科学的思想，仍然遗留在中国学术文化界，没有得到彻底的清除。因此，展开对胡适思想的批判，正是马克思主义唯物论与反动的唯心论之间的一场严肃的斗争，这个斗争已经在全国各地展开了。三联书店最近出版的“胡适思想批判”第一、二两辑选辑了北京和各地报纸、杂志刊载的对胡适思想批判的文字四十八篇。这本书的出版，说明了目前批判胡适派反动思想的斗争形势。"},{"type":"paragraph","text":"书中收集的批判胡适派的文章，全面地接触到胡适思想的各个方面。这些文章，在哲学思想、哲学史观、政治思想、教育思想、历史观、文学思想以及胡适派对“红楼梦”的研究等各个学术范围里，都揭发了胡适派反动学术思想的本质。这些文章是巨大的战斗力量，同时引导着人们投向战斗。"},{"type":"paragraph","text":"这些文章告诉我们:胡适的极端反动的政治思想，以及胡适及其师傅杜威所鼓吹的实用主义哲学是怎样为反动统治阶级服务的，胡适怎样以实用主义的教育理论、庸俗进化论的历史观、甚至所谓“学术考证工作”来达到他反对社会革命、反对马克思主义的目的。胡适抱着虚无主义的态度来否定我国的民族文化遗产，更是他的全盘西化的洋奴思想的表现。书中所揭露的胡适这些反动的、伪科学的、与人民为敌的思想和行为，使我们不仅认识了胡适这一个人的无耻的面目，而且让我们知道了胡适派思想的毒害性，和为什么在今天社会主义建设的灿烂日子里，有必要去批判这些错误思想，大张旗鼓地宣传辩证唯物主义和历史唯物主义。"},{"type":"paragraph","text":"本书作者有些是马克思列宁主义理论家，有些是学术战线上的新生力量。有很多作者在文章中认真地检查了自己过去的立场观点，已能初步运用马克思列宁主义的理论武器，一面勇敢地对敌作战，一面以勇于自我批评的精神检讨自己过去的错误。例如:贺麟先生在他的“两点批判，一点反省”中表示决心和过去的唯心论思想划清界限。"},{"type":"paragraph","text":"在这两本小册子中，我们也可以看到青年马克思主义者的名字，他们参加到斗争中来，给予青年们以最大的鼓舞，也显示了这一斗争的声势浩大。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee6f726441"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
