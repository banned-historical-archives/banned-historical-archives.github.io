tes":[{"year":1967,"month":7,"day":4}],"is_range_date":false,"parts":[{"text":"陈伯达谈教育革命","type":"title"},{"text":"七月四日上午九点，陈伯达同志派张作跃等三位同志到轻工业学院传达了伯达同志关于教育革命的指示：","type":"paragraph"},{"text":"你们搞联合行动，达成了一些协议，我们很高兴，我本来要去，怕你们等急了，先派人来看看你们。","type":"paragraph"},{"text":"建议你们（北航、清华、北大、轻院、师大）组成三十个人的调查组，做社会调查，对大中小学调查。（大学以我们自己学校为主，中学在北京地区搞三个，小学也搞三个）了解内容：过去的历史，现在状况，将来的发展。思想武器是毛主席论教育的论点，建议你们学习《农村调查的序言和跋》这篇毛主席著作，调查一个月的时间，写出书面材料，写个报告，搞好教育革命。","type":"paragraph"}],"comments":[],"origin":"《北京大学文革资料选编（下）》，美国华忆出版社，2020。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e47696bcb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
