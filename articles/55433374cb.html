通知","authors":[],"dates":[{"year":1975,"month":12,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央关于扩大中发[1975]23号文件传达范围的通知","type":"title"},{"text":"中共中央通知","type":"paragraph"},{"text":"各省、市、自治区党委，各大军区、省军区、野战军党委，中央和国家机关各部委党委、领导小组或党的核心小组，军委各总部、各军兵种党委：","type":"appellation"},{"text":"中央决定，将一九七五年十一月二十七日下发的中发[1975] 23号文件，扩大传达范围，由省、市、自治区党委召集地。市委书记、副书记（各大中城市的区委书记和主管文教的同志)，大专院校党委书记、工宣队长，省、市、自治区直属机关负责人的会议传达讨论，然后由县、区委自行掌握逐步传达到中学、小学支部书记；各大军区、省军区、野战军可传达到党委常委和军一级党员干部，并自行掌握逐步传达到团级党员干部；中央和国家机关可传达到司局长和相当这一级的党员干部，并自行掌握逐步传达到党员干部；军委各总部、各军兵种党委可传达到总部二级部部长、副部长和相当这一级的党员干部，并自行掌握逐步传达到团级党员干部。","type":"paragraph"},{"text":"所需文件，由中央办公厅印发，学习、讨论情况，请你们综合报告中央。","type":"paragraph"},{"text":" 中共中央一九七五年十二月十日","type":"paragraph"},{"text":"(此件发至县、团级)","type":"paragraph"},{"text":"中共中央办公厅  一九七五年十二月十日发出","type":"paragraph"},{"text":"共印四九、九六五份。","type":"paragraph"},{"text":"（根据中央文件原件打印）","type":"appellation"}],"comments":[],"origin":"根据中央文件原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55433374cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
