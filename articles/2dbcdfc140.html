art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高举毛泽东思想伟大红旗奋勇前进","authors":["工程兵四好连队标兵某部三机连"],"parts":[{"type":"paragraph","text":"我国第一颗人造地球卫星发射成功了，毛主席提出的“我们也要搞人造卫星”的伟大号召实现了！这再一次雄辩地证明：毛泽东思想是威力无比的精神原子弹。掌握了毛泽东思想，我们就什么困难都能克服，什么艰险都能战胜，什么奇迹都能创造，什么高峰都能攀登。"},{"type":"paragraph","text":"我们连是一个新组建的机械分队。在底子薄、机械设备差、任务重的情况下，我们连所以能跨入四好连队行列，被树立为工程兵四好连队标兵，完全是我们遵照林副主席关于“一定要把毛泽东思想真正学到手”的指示，狠抓活学活用毛泽东思想这个根本，用毛泽东思想培育全连干部战士的结果。"},{"type":"paragraph","text":"在欢呼我国第一颗人造地球卫星发射成功的大喜日子里，我们决心更高地举起毛泽东思想伟大红旗，进一步把连队建设成为无限忠于毛主席的战斗集体。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dbcdfc140"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
