":[],"dates":[{"year":1953,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京四日电】　中国共产党中央委员会和中央人民政府在获知苏联共产党中央委员会和苏联部长会议三日发表的关于斯大林同志的严重病况的公告后，特由毛泽东主席偕同朱德、周恩来、高岗三同志前往苏联驻我国大使馆会见潘友新大使，请其转达中国人民、中国共产党和中央人民政府对斯大林同志的病情的关怀与慰问，并表示对斯大林同志早日恢复健康的盼望。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b19888d9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
