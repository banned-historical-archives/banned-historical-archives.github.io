<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"张春桥歪曲了社会主义分配的性质","authors":["何伟"],"dates":[{"year":1977,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张春桥歪曲了社会主义分配的性质"},{"type":"paragraph","text":"何伟"},{"type":"paragraph","text":"张春桥在一篇文章中说：资产阶级法权“在分配方面还占统治地位”。什么是分配问题？马克思主义者历来认为，研究分配问题，首先应着眼于社会总产品的分配。只有象拉萨尔那样的机会主义者才把个人消费品的分配放在首位。马克思在《哥达纲领批判》一书中，对拉萨尔这种错误观点进行了批判，并科学地论述了社会主义社会的分配原则，指出社会首先要分配的是社会总产品，必须从中先作两大类的扣除，即：首先扣除为生产上需要的部分；其次扣除作为公共消费的部分。其余部分才作为个人消费品进行分配。社会总产品是按照这一原则进行分配的，怎么能笼统地说，资产阶级法权在分配方面占统治地位呢？任何一个马列主义经典作家都没有这样说过。"},{"type":"paragraph","text":"至于说到个人消费品的分配，列宁在《国家与革命》一书中说：“就产品‘按劳动’分配这一点说，‘资产阶级法权’仍然占着统治地位。”（《列宁选集》第3卷第251页）列宁这句话讲的是非常严格的，不是笼统地谈分配问题，而是很明确地指出在个人消费品方面，就产品按劳动分配这一点说的。列宁这里所讲的意思和马克思在《哥达纲领批判》一书中所讲的意思是一致的。他们都认为，在社会主义条件下，个人消费品的分配，仍然通行着商品交换中那个等量劳动互换的原则，就这个原则本身来说，仍然是资产阶级法权，它在按劳分配方面还占着支配地位。"},{"type":"paragraph","text":"马克思也好，列宁也好，虽然都认为在个人消费品的分配方面资产阶级法权还存在，但并没有把它和社会主义经济基础对立起来，而是都肯定这一分配原则是社会主义的原则。马克思指出，这一分配原则，“不承认任何阶级差别”（《马克思恩格斯选集》第3卷第11页）。列宁指出：“‘不劳动者不得食’这个社会主义原则已经实现了；‘按等量劳动领取等量产品’这个社会主义原则也已经实现了。”（《列宁选集》第3卷第252页）这就说明，个人消费品的分配方面虽然还存在着资产阶级法权，但并不影响按劳分配是社会主义性质的分配原则。"},{"type":"paragraph","text":"可是，张春桥谈到分配问题时，只谈资产阶级法权占统治地位的一面，而不谈它是社会主义的分配原则。他还进一步把资产阶级法权和社会主义经济基础对立起来，认为资产阶级法权是社会主义"},{"type":"paragraph","text":"“经济基础还不稳固”的原因。这样，按照张春桥的逻辑，要“稳固”社会主义经济基础，就必须取消资产阶级法权。那末我们要问：按劳分配是不是社会主义经济基础的组成部分？既然是组成部分，只要按劳分配而不要资产阶级法权能做得到吗？取消了按劳动分配个人消费品的这一等量劳动互换的资产阶级法权，按劳分配原则还能存在吗？没有按劳分配，还能叫作社会主义社会吗？显然，张春桥的论述，在逻辑上是混乱的，在观点上完全错误。"},{"type":"paragraph","text":"我们对待资产阶级法权的态度，是要在无产阶级专政下加以限制，在分配方面主要是使工资的差别不要过分悬殊。但限制本身就说明不是要取消资产阶级法权。无产阶级专政的国家，不仅不取消它，还要保卫它。列宁指出，国家要来保卫劳动的平等和产品分配的平等。毛主席也说，我们就是建设了一个没有资本家的资产阶级国家，为了保障资产阶级法权。所以，我们既要保障资产阶级法权，又要限制资产阶级法权，在保障实现按劳分配的过程中，根据条件，逐步限制它。张春桥把资产阶级法权和社会主义经济基础对立起来，就是借限制资产阶级法权之名来否定按劳分配，掩盖他歪曲社会主义分配性质的丑恶嘴脸。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e204d6242"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
