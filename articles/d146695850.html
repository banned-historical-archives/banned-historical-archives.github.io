art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席天才地总结国际共运历史经验为世界革命人民指出走向胜利的道路","authors":[],"parts":[{"type":"paragraph","text":"新华社科伦坡十七日电 锡兰进步人士热烈欢呼在毛主席亲自主持下制定的中共中央一九六六年五月十六日的《通知》发表两周年。"},{"type":"paragraph","text":"锡中友好协会秘书长阿南达·库马拉十六日在这里向新华社记者发表书面谈话指出，当代最伟大的革命领袖毛泽东天才地总结了国际共产主义运动的历史经验，为革命人民指出了走向胜利的道路。"},{"type":"paragraph","text":"他说，这个《通知》对那些千方百计企图复辟资本主义的形形色色的现代修正主义分子宣判了死刑。现代修正主义牛鬼蛇神，绝对逃不过用伟大的毛泽东思想武装起来的革命者的锐利目光。"},{"type":"paragraph","text":"他说，《通知》将作为具有深刻革命真理的伟大文献载入工人阶级运动的史册。"},{"type":"paragraph","text":"一些在一起学习毛主席著作的锡兰朋友十七日对新华社记者发表声明说，中共中央的《通知》是具有重大历史意义的革命文献。"},{"type":"paragraph","text":"声明说，《通知》粉碎了党内一小撮走资本主义道路的当权派的阴谋，它们企图复辟资本主义，反对无产阶级，反对马克思列宁主义、毛泽东思想，妄图改变中国人民和全世界革命人民前进的方向，以便把他们引到已经成为帝国主义走狗的苏联修正主义者所走的资本主义道路上去。在伟大导师毛泽东主席主持下制定的《通知》，给了资产阶级修正主义分子和反革命分子决定性的致命打击。"},{"type":"paragraph","text":"声明说，让我们沿着毛泽东思想所照亮的革命道路迈进。让我们学习中国共产党反对帝国主义、修正主义和各国反动派的胜利斗争的经验，让我们亚洲无产阶级用战无不胜的毛泽东思想武装自己，坚决地消灭资产阶级反动的统治制度。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d146695850"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
