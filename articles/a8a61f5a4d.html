art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”的放羊梦","authors":["金播"],"parts":[{"type":"paragraph","text":"“四人帮”装得最恨“小绵羊”，把它说成“奴隶主义”的象征。他们这里恨的所谓“绵羊”，正是听党的话，自觉遵守党的纪律，一心一意跟党走的革命同志。这是对革命同志的污蔑。"},{"type":"paragraph","text":"其实，“四人帮”才爱“绵羊”。特务张春桥说：“放羊也不怕，羊也有办法，也会找出带头羊，一带一群就走了”。这使人想起鲁迅先生《一点比喻》中的一段话：山羊“因为比胡羊（按：即绵羊）聪明，能够率领羊群，悉依它的进止，所以畜牧家虽然偶而养几匹，却只用作胡羊们的领导”。“四人帮”这伙历史唯心主义者，正是把广大群众看作任人宰割的“绵羊”，妄图依靠几只“能够率领羊群”往他们那条修正主义路线上跑的“山羊”，作为“带头羊”，来改变人民跟党前进的方向。可是，人民群众决不是任阴谋家摆布的绵羊。“四人帮”的放羊梦只能遭到彻底破产。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8a61f5a4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
