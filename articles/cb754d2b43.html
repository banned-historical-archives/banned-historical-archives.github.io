tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无限忠于毛主席是共产党员的革命大节","authors":["五好战士金进仓"],"parts":[{"type":"paragraph","text":"今年二月份，我高兴地填了入党志愿书，事后我天天盼望早一点被批准。可是等呀等呀，别人都批准了，就是我没有批准。当时，我私心抬头了，心想：入不了党，对以后个人发展也有影响。正在这个时候，毛主席的教导在我耳边响了起来：“我们共产党人不是要做官，而是要革命”。我想，我们入党的目的不是为了当官作老爷，而是为了完全、彻底地为人民服务，将革命进行到底。如果入党是为了给自己创造发展条件，那不正上了中国赫鲁晓夫修正主义建党路线的当吗？经过反复学习毛主席著作，狠斗自己的私心杂念，狠批中国赫鲁晓夫的修正主义建党路线，我立下了誓言：不管党在什么时候批准我入党，我的决心永远不变，一辈子忠于毛主席，一辈子勇敢捍卫毛主席的无产阶级革命路线，一辈子跟着毛主席干革命。"},{"type":"paragraph","text":"今年四月间，我们连队到某地执行任务，连队派出了五位同志组成群众工作组，到农村去帮助社员学习毛主席著作和助民劳动。当时我积极争着去了。这个工作确实比较艰苦紧张，每天要早出晚归，白天参加田间劳动，晚上和社员一起学习，直到深夜才能回连队。我不怕累，不叫苦，心里只有一个愿望：一心一意地把毛泽东思想传播到社员群众中去，用毛泽东思想武装社员的头脑，使每个社员都成为抓革命的闯将，促生产的模范。我觉得这是我最大的为人民服务，也是我最大的偷快。"},{"type":"paragraph","text":"通过自己入党的过程，我深刻体会到：无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的无产阶级革命路线，是做一个共产党员的根本的根本。同时我也深刻认识到：中国赫鲁晓夫的修正主义建党路线，会给党带来多么大的危害。他竟然明目张胆地要人们为了升官发财而去当“党员”，胡说什么“过去考上秀才就可以做官，现在加入了共产党也可以做官”。这是对我们千百万共产党员最大的污蔑！如果真的照中国赫鲁晓夫那一套去发展党员，那末我们的党就要蜕化成为那些政治野心家和各种各样投机分子的俱乐部，蜕变成修正主义的党。"},{"type":"paragraph","text":"“金猴奋起千钧棒，玉宇澄清万里埃。”我们一定要奋起毛泽东思想的千钧棒，把中国赫鲁晓夫的修正主义建党路线从政治上、思想上、理论上彻底批深、批透，肃清其流毒，让毛主席的建党路线永放光芒。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb754d2b43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
