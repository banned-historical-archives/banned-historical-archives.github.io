":[{"year":1989,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社莫斯科9月15日电　苏联西南部的摩尔达维亚共和国共产党中央局15日发表决议，谴责“反俄罗斯和反摩尔达维亚的民族主义和沙文主义表现”。"},{"type":"paragraph","text":"8月中旬以来，摩尔达维亚共和国许多工业企业发生罢工，罢工者大都是非摩尔达维亚族工人。他们要求取消共和国议会通过的语言法中的某些条款。这些条款确定摩尔达维亚语为共和国国语，俄语为族际交流语言。在摩尔达维亚共和国境内，非摩尔达维亚语居民占百分之四十。他们认为语言法的这些条款损害了他们的权利，要求俄语和摩尔达维亚语应当享有同等地位。"},{"type":"paragraph","text":"摩尔达维亚共产党中央局的决议谴责那些煽动无政府状态和动乱的独立运动和组织的领导者，并谴责那些反社会主义的口号和妄想建立另一种政权结构的企图。"},{"type":"paragraph","text":"摩尔达维亚共产党中央的领导人还表示反对罢工，指出罢工给国民经济造成了几千万卢布的损失，引起了大部分居民的不满，导致了共和国局势的不稳定。"},{"type":"paragraph","text":"最近，参加罢工的铁路等部门已陆续复工。共和国党中央局决定，在本月内召开共和国党中央全会，讨论共和国的局势。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ceaee9873f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
