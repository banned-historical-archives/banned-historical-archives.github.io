art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"警钟","authors":["火华"],"parts":[{"type":"paragraph","text":"从纪念碑到天安门，"},{"type":"paragraph","text":"从民主革命到夺取政权，"},{"type":"paragraph","text":"我们祖国走完这段路程，"},{"type":"paragraph","text":"用了几十年漫长的时光。"},{"type":"paragraph","text":"在一块一块的方砖上，"},{"type":"paragraph","text":"我看到雪山身影、金沙激浪；"},{"type":"paragraph","text":"在人民英雄纪念碑的浮雕上，"},{"type":"paragraph","text":"我听到呐喊的声浪、枪炮的轰响。"},{"type":"paragraph","text":"多少鲜血、多少生命，"},{"type":"paragraph","text":"换来广场上的红旗飘扬。"},{"type":"paragraph","text":"多少风霜、多少飞雪，"},{"type":"paragraph","text":"迎来新中国的火红朝阳。"},{"type":"paragraph","text":"胜利了，"},{"type":"paragraph","text":"二十七度春风吹过广场。"},{"type":"paragraph","text":"可是我要问："},{"type":"paragraph","text":"过去，我们的战士血洒战地，"},{"type":"paragraph","text":"为什么今天，"},{"type":"paragraph","text":"却在天安门前被暴徒打伤？"},{"type":"paragraph","text":"这是因为呀，"},{"type":"paragraph","text":"资产阶级不肯退出历史舞台，"},{"type":"paragraph","text":"还在和无产阶级进行生死的较量。"},{"type":"paragraph","text":"和过去不同的是："},{"type":"paragraph","text":"资产阶级的灵魂，"},{"type":"paragraph","text":"在共产党员的称号下巧妙伪装。"},{"type":"paragraph","text":"不肯改悔的走资派邓小平，"},{"type":"paragraph","text":"代表着一切反动势力，"},{"type":"paragraph","text":"垂死挣扎，更加猖狂。"},{"type":"paragraph","text":"阶级斗争并未熄灭啊！"},{"type":"paragraph","text":"天安门广场的反革命事件，"},{"type":"paragraph","text":"向人们把警钟敲响。"},{"type":"paragraph","text":"阶级斗争战场就在眼前，"},{"type":"paragraph","text":"基本路线要牢记心上，"},{"type":"paragraph","text":"百倍警惕敌人的反扑，"},{"type":"paragraph","text":"时刻紧握手中的钢枪！"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5b8b8157b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
