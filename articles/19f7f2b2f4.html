art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"结合训练实际学好毛主席军事著作广州部队某部四连在军事训练中自觉抓紧学习和批判","authors":[],"parts":[{"type":"paragraph","text":"本报讯 广州部队某部四连在军事训练中重视学习毛主席的军事著作，批判林彪的资产阶级军事路线。他们用学习和批判带动军事训练，又通过训练实践不断把学习和批判引向深入，使干部战士加深了对毛主席军事思想和军事路线的理解，有效地提高了训练质量。"},{"type":"paragraph","text":"四连是这个部队的训练先行连队。党支部要求大家紧密结合训练实际，认真学习毛主席军事著作，深入批判林彪的“六个战术原则”。开始，有的骨干思想不大通，总觉得先行任务重，训练时间紧，学习、批判、训练都要抓好有困难，因而一度出现在训练中忽视抓学习和批判的现象。为了解决这个问题，党支部专门开会讨论研究，统一认识。大家从多方面分析了在军事训练中学习毛主席军事著作、批判林彪资产阶级军事路线的重要性，进一步明确了只有搞好学习和批判，才能保持正确的训练方向，才能从根本上提高训练质量。"},{"type":"paragraph","text":"在这个基础上，党支部发动干部战士摸索总结训练中搞好学习和批判的经验。连队干部深入班排，和战士一起实践。副连长田兴安原先担心抓学习、批判会影响训练任务的完成，提高认识以后，他带头学习，带头批判，并且动脑筋，想办法，和三班一起初步总结出用学习和批判推动训练的经验。连队很快出现一片新气象，训练场成了学习毛主席军事著作的课堂，批判林彪资产阶级军事路线的战场。"},{"type":"paragraph","text":"四连在训练中学习毛主席军事著作的主要做法是：一，根据训练内容选学有关著作。学习中，采取举战例、讲传统、作辅导等办法，帮助大家深刻领会毛主席的军事思想。二，训练中遇到问题，发动群众用毛主席军事思想进行分析，统一认识，划清正确和错误的界限。三，对照毛主席的军事思想开展评教评学活动，通过群众性的评论，既检查了学习效果，又加深了对毛主席军事思想的理解。四，始终把学习毛主席军事著作同批判林彪资产阶级军事路线紧密结合起来，课上批，课下批，现场批，不断肃清林彪“六个战术原则”等一套黑货的流毒和影响。"},{"type":"paragraph","text":"四连把学习毛主席军事著作，批判林彪资产阶级军事路线，贯穿到军事训练各项课目之中，收到了明显的效果。干部战士亲密团结，批林批孔更加深入，训练质量越来越好。同志们编了一首快板诗：“学习、批判就是好，边破边立边提高，路线是非分得清，毛主席军事思想记得牢，平时训练会运用，打起仗来立功劳。”"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19f7f2b2f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
