ates":[{"year":1962,"month":6,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级古典政治经济学著作的翻译出版概况"},{"type":"paragraph","text":"为了给学术界研究资产阶级政治经济学古典学派提供参考资料，商务印书馆对这一学派的主要著作的翻译和出版作了安排。其中有的已出版，有的在印刷或翻译中，有的正在组织翻译。"},{"type":"paragraph","text":"英国威廉·配第的《政治算术》已于1960年翻译出版。他的《赋税论》、《献给英明者》和《货币杂论》也已译出，现在校订中，年内可以出版。他的《爱尔兰的政治解剖》正在组译，计划在1963年出版。法国布瓦基尔柏的《法国详论》和《论谷物的性质及其贸易》，现在翻译中，预计在1963年出版。英国洛克的《论降低利息和提高货币价值的后果》和《政府论》均已译出，不久即可出版。法国魁奈的《经济表》现已译出，正在校订中。同时，还选译了他的一些其他重要著作，打算在1963年合并出版一部《魁奈选集》。法国杜阁的《关于财富的形成和分配的考察》已于1961年出版。亚当·斯密的《国民财富的性质和原因的研究》在解放前有王亚南、郭大力的译本，名为《国富论》。现在，正根据王、郭旧译进行校订；第一卷将于年内出版，第二卷将于明年上半年出版。他的《关于司法、警察、岁入及军备的讲演》现已译出，不久即可出版。李嘉图的《政治经济学及赋税原理》在解放前也有王亚南、郭大力的译本，现已根据原文重新作了校订，最近可以出版。法国西斯蒙第的《政治经济学新原理》现已译出初稿。"},{"type":"paragraph","text":"（张伯健）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b17f896ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
