ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"致彭德怀电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀电!"},{"type":"paragraph","text":"（1940年4月25日）"},{"type":"paragraph","text":"一、时局一方面加重了投降危险，另一方面仍未丧失克服此种危险的可能性。二、国民党的限共与磨擦政策不会改变，但目前还没有与我党立即分裂的意图。三、李品仙部仍在进攻新四军，请令彭吴支队速向苏北前进，第三四四旅速向淮北前进。苏北、淮北、皖东是八路、新四两军最重要的生命线，彼既向我进攻，我自不能坐视。四、蒋邀周去颇迫切。邵力子使苏，似尚有赖苏救急之意。彼方财政经济问题甚严重，军队战斗力大减，人民离心力日增，蒋的文章并不好做。周去将给以团结抗战之助力。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":4,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":541,"page_end":541},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a80cdbe94d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
