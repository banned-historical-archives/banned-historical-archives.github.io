<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"天安门修葺一新格外壮丽红墙金瓦同毛泽东彩色画像交相辉映","authors":[],"dates":[{"year":1980,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十一月十二日电　天安门城楼和东、西观礼台最近修葺一新。重新整修过的天安门，红墙金瓦同悬挂城楼中央的毛泽东同志彩色画像相映成辉，显得格外雄伟壮丽。"},{"type":"paragraph","text":"天安门是我们伟大祖国首都的中心。始建于明代初年，当时叫承天门。明、清两代，这里是皇城的大门。它曾因两次起火被烧而两次重建。清顺治八年(一六五一年)重建后，改为现名。在近代革命史上，天安门广场是放射光辉的圣地。一九一九年的“五四”运动发生在天安门前。一九四九年十月一日，新中国第一面五星红旗从这里升起。一九七六年四月，首都人民在这里沉痛哀悼周总理，愤怒声讨“四人帮”。近三十年来，雄伟庄严的天安门成为新中国的象征，天安门广场成为全中国人民和世界人民向往的地方。"},{"type":"paragraph","text":"解放后，党和政府十分重视对天安门的保护工作，曾几度进行修缮。一九七○年，天安门城楼曾进行重建。由北京市房修二公司古建处一队承担的这次修缮是去年十二月初动工的。在修缮中，重新砌筑了城台，普查修补了屋顶琉璃瓦，更换了糟朽柱子，并对上城楼的东、西两边的台阶进行了改建，城墙粉刷了能保持多年不变色的新涂料。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c73e24df7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
