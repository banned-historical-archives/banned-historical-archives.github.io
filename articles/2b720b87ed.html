script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国西班牙谴责奥极右党入阁　奥地利新总理谈政府主要任务","authors":[],"dates":[{"year":2000,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国西班牙谴责奥极右党入阁"},{"type":"paragraph","text":"奥地利新总理谈政府主要任务"},{"type":"paragraph","text":"据新华社巴黎2月9日电 法国总统希拉克和西班牙首相阿斯纳尔9日下午在巴黎会晤后表示，他们一致谴责奥地利极右的自由党参加政府，认为这是对欧洲联盟宗旨的背叛。"},{"type":"paragraph","text":"希拉克说，具有明显的极端主义和排外主义思潮的政党参加政府，这在欧盟成员国中还是第一次，这绝对不是一件小事情。他指出，欧盟其他14个成员国有理由对这一现象进行强烈谴责，目的是提醒奥地利注意自己在参加欧盟时所作出的承诺。他说，欧盟将继续保持高度警惕，坚定地维护欧盟各国所共同遵守的准则。"},{"type":"paragraph","text":"阿斯纳尔指出，欧盟14个成员国发表声明对奥地利进行谴责，这表明欧盟是一个有原则的共同体，奥地利自由党鼓吹的东西与欧盟所维护的政治原则是背道而驰的。"},{"type":"paragraph","text":"据新华社维也纳2月9日电 （记者刘云峰）奥地利新总理许塞尔9日在国民议会发表政府声明。他指出，整顿财政预算、减少失业、支持家庭和教育事业、积极参加欧盟统一外交与安全体系，是新政府面临的主要任务。但在议会辩论中，这一声明却遭到了在野的社民党和绿党等党派的尖锐批评。许塞尔指责国内外对奥地利新政府施加强大压力的做法，要求留给新政府工作的机会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b720b87ed"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
