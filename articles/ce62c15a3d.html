art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远沿着毛主席的革命路线胜利前进","authors":["工程兵第二届学习毛主席著作积极分子代表大会先进集体/某部一连代表张堂印"],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！我们是您检阅过的战士，红太阳的温暖，永远留在我们心窝里，我们的心，永远向着红太阳。在我来北京出席学习毛主席著作积极分子代表大会之前，全连同志为了表达对您老人家的赤胆忠心，捏起细小的绣花针，精心绣制了一面锦旗。上面绣着您老人家的光辉形象，绣着朵朵葵花向太阳，还绣了十四个大字：“毛主席啊，毛主席！我们永远忠于您！”绣出了工程兵战士对您老人家的无限热爱、无限忠诚、无限信仰、无限崇拜的颗颗红心。"},{"type":"paragraph","text":"毛主席啊，毛主席！是您那光焰无际的伟大思想，给了我们无穷的智慧和力量，指引着我们走向胜利。回顾我们连的战斗历程，哪一个胜利不闪耀着您的革命路线的灿烂光芒！当反革命修正主义分子罗瑞卿刮起“大比武”的黑风时，我们牢记您的政治是统帅，是灵魂的教导，高举红旗压黑风，怀揣宝书战恶浪，和这个反革命修正主义分子展开了针锋相对的斗争，使连队沿着您的无产阶级革命路线胜利前进！"},{"type":"paragraph","text":"毛主席啊，毛主席！我们坚决以林彪副主席为光辉榜样，高举您战无不胜的思想伟大红旗，为全面落实您的最新指示，夺取无产阶级文化大革命的全面胜利而勇敢战斗！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce62c15a3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
