:["姚铁奎","姜卓廉","李启文","杜贵圈","河南农学院","黄纪斌"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——攻击社会主义制度","type":"title"},{"text":"河南农学院姚铁奎黄纪斌杜贵圈李启文姜卓廉","type":"authors"},{"text":"姚铁奎（理化教研组讲师）：进入社会主义几天了，还能买不到冰（注：指新社会冷酷如冰）。孩子死了好，不然将来也是饿死。社会主义建设的百年大计，就似大楼裂缝。","type":"paragraph"},{"text":"黄纪斌（农59级学生，党员）：新社会使人乏味，人与人的关系是人心危危，不可相信。","type":"paragraph"},{"text":"杜贵圈（农60级学生）：各民主党派可以轮流执政，因为你（注：指共产党）有一个方向，谁都可以照着执行，好像学校的教学计划，院长或副院长都可贯彻一样。","type":"paragraph"},{"text":"李启文（农59级学生）：社会主义制度是产生教条主义的根源。","type":"paragraph"},{"text":"姜卓廉（农60级学生，院学生会副主席）：根据质量互变定律，社会主义制度也要灭亡。明明农民生活很苦，为什么说不苦，这种不实事求是的说法，必须坚决反对。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2241f74a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
