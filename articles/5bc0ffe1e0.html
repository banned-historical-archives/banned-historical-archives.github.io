级自由化就是维护四项基本原则","authors":["李训舟"],"dates":[{"year":1987,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彭真在会见武警总部党委扩大会议全体同志时说"},{"type":"paragraph","text":"整个宪法贯穿四项基本原则"},{"type":"paragraph","text":"反对资产阶级自由化就是维护四项基本原则"},{"type":"paragraph","text":"新华社北京1月12日电（记者李训舟）今天下午，彭真同志在人民大会堂会见了人民武装警察部队总部党委扩大会议的全体同志。"},{"type":"paragraph","text":"当人民武装警察部队政委张秀夫汇报到武警部队要坚持四项基本原则，旗帜鲜明地反对资产阶级自由化时，彭真同志说：“四项基本原则是党章讲了的，总纲头一条就讲了社会主义，讲了马列主义，讲了人民民主专政，讲了党的领导。宪法序言也讲了四项基本原则，整个宪法都是贯穿了四项基本原则的。不坚持四项基本原则，思想乱了，社会就要乱了。反对资产阶级自由化就是维护四项基本原则。反对资产阶级自由化，反对精神污染和维护四项基本原则是一回事。”在谈到武警最近的工作和表现时，彭真同志满意地说：“他们发扬了光荣传统，纪律是不错的。”"},{"type":"paragraph","text":"参加会见的还有习仲勋、乔石、陈丕显、彭冲、张爱萍等领导同志。中央政法委员会、人民解放军三总部和公安部的领导同志，也在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bc0ffe1e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
