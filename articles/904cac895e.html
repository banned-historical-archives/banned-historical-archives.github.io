art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高炮团把学习毛泽东著作活动引向深入","authors":["华山栋"],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队某高炮团党委贯彻落实《决议》精神，采取措施把部队学习毛泽东著作的活动引向深入。"},{"type":"paragraph","text":"6月中旬，团党委作出《关于深入开展学习毛泽东著作的决定》。党的六中全会以后，团党委学习《决议》，对坚持毛泽东思想的重大意义认识更加明确，决定派出干部深入连队，调查部队在学习毛泽东著作中的新情况、新问题，然后党委开会分析形势，制定深入开展学习活动的具体措施。"},{"type":"paragraph","text":"一、自上而下开展讨论，对过去的学习方法进行具体分析，分清哪些是应该抛弃的林彪、“四人帮”推行的错误做法，哪些是应该坚持的群众在实践中创造的行之有效的好的学习经验，使干部战士有所遵循，消除顾虑。例如，不搞“天天读”、“层层讲用”、片面追求学习篇数、笔记字数等形式主义的东西了，还要不要有时间保证、交流经验、记心得笔记？通过讨论大家明确了，不要搞“雷打不动”、“一刀切”、“空对空”那一套，但必要的学习制度和措施还是要坚持，关键是要从实际出发，学习立场、观点、方法，理论联系实际，讲求实效。"},{"type":"paragraph","text":"二、派出工作组到学习毛泽东著作比较好的六连，和干部战士一起总结连队中学习毛泽东著作的新经验。同时，要求各单位也要注意总结经验，准备召开政工会进行交流。"},{"type":"paragraph","text":"三、要求每个连队建立理论骨干小组，由正、副指导员任正、副组长，吸收理论基础较好的战士参加。团政治处举办了理论骨干学习班，帮助他们在学习中发挥模范带头作用。"},{"type":"paragraph","text":"四、首先抓好党委成风对毛泽东著作的学习。他们对党委成员今年的学习内容和时间作了具体安排。（华山栋）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"904cac895e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
