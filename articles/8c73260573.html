教授　吴仲华"],"dates":[{"year":1958,"month":3,"day":20}],"is_range_date":false,"parts":[{"text":"我的检查","type":"title"},{"text":"清华大学动力系教授　吴仲华","type":"authors"},{"text":"我的骄气","type":"subtitle"},{"text":"自己以为做过一些研究工作，获得一些成绩，在国外做过几年教授等等，常常自高自大，对自己意见非常坚持，不虚心听别人的意见。听了毛主席说：“虚心使人进步，骄傲使人退步”后，虽然觉得非常对，但还没有能改掉这些骄气。必须在这次运动中烧光这些骄气，真正做到虚心的地步。","type":"paragraph"},{"text":"我的官气","type":"subtitle"},{"text":"担任付系主任和教研组主任工作，架子很大，官气十足。工作忙时，常常不到系里来办公，使得教研组同志也以主任自居，常常讲话很不客气。这些官气，必须全部烧光!","type":"paragraph"},{"text":"我的阔气","type":"subtitle"},{"text":"1956年春天为燃气轮机课程订货时，透平增压器提了两种。本来系里给我用的三屉桌嫌小，嫌抽屉少，买了一个大的。这些都是阔气的表现，不知道尽力为人民节约，也必须烧光。","type":"paragraph"},{"text":"我的暮气","type":"subtitle"},{"text":"年纪刚到四十就已经暮气沉沉。不想上第一节课，体育锻炼不积极，晚上想听听音乐，不想工作，写讲义非常慢，设计自由活塞式燃气轮机不积极。一定要下决心在这次运动中振作起来，要和大家一样有朝气，有干劲!","type":"paragraph"},{"text":"我的保守思想","type":"subtitle"},{"text":"最近在讨论和天津动力机厂合作设计试造自由活塞式燃气轮机的时候，处处暴露我的保守思想。估计时间和可能时，总是拿以前在美国时的经验来比划，完全没有考虑到中国群众的为社会主义建设的热情与干劲!","type":"paragraph"},{"text":" 吴仲华　3．20","type":"paragraph"},{"text":" 来源：《清华大学双反运动大字报选辑(第二辑)》，中共清华大学委员会办公室，1958年。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c73260573"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
