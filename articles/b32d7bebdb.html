script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关心群众生活　搞好夏令卫生市革委会教卫组和市卫生局革委会联合举行会议　要求革命医务卫生人员贯彻毛主席的无产阶级革命路线，迅速投入搞好夏令卫生工作的战斗；要求各级革委会认真发动群众，加强思想和组织领导，打一场夏令发生工作的人民战争","authors":[],"dates":[{"year":1968,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　夏季是疾病传染的季节，为了保障人民群众的身体健康，保护社会生产力，夺取无产阶级文化大革命的全面胜利，市革委会教卫组和市卫生局革委会昨日联合召开“高举毛泽东思想伟大红旗，大力搞好夏季卫生工作”会议，进一步发动群众，开展夏季爱国卫生，运动，防止夏秋季疾病的传染。"},{"type":"paragraph","text":"目前，工农业生产出现一片大好形势，广大工农群众为了夺取革命、生产的全面胜利，他们不怕苦，不怕累，全力以赴，响应毛主席的伟大号召，狠抓革命，猛促生产。在这夺取无产阶级文化大革命全面胜利的关键时刻，医疗卫生工作必须紧紧跟上。会议认为能否搞好卫生工作，这是涉及到关心人民健康，保护社会生产力的问题，必须提高到两条路线斗争的高度来认识，是不是全心全意关心人民健康，保护社会生产力，是忠不忠于毛主席的革命路线的大问题。会议要求广大医务卫生人员高举毛泽东思想伟大红旗，突出无产阶级政治，以高度的政治责任感和全心全意为人民服务的精神投入大搞夏季卫生工作的战斗；要求各级医疗卫生机构，把革命的大批判和本单位的斗、批、改结合起来，遵照毛主席的“一切从人民的利益出发”的教导，改革不合理的规章制度，建立有利于人民群众防治疾病的工作方法和制度；以实际行动批判修正主义卫生工作路线，砸烂城市老爷医院的一套，充分调动医务人员的积极性。会议要求各级医务人员包括工厂、企业保健站医务人员深入车间、基层，更好地为劳动人民服务，搞好夏秋季疾病的防治工作。"},{"type":"paragraph","text":"会议认为搞好夏季卫生工作，必须打一场人民战争，要求各区、县、局革委会和各条战线无产阶级革命派迅速行动起来，在前一时期爱国卫生运动取得一定成绩的基础上，加强思想领导和组织领导，充分发动群众，搞好本单位、本地区的群众卫生工作，发动群众组织力量扑打蚊蝇和消灭蚊蝇孳生地。各工厂、企业、学校、机关、商店、街道革委会应大力宣传毛主席关于卫生工作的指示，把防治夏季传染病的知识交给群众，使群众广泛行动起来同疾病作斗争。目前小学、初中学生已经放暑假，把这支学生队伍组织起来投入夏秋季卫生工作，是一支很好的力量。"},{"type":"paragraph","text":"会议要求商业部门搞好夏季食品饮食卫生工作。今年瓜果大丰收，目前正大量上市，希望在运输、保管、销售各个环节做好清洁卫生工作。饮食行业要进一步健全卫生消毒制度，注意卫生操作，防止食物中毒。"},{"type":"paragraph","text":"会议要求房管、园林、城建、环境卫生等有关部门发动本系统广大革命职工切实做好环境卫生和除害工作，消灭死角，严格控制蚊蝇孳生地。医药部门要抓好夏令药物供应工作，组织货源，搞好协作。"},{"type":"paragraph","text":"长宁区中心医院、虹口区防疫站和市立儿童医院在会上介绍了抓革命促生产，搞好夏令疾病防治工作的经验。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b32d7bebdb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
