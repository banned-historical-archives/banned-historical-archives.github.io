es":[{"year":1955,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京大学文科各系结合批判胡适资产阶级唯心论思想确定各种专题研究题日。"},{"type":"paragraph","text":"哲学系各教研室已拟订九个专题，从胡适的政治思想、哲学思想、思想方法和胡适在中国哲学史的研究等方面进行系统的批判。为了彻底肃清胡适反动哲学思想影响，各教研室并准备就实验主义和杜威的心理学作专题研究和批判。"},{"type":"paragraph","text":"中国语言文学系中国文学史教研室的教师，已组成三个小组，专门批判胡适的“白话文学史”、“五十年来中国之文学”和研究“红楼梦”的人民性和艺术性。汉语教研室和语言教研室准备每月举行一次讨论会，要求逐步肃清胡适在语言学方面的流毒。历史系教师也正拟定专题，就胡适的反动历史观进行批判，并对考据学在学术研究中的作用进行研究。【新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad502ff5b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
