方针","authors":["《人民日报》"],"dates":[{"year":1956,"month":7,"day":24}],"is_range_date":false,"parts":[{"text":"文艺工作者连续举行座谈会　讨论贯彻执行“百家争鸣”方针","type":"title"},{"text":"《人民日报》","type":"authors"},{"text":"本报讯北京市文艺工作者最近举行了好多次座谈会，讨论怎样在创作和理论工作中贯彻“百花齐放、百家争鸣”的方针。","type":"paragraph"},{"text":"画家、雕刻家和工艺美术家们在座谈会上批评了美术界领导方面轻视民族遗产，特别是轻视国画的错误思想。老画家于非暗说：要继承和发扬民族遗产，先得做好理论宣传工作，要让我们的画家和人民群众懂得，究竟什么是我国民族绘画艺术的伟大传统。新老画家们对于第二届全国国画展览会上表现出来的国画家们的新的进步、新的成就表示欣喜。","type":"paragraph"},{"text":"戏剧界的座谈会主要也讨论了继承和发扬民族遗产问题。老戏剧家白云生认为，目前在戏剧界，言必称史坦尼斯拉夫斯基，而演员、导演对于我国古典戏剧的遗产却盲无所知，一味轻视，这是一种不正常的现象。他主张歌剧和话剧演员应当认真向中国古典戏剧的表演方法学习，特别是脸上和眼神的戏；在这个基础上，再从外国戏剧的成就中吸取养料。","type":"paragraph"},{"text":"音乐家和诗人们在座谈会上就题材、创作方法、怎样深入生活繁荣创作等问题，广泛交换了意见。作家、诗人、理论工作者和青年文艺工作者，对于“北京文艺”等刊物的编辑工作，提出了许多批评。他们要求文艺刊物本着“百花齐放、百家争鸣”的方针，讨论和改进编辑工作。","type":"paragraph"},{"text":"许多会议参加者认为，座谈会也是“争鸣”的好场所。北京市文学艺术工作者联合会准备在最近期间继续组织一些小型的座谈会，就怎样贯彻“百花齐放、百家争鸣”的方针进一步深入地展开讨论。","type":"paragraph"},{"text":" ---- 原载《人民日报》1956年7月24日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad01134381"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
