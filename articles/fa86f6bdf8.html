script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"警惕资产阶级思想侵蚀","authors":[],"dates":[{"year":1967,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"国庆假日期间，我们应×××局革委会同志的要求，替他们开车到杭州。途中，从上海去杭州的车辆络绎不绝，前后衔接，仅我们看到的就不下一百多辆，其中大部分是生产用的大卡车，还有许多小轿车、摩托车等。这些人到了杭州，就到处拉关系借汽油，找宿处。我们亲眼看到有人以某市级革命群众组织头头的名义，写条子向当地交通部门借汽油，给当地的供应部门增添了不少麻烦，影响很不好。路上，我们还看到有些车辆由于超速行驶，发生车祸多起，也有多辆车子中途“抛锚”。看到这些情况，使人很痛心。这不仅是一个经济上的浪费问题，而且是一个无产阶级革命派如何掌好权、用好权、永不变色的政治问题，是接无产阶级思想的班，还是接资产阶级思想的班的重大原则问题。"},{"type":"paragraph","text":"我们无产阶级革命派掌权以后，一定要厉行勤俭节约的原则，坚决抵制铺张浪费的不良作风，把节约的每一分钱用到社会主义建设最需要的地方去。我们千万不能放松世界观的改造，要时刻警惕资产阶级思想的侵蚀。我们希望引起全市无产阶级革命派的重视，共同来防止这种不良倾向。"},{"type":"paragraph","text":"公交公司四个革命群众"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa86f6bdf8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
