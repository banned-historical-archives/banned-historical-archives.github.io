script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"藁城韩家洼纠正左倾偏向后　水车昼夜不停转地主富农也干活","authors":[],"dates":[{"year":1948,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"藁城韩家洼纠正左倾偏向后"},{"type":"paragraph","text":"水车昼夜不停转地主富农也干活"},{"type":"paragraph","text":"【冀中电】藁城十区韩家洼纠偏后，各阶层生产情绪大大提高。该村共二百三十户，一千四百四十三口人，地廿九顷多，土地基本上已经填平了。土改开始时，贫农团队伍不纯，曾发动群众斗争了三十八家中农，借出粮食二万多斤。区上发觉后，虽然制止了，但是借的粮食并未立时退回，又加上五户富裕中农被错订成富农查封了家产，因此中农很恐慌，生产没有劲。中农刘洛景因怕斗争，把水车斗子偷着埋了起来。春天种地时，中农们不敢施肥。县区干部到该村连续开了几次会，说明了党的土改与生产政策，但农民仍不动，直至说服群众给五户错订的富裕中农揭了封。退回了借粮。中农们才安了心。农民特别是中农是看你“做”的政策如何，你只“宣传”政策而不实际做是不能打动他的心的，这以后，富裕中农刘文增过去不敢安心做活，麦收后，他每亩谷子拦上了五块花生仁饼。贫农军属张洛玉四亩谷子就拦了一百零五斤豆饼。中农刘洛藏和刘法科是地邻，一样的地质。法科下的本大，收七大斗麦。洛藏下的本小，只收四大斗。今年麦征实行了按麦田亩数及常年应产量的负担办法，他俩家出的一样。洛藏后悔的对法科说：“一样的地，你打的多，我打的少，可是咱俩一样的拿差，我可后悔了。”他为了多打粮食，赶着织出几块布折卖了，在三亩谷地里，施上了二斗黑豆，五块豆饼。该村副业也很发达，八十六张织布机，大部是男织女纺。经营磨面和作挂面的有廿多家。他们的副业和农业都是结合着作，作到两不耽误。前些天天旱，这村的水车昼夜不停。牲口一套人一套，闲牲口不闲水车。中农刘洛景因怕斗埋起来的水车斗子也刨出来，还和军属陈洛昭商量好伙制一辆水车。麦收后，该村打了一眼新井，添了四辆水车。在大家积极生产的影响下，懒汉刘碗子、刘计功也生产起来了。村里两户富农，一户地主，也干起活来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a08ce7214a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
