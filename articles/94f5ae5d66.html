,"authors":[],"dates":[{"year":1959,"month":9,"day":19}],"is_range_date":false,"parts":[{"text":"北京在押犯和右派分子对特赦和右派摘帽子问题的反应","type":"title"},{"text":"新华社北京讯:  16日报纸公布对确已改恶从善的各种罪犯实行特赦和对确实表现改好了的右派分子摘掉右派帽子的消息后，在北京在押犯人中和在劳动教养的右派分子中，引起了十分强烈的反应，他们一致认为这是个“好消息”，“大喜事”，奔走相告，互相“报喜”。还有的犯人在车间扬着报纸喊：“毛主席说要特赦了，加油干吧!有盼头了。”有的看了报纸兴奋的蹦了起来，高呼“毛主席万岁”，“共产党万岁”，周围的犯人都热烈鼓掌。有的认为“毛主席开了大恩”感激政府对他们的宽大，给了他重新做人的机会。有的激动的掉了眼泪。还有的右派后悔自己过去没有好好改造自己。","type":"paragraph"},{"text":"很多犯人和右派分子对特赦和摘右派帽子的范围作种种推测，议论纷纷。有的犯人认为“特赦比大赦范围要宽，得放出不少人。”更多的人不同意这种看法，如刑事犯夏长河说：“特赦和大赦不一样，大赦是人人有份，特赦是个别好的，不过只要有赦对我们就有好处。”","type":"paragraph"},{"text":"有的人迫不及待地衡量自己够不够特赦的条件。判十三年徒刑的反革命犯范洪昌说：“我真高兴，我已经押了十年了，有希望，赦不了也得减几年”。判无期徒刑的反革命犯司允明说：“我没有希望，我一直到现在还没有认罪，怎能轮到我呢?”判十年徒刑的反革命犯杨文新说：“我已经改造五年了，有可能赦，但前年受过批判也可能不赦”。还有的表现不好的反革命犯，自知没有希望，很后悔。反革命犯郭玉林说：“我痛恨自己反动思想没有根除，一直没有转变，如果过去不这样，这次特赦不就赦到我了吗?”","type":"paragraph"},{"text":"有极少数反革命分子对实行特赦进行歪曲污蔑。如被管制的反革命分子朱绍扬对民警说：“你看到特赦的消息了吧！这个问题我早就给毛主席、董必武写过信，说那些人应赦，那些人不应赦，如果不赦共产党内部就团结不了，因为党内也有右派，各民主党派里有右派十万人，如果不赦，和他们的团结问题就解决不了。”","type":"paragraph"},{"text":" 来源： 新华社《内部参考》1959年9月19日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94f5ae5d66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
