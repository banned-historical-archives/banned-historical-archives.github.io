<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发动群众总结办毛泽东思想学习班经验  天津市革命委员会要求进一步办好学习班落实毛主席最新指示","authors":[],"dates":[{"year":1968,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"发动群众总结办毛泽东思想学习班经验"},{"type":"paragraph","text":"天津市革命委员会要求进一步办好学习班落实毛主席最新指示"},{"type":"paragraph","text":"据新华社天津二十二日电　天津市革命委员会在全市各系统、各部门、各条战线广泛地发动群众，总结办好毛泽东思想学习班的经验，把办好毛泽东思想学习班作为全面落实毛主席最新指示的最重要的措施。现在，全市出现了进一步大办、办好毛泽东思想学习班，条条落实、全面落实毛主席最新指示的热潮。"},{"type":"paragraph","text":"元旦过后，天津市各条战线上的无产阶级革命派和革命群众就根据天津市革命委员会的要求，展开了群众性的总结办好毛泽东思想学习班经验的活动。他们从无数活生生的事实中深刻地认识到，要办好毛泽东思想学习班，条条落实、全面落实毛主席的最新指示，必须彻底打倒资产阶级、小资产阶级派性。他们说，被派性这条毒蛇缠住了身，对毛主席的最新指示就会只强调在别的组织和别人身上落实，而不强调在自己的组织和自己身上落实；就会只停留在口头上，而不落实在自己的思想上和行动上。广大革命群众通过总结，提高了认识，提高了觉悟。他们说，一定要建立理论联系实际的革命学风，对毛主席的最新指示学了就用，坚决打倒资产阶级、小资产阶级派性，破私立公，无条件地、不折不扣地把毛主席的最新指示落实在自己的思想上和行动上。他们说，这样做，就是对毛主席、对毛泽东思想、对毛主席的无产阶级革命路线最大的忠。"},{"type":"paragraph","text":"通过群众性的大总结，全市出现了进一步大办、办好毛泽东思想学习班的热潮。全市各条战线新办起的毛泽东思想学习班就有三千多个，使全市的学习班达到一万六千多个，参加学习的革命群众、革命干部由去年年底的近七十万人增加到八十多万人。广大革命群众在学习班里对毛主席的最新指示学了就用，说了就做，扎扎实实，一步一个脚印，有力地巩固了革命大联合，促进了革命三结合。天津塘沽盐场的几千名盐工，过去分成了两大派。由于派性作怪，虽然联合了，但是不巩固。他们在驻场的人民解放军海军某部毛泽东思想宣传队的帮助下，大办毛泽东思想学习班，首先端正对毛主席最新指示的态度，反复学习和领会毛主席最新指示的伟大意义。盐工们对毛主席“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织”的教导，反复地进行学习和讨论。通过在毛泽东思想学习班的学习，两派组织从思想上巩固了革命的大联合。"},{"type":"paragraph","text":"很多革命群众组织的战士，在学习班里学习了伟大领袖毛主席“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好”的教导，积极热情地帮助犯有错误的革命干部认识错误，改正错误，促使他们站出来革命，大大地促进了革命的三结合。"},{"type":"paragraph","text":"为了更加有力地推动大办、办好毛泽东思想学习班的工作，战斗在天津“三支”“两军”第一线的人民解放军广大指战员，十七日举行了“学习先进经验，掀起大办毛泽东思想学习班新高潮誓师动员大会”。天津市革命委员会常委、驻津部队负责人杨银声在会上指出，大办还是不大办毛泽东思想学习班，是关系到毛主席的最新指示能不能条条落实、全面落实的大问题，各级领导和每一个解放军毛泽东思想宣传队，都要把帮助群众大办毛泽东思想学习班，当作首要任务。各级领导的第一把手要亲自抓，并建立专门的班子，加强领导。要用最大的决心，最大的毅力，最快的速度，把全市的工厂、农村、商店、机关、学校、街道，都办成红彤彤的毛泽东思想大学校。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2fec400c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
