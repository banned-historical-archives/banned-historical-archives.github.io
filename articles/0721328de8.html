script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"农村支部党员上书毛主席  纪念“七一”保证加紧生产和学习","authors":[],"dates":[{"year":1950,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"农村支部党员上书毛主席"},{"type":"paragraph","text":"纪念“七一”保证加紧生产和学习"},{"type":"paragraph","text":"河北完县坛山村支部写信报告毛主席：支部曾开展了比生产，比工作，比学习的三比运动。在生产方面，全村种棉五百八十二亩，超过任务近一倍，并保证地里没有一颗草。党员干部随时随地进行宣传工作，宣传党二十九年来的奋斗历史及党的各种政策。党员定期上党课和文化课，支部号召每个党员每天学会一个字，争取二、三年内消灭文盲。"},{"type":"paragraph","text":"（云飞）"},{"type":"paragraph","text":"河北新河县贾家村支部，写信向毛主席祝颂健康，报告完成生产、救灾、建政、建团等项工作任务的情形。并向毛主席保证：提高党员政治认识，密切联系群众，使生产提高一步。"},{"type":"paragraph","text":"（贾家村支部）"},{"type":"paragraph","text":"河北密云挂甲峪支部给毛主席写信祝贺，并报告半年来全体党员干部团结群众打柴、刨药材等副业生产共收入四万五千余斤粮，维持了全村人民的生活，战胜了灾荒，受到了群众的热烈拥护。该村老百姓常说：“共产党、毛主席领导的正确，不然早把人给饿死啦！”"},{"type":"paragraph","text":"（曹宗安）"},{"type":"paragraph","text":"河北满城县宋贾村支部以总结半年劳动互助经验，提高工作来迎接“七一”党的生日。在总结里指出，全村互助组由八十四户增到二百二十三户，达到全村百分之九十五以上。只在拔麦中便省了一百九十五个半工，省下的工都用到积肥和副业生产上去。村中生产已恢复了战前水平。群众都已经有吃有穿。"},{"type":"paragraph","text":"（满城县委会）"},{"type":"paragraph","text":"河北泺县为迎接“七一”，在农村支部党员中评选学习模范。被评选为模范的支部，党员百分之九十以上都按期上党课，百分之六十以上参加文化学习。党员学习模范评选出二十六名，他们不但自己学习积极而且经常帮助别人学习。"},{"type":"paragraph","text":"（陆达、李凤楼）"},{"type":"paragraph","text":"山西平顺西沟村支部订出了工作计划，作为“七一”党的生日的献礼。在计划中订出支部、党员要保证锄苗、夏收、夏种计划的完成，并宣传使用新式农具。其次是搞好文化学习，要做到会认、会写、会讲、会用。在定学习计划中李顺达说：“我一定要决心消灭我这个文盲。”"},{"type":"paragraph","text":"（李林、李藏珠）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0721328de8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
