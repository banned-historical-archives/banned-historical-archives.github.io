thors":["孙明津","特约通讯员"],"dates":[{"year":1957,"month":2,"day":18}],"is_range_date":false,"parts":[{"text":"浙江农村不断发生请愿、骚乱事件","type":"title"},{"text":"特约通讯员孙明津","type":"authors"},{"text":"新华社杭州18日讯　从1956年秋收以来，浙江省农村里群众请愿、骚乱事件不断发生。仅据金华、温州两专区二十一个县不完全的统计，自去年秋收以来，即发生群众请愿骚乱事件一百七十二起，被打干部三百零四人。这些事件的性质基本上可分两类，一类是反革命分子或阶级敌对分子利用群众对政府不满的机会，从中兴风作浪；另一类是人民内部集体利益和个人利益、暂时利益与长远利益之间的矛盾问题。第二类问题有的是因对粮食分配方案不满而引起的；有的是由于农业社没有贯彻勤俭办社的方针，以及社内政策处理不好而引起的。而这些事件大部分又是同干部的强迫命令作风分不开的。","type":"paragraph"},{"text":"1957年2月18日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15665396b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
