itle":"劳动人事部关于建国前参加革命工作的在职干部病假待遇的答复","dates":[{"year":1983,"month":4,"day":14}],"is_range_date":false,"authors":["劳动人事部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 510","tags":[{"name":"待遇","type":"主题/事件"},{"name":"干部","type":"主题/事件"},{"name":"休养","type":"主题/事件"}],"parts":[{"type":"title","text":"劳动人事部关于建国前参加革命工作的在职干部病假待遇的答复"},{"type":"paragraph","text":"劳人险局〔1983〕15号"},{"type":"paragraph","text":"你局晋人老字〔1983〕24号文收到。关于建国前参加革命工作的在职干部病假待遇问题，经与有关部门研究答复如下："},{"type":"paragraph","text":"符合国发〔1982〕62号文规定的建国前参加中国共产党所领导的革命战争、脱产享受供给制待遇的和从事地下革命工作的干部，以及符合劳人老〔1982〕10号文规定的在东北和个别老解放区，一九四八年底以前享受当地人民政府制定的薪金制的干部，虽然尚未到达离职休养年龄，其病假期间工资可以照发。过去减发的工资不再补发。"},{"type":"paragraph","text":"一九八三年四月十四日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c10eb9fde"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
