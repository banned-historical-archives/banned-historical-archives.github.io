ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给邓宝珊的信","alias":"","parts":[{"type":"paragraph","text":"给邓宝珊的信"},{"type":"paragraph","text":"（1938年12月5日）宝珊仁兄左右："},{"type":"paragraph","text":"近日敌侵西北之消息又有传闻，谅尊处早已得悉。不论迟早，敌攻西北之计划是要来的，因之准备不可或疏。高明如兄，谅有同情。特嘱陈奇涵同志趋谒魔下报告防务，并将党六中全会之报告、决议、宣言等件带呈左右，借供参考。倘有指示，概祈告之奇涵。专此。敬颂戎绥"},{"type":"paragraph","text":"弟毛泽东上"},{"type":"paragraph","text":"十二月五日"},{"type":"paragraph","text":"[1]邓宝珊（1896一1968)，甘肃天水人。抗日战争时期曾任国民党军第二十一军团军团长兼新一军军长、晋陕绥边区总司令。1949年年初起义。建国后，曾任甘肃省人民政府主席。"},{"type":"paragraph","text":"[2]陈奇涵（1897—1981)，江西兴国人。当时任八路军留守兵团绥德警备区司令员。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":75,"page_end":75},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5172f4e80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
