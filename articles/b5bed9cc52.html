rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"接见四好连队代表、学习毛主席著作积极分子等","authors":["牛嵩林"],"parts":[{"type":"paragraph","text":"新华社三十一日讯 中华人民共和国副主席董必武，中共中央总书记邓小平，以及党和国家其他领导人彭真、李先念、谭震林、康生、薄一波、罗瑞卿、杨尚昆、谢富治，最高人民法院院长杨秀峰，今晚接见了参加首都军民庆祝中国人民解放军建军三十八周年联欢晚会的四好连队代表、学习毛主席著作积极分子、五好战士、神枪手、神炮手、技术能手、革命军人家属和烈士家属，以及北京市的民兵代表，同他们亲切握手，一起合影。"},{"type":"paragraph","text":"同时被接见的，还有前中国人民志愿军的战斗英雄和有功人员。"},{"type":"paragraph","text":"接见时在场的，有李天佑、王新亭、刘志坚、徐立清、梁必业、李聚奎、陈士榘、萧向荣、杜义德、王秉璋、吴克华、黄文明、张文舟、王集成、张乃更、张正光、查国桢等中国人民解放军各总部、各军种兵种和北京部队以及人民公安部队的负责人。"},{"type":"paragraph","text":"下图 接见时合影。    本报记者 牛嵩林摄RW：董必武；国家副主席；社会活动；邓小平；总书记；社会活动；附图片"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5bed9cc52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
