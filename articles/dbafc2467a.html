":1992,"month":5,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英学术讨论会在穗举行"},{"type":"paragraph","text":"新华社广州5月30日电　在叶剑英元帅诞辰95周年之际，由中国军事科学学会和广东省中共党史学会共同主办的“叶剑英学术讨论会”于5月28日至30日在广州举行。"},{"type":"paragraph","text":"聂荣臻元帅生前为这个学术讨论会题词赋诗。王震、薄一波、耿飚、刘复之向会议发来了贺词贺信。伍修权等出席了讨论会。"},{"type":"paragraph","text":"100多名来自军内外的党史、军事理论研究工作者和学者以及叶帅生前友好等参加了讨论会，对叶帅生前在政治、经济、军事、外交、统战等领域的理论贡献与光辉业绩进行了研究。会上发表论文70多篇。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbafc2467a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
