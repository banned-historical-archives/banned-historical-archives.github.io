ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"在击落美军无人驾驶飞机的报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在击落美军无人驾驶飞机的"},{"type":"paragraph","text":"报告上的批语"},{"type":"paragraph","text":"（1964年11月22日）亚楼同志："},{"type":"paragraph","text":"此件已阅，很好。闻你患病，十分挂念。一定要认真休养，听医生的话，不可疏忽。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月廿二日"},{"type":"paragraph","text":"[1]这个批语写在中国人民解放军空军司令员刘亚楼1964年11月22日为报送关于击落美军无人驾驶飞机的报告给中共中央办公厅警卫局局长汪东兴的信上。信中说，特呈上报告一份，请口头转报主席，或者呈主席一阅。如有指示，请告知我们。"},{"type":"paragraph","text":"[2]指中国人民解放军空军司令员刘亚楼、政治委员吴法宪、副司令员吴富善、副司令员兼参谋长张廷发1964年11月20日关于击落美军无人驾驶飞机给毛泽东的报告。报告简要介绍了我空军1964年11月15日在广东遂溪地区击落美国军用无人驾驶高空侦察机的经过，并对这次高空平流层作战作了初步总结。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":11,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":260,"page_end":260},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dd1d28fd3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
