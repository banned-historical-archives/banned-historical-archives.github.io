ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"给杨开智的信","alias":"","parts":[{"type":"paragraph","text":"给杨开智的信"},{"type":"paragraph","text":"（1949年8月10日）杨开智先生："},{"type":"paragraph","text":"来函已悉。老夫人健在，甚慰，敬致祝贺。岸英岸青均在北平。岸青尚在学习。岸英或可回湘工作，他很想看外祖母。展儿于八年前在华北抗日战争中光荣地为国牺牲，她是数百万牺牲者之一，你们不必悲痛。我身体甚好，告老夫人勿念。兄从事农场生产事业甚好，家中衣食能过得去否，有便望告。此复。"},{"type":"paragraph","text":"敬颂大安。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十日[1]杨开智，湖南长沙人，毛泽东夫人杨开慧之兄。[2]岸英，即毛岸英，毛泽东的长子。岸青，即毛岸青，毛泽东的次子。[3]展儿，即杨展，杨开智之女。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":125,"page_end":125},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d1f8077ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
