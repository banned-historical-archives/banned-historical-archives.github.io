art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想的卫士——赞刘英俊","authors":["张民清"],"parts":[{"type":"paragraph","text":"多少歌，把你歌唱，"},{"type":"paragraph","text":"多少诗，把你颂扬。"},{"type":"paragraph","text":"你，英雄的刘英俊，"},{"type":"paragraph","text":"象雷锋，象王杰，"},{"type":"paragraph","text":"铭刻在亿万人的心上。"},{"type":"paragraph","text":"问那重重山，"},{"type":"paragraph","text":"问那层层浪，"},{"type":"paragraph","text":"在马倒车翻的时候，"},{"type":"paragraph","text":"为什么，为什么，"},{"type":"paragraph","text":"你有那样大的力量？"},{"type":"paragraph","text":"是真理铸成你的行动，"},{"type":"paragraph","text":"是毛泽东思想哺育你成长。"},{"type":"paragraph","text":"每时每刻，"},{"type":"paragraph","text":"你把毛主席的话牢记心上。"},{"type":"paragraph","text":"积极宣传，活学活用，"},{"type":"paragraph","text":"从黑板报到书信，"},{"type":"paragraph","text":"都是你用来传播的工具；"},{"type":"paragraph","text":"从红领巾到白发老人，"},{"type":"paragraph","text":"都是你传播的对象。"},{"type":"paragraph","text":"既是惊雷，就会震响，"},{"type":"paragraph","text":"既是疾电，就会闪光，"},{"type":"paragraph","text":"谁要是向党进攻，"},{"type":"paragraph","text":"你勇敢战斗，把敌人彻底埋葬！"},{"type":"paragraph","text":"啊！英雄的刘英俊，"},{"type":"paragraph","text":"你是我们的榜样，"},{"type":"paragraph","text":"你使红旗增添了鲜艳，"},{"type":"paragraph","text":"你使牛鬼蛇神更加仓皇。"},{"type":"paragraph","text":"让我们跟上英雄的步伐，"},{"type":"paragraph","text":"终生捍卫毛泽东思想；"},{"type":"paragraph","text":"让真理的阳光普照天下，"},{"type":"paragraph","text":"推动历史巨轮驶向前方！"},{"type":"paragraph","text":"听，五洲春雷震荡，"},{"type":"paragraph","text":"看，四海红旗飘扬，"},{"type":"paragraph","text":"举世在欢呼："},{"type":"paragraph","text":"万岁，万岁，光辉灿烂的毛泽东思想！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95a7d376ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
