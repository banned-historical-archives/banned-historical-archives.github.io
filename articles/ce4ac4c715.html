,"dates":[{"year":1967,"month":6,"day":23}],"is_range_date":false,"parts":[{"text":"福建省军事管制委员会代电","type":"title"},{"text":"厦门市军管会并本省驻军各部队：","type":"appellation"},{"text":"中央文革小组1967年6月22日电：“厦门部队党委6月16日电悉。我们同意你们的3条意见，用福建省军管会的名义重申即可。”遵此，现将厦门驻军请示3个问题重申如下：","type":"paragraph"},{"text":"一、厦门大学所有师生应立即回校闹革命，厦门市中、小学立即复课闹革命，搞好本单位的斗、批、改，停止下厂下乡串联。","type":"paragraph"},{"text":"二、厦门市所有跨行跨业的群众组织，应迅速归口，实行革命的大联合，转入本单位的斗、批、改。","type":"paragraph"},{"text":"三、严禁到部队串联。以上仰各遵行。","type":"paragraph"},{"text":" 福建省军事管制委员会1967年6月23日","type":"paragraph"}],"comments":[],"origin":"福建省厦门革命到底联合总司令部八·二九厦门大学红卫兵独立团《挺进》编委会编《中央（首长）对厦门文化大革命问题的指示汇编》1969年4月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce4ac4c715"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
