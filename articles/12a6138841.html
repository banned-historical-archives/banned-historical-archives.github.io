tes":[{"year":1959,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京31日电】　我国国防部部长彭德怀元帅接到了苏联国防部部长马利诺夫期基元帅祝贺中国人民解放军建军32周年的电报。电文说:"},{"type":"paragraph","text":"“我谨代表苏联武装力量全体军人，并以我个人名义，向您，并通过您，向兄弟的中国人民解放军全体人员祝贺光荣的建军32周年纪念日。"},{"type":"paragraph","text":"“苏联武装部队全体人员衷心地祝中国人民解放军全体军人在军事训练、政治教育及加强中华人民共和国国防威力中获得进一步成就。"},{"type":"paragraph","text":"“祝苏中两国伟大人民之间牢不可破的友谊，祝我们两国军队和社会主义各国军队之间的战斗合作进一步巩固和发展。社会主义各国是和平及我们各国人民的安全的可靠保证，是在完成社会主义建设的巨大任务中获得进一步成就的可靠保证。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12a6138841"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
