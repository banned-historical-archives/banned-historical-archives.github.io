,"dates":[{"year":1950,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十八日电】　苏联政府部长会议主席斯大林大元帅致电我中央人民政府毛泽东主席，对毛主席在十月社会主义革命三十三周年所表示的祝贺表示感谢。电文如下:中华人民共和国中央人民政府主席毛泽东先生:"},{"type":"paragraph","text":"主席先生，请接受我对您在伟大的十月社会主义革命三十三周年之际所表示的友谊的祝贺和亲切的愿望的衷心的感谢。"},{"type":"paragraph","text":"约·斯大林"},{"type":"paragraph","text":"十一月十七日"},{"type":"paragraph","text":"【新华社北京十八日电】　中苏友好协会总会十八日接到苏联对外文化协会主席A·吉尼索夫教授关于庆祝十月革命节的覆电。电文如下:北京中苏友好协会刘少奇会长:"},{"type":"paragraph","text":"苏联对外文化协会理事会衷心感谢你庆祝伟大十月社会主义革命三十三周年。并祝中苏友好协会在巩固中苏二国人民友好和争取世界和平民主的事业上获得更进一步的成功。"},{"type":"paragraph","text":"苏联对外文化协会主席A·吉尼索夫教授"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90d5e63b78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
