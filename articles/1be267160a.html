","authors":[],"dates":[{"year":1952,"month":1,"day":28}],"is_range_date":false,"parts":[{"text":"西北区银行斗争印刷业奸商失败的经验","type":"title"},{"text":"【西北总分社一月二十八日讯】中国人民银行西北区行对印刷业奸商李海亭的斗争，因为缺乏步骤和策略，准备不足，对工商联信任过高，对奸商的狡滑警惕不够，使奸商钻空子，形成被动。斗争大会上，劳方被奸商利用，奸商李海亭在会上全部推翻以前所承认的罪行，奸商们乘机向区行狡辩，会上形成双方对质、对立的状态。工商联节约检查委员会主任委员潘源泉站在奸商方面讲话，破坏分子乘机高喊：“打倒区行”、“逮捕与惩办贪污分子”。大会相持了八小时不能结束，最后由市委会统战部部长崔一民出面调解：李海亭由同业具保，会后看李海亭在清算账目中的表现和觉悟程度，再决定对李的处分问题。","type":"paragraph"}],"comments":[],"origin":"1952年2月5日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1be267160a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
