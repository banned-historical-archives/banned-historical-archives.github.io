script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要求获得最低工资　抗议资本家的剥削  纽约二万五千名旅馆服务员罢工","authors":[],"dates":[{"year":1972,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"要求获得最低工资　抗议资本家的剥削"},{"type":"paragraph","text":"纽约二万五千名旅馆服务员罢工"},{"type":"paragraph","text":"新华社讯　纽约消息：美国纽约市的二万五千名旅馆服务员六月一日罢工四小时，要求资本家保证他们每周能获得一定数量的最低工资，并且要求保证他们获得一定数量的退休金。"},{"type":"paragraph","text":"随着通货膨胀的恶性发展，物价不断上涨，美国劳动人民的实际工资日趋下降。旅馆服务员由于没有固定收入，生活更加没有保障。"},{"type":"paragraph","text":"早在今年三月，旅馆服务员就要求资方保证他们每周获得一定数量的最低工资，并且保证他们工作二十五年后每月获得一定数量的退休金。但是，旅馆老板顽固地拒绝了这一合理要求。服务员们忍无可忍，终于决定罢工，抗议资本家的蛮横态度。罢工的旅馆服务员举着标语牌在各旅馆前面设置了纠察线，并且举行了游行。接着，他们到麦迪逊广场公园举行了集会，会上决定成立罢工委员会以便领导这场斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d8b2537be"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
