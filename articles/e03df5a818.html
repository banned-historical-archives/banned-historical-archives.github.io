ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"坚决打击入侵海南岛上空的美机","alias":"","parts":[{"type":"paragraph","text":"坚决打击人侵海南岛上空的美机"},{"type":"paragraph","text":"（1965年4月9日）"},{"type":"paragraph","text":"美机入侵海南岛，应该打，坚决打。海军驻青岛的那个师调去海南岛没有？海军应该调强的部队去，不够就由空军调强的部队去。美机昨大是试探，今天又是试探，真的来挑畔拉！既来，就应该坚决打。海军航空兵和空军应该统一指挥，海军和空军应该很好地配合起来打。"},{"type":"paragraph","text":"[1]1965年4月8日，美国军用飞机几次侵入中国海南岛上空。9日，人民解放军副总参谋长杨成武在给周恩来和中共中央的报告中建议，坚决打击美机入侵海南岛上空的挑活动，将海南岛地区的海军航空兵改由空军统一指挥。周恩来审阅修改这一报告后，杨成武即呈交毛泽东。这是毛泽东对该报告的答复。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":4,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":27,"page_end":27},"tags":[{"name":"周恩来","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e03df5a818"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
