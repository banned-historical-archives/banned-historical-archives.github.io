对此事及其后果负全部责任。","authors":[],"dates":[{"year":1951,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社广州五日电】　一九五一年三月十五日香港英政府宣判刧夺我在港渔船的美蒋匪徒为无罪。对此种无理措施，广东省人民政府叶剑英主席特发表声明如下:"},{"type":"paragraph","text":"我广东省人民政府所有之留港五艘渔船，其中渔时、渔连、渔扬三艘，于一九五零年六月二十二日突被以阿诺、宋亨豫为首的美蒋匪徒三十余人刧走。香港英政府事前既准其非法结关，而在美蒋匪徒刧夺时，在傍停泊之英水警轮又竟将报警船员以‘报假案’罪加以扣押，且更以机枪制止我船员之抵抗，护送匪徒刧船出海。此事发生后，被刧船员当即向港法院指控，而香港英政府诸多为难，并变相地将刧余之渔浦、渔琼两船加以冻结。香港英政府蓄意为美蒋匪徒洗刷罪名，并企图与他们互相勾结、进一步刧夺这五艘渔船的产权，竟于一九五一年三月十五日无理宣判刧夺三渔船之美蒋匪徒为无罪。早在一九五零年三月十八日我中央人民政府交通部章伯钧部长即已发表声明:“我中央人民政府的此种神圣的产权(按指我政府对在新加坡、香港以及各国港口的中国轮船的产权)，如在新加坡、香港和各国港口的各轮，有被侵略、损失、扣留、转移或干涉其行动情事，则各该政府必须负完全责任，并将引起相应的后果。”本人兹特郑重声明:香港英当局此种公然庇护美蒋匪徒刧夺我国家财产的行为，是非法的，无理的。香港英政府应对此事及其后果负全都责任。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54c74ac168"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
