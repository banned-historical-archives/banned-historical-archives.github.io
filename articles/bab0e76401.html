"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"布加勒斯特的“毛泽东”工厂是我国和罗马尼亚两国人民深厚友谊的象征。"},{"type":"paragraph","text":"这个工厂原名“乌尔干”工厂。一九五三年，毛主席六十寿辰的时候，工人们要求把他们的工厂更名为“毛泽东”工厂。"},{"type":"paragraph","text":"这家工厂的工人具有“镰刀和斧头精神”的革命传统。一九一八年，他们为反对国内反动派曾经流过血。一九三三年，参加了全国大罢工。当年西班牙的国际志愿军行列中，也有这个工厂的七名工人。而在解放祖国和反法西斯的战争中，这个工厂有不少工人献出了自己宝贵的生命。"},{"type":"paragraph","text":"这个工厂曾经连续为我国生产大型的锅炉和全套水泥设备，还先后派遣厂内优秀的锅炉、电焊专家到我国来帮助进行社会主义建设。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bab0e76401"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
