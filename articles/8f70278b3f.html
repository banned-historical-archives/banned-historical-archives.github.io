s":[],"dates":[{"year":1968,"month":5,"day":5}],"is_range_date":false,"parts":[{"text":"中央文革关于学习两报一刊社论的通知","type":"title"},{"text":"中央两报一刊重要社论《革命委员会好》，以及《人民日报》，《解放军报》，在庆祝湖南，安徽革命委员会成立时的社论“芙蓉国里尽朝晖”，“无产阶级革命派的胜利”，红旗杂志评论员文章“对派性要进行阶级分析”，“五一”社论“乘胜前进”，传达了毛主席的一系列的最新指示，总结了革命委员会的经验，指出了无产阶级文化大革命的方向。望各级革命委员会，各革命群众组织，人民解放军指战员以及一切的毛泽东思想学习班，认真组织学习和讨论，使无产阶级文化大革命运动，按照毛主席的无产阶级革命路线和最新指示，继续胜利前进。","type":"paragraph"},{"text":" 中央文化革命小组一九六八年五月五日","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[三]》，武汉：1969年3月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f70278b3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
