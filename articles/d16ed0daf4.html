席语录》奔赴农业前线","authors":["警宣东"],"dates":[{"year":1967,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　正当上海郊区广大革命农民坚决响应毛主席“抓革命，促生产”的伟大号召，打响春耕生产第一炮的时候，上海警备区驻上海郊区广大指战员，纷纷走出营地，带着红彤彤的《毛主席语录》，奔赴农业第一线，和革命农民并肩战斗，誓夺革命生产双丰收。"},{"type":"paragraph","text":"广大指战员在出发前，一遍又一遍地学习了毛主席著作。他们牢记毛主席关于“人民解放军又是一个工作队”的教导，在劳动的社队大张旗鼓地宣传毛泽东思想的活动。他们认为，千支持，万支持，帮助革命农民掌握毛泽东思想是最大的支持。连续六年获得四好连队光荣称号的某部防化连全连出动支援春耕，和社员们一起劳动，一起学习毛主席著作。在解放战争中攻打苏北李堡时获得“李堡连”荣誉称号的某部特务连，发扬了当年英勇顽强、勇猛突击的革命精神，和驻地革命农民并肩投入了施肥劳动。在劳动中，他们组织演唱组，给社员读《毛主席语录》，教唱毛主席语录歌；休息时，又在田头演出有关“抓革命，促生产”、“坚决支持左派广大群众”的文艺节目。"},{"type":"paragraph","text":"曾经荣获“叶挺连”称号的某部步兵六连，帮助生产队挑河泥积肥、兴修水利。指战员们牢记毛主席关于“人民解放军应该支持左派广大群众”的教导，个个干劲十足，人人赛如猛虎，一到生产队，就拉开架势猛干起来。战士们都把这次劳动看作一项光荣的政治任务。班长崔道银说:“这次劳动意义特别大，因为这是响应毛主席‘抓革命，促生产’的伟大号召，以实际行动支持革命左派。”广大革命农民，看到人民解放军全力支援他们，得到极大的鼓舞。大家说，党内一小撮走资本主义道路的当权派妄想破坏农业生产，破坏无产阶级文化大革命，这办不到!我们不仅能彻底粉碎资产阶级反动路线的新反扑，而且要稳夺今年农业生产的大丰收。　　(警宣东)"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\02\\672m030301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海警备区连续六年被评为四好连队的某部防化连，帮助驻地周围生产队施肥。\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d16ed0daf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
