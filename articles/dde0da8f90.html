{"year":1971,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"木模四班工人　陈杏云"},{"type":"paragraph","text":"刘少奇一类政治骗子竭力叫嚷什么无产阶级与资产阶级“要互相尊重，各得其所，这样，社会秩序就可以安定，大家就好努力地进行建设工作”，否则，就要有“大的麻烦”。这不是在公开鼓吹“阶级斗争熄灭论”，要我们同资产阶级“合二而一”吗?真是一派胡言乱语。"},{"type":"paragraph","text":"毛主席指出:“在拿枪的敌人被消灭以后，不拿枪的敌人依然存在，他们必然地要和我们作拼死的斗争，我们决不可以轻视这些敌人。”我们决不能放弃斗争，与他们搞调和，和他们和平共处。阶级斗争的客观规律告诉我们:阶级敌人是不甘心失败的，一有风吹草动，一旦时机成熟，他们就会伺机反扑，进行捣乱和破坏。正如伟大导师列宁所教导:“在无产阶级夺取政权以后，无产阶级同资产阶级的阶级斗争并没有终止，相反地，这种斗争会变得更广泛、更尖锐和更残酷。”我们厂里活生生的阶级斗争事实，充分说明了这一点。"},{"type":"paragraph","text":"无产阶级与资产阶级永远是两股道上跑的车，走的不是一条路。对资产阶级，我们不能“合”，只能“分”。与资产阶级“合”，就是对革命的背叛。在阶级社会中，不是无产阶级吃掉资产阶级，就是资产阶级吃掉无产阶级。这场你死我活的阶级斗争是不能调和的，我们要狠抓阶级斗争，不断巩固和加强无产阶级专政。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dde0da8f90"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
