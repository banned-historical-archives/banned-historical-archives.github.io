art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席健康是我们最大的幸福","authors":["青年干事许超文"],"parts":[{"type":"paragraph","text":"在天安门前举行的庆祝无产阶级文化大革命群众大会上，我看到了我们最敬爱的伟大领袖毛主席。他的身体非常健康。千幸福，万幸福，毛主席身体健康是我们最大的幸福。毛主席是全世界革命人民心中的红太阳。毛泽东思想是当代改造人们灵魂的马克思列宁主义，是无产阶级最强大的思想武器。我们干革命一刻也离不开毛主席，一刻也离不开毛泽东思想。"},{"type":"paragraph","text":"大海航行靠舵手，我国革命的伟大舵手就是我们最敬爱的领袖毛主席。有了毛主席，就搬掉了三座大山，就能彻底斗倒帝国主义、修正主义；有了毛主席，就一定能取得无产阶级文化大革命的彻底胜利，把我国建成为强大的社会主义国家。"},{"type":"paragraph","text":"在庆祝大会上，林彪同志和周总理一再号召我们进一步活学活用毛主席著作，我坚决响应号召，干一辈子革命，读一辈子毛主席的书，把毛泽东思想真正学到手，做一个永远革命、永不变色的无产阶级革命事业接班人。RW：毛主席；接见红卫兵"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2940b59fe6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
