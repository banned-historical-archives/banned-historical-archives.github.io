art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“想起毛主席的号召……”","authors":["班长李尚友"],"parts":[{"type":"paragraph","text":"一九六四年六月的一天，我们班帮助公社在高粱地里铲草。大家和社员在一块地里干活，你追我赶，热气腾腾。"},{"type":"paragraph","text":"刘英俊扬起锄头，下得准，铲得净，一袋烟的工夫，就铲到了地头，转身又去帮助别人。"},{"type":"paragraph","text":"社员们看他干的活计，满口称赞说：“这小伙子干活真虎势！”“行，看样子也是庄稼人出身。”"},{"type":"paragraph","text":"大家正在议论的时候，记工员小张发现刘英俊的锄杠上刻着毛主席的题词："},{"type":"paragraph","text":"“向雷锋同志学习”。"},{"type":"paragraph","text":"在背面还刻上了“革命自有后来人”。"},{"type":"paragraph","text":"这个发现，很快就被传开了。休息的时候，大伙儿围上来看这把锄头。社员朱凤山好象恍然大悟地说：“怪不得刘英俊干得这么欢呢！原来这锄杠上刻着毛主席的题词。”"},{"type":"paragraph","text":"朱凤山说对了。刘英俊在刻这七个字的时候，就对同班的李全胜同志说过：“想起毛主席的号召，浑身就有使不完的劲！”"},{"type":"paragraph","text":"毛主席发出“向雷锋同志学习”的伟大号召后，刘英俊同志热烈响应。他在锄把上刻了毛主席的题词，和“革命自有后来人”七个字，用来鞭策自己。图为刘英俊用过的锄头和从锄把上拓下的刻字。RW：刘英俊；生平；附照片"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc4bc747f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
