导机关展开整编节约工作","authors":[],"dates":[{"year":1951,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社北京廿一日电:各地职工正热烈开展增产节约运动，许多工厂已经创造了许多生产新纪录和节约成绩。"},{"type":"paragraph","text":"上海国营第一棉纺织厂职工已在七、八、九三个月为国家节约了价值三十八亿元的财富。他们又计划在十一、十二两个月内增产棉纱九百十三件，棉布二万一千一百四十七匹，四十二支经纱的皮辊花不超过十两半，布厂织哔叽的次布率降低到百分之零点七五，争取第四季再增产节约价值四十亿元的财富。现在全厂职工已展开竞赛。南纺细纱间二十一支纱十小时产量已达到零点五八一磅，十八支经纱产量达到零点六九八磅，创造了全厂的新纪录。"},{"type":"paragraph","text":"重庆四川水泥厂十月份为国家增产节约了价值等于八百三十四吨粮食的财富。在十月份，全厂水泥产量超过过去最高月产量的百分之十点三；全厂有九个小组创造了生产新记录。"},{"type":"paragraph","text":"天津铁路管理局在最近召开的分局长、处长联席会议上决定动员全体职工展开增产节约运动，为完成今年全年增产五千亿元、节约流动资金四千亿元的计划继续努力。会议并决定了六项具体办法:一、加强运输管理，有步骤地开展五百日车公里运动。二、加强基本建设管理。三、加强材料管理。四、全部复查定员标准，精简机构。五、严格执行各种制度，反对铺张浪费。六、严格执行财政纪律，加强思想教育，杜绝贪污。"},{"type":"paragraph","text":"太原钢铁厂炼焦部焦崇山小组从七月下半月到十月的二个半月中为国家节约了价值一亿零七百七十多万元的财富。他们最近又订出新的增产节约和捐献计划，要在今年十一月到明年六月再给国家增产节约价值六亿七千二百多万元的财富；并保证今年年底完成捐献计划的百分之二百五十。"},{"type":"paragraph","text":"【新华社济南二十日电】　山东省省级领导机关已有计划有步骤地展开整编节约工作。山东省省级机关整编节约委员会已在本月三日成立。该会根据省级各机关的工作情况，作出了关于厉行整编节约工作的决定，具体规定了整编节约工作的计划和步骤。现山东省人民政府各应、局、行、院和中共中央山东分局、山东省各界人民代表会议协商委员会以及省一级的各人民团体等三十一个单位，都已建立了整编节约分会。各单位还召开了动员大会和进行有关文件的学习。中共中央山东分局已开始登记机关物资。山东省人民政府商业应已初步检查了机构重叠、办事迟缓和铺张浪费的现象。"}],"comments":[],"origin":"本报,新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c688429d63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
