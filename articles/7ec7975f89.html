art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"边防战士永远心向毛主席","authors":["国庆观礼代表/兰州部队某部放映员胡耀辉"],"parts":[{"type":"paragraph","text":"十月一日，我们最最幸福的日子来到了！上午十时，一轮红日从天安门城楼升起，伟大领袖毛主席和他的亲密战友林副主席容光焕发，神采奕奕，亲切地向我们挥手致意。我们边防战士的心啊，和伟大领袖毛主席紧紧地贴在一起！在这无比幸福、无比欢乐的时刻，我们千言万语说不尽对伟大领袖毛主席的无限热爱，千歌万曲唱不完毛泽东思想和毛主席革命路线的伟大胜利！我们从内心深处迸发出时代的最强音：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"毛主席啊，毛主席！在这举国欢腾的大喜日子里，我们边防战士的代表来到您的身边，接受您的检阅，这是我们最大的光荣、最大的幸福！回顾我们在祖国的西北边疆，为边防部队放映电影，宣传您的光辉思想，我们是多么高兴、多么自豪啊！为了传达您的最新指示，使边防战友和边疆人民早一分钟听到您老人家的伟大声音，我们迎着戈壁的风沙，冒着严冬的冰雪，演电影，放幻灯。越是困难，革命精神越饱满。大家豪迈地说：严寒冰冻无所惧，红太阳永远暖心头；狂风沙石脚下踩，任何艰难也阻挡不住我们宣传毛泽东思想的坚定步伐！"},{"type":"paragraph","text":"党的“九大”开幕的新闻纪录影片发到我们边防部队以后，我们欢呼，我们跳跃！边防战士多么渴望看到伟大领袖毛主席的光辉形象，多么渴望听到伟大领袖毛主席的伟大声音啊！为了早一秒钟把“九大”的影片送到边防战士眼前，我们电影组越沙梁，跨河滩，一场接一场地连续放映。"},{"type":"paragraph","text":"毛主席向我们挥巨手，边防战士奋勇向前进！为了保卫毛主席，为了保卫社会主义祖国，为了宣传毛泽东思想，我们一不怕苦，二不怕死，刀山敢上，火海敢闯！帝、修、反胆敢动我们伟大祖国的一草一木，我们定叫他粉身碎骨，有来无回！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ec7975f89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
