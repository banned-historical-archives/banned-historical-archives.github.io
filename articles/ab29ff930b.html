" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji40","name":"毛泽东全集第40卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"祝贺印度尼西亚独立十三周年的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺印度尼西业独立十三周年的电报"},{"type":"paragraph","text":"（1958年8月15日）印度尼西亚共和国苏加诺总统阁下："},{"type":"paragraph","text":"当印度尼西亚共和国独立十三周年的时候，我谨代表中国人民并且以我个人的名义，向阁下和印度尼西亚人民致热烈的祝贺。祝印度尼西亚人民在维护国家统一和捍卫国家独立和主权的正义斗争中取得更大的成就。祝中国和印度尼西亚两国间的深厚友谊不断发展。祝印度尼西亚共和国繁荣富强。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东一九五八年八月十五日于北京"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":8,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":38,"page_end":38},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab29ff930b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
