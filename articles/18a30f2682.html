<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新沙皇加紧民族压迫和剥削","authors":[],"dates":[{"year":1976,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新沙皇加紧民族压迫和剥削"},{"type":"paragraph","text":"苏联是一个多民族的国家，有一百三十多个民族和部族。苏修叛徒集团篡权后，全面复辟资本主义，在对内实行阶级压迫、对外实行帝国主义扩张政策的同时，对国内的非俄罗斯民族加紧了剥削压迫。"},{"type":"paragraph","text":"新沙皇疯狂鼓吹大俄罗斯沙文主义，在反对“民族主义倾向”的幌子下，对非俄罗斯民族进行民族压迫。他们强行推广俄语以取代其他民族语言，妄图扼杀非俄罗斯民族的文化和传统，消灭非俄罗斯民族语言。据揭露，在乌克兰共和国，大学和中等专业学校“到处都用俄语”，甚至于“城市里的幼儿园和日间托儿所，除了少数几个例外，完全是用俄语”，“乌克兰语实际上正从生活的内在领域排除出去”。为了加紧俄罗斯化，苏修还大搞“民族环境自然同化”，把非俄罗斯民族人口大量迁出他们世世代代居住的地方。据苏修官方公布的一九七○年人口调查材料，到一九七○年为止，摩尔达维亚人被迁移到摩尔达维亚共和国境外的达到三十九万多人，占该民族人口的百分之十四点六；乌克兰人有五百多万被迁离乌克兰共和国，占该民族的百分之十三点四。在一九五九年到一九七○年两次人口调查期间，民族数目由一百二十六个减少到一百一十九个，民族人口基本停滞不前的民族有拉脱维亚等五个，人口下降的有卡累利阿等三个，有的下降幅度竟达百分之五十一。"},{"type":"paragraph","text":"新沙皇还在经济上对非俄罗斯民族实行残酷的剥削。他们宣扬“劳动分工”、“经济专业化”，不许非俄罗斯民族地区建立完整的经济体系，大搞殖民地式的畸形经济，并强行改变共和国的边界。在非俄罗斯共和国的干部中，谁要主张全面发展本地经济，谁就会被扣上“民族主义”、“闭关自守”等帽子而遭到排斥、打击，被撤职或勒令“退休”。新沙皇不仅以“区域分工”为名限制非俄罗斯民族地区的经济，而且巧立名目，千方百计剥削掠夺非俄罗斯民族地区。"},{"type":"paragraph","text":"苏修叛徒集团对广大非俄罗斯民族实行大俄罗斯主义的民族歧视和民族压迫政策，激起了苏联各族人民日益强烈的不满和反抗。他们举行群众示威、罢工。人民的反抗斗争，使新沙皇惊恐不安。他们对非俄罗斯民族地区加强特务统治，加紧镇压。据透露，近年来在乌克兰有大批人遭到逮捕和秘密审讯。乌克兰各高等学校由于“意识形态原因”被开除学籍的学生，一年竟达七千名。在拉脱维亚和立陶宛，暗地里讲授当地民族语言和历史的人遭到逮捕和折磨。一九七四年十二月，爱沙尼亚发生过一次大逮捕，不仅动用了当地全部的“国家安全委员会”人员，而且还调用了其他地区的特工人员。新沙皇的暴力镇压只会使苏联各族人民掀起更大规模的反抗斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18a30f2682"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
