向前、聂荣臻、杨尚昆等分别为展览题词或写信表示祝贺","authors":["李秀清"],"dates":[{"year":1983,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加强装备建设  增强国防实力"},{"type":"paragraph","text":"中央领导同志参观全军武器装备技术革新展览，叶剑英、徐向前、聂荣臻、杨尚昆等分别为展览题词或写信表示祝贺"},{"type":"paragraph","text":"新华社北京9月23日电　（记者李秀清）中央领导同志最近纷纷参观了全军武器装备技术革新展览。中央军委副主席叶剑英、徐向前、聂荣臻、杨尚昆分别为展览题词或来信表示祝贺。"},{"type":"paragraph","text":"叶剑英的题词是：“加强装备建设增强国防实力”。"},{"type":"paragraph","text":"徐向前的题词是：“努力改善武器装备加速国防现代化。”"},{"type":"paragraph","text":"聂荣臻高兴地看了展览的录相，来信鼓励说：“把群众的技术革新成果汇集起来搞成展览，并开会推广成果，交流经验，这是非常有益的工作。我军武器装备现代化的建设，除了要集中力量搞先进的、新型的研制外，更多的是放手发动群众，开发智力，搞技术革新”。"},{"type":"paragraph","text":"杨尚昆与余秋里、杨得志、张爱萍、洪学智以及王平共同的题词是："},{"type":"paragraph","text":"“加强技术革新提高我军武器先进水平”。"},{"type":"paragraph","text":"王震、杨尚昆、杨得志、余秋里、姚依林、秦基伟、谷牧、田纪云、姬鹏飞、张劲夫、张爱萍、王丙乾以及中国科学院院长卢嘉锡，兴致勃勃地参观了展览，赞扬部队技术革新工作所取得的成绩。"},{"type":"paragraph","text":"这次展览从9月5日开幕，已于今天结束。会上展出的近千项成果，集中反映了全军上下热火朝天地大搞技术革新，努力加强装备建设，加速实现国防现代化的大好形势。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"杨得志","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"余秋里","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42a1a92460"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
