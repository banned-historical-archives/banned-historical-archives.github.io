script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"全国公私合营工业显著增加","authors":["新华社"],"dates":[{"year":1955,"month":1,"day":31}],"is_range_date":false,"parts":[{"text":"全国公私合营工业显著增加","type":"title"},{"text":"新华社","type":"authors"},{"text":"一九五四年全国各地资本主义工业经政府批准为公私合营的共达七百多户。这一年中，不仅全国各大城市公私合营工业有了显著的增加，不少中等城市，如黑龙江省的哈尔滨、广西省的南宁、甘肃省的兰州、内蒙古自治区的呼和浩特，也都有了新的公私合营工业。在一九四九年到一九五三年间，我国只有公私合营工业一千多户。","type":"paragraph"},{"text":"去年各地公私合营的企业多数是规模较大、与国家建设及人民生活密切相关的企业。如上海市的安达纱厂、大隆机器厂、正泰橡胶厂、大中华橡胶厂、新安电机厂、信谊制药厂、金星钢笔厂、三友实业社等都是各行业中规模大，设备、技术较好的工厂。天津市的北洋纱厂、恒源纺织厂、仁立实业股份有限公司和华北化工厂、伟迪氏制药厂等也都是全市比较著名的私营工厂。","type":"paragraph"},{"text":"各地公私合营企业在筹备合营期间，都本着‘公平合理、实事求是’的精神，经公私双方协商，进行了财产的估价，对原有资方实职人员也作了妥善安排。各厂职工在筹备公私合营期间，积极协助清估工作，合营以后积极改进生产。唐山市启新水泥厂去年公私合营后的几个月中，就完全扭转了过去不能按期完成生产计划的现象，不仅提前完成了全年生产计划，而且订出了今年比较先进的生产计划，还准备增加新的产品。","type":"paragraph"},{"text":"资本家及资方代理人在企业公私合营后，有职有权，守职尽责，在改进生产经营上发挥了作用。天津市华北搪瓷厂私方副厂长王醒民，在企业公私合营后，改进了瓷料配方；伟迪氏制药厂私方代理副厂长王锟等，研究药品‘菲那西丁’成功。在北京市很多公私合营企业中，已经建立了正常的学习制度，公私双方共同学习，对于提高私方的思想认识，促进他们进行个人改造，起了很好的作用。","type":"paragraph"},{"text":"各地工商业者已经进一步认识了公私合营企业的优越性，上海、天津、北京、武汉、重庆等地都有很多私营工厂已向政府提出申请公私合营。【新华社】","type":"paragraph"}],"comments":[],"origin":"《文汇报》1955年1月31日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0de926a6f9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
