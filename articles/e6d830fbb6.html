<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"最大关怀　最大鼓舞　最大支持毛主席题字激励上海妇女革命斗志决心积极投入文化大革命，向一切剥削阶级思想发动总攻击","authors":[],"dates":[{"year":1966,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　我们的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席亲笔为《中国妇女》杂志题字的喜讯，极大地鼓舞了正处在无产阶级文化大革命高潮中的上海广大革命妇女。她们一致表示:我们决不辜负最敬爱的领袖毛主席对革命妇女的最大关怀、最大鼓舞和最大支持，我们一定要进一步用伟大的毛泽东思想武装自己，努力实现思想革命化，永远跟着毛主席干革命。"},{"type":"paragraph","text":"昨天一早，喜讯传到上海以后，上海市、区、县妇联立即以全市革命妇女的名义，写信给最最敬爱的领袖毛主席和全国妇联，以高度的革命激情，表达了对毛主席的无限热爱、无限信仰、无限崇拜。市妇联主任关建，副主任何宇珍、曹舜琴，同市、区、县的革命女干部一道，到中共上海市委群众接待站，代表全上海的革命妇女表示决心:坚决响应毛主席的号召，一定永远读毛主席的书，听毛主席的话，照毛主席的指示办事，永远跟着毛主席干一辈子革命。一定要把上海市的革命妇女组织办成毛泽东思想的大学校。一定要高举毛泽东思想伟大红旗，坚决贯彻党的八届十一中全会公报和十六条的精神，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"本市广大革命女职工、人民公社女社员、革命女学生、革命妇女干部、革命妇女知识分子和革命职工家属，欢欣鼓舞地庆祝自己的大喜事。从昨天清晨到晚间，她们满怀革命豪情，敲锣打鼓，高举毛主席像，高举写着“全国妇女起来之日，就是中国革命胜利之时。”的毛主席语录牌，一批又一批地到上海市委和市妇联表示革命决心。许多工厂的女工来到市妇联所在地门前的时候，不断振臂高呼:“毛主席万岁!万万岁!”她们表示:要永远紧跟毛主席，积极投入三大革命运动，把无产阶级文化大革命进行到底!许多商店的革命女职工表示:决心向资产阶级和一切剥削阶级思想发动总攻击，大破“四旧”，大立“四新”，让毛泽东思想占领一切思想阵地；一定要全心全意为人民服务，当好革命的红管家，当好毛泽东思想的宣传员。许多学校的革命女师生在决心书中说:我们决不辜负毛主席的期望，决心读一辈子毛主席的书，改造一辈子世界观，跟着毛主席在大风大浪中前进，把自己锻炼成为无产阶级革命事业的可靠接班人。许多人民公社女社员一致提出:坚决破旧立新，移风易俗，学习大寨彻底闹革命的精神，夺取文化大革命和农业生产双胜利。里弄革命妇女的共同决心是:当灭资兴无、移风易俗的促进派，大立毛泽东思想，促进里弄妇女思想革命化。许多女革命文艺工作者，昨天在市妇联所在地门前，载歌载舞，高唱《大海航行靠舵手》。她们表示:坚决贯彻毛主席的文艺路线，一辈子为无产阶级政治服务，为工农兵服务。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\08\\668q020201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e许多革命女师生向市妇联报喜时，高呼:毛主席万岁!　(市妇联供稿)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6d830fbb6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
