云南大学","徐乃宁"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"向学校党政提出九点要求","type":"title"},{"text":"云南大学徐乃宁","type":"authors"},{"text":"向学校党政提出九点要求  　　林学系三年级  徐乃宁","type":"subtitle"},{"text":"(一)扩大校内民主，实行校务委员会制，防止以党代政的作法。","type":"paragraph"},{"text":"(二)实行学分制，采取自由听课制。","type":"paragraph"},{"text":"(三)取消口试制，取消五级记分制，实行百分制。","type":"paragraph"},{"text":"(四)选修外国语。","type":"paragraph"},{"text":"(五)教师讲课中贯彻“百家争鸣”，全面介绍世界科学成就。","type":"paragraph"},{"text":"(六)每班由学校订光明日报一份至数份。","type":"paragraph"},{"text":"(七)党、团、群必须一视同仁，除组织内部事务外，一般问题应同时向师生员工传达(如五四年棉布计划供应的报告，先向党团内传达后向群众传达。)避免人为的制造墙和沟。","type":"paragraph"},{"text":"(八)毕业生分配应以才为先，不以党团员为先，并根据先生和本人意见。","type":"paragraph"},{"text":"(九)及时处理肃反遗留下的评(平)反问题。","type":"paragraph"}],"comments":[],"origin":"《右派言行集(下集)》 (全校学生中部分右派言行)，中共云南大学委员会编，一九五七年九月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"448a8386ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
