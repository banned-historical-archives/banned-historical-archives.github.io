script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"准备对付蒋介石大打的作战部署","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":6,"day":19}],"parts":[{"text":"准备对付蒋介石大打的作战部署","type":"title"},{"type":"paragraph","text":"刘邓薄，贺李，聂刘，并告陈舒：（一）观察近日形势，蒋介石准备大打，恐难挽回。大打后，估计六个月内外时间，如我军大胜，必可议和；如胜负相当，亦可能议和；如蒋军大胜，则不能议和。因此，我军必须战胜蒋军进攻，争取和平前途。（二）大打后，我晋察冀热辽主力应对付热河及平津方面蒋军主力，以一部协助贺、李对付傅作义及夺取同蒲北线，以又一部协助刘、邓、薄夺取正太线。（三）我贺、李统一指挥晋绥主力及聂、刘一部，准备粉碎傅作义之进攻及夺取同蒲北线，以一部协助刘、邓、薄夺取晋西南及同蒲南线。（四）我晋冀鲁豫主力应对付河南方面蒋军主力，其余用于夺取正太线、同蒲南线及晋西南，最后协同晋西北、晋东北夺取太原。（五）拟以陈赓为司令员、薄一波为政治委员，组织指挥机关，统一指挥太行（太南不在内）、太岳、晋西南（吕梁）及晋东北靠近正太路两个分区之一切党政军民力量，其任务为夺取同蒲南线、晋西南全区、白晋路之东沁线及太原、娘子关间之正太路。陈赓纵队司令员职务以别人代替或代理。（六）你们对于上述布置有何意见，望告。（七）我大打必须在蒋大打之后，以示衅由彼启。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"巳皓"}],"comment_pivots":[{"part_idx":1,"offset":9,"index":1},{"part_idx":1,"offset":14,"index":2},{"part_idx":1,"offset":128,"index":3},{"part_idx":1,"offset":151,"index":4},{"part_idx":1,"offset":393,"index":5}],"is_range_date":false,"authors":["毛泽东"],"comments":["刘邓薄，指刘伯承、邓小平、薄一波，当时分别任晋冀鲁豫军区司令员、政治委员和第一副政治委员。贺，指贺龙，当时任晋绥军区司令员。李，指李井泉（一九○九——一九八九），江西临川人，当时任晋绥军区政治委员。聂刘，指聂荣臻、刘澜涛，当时分别任晋察冀军区司令员兼政治委员和副政治委员。","陈，指陈毅，当时任新四军军长兼山东军区司令员。舒同，一九○五年生，江西东乡人，当时任新四军政治部主任兼山东军区政治部主任。","热河，即热河省，见本卷第10页注〔3〕。","傅作义，当时任国民党军第十二战区司令长官。","白晋路，指当时从山西祁县的白圭至晋城的一条未完成的铁路，后已全部拆除。东沁线，指白晋路中从山西祁县东观至沁县的一段铁路。"],"page_start":135,"page_end":136,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1961da57da"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
