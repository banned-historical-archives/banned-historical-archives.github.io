来叶剑英吴德送了花圈，沈雁冰等参加追悼会","authors":[],"dates":[{"year":1975,"month":8,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"政协全国委员会委员、副秘书长、中国民主同盟中央常务委员"},{"type":"paragraph","text":"辛志超先生在京逝世"},{"type":"paragraph","text":"周恩来叶剑英吴德送了花圈，沈雁冰等参加追悼会"},{"type":"paragraph","text":"新华社一九七五年八月六日讯　中国人民政治协商会议第四届全国委员会委员、政协副秘书长、中国民主同盟中央常务委员辛志超先生因病医治无效，于一九七五年七月二十八日在北京逝世，终年六十八岁。"},{"type":"paragraph","text":"辛志超先生在抗日战争时期参加救亡运动。解放后，历任政协第一届全体会议代表、第一届全国人大代表、人大常委会副秘书长、政务院副秘书长兼机关事务管理局副局长、政协第二届和第三届全国委员会委员。"},{"type":"paragraph","text":"八月六日下午举行了辛志超先生的追悼会。国务院总理、政协全国委员会主席周恩来，政协全国委员会副主席叶剑英，人大常委会副委员长吴德，政协全国委员会、中共中央统战部、国务院办公室、人大常委会办公厅，民盟中央送了花圈。政协全国委员会副主席沈雁冰以及有关方面负责人和辛志超先生生前友好胡愈之、刘友法、李金德、武新宇、李梦夫、周子健、萨空了、孙起孟、楚图南、闻家驷、汪世铭、李文宜、沈兹九、连贯、林仲易、费孝通、孙承佩、申伯纯、王克俊、张毕来、罗涵先、葛志成、黄鼎臣、徐萌山、严信民等参加了追悼会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5c90d7e70"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
