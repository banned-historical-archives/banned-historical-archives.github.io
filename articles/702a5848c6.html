rs":[],"dates":[{"year":1951,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京卅日电】　苏联部长会议主席斯大林大元帅致电毛泽东主席，祝贺中华人民共和国成立两周年。电文如下:"},{"type":"paragraph","text":"北京中华人民共和国中央人民政府主席"},{"type":"paragraph","text":"毛泽东同志:"},{"type":"paragraph","text":"在中华人民共和国成立二周年纪念日，主席同志，请接受我友谊的祝贺。衷心的希望伟大的中国人民、中华人民共和国政府及您本人在人民民主中国的建设中获得进一步的成就。"},{"type":"paragraph","text":"让中华人民共和国和苏维埃社会主义共和国联盟的伟大友谊——远东和平及安全的坚强保障永远巩固。"},{"type":"paragraph","text":"【新华社北京卅日电】　苏联外交部是维辛斯基致电我中央人民政府政务院总理兼外交部长周恩来，祝贺我国国庆。电文如下:"},{"type":"paragraph","text":"北京中华人民共和国政务院总理外交部长"},{"type":"paragraph","text":"周恩来同志:"},{"type":"paragraph","text":"值此中华人民共和国成立二周年之际，请接受我的祝贺，并衷心地希望伟大的中国人民和您本人在和平建设中，在巩固贵我两人民间不可摧毁的友谊及争取全世界持久和平的斗争中获得进一步的成就。"},{"type":"paragraph","text":"安·维辛斯基"},{"type":"paragraph","text":"一九五一年九月二十八日于莫"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\10\\51a1010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\10\\51a1010202.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"702a5848c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
