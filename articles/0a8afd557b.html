rs":[],"dates":[{"year":1953,"month":1,"day":22}],"is_range_date":false,"parts":[{"text":"陕西关中区发生春荒","type":"title"},{"text":"【陕西分社讯】关中去年歉收，目前很多农民已缺粮吃。据记者调查：华阴县西长宁坊六十户农民，目前已有七户没粮吃。兴平县二区后村共二十七户，目前有十七户没粮吃；石铺乡运家村三十三户中有十四户没粮吃；小寨村六十二户中有十二户没粮吃。像这样情况的村子在关中灾区内仅是少数。一般轻灾区现在只是少数人没粮吃，但在麦收前，缺粮的人口将要增加很多。有些重灾区的农民，现在已开始以糠菜渡日。华阴县城以北沿铁路的许多村子，农民开始吃青苗，西长宁坊有个别农民把自己身上穿的棉袄都拿到南山里去换苞谷。但这些地区的区乡政府，还未重视灾情，整天督催农民开会，对农民本身的生活问题不大理会。华阴二区姚宁乡许多村干部公开逃避开会，他们说：“(文件缺页)","type":"paragraph"}],"comments":[],"origin":"1953年1月22日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a8afd557b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
