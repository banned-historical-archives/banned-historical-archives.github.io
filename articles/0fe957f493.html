tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"九八三二部支援三秋双丰收帮公社摘花翻地两千多亩以亲眼所见驳倒右倾谰言","authors":["胡诚/傅长礼/李建功"],"parts":[{"type":"paragraph","text":"本报讯 9832部队最近以三千个劳动日积极支援驻地附近人民公社大战三秋，并在劳动空隙进行访问和座谈，加深了对人民公社优越性的认识，获得了劳动思想双丰收。"},{"type":"paragraph","text":"这个部队驻地附近是产棉区。一望无际的棉田开满了丰硕的银花，玉米、红薯等秋收作物也成熟了，麦地正需要抢墒播种。在这大战三秋的季节，部队主动暂停操课，前往公社田间参战。某部六连、五连分头赶到二十五里至七十里以外的白落公社、五陵公社，官兵们刚把背包卸在地头，就钻到棉花林里干起活来。个个生龙活虎，干劲十足。他们起早贪黑地劳动，并虚心学习社员们的摘棉技术，很快从每人每天平均摘棉三十多斤提高到七十多斤，因此出色地完成了公社分配给他们的劳动任务。共摘棉花、收割玉米一千六百五十多亩，耕种麦地八百二十多亩，积肥一万七千八百多斤。在劳动中，官兵们对秋收果实特别爱护，收割得非常仔细，一瓣棉花、一粒玉米也不让它抛撒在地里。一天半夜突然下起大雨，三中队官兵用自己的被单和雨衣盖好堆在场上的棉花，又冒雨把它抢运到房子里，没有使新花遭到一点损失。"},{"type":"paragraph","text":"官兵们在这次劳动中，亲眼看到公社比去年刚成立的时候办得更好了，社员们的社会主义觉悟大大提高了。今年这个地区遭到了旱灾，由于公社人多力量大，社员们齐心努力，终于在党的领导下战胜了旱灾，保住了棉花丰收。公社的食堂也越办越好了，饭菜的味道好，又卫生，每周还吃白面馍和包子改善生活。社员们反映，在食堂吃饭，省工又省煤，好处说不完。对小孩子多、劳动力少和鳏寡孤独的社员来说，食堂给他们带来了更大的幸福。官兵们在座谈时，用亲眼看到的事实，严正驳斥了右倾机会主义分子对人民公社的诬蔑。他们说：叫右倾机会主义分子到公社来睁眼看看！他们叫喊人民公社“办早了”、“办糟了”，真是一派胡言乱语。官兵们还一致反映：这次到公社支援大战三秋，又上了一次生动的社会主义教育课。 （胡诚、傅长礼、李建功）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fe957f493"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
