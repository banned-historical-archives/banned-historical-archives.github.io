小平同志也为展览会题词","authors":[],"dates":[{"year":1963,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社天津24日电】　毛泽东主席、刘少奇主席以及党和国家的其他领导人周恩来、朱德、陈云、林彪、邓小平为在天津开幕的河北抗洪抢险斗争展览会题词。"},{"type":"paragraph","text":"中共中央主席毛泽东题词:“一定要根治海河”。"},{"type":"paragraph","text":"中共中央副主席、中华人民共和国主席刘少奇题词:“记取这一次洪水和其他各次水旱灾害的经验教训，全省人民团结起来，努力奋斗，决心以二十年左右的时间，分期分批地把河北水利建设好。”"},{"type":"paragraph","text":"中共中央副主席、国务院总理周恩来题词:“向为战胜历史上少见的洪涝灾害而进行顽强斗争的各级干部、各界人民、部队官兵表示最大敬意!要为支援灾区、重建家园、争取明年丰收、彻底治理海河而继续奋斗!”"},{"type":"paragraph","text":"中共中央副主席、全国人民代表大会常务委员会委员长朱德题词:“战胜洪水保卫社会主义建设”。"},{"type":"paragraph","text":"中共中央副主席、国务院副总理陈云题词:“防洪斗争的胜利是人民力量的胜利”。"},{"type":"paragraph","text":"中共中央副主席、国务院副总理兼国防部长林彪元帅题词:“军队要支援人民战胜天灾帮助人民克服困难”。"},{"type":"paragraph","text":"中共中央总书记、国务院副总理邓小平题词:“防洪斗争的胜利，是集体主义的胜利，是社会主义制度优越性的胜利。”"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\12\\63cq010201.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"陈云","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb29d8beac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
