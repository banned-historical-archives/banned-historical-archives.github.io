art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚持把学习和批邓放在首位八二炮连党支部组织干部战士认真学习马列著作和毛主席重要指示，深入批判邓小平反革命的修正主义路线","authors":[],"parts":[{"type":"paragraph","text":"本报讯 八三一二六部队八二炮连党支部坚持把学习和批判放在首位，积极组织干部战士认真学习马列著作和毛主席的重要指示，努力掌握理论武器，狠批邓小平反革命的修正主义路线，使干部战士在大好形势下乘胜前进。"},{"type":"paragraph","text":"毛主席指出：“我们的眼力不够，应该借助于望远镜和显微镜。马克思主义的方法就是政治上军事上的望远镜和显微镜。”八二炮连在深刻领会毛主席关于资产阶级“就在共产党内”这一重要指示时，党支部组织大家认真学习马克思、恩格斯、列宁同机会主义者作斗争的有关论述，回顾我们从文化大革命以来同刘少奇、林彪、邓小平进行斗争的事实，更加深刻地认识掌握理论武器对于识别和抵制党内资产阶级的重要意义。大家说：“是不是始终把看书学习放在首位，对马列著作和毛主席的重要指示是不是认真学、反复学，这是关系到能不能把邓小平修正主义路线批深批透，把反击右倾翻案风进行到底的问题，也是关系到能不能坚持无产阶级专政下继续革命的问题。”提高认识后，连队掀起了看书学习的热潮，大家以饱满的革命热情，密切结合批邓斗争的实际，学习革命理论。指导员徐华有身体不太好，但他每天坚持自学两个小时，用自己的模范行动带动连队的看书学习。连长颜崇柱理论基础比较差，在看书学习中遇到不少困难，但他发扬雷锋同志的“钉子”精神，一字一句地反复探讨，虚心请教。一次，在批判邓小平鼓吹军队工作要以“整顿”为纲这个谬论时，他连续五个晚上认真学习马列、毛主席关于以阶级斗争为纲的论述，揭露了邓小平鼓吹“整顿”为纲的反动实质，为干部战士深入批邓引路。七班长冀孝钦是连里认真看书学习的典型，几年来，他先后攻读了二十多本马列著作和毛主席著作，提高了识别真假马克思主义的能力。在去年邓小平刮起右倾翻案风时，他就敏锐地察觉到这股风不对头，把自己的想法向党支部作了汇报。在批邓斗争中，他更刻苦地学习马列著作和毛主席著作，成了连队批邓尖兵。"},{"type":"paragraph","text":"八二炮连干部战士由于把学习与批邓密切结合起来，进一步看清了邓小平反革命的修正主义路线的反动实质。大家决心更好地学习马列著作和毛主席著作，努力掌握政治上的望远镜和显微镜，把批邓、反击右倾翻案风的斗争进行到底！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"（辽宁）毛泽东思想八三一沈阳革命造反总司令部（八三一）","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aecaa15741"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
