<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"龚品梅反革命集团毒害了我们家中四个青年","authors":["卢湾区","童瑞娟","胡镜水"],"dates":[{"year":1955,"month":9,"day":15}],"is_range_date":false,"parts":[{"text":"龚品梅反革命集团毒害了我们家中四个青年","type":"title"},{"text":"卢湾区胡镜水童瑞娟","type":"authors"},{"text":"提起龚品梅反革命集团，我们有切骨之恨。","type":"paragraph"},{"text":"我们两人虽不是天主教徒，可是龚品梅反革命集团的魔爪一直伸到了我们家庭里，他们毒害了我们的两个妹妹——胡美珍、胡美玉，使她们走上了反革命的道路。作为爱国的公民，我们完全拥护政府依法逮捕龚品梅等反革命分子。","type":"paragraph"},{"text":"我们现在完全明白了，以龚品梅为首的这帮反革命分子，是受帝国主义和蒋匪帮指使的，他们仇恨人民政权，积极破坏人民革命事业，迫害爱国教徒，毒害青年少年，把他（她）们拉入反革命的泥坑中去，断送青年、少年们美好的青春和光明的前途。我们家庭中的胡美珍、胡美玉，就是受了这批反革命分子的利用，参加了他们的反动组织，进行反人民的活动，堕入到反革命的泥坑的。更恶毒的是龚品梅反革命集团分子指使她们抗拒“圣母军”登记，抗拒几年来政府对她们的耐心教育，反对我们给她们的劝告，直到最近，政府指出她们的反动行为，给予最后坦白悔改的机会，家中人也尽力启发帮助，可是她们因受龚品梅等反革命分子的毒害极深，仍然抗拒到底。这些反革命分子甚至连亲生的母亲和兄嫂都不认得，我们六十四岁的老母亲劝她们向政府坦白悔过，她们对母亲说：“到提篮桥（指提篮桥监狱）去是光荣，枪毙更光荣。就是你母亲死在我们面前，我们也不悔改。”她们还骂嫂嫂是“魔鬼”。这批披着宗教外农的反革命分子的面目就是这样狰狞！","type":"paragraph"},{"text":"龚品梅反革命集团不仅使胡美珍、胡美玉走上了反革命的道路，连我们的女儿胡吟秋和外甥女翁芙英也受了他们的毒害。我们作为做父母的人，更衷心感激政府对青年的挽救。我们的女儿胡吟秋原来在读书时受有反革命分子的影响，初三毕业后，我们就叫她考市立第二女中，设法使我们的女儿摆脱反革命的影响，结果考进了，可是胡美珍、胡美玉这两个反革命分子，仍旧把她往火坑里拉。我们的外甥女翁芙英从一九五三年住到我们家里来以后，也受了这两个反革命分子的影响，被她们拉下水去。说起这些事情来真恨煞人！","type":"paragraph"},{"text":"起先我们只认为她们不像个好的青年学生，做事不正派，现在我们才更加认清了她们原来是干的不可告人的反革命勾当。我们痛恨以龚品梅为首的这些反革命分子，我们要求政府严厉惩办他们。从这次事件，我们更体会到政府政策的正确和伟大。我们要站稳立场，百倍地提高警惕，坚决地投入肃清龚品梅反革命集团和一切暗藏反革命分子的斗争中去！","type":"paragraph"}],"comments":[],"origin":"《解放日报》1955年9月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0197b26d1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
