art":10,"page_end":10,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"惟一写入毛泽东诗词的连队等二则","authors":[],"parts":[{"type":"paragraph","text":"惟一写入毛泽东诗词的连队"},{"type":"paragraph","text":"上海警备区某部八连，因身居闹市一尘不染，始终坚持艰苦奋斗优良传统，全心全意为人民服务，于1963年4月25日被国防部授予“南京路上好八连”荣誉称号。同年8月1日晨，毛泽东挥毫写下了《八连颂》——“好八连，天下传。为什么？意志坚。为人民，几十年。拒腐蚀，永不沾。因此叫，好八连。解放军，要学习。全军民，要自立。不怕压，不怕迫。不怕刀，不怕戟。不怕鬼，不怕魅。不怕帝，不怕贼。奇儿女，如松柏。上参天，傲霜雪。纪律好，如坚壁。军事好，如霹雳。政治好，称第一。思想好，能分析。分析好，大有益。益在哪？团结力。军民团结如一人，试看天下谁能敌。”这首诗是毛泽东惟一一次为一个连队写下的。"},{"type":"paragraph","text":"惟一写入《邓小平文选》的连队"},{"type":"paragraph","text":"“硬骨头六连”原隶属于武汉军区某部，因为战备思想硬，军事技术硬，军政纪律硬，1964年1月22日，被国防部授予“硬骨头六连”荣誉称号。1977年1月，中央军委向全军发出向“硬骨头六连”学习的号召。1984年1月22日，中央军委向该连赠送了“发扬硬骨头精神，开创连队建设新局面”的锦旗。1985年6月，中央军委又授予六连“英雄硬六连”荣誉称号。"},{"type":"paragraph","text":"1977年，邓小平在一次军委座谈会上指出：“对连队来说，学‘硬骨头六连，是对的，因为‘硬骨头六连，的作风不只是一个连队的作风，所有的连队以至各级干部都应该像他们那样勤学苦练，有他们那种政治思想。”这次讲话后来被收入《邓小平文选》第二卷，“硬骨头六连”因此成为惟一在《邓小平文选》里出现的连队。"},{"type":"paragraph","text":"（南京政治学院中共党史教研室主任、副教授李峻提供）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aeee6a6e13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
