ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"在参政会茶会上的演说","alias":"","parts":[{"type":"paragraph","text":"在参政会茶会上的演说"},{"type":"paragraph","text":"（1945年9月18日）"},{"type":"paragraph","text":"今日是九一八纪念日，首先应该庆祝胜利。八年抗战，胜利终于到来，尤其东北，自九一八事变后，已沦陷十四年，今日也得到胜利解放，身临此日，倍觉兴奋。所最感光荣的，是能够在这个时期和诸先生朋友和各老前辈见面。回忆抗战期间，虽极艰苦，但因全国一致的努力，现已平安渡过，蒋主席特邀来渝共商国是，意至可感。今后当为和平发展、和平建国的新时代，必须团结统一，坚决避免内战，除此方针之外，其他任何方针均属错误。因之各党各派应在上述方针之下，团结一致，彻底实行三民主义，以建设现代化的新中国。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":393,"page_end":393},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"794f41efc7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
