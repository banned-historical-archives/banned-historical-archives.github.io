<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"无产阶级思想和资产阶级生活方式不能并存","authors":["何群"],"dates":[{"year":1952,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"何群"},{"type":"paragraph","text":"在伟大的三反和五反运动中，青年同学经过学习和对贪污、盗窃行为的揭发与控诉，已从感性到理性逐步认清了资产阶级腐朽堕落的思想及其危害性，开始并逐步深入地对自己思想上的资产阶级影响进行防腐和消毒的工作，并从思想的提高贯彻到实际的行动中去。但是，在一部分人中，却保留着甚至滋长着一种不良的倾向；他们在批判资产阶级思想的同时，继续过着或追求着铺张浪费的生活方式。"},{"type":"paragraph","text":"这些人虽然在程度上各有不同，但他们却持有共同的见解；这就是资产阶级的生活方式可以和无产阶级的思想兼容并在。"},{"type":"paragraph","text":"显而易见，这种见解是幼稚的和有害的。"},{"type":"paragraph","text":"持有这种见解的第一种人，他们沾染着较严重的资产阶级思想，为了表示自己的“进步”，不得不口头上承认无产阶级思想的正确；但他们又不甘心放弃物质享受的贪欲，留恋、沉醉于资产阶级奢侈的生活，因而别有用心地发出荒唐的论调，企图自欺欺人。"},{"type":"paragraph","text":"另一种人，他们在理论上也认识到无产阶级思想的正确，并有改造自己的意愿，但他们在思想意识和思想方法上却仍保留着一定的资产阶级影响，因而产生了这种幼稚的见解。他们说:“反正我家里有钱，多花些也无所谓。”而事实上正说明他们对财富的看法，仍抱着资产阶级的观点；因为财富是劳动人民所流血流汗创造的，只有劳动人民才体验到“来处不易”而珍惜它，挥霍原是剥削阶级的本性。他们说:“革命就是为了享受，我享受一下又有什么不好呢?”这种说法也说明他对享受的看法，仍是抱着资产阶级的观点；因为革命者首先为整个社会的生活水平提高而忘我劳动，他自己决不脱离实际情况而单纯地求得生活水平的提高的，只有剥削阶级，才钻头觅缝地追求个人的享受。因此，有这样两种想法的人，虽然他并没有意识到这就是资产阶级的思想，但在实质上仍然是资产阶级思想侵蚀的结果。"},{"type":"paragraph","text":"由此可见，无产阶级思想和资产阶级的生活方式是不可能并存的。追求资产阶级的生活方式，正说明在思想上已受到资产阶级的影响；何况资产阶级的生活方式，又必然会助长资产阶级思想的滋长呢!三反中的许多事实已不容置辩地证实:许多原来忠心耿耿为人民服务的干部之所以堕落为资产阶级的坐探，正是首先中了资产阶级生活方式的糖衣炮弹的结果。"},{"type":"paragraph","text":"由此可见，无产阶级思想和资产阶级生活方式是决不可能得而兼之的。要思想；要就是挥霍奢侈，走资产阶级的道路。两者必居其一；调和，决不可能!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcafa28e04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
