rs":["张瑾"],"dates":[{"year":1957,"month":9,"day":25}],"is_range_date":false,"parts":[{"text":"目前江苏省各民主党派反右派斗争情况","type":"title"},{"text":"张瑾","type":"authors"},{"text":"新华社南京25日讯　据统计，各民主党派江苏省委员会委员和各市正副主任委员共一百七十八人，自1956年社会主义改造高潮后至大鸣大放以前，共有右派分子十一人，现在揭发出的右派分子已达三十一人，增加将近三倍。民盟、九三、农工三个党派的实际领导权，曾一度为右派分子所掌握。","type":"paragraph"},{"text":"在大鸣大放期间，中间分子和一部分左派，都不同程度的受了右派分子的影响。如章乃器、李康年的反动言论发表后，南京市工商界政治学校80％以上的学员表示赞成或支持。","type":"paragraph"},{"text":"经过三个月的反右派斗争，各民主党派领导人员中的左派和中间分子，已经全部发动起来。部分基层成员已直接或间接地加入了斗争。据不完全统计，居住在南京市的各民主党派成员参加各种大小反右派斗争会的共一千二百六十三人，占居住南京市各民主党派成员总数的48％。各民主党派省级和南京市级领导人员中，原有中间分子二百三十二人，在反右派斗争中态度显著向左转的有三十八人。","type":"paragraph"},{"text":"右派分子已在成员中陷于孤立。在省级和南京市级领导人员的三百七十人中，共揭发出右派分子五十三人，占领导人员总人数的14．33％，其中右派骨干分子十五人。对这些右派分子，经过充分揭发和批判后，很多成员反映：“右派分子罪孽深重，铁证如山”。","type":"paragraph"},{"text":"由左派和中左联盟占优势的领导机构已经建立起来。领导机关过去被右派分子掌握的党派，现在都已建立了整风领导小组，并开始发挥了他们的领导作用，但有些党派还未深入到基层。","type":"paragraph"},{"text":" ——原载新华社《内部参考》1957年9月28日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd4c5fb5a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
