art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习革命理论批判修正主义四连继续深入批判林彪的“六个战术原则”","authors":[],"parts":[{"type":"paragraph","text":"本报讯 一六一一部队四连在学习无产阶级专政理论的过程中，继续深入批判林彪的“六个战术原则”，使干部战士进一步分清两条军事路线界限，认清林彪这套黑货的反动实质，增强了贯彻执行毛主席军事路线的自觉性，掀起了为巩固无产阶级专政刻苦训练的热潮。"},{"type":"paragraph","text":"遵循毛主席关于理论问题的重要指示，四连迅速掀起学习无产阶级专政理论的热潮。这时，有的同志以为，对林彪资产阶级军事路线的批判可以停一停了，因而忽视了继续深入批判林彪的“六个战术原则”。针对这种现象，党支部及时进行了教育，使大家懂得：学习无产阶级专政的理论，必须紧密地结合对修正主义路线的批判，其中包括对林彪资产阶级军事路线的批判。因此，对“六个战术原则”的批判不能停，还需要继续深入。"},{"type":"paragraph","text":"为了把这一批判切实搞好，四连党支部采取了以下措施：一、举办正、副班长学习班，组织他们认真学习无产阶级专政的理论和毛主席军事著作，研究如何把学习同批判结合起来的办法，使正、副班长进一步掌握了武器，提高了批判能力。在他们的带动下，各班批判很快开展起来，而且越搞越好。二、充分发挥连队理论小组的作用，要求理论小组把群众学习和批判中的难点集中起来，进行研究、批判，及时整理学习体会和批判材料，给全连同志作辅导。三、注意引导干部战士努力弄清无产阶级专政的一些基本观点，深批林彪“六个战术原则”的反动实质。例如，十一班的同志围绕革命暴力是无产阶级专政的基本标志的观点，学习马列和毛主席有关革命暴力的论述，认清无产阶级要彻底摧毁旧的国家机器，建立和巩固无产阶级的政权，“必须采取严酷无情和迅速坚决的暴力手段来镇压剥削者即资本家、地主及其走狗的反抗。”（《列宁选集》第三卷第八五七页）然后再剖析林彪的“六个战术原则”出笼的背景，大家对林彪反对暴力革命，背叛无产阶级专政的丑恶嘴脸就看得更清、批得更深了。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abb3600a99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
