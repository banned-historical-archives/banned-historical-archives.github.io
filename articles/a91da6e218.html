rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来总理回到北京","authors":[],"parts":[{"type":"paragraph","text":"据新华社1日讯 周恩来总理、陈毅副总理和随行人员，结束了在蒙古人民共和国的友好访问之后，满载兄弟的蒙古人民对中国人民的深情厚谊，于今天上午十一时十五分乘专机由乌兰巴托回到北京。"},{"type":"paragraph","text":"党和国家的领导人朱德、宋庆龄、邓小平、彭真、李先念等，前往机场欢迎。"},{"type":"paragraph","text":"周恩来总理走出机舱时，迎候在机场上的人们发出热烈掌声。周恩来总理和陈毅副总理同欢迎的人们亲切握手。"},{"type":"paragraph","text":"中蒙两国的儿童向周总理和陈毅副总理献了鲜花。"},{"type":"paragraph","text":"正在北京的蒙古人民革命党中央政治局委员、蒙古大人民呼拉尔主席团副主席巴尔吉尼雅姆，蒙古人民革命党中央政治局委员、书记处书记、蒙古大人民呼拉尔主席团委员图穆尔—奥奇尔，到飞机场欢迎。"},{"type":"paragraph","text":"到飞机场欢迎的，还有各国驻中国的外交使节和外交官员。"},{"type":"paragraph","text":"新华社乌兰巴托1日电 周恩来总理、陈毅副总理结束了在蒙古人民共和国的友好访问，今天上午七时四十分乘专机离开乌兰巴托回国。"},{"type":"paragraph","text":"前往飞机场送行的有：泽登巴尔主席、桑布主席以及蒙古其他党政领导人曾德、莫洛姆扎木茨、杜格苏伦、扎格瓦拉尔、拉姆苏伦、迈达尔以及大人民呼拉尔主席团委员、各部部长、和群众团体负责人、人民军高级将领，中国驻蒙古大使谢甫生和各国驻蒙古的使节。"},{"type":"paragraph","text":"周恩来总理、陈毅副总理由泽登巴尔主席陪同检阅了仪仗队。"},{"type":"paragraph","text":"周恩来总理和泽登巴尔主席先后在机场上讲了话。"},{"type":"paragraph","text":"蒙古首都各界人民在乌兰巴牦机场热烈地欢送周恩来总理和陈毅副总理。"},{"type":"paragraph","text":"据新华社乌兰巴托1日电 周恩来总理在即将离开蒙古国境时，从飞机上打电报给泽登巴尔主席，向蒙古人民致谢。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a91da6e218"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
