用“坦白书”来对付检查组","authors":[],"dates":[{"year":1952,"month":2,"day":8}],"is_range_date":false,"parts":[{"text":"北京市资本家抗拒五反运动的新花样　用“坦白书”来对付检查组","type":"title"},{"text":"【本刊讯】北京市资本家在春节停止检查的十天中，想尽各种办法来对抗五反运动。比较普遍的是不少行业用“坦白书”来对付检查组的检查。他们把“坦白书”油印或者复写出来交给司账、会计、店员等，人手一份。等到检查组来检查时，就把准备好的“坦白书”交给检查组，并说他们就是这些材料，看检查组还知道那些，要检查组给他们提问题，使得检查组的工作陷于被动。","type":"paragraph"},{"text":"北京市公审薛昆山等的大会，对资产阶级的震动很大，他们说：现在搞干部，以后就要搞到咱们头上了。许多人都惶恐不安。有的人藉故逃到天津、广州等地去暂避风雨；有的跑到亲戚家去躲起来，使检查组找不着人；还有的人装疯、害病、哭号、自杀。有的人反映有“二愁”：一愁“三反”，二愁今后生意不好作。","type":"paragraph"},{"text":"从总的趋势来看，资产阶级的阵营已被打乱了，但还固作垂死的挣扎。现在的中心环节是继续发动店员，攻破资产阶级的堡垒。","type":"paragraph"}],"comments":[],"origin":"1952年2月8日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c0dea9c4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
