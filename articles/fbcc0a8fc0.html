es":[],"article":{"title":"铁道部转发劳动部、内务部《关于企业、事业单位和机关职工中的复员、退伍军人被精减时的待遇问题的通知》","dates":[{"year":1961,"month":7,"day":22}],"is_range_date":false,"authors":["内务部","劳动部","铁道部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 416-418","tags":[{"name":"待遇","type":"主题/事件"},{"name":"复员","type":"主题/事件"},{"name":"精减职工","type":"主题/事件"},{"name":"军人","type":"主题/事件"},{"name":"退伍","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"铁道部转发劳动部、内务部《关于企业、事业单位和机关职工中的复员、退伍军人被精减时的待遇问题的通知》\n（一九六一年七月二十二日）\n      兹将中华人民共和国劳动部、内务部“关于企业、事业单位和机关职工中的复员、退伍军人被精减时的待遇问题的通知”转发你们，希遵照办理。\n附件：劳动部、内务部“关于企业、事业单位和机关职工中的复员、退伍军人被精减时的待遇问题的通知”\n（摘自铁人工刘〔61〕字第1967号文件）"},{"type":"paragraph","text":"附：\n劳动部、内务部关于企业、事业单位和机关职工中的复员、退伍军人被精减时的待遇问题的通知\n(61)中劳新字第62号 (61)内人工字第32号\n各省、自治区、直辖市劳动厅（局）、民政厅（局）、人事局（处）：\n      在这次精减职工工作中，一些地区提出了企业、事业单位和机关职工中的复员、退伍军人被精减时其待遇如何处理的问题，并要求作出统一的规定，以便执行。对此，根据中央六月二十八日“关于精减职工工作若干问题的通知”的精神，特作如下通知：\n      一、对于企业、事业单位和机关职工中的复员、退伍军人，在这次被精减回乡生产的，除够退休条件的按照退休办法处理外，都可以按照“国务院关于工人、职员退职处理的暂行规定（草案）”处理。但是，由于他们在复员、退伍时已经领取过复员生产资助金或退伍优待金，因此，在给他们 计发退职补助费的时候，对于他们当军人的这段时间，不再计发退职补助费（但是在一般计算工龄的时候，军龄仍应合并计算为工龄或工作年限）至于入伍前原为正式职工和学徒的复员、退伍军人，如果在复员、退伍时对于他们在入伍前的一般工龄或工作年限已经计发过复员生产资助金或退伍优待金的，这段工龄或工作年限也不再计发退职补助费；尚未计发过的，则可以计发退职补助费。"},{"type":"paragraph","text":"过去的有关规定与上述处理办法有抵触的，按照上述处理办法执行。\n      二、职工中的复员、退伍军人被精减时的当月工资、回乡所需的车旅费、途中伙食补助费以及回乡后与途中所需的粮票，都应该按照中央六月二十八日通知中的有关规定办理。\n一九六一年七月十九日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbcc0a8fc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
