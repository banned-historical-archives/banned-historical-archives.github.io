script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马里《发展报》说非洲人民决心同帝国主义斗争到底  宁以鲜血换自由　不当丰足的奴隶  相信帝国主义的善良愿望就是把脖子送到它的刀下","authors":[],"dates":[{"year":1964,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马里《发展报》说非洲人民决心同帝国主义斗争到底"},{"type":"paragraph","text":"宁以鲜血换自由　不当丰足的奴隶"},{"type":"paragraph","text":"相信帝国主义的善良愿望就是把脖子送到它的刀下"},{"type":"paragraph","text":"据新华社巴马科十五日电  马里《发展报》十日发表题为《帝国主义——蹩脚的教师和辩护士》的长篇社论说，“在一切反动派中，帝国主义是最危险的。”"},{"type":"paragraph","text":"社论说，世界各国人民对帝国主义的危险性的认识正在迅速提高。随着各国劳动群众争取实现共同事业的热情的高涨，这种认识正在日益迅速地产生影响。社论说，“真正的爱国者从来都是宁愿死而不愿受屈辱，宁愿以鲜血换取自由也不当丰衣足食的奴隶。”"},{"type":"paragraph","text":"社论强调说，在目前情况下，帝国主义及其走狗无疑是最危险的。“在帝国主义向我们提出的这个生死存亡的问题面前，只有我们自己信赖自己，只有我们以不屈不挠的意志保卫自己的选择，只有我们对我们的非洲兄弟们、对坚决维护自己人格和主权的世界各国人民表示积极的支援，我们才能生存。”"},{"type":"paragraph","text":"社论说，“对各国人民自由的敌人不应存任何幻想，他们不会很快解除武装”，“对帝国主义也不应存任何幻想，同它根本谈不上做朋友，它要的是奴仆；它根本没有平等的概念，它要的是奴隶。必须认清帝国主义的这种不可改变的本性。”"},{"type":"paragraph","text":"社论说，对帝国主义，“不管你同它斗争还是饶恕它，不管你容忍它还是揭露它，对它来说完全一样，它总是要千方百计把你置于死地。……因此，放松警惕，相信帝国主义的善良愿望，就是把自己的脖子送到帝国主义的刀下。”"},{"type":"paragraph","text":"社论特别提到亚洲、非洲和拉丁美洲各国觉悟的日益提高。它特别提到“亚洲各国人民越来越成为研究帝国主义心理的专家，并善于武装自己来挫败帝国主义的战略”。它说，“事实上，尽管帝国主义在亚洲玩弄了各种诡计，可是它的阵地正在瓦解。亚洲各国人民对自己的命运充满着信心，并经常保持警惕，这就使敌人陷进了日暮途穷的绝境。”"},{"type":"paragraph","text":"社论重申马里是坚决与非洲共命运的非洲战士，并要求非洲各国人民加强团结，“以挫败帝国主义和殖民主义为了在思想意识方面分化非洲从而打击我们在反对帝国主义和新老殖民主义的斗争中的锐气而施展的种种分裂阴谋”。"},{"type":"paragraph","text":"社论说，“非洲各国人民对帝国主义的阴谋计划不应抱任何幻想。他们越早识破和揭露帝国主义的阴谋，形势就会越好。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"355a0a9f27"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
