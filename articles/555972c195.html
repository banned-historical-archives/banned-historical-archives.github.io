ors":[],"dates":[{"year":1967,"month":11,"day":28}],"is_range_date":false,"parts":[{"text":"中共中央、中央文革转发鞍山市军管会两个报告的通知","type":"title"},{"text":"各省、市、自治区革命委员会（筹备小组）军管会、各大军区、省军区：","type":"appellation"},{"text":"鞍山市军管会关于《用毛泽东思想武装群众，群众就能自己解放自己》的报告和《鞍山居义小学革命师生自己动手修复校舍国家没花一文钱》的报告很好，鞍山市中小学广大师生遵照伟大领袖毛主席“自力更生、节约闹革命”的教导，自己动手，修复校舍，这不仅为国家节约了物资和人力，更重要的是培养了广大革命师生的无产阶级革命精神和作风。正如他们自己所说：“我们不只是为国家节省了钱，砌好几道防风墙，更重要的是在头脑里筑起了多少钱也买不到的防修墙。”现在将这个报告和这篇报导转发给你们，请你们组织大学、中学、小学各校的广大师生学习、照办。","type":"paragraph"},{"text":" 中共中央中央文革小组一九六七年十一月廿八日","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"555972c195"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
