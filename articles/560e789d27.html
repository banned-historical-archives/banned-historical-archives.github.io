ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对《红旗》杂志社论稿《关于总结经验》的批语","alias":"","parts":[{"type":"paragraph","text":"对《红旗》杂志社论稿《关于总结经验》的批语\"!"},{"type":"paragraph","text":"（1969年3月）在碰头会上讨论后再发表。"},{"type":"paragraph","text":"[1]《红旗》杂志这篇社论稿原题为《总结经验》，毛泽东审阅时改为《关于总结经验》，并写了这个批语。此外，他还对这篇社论稿作了一些文字的修改，主要是将“革命在前进。形势是很好的。广大人民群众的积极性是很高的”，改为“革命在前进。形势是好的。广大人民群众的积极性是高的”；将“毛主席高度重视群众的创造和智慧，以伟大的无产阶级天才从理论上科学地概括和总结了群众中根本性的、有普遍意义的先进经验”一句中“以伟大的无产阶级天才”10个字删去；将“毛主席这个极其重要的指示，应当引起我们各级领导同志高度的重视，认真学习，认真执行”一句，改为“毛主席这个指示，应当引起我们各级领导同志的重视，认真学习，认真执行”。这篇社论，发表在1969年3月14日出版的《红旗》杂志第三、四期合刊，《人民日报》3月15日转载。"}],"authors":["毛泽东"],"dates":[{"year":1969,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":399,"page_end":399},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"560e789d27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
