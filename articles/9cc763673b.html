ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"在一份介绍老子哲学是唯物主义还是唯心主义的争论材料上的批语","alias":"","parts":[{"type":"paragraph","text":"在一份介绍老子哲学是唯物主义还是唯心主义的争论材料！上的批语"},{"type":"paragraph","text":"（1959年12月27日）印10份，交我为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"廿七日上午六时高智办。"},{"type":"paragraph","text":"[1]这份材料介绍说，在认为老子哲学基本上是唯物主义的人当中，一些人认为老子的自然观是唯物的，未涉及老子的认识论；另一些人认为老子的自然观和认识论都基本上是唯物的。而认为老子哲学基本上是唯心主义的人，则认为老子的自然观和认识论都是唯心的。上述双方从老子书中引证的话，一部分是相同的，但所作的解释各不相同；另一部分引文则各不相同。这篇材料还列举了《老子》一书中的十五段引文，分别介绍了持两种观点的人对这些引文所作的不同解释。"},{"type":"paragraph","text":"[2]高智，当时任毛泽东办公室秘书。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":12,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":533,"page_end":533},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cc763673b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
