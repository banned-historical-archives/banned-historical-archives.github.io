tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"追忆与毛主席相伴的日子","authors":["本良"],"parts":[{"type":"paragraph","text":"☆为毛主席当随行翻译，时常被他的妙语连珠所感染。他的语言生动，充满形象比喻，往往是以极通俗的语言，表达寓意深刻的哲理。对中苏公开论战如此重大的问题，他就曾轻松乐观地说：这种公开争论不要紧，不要那么紧张。第一条不死人，第二条天不会塌下来，第三条山上的草木照样长，第四条河里的鱼照样游，第五条女同志照样生孩子。毛泽东生动活泼的比喻，给外宾普遍留下极深刻的印象。他还轻蔑嘲讽地说：打文仗，打笔墨官司，写文章，这件事情还比较轻松愉快，没有死一个人！在毛泽东如此生动乐观的谈话面前，任何悲观的人恐怕也会把问题视若草芥的。"},{"type":"paragraph","text":"善于创造平和融洽的谈话气氛，是毛主席的特殊风度。记得他在1964年会见罗马尼亚总理时，一开始像叙家常似地问，对北京的气候是不是适应？罗马尼亚总理说，北京的气温同布加勒斯特差不多。谈话一下子就拉近了双方的距离。1965年9月30日，毛泽东、刘少奇接见访华罗马尼亚外长和总参谋长。当外长对中国成就发表了一大通赞扬的话后，毛泽东说：我们还有缺点，有错误！毛泽东的一句“大实话”，使在场的人都不禁畅怀大笑，气氛一下子热烈起来。他彻底的唯物主义观，更令人肃然起敬。"},{"type":"paragraph","text":"同毛泽东的亲身接触，我们感受最深的是他那极其亲切的态度，毫无“大人物”的影子。他那么平易近人，使得大家见他之前的紧张都烟消云散。1957年，他在宴请来访的西伦凯维茨总理时，谈话间歇就同坐在身旁的翻译毫无隔阂地聊起家常，问他是哪个大学毕业的？是什么地方人？使翻译感到家庭般的温馨。"},{"type":"paragraph","text":"在我们给毛泽东作翻译过程中，都曾担心过怕听不懂他的湖南土话。但是一上场，听到他那平缓易懂的湖南“官话”，心情马上就放松了。毛泽东讲话显然都很照顾翻译，不是大段大段地讲，一般都是一句一句慢慢地讲。即使发生个别容易混淆意思的话，前后文联系起来也就懂了。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfa57327ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
