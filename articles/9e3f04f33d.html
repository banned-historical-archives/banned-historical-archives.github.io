art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作在非洲和阿拉伯国家到处传颂","authors":[],"parts":[{"type":"paragraph","text":"毛主席著作在非洲和阿拉伯世界到处传颂，越来越多的人怀着无限崇敬的心情努力学习毛主席著作，用伟大的毛泽东思想指导自己的革命实践。"},{"type":"paragraph","text":"在刚果（利）的丛林里，爱国武装力量的战士们在战斗的间隙，热切地读着毛泽东著作的各种地方语译本。战士们从这些著作里吸取力量，武装自己的思想。"},{"type":"paragraph","text":"在撒哈拉大沙漠的西端的毛里塔尼亚，一位朋友从他的家里取出一本毛主席著的《〈共产党人〉发刊词》的法文译本。书已经被翻得很陈旧了，显然书的主人已经不知翻阅过多少遍了。他说：“在这里，几本毛泽东著作，得来可不容易啊！”"},{"type":"paragraph","text":"南部非洲各国在国外的自由战士们，许多人从头到尾仔细阅读《毛泽东选集》。他们讨论着一篇篇毛泽东著作。"},{"type":"paragraph","text":"在阿拉伯世界，叙利亚系统地出版了毛主席的著作。在贝鲁特，各种语文、各种版本的毛主席著作的小册子在流传，最近还出版了阿拉伯文版的《毛泽东选集》。在开罗，很早以前已经有人把《新民主主义论》、《矛盾论》等著作译成阿拉伯文出版。在约旦，毛主席的著作虽然被禁止，却仍然在秘密地传阅着。"},{"type":"paragraph","text":"在许多非洲和阿拉伯国家举办的中国展览会上，陈列毛主席著作的地方，总是最拥挤的地方。有人在聚精会神地翻阅毛主席的书。有人站在毛主席巨象面前凝视伟大领袖的面容，有人在为毛主席的健康祝福。中国的歌舞团、杂技团到过许多非洲和阿拉伯国家演出，千千万万的观众为他们演出喝采。尽管观众不懂中国话，可是他们都听得懂“毛泽东”这个名字。不管是唱《东方红》、《大海航行靠舵手》，还是别的什么歌子，只要一听到“毛泽东”的名字，立刻就是雷鸣般的掌声，或者是“毛泽东万岁”的欢呼声。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e3f04f33d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
