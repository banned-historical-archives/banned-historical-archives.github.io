ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"中央转发察哈尔省委关于进一步普及镇反宣传计划的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发察哈尔省委关于进一步普及镇反宣传计划的批语"},{"type":"paragraph","text":"（1951年5月16日）各中央局，并转分局，省委，区党委，市委，地委，县委："},{"type":"paragraph","text":"兹将察哈尔省委关于进一步普及镇压反革命宣传的计划发给你们。中央认为这个计划是完全正确和完全必要的，全国各地均照此计划去做。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"五月十六日"},{"type":"paragraph","text":"[1]中共察哈尔省委这个计划的主要内容是：（一）各级党委宣传部将镇压反革命的宣传作为当前工作重心之一。（二）各区普遍召开一次各界代表会，各村普遍举行若于次各阶层的座谈会，专门讲解《惩治反革命条例》，联系本区、本村的镇压反革命工作，进行讨论，使群众明了政策。（三）大力组织群众学习《惩治反革命条例》和防奸常识。（四）在镇压反革命的紧张阶段，应利用群众关心的每一个具体事件，经常向群众作报告。（五）各种对外宣传的报纸、刊物，均应发表专论。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":312,"page_end":312},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发察哈尔省委关于进一步普及镇反宣传计划的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":16}],"is_range_date":false,"parts":[{"text":"中央转发察哈尔省委关于进一步普及镇反宣传计划的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局，并转分局，省委，区党委，市委，地委，县委：","type":"appellation"},{"text":"兹将察哈尔省委关于进一步普及镇压反革命宣传的计划发给你们。中央认为这个计划是完全正确和完全必要的，全国各地均照此计划去做。","type":"paragraph"},{"text":" 中央五月十六日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85ccd66799"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
