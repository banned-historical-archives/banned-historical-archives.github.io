tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"李副总理会见坦桑友好联合代表团","authors":[],"parts":[{"type":"paragraph","text":"据新华社十月十五日讯 国务院副总理李先念今天下午会见了以坦桑尼亚国防和国民服务部副部长赛义夫·巴卡里为团长、内政部副部长姆丘莫为副团长的坦桑友好代表团。"},{"type":"paragraph","text":"会见时，李先念副总理请代表团转达华国锋总理、叶剑英委员长和邓小平副总理以及他本人对尼雷尔总统的问候。他赞扬尼雷尔总统在不结盟国家首脑会议上所起的积极作用。李副总理说，中坦友谊是毛主席、周总理和尼雷尔总统缔造的。我们要继续巩固和发展这种友好关系。"},{"type":"paragraph","text":"赛义夫·巴卡里团长祝贺中国在四个现代化的建设中取得的成就。他认为，代表团的这次访问进一步加强了坦中两国人民的友谊。"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0af11e81e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
