ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"在重庆的公开声明","alias":"","parts":[{"type":"paragraph","text":"在重庆的公开声明!"},{"type":"paragraph","text":"（1945年9月13日）"},{"type":"paragraph","text":"【合众社重庆十三日电】中国共产党主席毛泽东今日下午说：共产党的政策是在中国建立和平与民主，所以来重庆。按照两党协议，毛氏说不能评论与国民党领袖之间的谈判进行的情形，他说：“对于中国最重要的事情是和平。”毛氏说：共产党希望达到良好的结果，“这样，中国能够从抗日战争阶段过渡到和平建设的时期。相信这不仅是全中国人民的希望”，而是整个世界的希望。毛氏称，共产党将尽一切努力达到上述自的。"},{"type":"paragraph","text":"【路透社重庆十三日电】自国共会谈于两周前开始以来，共产党领袖毛泽东将军今天发表他第一次的公开声明说：全国人民都期望和平，我到重庆来尽一切努力以达到和平。我们共产党人希望会谈将有良好结果，使中国能由抗战转到和平建设的时期，毛氏说：目前双方保证不向外公布会谈的情形，但他希望会谈会成功。他又说：希望当谈判正在进行中，共产党军队与国民党军队之间不会发生冲突。共产党宁愿撤退，而不愿与国民党军队发生冲突，但他们仍然将继续与敌伪军作战。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":389,"page_end":389},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28bd68eb9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
