阿活动  阿尔巴尼亚党和人民彻底揭露赫鲁晓夫修正主义者的叛变也就是维护阿苏友谊","authors":[],"dates":[{"year":1965,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《人民之声报》揭露赫鲁晓夫继承人继续奉行背叛和投降路线"},{"type":"paragraph","text":"苏联新领导丝毫没有改变反阿活动"},{"type":"paragraph","text":"阿尔巴尼亚党和人民彻底揭露赫鲁晓夫修正主义者的叛变也就是维护阿苏友谊"},{"type":"paragraph","text":"新华社地拉那十日电　阿尔巴尼亚《人民之声报》五日发表评论指出，苏联新领导丝毫没有改变赫鲁晓夫的反对阿尔巴尼亚的目的和阴谋。"},{"type":"paragraph","text":"《人民之声报》为纪念阿尔巴尼亚—苏联友好协会成立二十周年（十一月五日）而发表的这篇评论说，赫鲁晓夫下台以后，他的继承人——勃列日涅夫、柯西金、米高扬三头执政，就象生活所证实的那样，除了改变策略和有某些小的差异之外，继续奉行着同一条背叛和投降路线，继续进一步加强同美帝国主义的合作、与美帝国主义同流合污反对马克思列宁主义力量，反对社会主义和民族解放运动，反对国际和平与安全。除了方法之外，苏联修正主义现领导反对社会主义阿尔巴尼亚的目的和阴谋活动丝毫没有改变。他们所说的“友谊”、“团结”等话只不过是蛊惑宣传和骗人之词，以便掩盖他们与赫鲁晓夫一样的罪恶目的；他们所说的“友谊”、“团结”的空话，是在困难时期企图延长不可避免的可耻失败的现代修正主义寿命的可悲努力。"},{"type":"paragraph","text":"评论在谈到阿尔巴尼亚和苏联两国人民的传统友谊以及赫鲁晓夫修正主义集团破坏这一友谊的情况后说，阿尔巴尼亚人民、阿尔巴尼亚劳动党在彻底揭露赫鲁晓夫修正主义者叛变的时候，不仅维护着马克思列宁主义和社会主义胜利，同时也维护着赫鲁晓夫及其追随者企图破坏的阿苏友谊。"},{"type":"paragraph","text":"评论说，阿尔巴尼亚和苏联两国人民之间的友谊诞生于反对共同敌人的火热斗争之中，在同一个理想和目的鼓舞之下，它是没有力量能够破坏的。被劳动党以无产阶级国际主义教育出来的我国人民，将永远把同苏联人民的友谊看成是神圣的东西而加以维护。我们深信，赫鲁晓夫修正主义者为破坏这一友谊而散布的乌云，他们与我国人民为敌而设置的障碍，必将被驱散和粉碎，我们的友谊之花盛开的时候必将到来，修正主义叛徒遭到各国人民的所有敌人的同样命运的时候必将到来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1c4ce09fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
