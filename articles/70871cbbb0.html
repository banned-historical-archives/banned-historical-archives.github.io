<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不让资产阶级思想钻空子","authors":["潘振玉"],"dates":[{"year":1965,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"看了你报发表的有关“怎样健康地开展节日活动”的读者来信后，对于“节日活动不能仅仅为了开开心”这一点，感触很深。回忆自己过去在节日活动方面也有过深刻的教训。"},{"type":"paragraph","text":"我是华东化工学院去年的毕业生，由于爱好音乐和戏曲，每逢节日，总要参加一些节目的演出。但当时对节日文娱活动的目的和意义认识不清，总认为不过是让大家“开开心”，调剂调剂精神。因此，在选择节目时，不大考虑思想内容，演出了一些不健康的节目，成了帝王将相、才子佳人的俘虏，传布了资产阶级和封建主义的思想。"},{"type":"paragraph","text":"记得在前年的一个节日，在“开开心”的思想指导下，我选择了中篇评弹《点秋香》作为演出的节目。当时我想，这个书目艺术性很高，富有戏剧性，一定会受到群众欢迎。谁知演出以后，产生了很坏的影响，少数同学竟学起唐伯虎点秋香的语言和腔调，对男女同学，甚至对老师也评头品足起来。但是也有不少同学对我提出了批评，有的说:“我们新中国的青年，为什么要去学那些‘才子佳人’的怪腔呢?”有的说:“我们社会中的新人新事多得很，为什么要替那些死了不知多少年的贵族老爷讲话呢?”事后想想，这种单纯为了“开开心”的思想是多么要不得呀!"},{"type":"paragraph","text":"通过这件事，使我认识到，节日的文娱活动，也是一个重要的思想阵地。如果我们单纯地为了“开开心”，就会给资产阶级思想钻空子。因为“开开心”本身，也有两种，资产阶级有它的“寻开心”的方式，而无产阶级有无产阶级所喜闻乐见的东西。无产阶级如果不去占领这个阵地，资产阶级就会利用这个阵地传布和宣扬他们的思想，来侵蚀我们。因此，我们在以后的节日文娱活动中，就强调了政治挂帅，用无产阶级的观点开展活动。最近的一次节日活动，我们就大演有革命意义的节目，反应很好，群众满意。记得有次演出的是根据学校中学习雷锋以后出现的新人新事而编写的《十二张车票》。演出以后，有的人说:“看了这种节目，才使人心情舒畅、意气风发。”有很多人学习了《十二张车票》内的先进人物的行动，在候车和乘车时主动担负维持秩序的工作。从这个事例，使我进一步认识到:节日文娱活动这个阵地必须牢牢掌握在无产阶级手里，千万放松不得。"},{"type":"paragraph","text":"上海化学工业研究院　潘振玉"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70871cbbb0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
