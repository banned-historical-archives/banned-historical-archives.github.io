" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"中共中央关于取消军委办公会议，成立中央军委常委的通知","alias":"","parts":[{"type":"paragraph","text":"毛王席已圈阅。"},{"type":"paragraph","text":"中共中央关于取消军委办公会议、"},{"type":"paragraph","text":"成立中央军委常委的通知"},{"type":"paragraph","text":"(一九七五年二月五日）"},{"type":"paragraph","text":"（一）为了加强军队建设和战备工作的领导，毛主席、党中央决定取消军委办公会议，成立中国共产党中央军事委员会常务委员会。"},{"type":"paragraph","text":"（二）叶剑英、王洪文、邓小平、张春桥、刘伯承、陈锡联、汪东兴、苏振华、徐向前、聂荣臻、粟裕十一位同志为常务委员。军委常委会由叶剑英同志主持。"},{"type":"paragraph","text":"总参谋部第一副总长，总政治部第一副主任，总后勤部党委第一书记，军委办公厅主任列席常委会议。"},{"type":"paragraph","text":"（三）军委党委会是在毛主席、党中央领导下，处理军委日常工作的办事机构。对军内外一律用军委名义，不用军委常委会名义。"},{"type":"paragraph","text":"学好无产阶级专政的理论"},{"type":"paragraph","text":"（一九七五年二月九日）"},{"type":"paragraph","text":"《人民日报》社论伟大领袖毛主席最近作了关于理论问题的重要指示。"},{"type":"paragraph","text":"毛主席指出，列宁为什么说对资产阶级专政，这个问题要搞清楚、“这个问题不搞清楚，就会变修正主义。要使全国知道”。"},{"type":"paragraph","text":"毛主席这个指示，对于进一步理解和贯彻执行党的基本路线，对于普及、深人、持久地开展批林批孔运动，搞好反修防修的斗争，加强全国各族人民的革命团结，具有重大的现实意义和深远的历史意义。"},{"type":"paragraph","text":"无产阶级夺取政权以后，必须对资产阶级实行专政，这是马克思主义的基本原则。列宁在同第二国际修正主义的斗争中，·对无产阶级专政的必要性和它的任务，作了深刻的论述。毛主席根据马克思主义关于无产阶级专政的学说，总结了国际共产主义运动和我们党的历史经验，提出了在无产阶级专政下继续革命的理论，为我们党制定了一条在整个社会主义历史阶段的基本路线。马克思主义、列宁主义、毛泽东思想关于无产阶级专政的理论，是搞好社会主义革命和社会主义建设的指路明灯。我们一定要认真学好，懂得为什么要对资产阶级专政，懂得无产阶级专政的任务是什么，懂得怎样为巩固无产阶级专政而斗争。"},{"type":"paragraph","text":"毛主席亲自发动和领导的无产阶级文化大革命运动，是无产阶级专政下继续革命的伟大"}],"authors":[],"dates":[{"year":1975,"month":2,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":230,"page_end":230},"tags":[{"name":"叶剑英","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c16fda7b6a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
