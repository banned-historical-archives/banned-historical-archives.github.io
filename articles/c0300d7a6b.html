tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把林彪同志号召传播到各个角落让人人都更好地学习毛主席著作","authors":["田野徐玉山"],"parts":[{"type":"paragraph","text":"本报讯 某医院在传达和学习林彪同志的指示中，组成了由医生、护士、技术员、卫生员、广播员、电工、炊事员等四十多人参加的毛泽东思想宣传队。他们利用午休、晚上等业余时间，赶排文艺节目，到宿舍区和病房进行宣传和演出。伤病员和家属们看过演出后，兴奋地说，我们一定响应林彪同志号召，更好地读毛主席的书，听毛主席的话，照毛主席的指示办事。"},{"type":"paragraph","text":"通过宣传活动，全院人员积极贯彻林彪同志的指示，大学毛主席著作，大立毛泽东思想。全院人员普遍做到了开会前、交接班前、查房前、谈话前先学习毛主席语录。医护人员和领导干部踊跃参加学习毛主席著作讲用会，大家互相学习，改造思想，交流经验。（田野、徐玉山）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0300d7a6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
