":["谢富治"],"dates":[{"year":1967,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"谢富治在北京西单商场武斗后的讲话","type":"title"},{"text":"谢富治","type":"authors"},{"text":"摘要：","type":"paragraph"},{"text":"商场糟蹋成这个样子，国家财产受到严重损失，你们算是什么革命派。这个商场要展览十天，让全市工人都看看，把两个组织的名字用大标语写上，在北京市出个名，双方组织支援的单位也全写上名，通过调查要把凶手搞臭。工人百分之九十都是好的，可以通过辩论，不要打骂，为什么要调人？（红造会说：我们只有六十个人）他们还能把你们吃掉？打死人我负责，让北京全市的工人和学生鉴定看看，你们做得对不对。两派的头头都有私心杂念。在展览时要军队保护现场。","type":"paragraph"}],"comments":[],"origin":"1967年8月15日红代会清华井冈山一部第三动态组编《动态》第123期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"199abbeaf6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
