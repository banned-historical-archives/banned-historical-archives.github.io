rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“我爱毛泽东”","authors":[],"parts":[{"type":"paragraph","text":"哈瓦那古中友好协会业余中文学习班开办已经一年多，现在有两个年级，四十多个同学。"},{"type":"paragraph","text":"中国记者去的那天，离上课还有三刻钟，但已有三个同学等在门外了。记者问一位两鬓斑白的港口工人何塞·曼努埃尔：“您这么大年纪，学中文不感到困难吗？”他说：“困难是有啊！可是我喜爱中国，敬佩毛泽东主席，我想看中文书，更多地了解这个伟大的兄弟国家。就是难，我也要学。”"},{"type":"paragraph","text":"课间休息的时候，记者和同学们一起谈天。他们有的想当中文翻译，有的想研究中国的历史文化，有的想看中文的《毛泽东选集》。"},{"type":"paragraph","text":"记者翻看了几个同学的练习本，看到用中文写的：“古巴人民爱中国”、“我爱毛泽东”、“我想去中国”等造句。豪尔赫给老师写了一封中文短信，信中说：“我一定要把中文学习好，希望有机会能到中国去。同时还希望能看到中国在共产党和毛主席的英明领导下，在建设上的大跃进。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c06c75e34e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
