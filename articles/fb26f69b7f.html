script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚和比利时青年学生组织分别发表声明和公报  反对改变世界青年联欢节地址  谴责帝国主义和修正主义者勾结干涉阿尔及利亚内政","authors":[],"dates":[{"year":1965,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚和比利时青年学生组织分别发表声明和公报"},{"type":"paragraph","text":"反对改变世界青年联欢节地址"},{"type":"paragraph","text":"谴责帝国主义和修正主义者勾结干涉阿尔及利亚内政"},{"type":"paragraph","text":"新华社地拉那七日电　据此间报纸今天报道：第九届世界青年学生联欢节阿尔巴尼亚全国筹委会六日发表声明，表示坚决反对第九届联欢节国际筹委会常委会一九六五年六月二十五日通过的决议。"},{"type":"paragraph","text":"声明指出，这一决议是对民主和相互协商原则的明目张胆的破坏，也是对联欢节东道国阿尔及利亚民主人民共和国内政的粗暴干涉。"},{"type":"paragraph","text":"声明说，常委会超越了自己的职权，在苏联代表的操纵下，不顾全体会议作出的一致决议，不同阿尔及利亚民族解放阵线青年组织商量，在六月二十五日作出这个决议，这是分裂国际民主青年运动的严重行动。"},{"type":"paragraph","text":"声明说，阿尔巴尼亚青年认为确定阿尔及利亚作为联欢节的东道国，这是对英雄的阿尔及利亚人民的尊敬，是对为反对以美国为首的帝国主义和新老殖民主义而斗争的非洲大陆的尊敬。因此，第九届联欢节阿尔巴尼亚全国筹委会重申绝不承认联欢节国际筹委会常委会六月二十五日的决议。"},{"type":"paragraph","text":"新华社七日讯　布鲁塞尔消息：比利时第九届世界青年和学生联欢节筹备委员会六日发表公报，"},{"type":"paragraph","text":"“谴责国际筹委会某些领导人作出的关于企图阻挠第九届世界青年和学生联欢节在阿尔及尔举行的反民主的决定”。公报指出，这种作法是对阿尔及利亚内部事务的干涉。"},{"type":"paragraph","text":"公报建议，这次联欢节“仍按原定日期在阿尔及尔举行”。"},{"type":"paragraph","text":"同一天，比利时共产主义青年联盟和比利时共产主义学生联盟也就此发表公报，谴责帝国主义者和赫鲁晓夫修正主义者勾结一起，干涉阿尔及利亚内部事务，并建议第九届联欢节如期在阿尔及尔举行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb26f69b7f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
