" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"有些社队在社会主义教育运动中违法乱纪","authors":["新华通讯社","肖彦","长沙"],"dates":[{"year":1963,"month":1,"day":8}],"is_range_date":false,"parts":[{"text":"有些社队在社会主义教育运动中违法乱纪","type":"title"},{"text":"新华通讯社长沙肖彦","type":"authors"},{"text":"新华社长沙讯  据常德地委监委反映：目前常德地区农村已普遍开展社会主义教育运动，有效地促进了当前生产和各项工作。但据重点检查和各县反映，有些地方出现了一些违法乱纪的现象。","type":"paragraph"},{"text":"常德县有三个公社、十三个大队发生非法斗人和打人现象。如韩公渡公社锁龙庵大队，在一次群众会上斗争了六人，其中有贫农五人。安化县龙塘公社小惠片召开的四百多人的斗争大会上，被斗者都跪在地下，有五人被绑起毒打。","type":"paragraph"},{"text":"常德县天坪公社赵家湾大队第八生产队，过去因农具保管不善，失散很多，在这次社会主义教育中，干部挨户到社员家搜查，引起社员严重不满。","type":"paragraph"},{"text":"常德县长岭岗公社新华大队，把搞家庭副业、多搞自留地的都称为“资本主义分子”。该县南坪公社双桥大队制了一个高帽子，上写“不爱集体”、“搞副业不交钱”、“做投机生意”，准备给有这种行为的社员轮流戴上示众。","type":"paragraph"},{"text":"常德县有七个公社出现了乱立罚规的现象。如韩公渡公社规定了“运动工分”，即积极参加会议的奖工分，参加会议不积极的罚公分。谢家铺公社党委在自己的重点大队规定，在社会主义教育运动中不参加会议的干部，初犯检讨，再犯罚工分五十分；社员不参加会议，初次当众检讨，再犯罚工分一百分。安乡县安尤公社孟家洲大队规定，外出做生意的，限七天内回来，否则拆他的屋、驱逐出境。","type":"paragraph"},{"text":"汉寿县护城公社周文庙大队黄家湾生产队，在社会主义教育运动中，评了六个“五坏”社员，并召开会议发动群众向“五坏”社员提意见，挖思想根子。常德县周家店公社在运动中先评出“无好”社员，然后进行大会批判。汉寿县毛家滩公社和平大队第八生产队，在评出的“无好”社员的门上贴一白条，进行侮辱。","type":"paragraph"},{"text":"这些现象，虽只在少数地方发生，但在政治上造成很不好的影响，使得一些社员心情惶恐紧张，对党的政策发生怀疑，有的因害怕而外逃他乡。省委已要求各地坚决制止这些违法乱纪现象。","type":"paragraph"},{"text":"来源：1963年1月8日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4146cba498"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
