<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们打虎战斗中发现那些右倾思想?","authors":["旻枫"],"dates":[{"year":1952,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"旻枫"},{"type":"paragraph","text":"在打虎战役中，必须克服右倾思想，才能胜利前进。路局上海电机厂在第一、第二打虎战役中，曾经发生过各色各样的右倾现象，都及时加以纠正。例如:"},{"type":"paragraph","text":"老虎萧士修在配件工工场全体大会上哭得非常伤心，诉说自己没有贪污罪行。当场即有两个工人陪着他流泪，并且竟有一个工人站起来说:“萧主任是好人，不会贪污的。”但当场即有好多同志以萧士修的贪污事实予以坚决反驳，才使全体同志认识到“哭”是贪污分子的鬼把戏。"},{"type":"paragraph","text":"贪污犯常表示愿意写保证书，坚决表示“我没有贪污，如果查出贪污行为，愿受法律制裁”。有时往往写上两次到三次，部份同志就上了他的当，认为真的没有问题了，否则他怎敢拿生命开玩笑?但等到最后打出老虎时，方才大吃一惊，发觉自己上了贪污分子的当。"},{"type":"paragraph","text":"到贪污分子家里去了解情况，一看到贪污分子的家属哭穷，说家里饭都没有吃，个别同志就感到他家穷，“连被子也没有”，就觉得这家伙未必贪污。他没有想到贪污分子在三反运动一开始，早就把箱子移动了。"},{"type":"paragraph","text":"当贪污分子狂叫“这样搞要出乱子，出人命”时，少数同志也同意了这种说法，以为确实太“过火”了，过左了。他们不懂得这是老虎的谬论，是老虎的手段。"},{"type":"paragraph","text":"电厂坦白检举达到高潮时，有三十二个贪污分子坦白了贪污罪行，但多数不彻底，只谈了些“鸡毛蒜皮”，大贪污犯根本就没有坦白，可是竟有人认为反贪污斗争搞得“差不多”了，不必再搞下去了；否则会“影响生产任务的完成”。可是当大小老虎现出原形后，才真正认识到，不是差不多，而是“差得多”。但后来又有个别同志看到已经捉出好几只老虎，就认为这下该可以“鸣金收兵”了。"},{"type":"paragraph","text":"个别包打老虎的同志，看到其他组里纷纷传出捷报，自己心里干着急，跟着就苦闷起来，失去了信心，自己又不研究办法，抱着等待思想，等老虎自己出来坦白，有时还到处叫苦，感到这样打下去，“遥遥无期”，觉得希望很少，可是经过指挥员的具体帮助，采用新的战术打下了老虎之后，方如释重负的说:老虎到底逃不出我们的手掌心。"},{"type":"paragraph","text":"更严重的是有个别股主任说:“我们股里没有贪污，某某人很老实，不会贪污的”，思想麻痹，真是“打虎无力，养虎有能”，结果呢?大小老虎就在他的沙发背后，等到群众将老虎拉出来的时候，才大吃一惊说:“我太官僚主义了，老虎真狡猾。”"},{"type":"paragraph","text":"大小老虎都有一手杀手锏，这就是“翻供”，哭喊着“冤枉”，说你们不相信可去调查，我愿留厂反省三个月，你们去调查，这样一来，就吓坏了个别胆小的同志，以为可能真的冤枉的，否则他那有这么大的胆量敢于“翻供”呢?就此裹足不前，犹豫不决。"},{"type":"paragraph","text":"对老虎没有仇恨心，不是把老虎当敌人看，而是因为老同事、老同学的缘故拉不下脸，对待留厂反省的老虎非常客气，竟陪着老虎睡觉，烤年糕给老虎吃，安慰老虎，不愿伤感情。甚至有个别同志反被老虎责问，居然唯唯诺诺，不敢严厉反驳。没有划清敌我，站稳立场，没有认识到这是残酷的阶级斗争。"},{"type":"paragraph","text":"这许多右倾思想的表现，曾经存在于好些同志身上，曾经使工作受到很大影响，但经过不断的教育，不断的纠正，尤其是事实的教育，使打虎队员同志受到了一次再次的战斗的锻炼和伟大的考验。现在我们电厂打虎大军已经是一支有组织、有纪律的打虎队，获得极丰富的打虎经验，能够应付任何顽强狡猾的老虎，能够活擒花样百出的老虎。老虎的花样再也没有用了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b8c7e49f5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
