le":{"title":"中国农业银行关于监督支付城市下乡知识青年和闲散劳动力安置经费的通知","dates":[{"year":1964,"month":7,"day":2}],"is_range_date":false,"authors":["中国农业银行"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国务院知青办, 知青工作文件选编, 172-173","tags":[],"parts":[{"type":"title","text":"中国农业银行关于监督支付城市下乡知识青年和闲散劳动力安置经费的通知"},{"type":"subtitle","text":"（一九六四年七月二日）"},{"type":"subtitle","text":"(64)农银公陈字第82号"},{"type":"paragraph","text":"中共中央、国务院今年五月三十一日批转了中央安置城市下乡青年领导小组“关于落实一九六四年安置城市下乡知识青年和闲散劳动力计划的报告”。中央安置领导小组办公室和财政部最近又就支出预算指标和预算管理发出了通知，希你行迅即与主管部门、财政部门联系按照上述两个文件规定，把这项拨款的监督支付工作管理起来。"},{"type":"paragraph","text":"监督过程中，应注意的事项，希按照以下规定办理："},{"type":"paragraph","text":"一、安置经费采取实拨资金的办法管理，即由主管部门根据财政部门预算安排的安置经费指标，提出用款计划，报经同级人民委员会批准后，由财政部门将款拨给主管部门存入农业银行。农业银行对属于中央级的安置经费以829“事业费存款”科目内设“城市下乡安置费专户”核算；属于地方级的以927“地方城市人口下乡安置费拨款”科目核算；用款单位支用时，以928“地方城市人口下乡安置费支出”科目核算。"},{"type":"paragraph","text":"二、安置经费是一项专案拨款，先存后用。属于中央级的按用款单位立户，属于地方级的，农业银行应根据插场（包括国营农牧场、林场、渔场，以下同）、插队和水土保持专业队分别立户。"},{"type":"paragraph","text":"三、用于插场和水土保持专业队的安置经费，由用款单位根据核定的费用定额和规定的用途，编制具体用款计划，报经主管部门批准后，由主管部门将计划抄送同级农业银行按计划监督支付。"},{"type":"paragraph","text":"四、用于插队的安置经费，以县为单位办理，由县主管部门根据县人委批准的安置计划层层落实到生产队；财政部门根据核定的安置计划核定用款计划，并将款拨交县支行；县支行应认真审查，监督支付，对于应拨交生产队的部分，由支行汇给接受安置的生产队。"},{"type":"paragraph","text":"五、各级农业银行（包括营业所）应会同主管部门、财政部门定期检查安置城市下乡知识青年和闲散劳动力的住房、生产、生活是否落实，发现问题及时向党政领导汇报，提出意见，积极协同有关部门妥善解决。"},{"type":"paragraph","text":"以上意见，希遵照办理。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a76e28c3c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
