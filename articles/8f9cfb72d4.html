script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"韬奋夫人斥伪君子王造时以“七君子”案件作为政治资本，二十年前就投靠国民党，他是拉斯基　的信徒，一心一意想维护资产阶级统治。","authors":[],"dates":[{"year":1957,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　韬奋夫人沈粹缜，在昨日上海市人代会会议上进一步揭露王造时的“伪君子”面目。"},{"type":"paragraph","text":"沈粹缜首先戳穿王造时“一贯追随党”的谎言。她说:王造时在“七君子”案件时主张抗日救国，动机仅仅在于获取政治资本，依靠国民党，出狱后的事实完全可以证明:王造时在出狱后立即投奔国民党，任伪南京大本营第二部(战略部)及国民党组训部委员，1938年在南昌任国民党政治讲习院教务主任，以后又担任了国民党的军风纪巡察委员等职向国民党卖身投靠。"},{"type":"paragraph","text":"其后，到1941年国民党发动皖南事变以后，王造时在他主编的“前方日报”上发表题为“二届参政会感言”的社论，竟对共产党拒绝参加参政会的正义行动表示“遗憾”，说什么“军令必须一个，组织必须一个”，实质上是支持国民党的“军令统一、政令统一”，帮助国民党向八路军新四军和边区政府进攻。沈粹缜质问王造时:“你追随的是什么党?”"},{"type":"paragraph","text":"沈粹缜又揭露了王造时二十年前就向往反动的费边社会主义。王造时在看守所时期，翻译和出版了拉斯基著的“国家的理论与实际”，他企图以资产阶级欺骗工人阶级的理论来模糊中国工人阶级，维护资产阶级的统治。"},{"type":"paragraph","text":"最后沈粹缜忠告王造时，从根拔除自己的资产阶级复辟幻想，老老实实向大会作彻底交代。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f9cfb72d4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
