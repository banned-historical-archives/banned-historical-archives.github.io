script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"刘邓军出大别山的准备工作","alias":"","parts":[{"type":"paragraph","text":"刘邓军出大别山的准备工作"},{"type":"paragraph","text":"（1947年7月30日）刘、邓\"，并告陈、谢、韩，及陈、粟、谭："},{"type":"paragraph","text":"午陷电悉。如你们决心直出大别山，请注意下列各点："},{"type":"paragraph","text":"（一）开一次团长以上千部会，除告以各种有利条件外，并设想各种困难条件，建立远征意志。"},{"type":"paragraph","text":"（二）营长以上每人发鄂豫皖三省有县境的明细地图一份，油印的亦好，如能每连发一份更好，使一切干部明白地理环境。"},{"type":"paragraph","text":"（三）大体确定征粮、征税办法，告知一切干部，土地革命时期"},{"type":"paragraph","text":"[1]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。"},{"type":"paragraph","text":"[2]陈、谢、韩，指陈、谢富治、韩钧，当时分别任晋冀鲁豫野战军陈谢集团前委书记、副书记和常委。"},{"type":"paragraph","text":"[3]陈、粟、谭，指陈毅、粟裕、谭震林，当时分别任华东野战军司令员兼政治委员、副司令员和副政治委员。"},{"type":"paragraph","text":"[4]指刘伯承、邓小平1947年7月30日给中共中央军委等的电报。电报说：连日来我们再三考虑军委23日电提出的方针，恰好顷接29日电，决心于休整半个月后出动，以适应全局之需。照现在情况，我们当面有敌19个旅，至少有10个旅会尾随我部行动，故我部不宜仍在豫皖苏，而以直趋大别山，先与陈谢集团成角之势，实行宽大机动为适宜，准备无后方作战。建议陈士、唐亮兵团在鲁西南拉一下敌人，山东抽出原皮定均旅到大别山作军区骨干。打土豪办法所得不多，名誉又坏，在我方政权未建立以前，仍应暂时利用国民党下层机构及税收机关（在我党有力人员监督指挥之下），以大体上的累进方法征粮，惟免除赤贫人口负担，方能解决大军给养。国民党人员未逃跑者，除极坏分子外，均可利用，逐步过渡到人民政权。"},{"type":"paragraph","text":"（四）如皮定均旅\"一时调来不及，请考虑以赵纵使用于大别山。该纵由潼洛渡后直趋大别山。陈谢则使用三十八军于豫西建立根据地。"},{"type":"paragraph","text":"（五）如你们决定直趋大别山，决心不要后方，亦应使陈谢建立此种决心。如陈谢于八月下旬渡河，可能争取一个月时间，在豫西立住脚跟。胡军主力由靖边、横山线南调，估计至少须一个月行程，该敌十分疲劳。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"午三十"},{"type":"paragraph","text":"[1]皮定均旅，指原中原军区第一纵队第一旅，旅长皮定均。该旅此时编为华东野战军第一纵队独立师，皮定均已调任第六纵队副司令员。"},{"type":"paragraph","text":"[2]赵，指赵基梅，当时任晋冀鲁豫野战军第十二纵队司令员。[3]潼、洛，指陕西潼关和河南洛阳。[4]：胡，指胡宗南，当时任国民党军西安绥靖公署主任。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":7,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":173,"page_end":174},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bda5384b3a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
