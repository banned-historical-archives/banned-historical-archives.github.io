ear":1965,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理接见亚非国家工会代表团"},{"type":"paragraph","text":"新华社二日讯　邓小平副总理今天上午接见应邀来我国参加“五一”国际劳动节庆祝活动的来自亚洲、非洲二十一个国家和地区的工会代表团和代表，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"被接见的代表团，有以陈怀南为首的越南南方劳动解放协会代表团，以哈迪西斯禾约为首的印度尼西亚工人代表团，以克·阿·姆·森纳努为首的全非工会联合会代表团，以鲁希·赫德尔·扎姆尔为首的阿拉伯工会国际联合会代表团，以帕斯卡尔·鲁武雅鲁为首的安哥拉全国工人联合会代表团，以胡斯克·萨勒·库法什为首的巴勒斯坦工会联合会代表团。被接见的，还有锡兰、日本、巴基斯坦、阿尔及利亚、巴苏陀兰、刚果（布）、达荷美、冈比亚、加纳、几内亚、肯尼亚、马里、摩洛哥、南非、苏丹、坦桑尼亚、阿联等国家和地区的工会代表团和代表。"},{"type":"paragraph","text":"接见时在座的，有中华全国总工会主席刘宁一，副主席朱学范、马纯古，书记处书记张维桢、顾大椿、康永和、张天民、赵国强、黄民伟等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d02b01ad50"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
