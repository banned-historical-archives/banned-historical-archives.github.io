year":1952,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社天津十一日电】　天津市全市店员五反运动捉虎竞赛动员大会，上书毛主席报告他们的战绩。全文如下:"},{"type":"paragraph","text":"敬爱的毛主席:"},{"type":"paragraph","text":"我们天津市七万店员，在您的领导号召下，组成了一支坚强的战斗大军，包括二百七十六个战斗小组，在反行贿、反偷税漏税、反盗窃国家资财、反偷工减料、反盗窃国家经济情报的斗争中，我们采取层层包围、内外夹攻的战术，向资产阶级猖狂的进攻，进行了强烈的反击。从一月二十日起截至目前止，我们已捉到了偷税漏税、行贿、盗窃国家资财等十亿以上的“大老虎”一百七十七个，这是对不法奸商反击中的第一个胜利。今后我们更要深入地发动全市店员，再接再励，乘胜追击，不到全胜，决不收兵。"},{"type":"paragraph","text":"我们确信，在您的英明领导下，我们将要获得更大的胜利，捉到更多的“大老虎”。"},{"type":"paragraph","text":"敬祝您"},{"type":"paragraph","text":"身体健康"},{"type":"paragraph","text":"天津全市店员五反运动捉虎竞赛动员大会敬上"},{"type":"paragraph","text":"二月十一日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bc6d8041b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
