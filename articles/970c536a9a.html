平、赵紫阳、李先念、陈云主持会议　邓小平、陈云作重要讲话　一致通过《中共中央关于整党的决定》，选举产生了中央整党工作指导委员会　全会还决定中央于今冬明春召开会议专门讨论关于加强思想战线工作的问题","authors":[],"dates":[{"year":1983,"month":10,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十月十二日电　中国共产党第十二届中央委员会第二次全体会议公报"},{"type":"paragraph","text":"(一九八三年十月十二日)"},{"type":"paragraph","text":"中国共产党第十二届中央委员会第二次全体会议，一九八三年十月十一、十二日在北京举行。在此之前，举行了预备会议。"},{"type":"paragraph","text":"中央政治局常委胡耀邦、叶剑英、邓小平、赵紫阳、李先念、陈云出席并主持会议。到会的中央委员二百零一人，中央候补委员一百三十六人。中央顾问委员会委员一百五十人，中央纪律检查委员会委员一百二十四人，中央机关和地方党委的负责同志十一人，列席了会议。"},{"type":"paragraph","text":"会议经过认真热烈的讨论，一致通过了《中共中央关于整党的决定》。这个决定，体现了党的十二大的精神，明确规定了这次整党的基本方针、基本任务、基本政策和基本方法。全会认为，这个决定的贯彻执行，必将保证整党工作正确地顺利地进行。"},{"type":"paragraph","text":"为了保证整党工作的日常领导，这次全会经过充分酝酿，选举产生了中央整党工作指导委员会。"},{"type":"paragraph","text":"在这次全会上，邓小平同志、陈云同志就整党问题分别作了重要讲话。邓小平同志在讲话中，还提出了加强思想战线工作的问题。全会决定中央于今冬明春召开会议，专门讨论这个问题，并作出相应的决定。"},{"type":"paragraph","text":"全会依照党章规定，决定递补中央候补委员杨泰芳、郎大忠(傣族)为中央委员。"},{"type":"paragraph","text":"全会决定增补魏文伯、奎璧(蒙古族)、张苏、杜星垣、贾庭三为中央顾问委员会委员，以后提请下届党的全国代表大会追认。"},{"type":"paragraph","text":"全会号召全体党员，认真学习《中共中央关于整党的决定》，积极参加整党。全会相信，经过各级党组织和广大党员的共同努力，我们一定能够胜利地完成这次整党的伟大任务，一定能够实现党风的根本好转，一定能够把我国社会主义物质文明和精神文明的建设推向前进。"},{"type":"paragraph","text":"\u003cIMG alt=请插入8号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1983\\10\\83AD010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中共中央政治局常委胡耀邦、叶剑英、邓小平、赵紫阳、李先念、陈云同志在主席台上。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入8号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1983\\10\\83AD010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e图为胡耀邦同志主持会议。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"陈云","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"970c536a9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
