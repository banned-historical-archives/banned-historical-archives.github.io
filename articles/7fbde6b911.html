script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"三十年来受剥削  如今当了副厂长","authors":["严洁忱"],"dates":[{"year":1951,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"三十年来受剥削  如今当了副厂长"},{"type":"paragraph","text":"出席全国劳模代表会议代表开封修配厂副厂长  严洁忱"},{"type":"paragraph","text":"我过去摸了三十多年的机器，受尽了反动统治者的压迫和剥削。他们只知道使黑心眼儿，谋自己的享受，根本就不拿我们工人当人看待。我在那时候，也不懂得啥样子是为国家、为老百姓；只知道“吃饱饭混天黑”。一切认为是自己命苦。到今天，有了共产党和毛主席的英明领导，我们才翻了个个儿，当了国家的主人。眼下上下一条心生产建设，光景越过越美气。我这个从前什么人都瞧不起的臭工人，如今也当上副厂长哪！以后更要努力学习，积极工作，开动脑筋，发明创造，多提合理化建议。想办法把生产搞得更好，让咱们的国家早一点走向更美满的社会。"},{"type":"paragraph","text":"我们厂目前正在开展抗美援朝保家卫国运动。大伙提出“工厂是战场，机器当武器”的口号，争取在生产上打胜仗。就在这短短时期，在全体工友热火潮天的干劲下，提前超额完成了一九五○年下半年的生产任务。此外又仿造十八英寸牛头刨床两部。现在正准备大量增产线路上必需的配件，争取一九五一年进一步修好咱们的人民铁路。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fbde6b911"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
