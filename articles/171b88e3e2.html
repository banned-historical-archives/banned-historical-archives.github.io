art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国文化大革命像东方的太阳光芒四射","authors":[],"parts":[{"type":"paragraph","text":"越南一位画家最近写信给中国朋友，热烈赞扬毛泽东思想和中国无产阶级文化大革命。信中说，毛主席“创造性地、天才地继承和发展了马克思列宁主义”。"},{"type":"paragraph","text":"这位画家热情洋溢地代表全家，“敬祝伟大的领袖毛主席万寿无疆，领导无产阶级文化大革命取得伟大的成功。”"},{"type":"paragraph","text":"信中用诗一样的语言，歌颂伟大的领袖毛主席说：“我凝视着雄伟的天安门广场的照片，东方灿烂的太阳——毛泽东思想，像不朽的春天永远光耀夺目，给千百万人民和整个人类世界带来光明，她使向阳花盛开，她使所有正在沉睡的人们觉醒。”"},{"type":"paragraph","text":"信中说，中国“无产阶级文化大革命开辟了一个新纪元。它像东方的太阳光芒四射，驱散长时期来笼罩着世间的乌云。”“它将在每一个角落揪出一切披着袈裟的牛鬼蛇神，并将给工农阶级、革命干部和革命知识分子带来新的灵魂。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"171b88e3e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
