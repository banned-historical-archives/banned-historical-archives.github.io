script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各国代表在古巴土改辩论会上同声指出  美国剥削是拉丁美洲贫困根源  拉丁美洲各国人民必须生死与共安危同济","authors":[],"dates":[{"year":1959,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各国代表在古巴土改辩论会上同声指出"},{"type":"paragraph","text":"美国剥削是拉丁美洲贫困根源"},{"type":"paragraph","text":"拉丁美洲各国人民必须生死与共安危同济"},{"type":"paragraph","text":"新华社哈瓦那12日电　古巴首都土地改革辩论会上星期进入热烈辩论阶段。参加这个辩论会的古巴人民和拉丁美洲国家的代表在会上愤怒地谴责美帝国主义残酷地掠夺他们的财富和阻挠拉丁美洲的经济发展。辩论会是在6月28日在“7月26日运动”的主持下开始的。参加辩论会的有九十个团体的代表，其中有社会各界、政党、人民团体和政府各部的代表。参加辩论会的还有中南美洲国家的代表和新闻界。"},{"type":"paragraph","text":"古巴“7月26日运动”全国领导人马塞洛·费尔南德思昨晚就这一阶段的辩论作总结发言说，古巴人民是一个富庶国家中的贫穷人民，因为巨大的富源不属于古巴人民，而是属于美国资本。"},{"type":"paragraph","text":"他指出，“美国资本目前控制着25％的银行存款，50％的铁路，50％以上的煤产和40％的糖”。他以雄辩的事实和材料，说明美国的剥削是造成古巴和整个拉丁美洲贫困的根本原因，是它们经济发展的主要障碍。他说，美国企图保持古巴和拉丁美洲的落后状态，以便继续掠夺更多的利润。"},{"type":"paragraph","text":"农民协会、工会团体和政党的许多代表在发言时一致指出，实行土地改革是古巴刻不容缓的当务之急，是使古巴革命向前发展的根本措施。他们列举美国大庄园占有古巴全部耕地的25％这一事实，说明美帝国主义是古巴主要的大庄园主。"},{"type":"paragraph","text":"由于土地改革已经成为不可抗拒的巨大潮流，参加辩论会的大庄园主、地主和畜牧业主全国性协会的代表发言时只能隐蔽地表示反对土地改革。他们说，由于土地改革限制占有土地的面积，就会破坏生产管理单位，结果将使生产下降；农民出于安全考虑，不希望无偿地得到土地，而是希望买地等等。但是，所有这些形形色色的谬论都遭到了驳斥。人民社会党的代表说，合作社完全可以保证大大地增加生产。奥连特省农民协会代表向在场的大庄园主代表问道：难道农民为解放祖国和使他摆脱大庄园制所流的血还不够？在场的大庄园主哑口无言，所有其他代表则报以热烈的掌声。武装部队的代表们在会上表示了他们坚决保卫土地的意志。莫拉莱斯上尉说，起义军和人民站在一起，并且要用武器、拳头、棍棒和石块保卫农民应该得到的土地。"},{"type":"paragraph","text":"参加这个辩论会的秘鲁、危地马拉、墨西哥、智利、委内瑞拉、波多黎各和哥伦比亚等拉丁美洲国家的代表，表示坚决支持古巴的土地改革，并且认为，所有拉丁美洲其他国家都迫切需要进行土地改革，因为它们也同样受着美帝国主义的剥削。危地马拉代表谴责美帝国主义破坏了危地马拉的土地改革。墨西哥代表说，农民要求做土地主人的时代已经来到了拉丁美洲。波多黎各代表指出，拉丁美洲各国人民只有团结起来，才能摆脱美帝国主义的剥削。他说，拉丁美洲人民要生死与共、安危共济。"},{"type":"paragraph","text":"古巴首都人民对辩论会表现了极大的热情。每天晚上所有的旁听席都挤满了听众。其中许多工人、农民和职员白天要上工或上班，但仍然参加了从晚上十点直到黎明三点的全部辩论。他们常以经久不息的热烈掌声或沉默来表示他们对各个代表发言的态度。（附图片）"},{"type":"paragraph","text":"古巴人民欢呼土改　（原载乌拉圭“人民报”）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fa9423da1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
