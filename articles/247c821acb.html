art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"文化大革命的成果决不允许否定一营各族干部战士用文化大革命给家乡带来巨大变化的事实反击右倾翻案风","authors":[],"parts":[{"type":"paragraph","text":"本报讯 毛主席最近指出：“翻案不得人心。”三三九九二部队一营各民族干部战士认真学习毛主席的重要指示，学习无产阶级专政理论，联系无产阶级文化大革命给家乡带来的巨大变化，反击右倾翻案风。他们说：党内不肯改悔的走资派搞翻案，我们各民族干部战士决不答应，我们一定要坚决保卫无产阶级文化大革命的成果，反对复辟倒退，坚持继续革命，保卫无产阶级红色江山千秋万代不变颜色。"},{"type":"paragraph","text":"一营是一个有苗族、黎族、回族、布依族、土家族、汉族等民族的干部战士组成的战斗集体。在反击右倾翻案风的斗争中，这个多民族营的干部战士反复学习毛主席的伟大教导：“这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的。”许多同志畅谈了文化大革命给家乡带来的深刻变化，揭露和批判党内那个不肯改悔的走资派妄图翻文化大革命的案、复辟资本主义的险恶用心。土家族战士冉学明说：无产阶级文化大革命摧毁了刘少奇、林彪两个资产阶级司令部，我的家乡同全国一样，社会主义新生事物象雨后春笋般地涌现出来，年青的民族干部茁壮成长，老、中、青三结合的新领导班子坚持以阶级斗争为纲，抓革命，促生产，形势大好。大队办起了合作医疗点，培养了三名土家族的赤脚医生，社员的健康有了保障。公社办了中学，大队办了小学，贫下中农管理学校，土家族的适龄儿童都上了学，正在被培养成为有社会主义觉悟的有文化的劳动者。谈到这里，他说：“无产阶级文化大革命出现的这些社会主义新生事物，从多方面限制资产阶级法权，有利于巩固无产阶级专政，有利于防止资本主义复辟，实在好得很。党内不肯改悔的走资派污蔑什么‘今不如昔’，要翻文化大革命的案，我们土家族的贫下中农是决不允许的。”黎族战士黄汉青对比了家乡在文化大革命前后的变化，说：党内不肯改悔的走资派狂叫“复辟”，要把被奴隶们砸烂了的铁镣重新给我们戴上，让被奴隶们打倒了的土司头人重新骑在我们头上作威作福，那是白日作梦，痴心妄想，绝对办不到！"},{"type":"paragraph","text":"通过对文化大革命前后的分析对比，一营各族干部战士更深刻地认识到，文化大革命是无产阶级反对资产阶级和一切剥削阶级的政治大革命。党内那个不肯改悔的走资派重新工作不久，就翻文化大革命的案，向文化大革命反攻倒算，大砍社会主义新生事物，真是猖狂已极。同志们指出：这一切都说明“走资派还在走”。党内那个不肯改悔的走资派搞的这一套，集中地代表了党内外新老资产阶级的利益和复辟愿望，走资派就是社会主义革命时期党内的资产阶级。大家从这里深刻认识到：在整个社会主义历史时期，主要矛盾是无产阶级同资产阶级的矛盾，主要危险是修正主义，革命的对象是资产阶级，重点是党内走资派。在提高认识的基础上，干部战士更加积极地投入反击右倾翻案风的战斗。"}],"alias":""},"tags":[{"name":"革命三结合","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"247c821acb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
