art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平同志恢复职务全国人民高兴","authors":["郑定富"],"parts":[{"type":"paragraph","text":"党的十届三中全会胜利闭幕了！喜讯传来，全团营区和工地一片欢腾，我的心情也格外激动。英明领袖华主席亲自主持召开的这次重要会议，巩固和发展了粉碎“四人帮”反党集团的伟大胜利。大会通过的各项决议和决定，充分表达了全党全军全国各族人民的心愿。我们革命战士热烈欢呼这次会议的巨大成功，衷心拥护会议通过的决议和决定。"},{"type":"paragraph","text":"“四人帮”横行之时，制造了一套“老干部=民主派=走资派”的反动公式，妄图打倒老一代无产阶级革命家和一大批党政军负责同志，为他们篡党夺权开辟道路。他们打击、诬陷邓小平同志，就是这个阴谋的组成部分。毛主席对邓小平同志早就有过明确的全面评价。“四人帮”却公然对抗毛主席的指示，违背党心、军心、民心，倒行逆施，这充分暴露了他们的资产阶级野心家、阴谋家、反革命两面派的嘴脸。但是他们这样做的结果必然是以损人开始、以害己告终，最终无法逃脱党和人民的审判。"},{"type":"paragraph","text":"十届三中全会一致通过了《关于恢复邓小平同志职务的决议》。邓小平同志出来工作了，“四人帮”的阴谋诡计彻底失败了。全党高兴，全军高兴，全国人民高兴。现在，有华主席作我们党的领袖，有叶副主席、邓副主席和其他中央领导同志的同心协力，我们党有了“由最有威信、最有影响、最有经验、被选出担任最重要职务而称为领袖的人们所组成的比较稳定的集团”。我们的党大有希望，我们的事业大有希望。"},{"type":"paragraph","text":"在胜利的凯歌声中，我决心更加刻苦地读马列的书，读毛主席的书，带领部队加速革命化现代化建设，搞好战备施工，随时准备听从以华主席为首的党中央的召唤，为保卫毛主席的伟大旗帜、保卫华主席为首的党中央、保卫无产阶级专政而战斗。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2470551409"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
