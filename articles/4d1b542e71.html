其饱满的政治热情，纪录了我国各族人民无限热爱毛主席，毛主席永远和各族人民心连心的动人情景；纪录了林副主席在庆祝大会上发表重要讲话的情景；还纪录了毛主席和林副主席同首都军民和国际友人一起欢度国庆之夜，观看节日焰火的动人情景","authors":[],"dates":[{"year":1969,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京九日电　生动纪录我们的伟大领袖毛主席和他的亲密战友林彪副主席，同首都四十多万军民和来自全国各地的工农兵代表一起，欢庆伟大的中华人民共和国成立二十周年的大型彩色文献纪录影片《庆祝伟大的中华人民共和国成立二十周年》，从十一日起在首都和全国各地陆续上映。"},{"type":"paragraph","text":"影片以极其饱满的政治热情，纪录了我国各族人民无限热爱毛主席，毛主席永远和各族人民心连心的动人情景。从影片中可以看到，当我们的伟大领袖毛主席和他的亲密战友林彪副主席在庄严的《东方红》乐曲声中，健步登上天安门城楼时，全场万众欢腾。革命群众仰望毛主席，心向红太阳，挥动红彤彤的《毛主席语录》，纵情跳跃欢呼:“毛主席万岁!”“毛主席万岁!”“祝毛主席万寿无疆!万寿无疆!”毛主席红光满面，精力充沛，身体非常健康，频频向大家亲切招手致意。"},{"type":"paragraph","text":"影片还纪录了林彪副主席在庆祝大会上发表重要讲话的情景。"},{"type":"paragraph","text":"从影片中，人们还将看到，毛主席和林副主席在天安门城楼上，检阅首都游行大军，同来自全国各地的观礼代表、各方面的负责同志以及来自世界五大洲的各国朋友们亲切握手、交谈的热烈场面。影片以一幅幅鼓舞人心的画面再现了庆祝游行的盛况。由工、农、兵、红卫兵、红小兵、革命干部、革命知识分子、革命文艺和体育工作者，组成的一支支整齐雄壮的队伍，高举毛主席画像、红旗和标语牌，迈着雄健的步伐，欢呼前进，接受伟大领袖毛主席和他的亲密战友林副主席的检阅。革命群众热烈欢呼我国二十年来社会主义革命和社会主义建设的伟大胜利，热烈欢呼无产阶级文化大革命的伟大胜利，热烈欢呼中国共产党第九次全国代表大会的伟大胜利，热烈欢呼毛主席的无产阶级革命路线的伟大胜利。"},{"type":"paragraph","text":"影片还纪录了我们最敬爱的伟大领袖毛主席和他的亲密战友林彪副主席，同首都广大军民和国际友人一起欢度国庆之夜，观看节日焰火的动人情景。"},{"type":"paragraph","text":"这部大型彩色文献纪录片，充分地显示出用毛泽东思想武装起来的、经过无产阶级文化大革命锻炼的我国各族人民在党的“九大”精神鼓舞下，在以毛主席为首、林副主席为副的党中央的领导下，空前的革命团结，空前的朝气蓬勃，表达了全国人民进一步巩固无产阶级专政，争取新的更大胜利的决心，以及同全世界人民一起，把反对帝国主义、社会帝国主义、现代修正主义、反动派的斗争进行到底的钢铁意志。"},{"type":"paragraph","text":"这部影片是由中央新闻纪录电影制片厂和中国人民解放军八一电影制片厂摄制的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d1b542e71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
