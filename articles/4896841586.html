ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"要求蒋介石具体保证和平解决后不再发生战争","alias":"","parts":[{"type":"paragraph","text":"要求蒋介石具体保证和平解决后不再发生战争！]"},{"type":"paragraph","text":"（1937年1月21日）汉年同志："},{"type":"paragraph","text":"电悉。（甲）我们自始即主张和平，决不愿意战争。"},{"type":"paragraph","text":"（乙）但南京讨伐与剿共空气又形高涨，刘峙?谈话尤为显然，不能不令人怀疑是否确有团结对外之诚意。"},{"type":"paragraph","text":"（丙）我们可保证，一方面红军只要有适当驻地与相当给养，不但不向白区作任何攻击行为，而且停止打土豪，目前红军已实行此两点。另方面可向西安当局进言，服从蒋先生及南京。杨、于、孙已通电就职并取消临时组织。剩下仅一适当分配防区与张汉卿回陕问题，此须蒋先生从大处着眼，采取适当办法以安东北军与十七路军之心。蒋能如此，我们当尽一切可能之努力，不但在西北而且在全国范围内赞助蒋先生，团结各方一致对外，但蒋先生须给我们以具体的保证。"},{"type":"paragraph","text":"[1]这是毛泽东、周恩来给潘汉年的电报。[2]刘峙，当时任国民党豫皖绥靖公署主任。"},{"type":"paragraph","text":"（丁）我们要求蒋先生保证和平解决后不再发生战争，望与蒋先生商量这种保证问题。"},{"type":"paragraph","text":"毛泽东周恩来一九三七年一月马亥"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":147,"page_end":148},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4896841586"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
