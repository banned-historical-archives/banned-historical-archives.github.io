script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席复金日成首相电","authors":[],"dates":[{"year":1954,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席复金日成首相电"},{"type":"paragraph","text":"朝鲜民主主义人民共和国内阁首相"},{"type":"paragraph","text":"金日成同志："},{"type":"paragraph","text":"我收到了您一九五四年十月二十四日的来电。我代表中华人民共和国、中国人民，并以我个人的名义对全体朝鲜人民、朝鲜民主主义人民共和国政府和您表示衷心的感谢和敬意。"},{"type":"paragraph","text":"英雄的朝鲜人民和中国人民在反抗侵略、保卫和平的正义斗争中已经结成了血肉相关的战斗友谊。这种友谊是维护远东和平的重要因素。在为争取朝鲜的和平统一和维护亚洲和平的奋斗中，我们两国人民的这种友谊必将得到进一步的巩固和发展。"},{"type":"paragraph","text":"谨祝朝鲜人民在迅速恢复自己祖国国民经济的庄严事业中获得更大的成就。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年十月二十五日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f18cc06a2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
