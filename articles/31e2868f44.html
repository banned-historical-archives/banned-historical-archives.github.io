script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"郊区小麦丰收　市联社与中粮公司进行收购成绩良好一个月内已完成原计划七○%　农民避免中门剥削达六千万元","authors":[],"dates":[{"year":1951,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市郊区的麦收业已于六月下旬全部完竣。今年由于人民政府领导得好，大力推行增产工作，小麦普遍丰收，最高的每亩麦田的收成达三百六十斤，平均也在一百六十斤左右，较之去年增产约三成。上海市合作社联合社为了执行政府收购政策掌握粮食价格，协助农民推销农副产品，当郊区麦收全面完成后，即与中粮公司上海市公司签订了关于收购春熟小麦协议，确定了收购的方法方式、对象、数量、品质、时间等问题，又统一布置各郊区合作社直接与市中粮公司订立了委托收购小麦合同。收购工作展开后，已见良好成绩。自六月廿五日开始收购，至七月廿四日为止的一个月时期内，已收购的小麦共计一、一九○、五三二斤，完成预定收购一、七四○、○○○斤计划的数字七○%，使农民避免中间剥削达六千万元左右。"},{"type":"paragraph","text":"收购工作　继续进行　月底结束"},{"type":"paragraph","text":"合作社在收购时，其价格由市中粮公司统一掌握，每百斤九万八千元。在刚开始收购时，农民由于过去习惯，往往将比较潮湿和掺杂多的小麦挑到合作社来卖。后来经过一番宣传和解释，告诉大家必须晒干扬净，如果不这样做，让麦子在仓库里霉烂，就会使人民财产遭受损失，而且在掌握“优级优价”的政策，将不合品质的小麦一律不收，小麦的品质普遍提高，基本上铲除了掺泥掺杂的现象。"},{"type":"paragraph","text":"通过小麦的收购，合作社又及时地供给农民的生产，生活资料，如米、油、盐、豆饼、肥田粉等，因而在营业数字上均有显著的增加。如新泾区诸翟乡合作社，原来每天营业额只三、四百万元，收购小麦后，激增至一千万元以上。其他的郊区合作社也都增加百分之三十至六十不等。现在，郊区合作社的收购小麦工作仍在继续进行中，预计至八月底止全部结束。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31e2868f44"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
