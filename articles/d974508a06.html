art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"共产党员必须是无产阶级先进分子四连干部战士学习新党章狠批刘少奇妄图抹煞党的先锋队作用的反动谬论","authors":[],"parts":[{"type":"paragraph","text":"本报讯 南字一五二部队四连干部战士在学习新党章中，以毛主席的建党纲领为武器，开展革命大批判，狠批叛徒、内奸、工贼刘少奇妄图抹煞党的先锋队作用的反革命修正主义谬论，进一步明确了“党组织应是无产阶级先进分子所组成”，增强了党的观念。"},{"type":"paragraph","text":"四连党支部在组织全连党员和群众学习新党章中，开展了“学、批、查”的群众性活动。学，就是大学伟大领袖毛主席关于“党组织应是无产阶级先进分子所组成，应能领导无产阶级和革命群众对于阶级敌人进行战斗的朝气蓬勃的先锋队组织”的伟大建党纲领；批，就是狠批叛徒、内奸、工贼刘少奇所谓“工人农民的阶级组织”就是“共产党的组织”的反革命修正主义谬论；查，就是在提高认识的基础上，自觉地检查是否按新党章的规定严格要求自己，并发动群众对党员进行评论。"},{"type":"paragraph","text":"通过学习和革命大批判，干部战士懂得了政党和阶级的关系，进一步明确了党的性质。大家指出，党是无产阶级的先锋队。叛徒、内奸、工贼刘少奇胡说什么“工人农民的阶级组织”就是“共产党的组织”，把党和阶级混同起来，妄图抹煞党的先锋队作用，篡改党的性质，复辟资本主义。只有贯彻执行毛主席的建党纲领，坚持党必须是无产阶级先锋队组织，党员必须是无产阶级先进分子，才能保证党的先进性、纯洁性和战斗性，领导无产阶级和革命群众彻底推翻资产阶级和一切剥削阶级，用无产阶级专政代替资产阶级专政，用社会主义战胜资本主义，直到实现共产主义。党员们纷纷表示，一定要自觉地按照新党章规定的党员标准严格要求自己，更加努力活学活用毛泽东思想，不断从思想上吐故纳新，努力把自己提高到无产阶级先进分子的水平。群众也表示，要在党的领导下积极工作，自觉地用党员的标准要求自己，不断提高政治觉悟，积极创造条件，争取加入党的组织。"},{"type":"paragraph","text":"开展“学、批、查”活动，大大增强了干部战士的党的观念，促进了思想革命化，党内外出现了一片新气象。共产党员、副班长李大土，是活学活用毛泽东思想积极分子。通过“学、批、查”，找到了差距，他对学习毛主席著作抓得更紧了，思想革命化要求更高了。在施工中，他刻苦磨练一不怕苦、二不怕死的革命精神，专拣最重最苦的活干，发挥了模范带头作用。一九六八年入伍的班长陈玉槽，原来看到有的一九六九年入伍的同志入了党，自己没有入党，有些想不通。通过学习和革命大批判，明确了党的性质和党员的标准，自觉地从世界观上找差距，坚持用无产阶级先进分子的标准要求自己，锻炼自己。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d974508a06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
