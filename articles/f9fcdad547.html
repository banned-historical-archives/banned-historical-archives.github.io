art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"靠毛泽东思想领航","authors":[],"parts":[{"type":"paragraph","text":"航行在浩瀚大海中的舰船，没有灯塔照耀它前进是不行的。飞机在茫茫的天空中飞行，没有人领航也是不行的。飞机没有领航，就会迷失方向，就不能歼敌制胜。"},{"type":"paragraph","text":"领航员的工作十分重要，领航员的技术也十分复杂。成千上万个实用数据，要背得滚瓜烂熟；萤光屏上的回波信号，要目测得不差分毫；心算速度慢一两秒钟，就可能导致贻误战机。面对这样复杂的技术，何虎祥同志为什么能熟练地掌握它，成为“战鹰好向导”呢？最根本的原因是他首先用毛泽东思想为自己领航。"},{"type":"paragraph","text":"飞机要人来领航，人要毛泽东思想来领航。何虎祥在前进的道路上，也曾一度迷了“航”。后来读了《为人民服务》、《纪念白求恩》，才使他找到了正确的航向：要做象张思德、白求恩那样的人，对待革命只能是一个心眼：全心全意为人民服务。"},{"type":"paragraph","text":"航向对了，在掌握复杂的军事技术时，就有了使不完的革命干劲。遇到再难的关口，敢去闯；遇到再复杂的技术，敢去钻。对苦练不以为苦，对数字不觉得枯燥，总是精益求精，把复杂的技术掌握到手。"},{"type":"paragraph","text":"毛主席历来教导我们：“没有正确的政治观点，就等于没有灵魂。”林彪同志也早就指出，要使干部真正学到东西，首先必须把毛泽东思想学到手，这是最紧要的。何虎祥同志的事例又一次证明：在革命工作中只要依靠毛泽东思想领航，就可以乘风破浪地永远前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9fcdad547"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
