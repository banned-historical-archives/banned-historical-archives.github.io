80,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见斯旺森"},{"type":"paragraph","text":"新华社北京9月8日电 邓小平副总理今天上午在会见由公司总裁查尔斯·斯旺森率领的美国《不列颠百科全书》出版公司董事会代表团时说，我们全国人民对正在召开的五届人大三次会议的反映很好。这说明，中国人民实现四化的决心是坚定的，也是有信心的。同时也说明，粉碎“四人帮”以后，我们的事情一年比一年好。但是我们还面临着许多问题和困难，我们正在研究和解决。"},{"type":"paragraph","text":"会见时，邓小平接受了这个出版公司赠送给他的一套特别精装《不列颠百科全书》。"},{"type":"paragraph","text":"邓小平说，这部百科全书在世界学术界是有权威性的，对我们实现四化是有用的，中国的科学工作者会从中得到教益。"},{"type":"paragraph","text":"斯旺森说，我们已同中国大百科全书出版社建立了友好合作关系，这将有利于美中两国的文化交流和友谊的进一步发展。"},{"type":"paragraph","text":"国家出版事业管理局代局长陈翰伯、中国大百科全书出版社社长姜椿芳参加了会见。（附图片）"},{"type":"paragraph","text":"斯旺森向邓小平赠送精装的《不列颠百科全书》。 新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c19831616"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
