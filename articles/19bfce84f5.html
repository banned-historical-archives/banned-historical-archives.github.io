,"authors":[],"dates":[{"year":1950,"month":9,"day":15}],"is_range_date":false,"parts":[{"text":"湘阴普遍缺乏粮库妨碍粮食收购工作","type":"title"},{"text":"（湖南分社讯）湘阴普遍缺乏粮库，已严重妨碍粮食收购工作。湘阴贸易公司因缺乏仓库，现在是找一处收几天，找不到就停止，致使粮食积压市场，农民异常焦急。商人见有机可乘，则雇佣码头工人去收购，转卖给公司，每石可赚五六千元。现该地面对夏借（群众交粮情绪很高）、秋征及收回贷粮等工作，最感困难的问题是仓库，如这一问题不及早解决，恐将发生壅塞之患。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年9月15日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19bfce84f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
