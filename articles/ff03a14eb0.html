僚主义命令主义和违法乱纪的总结（节录）","authors":[],"dates":[{"year":1953,"month":2,"day":25}],"is_range_date":false,"parts":[{"text":"宁南县53年第二届扩干会议上反对官僚主义命令主义和违法乱纪的总结（节录）","type":"title"},{"text":"公安局副局长叶文惠复查中在三区中当村[干]，因群众叫产量实际上定的有些过高，他没有深入发动群众了解材料来做解决，竟将喊产量过高要求解决土地产量问题贫农姚中乐一顿耳光。… 三区区党委尚善均同志土改中命令各乡哪个乡工作做不好就捆绑送区，叫三天内追退到80%。各乡同志怕完不成任务就对地主几农民所谓的隐瞒户施用肉刑。有些积极农民被地主诬咬后手不过肉刑交出了自己的财产来赔偿。 尚善均同志对这种情况不加纠正，反而在52年4月间听到说农民王何氏包庇地主一制枪和子弹，就将王何氏扣来硬逼她交出并用肉刑。 王何氏被逼无奈吊死。 王何氏死后就拖出去，无人安埋丢在野外被猪咬烂一支耳朵。(p. 67)","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff03a14eb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
