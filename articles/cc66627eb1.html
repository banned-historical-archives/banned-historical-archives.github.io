ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"给李济深的信","alias":"","parts":[{"type":"paragraph","text":"给李济深的信"},{"type":"paragraph","text":"（1954年12月24日）任潮先生："},{"type":"paragraph","text":"十二月二十二日惠书收读。你的意见是对的，已告有关同志注意3。此复。顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿四日"},{"type":"paragraph","text":"[1]李济深，字任潮，当时任中国国民党革命委员会中央委员会主席、全国人大常委会副委员长。"},{"type":"paragraph","text":"[2]指李济深1954年12月22日给毛泽东、朱德、刘少奇、周恩来的信。信中说：20日全国人民代表大会常务委员会通过了1955年发行建设公债案，昨日并由主席公布了。这件事在法律手续上是正确的，但在步骤上我心里总有点不大自然。因为自人民共和国政府成立以来，政府凡有一件比较大的事，都先经过协商机关座谈一番，然后提交政府委员会通过公布，而于推行上比较更顺利。这次是否因为时间关系，又值政协第二届全国委员会开会，不便提出，故急于如此办理。现在兵役法又要提出了，是否照往例先交政协协商一番，于将来推行似亦有帮助。"},{"type":"paragraph","text":"[3]毛泽东在李济深1954年12月22日来信的信封上批有：“刘、周、朱、陈、邓、彭、彭真、陈毅阅，请周酌处，退毛。”"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":12,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":393,"page_end":393},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc66627eb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
