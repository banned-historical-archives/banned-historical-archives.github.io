69,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向毛主席表达忠心"},{"type":"paragraph","text":"驻守在西藏某边防哨所的指战员，听到“九大”隆重开幕的特大喜讯，心如潮涌，激情满怀，当即在大雪覆盖的前沿阵地上，集会欢庆。"},{"type":"paragraph","text":"这支边防部队，过去在中印边境自卫反击作战中，靠伟大的毛泽东思想把猖狂来犯的印度侵略军打得落花流水，为党为人民立了战功。今天，在欢庆“九大”开幕的幸福日子里，他们回顾在毛泽东思想指引下的战斗历程，心情格外激动。副指导员李德才正在病中，他听到特大喜讯后，忘掉了病痛，踏着一米多厚的积雪，迎着暴烈的寒风，带病到各个阵地上报喜。他一边向战士们宣传特大喜讯，一边和大家一起打扫阵地，排除积雪，晚上又和战士们一起巡逻、放哨。他激动地说，守卫祖国边疆，这是伟大领袖毛主席和我国各族人民交给我们的光荣任务，我们一定要坚决完成这个任务。"},{"type":"paragraph","text":"在欢庆“九大”召开的日子里，共产党员、五好战士王生元，带领全班同志再次狠批叛徒、内奸、工贼刘少奇的“阶级斗争熄灭论”。他说，“九大”的召开，是对全国人民的最大鼓舞，是对帝、修、反的一个沉重打击。阶级敌人决不会甘心他们的失败，我们边防战士务必随时准备歼灭一切入侵之敌。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eacdad2aa6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
