rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理同洛佩斯总理继续会谈洛佩斯总理应邀出席文艺晚会吴桂贤副总理等陪同刚果贵宾观看革命现代京剧《杜鹃山》","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年三月一日讯 国务院副总理邓小平同刚果人民共和国总理亨利·洛佩斯，今天上午继续举行了会谈。"},{"type":"paragraph","text":"新华社一九七五年三月一日讯 刚果人民共和国总理亨利·洛佩斯和夫人以及由洛佩斯总理率领的政府代表团，今天应邀出席文艺晚会，观看了革命现代京剧《杜鹃山》。"},{"type":"paragraph","text":"国务院副总理吴桂贤，外交部副部长何英，对外友协会长柴泽民，北京市革委会副主任贾汀，陪同刚果贵宾观看演出。"},{"type":"paragraph","text":"刚果驻中国大使伊图阿和夫人及大使馆外交官员出席了文艺晚会。"},{"type":"paragraph","text":"今天的晚会是由对外友协和北京市革命委员会联合举办的。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"198bbaf29f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
