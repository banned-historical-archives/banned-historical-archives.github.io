art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"托斯卡同志率阿党政代表团今日到京代表团到达上海时；张春桥等同志和革命群众前往机场热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"中共中央政治局委员、上海市革命委员会负责人张春桥同志，中共中央委员、上海市革命委员会领导成员王洪文同志，中共中央委员王秀珍同志，中共中央候补委员王维国同志、刘浩天同志、陈敢峰同志，上海市革命委员会其他领导成员和人民解放军驻上海部队负责人刘耀宗、冯国柱、张敬标等同志，以及革命群众一千多人，前往机场热烈欢迎阿尔巴尼亚同志。"},{"type":"paragraph","text":"今天，上海虹桥机场上空飘扬着中阿两国国旗。当哈基·托斯卡同志和其他阿尔巴尼亚同志同欢迎群众见面时，大家敲锣打鼓，不断高呼：“中阿两党、两国和两国人民牢不可破的战斗友谊万岁！”“坚决支持英雄的阿尔巴尼亚人民的反帝反修斗争！”"},{"type":"paragraph","text":"到机场欢迎的还有专程从北京到上海迎接阿尔巴尼亚同志的外交部副司长李连庆同志。"},{"type":"paragraph","text":"阿尔巴尼亚党政代表团团员、阿尔巴尼亚驻中国大使罗博同志也专程从北京到上海迎接。"},{"type":"paragraph","text":"今天晚上，张春桥同志设宴招待阿尔巴尼亚同志。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ede5687f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
