art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"修正主义伙同美帝进行核讹诈","authors":[],"parts":[{"type":"paragraph","text":"据新华社十八日讯 布鲁塞尔消息：坚持马克思列宁主义的比利时共产党的机关报《人民之声》最近发表由政治局书记雅克·格里巴写的一篇社论，谴责现代修正主义者和帝国主义者同谋进行核威胁和核讹诈。"},{"type":"paragraph","text":"这篇题为《制止核威胁和核讹诈》的社论说，“必须揭露莫斯科（三国部分禁止核试验条约之类的骗局，这个条约的唯一目的是加强美帝国主义，同时在精神上和物质上使各国人民解除武装。"},{"type":"paragraph","text":"“与这一政策同谋的修正主义者，比美帝国主义更不希望禁止和销毁核武器。保有‘原子指挥棒’、进行氢弹讹诈，是他们在国际范围内的阶级合作政治观念的根本因素之一。”"},{"type":"paragraph","text":"社论说，美帝国主义是目前世界上的主要侵略力量，它的统治世界的方针进一步加剧了战争危险。孤立美帝国主义是当前的首要任务之一。"},{"type":"paragraph","text":"社论指出，帝国主义本性就是侵略的：只要它存在，就没有没有战争和没有武器的世界。只有社会主义在全世界取得胜利，才能最后消除产生战争的一切根源。"},{"type":"paragraph","text":"社论说，“那些以和平为借口要各国人民跪着生活的人，是同帝国主义同谋的，是鼓励帝国主义的侵略政策，事实上是要加剧战争危险。慕尼黑政策是导致战争的！”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6631051dfc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
