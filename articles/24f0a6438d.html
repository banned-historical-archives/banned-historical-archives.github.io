art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"怀着沉痛心情向徐立清同志遗体告别叶剑英李先念陈云彭真分别从外地打来电话表示深切哀悼","authors":["乔天富"],"parts":[{"type":"paragraph","text":"新华社8月16日讯 胡耀邦、邓小平等党和国家领导人，今天前往解放军总医院，向久经考验的忠诚的共产主义战士、我军优秀的政治工作领导人徐立清同志遗体告别。"},{"type":"paragraph","text":"徐立清同志生的是中央顾问委员会委员，曾任总政治部副主任、济南部队和成都部队第一政委。徐立清同志于1983年1月6日因病在北京逝世，终年七十二岁。"},{"type":"paragraph","text":"徐立清同志的遗体穿着人民解放军军装，安卧在鲜花翠柏丛中。告别厅的黑纱横幅上写着：沉痛悼念徐立清同志！"},{"type":"paragraph","text":"胡耀邦、邓小平、万里、匀仲勋、韦国清、杨尚昆、杨得志、余秋里、宋任穷、张廷发、姚依林、秦基伟、邓力群、陈丕显、胡启立、薄一波、赛福鼎、肖劲光、康胜恩等党和国家领导人，缓缓步人告别厅，在徐立清同志遗体前静默致哀，并向徐立清同志的夫人党秀玉及子女表示亲切慰问。"},{"type":"paragraph","text":"叶剑英、李先念、陈云、彭真分别从外地打来电话，对徐立清同志逝世表示深切哀悼。"},{"type":"paragraph","text":"今天前往初放放总医院向徐立清同志遗体告别的还有：中央顾问委员会、中国纪律检查委员会、中央军委、政协全国委员会、最高人民法院、最高人民检察院、中央直属机关各部门、国家机关各部门的负责人、人民解放军各总部、各军兵种、国防科工委、各军事院校北京部队的负责人；陆海空三军指战员和徐立清同志的生前友好，共一千八百人。"},{"type":"paragraph","text":"徐立清同志遗像  新华社发"},{"type":"paragraph","text":"1月16日，胡耀邦、邓小平、杨尚昆、余秋里、杨得志等党和国家领导人向徐立清同志遗体告别。                     本报记者 乔天富摄RW：徐立清；逝世；照片"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"杨得志","type":"人物"},{"name":"李先念","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"徐立清","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陈云","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24f0a6438d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
