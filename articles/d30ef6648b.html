950,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者先生:"},{"type":"paragraph","text":"大家公认小资产阶级的毛病很多，但毛病究竟有多少?请你们列举出来，给我们参考。陈任彬上任彬同志:"},{"type":"paragraph","text":"就我们搜集的材料答复如下:"},{"type":"paragraph","text":"一:缺乏纪律性，自由散漫，吊儿郎当。"},{"type":"paragraph","text":"二:缺乏组织性，把个人放在前面，把群众放在后面。处处从个人利益出发。"},{"type":"paragraph","text":"三:私有性太浓，自私自利，享乐观念。"},{"type":"paragraph","text":"四:争强好胜，分数主义，要面子，出风头，作英雄。"},{"type":"paragraph","text":"五:自高自大，目中无人。一时失败，便又消极沮丧，自卑自贱，受不住打击。"},{"type":"paragraph","text":"六:好高惊远，不能实在地去办事。幻想着光明灿烂的前途，却又不能克服目前的小困难。"},{"type":"paragraph","text":"七:技术观点，只想学好一门高明技术，出来能获高额薪金，过舒服的生活，充份的享乐主义。"},{"type":"paragraph","text":"八:说话没有立场，全凭心之所好，只有善恶的观念，无利害的分析，盲目的公理主义思想。"},{"type":"paragraph","text":"九:“个性”为乐，不考虑别人的意见，性子燥。"},{"type":"paragraph","text":"十:不相信人，无“同志”之感。轻视劳动人民，生活在一个小圈子内，自以为美。"},{"type":"paragraph","text":"十一:孤僻的民族、国家主义，很难接受国际主义的思想，幻想着第三条道路。"},{"type":"paragraph","text":"十二:爱慕虚荣与享受，“向上爬”的心非常浓，作事不一虚心，一心只想爬得高高的。"},{"type":"paragraph","text":"十三:爱幻想，喜欢看些美丽的，虚无的，富有浪漫色彩的文学作品，是个温情主义。"},{"type":"paragraph","text":"十四:对政治没有好感，喜欢个人的学习。对开会，上大课不感觉兴趣。(编者)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d30ef6648b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
