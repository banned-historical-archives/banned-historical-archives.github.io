市文化局干部的表现","authors":["朱泽民"],"dates":[{"year":1955,"month":6,"day":17}],"is_range_date":false,"parts":[{"text":"胡风反革命集团第三批材料公布后天津市文化局干部的表现","type":"title"},{"text":"朱泽民","type":"authors"},{"text":"【天津分社十七日讯】胡风反革命集团的第一、二批材料公布后，天津市文化局的干部，有十分之一的人表现恐慌，半数的人积极投入斗争，另外一部分人表现中间观望。在第三批材料公布后，积极投入斗争的人已增加到十分之六，恐慌的也增加到十分之二。表现恐慌的有四种人：(一)政治历史有问题的人；(二)和胡风分子有联系的人；(三)思想作风有毛病的人——一贯有反领导情绪的和一些有流氓行为的人；(四)受过胡风分子影响的人。","type":"paragraph"},{"text":"这些表现恐慌的人具体表现如下：(一)表面镇静，伪装积极，空喊口号，但不交代自己和胡风分子的联系等问题；(二)散布谣言，暗中进行活动，如天津博物馆有的人在讨论会上公开说：讨论甚么？胡说点算了。还有的人散布谣言说：报纸上公布的材料不见得都是真的；(三)极力否认自己和胡风分子有过联系和受过影响。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年6月20日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4a46e5ec0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
