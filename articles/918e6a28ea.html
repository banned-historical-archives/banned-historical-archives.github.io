ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对中央关于建立制度、控制购销、改进粮食工作的指示稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于建立制度、控制购销、"},{"type":"paragraph","text":"改进粮食工作的指示稿的批语"},{"type":"paragraph","text":"（1955年8月3日）即送刘、朱、周、陈、邓、先念同志阅，尚昆办。照此办理。在第一、二、三、四页上改了或加了几句话。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月三日各项办法和表格已阅，均照办。"},{"type":"paragraph","text":"[1]刘，指刘少奇。朱，指朱德。周，指周恩来。陈，指陈云，当时任中共中央书记处书记、国务院副总理。邓，指邓小平，当时任中共中央秘书长、国务院副总理。先念，即李先念，当时任国务院副总理兼第五办公室主任。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央副秘书长、中央办公厅主任。"},{"type":"paragraph","text":"[3]毛泽东对中共中央关于建立制度、控制购销、改进粮食工作的指示稿的修改有：在第1页，加写了抬头：“上海局、各省、市委、自治区党委”；在第2页，将“中央检查了一九五三年以来的粮食统购统销工作，认为可以得出这样的结论，就是：大体还好，问题不少”一句中的“大体还好，"},{"type":"paragraph","text":"对中央关于建立制度、控制购销、改进粮食工作的指示稿的批语问题不少”，改为“虽然问题不少，但是大体上是好的”；在第3页“估计一九五五年的生产计划如果完成，粮食产量将比一九五四年增加二O○亿斤，而国家征购的数量又比上年度实收数减少六十四亿多斤，这样农民就能够留有较多的粮食，用以改善生活”一句后，加了“增加牲畜饲料”6个字；在第4页，将“必须抓紧每年七至十二月的销量，在这一期间要尽可能减少销售，以免在一般农民有粮季节销得过多”一句，改为“必须抓紧每年七至十二月的销量，在这一期间教育农民吃少点，吃稀一点，国家则要尽可能减少销售，以免在一般农民有粮季节吃得过多，或国家销得过多”。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":8,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":259,"page_end":260},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"918e6a28ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
