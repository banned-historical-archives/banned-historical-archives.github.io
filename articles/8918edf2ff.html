:1967,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的红书光芒照四方"},{"type":"paragraph","text":"最近在西巴基斯坦莱雅普尔举行的放映中国电影的集会上，著名诗人塔列布·贾伦达里双手高举两本《毛主席语录》，激动地向观众朗诵了他写的一首赞扬毛泽东思想的诗，受到听众们的热烈欢迎。这首诗写道："},{"type":"paragraph","text":"毛泽东的红书光芒照四方，"},{"type":"paragraph","text":"无产阶级读了红书，"},{"type":"paragraph","text":"敢于同压迫者作斗争，"},{"type":"paragraph","text":"向压迫者算账，"},{"type":"paragraph","text":"帝国主义者及其同伙注定要灭亡。"},{"type":"paragraph","text":"毛泽东的红书光芒照四方，"},{"type":"paragraph","text":"读了毛主席的红书受鼓舞，"},{"type":"paragraph","text":"不怕困难和死亡。"},{"type":"paragraph","text":"光明的前途呈现在我们面前，"},{"type":"paragraph","text":"红书里的每一段话都发射出红太阳的灿烂光芒。"},{"type":"paragraph","text":"指导当前无产阶级革命的罗盘，"},{"type":"paragraph","text":"就是伟大的毛泽东思想。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8918edf2ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
