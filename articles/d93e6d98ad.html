ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给周扬\"的信","alias":"","parts":[{"type":"paragraph","text":"给周扬的信"},{"type":"paragraph","text":"（1939年1月22日）周扬同志："},{"type":"paragraph","text":"此稿?李六如、和培元?各写一半，我全未看。因关系边区对外宣传甚大，不应轻率出版，必须内容形式都弄妥当方能出版。现请你全权负责修正此书，如你觉须全般改造，则全般改造之。虽甚劳你，意义是大的。最好二月十五日前完稿，二月底能出书。"},{"type":"paragraph","text":"备有稿费（每千字一元五角），当分致你与李、和三同志，借表酬劳之意。"},{"type":"paragraph","text":"此致布礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二十二日夜十时"},{"type":"paragraph","text":"[1]周扬（1908—1989)，湖南益阳人。当时任陕甘宁边区政府教育厅厅长。"},{"type":"paragraph","text":"[2]指《陕甘宁边区实录》一书的初稿。该书1939年12月由延安解放社出版，毛泽东亲自为此书题写了书名并题词：“边区是民主的抗日根据地，是实施三民主义最彻底的地方。”"},{"type":"paragraph","text":"[3]李六如，当时任毛泽东办公室秘书长。和培元，当时是毛泽东办公室秘书。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":184,"page_end":184},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d93e6d98ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
