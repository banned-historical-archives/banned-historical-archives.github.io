tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"新加坡共和国","authors":[],"parts":[{"type":"paragraph","text":"新加坡地势平缓，起伏不大，属热带海洋性气候。气温虽高和潮湿，但空气清新。岛上终年常青，风光绚丽，每年吸收了一百五十多万外国的旅游者前来参观游览。"},{"type":"paragraph","text":"中国和新加坡两国人民之间的友谊和交往有着悠久的历史。历史上，新加坡就是中国和印度之间的贸易的一个交通枢纽。近几年来，两国人民之间的友好往来逐步增加，经济贸易关系日益加强。一九七六年五月，李光耀总理率领友好代表团访问中国，毛主席会见了李光耀总理，华国锋总理同李光耀总理举行了会谈，加深了中新两国之间的相互了解和友谊。这次邓小平副总理访问新加坡，将为中断友好关系写下新的一页。（据新华社）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae68c9b3f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
