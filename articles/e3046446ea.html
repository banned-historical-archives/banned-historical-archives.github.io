rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"埃及副总统抵京 邓副总理到机场迎接"},{"type":"paragraph","text":"阿拉伯埃及共和国副总统胡斯尼·穆巴拉克和夫人一行，一月五日下午乘专机到达北京，开始了他们对我国为期五天的访问。国务院副总理邓小平和夫人卓琳，人大常委会副委员长乌兰夫等，前往机场迎接。穆巴拉克副总统在北京期间，华国锋总理将会见他，邓小平副总理将同他举行会谈。双方将讨论当前的国际形势和双边关系问题。"},{"type":"paragraph","text":"李副主席会见美共（马列）主席克朗斯基"},{"type":"paragraph","text":"中共中央副主席李先念一月五日下午会见美国共产党（马列）主席迈克尔·克朗斯基和夫人、美共（马列）中央委员苏珊·克朗斯基，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"美国国防部长布朗抵京来我国正式访问"},{"type":"paragraph","text":"美国国防部长哈罗德·布朗博士和夫人以及由布朗部长率领的代表团一月五日晚上到达北京。布朗部长是应国务院副总理兼国防部长徐向前的邀请来我国进行正式访问的。徐向前副总理在宾馆迎候布朗部长和夫人。耿飚副总理和夫人赵兰香，中国人民解放军副总参谋长伍修权和夫人徐和等，到机场欢迎美国贵宾。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3046446ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
