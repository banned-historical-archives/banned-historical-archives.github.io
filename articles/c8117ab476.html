ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对粟裕关于舟山群岛南部海面发现美舰的处理报告的批语","alias":"","parts":[{"type":"paragraph","text":"对粟裕关于舟山群岛南部海面发现美舰的处理报告?的批语"},{"type":"paragraph","text":"（1954年6月2日）处理正确，不要先向美军开炮，只取守势，尽量避免冲突。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月二日[1]粟裕，当时任中国人民解放军副总参谋长。"},{"type":"paragraph","text":"[2]指栗裕1954年6月1日关于舟山群岛南部海面发现美舰的处理情况给刘少奇、朱德并转呈毛泽东的报告。报告说，今晨接华东军区电话称，舟山群岛南部朱家尖岛东南至上下大陈以北之海面，发现敌巡洋舰及驱逐舰共八艘，并有飞机在该海区上空盘旋飞行。似此显系美帝向我军进行挑畔。当即要华东军区转告该区我军陆海空部队，对当面之敌应严密注意监视，随时报告。如敌不向我炮击或轰炸，我军不得向其射击，以免引起冲突。如大陈岛的蒋军乘机向我守岛部队进攻，则应予以坚决回击。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":6,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":114,"page_end":114},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8117ab476"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
