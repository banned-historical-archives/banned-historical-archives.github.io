torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"胡宗南部的行动及我军部署","alias":"","parts":[{"type":"paragraph","text":"胡宗南部的行动及我军部署"},{"type":"paragraph","text":"（1936年11月20日）彭川："},{"type":"paragraph","text":"甲、敌现陷在困难中，遵蒋令由保宁堡改向定盐，解决给养，控制战略要屯，其主力进路必经红柳沟，但丁师有经山城堡、青岗峡向定边之可能。"},{"type":"paragraph","text":"乙、我以集结四个军从其右侧后打去最好，四军则从正面吸引之。"},{"type":"paragraph","text":"内、打时以首先消火其一个师取得确定胜利后，再打第二仗为原则。"},{"type":"paragraph","text":"丁、敌以为我一、二方面军向环县逃，目前企图胡\"敌完全不"},{"type":"paragraph","text":"[1]彭，指彭德怀，当时任红军前敌总指挥兼政治委员、第一方面军司令员。"},{"type":"paragraph","text":"[2]蒋，指蒋介石。[3]定盐，指陕西定边和宁夏盐池。[4]红柳沟，村名，位于陕西定边西南。"},{"type":"paragraph","text":"[5]丁师，指国民党军西北“剿匪”总司令部第一路第二纵队第七十八师，师长丁德隆。"},{"type":"paragraph","text":"[6]山城堡，村名，位于甘肃环县北部。"},{"type":"paragraph","text":"[7]胡，指胡宗南，当时任国民党军西北“剿匪”总司令部第一路第二纵队司令兼第一师师长。知，但敌增师至山城堡后则必发觉，务望注意。"},{"type":"paragraph","text":"戊、曲子红大三科\"及定、盐二十九军归你统一指挥。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二十日五时"},{"type":"paragraph","text":"[1]指中国人民抗日红军大学第三科，亦称红军大学附属步兵学校，对外又称中央教导师，当时驻甘肃环县曲子镇。毛泽东等在陕北的合影。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":11,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":6,"page_end":8},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d14efdc59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
