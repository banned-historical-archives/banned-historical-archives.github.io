<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席游草堂","authors":["林延年"],"dates":[{"year":1958,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"林延年"},{"type":"paragraph","text":"3月7日，是杜甫草堂最光辉的一天。这天午后，我们最敬爱的领袖毛主席来此游览了约四十分钟。"},{"type":"paragraph","text":"成都的西郊、特别是杜甫草堂的3月，正是春色无边，万物滋生的时节。"},{"type":"paragraph","text":"“市桥官柳细，江路野梅香。”"},{"type":"paragraph","text":"“细雨鱼儿出，微风燕子斜。”"},{"type":"paragraph","text":"一千一百多年前，伟大的爱国诗人杜甫，在这里歌咏春天景物的这些诗句，今天仍能引人入胜。"},{"type":"paragraph","text":"在这个不平常的午后，时钟刚打过四点不久，同在一起工作的同志来告诉我:“快去接待吧!有客人来草堂参观，已经从草堂寺(在杜甫草堂旁边)进来了。”我很快的跨出屋子，向浣花祠甬道走去。抬头一看，只见一位高大魁伟的人物，走在一群人的前面，巳穿这“花径”，向草堂走来了。登时，一阵兴奋的激情，从心底涌了上来，我自语着:“啊!是毛主席!我们六亿人民最敬爱的领袖到草堂来了。”我赶快走到工部祠去迎候。"},{"type":"paragraph","text":"这时，我看见毛主席迈着稳健的步伐，缓缓的走着，随意的望了望四周的翠竹、苍松和高大的楠树，踏过小桥，步上了“柴门”的台阶。"},{"type":"paragraph","text":"毛主席在看左壁间嵌着的后人凭吊杜甫草堂题咏的诗句石刻。他看得很仔细，有时用右手轻抚着下颚，有时又把微弯着的左臂背在身后，仿佛正在低吟微咏似的。毛主席浏览了工部祠内杜甫的泥塑、石刻像后，又走了出来。略为停了一下，便向“诗史堂”走去。"},{"type":"paragraph","text":"毛主席先看了“诗史堂”两壁间悬挂的各种杜甫石刻像拓片和画像，然后问道:“这是什么地方?”"},{"type":"paragraph","text":"“这是‘诗史堂’(毛主席是从后面步入堂内的，因此，不曾看到悬在前面镌有‘诗史堂’三字的匾额)，是后人纪念他修的。”接着，我向毛主席一一介绍了每张像的来历。"},{"type":"paragraph","text":"今天，“诗史堂”接待了不平常的客人，似乎比平日显得更宽敞了。这时，主席一面吸着香烟，一面端详着堂中陈列着的杜甫塑像。——映着灿烂的阳光，诗人在今天仿佛也更加神采奕奕了。"},{"type":"paragraph","text":"离开“诗史堂”，主席沿着那古雅别致的回廊，又走进了杜诗版本展览室，浏览了宋、元两代杜诗书影。一部用雪白宣纸影印的宋本杜工部集，以它宽大的版面和清晰的字迹，引起了主席的注意。我告诉主席，这是上海最近收集到的版本，发行到成都来的。"},{"type":"paragraph","text":"主席问:“有多少?”"},{"type":"paragraph","text":"“发行到成都的约有十多部。”"},{"type":"paragraph","text":"主席接着说:“太少了。”"},{"type":"paragraph","text":"毛主席在看完了明、清和近世刻印的各种不同版本的杜诗后，望着陈列在橱内的诗集说道:“是政治诗!”这是多么准确而深刻的评语!主席还仔细地看了各种杜诗外文版本。"},{"type":"paragraph","text":"最后，主席来到“大廨”，在一排栏杆前，挑选了一个带有靠背“飞来椅”的平盘上坐下休息，神态十分从容安详。边了一刻，主席起身向“大廨”前面悬挂对联的地方走去，用轻微的声音念着上联“异代不同时，问如此江山，龙蜷虎卧几诗客。”然后说道:“是集杜句”。看了上联，又走到西头，仔细看完下联。这时，主席慈祥的脸上，发出微笑，用赞赏的口吻指着对联说道:“好”。"},{"type":"paragraph","text":"毛主席参观完后离开草堂时，即和我们握手告别。我一直望着主席高大、健壮的背影，跨进汽车；望着那辆汽车，平稳而舒坦地行驶在浣花溪畔的大道上。"},{"type":"paragraph","text":"这时，阳光正普照着大地，农业社种的那葱绿的麦苗和金黄的菜花，都闪闪发光。浣花溪中，自由自在地游荡着几只白鹅、花鸭。一切都更加欣欣向荣了。回到草堂，我心里一直激动兴奋得很。晚上，看见同室一位同志在日记本上记着:今天，我们最敬爱的领袖毛主席来到草堂参观。我也在日记本上记下了这个难忘的时刻和幸福的会见。这会见给了我无比巨大的力量，异常深刻的教育，我一定要实现我的跃进规划，在伟大的社会主义建设和社会主义革命中，以三年的时间，把自己锻炼成又红又专的工人阶级的知识分子，为伟大的社会主义事业贡献出我的一分力量。"},{"type":"paragraph","text":"(原载“成都日报”)"}],"comments":[],"origin":"“成都日报”","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c594d6f711"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
