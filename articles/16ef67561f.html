art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决按毛泽东思想办事","authors":["史亭/向阳"],"parts":[{"type":"paragraph","text":"有一次，兄弟单位有的同志，到通化葡萄酒厂来买酒。在研究处理这个问题时，革委会发生了一场争论：多数同志主张要按国家规定办事，一律不卖；也有个别同志主张多少卖一些，因为葡萄酒厂经常和这些单位打交道，不卖怕影响关系。"},{"type":"paragraph","text":"听了大家的争论，军队代表胡文臣心想，葡萄酒厂和兄弟厂的关系应该是互相协作的革命关系，只有按毛泽东思想办事，才能在革命和生产上发扬社会主义协作精神。搞物质拉拢是资产阶级庸俗作风，新生的革命政权决不能搞资产阶级那一套。于是，他和革委会其他成员一起学习了毛主席关于“历史的经验值得注意”的伟大教导，学习了林副主席“九大”政治报告中的指示：“革命委员会的工作，千头万绪，必须抓根本，必须把活学活用毛泽东思想，放在各项工作的首位，用毛泽东思想统帅一切。”大家从两个阶级、两条道路、两条路线斗争的高度去看这个问题。他们大摆了本厂阶级斗争和两条路线斗争的历史。过去，葡萄酒厂的领导权把持在走资派手里，这些家伙极力推行资本主义经营方式，挖社会主义墙脚，给国家造成了很大损失。大家说：“历史的经验我们永远不能忘记，走资派的老路我们坚决不能走！”主张卖酒的同志也主动放弃了自己的意见，并表示今后要努力活学活用毛泽东思想，彻底改造旧思想，为革命掌好权、用好权。"},{"type":"paragraph","text":"来买酒的同志虽然没有买到酒，但葡萄酒厂高举毛泽东思想伟大红旗，认真执行国家的规定，使他们受到了深刻的教育，一致表示向他们学习。 （史亭、向阳）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16ef67561f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
