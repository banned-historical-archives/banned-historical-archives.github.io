rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大树特树毛泽东思想的绝对权威","authors":["北京部队机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"姚文元同志的《评陶铸的两本书》这篇文章，是高举毛泽东思想伟大红旗，活学活用毛主席著作的典范。"},{"type":"paragraph","text":"毛主席教导我们：“我们的眼力不够，应该借助于望远镜和显微镜。马克思主义的方法就是政治上军事上的望远镜和显微镜。”伟大的毛泽东思想是我们揭露一切隐蔽的阶级敌人的最好的望远镜和显微镜。我们要识破一切赫鲁晓夫式的野心家、阴谋家，防止来自右的和极“左”的两个方面的干扰，就要依靠毛泽东思想这个显微镜和望远镜，大树特树毛泽东思想的绝对权威；就要活学活用毛主席著作，彻底改造世界观，克服我们队伍内存在的无政府主义、小团体主义、山头主义、宗派主义和个人主义等错误倾向。这些错误倾向是小资产阶级的动摇性，是革命前进道路上的腐蚀剂，最容易被敌人所利用，如不及时纠正，势必干扰毛主席的伟大战略部署，阻碍无产阶级文化大革命胜利前进。因此，我们必须牢记林副主席的指示：既要把自己当作革命的动力，又要不断把自己当作革命的对象。更好地活学活用毛主席著作，大破私字，大立公字，用毛泽东思想来统一我们的思想，统一我们的行动，把我们队伍中的小资产阶级思想引导到无产阶级革命的轨道上来。"},{"type":"paragraph","text":"我们北京部队机关无产阶级革命派，决心更高地举起毛泽东思想伟大红旗，作到十分注意斗争的大方向，十分注意拥护毛主席为首的无产阶级司令部，十分注意执行毛主席和党中央统一的作战部署，十分注意掌握政策和策略，十分注意团结大多数，加强军民团结，十分注意不让陶铸式的人物从右的方面或极“左”的方面或同时从两个方面扰乱我们的阵线。巩固和加强无产阶级专政，提高警惕，防止敌人混水摸鱼，彻底揭露“五·一六兵团”这个反革命组织，坚决保卫无产阶级专政，保卫以毛主席为首的无产阶级司令部。"}],"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ade8d66f3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
