art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是世界革命人民的指南","authors":[],"parts":[{"type":"paragraph","text":"据新华社十日讯 刚果（利）全国解放委员会机关刊物《革命》一月份刊登了一篇题为《毛泽东思想是刚果和全世界革命人民的指南》的文章。文章高度赞扬“毛泽东思想是当代创造性地发展了的并同世界革命的现实相结合的马克思列宁主义。”文章强调说：“在帝国主义和殖民主义正在走向灭亡，社会主义和共产主义正在走向胜利的时代，任何真正的革命者都不能忘记：毛泽东思想是在这个革命时代出现的伟大的革命理论。”"},{"type":"paragraph","text":"文章说：“目前反对美帝国主义和新老殖民主义的斗争正在向纵深发展。越来越多的亚洲、非洲和拉丁美洲的各国人民，随着中国革命的胜利，找到了他们向帝国主义及其仆从的反动势力进行无畏的斗争的最好的指南。这个指南就是毛泽东思想，他们要学习并在他们国内根据具体情况运用毛泽东思想。”"},{"type":"paragraph","text":"文章强调指出：“毛泽东同志的著作内容丰富，分析深刻，语言简朴，为人民群众所理解，是唯一的革命理论。”"},{"type":"paragraph","text":"文章在谈到刚果（利）爱国武装斗争的切身的经验教训时指出，刚果（利）人民所经历的斗争证实了毛主席的这一著名论断：“革命的道路，同世界上一切事物活动的道路一样，总是曲折的，不是笔直的。”"},{"type":"paragraph","text":"文章最后说：毛主席的关于帝国主义和一切反动派都是纸老虎，关于建立广泛的反帝统一战线，关于武装斗争和人民战争等学说，对我们来说，是争取民族独立，消灭一切帝国主义、反动派以及他们的同伙的斗争中的宝贵理论。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f20ae778f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
