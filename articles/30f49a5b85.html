cle":{"title":"中共中央、国务院批转财政部党组《全国财政工作会议汇报提纲》的通知（节录）","dates":[{"year":1979,"month":7,"day":5}],"is_range_date":false,"authors":["中共中央","国务院","财政部党组"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局, 干审工作政策文件选编 (上), 729","tags":[{"name":"补助费","type":"主题/事件"},{"name":"财物","type":"主题/事件"},{"name":"工资","type":"主题/事件"},{"name":"退还退赔","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中文"},{"type":"title","text":"中共中央、国务院批转财政部党组《全国财政工作会议汇报提纲》的通知（节录）[1]"},{"type":"subtitle","text":"1979年7月5日"},{"type":"paragraph","text":"（八）具体规定落实政策有关补发工资和困难补助的范围、时间和标准。应当明确，落实政策，政治是第一位的，不要在拿钱问题上过分强调。凡是按政策办事，非给不可的钱，属于企业的，由企业开支，属于行政事业单位的，由所在单位的经费中开支。但范围、时间和标准要有一些具体规定。可以考虑，只按规定的期限和标准补发基本工资，附加工资和其他福利（如理发洗澡费等）不发了。属于“文化大革命”以前的问题，主要是政治上平反或改正，经济上原则不清退，个别生活确有困难的，由各单位的福利费或民政部门的社会救济费中适当补助一点。"},{"type":"paragraph","text":"[1] Note: This document can also be found in 最高人民法院刑事审判第二庭, 刑事申诉工作手册, p. 430."}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30f49a5b85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
