art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想金光闪〔演唱〕","authors":[],"parts":[{"type":"paragraph","text":"毛泽东思想金光闪，"},{"type":"paragraph","text":"它是革命的方向盘。"},{"type":"paragraph","text":"我们最热爱毛主席，"},{"type":"paragraph","text":"海枯石烂心不变。"},{"type":"paragraph","text":"毛主席光辉照草原，"},{"type":"paragraph","text":"牧工心红意志坚，"},{"type":"paragraph","text":"艰苦创业养军马，"},{"type":"paragraph","text":"扎根草原把家安。"},{"type":"paragraph","text":"毛主席的话儿记心坎，"},{"type":"paragraph","text":"艰苦重担挑在肩，"},{"type":"paragraph","text":"一心革命养军马，"},{"type":"paragraph","text":"誓把青春献草原。"},{"type":"paragraph","text":"脚踏草原头顶天，"},{"type":"paragraph","text":"牧工挥舞套马杆，"},{"type":"paragraph","text":"风沙雨雪全不怕，"},{"type":"paragraph","text":"斗天斗地战风寒。"},{"type":"paragraph","text":"革命牧工不靠天，"},{"type":"paragraph","text":"立志改造大自然，"},{"type":"paragraph","text":"改天换地不怕苦，"},{"type":"paragraph","text":"敢比愚公来移山。"},{"type":"paragraph","text":"踏破千里戈壁滩，"},{"type":"paragraph","text":"排除万难找水源，"},{"type":"paragraph","text":"抗旱打井开渠道，"},{"type":"paragraph","text":"一镐一锹干得欢。"},{"type":"paragraph","text":"要叫马场胜江南，"},{"type":"paragraph","text":"骡马肥壮羊满山；"},{"type":"paragraph","text":"铁牛高歌遍山野，"},{"type":"paragraph","text":"沙滩变成米粮川。"},{"type":"paragraph","text":"革命红旗迎风展，"},{"type":"paragraph","text":"白纸写下新诗篇，"},{"type":"paragraph","text":"朵朵葵花向阳开，"},{"type":"paragraph","text":"万紫千红好河山。"},{"type":"paragraph","text":"毛泽东思想是方向盘，"},{"type":"paragraph","text":"共产党是咱铁靠山，"},{"type":"paragraph","text":"永远跟着毛主席，"},{"type":"paragraph","text":"共产主义定实现。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a05904d4f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
