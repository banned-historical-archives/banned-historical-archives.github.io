五五年度盈余分配的指示","authors":[],"dates":[{"year":1956,"month":4,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央关于公私合营及私营企业一九五五年度盈余分配的指示","type":"title"},{"text":"最近有些地方在分配一九五五年度私营企业盈余时，对资本家的股息红利掌握得偏紧。这是不妥当的。兹特指示如下：","type":"paragraph"},{"text":"一、一九五五年度私营企业及公私合营企业的盈余分配，应根据“四马分肥”的原则办理，其中资本家的股息一项，至少占到企业盈余总额的20％；","type":"paragraph"},{"text":"二、如果所得税所占企业盈余的比重过大，可以酌减企业公积金的比例；","type":"paragraph"},{"text":"三、一九五五年度的盈余已经进行分配的地方，要根据以上精神进行复查，如果资本家所得的股息红利低于盈余总额百分之二十的，应适当调整；","type":"paragraph"},{"text":"四、为了推销一九五六年公债，资本家应得的股息，有一部分须购买公债，但应根据企业情况，分给他们一定数量的现金，由他们自行支配。","type":"paragraph"},{"text":"以上意见在执行中如有问题，请连同你们的意见电告。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84511ececb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
