rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"加深对资产阶级实行专政的理解八二炮连干部战士认真读书努力弄清资产阶级法权问题","authors":[],"parts":[{"type":"paragraph","text":"本报讯 九六六八部队八二炮连党支部，组织干部战士围绕毛主席关于理论问题的重要指示认真读书，努力弄清资产阶级法权问题，加深了对资产阶级实行专政问题的理解。"},{"type":"paragraph","text":"在学习毛主席关于理论问题的重要指示中，为了弄清资产阶级法权问题，党支部组织干部战士认真学习了《哥达纲领批判》中马克思关于社会主义社会“在经济、道德和精神方面都还带着它脱胎出来的那个旧社会的痕迹”的论述和列宁的《国家与革命》。大家认识到，社会主义是在资本主义的废墟上建立起来的，不可能一下子完全清除资本主义的痕迹，社会主义社会在分配和交换方面不可避免地还存在资产阶级法权。对资产阶级法权必须加以限制，否则，任其泛滥，发展到一定程度，就会由量的积累引起质的改变，社会主义制度就会改变颜色。一些探家归队的老战士，还联系在农村的所见所闻，谈了限制资产阶级法权的必要。他们说，要达到使资产阶级既不能存在又不能再产生，就要对资产阶级实行全面专政，狠狠打击阶级敌人的破坏活动；还要对尚存的资产阶级法权加以限制，不断向农民灌输社会主义思想，批判资本主义倾向，这是巩固无产阶级专政的一项重要措施。"},{"type":"paragraph","text":"八二炮连党支部还发动大家深入批判刘少奇、林彪一类骗子鼓吹的“确保私有财产”、“利己多欲乃规律”的谬论，批判他们妄图扩大和强化资产阶级法权，颠覆无产阶级专政，复辟资本主义的罪行。通过批判，大家对限制资产阶级法权的意义有了更深刻的认识，决心为巩固无产阶级专政而斗争。"}],"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"748eda8772"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
