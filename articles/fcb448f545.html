<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们坚决拥护陈市长的报告 一定要击退资产阶级的进攻","authors":[],"dates":[{"year":1952,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国搬运工会上海市委会"},{"type":"paragraph","text":"我们十三万搬运工人组织收购了陈市长关于五反运动的重要报告后，对资产阶级向工人阶级的猖狂进攻，表示极大的愤怒，并一致拥护陈市长的报告。"},{"type":"paragraph","text":"我们搬运工人在进行五反运动中，深刻认识到资产阶级的猖狂进攻已达到极点，许多有前途的青年被他们的糖衣炮弹击中，今天他们痛恨自己的失足，纷纷坚决要求在五反运动中立功。在我们搬运事业中，特别是码头仓库、卡车等业中，存在着大批不法工商户，他们偷窃和队藏国家物资，进行偷税漏税，我们已充分的收集和掌握了具体资料，并加以检举。"},{"type":"paragraph","text":"我们搬运工人为保卫祖国和巩固工人阶级的领导权，个个摩拳擦掌，坚决参加五反斗争，为打退资产阶级的猖狂进攻，为建设新中国而奋斗。并保证:不获全胜决不收兵。"},{"type":"paragraph","text":"在五反运动中，我们一致保证遵守上海市增产节约委员会所公布的八条纪律，争取五反运动的彻底胜利。"},{"type":"paragraph","text":"全国劳模　张德庆"},{"type":"paragraph","text":"上海的不法资本家过去虽然得到人民政府仁至义尽的帮助、照顾，但他们却忘恩负义地盗窃了国家大批资财，并严重地破坏了共同纲领，还无耻的说:‘我们不能一辈子依靠共产党。’他们五毒俱全的不法行为，真令人不能容忍。"},{"type":"paragraph","text":"中央人民政府政务院批准公布的工商业户的分类办法，真是非常宽大，不法的资本家应该及时觉悟，苦海无边，回头是岸，赶快彻底坦白，真诚交代，争取检举立功，保证以后决不再犯。"},{"type":"paragraph","text":"我们工人阶级的力量坚强无比，在毛主席的领导下，在陈市长的具体指导下，保证在五反运动中获得全胜，为国家建设铺平道路。"},{"type":"paragraph","text":"模范教师　俞燕平"},{"type":"paragraph","text":"听了陈市长的报告，更明显的认识了资产阶级的丑恶行为，他们的猖狂进攻是有组织的，用各种卑鄙的手段，进攻到我们的政府机关、党内、军队、工厂、农村以至每个角落，危害人民生活，企图夺取工人阶级的领导权，梦想走资本主义的道路，梦想把新中国再拖回到旧中国做帝国主义的殖民地，资产阶级的罪行真使人愤恨。陈市长报告说，要国家工业化，把新中国迅速的建设起来，必须把五反做得彻底，扫除了障碍才能走向社会主义。听了他的报告，我认识了五反运动的正确意义，我坚决投入五反运动中去，与广大的群众在一起，毫不留情的向资产阶级的五毒打为斗争到底，我相信全上海的教育工作者，都将投入这一伟大的运动中，广泛的深入的到每条马路每条里弄，拿出我们所有的力量，努力宣传揭露资产阶级的丑恶罪行，争取五反运动的彻底胜利。"},{"type":"paragraph","text":"上海财经学院副院长　褚葆一　褚凤仪"},{"type":"paragraph","text":"资产阶级有计划地、有组织地，用了极端卑鄙龌龊的手段，破坏抗美援朝，破坏国防建设，破坏水利、生产等经济建设，危害人民生命财产，这是整个资产阶级对工人阶级的猖狂进攻。听了陈市长的广播以后，我们更认识了上海资产阶级的凶狠恶毒，我想全上海市民都感着无比的痛恨。上海资产阶级在破坏中国经济建设中，占取第一位，不但是经济破坏，并且已发展到政治进攻，他们底危害性是很严重的，上海的五反斗争是迫切需要的。我想全上海市民听了陈市长报告以后，一定勇敢地投入五反斗争，效法沪江大学许云影同学站稳立场，大胆检举凶狠恶毒的资产阶级亲友，争取彻底消除五毒的伟大胜利。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcb448f545"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
