art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"天津为戒严部队送菜10万公斤北京拖拉机公司救护37名官兵","authors":["张水平/刘文革"],"parts":[{"type":"paragraph","text":"新华社天津6月12日电 天津市十日晚将十万公斤西红柿、黄瓜、豆角、元白菜运抵天安门广场，让在首都执行戒严任务的部队官兵吃到天津市农民生产的新鲜蔬菜。"},{"type":"paragraph","text":"连日来，天津市人民收看了中央电视台播放的北京反革命暴乱的电视录相，无不为解放军的英勇仁义所深深感动。当看到戒严部队官兵以压缩饼干和咸菜充饥时，都感到十分心疼。六月九日下午，天津市农委、市蔬菜公司根据戒严部队的需要，经过精心挑选，把最好的西红柿、黄瓜、豆角、元白菜分别装入纸箱和塑料袋，由公安干警护送运往北京。"},{"type":"paragraph","text":"本报北京6月12日讯 张水平、刘文革报道：今天，戒严部队某部的领导和部分受伤战士带着慰问品前往北京拖拉机公司，感谢他们在最危险的时刻抢救了37名官兵的生命。"},{"type":"paragraph","text":"北京拖拉机公司曾被授予“拥军模范厂”称号。4日凌晨，执行戒严任务某部部分官兵遇到暴徒的围攻。北京拖拉机公司的领导和40多名工人闻讯赶到。他们冒着石块的袭击，一面抢救受伤官兵，一面保护部队突围。突围中，一位年过花甲的老工人看到两名战士被暴徒绑架而走，奋不顾身地和3名工人冲向暴徒，救出了受伤的战士。在工人们的保护下，37名官兵全部脱险。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91e5b7fe3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
