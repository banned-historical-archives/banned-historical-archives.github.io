阶级自由化倾向，防止和清除精神污染","authors":[],"dates":[{"year":1983,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"农工民主党召开八届中常会十三次扩大会议"},{"type":"paragraph","text":"号召全体成员认真学习中共整党文件，抵制资产阶级自由化倾向，防止和清除精神污染"},{"type":"paragraph","text":"新华社北京10月28日电　中国农工民主党第八届中央常务委员会于10月22日至28日在北京举行第十三次会议（扩大）。会议决定于下月25日在北京召开中国农工民主党第九次全国代表大会，并通过了《关于拥护〈中共中央关于整党的决定〉的决议》。"},{"type":"paragraph","text":"出席会议的全体中常委于21日至26日应邀参加了中共中央召开的党外人士座谈会。农工民主党中央副主席周谷城主持了这次中常会并作了重要讲话。"},{"type":"paragraph","text":"会议通过的《关于拥护〈中共中央关于整党的决定〉的决议》指出，农工民主党和共产党是一荣俱荣，一损俱损，休戚相关。共产党的盛衰荣辱关系到我们民族的命运，国家的兴亡。因此，中共整党不光是共产党的事，也是全国人民和农工民主党的大事。决议号召农工民主党全体成员要认真学习中共整党文件，借共产党整党的东风改善自己的作风和组织，以知无不言、言无不尽的精神提出建议和意见，积极主动地帮助共产党善始善终地把整党工作做好。"},{"type":"paragraph","text":"决议还号召农工民主党全体成员继续深入学习《邓小平文选》和有关文件，提高分辨是非的能力，抵制资产阶级自由化倾向，防止和消除精神污染。决议还要求广大成员坚持四项基本原则，进一步发挥自己的聪明才智，在做好本职工作的基础上，通过各种方式，积极开展有益的社会咨询服务活动，为四化建设，为实现祖国统一大业，为保卫世界和平，作出积极的贡献，以实际行动迎接农工民主党九大的召开。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d595e36750"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
