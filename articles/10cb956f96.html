,"崔开宇","徐世明"],"dates":[{"year":1983,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　常年在五大洲三百多个港口出入的上海远洋公司的船员，在船上开展读书和各种健康的业余活动，激发起热爱祖国、热爱党、热爱社会主义的革命热情，自觉抵制资产阶级思想的污染。"},{"type":"paragraph","text":"这个公司的船员经常接触到一些不健康的东西，因此公司在各条船上组织船员普遍开展“振兴中华”的读书活动，成立了读书小组，并组织辅导讲座。船员们学习《邓小平文选》，学习中国近代史，学习张海迪，并结合实际开展讨论。许多船员积极撰写学习心得。有的货轮还组织青年开展美术、书法、摄影、乒乓、文艺等业余活动。今年国庆期间，公司举办了“职工美术、书法、摄影作品展览”，入选作品有八十多件。这些作品，有的反映了船员对祖国的热爱，有的反映了远洋船员生活和一些国家的风土人情。"},{"type":"paragraph","text":"“振兴中华”的读书活动，丰富多彩的业余生活，提高了远洋船员的思想觉悟。“风涛”轮今春在一个国家的港口装货，有人跑来与船员搭讪，说:“青年人要珍惜青春，及时行乐。我们这里要什么有什么，你们跟我干活怎么样?”“风涛”轮的青年船员回答说:“及时行乐才是浪费青春，我们中国海员要为祖国的建设出力。”"},{"type":"paragraph","text":"(史启太、徐世明、崔开宇)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10cb956f96"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
