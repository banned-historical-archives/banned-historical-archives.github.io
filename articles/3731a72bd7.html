:1973,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英、王震会见福尔曼"},{"type":"paragraph","text":"新华社一九七三年六月二日讯　中共中央军委副主席叶剑英，以及王震同志，今天下午会见美国自由投稿记者、《中国解放区见闻》一书作者哈里森·福尔曼，同他进行了友好的谈话。"},{"type":"paragraph","text":"一九四四年，福尔曼曾到达延安，访问了陕甘宁边区和八路军。三十年后的今天，福尔曼怀着对中国人民的友好情谊再次来到中国。会见时，叶剑英、王震感谢福尔曼对中国人民的珍贵友谊。福尔曼说，作为中国人民的老朋友，很高兴看到中国在各方面发生了巨大变化。他表示愿意为促进美中两国人民的友谊作出贡献。"},{"type":"paragraph","text":"参加会见的有，外交部新闻司司长彭华以及李宝球、肖心文、胡传忠、谷景叔。（附图片）"},{"type":"paragraph","text":"叶剑英、王震会见美国记者福尔曼。  　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3731a72bd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
