rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要当好“后勤部长”","authors":[],"parts":[{"type":"paragraph","text":"在全国科学大会上，邓小平同志曾经提出，为了科研大干快上，他愿意当个“后勤部长”。一年来，在这个鼓舞人心的号召下，军队院校和科研单位中，涌现了许多甘当“后勤部长”的好同志。他们立足本职，胸怀全局，踏踏实实，日夜操劳，直接间接地为教学、科研作出了贡献。这样的“后勤部长”值得赞扬，这样的“后勤部长”多多益善。"},{"type":"paragraph","text":"“我才不愿干这种伺候人的工作呢！我们为他们服务，谁为我们服务？”请同志们比比看，这同甘当“后勤部长”的思想觉悟，差距何止十万八千里。"},{"type":"paragraph","text":"“我大事还抓不完，哪有时间抓这类鸡毛蒜皮！”不对。做好后勤保障工作，为教学、科研人员创造必要的工作、生活条件，这也是党委的工作内容。如果这样的事不想干，所谓的“大事”又是些什么呢？不干实事的领导岂不是“空头领导”？于办好院校有何益！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f5df75068"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
