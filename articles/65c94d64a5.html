汝斌","河南农学院","王守正","王瑞林","程维中"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"攻击省委书记攻击中央","type":"title"},{"text":"河南农学院王瑞林张汝斌程维中王守正","type":"authors"},{"text":"王瑞林（农60级学生）：省委史书记不懂法律，不如三岁小孩，他的报告是对我们的侮辱（注：指开始反右派时，省委书记处书记史向生同志到院作报告，批判右派言行）。","type":"paragraph"},{"text":"张汝斌（选种教研组助教）：他的报告（注：指省委史书记不同意右派分子要求并系所作的报告）连放屁都不如，放屁还有点臭。","type":"paragraph"},{"text":"程维中（农60级学生）：省委史向生书记说给我们拨十三万元（注：省委给拨的十三万元，是让修校园的墙和路用的），虽然能盖几个猪窝狗棚，但也是我们斗争的初步胜利。","type":"paragraph"},{"text":"王守正（植保教研组讲师）：我院肃反中打人与中共河南省委有关，与共产党中央有关。在肃反中打人，院党委不仅不制止，反而推广打人经验。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65c94d64a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
