国的我留学生，表扬他们坚定的无产阶级立场","authors":[],"dates":[{"year":1966,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京1日电　中共中央政治局委员、国务院副总理陈毅，今天上午接见被匈牙利政府无理勒令回国的我国五名留匈学生，同他们进行了亲切的谈话。"},{"type":"paragraph","text":"陈毅副总理代表毛主席，代表党中央和国务院，向胜利归来的反修战士表示亲切的慰问。他赞扬留匈学生在反对现代修正主义的斗争中，表现了坚定的无产阶级立场，做得对，做得好。"},{"type":"paragraph","text":"陈毅副总理勉励他们要更高地举起毛泽东思想伟大红旗，活学活用毛主席著作，积极投入到无产阶级文化大革命中去，锻炼自己，把无产阶级文化大革命搞好。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a6ca4fd34"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
