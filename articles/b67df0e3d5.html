thors":[],"dates":[{"year":1972,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年九月十九日电　董必武代主席、周恩来总理、江青同志、李先念副总理，今天晚上会见了法拉赫·巴列维王后陛下，和陪同来访的王后母亲法里德·迪巴夫人、首相阿米尔·阿巴斯·胡韦达等伊朗贵宾。宾主进行了亲切友好的谈话，并一起照了相。"},{"type":"paragraph","text":"参加会见的还有姬鹏飞外长、吴德主任、沙风部长、林佳楣同志、陈辛仁大使伊朗驻中国大使阿巴斯·阿拉姆也参加了会见。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\09\\729k010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e董必武代主席、周恩来总理、江青同志、李先念副总理，九月十九日会见了法拉赫·巴列维王后陛下和陪同来访的王后母亲法里德·迪巴夫人、首相阿米尔·阿巴斯·胡韦达等伊朗贵宾。这是会见时合影。　新华社记者摄(传真照片)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\09\\729k010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e国务院总理周恩来、副总理李先念、外交部长姬鹏飞等，九月十九日同伊朗法拉赫·巴列维王后陛下和首相阿米尔·阿巴斯·胡韦达等在亲切友好的气氛中举行了会谈。这是会谈时情形。\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b67df0e3d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
