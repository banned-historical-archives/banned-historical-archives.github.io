script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第三世界国家加强经济合作反对外来控制和剥削","authors":[],"dates":[{"year":1974,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第三世界国家加强经济合作反对外来控制和剥削"},{"type":"paragraph","text":"阿拉伯经济统一委员会会议强调有必要协调阿拉伯国家经济发展计划"},{"type":"paragraph","text":"非洲国家咖啡组织年会广泛讨论改善咖啡销售和保持较高的价格问题"},{"type":"paragraph","text":"哥伦比亚财长强调应加速拉美经济一体化对付资本主义世界转嫁危机"},{"type":"paragraph","text":"新华社开罗一九七四年十二月六日电  为讨论经济发展和合作问题，阿拉伯经济统一委员会十二月三日至五日在开罗举行第二十四次会议。会议强调有必要协调阿拉伯国家经济发展计划。"},{"type":"paragraph","text":"会议决定建立阿拉伯化肥联盟，以便阿拉伯各国在化肥生产和出口方面进行合作。"},{"type":"paragraph","text":"会议还决定在规划、统计、制定关税税则、税收和管理方面向若干阿拉伯国家提供技术援助。"},{"type":"paragraph","text":"阿拉伯经济统一委员会本次会议主席、伊拉克经济部长希克马特·阿扎维在开幕会上讲话，要求采取积极措施，推动阿拉伯经济朝着统一的道路蓬勃发展。"},{"type":"paragraph","text":"阿拉伯经济统一委员会秘书长阿卜杜勒·萨克班在谈到资本主义世界通货膨胀问题时，驳斥了所谓通货膨胀的原因是提高石油价格造成的谬论。"},{"type":"paragraph","text":"新华社达累斯萨拉姆一九七四年十二月六日电　第十四次非洲国家咖啡组织年会从十二月三日至六日在坦桑尼亚首都达累斯萨拉姆举行。"},{"type":"paragraph","text":"十六个非洲咖啡生产国的代表出席了这次年会。肯尼亚的代表以观察员身份出席了这次会议。"},{"type":"paragraph","text":"非洲国家咖啡组织发言人十二月六日在这里举行的记者招待会上说，会议广泛讨论了如何在国际市场上改善咖啡销售和保持较高的咖啡价格的问题。他还说，与会代表同意把非洲国家咖啡组织的总部从巴黎迁到非洲，至于其具体地址将由这个组织的成员国进一步协商决定。"},{"type":"paragraph","text":"坦桑尼亚《每日新闻》十二月四日就召开这次年会发表社论说，若干世纪以来，那些从事剥削的国家仅仅是为了他们本国的发展而开发、运走和使用了整个第三世界的原料。现在，那些原料受到残酷盘剥的国家终于觉醒了，终于站起来向这种不公正的状况提出质问了。"},{"type":"paragraph","text":"社论最后说：“被剥削国家除了进行斗争之外别无他路。”“必须同剥削进行有力的斗争。必须打破所谓富国对第三世界原料的扼杀性控制。”"},{"type":"paragraph","text":"新华社一九七四年十二月七日讯　波哥大消息：哥伦比亚财政和公共信贷部长罗德里戈·博特罗·蒙托亚最近强调指出，拉丁美洲国家应该加速经济一体化，以对付资本主义世界经济危机给拉美国家带来的危害。"},{"type":"paragraph","text":"博特罗部长是十二月三日在麦德林城发表的一次讲话中说这些话的。他说，工业国家的经济衰退不可避免地给国际贸易带来影响。由于哥伦比亚同工业国家的贸易占了它对外贸易的百分之七十，因此，工业国家的经济衰退将对哥伦比亚的出口发生影响。他接着强调指出，为了应付这种局面，哥伦比亚应该加速同安第斯条约组织和其他拉美国家的经济一体化进程，并必须把哥伦比亚参加安第斯条约组织和拉美自由贸易协会作为它的经济政策的主要部分。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd548f84aa"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
