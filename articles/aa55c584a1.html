],"dates":[{"year":1974,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝一些组织谴责极右派破坏阴谋"},{"type":"paragraph","text":"支持临时民族联合政府决定"},{"type":"paragraph","text":"据新华社万象一九七四年五月十一日电　老挝恢复和平和实现民族和睦协调委员会等组织最近纷纷发表声明，严厉谴责万象极右派破坏万象协定及其议定书的阴谋，坚决支持临时民族联合政府关于不同意“国民议会”于十一日开会的决定，呼吁临时民族联合政府迅速实施副首相富米·冯维希在首次内阁会议上提出的有关政府工作的建议。"},{"type":"paragraph","text":"老挝恢复和平和实现民族和睦协调委员会在声明中呼吁老挝各界人士和各阶层人民一致支持临时民族联合政府和民族政治联合委员会的各项决定、决议，坚决制止一切破坏和威胁和平和民族和睦的阴谋。"},{"type":"paragraph","text":"老挝全国学联在声明中谴责一小撮极右派在临时民族联合政府和民族政治联合委员会成立之后，仍在继续利用所谓“国民议会”这个工具，破坏和阻挠临时民族联合政府、民族政治联合委员会和执行协定中央联合委员会的工作和活动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa55c584a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
