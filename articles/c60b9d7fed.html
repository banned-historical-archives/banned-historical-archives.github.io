le":"公安部关于错捕、错拘人员在押期间是否收伙食费问题的通知","dates":[{"year":1979,"month":8,"day":29}],"is_range_date":false,"authors":["公安部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 584","tags":[{"name":"错捕","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"公安部关于错捕、错拘人员在押期间是否收伙食费问题的通知"},{"type":"subtitle","text":"(一九七九年八月二十九日)"},{"type":"paragraph","text":"关于错拘捕人员在押期间是否收伙食费的问题，因公安部过去没有统一规定，各地执行不一致，有的不收伙食费，有的收了伙食费上交到地方财政部门，有的收了又退还本人。鉴于在押未决犯的伙食费，已在国家拨给的经费中开支，因此，今后凡错捕、错拘留的和未起诉判刑作其他处理的释放人员，一律不再收在押期间的伙食费。对过去已收了伙食费的退不退还本人，由各省、市、自治区自行确定。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c60b9d7fed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
