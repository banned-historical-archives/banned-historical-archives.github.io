"authors":[],"dates":[{"year":1959,"month":5,"day":26}],"is_range_date":false,"parts":[{"text":"四川省万县地委关于公社算账情况的简报","type":"title"},{"text":"……（上缺）交代清楚自己的问题，如公德区队保管员潘学久，原在下面悠然自得，打算闯过关去，这次被迫交代出贪污拉用款86元，隐瞒私分各种粮食7980多斤，基本弄清了问题。","type":"paragraph"},{"text":"当前发现的问题，部分地区由于政策交代不够，工作方法简单粗糙的少数问题较大的干部，畏罪潜逃和自杀事件均有发生，据云阳县统计，已逃跑12人，巫山、梁坪公社石羊区队原小社主任廖吉早（已撤职）贪污80元已承认退出，以后群众又揭发他贪污200元，红苕10000斤，有些群众因为义愤还带木棍准备打他，次日夫妻两投塘而死。万县市龙宝公社九龙区队支书张目华，贪污盗窃拉用公款本人不很好交代，在市委五干会议期间，又拉用公款20元，群众揭发后不诚恳坦白交代服毒自杀（经及时拯救未死）。……（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26a4a86a91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
