同社会主义革命的利益和目的不相容","authors":[],"dates":[{"year":1963,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"古巴革命政府公布一项法律"},{"type":"paragraph","text":"超过五卡瓦耶里亚的庄园一律收归国有"},{"type":"paragraph","text":"农村资产阶级的存在同社会主义革命的利益和目的不相容"},{"type":"paragraph","text":"新华社哈瓦那四日电　古巴政府今天公布了由多尔蒂科斯、卡斯特罗和内阁会议成员签署的一项法律，规定把所有土地面积超过五卡瓦耶里亚（六七点一○公顷）的庄园收归国有。"},{"type":"paragraph","text":"这项法律在陈述这一决定的理由时说，“目前存在着土地面积超过六七点一○公顷的庄园，资产阶级土地所有者掌握着这些庄园来损害劳动人民的利益，阻碍供应居民的粮食生产，并且用产品进行投机或把他们剥削他人劳动所得的高额收入用于反社会和反革命的目的。”"},{"type":"paragraph","text":"法律说，“农村资产阶级的存在是同社会主义革命的利益和目的不相容的。”“必须建立起通过国营农牧业和小农的联合努力发展我国农业的决定性的基础，小农构成了由于革命而摆脱了地主、高利贷者和中间商人剥削的农民中的大多数。”法律说，“美帝国主义依靠与工农为敌的阶级，主要是农村资产阶级，加紧进行反对革命和反对我们祖国的活动，因此，必须消除这些人的经济和社会势力的影响。”"},{"type":"paragraph","text":"法律说，“革命政府打算最大限度地促进农业发展以完全满足人民的需要和促进国家经济发展。”"},{"type":"paragraph","text":"法律规定，在土地改革法颁布后通过伙耕或租佃合同、口头许诺或其他任何契约以及没有得到土地改革全国委员会批准而进行的土地的出售或转让都无效。这项法律规定，政府对收归国有的五卡瓦耶里亚以上的庄园将给予赔偿，赔偿费在十年内付清。"},{"type":"paragraph","text":"在这以前，根据古巴政府一九五九年五月颁布的土地改革法的规定，一个自然人或法人可拥有最多为三十卡瓦耶里亚的土地，超过这个限度的土地将被征用并且分配给无地农民和农业工人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38dea8acf9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
