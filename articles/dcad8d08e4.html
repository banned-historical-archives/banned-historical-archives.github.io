ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给毛宇居的信","alias":"","parts":[{"type":"paragraph","text":"给毛宇居的信"},{"type":"paragraph","text":"（1952年10月2日）宇居兄："},{"type":"paragraph","text":"李邹二位来京，收到你的信，并承佳，甚为感谢。"},{"type":"paragraph","text":"毛泽连来信叫苦，母尚未葬，脚又未好，兹寄人民币三百万元，以一百万元为六葬费，二百万元为泽连治病之费。请告他不要来京，可到长沙湘雅医院诊治，如湘雅诊不好，北京也就诊不好了。"},{"type":"paragraph","text":"另寄二百万元给泽荣（逊五）助其家用。他有信来，我尚未复，请转告他，不另写信了。"},{"type":"paragraph","text":"以上均请费神转致为荷！"},{"type":"paragraph","text":"顺问康吉！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年十月二日这些钱均是我自己的稿费，请告他们节用。[1]毛宇居，毛泽东的堂兄和少年时的私垫老师。"},{"type":"paragraph","text":"[2]李，指李漱清，辛亥革命前是韶山的进步教员，毛泽东常去他家看书、请教。邹，指邹普勋，毛泽东少年时的私垫同学和邻居。"},{"type":"paragraph","text":"[3]毛泽连，毛泽东的堂弟。[4]泽荣，即毛泽荣，又名逊五，毛泽东的堂弟。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":10,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":276},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcad8d08e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
