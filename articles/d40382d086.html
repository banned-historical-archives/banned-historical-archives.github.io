art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席会见西萨摩亚议会代表团宾主进行了诚挚、友好的谈话。谭震林副委员长等会见时在座","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年三月十七日讯 中共中央主席、国务院总理华国锋今天下午会见了西萨摩亚立法议会议长利奥塔·勒乌卢艾亚利·伊图乌·阿里和由他率领的西萨摩亚议会代表团。"},{"type":"paragraph","text":"参加会见的代表团成员有：伊英格·苏瓦福尔、利奥佩佩特莱·陶伊普、鲁瓦图瓦奴·艾塔瓦、萨姆·赛利、塔里亚瓦·玛瓦马、莱亚塔瓦·约塞法、乔治·费普莱亚。"},{"type":"paragraph","text":"会见充满亲切的气氛。利奥塔议长等西萨摩亚贵宾来到会见厅时，华主席迎上前去，同他们一一握手，对远道而来的贵宾表示热烈的欢迎。合影以后，宾主进行了诚挚、友好的谈话。利奥塔议长转达了西萨摩亚国家元首马列托亚·塔努马菲利第二殿下、西萨摩亚政府和人民对华国锋主席、中国政府和人民的问候。华主席对此表示衷心的感谢。他请利奥塔议长回国以后向马列托亚元首殿下、图普亚·塔马塞塞·利洛菲副元首殿下、图普奥拉·埃菲总理阁下转达中国政府、中国人民和他本人的敬意，并祝西萨摩亚繁荣昌盛。"},{"type":"paragraph","text":"会见时在座的有人大常委会副委员长谭震林、秘书长姬鹏飞、副秘书长武新宇，外交部副部长王海容。"},{"type":"paragraph","text":"华主席同利奥塔议长握手。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"华主席同利奥塔议长率领的西萨摩亚议会代表团合影。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d40382d086"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
