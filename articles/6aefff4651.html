hors":[],"dates":[{"year":1967,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市第六中学(原市六女中)革命师生以“斗私，批修”为纲，正在掀起一个大学毛主席建党理论、大批中国赫鲁晓夫修正主义建党路线的高潮，并以此带动复课闹革命和学校的各项工作。"},{"type":"paragraph","text":"这几天来，在校文革领导下，各种批判小组用写大字报、开座谈会、小型批判会等各种方式，口诛笔伐中国赫鲁晓夫在建党问题上所犯下的滔天罪行。红卫兵小将说，我们虽然不是党员，但我们同样受到修正主义建党路线的影响，一定要把批判修正主义建党路线放在头等重要地位，把它批深批透。否则我们教育革命就白搞，我们就可能成为资产阶级接班人。运动前期执行过资产阶级反动路线的革命的党员、干部说，这次学习毛主席的建党理论，批判中国赫鲁晓夫的修正主义建党路线，是对自己的严峻考验。他们表示，通过大学习、大批判，争取做一个毛主席的好党员。"},{"type":"paragraph","text":"最近，这个学校的革命师生举行了“高举毛泽东思想伟大红旗，彻底批判修正主义建党路线大会”，革命红卫兵小将、革命教师、工人、党员以及刚进校不久的初一学生怀着万分愤怒的心情，从各方面批判了中国赫鲁晓夫所推行的修正主义建党路线。"},{"type":"paragraph","text":"革命师生通过大学习、大批判，精神面貌起了很大变化。他们决心通过对中国赫鲁晓夫修正主义建党路线的群众性的批判，肃清其流毒，搞好党员和群众的关系、干部和群众的关系，促进思想革命化，推动教育革命深入开展，把学校的无产阶级文化大革命进行到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6aefff4651"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
