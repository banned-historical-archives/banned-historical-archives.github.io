"何秀亭","佘轩","党文蔚","吕庆仕","朱庭训","王金彦","西北农学院","贠虎璋"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于反右派斗争的右派言论","type":"title"},{"text":"西北农学院何秀亭贠虎璋佘轩党文蔚吕庆仕朱庭训王金彦","type":"authors"},{"text":"1．“在国民党的诽谤、诬蔑围剿下共产党尚能得到广大群众拥护。现在储安平等人说几句不正确话，共产党就害怕了。”(林58级学生 何秀亭)","type":"paragraph"},{"text":"2.  反右开始时，他说：“执政党先把帽子亮一亮，别人那里再有心情争鸣。”“葛佩琦的言论虽然是错误的，但人家作的是革命工作。”(水58级学生 贠虎璋)","type":"paragraph"},{"text":"3．关于反右斗争，他说：“这是小题大作，硬制造矛盾，使矛盾尖锐化，而达到让社会前进的目的。”“辩论会实质上是斗争会，是众多之势压人，我认为真正的辩论会应该是‘圆桌会议’那样，不要主席大家都可以随便谈，然后再辩论谁是谁非。”党批判储安平时他说：“如果真是‘言者无罪’为何又把反社会主义的大帽子拿出来吓人，如此看来，仍只能‘一家独鸣’为善。”“不该把‘反社会主义’的大帽子拿出来吓人。正确的态度是大家都鸣，不要先亮亮帽字，再叫别人鸣，如此鸣法，虽则曰‘鸣’，实则曰‘收’。共产党对别人抛去一顶帽子，分量有多重，黄先生(指批评郭士英说储安平是爱国爱党的黄志尚先生)应该知道。帽子后面跟着什么，黄先生也应该知道。”“应该让储安平的言论鸣，群起而攻之，这叫什么平等？如此看来，仍只能‘一家独鸣’为善，要不然，只能啾啾作‘黄鹂翠柳’的和声。”“未争鸣前先戴上个帽子，与一手执着宝剑，一手拿着经典的中世纪传教方式有何异同呢？”(农60级学生 佘轩)","type":"paragraph"},{"text":"4．在开始反右时他反对反右，他说：“现在不能鸣放了，开始收了，这简直是压制鸣放简直是胡闹。”“反右在我院形成了白色恐怖，人心自危了。”(水58级学生 党文蔚)","type":"paragraph"},{"text":"5．反右一开始他说：“这又是马列主义一家独鸣”。他赞扬右派份子说：“林希翎不简单，能在大所广场之下发表漂亮的演说。”(植60级学生　吕庆仕)","type":"paragraph"},{"text":"6．“整风和反击右派和我无关，事不关己，高高挂起。”(园59级学生　朱庭训)","type":"paragraph"},{"text":"7．“感到右派分子有本事，自己感到很遗憾。”(水58级学生  王金彦)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3d0de8b44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
