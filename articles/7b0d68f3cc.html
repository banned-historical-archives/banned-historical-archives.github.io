script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏里南纪念奴隶解放日","authors":[],"dates":[{"year":1976,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏里南纪念奴隶解放日"},{"type":"paragraph","text":"新华社乔治敦一九七六年七月二日电　帕拉马里博消息：苏里南政府和人民在七月一日举行了纪念奴隶解放日的活动。"},{"type":"paragraph","text":"在首都帕拉马里博举行了群众大会，纪念在这个国家历史上具有重要意义的废除奴隶制的日子（一八六三年七月一日）。"},{"type":"paragraph","text":"苏里南政府已正式宣布奴隶解放日为全国的一个假日，以纪念苏里南人民反殖、反帝斗争的胜利。"},{"type":"paragraph","text":"据历史记载，欧洲一些殖民主义国家从十六世纪初就开始争夺这个资源丰富的地区。为了开发那里的种植园、矿山和牧场，殖民主义者从非洲贩卖大批黑人奴隶到苏里南，他们受到种植园主的残酷剥削，许多奴隶被折磨致死。哪里有压迫，哪里就有反抗。奴隶们纷起进行武装斗争，围攻殖民主义者所筑立的堡垒。由于他们坚持不断的斗争，在苏里南的奴隶制终于在一八六三年七月一日被废除。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b0d68f3cc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
