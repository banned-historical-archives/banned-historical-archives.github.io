script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市革委会郊区组、教卫组在江镇公社召开现场会彻底批臭反革命修正主义医疗卫生路线走“赤脚医生”道路更好地为工农兵服务","authors":[],"dates":[{"year":1968,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了全面落实毛主席的最新指示，向“赤脚医生”学习，走“赤脚医生”的道路，市革委会郊区组、教卫组于昨天在川沙县江镇公社召开经验交流现场会。"},{"type":"paragraph","text":"会上，川沙县江镇公社“赤脚医生”代表以及踏上了同贫下中农结合道路的江镇公社卫生院医生黄钰祥同志分别介绍了他们在毛泽东思想哺育下，自觉接受工农群众对他们的再教育，全心全意为贫下中农服务的先进事迹。江镇公社贫下中农代表列举大量事实，热情称赞“赤脚医生”就是好。江镇公社革委会负责人介绍了依靠广大贫下中农，培养“赤脚医生”，掌握医疗卫生大权的经验。"},{"type":"paragraph","text":"在现场会上，到会代表进一步学习了毛主席关于教育革命和对知识分子再教育的一系列最新指示。大家认为:《红旗》杂志第三期发表的《从“赤脚医生”的成长看医学教育革命的方向》这篇调查报告，传来了毛主席的最新指示和以毛主席为首、林副主席为副的无产阶级司令部的战斗号令，为我国社会主义医疗卫生事业的发展指明了前进的方向，为农村“赤脚医生”的成长开辟了广阔的道路。到会同志一致表示:要坚决遵照毛主席“要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去”的教导，大力培养“赤脚医生”，进一步巩固和发展这一支新型的医疗卫生队伍，更好地为广大贫下中农服务，为农村三大革命运动服务。"},{"type":"paragraph","text":"会上，大家列举事实说明，十几年来，在农村医疗卫生事业上，存在着两个阶级、两条道路、两条路线的激烈斗争。中国赫鲁晓夫及其在上海的代理人陈丕显、曹荻秋、杨西光之流，竭力推行反革命修正主义医疗卫生路线，贩卖帝、资、修的破烂货。他们一方面拼命扼杀农村“赤脚医生”的成长，一方面把大批医生留在城市，妄图把他们引向脱离无产阶级政治、脱离群众、脱离实际的邪路。现在，修正主义的医疗卫生路线的流毒尚未肃清，我们一定要牢记毛主席“千万不要忘记阶级斗争”的伟大教导，深入持久地开展革命大批判，彻底批判反革命修正主义医疗卫生路线，更好地落实毛主席关于医疗卫生工作的一系列指示，把医疗卫生战线的文化大革命进行到底。"},{"type":"paragraph","text":"不少从旧学校出来的医务工作者也在会上发了言。他们一致表示:要向“赤脚医生”学习，向黄钰祥同志学习，坚决走与工农兵相结合的道路，接受工农兵的再教育，努力改造旧思想，力争“完全”“彻底”为工农兵服务。到会的贫下中农也纷纷表示，热烈欢迎广大医务工作者到农村来“滚一身泥巴”，在火热的斗争中锻炼自己，改造自己。"},{"type":"paragraph","text":"市革委会郊区组、教卫组的负责同志出席了会议，并在会上讲了话。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2571ad62cc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
