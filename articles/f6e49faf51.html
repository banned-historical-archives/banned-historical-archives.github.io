script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共（马列）《澳大利亚共产党人》和《先锋报》号召澳革命者  努力宣传马列主义、毛泽东思想  深入学习中国共产党“九大”文件","authors":[],"dates":[{"year":1970,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）《澳大利亚共产党人》和《先锋报》号召澳革命者"},{"type":"paragraph","text":"努力宣传马列主义、毛泽东思想  深入学习中国共产党“九大”文件"},{"type":"paragraph","text":"新华社二十九日讯　澳大利亚共产党（马克思列宁主义）机关理论刊物《澳大利亚共产党人》不久前发表文章，号召澳大利亚的马克思列宁主义者高举阶级斗争的旗帜，努力宣传马克思主义、列宁主义、毛泽东思想，同形形色色的资产阶级思想进行斗争。"},{"type":"paragraph","text":"这篇题为《高举阶级斗争的旗帜》的文章指出，近来，成千上万的澳大利亚工人举行了罢工，要求提高工资。由于工人阶级和其他劳动人民都行动起来了，另一场具有重要意义的伟大斗争爆发了，这就是争取思想领域中的领导权的斗争。"},{"type":"paragraph","text":"文章说，劳动人民受到剥削，所以他们要进行斗争。没有工人，资产阶级绝不可能积累起巨大的财富。资本主义制度是建立在剥削劳动人民的基础上的。资产阶级竭力要加以掩盖的正是这些真理。但是，不管资产阶级怎样力图掩盖真实情况，真理总是真理。工人阶级现在已经有了自己的革命的理论，这就是马克思主义、列宁主义、毛泽东思想。马克思主义、列宁主义、毛泽东思想的革命理论是无产阶级斗争的总结。"},{"type":"paragraph","text":"文章指出，伟大的列宁指出：“革命的社会主义政党的真正任务不是臆造种种改造社会的计划，不是劝导资本家及其走狗改善工人的处境，不是策划阴谋，而是组织无产阶级的阶级斗争，领导这一斗争，争取达到最终目的——由无产阶级取得政权和组织社会主义社会。”澳大利亚共产党（马克思列宁主义）是革命的党。澳共（马列）提出了革命阶级的政治纲领，并且认为，工人阶级和其他劳动人民现在就应该进行革命斗争。"},{"type":"paragraph","text":"文章说，毛泽东主席说：“社会的变化，主要地是由于社会内部矛盾的发展，即生产力和生产关系的矛盾，阶级之间的矛盾，新旧之间的矛盾，由于这些矛盾的发展，推动了社会的前进，推动了新旧社会的代谢。”在资本主义国家里，资产阶级同工人阶级之间的矛盾正在深化，澳大利亚的情况也是如此。"},{"type":"paragraph","text":"文章最后说：“真正的革命者主张采取把革命理论介绍给劳动人民，帮助他们提高阶级觉悟的办法来促进阶级矛盾的发展。这就是说，要同各种资产阶级的观念展开坚持不懈的、无情的斗争，要为无产阶级的思想体系——马克思主义、列宁主义、毛泽东思想而战斗。”"},{"type":"paragraph","text":"新华社墨尔本三十日电　澳大利亚共产党（马克思列宁主义）机关报《先锋报》最近发表社论，号召澳大利亚全体革命者深入学习中国共产党第九次全国代表大会的文件。"},{"type":"paragraph","text":"社论说：“中国共产党的第九次全国代表大会确实是一个具有历史意义的事件。这次大会的文件是对马克思主义、列宁主义、毛泽东思想的极为重要的贡献。”"},{"type":"paragraph","text":"社论说：“澳大利亚共产党人的任务，正如我们所指出过的，是把马克思主义、列宁主义、毛泽东思想的普遍真理同澳大利亚的实际情况结合起来。这就是说，要把马克思所提出的、由列宁和毛泽东所发展了的理论交给澳大利亚人民，并且应用到澳大利亚的斗争中去。这个理论揭示了社会的本质、阶级斗争以及怎样进行阶级斗争来推翻资本主义，建立无产阶级专政。”"},{"type":"paragraph","text":"社论指出，马克思主义、列宁主义、毛泽东思想提供了唯物辩证法的世界观。对澳大利亚革命者来说，就是要把它运用到澳大利亚的革命斗争中去。中国共产党第九次全国代表大会的文件贯穿着唯物辩证法，因为这些文件是从中国和世界的斗争中总结出来的。"},{"type":"paragraph","text":"社论强调说，这些文件是大家学习的典范，是澳大利亚革命者努力把马克思主义、列宁主义、毛泽东思想的普遍真理同澳大利亚的实际相结合以及如何带着问题进行学习的典范。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6e49faf51"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
