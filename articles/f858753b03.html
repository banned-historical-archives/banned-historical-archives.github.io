art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伟大的导师 伟大的领袖 伟大的统帅 伟大的舵手 毛主席万岁！","authors":["牛嵩林/蒋铎"],"parts":[{"type":"paragraph","text":"（照片一）毛主席是我们心中最红最红的红太阳！我们永远忠于伟大领袖毛主席！永远忠于伟大的毛泽东思想！永远忠于毛主席的无产阶级革命路线！毛主席指向那里，我们就打到那里！我们坚决响应林副主席的号召，高举毛泽东思想伟大红旗，在无产阶级文化大革命运动中立新功！"},{"type":"paragraph","text":"本报记者 牛嵩林摄"},{"type":"paragraph","text":"（照片二）伟大的领袖毛主席啊！在您的英明领导下，祖国一日千里地前进。光焰无际的毛泽东思想指引着我们从胜利走向胜利。我们坚决紧跟您的伟大战略部署，坚决执行以您为首的无产阶级司令部的战斗号令，做革命大批判的模范，做促进革命大联合的模范，做抓革命，促战备、促工作、促生产的模范，坚决搞好“三支”“两军”工作，誓把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"人民日报记者 蒋铎摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f858753b03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
