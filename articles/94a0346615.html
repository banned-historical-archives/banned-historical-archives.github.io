"authors":[],"dates":[{"year":1954,"month":9,"day":4}],"is_range_date":false,"parts":[{"text":"中共中央关于今年秋征问题的指示","type":"title"},{"text":"各中央局、分局并转省、市委并财委，并告中财委（财、农）：","type":"appellation"},{"text":"1953年粮食年度内（至今年六月止），粮食统购已超过计划，粮食统销也超过计划，库存虽有增加，但在数量上和粮食品种间的调剂调度仍感觉困难，说明我们的粮食情况还是很紧的；加以今年水灾严重，灾情集中在产量较高的大米丰产区，在这些遭灾地区，征收势必减少，销量将要增加。现在杂粮已紧，今年灾区是在大米区，估计明年大米也会十分紧张，因此，明年的粮食情况将会是很紧张的。","type":"paragraph"},{"text":"中财部党组提出在今年丰产区和非灾区，在贯彻政策的基础上适当多征一些粮食的意见是必要的，也是可能的。今年部分地区的灾情虽十分严重，但估计全国的粮食产量仍将超过去年；而且一个省内，遭受重灾的只是部分县区，一个县内也还有若干区乡没有灾情或灾情较轻，而在一切没有遭灾的地方，今年收成都好，生产已有了提高，在这些地区多征一点粮食，以弥补灾区减征，是适当的。只要把道理讲清楚，群众是可以接受的。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94a0346615"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
