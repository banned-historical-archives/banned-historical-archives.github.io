r":1963,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席召集最高国务会议"},{"type":"paragraph","text":"刘主席和周总理就当前国际国内形势和今后任务作了重要的讲话"},{"type":"paragraph","text":"彭真副委员长就第二届全国人民代表大会第四次会议的主要问题作了报告"},{"type":"paragraph","text":"出席会议的各方面人士共一百五十五人　会议对上述问题进行了讨论"},{"type":"paragraph","text":"新华社十六日讯　中华人民共和国刘少奇主席在十五和十六两日召集了最高国务会议。会上，刘少奇主席和周恩来总理就当前国际国内形势和今后任务作了重要的讲话，彭真副委员长就第二届全国人民代表大会第四次会议的主要问题作了报告。会议对上述问题进行了讨论。出席这次会议的有国家领导人、中国共产党、各民主党派和各人民团体的负责人、社会各界著名人士以及其他有关方面人士共一百五十五人。（附图片）"},{"type":"paragraph","text":"刘少奇主席和其他领导人在最高国务会议上。"},{"type":"paragraph","text":"新华社记者　杜修贤摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc2dc1403f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
