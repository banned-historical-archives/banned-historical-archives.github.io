<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺中朝友好条约签订一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺中朝友好条约"},{"type":"paragraph","text":"签订一周年的电报"},{"type":"paragraph","text":"（1962年7月10日）朝鲜劳动党中央委员会委员长、朝鲜民主主义人民共和国内阁首相金日成同志，朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健同志："},{"type":"paragraph","text":"欣逢中朝友好合作互助条约签订一周年，我们谨代表中国人民、中国共产党和中华人民共和国政府，向你们，并通过你们向兄弟的朝鲜人民、朝鲜劳动党和朝鲜民主主义人民共和国政府，致以最亲切、最热烈的祝贺。"},{"type":"paragraph","text":"中朝友好合作互助条约，是我们两国人民的伟大团结和以鲜血凝成的战斗友谊的结晶，是两国人民友好关系史上新的光辉的里程碑。这个条约，充分体现了我们两国人民全面发展两国的友好合作关系、保障两国的共同安全以及维护亚洲和世界和平的真诚愿望和坚定意志。一年前，苏朝友好合作互助条约和中朝友好合作互助条约的相继签订，不仅是苏联、朝鲜和中国三国人民政治生活中的重大事件，也生动地标志看整个社会主义阵营的强大的团结和友谊。中国人民将坚定不移地同兄弟的朝鲜人民一道，同所有社会主义国家的人民一道，为社会主义和共产主义事业的新胜利，为反对帝国"},{"type":"paragraph","text":"毛泽东等祝贺中朝友好条约签订一周年的电报主义和争取持久和平的新胜利，携手合作，奋斗到底。"},{"type":"paragraph","text":"英勇勤劳的朝鲜人民，在以金日成同志为首的朝鲜劳动党和共和国政府的正确领导下，以自力更生的革命精神和干里马的豪迈步伐，取得了社会主义建设的辉煌成就。同时，他们在反对美帝国主义侵略和实现祖国和平统一的斗争中，作出了卓越的贡献。屹立在社会主义阵营东方前哨的强大的朝鲜民主主义人民共和国，将永远是对于中国人民的巨大鼓舞和有力支援。中国人民有着像朝鲜人民这样肝胆相照、风雨共舟的亲密战友而感到自豪。"},{"type":"paragraph","text":"中朝两国人民的伟大团结和战斗友谊，是建立在马克思列宁主义和无产阶级国际主义原则的基础上的，是牢不可破的。中国人民将永远珍视并且不断努力来加强这种团结和友谊。中国人民将坚决履行自己的一切义务，捍卫我们的共同事业。"},{"type":"paragraph","text":"祝中朝两国人民久经考验的、伟大的友谊万古长青！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1962年7月10日于北京"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":162,"page_end":163},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1f8b5c843"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
