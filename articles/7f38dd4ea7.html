script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"史学的起源与奴隶社会的史学","authors":[],"dates":[{"year":1961,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杨翼骧在本月6日《天津日报》发表了《我国史学的起源与奴隶社会的史学》一文。作者认为，探求我国史学的起源，应当从文字出现的时候谈起。甲骨文可能不是我国最原始的文字，殷代以前是否有文字虽不能断言，但殷代确实有了甲骨文，所以谈史学起源，应当从殷代开始。从殷墟的甲骨文里已可了解殷代社会经济、政治和文化的概况。虽然它不过是统治阶级的文字纪录的一部分，但知道丁殷周奴隶制国家机构中便有史官担任记录时事、起草公文、掌管文书工作。这些资料经过一定时期的积累，又加以整理、编纂而成史书。就在这记录史实和编纂史书的过程中，逐渐取得了记言、记事和编纂的方法，产生了初期史学。"},{"type":"paragraph","text":"关于奴隶社会的史书《尚书》、《周书》，众所周知是经后人羼入文字，但不能因为有后人羼入部分文字而否定全书的著作年代。《春秋》有好几部，流传下来的孔子作的《春秋》也不完全是孔子的创作，而是继承了过去鲁国史官的一贯的立场、观点，再通过对历史记载的整理和改写，作进一步的表达和阐明而已。孔子不是史官，他首先以私人资格写成了一部简明编年史，是我国最早的一位史学家。"},{"type":"paragraph","text":"作者认为，奴隶社会的史学成就是:①确定了按年、月、日的顺序的记事方法，出现了时间分明的编年史；②在记录史实和编纂史书时有记言、记事的分工；③认识到历史记载对于了解过去、鉴往知来以及垂训鉴戒的作用，因而树立了尊重历史记载的观念；④史学由官府独占之下，逐渐推广到为统治阶级的一般知识分子所掌握，如孔子不是史官，他以史学来教育学生，经孔子编《尚书》、作《春秋》之后，史学的传布益广，而这就更促进了史学的发展。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f38dd4ea7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
