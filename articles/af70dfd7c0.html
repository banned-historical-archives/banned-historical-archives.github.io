script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴特寮通讯社揭露  美国和万象极右派加紧侵犯解放区","authors":[],"dates":[{"year":1974,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴特寮通讯社揭露"},{"type":"paragraph","text":"美国和万象极右派加紧侵犯解放区"},{"type":"paragraph","text":"新华社一九七四年三月十一日讯　巴特寮通讯社最近在一篇报道中揭露美国和万象极右派不断加强军事行动，侵犯老挝各爱国力量控制的地区。"},{"type":"paragraph","text":"报道说，在川圹省，今年一月和二月，美国和万象极右派用飞机把大批弹药和其它作战物资运送到“特种部队”的盘龙基地。他们还派飞机对各爱国力量控制地区进行轰炸和扫射，使当地人民的生命和财产遭受许多损失。"},{"type":"paragraph","text":"在沙湾拿吉省，美国和万象极右派从二月一日到二十日不断派飞机对解放区的许多地方进行侦察飞行，接着又在二月二十七日，派三架飞机多次侦察解放区的一些村庄。二月十六日，他们派出军队非法进驻解放区的万孔和科通村。同一天，四名美国“顾问”到西利卡朗会见了当地的万象极右分子，共同策划进攻九号公路沿线解放区的阴谋。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af70dfd7c0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
