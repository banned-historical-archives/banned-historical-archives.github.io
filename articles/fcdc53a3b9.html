tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"谴责美帝对委内瑞拉的剥削和干涉深信委民族解放军终有一天把敌人清除干净","authors":[],"parts":[{"type":"paragraph","text":"据新华社哈瓦那十五日 电 古巴邮电部长赫苏斯·蒙塔内少校昨天晚上在这里说：“总有一天，委内瑞拉民族解放阵线的武装手臂——委内瑞拉民族解放军的英雄战士们将冲下山来，象滚滚巨浪一样，把委内瑞拉祖国的敌人永远清除干净。我们的遭受历代最凶恶的帝国主义奴役的拉丁美洲，也一定会对古巴和委内瑞拉的榜样发出反响。”"},{"type":"paragraph","text":"蒙塔内是在委内瑞拉民族解放阵线驻古巴代表团办事处举行的古巴声援委内瑞拉人民斗争周开幕式上说这番话的。"},{"type":"paragraph","text":"蒙塔内少校代表古巴社会主义革命统一党和革命政府向委内瑞拉战士们致意，并向他们表示兄弟般的声援。他在讲话中重申了第二个哈瓦那宣言的革命观点，并谴责了美帝国主义对委内瑞拉的剥削和干涉。"},{"type":"paragraph","text":"他说，委内瑞拉最勇敢的儿女们正在山区和城市里打击帝国主义敌人。委内瑞拉人民原想通过和平道路解决他们的经济、政治和社会危机，但是他们的这种想法却由于帝国主义走狗的顽固不化而没有实现，这些走狗不给人民丝毫机会来让他们提出自己的合理要求。"},{"type":"paragraph","text":"委内瑞拉左派革命运动领导人和委内瑞拉民族解放阵线驻古巴代表团成员埃克托·佩雷斯·马尔卡诺在开幕式上说，拉丁美洲各国人民仿效古巴的光辉榜样，正在陆续投入争取自己解放的斗争。他说：“我们正在走向解放。我们不惜付出一切必要的代价。我们在山上的游击队员是坚定不移的。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcdc53a3b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
