等到机场送行","authors":[],"dates":[{"year":1974,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年四月十九日电　以柬埔寨民族统一阵线中央政治局委员、王国民族团结政府副首相兼国防大臣、民族解放人民武装力量总司令乔森潘为团长，副首相府特别顾问英·萨利为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，今天下午乘专机离开北京，前往欧洲和非洲一些国家进行访问。"},{"type":"paragraph","text":"代表团团员有柬埔寨王国民族团结政府外交大臣沙林察、人民教育和青年大臣英·蒂丽女士等。"},{"type":"paragraph","text":"到机场送行的有:"},{"type":"paragraph","text":"我国领导人叶剑英、吴德；"},{"type":"paragraph","text":"柬埔寨王国民族团结政府首相宾努亲王和夫人；"},{"type":"paragraph","text":"我国有关方面负责人耿飚、张才千、韩念龙、申健，中国驻柬埔寨大使康矛召；"},{"type":"paragraph","text":"柬埔寨王国民族团结政府官员周成、江裕朗、秀木、杨森安将军、秀蒲拉西、万比尼、柬埔寨驻中国大使笃坎敦。"},{"type":"paragraph","text":"到机场送行的还有阿尔巴尼亚、南斯拉夫、罗马尼亚、阿尔及利亚、毛里塔尼亚、喀麦隆驻中国的外交使节。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1e7191ca4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
