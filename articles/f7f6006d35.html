,"authors":[],"dates":[{"year":1968,"month":5,"day":18}],"is_range_date":false,"parts":[{"text":"中共中央、中央文革关于“世界革命的中心”论的重要通知","type":"title"},{"text":"毛主席批示：  照发。","type":"appellation"},{"text":"最近毛主席批评了在一个文件中用了“世界革命的中心--北京”这种提法。毛主席再一次指出：“这种话不应由中国人口中说出，这就是所谓‘以我为核心’的错误思想。”毛主席的批评，应引起各级党，政，军，群及驻外使馆的注意。毛主席的指示，我们应坚决贯彻执行。今后，不论在报刊上（包括各种小报），在内部文件中，在各种讲话中，特别在接待外宾时，一律不要再用“世界革命的中心”的这种说法。对于“以我为核心”的错误思想，应经常警惕和批判。","type":"paragraph"},{"text":"（发至县团级）","type":"paragraph"},{"text":" 一九六八年五月十八日","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[三]》，武汉：1969年3月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7f6006d35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
