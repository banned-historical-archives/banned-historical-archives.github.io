副总理华国锋等到机场欢送","authors":[],"dates":[{"year":1975,"month":8,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"前往参加即将召开的不结盟国家外长会议"},{"type":"paragraph","text":"英萨利副首相率代表团离京去利马"},{"type":"paragraph","text":"我国国务院副总理华国锋等到机场欢送"},{"type":"paragraph","text":"新华社一九七五年八月十九日讯　以柬埔寨王国民族团结政府副首相英萨利为团长、外交大臣沙林察为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，今天晚上乘飞机离开北京前往利马参加即将召开的不结盟国家外长会议。"},{"type":"paragraph","text":"到机场欢送的有我国国务院副总理华国锋，外交部副部长韩念龙、礼宾司司长朱传贤、亚洲司副司长梁枫。"},{"type":"paragraph","text":"柬埔寨民族统一阵线中央政治局委员秀木，柬埔寨驻中国大使笃坎敦，也到机场送行。"},{"type":"paragraph","text":"到机场送行的还有巴基斯坦驻中国大使阿尔维，秘鲁驻中国大使馆公使衔参赞阿拉依萨。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"338821eb60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
