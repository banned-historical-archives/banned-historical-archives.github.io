script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"瑞典资产阶级报纸  不满北大西洋军事联盟政策","authors":[],"dates":[{"year":1953,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典资产阶级报纸"},{"type":"paragraph","text":"不满北大西洋军事联盟政策"},{"type":"paragraph","text":"【新华社三十一日讯】塔斯社斯德哥尔摩二十八日讯：斯德哥尔摩的瑞典资产阶级报纸“新闻报”登载了几篇社论，对北大西洋军事联盟政策的后果表示惊惶。"},{"type":"paragraph","text":"在一篇题为“战后的心理状态”的社论中，“新闻报”说，把一些国家包括在北大西洋公约之内，并没有对达到所谓“均势”有任何帮助。该报说："},{"type":"paragraph","text":"“譬如说，如果挪威、丹麦或其他小国没有参加北大西洋公约，这对真正的势力均衡不会有什么重要性。相反地，人们害怕把北欧包括在北大西洋公约的活动范围之内，将使最近讨论过的基地问题复杂化。这只能使局势恶化。”"},{"type":"paragraph","text":"该报接着说，过去在大国之间有过联盟，但是这种联盟与北大西洋公约不同，过去每一个参加国都保持它的主权，执行它自己的外交与军事政策。“可是在北大西洋公约之内，主权受到限制。所谓联合基地的总计划等等，实际上似乎意味着，美国是发号施令的领导国。”该报并说，美国在某种程度上负担北大西洋集团的开支，“但不能因此就得出结论说，美国武装部队应该占领每一个欧洲国家的基地。”"},{"type":"paragraph","text":"“新闻报”在另外一篇以“对邻国施行压力”为题的社论中，论及北大西洋公约集团北欧区司令部的代表们在最近所发表的、关于有必要在挪威的基地上驻扎外国军队的声明。该报说：“这些声明有说服力地证明了，我们的斯堪的纳维亚邻国不断受到幕后的压力，这些压力的目的在于迫使这些国家不再抗拒供给基地与容许在它们的领土上驻军。”"},{"type":"paragraph","text":"“新闻报”说：“军事代表们讲话时毫不客气，并且毫不顾及一些小国家的地位或它们人民的自由感。”该报对于这一点表示不满。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e09d33d0eb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
