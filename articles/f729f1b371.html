script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"担心美国经济危机引起的严重影响  英日资产阶级报刊对经济前途很是不安","authors":[],"dates":[{"year":1954,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"担心美国经济危机引起的严重影响"},{"type":"paragraph","text":"英日资产阶级报刊对经济前途很是不安"},{"type":"paragraph","text":"【新华社十一日讯】据塔斯社伦敦七日讯：“每日先驱报”刊载了一篇文章，评论美国的经济危机与它对英国及其他资本主义国家的影响。"},{"type":"paragraph","text":"该报写道：“十二月份（美国）的钢铁生产比前一年减少了三分之一。大汽车公司把生产削减了百分之十。失业人数增加了一倍……两年多以来，美国二千五百万农民的收入一直在减少。在朝鲜战争开始时，农作物价格一度很高，但是后来便日益下降。”该报指出：预料今年的房屋修建将剧烈减少。该报说：“‘走下坡路的趋势’已经开始。人们越来越感到忧虑。”"},{"type":"paragraph","text":"该报指出：美国经济危机的加深将使美国对原料的购买锐减，该报说：“我们和其他英镑国家将最能感觉到这种影响，因为我们主要是靠出卖羊毛、橡胶、锡、黄麻、可可等原料来赚取美元的。有一些专家说，根据美国过去历次‘衰退’的经验，美国生产只要削减百分之三或百分之四，便会使得我们的美元收入减少百分之二十，甚至百分之三十。按照目前情况，我们的美元收入并不足够。美元收入减少这样多将对英国有非常严重的影响。”"},{"type":"paragraph","text":"【新华社九日讯】东京消息：美国日益明显的经济衰退现象已引起日本资产阶级的恐惧。由于日本经济已沦为美国垄断资本的附庸，他们担心美国的经济衰退会使日本受到严重的打击。"},{"type":"paragraph","text":"东京银行常务董事堀江薰雄最近在“每日新闻”报上撰文，谈到美国的经济衰退问题和它将对日本发生的影响。堀江说：从共和党政府的性质来判断，相信美国必然要发生衰退。在这种情况下，美国将首先保护自身。他预料：美国的经济衰退将对其他资本主义国家产生很严重和广泛的影响，而日本所受的影响将两倍于美国所受的影响。他警告说：由于美国经济衰退的影响，日本对美国和英镑区的出口都将减少。"},{"type":"paragraph","text":"共同社一九五三年十二月三十一日电在谈到一九五四年日本暗淡的经济前景时也说：“有这样一种强有力的看法，认为明年不仅有（日本的）一九五四年度预算的影响，并且在美国也要发生不景气，而蒙受美国不景气影响的日本……会被卷进不景气的漩涡中去。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f729f1b371"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
