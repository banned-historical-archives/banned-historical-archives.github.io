art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈响应华主席的号召；向雷锋同志学习；把毛主席开创的无产阶级革命事业进行到底","authors":[],"parts":[{"type":"paragraph","text":"海军某部一○一舰的指战员，热烈响应毛主席、华主席的伟大号召，向雷锋同志学习。他们决心以雷锋同志为榜样，更高地举起毛主席的伟大旗帜，贯彻执行华主席提出的抓纲治国的战略决策，把毛主席开创的无产阶级革命事业进行到底。 赵辑民摄"},{"type":"paragraph","text":"空军某部飞行员在抓纲治国、抓纲治军的大好形势鼓舞下，学习雷锋同志憎爱分明的阶级立场，紧跟华主席的战略部署，立场坚定、旗帜鲜明地站在斗争前列，深揭猛批“四人帮”篡党夺权的滔天罪行。"},{"type":"paragraph","text":"肖哲仁摄"},{"type":"paragraph","text":"沈阳部队某部电话班班长杨玲，学雷锋，见行动，积极热情地帮助新战友学习技术，提高专业本领。"},{"type":"paragraph","text":"杨子恒摄"},{"type":"paragraph","text":"南京部队某部高炮三连的指战员，人人争当雷锋式的好战士，他们发扬艰苦奋斗的革命精神，节省油料，有汽车不用，往返十几里拉着板车到城里买东西。"},{"type":"paragraph","text":"本报通讯员摄"},{"type":"paragraph","text":"济南部队某部共青团员严伟祥，象雷锋同志那样全心全意为人民服务，经常利用休息时间为连队修补各种用具，节约国家开支。"},{"type":"paragraph","text":"本报通讯员摄"},{"type":"paragraph","text":"某部战士李志勇，象雷锋同志那样助人为乐，在火车站执勤中，经常帮助老大爷、老大娘搬送行李。"},{"type":"paragraph","text":"刘火才摄"},{"type":"paragraph","text":"某部二连深入批判“四人帮”诬蔑部队抓军事训练、搞战备是“单纯军事观点”的谬论，学习雷锋奋不顾身的无产阶级斗志，努力提高作战本领。"},{"type":"paragraph","text":"良泉摄"},{"type":"paragraph","text":"某部机炮连，运用多种形式，宣传深入开展向雷锋同志学习的群众运动，教育青年一代，象雷锋那样，全心全意为人民服务，使老一代无产阶级革命家开创的革命事业后继有人。"},{"type":"paragraph","text":"朱斌摄"},{"type":"paragraph","text":"北京部队某部在深入揭批“四人帮”破坏学习雷锋群众运动的同时，大力宣传雷锋的先进事迹，有破有立，使指战员受到很大教育，掀起了轰轰烈烈的学雷锋热潮。这是电影队给连队放映雷锋事迹的幻灯片。"},{"type":"paragraph","text":"卞俊文摄"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"432840c5b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
