art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"满腔怒火化力量狠抓革命多炼钢","authors":["空军某部驻包钢毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"穷凶极恶的苏修叛徒集团，继侵犯我国神圣领土珍宝岛之后，又组织大批暴徒到我国驻苏联大使馆前进行疯狂挑衅，更加激起了我们的万丈怒火。"},{"type":"paragraph","text":"我们站在反修前哨的包钢工人和支左战士，满怀对伟大领袖毛主席的无限忠诚，对苏修叛徒集团的刻骨仇恨，揭露和声讨苏修叛徒集团一连串猖狂反华的滔天罪行和侵略阴谋。广大工人把满腔怒火化成巨大力量，坚决用实际行动狠狠回击苏修反华小丑的疯狂挑衅，掀起了“抓革命，促生产，促工作，促战备”的热潮。老工人李怀巨，带动全班工人，把炼钢炉旁当成反帝反修、支援世界革命的第一线，过去一班只生产三炉，现在一班生产六炉，产量提高了一倍。他们豪迈地说：“狠抓革命多炼钢，回击苏修野心狼。”女工刘玉霞和王改莲以最快的速度，最好的质量，把生产指标翻了一番，充分显示了用毛泽东思想武装起来的中国工人阶级不可战胜的力量。"},{"type":"paragraph","text":"“蚂蚁缘槐夸大国，蚍蜉撼树谈何易。”勃列日涅夫和柯西金这一小撮头脑发昏的臭苍蝇，如果硬要与中国人民的铁拳相碰，等待着他们的只能是粉身碎骨的可耻下场！"}],"alias":""},"tags":[{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f2a5d4a7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
