" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"在全国公交系统四清工作座谈会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在全国公交系统四清工作"},{"type":"paragraph","text":"座谈会上的讲话"},{"type":"paragraph","text":"（1965年7月20日）"},{"type":"paragraph","text":"社会的渣，也是不可少的，社会上没有这些渣才怪呢！我看一万年也会有的，不然就没有正确的了，真理是对谬误而言，唯物论是对唯心论而言，辩证法是对形而上学而言。一万年以后，形而上学，唯心论还是有的，不然社会上就没有矛盾了，斯大林晚年就犯了这个错误，他只是强调苏联社会各阶级人民的一致性，而否认了不一致性。他以为社会主义社会就没有矛盾了，这是指一九三四年到一九三七年，一九三八年，实际上隐藏了深刻的矛盾。他不承认社会主义社会存在阶级和阶级斗争，结果事物走向了反面，肯定变成了否定。当然，否定又变成了否定之否定，这就是说，苏联人民不可能长期被修正主义统治下去。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":7,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":110,"page_end":110},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6708c8604f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
