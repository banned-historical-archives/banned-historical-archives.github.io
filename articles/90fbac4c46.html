art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"靠毛泽东思想武装起来的人打胜仗","authors":["空军某部副参谋长/战斗英雄李树廷"],"parts":[{"type":"paragraph","text":"我们的副统帅林彪同志指出：“对我们军队来说，最好的武器不是飞机，不是大炮，不是坦克，不是原子弹，最好的武器是毛泽东思想。最大的战斗力是用毛泽东思想武装起来的人，是勇敢、不怕死。”又说：“政治思想工作是我军战斗力诸因素中的首要因素”。无数事实证明，这是颠扑不破的真理。可是，反党集团头目、反革命修正主义分子彭德怀，却胡说什么：“部队军事训练成绩的优劣，各级干部学习军事科学成绩的优劣，是决定我军今后战斗力高低的基本标准。”这是明目张胆地反对毛主席建军思想。"},{"type":"paragraph","text":"过去，我军的干部、战士许多人从来没进过什么军事学校，但是这些“庄户生”、“土包子”，却打败了“黄埔生”、“洋包子”；我们用小米加步枪打败了敌人的飞机加大炮，难道说这是“军事训练成绩的优劣”和“干部学习军事科学成绩的优劣”决定的吗？"},{"type":"paragraph","text":"董存瑞舍身炸碉堡，黄继光用胸口堵枪眼，欧阳海舍身抢救列车，……这一切气壮山河的英雄事迹，难道也是什么“军事训练成绩的优劣”决定的吗？"},{"type":"paragraph","text":"我参加的解放海南岛的战役，也是一个生动的证明。一九四九年冬天，第四野战军在林副统帅的亲自率领下，挥师南下，一举解放了中南大陆，直逼敌人盘踞的海南岛。当时岛上有蒋匪军十三万多人，他们为了负隅顽抗，用飞机、兵舰、碉堡群、地雷阵构成了所谓立体防线。我军当时一没有飞机，二没有兵舰，部队成员又多半是北方来的“旱老虎”，要想渡海作战，困难的确很多。面对这种情况，我们首先开展了大规模的政治练兵运动，通过下渔村访贫问苦、军民同诉蒋匪、地主、渔霸的滔天罪行等活生生的阶级教育，大大提高了部队的阶级觉悟。战斗打响后，我们“渡海先锋营”的船队，进入琼州海峡的主流时，一下子就被七级大风掀起的汹涌波涛冲散了。我所在的二连那只船只有几十人，面对这样的惊涛险浪和敌人的密集炮火，战士们毫不畏惧，个个斗志高昂，在兄弟部队的配合下，我们机警地冲过了敌人的海上封锁线，像一把钢刀直插敌人的滩头阵地。打垮了敌人的反扑，为后续部队扫清了道路。在战斗中，我们一个排就阻击了敌人一个团的兵力，战士们怀着对伟大领袖毛主席的无限忠诚，对阶级敌人的刻骨仇恨，用刺刀、手榴弹、炸药包打垮了敌人的七次冲锋，终于配合主力部队全歼了敌人。"},{"type":"paragraph","text":"解放海南岛战役的胜利，难道也是“部队军事训练成绩的优劣”所决定的吗？不，我们的一切胜利，靠的是政治，靠的是人的觉悟和勇敢精神，靠的是战无不胜的毛泽东思想。彭德怀极力贩卖训练第一、军事第一的破烂货，就是为了推行资产阶级军事路线。妄图以此来改变我军的性质，把由毛主席亲自缔造的人民军队变成复辟资本主义的工具。彭德怀这个罪恶阴谋是永远也不能得逞的。我们永远忠于毛主席，忠于毛泽东思想，忠于毛主席的建军路线。我们一定要按照毛主席的教导和林副主席的指示，时时突出政治，处处突出政治，永远突出政治，永远沿着毛主席的军事路线阔步前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90fbac4c46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
