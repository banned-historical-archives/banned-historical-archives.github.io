hors":[],"dates":[{"year":1983,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国文联召开毛泽东文艺思想学术讨论会"},{"type":"paragraph","text":"对毛泽东文艺思想一要坚持二要发展"},{"type":"paragraph","text":"据新华社电　中国文联召开的毛泽东文艺思想学术讨论会10月5日在烟台举行。"},{"type":"paragraph","text":"70位文艺理论、评论工作者、教师，以及近年来创作上活跃的中青年作家，带着学术论文，也带着实践中积累的新鲜经验和引人思考的议题，前来与同行进行交流。"},{"type":"paragraph","text":"对毛泽东文艺思想，一要坚持，二要发展，是会议上人们关心的话题。中国文联书记处常务书记赵寻5日在致词中说，如何继续坚持、发展毛泽东文艺思想的基本原理和观点，这一思想对革命文艺事业的作用，不仅是理论上，更是迫切需要解决的实际问题。"},{"type":"paragraph","text":"主持讨论会的同志们提出，会议应发扬理论联系实际的学风，继续贯彻双百方针，通过争鸣来探求真理，在马克思主义、毛泽东思想的指导下，取得统一的看法。"},{"type":"paragraph","text":"冯牧就文艺的社会主义性质、道路和旗帜问题，发表了自己的意见。"},{"type":"paragraph","text":"这次会议是为纪念毛泽东同志诞辰90周年而召开的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"201191ba26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
