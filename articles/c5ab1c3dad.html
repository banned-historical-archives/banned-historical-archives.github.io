rs":["董时光","西南师范学院"],"dates":[{"year":1957,"month":5,"day":29}],"is_range_date":false,"parts":[{"text":"“大多数群众都是没有头脑的应声虫”","type":"title"},{"text":"西南师范学院董时光","type":"authors"},{"text":"西南师范学院讲师董时光在该院教师座谈会上说：","type":"paragraph"},{"text":"群众有三种，根据我的分析，第一种最多，没有头脑，不能独立思考，只是跟着领导屁股后喊口号，不折不扣地作领导上的应声虫。第二种是极少数，他们喜欢拍马屁，无耻钻营，他们对领导什么肉麻的奉承话都说得出来。领导们也专门喜欢听这种人的话，往往诬良为奸，在每次运动中造成无数冤狱。第三种人是有良心有正义感，却不敢站起来说话。（摘自５月２９日重庆日报）","type":"paragraph"},{"text":" 来源：1957年6月15日《人民日报》第3版。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5ab1c3dad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
