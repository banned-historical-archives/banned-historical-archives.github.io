art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席收到杜尔总统的感谢电杜尔总统在感谢电中说，动员起来的全体几内亚人民自觉地作好了充分准备，要把反对国际帝国主义恶魔的斗争进行下去，直到攻下他们的最后阵地","authors":[],"parts":[{"type":"paragraph","text":"新华社三十日讯 毛泽东主席二十八日收到几内亚总统艾哈迈德·塞古·杜尔的感谢电。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党主席毛泽东阁下："},{"type":"paragraph","text":"我谨以几内亚共和国人民、党和政府的名义，向您表示诚挚的、战斗的谢意，感谢您勇敢地采取了鲜明的立场，声援和支持正在顽强抗击葡萄牙法西斯匪徒的几内亚人民。我向您保证，动员起来的全体几内亚人民自觉地作好了充分准备，要把反对国际帝国主义恶魔的斗争进行下去，直到攻下他们的最后阵地。尽管罪恶的葡萄牙侵略者投入大批刽子手军队来对付我国人民。但毫无疑问，最后胜利将属于具有历史意义的正义事业。您具体表示了对我们的同情和声援。我相信，我们两国人民在经历这次严峻考验后，他们之间相互谅解、相互尊重和真诚的战斗的合作关系将比任何时候都更加巩固。"},{"type":"paragraph","text":"顺致最崇高的敬意。"},{"type":"paragraph","text":"艾哈迈德·塞古·杜尔"},{"type":"paragraph","text":"一九七○年十一月二十七日于科纳克里"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d54e8a804c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
