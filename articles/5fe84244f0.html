ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"群众工作是克服投降危险的决定性条件","alias":"","parts":[{"type":"paragraph","text":"群众工作是克服投降危险的"},{"type":"paragraph","text":"决定性条件！]"},{"type":"paragraph","text":"（1939年11月1日）"},{"type":"paragraph","text":"党有很大的发展，党与群众有好的联系，但党内也有脱离群众的现象。许多共产党员不知道脱离群众是一种罪恶。决定必须阐明：一、党要进一步地依靠群众。当前克服投降危险更需要发动群众。二、党在国民党统治区的群众工作，要与国民党左派人士联合，要有步骤并要有长期深远的计划。要以群众工作的好坏作为判断党的工作好坏的主要条件。三、在八路军新四军活动区域的群众工作，要实行减租减息、减税，废除高利贷；群众团体要坚持照顾最大多数及发扬民主的原则；军队的政委和政治机关要帮助地方群众工作。四、群众工作是克服投降危险的决定性条件。"},{"type":"paragraph","text":"[1]1939年11月1日，中共中央政治局开会讨论通过《中央关于深入"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":11,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":135,"page_end":135},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fe84244f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
