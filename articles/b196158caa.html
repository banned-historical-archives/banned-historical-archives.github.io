" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"毛泽东、周恩来祝贺越南政府还都河内的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东、周恩来祝贺越南政府"},{"type":"paragraph","text":"还都河内的电报"},{"type":"paragraph","text":"（1954年12月31日）越南民主共和国主席胡志明同志，越南民主共和国副总理兼外交部长范文同同志："},{"type":"paragraph","text":"值此越南民主共和国政府举行还都典礼之际，我们谨代表中国人民和中华人民共和国政府向你们、并通过你们向越南人民和越南民主共和国政府表示热烈的祝贺。"},{"type":"paragraph","text":"越南政府还都河内，是由于英勇的越南人民在越南劳动党和胡志明主席领导下八年艰苦抗战获得辉煌胜利的结果，是由于越南政府一贯执行和平政策的结果。祝越南人民在新的一年中，在巩固和平，实现全国统一、独立和民主的斗争中和在恢复国民经济的事业中获得新的成就。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"周恩来一九五四年十二月三十一日于北京"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":409,"page_end":409},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b196158caa"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
