],"dates":[{"year":1978,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二月二十八日电　为纪念敬爱的周总理八十诞辰，中国历史博物馆编写的《纪念周恩来总理文物选编》最近在北京出版发行。"},{"type":"paragraph","text":"叶剑英副主席为这本书的封面题字。"},{"type":"paragraph","text":"《纪念周恩来总理文物选编》用文字和图片，比较系统地介绍了周总理从“五四”时期到逝世前的伟大革命实践活动。全书共分三十三章，收有近三百幅图片。其中一百二十多幅是周总理在各个历史时期的照片:有“五四”运动时期、旅欧勤工俭学和大革命时期的照片，有在国民党统治区和革命根据地进行革命斗争的历史纪录，也有建国后摄录的同各条战线的群众在一起的镜头。其余的一百六十多幅，是周总理的手迹，以及有关周总理的文献和文物的图片，其中有周总理的部分著作原稿，亲笔书写的函电、题词，起草的指示、命令、报告、计划和批示等。"},{"type":"paragraph","text":"《纪念周恩来总理文物选编》在北京发行后，将在全国各地陆续发行。"},{"type":"paragraph","text":"文物出版社还出版了周恩来同志一九一七年东渡日本时所作，一九一九年三月书赠友人诗的手迹。新华书店也将于近日发售。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b43c4991a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
