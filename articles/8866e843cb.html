":[],"dates":[{"year":1967,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"谢胡同志向阿尔巴尼亚干部和职工作访华报告"},{"type":"paragraph","text":"热烈称颂中阿人民的伟大战斗友谊  高度赞扬中国文化大革命辉煌胜利"},{"type":"paragraph","text":"新华社地拉那十七日电　据阿尔巴尼亚报纸报道，不久前访问过中国的阿尔巴尼亚党政代表团团长、阿尔巴尼亚劳动党中央政治局委员、部长会议主席谢胡，最近向马蒂区和米尔迪塔区的党、政和农业合作社负责干部、职工作报告，畅谈阿尔巴尼亚党政代表团访华观感，高度赞扬中国无产阶级文化大革命的辉煌胜利，热烈称颂由中阿两国人民的伟大领袖毛泽东同志和霍查同志缔造和培育起来的中阿两国人民之间伟大的战斗友谊。"},{"type":"paragraph","text":"谢胡同志高度评价由毛泽东同志亲自发动和领导的中国无产阶级文化大革命。他着重谈到了中国无产阶级文化大革命的辉煌成就及其伟大的远景。谢胡同志还谈到了中国无产阶级文化大革命的伟大的世界历史意义和阿尔巴尼亚劳动党对中国无产阶级文化大革命的巨大支持。他说，这个革命使作为坚不可摧的堡垒和世界革命强大基地的中国永远保持红色。"},{"type":"paragraph","text":"谢胡同志在谈到阿尔巴尼亚党政代表团在中国所受到的极其热烈和兄弟般的接待时说，这一接待生动地反映了七亿中国人民、光荣的中国共产党和毛泽东同志对阿尔巴尼亚人民、阿尔巴尼亚劳动党以及党和人民的领袖恩维尔·霍查同志怀有的伟大的深情厚谊。他指出，这一伟大的革命友谊是牢不可破的，它将与日俱增，日益发展，因为这一友谊是由中阿两个光荣的党和两国人民的领袖毛泽东同志和霍查同志建立起来的，是建筑在马克思列宁主义和无产阶级国际主义不朽原则的基础上的。"},{"type":"paragraph","text":"谢胡同志的报告不断被热烈的掌声和欢呼声所打断。听报告的人热烈祝福阿尔巴尼亚劳动党、中国共产党和伟大的七亿中国人民，热烈祝福两国人民的伟大领袖恩维尔·霍查同志和毛泽东同志。谢胡同志是在马蒂和米尔迪塔区视察时，向这两个区的干部和职工作上述报告的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8866e843cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
