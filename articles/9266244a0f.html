tes":[{"year":1981,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十月二十二日电　中共中央副主席邓小平今天上午在人民大会堂会见丹麦首相安高·约恩森一行。双方就当前的重大国际问题交换了意见。"},{"type":"paragraph","text":"约恩森说，我对我同赵紫阳总理和万里副总理所举行的会谈感到很高兴。我期待着今天同邓小平副主席进行交谈。他指出，丹中两国之间没有利害冲突。"},{"type":"paragraph","text":"邓小平说，我们两国建交以来关系一直是很好的，双方对许多国际问题的看法基本上是一致的。最重要的是在当前十分动荡的形势下，我们愿意通力合作，争取一个较长的和平时期。邓小平在分析了苏联的战略重点在欧洲之后指出，对付苏苏联霸权主义要做一些扎扎实实的工作，这就是一切反对苏联侵略扩张的力量要联合起来。"},{"type":"paragraph","text":"约恩森说，欧洲能够进行合作是很重要的，丹麦要致力于欧洲的团结与合作。丹麦要继续坚持作为北约的一员，加强自己的防务，并争取国际局势的缓和。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9266244a0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
