ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"军渡赢口线之河防应该加强","alias":"","parts":[{"type":"paragraph","text":"军渡口线之河防应该加强！"},{"type":"paragraph","text":"（1941年8月3日）贺、周，并告彭、左："},{"type":"paragraph","text":"据报，军渡、口线集敌四千余准备渡河，查王旅?主力北调应付何文鼎?，河防空虚，日寇极有可能乘虚渡犯，如河防不守影响极大。望贺周迅速布置，加强河防兵力，准备打击渡犯之敌，另以一部从侧面威胁，务使敌不得逞。如何布置，速告。应否派士第至佳县指挥，亦望酌告。"},{"type":"paragraph","text":"毛朱王叶"},{"type":"paragraph","text":"江亥"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、中共中央军委副主席王稼祥、军委参谋长叶剑英给八路军第一二○师师长贺龙、参谋长周士第的电报。"},{"type":"paragraph","text":"[2]彭、左，指彭德怀和八路军副参谋长左权。[3]王旅，指八路军第一二〇师第三五九旅，旅长兼政治委员王震。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":8,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":188,"page_end":188},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25b817def4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
