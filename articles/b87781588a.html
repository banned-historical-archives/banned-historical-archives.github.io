ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"独立自主地搞建设","alias":"","parts":[{"type":"paragraph","text":"独立自主地搞建设\""},{"type":"paragraph","text":"（1958年6月17日）"},{"type":"paragraph","text":"此件即刻印发军委会议各同志。很好一个文件，值得认真一读，可以大开眼界。这是你们自己的事情。没有现代化工业，哪有现代化国防？自力更生为主，争取外援为辅，破除迷信，独立自主地干工业、干农业、干技术革命和文化革命，打倒奴隶思想，理葬教条主义，认真学习外国的好经验，也一定研究外国的坏经验引以为戒，这就是我们的路线。经济战线上如此，军事战线上也完全应当如此。反对这条路线的人们如果不能说服我们，他们就应当接受这条路线。“既不能令，又不受命，是绝物也”口，走进死胡同，请问有什么出路呢？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五八年六月十七日"},{"type":"paragraph","text":"[1]这是毛泽东为向中共中央军事委员会扩大会议印发国务院副总理兼国家计划委员会主任李富春关于第二个五年计划要点报告写的批语。"},{"type":"paragraph","text":"[2]参见《孟子·离娄上》。毛泽东全集第三十九卷"},{"type":"paragraph","text":"二彭、黄："},{"type":"paragraph","text":"此件请即印发。"},{"type":"paragraph","text":"毛第一页，请克诚抄正看过，再付印。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":407,"page_end":408},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji7","type":"pdf","name":"毛泽东文集第七卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji7.pdf"],"article":{"title":"独立自主地搞建设","description":"根据手稿刊印。","dates":[{"year":1958,"month":6,"day":17}],"parts":[{"text":"独立自主地搞建设","type":"title"},{"type":"paragraph","text":"此件即刻印发军委会议各同志。很好一个文件，值得认真一读，可以大开眼界。这是你们自己的事情。没有现代化工业，哪有现代化国防？自力更生为主，争取外援为辅，破除迷信，独立自主地干工业、干农业、干技术革命和文化革命，打倒奴隶思想，埋葬教条主义，认真学习外国的好经验，也一定研究外国的坏经验——引以为戒，这就是我们的路线。经济战线上如此，军事战线上也完全应当如此。反对这条路线的人们如果不能说服我们，他们就应当接受这条路线。“既不能令，又不受命，是绝物也”，走进死胡同，请问有什么出路呢？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五八年六月十七日"}],"comment_pivots":[{"part_idx":0,"offset":8,"index":1},{"part_idx":1,"offset":223,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东为向中共中央军事委员会扩大会议印发国务院副总理兼国家计
