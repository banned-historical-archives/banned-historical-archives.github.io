torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"关于迁回部队突击京汉、龙海线等问题致张学良电","alias":"","parts":[{"type":"paragraph","text":"关于迁回部队突击京汉、龙海线等问题"},{"type":"paragraph","text":"致张学良电"},{"type":"paragraph","text":"（1936年12月17日）李毅兄："},{"type":"paragraph","text":"筱电奉悉，集力抗战甚妥。惟对敌意见，弟认胡宗南、汤恩伯均不过一支队，各以一部钳制之可也，敌之要害在南京与京汉、陇海线，若以二三万人之战略迁回部队突击京汉、陇海取得决定胜利，则大局立起变化，此点祈考虑。我们对远方\"已作几个报告，尚无回报。兄令刘鼎将每日群众运动情形电告一次，若远方知此次事变及事变后之进展不是单纯军事行动，而是与民众联系的，估计当寄以同情。惟远方政府目前为应付外交，或尚不能公开赞助我们。恩来在肤施城外等候，请速饰肤施民团让出该城。如何盼复。"},{"type":"paragraph","text":"弟赵东"},{"type":"paragraph","text":"十七日[1]指共产国际。"},{"type":"paragraph","text":"应张学良邀请，中共中央派周恩来、叶剑英、博古（秦邦宪）到西安参加谈判。1936年12月17日，周恩来一行飞抵西安，立即和张学良举行会谈。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":178,"page_end":179},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89baa9b044"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
