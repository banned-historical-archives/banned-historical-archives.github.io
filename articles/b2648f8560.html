thors":["吕厚民"],"dates":[{"year":1964,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇周恩来邓小平同志会见日共代表团"},{"type":"paragraph","text":"中共中央举行宴会热烈欢迎代表团同志"},{"type":"paragraph","text":"新华社二十一日讯　中国共产党中央委员会副主席刘少奇、周恩来和总书记邓小平，今天下午会见日本共产党中央委员会政治局委员、中央书记处书记袴田里见和由他率领的日本共产党中央委员会代表团团员：日共中央政治局委员松岛治重、中央书记处书记米原昶，中央委员西泽富夫。"},{"type":"paragraph","text":"参加会见的，有中共中央政治局委员彭真，政治局候补委员康生，中央书记处候补书记杨尚昆，中央委员廖承志，中央候补委员赵毅敏。"},{"type":"paragraph","text":"双方在会见时进行了亲切友好的谈话。"},{"type":"paragraph","text":"新华社二十一日讯　中国共产党中央委员会今晚举行宴会，热烈欢迎由日本共产党中央委员会政治局委员、中央书记处书记袴田里见率领的日本共产党中央委员会代表团。"},{"type":"paragraph","text":"中共中央副主席刘少奇、周恩来和总书记邓小平出席了宴会。"},{"type":"paragraph","text":"出席宴会的日本共产党中央委员会代表团团员，有日共中央政治局委员松岛治重，中央书记处书记米原昶，中央委员西泽富夫。"},{"type":"paragraph","text":"在充满热烈友好气氛的宴会上，刘少奇同志和袴田里见同志先后祝酒，为马克思列宁主义在全世界的胜利干杯。"},{"type":"paragraph","text":"出席宴会的，还有中共中央政治局委员彭真、陈毅、贺龙、谭震林，政治局候补委员康生，中央书记处候补书记杨尚昆，中央委员廖承志、刘宁一、伍修权、王从吾，中央候补委员赵毅敏，中共中央机关、国家机关、各人民团体和中共北京市委的负责人。（附图片）"},{"type":"paragraph","text":"刘少奇、周恩来、邓小平同日共中央代表团同志合影。前排左起康生、彭真、米原昶、周恩来、袴田里见、刘少奇、松岛治重、邓小平、西泽富夫"},{"type":"paragraph","text":"新华社记者　吕厚民摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"赵毅敏","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2648f8560"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
