":["北京大学","杨路"],"dates":[{"year":1957,"month":5,"day":29}],"is_range_date":false,"parts":[{"text":"在“百花学社”成立大会上的发言","type":"title"},{"text":"北京大学杨路","type":"authors"},{"text":"（杨路：北京大学数学系学生）","type":"subtitle"},{"text":"十天中，我校运动是民主运动——扩大社会主义民主和社会主义法制有它自下而上的一方面，这运动是符合党的利益的，党中央是同情的。目前民主运动已处于沉静状态。根本原因是感情高潮已过去了。自由空气的形成，自由权利的获得是十天来的主要成绩。林希翎对造成自由讨论的空气很有帮助。","type":"paragraph"},{"text":"本社团是为了作学术性的讨论而成立的。我们要学习哲学书籍，多思维，可以进行一些讨论。如林希翎提出的一些理论问题。","type":"paragraph"},{"text":"以后要继续揭发各种错误。","type":"paragraph"},{"text":"对外宣传可以，反对对廿九人的指责。","type":"paragraph"},{"text":"刘奇弟在胡风问题上收兵可以，因为已经提出了问题。","type":"paragraph"},{"text":"刊物要发行到各大学。","type":"paragraph"},{"text":"我是唯心主义者，但真正的共产主义者是应该同意我们的。  (完)","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fd3b42421"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
