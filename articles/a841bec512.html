:[],"dates":[{"year":1963,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社阿尔及尔3日电】　参加阿尔及利亚国际博览会的中国馆馆长李永亭，今晚在博览会为“中国馆日”举行了招待会。"},{"type":"paragraph","text":"出席招待会的有博览会主任、米利亚纳行政长官莫克拉尼以及地方政府、民族解放阵线和群众团体的负责人。中国大使馆参赞洗依，商务参赞徐国英也出席了招待会。"},{"type":"paragraph","text":"冼依参赞和博览会主任莫克拉尼在招待会上讲了话。他们都强调要加强和发展两国之间的友好关系。莫克拉尼还对中国给予博览会的支持和合作表示感谢。"},{"type":"paragraph","text":"招待会后，放映了中国故事片《红色娘子军》和一些中国纪录片。这些影片受到观众的热烈欢迎。"},{"type":"paragraph","text":"在“中国馆日”，博览会各处都广播着关于中国的节目和中国音乐。"},{"type":"paragraph","text":"自从博览会6月28日在阿尔及尔西南面的阿弗雷维尔一米利亚纳开幕以来，已经有约五千人参观了中国馆。他们对中国展品非常感兴趣。许多观众希望得到《毛泽东选集》和关于中国的书籍和杂志。许多阿尔及利亚人在参观了中国馆以后在留言簿上题词，对中国政府和人民对阿尔及利亚的支持表示感谢，并赞扬中阿两国人民的永桓友谊。有些参观者在留言簿上写:“毛泽东万岁!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a841bec512"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
