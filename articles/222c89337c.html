thors":[],"dates":[{"year":1951,"month":12,"day":22}],"is_range_date":false,"parts":[{"text":"浙江省贪污分子的思想情况","type":"title"},{"text":"【浙江分社二十二日讯】浙江省展开反贪污、反浪费、反官僚主义运动后，贪污分子一般存在以下几种思想情况：个别老干部贪污的，怕坦白出来后丢脸；留用人员怕追老根、算老账；有的怕坦白后赔偿不起；严重的贪污分子怕处分、怕判罪。贪污分子现在表现两种态度：一种是积极想法还账、弥补错误；另一种是故作镇静，想隐瞒抗拒。文化局局长陈守川个人贪污浪费五百多万元，文化局机关浪费四千多万元，陈不但不检讨、坦白，反将责任推在省委和省府领导上，他说：“过去你们不提，现在问题大了，都推在我头上。”","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年12月24日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"222c89337c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
