art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席著作教育团员","authors":["李书信/康振华"],"parts":[{"type":"paragraph","text":"工作中，自己以身作则带头干还差不离，让我领导一个团小组就有点抓瞎。不说别的，就拿开小组会来说吧，我是一点也不摸门。"},{"type":"paragraph","text":"在一次谈话中，副指导员对我说：“做思想工作好比用钥匙开锁子，什么样的锁要用什么样的钥匙；开团小组会也是一样，要用有效的钥匙才行！”副指导员的话启发了我。心想：自己成天说毛主席著作是把万能的钥匙，为什么不用它来开团小组会这个锁呢！从此，我在每次小组会前，一般都能先摆问题，然后从毛主席著作里找答案。这样，在团员中起了极好的作用。"},{"type":"paragraph","text":"今年五好评比后，团员郑进的情绪有些低落，工作也不象以前那么起劲。我就找他个别谈了几次话，又向其他同志了解情况，知道他所以情绪不高，主要是因为没有评上五好不大高兴，对自己的优点看得多了些，缺点看得少了些。于是，就和团支委邵国贤研究，决定在团小组会上组织大家学习毛主席著作，用积极的自我批评精神，带动他进步。"},{"type":"paragraph","text":"小组会上，大家首先学习了毛主席的《为人民服务》，又结合学习了传统故事《九个炊事员》。紧接着，便围绕“怎样才能树立真正为人民服务的思想”一题，展开了热烈讨论。我第一个发言说：“毛主席教导我们：因为我们是为人民服务的，所以我们如果有缺点，就不怕别人批评指出。不管是什么人，谁向我们指出都行。只要你说得对，我们就改正。……我是团小组长，有的同志思想不畅快，自己没有及时帮助提高认识，应该检讨，坚决改正。”接着，一些团员同志也自觉地检查了自己思想和工作中的缺点，说明批评与自我批评是进步的武器，只有不断进步，才能更好地为人民服务。大家还表示：今后一定要搞好工作，加强团结，互相帮助，共同提高。"},{"type":"paragraph","text":"同志们虚心诚恳的态度，深深地感动了郑进。开始，他还以为大家要开他的“斗争”会哩，事实证明完全不是那回事。因此，他也认真地检查自己说：“大家都没有错，是我没有树立全心全意为人民服务的思想。平时有了缺点，不虚心接受同志们的帮助，所以这次没评上五好就泄了气。”他表示今后一定要听毛主席的话，鼓起勇气，积极工作，争当五好战士。"},{"type":"paragraph","text":"经过团小组会的帮助，郑进心情舒畅了，干劲也大了。大家说：这次小组会开得好。 （康振华整理）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ae685790a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
