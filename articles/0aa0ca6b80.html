ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"中央转发安子文关于目前整党建党情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发安子文关于目前整党建党"},{"type":"paragraph","text":"情况报告的批语"},{"type":"paragraph","text":"（1953年2月9日）各中央局、分局，并转省市委："},{"type":"paragraph","text":"中央批准安子文同志一九五二年二月七日关于自前整党建党情"},{"type":"paragraph","text":"[1]安子文关于目前整党建党情况的报告说，1952年下半年，全国各地按计划在没有党组织和党员很少的地方接收新党员。目前在土改后的新区，一般的省已有173的乡建立了支部，建党工作做得较好的苏南地区有70%的乡建立了支部。在全国500人以上的公、私营工矿企业中和专科以上的学校中，已都有了党的基层组织。这样不仅加强了党对这些地方的领导，而且经过宣传教育，使广大群众提高了对党的认识，从而加强了非党群众的积极性与进取心，推动了各项工作。今后仍必须加强党的工作薄弱地方的建党工作，如国家机关中的经济、企业部门及某些文化、卫生部门。关于农村整党工作，报告说，各地第一批整顿的4万个支部已陆续结束，有些地方已开始第二批整党。农村整党工作中存在的问题，主要是有些地方没有很好地贯彻党的政策，在反对党员剥削行为中有“左”的偏向，组织互助合作中有急躁情绪和形式主义的偏向，在对党员的审查与处理中有畸轻畸重的现象，拟在第二批整党中注意纠正。此外，在这次农村整党中，各地都选调了一批专职组织员，这批干部大都是经过选择与训练的较好的党员干部，又经过一个时期的整党工作的锻炼，建议各地在农村整党任务完成后，对这批干部不要分配其他工作，由中央局或省委集中学习半年或一年，继续加以提高，而后分配他们到党的工作薄弱的地方或部门去工作。毛泽东全集第三十二卷况向中央所作的报告，并将这个报告发给各中央局分局省市委遵照执行。中央认为报告中所提各项意见和办法是正确的。"},{"type":"paragraph","text":"中央二月九日"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":485,"page_end":486},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0aa0ca6b80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
