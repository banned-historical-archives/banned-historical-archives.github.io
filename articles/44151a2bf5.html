torical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"致印度国民大会的信","description":"根据中央档案馆保存的原件刊印。","dates":[{"year":1943,"month":4,"day":5}],"parts":[{"text":"致印度国民大会的信","type":"title"},{"type":"appellation","text":"印度国民大会诸先生："},{"type":"paragraph","text":"中国抗日战争开始后，贵会派遣了一个援华医疗队来华参加中国的抗战，表示对华的极大友谊。这个医疗队五人均在八路军工作，四年以来，医疗队诸同志不避艰险，辗转北方战地，他们的艰苦努力和极有价值的工作，使无数中国军民亲睹印度人民的援华热忱。医疗队五人中除已先后返印的三人外，柯棣华大夫因病逝世于晋察冀边区，我国军民失一良友，印度人民失一优秀战士，至堪悼惜。现巴思华大夫返印，特向贵会及印度人民敬致谢意！当此全世界反法西斯战争正在努力争取最后胜利之际，我们希望印、华两大民族团结得更加坚固，以便与其他一切反法西斯国家配合作战，借以达到打倒法西斯，解放一切被法西斯压迫的人民，同时即借以解放印、华两大民族，获得两大民族的独立。"},{"type":"paragraph","text":"谨致热烈的敬礼！"},{"type":"paragraph","text":"毛泽东朱德"},{"type":"paragraph","text":"一九四三年四月五日"}],"comment_pivots":[],"is_range_date":false,"authors":["毛泽东"],"comments":[],"page_start":25,"page_end":25,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44151a2bf5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
