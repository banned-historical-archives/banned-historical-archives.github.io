ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于请上海会议各同志阅读薄一波发言稿的批语","alias":"","parts":[{"type":"paragraph","text":"关于请上海会议各同志阅读薄一波?发言稿的批语"},{"type":"paragraph","text":"（1959年3月26日）少奇、小平同志："},{"type":"paragraph","text":"薄一波的发言印出来了，我正在看。今天上午，请将薄的发言印本，发给各同志阅读，先有一点印象，下午三时或四时开会，大家听一波宣读他的讲稿，就会【有』获得一个较好的启发和理解了。须知有不少人是没有接触过这个问题的，心理状态各不一样。请照办为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月廿六日上午二时[1]指中共中央1959年3月25日至4月1日在上海举行的政治局扩大会议。"},{"type":"paragraph","text":"[2]薄一波，当时任中共中央政治局候补委员、国务院副总理兼国家经济委员会主任。"},{"type":"paragraph","text":"[3]小平，即邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[4]指薄一波准备在上海会议上作的关于1959年第一季度工业计划执行情况和第二季度安排的发言稿。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":385,"page_end":385},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a709ef7d7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
