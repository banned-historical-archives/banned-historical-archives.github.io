art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苑化冰同志追悼会在北京举行叶剑英等同志向遗体告别李先念李德生等同志出席追悼会张宗逊同志主悼会，封永顺同志致悼词","authors":[],"parts":[{"type":"paragraph","text":"苑化冰同志逝世后，中共中央军委副主席叶剑英同志以及余秋里、苏静、李强、方毅、康克清、陈慕华、张才千、彭绍辉、田维新、张宗逊、陈士榘、刘贤权、魏伯亭等同志，曾向苑化冰同志的遗体告别。"},{"type":"paragraph","text":"苑化冰同志的追悼会于七月十四日在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"军委各总部、各军兵种和政府有关部门送了花圈。"},{"type":"paragraph","text":"出席追悼会的有：中共中央政治局委员、国务院副总理李先念，中共中央政治局候补委员、中国人民解放军总政治部主任李德生，中共中央、政府有关部门和军委各总部各军兵种的负责人及苑化冰同志的生前友好李强、方毅、韩宗正、韩念龙、申健、张宗逊、张天云、张令彬、张贤约、封永顺、卢南樵、杜义德、曹里怀、邝任农、吴信泉、宋承志、孔从周、李信、陈发洪、钟人仿、王耀南、黎东汉、罗元发、陈锐霆、李炎、彭清云、王迪康、栗光祥、吕村夫、徐斌、刘立封、王岳西、尹佐珍、甘迈等。有关单位的干部、群众代表也参加了追悼会。"},{"type":"paragraph","text":"追悼会由张宗逊同志主持，封永顺同志致悼词。"},{"type":"paragraph","text":"悼词中说：“苑化冰同志一九三八年十月加入中国共产党，一九三九年入伍。历任工作团长、大队长、师参谋长、副师长、师长、总参装备计划部副部长等职。"},{"type":"paragraph","text":"苑化冰同志参加革命几十年来，在毛主席和党中央的领导下，努力学习马克思主义、列宁主义、毛泽东思想，英勇作战，积极工作，全心全意为人民服务，对党对革命事业作出了贡献。"},{"type":"paragraph","text":"苑化冰同志的逝世，使我们失去了一位老同志、老战友，是我党的一个损失。我们悼念苑化冰同志，要学习他的爱国主义、国际主义和革命英雄主义精神，化悲痛为力量，在毛主席为首的党中央领导下，在毛主席的无产阶级革命路线指引下，团结起来，争取更大的胜利！”"},{"type":"paragraph","text":"叶剑英、李先念同志和有关部门负责同志向苑化冰同志的家属李蓝丁同志及其子女，表示亲切的慰问。"},{"type":"paragraph","text":"苑化冰同志遗像 新华社发"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"name":"李先念","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d941baf007"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
