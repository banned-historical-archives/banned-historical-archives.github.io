s":["华国锋"],"dates":[{"year":1967,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"华国锋在湖南长沙发表的声明（大意）","type":"title"},{"text":"华国锋","type":"authors"},{"text":"〖华国锋原是湖南“长高司”的结合对象，是“工联”的对立面。中央点名要湖南省委书记华国锋到北京汇报。十九日在长沙上飞机前，华国锋发表了与以前的观点相反的声明，表示支持“工联”。声明大意如下。〗","type":"paragraph"},{"text":"一、自己执行了资产阶级反动路线，愿意悔改，接受群众批判。","type":"paragraph"},{"text":"二、“长高司”、“红联”、公（安）检（察院）法（院）充当了二月反革命逆流的先锋。","type":"paragraph"},{"text":"三、“工联”始终是高举毛泽东思想伟大红旗的，大方向始终是正确的，坚决支持。","type":"paragraph"},{"text":"四、章伯森、梁春阳同志是革命的好干部，要向他们学习。","type":"paragraph"},{"text":"五、表示了改正错误的决心。","type":"paragraph"}],"comments":[],"origin":"引自清华大学《井冈山通讯》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"468d0c7337"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
