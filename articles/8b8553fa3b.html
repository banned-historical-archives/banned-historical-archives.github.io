art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把学习与革命大批判紧密结合起来某部六连在批判林彪资产阶级军事路线中认真攻读毛主席军事著作","authors":[],"parts":[{"type":"paragraph","text":"据新华社沈阳一九七四年九月十二日电 人民解放军沈阳部队某部六连的干部和战士，在批判林彪资产阶级军事路线的斗争中认真攻读毛主席的军事著作。"},{"type":"paragraph","text":"这个连在批林整风运动中，把学习毛主席的军事著作，列为全连看书学习的重要内容。上级领导机关曾多次介绍过他们的经验。在批林批孔运动发展到批判林彪资产阶级军事路线的时候，六连指战员更进一步认识到认真学习毛主席军事著作的重要。党支部专门作出了决议，在全连进一步掀起学习毛主席军事著作的热潮。党支部的领导成员带头学，带头批，并且定期开会分析连队的学习情况，结合革命大批判提出新的读书要求。干部战士学习毛主席军事著作的热情很高，他们抓紧一切可以利用的时间认真坚持自学，开展互帮互学。连队的理论队伍在学习中充分发挥骨干作用，先后给全连作了八次学习辅导。团支部和连队革命军人委员会也配合学习，开展形式多样的活动。"},{"type":"paragraph","text":"六连指战员把学习与革命大批判紧密结合起来，做到通过学习使批判更加深入，同时又在批判中更好地学习。他们每进行一次专题批判，都要先认真制定出看书学习的计划，根据大批判的不同要求，选学毛主席有关的军事著作，然后一篇一篇地攻读原著，着重领会毛主席军事思想的某些基本观点，针对林彪资产阶级军事路线的反动观点进行批判。批判进行一个阶段，他们又把干部、战士在批判中提出的问题汇拢起来，有目的地组织大家进一步读书，边学、边议、边批，在逐个地弄清问题的过程中，加深对毛主席军事思想的理解。每个专题批判结束时，他们还发动干部、战士认真总结和交流在批判中读书的经验。他们在批判林彪对抗毛主席的战略决策，破坏辽沈战役的罪行时，就选了毛主席的《中国革命战争的战略问题》、《目前形势和我们的任务》、《关于辽沈战役的作战方针》等十几篇著作，组织大家逐篇认真学习，连贯起来反复思考，领会毛主席关于和国民党反动派首先在东北进行战略决战的伟大思想，是建立在对政治、军事形势进行了马克思主义科学分析的基础上的，是为了“将革命进行到底”，彻底消灭反动势力，加速全国解放的胜利进程。毛主席关于整个辽沈战役作战方针的基本精神，就是要打前所未有的大歼灭战，把东北之敌关闭在东北彻底消灭掉。在这个基础上，他们又以毛主席在辽沈战役期间所作的一系列指示为武器，一条一条地对照剖析林彪破坏辽沈战役的罪行，深入开展革命大批判，认识到林彪对抗毛主席的一系列指示，其要害是畏敌如虎，对敌人的力量估计过高，对人民的力量估计过低，看不到战略决战的时机已经到来，不敢打前所未有的大歼灭战，把东北敌人全歼在东北境内。林彪的这些右倾机会主义的行为，完全是适应了蒋家王朝妄图苟延残喘的需要。从而有力地剥掉了林彪所谓“作战有功”、“一贯正确”、“常胜将军”的画皮。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b8553fa3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
