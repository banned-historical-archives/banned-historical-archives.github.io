ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"致彭德怀等电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀等电！"},{"type":"paragraph","text":"（1947年8月12日）"},{"type":"paragraph","text":"（一）我攻榆林未克，敌钟松部明元日可进榆林，刘戴五个旅可到麒麟镇以东。（二）我军即在榆林、米脂间休整待机，隔断刘、钟两部，吸引该敌，以利陈、谢行动。陈、谢定于未渡河。（三)为防刘、董进占绥德，我无定河、黄河间各后方机关，必须迅速移至黄河以东，望贺、习立即部署移动。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致彭德怀、贺龙、习仲勋电的主要内容。"},{"type":"paragraph","text":"[2]钟松，当时任国民党军整编第三十六师师长。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":205,"page_end":205},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b589138bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
