script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"支持印度反动派　剥削印度人民  苏修利用经济“援助”干反革命勾当","authors":[],"dates":[{"year":1968,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"支持印度反动派　剥削印度人民"},{"type":"paragraph","text":"苏修利用经济“援助”干反革命勾当"},{"type":"paragraph","text":"据新华社讯　新德里消息：苏修叛徒集团同印度反动政府最近签订的一项贸易协定，暴露了苏修利用贸易和经济“援助”来支持印度反动派，欺骗和剥削印度人民的反动目的。"},{"type":"paragraph","text":"据印度报业托辣斯报道，苏联和印度政府十三日在新德里签订的贸易协定，规定印度在今后四年内向苏联提供一万个铁路货车车皮。据报道，“四个月后在莫斯科签订的最后的合同，将是印度签订的最大的一个出口合同。”"},{"type":"paragraph","text":"苏修这样“慷慨”地向印度反动派购买大量货车，是有其不可告人的目的的。苏修近年来在印度大量投资，帮助印度反动派建立了一批官僚资本主义的工业企业。这些企业开工率很低，产品大量积压。这是苏修通过印度反动派强加给印度劳动人民的沉重负担。例如在比哈尔邦兰奇地方，苏修帮助印度反动派修建的重型机械厂，资本支出约合两千二百万美元，但在过去七年中总共只生产出价值一百万美元的产品。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df3964e6bc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
