tle":"国家档案局、国家物价局关于利用档案收费有关规定的通知","dates":[{"year":1987,"month":10,"day":5}],"is_range_date":false,"authors":["国家档案局","国家物价局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国家档案局办公室, 档案工作文件汇集(第三集), 249-250","tags":[{"name":"档案","type":"主题/事件"},{"name":"对外开放","type":"主题/事件"},{"name":"收费","type":"主题/事件"}],"parts":[{"type":"title","text":"国家档案局、国家物价局关于利用档案收费有关规定的通知"},{"type":"subtitle","text":"国档发〔1987〕21号"},{"type":"paragraph","text":"各省、自治区、直辖市及计划单列城市档案局，物价局（委员会）："},{"type":"paragraph","text":"近几年来，各级档案馆积极贯彻中央关于开放历史档案的方针，提供了大量档案为各方面工作服务，受到社会各界的赞许和好评。有些档案馆在积极提供档案为各方面服务的同时，实行部分档案利用收费，通过有偿与无偿相结合的方式为社会服务，收到了较好的经济效益和社会效益。利用档案实行收费，不仅收到了保护档案原件的效果，而且促进了档案利用工作的开展，受到广大利用者的支持和肯定。但是，也有一些地方出现了乱收费的现象，引起利用者的不满。为了贯彻国家物价局（1987）价涉字257号文件精神，整顿目前各地收费不统一，制止乱上项目、乱收费的现象，根据中央关于“以档养档”的指示，现对利用馆藏档案的收费标准和范围制定如下原则，请按照执行。"},{"type":"paragraph","text":"一、收费范围："},{"type":"paragraph","text":"1. 利用本单位或个人形成、移交、捐赠、寄存的档案和上级机关为工作查考利用档案，应无偿提供服务。"},{"type":"paragraph","text":"2. 其他为落实房、地、财产、债务、债权、学历、工龄和解决纠纷、生产建设或进行其他盈利性、商业活动以及进行汇编:出版等有经济收益的一切机关和个人利用档案，均属收费范围。"},{"type":"paragraph","text":"二、 收费项目及标准："},{"type":"paragraph","text":"1. 复制费"},{"type":"paragraph","text":"（1）工本费：按当地实际确定。"},{"type":"paragraph","text":"（2）档案保护费：利用原件进行复制，明清以前的一般档案（价值珍贵的除外）每页收0.15至0.20元；民国时期档案每页收0.10元；建国后档案每页收0.05元；革命历史档案每页收0.10至0.20元。"},{"type":"paragraph","text":"2. 证明费"},{"type":"paragraph","text":"(1) 出具学历、工龄以及办理公证等项证明，每份不超过2元。"},{"type":"paragraph","text":"(2) 出具房、地、财产等项证明，按利用者获得经济收益的2%收取。"},{"type":"paragraph","text":"3. 咨询服务费"},{"type":"paragraph","text":"利用者不能直接查用档案（一般为信函索取）的，档案馆为利用者付出一定的劳动，提供一定数量有价值、翔实可靠的材料，除每人（件）次收手续费2元外，可按利用者获得经济收益的2%收取咨询服务费。"},{"type":"paragraph","text":"外国人利用档案，收费标准可酌情提髙。"},{"type":"paragraph","text":"各级档案馆应严格执行上述规定，不得任意增加收费项目和提高收费标准。自文到之日起实行。"},{"type":"subtitle","text":"国家档案局 国家物价局"},{"type":"subtitle","text":"一九八七年十月五日"},{"type":"paragraph","text":"抄送：中央档案馆、中国第一历史档案馆、中国第二历史档案馆、中国照片档案馆"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a6d179a26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
