rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"星期日要闻简报","authors":[],"parts":[{"type":"paragraph","text":"越南驻华大使陈子平在一日晚上举行国庆招待会，周恩来、邓小平等党和国家领导人出席。陈毅副总理在会上谴责美帝海盗行为，指出美舰轰击哈瓦那预示更大规模侵略古巴。他还指出美国军队继续威胁老挝人民的安全，重申支持柬埔寨中立政策，揭露美国最近提出的所谓禁止核试验的两项条约草案，实质上是制造借口，继续实行核讹诈政策，加速准备核战争。"},{"type":"paragraph","text":"在会上，陈子平大使和陈毅副总理共祝中越两国人民牢不可破的兄弟友谊日益增进，两国人民在建设社会主义、反对帝国主义的共同斗争中不断取得新的胜利。"},{"type":"paragraph","text":"古巴驻华大使皮诺·桑托斯在一日下午举行招待会，庆祝第一个哈瓦那宣言发表两周年和古中两国建交两周年。在会上，古巴大使和陈毅副总理一致谴责美国继续对古巴进行新的侵略，共颂中古友好关系不断发展。"},{"type":"paragraph","text":"我体育总会负责人谴责帝国主义阴谋破坏亚洲运动会，支持印度尼西亚的正义立场，感谢印度尼西亚维护亚非团结以及中国印度尼西亚友谊，深信帝国主义企图打击印度尼西亚威望的阴谋注定要失败。"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f6707b1cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
