s":["李富春"],"dates":[{"year":1967,"month":8,"day":6}],"is_range_date":false,"parts":[{"text":"李富春接见国家计委同志谈斗争薄一波","type":"title"},{"text":"李富春","type":"authors"},{"text":"摘要：","type":"paragraph"},{"text":"斗争薄一波，要挖他的历史根子，要挖痛。","type":"paragraph"},{"text":"第一、挖（他）是刘少奇包庇下来的叛徒（下边未听清）。","type":"paragraph"},{"text":"第二、投奔阎锡山，把大叛徒宋劭文、牛佩琮、戎子和等搞到山西去。","type":"paragraph"},{"text":"第三、抗战时期搞“牺盟会”、“决死队”。“牺盟会”负责人是戎子和（下一个未听清）。","type":"paragraph"},{"text":"第四、薄一波的一套手法是阎锡山那里来的，以后和刘少奇、刘澜涛、安子文等大叛徒勾结起来，到处伸手。你搞他的具体问题，他可以躲闪。你搞他的历史问题，他就没有办法。自首叛变61个人，是刘少奇批的，没有报告主席，没有报告中央，是同张闻天勾结起来搞的，主席不知道。","type":"paragraph"}],"comments":[],"origin":"中国人民大学、南开大学合办《新人大 新南开》1967年9月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54085a25c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
