thors":["谭一"],"dates":[{"year":1957,"month":11,"day":14}],"is_range_date":false,"parts":[{"text":"利用漫画向党狂猖进攻　徐凡反党面目被揭穿","type":"title"},{"text":"谭一","type":"authors"},{"text":"《人民日报》讯：湖南工人报总编室副主任兼美术组组长徐凡的右派面目已被揭穿。","type":"paragraph"},{"text":"徐凡向党作了一系列的进攻。他诬蔑湖南美术工作“一团糟”。他诬蔑中共湖南省委宣传部文艺处、省文化局和省文联“连本部门的基本任务和职责范围都闹不明确”，他还无耻地叫嚣湖南美术工作者是“没有娘的儿”，煽动美术工作者来一个“庵堂认母”。","type":"paragraph"},{"text":"徐凡长期在报纸上利用漫画作为反党反社会主义的工具。并多方抗拒党的文艺方针。他一直不愿意深入到工农兵中去生活，不愿到火热的斗争中去生活，认为这样会耽误时间，妨碍创作。","type":"paragraph"},{"text":" ——原载《人民日报》1957年11月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3d30ac499"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
