ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"祝贺几内亚共和国成立的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺几内亚共和国成立的电报"},{"type":"paragraph","text":"（1958年10月7日）几内亚科纳克里几内亚共和国总理塞古·杜尔先生阁下："},{"type":"paragraph","text":"10月5日收到你的来信\"。我代表中华人民共和国和中国人民，并且以我个人的名义，热烈祝贺几内亚共和国的诞生，祝贺几内亚人民在争取民族独立的斗争中所获得的伟大胜利。我希望，我国政府对贵国的承认将导致两国人民之间的友好关系进一步的发展。祝贵国繁荣，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东"},{"type":"paragraph","text":"一九五八年十月七日于北京"},{"type":"paragraph","text":"[1]指几内亚共和国总理塞古·杜尔1958年10月4日给毛泽东的电报。电报说：“我荣幸地通知你，几内亚国民会议于1958年10月2日宣布了几内亚共和国成立。几内亚政府已于当天组成。作为独立和主权国家，几内亚愿在国际合作的基础上同中华人民共和国建立外交关系。”"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":10,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":301,"page_end":301},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ba1405e4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
