江青","陈伯达"],"dates":[{"year":1967,"month":1,"day":4}],"is_range_date":false,"parts":[{"text":"陈伯达等对“赴广州揪王任重革命造反团”的指示","type":"title"},{"text":"陈伯达江青康生","type":"authors"},{"text":"〖周恩来、江青、康生、王力等也在座〗","type":"appellation"},{"text":"陈伯达：","type":"paragraph"},{"text":"陶铸到中央来，并没有执行以毛泽东为代表的无产阶级革命路线，实际上是刘邓路线的忠实执行者。刘邓路线的推广同他是有关系的。他想洗刷这一点，但后来变本加厉。比如你们到中南局去，你们了解了很多情况，的确是有后台的。这个后台老板是陶铸。他在北京接见你们的那个态度是完全错误的。他是文化革命小组的顾问，但对文化革命的许多问题，从来没跟我们商量过，他独（江青插话：独断专行）断专行，不但背着文革小组。而且背着中央。你们揭得很好，给我们很多支持，感谢你们。","type":"paragraph"},{"text":"江青：","type":"paragraph"},{"text":"同学们，你们回去斗争要注意两条：一条是实事求是，核实材料，才能立于不败之地。二要作艰苦细致的工作，争取多数。使自己由少数变成多数。不要把敌人看成铁板一块，多数派同学很多是受蒙蔽的，不是不能做工作的，是可以分割的。一定要作细致的工作。这是策略问题，希望大家注意这几点。","type":"paragraph"},{"text":"康生：","type":"paragraph"},{"text":"同志们把材料整理出来，有材料摆出来了，你们就胜利了。再见！","type":"paragraph"}],"comments":[],"origin":"来源：《文化大革命研究资料（上册）》（北京：中国人民解放军国防大学党史党建政工教研室，1988年10月）；《大字报汇编》（北京汽车分公司大字报室、首都红旗联合总部宣传部，一九六七年）：哈尔滨工农兵大学红色造反团驻京联络站、北京政法学院政法公社编，中国科学院红卫兵革命造反司令部印《无产阶级文化大革命参考材料（一九六七年一月份）》（第一集）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"王任重","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"jqjianghua","type":"pdf","name":"江青十年讲话汇编","internal":false,"official":false,"author":"江青，本世纪初国内老左编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/jqjianghua.pdf"],"article":{"title":"陈伯达等对“赴广州揪王任重革命造反团”的指示","description":"","dates":[{"year":1967,"month":1,"day":4}],"parts":[{"text":"陈伯达等对“赴广州揪王任重革命造反团”的指示","type":"title"},{"type":"paragraph","text":"〖周恩来、江青、康生、王力等也在座〗"},{"type":"appellation","text":"陈伯达："},{"type":"paragraph","text":"陶铸到中央来，并没有执行以毛泽东为代表的无产阶级革命路线，实际上是刘邓路线的忠实执行者。刘邓路线的推广同他是有关系的。他想洗刷这一点，但后来变本加厉。比如你们到中南局去，你们了解了很多情况，的确是有后台的。这个后台老板是陶铸。他在北京接见你们的那个态度是完全错误的。他是文化革命小组的顾问，但对文化革命的许多问题，从来没跟我们商量过，他独（江青插话：独断专行）断专行，不但背着文革小组。而且背着中央。你们揭得很好，给我们很多支持，感谢你们。"},{"type":"appellation","te
