art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席的革命文艺路线胜利前进","authors":[],"parts":[{"type":"paragraph","text":"学习毛主席的光辉著作《在延安文艺座谈会上的讲话》，坚定为工农兵服务的政治方向。某部业余宣传队经常学习《讲话》，发挥革命文艺“团结人民、教育人民、打击敌人、消灭敌人”的战斗作用。"},{"type":"paragraph","text":"张澎摄"},{"type":"paragraph","text":"深入批判邓小平，保卫文艺革命胜利成果。某部二连指战员深入批判党内最大的不肯改悔的走资派邓小平反革命的修正主义政治路线和文艺路线，批判他恶毒攻击文艺革命、攻击革命样板戏的罪行。这是他们在布置大批判专栏。"},{"type":"paragraph","text":"群智摄"},{"type":"paragraph","text":"坚持文艺革命，反击右倾翻案风。某部业余演出队积极为连队演出移植革命样板戏评剧《杜鹃山》，以事实回击邓小平在文艺界刮起的否定文艺革命，否定革命样板戏的右倾翻案风。"},{"type":"paragraph","text":"赵乃峻摄"},{"type":"paragraph","text":"为新生事物大唱赞歌。某部十一连演唱组坚持以阶级斗争为纲，学习革命样板戏的创作经验，紧密配合现实阶级斗争，自编自演文艺节目，歌颂文化大革命和社会主义新生事物，批判邓小平否定文化大革命和新生事物的罪行。"},{"type":"paragraph","text":"唐禹民摄"},{"type":"paragraph","text":"向工农兵学习，为工农兵服务。某部业余美术骨干来到陕西户县，学习农民画家的创作经验，进一步明确了创作方向。这是他们在请农民画家李凤兰介绍创作新画的体会。"},{"type":"paragraph","text":"李靖摄"},{"type":"paragraph","text":"深入生活，改造思想。福州部队歌舞团文艺工作者，到当年上杭县才溪乡革命老根据地进行学习、锻炼，不断改造世界观，进一步提高了为工农兵服务的自觉性。"},{"type":"paragraph","text":"李玲摄"},{"type":"paragraph","text":"歌颂文化大革命，反击右倾翻案风。北京部队某部为纪念毛主席《在延安文艺座谈会上的讲话》发表三十四周年，开展批判邓小平、反击右倾翻案风、歌颂文化大革命的歌咏活动。这是他们在进行排练。"},{"type":"paragraph","text":"力群摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fa658f959"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
