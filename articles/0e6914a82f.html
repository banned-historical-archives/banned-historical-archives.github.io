<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发华东局关于浙江省早稻丰收后农村情况及相关意见的报告","authors":[],"dates":[{"year":1951,"month":9,"day":21}],"is_range_date":false,"parts":[{"text":"中共中央转发华东局关于浙江省早稻丰收后农村情况及相关意见的报告","type":"title"},{"text":"各中央局、分局：","type":"appellation"},{"text":"兹将浙江省委今年早稻丰收后农村情况报告及华东局的意见转发你们参考。我们认为这种情况在各地均可能发生，应予及时注意。华东局所规定四项解决办法是正确的，各地可仿照办理。","type":"paragraph"},{"text":" 中  央九月二十一日","type":"paragraph"},{"text":"分局，各省、区党委，沪、宁市委并报中央：","type":"appellation"},{"text":"据浙江省委农委报告今年早稻丰收后农村情况称：","type":"paragraph"},{"text":"（一）早稻平均比去年增产一成半以上，少部地区增产二至三成。农民情绪很高。部分农民产生自满与自私思想，认为：“增产到顶了，再增不上去了”，“增产是自己出的力气，上的肥料，与爱国没有关系”，“增产捐献，要自愿”。有些农民叫苦，怕要他多交农业税。有些地方发生大吃大喝。余姚渚兆乡一个村过七月半浪费稻谷三万三千多斤。杭县南肇和乡十三村、南洋桥十六户贫农中尚缺大小农具一百一十九件不去购置，反做新衣、蚊帐、被子等等，共花了二百一十万元。","type":"paragraph"},{"text":"（二）新谷收购不及时，曾一度发生投机私商压低粮价，造成“谷贱伤农”现象。有些国营公司缺乏收购计划，有时清闲无事，有时谷担拥塞街头、手续繁琐、应接不暇，造成农民不满与私商投机空隙，对农民必需品与生产资料的供应准备不足，致使农具、肥料价格猛涨。兰溪永昌镇豆饼价格几天内从十六万元涨到二十八万元。各种农具价格亦上涨四分之一到二分之一。","type":"paragraph"},{"text":"（三）在早稻普遍增产的情况下，亦有少数户歉收的。据金华调查，最好的乡村减产户约占百分之二点三到百分之十。除老弱孤寡和烈军工属及转向农业生产的手工业者外，主要是地主及反革命家属，因劳动态度不老实而普遍减产。有些地区不法地主抢夺农民劳动果实，温州合作乡一地主偷割农民一千四百斤谷子，有的农民早稻未熟即被割掉等情。对上述情况我们有如下意见，望各地同样及时予以注意：","type":"paragraph"},{"text":"（1）向广大农民深入进行爱国增产和发展农业生产十大政策的教育，纠正安于现状的落后思想，克服各种顾虑，提倡节约，爱护劳动果实，增加生产投资，反对浪费。","type":"paragraph"},{"text":"（2）国营贸易公司及合作社应加强对工业原料及商品粮食收购工作的领导，提高收购工作的组织性与计划性，增加收购据点，简化手续，加强市场管理，以稳定物价，打击投机商人。","type":"paragraph"},{"text":"（3）责成贸易公司、合作社，迅速大力供应农民的生产资料与生活资料，有计划地组织与扶持手工业，增产农具。同时，应组织私商对农民所需用品的供应，以补国营公司与合作社力量之不足，并加强对私商的教育，使他们服从国家牌价。","type":"paragraph"},{"text":"（4）严格督促地主劳动生产，对违法偷盗者应分别惩处，严禁任何破坏行为。","type":"paragraph"},{"text":" 华东局九月十六日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e6914a82f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
