班”班长表示决心做毛主席的好战士永远保持光荣","authors":[],"dates":[{"year":1964,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广州部队举行“欧阳海班”命名大会"},{"type":"paragraph","text":"陶铸同志号召学习欧阳海的伟大共产主义精神“欧阳海班”班长表示决心做毛主席的好战士永远保持光荣"},{"type":"paragraph","text":"新华社广州六日电　根据国防部命令，中国人民解放军广州部队五日隆重举行命名大会，授予舍身救列车的伟大战士欧阳海生前所在的三连七班“欧阳海班”称号。"},{"type":"paragraph","text":"中共中央中南局第一书记陶铸，广州部队首长黄永胜上将、刘兴元中将，广东省、广州市党政机关团体代表和陆海空军官兵代表一千五百多人出席了大会。"},{"type":"paragraph","text":"黄永胜上将在会上代表国防部宣读了命令，并把奖状和绣着“欧阳海班”金色大字的锦旗授予七班同志。"},{"type":"paragraph","text":"陶铸在会上作了讲话。他说，欧阳海是伟大的共产主义战士，学习欧阳海首先要学习欧阳海的共产主义精神。欧阳海这样英雄人物的出现，并非偶然。过去，我们部队出现过董存瑞、黄继光、罗盛教，地方上也有向秀丽和马口英雄，在各个地方，各个战线上，不断涌现出来的共产主义新人，是毛泽东时代的必然产物，是社会主义制度无比优越的生动体现。我们要大力歌颂这样崇高的共产主义新人，鞭挞和鄙弃资产阶级个人主义思想。他说，欧阳海的自我牺牲精神是和他出生在贫农家庭，对旧社会有着强烈的阶级仇恨，以及入伍后不断提高思想觉悟分不开的。他努力读毛主席著作，树立了为共产主义事业奋斗到底的人生观，因而成为伟大的共产主义战士。他希望广州部队官兵学习欧阳海的伟大共产主义精神，把我们军队革命化的工作做得好上加好。"},{"type":"paragraph","text":"中共广东省委常委寇庆延、广州市副市长钟明、广州铁路局政治部副主任邱前章等，也分别代表广东省委、省人民委员会，广州市委、市人民委员会和广州铁路局讲话，一致赞扬欧阳海烈士为人民利益奋不顾身的伟大精神。"},{"type":"paragraph","text":"在大会上，王阑西少将还代表广州部队领导机关宣布了追认欧阳海烈士为广州部队“五好战士标兵”和“爱民模范”的命令。陈发洪少将报告了欧阳海烈士的事迹。"},{"type":"paragraph","text":"“欧阳海班”班长曾阶锋，代表全班在大会上表示，感谢党和国家给予他们的崇高荣誉，全班决心以欧阳海烈士为榜样，读毛主席的书，听毛主席的话，按毛主席的指示办事，做毛主席的好战士，全心全意为人民服务，永远保持光荣，创造更高标准的四好班。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"黄永胜","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2960def8c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
