（概要）","authors":[],"dates":[{"year":1969,"month":9,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央关于增补、调动、撤换各级革命委员会成员的通知（概要）","type":"title"},{"text":"《通知》规定：一、各级革命委员会需要增补委员、常委和副主任时，要注意增补革命领导干部和革命群众代表，要着重增补优秀的产业工人代表。二、革命委员会中，有调往他处的或红卫兵从学校毕业后下放劳动的，都不要忙于免除他们的职务；对犯有某些错误的革命委员会成员，应按照“团结-批评、自我批评-团结”的原则进行帮助教育，不要轻易进行组织处理；对于有严重政治历史问题的革命委员会成员的处理，应报请中央或上级革命委员会批准；对于十分急需调动、撤销的革命委员会中的委员、常委、副主任、主任，要在群众民主协商的基础上再上报中央或上级革命委员会，批准后施行。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19c6c1ea0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
