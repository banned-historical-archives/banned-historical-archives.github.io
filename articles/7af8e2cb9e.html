<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"中共不出席四届一次参政会","alias":"","parts":[{"type":"paragraph","text":"中共不出席四届一次参政会！"},{"type":"paragraph","text":"（1945年6月15日）"},{"type":"paragraph","text":"【新华社延安十六日电】新华社记者就国民党政府决定于七月七日召集新的国民参政会，中共方面是否有人出席一项问题，询问中共中央负责人，承其答复如下："},{"type":"paragraph","text":"国民党政府决定于今年七月七日召集的所谓国民参政会，中共方面没有什么人去出席。这是因为：（一）从去年九月以来，中共与中国民主同盟及其他广大民主人土，一致要求国民党政府，迅即取消一党专政，召开各党派及无党派代表人物的会议，成立民主的临时的联合政府，发布民主纲领，实行民主改革，以便动员与统一中国人民的抗日力量，有力地配合同盟国?战胜日本侵略者；并由此种联合政府依据民主原则，于全部国土获得解放之后，实行自由的无拘束的人民的选举，召开国民代表大会，制定宪法，选举正式政府。此项主张，实为中国大多数人民公意之反映，但在本党代表与国民党政府代表几次谈判之后，已被国民党政府所拒绝。至于恢复团结与建立联合政府之一些起码的条件，例如取消镇压人民的自由"},{"type":"paragraph","text":"[1]这是毛泽东为新华社起草的答记者问，刊载于1945年6月17日《解放日报》。"},{"type":"paragraph","text":"[2]同盟国，指第二次世界大战期间共同对德、意、日轴心国作战的中、苏、美、英、法等国家。的法令，取消特务，释放被捕的共产党员及一切爱国分子，承认中共及其他民主党派的合法地位，承认中国解放区，撤退包围与进攻中国解放区的军队等项，不但一项也不愿实行，反而变本加厉，增强了破坏团结与破坏抗战的反动措施。（二）此次所谓新的国民参政会之召集，国民党政府当局事前并未与本党协商，亦未与其他民主党派协商，仍和过去的国民参政会一样，完全由国民党一手包办。依据国民党政府的法令，中共及其他民主党派至今没有合法地位。即就中共方面的参政员而论，亦为国民党当局所指派，并非中共自己所推选。而中共所领导的抗日力量，现在已成了战胜民族敌人、解放中国人民的中心力量。国民党政府此种对待中共的态度，不但与民主原则相违背，亦与中共在抗日战争中的地位不符合。（三）尤其重要的，是国民党的第六次全国代表大会，不顾中国人民、中国共产党及其他民主党派的一切反对意见，一意孤行地决定于今年十一月十二日召集那个由国民党一手包办的分裂人民的准备内战的所谓国民大会，而在行将开会的国民参政会上，就要强迫通过许多具体办法，以便实行国民党的反动决议。而如果这样做，就将铸成大错，反民族反人民反民主的大规模内战就会爆发。很明显，这样做的结果，只是帮助了日本侵略者。根据上述各项理由，中共方面已决定不参加此次国民参政会会议，以示抗议。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":6,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":120,"page_end":121},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"中共不出席四届一次参政会","description":"","dates":[{"year":1945,"month":6,"day":15}],"parts":[{"text":"中共不出席四届一次参政会","type":"title"},{"type":"paragraph","text":"【新华社延安十六日电】新华社记者就国民党政府决定于七月七日召集新的国民参政会，中共方面是否有人出席一项问题，询问中共中央负责人，承其答复如下："},{"type":"paragraph","text":"国民党政府决定于今年七月七日召集的所谓国民参政会，中共方面没有什么人去出席。这是因为：（一）从去年九月以来，中共与中国民主同盟及其他广大民主人士，一致要求国民党政府，迅即取消一党专政，召开各党派及无党派代表人物的会议，成立民主的临时的联合政府，发布民主纲领，实行民主改革，以便动员与统一中国人民的抗日力量，有力地配合同盟国战胜日本侵略者；并由此种联合政府依据民主原则，于全部国土获得解放之后，实行自由的无拘束的人民的选举，召开国民代表大会，制定宪法，选举正式政府。此项主张，实为中国大多数人民公意之反映，但在本党代表与国民党政府代表几次谈判之后，已被国民党政府所拒绝。至于恢复团结与建立联合政府之一些起码的条件，例如取消镇压人民的自由的法令，取消特务，释放被捕的共产党员及一切爱国分子，承认中共及其他民主党派的合法地位，承认中国解放区，撤退包围与进攻中国解放区的军队等项，不但一项也不愿实行，反而变本加厉，增强了破坏团结与破坏抗战的反动措施。（二）此次所谓新的国民参政会之召集，国民党政府当局事前并未与本党协商，亦未与其他民主党派协商，仍和过去的国民参政会一样，完全由国民党一手包办。依据国民党政府的法令，中共及其他民主党派至今没有合法地位。即就中共方面的参政员而论，亦为国民党当局所指派，并非中共自己所推选。而中共所领导的抗日力量，现在已成了战胜民族敌人、解放中国人民的中心力量。国民党政府此种对待中共的态度，不但与民主原则相违背，亦与中共在抗日战争中的地位不符合。（三）尤其重要的，是国民党的第六次全国代表大会，不顾中国人民、中国共产党及其他民主党派的一切反对意见，一意孤行地决定于今年十一月十二日召集那个由国民党一手包办的分裂人民的准备内战的所谓国民大会，而在行将开会的国民参政会上，就要强迫通过许多具体办法，以便实行国民党的反动决议。而如果这样做，就将铸成大错，反民族反人民反民主的大规模内战就会爆发。很明显，这样做的结果，只是帮助了日本侵略者。根据上述各项理由，中共方面已决定不参加此次国民参政会会议，以示抗议。"},{"type":"paragraph","text":"根据一九四五年六月十七日"},{"type":"paragraph","text":"《解放日报》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":12,"index":1},{"part_idx":2,"offset":161,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东为新华社起草的答记者问，刊载于一九四五年六月十七日《解放日报》。","同盟国，指第二次世界大战期间共同对德、意、日轴心国作战的中、苏、美、英、法等国家。"],"page_start":440,"page_end":441,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7af8e2cb9e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
