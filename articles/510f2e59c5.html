<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5a6e14f4-1103-48c3-bd99-37613918dd4b","name":"中共党史教学参考资料 第25册 “文化大革命”参考资料 上册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/5a6e14f4-1103-48c3-bd99-37613918dd4b.pdf"],"article":{"title":"中共中央、国务院关于革命师生和红卫兵进行步行串连问题的通知","alias":"","parts":[{"type":"paragraph","text":"经验证明，我们有了正确的无产阶级的革命路线，有了夺权斗争的胆略、魄力和勇气，还必须有一系列的具体政策和措施。只有这样，·才能保证无产阶级革命派夺权斗争的胜利。各地无产阶级革命派，必须切实注意这一点。"},{"type":"paragraph","text":"黑龙江省无产阶级革命涨夺权斗争的胜利，是东北的新曙光。让我们热烈地祝贺他们在毛泽东思想的大道上继续前进！"},{"type":"paragraph","text":"中共中央、国务院关于革命师生和红卫兵进行"},{"type":"paragraph","text":"步行串连问题的通知"},{"type":"paragraph","text":"（一九六七年二月三日）"},{"type":"paragraph","text":"几个月来，广大革命师生热烈响应我们的伟大领袖毛主席和他的亲密战友林彪同志的号召，进行步行串连、得到了极大的锻炼，促进了无产阶级文化大革命运动更加深入.广阔的发展。当前我国无产阶级文化大革命已进人-一个新的阶段。无产阶级革命派大联合，向党内一小操走资本主义道路的当权派和极少数坚持资产阶级反动路线的顽固分子展开了夺权斗争。外出步行串连的革命师生和红卫兵应当回到本地本学校去，参加这个具有伟大历史意义的决战。"},{"type":"paragraph","text":"目前北京、韶山、井冈山、瑞金、遵义、泸定桥、延安等革命圣地以及大寨，由于前去的革命师生过多，拥挤一起，天气寒冷，食宿、交通安排极为困难，也影响了当地群众的生产和生活。有的地方还发生了传染病，影响了革命师生的健康。这些问题，急需加以解决。"},{"type":"paragraph","text":"为此，中共中央、国务院决定："},{"type":"paragraph","text":"一、长途步行串连、在全国都停止。已经到达目的地的步行串连队，凡停留时间超过三天到五天的，请迅速返回原地。在县以内步行串连，也要防止过分拥挤。北京、韶山、井冈山、瑞金、遵义、泸定桥、延安等革命圣地以及大寨，一律停止前往串连和参观。"},{"type":"paragraph","text":"二、步行串连队在返回的时候，原则上应当步行。目前，为了使远离本地五百公里以外的革命师生和红卫兵迅速回到本地本校闹革命，参加斗、批、改，实现革命造反派大联合，进行夺权斗争，在十五天内也可以免费领取直达票乘坐火车和轮船。不靠铁路线的，应当步行到邻近的铁路线上乘坐火车。、三、为了响应我们最敬爱的领袖毛主席节约闹革命的伟大号召，发扬艰苦朴素、勤俭节约的优良作风，反对经济主义，防止铺张浪费，步行串连的革命师生，在串连和回程期间的伙食费、市内交通费，一般应当自理。粮食定量可适当增加。“宣传费、医药费只在必要时可给予少量补贴。，四、来北京的革命师生和红卫兵凡是吃饭尚未交费的，自二月八日起一律交费，不再免费。"},{"type":"paragraph","text":"本通知可在全国城乡各有关单位和地方张贴。"}],"authors":[],"dates":[{"year":1967,"month":2,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":282,"page_end":282},"tags":[{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、国务院关于革命师生和红卫兵进行步行串连问题的通知","authors":[],"dates":[{"year":1967,"month":2,"day":3}],"is_range_date":false,"parts":[{"text":"中共中央、国务院关于革命师生和红卫兵进行步行串连问题的通知","type":"title"},{"text":"各中央局，各省、市、自治区党委、人委：","type":"appellation"},{"text":"几个月来，广大革命师生热烈响应我们的伟大领袖毛主席和他的亲密战友林彪同志的号召，进行步行串连，得到了极大的锻炼，促进了无产阶级文化大革命运动更加深入、广阔的发展。当前我国无产阶级文化大革命已进入一个新的阶段。无产阶级革命派大联合，向党内一小撮走资本主义道路的当权派和极少数坚持资产阶级反动路线的顽固分子展开了夺权斗争。外出步行串连的革命师生和红卫兵应当回到本地本学校去，参加这个具有伟大历史意义的决战。","type":"paragraph"},{"text":"目前北京、韶山、井冈山、瑞金、遵义、泸定桥、延安等革命圣地以及大寨，由于前去的革命师生过多，拥挤一起，天气寒冷，食宿、交通安排极为困难，也影响了当地群众的生产和生活。有的地方还发生了传染病，影响了革命师生的健康。这些问题，急需加以解决。","type":"paragraph"},{"text":"为此，中共中央、国务院决定：","type":"paragraph"},{"text":"一、长途步行串连，在全国都停止。已经到达目的地的步行串连队，凡停留时间超过三天到五天的，请迅速返回原地。在县以内进行步行串连，也要防止过分拥挤。北京、韶山、井冈山、瑞金、遵义、泸定桥、延安等革命圣地以及大寨，一律停止前往串连和参观。","type":"paragraph"},{"text":"二、步行串连队在返回的时候，原则上应当步行。目前，为了使远离本地五百公里以外的革命师生和红卫兵迅速回到本地本校闹革命，参加斗、批、改，实现革命造反派大联合，进行夺权斗争，在十五天内也可以免费领取直达票乘坐火车和轮船。不靠铁路线的，应当步行到邻近的铁路线上乘坐火车。","type":"paragraph"},{"text":"三、为了响应我们最敬爱的领袖毛主席节约闹革命的伟大号召，发扬艰苦朴素、勤俭节约的优良作风，反对经济主义，防止铺张浪费，步行串连的革命师生，在串连和回程期间的伙食费、市内交通费，一般应当自理。粮食定量可适当增加。宣传费、医药费只在必要时可给予少量补贴。","type":"paragraph"},{"text":"四、来北京的革命师生和红卫兵凡是吃饭尚未交费的，自二月八日起一律交费，不再免费。","type":"paragraph"},{"text":"本通知可在全国城乡各有关单位和地方张贴。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第一集）》， 北京：1967年2月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"510f2e59c5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
