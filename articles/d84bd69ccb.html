<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国《挑战》报揭露垄断资产阶级残酷剥削美国黑人工人  黑人工人和白人工人团结起来反对共同敌人","authors":[],"dates":[{"year":1969,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国《挑战》报揭露垄断资产阶级残酷剥削美国黑人工人"},{"type":"paragraph","text":"黑人工人和白人工人团结起来反对共同敌人"},{"type":"paragraph","text":"据新华社十六日讯　美国进步劳工党机关报《挑战》报最近连续发表文章，揭露美国垄断资产阶级在国内推行种族歧视政策，残酷剥削和压迫美国黑人劳动人民。"},{"type":"paragraph","text":"《挑战》报揭露，美国垄断资产阶级一贯推行种族歧视政策，从黑人劳动人民身上榨取大量的超额利润。美国大企业的老板们仅从对白人和黑人实行工资差别的做法中，每年就至少能额外攫取到二百二十亿美元。"},{"type":"paragraph","text":"在种族歧视下，美国黑人工人的处境十分困苦。报纸引用美国联邦政府的官方估计说，在美国，四口之家起码的生活费用是九千一百九十一美元。而一九六六年每个黑人家庭的平均收入却只有四千四百八十一美元。由于大部分黑人生活极端贫困，黑人出生婴儿的死亡率特别高。"},{"type":"paragraph","text":"报纸以美国钢铁公司为例，揭露垄断资产阶级不顾黑人工人死活，特别残酷地剥削黑人工人的情况。报纸说，美国钢铁公司在芝加哥地区的一家工厂中，在熔铁炉旁工作的所有六百名工人几乎都是黑人，他们的劳动条件极差，整天在高温下工作。但老板们为了多赚钱，却不顾工人的反对，蛮横削减炉前工的人数，结果导致了一起熔铁炉爆炸的严重事故，只是由于值班工人及时叫同伴们迅速撤离，才使得大批工人幸免遇难。"},{"type":"paragraph","text":"报纸指出，这种不顾工人安危生死的事故，在美国全国的钢铁厂里几乎没有一天不发生的。老板们把美元看得比什么都重要，工人的生命却什么也算不上。"},{"type":"paragraph","text":"这家报纸揭露，大老板们一方面把工人生命当儿戏，但另一方面又以“安全”为借口，不让黑人工人担任有较高技艺的工作，而始终让他们干工资最低的粗活。"},{"type":"paragraph","text":"在美国钢铁公司举办的技术训练班里，老板们依靠种种“程序”的限制和黄色工会坏头头的支持，千方百计把黑人工人排斥在外。工厂老板还常常以所谓“违反操作规程”、“无故旷工”等莫须有的罪名随便开除黑人工人，或者把黑人工人降级减薪。"},{"type":"paragraph","text":"报纸接着指出，与此成对比的是，钢铁工业的老板为了攫取更多的利润，常常让黑人工人长期去干那些本应付与较高报酬的活，但工资却一直不予增加。此外，老板们还一面解雇大批工人，把他们推上街头，一面却强使一批工人加班，一天干十六小时的活，以便达到他们敲骨吸髓剥削工人的目的。"},{"type":"paragraph","text":"报纸指出，通过上述种种手法，这家美国钢铁公司从工人身上压榨所得的利润与日俱增，而工人、特别是黑人工人的境况却越来越坏。面对着垄断资产阶级的残酷剥削和压迫，美国黑人工人的觉悟正在日益提高，他们正在同美国白人工人紧密团结起来，展开坚决的斗争。"},{"type":"paragraph","text":"《挑战》报最后指出：归根结底，美国黑人工人和白人工人一起进行的斗争是阶级斗争。他们正在为反对他们的共同敌人——美国统治阶级而进行斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d84bd69ccb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
