　毛泽东思想为七亿人民所掌握正把社会主义革命推向更高阶段","authors":[],"dates":[{"year":1967,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《长周新闻》记者座谈会热情赞扬我国文化大革命"},{"type":"paragraph","text":"革命造反派夺权体现伟大的毛泽东思想"},{"type":"paragraph","text":"毛泽东思想为七亿人民所掌握正把社会主义革命推向更高阶段"},{"type":"paragraph","text":"新华社东京二十八日电　一月二十五日出版的日本《长周新闻》发表了题为《在毛泽东思想指引下七亿人民的革命》的记者座谈会记录，指出中国无产阶级革命造反派团结起来展开夺权的斗争，标志着以毛主席为代表的无产阶级革命路线的新胜利，赞扬伟大的毛泽东思想对人类历史做出巨大贡献。"},{"type":"paragraph","text":"《长周新闻》记者座谈会指出，中国的无产阶级文化大革命更加广泛、更加深入地发展着。事态的发展正与帝国主义、反动派和现代修正主义者的愿望相反，以毛主席为代表的无产阶级革命路线正在继续粉碎资产阶级反动路线而胜利前进。毛泽东思想已为中国人民所掌握，七亿人民正在把社会主义革命推向更高的阶段。这是人类史上空前的大革命，它构成了一首雄壮的伟大的叙事诗。"},{"type":"paragraph","text":"座谈会的参加者指出，以毛主席为代表的把社会主义革命进行到底的无产阶级革命路线正在取得胜利。随着斗争的进展，革命路线的胜利，资产阶级反动路线为了固守它们的阵地进行了种种阴谋活动。反革命分子用金钱，欺骗收买工人，实行经济主义，而革命派坚决反击，粉碎了反革命经济主义。"},{"type":"paragraph","text":"座谈会指出，苏联十月革命以后虽然已将五十年，可是由于赫鲁晓夫的修正主义路线苏联正在复活着资本主义。中国在国内绝对不允许资本主义复辟，并粉碎了修正主义任何根源。为此目的，中国人民坚持把文化大革命进行到底，不断地培养革命的接班人。"},{"type":"paragraph","text":"座谈会指出，毛主席关于社会主义社会存在着阶级和阶级斗争、关于必须进行文化大革命的学说，是马克思列宁主义宝库中的新武器。毛泽东思想在人类史上所起的作用是非常巨大的。"},{"type":"paragraph","text":"座谈会指出，毛泽东思想是在帝国主义走向全面崩溃，社会主义走向全世界胜利的时代的马克思列宁主义。中国的无产阶级文化大革命体现了毛泽东思想。"},{"type":"paragraph","text":"座谈会指出，毛泽东思想是马克思列宁主义创造性的大发展，通过七亿中国人民的革命斗争得到了实践的检验。"},{"type":"paragraph","text":"座谈会指出，这一亿万人民参加的伟大的革命在毛泽东思想的指引下正在取得胜利。"},{"type":"paragraph","text":"《长周新闻》不久前在一篇文章中说：中国七亿人民正在伟大的毛泽东思想指导下，进行着无产阶级文化大革命。今天在广阔的中国国土上掀起的这一场大革命是前人从未做过的伟大事业。引导这一革命走向胜利的是伟大的战无不胜的毛泽东思想。现在世界上的一切革命人民都在学习毛泽东思想，衷心欢迎和赞扬毛泽东思想；而一切反动派却害怕毛泽东思想。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4312b57e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
