","authors":[],"dates":[{"year":1955,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"广州市基督教青年会收到一份反动传单","type":"title"},{"text":"【广州分社五日电】广州市基督教青年会最近收到一份反动传单，原文内容如下：","type":"paragraph"},{"text":"同胞们：","type":"appellation"},{"text":"杀人的魔王一天比一天疯狂了，无数的青年在他们的压迫下牺牲了，正如伟大的胡风先生，受到那杀人的中共集团所蔑视、打击，不但胡风如此，很多先进的人也陷于如此。但我们有的是信心，胜利到底都属我们，我们要学会钻进去......挖他们的心脏，坚持战斗，扩大队伍，准备内应，迎接胜利到来......广大的人已揭穿他们了，所谓民主这说法，是完全放他妈的屁！思想改造是最凶狠的杀人法宝，欲将中国亡给苏联，这个有史以来未见的卖国贼，把人的心挖掉，换马克死的心，这做法总有一天受清算，杀掉他们的头子！","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年7月8日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daff5efe6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
