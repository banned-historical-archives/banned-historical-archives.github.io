rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理同埃亚德马总统继续会谈埃亚德马总统和夫人应邀出席文艺晚吴德等陪同贵宾观看革命现代舞剧《草原儿女》《沂蒙颂》","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年九月三日讯 国务院副总理邓小平同多哥共和国总统纳辛贝·埃亚德马将军今天下午继续举行了会谈。"},{"type":"paragraph","text":"新华社一九七四年九月三日讯 多哥共和国总统纳辛贝·埃亚德马将军和夫人以及随同来访的其他多哥贵宾，今天晚上应邀出席文艺晚会，观看中国舞剧团演出的革命现代舞剧《草原儿女》、《沂蒙颂》。"},{"type":"paragraph","text":"陪同贵宾观看演出的有国务院文化组组长、北京市革命委员会主任吴德，卫生部长刘湘屏，外交部副部长何英，有关方面负责人贾汀、杨骥、傅玉芳，以及中国驻多哥大使岳欣和毛真同志。"},{"type":"paragraph","text":"多哥驻中国大使馆临时代办佩达努和夫人也应邀出席。"},{"type":"paragraph","text":"当埃亚德马总统和夫人等贵宾来到剧场时，全场起立，热烈鼓掌。"},{"type":"paragraph","text":"演出结束后，埃亚德马总统和夫人走上舞台，同演员们热情握手，祝贺演出成功，并且赠送了花篮。"},{"type":"paragraph","text":"今天的文艺晚会是由国务院文化组和北京市革命委员会举办的。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8483ae2b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
