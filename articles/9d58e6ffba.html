art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"吊唁比耶迪奇主席及夫人等不幸逝世华国锋总理送了花圈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年一月二十日讯 国务院副总理李先念，人大常委会副委员长谭震林，今天下午前往南斯拉夫驻中国大使馆，吊唁南斯拉夫社会主义联邦共和国联邦执行委员会主席杰马尔·比耶迪奇及其夫人等不幸逝世。"},{"type":"paragraph","text":"华国锋总理送了花圈，花圈的白色缎带上写着：“献给南斯拉夫社会主义联邦共和国联邦执行委员会杰马尔·比耶迪奇主席”。"},{"type":"paragraph","text":"中华人民共和国外交部、外贸部，北京市革命委员会，也送了花圈。"},{"type":"paragraph","text":"前往吊唁的还有人大常委会秘书长姬鹏飞，外交部部长黄华、副部长余湛，外贸部副部长陈洁，北京市革命委员会副主任杨寿山，对外友协会长王炳南，外交部副司长于洪亮、刘华等。"},{"type":"paragraph","text":"南斯拉夫驻中国大使德鲁洛维奇和夫人以及大使馆外交官员，吊唁时在场。"},{"type":"paragraph","text":"李先念副总理、谭震林副委员长吊唁比耶迪奇主席及夫人等不幸逝世。"},{"type":"paragraph","text":"新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d58e6ffba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
