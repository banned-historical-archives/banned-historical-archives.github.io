ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"为阅看《关于（三国演义》》前两部分给林克的批语","alias":"","parts":[{"type":"paragraph","text":"为阅看《关于（三国演义）》前两部分"},{"type":"paragraph","text":"给林克\"的批语]"},{"type":"paragraph","text":"（1959年4月24日）林克："},{"type":"paragraph","text":"请你替我找《关于（三国演义）》的（一）（二）两节，我想看一看。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿四日[1]林克，当时任毛泽东办公室秘书。"},{"type":"paragraph","text":"[2]这个批语写在1959年4月23日《北京晚报》第三版上，该版登载了吴组细撰写的《关于（三国演义》》（三），主要是就《三国演义》来谈历史和文艺的关系。文章认为，《三国演义》以“拥刘反曹”为总的倾向，把刘备和曹操处理成矛盾对立的双方。不能表面地认为这只是反映了统治者内部的矛盾，那是历史；作为文艺作品，它实质上还反映了封建时代广大被压迫人民跟统治势力的矛盾，反映了黑暗时代人民群众的民主要求和爱国思想。在这里，文艺和历史必须区别开来，不能因为“拥刘反曹”的倾向有正统历史观，就否定它的民主思想。"},{"type":"paragraph","text":"[3]《关于（三国演义\u003e》（一）（二）分别载于1959年4月9日和15日《北京晚报》第三版。1959年5月13日，《北京晚报》又连载了《关于（三国演义）》（四）。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":464,"page_end":464},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d96ddf1e7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
