":1952,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"三年来，资产阶级的猖狂进攻是无孔不入的；对于勤劳辛苦的农民，他们也处处进攻；农民需要肥料时，他们在大豆加工时就大捞一把；夏天农民努力和虫害奋斗，他们又在喷射杀虫药的喷雾器上偷工减料，大量盗窃，做了一千个喷雾器，有八百个简直无法使用，其余的也一用就坏。"},{"type":"paragraph","text":"他们这样毫无人性的对待农民，等于他们暗害志愿军、解放军一样，不管是他们多大的恩人，他们总要狠狠咬一口，这就是资产阶级丑恶卑鄙的事例之一。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523m050501.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c6b697828"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
