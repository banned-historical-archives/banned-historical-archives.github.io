script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平、彭真同志会见由黄文欢同志率领的越南代表团","authors":[],"dates":[{"year":1965,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平、彭真同志会见由黄文欢同志率领的越南代表团"},{"type":"paragraph","text":"新华社二十九日讯　中共中央总书记、国务院代总理邓小平和中共中央政治局委员、人大常委会副委员长彭真，今天上午会见越南劳动党中央政治局委员、越南民主共和国国会常务委员会副主席黄文欢和由他率领的越南党政代表团，同越南同志进行了亲切的谈话。代表团是到罗马尼亚参加格·乔治乌—德治同志的葬礼以后，在回国途中路过北京的。"},{"type":"paragraph","text":"会见以后，邓小平、彭真同志设宴招待黄文欢等同志。"},{"type":"paragraph","text":"参加会见和宴会的，有乔冠华、王力等有关方面负责人。"},{"type":"paragraph","text":"越南民主共和国驻中国大使馆临时代办黄北也在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25a110acb0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
