script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真肃清极左路线的流毒  抓紧落实党的各项政策  石家庄市工作逐步扭转被动局面","authors":["武清月"],"dates":[{"year":1980,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"认真肃清极左路线的流毒  抓紧落实党的各项政策"},{"type":"paragraph","text":"石家庄市工作逐步扭转被动局面"},{"type":"paragraph","text":"本报讯   记者武清月报道：十年动乱中经受浩劫，粉碎“四人帮”后仍长期不得安定的河北省石家庄市，今年7月以来，通过认真肃清极左路线流毒，抓紧落实党的各项政策，调动了干部、群众建设四化的积极性，逐步扭转了工作上的被动、困难局面。目前，该市初步形成安定团结的政治局面，经济活跃，群众生活也有所改善。"},{"type":"paragraph","text":"原石家庄市委第一书记张建尧同志在省委前主要负责人影响下，不认真贯彻执行党的三中全会以来制定的政治、思想路线及其一系列方针、政策，致使极左路线的影响长期得不到清除，广大干部、群众的积极性受到压抑。"},{"type":"paragraph","text":"今年7月，省委决定由市委第二书记贾然同志“全权”主持全面工作。在省委和中央组织部、中央纪律检查委员会工作组的直接帮助下，市委要求各级党委实事求是地分析和总结过去的工作，批判林彪、“四人帮”极左路线的流毒影响，解放思想，端正路线，为进一步落实政策，调整领导班子，搞好各项工作奠定思想基础。"},{"type":"paragraph","text":"为了加快落实政策的步伐，市委落实政策领导小组充实了3名坚决拥护党的路线、秉公办事的老干部。市委主要领导同志还带领有关部门负责人到落实政策任务较大的郊区、矿区、矿务局、纺织局、二轻局等单位帮助解决问题。三个月来，全市通过“回头看”，发现应该平反以及落实不彻底的案件八千多件。7月份以来，已经落实解决79％。同时，对“文革”以前的错案三千多件进行了复查，已经落实解决了64％。"},{"type":"paragraph","text":"在落实政策的工作中，市委要求各级党委把落实政策同调整领导班子相结合，将那些抵制、反对三中全会路线的人，以及不称职的人，坚决从领导岗位上撤下来。到目前为止，仅51个市管单位，免去了不称职的干部25名，同时先后安排老干部14名，提拔拥护党的路线、有专业知识、年富力强的中青年干部18名。"},{"type":"paragraph","text":"党的各项政策的落实，调动了广大群众建设四化的积极性，推动了石家庄市的工农业生产。与去年比，工业生产水平全面上升，1至9月份市属工业企业利润比去年同期增长14 ．3％；全市财政收入比去年同期增长10．8％。由于自然灾害，夏粮减产；秋季作物收成，大体与去年持平或略低一点。蔬菜生产能保证城市人民需要，市民比较满意。"},{"type":"paragraph","text":"为了方便群众，石家庄今年以来新建商业服务网点281个。市委主要领导同志坐公共汽车，深入到饭馆、居民住宅区体察民情，解决群众迫切要求解决的问题，受到了群众的赞扬。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5dab32d874"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
