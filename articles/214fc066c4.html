ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于一切文电必须将发文年月日写齐的批语","alias":"","parts":[{"type":"paragraph","text":"关于一切文电必须将发文"},{"type":"paragraph","text":"年月日写齐的批语！"},{"type":"paragraph","text":"（1953年9月27日）彭，并告肖向荣同志："},{"type":"paragraph","text":"（一）此件照办。（二）军委及所属各部门各系统文电，至今仍只写月日，不写年份，仅见刘少文写的这个电报，写了“一九五三”，也缺一个“年”字。请你们通知所属，嗣后一切文电均必须将发文年月日写齐，不可只写月日，不写年份。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿七日"},{"type":"paragraph","text":"[1]这个批语写在人民革命军事委员会第四部代部长刘少文1953年9月23日关于西藏地区某些机构精简问题给彭德怀并报中央的报告上。"},{"type":"paragraph","text":"[2]彭，指彭德怀，当时任人民革命军事委员会副主席。[3]肖向荣，当时任人民革命军事委员会办公厅主任。"},{"type":"paragraph","text":"[4]指刘少文为中共中央及军委起草的1953年9月27日关于西藏地区某些机构精简问题给西藏工委并西南局、西南军区的电报。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":9,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":357,"page_end":357},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"214fc066c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
