authors":[],"dates":[{"year":1950,"month":6,"day":17}],"is_range_date":false,"parts":[{"text":"湖南若干农村中有乱划阶级现象","type":"title"},{"text":"(新湖南报六月十七日讯)湖南若干农村中农民自发所形成的划阶级标准，造成某些划分阶级的混乱现象。如邵阳、南县等地大多数乡村以无地的叫雇农，平均有五石谷地(即每年能打四石谷的田)以下的叫贫农，拥有十石谷地(可打八石)的叫中农，拥有十石谷地以上自耕的叫富农，将田地出租的叫地主。许多没有十石谷地或五亩田以下的人，都说自己是中农，其实这些人中有破落的地主、游民等不纯分子，有的还有政治问题，但都因为是中农成分，所以钻进了农会，他们抓到了农会的领导权后，就干破坏农会的工作。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年7月15日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43b2d09573"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
