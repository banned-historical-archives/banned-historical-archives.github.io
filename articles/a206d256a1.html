":[],"dates":[{"year":1957,"month":11,"day":19}],"is_range_date":false,"parts":[{"text":"黄绍竑给民革中央整风办公室的信","type":"title"},{"text":"右派分子黄绍竑在11月19日给民革中央整风办公室写了一封信，作为11月14日检讨的补充交代，原文如下：","type":"paragraph"},{"text":"“我虽然自始就抱着认错悔罪的心情，但未经同志们的全面批判揭发，对于自己历史上的罪恶和解放后所犯的错误，认识是不够深刻的。前次所作的检讨交代，因时间匆忙，仍然有不够的地方。自从经过上星期大会上同志们的全面批判和揭发，使我更进一步认识我历史上的罪恶和当前所犯错误的严重性，并且认识当前所犯的错误是与历史的罪恶分不开的。谨向您室表示接受大会对我的全面批判和揭发。”","type":"paragraph"}],"comments":[],"origin":"《揭露批判右派分子黄绍竑反动言行大会发言汇辑》， 北京：中国国民党革命委员会中央整风办公室编印，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a206d256a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
