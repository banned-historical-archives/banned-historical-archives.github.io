<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"有些商店营业员对那些所谓“高贵者”和“土里土气”的工农群众流露出两种感情，摆出两副脸孔。要彻底改变这种资产阶级的经营思想和作风，全心全意为工农兵服务，卖布的必须学织布","authors":[],"dates":[{"year":1968,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们商业工作者虽然不是知识分子，但由于长期脱离生产劳动，整天卖卖商品、开开发票、打打算盘，特别是我们所接触的顾客来自不同的阶级、阶层，资产阶级的思想每日每时地在侵蚀我们，使我们的思想感情、生活方式潜移默化，逐步地成为资产阶级思想的俘虏。"},{"type":"paragraph","text":"拿我们来说，由于长期做营业员，旧社会一套资本主义“生意经”给我们留下很深的烙印。比如，说话“鉴貌辨色”，做事“轧苗头”，待人接物“看风使舵”，表面一套，心里一套，这一些资产阶级的虚伪作风，至今在我们商业行业中还很有市场。因此，对工农群众就缺乏深厚的阶级感情。比如对待不同的顾客，我们就有两种感情，两种态度，两副脸孔:对那些所谓“高贵者”做生意时态度和气，服务热忱；而对那些说话“土里土气”的工农群众往往冷冷淡淡。甚至觉得工人“汗酸臭!”有时候，附近纺织厂工人来买布，我们态度冷淡，爱理不理，自己坐在电风扇下面谈“山海经”。工人同志批评我们:“你们到厂里去看看，我们抓革命、促生产是分秒必争，而你们却坐在那里谈天，不好好为工农兵服务。”听了这些批评，我们不但不虚心接受，有的同志还感到“委屈”，认为“这是分工不同”。贫下中农来买丝绸，我们说:“侬要买啥，我给侬拿。”表面上态度蛮好，其实呢，我们的灵魂深处是瞧不起贫下中农。我们仔细地想一想，棉花是农民种的，蚕是农民养的，棉布、丝绸是工人纺织的，我们却用这种态度对待工农群众，这是什么样的思想感情!如果不把灵魂深处这些丑恶的思想挖出来批臭，怎能谈得上为工农群众服务呢?"},{"type":"paragraph","text":"毛主席教导我们:“为什么人的问题，是一个根本的问题，原则的问题。”"},{"type":"paragraph","text":"我们不是天天在喊要为工农兵服务吗?“既然要为工农群众服务，那就首先必须懂得工人农民，熟悉他们的生活、工作和思想。”这就必须去接触工农兵，了解工农兵，熟悉工农兵，在生产斗争中向工农兵学习，从而改造自己的旧思想，和工农群众建立起深厚的阶级感情。"},{"type":"paragraph","text":"一个伟大的斗、批、改高潮已经到来，商业战线必须来一个大革命，卖布的学织布，卖菜的学种菜。我们革命的商业工作者决心在这场伟大的斗争中，彻底改造资产阶级经营思想，改革一切不利于广大工农群众的经营制度，全心全意为人民服务。"},{"type":"paragraph","text":"长宁区红色绸布商店三个营业员"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c8dd775b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
