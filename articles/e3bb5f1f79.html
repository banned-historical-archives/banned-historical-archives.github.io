科举行的世界妇女代表大会，积极同外国修正主义分子进行接触和从事秘密活动","authors":[],"dates":[{"year":1964,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京19日电】　东京消息:日本共产党中央委员会书记处十八日宣布，由于属于党总部支部的田宫滋和其他六人及志贺的妻子渡边多惠子进行反党活动而把他们开除出党。对他们的纪律处分是根据他们所属的党支部的请求，并得到有关党组织的必要的批准。"},{"type":"paragraph","text":"根据党总部支部决定开除田宫滋等七人的决议，党中央委员会机关的工作人员田宫滋、三浦健次、津京良治、荒木寿、笠原房则、染川尚久和清野俊彦从去年八月以来一直偷偷开展派别活动，反对党的决定；从五月十五日以来随心所欲地不履行义务，同志贺及铃木一致行动；现在竟以国会的接待室为中心，公然勾结起来进行反党的颠复活动。"},{"type":"paragraph","text":"根据东京三多摩郡委员会作出的开除渡边多惠子的决议，渡边多惠子是志贺的最积极的同谋者，长期以来一直在违反党章从事派别活动。"},{"type":"paragraph","text":"自从去年以来，她一直是由被开除出党的反党修正主义分子井汲卓一所组织的经济研究小组的成员，同这个小组的其他成员一起积极开展反党活动。"},{"type":"paragraph","text":"她个人接受某个外国妇女组织的邀请，在同正式的日本代表团没有任何联系的情况下出席了去年在莫斯科举行的世界妇女代表大会，积极同外国修正主义分子进行私人接触和从事秘密活动。她的这些活动，在策划和准备志贺的公开叛变中起了重要作用。"},{"type":"paragraph","text":"决议列举了各种事实指出，她除了在党外进行上述反党活动之外，还用各种恶劣的手段在党内秘密进行破坏党的阴谋活动。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3bb5f1f79"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
