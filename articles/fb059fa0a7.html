修反发抖  泰国青年决心以中国红卫兵为榜样大造美泰反动派的反","authors":[],"dates":[{"year":1967,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“泰国人民之声”赞扬我国红卫兵为文化大革命立下伟大功勋"},{"type":"paragraph","text":"中国红卫兵革命造反精神使帝修反发抖"},{"type":"paragraph","text":"泰国青年决心以中国红卫兵为榜样大造美泰反动派的反"},{"type":"paragraph","text":"新华社十九日讯　曼谷消息：“泰国人民之声”电台高度赞扬中国红卫兵的革命造反精神，并指出，泰国革命青年坚决以中国革命的红卫兵为榜样，起来造美帝国主义和他侬—巴博卖国集团的反。"},{"type":"paragraph","text":"电台说，中国红卫兵是毛泽东思想武装起来的革命青少年。他们是斗批中国党内一小撮走资本主义道路当权派的闯将，是破“四旧”的急先锋。他们遵照伟大领袖毛主席革命“造反有理”的教导，以“舍得一身剐，敢把皇帝拉下马”的革命造反精神，起来造中国党内一小撮走资本主义道路当权派的反，彻底粉碎了中国赫鲁晓夫妄想在中国复辟资本主义的罪恶阴谋，为中国无产阶级文化大革命立下了伟大的功勋。"},{"type":"paragraph","text":"电台说，中国红卫兵的革命造反精神，震撼了全世界。帝国主义、现代修正主义和一切反动派一片惊慌。它们非常害怕本国青年学习中国革命的红卫兵的造反精神，起来造它们的反。而全世界革命人民都高度赞扬中国红卫兵，热爱中国红卫兵。各国革命青年都以中国的革命红卫兵为榜样，无限热爱、无限崇拜、无限敬仰、无限忠于世界革命人民的伟大领袖毛主席，无限热爱自己的祖国和人民。他们纷纷起来造帝国主义、现代修正主义和一切反动派的反。"},{"type":"paragraph","text":"电台说，泰国革命青年同各国革命青年一样，坚决以中国革命的红卫兵为榜样，学习中国红卫兵的革命造反精神，起来反对美帝和他侬—巴博卖国集团。美泰反动派对此已感到十分恐惧，它们正在加紧镇压泰国革命青年。但是泰国青年的革命行动是任何力量不能阻挡的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb059fa0a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
