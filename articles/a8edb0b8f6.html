" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"给张治中的信","alias":"","parts":[{"type":"paragraph","text":"给张治中的信"},{"type":"paragraph","text":"（1949年9月21日）文伯（白》先生："},{"type":"paragraph","text":"迪化方面复先生两电，今付上。前次先生致陶崎岳电，我在电尾加了几句话，要陶与中共联络员邓力群妥为接洽。邓力群（邓飞黄之弟）已由伊宁于十五日至迪化与陶鲍?见了面，谈得还"},{"type":"paragraph","text":"[1]张治中（1890—1969），字文白，安徽巢县人。从1946年3月起任国民党政府西北行营主任兼新疆省主席。1949年春任国民党政府和平谈判代表团首席代表，参加国共和谈。国民党政府拒绝在国内和平协定上签学后，他被挽留在北平。建国后，曾任全国人大常委会副委员长、国防委员会副主席。"},{"type":"paragraph","text":"[2]陶崎岳（1892—1988），湖南宁乡人。当时任国民党新疆警备总司令部总司令。1949年9月25日率部起义。"},{"type":"paragraph","text":"[3]邓力群，1915年生，湖南桂东人。当时是中共中央派驻新疆的联络员。"},{"type":"paragraph","text":"[4]邓飞黄（1895—1953），湖南桂东人。曾任国民党中央执行委员，河南、云南省党部主任委员。1949年8月在湖南参加起义，后任中南军政委员会参事室参事。"},{"type":"paragraph","text":"[5]陶，指陶峙岳。鲍，指鲍尔汉（1894—1989），新疆维吾尔自治区温宿县人；1946年任新疆三区革命联合政府副主席，1949年参加和平解放新疆的工作；新中国成立后，曾任新疆省人民政府主席，是第二、第三、第五、第六届政协全国委员会副主席。毛泽东全集第二十七卷好。关于周黄两军\"，自向甘凉肃退后，现至何地不明。已电彭德怀同志注意与该两军联络，不采歼灭方针而取改编方针，未知能如所期否？要紧的，除由迪化派代表去兰州谈判外，周、黄自己应迅速主动派代表去前线认真谈判，表示诚意。因我军已由兰州青海分两路向张掖疾进；而周、黄自天水西撤后，沿途派人谈判均未表示诚意，一面谈，一面跑（大概是惧歼，图至河西集中保全），使我前线将领有些不耐烦。（兄给周嘉彬信已送达周部，但未知周本人看到否？）现在先生如有电给周，可由邓力群交陶峙岳转去。"},{"type":"paragraph","text":"敬问日安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿一日"},{"type":"paragraph","text":"[1]指周嘉彬任军长的国民党军第一二O军和黄祖熏任军长的国民党军第九十一军。"},{"type":"paragraph","text":"[2]指当时甘肃省的甘州、凉州和肃州，即今张掖、武威和酒泉。"},{"type":"paragraph","text":"[3]彭德怀，当时任中国人民解放军副总司令、第一野战军司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":295,"page_end":296},"tags":[{"name":"毛泽东","type":"人物"},{"name":"邓力群","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8edb0b8f6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
