、四川省劳动局关于制止农村人口继续外流的报告","authors":[],"dates":[{"year":1960,"month":11}],"is_range_date":false,"parts":[{"text":"四川省民政厅、四川省公安厅、四川省粮食厅、四川省劳动局关于制止农村人口继续外流的报告","type":"title"},{"text":"四川省人民委员会：","type":"appellation"},{"text":"自一九六零年九月三十日省人民委员会以（60）川办密字第0481号批转省民政厅孙传学副厅长“关于清理自流入城镇人员工作意见的报告”的通知后，各地在省委和各级党委领导下，进一步地加强了这一工作，并取得了很大的成绩。除今年一月至九月底收容的144,927人，已遣返142,989人回到农村外，据重庆、广元、宝鸡等十二个地区的不完全统计，10月1日至31日共接收自流人员14,418人，共遣返12,318人回到农村，有力地加强了农业生产第一线。此外，现还有4,000人尚待很快遣返。目前农村人口外流现象虽有减少，但仍未制止。重庆市平均每天要接收自流人员165人以上；广元县收容所10月1日至20日共接收自流人员1,347人，平均每天要收60多人，有时一天收100人左右。从广元收容的1,347人来看，企图外流到西北地区找工作的占50%，外流广元、旺苍等地找工作的占32%，外流到其他地区为18%，（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de157429b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
