ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"中央转发中国作协关于对暗藏反革命分子进行斗争的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发中国作协关于对暗藏反革命分子进行斗争的报告的批语"},{"type":"paragraph","text":"（1955年8月10日）上海局、各省市委、自治区党委、军委各部门、中央国家机关各党组："},{"type":"paragraph","text":"此件很好，发给你们参考，并可转发各单位仿行。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九五五年八月十日"},{"type":"paragraph","text":"[1]指中国作家协会1955年7月14日关于对“胡风反革命集团”及其他暗藏的反革命分子进行斗争的报告。报告说，随着关于“胡风反革命集团”的三批材料的公布，作协对“胡风反革命集团”及其他一切暗藏的反革命分子的斗争，大体分为三阶段：从5月13日第一批材料公布到5月29日为第一阶段，主要是反复阅读、座谈两批材料，批判右倾思想。从5月30日召开第一次动员大会开始为第二阶段，主要是展开尖锐的揭发批判和思想交锋，并作了初步排队。6月10日第三批材料公布后，立即召开第二次动员大会，把运动引到普遍暴露问题的第三阶段。中央转发中国作协关于对暗藏反革命分子进行斗争的报告的批语"},{"type":"paragraph","text":"二刘、陈、邓、陆定一阅，尚昆用电报发去，另印发。"},{"type":"paragraph","text":"[1]刘，指刘少奇。陈，指陈云，当时任中共中央书记处书记、国务院副总理。邓，指邓小平，当时任中共中央秘书长、国务院副总理。陆定一，当时任中共中央宣传部部长、中央十人小组组长。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央副秘书长、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":8,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":283,"page_end":284},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发中国作协关于对暗藏反革命分子进行斗争的报告的批语","authors":["毛泽东"],"dates":[{"year":1955,"month":8,"day":10}],"is_range_date":false,"parts":[{"text":"中央转发中国作协关于对暗藏反革命分子进行斗争的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"上海局、各省市委、自治区党委、军委各部门、中央国家机关各党组：","type":"appellation"},{"text":"此件很好，发给你们参考，并可转发各单位仿行。","type":"paragraph"},{"text":" 中央一九五五年八月十日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"726e121658"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":fal
