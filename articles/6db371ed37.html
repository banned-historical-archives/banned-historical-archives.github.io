"year":1976,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持走与工农相结合的道路"},{"type":"paragraph","text":"贵州省交通科研所汽车研究组　马超华"},{"type":"paragraph","text":"我是从学校毕业出来就进科研机关的年轻技术员。文化大革命前，由于修正主义路线的影响，工作严重脱离实际。一次，为了验证几项汽车的“节油措施”，我们几个人在屋子里讨论一番就编定了试验方案，从基层单位调来了试验汽车和技术较好的驾驶员。为了避免所谓“主观因素”对试验的影响，我们根本不让驾驶员知道他在试验什么和预期达到什么目的。几个月时间过去了，数据记录了上千个，结果却没有节下一点油。"},{"type":"paragraph","text":"无产阶级文化大革命中，通过学习毛主席的一系列指示，批判修正主义路线，我认识到“为什么人的问题，是一个根本的问题，原则的问题”，一定要在深入工农兵、深入实际斗争的过程中，在学习马克思主义和学习社会的过程中，把立足点移到工农兵这方面来，移到无产阶级这方面来。一九六八年我和组内其他同志走出办公室，到生产第一线去，老老实实地接受工人阶级的再教育，认真改造世界观，从工人群众丰富的实践中吸取营养，工作才取得了一些成绩。"},{"type":"paragraph","text":"一九七三年以前，我省不能生产汽车发动机中的气门，一直依靠外省支援。如果供应不及时，汽车的生产和修配就要受影响。是“等、靠、要”，还是“干、闯、造”？工人同志们说：越等心越散，越靠人越懒，越要志越短。不管有多大的困难，我们也要创造条件把气门生产搞上去！在工人同志革命精神的影响下，我和工人师傅们一道拟出了气门半自动流水生产线的方案。经过半年的艰苦奋战，攻克了第一道难关——气门电热顶锻机，后来又和工人同志们一道，把气门流水生产线建成投产，从此结束了我省不能成批生产内燃机气门的历史。"},{"type":"paragraph","text":"回顾我毕业后的十多年，特别是文化大革命前后的变化，我深刻体会到毛主席指出的走与工农群众相结合的道路，是科技人员的光明大道。邓小平授意炮制的《汇报提纲》反对知识分子同工农相结合，胡说什么“搞科研的允许是书呆子”，妄图把我们引上白专道路，跟着他复辟、倒退。我们决不上他的当。我一定认真学习马列著作和毛主席著作，努力改造世界观，使自己真正成为工人阶级的知识分子。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6db371ed37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
