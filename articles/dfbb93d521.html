ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"给周世钊的信","alias":"","parts":[{"type":"paragraph","text":"给周世钊的信"},{"type":"paragraph","text":"（1949年10月15日）敦元学长兄："},{"type":"paragraph","text":"选接电示，又得九月二十八日长书，勤勤恳恳，如见故人。延安曾接大示，寄重庆的信则未收到。兄过去虽未参加革命斗争，教书就是有益于人民的。城南学社诸友来电亦已收到，请兄转告他们，感谢他们的好意。兄为一师校长，深庆得人，可见骏骨未凋，尚有生气。倘有可能，尊著旧诗尚祈抄寄若干，多多益善。"},{"type":"paragraph","text":"除台湾、西藏外，全国各地大约几个月内即可完成军事占领。但大难甫平，民生憔悴，须有数年时间，方能恢复人民经济，完成土地制度的改革及提高人民政治觉悟水平，这些任务均有待于文教工作的协助。"},{"type":"paragraph","text":"陈泽同先生的意见书已收阅，当交此间工业机关研究，请兄为我代致谢意。他的工作问题请告他直接向湖南当局要求解决，不要等候我的答复。谨此奉复。"},{"type":"paragraph","text":"敬颂教祺"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四九年十月十五日[1]周世钊，当时任湖南省立第一师范学校校长。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":425,"page_end":425},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfbb93d521"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
