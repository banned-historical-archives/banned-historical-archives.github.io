script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海电子管厂通过狠批修正主义建党路线改善党群关系革命党员革命群众共挑革命生产重担全厂各项工作呈现一派大好革命形势，现已提前二十九天超额完成了今年全年的生产任务","authors":[],"dates":[{"year":1967,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海电子管厂的革命共产党员、无产阶级革命派和革命群众，连日来，轰轰烈烈地大学大用毛主席的建党学说，大揭大批中国赫鲁晓夫的修正主义建党路线。新近举办的学习班正围绕着“党员同群众间的隔膜是怎么造成的?”等问题展开讨论，进一步肃清修正主义建党路线的流毒，大大改善了党群关系。目前，这个厂革命的大批判热火朝天，生产蒸蒸日上，到十二月二日为止，提前二十九天超额完成一九六七年全年生产任务。"},{"type":"paragraph","text":"这个厂的革委会用主要力量抓好大学习、大批判。他们组织了二百多名共产党员、革命派战士和革命群众，以三结合的形式，举办了以学习毛主席建党学说为中心的毛泽东思想学习班。在群众中，参加学习班与没有参加学习班的互相结合起来，全厂形成了一个广泛的群众性的大学习、大批判运动。"},{"type":"paragraph","text":"在揭发批判中，他们逐渐认识到中国赫鲁晓夫的修正主义建党路线在本厂的流毒很深。他们首先对做一个什么样的共产党员等问题展开讨论。有的工人提出，厂里的有些党员生产过得硬，但突出政治不够，因此在这次运动中站错了队。为什么会这样?党员同志以切身的感受进行了揭发控诉，使大家认识到它的毒根就是中国赫鲁晓夫推行的修正主义建党路线。三车间有一个党员，近几年来开会不大发言，只顾埋头搞生产，群众对她的反映是:“她别的作用不大，生产倒是过得硬的。”这次学习中，这位党员终于发言了，她说；“我过去一直是‘一好带四好’，把生产放在第一位，生产搞好了，厂里把我送去休养，在休养所里讲的是吃得好，白相得好，很少讲学习毛主席著作，临走时又叮嘱我们‘埋头搞生产，今后评五好没有问题’。结果我中了中国赫鲁晓夫的毒还不知道，现在想想，如果只知道生产，不晓得政治，就不配做一个毛主席的共产党员。”"},{"type":"paragraph","text":"中国赫鲁晓夫的修正主义建党路线，不但使党员中了毒，而且不少群众也受到影响。过去，很多工人错误地认为具备了“生产好，听话”两个条件就可以入党。一位非党员干部谈到他过去一直想靠拢党组织，组织上说他脾气不好，“修养”不好。从此，他就去学中国赫鲁晓夫的黑《修养》，逐渐成了“驯服工具”。他说:“如果这样‘修养’下去，中国赫鲁晓夫复辟了资本主义，我们还不晓得哩!这是多么危险啊!”"},{"type":"paragraph","text":"中国赫鲁晓夫修正主义建党路线在这个厂流毒最深的第二个方面，是党员和群众之间的关系逐渐疏远起来。大家谈到，不少党员在入党前和群众的关系很好，但是，入党后却变了，究其原因，就是入了党后，产生了优越感，自以为“高人一等”。中国赫鲁晓夫搞的脱离群众的一套，使很多党员受了毒害。这次，厂里的革命共产党员和革命群众通过批判中国赫鲁晓夫的修正主义建党路线、肃清它在本厂的流毒，大大改善了党群关系。"},{"type":"paragraph","text":"这个厂狠抓了大学毛主席的建党学说，大批修正主义建党路线，有力地促进了人的思想革命化，进一步推动了革命、生产等其他各项工作。原来有一部分站错队的同志，有思想包袱，工作不带劲。在这次大学习、大批判中，他们斗了私心，不愿再当逍遥派了。有一个共产党员，过去对革命派有抵触情绪，一直不愿参加造反队，通过学习，这个党员解开了思想疙瘩，主动要求参加造反队。现在全厂百分之九十五以上的共产党员参加了造反队。在生产上，大家主动抢挑重担，出现了相互协作、相互帮助的新气象，全厂呈现了一派大好的革命形势。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7958af3f26"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
