<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1977,"month":9,"day":3}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”搞的是“帮花独放”","authors":["三四一一八部队理论组"],"parts":[{"type":"paragraph","text":"长期以来，“四人帮”独霸文坛，疯狂反对毛主席的革命文艺路线，挥舞文化专制主义的大棒，打杀无产阶级的文学艺术。他们的一句话，可以判处一个剧种、一个作品的死刑。社会主义文艺园地被他们摧残得七零八落。戏剧、电影少了，诗歌、散文、小说少了，连毛主席制定的“百花齐放、百家争鸣”的方针也不许提了，文艺界一片“万马齐喑”的冷清局面。广大工农兵看在眼里，恨在心里，指责他们搞的是“一花独放”（其实是“帮花独放”）。"},{"type":"paragraph","text":"伟大领袖毛主席洞察一切。一九七二年，毛主席就指出戏剧太少了，只有几个京剧，话剧也没有，歌剧也没有。这是毛主席对当时文艺界状况的严厉批评。一九七三年，敬爱的周总理也指出，从工农兵的需要看，革命的文艺作品（包括电影）还是太少了；七年来，这方面很薄弱。毛主席和周总理对“四人帮”的申斥，说出了广大工农兵的心里话。"},{"type":"paragraph","text":"叛徒江青，公然反对毛主席的指示，竟拖着流氓腔调狡辩说：“不是七年，是二十几年，成绩很少，放毒很多！”一九七四年初，“四人帮”更开始了疯狂的反扑。他们授意“江天”、“梁效”之流，挥动刀笔，杀气腾腾地叫嚣：“最近又有一种论调，就是攻击我们作品少。这是阶级敌人放出来的阴风。居然把罪恶的矛头指向毛主席和周总理。接着，“四人帮”操纵报刊舆论进行“多与少”的诡辩，厚着脸皮硬吹他们统治下的文坛是什么“百花吐艳”，“莺歌燕舞”。为此，他们整版整版地刊登掺了假货的影剧广告，虚张声势。他们变本加厉地攻击斥责他们“一花独放”的正义呼声。什么“复辟”呵，“翻案风”呵，一连串大帽子向坚持毛主席革命路线的领导同志扣过来，好不吓人！"},{"type":"paragraph","text":"然而，事实如山，历史无情。“四人帮”为了把文艺阵地变成颠覆无产阶级专政、复辟资本主义的桥头堡，搞的就是“帮花独放”，这个案是翻不了的！他们搞的“帮花独放”的文化专制主义，已经被批得臭不可闻。打倒“四人帮”，文艺得解放。看今朝，在英明领袖华主席抓纲治国战略决策的鼓舞下，广大革命文艺工作者意气风发，斗志昂扬，正沿着毛主席的无产阶级文艺路线胜利前进。社会主义文艺“百花齐放”的春天，真正来临了！"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"203e4f0c3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
