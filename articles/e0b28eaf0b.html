ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"《词六首》序一","alias":"","parts":[{"type":"paragraph","text":"《词六首》序一川"},{"type":"paragraph","text":"（1962年4月）"},{"type":"paragraph","text":"这六首词，年深日久，通忘记了。《人民文学》编辑部搜集起来，要求发表，因以付之。回忆了一下，这些词是在一九二九至一九三一年在马背上哼成的。文采不佳，却反映了那个时期人民群众和革命战士们的心情舒快状态，作为史料，是可以的。"},{"type":"paragraph","text":"[1]这是毛泽东为《词六首》在《人民文学》1962年五月号发表所写的序，后未发，改刊了另一则较短的序。"},{"type":"paragraph","text":"[2]1962年1月15日《人民文学》编辑部写信给毛泽东，信中说：“最近我们辗转搜寻，找到了您的几首诗词。正因为是辗转搜寻到的，所以不知是否有化误，也不知您是否愿意将其发表，或者是不是还需要修改，因此抄寄一份给您，请您指示，并请注上题目和写作年月。”"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":121,"page_end":121},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0b28eaf0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
