进行肃清反革命分子的宣传应注意事项的通知","authors":["刘少奇"],"dates":[{"year":1955,"month":8,"day":23}],"is_range_date":false,"parts":[{"text":"中央转发中宣部和公安部关于在报刊上进行肃清反革命分子的宣传应注意事项的通知","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"（本篇用 [ ] 排印的是刘少奇加写的文字。）","type":"subtitle"},{"text":"上海局、各省、市委、自治区党委，并转各报、新华社、广播台：","type":"appellation"},{"text":"[兹将中央宣传部和中央公安部] “关于在报纸刊物上进行肃清反革命分子的宣传应注意的事项”[发给你们，望即遵照执行。]","type":"paragraph"},{"text":" 中   央一九五五年八月廿三日","type":"paragraph"},{"text":"根据刘少奇修改件刊印","type":"paragraph"},{"text":"注释","type":"appellation"},{"text":"[1]该通知稿的主要内容是：(一)各地报纸在今后一个时期内必须把肃清反革命分子的斗争的宣传作为最重要的工作之一，有选择、有重点地报道反革命分子在各方面进行破坏活动的重要案件，并发表解释性的文章和指导性的评论。各种定期刊物也应按照自己的特点发表有关的文章，其中政治性的刊物并应以较多的篇幅来进行宣传。(二)宣传内容应以《人民日报》有关肃清反革命分子问题的社论以及公安部部长罗瑞卿在全国人民代表大会上的发言为依据，着重在下列几方面进行宣传：第一，集中地生动地报道各种重要的反革命案件，报道反革命分子在各方面进行活动的事实和他们的罪恶活动所造成的损害；第二，报道人民群众革命警惕性的提高和他们同反革命分子作斗争的热情和事迹；第三，详细地反复地阐明党和政府镇压反革命分子的方针和政策，经过慎重选择，宣传隐瞒从严，坦白从宽，立功折罪，立大功受奖的实际事例；第四，阐明在我国过渡时期阶级斗争尖锐化，反革命分子必然加紧破坏活动。同反革命斗争，人人有责。对胡风分子的罪行可继续揭露，但应选择较重要的而且证据确凿的反革命活动事实。对胡风分子的反革命著作应该从政治、思想角度上继续进行批判。这种批判应该是有研究的、有分析的；防止简单化的、没有分析而只下断语的倾向。(三)在报刊上进行镇反宣传时应注意，凡有重要教育意义的案情基本弄清后即可发表，罪证必须经过再三查对核实，带群众性的暴动案件一般不宜公布；对各种反革命言论不要乱加引用，公布反革命案件，必须事先获得公安部门的同意。凡规定须中央批准才能逮捕的反革命案件，必须经中央审查批准后才能予以公布。(四)各报刊均应订出这方面的宣传计划，并注意总结经验，各级公安部门对报刊的宣传工作应加以协助，各级党委宣传部应督促和推动这方面工作的进行。胡风，见《对中央和中宣部关于开展批判胡风思想三个文件稿的修改》(一九五五年一月下旬)注释[1]。","type":"paragraph"}],"comments":[],"origin":"中共中央文献研究室编《建国以来刘少奇文稿第七册(一九五五年一月——一九五五年十二月)》(中央档案馆，2005年)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7e3847024"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
