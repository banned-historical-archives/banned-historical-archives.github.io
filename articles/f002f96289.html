":[],"dates":[{"year":1974,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"挪威《阶级斗争》报发表文章揭露"},{"type":"paragraph","text":"苏修通过“经互会”剥削东欧国家"},{"type":"paragraph","text":"据新华社斯德哥尔摩一九七四年四月八日电　奥斯陆消息：挪威工人共产党（马列）机关报《阶级斗争》最近发表一篇文章，揭露苏联社会帝国主义通过“经互会”对东欧国家进行经济盘剥。"},{"type":"paragraph","text":"文章说：“‘经互会’实际上已经变成了苏联在经济上束缚东欧的工具。苏联把不合理的贸易条件强加给其他成员国。苏联试图操纵‘经互会’国家的工业生产，以便把盈利最大和技术最发达的工业设在苏联本土。”"},{"type":"paragraph","text":"文章揭露说：“单凭不合理的贸易条件这一条，便可以使人们把‘经互会’成员国同苏联的关系与殖民地同帝国主义宗主国的关系相比拟。”文章说，苏联所谓的“社会主义分工”实际上是要“经互会”其他成员国家集中发展那些不需要多少技术的部门。“社会主义分工”的结果是这些国家的经济发展遭到破坏，而使它们增加对苏联经济的依赖。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f002f96289"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
