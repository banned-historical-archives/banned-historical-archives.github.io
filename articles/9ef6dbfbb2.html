art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"战斗的非洲歌颂毛泽东","authors":[],"parts":[{"type":"paragraph","text":"“您的著作啊，就是无穷的力量，"},{"type":"paragraph","text":"您的思想啊，是永远不落的太阳，"},{"type":"paragraph","text":"它照亮了辽阔的中国，"},{"type":"paragraph","text":"也把全世界战斗的人民心儿照亮。"},{"type":"paragraph","text":"啊，毛泽东，我把您歌唱，我把您歌唱。"},{"type":"paragraph","text":"您的著作啊，就是无穷的力量，"},{"type":"paragraph","text":"您的思想啊，是永远不落的太阳！"},{"type":"paragraph","text":"如果我去非洲，我将把这歌声献给黑人兄弟；"},{"type":"paragraph","text":"如果我去欧美，我要对白人兄弟歌唱。"},{"type":"paragraph","text":"啊，不管走到哪里，奔向何方，"},{"type":"paragraph","text":"我都要把这真理的声音传播，"},{"type":"paragraph","text":"这真理，就是争取自由的战斗号角；"},{"type":"paragraph","text":"这真理，就是普照宇宙的光辉思想！"},{"type":"paragraph","text":"您的光辉啊，我永远唱不尽，"},{"type":"paragraph","text":"但我要永远把您歌唱！"},{"type":"paragraph","text":"永远把您歌唱！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ef6dbfbb2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
