art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伟大毛泽东思想武装的中国人民不可侮","authors":[],"parts":[{"type":"paragraph","text":"综合新华社讯 阿尔巴尼亚报纸和越南报纸十八日分别发表评论，强烈谴责美帝国主义战斗机九日侵犯中国领空，疯狂扫射中国公民的严重的战争挑衅行为。"},{"type":"paragraph","text":"阿尔巴尼亚《团结报》评论指出，美帝国主义对伟大的七亿中国人民的战争挑衅完全是预谋的，是美帝国主义企图在东南亚扩大战争的总计划的组成部分。评论指出，美帝国主义以为对中国进行战争挑衅，就会吓倒东南亚各国人民，就会使中国放弃坚决支持越南人民和东南亚各国人民的政策，这完全是打错了算盘。不管是中国人民，还是东南亚各国人民都绝不会被美国强盗的威胁所吓倒。"},{"type":"paragraph","text":"越南《人民报》评论指出，“美帝国主义采取这一反对七亿中国人民的新战争行动，是它在对中华人民共和国进行挑衅的道路上又踏出了严重的一步。”评论说，“美帝国主义疯狂地反对中国，是因为中国坚决反对以美国为首的帝国主义和坚决支援越南人民的抗美救国斗争。”评论说，“我们彻底支持中国政府和人民在中国国防部发言人一九六六年九月十六日声明中严厉警告美帝国主义的立场。我国人民同兄弟的中国人民并肩进行反对共同敌人的斗争，一定要把侵略成性和好战的美帝国主义埋葬掉。”"},{"type":"paragraph","text":"越南《新越华报》十八日也发表评论强调指出，“用伟大的毛泽东思想武装起来的七亿中国人民是不可侮的。美国如果不停止对中国人民的战争挑衅，比越南战场上更大的、更惨重的失败正在等待它们。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3e412fa94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
