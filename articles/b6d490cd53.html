art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"印度尼西亚共产党中央举行盛大招待会艾地说，共产党人必须保持自己的革命性，不能当修正主义者和教条主义者","authors":[],"parts":[{"type":"paragraph","text":"出席招待会的有印度尼西亚共产党中央委员会主席艾地，第一副主席鲁克曼，第二副主席约多，书记处总书记苏蒂斯曼和其他领导人。"},{"type":"paragraph","text":"印度尼西亚政府第一副总理苏班德里约，第二副总理莱梅纳和第三副总理哈鲁尔·萨勒以及许多位部长出席了招待会。"},{"type":"paragraph","text":"应邀来这里参加印度尼西亚共产党成立四十五周年庆祝活动的由党中央政治局委员、中央书记处书记彭真率领的中国共产党代表团以及阿尔巴尼亚、朝鲜、越南、日本和其他兄弟党代表团也出席了招待会。彭真同志在招待会上致了祝词，受到了热烈的欢迎。"},{"type":"paragraph","text":"印度尼西亚共产党主席艾地在招待会上首先讲话。艾地在讲话中再次指出，印度尼西亚目前是处在革命的形势中，应当在一切方面展开革命的攻势。"},{"type":"paragraph","text":"他着重指出了实行自力更生原则的意义。他说：为了自力更生，就必需帮助农民摆脱封建剥削，解放农村的生产力，没收英美帝国主义在这个国家的一切资本，使之成为国有的财产。"},{"type":"paragraph","text":"艾地说：共产党人必须保持自己的革命性，不能当修正主义者和教条主义者。如果一个共产党犯了改良主义、修正主义或者其他的机会主义，它当然就会丧失革命性而褪色变质。印度尼西亚共产党要坚持马克思列宁主义，按照印度尼西亚的条件来运用它。"},{"type":"paragraph","text":"中国共产党代表团团长彭真讲了话。"},{"type":"paragraph","text":"彭真在讲话以后接受了儿童们献的花，并同向他表示感谢的艾地热情拥抱。"}],"alias":""},"tags":[{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6d490cd53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
