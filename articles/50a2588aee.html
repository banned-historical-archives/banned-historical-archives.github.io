],"dates":[{"year":1964,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　为了大力开展社会主义文学的普及工作，宣传毛主席的文艺思想，积极培养无产阶级的文学队伍，中国作家协会上海分会、上海工人文化宫、上海图书馆、上海青年宫、上海群众艺术馆五个单位联合举办文学讲座。讲座自三月份起按月举行。第一讲定于三月二十二日(星期日)上午八时半在福州路天蟾舞台举行，由作家以群主讲，题为《什么是文学和文学的作用》。凡爱好文学的社会青年，凭所属单位或地区介绍信，可向上海图书馆或上海青年宫索取听讲证。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50a2588aee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
