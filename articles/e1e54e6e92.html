"authors":["人民日报"],"dates":[{"year":1957,"month":7,"day":4}],"is_range_date":false,"parts":[{"text":"文汇报北京办事处揭露  浦熙修是心怀敌意的两面派","type":"title"},{"text":"人民日报","type":"authors"},{"text":"本报讯: 文汇报北京办事处昨日继续开会揭露右派分子浦熙修反社会主义、反人民的言行，以及她在章罗联盟中所起的作用。","type":"paragraph"},{"text":"浦熙修对党是怀着敌意的，她还挑拨党群关系，以削弱党的威信。梅朵说：浦熙修在同志们的面前诬蔑中宣部，她常说中宣部的教条主义最严重。有的从中宣部约来的稿子，她还没很好的看，就说这是教条主义的东西，枯燥乏味。","type":"paragraph"},{"text":"叶冈说：人民日报编辑部对本报提出批评后，浦熙修怎样看待这个事实呢？她说，徐铸成这次出国不应该当团长，没有谦让，因此使得党对文汇报不满。在她看来，党对人对事都是虚伪的。","type":"paragraph"},{"text":"杨重野说：浦熙修对党和对盟抱着两种截然不同的态度。她在民盟小组会上说，她非常爱民盟这个团体，认为给她很大教育和帮助；而她对党却不是这样，她自己要求入党，党组织要她写自传，她却向同志们宣称说，党组织一再拉她入党，而她自己是嫌写自传麻烦，“入党以后又多一套会议”。浦熙修就是这样耍两面手法。","type":"paragraph"},{"text":"会上同志们对于报载章伯钧的交代中提到浦熙修曾把一些业务活动汇报给章伯钧了，大家非常愤怒，要浦熙修交代出她是否把记者采访到的一些内部情况也汇报给章罗联盟了。","type":"paragraph"},{"text":"大家非常愤怒地指斥浦熙修一直到今天还不肯把她参与章罗联盟的阴谋活动交代出来，只拿出罗给她的几封信来搪塞，她总说想不起来，再就是要别人帮她想，提提线索，想蒙混过关。","type":"paragraph"},{"text":"吕德润揭露，浦熙修曾经说过，罗隆基在政协会议上关于知识分子的发言，她见他写过四五次，她还提出过修改意见，这一点就可以说明他们之间的关系。","type":"paragraph"},{"text":"谢蔚明揭露，大约１９５１年，有一次罗曾约张东荪等在浦的房间内关门秘谈，可证浦是参与罗隆基小集团的政治活动的，但她却一直抗拒不肯交代。","type":"paragraph"},{"text":"同志们谈到右派分子利用文汇报作为反党、反人民、反社会主义的工具，而我们实际上陷在右派的网罗中，今天回过头来看，万分痛心，因此大家对右派分子更感到无比的痛恨。","type":"paragraph"},{"text":" ——原载《人民日报》1957年7月5日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1e54e6e92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
