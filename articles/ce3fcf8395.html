:["张儒杰","武汉测量制图学院","董金渊","高时浏"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“现在的党群关系是铜墙铁壁”","type":"title"},{"text":"武汉测量制图学院张儒杰高时浏董金渊","type":"authors"},{"text":"“党群关系问题，主要是宗派主义问题。”（武汉测量制图学院  张儒杰）","type":"paragraph"},{"text":"“党团员是以‘教育者身份干涉群众’，有监视群众的行为。党有用人唯党的宗派主义作风。","type":"paragraph"},{"text":"建国八年来，基层的党组织和党员就已经骄傲自满，以征服者或功臣自居，另外有少数趋炎附势的投机者，伪装进步，窃取党的信任，蒙上欺下，造成了党与群众间的严重矛盾。","type":"paragraph"},{"text":"吸收入党的问题，以前是很严的，现在有这样的趋势：有些唯唯诺诺的人吸收进去了……我们学生当中的党员也很成问题。","type":"paragraph"},{"text":"现在的党群关系是铜墙铁壁。”（武汉测量制图学院　高时浏）","type":"paragraph"},{"text":"“非党干部不起决定作用，样样都由党来决定，因此，就象马车的第五个轮子，可有可无，不发挥作用。……因此干脆依赖等待，等党安排好，再下去吃现成饭。”（武汉测量制图学院  董金渊）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce3fcf8395"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
