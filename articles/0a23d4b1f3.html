art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无产阶级文化大革命的成果","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 中国共产党中央委员会收到了希腊政治流亡者马克思列宁主义组织的一封贺信。贺信热烈祝贺中国第一颗人造卫星发射成功。贺信全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"亲爱的同志们"},{"type":"paragraph","text":"我们怀着难以言喻的高兴心情，获悉了你们国家发射第一颗人造地球卫星的消息。这个事件是毛泽东思想的伟大胜利，是无产阶级文化大革命的成果，同时也表明了你们的空间科学、技术和你们伟大国家防御力量的巨大发展。你们的伟大国家是无产阶级革命和反帝的坚不可摧的堡垒。"},{"type":"paragraph","text":"这一杰出事件使帝国主义和现代修正主义在推行他们进攻任何国家的阴谋方面感到失望和气馁，同时却增强了争取独立和社会解放的世界革命人民的信心，鼓舞和激励着他们去争取新的胜利，去彻底粉碎各国人民的敌人——帝国主义和现代修正主义。"},{"type":"paragraph","text":"我们代表希腊马克思列宁主义政治流亡者和希腊人民热烈地祝贺你们，并祝你们在空间科学，技术方面取得新的成就。"},{"type":"paragraph","text":"希腊政治流亡者马克思列宁主义组织达尼利迪斯·帕里道洛斯（签字）"},{"type":"paragraph","text":"一九七○年四月二十七日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a23d4b1f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
