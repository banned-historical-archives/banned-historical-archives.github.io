script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我驻阿大使为我国三个代表团结束访问举行酒会　中阿人民坚决反帝反修正主义","authors":[],"dates":[{"year":1962,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻阿大使为我国三个代表团结束访问举行酒会"},{"type":"paragraph","text":"中阿人民坚决反帝反修正主义"},{"type":"paragraph","text":"新华社地拉那14日电　中国驻阿尔巴尼亚大使罗士高13日晚在地拉那为中国对外文化联络委员会副主任曹瑛、由轻工业部副部长罗叔章率领的中国科学技术代表团和由广东省文联副主席戴碧湘率领的中国广东杂技团结束对阿尔巴尼亚的友好访问举行了酒会。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央政治局委员、部长会议第一副主席科列加，劳动党中央政治局委员、部长会议第一副主席兼教育和文化部长穆夫蒂乌，部长会议副主席、阿中友好协会主席凯莱齐，外交部长什图拉，贸易部长恩杰拉和地拉那的文化、艺术、新闻界人士等应邀出席了酒会。"},{"type":"paragraph","text":"罗士高大使和科列加分别在酒会上讲了话。"},{"type":"paragraph","text":"罗士高大使在讲话中衷心地感谢阿尔巴尼亚劳动党和政府对中国三个代表团的热情接待。罗士高说，中阿文化合作协定1963—1964年执行计划、中阿科学技术合作计划议定书最近在地拉那的签订和中国广东杂技团在阿尔巴尼亚的演出，象征着中阿两国关系的进一步发展和两国人民友谊的进一步加强。"},{"type":"paragraph","text":"罗士高赞颂了阿尔巴尼亚人民在阿尔巴尼亚劳动党及其领袖霍查的领导下，在建设社会主义和反帝、反现代修正主义的斗争中所取得的成就。他说，阿尔巴尼亚人民是中国人民最忠实的朋友，最亲密的同志。我们两国人民休戚相关，甘苦与共。我们为了共同的目标，反对共同的敌人，进行共同的斗争。我们两国关系已获得了全面的发展，今后还必将不断发展。"},{"type":"paragraph","text":"科列加在讲话中表示中国三个代表团在阿尔巴尼亚的访问，加强了阿中两国人民和两国党的伟大友谊，增进了我们相互的了解，并把我们的心紧紧地连在一起。"},{"type":"paragraph","text":"科列加高度评价中国人民在中国共产党及其领袖毛泽东的领导下，在坚决反对帝国主义、反对现代修正主义和建设社会主义方面所取得的成就。他说，我们为中国人民的胜利感到欢欣鼓舞，这是我们共同的胜利，它鼓舞着我们前进。"},{"type":"paragraph","text":"科列加在谈到中阿两国人民之间的友谊时说，我们要像保护眼睛一样来保护这一友谊。"},{"type":"paragraph","text":"他们的讲话都一再为热情的鼓掌声所打断。席间，宾主频频起立祝酒，为两国人民万古长青的友谊，为两个马克思列宁主义的政党——中国共产党和阿尔巴尼亚劳动党，为两国人民的领袖毛泽东、霍查的健康一再干杯。"},{"type":"paragraph","text":"整个酒会都洋溢着欢乐、友好的气氛。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fce50dffe"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
