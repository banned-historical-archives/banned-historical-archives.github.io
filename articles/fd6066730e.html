script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对替资产阶级罪行作辩护的美术作品","authors":[],"dates":[{"year":1952,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在反贪污、反浪费、反官僚主义的运动中，各地报纸刊登了许多连环画和漫画。其中有许名书，表扬了在反贪污战线上的英雄人物，揭露了不法资本家的许多罪恶勾当，起了一定的教育作用；但是，也有些画是歪曲现实的，是错误的。例如二月二十三日上海新民报晚刊刊登的“百丑图”，原是描写奸商承制志愿军食品蛋粉时偷工减料的图画，但是这幅图画不仅没有揭露不法资本家偷工减料的罪恶活动，反而荒谬地画着几个工人在干偷工减料的勾当，不法资本家只是在后面偷漏税款。这是一张诬蔑工人阶级的图画，这是一张企图把资产阶级的滔天罪行转嫁到工人阶级身上去的图画，上海新民报晚刊竟刊登了这样反动的图画，是不能令人容忍的。另外，读者刘朴、韩胜凯曾给本报来信，批评二月二日山西太原日报刊登的连环画“我的‘心病’去掉了”(郭晓作)。这套画没有暴露资产阶级盗窃国家资财、腐蚀干部、向祖国向人民进行猖狂进攻的罪恶行为，画中的奸商是“被迫”向干部行贿，“被迫”和贪污分子订立“攻守同盟”，当这个奸商动摇在坦白和不坦白之间的时候，又被贪污分子拖住后腿不让坦白，最后奸商终于下了自动坦白的决心。在这套画中看不到人民以猛烈的战斗打退资产阶级进攻的情景，看不到政府的政策，也看不到奸商在群众面前的战慄丑态。读者认为这是丧失立场为资产阶级猖狂进攻作辩护的一套画，这个批评是正确的。"},{"type":"paragraph","text":"我们不能容许资产阶级的代言人利用美术向人民散布毒素。各地报纸编辑部应该提高警惕，不要让那些为资产阶级辩护的图画侵据了人民报纸的篇幅。(原载人民日报)"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5236080201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我国青年文艺工作团团员在列宁格勒城国立博物馆参观中国文化艺术展览会\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5236080202.JPG\"\u003e"}],"comments":[],"origin":"人民日报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd6066730e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
