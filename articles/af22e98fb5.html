art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"廖初江丰福生黄祖示巡回报告广大官兵决心象他们那样为革命学好毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"本报讯 最近，廖初江、丰福生、黄祖示分赴南京、福州、济南、兰州等部队，介绍活学活用毛主席著作的经验，近二十万人听了他们的报告，受到了热烈的欢迎。 廖初江、丰福生、黄祖示对毛主席著作的深厚阶级感情，为革命而学的高度自觉性，活学活用的方法，长年如一日坚持学习的动人事迹和先进经验，给广大官兵、职工和家属以很大启发和教育。兰州部队师团干部集训班和西北红军战史编委会的一些中高级干部认为：廖初江、丰福生、黄祖示学习毛主席著作的先进事迹和经验，不仅是一般干部和战士的学习榜样，也是领导干部学习的榜样。各部队广大官兵纷纷以廖初江、丰福生、黄祖示为镜子，对照自己，找差距，订措施，决心象他们那样干一辈子革命，学一辈子毛主席著作。"},{"type":"paragraph","text":"在巡回报告期间，廖初江同“南京路上好八连”指导员王经文、南京部队学习毛主席著作积极分子徐加松、王小瑞等六十多人，先后举行过七次座谈会，交流了学习毛主席著作的心得体会；还同福建前线某部观察所执勤战士交流了学习心得，表示要向坚持学习毛主席著作的前线战士学习。丰福生在济南部队报告期间，参观了“红色管家人”司务长孙乐义的事迹展览会。他表示要虚心学习孙乐义活学活用毛主席著作的经验，学习他热爱同志、关心集体的先进思想。"},{"type":"paragraph","text":"在报告期间，各部队的首长和当地党政负责同志接见了他们，并进行了亲切的谈话。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af22e98fb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
