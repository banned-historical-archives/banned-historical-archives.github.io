<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"柴德賡1969年的检讨书","authors":[],"dates":[{"year":1969}],"is_range_date":false,"parts":[{"text":"柴德赓1969年的检讨书","type":"title"},{"text":"【1969年江苏师范学院将没有解放归队的“牛鬼蛇神、地富反坏右、走资派、反动学术权威”集中到尹山湖农场劳动。检查的原因是因为说了一句话。这句话，带来一场灾祸，有检查稿为证。","type":"appellation"},{"text":"在此，编辑要感谢现在能读懂《检讨书》内容的人，感谢能想象到那个时代知识分子的艰难。这些都可以写进历史的文献，居然今天还保留着。也要感谢专案组没有来得及销毁，“四人邦”就垮台了，倒得太快了。这是历史的安排。】","type":"paragraph"},{"text":"一、 五月七日去尹山“五七”干校听报告，去时自己觉得我过去有错误，有罪。今天能让我去听报告，给我这样高的政治待遇，现很感动，又很兴奋！后来不让我听了，当时自己心里是极难过的。陶妙英忍受不住哭了，我在劝她不要哭时说了一句“过去我在北京听过很多重要报告的。”现在看来，这句话是极其错误的，也是违反毛主席思想的。","type":"paragraph"},{"text":"（1）   主席教导我们“这次无产阶级·····是非常对的”，自己在历史上有问题，又是从属于资产阶级的知识分子，不让这样的人听报告，就是巩固无产阶级专政，这是很对的。自己对此有难过的情绪，那对毛主席这一教导就是领会不深。","type":"paragraph"},{"text":"（2）   文化大革命前的北京是彭真修正主义所把持的，现在讲这话，那就是对黑司令部的罪行认识不足，自己思想上不但没有清楚毒害，还流露出留恋的情结，这就是说明自己还没站到毛主席革命路线这一边来。再说我在北京是13年前的事了，那时自己是革命队伍中的一员，现在是革命的对象，不从发展看问题，就是违背主席思想的。","type":"paragraph"},{"text":"（3）   自己过去是在政治有优越感，这次碰了这个钉子，于是又觉得政治上没前途了，感到自卑了，这实际就是个人英雄主义的另一个表现。","type":"paragraph"},{"text":"二、     洪丽卿说我说了，我的问题没有洪丽卿的大，陶妙英又作了证明。我当时心里很难过，坐在那里等汽车时，三人都到说了一些话，我实在回忆不起，我说了这句话没有，如果是真的说了这句话，就是对自己过去的罪行没有足够的认识。这也说明自己的高傲思想还是没去掉，是不服气的思想作崇。","type":"paragraph"},{"text":"三、在九号的学习会上，谈到学习林副主席的报告，我说了不找些材料结合学习，学得干巴巴的。这样说法是极其错误的。自己对学习和学习方法有什么意见，就应本着爱护集体，把自己的看法向工宣队反映。自己不采取这种正确的方式，却发一通牢骚，这是不尊重工人师傅的领导。尤其恶劣的是对张林仙同志的态度，人家说话有出入就应该按毛主席的教导“有则改之，无则加勉”，为什么要发急呢。","type":"paragraph"}],"comments":[],"origin":"根据网络材料打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a990a43e3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
