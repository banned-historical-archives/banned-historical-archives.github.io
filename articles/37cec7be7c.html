art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"分别会见五个社会主义国家代表团","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 中共中央副主席、国务院总理周恩来，在三日和四日分别会见了以越南劳动党中央政治局委员、越南民主共和国政府总理范文同为首的越南民主共和国党政代表团，以罗马尼亚工人党中央政治局委员、罗马尼亚部长会议主席、国务委员会副主席扬·格·毛雷尔为首的罗马尼亚人民共和国党政代表团，以德意志民主共和国部长会议副主席兼外交部长洛塔·博尔茨为首的德意志民主共和国政府代表团，以蒙古人民共和国部长会议第一副主席索·鲁布桑为首的蒙古人民共和国政府代表团。会见时，宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"中共中央总书记、国务院副总理邓小平和中共中央书记处书记、国务院副总理兼中国人民解放军总参谋长罗瑞卿大将，三日会见了以阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚人民共和国部长会议第一副主席兼国防部长贝基尔·巴卢库上将为首的阿尔巴尼亚党政代表团。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，四日会见了越南劳动党中央政治局委员、越南民主共和国政府总理范文同。宾主进行了亲切友好的谈话。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37cec7be7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
