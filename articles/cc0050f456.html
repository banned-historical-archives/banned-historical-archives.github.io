authors":[],"dates":[{"year":1960,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社伊尔库次克8日电】　中国共产党中央委员会副主席、中华人民共和国主席刘少奇率领的中国党政代表团，在苏共中央主席团委员、苏联最高苏维埃主席团主席勃列日涅夫的陪同下，在返国途中，今天在当地时间22时乘专机到达伊尔库次克，进行参观访问，受到这个城市的负责同志和劳动人民的热烈欢迎。"},{"type":"paragraph","text":"同刘少奇主席一起到达伊尔库次克的有中国党政代表团团员李井泉、陆定一、杨尚昆、刘宁一和刘晓。"},{"type":"paragraph","text":"陪同刘少奇主席到达伊尔库次克的还有:苏联高等和中等专业教育部部长叶留金、外交部部务委员图加林诺夫、外交部礼宾司司长莫洛奇科夫、苏联驻中国大使契尔沃年科等人。"},{"type":"paragraph","text":"今天，伊尔库次克机场上悬挂着中苏两国国旗和大幅欢迎标语。机场灯火通明。前来机场欢迎的数千名群众打着中苏两国的国旗，他们唱着欢迎的歌曲。"},{"type":"paragraph","text":"在机场上欢迎刘主席和中国贵宾的有苏联共产党伊尔库次克州委员会第一书记谢季宁、伊尔库次克州苏维埃执行委员会主席格里琴科、苏共伊尔库次克市委员会第一书记谢舒科夫、伊尔库次克市苏维埃执行委员会主席托缅科。"},{"type":"paragraph","text":"刘少奇主席和勃列日涅夫主席下飞机后，同前来迎接的苏联同志亲切握手，并接受了献花。"},{"type":"paragraph","text":"刘少奇主席等在通过欢迎群众的行列时，机场上响起了“乌拉”、“欢迎亲爱的刘少奇同志”、“欢迎中国党政代表团”、“中苏友好万岁”的欢呼声和口号声。"},{"type":"paragraph","text":"从机场到代表团的住地都悬挂着中苏两国的国旗和用中、俄文书写的欢迎标语。伊尔库次克劳动人民沿途夹道热烈欢迎了刘少奇主席和中国党政代表团。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc0050f456"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
