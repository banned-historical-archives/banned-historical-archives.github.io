" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-2","name":"毛泽东全集第9卷(2)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"关于日本、南京情况及我们的建议致张学良电","alias":"","parts":[{"type":"paragraph","text":"关于日本、南京情况及我们的建议"},{"type":"paragraph","text":"致张学良电"},{"type":"paragraph","text":"（1936年12月14日）李宜兄："},{"type":"paragraph","text":"甲、情况：（一）日本三相会议，认文变为革命的，准备支持南京。（二）南京甚慌乱，恐事变扩大，急下免职令，军队交军委直辖。（三）何应钦到郑州，判断专为指挥进攻。（四）樊\"军向潼关，万师守咸阳。乙、建议："},{"type":"paragraph","text":"（一）闻冯钦哉师集中西安，冯不可靠，希注意，宜以孙师集中西安、潼关间。"},{"type":"paragraph","text":"（二）胡、毛、曾、关\"甚恐慌，日内尚无可为，主要注意樊、万。（三）东北军愈集结愈好，但兰州万不可失。（四）红军准备全力增援。"},{"type":"paragraph","text":"弟东来"},{"type":"paragraph","text":"寒子[1]指樊崧甫。[2]指万耀煌。[3]指胡宗南、毛炳文、曾万钟、关麟征。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":163,"page_end":163},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbb091f818"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
