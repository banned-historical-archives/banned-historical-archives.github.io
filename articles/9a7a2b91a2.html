rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东评点二十四史》线装本绝版开印等五则","authors":[],"parts":[{"type":"paragraph","text":"《毛泽东评点二十四史》线装本绝版开印"},{"type":"paragraph","text":"新中国规模最大的线装图书出版工程《毛泽东评点二十四史》线装本，面世以来受到国内外各界人士的高度评价和青睐，首批200套已陆续被读史、爱书者购藏。后300套的印制今天正式启动。这将是这部巨著的最后一次印制，完成后将在京公开举行毁版仪式。"},{"type":"paragraph","text":"朝鲜军方负责人会见我军外事代表团"},{"type":"paragraph","text":"朝鲜民主主义人民共和国国防委员会副委员长、人民武装力量相金一哲次帅8日下午在平壤会见了由中国国防部外事办公室主任罗斌少将率领的中国人民解放军外事代表团。会见时，罗斌转达了中央军委副主席张万年、迟浩田对金一哲的问候。金一哲回顾了6月份随朝鲜国家代表团访华时的情景，并请罗斌转达他对张万年、迟浩田副主席的问候。"},{"type":"paragraph","text":"全国青少年积极参加保护母亲河行动"},{"type":"paragraph","text":"全国31个省（区、市）团委负责人8日代表各地区的青少年及广大人民群众，将募集到的1140万元，捐给了全国保护母亲河行动。至此，这项以社会公众为主参与国家生态环境建设的大型社会公益活动，已经获得了1600多万元的社会捐款。（裴环）"},{"type":"paragraph","text":"我国通信卫星在轨管理技术世界领先"},{"type":"paragraph","text":"于去年7月18日用我国长征运载火箭发射升空的鑫诺1号通信卫星，在我国自行设计建造的鑫诺卫星地面测控站管理下，工作稳定，性能可靠。这表明我国完全有能力自主控制国外制造的通信卫星，我国通信卫星在轨管理技术居世界先进水平。"},{"type":"paragraph","text":"布朗称中国是一个巨大战略合作伙伴"},{"type":"paragraph","text":"联合国开发计划署新任署长马克·布朗8日在北京说，中国是联合国开发计划署重要的合作伙伴，在经济建设和社会发展上有独特的经验，因此，联合国开发计划署把中国看作是一个巨大的战略合作伙伴。"},{"type":"paragraph","text":"（除署名外均据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a7a2b91a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
