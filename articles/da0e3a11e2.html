script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新疆保卫和平民主同盟中央组织委员会讣告  新盟中央主席阿哈买提江等遇难　毛主席致电新盟中央委员会吊唁","authors":[],"dates":[{"year":1949,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新疆保卫和平民主同盟中央组织委员会讣告"},{"type":"paragraph","text":"新盟中央主席阿哈买提江等遇难"},{"type":"paragraph","text":"毛主席致电新盟中央委员会吊唁"},{"type":"paragraph","text":"【新华社北京二十四日电】此间收到新疆保卫和平民主同盟中央组织委员会关于新疆保卫和平民主同盟中央委员会主席、新疆省副主席阿哈买提江等一行因飞机失事遇难的讣告。按阿哈买提江等一行系于本年九月由伊宁飞北京途中遇难。讣告称：“新疆保卫和平民主同盟中央组织委员会讣告：新盟中央委员会主席、省政府副主席阿哈买提江同志，新盟中央组织委员会委员、省政府委员兼全省保安司令、民族军中将总指挥伊斯哈克伯克同志，新盟中央委员兼新盟情报处处长、省政府委员兼省政府副秘书长阿不都克里木同志，新盟中央委员、省政府委员、三区经济委员会副主任委员、阿山区专员兼民族军少将副总指挥民族英雄达列尔汉同志，中苏文化协会新疆分会会长罗志同志，及随员少校武官黑尼克里末夫，新盟情报处记者阿不都热希特伊米诺夫及窝斯满贝那斯洛夫，以及飞机驾驶员们，在由伊宁飞北京途中，因气候恶劣，飞机失事，不幸遇难牺牲。新疆保卫和平民主同盟中央委员会向全体盟员及全省人民表示沉痛的哀悼。由于他们的遇难，我人民永远的离别了为新疆省摆脱殖民地与帝国主义奴役的解放事业的光荣战士。将全部生命消耗于人民解放事业的最忠实的子弟—阿哈买提江同志、中将伊斯哈克伯克同志、阿不都克里木阿巴索夫同志、少将达列尔汉同志、罗志同志的牺牲，是全新疆人民及新省民主解放战士们的极大损失。他们在新盟阵线上的牺牲精神和对民族解放运动的无限忠诚，曾获得了全省各地人民的热烈爱戴。阿哈买提江，伊斯哈克伯克，阿不都克里木阿巴索夫，达列尔汉及罗志等同志的富有斗争的精神，与对民主和平事业的贡献，是为把新疆变为新民主中国的一个先进的区域而斗争的全体战士们的永远的启发者和模范。"},{"type":"paragraph","text":"新疆保卫和平民主同盟中央组织委员会"},{"type":"paragraph","text":"一九四九年十一月一日"},{"type":"paragraph","text":"【新华社北京二十四日电】中央人民政府毛泽东主席得悉新疆出席人民政协代表新疆省副主席阿哈买提江等遇难后，即致电新疆保卫和平民主同盟中央委员会吊唁，电文如下："},{"type":"paragraph","text":"新疆保卫和平民主同盟中央委员会亲爱的同志们："},{"type":"paragraph","text":"新疆人民出席中国人民政治协商会议的第一批代表，新疆省副主席阿哈买提江同志，新疆省伊犁、阿山、塔城三区民族军总指挥伊斯哈克伯克同志，新疆保卫和平民主同盟中央委员阿不都克里木同志，民族军副总指挥达列尔汉同志，和新疆中苏文化协会的罗志同志，不幸在一九四九年九月因飞机失事在来北京途中遇难。这是新疆人民和中国人民的一个巨大损失，我对此表示深沉的哀悼。阿哈买提江等五位同志生前为新疆人民解放事业英勇奋斗，最后又为建立中华人民共和国的事业而牺牲，值得全中国人民的永远纪念。阿哈买提江同志，伊斯哈克伯克同志，阿不都克里木同志，达列尔汉同志和罗志同志永垂不朽！"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东"},{"type":"paragraph","text":"一九四九年十一月二十二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da0e3a11e2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
