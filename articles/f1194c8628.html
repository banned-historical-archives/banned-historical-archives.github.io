<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决不允许再用“文革”一套整知识分子  长乐县改组县糖纸厂领导班子","authors":["张铭清"],"dates":[{"year":1984,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"决不允许再用“文革”一套整知识分子"},{"type":"paragraph","text":"长乐县改组县糖纸厂领导班子"},{"type":"paragraph","text":"本报讯　记者张铭清报道：7月26日，福建省长乐县委、县政府宣布改组县糖纸厂领导班子，撤销抵制落实知识分子政策的厂长陈宝枝的党内外职务，免去王开诚厂党支部书记职务，重新组成了平均年龄为三十六岁的有文化、有知识的领导班子。"},{"type":"paragraph","text":"长乐县糖纸厂原厂长陈宝枝只有小学文化程度，原是普通工人，“文革”中造反起家。他伙同支部书记王开诚拒不贯彻执行党的知识分子政策。直到今年7月，他们仍提出对知识分子要“一用二帮三看”。全厂三十六名大中专毕业生，包括仅有的四个大学本科毕业生，都被分配到车间顶岗劳动。全厂十三名车间正副主任，只有一名副主任是中专毕业生，建厂以来没有发展一名知识分子入党。知识分子住房拥挤，四名大学毕业生挤住在一间屋里，连桌椅都没有。当他们向陈宝枝要求合领一副桌椅作学习用时，陈竟训斥说：“你们就趴在棉被上写吧！”对此，大学毕业生陈夏官同志于今年5月向中央组织部写信反映该厂领导打击迫害知识分子的情况。6月，长乐县委派出调查组进厂核实情况后，责成厂领导班子纠正错误。但该厂党支部竟于7月1日写出《关于对陈夏官同志上书告发的问题的剖白》的报告，坚持错误，拒不执行调查组的意见，反而叫陈夏官去清理污水沟、顶岗劳动。在此期间，他们还扣发了陈夏官的加班费和奖金。7月初，省、市、县委组织部联合派出调查组再次进厂调查，但厂领导仍然没有从思想上认识错误。于是，长乐县委作出改组该厂领导班子的决定。"},{"type":"paragraph","text":"中共福建省委第一书记项南8月1日在一次会议上谈到，这个厂的原领导人竟然还用“一用二帮三看”这样的“文革”语言，把知识分子看成工人阶级之外的附属部分，把知识分子看成是被改造者，说明了少数领导干部轻视知识，轻视知识分子的错误倾向还没有从根本上纠正过来。这主要是由于长期以来“左”的思想影响和小生产者的传统观念的束缚，同时也同干部的素质有关。长乐糖纸厂原领导人是没有什么文化的人，现在换上学有专长的知识分子，相信这个厂会有变化。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1194c8628"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
