社员反对美国侵略","authors":[],"dates":[{"year":1950,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国合作社工作者首次代表会议闭幕"},{"type":"paragraph","text":"合作社决成立联合总社"},{"type":"paragraph","text":"会议向毛主席致敬，并号召社员反对美国侵略"},{"type":"paragraph","text":"【新华社十日讯】中华全国合作社工作者第一次代表会议已于七月二十七日胜利闭幕。会议在中央人民政府刘少奇副主席和中央财经委员会薄一波副主任的指导之下开了二十二天。"},{"type":"paragraph","text":"会议进行中间，中央人民政府刘少奇、朱德副主席曾到会讲话，薄一波副主任对目前整个财经工作情况做了报告，并在会议最后一天根据刘副主席的指示和会议讨论中所发现的各项问题，对今后合作社的任务，方针路线，老区合作社的整理改造和新区合作社的发展步骤，以及关于建立各种制度和干部整风等具体问题作了一个系统的总结性的报告。"},{"type":"paragraph","text":"到会代表在会议中进行了热烈的讨论，批判了过去许多糊涂思想与错误做法，因而对于合作社的性质、任务、方针路线和具体做法有了比较明确和一致的认识。全体代表通过了关于将中华人民共和国合作社法草案呈请中央人民政府审查通过并公布施行的决议，关于中华全国合作社联合总社章程——关于基层合作社和各级联合社章程准则草案等决议。并选出全国合作社联合总社临时理事会理事薄一波等三十一人和临时监事会监事叶季壮等十人。"},{"type":"paragraph","text":"此外，会议通过了中国合作社应参加国际合作社联盟、号召全国合作社员反对美帝侵略台湾朝鲜和以大会全体代表名义写信向毛主席致敬等三项临时动议。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4191480ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
