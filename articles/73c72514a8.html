"authors":[],"dates":[{"year":1958,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京15日电】　据塔期社柏林13日讯:“新德意志报”13日刊载了德国统一社会党中央政治局委员海因里希·劳在11日闭幕的统一社会党中央全会上所作的政治局工作报告。"},{"type":"paragraph","text":"海因里希·劳在分析了德国的形势之后，着重指出，党所制定的关于和平、安全和恢复德国统一使它成为一个和平民主国家的纲领正越来越得到西德广大人民的支持。他说，西德大多数人民反对原子武装的意愿同西德统治集团的复仇主义军事政策有深刻的矛盾。他肯定地说，目前在西德存在着开展争取和平斗争的巨大可能性，同时也存在着同社会民主党同志达成协议和采取共同行动的可能性。"},{"type":"paragraph","text":"海因里希·劳接着谈到了民主德国国民经济发展的情况。他说，1958年头4个月的工业生产比1957年同期增加了11.2%，这就为超额完成1958年国民经济计划提供了可能性。"},{"type":"paragraph","text":"在农业的社会主义改造方面，他提到1958年第一季度新成立了675个农业生产合作社；新入社的农民有27，800多人。"},{"type":"paragraph","text":"海因里希·劳最后谈到反对现代修正主义的问题。他说，正如南共纲领所表明的那样，南斯拉夫共产主义者联盟在马克思列宁主义最基本的问题上是坚持修正主义立场的。他说，南斯拉夫领导人的修正主义正被帝国主义势力用来毒害国际工人运动。所以，所有马克思列宁主义政党都讲了话。这不仅是为了斥责修正主义观点，而且是为了给以回击。"},{"type":"paragraph","text":"【据新华社北京15日电】　据塔期社柏林14日讯:“新德意志报”14日发表了德国统一社会党中央政治局委员诺伊曼在党的第三十六次中央全会上关于第五次党代表大会筹备工作的报告。"},{"type":"paragraph","text":"诺伊曼说，党代表大会的筹备工作已经远远越出了党的范围而成了工人阶级和人民群众的重要事件。他指出，党在劳动人民中间的威望正在日益提高。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73c72514a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
