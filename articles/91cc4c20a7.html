art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"安业民事迹展览会在沈阳开幕朱委员长和林伯渠；彭德怀等同志为烈士题词","authors":[],"parts":[{"type":"paragraph","text":"新华社沈阳13日电 战斗烈火中的英雄、赤胆忠心的共产主义战士——安业民烈士事迹展览会，12日在沈阳市文化宫开幕。"},{"type":"paragraph","text":"参加开幕式的，有辽宁省和沈阳市党、政、军领导人及各界人民代表一千五百多人。"},{"type":"paragraph","text":"展览会正厅高悬着朱德委员长的题词：“共产主义战士安业民永垂不朽！”为展览会题词的还有中共中央政治局委员林伯渠、彭德怀，全国人民代表大会常务委员会副委员长郭沫若，最高人民法院院长谢觉哉等。"},{"type":"paragraph","text":"展览会分四个部分。第一部分是安业民参加人民解放军以前的经历。展品中有烈士童年时给他讲过故事的八路军指导员的照片，以及烈士和八路军战士换穿的靰鞡，有1955年烈士参加开原县三级干部会的照片和他使用过的十三斤重的大镐、读过的书籍等。第二部分是安业民入伍后在部队中表现的高贵品质。其中有他写给亲友们的信件，自己的日记和反映出他勤俭作风的衣物等。第三部分是他在炮击金门战斗中的英雄行为，其中有他生前战友写的回忆信和他的立功喜报等。最后一部分是全国各地和沈阳市各界人民纪念学习安业民英雄事迹，推动各项工作的纪录材料。"},{"type":"paragraph","text":"展览会通过实物、照片、图画等，具体生动的介绍了安业民烈士崇高的英雄形象。参观的人纷纷表示，学习安业民烈士的英雄行为和高贵品德，加紧生产、工作和学习，为祖国的社会主义建设贡献出自己的力量。"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91cc4c20a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
