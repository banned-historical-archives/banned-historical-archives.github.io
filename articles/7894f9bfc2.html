script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"孙建中、张百发、李淑英、王建明委员说  工业战线的极左问题一定要解决","authors":[],"dates":[{"year":1980,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"孙建中、张百发、李淑英、王建明委员说"},{"type":"paragraph","text":"工业战线的极左问题一定要解决"},{"type":"paragraph","text":"孙建中委员说，我们国家历来的财经政策是收支平衡，略有结余。近两年来财政上出现赤字，原因不能归结为农副产品提价和滥发奖金。这里面的原因一方面是林彪、“四人帮”的破坏，另一方面是极大的浪费。例如，没有根据的要搞十来个大庆式的油田，结果从胜利油田到码头铺了输油管道，还要铺到江南，结果白扔了六十几个亿，根本没有多少油嘛！还有宝钢、武钢的问题，厂址的选择、电力的消耗，都没有听专家的意见，结果白白扔掉许多钱，还不都是造成赤字的原因吗？"},{"type":"paragraph","text":"张百发委员说，我们工业战线上的极左问题一直未解决，结果使国家和人民吃了许多苦头；不解决这个问题，国家经济形势刚好转，有的人头脑发热，在工业建设上来个浪漫主义，这怎么得了。我们有些领导人不懂业务，又不听专家的意见，可总批条子。例如，有的人许了愿，向某国买了一套化纤设备，产品质量还赶不上国际一般水平，价格高，但已草签了协议，国内专家也不好说什么了。据说照顾政治关系，结果几十亿扔进去，还不能马上投产。再如，在北京建的东方化工厂，选择厂址，很不合适，大家都不同意，可现在已花了2，200万了。象这样的事还很多。这种浪费是何等惊人，应该引起警惕。"},{"type":"paragraph","text":"李淑英委员说，我们的浪费实在惊人，例如从四川到上海搞的天然气管道，就缺乏深入调查研究，四川自己的天然气都不够用，就草率施工，铺设管道的几十万吨钢材全扔了。还有十来个大庆式的油气田，化工设备搞了，结果是无米之炊。这么浪费怎么对得起职工的辛勤劳动？要知道，纺织工人，对一寸布、一钱棉都珍惜得很。"},{"type":"paragraph","text":"王建明委员说，我们国家用法治代替人治是非常重要的，对于说大话、假话、空话的，应该受到法律约束。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7894f9bfc2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
