s":[],"dates":[{"year":1965,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东文艺思想的鲜艳花朵"},{"type":"paragraph","text":"——战士业余演出队、演唱组演出介绍"},{"type":"paragraph","text":"登高英雄后继有人〔词表演〕"},{"type":"paragraph","text":"杨连第虎胆巧登高，"},{"type":"paragraph","text":"英名留在八号桥，"},{"type":"paragraph","text":"登高自有后来人，"},{"type":"paragraph","text":"再看碧空红旗飘。"},{"type":"paragraph","text":"再险，不怕险！"},{"type":"paragraph","text":"再难，不怕难！"},{"type":"paragraph","text":"练！练！练！"},{"type":"paragraph","text":"不到长城非好汉！"},{"type":"paragraph","text":"爬过千根索，"},{"type":"paragraph","text":"踏遍万重山，"},{"type":"paragraph","text":"练出一身硬本领，"},{"type":"paragraph","text":"练出铁打钢铸汉。"},{"type":"paragraph","text":"〔铁道兵某部杨连第连演唱组五好战士张明昆等表演〕"},{"type":"paragraph","text":"工地鼓动组〔说唱〕"},{"type":"paragraph","text":"〔铁道兵某部杨连第连演唱组演出〕"},{"type":"paragraph","text":"蓝天练武〔舞蹈〕"},{"type":"paragraph","text":"背起伞，挎上枪，"},{"type":"paragraph","text":"乘着铁鹰上战场。"},{"type":"paragraph","text":"飞过高山峻岭，"},{"type":"paragraph","text":"穿过雾海云浪，"},{"type":"paragraph","text":"冲破敌人火网，"},{"type":"paragraph","text":"象插翅猛虎从天降。"},{"type":"paragraph","text":"铁臂掐住敌人的咽喉，"},{"type":"paragraph","text":"钢刀插入敌人的心脏！"},{"type":"paragraph","text":"毛泽东思想武装我们，"},{"type":"paragraph","text":"人民的空降兵，"},{"type":"paragraph","text":"是一支不可战胜的力量。"},{"type":"paragraph","text":"〔空军某部五好战士朱天才、魏忠林、佟凤图，跳伞能手王振华等表演〕"},{"type":"paragraph","text":"骆驼连的新战士〔好来宝〕"},{"type":"paragraph","text":"骑上骆驼紧握枪，"},{"type":"paragraph","text":"千难万险难阻挡，"},{"type":"paragraph","text":"毛主席的好战士，"},{"type":"paragraph","text":"巡逻在祖国的边疆。"},{"type":"paragraph","text":"战胜敌人，战胜沙漠；"},{"type":"paragraph","text":"战胜干旱，战胜炎阳，"},{"type":"paragraph","text":"骆驼连的英雄战士，"},{"type":"paragraph","text":"写下动人的战斗篇章。"},{"type":"paragraph","text":"〔内蒙古军区某部山布拉、吉林它布等表演〕"},{"type":"paragraph","text":"星期天的早晨〔三句半剧〕"},{"type":"paragraph","text":"〔公安部队某部三等功臣冯顺华、徐振海、龙瑶琴表演〕"},{"type":"paragraph","text":"要把硬骨头作风带上天〔诗表演〕"},{"type":"paragraph","text":"〔空军某部演唱组演出〕"},{"type":"paragraph","text":"练兵为打仗〔枪杆诗〕"},{"type":"paragraph","text":"军号达达响，"},{"type":"paragraph","text":"战士练兵忙，"},{"type":"paragraph","text":"为了保祖国，"},{"type":"paragraph","text":"日夜磨刀枪。"},{"type":"paragraph","text":"我们来自五湖四海，"},{"type":"paragraph","text":"为保祖国把兵当。"},{"type":"paragraph","text":"党对我们无限信任，"},{"type":"paragraph","text":"祖国人民授予我们这枝枪。"},{"type":"paragraph","text":"枪，用它保江山，"},{"type":"paragraph","text":"枪，用它打豺狼！"},{"type":"paragraph","text":"敌人磨刀我磨刀，"},{"type":"paragraph","text":"临战练兵斗志昂。"},{"type":"paragraph","text":"主席教导要牢记，"},{"type":"paragraph","text":"人的因素第一桩。"},{"type":"paragraph","text":"战斗功夫过得硬，"},{"type":"paragraph","text":"战斗胜利有保障。"},{"type":"paragraph","text":"〔公安部队某部五好战士吴国云等六人演出〕"},{"type":"paragraph","text":"进攻中的骑兵班〔舞蹈〕"},{"type":"paragraph","text":"〔内蒙古军区某部乌恩其、粉布才等表演〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"内蒙古文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd079dcd0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
