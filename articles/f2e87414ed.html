rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来张春桥同志会见黎德寿同志张春桥同志设宴招待黎德寿等越南同志","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年九月八日讯 中共中央政治局常委、国务院总理周恩来，中共中央政治局委员张春桥，今天下午会见了越南劳动党中央政治局委员、出席关于越南问题的巴黎会议的越南民主共和国政府代表团团长春水部长的特别顾问黎德寿，并进行十分亲切友好的谈话。"},{"type":"paragraph","text":"越南民主共和国驻中国大使馆临时代办阮进，越南南方共和驻中国大使阮文广参加了会见。"},{"type":"paragraph","text":"中共中央委员、中共中央对外联络部部长耿飚，外交部副部长韩念龙、亚洲司副司长梁枫参加了会见。"},{"type":"paragraph","text":"会见以后，张春桥同志设宴招待黎德寿等越南同志。"},{"type":"paragraph","text":"黎德寿同志是从河内前往巴黎途中于今天中午乘专机到达北京的。"},{"type":"paragraph","text":"张春桥、韩念龙、申健、梁枫、毛宝忠、肖簧等同志前往机场迎接。"},{"type":"paragraph","text":"到机场迎接的还有阮进临时代办和阮文广大使等。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2e87414ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
