script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿联新任通华大使塔拉齐向刘少奇主席递交国书","authors":[],"dates":[{"year":1960,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京22日电】　阿拉伯联合共和国新任驻中国特命全权大使萨拉赫丁·塔拉齐今天下午偕同大使馆全体外交官员向刘少奇主席递交国书。"},{"type":"paragraph","text":"在场的，有外交部副部长罗贵波、西亚非洲司司长何英、礼宾司专员韩叙。"},{"type":"paragraph","text":"塔拉齐大使在递交国书时致颂词说:“我们相信万隆会议所着重宣布的指导原则之一，即和平共处的指导原则，将继续引导着我们的命运，并且将成为我们共同的出发点。”“伟大的中国人民进行了反对帝国主义的斗争。亚非各国人民特别是我国人民，正在继续为反对帝国主义的一切阴谋而进行不断的斗争。因此，我们对于以和平共处和互不干涉内政为基础的亚非团结具有坚定的信心。”"},{"type":"paragraph","text":"刘少奇主席在致答词中说:“中、阿两国人民有着深厚的传统友谊。在万隆会议以后，我们两国政府已建立了良好的关系。万隆会议的十项原则已成为指导我们两国关系的可靠基础。我国政府将在这一基础上，努力增进两国的关系。”"},{"type":"paragraph","text":"刘少奇主席强调指出:“反对帝国主义和殖民主义是我们两国人民的共同愿望。帝国主义和殖民主义奴役和掠夺亚非人民的任何新花样都一定要失败的。我热烈地期望，我们两国人民将在这一反对帝国主义和殖民主义的斗争中，进行友好的合作。”"},{"type":"paragraph","text":"递交国书以后，刘少奇主席和塔拉齐大使进行了友好的谈话。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"faa4e15dd5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
