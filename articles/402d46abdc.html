<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西南局关于中江县处理地方势力曾某及公私枪枝问题发生原则错误的通报","authors":[],"dates":[{"year":1950,"month":3,"day":25}],"is_range_date":false,"parts":[{"text":"西南局关于中江县处理地方势力曾某及公私枪枝问题发生原则错误的通报","type":"title"},{"text":"兹将川北区党委三月十九日给各地委的指示转给你们。我们认为中江县在处理曾XX、陈XX和公私枪枝的问题上，是犯了原则性的错误；林XX等的公开叛变，固有其一定的内在因素，但和中江县处理失策是分不开的。从这一严重错误中说明中江县的同志，处理问题蛮干而缺乏明确的政策策略思想。有些地方在处理类似的问题上，亦曾发生过一些或“左”或“右”的毛病。如对旧乡保人员，应在群众工作中改造，分别对待。但实际上，往往不是一脚踢开单纯的打击，就是无条件的信任。对乡保游杂武装则未能及时整理改造，对公开叛变的镇压不够等。故除川北已责成遂宁地委、中江县委进行全面的检查外，各地如有类似情形，亦望注意检查及时纠正。","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"川北区党委三月十九日给各地委的指示","type":"subtitle"},{"text":"（一）据遂宁地委三月十五日报称：中江地方势力以曾XX为首，操纵全县政权、武装。我入川后，彼等十分恐慌，准备打游击，经地下党拉住，组织了维持会（后改支前会），因为进行适当的争取、稳定和分化工作。驻军移走后谣言纷起，并传说要暴动。加以县印被盗，领导上即慌张、盲动起来；尚未调查清楚，即扣捕曾等四人。正副县长、公安局长亲自审讯，肉刑逼供。此事传出，全县地方势力大为震动；林XX为首的四乡长，各带二十馀自卫队，逃至中江、金堂交界处，与土匪及起义部队叛变之四个连结合，已集中千馀人，且尚在继续集结。另两个乡的武装也与匪结合。另据中江地下关系吴XX三月十日给叙五同志写，称该县边有如下问题：","type":"paragraph"},{"text":"（1）隆兴乡之匪首陈XX刚经争取后，我工作团与区署的人即去扣捕，该匪等又跑了，增加剿匪困难。","type":"paragraph"},{"text":"（2）强令乡保人员把公私枪枝一起收缴，又责令乡保把匪剿灭，因而乡保人员纷纷逃走。因为没有统战工作，不但未团结争取可能向我靠拢或保持中立的人，即对广大知识阶层也未很好团结争取。一方面很多事情没人做；另方面许多人想为我工作而不用。","type":"paragraph"},{"text":"（3）我工作因成员不纯（已发现有土娼），不懂政策又不教育。在征粮中即有采取强迫威胁办法，如群众诉说公粮重，即以“再说就给加倍”相威胁，激起群众不满。","type":"paragraph"},{"text":"（二）据我们所知，中江是我区形势恶劣县份之一。除客观原因外，主要是掌握政策不好。请遂宁地委与中江县委迅速加以全面认真检讨，并详告我们。","type":"paragraph"},{"text":"（三）据此，我们再次提起全党注意，必须严格掌握政策与灵活运用策略，必须认此为严重的政治任务。否则，势必增加敌人，处境困难，陷自己于孤立。为保证这点，要求各地务须经常检查下面对政策执行情况；不要单纯要求任务，只问完成任务情况。同时，务须严守请示报告制度；并抓紧干部（特别是新干部）的政策学习和教育。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"402d46abdc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
