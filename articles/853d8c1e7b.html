cal-archives/banned-historical-archives9/main/books/机密档案中新发现的毛泽东讲话.epub"],"article":{"title":"毛泽东在《关于同印共左派米斯拉联系问题的请示》上的批示","parts":[{"text":"1967年11月17日","type":"paragraph"},{"text":"【维诺德•米斯拉是当时印度共产党（马列）解放派的领导人。1967年3月18日，在印共（马）基层组织的领导下，西孟加拉邦北部大吉岭县纳萨尔巴里地区的农民掀起了夺地斗争。他们建立农民委员会（当地有1.5万至2万名农民成为脱产积极分子），惩办恶霸地主，夺取地主的土地、粮食和武器，取消抵押债务，并从5月下旬起同前来镇压的警察展开搏斗。纳萨尔巴里运动得到了文革期间的中国的赞赏和支持，《人民日报》于1967年7月5日特意为此发表了《印度的春雷》。该运动在1971年被印度政府镇压，并因为一系列极左的做法丧失民心。】","type":"paragraph"},{"text":"康生同志：","type":"paragraph"},{"text":"此种学习是我方建议的，不是印方主动，往返危险甚大，似宜缓办，请酌。","type":"paragraph"},{"text":"毛泽东 11月17日\u003cbr style=\"clear:both;\"\u003e","type":"paragraph"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":11,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"853d8c1e7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
