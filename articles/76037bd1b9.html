ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"关于土特产品收购工作和统战工作的批语","alias":"","parts":[{"type":"paragraph","text":"关于士特产品收购工作"},{"type":"paragraph","text":"和统战工作的批语"},{"type":"paragraph","text":"（1956年11月24日）送陈云、李维汉同志阅，退毛。"},{"type":"paragraph","text":"请陈云同志看建屏一条消息，我看这种情况，在全国是相当多的，应当统一加以处理。请维汉看武汉的一条消息。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月廿四日"},{"type":"paragraph","text":"[1]陈云，当时任中共中央副主席、国务院副总理兼商业部部长。李维汉，当时任中共中央统战部部长。"},{"type":"paragraph","text":"[2]指新华社《内部参考》1956年11月21日第二O五七期上刊载的河北省建屏县贸易系统有些单位，在收购农民土特产品时压秤压价，非法营利，引起农民不满的消息。"},{"type":"paragraph","text":"[3]指同期《内部参考》刊载的武汉民主人士就匈牙利事件对我统战工作提出意见的消息。消息说，武汉民主人士希望中共从匈牙利事件中接受经验教训，进一步改进统战工作，采取措施改变“五统五不统”的现象。毛泽东全集第三十七卷"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"请李维汉同志电话询问武汉什么叫五统五不统。并要你改善工作。"},{"type":"paragraph","text":"[1]这是当时武汉民主人士中对中共统战工作的意见的一种说法。五统五不统，是指统上不统下、统大不统小、统工商不统党派、统进步不统落后、统政治不统思想。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":11,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":151,"page_end":152},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76037bd1b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
