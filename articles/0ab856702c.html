thors":["胡耀邦"],"dates":[{"year":1979,"month":12,"day":20}],"is_range_date":false,"parts":[{"text":"胡耀邦在《国内动态清样》3264期上的批示","type":"title"},{"text":"胡耀邦","type":"authors"},{"text":"这份材料虽然只举了几个例子，但我从这几个例子中可以看出，可能我们还有一些干部部门和人事部门的思想路线不端正，不端正的主要表现是：（一）对某些“文化大革命”上台的、既无能力、作风不好、又没有转变的人，仍加重用，或者采取一个变换办法仍加重用；（二）带着某种派性感情或情绪考察、使用甚至提拔干部；（三）沿袭过去那种不健康的，狭隘的老框框去评论干部，使用干部，这一点，可能更普遍些。小平同志几次谈组织路线还没有好好解决，我想他一定有很多根据。在这个问题上我们大家都没有往深里想。看来，这件事要认真对待。这个问题不更好地解决，不仅四化进程会碰到无法克服的困难，而且还有更多的危险性。","type":"paragraph"}],"comments":[],"origin":"《处理“文革”遗留问题、清理“三种人”文件汇编（第一册）》广西壮族自治区党委整党办公室。1986年8月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ab856702c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
