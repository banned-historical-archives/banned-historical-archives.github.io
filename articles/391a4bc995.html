ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"中央转发华东局关于组织人民法庭指示的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发华东局关于组织人民法庭指示的批语"},{"type":"paragraph","text":"（1950年8月19日）各中央局，分局："},{"type":"paragraph","text":"华东局关于组织人民法庭的指示\"是正确的，望你们亦就需要情形发这样一个指示。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"八月十九日"},{"type":"paragraph","text":"[1]指中共中央华东局1950年8月17日关于组织人民法庭的指示。指示规定：（一）应在匪特活动较为频繁及定于今冬进行土地改革之县份，首先建立人民法庭。（二）应在各县县委副书记、县农协主任、副县长或县公安局长等干部中，择一人兼任县人民法庭审判长，另以一得力的专职千部任副审判长。（三）确定担任人民法庭工作的干部及人员，应由各省（区）进行短期的专门训练。（四）应在干部较强、工作基础较好之县，先由县长或县委书记甚至专员，亲自审讯及办理一二个案件，作为示范，并吸取经验，以教育干部。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":8,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":90,"page_end":90},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"391a4bc995"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
