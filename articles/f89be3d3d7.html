script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚报纸欢呼亚非拉人民武装斗争的发展  帝国主义修正主义陷入巨大政治经济危机  帝修千方百计地用欺骗和武力镇压的手法妄图扑灭革命烈火","authors":[],"dates":[{"year":1968,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚报纸欢呼亚非拉人民武装斗争的发展"},{"type":"paragraph","text":"帝国主义修正主义陷入巨大政治经济危机"},{"type":"paragraph","text":"帝修千方百计地用欺骗和武力镇压的手法妄图扑灭革命烈火"},{"type":"paragraph","text":"新华社地拉那二十日电　阿尔巴尼亚《团结报》二十日发表短评，热烈欢呼亚洲、非洲、拉丁美洲人民革命武装斗争的蓬勃发展，给了美帝国主义及其仆从以致命的打击。"},{"type":"paragraph","text":"短评说，最近以来各国人民的武装斗争取得了重要的成就。亚非拉人民的这一斗争正在日益揭露了帝国主义及其仆从的虚弱性，显示了各国人民斗争和争取胜利的决心。"},{"type":"paragraph","text":"短评叙述了泰国、缅甸、老挝、巴勒斯坦、莫三鼻给、安哥拉和几内亚（比绍）等国和地区的人民武装斗争的巨大胜利之后说，手拿武器的各国人民的革命斗争的烈火，给了帝国主义和修正主义一个又一个的沉重打击。由于这一斗争的发展，帝国主义和修正主义正在陷入一场巨大的政治和经济的危机。帝国主义者和赫鲁晓夫修正主义者懂得，革命的高涨将会加速他们的灭亡。因此，他们从进行欺骗宣传到进行武力镇压，千方百计地企图扑灭革命火焰。"},{"type":"paragraph","text":"短评最后指出，但是，各国人民的武装斗争正在不断扩大和加强，正在取得一个接着一个的胜利，并且必将导致各国人民的最后胜利，导致美帝国主义者及其形形色色的仆从的彻底失败。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f89be3d3d7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
