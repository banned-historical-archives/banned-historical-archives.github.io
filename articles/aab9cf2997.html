rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"工农兵是办报的主人","authors":["军报印刷厂评报组"],"parts":[{"type":"paragraph","text":"读了《新闻战线上的新生事物——赞工农兵评报》，使我们受到了很大的鼓舞和深刻的教育。"},{"type":"paragraph","text":"我们从旧社会生活过来的同志都清楚地记得，在那时我们工人被资本家、报馆老板踩在脚下，甭说给报纸提意见，就连看报的权利也给剥夺了。解放了，我们工人在经济上翻了身，在政治上当家作主人了，可是，由于刘少奇反革命的修正主义路线的影响，报纸这一重要舆论阵地，我们依然很少有机会去过问。文化大革命前，我们工人尽管每天与报纸打交道，每天拣字，拼版，浇版，开动轮转机，成千上万份地印报纸，可是，报纸上出了差错，我们仍旧很少有权去纠正它。在编辑发出的稿子上，我们只能一字不改地去拣字、校对，即使明显地看出稿子上有错误也没有权力去改。伟大的无产阶级文化大革命，粉碎了刘少奇、林彪、邓小平妄图颠覆无产阶级专政、复辟资本主义的阴谋，批判了他们反革命的修正主义路线，我们工人阶级成了报纸的真正主人，报社编辑部干部和报社印刷厂工人的关系也有了新的变化。我们工人对编辑部发的稿子发现有错误及时提出修改意见。今天，在深入批判邓小平、反击右倾翻案风取得伟大胜利的时刻，我们印刷厂的工人同志们又成立了评报组。这是毛主席无产阶级新闻路线的体现。我们决心以主人翁的姿态，积极参加评报，一心为党报服务，使报纸更好地发挥激励人民，团结人民，打击敌人，巩固无产阶级专政的战斗作用。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aab9cf2997"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
