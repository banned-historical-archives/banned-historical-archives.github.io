:1978,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“毛主席教育的好民警”"},{"type":"paragraph","text":"大丰县东方红渔业公社，在台风袭来时，有十四条渔船和一百多名渔民没有返回港口。斗龙港公安派出所全体干警闻讯后，争着出海抢救。民警陈宝祥同志，已经顶风冒雨，沿海滩跋涉过膝的海水，步行八十华里，将九十名渔民领回上岸。他不顾疲劳，要求继续出海抢救。经所领导同意，同其他两名民警乘船出海。这时，狂风呼号，暴雨倾盆，浊浪排空。他们战胜了晕船、呕吐、饥饿，任凭巨浪颠簸，昂立船头，注视搜索目标，决心尽快找到渔民。经过十二小时的搜寻，终于在离海岸一百华里处，发现了渔船。原来这些渔船遭遇台风后，连组抛锚，但由于风大浪急，缆断锚流，渔船随风漂泊，处在十分危急之中。陈宝祥等同志赶到时，渔民们的心情异常激动，人人含着泪花说：“你们不顾生命危险，前来抢救我们。你们真是毛主席教育出来的好民警！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fba2aea1cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
