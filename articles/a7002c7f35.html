s":[],"dates":[{"year":1958,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"毛泽东在天津视察时谈话","type":"title"},{"text":"这样很好，本来光读书本上的，没有亲自去做，有的连看也没有看过，用的时候，就做不出产品来。一搞勤工俭学、半工半读，这样有了学问，也就是劳动者了。","type":"paragraph"},{"text":"河南省长葛县有一所中学、勤工俭学搞得好，学生进步快，升学的多。有的中学没有搞勤工俭学就不好，学生升学的少，考不取，学问不行。他们光念书本，没有学进去，把脑筋学坏了。","type":"paragraph"},{"text":"好啊，工厂就是学校，工人就是学生，学生也是工人农民，合作社也是学校，农民也是学生。","type":"paragraph"},{"text":"有些先生也得进步，形势逼着他们进步，他们动动手就行了。五十岁以上的教授、教师可以不动手，青年的、中年的都要动动手。搞科学研究的人，也应该动动手，不然一辈子不动手也不好。","type":"paragraph"},{"text":"连夜搞是否把人搞瘦了呢?还是注意有节奏的生产，有节奏的休息和劳动。","type":"paragraph"}],"comments":[],"origin":"一九五八年八月十六日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7002c7f35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
