nown","files":[],"article":{"title":"中共山西省委组织部、山西省人事局、政财厅关于贯彻山西省人民政府晋政发〔1983〕33号文件有关问题的补充通知","dates":[{"year":1983,"month":12,"day":20}],"is_range_date":false,"authors":["中共山西省委组织部","山西政财厅","山西省人事局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 332-333","tags":[{"name":"待遇","type":"主题/事件"},{"name":"干部","type":"主题/事件"},{"name":"老干部","type":"主题/事件"},{"name":"离休","type":"主题/事件"}],"parts":[{"type":"title","text":"中共山西省委组织部、山西省人事局、政财厅关于贯彻山西省人民政府晋政发〔1983〕33号文件有关问题的补充通知"},{"type":"subtitle","text":"晋组字〔1983〕106号晋人老字〔1983〕113号晋财行字〔1983〕第405号"},{"type":"paragraph","text":"为了进一步贯彻执行省人民政府晋政发（1983）33号文件，现将有关具体问题补充通知如下：一、离休干部要求回原籍农村安置的，应根据具体人的具体情况，实事求是地考虑。有条件回原籍农村的，回农村安置；回原籍农村度晚年确有困难的，应就地安置。二、离休干部回原籍农村安置（含配偶的原籍农村和一九六六年五月十六日前定居在城镇的农户），原籍农村有子女的，按规定发给建房补助费。三、夫妇双方符合离休（或一方离休，一方退休），原籍农村有子女的，在夫妇双方离休后，按就高不就低的原则，发给一方建房补助费。四、离休干部领取建房补助费，按干部管理权限，由同级党委老干部部门审批。一九八三年十二月二十日"}],"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6828e0a02b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
