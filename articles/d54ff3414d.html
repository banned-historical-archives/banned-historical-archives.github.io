ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于要注意反革命复辟现象的批语","alias":"","parts":[{"type":"paragraph","text":"关于要注意反革命复辟现象的批语\""},{"type":"paragraph","text":"（1967年2月28日）从上至下各级都有这种反革命复辟的现象，值得注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月廿八日"},{"type":"paragraph","text":"[1]这个批语写在中共中央文化革命小组办事组1967年2月25日编印的《快报》第一三三二号上。这期《快报》登载了题为《北京政法公社在天津小站公社支持了谁？》的材料。材料说：“1月26日，北京政法公社燎原长征队在天津小站公社坨子地大队，支持以四清运动中下台干部为背景的燎原红色战斗队，抢走大队的大印，从此牛鬼蛇神纷纷出笼实行反攻倒算。1967年2月27日，中共中央文化革命小组组长陈伯达把这期《快报》报送毛泽东时写道：“这是一个闹资本主义复辟的例子。革命群众要记者给主席反映情况。现在把材料送上，请顺便一阅。”"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":2,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":346,"page_end":346},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d54ff3414d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
