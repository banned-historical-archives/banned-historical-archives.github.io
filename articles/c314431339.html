art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”的“宁要”和“不要”","authors":["田伯华〖HH/换行〗DW：八一二五五部队"],"parts":[{"type":"paragraph","text":"王张江姚“四人帮”有个极其荒谬的理论：“宁长社会主义的草，不要资本主义的苗”。人们都知道，自然界的生物，只有科目、类别之分，是不好分阶级的。不能说有无产阶级的苹果，资产阶级的苹果，社会主义的桔子，资本主义的桔子。王张江姚“四人帮”反党集团在“草”和“苗”上居然也能分阶级和主义，这是何等的“革命”啊！"},{"type":"paragraph","text":"美中不足的是，“四人帮”言行不一，他们并没有“革命”到吃“社会主义的草”。他们不但吃大米、白面，而且大吃特吃西餐、洋菜。他们是一伙见洋货就眼馋的崇洋媚外的修正主义分子。"},{"type":"paragraph","text":"但是，这伙资产阶级的吸血鬼，在饭饱酒酣之余，却大骂大干社会主义的工人、贫下中农，是在栽“资本主义的苗”，而他们却是“宁要社会主义的草，不要资本主义的苗”的“天字第一号”的革命者。这种荒谬透顶的反动逻辑，实在令人气愤，令人可笑！"},{"type":"paragraph","text":"“四人帮”就是这样一伙大唱“宁要社会主义的草”，而大吃特吃“资本主义的苗”上长出来的“特等餐”、“特等菜”的“革命者”。在无产阶级看来，这是地地道道的反革命。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c314431339"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
