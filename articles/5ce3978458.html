script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"滕海青、吴涛同志关于整党、建党问题的六点意见","authors":[],"dates":[{"year":1968,"month":5,"day":20}],"is_range_date":false,"parts":[{"text":"滕海青、吴涛同志关于整党、建党问题的六点意见","type":"title"},{"text":"整党建党问题，中央已于去年11月有明确指示，请按照中央规定执行。上海的整党建党工作，文汇报也有一些介绍，可以参考，结合自治区情况，有几点意见，供讨论、研究时参考。","type":"paragraph"},{"text":"一、通过大办党员毛泽东思想学习班，整顿党的队伍，是整党的基本道路，学习班可否吸收少数先进群众参加，请参考。采取内查外调相结合的办法，把党员的政治历史搞清楚。党员在运动中的政治表现，需经群众评议。在学习班中，在思想上大力批判刘、邓建党路线；在组织上把不符合党员条件的人清除出去。这样才能达到思想革命化和组织革命化。","type":"paragraph"},{"text":"二、旗、县以上单位的党政机关和重要的企业事业单位（如包钢、二冶、一、二机厂等等），是整党的重点。这一些单位，干部多，问题也比较复杂。","type":"paragraph"},{"text":"三、工厂、农村、牧区等基层单位，最好能在今年7月底前，把党支部建立起来，基层党委（如公社党委）也要建立起来。起码应当有临时党委。","type":"paragraph"},{"text":"四、成立革命委员会的单位有核心小组，可以领导整党建党。这些单位的事情好办一些。有些单位（如各原部、委、厅、局）是领导小组，这些领导小组，有的三结合的，如何领导整党建党问题，要研究解决。可否在领导小组建立核心小组（或临时党委）请考虑。","type":"paragraph"},{"text":"五、清除出党的人，主要是有政治问题的人（特务、叛徒、顽固不化的走资派），其次是有历史问题的人。对思想落后或站错队、甚至犯了严重错误，但17年基本上还好的人，还是尽量教育，留在党内。凡是一切坏人，都要清除出党。","type":"paragraph"},{"text":"六、在建立起支部的地方，要吸收一批新党员。入党条件一定要掌握严一点。在新的党章未出前，基本要按现党章，如入党手续，预备期等问题。","type":"paragraph"},{"text":"整党工作，5月份做好准备，6、7月份要形成高潮。整党与审干要抓紧结合起来。","type":"paragraph"},{"text":"吴涛同志又示：自治区革委会的核心小组，在整党前，可以开办整党建党毛泽东思想学习班，吸收各盟、市负责整、建党的同志参加短期学习。学习毛主席关于整、建党指示，学习党内两条路线斗争的历史，学习毛主席的无产阶级建党路线，学习中央关于整建党指示，领会吃透整、建党精神。在整建党工作中，要强调走群众路线，阶级路线，真正建设成一个毛泽东思想的党。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"吴涛","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ce3978458"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
