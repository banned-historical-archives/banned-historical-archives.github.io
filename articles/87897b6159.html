art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黑板报","authors":[],"parts":[{"type":"paragraph","text":"总政召开全军政工会议"},{"type":"paragraph","text":"总政治部在最近召开了全军政治工作会议，着重讨论了今年政治工作的任务。到会同志学习了党中央、毛主席和林彪同志关于军队建设和政治思想工作的重要指示；听取了党中央总书记邓小平同志关于国内外形势和当前任务的报告。罗瑞卿同志对部队政治工作也作了指示。总政治部副主任萧华同志在会上作了关于进一步创造四好连队运动、干部教育和培养、加强机关建设等三个问题的报告。会议号召全军同志在一九六四年要更高地举起毛泽东思想的伟大红旗，继续坚持四个第一，发扬三八作风，鼓足干劲，奋发努力，虚心向地方学习，戒骄戒躁，团结一心，做出新的更大的成绩，把创造四好连队的工作做得好上加好。"},{"type":"paragraph","text":"各国朋友热烈欢迎毛主席谈话"},{"type":"paragraph","text":"世界各国的许多革命政党、进步团体，公众领袖和知名人士，最近纷纷发表声明、谈话，热烈欢迎毛主席关于支持巴拿马人民反美爱国斗争的谈话。他们说毛主席的谈话，彻底揭露了美帝国主义的侵略面目，表达了全世界被压迫人民的感情和愿望，鼓舞了他们的反帝斗争，指出了他们争取解放的正确道路。"},{"type":"paragraph","text":"我国人民声援巴拿马人民反美爱国斗争的活动更加普遍深入地展开，到十七日止，全国有一千二百万人举行了集会和游行。"},{"type":"paragraph","text":"周恩来总理到达马里访问"},{"type":"paragraph","text":"周总理陈毅副总理已经结束了在加纳的友好访问，于十六日到达马里共和国进行友好访问。周总理等离开加纳时，发表了中国和加纳联合公报。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87897b6159"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
