authors":["叶群"],"dates":[{"year":1967,"month":1,"day":24}],"is_range_date":false,"parts":[{"text":"叶群接见总后勤部机关院校部分造反派代表时的讲话","type":"title"},{"text":"叶群","type":"authors"},{"text":"〖元月24日23时40分至25日2时，叶群同志到总后接见了机关和院校部分革命造反派的代表，并进行了亲切的交谈，在听取代表们汇报总后文化大革命的情况过程中，作了如下指示（主要是插话）。〗","type":"appellation"},{"text":"“今天能见到大家，我们很高兴，大家反映的情况，明天我一定很好地向林彪同志汇报”。","type":"paragraph"},{"text":"“你们要相信我们，我们绝对不会包庇邱会作的。我们承认你们是革命行为，承认你们的组织是革命组织”。邱会作的问题现在不能作结论，运动要继续往下搞，对邱会作的问题要继续揭深揭透。揭发和批判邱会作的问题，不能算炮打无产阶级司令部。这是我个人的意见，大家的意见我回去向上反映。”","type":"paragraph"},{"text":"“林副主席是不会受骗的，现在不能说林副主席已经受骗了。不能给林副主席作结论。如果说林副主席已经受骗了，那就不会让我们来作调查研究了。刘志坚是反对紧急指示的。林副主席起草的紧急指示，刘志坚在原稿上划了很多，这个证据已经被我们抓住了”。","type":"paragraph"},{"text":"最后，叶群同志说：“今天先谈到这里，我们还要去开个会。（军委来了四次电话催叶群同志赶快回去开会）以后我们再找机会见面交谈，你们谈得很好，你们可能把材料整理好寄给我们”。","type":"paragraph"},{"text":"叶群同志要走时，秘书同志接到杨代总长电话，说张令彬同志知道叶群同志到总后来了，他要来见面。叶群同志说：“我马上走，不见他们”。（叶群同志走时张池明、张令彬全来了，但叶群同志未见他们）。","type":"paragraph"},{"text":"叶群同志走出房子以后，带领大家高呼：毛主席万岁！万岁！万万岁！","type":"paragraph"},{"text":"叶群同志向大家告别时说：“你们要劳逸结合，祝大家身体好。”大家齐声回答：祝毛主席万寿无疆！祝林副主席永远健康！","type":"appellation"},{"text":" （哈尔滨工农兵大学红色造反团驻京联络部翻印  1.29）","type":"paragraph"}],"comments":[],"origin":"哈尔滨工农兵大学红色造反团驻京联络站、北京政法学院政法公社编，中国科学院红卫兵革命造反司令部印《无产阶级文化大革命参考材料（一九六七年一月份）》（第三集）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘志坚","type":"人物"},{"name":"叶群","type":"人物"},{"name":"邱会作","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cebab6e7e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
