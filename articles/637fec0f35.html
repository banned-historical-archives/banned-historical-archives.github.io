,"dates":[{"year":1951,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美图强制各国在旧金山会议上签字"},{"type":"paragraph","text":"英资产阶级报纸亦表焦虑"},{"type":"paragraph","text":"【新华社五日讯】美国力图使各国在对日和约上签字划押的狂暴横蛮的态度，以及由此而引起的各国人民特别是亚洲人民的不满，甚至连那些原先一味为美国捧场的英国资产阶级报纸，最近也开始表示焦虑。"},{"type":"paragraph","text":"据电通社伦敦四日电，“曼彻斯特卫报”发表社论说：美国的意思是，参加会议的各国代表们“不得讨论英美和约草案，仅得在四天的纯粹形式化的仪式中签字画押而已。美国国务院竟认为这样就可以约束五十一国的代表而使他们就范，这似乎令人惊异”。该报认为这将使美国遭受“美国漠然不顾小国尊严”的指责。该报又说：苏联接受参加会议的邀请，“已使美国计划陷于混乱。所以苏联在会议尚未开始前，就已经取得了一种外交上的胜利”。"},{"type":"paragraph","text":"“泰晤士报”也对美国的笨拙极表不快。该报说：美国国务院并不愿举行会议，它所要的只是一种仪式而已。“在这种仪式中不需要别的，只需要金笔、路易十六式的桌子、摄影记者以及应时应景的冠冕堂皇的演说而已”它又说：“如果西方国家使别人看出来是在设法制止亚洲各国代表团表示意见，或对于合理而适切的议论有意强行使用否决权，那就极其不幸了。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"637fec0f35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
