日报》在转载本报十日社论时的编者按","authors":[],"dates":[{"year":1967,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十五日电　《人民日报》十六日在转载《文汇报》十日社论《要热情地支持革命的新干部》时的编者按，全文如下:"},{"type":"paragraph","text":"编者按:文汇报《要热情地支持革命的新干部》一文，提出了当前无产阶级文化大革命中的一个重要问题，希望引起同志们的注意。"},{"type":"paragraph","text":"毛主席在最新指示中教导我们:“要很好地解决上下级关系问题，搞好干部和群众的关系。以后干部要分别到下面去走一走，看一看，要坚持群众路线，遇事多和群众商量，做群众的小学生。在某种意义上来说，最聪明、最有才能的，是最有实践经验的战士。”希望广大新、老革命干部，在当前大好形势下，都要坚决地贯彻执行毛主席的这个极其重要的指示，更高地举起毛泽东思想的伟大红旗，认真实行群众路线，以“斗私，批修”为纲，紧紧掌握斗争的大方向，为完成无产阶级文化大革命的伟大历史任务而斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10deb9ef2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
