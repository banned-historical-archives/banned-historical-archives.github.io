s":[{"year":1968,"month":1,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央急电","type":"title"},{"text":"济南军区、山东省革命委员会、6063、6066、6117、济字283部队、连云港市卫戍区支左指挥部、4019部队、各革命群众组织：（抄杜平、赵俊、梁辑卿同志）","type":"appellation"},{"text":"中央决定派出一个调查组前往连云港市，主要任务是劝阻武斗，恢复港口、铁路、公路交通，封存上缴武器。调查组由总理联络员孟兆贤同志和解放军干部徐世平、齐树林、蔡景贤、张跃奎、刘世锴、陈彦禹、李冰清、王翔、邱志安等十同志组成。由徐世平同志任组长，齐树林同志任付组长。请你们积极协助，认真负责，共同完成上述任务，并保证安全。","type":"paragraph"},{"text":"希望你们高举毛泽东思想伟大红旗，活学活用毛主席最新指示，斗私批修，紧跟毛主席的伟大战略部署，把连云港市无产阶级文化大革命搞得更好。","type":"paragraph"},{"text":"(原载于江苏《一月风暴》1968年1月17日，第36期，第一版)","type":"appellation"}],"comments":[],"origin":"原载于江苏《一月风暴》1968年1月17日，第36期，第一版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5db0370552"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
