art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无产阶级文化大革命取得辉煌胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社十二日讯 中国亚非团结委员会收到了津巴布韦非洲民族联盟发来的热烈祝贺中国共产党第九次全国代表大会的贺信。贺信全文如下："},{"type":"paragraph","text":"中国北京"},{"type":"paragraph","text":"中国亚非团结委员会"},{"type":"paragraph","text":"津巴布韦非洲民族联盟向正在北京举行的中国共产党第九次代表大会表示热烈的祝贺。"},{"type":"paragraph","text":"我们知道，帝国主义者及其修正主义同盟者企图贬低这次代表大会的革命意义，但是他们必将失败。"},{"type":"paragraph","text":"这次代表大会对一切革命者来说都具有重大的意义，因为它在现阶段召开，十分清楚地表明，在中国，无产阶级文化大革命已经战胜反革命势力，取得了辉煌的胜利。无产阶级文化大革命的这些伟大成就，说明了帝国主义者及其修正主义帮凶为什么对第九次代表大会发出卑鄙的、然而是徒劳的叫嚷。"},{"type":"paragraph","text":"人民的代表大会万岁！"},{"type":"paragraph","text":"马克思主义、列宁主义、毛泽东思想万岁！"},{"type":"paragraph","text":"各国革命人民的团结万岁！"},{"type":"paragraph","text":"津巴布韦非洲民族联盟"},{"type":"paragraph","text":"一九六九年四月八日"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a2ce4438a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
