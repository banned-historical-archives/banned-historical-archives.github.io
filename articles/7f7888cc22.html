<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关于“七一”农业社存在问题的反映","authors":["新华社驻广西记者","郭纯青"],"dates":[{"year":1956,"month":11,"day":9}],"is_range_date":false,"parts":[{"text":"关于“七一”农业社存在问题的反映","type":"title"},{"text":"新华社驻广西记者郭纯青","type":"authors"},{"text":"[注：“七一”农业社前身是广西全县两合乡蒋在球农业生产合作社，1954年扩转高级社后改用此名。]","type":"paragraph"},{"text":"全省著名的全县“七一”农业生产合作社，今年减产73万斤粮食，社里最好的一个生产队（五里牌第十二队）有73％以上的农户减收。全社悲观失望情绪相当严重，很多社员对高级社、大社的优越性发生了怀疑。社主任蒋在球在谈到社员闹退社、分社、干部不团结和全社需要国家统销48万斤粮食的时候，禁不住落了两次泪。","type":"paragraph"},{"text":"全社30多个生产队，现在已经有两个队的社员公开闹退社。接近全县城郊的4个蔬菜队，因生产价值大，收益分配多，若明若暗地要分社。思想比较混乱的社员，都认为“高级社不如初级社，大社不如小社，社不如互助组”。闹退社的社员除少数要单干外，一般愿意成立互助组。在生产上，挖花生、挖红薯、抗旱现在大都是女社员做，男社员大部分在经营自己的家庭副业。冬种进展十分迟缓。社里的9个脱产干部，在秋粮分配后，大部分口粮不足，还要向社里补款，声声叫苦；其中有6个已表现忧虑不安。乡党支部书记杨成熹、乡长陈运升和乡文书尹辉，因工作能力稍差，也感到困难局面不好应付。工资改革后，这3个乡干部每人每月都有30元上下，几乎比社干多2／3。社干看了眼红，有的说，好事都让乡干做。意见分歧，比较难做的工作，相互推诿，很难分配。有少数干部因社员意见纷纷，不敢下村，怕和群众见面。乡长陈运升怕选举时落选，工作上拖延塞责。30多个生产队长表现很苦闷，原来不讲怪话的，现在也讲了起来。七里桥第十四队队长，候补党员唐基月，分配后要向社里补款70多元，满腹牢骚。他公开说，社里的脱产干部中有反革命分子，不然就不会减产。","type":"paragraph"},{"text":"“七一”社减产的主要原因，一是天灾，二是工作中有缺点。1953年和今年一样受旱，那时，社员们不讲怪话，抗旱生产情绪饱满。可是，今年就闹了起来。春季，“七一”社在上级主观主义支配下，不顾生产条件，提出每亩产1200斤粮食的竞赛指标，向李顺达应战。因此，就盲目推广先进技术和一些不切合实际的增产措施，引起社员的不满。社员们最反感的是晒谷芽、早禾换迟禾、小株密植和扩大红薯种植面积。晒谷芽是浸种催芽，经过阳光曝晒，然后播种。本来社员们思想就不通，后来又晒坏了，以致误了生产季节，单季稻早禾是当地群众多年来采用的品种，成熟早可以避旱。因早禾产量没有迟禾高，就全部换用迟禾，结果，秋旱到来有480多亩全部失收。加上不适当的小株密植，其余近2000亩水稻，也都大大减产。红薯是高产作物，分外强调了扩大种植，原来估产每亩能产红薯4000斤，谁知现在亩产不到800斤，这一项使社里遭受了很大的损失。近1000亩花生在干旱威胁下，也进行了剪顶压蔓，正常情况每亩能产500斤，而现在每亩只收130多斤。社员们说：上级犯了错误，不过空口检讨一番；社里减了产，老百姓就要饿肚子。因此，有的社员闹着要找那些推广技术的干部，要他们赔偿损失。","type":"paragraph"},{"text":"今年春耕夏收期间，省委、桂林地委、全县县委不少负责干部，都先后深入到这个重点社里了解情况，及时解决不少疑难问题，对这个社十分关怀。中共全县两合区委会的办公室，也曾经搬到这个社里工作。现在这个社遇到了灾害，混乱情况急待扭转，但是，从8月中旬以来，就没有一个比较负责的干部来社里了解情况，复杂问题越积越多。社里需要“大员”下来。蒋在球因为自己是全国第一届人民代表大会代表和中共全县县委委员，有很多实际困难说不出口来。现在，他感到上没有参谋，下缺少助手，重担子一时扛不起来。","type":"paragraph"},{"text":"来源：1956年11月09日《内部参考》","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f7888cc22"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
