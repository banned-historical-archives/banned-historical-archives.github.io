rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《叶剑英年谱》出版发行","authors":[],"parts":[{"type":"paragraph","text":"新华社北京7月6日电 中共中央、中央军委批准军事科学院编写的《叶剑英年谱》，近日由中央文献出版社出版发行。全书分上下卷，近90万字。"},{"type":"paragraph","text":"这部年谱，以翔实可靠的历史资料及大量的调查访问材料为基础，同时吸取了学术界的最新研究成果，比较全面、客观、准确地反映了叶剑英思想理论与实践发展的脉络，反映了他运用马列主义、毛泽东思想的普遍真理解决革命斗争实际问题的具体过程，反映了他的情怀、气度和风貌。"},{"type":"paragraph","text":"这部年谱的编写出版，对于进一步学习、宣传叶剑英等老一辈无产阶级革命家的革命精神和高尚品德，进一步深入研究党史、军史，继承、发扬党和军队的光荣传统，弘扬以爱国主义为核心的民族精神，具有重要的促进作用。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fc72ed54d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
