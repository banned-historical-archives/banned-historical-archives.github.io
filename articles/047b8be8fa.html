tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"索马里不愿做苏联的奴隶","authors":[],"parts":[{"type":"paragraph","text":"在这次记者招待会上，当外国记者问到索马里为什么最近作出废除索苏“友好合作”条约和驱逐全部苏联专家等决定时，西亚德总统回答说：“因为苏联把我们不能接受的东西强加给我们。我们的主权比任何其他的东西更为重要，我们为维护我们的主权将牺牲一切。”他接着说：“正是因为主权比任何其他东西更重要，所以我们才拒绝做苏联的奴隶，敢于作出这一强硬决定。我们将保卫我们的主权，我们将依靠我们自己。我们不接受附有条件的或牺牲我们主权的任何外国援助。”"},{"type":"paragraph","text":"西亚德总统进一步阐明说，苏联的现代化武器大量涌进非洲之角，苏联指使古巴人参战，并发动了反对索马里的恶意宣传，这就是我们把苏联人和古巴人赶走并要他们不要干涉非洲之角的原因。"},{"type":"paragraph","text":"西亚德总统说：“在俄国人离开后，我们可能会遇到许多困难。但我相信，索马里人民肯定会克服这些困难。索马里人过去、现在、将来都知道如何对待困难。”"},{"type":"paragraph","text":"西亚德总统谴责苏联和古巴有一个反对索马里的邪恶计划。他说，它们企图侵占伯贝拉港，“它们的目的是把红海海峡置于它们的控制之下”。"},{"type":"paragraph","text":"西亚德总统强调说，我们主张“红海地区的国家召开最高级会议，来讨论红海地区的安全问题”，“红海应当成为一个摆脱大国干涉的和平之海”。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"047b8be8fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
