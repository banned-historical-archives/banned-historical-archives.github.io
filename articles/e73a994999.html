<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji44","name":"毛泽东全集第44卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"苏联和保加利亚的两件事","alias":"","parts":[{"type":"paragraph","text":"苏联和保加利亚的两件事！"},{"type":"paragraph","text":"（1961年11月11日）"},{"type":"paragraph","text":"从这两件事，可以看出各兄弟国家的人民群众对中国人民所表示的感情的深度和广度。修正主义者一心一意要孤立中国，究竟被孤立的是谁呢？修正主义者脱离群众，使自己陷于孤立，而我们"},{"type":"paragraph","text":"[1]这是对新华通讯社1961年11月编印的《内部参考》国际版第一九五期、二○○期上分别登载的《我歌舞剧院演出轰动了列宁格勒》和《保人民敬仰毛主席热爱中国》两篇文章写的批语，题目是毛泽东拟的。"},{"type":"paragraph","text":"[2]指上述两篇通讯所报道的情况。前一篇通讯说，我国中央歌舞剧院在列宁格勒的演出，轰动了这个城市。观众赞叹我艺术成就时，表达了他们对中国人民的深厚情谊，这种情绪在周恩来副主席在苏共二十二大讲话全文发表以后表现得特别强烈。观众留言簿上出现了过去少见的带有鲜明政治色彩的留言，如：“光荣属于中国！”“伟大人民的伟大艺术！”“只有伟大的人民才能有如此丰富而全面的艺术！”“伟大的兄弟般的中国人民万岁！”“光荣属于中国人民！我们的友谊是永恒的、牢不可破的！”10月14日，首次上演舞剧《宝莲灯》，观众鼓掌、叫好达20分钟之久，演员谢幕15次。后面演出的各场票也很快售空，剧院不得不卖站票。21日晚第一幕休息时，一大群买不到票的人不顾层层阻拦，冲进场内，欢呼此举为“攻克柏林”。从苏联著名艺术家到普通观众纷纷向我们表示，演出的成功“简直出乎意料”。后一篇通讯说，从9月30日到10月5日，保加利亚约10个州（市）的17个工矿企业和农业社等举行了庆祝中华人民共和国建国十二周年的集会。新华社记者采访了一些庆祝活动。从这些活动中，得到的一个突出印象是，保加利亚人民敬仰毛主席，热爱中国。毛泽东全集第四十四卷（所谓教条主义者）却得到广大群众的拥护。全世界帝国主义，反动的民族主义，南斯拉夫修正主义及其在各国的同盟者，总之，一切剥削、压迫人民的反动派及其走狗，在全世界不过几亿人，只占百分之十以下，而革命人民及其同盟者则占百分之九十以上，达到二十几亿人之多，这是毫无疑义的。印度反动派反华，印度人民并不反华，他们痛恨本国的反动派。1960年，中国农业展览会在印度受到广大人民的欢迎和帮助，就是证据之一。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六一年十一月十一日1961年，毛泽东会见出席世界记者大会的代表。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":478,"page_end":479},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e73a994999"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
