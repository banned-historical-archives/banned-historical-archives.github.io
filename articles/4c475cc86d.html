" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"集中优势兵力在四平南北地区举行数次大的战役决战","alias":"","parts":[{"type":"paragraph","text":"集中优势兵力在四平南北地区举行"},{"type":"paragraph","text":"数次大的战役决战"},{"type":"paragraph","text":"（1946年4月19日）彭、林川："},{"type":"paragraph","text":"（一）杜聿明²由平赴沈对人称，东北共军四十余万，国军十余万，相差甚远，但仍须决心打下去，有坦克百余将运沈阳，并要使用飞机等语。要战胜顽敌保卫长春，必须准备对付飞机、坦克（参加过抗日的将士有办法对付之），并集中绝对优势兵力，于四平南北地区举行数次大的战役决战，才能解决问题。"},{"type":"paragraph","text":"（二）在不削弱各地工作条件下，抽调大批干部加强长、哈为中心地区的工作，即四平、海龙以北，齐齐哈尔、海伦以南，洮南以东，牡丹江以西，约三十至四十个县市，似应派较多干部分往各县市，发动群众，改造政权，组织武装，解决土地问题，掌握工商业，将这一带建设成民主东北的重心。这主要应从工作较深入、干"},{"type":"paragraph","text":"[1]、彭、林，指彭真、林彪，当时分别任中共中央东北局书记、东北民主联军第一政治委员和东北局副书记、东北民主联军总司令。"},{"type":"paragraph","text":"[2]杜聿明（1904—1981），陕西米脂人。当时任国民党军东北保安司令长官。部较多的南满\"方面抽调干部（南满工作不要放松)，是否可行，请加考虑。这一计划是从我能确保长、哈、齐三市至少确保哈、齐二市来设想的。至于三市是否能确保，决于是否能在四平地区大量歼灭敌人，故争取战争胜利，是基本环节。"},{"type":"paragraph","text":"（三）东北局如移长春，应住在郊外安全地点统筹全满?工作解决有关全局各项重大问题，而不要直接去管长春市工作。如你们觉得长春尚不稳固，暂缓迁移亦可。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"卵皓"},{"type":"paragraph","text":"[1]南满，指中长路沈阳至大连段以东的安东（今丹东)、庄河、通化、临江、清原和沈阳西南的辽中等地区。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":261,"page_end":262},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"集中优势兵力在四平南北地区举行数次大的战役决战","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":4,"day":19}],"parts":[{"text":"集中优势兵力在四平南北地区举行数次大的战役决战","type":"title"},{"type":"appellation","text":"彭、林："},{"type":"paragraph","text":"（一）杜聿明由平赴沈对人称，东北共军四十余万，国军十余万，相差甚远，但仍须决心打下去，有坦克百余将运沈阳，并要使用飞机等语。要战胜顽敌保卫长春，必须准备对付飞机、坦克（参加过抗日的将士有办法对付之），并集中绝对优势兵力，于四平南北地区举行数次大的战役决战，才能解决问题。"},{"type":"paragraph","text":"（二）在不削弱各地工作条件下，抽调大批干部加强长、哈为中心地区的工作，即四平、海龙以北，齐齐哈尔、海伦以南，洮南以东，牡丹江以西，约三十至四十个县市，似应派较多干部分往各县市，发动群众，改造政权，组织武装，解决土地问题，掌握工商业，将这一带建设成民主东北的重心。这主要应从工作较深入、干部较多的南满方面抽调干部（南满工作不要放松），是否可行，请加考虑。这一计划是从我能确保长、哈、齐三市至少确保哈、齐二市来设想的。至于三市是否能确保，决于是否能在四平地区大量歼灭敌人，故争取战争胜利，是基本环节。"},{"type":"paragraph","text":"（三）东北局如移长春，应住在郊外安全地点统筹全满工作，解决有关全局各项重大问题，而不要直接去管长春市工作。如你们觉得长春尚不稳固，暂缓迁移亦可。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"卯皓"}],"comment_pivots":[{"part_idx":1,"offset":3,"index":1},{"part_idx":2,"offset":6,"index":2},{"part_idx":3,"offset":26,"index":3},{"part_idx":3,"offset":149,"index":4},{"part_idx":4,"offset":24,"index":5}],"is_range_date":false,"authors":["毛泽东"],"comments":["彭、林，指彭真、林彪，当时分别任中共中央东北局书记、东北民主联军第一政治委员和东北局副书记、东北民主联军总司令。","杜聿明（一九○四——一九八一），陕西米脂人。当时任国民党军东北保安司令长官。","哈，指黑龙江哈尔滨。","南满，指中长路沈阳至大连段以东的安东（今丹东）、庄河、通化、临江、清原和沈阳西南的辽中等地区。","满，指满洲，即中国东北地区。"],"page_start":124,"page_end":125,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c475cc86d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
