判决书","authors":[],"dates":[{"year":1955,"month":12,"day":10}],"is_range_date":false,"parts":[{"text":"天津市高级人民法院关于汪培海反革命杀人案的刑事判决书","type":"title"},{"text":"公诉人  天津市人民检察院检察长\t李权超","type":"paragraph"},{"text":"被告  汪培海\t男\t38岁\t山东肥城县人\t住东北齐齐哈尔市北关区新建街9号（现在押）","type":"paragraph"},{"text":"上列被告因反革命杀人案，由天津市人民检察院提起公诉，经本院审理判决如下：","type":"paragraph"},{"text":"被告汪培海，又名汪岱东、汪万城。系匪三青团员。历充伪临清县水路警备队班长、小队长、伪沧县警务段分驻所警长、分所长。匪大兴县自卫队长等伪匪职务。","type":"paragraph"},{"text":"1944年秋，被告充当日伪临清县水路警备队小队长时，其部下匪兵刘金湘曾携枪潜逃后被抓回。伪大队长崔匪更西（已死）怀疑是刘金湘的老婆勾引所致，遂将刘妻抓捕。被告在崔匪的示意下，亲自用战刀将刘金湘的老婆砍死。日降后，被告充任匪大兴县黄村镇自卫队长时，曾为匪训练自卫团丁。并曾向村民崔索粮草。此外，被告在临清县充当伪职中，一贯勒索来往船民钱财，欺压群众。","type":"paragraph"},{"text":"解放后，被告隐瞒反动历史罪恶，拒不向政府交待。并畏罪潜逃东北匿居。1955年全国展开肃反运动以来，被告又拟潜回原籍。行至途中见政府宽大处理坦白自首的反革命分子后。在政府政策（即坦白从宽，抗拒从严，立功折罪，立大功受奖的政策——编者注）的感召下于9月间，在津自首投案。","type":"paragraph"},{"text":"综上所述：被告历充伪匪职务，一贯勒索群众；亲自杀死刘金湘妻，身负血债罪恶实属严重。但念被告能自动投案坦白罪恶。依据中华人民共和国惩治反革命条例第9条第4款及第14条第1款之规定从轻判处被告汪培海徒刑4年。","type":"paragraph"},{"text":"如不服本判决得于送达后次日起10日内向本院提出上诉理由书由本院转最高人民法院","type":"paragraph"},{"text":" 1955年12月10日刑事审判庭审判员  邸洪恩陪审员  过玉华陪审员  方慧年","type":"paragraph"},{"text":"本件证明与原本无异","type":"paragraph"},{"text":"1955年12月26日","type":"paragraph"},{"text":"书记员  张凤亭","type":"paragraph"}],"comments":[],"origin":"最高人民法院研究室编印《法院工作简报》第3期，1956年3月1日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e7bc3dec6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
