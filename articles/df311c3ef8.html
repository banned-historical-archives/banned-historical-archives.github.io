[],"article":{"title":"中共中央组织部、人事部、劳动部、财政部关于增加部分老红军、老干部生活困难补助费的通知","dates":[{"year":1992,"month":10,"day":14}],"is_range_date":false,"authors":["中共中央组织部","人事部","劳动部","财政部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局, 干审工作政策文件选编 (下), 1790-1791","tags":[{"name":"补助费","type":"主题/事件"},{"name":"老干部","type":"主题/事件"},{"name":"老红军","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部、人事部、劳动部、财政部关于增加部分老红军、老干部生活困难补助费的通知"},{"type":"subtitle","text":"1992年10月14日·组通字〔1992〕27号"},{"type":"paragraph","text":"各省、自治区、直辖市党委组织部、老干部局，政府人事、劳动、财政厅（局），中央和国家机关各部委，各直属机构，各人民团体："},{"type":"paragraph","text":"1979年4月17日，民政部、国家劳动总局、财政部在《关于解决部分老红军、老干部工资过低和生活困难补助问题的通知》（民发〔1979〕23号、〔79〕劳总薪字第24号、〔79〕财事字第85号）中规定，为了从优解决第一、二次国内革命战争时期的老红军、老干部的生活困难，由国家财政按每人每年30元拨一笔专款。根据这部分老红军、老干部的实际情况，经研究决定，从1992年度起，对他们的生活困难补助增加到每人每年100元。所需经费，分别由中央和地方财政负担。"},{"type":"paragraph","text":"这项经费的管理和使用仍按原规定执行，即：“中央级由各部门掌握使用，地方出各省、市、自治区负责管理老红军、老干部的主管单位统一掌握使用，列‘职工福利费’目，主要用于解决所在单位福利费解决不了的老红军、老干部及其遗属（直系亲属）的困难补助。”"},{"type":"paragraph","text":"本通知所指的老红军、老干部，仍按原规定的范围执行。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df311c3ef8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
