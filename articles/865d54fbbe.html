:[{"year":1956,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京24日电】　柬埔寨国王苏拉玛里特回电感谢毛泽东主席祝贺柬埔寨第三届独立节。电文如下:"},{"type":"paragraph","text":"阁下:"},{"type":"paragraph","text":"我对您在1956年11月7日以您个人名义及中国友邦人民的名义，在柬埔寨第三届独立节之际向我和我国人民所致的贺电深为感动。我诚恳地感谢您，并请接受柬埔寨人民和我对您个人幸福及全中国人民的富强的祝贺。我深信我们民族间的友好关系将日渐改进。"},{"type":"paragraph","text":"诺罗敦·苏拉玛里特"},{"type":"paragraph","text":"1956年11月18日"},{"type":"paragraph","text":"于金边"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"865d54fbbe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
