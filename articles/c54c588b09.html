:["《长江日报》社论"],"dates":[{"year":1956,"month":1,"day":18}],"is_range_date":false,"parts":[{"text":"向北京看齐！","type":"title"},{"text":"《长江日报》社论","type":"authors"},{"text":"北京社会主义改造的伟大胜利，激动了武汉人民。武汉郊区企业已经基本上实现了半社会主义合作化。现在，我们已经在学习北京的经验，采取又快又好的办法，使资本主义工商业全部公私合营，使手工业全部合作化！","type":"paragraph"},{"text":"全市工人、店员、手工业者和私营工商业者正在“向北京看齐”的口号下，风起云涌地行动起来了。","type":"paragraph"},{"text":"在武汉市，资本主义工商业全部实行公私合营的条件已经完全成熟了，现在已经到了“水到渠成，瓜熟蒂落”的时候了。北京又给我们作出了榜样。我们将在两、三天之内使全市各行业全部实现公私合营。这是毫无疑问的。","type":"paragraph"},{"text":"在手工业方面，江汉、江岸两个区已经全部实行合作化了。全市手工业也将在两、三天内全部实现合作化。这也是毫无疑问的。","type":"paragraph"},{"text":"我们预祝全市手工业全部合作化的胜利！","type":"paragraph"},{"text":"我们预祝全市私营工商业全部公私合营的胜利！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c54c588b09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
