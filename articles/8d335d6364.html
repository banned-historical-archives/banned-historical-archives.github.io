<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、国务院、中央军委、中央文革小组关于加强山林保护管理，制止破坏山林、树木的通知","authors":[],"dates":[{"year":1967,"month":9,"day":23}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革小组关于加强山林保护管理、制止破坏山林、树木的通知","type":"title"},{"text":"毛主席批示：","type":"appellation"},{"text":"照发。","type":"paragraph"},{"text":"森林是社会主义建设的重要资源，又是农业生产的一种保障。积极发展和保护森林资源，对于促进我国工、农业生产具有重要意义。文化大革命以来，广大贫下中农和林业职工高举毛泽东思想伟大红旗，活学活用毛主席著作，认真贯彻“抓革命、促生产”的方针，林业生产获得了很大成绩。但是，近来，党内一小撮走资本主义道路的当权派不甘心自己的失败，他们和地、富、反、坏、右分子，投机倒把分子，互相勾结，狼狈为奸，挑动山林纠纷，煽动群众，大肆砍伐林木，大搞木材投机倒把，破坏国家和集体的森林资源，破坏社会主义经济建设，破坏无产阶级文化大革命。为了制止对山林的继续破坏，特作如下通知：","type":"paragraph"},{"text":"一、高举毛泽东思想伟大红旗，以革命的大批判为动力，提高广大贫下中农和林业职工的阶级觉悟，揭穿阶级敌人的破坏阴谋。革命群众、革命群众组织、人民解放军、革命干部，要认真执行国务院发布的“森林保护条例”，积极作好护林宣传教育工作，加强山林管理，同一切破坏森林的行为作斗争。","type":"paragraph"},{"text":"二、国营和集体的林权，绝对不容侵犯，不准将国有山林划归集体；不准将集体山林划给个人（按人民公社六十条规定划给社员的自留山和自留树不在此列），已经这样作的，必须立即纠正。林权、林界未定者，或因而发生纠纷者，暂维持现状，不准砍伐破坏。","type":"paragraph"},{"text":"三、县、社、队三级普遍建立和健全护林组织和护林制度。严禁乱砍滥伐，严禁放火烧山，严禁盗窃树木；不准毁林开荒，不准毁林搞副业。违者，应根据情节轻重进行教育或处分，对情节严重的首恶分子和地、富、反、坏、右分子，投机倒把分子，要依法惩办。","type":"paragraph"},{"text":"四、严格实行计划采伐，计划收购。林业（森工）部门和社、队，都必须按照国家下达的计划指标进行采伐和收购，不得无计划生产。任何非经营木材和竹子的部门和单位，未经批准，不许擅自向国营林场和集体单位采购木材和竹子。","type":"paragraph"},{"text":"五、加强木材市场管理，严禁木、竹自由交易，坚决打击投机倒把行为。","type":"paragraph"},{"text":"六、各级抓革命、促生产第一线指挥部，必须加强对林业工作的领导，高举毛泽东思想伟大红旗，突出无产阶级政治，依靠广大革命群众、人民解放军和革命干部，积极地保护森林，发展林业事业。","type":"paragraph"},{"text":"这个通知，可在农村和城市张贴。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第四集）》， 北京：1967年11月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d335d6364"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
