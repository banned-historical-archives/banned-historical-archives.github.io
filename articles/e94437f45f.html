[],"dates":[{"year":1953,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“莫斯科真理报”发表罗果夫的文章"},{"type":"paragraph","text":"介绍“毛泽东选集”第二卷"},{"type":"paragraph","text":"【新华社莫斯科十一日电】苏联共产党莫斯科委员会和莫斯科苏维埃的机关报“莫斯科真理报”十日刊载了罗果夫（前塔斯社北京分社社长）介绍“毛泽东选集”第二卷的论文。罗果夫在论文中说：“毛泽东选集”第二卷说明了中国共产党在革命斗争艰难的阶段——在日本侵略的严重日子里在理论上和组织上所进行的巨大活动。第二卷的每一篇作品，都给中国人民以对自己的力量、对自己最后胜利的信心。罗果夫叙述了“毛泽东选集”第二卷的时代背景和主要内容。罗果夫最后说道：毛泽东同志的这些著作，是在中国的具体条件下、在军事时期的环境里科学地、创造性地运用马克思主义的成果。这些著作是马克思主义—列宁主义无往不胜的伟大力量的证据。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e94437f45f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
