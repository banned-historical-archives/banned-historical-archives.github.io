art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"贝林格总书记率意共中央代表团抵京胡耀邦等同志前往机场热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"据新华社四月十四日讯 应中国共产党中央委员会邀请，由总书记贝林格率领的意大利共产党中央代表团今天晚间乘飞机到达北京，对我国进行为期八天的友好访问。"},{"type":"paragraph","text":"中共中央总书记胡耀邦，中联部部长姬鹏飞、副部长冯铉、吴学谦等，前往机场热烈欢迎。"},{"type":"paragraph","text":"胡耀邦在候机大楼卫星厅迎接代表团时，对贝林格、贾恩卡洛·巴叶塔等意共同志说：“我们党的中央委员会、华主席和几位副主席都在殷切地期望你们的到来。”"},{"type":"paragraph","text":"贝林格在抵达北京机场时说：“我很高兴到中国来访问。我向中国共产党和中国人民致以热烈的问候。”"},{"type":"paragraph","text":"据悉，贝林格访华期间，将同中共中央主席华国锋、副主席邓小平会见，并且同胡耀邦就国际国内形势以及双方共同关心的问题进行诚挚友好的会谈。双方将在完全平等、独立自主和互相尊重的基础上正式恢复两党关系。"}],"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a86fdb408"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
