script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"消灭封建剥削的土地所有制　全国一亿二千八百多万农业人口地区一年来已实行了土地改革获得土地的农民衷心感谢人民政府和共产党　正以爱国增产运动迎接中共成立卅周年纪念","authors":[],"dates":[{"year":1951,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿九日电】　一年来，全国新解放区农村，有一亿二千八百多万农业人口的地区，依据去年六月三十日中央人民政府明令发布的中华人民共和国土地改革法，实行了土地改革，上述实行土地改革的地区华东最多，计为六千万农业人口的地区，中南为五千万农业人口的地区，西北为七百三十万农业人口的地区，西南为一千一百万农业人口的地区，这些地区，封建剥削的土地所有制已告消灭，无地少地农民的土地要求，基本上已经得到了满足，农村生产力已获得解放，这就为进一步完成全国的土地改革奠定了基础，为我国的工业化开辟了广阔的道路，一年来实行土地改革的地区，依法没收和征收的土地和分得土地的农民还没有完全的统计，根据各地一些已有的统计数字来看，估计一年来土地改革运动中没收和征收的土地约为一亿五千万亩，分得土地的农民约为八千多万，"},{"type":"paragraph","text":"去年六月三十日土地改革法公布后，上述实行土地改革的地区，就开始了紧张的、认真的准备工作，并立即选择典型乡村进行试办。去年秋收以后，这一个规模空前的土地改革运动，就在上述各地逐渐展开了，到今年一、二月间，各地土地改革运动都达到了全面开展的高潮，至于西南区的土地改革，主要是在今年春天进行的，到今年五月农忙时，上述实行土地改革的地区，基本上都已分配了土地，"},{"type":"paragraph","text":"去冬今春，上述地区都有广大的农民运动，亿万农民在农民协会的领导下，在人民政府和共产党的领导下，和封建统治势力展开猛烈的斗争，粉碎了恶霸、不法地主的一切抵抗和破坏，才顺利地实现了土地改革，运动中，各地农民打垮了封建势力，壮大了自己的力量，从而巩固了农村中的人民民主专政，现在，华东、中南、西北、和西南四大行政区的农民协会会员已达八千四百多万人。各地的民兵也有很大发展。"},{"type":"paragraph","text":"一年来，上述地区实行土地改革的农民运动，是和抗美援朝的爱国主义运动汇流在一起的，广大新解放区农民的政治觉悟大大地提高了，他们衷心地感谢人民政府和共产党，他们热爱祖国。他们正在热烈地展开抗美援朝运动和爱国增产运动，并以这些实际行动，来迎接中国共产党的三十周年纪念"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d1063952d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
