rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"愤怒声讨和批判邓小平的反动罪行","authors":["空军某部“航空兵英雄中队”"],"parts":[{"type":"paragraph","text":"我们中队全体同志从广播里听到党中央关于华国锋同志任中共中央第一副主席、国务院总理和撤销邓小平党内外一切职务的两个决议，一致认为，这充分表达了全党全军全国人民的心愿，大长了无产阶级的革命志气，大灭了资产阶级的威风。我们热烈欢呼，坚决拥护。"},{"type":"paragraph","text":"从去年夏季以来，不肯改悔的走资派邓小平刮起了一股右倾翻案的妖风，猖狂地向无产阶级进攻，妄图复辟资本主义。伟大领袖毛主席洞察一切，抓住战机，亲自发动和领导了反击右倾翻案风的斗争。不肯改悔的走资派邓小平，拒不接受毛主席、党中央和广大人民群众对他的批判教育，甚至企图扮演纳吉那样的反革命角色。邓小平问题的性质已经变为对抗性的矛盾。党中央的决议，是对邓小平以及国内外阶级敌人妄图在我国复辟资本主义的阴谋的沉重打击，我们坚决支持，拍手称快。"},{"type":"paragraph","text":"在反击右倾翻案风斗争胜利开展的大好形势下，一小撮阶级敌人不甘心自己的失败，竟然在天安门广场有预谋、有计划、有组织地制造反革命政治事件。他们把矛头指向伟大领袖毛主席，分裂党中央，妄图扭转当前批邓和反击右倾翻案风斗争的大方向。对此，我们感到极大的愤慨，我们坚决谴责这一反革命政治事件，坚决声讨一小撮反革命分子和资产阶级的总代表邓小平！"},{"type":"paragraph","text":"天安门广场这个反革命政治事件从反面教育了我们，千万不要忘记阶级和阶级斗争。我们决心在毛主席为首的党中央的领导下，在毛主席革命路线指引下，以阶级斗争为纲，团结战斗，狠批邓小平的反动罪行和他的反革命的修正主义路线，坚定地支持社会主义新生事物，抓革命，促生产，促工作，促战备，以实际行动，保卫毛主席，保卫党中央，保卫无产阶级专政。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e0e1ef595"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
