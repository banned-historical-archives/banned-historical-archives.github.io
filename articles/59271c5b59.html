s":[{"year":1971,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海锅炉厂　姚鸿恩"},{"type":"paragraph","text":"阳光下喜报放红光，"},{"type":"paragraph","text":"欢送锣鼓闹嚷嚷，"},{"type":"paragraph","text":"毛主席给我上大学，"},{"type":"paragraph","text":"热血沸腾心欢畅。"},{"type":"paragraph","text":"我穿着一身新工装，"},{"type":"paragraph","text":"毛主席像章闪金光，"},{"type":"paragraph","text":"几年没离厂一步，"},{"type":"paragraph","text":"如今激情滚滚热泪淌。"},{"type":"paragraph","text":"再摸一摸心爱的老伙伴——"},{"type":"paragraph","text":"革了几次命的老机床，"},{"type":"paragraph","text":"鸿再听一听师傅的叮嘱声，"},{"type":"paragraph","text":"一句句语重又心长:"},{"type":"paragraph","text":"“解放前咱干的牛马活，"},{"type":"paragraph","text":"路过学堂不敢望。"},{"type":"paragraph","text":"师傅八年前也去读大学，"},{"type":"paragraph","text":"半年就被反动‘权威’赶回厂”。"},{"type":"paragraph","text":"“文化大革命烈火旺，"},{"type":"paragraph","text":"旧大学彻底变了样，"},{"type":"paragraph","text":"你代表咱工人去读书，"},{"type":"paragraph","text":"可要为毛主席争荣光!”……"},{"type":"paragraph","text":"阶级的委托，热切的期望，"},{"type":"paragraph","text":"我知道肩上的担子啥份量，"},{"type":"paragraph","text":"再见吧!我高举《毛主席语录》"},{"type":"paragraph","text":"大步迈，"},{"type":"paragraph","text":"迎着朝阳奔向新战场!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59271c5b59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
