art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"牢记毛主席“将革命进行到底”的教导三连干部战士畅谈毛主席革命路线英明正确","authors":["赵国雄"],"parts":[{"type":"paragraph","text":"本报讯 最近，某团三连组织干部战士学习了毛主席的光辉著作《将革命进行到底》。干部战士通过忆连史，谈体会，联系全国文化大革命的形势，深深地认识到以毛主席为代表的无产阶级革命路线无比英明正确，一致表示要最坚决地执行以毛主席为代表的无产阶级革命路线，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"同志们回忆了全国解放前夕的形势。当时，我国人民牢记着毛主席“将革命进行到底”的伟大号召，按照“宜将剩勇追穷寇，不可沽名学霸王”的指示，粉碎了敌人的和谈阴谋，夺取了全国革命的胜利。同志们深深感到，只有毛主席的路线，才是最彻底的革命路线。同志们说，毛主席亲自发动和领导了我们的无产阶级文化大革命，在毛主席的正确路线指引下，党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子，已经陷在革命群众的汪洋大海之中，我们已经取得了极其伟大的胜利。但是，党内一小撮走资本主义道路的当权派和极少数顽固坚持资产阶级反动路线的人，决不会甘心他们的失败。他们必然会玩弄新的阴谋，欺骗群众，继续对抗以毛主席为代表的无产阶级革命路线。我们任何时候都一定要牢记毛主席“将革命进行到底”的教导，坚决执行以毛主席为代表的无产阶级革命路线，坚决支持无产阶级革命派夺党内一小撮走资本主义道路当权派的权，把无产阶级文化大革命进行到底。（赵国雄）"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"782292720c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
