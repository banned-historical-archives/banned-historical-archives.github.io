[{"year":1953,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"东京消息:作为美国垄断资本进一步控制日本经济的工具的“美日通商航海条约”，虽然尚在谈判阶段，但是已经引起了美、日资产阶级之间的尖锐矛盾。日本资产阶级对这个条约的不满和反对，一天天增加起来。"},{"type":"paragraph","text":"会员众多的日本资本家的组织“日本经营者团体联盟”，在六日派了一个代表团去见吉田政府的藏相向井忠晴和外相冈崎胜男，表示反对在“美日通商航海条约”中放宽日本现行“外资法”，允许美国资本无限制地购买日本公司的股票，操纵日本各经济部门。日本资产阶级极怕这样将严重危害他们自身的利益。“日本经营者团体联盟”警告说:外国资本在日本的势力已经非常雄厚，如果再允许美国人按照新条约自由购买日本公司的股票，他们就“可以操纵市场进行投机”，并“控制基本的工业和进出口公司”。代表团并要求吉田政府对美国采取“强硬态度”。"},{"type":"paragraph","text":"“美日通商航海条约”谈判所引起的美、日资产阶级之间的矛盾早已在吉田政府的内部有了反映。吉田政府的外务省和大藏省已在“美日通商航海条约”草案的许多条款上发生了分歧的意见。大藏省反对放宽“外资法”和其他允许美国资本家在日本享有所谓“国民待遇”的规定。虽然如此，卖国的吉田政府仍准备尽量满足美国垄断资本贪得无餍的要求。据法新社报道，吉田内阁在七日的特别会议上决定了关于“美日通商航海条约”的基本政策。外相冈崎在会后说:吉田政府的“新政策将在最大可能范围内便利美国在日本的投资”。【据新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4782b298d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
