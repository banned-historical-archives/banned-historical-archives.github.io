<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“当退却时不退却是‘左’倾，当进攻时不进攻是右倾”怎样解释?","authors":[],"dates":[{"year":1951,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者同志:"},{"type":"paragraph","text":"党史学习中有一问题，请帮助解答一下，问题是“当退却时不退却是‘左’倾，当进攻时不进攻是右倾。”为什么这样讲呢?请你给我答覆。此致敬礼!徐杰徐杰同志:"},{"type":"paragraph","text":"当第一次国内革命战争遭受到失败以后，中国革命趋向低潮，但这个低潮是处在两个革命高潮之间的；因此党的任务，应该是迅速集中革命的力量，在敌人的进攻面前组织有秩序的退却和防御，这就是说，需要将党的组织一部份转入反革命比较薄弱而革命力量比较有基础的农村，领导农民进行土地改革和游击战争；一部份继续留在城市而转入地下，进行隐蔽的活动，以便保存干部与党的组织，保存与积蓄革命力量，然后配合这两支队伍的斗争，利用敌人的矛盾，争取革命高潮的再度到来。但是党在瞿秋白同志的领导下，错误的估计了当时的形势，拒绝承认革命的失败，反在一九二七年冬到一九二八年春曾陷入“左”倾盲动主义，反对退却，要求继续进攻，因而使保留下来的革命力量继续受到了损失。"},{"type":"paragraph","text":"抗日战争时期，由于日寇向中国进行了全面的进攻，敌人的势力直接危害着四大阶级的利益，蒋介石国民党在人民的压力下不得不起来抗战了，中国革命进入了新的高潮，但是党内以王明同志为代表的右倾机会主义，他们反对党的路线，并且违反党的纪律，在他们负责的工作中擅自执行了右倾机会主义路线。他们从表面上看到国民党的强大，错误的断定抗日战争的胜利必须依靠国民党，断定国民党是抗日战争的领导者，否认了共产党可以成为抗日战争的领导者；他们低估了共产党领导的游击战争在抗日战争中所起的作用，而幻想依靠国民党军队求得“速胜”。他们信任国民党超过信任群众，他们抹煞共产党和国民党在抗日战争中原则分歧，要求共产党向国民党的反人民政策实行让步，主张共产党人的行动一切经过国民党政府，八路军新四军完全统一于国民党军队，实行统一指挥，他们否认统一战线中的独立自主，否认了“有团结有斗争，以斗争求团结”的方针。他们反对放手发动群众、反对在敌后扩大解放区扩大人民武装，他们害怕吓跑了国民党蒋介石，他们不经中央同意擅自发表了很多表示错误意见的宣言、决议和文章，拒绝中央正确的领导。他们这种错误思想和行动，在一九三八年由王明同志在武汉负责的活动中和一九四一年“皖南事变”以前项英同志在新四军工作中，曾经发生影响，因而妨碍了当时长江流域人民抗日战争的发展，造成了“皖南事变”中新四军部队的损失。这就是应该进攻时而不进攻的右倾错误。(编者)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王明","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34649df5b8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
