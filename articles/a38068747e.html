<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"林宪君的右派复查档案材料","authors":[],"dates":[{"year":1979,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"林宪君的右派复查档案材料","type":"title"},{"text":"关于撤销给林宪君同志开除团籍处分的决定","type":"subtitle"},{"text":"共青团四川省团校机关支部","type":"subtitle"},{"text":"1979.04.20","type":"subtitle"},{"text":"林宪君，男，现年44岁，山东牟平县人，家庭出身职员，本人成份学生，1951年10月参加工作，1952年11月入团。","type":"paragraph"},{"text":"林宪君同志在1957年整风反右中被划为右派骨干分子。受到劳动教养（保留公职）、开除团籍的处分。中共中央（1978）55号文件下达后，对他的问题进行了复查，团校党委1979年1月25日讨论，同意将林宪君同志1958年划为右派骨干分子的决定撤销，并撤销因右派身份送劳动教养的决定，恢复政治名誉，恢复原工资级别（行政22级）。","type":"paragraph"},{"text":"我们根据党委对林宪君同志被划为右派分子的改正决定，支部大会于1979年4月20日对他的团籍问题进行了讨论，一致认为林宪君同志参加工作以来表现还是比较好，1957年整风反右中划为右派分子属于错划，不应给予开除团籍的处分。因此，决定撤销1958年开除团籍的处分。当否，请党支部审批。","type":"paragraph"},{"text":" 共青团四川省团校机关支部1979年4月20日","type":"paragraph"},{"text":"关于林宪君同志被错划为右派骨干分子问题的复查报告","type":"subtitle"},{"text":"林宪君，男，现年44岁。山东省牟平县人，家庭出身职员，本人成份学生，1951年8月参加工作，同年11月加入共青团。1957年整风反右时在四川省团校哲学教研室任辅导员。","type":"paragraph"},{"text":"1957年反右派斗争中，林宪君同志被错划为右派骨干分子。受到开除团籍，送劳动教养的处分，1962年12月摘掉右派分子帽子。","type":"paragraph"},{"text":"根据中共中央（1978）55号文件精神，我们对林宪君同志的问题进行了复查。原定案材料称，林“从根本上否定党的性质，诬蔑党是半公开半秘密的带宗教色彩的小集团。不象一个解放全人类的先锋队，提出要成立真正的名符其实的联合政府；诬蔑马列主义不是革命真理也不是一个完整的体系；诬蔑反右斗争是阴谋，是党企图用来消灭反对者而做好的圈套。”上述问题是从林宪君同志1957年7月14日至9月6日的日记中摘录出来，经过分析上纲整理而成的。属不实之词，应予推倒。因此，1958年3月14日将林宪君同志划为右派骨干分子、开除团籍、送劳动教养的处分应予撤销。恢复林宪君同志的政治名誉和原工资级别（行政22级）。对其家属子女和亲属档案中涉及这一问题的材料应全部抽出销毁。","type":"paragraph"},{"text":" 四川省团校落实政策领导小组1979年1月14日","type":"paragraph"},{"text":"关于林宪君同志被错划为右派骨干分子的改正结论","type":"subtitle"},{"text":"四川省团校落实政策领导小组：","type":"paragraph"},{"text":"你们送来的《关于林宪君同志被错划为右派骨干分子问题的复查报告》收悉。经党委1979年1月25日讨论，同意你们的复查报告。决定将林宪君同志1958年被划为右派骨干分子和开除团籍的处分决定撤销，并撤销因右派身份送劳动教养的决定，恢复其政治名誉，恢复原工资级别（行政22级）。对其家属子女和亲属档案中涉及这一问题的有关材料一律抽出销毁。","type":"paragraph"},{"text":" 中共四川省团校委员会1979年1月25日","type":"paragraph"},{"text":"关于撤销给林宪君同志开除团籍处分决定的批复","type":"subtitle"},{"text":"共青团四川省团校机关支部：","type":"paragraph"},{"text":"你们送来的《关于撤销给林宪君同志开除团籍处分的决定》收悉。经支部1979年5月15日研究，同意撤销给林宪君同志开除团籍处分的决定。","type":"paragraph"},{"text":"此复","type":"paragraph"},{"text":" 中共四川省团校机关支部委员会1979年5月15日","type":"paragraph"},{"text":"撤销林宪君劳动教养的决定书","type":"subtitle"},{"text":"1979.03.26；渝公劳撤（79字）第6110号","type":"subtitle"},{"text":"根据中发（1978）11号、55号文件精神，对经中共四川省团校党委（党组）决定改正的林宪君撤销1958年3月14日劳动教养的决定。","type":"paragraph"},{"text":" 重庆市公安局1979年3月26日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"山东文革","type":"人物"},{"name":"四川文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a38068747e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
