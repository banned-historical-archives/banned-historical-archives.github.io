使美国垄断资产阶级在经济上损失约达二十亿美元","authors":[],"dates":[{"year":1969,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国码头工人坚持罢工六十六天"},{"type":"paragraph","text":"这次罢工成为美国历史上持续最长的一次码头工人大罢工，使美国垄断资产阶级在经济上损失约达二十亿美元"},{"type":"paragraph","text":"新华社二十三日讯　纽约消息：美国东海岸和墨西哥海湾的数万名码头工人，不顾美国反动统治集团的破坏和黄色工会头目的出卖，继续坚持罢工斗争，给了美国垄断资本以沉重的打击。"},{"type":"paragraph","text":"到二十三日为止，除纽约等少数几个港口外，美国东海岸从缅因州到得克萨斯州所有其他港口的码头工人仍在坚持罢工。这次罢工已进入第六十六天，成为美国历史上持续最长的一次码头工人大罢工，使美国垄断资产阶级在经济上的损失约达二十亿美元。"},{"type":"paragraph","text":"在纽约，尽管由于黄色工会头目的出卖，罢工遭到了破坏，但是二十一日起又有一部分码头机械工人冲破了黄色工会的控制，进行自发性的罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13c0d1dbfb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
