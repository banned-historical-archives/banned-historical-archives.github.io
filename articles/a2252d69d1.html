","authors":[],"dates":[{"year":1968,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十一日电　米兰消息:《毛泽东著作选读(甲种本)》意大利文版最近在意大利出版。这本书是米兰的东方出版社翻译出版的。这家出版社在早些时候还出版了意大利文版《毛泽东论文学与艺术》的第二版。"},{"type":"paragraph","text":"新华社科伦坡电　伟大领袖毛主席的光辉著作《抗日游击战争的战略问题》最近已经译成僧伽罗文，由科伦坡人民出版社出版。毛主席的另一篇光辉著作《论人民民主专政》已经译成泰米尔文，由工人出版社出版。这两篇光辉著作受到锡兰人民的热烈欢迎。"},{"type":"paragraph","text":"《抗日游击战争的战略问题》的泰米尔文版，早在八月份由科伦坡人民出版社出版。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2252d69d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
