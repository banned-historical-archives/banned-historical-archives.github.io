，全国城镇储蓄存款比去年底增长百分之七点六","authors":[],"dates":[{"year":1975,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学习无产阶级专政理论　抵制资产阶级生活作风"},{"type":"paragraph","text":"全国广大群众踊跃参加储蓄"},{"type":"paragraph","text":"到七月底止，全国城镇储蓄存款比去年底增长百分之七点六"},{"type":"paragraph","text":"新华社一九七五年八月十三日讯　今年以来，全国城镇人民群众的储蓄存款又有增长。广大群众踊跃参加储蓄，这是我国革命和生产形势大好的反映，也是人民群众发扬艰苦奋斗作风的表现。"},{"type":"paragraph","text":"毛主席关于理论问题的重要指示发表后，全国人民掀起了学习无产阶级专政理论的热潮，努力搞清楚巩固无产阶级专政的问题。广大职工和城镇居民结合实际，学习毛主席的指示，他们认识到，艰苦奋斗，勤俭持家，抵制资产阶级生活作风，绝不只是生活上的小事，而是关系到防止变修正主义的大事。把节余的钱和暂时不用的钱储蓄起来，不仅自己留有后备，可以应急，而且也可以支援社会主义建设，增加无产阶级专政的物质基础。因此，各地职工和城镇居民积极参加储蓄，今年到七月底止，全国城镇储蓄存款比去年年底增长了百分之七点六，其中七月上中旬储蓄存款增加的金额，相当于去年七月一个月增加的数字。北京市和上海市的储蓄额都增长了很多。湖北、吉林、湖南、河北、辽宁、山西、浙江、广东、江西、新疆、宁夏等省、自治区，超过了全国平均增长的水平。"},{"type":"paragraph","text":"许多地方的职工、居民在学习的过程中，用无产阶级专政的理论，分析“四旧”的危害，批判“人生在世，吃穿二字”的剥削阶级的人生观，破除旧风俗，提倡新风尚。许多地方出现了婚事新办，不铺张浪费；丧葬实行火葬，不请客送礼的新气象。不少地方的居民办起了社会主义大院，开展了节约粮、煤、电、水和计划生育的活动，节省了开支，增加了储蓄。"},{"type":"paragraph","text":"各地银行的广大干部，学习无产阶级专政理论，提高了对储蓄工作重大意义的认识。大家认识到，为革命办好人民储蓄事业，对于巩固无产阶级专政、发展社会主义经济，有着重要的意义。因此，银行工作人员更加积极主动地向广大群众宣传储蓄的意义。中国人民银行武汉市分行做储蓄工作的干部，不论存款、取款，钱多、钱少，都热情、周到、耐心、诚恳地为储户服务。今年以来，这个分行的储蓄存款比去年同期增加了百分之二十九，储户增加了七万多户。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86a14f5383"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
