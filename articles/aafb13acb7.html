ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"读《李氏文集》批语","alias":"","parts":[{"type":"paragraph","text":"读《汉书》批语"},{"type":"paragraph","text":"充国至金城，须兵满万骑。欲渡河，恐为虏所遮，即夜遣三校，衔枚先渡，渡营陈。会明毕，遂以次尽渡。·…···遂西至西部都尉府。孟康"},{"type":"paragraph","text":"曰：“在金城。”……因陈兵利害曰：“…以今进七天\""},{"type":"paragraph","text":"兵，诚不见其利，唯陛下裁察。”六月戊申奏，七月甲寅玺书报，从充国计焉。[卷六十九《赵充国传》第4~9页]"},{"type":"paragraph","text":"充国奏每上，辑下公卿议臣。宋祁日：“议臣字"},{"type":"paragraph","text":"说服力强之下当更有一议字。”初是充国计者什三，中什五，最效"},{"type":"paragraph","text":"后什八。有诏话前言不便者，皆顿首服。丞相魏相日：“臣愚不习兵事利害，后将军数画军策，其言常是，臣任其计，可必用也。”[卷六十九《赵充国传》第16页】"},{"type":"paragraph","text":"两龚皆楚人也，胜字君宾，舍字君倩。二人相友，并著名节，故世谓之楚两龚。·大司空"},{"type":"paragraph","text":"何武、执金吾阎崇荐胜。哀帝自为定陶王，固已"},{"type":"paragraph","text":"哀帝时至王莽时"},{"type":"paragraph","text":"闻其名，征为谏大夫。引见，胜荐龚舍及亢父帘"},{"type":"paragraph","text":"[1]赵充国在六月戊申日上书给汉宣帝，从金城送到长安，汉宣帝批示后，在七月甲寅日从长安送到金城，来回只有七天，极为神速。毛泽东全集第五十二卷"},{"type":"paragraph","text":"寿、济阴侯嘉，有诏皆征。·…会哀帝崩。初，琅邪那汉亦以清行征用，至京兆尹，后为太中大夫。王莽秉政，胜与汉俱乞骸骨。·…..于是王莽依故事，白遣胜、汉。……··于是胜、汉遂归老于乡里。···…莽既篡国·…·…明年，莽遣使者即拜胜为讲学祭酒，胜称疾不应征。后二年，莽复遣使者奉玺书，太子师友祭酒印绶，安车驷马迎胜，即拜，秩上卿。…………胜辄推不受。………·胜自知不见听，即谓（门人高）晖等：“吾受汉家厚恩，亡以报。今年老矣，旦暮入地，谊岂以一身事二姓，下见故主哉？”胜因敕以棺敛丧事，.遂不复开口饮食，积十四日死。「卷七十二《两龚"},{"type":"paragraph","text":"传》第18~23页]列传22-25窦、田、灌、韩景十三王李广、李陵、苏建、苏武、卫青、霍去病。川[1]此批语写在《前汉书》卷五十二至五十五封面上。"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":301,"page_end":302},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aafb13acb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
