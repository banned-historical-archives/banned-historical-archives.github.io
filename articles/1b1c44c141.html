script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席的无产阶级革命路线指引下  宁夏初步形成四通八达的公路运输网  全区各市、县、旗都通了公路，百分之九十五的公社能够通行汽车","authors":[],"dates":[{"year":1975,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席的无产阶级革命路线指引下"},{"type":"paragraph","text":"宁夏初步形成四通八达的公路运输网"},{"type":"paragraph","text":"全区各市、县、旗都通了公路，百分之九十五的公社能够通行汽车"},{"type":"paragraph","text":"据新华社银川电　在毛主席的无产阶级革命路线指引下，宁夏回族自治区公路建设取得很大成绩。现在，全区各市、县、旗都通了公路，百分之九十五的公社能够通行汽车，并且同邻近省、区公路干线相联接，初步形成了四通八达的公路运输网。"},{"type":"paragraph","text":"过去，宁夏公路运输比较落后。一九四九年解放时，全区公路总长只有一千一百多公里，将近一半的县、旗不通公路，而且所有的公路基本上是土路，急弯、陡坡、险桥很多，翻浆严重，时通时阻，广大农村运送物资主要靠人力背、骆驼驮和牛车拉运。"},{"type":"paragraph","text":"解放后，党和国家对发展宁夏的交通运输事业十分关心。国家拨了大量的资金，支援各族人民修桥筑路，发展公路运输。在当地党组织的领导下，广大筑路工人和各族人民以“不到长城非好汉”的英雄气概，冒酷暑，抗严寒，长年累月地奋战在高山、旷野和戈壁滩上。他们不怕苦，不怕累，积极修建公路，改造急弯和陡坡，把许多险峻的山道变成了通途。据有关部门统计，解放以来全区共新建公路三千多公里，改建公路五百多公里，现有公路通车里程比解放初期增加三倍多。解放前，宁夏公路基本上没有铺筑路面，更没有黑色路面。现在，全区铺筑各种路面已达三千二百多公里，其中，文化大革命以来铺筑的黑色路面比一九六五年增加十三倍。当年毛主席率领红军走过的六盘山区，解放前这里五个县就有三个县没有公路，只有坎坷不平的羊肠小道和大车道。一九六八年，在无产阶级文化大革命的推动下，回、汉两族筑路工人和当地社员经过五个月的艰苦奋战，就在五个县都修通了公路，并且使之同平（凉）银（川）、西（安）兰"},{"type":"paragraph","text":"（州）、包（头）兰（州）公路干线联接起来，沟通了宁夏与陕西、甘肃、内蒙古等省、区的联系。过去六盘山区“道路阻隘”，“交通梗塞”的历史，今天已经一去不复返了。"},{"type":"paragraph","text":"宁夏境内的黄河，长达三百多公里，从西南到东北流经自治区中部，过去从来没有一座公路桥，大的渡口靠小木船，小的渡口靠羊皮筏子，过一次河既费事又危险；加之有些公路所经之处沟渠很多，交通很不方便。解放以来，特别是文化大革命以来，宁夏各族人民在党的领导下，积极修建新桥，改造险桥，促使运输条件大大改善。现在，全区新建和改建的桥梁有三百三十多座，桥梁长度比一九六五年增加百分之五十。其中在文化大革命期间兴建的叶盛黄河大桥，主桥和引桥全长五百九十多米。工人们以“定叫黄河天堑变通途”的雄心壮志，自行勘测、钻探、设计和施工，仅用短短一年时间，就在一九七○年十二月胜利建成了叶盛黄河大桥。"},{"type":"paragraph","text":"随着公路建设的发展，养路工作也迅速开展起来。现在，全区公路线上已设立二百四十多个养路道班，共有养路职工二千二百多人。他们发扬“以苦为乐，以苦为荣”的革命精神，克服野外工作的种种困难，不仅努力搞好公路养护工作，而且还修建桥涵，改善翻浆地段，抢修被洪水冲毁的工程，保证了条条公路畅通无阻，为发展公路运输作出了很大的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"宁夏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b1c44c141"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
