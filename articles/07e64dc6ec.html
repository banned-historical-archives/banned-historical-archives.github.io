al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"给红军的作战命令","alias":"","parts":[{"type":"paragraph","text":"给红军的作战命令！"},{"type":"paragraph","text":"（1936年3月17日）"},{"type":"paragraph","text":"红一军团和第八十一师主力沿汾河和同蒲铁路继续南下，相机夺回赵城、洪洞、临汾，并向曲沃、闻喜、运城前进。红十五军团主力乘虚北上，相机占领文水、交城及其附近地区，威胁太原，尔后继续北进，占领静乐、岚县、苛岚等县，创造普西北游击根据地，并与陕西省的神府根据地打通联系。此外，红十五军团一个团又一个营、方面军直属队和新成立的红三十军（不到一千人）、山西游击队等部队，在军委参谋长叶剑英指挥下，担任钳制反击之敌，继续包围石楼，控制黄河渡口，维护后方交通任务。"},{"type":"paragraph","text":"[1]1936年3月，阎锡山为夺回晋西被占地区，令其4个纵队再次向石楼方向反击。毛泽东、彭德怀乘太原和晋南、晋西北的防守兵力比较空虚之1936年，毛泽东给红军指战员作报告。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":3,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":325,"page_end":326},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07e64dc6ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
