" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"江苏省粮食部门夏季收购供应计划不切合实际","authors":["周哲生"],"dates":[{"year":1953,"month":8,"day":5}],"is_range_date":false,"parts":[{"text":"江苏省粮食部门夏季收购供应计划不切合实际","type":"title"},{"text":"周哲生","type":"authors"},{"text":"【江苏分社5日讯】江苏省各级粮食部门在今年夏季收购与供应工作中存在很多问题。全省不少县、市对灾情估计过高，主观地编造收购计划。宝应县大麦实际收成比县粮食局计划收成超过60%以上，收购超过计划8倍以上。高邮县粮食局6月份计划收购小麦500万斤，而实际收购近2,000万斤。","type":"paragraph"},{"text":"由于收购计划订得保守，对农民售出麦子后需要食米估计不足，订出的供应计划也很不切合实际。包应、高邮食米供不应求，数次请求省粮食厅增援。江宁县粮食部门曾一再脱销。溧水县粮食局在6月10日电告粮食厅急调大米20万斤，粮食厅计算该县销售和收购相比，20万斤不够，就多调了10万斤，该县粮食局领导同志在电话中说：“只要20万斤，多了不要。”而过了两天又急电粮食厅速调大米50万斤，并要求当天下午运到，否则脱销。粮食厅又多调了20万斤，共调去100万斤。但在7月下旬又要求调入大米100万斤，仍不能解决限购和脱销。","type":"paragraph"},{"text":"某些粮食部门对保管工作不负责，高邮县临泽合作社代购的小麦已无处囤存，县粮食局同意调临泽仓库保管，可是临泽仓库主任张健不肯接收。江宁县有些合作社囤存设备不全，小麦热度很高，县粮食局迟迟不调进仓库保管。还有些粮食部门隐瞒粮食霉烂情况。扬州粮食公司第一仓库把400霉烂程度较轻的小麦掺到好麦子里送去加工。崇明、泗阳等县粮食局认为解决粮食保管困难的唯一办法是“出售”。","type":"paragraph"},{"text":"粮食部门不从群众利益出发的事情，也屡有发生。如丹阳县粮食局在设立小麦收购点时，农民要求能在宝庄镇设一收购点，镇上也有供销合作社，农民购买生产资料、生活资料亦便利。县粮食局为了节省费用，却要农民到八里和十八里外的地方出卖。江宁县粮食局营业所的营业员们为了自己方便，要农民把500、1,000的小票，到银行调换10,000元的大票，否则就不售粮等。（周哲生）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1953年8月12日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc96e19c87"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
