" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山东新区各阶层对土地改革法的反映","authors":[],"dates":[{"year":1950,"month":7,"day":27}],"is_range_date":false,"parts":[{"text":"山东新区各阶层对土地改革法的反映","type":"title"},{"text":"（山东分社7月27日讯）山东新区各阶层对土地改革法的反映：","type":"paragraph"},{"text":"（一）地主：有的地主怕斗争，说“拿出来不要紧，只要不要命就好”。济南有不少地主自动把土地分给他的雇工、佣人，以瓦解群众组织。博山有3户兼工商业的地主在土改法公布后回家要已分配的土地，并说：“土地回老家”。在老区已发生个别地主倒回土地、房屋的现象。","type":"paragraph"},{"text":"（二）富农：不少富农仍有很多顾虑。潍县一富农问干部：“不动富农的地是真的吗？真的我就多种二亩菸。”也有富农不承认以前征收他的土地和房屋。","type":"paragraph"},{"text":"（三）中农：中农一般都很拥护新土改法。潍县一中农今春卖了菸，不敢把钱带回去，现在他说：“富农都不动，中农还怕什么？”也有少数佃中农还有顾虑，怕将来分配土地时，会把自己租种的地都拿出去。对保存富农经济，一般都反映：“富农自己劳动的部分，不动是合理的，而剥削的那一部分不动就不合理。”","type":"paragraph"},{"text":"（四）贫农：“不动富农，现在就没有地分。”潍县三合区贫农听到新土改法说：“上级这一办，人家（富农）有办法，咱有什么办法？”","type":"paragraph"},{"text":"（五）干部：由于对土改法，特别是保存富农经济，认识上模糊，不了解为什么应该这样转变。崂山地委干校某些同志认为“不动富农是暂时的，下一回再动。”潍县税务局长李春台说：“地主改完后再改富农。”有的认为“不动富农，贫雇农生活无法解决”。“今天不动富农是正确的，过去是否错了？”乡、村干部认为：“不动富农，土改没改头。”干部自己想不通，在群众中也很难打通思想。一个准备参加土改学习的干部说：“共产党不代表穷人，土改不动富农，我还去学什么？”一个有23年党龄的老干部说：“现在共产党与过去不一样了，过去代表穷人，现在是代表富农。”也有人认为是共产党失掉立场，上了党外人士的当的。地富出身的新干部为自己的富农家庭不再被斗而欢呼，并说：“不动富农，我家就很自在了，可以买一匹好牲口。”有的认为今后富农是我们的朋友了。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年8月1日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a4344d585"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
