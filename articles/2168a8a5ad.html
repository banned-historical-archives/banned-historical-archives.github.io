示","authors":["周恩来"],"dates":[{"year":1967,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"周恩来传达毛泽东有关江西省军区报告的批示及他自己的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖时间：1967年5月30凌晨2：10〗","type":"appellation"},{"text":"五月三十日凌晨二时十分周总理来电话，转告了毛主席在一个文件上的批语：","type":"appellation"},{"text":"林彪、恩来同志、文革小组同志：","type":"appellation"},{"text":"江西军区与革命群众的对立情绪为什么愈演愈烈？江西军区某些负责同志对待群众的态度是否正确，值得研究。此外，还有××、××、××三个省军区对待群众的态度是否对，也值得研究。","type":"paragraph"},{"text":" 刘培善（签字）6.1","type":"paragraph"},{"text":"同时总理指示：","type":"paragraph"},{"text":"1．江西军区在“三支”、“两军”中犯了一些缺点错误，革命群众认为犯了方向路线性错误。你们应该很好解决。","type":"paragraph"},{"text":"2．江西日报问题不要争论下去了，“江西日报”四个字可以暂时去掉，改出一个时期的新华电讯。","type":"paragraph"},{"text":"3．不要把刘瑞森的问题看得太严重了。","type":"paragraph"},{"text":"4．刘培善先作检查，军区那个检查，你们（指军区）自己研究。","type":"paragraph"}],"comments":[],"origin":"1967年10月江西省直机关保卫毛泽东思想联合战斗团、江西省无产阶级革命派大联合筹委会新闻界联络站编印的《毛主席无限关怀江西  中央首长对江西问题的指示》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2168a8a5ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
