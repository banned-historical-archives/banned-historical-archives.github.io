ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给南汉宸的信","alias":"","parts":[{"type":"paragraph","text":"给南汉宸\"的信"},{"type":"paragraph","text":"（1942年12月13日）汉宸同志："},{"type":"paragraph","text":"后送各件收到，甚慰。拟再请你对粮食、税收、贸易、金融、财政、供给等项干部在自己工作中应注意之点（应兴应革），每项写一千至一千五百字左右给我，以插入报告中教育干部，对于你今后的工作有大助益。此次高干会?主要需要教育材料。在三至四天内送我即可。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十三日夜每项能写二三千字更好。"},{"type":"paragraph","text":"如何使他们不扰民、不贪污、不浪费而又能完成任务。每个问题分列若干条应注意之事项。"},{"type":"paragraph","text":"[1]南汉宸（1895—1967），山西洪洞人。当时任陕甘宁边区政府财政厅厅长。"},{"type":"paragraph","text":"[2]指毛泽东1942年12月在陕甘宁边区高级干部会议上的报告，题为《经济问题与财政问题》。"},{"type":"paragraph","text":"[3]指1942年10月19日至1943年1月14日中共中央西北局在延安召"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":300,"page_end":300},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"409f5bc9f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
