["岳安良","张博恩","张旭","李炳信","河南农学院","赵书训"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——反对农业合作化","type":"title"},{"text":"河南农学院张旭岳安良李炳信张博恩赵书训","type":"authors"},{"text":"张旭（林60级学生）：子女遗弃父母的现象，是农业合作化的必然结果。","type":"paragraph"},{"text":"岳安良（农58级学生）：建社初期是不会增产的，报上公布的统计数字不一定确实。","type":"paragraph"},{"text":"李炳信（农60级学生）：农业合作化并没有提高农民的生活，现在我家没有吃的，我到家三天就饿窜回来了。","type":"paragraph"},{"text":"张博恩（农60级学生）：合作化后，农民生活很苦，怎么还能打那么多的井，恐怕是干部虚报成绩吧。","type":"paragraph"},{"text":"赵书训（农60级学生）：我家有很多桃树，每年卖很多钱，还能吃很多桃子，一农业合作化，什么都完了。现在我家的生活很苦，分的粮食不够吃，我奶奶要到这里来讨饭。农民没啥吃，人都饿死了。大学生回家参加劳动，合作社不给工分，真不合理。闹水灾时俺那儿淹死的人可多啦！我在这儿多得劲！","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8faa1449b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
