主义和修正主义在中国复辟资本主义的希望完全破灭","authors":[],"dates":[{"year":1966,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新共《人民之声》周刊热烈赞扬中国文化大革命"},{"type":"paragraph","text":"中国人民的创造力正在出现新高涨"},{"type":"paragraph","text":"帝国主义和修正主义在中国复辟资本主义的希望完全破灭"},{"type":"paragraph","text":"新华社十三日讯　惠灵顿消息：新西兰共产党机关报《人民之声》周刊五日发表文章指出，中国无产阶级文化大革命“对中国人民和全世界人民具有非常重要的意义”。"},{"type":"paragraph","text":"这篇文章是为祝贺中国国庆而发表的。文章指出，中国今年的国庆是在中国正进行伟大的无产阶级文化大革命的时候到来的。文章写道：十七年来，中国人民取得的巨大成就“是在中国共产党和伟大的马克思列宁主义思想家和革命家毛泽东主席的领导下取得的。今天，在毛主席亲自领导的文化革命的促进下，中国人民的创造力正在出现新的高涨”。文章说，这场革命必将进一步巩固社会主义，促进生产的大发展和改变全体人民的面貌。"},{"type":"paragraph","text":"文章严正谴责帝国主义及其追随者苏联修正主义领导集团对中国文化革命和站在这一革命最前列的红卫兵的诬蔑。文章指出：帝国主义者和现代修正主义者诬蔑中国人民“这是不奇怪的，因为文化革命给帝国主义和修正主义在中国用和平方式或其它方式复辟资本主义的希望敲响了丧钟。”"},{"type":"paragraph","text":"文章最后说：“中华人民共和国在成立十七年当中，已经表明它是全世界被压迫的革命人民的斗争的最坚强的支持者。它今天作为支持战斗中的越南人民反对美帝国主义侵略的斗争的基地而屹立着。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2ffc20285"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
