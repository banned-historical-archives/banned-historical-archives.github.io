ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对张闻天来信的批语","alias":"","parts":[{"type":"paragraph","text":"对张闻天\"来信的批语"},{"type":"paragraph","text":"（1959年8月18日）"},{"type":"paragraph","text":"印发各同志。印160多份，发给每人一份。走了的，航送或邮送去。我以极大的热情欢迎洛甫这封信。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十八日[1]张闻天，又名洛甫。"},{"type":"paragraph","text":"[2]张闻天1959年8月18日上午给毛泽东的信说：“我这次动了大手术，对我以后的身体健康，定会起良好的影响。我衷心地感谢你和中央其他同志所给予我的帮助。我一定要同昨天的那个反动的我，永远决绝。今天读到你关于枚乘《七发》的批语和机关枪及其他，更使我深为感动。”“因为没有得到你的通知，所以我没有去见你。我今天下山，希望能在北京，再见到你，并希望你多多指导。”毛泽东在批示印发这封信时，拟题为：“洛甫同志8月18日上午庐山临别赠言，给毛泽东。”"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":306,"page_end":306},"tags":[{"name":"毛泽东","type":"人物"},{"name":"张闻天","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f21ff49cfd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
