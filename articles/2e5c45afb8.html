"year":1966,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都红卫兵小将不愧为毛主席的好学生首都红卫兵小将们："},{"type":"paragraph","text":"你们以毛泽东思想为指针，以十六条为武器，发扬无产阶级革命造反精神，天不怕，地不怕，不怕鬼，不信邪，向剥削阶级的旧思想、旧文化、旧风俗、旧习惯展开猛烈攻击，我们感到万分高兴。我们为你们的革命精神所鼓舞，为你们的革命行动而欢呼：你们做得对，做得好，好得很！你们不愧为毛主席的好学生。"},{"type":"paragraph","text":"首都红卫兵小将们：我们是毛主席故乡——湘潭江南机器厂的革命职工，我们最坚决地支持你们的革命行动，坚定地站在你们一边，永远和你们战斗在一起，扫除一切害人虫，搬掉一切绊脚石，坚决把无产阶级文化大革命进行到底！把社会主义革命进行到底！"},{"type":"paragraph","text":"无产阶级文化大革命万岁！"},{"type":"paragraph","text":"无产阶级革命造反精神万岁！"},{"type":"paragraph","text":"战无不胜的伟大的毛泽东思想万岁！"},{"type":"paragraph","text":"中国共产党万岁！"},{"type":"paragraph","text":"最伟大的领袖、最伟大的统帅、最伟大的舵手毛主席万岁！万万岁！"},{"type":"paragraph","text":"国营江南机器厂全体革命职工"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e5c45afb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
