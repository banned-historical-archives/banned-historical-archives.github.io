ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"充分准备对付国民党大举进攻","alias":"","parts":[{"type":"paragraph","text":"充分准备对付国民党大举进攻！"},{"type":"paragraph","text":"（1946年5月29日）各军区首长："},{"type":"paragraph","text":"（一）国民党在东北扩大战争，在关内积极准备对我大举进攻，因此我应有对敌作战之充分准备。（二）对于在力量对比上可以攻克或炸毁与应当攻克或炸毁之城市、车站、桥梁，各战略区应于电到半月至一月内完成侦察敌情、配备兵力、配备武器弹药（例如黄色炸药）及预拟作战计划等项准备工作，不得有误，对于防御方面之准备工作也是如此。（三）准备情形随时电告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"辰艳[1]这是毛泽东为中共中央军委起草的给各军区首长的电报。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":352,"page_end":352},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"402715fdcc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
