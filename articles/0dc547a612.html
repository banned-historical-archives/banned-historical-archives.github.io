tes":[{"year":1976,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想的光辉永远照耀着我们前进的道路"},{"type":"paragraph","text":"只有学好马列著作和毛主席著作，才能更好地坚持毛主席的无产阶级革命路线。北京二七机车车辆厂党委领导干部，化悲痛为力量，加倍努力学习毛主席著作，让毛泽东思想光辉照万代。"},{"type":"paragraph","text":"本报记者 摄"},{"type":"paragraph","text":"高举“鞍钢宪法”旗帜奋勇前进。鞍钢广大工人和各级领导干部，决心继承毛主席的遗志，遵照“鞍钢宪法”规定的各项原则，团结战斗，为巩固无产阶级专政，把我国建成强大的社会主义国家而奋斗。"},{"type":"paragraph","text":"化悲痛为力量。清华大学工农兵学员，坚决遵循毛主席“按既定方针办”的嘱咐，坚持以阶级斗争为纲，坚持党的基本路线，下定决心，誓与走资派斗争到底。"},{"type":"paragraph","text":"本报记者 摄"},{"type":"paragraph","text":"把毛主席亲手树立的大寨红旗举得更高。大寨大队党支部带领广大贫下中农化悲痛为力量，坚持以阶级斗争为纲，坚持党的基本路线，努力夺取革命、生产的新胜利，誓把大寨建成无产阶级专政的坚强阵地。"},{"type":"paragraph","text":"曾四次幸福地见到伟大领袖毛主席的南京市郊区十月人民公社十月大队党支部副书记余福珍，牢记毛主席视察十月大队时的亲切教导，化悲痛为力量，带领社员抓革命，促生产，夺取晚稻好收成。"},{"type":"paragraph","text":"毛泽东思想为亿万人民群众所掌握，就会产生巨大的物质力量。上海焊接二厂广大工人和干部，化悲痛为力量，坚持抓革命，促生产，不断取得新成绩。　本报通讯员 摄"},{"type":"paragraph","text":"北京卫戍区某部六连指战员决心继承毛主席的遗志，认真学习马列著作和毛主席著作，深入批判邓小平授意炮制的大毒草《论总纲》，巩固和发展无产阶级文化大革命的胜利成果。　本报记者 摄"},{"type":"paragraph","text":"地处反修前哨的新疆哈萨克族民兵，怀着极其悲痛的心情学习《告全党全军全国各族人民书》，决心化悲痛为力量，誓做反修防修的坚强战士，百倍提高警惕，随时准备歼灭一切敢于入侵之敌。"},{"type":"paragraph","text":"（本版照片除署名者外均为新华社记者摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0dc547a612"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
