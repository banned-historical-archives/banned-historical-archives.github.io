ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"可在先头阻止李弥余程万部向越南缅甸前进","alias":"","parts":[{"type":"paragraph","text":"可在先头阻止李弥余程万部"},{"type":"paragraph","text":"向越南缅甸前进"},{"type":"paragraph","text":"（1949年12月29日）少奇同志："},{"type":"paragraph","text":"请告刘邓转知卢汉及云南我军，只可在李弥、余程万之先头阻止其向越、缅前进，不可向其后尾威胁或追击，以免该敌过早退入越南。卢汉及我军均应向该敌进行政治工作，策动该敌起义。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十九日[1]少奇，即刘少奇。"},{"type":"paragraph","text":"[2]刘邓，指刘伯承、邓小平，当时分别任第二野战军司令员和政治委员。"},{"type":"paragraph","text":"[3]卢汉，原任国民党云南省政府主席、国民党军云南绥靖公署主任。1949年12月9日率部在昆明起义。"},{"type":"paragraph","text":"[4]李弥、余程万，当时分别任国民党军第八军军长和第二十六军军长。此时，这两个军正向越南、缅甸边境出逃。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":105,"page_end":105},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48f79f9c71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
