ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"关于拟在三峡游泳给中央的电报","alias":"","parts":[{"type":"paragraph","text":"关于拟在三峡游泳给中央的电报"},{"type":"paragraph","text":"（1957年7月7日）中央，并请转罗瑞卿、王任重\"二同志："},{"type":"paragraph","text":"我拟七月廿四日到重庆，廿五日乘船东下，看三峡。如果峡间确能下水，则下水过三峡，或只游三峡间有把握之一个峡。如不可能，则于船出峡口时下水到宜昌，或径到沙市。然后乘船到武汉。此事，已与瑞卿谈过。请中央考虑批准。如果中央同意的话，则（一）请瑞卿即带孙勇、韩队长等能游者十人左右，到武汉与已试航试泳一次之船队再去试行，反复几次。（二）王任重同志不要去，我拟于七月中旬到武汉和省委谈一些问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月七日[1]罗瑞卿，当时任公安部部长。王任重，当时任中共湖北省委第一书记。"},{"type":"paragraph","text":"[2]中共中央政治局常委1957年7月7日给毛泽东复电说，关于在三峡游泳一事，常委提出先派人调查和试水，然后再作决定。后来，根据试水情况，中央常委没有同意。"},{"type":"paragraph","text":"[3]孙勇，当时任中共中央办公厅警卫处警卫科副科长。韩队长，指韩庆余，当时任中央警卫团一中队中队长。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":7,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":155,"page_end":155},"tags":[{"name":"王任重","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71944231fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
