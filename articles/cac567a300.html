rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命人民离不开毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"在战斗中"},{"type":"paragraph","text":"在安哥拉人民武装起义五周年（二月四日）的前夕，安哥拉人民解放运动的青年游击队员奔巴对新华社记者说，在安哥拉游击队里，许多战士非常喜欢阅读毛泽东主席的著作，他们甚至在战斗时也把毛主席的军事著作的小册子放在口袋里。他说：“我们学习毛主席的著作，在战斗中运用，从而取得了我们的经验。”他谈到毛主席的著名论断“枪杆子里面出政权”时说：“当我们拿着枪同敌人作战时，我们想到，这是为了夺取政权，我们决不能放下武器。”"},{"type":"paragraph","text":"在监狱里"},{"type":"paragraph","text":"委内瑞拉青年戈麦斯讲他们在监狱里学习毛主席著作的情况说：“在我被捕以前，曾从阿根廷买到两本毛主席著作（一、二卷），当我被捕以后，我告诉家里人将毛主席著作秘密送进监狱。我们得到毛主席著作后，因为书少人多，就分成若干小组，每组五人，轮流阅读和讨论。当敌人来查时，我们就假装在拉家常。有的难友为了让别人能在白天读毛主席著作，他就晚上不睡觉，借着微弱的灯光看毛主席著作。我出狱时，这两卷毛主席著作根据难友们的要求，便留在狱中了。”"},{"type":"paragraph","text":"在病床上"},{"type":"paragraph","text":"日本共产党员朝日茂，他卧病在床时，还坚持学习毛主席著作。并作了一首诗："},{"type":"paragraph","text":"朝闻夕死不为迟，"},{"type":"paragraph","text":"一心专意寻真理。"},{"type":"paragraph","text":"病中不忘平生愿，"},{"type":"paragraph","text":"细读毛泽东选集。"},{"type":"paragraph","text":"在他的影响下，病友们也学习起毛主席著作来了。后来他不幸病死了。有一个病友说：我要和朝日茂一样学习毛主席著作，继承他的斗争意志。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cac567a300"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
