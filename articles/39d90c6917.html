tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们工人永远忠于毛主席","authors":["防化学兵毛泽东思想学习班6901工厂全体学员"],"parts":[{"type":"paragraph","text":"一九六七年十一月十四日，这一天是我们终生难忘的最最幸福的日子。我们心中最红最红的红太阳、最最敬爱的伟大领袖毛主席，接见了参加毛泽东思想学习班学习的中国人民解放军干部和革命群众代表。我们防化学兵6901工厂参加毛泽东思想学习班学习的全体同志，怀着无比激动、无比兴奋的心情参加了这次幸福的接见。"},{"type":"paragraph","text":"毛主席啊，毛主席！我们日日想，夜夜盼，渴望有一天能见到您老人家，今天我们最美好的愿望终于实现了。我们看到您老人家红光满面，神采奕奕，身体那样健康，感到多么高兴，多么激动啊！这是全中国人民和全世界人民最大的幸福。"},{"type":"paragraph","text":"“我们见到了最最敬爱的伟大领袖毛主席！”大家兴奋得连晚饭都顾不上吃，就把这个特大喜讯打电话告诉了工厂的同志们，好让全厂的革命职工同我们一起共享这一最大的幸福和愉快。老工人余析根同志激动地说：“我们工人在旧社会受资本家的压迫和剥削，吃不饱，穿不暖，过着牛马不如的生活。是毛主席领导我们翻了身，现在又是毛主席领导我们胜利地进行着无产阶级文化大革命。我们工人永远跟着毛主席，读一辈子毛主席的书，听一辈子毛主席的话，一辈子跟毛主席闹革命。毛主席指到哪，我们就打到哪。”刘广文同志无限感慨地说：“毛主席他老人家这样关心我们，我决心努力学好毛主席的最新指示，狠斗‘私’字，猛扫派性，狠触自己的灵魂，在文化大革命中立新功，回答毛主席他老人家对我们的关怀。”"},{"type":"paragraph","text":"天大地大不如党的恩情大，爹亲娘亲不如毛主席亲。大家在热烈的座谈讨论中，表达了对伟大领袖毛主席和伟大的毛泽东思想无限热爱、无限忠诚、无限信仰、无限崇拜的感情。我们决心大树特树毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威，永生永世无限忠于伟大统帅毛主席。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39d90c6917"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
