al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致林彪、鼓荣臻电","alias":"","parts":[{"type":"paragraph","text":"致林彪、聂荣臻电"},{"type":"paragraph","text":"（1936年2月26日）林、聂："},{"type":"paragraph","text":"（甲）你们行动望即见告。（乙）徐海东率三团昨（二十五）日上午在石楼南端消灭敌一一三团一个营，下午在湿县北端又消灭敌四零五团之一营，俘营长李玉田，并击溃其一营，共俘三百余人，缴步枪二百余【支]，追炮二门，机枪多挺。（丙）据李玉田供：李生达七十二师二八〇旅二十五日到石口镇，增援石楼。（丁）已令徐程率红军第十五军团（缺直属队包围石楼之两个营），本日向石口进四十里，明日包围该敌而消灭之。"},{"type":"paragraph","text":"彭毛"},{"type":"paragraph","text":"二十六日四时三十分[1]这是毛泽东和红军第一方面军司令员彭德怀给第一方面军第一军团"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":2,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":263,"page_end":263},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d679dc338"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
