es":[{"year":1977,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年五月二十一日电　邮电部定于五月二十三日发行彩色纪念邮票，纪念毛主席《在延安文艺座谈会上的讲话》发表三十五周年。"},{"type":"paragraph","text":"这套纪念邮票共两枚。第一枚画面的中心是革命圣地延安，四周是盛开的鲜花，象征毛主席的光辉思想永远照耀我国社会主义文艺事业的发展，毛主席所制定的无产阶级文艺路线永放光辉。第二枚的画面突出了象征工农兵的铁锤、镰刀、枪，围绕着似锦的繁花，歌颂毛主席所指引的文艺为工农兵服务的方向；反映在毛主席无产阶级文艺路线的光辉照耀下，在以华主席为首的党中央领导下，无产阶级革命文艺百花齐放，欣欣向荣。"},{"type":"paragraph","text":"这套邮票的面值都是八分。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d1673c097"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
