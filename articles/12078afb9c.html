script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"南京税务人员贪污的花样很多","authors":[],"dates":[{"year":1952,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"南京税务人员贪污的花样很多","type":"title"},{"text":"【南京记者组十四日讯】南京市税务局人员现有一六三人自动坦白有贪污行为。据税务局领导上估计，有现金贪污行为的可能占全部人员的百分之四十。根据已经坦白的案件分析，有以下十三种贪污花样：(1)查出漏税不罚，私贿了事；(2)借钱为名，实际上是勒索不还，暗中照顾商人；(3)年节接受金钱礼物；(4)伪造鉴印，集体贪污；(5)追缴欠税，收款中饱，谎报催交不起；(6)填写税票，大头小尾；(7)开假发票，私吃回扣；(8)假冒检举，吞蚀奖金；(9)收款时多了留下私用，少了要商人赔偿；(10)运用职权，进行勒索，或便宜购买物品；(11)出差伪报旅费；(12)盗窃公物；(13)泄露秘密，把工作布置告诉商人。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年1月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12078afb9c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
