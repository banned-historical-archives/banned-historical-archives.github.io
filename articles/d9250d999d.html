ear":1963,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京13日电】　邓小平同志和彭真同志率领中共代表团前往莫斯科参加中苏两党会谈的新闻片明天起将在北京上映。"},{"type":"paragraph","text":"这部新闻片被列入中央新闻纪录电影制片厂拍摄的《新闻简报》第二十九号中。影片报道了代表团离开北京前往莫斯科时在飞机场上受到刘少奇、周恩来、朱德、董必武等党和国家领导人，各部门负责人、各民主党派和人民团体负责人、人民解放军高级将领、社会主义阵营各国使节热烈欢送的情况。"},{"type":"paragraph","text":"《新闻简报》第二十九号还介绍了首都七千多人热烈欢迎被苏联无理要求召回的五位同志的实况。"},{"type":"paragraph","text":"《新闻简报》第二十九号即将在全国各地上映。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9250d999d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
