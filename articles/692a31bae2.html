script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宁夏燃化局基建公司水泥厂领导干部自觉限制资产阶级法权  认真实行三同　坚持继续革命","authors":[],"dates":[{"year":1976,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宁夏燃化局基建公司水泥厂领导干部自觉限制资产阶级法权"},{"type":"paragraph","text":"认真实行三同　坚持继续革命"},{"type":"paragraph","text":"据新华社银川电　宁夏燃化局基建公司水泥厂党组织、革委会领导成员，自觉限制资产阶级法权，坚持深入车间班组与工人实行三同，认真改造世界观，进一步密切了干群关系，提高了无产阶级专政下继续革命的自觉性。"},{"type":"paragraph","text":"最近，这个厂的领导干部与工人一起，学习毛主席关于社教运动的重要批示，回顾总结过去的实践经验，清楚地认识到：官僚主义者阶级就是党内的资产阶级，它与工人阶级和贫下中农是两个根本对立的阶级。领导干部如果不到车间班组搞三同，不和工人划等号，就会逐渐变成为高踞于群众之上的官僚主义者，最后被工人阶级当作资产阶级打倒。因此，党的干部只有自觉限制资产阶级法权，当好普通劳动者，才能在继续革命的大道上迈步前进。"},{"type":"paragraph","text":"经过批林批孔和学习无产阶级专政理论，这个厂的党组织、革委会领导成员认识到，干部参加集体生产劳动，是反修防修坚持无产阶级专政下继续革命的一件大事。他们规定了干部参加劳动的制度，提出了对干部参加劳动的具体要求。党组织和革委会的领导成员认真执行制度，坚持深入车间班组参加劳动，拜师学艺，努力掌握一门到几门生产技术。现在，这个水泥厂已有一半以上的领导成员和机关干部，在三个生产车间和扩建工地的许多岗位上，象工人一样顶班劳动。"},{"type":"paragraph","text":"基建公司水泥厂的领导成员通过深入车间班组搞三同，进一步端正了企业的方向、路线，增强了执行毛主席革命路线的自觉性。文化大革命中，这个厂的干部职工对刘少奇的“物质刺激”、“利润挂帅”等修正主义办企业路线进行了批判，但当时由于工厂领导没有与工人搞三同，对它的危害性认识还不深，因此一度产生了修正主义路线回潮的现象。有的干部又搞了“定额包产”、多发加班费一类变相的物质刺激的办法，还自认为是符合“按劳分配，多劳多得”的社会主义原则。以后，他们通过深入车间，和工人一起搞三同，听取群众的意见，深切地体会到过去搞“物质刺激”给企业带来的严重恶果。在反击右倾翻案风的斗争中，厂领导放手发动群众，联系实际批邓，解剖典型事例，开展对修正主义办企业路线的批判，从而分清了是非界限，提高了贯彻执行毛主席革命路线的自觉性。"},{"type":"paragraph","text":"这个厂的领导干部在和群众同劳动中，加强了自身世界观的改造，密切了和群众的关系。厂革委会副主任赵庆堂，通过到车间班组搞三同，和工人一起出力流汗，对工人的感情加深了。经过一年多的实践，现在他不仅掌握了三个生产车间主要岗位的操作技术，而且密切了和群众的关系。一批从工人中提拔起来的新干部，更是工作服经常不离身，白天黑夜和工人一起干。群众满意地称赞说：“他们走上了领导岗位，没有离开工人的行列。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"宁夏文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"692a31bae2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
