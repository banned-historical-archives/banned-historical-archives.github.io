放武装力量向林彪同志表示祝贺","authors":[],"dates":[{"year":1967,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阮友寿主席热烈电贺毛主席"},{"type":"paragraph","text":"中国爆炸氢弹是对南越人民巨大鼓舞"},{"type":"paragraph","text":"陈南忠同志代表南越解放武装力量向林彪同志表示祝贺"},{"type":"paragraph","text":"新华社二十日讯　毛泽东主席、中共中央和国务院收到了越南南方民族解放阵线中央委员会主席团主席阮友寿发来的祝贺我国第一颗氢弹爆炸成功的电报。电报全文如下：毛泽东主席中国共产党中央委员会中华人民共和国政府"},{"type":"paragraph","text":"值此中国第一颗氢弹爆炸成功之际，我代表越南南方人民、越南南方民族解放阵线中央委员会，并以我个人名义，谨向主席、中华人民共和国政府和兄弟的全体中国人民表示最热烈的祝贺。"},{"type":"paragraph","text":"这个巨大的胜利是中国科学技术迅速成长过程中的一个飞跃，是对美帝国主义侵略政策和核讹诈的沉重打击，是对正在进行抗美救国战争的越南南方人民的巨大鼓舞和支持，是对民族解放斗争和保卫世界和平事业作出的非常宝贵的贡献。"},{"type":"paragraph","text":"我们对兄弟的中国人民的新的辉煌成就感到欢欣鼓舞，谨向从事制造和试验的全体干部、战士、工程师、工人、技术员表示热烈的赞扬。"},{"type":"paragraph","text":"祝中国人民在核子科学和技术方面达到更高的顶峰。"},{"type":"paragraph","text":"越南南方民族解放阵线中央委员会主席团主席"},{"type":"paragraph","text":"阮友寿"},{"type":"paragraph","text":"一九六七年六月十九日"},{"type":"paragraph","text":"于越南南方"},{"type":"paragraph","text":"新华社二十日讯　林彪国防部长收到了越南南方民族解放阵线中央委员会军事委员会主任陈南忠十九日发来的祝贺我国第一颗氢弹试验成功的电报。贺电全文如下：北京尊敬的中华人民共和国国防部长林彪阁下："},{"type":"paragraph","text":"欣悉你们第一颗氢弹试验成功的消息，我们感到无比喜悦和兴奋。我代表越南南方解放武装力量并以我个人名义，向您和中国人民解放军全体干部战士，向中国人民致以最热烈的祝贺。"},{"type":"paragraph","text":"中国在核武器领域内的这一新的跃进使中国人民的国防力量更加强大，也是对正处于抗美前线的越南南方军民的一个无比巨大的鼓舞。"},{"type":"paragraph","text":"向为中国第一颗氢武器试验的圆满成功作出贡献的中国人民解放军干部战士和中国人民热烈欢呼。"},{"type":"paragraph","text":"祝你们在核武器领域内迅速地取得更加巨大的成绩，为各民族人民的革命斗争事业和保卫世界和平作出更为重要的贡献。"},{"type":"paragraph","text":"越南南方民族解放阵线中央委员会军事委员会主任"},{"type":"paragraph","text":"陈南忠"},{"type":"paragraph","text":"一九六七年六月十九日"},{"type":"paragraph","text":"于越南南方"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"392c580079"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
