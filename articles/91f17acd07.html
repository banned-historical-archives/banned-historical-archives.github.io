rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刻苦学习毛主席著作促进思想革命化做一个坚强的彻底的无产阶级女战士","authors":[],"parts":[{"type":"paragraph","text":"新华社二日讯 “三八”国际劳动妇女节即将到来，最近一期的《中国妇女》杂志发表社论，号召广大妇女要以学习毛主席著作，促进思想革命化，学习解放军无产阶级化的革命精神，来纪念今年的“三八”国际劳动妇女节。"},{"type":"paragraph","text":"这篇社论的题目是《刻苦学习毛主席著作，促进思想革命化》。社论指出，刻苦学习毛主席著作，促进思想革命化，对每个女干部女职工来说，都是非常迫切需要的。所谓思想革命化，就是无产阶级化，就是共产主义化，也就是用无产阶级思想，彻底克服资产阶级思想，彻底克服一切旧思想和旧习惯，用无产阶级的立场、观点、方法来看问题和处理问题。"},{"type":"paragraph","text":"社论号召广大妇女要一面认真学习毛主席著作，同时积极投入阶级斗争、生产斗争、科学实验三大革命运动，在革命和建设的实践中，自觉地进行兴无产阶级思想灭资产阶级思想的革命，不断提高阶级觉悟，培养革命品质。"},{"type":"paragraph","text":"社论说，要想做一个坚强的彻底的无产阶级女战士，就必须要有坚定的无产阶级的立场，远大的共产主义理想，要勤勤恳恳全心全意地为人民服务，要有朝气蓬勃、踏踏实实的工作作风，要有艰苦奋斗的革命精神。"},{"type":"paragraph","text":"社论说：认真学习毛主席著作，思想不断革命化，这是一件长期的艰巨的任务。要认真地学，持久地学，要学以致用，学到做到。社会主义革命和社会主义建设深入发展，向我们提出思想革命化的要求越来越迫切，越来越高，我们女干部女职工要为社会主义革命和社会主义建设贡献出更大的力量，就要学习、学习、再学习，提高、提高、再提高。"},{"type":"paragraph","text":"社论最后说，今年是大比之年，大学之年。全国城乡比先进、学先进、赶先进、帮后进的运动，正在更普遍更深入地开展起来，全国各地向解放军学习的热潮正在兴起。在这样大好形势下，我们广大妇女群众、女干部女职工和各级妇联组织，都要积极响应向解放军学习的战斗号召。我们要学习解放军高举毛泽东思想的伟大红旗，在一切工作中用毛泽东思想挂帅，学习解放军长期学习毛主席著作，活学活用毛泽东思想，学习解放军无产阶级化的革命精神。我们要下定决心，长期奋斗，努力提高革命自觉性，思想不断革命化，把工作做得更好更出色，对社会主义革命和社会主义建设做出更多更大的贡献。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91f17acd07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
