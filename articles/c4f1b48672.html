[{"year":1952,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:通过一系列的学习，我认识到自己已被资产阶级思想所腐蚀了。我父亲是洋行里的高级职员，他要我将来到美国留学，做生意一定要做美国人的生意。我说对航海有兴趣，他要我学习英国的“皇家海军”，以便将来担任船长、讨英国籍老婆等等。我父亲就用这些殖民地的买办思想来毒害我；在生活上又教我怎样把西装领结打得好看，和培养我的个人英雄主义。这一套腐朽的资产阶级思想和崇美的奴化教育，在我的心灵上留下了可怕的印象。我现在完全明白这种极端错误的思想如果不加以根除，将来有走上反动道路的危险的。我决心在三反、五反斗争中跳出资产阶级思想的泥坑，作为我进行思想改造的良好开端。"},{"type":"paragraph","text":"华东师大附中学生　方觉民"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4f1b48672"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
