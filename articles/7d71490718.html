rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"乔森潘团长英·萨利副团长等观看革命现代京剧《杜鹃山》宾努首相等应邀出席周恩来叶剑英吴德等陪同观看","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年四月四日讯 柬埔寨民族统一阵线和王国民族团结政府代表团团长乔森潘副首相、副团长英·萨利特别顾问，以及代表团团员和随行人员，今天应邀出席文艺晚会，观看了由北京京剧团演出的革命现代京剧《杜鹃山》。"},{"type":"paragraph","text":"宾努首相和夫人，柬埔寨民族统一阵线成员、王国民族团结政府官员和王室成员，以及在北京的柬埔寨专家、留学生，应邀出席文艺晚会。"},{"type":"paragraph","text":"我国党、政领导人和有关方面负责人周恩来、叶剑英、吴德、耿飚、韩念龙、于会泳、丁雪松和中国驻柬埔寨大使康矛召，陪同柬埔寨战友观看演出。"},{"type":"paragraph","text":"当柬埔寨贵宾在我国党、政领导人陪同下走进剧场时，场内响起了雷鸣般的掌声，向战友们表示热烈欢迎。"},{"type":"paragraph","text":"演出结束时，柬埔寨贵宾由我国党、政领导人陪同，走上舞台，同演员们亲切握手，并赠送花篮，祝贺演出成功。"},{"type":"paragraph","text":"今天的晚会是北京市革命委员会和中国人民对外友好协会，为欢迎柬埔寨民族统一阵线和王国民族团结政府代表团访华而举办的。（附照片）"},{"type":"paragraph","text":"演出结束时，柬埔寨贵宾由我国党、政领导人陪同，走上舞台祝贺演出成功。（新华社记者 摄）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d71490718"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
