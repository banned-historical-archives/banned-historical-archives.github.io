script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议农业资本家的残酷剥削和压迫  美国科罗拉多州农业工人罢工","authors":[],"dates":[{"year":1970,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议农业资本家的残酷剥削和压迫"},{"type":"paragraph","text":"美国科罗拉多州农业工人罢工"},{"type":"paragraph","text":"新华社讯　华盛顿消息：美国科罗拉多州圣路易斯山谷地区的农业工人不久前举行罢工，抗议农业资本家的残酷剥削和压迫，要求提高工资和保障工人权利。"},{"type":"paragraph","text":"圣路易斯山谷地区农业工人冲破反动当局和农业资本家的种种破坏和阻挠，坚持罢工斗争。他们的罢工，得到科罗拉多州其他人民的广泛同情和支持。"},{"type":"paragraph","text":"罢工工人表示：如果资本家不答应他们的要求，他们在整个收获季节决不复工。"},{"type":"paragraph","text":"圣路易斯山谷地区是美国的所谓“饥饿地区”之一。这个地区的人口约三千万。当地的劳动人民受到比其他地区劳动人民更为沉重的压迫和剥削。这次罢工的圣路易斯山谷地区的农业工人大部分是墨西哥族的女工和青少年工人。他们的收入低微，居住和生活条件十分恶劣。他们的罢工一开始，当地的统治当局立即委任当地的农业资本家作为他们的代表，以此来加强保护资本家的利益，同时让一些商业资本家提高物价来胁迫罢工的农业工人。此外，他们还企图用招募临时工的办法来破坏罢工。但是这种种阴谋都遭到罢工的农业工人的有力反击。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33f62627bb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
