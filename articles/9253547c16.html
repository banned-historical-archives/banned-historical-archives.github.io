uthors":["刘少奇"],"dates":[{"year":1950,"month":12,"day":24}],"is_range_date":false,"parts":[{"text":"刘少奇给湖南省长王首道的信","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"[王首道：中共湖南省委副书记，湖南省人民政府主席]","type":"subtitle"},{"text":"首道同志：","type":"appellation"},{"text":"我的七哥刘作衡由北京回家，路经长沙，请你招待数日，他即自行回家。据他说乡下征粮有一些是过重的，交不起，这恐不完全是地主们的叫嚣，有加以考虑之必要。又我六哥家中因无劳动力，他儿子出来参加工作十余年，不能顾家，现家中老小数口要吃，亦交不起粮，不知有无办法减少。又我七哥有一个孙子，想到长沙学校读书，不知是否有免费的学校给他入学，如有，望给以帮助，麻烦之处，望予原谅。","type":"paragraph"},{"text":"此致","type":"paragraph"},{"text":"敬礼","type":"appellation"},{"text":" 刘少奇十二月二十四日","type":"paragraph"}],"comments":[],"origin":"一九五七年九月，人民出版社资料室《批判资料：中国赫鲁晓夫刘少奇反革命修正主义言论集》（1958．6—1967．7）（387）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9253547c16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
