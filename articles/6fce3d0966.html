":[],"dates":[{"year":1953,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社北京八日电:应邀前来我国的朝鲜民主主义人民共和国访华铁道艺术团七日晚在怀仁堂举行音乐舞蹈表演会，表演会由中央人民政府铁道部主持。"},{"type":"paragraph","text":"中央人民政府毛泽东主席出席了表演会。"},{"type":"paragraph","text":"出席表演会的还有中央人民政府刘少奇副主席，李济深副主席，政务院周恩来总理，以及中央人民政府委员，中国人民政治协商会议全国委员会委员，中央人民政府各院、委、部、会、署、行负责人，西藏致敬团人员，中央人民政府铁道部高级干部，以及曾赴朝鲜参加抗美援朝斗争的铁路职工功臣和文艺界人士共一千多人。"},{"type":"paragraph","text":"应邀出席表演会的有朝鲜驻我国大使权五稷和使馆人员，苏联驻我国大使潘友新和使馆人员，以及前中国长春铁路管理局苏籍工作人员多人。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国访华铁道艺术团在表演会上，表演了许多出色的节目。这些节目，充分表现了战斗中的朝鲜人民的英勇气概与朝中两国人民的深厚的战斗友谊。这些节目都受到了观众热烈的欢迎。"},{"type":"paragraph","text":"同日晚上，周恩来总理曾在怀仁堂设宴欢迎该团全体人员。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fce3d0966"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
