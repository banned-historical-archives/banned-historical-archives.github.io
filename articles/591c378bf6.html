script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"增强无产阶级党性　克服资产阶级派性  太原铁路分局革命生产形势越来越好","authors":[],"dates":[{"year":1969,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"增强无产阶级党性　克服资产阶级派性"},{"type":"paragraph","text":"太原铁路分局革命生产形势越来越好"},{"type":"paragraph","text":"新华社太原十三日电　太原铁路分局革委会在解放军支左人员的帮助下，率领广大革命工人坚决贯彻执行伟大领袖毛主席的一系列最新指示和以毛主席为首、林副主席为副的党中央的各项战斗号令，深入开展革命大批判，增强无产阶级党性，克服资产阶级派性，促使革命大联合和革命三结合不断巩固和发展，生产面貌日新月异，铁路运输畅通无阻。八月份的装车量和卸车量都超额完成了计划指标，比七月份提高一倍以上。九月份的装车量和卸车量，比八月份又分别提高百分之五十一和百分之四十七以上。进入十月以后，各项主要生产指标都继续提高。"},{"type":"paragraph","text":"最近一个多月以来，革委会在解放军支左人员帮助下，率领广大革命工人紧跟毛主席的伟大战略部署，坚决贯彻执行党中央的战斗号令，掀起了声势浩大的革命大批判新高潮。广大革命工人怀着无限忠于伟大领袖毛主席的红心，在毛泽东思想学习班里大讲毛主席对铁路工人的亲切关怀，狠狠批判了大叛徒刘少奇的反革命修正主义路线，促使革命和生产形势大大向前发展。"},{"type":"paragraph","text":"为了认真落实毛主席的最新指示和党中央的战斗号令，搞好革命大批判，各级革委会成员普遍深入到基层和群众一起学习，一起斗私批修。许多单位还组织了宣传小分队到沿线各车站、工区和工人宿舍进行宣传。通过学习，广大革命工人提高了阶级斗争和两条路线斗争的觉悟，很快克服了资产阶级派性，增强了无产阶级党性，增强了在毛泽东思想基础上的革命团结。"},{"type":"paragraph","text":"太原铁路分局革委会还在全分局范围内广泛深入地开展了加强革命纪律的教育。革命工人以毛主席的最新指示和党中央的战斗号令为强大的思想武器，通过摆资产阶级派性的表现，讲无政府主义思潮的危害，谈增强无产阶级党性的意义，订出了遵守革命纪律的措施，现在全局出现了人人自觉遵守革命纪律的大好局面。"},{"type":"paragraph","text":"目前，太原铁路分局革委会和广大革命工人正积极响应首都钢铁公司关于开展社会主义革命竞赛的建议，决心戒骄戒躁，乘胜前进，创造更加优异的成绩，为伟大的社会主义祖国争光。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"591c378bf6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
