ates":[{"year":1951,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我留英学生写信给毛主席"},{"type":"paragraph","text":"响应抗美援朝保家卫国运动"},{"type":"paragraph","text":"【新华社布拉格七日电】伦敦消息：留英中国学生总会于去年十二月二十六日写信给毛主席，响应中国人民抗美援朝保家卫国运动，并向英勇的中国人民志愿军致敬。原函内称：“全国人民强大的呼声已经传到了这里，我们决意加速完成学业，尽早回国，投入祖国人民的阵营。我们热烈地支持抗美援朝保家卫国的正义斗争。美国帝国主义的侵略企图必被粉碎，这已在最近朝鲜战局的胜利中表现出来。在这里，我们兴奋地庆祝平壤的解放，并盼望着更大的和最后的胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"269d9b97cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
