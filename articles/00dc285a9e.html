archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"朱洪霞在江岸区环卫所集会上的讲话（节录）","alias":"","parts":[{"type":"paragraph","text":"请。”“学理论，批邓修，查反革命谣言，请革命造反派的千部和群众出来工作，主要是请基层革委会的成员和干部出来工作。”"},{"type":"paragraph","text":"五月八日夏邦银、胡厚民等人在长航"},{"type":"paragraph","text":"集会上的讲话 （节录）"},{"type":"paragraph","text":"夏邦银说：“当前主要的任务是要追查谣言，要抓住不放，这几天就于这件事，别的事不干。追查谣言我们不能依靠省委。省委对‘江青九·七讲话’追得很起劲，追查‘总理遗言’很不得力，”“我们对追查政治谣言一定要抓住不放，追到底。追查政治谣言就是对翻案派、复辟派、走资派的沉重打击。抓追查政治谣言是大方向。\""},{"type":"paragraph","text":"胡厚民说：“有的同志说，我们撤出十三号楼以后，温度下降了，是不是我们搞错了？告诉同志们，我们没有错。我们前一段的搞法大方向是正确的。是我们第一个提出‘打倒邓小平，消灭还乡团。’毛主席说，对文化大革命要三、七开。打倒一切，全面内战只是三分，说明我们的成绩是主要的。”"},{"type":"paragraph","text":"：五月二十二日朱洪霞在江岸区环卫所"},{"type":"paragraph","text":"集会上的讲话 （节录）·朱洪霞说：．“现在有人说我们熄火了，怎么熄火了呢？我们没有熄火嘛！我们现在斗争方式改变了，不能象以前那样，乱冲，乱，撞。”接着他谈到资产阶级法权，说：“以后我们掌了权，也要搞点法权，但不能象他们那样搞。”"},{"type":"paragraph","text":"“中央有个老造反派支持我们，这个老造反派叫我们赶快把湖北武汉地区的情况写个材料给他。最近，我和夏邦银、谢望春、吴金、李想玉等五、六个人连夜赶写材料，连觉也睡不成。”“关于我们党组织的问题（按：指入党问题）他们不按中央的指示办，他们要犯错误的。我在很多会上，多次说过，武汉电信局的方景清搞得很不错，斗争很讲策略，搞的有理、有利、有节。人虽然不多，但是牌子终于挂出去了，我们不要千篇一律的挂革委会的牌子，有的原来没有革委会，现在挂牌子，他们就会说你是另立山头，就要抓辩子。”"},{"type":"paragraph","text":"“中央已经讲了，邓小平是还乡团的团长。邓小平揪出来了，还要把团员搞出来。邓小平搞修正主义是有组织的，肯定不是邓小平一个，现在不是熄火，我们造反派要进一步动员起来，进行斗争。”"},{"type":"paragraph","text":"七月九日夏邦银、胡厚民讲话（节录）"},{"type":"paragraph","text":"七月九日，夏邦银、胡厚民等人，召开形势分析会。会上，他们说：“我们各省的情况都作了了解，四川最好，放了人，其他省没有这样做。四川不仅人放了，而且还安排了工作。河南造反派内"},{"type":"paragraph","text":"胡厚民说：“有的同志说，我们撤出十三号楼以后，温度下降了，是不是我们搞错了？告诉同志们，我们没有错。我们前一段的搞法大方向是正确的。是我们第一个提出‘打倒邓小平，消灭还乡团。’毛主席说，对文化大革命要三、七开。打倒一切，全面内战只是三分，说明我们的成绩是主要的。”"},{"type":"paragraph","text":"：五月二十二日朱洪霞在江岸区环卫所"},{"type":"paragraph","text":"集会上的讲话 （节录）·朱洪霞说：．“现在有人说我们熄火了，怎么熄火了呢？我们没有熄火嘛！我们现在斗争方式改变了，不能象以前那样，乱冲，乱，撞。”接着他谈到资产阶级法权，说：“以后我们掌了权，也要搞点法权，但不能象他们那样搞。”"},{"type":"paragraph","text":"“中央有个老造反派支持我们，这个老造反派叫我们赶快把湖北武汉地区的情况写个材料给他。最近，我和夏邦银、谢望春、吴金、李想玉等五、六个人连夜赶写材料，连觉也睡不成。”“关于我们党组织的问题（按：指入党问题）他们不按中央的指示办，他们要犯错误的。我在很多会上，多次说过，武汉电信局的方景清搞得很不错，斗争很讲策略，搞的有理、有利、有节。人虽然不多，但是牌子终于挂出去了，我们不要千篇一律的挂革委会的牌子，有的原来没有革委会，现在挂牌子，他们就会说你是另立山头，就要抓辩子。”"},{"type":"paragraph","text":"“中央已经讲了，邓小平是还乡团的团长。邓小平揪出来了，还要把团员搞出来。邓小平搞修正主义是有组织的，肯定不是邓小平一个，现在不是熄火，我们造反派要进一步动员起来，进行斗争。”"},{"type":"paragraph","text":"七月九日夏邦银、胡厚民讲话（节录）"},{"type":"paragraph","text":"七月九日，夏邦银、胡厚民等人，召开形势分析会。会上，他们说：“我们各省的情况都作了了解，四川最好，放了人，其他省没有这样做。四川不仅人放了，而且还安排了工作。河南造反派内"}],"authors":["朱洪霞"],"dates":[{"year":1976,"month":5,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":16,"page_end":16},"tags":[{"name":"邓小平","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00dc285a9e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
