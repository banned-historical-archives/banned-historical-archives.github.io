rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"马来西亚总理抵京对我国进行友好访问华国锋总理、邓小平副总理等到机场热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"据新华社五月二日讯 马来西亚总理达图·侯赛因·奥恩和夫人应我国政府邀请前来进行正式友好访问，今天下午乘专机到达北京。"},{"type":"paragraph","text":"华国锋总理、邓小平副总理和夫人卓琳到机场热烈欢迎马来西亚贵宾。到机场欢迎的还有，外交部长黄华、副部长仲曦东，外贸部副部长贾石，交通部副部长陶琦，民航总局副局长吕正哲，中国驻马来西亚大使叶成章和夫人张琬。"},{"type":"paragraph","text":"当侯赛因总理和夫人微笑着步出机舱时，欢迎群众手捧花束，高举两国国旗，向贵宾们致意，机场上顿时沉浸在友谊的欢乐中。华国锋总理和邓小平副总理在飞机舷梯旁迎候马来西亚贵宾，同侯赛因总理和夫人热情握手。"},{"type":"paragraph","text":"去年十一月，邓小平副总理访问马来西亚时曾经表示，热切地期望在今年春暖花开的时候，欢迎侯赛因总理和夫人访问中国。今天，侯赛因总理和夫人在这生机勃勃的春天来到中国进行正式友好访问，将会使中马两国友好关系得到进一步发展。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f66fa54491"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
