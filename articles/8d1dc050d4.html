ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对五评苏共中央的公开信稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对五评苏共中央的公开信稿的"},{"type":"paragraph","text":"批语和修改2"},{"type":"paragraph","text":"（1963年11月18日）即送康生同志："},{"type":"paragraph","text":"在最后一页上有一点小的修改，请酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十八日上午二时"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"帝国主义和各国反动派的侵略和战争行为，正在教育世界各国人民逐步觉悟起来。社会实践是检验真理的唯一标准。那些在战争与和平问题的认识上有错误观点的人，在帝国主义和反动派的反面"},{"type":"paragraph","text":"[1]人民日报编辑部、红旗杂志编辑部《在战争与和平问题上的两条路线—五评苏共中央的公开信》一文，在1963年11月19日《人民日报》和《红旗》杂志1963年第二十二期上发表。"},{"type":"paragraph","text":"[2]本篇一是毛泽东在五评苏共中央的公开信定稿第一页上写的批语。二是毛泽东对这篇文章定稿的修改。其中用宋体字排印的是毛泽东加写的文字。毛泽东全集第四十六卷教育之下，我们相信，有很多人会改变过来。对此，我们寄予很大的希望。"},{"type":"paragraph","text":"社会实践是梭身里的唱一摆湛"},{"type":"paragraph","text":"我面这是一条适应类帝围生义全球战略的路接。"},{"type":"paragraph","text":"这不是保卫世界和平的遗路，而是助长战争危险导致战争的道路。"},{"type":"paragraph","text":"大战精夕的世界了。现在"},{"type":"paragraph","text":"目前的世界，/已远子已趣有了一个强大的社"},{"type":"paragraph","text":"亚洲、非洲和拉丁美洲的民族解放运动风起去涌。世界"},{"type":"paragraph","text":"已大大提商。世界革命人民的力量已经大大地强。苏联人民社主义各国人民、世界各国人"},{"type":"paragraph","text":"秒他们的吹鼓手们支配自己的会民，绝不能听凭帝国主义战争运。"},{"type":"paragraph","text":"帝国主义和各国反动派的使略和战争行为悟起来。那些在战争与和平同题的认上有婚观点的人，在帝国主义和反动派的反面教育之下，很多人会受交过来。对此，我积界于希望。很大h"},{"type":"paragraph","text":"我们相信，全世界共产党人，全世界人民只要能拆穿帝国主义的骗局，破修正主义的谎吉，沉证护世界和平的担子担当起来，就一定能约粉碎帝国主义发动新的世界大战的计划，保卫住世界和平。"},{"type":"paragraph","text":"毛泽东修改《在战争与和平问题上的两条路线一五评苏共中央的公开信》的手稿（部分）。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":99,"page_end":100},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d1dc050d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
