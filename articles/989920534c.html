ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"自前国际国内的形势中","alias":"","parts":[{"type":"paragraph","text":"目前国际国内的形势！"},{"type":"paragraph","text":"（1944年5月20日）"},{"type":"paragraph","text":"目前国际形势和国内形势都是反法西斯力量上升，人民革命力量上升，所以就全世界来说是胜利快要到来，就中国来说也是胜利快要到来。目前我们就是如何迎接胜利，因此要特别强调两个问题。一是要防止骄傲。骄傲是最害人的，在我们党的历史上上了骄傲不少的当。骄傲像一个包袱，什么人都可以背上这个包袱。现在是要放下这个包袱，放下这个包袱才能接近群众。我们每个同志都不要骄傲，不要只看到自己的长处，要随时看到自己的不足，随时学习。二是要打开思想，善于思索问题。如果大家放下了骄傲这个包袱，能接近群众，可是不能替群众解决问题，还是没有用。现在就是要大家多想问题，才能解决问题。"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":5,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":448,"page_end":448},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"989920534c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
