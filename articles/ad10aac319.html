ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"致景荣臻电","alias":"","parts":[{"type":"paragraph","text":"致聂荣臻电！"},{"type":"paragraph","text":"（1945年10月16日）"},{"type":"paragraph","text":"蒋系十六军主力已达石家庄，可能迅到北平，九十二军从武汉、九十四军从上海均于酉东开始空运至平、津，现已半月，月底运完，故本月底蒋系至少有三个军到平、津，望注意平、津蒋军动向之侦察。"},{"type":"paragraph","text":"[1]这是毛泽东致聂荣臻电的主要内容。"},{"type":"paragraph","text":"[2]第十六军属胡宗南建制，是由山西运城沿同蒲路、正太路运至石家庄的。邯郸战役（平汉战役）中，该军由石家庄南下，以配合孙连仲部北上，企图南北夹击晋冀鲁豫军区主力。因刘邓部队在邯郸战役中迅速取胜，该军缩回石家庄。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":434,"page_end":434},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad10aac319"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
