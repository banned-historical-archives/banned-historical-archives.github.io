],"dates":[{"year":1968,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十二日讯　阿根廷、智利、乌拉圭、玻利维亚的工人，最近又掀起反对压迫和剥削的斗争浪潮。"},{"type":"paragraph","text":"在阿根廷，具有斗争传统的图库曼糖业工人，十二月三日在图库曼市举行了有一千五百多人参加的街头示威。工人们强烈抗议工厂主用拖欠工资、裁减工人等手段残酷压榨工人。门多萨省“环球”酿酒厂的工人和职员在十二月四日曾占领了厂房，反对资方长期欠付工资。"},{"type":"paragraph","text":"在智利，铁路、矿业、冶金工业等系统的近七千名工人和职员，从十二月七日到十一日连续举行局部性罢工或不定期罢工，抗议垄断资本对工人的压榨，要求提高工资。"},{"type":"paragraph","text":"乌拉圭工人，最近几天在首都蒙得维的亚又举行了三十三次罢工。在此以前，印刷工人曾举行四十八小时罢工。"},{"type":"paragraph","text":"玻利维亚由日本垄断资本控制的日东矿业公司的矿工，在十一月下旬开始举行无限期的总罢工，强烈抗议资方顽固拒绝工人们提出的正当要求。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c73d73ac35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
