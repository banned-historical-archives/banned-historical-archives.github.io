,"dates":[{"year":1979,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马里贵宾瞻仰毛主席遗容"},{"type":"paragraph","text":"陈慕华副总理同迪亚拉副主席会谈"},{"type":"paragraph","text":"新华社北京五月十七日电  马里全国解放军事委员会副主席、马里人民民主联盟副总书记、财贸部长阿马杜·巴巴·迪亚拉上校和夫人等马里贵宾，今天上午前往毛主席纪念堂，瞻仰了毛泽东主席遗容。"},{"type":"paragraph","text":"外交部副部长何英陪同瞻仰。"},{"type":"paragraph","text":"新华社北京五月十七日电  国务院副总理陈慕华同马里全国解放军事委员会副主席、马里人民民主联盟副总书记、财贸部长阿马杜·巴巴·迪亚拉上校今天举行了会谈。"},{"type":"paragraph","text":"新华社北京五月十六日电  马里全国解放军事委员会副主席、马里人民民主联盟副总书记、财贸部长阿马杜·巴巴·迪亚拉上校和夫人以及由巴巴·迪亚拉副主席率领的马里友好访问团，应我国政府邀请，前来进行正式访问，今天下午乘飞机到达北京。"},{"type":"paragraph","text":"国务院副总理陈慕华，外交部副部长何英和夫人王浩，外贸部副部长贾石和其他有关方面负责人到机场欢迎。"},{"type":"paragraph","text":"在军乐队奏马里和中国两国国歌后，巴巴·迪亚拉副主席由陈慕华副总理陪同检阅了中国人民解放军陆海空三军仪仗队。"},{"type":"paragraph","text":"今天到机场迎接的还有马里驻中国大使高雷西和一些非洲国家驻中国的外交使节。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71c917ddaa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
