,"dates":[{"year":1956,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见阿查里雅首相"},{"type":"paragraph","text":"周总理邀请阿查里雅首相共进晚餐"},{"type":"paragraph","text":"新华社26日讯　中华人民共和国毛泽东主席，今天晚间八时在中南海勤政殿接见了尼泊尔王国首相坦卡·普拉萨德·阿查里雅和他的夫人，尼泊尔驻华大使拉纳中将，尼泊尔外交部外事秘书纳腊普腊塔普·塔帕，尼泊尔人民党主席巴德腊卡里·米斯腊，以及首相随行的其他高级官员。"},{"type":"paragraph","text":"接见的时候在座的，有中华人民共和国副主席朱德，全国人民代表大会常务委员会委员长刘少奇，国务院总理周恩来，z代表大会常务委员会副委员长李济深、郭沫若、黄炎培、彭真、陈叔通、赛福鼎，国务院副总理陈云、彭德怀、贺龙、乌兰夫，外交部副部长张闻天、章汉夫，中国驻尼泊尔大使潘自力。"},{"type":"paragraph","text":"新华社26日讯　中华人民共和国国务院总理周恩来及夫人，在今天晚间邀请尼泊尔王国首相坦卡·普拉萨德·阿查里雅及夫人共进晚餐。"},{"type":"paragraph","text":"尼泊尔王国方面应邀出席的，还有尼泊尔驻华大使拉纳中将，尼泊尔王国外交部外事秘书纳腊普腊塔普·塔帕。"},{"type":"paragraph","text":"陪同进餐的，有国务院副总理乌兰夫，外交部副部长章汉夫，中国驻尼泊尔大使潘自力及夫人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8b6479cfd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
