art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席万岁！","authors":["从头越"],"parts":[{"type":"paragraph","text":"驻守在西南边疆西双版纳密林中的某部八连，开过庆祝“九大”胜利闭幕的大会以后，天快亮了。战士们的心，还在激烈地跳动。五班的同志们聚集在煤油灯下，打开崭新的笔记本，写下自己的钢铁誓言。有的同志写下了：“永远忠于毛主席，海枯石烂不变心。”壮族新战士赵文启，写下了世界上最美好的语言：“毛主席万岁！”"},{"type":"paragraph","text":"新战士赵文启，由于大叛徒刘少奇疯狂反对毛主席的无产阶级教育路线，竭力推行反革命修正主义教育路线，扼杀了成千上万个农村小学，使得他从小没有上学的机会，成了一字不识的文盲。今年春天，这个壮族贫农的儿子，来到连队以后，副班长朱恒昌经常帮助他学习写“毛主席万岁！”这五个金光闪闪的大字。朱恒昌的家和赵文启一样，在万恶的旧社会，都有着一部苦难史。他完全理解新战士赵文启学习写“毛主席万岁！”这五个金光闪闪大字的愿望。他手把着赵文启粗壮的手，心贴着赵文启火热的心，一字一字地教他认，一笔一划地教他写。经过一段时间的努力，赵文启多年的愿望终于实现了。现在，赵文启能够在“九大”胜利闭幕这个特大喜讯传来的时候，自如地写上“毛主席万岁！”这五个字，感到多么幸福啊！"},{"type":"paragraph","text":"“毛主席万岁！”这五个金光闪闪的大字，表达了革命战士对伟大领袖毛主席最深厚的无产阶级感情。这五个金光闪闪的大字，使我们胸怀开阔，浑身是劲，无所畏惧，信心百倍。我们永远紧跟毛主席，革命到底志不移！"},{"type":"paragraph","text":"朝霞染红了林海。赵文启怀着无限忠于伟大领袖毛主席的深厚无产阶级感情，在副班长的带领下，迎着喷薄而出的朝阳，走上了保卫祖国边防的战斗岗位。（从头越）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e9905c583"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
