争结合起来，挖出了一小撮埋藏得很深的阶级敌人，粉碎了右倾翻案妖风","authors":[],"dates":[{"year":1968,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在夺取无产阶级文化大革命全面胜利的大好形势下，复旦大学革命委员会响应上海市革命委员会的号召，在军训团的帮助下，高举毛泽东思想伟大红旗，全面落实毛主席最新指示，发动广大革命师生员工大摆前阶段清理阶级队伍的成绩，总结经验，大查敌情，乘胜追击，向一小撮埋藏得更深的阶级敌人发动了更猛烈的进攻，掀起了对敌斗争的新高潮，打开了新局面。"},{"type":"paragraph","text":"最近，校革委会召开了全校革命师生员工大会，总结了前阶段清理阶级队伍的工作，充分肯定成绩，也指出了存在的缺点和错误，并就下阶段深入开展对敌斗争作了动员。紧接着，召开了“高举毛泽东思想伟大红旗，斗争叛徒、特务、走资派和现行反革命分子大会”。通过狠揭狠批，大大鼓起了全校革命师生员工的斗志，进一步挖出了一小撮埋藏得很深的叛徒、特务、反革命分子和破坏无产阶级文化大革命的现行反革命分子，击退了这些阶级敌人掀起的右倾翻案妖风。"},{"type":"paragraph","text":"这些成绩的取得，是毛泽东思想的伟大胜利。毛主席最新指示发表后，校革委会为了全面落实毛主席最新指示，紧跟毛主席的伟大战略部署，举办了由各系、各单位负责清理阶级队伍工作的同志参加的专题毛泽东思想学习班。这次学习班是全校规模最大，也是效果最好的一次。在学习班里，大家认真地学习了有关文件，进行了热烈的讨论，肯定了成绩，找出了工作中存在的问题，订出了进一步深入开展对敌斗争的计划。同时也批驳了否定校革委会清理阶级队伍工作大方向的错误论调。当下乡参加“三夏”劳动的同学回来后，校革委会又及时组织他们以班组为单位开办对敌斗争的专题毛泽东思想学习班，组织大家学习有关文件，并且结合学校运动的实践，开展了群众性的总结经验、大查敌情、深挖敌人的活动。如化学系、外文系、哲学系等，从各个角度总结了他们开展对敌斗争的经验。校革委会也及时抓住典型，总结推广。各系、各单位之间也相互进行了经验交流。通过这样一个群众性的学习、总结和交流活动，在组织上和思想上把群众发动起来，向埋藏得更深的阶级敌人发起了猛烈的进攻。"},{"type":"paragraph","text":"最近，各系、各单位在校革委会的统一领导下，制订了下阶段的作战计划。有的已雷厉风行地付之于行动。很多系和单位，如哲学系、新闻系、画书馆等，克服了单纯的军事观点，狠抓革命大批判，不仅在组织上把一小撮阶级敌人挖了出来，同时在政治上、思想上、理论上把他们批倒、批臭。他们把那些揪出来的坏家伙的反动言行和有关材料作了汇编，然后分发给革命的师生员工，发动他们以战斗组的形式，抓住黑论点，挂上黑主子，开展革命大批判。由于群众掌握了材料，人人投入了与敌人面对面的斗争，批判、斗争会的质量也不断提高，并且深入到班组、寝室，一些平时很少发言的师生也能与阶级敌人“短兵相接”，“刺刀见红”，使一小撮阶级敌人真正成为人人喊打的过街老鼠。这样，他们就把革命的大批判和清理阶级队伍的运动紧密地结合起来。许多系和单位，总结了前阶段清理阶级队伍工作神秘化，脱离群众，因而进展缓慢的经验教训，采取发动群众检举揭发和组织调查结合起来；“死”材料和“活”材料，历史问题和现行活动相结合等方法，这样就充分调动了群众的革命积极性，使阶级敌人完全陷于“人民战争”的汪洋大海之中，过去一些很难解决的问题，很快得到解决。"},{"type":"paragraph","text":"现在，全校各系各单位都密切注意一小撮阶级敌人的新动向，决心把埋藏得更深的阶级敌人统统揪出来，同时把他们批倒批臭，把无产阶级文化大革命进行到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33ecc780e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
