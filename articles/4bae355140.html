script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"复各民主党派与民主人士电","alias":"","parts":[{"type":"paragraph","text":"复各民主党派与民主人士电"},{"type":"paragraph","text":"（1948年8月1日）李济深、何香凝、沈钧儒、章伯钧、马叙伦、王绍鳌、陈其尤、彭泽民、李章达、蔡廷、谭平山、郭沫若\"诸先生，并转香港各民主党派、各人民团体及无党派民主人士公鉴："},{"type":"paragraph","text":"五月五日电示，因交通阻隔，今始奉悉。诸先生赞同党五月一日关于召开新的政治协商会议讨论并实现召集人民代表大会建立"},{"type":"paragraph","text":"[1]李济深，当时任中国国民党革命委员会中央执行委员会主席。何香凝，当时任中国国民党革命委员会中央执行委员会常务委员。沈钧儒，当时任中国民主同盟中央委员会常务委员，在香港主持盟务。章伯钧，当时任中国农工民主党中央执行委员会主席、中国民主同盟中央委员会常务委员。马叙伦，当时任中国民主促进会中央理事会常务理事。王绍整，当时任中国民主促进会中央理事会常务理事。陈其尤，当时任中国致公党中央委员会副主席。彭泽民，当时任中国农工民主党中央监察委员会主席。李章达，当时任中国国民党革命委员会中央执行委员会常务委员、中国人民救国会中央执行委员。蔡廷错，当时任中国国民党革命委员会中央执行委员会常务委员、中国国民党民主促进会代主席。谭平山，当时任中国国民党革命委员会中央执行委员会常务委员、三民主义同志联合会中央常务委员。郭沫若，当时为无党派人士，著名历史学家、文学家和社会活动家。"},{"type":"paragraph","text":"[2]指各民主党派与民主人士1948年5月5日从香港发给毛泽东并转解放区全体同胞的电报。电报谴责国民党政府“窃权卖国，史无前例”，表示拥护中国共产党在五一劳动节口号中提出的迅速召开政治协商会议的主张。民主联合政府一项主张，并热心促其实现，极为钦佩。现在革命形势日益开展，一切民主力量函宜加强团结，共同奋斗，以期早日消灭中国反动势力，制止美帝国主义的侵略，建立独立、自由、富强和统一的中华人民民主共和国。为此目的，实有召集各民主党派、各人民团体及无党派民主人士的代表们共同协商的必要。关于召集此项会议的时机、地点、何人召集、参加会议者的范围以及会议应讨论的问题等项，希望诸先生及全国各界民主人士共同研讨，并以卓见见示，易胜感荷。谨电奉复，即祈谅察。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"八月一日"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":386,"page_end":387},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bae355140"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
