art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"聂荣臻元帅徐向前元帅叶剑英元帅罗瑞卿大将接见全军统计工作会议等一批会议的同志","authors":["牛嵩林"],"parts":[{"type":"paragraph","text":"本报讯 聂荣臻元帅、徐向前元帅、叶剑英元帅、总参谋长罗瑞卿大将，11日下午接见了参加中国人民解放军海军、空军、后勤知识集训的全体同志，参加中国人民解放军全军统计工作会议、海军航空兵党委扩大会议、海军航空兵政治工作会议、北京部队四好连队代表会议、北京部队首届共青团员代表会议的全体同志。"},{"type":"paragraph","text":"陪同接见的，有萧华上将、刘亚楼空军上将、张宗逊上将、张爱萍上将、杨成武上将、杨勇上将、李天佑上将、李聚奎上将、苏振华海军上将、王宏坤海军上将、刘震空军上将、廖汉生中将、刘志坚中将、徐立清中将、萧向荣中将、张贤约中将、吴法宪空军中将、苏静中将、郑维山中将、滕海清中将、张南生中将、李作鹏海军中将、刘道生海军中将、周希汉海军中将、彭林海军中将、曹里怀空军中将、成钧空军中将等。"},{"type":"paragraph","text":"聂荣臻元帅、徐向前元帅、叶剑英元帅、罗瑞卿大将接见北京部队四好连队代表会议和共青团代表会议的同志。"},{"type":"paragraph","text":"本报记者 牛嵩林摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a03ef7cbf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
