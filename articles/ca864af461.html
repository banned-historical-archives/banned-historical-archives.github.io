学校师生返校时间的请示","authors":[],"dates":[{"year":1966,"month":1,"day":8}],"is_range_date":false,"parts":[{"text":"中共中央批转高等教育部党委关于参加“四清”运动的高等学校师生返校时间的请示","type":"title"},{"text":"各中央局，各省、市、自治区党委，中央各部委，国家机关和人民团体各党委、党组，军委总政治部：","type":"appellation"},{"text":"中央同意高教部党委一九六五年十二月二十八日《关于参加“四清”运动的高等学校师生返校时间问题的请示》。","type":"paragraph"},{"text":" 中  央一九六六年一月八日","type":"paragraph"},{"text":" （发至城乡“四清”工作团和高等学校党委）","type":"paragraph"},{"text":"高教部党委关于参加“四清”运动的高等学校师生返校时间问题的请示","type":"subtitle"},{"text":"中央宣传部并报中央：","type":"appellation"},{"text":"关于高等学校师生参加“四清”运动的时间，中央过去已有原则规定。近据许多省、市、自治区反映，由于各种原因，这一期“四清”运动的时间，普遍需要延长二三个月，最多的要延长六个月，要求参加运动的师生推迟返校时间，以便把运动搞完。","type":"paragraph"},{"text":"师生参加“四清”运动，可以受到深刻的阶级斗争的教育和锻炼，对学校的教育革命和知识分子的改造，都有很大的促进作用。全国各高等学校参加这期运动的人数达二十多万人，分布的面也很广，有的地区，师生在工作队员中占了很大的比重。如果一律要求师生按期返校，可能使运动的顺利进行受到影响。因此，我们认为，确定师生返校的时间，原则上应当服从实际工作的需要，以保证运动的胜利完成和学生受到阶级教育为前提。但在不妨碍运动开展的条件下，在可能范围内，对学校工作的安排作适当照顾也是必要的。我们的意见是：凡因工作需要，必须延期返校的，经过中央局和省（市）、自治区党委批准，可以酌情推迟师生的返校时间。文科师生一般应该从头到尾参加完这期“四清”再返校。但毕业班和外语系学生确有特殊情况（前者需要进行结业工作，按时参加国家统一分配，后者学业不宜中断过久），务望各地准予按期返校。担负上述学生的教学和政治工作任务的教师和干部，也随同返校。已参加过两期“四清”运动的师生，条件许可时，一般不再延长时间。","type":"paragraph"},{"text":"以上意见，如属可行，请批转各省（市）、自治区党委，各“四清”工作团和各高等学校执行。","type":"paragraph"},{"text":" 高等教育部党委一九六五年十二月二十八日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca864af461"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
