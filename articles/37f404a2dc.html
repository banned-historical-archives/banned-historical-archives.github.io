" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji49","name":"毛泽东全集第49卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"转发渡口驻军支左经验报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发渡口驻军支左经验报告的批语"},{"type":"paragraph","text":"（1967年3月7日）林彪、恩来\"、文革小组："},{"type":"paragraph","text":"此件似可转发全国全军，参照执行。请酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月七日"},{"type":"paragraph","text":"[1]林彪，当时任中共中央军委副主席，在中共八届十一中全会上继续当选为中央政治局常委，不久被称中央副主席。恩来，即周恩来。"},{"type":"paragraph","text":"[2]指中国人民解放军铁道兵党委1967年3月4日转发的四川渡口驻军支左联合指挥部关于“首要的是从政治思想上支持左派”的经验报告。报告说，以铁五师为主组成的支左部队来到渡口后，把支持左派的工作建立在调查研究的基础上，下功夫到群众斗争中去识别真正的左派。在对左派的支持上，又坚持首先从政治思想上帮助他们成长壮大。具体做法是：1.帮助他们在斗争中活学活用毛主席著作。2.帮助他们抓好活思想，做好团结教育工作，使之成为思想统一的有战斗力的集体。3.帮助他们保持清醒头脑，坚持斗争大方向。铁道兵党委在转发这个报告的批语中指出，解放军支持革命左派，首先要从政治上支持，这是一个正确的方法。3月8日，中共中央将渡口驻军的经验和铁道兵党委的批语一起转发各军区党委、各级党委，并指出：“渡口驻军支左联合指挥部提出了一个带有普遍性的很重要的问题，并且创造了很好的经验”，“是值得全国全军学习的，各军区党委、各级党委都应参照执行”"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":3,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":353,"page_end":353},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37f404a2dc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
