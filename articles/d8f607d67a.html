script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决反对腐朽的资产阶级教育制度  日本京都大学学生英勇斗争  学生们在工人支持下，把闯进学校的两千警察赶出校园","authors":[],"dates":[{"year":1969,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决反对腐朽的资产阶级教育制度"},{"type":"paragraph","text":"日本京都大学学生英勇斗争"},{"type":"paragraph","text":"学生们在工人支持下，把闯进学校的两千警察赶出校园"},{"type":"paragraph","text":"新华社三日讯　据东方通讯社报道：京都大学和关西地区其他大学的进步学生，从三月一日夜晚到二日上午，同闯进京都大学校园的佐藤反动政府的一支两千人的警察部队进行了激烈的搏斗，把他们赶出了大学校园。进步学生的这场英勇的斗争，受到了关西地区的许多工人和学生的热烈支持。"},{"type":"paragraph","text":"三月一日傍晚，佐藤反动政府派去的一支有两千人的警察部队，由装甲车打头阵，冲破了进步学生在京都大学校园大门口筑起的障垒，闯进了校园。头戴帽盔的进步学生们，用棍棒和石块，英勇地还击了警察的进攻。尽管反动警察发射了大量的催泪弹，但是学生们以顽强的斗志，在历时约两个半小时的搏斗中，把警察部队赶出了校园，再一次控制了整个校园。"},{"type":"paragraph","text":"这时，许多工人冲到京都大学校园周围，来支持学生的英勇斗争。从晚上十时起，学生和工人紧紧团结在一起，到大学附近的街上去，用汽车、桌子和橱柜在街上各处筑起障垒。他们在障垒上插了红旗，在障垒后面，斗志昂扬地一次又一次举行游行示威。反动警察从装甲车上喷洒催泪液和发射催泪弹，疯狂地妄图镇压学生斗争。但是，学生不顾警察的残暴镇压，坚决地坚持斗争。他们烧毁了一辆装甲车，用燃烧瓶点燃障垒进行抵抗。这次斗争持续到三月二日早上六时，最后迫使反动警察撤退。"},{"type":"paragraph","text":"接着，学生们毫不疲倦地继续在校内举行集会和示威。二日下午一时，约两千名进步学生、工人和市民在校园内集会，表示他们决心继续斗争，直到彻底摧毁腐朽的资产阶级教育制度为止。学生们在下午四时冲进了日共修正主义分子所控制的京都大学农学院和理学院，把这伙修正主义分子赶走，用障垒封锁了各个大楼。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8f607d67a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
