<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"b2b674a1-9042-4317-a7b8-de4267668ba5","name":"毛泽东思想万岁（1958.1-1960）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"视察天津时的谈话","alias":"","parts":[{"type":"paragraph","text":"砚察天津时的谈话(汇集)"},{"type":"paragraph","text":"（一九五八年八月十三日）"},{"type":"paragraph","text":"（建立地方独立工业体系的指示）"},{"type":"paragraph","text":"地方应该想办法建立独立的工业体系。首先是协作区，然后是许多省，只要有条件，都应建立比较独立的，但是情况不同的工业体系。你们怎么样："},{"type":"paragraph","text":"一个粮食，一个钢铁，有了这两个东西就什么都好办了?"},{"type":"paragraph","text":"（视察天津大学时的指示）"},{"type":"paragraph","text":"（天津大学张××校长向主席汇报学校情况说，这个学校已有98%的学生参加了勤工俭学。今年下学期还准备搞几个班半工半读。）"},{"type":"paragraph","text":"主席说：这样很好，本来光读书本上的，没有亲自去做，有的连看也没有看过，用的时候，就做不出产品来。一搞勤工俭学、半工半读，这样有了学同，也就是劳动者了。河南省长离县有的中学勤工俭学搞的好，学生进步快，升学的多。有的中学没有搞勤工俭学，就不好，没有学进去。把脑筋学坏了。不仅学生要搞勤工俭学，教师也要搞。机关干部也要办点附属工厂，不然光讲空的，脱离实际。"},{"type":"paragraph","text":"主席问王元之同志：天津中学有没有搞勤工俭学？（王元之间答：天津近百所中学，都已搞起勤工俭学来了，六十多所中学还建立了工厂或生产车间。）"},{"type":"paragraph","text":"主席说：好啊：学校是工厂，工厂也是学校，安业合作社也是学校，要好好办。"},{"type":"paragraph","text":"毛主席说：以后要学校办工厂，工厂办学校。老师也要参加劳动，不能光动嘴，不动手。"},{"type":"paragraph","text":"（毛主席对天大在短时期办起许多工厂很愈兴趣。）"},{"type":"paragraph","text":"毛主席说：有些先生也得进步，形势逼着他们进步，他们动动手就行了。五十岁以上的敬师可以不动手了，青年的、中年的都要动手。搞科学研究的人，也应该动动手，不然一辈子不动手也不好。"},{"type":"paragraph","text":"（张××校长汇报说：现在同学们搞技术革命的劲头很大。有的为了向国庆献礼，昼夜突击，说服他们也说服不了。）"},{"type":"paragraph","text":"主席很关切地说：连夜搞是否把人搞瘦了呢：还是注意有节奏的生产，有节奏的休息和劳动。"},{"type":"paragraph","text":"毛主席还指示：高等学校应抓住三个东西一是党委领导；二是群众路线；三是教育与生产劳动相结合。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":107,"page_end":107},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9803fbee8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
