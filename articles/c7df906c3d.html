镇压","authors":[],"dates":[{"year":1960,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社平壤27日电】　汉城消息:南朝鲜汉城、大丘和京几道、庆尚北道、江原道的所有公共汽车、出租汽车和运货汽车的业主和司机，今天举行了大罢工，抗议美帝国主义及其傀儡集团对他们的剥削。"},{"type":"paragraph","text":"据东洋通讯社报道，从今天早晨开始，汉城市的公共汽车、出租汽车和运货汽车的业主和司机们一致举行罢工，停止了运输。他们向傀儡当局提出了降低汽油价格、增加油类配给量、废除中间剥削等要求。据报道，汉城市内的交通陷入了瘫痪状态。傀儡当局慌忙调动警察，对这一斗争进行镇压。"},{"type":"paragraph","text":"据南朝鲜报纸消息:大丘市、京畿道、江原道的汽车公司的业主和司机今天也举行了罢工。"},{"type":"paragraph","text":"据汉城的电台广播，在这以前，忠清南道和全罗北道的汽车业主和司机们从22日就开始了罢工。因此，南朝鲜大部分地区的公用交通工具都停驰了。"},{"type":"paragraph","text":"据南朝鲜报纸揭露，美国在南朝鲜的汽油垄断公司，象美孚油公司和德士古石油公司，现在正以比国际市场价格高40%的价格把石油卖给南朝鲜的汽车业主。傀儡当局配给汽车公司的石油价格也比进口价格要高好几倍。因此，南朝鲜的公用汽车业主们忍无可忍，举行了这次断绝交通的大罢工。"},{"type":"paragraph","text":"另据大丘广播电台广播，大丘市一家纺织公司的680多名工人最近为要求提高工资50%展开了斗争。26日，他们占领了工厂内的电话总机，掌握了厂内同外面的通讯联络。今天又继续举行静坐示威。工人们表示，不达到目的，决不收兵。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7df906c3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
