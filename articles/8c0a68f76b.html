script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对聂荣臻关于国防科研体制调整改组方案报告的批语","alias":"","parts":[{"type":"paragraph","text":"对聂荣臻“关于国防科研体制"},{"type":"paragraph","text":"调整改组方案报告的批语"},{"type":"paragraph","text":"（1967年10月25日）聂荣臻同志："},{"type":"paragraph","text":"此件压了很久，今天看过，很好，照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十五日"},{"type":"paragraph","text":"[1]聂荣臻，当时任中共中央政治局委员、中央军委副主席、国务院副总理兼国防科学技术委员会主任。"},{"type":"paragraph","text":"[2]指聂荣臻1967年9月20日关于国防科研体制调整改组方案给毛泽东等的报告。报告根据中央有关指示精神，提出：一、全面规划，统筹安排，合理调整改组，将中央批准接管的国防科研单位调整编组为若干个研究院。二、积极解决国防科研单位的试制加工力量，缩短研制周期。三、认真做好军管工作，有步骤地进行接管和调整，条件成熟一个就接管和组建一个，争取明年上半年基本上都组建起来。11月9日，中共中央转发了聂荣臻的报告和毛泽东的批语。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":124,"page_end":124},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c0a68f76b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
