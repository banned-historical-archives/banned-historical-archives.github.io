"authors":[],"dates":[{"year":1971,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十四日电　为巴基斯坦田径队前来我国进行友好访问，国家体委今天下午在北京工人体育场举行欢迎仪式。欢迎仪式后，中巴两国田径运动员进行了友谊表演。"},{"type":"paragraph","text":"巴基斯坦田径队领队西亚德·阿布·哈桑，巴基斯坦驻中国大使凯瑟和夫人、大使馆公使贾弗里及使馆其他外交官员，应邀出席欢迎仪式并观看了表演。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英、中国人民解放军副总参谋长王新亭、国家体委主任王猛、外交部副部长韩念龙，有关方面负责人于步血、姚晓程、李青川、王磊、郭东俊、刘国安，出席欢迎仪式并观看了表演。"},{"type":"paragraph","text":"欢迎仪式前，叶剑英、王新亭、王猛、韩念龙会见了西亚德·阿布·哈桑领队，并同他进行了友好的谈话。会见时，凯瑟大使和夫人在座。"},{"type":"paragraph","text":"今天下午，北京工人体育场充满中巴两国人民团结友好的气氛。体育场主席台上，悬挂着巴基斯坦国旗和中国国旗。体育场四周写有“热烈欢迎巴基斯坦田径队”“中巴两国人民的友谊和团结万岁”“全世界人民大团结万岁”的大字标语。拥有八万个座位的圆形看台上，坐满了观众。当欢迎仪式开始，中巴两国运动员手挽手走进田径场时，全场响起了热烈掌声。欢迎仪式上，两国运动员交换了队旗并互赠了纪念"},{"type":"paragraph","text":"随后，中巴两国运动员开始了田径表演。巴基斯坦田径队共有九名男子运动员，他们同中国运动员共同表演的项目是:100米、200米、800米、1500米、5000米、110米高栏、400米中栏赛跑和跳远、铅球、标枪。两国运动员还亲密合作，为观众作了精彩的4×100米混合接力赛跑表演。在两个多小时的表演中，中巴两国运动员表现出的顽强意志和团结友爱精神，一再受到全场观众的热情赞扬。"},{"type":"paragraph","text":"友谊表演结束后，叶剑英、王新亭、王猛、韩念龙等，陪同西亚德·阿布·哈桑、凯瑟大使和夫人等走下主席台，同两国运动员一一握手并在一起照了像。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王新亭","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aba8160c22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
