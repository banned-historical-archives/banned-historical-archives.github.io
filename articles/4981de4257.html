authors":[],"dates":[{"year":1955,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伏罗希洛夫布尔加宁莫洛托夫复电毛泽东刘少奇周恩来"},{"type":"paragraph","text":"感谢对苏联军队建军节的祝贺"},{"type":"paragraph","text":"【新华社二十七日讯】苏联最高苏维埃主席团主席伏罗希洛夫、苏联部长会议主席布尔加宁和苏联外交部长莫洛托夫复电中华人民共和国主席毛泽东、全国人民代表大会常务委员会委员长刘少奇和国务院总理兼外交部长周恩来，感谢他们对苏军建军节的祝贺。电文如下：北京中华人民共和国主席　毛泽东同志中华人民共和国全国人民代表大会常务委员会委员长刘少奇同志中华人民共和国国务院总理兼外交部长周恩来同志"},{"type":"paragraph","text":"当苏联陆海军建军三十七周年的时候，承蒙热烈祝贺，亲爱的同志们，请接受我们深切的谢意。"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟最高苏维埃主席团主席  克·叶·伏罗希洛夫"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟部长会议主席  尼·亚·布尔加宁"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟外交部长  维·米·莫洛托夫"},{"type":"paragraph","text":"一九五五年二月二十六日于莫斯科"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4981de4257"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
