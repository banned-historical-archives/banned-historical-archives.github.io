ent.com/banned-historical-archives/banned-historical-archives16/main/65a24322-699c-480e-bb16-0c76ef541684/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives16/main/65a24322-699c-480e-bb16-0c76ef541684/2.jpg"],"article":{"title":"外交部大字报摘抄","alias":"外交部动态","parts":[{"type":"paragraph","text":"外交部动态月明，伟大领袖民主游在接外寞及乔冠华，运动怎么样？乔答：“和世他一样，正在进到”"},{"type":"paragraph","text":"毛报方;“你和华总理淡谈”。但事及乔没有向华忌理几报，却我江青汇报了。八76年月日，华总理以报王泼江，毛运就我外刚交部校心组资话，华总理抵泽乔冠华说“交"},{"type":"paragraph","text":"部的大字报有向题。(指一些人贴王何黄所闻生同去的大字极)乔当场项华总理说：我不千了诗"},{"type":"paragraph","text":"总狸另外交部长他。事及毛远新个别找乔说：你怎么这样说活吸？妥继续干!三76年日，华立济我斗的交部体念龙，刘振华两位付部长说：“毛主端在乔的一份材料上拖方：“乔冠华"},{"type":"paragraph","text":"借刀杀人，你借中央初杀王磨”华主常说：“耐心梦待乔冠华交待认识。”四李念付总理识：“乔与华隐的又是这样涂(指服).也不兄离的脑样涂(指胸)而是的这样条(指鼻上也五、据发，乔冠华章合之在王海容的黑材料、单年送给江青，重向毛主常巫告王、唐的状。参加这一事的区有"},{"type":"paragraph","text":"故给部主任扬其良，干部父长明修，它传命一处长周跌车(现付部张，同时在1日下午外交部托乔大今上又搬出一个小爬虫，礼实习《长朱传质。目前一共揪生乔冠华章含之，杨其良，朱传、王明修，周头东兮。他们"},{"type":"paragraph","text":"分划暂时处理为隔易审查，竹我审查和外事之你不参加或减少到最少程。六江青王海容的特："},{"type":"paragraph","text":".一次(很久何)江青我王海容打听乔冠华的光，那时乔的原夫人刚死不是，江专把李纳召伤乔当夫人，叫主每容做工作。五想两个相善太多、一个文十受受，一个世，手是王海容去找总理，总理很为难，说你去向主带、到容又去去主佛那盟，主佛指方：“王海容不要发事。实上毛主佛不赞成此事.沉青看冷特恨王海容。回去联大开今，是毛主佛叫邓小平去的，此事口不知道，事转出及，口专在政你局大，主佛批碎了沉走，事几专得知王海容知道此事，生悔容你为什不告诉我。于是口青更恨王海容。很前冠华、重悔容在理那里淡几走、张春桥两人历史向题辛念之向江青此事于是口青外常恨到。"},{"type":"paragraph","text":"由于处交部批邓批不起素，江便手外交部的吃动，由于乔、章含之态何容的黑材料控造罪名，单线与江青联柔，企图把王唐和邓小平联条生一起，经她们是邓在外忘部的代理人。.76年上月日，五七”十周年时，做治希主在杨英良到干校去处向，乔非去，去故便发表院，说“部坚就有这样的人，一又老二不残，但就是不事劳动，不走生七道路(指去唐)。会收在下也就向接她的是王唐。这样煽仇英火，七干拔的人部里王、贴了很多大字报，章含之在而里史改击到每容然张一时。日.可现在外交部批乔常运用陈毅同志的老活：陈曾说过如果东乔兵变，黄施加身!活乔就是右的头子，可见陈老总早就看透了乔冠华。#外交部北乔，引用王海容发的一条，很前乔对王说至皮文是主佛些定的接班人没题，谁也不今反对。江青是主带夫人，谁反对她也是得看在主佛的召上。张春桥是个老奸巨，办子好抓。那时乔对”少人帮”已看出美向题，事及乔上了”为人那贼船不兄认识向题而是何觉的主动她上贼船。③括已揭发的向题看，改治部大小干部都参加了态王、唐的工作。.年引上每(反汇报)的儿篇黑文章，到每容当时拿幕给看，乔看了说没学画顺的，乔对文比报所作评为是暖肤，支持的态发。回年尼泊尔口王访华，曾卧成参观，差在戌都今淡。在成把华总理那一也，日程安排也不告诉华总理，他杜有举幸去考现。安今时桥以个人的名义邀湾尽泊尔团主，明年以个人名义访华。华总理拍了乔的有膀说：“老乔，你喝解了吧？"}],"authors":[],"dates":[{"year":1976}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"江青","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"章含之","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a914d807a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
