art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“马钢宪法”是什么货色？","authors":[],"parts":[{"type":"paragraph","text":"“马钢”，即苏联马格尼托哥尔斯克钢铁公司。“马钢”的一套企业管理办法，在苏联工业企业中具有代表性。苏修总结的马钢企业管理办法，简称为“马钢宪法”。"},{"type":"paragraph","text":"“马钢宪法”主要是：实行一长制，不要党的领导；搞利润挂帅、物质刺激，不要无产阶级政治挂帅；依靠少数专家和一套烦琐的规章制度，冷冷清清地办企业，不让工人参加企业的管理，不搞群众运动，不实行群众路线，不搞群众性的技术革新和技术革命。这是赫鲁晓夫、勃列日涅夫叛徒集团对全国企业实行资产阶级垄断和统治的“王法”，是地地道道的修正主义办企业路线。"},{"type":"paragraph","text":"文化大革命前，邓小平追随刘少奇在工业战线推行一条修正主义路线，反对毛主席关于“鞍钢宪法”的伟大指示，把苏修的“马钢宪法”这一套搬到我国，流毒很大。邓小平重新工作以后，在国民经济管理体制上复活“条条专政”，在企业内部重新推行“马钢宪法”那一套，妄图搞资产阶级专政，走资本主义道路。我们一定要坚持“鞍钢宪法”，批判“马钢宪法”。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff4b1c2d9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
