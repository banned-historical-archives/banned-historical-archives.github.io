script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席光辉的《五·七指示》指引下  河南办了大批五七大学和五七学校","authors":[],"dates":[{"year":1976,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席光辉的《五·七指示》指引下"},{"type":"paragraph","text":"河南办了大批五七大学和五七学校"},{"type":"paragraph","text":"据新华社郑州一九七六年五月八日电　无产阶级文化大革命以来，在毛主席光辉的《五·七指示》指引下，河南省各地已经办起各种类型的五七大学、共产主义劳动大学和五七学校七百零二所。这些学校以阶级斗争为纲，坚持走五七道路，成为农村开展三大革命运动的重要阵地。到目前为止，这些学校先后招收学员十五万多人，其中已有八万多人毕业后投身到农村三大革命运动中去发挥着骨干作用。"},{"type":"paragraph","text":"河南省各种类型的五七大学、共产主义劳动大学和五七学校，是在不断地同刘少奇、林彪以及不肯改悔的走资派邓小平的修正主义教育路线作斗争中发展壮大起来的。这些学校彻底改革了旧的教育制度、教学内容和教学方法，按照毛主席的《五·七指示》和党的教育方针，努力建设无产阶级的新型学校。学员是从基层干部、下乡和回乡知识青年、复员军人以及有实践经验的工人、农民中选拔的。在课程设置上，根据农村三大革命运动的需要，设有政治、语文、农学、机电、卫生、兽医、文艺、财会等专业。学制有一至三年的长期班，也有几个月的短训班。各学校根据贫下中农的意见和农村三大革命运动的需要，改革旧教材，编写新教材。学生毕业后实行“队来队去、社来社去”，回到农村三大革命运动第一线，当一代新型农民。"},{"type":"paragraph","text":"河南省各种类型的五七大学、共产主义劳动大学和五七学校，坚持无产阶级政治挂帅，不管是文科，还是理工科，都把学习马列著作和毛主席著作，参加“批判资产阶级”的斗争，放在学校一切工作的首位。一九五八年八月六日毛主席亲临视察过的新乡县七里营人民公社，在无产阶级文化大革命中创办了七里营八·六农业大学。这个学校认真贯彻毛主席的《五·七指示》，经常带领学生参观阶级教育展览馆，深入工厂、农村搞社会调查，和工人、贫下中农一起批判修正主义，批判资本主义，参加现实的阶级斗争。每届新生入学时，都要组织学生到毛主席视察过的田地里，请七里营公社党委负责同志讲两条路线斗争史。通过这些活动，使学生懂得什么是剥削，什么是压迫；什么是马克思主义，什么是修正主义；什么是社会主义道路，什么是资本主义道路。潢川县双围孜红专大学，自建校以来经常组织学员学习毛主席的《青年运动的方向》和有关知识青年上山下乡的一系列教导，深入批判“学而优则仕”、“读书做官”、“变相劳改”等反动谬论，批判资产阶级法权观念，牢固树立扎根农村干革命的思想。"},{"type":"paragraph","text":"这些学校，坚持理论联系实际的原则，实行开门办学，把学校教育同三大革命运动紧密结合起来，逐步建立起教学、生产、科研三结合的新体制。程庄农业劳动大学的学生就住在社员群众家里，和贫下中农同吃、同住、同劳动、同学习、同批判资产阶级，使学生在与工农相结合的道路上，不断转变思想，增长才干。"},{"type":"paragraph","text":"河南省各级党组织十分重视抓好五七大学和五七学校的工作。各级党委都把办好五七大学和五七学校列入党委工作的议事日程。各级党委还注意经常总结和推广办五七大学、五七学校的先进经验，使各地五七大学和五七学校越办越好。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0ff612357"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
