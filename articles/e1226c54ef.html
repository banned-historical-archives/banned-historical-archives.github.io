所创造的伟大工程","authors":[],"dates":[{"year":1969,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拉乌尔总理在南京参观访问"},{"type":"paragraph","text":"热情赞扬南京长江大桥是用毛泽东思想武装起来的中国工人阶级所创造的伟大工程"},{"type":"paragraph","text":"新华社南京十一日电　刚果共和国（布拉柴维尔）全国革命委员会领导机构成员、总理、政府会议主席阿尔弗雷德·拉乌尔少校，和由他率领的刚果共和国（布拉柴维尔）全国革命委员会和政府代表团，由江苏省革命委员会副主任、南京市革命委员会主任杨广立等陪同，今天在南京参观访问。"},{"type":"paragraph","text":"今天上午，拉乌尔总理等刚果（布）贵宾，参观了我国自行设计建造的南京长江大桥。当贵宾们来到雄伟壮丽的大桥桥头堡时，受到了建桥工人和革命群众的热烈欢迎。人们热情地高呼“热烈欢迎拉乌尔总理！”“中国刚果（布）两国人民的友谊万岁！”等口号。"},{"type":"paragraph","text":"拉乌尔总理等兴致勃勃地参观了大桥桥头堡、铁路桥和公路桥。在参观过程中，拉乌尔总理热情赞扬南京长江大桥是用毛泽东思想武装起来的中国工人阶级所创造的伟大工程，远远超过了帝国主义者所吹嘘的先进技术水平。他表示相信，中国人民在毛泽东思想的指引下，在毛主席的英明领导下，在今后的社会主义建设中，能够取得更大的成就。"},{"type":"paragraph","text":"今天，刚果（布）贵宾还参观了中国科学院紫金山天文台，游览了东郊风景区。晚上，观看了南京长江大桥夜景。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1226c54ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
