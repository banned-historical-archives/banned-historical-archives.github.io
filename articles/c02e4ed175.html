" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东批示印发罗隆基最近对物资供应问题的一些反动言论","authors":[],"dates":[{"year":1959,"month":7,"day":19}],"is_range_date":false,"parts":[{"text":"毛泽东批示印发罗隆基最近对物资供应问题的一些反动言论","type":"title"},{"text":"印发各同志","type":"paragraph"},{"text":" 毛泽东一九五九年七月十九日","type":"paragraph"},{"text":"罗隆基最近对物资供应问题的一些反动言论","type":"subtitle"},{"text":"抓住目前物资供应紧张全面攻击社会主义","type":"subtitle"},{"text":"罗隆基最近私下对人说：“目前物资供应如此紧张，是古今中外所没有遇的大乱子。依我看，从一九五六年起就把事情搞坏了，私营工商业改造有毛病，大工厂只能解决大问题，日常生活问题要靠小工厂解决，现在是只见其大而不见其小。私营工商业改造以后，又来了个反右，反右以后接着又搞政治挂帅，大跃进，人民公社，现在又出了西藏问题。资本主义工商业改造，挫伤了工商业的积极性，得罪了资本家；公社化、大跃进得罪了农民；反右派得罪了知识分子，而右派分子又是知识分子的精华；西藏问题得罪了少数民族；物资供应紧张得罪了所有的人；现在裁员一千万又要得罪工人，只有解放军还在他们手上。现在是民心尽去，人民怨愤已达顶点，那有一个国家结民之怨有如是之深呢？一个国家到了这个程度，实在是悲惨了。”","type":"paragraph"},{"text":"诬蔑我党解决目前市场供应问题的措施不得要领，只有把事情“越搞越糟”","type":"subtitle"},{"text":"罗说：“他们知道出了毛病，但到现在还不知道毛病出在那里，检查纠正没有接触到基本问题，订的措施没有抓住要点，只会把事情愈搞愈糟，毛病愈出愈多。裁员一千万就会造成四、五千万人的生活问题。共产党说唯物，实际上最唯心，说的是客观规律。实际上最不重视客观规律。他们现在拿着一八四八年的资本论，解决一九五八年的问题。这是一个甚么制度？平心而论，我要对人类负责就不能同意这个制度。”","type":"paragraph"},{"text":"罗最后说：“他们现在把大跃进、全民炼钢等许多事情都翻案了。反右他们是不会翻的，但已经看到这个事情搞错了，问题可能就要慢慢的解决了。他们这次安排我和黄琪翔、黄绍竑去东北休假，就是首长待遇。不象是对待敌人了”。","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c02e4ed175"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
