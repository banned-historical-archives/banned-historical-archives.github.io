uthors":[],"dates":[{"year":1976,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》发表文章"},{"type":"paragraph","text":"谴责苏联官僚垄断资产阶级残酷剥削劳动人民"},{"type":"paragraph","text":"新华社地拉那电　阿尔巴尼亚《人民之声报》最近发表一篇题为《苏联经济危机的后果沉重压在广大劳动人民身上》的文章。"},{"type":"paragraph","text":"文章说，由于完全恢复了资本主义的生产关系，苏联在经济的各部门连年遭到失败。农业失败最惨。一九七五年农业生产下降幅度最大。粮食产量比修正主义者们自己预定的数字少八千万吨。农业上，特别是粮食生产的灾难性破产，使得苏联不得不从西方大量购买粮食，其中有一半以上是从美国进口的。在粮食生产下降的同时，苏联畜牧业也困难重重，畜产品奇缺。"},{"type":"paragraph","text":"文章说，苏联的工业也面临严重的困难情况。"},{"type":"paragraph","text":"文章指出，经济破产的沉重负担，被转嫁到苏联人民身上。市场上日常必需品和食品奇缺，物价昂贵，并且不断上涨，其中肉类、食用油和蔬菜的价格上涨尤其突出。近几年来，每个苏联工人家庭为购买生活必需品的开支大幅度增加，每个苏联农民家庭的实际收入也显著下降。最困难的是处于失业或半失业状态的大批劳动者。而新资产阶级为了获得巨额利润，还在解雇工人，加紧剥削。"},{"type":"paragraph","text":"文章说，对劳动群众的剥削和社会的不平等也表现在分配方面。今天苏联社会的阶级差别日益深化，广大群众生活贫困，而当权的官僚集团则发财致富。"},{"type":"paragraph","text":"文章最后说，苏联劳动群众正在采取各种斗争形式，来表示他们对这种资本主义剥削的不满和反抗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a49d71e036"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
