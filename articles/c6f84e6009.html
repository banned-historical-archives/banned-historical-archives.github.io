ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"在军委关于同意中南军区一九五三年工作计划的复电稿上加写的话","alias":"","parts":[{"type":"paragraph","text":"在军委关于同意中南军区一九五三年"},{"type":"paragraph","text":"工作计划的复电稿上加写的话"},{"type":"paragraph","text":"（1953年3月16日）"},{"type":"paragraph","text":"（三）将此电\"及中南军区司令部二月二十三日来电?发给各大军区及志愿军党委会，关于充许下级批评上级所犯错误，用向上级提意见的方式表现出来，请照此办理。"},{"type":"paragraph","text":"（四）将此电及中南军区二月廿三日电发给军委各部门研究，并加以检查，所犯错误应加改正。"},{"type":"paragraph","text":"（五）关于军委各部门所发文件有些互相矛盾一事，不但与各部门有关系，也与军委过去在这方面缺乏统一调节的工作有关。今后车委当建立这种统一调节的工作。"},{"type":"paragraph","text":"[1]指军委1953年3月16日关于同意中南军区1953年工作计划的复电。"},{"type":"paragraph","text":"[2]指中国人民解放军中南军区司令部1953年2月23日给军委的电报。电报说，在中南军区党委1953年1月7日至17日召开的扩大会议上，省军区的同志对编制提出了一些意见，认为省军区机关的编制定额太少，省军区除机关本身外，还代管了一些单位，而临时任务又不断增加，比如新兵的动员和训练，接收志愿军伤员，安置残废人员，而对这些人员的管理、教育与供应都没有专门机构，在原有编制定额中也不包括。建议在定编制时应考虑上述情况。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":74,"page_end":74},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6f84e6009"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
