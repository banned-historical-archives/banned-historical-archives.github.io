" crossorigin="">{"props":{"pageProps":{"books":[{"id":"af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4","name":"毛远新反动言论摘录（1977.1）","internal":true,"official":true,"type":"img","author":"毛远新，沈阳军区选编，1977.1印","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/af3e9ad5-8eb6-487c-b6ae-b39d0a3657c4/7.png"],"article":{"title":"二、紧密配合“四人帮”破坏批林批孔，破坏学习无产阶级专政理论","alias":"","parts":[{"type":"paragraph","text":"天，我的头会被吊在天安门城楼上示众，但我不怕，··”"},{"type":"paragraph","text":"（摘自军区揭发“四人帮”反党集团罪行材料之四十七）"},{"type":"paragraph","text":"一九七三年初，毛远新刚结婚不久，就对他家属说：“你到这来不是享福，要准备坐牢，要准备杀头。大不了劳动改造。”"},{"type":"paragraph","text":"（摘自军区揭发“四人帮”反党集团罪行材料之四十七）"},{"type":"paragraph","text":"二、紧密配合“四人帮”破坏批林批孔，破坏学习无产阶级专政理论"},{"type":"paragraph","text":"读了××连党支部的来信，非常兴奋，广大战士····知难而，批林批孔搞得轰烈烈。对比之下，我们领导显得落后了，寻不抓紧决，我们不仅失去了对运动的领导权，还有成为绊脚石的可能。"},{"type":"paragraph","text":"当然批林批孔的主要目的不单是解决“定后门”问题，···…·但是，···…·这个问题不解决，我们就“失去说服力，失去领导权”。"},{"type":"paragraph","text":"（一九七四年二月三日在沈空××连党支部试点工作组来"},{"type":"paragraph","text":"信上的批语）"},{"type":"paragraph","text":"毛远新批评在地方工作的一位军队同志说：“‘走后门’是你们市委的一块砖头，不搬掉这块砖头，你们就不能前进。”"},{"type":"paragraph","text":"(摘自军区揭发“四人帮”反党集团罪行材料之二十五)"},{"type":"paragraph","text":"毛远新别有用心地对地方同志散布说：“大军区前段冷冷清清，最近有了大字报，但不深，没有接触实际，揭"},{"type":"paragraph","text":"一发有必要。”"},{"type":"paragraph","text":"（摘自军区揭发“四人帮”反党集团罪行材料之十六）"},{"type":"paragraph","text":"叫你们回去，是放虎归山，与修正主义路线斗，要当老虎。"},{"type":"paragraph","text":"问题在主要领导身上，就是一，二把手，特别难在军代表身上。"},{"type":"paragraph","text":"（一九七四年二月十三日在辽宁省工农兵学习班上的讲"},{"type":"paragraph","text":"话）"},{"type":"paragraph","text":"关于学习主席无产阶级专政理论问题，张春桥同志讲话（注：指在全军各大单位政治部主任座谈会上关于反对经验主义的讲话），…····五八年春桥同志的文章，可以考虑印发到师一级，有的以师为单位传达就可以。"},{"type":"paragraph","text":"（一九七五年三月五日毛远新讲的几个河题）经验主义的危害，老同志不该回答吗？"},{"type":"paragraph","text":"（摘自军区揭发“四人帮”反党集团罪行材料之二十三）"},{"type":"paragraph","text":"三、贬低诬蔑人民解放军，破坏军队建设，妄图毁我长城"},{"type":"paragraph","text":"×××同志讲，我们机关落后基层，领导落后群众，我还加一条，我们军队落后地方。"},{"type":"paragraph","text":"（一九七四年二月十三日在辽宁省工农兵学习班上的讲"},{"type":"paragraph","text":"话)"},{"type":"paragraph","text":"地方有少数干部对文化大革命不理解，好象我们（注：指军队）腰杆子又硬了，：好象很了不起。如果说地"},{"type":"paragraph","text":"—"},{"type":"paragraph","text":"问题在主要领导身上，就是一，二把手，特别难在军代表身上。"},{"type":"paragraph","text":"（一九七四年二月十三日在辽宁省工农兵学习班上的讲"},{"type":"paragraph","text":"话）"},{"type":"paragraph","text":"关于学习主席无产阶级专政理论问题，张春桥同志讲话（注：指在全军各大单位政治部主任座谈会上关于反对经验主义的讲话），…····五八年春桥同志的文章，可以考虑印发到师一级，有的以师为单位传达就可以。"},{"type":"paragraph","text":"（一九七五年三月五日毛远新讲的几个河题）经验主义的危害，老同志不该回答吗？"},{"type":"paragraph","text":"（摘自军区揭发“四人帮”反党集团罪行材料之二十三）"},{"type":"paragraph","text":"三、贬低诬蔑人民解放军，破坏军队建设，妄图毁我长城"},{"type":"paragraph","text":"×××同志讲，我们机关落后基层，领导落后群众，我还加一条，我们军队落后地方。"},{"type":"paragraph","text":"（一九七四年二月十三日在辽宁省工农兵学习班上的讲"},{"type":"paragraph","text":"话)"},{"type":"paragraph","text":"地方有少数干部对文化大革命不理解，好象我们（注：指军队）腰杆子又硬了，：好象很了不起。如果说地"},{"type":"paragraph","text":"—"}],"authors":["毛远新"],"dates":[{"year":1974,"month":2,"day":3},{"year":1974,"month":2,"day":13},{"year":1975,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":3,"page_end":3},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"四人帮","type":"人物"},{
