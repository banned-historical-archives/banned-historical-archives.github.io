tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想光辉普照家乡 贫下中农杀上大批判战场某部通信连大摆大议家乡新貌，更加认清了大好形势","authors":["许锡福","魏群"],"parts":[{"type":"paragraph","text":"北京部队某部通信连在形势教育中，发动干部战士大摆大议无产阶级文化大革命空前大好形势。干部战士以自己家乡的生动事实，互相启发，互相教育。副班长席久生说：“我家十一口人都投入了文化大革命的洪流。过去，一家人在一起总是谈买东西盖房子，把日子过好，现在想的是国家大事，谈的是文化大革命的情况。连八十多岁的老奶奶和九岁的小妹妹也参加辩论。村里的贫下中农，都为国家大事操心。”很多同志兴奋地谈到，广大革命群众紧跟毛主席的伟大战略部署，展开革命的大批判，口诛笔伐中国赫鲁晓夫，真是七亿人民都是批判家。"},{"type":"paragraph","text":"大家深深感到，无产阶级文化大革命最大最大的大好形势，是毛泽东思想大普及，革命群众的觉悟大提高，精神面貌发生了深刻的变化。大家一致认为，群众之所以发动得这样广泛、深入，就是用毛泽东思想武装了人民群众的头脑，亿万革命人民掌握了毛泽东思想，迸发出无穷无尽的力量。现在毛主席彩像家家挂，毛主席语录满村写，学习毛主席著作已经成了广大革命群众生活的第一需要。伟大的毛泽东思想把亿万革命人民发动起来，摧毁了以中国赫鲁晓夫为首的反革命的资产阶级司令部，在斗私批修中培养了一心为公的共产主义新人。"},{"type":"paragraph","text":"通过大摆大议，全连同志进一步认清了无产阶级文化大革命的大好形势，更加增强了把无产阶级文化大革命进行到底的决心和信心。大家一致表示，坚决贯彻执行毛主席的最新指示，完成最高统帅毛主席交给我们的一切光荣任务，在无产阶级文化大革命运动中立新功。（魏群、许锡福）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cedc66d98a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
