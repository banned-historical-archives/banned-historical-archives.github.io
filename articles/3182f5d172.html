ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"给李达的信","alias":"","parts":[{"type":"paragraph","text":"给李达的信"},{"type":"paragraph","text":"（1954年12月28日）鹤鸣兄："},{"type":"paragraph","text":"十二月二十日的信及两篇文章\"，收到看过了，觉得很好。特别是政治思想一篇，对读者帮助更大。似乎有些错字，例如“实用主义者主张物质的第一性和意识的第二性”。此外，在批判实用主义时，对实用主义所说的实用和效果，和我们所说的大体同样的名词，还需加以比较说明，因为一般人对这些还是混淆不清的。宇宙“是一篇未完的草稿·…..”几句话，也须作明确的批判。你的文章通俗易懂，这是很好的。在再写文章时，建议对一些哲学的基本概念，利用适当的场合，加以说明，使一般干部都能够看懂。要利用这个机会，使成百万的不懂哲学的党内外干部懂得一点马克思主义的哲学。未知以为如何？"},{"type":"paragraph","text":"顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年十二月廿八日[1]李达，号鹤鸣，当时任武汉大学校长。[2]指李达写的《胡适的政治思想批判》和《胡适思想批判》。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":395,"page_end":395},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3182f5d172"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
