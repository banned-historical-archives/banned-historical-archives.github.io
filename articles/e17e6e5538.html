ors":[],"dates":[{"year":1968,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在大普及、大讲用毛泽东思想的新高潮中，在夺取无产阶级文化大革命全面胜利的凯歌声中，全世界无产阶级的伟大导师、当代的列宁、我们心中最红最红的红太阳毛主席的光辉著作，革命宝书“老五篇”(《为人民服务》、《纪念白求恩》、《愚公移山》、《关于纠正党内的错误思想》和《反对自由主义》)，已由上海人民出版社大量出版，今天在全市新华书店、邮局报刊门市部、书亭和郊县供销社等普遍发行。这是全市革命人民政治生活中的又一件大喜事。"},{"type":"paragraph","text":"这次发行的“老五篇”，有一百二十八开本和二百五十六开本两种。后一种在红色塑料封面上用烫金印着伟大领袖毛主席的光辉形象。"},{"type":"paragraph","text":"又讯　上海革命教育出版社为了迎接“五一”节，最近又出版了一批毛主席语录画，其中有毛主席视察三大区无产阶级文化大革命、炮打司令部(我的一张大字报)、全世界人民团结起来打败美国侵略者及其一切走狗、帝国主义和一切反动派都是纸老虎、纪念白求恩等等。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e17e6e5538"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
