[{"year":1967,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在八三四一部队支左人员的帮助下，无限热爱毛主席的北京针织总厂广大革命职工，排除了各种干扰，紧跟毛主席的伟大战略部署。毛主席怎么说，他们就怎么做。毛主席的战略部署，他们步步紧跟；毛主席的最新指示，他们句句照办。"},{"type":"paragraph","text":"九月十四日，报上发表了毛主席的伟大指示:“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。”厂内两大派革命组织和广大革命职工，闻风而动，放下具体问题的争论，在革命的原则下，于九月十九日就按车间、班组、科室实现了革命的大联合。随后，两派经过充分协商，成立了全厂革命大联合的领导班子——无产阶级革命派大联合委员会。"},{"type":"paragraph","text":"毛主席发出“要斗私，批修”的伟大号召以后，他们又立即行动起来，以“斗私，批修”为纲，活学活用毛主席著作，用战无不胜的毛泽东思想，狠斗头脑中的“私”字，狠批中国赫鲁晓夫的资产阶级反动路线。原两派组织的负责人都严格要求自己，勇于作自我批评。他们不仅在大联合委员会内狠斗派性，而且到全厂职工大会上亮私、斗私。他们把私心公诸于众，把派性和盘托出。通过斗私，增进了友谊，加强了团结，搞臭了小资产阶级派性。全厂出现了“头头带头搬山头，群众群起平山头”的大好形势。双方消除了隔阂，进一步从思想上巩固了革命的大联合。"},{"type":"paragraph","text":"毛主席关于正确地对待干部的最新指示一发表，北京针织总厂的无产阶级革命派就在支左部队的帮助下，积极采取措施，教育干部，解放干部。他们做了大量的思想政治工作，帮助犯有错误的干部正确地对待群众，正确地对待自己，同走资派、同资产阶级反动路线划清界限，回到毛主席的革命路线上来。在这个基础上，十一月十一日成立了“三结合”的厂革命委员会。"},{"type":"paragraph","text":"毛泽东思想的阳光照亮了北京针织总厂，全厂呈现一派欣欣向荣的新气象。职工的精神面貌焕然一新。革命搞得轰轰烈烈，生产搞得热火朝天。结合批判中国赫鲁晓夫和彭真反革命修正主义集团推行的修正主义办企业的路线，本单位的斗批改开展起来了。全厂生产节节上升，生产计划完成得很好。不少车间、班组创造了建厂以来的生产新纪录，一个生产跃进的新局面已经显露出来。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2122fa46a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
