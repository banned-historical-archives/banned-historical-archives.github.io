s":[],"dates":[{"year":1967,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海求新造船厂的无产阶级革命派和革命群众，以“斗私，批修”为纲，抓好革命的大批判，迎接上海工人革命造反派代表会议的召开。"},{"type":"paragraph","text":"该厂革命派和革命职工，高举革命的批判大旗，分别出版了厂、科室和车间的彻底批判中国赫鲁晓夫所推行的“全民工会”和“福利工会”的专刊。一篇篇文章、一张张漫画，象一把把锋利的刺刀一样，刺进了中国赫鲁晓夫的胸膛。"},{"type":"paragraph","text":"该厂工人革命造反总部还举行了批判修正主义工运路线的座谈会。广大革命群众和原工会干部在座谈会上，纷纷进行揭发、批判。他们揭发说，在中国赫鲁晓夫的“全民工会”影响下，求新造船厂第一届工会的大权就落到了牛鬼蛇神的手里。这笔账，我们一定要向大工贼、大叛徒、中国的赫鲁晓夫清算!"},{"type":"paragraph","text":"在中国赫鲁晓夫“福利工会”的毒害下，求新造船厂的工会，一度变成经济组织，不抓阶级斗争。厂工会曾把推销香瓜子、五香豆、呢绒、手表、脚踏车等当作所谓政治任务。这完全是中国赫鲁晓夫篡改工会性质造成的恶果。"},{"type":"paragraph","text":"参加座谈会的同志，还揭发批判“福利工会”用金钱、物质腐蚀工会积极分子和先进生产者的大量事例。他们说，中国赫鲁晓夫搞的所谓工人休养所，是十足的“养修所”，在那里休养，不谈政治，不学毛主席著作，大讲吃喝经，这种休养，只能越“养”越“修”。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2183ef0e9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
