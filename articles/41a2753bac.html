ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"为问候胡志明致刘少奇电","alias":"","parts":[{"type":"paragraph","text":"为问候胡志明致刘少奇电"},{"type":"paragraph","text":"（1950年2月1日）刘少奇同志："},{"type":"paragraph","text":"请替我们问候胡志明同志，他在为越南民族独立与建立越南人【民】民主政权的英勇斗争中起了领导者与组织者的作用。中越两国已互相承认，并即将建立外交关系，苏联已承【认】越南，其他各新民主国家估计亦可能承认（越南请求各国承认并建立外交关系的申明文件，我驻苏大使馆已为转达各新民主国家的驻苏使馆）。我们为越南加入以苏联为首的反帝民主大家庭致深切的庆贺，并祝越南全境统一早日实现，胡志明同志及其战友们身体健康。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"一九五〇年二月一日[1]胡志明，越南民主共和国主席兼总理。这时正在北京。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":2,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41a2753bac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
