art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"欢呼世界人民反美斗争新高潮","authors":["总后勤部活学活用毛泽东思想先进集体某部八连一班全"],"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席号召：“全世界人民团结起来，打败美国侵略者及其一切走狗！”"},{"type":"paragraph","text":"我们常年奋战在青藏高原的革命战士，最热烈地拥护毛主席的庄严声明，最坚决地响应毛主席的伟大战斗号召！"},{"type":"paragraph","text":"美帝国主义疯狂地推行反革命全球战略，在世界上到处伸手，到处侵略，干尽了坏事。“美帝国主义屠杀外国人，也屠杀本国的白人和黑人”，它把自己放在同全世界人民为敌的地位。共同的利益、共同的斗争，把全世界人民紧密地联结在一起。五洲四海，同仇敌忾，反对共同的敌人美帝国主义。当前，世界人民反对美帝侵略柬埔寨的怒潮滚滚向前，生动地反映了世界各国人民在反美斗争中的战斗团结和相互支持。"},{"type":"paragraph","text":"我们革命战士热烈欢呼全世界人民反美斗争新高潮。我们一定遵照伟大领袖毛主席的教导，坚决支持柬埔寨人民的反美爱国斗争，坚决支持印度支那三国人民的抗美救国战争，坚决支持美国人民和世界各国人民反对美帝及其走狗的革命斗争。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c2e003278"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
