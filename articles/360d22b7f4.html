ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"在欢迎尼泊尔首相阿查里雅宴会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在欢迎尼泊尔首相阿香里雅"},{"type":"paragraph","text":"宴会上的讲话"},{"type":"paragraph","text":"（1956年9月29日）"},{"type":"paragraph","text":"毛泽东主席在宴会开始时致词，对阿查里雅首相和他的夫人以及同他一道来中国的朋友们表示热烈欢迎。毛泽东主席说：尼泊尔同中国有长久的历史关系，两国人民间有深厚的友谊。我们两国之间有一座山，这座山是世界上最高的山，这座山不仅连结着中国和尼泊尔，而且也连结着中国和印度。所以，印度、尼泊尔和中国是连结在一起的，我们都是近邻。毛泽东主席接着举杯祝尼泊尔国王陛下的身体健康，祝尼泊尔王国首相阿查里雅阁下和他的夫人以及同他一道来中国访问的朋友们的身体健康，祝在座的印度朋友们的身体健康，祝中国、尼泊尔和印度三国团结一致，祝尼中两国恢复外交关系和最近签订的协定。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":9,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":75,"page_end":75},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"360d22b7f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
