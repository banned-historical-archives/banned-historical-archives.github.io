" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来给曾思玉的电话指示","authors":["周恩来"],"dates":[{"year":1968,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"周恩来给曾思玉的电话指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"周总理六月十四日十一时给曾思玉同志的电话指示","type":"paragraph"},{"text":"昨天晚上中央的碰头会议，又谈到军内的稳定问题，军内在任何时候，都必须要团结一致，都必须要保持高度的集中统一，都必须要保持高度地稳定。","type":"paragraph"},{"text":"一定要按照毛主席的三大纪律，八项注意办事，一定要服从命令，听从指挥，违抗命令是不容许的，破坏部队的稳定是违犯纪律的，是对毛主席的不忠，要用毛主席的古田会议决议和一系列最新指示教育部队，要听毛主席的话，照毛主席的指示办事，理解的执行，不理解的也要执行，部队稳定了，革命委员会才能巩固和发展，你们要警惕，现在有人想搞乱部队，有坏人挑动，搞军队，他们想破坏军队的稳定，这是违法的，不容许的。军队的稳定，中央希望武汉军区作出个样子来，你们作出个样子来对于其他的有影响。","type":"paragraph"},{"text":"对于李迎希的处理问题，毛主席知道了，同意这样处理，先解决军内问题后解决地方问题，林副主席的指示同毛主席的指示是一致的，毛主席、林副主席对稳定军队、稳定革命委员会很关心，希望你们一定做出个样子来。（根据首长传达记录，未经首长审阅）","type":"paragraph"}],"comments":[],"origin":"《无产者报》  开封市工代会工总司机关报  一九六八年六月二十八日  第五十九期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"曾思玉","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"960a22f314"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
