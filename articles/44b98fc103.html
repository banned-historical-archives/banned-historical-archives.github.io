art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"提高革命警惕搞好战备训练沈阳部队某部红二连以实际行动支援灾区人民抗震救灾","authors":[],"parts":[{"type":"paragraph","text":"本报讯 河北省唐山、丰南一带发生强烈地震以来，驻守在祖国东北反修前哨的沈阳部队某部红二连指战员在灾区人民人定胜天的精神鼓舞下，以抓紧战备训练、守卫好祖国东北大门的实际行动，支援灾区人民的抗震救灾斗争。"},{"type":"paragraph","text":"唐山、丰南地区发生强烈地震后，引起了红二连干部战士的极大关切。当中共中央给唐山、丰南一带地震灾区人民的慰问电发表后，党支部立即组织全连同志逐句逐字地认真学习。在学习的基础上，指导员刘文革对全连进行了一次战备教育，并发动大家围绕着“如何加强战备，以实际行动支援抗震救灾”的问题展开讨论。战士们说：在当前全国军民和灾区人民团结奋战、抗震救灾的形势下，我们更要保持高度警惕。国内的阶级敌人会不择手段地搞反革命破坏活动，国际上的帝国主义可能利用地震灾害，趁火打劫，特别是苏修社会帝国主义，更是什么坏事都能干出来。我军作为无产阶级专政的柱石，一定要百倍警惕，加强战备，不仅要随时准备粉碎党内资产阶级和阶级敌人的破坏捣乱，而且要随时准备反击帝国主义、社会帝国主义的武装侵略。大家纷纷表示：“我们要学习灾区人民人定胜天的革命精神，加强批邓火力，开足训练马力，认真落实各项战备工作，坚决把好祖国大门，保证灾区人民集中精力，重建家园，誓做灾区人民的坚强后盾。”为进一步提高以阶级斗争为纲，做好战备工作的自觉性，二连专题批判了邓小平鼓吹军队工作以“整顿”为纲的反动谬论，推动了战备训练和各项工作的发展。连队还搞了紧急集合，全面检验战备工作的落实情况。"},{"type":"paragraph","text":"连日来，红二连从难从严，从实战需要出发，主动增大训练难度，安排了技术、基础综合演练。他们还遵照毛主席关于近战、夜战的指示，进行了夜间闪光照明射击训练和夜间用地雷、炸药包打坦克的训练。同志们不但在正课时间刻苦练，而且还挤出休息时间自觉练。有的战士带病参加训练。他们说：灾区人民七级地震震不垮，泰山压顶不弯腰，咱们身体有点病算个啥。全连干部战士怀着对灾区人民深厚的无产阶级感情，对祖国安危高度负责的革命精神，自觉落实各项战备工作。五班战士利用课余时间对全班的武器、米袋、雨衣、水壶等战备行动必须随身携带的物品，一件一件地进行了检查。新战士吴亚君发现机枪的枪衣用脏了，磨破了，便牺牲休息时间，将枪衣洗净补好。他还和战士王庆林一起挤出午睡时间，给全排做了十二个擦枪用的毛刷。战士邱孝友坚持为战备苦练硬功，多学几手，他本来是火箭筒手，在掌握火箭筒打坦克射击要领的基础上，坚持天天早起床练投弹，晚饭后持枪练习跑障碍，胳膊练痛了不停手，双腿跑酸了不歇脚。战士们说，我们一定要学习灾区人民的革命斗争精神，进一步掀起批邓、反击右倾翻案风的新高潮，鼓起更大的革命干劲，把战备训练工作做得更好，用实际行动支援灾区人民的斗争。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44b98fc103"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
