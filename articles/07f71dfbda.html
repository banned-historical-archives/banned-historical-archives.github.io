"authors":[],"dates":[{"year":1963,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社哈瓦那29日电】　著名古巴黑人歌唱家伊格纳西奥·维亚(艺名雪球)今天向新华社古巴分社发表声明，表示“感谢毛泽东同志支持美国黑人斗争的声明”。"},{"type":"paragraph","text":"维亚的声明表示支持美国黑人的斗争。声明说。“向华盛顿的进军，作为现时代的社会和人权运动，是目前最重要的事件。作为世界黑人的一员，我感到很幸福。”它还说，“美国人民争取人权平等、冲破种族壁垒的斗争可以使黑人获得最后胜利。”"},{"type":"paragraph","text":"【据新华社哈瓦那29日电】　著名智利画家何塞·万徒勒里今天在此间向新华社古巴分社发表声明，声援美国黑人反对种族歧视的斗争，并且表示欢迎毛泽东主席8日发表的支持美国黑人斗争的声明。"},{"type":"paragraph","text":"万徒勒里的声明说，“美国黑人反对种族歧视和暴行的群众性斗争是被压迫者对美帝国主义所实行的种族压迫、种族隔离、凌辱和杀害制度的不可避免的回击的开始。”声明说，“这种极端反动的国内政策不过是美国实行侵略和奴役的对外政策的另一面。”"},{"type":"paragraph","text":"声明指出，“正如美帝国主义同全世界被压迫人民的坚决斗争发生冲突一样，肯尼迪政府同黑人争取自己长期被侵犯的权利的顽强斗争发生了冲突。美国黑人已经走上真正的道路，不是耐心地等待，而是坚决地斗争。他们是美国人民的希望。”"},{"type":"paragraph","text":"声明说，“全世界人民都同他们站在一起，世界人民同他们一样具有争取自由的共同理想以及反对和战胜美帝国主义敌人的决心。”"},{"type":"paragraph","text":"声明最后说，“在这方面，有日益增加的数不尽的证明。中国人民群众的盛大示威行动和毛泽东主席的呼吁是一个伟大的范例。所有为反对帝国主义、争取和平和进步而斗争的人都和美国人民中最受压迫、最受奴役的人们团结在一起也是证明。他们的斗争是历史上被压迫阶级和压迫阶级不可调和的对立的一部分。他们的行动是各国人民反对帝国主义、争取民族权利、社会权利和人权的统一行动的一部分。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07f71dfbda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
