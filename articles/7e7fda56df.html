rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见各国科学家参加北京物理讨论会的各国朋友激动地高呼；“毛主席万岁！万万岁！”","authors":[],"parts":[{"type":"paragraph","text":"新华社三十一日讯 毛泽东主席今晚接见了参加北京科学讨论会一九六六年暑期物理讨论会的三十三个国家及一个地区性学术组织的科学家代表团和科学家，以及其他外国朋友。"},{"type":"paragraph","text":"毛主席同各国科学家见面的时候，各国科学家长时间地热烈鼓掌，激动地高呼："},{"type":"paragraph","text":"“毛主席万岁！”“毛主席万岁！”"},{"type":"paragraph","text":"毛主席在热烈的掌声中，同各国科学家亲切握手，并且同他们合影。"},{"type":"paragraph","text":"毛主席同科学家们合影后离开大厅的时候，各国科学家拥向毛主席，不断高呼："},{"type":"paragraph","text":"“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"参加接见的党和国家领导人有：周恩来、陈毅、李富春、贺龙、陈伯达、康生、薄一波、陶铸、聂荣臻、叶剑英、谢富治、林枫、刘宁一、郭沫若、杨明轩和程潜等。"},{"type":"paragraph","text":"七月三十一日，毛泽东主席接见参加北京科学讨论会一九六六年暑期物理讨论会的三十三个国家和一个地区性学术组织的科学家代表团和科学家，以及其他外国朋友。"},{"type":"paragraph","text":"新华社记者摄（照片）RW：毛泽东；接见外宾"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e7fda56df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
