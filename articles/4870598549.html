script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对资方残酷剥削　争取改善生活条件  美国二十五万汽车工人大罢工  资本家不得不接受工人大部分要求","authors":[],"dates":[{"year":1958,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资方残酷剥削　争取改善生活条件"},{"type":"paragraph","text":"美国二十五万汽车工人大罢工"},{"type":"paragraph","text":"资本家不得不接受工人大部分要求"},{"type":"paragraph","text":"新华社5日讯　华盛顿消息：美国约二十五万汽车工人从2日开始举行大罢工，要求提高工资和改善福利待遇。罢工已经使资方不得不接受工人提出的大部分要求。"},{"type":"paragraph","text":"这些汽车工人是属于联合汽车工人工会的。这个工会最近曾经分别同美国三大汽车公司——通用汽车公司、克莱斯勒汽车公司和福特汽车公司举行关于签订新的集体合同的谈判，在谈判中提出了改善工人待遇的要求。福特汽车公司和克莱斯勒汽车公司在经过长期的拖延后在不久前已不得不改变原来的顽固态度，同意接受工人的一些要求，同工会签订了新的集体合同。但是势力最大的通用汽车公司却企图顽抗到底，拒绝改善汽车工人的生活。"},{"type":"paragraph","text":"通用汽车公司老板的态度激怒了工人。从2日起，通用汽车公司在美国七十一个城市的一百二十六家工厂的约二十五万汽车工人放下了工具，举行今年以来美国最大的一次罢工。这个罢工使通用汽车公司这个所谓资本主义世界最大的制造业联合企业的生产陷于停顿。"},{"type":"paragraph","text":"在罢工约十二小时后，通用汽车公司资方无可奈何地接受了工人的建议，同意把工人每小时工资提高二角四分到三角美元，并且同工会签订了为期三年的集体合同。但是由于一些地方工会和资方的纠纷还没有解决，二十五万汽车工人的罢工在3日还在继续进行中。"},{"type":"paragraph","text":"与此同时，属于国际电气工人工会的二万五千名工人也在通用汽车公司的六家工厂举行罢工。克莱斯勒汽车公司十家工厂一万二千四百名工人和福特汽车公司芝加哥厂的一千五百五十名工人也举行了自发罢工。"},{"type":"paragraph","text":"美国汽车工人的罢工标志着美国工人争取切身权利的斗争的新高涨。据报道，在2日举行罢工的还有华盛顿的报纸印刷工人和美国东海岸的轮船职工。报纸印刷工人的罢工使美国首都的报纸在2日完全停版，而轮船职工的罢工使美国东海岸从波士顿到新奥尔良一带各港口的轮船客运和货运工作差不多全部陷于瘫痪。（附图片）"},{"type":"paragraph","text":"美国底特律通用汽车公司工厂的工人罢工，要求改善工作条件，提高待遇。图为在工厂门前示威的工人队伍。　新华社稿（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4870598549"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
