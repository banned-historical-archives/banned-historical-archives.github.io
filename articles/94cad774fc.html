"dates":[{"year":1982,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十一月二十六日电　宪法修改委员会副主任委员彭真指出，根据历史的经验和“文化大革命”的教训，宪法修改草案关于公民的各项基本权利的规定，不仅恢复了一九五四年宪法的内容，而且规定得更加切实和明确，还增加了新的内容。"},{"type":"paragraph","text":"彭真在关于宪法修改草案的报告中谈到公民的权利和义务时举例说，关于公民的人格尊严不受侵犯的条文，是新增加的；关于公民的人生自由(11月28日2版更正为“公民的人身自由”)，宗教信仰自由，公民住宅不受侵犯，通信自由和通信秘密受法律保护，以及公民对于任何国家机关和国家工作人员有提出批评和建议的权利，对于任何国家机关和国家工作人员的违法失职行为有提出申诉、控告或检举的权利，等等，都比过去规定得更加具体。为了保证公民权利的实现和逐步扩大，草案还规定了国家相应的基本政策和措施。"},{"type":"paragraph","text":"彭真指出，世界上从来不存在什么绝对的、不受任何限制的自由和权利。我们是社会主义国家，国家的、社会的利益同公民个人利益在根本上是一致的。只有广大人民的民主权利和根本利益都得到保障和发展，公民个人的自由和权利才有可能得到切实保障和充分实现。"},{"type":"paragraph","text":"他说，宪法修改草案规定:“任何公民享有宪法和法律规定的权利，同时必须履行宪法和法律规定的义务。”根据这个基本原则，草案规定了公民对于国家和社会应尽的各项义务。大家都遵守和履行公民的这些基本义务，才能保障大家都享受宪法规定的公民权利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94cad774fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
