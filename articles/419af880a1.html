飞、乔冠华、吴德等应邀出席　尼克松总统和周恩来总理先后在宴会上祝酒","authors":[],"dates":[{"year":1972,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年二月二十五日电　美利坚合众国总统理查德·尼克松和夫人今天晚上在人民大会堂宴会厅举行答谢宴会。"},{"type":"paragraph","text":"国务院总理周恩来，军委副主席叶剑英，国务院副总理李先念，人大常委会副委员长郭沫若、阿沛·阿旺晋美，政协全国委员会副主席傅作义，外交部部长姬鹏飞、副部长乔冠华，北京市革命委员会副主任吴德，以及林佳楣、许寒冰同志等，应邀出席了宴会。"},{"type":"paragraph","text":"罗杰斯国务卿、基辛格博士、霍尔德曼、齐格勒、斯考克罗夫特将军、格林、查平、斯卡利、布坎南、伍兹小姐、詹金斯、霍尔德里奇、洛德等出席作陪。"},{"type":"paragraph","text":"宴会厅里悬挂着中国国旗和美国国旗。宴会开始时乐队奏中国国歌和美国国歌。尼克松总统和周恩来总理先后在宴会上祝酒(祝酒词全文另发)。席间，乐队演奏了中美两国乐曲。"},{"type":"paragraph","text":"应邀出席宴会的还有:"},{"type":"paragraph","text":"政府部门、中国人民解放军、北京市革命委员会和首都新闻单位的负责人白相国、李耀文、韩念龙、马文波、肖劲光、彭绍辉、邝任农、刘贤权、李震、陈慕华、钱正英、王猛、吴忠、符浩、熊向晖、张纪之、石少华、刘建功、鲁瑛、丁峤、阎钧、申光、杨德中、马仁辉、丁国钰、柴成文、章文晋、韩叙、王海容、柯柏年、彭华、王珍、张灿明、王栋、迟群、谢静宜、冀朝铸、章含之、唐闻生；"},{"type":"paragraph","text":"人大常委会委员谢扶民、贝时璋、华罗庚、季方、竺可桢、林巧稚、胡愈之、罗叔章；"},{"type":"paragraph","text":"政协全国委员会常务委员张奚若、周培源、朱蕴山、刘斐、刘文辉、荣毅仁，政协全国委员会委员冯友兰、杜聿明、郑洞国，知名人士程思远；"},{"type":"paragraph","text":"各界人士吴阶平、吴桓兴、诸福棠、宋正廉、王冶秋、夏鼐、钱伟长、李正理、于会泳、刘庆棠、薛菁华、李德伦、谭元寿、浩亮、杜近芳、袁世海、李希凡、谢铁骊、刘春华、古元、宋中、庄则栋、林慧卿、李富荣、郑敏之、倪志钦、王维俭、尹锡南、汤仙虎。"},{"type":"paragraph","text":"宴会前，尼克松总统和夫人等同参加宴会的我国领导人和各界人士分别照了像。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"419af880a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
