script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在资产阶级艺术思想指导下  上海电影制片公司追求豪华","authors":[],"dates":[{"year":1958,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在资产阶级艺术思想指导下"},{"type":"paragraph","text":"上海电影制片公司追求豪华"},{"type":"paragraph","text":"据新华社上海30日电　上海电影制片公司的职工最近在反浪费专题鸣放中，检查揭发出公司在各方面的大量浪费现象。仅五年来因盲目购置机器设备的积压浪费和1957年在临时工资、胶片、布景、服装等方面的浪费部分，就达二百三十万元左右，可以拍摄十部到十二部影片，相当于1957年摄制的全部影片的一半以上。"},{"type":"paragraph","text":"在揭发的浪费现象中，最使人们震惊的，是在影片生产过程中由于资产阶级艺术思想的指导所造成的浪费。不顾剧情、人物，盲目地追求和卖弄布景、道具、服装的豪华，不但浪费了国家大量资财，也伤害了剧情，降低了影片的艺术质量。有部影片因硬要在室内拍摄农村外景，耗费了九千多元。另一部影片曾花三千多元搭一个舞厅，结果，所拍的跳舞镜头因不合剧情而被剪掉。影片“情长谊深”中科学家住的楼房，布景用了六千元，只拍了两个镜头，而现实生活中只有最阔气的资本家才会住这样的房子。有一部古装片中有一条护城河，是用了两千个人工、耗费了一万五千元修的，但后来在影片中却不大看得见。有的布景太大、太讲究，根本拍不到全貌，不得不专为了布景拍些特写镜头。"},{"type":"paragraph","text":"有人讽刺某些影片像服装展览会。某影片中一个坚决到最艰苦的建筑工地去服务的女护士，前后竟换了二十四套讲究的衣服。某影片表现新中国培养的第一批女领航员，仅三个女领航员的服装费就用了将近一千元。有一部古装片，服装选了最好的锦缎做，结果因为质料太好了，走起路来有响声，没法拍戏，只得重做。"},{"type":"paragraph","text":"上影资产阶级艺术思想形成的铺张浪费，同时暴露出公司计划管理的混乱和不健全。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2cf23adba"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
