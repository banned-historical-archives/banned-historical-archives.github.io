art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"捷出版毛主席军事著作选集","authors":[],"parts":[{"type":"paragraph","text":"新华社布拉格21日电 捷克斯洛伐克的“我们的军队出版社”最近出版了毛泽东关于军事问题著作的选集。全书共三百八十三页，分成三个主要部分：中国第二次国内革命战争时期、抗日战争时期和第三次国内革命战争时期。"},{"type":"paragraph","text":"编辑部在书上的“凡例”中指出，这部选集包括中国共产党的杰出领袖、光辉的马克思主义者和军事问题专家毛泽东同志的关于中国人民革命战争的最重要的著作。"},{"type":"paragraph","text":"捷克斯洛伐克国防部机关报“人民防线报”为此发表的书评写道，这部选集具有重大的意义，因为毛泽东同志根据中国的条件光辉地把马克思主义学说运用于革命战争和军事科学，并且通过对事实的分析得出了具有广泛内容的和确实有效的结论。书评强调说，毛泽东的这些著作可以同恩格斯和列宁关于战争和军事科学问题的最重要的著作并列在一起。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9d890ae3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
