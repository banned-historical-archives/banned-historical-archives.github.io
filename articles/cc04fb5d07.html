art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛主席万岁”永远刻在战士心中","authors":["肖哲仁"],"parts":[{"type":"paragraph","text":"走进场务连，一片节日景象。“毛主席万岁”五个金光闪闪的大字，高悬在走廊的正中央。每当同志们看到这五个金色大字，一轮火红的太阳升起在心中。"},{"type":"paragraph","text":"“毛主席万岁”这五个金光闪闪的大字，是王补景同志怀着对最最敬爱的伟大领袖毛主席无限热爱的深情，精心制作的。"},{"type":"paragraph","text":"随着文化大革命的深入发展，广大干部战士对毛主席的热爱越来越深，每当王补景和战友们一同高呼“毛主席万岁”的时候，就觉得有个心事没有落下来。他心里想，要是能让大家天天都能看到“毛主席万岁”就更好了。于是，他决定用木板刻制“毛主席万岁！”五个大字。"},{"type":"paragraph","text":"没有木板，怎么办呢？再大的困难，挡不住战士无限热爱毛主席的红心！王补景顶着烈日，利用午休时间，跑遍了机场，东一块，西一块，找来了一大堆木料。经过精心加工，终于制成了“毛主席万岁！”五个金色大字。每个字，都是用战士对伟大领袖毛主席无限热爱、无限忠诚、无限信仰、无限崇拜的最真挚的阶级感情刻成的！每个字，都最集中地表达了革命战士无限忠于伟大领袖毛主席的心意！"},{"type":"paragraph","text":"“毛主席万岁！”这是战士最爱高呼的口号。"},{"type":"paragraph","text":"“毛主席万岁”五个金色大字，永远铭刻在每个战士的心中！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc04fb5d07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
