al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"一军团十五军团行动部署叫","alias":"","parts":[{"type":"paragraph","text":"一军团十五军团行动部署！]"},{"type":"paragraph","text":"（1935年11月23日）彭、周："},{"type":"paragraph","text":"甲、在包围黑水寺?整个解决董英斌的基本方针下，决以一军团主力进至韩家河、甘沟门、王家庄地区，由荣臻率第一团、第十三团及侦察连进至龙义湾、王家角及其以北地区，均于本日下午到达。"},{"type":"paragraph","text":"乙、十五军团应以一部包围直罗镇，保证消灭此敌，而以主力于明（二十四）日一时出发，秘密离开现地移至下瓦房、孟家油房、水磨上、孟坪寺、月亮山、二十里排、马渠寺沟地区，配合第一团、第十三团夺取黑水寺、太白镇两点中间之三四十里地区，准备打击西面增援之敌。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"二十三日八时[1]这是毛泽东给红军第一方面军司令员彭德怀和周恩来的电报。[2]黑水寺，村名，位于陕西省富县西部。"},{"type":"paragraph","text":"[3]董英斌，当时任国民党军西北“剿匪”总司令部第二路第七纵队（第五十七军）司令。"},{"type":"paragraph","text":"[4]荣臻，即聂荣臻，当时任红军第一方面军第一军团政治委员。[5]太白镇，位于甘肃省合水县东北。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":11,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":68,"page_end":68},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e989e7f07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
