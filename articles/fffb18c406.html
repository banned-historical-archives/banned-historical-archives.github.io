art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的指示我们一万个照办","authors":["驻苇河某部学习毛主席著作积极分子伊福欣"],"parts":[{"type":"paragraph","text":"我们听到了《中共中央给全国厂矿企业革命职工、革命干部的信》，感到无比欢欣鼓舞。“十六条”指出：“无产阶级文化大革命，就是为的要使人的思想革命化，因而使各项工作做得更多、更快、更好、更省。”在无产阶级文化大革命进入新的阶段、两条路线斗争进入决战的时刻，毛主席、党中央号召人民解放军大力协助地方，支持工业生产工作，具有着伟大的战略意义。我军是毛主席亲手缔造的人民军队，是社会主义的建设者和保卫者。毛主席和党中央的伟大号召，我们一千个拥护，一万个照办。"},{"type":"paragraph","text":"工业生产的好坏，是关系到我国社会主义建设、关系到能否把无产阶级文化大革命进行到底的大事。今年二月份，我们响应毛主席的伟大号召，坚定地支持了苇河地区左派广大群众，粉碎了阶级敌人破坏无产阶级文化大革命、破坏生产的罪恶阴谋。经过深入细致的政治思想工作，使广大革命群众和革命干部，在毛泽东思想的旗帜下团结起来。他们狠抓革命，猛促生产，以更大的干劲，更快的速度，更好的质量，超额完成了生产计划。这充分证明，毛泽东思想一旦被广大群众所掌握，就会变成巨大的物质力量。"},{"type":"paragraph","text":"我们一定要更高地举起毛泽东思想伟大红旗，深入宣传《中共中央给全国厂矿企业革命职工、革命干部的信》，让毛主席的最新指示，印在广大革命群众的脑子里，落实到行动上，为无产阶级文化大革命、为社会主义建设作出新的贡献。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fffb18c406"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
