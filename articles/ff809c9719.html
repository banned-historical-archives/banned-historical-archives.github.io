<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大的光荣的正确的中国共产党及其领袖毛泽东同志万岁!中国共产党三十年(连环画)","authors":[],"dates":[{"year":1951,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e赵枫川,古一舟,吴静波\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e赵枫川　古一舟　吴静波　集体画"},{"type":"paragraph","text":"(此画稿系华北人民社供给)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(一)鸦片战争以后，帝国主义侵入中国，中国人民头上压了帝国主义和封建势力两座大山。外国资本家在中国办工厂，中国有一部分商人、地主和官僚也投资到新式工业。中国有了工人阶级，这是产生中国共产党的阶级基础。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二)一九一七年，俄国工人阶级在列宁、斯大林领导下，建立起头一个社会主义国家，这是马克思列宁主义在世界上第一次伟大胜利。俄国十月革命的成功告诉中国人民，要取得革命胜利就得走俄国的道路。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(三)一九一九年五月四日，北京学生在天安门前举行反对卖国政府的示威，这是中国新民主主义革命的起点。六月三日，上海、唐山、长辛店等地工人，也罢工参加了这个运动；从此，中国工人阶级开始进行政治斗争。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(四)“五四”前后，革命知识分子李大剑、毛泽东等，办了“新青年”、“湘江评论”等等刊物，宣传马克思列宁主义，教育工人。在湖南、上海和北方的一些地方，组织了许许多多工人团体。到一九二○年月以后，各地方先后建立了共产主义小组。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(五)一九二一年七月一日，各地共产主义小组的代表，在上海开第一次全国代表大会，毛泽东参加了这次大会。会上通过按列宁建党的原则建设中国共产党，产生了临时中央局，中国共产党成立。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(六)中国共产党成立后，领导了香港海员、湖南矿工和开澡煤矿的罢工斗争。一九二三年，京汉铁路工人组织工会，军阀阻止，工人举行大罢工。二月七日，军阀吴佩孚屠杀共产党员林祥谦、施祥和许多工人。“二七”事件显示了中国工人阶级的政治觉悟和组织性，显示了中国工人阶级是中国人民最先进的阶级。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(七)一九二二年七月，中国共产党在上海开第二次全国代表大会，通过了反帝反封建的民主革命纲领，提出“反对帝国主义”“反对军阀”的口号。第三次全国代表大会是一九二三年在广州开的，这次会上决定跟孙中山合作，建立革命统一战线。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100108.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(八)一九二五年五月三十日，上海工人、学生抗议日本资本家打死工人领袖顾正红，在南京路游行、讲演。英、日、美等帝国主义命令警察开枪打学生和游行群众，死伤很多人。全国各地接着举行罢工、罢课、罢市，“五卅”运动发展成全国人民的反帝高潮。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100109.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(九)中国共产党领导了省港大罢工和广东、湖南等地的农民运动。毛泽东根据对中国社会各阶级的分析，认识到农民是中国革命的主要力量，主持了“农民运动讲习所”的训练工作，以后又发表了著名的“湖南农民运动考察报告”。一九二六年七月，革命军在工农支援下北伐，很快打垮封建军阀吴佩孚、孙传芳。汉口、九江工人收回了英国租界，上海工人三次起义占领上海。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100110.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十)帝国主义封建势力在革命面前十分害怕，收买了混进革命阵营里的蒋介石反革命投机集团。一九二七年四月十二日，反动势力首先在上海屠杀共产党员和革命群众。那时候领导中国共产党的陈独秀犯了右倾投降主义错误，放弃对农民和武装的领导，结果第一次国内革命战争遭到失败。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100111.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十一)中国共产党纠正了陈独秀投降主义错误。一九二七年八月一日，由周恩来、朱德、叶挺、贺龙等同志在南昌率领在党影响之下的北伐军三万余人举行武装起义；十二月十一日，中国共产党广东省委领导广州起义；湖南、江西、广东等地都举行了秋收起义。中国共产党继续领导工、农、小资产阶级，拿起武器进行第二次国内革命战争。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100112.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十二)一九二七年秋，毛泽东收集湖南、江西边界秋收起义队伍，组成工农红军第一军第一师，开到井岗山建立头一个革命根据地。第二年，朱德带队伍到井岗山会师，成立工农红军第四军。工农红军是中国工人阶级领导的人民武装，革命的武装是革命胜利的保证。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100113.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十三)一九二八年七月，中国共产党开第六次全国代表大会，发布了民主革命纲领，决定推翻国民党反动统治，实行土地革命，建立工农民主政权。一九二九年到一九三○年，毛泽东在乡村建设革命根据地，福建、江西、广东边界的中央革命根据地和其他革命根据地一天天壮大起来。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100114.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十四)一九三一年十一月七日，工农民主中央政府在江西瑞金成立。工农红军在毛泽东战略思想指导下，自一九三○年到一九三三年，接连四次打垮蒋介石反革命的围攻。“九、一八”“一、二八”事变以后，一九三三年中国共产党宣言:愿在三个条件下，与全国军队共同抗日；一九三年六年初，东北抗日联军正式成立。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100115.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十五)蒋介石反革命集团，得到了英、美帝国主义和德、意法西斯财政上、军事上的援助，对红军发动第五次围攻。那时候红军军事领导违反了毛泽东的战略思想，没有能够打破敌人的进攻。一九三四年十月，中央红军离开中央革命根据地，开始长征北上抗日。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100116.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十六)一九三五年一月，中国共产党中央到了贵州开了“遵义会议”，清算了反五次围攻时期的军事错误，确立了以毛泽东为首的党中央的正确领导。接着和在四川的红四方面军会合，克服了张国焘分裂党、分裂红军的罪恶行动。红军主力战胜艰难困苦和敌人的阻拦，过了大草地，完成二万五千里长征，到达陕北抗日前进阵地。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\07\\5171100117.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(十七)蒋介石反动集团和日寇签订许多卖国协定，民族危机一天天严重，一九三五年八月一日，中国共产党中央发出“八一宣言”，提出“停止内战，一致抗日”的主张。十二月，在中国共产党领导下，北京学生发动“十二、九”“一二、一六”爱国运动，这个运动掀起了抗日救亡的高潮。\u003c/FONT\u003e"}],"comments":[],"origin":"华北人民社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"陈独秀","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff809c9719"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
