script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0fcbbaa0-3b65-40fb-902e-678b9fd6e506","name":"共产党宣言（人民出版社1963年版）","internal":false,"official":true,"type":"pdf","author":"马克思、恩格斯，人民出版社1963年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/0fcbbaa0-3b65-40fb-902e-678b9fd6e506.pdf"],"article":{"title":"1872年德文版序言","alias":"","parts":[{"type":"paragraph","text":"1872年德文版序言"},{"type":"paragraph","text":"“共产主义者同盟”这一在当时条件下自然只能是个秘密团体的国际工人粗织，在1847年11月偷敦代表大会上委托我们两人起草-一个预备公布的周群的理和实的党钢。秸果就产生了下面的“宣言”，其原稿系于二月革命①前几星期寄至伦敦付印。“宣言”最初是用德文出版，后来又用德文在德英美三国至少翻印过十二次。第-一次英文本系由麦克花俞女士执笔，于1850年在伦敦“红色共和党人”杂志上发表，后来1871年间在美国至少叉出版过三种英文本。法文本是于1848年六月起义前不久第一次在巴黎印行，最近又在豹的“社会主义者”上刊载过；现在又有人在准备着一种新的法文本。波兰文本自德文本初版问世后不久就在偷敦出现。俄文本是于60年代在日内瓦刊印。丹麦文本也是在原版出世后不久就出版了。"},{"type":"paragraph","text":"虽然最近二十五年来的实际情形已有过重大的变"},{"type":"paragraph","text":"①系指1848年法国二月革命而言。--者注更，但本“宣言”中所发的一般基本原理整个来至今还是完至正确。在个别地方本应加以某些修改。这些基本原理在实际方面的运用，正如“宣言”本身所，是随时随地都要依现存历史条件为转移的，所以第二章末尾所提出的那些革命措施并没有什么孤独自在的意义。在现今的时候，这一段在许多方面都要写得不同了。由于最近二十五年来大工业已有大规模的发展以及工人阶级的政党粗织已跟着增长起来，由于首先既有过二月革命的实际经验而后来又尤其有过无产阶级第一次掌握政权达两月之久的巴黎公社的实际经验，所以这个领现在有某些地方已经陈旧了。特别是公社已证明出：“工人阶毅不能简单地握取现成的国家机器并运用它来达到自己的目的”（参看“法兰西内战”“国际工人协会总委员会宣言”德文版，第19页，那里把这个思想发得更为完备）。其次，很明显的，当时对于社会主义文献所作的批在今天看来是不完备的，因为这一批只包括到1847年止；同样，很明显的，当时关于共产党人对各种反对党派的态度问题所述的意见（第四章）虽然大体上至今还是正确，但它在某些枝节方面移究已嫌陈旧，这至少是因为政治形势已经完全改变，而当时所列举的那些党派大部分已被历史发展进程根本扫除了。"},{"type":"paragraph","text":"但“宣言”是一个历史文件，所以我们认为自已已没有权利来加以更改。以后重版时也许能加上一篇包括从1847年到现在时期的导言。这次付印太仓卒了，我们竟没有来得及这样作。"},{"type":"paragraph","text":"卡尔·马克思"},{"type":"paragraph","text":"弗里德里希·恩格斯"},{"type":"paragraph","text":"1872年6月24日，偷敦"},{"type":"paragraph","text":"1872年6月24日，偷敦"}],"authors":["恩格斯","马克思"],"dates":[{"year":1872,"month":6,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":8,"page_end":10},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d20cfa30f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
