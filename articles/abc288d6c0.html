{"year":1968,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在松江线路的某大桥上，有一支人民解放军小分队。他们用无限忠于伟大领袖毛主席的红心，长年累月地护卫着大桥，护卫着红色线路，捍卫着毛主席的无产阶级革命路线。"},{"type":"paragraph","text":"六月中旬的一天，一清早，有个贫农女社员不慎掉在河里了。此时正值涨潮，水势很大，顷刻间，滔滔的河水把贫农女社员淹没了。"},{"type":"paragraph","text":"就在这时，大桥上小分队的紧急集合声响了。"},{"type":"paragraph","text":"“‘完全’‘彻底’为人民服务!”"},{"type":"paragraph","text":"“为人民而死，就是死得其所”!"},{"type":"paragraph","text":"小分队的七名战士，在毛主席教导的鼓励下，冲过大桥，沿着河堤飞奔而去。正在生病的共产党员、班长方永俊高呼:“毛主席万岁!”奋不顾身地跳进激流中。七位战士也都高呼:“毛主席万岁!”为抢救贫农女社员在潮水中翻腾着。浪，劈头盖脑地向新战士胡汉林打来，眼看他快被激流淹没了。老战士徐士田急忙游过去想救小胡。这时，小胡猛地从波浪中昂起头来，大声说:“快，救社员要紧。”老徐听了，万分激动，望了一下小胡，回身就劈浪前进，朝着女社员落水的方向游去。"},{"type":"paragraph","text":"“下定决心，不怕牺牲，排除万难，去争取胜利。”激流险浪怎能吓倒用毛泽东思想武装起来的战士。胡汉林想到保护人民，就是捍卫毛主席的无产阶级革命路线，毛主席的战士就要随时准备为人民利益而献身。小胡想到这里，浑身增添了无穷的力量，滔滔的潮水吓不倒我们的战士奋勇前进!"},{"type":"paragraph","text":"在河水里，还没有找到贫农女社员。班长方永俊游到河心时，突然被一个漩涡卷到河底。"},{"type":"paragraph","text":"“班长，班长!”"},{"type":"paragraph","text":"老战士王其才、张学玉叫喊着，猛扑过去，抢救班长。此刻，班长方永俊耳边响起的是毛主席的伟大教导:“这个军队具有一往无前的精神，它要压倒一切敌人，而决不被敌人所屈服。”他心里想的是贫农女社员的安危。小小漩涡算得了什么?心中有了毛主席，有了人民，就有了排山倒海的力量。方永俊象箭一样穿出了水面，一看身边的战友王其才、张学玉，就高喊一声:“为了人民利益，冲啊!”"},{"type":"paragraph","text":"狂水恶浪打不散、淹不没的七位战士，劈开浪潮，奋勇前进。老战士仲崇斌第一个找到了贫农女社员，用了全身力气把她托出水面，他自己却沉了下去，河水一口一口往老仲嘴里灌，但他的双臂就象两根钢铁支柱，坚持托着贫农女社员。这时，战友们很快地游过来，立即把已昏过去的贫农女社员救起来送到岸上。"},{"type":"paragraph","text":"第二天，生产队的贫下中农，敲锣打鼓地来到大桥上，向小分队的解放军进行热烈的慰问。贫农女社员双手捧着毛主席像，含着激动的热泪说:“亲人解放军’你们真是毛主席的好战士，贫下中农的贴心人!”贫下中农一个一个紧握着战士们的双手，大家望着伟大领袖毛主席的画像，激动地同声高呼:“毛主席万岁!”“毛主席万万岁!”"},{"type":"paragraph","text":"(陆兵)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abc288d6c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
