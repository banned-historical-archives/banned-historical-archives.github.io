torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"配合张学良杨虎城部消灭东来之敌","alias":"","parts":[{"type":"paragraph","text":"配合张学良杨虎城部消灭东来之敌！"},{"type":"paragraph","text":"（1936年12月19日）周："},{"type":"paragraph","text":"甲、时局正在发展，一方面日本军阀、中国汉奸、南京右派，极力制造内战局面；另一方面西安抗日军、红军、中国人民、中国反蒋实力派、南京左派、国际和平国家，正在结合反对内战，拥护抗日。"},{"type":"paragraph","text":"乙、苏维埃、共产党十九日主张召集和平会议之通电，乃为团结一切国内、国际左翼及中间势力，为反对内战、拥护抗日而斗争。"},{"type":"paragraph","text":"丙、西安抗日军亦应本此共同之总方针而前进。丁、坚决消灭进攻之敌，为执行此总方针之重要手段。戊、红军决向西安集中，配合张杨首先消灭东来之敌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十九日二十三时"},{"type":"paragraph","text":"[1]西安事变发生后，中共中央应张学良、杨虎城的邀请，派周恩来、博古（秦邦宪）和叶剑英等为代表到西安与张、杨和各界爱国人士共商国是，并同蒋介石直接谈判；同时，在军事上作了以红军主力协同东北军、第十七路军准备迎击“讨逆”军进攻的部署。这是毛泽东给周恩来的电报。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":191,"page_end":191},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb2531c761"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
