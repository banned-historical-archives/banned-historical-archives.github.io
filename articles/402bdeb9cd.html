ear":1962,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京三十日电】　东京消息:在美日垄断资本的残酷剥削下，日本工人过着非常困苦的生活。"},{"type":"paragraph","text":"日本作为一个高度发达的工业国家，劳动生产率正在赶上欧美各国，但是工人的工资却是当前几个主要资本主义国家中最低的。根据日本政府向国际劳工组织提出的统计，日本工人的平均工资只等于美国工人的九分之一，英国的三分之一，西德的二点五分之一，法国的二分之一。"},{"type":"paragraph","text":"现在，日本全国失业和半失业工人共达一千二百四十九万人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"402bdeb9cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
