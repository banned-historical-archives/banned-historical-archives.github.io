花圈，余秋里等参加追悼会","authors":[],"dates":[{"year":1979,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"原第二轻工业部党组成员、副部长"},{"type":"paragraph","text":"邓洁同志追悼会在京举行"},{"type":"paragraph","text":"叶剑英、李先念、陈云等送花圈，余秋里等参加追悼会"},{"type":"paragraph","text":"新华社北京八月七日电  原第二轻工业部党组成员、副部长邓洁同志，受林彪、“四人帮”反革命路线摧残成疾，患癌症医治无效，于一九七九年七月二十六日在北京逝世，终年七十七岁。"},{"type":"paragraph","text":"邓洁同志的追悼会今天下午在北京八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"叶剑英、李先念、陈云、乌兰夫、余秋里、彭真、谭震林、蔡畅、肖劲光、康世恩、姚依林、康克清、陆定一、李维汉，以及国务院、中共中央组织部、中共中央办公厅等单位送了花圈。余秋里、康世恩、姚依林等同志参加了追悼会。"},{"type":"paragraph","text":"追悼会由轻工业部部长梁灵光主持，轻工部副部长谢鑫鹤致悼词。"},{"type":"paragraph","text":"悼词说，邓洁同志是湖南省安乡县人，一九二二年加入中国社会主义青年团，一九二三年转为中国共产党党员。邓洁同志曾先后被选为中国共产党第五届、第七届、第八届代表大会的代表，全国政协第三届、第四届委员会委员。"},{"type":"paragraph","text":"悼词说，邓洁同志是我党的老党员、老干部，在大革命时期、第二次国内革命战争时期、抗日战争和解放战争时期，担任过许多负责工作，为民主革命和民族解放事业做了大量工作。全国解放以后，邓洁同志长期从事经济建设工作，担任过全国合作总社副主任，全国手工业合作总社副主任，中央手工业管理总局局长，轻工业部、石油工业部、第二轻工业部副部长等职务。特别是在手工业的恢复、改造、发展工作中，他提出了许多很好的意见和办法，为推动手工业和工艺美术事业的发展，付出了很多心血，作出了重要贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"姚依林","type":"人物"},{"name":"陈云","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c57fa2bd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
