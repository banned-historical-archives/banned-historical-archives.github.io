rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英纪念园动工兴建等三则","authors":["罗继平/周承强/周琳/彭辉"],"parts":[{"type":"paragraph","text":"叶剑英纪念园动工兴建"},{"type":"paragraph","text":"本报广州5月6日电罗继平、特约记者周承强报道：为贯彻落实中办、国办《2004—2010年全国红色旅游发展规划纲要》，加强爱国主义和革命传统教育阵地建设，大力宣扬老一辈无产阶级革命家的丰功伟绩，被国家批准为全国红色旅游经典景区的叶剑英纪念园，于昨天上午在叶帅家乡——梅县雁洋镇虎形村开始动工兴建。园区占地面积482亩，计划于2007年建成。"},{"type":"paragraph","text":"某团官兵参加驻地植树"},{"type":"paragraph","text":"本报沈阳5月6日电特约通讯员周琳报道：昨天上午，沈阳军区某团的数百名官兵与驻地干部群众一起参加了四平市组织的纪念“五一国际劳动节”植树活动。"},{"type":"paragraph","text":"笔者在现场看到，该团领导主动放弃节日休息时间，纷纷挽起衣袖和战士们一起种树、浇水。有的团领导还携妻子孩子出现在植树的人群中。驻地群众激动地说：“此次植树活动不但体现了驻军官兵热爱四平、奉献社会的精神，也反映了子弟兵的文明程度。”"},{"type":"paragraph","text":"154医院为游客提供服务"},{"type":"paragraph","text":"本报郑州5月6日电彭辉报道：今天上午10时许，来自广州的游客刘先生准备在河南信阳乘火车返回时突发疾病，幸亏遇到济南军区154医院的流动医疗队员，及时为他进行了诊疗，使其转危为安，顺利返乡。"},{"type":"paragraph","text":"河南信阳地处京广线交通要道，每年旅游旺季来临之时，到信阳鸡公山、南弯湖等景区的游客较多。为确保游客的身体健康，154医院四内科14名党员专家组成“流动医疗队”，在信阳火车站、汽车站设立医疗点，义务为过往游客提供医疗服务。他们先后对56名游客作了诊治，还为1000多名游客提供了医疗咨询等服务。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"河南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24683b32f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
