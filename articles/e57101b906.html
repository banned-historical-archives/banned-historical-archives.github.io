art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东诗词草书长卷问世","authors":["徐文良"],"parts":[{"type":"paragraph","text":"这件巨制草书长卷长83米，高50厘米，内容为毛泽东同志自1915年至1966年间创作的67首诗词。长卷书写者为中国书协会员、成都画院院长田旭中先生。整幅长卷首尾相衔，激情洋溢，气势雄伟，颇为壮观。"},{"type":"paragraph","text":"据作者介绍，在新中国50华诞到来之前，创作这样的草书巨制长卷，意在缅怀一代开国元勋，庆祝新中国50华诞。长卷长83米暗合毛泽东享年83岁，高50厘米意在庆祝新中国成立50年。目前，这件巨制草书长卷正申办吉尼斯世界纪录。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e57101b906"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
