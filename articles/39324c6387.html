 红卫兵的革命热情鼓舞了亚非国家的人民","authors":[],"dates":[{"year":1966,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴基斯坦人士说亚非拉人民要向中国寻求斗争的指导"},{"type":"paragraph","text":"中国文化大革命将根绝修正主义病菌"},{"type":"paragraph","text":"红卫兵的革命热情鼓舞了亚非国家的人民"},{"type":"paragraph","text":"新华社拉瓦尔品第十日电　西巴基斯坦哈扎拉县农民协会总书记阿拉姆·齐布·扎法尔最近在这里对新华社记者说，中国的无产阶级文化大革命，将根绝修正主义病菌，因而是中国历史上的一个伟大成就。"},{"type":"paragraph","text":"他指出，毛泽东主席领导的这场史无前例的文化大革命的经验，将给马克思列宁主义的武库，特别是给社会主义社会中的阶级斗争的理论，增添新的宝贵的财富。"},{"type":"paragraph","text":"他说，毛泽东主席不仅是马克思主义的大师，而且就像伟大的列宁一样，大大地发展了马克思主义。"},{"type":"paragraph","text":"巴基斯坦一位新闻界朋友说：“中国的红卫兵以自己的革命热情鼓舞了其它亚非国家的人民。”"},{"type":"paragraph","text":"他说，毛泽东主席是新社会的缔造者，要想摧毁旧的腐朽的制度，就要按照他的教导办事。"},{"type":"paragraph","text":"他说，帝国主义希望革命精神会在中国衰退，希望中国会选择赫鲁晓夫和铁托的道路。毛泽东主席领导的中国无产阶级文化大革命，打破了帝国主义者的一切幻想。"},{"type":"paragraph","text":"他说：“中国的文化革命，使亚非新兴国家的人民感到喜悦。”他说，这些国家的人民现在“更加坚信，在他们反对以美国为首的帝国主义和殖民主义统治的斗争中，他们能够指望中国的支持。”"},{"type":"paragraph","text":"他还高度评价中国共产党第八届中央委员会第十一次全体会议公报说：公报“对全世界一切进步力量的斗争，起着十分重要的指导作用”。"},{"type":"paragraph","text":"他说，“现在亚洲、非洲和拉丁美洲各国人民不是向苏联，而是向中国寻求怎样进行斗争的指导，因为苏联的领导已经背叛了革命。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39324c6387"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
