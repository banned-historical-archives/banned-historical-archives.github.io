authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":2}],"is_range_date":false,"parts":[{"text":"毛泽东转发十军打虎经验的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"各大军区、志愿军，并转各级军区和各军：","type":"appellation"},{"text":"十军这个经验很好。原以为没有多少搞头的，回炉再炼，就清出了大批老虎，管理排长，指导员，股长等人许多都是贪污犯。望各军都向十军看齐。","type":"paragraph"},{"text":" 毛泽东二月二日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"各大军区、志愿军，并转各级军区和各军：","type":"appellation"},{"text":"在打虎阶段，又是十军的成绩最好，请各军和各军分区将十军的成绩和自己的成绩比较一下，立即作出结论来。十军截至二月二日止已捉一千万元以上老虎五十九只，预计还可捉三十只至四十只。十军“无生产无大建筑，过去被认为比较规矩”，尚且查出这多老虎，那些有生产有大建筑，或过去不大守规矩的部队和机关，老虎当然要更多。十军的政策观点也是正确的。","type":"paragraph"},{"text":" 毛泽东二月六日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f3b37949b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
