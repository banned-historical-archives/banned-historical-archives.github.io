<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"依靠工人阶级办学　有力回击右倾翻案风  长春市七·二一大学发展快","authors":[],"dates":[{"year":1976,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"依靠工人阶级办学　有力回击右倾翻案风"},{"type":"paragraph","text":"长春市七·二一大学发展快"},{"type":"paragraph","text":"新华社长春一九七六年三月三十日电　在毛主席《七·二一指示》指引下，长春市各工厂企业已办起了一百三十多所七·二一工人大学，招收学员六千多人，有一千五百多名学员已毕业回到生产岗位。这些七·二一工人大学的迅速发展和所取得的成果，是对右倾翻案风的有力回击。"},{"type":"paragraph","text":"各工厂企业七·二一工人大学的毕业生回到生产实践中后，在革命和生产中发挥了骨干作用。市水泵厂一九七一年办学以来，已有二百九十多名工人大学生毕业，其中有九十多人担任了班组、车间和工厂的领导工作。这个厂的工人大学生还广泛开展技术革新活动，他们和工人、技术人员一起自行设计、制造了许多新产品，使这个厂由原先只能生产一种产品逐步发展到能生产九十多种产品，成为省、市的先进单位，出席了全国水泵行业的工业学大庆会议。"},{"type":"paragraph","text":"七·二一工人大学的蓬勃发展和壮大，进一步调动了工人群众的社会主义积极性。工人们说：七·二一工人大学的政治理论学习，使我们增添了顶住错误思潮、错误路线的勇气；技术课的学习，让我们学到了闯生产难关的办法。五金机械工业公司七·二一工人大学电子专业青年学员们，在长春市朝阳服装厂以电子拉布机为典型产品进行学习时，运用所学知识，决心用集成电路的先进技术改造这台拉布机。在教师和老工人的帮助下，他们边干边学，自己设计、加工、测试，日夜奋战，用三个月时间就制成一台集成电路电子拉布机。"},{"type":"paragraph","text":"长春市各工厂企业的工人大学都注意把转变学生的思想放在首位，组织学员认真学习马列著作和毛主席著作，学习无产阶级专政理论，深刻领会《七·二一指示》的伟大意义，并且通过请老工人进行阶级教育，组织学员参加社会调查，不断提高学员的阶级斗争和路线斗争觉悟。许多工厂都规定学员要定期回车间参加劳动，使学员和工人群众经常保持密切联系。这些工人大学都坚持理论与实践相统一，教育与生产劳动相结合，把三大革命运动第一线当课堂，从革命和生产需要出发设置专业，围绕典型产品、中心任务和科研项目组织教学活动，使教学、生产和科研紧密结合起来。（附图片）"},{"type":"paragraph","text":"开滦矿务局七·二一工人大学党委积极引导师生紧密联系实际。这是工程设计班的学员正在研究建立一口新型进风井的设计问题。"},{"type":"paragraph","text":"本报通讯员摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e7fc67291"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
