art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我万吨远洋轮船“耀华”号到达坦桑尼亚卡瓦瓦副总统出席我临时代办招待会并接见我技术人员许多非洲朋友纷纷向我船员索取毛主席像章和《毛主席语录》","authors":[],"parts":[{"type":"paragraph","text":"据新华社达累斯萨拉姆十四日电 坦桑尼亚第二副总统卡瓦瓦和五百位客人，十三日晚出席了中国驻坦桑尼亚大使馆临时代办周伯萍在中国远洋轮船“耀华”号上举行的招待会。卡瓦瓦副总统并接见了我国技术人员。"},{"type":"paragraph","text":"这艘一万二千吨的远洋轮船于十二日晚首次到达这个东非最大的港口达累斯萨拉姆港。随“耀华”轮到达的有第一批中国坦桑尼亚——赞比亚铁路勘察和设计小组的工程技术人员和中国派往坦桑尼亚的医疗队队员。"},{"type":"paragraph","text":"十三日晚，停泊在达累斯萨拉姆港的“耀华”轮上灯火通明，中国和坦桑尼亚的国旗在桅杆上高高飘扬，轮船甲板上空，悬挂着横幅标语，上面写着“战无不胜的毛泽东思想万岁！”“中国——坦桑尼亚人民友好万岁！”"},{"type":"paragraph","text":"在招待会上，宾主为中国和坦桑尼亚人民之间的友谊频频干杯。"},{"type":"paragraph","text":"一位坦桑尼亚朋友说：“我们坦桑尼亚人对中国专家的到来，感到非常高兴，这是对敌视坦桑尼亚——中国友谊的帝国主义者的沉重打击。”"},{"type":"paragraph","text":"许多坦桑尼亚朋友和其他非洲朋友纷纷向中国船员索取毛主席像章和《毛主席语录》，并在轮船客厅里的毛主席像前照相留念。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e63fb592d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
