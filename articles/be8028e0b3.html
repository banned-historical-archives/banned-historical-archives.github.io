命觉悟提高到新的水平","authors":[],"dates":[{"year":1964,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社桑给巴尔7日电　桑给巴尔和奔巴非洲—设拉子青年联盟今天发表声明说，这个联盟全心全意地拥护毛泽东主席支持刚果(利)人民反对美国侵略的声明。"},{"type":"paragraph","text":"声明说，毛泽东主席的声明表达了“六亿五千万中国人民反对美帝国主义在刚果(利)所干的坏事和支持刚果人民正义斗争的呼声。因此，声明从根本上震撼了美帝国主义。”"},{"type":"paragraph","text":"声明说，毛主席的声明“大大鼓舞了斗争中的刚果人民和反对帝国主义压迫的世界各国人民；声明以新的巨大力量和坚强意志感染他们，使他们敢于同世界人民最可恨的敌人——美帝国主义作斗争”。"},{"type":"paragraph","text":"声明说，“毛主席的声明……确实把我国、整个非洲和全世界青年和人民的革命觉悟，提高到新的水平。”"},{"type":"paragraph","text":"这个联盟重申:“我们坚决支持兄弟般的刚果青年和人民反对美帝国主义侵略的英勇斗争。我们坚定地拥护坦桑尼亚总统尼雷尔的这样一段话:‘外国对刚果事务的无耻干涉是对我们大陆的侮辱，必然会引起其他每一个非洲独立国家的反击。必须大力抗击美国飞机从英国基地空运比利时伞兵在刚果(利)着陆的行动。’”"},{"type":"paragraph","text":"声明说，“美帝国主义及其走狗在刚果(利)必定要被击败。违反历史潮流是行不通的。他们脖子上的绞索越多，他们的末日也就越近。”"},{"type":"paragraph","text":"青年联盟最后说:今天，“我们是生活在人民的世纪里。非洲、亚洲、拉丁美洲和全世界人民将团结起来，彻底打败最凶恶的压迫和剥削势力——以美国为首的帝国主义。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be8028e0b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
