script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老百姓造反　官老爷丧胆  日本农民怒冲农林省抗议政府压榨  日本资产阶级报刊惊呼：这场斗争“令人想起农民起义的情景”","authors":[],"dates":[{"year":1967,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老百姓造反　官老爷丧胆"},{"type":"paragraph","text":"日本农民怒冲农林省抗议政府压榨"},{"type":"paragraph","text":"日本资产阶级报刊惊呼：这场斗争“令人想起农民起义的情景”"},{"type":"paragraph","text":"新华社东京十三日电  来自日本全国各地的一千多名农民代表，十二日在东京涌向佐藤政府的农林省（农业部）门前，反对佐藤政府压低收购大米的价格。"},{"type":"paragraph","text":"美帝国主义和日本垄断资本长期以来推行残酷剥削和压榨日本农民的反动政策，迫使农民过着喘不过气的生活。他们忍无可忍，终于爆发了对美日反动派的愤怒，勇敢地起来造日本佐藤政府的反。"},{"type":"paragraph","text":"农民代表们打着红旗，肩上披着写有各种斗争口号的布带，个个精神抖擞，威风凛凛，斗志昂扬。"},{"type":"paragraph","text":"日本政府如临大敌，在农林省门前架起一排栅栏，妄图阻挡农民前进。同时还丧心病狂地派出大批武装警察进行镇压。"},{"type":"paragraph","text":"农民代表们根本不把敌人的威胁放在眼里，他们坚决要求会见农林大臣仓目忠雄，要求拆除侮辱性的栅栏，撤退前来进行镇压人民的武装警察。但经过长时间的交涉，代表们的一切正当要求都被日本政府无理拒绝。"},{"type":"paragraph","text":"这时候，愤怒的农民们高喊“冲呵！”“农林大臣快滚出来”等口号，瞬间，推倒了栅栏，排除了武装警察的阻挡，冲进了农林省的办公楼。农民们把官儿老爷们的办公桌打翻在地，顿时，文件等满天飞。当农民们冲到“大臣室”时，那个大臣早已吓得魂不附体，象老鼠一样逃掉了。"},{"type":"paragraph","text":"愤怒的农民们把农林大臣办公的地方变成了控诉日本反动派的场所。"},{"type":"paragraph","text":"日本统治阶级大为惊惶失措，赶紧增派全副武装的警察，前去镇压。不畏强暴的农民代表们继续不屈不挠地坚持进行斗争，直到深夜。"},{"type":"paragraph","text":"这一场农民斗争，好得很！它长了革命人民的志气，灭了反动派的威风。日本资产阶级报纸《读卖新闻》十三日惊慌地说：这场斗争“非常激烈，令人想起农民起义的情景。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ee0e389df"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
