ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对李克农等关于俘虏管理工作请示的批语","alias":"","parts":[{"type":"paragraph","text":"对李克农等关于俘虏管理工作"},{"type":"paragraph","text":"请示?的批语"},{"type":"paragraph","text":"（1953年1月21日）"},{"type":"paragraph","text":"管理俘虏工作甚为重要，必须加派干部和兵力，并准备对敌空降作战，一个也不能让敌人劫走。如果被劫走了这批俘虏，我们就没有本钱和敌做交换俘虏的谈判了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿一日"},{"type":"paragraph","text":"[1]李克农，当时任中央人民政府外交部副部长、中国人民解放军副总参谋长、朝鲜停战谈判中国人民志愿军代表团党委书记。"},{"type":"paragraph","text":"[2]指李克农、甘泗淇（军委总政治部副主任）、黄远（军委总政治部敌军工作部部长）1953年1月16日关于俘虏管理处工作的几个问题给周恩来、彭德怀的请示报告。这些问题包括：俘管处的领导关系问题，特殊俘虏的处置问题，俘管处的驻地问题，外文干部问题，以及运输工具、教育工具问题。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":1,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":453,"page_end":453},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a145f1d404"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
