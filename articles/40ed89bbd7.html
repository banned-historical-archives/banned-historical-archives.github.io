<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"按毛主席教导向生产的深度和广度进军","authors":[],"dates":[{"year":1966,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席说:“社会主义不仅从旧社会解放了劳动者和生产资料，也解放了旧社会所无法利用的广大的自然界。人民群众有无限的创造力。他们可以组织起来，向一切可以发挥自己力量的地方和部门进军，向生产的深度和广度进军，替自己创造日益增多的福利事业。”"},{"type":"paragraph","text":"毛主席十年前在《中国农村的社会主义高潮》一书中为《多余劳动力找到了出路》一文所写的按语，极大地鼓舞了安徽省肥东县解集公社陈西、陈东两个生产队的干部和社员。他们坚决地执行毛主席的指示，向生产的深度和广度进军，不仅解决了多余劳动力的问题，而且在发展生产上、在巩固集体经济上取得了重大的胜利。"},{"type":"paragraph","text":"他们在向生产的深度和广度进军的过程中，遵照毛主席的教导，坚持进行了阶级斗争。"},{"type":"paragraph","text":"向生产的深度和广度进军，必须首先有集体经济作为保证。在国家经济出现暂时困难的时候，有些资本主义分子乘机活动，刮起了一股单干风，要搞垮集体经济。在这严重的关头，党支部领导绝大多数贫农下中农，与资本主义势力作坚决的斗争。经过斗争，保卫了集体经济，坚持了社会主义方向，为向生产的深度和广度进军提供了保证。"},{"type":"paragraph","text":"向生产的深度和广度进军，必须采用新技术，实行精耕细作；必须发展副业生产，实行多种经营。可是，阶级敌人一遇机会，就兴风作浪。少数富裕中农也热衷于走资本主义道路。这时他们对一些私人搞豆腐坊等副业，进行投机倒把，资本主义思想严重的富裕中农，进行了批判和斗争。有一个时期，他们专门学习了党的八届十中全会公报，毛主席关于阶级和阶级斗争的指示，以及毛主席为《多余劳动力找到了出路》一文写的按语，并就这个问题展开了大辩论。许多贫下中农说:有些人搞投机倒把活动，就是挖社会主义墙脚，就是走资本主义道路，决不允许走这条死路。社员们经过这场大辩论，广大社员发展集体生产的积极性更加高涨。他们克服重重困难，举办多种集体经营的副业，既促进了农业生产，又增加了社员收入，使一些富裕中农也受到了教育。"},{"type":"paragraph","text":"这两个生产队的干部和社员，十年来按照毛主席的教导，向生产的深度和广度进军，取得了巨大的成绩。他们兴修水利，把六十多里以外的巢湖水引上岗头，居高临下灌溉这里的旱地，使四百七十八亩耕地全部成了旱涝保收的农田。在水利逐渐改善的条件下，精心耕作，增施肥料，改革耕作制度，实行套种间种，并且开垦荒地。一九六六年，两个队的粮食总产量比一九五五年增加了一倍多。过去，这里只种少量的棉花，以后植棉面积和产量都逐步增加，一九六五年亩产量超过了一百斤(皮棉)。今年，两个队共种植了棉花一百五十多亩，可望获得更大丰收。近几年来，他们每年向国家交售大批粮食和皮棉。"},{"type":"paragraph","text":"新华社记者　(据新华社合肥讯)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40ed89bbd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
