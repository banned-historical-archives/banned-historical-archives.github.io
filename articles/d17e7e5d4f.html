art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"春风报告会","authors":["沈装沈新"],"parts":[{"type":"paragraph","text":"去年八月，正当邓小平刮起的右倾翻案风甚嚣尘上的时候，三连正在兴安岭下执行军农生产任务。这里虽然环境偏僻，但是“一切为了四个现代化”、“要把国民经济搞上去就得抓实的”等“唯生产力论”的冷风也一阵一阵地吹到了连队。"},{"type":"paragraph","text":"面对这股冷风，三连针锋相对地又召开了“春风报告会”。干部们带头回忆了一九六九年支农时，同贫下中农一起批判“唯生产力论”的一段经历。文化大革命前，那个大队在“唯生产力论”影响下，只抓钱和粮，不提阶级斗争这个纲，结果导致资本主义泛滥，生产也搞不好。年年吃粮靠返销，花钱靠贷款，困难靠救济。文化大革命中，通过批判“唯生产力论”，大队狠抓阶级斗争，促进了生产发展，当年就甩掉了“三靠”的帽子，一跃成为县里先进典型。在报告会上，理论骨干、八班长王忠国，还报告了他们坚持无产阶级政治挂帅，学理论，抓路线，不仅出色地完成了生产任务，而且使全班同志提高了路线斗争觉悟，进一步树立了共产主义的劳动态度。……"},{"type":"paragraph","text":"象这样的“春风报告会”，仅去年他们就开了十次。他们针对否定教育革命的奇谈怪论，举办了大赞大颂教育革命成果的报告会；针对邓小平散布雷锋“不在了”的谬论，召开了军营处处有雷锋的报告会……。"},{"type":"paragraph","text":"“春风报告会”吹散了一些同志眼前的迷雾，提高了干部战士的阶级斗争和路线斗争觉悟，人人争做社会主义新生事物促进派。去年十二月，全连写出了近百封支持教育革命的红色家信。全连同志还给清华大学革命师生写了信，寄去了自己学习毛主席关于文化大革命一系列重要指示的体会，表示要学习清华师生的革命精神，誓做教育革命的坚强后盾，把反击右倾翻案风的伟大斗争进行到底。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d17e7e5d4f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
