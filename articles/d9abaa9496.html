art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"编者的话","authors":[],"parts":[{"type":"paragraph","text":"首都百万工人民兵最听毛主席和党中央的话。他们召之即来，来之能战，战之能胜。这是毛主席全民皆兵思想的伟大胜利，是首都工人民兵学习上海民兵建设的新鲜经验，积极参加社会阶级斗争的胜利成果。阶级斗争的现实再一次证明：建立一支以产业工人为主体的群众武装，平时积极参加社会阶级斗争，在斗争的风浪中锻炼、改造和提高，就能更好地把对内反复辟、对外反侵略的任务担当起来，阶级敌人一旦进行捣乱和破坏，就一定能把它打得粉碎。"},{"type":"paragraph","text":"我们要学习英雄的首都工人民兵的革命精神，紧紧地团结在以毛主席为首的党中央周围，坚持以阶级斗争为纲，努力学习毛主席的重要指示，深入批判邓小平的反动罪行，百倍提高革命警惕，用抓革命，促生产，促工作，促战备的实际行动，保卫毛主席，保卫党中央，保卫毛主席的革命路线，保卫无产阶级文化大革命的胜利成果，夺取反击右倾翻案风的更大胜利。"},{"type":"paragraph","text":"今天本版刊登由本报通讯员和本报记者写的几篇首都工人民兵的英雄事迹，供大家学习。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9abaa9496"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
