地质勘探学院","李伯祯","李永涛","马万钧","马槐亭"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“人事制度不合理”","type":"title"},{"text":"北京地质勘探学院马槐亭李永涛马万钧李伯祯","type":"authors"},{"text":"“人事科神秘莫测，是阎罗殿，是宗派主义堡垒”","type":"paragraph"},{"text":"马槐亭说：","type":"paragraph"},{"text":"“人事制度不合理，保密制度扩大化。”","type":"paragraph"},{"text":"李永涛说：","type":"paragraph"},{"text":"“人事科是阎罗殿，档案是生死簿，大笔一勾决定一生的命运”，“过去自己在中学表现不好，现在不知档案里给我写了些什么”，“原想报考航空学院而没有取上，恐怕就是这个原因，因此极力赞成公布人事档案”，“资本家都能掌握自己的命运，难道我们不能吗？”","type":"paragraph"},{"text":"马万钧说：","type":"paragraph"},{"text":"“现在人事处下面有一科，二科，三科，分得太多，人事处实是起了公安部门的特派作用，不仅不解决问题，还和你找麻烦……同时机构太多不起作用……选择人材时只从政治好出发……学校副院长太多，应降一级”。","type":"paragraph"},{"text":"李伯祯说：","type":"paragraph"},{"text":"“分配生产实习是唯成份论，资料员管的严”，认为把他当成特务。","type":"paragraph"},{"text":"“人事科坏现象多，是个死角。不要以为只有部分人（党、团员）爱国，群众也是爱国的。”","type":"paragraph"},{"text":"“政治工作人员只拿钱不干活”，宿舍中派了团员来，他认为是来监视他的。","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2b6de7001"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
