rs":["肖彦"],"dates":[{"year":1964,"month":3,"day":13}],"is_range_date":false,"parts":[{"text":"湖南召开贫下中农代表会议","type":"title"},{"text":"肖彦","type":"authors"},{"text":"湖南省委召开的贫下中农代表会议，三月五日在长沙开幕。会议主要讨论在当前国内外大好形势下，依靠贫下中农大搞阶级斗争、生产斗争和科学实验三大革命运动的问题，以及讨论在全省深入开展学习解放军、开展比学赶帮和“五好”竞赛活动的问题。","type":"paragraph"},{"text":"这次开会的目的：一是撑腰，党撑贫下中农的腰，就要坚持贯彻党的依靠贫下中农，团结中农的阶级路线；贫下中农撑党的腰，就是拥护党，依靠党的领导。二是取经，就是交流经验，互相学习，大家都当学生，大家都当先生，比学赶帮，好上加好。","type":"paragraph"},{"text":"出席这次会议的，有汉、苗、土家、侗、瑶、回六个民族的代表一千三百八十五人。（新华社湖南分社肖彦）","type":"paragraph"},{"text":"来源：１９６４年３月１３日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcc4e847b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
