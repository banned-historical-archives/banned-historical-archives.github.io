art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"齐奥塞斯库同志接见我国政府代表团齐奥塞斯库同志谈到，中国将在二○○○年实现四个现代化，不仅对中国，而且对世界反帝力量都有重大意义","authors":[],"parts":[{"type":"paragraph","text":"据新华社布加勒斯特四月二十日电 罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库，二十日中午在罗马尼亚共产党中央委员会大厦接见了正在这里进行友好访问的中共中央政治局候补委员、国务院副总理兼对外经济联络部部长陈慕华和由她率领的中国政府代表团全体成员。"},{"type":"paragraph","text":"齐奥塞斯库同志对中国政府代表团的来访表示欢迎。他对中国人民在华国锋同志为首的中国共产党领导下，在社会主义建设中所取得的成就表示高兴。"},{"type":"paragraph","text":"齐奥塞斯库同志还谈到，中国将在二○○○年实现四个现代化，这不仅对中国具有重大的意义，而且对世界反帝力量也有重大意义。"},{"type":"paragraph","text":"陈副总理转达了华国锋主席，叶剑英委员长，邓小平、李先念、汪东兴副主席对齐奥塞斯库同志的问候。齐奥塞斯库同志感谢陈副总理转达的问候，请她回国以后转达对华国锋主席和其他领导人的问候，并表示他的敬意和祝愿。"},{"type":"paragraph","text":"陈副总理说，我们的代表团在访问期间受到了科·布尔蒂卡同志为首的罗马尼亚政府代表团的同志们的热情接待。会谈进行得很好，取得了圆满的成果。我们参观访问了许多地方，看到罗马尼亚人民在齐奥塞斯库同志为首的罗马尼亚共产党领导下，正在豪情满怀地贯彻罗共十一大和全国代表会议的决议，在各方面取得巨大的成就。"},{"type":"paragraph","text":"罗马尼亚方面接见时在座的有：罗共中央政治执行委员会委员、政府副总理兼外贸和国际经济合作部部长科·布尔蒂卡等。"},{"type":"paragraph","text":"接见是在亲切友好的气氛中进行的。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"881acc8b0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
