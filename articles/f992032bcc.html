会门座谈会错误的报告","authors":[],"dates":[{"year":1950,"month":9,"day":14}],"is_range_date":false,"parts":[{"text":"安顺地委关于镇宁公安局擅自召开封建会门座谈会错误的报告","type":"title"},{"text":"（一九五零年九月十四日致省委）","type":"paragraph"},{"text":"月底镇宁公安局扩大召开会道门及宗教团体牧徒等二百馀人座谈会。把宗教自由解释为封建迷信之会门组织亦有自由，引起天主教不满。并规定会道门一律向政府登记，政府也可参加他们的会议；无疑是承认了会道门组织，违犯了军政委员会取缔反动会门组织的原则。同时在会议上揭破了迷信，并指出了迷信是封建势力迷惑劳动人民的办法。我们认为：这是原则错误，令其立即检讨。详情另有书面报告。","type":"paragraph"}],"comments":[],"origin":"《西南工作》 第22期，中共中央西南局编印（党内刊物发至县团），1950年10月18日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f992032bcc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
