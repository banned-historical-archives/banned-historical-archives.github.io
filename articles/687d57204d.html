authors":[],"dates":[{"year":1979,"month":3,"day":17}],"is_range_date":false,"parts":[{"text":"中共新都县委关于刘亚平同志错划右派的改正通知","type":"title"},{"text":"关于刘亚平同志错划右派的改正通知","type":"appellation"},{"text":"刘亚平同志原在新都师范附小任教，1958年划为右派。根据中共中央〈1978〉55号文件和1957年《中共中央关于“划分右派分子的标准”的通知》精神，经县委摘帽领导小组1979年3月17日会议研究决定：刘亚平同志属于错划，应予改正，撤销原划右派的处分决定，恢复政治名誉，恢复公职，恢复原工资小教行政五级，工资从1978年10月开始计发。对家属、子女档案中有关右派材料，要抽出销毁。","type":"paragraph"},{"text":"特此通知","type":"paragraph"},{"text":"中共新都县委","type":"appellation"},{"text":"1979年3月17日","type":"appellation"},{"text":"主送：文教局；","type":"appellation"},{"text":"抄送：成都市金牛区委摘帽办，组织部、宣传部、文教局；县委组织部、宣传部、统战部、公安局。","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"687d57204d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
