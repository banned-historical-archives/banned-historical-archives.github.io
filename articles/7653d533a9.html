tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿尔巴尼亚军事友好代表团参观访问北京部队坦克兵某部巴卢库、恰科、佩尔拉库等同志受到指战员热烈欢迎 叶剑英、李德生、张才千同志陪同代表团参观访问","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年十一月十日讯 以贝·巴卢库同志为团长，希·恰科和拉·佩尔拉库同志为副团长的阿尔巴尼亚人民共和国军事友好代表团，由叶剑英、李德生、张才千同志陪同，今天参观访问了中国人民解放军北京部队坦克兵某部。"},{"type":"paragraph","text":"北京部队坦克兵某部驻地红旗飘扬，洋溢着中阿两国人民、两国军队之间革命友谊和战斗团结的热烈气氛。巴卢库等阿尔巴尼亚战友，在这里受到了北京部队政委陈先瑞、副司令员王振祥，以及坦克兵某部负责人叶振良、白雪天和指战员一千多人的热烈欢迎。指战员们敲锣打鼓，高呼口号：“向英雄的阿尔巴尼亚人民学习！”“向英雄的阿尔巴尼亚人民军学习！”“中阿友谊万岁！”巴卢库同志不断向指战员们招手致意。"},{"type":"paragraph","text":"巴卢库等阿尔巴尼亚同志听取了关于这个部队的情况介绍，接着同叶剑英、车德生、张才千等同志一起来到训练场地，观看了部队指战员和驻地人民公社男女民兵的军事表演。表演结束后，阿尔巴尼亚同志走下看台，同排列在看台前的指战员和民兵们亲切见面。巴卢库同志向他们发表了热情的讲话，祝他们在思想政治教育和提高军事技术方面取得更大成就，祝他们做毛主席的好战士、好民兵。巴卢库同志在结束讲话时，高呼：“毛主席万岁！”叶剑英同志带领在场的中国同志高呼：“恩维尔·霍查同志万岁！”"},{"type":"paragraph","text":"九日晚上，阿尔巴尼亚军事友好代表团由国防部副部长肖劲光、轻工业部负责人毛洪祥陪同，参观了工艺美术展览。"},{"type":"paragraph","text":"以巴卢库同志为团长，恰科同志和佩尔拉库同志为副团长的阿尔巴尼亚军事友好代表团，十一月十日由叶剑英、李德生、张才千同志陪同，参观访问了中国人民解放军北京部队坦克兵某部，受到热烈欢迎。 新华社记者摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7653d533a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
