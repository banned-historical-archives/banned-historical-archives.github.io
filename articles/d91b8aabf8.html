给周总理祝贺古巴中国建交","authors":[],"dates":[{"year":1960,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"圣克拉拉市教师协会执委会打电报给毛主席"},{"type":"paragraph","text":"欢迎古巴中国建立外交关系"},{"type":"paragraph","text":"德拉坎帕打电报给周总理祝贺古巴中国建交"},{"type":"paragraph","text":"新华社10日讯　古巴圣克拉拉市教师协会执行委员会在9月3日打电报给毛泽东主席，表示欢迎古巴关于同中国建立外交关系的决定。电报全文如下：毛泽东主席"},{"type":"paragraph","text":"古巴圣克拉拉市教师协会代表古巴教师界，欢迎古巴人民和政府作出的关于同人民中国建立外交关系的决定。"},{"type":"paragraph","text":"执行委员会"},{"type":"paragraph","text":"1960年9月3日于圣克拉拉"},{"type":"paragraph","text":"新华社10日讯　古巴工人联合会对外关系书记奥东·阿耳瓦雷斯·德拉坎帕在9月7日打电报给周恩来总理，就古巴关于同中国建立外交关系的决定表示祝贺。电报全文如下：中华人民共和国周恩来总理："},{"type":"paragraph","text":"古巴工人联合会代表古巴劳动者和人民，对古巴人民全国大会宣布的哈瓦那宣言中关于同英雄的中华人民共和国建立外交关系的决定表示欢欣鼓舞。我们古巴劳动者和人民感谢中国政府和人民给予的坚强支持。请接受我们兄弟般的祝贺。"},{"type":"paragraph","text":"古巴工人联合会对外关系书记　奥东·阿耳瓦雷斯·德拉坎帕"},{"type":"paragraph","text":"1960年9月7日于哈瓦那"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d91b8aabf8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
