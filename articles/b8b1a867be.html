公安会议上的开幕词（节录）","authors":[],"dates":[{"year":1949,"month":12,"day":13}],"is_range_date":false,"parts":[{"text":"罗瑞卿在华北五省及山东省暨省属各市公安会议上的开幕词（节录）（记录稿）","type":"title"},{"text":"……","type":"paragraph"},{"text":"此外，农村中、城市中的封建残余势力，社会上的游离分子，如：流氓、会门、盗匪等等，甚至群众中的一时的不觉悟的现象，以及一些资产阶级的小资产阶级的情绪，以致于我们的每一件困难，在在都可以被敌人抓去利用的。","type":"paragraph"},{"text":"……","type":"subtitle"},{"text":"至于会道门问题，则大体须在群众有了初步或充分发动以后。这是一般的规律，不是绝对机械的，同时亦必须看出所有步骤之间的联系性。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"我们的面前是确实还存在着敌人的。","type":"paragraph"},{"text":"是一些什么力量会破坏我们的生产建设呢？","type":"paragraph"},{"text":"第一，是特务分子及残余的国民党的潜伏反动力量；","type":"paragraph"},{"text":"第二，是残余的小股土匪，特别是带有政治性的土匪；","type":"paragraph"},{"text":"第三，残余的封建势力，其中包括不安分的企图复辟的地富分子、会门帮会等黑暗势力；","type":"paragraph"},{"text":"第四，返乡人员中隐藏着的反动分子；","type":"paragraph"},{"text":"第五，社会的游离分子，即不事生产的流氓，其中也包括少数从革命队伍中分化出去的蜕化分子。","type":"paragraph"},{"text":"……","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8b1a867be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
