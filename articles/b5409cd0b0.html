<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"陕北中学等校学生的倡议引起强烈反响大批高中学生满怀激情下乡参加“双抢”决心在斗争中活学活用毛主席著作，学习贫下中农优秀品质，增强阶级感情　留校学生表示坚决服从党的需要，在校内把无产阶级文化大革命搞深搞透","authors":[],"dates":[{"year":1966,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市陕北中学、市西中学、曹杨第二中学、金陵中学等校部分高中学生写信给报社提出参加郊区农村“双抢”劳动的倡议后，立即在全市中等学校中引起强烈反响，经过有关领导部门批准，大批高中学生满怀革命激情，打起背包，从今天起先后奔赴农业战斗的第一线。"},{"type":"paragraph","text":"当广大学生在报上看到农村正在紧张进行“双抢”劳动的消息时，就引起了极大的关注。四所学校部分学生的倡议书发表后，各校高中学生纷纷贴出了决心书、请战书、保证书，对下乡参加“双抢”劳动表示热烈的拥护和支持，许多学生还敲锣打鼓将请战书、决心书送到学校党支部和文化革命工作组，要求批准他们到最艰苦的地方去，经受“双抢”劳动的锻炼。"},{"type":"paragraph","text":"许多学生在座谈讨论中说:今年是我国第三个五年计划的第一年，这是关键的一年，工农业生产必须搞好。在当前农村劳动力紧张的时候，用我们的双手为农业生产贡献力量，不但对我们社会主义建设，也对支援世界人民革命斗争，对援越抗美有重大意义。我们一定要带着革命精神去参加战斗，夺取丰收。许多学校的学生还通过学习毛主席著作《青年运动的方向》《在中国共产党全国宣传工作会议上的讲话》和有关毛主席语录，进一步认识到参加“双抢”劳动的政治意义。控江中学许多高中学生学习了毛主席有关语录后说，毛主席教导我们“学习马克思主义，不但要从书本上学，主要地还要通过阶级斗争、工作实践和接近工农群众，才能真正学到”，我们一定要听毛主席的话，去接近工农群众，抓紧“双抢”劳动的机会，在实际斗争中活学活用毛主席著作。曹杨中学、六十一中学等校学生讨论后说:资产阶级“权威”、“学者”拼命对抗党的教育方针，不许我们接近工农群众，现在党和毛主席领导我们为彻底搞掉资产阶级教育路线打开了一个突破口，开拓了更加广阔的与工农结合的革命化道路，我们要争取一切机会接近工农群众，给那些牛鬼蛇神一记响亮的耳光。他们还表示:要在这次“双抢”劳动中请贫下中农考考我们，看看我们在文化大革命中觉悟提高了多少，脚跟站得稳不稳，和贫下中农有了多少共同的语言。许多学生表示，到农村后要学习贫下中农的优秀品质，回校时带着更深厚的阶级感情，彻底搞好文化大革命。西康中学等校许多留校学生也表示，坚决听党的话，服从党的需要，在校内把无产阶级文化大革命搞深搞透。"},{"type":"paragraph","text":"在下乡前几天，各校学生都积极做好准备工作，他们都准备将毛主席著作带下乡。甘泉中学高三(2)班学生重新学习了毛主席的《中国社会各阶级的分析》等著作，华东师大第一附中、卢湾中学等校学生都表示要学习毛主席的好战士刘英俊，在“双抢”劳动中努力学习毛泽东思想，忠实执行毛泽东思想，热情宣传毛泽东思想，勇敢捍卫毛泽东思想。许多学校学生为了更好地完成“双抢”任务还订立了下乡的纪律和活动计划，注意做好安全卫生工作，同学们还组成了宣传组、服务队，排练革命文娱节目，准备开展农村宣传和为贫下中农服务的活动。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5409cd0b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
