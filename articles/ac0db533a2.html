":[{"year":1978,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋总理电贺大平正芳荣任日本内阁总理大臣"},{"type":"paragraph","text":"新华社北京十二月八日电　中华人民共和国国务院总理华国锋，十二月七日致电日本国内阁总理大臣大平正芳，衷心祝贺他荣任日本国内阁总理大臣。电报全文如下：日本国内阁总理大臣　大平正芳阁下："},{"type":"paragraph","text":"在阁下荣任日本国内阁总理大臣之际，谨致衷心祝贺。"},{"type":"paragraph","text":"阁下为实现中日邦交正常化，发展中日关系作出了卓越贡献。在中日联合声明的基础上缔结的中日和平友好条约，为进一步巩固和发展两国的友好合作关系开辟了广阔的前景。愿两国政府共同努力，为不断发展中日关系，为维护亚洲、太平洋地区和世界的和平和稳定作出新的贡献。中华人民共和国国务院总理华国锋一九七八年十二月七日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac0db533a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
