tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"巴自治领导机构在杰宁举行内阁会议以政府制订计划决心取缔极右组织","authors":["谢栋风"],"parts":[{"type":"paragraph","text":"据新华社开罗11月19日电 巴勒斯坦自治领导机构今天在约旦河西岸的杰宁市举行首次部长会议。会议由巴勒斯坦解放组织执委会主席阿拉法特主持。"},{"type":"paragraph","text":"阿拉法特在警察总部宣布：“杰宁解放了！”他还说，中东和平进程将继续下去，不会因为有人搞暗杀活动而放慢速度。"},{"type":"paragraph","text":"根据巴以签署的关于扩大巴勒斯坦在约旦河西岸自治范围协议，以色列将从约旦河西岸的7座城市撤军。杰宁是以色列撤军的第一座城市。"},{"type":"paragraph","text":"据新华社耶路撒冷11月19日电（记者谢栋风）以色列内阁今天决定取缔从事各类恐怖活动的极右组织，以消除这些组织对国家安全及民众生活构成的严重威胁。"},{"type":"paragraph","text":"以色列内阁在每周例会后责成检察总长、警察总监、以军总参谋长及国家安全局局长制订相应的计划，制止这些极右组织的“颠覆活动”，并最终缔消这些组织。"},{"type":"paragraph","text":"内阁还决定，根据以色列的《回归法》，政府将禁止那些支持极右组织或支持暴力行为的海外犹太人入境，禁止他们到以色列定居或旅游。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f22cbba48a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
