,"dates":[{"year":1962,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇周恩来陈云邓小平等同志昨日下午向李克农同志遗体告别"},{"type":"paragraph","text":"新华社11日讯　刘少奇、周恩来、陈云、邓小平等党和国家领导人，今天下午先后到北京医院向李克农同志的遗体告别。"},{"type":"paragraph","text":"今天，前往告别的还有：陈毅、李先念、谭震林、乌兰夫、陆定一、陈伯达、罗瑞卿、习仲勋、李维汉、陈叔通、林枫、李四光、阿沛·阿旺晋美、谢觉哉。"},{"type":"paragraph","text":"中国人民解放军高级将领谭政大将、王树声大将、许光达大将、刘亚楼空军上将、张宗逊上将、彭绍辉上将、张爱萍上将、杨成武上将、杨勇上将、傅钟上将、甘泗淇上将、李聚奎上将、陈士榘上将、李志民上将等，也先后前往北京医院，向李克农同志的遗体告别。"},{"type":"paragraph","text":"前往告别的还有中共中央、国务院各部门、各民主党派、各人民团体和北京市的负责人和机关干部，中国人民解放军各总部、各军种、各兵种、院校的军官。"},{"type":"paragraph","text":"李克农同志的遗体在下午五时入殓，并于当晚移至北京市东郊火葬场火化。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0305a3e898"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
