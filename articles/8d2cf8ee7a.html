torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"关于和国民党谈判条件等事致潘汉年电","alias":"","parts":[{"type":"paragraph","text":"关于和国民党谈判条件等事"},{"type":"paragraph","text":"致潘汉年电"},{"type":"paragraph","text":"（1936年12月10日）汉年同志："},{"type":"paragraph","text":"齐电悉。"},{"type":"paragraph","text":"甲、合作为实行抗日救亡，但至今天蒋介石似尚无抗日救亡之决心，合作谈判缺乏必要之前提，南京抗日派诸君如不能促成蒋氏此种决心，则谈判显无速成之望。"},{"type":"paragraph","text":"乙、根本不能同意蒋氏对外妥协对内苛求之政策，更根本拒绝其侮辱红军之态度。"},{"type":"paragraph","text":"丙、红军在彼方忠实的与明确的承认其参加抗日救亡之前提下，可以改换抗日番号，划定抗日防地，服从抗日指挥。在这些上面我们并不坚持形式上的平等，也不须用两个政府出面谈判，但是必须两党（不是两政府）平等的签订抗日救亡之政治军事协定，红军不能减少一兵一卒，而且须要扩充之，离开实行抗日救亡任务，无任何商量余地。"},{"type":"paragraph","text":"丁、彼方如有诚意，须立即停止进攻并将军队撤退于苏区以外，静［候］谈判之结果。"},{"type":"paragraph","text":"杨子任蒸酉"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":152,"page_end":152},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d2cf8ee7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
