学院学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——声声怨","type":"title"},{"text":"成都工学院学生","type":"authors"},{"text":"(原著名笔锋，成都工学院学生)","type":"subtitle"},{"text":"愁云弥雾、难见青天，是非真假难辩。棒打谁？伤毁何人？内部与敌我并立，斗、绑，打不敢吭声。大学设监狱，民主、自由、平等何在？打你下十八层地狱，难以翻身！血肉筑成他的幸福，唯我等何生。一点冤魂到云霄，青天犹存，湘江水易阙，含垢忍辱不能生。","type":"paragraph"},{"text":"上文注解：","type":"paragraph"},{"text":"1．我院在肃反运动中，扣发全校师生员工信件，和亲友从千里赶来相会，不准会面。","type":"paragraph"},{"text":"2．肃反后认为“可疑”同学的家信和朋友来信，要经检查。","type":"paragraph"},{"text":"3．肃反后被集中学习人员，任意捆、绑、吊打，连最根本的住、卧起居自由都没有。","type":"paragraph"},{"text":"4．放出后不向同学交代，使得被集中学习的人，被党团员冷眼看待。认为是低人一等。","type":"paragraph"},{"text":"5．肃反后在工人中整顿劳动纪律时，威胁和任意开除正直敢言的工人，而把党团员家属拉入学校。","type":"paragraph"},{"text":" 来源：《四川省右派言论选辑3》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月25日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"791c133a3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
