" crossorigin="">{"props":{"pageProps":{"books":[{"id":"255cf4cb-cd67-45ab-b5e8-8240fdbad8f8","name":"社会主义从空想到科学的发展（人民出版社1967年版）","internal":false,"official":true,"type":"pdf","author":"恩格斯，人民出版社1967年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/255cf4cb-cd67-45ab-b5e8-8240fdbad8f8.pdf"],"article":{"title":"德文第四版序言","alias":"","parts":[{"type":"paragraph","text":"德文第四版序言18"},{"type":"paragraph","text":"我曾经预料，这一著作对我们的德国工人来说困难是不多的，现在这个预料已被证实。至少从1883年3月第一版问世以来已经印行了三版，总数达一万册，而且这是在已经升关的反社会党人法的统治下的事情，一同时，这也是一个新的例证，证明警察的禁令在象现代无产阶级的运动这样的运动面前是多么软弱无力。"},{"type":"paragraph","text":"从第一版印行以来，文出版了几种外文译本。帕斯夸勒·马尔提湿蒂翻译的意大利文本：《空想社会主义和科学社会主义》1883年贝内万托版；俄文本：《科学社会主义的发展》1884年日内瓦版；丹麦文本：《社会主义从空想到科学的发展》，载于《社会主义丛书》第-一卷，1885年哥本哈根版；西班牙文本：《空想社会主义和科学社会主义》1886年马德里版；以及荷兰文本：《社会主义从空想到科学的发展》1886年海牙版。19"},{"type":"paragraph","text":"本版作了一些小的修改；比较重要的补充只有两处：在第一章中关于圣西门的补充，同傅立叶和欧文相比，关于圣西门过去谈得的确太少；其次是在第三章接近末尾的地方关于当时已经变得很重要的新的生产形式“托拉斯”的补充。20"},{"type":"paragraph","text":"弗里德里希·恩格斯"},{"type":"paragraph","text":"1891年5月12日于伦敦载于1891年在柏林出版的《社会"},{"type":"paragraph","text":"原文是德文主义从空想到科学的发展》一书"},{"type":"paragraph","text":"选自《马克思恩格斯全集》第22卷第244-245页"},{"type":"paragraph","text":"原文是德文主义从空想到科学的发展》一书"},{"type":"paragraph","text":"选自《马克思恩格斯全集》第22卷第244-245页"}],"authors":["恩格斯"],"dates":[{"year":1891,"month":5,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":11,"page_end":11},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31151daf75"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
