rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"罗共中央代表团离京去朝鲜张春桥等同志到机场热烈欢送波德纳拉希；布尔蒂卡同志","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年九月八日讯 由罗马尼亚共产党中央执行委员会委员、中央常设主席团委员埃米尔·波德纳拉希和罗马尼亚共产党中央执行委员会候补委员、中央书记科尔内尔·布尔蒂卡组成的罗马尼亚共产党中央委员会代表团，结束了对我国的非正式友好访问，今天上午乘专机离开北京前往朝鲜民主主义人民共和国。"},{"type":"paragraph","text":"中共中央政治局常委张春桥，中共中央委员、中共中央对外联络部部长耿飚，中共中央委员、外交部副部长乔冠华，外交部副部长余湛，有关方面负责人金肇野、王明修等，到机场热烈欢送。"},{"type":"paragraph","text":"到机场送行的还有："},{"type":"paragraph","text":"罗马尼亚驻中国大使格夫里列斯库和大使馆外交官员；"},{"type":"paragraph","text":"朝鲜民主主义人民共和国驻中国大使玄峻极。"},{"type":"paragraph","text":"由埃米尔·波德纳拉希和科尔内尔·布尔蒂卡组成的罗马尼亚共产党中央委员会代表团，结束了对我国的非正式友好访问，离开北京前往朝鲜民主主义人民共和国。张春桥、耿飚等到机场热烈欢送。 新华社记者摄"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39d6045f6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
