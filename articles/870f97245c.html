" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于发布剿匪通报问题致中南、华东西南军区电","alias":"","parts":[{"type":"paragraph","text":"关于发布剿匪通报问题致中南、华东、西南军区电"},{"type":"paragraph","text":"（1950年11月23日）中南军区，华东军区，西南军区："},{"type":"paragraph","text":"（一）中南剿匪通报第二号\"收到，甚好。（二）你们三大军区各有土匪若干万均待限期剿绝，建议华东军区仿照西南、中南两军区办法，每月发布一次内部的剿匪通报。你们三大军区的剿匪通报，除发给所属各省各军及我们外，同时发给其他两大军区以资观摩比较。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月廿三日"},{"type":"paragraph","text":"[1]中国人民解放军中南军区剿匪通报第二号，主要讲湖南军区部队于10月中旬重点进剿湘西南的靖县、绥宁及雪峰山地区的土匪，另以一部并湖北一个团配合西南军区酉阳军分区会剿川湘鄂边龙山地区土匪，至11月上旬止，经一个月进剿已基本上告一段落。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":388,"page_end":388},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"870f97245c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
