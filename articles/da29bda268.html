ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"东北我军应于九月下句开始作战以配合南线","alias":"","parts":[{"type":"paragraph","text":"东北我军应于九月下旬开始作战以配合南线"},{"type":"paragraph","text":"（1947年8月29日）林、罗川："},{"type":"paragraph","text":"未巧电悉。（一）计划甚好，甚慰。（二）希望你们能于九月下旬开始作战，配合南线。（三）新的作战，似宜以有力兵团进攻山海关、沈阳线上之敌，以另一有力兵团进攻中长线上之敌，以求分散敌人，各个击破，重点放在中长路或山沈路，由你们酌定。（四）十分希望你们能于明年四月底五月初，以三至四个有力纵队开始平绥线上之作战，首先在张家口、北平间打开一个缺口，将大量山野炮弹及黄色炸药向南线各军输送。他们对此如大旱之望云霓。（五）最艰苦之战争是在南线，这里担负了对敌军主力一百五十七个旅之作战（北线为七十个旅，其中东北占二十六个旅），而山东、苏北大部已被敌占。中央必须留在关内，我亦暂时不能离开。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二十九日十七时"},{"type":"paragraph","text":"[1]林、罗，指林彪、罗荣桓，当时分别任东北民主联军总司令兼政治委员和副政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":238},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da29bda268"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
