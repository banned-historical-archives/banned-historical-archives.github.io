<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"264046bc-febf-4a21-b1bc-c47e4d4f026f","name":"陈伯达最后口述回忆（阳光环球2005年）","internal":false,"official":false,"type":"pdf","author":"陈晓农著，阳光环球2005年","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/264046bc-febf-4a21-b1bc-c47e4d4f026f.pdf"],"article":{"title":"前言","alias":"","parts":[{"type":"paragraph","text":"前言"},{"type":"paragraph","text":"近十来年，很多人勐我写点有家父陈伯达生平的文字，原因大抵在于，一是家父服务于中机构甚久，曾亲历许多重要事件，他的经历中或可窥见历史的某些奥秘；二是他原係中共知识份子中一个有代表性的人物：如《不列颠百科全书》所说，他延安时代起就是“内有影馨的理宜傅家”，可是自他因持“唯生产力”和赞成所谓的“天才”，被定为“反九大的陈伯达路线”的头子之后，他即被戴上了“国民反共份子、托派、叛徒、特务、修正主羲份子”的帽子，这固然展示了臂级门争的重性，但细心者不免心生疑惑，欲问个究竟。再者，父亲事生忠宝于中共，当毛泽东和中共中央的大政方针出了纰缪时，他受制于环境，仍一如既往地服领导，以致落得李代桃，在十八年的漫长刑期中度过馀生，然而七十年代的中共中央文件曾明文宣怖：“陈伯达是刘少奇资产级司令部的黑秀才和头面人物”，“他名羲上是中央文革的组长，实际上反对中央文革”，如今毛泽东和中共中央这些白纸黑字的被故意遗忘，凡此种种，颜多之处，故而许多人期待能一下任怖的弱者的声音，以便做到兼明。"},{"type":"paragraph","text":"年前，一位官方的军人作家过这样的话：“陈伯达的历史，也许永是个。”他故弄玄虚地表露了某些权势者不放文革中专案组给陈罗的罪名的旨意。他的话另一方面促使我拿起了笔，因为他所说的，完全是一个人为製造的。如果对这种以“”的幌子将假案永维持下去的企默不语，将有背于我的良知。管我势单力薄，孤身对阵，但我相信前人说过的这句话：“作伪者心努日拙，盖固未有不破者也。”"},{"type":"paragraph","text":"1989年9月，家父溢然去世。两年后，我因患病离开了工作位，亚于1995年提前退休。此后，我利用养病的开暇，陵续完成了对父亲遗稿的整理和耦，于1998年委香港天地圆书公司出版了《陈伯达遗稿一中自述及其他》-书（该书2000年再版，校正了初版排印时的许多错字）·该的出版受到了广大读者和中国现代史研究者的注意。不过，父亲稿中的自述部分，多数都是七十年代末至八十年代初按照权力部门下达的密问提纲写出的，其内容涉及的方面很窄。有许多重要的历史情况，父亲只在口头话一主要是在私人话中涉及过，而业未写出过面材料·因此，父亲稿的出版，只是工作的一半，只有将父亲晚年的话内容也一供加以整理，公之于翠，才算盘到了自己的责任。"},{"type":"paragraph","text":"1981年11月至1989年9月，父亲与我朝夕相伴，彼此发乎无话不，我也有意识地对父亲的谈话做了简要的笔记。在父亲遗稿的出版事务结束以后，我即参照过去的笔记，对父亲的话情况重新进行了仔细的回忆，着手将话中比重要的内容依时间的顺序，逐事记录下来，可能搜集了一些相开的史料作为佐证。因是抱病写作，工作时断时续，前后历时四戴，方才编缀成书。"},{"type":"paragraph","text":"签于本善主题的性，普中涉及的史实事直书，文字上以简约·素朴为旨，力避浮、染·同时，为者阅读的便利，文中不避父，亚盐量少用亲谓。清代康熙皇帝玄曾对《明史》编纂者提出：“他哲或以文章见长，修史宜直书实事。”我想这也是所有须要对历史负的实录性书籍所应遵循的一个编写原则。"},{"type":"paragraph","text":"在转述父亲的话的过程中，我对过去官方文件中以及某些书刊中的失宝之处进行了一些分析和考证。由于这些分析和考证没有迎合通行的或正统的说法，可能会引起某些人的不悦。然而，“只有忠实于事实，才能忠实于真理。”我为，对待历史的最高原则，只能是“宝事求是”。实际上，过去的出版物中，失实之处数量之多，是不胜枚的，所以我以个人的微薄之力，所做的分析和考证是十分有限的，只能是其要者，略加质疑而已·古人曾云：“子好哉？予不得已也。”“有不得已者而后言。”予亦若是。"},{"type":"paragraph","text":"陈晓晨2004年9月20日于北京寓所"}],"authors":["陈晓农"],"dates":[{"year":2004,"month":9,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":15,"page_end":17},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95d16067b4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
