":[],"dates":[{"year":1976,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚领导人接见和宴请我大使"},{"type":"paragraph","text":"我大使离任回国行前举行招待会"},{"type":"paragraph","text":"新华社地拉那一九七六年五月二十八日电　阿尔巴尼亚劳动党中央政治局委员、部长会议主席谢胡同志，五月二十八日在地拉那接见了即将离任回国的中国驻阿尔巴尼亚大使刘振华。"},{"type":"paragraph","text":"接见时，外交部长奈·纳赛在座。"},{"type":"paragraph","text":"接见是在十分亲切友好的气氛中进行的。"},{"type":"paragraph","text":"新华社地拉那一九七六年五月二十九日电　阿尔巴尼亚劳动党中央政治局委员、部长会议第一副主席阿·查尔查尼，五月二十八日晚在地拉那设宴招待即将离任回国的中国驻阿尔巴尼亚大使刘振华。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央政治局委员、部长会议副主席、阿中友好协会主席斯·科列加，党中央政治局候补委员、国防部副部长拉·盖格普里夫蒂等出席了宴会。中国驻阿尔巴尼亚大使馆外交人员也出席了宴会。"},{"type":"paragraph","text":"查尔查尼同志在祝酒词中赞扬由两国人民的伟大领袖恩维尔·霍查同志和毛泽东主席共同缔造的伟大的阿中友谊在反对帝国主义和修正主义的斗争中不断得到锤炼和发展，赞扬中国无产阶级文化大革命和目前正在中国开展的批判邓小平的反革命的修正主义路线、反击右倾翻案风的斗争取得伟大胜利。"},{"type":"paragraph","text":"刘振华大使在祝酒时，赞扬英雄的阿尔巴尼亚人民在以恩维尔·霍查同志为首的劳动党中央的领导下，在社会主义革命和社会主义建设中不断取得的新胜利。宴会是在十分亲切友好的气氛中进行的。"},{"type":"paragraph","text":"新华社地拉那一九七六年五月二十九日电　中国驻阿尔巴尼亚大使刘振华五月二十九日乘飞机离任回国。"},{"type":"paragraph","text":"到机场送行的有阿尔巴尼亚外交部副部长雷·马利列和礼宾司司长科·齐夫利古。"},{"type":"paragraph","text":"各国驻阿尔巴尼亚外交使节也到机场送行。"},{"type":"paragraph","text":"到机场送行的还有中国驻阿尔巴尼亚大使馆的工作人员。"},{"type":"paragraph","text":"刘振华大使于五月二十五日举行了离任招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5484633a2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
