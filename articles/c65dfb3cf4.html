ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"给马叙伦的信","alias":"","parts":[{"type":"paragraph","text":"给马叙伦?的信"},{"type":"paragraph","text":"（1951年1月15日）夷初先生："},{"type":"paragraph","text":"关于学生健康问题，前与先生谈过，此问题深值注意，提议采取行政步骤，具体地解决此问题。中共华东局一月十一日电报一件付上请察阅，其中第三项即谈到此问题，提出健康第一，学习第二的方针，我以为是正确的。请与各副部长同志商酌处理为盼！"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十五日[1]马叙伦，字夷初，当时任中央人民政府教育部部长。"},{"type":"paragraph","text":"[2]指中共中央华东局、青年团华东工委1951年1月11日关于学校工作给各地党委、团委并报中共中央、青年团中央的电报。其中第三项谈到，由于国民党长期反动统治的结果，学生体质屏弱，患病者很多。但解放以来，各地未能很好注意“健康第一，学习第二”之原则，因此造成公立学校之体格最差，大学比中学又差的现象严重存在，这点应引起十分警惕。应按华东高教会议的规定，适当减少正课时间，照顾学生健康需要。毛泽东在这一段话旁边写了批注：“这是正确的。”"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":544,"page_end":544},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c65dfb3cf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
