torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"戏赠周小丹联","alias":"","parts":[{"type":"paragraph","text":"戏赠周小舟联！"},{"type":"paragraph","text":"（1936年8月）江河移跨2下；"},{"type":"paragraph","text":"蚂蚁做波臣目"},{"type":"paragraph","text":"[1]1936年8月，周小舟从延安启程去新疆宣传抗日。新疆军阀盛世才心狠手辣，不好对付。临别时，毛泽东见小孩撒尿，触景生情，吟成这副对联相赠，鼓励他藐视困难，勇往直前。周小舟（1912—1966），湖南湘潭人，原名怀求，化名元诚、西苇，1937年由毛泽东改为现名。1935年加入中国共产党，曾任毛泽东秘书。建国后，曾任中共湖南省委第一书记。1966年“文化大革命”中因被迫害自杀。"},{"type":"paragraph","text":"[2]跨，腰的两侧和大腿之间的部分。"},{"type":"paragraph","text":"[3]波臣，指水族。古人设想江河湖海中的水族也有君臣之分，其被统治的臣仆奴隶，称为波臣。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":103,"page_end":103},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b644dbd773"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
