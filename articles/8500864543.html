script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席革命路线指引下　在批林批孔运动推动下本市涌现一批群众体育活动的先进单位昨举行了经验交流会　上海冶金机修二厂等七个单位介绍了经验","authors":[],"dates":[{"year":1974,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席的无产阶级体育路线指引下，在市五届运动会期间，通过群众性的层层评选，本市已评选出上海冶金第二机修厂等一百九十七个单位为开展群众体育活动的先进单位，并在昨天举行了经验交流会。"},{"type":"paragraph","text":"上海冶金第二机修厂、川沙县虹桥公社虹二大队、上海警备区某部六连、豫园商场、曹杨中学、巨鹿路第一小学和愚园街道等七个先进单位的代表，在会上介绍了经验。市革委会有关部门负责同志讲了话。"},{"type":"paragraph","text":"本市工厂、农村、部队、学校、商店、机关、街道的广大工农兵和青少年在批林批孔运动的推动下，进一步明确了为革命锻炼身体，体育为无产阶级政治服务的目的性。上海冶金第二机修厂党总支把开展群众性体育活动作为无产阶级占领上层建筑的一个方面，并通过体育活动组织和教育青年，丰富青年的业余生活。许多青年工人通过体育锻炼，更加朝气蓬勃，既是批林批孔的闯将，又是抓革命、促生产的能手。"},{"type":"paragraph","text":"有些单位的经验证明，只有坚持毛主席的“发展体育运动，增强人民体质”的方针，才能使体育真正为无产阶级政治服务、为经济建设和国防建设服务。上海警备区某部六连深入批林批孔，积极开展体育活动，并把着眼点放在提高部队的战斗力上。指战员们通过体育锻炼，进一步增强了体质。一次，他们野行二百多里，每人还负重四十多斤，但没有一个人掉队。"},{"type":"paragraph","text":"一些先进单位的经验还说明，开展体育活动必须抓大多数，大搞群众运动，才能使体育活动广泛、经常、持久地开展下去。虹二大队开展体育活动面向广大群众，贯彻因地制宜，因陋就简，勤俭办体育的原则，活动经常、持久，使社员们始终保持旺盛的革命意志。"},{"type":"paragraph","text":"一些单位由于正确处理了普及和提高的关系，推动了群众性的体育活动，进一步提高了运动水平。巨鹿路第一小学在普及的基础上注意抓提高，取得了显著成绩。全校有百分之九十的学生参加乒乓球活动，并先后为区、市和国家队输送了一百十多名运动员，去年全国女子单打冠军黄锡萍和曾经打败过前世界单打冠军本格森的陆元盛，都是这个学校培养出来的学生。"},{"type":"paragraph","text":"经验交流会指出，当前国内外形势一派大好，体育工作要进一步适应形势的要求，体育工作者和运动员要认真看书学习，刻苦攻读马列著作和毛主席著作，深入批判修正主义体育路线，把批林批孔运动普及、深入、持久地进行下去，进一步提高路线斗争觉悟，推动体育战线的斗、批、改，使体育事业更好地坚持社会主义方向。会议相信，在市委的正确领导下，在工、青、妇、民兵的支持下，这些先进单位的经验必将得到进一步的发展，并将出现更多的开展群众体育活动的先进单位，为党的体育事业作出更大的贡献!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8500864543"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
