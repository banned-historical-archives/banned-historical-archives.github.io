tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习研究毛泽东军事思想获硕果","authors":["张玉龙"],"parts":[{"type":"paragraph","text":"这个省军区在学习和研究毛泽东军事思想的过程中，十分注意突出重点。他们根据所处地理位置和担负的任务特点，紧紧围绕几个重点问题展开研究。如毛泽东军事思想在新时期海防建设中的地位和作用，毛泽东武装力量建设思想及其在海防武装力量建设中的运用，毛泽东战略作战指导原则及其在濒海防卫作战中的运用，毛泽东军事辩证法思想及其在海防建设实践中的运用等，都是他们在学习研究中始终抓住不放的课题。由于研究工作有了实际的依托，研究水平也得到不断提高。截至今年9月，在1年半时间里，这个省军区共推出学习研究毛泽东军事思想学术论文179篇，其中53篇在6月中旬召开的福建省军区毛泽东军事思想学术讨论会上得到交流，42篇编入《毛泽东军事思想研究论文汇编》，已由解放军出版社出版发行。9月份，在南京军区毛泽东军事思想研讨会上，这个省军区有7篇论文获奖，是军一级单位论文获奖数量最多的单位。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"853df7e979"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
