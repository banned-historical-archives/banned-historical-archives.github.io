<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈建侯、时昭涵在光明日报编辑部邀请沈阳知识分子座谈会上的讲话","authors":["时昭涵","辽宁","陈建侯"],"dates":[{"year":1957,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"陈建侯、时昭涵在光明日报编辑部邀请沈阳知识分子座谈会上的讲话","type":"title"},{"text":"辽宁陈建侯时昭涵","type":"authors"},{"text":"[光明日报编者按：本报编辑部于5月8日在沈阳邀请部分高级知识分子举行座谈会，讨论正确处理人民内部矛盾问题。这里发表的是座谈会的发言纪录。]","type":"paragraph"},{"text":"陈建侯（沈阳化工研究院工程师，九三学社社员）：","type":"appellation"},{"text":"我国科学研究工作，目前分在中国科学院、高等院校和产业部门三个系统中进行。过去几年，它们对国民经济、文化科学的发展有很大贡献。但是由于各自为政，互不相关，也抵销了不少力量。郭院长在全国政协的报告中提出科学协调工作，我觉得这样做很对，希望快做。否则像今天大家争着挂牌子的作风，要想达到国际水平，恐怕有点“痴人说梦”。","type":"paragraph"},{"text":"“科学奖金”本意很好，不过科学进军的高潮没有掀起，倒掀起了“人心向院”的高潮。科学研究必须理论结合实际，大家都知道这样说，究竟如何结合，恐怕还值得考虑。有人说，做理论题目，可能得到科学奖金，名利双收；有人说，复制国外配方，可以结合新产品试制，虽无名，利还不少。我不反对奖励，不过我认为一个真正对人民，对国家有点用处的科学研究，还是理论结合实际，实际结合理论的好。","type":"paragraph"},{"text":"我觉得近年来的科学研究报告水平，须要多多提高。为此，应把科学研究看作是全国人民的公事，不是那个单位的“私事”。科学院不要将院墙修筑得太高了，产业部门也不要将自己研究所压得太低了。我非常拥护袁翰青先生“科学基金”的倡议，科学院应当是全国科学家的科学院，各方面在科学基金补助下，可以结合生产、结合教学，展开研究工作，自成一家之言，真正做到百家争鸣。","type":"paragraph"},{"text":"其次，我想谈谈高等院校培养人才的问题。几年来，在这方面也取得了成绩。不过，在“专业培养”、“学用一致”问题上，我认为大家还可以商讨。目前，专业是否分得过细了一些，忽视了基础课程？过去训练通才不好，因为太通了，一无所长；现在训练专才好，这又觉得太专，只知道一点儿，也不见得好。比如桐油罐子，装桐油当然很好，但是有时没有桐油装，装香油就用不上了。现在，年年都在闹毕业同学改行问题，真是公私交困，各有苦处。我觉得太专学校应当减少院系，集中教学力量教好基础课程。例如，化学方面，教好普通化学、有机化学、分析化学、物理化学等就算培养到70%的程度。至于什么工艺专业，造纸、制革、橡皮、油漆、塑料等等，放在四年级教。这样，国家建设什么，在四年级就多开什么；国家不要什么，就少开什么。既灵活，又方便，学生无改行之忧，国家有得人之实。橘逾淮为枳，在外国先进的，在国内不一定先进，不能生搬硬套的学习。","type":"paragraph"},{"text":"还有，选送青年出国培养是国家的大事，既然肃反运动已基本完成，不应当再由内部决定，选拔人员就不能限于党员团员，只要成绩达到标准，就有被选送资格。选拔应举行公开考试，宗派主义是阻塞贤路的。","type":"paragraph"},{"text":"时昭涵（沈阳化工研究院工程师，九三学社社员）：","type":"appellation"},{"text":"目前人事工作方面存在着一些混乱现象，而且相当普遍。我建议中央加强全国的人事工作。","type":"paragraph"},{"text":"拿我们单位说，人事科的干部文化水平很低，有的还是半文盲，勉强能阅读人事材料，对科学技术更是一窍不通，可是他们做的却是调配技术人员的工作。调配不得当的当然就不会少。有人讽喻这是“乔太守乱点鸳鸯谱”。例如我们单位是搞化学工程研究的，可是分配来的大学毕业生却是学肥料的，学药物的。","type":"paragraph"},{"text":"人事工作干部不了解干部情况，但又掌握着分配、使用的大权，这是一个矛盾。因此，我希望中央考虑：究竟应该选择什么样的干部来做人事工作？目前有些单位把人事科室当作安置老干部的爱人、眷属的场所，恐怕是不恰当的。","type":"paragraph"},{"text":"我还想谈这么一个问题：科学研究工作依靠外行来搞，还是依靠内行来搞？我是研究化学工程的。据我知道，“化工”作为专门的学系，最早是在美国发展起来的，苏联近年来才在大学里设化工系。当初我们学习苏联，一些行政领导同志自己不懂业务，又不接受内行的意见，简单地认在苏联化工不成为独立系统，我们也应该学样。于是大批的化工研究人员改行了。现在发现这样做不对，才开始在大学里设化工系，可是已经走了几年冤枉路。其实，当初能听一听内行的意见，这种损失是完全可以避免的。","type":"paragraph"},{"text":"再说我们单位的化工研究室，工作方向一直不能确定下来。这倒不是我们研究人员不知道化工应该研究什么，而是行政领导上不采纳内行的意见。他们只知道科学研究要配合生产，但不知道化工研究应该配合什么生产，于是各种任务都下来了，至于这些是否属于化工研究的范围，或是否是化工研究中的中心问题，却不予考虑。其结果，当然研究方向就确定不了。","type":"paragraph"},{"text":"再举一例子：我们单位早前修建一间试验室，正赶上增产节约运动，领导上要削减修建费用以贯彻节约精神。当时内行人提出意见，认为实验室要求有一定规格和标准，不然要出毛病。领导上不听。后来房子草草盖好，外边火车经过时震动，使精密仪器受到损失。于是又加固修补，所耗费用竟比节约的钱大得多。","type":"paragraph"}],"comments":[],"origin":"《批判光明日报参考资料》（中华全国新闻工作者协会编，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"729da5da3d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
