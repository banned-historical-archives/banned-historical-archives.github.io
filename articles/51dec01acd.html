中发生偏向","authors":[],"dates":[{"year":1952,"month":2,"day":11}],"is_range_date":false,"parts":[{"text":"松江吉林两省县、区级机关在三反运动中发生偏向","type":"title"},{"text":"【东北总分社十一日讯】松江、吉林两省县、区级机关在进行三反运动中已发生严重偏向。松江省双城县县委干部会上，银行经理抗拒三反运动，并说：“我就是大老虎，你们打好了！”案情并未弄清楚，大家在会上就集中火力向他进行斗争。当晚，该经理即自杀身死。吉林省扶余县区级机关也在“打老虎”，区干部跑到手面不干净的干部家里公开说是来“打老虎”的，翻箱倒柜查家底，弄得很紧张。在上级严令限期完成打虎任务的情况下，该两省的领导上都有急于在县级搞“三反”的情绪。东北局已注意纠正此种偏向，并通报各地县级以下搞“三反”，必须遵照毛主席的指示进行。","type":"paragraph"}],"comments":[],"origin":"1952年2月12日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51dec01acd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
