帅和维辛斯基外长祝贺","authors":["周恩来","朱德","毛泽东"],"dates":[{"year":1952,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿二日电】　我中央人民政府毛泽东主席与外交部周恩来部长分别致电苏联部长会议主席斯大林大元帅及外交部部长维辛斯基，祝贺苏联武装部队建军三十四周年。电文如下；"},{"type":"paragraph","text":"毛主席致斯大林大元帅贺电"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟部长会议主席斯大林同志:"},{"type":"paragraph","text":"值此苏维埃社会主义共和国联盟武装部队建军三十四周年的光荣节日，请接受我衷心的祝贺和最好的愿望。"},{"type":"paragraph","text":"毛泽东　一九五二年二月二十一日　北京"},{"type":"paragraph","text":"周外长致维辛斯基外长贺电"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟外交部部长维辛斯基同志:"},{"type":"paragraph","text":"值此苏维埃社会主义共和国联盟武装部队三十四周年的光荣节日，谨向您，部长同志，致以热烈的祝贺。"},{"type":"paragraph","text":"周恩来　一九五二年二月二十一日　北京"},{"type":"paragraph","text":"朱总司令致华西列夫斯基元帅贺电"},{"type":"paragraph","text":"【新华社北京廿二日电】　中国人民解放军总司令朱德致电苏联陆军部部长华西列夫斯基元帅，祝贺苏联武装部队建军三十四周年。电文如下:"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟陆军部部长华西列夫斯基元帅:"},{"type":"paragraph","text":"欣逢世界和平的保卫者——苏联武装部队三十四周年的盛大节日，中国人民解放军的全体官兵，谨向您及苏联军队全体将士，表示衷心的庆贺与敬意。"},{"type":"paragraph","text":"由高度苏维埃爱国主义精神和先进军事科学所武装起来的苏联军队，是捍卫世界和平的堡垒。它在斯大林元帅的英明领导下，使全世界人民获得了希望与力量。"},{"type":"paragraph","text":"在此，谨祝中苏两国亲密团结的伟大友谊坚强无比。"},{"type":"paragraph","text":"中国人民解放军总司令朱德　一九五二年二月二十一日　北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cd99a3c61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
