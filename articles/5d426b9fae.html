year":1978,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在宝钢工程宣告正式动工的第二天，我们来到锦江饭店，访问了专程来沪参加宝钢动工典礼的新日本钢铁公司董事长稻山嘉宽先生。"},{"type":"paragraph","text":"稻山嘉宽先生是我国人民所熟知的老朋友。无论是毛主席、周总理健在时，还是在以华国锋同志为首的党中央领导下的今天，稻山嘉宽先生都为中日两国人民的友好事业做过有益的工作。这次，他又不辞辛劳，亲自率领代表团来我国参加宝钢动工典礼。稻山嘉宽先生虽然已是七十四岁高龄的人了，但是精神矍铄。他在住处热情地接见了我们。他说:这次到贵国来，你们从上到下对钢铁工业都很重视，这种情景深深地感动了我和其他日本人士。看到宝钢动工典礼这样动人的场面，使我们感到自己责任的重大。我们一定要全力以赴，协同上海人民按时按质按量地完成建设宝钢的任务。"},{"type":"paragraph","text":"稻山嘉宽先生以十分怀念和兴奋的语调，回忆邓小平副总理访日的情景。他说，邓副总理在新日铁的君津厂参观时，新日铁的总经理斋藤先生曾热情地介绍过君津的规模和先进的技术水平。当时，我也对邓副总理讲过，你们的宝山钢铁总厂建成以后，有些方面要比君津厂好。"},{"type":"paragraph","text":"稻山先生又说，宝钢要在短短几年内建成投产，这就需要培养大量的技术人员和经营管理人员。你们的鞍钢要扩建，还有其它地方也要上去，因此，培养各种技术人才，建设一支骨干队伍，就显得特别重要。接着，稻山嘉宽先生又很自然地谈到了关于技术交流的问题。他说，目前，我们有不少技术人员在宝钢，同贵方技术人员一道工作，随着工程的进一步发展，今后还会有更多的日本技术人员要到中国来。我们是为加强日中友谊而来的，这是我们合作的基础。"},{"type":"paragraph","text":"稻山先生在上海的活动十分紧张，他的秘书已经在为时间不够而着急了。我们的翻译打破了讲一段翻译一段的常规，采取边讲边译的方法，为我们争取了时间。可是，稻山先生谈兴正浓。他说，贵国要再增产三千万吨钢，这就需要大量引进技术和技术设备，需要盖新的工厂，需要原料。我算一算，三千万吨钢，就需要一亿多吨原料，要开矿、挖煤，为此，既要设备，又要有庞大的运输能力，如铁路等。总之，围绕三千万吨钢，需要引进的各种技术设备是相当可观的。接着，稻山先生意味深长地谈起了日本钢铁工业发展的过程。他说，我们也是先以引进技术为主，然后再发展自己的东西的。"},{"type":"paragraph","text":"稻山先生深思着说:中国实现四个现代化，对亚洲，对中国，对日本都会有好处，现在欧洲各国愿意和中国合作，联合国也愿意和中国合作，中美建交后，在这方面的合作也会有新的前景。我愿意为增进日中友谊，好好干!"},{"type":"paragraph","text":"我们同稻山先生的谈话，虽然由于时间的限制而不得不结束了，但是稻山先生留给我们的日本人民对于中国人民的深厚友情，却久久地荡漾在我们的心中。"},{"type":"paragraph","text":"解放日报记者　郭昌熹"},{"type":"paragraph","text":"本报记者　周嘉俊"}],"comments":[],"origin":"解放日报,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d426b9fae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
