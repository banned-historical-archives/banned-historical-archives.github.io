hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"对《红旗》杂志调查员报告《“打击一大片，保护一小摄”是资产阶级反动路线一个组成部分》文的批示","alias":"","parts":[{"type":"paragraph","text":"关于党组织的指示"},{"type":"paragraph","text":"（一九六七年三月）"},{"type":"paragraph","text":"我们总要有一个党，现在这样的状况是一种暂时现象，没有一个党是不行的。各个革命造反派的组织怎么能代替党？革命委员会也不能代替党。"},{"type":"paragraph","text":"（摘自张春桥同志1967年3月26日在上海整风会上的讲话）对《红旗》杂志调查员调查报告《“打击一大片、保护一小撮”是资产阶级反动路"},{"type":"paragraph","text":"一个组成部分》一一文的批示"},{"type":"paragraph","text":"（一一九六七年三月二十九日）此件很好，可以公开发表，并予广播。还应调查一、二个学校，\"、二个机关的情况。请先印发参加碰头会的同志以及其他同志看一看。"},{"type":"paragraph","text":"关于大批制的指示"},{"type":"paragraph","text":"（一九六七年三月）一、批判要踏实，要调查确实，不然会一风吹。"},{"type":"paragraph","text":"二、文章要一、二千字，短一点，写一个问题。一个问题说明了就行了。不能超过三千字，长了没人看，看了也记不清。"},{"type":"paragraph","text":"三、驯服工具论要批判，但也要有无产阶级纪律，服从、团结都是有条件的。四，托拉斯不能都推翻吧？旧名词可以有新内容，主要批判他走资本主义道路。"},{"type":"paragraph","text":"关于宜宾问题的批示"},{"type":"paragraph","text":"（一九六七年四月）"},{"type":"paragraph","text":"许多外地学生，几次冲入中南海，--些军事院校冲进国防部，中央和军委并没有指责他们，更没有让他们认罪，悔过，或者写检讨，讲清楚，让他们回去就行了，而各地把冲军事机关-一事，却看得太重了。"},{"type":"paragraph","text":"·298·"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":3,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":311,"page_end":311},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b865aac2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
