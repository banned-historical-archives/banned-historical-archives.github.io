,"authors":["西南人民革命大学云南分校3部4班9组　陈筠卿"],"dates":[{"year":1952,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"我绝不同情因抗拒坦白而被捕的丈夫","type":"title"},{"text":"西南人民革命大学云南分校3部4班9组　陈筠卿","type":"authors"},{"text":"我的丈夫许国佖有重大贪污，在三反运动中不肯坦白暴露，采取对抗态度，终于被捕送人民法院究办了。","type":"paragraph"},{"text":"在三反运动开始时，我以我现有的一点认识写信给他，要他深入检查，如有贪污受贿行为，要大胆坦白暴露。我过去虽知道他有挪用公款挪用公物的行为，但因他贪污了的钱，自己挥霍，并没有给我知道，所以我没有具体材料检举他，这是我平日对丈夫的帮助不够，以致使国家受到巨大的损失，我是应负一份责任的。","type":"paragraph"},{"text":"当我没有正确认识贪污的性质和危害性时，我觉得丈夫挪用公款公物，公私不分，低价购买公物等这些事，是没有多大问题的。经过了革大5月的学习，尤其是这次三反运动的教育，我才认识了腐化堕落、贪污受贿是十分严重的错误，是损害了国家人民的利益。","type":"paragraph"},{"text":"这次三反运动救了我的丈夫，也救了我，如果没有毛主席这一伟大号召，那么，我的丈夫继续为非作歹下去，必然会走上灭亡的道路。就我自己来讲，也提高了我的警惕，将来到工作岗位上，一定要公私分明，不贪污公家的财物。","type":"paragraph"},{"text":"经过这次的教育，我明白了国家的政策，体会了共产党毛主席的伟大，开始站稳了人民的立场。因此我丝毫不为丈夫的被捕而背上包袱。我更要在三反运动中发挥自己的力量，做一个勇敢的战士。","type":"paragraph"}],"comments":[],"origin":"《云南革大》第44期，西南人民革命大学云南分校，1952年2月21日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a011d0009a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
