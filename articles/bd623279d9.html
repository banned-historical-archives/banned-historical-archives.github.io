<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"三次视察中的几点感想","authors":["徐君虎","湖南"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"三次视察中的几点感想","type":"title"},{"text":"湖南徐君虎","type":"authors"},{"text":"(徐君虎：湖南省人民委员会参事，民革中央委员、湖南省委主任委员)","type":"subtitle"},{"text":"在湖南省人民代表大会第一届第四次会议上的发言","type":"subtitle"},{"text":"我现就一年来三次视察，谈点感想，提点意见，不正确的地方，希批评指教。解放以来建设的成就是惊人的。城市都改变了原来的面貌，建筑林立，焕然一新；城市人民在居住条件生活服装等方面都有了显著的改善。农村也都组织了生产合作社，生产成绩很大，群众的积极性大大提高了，一年来抗御了严重的旱灾，使灾害损失减少到最低的限度，农民生活也普遍提高了。","type":"paragraph"},{"text":"但无可否认，我们的工作还存在着不少的问题。我们在农村看到水利投资确是不少，但有些工程质量太差，经不起水旱灾的考验；农村生产力很落后，远远赶不上生活向前发展的需要；我们城市所供应的农械，农药、颗粒肥质量太差，解决不了实际问题，加上农民由于长期受到封建统治的剥削，解放的时间还不久，生活基础实在太脆弱，现在年青的发展农业合作社力量，依然难以抵挡旱灾带来的饥寒。怎样把农民的生活水平迅速提高，必须引起我们的注意与关怀。","type":"paragraph"},{"text":"其次，我以为农产品的收购价格，未尽合理，也大大影响了农民的生产积极性。牲猪收购不合理的情形，报纸时有揭露，有漫画(举实例)，尚厅长的报告中也提到将予以调整。其他如长沙郊区的鱼，最近麻阳、辰溪、岳麓山的柑橘，收购价与市价相差常达两三倍(举例)，受灾的农民对此意见很多。可是另一方面，城市日常生活品的供应，经常出现抢粮、排队、脱销的现象，浪费奢侈之风已渐渐抬头，这是极其鲜明的对照，有些固然是人民生活要求提高了的表现，但有些却是显然不合理的。党在我省严重灾情之下，以“巩固农业合作社、全面发展生产、克服旱灾困难、开展增产节约运动”为中心任务，这是非常正确的，我完全同意周小舟书记的报告。在短期内，我们必须严格制止一切非生产性的不是特别需要的修建，我们必须帮助农民，把节省下来的资金投到农业生产上去，用更大的力量发展农业，支援工业。","type":"paragraph"},{"text":"农村要“勤俭办社”，我们在城市里的人也要“勤俭办公”。只有资产阶级为欺骗顾客，才需要讲究铺张门面，才讲究个人的豪华，我们是为人民服务，只许忠心耿耿，货真价实，凡是铺张浪费不顾人民疾苦的人，他就是盗窃人民财产的人，他就是十足的剥削阶级，资产阶级的代理人，我们必须群起而非之！","type":"paragraph"},{"text":"在办公室里加上一套坐坐谈谈的皮沙发，一张铺在地上的漂亮地毡，几株名贵的花木，那是我们理想的生活；在目前我们如果把它省下来，农村便可以兴建几栋猪栏牛舍。不然的话，坐在雅致的办公室里叫冒(没)肉吃，叫副食品不够，决不是解决矛盾的办法，因为农民在生产、生活资料上还存在许多的困难咧。同时为了鼓励农民生产的积极性，为了增加农产品，提高某些农产品的收购价格，做到“薄利多得，公私两利”，国家需要积累资金从事建设，农业社、农民也要补充、扩大生产资料、生活资料从事丰产，这样做我认为是合情合理，深得民心的事。(下略)","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd623279d9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
