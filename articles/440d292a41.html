航空陷于瘫痪","authors":[],"dates":[{"year":1969,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对残酷剥削　要求改善待遇"},{"type":"paragraph","text":"印度马德拉斯码头工人罢工"},{"type":"paragraph","text":"数百名飞机驾驶员罢工使国内航空陷于瘫痪"},{"type":"paragraph","text":"新华社三日讯　新德里消息：印度东海岸重要港口马德拉斯六千名码头工人，从六月一日起举行罢工。整个码头的装卸工作已经陷于瘫痪。"},{"type":"paragraph","text":"这次码头工人罢工，是为了反对印度反动当局的残酷剥削，要求减少装卸工作量，改善工人待遇。"},{"type":"paragraph","text":"这是半月来马德拉斯码头工人第二次罢工。五月十五日到十七日，四千名马德拉斯的码头工人和职员曾经举行罢工，要求改善劳动条件和争取每月至少有二十一天保证有工作做的权利。"},{"type":"paragraph","text":"印度反动政府经营的国内航空公司的四百五十名驾驶员从六月一日到三日也举行了罢工，使印度国内航空陷于瘫痪。驾驶员要求增加津贴和改善劳动条件。机场的汽车司机和机上的女服务员也举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"440d292a41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
