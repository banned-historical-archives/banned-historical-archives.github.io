es":[{"year":1959,"month":11,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西安经济理论界最近集会对科学院陕西分院经济研究所所长岳邦珣同志在经济理论方面的修正主义观点进行了深入系统的批判。"},{"type":"paragraph","text":"岳邦珣的右倾机会主义理论观点，集中地系统地反映在他所著的“研究与讲授政治经济学的几个基本问题”一书中。首先，岳邦珣对马克思主义政治经济学的阶级观点进行了修正和歪曲，他企图把政治经济学的主要研究对象说成没有阶级内容的东西。"},{"type":"paragraph","text":"其次，岳邦珣美化了资本主义经济，丑化了社会主义经济，他反对研究社会主义社会的优越性，别有用心地要读者首先着重研究社会主义社会的矛盾。"},{"type":"paragraph","text":"此外，岳邦珣同志对党的理论教学和科学研究的根本方针也作了修正。他错误地主张，学理论的目的就是“学知识”，认为“知识”就是“党性”、“没有丰富的知识，就不可能有真正的党性”。这种荒谬主张的实质就是反对理论为政治斗争服务，为社会主义建设总路线服务。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8628900141"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
