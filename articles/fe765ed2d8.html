<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山东省人民政府关于取缔会门道门的布告","authors":[],"dates":[{"year":1949,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"山东省人民政府关于取缔会门道门的布告","type":"title"},{"text":"查会门、道门，不仅为封建迷信组织，且常为反动份子操纵利用，以进行各种反革命活动。在过去抗日战争时期及3年来解放战争当中，均曾发生破坏作用。一般无知人民，每受其欺骗愚弄，误入歧途，致于法纪，殊堪痛惜。近者国民党反动派为作垂死挣扎，正分遣特务匪徒，混入内地，阴谋掌握会门、道门，蛊惑落后人民，散播谣言，拨弄是非，甚至竟敢组织武装暴动，向人民进行残害等罪行，迭经各地公安机关破获有案，本府为保障人民利益，维护社会治安，挽救一般误入歧途的会员群众，并予首要份子以自救自新之路。特规定取缔会门、道门办法如下：","type":"appellation"},{"text":"一、自布告之日起，所有会门、道门即为非法组织。应一律解散，不得再有任何活动。其首领一律向当地县、市政府所属公安机关进行登记。如抗不登记或继续活动者，一经查明，定予惩办。","type":"appellation"},{"text":"二、凡以会门、道门为掩护，阴谋或公然武装暴动叛乱，及从事抢劫、暗害等破坏活动者，定予缉拿，严惩不贷。","type":"appellation"},{"text":"三、凡会门、道门之首要份子，其曾与匪特勾结，或有犯罪行为者，如能悔过自新，交出其所有文件、物品及各种武器，今后决不再事活动者，当予以宽大处理，或酌情准其立功赎罪。其未与匪特勾结，亦未有犯罪行为者，只要履行登记，即予免究。","type":"appellation"},{"text":"四、所有被胁迫，被诱骗而参加会门、道门的一般会员、群众，一经脱离组织，停止活动，即一律不予追究。其能揭发匪特阴谋，并检举其各种破坏活动者，当酌情予以奖励。","type":"appellation"},{"text":"五、凡早已脱离组织，或早已停止活动之会首、会众，一律不咎既往。望各安生业，勿自惊扰。","type":"appellation"},{"text":"以上取缔会门、道门办法，旨在保障人民利益，维护社会治安，挽救一般误入歧途之会员、群众免遭祸害，并予极少数首要分子以自救自新之机会。希各界人民，共体此旨，本治病救人方针，用说服、劝告方法，群策群力，贯彻实行。使未参加者有所警惕；误入歧途者从速脱离，首要者投案自新。对执迷不悟，继续进行暗害破坏活动者，检举揭发。以期肃清匪特，安定社会，巩固革命秩序。同时并望慎防破坏分子；乘机制造谣言挑拨是非，及禁止滥施斗争，随便捕捉，以免别生枝节，予奸特以鼓煽之隙。","type":"appellation"},{"text":"切切","type":"appellation"},{"text":"此布","type":"appellation"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe765ed2d8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
