tart":10,"page_end":10,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为毛主席当电话员","authors":[],"parts":[{"type":"paragraph","text":"人物小传：彭金山，湖南省长沙市人，1911年2月生，1929年2月参加红军。"},{"type":"paragraph","text":"1933年6月，我所在部队被编为红一方面军一军团第2师。长征开始时，我是2师的电话架线员。为保证通信畅通，我们这些电话兵是“逢山开路、遇水架桥”。"},{"type":"paragraph","text":"一军团2师是长征的先头部队，那时，我天天能见到毛主席、周副主席等领导同志。周副主席，国字脸，浓眉大眼。因为一脸络腮胡子，被大家称为“周胡子”。后来到了延安，周副主席把他那标志性的大胡子给剃掉了，大家为他惋惜了好一阵子。那时，不但毛主席、朱老总叫周恩来“周胡子”，新兵也跟着喊。平常有周恩来的电话，我们也不喊周副主席，都叫“周胡子”。"},{"type":"paragraph","text":"一次，排长悄悄对我们说，周大胡子的电话太多了。不巧，这话让周副主席听到了。我们满以为他会发火，可他也只是笑笑，没吱声。"},{"type":"paragraph","text":"那时，我们常常看见毛主席卷纸烟抽，抽得很凶。他平常很忙，总是心事重重的样子，我们这些人也不敢上前问，只知道每天帮他把电话线架好，然后他不停地打电话……"},{"type":"paragraph","text":"因为行军路线随时都在改变，所以电话线我们随身携带。每名战士携带一公里的线，有20斤重。要是平常，可能问题不大。可是长征的路，绵延蜿转，崎岖不平，非常难走，再背上电话线，确实有些吃不消。现在每逢阴雨天，我的肩膀就隐隐作痛，就是那时落下的病。"},{"type":"paragraph","text":"我们每到一地，立即架线。有时信号不好，要反复试信号，最多一次试了上百次，才接通电话。通信设备还经常出故障，红军内部没有人会修电话，一位从国民党军队投诚过来的士兵是修电话机的。这可好，他因为有技术，处处受到优待，简直成“老爷”了。还有个姓王的士兵，浙江人，以前在国民党部队开车，也会修电话机，周副主席称他：“修机子的王司机”。"},{"type":"paragraph","text":"彭金山口述 陈学斌整理"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ecf7a595bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
