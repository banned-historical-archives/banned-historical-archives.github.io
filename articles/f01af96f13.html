script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利马列主义运动召开首次全国代表大会宣布成立意大利马列主义共产党大会表示将遵循马恩列斯和毛泽东的教导把反帝斗争等进行到底","authors":[],"dates":[{"year":1966,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十二日电　罗马消息:意大利马克思列宁主义运动于十四日到十六日在里窝那召开了第一次全国代表大会，出席大会的有来自各地的一百多名代表。大会宣布成立意大利马克思列宁主义共产党，并且选出了党的中央委员会。"},{"type":"paragraph","text":"大会发表的声明说，意大利共产党已经堕落为修正主义的党，它在“和平进化”的旗帜下企图破坏工人阶级的革命觉悟，使他们放弃历史的任务，所以有必要成立新党。"},{"type":"paragraph","text":"声明认为，资产阶级的专政和资本主义剥削制度，不可能通过在资产阶级政权机构内采取行动而逐步加以消灭，只有通过革命才能彻底推翻和消灭它。"},{"type":"paragraph","text":"大会表示，意大利马克思列宁主义共产党将遵循马克思、恩格斯、列宁、斯大林和毛泽东的教导，把反对以美国为首的帝国主义和反对反动派的斗争以及争取社会主义革命的斗争进行到底。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f01af96f13"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
