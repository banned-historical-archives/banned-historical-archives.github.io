<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wengeqianqixinianlu1","name":"十年文革前期系年录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录1.pdf"],"article":{"title":"第三十二卷","parts":[{"type":"title","text":"第三十二卷"},{"type":"paragraph","text":"1966年8月27日至9月4日"},{"type":"paragraph","text":"(第二次接见红卫兵)8月27日"},{"type":"paragraph","text":"“首都大专院校红卫兵司令部”(即“第一司令部”)成立。江青等到会表示祝贺。"},{"type":"paragraph","text":"江青在“首都大专院校红卫兵司令部”成立大会上的讲话红卫兵同志们："},{"type":"paragraph","text":"你们好！我们今天有几个人正在开会，听说你们成立司令部，哦！红卫兵司令部，我们就停止会议，来庆祝你们。(热烈鼓掌)"},{"type":"paragraph","text":"我们一块来的同志都是军队的同志，还有公安部长谢富治同志。我是个人参加你们大会的。我相信我们这个小组(指文革小组)是支持你们的，我没有来得及征求他们的意见。"},{"type":"paragraph","text":"红卫兵，顾名思义，是兵，是青少年组织，对不对？(对！)"},{"type":"paragraph","text":"我们的人民解放军是毛主席亲自领导的，战胜帝国主义、反动派和一切阶级敌人的军队。我们人民解放军是有优良传统的。我相信你们会继承这个传统。"},{"type":"paragraph","text":"最近你们干了很多好事，干得好！目前你们组织起来，联合起来，还把中学的红卫兵也组织起来，联合起来，这样才能成为一个战斗的部队。"},{"type":"paragraph","text":"我们五个人：就是杨成武同志、刘志坚同志、谢富治同志、王××同志，都是军队的。我们建议杨成武、刘志坚同志做你们的辅导员。我们几个商量了一下，有些地方需要红卫兵协助人民解放军保卫的，不要被坏分子利用。中南海、人大会堂、钓鱼台宾馆、公安部监狱、中共中央军事委员会、国防部、人民解放军尖端科学、机要部门(包括文件档案)、邮电大楼、自来水公司、水力火力发电站、广播电台、外交部、外国使馆、领事馆(不要进里面去，外面是我们的事情)、各种仓库、银行、交通要害、机场、车站，还有通讯枢纽部门，如电话总机等等。现在想不完全，你们再想一想，众人智慧大如天。作为一个建议你们讨论讨论好不好？下面请杨成武同志给你们讲话。"},{"type":"paragraph","text":"陶铸写信给北大聂元梓，提议“积极搞好本身的革命，创造好经验。”对“派人出去(串连)，当然以搞好本单位的运动为前提。这样支援才有力量，才更能起示范作用。”陶认为外界对他25日与中南来京学生讲话中所说“免费坐车”进行串连的话是误传，故特写信纠正。陶铸办公室要求将此信“尽快印发，可在《新北大》上刊载，广为分发。(《传信录92》)"},{"type":"paragraph","text":"王力在接见钢院、科大等校学生时说：陶铸25日的讲话是代表中南局讲的。主要任务是把本单位的文化革命搞好。他将写信给聂元梓，澄清这个问题。(《传信录93》)"},{"type":"paragraph","text":"改名为红卫兵战校的原清华附中红卫兵，发布《对目前形势的十点估计》。它基本上反映了党内保守派的观点，标榜红五类子弟的革命特权与革命功绩，拥护李雪峰的新市委，维护统治秩序，提出纠偏。"},{"type":"paragraph","text":"红卫兵战校(前清华附中)红卫兵《对目前形势的十点估计》："},{"type":"paragraph","text":"一、主流"},{"type":"paragraph","text":"现在，红卫兵正以排山倒海之势，雷霆万钧之力，高举毛泽东思想伟大红旗向“四旧”猛烈开火，把“四旧”打个落花流水，天翻地覆。一个无产阶级的崭新世界已经出现在地平线上。这一场革命大造反的狂风暴雨真是好得很！党中央和毛主席首先站出来大力支持。工农兵齐声欢呼。帝国主义，现代修正主义和一切反动派胆战心惊。每一个确定了革命观点的人，在北京城里走一走，无不感到从来没有的痛快。这是运动的主流。所有革命者，都热烈的欢呼和支持这一革命行动！"},{"type":"paragraph","text":"红卫兵在这场史无前例的轰轰烈烈的无产阶级文化大革命中，当然也不可避免地产生了一些缺点和错误。这毕竟是第二位的，是次要的。但是，我们认为，做为毛主席最忠实的红卫兵，应该最听毛主席的话，勇敢地正视自己的缺点和错误。坚决按照毛主席的指示，特别是按照“十六条”，予以克服和纠正，把运动引向符合党的政策的更高级的水平。"},{"type":"paragraph","text":"二、谨防把红卫兵打成反革命"},{"type":"paragraph","text":"但是绝不能看到红卫兵有某些缺点和错误，就颠倒黑白，就否定主流，就“攻其一点，尽力夸大，不及其余”，把红卫兵打成立场错误，方向错误，打成“反革命”。有一些坏人在这样做。有一些思想方法不正确的革命同志也在这样做。我们希望一切真正革命同志，不要跟着瞎说。"},{"type":"paragraph","text":"红卫兵的主流和大方向始终是正确的。红卫兵的缺点和错误是可以在斗争中改正的，一切革命的同志必须认识这一点。"},{"type":"paragraph","text":"三、要用文斗，不用武斗"},{"type":"paragraph","text":"目前，有些红卫兵和红五类子弟被反革命杀害了，对此，我们表示极大的愤慨，我们一定要为自己的阶级兄弟报仇，坚决镇压这些现行反革命分子，对他们实行无产阶级专政，但是除了对有血债的现行反革命分子要依法惩办外，我们反对武斗。"},{"type":"paragraph","text":"我们红卫兵要警惕坏人捣乱，警惕他们挑动红卫兵，挑动群众打人的恶毒阴谋。这样的坏人，通通要捉拿法办！"},{"type":"paragraph","text":"我们红卫兵，最听毛主席的话，最坚决地执行十六条，我们完全有能力在政治上把一切反党反社会主义的黑帮斗倒斗垮斗臭，我们决不要打人，就是反党反社会主义的右派，只要他不动手行凶，也不要打。打人，不能够充分暴露坏人的丑恶面目，不能够真正把他们斗倒、斗垮，不能够彻底孤立他们，不能够彻底肃清他们的影响，只能触及皮肉，不能触及他们的灵魂，不能真正斗倒黑帮，也不利于对部分人教育改造。"},{"type":"paragraph","text":"打人，不利于争取团结广大中间群众，反而引起他们的恐慌，使他们脱离我们，脱离改造，脱离革命。"},{"type":"paragraph","text":"打人，不利于提高广大群众的政治觉悟。"},{"type":"paragraph","text":"有许多坏分子乘机起哄，乱打一通。打伤他们的同志，破坏我们的运动，我们要谨防这一些坏分子从中渔利。"},{"type":"paragraph","text":"我们红卫兵应该谦虚谨慎，讲道理，尊重同志，正确处理人民内部矛盾。绝不能专横跋扈，蛮不讲理，老虎屁股摸不得，草菅人命，把人打死。听到不同意见就暴跳如雷，就动手打人。那样做，是国民党法西斯作风，是恶霸的作风，决不是真正的红卫兵红五类！"},{"type":"paragraph","text":"我们是毛主席最忠实的红卫兵，要最勇敢地捍卫十六条，捍卫党的政策。现在是真正的红卫兵站出来的时候了！"},{"type":"paragraph","text":"四、分清敌我"},{"type":"paragraph","text":"十六条说：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题，也是文化大革命的首要问题。”"},{"type":"paragraph","text":"这个问题在一些单位、一些学校并没有彻底解决。在我们红卫兵战校(原清华附中)，就出现过对前学校的党政干部一律以“黑帮”论处，人人喊打的偏差。十六条中说的干部的四种情况难道不适用吗？当前特别突出的是大量地混淆了有严重错误，但还不是反党反社会主义的右派分子与少量的反党反社会主义的右派分子的界限，即三类干部和四类干部的界限。我们认为，这个问题值得引起所有红卫兵和革命同志的严重注意。我们不但要敢于革命，而且必须善于革命。"},{"type":"paragraph","text":"只有分清敌我，才斗的准，斗得狠。才能真正孤立反党分子，才能真正斗臭、斗倒、斗垮他们。"},{"type":"paragraph","text":"五、左派内部的团结"},{"type":"paragraph","text":"毛主席说：“只有经过共产党的团结，才能达到全阶级和全民族的团结，只有经过全阶级、全民族的团结，才能战胜敌人，完成民族和民主革命的任务。”以红五类子弟为核心和主体的“红卫兵”、“红旗”组织是坚定的革命左派，是文化革命的先锋队，因此，“红卫兵”、“红旗”内部的团结统一是战胜敌人的重要因素。"},{"type":"paragraph","text":"我校“红卫兵”是高度统一的左派组织。我们感到要想达到左派内部的团结必须做到："},{"type":"paragraph","text":"（一）高举毛泽东思想伟大红旗，坚持天天读毛主席著作，以毛泽东思想为统一的基石。"},{"type":"paragraph","text":"（二）内部必须经常开展尖锐的同志式的批评与自我批评，时时注意抵制个人主义、风头主义、个人英雄主义、名利主义、反对无原则和平，把组织生活庸俗化，总之一句话：“斗争即团结。”"},{"type":"paragraph","text":"（三）坚决防止个人突出，加强集体主义教育，发扬革命英雄主义。"},{"type":"paragraph","text":"（四）必须有一个富于批评自我批评精神的领导班子，在原则问题上不让步，枝节问题上不纠缠，提倡互相帮助，互相谅解，共同领导。"},{"type":"paragraph","text":"（五）全体红卫兵战士都必须注意谦虚谨慎，提倡“横眉冷对千夫指，俯首甘为孺子牛”，为人民服务的精神。"},{"type":"paragraph","text":"左派内部有分歧有矛盾这是必然的，没有矛盾没有分岐才是不可思议的。我们认为，为了团结，大家必须努力学好毛主席著作，坚持真理，修正错误，去掉形形色色的个人主义，开展积极的思想斗争。并建议：用疏导的方法消除隔阂加强团结，即不要在枝节问题上争论不休，而是共同确立一个革命目标，在为这个目标奋斗的过程中互相了解，通过团结——批评——团结的过程达到真正的革命的团结。只有左派内部的团结一致才能达到广大革命群众的团结一致，才能把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"必须注重左派内部的团结。"},{"type":"paragraph","text":"六、团结大多数"},{"type":"paragraph","text":"“依靠左派，孤立少数反动右派、争取中间派，团结大多数，经过运动，最后达到团结百分之九十五以上的干部，团结百分之九十五以上的群众”的口号决不是右倾的。"},{"type":"paragraph","text":"对于出身于非红五类家庭的人们，我们根据自己的实践认为他们的大多数经过斗争的考验和痛苦的脱胎换骨的改造是可以团结的，不可笼统地叫作“狗崽子”，团结的目的是为了改造他们。其中少数人，政治表现很好，忠于毛泽东思想和党的阶级路线，也可以吸收他们参加“红卫兵”。前北京市委负责人歪曲了“重在表现”的政策，我们的责任是恢复“重在表现”政策的本来面目并忠实地执行和贯彻到底，决不能把“重在表现”政策一棒打死，因为“重在表现”政策是敬爱的党中央、敬爱的毛主席提出的。我们是：第一有成份论，第二不唯成份论的重在表现论者。第一位第二位的关系决然不可颠倒。"},{"type":"paragraph","text":"工农子弟立场最坚定，阶级感情最鲜明，最朴实。革干子弟政治嗅觉敏锐，闯劲儿最足。两者结合起来互相取长补短，将形成一支不可战胜的力量。这样，修正主义在中国复辟的黄粱美梦就会彻底破产。(注：农指的是贫下中农)"},{"type":"paragraph","text":"七、关于联系群众问题"},{"type":"paragraph","text":"十六条的灵魂是信任群众，依靠群众，尊重群众的首创精神，放手发动群众，由群众自己解放自己。“敢不敢放手发动群众，将决定这场文化大革命的命运。”"},{"type":"paragraph","text":"红卫兵是闯将，是先锋，但红卫兵决不可以脱离广大群众，另搞一套。马克思说，我们要解放自己必须解放全人类。红卫兵必须紧密地联系群众。红卫兵的主要任务是把本校本班的文化大革命搞好，把本校本班的大多数群众教育好团结好，向他们宣传毛泽东思想。红卫兵主要在本校本班的广大群众中生活、斗争，红卫兵要参加大革命，非红卫兵的革命群众也要参加大革命。红卫兵要相信他们，同他们共同研究问题，共同执行任务。"},{"type":"paragraph","text":"各单位之间的革命串联是必要的，但决不能放在压倒一切的地位。有困难的单位我们愿意鼓励那里的革命群众自力更生，不愿意包办代替，也不可能包办代替。有些搞串联的人不相信自己能解放自己，总想依靠外援，这决不是真正的革命者，适合自己的经验不能从外面取经得到，只能从毛泽东思想，从十六条上得到。得到的方法是自己去闯，去造反。有困难，无经验，走弯路是大好事，可以锻炼人。这种锻炼机会是难得的，万万不可放过。"},{"type":"paragraph","text":"我们红卫兵是人民的儿子，人民的勤务员。我们必须带头遵守三大纪律八项注意，对人民不要狂妄自大，不要少爷小姐作风，不要吊儿郎当。对于人民我们永远是谦虚谨慎，恭恭敬敬甘当老黄牛的。"},{"type":"paragraph","text":"八、关于破“四旧”"},{"type":"paragraph","text":"在形式上破“四旧”是比较容易办到的，但在人的灵魂上破“四旧”则是艰巨的，也是最主要的，最本质的。"},{"type":"paragraph","text":"在形式上破“四旧”有一些偏差："},{"type":"paragraph","text":"有人见到辫子长一点就剪，甚至把女同志的头剃光。有人不问青红皂白，谁家都抄，甚至连革命干部家也大闹一场，没有任何阶级性，这是绝大的错误，必须引导起严重注意。有人不许商店出售点心，只许卖窝头。有少数流氓坏分子借破“四旧”之名，大肆进行流氓活动和破坏活动......等等。这些必须制止！"},{"type":"paragraph","text":"流氓坏分子必须坚决镇压！"},{"type":"paragraph","text":"有些重大行动(如取缔民主党派等)应该先动口，让中央、市委知道，在中央、市委的统一具体领导下再动手。不然会给中央工作造成很大的被动。"},{"type":"paragraph","text":"九、关于新市委"},{"type":"paragraph","text":"我们红卫兵战士信任新市委，支持新市委工作。因为新市委是毛主席委派的。我们也相信，新市委不会辜负毛主席的委托。"},{"type":"paragraph","text":"当前，我们热切地希望：新市委更高地举起毛泽东思想伟大红旗，坚决贯彻十六条精神，勇敢地站到无产阶级文化大革命的最前列，大胆地引导革命运动，按照毛主席指引的方向，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"十、红卫兵对十六条的态度"},{"type":"paragraph","text":"“政策和策略是党的生命，各级领导同志务必充分注意，万万不可粗心大意”。"},{"type":"paragraph","text":"十六条就是当前毛主席的最高指示，就是党的政策。我们红卫兵战士必须努力学习、忠实执行、热情宣传、勇敢捍卫十六条。"},{"type":"paragraph","text":"我校及其他学校有的同志，甚至有个别红卫兵战士没有这样做，他们不重视十六条，不按十六条办事，甚至有的说十六条是框框，执行十六条是右倾路线。这统统是谬论。什么框框？！没有十六条，文化革命就不能取得胜利。正是十六条扭转了文化大革命的一些错误方向，使革命重新蓬蓬勃勃地开展起来。广泛深入地学习十六条，按十六条精神办事，是红卫兵的首要任务，是衡量真红卫兵和伪红卫兵的分水岭。"},{"type":"paragraph","text":"红卫兵战士们，你是否拼命地努力学习十六条了，你是否忠实执行十六条了，而丝毫不改变它的本来面貌；你是否最热情地宣传十六条了，使十六条家喻户晓，深入人心；你是否勇敢捍卫十六条了，而在一些错误认识面前丝毫不动摇呢？"},{"type":"paragraph","text":"我们相信，全体红卫兵战士们都会这样做的，这是我们的天职，因为我们是毛主席最忠实、最最勇敢的红卫兵。"},{"type":"paragraph","text":"无产阶级革命造反精神万岁！"},{"type":"paragraph","text":"毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"“西纠”发出第三号通令规定：任何组织和个人都无权随便戒严，“尤其不允许拦截和检查首长的汽车！绝不允许以任何理由拦截军车！”“绝不允许任何人擅自查抄国家机关、查抄国家负责干部的家！我们要保卫国家机密！保卫革命老首长的安全！”并规定：“各商店现存的实用商品，若其商标不是反动的，不是黄色的，就可以继续出售，任何人都不要进行阻止，不要让坏人乘机捣乱，破坏国家财产。”还特别指出：“严禁围追外宾、归国观光的华侨和港澳同胞，必须保证他们的安全和正当活动。”8月27日—9月1日"},{"type":"paragraph","text":"红卫兵在北京大兴县公安局配合下，大肆惨杀“四类分子”。"},{"type":"paragraph","text":"《文化大革命十年史》：谢富治讲话之后，以中学红卫兵为主体，在北京开始了以批斗“地、富、反、坏、右”五类分子为名的打人浪潮。大兴县三百多名“四类分子”被杀害，便是其中最典型的例证。八月二十六日，大兴县公安系统传达了谢富治的讲话，派出所的民警闻风而动。他们向红卫兵提供了管辖区域内“四类分子”的情况，并以这些“四类分子”的“不法行为”激励红卫兵对他们的仇恨。八月二十七日，红卫兵将个别所谓“表现不好”的“四类分子”拉出来斗打，把人打死后，红卫兵还觉得没有捕捉到对手的“变天账”，于是义愤便转移到其他“四类分子”及有一般问题的人，以及他们的家属身上。有的还拍电报、写信，催促在外工作的家属返回原籍，以便满门抄斩。从八月二十七日至九月一日，大兴县十三个公社、四十八个大队，先后杀害“四类分子”及其家属三百二十五人，最大的八十岁，最小的出生才三十八天，有二十二户人家被杀绝。若不是北京市委书记马力亲自到县里制止这惨绝人寰的恶性事件，事态还会继续发展。(68页)"},{"type":"paragraph","text":"大兴“八三一”事件"},{"type":"paragraph","text":"孙言诚如果说城市打杀的还是资本家、小业主之类的杂牌，那么郊县清理的则是地道的“黑五类”。因此，“红色恐怖”在郊县上了一个新台阶。从8月27日到9月初，郊县掀起打杀“黑五类”分子的狂潮，最严重的是昌平县和大兴县。8月27日，昌平县公安系统传达谢富治前一天在北京市公安局扩大会议上的讲话，强调“民警要站在红卫兵一边”，要“把‘黑五类’分子的情况介绍给他们”。.有的民警就向红卫兵组织介绍了当地“黑五类”分子的情况，同时也讲了谢“打死人我们根本管不着”的讲话精神。于是昌平县开始行动了，由最初的打杀“表现不好”的“黑五类”分子，发展到消灭一般的“黑五类”分子，直至乱杀家属。十几天时间，全县24个公社就有14个公社打死人，总共打死327人。骇人听闻的事情发生在中越公社和黑山寨公社。"},{"type":"paragraph","text":"8月27日，中越公社派出所负责人召集公社副主任、武装部副部长、派出所民警和红卫兵负责人开会，布置“扫四旧”。会上宣读并印发了西城纠察队“以血偿血、以命抵命”的传单，决定全公社统一行动。当晚，燕丹砖厂声言有人搞反革命暴动，打死4人。派出所负责人赶赴现场表示支持，并说：“现在公安局打破旧框框，群众说了算，群众要怎么办就怎么办。”"},{"type":"paragraph","text":"28日、30日，公社两次召开电话会议，逐村公布打死人的数字，宣称“‘破四旧’进展顺利，打死‘黑五类’大快人心”。回龙观行动不力，会上受了批评，于是连夜打死30余人。到９月６日为止，全公社共打死144人。"},{"type":"paragraph","text":"闻听中越公社打杀“黑五类”，黑山寨公社公安员分别到黑山寨、辛庄两村和黑山寨中学游说，说“红卫兵打坏人没事”，“中越公社一个砖厂一夜就打死十几个人。”８月29日晚，黑山寨大队在中学操场打死“四类”分子2人。有教师问：“这样做符合政策吗？”公安员答：“怎么不符合？对地富可以武斗，这就是当前的政策。”同一天，经公安员批准，辛庄大队打死9人。随后打杀之风蔓延到望宝川、南庄、北庄等大队。打杀中提出了“斩草除根，留女不留男”的口号，因此几个月大的男婴也被打死，妇女则被逼改嫁他乡。到9月4日止，全公社共打死67人，其中未成年的孩子18人。"},{"type":"paragraph","text":"大兴县的打杀也是从传达谢富治的讲话开始的。县公安局根据讲话精神和市局“支持红卫兵，保卫红卫兵”的指示，在局务会议上决定，由治安科副科长张某负责联系红卫兵。"},{"type":"paragraph","text":"8月26日下午，张某在县公安局召开会议，参加者有河北农大园林化分校（简称林校）、黄村中学的红卫兵负责人和黄村镇镇长、黄村派出所民警等共九人。会上张某介绍了27家“四类”分子的情况，并分析了人都在家怎么办，家里没人怎么办，家里有人外边还有人怎么办。成立了指挥部（设在黄村派出所），划分了战斗组。具体分工是：黄村中学包一、二、三街和高米店，林校包二、三、四街，定于27日下午3点统一行动。红卫兵问：“如果被抄户有东西弄不出来，打他行不行？”张说：“在气愤之下，打两下也没什么。”又问：“打死怎么办？”答：“打死就打死吧！”"},{"type":"paragraph","text":"8月27日下午，黄村开始“破四旧”，当天就打死2人。"},{"type":"paragraph","text":"同一天，黄村派出所指导员和公社武装部干部联合召开黄村公社各大队治保主任、民兵连长会议，指导员在会上说：“‘四类’分子不老实，打死就埋。要狠批、狠斗、狠打，打死也就打死了，先下手为强。”29日，黄村公社“文革”小组组织四个大队的红卫兵去李庄子大队打杀“四类”分子，公社管委会主任则亲自去东磁各庄大队点火。"},{"type":"paragraph","text":"杀人风也蔓延到芦城和天堂河公社。仅天堂河公社新立村大队就打死了53人。"},{"type":"paragraph","text":"到8月29日为止，黄村、芦城、天堂河三个公社共有14个大队打死人。"},{"type":"paragraph","text":"8月30日，天堂河公社马村大队治保主任又将全队“四类”分子及子女100多人集中关起来，设男老、男壮、妇女、儿童四个监狱。大队书记李恩元率十几人在大队部审问，随提随审，随杀随埋，一条龙行事。夜里11点，县委书记王振元赶到马村，在一小队猪场劝阻杀人，李恩元等根本不听，王回县委，在请示了市委之后，又带十几名干部赶赴马村。"},{"type":"paragraph","text":"马村的民兵在村外布了三道防线，严禁外人进村。县委的人9月1日凌晨1点赶到，冲了3次，到晚上八九点钟才冲到村口第三道防线前。王振元厉声喊：“你们不让我们进村，就先杀了我这个县委书记吧！”民兵经过请示，这才允许他们排队进村。同行的张连和这样记述："},{"type":"paragraph","text":"“全村被白色恐怖笼罩着，鸡犬无声。刑场设在大街西头路北的一家院子里。......我们排队进院时，看见活人被捆绑跪着，死人横躺竖卧，鲜血染地，惨不忍睹。有两辆小推车往外运尸体......两个人抬起一个被打死的人装在小推车上，还没有推出门又活了，一挣扎掉在地上，一个人上去狠拍两铁锨，又装在车上运走了。”"},{"type":"paragraph","text":"王振元劝李恩元停杀，李把杀猪刀往桌子上一拍，道：“不叫杀了，他们反过来杀我们贫下中农怎么办？”据吴德讲，最后还是市委派秘书长马力和卫戍区政委刘绍文、张益三去，才止住了马村的屠杀。结果是杀了34人，救出108人。"},{"type":"paragraph","text":"动手最晚但杀人却最多的是大辛庄公社。8月29日大辛庄公社“文革”组长胡福德到黄村串联，30日他搭乘县公安局张某的车回公社。路上胡问张：“打死这些人怎么办？”张答：“打死一个往市局报一个，市局也没有回信。”到公社吃午饭时，张某对公社干部说：“你们还等什么？等外援呢！”胡福德遂与“文革”副组长高福兴研究，决定当晚召开全公社17个大队主要干部参加的秘密会议。"},{"type":"paragraph","text":"会议由9人小组主持，胡、高之外还有公社副书记李自永、李冠清等。公社正书记贺云喜因为是地富出身，被9人小组关押着，也险些遭杀。会上制定了杀“四类”分子的计划，胡当场宣布：31日夜间10点半统一行动，是“拔尖子”还是“一扫光”，由各大队自己决定。最后要求与会者宣誓：严守秘密，不做叛徒。"},{"type":"paragraph","text":"31日夜，全公社有9个大队杀了人，公社所在地的黎明、中心、新生、宏升四个大队同时行动。高福兴亲临杀人现场督战，批评宏升杀得少（杀2人），表扬黎明杀得多（杀11户、56人）。是夜全公社共杀死110人。"},{"type":"paragraph","text":"从29日到31日，大兴共杀死324人（男232，女92）。被杀者，最大80岁，最小的才38天。杀死“四类”分子175人，家属子女137人，其他12人。涉及171户，有22户被杀绝。由于31日杀人最多，故后人称之为大兴“八三一事件”。"},{"type":"paragraph","text":"9月1日市委秘书长马力向全县做了广播讲话，市、县又向杀人的社队派了工作组，事态才基本上得到控制。"},{"type":"paragraph","text":"正是昌平和大兴的滥杀无辜，震动了北京市委和中央，“红八月”的恐怖活动才得以式微。9月2日，市委下达“紧急通知”，要求“用最大的努力耐心说服和坚决制止一切打死人的现象。”9月5日，《人民日报》发表社论：《用文斗，不用武斗》。此后虽然还有打死人的事，但大规模的打杀风总算遏制住了。"},{"type":"paragraph","text":"（原载《炎黄春秋》2012年第二期）8月28日"},{"type":"paragraph","text":"公安部党组拟定《关于无产阶级文化大革命中公安机关和群众关系的四个问题》呈报中央。中央在九月二日批示同意。"},{"type":"paragraph","text":"关于无产阶级文化大革命中公安机关和群众关系的四个问题主席、中央："},{"type":"paragraph","text":"最近一些公安机关报告，有些学生和群众到监狱和劳改工厂、农场斗争、惩罚犯人；相当多的地方打了民警和派出所，其中有一些是地、富、反、坏、右分子和受过各种处罚的人，乘机进攻派出所；不少地方，学生和群众要公安机关公开机密，也有个别公安人员向群众公布了机密材料。"},{"type":"paragraph","text":"广大革命学生和群众起来闹革命，勇敢地同走资本主义道路的当权派作斗争，横扫一切牛鬼蛇神，是件大好事。公安机关一定要最热烈最坚决地支持他们的革命行动。为了使公安机关能够正常地执行职务，做好文化大革命的保卫工作，以利于充分放手发动群众，把这场伟大的革命搞深搞透，对以上问题，需要作妥善处理："},{"type":"paragraph","text":"一、有些学生和群众要到公安机关斗黑帮分子，要向他们说明，这种革命热情我们热烈欢迎。请他们相信公安机关的革命派，一定能把内部的黑帮分子斗倒、斗垮、斗臭。我们欢迎群众对公安机关和公安干部送大字报，提意见，但不要进入公安机关，不要打派出所，以免被五类分子和坏人利用，对保卫文化大革命不利。"},{"type":"paragraph","text":"二、公安机关的机密，是国家机密的一部分，不能向群众公布。"},{"type":"paragraph","text":"三、革命群众要求到监狱、看守所、劳改队去斗争、惩罚犯人，这种革命热情是可以理解的。为了不致使犯人乘机逃跑、暴乱，欢迎群众向我们提供材料，由专政机关来惩罚犯人。"},{"type":"paragraph","text":"四、公安机关确有许多不合理的规章制度，需要改革，凡涉及全国范围，需要统筹研究，或一时难以办到的，各级公安机关、公安人员可向中央提出建议，但不要互相发呼吁，特别是不向群众发呼吁。"},{"type":"paragraph","text":"以上报告，如有不妥，请批转各级党委。"},{"type":"paragraph","text":"公安部党组"},{"type":"paragraph","text":"一九六六年八月二十八日"},{"type":"paragraph","text":"广州黄花岗七十二烈士墓碑上的自由神被砸毁。"},{"type":"paragraph","text":"[按]中共对孙中山领导的革命，向来贬之为“资产阶级革命”。尤其对蒋介石、国民党，向来视为不共戴天的敌人。除可以被他利用的高层的统战对象外，其余军政人员一概以“反革命”处之。八年抗战中，蒋介石领导的国民政府军在主战场独力进行了22次会战，官兵以血肉之躯抵御强敌。各地由国民政府为抗日阵亡将士建立的忠烈祠、烈士公墓、陵园等，在49年政权更迭后，中共罔顾民族大义，对此一律不予承认，阵亡将士遗属也以“反革命家属”对待，备受歧视、迫害。文革起，各地抗日将士陵园均遭破坏，坟墓被掘开，抛尸扬灰，使这些在亡国灭种的大难中浴血奋战，为国捐躯的忠骸暴尸荒野，死无葬身之地！"},{"type":"paragraph","text":"由公安人员和红卫兵押送，八名外国修女被赶出中国国境。与此同时，北京的各种宗教设施也都受到冲击，一批宗教人士被勒令还俗。"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"8月24日，十几个中学的红卫兵，在中央文革和公安机关的直接支持下，冲进设立在东单三条的圣玛利亚方济格修女会，提出驱逐“披着宗教外衣从事间谍活动的”罗马修女。8月26日，北京市政府当众宣布取缔圣玛利亚方济格修女会。8月28日，北京市公安局当众宣布驱逐令，立即执行。当夜，有组织的群众在修女会院内外开会控诉这个修女会的罪行。8月28日至9月20日"},{"type":"paragraph","text":"刚果议会代表团来华访问。8月29日"},{"type":"paragraph","text":"《人民日报》发表社论《向我们的红卫兵致敬》，火上加油，赞扬正在泛滥而不可收拾的乱揪乱斗、抄家劫舍等暴行。"},{"type":"paragraph","text":"就8月23日周恩来送审的十条，毛泽东不同意批发，他在政治局常委扩大会议上说：“一条也不要，何必十条。有十六条嘛。”"},{"type":"paragraph","text":"《人民日报》社论：《向我们的红卫兵致敬！》"},{"type":"paragraph","text":"任何大革命运动，都必然是群众的革命运动。没有群众起来，敢说，敢干，敢闯，就不可能有什么大革命。无产阶级文化大革命，必然也是这样。"},{"type":"paragraph","text":"文化大革命，就是要大破资产阶级和一切剥削阶级的旧思想、旧文化、旧风俗、旧习惯，大立无产阶级、社会主义的新思想、新文化、新风俗、新习惯。如果没有广大人民群众卷进这个运动，就不可能大破，也不可能大立。"},{"type":"paragraph","text":"照一般的历史情况看，文化革命，总是政治革命、经济革命的先导。我国无产阶级文化大革命的发展，不可能不触及到政治，不可能不触及到经济，实际上已经触及了。"},{"type":"paragraph","text":"文化大革命不能只是少数的人事情，不能只是批判几个资产阶级学者“权威”的事情，不能只是批判几个资产阶级代表人物的事情。文化大革命的规律，完全冲破了这些框框。"},{"type":"paragraph","text":"无产阶级文化大革命，成为广大群众的革命运动。这是文化革命开始取得胜利的重大新标志。"},{"type":"paragraph","text":"红卫兵充当了文化革命这个群众运动冲锋陷阵的急先锋。"},{"type":"paragraph","text":"我们向英雄的红卫兵欢呼，向我们的红卫兵致敬！"},{"type":"paragraph","text":"红卫兵上阵以来，时间并不久，但是，他们真正地把整个社会震动了，把旧世界震动了。他们的斗争锋芒，所向披靡。一切剥削阶级的旧风俗、旧习惯，都像垃圾一样，被他们扫地出门。一切藏在暗角里的老寄生虫，都逃不出红卫兵锐利的眼睛。"},{"type":"paragraph","text":"这些吸血虫，这些人民的仇敌，正在一个一个地被红卫兵揪了出来。他们隐藏的金银财宝，被红卫兵拿出来展览了。他们隐藏的各种变开账，各种杀人武器，也被红卫兵拿出来示众了。这是我们的红卫兵的功勋。"},{"type":"paragraph","text":"红卫兵的行动，真是好得很！"},{"type":"paragraph","text":"毛主席早在全国胜利前夕指出：“中国人民将会看见，中国的命运一经操在人民自己的手里，中国就将如太阳升起在东方那样，以自己的辉煌的光焰普照大地，迅速地荡涤反动政府留下来的污泥浊水，治好战争的创伤，建设起一个崭新的强盛的名副其实的人民共和国。”我们这场无产阶级文化大革命，恰恰进一步地证明了毛主席的伟大预见。"},{"type":"paragraph","text":"现在正在进行的，以毛泽东思想为伟大旗帜的，以红卫兵为急先锋的这场无产阶级文化大革命，不但必将从根本上改变我们整个社会的精神面貌，而且必将大大改善我们的无产阶级专政，大大巩固我们的无产阶级专政，革新我们的社会主义制度，扫除资产阶级在社会上还存在着的一些威风，进一步清算资本主义的剥削制度。"},{"type":"paragraph","text":"当然，红卫兵随时需要在斗争中学习，学会文斗，学会思考。"},{"type":"paragraph","text":"最根本的问题是，大家需要在斗争中进一步学会毛泽东思想，掌握毛泽东思想，运用毛泽东思想，把自己锻炼成为顶天立地、掌握革命本领的无产阶级革命者，成为毛主席的好学生，好战士。"},{"type":"paragraph","text":"英雄的红卫兵万岁！"},{"type":"paragraph","text":"我们伟大的导师，伟大的领袖，伟大的统帅，伟大的舵手毛主席万岁！"},{"type":"paragraph","text":"谢富治接见政法学院学生，支持造反行动。8月30日"},{"type":"paragraph","text":"中共中央通知：“陈伯达同志因病经中央批准休息。在陈伯达同志病假期间或今后离京外出工作期间，他所担任的中央文化革命小组组长职务，由第一副组长江青同志代理。”"},{"type":"paragraph","text":"担任人大常委、政协常委的毛泽东旧友章士钊家在29日晚被北大经济系红卫兵所抄①。章写信给毛泽东，反映情况，要求在“可能范围内稍稍转圜一下，当有解铃之望。”毛批示：“送总理酌处，应当予以保护。”周恩来随即对章采取有效的保护措施，并在本日新列应予保护人员名单，报毛泽东批准。"},{"type":"paragraph","text":"周恩来所拟应予保护的人员名单："},{"type":"paragraph","text":"宋庆龄"},{"type":"paragraph","text":"郭沫若"},{"type":"paragraph","text":"章土钊"},{"type":"paragraph","text":"程潜"},{"type":"paragraph","text":"何香凝"},{"type":"paragraph","text":"傅作义"},{"type":"paragraph","text":"张治中"},{"type":"paragraph","text":"邵力子"},{"type":"paragraph","text":"蒋光鼐①章的养女章含之当时的丈夫是北大经济系教师洪君彦，故招北大经济系红卫兵抄家。"},{"type":"paragraph","text":"蔡廷锴"},{"type":"paragraph","text":"沙千里"},{"type":"paragraph","text":"张奚若以及"},{"type":"paragraph","text":"(1)副委员长、人大常委、副主席"},{"type":"paragraph","text":"(2)部长、副部长"},{"type":"paragraph","text":"(3)政副"},{"type":"paragraph","text":"(4)国副"},{"type":"paragraph","text":"(5)各民主党派负责人"},{"type":"paragraph","text":"(6)两高"},{"type":"paragraph","text":"(李宗仁)(注)：政副系指中国人民政治协商会议全国委员会副主席；国副指国务院副总理。两高指最高人民法院与最高人民检察院。周恩来接见科学院对立两派双方代表时说："},{"type":"paragraph","text":"瞿秋白出身大官僚资产阶级，晚年写了一篇《多余的话》，表现不好，晚年叛变了。"},{"type":"paragraph","text":"我在政治局作了个报告，还没发表，被红卫兵知道了，就去八宝山公墓把墓碑给砸了。"},{"type":"paragraph","text":"红卫兵把大教授家抄了，没收许多钱物，也不给人家条子。还勒令民主党派负责人"},{"type":"paragraph","text":"把工资的40—60%上缴。“乱要乱出道理，乱出规律来，要符合无产阶级政策。”吴德在北京大专院校各文革组织代表会议上讲话，赞扬红卫兵的革命行动，发生一些问题和错误是难免的。他提出要文斗，不要武斗；正确对待不同矛盾，区分敌我；保护国家要害部分；团结大多数。他特别强调不要武斗，希望红卫兵讨论。外语学院传达陈毅讲话说：“北京目前打的风气很浓，不能提倡”。“红卫兵中有些东西是封建的东西，如骂人狗崽子”‚“抄家没收一定要经过手续”‚“无论如何不能排外”‚“运动愈是搞得深入愈是要讲政策”‚“偏差要及时纠正”‚“对工作组也要一分为二，不能揪住不放”。清华大学赴上海的“送瘟神”战斗队在上海市委大厦门前贴出了《给上海市委一记响亮的耳光》的大字报，对当时仍处于相对沉静的上海带来爆炸性的影响。"},{"type":"paragraph","text":"茅盾家被抄。8月31日"},{"type":"paragraph","text":"毛泽东第二次接见全国来京的红卫兵。林彪、周恩来在会上发表讲话。林彪在讲话中第一次在公开场合使用了“四个伟大”的副词。热烈赞扬各地红卫兵“敢想、敢说、敢干、敢闯”，“干了大量的好事”。周恩来在讲话中宣布中央决定：“全国各地大学生的全部和中学生的一部分代表”，可分期分批来北京串连。他们的讲话都事先经毛审阅。"},{"type":"paragraph","text":"林彪在接见外地来京革命师生大会上的讲话同志们，同学们，红卫兵战士们："},{"type":"paragraph","text":"我代表我们伟大的导师，伟大的领袖，伟大的统帅，伟大的舵手毛主席，向各地来的同学问好，向大家问好！我代表党中央向大家问好！"},{"type":"paragraph","text":"同学们，你们来到北京，同北京的革命师生交流了文化大革命的经验。你们辛苦了！我们相信，你们回去以后，一定会更好地按照毛主席的指示，按照党中央的十六条，冲破一切阻力，克服各种困难，把无产阶级文化大革命更加轰轰烈烈地开展起来！"},{"type":"paragraph","text":"当前无产阶级文化大革命的形势，好得很！"},{"type":"paragraph","text":"红卫兵和其他青少年的革命组织，像雨后春笋一样地发展起来。他们走上街头，横扫“四旧”。文化大革命，已经触及到政治，触及到经济。学校的斗、批、改，发展到社会的斗、批、改。群众的革命洪流，正在荡涤着旧社会遗留下来的一切污泥浊水，改变着我国整个社会面貌。"},{"type":"paragraph","text":"革命的小将们，毛主席和党中央热烈赞扬你们敢想，敢说，敢干，敢闯，敢革命的无产阶级革命精神。你们干了大量的好事，你们提出了大量的好倡议。我们十分高兴，我们热烈支持你们！坚决反对压制你们！你们的革命行动好得很！我们向你们欢呼，向你们致敬！"},{"type":"paragraph","text":"同志们，同学们！"},{"type":"paragraph","text":"我们一定要按照毛主席的教导，敢于斗争，敢于革命，善于斗争，善于革命。我们要用毛泽东思想做为无产阶级文化大革命的指南，认真地、全面地、彻底地、不折不扣地贯彻执行十六条。"},{"type":"paragraph","text":"我们一定要按照毛主席的教导，分清谁是我们的敌人，谁是我们的朋友。要注意团结大多数，集中力量打击一小撮资产阶级右派分子。打击的重点，是钻进党内走资本主义道路的当权派。一定要掌握这个斗争的大方向。"},{"type":"paragraph","text":"我们一定要按照毛主席的教导，要用文斗，不用武斗。不要动手打人。斗争那些走资本主义道路的当权派，斗争那些地、富、反、坏、右分子，也是这样。武斗只能触及皮肉，文斗才能触其灵魂。只有文斗，进行充分揭露，深刻批判，才能彻底暴露他们的反革命面貌，把他们最大限度地孤立起来，斗臭，斗垮，斗倒。"},{"type":"paragraph","text":"各大中学校的红卫兵和其他革命的青少年组织，是文化大革命的急先锋，是人民解放军的强大后备力量。"},{"type":"paragraph","text":"同学们，红卫兵战士们，你们要永远忠于党，忠于人民，忠于毛主席，忠于毛泽东思想。要努力活学活用毛主席著作，在用字上狠下功夫。要全心全意为人民服务，密切地联系群众，模范地执行党的政策，维护人民利益，爱护国家财产，遵守三大纪律八项注意。"},{"type":"paragraph","text":"同学们，只要我们认真地读毛主席的书，听毛主席的话，照毛主席的指示办事，无产阶级文化大革命一定能够取得伟大的胜利！让帝国主义、现代修正主义和一切反动派在我们的胜利面前发抖吧！"},{"type":"paragraph","text":"无产阶级文化大革命万岁！"},{"type":"paragraph","text":"中国共产党万岁！"},{"type":"paragraph","text":"伟大的领袖毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"周恩来在接见外地来京革命师生大会上的讲话同志们！同学们！"},{"type":"paragraph","text":"你们好！"},{"type":"paragraph","text":"你们从祖国各地，来到无产阶级文化大革命的中心，来到人民的首都北京，我们表示热烈的欢迎。"},{"type":"paragraph","text":"北京是毛主席居住的地方。我们伟大的领袖毛主席是无产阶级文化大革命的伟大统帅。毛主席是我们伟大的导师，伟大的舵手，是我们心中的红太阳。"},{"type":"paragraph","text":"无产阶级文化大革命是毛主席亲自发动的。毛主席同群众心连着心，无限地信任群众，支持群众的首创精神。全国革命人民热烈响应毛主席的号召，掀起了轰轰烈烈的文化大革命的高潮。"},{"type":"paragraph","text":"毛主席亲自主持制定的《关于无产阶级文化大革命的决定》，是无产阶级文化大革命的纲领。这个文件告诉我们，必须让群众自己教育自己，自己解放自己，自己起来闹革命。我们必须把这个决定，当做我们进行无产阶级文化大革命的战斗武器，做为我们的行动指南。一切革命同志，都应该认真地反复地学习它，熟悉它，掌握它，运用它。"},{"type":"paragraph","text":"现在，无产阶级文化大革命开始了新的高潮。全国各地的青少年组织了红卫兵和别的革命组织，这是一项伟大的革命创举。我们的红卫兵小将们，破“四旧”，立“四新”，充当了无产阶级文化大革命冲锋陷阵的急先锋。你们那种敢想、敢说、敢做、敢闯、敢于革命、敢于造反的精神，得到了全国广大工农兵和革命干部的热烈支持。我们向英雄的红卫兵欢呼！向我们的红卫兵致敬！向革命的青少年致敬！"},{"type":"paragraph","text":"我们的红卫兵是以解放军为榜样建立起来的。大学解放军，是红卫兵的战斗口号。要像解放军那样，高举毛泽东思想的伟大红旗，读毛主席的书，听毛主席的话，照毛主席的指示办事，活学活用毛主席的著作；永远做毛主席的好学生、好战士；永远忠于党，忠于人民，忠于毛主席，忠于毛泽东思想。要像解放军那样全心全意为人民服务，密切联系群众，执行群众路线，永远做人民忠实的勤务员。要学习解放军的三八作风，遵守三大纪律八项注意，保护群众利益，保卫国家财产，造成良好的社会主义的新风气。红卫兵要建设成为一支具有高度政治觉悟和高度组织性纪律性的战斗队伍，成为解放军的可靠的后备军。"},{"type":"paragraph","text":"我们要敢于斗争，善于斗争。时刻都要注意运用阶级分析的方法，注意发展进步力量，争取中间力量，团结大多数，集中力量打击一小撮资产阶级右派分子。在斗争中，要用文斗，不要武斗。文斗，才能教育群众，才能最有效地斗垮敌人。我们的红卫兵，一定能够在斗争中成长起来，成为智勇双全的闯将。"},{"type":"paragraph","text":"现在，全国各地的同学到北京来交流经验，北京同学也到各地去进行革命串连。我们认为，这是一种很好的事情，我们支持你们。中央决定，全国各地大学生的全部和中学生的一部分代表，分期分批到北京来。本地的学生，和外来的学生，要在共同搞好文化大革命的原则基础上，加强革命的团结。有问题，有不同意见，要用调查研究、平等协商的方法来解决。大家都知道，各地方各单位的文化大革命，都要依靠本地本单位的群众自己动手来干，才能真正搞得好，搞得彻底。我们相信，全国大串连的革命行动，一定能够有力地推动无产阶级文化大革命深入发展。"},{"type":"paragraph","text":"同志们！同学们！"},{"type":"paragraph","text":"革命是一件不容易的事，要取得胜利，必须战胜一切阻力，克服一切困难。我们相信你们一定能够高举毛泽东思想伟大红旗，掌握和运用毛主席亲自主持制定的十六条，同广大的工农兵在一起，同广大的革命群众在一起，依靠自己的力量，克服各种阻力，战胜一切困难，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"伟大的无产阶级文化大革命万岁！"},{"type":"paragraph","text":"伟大的无产阶级专政万岁！"},{"type":"paragraph","text":"伟大的中国共产党万岁！"},{"type":"paragraph","text":"伟大的战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"我们伟大的领袖毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"红卫兵从赤色崇拜出发，强令改变交通讯号红灯停止，绿灯放行为红灯放行，绿灯停止。造成大量交通事故，在周恩来的亲自干预下，始放弃这一“改革”。"},{"type":"paragraph","text":"福州军区第一政委、福建省委第一书记叶飞在北京赴福建串连学生座谈会上说：地方提出“保卫省委”、“保卫院党委”是极端错误的反革命口号。"},{"type":"paragraph","text":"河南省委候补书记纪登奎在接见开封师院师生代表时说：院党委领导文化革命委员会“这句话是错误的”，文革会有权审查各级党组织，院党委成员应一律接受群众的批评审查。“保卫院党委”、“保卫某书记”是资产阶级反动口号。9月1日"},{"type":"paragraph","text":"周恩来在人民大会堂召开的北京红卫兵第一次座谈会上讲话，提出分清敌我，团结大多数，坚持文斗，反对武斗，保卫国家要害部门等政策问题。他说，红卫兵要讲政策，要团结大多数。“不是对一般地、富、反、坏、右都打击。”“右派分子已经摘了帽子的不能算右派”。“资产阶级，我们批判的是资产阶级思想体系，如果他们守法，就不要打倒。因为他没有做破坏工作。搜查、抄家就是打倒了。取消定息是个好建议，但要经中央讨论，主席批准，人大通过。”对知名人士，如果打、搜查就是法律制裁的问题了。天安门10月1日挂孙中山的像，是毛主席决定的。宋庆龄是孙中山的夫人。孙中山的功绩，毛主席在北京解放后写的一篇重要文章《论人民民主专政》中就肯定了的。他的功绩也记在人民英雄纪念碑上。南京的同学一定要毁掉孙中山的铜像，我们决不赞成。每年5·1、10·1在天安门对面放孙中山的像是毛主席决定的。孙中山是资产阶级革命家，他有功绩，也有缺点。他的夫人自从与我们合作以后，从来没有向蒋介石低过头。大革命失败后她到了外国，营救过我们党地下工作的同志。抗日战争时期与我们合作，解放战争时期也同情我们。她和共产党的长期合作是始终如一的。我们应当尊重她。她年纪很大了。今年还要纪念孙中山诞辰一百周年。她出面写文章，在国际上影响很大。到她家贴大字报不合适。她兄弟三人姐妹三人，就出了她一个革命的。不能因为她妹妹是蒋介石的妻子就要打倒她。她的房子是国家拨给的。有人说：我敢说敢闯，就要去。这是不对的。我们无论如何要劝阻。他批评戴高帽的作法，有的竟重二十斤。他要求提倡文斗。(《传信录103》)"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"宋庆龄虽有幸被特别保护而能在红色风暴中过关，但她由于敢于独身对毛的那一套左而又左的所谓革命路线质疑而不愿合作，因此，实际上在文革中的处境是日益见忌于毛的。文革初起，毛曾派江青专访，解释发动文化大革命的必要，宋不以为然，且指责红卫兵的暴行，会面不欢而散，开罪于江青。"},{"type":"paragraph","text":"94年11月，中共中央书记处审查通过了党史编委会整理的关于宋庆龄建国后32年经历的材料，兹摘要如下："},{"type":"paragraph","text":"宋1950年3月给党中央写信要求入党，52年10月再次给毛泽东写信提出要求。毛对宋说：“你在政治上完全够格，在革命战争的岁月，实际已是党的优秀领导者之一。今后还有许多工作需要你做。有些事我们做不好，你做合适。我在党内说了：党的高级干部还要向你学习，学习你的革命坚定性，对新中国革命的贡献，你的作用比李济深、沈老还要大。所以还是留在党外好。”"},{"type":"paragraph","text":"55年11月，宋给毛写信：“我很不理解提出对工商业的改造，共产党曾向工商业界许下长期共存、保障工商业者利益的诺言。这样一来，不是变成自食其言了吗？资本家已经对共产党的政策产生了怀疑和恐惧，不少人后悔和抱怨。”"},{"type":"paragraph","text":"毛批示：“宋副委员长有意见，要代表资本家讲话。”"},{"type":"paragraph","text":"57年宋又写信给党中央：“党中央号召大鸣大放，怎么又收了？共产党不怕国民党八百万大军，不怕美帝国主义，怎么会担心人民推翻党的领导和人民政府？共产党要敢于接受各界人士的批评，批评人士大多是爱国爱党的，一些民主党派人士为新中国的解放，作出了家庭、个人名利的牺牲，一些二三十岁的青年知识分子怎么可能一天就变成反党反社会主义分子？我很不理解这个运动，我想了两个多月，还是想不通，有这么多党内党外纯粹的人会站在共产党和人民政府的对立面？要推翻共产党？”"},{"type":"paragraph","text":"从58年起，宋曾推病拒绝参加人大常委会。党中央委派刘少奇、周恩来、董必武去作工作，宋只得继续参加。"},{"type":"paragraph","text":"59年4月，宋在人大被推举为国家副主席。宋先后两次推辞：“我是落伍了，思想跟不上，挂个名，作个样子，对国家不利。”提议由李富春或乌兰夫担任。"},{"type":"paragraph","text":"宋任国家副主席，是刘少奇、董必武、林伯渠、李富春提议的，政治局讨论时，21人中18人赞成，三人反对，反对者是：毛、林彪、康生。当时毛发言：“宋是我们民主革命时期的同路人，在社会主义革命时期，她和我们就走不到一起了。从不赞成我们的方针路线到反对我们的方针路线。我们同她是不同的阶级。”"},{"type":"paragraph","text":"“文革”期间，宋先后给毛和党中央写了七封信，表达了她对“文革”的不理解、反感，并对共产党极度失望。67年8月、69年11月、76年6月，宋曾三次产生厌世思想，在信中以及对来探望她的领导人的谈话中流露出对自己所选择的道路感到怅惘和说不出的苦闷。七封信中说：“我不懂文化，说小说都是政治，而且都是毒草，我糊涂了，一夜天下来，一些和我一起工作的同事都变成了走资派、反党集团、野心家、牛鬼蛇神。中央要我学习批判揭发刘少奇，我不会作的。刘少奇主席在党中央工作了三四十年，今天会是叛徒、内奸!我不相信，一个叛徒内奸当了七年的国家主席，现在宪法还有效吗？怎么可以乱抓人、乱斗人、逼死人？党中央要出来讲话。这种无法无天的情况，自己伤害自己的同志、人民，是罪行。我们的优秀干部从与国民党的战斗中走过来，却死在自己的队伍中，这是什么原因？”"},{"type":"paragraph","text":"70年3月，毛对周恩来说：“她不愿看到今天的变化，可以到海峡对岸，可以去香港、去外国，我不挽留。”并指示周恩来、李先念把他的话传达给宋。传达时他们说：“主席很关心你，知道你的心情不怎么好，建议你到外面散散心，休息休息。”宋说：“是否嫌我还在？我的一生还是要在这块土地上，走完最后几步。”于是宋推病拒绝出席一些节日活动和招待会，说“我参加会伤感，还是不参加，参加一次，回来就要进医院。另外，我也不想作政治上的点缀。”"},{"type":"paragraph","text":"80年11月，宋给党中央写了她一生中最后的一封信：“一、国家要振兴恢复元气，这是一次大好时机，二、要总结建国以来政治运动对国家对人民造成的创伤，三、请不要把我和国父放在一起，我不够格的。”"},{"type":"paragraph","text":"81年5月，胡耀邦、李先念到医院转告宋，政治局决定接受她为正式党员。宋听后微笑说：“不勉强吧!31年了，我的心冷了，人生的路将要走完了。”"},{"type":"paragraph","text":"胡、李问宋还有什么要求，她提了两点：“我死后还是回到上海安息；我有些储蓄，办个福利基金。”"},{"type":"paragraph","text":"通过周恩来安排，章士钊、傅作义、程潜、李宗仁、蔡廷锴等住进解放军第301医院，以资保护。"},{"type":"paragraph","text":"[按]在一定时期，拉拢一部分民主人士、保护某些高级民主人士，这是共产党的“统战”策略，但早在1945年，毛在“七大”的口头报告中，即明确告诉全党：“开国以后，掌握政权以后，我们的斗争对象就是民主人士了。”1947年10月27日，由周恩来起草、经毛审阅修改的‘党内指示’进一步指出：“在阶级关系上，只有工人、农民与广大小资产阶级才是彻底的革命民主派。”“等到蒋介石及其反动集团一经打倒，我们的基本打击方向，即应转到使自由资产阶级首先是其中的右翼孤立起来。”“在政治斗争上，我们必须区别今天与明天的打击方向。今天要孤立一切对美蒋尚有幻想的阶级、党派及其领袖。”“到明天，就连反对杜鲁门的华莱士和反对蒋介石的李济深之流，也要将他们孤立起来。”由此看到毛的独裁专制和阴险权谋。"},{"type":"paragraph","text":"由陶铸拟定的“中共中央、国务院关于文化大革命中一些具体问题的通知稿”，列出保护党和国家的要害部门，如军队、公安机关、电台、新华社、档案部门、航空站、铁道枢纽、港务局、电站、银行、仓库等，不许冲击。8月31日周恩来审阅后，添上了人民日报、《红旗》杂志，并批上：拟照发，请主席、林彪、康生、富春、江青核阅。9月1日，毛批示：此件不发。9月2日"},{"type":"paragraph","text":"毛泽东最新指示：“凡是镇压学生运动的人都没有好下场！”公开发布。"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"在后来的整个文化大革命中，老耄的毛都是采取发一两句批示以指导运动进行，名之曰“最新指示”。对这样一个庞大复杂的运动，就靠这么一两句话来指导，必然是语义含混，政策不清，理解各异，行动难依，导致执行中的大混乱。当时的毛真是口衔天宪。“最新指示”一发布，传达不能过夜。各团体(即战斗队组织)在得到传达后，各自敲锣打鼓，结队庆贺、报喜。全城沸腾，彻夜不止。"},{"type":"paragraph","text":"中共中央、国务院发布《关于铁路企业单位分期分批地开展文化大革命运动和整顿车站、列车秩序的通知》。"},{"type":"paragraph","text":"关于铁路企业单位分期分批地开展文化大革命运动和整顿车站、列车秩序的通知各中央局，各省、市、自治区党委，各省、市、自治区人委，中央各部委，国家机关各党委、党组，军委总政治部："},{"type":"paragraph","text":"目前，无产阶级文化大革命，正在全国各地轰轰烈烈地展开，形势很好。这个革命正以雷霆万钧之势，横扫一切牛鬼蛇神，破“四旧”，立“四新”，大大促进全国人民的思想革命化，促进我国国民经济的大发展。"},{"type":"paragraph","text":"铁路是国民经济的大动脉，是为工农业生产、人民生活和国防建设服务的重要部门。铁路的运输工作是在全国范围内昼夜不停地协同进行的。在文化大革命期间，铁路还必须保证安全地运送进行革命串连活动的广大革命师生。同时，铁路员工还要搞好本单位的文化革命，自己动手破四旧立四新。这些任务是光荣而艰巨的。为了把无产阶级文化大革命搞深搞透，并保证更好地完成运输生产任务，做到革命和运输生产双胜利，特作如下通知："},{"type":"paragraph","text":"一、全国铁路各单位的无产阶级文化大革命运动，应当根据具体情况。结合四清运动，有领导有计划地分期分批地进行。"},{"type":"paragraph","text":"二、各铁路管理机关，必须认真贯彻执行中共中央关于无产阶级文化大革命的决定，放手发动群众，开展无产阶级文化大革命。同时，必须指定必要的人员，组成专门的领导班子，切实负责管好各项运输生产工作。铁路分局和分局以下的单位，可暂缓开展文化革命运动，已经开展的单位，应当讲清道理，说服群众，暂时停止进行，集中全力保证完成繁重的运输任务。"},{"type":"paragraph","text":"三、铁路工厂承担着铁路运输设备的制造和维修任务，是直接保证铁路运输正常地运行的技术基地。因此，铁路工厂的文化革命运动，也应当分期分批地进行。凡是生产任务很重、暂时不宜于开展文化大革命运动的单位，应当说服群众，适当推迟进行。不论开展文化革命运动的单位或推迟进行的单位，都必须采取切实有效措施，保证完成机车、车辆的制造和修理任务，并保证完成冬运防寒的准备工作。铁路工厂分期分批地开展文化革命运动的具体部署，由铁道部党委与有关省、市、自治区党委商定。"},{"type":"paragraph","text":"四、铁路系统暂不开展无产阶级文化革命运动的单位，应当认真的组织群众，活学活用毛主席著作，学习有关文化革命的文件和文章。同时，还可以有领导地采取适当方式，对上级领导机关提意见、揭发问题，帮助上级领导机关搞好运动。"},{"type":"paragraph","text":"五、为了保证铁路运输的安全，更好地完成运输任务，铁路系统各单位要在各地党政机关和人民解放军的帮助下，进一步整顿车站和列车上的革命秩序。在车站和列车上，不要打人，不要搜查；任何人不要对旅客进行政治审查；不要拦截列车和阻止列车的正常运行，全力保证列车按规定时刻运动。铁路职工和铁路民警，应当坚守岗位，敢于负责，在有关部门协助下，努力学习十六条，积极地做好宣传解释工作。"},{"type":"paragraph","text":"六、本通知下达到铁路各基层单位，并应向职工进行传达。在传达时，要说明当前无产阶级文化大革命的形势，铁路企业分期分批地开展无产阶级文化大革命和整顿车站、列车秩序的重要意义，并反复说明保证铁路运输正常运行，就是对文化革命运动的最有力支持，动员铁路广大职工积极参加运动，努力做好工作，保证无产阶级文化大革命和运输生产的双胜利。"},{"type":"paragraph","text":"本通知可在车站和列车上张贴。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"国务院"},{"type":"paragraph","text":"一九六六年九月二日9月3日"},{"type":"paragraph","text":"周恩来起草的《关于红卫兵的几点意见》(未定稿)企图对红卫兵的活动进行某些约束。如要文斗，注意统战政策，搜捕人必须同公安机关商定，保障交通安全等。在开会讨论中，陶铸、陈毅等赞同，康生、张春桥、姚文元等持否定态度，未得通过。"},{"type":"paragraph","text":"吴法宪把他写给毛泽东的有关贺龙的材料上送给林彪，林彪立即转呈毛泽东。"},{"type":"paragraph","text":"王力、关锋接见山东大学红卫兵代表，回答关于打人问题，说：“劝他们不要打。大多数人是好的，出于义愤，打就打了；出于私愤，打了人，红卫兵自己处理。”当问及文斗与武斗的界线时，关锋回答：“动手是武斗，戴高帽子，游街，全国各地都问这个问题，我们没有答复。”(《传信录106》)"},{"type":"paragraph","text":"“西纠”发出第五号通令，强调坚持“要文斗，不要武斗”的原则，指出对于红卫兵“违反政策，随便打人者，一定要进行严肃的批判和教育”，并规定：“严禁打人，严禁体罚和变相体罚，严禁侮辱人，严禁逼供信。”"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"西纠以“通令”形式发号施令，正是高干特权子弟高人一等的作风的表现。他们的通令虽冠冕堂皇，然实际行动中法西斯作风最为严重，人们皆有谈虎色变之惧。他们保老干部，但却是以平民及社会上的所谓牛鬼蛇神为牺牲，从整个表现上讲是完全不足取的。"},{"type":"paragraph","text":"著名翻译家傅雷及夫人朱梅馥不堪凌辱，双双自缢而死。"},{"type":"paragraph","text":"新疆乌鲁木齐学生造反派在党委大院静坐，要求王恩茂(自治区委书记)交出9·2讲话稿与录音，受到大批干部、工农的围斗，并被宣布为反革命事件。"},{"type":"paragraph","text":"第五编"},{"type":"paragraph","text":"大串连"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":385,"page_end":403,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"关锋","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"王力","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李富春","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘志坚","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"聂元梓","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"（辽宁）毛泽东思想八三一沈阳革命造反总司令部（八三一）","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"破四旧","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wengeqianqixinianlu2","name":"十年文革前期系年录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录2.pdf"],"article":{"title":"第七十二卷","parts":[{"type":"title","text":"第七十二卷"},{"type":"paragraph","text":"1967年3月12日至16日"},{"type":"paragraph","text":"(六十一人叛徒事件)3月16日(续)"},{"type":"paragraph","text":"中共中央印发《薄一波、刘澜涛、安子文、杨献珍等六十一人的自首叛变材料》。在批示中说：“薄一波等人自首叛变出狱，是刘少奇策划和决定，张闻天同意，背着毛主席干的。”刘少奇、张闻天作出了“叛卖的决定”。“这些变节分子......许多人在重新混入党内以后，成为刘、邓资产阶级反动路线的坚决执行者，成为反革命修正主义分子，成为党内走资本主义道路的当权派。”“揭露这个叛徒集团是无产阶级文化大革命的伟大胜利，是毛泽东思想的伟大胜利。”批示中还引用了毛泽东1月31日在谭震林关于农口几个单位阶级斗争情况报告上的批语：“党政军民学、工厂、农村、商业内部，都混入了少数反革命分子、右派分子、变节分子，此次运动中，这些人大部自己跳出来，是大好事。应由革命群众认真查明，彻底批判，然后分别轻重，酌情处理。”这个批示，是毛泽东批准的。61人中，除已死去22人外，一人为科长，其余39人均为省市委以上负责干部。(据戴煌：《胡耀邦与平反冤假错案》一文(南方日报1966年3月29日)载：61人中19人已在抗日战争中牺牲，2人叛变被处决，文革时健在者40人，其中22人担任省、部长以上干部，13人为省政协副主席或司局级干部，其余者为一般干部)。"},{"type":"paragraph","text":"中共中央关于印发薄一波、刘澜涛、安子文、杨献珍等出狱问题材料的批示①"},{"type":"paragraph","text":"[机密]中发(67)96号"},{"type":"paragraph","text":"在反对刘少奇、邓小平资产阶级反动路线的斗争中，揭发了薄一波、刘澜涛、安子文、杨献珍等六十余人的叛徒集团。这些叛徒长期隐藏在党内，窃据了中央和地方党、政领导机关的重要职位。揭露这个叛徒集团，是无产阶级文化大革命的伟大胜利，是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"薄一波等人自首叛变出狱，是刘少奇策划和决定，张闻天同意，背着毛主席干的。这批人的出狱，决不是象他们自己事后向中央所说的那样，只是履行了一个什么“简单手续”，他们是签字画押，公开发表《反共启事》，举行“自新仪式”后才出来的。张闻天的材料中说到在狱中的人提出过“三个条件”，同案的许多人都否认这件事，看来是靠不住的，不可信的。"},{"type":"paragraph","text":"当时在狱中的人，对刘少奇、张闻天这个叛卖的决定，有两种截然相反的态度。刘格平、张良云同志坚决反对，拒绝执行，表现了共产党人崇高的革命气节。薄一波、刘澜涛、安子文、杨献珍等人本来就企图叛党保命，刘少奇的这个决定，就成为他们自首叛党的合法根据。他们不但自己叛变，还诱使和迫使别人同他们一道叛变。"},{"type":"paragraph","text":"这些变节分子出狱后，由于刘少奇等的包庇重用，把他们安插在党、政、军的重要领导岗位上，其中有少数人在抗日战争中牺牲了，许多人在重新混入党内以后，成为刘、邓资产阶级反动路线的坚决执行者，成为反革命修正主义分子，成为党内走资本主义道路的当权派。"},{"type":"paragraph","text":"毛主席最近指示：“党政军民学、工厂、农村、商业内部，都混入了少数反革命分子，右派分子，变节分子。此次运动中这些人大部自己跳出来，是大好事。应由革命群众认真查①一九七八年十二月十六日，中共中央转发中央组织部《关于“六十一人案件”的调查报告》，为所谓“六十一人叛徒集团”平反。明，彻底批判，然后分别轻重，酌情处理。”"},{"type":"paragraph","text":"现将张闻天给毛主席、林副主席和中央文革小组的信件及附件，彭真专案小组办公室《关于薄一波、刘澜涛、安子文、杨献珍等人自首叛变问题的初步调查》及附件，印发政治局、书记处、中央军委、中央文革小组及其他负责同志。薄一波、刘澜涛、安子文、杨献珍等叛徒集团的揭露，应当引起我们全党极大的警惕。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九六七年三月十六日"},{"type":"paragraph","text":"(此件发至县、团级)"},{"type":"paragraph","text":"《五洋捉鳖简讯》"},{"type":"paragraph","text":"南天大学八·一八、八·三一红色造反团抓叛徒战斗队各小分队转战大江南北，协助西藏歌舞团革命造反派，揪出了中共西藏工委副书记、大叛徒王其梅。协助江苏化学公司革命造反派，揪出了该公司政治部主任、大叛徒方立凡。他们还协助北京的革命造反派，先后抄了国家经委副主任周仲英、交通部副部长马辉之、北京内燃机厂长刘尚之以及卫生出版社田益等叛徒的黑狗窝，查获了大批罪证。二月间，他们又对张闻天(1936年时的党中央总书记)、李楚离(组织部副部长)、杨献珍等大叛徒进行了提审。(《追穷寇》1967年3月27日)"},{"type":"paragraph","text":"由61人案引起的揪叛徒恶风，到67年6月，全国有五千多人受到审查。廖鲁言、徐子荣、胡锡奎、刘锡五、王其梅等含恨逝世。"},{"type":"paragraph","text":"[按]下面收的是当时南开大学红卫兵“三六专案调查组”调查的薄一波叛徒案材料，对后来研究文化大革命者，亦为不可少的参考材料。文革以后，这一椿“叛徒案”全部平反，有关材料，亦作为附录，见于本卷。"},{"type":"paragraph","text":"刘少奇是大叛徒集团的总头目——揭开刘少奇、安子文、薄一波叛徒集团内幕"},{"type":"paragraph","text":"南开大学卫东红卫兵“三六专案调查组”"},{"type":"paragraph","text":"无产阶级文化大革命，以排山倒海之势，雷霆万钧之力，荡涤着旧世界，把一切垃圾污垢从那些黑暗的角落里统统扫了出来。"},{"type":"paragraph","text":"去年十月份，我们无产阶级革命派，在一九三六年的《华北日报》上，发现了薄一波、安子文、刘澜涛、杨献珍等六十一人发表的《反共启事》。启事内容极其反动，这是一个地地道道向敌人屈膝投降的反共自首书，这是一个公开背叛党、背叛人民的反共宣言书。"},{"type":"paragraph","text":"为了誓死保卫毛主席，誓死保卫毛泽东思想，彻底搞清这个案件的内幕，我们有关单位革命造反派联合起来进行了深入的调查研究。短短的几个月时间，我们获得了多方面的材料。根据这些材料，我们断定：这是一个隐藏了多年的叛徒集团，而这个叛徒集团的总头目就是刘少奇。现在就我们了解到的可以公布于众的材料，整理如下。"},{"type":"paragraph","text":"一九三六年，日本帝国主义妄想占领全中国，侵略者的铁蹄践踏着我们祖国的大好河山。几个帝国主义国家控制的半殖民地状态的中国，眼看就要变为日本帝国主义独占的殖民地。在这种情况下，中华民族同日本帝国主义的矛盾更加突出、更加尖锐，上升为当时的主要矛盾。可是，蒋介石卖国集团，依然采取对内残酷镇压，对外妥协投降的反动政策，大批共产党员被捕入狱，大片美好江山白白的送给了日本帝国主义。面对这种情况，中国共产党人挺身而出，在我们最最伟大的领袖毛主席的英明领导下，组织起全国人民，担负起抗日救国的重任。中国共产党高举“团结抗日”的大旗，一方面揭露蒋介石卖国集团的真面目；另一方面发动民众，建立广泛的抗日民族统一战线，拿起武器与日本帝国主义进行不屈不挠的斗争。在毛主席领导下，无数中华民族的优秀儿女不怕坐牢，不怕杀头，赴汤蹈火，进行前赴后继的战斗。革命民众抗日救亡运动空前高涨。"},{"type":"paragraph","text":"抗日热潮的高涨，给当时白区的监狱斗争带来了极为有利的条件。同时，何梅协定之后，宋哲元接管北京，宋哲元与蒋介石之间有勾心斗角的内部的矛盾。如果抓住这个大好形势，把狱中斗争同狱外斗争紧密地结合起来，争取更广大的民众支持，迫使敌人无条件释放政治犯是有可能的。"},{"type":"paragraph","text":"但是，作为当时北方局总负责人的刘少奇并没有这样做，相反地却采取了可耻的变节投降的办法。"},{"type":"paragraph","text":"一九三六年三月，刘少奇代表党中央到达天津，任北方局书记不久，就出卖了共产党员的灵魂。他假借中央的名义，给关押在敌人监狱中的共产党员下达黑指示说：“你们可以履行自首手续。登报，写反共启事出狱。”"},{"type":"paragraph","text":"刘少奇和北方局的一伙叛徒借口：白区斗争是很残酷的，北京很可能要沦陷到日寇手里。监狱里的共产党员如果再不出来，北京一旦沦陷，这批人就出不来了。刘少奇之流还借口：形势有了变化，目前抗日第一，我党已经争取建立统一战线，广泛的民族革命统一战线是我党领导中国革命走到胜利之路的中心问题和主要关键。中国革命的高潮就要到来，需要大量干部。监狱里的共产党员只要能出来就行。登自首启事那种东西，老百姓看惯了，已经起不到多大坏作用。而且现在狱中的那些共产党员都是以普通群众的身份出现，登了那种启事也不要紧。(见附件一)"},{"type":"paragraph","text":"刘少奇这个怕死鬼悲观地认为：事物的存在，就是向死亡发展，而最后结果还是死亡。生命就是死亡，人生的斗争就是与死作斗争，就是死的不断的克服，否则人都死了，原则还有什么用呢？(见附件二)"},{"type":"paragraph","text":"刘少奇通过魏梦伶跟当时北京伪统治者宋哲元及反省院长阎文海商量好出狱问题。"},{"type":"paragraph","text":"刘少奇又通过徐冰、孔祥祯、魏梦伶等人写信通过看守班长牛宝正送到狱中。向狱中人解释，党需要你们出来做工作，你们可以“假”自首出狱，可以登报，可以有反共内容。并说：“登启事出狱虽然有些不好影响，但这样使国民党监牢中保存了残余的同志，保存革命的力量，这是正确的，这是合法斗争与非法斗争联合的正确方针。只要搞好革命，那点影响是可以弥补的......”"},{"type":"paragraph","text":"传达了第一黑指示以后，刘少奇给当时在延安的张闻天写了一封信，说现在监狱中有一批干部，想早些处理这批人，所以想让他们履行一个手续出来。在信中刘少奇还帮助狱中干部提出三个条件，让张闻天签字，张闻天签字复信后，刘少奇就瞒着毛主席、党中央和其他领导同志，又一次指示狱中人叛变，同时又进一步造谣说：这是中央的意思，登启事的政治责任由党来负。刘少奇还威胁那些坚决反对叛变的真正革命的同志：如果你们再不出来，那就叫自由行动，就要成为罪人，组织上就不管你了！(见付件四)"},{"type":"paragraph","text":"刘少奇的黑指示下达以后，薄一波、安子文、刘澜涛、杨献珍、徐子荣等人对刘少奇的叛党指示坚决拥护，积极执行，表现得最为嚣张。他们利用他们把持的北平伪军人反省院南监党支部，对坚持原则的同志采取了各种威胁打击的卑劣手段。对动摇的则是引诱、拉拢：现在不出去，以后就出不去了，出去是为了更好地工作，云云。"},{"type":"paragraph","text":"刘格平同志当时是北监的党支部书记。他与张良云等许多真正的革命同志，坚决反对写反共启事出狱，对这种叛变行为进行了坚决斗争，他们坚持要争取无条件释放，否则，宁肯把牢底坐穿，也不能写任何叛党启事。这下可触怒了薄一波等人，薄一波派了四个人到北监游说，拆刘格平同志的台。他们恶狠狠地威胁：这是组织命令，军事命令，只能执行，不能讨论。如果不出来，就是不服从组织决定，就要开除党籍。真是无耻到了极点。"},{"type":"paragraph","text":"刘格平、张良云等真正革命同志在沉重的压力面前没屈服，薄一波等人更是暴跳如雷。一次放风，薄一波和一个人在院中争吵了起来，薄气势汹汹地叫嚷：“谁怕上当，谁别干，大家都不干，我一个人也干！”"},{"type":"paragraph","text":"过了不久，薄一波和杨献珍首先跑到敌人那里去索取自首书。他们对敌人说：“你们要我们登报启事，我们同意。”于是就在自首书上签了名，按了手印。紧接着，刘澜涛、安子文、徐子荣、周仲英、马辉之、董天知、鲜维勋也先后跑到敌人那里去，在自首书上盖了手印。"},{"type":"paragraph","text":"在刘少奇指示下，在薄一波带动下，六十一个叛徒先后都在敌人的自首书上签名按了手印。接着，这六十一个叛徒就在国民党《华北日报》上登出了令人气炸心肺的反共启事，什么“......幸蒙政府宽大为怀，不咎既往，准予反省自新，现已诚心悔悟，愿在政府领导之下坚决反共，作为一个忠实国民，以后决不参加共党组织及作任何反动行为，并望有为青年，俟后莫再受其煽惑......”这是一个地地道道的向敌人屈膝投降的反共自白书，这是一个公开背叛党，背叛人民的反共宣言书。这就是刘少奇以及薄一波、安子文、刘澜涛之流背叛党，背叛人民，背叛毛主席的铁证。(见附件五、六)"},{"type":"paragraph","text":"更令人气愤的是，薄一波、安子文、刘澜涛这帮混蛋还在国民党的青天白日旗下，在罪大恶极的蒋该死的狗头象下，举行了反省典礼。接受敌人反省院长的训话：过去你们受共党利用，经反省院教诲，你们已悔过自新，出去后要拥护政府、守法反共，......。接着叛徒们向敌人院长、管理员、看守班长、看守等鞠躬宣誓：感谢院方教导，我们已经改过自新，今后决不为共党利用，坚决反共，为国效劳。然后，敌人管理员大声问大家：悔过自新是不是真心诚意了？叛徒们就大声回答：是真心诚意。另外敌人还大声问保人：你们敢不敢保？在薄一波的保人郭挺一和胡仁奎带领下，保人齐声答：敢保。训话完了，在院子里犯人按照敌人的要求排好队，各个保人站在背后，照下相来。"},{"type":"paragraph","text":"最后领取出狱证件，在礼堂里叛徒和保人一排站立，逐个点名应声后走到前面，向敌人鞠躬，按手印领取出狱证件。上面写着：“改过归正，反省自新”等字样。拿了此证件就可以受到敌人的保护。就这样，在刘少奇的指示下，薄一波等六十一个叛徒分作十批出狱。出狱后，这些叛徒又分赴全国各地，把刘少奇的指示带到全国各地。薄一波一出狱就受刘少奇的指示，以叛徒的身份到阎锡山手下当了一个大官。薄一波等人去太原，带了刘少奇的一封亲笔信。这封信同样是一个叛党的黑指示。这封信指示山西太原监狱里的乔明甫、龚子荣、刘裕民、阎秀峰、李逸山等几十人写悔过书或在阎锡山印的条条上签字出狱。(见附件七、八)"},{"type":"paragraph","text":"在刘少奇的指示、默认和庇护下，北京、太原、武汉、南京、济南、苏州、合肥等地数百名叛徒，集体变节自首投敌。然后又钻进党内，形成一个庞大的叛徒集团。这个叛徒集团的总头目就是刘少奇。这群以刘少奇为首的叛徒，拿共产党员的革命原则去和敌人做苟且偷生的交易，这种可耻的行径和革命先烈的英雄行为是何等鲜明的对照啊！刘少奇所谓的“假自首”、“保存革命力量”、“出来可以为党工作”、“用工作来弥补不好的影响”等等，统统都是骗人的鬼话。归根结底，就是：“保命要紧”。这纯粹是苟且偷生的活命哲学，和赫鲁晓夫之流的“脑袋掉了，原则还有什么用”有什么两样！刘少奇与赫鲁晓夫是一丘之貉，刘少奇就是中国的赫鲁晓夫。"},{"type":"paragraph","text":"刘少奇的历史，就是一部反对毛主席、反对毛泽东思想的丑恶史。三十多年来，刘少奇不仅在革命的紧要关头丧失了共产党员的革命气节，成为可耻的叛徒。而且还极力庇护、提拔这样的叛徒，宣扬叛徒的活命哲学，打击揭发他们罪行的革命同志，气焰是何等嚣张，保等猖獗！"},{"type":"paragraph","text":"在刘少奇的指使下，薄一波这一伙叛徒一出反省院，立刻一个个都改名换姓，改头换面，又混进党内。这伙叛徒狐假虎威，他们以为刘少奇这个后台硬得很，从来就没有向组织真实汇报过出狱的经过。他们定下攻守同盟，互相串通一气，统一口径，在自传上写着“组织营救出狱”或者写成“按中央指示，根据‘八．一’宣言精神，写了个简单的启事。”只字不提写了“反共启事”出狱。一九四四年，薄一波指使李楚离在自传上填了个“组织营救出狱”就行了。一九五七年李楚离又对安子文说：“填组织营救出狱”。一九六四年，华东局组织部长罗毅也指示叛徒刘慎之填“组织营救出狱”。不仅如此，刘少奇、薄一波之流还采用了各种卑劣手段，上骗毛主席，下欺全国人民，在刘少奇的直接命令下，一九四四年薄一波把叛徒集团的名单交给彭真(当时在中央组织部工作)，一九五六年刘澜涛又把名单列出来交给刘少奇；一九六二年安子文再一次把名单抄出来交给邓小平，在中央书记处备案了事。还美其名曰：凡登记者，已作“组织结论”。刘少奇假借中央名义指示“写反动启事出狱”，但对毛主席封锁消息，说只是履行了一个简单的手续。而对下面却说“这是组织营救出狱，中央已经知道，已经做了结论。”还说：这是组织秘密，你们不要问了。刘少奇、薄一波这帮野心家还竟然冒天下之大不韪，到处造谣说毛主席讲这样出狱没有错。刘少奇、薄一波这帮野心家把谣言竟造到我们最最敬爱的领袖毛主席头上了，这是我们绝对不能容忍的，谁诬蔑我们伟大领袖毛主席，我们就和他拼到底！"},{"type":"paragraph","text":"在刘少奇的指使下，叛徒集团利用他们窃踞的职位的方便，干尽了毁脏灭证的勾当。一九五O年安子文伙同彭真，把他们的档案“借”去三年不还，把他们背叛变节的很多档案销毁了。安子文之流害怕别人揭发他们叛变一事，还使尽了各种卑鄙手段。他们到北京图书馆里去，把他们在《华北日报》登的反共宣言的字都挖掉。有个当年北平伪军人反省分院的看守班长叫牛宝正，对他们叛变的情况最了解，薄一波、安子文、冯基平之流非常害怕他泄露“天机”，于是把他从山东请到北京，以“贵宾”相待，用金钱、地位把他稳住。牛宝正一到北京就成了党员，十九级干部，牢牢地跟着叛徒集团跑，为叛徒集团服务。"},{"type":"paragraph","text":"在这一系列安排之后，刘少奇又进一步利用职权，千方百计为叛徒活命哲学开通行证，企图使自己变节行为合法化。刘少奇之流开动他们掌握的一些报社、出版社、广播电台、讲坛，大肆吹嘘他们的狱中生活。甚至不择手段，让一个根本不了解当时狱中情况的北京红旗剧院经理付世钧，根据他们拟定的讲稿到处讲演，而且还在广播电台录音广播。在刘少奇的旨意下，胡锡奎等人更是赤膊上阵，在北京日报上大书特书北方局和监狱斗争的“光荣历史”；甚至到现在，刘有光、刘尚之之流还恬不知耻地说“我一直认为这是一段光荣的历史”，“我这是抛弃个人名节，服从了党的利益”。准备带着花岗岩脑袋去见阎王的刘澜涛更是嚣张，他叫嚣：“我们出狱是按中央指示的，这事与我无关，我不是叛徒，你们去问中央好了！”这些叛徒也有不少现在装出一副可怜相，尽量把自己粉饰成为一个刘少奇的受害者，大肆吹嘘自己如何反对刘少奇这一指示。自己只是想组织上不犯错误，结果政治上犯了错误。企图把背叛党、背叛革命、背叛共产主义事业的罪行推得干干净净。这一些都是枉费心机！“‘搬起石头打自己的脚’，这是中国人形容某些蠢人的行为的一句俗话。”刘少奇、薄一波之流也正是这样的一种蠢人。"},{"type":"paragraph","text":"经过一番大张旗鼓的宣传之后，刘少奇开始着手使他们的变节行为合法化。"},{"type":"paragraph","text":"在党的七次代表大会上，刘少奇企图规定有变节、自首行为的人也可以做中央委员。并且也的的确确把彭真、薄一波、安子文、刘澜涛、杨献珍、廖鲁言等安插进中央委员会，还把彭真、薄一波、刘澜涛等提拔到中央政治局、书记处。"},{"type":"paragraph","text":"在党的八次代表大会前，刘少奇、邓小平还专门召集中央各部门负责人开会，研究如何看待登报自首的问题。在讨论过程中，刘少奇特别强调登报自首的人有些是假自首，骗敌人的，不能称是政治上的错误。还有些是生死关头怕死，并不是叛党。在刘少奇和邓小平的一手操纵下，会议最后决定起草一个文件，订出《六条规定》，把大批血债累累的自首变节分子包庇下来。《六条规定》把叛徒分成“错误”、“严重错误”、“一度动摇”、“自首”、“叛变”和“严重叛变”六种，区别对待使用。《六条规定》规定：被捕后在敌人印的自首书上签了名的不算自首，称为“在敌人面前的一种错误行为”，不影响使用。《六条规定》规定：被捕后在敌人报刊上发表了反共启事，公开攻击党咒骂党的，不作“叛变”的结论，而只作“自首”的结论，按自首性质限制使用。《六条规定》还规定：被捕后，供出同志或党的机密，但以后翻了供的，定为是“一度动摇”，使用上只稍微受到些限制。在刘少奇的纵容和幕后操纵下，安子文之流利用他们把持下的中央组织部，以《六条规定》为幌子，篡改了中央关于审查干部的决定，采取缩小审查范围，从轻论定错误性质，从宽处理，灵活掌握，放宽使用以及欺骗党中央对毛主席封锁消息等恶毒手段，进行反革命活动，大肆招降纳叛，结党营私，使许多人没有得到审查，使许多有严重政治历史问题的人得到提拔重用。"},{"type":"paragraph","text":"一九五三年，中央关于审查干部的决定曾规定：“审查的范围，应包括各级党政机关、人民团体及财经文教部门中的全部干部。”一九五五年，全国刚刚开始对只占干部总数的五分之一的干部进行审查的时候，刘少奇、安子文之流就惊慌失措地提出要压缩审查面，迫使全国各地把审查面压缩到最少的比例。在刘少奇、安子文之流的破坏下，一九五三年中央发出审干工作决定之后，一直到一九五七年二月，全国二十八个省市，只完成审查任务百分之五十的有十八个省、市。另外数百万区助理员以下的干部就没有审查。刘少奇、安子文之流还规定了许多个“不审查”。例如：对公私合营中的私方人员不审查，因为刚公私合营就审查他们，会被误解为消灭资产阶级；历史问题早已交待清楚，现在未发现问题的不审查；有非政治性问题的干部不审查；社会关系复杂，家庭出身不好，但本人早已划清界限，工作一贯表现好的不审查，因为怕影响他们工作的积极性；......还有一个奇怪的规定：“有组织上了解他们问题”的人不审查。这个规定是个大阴谋：安字文之流借口他们的问题刘少奇了解，彭真知道，就可以不被审查。而另外一些人因安子文、李楚离等了解，又可以不审查。如此进行招降纳叛，就方便得多，合法得多了。就这样，数百名叛徒几十年来一直没有被审查出来。可见刘少奇、安子文之流手段之毒。"},{"type":"paragraph","text":"“鱼恋鱼，虾恋虾，王八恋的是鳖亲家。”叛徒刘少奇、安子文对自首变节分子也就自然偏爱。他们对许多人的严重政治历史问题，都用从轻论定的办法，变成了一般问题，把叛变说成不叛变，自首说成不自首，使一些有严重问题的人继续占据着重要岗位。如叛徒刘岱峰，曾经向敌人出卖了我们几十个同志，并向敌人供出了我地下党以及党的外围组织的活动情况等，而得到敌人重用，当上了阎锡山的政治部副主任，这样一个罪恶滔天的叛徒却被邓小平、薄一波重新拉入党内，由邓小平、薄一波充当刘岱峰重新入党的介绍人，并且叫他窃踞了国家计委副主任、云南省副省长、国家物委副主任等要职。又如前建工部长、反革命修正主义分子刘秀峰，被捕后曾在敌人面前指证出卖革命同志，以后翻供。他们却不以叛变论处，而作为“错误”，不影响使用。又如李砥平，被捕后办了坦白手续，在反省院欢送出院人员大会上大肆宣传鼓吹三民主义，后来又以共产党员的身份写了自首书，表示出狱后要实行三民主义。对这样的自首分子，安子文之流却不定为“自首”，而定为“严重错误”，继续担任吉林省委书记处书记。安子文之流还搬出刘少奇一九三六年指示集体自首的叛徒活命哲学思想，到处散布反革命修正主义的谬论，说什么：“社会主义建设高潮时期，各方面需要人，干部不足”，“这些人的问题都是历史问题，发生历史问题的时间已经很久了”，“这些干部能担负一些工作，让他们作，有什么不好呢？”刘少奇、安子文之流还选择出叛徒金明作为标兵提拔为中南局书记。又伙同反革命修正主义分子陆定一提拔大叛徒邓拓、匡亚明等。山西省人委秘书长卫逢棋，抗战时期曾被阎锡山俘虏，承认自己是省长，把我们的一部分人员交给敌人，把我们政府的钤记、帐册也移交给敌人，担任了敌人战地服务团长，给敌人绘制了设置情报站的路线图。对于这种严重变节的人，安子文之流竟也积极主张提拔为副省长。还如叛徒刘尚之在福建、中央司法部，两次参加反党集团，犯下了不可饶恕的罪行，福建省委曾经作出“撤销党内外一切职务”的决定，但是刘尚之到安子文处一哭诉，安子文、徐子荣马上给刘尚之翻案。然而反党事实铁证如山，罪责难逃，安子文、徐子荣之流无可奈何，只得写上：“事情属实，但需撤消上述决定。”就这样，刘尚之到现在还身踞要职，继续干着反党、反社会主义、反毛泽东思想的罪恶勾当。而对真正革命的同志，刘少奇之流却利用职权残酷打击。现在山西省革命委员会的革命领导干部刘格平同志和其他几位同志是当年北平伪军人反省分院中拒不执行刘少奇黑指示的好同志。刘格平同志不怕威胁，不受利诱，就是不遵守他们修正主义的“纪律”，不服从他们叛党的“命令”，坚决不写叛党自首启事，坚持斗争到底，一直到一九四四年才出狱。这样的好同志，却一直受到刘少奇等人的冷酷无情的排斥打击。中华人民共和国成立不久，刘格平同志被调到北京任很高的职务，在当时，只有四十几个中央委员，其中就有他。后来，刘少奇、薄一波、安子文这些坏蛋怕刘格平揭发他们叛变一事，就利用刘格平在民族事务问题上的一些缺点，穷凶极恶地打击刘格平，想把他置于死地。处理刘格平时，根本不讲道理，不准其申辩，处理后连让刘格平看都不行。以后，把刘格平同志送到山西，但不给工作，几十个省委委员，刘格平的名字都没有。刘格平当上一个副省长，还是中央作的决定。尽管这样，刘格平同志仍然没有被压服，他和其他一些同志继续向中央揭发。这些同志因为揭发刘少奇、薄一波等人的叛党罪行，曾经受到党纪处分，曾经被捆绑起来关押了几十天，曾经被送到小学去念书，还美其名曰：“老干部学文化”，曾经被说成是疯子，计划要送到神经病院，企图灭口。"},{"type":"paragraph","text":"刘少奇利用职权，招降纳叛，结党营私，把大批叛徒、反革命修正主义分子安插到中央和全国各地，上至中央政治局、书记处、国务院副总理、各部，下至各中央局、省委书记处、工厂党委等等，形成了一个反革命修正主义的干部网。这些叛徒、反革命修正主义分子上下勾结，串通一气，抱成一团，互相包庇，互相掩盖，到处打击革命同志，干尽了反党、反社会主义、反毛泽东思想的罪恶勾当。在后台老板刘少奇的支持下，薄一波、安子文这个叛徒集团贼心不死，先后于一九五O年、一九五六年、一九六O年，三次于北京集合，碰头开会，并在反省院照相留念，阴谋篡党、篡军、篡政，企图在中国复辟资本主义。"},{"type":"paragraph","text":"无产阶级文化大革命打破了他们的黄粱美梦。刘少奇之流的末日到了。"},{"type":"paragraph","text":"“宣将剩勇追穷寇，不可沽名学霸王。”我们要坚决发扬鲁迅“痛打落水狗”的彻底革命精神，把刘少奇叛徒集团完全、彻底、全部、干净地铲除掉，把大大小小的走资本主义道路的当权派，一切反革命修正主义分子，一切牛鬼蛇神统统打翻在地，再踏上一只脚，让他永世不得翻身，誓保无产阶级铁打江山千秋万代永不变色！"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"今天的形势，是中国本部从半殖民地的地位，进入完全殖民地的地位，中国社会的各阶级、阶层除极少数愿意甘心情愿作亡国奴和汉奸的人之外，甚至从前是动摇的、反革命的，现在都开始或已经同情、赞助与参加抗日反汉奸的民族革命斗争了。党的策略任务，就是要用极广泛的民族统一战线，去团聚各阶级、阶层、派别，一切抗日反卖国贼的分子和力量，开展神圣的民族革命斗争，去战胜日本帝国主义及其在中国的走狗，广泛的民族革命统一战线，成为我党领导中国革命到胜利之路的中心问题和主要关键。"},{"type":"paragraph","text":"摘自刘少奇的《肃清立三路线的残余——关门主义冒险主义》"},{"type":"paragraph","text":"一九三六年四月十日，发表于北方局的《火线》报上"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"人自初生一直到衰老死亡，一直和死斗争着，是死的不断的克服，但最后还是死的战胜。生命是死亡。"},{"type":"paragraph","text":"............"},{"type":"paragraph","text":"事物的存在，就是向死亡发展，而最后结果还是死亡。死的胜利，是新事物的产生。事物之肯定，是克服死亡的过程，是否定之否定的过程。"},{"type":"paragraph","text":"摘自刘少奇《人为什么犯错误》"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"因为中共在武装中保存了干部和部分武装，所以现在才能发展偌大的党，可是这只是在苏区中保存的，白区除了保存革命的旗帜外，工作上基本是失败的，这是工作的大错误，也是白区中的机会主义，这是犯着不去同合法斗争与非法斗争联系的错误。"},{"type":"paragraph","text":"但是部分的组织是保存的，河北省委保存了几十个干部，其次国民党监牢中保存了残余的同志。"},{"type":"paragraph","text":"摘自刘少奇一九四O年八月十四日《关于华北华中抗战的总结》"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"四"},{"type":"paragraph","text":"参考下页张闻天交代，此处略。（本书编者注）"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"五"},{"type":"paragraph","text":"徐子文反共启事"},{"type":"paragraph","text":"子文等前因思想简单，观察力薄弱，交游不慎，言行不检，致被北平军人反省分院反省自新。当兹国难时期，凡属中国青年均需确定方针为祖国利益而奋斗。余等幸蒙政府宽大为怀，不咎既往，准予反省自新，现已诚心悔悟，愿在政府领导之下坚决反共，作一忠实国民。以后决不参加共党组织及作任何反动行为，并望有为青年，俟后莫再受其煽惑。特此登报声明。"},{"type":"paragraph","text":"徐子文"},{"type":"paragraph","text":"周"},{"type":"paragraph","text":"斌"},{"type":"paragraph","text":"张家璞"},{"type":"paragraph","text":"杨仲仁"},{"type":"paragraph","text":"董旭生"},{"type":"paragraph","text":"刘华甫"},{"type":"paragraph","text":"夏维勋"},{"type":"paragraph","text":"冯俊斋"},{"type":"paragraph","text":"徐之荣"},{"type":"paragraph","text":"见一九三六年八月二十一日─--九月二日《华北日报》第二版"},{"type":"paragraph","text":"同上反共启事内容有："},{"type":"paragraph","text":"李郎吾"},{"type":"paragraph","text":"王伯庆"},{"type":"paragraph","text":"张鹏德"},{"type":"paragraph","text":"刘俊才"},{"type":"paragraph","text":"胡锡昆"},{"type":"paragraph","text":"廖广麔"},{"type":"paragraph","text":"高仰云等人。"},{"type":"paragraph","text":"见一九三六年九月二十二日─--十月十五日《华北日报》第二版"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"六"},{"type":"paragraph","text":"一九三六年八月三十一日----九月三十日"},{"type":"paragraph","text":"《华北日报》自首叛党集团一览表"},{"type":"paragraph","text":"现在还在国家机关工作的：(因篇幅有限，只选登其中一部分)"},{"type":"paragraph","text":"现名"},{"type":"paragraph","text":"化名"},{"type":"paragraph","text":"现在工作职务"},{"type":"paragraph","text":"薄一波"},{"type":"paragraph","text":"张家璞"},{"type":"paragraph","text":"国务院副总理、国家经委主任"},{"type":"paragraph","text":"安子文"},{"type":"paragraph","text":"徐子文"},{"type":"paragraph","text":"中共中央组织部长"},{"type":"paragraph","text":"李楚离"},{"type":"paragraph","text":"李郎吾"},{"type":"paragraph","text":"中共中央组织部副部长"},{"type":"paragraph","text":"徐子荣"},{"type":"paragraph","text":"徐之荣"},{"type":"paragraph","text":"公安部副部长"},{"type":"paragraph","text":"廖鲁言"},{"type":"paragraph","text":"廖广麔"},{"type":"paragraph","text":"农业部部长"},{"type":"paragraph","text":"周仲英"},{"type":"paragraph","text":"周"},{"type":"paragraph","text":"斌"},{"type":"paragraph","text":"国家经委副主任"},{"type":"paragraph","text":"杨献珍"},{"type":"paragraph","text":"杨仲仁"},{"type":"paragraph","text":"原中共中央高级党校副校长"},{"type":"paragraph","text":"高仰云"},{"type":"paragraph","text":"高仰云"},{"type":"paragraph","text":"河北省政协副主席"},{"type":"paragraph","text":"刘澜涛"},{"type":"paragraph","text":"刘华甫"},{"type":"paragraph","text":"西北局第一书记"},{"type":"paragraph","text":"胡锡奎"},{"type":"paragraph","text":"胡锡昆"},{"type":"paragraph","text":"西北局书记处书记"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"七"},{"type":"paragraph","text":"刘慎之交代，履行自首手续和出狱过程"},{"type":"paragraph","text":"第一步向敌人索取自首书，是一种固定格式，内容大意是经反省院教悔认识过去的过错，悔过自新，今后不反对政府，在政府领导下坚决反共，在自首书上签名按手印(或画押)。"},{"type":"paragraph","text":"其次是登报启事，我们登报是集体二十多人。其内容有年幼无知，误入歧途，悔过自新，今后不反对政府，在政府领导下坚决反共等。启事底稿是集体一张各别画押的。"},{"type":"paragraph","text":"反省院长训话照相。在院子内犯人按照相的要求排好，各个保人在背后，反省院长在对面摆一方桌训话，训话内容已记不确切，大意是经反省院教诲，你们悔过自新，(表功让犯人感恩)今后要拥护政府守法反共，(训诫)最后大声问保人，你们敢保不敢保？保人齐声答：“敢保”。训话完了照相。"},{"type":"paragraph","text":"发出狱证件。在饭堂内犯人和保人一排站立，逐个点名，应声后走到前面，向敌人鞠躬，领取出狱证件。证件是油印的，大意是某某已悔过自新，准予释放。"},{"type":"paragraph","text":"还有敌人询问悔过自新是否真心诚意，答复是真心诚意。此项是在院长训话时询问集体回答的，还是在领取出狱证件仪式上个别询问个别回答的，这记不确切。"},{"type":"paragraph","text":"最后由保人领我出狱。"},{"type":"paragraph","text":"附"},{"type":"paragraph","text":"件"},{"type":"paragraph","text":"八"},{"type":"paragraph","text":"刘锡五交代：出狱之前在饭厅开个出狱典礼会，先由反省院长训话：过去你们受共产党利用，现在已反省完，出去后不要再为共产党工作，坚决反共......不为共党利用，为国效劳。"},{"type":"paragraph","text":"接着我们答曰：“感谢院方教导，我们已经反省，出去后再不为共党利用，再不为共党工作。”"},{"type":"paragraph","text":"出院时每人领一张证明书，上边写有：“改过归正，反省自新。”领这张证明时按了手印，并向院长鞠躬。"},{"type":"paragraph","text":"张闻天向南开大学抓叛徒战斗队交代关于一九三六年“自首”真相。"},{"type":"paragraph","text":"南开大学抓叛徒战斗队："},{"type":"paragraph","text":"我现在交待以下三个问题。"},{"type":"paragraph","text":"(1)立场问题。"},{"type":"paragraph","text":"(2)事实真相......刘少奇初去北方局(一九三六年春)不久，就给我写了一封关于如何解决白区工作干部问题的信......他说，现在北平监狱里有一批干部，过去表现好。据监狱内部传出消息，管理监狱的人自知日子不长，准备逃去；也想及早处理这批犯人。所以只要履行一个反共不发表的简单手续，犯人即可出狱。......此外，他还附带寄来了狱中干部提出有三个条件的请求书，要我鉴字，好使狱中干部相信，中央是同意那样办的。我当时很相信刘少奇的意见......就复信表示很同意他的意见，并且在请求书上签了字，退回去了......我现在记得，我当时没有把此事报告给毛主席，或到中央特别讨论。"},{"type":"paragraph","text":"（1）责任问题。根据以上的立场和具体情况，即可看出，关于此案的直接主谋者、组织者和执行者是刘少奇。他利用他的资产阶级的招降纳叛的干部政策，以实现他篡党、篡军、篡政的政治野心。但是我在这方面也负有严重的政治责任。没有请示我们伟大的领袖毛主席，没有提到中央的会议上正式讨论，而轻率地以我个人名义，同意了刘少奇的建议，并在请求书上签了字。这样我不仅违反了党纪、党章的规定，损害了党组织的纯洁性，玷污了我们共产党人永不变节，忠贞不屈的光辉传统，而且也给刘少奇的招降纳叛的干部政策打开了方便之门。我在这个问题上犯了严重的反党罪行，而且也成了刘少奇的帮凶。"},{"type":"paragraph","text":"张闻天"},{"type":"paragraph","text":"1967．2．18[附]"},{"type":"paragraph","text":"熊怀济：《天地有正气》(节录)"},{"type":"paragraph","text":"党中央和“七大”对一九三六年出狱问题作的结论"},{"type":"paragraph","text":"一九四五年四月，在反法西斯战争最后胜利的前夜，在抗日战争战略反攻的前夜，中国共产党在延安召开了第七次全国代表大会。到会正式代表五百四十七人，候补代表二百零八人，代表一百二十一万余党员。"},{"type":"paragraph","text":"党的“七大”召开之前，从前方来的“七大”代表都集中到延安中央党校一部学习和审查。从“北平军人反省分院”出狱的五十二名党员中，有七大正式代表十二人，候补代表二人。这十四名代表中有薄一波、刘澜涛、安子文、周仲英、赵明新、吴云甫、王德、彭德、马辉之、李楚离、刘慎之、傅雨田、刘子久等。"},{"type":"paragraph","text":"一九四四年三月①薄一波同志作为“七大”正式代表到达延安。他到延安后的第二天就向毛泽东同志汇报了在北平草岚子监狱五年半的监狱斗争，当他谈到关于上海事变和福建人民政府的那个长期争论时，毛泽东同志说：你们那个争论也是两条路线的斗争嘛。薄一波谈到狱中党支部规定了反对“反省政策”的方针，强调把身体搞好，学习马列主义，坚定信念，斗争到底。毛泽东同志说：这样做是对的，你们把监狱变成了学校，通过学习革命理论，武装了自己的头脑，保存、锻炼和教育了一批同志，这就是胜利。毛泽东同志还问了出狱的还有哪些同志和他们的情况。薄一波同志作了汇报后，他关切地说：你们这些人来自五湖四海，出来以后又分派到各地去，又回到五湖四海，做了不少工作，是起了作用的。他还要薄一波同志开了个名单。②"},{"type":"paragraph","text":"这次谈话后，党中央书记任弼时同志又找薄一波同志谈话，也谈到一九三六年出狱问题。任弼时同志说：中央完全知道，是刘少奇、北方局向中央建议的，中央作了讨论，让你们出来的。此外，刘澜涛同志于一九四四年冬，周仲英同志于一九四五年一月，都曾分别向中央负责同志汇报过一九三六年出“反省院”的经过。"},{"type":"paragraph","text":"“七大”期间，中央和各代表团对每个代表都进行了认真的代表资格审查。晋冀鲁豫代表团团长是刘伯承，副团长是薄一波、王从吾。安子文是晋冀鲁豫代表团的代表。薄一波同志提出应把他们一九三六年出狱的问题向“七大”作出报告，把过程说清楚，作出结论。"},{"type":"paragraph","text":"对于薄一波同志提出的这个问题，经代表团审查，认为一九三六年他们从北平草岚子监狱出来是中央根据当时形势发展的需要，由党组织营救他们出来的。因此，代表团同意了他们的代表资格，并报请中央批准。后来，刘少奇、李富春同志告诉薄一波同志：你的建议中央同意了，中央把你们出狱的问题通知了代表资格审查委员会。他们还说，其他代表团如提出此问题，也照此解释。"},{"type":"paragraph","text":"事实上，从一九三六年这些同志出狱，一直到一九四五年党的“七大”召开前，中央组织部在审查干部的过程中，都遇到这批同志在“北平军人反省分院”出狱的问题。在他们填写自传和向党组织的汇报中，都谈到这是党组织的决定。对此，中央组织部作了认真的调查，证明事实确实是如此。因此，“七大”代表资格审查委员会审查讨论时，代表资格审查委员会主任任弼时同志说明了这件事。他说：这批同志政治上是没有问题的。党组织营救他们出狱，是北方局建议，经中央回电同意的，所以完全不影响他们的代表资格。因此，代表资格审查委员会对薄一波等同志一九三六年出狱的问题，作了明确的结论，认为适合代表资格，并提交七次代表大会一致通过。"},{"type":"paragraph","text":"在选举中央委员和候补中央委员时，中央提名的候选人有薄一波、刘澜涛等同志。在各代表团酝酿候选人名单时，中央正式通知，这些同志的出狱，是北方局建议经中央批准的。"},{"type":"paragraph","text":"党中央对薄一波等同志出“反省院”的问题是经过多次严格审查的，对他们这段历史是清楚地知道的，一直认为是没有问题的。"},{"type":"paragraph","text":"林彪、江青、康生、陈伯达一伙炮制的大冤案"},{"type":"paragraph","text":"这样一个经过北方局建议、党中央批准的正确决定，中央和党内许多负责同志，特别是主管这方面工作的同志，都是清清楚楚的。三十年来，党组织一直没有认为有什么问题。全①过去薄一波同志在他写的文章中说是1943年，后经查对，应是1944年。②薄一波：《崇敬与怀念》，1981年7月3日《人民日报》。国解放后，一九五O年，安子文同志又向中央负责同志汇报过一九三六年出狱的经过。一九五三年薄一波同志再次向中央负责同志写了一份关于出狱经过的报告，也批示存档了。为什么到了“文化大革命”初期，这个问题就成了重大的政治案件呢？就成了一个被突然“发现”的、向党隐瞒了几十年的“叛徒集团”？这就必须揭露一个那个“中央文革”的“顾问”、阴险狠毒的野心家康生的丑恶表演。"},{"type":"paragraph","text":"历史上发生的事情，有些虽然现象不同，本质却完全一样。一九三一年，当这批共产党员因宣传抗日、组织抗日力量而被捕的时候，日本侵略者提出的口号叫“中日提携，共同防共”。同侵略者的口号相呼应，国民党反动派的口号是“先安内而后攘外”。两个口号都把防共、反共放到首位。八年抗战，蒋介石龟缩后方，宁愿把半壁河山抛给敌人，也日夜不忘“限制异党活动”，多次掀起反共高潮。三年解放战争时期，国民党重提“剿共”的口号，公开向共产党和全国人民发动进攻。外国侵略者反共，国内反动派反共，人们都看到了。可是有谁曾经想到，还有些混入革命营垒、披着“共产党员”外衣的人也在反共？而且，他们行径之卑劣，手段之狠毒，实在令人发指。"},{"type":"paragraph","text":"一九六六年，“文化大革命”刚刚开始，康生和林彪的高级幕僚陈伯达就在策划一场反共阴谋。康生是一个残害过大批共产党员的刽子手，而陈伯达恰恰是当年进草岚子监狱之前就在天津叛变出狱的叛徒，进了草岚子监狱后不久，又向敌人写悔过书出狱了。刽子手加叛徒，从共产党内部搞反共活动比起日本人和国民党就高明多了。他们把党的大批好干部打成“走资派”以后，又上演了一出罪恶滔天的“抓叛徒”的丑剧。"},{"type":"paragraph","text":"康生对于薄一波等同志于一九三六年出“反省院”的经过，本来是完全清楚的。一九四四年，康生当着薄一波同志的面，赞扬北方局的一大功劳就是营救草岚子监狱的一批干部出狱；一九四五年四月，党的“七大”召开时，康生身为“七大”代表资格审查委员会的成员，对这些同志的问题、中央对这个问题的通知以及代表资格审查委员会对此事的结论，都是知道的；一九四五年九月，康生找安子文同志谈话，安又向他谈了一九三六年出狱的经过，康生说这件事我们知道。一九四八年，当时以康生为团长的中央土改工作团全体成员回到当时渤海区党委所在地过春节时，康生曾对别人说起一九三六年北平一批党员出狱的问题。康生说：一九三六年，中央分析当时华北形势危急，抗日高潮又已经到来，需要大量干部出来工作，但是很多有经验的老同志都被关在北平狱中，如不及时把他们营救出来，蒋介石就可能把这批同志解往南京。另外，如果敌人很快占领平津，或者华北政权汉奸化后，这批同志就只有全部牺牲。考虑结果，当时中央决定营救他们出狱。"},{"type":"paragraph","text":"但是，到了“文化大革命”时期，康生为了打倒刘少奇同志和一大批革命老干部，以实现他们篡党夺权的反革命阴谋，一九六六年八月，康生为了制造这一大假案，把这件事重新提了出来，让某专案审查办公室搞调查，还指使红卫兵去查当年北平的旧报纸，说在那里能查出一大批叛徒。根据康生的指示，南开大学有个所谓“抓叛徒战斗队”，经过“调查”，“发现”了一个由六十一人组成的“叛徒集团”。九月，康生就迫不及待地诬陷薄一波等同志当年在草岚子监狱有“叛变行为”，而“刘少奇的决定，就使这些人的反共叛党合法化了。”康生的调子一定，其他“文革”干将都争先恐后大造舆论。一九六七年一月十日，戚本禹同总政文工团部分同志谈话时说：“红卫兵小将查出安子文叛党，这些变节分子叛党的最大组织者就是刘少奇。”二月十二日，关锋对参加军训的解放军代表的讲话中说：“安子文，还有薄一波、刘澜涛，占据了组织部、监委、工交等很多重要部门，权都掌握在他们手里，执行的是资产阶级专政。文化大革命发动起来，小将是有很大功劳的，这些人是自首分子，是叛徒。”四月十二日，江青粉墨登场，在军委扩大会议上煞有介事地说：“小将们的这个功勋可大啦！”“要是没有他们，怎能搞出那个叛徒集团来啊？有六十几个人。他们都占了重要的领导岗位。”康生也说：“北京这六十几个人，只是刘少奇的叛党组织路线、招降纳叛的组织路线的一个例子。”五月六日，康生接见中央组织部全体人员时说：“南开‘八·一八’、北航‘红旗’他们组织了‘三六’专案抓叛徒的联合调查团，应该向他们学习。”所谓“三六”专案，指的就是一九三六年被敌人关押在草岚子监狱的薄一波、刘澜涛、安子文、杨献珍等几十位同志，执行党中央、北方局的决定，由党组织营救出狱，投入抗日民族革命战争的问题。"},{"type":"paragraph","text":"由于江青、康生一伙的煽动，从一九六六年九月以后，各地纷纷成立“揪叛徒”的组织，把过去已经作了结论的问题，统统翻腾出来。他们甚至无中生有，栽赃陷害，制造了一大批冤案、假案、错案，很快把一场祸及成千上万人的灾难扩展开来。"},{"type":"paragraph","text":"一九六七年三月十六日，在林彪、江青、康生、陈伯达一伙的操纵下，以中央的名义印发了某专案审查小组办公室《关于薄一波、刘澜涛、安子文、杨献珍等人自首叛变问题的初步调查》。"},{"type":"paragraph","text":"八月九日，上海《文汇报》、《解放日报》同时刊登《策动叛党就是为了篡党》的文章，说这个“叛徒集团”是刘少奇“背着毛主席、党中央”指示狱中的人自首叛变的；而这些人“本来就企图叛党保命”，刘少奇“盗用党中央的名义”作出的“决定”，“就成为他们自首叛党的‘合法’根据”；这批“叛徒”出狱后，又是刘少奇“欺骗毛主席、党中央”，“千方百计把他们保护起来”。两天后，《人民日报》转载了这篇文章。"},{"type":"paragraph","text":"在康生一伙的指使下，南开大学红卫兵向当年担任中共中央总书记的张闻天同志，追问一九三六年薄一波等人出狱的问题。他们到张闻天同志家，向他追问经过情况，还逼他写具体材料交代。张闻天同志说，事隔数十年，具体情况需要仔细回忆再作回答。"},{"type":"paragraph","text":"鉴于这是一起重大政治案件，为了回答红卫兵的质问，张闻天同志作了认真的仔细的回忆。但是，对当时的一些具体的细节，确实是记不很清楚了。只有一个关键的情节，就是关于营救薄一波等同志出狱，刘少奇同志曾给党中央写过报告这件事，他是记得很清楚的，对报告中向中央的建议，他当时也是认为可以同意的。但当时正式批准北方局的报告的经过，他就记不清了。为了慎重起见，张闻天同志曾将他回忆的情况，先给康生写了封信，请他查查中央原来的档案，以证实当时的情况。"},{"type":"paragraph","text":"奇怪的是，康生接信后不予置理；张闻天同志又第二次给康生写信，康生也一直不作答复。最后，张闻天同志只好决定由他个人负责，承认是他批准的。"},{"type":"paragraph","text":"一九六八年四、五月间，有一天，有两个自称是康生派来的干部来到中国社会科学院经济研究所找到张闻天同志。他们对张闻天同志说：一九三六年薄一波等出狱的案件，被你(张闻天)从中把水搅挥了。这案件是刘少奇背着中央干的，你张闻天为什么要承认是你批准的。以后你如再瞎说，后果由你自己负责，你应替你的子孙后代留条后路，等等。"},{"type":"paragraph","text":"这次谈话后，张闻天同志感到压力很大。事隔不久，一九六八年五月十六日下午，在康生一伙的指使下，竟有一个排的武装，把张闻天同志和他爱人看守起来，实行隔离监护，进行审讯，直到一九六九年十月二十日才解除监护。"},{"type":"paragraph","text":"事情很清楚，康生之所以要威胁张闻天同志，就是怕张闻天同志如实说出北方局的报告是经过中央批准的这一历史事实。因为这样一来，康生一伙诬陷、迫害刘少奇同志和薄一波等同志的阴谋，就可能落空。"},{"type":"paragraph","text":"在那一段天昏地暗的日子里，林彪、江青、康生一伙完全疯狂起来了。康生使出了浑身解数：时而亲自出场，时而调兵遣将，翻手为云，覆手为雨，颠倒历史，混淆是非，伙同林彪、江青、陈伯达一伙，越过党的组织部门，把持了“专案组”，并且砸烂了“公检法”。真正是为所欲为。只要康生写张纸条指名把谁“拷起来”，谁马上就会遭逮捕。甚至周总理发现此事，亲自发出了保护这些老干部的指示，他们也拒不执行。党纪国法被他们糟踏到了何等地步！"},{"type":"paragraph","text":"尤为恶劣的是，康生一伙采取卑鄙的手法，先是制造一种这个案件是“群众揭发”的假象，然后又把一九六七年一月三十一日毛泽东同志对当时《农口运动情况的报告》写的一段批示：“党政军民学、工厂、农村、商业内部，都混入了少数反革命分子，右派分子，变节分子。此次运动中这些人大部自己跳出来，是大好事。应由革命群众认真查明，彻底批判，然后分别轻重，酌情处理。”塞进他们炮制的《关于薄一波、刘澜涛、安子文、杨献珍等人自首叛变问题的初步调查》中去，以中共中央的名义印发，使人认为毛泽东同志这段话就是针对“六十一人案”而写的。据此，康生一伙就将薄一波等同志定为“叛徒集团”，并且还借党中央的名义，去欺骗和蒙蔽广大群众。"},{"type":"paragraph","text":"总之，炮制“六十一人案”这一千古奇冤的罪魁祸首，不是别人，就是作恶多端、老奸巨滑、一贯靠玩弄阴谋诡计以欺世盗名的康生。"},{"type":"paragraph","text":"康生之所以要伙同林彪、江青、陈伯达一伙炮制骇人听闻的“六十一人案”，就是妄图通过分裂我们伟大的党、破坏我们伟大的党，来实现他们篡党窃国的反革命阴谋。"},{"type":"paragraph","text":"我党领导的民主革命中，始终有两条战线：一条是处在农村的苏区、边区，后来叫解放区；一条是以城市为中心的敌占区、国统区，总起来叫白区。正是在这两条战线，两个地区进行了长期斗争，特别是农村的武装斗争，我们才取得了中国革命的伟大胜利，建立了新中国。而林彪、江青、康生、陈伯达一伙进行篡党夺权活动的时候，却把成千上万参加过民主革命的共产党员称为“民主派”，胡说什么“民主派变成走资派”，要统统打倒；他们还把成千上万来自白区、被敌人迫害过的共产党员称为“叛徒”，要统统“揪出来”，用以全盘否定我们党的白区工作。事实上，他们不仅要揪一个草岚子监狱的“北方叛徒集团”，还把魔党伸向全国，还要揪一个“南方叛徒集团”，揪一个“开封监狱叛徒集团”、“太原监狱叛徒集团”、“新疆监狱叛徒集团”，等等。"},{"type":"paragraph","text":"历史无情。同一切反动派一样，他们搬起石头砸了自己的脚。最终被“揪出来”的，恰恰是林彪、江青、康生、陈伯达一伙货真价实的反革命集团。这帮败类受到了应得的惩罚：林彪死无葬身之地，江青、陈伯达、张春桥、姚文元、王洪文等被送上了历史的审判台。俗话说：“雪地里埋不住死尸”。他们那个埋藏得很深的“顾问”康生，如今也在阳光下现出了魔鬼的凶恶面目。"},{"type":"paragraph","text":"[附]"},{"type":"paragraph","text":"刘英：《身处逆境的岁月——忆闻天》(节录)"},{"type":"paragraph","text":"一九六九年二月十六日，一个难答的问题突然提到了闻天的面前：一九三六年春“六十一人出狱”是怎么一回事？提问者是天津南开大学的“抓叛徒战斗队”。"},{"type":"paragraph","text":"这已经是三十年前的事了，若干细节印象已经模糊，但总的经过闻天是记得清楚的。"},{"type":"paragraph","text":"那是一九三六年春天，少奇同志报告，说有一批干部(六十一人)关在北平草岚子监狱，过去表现好，据监狱内部传出消息，只要履行一个不反共的普通手续就可以释放。当时华北抗日形势迅速展开，急需干部，而狱中同志要得到中央同意，看到领导同志签字的文件，才愿出狱。少奇同志请中央立即决定。事情来得很急(因为如果日本人侵占平津后就不能办了)，又是如此重大，闻天当即与当时中央的主要领导同志商量，决定予以批准。薄一波、安子文、杨献珍、刘澜涛等六十一人出狱以后，许多同志成为抗日战争的领导骨干。七大召开前夕，审查代表资格的时候，对他们又审查了一遍。闻天对我说，事实就是如此。“六十一人出狱的确是中央批准的。”可是在这个当口重提这桩历史陈案，该怎样回答呢？闻天很为踌躇。"},{"type":"paragraph","text":"当时以批《清宫秘史》为由头，引发了全国上下抓叛徒的运动，斗争矛头向着少奇同志。报纸上，“中国的赫鲁晓夫”就是刘少奇的代称；如果对此事推卸责任，那么少奇同志“大叛徒”的罪名就更重了。事实并非如此，闻天怎么肯为了一已的安危而使少奇蒙冤受害呢？六十一人出狱本来是那种特殊条件下采取的特殊策略，无可厚非；六十一位同志本身更是在狱中坚持长期斗争的好同志，当然不应为此而蒙冤受屈。但此刻如果明说此事是经中央研究批准，“炮打无产阶级司令部”的罪名也担待不起。闻天考虑再三，决定给知道此案经过的中央文革顾问康生去信，闻天用了一个较为模糊的概念，说此事回忆结果是“经中央批准”，这样回答是否可以，请他查查文件。"},{"type":"paragraph","text":"闻天接连去了两信，却不见回音。红卫兵“小将”催得急，闻天乃独自承担责任，他答复：六十一人出狱是经过我签字批准的，当时我是中央负责人。并说：“我现在记得，当时我没有把此事报告毛主席，或提到中央特别讨论。”"},{"type":"paragraph","text":"“小将们”欣喜若狂，又揪出了一个“大叛徒”——张闻天！"},{"type":"paragraph","text":"闻天反倒有一种轻松之感，这个坎总算是迈过去了，虽然又多了一顶帽子。"},{"type":"paragraph","text":"可是，阴谋家的卑劣远远超出老实人的意想之外。这事并没有就此了结。"},{"type":"paragraph","text":"一九六八年四、五月间的一天，闻天突然被叫到经济所受审讯。回来后，他对我叙述了这次审讯的经过——"},{"type":"paragraph","text":"今天来了两个身穿军服的人，自称是康生派来的。问了一通六十一人案始末之后，严厉地训斥我，说我在这个问题上“把水搅浑了”。他们说：“这个案子是刘少奇背着中央搞的，你张闻天为什么承认是你批准的？以后再瞎说，后果由你负责！你应该给子孙后代留条后路！”这明明是暗示我重写材料，把责任推给刘少奇。我当场拒绝了他们，告诉他们：“要整就整我吧，我不能说假话，陷害人。”"},{"type":"paragraph","text":"闻天讲完了这段经过，轻声对我说：“我可能会被逮捕。”"},{"type":"paragraph","text":"果然不出闻天所料，隔不几天，五月十六日，景山后街甲1号我们的寓处开来了一个班的武装，宣布对我们实行‘监护’，就地将我们隔离开来，把我们两人分别关在两间冬冷夏热的小屋子里。......"},{"type":"paragraph","text":"我们被这样分隔拘禁，长达五百二十三天，阴谋家终于没有从闻天嘴里挖出他需要的那句话来。"},{"type":"paragraph","text":"(原载《回忆张闻天》第334—337页)"},{"type":"paragraph","text":"[附]"},{"type":"paragraph","text":"萧荻：《历史不容忘记》(节录)"},{"type":"paragraph","text":"—记南开大学清查“抓叛徒活动”的前前后后"},{"type":"paragraph","text":"祸及全国的一场大迫害"},{"type":"paragraph","text":"那是一九六六年十一月，南天大学造反组织两个骨干在北京图书馆从敌伪报纸上查到高仰云同志一九三六年经党组织营救、办理出狱手续的材料，一时之间如获珍宝，便向“中央文革”写报告，诬陷高仰云和几十位中央和地方领导同志是“叛徒”，同时以南大“八一八”造反组织的名义张贴大字报，发表《告全国人民书》，抢先把诬陷材料公布于众，自以为是抢到了“爆炸性新闻”！"},{"type":"paragraph","text":"“四人帮”和康生等人对此备加赞赏，并加以充分利用。他们百般赞扬南开大学造反组织“八一八”和“卫东”抓出“六十一人叛徒集团”有功，关批准同意，“抓叛徒”成员以“中央特许”和“中央专案组”名义，到各地任意抄家、抓人、审讯和查阅机密档案；同时亲自向南开大学两派造反组织的头头部署调查一些老干部的所谓“历史问题”，从而使“抓叛徒”活动祸及全国。"},{"type":"paragraph","text":"在笔者面前摆着一份历史见证。那是当年南大造反组织留下的原件。其中有一段是这样记载着："},{"type":"paragraph","text":"“......我们派出了几十个抓叛徒小分队、几百个专案调查组，调查人员出动了几万人次，行程约一百五十万公里(其长度可绕地球三十七周半)。从海南岛到黑龙江，从天山脚下到东海之滨，从云贵高原到福建前线，从大江南北到长城内外，除台湾、西藏外全国二十多个省、几百个城市都留下了我‘八一八’战士的足迹，共计调查了北京、太原、济南、武汉、开封、南京、苏州、杭州、保定等十二个敌伪反省院材料......”"},{"type":"paragraph","text":"自然，对立的一派“卫东”也不示弱。后来的“北航红旗”、“西安交大文革委员会”、“北京化工学院”等所谓“联调”更是紧紧跟上，加上各个当地单位内部的造反组织，一时“抓叛徒”热如火如荼。仅据当时南大两派组织宣称，这一活动迫害十二级以上领导干部即达一千二百余人。"},{"type":"paragraph","text":"一场惨绝人寰的大迫害，其矛头恰恰是指向为了建立新中国、为了给广大青年包括这些造反者本人开辟光明前途而呕心沥血奋斗几十年的老同志。"},{"type":"paragraph","text":"阴谋家的导演"},{"type":"paragraph","text":"象“抓叛徒”活动中所迫害的“六十一个”和越来越多的老同志，他们的襟怀不但是坦白的，脚步是光明的，而且历史是一清二楚的。"},{"type":"paragraph","text":"然而，欲加之罪何患无词？对这一特殊情况加以歪曲岂不更加蛊惑人心？作为老谋深算的野心家康生自然不会放过这一加害老干部的良机，尽管早在“文化大革命”前，以毛泽东同志为首的党中央对六十一人出反省院的问题是审查过的，对他们这段历史是知道的，一直认为是没有问题的。康生之流还是瞒天过海纵容和导演了这场骇人听闻的大迫害。在十年浩劫那一极端困难的条件下，周总理值班室针对“八一八红色造反团”要用大传单形式向全国广泛宣传“叛徒”材料的作法，打来电话，“总理要你们把材料交上来。在中央没有审核以前，不能用报纸形式发表”。我们敬爱的周总理这一极其重要的指示，竟公然被造反派肆意篡改和歪曲。老革命家张闻天同志首当其冲，早在一九六七年一月就遭受到了“八一八红色造反团”的非法审讯。但他铁骨铮铮，在“六十一人案件”问题上不推诿，不含糊，忍辱负重，顾全大局，独自承担责任。直至一九七六年，他冤死江南。在年老力衰、失去自由的情况下，张闻天同志在肇庆被监护时期写了《党内斗争要正确进行》、《无产阶级专政下的政治和经济》等重要文章，就“大跃进”到“文化大革命”这一段曲折历史提供的教训痛切陈辞。周总理舍生忘死对受冤老干部的尽力保护，张闻天同志无所畏惧地为坚持真理以命相争，他们这大义凛然的光辉形象将彪炳千秋流芳万古！而康生、“四人帮”之流机巧权变诬害忠良，终将在历史审判台上蜷缩在一个很不光彩的角落。"},{"type":"paragraph","text":"当法制荡然无存时"},{"type":"paragraph","text":"不要证据，不许申辩，事实可以随意捏造，剩下的就只有无尽无休的逼、供、信，加上拳打脚踢，棍棒齐飞，视人命如草芥的精神折磨和人身侮辱。"},{"type":"paragraph","text":"安徽教育学院副院长曹建培同志，是一位一九三七年到延安并于转年入党的老干部，他在接受重任赴新疆开辟工作中，一九四三年被反动军阀盛世才捏造罪名关进监狱，后经党组织营救，同马明方等一百三十一人于一九四六年七月回延安。经党组织审查，曹建培同志的结论是“在狱中政治立场坚定”。但，就是这样一位历经敌人风刀霜剑坚强不屈又已早作结论的老同志，也没有逃脱悲惨的厄运。"},{"type":"paragraph","text":"一九六七年南开大学造反组织为扩大“六十一个”“战果”，派人到合肥和当地造反派一起，对曹建培刑讯逼供达二十九次，那是日夜不休的“车轮战”。有一次从晚上逼打他惨叫到第二天凌晨四点。连续的刑讯毒打，使曹建培同志头、腰、背、腿多处受伤、口吐黄水、血水，直到胃病复发，溃疡穿孔。动手术后第四天，那些狂热的刑讯者为了“在咽气前抢下口供”，又对他进行了连续四天七次突击审讯，终于在三月二十六日凌晨，使曹建培同志含冤死去。"},{"type":"paragraph","text":"这位坚强的老同志至死也没有承认自己是什么“叛徒”，因为那是诬陷！"},{"type":"paragraph","text":"“凡是住过反省院的，不分青红皂白，全定为叛徒”，这就是造反组织荒唐的逻辑。在南京化学化肥公司审讯政治部主任方立凡这位老干部时，外来的造反组织手里什么材料也没掌握，硬是把别人在三十年代写的什么启事念了一遍，逼方立凡承认写过这东西。方立凡拒不承认。审讯者大声喝斥：“承认不承认，叛徒的案也翻不了！”谁知这一套讹诈式的审问中所念的材料，竟被当地造反组织抄成大字报公布，使他备受折磨。南开大学去的造反者“放一枪就跑了”，但方立凡同志却被置于绝境。跳楼自杀身亡。"},{"type":"paragraph","text":"为了人的尊严"},{"type":"paragraph","text":"中共天津市委对清理南大“抓叛徒”一案给以很大的重视，不仅组织了市属十七个单位进行联合办案，并请中央指委核查小组牵头，组织了有关省、市进行协作。市有关部门和南大负责同志组成领导小组，在清理工作中，把主要力量放在调查核实上。"},{"type":"paragraph","text":"这和当年法制遭践踏的情况，正好形成鲜明的对照。南大党委首先深入开展了彻底否定“文化大革命”的教育。他们对当年曾参加过两派组织的群众，不加歧视；同时不分哪派，吸收其中了解情况并积极向组织反映情况的同志参加校系两级核查班子，充分发挥知情人的作用。这样，很快解脱了大多数，把力量集中到搞清“抓叛徒”一案的来龙去脉，和核查重点审查对象上来。核查，一切都要有足够的事实根据。天津有关各部门的同志们，下大力清理了天津档案馆和其他部门保存的有关“文革”的材料，并到中央档案馆等部门查阅了当年南大两派造反组织上报“中央文革”的有关材料。这些“笨工作”一直做到这样细致；举凡“文革”期间的两派小报、讲用材料、来往信件、大字报底稿、外调介绍信存根、入党志愿书......直至车票的报销存根，都被一一分析整理，按人头建立了一千一百多张卡片。"},{"type":"paragraph","text":"与此同时，各有关单位开展了深入细致的调查取证工作。塘沽盐场为弄清一个有关人的问题，先后到六个省、市五十四个单位进行了细致艰苦的调查核实。"},{"type":"paragraph","text":"核查工作自始至终在严格的政策指导下进行。只有头衔而错误事实不多的人被实事求是地一一剔除。清查结果，在区别对待的方针下，对一些组织、指挥、策划“抓叛徒”造成严重后果的少数首要分子以及具体指挥刑讯逼供，提供诬陷材料，造成严重后果，而又态度不好的几个责任者定为“三种人”，开除出党；对犯有上述罪错，干了一段但中途退出，态度又较好的人，定为犯严重犯错误；对于清查属于一般性错误，态度较好的人，则及时解脱和使用；对在过去已作过处理，这次整党没有发现新的重大问题的，仍维持原结论，但由于罪错实属严重，有的在整党中不予登记。如“文革”中造反起家的陈相文，在十年浩劫中，他派人抄党委书记高仰云同志的家，派人去北京从伪报中查找老干部的所谓“罪状”，到外地大肆宣讲所谓“抓叛徒”的“功绩”，扬言“我们怀着打不尽豺狼决不下战场的决心，杀出南开园，踏遍全中国”！并因此被认为有“功”，一九七一年后，先后升任市委委员、团市委书记、团中央“十大”筹备组副组长，直至“四人帮”倒台后被审查期间仍不老实。在清查中，经过反复调查核实，证据确凿，被清除出党。《天津日报》对此公之于众，并以《大快人心事》为题配发了评论员文章。还有一个学生除了积极参与“抓叛徒”罪恶活动，又有触犯刑律的行为，尝了铁窗风味。这算是两个比较特殊的处理。至于其它人，包括在“抓叛徒”中错误十分严重并受到开除党籍处分的，都留有余地，也没有公开点名，期待他们自重、自新。"},{"type":"paragraph","text":"(原载《蓝盾》1985年第7期)"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":244,"page_end":259,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘格平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"彭真","type":"人物"},{"name":"张闻天","type":"人物"},{"name":"刘澜涛","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"山西文革","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wengeqianqixinianlu3","name":"十年文革前期系年录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录3.pdf"],"article":{"title":"第一三四卷","parts":[{"type":"title","text":"第一三四卷"},{"type":"paragraph","text":"1968年8月27日至9月1日8月27日"},{"type":"paragraph","text":"康生、曹轶欧指使中共中央组织部长郭玉峰编造《关于三届人大常委委员政治情况的报告》和《关于四届全国政协常委委员政治情况的报告》。把全国人大常委委员包括委员长朱德在内的六十人分别诬为“叛徒”、“叛徒嫌疑”、“特务”、“特嫌”、“反革命修正主义分子、走资派、三反分子”、“有严重问题”等，占一百一十五名常委委员的百分之五十二以上；把七十四名全国政协常委委员分别诬陷为“叛徒”、“叛徒嫌疑”、“特务”、“特嫌”、“国特”、“反革命修正主义分子”、“里通外国分子”等，占一百五十九名政协常委委员的百分之四十六以上，连梁思成、童第周、华罗庚、茅以升等国内外著名科学家也未能幸免。8月28日"},{"type":"paragraph","text":"中央发布关于成立西藏自治区革命委员会的批示。"},{"type":"paragraph","text":"毛主席批示：照办。"},{"type":"paragraph","text":"中共中央、国务院、中央军委、中央文革关于成立西藏自治区革命委员会的批示"},{"type":"paragraph","text":"中央同意中共西藏军区委员会关于成立西藏自治区革命委员会的请示报告。"},{"type":"paragraph","text":"中央热烈祝贺西藏自治区革命委员会胜利诞生。"},{"type":"paragraph","text":"西藏是我国反对美帝、反对苏修、反对印度反动派斗争的西南前哨。战略地位十分重要，阶级斗争十分复杂。它长期受反动的农奴主阶级的残酷统治和英帝国主义、印度反动派的掠夺，美帝、苏修、蒋匪帮也派遣了许多特务，党内最大的一小撮走资本主义道路的当权派中国赫鲁晓夫等人及其在西藏的代理人周仁山、王其梅等勾结达赖、班禅叛国集团和国民党反动派的残渣余孽，妄图复辟封建农奴制度和资本主义。"},{"type":"paragraph","text":"在伟大领袖毛主席亲自发动和领导的无产阶级文化大革命中，西藏的无产阶级革命派和各族革命群众，高举毛泽东思想伟大红旗，同阶级敌人进行了激烈的搏斗，粉碎了他们的反革命迷梦。这是战无不胜的毛泽东思想的伟大胜利，是毛主席无产阶级革命路线的伟大胜利。人民解放军驻西藏部队广大指战员，在“三支”“两军”工作中作出了巨大的成绩。"},{"type":"paragraph","text":"中央同意由曾雍雅同志任西藏自治区革命委员会主任，任荣、陈明义等十三位同志任副主任。另留二名副主任，以后增补。"},{"type":"paragraph","text":"中央希望：西藏自治区革命委员会要更高地举起毛泽东思想伟大红旗，更广泛深入地开展活学活用毛泽东思想的群众运动，大力办好毛泽东思想学习班，落实毛主席的一系列最新指示。要紧跟毛主席的伟大战略部署，在以毛主席为首、林副主席为副的无产阶级司令部的英明领导下，统一认识，统一步伐，统一行动，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"要狠抓两个阶级、两条道路、两条路线的斗争，深入宣传和坚决贯彻执行毛主席亲自批发的“七·三”布告、“七·二四”布告，引导两派革命群众组织和广大革命群众，团结起来，共同对敌。认真清理阶级队伍，稳、准、狠地打击阶级敌人。"},{"type":"paragraph","text":"要持续深入地开展革命的大批判，把中国赫鲁晓夫及其在西藏的代理人周仁山、王其梅之流的反革命修正主义路线批倒批臭。"},{"type":"paragraph","text":"坚决响应伟大领袖毛主席的号召：“在革命的原则下，按照系统，按照行业，按照班级，实现革命的大联合”，克服山头主义、小团体主义，巩固和发展革命的大联合和三结合，“认真搞好斗、批、改”。对某些尚未完善的县革命委员会，应当通过两派革命群众的充分协商，予以调整、充实和加强。"},{"type":"paragraph","text":"继续发扬“拥军爱民”、“拥政爱民”的光荣传统，进一步加强军内团结，军民团结，加强工人阶级的领导作用和各族人民的团结，防止阶级敌人挑拨离间。"},{"type":"paragraph","text":"加强敌情观念，百倍提高革命警惕，加强无产阶级专政，严防美蒋特务、苏修特务、印度特务的破坏活动。加强战备，巩固边防，保卫祖国。如果印度反动派胆敢侵犯我国神圣领土，我们必须“坚决、彻底、干净、全部地歼灭之”。把祖国的西南边疆建设成为伟大的钢铁长城。"},{"type":"paragraph","text":"认真贯彻执行毛主席“抓革命、促生产、促工作、促战备”的方针，迅速恢复交通运输，努力发展工农业生产和国防建设事业，争取革命、生产双丰收。"},{"type":"paragraph","text":"中央相信：西藏自治区革命委员会成立以后，一定能够更快地传达、更好地贯彻执行伟大领袖毛主席和以毛主席为首、林副主席为副的无产阶级司令部的一切指示和战斗号令，夺取无产阶级文化大革命的全面胜利，把西藏建设成为红彤彤的毛泽东思想大学校。8月末"},{"type":"paragraph","text":"到8月底，首都59所大专院校已全部进驻了工人毛泽东思想宣传队。"},{"type":"paragraph","text":"从本月底起，各地陆续向大专院校、中等专业学校和县、镇以上中小学派驻工宣队，领导学校的斗、批、改。农村中，则由贫下中农陆续向学校派出代表或毛泽东思想宣传队，在社、队革命委员会领导下，成立以贫下中农为主，有教师代表参加的贫下中农管理学校委员会（组）（简称“贫管会”）或教育革命委员会（组），把本社、队范围的中小学管了起来。贫下中农管理学校后，宣布废除校长负责制，组织贫下中农讲师团，学校的一切重大工作，均由“贫管会”决定。有些地方还采取了清理、下放原有教师，选用在乡知识青年充任教师，聘请贫下中农任兼职教师等一系列改革措施。8月"},{"type":"paragraph","text":"吴法宪、黄永胜联名写信给负责罗瑞卿专案组的叶群，攻击罗是“罪大恶极的反革命分子，十分狡猾，可恶至极。”9月1日"},{"type":"paragraph","text":"中央发布关于成立新疆维吾尔自治区革命委员会的批示。"},{"type":"paragraph","text":"毛主席批示：照办。"},{"type":"paragraph","text":"中共中央、国务院、中央军委、中央文革"},{"type":"paragraph","text":"关于成立新疆维吾尔自治区革命委员会的批示"},{"type":"paragraph","text":"中央同意中共新疆军区委员会关于成立新疆维吾尔自治区革命委员会的报告。"},{"type":"paragraph","text":"中央批准新疆维吾尔自治区革命委员会常委委员名单，批准由龙书金同志任主任，王恩茂、赛福鼎等九位同志任副主任，另缺副主任三人待补。"},{"type":"paragraph","text":"中央热烈庆贺新疆维吾尔自治区革命委员会的胜利诞生。"},{"type":"paragraph","text":"新疆地处祖国西北，战略地位十分重要。在境外，有苏修、蒙修、美帝和印度反动派的挑衅，在境内，有民族分裂主义分子、里通外国分子和国民党反动派的残渣余孽以及没有改造好的地、富、反、坏、右分子的破坏活动，阶级斗争极其复杂和尖锐。长期以来，党内最大的一小撮走资本主义道路当权派中国赫鲁晓夫等人及其在西北和新疆的代理人习仲勋、刘澜涛和武光、吕剑人、张仲瀚、伊敏诺夫、包尔汉等，同这些内外敌人相勾结，妄图把新疆变为修正主义的基地，复辟资本主义。"},{"type":"paragraph","text":"在伟大领袖毛主席亲自发动和领导的无产阶级文化大革命中，新疆各族无产阶级革命派和广大革命群众，高举毛泽东思想伟大红旗，同这些阶级敌人进行了反复、激烈的斗争，粉碎了他们的反革命罪恶阴谋。这是战无不胜的毛泽东思想的伟大胜利！这是毛主席革命路线的伟大胜利！"},{"type":"paragraph","text":"在毛主席关于“人民解放军应该支持左派广大群众”的伟大号召下，人民解放军驻新疆部队和新疆军区生产建设兵团担负起了“三支”“两军”的光荣任务，为新疆的无产阶级文化大革命作出了巨大的成绩。"},{"type":"paragraph","text":"中央希望：新疆维吾尔自治区革命委员会成立以后，要更高地举起毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，在以毛主席为首、林副主席为副的无产阶级司令部的领导下，用毛泽东思想统一认识，统一步伐，统一行动，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"要念念不忘毛主席关于“新疆的主要危险来自苏联现代修正主义”的教导，加强敌情观念，高度警惕内外敌人的一切阴谋破坏。深入宣传和坚决执行毛主席亲自批发的“七．三”和“七．二四”布告，紧密团结各族人民，一致对敌。"},{"type":"paragraph","text":"要更广泛地举办毛泽东思想学习班，活学活用毛主席著作，“斗私、批修”，增强无产阶级党性，反对资产阶级派性，批判反动的“多中心即无中心论”，全面落实毛主席的一系列最新指示。"},{"type":"paragraph","text":"要坚决响应毛主席的号召：“在革命的原则下，按照系统，按照行业，按照班级，实现革命的大联合”，克服宗派主义、山头主义，巩固和发展革命的大联合和革命的三结合。"},{"type":"paragraph","text":"要狠抓两个阶级、两条道路、两条路线的斗争。持续深入地开展革命大批判，把中国赫鲁晓夫及其在新疆的代理人批倒批臭。认真清理阶级队伍，区别两类不同性质的矛盾，稳、准、狠地打击一小撮阶级敌人。"},{"type":"paragraph","text":"要继续发扬“拥军爱民”、“拥政爱民”的光荣传统，进一步加强民族团结、军民团结、军政团结，巩固边防，保卫祖国。帝、修、反如敢于来犯，就“坚决、彻底、干净、全部地歼灭之。”"},{"type":"paragraph","text":"要进一步“抓革命、促生产、促工作、促战备”，争取革命、生产双丰收。"},{"type":"paragraph","text":"要坚决实行毛主席关于“革命委员会要实行一元化的领导，打破重迭的行政机构，精兵简政，组织起一个革命化的联系群众的领导班子”的方针，加强各级革命委员会的领导，巩固无产阶级专政。"},{"type":"paragraph","text":"毛主席教导我们说，“我国有七亿人口，工人阶级是领导阶级。要充分发挥工人阶级在文化大革命和一切工作中的领导作用。工人阶级也应当在斗争中不断提高自己的政治觉悟。”新疆有五十万左右的产业工人，应该充分认识历史赋予工人阶级的伟大使命，在正在到来的新的斗、批、改高潮中，认真学习毛泽东思想，切实发挥自己的领导作用，为夺取无产阶级文化大革命的全面胜利立新功。"},{"type":"paragraph","text":"中央相信：新疆维吾尔自治区革命委员会，只要坚决依靠工人阶级和贫下中农、贫苦牧民，依靠各族革命人民群众，依靠人民解放军，就一定能够取得一个又一个的胜利，把新疆建设成为各族人民红彤彤的毛泽东思想大学校。"},{"type":"paragraph","text":"两报一刊发表《把新闻战线的大革命进行到底》一文。"},{"type":"paragraph","text":"《把新闻战线的大革命进行到底"},{"type":"paragraph","text":"——批判中国赫鲁晓夫反革命修正主义的新闻路线》"},{"type":"paragraph","text":"在无产阶级文化大革命中，新闻战线经历了和经历着极其剧烈的阶级斗争。"},{"type":"paragraph","text":"新闻事业，包括报纸、刊物、广播、通讯社，统统是阶级斗争的工具。它们的宣传、影响着群众的思想情绪和政治方向。无产阶级同资产阶级争夺新闻阵地领导权的严重斗争，是无产阶级同资产阶级在思想战线上的生死搏斗。"},{"type":"paragraph","text":"毛主席历来十分重视无产阶级的新闻事业。早在二十年前，毛主席就指出：办好报纸，"},{"type":"paragraph","text":"（1）在中国革命的长期阶级“这是党的工作中的一项不可小看的、有重大原则意义的问题”。1）在中国革命的长期阶级斗争中，毛主席提出了一条完整的无产阶级新闻路线。按照这条路线，无产阶级新闻事业必须为无产阶级的政治路线服务，必须成为无产阶级革命和无产阶级专政的有力武器。"},{"type":"paragraph","text":"中国赫鲁晓夫等党内一小撮最大的走资派，一贯仇视和反对毛主席的无产阶级新闻路线。他们代表帝国主义、国民党反动派和地、富、反、坏、右的利益，疯狂推行反革命的资产阶级新闻路线，把叛徒、特务、走资派安插到各个新闻单位中，妄图使新闻事业变成颠覆无产阶级专政、复辟资本主义的工具。"},{"type":"paragraph","text":"在急风暴雨般的无产阶级文化大革命中，报纸是各地各派政治力量斗争的焦点之一，几乎无一例外。经过斗争，中国赫鲁晓夫及其新闻界的代理人被揪出来了。他们所推行的资产阶级新闻路线，遭到了可耻的破产。然而，阶级斗争并没有结束，无产阶级同资产阶级争夺报纸领导权的斗争并没有结束。因此，大立毛主席的无产阶级新闻路线，对反革命修正主义新闻路线进行彻底的清算，是摆在我们面前的一个重要任务。"},{"type":"paragraph","text":"为社会主义革命大喊大叫，还是为实行资本主义鸣锣开道"},{"type":"paragraph","text":"一九四九年十月一日，新中国象一轮红日从东方喷薄而出。民主革命基本结束，伟大的社会主义革命开始了。"},{"type":"paragraph","text":"还在一九四八年四月，毛主席在《对晋绥日报编辑人员的谈话》这篇光辉著作中，就已经提出：“同志们是办报的。你们的工作，就是教育群众，让群众知道自己的利益，自己的任务，和党的方针政策。”“要教育人民认识真理，要动员人民起来为解放自己而斗争”。因此，作为无产阶级专政的舆论工具，新中国的新闻事业必须为民主革命转变为社会主义革命扫清道路。"},{"type":"paragraph","text":"中国赫鲁晓夫极力反对民主革命向社会主义革命的转变。他胡说什么要“让资本家存"},{"type":"paragraph","text":"（2）。他要求报纸为在中国实行资本主义鸣锣开道。在和发展几十年”2）。他要求报纸为在中国实行资本主义鸣锣开道。"},{"type":"paragraph","text":"就在毛主席《对晋绥日报编辑人员的谈话》发表半年之后，中国赫鲁晓夫针锋相对地抛出了大毒草《对华北记者团的讲话》，公然同毛主席的办报思想相对抗。"},{"type":"paragraph","text":"在这篇讲话中，他提出一个“为读者服务”的超阶级的资产阶级口号。他胡说道：“你"},{"type":"paragraph","text":"（3）们是为读者服务的，为看报的人服务的。看报的人说好，你们的工作就是作好了。”3）"},{"type":"paragraph","text":"“读者”是划分为阶级的。不同阶级的读者，决没有相同的爱憎。中国赫鲁晓夫要为之“服务”的是哪个阶级的“读者”呢？翻一翻他在有伟大历史意义的七届二中全会之后的几次“讲演”，就十分清楚了。"},{"type":"paragraph","text":"一九四九年四月，党的七届二中全会刚刚开过，他立刻跑到天津去为资产阶级大声疾呼：“现在我们的报纸，在宣传上对自由资产阶级连第四位也没有，重点不是团结，而是打"},{"type":"paragraph","text":"（4）他大声疾呼：“在宣传上有自由资产阶级的地位”5）！"},{"type":"paragraph","text":"（5）！击，这也是不妥当的”4）他大声疾呼：“在宣传上有自由资产阶级的地位”5）！"},{"type":"paragraph","text":"五月，他在北京又愤愤不平地说：报纸上“每天都是工人们的好消息，但和资本家就"},{"type":"paragraph","text":"（6）他卖力地替资本家“请命”：“资本家反映说我们的报纸不不好，没有登他们的好消息。”6）他卖力地替资本家“请命”：“资本家反映说我们的报纸不好，我说的确有点不大好，我也承认这个错误，我们的报纸是有一点偏向的，以后应该采取："},{"type":"paragraph","text":"（7）！是就是，非就非，好就好，坏就坏”，“资本家有好就说好，工人不好就说不好”7）！"},{"type":"paragraph","text":"八月，他又跑到东北操着资本家的腔调说：“资本家感觉到平时说对我们很好，但是报"},{"type":"paragraph","text":"（8）上就说我们坏，工人的好事登报，资本家的坏事登报。”8）"},{"type":"paragraph","text":"中国赫鲁晓夫是多么卖力地一而再、再而三地为资产阶级的地位而拼命叫喊啊！这个资产阶级的头号代理人，他所谓的“读者”，不是别的，正是他的主子资产阶级！"},{"type":"paragraph","text":"毛主席在七届二中全会的报告中指出：中国革命在全国胜利并解决了土地问题以后，国内的基本矛盾就是“工人阶级和资产阶级的矛盾”。有了资产阶级的地位，就没有无产阶级的地位；有了资本主义的地位，就没有社会主义的地位。中国赫鲁晓夫为资本家在报纸上争“地位”，正是为了推翻无产阶级的领导，在中国发展资本主义。果然，电台里播出了美化中国赫鲁晓夫的好朋友、天津大资本家宋棐卿的通讯《我的梦实现了！》报纸上注销了公开叫嚣发展农村资本主义的黑社论《为华北农民生活的富裕而奋斗》，注销了“勤劳发家，生产致富”，“要发家，种棉花”等鼓吹农村资本主义自发势力的口号。"},{"type":"paragraph","text":"资本家得意忘形了，地主富农眉开眼笑了；他们的代理人给他们送来了发展资本主义的“好消息”！"},{"type":"paragraph","text":"中国赫鲁晓夫的“是非”、“好坏”，是很鲜明的。他看到我们的报纸“偏向”无产阶级，“偏向”社会主义，就大为不满；资本家皱了一下眉头，他就赶忙去承认“错误”，竭尽奴颜婢膝之能事。真是一条资本家的忠实走狗！而那些走狗的走狗，反革命修正主义分子陆定一之流，还居然提出“我们党的报刊应适应包括资产阶级在内的各个阶级的需要”，并且下令各级党报“都不必公开宣传是中共机关报，也不必说是政府机关报，只称某地某报即可。”（9）为了讨资本家的喜欢，为了顺顺利利地把党的新闻事业变成实行资本主义的工具，他们干得是何等的彻底，连共产党的牌子都不要了。真是卑鄙无耻到了极点！"},{"type":"paragraph","text":"毛主席说：“一个新的社会制度的诞生，总是要伴随一场大喊大叫的，这就是宣传新制"},{"type":"paragraph","text":"（10）中国赫鲁晓夫反其道而行之，极力要使无产阶级新闻度优越性，批判旧制度的落后性。”10）中国赫鲁晓夫反其道而行之，极力要使无产阶级新闻事业开倒车，把它变成阻挡社会主义潮流、发展资本主义制度的反动工具。但是，“想要阻挡潮流的机会主义虽然几乎到处都有，潮流总是阻挡不住的，社会主义到处都在胜利地前进，"},{"type":"paragraph","text":"（11）在毛主席革命路线的指引下，伟大的中国社会主义革命，把一切绊脚石抛在自己的后头。”11）在毛主席革命路线的指引下，伟大的中国社会主义革命，冲破走资派的重重阻拦而迅猛前进了。"},{"type":"paragraph","text":"中国赫鲁晓夫的自由化方针和资产阶级右派的进攻"},{"type":"paragraph","text":"一九五六年，正当我国经济战线上在所有制方面的社会主义改造基本完成之后，不甘心退出历史舞台的资产阶级及其代理人，趁着苏共“二十大”以后现代修正主义大出笼、大泛滥的机会，妄图从政治上反攻倒算，重新夺回他们已失去的阵地。这时候，中国赫鲁晓夫以为“变天”的气候已到，在五、六月间的短短二十几天内，连续三次召集新闻界一小撮走资派，下达黑指示，制定黑纲领，以便控制新闻工具，为他复辟资本主义摇旗呐喊。"},{"type":"paragraph","text":"中国赫鲁晓夫的三次讲话，又臭又长，谬论百出，驳不胜驳。总其一点，是反对毛主席的无产阶级新闻路线，赤裸裸地主张资产阶级自由化，为全国右派的猖狂进攻鸣锣开道。这里，只把其中的主要三条拿来示众："},{"type":"paragraph","text":"一曰：“新华社做国家通讯社好，还是当老百姓好”。我看，不做国家通讯社，当老百姓好（12）。为什幺呢？他气急败坏地嚷道：“现在什幺东西都变为官办，连农业合作社也成为"},{"type":"paragraph","text":"（13）官办的”，新华社应该“民办”，“不要老是强调官方身份，更不要把自己束缚得死死的”。13）“官办”者，即无产阶级专政。中国赫鲁晓夫认为无产阶级专政使资产阶级新闻路线受到“束缚”，要求有反对无产阶级专政、复辟资产阶级的“自由”。毛主席教导我们：在阶级消灭之"},{"type":"paragraph","text":"（14）新闻事业必前，不管报纸、刊物、广播、通讯社都有阶级性，都是为一定阶级服务的。14）新闻事业必定要受一定阶级的领导或曰“束缚”，所谓不受“束缚”的新闻事业是根本不存在的。不受无产阶级的束缚，就受资产阶级的束缚，二者必居其一，当今世界上哪里有什幺超阶级的报纸呢？"},{"type":"paragraph","text":"资产阶级早就标榜他们的报纸是“民间”的，是“从党派中摆脱出来”，“不受党派关"},{"type":"paragraph","text":"（15）的。但是，一百多年过去了，这些挂着“民”字招牌的报纸，仍旧只能充当系的约束”15）的。但是，一百多年过去了，这些挂着“民”字招牌的报纸，仍旧只能充当某一党派、某一财团的工具。中国赫鲁晓夫鼓吹的什么“民办”，什么“当老百姓”，也统统不过是幌子，是代表资产阶级向无产阶级争“自由”，夺“权利”，要求解除“束缚”的一种手段。可见，所谓“民办”，就是取消无产阶级的领导，取消共产党的领导，一句话，就是资产阶级办。"},{"type":"paragraph","text":"二曰：“外国记者强调他们的新闻报道是客观的、真实的、公正的报道；客观的、真实的、公正的报道、是他们的口号。我们如果不敢强调客观的、真实的报道，只强调立场，那"},{"type":"paragraph","text":"（16）看，中国赫鲁晓夫这个十足的洋奴，对“外末，我们的报道就有主观主义，有片面性。”16）看，中国赫鲁晓夫这个十足的洋奴，对“外国”资产阶级记者佩服得五体投地，竟然要无产阶级报纸全盘照搬“他们的口号”。"},{"type":"paragraph","text":"新闻是有阶级性、党派性的，超阶级的“客观的报道”是没有的。资产阶级报纸为了欺骗人民，维持本阶级的罪恶统治，一贯颠倒是非，混淆黑白，对客观事实任意歪曲，对革命人民横加诬蔑，哪有什幺“客观”“真实”“公正”可言！那些“客观”“真实”“公正”之类动听的言词，不过是用来掩盖它们为资产阶级服务、维护资产阶级利益的几片肮脏的遮羞布！"},{"type":"paragraph","text":"无产阶级从来不隐瞒自己的观点。无产阶级的新闻就是要反映无产阶级和革命人民的要求，为绝大多数人的利益服务。无产阶级记者依靠马克思列宁主义、毛泽东思想这个最锐利的武器，不但能够认识客观事物的本质和规律，而且敢于在新闻报道中提示这种本质和规律。只有鲜明地站在无产阶级立场上，才能正确地反映客观实际，中国赫鲁晓夫妄图以资产阶级的“客观”“真实”“公正”的口号取代无产阶级报纸的党性和阶级性，胡说什么：“现在的新闻报道有偏向——只讲好的，有片面性。应该好的要讲，不好的也要讲”，要把（资"},{"type":"paragraph","text":"（17），“不仅对帝国主义讲真本主义国家）那里人家说我们好的、骂我们的东西都加以报道”17），“不仅对帝国主义讲真"},{"type":"paragraph","text":"（18），这一番貌似“不偏不倚”的说教，恰恰是符合一小话，而且对共产党的错误也讲真话”18），这一番貌似“不偏不倚”的说教，恰恰是符合一小撮反动派的利益，只能为资产阶级和帝国主义所欢迎。嘴上说不要立场，实际上自己的屁股却同无产阶级的敌人坐在一条板凳上。所谓“客观”“公正”云云，原来是彻头彻尾的谎言！"},{"type":"paragraph","text":"（19）应当指出，"},{"type":"paragraph","text":"三曰：报纸上“应该有几种不同的意见。这个地方就是‘百家争鸣’。”19）应当指出，在人民内部，我们是允许不同的意见在报纸上进行自由讨论的，“以期由先进的人们以民主"},{"type":"paragraph","text":"（20）但是，对于一切反动派，则和说服的方法去教育落后的人们，克服落实的思想和制度”。20）但是，对于一切反动派，则必须实行舆论一律，不许他们发表“不同的意见”，不给他们一点自由。列宁说得好：“我们不打算把我们的机关报变成形形色色的观点的简单堆砌。相反地，我们将本着严正的明确方"},{"type":"paragraph","text":"（21）。无产阶级的报纸，必须旗帜鲜明地同针办报。一言以蔽之，这个方针就是马克思主义”21）。无产阶级的报纸，必须旗帜鲜明地同形形色色反马克思列宁主义、反毛泽东思想的反动阶级、反动流派、反动思潮作斗争，不进行这种斗争，无产阶级报纸就会丧失自己革命的灵魂。"},{"type":"paragraph","text":"中国赫鲁晓夫以偷天换日的手法，抹杀“百家争呜”的革命方针的阶级内容，妄图用什幺“几种不同的意见”取而代之。正如毛主席一再指出的，所谓“百家”，实为两家，无产阶级和资产阶级各一家，一张报纸的政治倾向，归根到底，不是无产阶级的意见，就是资产阶级的意见；不是宣传马克思列宁主义、毛泽东思想，就是宣传资产阶级、修正主义思想。"},{"type":"paragraph","text":"（22）；“报纸可以自由主义一中国赫鲁晓夫甚至扬言：新华社“以开放为好”，“我主张开放”22）；“报纸可以自由主义一（23）。很清楚，他所鼓吹的“应该有几种不同的意见”，正是为了使形形色色的资产阶级些”23）。很清楚，他所鼓吹的“应该有几种不同的意见”，正是为了使形形色色的资产阶级思想“开放”出来，自由泛滥，不许马克思列宁主义、毛泽东思想有发言权。"},{"type":"paragraph","text":"这就是中国赫鲁晓夫所制定的一整套向资产阶级“开放”的、自由化的修正主义办报方针，对于这一股资产阶级自由化妖风，毛主席屡次给予迎头痛击。一九五七年五月间，毛主席对党内这种相当严重的修正主义思想，作了一次集中的揭露和批判。毛主席指出：“他们否认报纸的党性和阶级性，他们混同资产阶级新闻事业与资产阶级新闻事业的原则区别，他们混同反映社会主义国家集体经济的新闻事业与反映资本主义国家无政府状态和集团竞争的经济的新闻事业。他们欣赏资产阶级自由主义，反对党的领导，他们赞成民主，反对集中。他们反对为了实现计划经济所必需的对于文化教育事业（包括新闻事业在内的）必要的但不是过分集中的领导、计划和控制。他们跟社会上的右翼知识分子互相呼应，联成一起，"},{"type":"paragraph","text":"（24）亲如弟兄。”24）"},{"type":"paragraph","text":"正是中国赫鲁晓夫的一整套资产阶级自由化方针，成了新闻界党内一小撮走资派、资产阶级右派篡夺无产阶级新闻阵地、反党反社会主义的总行动纲领，成了一九五七年资产阶级右派猖狂进攻的动员令。"},{"type":"paragraph","text":"中国赫鲁晓夫三次讲话不久，经过反革命修正主义分子邓拓、吴冷西、梅益之流的具体策划，报纸、广播、通讯社就进行了一系列的所谓“改版”或“改革”。他们要把无产阶"},{"type":"paragraph","text":"（25），以便“让不同见解的人”级专政的舆论工具，改成“公共的武器”、“社会的言论机关”25），以便“让不同见解的人”"},{"type":"paragraph","text":"（26）。新闻界的右倾分子，也一个个如同疯狗一般地狂吠。他们咒骂都能“发表不同的意见”26）。新闻界的右倾分子，也一个个如同疯狗一般地狂吠。他们咒骂党报是“官报”，是“只此一家，别无分处”；他们要“增办非党报纸”，说什么“应该把同人报纸变成报纸的民主党派”，甚至叫嚷“社会主义下的报纸可以唱对台戏，可以小骂大帮（27）。一时间黑云压城城欲摧，摆出了反动的资产阶级新闻路线。新闻界党内一小撮走资忙”27）。一时间黑云压城城欲摧，摆出了反动的资产阶级新闻路线。新闻界党内一小撮走资派与资产阶级右派结成了同盟军，他们篡夺某些报纸的领导权，利用新闻阵地向社会主义举行猖狂进攻。特别值得一提的，是由那位鼎鼎大名的右派分子徐铸成把持的旧《文汇报》。这家很合乎中国赫鲁晓夫口味的，自称是“文人论政”、“论政而不参政”的“超然”的“民办”的报纸，一九五七年成了反党反社会主义的急先锋。它挂起中国赫鲁晓夫那个“客观”“公正”的招牌，大量报道违反事实的反动新闻，大量刊发反动言论，大量采用反动编排，呼风唤雨，推涛作浪，妄图造成天下大乱，以便整垮共产党，由资产阶级右派取而代之。无数事实说明，一九五七年新闻界乌云乱翻，其源盖出于一九五六年中国赫鲁晓夫的三次讲话。"},{"type":"paragraph","text":"毛主席从一开始就看出，在政治思想战线上，资产阶级与无产阶级这一场阶级斗争是不可避免的。一九五七年初，毛主席著名的《关于正确处理人民内部矛盾的问题》和《在中国共产党全国宣传工作会议上的讲话》中，科学地、系统地、深刻地分析了社会主义社会的矛盾、阶级和阶级斗争，阐明了社会主义社会阶级斗争的规律，提出了区分敌我矛盾和人民内部矛盾以及正确处理这两类矛盾的理论、方针和政策，提出了无产阶级的“百花齐放、百家争鸣”的伟大革命方针。毛主席针对当时的政治形势，坚定地指出：“不要怕放，不要怕"},{"type":"paragraph","text":"（28）“牛鬼蛇神只有让他们出笼，才好歼灭他们，毒草只有让它们出批评，也不要怕毒草。”28）“牛鬼蛇神只有让他们出笼，才好歼灭他们，毒草只有让它们出"},{"type":"paragraph","text":"（29）可是，中国赫鲁晓夫的代理人邓拓，竟然在党报上封销毛主席的声音，土，才便于锄掉。”29）可是，中国赫鲁晓夫的代理人邓拓，竟然在党报上封销毛主席的声音，拒不宣传毛主席的伟大战略部署，把党的政策秘密起来；但却听任某些被资产阶级右派把持的非党报纸作歪曲宣传，以保护毒草不在报上暴露，干扰和破坏反击资产阶级右派的伟大斗争。对此，毛主席进行了极其尖锐的批评，指出：党的报纸对党的政策要及时宣传。宣传工作会议未登消息，是个错误。这次会议是党内外人士合开的，为什么不登消息？最高国务会议为什么不发社论？为什么把党的政策秘密起来？这是有鬼，鬼在什么地方？过去说是书生办报，现在应当说是死人办报。你们多半是对中央的方针唱反派，是抵触的，反对中央的方"},{"type":"paragraph","text":"（30）针的，不赞成中央的方针的。30）"},{"type":"paragraph","text":"一切反革命修正主义分子的阴谋诡计，终究是徒劳的。这年七月一日，毛主席亲自为《人民日报》撰写了重要社论《文汇报的资产阶级方向应当批判》。毛主席在这篇光辉文献及一系列有关的指示中，高度概括了一九五七年我国政治思想战线（特别是新闻界）两个阶级的你死我活的斗争，尖锐而深刻地批判了中国赫鲁晓夫一整套资产阶级自由化方针，横扫了新闻界的妖氛迷雾，那些嚣张一时的右派鬼蜮，在毛泽东思想强大的革命威力下遭到了覆灭。"},{"type":"paragraph","text":"一个为复辟资本主义在造舆论的反革命策略"},{"type":"paragraph","text":"一九五九年八月，在庐山会议上，中国赫鲁晓夫卵翼下的彭德怀反党集团，跳出来疯狂反对派总路线、大跃进、人民公社，妄图推翻以毛主席为首的无产阶级司令部。但是，他们的阴谋没有得逞。毛泽东思想伟大红旗高高飘扬，右倾机会主义分子被罢了官。"},{"type":"paragraph","text":"一九六一年，毛主席亲自主持的党的八届九中全会，再一次肯定了“党的社会主义建设总路线、大跃进、人民公社是适合中国的实际情况的”，并尖锐指出“占人口百分之几的极少数没有改造好的地主阶级分子和资产阶级分子......他们总是企图复辟，他们利用自然灾害所造成的困难和某些基层工作中的缺点，进行破坏活动。”"},{"type":"paragraph","text":"时刻梦想着复辟资本主义的中国赫鲁晓夫，又一次把黑手伸向新闻界。在这个时期，中国赫鲁晓夫豢养起来的一小撮走资派，已经控制了许多新闻单位。八届九中全会结束不久，中国赫鲁晓夫就对他在新闻界的代理人说：“报道联系实际不要那幺紧，联系得紧了，报道了当前的具体工作和斗争，要犯错误。你们要学会既联系实际，又与实际保持一定距离。不"},{"type":"paragraph","text":"（31）要围着目前的实际转，也可以报道些与当前斗争关系小些的事情。”31）"},{"type":"paragraph","text":"一面要“与实际保持一定距离”，一面要“报道些与当前斗争关系小些的事情”，这是中国赫鲁晓夫在新的形势下所采取的更阴险、更狡猾的新策略。这个策略，用他的走狗们的话来说，叫做“打迂回战”，就是“不强调直接配合”，而是用“所言者小，所见者大”的手法，从“不同角度”，以“不同形式”，把反党反社会主义反毛泽东思想的“主题”“含蓄”"},{"type":"paragraph","text":"（32）资本主义的复辟活动。在“宛转”的笔调之中，间接“配合”32）资本主义的复辟活动。"},{"type":"paragraph","text":"这是一个极其毒辣的反革命策略！中国赫鲁晓夫在新闻界的代理人对此心领神会，他们直言不讳地说：“搞游记、搞知识，这是政治的需要”！那个臭名昭著的大叛徒邓拓，甚至在北京市四家报刊举行的“神仙会”上，欣喜若狂地叫嚣：要凭着这个策略“努力打开一条"},{"type":"paragraph","text":"（33）！新路”33）！"},{"type":"paragraph","text":"他们打开的是一条什么“新路”呢？吴冷西亲自动手，在党报上开辟了以所谓“匡正时弊”为宗旨的《长短录》专栏；继《燕山夜话》出笼之后，邓拓、吴晗、廖沫沙合股经营的“三家村”黑店也开张营业；广播电台开设了《历史故事》、《阅读与欣赏》等专题节目；许多地方报纸相继出现了《滇云漫谭》、《历下漫话》之类的“知识性”专栏，如此等等。"},{"type":"paragraph","text":"正是沿着这条“新路”，那些叛徒、特务、“三教九流”、牛鬼蛇神、封建阶级的遗老遗少、资产阶级的“学者”“权威”，先是探头探脑、继而大摇大摆地踏进新闻界，成了中国赫鲁晓夫及其代理人的反革命打手。他们互相勾结，互相利用，为了共同的“政治上的需要”，使尽了借古讽今、指桑骂槐、旁敲侧击、瞒天过海的阴谋诡计，大干其反革命勾当。"},{"type":"paragraph","text":"什么“与实际保持一定距离”？完全是骗人的鬼话！请看：他们抬出海瑞、于谦、李三才之类的封建僵尸，露骨地为庐山会议上被罢了官的彭德怀一伙鸣冤叫屈，撑腰打气，这与实际“保持距离”吗？他们利用各种“故事”、“宣言”、“比喻”，不择手段地攻击以毛主席为首的党中央的无产阶级司令部，攻击毛主席的无产阶级革命路线，这与实际“保持距离”吗？他们在所谓“领略古今有用的知识”这个幌子的掩护下，拼命地推销腐朽的地主阶级资产阶级思想，毒害人们的灵魂，瓦解人们的斗志，全面地推行“和平演变”，这与实际“保持距离”吗？事实上，当时正是反革命大毒草在“实际”中疯狂出笼的时期。中国赫鲁晓夫们的所作所为，与“实际”的联系紧得很，曾经卖力推行“保持距离”论的梅益，一语道破了这个“理论”的实质。他说：“看来好象与实际脱节，其实这是最好的联系实际的做法。"},{"type":"paragraph","text":"（34）这个所谓“大的实际”，不就是中国赫鲁晓夫复辟不联系也是联系，联系了大的实际。”34）这个所谓“大的实际”，不就是中国赫鲁晓夫复辟资本主义的“实际”么！"},{"type":"paragraph","text":"什么“与当前斗争关系小些的事情”？不对。这是一场惊心动魄的阶级斗争。他们躲在“与当前斗争关系小些的事情”背后，在意识形态领域中大造反革命舆论。他们使用的是“软刀子割头”的办法，他们是一伙杀人不见血的刽子手，一旦时机成熟，他们就会要推翻无产阶级专政。"},{"type":"paragraph","text":"平地一声春雷。正在这群吃人魔鬼张牙舞爪的时候，伟大统帅毛主席在党的八届十中全会上发出了震天动地的号召：千万不要忘记阶级斗争！毛主席英明地指出：“凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。革命的阶级是这样，反革命的阶级也是这样”毛主席的光辉思想，教育了全党和全国人民，给中国赫鲁晓夫利用舆论阵地复辟资本主义的罪恶活动以粉碎性打击。"},{"type":"paragraph","text":"中国赫鲁晓夫是反对宣传毛泽东思想的罪魁祸首"},{"type":"paragraph","text":"在毛主席的亲密战友林彪同志倡导下，全国出现活学活用毛主席著作的群众运动。林彪同志多次指示报纸，要大力宣传毛泽东思想，要“高举毛泽东思想伟大红旗，按照毛主席"},{"type":"paragraph","text":"（35）。正是这个时候，一九六四年，中国赫鲁晓夫按捺不住他对宣传毛泽东指示的精神办报”35）。正是这个时候，一九六四年，中国赫鲁晓夫按捺不住他对宣传毛泽东思想的无比仇恨，跳出来大骂报纸上宣传毛泽东思想“太多了”，胡说什么“太多了，就有"},{"type":"paragraph","text":"（36）。主子一呼，奴才百应。中国赫鲁晓夫在新闻界的代理人，立即挥舞起“形一定的危险性”36）。主子一呼，奴才百应。中国赫鲁晓夫在新闻界的代理人，立即挥舞起“形式主义”、“简单化”、“庸俗化”三根大棒，竭力阻挠宣传伟大的毛泽东思想，阻挠报道工农兵活学活用毛主席著作的群众运动。他们丧心病狂地叫嚷：“工农兵学习毛主席著作是不能"},{"type":"paragraph","text":"（37）宣传毛泽东思想“不要起哄”。他们公然下令：“学习解放军，学习毛选，立竿见影的”37）宣传毛泽东思想“不要起哄”。他们公然下令：“学习解放军，学习毛选，"},{"type":"paragraph","text":"（38）“学习毛主席著作不提‘高潮’”39）。"},{"type":"paragraph","text":"（39）。有一个时期宣传很多，现在不必那样集中突出了”38）“学习毛主席著作不提‘高潮’”39）。这一伙窃取我国新闻界领导权的反革命修正主义分子，按照中国赫鲁晓夫的旨意，把对毛泽东思想的宣传压缩到了最低限度。稿件中一出现“高举毛泽东思想伟大红旗”、“在毛泽东思想指导下”等字眼，他们就提笔涂掉。对于报道工农兵学习毛主席著作的稿件，他们不是无端扣压，就是采用反动的编排手法加以贬低。"},{"type":"paragraph","text":"人们不禁要问：中国赫鲁晓夫及其在新闻界代理人，一看到报纸上宣传了毛泽东思想就心惊肉跳，一看到发表用毛泽东思想武装起来的英雄典范就拼命攻击，这和帝国主义、现代修正主义和反动派们看到一本《毛主席语录》、一枚毛主席像章，就惶惶然调来大批武装军警，进行搜捕和殴打、到底有什幺区别？！"},{"type":"paragraph","text":"我们的时代是以毛泽东思想为伟大旗帜的新时代。"},{"type":"paragraph","text":"党的八届十一中全会强调指出：“用毛泽东思想武装工农兵群众、革命知识分子和广大干部，进一步促进人的思想革命化，是防止修正主义，防止资本主义复辟，使我们的社会主义和共产主义事业取得胜利的最可靠、最根本的保证”。"},{"type":"paragraph","text":"因此，对伟大的毛泽东思想是宣传还是不宣传或反宣传，这是区别无产阶级报纸和资产阶级报纸的分水岭，也是区别马克思列宁主义者和反革命修正主义分子的试金石。"},{"type":"paragraph","text":"努力宣传毛泽东思想，用毛泽东思想去统帅一切，批判一切，改造一切，这是无产阶级报纸的最根本、最重要的任务
