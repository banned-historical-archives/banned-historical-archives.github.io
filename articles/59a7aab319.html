。"},{"type":"paragraph","text":"毛泽东思想是当代的马克思列宁主义。宣传好毛泽东思想，我们的报纸就能帮助广大群众摆脱剥削阶级思想的影响和束缚，抵制修正主义、资产阶级思想的侵蚀，促进人的思想革命化。"},{"type":"paragraph","text":"毛泽东思想是反对帝国主义的强大的思想武器，是反对修正主义和教条主义的强大的思想武器。社会主义新闻事业作为无产阶级专政的工具，大力宣传毛泽东思想，用毛泽东思想批判资产阶级和一切剥削阶级的反革命思想，是无产阶级在上层建筑其中包括各个文化领域中对资产阶级实行专政的一个重要方面，对于捍卫无产阶级政权，防止苏联资本主义复辟在中国重演，有着极大的意义。"},{"type":"paragraph","text":"毛泽东思想是在无产阶级专政下继续革命的伟大理论，是全党全国一切工作的指导方针。高举毛泽东思想伟大红旗，坚持在一切宣传中突出毛泽东思想，我们的报纸就能正确地指导阶级斗争、生产斗争和科学实验三大革命运动，组织和鼓舞亿万革命人民沿着毛主席指引的航道，把社会主义革命进行到底。"},{"type":"paragraph","text":"毛泽东思想是我们无产阶级报纸的灵魂。宣传好毛泽东思想，我们的报纸才能在巩固无产阶级专政、防止资本主义复辟的长期斗争中，充分发挥“极大的组织、鼓舞、激励、批"},{"type":"paragraph","text":"（40）。宣传好毛泽东思想，这是我们办好报纸的最高标准。中国赫鲁晓夫及判、推动的作用”40）。宣传好毛泽东思想，这是我们办好报纸的最高标准。中国赫鲁晓夫及其新闻界代理人，疯狂破坏毛泽东思想的宣传，妄图阻挡毛泽东思想的大传播、大普及，完全是枉费心机。广大革命人民大学大用毛泽东思想，已经成为我们时代的伟大潮流。毛泽东思想的光辉，照耀着全中国、全世界。"},{"type":"paragraph","text":"无产阶级文化大革命和中国赫鲁晓夫资产阶级新闻路线的破产"},{"type":"paragraph","text":"毛主席亲自发动和领导的无产阶级文化大革命，有如千钧霹雳，猛烈地炸开了中国赫鲁晓夫及其代理人把持的新闻界的反革命独立王国，震撼了中国的大地。中国赫鲁晓夫及其狐群狗党彭真、罗瑞卿、陆定一、周扬之流顿时乱了阵脚。为了挽救最后灭亡的命运，他们慌慌张张炮制了一个颠倒是非、混淆黑白、压制革命、包庇坏人的反革命《二月提纲》。他们施出一连串的阴谋诡计，继续控制报刊，妄图扑灭革命烈火，转移目标，掩护退却。"},{"type":"paragraph","text":"毛主席亲自主持制定的划时代的文献——五月十六日《通知》，给中国赫鲁晓夫们以毁灭性打击。毛主席号召全党高举无产阶级文化大革命的大旗，“彻底批判学术界、教育界、新闻界、文艺界、出版界的资产阶级反动思想，夺取在这些文化领域中的领导权”。一九六七年一月，上海《文汇报》的无产阶级革命派，奋起夺了党内一小撮走资派的领导权，首先从新闻界掀起了伟大的“一月革命”风暴。毛主席对《文汇报》的夺权给予极高的评价，他指出：这是一个大革命，是一个阶级推翻一个阶级的大革命。"},{"type":"paragraph","text":"新闻战线同其它战线一样，文化大革命进入了向党内一小撮走资派展开夺权斗争的新阶段。中国赫鲁晓夫在新闻界的统治势力，全面崩溃了。那些什么《羊城晚报》《南方日报》之类放毒、造谣的旧报纸，一个一个被封了，被冲了，被革命派夺了权。好得很！好得很！这是无产阶级文化大革命的伟大胜利，是战无不胜的毛泽东思想的伟大胜利！"},{"type":"paragraph","text":"新闻战线十八年来尖锐激烈的阶级斗争，为我们提供了极其丰富、极其宝贵的经验教训。"},{"type":"paragraph","text":"第一，坚定不移地、始终一贯地宣传毛泽东思想，是无产阶级报纸、广播、通讯社的根本任务。无产阶级报纸要把宣传毛泽东思想当作自己最神圣的职责。要努力把报纸办成一个学习、传播和普及毛泽东思想的大学校，要用毛泽东思想统帅新闻报道的一切方面，最迅速最准确地传达毛主席的声音，使毛泽东思想同广大工农兵群众结合起来。成为自觉的行动，变为改造世界的无穷无尽的力量。宣传毛泽东思想必须准确。对于歪曲、篡改或违背毛泽东思想的一切言行，特别对于那种打着红旗反红旗的卑鄙做法，无论是来自右的方面，或是来自极“左”方面，都以坚决抵制，坚决反对，彻底批判。封锁毛主席的声音，这是所有反革命修正主义分子共同的卑鄙手段，我们的报纸，必须坚决反其道而行之。这样，报纸就能高高举起毛泽东思想伟大红旗，在各个时期十分鲜明地为广大革命群众指出斗争的方向。"},{"type":"paragraph","text":"宣传毛泽东思想，必须坚持同一切反马克思列宁主义、反毛泽东思想进行针锋相对的斗争。在当前，我们要继续展开对国际上现代修正主义的大揭露、大批判。要进一步批判中国赫鲁晓夫反革命修正主义路线，批判反动的资产阶级的“多中心论”，批判山头主义、宗派主义、个人主义等等资产阶级反动世界观的各种表现，批判一切反无产阶级的反动论点。破字当头，立在其中，毛泽东思想就是同形形色色的资产阶级反动思想斗争中发展起来的。"},{"type":"paragraph","text":"（41）这是毛主席对"},{"type":"paragraph","text":"第二，在世界上存在着阶级区分的时期，报纸总是阶级斗争的工具。41）这是毛主席对于报纸工作的基本观点。无产阶级要把报纸的领导权掌握在自己的手中，使之成为无产阶级专政的工具，资产阶级也力图夺权报纸的领导权，使之成为颠覆无产阶级专政的工具，这是十八年来我国新闻战线上两个阶级斗争的焦点。无产阶级革命派夺权之后，这个斗争并没有结束，那些资产阶级代表人物仍然会以种种卑劣手段，阴谋同无产阶级争夺新闻事业的领导权。因此，认真地清理阶级队伍，清除一小撮死不改悔的走资派、叛徒、特务、反动文人和地、富、反、坏、右分子，是当前新闻界的一项重要的工作。只有做好这一工作，才能树立起无产阶级的新闻队伍，才能在组织上巩固和发展无产阶级文化大革命的伟大成果。各级新闻单位，都要建立一个革命化的、朝气蓬勃的、战斗的领导班子，要大胆提拔一批无产阶级的新生力量，以保证我国新闻事业的领导权牢牢掌握在忠于毛泽东思想，突出无产阶级政治、有革命干劲的无产阶级革命派手中，要注意人是会变化的，必须经常清洗那些腐化分子，不让他们掌握报纸、新闻的工具。"},{"type":"paragraph","text":"第三，必须深入地持久地批判反动的资产阶级新闻路线，全面地肃清其毒害，把新闻界两条路线的斗争进行到底。在当前，除了从历史上全面批判资产阶级新闻路线外，要特别注意批判那种把新闻工具当作只为某一资产阶级、小资产阶级派别服务的极端错误的作法。各地报纸、电台等等必须坚决执行毛主席为首、林主席为副的无产阶级司令部的各项指示，批判资产阶级自由主义。一小撮阶级敌人，为了挽救他们的失败，不择手段地造谣诬蔑、制造“小道消息”，散布种种流言蜚语，妄图以假乱真，把水搅浑，干扰毛主席的伟大战略部署，破坏无产阶级文化大革命。对于这种反革命活动，我们要坚决揭露，坚决打击。广大的革命群众，要善于在复杂的阶级斗争中辨别真伪，识破敌人的阴谋诡计。我们队伍中也还有一些同志，从小山头的私利出发，或者对无产阶级司令部的指示断章取义，各取所需，发表耸人听闻的消息和图片，以制造某种舆论；或者不顾大局，不顾无产阶级的利益，肆意发表各种资料、文件、严重泄露了党和国家的机密；这些都是十分错误的，是资产阶级新闻路线的流毒在文化大革命中恶劣表现，必须坚决加以纠正。毛主席告诫我们：“报上的宣传要看对人"},{"type":"paragraph","text":"（42）“说话，写文章都力求合乎敌人、帝国主义的口味，这是欺骗群众，其结民有利无利”。42）“说话，写文章都力求合乎敌人、帝国主义的口味，这是欺骗群众，其结果是敌人舒服，而自己的阶级被蒙蔽了。”奉劝那些中了资产阶级新闻路线的毒而至今尚不觉悟的人们，好好读读毛主席的这一伟大教导。"},{"type":"paragraph","text":"毛主席的《对晋绥日报编辑人员的谈话》，毛主席历来对新闻工作的一系列指示，是我们无产阶级办报纸、办广播、办通讯社、办一切新闻事业的唯一正确的指针，也是批判反动的资产阶级新闻路线的强大武器。我们要在行动上坚决贯彻执行毛主席的新闻路线，树立无产阶级严肃的科学的战斗的作风。"},{"type":"paragraph","text":"第四，新闻机关要走精兵简政的道路，要坚决贯彻群众路线，密切联系工人阶级和劳动群众。"},{"type":"paragraph","text":"（43）"},{"type":"paragraph","text":"毛主席教导我们：办好报纸的根本问题是报社人员的思想革命化问题。43）"},{"type":"paragraph","text":"“报社的人应"},{"type":"paragraph","text":"（44）经常到下边去，呼吸新鲜空气，不要长住北京。下去的人，又做工作，又当记者。”44）"},{"type":"paragraph","text":"毛主席又说：“我们的报纸也要靠大家来办，靠全体人民群众来办，靠全党来办，而不"},{"type":"paragraph","text":"（45）能只靠少数人关起门来办。”45）"},{"type":"paragraph","text":"毛主席最近又一次指出：“不应当关门办报，应面向群众，又要有大方向，又要新鲜活泼。”"},{"type":"paragraph","text":"一切新闻机关，都要坚决遵照毛主席的伟大教导，勇敢地从各种旧框框、旧习惯的圈子里跳出来，面向群众，实行精兵简政。"},{"type":"paragraph","text":"办报纸、刊物要那么多人干什么？必须精兵简政，必须加强新闻工作者同群众的联系，必须来一个大革命，彻底改变那种轻视工农、关门办报的资产阶级老爷作风，更好地贯彻执行毛主席的群众办报路线。精兵简政是当前办好无产阶级报纸的一项十分重要的组织保证。应当吸收有无产阶级觉悟的有生产实践经验的工人到报社中来，大量培养不脱离生产的工农通讯员，打破知识分子成堆的状况。"},{"type":"paragraph","text":"做新闻工作的人，一定要到工农兵群众中去，一定要同劳动人民结合，一定要站在无产阶级立场上进行充分的调查研究，一定要善于及时反映革命群众中的先进的典型事物，反映无产阶级革命派和广大革命人民前进的呼声，一定要贯彻毛主席历来教导我们的从群众中来、到群众中去、集中起来、坚持下去的路线。不解决这个问题，是办不好无产阶级报纸的，是很容易丧失领导权的。这个问题，尚须进一步解决。"},{"type":"paragraph","text":"让我们高举毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，乘胜前进，把新闻战线上的大革命进行到底！注："},{"type":"paragraph","text":"（1）（45）《对晋绥日报编辑人员的谈话》，一九四八年四月二日。"},{"type":"paragraph","text":"（2）"},{"type":"paragraph","text":"《在天津职工代表大会上的讲话》，一九四九年四月二十八日。"},{"type":"paragraph","text":"（3）"},{"type":"paragraph","text":"《对华北记者团的讲话》，一九四八年十月二日。"},{"type":"paragraph","text":"（4）"},{"type":"paragraph","text":"《对天津工作的初次意见》，一九四九年四月十八日。"},{"type":"paragraph","text":"（5）"},{"type":"paragraph","text":"《对天津工作的指示》，一九四九年四月二十四日。"},{"type":"paragraph","text":"（6）"},{"type":"paragraph","text":"《在全国青年第一次代表大会上的讲话》，一九四九年五月十二日。"},{"type":"paragraph","text":"（7）"},{"type":"paragraph","text":"《在北京干部会议上的讲话》，一九四九年五月十九日。"},{"type":"paragraph","text":"（8）"},{"type":"paragraph","text":"《在东北局干部会上的讲话》，一九四九年八月二十八日。"},{"type":"paragraph","text":"（9）"},{"type":"paragraph","text":"旧中宣部《关于今后各级党报名义不要公开宣传的指示》，一九四九年十二月。"},{"type":"paragraph","text":"（10）《一个整社的好经验》一文按语，一九五五年。"},{"type":"paragraph","text":"（11）毛泽东：《在合作化运动中，工人家属的积极性非常高》一文按语，一九五五年。"},{"type":"paragraph","text":"（12）《对新华社工作的指示》，一九五六年五月二十八日。"},{"type":"paragraph","text":"（13）《对新华社工作的第二次指示》，一九五六年六月十九日。"},{"type":"paragraph","text":"（14）《接见参加中国共产党全国宣传工作会议的部分新闻出版工作者的谈话》，一九五七年三月"},{"type":"paragraph","text":"十日。"},{"type":"paragraph","text":"（15）约斯特：《新闻学原理》。"},{"type":"paragraph","text":"（16）《对新华社工作的指示》，一九五六年五月二十八日。"},{"type":"paragraph","text":"（17）《对新华社工作的指示》，一九五六年五月二十八日。"},{"type":"paragraph","text":"（18）《对新华社工作的第二次指示》，一九五六年六月十九日。"},{"type":"paragraph","text":"（19）《对新华社工作的指示》，一九五六年五月二十八日。"},{"type":"paragraph","text":"（20）毛泽东：《关于胡风反革命集团的第二批材料》的按语，一九五五年。"},{"type":"paragraph","text":"（21）《〈火星报〉编辑部声明》，一九OO年九月。"},{"type":"paragraph","text":"（22）《对新华社工作的指示》，一九五六年五月二十八日。"},{"type":"paragraph","text":"（23）《对新华社工作的第二次指示》，一九五六年六月十九日。"},{"type":"paragraph","text":"（24）《事情正在起变化》，一九五七年五月。"},{"type":"paragraph","text":"（25）《人民日报》一九五六年七月一日改版社论《致读者》。"},{"type":"paragraph","text":"（26）梅益一九五六年八月十六日在第四次全国广播会议上的发言。"},{"type":"paragraph","text":"（27）以上均见一九五七年五月在北京举行的第一次新闻工作者座谈会上的发言。"},{"type":"paragraph","text":"（28）《在中国共产党全国宣传工作会议上的讲话》，一九五七年三月十二日。"},{"type":"paragraph","text":"（29）《文汇报的资产阶级方向应当批判》，一九五七年七月一日。"},{"type":"paragraph","text":"（30）一九五七年四月对《人民日报》的批评。"},{"type":"paragraph","text":"（31）《对人民日报工作的指示》，一九六一年。"},{"type":"paragraph","text":"（32）以上引语见一九六二年《人民日报编委会讨论〈长短录〉专栏的意见》"},{"type":"paragraph","text":"（33）邓拓一九六一年七月二十八日的讲话。"},{"type":"paragraph","text":"（34）梅益一九六二年六月十八日的讲话。"},{"type":"paragraph","text":"（35）《关于办好报纸的指示》，一九六O年十二月。"},{"type":"paragraph","text":"（36）一九六四年的一次讲话。"},{"type":"paragraph","text":"（37）吴冷西一九六四年对《人民日报》记者部和理论部的讲话。"},{"type":"paragraph","text":"（38）吴冷西一九六四年四、五月间的一次讲话。"},{"type":"paragraph","text":"（39）吴冷西一九六六年在北京各新闻单位负责人联席会议上的讲话。"},{"type":"paragraph","text":"（40）毛泽东：《给刘建勋、韦国清同志的信》，一九五八年一月十二日。"},{"type":"paragraph","text":"（41）摘自《人民日报》一九五七年六月十四日编辑部文章《文汇报在一个时间内的资产阶级阶级"},{"type":"paragraph","text":"方向》。"},{"type":"paragraph","text":"（42）一九五七年三月六日在九省市宣传文教部长座谈会上的谈话。"},{"type":"paragraph","text":"（43）一九六四年一月的一次谈话。"},{"type":"paragraph","text":"（44）一九五八年一月关于《人民日报》的一次谈话。"},{"type":"paragraph","text":"（45）《对晋绥日报编辑人员的谈话》，一九四八年四月二日。"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":437,"page_end":448,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type"
