tes":[{"year":1968,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"时代的火车头"},{"type":"paragraph","text":"驻首都新北大工人毛泽东思想宣传队一道长虹映红五洲四海，万首赞歌汇成震天雷鸣……伟大的工人阶级啊——时代的火车头，伟大的工人阶级啊——革命的红尖兵！忆往昔，岁月峥嵘，看今朝，江山披红。在文化大革命运动中，为人民建立新功。我们浩浩荡荡开进学校，毛主席最新指示牢记心中。用毛泽东思想占领教育阵地，工人阶级誓做革命的主力军！我们团结广大革命师生把教育革"},{"type":"paragraph","text":"命烈火烧的更旺，把斗、批、改的风暴刮的更猛，我们充满战斗的豪情，对阶级敌人发动猛烈进攻。伟大的工人阶级——胆壮、骨硬、眼亮、心红，革命最彻底，立场最坚定，最最忠于伟大领袖毛泽东！我们永远是——领导一切的领导阶级，我们永远是——反修防修的钢铁长城，我们永远是——时代的火车头，我们永远是——开拓江山，解放全人类的先锋！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a122ea7fa3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
