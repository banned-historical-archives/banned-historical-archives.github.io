],"dates":[{"year":1960,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席会见罗加总书记"},{"type":"paragraph","text":"朱德和董必武同志接见波兰军事代表团"},{"type":"paragraph","text":"新华社天津29日电　中国共产党中央委员会主席毛泽东今天下午在天津会见了古巴人民社会党总书记布拉斯·罗加和他的夫人，并进行了恳切的谈话。"},{"type":"paragraph","text":"会见时在座的有中共中央总书记邓小平，书记处候补书记杨尚昆，中央委员伍修权。"},{"type":"paragraph","text":"新华社29日讯　中共中央副主席朱德、中华人民共和国副主席董必武，今天下午接见了以博齐沃夫斯基上将为首的波兰军事代表团全体成员，并且进行了亲切的交谈。"},{"type":"paragraph","text":"接见时在座的有，罗瑞卿大将、彭绍辉上将，外交部副部长罗贵波，我国驻波兰大使馆武官姜一震中校等。"},{"type":"paragraph","text":"接见时，波兰驻我国大使馆临时代办傅拉托和代理武官席曼斯基中校也在座。（附图片）"},{"type":"paragraph","text":"毛主席会见古巴人民社会党总书记布拉斯·罗加（右第三人）。图为会见时情形。"},{"type":"paragraph","text":"朱德同志和博齐沃夫斯基团长亲切握手。前右是董必武同志。"},{"type":"paragraph","text":"新华社记者　陈娟美　刘东鳌摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62200ebe33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
