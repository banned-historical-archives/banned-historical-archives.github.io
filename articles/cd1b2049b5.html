ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于召集有关人员讨论国际形势及对策问题给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"关于召集有关人员讨论国际形势"},{"type":"paragraph","text":"及对策问题给刘少奇等的信"},{"type":"paragraph","text":"（1959年12月3日）刘、周、彭："},{"type":"paragraph","text":"为了讨论国际形势及我们的对策，拟请林彪、陈毅、康生、稼祥、贺龙、谭政、陈伯达七同志到此一谈。十二月三日（即今日）下午到杭。林彪、陈毅四日到杭。请酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月三日上午三时今日派机去广州，明日林彪可到。国际形势及对策讨论三天就够了。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。彭，指彭真，当时任中共中央政治局委员、中央书记处书记。"},{"type":"paragraph","text":"[2]林彪，当时任中共中央副主席、国务院副总理。陈毅，当时任中共中央政治局委员、国务院副总理兼外交部部长。康生，当时任中共中央政治局候补委员、中央文教小组副组长。稼祥，即王稼祥，当时任中共中央书记处书记、中央对外联络部部长。贺龙，当时任中共中央政治局委员、国务院副总理。谭政，当时任中共中央书记处书记、中国人民解放军总政治部主任。陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":12,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":501,"page_end":501},"tags":[{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd1b2049b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
