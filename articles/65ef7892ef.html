:[],"dates":[{"year":1972,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席关于“开发矿业”的伟大号召指引下，江苏省苏南地区的广大军民，紧密团结，协同作战，大打矿山之仗，多快好省地开发苏南煤田，取得了显著成绩。"},{"type":"paragraph","text":"三年前，整个苏南地区只有三对小型矿井，现在，投入生产的矿井已经有二十对，另外还有四十六对矿井正在兴建，其中有一批将在近期内投入生产。从一九六九年以来，苏南煤田的原煤产量逐年上升，一九七○年比一九六九年增长二点八倍，一九七一年比一九七○年增长百分之九十八，今年第一季度又比去年同期增长百分之七十四。过去，苏南地区广大城乡的生活用煤都要从北方调运，现在，苏南煤田生产的煤炭，不仅就近供应了这一地区人民群众的生活用煤，而且为这个地区工农业生产的发展提供了燃料和原料。近年来，南京、镇江、常州、苏州等城市的工业用煤，已有相当一部分是苏南煤田供应的，无锡市则从去年五月份开始，基本实现了煤炭自给。"},{"type":"paragraph","text":"苏南煤田是激烈的两条路线斗争的产物，开发苏南煤田的胜利，是毛主席革命路线的胜利。苏南煤田自从大规模开发以来，苏南地区各级党组织和革委会，都把这件事摆到重要的议事日程上，认真研究，加强领导。他们经常用开发苏南煤田中两条路线斗争的事实，教育干部和工人不断提高大家的路线斗争觉悟，增强大家对开发煤田重大意义的认识。在苏南煤田的开发过程中，东北鸡西煤矿、安徽淮南煤矿、徐州矿务局都派来了不少老工人和技术人员，山东、内蒙古等地还派来了勘探人员。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65ef7892ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
