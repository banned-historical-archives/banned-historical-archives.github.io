rs":[],"dates":[{"year":1957,"month":9,"day":19}],"is_range_date":false,"parts":[{"text":"汪岗提出狂妄主张　要多办反党的报纸","type":"title"},{"text":"四川工人日报总编室主任右派分子汪岗，在今年上半年，先后在报社内外，公开地系统地攻击共产党的办报路线。他狂妄地要求取消省市党委的机关报，主张多办不受一定的机关领导、监督，可以随便批评党委的“群众报”。这家报纸在汪岗的操纵和影响下，５、６月份以大量的显著的篇幅，用特大字号标题，连续登载了“童尸案”、“她的死”等耸人听闻的色情、谋杀案件的新闻；还专门开辟了“方方信箱”、“小诸葛服务台”两大栏，经常登载一些“阴阳人”、“失恋的苦闷”、“一个人爱上了两姊妹怎么办”以及讲究吃、喝、闹、玩等低级趣味的东西。这张报纸还辟了一个“讽刺”专栏，专登丑化共产党员和新社会的杂文、漫画。","type":"paragraph"},{"text":" ——原载《人民日报》1957年9月19日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"929b04d5d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
