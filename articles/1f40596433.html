":[{"year":1967,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界革命人民的伟大领袖毛主席教导说:“我们现在正处于世界革命的一个新的伟大的时代。亚洲、非洲、拉丁美洲的革命风暴，定将给整个的旧世界以决定性的摧毁性的打击。”"},{"type":"paragraph","text":"战无不胜的毛泽东思想光芒万丈，普照全球。史无前例的中国无产阶级文化大革命凯歌高奏，震撼着全世界。当前全世界马克思列宁主义者和革命人民反对帝国主义、现代修正主义和各国反动派的斗争，一派大好形势。亚、非、拉人民同全世界革命人民一起，正沿着毛主席指引的道路，不怕牺牲，前赴后继，去捣毁旧世界，建立新世界。一场涤荡全球的革命暴风雨正在来临!全世界无产阶级联合起来!全世界人民团结起来!高举战无不胜的毛泽东思想伟大红旗，迎着革命的暴风雨，朝着光辉灿烂的前程奋勇前进!"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\09\\679s060101.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f40596433"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
