ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"赠刘兴元联","alias":"","parts":[{"type":"paragraph","text":"赠刘兴元\"联2]"},{"type":"paragraph","text":"（1972年）能攻心，则反侧自消，自古知兵非好战；不审势，即宽严皆误，后来治蜀要深思。"},{"type":"paragraph","text":"二世外人法无定法，然后知非法法也；"},{"type":"paragraph","text":"天下事了犹未了，何妨以不了了之。"},{"type":"paragraph","text":"[1]刘兴元（1908一1990），山东莒县人，1931年参加中国工农红军，同年加入中国共产主义青年团并转入中国共产党。1934年随中央红军参加长征。1955年被授予中将军衔。中国共产党第九至第十一次全国代表大会上当选为中央委员。1990年在北京逝世。"},{"type":"paragraph","text":"[2]1972年，广州军区司令员刘兴元奉命调任成都军区，收拾“文革”残局。赴四川前，他先到北京见毛泽东。毛泽东在中南海对他说：“你到四川去呀！成都有座武侯祠。你记住，武侯祠的第二道门有一副对联，你可以去看看，好好体会一下，我就没有多的话要说了。”毛泽东又说：“你到四川，先到成都武侯祠看一副对联。你再到新都县宝光寺看另一副对联。”四川成都武侯祠的一副对联，即本篇一，新都县宝光寺的对联，即本篇二。"}],"authors":["毛泽东"],"dates":[{"year":1972}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":371,"page_end":371},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a210437d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
