art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"6915部队组织学习标兵巡回报告进一步推动干部战士学习毛主席著作","authors":["陈惠民/杜绍桐"],"parts":[{"type":"paragraph","text":"本报讯 最近，6915部队组织战士学习毛主席著作标兵蒋斌述、谢太忠、何光和杨知俭到各连队巡回报告，以他们的切身体会和经验，促进和推动干部战士学习毛主席著作的活动。"},{"type":"paragraph","text":"这四个战士，有学习毛主席著作一贯表现积极的老战士，也有学了毛主席著作，由后进变先进的新同志。他们虽然出身不同，工作岗位不同，入伍时间长短不一，文化程度有高有低 但是他们都有一个共同的特点，这就是：认真学习毛主席著作，理论联系实际，学一点，用一点，做一点。"},{"type":"paragraph","text":"巡回报告后，各连都组织了学习讨论，同时，表扬了本连学习毛主席著作的好人好事，交流了经验，找出了本连本排和各人学习中的薄弱环节，结合蒋斌述等同志的经验，制定出学习毛主席著作计划。"},{"type":"paragraph","text":"（陈惠民、杜绍桐）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d734a8e7c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
