" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji2","name":"毛泽东全集第2卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"相人力争黑免张敬尧","alias":"","parts":[{"type":"paragraph","text":"湘人力争罢免张敬尧"},{"type":"paragraph","text":"（1920年4月27日）"},{"type":"paragraph","text":"致南宁陆总裁云南唐总裁电"},{"type":"paragraph","text":"项据报载南北议和条件，阅之不胜骇悸。溯自和会续开，提出八条。后此谈判，自应以此为基础，即云互让，亦应依法解决，若乃抛却沪会，苟且私和，既乖正谊主张，安望和平久远。前途危险，固已不寒而栗。况第四条并称湘督不撤，尤为背道而驰。综张敬尧祸湘，罪恶滔大，擢发难数。湘人迫于救死，久拟孤注一掷，只以渴想和平，忍痛待决。今果反任元凶，稔毒湘省，以全省供其牺牲，为个人交换权利。湘人誓死不认，苟存三户，决与偕亡。万恳诸公，仍以救灾恤邻之心，贯彻护法救国之旨，统筹全局，拯湘水火，否则人心一去，根本互解，湘固不幸，抑岂西南之福？挥涕陈词，迫希亮察。"},{"type":"paragraph","text":"致广州军政府岑总裁电"},{"type":"paragraph","text":"顷报载北政府非正式向公及陆总裁提出议和条件。内有湘张不动一节，阅之骇然。虽言居片面，事尚无征，然道路喧传，南北要人私自接洽内幕重重，物腐虫生，不无疑虑。查湘省首义以来，人民生命财产，牺牲且远逾闽陕。而张敬尧祸湘，亦实较闽李、陕陈惨毒倍加。今苟和声中，副座列为专条，湘督任其恋栈，果于此事，是直举湘人频年惨恒呼吁之状若罔闻知。而专为要人权利交换，谓匪明势位而味是非，其谁能信？在北廷久已不畏民恤民隐，其贸然提出，固无足责，惟副座非北廷可私授。智者应识其诈欺湘省为护法受奇灾。仁人应加以悯恤，且湘为西南门户。苟听不法武人卖国凶党如张敬尧者，盘踞其间，则川滇桂粤在在（岌岌）可危。自救不湟，奚言救国？此间湘人终以我公领袖护法，体兼仁者必不弃湘弗顾。敢请力持群众逐张之主张，勿反和会已成之定案，为湘除害。即为国胜残，不独全湘三千万人民引领望赐。即西南大局国家前途实利赖之。临电惶悚无任祷盼。"},{"type":"paragraph","text":"致章行严彭静仁两代表公函"},{"type":"paragraph","text":"项阅报载，北政府以非正式提出之条件，与西南接洽。词虽片面，军匪无根，外间喧传，黑幕重重，尤为不寒而栗。查该条件除分配借款及各要人权位外，实无一适中乎民隐，而救国家之急。尤可怪者，湘督张敬尧为祸最深，湘民从事驱逐，已有不共戴天之势。而该条件与陕陈、闽李同为仍留现状，吾民何辜，必永受其茶毒。湘难未已，和宁可恃。前此和会，已经专案审查，最后之八条，亦列为要款，今一概抹煞，只循南方二三私人之权利，而牺牲三千万湘民以为之交换。湘民有死，誓不能从。公等谊切桑梓，谅蒙矜察。亦既以争去张，为续和开始条件，乞仍本初旨，贯彻主张。否则吾湘以生死相持，不推大局糜烂，即公等亦恐无以对湘人也。临颖挥涕，急不择言。"},{"type":"paragraph","text":"1920年5月5日，毛泽东以“驱张”代表团成员的身份，来到上海，再一次见到了陈独秀。图为陈独秀在上海建立的第一个共产主义活动地点一法租界环龙路老渔阳里2号。东方欲晚《东方欲晓》(油画)"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":4,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":208,"page_end":212},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈独秀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6574681f6b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
