ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"复重庆各界名流等电","alias":"","parts":[{"type":"paragraph","text":"复重庆各界名流等电！！"},{"type":"paragraph","text":"（1946年7月5日）重庆黄墨涵、黄次咸、邓初民等先生均鉴："},{"type":"paragraph","text":"奉读来电，甚佩卓见。坚持和平，反对内战，乃今日中国之惟一国是。党决本此方针奋斗到底。尚祈一致努力，以速和平之实现。"},{"type":"paragraph","text":"毛泽东谨复微重庆基督教协进会和平祈祷大会诸先生惠鉴："},{"type":"paragraph","text":"铣电奉悉，诸先生热心国事，呼吁和平，无任钦佩。党素主以和平团结解决国内一切争端，已由党南京代表团提议双方明令全面长期无条件停战。惟少数好战分子仍在迷信武力解决，致内战危机依然存在。尚望共同努力，制止战祸，国命民生，实深利赖。"},{"type":"paragraph","text":"毛泽东谨复微[1]重庆各界名流黄墨涵、黄次咸、邓初民等4271人，及基督教协进会"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":463,"page_end":463},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ad5959353"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
