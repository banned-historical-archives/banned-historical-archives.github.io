tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"社会主义社会中保留了资产阶级法权的形式","authors":["范戈"],"parts":[{"type":"paragraph","text":"资产阶级法权的基础是私有制，是在法律上自由平等掩盖下的资本主义私人占有制度。"},{"type":"paragraph","text":"什么是法权？是不是可以简单地这样说：法权是生产关系在法律上的表现。资产阶级法权是资本主义生产关系在法律上的表现，它为资本主义的生产关系服务。"},{"type":"paragraph","text":"怎样理解在社会主义社会还保留有资产阶级的法权残余呢？我认为这是和社会主义社会的过渡性质有关。从民主革命到社会主义革命，从社会主义革命到共产主义革命，虽然有着不同的阶段，但却是一个不断发展的过程，是处于错综复杂的状态中的。因此，在社会主义社会里，就不能不保留资本主义社会的遗迹。"},{"type":"paragraph","text":"但是，社会主义社会保留的资产阶级法权，只是它的形式，内容已经起了本质的变化。它反映的是社会主义的生产关系，为社会主义服务的，而不是反映资本主义的生产关系，为资本主义服务的。"},{"type":"paragraph","text":"从共产主义的角度看问题，在社会主义社会中，凡是和私有制有关的，和三个差别有关的，并且通过法律、规章制度承认了的东西，都可以说是资产阶级的法权残余。没有通过法律、规章制度表现的东西，应该说是资产阶级法权的影响。这些东西都要逐步消除，都要逐步地用共产主义的因素来代替它们。"}],"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d632145a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
