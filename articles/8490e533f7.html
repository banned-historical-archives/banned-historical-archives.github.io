<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西北各民族举行抗美援朝代表会议毛主席复电倍加慰勉 帝国主义敢于欺负中国的时代已经永远过去了 中国各民族的团结友爱合作足以战胜任何侵略 当会议主席团向大会宣读毛主席复电时 各族代表用十四种语言欢呼毛主席万岁","authors":[],"dates":[{"year":1951,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社西安十三日电】　西北各民族人民抗美援朝代表会议十二日在此间隆重开幕。会议的中心议题是讨论如何结合增产节约运动，继续加强抗美援朝工作。出席会议的有汉、藏、回、维吾尔、哈萨克、蒙、乌孜别克、俄罗斯、柯尔克斯、塔塔尔、锡伯、东乡、满、撒拉等十四个民族的代表四百五十一人。"},{"type":"paragraph","text":"这次会议是在西北区两年来各项工作，特别是在民族团结、抗美援朝、土地改革、镇压反革命和城市民主改革等工作有了很大成绩的基础上召开的。西北各省、市除新疆省外，都已先后举行了抗美援朝代表会议，总结了各省、市抗美援朝工作的经验。到会各民族代表对继续加强抗美援朝工作都具有充分的信心。会议开幕日，大会发出了向毛主席、金日成将军和中国人民志愿军司令员彭德怀将军致敬电。同日晚，大会收到毛主席的复电，各民族代表莫不万分兴奋。当第二天会议主席团用汉、维、藏等族语言向大会宣读毛主席复电时，全场各民族代表用十四种民族的语言高呼“毛主席万岁!”"},{"type":"paragraph","text":"大会给毛主席的致敬电如下:"},{"type":"paragraph","text":"敬爱的毛主席:今天，西北各族人民抗美援朝代表会议在西安开幕了。我们出席大会的四百多名代表谨向您致以崇高的敬意，并保证坚决贯彻您在中国人民政协第一届全国委员会第三次会议上提出的:“继续加强抗美援朝的工作，需要增加生产，厉行节约，以支持中国人民志愿军”的伟大号召，动员一切力量，更加深入和开展抗美援朝爱国主义宣传教育工作，为争取人民祖国建设事业的新的胜利而斗争。祝您身体健康!"},{"type":"paragraph","text":"西北各族人民抗美援朝代表会议　一九五一年十二月十二日"},{"type":"paragraph","text":"毛主席给大会的复电如下:"},{"type":"paragraph","text":"西北各族人民抗美援朝代表会议全体代表同志们:感谢你们给我的电报。过去一年多以来，西北区各族人民在抗美援朝的爱国斗争中，作了很大的努力，得到了很大的成绩。你们的这次代表会议，决定进一步团结各族人民，增加生产，厉行节约，开展爱国主义的宣传教育工作，以支持中国人民志愿军，这是很好的。帝国主义过去敢于欺负中国的原因之一，是中国各民族不团结，但是这个时代已经永远过去了，从中华人民共和国成立的那一天起，中国各民族就开始团结成为友爱合作的大家庭，足以战胜任何帝国主义的侵略，并且把我们的祖国建设成为繁荣强盛的国家。祝你们的会议成功!"},{"type":"paragraph","text":"毛泽东　十二月十二日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8490e533f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
