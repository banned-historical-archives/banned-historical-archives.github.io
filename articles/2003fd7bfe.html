":1968,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我长大要到中国去见毛主席"},{"type":"paragraph","text":"一位法国妇女在接到中国朋友给她寄来的一本中国杂志后，心里非常激动。她在向中国朋友致谢的回信中说：“我无限热爱和敬仰在伟大的毛泽东思想指导下进行革命斗争的高尚而又勇敢的中国人民。虽然我们相隔千里，但是我们永远心连心。”"},{"type":"paragraph","text":"她在信中特别谈到这样一件事：她的十三岁的儿子经常想着有一天能访问中国。她的儿子常常把这句话挂在嘴边：“我长大时要到中国去见毛泽东主席，拥抱伟大的中国人民。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2003fd7bfe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
