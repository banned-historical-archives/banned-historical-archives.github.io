script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓了阶级斗争，革命生产就发展上海建筑安装机械制造厂回击右倾翻案风，生产月月上升","authors":[],"dates":[{"year":1976,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海建筑安装机械制造厂职工认真学习毛主席的一系列重要指示，批判党内那个不肯改悔的走资派及其抛出的“三项指示为纲”，坚持以阶级斗争为纲，积极做好各项工作。全厂一、二月份超额完成了国家计划，比去年同期增长百分之三十七；进入三月份以来，成绩更为显著，与去年同期相比有成倍增长。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展以来，这个厂的职工认真学习毛主席的重要指示和《人民日报》、《红旗》杂志的有关文章，深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领。他们回顾了斗争实践，认识到:。什么时候抓住了阶级斗争这个纲，革命和生产就发展，就前进；什么时候放松了抓阶级斗争这个纲，各项工作就会出问题，甚至走到邪路上去。去年，这个厂的二车间认真学习无产阶级专政理论，深入批判刘少奇、林彪的修正主义路线，振奋了广大职工的革命精神，在生产条件未变，人员未增的情况下，产量却比前年增长了百分之三十。今年初，在反击右倾翻案风斗争的推动下，这个车间大搞技术革新，发动群众挖潜力，二月份生产任务又超额完成百分之二十。三车间的职工发扬“八小时内拼命干，八小时外多贡献”的革命精神，不计时间，不计报酬，千方百计地动脑筋、想办法，在提前完成二月份生产任务的基础上，再提前和超额完成第一季度的生产任务。全厂职工通过批判党内那个不肯改悔的走资派及其所推行的修正主义路线，革命干劲一鼓再鼓，改变了以往一季度不能配套成汽车吊的局面，保证第一季度配成汽车吊二十辆，以实际行动痛击右倾翻案风。　(市建工局工会供稿)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2fb96295e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
