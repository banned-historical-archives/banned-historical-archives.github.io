":1983,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英同志会见巴苏和夫人"},{"type":"paragraph","text":"新华社北京9月2日电　叶剑英同志今天下午在住所会见了全印柯棣华大夫纪念委员会主席巴苏和夫人。"},{"type":"paragraph","text":"叶剑英身穿浅灰色中山装，在客厅里迎接巴苏大夫，同他亲切握手。叶剑英说：“见到你很高兴。”巴苏说：“我也很高兴再次同你见面。”"},{"type":"paragraph","text":"巴苏大夫1938年同柯棣华一起作为印度援华医疗队的成员来到中国，帮助中国人民的抗日战争。在武汉，他们受到了叶剑英等同志的热情接待，彼此结下了深厚的友谊。四十五年过去了，援华医疗队的五名成员中只有巴苏大夫健在。他和夫人这次是应对外友协邀请来华度假并看望老朋友的，过得非常愉快。"},{"type":"paragraph","text":"叶剑英问巴苏：“你身体好吧？”巴苏说：“我身体很好。”叶剑英希望巴苏大夫以后经常来中国看看。巴苏说，我一定再来。"},{"type":"paragraph","text":"会见结束时，宾主合影留念。叶剑英把客人送到门口，挥手同他们告别。"},{"type":"paragraph","text":"对外友协会长王炳南会见时在座。（附图片）"},{"type":"paragraph","text":"叶剑英同巴苏亲切握手。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c8bc3ca20"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
