948,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"羊工被剥削如何算？编辑同志："},{"type":"paragraph","text":"在划阶级中遇着两个问题希解答一下："},{"type":"paragraph","text":"１、小羊羔是否算收入？羊工被剥削又如何算？我们在这里，把羊羔算为羊工的劳动收入，然后除去他主家喂的料等外，即是羊工被剥削数。"},{"type":"paragraph","text":"２、小学教员顶劳动者，与家庭又如何算？郄德明他本人在外当小学教员，家中有地廿五亩，用的一个人，他父在家但年老，只能做些轻活，他家中有五口人，半头牛，楼院半所。如不给他顶劳力，他家中就是个富农；如给他顶劳力，就是个富裕中农。他家中廿五亩地打廿五石粮，他父能顶四分之一劳动力，他在外除吃，能赚谷九石。家中其他剥削没有，希告知如何算？"},{"type":"paragraph","text":"３、小学教员、干部算时群众讨论：如他在家是劳力走了的，即与家庭算劳力，如走时不是劳动者，即不与家中算劳力。是否对？"},{"type":"paragraph","text":"武乡联合办公室武乡办公室同志："},{"type":"paragraph","text":"一、小羊羔是否算收入这个问题提的不清楚，且各地羊工的劳动条件不同，无法来答。一般的说，羊工被剥削部分的计算，应除去主家的资本、设备、饲料、工资、负担………等，其纯收入即为被剥削部分。"},{"type":"paragraph","text":"二、革命干部，自己在外工作，因无力耕种而雇人耕种或出租土地，赖以维持生活者，不得认为是剥削行为。小学教员因家中另外无劳力而雇工，家中生活不超过一般中农者，也不应定为地主或富农成份。小学教员及革命干部不论离家时是劳动者或不是劳动者，现在均应认为是劳动者，因为他们现在是在为人民服务，是脑力劳动者。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2644675ce9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
