"山西","牟乃标","王耀辰","田中五","郑泽夫"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"中学教师的右派言论（四）","type":"title"},{"text":"山西王耀辰田中五郑泽夫牟乃标","type":"authors"},{"text":"王耀辰（阳泉二中教师）：","type":"paragraph"},{"text":"“学校是清一色的领导，党团员当家，民主人士有职无权。党在各级部门中要民主人士，不过是作作配搭”。","type":"paragraph"},{"text":"田中五（祁县中学教师）：","type":"paragraph"},{"text":"“知识分子是一盘散沙，民盟是知识分子的政党，要和共产党争领导”。","type":"paragraph"},{"text":"郑泽夫（榆次一中教师、民盟盟员）：","type":"paragraph"},{"text":"“民主党派如没有政治自由、地位平等、组织上的独立，就成了共产党的附属机构”。","type":"paragraph"},{"text":"牟乃标（临汾一中教师）：","type":"paragraph"},{"text":"“共产党和民主党派不是领导和被领导的关系，而应该是对等的关系，民主党派和共产党应平立平坐，资产阶级和无产阶级应联合专政，资产阶级和无产阶级共同进入社会主义”。","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（四）》（中共山西省委整风办公室编印，1957年11月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37a8261c7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
