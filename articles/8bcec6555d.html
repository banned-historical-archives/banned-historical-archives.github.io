script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"与剥削阶级思想一刀两断——河南省项城县女基干民兵王学荣正确处理婚姻问题的故事","authors":[],"dates":[{"year":1974,"month":1,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"与剥削阶级思想一刀两断"},{"type":"paragraph","text":"——河南省项城县女基干民兵王学荣正确处理婚姻问题的故事"},{"type":"paragraph","text":"王学荣是河南省项城县南顿公社马旗大队的基干民兵，一九七一年和旋溜大队的现役军人张继有订了婚。去年春天，继有从部队复员返乡。学荣娘听到这个消息，认为青年在家打牛腿没啥出息，想让女儿断了这门亲事，另选一家，让自己享几年福。一些资产阶级思想严重的人，看到有机可乘，也登门提亲，说七道八。学荣一时不知道怎么办才好。大队党支部书记和公社驻队干部了解到这种情况，及时找学荣谈心，对她说，继有为革命参军，现在服从革命需要回家务农，我们应当热情欢迎。并且鼓励她同轻视农业劳动，“女攀高门”的剥削阶级思想决裂。"},{"type":"paragraph","text":"两种思想的剧烈斗争，使学荣一连几天吃不好饭，睡不好觉。她反复想：我是个基干民兵，应该听毛主席的话，听党的话。在战场上和敌人打仗是战斗，现在同剥削阶级的传统观念决裂，也是战斗。在这场斗争中，只能前进，不能后退，只能打胜，不能打败，要不，就是没有起到一个基干民兵的作用，就不象一个新中国的革命青年。思想通了，勇气也就有了。她主动地去做母亲的思想工作，坚决拒绝那些媒人的“好意”。有人说她：“放着有工作的不找，偏要找个种地的，不知想的啥？”学荣坚定地说：“我想的是要彻底战胜旧思想，想的是和继有一起建设社会主义的新农村！”"},{"type":"paragraph","text":"毛主席说：“反映旧制度的旧思想的残余，总是长期地留在人们的头脑里，不愿意轻易地退走的。”学荣娘由于受“女攀高门”旧观念的影响，思想一时转不过来。学荣想，母亲在旧社会吃了许多苦，对毛主席、对新社会，有深厚的无产阶级感情，要是给她讲讲过去的事，她的思想也许会通的。学荣娘是苦水里泡大的，在那万恶的旧社会，家里穷得当当响，十冬腊月没鞋穿，她的三个妹妹都被迫送人当了童养媳。在一次家庭会上，学荣提起了这些往事，老人家的眼泪象断了线的珠子，一直往外淌。学荣说：“娘，是毛主席领导咱翻了身，过上了今天的幸福日子，咱要不和剥削阶级旧思想一刀两断，咋能对得起毛主席！您再想想，人家继有在部队干革命，回来种地就不是干革命了？咱家祖祖辈辈都是庄稼人，现在咋能看不起庄稼人呢？”学荣娘被女儿的话打动了心，惭愧地说：“好闺女，娘想错了，你说得对，就照你的想法办吧！”"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bcec6555d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
