tart":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"朝鲜将发行纪念毛泽东百年诞辰邮票","authors":["刘格文"],"parts":[{"type":"paragraph","text":"为纪念中国人民的伟大领袖、朝鲜人民的亲密朋友毛泽东诞生100周年，朝鲜邮电部将发行纪念邮票和其他邮品。"},{"type":"paragraph","text":"邮票将分两次发行。第一次是在11月16日，即“纪念毛泽东同志诞生100周年全国集邮展览”。在北京开幕的当天，发行1枚小型张，画面是1990年发行的“中国人民志愿军赴朝参战40周年”小型张上加盖“毛泽东诞辰100周年“字样，以及中国歌曲《东方红》的乐谱。同天，还发行1枚纪念邮资信封和6枚立体邮资明信片。"},{"type":"paragraph","text":"第二次是在12月26日，共发行4枚邮票、1枚小型张和1枚小版张，这些邮品均包括有齿孔和无齿孔两种。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b235e9e8f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
