{"year":1965,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来总理应邀前往巴基斯坦、坦桑尼亚进行友好访问。这是离京时候，同前往欢送的朱德委员长，邓小平、贺龙、陈毅、李先念、罗瑞卿、谢富治副总理，康生、郭沫若副委员长以及巴基斯坦驻中国大使罗查，坦桑尼亚驻中国大使馆临时代办罗金巴纳等在机场合影。"},{"type":"paragraph","text":"新华社记者　张彬摄"},{"type":"paragraph","text":"六月二日，周恩来总理同阿尤布·汗总统在拉瓦尔品第举行会谈。左一是外交部副部长章汉夫，右一是巴基斯坦外交部长布托。"},{"type":"paragraph","text":"新华社记者　杜修贤摄（传真照片）"},{"type":"paragraph","text":"六月二日，中共中央政治局委员、国务院副总理李先念，同越南劳动党中央政治局委员、政府副总理黎清毅（右一）举行会谈。"},{"type":"paragraph","text":"新华社记者　郑小箴摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4c258888a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
