tes":[{"year":1978,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月七日电　国务院副总理邓小平今天上午会见由马达加斯加最高革命委员会委员马鲁·雷蒙、马南达菲·拉科托尼里纳率领的马达加斯加民主共和国政府经济贸易代表团。"},{"type":"paragraph","text":"邓小平副总理同代表团进行了亲切友好的谈话。他对马达加斯加贵宾说，自从一九七二年建交以来，我们两国的关系发展得很好。我们两国都受过帝国主义的统治，过去你们是殖民地，我们是半殖民地，但彼此的遭遇是共同的。他相信，中马两国的关系会一天比一天好。"},{"type":"paragraph","text":"马鲁·雷蒙团长感谢邓副总理抽出宝贵时间会见代表团。他转达了拉齐拉卡总统对华国锋总理和邓小平副总理的问候。他说，中国人民是马达加斯加人民的朋友和兄弟。他祝愿中国人民在中国共产党的正确领导下，尽快实现四个现代化。"},{"type":"paragraph","text":"马达加斯加驻中国大使拉科托菲林加参加了会见。"},{"type":"paragraph","text":"会见时在座的有国务院副总理康世恩，外贸部部长李强、副部长崔群，外经部副部长程飞，有关方面负责人罗旭、王庆采等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ceb0988d52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
