script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"黎巴嫩绝对不作外国资本奴隶坚决要对英商石油公司征税","authors":[],"dates":[{"year":1956,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京7日电】　据塔斯社贝鲁特6日讯:黎巴嫩国务部长赛布·萨拉姆5日在记者招待会上说，黎巴嫩政府坚决要实行对英商“伊拉克石油公司”征税的法令，并且决心要保卫黎巴嫩的民族利益。黎巴嫩政府和英商“伊拉克石油公司”发生了很大的争执，因为黎巴嫩要求增加黎巴嫩从这一公司由通过黎巴嫩领土输送石油所得的利润的分配额。"},{"type":"paragraph","text":"黎巴嫩和“伊拉克石油公司”在1955年12月就开始就双方平均分配公司利润的问题举行谈判。但是，在1956年1月，“伊拉克石油公司”拒绝继续同黎巴嫩政府进行这种谈判。同时它也不遵守黎巴嫩所颁布的征收外国公司通行税和关税的法令。这家公司还发表了公报，威胁说要停止它在黎巴嫩的业务，解雇黎巴嫩工人，并且要使正在建造中的新的基尔库克一荷姆斯一的黎波里输油管改为经过叙利亚的领土直达巴尼亚斯港。"},{"type":"paragraph","text":"黎巴嫩新闻界人士认为，“伊拉克石油公司”的这种打算是英国企图挑起黎巴嫩和叙利亚的不和，从而分裂在苏伊士运河问题上支持埃及的阿拉伯国家之间的团结。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0233ab6fb9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
