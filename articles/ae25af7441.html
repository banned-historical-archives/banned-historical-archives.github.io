tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"谴责国际垄断资本剥削南部非洲人民我国代表指出，社会帝国主义这个国际剥削者的丑恶嘴脸和恶劣行径，已越被广大第三世界国家和人民所识破","authors":[],"parts":[{"type":"paragraph","text":"据新华社联合国一九七四年十一月十九日电 联合国大会第四（托管）委员会从十一月十一日至十九日就外国经济利益在殖民地活动的问题进行了一般性辩论。"},{"type":"paragraph","text":"第三世界许多国家的代表在发言中谴责国际垄断资本剥削南部非洲人民、掠夺当地自然资源、榨取巨额利润的罪恶行径。他们指出，国际帝国主义和垄断资本同罗得西亚、南非种族主义政权以及其他殖民当局相互勾结，阻碍当地人民实现民族自决和独立。他们强烈要求根据联大第六届特别会议通过的《建立新的国际经济秩序宣言》和《行动纲领》的精神，制止情况进一步恶化。"},{"type":"paragraph","text":"中国代表吴妙发在发言中指出，帝国主义和新老殖民主义为了维护它们在南部非洲地区的巨大经济利益，从政治上、军事上竭力支持罗得西亚、南非种族主义政权和其他殖民当局，结成反动的军事联盟，共同镇压阿扎尼亚、津巴布韦、纳米比亚和葡属殖民地人民的民族解放运动。"},{"type":"paragraph","text":"吴妙发说，在殖民主义和帝国主义继续对非洲和其他地区进行剥削和掠夺的同时，社会帝国主义也挤进了这个行列。它以“援助”、“支持”为幌子竭力向非洲渗透。它效法西方“跨国公司”，在别人国土上参加和控制股份，投资开采矿业，经营各种公司，从中渔利。它借“经援和贸易”之名，垄断别人的工农业产品，以低价买进，高价售出，倒卖投机，牟取暴利，成了地道的国际投机商。它为别人勘察地下矿藏，却把资料归为己有，对方一无所得。这个国际剥削者的丑恶嘴脸和恶劣行径，已经越来越被广大第三世界国家和人民所识破。"},{"type":"paragraph","text":"吴妙发指出，目前南部非洲民族解放斗争的形势正在迅猛向前发展。反对外国垄断资本掠夺和剥削的斗争也一定会随着解放斗争的发展出现新的高涨。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae25af7441"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
