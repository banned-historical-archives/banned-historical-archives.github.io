art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中、越两国政府关于一九七二年中国给予越南 经济、军事物资补充援助的协定在北京签字叶剑英副主席李先念副总理出席了签字仪式","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年六月二十八日讯 中华人民共和国政府和越南民主共和国政府关于一九七二年中国给予越南经济、军事物资补充援助的协定，今天在北京签字。"},{"type":"paragraph","text":"根据上述协定，今天还签订了两国政府关于一九七二年中国向越南补充提供一般物资的议定书和一九七二年中国无偿补充供应越南军事装备物资的议定书。"},{"type":"paragraph","text":"军委副主席叶剑英和国务院副总理李先念出席了签字仪式。"},{"type":"paragraph","text":"我国外贸部副部长李强和越南民主共和国外贸部副部长李班分别代表本国政府在协定和关于补充提供一般物资的议定书上签字；中国人民解放军副总参谋长彭绍辉和越南民主共和国外贸部副部长李班分别代表本国政府在关于无偿补充供应越南军事装备物资的议定书上签字。"},{"type":"paragraph","text":"越南方面出席签字仪式的有：李班同志的随行人员陈家庆、黎仲贤、陈今安、黎文进，越南民主共和国驻中国大使吴船和大使馆外交官员。"},{"type":"paragraph","text":"越南南方共和驻中国大使阮文广和大使馆外交官员，也出席了签字仪式。"},{"type":"paragraph","text":"中国方面出席签字仪式的，还有韩念龙、韩宗正、苑化冰、蔡洪江、魏玉明、王斌、梁枫、杨荣杰、赵立祥等有关方面负责人。"},{"type":"paragraph","text":"签字之前，叶剑英副主席、李先念副总理等同越南同志进行了亲切友好的谈话。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4a2d3d58c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
