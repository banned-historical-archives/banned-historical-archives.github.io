["新华社"],"dates":[{"year":1980,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"“六教授”右派问题全部改正","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社北京８月１６日: 电在１９５７年反右斗争中被错划为右派分子的著名“六教授”曾昭抡、费孝通、黄药眠、陶大镛、钱伟长和吴景超，已经全部得到改正。","type":"paragraph"},{"text":"在被错划为右派之前，曾昭抡是原高教部副部长，费孝通是中央民族学院教授、副院长；黄药眠是北京师范大学中文系教授、系主任；陶大镛是北京师范大学政教系教授、系主任；钱伟长是清华大学教授、副校长；吴景超是中国人民大学计统系教授。曾昭抡、吴景超已故，其他四位教授现在的工作是：费孝通，中国社会科学院民族研究所副所长；黄药眠，北京师范大学中文系教授、系主任；陶大镛，北京师范大学政教系教授、系主任；钱伟长，清华大学教授。","type":"paragraph"},{"text":" ---- 原载《人民日报》1980年8月18日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3965088220"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
