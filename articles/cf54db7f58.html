四川省贸易公司","李翼之","胡法刚","黄德祖","齐全福"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报诗——新“贾府”","type":"title"},{"text":"四川省贸易公司齐全福胡法刚李翼之黄德祖","type":"authors"},{"text":"（省贸易公司干部齐全福、胡法刚、李翼之、黄德祖、罗崇富等）","type":"subtitle"},{"text":"川西公司山西帮，后台老板王厅长，他的部下是穆林，还有助手高步仁。","type":"paragraph"},{"text":"喜新厌旧姚锡均，太上老君郭玉林，笑面老虎韩建中，称王称霸是谢云。","type":"paragraph"},{"text":"阿谀奉迎帅文淑，面善心凶黄岫云。姨太作风黄耀芬，阴险毒辣谢汝成。","type":"paragraph"},{"text":"上谄下骄陈家英，八面玲珑徐学廉，官小架大曾宪锐，草包饭桶马廷模。","type":"paragraph"},{"text":"肚皮官司梁国珍，明哲保身候松生，盛气凌人程韫书，吹牛拍马杨仲杰。","type":"paragraph"},{"text":"看人说话乔崇德，阎王作风是肖云，顺风转舵杜丕武，作威作福胡文平。","type":"paragraph"},{"text":"压制批评梅复华，吊二郎当张见阳。","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选辑4》(内部文件，只供领导同志参考，请勿外传和翻印)，中共四川省委宣传部办公室编，1957年7月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf54db7f58"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
