script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西柏林市议会选举已揭晓  极右组织共和党进入议会","authors":["翁振葆"],"dates":[{"year":1989,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西柏林市议会选举已揭晓"},{"type":"paragraph","text":"极右组织共和党进入议会"},{"type":"paragraph","text":"新华社波恩１月３０日电  （记者翁振葆）西柏林消息：据西柏林官方１月３０日公布的西柏林市议会选举结果，执政党基民盟和自由党遭到惨败；第一大反对党社民党得票有所回升，绿党得票也略有增加；第一次参加竞选的“极右”组织共和党一举进入议会，出乎各界预料。"},{"type":"paragraph","text":"据统计，基民盟得票３７．８％，议席５５，比上届议会减少１４席；自民党得票仅占３．９％，未达到进入议会所必须的５％限额，失掉了它迄今所有的１２个议席；社民党得票３７．３％，议席５５，比上届增加７席；绿党得票１１．８％，议席１７，比上届分别增加１．２％和２％；共和党得票７．５％，可在议会获得７个议席。"},{"type":"paragraph","text":"这一选举结果使西柏林和联邦德国各政党均感意外。由于各党都没有绝对多数，组建新市政府将困难重重。"},{"type":"paragraph","text":"西柏林各界约１万人２９日和３０日分别上街游行，对共和党人进入议会表示反对，他们高呼“纳粹滚出去，外国人留下来”。"},{"type":"paragraph","text":"据此间人士分析，共和党所得的选票大多数来自于对基民盟不满的选民。基民盟和自由党执政期间推行削减社会福利的政策措施，在失业率居高不下的情况下大量移民涌入，延长士兵服役期以及政府官员的种种丑闻产生不利于执政党的影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a3ded8829"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
