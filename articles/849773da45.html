毛主义共产党"],"dates":[{"year":2020}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"法国毛主义共产党二〇二〇年"},{"type":"paragraph","text":"致我们的阿富汗同志："},{"type":"paragraph","text":"我们怀着极大的悲痛得知阿富汗共产党（毛主义）主席齐亚同志在68岁时因心脏病去世。齐亚同志是阿富汗共产主义运动的长期领袖，在阿富汗还是君主政体的时候，他就已经是一位革命者了。法国毛主义共产党和我们的组织向齐亚同志的党、他的同志、阿富汗群众和他身边的人表示最深切的慰问。我们记得，当我们的创始人皮埃尔同志去世时，阿富汗同志也是这样做的。"},{"type":"paragraph","text":"我们强调，在阿富汗共产党（毛主义）中央委员会发表的悼词中齐亚同志所作的如下几点贡献："},{"type":"paragraph","text":"他在团结阿富汗的共产党人方面的作用。马克思列宁毛主义者现在已经在单独一个党，即阿富汗共产党（毛主义）的领导下了。从他在1987年创立并领导的革命共产主义小组到2014年阿富汗共产党（毛主义）第二次代表大会，我们看到了为共产党人的团结而不懈奋斗的一生。"},{"type":"paragraph","text":"他提出的为了开展反对统治阿富汗的帝国主义者、官僚资本主义者和封建领主的民族抵抗，通过人民战争进行革命的口号。"},{"type":"paragraph","text":"他对继承和发展在1979年被反动政府杀害的伟大的阿富汗共产主义领袖阿克拉姆·亚里的政治路线的贡献。"},{"type":"paragraph","text":"亲爱的阿富汗共产党（毛主义）的同志们，我们同你们一样悲痛，因为国际无产阶级失去了一位战斗员。我们向在阿富汗和所有国家继承他的工作和发展革命道路致敬。"},{"type":"paragraph","text":"齐亚同志永垂不朽！齐亚同志将活在国际无产阶级的斗争中！齐亚同志和我们在一起！马克思列宁毛主义万岁！"},{"type":"paragraph","text":"法国毛主义共产党2020年6月24日"},{"type":"paragraph","text":""}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"毛主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"849773da45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
