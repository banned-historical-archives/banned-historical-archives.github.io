script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本残酷剥削和迫害  法国铁路工人汽车制造工人坚持罢工  马赛港仓库工人举行罢工要求改善劳动条件","authors":[],"dates":[{"year":1969,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削和迫害"},{"type":"paragraph","text":"法国铁路工人汽车制造工人坚持罢工"},{"type":"paragraph","text":"马赛港仓库工人举行罢工要求改善劳动条件"},{"type":"paragraph","text":"新华社八日讯　巴黎消息：法国一些地方的工人不顾黄色工会头目的阻挠，连日来不断举行罢工，抗议垄断资本集团的残酷剥削，要求增加工资和改善劳动条件。"},{"type":"paragraph","text":"巴黎西南郊区的铁路工人七日继续坚持罢工斗争。铁路工人从五日午夜起举行三十六小时罢工，抗议铁路当局无理迫害工人。由于当局蛮横坚持迫害工人的反动措施，铁路工人在七日中午以后继续罢工。罢工使巴黎郊区的铁路运输受到很大影响。"},{"type":"paragraph","text":"普吉奥汽车公司在索肖的工厂的五千名工人，七日继续举行罢工，要求增加工资和改善劳动条件。这次罢工已经坚持了五天。"},{"type":"paragraph","text":"在法国最大港口马赛，仓库工人七日也举行二十四小时罢工，要求改善劳动条件。"},{"type":"paragraph","text":"新华社七日讯　巴黎消息：法国巴黎的铁路工人不顾黄色工会头目的反对，从五日午夜起开始举行三十六小时罢工，抗议当局迫害参加罢工的工人。"},{"type":"paragraph","text":"罢工使巴黎郊区的铁路运输受到很大影响。"},{"type":"paragraph","text":"此外，法国汽车工业工人最近也接连举行罢工，抗议垄断资本家残酷剥削工人，要求增加工资。普吉奥汽车公司在索肖的工厂的六千名工人，已经连续第四天举行罢工，在这以前，雷诺汽车公司在芒城的工厂的工人，也举行了将近十天的罢工。"},{"type":"paragraph","text":"新华社五日讯　巴黎消息：法国最大的汽车制造厂雷诺汽车公司在芒城的工厂的工人，四日继续举行罢工，抗议垄断资本的残酷剥削。"},{"type":"paragraph","text":"这个工厂的工人从二月二十四日起就开始举行罢工。法修工会头目在工人坚持斗争的过程中出卖工人利益，伙同资本家企图强迫工人复工，罢工工人非常愤慨，拒绝了工会的复工命令。"},{"type":"paragraph","text":"这次罢工不仅使雷诺公司在芒城的工厂的生产陷于停顿，并且使这家公司在法国的所有工厂的生产都受到影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d8baa6eb4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
