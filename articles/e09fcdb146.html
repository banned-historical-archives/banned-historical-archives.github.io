art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"短讯","authors":["杨越朝曲文革杨军夏军敏高文雄"],"parts":[{"type":"paragraph","text":"四医大举办空运后送培训班"},{"type":"paragraph","text":"6月12日至7月1日，第四军医大学举办了全军首届空运后送培训班。来自全军各应急机动医院和全军空运后送医疗队的30名领导和业务骨干参加了培训。（杨越朝、曲文革）"},{"type":"paragraph","text":"襄樊分院帮助驻地办夜校"},{"type":"paragraph","text":"军事经济学院襄樊分院帮助驻地何家洼村、大黄家村办起了“夜校”，开设家电维修、法律知识、卫生保健、科学养殖等农村实用技术课程，使村民大都有了一技之长。（杨军）"},{"type":"paragraph","text":"张家口通院研制出新型电子键"},{"type":"paragraph","text":"张家口通信学院计算机教员彭设强和报务教员王星全研制的新型电子键通过了总参通信部技术鉴定。使用这种电子键培训新报务员，由以往的一年左右时间减少到一个月。（夏军敏）"},{"type":"paragraph","text":"空电院建立学员能力考核卡"},{"type":"paragraph","text":"今年，空军电讯工程学院在每个毕业学员的档案中装入“政治思想工作能力”等10几项考核登记卡，方便了接收部队掌握学员的全面情况。（高文雄）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e09fcdb146"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
