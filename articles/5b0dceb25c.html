script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美共“工人日报”暂时停刊  修正主义分子盖茨已经退党","authors":[],"dates":[{"year":1958,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美共“工人日报”暂时停刊"},{"type":"paragraph","text":"修正主义分子盖茨已经退党"},{"type":"paragraph","text":"新华社19日讯　纽约消息：有三十四年历史的纽约“工人日报”，已于13日停刊。这是去年年底美国共产党全国执行委员会的一次会议上作出的决定。决定中说，由于出版成本的不断上涨，已使“工人日报”和其他劳工报纸处于困境，因此暂时停止出版“工人日报”一个时期是必要的，这样可以保证“工人日报星期刊”的加强和继续出版。在这一次会议上，该报总编辑盖茨是唯一反对“工人日报”停刊的人。"},{"type":"paragraph","text":"盖茨是在美国共产主义运动内部鼓吹修正主义的首脑。在盖茨的主持下，“工人日报”经常刊载他本人和其他修正主义分子鼓吹修正主义的言论。它的国际新闻编辑克拉克，在被批评利用“工人日报”散布修正主义之后，已于数月前退党，并向资产阶级报纸发表声明攻击美共。"},{"type":"paragraph","text":"“工人日报”决定停刊之后，盖茨即在10日在纽约招待记者，声明他已经退党，并污蔑美共领导人威廉·福斯特。关于盖茨退党一事，美共全国行政委员会曾发表声明说，在若干时期以来，盖茨一直在企图改变马克思主义的许多基本原则。他不仅滥用在党内可以发表不同意见的权利，并且向资产阶级报纸发表谈话来向党进行尖锐的斗争。他现在已经成为一个公然反对共产党和马克思主义的工人阶级纲领的人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b0dceb25c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
