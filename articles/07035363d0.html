script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"忠于毛主席，千难万险无阻挡","authors":[],"dates":[{"year":1969,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"忠于毛主席，千难万险无阻挡"},{"type":"paragraph","text":"铁道兵活学活用毛泽东思想先进集体、某部九连副指导员　张本志"},{"type":"paragraph","text":"十月十四日下午，伟大领袖毛主席和他的亲密战友林副主席，亲切地接见了我们。这是我们铁道兵战士最大的幸福，最大的光荣。在这终生难忘的幸福时刻，我们满怀革命激情千遍万遍地高呼：敬祝毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"毛主席啊，毛主席！仰望着您老人家的高大形象，看见您老人家身体非常非常健康，我们热泪盈眶，心潮澎湃！敬爱的毛主席啊，您是我党的缔造者，我军的缔造者。在您老人家的光辉思想指引下，我们连队转战祖国南北，逢山开路，遇水架桥，修起了一条条铁路，锻炼了艰苦奋斗的作风，提高了继续革命的觉悟，连续八年被评为四好连队。几年来，您老人家五次接见了我们连队的代表，每一次，都给了我们无比强大的力量！忠于您，我们刀山火海也敢闯；保卫您，我们洒尽热血也心甘！靠着您老人家的光辉思想，我们斗风雪，战严寒，和兄弟部队一起，胜利地打开了零下五十多度的高寒“禁区”，在林海雪原里铺起了钢铁大道。"},{"type":"paragraph","text":"今年，我们从高寒“禁区”来到了俗称“火炉”的高温地区，接受了修建铁路大桥的光荣任务。上级要求我们要赶在洪水期前把桥墩抢出水面。当时，正值夏季，烈日当头，工地气温高达五十多度。面对重重困难，我们反复学习您的伟大教导：“我赞成这样的口号，叫做‘一不怕苦，二不怕死’”。您的光辉思想，推动我们抗酷暑，破难关，在继续革命的大道上勇往直前。同志们把五十多度的高温当成锤炼一不怕苦、二不怕死彻底革命精神的熔炉，把努力完成战备施工任务，当作给帝、修、反的又一沉重打击！我们发扬了一不怕苦、二不怕死的革命精神，奋勇抢建大桥，连破“热”、“险”、“难”三关，不断创造出施工新纪录，提前三个多月多快好省地建起了大桥。"},{"type":"paragraph","text":"毛主席啊，毛主席！您教导我们：“人民解放军永远是一个战斗队”。当前，美帝国主义、社会帝国主义为了摆脱内外交困的处境，互相勾结，阴谋策划对我国的侵略战争，对我国进行核讹诈。我们一定把您的亲切关怀带回部队，用您关于无产阶级专政下继续革命的伟大学说，进一步把部队建设成一不怕苦、二不怕死的战斗集体，抓革命，促生产，促工作，促战备。如果敌人胆敢发动侵略战争，我们就坚决用革命战争消灭侵略战争，彻底埋葬帝、修、反！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07035363d0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
