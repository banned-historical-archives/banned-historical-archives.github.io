"dates":[{"year":1957,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"蒙古族的败类——荣祥","type":"title"},{"text":"《人民日报》呼和浩特讯：内蒙古自治区直属机关各族人民在反右派斗争中，彻底揭破了一向伪装蒙古民族利益维护者荣祥反共反人民面目。","type":"paragraph"},{"text":"荣祥现任呼和浩特副市长兼文史馆馆长、政协呼市委员会副主席、内蒙古政协委员、内蒙古及市人民代表大会代表等重要职务。这次整风开始后，他立即恶毒地向党进攻，他诬蔑“共产党员有两个来源——主观主义和官僚主义；一个组成部分——宗派主义。”“共产党爱的是胁肩谄笑的人，听的是歌功颂德的话，看到直脖子的人就看不惯，听到说点坏话就听不惯。”他竟然说：“现在还不如清朝哩！”他歪曲历史，挑拨说：“在清朝蒙汉人民还是相安无事的，可是现在呢，互相整得七死八活！”他恬不知耻以土默特旗（在呼和浩特市西面）的“圣雄”（指印度的甘地）自居。土默特旗存在着旗县并存的不合理现象。解放以后，党和政府为加强民族团结，按照当地多数蒙汉人民的愿望加以合理解决。但是荣祥却借此大肆攻击说：“国民党作不出来的事，共产党作出来了。”他煽惑划到呼和浩特的原土默特旗蒙古人民说，“你们找到了后娘，不会有人替你们说话的。将来有冤无处诉，不得不找我老汉来。”暗示只有他才是土默特旗蒙古人民的亲娘。","type":"paragraph"},{"text":"他还在民族内部制造分裂，硬把内蒙古自治区分为东西对立的两部。他说，东部来的蒙古人有“关门主义”，我们西部蒙古人得来个“叫门主义”。又说，“东部蒙古人把西部蒙古人整的够呛！可是他们（指东部蒙古）不敢欺侮我老汉，我老汉在毛主席那里挂上号了。”","type":"paragraph"},{"text":"荣祥是封建贵族家庭出身，他依靠蒋介石和阎锡山爬上了土默特旗总管的宝座。当蒋介石发表臭名远扬的“中国之命运”，否认中国国内各少数民族的存在，因而激起全国各族人民的公愤时，荣祥反而随声附和，发表“蒙汉同源论”，鼓吹什么“蒙古民族是黄帝子孙，是汉族的一个宗支”等荒谬论调。","type":"paragraph"},{"text":"抗战胜利后，荣祥的反动活动更加猖狂了。１９４７年，国民党反动派大举进攻草原，屠杀内蒙古人民，他却要内蒙古人民不要反抗国民党政府。他发表反动文告，劝告内蒙古同胞退出解放战争。他说这是国共两党之争，与蒙古人无关。他这篇文告起了极大的反动作用。当时察哈尔盟的穆格敦宝等就随声应和，投入了国民党反动统治者的怀抱，走上了反人民的道路。在国民党占领了延安后，荣祥又发表了所谓告蒙古青年书，号召他们弃暗（指共产党）投明（国民党）。","type":"paragraph"},{"text":"这个厚颜无耻的蒙古族人民的败类还在１９４６年组织了“抗日蒙旗庆祝还都代表团”，并自任团长，去南京“晋谒”蒋介石，向蒋呈献“河山再造”锦旗，及康熙亲征噶尔丹（蒙古民族英雄）所用御剑。","type":"paragraph"},{"text":" ——原载《人民日报》1957年7月28日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"554251c3d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
