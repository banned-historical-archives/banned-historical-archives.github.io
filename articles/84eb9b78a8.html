极大愤慨","authors":[],"dates":[{"year":1966,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"介绍中国文化大革命的幻灯片在巴黎放映受到观众热烈欢迎"},{"type":"paragraph","text":"某些反华分子进行捣乱引起观众极大愤慨"},{"type":"paragraph","text":"新华社巴黎二十二日电　最近刚访问中国回国的法中友好协会大学生委员会代表团，二十日在巴黎国际大学生文化联欢节的晚会上，放映了介绍中国社会主义建设和人民生活，介绍中国无产阶级文化大革命的幻灯片，引起观众极大的兴趣。"},{"type":"paragraph","text":"这些幻灯片是在排除了反华分子的无理阻挠和在观众的热烈支持下才能在晚会上放映的。"},{"type":"paragraph","text":"很多观众怀着迫切了解新中国，了解中国文化大革命的心情来参加晚会。但是某些反华分子害怕群众了解中国的真相，滥用主持当天晚会的权力，故意临时安排“节目”，无理取闹，占据舞台，企图挤掉访华代表团的节目。他们的捣乱活动激起了观众极大的愤慨，斗争一直持续到深夜，那些捣乱的家伙在观众中完全陷于孤立，最后只得溜走。这时场内立刻恢复平静，观众都回到座位上。虽然已经很晚，大家的情绪始终饱满，坚持看了幻灯片和听访问中国见闻的报告。"},{"type":"paragraph","text":"放映幻灯和报告结束时，全场观众热烈鼓掌。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84eb9b78a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
