<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德共(马列)第一主席致电中国共产党和毛主席衷心祝贺我党十大圆满结束","authors":[],"dates":[{"year":1973,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年九月十六日电　德国共产党(马克思列宁主义者)第一主席恩斯特·奥斯特代表德共(马列)中央委员会最近打电报给中国共产党和毛泽东主席，最衷心地祝贺中国共产党第十次全国代表大会圆满结束。"},{"type":"paragraph","text":"贺电说:“第十次代表大会是对修正主义和社会帝国主义的一次打击。它表明了正确路线战胜对这条路线的一切偏离，表明了无产阶级营垒战胜以刘少奇和林彪为头子的两个资产阶级司令部。这次代表大会证明，只要同人民群众紧密团结，只要依靠马克思主义、列宁主义和毛泽东思想，只要不倦地同修正主义及其所有代理人进行斗争，只要永不松懈反对阶级敌人的斗争警惕性，资产阶级及其分裂企图是能够战胜的。"},{"type":"paragraph","text":"“以毛泽东同志为首的光荣和正确的中国共产党在历史过程中一再向我们指出，要进行社会主义革命，要建立和巩固无产阶级专政，就不要松懈反对资产阶级和修正主义的斗争。中国共产党以生动的事例向我们证明，为此必须依靠科学社会主义和紧密地联系广大人民群众。中国共产党的斗争一直是我们在我国进行斗争的光辉榜样。肯定了九大路线并且使之深入发展的第十次代表大会同样也是加强我们的认识和斗争勇气的一个源泉。”"},{"type":"paragraph","text":"贺电接着说，粉碎以刘少奇和林彪为头子的两个资产阶级司令部说明，“在社会主义的历史阶段中也必须继续进行阶级斗争和十分激烈地进行党内两条路线的斗争。资产阶级和现代修正主义者在他们最终被击溃之前，总是企图进攻社会主义国家，颠覆和从内部瓦解共产党。永不放松反对工人运动中资产阶级代理人的斗争，这就是共产党的任务。中国共产党一贯尊重这个马列主义的根本原则。中国共产党通过无产阶级文化大革命巩固了中华人民共和国的无产阶级专政。”"},{"type":"paragraph","text":"“你们在斗争中取得的、为第十次代表大会所确认和总结的胜利，使我们欢欣鼓舞，并将激励我们绝不停止反对现代修正主义的斗争。”"},{"type":"paragraph","text":"贺电说:“第十次代表大会宣布，中国共产党始终不渝地坚持无产阶级国际主义的原则，大力反对大国沙文主义，同全世界无产阶级和正在斗争的各国人民团结在一起。这些原则已写入党章。"},{"type":"paragraph","text":"“党代表大会号召中国人民和全世界人民反对美苏两个超级大国的阴谋，并强调指出新的世界大战的危险依然存在。帝国主义和社会帝国主义尽管召开所谓的‘安全’会议和侈谈和平，但它们不会、而且永远不会是和平的。这样的会议和空谈只能有利于它们的战争政策和反对各国人民。”"},{"type":"paragraph","text":"贺电还说:“德国人民及其共产党将对帝国主义或社会帝国主义反对社会主义中国的每一侵略行动用这样的口号进行回击:‘不准干涉中华人民共和国!’同志们，我们向你们，并向全中国人民保证，在反对帝国主义和社会帝国主义侵略中华人民共和国的斗争中，将得到我们的全力声援和支持。我们将毫不松懈地揭露两个超级大国针对你们国家的侵略政策，在西德宣传中国共产党的正确路线。”"},{"type":"paragraph","text":"贺电最后表示热烈欢呼中国共产党第十次全国代表大会圆满结束和取得反对现代修正主义及其代理人的胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f62e9f0957"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
