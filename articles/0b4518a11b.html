使和徐向前同志祝酒","authors":[],"dates":[{"year":1973,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗博大使宴请访阿归来的我军事友好代表团"},{"type":"paragraph","text":"叶剑英肖劲光余湛任允中等同志应邀出席罗博大使和徐向前同志祝酒"},{"type":"paragraph","text":"新华社一九七三年七月十九日讯　阿尔巴尼亚驻中国大使罗博今天晚上举行宴会，欢迎由中共中央军委副主席徐向前率领的中国军事友好代表团访问阿尔巴尼亚归来。"},{"type":"paragraph","text":"应邀出席宴会的，还有中共中央军委副主席叶剑英，国防部副部长肖劲光，外交部副部长余湛，中共中央对外联络部负责人任允中，有关方面负责人田维新、张宗逊、傅传作、王磊、种汉九、王岳西、于洪亮，中国驻阿尔巴尼亚大使刘振华等。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使馆武官卡比苏茨、商务参赞丰多等出席宴会作陪。"},{"type":"paragraph","text":"席间，罗博大使和徐向前副主席先后祝酒，共祝阿中两国人民和军队之间的战斗友谊万古长青。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b4518a11b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
