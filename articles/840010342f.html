thors":["刘远修"],"dates":[{"year":1962,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"广西各地出现偷杀、滥杀耕牛现象","type":"title"},{"text":"刘远修","type":"authors"},{"text":"新华社南宁讯　广西各地由于放松了耕牛市场的管理，出现了偷杀、滥杀耕牛的现象。","type":"paragraph"},{"text":"据玉林专区税务局统计，全专区１至９月份共杀耕牛四万二千二百四十九头，占该专区耕牛总数的８％。１０月份，这个专区经供销社系统收购上来的耕牛二千八百六十头，其中宰杀供应市场的就有二千五百头。梧州专区９月份宰杀耕牛、菜牛二千六百八十三头，比４至８月份平均屠杀数增加６０％。宾阳卢圩每三天一个圩日（集市），每圩都有二十头左右被宰杀的耕牛。卢圩供销社自９月２７日到１０月２０日，共杀耕牛六十多头，其中绝大部分都是有劳役能力的牛。上思县高加公社的八个生产队杀了十一头牛，除一头是可杀的菜牛外，其余都是不应该杀的。据自治区公安厅的统计，１０月份共发生偷杀耕牛案件一百三十五起，比９月份上升８４。９％。","type":"paragraph"},{"text":"来源：１９６２年１２月３日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"840010342f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
