hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"关于举办学习班的指示","alias":"","parts":[{"type":"paragraph","text":"我们坚决支持你们。我们两国是容齿相依的邻邦，我们两国人民是休戚与共的兄弟。兄弟的越南南方人民和全体越南人民可以相信，你们的斗争就是我们的斗争。七亿中国人民是越南人民的坚强后盾，辽阔的中国领土是越南人民可靠的后方。在我们两国人民坚强的战斗团结面前，美帝国主义的任何军事冒险和政治欺骗都是注定要失败的。"},{"type":"paragraph","text":"胜利--定属于英雄的越南人民"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六七年十二月十九日关于举办学习班的指示"},{"type":"paragraph","text":"（-九六七年十月一一九六八年二月）中央应该开，主要是各省开，不仅军队开，地方党政文教也要集训。"},{"type":"paragraph","text":"X"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"造反派也要训，他们坐不下来，心野了，一期不行，可以训练两期、三期。造反派人很多，我看训练的办法好。"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"×军队办学习班，要有战：十参加。"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"×办学习班，是个好办法，很多问题可以在学习班得到解决。"},{"type":"paragraph","text":"（转引自“儿六八年二月五日《人民日报》、《解放军报》"},{"type":"paragraph","text":"社论：《华北山河-片红》）·344°"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":2,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":357,"page_end":357},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"440c6f8bcd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
