" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于召开各区负责同志会议讨论军事、土改等问题的报告","authors":["毛泽东"],"dates":[{"year":1950,"month":3,"day":18}],"is_range_date":false,"parts":[{"text":"中央关于召开各区负责同志会议讨论军事、土改等问题的报告","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"德怀、小平、漱石、方方、高岗同志：","type":"appellation"},{"text":"为讨论军事和土改等项问题，拟请各区负责同志来京开会一次，请你们五位于接电后数日内即动身来京（林彪粟裕二同志已到京）。为此，西北军区会议须改期开会。彭来京用何交通工具望告，我们意见可乘火车。小平何日动身为宜望告确期，以便派飞机来接。剑英刚从武汉回粤，请方方来京一次。彭邓饶方四同志可于三月廿四、五两日到京，高岗同志到京时间另电通知。","type":"paragraph"},{"text":" 中央三月十八日上午一时","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9824d4fa7b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
