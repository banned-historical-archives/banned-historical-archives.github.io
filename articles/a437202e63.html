art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忘不了党和毛主席的恩情","authors":["王玉柱〖HH/换行〗DW：6829部队冲锋机枪连"],"parts":[{"type":"paragraph","text":"两忆三查的忆苦大会上，我谈出了在旧社会父子离散的苦难遭遇，党和部队首长、地方政府就千方百针地四处帮我查访，使我们骨肉重新团圆，我们父子俩永远忘不了党和毛主席的大恩！"},{"type":"paragraph","text":"最近，报上登出我们父子离散十八年重相逢的事情后，爹和我都收到了许多阶级兄弟的祝贺信。读了这些信，我心里一阵阵地温暖和激动，我衷心地感谢党和上级对我们父子的帮助，感谢同志们对我的关怀！"},{"type":"paragraph","text":"前几天，我们连里学习连队管理教育工作条例。听了同志们对旧军队官兵关系的控诉，使我进一步认清了我们人民军队的阶级本质。在人民军队里，干部是这样爱护和关怀战士，官兵都以阶级兄弟相待，互敬互爱，干部关心每一个战士的身世和苦处，帮助战士提高政治觉悟，解决困难和疾苦。想想旧社会，更使我体会到今天的幸福，想想旧军队，更使我感到革命军队大家庭的温暖。"},{"type":"paragraph","text":"最近，领导上让我担任了副班长。我知道这是党对我的信任，也是人民交给我的责任。我一定要象对亲兄弟一样团结好全班同志，永远听党和毛主席的话，尊重和爱护干部，服从命令，努 力提高政治觉悟，努力学习军事技术，帮助全班同志争当五好战士，争取四好班，永远做毛主席的好战士。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a437202e63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
