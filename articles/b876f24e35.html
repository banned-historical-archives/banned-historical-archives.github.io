art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"假“关心”真欺骗","authors":["战士高金彪"],"parts":[{"type":"paragraph","text":"邓小平重新工作后，为了推行反革命的修正主义路线，极力标榜自己“最关心群众”，千方百计地装扮成“为民请命”的样子。那么，就让我们看一看邓小平是如何“关心群众”的吧。"},{"type":"paragraph","text":"邓小平说过不少“关心”群众的话，什么要保护老工人，要“关心群众福利”，要爱护群众。可是实际上又怎样呢？在政治上，他以“整顿”为名，加紧对工人实行“管”、“卡”、“压”，用修正主义的绳索，捆绑人民群众的手脚。他甚至胡说什么“依靠工农兵是相对的”，肆意剥夺党和毛主席给我们工人阶级和贫下中农的当家做主人的政治权力。在经济上，他拚命反对批判和限制资产阶级法权，扩大他们这些修正主义“大官们”与人民群众的差别，培植特权阶层，重走两极分化的老路。可见，他“关心”群众的话，虽然说得悦耳动听，只不过是一种骗人的把戏。"},{"type":"paragraph","text":"特别应当提出的是，邓小平刚刚窃取了党和国家的一部分权力，就如此这般“关心”我们，如果他颠覆无产阶级专政、复辟资本主义的反革命阴谋得逞，无产阶级和广大劳动人民将会陷于怎样的局面呢？那就只能是被再次送进水深火热的人间地狱。邓小平这种“关心”的卑劣行径，正象俗话所说的：“黄鼠狼给鸡拜年，没安好心”。我们一定要彻底揭穿他的反革命祸心！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b876f24e35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
