dates":[{"year":1983,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《法制建设》杂志创刊"},{"type":"paragraph","text":"叶剑英为刊名题字　彭真题词"},{"type":"paragraph","text":"本报讯　司法部主办的专业性刊物《法制建设》在本月内创刊。叶剑英同志亲笔为刊名题字；彭真同志为该刊题词：“密切联系实际用简明易懂的语言逐步使宪法家喻户晓并养成人人守法的习惯”。"},{"type":"paragraph","text":"《法制建设》杂志，将在党的四项基本原则指导下，坚持理论联系实际，宣传党的有关政法工作的路线、方针和政策，宣传宪法、法律和行政法规，研究法制建设中遇到的实际问题，反映我国法制建设的成就，交流政法工作的经验，普及法律知识。同时，有计划、有选择地介绍古今中外的有关法律资料和司法制度，力求为完善我国的法律和司法制度，提高政法队伍的素质和广大干部群众的法制观念服务。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8e14b5aa8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
