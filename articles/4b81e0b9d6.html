<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想统一思想解决矛盾  戚墅堰机车车辆厂革委会举办学习班迅速改变了“老大难”单位的面貌","authors":[],"dates":[{"year":1969,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用毛泽东思想统一思想解决矛盾"},{"type":"paragraph","text":"戚墅堰机车车辆厂革委会举办学习班迅速改变了“老大难”单位的面貌"},{"type":"paragraph","text":"据新华社南京电　江苏戚墅堰机车车辆厂革委会在解放军支左人员帮助下，通过举办各种类型的毛泽东思想学习班，狠促领导班子思想革命化，迅速改变了“老大难”单位的落后面貌。"},{"type":"paragraph","text":"机车科是这个厂的主要生产部门。很长时间，这个科的革命、生产进展缓慢，存在问题较多。以前，厂革委会成员曾在这个科蹲点，但由于没有突出毛泽东思想，始终没有改变这个单位的落后面貌。驻厂解放军支左人员根据这种情况，帮助厂革委会认真学习了毛主席关于“办学习班，是个好办法，很多问题可以在学习班得到解决”的教导，并组织厂革委会主要领导成员深入到机车科，带着问题举办毛泽东思想学习班，用毛泽东思想统一认识，统一行动，一个一个地解决矛盾。"},{"type":"paragraph","text":"厂革委会主要领导成员经过深入调查研究了解到，机车科所以成为“老大难”单位，根本原因是领导班子革命化没有搞好。各级领导班子中资产阶级派性没有彻底消除，影响了革命团结。厂革委会从斗争实践中深刻体会到，要带好机车科这个队伍，首先必须抓好机车科带头人的思想工作。于是，他们首先举办了全科各级领导成员参加的毛泽东思想学习班，组织大家认真学习毛主席关于“如果这‘一班人’动作不整齐，就休想带领千百万人去作战，去建设”的教导，狠抓领导班子思想革命化。"},{"type":"paragraph","text":"在学习班里，厂革委会领导成员引导大家集中全力向资产阶级派性开火，提高各级领导班子成员用无产阶级党性掌权的自觉性。在这同时，厂革委会还采用开门整风的办法，先后邀请活学活用毛泽东思想积极分子、老工人等五十多人参加领导班子学习班，帮助领导成员斗私批修。在厂革委会和革命群众的促进下，这个科的各级领导班子成员都认真地作了自我批评，并且用大字报在群众中公布，让更多的群众进行评论。在这之后，各级领导班子中的资产阶级派性迅速消除，革命团结大大增强，长期没有解决的“老大难”问题都圆满地得到了解决。"},{"type":"paragraph","text":"厂革委会遵照伟大领袖毛主席关于“要过细地做工作”的教导，根据机车科人员多、工种多、问题复杂的具体情况，还发动群众层层举办各种专题学习班，一个一个地解决问题。在举办专题学习班之前，他们首先做好调查摸底工作，进行详细分析研究，找出问题的关键，再有的放矢地办。这些专题学习班，目标明确，时间短，解决问题快，收到了立竿见影的效果。"},{"type":"paragraph","text":"现在，这个科里长期遗留下来的许多复杂的“老大难”问题，在很短的时间里都一个一个地得到了解决，毛主席的各项无产阶级政策得到了迅速落实，革命和生产出现了朝气蓬勃的新面貌。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b81e0b9d6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
