行誓师大会","authors":[],"dates":[{"year":1967,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京22日电　贵阳、青岛地区工业、基建、交通、财贸系统革命职工、革命干部，分别在二十日举行誓师大会，决心以实际行动响应毛主席、党中央的伟大号召，更加鼓足干劲，狠抓革命，猛促生产，全面地、不折不扣地贯彻执行《中共中央给全国厂矿企业革命职工、革命干部的信》中的指示。"},{"type":"paragraph","text":"在贵阳地区召开的大会上，贵州省革命委员会副主任委员张明、贵州省军区副政治委员田化一、贵阳棉纺厂等单位的代表都在会上讲话。他们一致表示，中共中央的信，是我们心中最红最红的红太阳毛主席发出的伟大号召，是一项新的、振奋人心的动员令。我们一定以“只争朝夕”的革命精神，在无产阶级文化大革命和工业生产中作出最出色的成绩，来回答毛主席对我们的期望。"},{"type":"paragraph","text":"同日，贵州省革命委员会发出了关于坚决贯彻执行《中共中央给全国厂矿企业革命职工、革命干部的信》的决定，决定要求开展一个声势浩大的宣传周，使毛主席、党中央的号召家喻户晓，深入人心。决定还规定各厂矿企业都应当由革命群众组织的负责人、人民解放军当地驻军或民兵代表、革命领导干部、革命技术干部组成生产第一线指挥部，负责领导生产，迅速掀起一个轰轰烈烈的夺取革命、生产双胜利的高潮。决定还号召全省厂矿企业的革命职工和革命干部，都必须以毛主席、党中央提出的五点希望为奋斗目标，活学活用毛主席著作，按照毛主席的指示办事，为夺取无产阶级文化大革命和工业生产的双丰收而英勇奋斗。"},{"type":"paragraph","text":"在青岛市召开的大会上，青岛革命职工和革命干部一致表示，一定要以最坚定的决心，最坚决的行动，响应毛主席和党中央的号召，更加鼓足干劲，力争上游，誓做抓革命、促生产的最出色的模范。坚决执行以毛主席为代表的无产阶级革命路线，彻底批判资产阶级反动路线，坚决把党内一小撮走资本主义道路的当权派斗倒、斗垮、斗臭，挖掉修正主义的根子，把无产阶级文化大革命进行到底。要把活学活用毛主席著作提高到一个新阶段。在开展整风运动的基础上，尽快地实现按系统、按单位、按部门的革命的大联合和革命的“三结合”，开展增产节约运动，掀起工业生产新高潮，夺取无产阶级文化大革命和工业生产的更伟大的胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贵州文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b12c62bbb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
