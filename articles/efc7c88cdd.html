"authors":[],"dates":[{"year":1949,"month":8}],"is_range_date":false,"parts":[{"text":"中央关于组织工商业联合会的指示","type":"title"},{"text":"工商业以合并成立工商业联合会为好，我公营企业的主持人员亦应参加进去一些，以便教育和团结私人工商业家，但公家人员参加者不要太多，以免私营企业家因公家人占多数不便讲话而裹足不前。工商业联合会的重心应是私营企业。工业较商业的比重应遂步增加；公营企业主持人之参加，在各地亦应随各地工商业联合会之发展逐步增加，以便不占多数而能起有效的推动作用。","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efc7c88cdd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
