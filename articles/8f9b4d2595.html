art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"发展中日友好关系是执行毛主席的决策","authors":[],"parts":[{"type":"paragraph","text":"据新华社东京四月十一日电 邓颖超副委员长今天上午拜会日本前首相福田赳夫，转达了华国锋总理、叶剑英委员长、邓小平副总理对福田先生的问候。"},{"type":"paragraph","text":"福田先生说，今天能见到伟大的政治家周总理的夫人邓颖超阁下，感到很高兴。他说，周总理对改善日中关系作了很大的努力。"},{"type":"paragraph","text":"邓副委员长说，中国同日本开展友好工作，都是遵照毛主席制定的政策，都是用毛泽东思想来指导我们的工作。中日两国缔结和平友好条约，也是根据这个政策进行的。她说，福田先生提到周恩来同志为中日友好所作的工作，实际上他也是执行毛主席决定的政策，按照毛主席的思想进行工作。现在华国锋主席也是团结全党全国人民忠实执行毛主席制定的政策。所以，您可以放心，中日友好的前途是光明的。"},{"type":"paragraph","text":"邓副委员长对福田先生说，希望在你方便时到中国访问。我来时，华总理也要我邀请你访华，上次邓小平副总理来时也邀请了你。福田表示，他一定要去访问中国。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f9b4d2595"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
