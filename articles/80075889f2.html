ors":[],"dates":[{"year":1951,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿二日电】　中华人民共和国中央人民政府，毛泽东主席致电苏联部长会议主席斯大林大元帅，祝贺苏联武装部队建军三十三周年。全文如下:"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟部长会议主席斯大林大元帅:"},{"type":"paragraph","text":"值此苏维埃社会主义共和国联盟武装部队建军三十三周年之际，请接受我衷心的庆贺。"},{"type":"paragraph","text":"毛泽东　一九五一年二月二十一日"},{"type":"paragraph","text":"【新华社北京廿二日电】　中国人民解放军朱德总司令致电苏联陆军部部长华西列夫斯基元帅，祝贺苏联武装部队建军三十三周年。电文如下:"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟陆军部部长"},{"type":"paragraph","text":"华西列夫斯基元帅:"},{"type":"paragraph","text":"值此苏维埃社会主义共和国联盟武装部队建军三十三周年之际，请接受我衷心的庆贺，并祝英勇的苏联武装部队在捍卫世界和平的事业中无比强大。"},{"type":"paragraph","text":"朱德　一九五一年二月二十一日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80075889f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
