script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"福州市委强调继续批判极左路线  贯彻党的农村政策  纠正又限制社员发展家庭副业的错误  福建省委向全省通报了这一正确做法，要求各地全面贯彻三中全会规定的各项政策，要鼓励社员发展正当的家庭副业","authors":["陈明星"],"dates":[{"year":1979,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"福州市委强调继续批判极左路线  贯彻党的农村政策"},{"type":"paragraph","text":"纠正又限制社员发展家庭副业的错误"},{"type":"paragraph","text":"福建省委向全省通报了这一正确做法，要求各地全面贯彻三中全会规定的各项政策，要鼓励社员发展正当的家庭副业"},{"type":"paragraph","text":"据新华社福州七月二十一日电  新华社记者陈明星报道：福州市郊区一些社队干部最近又自行其是，违反政策，无理限制和禁止社员饲养家禽家畜。中共福州市委及时纠正这一错误，强调必须继续批判林彪、“四人帮”的极左路线，坚定不移地贯彻执行三中全会制定的党在农村的政策。"},{"type":"paragraph","text":"去冬今春以来，由于落实党在农村的政策，福州市郊区社员家庭副业、特别是家畜家禽生产得到迅速恢复和发展。目前，全郊区社员养的奶牛达一千二百头，比去年底增加近一倍；社员养的母鸭达十万九千多只，比去年同期增加百分之三十九；社员养的猪达十六万七千八百多头，比去年同期增加百分之二十七。群众高兴地说，随着三中全会精神的落实，城里市场丰富了，郊区农民收入增加了。"},{"type":"paragraph","text":"就在这个时候，福州市郊区突然刮起一股风，有的干部说：“社员牵了牛鼻子，抓了鸭尾巴，不关心集体，又走发家致富的资本主义道路了。”还有的说：“社员家庭副业既然是社会主义经济的‘补充’，其收入就不能超过集体分配部分的百分之二十。”于是，有的社队又擅自规定不准社员家庭养奶牛、母羊和母鸭等“土政策”。有的大队甚至责令社员限期“处理”掉所养的母牛、母羊、母鸭，郊区一时出现了社员卖牛卖鸭的现象。"},{"type":"paragraph","text":"福州郊区社员家庭副业是不是已经发展得“过头”了？是不是真的妨碍了集体生产、滋生了资本主义呢？福州市农办和郊区党委派人深入社队进行调查，重点解剖了城门公社。调查结果，对上述质疑作了否定的回答。第一，当前社员家庭养的奶牛、鸭子，无论户数和头数，比文化大革命前还少得多，说不上什么“过头”。第二，绝大多数社员都能完成集体规定的基本投工、投肥数。第三，这个公社地少人多，利用剩余劳动力发展正当的家庭副业，既增加社员收入，又为城市提供更多的副食品，跟资本主义联不上。"},{"type":"paragraph","text":"通过调查，福州市委认为，目前郊区社员根据三中全会精神，在巩固发展集体经济的同时，经营家庭副业，增加个人收入，活跃农村经济，是完全正确的，是应当予以鼓励和支持的。目前出现的这股“限制之风”，是林彪、“四人帮”极左路线的流毒没有肃清的反映。因此，不能简单地纠正了事，而必须继续批判极左路线。这是落实农村政策的一项重要前提。"},{"type":"paragraph","text":"最近，中共福建省委向全省通报了福州市委的正确做法，要求各地全面、准确地理解和贯彻三中全会规定的各项政策，在坚持发展集体经济的前提下，鼓励社员发展正当的家庭副业。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"909b971294"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
