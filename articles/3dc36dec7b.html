":1964,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京27日电】　毛泽东主席今天下午接见由陈辉燎率领的越南保卫世界和平委员会、越南亚非人民团结委员会代表团，由释善豪率领的越南南方民族解放阵线代表团，由陈明爵率领的越南新闻工作者代表团。毛泽东主席同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有:郭沫若、廖承志、范瑾、区棠亮等有关方面负责人。"},{"type":"paragraph","text":"越南民主共和国驻中国大使陈子平也在座。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\07\\647s010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e吕厚民\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e七月二十七日，毛泽东主席接见了由陈辉燎率领的越南保卫世界和平委员会、越南亚非人民团结委员会代表团，由释善豪率领的越南南方民族解放阵线代表团，由陈明爵率领的越南新闻工作者代表团。图为接见时合影。"},{"type":"paragraph","text":"(新华社传真　吕厚民摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社,新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3dc36dec7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
