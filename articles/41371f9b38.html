tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”与货币","authors":["空军通信学校欣红"],"parts":[{"type":"paragraph","text":"在商品制度下，货币是任何人都不能不使用的。而“四人帮”的一个余党却宣布：“货币对我不起作用”。听起来确实叫人惊讶。"},{"type":"paragraph","text":"谁都知道，货币对“四人帮”这伙资产阶级的典型代表，作用极大。江青不是为了谋取高薪，拚命巴结林彪，要林彪给她连晋数级吗？王洪文不是终日纸醉金迷，还要他的余党每年奉上几元吗？他们不是还“诱：以官、禄、德”，培养了一批铤而走险的反革命鹰犬吗？但是，货币对他们不起作用，这活也确实反映了一部分重要实际，这就是：“四人帮”及其余党，利用窃取的权力，作威作福，大量占有和挥霍的社会财富，是从来不付货币的，也是货币无法计算出来的！这说明“四人帮”及其余党搞的是封建阶级的特权。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41371f9b38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
