rs":["林彪"],"dates":[{"year":1966,"month":8,"day":23}],"is_range_date":false,"parts":[{"text":"在军委常委会上关于突出政治的指示","type":"title"},{"text":"林彪","type":"authors"},{"text":"什么叫突出政治？突出政治就是突出群众，就是群众路线。就是要发挥群众的积极性、创造性、主动性，就是要提高 群众的阶级觉悟，就是要发挥群众的力量，发挥群众的智慧。群众创造历史。这和文化大革命决定中提出要放手发动群众，敢字当头，是一个意思。我们的政治工作，就是在军队里在共产党的领导下进行阶级教育。我为什么讲不突出政治的、跟政治工作捣乱的要罢官呢？ 因为这个问题太重要了。不突出政治，就不能发挥群众的力量，就不能发挥群众的积极性。不突出群众，就突出个人。主席五条接班人指示的精神，第三条是讲要团结大多数力量，第四条是讲要吸收大多数人的智慧；第五条是讲要谦虚。要把过去的口号同现在新的情况结合起来。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35f974892f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
