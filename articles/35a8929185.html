art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英元帅当选全国人大代表空军和福建前线部队选出全国人大代表","authors":["吕培诚姜国志管国柱"],"parts":[{"type":"paragraph","text":"本报讯 广州部队军人代表大会二十四日选举中共中央委员、国防委员会副主席叶剑英元帅等十一人为第三届全国人民代表大会代表。"},{"type":"paragraph","text":"大会以无记名投票方式选举出的第三届会国人民代表大会代表，还有：李天佑、邱会作、刘兴元、詹才芳、文年生、陈明仁、江雪山、郝忠云、钱安良、李玉亭。"},{"type":"paragraph","text":"参加这次军人代表大会的代表，来自广州部队各个工作岗位。全军学习毛主席著作的尖兵、广州部队五好战士标兵黄祖示，战斗英雄程远茂、赵兴旺，广州部队五好战士标兵张仲明和广州部队模范共青团员刘瑞明等，都是这次军人代表大会的代表。他们带着广州部队全体官兵的嘱托，庄严地行使了自己的民主权利。"},{"type":"paragraph","text":"本报讯 空军十八、十九两日举行军人代表大会，选举吴法宪，王秉璋、成钧、曹里怀、刘善本、王海、刘玉堤、岳振华、赵毛臣等九人为第三届全国人民代表大会代表。"},{"type":"paragraph","text":"参加这次军人代表大会的代表，来自空军各兵种部队机关学校，具有广泛的代表性。他们受空军全体官兵的嘱托，以严肃认真的态度，参加了选举。"},{"type":"paragraph","text":"本报讯 福建前线部队二十三日召开军人代表大会，选出陈士渠、刘培善、皮定钧、朱绍清，王瑞生，王银虎，蔡萼等七人为第三届全国人民代表大会代表。"},{"type":"paragraph","text":"参加这次军人代表大会的代表，带着全体官兵的嘱托，怀着兴奋的心情，以无记名投票的方式参加了选举。"},{"type":"paragraph","text":"（吕培诚 姜国志 管国柱）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35a8929185"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
