ates":[{"year":1949,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【北平五日消息】　中国新民主主义青年团中央团校第一次毕业学员五百人，四日在北平举行毕业典礼，校长冯文彬讲话，勉励全体学员回去以后，要在当地党和政府的领导下努力把工作做好，并且要正确的开始认真负责的坚持下去。朱总司令也亲临恳挚而亲切的向毕业学员作了具体指示，午后全体毕业学员带着非常兴奋的心情进见中共中央毛主席，毛主席亲自接见他们，并且和全体学员摄影留念。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91e215db6a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
