[{"year":1953,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社迪化十三日电】　毛泽东选集第一卷维吾尔文版和哈萨克文版单行本，最近在新疆省出版。单行本共十五分册，是新疆人民出版社从一九五一年十一月到今年春天，在中共中央新疆分局“毛泽东选集出版委员会”的领导下陆续翻译出版的，已先后发行三十七万五千多册。现在，在新疆的城市及牧区中，开始出现了不少毛泽东选集学习小组。新疆人民出版社目前正在征求各族读者的意见，准备重新校正译文，将来出版卷集。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f195c46718"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
