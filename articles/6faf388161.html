script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"汉口正大布店资方违背共同纲领  限制员工政治自由  强迫填写入店“自愿书”，进行非法剥削","authors":["洪世昌"],"dates":[{"year":1950,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"汉口正大布店资方违背共同纲领"},{"type":"paragraph","text":"限制员工政治自由"},{"type":"paragraph","text":"强迫填写入店“自愿书”，进行非法剥削"},{"type":"paragraph","text":"【本报武汉讯】武汉市正大布店资方违背共同纲领的精神和工会法的规定，强迫店员填写入店“自愿书”，剥夺店员工人政治与经济权益，这事件，业经武汉市劳动局适当处理。正大布店于今年九月增雇店员十一人，资方强迫每个店员填写入店“自愿书”，其中竟规定“不准参加任何团体”，“临时店员系临时性质，雇用以一个月为一期，届期店员继续留用或解雇，皆由店方决定执行”等违反政府法令的苛刻条件。受雇店员因生活关系，被迫接受了这些条件。该店资方以这种不合理的契约为武器，进一步侵犯店员的合法权益。布业同业公会原通知各布店在国庆日放假庆祝，该店既不放假，也不按规定增发工资。"},{"type":"paragraph","text":"经武汉市劳动局及店员工会于九月底发觉了正大布店资方这种非法行为，劳动局立即多次对该店资方进行教育，但该店资方不肯承认错误，十月三日仍逼迫店员填缴“自愿书”。劳动局为纠正正大布店资方的错误，于十月十三日召集该店劳资双方开会，并邀有关部门代表参加。会上，该店资方仍借口不懂政府政策法令，并说工人填具“自愿书”是店员工人“自愿”。经店员工会代表于连和严正驳斥后，该店店员代表黄绍杰也表示当时接受“自愿书”的条件，系迫于生活，不得不这样作；布业公会代表张玉璜、工商联代表余智琛也一致指出正大资方这种行为是违法的。劳动局秘书主任张彬根据各方意见，指出正大资方的错误，并提出处理此事的意见：（一）自愿书中“不许参加任何团体”一条，应立即取消，并在报纸上公开检讨这种违法行为的错误。（二）协约中其他方面的问题，由劳资双方各推选代表，用协商方法，以民主、平等、自愿、两利的精神，根据共同纲领、工会法及布匹业劳资集体合同，重新修改与商定，协商后双方严格遵守。（三）资方不得借此解雇店员或利用介绍人与保证人威胁店员。（四）国庆节不放假应补发工资和加工工资。店员工会代表表示同意劳动局的处理意见，工商联与绸布业同业工会对政府的处理办法也表示满意，资方代表熊树清也承认了本身的错误，并愿意接受政府的宽大处理。会上并决定由店员工会和绸布业同业工会派出代表，帮助正大布店劳资双方进行协商，以便迅速建立新的正常的劳资关系。（咏、洪世昌）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6faf388161"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
