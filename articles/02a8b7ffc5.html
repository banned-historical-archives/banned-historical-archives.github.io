],"dates":[{"year":1978,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　长宁区文化馆以揭批“四人帮”为纲，抓紧对群众业余文艺创作队伍的整顿，并通过自愿报名，单位推荐，业务审核，充实了一批有一定创作能力的新同志，扩大了创作队伍。目前共有业余创作人员八十多人，分为诗歌组、话剧组、戏曲故事组、作曲组等。该馆还在有关专业单位的大力支持下，开展了群众性创作辅导活动，初步安排了怎样写群众歌曲、怎样写曲艺、诗歌创作漫谈、诗词声律、写戏常识和文艺创作与形象思维等十五讲。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02a8b7ffc5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
