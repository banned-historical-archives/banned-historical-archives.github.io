的关于他不作下届中华人民共和国主席候选人的建议的决定","authors":[],"dates":[{"year":1958,"month":12,"day":10}],"is_range_date":false,"parts":[{"text":"中国共产党八届六中全会同意毛泽东同志提出的关于他不作下届中华人民共和国主席候选人的建议的决定","type":"title"},{"text":"几年以来，毛泽东同志曾经多次向中央提出，希望不再继续担任中华人民共和国主席的职务。中央全会在经过了充分的、多方面的考虑以后，决定同意毛泽东同志这个提议，在第二届全国人民代表大会第一次会议上，不再提他作为中华人民共和国主席的候选人。中央全会认为，这完全是一个积极的建议。因为毛泽东同志不担任国家主席的职务，专做党中央的主席，可以使他更能够集中精力来处理党和国家的方针、政策、路线的问题，也有可能使他腾出较多的时间，从事马克思列宁主义的 理论工作，而并不妨碍他对于国家工作继续发挥领导作用。这样，对于全党和全国人民都更为有利。毛泽东同志是全国各族人民衷心爱戴的久经考验的领袖，在他不再担任国家主席的职务以后，他仍然是全国各族人民的领袖。在将来，如果出现某种特殊情况需要他再担任这种工作的时候，仍然可以根据人民的意见和党的决定， 再提他担任国家主席的职务。各级党委应当根据这些理由，在党的适当会议上，在各级人民代表大会会议上，在工矿企业工人的集会上，在人民公社的集会上，在机关、学校、部队的集会上，向党内党外的干部和群众进行充分的解释，以便大家了解这件事的理由，而不致有所误解。","type":"paragraph"},{"text":" 来源：1958年12月18日《人民日报》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"602bfecabe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
