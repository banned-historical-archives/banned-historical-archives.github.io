rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"缺席审判三十一名原万象方面极右军政警头目","authors":[],"parts":[{"type":"paragraph","text":"据新华社万象一九七五年九月四日电 根据老挝临时民族联合政府司法部第二○四号命令组成的中寮特别刑事法庭，九月三日缺席审判了犯有叛国罪行的三十一名原万象方面极右军、政、警头目。"},{"type":"paragraph","text":"中寮特别刑事法庭根据老挝国家法律判决原伪议会主席培·萨纳尼空、原王国总监文翁·纳占巴塞、原第二军区司令王宝、原万象军队副总司令库帕拉西·阿沛、原国防部总局长乌敦·萨纳尼空、原第五军区司令通立·觉宾本为死刑；判决原伪议会副主席昭索·赛萨纳、原财政大臣贡·萨纳尼空、原国防大臣西苏·纳占巴塞、原万象军队副总参谋长艾当·辛冯萨、原高等军事学院院长西拉·巴塔马冯为无期徒刑；判决占通·占塔拉西、洪潘·赛雅西、坎派·阿沛等二十人为二十年有期徒刑。特别刑事法庭还公布了上述罪犯的种种叛国罪行。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6575bb0ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
