script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"金昌满号召朝鲜作家和艺术家  用马克思列宁主义武装起来  彻底清除资产阶级思想残余","authors":[],"dates":[{"year":1958,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金昌满号召朝鲜作家和艺术家"},{"type":"paragraph","text":"用马克思列宁主义武装起来  彻底清除资产阶级思想残余"},{"type":"paragraph","text":"新华社平壤7日电  据“劳动新闻”今天报道，朝鲜全国作家和艺术家5日在平壤举行会议，讨论了有关文艺工作的问题。有一千一百多名朝鲜作家和艺术家参加了这次会议。"},{"type":"paragraph","text":"朝鲜劳动党中央委员会副委员长金昌满在会上发言时指出，根据党的正确的文艺政策，朝鲜北部解放十三年来已牢固地打下了人民的文学艺术的基础。他号召作家和艺术家们继续进行清除资产阶级思想残余，以马克思列宁主义思想和共产主义思想武装起来。"},{"type":"paragraph","text":"他强调指出，作家和艺术家要深入工厂和农村，参加劳动和实际工作。他说，这是清除旧思想并且能够创作出好作品的最有效的办法。他号召作家艺术家们与各经济部门的劳动人民一样“骑上千里马”前进。"},{"type":"paragraph","text":"在会上发言的还有劳动党中央委员会科学教育部部长河仰天，作家韩雪野和李箕永，人民演员黄彻等。"},{"type":"paragraph","text":"发言者批判了朝鲜文学艺术界中所存在的某些资产阶级思想的残余，并且对话剧“火焰之路”、“家族”和舞剧“白香传”等文艺作品中的错误进行了批判。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e85b7b9bd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
