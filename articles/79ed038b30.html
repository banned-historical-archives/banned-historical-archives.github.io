<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共长阳县委纪律检查委员会关于黄明发同志错划为右派分子改正报告的批复","authors":[],"dates":[{"year":1979,"month":3,"day":28}],"is_range_date":false,"parts":[{"text":"中共长阳县委纪律检查委员会关于黄明发同志错划为右派分子改正报告的批复","type":"title"},{"text":"县供销社：","type":"appellation"},{"text":"县委同意县供销社《关于改正黄明发同志右派分子结论的复议报告》。1958年整风反右派斗争中，黄明发同志的一些言论和意见，不是反党反社会主义性质。","type":"paragraph"},{"text":"根据中共中央（1978）55号文件精神，经研究，认定黄明发同志不是右派言论，决定撤销1958年8月10日长阳县人民委员会（58）长监字127文（关于对右派分子黄明发的处分决定》和原开除党籍的处分决定。恢复政治名誉，恢复党籍，恢复原工资行政22级，补发退职费。","type":"paragraph"},{"text":" 中共长阳县委纪律检查委员会1979年3月28日","type":"paragraph"},{"text":"关于改正黄民发同志右派分子结论的复议调查报告","type":"subtitle"},{"text":"黄民发，男，贫农成分，农民出身，高小文化程度，本县城关建国大队人，1951年1月参加工作，原任长阳县药材经理部副经理，共产党员。在反右斗争中，1958年8月10日经长阳县人民委员会（58）长监字127号文结论《关于对右派份子黄民发的处分决定》根据中共中央国务院《关于对右派份子的处理》精神，划为二类右派，撤销原有职务，开除党籍，送农场监督劳动4年，每月补助生活费12元。1967年9月在家因病去逝。","type":"paragraph"},{"text":"该员在反右斗争中结论的主要问题：黄在鸣放中说：“1955年党委制定的规划是官僚主义的规划”。修五峰这条公路是张省长去五峰在路上跌了跤才批准，现在的物资比解放前的质量差了；号召节约只在小集镇、小城市节约，而大城市、大地方在浪费；发展党员从印象出发，会吹、会说、小恩小惠、回假报的就培养入党，老实人无前途；梅院长（整风小组组长）在整风运动中不实事求是，借这个大风大浪害好人；1954年统购统销，光强调任务使下面强迫命令，造成党群关系恶化，群众说比国民党不如，统销后，群众不把饭我们吃，闹供应的不是个别地区，也不是思想问题，而是实际问题；统购时任务套产量，不符合任务就不散会。因此，有死人现象，并在供应上很不合理，机关吃得到，下力的人一天一斤吃不到，我家3岁小孩夜晚饿的喊，主要是吃不到，合作化太快了，冒进了；镇反只听群众呼声，上面就批准镇压，现在的政策过左了。","type":"paragraph"},{"text":"根据中共中央〔1978〕55号文件精神，我们对黄民发同志的问题进行了复查，该同志在反右斗争中，说过一些错话，但从根本上并不反党反社会主义，不是右派言论。经研究决定，对黄民发同志原划右派结论，应予改正，恢复政治名誉，恢复党籍，恢复原工资行政22级，补发退职费。","type":"paragraph"},{"text":" 湖北省长阳县供销合作社1979年3月24日","type":"paragraph"}],"comments":[],"origin":"《湖北长阳28名“右派分子”1979年平反复查批复文件合集》，中共长阳县委纪律检查委员会·1979年3~6月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79ed038b30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
