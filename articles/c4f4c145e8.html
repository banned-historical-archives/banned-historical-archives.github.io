rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈拥护以毛主席为首的新的党中央委员会","authors":["空军某部女飞行员孙玉兰姚家香王桂菊"],"parts":[{"type":"paragraph","text":"我们女飞行员怀着十分激动的心情，热烈欢呼党的十大的胜利举行，热烈欢呼以毛主席为首的新的中央委员会和新的中央机构的成立！坚决拥护周恩来同志作的政治报告和王洪文同志作的关于修改党章的报告，坚决拥护十大通过的新党章，坚决拥护把林彪和陈伯达永远开除出党，以及对林彪反党集团的其他主要成员的处理和所采取的全部措施。"},{"type":"paragraph","text":"我们女飞行员是在马列主义、毛泽东思想的哺育下成长起来的。我们深刻地体会到：没有党和毛主席，没有无产阶级专政的新中国，就没有我们的一切。透过林彪狰狞的豺狼嘴脸，一幕幕旧社会苦难遭遇又浮现在我们眼前。我们如今紧握驾驶杆的双手，在旧社会曾经提过祖辈相传的要饭篮；我们如今蹬着方向舵的双脚，在旧社会曾经艰辛地行走在无家可归的茫茫荒野上；在我们阶级姐妹的身体上，至今还印刻着旧社会鞭打的创伤。是党和毛主席领导我国人民推翻了三座大山，建立了无产阶级专政的社会主义新中国，我们妇女才获得了解放，我们这些旧社会的穷丫头才能插上钢铁翅膀，在碧空蓝天驰骋翱翔。而林彪反党集团妄图从根本上改变我党在社会主义历史时期的基本路线和政策，颠覆无产阶级专政，复辟资本主义，使我们劳动人民吃二遍苦，受二茬罪。林彪是我们全国人民的不共戴天的仇敌！"},{"type":"paragraph","text":"我们女飞行员决心和全国人民一道，紧紧地团结在以毛主席为首的党中央的周围，自觉地执行十大提出的各项任务，为保卫我国无产阶级专政和支援社会主义建设，永远展翅飞翔在毛主席开辟的红色航线上！"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4f4c145e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
