rs":[],"dates":[{"year":1975,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平李先念同黎笋黎清毅举行会谈"},{"type":"paragraph","text":"会谈在兄弟般亲切友好的气氛中进行"},{"type":"paragraph","text":"新华社一九七五年九月二十三日讯　中共中央副主席、国务院副总理邓小平，中共中央政治局委员、国务院副总理李先念，今天上午同越南劳动党中央委员会第一书记黎笋，越南劳动党中央委员会政治局委员、政府副总理黎清毅举行了会谈。"},{"type":"paragraph","text":"会谈是在兄弟般的亲切友好的气氛中进行的。"},{"type":"paragraph","text":"越南方面参加会谈的有：越南劳动党中央委员会候补委员、外贸部副部长李班，越南劳动党中央委员会候补委员、越南民主共和国驻中国大使阮仲永，外交部副部长阮基石，越南劳动党中央委员会经济和计划委员会副主任阮文柯，以及窦玉春、阮兴定、黄保山、黄仲儒、陈忠、阮庭榜等；"},{"type":"paragraph","text":"中国方面参加会谈的有：中共中央委员、外贸部长李强，外交部副部长韩念龙，中联部副部长申健，外经部副部长韩宗正，以及沈平、朱传贤、魏玉明、梁枫、高璐等。（附图片）"},{"type":"paragraph","text":"中共中央副主席、国务院副总理邓小平，中共中央政治局委员、国务院副总理李先念，同越南劳动党中央委员会第一书记黎笋，越南劳动党中央委员会政治局委员、政府副总理黎清毅举行会谈。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c470ac0a34"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
