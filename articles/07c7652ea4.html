<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于增补、调动、撤换各级革命委员会成员的通知","authors":[],"dates":[{"year":1969,"month":9,"day":17}],"is_range_date":false,"parts":[{"text":"中共中央关于增补、调动、撤换各级革命委员会成员的通知","type":"title"},{"text":"毛主席批示：照办。","type":"subtitle"},{"text":"中共中央关于增补、调动、撤换各级革命委员会成员的通知","type":"subtitle"},{"text":"伟大领袖毛主席说：“在需要夺权的那些地方和单位，必须实行革命的‘三结合’方针，建立一个革命的、有代表性的、有无产阶级权威的临时权力机构。这个权力机构的名称，叫革命委员会好。”","type":"paragraph"},{"text":"各级“三结合”的革命委员会是由军队代表、革命干部代表和革命群众代表组成的，是在无产阶级大革命夺权过程中，经过革命群众充分协商和经中央或上级革命委员会批准的。各级革命委员会要实行党领导下的民主集中制，发扬民主作风，提倡批评与自我批评。对各级革命委员会的成员要注意教育和培养，在一般情况下不要轻易更换。各地在增补、调动或撤换革命委员会成员时，必须采取慎重态度，以有利于巩固和发展革命的大联合和革命的三结合，有利于搞好斗、批、改，有利于抓革命、促生产，高举毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，加强革命团结，争取更大胜利。为此，中央特作如下通知：","type":"paragraph"},{"text":"一、革命委员会需要增补委员、常委和副主任时，要注意增补革命领导干部代表和革命群众代表，要着重增补优秀的产业工人代表。成立革命委员会时，给革命领导干部和革命群众代表留着空额的，应当在条件成熟时逐步补齐。","type":"paragraph"},{"text":"二、革命委员会中，有调往他处或红卫兵从学校毕业后下放劳动的，都不要忙于免除他们的职务。如工作确属需要，其缺额可予以适当补充。","type":"paragraph"},{"text":"三、革命委员会成员中，如有犯某些错误的，应按照“团结——批评和自我批评——团结”的原则，进行帮助教育，或送毛泽东思想学习班学习，给他们以改正错误的机会，不要轻易进行组织处理。","type":"paragraph"},{"text":"革命委员会成员中，有严重政治历史问题需要进行审查的，在报请中央或上级革命委员会批准时，应该将有关材料附上。但是在没有作出结论以前，不要撤销他们在革命委员会中的职务。","type":"paragraph"},{"text":"四、对于十分急需调动、撤销的革命委员会中的委员、常委、副主任和主任，要报经中央或上级革命委员会同意，才可以提交本单位革命群众中进行充分民主协商，在一定会议上通过以后，再报请中央或上级革命委员会批准。","type":"paragraph"},{"text":" 一九六九年九月十七日","type":"paragraph"},{"text":"（内部文件，印发至县团级，可传达到城乡结合各基层单位，不张贴，不广播，不登报）","type":"paragraph"}],"comments":[],"origin":"根据中央文件地方翻印件。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07c7652ea4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
