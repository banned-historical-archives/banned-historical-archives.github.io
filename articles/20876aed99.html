":[],"dates":[{"year":1967,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在无产阶级文化大革命的感召下"},{"type":"paragraph","text":"蒋帮空军少校曾朝品弃暗投明回祖国"},{"type":"paragraph","text":"新华社广州五日电　原蒋介石集团空军少校通讯官曾朝品弃暗投明，最近由美国回到广州。"},{"type":"paragraph","text":"一月四日，中国人民解放军广州部队空军负责人吴富善接见了曾朝品，对他弃暗投明的爱国行动表示欢迎，并赠送给他一部《毛泽东选集》，勉励他努力学习毛主席著作，好好改造思想，全心全意为人民服务。"},{"type":"paragraph","text":"曾朝品对人民政府和人民解放军对他的欢迎和关怀表示十分感激。"},{"type":"paragraph","text":"曾朝品原籍四川巴县人，一九六五年十二月，受美、蒋派遣到美国受训。他早就看到，我们伟大祖国在共产党和毛主席领导下，建设事业突飞猛进，国防力量日益强大，对祖国十分向往，对美蒋反动派在台湾的罪恶统治更加不满，深感为美蒋卖命没有前途。最近他在我国史无前例的无产阶级文化大革命的感召下，冲破重重障碍，毅然返回祖国。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20876aed99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
