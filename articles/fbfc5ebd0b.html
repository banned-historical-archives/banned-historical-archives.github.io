<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji10","name":"毛泽东全集第10卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"中共中央关于西安事变和平解决之意义及中央致国民党三中全会电宣传解释大纲","alias":"","parts":[{"type":"paragraph","text":"中共中央关于西安事变和平解决之意义"},{"type":"paragraph","text":"及中央致国民党三中全会电"},{"type":"paragraph","text":"宣传解释大纲"},{"type":"paragraph","text":"（1937年2月15日）"},{"type":"paragraph","text":"（一）西安事变有两种前途：一是国内战争，结果分裂中国，便利于日本之侵略与汉奸之卖国；一是国内和平，结果团结中国，便利于民族统一战线的形成与对日抗战之实现。"},{"type":"paragraph","text":"（二）中央采取一贯的和平方针，避免了战争危险，基本上建立了和平统一、团结御侮的基础。"},{"type":"paragraph","text":"（三）今后的任务是巩固国内和平，实行对日抗战。对此任务，我们须给予极大的努力。中央致国民党三中全会电，即为执行此种新任务的具体方向。"},{"type":"paragraph","text":"（四）我们要求国民党实行下列各条：甲、停止一切内战，集中国力一致对外；乙、言论集会结社之自由，释放一切政治犯；"},{"type":"paragraph","text":"丙、召集各党各派各界各军的代表会议，集中全国人材共同救国；"},{"type":"paragraph","text":"丁、迅速完成对日抗战之一切准备工作；戊、改善人民生活。"},{"type":"paragraph","text":"（五）如果国民党能够保证实行上列各条，即是说国民党放弃了他们过去的老政策，采取了上述的新政策，那末，抗日民族统一战线就在全国形成了，对日抗战就有了基础了。"},{"type":"paragraph","text":"（六）我们为了团结全国一致抗日之目的，愿意向国民党及全国保证实行下列各条："},{"type":"paragraph","text":"甲、停止推翻国民政府之方针；"},{"type":"paragraph","text":"乙、苏维埃政府改名为中华民国特区政府，红军改名为国民革命军，受南京国民政府及军事委员会之指导；"},{"type":"paragraph","text":"丙、在特区政府区域内实施普选的民主制度；丁、停止没收地主土地，实行抗日民族统一战线之共同纲领。"},{"type":"paragraph","text":"（七）上述各条是我们对国民党一个大的原则上的让步，其目的在于取消国内两个政权的对立，便利于组成抗日民族统一战线，一致地反对日本的侵略。这个让步是必须的，因为没有这个让步，就不便于组织抗日民族统一战线，就不便于迅速实行对日抗战。这是中央前年十二月决议案与去年九月决议案的具体实行步骤之一部分。"},{"type":"paragraph","text":"（八）苏区中苏维埃制度取消，实行普选的民主制度，并不能放弃工人农民已经获得的政治权利，而要继续保障之。红军改名为国民革命军，并不能放弃工农主要成分与党的政治上组织上的领导，而要继续保障之。在全国停止没收地主土地，并不能恢复苏区土地剥削制度，而要继续保障土地在农民手中。但在全国执行抗日民族统一战线之共同纲领，必须没收汉奸分子的土地。"},{"type":"paragraph","text":"（九）一九二七年党的八七会议以来一贯执行的苏维埃政权与土地革命的路线是完全正确的，因为那时以来的国内国际环境要求我们执行，也仅能执行这样的路线；一九三五年党的八一宣言及十二月决议案以来，我们一贯执行的抗日民族统一战线的路线，与为着彻底执行此路线，现在又提出取消苏维埃制度与停止没收地主土地的政策，也是完全正确的，因为此时的国内国际环境要求我们执行，也只能够执行这样的路线。"},{"type":"paragraph","text":"（十）总之中央的政策是从团结全国抗日救亡的历史任务出发，从实现中华民主共和国的口号出发，全党的同志都应彻底了解中央的政策，团结在中央政策的周围，为民族的阶级利益而斗争，为抗日民族革命战争的胜利而斗争。"},{"type":"paragraph","text":"中共中央二月十五日"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":2,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":195,"page_end":197},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbfc5ebd0b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
