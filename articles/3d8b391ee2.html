66,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热心读毛主席的书"},{"type":"paragraph","text":"一位年约五十多岁的老船员，在日本九州举行的中国经济贸易展览会上长时间地聚精会神地阅读《毛泽东选集》中文版。这位老船员告诉中国记者说，他是一年多以前开始学习《毛泽东选集》日文版的。他说：“毛泽东的书对我们最有用处，又最容易懂。在革命最困难的时候，毛泽东和中国许多革命家尽了千辛万苦，百折不挠地去开拓革命大业。当我开始读毛主席早期著作时，就为这种精神深深感动了。”这位老船员在同中国记者谈话时，特地用不大熟练的中文写下了几句话，来表达自己的心情：“我希望中日两国人民友好和团结，我们尊敬毛泽东老师。毛泽东万岁！中日友谊团结万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d8b391ee2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
