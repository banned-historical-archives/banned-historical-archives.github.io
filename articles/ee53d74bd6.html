ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"紧紧抓住整风这个关键","alias":"","parts":[{"type":"paragraph","text":"紧紧抓住整风这个关键！"},{"type":"paragraph","text":"（1943年6月6日）德怀同志："},{"type":"paragraph","text":"（一）安子文已到。你要他转告中央的谈话他已交到，我们看了很高兴。（二）整风前一阶段注意学风是正确的，但后一阶段便应注重党风，因学风是思想方法问题，党风是实践问题。只有在后一时期（今年下半年）注重党风，才能将思想方法应用于党性的实践，克服党性不纯现象。在党风学习中，自我批评应更发展，应发动各人专门对季米特洛夫的四条干部标准，写一次反省笔记，延安党校曾为此四条研究了两星期。党风最后阶段还应发动各人写思想自传，可三番五次地写，以写好为度。最后则发动坦白运动（可在冬季），叫各人将一切对不住党的事通通讲出来。发动填“小广播”表格及社会关系表，在这个两个表上，叫各人将平日所作一切带政治性而不应泄露的“小广播”及本人历史上各种社会关系通通填上去。在此阶段内应着重提出反对自由主义错误，·从思想上纠正党内自由主义。直待党风学完后（文风应和学风一起学）才实行审查十部（主要是清查内奸），应在明年上半年了。如能在今年一年真正做好整风，明年一年真正做好审查干部，就算是了不起的成绩，我党"},{"type":"paragraph","text":"[1]这是毛泽东1943年6月6日关于如何抓好整风问题给彭德怀的信。百年大计即已奠定，请你紧紧抓住此关键。少奇二日致陈、饶\"电转发你处，请参看。"},{"type":"paragraph","text":"毛泽东六日"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":6,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":59,"page_end":60},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee53d74bd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
