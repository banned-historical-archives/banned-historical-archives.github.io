ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"给刘建勋、韦国清的信","alias":"","parts":[{"type":"paragraph","text":"给刘建勋、韦国清的信"},{"type":"paragraph","text":"（1958年1月12日）刘建勋、韦国清二同志："},{"type":"paragraph","text":"送上几份地方报纸，各有特点，是比较编得好的，较为引人看，内容也不错，供你们参考。省报问题是一个极重要问题，值得认真研究，同《广西日报》的编辑们一道，包括版面、新闻、社论、理论、文艺等项。钻进去，想了又想，分析又分析，同各省报纸比较又比较，几个月时间就可以找出一条道路来的。精心写作社论是一项极重要任务，你们自己、宣传部长、秘书长、报社总编辑，要共同研究。第一书记挂帅，动手修改一些最重要的社论，是必要的。一张省报，对于全省工作，全体人民，有极大的组织、鼓舞、激励、批判、推动的作用。请你们想一想这个问题，以为如何？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五八年一月十二日上午七时"},{"type":"paragraph","text":"[1]刘建勋（1913一1983），河北沧县人，当时任中共广西省委第一书记。韦国清（1913一1989），广西东兰人，当时任中共广西省委书记处书记、广西省省长。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":437,"page_end":437},"tags":[{"name":"刘建勋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]},{"id":"wenji7","type":"pdf","name":"毛泽东文集第七卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji7.pdf"],"article":{"title":"给刘建勋、韦国清的信","description":"","dates":[{"year":1958,"month":1,"day":12}],"parts":[{"text":"给刘建勋、韦国清的信","type":"title"},{"type":"appellation","text":"刘建勋、韦国清二同志："},{"type":"paragraph","text":"送上几份地方报纸，各有特点，是比较编得好的，较为引人看，内容也不错，供你们参考。省报问题是一个极重要问题，值得认真研究，同《广西日报》的编辑们一道，包括版面、新闻、社论、理论、文艺等项。钻进去，想了又想，分析又分析，同各省报纸比较又比较，几个月时间就可以找出一条道路来的。精心写作社论是一项极重要任务，你们自己、宣传部长、秘书长、报社总编辑，要共同研究。第一书记挂帅，动手修改一些最重要的社论，是必要的。一张省报，对于全省工作，全体人民，有极大的组织、鼓舞、激励、批判、推动的作用。请你们想一想这个问题，以为如何？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五八年一月十二日上午七时"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":8,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["刘建勋（一九一三——一九八三），河北沧县人，当时任中共广西省委第一书记。韦国清（一九一三—
