:[],"dates":[{"year":1968,"month":2,"day":13}],"is_range_date":false,"parts":[{"text":"中央文革、中央军委二·一三指示","type":"title"},{"text":"中央调查组转连云港市“无产阶级革命派反到底总指挥部”、“毛泽东主义人民公社”等革命群众组织：","type":"appellation"},{"text":"据中央调查组报告，你们在上交武器、恢复交通运输等方面取得了很大成绩，中央认为很好。希望你们高举毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，全面落实毛主席最新指示，认真地斗私批修，彻底肃清资产阶级、小资产阶级的派性，增强无产阶级的党性。凡未上交完的枪、弹，全部上交，拆除一切工事，恢复生产，尽早实现革命的大联合和革命的三结合，把连云港市无产阶级文化大革命搞得更好。","type":"paragraph"},{"text":" 中央文革   中央军委一九六八年二月十三日","type":"paragraph"},{"text":"(原转载于江苏《一月风暴》1968年2月20日，第40期，第一版)","type":"appellation"}],"comments":[],"origin":"原转载于江苏《一月风暴》1968年2月20日，第40期，第一版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65bb8122ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
