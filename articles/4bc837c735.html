rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理参观“波音747”飞机装配厂","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理和夫人卓琳二月四日下午在西雅图附近的埃弗雷特区参观了“波音747”飞机装配厂，受到波音飞机公司董事长威尔逊、公司总经理斯坦珀以及许多工人的欢迎。"},{"type":"paragraph","text":"邓副总理一行乘坐电瓶车绕厂一周。他们对墙上“质量就是技艺”、“质量同成功是伙伴”等标语表示赞同。"},{"type":"paragraph","text":"波音飞机公司是世界上规模最大的飞机公司。它从世界各地的两千二百多家供应商进口飞机零件。生产过程的绝大部分受计算机控制。"},{"type":"paragraph","text":"中国客人参观了铆接和机身装配线。在厂房外面，邓副总理一行登上了由斯堪的纳维亚航空公司订购的一架准备起飞的巨型喷气式客机。威尔逊董事长对邓副总理说，中国订购的三架大型喷气式客机中的第一架，将在一九八○年交货。每架飞机有三百零五个座位。（均据新华社）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bc837c735"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
