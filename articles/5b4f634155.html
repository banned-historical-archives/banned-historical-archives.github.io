" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"给阎锡山的信","description":"","dates":[{"year":1936,"month":5,"day":25}],"parts":[{"text":"给阎锡山的信","type":"title"},{"type":"appellation","text":"百川先生："},{"type":"paragraph","text":"敝军西渡，表示停止内战，促致贵部及蒋氏的觉悟，达到共同抗日之目的。微日通电或恐未达，抄上一份，托郭团长带回，即祈审览。"},{"type":"paragraph","text":"救国大计，非一手一足之烈所能集事。敝军抗日被阻，然此志如昨，千回百折，非达目的不止，亦料先生等终有觉悟的一日。侧闻蒋氏迫先生日甚，强制晋军二度入陕，而以其中央军监视其后，是蒋氏迄无悔祸之心，汉奸卖国贼无与为匹，三晋军民必有同慨。先生如能与敝方联合一致，抗日反蒋，则敝方同志甚愿与晋军立于共同战线，除此中国人民之公敌。"},{"type":"paragraph","text":"郭团长及贵军官兵一律优待，同属国人，胜之不武，敝方绝无骄矜之心，武器弹药，楚失楚得，谅先生及贵军领袖亦当不致有所芥蒂也。今遣郭团长返晋，面致手书，如有所教，乞令郭君再来，以便沟通两方，成立谅解，对付共同之公敌。吉县县长暂留此间，稍缓亦当令其返晋。国难日亟，谅三晋贤者决难坐视也。"},{"type":"paragraph","text":"专此。即颂勋祺。不一！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十五日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1},{"part_idx":2,"offset":37,"index":2},{"part_idx":2,"offset":51,"index":3},{"part_idx":4,"offset":113,"index":4}],"is_range_date":false,"authors":["毛泽东"],"comments":["阎锡山，字百川，见本卷第371页注〔14〕。","指中华苏维埃人民共和国中央政府、中国人民红军革命军事委员会一九三六年五月五日《停战议和一致抗日通电》，见本卷第385—386页。","指郭登瀛。原是阎锡山部第六十六师第三九二团团长，一九三六年春红军东征中被俘。","参见本卷第475—476页《给阎锡山的信》。"],"page_start":401,"page_end":402,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b4f634155"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
