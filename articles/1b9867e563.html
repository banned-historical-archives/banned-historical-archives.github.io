art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"百倍警惕美帝国主义的狡诈阴谋不断揭露现代修正主义的恶毒面目","authors":[],"parts":[{"type":"paragraph","text":"据新华社河内22日电 越南劳动党中央理论刊物《学习》8月号发表了一篇题为《肯尼迪的“和平战略”——美帝国主义的狡诈阴谋》的文章。"},{"type":"paragraph","text":"文章指出，美国总统肯尼迪在美利坚大学发表的演说，不但提出了他的关于和平的虚伪论调以欺骗世界人民，而且还企图用“和平战略”来迎合南斯拉夫现代修正主义者分裂社会主义阵营和国际共产主义运动、破坏民族解放运动、破坏各资本主义国家人民革命运动的阴谋。"},{"type":"paragraph","text":"文章说，最值得人们注意的是，正当国际共产主义运动的队伍中对于世界革命的路线和策略问题发生分歧，叛徒铁托集团在南斯拉夫共产主义者联盟中央委员会会议上的报告中对现时代的特点、战争与和平、和平共处等等一系列国际问题阐述修正主义集团的立场的时候，肯尼迪就发表了这次演说，很明显，这个老奸巨猾的帝国主义头子与叛徒铁托集团之间已作了非常吻合的配合。"},{"type":"paragraph","text":"文章说，肯尼迪这一次不仅重弹人们早已熟悉的老调，而且还公然提出苏联和其他社会主义国家不得支援各国人民革命斗争的要求。"},{"type":"paragraph","text":"文章在谈到肯尼迪所谓“共产党集团内的建设性的变化”时说：很清楚，肯尼迪没有掩饰他的企图，即妄想依靠其奴才铁托集团来传播修正主义思想，同时把美国的淫荡、堕落的文化和生活方式输入各社会主义国家，其目的是使这些国家逐渐变质，从思想和政治上的蜕化导致资本主义在这些国家复辟，最后建立美帝国主义对世界的霸权。"},{"type":"paragraph","text":"文章指出，最近，肯尼迪派出了以哈里曼为首的代表团到莫斯科参加苏、英、美的“部分禁止核试验”问题的会谈，这又是美帝国主义的“和平战略”的计划中的阴险手段。美帝国主义可以借这个条约作为它的假仁假义的“和平”论调的“证据”，也可以为它的奴才铁托集团阶级妥协的“和平共处”学说找到“论据”。美、英帝国主义凭借这个条约，想进一步加深国际共产主义运动中对世界革命内战略和策略问题的分歧，以便实现其分裂国际共产主义运动的阴谋。美国想要达到的、也很重要的一个目的就是腊斯克在美国参议院外交委员会上曾说的那样：“如何能够防止核武器向其他国家扩散的危机。”腊斯克所说的“其他国家”指的就是中国——一个坚决反对美帝国主义的战争政策以保卫世界和平的社会主义国家。"},{"type":"paragraph","text":"文章说，面对帝国主义集团的阴谋，世界人民必须保持高度的警惕，对帝国主义不能有丝毫幻想。"},{"type":"paragraph","text":"文章强调说，很明显，帝国主义集团的“和平”论调只不过是遮盖它们准备战争计划的布幕。因此，保卫和平的唯一正确途径就是坚决进行反对帝国主义的斗争，就是必须不断揭露帝国主义和现代修正主义者恶毒、阴险的面目，不断促进亚洲、非洲、拉丁美洲的民族解放运动，和各资本主义国家的革命斗争，以便逐步击退、逐步粉碎帝国主义，进而全部消灭帝国主义。只有这样，才能保卫住世界和平，才能制止一场新的世界战争。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b9867e563"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
