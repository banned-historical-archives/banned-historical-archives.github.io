:["广东","罗翼群"],"dates":[{"year":1957,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"“共产党往往以特殊阶级自居”","type":"title"},{"text":"广东罗翼群","type":"authors"},{"text":"（罗翼群：中国国民党革命委员会中央委员，广东省人民委员会参事室副主任）","type":"subtitle"},{"text":"共产党有优越感，往往以特殊阶级自居，民主人士有自卑心，不敢同共产党员交朋友、畅谈心事，于是隔阂愈来愈深，团结就难搞得好了。他说，有人说共产党是主人，民主党派是客人，甚至还说民主党派是“仆从”。我看说“仆从”是过分了一些，不过共产党绝不应该认为自己样样都高人一等。……他说，党员入党是否是真正由积极工作争取得来的呢？恐怕有些是用打击别人抬高自己的手段取得来的。他说这样就也有危机了。","type":"paragraph"},{"text":" (人民日报5月21日)","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"402311572c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
