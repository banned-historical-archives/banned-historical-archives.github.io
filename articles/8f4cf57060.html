<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"时代中学同学初步批判了资产阶级思想","authors":[],"dates":[{"year":1952,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市时代中学同学，通过五反政治教育，真正认识了资产阶级思想对他们的危害性。他们在积极参加五反斗争的同时，大胆地暴露了自己的思想问题，初步批判了自己的资产阶级错误思想。"},{"type":"paragraph","text":"从这次暴露出来的思想问题来看，我们可以知道:时代中学同学中存在着的资产阶级思想是严重的。有些同学曾经错误地把“吃喝玩耍”当作自己的人生目的，认为“享乐之心，人皆有之”，因而非常羡慕资产阶级的生活方式，轻视劳动人民。有些同学进学校的目的，就是想学好一套“本领”，可以“继承父业，当资本家”。高三级某同学因为怕自己的零用钱减少，竟企图阻止父亲坦白交代。一位同学把从家里拿来缴学费的钱，化在跳舞上面，浪费得干干净净。有三个同学，曾经把一个用三万块钱买来的铁饼，以八万块钱卖给学校，赚得的钱就化用光了。有几个同学曾经因为自己出生在贫苦的家庭而感到苦闷、羞耻，希望自己的家长变成资本家，以达到住洋房、坐汽车的目的。"},{"type":"paragraph","text":"资产阶级的思想，也影响了同学们的学习。有些同学错误地认为学习是为了自己，因此不愿意帮助别人。高中部一位同学，为了希望自己的成绩比别人好，竟把不正确的答案教给别人。某同学自私地希望自己考七十分，人家都考六十几分；当自己考九十几分，而另一个同学比他考得好的时候，他就不高兴了。有好几个同学学习数理化很认真，主要因为他们认为这样将来可以“赚大钱”。"},{"type":"paragraph","text":"从这些暴露出来的许多思想问题中，使同学们进一步认识了思想改造的重要。许多同学说:“我以前不知道自己为什么不能进步的原因，现在才晓得原来是资产阶级思想在作怪。如果不把这错误思想批判掉，那我将来怎么能够为人民服务呢?”因而一致要求学习毛泽东思想，使工人阶级的思想在自己的思想领域中树立起领导权来。"},{"type":"paragraph","text":"通过五反政治教育，同学们都提高了对党、团的认识，知道了青年团是先进青年的政治组织，是党最得力的助手和最可靠的后备军，纷纷要求靠近组织，争取接受组织教育。目前全校已有七十多个同学申请入团，十七人已被批准，其他许多同学都在上团课。"},{"type":"paragraph","text":"在学习方面，同学们批判了自私自利的错误思想后，有了显著的进步。如高三甲陈永和同学，过去成绩很好；但不肯帮助别人，现在他认识到为了建设祖国，不仅要好好地培养自己，还须积极地帮助别人。他每天帮助同学温课，使应届毕业同学作好准备，以便升入大学。"},{"type":"paragraph","text":"过去同学们认为奢侈享乐是人的“天性”，现在则认识到堕落腐化是可耻的行为。他们批判了“想当资本家”的错误思想，立志要做一个劳动者了。高三石人俊同学说:“过去我认为不听父亲的话，是忘恩负义。现在我知道，我们是劳动人民养活大的，如果不为劳动人民服务，那真是忘恩负义了。”严挹芳同学的家专开设牙膏厂，他以前一直希望继承父业，现在他懂得了谁养活谁的问题，决定要做一个祖国需要的建设者了。"},{"type":"paragraph","text":"在最近的爱国防疫卫生运动中，同学们认识到运动的伟大意义，并要求在劳动中改造自己，热烈地参加了这个运动。同学们纠正了轻视劳动的错误观点，纷纷脱下上衣卷起裤管，把学校里每个角落的垃圾打扫得一干二净。"},{"type":"paragraph","text":"时代中学五反政治教育的收获是巨大的。现在，为了使这一成绩得到巩固，全校正在进一步划清工人阶级与资产阶级的思想界限，同学们一致以实际行动积极地投入了这个运动。他们将在这个运动中，取得更大的胜利。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f4cf57060"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
