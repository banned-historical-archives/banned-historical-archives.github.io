<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在东北财经学院座谈会上的讲话","authors":["东北财经学院","李靖国"],"dates":[{"year":1957,"month":6,"day":9}],"is_range_date":false,"parts":[{"text":"在东北财经学院座谈会上的讲话","type":"title"},{"text":"东北财经学院李靖国","type":"authors"},{"text":"（李靖国：东北财经学院副教授）","type":"subtitle"},{"text":"在东北财经学院六月九、十两日的座谈会上，主张取消学校的党委制，他说：","type":"subtitle"},{"text":"理由是：现在的党委制包办一切，容易产生不管事的官僚主义。学校的全部工作就是教学工作和科学研究工作，而目前的党委不熟悉这些。党委制使党委的权力太大，如果党委作出的决定有错误，影响很大。党委制权力大，也易于使党员产生特权思想。只要有一个党委委员思想作风不正派，就要把学校搞乱，如果有几个党委委员思想作风不正派，学校就变得不是学校了。为了保证公民不受打击报复，只有在党委不能决定一切时才有可能真正得到保证。如果说党委制真能帮助教师改造思想和在教学工作中起组织作用的话，我就不会赞成取消党委制，因为它没有做到这一点而又有大权，所以一定要取消。取消党委制不会让资产阶级的思想和统治复辟。学校是真理的发源地，在很多黑暗统治时代，人类的进步观念在学院、书院和僧侣寺院中被继承下来向前发展。今天共产党领导我们“百家争鸣”“百花齐放”，就是为了让我们大家充分找真理，由于近几年高等学校的党委制造成了严重的教条主义，有党委制也不能打败资产阶级学术思想。“解铃还是系铃人”，打败资产阶级学术思想的还是老师们自己。有学术思想的问题不但党委制不能打败它，就派党军驻在学校也不能打败它。有党委制，听少数人反映意见，用政治帽子把马列主义强加于人，也不符合思想改造的规律，正像我们不能把马列主义强加于西藏佛教徒一样。也因为我们教师队伍今天已经不是佛教徒，更可让马列主义在教师头脑中逐渐生根滋长。谁有意见谁就大胆说，用不着少数人反映，公开争论此反映到党委更能解决问题。也许有人说：党委制没有阻止你公开争论，我以为党提倡公开争论是实事，我院党委没有在什么地方组织我们充分公开争论，而是常常有这样的党委在不少讨论会中随自己主观和好恶作结论。因为有党委制，党委照例有权作结论。","type":"paragraph"},{"text":"取消党委制以后又如何办？他认为：①要从党内选拔最优秀的同志担任有关决策性的领导工作。例如担任院务委员会的主席和副主席。②院务委员会应成为学校最高权力机关，委员由全院师生选举，包括教师、学生、职工的代表，但其中教师代表应占百分之五十以上。③有关思想和政治阻碍工作不能由共产党包办，党委会应根据长期共存、互相监督的政策进行工作，应由党、民主党派、共青团、工会等组织的联合机构负责。④学校中的人事工作应当公开，人事处长的工作也能像过去那样由党包办。","type":"paragraph"},{"text":"六月十日的座谈会上，李靖国又作了发言：","type":"paragraph"},{"text":"说明他在前天座谈会上发言的意思，是取消党委领导下的分工负责制治校而不是取消党委制，是说明党应领导行政而不是以党代替行政。但他说，过去学校因为有了党委制，确是使各级教学组织和行政组织没能发挥作用；而却因为党委集中很多权力，只要有一个党委成员作风不好，就可能利用党委制的权力给工作带来偏差。他还说，党委虽然不是同意这些人随心所欲，但过去却是有人这样做了，而党委并没制止。","type":"paragraph"}],"comments":[],"origin":"《章伯钧张百生等人言论集》（中国旅大市委宣传部编，一九五七年七月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f63aa8969c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
