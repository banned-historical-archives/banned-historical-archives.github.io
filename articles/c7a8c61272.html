ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"为红线女题词","alias":"","parts":[{"type":"paragraph","text":"为红线女“题词"},{"type":"paragraph","text":"（1958年12月1日）"},{"type":"paragraph","text":"一九五七年，香港有一些人骂红线女，我看了高兴，其中有黄河。他骂的是他自己，他说他要灭亡了。果然，已经在地球上被扫掉，不见了所谓黄河。而红线女则活着，再活着，更活着，变成了劳动人民的红线女。一九五八年，在武昌，红线女同志对我说：写几个『个』字给我，我希望。我说：好吧。因写如右。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五八年十二月一日横眉冷对千夫指，俯首甘为孺子牛。"},{"type":"paragraph","text":"鲁迅"},{"type":"paragraph","text":"[1]红线女，原名邝健廉，粤剧艺术家。抗日战争胜利后去香港，1955年年底回广州，加入广东省粤剧团。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":12,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":59,"page_end":59},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7a8c61272"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
