"title":"最高人民检察院关于女知青奸情案件的案由认定及处理的批复","dates":[{"year":1979,"month":7,"day":16}],"is_range_date":false,"authors":["最高人民检察院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"四川省民检察院研究室，检查工作手册（一），35","tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"知识青年","type":"主题/事件"}],"parts":[{"type":"title","text":"最高人民检察院关于女知青奸情案件的案由认定及处理的批复"},{"type":"subtitle","text":"（79）高检研第4号"},{"type":"paragraph","text":"安徽省人民检察院："},{"type":"paragraph","text":"你院办字（79）第20号文悉。关于女知青奸情案件的案由认定及处理问题，我院同意你们的意见。过去对同女知青发生两性关系的（因恋爱而发生两性关系的例外），作为“破坏上山下乡”罪而逮捕判刑，是根据当时的社会情况和政策进行处理的。现在中人民共和国刑法研究公布，没有“破坏上山下乡”这个罪名。今后对于此类案件的处理，应当根据查明的事实，并按案犯构成什么罪，就按刑法规定的罪名定罪量刑。"},{"type":"subtitle","text":"一九七九年七月十六日"}],"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d1fe83438"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
