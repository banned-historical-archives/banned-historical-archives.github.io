art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向毛主席热烈祝贺我国氢弹试验成功西哈努克亲王致电周总理表示热烈祝贺","authors":[],"parts":[{"type":"paragraph","text":"新华社二十一日讯 毛泽东主席今天收到几内亚共和国总统艾哈迈德·塞古·杜尔发来的祝贺我国第一颗氢弹爆炸成功的电报。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"毛泽东主席阁下："},{"type":"paragraph","text":"得悉你们氢弹试验的消息，我们怀着愉快的心情向这次试验致意。我们热烈祝贺你们这次试验的成功。这一成功是建设繁荣、独立国家的可靠保证，在这些国家里劳动人民将生活在幸福与和平之中。我们谨向人民中国为消灭帝国主义而斗争的意志表示敬意。我们重申几内亚人民、几内亚政府和几内亚党对你们的声援，并深信在我们两国之间业已存在的合作关系将进一步加强。"},{"type":"paragraph","text":"顺致最崇高的致意"},{"type":"paragraph","text":"几内亚共和国总统"},{"type":"paragraph","text":"艾哈迈德·塞古·杜尔"},{"type":"paragraph","text":"一九六七年六月二十日于科纳克里"},{"type":"paragraph","text":"新华社二十一日讯 周恩来总理今天收到柬埔寨国家元首诺罗敦·西哈努克亲王热烈祝贺我国第一颗氢弹爆炸成功的电报。贺电全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国国务院总理周恩来先生阁下"},{"type":"paragraph","text":"我们非常高兴地获悉中国第一颗氢弹爆炸的巨大成功。我谨代表柬埔寨人民、王国政府，并以我个人的名义向对这一历史性成就作出贡献的科学家、工程师及所有其他人员表示我们深深的钦佩，和致以最热烈的祝贺。"},{"type":"paragraph","text":"这一成就确定无疑地使中华人民共和国进入世界上科学最发达的大国之列。我们同中国兄弟一样，为此感到自豪。友好的中国自力更生，只用了几年的时间，就掌握了原子能；这使所有发展中的亚洲、非洲和拉丁美洲各国都得到巨大的鼓舞。"},{"type":"paragraph","text":"最后，我们对于中国重申它保证决不首先使用大规模毁灭性武器的和平愿望，再次表示敬意。这样，中国的氢弹就加强了一切反对美国好战分子进行侵略和原子讹诈的反帝国家的信心。"},{"type":"paragraph","text":"祝中国人民在毛泽东主席的思想指引下取得成就。顺致最崇高的敬意。"},{"type":"paragraph","text":"柬埔寨国家元首"},{"type":"paragraph","text":"诺罗敦·西哈努克"},{"type":"paragraph","text":"一九六七年六月二十日于金边"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3873c75040"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
