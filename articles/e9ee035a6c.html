ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致彭德怀等电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀等电!"},{"type":"paragraph","text":"（1940年12月10日）"},{"type":"paragraph","text":"为迎接新的局势，大量准备并培养干部是极其重要的。抗大总校不能取消。但由于分校之分散，对各分校之具体领导应责成各地局及最高军事首长负责。完全统一是不可能的。总校应多注意总结经验、指导方针、统一材料之编辑、统一各种教法、培养教员、调剂干部，以帮助及加强各分校的领导及教育能力。各地任意抽调校干部是不对的，已有另电纠正。总校机构宜小，而苏北局面扩类，望再分出一个分校的干部，派去苏北。此分校要比山东分校还要强些，因为苏北局面是很大的局面。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":271,"page_end":271},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9ee035a6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
