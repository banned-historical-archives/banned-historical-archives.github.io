:[{"year":1959,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京2日电】　瓦莱塔消息:马耳他工党领袖明托夫1日在一个有1万多人参加的群众集会上，号召马耳他人3日在全岛举行反英示威。"},{"type":"paragraph","text":"明托夫这个号召在前一天，即1月31日出版的工党机关刊物“自由”上就已经提出。他号召在2月3日，即在英国下院预定通过英国政府废除马耳他岛宪法的决定的第二天，在马耳他全岛举行“哀悼日”。明托夫要求马耳他人在那一天留在家里不去工作，并且下半旗致哀。"},{"type":"paragraph","text":"废除给予马耳他人民一定自治权利的马耳他宪法，是英国镇压马耳他岛人民独立要求的一种措施。这个岛的各政党的代表团去年在同英国的谈判中，拒绝了英国想继续统治马耳他的企图。"},{"type":"paragraph","text":"1日在马耳他岛首府瓦莱塔附近的哈姆兰举行的大会，是近年来在马耳他岛举行过的最大的政治集会之一。明托夫在大会上表示信心说，在“哀悼日”举行的示威，将表明“力量究竟在谁的手里”。"},{"type":"paragraph","text":"他说，“我们确信，马耳他岛人在那一天将表明他们不是奴隶。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa90d3853a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
