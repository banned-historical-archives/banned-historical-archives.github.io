tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国的资产阶级法权有什么特点","authors":["张锦荣"],"parts":[{"type":"paragraph","text":"我在这里提个问题，供大家研究。最近大家都在讨论资产阶级法权问题，但是，一般的研究多，针对中国的具体情况少。中国的资产阶级法权是个什么样子？有什么特殊性？我觉得这个问题值得研究。"},{"type":"paragraph","text":"中国过去旧的法权不能说是典型的资本主义的，而是半封建、半殖民地性质的法权。这种法权大量接受了西方资产阶级的东西，但是另一方面则更多地保留了半封建、半殖民地的黑暗的东西。如家长制的影响在我们实际生活中就有很多反映。它不仅在一般人民群众中，而且在革命队伍中也有所反映。"}],"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f16e2d4e6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
