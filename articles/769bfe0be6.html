ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"四十二军应从侧面威胁平壤","alias":"","parts":[{"type":"paragraph","text":"四十二军应从侧面威胁平壤"},{"type":"paragraph","text":"（1950年12月1日）彭、邓、朴、洪并宋、覃："},{"type":"paragraph","text":"（一）伪二军团向三登?集中，美二十四师由平壤开三登一带，伪一师现到肃川，有开顺川、慈山讯，美骑一师在顺川、慈山并未过大同江。因此我四十二军亦不应过大同江，而应在大同江以东向成川、三登一带寻伪二军团残部及美二十五师作战，从侧面威肋平壤。请酌定。（二）美七师主力及伪三师一个团由惠山西犯，企图切断我厚昌、长津间补给线，请宋、覃令在厚昌之一个师向东迎阻该敌，务使该敌不能西进。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月一日十二时"},{"type":"paragraph","text":"[1]宋、覃，指宋时轮、覃健，当时分别任中国人民志愿军第九兵团司令员兼政治委员和参谋长。"},{"type":"paragraph","text":"[2]三登，位于平安南道江东郡南部。[3]慈山，位于平安南道顺川郡南部。"},{"type":"paragraph","text":"[4]美骑一师，即美军骑兵第一师，建立于美国南北战争时期，虽已改编为机械化部队，仍保留了骑兵第一师的番号。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":403,"page_end":403},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"769bfe0be6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
