":[],"dates":[{"year":1968,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典朋友在斯德哥尔摩举办讲座"},{"type":"paragraph","text":"热情宣传中国文化大革命的伟大胜利"},{"type":"paragraph","text":"新华社斯德哥尔摩二十五日电　瑞典中国协会二十三日和二十四日在斯德哥尔摩举办讲座，热情介绍中国无产阶级文化大革命和中国人民在各条战线上取得的伟大胜利。"},{"type":"paragraph","text":"瑞典中国协会和瑞典马列主义者共产主义联盟的朋友在会上介绍中国文化大革命的情况，并指出，这次大革命的目的在于巩固无产阶级专政，防止资本主义复辟，使中国永远保持鲜红的颜色。瑞典朋友在会上谴责了叛徒、内奸、工贼刘少奇犯下的罪行。"},{"type":"paragraph","text":"瑞典朋友还介绍了中国人民在工业、农业、教育和其他方面所取得的伟大成就。"},{"type":"paragraph","text":"其他一些发言人在会上揭露和驳斥了帝国主义和苏修对中国无产阶级文化大革命的恶毒诬蔑和反华谰言。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be034ad0b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
