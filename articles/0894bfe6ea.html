ar":1967,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不读毛主席的书就不能完成革命"},{"type":"paragraph","text":"伟大领袖、伟大舵手毛主席的革命思想是指路明灯。他的著作是当代最高水平的马克思列宁主义经典，是为争取解放而斗争的所有被压迫人民的最锋利、最强大的思想武器。不学习毛主席的著作，就不能完成革命。"},{"type":"paragraph","text":"毛主席在《纪念白求恩》一文中写道：“我们大家要学习他毫无自私自利之心的精神。从这点出发，就可以变为大有利于人民的人。一个人能力有大小，但只要有这点精神，就是一个高尚的人，一个纯粹的人，一个有道德的人，一个脱离了低级趣味的人，一个有益于人民的人。”我坚决按照毛主席的这一指示办事，只有这样，才有可能成为受伟大的毛泽东思想指导的好战士。"},{"type":"paragraph","text":"毛主席的著作是取之不尽的力量和智慧的源泉，是我的生活中所不可缺少的。我今后将尽量利用空闲时间学习毛主席著作。\t\t\t\t　几内亚　一工人"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0894bfe6ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
