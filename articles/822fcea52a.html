thors":["缪天瑞"],"dates":[{"year":1957,"month":10}],"is_range_date":false,"parts":[{"text":"缪天瑞在首都音乐界批判刘雪庵大会上的发言","type":"title"},{"text":"缪天瑞","type":"authors"},{"text":"1，刘雪庵说自己不搞政治只搞音乐。这完全是假话。他在上海音专念书时，人家就称他为“音乐政客”。他喜欢搞政治，会搞政治，只是不喜欢今天我们的政治罢了。他妄想改变今天我们的政治；篡位思想贯穿在他的言行中。他抬出黄自来同聂耳、星海对抗，又把自己与黄自并提，企图推倒聂耳、星海的革命的旗帜，竖起他那一半白色(指白色恐怖)、一半黄色的反动旗帜。把黄自提出作为“五四”以来优秀作曲家，这是正确的，但刘雪庵抬出黄自，是别有用心的。黄自的代表作品很多，为甚么要提“农家乐”，显然刘雪庵目的是要提自己。","type":"paragraph"},{"text":"2，他写的国民党军歌曾登在“乐风”上，当时我在编“乐风”，他写了这些军歌是为国民党服务，我登了也是为国民党服务。我们从旧社会来的人都或多或少做过对不起人民的事情，今天我们只有不断改造自己，努力为人民服务，这样才能取得人民的原谅。也就是说，我们要在过去思想改造的基础上进一步地努力改造自己。而刘雪庵不是这样，他是想翻案，他是想倒算。这是不行的，人民不会答应。","type":"paragraph"},{"text":" 来源：《首都音乐界反右派斗争资料(一)》，(首都音乐界整风联合办公室编印，1957．11．)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"822fcea52a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
