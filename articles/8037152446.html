"中南矿冶学院","徐濬哲","曹文炳","童本惕","胡为柏","黄纪忠"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“肃反时宪法哪里去了？”","type":"title"},{"text":"中南矿冶学院徐濬哲曹文炳黄纪忠胡为柏童本惕","type":"authors"},{"text":"“我们国家究竟是法治还是人治呢？我是不怕法治的只是怕人治的……多少革命先烈鲜血换来的宪法，肃反运动时哪里去了？”（中南矿冶学院  徐濬哲）","type":"paragraph"},{"text":"“肃反中五人小组为什么不加民主人士进去呢？”（中南矿冶学院　曹文炳）","type":"paragraph"},{"text":"“肃反不应该发动群众，只要公安人员调查材料就行了，发动群众进行斗争冤枉了一些人，还不是要经过调查材料。”（中南矿冶学院  黄纪忠）","type":"paragraph"},{"text":"“很多被斗的人没有一个例外不被搜查，搜查事先没有说清为什么？到今天还是没有说明是为什么？这样如果发生在延安，将一个人的包袱打开来看看，倒是情有可愿，然而今天宪法公布以后，在肃反中还有许多违反政策的事情。”（中南矿冶学院　胡为柏）","type":"paragraph"},{"text":"“肃反搞错了，对违法党团员和积极分子应该受法律制裁，在肃反中入党入团的党团员应重新审查。”（中南矿冶学院  童本惕）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8037152446"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
