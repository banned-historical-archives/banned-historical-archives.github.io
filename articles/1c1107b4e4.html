art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"资产阶级是社会主义革命的对象","authors":["铁道兵活学活用毛泽东思想积极分子/战士高孝鼎"],"parts":[{"type":"paragraph","text":"全国刚解放，党内头号走资派刘少奇就千方百计地保护资产阶级，妄图在中国发展资本主义，他大肆叫嚷什么对资产阶级“重点在团结”，“如果反对资本家，那便搞错了”，就是一大罪证。"},{"type":"paragraph","text":"伟大领袖毛主席在党的七届二中全会上的报告中明确地指出，全国胜利后，国内的基本矛盾是工人阶级和资产阶级的矛盾。这就告诉我们，资产阶级是社会主义革命的对象。我们要在中国建设社会主义，走社会主义道路，就必须同资产阶级作坚决斗争，彻底战胜资产阶级。资产阶级“对于亡国、共产是不甘心的”，他们时刻都在企图重新夺回他们失去的“天堂”。如果我们不坚决同资产阶级作斗争并彻底战胜它，我们的无产阶级政权就不能巩固，我们的国家就会改变颜色，资产阶级就会复辟，无产阶级和劳动人民就要重新遭殃。老反革命分子刘少奇鼓吹不能反对资产阶级，他的险恶用心也就在这里。"},{"type":"paragraph","text":"用战无不胜的毛泽东思想武装起来的我国工人阶级和广大革命人民，是决不会上刘少奇的当的。我们就是要坚决同资产阶级作斗争，粉碎资产阶级的一切反抗，彻底消灭资本主义，使我们的国家沿着社会主义大道飞跃向前。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c1107b4e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
