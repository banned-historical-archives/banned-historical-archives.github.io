art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"老山前线某医疗所为伤病员进行否定“文革”教育补课","authors":["吴长宣/胡思明"],"parts":[{"type":"paragraph","text":"本报讯 老山前线某医疗所为住院伤病员进行否定“文革”教育补课，伤病员称赞这一课补得好。"},{"type":"paragraph","text":"这个医疗所收治的伤病员都来自一线部队，他们由于分散在外执行战斗任务，未能很好地进行否定“文革”的教育。医疗所党支部组织大家学习报刊上发表的有关彻底否定“文革”的文章，讨论“文革”给军队带来的危害，给工农业生产造成的损失，弄清为什么要彻底清除派性，为什么说“三支两军”是错误的，错在哪里等。医疗所还组织大家看有关揭露“文革”危害的电影，如《许茂和他的女儿们》、《元帅之死》、《人到中年》、《被爱情遗忘的角落》等。许多同志在学习中自觉地检查了“左”的思想对自己的影响，使这次补课收到了较好的效果。 （吴长宣、胡思明）"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"334602fad0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
