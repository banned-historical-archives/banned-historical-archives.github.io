":[{"year":1985,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"台湾旅美著名女作家陈若曦的成名作《尹县长》，是海外最早的“伤痕文学”作品(比《班主任》发表早四年)，发表在一九七四年十一月的香港《明报月刊》上。小说在海外引起巨大反响，被翻译成多国文字。作品写一个国民党军队的起义人员，解放后在陕西当县长，他忠心耿耿跟着党走，可是在“文化大革命”中，竟被红卫兵以莫须有的罪名枪杀了，临死前他还高呼“毛主席万岁!”"},{"type":"paragraph","text":"《尹县长》发表时。“四人帮”尚在肆虐。陈若曦被攻击为“反共”、“反社会主义”是意料之中的，海外左派人士一时不了解情况。对她也多有责难。今年“五一”前夕，胡耀邦同志会见陈若曦时说:小说写得很真实，“文化大革命”时期中国就是这样的情况，为什么不能写呢!胡耀邦为陈若曦和她的《尹县长》正了名。该书将由江苏人民出版社出版。"},{"type":"paragraph","text":"(据《南京日报》)"}],"comments":[],"origin":"《南京日报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca46e8c365"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
