","authors":[],"dates":[{"year":1987,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一月二十日电　国务院副总理李鹏今天在全国电子工业劳模表彰、厅局长会议上指出:今年，我们要办好两件大事:在政治思想战线上，反对资产阶级自由化；在经济上，开展增产节约、增收节支活动，把国民经济建立在长期、稳定发展的基础上。"},{"type":"paragraph","text":"他说，电子工业既有很大发展，也面临着一定的困难，希望电子行业的同志兢兢业业，深化改革，进一步发展大好形势。"},{"type":"paragraph","text":"李鹏说，搞社会主义建设要贯彻按劳分配原则，但是单有这条还不够，还要靠精神，要重视两个文明的建设。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75ecb7c2e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
