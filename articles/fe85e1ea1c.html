{"year":1949,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石家庄工人学生市民热烈欢呼毛主席万岁"},{"type":"paragraph","text":"【本报记者石家庄三十日专电】石家庄市人民正热烈筹备庆祝中华人民共和国的成立和响应国际和平斗争日的示威大游行，各机关、工厂、学校正赶制国旗，搭彩牌坊。今晚听到中央人民政府成立和毛主席当选中央人民政府主席和朱总司令、宋庆龄等当选副主席的消息时，全市工厂学校都引起了热情的欢呼，铁路机厂夜班工友们自动要求加工两小时来表示对毛主席和政府委员们的敬意，该厂干部晚会上大家齐声高呼毛主席万岁，并高唱国歌。大兴纱厂的工友们异口同的声说：这真是天下最大的好事。在学校里，各教室不断传出万岁的欢呼，华北军大的同学们说：我们热诚地拥护中央人民政府。一、二区一千多市民正举行“人民政协”的露天座谈会，听到了这个好消息，立刻引起了热烈的欢呼和鼓掌，全市的秧歌队明日将全体出动，并准备向郊区农村进行宣传，各界庆祝大会筹委会已确定在十月二日举行庆祝中华人民共和国成立及响应国际和平斗争日的示威大游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe85e1ea1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
