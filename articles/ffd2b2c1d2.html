ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"对李雪峰在华北局机关的检讨要点的批语","alias":"","parts":[{"type":"paragraph","text":"对李雪峰在华北局机关的"},{"type":"paragraph","text":"检讨要点的批语！"},{"type":"paragraph","text":"（1966年12月26日、28日）伯达同志："},{"type":"paragraph","text":"此件3不知中央常委、中央文革小组各同志都有没有？请你们议一议，此件是否是正确的，是否有发给各地作参考之用的价值？因为各地很多同志至今还没有如实地诚恳地作自我批评的决心，极有帮助他们的必要，你看如何？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿六日"},{"type":"paragraph","text":"[1]本篇一是对中共中央政治局候补委员、华北局第一书记、北京市委第一书记李雪峰1966年12月16日在华北局机关的检讨要点的批语；本篇二是在李雪峰12月27日送审的这个检讨要点修改稿上的批语。"},{"type":"paragraph","text":"[2]伯达，即陈伯达，当时任中共中央政治局常委、中央文化革命小组组长。"},{"type":"paragraph","text":"[3]指李雪峰1966年12月16日在中共中央华北局机关的检讨要点，主要是检讨他从6月初至7月中旬大约50天时间内，在领导北京市的文化大革命运动中的所谓方向、路线错误。12月29日，中共中央转发了李雪峰的这个检讨要点。毛泽东全集第四十九卷退李雪峰同志："},{"type":"paragraph","text":"修改得好，可照此发出。"},{"type":"paragraph","text":"毛泽东十二月廿八日"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":12,"day":26},{"year":1966,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":229,"page_end":230},"tags":[{"name":"毛泽东","type":"人物"},{"name":"李雪峰","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffd2b2c1d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
