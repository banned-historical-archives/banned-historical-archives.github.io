本主义工商业改造问题的报告的批复","authors":[],"dates":[{"year":1956,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"中共中央对安徽省委关于传达、讨论资本主义工商业改造问题的报告的批复","type":"title"},{"text":"安徽省委：","type":"appellation"},{"text":"对你们1月6日关于传达、讨论资本主义工商业改造问题的报告中有关政策性的两个问题，提出以下意见：","type":"paragraph"},{"text":"（一）长期依靠国家加工订货为生的私营工业，在进行改造的时候，也以先经过公私合营的步骤为妥，不必急于直接改变为社会主义性质的国营加工厂。","type":"paragraph"},{"text":"（二）清产核资中，关于企业多余店（厂）房的处理，原则上均应适当折价、定息。你们所提的“在房屋不缺乏的城市不需折价定息或由其自行处理的办法”恐不妥。","type":"paragraph"},{"text":"其他各项问题，请参阅中央最近所发各项有关的文件。","type":"paragraph"},{"text":" 中央1956年2月21日","type":"paragraph"}],"comments":[],"origin":"安徽省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c060cb3351"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
