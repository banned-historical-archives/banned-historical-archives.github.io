ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"对成都会议关于三峡水利枢纽和长江流域规划意见稿的修改","alias":"","parts":[{"type":"paragraph","text":"对成都会议关于三峡水利枢纽和长江流域规划意见稿的修改!！"},{"type":"paragraph","text":"（1958年3月）"},{"type":"paragraph","text":"从国家长远的经济发展和技术条件两个方面考虑，三峡水利枢纽是需要修建而且可能修建的；但是最后下决心确定修建及何时开始修建，要待各个重要方面的准备工作基本完成之后，才能作出决定。"},{"type":"paragraph","text":"[1]意见稿在第五项中还谈到要正确地解决长江流域规划工作中的六种关系，即：“远景与近景，干流与支流，上中下游，大中小型，防洪、发电、灌溉与航运，水电与火电。”毛泽东审阅时又增加了“发电与用电（即有销路）”一种关系。"},{"type":"paragraph","text":"[2]1992年4月3日，第七届全国人民代表大会第五次会议通过决议：“决定批准兴建长江三峡工程列入国民经济和社会发展十年规划，由国务院根据国民经济发展的实际情况和国家财力、物力的可能，选择适当时机组织实施。”"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":168,"page_end":168},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c30c1fe88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
