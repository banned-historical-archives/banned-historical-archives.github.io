art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席怎样说的；我就怎样做（山东柳琴书）","authors":["李二"],"parts":[{"type":"paragraph","text":"太阳出山红似火，"},{"type":"paragraph","text":"岭上青松棵连棵。"},{"type":"paragraph","text":"王杰是毛主席的好战士，"},{"type":"paragraph","text":"毛主席著作他最爱学，"},{"type":"paragraph","text":"字字句句当珍宝，"},{"type":"paragraph","text":"一行一行心上刻。"},{"type":"paragraph","text":"王杰说："},{"type":"paragraph","text":"鲜花要有阳光才开放，"},{"type":"paragraph","text":"庄稼要有雨露才能活，"},{"type":"paragraph","text":"革命战士要有毛泽东思想来武"},{"type":"paragraph","text":"装，"},{"type":"paragraph","text":"就象那船行大海掌握了舵。"},{"type":"paragraph","text":"王杰他，"},{"type":"paragraph","text":"早也学来晚也学，"},{"type":"paragraph","text":"时时学来事事学，"},{"type":"paragraph","text":"学了就用用着学，"},{"type":"paragraph","text":"学用密切相结合。"},{"type":"paragraph","text":"白求恩革命精神最可贵，"},{"type":"paragraph","text":"老愚公志大把山挪，"},{"type":"paragraph","text":"雷锋就是好榜样，"},{"type":"paragraph","text":"心里永记张思德，"},{"type":"paragraph","text":"死为革命死，"},{"type":"paragraph","text":"活为革命活，"},{"type":"paragraph","text":"誓做革命的接班人，"},{"type":"paragraph","text":"革命的青春献祖国。"},{"type":"paragraph","text":"学王杰做毛主席的好战士，"},{"type":"paragraph","text":"毛主席怎样说的，我就怎样做。"},{"type":"paragraph","text":"太阳出山红似火，"},{"type":"paragraph","text":"岭上青松棵连棵。"},{"type":"paragraph","text":"王杰他学习毛主席著作最努"},{"type":"paragraph","text":"力，"},{"type":"paragraph","text":"学起来如饥又如渴，"},{"type":"paragraph","text":"要把毛泽东思想学到手，"},{"type":"paragraph","text":"活学活用做工作。"},{"type":"paragraph","text":"你看他，"},{"type":"paragraph","text":"月儿偏西那个星星落，"},{"type":"paragraph","text":"下岗后不忘把“毛著”学，"},{"type":"paragraph","text":"书中的话句句是真理，"},{"type":"paragraph","text":"就好似万丈光芒照山河。"},{"type":"paragraph","text":"你看他，"},{"type":"paragraph","text":"千里野营急行军，"},{"type":"paragraph","text":"路上不忘把“毛著”学，"},{"type":"paragraph","text":"山高路远难阻挡，"},{"type":"paragraph","text":"长江大河能跨过。"},{"type":"paragraph","text":"你看他，"},{"type":"paragraph","text":"施工作业受了伤，"},{"type":"paragraph","text":"住院也把“毛著”学，"},{"type":"paragraph","text":"右手伤重难拿笔，"},{"type":"paragraph","text":"苦练左手写心得。"},{"type":"paragraph","text":"遇着困难学，"},{"type":"paragraph","text":"带着问题学，"},{"type":"paragraph","text":"学了以后干劲添，"},{"type":"paragraph","text":"做了以后心里乐。"},{"type":"paragraph","text":"学王杰做毛主席的好战士，"},{"type":"paragraph","text":"毛主席怎样说的，我就怎样做。"},{"type":"paragraph","text":"太阳出山红似火，"},{"type":"paragraph","text":"岭上青松棵连棵。"},{"type":"paragraph","text":"王杰他不忘阶级的仇和苦，"},{"type":"paragraph","text":"仇恨的烈火烧心窝，"},{"type":"paragraph","text":"美帝国主义在捣乱，"},{"type":"paragraph","text":"全世界它都要侵略。"},{"type":"paragraph","text":"王杰说："},{"type":"paragraph","text":"亚非拉人民苦难深，"},{"type":"paragraph","text":"世界上阶级兄弟受压迫。"},{"type":"paragraph","text":"心怀祖国望全球，"},{"type":"paragraph","text":"革命枪杆手中握。"},{"type":"paragraph","text":"下决心，"},{"type":"paragraph","text":"学习英雄黄继光，"},{"type":"paragraph","text":"学习英雄罗光燮，"},{"type":"paragraph","text":"不怕苦来不怕死，"},{"type":"paragraph","text":"狂风大浪吹不折。"},{"type":"paragraph","text":"单等那，"},{"type":"paragraph","text":"祖国一声命令下，"},{"type":"paragraph","text":"狠狠打击侵略者。"},{"type":"paragraph","text":"敌人磨刀咱磨刀，"},{"type":"paragraph","text":"时时刻刻准备着。"},{"type":"paragraph","text":"英雄杀敌志，"},{"type":"paragraph","text":"强盗胆吓破。"},{"type":"paragraph","text":"为中国革命去战斗，"},{"type":"paragraph","text":"为世界革命去战斗。"},{"type":"paragraph","text":"学王杰做毛主席的好战士，"},{"type":"paragraph","text":"毛主席怎样说的，我就怎样做。"},{"type":"paragraph","text":"我们永远听毛主席的话，"},{"type":"paragraph","text":"字字句句记心窝。"},{"type":"paragraph","text":"学王杰做毛主席的好战士，"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"008f903d85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
