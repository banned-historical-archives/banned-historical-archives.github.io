ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"关于晋翼两省磨擦终止后团结友军推动时局好转的指示","alias":"","parts":[{"type":"paragraph","text":"关于晋冀两省磨擦终止后团结友军"},{"type":"paragraph","text":"推动时局好转的指示"},{"type":"paragraph","text":"（1940年3月20日）朱、彭，杨，刘、邓、左、黄，陈、罗，朱、徐，程、宋："},{"type":"paragraph","text":"甲、蒋、卫调丁树本渡河，应让其渡河，不加阻碍，不可向他打一枪。"},{"type":"paragraph","text":"乙、对庞炳勋、于学忠及其他各中间派应以尊重，并加紧连络。"},{"type":"paragraph","text":"丙、对朱怀冰俘虏应加优待，特别优待其官长和眷属，同时注意收集国民党下达该军的各种反共命令计划文件。从石友三部俘虏官中，亦应收集此种材料，此项材料十分重要，将来大有用处。"},{"type":"paragraph","text":"丁、对中央军进行有系统的团结，联络争取说服工作，表示我们愿与他们团结抗战到底，拥护蒋委员长与卫长官，此次对朱、石还击完全是迫不得已。"},{"type":"paragraph","text":"戊、山西、河北两省，反磨擦行动全部告一段落，在此期间内偃旗息鼓一枪不打，向一切国民党军队表示友谊，求得恢复感情，推动时局好转。"},{"type":"paragraph","text":"毛王"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央书记处和中央军委起草的给朱德、彭德怀、杨尚昆、刘伯承、邓小平、左权、黄克诚、陈光、罗荣桓、朱瑞、徐向前、"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":3,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":492,"page_end":492},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30d65ba968"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
