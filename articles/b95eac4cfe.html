":1975,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学习了毛主席关于理论问题的重要指示，学习了马克思、恩格斯、列宁关于无产阶级专政的部分论述，联系知识青年上山下乡的斗争实际，我们深深体会到，知识青年上山下乡，建设社会主义新农村，就是以实际行动投入缩小三大差别、限制资产阶级法权的斗争。"},{"type":"paragraph","text":"我们青年队自一九七三年十一月成立以来，在毛主席的无产阶级革命路线指引下，在党的亲切关怀和贫下中农的再教育下，战天斗地斗敌人，去年全队七十四亩水田平均亩产六百三十余斤，比建队前翻了两番，除留足种子、口粮、饲料外，平均每人向国家交售余粮一千一百余斤，集体储粮四千余斤。此外，在十八亩旱地上，首次试种的芝麻、花生、大豆、红薯等作物，也都获得了好收成。打了食油一百二十八斤，花生四百五十余斤，各种蔬菜自给有余，并且养了十八头猪，五十六只鸡，二百四十余尾鱼，建了二百八十多平方米的住房。年终分配，除口粮和各种实物支出外，平均每人纯收入七十多元到一百多元。几年来我们在贫下中农的再教育下迅速成长，有的入了党，入了团，有的担任了赤脚医生、学校教师，有的成了拖拉机手。如今，我们住着自己亲手盖的房屋，吃着自己汗水灌溉出来的粮食，倍感毛主席革命路线亲。我们也进一步体会到，资产阶级法权是不会自行消失的，你不去限制它，它就会限制社会主义的发展。革命青年应该积极走毛主席指引的上山下乡的道路，为缩小三大差别、限制资产阶级法权而斗争。我们决心坚持乡村，沿着毛主席指引的金光大道走下去，一直走到共产主义。"},{"type":"paragraph","text":"江西宜丰县澄塘公社"},{"type":"paragraph","text":"秀溪大队上海知识青年队"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b95eac4cfe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
