,"authors":[],"dates":[{"year":1951,"month":7,"day":24}],"is_range_date":false,"parts":[{"text":"崇庆监狱病死犯人检查报告（节录）","type":"title"},{"text":"由一月至六月底崇庆县监狱共病死犯人174人。另截至6月中旬尚有重传染病犯19人，重疥疮犯318人，轻传染病犯10人，轻疥疮犯466人，占总犯人数的87％。病亡情况发展到如此严重程度主要应于该县公安局长张顺国同志负责，因该县犯人死亡情况在4月份即已相当严重，一个月死45人，县委曾开会讨论决定疏散犯人，加紧医治，保证不再死人。而公安局长除曾注射防疫针与服160余万元的中药外，并未认真执行县委决议，且未深入检查，对每月犯监死亡数目闹不清。4月份实死犯人45人，报38人，5月份实死犯人72人报69人。6月下旬公安局分长葛向民同志曾亲自去该县检查，当面指示疏散犯人，改善监狱管理的具体办法，该公安局长仍未执行，认为“犯人死了总比跑了好”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de8ca5ab02"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
