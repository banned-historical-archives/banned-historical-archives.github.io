art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"意工人反剥削反压迫斗争日益高涨","authors":[],"parts":[{"type":"paragraph","text":"意大利人民反对垄断资产阶级残酷剥削和压迫的斗争正在一浪接一浪地日益高涨。"},{"type":"paragraph","text":"二十三日，意大利当局控制的电力托拉斯“国家电力局”的十万名工人举行了全国规模的七十二小时罢工，要求增加工资、缩短工时和改善劳动条件。这次罢工使全国电力供应中断，严重影响工业生产，沉重地打击了意大利垄断资产阶级。"},{"type":"paragraph","text":"与此同时，由于艾米利亚——罗马涅区、特兰提诺——阿尔托——阿迪杰区、弗留利——威尼斯朱利亚区和罗马公共运输工人举行罢工，已使罗马、佛罗伦萨、特兰托、的里雅斯特和其它一些大城市的公共运输车辆停止行驶。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99be0dbf07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
