公安部关于劳改单位留场就业人员工龄问题的答复","dates":[{"year":1982,"month":9,"day":3}],"is_range_date":false,"authors":["公安部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国务院办公厅信访局, 信访工作资料选编 1951-1984（上）, 205","tags":[{"name":"工龄","type":"主题/事件"},{"name":"劳动改造","type":"主题/事件"},{"name":"留场就业人员","type":"主题/事件"}],"parts":[{"type":"title","text":"公安部关于劳改单位留场就业人员工龄问题的答复"},{"type":"subtitle","text":"〔82〕公劳就字638号"},{"type":"paragraph","text":"一九八二年六月二十八日，公安部就湖南省公安厅劳改局请示的国家劳动总局保险福利司（82)劳险字21号文是否适用于劳改单位留场就业人员的问题，答复说，国家劳动点局保险福利司(82)劳险字21号文适用于劳改单位留场就业人员。各地区对过去和今后留在劳改单位的就业人员的工龄计算问题，都按此件规定执行。"},{"type":"paragraph","text":"一九八二年九月三日，公安部十一局补充答复说，关于“各地区对过去和今后留在劳改单位的就业人员的工龄计算问题，都按此件规定执行”一句是指：留在劳改单位的就业人员转为正式工人后的工龄计算，按国家劳动总局保险福利司的规定执行。留在劳改单位的就业人员转为正式工人后，其工龄从刑满留场（厂）就业之日起计算。"},{"type":"subtitle","text":"公安部"},{"type":"subtitle","text":"一九八二年九月三日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a85d444bc4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
