art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想哺育我成长","authors":["学习毛主席著作积极分子/五好学员黄宁"],"parts":[{"type":"paragraph","text":"十月一日，我见到了最伟大的领袖毛主席！"},{"type":"paragraph","text":"我是个革命干部的女儿，出生在战火纷飞的年代。在随军转战的小毛驴背上，父母亲教给我的第一句话就是“永远跟着毛主席”，叔叔伯伯们教给我的第一支歌就是《东方红》。"},{"type":"paragraph","text":"记得一九四七年的一天，父母带我到一个礼堂去看戏，正好见到了毛主席。那时，我只有几岁，虽然还不大知事，但是也知道毛主席是中国人民的大救星。十多年过去了，那次见到毛主席的情景一直留在我的记忆中，并且成了我不断前进的巨大动力。"},{"type":"paragraph","text":"在毛泽东思想的哺育下，我系过红领巾，戴过共青团团徽，加入了光荣的中国共产党。十多年来，每当我在政治生活上进入一个新的起点，我就更加想念毛主席。敬爱的毛主席啊，我多么想向您说一句：在炮火中诞生的孩子长大了！我一定永远永远听您的话，跟您干一辈子革命！"},{"type":"paragraph","text":"敬爱的毛主席，是您使我懂得了一个革命战士，要生为人民生，死为人民死。是您告诉我，只要世界上还有帝国主义存在，手中武器就一天也不能放松。当工作遇到了困难时，您告诉我：“工作就是斗争”，“排除万难，去争取胜利”。当工作取得了成绩时，您又提醒我：“虚心使人进步，骄傲使人落后”，“无限风光在险峰”。"},{"type":"paragraph","text":"我要把这次接见当作我前进路上的新的起点，新的里程碑。我要读一辈子毛主席的书，干一辈子革命，永远忠于毛主席，忠于毛泽东思想，忠于党，忠于人民，随时准备为中国革命和世界革命贡献自己的一切。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6115b9e99e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
