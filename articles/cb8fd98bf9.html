dates":[{"year":1994,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"错误严重　影响恶劣　接受处理"},{"type":"paragraph","text":"向毛泽东同志亲属赔礼道歉"},{"type":"paragraph","text":"你报去年４月２４日第五版刊出记者调查《满纸荒唐言——〈毛泽东之子毛岸龙〉调查记》，对我社１９９２年１０月严重违反出版管理规定，擅自与香港新世纪出版社合作出版《毛泽东之子毛岸龙》一书提出批评。这本书内容严重失实，纯属随意编造，歪曲和丑化了毛泽东同志的形象，在社会上造成了恶劣影响，同时，给毛泽东同志的亲属带来了诸多麻烦。对此，我社诚恳地向全社会承认错误，并向毛泽东同志的亲属赔礼道歉。"},{"type":"paragraph","text":"近一个时期以来，我社认真总结经验教训，严格出版纪律，增强政治责任心，加强内部管理。今后要努力多出好书，为社会主义精神文明和物质文明建设做出贡献。内蒙古人民出版社"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb8fd98bf9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
