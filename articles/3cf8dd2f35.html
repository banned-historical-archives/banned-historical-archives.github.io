文汇报"],"dates":[{"year":1957,"month":9,"day":1}],"is_range_date":false,"parts":[{"text":"锡金是东北师大右派主帅","type":"title"},{"text":"文汇报","type":"authors"},{"text":"吉林省文艺界在对右派分子王肯的批判中，揭发出一个反党集团，这个反党集团的主帅乃是一向以老作家、老诗人、老“左”派自居的东北师大教授蒋锡金。蒋锡金、王肯和李景隆结伙向党进攻。5月初蒋锡金带头在省委召集的文艺座谈会上，向党放了恶毒的第一炮，以后由王肯写了向党全面进攻的文章——“师大宗派主义发展简史”，6月初人民日报社论发表后，蒋锡金又为王肯掩护退却，指示王肯批判葛佩琦，以作烟幕，李景隆也出了许多主意充当“军师”。","type":"appellation"},{"text":" ——原载《文汇报》1957年9月1日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cf8dd2f35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
