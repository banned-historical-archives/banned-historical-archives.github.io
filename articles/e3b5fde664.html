uthors":[],"dates":[{"year":1969,"month":5,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"锡兰、尼泊尔等国友好团体祝贺我党“九大”"},{"type":"paragraph","text":"毛主席领导中国人民从胜利走向胜利"},{"type":"paragraph","text":"据新华社一日讯　中国共产党第九次全国代表大会收到了锡中友好协会全国执行委员会的贺电。贺电表示：“衷心祝愿中国人民和全世界革命人民的伟大领袖毛泽东主席身体健康，万寿无疆。”"},{"type":"paragraph","text":"贺电说：“这次大会对于目前正在中国和全世界兴起的革命高潮，一定会产生深远的影响。对一切头脑清醒的人来说，这次大会的划时代意义是明显的。”贺电说，中国共产党第九次全国代表大会“是中国无产阶级文化大革命在政治上、思想上和组织上的伟大成果。它标志着毛泽东思想在反对现代修正主义的斗争中取得了全面的胜利。尽管以苏联修正主义者和美帝国主义者为首的反对中国和反对中国人民的国际大合唱发出了疯狂的喧闹声，第九次代表大会的伟大胜利完全证实了毛泽东思想的正确和巨大生命力，毛泽东思想是一切具有无产阶级意识形态的战斗人民的革命理论。”"},{"type":"paragraph","text":"据新华社一日讯　中国共产党第九次全国代表大会收到了尼泊尔中国友好协会会长普尔纳·巴哈杜尔的贺信。普尔纳·巴哈杜尔在贺信中代表尼中友好协会，向中国领导人、特别是向毛主席，并通过毛主席向参加大会的代表表示最热烈的祝贺。"},{"type":"paragraph","text":"贺信说：“在毛泽东主席亲自领导、震撼世界的中国文化大革命已经取得辉煌胜利的时候，人们非常热切地盼望的中国共产党第九次全国代表大会召开了。毛泽东思想使全世界特别是亚非拉三大洲渴望独立、自由、进步与和平的广大被压迫人民具有信心，使他们从心底里产生了无限的爱国力量。”"},{"type":"paragraph","text":"贺信最后写道：“毛泽东思想胜利万岁！亚非拉人民团结万岁！尼中友好万岁！”"},{"type":"paragraph","text":"据新华社二十七日讯　中国共产党第九次全国代表大会收到了挪威—中国友好协会的贺电。贺电说：挪威—中国友好协会一九六九年四月二十一日在奥斯陆举行会议，致电衷心祝贺中国共产党第九次代表大会。中国共产党今天是全世界进步人民的社会和政治进步的象征。在以毛主席为首的中国共产党的领导下，中国人民在新中国的社会主义建设中从胜利走向胜利。用毛泽东思想武装起来的七亿伟大的中国人民，今天已成为各国人民的解放和取得社会主义的最后胜利的强大堡垒。人民中国坚决反对帝国主义、修正主义和各国反动派。"},{"type":"paragraph","text":"据新华社二十八日讯　苏丹中国友好协会致电中国非洲人民友好协会，祝贺中国共产党第九次全国代表大会。"},{"type":"paragraph","text":"贺电说：我们欢呼在无产阶级文化大革命取得伟大胜利的时刻召开的这次大会。欢呼对修正主义者进行的领土挑衅给予的坚决反击。这种挑衅暴露了美帝国主义和苏修社会法西斯主义互相勾结的法西斯本质。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3b5fde664"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
