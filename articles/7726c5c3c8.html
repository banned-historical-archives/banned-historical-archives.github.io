"authors":["刘立文","南开大学"],"dates":[{"year":1957,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"大字报——请中国共产党也检查一下有没有个人崇拜","type":"title"},{"text":"南开大学刘立文","type":"authors"},{"text":"[刘立文：南开大学中文系学生]","type":"subtitle"},{"text":"苏联有个人崇拜，请中国共产党也检查一下有没有个人崇拜？如果有的话，请检查一下那种鼓励人们崇拜偶像的作法已经给人民造成了多在危害？请中央拿出苏共的勇气吧！还有在肃反运动中究竟犯了多少错误？这个运动究竟是整的反革命分子多呢？还是整的人民多？这个运动是否合乎法制，合乎宪法？宪法规定人民有出版、言论、集会、结社、人身等自由，请检查一下政府是否真正把这些自由给了人民？我们反对挂羊头卖狗肉。","type":"paragraph"},{"text":" 来源：1957年5月29日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7726c5c3c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
