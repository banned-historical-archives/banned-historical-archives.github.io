rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛主席的教导当作斗争的指南日本冲绳革命人民无限热爱毛主席","authors":[],"parts":[{"type":"paragraph","text":"据新华社七日讯 据东方通讯社报道：站在反美斗争前线的日本冲绳革命人民，热爱世界人民伟大领袖毛主席，努力学习毛主席的光辉著作。"},{"type":"paragraph","text":"冲绳革命人民热心地学习《毛泽东选集》和《毛主席语录》，并且把毛主席的教导当作斗争的指南。一位反美斗争的活动家说：“斗争越深入，越体会到学习《毛主席语录》的重要性，我要坚决按照毛主席的教导去工作”。另一位活动家说：“《毛主席语录》是我们的宝书，按照宝书的教导办事就不会走错路”。"},{"type":"paragraph","text":"一位在反美斗争中表现得非常英勇的农民说：“毛主席不仅是中国人民的伟大领袖，也是全世界人民的伟大领袖”。"},{"type":"paragraph","text":"有的农民家里挂着毛主席的大幅画像。许多农民热心地收听北京中央人民广播电台的广播，他们说：北京中央人民广播电台的声音，大大地鼓舞了冲绳人民的反美斗争。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"128e7c828e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
