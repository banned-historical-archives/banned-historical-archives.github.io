ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"谈西安事变后的形势和我们的方针","alias":"","parts":[{"type":"paragraph","text":"谈西安事变后的形势和我们的方针！"},{"type":"paragraph","text":"（1937年1月2日）"},{"type":"paragraph","text":"自张学良被扣留南京的消息传出后，西安左派要积极起来，同时右派也要积极起来。南京方面，左派在奋斗中，亲日派也在大大活动。蒋介石的态度还不甚清楚。目前局势在混乱中，亲日派与各个右派结合起来，他们现在的目标是要弄西安，正向西安进军。目前我们的方针，仍是打击右派，争取中派，所不同的是对军事上应有准备，对西安更要积极地帮助与团结。现在不仅是西安问题，而是全国问题。以下两点是不变的：一、与西安合作；二、打击亲日派，争取中间派。至于蒋介石是否能改变态度，还要看一看。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":111,"page_end":111},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aea06db2e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
