tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿军事友好代表团离长沙去桂林访问代表团专程访问了毛主席的家乡韶山","authors":[],"parts":[{"type":"paragraph","text":"据新华社长沙一九七三年十二月十日电 以阿尔巴尼亚劳动党中央政治局候补委员、阿尔巴尼亚人民军总参谋长彼得里特·杜米为团长，阿尔巴尼亚劳动党中央委员、阿尔巴尼亚人民军政治部主任希托·恰科和阿尔巴尼亚国防部副部长阿里夫·哈斯科为副团长的阿尔巴尼亚人民军军事友好代表团，由中国人民解放军副总参谋长张才千陪同，结束了在湖南的友好访问，今天上午乘专机离开长沙前往桂林访问。"},{"type":"paragraph","text":"阿尔巴尼亚人民军军事友好代表团是八日上午到达长沙的。当天晚上，湖南省军区举行宴会热烈欢迎阿尔巴尼亚战友。"},{"type":"paragraph","text":"九日，阿尔巴尼亚人民军军事友好代表团专程访问了中国人民的伟大领袖毛主席的家乡韶山。当阿尔巴尼亚战友到达韶山时，受到韶山区革命委员会主任毛泽普以及数百名男女社员的欢迎。欢迎群众挥动花束和彩带，载歌载舞，不断高呼：“中阿友谊万岁！”“热烈欢迎阿尔巴尼亚战友！”阿尔巴尼亚同志向韶山人民热情地转达了兄弟的阿尔巴尼亚人民对中国人民的深情厚谊。他们高兴地参观了毛主席旧居和毛主席旧居陈列馆。中午，韶山人民用自己生产的红薯、米酒、蜜桔、花生等招待了阿尔巴尼亚战友。"},{"type":"paragraph","text":"阿尔巴尼亚战友在长沙期间，由张才千和杨大易等同志陪同，参观了湖南省第一师范学校和桔子洲头，游览了岳麓山。阿尔巴尼亚战友所到之处，受到广大群众的热烈欢迎。"}],"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"069bccdcc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
