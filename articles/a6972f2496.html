torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"红四方面军的工作问题","alias":"","parts":[{"type":"paragraph","text":"红四方面军的工作问题！"},{"type":"paragraph","text":"（1935年7月21日）"},{"type":"paragraph","text":"红四方面军从鄂豫皖起，关于红军的扩大巩固，两个苏区的发展和巩固，无数次击破敌人，总的看路线是没有问题的，但有缺点和错误。军事指挥上的缺点，军委将另行讨论。在鄂豫皖粉碎敌人第四次“围剿”时，没有充分准备，没有准备打，又打得不好。在通南巴打退了刘湘部队，胜利后又放弃是个严重错误。"},{"type":"paragraph","text":"红四方面军领导对建立政权有不足和错误的地方，没有严格了解建立政权与建立红军的密切关系，提出西北联邦政府在组织上、理论上都是错误的。"},{"type":"paragraph","text":"[1]7月21日、22日，中共中央政治局会议在芦花召开，讨论红四方面军的工作问题。会议听取张国焘关于红四方面军在鄂豫皖和通南巴两个苏区对敌斗争情况及反“围剿”战略方针的汇报。这是毛泽东在会议上讲话的一毛泽东在毛儿盖的住地旧址。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":7,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":191,"page_end":192},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6972f2496"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
