<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1968,"month":8,"day":9}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席怎么说，工人阶级就怎么做","authors":["驻本溪煤矿某部毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席把外国朋友赠送给他的珍贵礼物——芒果，转送给首都工农毛泽东思想宣传队，这个特大喜讯从北京城传到了本溪煤矿，我们和矿工们一起热烈欢呼，纵情歌唱。毛主席啊，毛主席！这是您对首都工农毛泽东思想宣传队最大的关怀，最大的支持，最大的鞭策！也是您对全国亿万工农兵群众最大的关怀，最大的教育，最大的鼓舞！"},{"type":"paragraph","text":"毛主席对工农群众最关怀，最相信，最支持；工农群众对毛主席最热爱，最信仰，最崇拜，最忠诚。他们心中只有一个红太阳，就是伟大领袖毛主席；他们心中只有一个领导中心，就是以毛主席为首、林副主席为副的无产阶级司令部。毛主席怎么说，他们就怎么做；无产阶级司令部一声令下，他们就坚决照办，彻底执行。工人们这种高贵的品质，我们在本溪煤矿支左中有深刻的体会。"},{"type":"paragraph","text":"第一采煤区修理队，都是快要退休的老矿工。日本鬼子的榔头，他们尝过；大霸头的皮鞭，他们挨过。解放后，他们翻身不忘毛主席。他们对毛主席有着深厚的无产阶级感情。在无产阶级文化大革命中，他们充分发挥了工人阶级的主力军作用。毛主席说：“对反动派造反有理”。他们第一个组织起“老愚公战斗队”，向中国赫鲁晓夫及其在矿上的代理人开火。毛主席说：“抓革命，促生产”。他们闻风而动，坚决照办。他们除了完成自己的维修任务之外，还到井下和采煤工一起拿起风镐采煤，一干就是九个小时。他们说：“不完成毛主席交给的任务，决不下战场。”毛主席说：“革命委员会好”。他们就把颗颗红心贴在革命政权上。一天，革委会副主任周振武说：“革委会成立以后，不把生产突上去没脸见人。”他们马上给老周提出意见，对他说：“革委会建设的关键是要突出毛泽东思想，革委会成员要做突出无产阶级政治的带头人。”他们还立即开办了一期毛泽东思想学习班，请副主任周振武参加。在学习班里，他们和周振武一起学习毛主席关于政治是统帅，是灵魂的教导，一同到“万人坑”开忆苦思甜会，一同研究开展活学活用毛泽东思想群众运动的新措施。他们对革委会的成员说：“你们突出毛泽东思想，我们就放心，你们稍稍离开毛泽东思想的轨道，我们就担心，就有责任管。我们要紧紧团结在无产阶级司令部的周围，夺取无产阶级文化大革命的全面胜利！”"},{"type":"paragraph","text":"工人们无限忠于毛主席，无限忠于以毛主席为首、林副主席为副的无产阶级司令部。我们在和矿工们一起学习《人民日报》社论《在以毛主席为首的无产阶级司令部的领导下团结起来》时，大家激动地说，我们心里永远只有一个领导中心，就是以毛主席为首的无产阶级司令部。不管阶级敌人散布什么“多中心论”，也不能动摇我们心窝里的唯一的领导中心。“多中心论”者不管鼓吹有多少个“中心”，其实只有两个中心，一个是无产阶级的，一个是资产阶级的。对无产阶级的中心，我们坚决拥护，誓死捍卫；对资产阶级的“中心”，我们坚决反对，彻底粉碎！"},{"type":"paragraph","text":"两年来，我们在支左中和本溪煤矿工人们并肩战斗的过程，也是向工人阶级学习的过程。我们学到了工人阶级最崇高的品质，就是无限忠于毛主席，无限忠于以毛主席为首、林副主席为副的无产阶级司令部。今后，我们要更加虚心地向工人阶级学习，甘当工人群众的小学生，和本溪煤矿的工人们更加紧密地团结在以毛主席为首、林副主席为副的无产阶级司令部的周围，夺取无产阶级文化大革命的全面胜利！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"533d9fb692"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
