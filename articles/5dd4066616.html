tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见卡斯滕斯总统对贵宾们的来访表示热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"新华社十月十一日讯 人大常委会委员长叶剑英今天晚上在人民大会堂会见了德意志联邦共和国总统卡尔·卡斯滕斯和夫人一行。"},{"type":"paragraph","text":"叶剑英委员长对贵宾们的来访表示热烈欢迎。他说，十年前的今天，两国建立了外交关系。十年来，我们两国的关系一年比一年好。今后将会有更大的发展。他说，我们两国社会制度不同，但有着共同的任务，那就是维护本国独立和安全、维护世界和平。他表示相信，卡斯滕斯总统这次访华必将进一步促进两国人民友谊和两国关系的发展。"},{"type":"paragraph","text":"卡斯滕斯总统感谢中国人民的热情款待。他说，我这次访问中国是我一生中伟大的经历。我带来了德意志联邦共和国政府、议会各党和全体人民对中国人民的问候。他指出，共同为维护世界和平而努力，是两国发展友好合作关系的基础。"},{"type":"paragraph","text":"人大常委会副委员长彭真和夫人张洁清等会见时在座。德意志联邦共和国驻中国大使修德也参加了会见。"},{"type":"paragraph","text":"叶剑英会见卡斯滕斯和夫人。 新华社记者摄RW：叶剑英；接见外宾"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5dd4066616"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
