uthors":[],"dates":[{"year":1949,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"平市召开中小学教职员代表大会"},{"type":"paragraph","text":"讨论加强教职员学习"},{"type":"paragraph","text":"叶剑英彭真等同志莅会指导"},{"type":"paragraph","text":"【本市讯】北平市中小学教职员代表会议于四、五两日在北师礼堂举行，出席代表二百六十九人，主要讨论如何加强中小学教育工作者的学习，提高教育工作者自身，订出暑期教职员学习会的计划。此次会前，教联筹委会收到各校会员提案计三百一十件，其中有关暑期学习的在一半以上，共一百五十七件。教联筹委会集中了这些意见与要求，决定与市教育局共同举办暑期教职员学习会。"},{"type":"paragraph","text":"此次会议上，叶剑英市长、彭真市委书记，华北政府教育部晁哲甫部长，市教育局柳＠局长，叶圣陶先生，青委许立群同志，华大丁浩川同志均曾莅会讲话，平市妇联、青联、学联也都派代表来献旗献辞。"},{"type":"paragraph","text":"叶市长在说明了国际国内形势后，向大家提出三点：（一）要给予新的一代科学的而不是迷信的、麻醉的教育。（二）要用新的道德来教育新的一代。这道德的标准是符合于最大多数人民的长远利益的。（三）人民解放战争中，农民出力最多，应得第一功。教育工作者应帮助农村提高农民文化。彭真同志讲了三个问题：（一）历史发展有其自己的道路，是不可阻止的。历史发展的要求总以最大多数人民的要求表现出来。教育工作者应为历史发展需要为社会发展为人民大众的需要服务。根据这标准来检查国民党统治时代的教育，属于政治的一部分，是为帝国主义、封建主义、官僚资本主义服务的，必须加以根本的改造。属于生产斗争知识的一部分，也要改造，但不是根本性的。过去学生对自然科学，没有明确的知道目的是为了生产，理论与实际脱节，这些今后必须加以改造。（二）从事教育工作，如单纯为了饭腕，自己必然陷于苦恼。反之，如认清教育好新的一代，是一伟大事业，工作就非常愉快。教师生活的改善有待于生产的恢复与发展。（三）教育工作者要把最进步的知识教人，所以应不断的学习，不学就不能教。必须把旧的经验加以批判，除去不适用的，留下适用的，并创造新的经验。在管理学生中，要启发学生智慧，每件事都让学生知道为什么。叶圣陶先生以切身的经验说出了在国民党统治下教育工作者的痛苦，不论如何洁身自好，无法不办统治者所需要的教育。因此教育工作者头脑愈清楚，就愈感到痛苦。但在今天，以前想教的而不能教，不想教的而不得不教的情形完全没有了，他希望大家努力工作，办教育不要和社会脱节。晁部长说明：新民主主义教育是十几年来艰苦斗争中锻炼出来，城市中较高的文化科学应与乡村的斗争经验合起来。柳局长号召大家在政治学习中建立新的立场、观点和态度，以便正确地认识，分析与处理问题。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33ca96b0ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
