script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"肯定马克思主义的普遍真理 加强无产阶级国际主义团结 美共领袖一致谴责机会主义修正主义","authors":[],"dates":[{"year":1957,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京12日电】　据塔斯社纽约10日讯:美国共产党总书记尤金·丹尼斯和美国共产党主席威廉·福斯特在美国共产党第十六次全国代表大会9日下午会议上讲了话。"},{"type":"paragraph","text":"丹尼斯号召党在马克思列宁主义原则的基础上团结起来。"},{"type":"paragraph","text":"丹尼斯指出，在个人崇拜被揭露和匈牙利事件发生之后，“党内有相当一部分人一时迷失方向，涣散了下来，跟着发生了剧烈的党内斗争”，这使党有分裂的危险。丹尼斯指出，但是，值得庆幸的是，“我们党内有相当一部分党员和一些领导人能够明辨是非”，在为“挽救党、保护党的马克思列宁主义原则和争取必要的改变而斗争的同时，坚决努力维护党的团结”。"},{"type":"paragraph","text":"丹尼斯说，党内的许多分歧还未解决，在代表大会上可能仍旧得不到解决。他说，但是党现在已经能够“对许多纲领性的问题和大多数必须加以解决的紧要问题采取集体的一致态度”。"},{"type":"paragraph","text":"丹尼斯说，机械地搬用其他马克思主义政党的经验的倾向固然必须加以根除，但是也必须说，“放之四海而皆准的马克思主义原则”是有的。他还说，“我们谴责那种否定和敌视社会主义国家及其马克思主义政党的态度。我们反对只看到社会主义原则遭到破坏而不看到苏联、中华人民共和国和其他社会主义国家的历史成就，不看到现在这些新的社会主义制度的自我纠正和飞速进展的过程。”"},{"type":"paragraph","text":"福斯特在演说中批评了党内的机会主义和修正主义的倾向。他号召代表大会拒绝任何关于以“政治协会”代替共产党的建议，他说，“由于美国帝国主义的好战，作出这种决定对我们将是倒退的，招致灭亡的一步”。福斯特说，共产党还应当明确地重申:它维护马克思列宁主义的原则，反对修正主义者企图把列宁主义描写为“实质上仅是”一个“运用范围有限的俄国革命的产品”。福斯特说，共产党还必须加强自己的领导，尤其是在全国委员会中，领导机关耍吸取更多的无产阶级分子和新生力量。"},{"type":"paragraph","text":"福斯特强调指出，“加强无产阶级国际主义团结是这次代表大会的最重大的任务。”"},{"type":"paragraph","text":"福斯特最后说:“我们的代表大会，只要形成全党团结在健康的、马克思列宁主义的纲领和领导机构的周围的局面，它便能够克服危机。……如果我们能够根据我们从长期的和有益的党内讨论中所得到的经验教训来认识我党的任务的重要性，我们就会以惊人的速度改善我党的法律地位、巩固自己的队伍……和重新成为正在发展着的工人阶级、黑人和我国一切民主力量的斗争中的实际因素。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26ff967dcb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
