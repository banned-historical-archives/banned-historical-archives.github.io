art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"响应全会号召继续深入展开革命大批判","authors":["驻成都大学工人毛泽东思想宣传队杜旺生"],"parts":[{"type":"paragraph","text":"在夺取无产阶级文化大革命全面胜利的时刻，党的八届扩大的十二中全会公报发表了。公报充分体现了毛主席的光辉思想，是我们进一步搞好斗、批、改，把无产阶级文化大革命进行到底的伟大战斗纲领。我们一定要坚决完成公报提出的各项战斗任务。"},{"type":"paragraph","text":"公报号召全党和全国人民继续深入展开革命大批判，肃清叛徒、内奸、工贼刘少奇等党内最大的一小撮走资派的反革命修正主义思想。我们坚决响应这个号召，一定把革命大批判的烈火越烧越旺。"},{"type":"paragraph","text":"毛主席教导我们：“不破不立”。无产阶级文化大革命就是一场破旧立新的大革命，是一场彻底批判修正主义的大革命。现在，无产阶级文化大革命已经进入了斗、批、改的新阶段。要完成斗、批、改的伟大历史任务，就必须继续深入开展革命大批判。只有搞好革命大批判，才能把刘少奇等党内最大的一小撮走资派从政治上、思想上、理论上批倒批臭，才能彻底肃清他们的修正主义思想，使毛主席革命路线更加深入人心；只有搞好革命大批判，才能扫除各种障碍，使毛主席的最新指示得到落实；只有搞好革命大批判，才能为上层建筑各个领域里的改革创造条件，分清应该改什么，怎么改；只有搞好革命大批判，才能使人们提高两条路线斗争觉悟，在批修中斗私，彻底改造世界观。"},{"type":"paragraph","text":"我们在成都大学支左中，紧紧抓住革命大批判，推动毛主席最新指示落实。我们帮助两派学生办毛泽东思想学习班，发动群众深入开展革命大批判，揭露阶级敌人搞右倾翻案的阴谋和破坏革命大联合的罪恶活动，提高了师生的阶级斗争和两条路线斗争觉悟，分清了敌我，揪出了黑手，实现了革命大联合和革命三结合，迅速建立了革命委员会。工人毛泽东思想宣传队进校以后，狠抓了对修正主义教育路线的大批判，加深了广大革命师生对毛主席关于工人阶级领导教育革命的最新指示的理解，提高了革命师生接受工人阶级领导的自觉性，积极地同工人宣传队一道进行教育革命。"},{"type":"paragraph","text":"实践证明，革命大批判是落实毛主席最新指示的强大动力，是揭露、打击阶级敌人和教育群众的有力武器。我们坚决响应党的八届十二中全会的号召，继续深入地开展革命大批判，完成斗、批、改的各项任务，夺取无产阶级文化大革命的全面胜利！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a442ed3cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
