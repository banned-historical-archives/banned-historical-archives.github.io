952,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　毛主席一九三七年八月著作的哲学论文“矛盾论”今日出版发行。"},{"type":"paragraph","text":"毛泽东选集出版委员会指出:“这篇哲学论文，是毛泽东同志继‘实践论’之后，为了同一的目的，即为了克服存在于党内的严重的教条主义思想而写的，曾在延安的抗日军事政治大学作过讲演。在编入‘毛泽东选集’的时候，作者作了部分的补充、删节和修改。”"},{"type":"paragraph","text":"“矛盾论”的内容，分为七节:一、两种宇宙观；二、矛盾的普遍性；三、矛盾的特殊性；四、主要的矛盾和主要的矛盾方面；五、矛盾诸方面的同一性和斗争性；六、对抗在矛盾中的地位；七、结论。"},{"type":"paragraph","text":"本报以书页形式排印发表。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\04\\5244010101.JPG\"\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d10a9887b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
