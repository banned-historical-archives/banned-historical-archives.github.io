,"徐冰"],"dates":[{"year":1949,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北平市人民政府公告（不另行文）（府财税字第一号）"},{"type":"paragraph","text":"为公告定额薪资所得税税率由"},{"type":"paragraph","text":"查本市公教警人员及公私事业职员之定额薪资所得税税率业经本府确定自本年四月份开始征收兹将应行注意事项分别公告于后希各机关学校公私事业查照办理"},{"type":"paragraph","text":"一，薪资所得税自本年四月份开征。"},{"type":"paragraph","text":"二，薪资所得税按每人每月所得薪资折合小米斤数为计算标准以发薪当时市价折合货币征收之其薪资如本系按米价折发货币者则以发给时所折米价计算税额。"},{"type":"paragraph","text":"三，薪资所得税暂定二百五十斤小米为免税点二百五十斤以下者免税二百五十斤以上者就其超过部份计征税率按百分之四至百分之十五超额累进其税级及计算公式如左表："},{"type":"paragraph","text":"薪资收入数　税　率　税额计算公式（Ｘ＝薪资收入数）"},{"type":"paragraph","text":"２５１斤—５０斤　４％　．０４Ｘ—１０斤"},{"type":"paragraph","text":"３５１斤—５０斤　５％　．０５Ｘ—１３．５斤"},{"type":"paragraph","text":"４５１斤—００斤　７％　．０７Ｘ—２２．５斤"},{"type":"paragraph","text":"６０１斤—５０斤　９％　．０９Ｘ—３４．５斤"},{"type":"paragraph","text":"７５１斤—００斤　１２％　．１２Ｘ—５７斤"},{"type":"paragraph","text":"９００斤以上者　１５％　．１５Ｘ—８４斤说明１．薪资收入零数不及一斤者不征明"},{"type":"paragraph","text":"２．小数点第二位四舍五入"},{"type":"paragraph","text":"四、公私事业职工之食宿由厂店供给者其食宿以一百五十斤小米计其净得薪资每月超过一百斤小米者就其超过部份课税其税率与上同"},{"type":"paragraph","text":"五、薪资所得税由各发薪单位于发薪时代为扣缴并于发薪后五日内将所扣税款按规定表格填列清楚向本府税务局申报由税务局核发缴款书即时纳库"},{"type":"paragraph","text":"市长　叶剑英"},{"type":"paragraph","text":"副市长　徐冰"},{"type":"paragraph","text":"中华民国三十八年四月二十四日"},{"type":"paragraph","text":"注：一、税务局地址在前内东公安街一号　二、薪给报酬所得税扣缴清单及该税报告表格杨梅竹斜街彝宝斋及同街兴华印书局均有代售"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96f2e36d4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
