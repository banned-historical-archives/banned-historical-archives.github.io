元同志和吴船大使等观看了展出","authors":[],"dates":[{"year":1971,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为加强中越两国人民的兄弟友谊作出了贡献"},{"type":"paragraph","text":"《越南生产、战斗图片展览》胜利闭幕"},{"type":"paragraph","text":"姚文元同志和吴船大使等观看了展出"},{"type":"paragraph","text":"新华社北京十六日讯　为庆祝越南民主共和国宣布独立二十六周年而举办的《越南生产、战斗图片展览》，今天在这里胜利闭幕。首都八万多革命群众观看了展出。"},{"type":"paragraph","text":"中共中央政治局委员姚文元同志今天和越南民主共和国驻中国大使吴船同志一起观看了图片展览。姚文元同志赞扬越南人民在抗美救国战争和坚持生产中的英雄气概，赞扬这次图片展览为加强中越两国人民的兄弟友谊作出了贡献。他说，我们中越两国人民紧密团结，相互支持，共同战斗，争取更大的胜利。吴船大使说，越南民主共和国国庆二十六周年，毛主席、中国党和政府给予了很大重视。这个展览虽然时间不长，却有八万多群众观看，这体现了中国人民对越南人民抗美救国战争的同情和支持。一起观看展览图片的还有有关方面负责人王国权、陆维钊、吴晓达、肖特、邢仁先等。"},{"type":"paragraph","text":"反映英雄的越南人民在越南劳动党的领导下，在抗美救国战争和社会主义建设中取得伟大胜利的图片展览，从九月一日展出以来，首都人民满怀对越南人民的深厚感情，纷纷前往参观，热情祝贺越南人民生产和战斗的辉煌胜利，称颂中越两国人民的伟大战斗友谊。许多观众在留言簿上热情洋溢地写道：“在抗美救国战争的艰苦岁月里，越南人民以顽强的毅力，百倍的信心，边生产，边战斗，取得了反美斗争和生产的辉煌胜利，使我们受到很大鼓舞和教育，我们坚信，英雄的越南人民必胜，美帝国主义必败！”“越南人民的胜利就是我们的胜利，是对我国革命的最大支持。我们一定要学习越南人民敢于斗争的光辉榜样。”“中越两国是唇齿相依的亲密邻邦，两国人民是同志加兄弟的革命战友，在反对美帝国主义的共同斗争中，中国人民永远同英雄的越南人民团结在一起，战斗在一起，胜利在一起，坚决支持越南人民把抗美救国战争进行到底，直到取得彻底胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77f3f60cc4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
