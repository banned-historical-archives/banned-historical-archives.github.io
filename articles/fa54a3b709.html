art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席杜尔总统发表联合公报中国和几内亚共和国缔结友好条约同时缔结两国经济技术合作协定、两国贸易和支付协定","authors":["杜修贤"],"parts":[{"type":"paragraph","text":"新华社13日讯 “中华人民共和国主席和几内亚共和国总统联合公报”今天在北京签字。同时还缔结了：“中华人民共和国和几内亚共和国友好条约”、“中华人民共和国政府和几内亚共和国政府经济技术合作协定”和“中华人民共和国政府和几内亚共和国政府贸易和支付协定”。"},{"type":"paragraph","text":"上述联合公报、友好条约和协定的签订和发表，标志着中国和几内亚两国友好关系已经发展到一个新的阶段。刘少奇主席和塞古·杜尔总统在联合公报中说，在会谈中，双方就当前国际局势、亚非地区形势和进一步发展中几两国友好合作关系等问题进行了友好诚挚的会谈，并且满意地取得了一致的意见。在中华人民共和国和几内亚共和国友好条约中，双方深信，加强中华人民共和国和几内亚共和国之间的友好合作符合于两国人民的根本利益，有助于增强中国、几内亚两国人民和亚洲、非洲人民的友谊和团结，并且有利于世界和平。"},{"type":"paragraph","text":"根据中华人民共和国政府和几内亚共和国政府经济技术合作协定的规定，为了帮助几内亚共和国政府发展经济，中华人民共和国政府将在1960年9月13日——1963年6月30日的时期内，给予几内亚共和国政府以无息的、不附带任何条件和特权的贷款。贷款金额为一亿卢布。“中华人民共和国政府和几内亚共和国政府贸易和支付协定”有效期为五年，两国间的贸易应以进口商品总值和出口商品总值平衡为原则，双方每年各出口十二亿左右几内亚法郎。"},{"type":"paragraph","text":"上述联合公报、友好条约和协定的签字仪式今天上午十一时在人民大会堂举行。刘少奇主席和塞古·杜尔总统首先分别在“中华人民共和国主席和几内亚共和国总统联合公报”上签字，接着，周恩来总理和塞古·杜尔总统分别在“中华人民共和国和几内亚共和国友好条约”上签字。分别在贸易和支付协定、经济技术合作协定上签字的，中国方面是对外贸易部长叶季壮，几内亚方面是国民经济部长路易·兰萨纳·贝阿沃吉和计划部长凯塔·恩法马拉。"},{"type":"paragraph","text":"签字以后，双方热烈握手，并且进香槟酒表示祝贺。"},{"type":"paragraph","text":"中国方面参加签字仪式的有：全国人民代表大会常务委员会委员长朱德，副委员长沈钧儒、郭沫若、黄炎培、彭真、陈叔通、赛福鼎、林枫，国务院副总理陈毅、李先念、薄一波、谭震林，政协全国委员会副主席李四光、包尔汉，国防委员会副主席张治中，最高人民法院院长谢觉哉，最高人民检察院检察长张鼎丞，外交部副部长章汉夫，对外贸易部副部长卢绪章，中国驻几内亚大使柯华，外交部西亚非洲司司长何英、礼宾司司长俞沛文。"},{"type":"paragraph","text":"几内亚方面参加签字仪式的有：几内亚国民议会议长迪阿洛·塞福拉耶，几内亚民主党科纳克里二区区委政治书记迪阿洛·穆克塔，外交部礼宾司长安德烈·萨松等。"},{"type":"paragraph","text":"杜修贤"},{"type":"paragraph","text":"刘少奇主席和赛古·杜尔总统在“中华人民共和国主席和几内亚共和国总统联合公报”上签字。新华社记者 杜修贤摄"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa54a3b709"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
