script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠批资产阶级的人生哲学","authors":["朱永淇"],"dates":[{"year":1974,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海纺织机械专件厂青年工人　朱永淇"},{"type":"paragraph","text":"“政治上只求过得去，业务上要求过得硬”这种思想，不仅在上层建筑各个领域普遍存在，而且在我们工厂里也有一定的市场。它对于坚持又红又专的方向，巩固无产阶级专政，加速社会主义革命和社会主义建设起着极大的阻碍作用。"},{"type":"paragraph","text":"我是从农村来到工厂的青年。刚进厂，由于受了一些所谓好心人的劝导，产生了一种“技术好，吃得开”的错误思想。认为我是一个团员，又经过农村这个广阔天地的锻炼，政治觉悟有了一定的提高，所缺的只是技术。在这种思想支配下，我便埋头钻研技术，丢掉了政治学习，回避一切社会工作。厂里只摸车、钳、铇，回家只翻书、图、表。某些人当面捧我:“小伙子真能干，有出息!”我嘴上不说，心里可得意啦，自以为门选准了，道走对了。为了使自己更有“出息”，去年七月，大学招生时我积极报名，参加了文化考查。在只有三、四天的准备时间里，我翻遍了放下七、八年的教科书，熬了几个夜，重温了数、理、化，而对于政治，我却不以为然，认为不值得去花费时间。揭晓之后，我知道没有被录取，感到非常失望，从此业务上无精打采，政治上不问不闻，一度十分消沉。"},{"type":"paragraph","text":"工人老师傅发现了我身上的毛病，耐心地做我的思想工作，跟我一起学习毛主席关于“政治工作是一切经济工作的生命线”的教导，使我进一步明白了脱离无产阶级政治的危害性，加深理解了政治与业务之间的关系。通过学习，我认识到“政治上只求过得去，业务上要求过得硬”是腐朽的资产阶级人生哲学，是与我们工人阶级当家作主思想格格不入的资产阶级雇佣观念。中了这种毒素，就会迷失方向，丢掉路线，最终被资产阶级所利用。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7bf6e0f50f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
