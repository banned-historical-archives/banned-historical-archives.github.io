ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"和邓静溪的谈话","alias":"","parts":[{"type":"paragraph","text":"和邓静溪的谈话1]"},{"type":"paragraph","text":"（1938年3月24日）"},{"type":"paragraph","text":"每月由国民党政府拨给几十万元的经费，枪枝装备都是由日本的“义务输送队”给我们送来，现在差不多有一师人的装备都完全像日本军队了，只有臂章不同。"},{"type":"paragraph","text":"[1]1938年3月24日晚，毛泽东会见记者邓静溪，回答了他提出的中国抗战前途、目前抗日民族统一战线的发展、八路军的情形等问题。邓静溪在毛泽东会见他的第二天（3月25日），写了《毛泽东先生会见记》。其中说：“晚上九点半钟的时候，记者被一位科长引进毛先生住的那间窑洞似的屋子”。“他的外表，很像朴实的农夫，但他的举止，却似文雅的书生”。“他谈起话来，老是那样的不慌不忙，沉着持重，随时带着征询对方意见的语调。用语很通俗，听起来似乎觉得‘平淡无奇’，过后想起来，却又‘隽永有味’”。谈话结束，“他持着洋烛送我出门”。这是毛泽东关于八路军问题和邓静溪谈话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":115,"page_end":115},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19cbfc3b7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
