s":[],"dates":[{"year":1967,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"“唤起工农千百万，同心干”!"},{"type":"paragraph","text":"毛主席建党思想的万丈光芒，照红了浦江映红了天，极大地鼓舞着上海一千万人民，为彻底埋葬中国赫鲁晓夫的修正主义建党路线而战!为使我们的党组织永远是战斗的潮气蓬勃的无产阶级先锋队而战!毛泽东思想的光芒照到那里，那里一片欢腾，奇迹层出不穷。普通的党员、普通的群众，都在总结无产阶级专政条件下建设伟大的马列主义、毛泽东思想的政党的经验，都在讨论怎样做一个毛主席的好党员。何等崭新的精神面貌，多少动人的先进事迹，几天几夜也说不完，千篇万章也写不尽。这里再次刊登的几只小故事，仅仅是其中很少很少的一部分。"},{"type":"paragraph","text":"让毛主席伟大的建党思想的光芒红遍全国，照亮全球!"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\12\\67cc020101.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7d17773d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
