rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一位军旅诗人的毛泽东情结","authors":["张承恩"],"parts":[{"type":"paragraph","text":"在中国，很多人对毛泽东的故事耳熟能详，有关的著作和文艺作品不胜枚举。要在这类题材上涉笔创作和有所创新，往往让人望而却步。成都军区某部干部、青年军旅诗人苏世佐却走上了这条创作道路，成绩斐然。"},{"type":"paragraph","text":"《宽宽的河流》是苏世佐刚刚出版的“毛泽东题材”诗集，收入诗歌37首。其中，压卷之作长篇抒情诗《浴血征程》虽以红军和长征为题材，顺理成章主角仍是毛泽东，诗魂仍是毛泽东情结。令人称道的是，不仅是作品多系诗人20多岁时所作，更在于作品独特的视角感悟和恢弘的气势情怀。读完这部诗作，开卷之前多少有点担心雷同的疑虑顿然释怀。"},{"type":"paragraph","text":"写毛泽东，必须熟谙、理解和把握毛泽东以及中国共产党的历史。苏世佐为此多次通读了《毛泽东选集》，翻阅了大量历史资料，并且到革命圣地参观，升华了认识，获得了激情和灵感。除了对诸多重要历史事件历史人物生发喷涌出新的认知感情外，诗人的诗质还使他能从不为常人注意的细微处萌发淙淙诗情，燧石钻火般地燃出闪闪诗行：“从不挎枪的毛泽东”、“毛泽东和辣椒”、“图书管理员”……仅仅从标题便可领略一二。诗人的毛泽东情结，在神圣与崇高，也在平凡与朴实。好的诗，要在真情真思、深情深思中流泻。欣赏诗歌，仅着眼于诗人有使命感和责任感是不够的。诗，毕竟不同于史实的陈述，它必须把历史的真切与诗的张扬、现实的严峻与诗意的浪漫、事件的局限与想象的延伸融合在一起，让社会美与艺术美均得到呈现。《宽宽的河流》以其强烈的情感色彩和诗性的表达，艺术地再现了革命领袖、革命英烈和革命历史。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cebc6f1db4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
