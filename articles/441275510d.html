ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对湖南宁乡农民检举周震鳞问题来信的批语","alias":"","parts":[{"type":"paragraph","text":"对湖南宁乡农民检举周震鳞问题来信的批语"},{"type":"paragraph","text":"（1952年4月8日）"},{"type":"paragraph","text":"周总理阅后转李维汉同志阅存。此事不应当依照农民的意见处理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月八日"},{"type":"paragraph","text":"[1]周震鳞，湖南宁乡人，1903年与黄兴组织华兴会，曾任同盟会湘支部长，参加辛亥革命和讨袁护法斗争，后任国民政府委员、国民党中央监察委员。1949年随程潜在湖南起义。新中国成立后任政协第一届全国委员会委员、湖南人民军政委员会顾问。"},{"type":"paragraph","text":"[2]李维汉，当时任中共中央统战部部长。"},{"type":"paragraph","text":"[3]湖南省宁乡县二区竹山乡全体农民1952年3月13日给毛泽东写信，检举周震鳞解放前剥削压迫人民，贪污民财，解放后私藏枪支，将押金抵田强迫佃户受田，疏散财物，抵抗减租退押，要求将其女儿从北京押回斗争，要他退还押金等。毛泽东全集第三十二卷"},{"type":"paragraph","text":"这些坏事是可能的，但周是老同盟会员，一向不附蒋，现是政协委员，应予以保护。"},{"type":"paragraph","text":"毛泽东四月八日"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":4,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":51,"page_end":52},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"441275510d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
