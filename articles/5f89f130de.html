<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国资本家对青工的剥削","authors":["士琪"],"dates":[{"year":1958,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"士琪"},{"type":"paragraph","text":"资本家对工人的剥削是残酷的，他们对青年工人的剥削尤其凶狠。法国“前卫报”不久以前在全国青年工人中进行的工资情况调查，揭露了资本家奴役青年工人榨取超额利润的骇人听闻的事实。"},{"type":"paragraph","text":"通过所谓“学徒合同”进行隐蔽的掠夺，已是一种司空见惯的手法。法国云纳省有一个14岁的小学毕业生，是一家饭店的“酒吧学徒”。饭店老板每天要他工作13—15小时。跑腿、削蔬菜、收拾桌子、洗碗具、打扫屋子、擦洗地板，什么活都要干。由于工作吃重，他只能用10分钟的时间吃饭，睡眠时间也很少。老板除供给他膳宿外，每月只给1，200法郎的“法定”工资(反过来说，也就是资本家的剥削得到了法律保障)。"},{"type":"paragraph","text":"利用年龄的差异压低工资，是资本家在青年工人身上进行掠夺的又一种手法。19岁的马克司，在学校学的是工具制造业，并且持有工业学校毕业证书，算得上是一个熟练工人。他现在在安纳西的“聚高洛”首饰店工作。如果是成年工人，掌握了他这样的专业技术，每小时就可得计时工资250法郎。但他因为是青年工人，在去年11月份他工作了201小时，平均每小时仅得148法郎。换句话说，老板每小时在马克司身上多刮了102法郎。"},{"type":"paragraph","text":"在加班加点时，老板从他身上赚的钱还要多。如果每加班一点钟可多得工资25%，那么成年工人每小时可挣313法郎，而他却只能挣185法郎，相差127法郎。"},{"type":"paragraph","text":"把这笔账算一下，老板每月在马克司身上掠夺的数目共达21761法郎。当然，青年工人马克司的遭遇，在法国是“合法”的普遍事例。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1958\\05\\5853041701.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e法国被解雇的青年工人图为里昂的罗尼钢铁厂被解雇的三个学徒工人，他们充满愤怒和焦虑的心情，因为他们在里昂再也找不到工作了。(新华社)\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f89f130de"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
