art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《学习毛泽东军事著作中的哲学思想》即将出版","authors":["豫昭"],"parts":[{"type":"paragraph","text":"天津人民出版社将要出版解放军政治学院林伯野同志所著《学习毛泽东军事著作中的哲学思想》一书。该书是作者长期讲授和研究毛泽东同志著作、毛泽东军事辩证法的基础上写成的，比较全面地综述了毛泽东重要军事著作中的哲学思想，并按唯物论、辩证法、历史唯物论、认识论等几方面，分别进行概述，避免了逐篇介绍时的重复现象，便于读者比较完整地领会毛泽东军事著作中的主要哲学原理。这本书还同时引述了我国老一辈无产阶级革命家刘少奇、周恩来、朱德、邓小平、陈云、刘伯承、陈毅等同志的有关言论，体现了毛泽东军事著作中的哲学思想也包括着我党的集体智慧。"},{"type":"paragraph","text":"这本书结合党史、战史、战例阐述了毛泽东军事著作中的哲学原理，并扼要地点出了这些原理对社会主义现代化建设和军队革命化现代化建设的普遍指导意义。该书用语朴实，通俗易懂，深入浅出，寓理于事，适合部队广大干部战士阅读。（豫昭）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7150c44341"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
