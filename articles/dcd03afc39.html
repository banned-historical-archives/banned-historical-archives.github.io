ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"印发胡乔木关于推广小球藻等粮食代用品生产的建议的批语","alias":"","parts":[{"type":"paragraph","text":"印发胡乔木关于推广小球藻等粮食代用品生产的建议的批语"},{"type":"paragraph","text":"（1960年10月27日）印发各中央局，各省、市、区党委第一书记研究、推广。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1960年10月27日"},{"type":"paragraph","text":"[1]中共中央书记处候补书记、毛泽东的秘书胡乔木1960年10月27日写信给毛泽东说：“推广小球藻的生产在当前粮食因灾不足的情况下，有其重大意义：1.至少可以保证不饿死人，减少甚至消灭浮肿病。2.减少乱采代食品而引起中毒的事件。3.保证劳动生产率和工农体力不至因粮食不足而降低。此外，它几乎不与农作物争地、争水、争肥、争劳力。因此，我想建议中央为推广小球藻及其他粮食代用品的生产发一专门指示（直至公社），在各省农业会议上讨论，并逐级负责作出安排。南方可以终年生产，北方冬天要修温室，现冬天就要到来，更是时不可失。”1960年11月3日，中共中央转发了胡乔木的这个建议。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":10,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":47,"page_end":47},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcd03afc39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
