art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席是伟大的革命舵手","authors":["五好战士张丙华"],"parts":[{"type":"paragraph","text":"我们听了党中央关于无产阶级文化大革命的决定，心情万分激动。它表达了亿万革命群众的共同心愿，它是伟大的毛泽东思想的最新发展，是指导我国无产阶级文化大革命的行动纲领，是照亮我们前进道路的灯塔。"},{"type":"paragraph","text":"事实再一次证明，大海航行靠舵手，毛主席就是我们伟大的舵手；万物生长靠太阳，毛主席就是我们心中的红太阳。"},{"type":"paragraph","text":"亲爱的党中央和毛主席，我们是您培养成长的战士，要永远跟您干革命，狂风恶浪无阻挡，海枯石烂不变心！您指向哪里，我们就奔向哪里，您叫我们怎么办，我们就坚决怎么办，枪林弹雨敢冲，刀山火海敢上。在当前的无产阶级文化大革命的斗争风暴中，我们一定认真地学习党中央的决定，忠实地执行党中央的决定，热情地宣传党中央的决定，勇敢地捍卫党中央的决定，誓将无产阶级文化大革命进行到底。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb85e96de8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
