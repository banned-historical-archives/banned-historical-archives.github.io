" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"对河南区党委关于对付国民党顽固派的策略的复示","alias":"","parts":[{"type":"paragraph","text":"对河南区党委关于对付国民党顽固派的策略的复示！"},{"type":"paragraph","text":"（1945年3月30日）"},{"type":"paragraph","text":"[1]这是毛泽东对《河南区党委关于对付国民党顽固派的策略的指示》的复示。在报头上还批有“此报转发华中、湖北、王震”字样。3月11日，《河南区党委关于对付国民党顽固派的策略的指示》中指出：一、近来国民党顽固派积极组织河南地方势力，动员河南国民党，组织反共反八路军，并公开勾结敌伪。其实际企图，是在河南组织反共统一战线，抵抗与进攻我们。我们的策略，应广泛与切实地在河南建立抗日民族统一战线，联络一切可能联络的各种地方势力，团结各阶层人民，要力争中间阶层大部同我们联合或中立，应认识到河南社会势力中，中间阶层占大多数，河南社会也是两头小，中间大。二、我们打击的对象只是少数，对其余的采取不打，要中立它，联合它，与大部分地方势力建立民族统一战线。三、国民党顽固派与河南地方势力之间，地方势力与地方势力之间，中间阶层与军阀、军僚、大地主之间，敌伪之间，河南基本群众与国民党统治势力之间，均有许多矛盾，我们应注意利用，实现争取群众与建立民族统一战线。四、对国民党在河南地方党员，我们一般地采取合作与督促他们参加抗日救亡，执行我们的军令政令，但不能给他们以任何领导权，领导权要完全掌握在我们之手。五、对河南保甲政权，我们除一方面暂时利用外，一方面深入组织农民抗敌救国会，逐步地从农抗基础上改造乡村政权，组织与发动广大农民群众，是我们目前一切工作的中心环节。六、对乡村士绅，应注意好好团结他们，采取一区及一县为单位，组织参议会，争取士绅河南区党委："},{"type":"paragraph","text":"你们寅真电所述策略是正确的，望好好执行"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"寅卅1945年，毛泽东在延安。"},{"type":"paragraph","text":"泰早密"},{"type":"paragraph","text":"的感安带东至《窑洞春早》（中国画）"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":365},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f89a26f4a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
