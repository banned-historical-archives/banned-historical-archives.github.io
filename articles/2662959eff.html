art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"第三世界国家要自立、自强、自信","authors":[],"parts":[{"type":"paragraph","text":"他说，第二次世界大战以后，我们广大第三世界国家站起来了，在国际事务中取得了发言权。现在我们在广泛问题上有着共同的立场。"},{"type":"paragraph","text":"邓小平说，综观当前国际形势，不稳定的、动荡的因素比以前有所增加，而不是减少。我们认为，对世界和平的威胁主要来自苏联。对付霸权主义，就需要中国和第三世界其他国家、日本、美国、欧洲广泛联合起来。要联合就需要消除联合的障碍。"},{"type":"paragraph","text":"埃雷拉总统说，我们第三世界国家当前面临的问题是反对霸权主义的威胁，为了维护世界和平而发展自己的国家。他赞扬中国在国际舞台上采取了同其他第三世界国家一致的立场，并且积极支持他们的正义斗争。"},{"type":"paragraph","text":"这是邓小平同埃雷拉第二次见面。1974年，埃雷拉作为委内瑞拉国会议员访问中国时，邓小平曾会见了他。今天交谈时，邓小平向埃雷拉介绍了这七年间中国所走过的曲折道路。他说，从最近三年的情况来看，我们党的十一届三中全会制定的路线和方针是正确的。因此可以说，我们国家是有希望的。埃雷拉总统说，同七年前相比，中国有了很大的变化，我们知道你们现在所面临的困难，同时也看到了中国为克服这些困难所制定的计划。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2662959eff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
