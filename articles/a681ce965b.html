script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一定要把毛主席的哲学思想学到手","authors":["李长茂"],"dates":[{"year":1970,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一定要把毛主席的哲学思想学到手"},{"type":"paragraph","text":"天津市第二毛纺织厂　李长茂"},{"type":"paragraph","text":"党的九届二中全会公报号召：“全党要认真学习毛主席的哲学著作，提倡辩证唯物论和历史唯物论，反对唯心论和形而上学。”这是党中央交给我们的极其光荣、伟大的战斗任务。"},{"type":"paragraph","text":"十多年来，在无产阶级司令部的亲切关怀下，我结合阶级斗争、生产斗争、科学实验三大革命运动的实践，在学习“老三篇”的基础上，坚持学哲学用哲学。在学习和运用哲学的过程中，我深深体会到，干革命，就要学哲学，只有学好毛泽东思想，学好了哲学，才能做好革命工作。毛主席的哲学著作，讲的是辩证唯物论和历史唯物论，是无产阶级世界观，是我们工人阶级认识世界和改造世界的最尖锐的武器。我们工人阶级必须学好用好毛主席的哲学著作。"},{"type":"paragraph","text":"在旧社会，我从十五岁做工，被迫当牛做马。解放后，成了国家的主人。我决心跟着党和毛主席好好干革命，可是工作上碰了钉子，不知道怎么办好，有时候就泄劲。我学了毛主席的哲学著作，就心明眼亮劲头足。比如，我学了《实践论》，就明白了自己工作上碰钉子，是由于自己的主观认识不符合客观规律。这么一来，就提高了改造主观世界的自觉性。在实践中我体会到，要干好革命工作，光有朴素的无产阶级感情还不够，必须树立无产阶级的世界观，掌握客观规律性，发挥主观能动性。又如，我在没有学习哲学以前，在工作中一遇到矛盾就感到头痛，怕影响工作，所以老想躲开矛盾，结果呢，矛盾越躲越多，越躲越尖锐。后来，学习了《矛盾论》，懂得了矛盾是普遍存在的，“没有矛盾就没有世界”这个道理，从此，我就正视矛盾，揭露矛盾，分析矛盾，积极解决矛盾，促使矛盾朝着有利于革命的方向转化。这么一来，工作就有办法，什么困难都能克服，什么疙瘩都能解开。我体会到，干革命，就是要不断地解决矛盾；矛盾解决了，革命就向前发展。要树立继续革命的思想，必须学习毛主席的哲学著作。"},{"type":"paragraph","text":"共产党员是无产阶级先进分子。先进，就先进在无产阶级世界观上。活学活用毛主席的哲学著作，是党的思想建设的大问题，是大破唯心论和形而上学的资产阶级世界观、大立辩证唯物论和历史唯物论的无产阶级世界观的大问题。不学习毛泽东思想，不学习毛主席的哲学著作，不树立无产阶级世界观，就不可能成为无产阶级先进分子。"},{"type":"paragraph","text":"学习毛主席的哲学著作，改造世界观，贵在“自觉”二字。自觉，就是要有深厚的无产阶级感情；自觉，就是要有明确的目标，一心为公、一心为革命，为解放全人类的崇高目的而学；自觉，就是要为革命多动脑子，在学习中突出“刻苦”二字。有了自觉性，才能学好哲学。"},{"type":"paragraph","text":"我学习毛主席的哲学著作，尝到了甜头。但是，对照公报，感到和党的要求差距还很大。我决心以公报为强大动力，到群众中去，到三大革命运动中去，进一步学好用好毛主席的“老三篇”和哲学著作，进一步改造自己的世界观，在革命斗争中，贡献出自己的一切力量。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a681ce965b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
