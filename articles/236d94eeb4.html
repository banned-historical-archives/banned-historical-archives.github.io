tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛主席文献兴起热潮","authors":[],"parts":[{"type":"paragraph","text":"本报讯 我军各部部、驻北京各机关、学校和部队的军官，在听了周恩来同志关于“目前台湾海峡地区的斗争形势和中国人民的反帝任务”的报告后，掀起了学习“毛泽东同志论帝国主义和一切反动派都是纸老虎”的重要文献的热潮。"},{"type":"paragraph","text":"连日来，各单位广泛地传达了周恩来同志的报告。许多军事学校驻地的有线广播每天连续播送学校负责人关于学习毛主席这一重要文献的参考报告。工程兵和装甲兵领导机关，召开了宣教工作会议，布置在广大官兵中广泛、深入地宣传和学习毛主席这一重要文献。空军领导机关还举行电话会议，要求全军结合我军的斗争历史和当前国内外形势进行学习。"},{"type":"paragraph","text":"在学习中，大部分单位都充分运用了大放大鸣大辩论的形式。有的单位还专门组织参加过二万五千里长征的将军们，巡回向部队作报告，以他们的亲身经历生动地说明毛主席关于帝国主义和一切反动派都是纸老虎这一英明论断的正确。某军事学校的学员，还每人根据自己的体会写了学习笔记。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"236d94eeb4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
