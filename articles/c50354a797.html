script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"李鹏在毛泽东外交思想研讨会上讲话说毛泽东外交思想极为丰富要认真学习研究新情况解决新问题","authors":[],"dates":[{"year":1993,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李鹏在毛泽东外交思想研讨会上讲话说"},{"type":"paragraph","text":"毛泽东外交思想极为丰富"},{"type":"paragraph","text":"要认真学习研究新情况解决新问题"},{"type":"paragraph","text":"新华社北京１２月７日电中共中央政治局常委、国务院总理李鹏今天在外交部毛泽东外交思想研讨会开幕式上发表了重要讲话。讲话详细摘要如下："},{"type":"paragraph","text":"今年是毛泽东同志诞辰１００周年，党中央将举行隆重的纪念大会，届时江泽民同志将发表重要讲话。作为纪念活动的一个组成部分，外交部举行毛泽东外交思想研讨会，是一件很有意义的事情。毛泽东同志是我国各族人民敬爱的伟大领袖，无论在当代中国的历史上，还是在马克思主义、社会主义的发展史上，他都占有不可磨灭的地位。他的伟大历史功绩是多方面的。从理论上讲，他把马克思主义的基本原理同中国革命的具体实践相结合，形成了毛泽东思想；从实践上讲，他领导中国人民经过长期艰苦卓绝的斗争，推翻了三座大山，建立了新中国，此后进行了各方面的建设。外交工作是毛泽东历史功绩的一个非常重要的方面。"},{"type":"paragraph","text":"毛泽东同志作为伟大的外交战略家，为我国外交战略的确立和外交方针政策的制定，进行了大量的开创性工作，作出了巨大的贡献。毛泽东外交思想是极为丰富的。比如，在建国初期提出站在和平、民主和社会主义阵营一边的方针；关于中国的事情应该由中国人民自己作主的主张；关于自力更生为主、争取外援为辅的主张；关于国际关系应遵循和平共处五项原则的主张；关于把国际主义和爱国主义正确结合起来的主张；关于中国反对霸权主义，自己也永远不称霸的方针；关于国家不分大小一律平等的思想，等等。回顾和研究毛泽东外交思想，目的是为了做好新时期的外交工作，从而为我国的现代化建设争取一个长期的和平国际环境。"},{"type":"paragraph","text":"邓小平同志继承和发展了毛泽东思想，提出了一整套包括外交工作在内的建设有中国特色社会主义的理论。这是我们进行社会主义现代化建设和开展外交工作的理论依据和指导方针。邓小平同志深刻而全面地分析国际形势的变化，提出了一系列重要的外交战略、方针和政策。比如：关于反对霸权主义、维护世界和平、坚持独立自主的对外政策；关于和平与发展是当代两大主题；关于按照和平共处五项原则建立国际新秩序；关于实行对外开放；关于“一国两制”；关于对国际形势的变化要冷静观察，稳住阵脚，沉着应付，等等。这一系列具有鲜明的时代特征和极强的针对性的思想和论断，是我们在新的历史时期从事外交工作必须认真学习并加以切实贯彻的。"},{"type":"paragraph","text":"现在我国的改革开放和现代化建设进入了一个新的重要的历史时期，世界形势也正处在深刻的大变动之中，外交上面临的局面更加复杂，任务更加艰巨。希望外交战线的同志们，认真学好毛泽东和邓小平同志的外交思想，研究新情况，解决新问题，大胆开拓，有所作为。毛泽东同志和邓小平同志的外交思想，是一个完整的科学体系。现在我国的改革开放、经济建设和外交工作，都在蓬勃发展，形势喜人。我们有充分的信心，在以江泽民同志为核心的党中央领导下，把握当前国际国内形势为我们提供的不可多得的有利时机，不断夺取国内战线和外交战线的更大胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c50354a797"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
