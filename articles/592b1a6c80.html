" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"对《红旗》杂志1967年第十二期社论的批语","alias":"","parts":[{"type":"paragraph","text":"关于大联合的指示"},{"type":"paragraph","text":"（一九六七年八月）"},{"type":"paragraph","text":"最大的运动必须有最大的联合。把中国的赫鲁晓夫批倒批臭，这是关系到中国命运的前途和世界命运的前途的大事。因此我们必须最广泛的联合。每个革命组织、革命组织的负责人，必须在思想上引起充分的注意，在大批判中求得大联合，否则就会亲者痛，仇者快。"},{"type":"paragraph","text":"革命派互相攻击，刘少奇坐山观虎斗的现象，再也不能下去了。"},{"type":"paragraph","text":"关于大串连的指示"},{"type":"paragraph","text":"（一九六七年八月）去年走是对的，今年就不是时候了，帮倒忙。"},{"type":"paragraph","text":"（转摘自周总理1967年8月16日对北京红代会工作人员的讲话）对《红旗》杂志一九六七年第十二期社的批语"},{"type":"paragraph","text":"（一九六七年八月）"},{"type":"paragraph","text":"还我长城。"},{"type":"paragraph","text":"（注：这篇题为《向人民的主要敌人猛烈开火》的社论，是由林杰起草，王力、关批准发表的。社论中错误地提出了“军内一小”的口号，从而转移了斗争大方向，主席立即提出了严房的批评。）"},{"type":"paragraph","text":"对天津、河北问题的指示"},{"type":"paragraph","text":"（一九六七年八月）天津、河北应该搞得好一些，因为天津、河北离北京近，特别是天津，容易影响北京。·322"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":8,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":335,"page_end":335},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"592b1a6c80"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
