ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"望准备应付任何事变","alias":"","parts":[{"type":"paragraph","text":"望准备应付任何事变！！"},{"type":"paragraph","text":"（1946年4月18日）各局，并告叶、饶、林："},{"type":"paragraph","text":"渝周铣电称：蒋表面愿求妥协，以欺骗国人，暗中布置军事，阴谋甚大，马歇尔来后态度如何，尚难断定等语。望准备一切条件，应付任何事变。各战略区主要负责人不得中央许可，不要离开队伍。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"卵巧[1]这是毛泽东为中共中央起草的给各中央局和分局的电报。[2]叶，指叶剑英，当时是北平军事调处执行部中共方面委员。饶，指漱石，当时是北平军事调处执行部第二十七小组（沈阳）中共方面负贵林，指林彪，当时任东北民主联军总司令。[3]指1946年4月16日周恩来在重庆给中共中央并转中共中央东北局电报。电报说：蒋介石仍是两面做法，表面公开催促各方交参加政府及国的名单，催促赶快修改宪草，暗中却召集秘密会议。何应钦、白崇禧已奉命布置军事，陈诚赴沪，定有阴谋。《毛泽东在陕北》（素描）《毛泽东在陕北》(素描）"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":251,"page_end":253},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a62fc5a65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
