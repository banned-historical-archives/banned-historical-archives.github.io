art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一个心眼紧跟毛主席干革命","authors":["年四旺"],"parts":[{"type":"paragraph","text":"杨成武同志《大树特树伟大统帅毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威》的重要文章，阐明了当代的一个最伟大的真理：我们心中最红最红的红太阳毛主席是全世界革命人民的最高领袖，战无不胜的、光焰无际的毛泽东思想是全世界人民的命根子。"},{"type":"paragraph","text":"对于我们革命战士来说，大树特树伟大统帅毛主席和毛泽东思想的绝对权威，集中到一点，就是要无限忠于毛主席，永远忠于毛主席。"},{"type":"paragraph","text":"永远忠于毛主席，最根本的是要把读毛主席的书当作生命的第一需要，把执行毛主席的指示当作最崇高的职责。林副主席号召我们：“读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士。”我们要把毛泽东思想化为自己的灵魂，真正做到心里只有毛主席，心里只有毛泽东思想，一个心眼紧跟毛主席干革命。这样就刀山敢上，火海敢闯，天塌下来也顶得住，什么困难也不怕。"},{"type":"paragraph","text":"永远忠于毛主席，就是要狠斗头脑里的“私”字，彻底挖掉修正主义根子。毛泽东思想是最大的公。“公”和“私”是水火不相容的。只有斗掉了“私”字，才能更好地把反修斗争进行到底，才能把毛泽东思想真正学到手，才能真正大树特树伟大统帅毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威。"},{"type":"paragraph","text":"毛主席教导我们：“世界到了全人类都自觉地改造自己和改造世界的时候，那就是世界的共产主义时代。”人人大树特树伟大统帅毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威，用战无不胜的毛泽东思想自觉地改造主观世界和客观世界，那就是世界进入到了共产主义时代。伟大的历史任务摆在我们的面前。我们坚决以“斗私，批修”为纲，大学大立毛泽东思想，永远紧跟伟大领袖毛主席的战略部署勇猛前进，把全国全军办成红彤彤的毛泽东思想大学校，把战无不胜的、光焰无际的毛泽东思想伟大红旗插遍全世界。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2913c8be1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
