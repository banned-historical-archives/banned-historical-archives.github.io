ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对“七·三”布告的批语","alias":"","parts":[{"type":"paragraph","text":"对“七·三”布告\"的批语"},{"type":"paragraph","text":"（1968年7月）照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]指中共中央、国务院、中央军委、中央文革1968年7月3日布告。布告说，最近两个月来，在广西柳州、桂林、南宁地区，连续发生了一系列反革命事件。中央认为，这是一小阶级敌人破坏无产阶级专政、破坏抗美援越斗争、破坏“无产阶级文化大革命”的反革命罪行。为了迅速予以制正，中央号召广西无产阶级革命派和广大革命群众，在广西革筹小组的领导下，努力实现以下各点：第一，立即停止武斗，拆除工事，撤离据点。首先撤离铁路交通线上的各据点。第二，无条件地迅速恢复柳州铁路局全线的铁路交通运输，停止一切干扰和串连，保证运输畅通。第三，无条件地交回抢去的援越物资。第四，无条件地交回抢去的人民解放军武器装备。第五，一切外地人员和倒流城市的下乡上山青年，应立即返回本地区、本单位。第六，对于确有证据的杀人放火、破坏交通运输、冲击监狱、盗窃国家机密、私设电台等现行反革命分子，必须依法惩办。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":214,"page_end":214},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a09efb0ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
