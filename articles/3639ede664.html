rt":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"荧屏上的叶剑英","authors":["彭山"],"parts":[{"type":"paragraph","text":"大型电视剧《叶剑英》第一部（10集）经过6年的筹备摄制，已在中央电视台播出。由海南省委宣传部、海南影业公司、珠江电影制片公司和中央电视台影视部联合拍摄的这部系列电视剧分为三部，力图较为全面地展示叶剑英同志光辉的一生。"},{"type":"paragraph","text":"叶剑英同志是中国人民解放军的缔造者之一、中华人民共和国开国元勋之一，是党和国家的卓越领导人。在充满艰难险阻的革命道路上，为中国人民的解放事业和社会主义建设事业建立了丰功伟绩。已经完成的第一部，讲述了1922年至1927年叶剑英由一个正直的民主主义者转变为彻底的共产主义者的历程。该剧首次在屏幕上展示了叶剑英元帅驰骋疆场、大智大勇的革命风范。杨成武、黄华等中央老领导及专家们认为，它不仅艺术上具有较高的水平，同时也是一部爱国主义和革命传统教育的好教材。计划中的第二部，重点讲述叶剑英在长征途中的功绩。第三部重点讲述叶剑英与林彪、江青两个反党集团进行的不屈不挠的斗争。"},{"type":"paragraph","text":"编剧范硕、丁家琪，制片人兼导演尹学智，叶剑英由王诗槐扮演。"},{"type":"paragraph","text":"（图为剧中一个镜头）  （彭 山）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3639ede664"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
