ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"在一份关于西德扩军备战的材料上的批语","alias":"","parts":[{"type":"paragraph","text":"在一份关于西德扩军备战的"},{"type":"paragraph","text":"材料上的批语"},{"type":"paragraph","text":"（1960年7月）印发。西德的扩军备战，值得一读。"},{"type":"paragraph","text":"[1]指中国驻瑞士大使馆1960年7月17日给外交部的电报。电报的主要内容是：（一）目前西德政府对外政策的主要动向是加紧扩军备战，加速实现原子武装。对内大肆宣传民族复仇主义，对外加紧同美帝勾结。（二）扩军备战是当前西德一切外交活动的中心内容。（三）在内政方面，加强扩军备战的法律根据。（四）西德加速重新武装，增加了西欧国家的不安和帝国主义国家间的矛盾，特别是英德矛盾和英法矛盾。"},{"type":"paragraph","text":"[2]指印发给当时正在北戴河参加中共中央工作会议的同志。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":455,"page_end":455},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"370da1ae4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
