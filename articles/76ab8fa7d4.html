authors":[],"dates":[{"year":1955,"month":1,"day":29}],"is_range_date":false,"parts":[{"text":"湖南省二十天中死亡耕牛二万二千多头","type":"title"},{"text":"【湖南分社一月二十九日讯】湖南省据六十四个县不完全统计，自去年十二月下旬至今年一月上旬，共死牛二万二千五百六十头。死亡的原因，除寒冷冻缺饲料外。主要是因部分群众对互助合作运动发生误解和疑虑所致。现在各地卖牛、杀牛和不爱护牛的现象比较普遍。如宁远县二区出卖耕牛三百头。攸县九区十一个乡共死牛一百零一头。因为牛肉价高，活牛出卖价低，入社折价更低，有的农民便把死牛的现象称为“好运气”。据检查有的死牛肚中还有铁钉子。(罗厚仁)","type":"paragraph"},{"text":"来源：1955年2月3日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖南省二十天中死亡耕牛二万二千多头","authors":[],"dates":[{"year":1955,"month":1,"day":29}],"is_range_date":false,"parts":[{"text":"湖南省二十天中死亡耕牛二万二千多头","type":"title"},{"text":"【湖南分社一月二十九日讯】湖南省据六十四个县不完全统计，自去年十二月下旬至今年一月上旬，共死牛二万二千五百六十头。死亡的原因，除寒冷冻缺饲料外。主要是因部分群众对互助合作运动发生误解和疑虑所致。现在各地卖牛、杀牛和不爱护牛的现象比较普遍。如宁远县二区出卖耕牛三百头。攸县九区十一个乡共死牛一百零一头。因为牛肉价高，活牛出卖价低，入社折价更低，有的农民便把死牛的现象称为“好运气”。据检查有的死牛肚中还有铁钉子。(罗厚仁)","type":"paragraph"}],"comments":[],"origin":"1955年2月3日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76ab8fa7d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
