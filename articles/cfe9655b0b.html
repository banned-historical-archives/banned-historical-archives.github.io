script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"处处摆战场　揭批“四人帮”五滧公社八大队革命大批判搞得既轰轰烈烈，又扎扎实实","authors":[],"dates":[{"year":1977,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　崇明县五滧公社八大队党支部组织干部和社员采用了多种形式，处处摆开深揭猛批“四人帮”的战场，人人口诛笔伐，个个挥戈上阵，全大队革命大批判搞得既轰轰烈烈，又扎扎实实。"},{"type":"paragraph","text":"揭批“四人帮”斗争开始后，党支部就建立了一支大批判骨干队伍。骨干们学习、批判先走一步，再回到生产队带动群众进行学习、批判。每个生产队都有三至四名骨干。生产队的学习、批判会都做到会前有准备，会上有引导，会后有总结。第七、十二等生产队的社员群众，在骨干的带动和启发下，不顾白天劳累，克服种种困难，连续十几个晚上参加政治夜校活动，有时到深夜十二点钟才回家休息。"},{"type":"paragraph","text":"在揭批“四人帮”的伟大斗争中，这个大队开展了一次群众性的忆苦思甜活动。老贫农黄金妹含着眼泪回忆了自己的丈夫被日寇活活烧死，顷刻家破人亡的悲惨遭遇；大队党支部副书记陈志明回忆几十名阶级兄妹被烧死、杀害，自己的祖母也活活地死在日寇铁蹄下的悲惨情景。青年们听了老贫农的控诉，个个怒火万丈。贫下中农想起旧社会，人人仇恨满腔。他们说:“如果让‘四人帮’的阴谋得逞，帝修反的铁蹄又要践踏我们，过去的历史悲剧又将重演。英明领袖华主席为我们除去‘四害’，避免了一次大灾难。我们一定要紧跟英明领袖华主席，誓与‘四人帮’斗争到底。”"},{"type":"paragraph","text":"为了揭深批透“四人帮”篡党夺权的滔天罪行，这个大队组织理论骨干把“四人帮”的罪状列成十个专题，分别落实到各个生产队，围绕一个一个专题，开展讨论和批判。根据农村的特点和斗争的需要，这个大队党支部组织理论骨干编写了八讲宣讲材料，到各生产队作宣讲辅导。他们把“四人帮”的反动言论收集起来，编写了一份《关于“四人帮”的部分反动言论选批资料》，发给广大干部和社员，抓住“四人帮”篡党夺权的要害，对准黑靶狠狠批。"},{"type":"paragraph","text":"这个大队还充分发挥大批判专栏和黑板报的作用，全大队在大队部、队办工业区和各生产队仓库等地，分别开辟了学习与批判专栏，从揭发批判“四人帮”的斗争开展以来，共出了五十多期。大队还组织几名青年画了四十多幅漫画送到各生产队巡回展出。离大队七十多里远的东望沙垦区的民工没有看到，他们就特地派人把漫画送去展出。此外，这个大队还积极开展群众性的诗歌创作活动，举办赛诗会，运用各种形式深揭猛批“四人帮”。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfe9655b0b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
