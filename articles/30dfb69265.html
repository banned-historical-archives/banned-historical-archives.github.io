script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"医生正当收入不算“剥削”　晋绥河曲正确对待民间医生","authors":[],"dates":[{"year":1948,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"医生正当收入不算“剥削”"},{"type":"paragraph","text":"晋绥河曲正确对待民间医生"},{"type":"paragraph","text":"【新华社兴县十六日电】晋绥解放区河曲县，在上月举行的合作社会议中，提出了一些正确对待民间医生的办法。这些办法包括：（一）医生应看作是脑力劳动者。在土地改革中错订成份的应即改正，没收的东西应即退回或补偿。（二）民间医生不论何种成份，诊病后应一律给予适当的报酬。医生的这种正当收入不能认为“剥削”。凡是参加药铺的医生，可以把替人诊病的劳动来顶股分红。（三）专业医生如家庭缺乏劳动力，其土地应准予出租。但所有医生均应本治病救人的精神，随请随到，不得卖假药及无理向病人勒索。在过去的旧社会中，民间医生存有种种恶习，如出谬非坐轿骑马不到，还未诊病就向人要“开包礼”，甚至乘人病危进行勒索。这种恶习，在河曲民主政府成立后业已逐渐消除。但在这次土地改革中又出现了另一种偏向，即不承认医生是脑力劳动者，而错误地认为医生的诊病收入是“剥削”。有些病人请医生诊病不给报酬或报酬很少。多数医生过去均与药铺订有分红契约、即医生开方指定到某一药铺买药，他与药铺分红。土地改革后，这种制度无形中取消，医生收入减少，生活即感困难。同时，有些原来参加药铺的地主、旧富农成份的医生，其股金、药材亦被没收。而不是地主、旧富农成份的医生，虽经常在药铺“坐柜”诊病，亦不以其诊病的劳动顶股分红，只在药铺结帐时发给少数奖金。有些医生当群众请他们诊病时，则不敢要钱；老年医生亦不敢骑病家来求医出诊的牲口，怕人说“架子大”。这些偏向使许多医生无法继续行医，准备改业，造成农村治病的困难。现在河曲县所提出的正确对待民间医生的办法、就是为着纠正这些偏向，使民间医生能安心行医，发挥所长，以改进农村的卫生状况，克服农民的治病困难。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30dfb69265"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
