],"dates":[{"year":1966,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十九日电　阿尔巴尼亚国家歌舞团今天在访问北京郊区中阿友好人民公社时，同社员们一起热烈欢呼我国又一次核武器爆炸成功。"},{"type":"paragraph","text":"来自反帝反修前线的文艺战友们今天特别兴奋，他们一早就拿着《人民日报》喜报，相互传阅，向中国同志热情祝贺。歌舞团副团长罗·哈多一在中阿友好人民公社激动地对大家说:“中国的无产阶级文化大革命获得巨大胜利，又一次成功地进行了新的核爆炸就是有力证明。这是毛泽东思想的伟大胜利!这是你们的成绩，也是我们、我们的同志和朋友的成绩。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"130d67b987"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
