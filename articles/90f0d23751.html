art":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"电视剧《叶剑英在1946》摄制完成","authors":["任心宇"],"parts":[{"type":"paragraph","text":"电视剧《叶剑英在1946》摄制完成"},{"type":"paragraph","text":"反映老一辈无产阶级革命家叶剑英元帅统战、谈判艺术和外交风采的六集电视连续剧《叶剑英在1946》（原名《军调部和叶委员》），日前完成摄制，即将在中央电视台播出。此剧以抗日战争胜利后的国际国内局势为背景，以北平军调处执行部中共委员叶剑英同国民党和美国代表斗智斗勇，进行停战调处的故事为主线，展现了叶剑英高屋建瓴、气魄恢弘、机智幽默的光辉形象。同时，还塑造了罗瑞卿、李克农、曾生等群体的艺术形象。剧情起伏跌宕，扣人心弦，风格亦庄亦谐，是一部思想性、艺术性、可视性都很强的反映重大革命历史题材的连续剧。此剧主创阵容强，编剧丁家琪、傅保中、赵继烈与黄夫翔联手执导，制片人赖淦才、丁家琪。剧中叶剑英由四川人艺国家一级演员李国华扮演。中央电视台影视部、海南省委宣传部、广东梅州市委市政府、八一电影制片厂、海南电视台等单位联合拍摄。（任心宇）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90f0d23751"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
