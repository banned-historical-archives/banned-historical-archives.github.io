art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"发起驱逐极右反动分子的运动","authors":[],"parts":[{"type":"paragraph","text":"新华社万象一九七五年五月二十七日电 老挝临时民族联合政府各部、局的职工，万象军队中的官兵纷纷起来斗争，驱逐极右反动军政官员。"},{"type":"paragraph","text":"五月二十七日，公共工程和运输部工程局职工和工程学院的学生数百人奋起斗争，要求驱逐公共工程和运输部总局长等一小撮反动分子。同日，国防和退伍军人部的退伍军人局和残废军人中心的职工和军人也起来斗争，要求驱逐退伍军人部总局长等反动分子。"},{"type":"paragraph","text":"在此之前，万象自来水公司二百多名工人于五月二十三日要求驱逐自来水局局长等七名反动官员。五月二十日，司法部一百多名职工发表声明，要求驱逐王宝死党司法部总局长等五名反动官员。"},{"type":"paragraph","text":"此外，教育、艺术和青年、体育部，经济和计划部以及农业局等部门的职工也发起了驱逐反动官员的运动。"},{"type":"paragraph","text":"从五月二十一日至二十六日，万象军队装甲兵的后勤、军需、军械等单位的官兵也纷纷发起抗议运动，要求驱逐一批反动军官。"},{"type":"paragraph","text":"五月二十四日，国防和退伍军人部国务秘书、老挝国家军队总负责人坎温·布法将军会见了发起抗议运动的一些部队和单位的官兵。他号召万象军队的官兵同老挝人民解放军和全国同胞紧密合作，圆满完成祖国交给的历史任务，随时准备粉碎美帝走狗——极右卖国反动派的军事冒险阴谋。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"892592845a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
