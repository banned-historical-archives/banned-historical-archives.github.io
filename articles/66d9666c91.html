ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"八路军致友军九十军书","alias":"","parts":[{"type":"paragraph","text":"八路军致友军九十军书"},{"type":"paragraph","text":"（1940年3月）"},{"type":"paragraph","text":"贵军乃抗日军队，其任务应为抗日，而绝不应是进攻边区。蔽军担任河防，与日寇隔河对战，久面时日，虽无奇功，幸告无过。函愿与贵军团结一致，在蒋委员长领导之下，共歼敌伪，复兴我中华民族，绝不愿与贵军乃任何友军进行内战。盖当此时之时，凡枪口对内者，为民族罪人，国人绝不同情，贵我两军均是明白的。"},{"type":"paragraph","text":"[1]1940年3月，国民党九十军突然在黄河东岸、山西境内的大宁、蒲县一带集中。我军得到的情报证明，对方大军压境，不怀好意，形势非常紧张。毛泽东审时度势，以“八路军河防兵团政治部”的名义起草的《八路军1940年，毛泽东在延安阅读斯大林著作。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":507,"page_end":508},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66d9666c91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
