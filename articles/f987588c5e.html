onth":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无政府主义是一种小资产阶级反动的社会政治思潮，是一种机会主义。无政府主义的创始者是德国的施蒂纳，法国的蒲鲁东，以后俄国的巴枯宁和克鲁泡特金又继承并发展了无政府主义。"},{"type":"paragraph","text":"无政府主义者反对任何形式的政府与国家，反对任何形式的权力。他们认为一切的权力是罪恶，都是“屠杀人类智慧与心灵”的。主张“社会的最高理想，在于秩序与无政府的结合”，主张“服从自然界的法则”，主张“你喜欢怎么做，就怎么做，你怎样想，就怎样想”。无政府主义以抽象的“自由”否认无产阶级专政，主张在一天之内“废除”国家。因此，它的思想实质是在“废除”国家的幌子下，反对无产阶级革命和无产阶级专政，可见它并不是真正不要政府，而是不要无产阶级的政府。无政府主义是马克思主义的敌人。"},{"type":"paragraph","text":"列宁指出，马克思主义同无政府主义在国家问题上是有根本区别的:(一)马克思主义者的目的是完全消灭国家，但认为，只有经过社会主义革命把阶级消灭之后，这个目的才能实现；无政府主义者则希望在一天之内完全消灭国家。(二)马克思主义者认为无产阶级在夺取政权后，必须彻底破坏旧的国家机器，以无产阶级专政代替资产阶级专政；无政府主义者主张破坏一切国家机器，反对无产阶级运用国家政权，反对无产阶级专政。(三)马克思主义者主张在一定条件下，可以利用资产阶级的国家机器进行斗争，为无产阶级革命准备条件；无政府主义者则反对这一点。列宁说过:“无政府主义往往是对工人运动中机会主义罪过的一种惩罚。”因此，我们必须对无政府主义进行彻底批判。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f987588c5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
