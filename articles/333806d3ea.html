<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"cb043827-1a6a-46f3-863d-a430958e5a0d","name":"无产阶级文化大革命参考资料（1966年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"杨成武在首都大专院校红卫兵司令部成立大会上的讲话","alias":"","parts":[{"type":"paragraph","text":"江青同志八月二十七日在首都大专院校红卫兵司合部"},{"type":"paragraph","text":"成立大会上的讲话红卫兵同志们：你们好！"},{"type":"paragraph","text":"我们今天有几个人正在开会，听你们成立司合部。哦！红卫兵司合部，我们就停止会，来庆祝你们（热烈鼓掌）。"},{"type":"paragraph","text":"我们一块儿来的同志都是军队同志，还有公安部长富治同志，我是个人参加你们大会，我相信我们这个小组（指文革小组）是支持你们的，我没有来得及征求他们的意见。"},{"type":"paragraph","text":"红卫兵顾名思义，是兵，是青少年组织，对不对？（对）！"},{"type":"paragraph","text":"我们的人民解放军，是毛主席亲自领导的，战胜帝国主义，反动派一切阶级敌人的军队。我们人民解放军是有优良革命传统的，我相信你们会继承这个传统。"},{"type":"paragraph","text":"最近你们干了许多好事，干得好！目前你们组织起来，联合起来，还要把中学的红卫兵也组织起来，联合起来，这样才能成为一个战斗的部队。"},{"type":"paragraph","text":"我们五个人，就是杨成武同志，刘志坚同志，谢富治同志，汪东兴同志都是军队的，我们建杨成武同志，刘志坚同志做你们的辅导员。"},{"type":"paragraph","text":"我们几个人商量了一下，有些地方需要红卫兵协助人民解放军保卫的，不要被坏分子利用。中南海，大会堂、鱼台、宾馆、公安部、监赋、中共中央军委、国防部、人民解放军尖端科学机要部门（包括文件、档案、邮电大楼、自来水公司、水力、火力发电站、广播电台、外交部门、外国使馆、领事馆····不要进里面去，外面是我们的事情）各种仓康、银行、交通要害、机场、车站，还有通乱枢部门，如电话总机，现在不完全，你们再想想、众人智慧大如天，作为一个建，你们讨讨，下面请杨成武同志给你们讲话。"},{"type":"paragraph","text":"杨成武同志在八月廿七日下午"},{"type":"paragraph","text":"首都大专院校红卫兵司合部上的讲话"},{"type":"paragraph","text":"今天我以极兴奋的心情来参加首都大专院校红卫兵司合部成立大会，同时，今天江青我作你们的辅导真，这是我最大的光荣。同志们，我们和你们年龄差不多就参加了游击队。我们是解放军，你们是红卫兵，千条万条，最主要的一条是听毛主席的话，读毛主席的书，把毛主席的书带在身边，一时一刻不能离，照毛主席指示办事，作毛主席的好战士。"},{"type":"paragraph","text":"红卫兵光荣万岁！毛主席方岁！万方岁！"},{"type":"paragraph","text":"北航71644于振春·120·"}],"authors":["杨成武"],"dates":[{"year":1966,"month":8,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":130,"page_end":130},"tags":[{"name":"江青","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"刘志坚","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"333806d3ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
