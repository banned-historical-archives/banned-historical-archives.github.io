" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发华北军区党委关于军区高干会议情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发华北军区党委关于军区高干会议"},{"type":"paragraph","text":"情况报告的批语"},{"type":"paragraph","text":"（1951年12月21日）军委各部门，各大军区，志愿军："},{"type":"paragraph","text":"兹将华北军区党委会十二月十五日的报告㎡一件发给你们参考，请各大军区和志愿军转发给较多的同志阅看。这个报告写得很好，有事实，有分析，有办法，有结论，有决心，全军都可参照实"},{"type":"paragraph","text":"[1]指中共华北军区委员会1951年12月15日关于军区高千会议情况给毛泽东、军委、总政并华北局的报告。报告在分析华北军区部队中存在的贪污、浪费、官僚主义现象以及产生的原因后指出，为了在军内党内进行一次彻底的思想整顿，并杜绝对国家资财的各种各样的盗窃行为，会议决定从现在起，公开动员，发动群众，大张旗鼓地雷厉风行地开展三反斗争，并为了防止整编中可能发生的贪污浪费现象，应先于整编工作进行。在三反运动的步骤上，先自上而下，层层带头，动员群众，发扬民主，上上下下，互相检查，开展反浪费斗争。然后进入号召坦白、群众检举的反贪污斗争。最后在反浪费反贪污的基础上，检查官僚主义和自由主义。在掌握上，重点抓紧对后勤部门、特种兵部队和机关总务部门生产单位，但亦不放松全体部队爱护武器、爱护国家资财、爱护公共财物的教育和检查，从运动中取得经验，订立制度和群众公约，以巩固成绩，使厉行节约成为群众性的经常任务。会议要求，除军区各部门及特种兵按照华北局规定在12月21日以后作初步检查报告外，廿三兵团及各军、各军区应于12月底，师和团于1月15日以前交初步检查报告。行。报告说：为了防止可能发生的贪污浪费现象，关于大张旗鼓地进行反贪污反浪费反官僚主义的斗争，应先于整编工作去做。他们规定各军区各兵团各军应于十二月底交出一个初步的检查报告。师和团应于一月十五日前交出一个同样的报告。各大军区及志愿军应斟酌自己的情况，规定一个适当的部署。这种部署在西北军区和厂西省军区是已经明白规定了的。"},{"type":"paragraph","text":"毛泽东十二月二十一日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":168,"page_end":169},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49fa330716"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
