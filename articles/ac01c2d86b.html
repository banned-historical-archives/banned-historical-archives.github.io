tart":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东的一幅弃墨","authors":["李树庭"],"parts":[{"type":"paragraph","text":"据权威部门统计，目前国家正式收藏的毛泽东墨迹达两万余件。然而，由于种种原因，毛泽东的许多书法墨迹还散佚在民间。同时，由于他平素挥笔临写练习的墨迹，均按照他的“一律烧掉”的要求被毁。笔者访问的在毛泽东身边工作过的同志透露：毛泽东书房练笔的手迹，随地可见，俯拾皆是。但不经他同意，任何人不得携出片纸只字。这里的一幅墨迹也是按毛泽东的要求应毁弃，但经一位在他身边工作多年的同志的恳求，才答应送给这位同志留作纪念的。这幅墨迹的真迹至今仍珍藏在他的手中。墨迹用8开白宣纸，竖书4行13字，为草书。其内容为唐代诗人王昌龄《边塞》诗“秦时明月汉时关，万里长征人未还”两句，漏书第一句中之“关”字，写于60年代初。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac01c2d86b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
