authors":[],"dates":[{"year":1971,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十日电　由越南劳动党中央委员会第一书记黎笋率领的越南劳动党代表团，从莫斯科乘专机于今天到达北京。"},{"type":"paragraph","text":"代表团团员是，越南劳动党中央委员、中央宣传部副部长、政府文化部副部长何辉甲。"},{"type":"paragraph","text":"前往机场欢迎的有:中共中央政治局常委、国务院总理周恩来，中共中央政治局委员、中国人民解放军总参谋长黄永胜，中共中央政治局委员张春桥、姚文元，中共中央政治局委员、中国人民解放军副总参谋长邱会作，有关方面负责人耿飚、李强、方毅、黄志勇、阎仲川、王希克、韩念龙、刘大煜、谢华、申健、肖簧，以及黄群、刘桂兰、夏郁文等。"},{"type":"paragraph","text":"前往机场欢迎的还有:"},{"type":"paragraph","text":"越南民主共和国驻中国大使吴船和大使馆外交官员；"},{"type":"paragraph","text":"越南南方共和驻中国大使阮文广和大使馆外交官员。"},{"type":"paragraph","text":"苏联驻中国大使馆临时代办萨福隆也到机场迎接。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\05\\715b010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e由越南劳动党中央委员会第一书记黎笋率领的越南劳动党代表团，五月十日乘专机到达北京。中共中央政治局常委、国务院总理周恩来，中共中央政治局委员、中国人民解放军总参谋长黄永胜，中共中央政治局委员张春桥、姚文元，中共中央政治局委员、中国人民解放军副总参谋长邱会作，和有关方面负责人耿飚等前往机场欢迎。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"黄永胜","type":"人物"},{"name":"邱会作","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aee69d255b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
