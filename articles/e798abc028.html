ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"中央转发妇联党组关于当前妇女参加农业生产的情况和存在问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发妇联党组关于当前妇女参加农业生产的情况和存在问题的"},{"type":"paragraph","text":"报告的批语"},{"type":"paragraph","text":"（1952年12月30日）各中央局、分局，并转各省市区党委，地委，县委，各级妇委及妇联党组，并告中央各部门："},{"type":"paragraph","text":"[1]全国妇联党组1952年12月25日关于当前妇女参加农业生产的情况和存在的问题给毛泽东并中央的报告中提出的各项意见，主要是：（一）一些地方出现少数由妇女单独组织的互助组，这不应提倡，也不应强令拆散，而应通过解决互助合作组织中男女同劳同酬同等民主权利后逐渐进到男女共同组织的互助组和农业生产合作社。（二）生产运动中各地涌现出不少妇女劳模，但多不易巩固。今后除对劳模加强教育外，更重要的是使劳模专业化，发挥特长，减少兼职，少参加一般性会议与活动，并注意多培养集体模范。（三）妇女在互助合作组织中得不到同劳同酬，没有平等的民主权利。解决妇女这一问题的最合理办法，是在制度上按农业季节生产之缓急，劳动之轻重巧笨，田地好坏远近，将不同劳动分别定出在一定时间内生产的标准数量与质量及标准工分，不论男女，做到什么程度得到什么报酬。还要建立民主生活制度，批评轻视妇女的封建观点。（四）妇女参加农业生产和家务劳动的矛盾也应加以解决。（五）用农村组织起来后劳动力有剩余的论调，来限制妇女参加农业生产，降低了妇女的生产积极性。农村剩余劳动力，应通过投入精耕细作，兴修水利，发展果园和其他副业等来解决。毛泽东全集第三十二卷"},{"type":"paragraph","text":"全国妇联党组在其关于当前妇女参加农业生产的情况和存在的问题的报告中所提各项意见，中央认为是正确的，应予批准，并在全国农村中予以施行。除在党刊上发表外，还应印成小册子发到农村中去。"},{"type":"paragraph","text":"中央一九五二年十二月卅日"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":12,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":405,"page_end":406},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e798abc028"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
