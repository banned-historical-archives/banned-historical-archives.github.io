965,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"倪志亮同志在京病逝"},{"type":"paragraph","text":"新华社十六日讯　中国人民解放军原武装力量监察部副部长、中国人民政治协商会议第四届全国委员会委员倪志亮同志，因长期患病医治无效，不幸于一九六五年十二月十五日二十时四十分在北京逝世，享年六十五岁。"},{"type":"paragraph","text":"倪志亮同志一九二六年十月参加中国共产党，一九二八年十月参加中国工农红军。历任中国工农红军支队长、团长、师长、军长、第四方面军参谋长、后勤部长、纵队司令员，八路军一二九师参谋长、省军区司令员、军政大学副校长、武汉警备副司令员、中华人民共和国驻朝鲜民主主义人民共和国大使、中国人民解放军后勤学院副教育长、中国人民解放军武装力量监察部副部长等职务。"},{"type":"paragraph","text":"倪志亮同志治丧委员会已于十二月十六日由邓小平、刘伯承、李先念、徐向前、叶剑英、谢富治等四十七位同志组成，并定于十二月十九日上午十时举行公祭。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1965,"month":12,"day":17}],"page_start":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"倪志亮同志在京病逝","authors":[],"parts":[{"type":"paragraph","text":"本报讯 中国人民解放军原武装力量监察部副部长、中国人民政治协商会议第四届全国委员会委员倪志亮同志，因长期患病医治无效，不幸于一九六五年十二月十五日二十时四十分在北京逝世，享年六十五岁。"},{"type":"paragraph","text":"倪志亮同志一九二六年十月参加中国共产党，一九二八年十月参加中国工农红军。历任中国工农红军支队长、团长、师长、军长、第四方面军参谋长、后勤部长、纵队司令员，八路军一二九师参谋长、省军区司令员、军政大学副校长、武汉警备副司令员、中华人民共和国驻朝鲜民主主义人民共和国大使、中国人民解放军后勤学院副教育长、中国人民解放军武装力量监察部副部长等职务。"},{"type":"paragraph","text":"倪志亮同志治丧委员会已于十二月十六日由邓小平、刘伯承、李先念、徐向前、叶剑英、谢富治等同志组成，并定于十二月十九日上午十时举行公祭。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e1bd58455"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
