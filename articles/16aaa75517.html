script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"共产党员要站在阶级斗争的最前列 ——彻底批判中国赫鲁晓夫的修正主义建党路线","authors":[],"dates":[{"year":1967,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:毛主席教导我们:“共产党员的先锋作用和模范作用是十分重要的。”最近，本报邀请了本市一部份先进工作者，就如何发挥共产党员的先锋作用和模范作用的问题，联系他们在无产阶级文化大革命前后的切身感受，对中国赫鲁晓夫修正主义建党路线开展了一次深入的批判。他们共同的体会和最深刻的教训是:一个共产党员要永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席的革命路线，就必须积极投身到火热的阶级斗争中去，投身到革命的群众运动中去，经风雨，见世面，才能真正发挥共产党员的先锋作用和模范作用。如果按照中国赫鲁晓夫及其同伙所鼓吹的那一套反动的“驯服工具论”去修养，就必然蜕变成没有政治头脑的鼠目寸光的政治庸人，其结果只能成为驯服于中国赫鲁晓夫复辟资本主义的工具。"},{"type":"paragraph","text":"在这次史无前例的无产阶级文化大革命中，一大批不知名的革命小将和无产阶级革命派挺身而出，旗帜鲜明地捍卫了毛主席的革命路线。他们中许多人虽然现在还不是共产党员，但实际上起着共产党员的先锋作用和模范作用。这是很值得我们每个共产党员学习和深思的。现在无产阶级文化大革命正在逐步深入，新的战斗任务又提到我们面前，每个共产党员和革命群众都将继续经受着阶级斗争和两条路线斗争的考验。我们一定要紧跟毛主席的伟大战略部署，以“斗私，批修”为纲，积极投身到正在蓬勃开展的批判中国赫鲁晓夫修正主义建党路线的新高潮中去，争取当一个永远忠于毛主席的好党员。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16aaa75517"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
