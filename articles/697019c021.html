" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-111","name":"中共山西省委组织部关于下放部分干部更改参加革命工作时间审批权限的通知","author":"中共山西省委组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共山西省委组织部关于下放部分干部更改参加革命工作时间审批权限的通知","dates":[{"year":1984,"month":7,"day":31}],"is_range_date":false,"authors":["中共山西省委组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 39-40","tags":[{"name":"革命工作","type":"主题/事件"},{"name":"决死队","type":"主题/事件"},{"name":"山西","type":"主题/事件"},{"name":"牺盟会","type":"主题/事件"}],"parts":[{"type":"title","text":"中共山西省委组织部关于下放部分干部更改参加革命工作时间审批权限的通知"},{"type":"paragraph","text":"晋组字〔1984〕54号"},{"type":"paragraph","text":"根据〔79〕组通字55号、中组发〔1982〕11号有关更改参加革命工作时间审批权限的规定和晋发〔1983〕52号文件“关于改变干部管理权限的通知”，决定对部分干部更改参加革命工作时间的审批权限下放给各地、市和省直各单位审批，现将更改参加革命工作时间的审批权限通知如下："},{"type":"paragraph","text":"一、按照〔79〕组通字55号文件精神，确定山西“牺盟会”和“决死队”人员参加革命工作时间和军龄的，不论现在担任何职，需报省委组织部审批。"},{"type":"paragraph","text":"二、按照中组发〔1982〕11号文件的规定，确定建国前干部参加革命工作时间的，必须由县或县以上单位的组织，人事部门审议，报党委审批。"},{"type":"paragraph","text":"1、凡晋发〔1983〕52号文件确定省委管理的干部和参加革命工作时间更改到一九三七年七月六日以前的，需报省委组织部审批。"},{"type":"paragraph","text":"2、凡晋发〔1983〕52号文件确定下放给各地、市管理的干部，即地、市的部、委、局一级，县委副书记、副县长、县人大主任、县政协主席和下放给省直各部、委、办、厅、局管理的处一级干部的更改参加革命工作时间，需报各地、市委和省直各部、委、办、厅、局党组（党委）审批，凡参加革命工作时间更改到一九四五年九月二日以前的也需报各地、市委和省直各部、委、办、厅、局党组（党委）审批。"},{"type":"paragraph","text":"一九八四年七月三十日"}],"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"697019c021"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
