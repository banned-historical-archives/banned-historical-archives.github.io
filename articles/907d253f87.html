es":[{"year":1963,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京7日电】　印度尼西亚共产党中央委员会主席迪·努·艾地同志和由他率领的印度尼西亚共产党代表团全体同志，今天上午乘专机离开北京前往朝鲜民主主义人民共和国进行访问。"},{"type":"paragraph","text":"到机场送行的，有中共中央总书记邓小平，中共中央政治局委员、中央书记处书记彭真，中共中央委员刘宁一。"},{"type":"paragraph","text":"朝鲜驻中国大使馆临时代办郑风珪，印度尼西亚驻中国大使馆一等秘书法达宛，也去机场送行。"},{"type":"paragraph","text":"【新华社北京7日电】　由印度尼西亚共和国合作国会副议长、印度尼西亚共产党中央委员会第一副主席鲁克曼率领的印度尼西亚共和国合作国会代表团，今天上午乘专机离开北京前往朝鲜民主主义人民共和国进行友好访问。"},{"type":"paragraph","text":"人大常委会副委员长、中共中央政治局委员、中央书记处书记彭真，人大常委会委员张苏、蔡廷锴、史良、胡愈之、武新宇，中共中央委员伍修权，外交部副部长黄镇，人大常委会副秘书长余心清、连贯、赵伯平等到机场热烈欢送印度尼西亚朋友。"},{"type":"paragraph","text":"到机场欢送的，还有朝鲜驻中国大使馆临时代办郑风珪，印度尼西亚驻中国大使馆一等秘书法达宛。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"907d253f87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
