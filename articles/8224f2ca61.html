个友好国家，我们相互帮助，相互支持。我们的目标是一个：反对帝国主义","authors":[],"dates":[{"year":1961,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见古巴文化代表团"},{"type":"paragraph","text":"祝古巴人民反对美国侵略的斗争取得胜利"},{"type":"paragraph","text":"中国和古巴是两个友好国家，我们相互帮助，相互支持。我们的目标是一个：反对帝国主义"},{"type":"paragraph","text":"新华社南昌20日电　毛泽东主席19日晚接见了以古巴教育部长阿曼多·阿特·达瓦洛斯为首的古巴文化代表团全体团员，同他们进行了长时间的亲切的谈话。毛主席向古巴朋友们说：中国和古巴是两个友好的国家，我们相互帮助，相互支持。我们的目标是一个：反对帝国主义。美国帝国主义是帝国主义中最大的一个，它不但压迫我们，也压迫你们。它压迫全世界人民。在一些不是帝国主义的国家中，都有一些帝国主义的走狗。我们不但要反对帝国主义，也要反对帝国主义的走狗。"},{"type":"paragraph","text":"毛主席最后在送别古巴朋友的时候，特别嘱托他们向古巴人民的领袖菲德尔·卡斯特罗总理致以亲切的问候，并祝古巴人民在反对美国帝国主义侵略的斗争中取得胜利。"},{"type":"paragraph","text":"接见时在座的有江西省省长邵式平，中国拉丁美洲友好协会会长楚图南，对外文化联络委员会秘书长陈忠经。（附图片）"},{"type":"paragraph","text":"毛泽东主席和阿曼多·阿特·达瓦洛斯团长亲切握手　新华社记者　吕厚民摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8224f2ca61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
