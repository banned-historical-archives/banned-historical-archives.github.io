ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"致周恩来电","alias":"","parts":[{"type":"paragraph","text":"致周恩来电！"},{"type":"paragraph","text":"（1941年6月17日）"},{"type":"paragraph","text":"你的一文一信，《大公报》的复文（《大公报》此文很有意思，很可注意）都看了，你的信与文均在《解放日报》发表并广播，那封信写得很好。依你观察，此刻是否到了蒋转弯的时机，可否找张季鸾、王芸生开一次谈判。向他们申明只要不妥协不反共，我们是拥蒋（所谓国家中心）到底的，否则是蒋拒绝人家拥他，解散新四军，对八路不发饷弹，公开的普遍的反共言论与反共行动，叫人如何拥法？问他们有无改善国共关系的办法。"},{"type":"paragraph","text":"[1]这是毛泽东致周恩来电的主要内容。"},{"type":"paragraph","text":"[2]“一文”，指周恩来为1941年5月25日《新华日报》撰写的代论《论目前战局》，同年6月14日《解放日报》转载了这篇代论。“一信”，指周恩来1941年5月21日写给张季鸾（重庆《大公报》总编辑）、王芸生（重庆《大公报》主笔）的致《大公报》的信，这封信在同年5月23日《大公报》发表，6月13日《解放日报》作为代论转载。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":6,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":140,"page_end":140},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a25d27e33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
