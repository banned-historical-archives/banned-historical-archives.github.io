script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"服务行业也要批判资产阶级","authors":[],"dates":[{"year":1966,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"服务行业也要批判资产阶级"},{"type":"paragraph","text":"毛主席号召全国各行各业都要批判资产阶级。庆阳县饮食业服务员王巧凤这一段经历最有力地证明，商业和服务性行业里同样存在着阶级斗争。要把商业和服务行业办成社会主义的全心全意为人民服务的行业，就必须批判资产阶级。"},{"type":"paragraph","text":"在王巧凤工作的食堂里，一部分人不为广大劳动人民服务，而热心于为极少数剥削阶级分子服务。他们考虑的是怎样才能赚钱，根本不考虑如何最大限度地满足大多数顾客的需要；甚至弄虚作假，欺骗顾客。这是资本主义经营思想，同全心全意为人民服务的思想是完全对立的。"},{"type":"paragraph","text":"毛主席说：“正确的东西总是在同错误的东西作斗争的过程中发展起来的。”对于从事商业、服务行业的人来说，只有彻底批判资产阶级思想，才能促进人的思想革命化和企业的革命化。不破资本主义经营思想，社会主义的经营思想就立不起来。"},{"type":"paragraph","text":"批判资产阶级，是一场严重的阶级斗争。要取得斗争的胜利，广大革命职工必须牢牢地掌握好毛泽东思想这一锐利的武器。王巧凤在斗争中曾经遇到了重重困难，是毛主席著作使她懂得了阶级斗争，懂得了对资产阶级必须批判；是毛泽东思想给了她最大的勇敢，使她不怕任何挫折，敢于造资产阶级的反。在她的带动下，食堂多数职工也认清了大是大非，都积极参加了批判资产阶级的斗争。"},{"type":"paragraph","text":"王巧凤在批判资产阶级的斗争中，观察问题最锐敏，斗争精神最坚韧，不愧为活学活用毛主席著作的好榜样，值得所有革命职工学习。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a9e682c4a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
