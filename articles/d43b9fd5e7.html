界的矛盾产物","authors":[],"dates":[{"year":1959,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社莫斯科27日电】　参加社会主义国家造型艺术展览会的各国美术家和评论家，对展览会展出的作品进行了3天友谊的讨论。讨论会已于26日结束。"},{"type":"paragraph","text":"这次有将近500名美术家和艺术评论家参加的讨论会是在24日开始的。出席会议的中国代表是蔡若虹和王朝闻。各国代表在会上就“社会主义艺术与现实生活”进行了踊跃的发言。许多代表在发言中都指出，近年来社会主义各国的造型艺术获得了很大成绩。这是因为美术家和人民和实际生活有着密切的联系，而劳动人民和实际生活是创作取之不尽的活的泉源。社会主义国家造型艺术展览会说明了社会主义各国美术家是团结一致的。一些代表在发言中对展览会中的个别作品提出了建设性的意见。"},{"type":"paragraph","text":"在讨论中也涉及到了社会主义美术要不要抽象派的问题。大家在发言中提出了否定答复。他们一致认为，抽象派是资产阶级世界矛盾的产物和过了时的残余，它只会使人们倒向神秘主义的迷途。"},{"type":"paragraph","text":"在谈到继承文化遗产的问题时，罗马尼亚艺术学家波佩斯库说，不能忘记列宁关于每一个资产阶级的民族中有两种文化的理论，遗忘了这一理论就会导致对艺术要有人民性和党性原则的修正。"},{"type":"paragraph","text":"最后，苏联美术家协会领导人格拉西莫夫在总结了会议讨论成果之后，预祝各国美术家在创作中取得更大的成就。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d43b9fd5e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
