<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山帅——毛泽东在井冈山　9　巧计分兵","authors":["吴振录","邱恒聪"],"dates":[{"year":1992,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吴振录　邱恒聪"},{"type":"paragraph","text":"天未晓，工农革命军就从砻市出发了。浩浩荡荡的队伍沿着井冈山麓的西侧，向南开进。去掉了拉拉杂杂的抬伤病号的担架队，又经过砻市的休整，部队的面貌一新，各营各连都打出了自己的旗帜，晨雾中，红旗猎猎，煞是壮观。"},{"type":"paragraph","text":"可欢乐的气氛没有保持多长时间，袁文才派人传信前方已有强敌固城坚守，毛泽东和工农革命军的几个头头召开紧急会议商定改走水口。"},{"type":"paragraph","text":"毛泽东站起来决断地说:“我们这次南进，主要是游击。原来的部署变一变，前卫营一营变后卫，后卫营三营变前卫，特务连派一个排警戒。其他人马，明天一早出发。”"},{"type":"paragraph","text":"水口是井冈山西南脚下的一个小镇，镇不大，却位于两省三县的交界处。一条不太宽的河把镇子分为两处。这里东北背靠江西的井冈山，西南面向湖南的湘南。毛泽东站在木桥上，望着从山里流出的一泓秋水，明白了袁文才让捎信人向他建议朝水口转移的用意。"},{"type":"paragraph","text":"工农革命军刚到水口，罗定就想占领水口。工农革命军指挥部里，当敌情一汇报完，参加紧急军事会议的前委和营团干部，象炸了锅一样嚷起来:“非与他们干一仗不可!”"},{"type":"paragraph","text":"毛泽东站着猛抽着烟，想出了巧计分兵的一步，让一营绕道安仁向茶陵打罗定的后围。可是决定做出以后，不少人心里仍不踏实，布置了第二天照常做宣传群众的工作，许多人都捏着把汗，怕万一一营扑空，万一罗定也来个将计就计，乘虚扑来，水口这点人马将更难应付……"},{"type":"paragraph","text":"参谋徐恕一夜没敢合眼。陈浩率一营出发了，使他感到有点孤单。"},{"type":"paragraph","text":"一夜间，徐恕几次去查哨，几次站到桥头上向西北观望，几次走到毛泽东住房的窗边。他见毛泽东在灯下忙着写什么，便没有进去。启明星升上一丈多高时，毛泽东房间的灯光才熄灭。他才回到自己房间，还没有睡着。一个战士进来说，“报告参谋长，曾连长让向你报告，敌人夜里三四时开始集合人马。”"},{"type":"paragraph","text":"“怎么搞的，天快亮了，才让你来报告，误了事还要脑袋不?”"},{"type":"paragraph","text":"侦察兵离去，徐恕急急忙忙奔到毛泽东的窗下:“毛委员，毛委员!”边喊边走进了毛泽东的房里:“敌人夜里三四时都集合啦!”"},{"type":"paragraph","text":"“是向我们这里攻来了吗?”毛泽东翻身坐起来问。"},{"type":"paragraph","text":"“还不清楚，”徐恕说，“我们怎么办?”"},{"type":"paragraph","text":"毛泽东有点不耐烦地说:“你去把情况搞清楚，再来告我。”说完，又躺下了。"},{"type":"paragraph","text":"徐恕老大不满，回到团部只好派人又去打探情况。"},{"type":"paragraph","text":"天色转亮后，曾士峨带着他的侦察兵回来了，他们来到毛泽东的住处，一推门，便嚷，“毛委员，毛委员，罗定退兵啦。”"},{"type":"paragraph","text":"毛泽东翻了个身，一眼看到曾士峨，便坐起来，问:“曾连长回来啦?”"},{"type":"paragraph","text":"“报告毛委员，”曾士峨敬礼，说，“按你的指示，我们监视到拂晓，罗定走到半路上，果然往回滚蛋了。”"},{"type":"paragraph","text":"毛泽东又闻讯，右路军昨夜乘虚攻入茶陵，砸了监狱，放火烧了衙门。闻罗定回返，已撤离县城，根据前委决定，到茶陵，安仁一带开展游击活动。"},{"type":"paragraph","text":"右路军的胜利，大大鼓舞了左路。"},{"type":"paragraph","text":"第二天一早，工农革命军的左路在毛泽东亲自率领下，从水口出发，三营为前卫，团部和一营一连居中，毛泽东跟着特务连殿后，沿井冈山南麓向西开进。"},{"type":"paragraph","text":"罗霄山脉沿湘赣边由北而南重峦叠嶂，蜿蜒起伏，到了这中段，山势陡起，群峰争险，密林竞奇，崖头山涧，时常飘着，涌着，腾着层层云雾，真象跃人九霄云汉一样。从这里往南，山势变缓，梯次下降，渐渐溶入一片丘陵之中。"},{"type":"paragraph","text":"毛泽东随着部队走在山半腰的小径上。他的脚伤敷了膏药，虽有好转但未痊愈，走起路来仍然跛着。可他没有骑马，也没有让用滑竿抬，他坚持同士兵们一起步行。走在山林之间，他胸中荡起一派那山那云一样的豪情。"},{"type":"paragraph","text":"这里能使他和他的军队大有用武之地，这里通向一个他所憧憬的新世界，一幅比这山更雄伟，更壮阔的蓝图在他眼前展开……"},{"type":"paragraph","text":"可是连续的奔波，毛泽东的脚伤越来越严重。夜里，毛泽东感到身上阵阵发冷，么六扶他上床时，一摸他的前额，惊讶嚷道:"},{"type":"paragraph","text":"“哎呀，毛委员，好烫哟!”"},{"type":"paragraph","text":"\u003cIMG alt=请插入9号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1992\\07\\927p071101.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aeac87a29c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
