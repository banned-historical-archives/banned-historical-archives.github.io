ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"张云逸可率两三个营过江活动","alias":"","parts":[{"type":"paragraph","text":"张云逸可率两三个营过江活动！！"},{"type":"paragraph","text":"（1938年11月10日）项，并转周、叶："},{"type":"paragraph","text":"一、白崇禧已允新四军张云逸?同志率一个营到长江以北安徽境内活动，已否派去？"},{"type":"paragraph","text":"二、现在安徽中部最便利我军活动，新四军可否派二个至三个营交张云逸同志率领过江。"},{"type":"paragraph","text":"三、四支队及八团队的经费以后归何处发给，如何转交他们，归何处指挥，与中原局?关系如何。"},{"type":"paragraph","text":"以上均望电复。"},{"type":"paragraph","text":"毛王胡"},{"type":"paragraph","text":"十日"},{"type":"paragraph","text":"[1]这是毛泽东和中共中央军委副主席王稼祥、胡服（刘少奇）给中共中央军委新四军分会书记、新四军副军长项英的电报。"},{"type":"paragraph","text":"[2]周、叶，指周恩来和中共中央长江局委员叶剑英。[3]白崇禧，当时任国民党政府军事委员会副参谋总长。[4]张云逸，当时任新四军参谋长兼第三支队司令员。[5]中共中央中原局于1938年11月9日组成，刘少奇为书记。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":11,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":58,"page_end":58},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"094b7f2c1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
