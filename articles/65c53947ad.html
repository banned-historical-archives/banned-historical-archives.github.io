art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用伟大的毛泽东思想统帅自己的一切","authors":["炮兵第二次学习毛主席著作积极分子代表大会代表/沈阳部队炮兵某部副政指？一等功","王克京"],"parts":[{"type":"paragraph","text":"一轮红日面前升，“万岁”呼声似雷鸣，千股暖流传遍身，万道红光映红心。"},{"type":"paragraph","text":"敬爱的毛主席啊！每当我看到您老人家伟大的崇高形象，就有最大的勇敢和战斗力，千难万险无阻挡。每当我想起您老人家的伟大教导，就感到前进有方向，刀山火海都敢闯！"},{"type":"paragraph","text":"在一次执行任务中，我身负重伤，昏倒在地上。同志们把我从休克状态中救醒过来，当我第一眼看到同志们身上佩带的金光闪闪的毛主席像章时，我用尽全身力气，轻轻地喊着：“毛主席万岁！毛主席万万岁！”我以最大的力气唱完了《东方红》、《大海航行靠舵手》。"},{"type":"paragraph","text":"以后，在医院里，党和人民为了抢救我的生命，先后组织力量给我动了四次大手术、三次小手术。当医生动手术的时候，我一次又一次地背诵您老人家的教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”我没叫一声苦，没喊一声疼。毛主席啊，毛主席！是您老人家的光辉思想，使我获得了第二次生命。"},{"type":"paragraph","text":"敬爱的毛主席啊！今天我站在您的身旁，再一次地向您宣誓：头可断，血可流，您的伟大思想决不丢；海可枯，石可烂，忠于您的一颗红心永不变！我要用您的伟大思想统帅自己的一切，用对您的无限忠心来统帅自己的生命，在夺取无产阶级文化大革命全面胜利的伟大事业中，为人民立新功！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65c53947ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
