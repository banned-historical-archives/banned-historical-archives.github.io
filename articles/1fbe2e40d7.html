同志等前往机场迎接","authors":[],"dates":[{"year":1972,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"前往乌兰巴托参加扎·桑布主席葬礼途中"},{"type":"paragraph","text":"黄文欢同志率越党政代表团到京"},{"type":"paragraph","text":"张春桥韩念龙同志等前往机场迎接"},{"type":"paragraph","text":"新华社一九七二年五月二十三日讯  由越南劳动党中央政治局委员、越南民主共和国国会常务委员会副主席黄文欢率领的越南民主共和国党和国家代表团，在前往乌兰巴托参加蒙古人民共和国大人民呼拉尔主席团主席扎木斯朗·桑布葬礼途中，今天下午乘专机到达北京，并在机场作短暂停留。"},{"type":"paragraph","text":"中共中央政治局委员张春桥，外交部副部长韩念龙，中共中央对外联络部负责人申健，外交部亚洲司副司长梁枫、礼宾司副司长朱传贤等，前往机场迎接。"},{"type":"paragraph","text":"前往机场迎接的还有："},{"type":"paragraph","text":"越南民主共和国驻中国大使吴船和大使馆外交官员；"},{"type":"paragraph","text":"越南南方共和驻中国大使阮文广和大使馆外交官员；"},{"type":"paragraph","text":"蒙古人民共和国驻中国大使索苏尔巴拉姆和大使馆外交官员。"},{"type":"paragraph","text":"张春桥同志在机场设便宴招待黄文欢等越南同志。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fbe2e40d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
