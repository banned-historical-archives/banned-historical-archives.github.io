art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热爱毛主席忠心卫长空","authors":["海军航空兵一等功陈武录王顺义"],"parts":[{"type":"paragraph","text":"一九六八年三月七日，我们见到了中国人民和世界革命人民最伟大的导师、我们心中最红的红太阳毛主席。"},{"type":"paragraph","text":"最最敬爱的毛主席！有您老人家掌舵，有您的光辉思想导航，我们刀山敢上，火海敢闯。"},{"type":"paragraph","text":"今年二月十四日，我们一举击落击伤入侵的美帝国主义，A—1H型舰载攻击机各一架，这是战无不胜的毛泽东思想的胜利。当我们一跨进座舱看到了毛主席像，就好象毛主席亲自在我们身旁指挥我们战斗，给我们增添了无穷无尽的力量。刚一起飞，指挥所传来了“全力以赴，务歼入侵之敌”的最高命令，给我们增添了完成任务的最大的信心和勇气。当我们发现万恶的美国强盗飞机时，恨不得一口把它吃掉。尽管当时气象复杂，我们怀着对毛主席的无限忠诚，紧紧咬住敌机不放，一直到离敌机很近、确实有把握打掉时，才狠狠地按下电钮，一发发带着仇恨的炮弹击中了敌机，取得了空战的胜利。"},{"type":"paragraph","text":"最最敬爱的毛主席，我们对您永远心怀一个“忠”字，对您的光辉思想永远狠抓一个“用”字。我们决心学习、宣传、落实您的伟大“三·七”指示和一系列最新指示，紧跟您的伟大战略部署，在夺取无产阶级文化大革命全面胜利中，为人民立新功，建新劳。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fd63ed6c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
