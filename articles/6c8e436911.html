art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大资产阶级·买办资产阶级·官僚资产阶级田辑","authors":[],"parts":[{"type":"paragraph","text":"问：在控诉教育中，学习毛主席关于美蒋反动派阶级本质的论述，经常碰到“大资产阶级”、“买办资产阶级”和“官僚资产阶级”这三个名词，它们都是指怎样的一个阶级说的呢？"},{"type":"paragraph","text":"答：大资产阶级在一般的资本主义国家里，是资产阶级的一个阶层，是指集中着大量财富、经营着大规模工、商、金融业的资本家们，他们在资本主义社会中起决定作用。他们剥削广大劳动人民，经常消灭着小生产者的私有财产，并依靠资本主义所固有的资本的积聚和集中，剥削较小的资本家。到了帝国主义时代，大资产阶级成为垄断资产阶级，就是金融寡头。在殖民地半殖民地国家中的大资产阶级。则是买办资产阶级或官僚资产阶级。"},{"type":"paragraph","text":"买办资产阶级，也叫买办阶级。是殖民地半殖民地国家中，处于外国资本和本国市场之间的中介资本家。在殖民地半殖民地国家里，有一批靠帝国主义发财的人，他们在帝国主义的银行、商号中服务，给帝国主义跑腿，帮助帝国主义剥削本国人民，自己从中取得好处。他们发了财后，自己也开铺子，办商行，甚至也建立工厂，表面上是用的本国人民的字号，实际上由帝国主义做后台老板，听从帝国主义的命令办事，他们的资本其实只是帝国主义老板资本中的一部分。这些人也叫买办资产阶级，他们的资本叫做买办资本。买办资产阶级是直接为帝国主义国家的资本家服务并为他们所豢养的阶级。因此，他们在政治上便也不能不投靠帝国主义。这个在国外和本国的封建势力也有着千丝万缕的联系。它是人民革命的对象。在有些国家，加半封建半殖民地的旧中国，买办资产阶级靠了帝国主义的支持，又发展成为官僚资产阶级。"},{"type":"paragraph","text":"官僚资产阶级，是殖民地半殖民地国家里霸占了国家政权的买办资产阶级，以旧中国的“四大家族”为最典型。在国民党统治中国时期，蒋、宋、孔、陈四大家族，一方面依靠封建地主阶级，一方面依靠帝国主义，霸占了国家政权。他们把全国最大的银行，最主要的工业、矿业、大商业等都标上“国家”的名义，成为他们的私产。买办资本在垄断了全国的经济命脉、与国家政权结合在一起以后，成为国家垄断资本主义。毛主席说：“这个垄断资本主义，同外国帝国主义、本国地主阶级和旧式富农密切地结合着，成为买办的封建的国家垄断资本主义。……这个资产阶级，叫做官僚资产阶级。”"},{"type":"paragraph","text":"大资产阶级、买办资产阶级和官僚资产阶级，在旧中国是指的同一个极端反动的反革命阶级，蒋介石便是这个阶级的代表。（田 辑）"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c8e436911"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
