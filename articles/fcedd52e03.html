" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"关于建立青年生产队问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于建立青年生产队问题的批语！！"},{"type":"paragraph","text":"（1956年1月28日）不要普遍建立单独的青年生产队。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿八日"},{"type":"paragraph","text":"[1]这个批语写在中共中央书记处第四办公室1956年1月25日关于团中央准备在全国农村推广青年生产队问题给邓小平的报告上。报告说，经过征询有关同志的意见和初步研究，觉得青年生产队的形式在试办过程中确有一些积极作用，但在发展当中，也发现了一些值得注意的问题，主要是有些地方提出青年生产队的队员都要身强力壮、思想进步的，这样办就会使得强劳力和积极分子过分集中，影响到合作社内整个劳动组织的合理调配和其他队的生产。目前普遍建立青年生产队，条件和经验都不成熟。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":202,"page_end":202},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcedd52e03"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
