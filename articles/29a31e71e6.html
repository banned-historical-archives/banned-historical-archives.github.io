uthors":[],"dates":[{"year":1978,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　儿童艺术剧院创作演出的七幕话剧《童心》，在本市话剧汇演中受到广大观众的好评，特别在教育界引起很大反响。日前，市文化局邀请大、中、小学的部分教师座谈，对这个戏展开了热烈讨论。"},{"type":"paragraph","text":"参加座谈会的有上海师范大学教授周绍慈、堵南山、颜季琼、教师李振潼，上海师范学院教授褚圻、教师高瑾南，华东师大二附中教师徐竹君、徐荣华，上海市实验小学教师单成华、殷国芳、李小琳等。老、中、青三代教师聚集一坐，联系自己的切身感受，畅谈体会，一致认为:这是一出反映教育战线与“四人帮”斗争的好戏。这个戏表达了广大知识分子和人民群众对“四人帮”推行愚民政策、制造“文盲加流氓”的有力谴责，看后使我们更加痛恨“四人帮”，激励我们象童心老师那样，挑起教育重担，使青少年们增长才干，在新的长征途中为国家多作贡献。教师们说:《童心》这个戏虽然写的是一幢小楼房里发生的事情，但通过老教师童心的事迹和在“四人帮”疯狂迫害下受到的悲惨遭遇，以及小黑皮、顾阿祥、赵小鹰、林小刚、蓉蓉等几个同学所受到的“四人帮”的毒害和摧残，把“四人帮”对我们党和国家的危害作了无情的揭露。但戏没有停留在一般的揭露上，而是通过童心老师的形象，写出了人心不可侮，人心是向着真理、向着党，是永远夺不走的这样一个真理。虽然戏里童心被“四人帮”抓走了，但这个戏不是使人看了悲观泄气，而是激发人们对“四人帮”的义愤，给人以追求革命真理的力量。"},{"type":"paragraph","text":"教师们还高兴地说:今年《人民文学》发表了反映教育战线的短篇小说《班主任》，使广大教师很受鼓舞。现在看到《童心》这样一个歌颂人民教师的戏，更加振奋。这个戏生活气息浓郁，没有“四人帮”的帮风帮气，在创作和表演上也跳出了俗套，它忠实于现实生活，没有矫揉造作，尽管在剧情的发展中没有大的波澜，但仍然感人至深。戏的结尾也给人回味。"},{"type":"paragraph","text":"座谈中，教师们还热诚地对这个戏提出了一些意见和建议。例如童心老师为什么能在退休以后仍然不顾“四人帮”的迫害，用自己的全部心血去教育孩子，思想深度尚表现不够。在表演上不大象中学教师，而象大学教授。剧中科研人员王茂森从事生物学研究，但在语言和表演上都象个数学家。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\06\\786O020501.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e话剧《童心》中的一个镜头:被“四人帮”强令退休的老教师童心，为了抢救被“四人帮”愚民政策毒害的孩子们，在自己家里开办了“补习班”。"},{"type":"paragraph","text":"本报记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29a31e71e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
