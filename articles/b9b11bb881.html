script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"秘共《红旗报》盛赞中国是支持各国革命的根据地  中共是世界革命的无产阶级突击队  帝国主义、反动分子和修正主义者一切反华阴谋必遭失败","authors":[],"dates":[{"year":1966,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"秘共《红旗报》盛赞中国是支持各国革命的根据地"},{"type":"paragraph","text":"中共是世界革命的无产阶级突击队"},{"type":"paragraph","text":"帝国主义、反动分子和修正主义者一切反华阴谋必遭失败"},{"type":"paragraph","text":"新华社三十日讯  利马消息：秘鲁共产党机关报《红旗报》最近发表文章指出，中华人民共和国今天已经以一个巨大的社会主义强国出现在世界舞台上，它是“支持一切民族主义运动和革命运动的巨大根据地”。"},{"type":"paragraph","text":"文章说，“帝国主义者、反动分子和修正主义者对中华人民共和国及其领导人进行的一切肮脏阴谋必将失败。最后胜利属于马克思列宁主义”。"},{"type":"paragraph","text":"这篇题为《我们向伟大的中国革命致敬》的文章说，中国革命是继伟大的布尔什维克革命后的第二个历史事件，今天中华人民共和国已经成为一个真正的社会主义强国。文章说，“以毛泽东同志为首的中国共产党真正创造性地运用马克思列宁主义，正确解决了中国社会主义建设最重要的问题。无论是社会主义工业化，还是农业合作化，都是在困难的条件和环境下，走上了正确的道路。在中国，社会主义建设是在共产党的英明领导下，基本上通过人民自力更生而完成的。”"},{"type":"paragraph","text":"文章说，在国际上，“中华人民共和国今天已成为支持一切民族主义运动和革命运动的巨大根据地。它的领导人真诚地执行无产阶级国际主义和坚决坚持马克思列宁主义。多年来，中国共产党在实践中就是国际共产主义运动和全世界革命的无产阶级的‘突击队’。这就是美帝国主义及其盟友，现代修正主义及其追随者对中华人民共和国展开说谎、诽谤和挑衅的名副其实的攻击的原因。”"},{"type":"paragraph","text":"文章指出，“亚洲、非洲和拉丁美洲被压迫的人民有特殊的原因要强调伟大中国革命的重要性和世界意义。这些人民遭到中国人民解放前遭受的同样的压迫和剥削。显然，中国革命的教益是一个巨大的贡献，应该根据每个具体的现实情况加以吸取和利用。这就是正在发生的事，从而使修正主义者感到恼火和恐惧，使帝国主义者暴跳如雷。”文章最后说，“秘鲁共产党向兄弟的中国共产党、中国人民及其伟大领袖毛泽东同志热烈而激动地表示完全的革命支援。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9b11bb881"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
