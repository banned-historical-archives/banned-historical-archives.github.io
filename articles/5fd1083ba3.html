hors":[],"dates":[{"year":1961,"month":4,"day":11}],"is_range_date":false,"parts":[{"text":"中央同意增发退赔款期票的请示","type":"title"},{"text":"中共甘肃省委并西北局：","type":"appellation"},{"text":"三月廿八日电悉。同意你省对一平二调的退赔款增发期票六千四百万元。但是，在发期票的时候，应当由省财政拨给银行六千四百万元，以便明年由银行负责拨款保证期票兑现。同时，在发期票后，要防止各部门和某些单位不积极退赔实物的现象发生。否则，不仅不能更深刻教育干部接受教训，而且也将妨碍政策的彻底贯彻执行。","type":"paragraph"},{"text":" 中央1961年4月11日","type":"paragraph"},{"text":"(甘肃省档案馆91—4—844卷)","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"中央办公厅机要室赵发同志电话","type":"subtitle"},{"text":"1961年4月11日“中央同意增发退赔期票的请示”的电报中，请将“同意你省对一平二调的退赔款增发期票6400万元”一句改为“同意你省对一平二调的退赔款发期票六千四百万元”，请于更正。","type":"paragraph"},{"text":" 接话人：刘淑贞1961年4月21日下午5时半","type":"paragraph"},{"text":"原电为：甘收(61)1186","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fd1083ba3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
