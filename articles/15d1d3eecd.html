963,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"来自捷克斯洛伐克工厂人民纠察队员们的信，一开始就说:“我们是站在中共中央英勇斗争的一边的。”他们在信中说:“从苏共二十大以来，我们一直怀着担心、不安和惧怕的心情，注视着赫鲁晓夫领导的修正主义集团的活动。这个集团系统地破坏在苏联和在世界共产主义运动的发展中以忘我的、耐心的劳动所取得的东西。这个集团利用苏联过去的领导地位，宣扬荒谬的同西方资本主义领导人的和平共处。赫鲁晓夫领导的这个集团背叛了苏联共产党的总路线，改变了国际共产主义运动的革命目标，玷污了列宁同志的学说，扼杀了劳动人民的革命热情，并使阶级斗争陷于瘫痪。”"},{"type":"paragraph","text":"来信说:“他们想把伟大的革命家、真正的思想家和导师、久经考验的社会主义建设者——斯大林同志的功绩从我们的思想中抹煞掉。……但是斯大林同志永远不会从我们的思想中消逝，他因此更加得到我们的敬爱，而我们对修正主义者的憎恨愈来愈大。”"},{"type":"paragraph","text":"这封信在叙述了修正主义给捷克斯洛伐克带来的损害以后说:“当我们看到自己周围的人灰心丧气，政治消沉，我们只有紧握双拳!敬爱的中国同志们，这真是最糟糕的啊!”"},{"type":"paragraph","text":"“我们相信，我们清算那些虽然标榜马克思列宁主义，但是却背弃和玷污了这一学说的人的时候，将会到来。”"},{"type":"paragraph","text":"人民纠察队员们在信的最后希望“共产主义运动的真正代表——中国共产党中央委员会，勇敢地坚持这个斗争，象过去和现在不可调和地同帝国主义进行斗争一样，不调和地揭露和谴责危险的修正主义。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15d1d3eecd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
