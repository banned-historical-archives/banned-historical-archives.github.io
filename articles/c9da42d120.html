rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"人是战争胜负的决定因素","authors":["刘义"],"parts":[{"type":"paragraph","text":"战争胜负的决定性因素是什么？是人还是物？马克思主义的军事学说和我国革命战争的实践早已作了回答：是人不是物。邓小平鼓吹什么“打仗就是要钢铁”，兜售“钢铁制胜论”，那是骗不了任何人的。拿我亲身经历的一次战斗来说吧！一九五○年五月解放万山群岛时，我是某团九连的副指导员。上级要我带领一个排的兵力，分乘两只木制小艇，担负打击敌舰、掩护主力部队登陆的任务。在向登陆目标前进途中，突然碰上了敌人的两艘军舰。在敌我双方兵力、火力对比悬殊的情况下，大家毫不畏惧，只有一个共同的信念，彻底消灭敌人。战斗打响后，敌人仗着舰大、火力强的优势，向我猛烈射击。我们冒着密集的炮火，英勇地向敌舰冲去。有的同志负伤了，包扎一下继续坚持战斗；有的同志牺牲了，大家对敌人更加同仇敌忾。我们冲到敌舰旁边，敌人的炮火便失去了作用，我们充分发挥近战的威力，集中艇上的轻重武器的火力，击毁了敌舰的驾驶台，击中了另一艘敌舰的汽油，随即跳上敌舰，进行刺刀见红的战斗，打得敌人鬼哭狼嚎，仓皇跳海逃命。我们取得击沉和俘获敌舰各一艘的胜利，创造了我军木船打军舰、海战抓俘虏的光辉战例，受到伟大领袖毛主席的表扬。木船打军舰的胜利，是人的因素的胜利，是勇敢不怕死的凯歌。事实证明，有了高度的共产主义觉悟，有了勇敢战斗、不怕牺牲的精神，就能临阵不乱，临战不惧，就能让有限的物质条件发挥出更大的作用，弥补武器装备的不足；就能在任何艰难困苦的场合，冲破困难，变不利为有利，化被动为主动，最后战而胜之。邓小平鼓吹唯武器论，妄图“扭”转我军建设的方向，改变人民军队的性质，这个阴谋是绝对不能得逞的。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9da42d120"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
