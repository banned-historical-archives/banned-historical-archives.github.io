ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对中宣部关于成立马克思主义教师学校和马恩列斯著作编译所具体事宜的请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对中宣部关于成立马克思主义教师学校和马恩列斯著作编译所"},{"type":"paragraph","text":"具体事宜的请示报告的批语"},{"type":"paragraph","text":"（1952年12月10日）均同意。陈昌浩的工作，可以即行改变。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十日"},{"type":"paragraph","text":"[1]中共中央宣传部1952年12月9日在报告中说，关于成立马克思主义教师学校和成立马恩列斯著作编译所两事，特向中央请示两点：一、关于负责人选，提议以黄松龄任马克思主义教师学校校长，并即行负责筹备这一学校的成立，尽可能争取在明年3月开学。筹备工作由凯丰会同安子文负责指导，成立后亦由凯丰领导。马恩列斯著作编译所提议由师哲任所长，陈昌浩、姜椿芳任副所长。惟陈昌浩的工作变动是否须俟刘少奇回国后再定，请中央指示。编译所的工作亦由凯丰负责领导。二、以上两机关名称是否即定为马克思主义教师学校和马恩列斯著作编译所，亦请中央决定。"},{"type":"paragraph","text":"[2]陈昌浩，当时任马列学院副教务长。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":12,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":366,"page_end":366},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"121e88055f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
