民紧密团结、巩固祖国西南国防","authors":[],"dates":[{"year":1951,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人民解放军进藏部队先遣部队全体指战员"},{"type":"paragraph","text":"国庆节致电毛主席朱总司令致敬"},{"type":"paragraph","text":"保证与西藏人民紧密团结、巩固祖国西南国防"},{"type":"paragraph","text":"【新华社拉萨五日电】中国人民解放军进藏部队先遣部队全体指战员在国庆节致电毛主席、朱总司令，电文如下：亲爱的毛主席，朱总司令："},{"type":"paragraph","text":"今天我们在西藏的首邑拉萨来庆祝伟大的国庆节，每个指战员心中都怀着无比的欢欣与愉快。一年来我们执行着您所规定的正确的民族政策、宗教政策，亲密团结了广大藏族僧俗人民，获得他们热烈的拥戴与支持。特别是在您伟大的感召下，西藏地方政府签订了关于和平解放西藏办法的协议，因而我们得以和平胜利地进驻拉萨。"},{"type":"paragraph","text":"当此全国人民热烈庆祝国庆之际，我们谨向您保证坚决执行和平解放西藏办法的协议，与西藏人民紧密团结在一起，驱逐帝国主义的侵略势力出西藏。同时自己动手，参加生产，修建交通，巩固我们祖国的西南国防。"},{"type":"paragraph","text":"中国人民解放军进藏部队先遣部队全体指战员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42117aa2d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
