art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"美国前总统尼克松和夫人离京赴桂林华国锋代总理等到机场送行 姚连蔚副委员长陪同前往访问","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年二月二十六日讯 美国前总统理查德·尼克松和夫人，今天上午由人大常委会副委员长姚连蔚陪同乘专机离开北京前往桂林进行访问。"},{"type":"paragraph","text":"到机场送行的有国务院代总理华国锋，外交部长乔冠华，卫生部长刘湘屏，外交部副部长王海容，新华通讯社社长朱穆之，人大常委会委员傅玉芳，有关方面负责人唐闻生、章含之、傅顺和，以及各界访美人士和首都群众共三百五十多人。"},{"type":"paragraph","text":"当尼克松先生和夫人在机场同欢送群众告别时，人们鼓掌和挥动花束，祝贺尼克松先生和夫人访华成功，祝愿中美两国人民的友谊进一步发展。"},{"type":"paragraph","text":"陪同尼克松先生和夫人前往桂林的还有中国驻美国联络处主任黄镇，以及有关方面负责人林平、朱传贤、朱霖、钱大镛。"},{"type":"paragraph","text":"到机场送行的还有美国驻中国联络处副主任塞耶。（附照片）"},{"type":"paragraph","text":"美国前总统理查德·尼克松和夫人离京前往桂林访问。国务院代总理华国锋等，以及各界访美人士和首都群众三百多人到机场送行。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9763548ce8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
