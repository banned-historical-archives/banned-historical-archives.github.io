script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"自觉地破除资产阶级法权思想","authors":["罗林"],"dates":[{"year":1975,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"最近，我们在学习毛主席关于理论问题的重要指示，议论如何自觉地破除资产阶级法权思想时，联系到我们房管所内的情况，都异口同声地赞扬一位新干部，表示要向他学习。"},{"type":"paragraph","text":"这位新干部叫郭银祥，是个老司炉工。无产阶级文化大革命中，他当了所党支部委员、革委会副主任，分管后勤工作。他在淮海路某高楼大厦里已工作了十几年，在资产阶级的“香风”面前，始终保持着劳动人民的本色，特别是自己的家至今还是住在草房里。有一次，有的同志劝老郭调到条件较好的新工房去，但老郭没有接受。他说:“毛主席教导我们:一切工作干部，不论职位高低，都是人民的勤务员。我当了干部，怎么能因此享受特权?有好房子要考虑群众的需要，决不能自己占用!”"},{"type":"paragraph","text":"老郭处处关心同志比关心自己为重。他因工作需要经常外出，本来可以用公家的自行车，但是他考虑到管养段的工人随时要背着工具袋出门去修理，也很需要车子，就自动把一辆公车让给水电工使用，自己花钱去买了一辆旧自行车。老郭还注意不搞特殊化。今年春节前，老郭家里粉刷房子需要石灰，所里有的是石灰，本系统的材料商店也有供应，他却没有去拿一点或作价处理，而是到外面商店去买了二斤。"},{"type":"paragraph","text":"老郭一直坚持参加集体生产劳动。他除了星期四照例到所内小修队劳动以外，平时那里缺人就到那里顶班。有时清晨三点钟就在某大楼顶早班烧炉子，干了八小时后，仍回所里处理日常工作。逢到节日，他经常主动去加班，但从不肯拿额外报酬。财务人员发给他加班费，他说:“不劳动思想会变修，我应该为社会主义多出一点力，多流一点汗，决不是为了拿几个钱!”前年冬天，上级要调一个司炉工支援某大楼，所里一时抽不出合适的人，老郭主动去连续干了四个月，按规定，在那里工作有一定的津贴，他又是坚持不肯拿。他就是这样坚持与旧传统观念实行彻底的决裂。"},{"type":"paragraph","text":"徐汇区新乐房管所　罗林"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"429bc018da"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
