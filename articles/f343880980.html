script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"必须对资产阶级实行全面专政","authors":["马成杰"],"dates":[{"year":1974,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"必须对资产阶级实行全面专政"},{"type":"paragraph","text":"中共北京市教育局党委副书记　马成杰"},{"type":"paragraph","text":"《人民日报》发表黄帅的公开信，并加了编者按语，对积极参加批林批孔斗争的广大革命师生，是很大的支持和鼓舞。这件事情说明：教育战线的形势大好，但两个阶级、两条路线、两种思想的斗争仍很尖锐。无产阶级要把教育革命进行到底，必须深入开展批林批孔斗争，批判修正主义，批判资产阶级世界观，在教育战线对资产阶级实行全面专政。"},{"type":"paragraph","text":"我在中学工作过多年，深深感到：在无产阶级文化大革命以前，教育战线确实是资产阶级专了无产阶级的政。无产阶级文化大革命粉碎了刘少奇、林彪为头子的两个资产阶级司令部，无产阶级教育革命取得了伟大的胜利。如今，在毛主席的革命路线指引下，工农兵和革命师生成了教育革命的主人。他们意气风发，深入批林批孔，积极进行教育革命实践。红小兵黄帅提出了教育革命中的大问题，就是一个很好的例证。形势一派大好，十分使人高兴。但是，这种生气勃勃的革命景象，象王亚卓同志这样的人，一概看不见。他竟说什么无产阶级对资产阶级的斗争是“迫人太甚”。王亚卓同志应当想一想，你说这话实际上代表了那个阶级？跟那些向无产阶级搞反攻倒算的人的语言有什么两样！"},{"type":"paragraph","text":"王亚卓同志出来指责红小兵黄帅反潮流这个事实还告诉我们，对当前教育战线上两个阶级、两条路线的斗争形势和特点，要有清醒的认识。我们必须积极开展斗争。在路线问题上，不是东风压倒西风，就是西风压倒东风，决没有调和的余地。"},{"type":"paragraph","text":"黄帅同学的来信和日记摘抄，正是坚持了这个基本原则。她批的是修正主义。她提出的问题引起了社会上和广大中小学师生的强烈反响，促进了教育革命的深入发展。黄帅的老师和广大中小学教师，由于坚持执行毛主席的革命路线，不是“垮台”了，而是从中受到了教育，提高了阶级斗争、路线斗争觉悟，激发了革命精神。王亚卓同志不顾这些事实，指责黄帅的反潮流是“不通理”，“把老师当敌人”，“态度大错特错”。这是对无产阶级教育革命的攻击，是对批判修正主义的歪曲。照王亚卓同志的说法，老师错了学生不能批评，更不准反对。不分路线是非，老师说了算，难道这是正确态度吗？如果这样，不是又回到修正主义老路上去了吗？照这样培养出来的学生，不正是既能替资产阶级卖命，又不惊扰主人的安宁的奴仆吗！"},{"type":"paragraph","text":"列宁说：“既然群众已经振作起来，既然千百万人已经开始行动起来，那末任何迫害和任何镇压都不能阻挡运动。”在教育革命过程中，革命师生是一个战壕里的战友。现在，广大革命师生在毛主席革命路线指引下，积极参加批林批孔斗争，坚持马克思主义，反对修正主义。那些站在革命运动一旁指手划脚的人，应当快些清醒过来，认清形势，同革命师生一起，共同把无产阶级教育革命进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"黄帅","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f343880980"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
