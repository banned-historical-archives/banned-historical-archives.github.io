[],"dates":[{"year":1949,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民主人士陈叔通氏"},{"type":"paragraph","text":"电毛主席朱总司令"},{"type":"paragraph","text":"祝贺解放南京太原大捷"},{"type":"paragraph","text":"【本报特讯】民主人士陈叔通氏致电毛主席朱总司令祝贺解放南京太原大捷。电称：“中国人民革命军事委员会毛主席中国人民解放军朱总司令：中国被国民党反动派统治以来，国脉几以斫伤，民族亦将沦丧。反动罪魁蒋介石及其集团，卖国殃民，中外共悉。中国共产党领导人民民主革命，明揭三反主张，爱国群众，莫不率从。人民解放军即为实现人民意志之武力。主席总司令共纾韬略，各路指挥员战斗员无不奋勇灭敌。上年淮南之役，敌军主力，一夕而崩。此次渡江伪都三日亦破。太原号称险固，亦复不当一击。足信军民一心，无坚不摧。反动统治，已告灭亡，游魂虽在，只方残照。行见旄麾所至，壶箪前迎，新国规模，指日即立。特此具贺，敬惟公鉴。陈叔通三十八年四月二十六日”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1baf057762"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
