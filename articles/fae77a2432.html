],"dates":[{"year":1966,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石油部五好标兵大庆油田采油井长胡法莲："},{"type":"paragraph","text":"同资产阶级意识斗到底"},{"type":"paragraph","text":"毛主席号召我们工人兼学军事、政治、文化，真是说到我心里了。"},{"type":"paragraph","text":"油井是人打的，有人就有斗争，有斗争就有政治，参加斗争就要学政治。毛泽东思想是无产阶级最强大的思想武器。我们掌握了毛泽东思想，才能和各种各样的资产阶级思想斗，在斗争中锻炼、成长。"},{"type":"paragraph","text":"原先有人瞧不起我们妇女，总觉得我们女同志这也不行，那也不行。我就想：革命路上没有男女之分。要和几千年留下来的这种旧意识斗争到底。毛主席说：“中华儿女多奇志”，我们就是要有闹革命的奇志才行。"},{"type":"paragraph","text":"我觉得自己应当在思想上斗倒“我”字，树立“公”字；在工作上斗倒“怕”字，树立“闯”字；在作风上斗倒“拖”字，树立“硬”字；在生活上斗倒“享”字，树立“苦”字。心里永远记着，我们肩上担负着中国革命和世界革命的重担；永远向上，永远前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fae77a2432"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
