心的修正主义","authors":[],"dates":[{"year":1966,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希尔同志发表文章指出"},{"type":"paragraph","text":"反修斗争关系到全世界人民的命运"},{"type":"paragraph","text":"必须反对以苏共领导集团为中心的修正主义"},{"type":"paragraph","text":"据新华社墨尔本十日电　澳大利亚共产党（马克思列宁主义者）主席希尔八日在《先锋报》上发表一篇文章，指出反对修正主义的斗争是当前共产主义运动的中心任务，这场斗争的胜败关系到全世界人民的命运。"},{"type":"paragraph","text":"文章写道：“马克思列宁主义者首先是现实主义者。他们是在同现实打交道。现实是，目前有着一场特定的反修斗争。它是一场真实的、具体的斗争，而不是一场多少有些笼统和一般性的斗争。这场斗争所具体反对的是以苏共领导集团为中心的修正主义。正是这个集团构成了今天世界上修正主义的核心。”"},{"type":"paragraph","text":"文章接着说：“修正主义在任何情况下总是为资本主义的需要服务，而在现代世界则为帝国主义的需要服务。这就是修正主义的实质。"},{"type":"paragraph","text":"“人民的主要敌人是美帝国主义，但是，美帝国主义不能通过外部进攻来有效地对付马克思列宁主义。现代修正主义首先是通过从内部攻击马克思列宁主义来为美帝国主义效劳的。以苏共领导集团为中心的现代修正主义者就是这样为美帝国主义服务的。苏联领导人无疑正在同美帝国主义进行实际勾结。每天都有更多例子。在裁军谈判中勾结，在越南和谈问题上的勾结，在各种交流方面勾结，这是人们清楚知道的。”“苏联领导人设法使共产主义适应美帝国主义的需要。这只能是修正主义在当今世界中的唯一真正目的。”"},{"type":"paragraph","text":"文章最后说：“马克思列宁主义是无限强大的。修正主义实际上非常虚弱，他们正接近末日，他们采用了新手法来推迟他们的灭亡。这些新手法挽救不了他们。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afc7cdadbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
