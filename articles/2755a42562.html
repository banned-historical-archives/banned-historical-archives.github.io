" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市文联支部开除右派分子李微含党籍的决定","authors":["(李微含)"],"dates":[{"year":1958,"month":2,"day":14}],"is_range_date":false,"parts":[{"text":"中共北京市文联支部开除右派分子李微含党籍的决定","type":"title"},{"text":"(李微含)","type":"authors"},{"text":"李微含，男，三十四岁，陕西盩厔县人，本人成份：学生，家庭出身中农，一九三九年参加工作，一九四一年加入共产党，现任北京市文联编辑部长，党组成员，党支部副书记，整风运动中表现为一般右。","type":"paragraph"},{"text":"一、主要简历：","type":"subtitle"},{"text":"曾在延安抗战剧团任演员，延安边区教育厅文书，土改工作员，北京市文艺处编审科长，北京市文联编辑部长。平时工作尚负责任，但有严重脱离政治倾向，肃反时为五人小组成员，有严重右倾思想及不负责任表现。","type":"subtitle"},{"text":"二、整风中主要右派言行：","type":"subtitle"},{"text":"1、六月六日他在会上说：“我认为肃反运动是有点扩大化，延安整风时就有扩大化，不过是没有错杀人，我们是有斯大林主义的，就是不承认罢了。”","type":"paragraph"},{"text":"2、在同日会上发言还为肃反中被斗对象叫屈，说文联肃反搞冤枉了一些好人。考诚(国民党员，曾任美军飞虎队中尉翻译及国民党师政治部宣传科少校副科长极右分子)李岳南(与胡风分子徐放关系密切，并参与王亚平反党宗派活动)是思想问题，在肃反中不应当搞，诬蔑领导对施白芜(反革命分子，极右)职权不够尊重等。还叫喊肃反时依法搜查肃反对象是“侵犯人权”，“搜查的面太宽，过去我们反对国民党搜查，现在我们也这样闹”，要中央有“民法”保障人身自由(当时李被分配搜查考诚)。","type":"paragraph"},{"text":"3．同日会上发言还否定历次运动成绩(延安整风，四七年整党、三反、五反、肃反等)，攻击党的三级领导(支部、市委、中央)。","type":"paragraph"},{"text":"4、同日会上发言还诬蔑文联工作是“以党代政”否定党的领导。会下向右派分子张明权说：“市委真瞎眼，派田家来整我们。”(据张明权揭发)","type":"paragraph"},{"text":"5、整风中以中立派自居，实际倒向右派，如为右派主编向党进攻的大字报“仙人掌”题字。","type":"paragraph"},{"text":"三、平时表现：","type":"subtitle"},{"text":"进城以后，政治上逐步蜕化，否定阶级斗争，反对思想改造，对政治斗争感到厌倦、消极。把党及党领导的各项政治运动都看成是一批人整一批人。使他不能安安生生过日子，并经常散布这种言论。","type":"paragraph"},{"text":"四、态度：","type":"subtitle"},{"text":"初期为整风领导成员之一，大鸣大放中以中立派自居(根据本人在七月三十日支部会的检讨)，反右斗争开始后，斗争不够积极，对自己所犯错误的严重性认识不足，检讨时虽敢于暴露一些问题，认识仍不深刻。根据以上事实，支部决定撤销党内右派分子李微含党内副书记、开除党籍。","type":"paragraph"},{"text":" 一九五八年二月十四日","type":"paragraph"}],"comments":[],"origin":"原载 《关于清除党内右派分子的决定汇编》，中共中央监察委员会办公厅编，一九五九年十二月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2755a42562"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
