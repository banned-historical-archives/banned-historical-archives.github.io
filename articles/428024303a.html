ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1941年3月26日）"},{"type":"paragraph","text":"党性问题是一个重要问题。要使中级以上的干部实行检查，干部巩固了党便巩固了。实行自我批评，是一个很难办到的事情，鲁迅也说解剖自己是困难的。自遵义会议后党内思想斗争少了，干部政策向失之宽的方面去了。对干部的错误要正面批评，不要姑息。我们党的组织原则是团结全党，但同时必须进行斗争，斗争是为了团结。我党干部要做到虽受到打击也要服从组织，就是在一个时期为上级所不了解，并且孤立，都要能够忍耐下去。要能上能下。项英、袁国平的错误，中央也要负责，因一九三七年十二月政治局会议是有些错误的。当时对形势估计不足，没有迅速地布置工作；其次对国共关系忽视了斗争性，因此边区也失掉些地方，直到张国焘逃跑后才解决，对全国的影响也很大。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上关于增强党性问题讲话的一"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":3,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":489,"page_end":489},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"428024303a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
