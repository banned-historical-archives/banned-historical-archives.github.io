script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"纳萨尔巴里武装斗争推动印度农民运动发展  西孟加拉邦农民运动领导人谴责印共修正主义分子的“和平过渡”路线","authors":[],"dates":[{"year":1967,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纳萨尔巴里武装斗争推动印度农民运动发展"},{"type":"paragraph","text":"西孟加拉邦农民运动领导人谴责印共修正主义分子的“和平过渡”路线"},{"type":"paragraph","text":"据新华社讯　新德里消息：在印度大吉岭县纳萨尔巴里武装斗争的鼓舞下，印度一些地区的农民运动正在兴起。"},{"type":"paragraph","text":"据《印度快报》十一日报道，大吉岭县农民革命武装斗争的一位领导人最近在西里古里发表谈话。"},{"type":"paragraph","text":"他指出：“在印度如果不解决农民问题，任何问题都解决不了。”他说，这个问题只能通过农民参加斗争而不是通过立法和行政的措施来解决。"},{"type":"paragraph","text":"印度《政治家报》六日报道，在西孟加拉邦大吉岭县以南的贾尔派古里，五日举行了一次支持纳萨尔巴里农民武装斗争的公众大会。农民运动的领导人号召掀起更多的纳萨尔巴里运动。他们强烈谴责了西孟加拉邦政府的反动政策，并且特别谴责了执行“和平过渡”路线的印共修正主义分子西孟加拉邦政府副首席部长乔蒂·巴苏。"},{"type":"paragraph","text":"在印共修正主义分子部分执政的喀拉拉邦，首府特里凡德琅南郊的农民夺取了一名反动官员的土地和房屋。农民要求分配土地，反动官员害怕出现又一个纳萨尔巴里。"},{"type":"paragraph","text":"在安得拉邦东北部斯里卡库兰县的库鲁帕姆，农民开始把反动政府和剥削阶级的“所有权”抛在一边，自行开垦土地和采伐树木。"},{"type":"paragraph","text":"在马德拉斯邦坦焦尔县，雇农要求地主增加工钱和供应大米。当地主拒绝他们的要求时，他们就停止劳动。有些地主企图在外面找人来代替他们，但是失败了。更多的农民放下了农具。"},{"type":"paragraph","text":"在比哈尔邦的巴加耳普尔地区北部，农民夺取了一个官方机构“食品救济委员会”的土地和一个地主的土地。一些剥削阶级分子惊慌地喊叫，除非采取行动，“否则无法防止不久就出现纳萨尔巴里的情况”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce22fa4860"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
