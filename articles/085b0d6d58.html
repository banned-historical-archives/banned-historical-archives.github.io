s":[],"dates":[{"year":1967,"month":5,"day":25}],"is_range_date":false,"parts":[{"text":"中央文革小组给北矿东方红等组织的信","type":"title"},{"text":"北京矿业学院东方红公社、北京化学纤维工学院红旗、清华大学井岗山兵团、北京大学新北大公社、北京轻工业学院红鹰兵团、北京航空学院红旗战斗队并新华社《新华公社》、《革命联合委员会》：","type":"paragraph"},{"text":"新华社是在中央文化革命小组直接领导下的中央宣传单位。它是党中央和国家的通讯社，担负着对国内外进行宣传工作的战斗任务。所有大专院校的群众组织，所有新华社外的群众组织，都不要介入新华社内的无产阶级文化大革命运动，都不要插入新华社内部各群众组织之间的争论。新华社的《新华公社》和《革命联合委员会》，双方都不要请社外的群众组织进新华社。社外的革命群众组织对新华社的各群众组织，对新华社的工作，有意见可以送大字报、小字报，但不要开宣传车到新华社去广播，以免影响和妨害新华社工作的正常进行。","type":"paragraph"},{"text":" 中央文革小组办事组一九六七年五月二十五日","type":"paragraph"}],"comments":[],"origin":"根据文件的群众组织翻印件，翻印者未注明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"085b0d6d58"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
