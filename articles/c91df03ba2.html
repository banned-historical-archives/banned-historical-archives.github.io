script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南朝鲜伪“护国军”总司令  劝告伪军归向人民  决不作美国人的殖民地奴隶","authors":[],"dates":[{"year":1950,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南朝鲜伪“护国军”总司令"},{"type":"paragraph","text":"劝告伪军归向人民"},{"type":"paragraph","text":"决不作美国人的殖民地奴隶"},{"type":"paragraph","text":"【新华社平壤七日电】据朝鲜中央通讯社汉城讯：南朝鲜伪国防军后备军——“护国军”总司令宋虎声于四日下午一时在汉城广播电台发表声明，表示反对朝鲜卖国贼李承晚，愿为祖国统一独立的事业而奋斗，并要求伪“国防军”的官兵们站到人民军和游击队方面来。宋虎声在广播中说：“我因被李承晚匪帮所迷惑，走了背叛祖国与人民的道路。由于疯狂挑拨内战的李承晚匪帮发动所谓‘北伐’而引起了战争，我才感觉到自己的罪恶深重。同时，我很快地认识到人民军是真正拥护人民利益的军队，人民政权是真正为朝鲜人民服务的政权。”"},{"type":"paragraph","text":"宋虎声在要求南朝鲜伪“国防军”的官兵站到人民军和游击队方面来时说：“今天的美国人和过去的日本人有什么不同？难道我们又要作美国人的殖民地奴隶吗？不能的，我们应该是有自主权的民族。你们如果热爱祖国与人民，你们如果有民族良心，就应该像我一样地起来反对卖国匪帮和美国侵略者，而站到全体人民和人民军及游击队方面来。我现在已将脱离‘国防军’而投到人民军和游击队方面来的数千名战士组成‘人民义勇军’，并率领他们与人民军并肩作战，以消灭李承晚匪帮，驱逐侵犯我国领土的美军，而争取国家的统一与完全独立。‘国防军’战士们和军官们，摆脱美国侵略者的魔掌，投到人民方面来保卫祖国吧！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c91df03ba2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
