ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"关于同意不再使用“中中农”一词的批语","alias":"","parts":[{"type":"paragraph","text":"关于同意不再使用“中中农”"},{"type":"paragraph","text":"一词的批语"},{"type":"paragraph","text":"（1955年9月16日）"},{"type":"paragraph","text":"小平、子恢、伯达、鲁言同志阅，交杜润生同志处理。我认为小平同志的意见是正确的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十六日"},{"type":"paragraph","text":"[1]这个批语写在中共中央秘书长邓小平1955年9月13日为转报中央农村工作部秘书长杜润生关于河北省对使用“中中农”一词的反映给毛泽东的信上。杜润生反映说，河北来电话询问：老中农中的中中农该划到下中农还是上中农？有的认为应划到下中农，因为实际情况是接近不富裕的人；有的认为宜划到上中农，理由是划入下中农把依靠范围扩大，会使该依靠的反而依靠不好；有的认为老中农整个阶层基本上属团结范围才是合适的。邓小平在给毛泽东的信中谈了自已的意见：（一）中中农这个名词不要再用。（二）从老中农的政治经济情况看来，只宜把其中生活贫困的一部分划入下中农。（三）不宜把老中农的大部分划入下中农。（四）最重要的是：不要一家一家地去确定谁是上中农或下中农，事实上第一、二批加入合作社的一般只能是那些比较贫苦的人（当然也有少数觉悟较高的上中农），从对于愿否加入合作社的态度，就可以天体判明他是属于哪一类的。"},{"type":"paragraph","text":"[2]子恢，即邓子恢，当时任中共中央农村工作部部长、国务院副总理。伯达，即陈伯达，当时任中共中央农村工作部副部长。鲁言，即廖鲁言，当时任中共中央农村工作部副部长、农业部部长。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":9,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":368,"page_end":368},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f77a4607a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
