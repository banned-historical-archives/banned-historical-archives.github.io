[{"year":1977,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年十二月六日电　中华人民共和国国务院总理华国锋十二月六日打电报给蒙博托，祝贺他再次当选为扎伊尔共和国总统。电报全文如下:金沙萨扎伊尔共和国总统蒙博托·塞塞·塞科中将阁下:"},{"type":"paragraph","text":"在你再次当选为扎伊尔共和国总统的时候，我谨代表中国政府和人民，并以我个人的名义向你表示热烈的祝贺和良好的祝愿。"},{"type":"paragraph","text":"祝扎伊尔政府和人民在阁下领导下，在捍卫民族独立、国家主权和领土完整的斗争中，在发展民族经济和建设自己国家的事业中不断取得新的成就；并为非洲和第三世界团结反霸的斗争继续作出贡献。祝中、扎两国政府和人民之间的友好合作关系进一步发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理"},{"type":"paragraph","text":"华国锋"},{"type":"paragraph","text":"一九七七年十二月六日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca63656e6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
