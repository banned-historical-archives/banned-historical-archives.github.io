<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"歌颂社会主义新生事物反击右倾翻案风  上海各界妇女举行“三八”节赛诗会","authors":[],"dates":[{"year":1976,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"歌颂社会主义新生事物反击右倾翻案风"},{"type":"paragraph","text":"上海各界妇女举行“三八”节赛诗会"},{"type":"paragraph","text":"新华社上海一九七六年三月七日电　“挥笔作刀枪，狠批复辟狂，请看今日娘子军，英姿飒爽上战场！”上海各界妇女为纪念“三八”国际劳动妇女节，六日晚上举行了“歌颂社会主义新生事物，痛击右倾翻案风”赛诗会。会上有来自工厂、农村、部队、学校、科技、卫生、出版、街道等各条战线的劳动妇女和部分男同志二千四百多人。他们满怀无产阶级革命豪情，献诗献歌，用铿锵有力的诗篇，热情歌颂社会主义的新生事物，愤怒批判党内不肯改悔的走资派，充分显示了上海广大妇女以阶级斗争为纲，回击右倾翻案风的坚强意志和决心。"},{"type":"paragraph","text":"赛诗会在毛主席词二首《水调歌头·重上井冈山》、《念奴娇·鸟儿问答》的朗诵声中开始。毛主席的光辉诗篇，极大地鼓舞了参加赛诗会的上海广大妇女。“文化大革命东风吹，新生事物百花开，傲霜斗雪向阳笑，万紫千红报春来”，报幕员话音刚落，工人、人民公社社员、解放军战士、民兵、学生、科研人员、医务工作者、街道妇女等吟诵她们自己创作的诗篇，热情赞颂在毛主席革命路线指引下社会主义新生事物茁壮成长，歌颂社会主义祖国“到处莺歌燕舞”的大好形势。"},{"type":"paragraph","text":"赛诗会上，广大劳动妇女怀着强烈的无产阶级义愤，同仇敌忾愤怒批判党内那个不肯改悔的走资派搞"},{"type":"paragraph","text":"“克己复礼”，复辟资本主义。纺织工人一马当先，高声朗诵：“到底谁刮翻案风？都在工农眼目中，往年口称不翻案，上台又走死胡同，八亿人民一声吼，复辟倒退行不通！”在反击右倾翻案风的斗争中，上海师范大学的革命师生员工冲锋陷阵，深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领。赛诗会上，工农兵女学员用饱含激情的诗篇投入战斗，表示要“狠批右倾翻案风，继续革命朝前迈”。研究人工合成胰岛素取得重要成果的中国科学院上海生物化学研究所的女科学工作者，在会上用诗篇表达了她们的决心：“走资派，还在走，反攻倒算掀逆流。毛主席，挥巨手，神州大地怒声吼，痛击右倾翻案风，不获全胜誓不休。”"},{"type":"paragraph","text":"上海酿造五厂的一位青年女工当场挥笔作诗一首：“胸中怒潮涌，笔下惊雷动，狠批走资派，炸碎复辟梦！”"},{"type":"paragraph","text":"赛诗会上，群情激奋，决心把反击右倾翻案风的斗争进行到底。赛诗会在彻底批判党内不肯改悔的走资派、无产阶级文化大革命就是好的雄壮歌声中结束。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac4c02ae4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
