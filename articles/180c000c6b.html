rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席致电祝贺周外长电突外长正式承认突尼斯共和国","authors":[],"parts":[{"type":"paragraph","text":"新华社2日讯 中华人民共和国主席毛泽东于8月2日致电祝贺布尔吉巴当选突尼斯共和国总统。电文如下："},{"type":"paragraph","text":"突尼斯共和国哈比布·布尔吉巴总统阁下："},{"type":"paragraph","text":"欣闻突尼斯共和国成立和阁下当选为突尼斯共和国总统，我谨代表中国人民并且以我个人的名义向阁下和突尼斯人民表示衷心的祝贺。"},{"type":"paragraph","text":"中华人民共和国主席"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1957年8月2日于北京"},{"type":"paragraph","text":"新华社2日讯 中华人民共和国外交部长周恩来致电突尼斯共和国外交部长莫卡德姆，正式承认突尼斯共和国。电文如下："},{"type":"paragraph","text":"突尼斯共和国外交部长莫卡德姆阁下："},{"type":"paragraph","text":"我荣幸地代表中华人民共和国政府通知阁下，中华人民共和国已正式决定承认突尼斯共和国。祝突尼斯共和国繁荣和突尼斯人民幸福，祝我们两国之间的友好关系获得进一步的发展。"},{"type":"paragraph","text":"中华人民共和国外交部长"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"1957年8月2日于北京"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"180c000c6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
