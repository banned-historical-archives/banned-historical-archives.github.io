r":1983,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向叶剑英委员长致敬"},{"type":"paragraph","text":"1978年3月5日，叶剑英、邓小平、李先念同志在五届人大第一次会议上投票选举国家领导人。"},{"type":"paragraph","text":"叶剑英同志在这次会议上当选为全国人民代表大会常务委员会委员长。"},{"type":"paragraph","text":"1980年9月15日，中华人民共和国宪法修改委员会，在人民大会堂举行第一次全体会议，宣布宪法修改委员会正式成立。"},{"type":"paragraph","text":"主任委员叶剑英主持会议并讲了话。"},{"type":"paragraph","text":"1979年4月19日，叶剑英同志在葛洲坝水利枢纽工程工地。"},{"type":"paragraph","text":"1981年11月30日，叶剑英同志和陈云同志在五届人大四次会议休息室里。"},{"type":"paragraph","text":"1982年9月13日，叶剑英、邓小平同志在一起亲切交谈。"},{"type":"paragraph","text":"1980年5月14日，叶剑英同志回到家乡广东省梅县雁洋公社雁上大队。这是叶剑英同志向乡亲们招手致意。"},{"type":"paragraph","text":"1982年4月30日，叶剑英委员长会见华侨、港澳同胞、台湾同胞和外籍华人知名人士。（本版照片为新华社发）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86479b9520"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
