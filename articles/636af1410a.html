al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"换罗宗瀚烈士联","alias":"","parts":[{"type":"paragraph","text":"挽罗宗瀚烈士联2]"},{"type":"paragraph","text":"（1926年10月）美哲嗣政教长才3，竟成千古；"},{"type":"paragraph","text":"叹吾党革命先锋，又弱一个。"},{"type":"paragraph","text":"[1]罗宗瀚（1896一1926)，字耻迁，湖南安化县伏口镇（今属涟源市）人。1914年考入湖南省立第一师范，与毛泽东同学4年。1926年北伐军入湘，湖南省政府改组，他一度出任湖南省建设厅秘书。当时，他是国民党左派，任国民党湖南省党部执行委员，坚持国共合作，支持工农运动。.同年10月，因积劳成疾，入田秋明诊所治疗，被北洋军阀派人在药中暗下毒药，口鼻出血暴卒，年仅30岁。"},{"type":"paragraph","text":"[2]这是毛泽东挽国民党左派、湖南省立第一师范的同学和挚友罗宗瀚的对联。1926年10月，罗宗瀚被北洋军阀用毒药暗中毒死。同年冬，在湖南省立第一师范大礼堂举行隆重追悼大会，800多人参加。各界人士赠送挽联500多副。毛泽东从广州将此联写给罗宗瀚之父。"},{"type":"paragraph","text":"[3]哲，才能识见超越寻常的人。哲嗣，称别人之子的敬词，犹言令嗣。这里指罗宗瀚。长才，犹通才。《世说新语·赏誉》：“太傅府有三才：刘"}],"authors":["毛泽东"],"dates":[{"year":1926,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":296,"page_end":296},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"636af1410a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
