性","authors":[],"dates":[{"year":1972,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海师大一附中七二届一班的学生，积极开展社会调查，增强了上山下乡干革命的自觉性。"},{"type":"paragraph","text":"自从毕业分配工作开展以来，这个班级的不少同学存在着“下乡吃亏”的思想。针对这种情况，大家学习了毛主席关于“要了解情况，唯一的方法是向社会作调查”的伟大教导，开始进行社会调查。他们在短短的十多天时间里，向有关家长调查了全班二十三位同学的二十六位哥哥姐姐在农村迅速成长的情况，取得了大量第一性的资料。"},{"type":"paragraph","text":"在调查研究的基础上，全班同学召开谈心会、批判会，愤怒声讨刘少奇一类骗子破坏知识青年上山下乡的滔天罪行。一位女同学说:“刘少奇一类骗子诬蔑知识青年上山下乡是什么‘变相劳改’，这完全是一派胡言。从我们调查的情况来看，在二十六名上山下乡的知识青年中，已有五名光荣地加入了共青团，有一名青年原来在上海沾染了不良习气，到农村后，在贫下中农的关怀、帮助下，他刻苦地改造世界观，树立了热爱农村、扎根农村的思想，受到了大家的赞扬。这些青年的成长，完全驳斥了刘少奇一类骗子的无耻谰言。”另一位同学说:“在调查中，有一件事对我的教育很大。有一个青年原来身体不太好，可是到了农村后，由于他坚持参加农业生产劳动，不仅增强了体质，而且到了第二年，就被评为队里的一等劳动力，一年的分红除了口粮外，还分到二百多元。这就说明，‘插队落户养不活自己’的讲法，完全是阶级敌人的造谣诬蔑，我们决不上当。”"},{"type":"paragraph","text":"通过社会调查，不仅解决了这个班级部分同学存在的一些思想问题，而且也使大家受到了一次深刻的思想和政治路线方面的教育。学生们一致表示要时刻听从党召唤，一生献给毛主席!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d35c8b2a0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
