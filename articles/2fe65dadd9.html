script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把反对资产阶级腐朽教育制度的斗争继续下去  巴黎学生排除万难坚持罢考","authors":[],"dates":[{"year":1968,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把反对资产阶级腐朽教育制度的斗争继续下去"},{"type":"paragraph","text":"巴黎学生排除万难坚持罢考"},{"type":"paragraph","text":"据新华社二十日讯巴黎消息：巴黎学生反对法国腐朽的资产阶级教育制度，反对政府镇压学生运动的正义斗争正在继续发展。一千名大学生十九日在巴黎大学举行抗议大会，并在会后游行示威。巴黎美术学院的学生，十七日占领了他们的学院，在学院的建筑物上又一次升起鲜艳的红旗。"},{"type":"paragraph","text":"从九月五日开始的巴黎学生的罢考斗争，到今天已坚持了半个月。连日来，巴黎学生不顾警察的威胁，不受甜言蜜语的欺骗，继续斗志昂扬地在考场内外坚持抵制腐朽的教育和考试制度的斗争。"},{"type":"paragraph","text":"十九日整天，数百名学生聚集在巴黎大学医学院门前，向法国政府表示强烈的抗议。十九日晚上，一千名学生在巴黎大学本部开会。学生和教员的代表在会上纷纷发言，揭露法国腐朽的资产阶级教育制度，谴责政府使用暴力镇压学生运动，并强烈反对警察和密探进入学校。会后，学生们高唱《国际歌》，在塞纳河左岸的巴黎大学区举行示威游行。"},{"type":"paragraph","text":"今年五、六月革命风暴席卷法国期间，曾经制作了大量标语和招贴画，贴遍了巴黎的美术学院的学生，积极参加了罢考斗争的行列。十七日，这个学院的学生又一次占领了学院，在学院大楼上升起红旗，并且挂起一幅巨大的横幅标语，上面写着：“不要警察，解放学院”。他们通过决议，要求彻底改革法国腐朽的教育制度，要求从法国各大学撤走警察和密探。"},{"type":"paragraph","text":"法国当局怕得要命，连忙用卡车运来大批警察，包围了美术学院，阻止其他学生进入这个学校，并且不让学生给占领学院的同学供应食物。可是，占领美术学院的学生并没有被吓倒，他们站在学院大楼前，高唱《国际歌》，高呼“打倒警察国家”，以及其他谴责政府和警察的口号。"},{"type":"paragraph","text":"十七日晚上，法国反动统治集团下令警察使用暴力把美术学院的学生赶出学校。学生们同警察进行了英勇的搏斗。学生们在被迫离开学院时愤慨地高呼：“这只不过是开始，战斗要继续进行下去！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fe65dadd9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
