tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"听毛主席的话做好民兵工作广播电台二十二日播送小营公社武装部长王勤的讲话","authors":[],"parts":[{"type":"paragraph","text":"本报讯 中央人民广播电台将于十一月二十二日①18∶30“解放军生活”节目里，播送河北省泺平县小营公社武装部长、复员军人王勤的讲话：“听毛主席的话，做好民兵工作”。这次节目一共五十五分钟。"},{"type":"paragraph","text":"王勤同志从一九五六年以来，坚持学习毛主席著作。通过学习，不但提高了思想觉悟，而且学到了工作方法。他开始做民兵工作时，没有经验，不知从何做起。经过学习以后，从毛主席著作中找到了正确的立场、观点和方法，他就按毛主席的教导去做，把民兵工作做得很好。今年被评为河北省人民武装干部的标兵。"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e504c4885"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
