意扩大劳资纠纷转移斗争目标","authors":[],"dates":[{"year":1952,"month":3,"day":10}],"is_range_date":false,"parts":[{"text":"南京市不法资本家破坏五反运动  故意扩大劳资纠纷转移斗争目标","type":"title"},{"text":"【南京记者组十日讯】南京市五反运动深入后，曾多次发生劳资争议事件。尤其在钢铁机器、五金水电、汽车材料等行业最多。发生争议的主要原因是由于资方蓄意破坏五反运动，用欠薪、停火等无赖手段向工人进攻，故意扩大纠纷，企图转移目标。其次是由于工人长期遭受资产阶级的压迫剥削，在五反运动中产生了改善劳动条件、提高待遇的要求。有的是追发欠薪的正当斗争。","type":"paragraph"},{"text":"南京市委指出：对于在上述两种情况下发生的劳资争议，都应当切实支持工人，争取工人斗争的彻底胜利。并迅速地正确地领导工人把斗争锋芒集中到五反问题上去，不要使斗争纠纷在劳资问题上，拖延五反斗争，中了资产阶级的阴谋诡计。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1952年3月11日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdfc28f09c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
