<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"搞右倾翻案的人从来都没有好下场","authors":["洪璧辉"],"dates":[{"year":1968,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"正当我们为夺取无产阶级文化大革命的全面胜利而战斗时，社会上掀起了右倾翻案的逆流。我们队伍中有些同志对这股逆流的出现感到惊奇。其实，没有什么可奇怪的。毛主席教导我们:“帝国主义者和国内反动派决不甘心于他们的失败，他们还要作最后的挣扎。在全国平定以后，他们也还会以各种方式从事破坏和捣乱，他们将每日每时企图在中国复辟。”这股右倾翻案的逆流是阶级敌人垂死挣扎，搞反革命复辟的新伎俩，这是不以人们意志为转移的阶级斗争的规律。"},{"type":"paragraph","text":"在无产阶级革命派掌权的今天，任何搞右倾翻案的人是决不会有好下场的。曾记否?臭名昭著的赫鲁晓夫，在他上台之后就推波助澜、呼风唤雨，大刮反革命翻案黑风，是多么喧赫一时、不可一世呵!曾记否?这个篡党窃国的大野心家、大阴谋家纠集了一批叛徒、工贼，向伟大的马克思列宁主义者斯大林同志兴师问罪，为一切牛鬼蛇神鸣冤叫屈，大搞什么“恢复名誉”的活动。在苏联国内，他疯狂攻击斯大林同志清除钻进党内的反革命资产阶级代表人物的革命斗争，说斯大林是患了严重的“多疑症和迫害狂”，大肆给早已被苏联共产党和苏联人民抛进历史垃圾堆的政治小丑托洛茨基、季诺维也夫、布哈林之流翻案；在国际上，他为美帝国主义豢养的走狗、国际共产主义运动的大叛徒铁托翻案，说什么斯大林对铁托判决的铁证是“用欺骗的手段”“捏造出来的”。"},{"type":"paragraph","text":"可是，历史是无情的。赫鲁晓夫这个反革命翻案老手，如同托洛茨基、季诺维也夫、布哈林、铁托之流的命运一样，也成了不齿于人类的狗屎堆!"},{"type":"paragraph","text":"人们还记得那个名叫王明的反面教员吗?他也是一个热衷于搞反革命翻案的丑角。众所周知，蒋介石这个窃国大盗，他篡夺了国家政权之后，就把我们祖国的领土权、领空权、领海权、政权、军权、财权、乃至人权，统统出卖给了美帝国主义。而王明这个家伙竟然要为这个旷古罕有的超级大卖国贼翻案。他无耻地吹捧蒋介石是“民族英雄”，是“抗战最高领袖”。尽管王明如此卖命地为蒋介石翻案，结果呢?不仅蒋介石的案没有翻过来，而王明本人和蒋介石一样都成了遗臭万年的历史罪人。"},{"type":"paragraph","text":"再看中国赫鲁晓夫这个党内最大的走资派。封建帝王的案他要翻，帝国主义走狗的案他要翻，钻进共产党内的反动资产阶级代表人物的案他要翻，国际共产主义运动大叛徒的案他也要翻。不是吗?光绪明明是一个卖国贼，他却不遗余力地颂扬其为“爱国主义的”；蒋介石明明是一个杀人不眨眼的大刽子手，他却绘声绘色地美化为“革命的旗帜”；陈独秀、张国焘、王明等明明是右倾机会主义分子和党的大叛徒，他却闭着眼睛说瞎话，胡说什么“在我们党内公开提出的组织上的机会主义的理论是没有的”；赫鲁晓夫明明是苏联人民的败类和死敌，是国际共产主义运动的大叛徒，他却肉麻地吹捧说:“赫鲁晓夫同志是苏联人民的领袖”，“是杰出的马列主义者”。如此等等，不一而足。中国赫鲁晓夫大搞反革命翻案，翻来翻去，他的狐群狗党的案一个也没有翻成，到头来，他自己却被革命人民打翻在地，成为断了脊梁骨的癞皮狗，永世不得翻身。"},{"type":"paragraph","text":"一切反动派都不会接受历史教训的。中国赫鲁晓夫是倒台了，但是他的狐群狗党，徒子徒孙，却贼性不改。他们家传的那套反革命翻案经的阴魂不散。去年春天，在党内一小撮走资派和叛徒、特务的阴谋策划下，掀起了一股为中国赫鲁晓夫等党内一小撮走资派翻案的妖风，这股逆流很快地被无产阶级革命派击退了。可是，最近竟然又有一小撮不自量力的家伙，妄图螳臂挡车，他们四处奔走，秘密串连，煽阴风，点鬼火，一方面丧心病狂地炮打以毛主席为首、以林副主席为副的无产阶级司令部，另一方面为党内最大的一小撮走资派翻案，为叛徒、特务翻案，为搞右倾翻案的黑干将翻案，一句话，就是妄图推翻无产阶级专政，搞资本主义复辟。"},{"type":"paragraph","text":"历史是一面镜子。我们要严正警告一切逆历史潮流而动，搞反革命翻案活动的“英雄们”，用毛泽东思想武装起来的广大无产阶级革命派“早已森严壁垒，更加众志成城”，不管你们在什么时候，什么地方，用什么形式跳出来，都不会比你们的“先辈”的下场稍微好一点。“无边落木萧萧下，不尽长江滚滚来。”历史的潮流将沿着毛主席指引的航道滚滚向前，这是任何力量也阻挡不住的，永远阻挡不住的!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王明","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d25ffbbf50"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
