向中央的第二次报告","authors":[],"dates":[{"year":1950,"month":10,"day":13}],"is_range_date":false,"parts":[{"text":"罗瑞卿关于河北武安县黄灵道武装暴动向中央的第二次报告","type":"title"},{"text":"毛泽东10月13日批示：","type":"subtitle"},{"text":"应将俘虏详为调查会门内幕情况，使有更多收获。","type":"paragraph"},{"text":"据河北公安厅22时30分报告：武安县马庄、南北窑等村“黄灵道”暴动事件，于今日（12日）14时左右已告平息。初步获悉：毙匪4名，俘获31名（当场释放一部），经过争取瓦解自动放弃抵抗者20余名，逃逸者20余名（收缴武器数目待查）。","type":"paragraph"},{"text":"参与此次暴乱者除武安以外，尚有临近各县的道徒，以磁县车巨关村之马显昌（已就捕）为首，据供“该匪等原定于旧历8月28日举行暴乱，后改在9月1日”（即10月11日）。其中有无一般群众胁从参加和以什么口号进行煽动尚待查明续报。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9461c28626"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
