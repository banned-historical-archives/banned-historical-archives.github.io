常务委员会、中华人民共和国国务院、中国共产党中央军事委员关于建立伟大领袖和导师毛泽东主席纪念堂的决定","authors":[],"dates":[{"year":1976,"month":10,"day":8}],"is_range_date":false,"parts":[{"text":"中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会、中华人民共和国国务院、中国共产党中央军事委员会关于建立伟大的领袖和导师毛泽东主席纪念堂的决定","type":"title"},{"text":"为了永远纪念我党我军和我国各族人民的伟大领袖，国际无产阶级和被压迫民族被压迫人民的伟大导师毛泽东主席，教育和鼓舞工农兵和其他劳动群众继承毛主席的遗志，坚持马克思主义、列宁主义、毛泽东思想，把无产阶级革命事业进行到底，决定：","type":"paragraph"},{"text":"（一）在首都北京建立伟大的领袖和导师毛泽东主席纪念堂。","type":"paragraph"},{"text":"（二）在纪念堂建成以后，即将安放毛泽东主席遗体的水晶棺移入堂内，让广大人民群众瞻仰遗容。","type":"paragraph"}],"comments":[],"origin":"原载《人民日报》1976年10月9日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f8ea07e7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
