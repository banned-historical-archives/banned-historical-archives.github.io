ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"各级政治机关主要工作者必须是党员","alias":"","parts":[{"type":"paragraph","text":"各级政治机关主要工作者必须是党员！"},{"type":"paragraph","text":"（1939年2月19日）"},{"type":"paragraph","text":"部队不断扩大，新的杂色部队被收编，可能有许多政治干部不是党员，如此将使八路军优良政治制度的传统难于保持，党的领导及其政策的执行更无保证。以后无论何项性质之部队，一经编入八路军建制，必须从中建立党的组织，其指导员、教导员及各级政治机关的主要工作者必须是党员，接受党的领导，否则宁缺毋滥。"},{"type":"paragraph","text":"毛王谭"},{"type":"paragraph","text":"十九日"},{"type":"paragraph","text":"[1]这是毛泽东和中共中央军委副主席王稼祥、总政治部副主任谭政给八路军前方指挥部、各师、军区、山东、河南、第三五八旅、陈士支队，各级政治委员和政治部主任的电报。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":2,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":232,"page_end":232},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5e38db57a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
