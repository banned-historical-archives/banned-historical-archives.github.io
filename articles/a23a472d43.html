[{"year":1966,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们一定要把资产阶级代表人物“拉下马”最敬爱的党中央最敬爱的毛主席："},{"type":"paragraph","text":"我们怀着无比兴奋的心情，收听了中共中央关于无产阶级文化大革命的决定。这个决定最完整地体现了毛泽东思想，最充分地体现了革命群众的意愿。我们一千个、一万个拥护这个决定。"},{"type":"paragraph","text":"我们一定要认真学习这一决定，忠实执行这一决定，积极宣传这一决定，勇敢捍卫这一决定。我们一定要更高地举起毛泽东思想伟大红旗，把均县一中的无产阶级文化大革命搞深、搞透、搞彻底，不把资产阶级代表人物“拉下马”，不把一切牛鬼蛇神打倒，不砸碎旧的教育制度，不结束资产阶级知识分子统治我们学校的现象，我们决不收兵。我们一定要遵循毛主席的教导：既学文，又学工，学农，学军，也要积极参加批判资产阶级的斗争。"},{"type":"paragraph","text":"伟大的中国共产党万岁！"},{"type":"paragraph","text":"我们最敬爱的伟大领袖和导师毛主席万岁！"},{"type":"paragraph","text":"无产阶级文化大革命万岁！"},{"type":"paragraph","text":"湖北省均县第一中学全体革命师生员工"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a23a472d43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
