tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志对马克思主义认识论有哪些新的贡献","authors":[],"parts":[{"type":"paragraph","text":"近年来，我国理论界一些同志就毛泽东同志对发展马克思主义认识论所作的贡献进行了研究，这些同志的意见是："},{"type":"paragraph","text":"一、毛泽东同志根据马列的论述，作出了马克思主义的认识论是“能动的革命的反映论”的科学概括。"},{"type":"paragraph","text":"二、毛泽东同志对实践的含义和内容作了新的概括。"},{"type":"paragraph","text":"三、毛泽东同志把马列提出的实践是认识论的基础的原理具体化了。"},{"type":"paragraph","text":"四、毛泽东同志具体地论述了列宁关于认识的辩证途径的原理。"},{"type":"paragraph","text":"五、毛泽东同志根据马列的论述，把认识论、辩证法和唯物史观紧密结合在一起，这是对马克思主义认识论的又一贡献。"},{"type":"paragraph","text":"六、毛泽东同志坚持理论和实践相结合的原则，并把这一原则运用于各项实际工作中，极大地丰富和具体化了这一原则的内容。"},{"type":"paragraph","text":"（摘自《哲学研究》1981年第5期）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df3eabcec9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
