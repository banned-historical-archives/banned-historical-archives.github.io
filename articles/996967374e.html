hors":[],"dates":[{"year":1969,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海化工机械厂革委会认真学习“九大”文献，总结前阶段的清队工作，克服了右倾麻痹思想，进一步发动广大群众向阶级敌人进攻，形成一个大学习、大批判的热潮。"},{"type":"paragraph","text":"去年三月，厂革委会根据毛主席的对敌斗争思想，发动群众大揭大议，揪出了一批阶级敌人，并经过内查外调，对一批对象进行了定案处理。这时，一部分同志产生了“松口气”的思想，今年五月，开始集中精力抓整党，放松了清队工作，放松了革命大批判。"},{"type":"paragraph","text":"我们一放松，一小撮阶级敌人就趁机嚣张起来，拒绝革命群众对他们的监督改造，拒绝交代自己问题。还有一个坏家伙公然贴出“大字报”，“抗议”革命群众对他的批判、审查，恶毒地攻击前阶段的清队工作。面对这些情况，大部分人主张把这些搞翻案的家伙好好地斗一斗，煞煞反革命气焰，但也有一些人认为“目前在讲团结，不要扩大打击面”，还有些人认为反正大局已定，几个小泥鳅翻不起什么大浪，不要把精力放在他们身上，影响我们的前进步伐。"},{"type":"paragraph","text":"为此，厂革委会立即举办学习班，反复学习了毛主席的最新指示:“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。”对照前一阶段的工作，大家深深感到无产阶级松一松，一小撮阶级敌人就趁机起来，兴风作浪，搞翻案。因此，厂里清队工作还必须认真抓紧，必须深入持久地开展革命大批判，否则就会前功尽弃。在提高认识的基础上，厂革委会根据林副主席在政治报告中指出的:“阶级敌人如果再兴风作浪，发动群众把他们再一次斗倒就是了。”在各部门举办各种不同类型的学习班，用政策武装群众的同时，进一步发动广大革命群众积极开展革命的大批判，把“死老虎”、“活靶子”一个一个狠狠地批，以活生生的阶级斗争事实教育广大干部和群众，克服了“松口气”、“摆摆平”的麻痹思想，并密切注视着阶级斗争的新动向，向阶级敌人发动更猛烈的进攻。"},{"type":"paragraph","text":"(上海化工机械厂革委会政工组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"996967374e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
