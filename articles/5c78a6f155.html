rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一定要把毛泽东思想真正学到手","authors":["通信兵某部二营全体指战员"],"parts":[{"type":"paragraph","text":"在波澜壮阔的无产阶级文化大革命取得了伟大胜利的时刻，党的第九次全国代表大会，在伟大领袖毛主席亲自主持下隆重开幕了！这是毛泽东思想的伟大胜利，是毛主席革命路线的伟大胜利！我们千遍万遍地欢呼：毛主席万岁！万万岁！"},{"type":"paragraph","text":"敬爱的林副主席是毛主席的亲密战友，最好的学生。林副主席对毛泽东思想学得最好，领会得最深，用得最活。自从林副主席主持军委工作以来，我们大大提高了贯彻执行毛主席的建军路线的自觉性，坚决按照林副主席着重政治建军的方针原则去做，把活学活用毛泽东思想、突出无产阶级政治放在一切工作的首位。在战备训练中，我们坚持用毛泽东思想练兵；在生产劳动中，我们认真贯彻毛主席的“五·七”光辉指示，不怕酷暑严寒，不怕千苦万难，树立了“备战、备荒、为人民”的思想；在保卫祖国的斗争中，我们一不怕苦，二不怕死，为人民立新功。几年来，我们营的几个连队都评上了四好。去年，我们营的代表光荣地参加了国庆观礼，最幸福地见到了伟大领袖毛主席，这是我们全体同志最大的光荣，最大的幸福。"},{"type":"paragraph","text":"大海航行靠舵手，干革命靠毛泽东思想。战无不胜的毛泽东思想是我们的命根子，是一切胜利的保证。我们一定要以林副主席为光辉榜样，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的革命路线。一定要乘“九大”的万里东风，进一步开展活学活用毛泽东思想的群众运动，用毛主席关于无产阶级专政下继续革命的伟大理论武装头脑，把毛泽东思想真正学到手，更好地“抓革命，促生产，促工作，促战备”，百倍提高警惕，随时准备粉碎美帝苏修的任何武装挑衅，誓死保卫伟大的社会主义祖国。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c78a6f155"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
