[{"year":1952,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523o020601.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(17)余桂铨等由北京回重庆后，召开了“总结经验，布置任务会议”，特别检讨了到北京谈判工作中的缺点是“事前准备不够”，“和工业部联系差”。会议决定:“今后要靠拢工业部”。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523o020602.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(18)他们要求西南军政委员会工业部成立“西南区公私营机器厂承造纺织机技术委员会”，实际上只是把非法的“十一厂联络处”换了个公开名义。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523o020603.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(19)一九五一年冬，“星四聚餐会”的首脑分子高功懋又亲自出马，把承办修船造船工程的六工厂所组织的“星六聚餐会”加上民生等六厂，组成“造船小组”，专门垄断国家的造船工程。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523o020604.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张伯诚,汪伟光,王木天\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(20)这个“造船小组”曾经骗得长江航务局重庆分局的“批准”，而且还吸收了国营川江船舶厂参加。"},{"type":"paragraph","text":"张伯诚　汪伟光　王木天　合绘"},{"type":"paragraph","text":"钱子凡　改编\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱子凡\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf9196d339"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
