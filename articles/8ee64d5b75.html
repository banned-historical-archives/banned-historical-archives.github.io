晰","重庆"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"寻觅天涯无去路（诗）","type":"title"},{"text":"重庆景晰","type":"authors"},{"text":"[原编者按：在这首诗中，他对党大肆诽谤，说：“解放后是红色恐怖”，共产党是“认贼作父”、“有眼无珠”等等。企图挑起群众对党的不满和对他的同情。]","type":"paragraph"},{"text":"解放前白色恐怖。","type":"paragraph"},{"text":"解放后又是红色恐怖。","type":"paragraph"},{"text":"逼得我有怨（宛）无处申诉，","type":"paragraph"},{"text":"寻觅天涯无去路。","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"春去矣！","type":"paragraph"},{"text":"到中立国去避难。","type":"paragraph"},{"text":"抑或到峨嵋山去削发当尼姑（和尚）","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"我到底是啥？","type":"paragraph"},{"text":"只不过是青年学生。","type":"paragraph"},{"text":"看不惯的事要说，","type":"paragraph"},{"text":"见不平的事要骂。","type":"paragraph"},{"text":"穷光棍！","type":"paragraph"},{"text":"硬骨头！","type":"paragraph"},{"text":"恐怖帽子何时休？","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"衷心的向亲爱的党进一言，","type":"paragraph"},{"text":"难道解放前被特务抓进集中营的人是有罪的么？","type":"paragraph"},{"text":"不被信任！","type":"paragraph"},{"text":"怀疑！","type":"paragraph"},{"text":"反而把昨天投靠蒋介石的人，","type":"paragraph"},{"text":"今天当成忠实信徒。","type":"paragraph"},{"text":"你真是有眼无珠！","type":"paragraph"},{"text":"认贼作父。","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"久思之！","type":"paragraph"},{"text":"酸泪暗流谁与顾？","type":"paragraph"},{"text":"悲苍天残月，","type":"paragraph"},{"text":"寒星千点，","type":"paragraph"},{"text":"秋风妒！","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"无语矣！","type":"paragraph"},{"text":"缕缕情绪，","type":"paragraph"},{"text":"万种闲愁。","type":"paragraph"},{"text":"烟波千里外，","type":"paragraph"},{"text":"未语泪先流。","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第二集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ee64d5b75"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"
