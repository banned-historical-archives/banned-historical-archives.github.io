art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛主席关于民兵工作“三落实”指示十周年总参谋部和总政治部发出联合通知，要求各级军区和人民武装部门广泛开展活动，进一步推动和加强民兵建设","authors":[],"parts":[{"type":"paragraph","text":"本报讯 为纪念伟大领袖毛主席关于民兵工作“三落实”指示十周年，进一步推动和加强民兵建设，总参谋部、总政治部最近发出开展纪念活动的联合通知。"},{"type":"paragraph","text":"通知说：今年六月十九日是毛主席关于“民兵工作要做到组织落实、政治落实、军事落实”的指示十周年。为了进一步促进民兵工作“三落实”，各地应在地方党委的统一领导下，在民兵基层组织中广泛开展纪念活动。在这一活动中各级军区和人民武装部门必须遵照毛主席关于“路线是个纲，纲举目张”的教导，在地方党委的统一领导下，认真对民兵干部和广大民兵干部和广大民兵进行思想和政治路线方面的教育。组织民兵认真学习毛主席的人民战争思想和民兵工作“三落实”的指示，深入批判刘少奇一类骗子破坏民兵建设的罪行，进一步提高对民兵战略地位的认识，增强捍卫毛主席革命路线的自觉性，积极搞好民兵工作“三落实”。"},{"type":"paragraph","text":"通知要求各级军区和人民武装部门，要深入基层调查研究，检查贯彻执行毛主席关于民兵工作“三落实”指示的情况，认真总结经验，采取有效措施，进一步加强民兵建设。"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43ac007c50"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
