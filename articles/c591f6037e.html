script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"怀着对毛主席无限热爱的深厚感情　为夺取文化大革命全面胜利出力  全国亿万贫下中农和社员踊跃交售丰收粮","authors":[],"dates":[{"year":1968,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"怀着对毛主席无限热爱的深厚感情　为夺取文化大革命全面胜利出力"},{"type":"paragraph","text":"全国亿万贫下中农和社员踊跃交售丰收粮"},{"type":"paragraph","text":"广大贫下中农和社员群众说，是毛主席领导我们又一次获得丰收，我们交的是丰收粮；是无产阶级文化大革命推动我们在农业战线上打了胜仗，我们交的是胜利粮。向国家多交粮、交好粮，就是表达我们对伟大领袖毛主席的无限热爱、无限忠诚"},{"type":"paragraph","text":"新华社十五日讯　在夺取无产阶级文化大革命全面胜利的凯歌声中，获得今年农业丰收的我国农村亿万贫下中农、社员群众怀着对伟大领袖毛主席无限热爱的深厚无产阶级感情，在党的八届扩大的十二中全会公报的巨大鼓舞下，踊跃向国家交售粮食。目前，全国粮食征购入库已经进入高潮。"},{"type":"paragraph","text":"到十二月五日止，安徽、江西已经完成了全年粮食征购计划。河南、广西、湖南、上海、四川、山东等省、市、自治区已经接近完成全年粮食征购计划。江苏、湖北、浙江、广东已经完成全年粮食征购计划的百分之八十多。广大贫下中农说：我们要用踊跃向国家交售粮食的实际行动，为毛主席争气，为我们的政权——新生的革命委员会争光，为夺取无产阶级文化大革命的全面胜利出力！"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。各地贫下中农和社员群众在交售粮食中，高举毛泽东思想伟大红旗，更加广泛深入地开展了群众性的忠于毛主席、忠于毛泽东思想、忠于毛主席无产阶级革命路线的“三忠于”活动。各地各级革命委员会还组织了毛泽东思想宣传队深入到社、队，同贫下中农一起大办毛泽东思想学习班，学习毛主席关于“必须把粮食抓紧”和“备战、备荒、为人民”的伟大指示以及其它指示。广大贫下中农和社员群众说：是毛主席领导我们又一次获得丰收，我们交的是丰收粮，是无产阶级文化大革命推动我们在农业战线上打了胜仗，我们交的是胜利粮。我们向国家多交粮、交好粮，就是表达我们对伟大领袖毛主席的无限热爱、无限忠诚。"},{"type":"paragraph","text":"在交售粮食中，我国从南方到北方，到处呈现出一派火热的景象。参加送粮大队的贫下中农、社员群众，高举伟大领袖毛主席像、毛主席语录牌，敲锣打鼓，把粮食送到国家粮食收购站。江西上饶县有一个生产队，十八个六十岁以上的老大娘组织了一个送粮队，她们手提篮子和送粮大军一起送了一千多斤丰收粮。河南项城县南屯公社东风大队，连续五年夏季一次完成全年粮食交售任务。今年丰收以后，这个大队的贫下中农在学习中，大议为革命种田的道理。他们提出：我们要站在东风队，眼望北京城，为革命种田，不断立新功。大家作出决定，又向国家多售了大量余粮。"},{"type":"paragraph","text":"在党的八届扩大的十二中全会公报的鼓舞下，广大贫下中农和社员群众，遵照毛主席“千万不要忘记阶级斗争”的伟大教导，在向国家交售粮食的高潮中，联系当地实际，狠批叛徒、内奸、工贼刘少奇及其在当地的代理人所推行的“阶级斗争熄灭论”、“三自一包”、“四大自由”、“物质刺激”以及在粮食征购工作中推行的“多留少卖”、“留好卖次”等反革命修正主义黑货，同时批判斗争了破坏粮食征购工作的地、富、反、坏、右分子和投机倒把分子，在田间、晒场和粮食收购站摆开了革命大批判的战场。通过轰轰烈烈的革命大批判，广大贫下中农和社员群众进一步提高了阶级斗争和两条路线斗争觉悟，推动了粮食征购工作。"},{"type":"paragraph","text":"现在，我国农村广大贫下中农、社员群众在深入学习党内两条路线斗争史的群众运动中，继续积极组织送粮队，争取很快地完成和超额完成向国家交售粮食的任务，为迎接党的第九次全国代表大会的召开，为夺取无产阶级文化大革命的全面胜利和社会主义建设事业的新的跃进，作出自己的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c591f6037e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
