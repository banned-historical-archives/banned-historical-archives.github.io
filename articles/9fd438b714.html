" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"七七”宣言发表后应采取的策略方针","alias":"","parts":[{"type":"paragraph","text":"“七七”宣言\"发表后应采取的策略方针"},{"type":"paragraph","text":"（1946年7月6日）各局，及周、叶、伍："},{"type":"paragraph","text":"中央“七七”宣言尖锐批评美国及中国反动派，唤起国人起来救国，足以振奋人民意志，置反动派于困难地位，以便在人民面前孤立他们。但同时指出，加强对美国民主人士之联系，主张国内开各党派在内的政治协商会议，不论何人，只要赞成政协者均表欢迎。因此，各地对北平执行部及各小组仍应照前指示?尊重国、美两方代表，并注意拉拢美国一切人员。对马歇尔不要公开说他好，"},{"type":"paragraph","text":"[1]指《中国共产党中央委员会为纪念“七七”九周年宣言》。宣言呼吁：（一）立即重行发布全国（包括东北）无例外无条件无限期地停止冲突、停止运兵、停止建立工事、停止征兵的命令。（二）重开政治协商会议，改组国民党一党专政的政府为民主联合政府。（三）复员裁兵，废除军阀制度。（四）美国政府停止武装干涉中国内政，停止助长中国内战，停止派遣军事顾问团，立即自动撤退一切在华陆海空军。"},{"type":"paragraph","text":"[2]周，指周恩来。叶，指叶剑英，当时任军事调处执行部中共方面的代表。伍，指伍修权，当时任北平军事调处执行部第二十七执行小组中共方面参谋长。"},{"type":"paragraph","text":"[3]指中共中央1946年6月22日给各中央局的电报。参见《正确对待也不要公开说他不好，在谈判中仍须经过他来缓和局面。对各地美军，仍应避免冲突；对国民党军队，则看彼方态度，彼打我亦打，彼停我亦停。对谈判，我党已有所让步，但国民党贪得无厌，提出很多无理要求，应予拒绝。美国反动派与中国反动派面前均有许多困难，我们对于他们的困难条件应当有足够估计，以便利用他们的困难进行坚决的但是适当的斗争，争取时局好转。若干中间人士必以为我们宣言所取态度太强硬，应向他们解释：美国和中国反动派均利用人民对他们的丑恶行为认识模糊，欺压人民，从中取利；我们应当尖锐揭穿，方能使彼辈在人民面前孤立起来，方能打退其进攻。"},{"type":"paragraph","text":"中央午鱼"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":467,"page_end":468},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fd438b714"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
