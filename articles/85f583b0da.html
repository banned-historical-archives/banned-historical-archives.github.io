art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"强有力的政治工作是什么？","authors":["关一漫"],"parts":[{"type":"paragraph","text":"“讲战时政治工作经验，给你印象最深的是什么？”我向一位从边防归来的政治干部这样提出问题。"},{"type":"paragraph","text":"“四个字：以身作则。”他好象是不假思索地回答我：“这是最强有力的政治工作。战场上，这一条特别重要，也特别有效。”"},{"type":"paragraph","text":"以身作则，真是言简意赅。我脑子里积累的自卫还击作战中政治工作的典型事例，在“以身作则”四个字下面，一下子串连起来，活跃起来——"},{"type":"paragraph","text":"模范指导员何锡祥在冲锋时，向战士一挥手：“跟我上”；撤退时，他大声命令：“我来掩护！”"},{"type":"paragraph","text":"指导员吴世忠，在带领部队发起攻击时，恰巧碰上了一段布雷区。绕道过，会贻误战机；现排雷，来不及了。他当机立断，命令通信员向后传：“踩着我的脚印走！”"},{"type":"paragraph","text":"爱兵模范张玉田三次推迟婚期，英勇地奔赴战场。在战斗中他时时刻刻想着要战士吃好、休息好。最后为了抢救伤员献出了生命。"},{"type":"paragraph","text":"著名的全国战斗英雄、副师长李万余，亲自带领尖刀营迅猛穿插，断敌退路。战士们赞叹：“不用说老英雄亲自指挥，就是往阵地上这么一站，就给我们增添了巨大的力量！”……"},{"type":"paragraph","text":"“跟我上！”“我来掩护！”“踩着我的脚印走！”要说简练，恐怕没有比这更简练的语言了。为什么这几句简短的话语会产生那么大的战斗力量呢？关键就在于：是以身作则，不是以“嘴”作则。如果是只说不做，那就败坏了政治工作，那样的政工干部也就不会有威信。"},{"type":"paragraph","text":"由此我联想到一件事，记得是登过报纸的——"},{"type":"paragraph","text":"下着大雨，河堤决了口。一位干部打着伞在岸上喊：“下去堵口呀，下呀！”没人下。他似乎体会到了什么，收起雨伞，甩掉鞋袜，第一个跳下去，群众也一个个跟着跳下去。决口堵住了。"},{"type":"paragraph","text":"以身作则是强有力的政治工作，无论地方，无论部队，无论平时，也无论战时，道理都是一样的。"},{"type":"paragraph","text":"邓小平同志在全军政工会议上的讲话中指出：领导干部“以身作则非常重要。群众对干部总是要听其言，观其行的。连长指导员不以身作则，就带不出好兵来；领导干部不做出好样子，就带不出部队的好风气，就出不了战斗力”。"},{"type":"paragraph","text":"干部，特别是政治干部以身作则，是我军的优良传统。按传统的老话说，就是“两前两后”——吃苦在前，享受在后；冲锋在前，退却在后。红军时代的政治工作条例就规定：“政治指导员进行政治工作全凭本身直接接近群众和熟识红军战士”，“政治指导员不论在执行自己的职务上和个人行动上，均须做全体军人的模范，并且要在言论和事实上来表现”。"},{"type":"paragraph","text":"正因为这样，我军的政治工作有崇高的威信；正因为这样，我军的政治干部受到广大指战员的爱戴。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85f583b0da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
