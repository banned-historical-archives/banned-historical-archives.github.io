" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"济南各界对镇压反革命的反映","authors":[],"dates":[{"year":1951,"month":5,"day":9}],"is_range_date":false,"parts":[{"text":"济南各界对镇压反革命的反映","type":"title"},{"text":"【山东分社九日讯】济南广大人民对政府大张旗鼓镇压反革命热烈拥护。有一个六七十岁的老大爷说：政府可睡醒了。很多未参加公审大会的群众，埋怨干部说：“为什么这样的会不让我去。”有人要求政府“以后再枪毙特务，应该让他先游游街”。但也有个别群众顾虑检举特务后，抓起来放出后被特务报复。民主人士对政府不逮捕某些人有猜疑，如民革委员孔繁霨说：“汉奸道尹方永昌还在济南，为什么不捉？群众就误解政府想用他。”又说：“王耀武的警备司令李杏村，据说在北京，也应当捉。”有的民主人士在镇压反革命后坦白了自己的历史：如民盟盟员杨祖培坦白出曾任青岛国民党区党部委员等职。民建会员孙居辰(现任工商联秘书主任)坦白曾参加过国民党。文教界尚有人怀疑被捕分子是否有确凿的罪状。如育英中学校长曲涵三说：“此次被捕的教员李维华，一般同仁都觉得平常看不出他有反革命行为。”因此，有一个教员说：“政府逮捕的人，应向群众进行教育，不然不知道罪状，群众就会误解。”工商界，一般很镇静。他们认为：“逮捕的都是‘匪特’、‘汉奸’、‘恶霸地主’，真正买卖不会被捕的。”镇压后，伪匪人员、地主表现恐慌害怕开始向群众低头表示要立功赎罪，到派出所坦白自首，也有个别地主大吃大喝等待被捕。","type":"paragraph"},{"text":"在镇压反革命方面济南已发现有一些反动流言。如立达中学教员杜星五在民盟邀请的中等教育界关于镇压反革命座谈会上说：我校学生有的说现在逮捕这么多的人是凑数，将来共产党不管你有无反革命罪行，还要把所有资本家、地主一网打尽。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年5月12日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"192d403d93"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
