<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji51","name":"毛泽东全集第51卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"和恩古瓦比的谈话","alias":"","parts":[{"type":"paragraph","text":"和恩古瓦比的谈话!!"},{"type":"paragraph","text":"（1973年7月29日）"},{"type":"paragraph","text":"毛泽东（以下简称毛）：中国跟你们非洲国家差不多，全世界的帝国主义都压迫我们，现在苏联，我们也说它是帝国主义，因为它也压迫我们。"},{"type":"paragraph","text":"周恩来（以下简称周）：我们叫它社会帝国主义，因为列宁说过，披着社会主义外衣，实际上是帝国主义。"},{"type":"paragraph","text":"毛：我们希望你们非洲国家和地区一个个统统独立。第二，团结起来，逐步，急了也不行，逐步统一起来。还有拉丁美洲、亚洲日本除外的一切国家一我们也是这么希望。日本为什么除外呢？它不属于所谓的第三世界。"},{"type":"paragraph","text":"毛：我也不知道我们的大使馆在非洲各国犯过错误没有，我也不知道什么叫新殖民主义。如果中国人在你们国家，一切非洲独立国家，在那里称王称霸，自以为了不起，那么这种态度就是不对的了。第二个问题，就是什么叫新殖民主义，我不大清楚。"},{"type":"paragraph","text":"周：就是像美帝国主义那样，没有殖民地，但有特权，实际上，苏联也是，即不是像老殖民主义那样直接统治。"},{"type":"paragraph","text":"因为共产党如果不支持世界人民革命，那还算共产党？我说，你（指恩古瓦比）也要采取这种态度，就是要站在各国人民方面。"},{"type":"paragraph","text":"[1]这是毛泽东、周恩来和刚果人民共和国总统恩古瓦比谈话的一部分。"},{"type":"paragraph","text":"和恩古瓦比的谈话恩古瓦比（以下简称恩）：是这样。"},{"type":"paragraph","text":"毛：总而言之，应该偏向代表多数人的政府。如果偏向代表少数的人，那就不大妥了。"},{"type":"paragraph","text":"有时候在外交政策上也不得不搞。譬如美帝国主义，它们是少数人统治多数人，所以叫帝国主义。但是我们跟它往来，因为现在那个左派好是好，但是没有权力，中简派也没有权力，就是这个右派，反共最厉害的，尼克松，他有权力。"},{"type":"paragraph","text":"毛：现在这个世界，不要相信是平安无事。周：天下大乱，毛主席常说是大乱。"},{"type":"paragraph","text":"毛：现在的局势是“山雨欲来风满楼”。但是这个山雨要来，还没有来呢。可是风来了，而且风很急啊！不晓得你们非洲人感觉怎么样？"},{"type":"paragraph","text":"恩：我们要保持警惕，因为现在有表面和平，但实际上并不如此。大家都谈“安全”，但这只是表面现象，所以我们对世界和平持怀疑态度。"},{"type":"paragraph","text":"毛：我们根本不相信，什么“和平”啊，“安全”啊。"}],"authors":["毛泽东"],"dates":[{"year":1973,"month":7,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":432,"page_end":433},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e374901a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
