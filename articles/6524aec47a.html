ar":1952,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社北京二日电:朝鲜民主主义人民共和国最高人民会议常任委员会委员长金枓奉、德意志民主共和国总统皮克、罗马尼亚工人党总书记乔治乌——德治、保加利亚部长会议主席契尔文科夫等纷纷致电毛主席祝贺新年。朝鲜民主主义人民共和国内阁首相金日成、越南民主共和国外交部长黄明监、罗马尼亚人民共和国外交部长安娜·波克、德意志民主共和国外交部长赛丁格尔也纷纷打电报给周总理祝贺新年。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6524aec47a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
