tart":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的思想吸引了整个世界","authors":[],"parts":[{"type":"paragraph","text":"新华社金沙萨一九七六年十二月二十五日电 《扎伊尔》周刊在最近一期上刊载文章指出，“中国伟大的舵手毛泽东的逝世是在各国人民历史上，甚至在整个人类的历史上打上不可磨灭的印记的重大事件之一”。"},{"type":"paragraph","text":"文章指出，毛主席是罕见的人物之一，他的思想不仅根本改变了自己国家的面貌，而且还影响了整个世界。"},{"type":"paragraph","text":"文章说，毛主席的“著作往往是深入浅出地表达出来，正是这样，它吸引了世界，特别是整个非洲”。"},{"type":"paragraph","text":"文章在谈到长征、抗日战争、国内战争和文化大革命时指出，毛主席作为“杰出的领导人、中国伟大的领袖”成功地领导中国人民取得了胜利。"},{"type":"paragraph","text":"文章在谈到粉碎“四人帮”以后说，毛主席的遗产经受了各种风暴，变得更加坚不可摧，中国将按毛主席的理想与世长存。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f702d29a87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
