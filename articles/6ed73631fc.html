","authors":["胡耀邦"],"dates":[{"year":1961,"month":9,"day":7}],"is_range_date":false,"parts":[{"text":"胡耀邦和位山水利工程局机关团员的讲话摘要","type":"title"},{"text":"胡耀邦","type":"authors"},{"text":"机关团员要特别注意做好两件事情。","type":"paragraph"},{"text":"一是要反映情况。这是帮助领导机关改进工作，克服官僚主义的好办法。要发动团员和青年经常和家里通信，问问生产、生活、干部作风怎么样，然后积极向领导上反映。","type":"paragraph"},{"text":"其次要把机关生产搞好。第一种粮食，第二种油料，第三种蔬菜。也划分生产队或者在生产小组，采取多劳多得、超产奖励的办法。","type":"paragraph"},{"text":"机关团组织开了许多会：“我们要提高觉悟”“我们要艰苦奋斗”，但是光喊不行。政治工作不是说些话，搞好机关生产就是很好的政治工作。也可以象农村一样实行“三包”，但要包的低些。要好好搞超产奖励，不要一百斤奖五斤，奖他个七十斤，把收获的东西捎回家去也可以。","type":"paragraph"}],"comments":[],"origin":"山东省省级机关革命造反总指挥部《彻底肃清胡耀邦在山东的流毒》，1967年7月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ed73631fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
