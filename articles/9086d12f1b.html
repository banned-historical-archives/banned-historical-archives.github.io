[{"year":1967,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想红满天（田间盘歌）"},{"type":"paragraph","text":"解放军某部文化工作队　丁树荣"},{"type":"paragraph","text":"问：天上什么闪金光？"},{"type":"paragraph","text":"地上什么亮堂堂？"},{"type":"paragraph","text":"什么星星指方向？"},{"type":"paragraph","text":"什么声音震山岗？"},{"type":"paragraph","text":"答：天上太阳闪金光，"},{"type":"paragraph","text":"地上明灯亮堂堂，"},{"type":"paragraph","text":"北斗星呀指方向，"},{"type":"paragraph","text":"惊蛰雷声震山岗。"},{"type":"paragraph","text":"问：什么要比太阳红？"},{"type":"paragraph","text":"什么要比明灯亮？"},{"type":"paragraph","text":"什么好象北斗星？"},{"type":"paragraph","text":"什么要比春雷响？"},{"type":"paragraph","text":"答：毛主席比太阳红，"},{"type":"paragraph","text":"毛主席著作比明灯亮，"},{"type":"paragraph","text":"毛泽东思想是北斗星，"},{"type":"paragraph","text":"毛主席话比春雷响。"},{"type":"paragraph","text":"问：什么花开永朝阳？"},{"type":"paragraph","text":"什么道路最宽广？"},{"type":"paragraph","text":"什么革命震世界？"},{"type":"paragraph","text":"什么人哟当闯将？"},{"type":"paragraph","text":"答：葵花朵朵永朝阳，"},{"type":"paragraph","text":"革命化道路最宽广，"},{"type":"paragraph","text":"文化革命震世界，"},{"type":"paragraph","text":"革命造反派当闯将。"},{"type":"paragraph","text":"问：什么开花一色蓝？"},{"type":"paragraph","text":"谁的干劲冲破天？"},{"type":"paragraph","text":"哪个带头前面走？"},{"type":"paragraph","text":"何人下乡来支援？"},{"type":"paragraph","text":"答：胡麻开花一色蓝，"},{"type":"paragraph","text":"贫下中农干得欢，"},{"type":"paragraph","text":"革命干部前面走，"},{"type":"paragraph","text":"解放军下乡来支援。"},{"type":"paragraph","text":"问：什么虽小能担山？"},{"type":"paragraph","text":"什么飞快把地翻？"},{"type":"paragraph","text":"什么挥舞绘新图？"},{"type":"paragraph","text":"什么换来米粮川？"},{"type":"paragraph","text":"答：扁担虽小能担山，"},{"type":"paragraph","text":"犁铧飞快把地翻，"},{"type":"paragraph","text":"锄头挥舞绘新图，"},{"type":"paragraph","text":"汗珠换来米粮川。"},{"type":"paragraph","text":"合：抓革命，促生产，"},{"type":"paragraph","text":"两条战线捷报传，"},{"type":"paragraph","text":"文化革命干到底，"},{"type":"paragraph","text":"毛泽东思想红满天！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9086d12f1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
