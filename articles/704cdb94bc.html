uthors":["《中央书记处会议纪要》十二届第161号"],"dates":[{"year":1984,"month":10,"day":24}],"is_range_date":false,"parts":[{"text":"中共中央书记处关于广西问题的会议纪要（节录）","type":"title"},{"text":"《中央书记处会议纪要》十二届第161号","type":"authors"},{"text":"十月二十四日上午，中央书记处由赵紫阳同志主持，举行第一百六十一次会议。","type":"paragraph"},{"text":"会议讨论了广西壮族自治区党委和政府《关于广西经济工作的汇报提纲》。讨论中提出了如下意见：","type":"paragraph"},{"text":"一、正确认识广西的形势。在“文革”中，广西是受林彪、“四人帮”破坏的“重灾区”之一，党的十一届三中全会以后，由于“左”的思想和其他因素的影响，在相当长的一段时间内党的政策没有及时落实发挥应有的作用，各项工作特别是经济工作进展不大，当前仍有相当大的一部分地区，处于比较贫穷落后的状态。去年以来，中央帮助广西自治区党委调整了领导班子，处理“文革”遗留问题的工作进行得比较稳妥，整党工作也搞得比较顺利，这就为广西开创各项工作的新局面打下了良好的基础，广西的形势会很快发生突变，政通人和、经济繁荣的局面将很快到来。但同时也要看到，广西彻底否定“文革”、彻底否定派性和完成整党的任务还很艰巨，必须认真对待。希望广西自治区党委和政府认真学习、贯彻执行党的十二届三中全会精神，处理好“文革”遗留问题，抓好整党，促使广西经济尽快翻身。","type":"paragraph"},{"text":"来源：《处理“文革”遗留问题，清理“三种人”文件汇编（第一册）》广西壮族自治 区党委整党办公室，1986年8月","type":"appellation"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"704cdb94bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
