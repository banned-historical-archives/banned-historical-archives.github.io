rs":[],"dates":[{"year":1966,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新加坡《阵线报》盛赞中国文化大革命"},{"type":"paragraph","text":"红卫兵使世界上一切牛鬼蛇神发抖"},{"type":"paragraph","text":"新华社六日讯　新加坡消息：新加坡《阵线报》一日发表评论，严正谴责帝国主义、现代修正主义和各国反动派对中国无产阶级文化大革命和在这个大革命中的急先锋红卫兵的无耻咒骂和诬蔑。"},{"type":"paragraph","text":"评论说：中国正在进行的无产阶级文化大革命，是一场“伟大的革命”。"},{"type":"paragraph","text":"评论指出，这场大革命，“不仅给予中国国内的牛鬼蛇神歼灭性的打击，而且也无比沉重地打击了世界上的一切大小牛鬼蛇神。”"},{"type":"paragraph","text":"评论说，美帝国主义和各国反动派长期以来都把在中国复辟资本主义的希望，寄托在中国的第二、第三代身上。在这场大革命中，中国青少年成了文化大革命的闯将，成为资本主义、修正主义不共戴天的死敌和消灭者，“这怎不叫帝国主义和大小牛鬼蛇神惊惶万状，痛哭流涕，咬牙切齿，悲观绝望呢？”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae7878cc10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
