script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削和掠夺的典范苏联控制印度越深，它的社会帝国主义面目就越暴露，它树立的　剥削发展中国家的‘典范’就会从反面教育更多的人","authors":[],"dates":[{"year":1975,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联社会帝国主义大肆宣扬苏联同印度的经济关系是“友好合作”和“平等互利”的关系，说这种关系已经成为苏联同发展中国家之间经济关系的“典范”。"},{"type":"paragraph","text":"既然是“典范”，那当然是要推广采用的，所以很有必要让大家见识见识，以免暴殄天物。印度是此种“典范”关系的一方，因此应首先看看印度舆论对这一“典范”的描绘。《印度时报》三月二十一日登载了一幅漫画，画着苏修头目勃列日涅夫一副狡猾、贪婪的面孔，口中念念有词地说:“当然，我们的友好关系仍然和过去任何时候一样牢固。但是，事情该怎么办就怎么办!”他一边说，一边把两只手伸进印度财政部长的口袋，把里面的钞票都掏光。画面上，墙头挂着表明从苏联进口急剧增长的图表。桌上摆着一张账单，说明由于苏联当局单方面强行改变印度卢比对苏联卢布的比价，印度偿还给苏联的债款要大大增加。"},{"type":"paragraph","text":"这幅漫画形象地表现了苏联社会帝国主义同印度以及其他发展中国家发展经济关系的真相，也是给社会帝国主义所喧叫的“典范”下了一个很精确的注释。苏联政府说的是“友好合作”，“平等互利”，干的却是赤裸裸的掠夺、剥削和榨取!"},{"type":"paragraph","text":"《印度时报》这张漫画既包含着无限的辛酸，也是对苏修社会帝国主义的愤怒的控诉。"},{"type":"paragraph","text":"印度报纸曾经多次揭露，苏联社会帝国主义者以高价向印度倾销了大批质量低劣、技术过时的机器装备，以低价攫取了印度许多农副产品，有时还倒手转卖，牟取暴利，甚至同印度私商暗中勾结，让印度私商把贸易利润的百分之十交给他们。向印度倾销报废了的吉普车、开不动的拖拉机的是他们；用五万卢比向印度购买仅仅原料就值七万五千卢比的铁路车辆的，也是他们。象这一类专门掏人腰包的勾当，统统是在“友好合作”、“平等互利”的幌子下干出来的。"},{"type":"paragraph","text":"这还不够，苏联最近又挖空心思，借口卢比贬值，逼印度多还债款。近年来，苏联当局已多次单方面调整印苏两国货币的比值，最近它又得寸进尺，干脆要印度方面在结算贸易和清偿过去的贷款方面也要按新的比值。这就是说，过去双方达成的协议都不算数，莫斯科说要怎么还账就怎么还账。据印度报纸估计，这一来，印度要多还的债款竟多达四十亿卢比。还债也得涨价，这真是新沙皇在他们同发展中国家的关系方面创造的一个新“典范”。"},{"type":"paragraph","text":"苏联控制印度越深，它的社会帝国主义的面目就越暴露，它树立的剥削发展中国家的“典范”就会从反面教育更多的人。领教的人越多，这种“典范”就越没有市场。"},{"type":"paragraph","text":"(新华社北京六月十九日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8329542c6b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
