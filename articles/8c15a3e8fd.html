ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"同意西北野战兵团六月作战方针","alias":"","parts":[{"type":"paragraph","text":"同意西北野战兵团六月作战方针"},{"type":"paragraph","text":"（1947年5月14日）周、陆，彭、习川，并告陈、谢："},{"type":"paragraph","text":"寒辰电悉。（一）完全同意六月作战方针，除留警七团于现地外，全军出陇东，先打新一旅，再打一百旅或其他顽部。（二）在目前短期内，陈谢部除以一部扫清吕梁顽敌开辟西进道路外，主力休整待命渡河。陈谢兵团过河后，或与边区兵团分开作战一时期，再集中作战；或开始即集中作战，依当时情况酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"辰寒申"},{"type":"paragraph","text":"[1]周，指周恩来。陆，指陆定一，当时任中共中央宣传部部长。彭、习，指彭德怀、习仲勋，当时分别任西北野战兵团司令员兼政治委员和副司令员。"},{"type":"paragraph","text":"[2]陈、谢，指陈、谢富治，当时分别任晋冀鲁豫野战军第四纵队司令员和政治委员。"},{"type":"paragraph","text":"[3]指1947年5月14日辰时周恩来关于同彭德怀、习仲勋等商定的6月份作战计划给毛泽东的电报。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":5,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":55,"page_end":55},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c15a3e8fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
