<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"洞庭大队民校以传播革命道理为己任积极辅导社员学习毛主席著作","authors":[],"dates":[{"year":1966,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　福建省莆田县涵江公社洞庭大队民校，在大队党支部领导下，从多方面协助社员学习毛主席著作，在“用”字上狠下功夫，并注意学得精一些，讲得精一些，学一点，用一点，讲求实效，提高了干部和群众的阶级觉悟，推动了生产和工作。"},{"type":"paragraph","text":"这所民校从群众生产劳动较忙、文化水平较低的实际情况出发，组织群众每十天或半月学一次，干部与知识青年每周学一次，学习分量不求多，除了普遍学习《为人民服务》、《愚公移山》等文章以外，还选学有关的语录。每次学一节，学一段，甚至一两句，力求弄懂一个观点，指导行动。学习形式因人制宜，干部、青年集中在一起学；一般社员按生产组织分小组学；对子女多、家务重、又愿意学的社员则个别教学。并且区别对象，提出不同要求。文化低的，要求认真听讲，领会精神，谈心得体会；有文化的，要求自学，讨论，写学习心得笔记。"},{"type":"paragraph","text":"为了使群众听懂，学懂，洞庭大队的党支部书记、宣传委员、团支部书记、民校校长和民校教师骨干等组成了一个中心辅导组，学习先走一步，认真备课，加强辅导。讲课时注意讲要点，讲精神，使大家懂得一篇、一段、一句的中心意思；尽可能结合本队的真人真事讲，使大家容易理解，印象深刻；还注意讲得通俗、口语化，联系生产、生活和思想实际，尽量做到有的放矢。"},{"type":"paragraph","text":"他们比较注意做什么就学什么，有什么问题就学什么问题，联系实际，活学活用。例如有些知识青年原来不大安心在农村，学习了《青年运动的方向》，明确了搞好农业就是干革命，精神面貌就有了很大变化。有的还被评为“五好青年”，受到团县委的表扬。在抗旱斗争中，有些人原来认为山高水远，劳力、工具不足，存在畏难情绪。学习了《愚公移山》一文后，社员们决心学习愚公的精神，引水上山头，终于使五十四亩受旱晚稻获得丰收。在搞科学实验时，有些人担心没经验，不敢大胆搞。学习了《人的正确思想是从那里来的?》以后，就在民校里设农技课，学科学技术，并且组织了科学研究小组，搞了九亩试验田，平均亩产近千斤。对科学种田起了推动作用。"},{"type":"paragraph","text":"这个大队的干部与群众尝到了学习毛主席著作的甜头，越学越想学，上民校的人也越来越多。现在已从一九六三年两个班四十二人，发展到九个班三百十八人。民校不仅成为传播毛泽东思想、宣传党的方针政策、巩固和扩大社会主义思想的有力阵地，而且已成为传授生产新技术、提高群众文化科学知识水平的重要场所。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"804dd90b2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
