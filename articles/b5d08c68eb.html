es":[{"year":1981,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社东京十月一日电　东京各大报在昨晚和今天的报道和评论中指出，中国人大常委会委员长叶剑英就台湾回归祖国实现统一提出的九项建议，切合时宜，具有重大而深远的意义。"},{"type":"paragraph","text":"《每日新闻》的社论说，叶剑英委员长这次提出的建议是“极为具体和现实的”。社论说，这九项建议以和平解决台湾问题为前提，希望它成为走向合作的第一步。"},{"type":"paragraph","text":"《每日新闻》还在报道中指出，“四人帮”下台以后，中国的政治路线在国际上受到欢迎，中国的外交威信正在逐步增高，这次发表的建议，将超过以往那些建议，受到国际上的关注。"},{"type":"paragraph","text":"《东京新闻》在报道中指出，“中国的新建议将会收到扣动那些在世界政治中业已孤立的台湾人的心弦的效果。”"},{"type":"paragraph","text":"《朝日新闻》的社论说，尽管国共两党的和解还有困难，但是中国抓住了历史时机，并想以此为转机形成广泛合作的潮流。这种不断争取和平统一祖国的姿态值得关注。这家报纸指出，中国对统一问题已经作了相当认真的考虑，并已经提到具体日程上来了。"},{"type":"paragraph","text":"日本广播协会电视台的评论指出，中国的九项建议强调两党对等谈判，这件事“具有重大而深远的意义”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5d08c68eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
