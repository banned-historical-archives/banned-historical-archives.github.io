art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想真正学到手","authors":["战士王忠康"],"parts":[{"type":"paragraph","text":"当我从收音机里听到党的八届十一中全会公报时，我对我国的社会主义革命和社会主义建设取得的伟大成就感到无比振奋，对世界革命的大好形势欢欣鼓舞。这一切，是毛泽东思想的新的伟大的胜利。公报是党要求我们学习毛泽东思想和运用毛泽东思想的一个伟大号召。全国人民在毛泽东思想哺育下，将在阶级斗争、生产斗争、科学实验三大革命运动中，得到锻炼，得到教育，取得更加辉煌的成果。"},{"type":"paragraph","text":"就拿我家所在的一个村子来说吧。自从大学毛主席著作以来，社员们牢记毛主席的教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”人人革命干劲十足，以大寨为榜样，把几百亩荒地变成了良田，社员们的生活一天比一天提高。他们常说：“毛主席的书是宝书，我们学了毛主席著作有使不完的劲。”"},{"type":"paragraph","text":"家乡人民取得的成绩深深地鼓舞了我。我是一个革命战士，一定要在斗争中活学活用毛主席著作，象王杰、刘英俊等英雄人物那样，一心为革命，一切为革命，树立无产阶级人生观。在战斗岗位上百倍提高警惕，紧握手中枪。不管是拿枪的敌人还是不拿枪的敌人，统统把它打垮、砸烂。随时准备为人民利益，为保卫毛主席和党中央，保卫毛泽东思想献出自己的生命。我要把活学活用毛主席著作当作毕生的战斗任务，做彻底的革命派。"},{"type":"paragraph","text":"让我们高呼："},{"type":"paragraph","text":"最伟大的中国共产党万岁！"},{"type":"paragraph","text":"最敬爱的领袖毛主席万岁！"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁！万岁！万万岁！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fafc5b2438"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
