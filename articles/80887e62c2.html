<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山东省电力局党组在整党中联系实际  进行彻底否定“文革”教育取得成效","authors":["熊永年","赵文政"],"dates":[{"year":1985,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"山东省电力局党组在整党中联系实际"},{"type":"paragraph","text":"进行彻底否定“文革”教育取得成效"},{"type":"paragraph","text":"本报讯  记者熊永年、赵文政报道：山东省电力局党组在整党中联系实际，深入进行彻底否定“文革”的教育，认真解决遗留问题，全面落实党的政策，消除了派性，增强了团结，促进了生产的发展。"},{"type":"paragraph","text":"这个局在“文革”期间，有五十九人遭到批斗（占当时机关人数的22％），其中二十多人被关进“牛棚”，造成九起重大冤假错案。虽然“文革”已结束多年，但“文革”遗留的问题一直得不到解决。受迫害的同志多数没有得到公开平反，有的还留有“尾巴”，有的家属子女受株连还未得到纠正，某些党员、干部中派性残余还时有表现。这样，不仅影响安定团结，而且影响清理“三种人”的工作和第三梯队的建设。"},{"type":"paragraph","text":"整党前期，山东省电力局也抓了否定“文革”的教育，但由于局党组怕影响与前党组成员的关系，怕引起派性，怕影响生产，不敢联系电力局的实际解决“文革”遗留问题，所以彻底否定“文革”的教育没有取得效果。党内外群众对此意见很大，不断写信向上级反映。山东省委负责同志要求查明情况，在整党中彻底加以解决。局党组根据省委负责同志的意见，联系实际学习有关文件，克服了畏难情绪，增强了彻底否定“文革”的信心。"},{"type":"paragraph","text":"去年第四季度，这个局党组在省委整党联络组的帮助下，紧密联系“文革”在全省电力系统造成的严重后果，进行彻底否定“文革”教育的补课，着重否定“一派正确，一派错误”的观点。全局上下普遍开展谈心活动，消除隔阂。局党组主要负责人组织力量，围绕“文革”中的九大案件，对有关问题进行全面核查。党组多次开会，一个人一个人地研究，一件事一件事地落实，作出了为“文革”中受迫害的同志进一步落实政策的决定。12月1日召开大会，宣布为受迫害的五十九名同志在政治上彻底平反，恢复名誉，消除影响；为九名同志修改过去的结论，彻底推翻不实之词；按规定为九名同志补偿经济损失，提高两家遗属的抚恤费，对三家遗属实行定期怃恤；解决个别受株连的遗属子女的工作安排问题。平反冤假错案，全面落实政策，消除派性，增强了团结，大大调动了党内外群众的积极性，促进了电力生产的发展和经济效益的提高。今年第一季度全省发电量比去年同期增长10.8％。现在全局正为巩固整党成果，进一步推进全省电力系统的改革而努力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山东文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80887e62c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
