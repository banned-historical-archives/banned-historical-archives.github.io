ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对红线女关于降低山区农村食盐价格来信的批语","alias":"","parts":[{"type":"paragraph","text":"对红线女关于降低山区农村"},{"type":"paragraph","text":"食盐价格来信的批语"},{"type":"paragraph","text":"（1975年8月13日）印发政治局在京各同志，并议一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九七五年八月十三日"},{"type":"paragraph","text":"[1]粤剧表演艺术家红线女1975年8月5日给毛泽东写信说，最近我到延安、大寨、红旗渠参观学习，发现那里的食盐卖得太贵了。太原食盐是一角一分一斤，林县卖一角三分，昔阳县臭落大队卖一角六分，其他有的地方还卖到了一角八分。山区的盐比城市贵那么多，我觉得这是对待山区，特别是老解放区的态度问题。像食盐、布匹这类人人不可少的生活必需品，必须照主席历来关心群众生活的教导去办。因此，僻野山区的盐价，就是要比城市低廉才对。这封来信和毛泽东的批语，曾作为中共中央1975年9月23日至10月21日召开的农村工作座谈会会议文件印发。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":56,"page_end":56},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"687003f2ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
