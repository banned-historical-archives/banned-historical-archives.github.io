<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市委在支疆工作中执行资产阶级反动路线革命家长起来坚决抵制逆流静安区支疆青年家长支持本报十八日的社论，表示要教育子女坚守边疆建设岗位","authors":[],"dates":[{"year":1967,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　一月十八日本报社论《坚持上山下乡、支援外地建设的正确方向》，在广大支援新疆青年的革命家长中，引起强烈的反响。上海市静安区支疆青年的革命家长数百人，昨日上午结队前来本报报喜。他们热烈地表示:坚决支持《坚持上山下乡、支援外地建设的正确方向》这篇社论的观点，坚决捍卫上山下乡、支援外地、边疆建设的方针。"},{"type":"paragraph","text":"前些日子，上海广大支疆青年的革命家长们，纷纷起来造上海市委在支疆工作中执行资产阶级反动路线的反。这个革命行动，使党内一小撮走资本主义道路的当权派大为惊慌。他们妄图转移斗争目标，煽动和批准一部分受蒙蔽的支疆青年的家长离开生产岗位，去新疆访亲，还提出支疆青年几年“服役”期满“复员”返回上海等不合理要求，竭力把人们引导到闹经济主义和抵制上山下乡，支援外地、边疆建设的方针的邪路上去。但是，广大支疆青年的革命家长，最听毛主席的话，坚决捍卫党的正确方针，起而抵制这股逆流。"},{"type":"paragraph","text":"在《告上海全市人民书》、《紧急通告》的启示下，静安区广大革命家长的革命组织——静安区支疆青年革命家长造反总部，最近发出宣言和有关宣传工作的通知，号召大家要向上海市委在支疆工作上所执行的资产阶级反动路线猛烈开火，提出要动员离疆在沪青年“打回老家去，就地闹革命”，要支持支疆青年把新疆建设兵团建成一个名符其实的亦军亦农亦工的毛泽东思想大学校。前天，总部同志从广播中听到本报刊出《坚持上山下乡、支援外地建设的正确方向》的社论，他们感到这篇社论说出了自己的心里话，需要立即向群众宣传。当时已经买不到报纸了，他们就手抄了十多份，奔走相告，使社论精神最迅速地传播到各街道中去。"},{"type":"paragraph","text":"昨天来到本报社的报喜队伍中，老工人特别激动。一些老工人在报喜结束后还留下来座谈读了这篇社论的体会。他们说:我们在旧社会里受尽了压迫和苦难，是党和毛主席解放了我们，是党和毛主席教育我们的子女健康地成长。我们组织起来，是要造市委在支疆工作中执行资产阶级反动路线的反。一小撮人用物质刺激、欺骗、压服等手法动员青年去疆，以致在人民群众中留下了恶劣的印象。这些人所作所为，是对党和毛主席提出的到农村去、到边疆去的伟大号召的严重歪曲。对此，必须大造其反。我们坚决捍卫支援边疆的伟大战略方针。如果需要的话，我们愿意让更多的子女去支援新疆。我们要教育自己的子女永远听毛主席的话，做无产阶级革命事业的接班人。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\01\\671k030101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海人民美术出版社革命造反委员会供稿\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca1f1841b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
