ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于同意对付敌人拖延谈判的办法致李克农电","alias":"","parts":[{"type":"paragraph","text":"关于同意对付敌人拖延谈判的办法"},{"type":"paragraph","text":"致李克农电"},{"type":"paragraph","text":"（1951年12月28日）李克农同志，并告金、彭："},{"type":"paragraph","text":"十二月廿八日一时来电\"、两组简报及附件均悉。同意来电所述各点。并且不要怕拖，要准备再拖一个较长的时期才能解决问题。只要我们不怕拖、不性急，敌人就无所施其技了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十八日三时半"},{"type":"paragraph","text":"[1]指李克农1951年12月28日1时关于第三项议程（机场建设问题）和第四项议程（交换战俘问题）小组谈判情况给毛泽东、金日成、彭德怀的电报。电报说，我们计划：（一）对于第三小组，如对方继续采取拖延政策，根本不讨论什么问题，则我亦不急。他提议休会我即同意休会，表示我们不怕拖。（二）对于第四小组，继续以4.4万战俘的问题和对方的所谓5万多战俘的问题对抗下去。对于对方第一次交来及第二次补交来的外俘下落的回答，我们觉得亦不必忙于交给他们。"},{"type":"paragraph","text":"[2]指李克农1951年12月27日发来的第三项议程小组会简报和第四项议程小组会简报。当时，朝鲜停战谈判第三项议程的讨论已历时30天，第四项议程的讨论也已进行半月余，由于美方采取拖延政策未能达成协议。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":196,"page_end":196},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c967403695"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
