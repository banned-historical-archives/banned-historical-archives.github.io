ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"给刘少白“的信","alias":"","parts":[{"type":"paragraph","text":"给刘少白\"的信"},{"type":"paragraph","text":"（1948年10月30日）少白同志："},{"type":"paragraph","text":"九月十五大示读悉。我们的工作是有错误的。好在现已一般地纠正，并正在继续纠正中，正如你在五事中第二项所说那样。情形既已明白，则事情好办，你也就可以安心了。大函已转付彭真同志，党籍一事，请与彭同志商酌。"},{"type":"paragraph","text":"敬颂大安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月三十日"},{"type":"paragraph","text":"[1]刘少白（1883一1968)，山西兴县人。1937年加入中国共产党，以开明绅士身份进行革命活动。曾任晋绥边区临时参议会副议长多年。1947年土地改革中被错斗，不久被党中央发现和纠正。"},{"type":"paragraph","text":"A6l到"},{"type":"paragraph","text":"阴也五大不读生。我们放作是有为好在孤正文也理正，#在件"},{"type":"paragraph","text":"基才事二项的记邪檬。中，心为你活"},{"type":"paragraph","text":"则本特好有，你也"},{"type":"paragraph","text":"大商已韩英2"},{"type":"paragraph","text":"长，懂霜一丰，清兴真片前陷敬《好写"},{"type":"paragraph","text":"e毛泽东致刘少白信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":138,"page_end":139},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c4b66f56a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
