rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"回顾进藏历史 加深对毛泽东思想的认识","authors":["何映森聂谱安"],"parts":[{"type":"paragraph","text":"本报讯 西藏军区党委认真学习《决议》，领会“毛泽东同志的历史地位和毛泽东思想”的问题，大家说，由于我们坚持用毛泽东思想指导行动，使部队在进军西藏、建设和保卫边疆的斗争中取得了一个又一个胜利。"},{"type":"paragraph","text":"党委成员中，有些同志是背着背包进藏的老战士。他们学习《决议》中关于毛主席强调要处理好汉族和少数民族的关系时说，部队进藏初期，毛主席就及时指出：“在西藏考虑任何问题，首先要想到民族和宗教问题这两件事，一切工作必须慎重稳进。”进藏部队执行毛主席的指示，每到一地，都积极宣传党的民族政策和宗教政策，深入了解和尊重藏族人民的宗教信仰、风俗习惯。许多藏族同胞主动给我军送情报，当翻译，做向导，运给养，大力支援我军完成各项任务。毛主席制订的民族政策结出了硕果。"},{"type":"paragraph","text":"在毛主席“为了帮助各兄弟民族，不怕困难，努力筑路”的指示鼓舞下，我军修通了举世闻名的川藏、青藏公路。部队指战员时刻把藏族人民的冷暖、疾苦挂在心上，涌现出一批象“爱民模范”普布扎西和洛桑单增那样为了人民的利益，宁愿献出自己一切的先进人物。广大指战员还发扬艰苦奋斗精神，警惕地守卫边疆。有的哨卡建在海拔五千多米的高山上，空气稀薄，生活十分艰苦，但他们“心为人民乐，再苦也觉甜”，作出了显著成绩。"},{"type":"paragraph","text":"回顾这段经历，同志们表示，我们过去坚持了毛泽东思想，现在和将来也一定要坚持毛泽东思想，用毛泽东思想指导部队工作，为建成团结、富裕、民主、文明的新西藏而努力！"},{"type":"paragraph","text":"（何映森、聂谱安）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b038ae5fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
