ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"关于劳动英雄的讲话","alias":"","parts":[{"type":"paragraph","text":"关于劳动英的讲话"},{"type":"paragraph","text":"（1945年1月）"},{"type":"paragraph","text":"劳动英雄三大作用"},{"type":"paragraph","text":"（一）带头作用，把生产和工作标准提高了，做出一个榜样，群众向你们看齐。（二）骨干作用，人常说“一个好汉三个帮，一个篱笆三个桩”，你们团结了群众，开展生产和各种工作。（三）劳动英雄是桥梁，起带上来、传下去的作用。群众的经验和意见，你们带上来；你们又到上面来开会，大会讨论的东西，如果你们认为对，就带回去告诉群众。"},{"type":"paragraph","text":"不要骄傲，改掉毛病"},{"type":"paragraph","text":"但是，有一条要注意，就是不要自以为了不起，看不起别人，在去年的劳动英雄大会上，曾经讲过“洗脸”和“扫地”，劳动英雄最好天天打扫灰尘，灰尘就是毛病，希望大家都注意改毛病，努力学习自己没有学到的东西，年年当劳动英雄。1945年，毛泽东和劳动英雄杨步浩交谈。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":293,"page_end":294},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24e9467163"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
