ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"给田家英的信","alias":"","parts":[{"type":"paragraph","text":"给田家英?的信"},{"type":"paragraph","text":"（1958年4月27日）家英同志："},{"type":"paragraph","text":"如有时间，可一阅班固?的《贾谊传》。可略去《吊屈》《鹏鸟》二赋不阅。贾谊文章大半亡失，只存见于《史记》的二赋二文，班书略去其《过秦论》，存二赋一文。《治安策》一文是西汉一代最好的政论，贾谊于南放归来著此，除论太子一节近于迁腐以外，全文切中当时事理，有一种颇好的气氛，值得一看。如伯达、乔木叫有兴趣，可给一阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月二十七日[1]田家英，当时任中共中央政治研究室副主任、毛泽东的秘书。[2]班固，东汉史学家、文学家，撰有《汉书》。[3]贾谊，西汉政论家、文学家。"},{"type":"paragraph","text":"[4]伯达，即陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任、毛泽东的秘书。乔木，即胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":4,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":265,"page_end":265},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6386e6f04e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
