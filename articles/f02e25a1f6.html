rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"注意调查研究 解决疑难问题","authors":["李永海"],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队某军军长邢维邦到团里宣讲《决议》，他抓住重点解疑难，受到干部战士欢迎。"},{"type":"paragraph","text":"8月上中旬，邢维邦同志来到某团时，团里已经宣讲过《决议》。他开了一个座谈会，了解在前一段宣讲中有些问题解决得比较好，有些问题还没有完全搞清楚。他发现有的同志对“两个凡是”的错误实质认识不大清楚，便翻阅材料，结合自己学习的体会，在全团军人大会上着重讲清了以下四点：（一）“两个凡是”不符合马列主义、毛泽东思想，违背了唯物辩证法。（二）1977年初，全国人民一致要求给天安门事件平反、邓小平同志出来工作，这有关当时的大局，“两个凡是”起了阻挠作用。因此，不能说“两个凡是”稳定了大局。（三）“两个凡是”把毛泽东思想和毛主席晚期错误混为一谈，坚持的是毛主席晚期的错误，并不是真正高举毛泽东思想的旗帜。（四）推行“两个凡是”的实质，是维护旧的个人崇拜，制造新的个人崇拜。实践证明，《决议》指出华国锋同志推行和迟迟不改正“两个凡是”的错误是完全正确的；党中央对华国锋同志的职务进行调整非常必要。邢维邦同志的这次宣讲，时间不长，内容集中，受到大家的好评。（李永海）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f02e25a1f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
