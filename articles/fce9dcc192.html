dates":[{"year":1963,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　“日本现代现实主义绘画展览”昨天上午在上海美术展览馆开幕。展览会是由对外文协上海市分会和美协上海分会联合主办的。"},{"type":"paragraph","text":"对外文协上海市分会会长张春桥、副会长张耀辉，美协上海分会主席丰子恺、副主席沈柔坚，以及上海著名画家林风眠、颜文梁、关良、周碧初等四百多人，出席了开幕式并观看日本画家的作品。"},{"type":"paragraph","text":"日本油画艺术在我国还是第一次展出，这个由日中文化交流协会组成的，包括各种不同风格和题材的油画展览，引起了参观者的浓厚兴趣。观众对展出的反映农民革命的巨幅油画《历史》、表现日本劳动人民生活的《农民小憩》，以及描绘日本人民风土习俗和自然风景的很多日本著名画家的作品，十分欣赏。"},{"type":"paragraph","text":"展览会预定在本市展出一周。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fce9dcc192"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
