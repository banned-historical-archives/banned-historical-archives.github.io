1977,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"砸烂“四人帮”，文艺新苗壮。在深入揭发批判‘四人帮’的斗争中，本市各文艺训练班和文艺单位学馆的学员们，满怀革命激情，利用课余时间，和教师一起创作排演了一个又一个节目，衷心歌唱伟大领袖毛主席，歌唱敬爱的周总理，倾吐对英明领袖华主席深厚的无产阶级感情。今天本报刊登了一组反映文艺新苗演出活动的照片，祝愿他们好好学习，天天向上，为迎接无产阶级文艺百花盛开的春天贡献力量。"},{"type":"paragraph","text":"——编者"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\02\\7722030301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市杂技训练班演出杂技《欢庆伟大的历史性胜利》。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\02\\7722030302.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市人民淮剧团学馆演出淮剧表演唱《华主席登上天安门》。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\02\\7722030303.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市人民评弹团学馆演出评弹合唱《为女民兵题照》(为毛主席诗词谱曲)。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\02\\7722030304.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海歌剧院学馆演出舞蹈《欢庆腰鼓》。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\02\\7722030305.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市五·七京剧训练班演出歌舞《跟着华主席永远向前进》。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\02\\7722030306.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海沪剧团学馆演出沪剧表演唱《敬绣周总理像》。\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b64ec9702c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></bo
