"authors":[],"dates":[{"year":1963,"month":7,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市总工会宣传部举办的上海工人学习毛主席著作进修班第三期，昨日举行开学典礼。"},{"type":"paragraph","text":"参加这一期进修班的学员，有来自本市工业、交通运输、基本建设和财贸系统等基层单位的工人理论学习骨干共三百余人。他们大都是具有一定文化水平和自学能力，并长期坚持学习毛主席著作的积极分子。此外，各基层单位领导工人理论学习的宣传干部五百五十余人也将列席听讲。"},{"type":"paragraph","text":"这一期进修班确定以毛主席的《实践论》、《矛盾论》和《关于正确处理人民内部矛盾的问题》等三篇著作为学习内容。学员除了坚持业余自学外，每周集中学习一天。学习期限暂定为半年。进修班的教学工作，由中共上海市委党校哲学教研室和上海市总工会宣传部组成的教研小组共同主持。"},{"type":"paragraph","text":"在昨天的开学典礼上，中共上海市委宣传部副部长杨永直同志讲了话。他勉励学员们学习雷锋同志的革命精神，坚持不懈地认真学习毛主席著作，用毛泽东思想武装自己的头脑，把哲学变为劳动人民手里的锐利武器；在阶级斗争、生产斗争和科学实验三大革命运动中，锻炼自己，改造自己，把自己培养成为一个坚强的无产阶级战士。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfbf917734"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
