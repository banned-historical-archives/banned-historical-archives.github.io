东"],"dates":[{"year":1966,"month":4,"day":29}],"is_range_date":false,"parts":[{"text":"关于彭真的谈话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"北京一根针也插不进去，一滴水也滴不进去。彭真要按他的世界观改造党，事物是向他的反面发展的，他自己为自己准备了垮台的条件。这是必然的事，是从偶然中暴露出来的，一步一步深入的。历史教训并不是人人都引以为戒的。这是阶级斗争的规律，是不以人们的意志为转移的。凡是在中央有人搞鬼，我就号召地方起来攻他们，叫孙悟空大闹大宫，并要搞那些保玉皇大帝的人。彭真是混到党内的渺小的人物，没有什么了不起，一个指头就捅倒地。“西风落叶下长安”，告诉同志们不要无穷地忧虑。灰尘不扫不走，阶级敌人不斗不倒。","type":"paragraph"},{"text":"赞成鲁迅的意见，经书不可不读，不可多读。不读人家会欺侮你。","type":"paragraph"},{"text":"现象是看得见的，本质是隐蔽的。本质也会通过现象表现出来。彭真的本质隐藏了三十年。","type":"paragraph"},{"text":"要不要告诉阿尔巴尼亚同志？没有什么不可告人的！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac29e55b2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
