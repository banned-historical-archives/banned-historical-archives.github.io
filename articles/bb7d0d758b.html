script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛主席哲学思想认真改造世界观  河源县革委会成员在三大革命实践中狠抓自身思想革命化","authors":[],"dates":[{"year":1970,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用毛主席哲学思想认真改造世界观"},{"type":"paragraph","text":"河源县革委会成员在三大革命实践中狠抓自身思想革命化"},{"type":"paragraph","text":"据新华社广州十五日电　广东省河源县革委会领导成员，在深入基层蹲点的过程中，活学活用毛主席的哲学思想，把改造客观世界和改造主观世界紧密结合起来，自觉改造世界观，促进思想革命化。"},{"type":"paragraph","text":"今年年初，河源县革委会成员，遵照毛主席关于“一定要抓好典型”的伟大教导，分头到生产队蹲点。结果有些成员收获大一些，有些成员收获不大。县革委会领导成员和军代表对这个问题进行调查研究，发现凡是在蹲点中能够把改造主观世界和改造客观世界结合起来，自觉地改造世界观，蹲点收效就大；相反地，凡是有单纯任务观点，把蹲点和改造自己世界观割裂开来的，收效就不大。针对这个问题，河源县革委会组织全体成员学习毛主席关于“无产阶级和革命人民改造世界的斗争，包括实现下述的任务：改造客观世界，也改造自己的主观世界”和“人的正确思想，只能从社会实践中来，只能从社会的生产斗争、阶级斗争和科学实验这三项实践中来”的教导，明确干部蹲点的根本目的是在三大革命斗争中，和群众一起，活学活用毛泽东思想，改造客观世界，也改造主观世界。"},{"type":"paragraph","text":"认识提高以后，县革委会主要领导成员带头拜贫下中农为师，在蹲点中认真改造世界观。县革委会主任过去认为自己参加革命较早，有一定的工作经验，到社队蹲点，主要是帮助和教育别人。今年五月，他到鹊坝大队蹲点搞整党建党工作。这个大队的党支部有些成员不能正确对待群众的批评，群众意见较大。在发动党员、群众给支部领导提意见时，他担心群众有顾虑，主张先用背靠背的方式提意见。可是不少贫下中农不同意，主张当面开展积极的思想斗争，这样对支部成员教育更大。后来，在给党支部领导提意见时，党员和群众代表毫无顾虑，按新党章精神，用“一分为二”观点，既肯定了支部领导工作的成绩，又诚恳地对支部成员的错误思想提出严肃批评。党员、贫下中农这种敢于开展积极的思想斗争的精神，使县革委会主任受到深刻教育。他联系到自己在县革委会领导班子中，不能很好带头开展批评和自我批评的问题，认识到自己头脑里还有“党内和平论”、“群众落后论”的余毒，还有私心杂念。他重新学习了毛主席关于“群众是真正的英雄”的伟大教导，感到更加亲切。他深有体会地说：“只有当好‘学生’才能当好‘先生’，这是千真万确的真理”。"},{"type":"paragraph","text":"在蹲点中，县革委会的其他成员也不断克服单纯任务观点，在三大革命斗争中，认真改造世界观。有一个副主任到工作比较后进的林禾大队蹲点。开始，由于他存在着单纯任务观点，到了大队不久，发现一些社员群众丢了农活上山搞副业，心里就着急。于是，他就批评大队干部，数落社员。结果问题没有解决。带着这个问题，他学习了毛主席关于“人们要想得到工作的胜利即得到预想的结果，一定要使自己的思想合于客观外界的规律性，如果不合，就会在实践中失败”的教导，认识到自己在蹲点中没有得到预想的结果，根本原因是有单纯任务观点，观察、处理问题存在主观主义和片面性，没有深入调查研究。他在这个大队的干部、群众中狠斗了主观主义，同大队干部一起深入调查研究，发现“重副轻农”这股风，是阶级敌人在背后煽动起来的。找到问题的实质后，他就和贫下中农一起，批斗了阶级敌人，批判了“重副轻农”的修正主义余毒，提高了大家的阶级斗争和两条路线斗争觉悟，正确地处理了农副业的关系，使这个大队迅速改变了面貌。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb7d0d758b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
