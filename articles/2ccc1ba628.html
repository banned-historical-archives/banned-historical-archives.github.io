rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"语录","authors":["毛主席"],"parts":[{"type":"paragraph","text":"马克思不但参加了革命的实际运动，而且进行了革命的理论创造。他从资本主义最单纯的因素——商品开始，周密地研究了资本主义社会的经济结构。商品这个东西，千百万人，天天看它，用它，但是熟视无睹。只有马克思科学地研究了它，他从商品的实际发展中作了巨大的研究工作，从普遍的存在中找出完全科学的理论来。他研究了自然，研究了历史，研究了无产阶级革命，创造了辩证唯物论、历史唯物论和无产阶级革命的理论。……马克思在实际斗争中进行了详细的调查研究，概括了各种东西，得到的结论又拿到实际斗争中去加以证明，这样的工作就叫做理论工作。我们党内需要许多同志学做这样的工作。"},{"type":"paragraph","text":"——摘自毛主席“整顿党的作风”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ccc1ba628"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
