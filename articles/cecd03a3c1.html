script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"谁说昔阳没有非正常死亡和冤假错案!昔阳县为一百四十件冤案平反群众开始揭露建设大寨县运动中极左路线造成的问题","authors":[],"dates":[{"year":1980,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京八月十三日电　据《人民日报》报道:中共山西省昔阳县委今年二月调整了领导班子以后，积极组织力量清查十年浩劫期间，在学大寨创大寨县运动中，执行极左路线，造成的一百四十一人非正常死亡案件。他们在上级党委工作组的帮助下，一案一案地进行甄别核实，查清了这些案件的性质全属冤、假、错案。到七月底，除一案尚需法院依法律手续进行复审外，其余一百四十件都进行了平反，并对死亡人员亲属做了落实政策的工作。"},{"type":"paragraph","text":"党的十一届三中全会提出全党要落实各项政策以后，昔阳县委前主要负责人曾声称:文化革命中，别处大动乱，昔阳抓大干，农民未出村，工厂没停产，民兵未进城，学校复课闹革命，没有武斗，不存在非正常死亡人员和冤、假、错案问题。"},{"type":"paragraph","text":"事实究竟怎样?"},{"type":"paragraph","text":"昔阳县在十年浩劫期间，虽然没有发生群众之间的互相武斗，但是夺权以后成立的县革委曾提出:“抓阶级斗争要刮十二级台风”，“积极地主动地全面地向阶级敌人发动猛烈进攻，为三年建成大寨县扫清一切障碍”和“大批促大干，一批二斗三大干”等口号，并有计划、有组织、有领导地对许多农民和基层干部进行残酷斗争，因而造成了一百四十一人非正常死亡事件。例如，原里小寒大队党支部书记冀国成，曾允许社员种自留地和割山上的白草上集市出售，因此冀就被当做农村走资本主义道路当权派的典型。从一九六七年到一九六九年对他进行了三十多次残酷斗争，他被逼跳崖而死。再如，团前庄大队社员张没虎，为生产队去城里拉煤的时候，掰了生产队六个青玉米，也被戴上小偷的帽子进行批斗和推打，被逼自杀。据统计，在非正常死亡的一百四十一人中，农民群众占了百分之九十。"},{"type":"paragraph","text":"由于那些在学大寨运动中推行极左路线，对农民群众搞大批大斗的代表人物，长期在山西一些地区和昔阳掌权，人们害怕他们杀“回马枪”，十多年间，没有一个非正常死亡人员的亲属，敢于向上级机关提出控告:就是在最近落实这项政策的时候，因为那些搞极左路线的人物仍在掌权，不少死亡人员家属连文字材料也不敢写，有的说:“这一辈人死了就算啦，可不要因为给死了的人平反，再给下一辈人招来祸端!”"},{"type":"paragraph","text":"昔阳县在落实这项政策的时候，通过召开群众大会给死亡人员平反昭雪，反复宣传党的三中全会精神，指明这些死亡事件是极左路线造成的恶果，促进了昔阳县群众的思想解放，使死者的亲属敢于提出处理意见，群众开始说出多年不敢讲的话，开始揭露昔阳建大寨县运动中搞极左路线造成的其他种种问题。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cecd03a3c1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
