967,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"祝毛主席万寿无疆！"},{"type":"paragraph","text":"一位刚从海地来我国的黑人朋友，接到参加国庆观礼的喜讯后，高兴极了。但有一件事难住了他，使他感到难过。这到底是怎么一回事呢？原来，他刚来我国不久，还不会说中国话，更不用说用中国话喊“毛主席万岁”了。因此，他很难过。"},{"type":"paragraph","text":"怎么办呢？他找到了翻译，一定要翻译教他喊：“毛主席万岁！祝毛主席万寿无疆！”翻译教，他就很认真地学。直到深夜，他终于学会了。第二天，他怕忘了，一大早就起了床，独自一人站在毛主席彩色画像前一次又一次地高呼：“毛—主—席—万—岁！祝—毛—主—席—万—寿—无—疆！”"},{"type":"paragraph","text":"最幸福的时刻到来了。扩音器里传来了最最激动人心的喜讯，毛主席来了！毛主席来了！他一看见毛主席，就高兴得热泪直往外淌。他不停地高呼：“毛主席万岁！万岁！万万岁！祝毛主席万寿无疆！万寿无疆！万寿无疆！”他拉着翻译的手激动地说：“今天，我能见到伟大导师毛主席，这是我一生最大最大的幸福……”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b726b418a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
