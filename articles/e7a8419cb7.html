"authors":[],"dates":[{"year":1958,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布拉格17日电】　捷克斯洛伐克和匈牙利两国党和政府代表团在它们的联合声明中谴责了美国干涉中国内政的行为，并且表示，中华人民共和国政府作为中国的唯一合法政府，有权解放台湾和沿海岛屿。捷匈两国党政代表团在布拉格会谈结束后今天发表了这个联合声明。"},{"type":"paragraph","text":"双方宣布，它们将努力进一步加强社会主义国家间和国际工人运动的团结与合作，并且在马克思列宁主义思想和无产阶级国际主义原则的指导下彼此进行兄弟般的帮助。两党认为，不断为保卫马克思列宁主义的纯洁、反对现代修正主义而进行斗争是它们的首要任务。"},{"type":"paragraph","text":"声明说，捷克斯洛伐克和匈牙利两国政府欢迎苏联关于永远不继续核武器试验的建议和苏联所宣布的关于防止突然袭击的措施。"},{"type":"paragraph","text":"联合声明强调了华沙条约在目前侵略性的西方国家加紧战争准备的情况下的重要性。双方代表团宣布，两国将履行它们的政府根据这项条约而承担的一切义务。"},{"type":"paragraph","text":"声明表示，两国完全支持苏联的关于使西柏林成为非军事化的自由城市的建议，并且谴责西方国家对苏联的关于柏林问题的建议所抱的态度。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7a8419cb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
