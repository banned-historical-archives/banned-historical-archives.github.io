script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捷阿两国党政代表团发表联合声明  完全支持苏联关于缔结对德和约的建议  坚决维护马列主义同修正主义进行斗争","authors":[],"dates":[{"year":1959,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"捷阿两国党政代表团发表联合声明"},{"type":"paragraph","text":"完全支持苏联关于缔结对德和约的建议"},{"type":"paragraph","text":"坚决维护马列主义同修正主义进行斗争"},{"type":"paragraph","text":"新华社布拉格18日电　捷克斯洛伐克和阿尔巴尼亚两国党政代表团今天在这里发表的联合声明指出，当前国际局势中的决定性因素是世界社会主义体系广泛的和不断的发展。它无可争辩地优越于资本主义体系。"},{"type":"paragraph","text":"两国代表团认为，当前国际局势中的关键问题是停止疯狂的军备竞赛，首先是永远停止核武器试验、禁止这些武器的生产和使用以及销毁这些武器的储存。两国并且完全支持苏联关于立即永远无条件地停止试验性核爆炸的建议。两国代表团同时要求立即恢复在日内瓦举行的讨论防止突然袭击的措施的专家会议。"},{"type":"paragraph","text":"声明说，两国代表团完全同意苏联关于把西柏林变为非军事化的自由城市的建议，并且完全支持苏联关于缔结对德和约的建议。它们认为这是苏联政府消除欧洲危险的战争温床的又一个具有重大意义的倡议。捷克斯洛伐克和阿尔巴尼亚两国将竭尽全力来促使和平会议的召开，并促使会议完成它的使命。"},{"type":"paragraph","text":"声明指出，两党认为它们首要的国际主义义务是：尽一切努力来加强社会主义国家共产党和工人党的团结以及整个国际共产主义运动的团结。两党今后还将坚决维护马克思列宁主义的纯洁性，坚决同国际工人运动的不共戴天的敌人——现代修正主义进行斗争。这种修正主义明显地表现在南斯拉夫共产主义者联盟的纲领和南共领导集团的政策中。"},{"type":"paragraph","text":"声明接着说，两国代表团完全支持中华人民共和国为最后解放中国的全部领土而进行的正义斗争，并且坚决谴责美国干涉中国政府内政的行为。"},{"type":"paragraph","text":"两国代表团表示完全支持亚非国家争取民族解放的斗争，坚决谴责美、英、法等帝国主义国家的殖民主义政策。"},{"type":"paragraph","text":"两国代表团谴责北大西洋公约组织侵略集团的政策，并且重申它们的国家忠于根据华沙条约所承担的义务。"},{"type":"paragraph","text":"声明最后指出，捷阿两国之间的合作关系已经有了全面的发展。两国代表团在会谈期间并且就进一步加强两国关系的一些措施达成了协议。"},{"type":"paragraph","text":"两国代表团的会谈是在观点完全一致的精神下，以及在真诚、友好和互相谅解的气氛中进行的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5715e43dc2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
