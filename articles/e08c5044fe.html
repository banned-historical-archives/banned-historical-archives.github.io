r":2000,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奥防范极右暴力蔓延"},{"type":"paragraph","text":"据新华社维也纳8月16日电  （记者林川）据16日出版的《信使报》和《新皇冠报》报道，奥地利内政部长施特拉塞尔在接受这两家报纸记者的采访时表示，决不允许极右翼分子的暴力活动从德国蔓延到奥地利。"},{"type":"paragraph","text":"施特拉塞尔说：“对极右主义不能有任何宽恕，因此‘防患于未然’这句话尤其适用于当前。”"},{"type":"paragraph","text":"他说，奥地利极右翼分子的活动已受到严密监视，其骨干分子都在当局的控制之中。他还说，奥地利有关禁止新纳粹活动的法律是全欧洲最严厉的，在奥地利成立德国国家民主党这样的组织是违法的。但他同时也对奥地利极右翼分子因此而转移到德国和其他国家活动感到忧虑。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e08c5044fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
