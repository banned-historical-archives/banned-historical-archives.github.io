ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"让伍修权请苏联驻华大使转告赫鲁晓夫的一段话","alias":"","parts":[{"type":"paragraph","text":"让伍修权请苏联驻华大使转告赫鲁晓夫的一段话"},{"type":"paragraph","text":"（1960年1月13日）"},{"type":"paragraph","text":"谢谢你在1960年1月8日的来信中关于苏联准备单方面宣布在最近一年半到两年内从苏军人员中裁减一百二十万人的通知。中国共产党中央委员会支持苏联采取这一有利于争取世界和平、反对帝国主义扩军备战的斗争的步骤。我们也同意你来信中的这种估计，即帝国主义阵营还远未放弃对社会主义国家发动战争的狂妄阴谋，因此必须继续大力加强社会主义阵营的防御，揭露帝国主义的战争阴谋，以高度警惕性来教育社会主义各国人民，巩固和发展社会主义各国之间的兄弟合作。"},{"type":"paragraph","text":"一九六〇年一月十三日"},{"type":"paragraph","text":"[1]这段话摘自外交部副部长伍修权1960年1月13日晚同苏联驻华大使的谈话稿。谈话稿中还有以下一段话：“我已经把赫鲁晓夫同志的来信送给毛泽东主席。毛主席刚才用电话指示我，把以下的一段话告诉大使同志，请你立即转告赫鲁晓夫同志。”赫鲁晓夫，当时任苏共中央第一书记、苏联部长会议主席。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":1,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":112,"page_end":112},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc231c011b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
