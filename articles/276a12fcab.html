ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"对留守兵团工作的分析","alias":"","parts":[{"type":"paragraph","text":"对留守兵团工作的分析！"},{"type":"paragraph","text":"（1945年7月）"},{"type":"paragraph","text":"高干会批评了留守兵团，但是留守兵团几年来的工作成绩是主要的。留守兵团是有缺点错误，但性质是属于联共（布）党史结束语中第五条的性质，不是路线错误。高干会给留守兵团所做的不恰当的结论应予纠正。高干会前后调动了许多留守兵团干部的工作，挫伤了他们的积极性，在方法上是不对的。"},{"type":"paragraph","text":"[1]毛泽东在枣园和萧劲光就留守兵团的工作进行了一番长谈。这是他1945年，摄影师吴印咸在为毛泽东照相。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":196,"page_end":197},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"276a12fcab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
