ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对商业部党组关于支援抗旱、防洪工作的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对商业部党组关于支援抗旱、防洪工作的报告的批语"},{"type":"paragraph","text":"（1959年8月13日）已阅，很好。退程子华同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十三日"},{"type":"paragraph","text":"[1]商业部党组1959年8月7日给中共中央并毛泽东的这一报告说，为了积极支援各地抗旱、防洪工作，商业部目前已成立专门办公室，负责与有关省区联系，以便了解并及时督促检查救灾工作。在救灾物资供应方面，拟采取以下几个措施：（一）在抗旱、防洪物资不足的情况下，要优先供应灾区。（二）发扬共产主义协作精神，要求非灾区积极主动支援灾区。（三）受灾地区想尽一切办法，挖掘地方资源，就地取材，就地使用，并进一步清仓，充分发挥现有库存力量。在已成灾地区，商业部门还应在党委统一领导下，积极帮助灾民发展多种经济，做好灾民生产所需原料的供应和成品的推销工作，做好灾民生活资科的供应工作，保证灾民药品的供应，并及早做好防寒取暖物资的准备。"},{"type":"paragraph","text":"[2]程子华，当时任商业部部长。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":286,"page_end":286},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1292443fa0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
