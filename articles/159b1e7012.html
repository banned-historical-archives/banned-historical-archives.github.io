" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji40","name":"毛泽东全集第40卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"对《关于“一个县能否进入共产主义”的辩论》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对《关于“一个县能否进人共产主义”的辩论》一文的批语"},{"type":"paragraph","text":"（1958年11月18日）"},{"type":"paragraph","text":"[1]这篇文章刊载在中共中央宣传部1958年11月13日编印的《宣教动态》第一三八期上。文章说，山东省寿张县、范县先后在1958年10月26日、28日召开的万人大会上，提出了一个县提前进入共产主义的问题。寿张县委第一书记在《动员全党全民向共产主义迈进》的报告中，提出了“为二年内实现工业化、机械化、电气化，基本上建设成一个像样的共产主义而奋斗”的任务。范县县委第一书记在《为加速建成社会主义并到一九六○年过渡到共产主义而奋斗》的报告中，提出了“二年过渡到共产主义”的任务和具体规划。参加山东省宣传文教工作高唐现场会议的同志在参观寿张、范县两县后，对这种提法大都表示怀疑。会议对这个问题进行了讨论，多数同志认为：目前实行的吃饭、穿衣不要钱等等，虽具有共产主义因素，但还不是“各取所需”，还不是共产主义。我们思想上对共产主义应该看得更远，目标才能更明确，干劲才会更大。在建设社会主义和向共产主义过渡的问题上，各地要以全国的速度为转移，要靠全国的大协作来解决。先进的县要关心全省、全国，通力支援落后县及邻县、邻省。共产主义是一个整体，一省一县单独提前进入共产主义时代的想法是不妥当的。同时，过渡到共产主义，还要有国际条件和国际共产主义的团结。但也有人认为一个县是能够建成共产主义的。某县县委宣传部长在和大家辩论后，仍然坚持他的看法，认为：既然建设社会主义的速度有快有慢，一个县就有可能先进入共产主义；共产主义就是“各取所需”，一个县是可以先做到“各取所需”的；现在的县人民公社，已经可以说是全民所有制的共产主义经济了。"},{"type":"paragraph","text":"对《关于“一个县能否进入共产主义”的辩论》一文的批语值得一阅，印发到会“各同志。"},{"type":"paragraph","text":"毛泽东一九五八年十一月十八日"},{"type":"paragraph","text":"二此件见1958年11月13日《宣教动态》。2[1]指即将在武昌召开的中共中央政治局扩大会议。"},{"type":"paragraph","text":"[2]这是毛泽东为印发《关于“一个县能否进入共产主义”的辩论》写的说明。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":442,"page_end":443},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"159b1e7012"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
