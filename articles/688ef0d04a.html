ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"国民党各派态度及我之布置情况","alias":"","parts":[{"type":"paragraph","text":"国民党各派态度及我之布置情况！"},{"type":"paragraph","text":"（1940年12月25日）"},{"type":"paragraph","text":"（一）蒋介石内外情况只能取攻势防御，大吹小打，故复电以拖为宜，拖到一月底再说。"},{"type":"paragraph","text":"（二）胡宗南全无战意，其他中央军可知，如白崇禧亦软下来，彼方非自己转弯不可。"},{"type":"paragraph","text":"（三）何应钦系统与西西系统是想打的，都是亲日派，但中央军与桂军如不愿打，则亲日派亦无能为力，望多方设法将亲日派唯恐大下不乱之阴谋告知中央军与桂军将领。"},{"type":"paragraph","text":"（四）南汉宸在西安已做了一些工作，胡及其部下曾四次宴南，迎送尽礼，当面说不愿打。"},{"type":"paragraph","text":"（五）汤恩伯部据所得情况亦很少打的兴趣，桂军至今只一三八师四个团在淮南路东，分散得一塌糊涂，一七二师尚停止于寿县附近，其他四个师则分在霍邱、六安、商城、固始，毫无东进消息。李仙洲虽准备向砀山进，但何日开动尚无确息。"},{"type":"paragraph","text":"（六）现苏北战事已停，望向刘为章说明，要求停止李仙洲、莫德宏东进，否则难免大冲突。"},{"type":"paragraph","text":"（七）我一一五师三四五旅已到苏北，现正连同黄克诚、陈毅各部集中整训，统一编制，侯一两个月后战斗力必大提高，然后以主力西进，对桂军施以教训，望示意白崇禧，如欲保持友谊，则请他将莫师撤退。"},{"type":"paragraph","text":"（八）杨得志旅一个月后可到淮北，皖南三个团又北上，足以对付蒋桂进攻。只要蒋不投降，大举进军是不可能的，始终不过是大吹小打而已。"},{"type":"paragraph","text":"（九）王世英由阎处返延。据称，中央军所捕办事处人员及电台起释，移往河东，与阎一起，密码亦未失。此事起因于所谓我军攻击太泉村。实则上月二十七日傍晚该村农家有牛四头，放牧还家，黑莫辨，六十一师防军误为我临真镇骑兵进攻，一时全线射击，亦奔进，云岩、太泉一线守部队一团以上纷纷向宜川城溃退，得满城风雨，钟师长情急将我办事处人员扣押，王世英适在阎处泰被捕，该师以事出误会，关了四天释放，声明误会。似此中央军无魂魄，何能作战，此事一直闹到西安、重庆，实不过四头黄牛爱进攻而已。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":293},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"688ef0d04a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
