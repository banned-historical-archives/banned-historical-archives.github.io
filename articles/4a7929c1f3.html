art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来江青张春桥姚文元纪登奎耿飚同志会见并宴请日本共产党（左派）访华代表团会见在团结、友谊气氛中进行，两国同志进行了亲切友好的谈话。周恩来同志和福田正义同志在宴会上共祝两党和两国人民的战斗友谊和团结不断巩固发展","authors":[],"parts":[{"type":"paragraph","text":"新华社二十日讯 中共中央政治局常委周恩来，中共中央政治局委员江青、张春桥、姚文元，中共中央政治局候补委员纪登奎，中共中央委员、中联部部长耿飚，今天晚上会见了日本共产党（左派）访华代表团团长、日本共产党（左派）中央委员会主席福田正义和代表团秘书长穴迫隆之，团员保田敏男、松井志郎、影山春雄，随员国谷哲资。"},{"type":"paragraph","text":"会见是在团结、友谊气氛中进行的，中日两国同志进行了亲切友好的谈话。"},{"type":"paragraph","text":"中共中央对外联络部负责人和工作人员任允中、张香山、庄涛、肖簧、毛宝忠、林丽韫、吕辉祥等参加了会见。"},{"type":"paragraph","text":"新华社二十日讯 中共中央政治局常委周恩来，中共中央政治局委员江青、张春桥、姚文元，中共中央政治局候补委员纪登奎，中共中央委员、中联部部长耿飚，今晚设宴招待日本共产党（左派）中央委员会主席福田正义率领的日本共产党（左派）访华代表团。"},{"type":"paragraph","text":"福田正义同志和代表团秘书长穴迫隆之，代表团团员保田敏男、松井志郎、影山春雄，代表团随员国谷哲资，应邀出席了宴会。"},{"type":"paragraph","text":"周恩来同志和福田正义同志先后在宴会上讲话，共祝中日两国共产党的战斗友谊和团结，中日两国人民的战斗友谊和团结，不断巩固和发展。"},{"type":"paragraph","text":"出席宴会作陪的有中共中央有关部门、中共北京市委、中日友协的负责人：任允中、丁国钰、王国权、张纪之、邓岗、刘建功、戴征远、鲁瑛、崔金耀、刘春、王晓云、张香山、庄涛、肖簧、毛宝忠、狄文蔚、张雨、金丰、施恩俊等。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a7929c1f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
