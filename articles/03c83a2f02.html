year":1960,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东同志的著作很多，内容非常丰富，包括各个方面的理论和学说。概括起来，可分为如下几类:"},{"type":"paragraph","text":"关于马克思列宁主义的世界观和方法论；"},{"type":"paragraph","text":"关于革命的基本理论和党的政治路线；"},{"type":"paragraph","text":"关于无产阶级专政的学说；"},{"type":"paragraph","text":"关于农民问题的学说；"},{"type":"paragraph","text":"关于革命统一战线的学说；"},{"type":"paragraph","text":"关于建立革命根据地的学说；"},{"type":"paragraph","text":"关于社会主义经济建设问题的学说；"},{"type":"paragraph","text":"关于战争和战略问题的学说；"},{"type":"paragraph","text":"关于帝国主义的学说；"},{"type":"paragraph","text":"关于国际共产主义运动的学说；"},{"type":"paragraph","text":"关于文化艺术问题的学说；"},{"type":"paragraph","text":"关于党的建设的学说。"},{"type":"paragraph","text":"毛泽东同志的所有这些著作，都是我们必须系统学习、反复研究的。当前，首先要学习毛泽东同志关于世界观和方法论的学说，如“矛盾论”、“实践论”、“关于正确处理人民内部矛盾的问题”、“改造我们的学习”、“关于领导方法的若干问题”、“农村调查的序言和跋”等。同时必须学习毛泽东同志关于社会主义经济建设问题的学说，从理论上深刻地理解总路线的内容，完整地领会总路线的精神。"},{"type":"paragraph","text":"(摘自人民日报载吴芝圃:“学习毛泽东同志的著作”)"}],"comments":[],"origin":"人民日报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03c83a2f02"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
