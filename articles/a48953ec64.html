art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在毛泽东旗帜下奋勇前进（诗传单）","authors":["上海铁道红色文艺造反队"],"parts":[{"type":"paragraph","text":"话儿不用多说，"},{"type":"paragraph","text":"事情已很明白，"},{"type":"paragraph","text":"那反动路线的代表人物，"},{"type":"paragraph","text":"正在策划“三停”，"},{"type":"paragraph","text":"用停水停电和停止交通运行，"},{"type":"paragraph","text":"恶毒地危害国计民生，"},{"type":"paragraph","text":"用增加工资、福利、奖金，"},{"type":"paragraph","text":"妄图腐蚀我们工人红色的心灵，"},{"type":"paragraph","text":"这是反动路线的新反扑，"},{"type":"paragraph","text":"阴谋破坏无产阶级文化大革命。"},{"type":"paragraph","text":"革命造反派的同志，"},{"type":"paragraph","text":"要擦亮眼睛，"},{"type":"paragraph","text":"不能让这阴谋得逞，"},{"type":"paragraph","text":"毛主席发动的文化大革命，"},{"type":"paragraph","text":"是历史前进的火车头，"},{"type":"paragraph","text":"区区小虫休逞能，"},{"type":"paragraph","text":"螳臂挡车难逃粉身碎骨的命运。"},{"type":"paragraph","text":"毛主席下达命令，"},{"type":"paragraph","text":"抓革命，促生产。"},{"type":"paragraph","text":"我们革命造反派坚决执行，"},{"type":"paragraph","text":"不管风吹雨打，"},{"type":"paragraph","text":"不管严寒霜冻，"},{"type":"paragraph","text":"革命的铁路工人坚守生产岗位，"},{"type":"paragraph","text":"把绿灯高擎，"},{"type":"paragraph","text":"把道岔开通，"},{"type":"paragraph","text":"把运行的秩序牢牢地建立，"},{"type":"paragraph","text":"人民革命是历史前进的火车头，"},{"type":"paragraph","text":"永远在毛主席的旗帜下奋勇前进！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a48953ec64"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
