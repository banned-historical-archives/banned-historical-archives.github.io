:[{"year":1951,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】拉萨卅日消息:中央人民政府赴藏代表张经武将军在日前代表中央人民政府毛主席向达赖喇嘛赠送礼物。礼物中有毛主席画像、中国人民政治协商会议第一届全体会议纪念刊、‘伟大的祖国’全套照片、以及许多精致的象牙雕刻、玉器、瓷器、湘绣、内地绸缎等珍贵物品。当这些礼物抬过拉萨大街的时候，拉萨僧俗人民争先围集观看。达赖喇嘛接受毛主席的礼物，并向毛主席的画像致敬。礼物接受完毕以后，达赖喇嘛接见了张代表。张代表传达了毛主席、中央人民政府和各首长对达赖喇嘛的关怀，并说明人民解放军进藏部队和工作人员将坚决执行和平解放西藏办法的协议，忠诚地为西藏人民服务。达赖喇嘛表示非常感谢并敬祝毛主席身体健康。"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2128fcd706"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
