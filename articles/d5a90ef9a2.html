" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"剥开“马列主义者”的外衣　刘叔模三十年来一贯反共","authors":["新华社"],"dates":[{"year":1957,"month":8,"day":6}],"is_range_date":false,"parts":[{"text":"剥开“马列主义者”的外衣  刘叔模三十年来一贯反共","type":"title"},{"text":"新华社","type":"authors"},{"text":"《人民日报》讯：民革武汉市委副主委兼秘书长刘叔模反苏反共的丑恶面目，２日在民革武汉市人民委员会参事室支部会上被彻底揭露出来。","type":"paragraph"},{"text":"刘叔模曾公开为右派分子辩护；他说葛佩琦的发言只是因为他在肃反运动中受了些委屈，是“感情用事”。他把章伯钧看成是一个没有中心思想的政治家，认为他提出“政治设计院”是很自然的事。","type":"paragraph"},{"text":"根据人们的揭发，刘叔模一贯仇视共产党，反对社会主义。刘叔模狂妄地把自己说成是“武汉的马列主义者”，是“正人君子”，而把靠近党的积极分子说成是无所不作的小人。","type":"paragraph"},{"text":"在会议上，与会者以许多事实剥开了刘叔模伪装“马列主义者”的最后一件外衣。原来，这个反共专家远在１９１９年到１９２２年留学法国期间，就谩骂过当时留法革命者周恩来总理和聂荣臻副总理。据参事室参事戴文等揭露，大革命前后，他勾结汪精卫；抗日战争开始后，他又爬上了伪省府委员的高位，大唱反苏反共滥调，在他创办的“湖北论坛”上发表了许多反动文章，诅咒共产党是“中国社会发展迟滞的内在阻力，决不允许它再张凶焰”。直到解放前夕，他还主张把伪省府迁往鄂西山区，坚决反共到底。","type":"paragraph"},{"text":"在大量事实面前，刘叔模仍企图狡辩，把一切反动言行归结为出于“资产阶级的个人主义”。","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月6日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5a90ef9a2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
