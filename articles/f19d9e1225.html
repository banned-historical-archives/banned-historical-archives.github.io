art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"疯狂的捣乱可耻的失败","authors":["任力"],"parts":[{"type":"paragraph","text":"正当全国军民在以毛主席为首的党中央的英明领导下，开展反击右倾翻案风的斗争取得伟大胜利的重要时刻，一小撮阶级敌人公然冒天下之大不韪，蓄意制造了天安门广场的反革命政治事件。他们把矛头直接指向伟大领袖毛主席和以毛主席为首的党中央。他们为不肯改悔的走资派邓小平歌功颂德，妄图把邓小平抬出来充当中国的纳吉，复辟资本主义。这种倒行逆施的反革命行为，立即受到了强大的无产阶级专政的惩罚，以可耻的失败而告终。粉碎反革命复辟逆流所取得的伟大胜利，大长了革命人民的志气，大灭了阶级敌人的反动气焰。"},{"type":"paragraph","text":"“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑”。在革命力量无比强大，取得重大胜利的时候，一小撮阶级敌人是不甘心于他们的失败的。反动的阶级本性迫使他们跳出来同革命力量较量。尽管这种较量必然会给敌人带来灭顶之灾，尽管革命人民再三向他们发出警告，他们仍然要顽固到底。这次反革命政治事件，一小撮阶级敌人制造谣言，狂叫呐喊，张贴反动标语，书写反动诗词，放火行凶，霎时间，似乎是“黑云压城城欲摧”。但是，反革命分子嚣张之时，就是他们的灭亡之日。历史的辩证法是无情的。阶级敌人要逆历史的潮流而动，妄图阻挡和扭转历史的车轮前进，他们就必然受到历史的惩罚。"},{"type":"paragraph","text":"反动势力的疯狂与嚣张，只是暂时的现象，反动本质决定了他们是虚弱的，孤立的。由于阶级敌人的虚弱和孤立，就决定了他们的闹事和捣乱是短命的。一小撮阶级敌人的复辟梦，被首都工人民兵、人民警察和警卫战士几小时就粉碎了。首都工人民兵、人民警察、警卫战士有广大革命人民群众的有力支持，“谈笑凯歌还”！"},{"type":"paragraph","text":"这铁一般的事实，再一次雄辩地证明：我们的无产阶级专政是多么巩固，多么强大，而一小撮阶级敌人是多么不堪一击！较量的结果，暴露了敌人，锻炼了群众，坏事变成了好事。"},{"type":"paragraph","text":"毛主席指出：“翻案不得人心。”人民是要革命，要前进的。反击右倾翻案风，批判不肯改悔的走资派邓小平的反革命的修正主义路线，符合全体人民的根本利益，体现着历史前进的方向，大得人心。我们要紧密团结在以毛主席为首的党中央周围，坚持党的基本路线，以阶级斗争为纲，提高革命警惕性，严密注视阶级斗争的动向，把这场反击右倾翻案风的伟大斗争进行到底！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f19d9e1225"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
