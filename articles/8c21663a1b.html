" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对关于第二次核试验试爆时间的报告和新闻公报稿的批语","alias":"","parts":[{"type":"paragraph","text":"对关于第二次核试验试爆时间的报告"},{"type":"paragraph","text":"和新闻公报稿的批语！"},{"type":"paragraph","text":"（1965年5月12日）退总理。同意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十二日上午九时"},{"type":"paragraph","text":"[1]这是毛泽东对周恩来1965年5月11日呈送中国人民解放军副总参谋长兼国防科学委员会副主任张爱萍、第二机械工业部副部长兼国防科学委员会副主任刘西尧等关于第二次核试验预定起爆时间的报告以及新闻公报稿的报告的批语。"},{"type":"paragraph","text":"[2]这里指周恩来。"},{"type":"paragraph","text":"[3]周恩来的转呈报告说：从5月12日到13日大概有20多小时的好天气。经与罗瑞卿、杨成武、刘杰等同志商定，已告前方准备行动。前方来电，已定明日行动。行动后的新闻公报，已经常委各同志审阅，现送上请核。1965年5月14日10时，第二次核试验成功进行。5月15日，新华社正式发表中国进行第二次核试验的新闻公报。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":5,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":41,"page_end":41},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c21663a1b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
