torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"在中共中央、中革军委负责人会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央、中革军委负责人"},{"type":"paragraph","text":"会议上的讲话！"},{"type":"paragraph","text":"（1935年4月28日）"},{"type":"paragraph","text":"遵义会议后，我军大胆穿插，机动作战，把蒋介石的尾追部队甩在侧后，取得了北渡金沙江的有利时机。云南境内的地形条件，不像湖南、贵州有良好的山区可以利用，我军不宜在昆明东北平川地带同敌人进行大的战斗。我军应趁沿江敌军空虚，尾追敌人距我尚有三四天的行程，迅速抢渡金沙江，以争取先机。"},{"type":"paragraph","text":"[1]1935年4月28日，毛泽东和朱德、周恩来等到鲁口哨、水平子一带宿营。当晚，出席中共中央、中革军委负责人会议，研究北渡金沙江的行动部署。这是毛泽东在会议上讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":4,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":169,"page_end":169},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40519bcfb6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
