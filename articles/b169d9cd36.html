7,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黄埔区革命委员会"},{"type":"paragraph","text":"姚文元同志《评陶铸的两本书》的重要文章，用毛主席的光辉思想，极其深刻地剥开了陶铸这个反革命两面派的阴险嘴脸和丑恶本质。同时，也使我们更进一步地认识到，在当前无产阶级文化大革命进入到一个关键时刻，必须百倍地提高革命警惕性，随时识破阶级敌人从极“左”或极右方面，来动摇和破坏以毛主席为首的无产阶级司令部，动摇和破坏无产阶级革命派的坚强支柱——中国人民解放军。毛主席教导我们:“各种剥削阶级的代表人物，……他们有长期的阶级斗争经验，他们会做各种形式的斗争——合法的斗争和非法的斗争。我们革命党人必须懂得他们这一套，必须研究他们的策略，以便战胜他们。切不可书生气十足，把复杂的阶级斗争看得太简单了。”在当前特别要注意阶级敌人以极“左”的面目出现，在我们队伍中制造分裂，挑动武斗，企图搅乱我们的阵线，阴谋破坏无产阶级文化大革命。"},{"type":"paragraph","text":"我们一定要认真学习姚文元同志这篇重要文章，以最大的决心和毅力，排除一切干扰，牢牢掌握斗争大方向，紧跟毛主席的伟大战略部署。我们对于以毛主席为首的无产阶级司令部发出的一切战斗号令，一定要坚信不疑，坚定不移，坚决贯彻，坚持到底。理解的要坚决执行，暂时不理解的也要坚决执行。只有这样，才能集中火力，集中目标，彻底捣毁资产阶级司令部、夺取无产阶级文化大革命的彻底胜利。"},{"type":"paragraph","text":"我们黄浦区革命委员会的诞生，这只是无产阶级革命派在组织上取得了夺权斗争的胜利。要从政治上、思想上、理论上把权彻底夺过来，还要经过十分艰巨的斗争。阶级敌人随时随地都在对我们进行破坏和捣乱，如果我们丧失警惕，或者放松斗争，那就随时都有丧失政权的危险。因此我们一定要更高地举起毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，千百倍地增强军民的团结，念念不忘阶级斗争，牢牢掌握斗争大方向，充分发动和依靠群众，在全区范围内掀起一个更大规模的革命大批判的新高潮。同时，我们坚决响应市革命委员会的号召，“杀”向基层，到群众中去，到革命大批判的第一线去，拜群众为师，和群众在一起，在伟大统帅毛主席的率领下，为夺取无产阶级文化大革命的新胜利立新功，重新劳!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b169d9cd36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
