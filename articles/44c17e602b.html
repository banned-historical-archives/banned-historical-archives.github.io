主观主义和宗派主义","authors":["新华社"],"dates":[{"year":1957,"month":4,"day":25}],"is_range_date":false,"parts":[{"text":"湖南高等学校负责人在座谈会上批评领导上的官僚主义、主观主义和宗派主义","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社长沙２５日电中共湖南省委员会召集全省六所高等学校的负责人和一部分教授，座谈人民内部矛盾问题。中共中央宣传部副部长张际春，中共湖南省委第一书记周小舟，省委书记处书记周礼等分别参加了小组讨论会。座谈会进行了十一天，到２２日结束。","type":"paragraph"},{"text":"参加座谈会的三十八位党外人士都开诚布公，倾心畅谈了自己的意见，比较集中地批评了湖南省党政领导上的官僚主义、主观主义和宗派主义。湖南医学院院长凌敏猷，湖南医学院附属医院院长邓一韪等人士对目前高等学校领导多、职责不明形成“老子多、妈妈少、管的多、关心少”等现象提出批评。","type":"paragraph"},{"text":"参加会的人认为这几年来在学院里，由于一些党员领导干部存在宗派主义情绪和个别党员工作方法生硬、粗暴，以致同某些非党人士合作时还有些误会和隔阂。中南土木建筑学院教授李吟秋恳切地提出，希望共产党员不要光象吸铁石，只能吸住钢铁，要象士敏土（水泥）一样，把灰尘土屑也通通凝结在一起。中共湖南省委第一书记周小舟在听取教授们意见时，随时对个别党员和非党人士合作共事中的简单粗暴行为进行了严格批评，并要求非党人士多提意见，帮助党内整顿工作作风。中南土木建筑学院副院长魏东明（共产党员）检查了过去简单粗暴的工作方法，表示今后努力改进。","type":"paragraph"},{"text":" ---- 原载《人民日报》1957年4月26日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44c17e602b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
