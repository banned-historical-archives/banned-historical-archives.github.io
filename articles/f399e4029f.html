ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复拉比·蒲哈利电","alias":"","parts":[{"type":"paragraph","text":"复拉比?蒲哈利电!"},{"type":"paragraph","text":"（1949年10月26日）拉比·蒲哈利同志和阿尔及尔共产党中央委员会全体同志们："},{"type":"paragraph","text":"对于拉比·蒲哈利同志十月九日的贺函，谨表深切的感谢。"},{"type":"paragraph","text":"中国人民是从帝国主义长期侵略压迫下求得解放的。因此对于被压迫民族的解放斗争，具有热烈的同情和坚定的信心。我相信，阿尔及尔人民在阿尔及尔共产党领导下和国际和平民主阵营援助下，终将推翻帝国主义的统治。阿尔及尔人民解放斗争的胜利方岁！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"[1]中华人民共和国成立之际，阿尔及尔共产党中央来电祝贺。这是毛泽东的复电。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":470,"page_end":470},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f399e4029f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
