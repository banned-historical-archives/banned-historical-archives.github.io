art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《国家利益论》一书出版","authors":["夏征难还分析了中国与西方在国家利益观上的不同点，如中国强调将本国的国家利益与世界人民的共同利益有机地统一起来，坚决反对为了自己的利益而损害他国利益的霸权主义行径，而西方国家则主张从达成自己利益的目的和结果出发，去判断是与非？善与恶/中国较强调求取长远的“世用”之利，而西方国家则较强调近前的“时用”之利？还指出，中国强调以最广大群众的目前利益和将来利益的统一为出发点，西方国家则以占有统治地位的剥削阶级的利益决定国家利益？"],"parts":[{"type":"paragraph","text":"●夏征难"},{"type":"paragraph","text":"由军事科学出版社新近出版的《国家利益论》一书，构建了国家利益理论的基本框架。"},{"type":"paragraph","text":"该书通过对世界各国国家利益观特点的探讨，比较了中西方国家利益观的异同，特别在两极战略格局解体之后，世界向多极化方向发展的趋势下，世界诸国国家利益变化的一些共同点。例如，国家利益在各国战略决策中的地位作用相对突出：国家经济利益倍受关注，经济被视为首要战略目标；各国利益相互渗透，战略应考虑的国际性因素增多；各国各种利益相互制衡，需从整体上维护自身利益；各国间利益关系更为敏感，战略上应注重突发事件的发生。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9ec72842f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
