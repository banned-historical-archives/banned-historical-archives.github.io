uthors":[],"dates":[{"year":1974,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见巴基斯坦外交部秘书夏希"},{"type":"paragraph","text":"夏希结束对我国的正式访问后离京回国"},{"type":"paragraph","text":"新华社一九七四年六月十日讯　邓小平副总理今天上午会见了巴基斯坦外交部秘书阿迦·夏希，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"随同夏希先生来访的巴基斯坦外交部司长贾弗里，巴基斯坦驻中国大使阿尔维，大使馆公使米尔查，参加会见。"},{"type":"paragraph","text":"参加会见的还有我国外交部副部长乔冠华、亚洲司司长陆维钊、国际条法司司长安致远、礼宾司副司长高建中，以及章含之、陈琰、赵青田。"},{"type":"paragraph","text":"新华社一九七四年六月十日讯　巴基斯坦外交部秘书阿迦·夏希以及随同来访的外交部司长贾弗里，结束了对我国的正式访问，今天下午乘飞机离京回国。"},{"type":"paragraph","text":"我国外交部副部长乔冠华、亚洲司司长陆维钊、国际条法司司长安致远、礼宾司副司长高建中等，前往机场欢送巴基斯坦贵宾。"},{"type":"paragraph","text":"到机场送行的还有巴基斯坦驻中国大使阿尔维，大使馆公使米尔查和其他外交官员。土耳其驻中国大使馆一等秘书阿载尔也到机场送行。"},{"type":"paragraph","text":"在北京期间，夏希先生参观了工艺美术展览，游览了香山。昨天晚上，阿尔维大使为夏希先生访华举行了宴会。（附图片）"},{"type":"paragraph","text":"邓小平副总理六月十日会见了巴基斯坦外交部秘书阿迦·夏希。这是会见时合影。\t    新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"乔冠华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ebc0ddc72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
