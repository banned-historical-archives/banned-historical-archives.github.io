art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"井冈山在京隆重纪念毛泽东百周年诞辰余秋里邓力群伍修权朱敦法等领导出席","authors":["掠畈方鸨？"],"parts":[{"type":"paragraph","text":"本报北京10月8日讯 记者新宇、卜金宝报道：当年在井冈山战斗过的部分前辈和井冈山市部分干部、群众，今天聚会人民大会堂，隆重纪念毛泽东同志诞辰100周年。"},{"type":"paragraph","text":"余秋里、邓力群、伍修权，国防大学校长朱敦法等参加纪念活动。"},{"type":"paragraph","text":"井冈山市市委书记马仲强向与会者介绍了井冈山的改革开放和经济发展情况。他说，去年邓小平同志南巡重要谈话以来，不足6万人口的井冈山市进一步打开山门，内引外联，经济建设突飞猛进，去年全市工农业总产值达1.8亿元，财政收入过千万元，人均收入694元，分别是1978年的3.9倍、6.2倍和8.5倍。今年头9个月，全市主要经济指标比去年同期增长15％以上。他欣喜地告诉大家，如今井冈山人民的温饱已经基本解决，并开始起步奔向小康。"},{"type":"paragraph","text":"与会老同志叙今思昔，感慨万千。他们说，当年井冈人民在毛泽东等老一辈无产阶级革命家领导下，为中国革命作出了重大贡献；今日井冈人民在邓小平同志具有中国特色社会主义理论指导下，一定能再创井冈山的辉煌。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"邓力群","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f3c1ec4b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
