art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决反对南共修正主义","authors":[],"parts":[{"type":"paragraph","text":"据新华社布拉格22日电 捷克斯洛伐克共产党第十一次代表大会21日就诺沃提尼同志所作的捷共中央委员会工作报告通过了一项决议。决议认为，捷克斯洛伐克在建设方面所取得的成就证明了，过去几次党代表大会所规定的捷克斯洛伐克建设社会主义的总路线是完全正确的。"},{"type":"paragraph","text":"决议说，各国共产党和工人党去年11月的莫斯科会议所反映的共产党和工人党的巩固的团结和会议所通过的文件，是争取社会主义的斗争中的一切胜利的根本条件。"},{"type":"paragraph","text":"我们认为，反对修正主义的斗争是我们的国际义务。修正主义攻击马克思列宁主义的基本原则，企图破坏共产主义革命运动的团结一致。我们坚决反对南斯拉夫共产主义者联盟的代表们所宣扬的反马克思主义的修正主义观点，这些观点充分反映在南斯拉夫共产主义者联盟第七次代表大会所通过的纲领中。在这个修正主义的纲领中，南斯拉夫共产主义者联盟使自己脱离国际共产主义运动而孤立起来。"},{"type":"paragraph","text":"决议说，捷克斯洛伐克共产党已经作了足够的努力斗争取在马克思列宁主义的基础上同南斯拉夫共产主义者联盟和解。我们同其他兄弟党一样认为，今后我们两党之间的关系的发展要取决于南共的进一步行动。就国家政策来说，我们将继续同南斯拉夫保持对两国有利的那种相互关系。"},{"type":"paragraph","text":"在谈到国内社会主义建设的问题时，决议说，捷共今后的主要任务是：做到使社会主义的、合作的大规模生产在农业中占优势，消灭敌对阶级的残余，在最新的技术特别是自动化、机械化和化学化的基础上进一步发展生产力。同时，还必须使社会主义民主不断得到加强和完善，使劳动人民更多地积极参与国家和经济的管理，并且按照马克思列宁主义学说的精神继续加强人民在精神上和政治上的团结和完成文化革命。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a1ada7e65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
