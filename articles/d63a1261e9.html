ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"给续范亭的信","alias":"","parts":[{"type":"paragraph","text":"给续范亭的信"},{"type":"paragraph","text":"（1943年12月4日）范亭同志："},{"type":"paragraph","text":"大示及诗拜读，洋粉拜领，江青当遵示照服。贵体虽有起色，但看东西仍不宜太多，请加注意。邓先生\"西北人望，调护国共关系，出力甚多，此次南行，讲了许多好话，我们心中感谢他。惟此次见面，似不满足，因我们未谈具体办法。其实我们毫无具体办法，例如撤消封锁，承认边区，恢复新四等等，除听候国民党解决外，我们方面是毫无办法的。边区周围情况仍紧，惟国际环境日好，日寇又有进攻之势，时局或可不走向决裂。明年春夏尚有一关，过了此关，或有好转之望。我如常，一年未生大感冒，算一幸事。敬颂起居安畅！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月四日[1]指邓宝珊，当时任晋陕绥边区总司令。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":254,"page_end":254},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d63a1261e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
