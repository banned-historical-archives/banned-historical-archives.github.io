tes":[{"year":1994,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"审理极右分子案解释荒唐"},{"type":"paragraph","text":"德主审法官被解职"},{"type":"paragraph","text":"本报波恩８月１６日电记者刘华新报道：德国曼海姆地方法院昨天决定，解除主持审理极右分子德克特一案的主审法官沃尔夫冈·米勒的第一审判庭和第六审判庭庭长的职务，原因是米勒“有病在身”。"},{"type":"paragraph","text":"德克特因１９９１年１１月为美国某极右分子翻译演讲，并大肆宣扬否认纳粹德国屠杀犹太人的观点，于１９９２年１１月被曼海姆地方法院以煽动民众和煽动种族仇恨罪判处１年徒刑，缓期执行，后被联邦法院以判决解释“过于笼统”为由驳回。今年６月，曼海姆地方法院重审，结果是维持原判。但在判决解释中，案犯德克特却被说成是“性格坚强、有责任感、原则明确的人”，还说法院相信他“对忠于正义所作的表白”。这一“解释”受到德国政界、经济界和国际舆论的强烈谴责。曼海姆检察院也向联邦法院提出了上诉。"},{"type":"paragraph","text":"曼海姆法院还宣布，对参与审理此案的另一名法官“因病必须变更工作”的问题将另行决定。"},{"type":"paragraph","text":"德国报纸今天还刊登了原主审法官米勒通过律师发表的声明。声明承认，判决解释“措辞引起误解”，对此表示遗憾。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f61ee8b5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
