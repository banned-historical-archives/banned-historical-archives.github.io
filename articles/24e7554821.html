"dates":[{"year":1993,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界杯乒乓球赛在广州开幕"},{"type":"paragraph","text":"马文革王涛打入前八名"},{"type":"paragraph","text":"本报广州８月２０日电１９９３年喜力世界杯乒乓球锦标赛今日在广州体育馆拉开战幕，经过第一阶段２４场比赛的角逐，前八名选手已产生。中国的王涛、马文革分别过关，瑞典的瓦尔德内尔则因伤弃权，失去进入前８名的机会。"},{"type":"paragraph","text":"今天，中国队的头号主力马文革出线颇为勉强，他在下午对瑞典林德的比赛中，状态不佳，以１比２失利，３局比分为２３比２５，２１比１９，１８比２１。好在马文革最后一个对手是英格兰的陈新华，陈新华似乎无心恋战，以１８比２１、１９比２１败下阵来，使马文革得以小组出线，而林德则因计算净胜局后被挤出前８名。"},{"type":"paragraph","text":"引人关注的是世界排名第一的瑞典名将瓦尔德内尔在与加拿大的黄文冠对阵中，双方战成１比１，瓦尔德内尔肩伤复发，在经教练按摩后继续上场比赛，决胜局打到７比１６瓦尔德内尔落后时，无力再战的瓦尔德内尔宣布弃权。随后，他又放弃了晚上对克罗地亚普里莫拉茨的比赛，战绩一胜二负仅列小组第三，无缘进入前八名。"},{"type":"paragraph","text":"进入前八名的选手分别为：普里莫拉茨、黄文冠、陈新华、马文革、卡尔松、塞弗、王涛和丁毅。"},{"type":"paragraph","text":"（赵劲）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24e7554821"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
