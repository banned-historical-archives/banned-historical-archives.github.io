ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"在王稼祥来信上的批语","alias":"","parts":[{"type":"paragraph","text":"在王稼祥来信上的批语！"},{"type":"paragraph","text":"（1972年12月）可试行。"},{"type":"paragraph","text":"[1]王稼祥，原任中共中央委员、中央书记处书记、中央对外联络部部长。“文化大革命”中受到迫害。1972年12月10日，他给周恩来写信说，我想做一点点工作。我虽长期有病，听力又很差，但我脑力每天还能使用几个小时，阅读能力还有一些。解放后，我搞了一个时期的外事工作，而别的工作部门，我是一点都不熟悉。因此我特函请总理在万忙中考虑我的上述情况，能否分配给我一点外事调查研究的工作。12月18日，周恩来将这封信报送毛泽东时写道：“我意，稼祥同志可以做外事调研工作，如主席同意，请批示，以便向中央报告。”毛泽东的批语，就写在周恩来转报的来信上。1973年8月，王稼祥在中国共产党第十次全国代表大会上当选为中央委员。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":370,"page_end":370},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e578cd3d41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
