市建设部","彭石安"],"dates":[{"year":1957,"month":8}],"is_range_date":false,"parts":[{"text":"彭石安的一些反动言论","type":"title"},{"text":"城市建设部彭石安","type":"authors"},{"text":"(彭石安：城市建设部城市建设出版社编辑、翻译)","type":"subtitle"},{"text":"(1)反对党员当领导。他说：什么地方都放上一个共产党员当领导，这些不学无术的人当了领导，不但作不好工作反而把社会主义搞得很乱。对打击出版社的领导也是第一个开炮人，在小组会上向副社长何文同志拍桌子叫她马上走，并叫办公室主任刘兰池同志也走(均是党员)。","type":"paragraph"},{"text":"(2)他说：民主人士都是挂名的，都是有职无权，如果挂名就干脆不要，并同意钱煇焴说的：如果不许自由就不如干脆公开“不许自由”“不许民主”“不许平等”的说法。","type":"paragraph"},{"text":"(3)他说：党包括毛主席在内对知识分子的看法都有问题。毛主席说：“知识分子其实是比较地最无知识的。工农分子的知识有时倒此他们多一点”我认为这理论就有问题。在这个理论指导下，解放以来许多老教授对自己的科学研究也怀疑是否有必要了，这也是科学不能很快发展起来的原因。","type":"paragraph"},{"text":"(4)他说斯大林都犯了错误，我们的党也可能犯错误。","type":"paragraph"},{"text":"(5)在办公室内宣传林希翎的一些反动言论，如社会主义国家只有南斯拉夫最好，毛主席提出百家争鸣，百花齐放的方针时，很多人不同意，………等等。","type":"paragraph"},{"text":"此外，他还用章回小说，黄色小调等形式写了“新官场现形记”，“杨三姐五更劝夫”，“马屁精”，“涂了漆的共产党员”等大字报，恶毒地污蔑、丑化党和党的负责干部，把新社会描画的暗无天日，黑漆一团。","type":"paragraph"},{"text":" (城市建设出版社整理)","type":"paragraph"},{"text":" 来源：《城市建设部整风办公室编印“整风通讯”第三期》，1957年；钱煇焴提供。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78ca0edd83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
