art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英会见法议会执行局代表团叶剑英说，中法友好关系历史悠久，中国一贯重视发展同法国的友好关系","authors":[],"parts":[{"type":"paragraph","text":"据新华社八月二十九日讯 人大常委会委员长叶剑英今天下午会见了法国国民议会的法国国民议会执行局代表团。"},{"type":"paragraph","text":"当法国贵宾来到人民大会堂会见厅时，叶剑英同他们一一热情握手，对贵宾们的来访表示热烈欢迎。叶剑英说，中法建交后，法国国民议会第一次派以议长为首的代表团前来访问，我很高兴。中法友好关系有着悠久的历史，议长阁下等贵宾的来访将进一步发展我们两国的友好关系。"},{"type":"paragraph","text":"叶剑英说，中法两国的友好关系具有良好的基础。我们党和国家许多领导人，包括已故的和健在的，在青年时代曾在法国工作和学习过。中国一贯重视发展同法国的友好关系。他说，近年来，我国人民代表大会和法国国民议会之间的来往不断增多，这是一件令人高兴的事情。"},{"type":"paragraph","text":"叶剑英请梅尔马兹议长回国后转达中国人民对法国人民的友好情谊，并转达他本人对密特朗总统的问候和良好祝愿，期待他明年来访。"},{"type":"paragraph","text":"梅尔马兹说，我们知道你在中国历史上和在社会主义建设中所发挥的作用，你同毛泽东主席在一起所发挥的作用。今天我们有机会见到你，感到非常荣幸。他说，正如你所说的，法中两国有着历史悠久的关系，这是符合两国人民的利益和世界和平的利益的。他转达了密特朗总统对叶剑英委员长的友好情谊。他说，密特朗总统将于明年五月访问中国。"},{"type":"paragraph","text":"会见结束时，法国贵宾热烈鼓掌，再次向叶剑英委员长致意。叶剑英祝代表团访问成功。"},{"type":"paragraph","text":"这是叶委员长和梅尔马兹议长握手。 新华社记者摄RW：叶剑英；会见外宾；新闻照片"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5ad778bb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
