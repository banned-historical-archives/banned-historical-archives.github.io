],"dates":[{"year":1972,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　暑假期间，勤立中学党支部在组织广大学生开展丰富多彩的文娱活动的同时，并组织他们开展学习马列著作、批判刘少奇一类骗子罪行的活动。暑假一开始，学校就组织了一支八十多人的学习骨干队伍，先学一步。然后再将这些骨干分散到各个校外学习小组去，组织广大红卫兵和同学认真学习。到目前为止，全校已组织了红卫兵学马列小组和校外学习小组共一百多个。暑假期间主要学习《共产党宣言》，每周学习一至二次。"},{"type":"paragraph","text":"这个学校把学习《共产党宣言》和批修整风相结合，狠批刘少奇一类骗子的反革命罪行。在学习《共产党宣言》中关于阶级和阶级斗争的论述时，他们请在旧社会苦大仇深的老工人来讲苦难家史和工人们与资本家斗争的厂史，学校还介绍了恩格斯的《英国工人阶级状况》一文中的历史资料，帮助同学们加深理解马克思主义的阶级斗争学说。在这个基础上，他们深入批判了刘少奇一类骗子的“阶级斗争熄灭论”。有些红卫兵原来认为自己“生在新社会，长在红旗下，前进路上可以歇一歇了”。学习了《共产党宣言》中关于自从原始公社解体以来“到目前为止的一切社会的历史都是阶级斗争的历史”的论述和毛主席关于“千万不要忘记阶级斗争”的教导后，认识到阶级斗争并没有结束，继续革命决不能停步。通过学习、批判，他们认清了刘少奇一类骗子鼓吹“阶级斗争熄灭论”的罪恶阴谋，提高了继续革命的自觉性，积极投入到当前火热的阶级斗争和路线斗争中去。中三和中二年级的许多红卫兵在里弄里还组织了战斗组，配合里弄干部、退休老工人狠抓阶级斗争，用毛泽东思想占领校外阵地，得到了群众的好评。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb1ed26e1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
