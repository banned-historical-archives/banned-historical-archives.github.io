uthors":[],"dates":[{"year":1959,"month":2,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社莫斯科4日电】　苏联共产党第21次代表大会4日下午4时(莫斯科时间)在大克里姆林宫继续举行会议，讨论赫鲁晓夫同志的报告。"},{"type":"paragraph","text":"苏联驻中国大使尤金院士在发言中详细地谈到了赫鲁晓夫同志的报告中所提出的理论问题。尤金说，七年计划不是向共产主义过渡的个别公式，而是向共产主义过渡的严密的科学计划。现在，凡是想理解共产主义是什么的人，除了马克思主义经典著作以外，都应该研究苏共第21次代表大会的文件。"},{"type":"paragraph","text":"尤金接着说，由于工作关系，他曾亲眼见到中国人民在共产党领导下始终不渝地在建树具有历史意义的革命功绩。他说，中国正在全面展开社会主义社会建设。它已经比不久前同它站在同一水平的其他亚洲国家前进了整整一个时代。"},{"type":"paragraph","text":"尤金还详细地谈到中国工业的增长，中国培养熟练专家干部的成就和中国农民所取得的成就。"},{"type":"paragraph","text":"尤金强调指出，中国共产党是国际共产主义运动的一支光荣队伍。中国人民和中国共产党以自己的功绩博得了苏联人民和全人类的深切爱戴。他说，全世界都为中国的成就而欢呼，只有帝国主义者和不可救药的修正主义者才不高兴。"},{"type":"paragraph","text":"尤金指出，南斯拉夫修正主义者在美国垄断资本帮助之下来宣传美国生活方式。美国帝国主义者是知道美元的价值是甚么的。南斯拉夫在经济方面已经受到美国的控制。"},{"type":"paragraph","text":"尤金在谈到铁托同杜勒斯一道攻击中华人民共和国时说，铁托集团和美帝国主义者一同行动，这就揭破了修正主义者的伪装。"},{"type":"paragraph","text":"在下午会议上，以色列、玻利维亚、瑞士、冰岛和新西兰的兄弟党的代表向代表大会致了贺词，受到与会者的热烈欢迎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af14b999b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
