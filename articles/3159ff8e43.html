就可以把思想真正统一到十一届三中全会以来的路线方针政策上来","authors":[],"dates":[{"year":1984,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《人民日报》昨天发表题为《彻底否定“文革”一通百通》的评论员文章。"},{"type":"paragraph","text":"文章说，在整改阶段拿出足够的时间，认真进行彻底否定“文革”的教育，是十分必要的。不少单位的实践说明，在整党中抓住彻底否定“文革”这个大题目，引导党员联系实际，开展批评和自我批评，就可以做到一通百通，把思想真正统一到党的十一届三中全会以来的路线方针政策上来。"},{"type":"paragraph","text":"文章指出，“文革”是一场祸国殃民的坏事。坏事就是坏事，不存在什么坏中有好、好坏几开的问题。只有把这个大是大非问题讲明、点穿，才能彻底否定“文革”。当然，在一定条件下，矛盾可以转化，坏事可以变好事。"},{"type":"paragraph","text":"文章说，有些地方、单位，在落实政策、选拔干部、调整班子、清理“三种人”等的时候，老是受到派性的干扰；工作指导思想不端正，在改革中老是摆脱不了“左”的思想影响和习惯势力的束缚，主要原因是那里的领导干部没有按照中央的要求进行彻底否定“文革”的教育。"},{"type":"paragraph","text":"文章最后指出，否定“文革”，对大多数同志来路主要是总结经验教训，提高思想认识的问题，决不是否定参加“文革”的人，更不是否定参加“文革”的广大群众。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3159ff8e43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
