":1960,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"想起毛主席的话"},{"type":"paragraph","text":"张难先我们毛主席，二年以前说：美帝国主义，用索自套脖。名言传中外，蠢猪竟不觉。到今要命时，还像有上策，厚颜飞远东，处处都变色，我们炮轰它，闭门羹日设，鼠窜回老家，索头万人得。我国六亿人，持索拚命勒，收复我台湾，领土归祖国。号召全世界，打垮人类贼，索在我们手，一起紧紧搏！绞死害人精，全球飞白鸽。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd13b3949c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
