四分之一","authors":[],"dates":[{"year":1966,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"从毛主席著作中吸取巨大的力量"},{"type":"paragraph","text":"我国化肥产量显著增长"},{"type":"paragraph","text":"头十一个月产量比去年全年还多四分之一"},{"type":"paragraph","text":"据新华社南京二十七日电　我国化肥工业战线广大职工，高举毛泽东思想伟大红旗，认真贯彻毛主席提出的备战、备荒、为人民的伟大战略方针，在社会主义教育运动和无产阶级文化大革命中，掀起了活学活用毛主席著作的群众运动新高潮，促进广大职工的精神面貌发生了深刻的变化，从而推动化肥工业生产飞跃发展。到十一月底止，今年国家化肥生产计划已经提前超额完成，化肥产量比去年全年增长百分之二十六。氮肥质量一直稳定，磷肥质量稳步提高；原料、燃料消耗定额普遍下降；生产成本显著降低；一种新型高效的氮磷复合肥料也在今年投入了生产。"},{"type":"paragraph","text":"化肥战线广大职工指出，今年这些成绩的取得，是伟大的毛泽东思想的胜利，是无产阶级文化大革命的胜利。"},{"type":"paragraph","text":"用毛泽东思想武装起来的广大职工，最勇敢，最聪明，他们敢想、敢干、敢革命。大连化工厂有一个工段，是外国设计的。外国专家用一百多条规定束缚职工的手脚，使这个工段的产量一直上不去。这个厂的职工贯彻执行毛主席提出的备战、备荒、为人民的伟大战略方针，决心进行改革，改负压为正压操作。当时有人说：“加压操作在世界上还没有听说过，这不是闹着玩的。”在这种情况下，职工们就学习毛主席的教导，从中汲取巨大的力量。终于打破了洋框框，试验成功正压操作，没有增加设备、投资，就使生产能力提高了百分之二十六点八。"},{"type":"paragraph","text":"化肥工业战线广大职工，遵循毛主席关于“有所发现，有所发明，有所创造，有所前进”的教导，坚决贯彻大中小并举，两条腿走路的方针，使各地的小氮肥企业，不仅在产量上有成倍的增长，而且在技术上也创造出了先进的生产流程。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e772035bf2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
