script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真揭发浪费现象　努力降低产品消耗  山东省工业部门开展增产节约运动成绩显著","authors":[],"dates":[{"year":1977,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"认真揭发浪费现象　努力降低产品消耗"},{"type":"paragraph","text":"山东省工业部门开展增产节约运动成绩显著"},{"type":"paragraph","text":"山东省工业部门，在华主席抓纲治国战略决策指引下，自年初开始，深入开展了增产节约运动。半年多来，生产逐月上升，消耗逐月下降，有一批企业的产品单耗降低到本企业的历史较好水平。煤、电的单耗下降尤为突出。上半年共节约煤炭三十八万吨、焦炭一万五千吨，燃料油二万吨，电力二亿度，成品油三万吨，木材五万立方米，酸碱一万一千吨。"},{"type":"paragraph","text":"山东能够在短短的几个月时间内，取得上述成绩，主要采取了以下措施："},{"type":"paragraph","text":"一、深揭狠批“四人帮”，认真做好思想发动工作。许多企业的领导同志深入发动群众，广泛开展节约活动，提高人们的思想认识，造成了节约光荣，浪费可耻的空气。如宁阳化肥厂，在学习、批判的基础上，揭发出浪费现象二百九十多例，仅一九七六年就多耗煤一万一千吨，电三十万度，损失一百一十七万元。一揭一算对职工震动很大，纷纷找差距，订措施，决心把“四人帮”造成的损失夺回来。"},{"type":"paragraph","text":"二、狠抓企业管理，建立健全以岗位责任制为中心的各项规章制度，改变多年来受“四人帮”影响所造成的“消耗无定额，领料无制度，成本无核算”的混乱状况。莱芜钢铁厂在加强管理的基础上，对铁矿石、铁精粉、粗矿粉、铁、焦、锻件、供水等八种产品订了单耗指标，发动群众，努力降低。"},{"type":"paragraph","text":"三、大搞技术革新，改革工艺管理。实践证明，这是降低消耗的一项重要措施。省煤炭局在五十二个统配矿推广了射流无底阀抽水的先进经验，每年可节电一千五百多万度。"},{"type":"paragraph","text":"四、开展以高产、优质、低耗、安全为主要内容的拉练赛和群众性的小指标竞赛活动。省化工局组织化工行业，按地区组织高产、优质、低耗、安全拉练竞赛活动，有力地推动了增产节约运动的开展。在规定的拉练期间内，班组之间互相比赛，对拉练中暴露出来的薄弱环节，及时研究解决，拉练一次，总结一次，提高一步。"},{"type":"paragraph","text":"山东省工业部门的广大干部、工人决心在党的十一大路线的指引下，在今后几个月里更进一步开展以高产、优质、低耗、安全为主要内容的增产节约运动，争取更大的成绩。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e600200075"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
