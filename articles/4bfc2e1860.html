s":[],"dates":[{"year":1958,"month":9,"day":20}],"is_range_date":false,"parts":[{"text":"毛泽东视察安徽时的指示","type":"title"},{"text":"一、对钢铁工业的指示","type":"subtitle"},{"text":"（一九五八年九月二十日）","type":"subtitle"},{"text":"发展钢铁事业，一定要搞群众运动，什么工作都要群众运动，不搞群众运动是不行的。","type":"paragraph"},{"text":"×××","type":"paragraph"},{"text":"马鞍山条件很好，可以发展成为中型钢铁联合企业，因为发展中型的钢铁联合企业比较快。","type":"paragraph"},{"text":"×××","type":"paragraph"},{"text":"劳动人民万岁！劳动人民万岁！","type":"appellation"},{"text":"二、视察舒茶公社时的谈话","type":"subtitle"},{"text":"（一九五八年九月廿四日）","type":"subtitle"},{"text":"吃饭不要钱，既然一个社能办到，其他有条件的社也能办到。既然吃饭可以不要钱，将来穿衣服也可以不要钱了。","type":"paragraph"},{"text":"×××","type":"paragraph"},{"text":"人民公社将来要集中种蔬菜，种蔬菜也要专业化。","type":"paragraph"},{"text":"×××","type":"paragraph"},{"text":"（毛主席在参现除四害陈列馆时说）老鼠这个东西很狡猾，这样，老鼠就要大遭殃啦！","type":"paragraph"},{"text":"×××","type":"paragraph"},{"text":"人民公社好，人民公社好。","type":"paragraph"},{"text":"×××","type":"paragraph"},{"text":"……以后山坡上要多开辟茶园。","type":"appellation"},{"text":"三、视察合肥时的谈话","type":"subtitle"},{"text":"（一九五八年九月）","type":"subtitle"},{"text":"（毛主席到合肥时高兴地说）沿途一望，生气勃勃，肯定是有希望的，有大希望的。","type":"paragraph"},{"text":"（毛主席在与妇女干部谈话时说）如果每年每人没有一千，。两千斤粮食，没有公共食堂，没有幸厢院托儿所，没有扫除文盲，没有进小学，中学，大学，妇女还不可能彻底解放。","type":"paragraph"},{"text":"毛主席指出，只有办好人民公社，才是妇女彻底解放的道路。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bfc2e1860"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
