<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"和资产阶级划清思想界限 参加爱国增产节约运动","authors":["于朝"],"dates":[{"year":1952,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"于朝"},{"type":"paragraph","text":"今天是“五四”青年节，是中国人民伟大的爱国运动——“五四”运动的三十三周年纪念日，全国各地青年正热烈地进行纪念“五四”青年节的活动。"},{"type":"paragraph","text":"中国人民和青年在伟大领袖和导师毛主席领导下，在抗美援朝、土地改革、镇压反革命等的斗争中，并都取得了伟大的胜利；在三反、五反运动中(中国青年也积极参加了这一打退资产阶级猖狂进攻的斗争)，同样获得了辉煌的成绩。这些胜利为我国展开大规模的增产节约运动铺平了道路。今天我们纪念“五四”青年节，应该在三反、五反运动胜利的基础上，以空前高涨的热情投入增产节约运动中，使祖国事业不断地发展，人民的生活更加美好幸福。"},{"type":"paragraph","text":"“五四”运动以来，中国的青年一贯地继承与发扬了“五四”的爱国主义精神，在增产节约运动中，我们青年也要本着这个光荣传统，更主动地发挥积极作用。从历史上的胜利斗争中告诉我们:广大青年要积极参加祖国的各种斗争，必须提高革命觉悟。因此，我们青年必须从思想上和资产阶级思想划清界限，并认识工人阶级思想的优越性，使我们成为具有工人阶级思想立场的保卫祖国、建设祖国、争取祖国的社会主义前途实现的劳动战士。我们青年都必须永远做一个劳动者，在劳动中提高阶级觉悟，绝不能中途去作剥削者，或有着不劳而获的寄生思想。"},{"type":"paragraph","text":"我们怎样树立这种革命的人生观呢?首先必须加强政治学习，努力学习马克思列宁主义和毛泽东思想，以工人阶级思想武装自己，批判庸俗的自私自利观念，培养以公共利益为第一位的德性。我们青年只有在任何时候，任何情况之下，使自己的利益与祖国和人民的利益完全结合起来，我们才能真正担当建设新社会的重任。"},{"type":"paragraph","text":"我们在国营工厂中工作的青年工人要以自觉的主人翁态度，参加爱国劳动竞赛，学习和提高生产技术。私营工厂和商店中的青年工人、店员，应该争取和巩固五反运动的彻底胜利，推动资本家进行合法经营，切实防止资产阶级再施放“五毒”。青年农民，则应积极参加爱国主义的增产竞赛，参加和推广互助合作运动，学习和推广先进的农业生产方法和文化科学知识。青年学生要参加思想改造运动，努力学习文化、科学和技术，锻炼身体，准备献身于新中国的各项建设。各个中学毕业的同学积极作投考的准备，以便保证升入大学或专科学校，训练自己掌握专门知识和技能，更好地为祖国即将展开的伟大的全面建设事业服务。"},{"type":"paragraph","text":"同时，我们还必须加强抗美援朝的斗争，彻底击败美帝国主义的侵略，为保卫世界和平而奋斗。我们应通过纪念“五四”节日来检阅自己的力量，提高警惕，巩固国防，继续支援志愿军，开展爱国卫生防疫运动，坚决粉碎美帝国主义所进行的细菌战。"},{"type":"paragraph","text":"爱国的青年们，让我们一齐为增加生产，提高工作，厉行节约，积极支援前线，准备为祖国大规模经济建设而努力吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfa95047a8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
