art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沉痛悼念伟大领袖和导师毛泽东主席《伟大的领袖和导师毛泽东主席永垂不朽》一书出版","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年九月二十二日讯 为沉痛悼念伟大的领袖和导师毛泽东主席，人民出版社出版了《伟大的领袖和导师毛泽东主席永垂不朽》一书。内容包括：中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会、中华人民共和国国务院、中国共产党中央军事委员会告全党全军全国各族人民书；在伟大的领袖和导师毛泽东主席追悼大会上，中国共产党中央委员会第一副主席、国务院总理华国锋同志致悼词；毛泽东主席治丧委员会名单；中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会、中华人民共和国国务院、中国共产党中央军事委员会公告，以及《人民日报》、《红旗》杂志、《解放军报》社论《毛主席永远活在我们心中》。这本书将在全国各地陆续发行。"},{"type":"paragraph","text":"这本书还由民族出版社用蒙古、藏、维吾尔、哈萨克、朝鲜五种文字翻译出版。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eae1addc56"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
