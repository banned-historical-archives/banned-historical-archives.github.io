":["周恩来"],"dates":[{"year":1966,"month":7,"day":24}],"is_range_date":false,"parts":[{"text":"周恩来在北京第二外国语学院的讲话","type":"title"},{"text":"周恩来","type":"authors"},{"text":"同学们！你们坐下来，不是要听毛主席的话吗？坐下来要有好的秩序，现在不是备战备荒为人民吗？我指挥不动你们！","type":"paragraph"},{"text":"今天早晨我看了一个半小时的大字报，你们的大字报贴在外面，我只能趁你们睡着的时候，天亮了，你们起来了，就不让我看了。我不能坐在办公室里乱发议论，我要来看，然后向毛主席汇报。","type":"paragraph"},{"text":"我把你们学校当作试点，我要来连看三天，你们每天让我看一个半小时。到六点三刻大家到礼堂去，我和你们讲几句话，你们不要打电话给其他人，这也是保密。不是我怕见人，我们还是不“自由”的，我又不能化妆，丁国钰也来到调查小组加强工作，大家要听毛主席的话。最后，我建议一起唱个歌\u003c东方红\u003e和\u003c大海航行靠舵手\u003e好不好？","type":"paragraph"}],"comments":[],"origin":"一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（1）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efbc3483f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
