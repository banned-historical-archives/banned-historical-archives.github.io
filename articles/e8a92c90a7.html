script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央转发关于正确贯彻处理纪凯夫案件精神的两个文件的批语","alias":"","parts":[{"type":"paragraph","text":"对华东局第八号打虎战报的批语"},{"type":"paragraph","text":"（1952年3月6日）希望各中英局亦发这样一个带部署性的指示\"。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月六日"},{"type":"paragraph","text":"[1]指中共中央华东局1952年2月5日关于华东全区的第八号打虎战报。战报指出：一、估计到3月15日或20日前后，地委以上机关均可基本结束打虎阶段，转入三反的第四阶段，即普遍交代个人与资产阶级的关系，结合清算资产阶级思想影响，进一步检查官僚主义，某些领导干部回炉补课；并在此基础上整理打乱了的组织，重新审查和制订各项制度，及时恢复和建立经常工作。为此，各地党委应立即指定专人进行组织整理的准备工作。二、各地打出的大老虎，除安徽外，均已在老虎总数1/10以上。安徽是否由于许多老虎尚未打透，请省委注意检查。其他地区也必须注意把一切打出的老虎打死、打透。三、最近各地反映老虎翻供的很多，请各地参照毛主席2月27日批转的新乡地委捉虎经验，对现有打虎战果的准确性加以严格检查，实事求是地甄别真假，以巩固战果，扩大胜利，并为处理做好准备。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":494,"page_end":494},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发关于正确贯彻处理纪凯夫案件精神的两个文件的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":6}],"is_range_date":false,"parts":[{"text":"中央转发关于正确贯彻处理纪凯夫案件精神的两个文件的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"中南局、各中央局：","type":"appellation"},{"text":"（一）中央同意湖北省委二月二十七日给中南局的报告和中南局三月三日给湖北省委的答复，认为这两个文件都是正确的；（三）应将这两个文件在党刊上发表。","type":"paragraph"},{"text":" 中央三月六日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"
