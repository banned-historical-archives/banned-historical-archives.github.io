批示","authors":[],"dates":[{"year":1955,"month":10,"day":23}],"is_range_date":false,"parts":[{"text":"中共中央转发安徽省委肃反运动通报的批示","type":"title"},{"text":"上海局，各省市委、自治区党委，西藏工委，中央和军委各部门、中央国家机关各部门党组和党委：","type":"appellation"},{"text":"坦白示范大会，根据已有的经验看来，是一种好处较少坏处较多的斗争方式。中央已经决定各地一律不要采用这种斗争方式。为要交代政策和教育群众，可以采取召集大会由首长报告的方式，“斗争大会”和“坦白示范大会”都不要开。为了使各地领导机关更深刻地了解坦白示范大会的很大的副作用，现将安徽省委9月22日来电两份通报你们。各地凡是已经开过坦白示范大会的，都要注意纠正可能发生的偏差，使运动得到健康的发展。","type":"paragraph"},{"text":" 中央1955年10月23日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51aff0b148"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
