script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"第一次战役的关键有两点","alias":"","parts":[{"type":"paragraph","text":"第一次战役的关键有两点"},{"type":"paragraph","text":"（1950年10月28日）彭、邓\"，并高："},{"type":"paragraph","text":"十月二十八日八时电悉。（一）庆祝你们的初战胜利。（二）目前全战役的关键有两点：一是确实抓住古场“、楚山之伪七团不使逃脱，如此则伪一、六、八师非增援不可，有仗可打；二是我三个军全部到齐并完成战役展开，如此则我攻击时猛速有力，保证歼敌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十八日下午四时半"},{"type":"paragraph","text":"[1]彭、邓，指彭德怀、邓华，当时分别任中国人民志愿军司令员兼政治委员和副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]高，指高岗，当时任东北军区司令员兼政治委员。"},{"type":"paragraph","text":"[3]指1950年10月28日8时彭德怀给毛泽东的电报。电报说：伪第二团一个营随七团向楚山，第三营25日在温井以西全部歼灭。26日拂晓前4时包围于温井以东俘数十人。战斗结束后，因疲劳马虎未打扫战场，至昨（27）日才发现该敌遗弃汽车60余辆及其所有重武器，搜山中获俘数10人。详情清查中。"},{"type":"paragraph","text":"[4]古场，位于慈江道楚山郡中部。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":311,"page_end":311},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25cbc8b9e8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
