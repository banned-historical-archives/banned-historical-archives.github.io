art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用最高热情坚决执行“斗私，批修”的伟大纲领","authors":["乔喜增","学习毛主席著作积极分子？某团副政委"],"parts":[{"type":"paragraph","text":"在中华人民共和国成立十八周年的盛大节日里，我见到了我们的伟大统帅毛主席，毛主席亲切地接见了我们，和我们一一握了手。这是毛主席对我们部队同志最大最大的关怀，这是我一生最难忘最难忘的幸福时刻。"},{"type":"paragraph","text":"在庆祝大会上，我们敬爱的林副主席传达了毛主席“斗私，批修”的最新指示。斗私批修概括了无产阶级文化大革命的基本内容，是保证无产阶级文化大革命取得全面彻底胜利的根本方针，我一定要最坚决执行毛主席的最新指示。"},{"type":"paragraph","text":"今年一月底，我们遵照伟大统帅毛主席的指示，到天津市延安中学执行军政训练任务。我们和学校的革命师生一起，在毛泽东思想的原则基础上，实现了全校以教学班为基础的革命大联合。开展了对以中国赫鲁晓夫为首的党内最大的一小撮走资本主义道路当权派的革命大批判，结合进行了本单位的斗批改。九个月来斗争的实践，使我们深深体会到，全校文化大革命每前进一步，都贯穿着斗私，批修。在开展革命大批判中，我们把中国赫鲁晓夫的一套修正主义货色，分成专题，层层剥皮，结合本校的斗批改，一个战役一个战役地打，狠批了修正主义。在实现和不断巩固革命大联合中，狠斗了“私”字，克服各种非无产阶级思想，使大家在毛泽东思想的原则基础上联合起来。"},{"type":"paragraph","text":"毛主席关于要斗私，批修的伟大指示，是把文化大革命进行到底的战斗号令，是我们做好“三支”“两军”工作的纲。我回到部队以后，一定和同志们一起，在军训工作中不断狠斗自己头脑里的“私”字，努力改造世界观，做一个永远忠于伟大统帅毛主席，永远坚决执行最高指示的革命战士！"},{"type":"paragraph","text":"4500部队党委，坚决响应毛主席的伟大号召，以“斗私，批修”为纲，加强对各级干部的思想教育。图为政治部干部结合“三支”“两军”工作，反复认真学习林彪副主席极为重要的讲话，决心在斗私批修中为人民立新功。"},{"type":"paragraph","text":"杨昌忠摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4455a15e8a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
