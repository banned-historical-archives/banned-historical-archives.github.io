tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席会见基辛格国务卿等美国客人毛主席同基辛格博士、布什主任、洛德司长在友好的气氛中就广泛的问题进行了谈话 邓小平副总理、乔冠华外长等会见时在座","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年十月二十一日讯 毛泽东主席今天晚上会见了美国国务卿兼总统国家安全事务助理亨利·基辛格博士和夫人南希·基辛格及其一行。"},{"type":"paragraph","text":"参加会见的其他美国客人是：美国驻中国联络处主任乔治·布什、国务院顾问赫尔穆特·索南菲尔特、负责东亚事务助理国务卿菲利普·哈比卜、国务院政策计划司长温斯顿·洛德、负责东亚事务助理国务卿帮办小威廉·格莱斯廷、白宫工作人员彼得·罗德曼、秘书安·博迪克。"},{"type":"paragraph","text":"毛主席同全体美国客人一一握手后，同基辛格博士、布什主任、洛德司长在友好的气氛中就广泛的问题进行了谈话。毛主席请基辛格博士向福特总统转达他的问候。"},{"type":"paragraph","text":"会见时在座的有邓小平副总理，乔冠华外长，黄镇主任，王海容副外长，唐闻生、章含之副司长。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"乔冠华","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35f3c5e8cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
