:[{"year":1979,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美中友协休斯敦分会负责人赞扬邓副总理访问"},{"type":"paragraph","text":"新华社休斯敦二月二日电  美中人民友好协会休斯敦分会的负责人说，邓小平副总理访问休斯敦是这个城市在发展美中关系方面的一个重大事件。"},{"type":"paragraph","text":"据今天的《休斯敦邮报》报道，这个组织的负责人说，邓小平的访问“将给我国人民带来巨大的好处，既可以增加两国之间的贸易，又扩大我们两国之间科学文化的交流”。"},{"type":"paragraph","text":"美中友协休斯敦分会的领导人苏珊·斯普鲁斯说：“中国人民如此坦率友好，使我感到惊讶。看来所有中国人民都想同美国人友好。”"},{"type":"paragraph","text":"分会成员戴维·罗斯说：“我们对邓副总理的访问和中国要在休斯敦设立领事馆的消息感到欢欣鼓舞，这将为我们提供了解中国之窗。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dab96480de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
