],"dates":[{"year":1974,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年五月二十四日电　中共中央副主席叶剑英、中共中央政治局委员纪登奎今天晚上会见并宴请以罗马尼亚共产党中央候补委员、罗马尼亚共青团中央第一书记扬·特拉扬·斯特凡奈斯库为团长的罗马尼亚共青团代表团。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见和宴会的代表团团员有埃林娜·卓娅·齐奥塞斯库、维克多利娅·比斯特里强努、桑杜·斯托伊吉查、乔治·普利舍卡鲁。"},{"type":"paragraph","text":"罗马尼亚驻中国大使格夫里列斯库参加了会见并应邀出席宴会。"},{"type":"paragraph","text":"参加会见和宴会的还有中共中央委员、中共中央对外联络部部长耿飚，中共中央委员、共青团北京市委第一书记谢静宜，有关方面负责人和工作人员张香山、区棠亮、于崇浩、毛宝忠、朱良、李志芳、吴干生、吕辉祥等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d09effafd4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
