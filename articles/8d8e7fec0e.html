<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"什么是“左”倾机会主义和右倾机会主义?","authors":[],"dates":[{"year":1951,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们在学习党史中，对‘左’倾机会主义与右倾机会主义，意义尚不够明确，为了弄清这个问题，特此写信前来请问你，请予答覆。此致敬礼读者张均七月十日张均同志:"},{"type":"paragraph","text":"‘左’倾机会主义与右倾机会主义，是共产党内在毛主席领导前，领导上对中国革命，例如中国现阶段阶级关系，中国革命的范畴，革命的敌人，革命的同盟军，以及革命的领导权，武装斗争等问题的‘左’右倾偏向。"},{"type":"paragraph","text":"右倾机会主义，主要是思想落后于实际，在政治上表现为悲观失望，表现为追随于资产阶级之后的投降思想，其思想方法对敌人力量估计过高，而对革命力量估计不足，例如陈独秀的右倾机会主义，就是没有看到俄国十月革命和中国‘五四’运动以后，中国革命已经是世界无产阶级社会革命的一部份和中国无产阶级已经登上历史舞台，成为中国革命的领导力量了。正因为他们没有认识到这一问题，所以把中国革命看成了仍是一个资产阶级领导的旧民主主义革命，中国革命的领导力量仍是资产阶级，不是无产阶级，无产阶级只能作为一个革命的助手，只有等到资产阶级革命完成以后，再进行社会主义革命，这种二次革命论，使中国革命遭受很大的损失，陈独秀在这种错误思想支配下，曾以为工农武装起来进行独立斗争，会使资产阶级脱离革命，而竭力阻止和限制工农运动的发展。幻想用妥协的办法来稳定国民党中的地主分子与资产阶级分子，但结果呢?共产党越让步，反动力量越反动，最后帝国主义很快的与蒋介石勾结起来，对中国革命进行了镇压，使大革命遭受到失败。"},{"type":"paragraph","text":"‘左’倾机会主义，也就是盲动主义、冒险主义，他们主要是思想超过了客观实际发展，不是思想落后实际，不是把今天当昨天，而是把今天当明天，他们把将来才能干的事，硬要现在就干，他们幻想中国革命不用经过新民主主义革命，而要实行社会主义革命。在革命的行动上，革命工作的布置上，都是盲动的，冒险的，他们没有认识到中国革命的长期性，没有认识农民运动的重要性，他们强调反对资产阶级，把反对资产阶级与反帝反封建并列，否认了资产阶级在现阶段的革命性一面，他们主观地把两步当作一步走，急于估计中国革命已经成熟，可以在一省或几省马上取得胜利，动员白区地下党组织工人起义，动员红军进攻城市，他们这样冒险盲动，同样使党遭受了挫折。"},{"type":"paragraph","text":"这里我们不能把‘左’右倾机会主义说得很清楚，但是我们可以看到‘左’右倾机会主义，都是小资产阶级思想在革命队伍中的反映，他们的思想方法都是主观的片面的，对阶级力量对比估计错误，把主观的愿望、感想、幻想、空想当作实际，当作真理，使主观与客观相背离，不能统一，因而在政治上犯了错误。其思想方法的区别，主要的就在右倾机会主义是思想落后于实际的投降主义，‘左’倾机会主义是思想超过于客观实际的发展，把幻想当作真理的冒险与盲动。"},{"type":"paragraph","text":"(编者)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈独秀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d8e7fec0e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
