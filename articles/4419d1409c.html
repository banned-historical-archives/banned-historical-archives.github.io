流情况电话汇报","authors":[],"dates":[{"year":1962,"month":1,"day":15}],"is_range_date":false,"parts":[{"text":"武威地区关于永昌县发生疾病、断炊、人口外流情况电话汇报","type":"title"},{"text":"（一九六二年元月十五日下午四时地委秘书处陈发元同志传）","type":"paragraph"},{"text":"省委：","type":"appellation"},{"text":"据永昌县委十四日电话汇报：该县双坝、朱王堡、红山窑、宗家庄、八坝、焦家庄、西坡、河西堡、水源、陈仓、流泉、西湾、龚家堡、南南等十四个公社，有病人三千二百五十五人，占十四个公社总人口七万三千三百九十人的百分之四点四，其中浮肿病二百八十一人，干瘦病六百十一人，小孩营养不足的二百零九人，妇女病四百二十一人，肠胃病三百九十人，其他病一千三百四十三人。在这十四个公社中，有断炊户一千八百七十六户、八千七百八十二人，占总人数的百分之十—点九。陈仓公社陈仓大队社员马召吉，平时有肠胃病，元月八日因吃杏仁过多中毒而死，死后发现家中有小麦五升。人口外流情况也有发现，朱王堡、宗家庄、井泉、焦家庄四个公社已外流一百三十五人。县委已确定从公社、大队机动粮中拿出十万零三千五百一十七斤粮食供应断炊户，并且对清河、河西堡、城郊、金川四个工委下达销售指标九万斤，由工委掌握供应。","type":"paragraph"},{"text":"地委接到电话后，立即开会进行了讨论。地委认为永昌一九六一年的粮食收成经一九六○年为好，粮食征购任务已基本完成。但是，由于在征购工作中部分社、队伤了些口粮、籽种，部分社、队有些问题是可能的，但问题不会很大。由于永昌县委对群众生活安排的底子不清，地委已派副专员刘荣华同志带领工作组去帮助永昌县委继续摸清情况，帮助解决问题。对现有的病人，由永昌抽调医务人员下去治疗；对真正断炊的户、人，有机动粮的社、队，先由机动粮内解决，没有机动粮的从回销指标中供应，保证不能发生问题。详细情况，待刘荣华同志回来后再作汇报。","type":"paragraph"},{"text":"妥否，请省委指示。","type":"paragraph"},{"text":" 中共武威地委元月十五日","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4419d1409c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
