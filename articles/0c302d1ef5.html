座谈会情况和今后开展对资产阶级社会科学学术思想批判意见的请示报告的批示","authors":[],"dates":[{"year":1957,"month":12,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央转发中国科学院党组关于社会科学界反右派斗争座谈会情况和今后开展对资产阶级社会科学学术思想批判意见的请示报告的批示","type":"title"},{"text":"上海局，各省（市）、自治区党委，中央各部委，中央国家机关和各人民团体各党组，解放军总政治部：","type":"appellation"},{"text":"现将中国科学院党组《关于社会科学界反右派斗争座谈会情况和今后开展对资产阶级社会科学学术思想批判的意见的请示报告》转发给你们。中央基本上同意这个报告。","type":"paragraph"},{"text":"社会科学界在反右派斗争胜利的基础上对资产阶级反动的社会科学的学术思想进行批判，这对于进一步清除学术界资产阶级思想的影响，对于知识分子的思想改造和社会主义教育，对于锻炼马克思主义的理论队伍，都有重大的意义。学术批判工作，同从政治上揭露和批判右派的斗争有联系又有区别，这是一项极为复杂和困难的工作，需要有充分的准备。科学院党组在报告中提出的关于如何进行准备工作的意见，大体上是可行的。希望各省（市）、自治区党委把这个工作切实领导起来，并将你们的计划报告中央宣传部。","type":"paragraph"},{"text":" 中央1957年12月10日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c302d1ef5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
