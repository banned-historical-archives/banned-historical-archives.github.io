es":[{"year":1949,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗定期选举人民陪审官"},{"type":"paragraph","text":"凡剥削他人劳动者不能参加"},{"type":"paragraph","text":"【新华社北平二十日电】罗马尼亚通讯社讯：罗马尼亚将于五月十日至六月十日在全国举行人民陪审官的选举，这是罗马尼亚劳动人民的重大事件。选举法规定：选举人最低年龄为十八岁，被选人最低年龄为二十三岁。凡曾进行或正在进行任何剥削他人劳动的人，不能进行选举或被选为人民陪审官。候选人将由罗工人党，各地的人民会议临时委员会，劳工联合会，各地工会团体和其他群众组织提出。选举将由法院院长及罗工人党与劳工联合会的代表所组成的委员会指导进行。按照司法行政机关的新法律，凡属于城乡劳动人民队伍的人民陪审官，将参加最高法院以外的一切刑事与民事法庭的裁判。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d9e65b26b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
