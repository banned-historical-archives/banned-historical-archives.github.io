script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"解放军举行全军政治工作会议  研究进一步开展创造四好连队运动和加强连队政治工作建设并通过工作条例  林彪元帅就加强连队建设和改进工作方法作了重要指示","authors":[],"dates":[{"year":1961,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"解放军举行全军政治工作会议"},{"type":"paragraph","text":"研究进一步开展创造四好连队运动和加强连队政治工作建设并通过工作条例"},{"type":"paragraph","text":"林彪元帅就加强连队建设和改进工作方法作了重要指示"},{"type":"paragraph","text":"新华社10日讯　中国人民解放军总政治部于10月18日至11月4日在北京召开了全军政治工作会议。会议在检查和总结一年来全军加强军队政治思想工作的成绩和经验的基础上，研究了如何进一步开展创造四好连队运动、加强连队政治工作建设的问题，并且讨论和通过了总政治部起草的连队政治指导员、党支部、团支部和革命军人委员会等四个工作条例。"},{"type":"paragraph","text":"会议期间，中共中央主席毛泽东、副主席刘少奇、周恩来、朱德、林彪，总书记邓小平，政治局委员罗荣桓、贺龙，接见了出席会议的全体同志。到会同志还听了周恩来副主席、邓小平总书记的报告。"},{"type":"paragraph","text":"会议期间，林彪元帅就加强连队建设和改进工作方法的问题作了重要指示，中国人民解放军总参谋长罗瑞卿大将讲了话，总政治部副主任萧华上将作了继续创造四好连队的报告，罗荣桓元帅作了总结讲话。"},{"type":"paragraph","text":"会议认为，一年来政治工作成绩很大，部队有很大的进步。全军高举毛泽东思想的伟大红旗，在一切工作中以毛泽东思想为指针，认真学习和贯彻执行党中央的各项方针、政策，在执行训练、施工、陆空海防斗争、参加社会主义建设等任务中，坚持林彪元帅提出的政治工作领域中“人的因素第一、政治第一、思想工作第一、活的思想第一”的思想，大抓活的思想教育，实行活的领导，进一步加强了党的领导和政治工作。通过全军开展创造四好连队的运动，以及忆苦教育、党的方针政策的学习、连队管理教育工作条例的学习和贯彻等一系列的工作，大大提高了广大官兵的阶级觉悟，加强了基层建设和党支部的堡垒作用，增强了部队的战斗力，使连队面貌发生深刻的变化，全军工作出现朝气蓬勃生动活泼的局面。"},{"type":"paragraph","text":"会议指出，连队建设主要是搞好“四好”，即政治思想好，三八作风好，军事训练好，生活管理好。一年来创造四好连队运动成绩很大，取得了丰富的经验，锻炼和培养了基层干部，改进了领导作风和工作方法。创造四好连队运动，是我军加强革命化和加速现代化的有效措施，必须坚持下去，搞它几年，搞出更大的成绩来。四好不仅是对连队的总要求，也是对各级领导机关的总要求。为了搞好四好连队，必须进一步改进领导作风和工作方法。各级领导机关，一定要深入连队进行调查研究，把调查、研究、实践三者结合起来，把抓上头和抓下头结合起来，把一般号召和具体指导结合起来，把集体领导和个人负责结合起来，把严格要求和耐心说服结合起来。在工作中既要照顾需要，又要照顾可能。总之，一切工作要从连队实际情况出发，实行活的领导，不断提高领导工作的质量。"},{"type":"paragraph","text":"会议号召各部队今后对创造四好连队的工作，要进一步落实、巩固和提高，为继续创造四好连队，巩固和提高我军的战斗力，加强我军革命化、现代化建设而努力。"},{"type":"paragraph","text":"参加这次会议的有中国人民解放军军以上单位的政治委员或政治部主任，部分师政治委员或政治部主任等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f446f5385"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
