al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"长沙泥木工人布告","alias":"","parts":[{"type":"paragraph","text":"长沙泥木工人布告"},{"type":"paragraph","text":"（1922年10月25日）"},{"type":"paragraph","text":"我们为生活艰难，追不得已，要求将工价增至三角四分，不承认长沙县知事阴历八月十四日之布告。罢工争持一案，昨次请愿结果，经吴政务厅长，代表赵省长承认加价一事，为劳工与雇主的自由契约关系，应由双方自定，非遇强追行为，官厅不必过问。我们认省长和政务厅长对于我们这件事的处置，极为合理，当然感谢他们。我们的工价，在现在生活情形之下，当然要收三角四分。若某家不出三角四分，我们不到他家做工。就是这个营业自由权，省宪，法上本已早经规定，只是从前没有保障，现在算是有了保障。从明日起，各人照常开工。特此宣布。"},{"type":"paragraph","text":"泥木两行请愿大会布告"},{"type":"paragraph","text":"十月二十五日"}],"authors":["毛泽东"],"dates":[{"year":1922,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":514,"page_end":514},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5b9cce9bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
