ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于较重要外交复文的送审问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于较重要外交复文的"},{"type":"paragraph","text":"送审问题的批语"},{"type":"paragraph","text":"（1952年9月17日、18日）小平同志："},{"type":"paragraph","text":"此电?所说，与我们商定者不符。外交部发此电未先送审，请你查询告我为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十七日[1]小平，即邓小平，当时任政务院副总理。"},{"type":"paragraph","text":"[2]指中央人民政府外交部1952年9月13日关于朝鲜拟派技术人员、技能者600余人来我国实习事给中国驻朝使馆的复电。复电表示，因我国各业各工厂生产繁忙，来人多安排有困难，以少派为宜。毛泽东全集第三十二卷"},{"type":"paragraph","text":"二周、邓阅，送章汉夫同志："},{"type":"paragraph","text":"外交部最近有些较重要的外交复件未送中央审阅，对朝鲜的复电与中央的决策及我们面告朝鲜同志者不相符合，是不妥的。以后请加注意，除例行事务外，凡较重要的外交复文，均须送总理及我审阅之后，再行发出，以免出乱子。此事去年（或者是今年上半年？）有一次即告诉过你，要事不送审是不对的，你曾作了自我检讨，如何又忘记了？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十八日[1]周，指周恩来。邓，指邓小平。[2]章汉夫，当时任中央人民政府外交部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":9,"day":17},{"year":1952,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":251,"page_end":252},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec7da6d471"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
