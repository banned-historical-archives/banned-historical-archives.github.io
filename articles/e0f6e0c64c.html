":[],"dates":[{"year":1974,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见渥夫泰达尔主席等挪威客人"},{"type":"paragraph","text":"宾主进行了友好的谈话"},{"type":"paragraph","text":"新华社一九七四年六月二十九日讯　国务院副总理邓小平今天上午会见了挪威议会外交与宪法委员会主席托尔·渥夫泰达尔、副主席拉尔斯·科尔瓦率领的访华代表团全体成员。"},{"type":"paragraph","text":"宾主进行了友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团成员是：佩尔·博尔滕，科雷·维洛克，埃尔兰·斯滕贝格，科雷·斯托凯兰，保尔·蒂内斯，阿斯比耶恩·豪格斯特维特，阿尔内·基兰，贝里特·奥斯，奥德·利恩，伯恩特·斯坦霍尔姆，斯坦·利夫松·西伯格。"},{"type":"paragraph","text":"挪威驻中国大使拉夫内也参加了会见。"},{"type":"paragraph","text":"会见时在座的有外交学会副会长柯柏年以及有关方面负责人王本祚、马家骏等。（附图片）"},{"type":"paragraph","text":"邓小平副总理六月二十九日会见挪威议会外交与宪法委员会主席托尔·渥夫泰达尔、副主席拉尔斯·科尔瓦率领的访华代表团全体成员。"},{"type":"paragraph","text":"图为会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0f6e0c64c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
