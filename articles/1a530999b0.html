tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大破资产阶级的娱乐观","authors":["六一二一部队战士批判组"],"parts":[{"type":"paragraph","text":"叛徒、内奸、工贼刘少奇曾经大肆鼓吹什么：“看了戏，使人高兴，就好。”反革命修正主义分子周扬等“四条汉子”也跟着叫嚷：“我们一定要足够地重视娱乐性。……强调了教育性，使人看了发闷。”看！这一小撮叛徒是多么热衷于“娱乐”！"},{"type":"paragraph","text":"难道世界上真有那么一种只使人“娱乐”，而没有低何政治内容的文艺吗？绝对没有。在阶级社会中，任何文艺都是为一定阶级服务的。“无产阶级要按照自己的世界观改造世界，资产阶级也要按照自己的世界观改造世界。”今天的文艺，不是为无产阶级和广大劳动人民的利益而高唱战歌，就是为地主、资产阶级的利益而摇旗呐喊。"},{"type":"paragraph","text":"在周扬之流“文艺消遣”论的毒害下，资产阶级文艺的妖风臭气，曾经使一些年轻人上了当。他们对那些逗人取乐的“喜剧”，扭腰摆尾的歌舞，软绵绵的轻音乐，乌七八糟的故事，丑化工农兵的表演等等，往往看了听了，不是用毛泽东思想去进行批判，而是哈哈大笑，拍手叫好。正是在这笑声中，他们中毒不知毒，忘记了阶级斗争，听不到敌人的霍霍磨刀声。这触目惊心的事实，难道也是单纯的“娱乐”吗？"},{"type":"paragraph","text":"当然，我们的文艺并不一概排斥娱乐性，但要看是什么样的娱乐。林副主席指示我们：“文艺虽然可以达到正当娱乐的目的，但是，它不是单纯的娱乐工具，而主要是进行思想教育的工具。”娱乐都有一定的阶级内容。无产阶级所指的娱乐，是服从阶级斗争需要的，是从文艺中得到愉快、鼓舞和力量，是劳作和战斗之前的准备。这个“准备”，有助于我们更加精力充沛地从事社会主义革命和社会主义建设，更加团结起来，顽强地同国内外敌人作斗争。这种正当的娱乐，是和思想教育工作相辅相成的，而资产阶级那种腐化堕落的娱乐观，和我们无产阶级革命战士的高尚情操，完全相反，势不两立。我们决不容许“四条汉子”用资产阶级的娱乐观来腐蚀我们的灵魂，一定要把“文艺消遣”论彻底批倒批臭！"}],"alias":""},"tags":[{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a530999b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
