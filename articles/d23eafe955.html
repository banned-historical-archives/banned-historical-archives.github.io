art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"陈毅副总理接见新疆生产兵团知识青年他说；我们要革命；就要加倍努力学习毛主席著作；学了就要用；要实践；要永远用毛泽东思想武装自己，不断前进？","authors":[],"parts":[{"type":"paragraph","text":"新华社十日讯 陈毅副总理今天上午接见了参加新疆生产建设兵团的上海和其他地区的十九名知识青年。他们是由新疆回到内地学习和汇报工作的。"},{"type":"paragraph","text":"在接见的时候，陈毅副总理表扬他们在知识青年参加边疆社会主义建设的事业中起了带头作用，树立了把书本知识与生产劳动相结合的好榜样。"},{"type":"paragraph","text":"陈毅副总理说，内地广大青年听毛主席的话，服从革命需要，胸怀壮志，到新疆去，同当地各族人民一起，把戈壁沙漠变成绿洲良田，建设社会主义的新新疆，你们是在改天换地，创造历史，同时也锻炼了自己。这是毛泽东时代中国青年的幸福。"},{"type":"paragraph","text":"陈毅副总理看到这些生气蓬勃的年青人，非常高兴，同他们每一个人亲切握手，关切地询问了他们在边疆劳动、学习和生活的情况。当陈毅副总理知道这些年青人是学习毛主席著作的积极分子时，他说，我们要革命，就要加倍努力学习毛主席著作，学了就要用，要实践，要永远用毛泽东思想武装自己，不断前进。"},{"type":"paragraph","text":"这些青年向陈毅副总理汇报说，他们当中，大部分人上过中学，有的上过大学，到新疆两年多，已经学习了植棉、种稻、养蚕、牧羊、驾驶拖拉机等生产知识。现在他们正大学毛主席著作，树立全心全意为革命种田的观点。"},{"type":"paragraph","text":"陈毅副总理听了，说这很好。一个人光有书本知识是不够的。有了书本知识，必须和实践相结合，这样人就会变得聪明起来。新中国的年青的一代，一定要高举毛泽东思想伟大红旗，在阶级斗争、生产斗争和科学实验三大革命运动中，获得全面的发展。"},{"type":"paragraph","text":"陈毅副总理勉励参加边疆建设的青年，首先要努力学习毛主席著作，活学活用，在“用”字上狠下功夫，同时还要继续提高文化，参加体育活动，锻炼好身体，掌握各种生产和战斗的技能，为祖国社会主义建设贡献自己的一切。"},{"type":"paragraph","text":"最后，陈毅副总理和参加接见的共青团中央第一书记胡耀邦，书记处书记路金栋等，同大家在一起照了相。RW：陈毅；接见国内人员；知识青年"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d23eafe955"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
