script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向毛主席致敬电","authors":[],"dates":[{"year":1955,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"敬爱的毛主席:"},{"type":"paragraph","text":"我们，中华全国学生第十六届代表大会的全体代表，在大会胜利闭幕的时候，怀着万分敬爱的心情，向您——亲爱的领袖和导师，致以最热烈、最崇高的敬意!"},{"type":"paragraph","text":"在伟大的中国共产党和您的英明领导和慈爱抚育下，我们过着我们的前人从来不曾有过的幸福生活。您的“身体好、学习好、工作好”的亲切教诲，像春风时雨，化育着我们健全的成长；国家在过渡时期的总任务，像光芒万丈的灯塔，照亮了我们前进的方向；伟大的社会主义建设和发展国民经济的第一个五年计划，像一幅光辉灿烂的蓝图，激励着我们为美好的将来而奋斗的雄心。我们确信共产主义必然胜利，决心把全部的青春和才能贡献给这个伟大壮丽的事业。"},{"type":"paragraph","text":"我们向您保证:我们决心要努力学习马克思列宁主义，积极参加社会政治活动，加强劳动锻炼，努力改造思想，养成克勤克俭、艰苦朴素的品质，使自己成为具有共产主义世界观，热爱劳动，热爱劳动人民，为社会主义事业忠诚服务的革命知识分子。我们要努力提高阶级觉悟和政治警惕性，勇敢地投入肃清反革命的阶级斗争的激流，把暗藏在学校中的一切反革命分子清除干净。"},{"type":"paragraph","text":"我们向您保证:我们要努力学习文化科学知识，掌握最先进的科学技术，使自己具有真实本领，为建设社会主义更好地劳动。"},{"type":"paragraph","text":"我们向您保证:我们要加强体育锻炼，增强体质。我们热烈拥护国家兵役法，并殷切地盼望及早在学校实施军事训练，学习军事知识和技能。我们要继承和发扬中国人民解放军爱国主义和革命英雄主义的传统，随时准备着响应祖国的召唤，为解放台湾和保卫和平而坚决斗争。我们不但要做社会主义的积极建设者，而且要做伟大祖国的英勇保卫者。"},{"type":"paragraph","text":"毛主席，千言万语表达不尽我们要向您所说的话，我们只好怀着感激和热爱的心情，谨向您再一次保证:我们一定要永远听从您的教导，决心做您的好儿女和好学生。"},{"type":"paragraph","text":"祝您永远健康!"},{"type":"paragraph","text":"中华全国学生第十六届"},{"type":"paragraph","text":"代表大会全体代表"},{"type":"paragraph","text":"一九五五年八月六日"},{"type":"paragraph","text":"【新华社北京七日电】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a546c1792"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
