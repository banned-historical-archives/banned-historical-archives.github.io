script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶的控诉关于三种回鹘文奴仆卖身契的考释","authors":["饶惠元"],"dates":[{"year":1958,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新疆高昌古城出现的三种回鹘文的奴仆卖身契，近由中央民族学院冯家升和苏联专家捷尼舍夫会同转写并译成汉文，同时结合早年苏联马洛甫教授在乌鲁木齐所得的奴仆控诉主人书，写成“回鹘文斌通卖身契三种附控诉主人书”一篇论文，发表于本年的考古学报第二期上面。三种卖身契同是一个回鹘化的汉人把自己的小孩名叫斌通的卖给回鹘的僧侣做奴仆，控诉主人书也即是斌通后来控诉他的买主，要求恢复人身自由的诉状。这一故事的时代是在元朝的初期。"},{"type":"paragraph","text":"作者把三种卖身契和控诉主人书，通过语言结构的分析和文件内容的考释，看出卖身契三种的卖主买主及被卖者都是同一人，仅证人名字有的不同。第一种卖身契为回鹘文和汉文对照写的，内容只说把斌通卖了，买主交了九锭钞；第二种卖身契加添了买卖是合法的，说明一直到千年万日有效，亲族不能干涉；第三种卖身契首先向各方面的人祝福，叙述买卖斌通的经过。"},{"type":"paragraph","text":"至于斌通控诉主人书的内容是:斌通到成年以后，买主同意赎身恢复他的人身自由，并写有赎身契交斌通收执，可是不久买主又从斌通手中把赎身契骗去，而说要把他转卖给别人。因此，斌通怀着悲愤的心情向地方长官们控诉买主，要求人身自由。这几种契约和诉状，不仅是研究古代回鹘语言的好资料，也反映了当时奴仆买卖的封建制度和奴仆的反抗情绪。"},{"type":"paragraph","text":"(饶惠元)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"278d68980a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
