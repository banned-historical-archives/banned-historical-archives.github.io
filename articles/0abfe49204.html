仪式于同日举行","authors":[],"dates":[{"year":1961,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤十日电】　关于互换中华人民共和国和朝鲜民主主义人民共和国友好合作互助条约批准书的公报:一九六一年九月十日，中国驻朝鲜特命全权大使郝德青和朝鲜民主主义人民共和国外务相朴成哲，在平壤互换了今年七月十一日于北京签订的中华人民共和国和朝鲜民主主义人民共和国友好合作互助条约批准书。"},{"type":"paragraph","text":"朝鲜方面参加批准书互换仪式的有:内阁第一副首相金一，内阁副首相金光侠，外务省副相柳章植，外务省条约法规局局长金致元、仪礼局局长朴麟根、出版报道局局长李奎乙、第三局副局长申铉旭。"},{"type":"paragraph","text":"中国方面参加批准书互换仪式的有:中国共产党中央委员会总书记邓小平，中共中央政治局候补委员康生，中共中央委员伍修权，中国驻朝鲜大使馆参赞刘祥纶、商务参赞李范如、武官张乐事等。"},{"type":"paragraph","text":"中朝友好合作互助条约进一步发展了中朝两国人民以鲜血凝成的传统的友谊和基于无产阶级国际主义原则的两国的互助与紧密合作的关系。条约表明两国人民坚定不移的决心:一旦缔约一方受到任何一个国家的或者几个国家联合的武装进攻，因而处于战争状态时，缔约另一方立即应尽其全力给予军事及其他援助，捍卫亚洲及世界的和平和安全。"},{"type":"paragraph","text":"条约自批淮书互换之日起生效。"},{"type":"paragraph","text":"【新华社平壤十日电】　苏联驻朝鲜民主主义人民共和国特命全权大使普扎诺夫和朝鲜民主主义人民共和国外务相朴成哲十日在平壤互换了于今年七月六日在莫斯科签订的苏维埃社会主义共和国联盟和朝鲜民主主义人民共和国友好合作互助条约批准书。"},{"type":"paragraph","text":"参加批准书互换仪式的，苏联方面有商务参赞格拉德科夫等人；朝鲜方面有朝鲜民主主义人民共和国内阁第一副首相金一和内阁副首相金光侠等人。"},{"type":"paragraph","text":"此间发表的关于两国互换批准书的公报说，苏朝友好合作互助条约体现了两国人民坚定不移的决心:全力发展苏朝两国人民在历史上形成的传统友谊，以及建立在无产阶级国际主义原则基础上的两国之间互相帮助和密切合作的关系；一旦缔约一方受到任何一个国家或者几个国家联合的武装进攻，因而处于战争状态时，缔约的另一方立即应尽其全力给予军事及其他援助；在加强远东和世界和平与安全的共同斗争中进一步巩固牢不可破的同盟。"},{"type":"paragraph","text":"条约自批准书互换之日起生效。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0abfe49204"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
