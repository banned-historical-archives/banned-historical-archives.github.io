:[],"dates":[{"year":1959,"month":8,"day":2}],"is_range_date":false,"parts":[{"text":"毛泽东给张闻天的信","type":"title"},{"text":"闻天同志：","type":"appellation"},{"text":"怎么搞的，你陷入那个军事俱乐部去了。真是物以类聚，人以群分。你这次安的是什么主意? 那样四方八面，勤劳艰苦，找出那些漆黑一团的材料。真是好宝贝! 你是不是跑到东海龙王敖广那里取来的? 不然，何其多也! 然而一展览，尽是假的。讲完没两天，你就心烦意乱，十五个吊桶打水，七上八下，被人们缠住脱不得身。自作自受，怨得谁人? 我认为你是旧病复发，你的老而又老的疟疾原虫远未去掉，现在又发寒热症了。昔人咏疟疾词(这首曲子，调名《叨叨令》)云：“冷来时冷的在冰凌上卧，热来时热的在蒸笼里坐，痛时节痛的天灵破，战时节战的牙关挫。真个是害杀人也么哥，真个是害杀人也么哥，真个是寒来暑往人难过。”同志，是不是? 如果是，那就好了。你这个人很需要大病一场。昭明文选第三十四卷，枚乘《七发》，末云：“此亦天下之要言妙道也，太子岂欲闻之乎? 于是太子据几而起，曰：涣乎若一听圣人辩士之言，涊然汗出，霍然病已。”你害的病，与楚太子相似。如有兴趣，可以一读枚乘的七发，真是一篇妙文。你把马克思主义的要言妙道通通忘记了，如是乎跑进了军事俱乐部，真是武文合璧，相得益彰。现在有什么办法呢? 愿借你同志之箸，为你同志筹之。两个字，曰：“痛改”。承你看得起我，打来几次电话，想到我处一谈。我愿意谈，近日有些忙，请待来日。先用此信，达我悃忱。","type":"paragraph"},{"text":" 毛泽东八月二日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"张闻天","type":"人物"},{"type":"文稿类型","name":"书信"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东给张闻天的信","authors":[],"dates":[{"year":1959,"month":8,"day":2}],"is_range_date":false,"parts":[{"text":"毛泽东给张闻天的信","type":"title"},{"text":"闻天同志：","type":"paragraph"},{"text":"怎么搞的，你陷入那个军事俱乐部去了。真是物以类聚，人以群分。你这次安的是什么主意? 那样四方八面，勤劳艰苦，找出那些漆黑一团的材料。真是好宝贝! 你是不是跑到东海龙王敖广那里取来的? 不然，何其多也! 然而一展览，尽是假的。讲完没两天，你就心烦意乱，十五个吊桶打水，七上八下，被人们缠住脱不得身。自作自受，怨得谁人? 我认为你是旧病复发，你的老而又老的疟疾原虫远未去掉，现在又发寒热症了。昔人咏疟疾词(这首曲子，调名《叨叨令》)云：“冷来时冷的在冰凌上卧，热来时热的在蒸笼里坐，痛时节痛的天灵破，战时节战的牙关挫。真个是害杀人也么哥，真个是害杀人也么哥，真个是寒来暑往人难过。”同志，是不是? 如果是，那就好了。你这个人很需要大病一场。昭明文选第三十四卷，枚乘《七发》，末云：“此亦天下之要言妙道也，太子岂欲闻之乎? 于是太子据几而起，曰：涣乎若一听圣人辩士之言，涊然汗出，霍然病已。”你害的病，与楚太子相似。如有兴趣，可以一读枚乘的七发，真是一篇妙文。你把马克思主义的要言妙道通通忘记了，如是乎跑进了军事俱乐部，真是武文合璧，相得益彰。现在有什么办法呢? 愿借你同志之箸，为你同志筹之。两个字，曰：“痛改”。承你看得起我，打来几次电话，想到我处一谈。我愿意谈，近日有些忙，请待来日。先用此信，达我悃忱。","type":"paragraph"},{"text":" 毛泽东八月二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alia
