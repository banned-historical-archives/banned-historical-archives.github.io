art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"美国前总统尼克松和夫人举行宴会华国锋代总理、姚连蔚副委员长等应邀出席 尼克松先生和华国锋代总理在宴会上祝酒","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年二月二十五日讯 美国前总统理查德·尼克松和夫人今天晚上在人民大会堂举行宴会。"},{"type":"paragraph","text":"国务院代总理华国锋，人大常委会副委员长姚连蔚，外交部长乔冠华，文化部长于会泳，卫生部长刘湘屏，国家体委主任庄则栋，中国驻美国联络处主任黄镇等，应邀出席了宴会。"},{"type":"paragraph","text":"尼克松先生和华国锋代总理先后在宴会上祝酒（全文见第二版）。"},{"type":"paragraph","text":"席间，乐队演奏了中美两国的乐曲，宾主频频举杯，祝愿中美两国人民的友谊不断发展。"},{"type":"paragraph","text":"应邀出席宴会的还有："},{"type":"paragraph","text":"人大常委会委员贝时璋、林巧稚、傅玉芳；"},{"type":"paragraph","text":"政府部门、北京市革命委员会等方面的负责人王海容、朱穆之、谢静宜、柴树藩、肖鹏、刘澄清、刘华清、王冶秋、邓岗、沈图、曾绍东；"},{"type":"paragraph","text":"首都工人、人民公社社员的代表韩茶仙、张秉贵、王学礼、王玉茹、马凤鸣、陈永祥、殷维臣、李金、朱宗义、郭丽云，少数民族的代表田中山、热依汗、许明月、双宝、扎喜旺徐，以及科学、医学、教育、文艺、体育界的代表和中国专机机组的代表。"},{"type":"paragraph","text":"应邀参加宴会的还有杜聿明、黄维、杨南cūn。"},{"type":"paragraph","text":"尼克松先生的随行人员，美国驻中国联络处副主任塞耶和联络处官员，以及前来采访尼克松先生和夫人访华的新闻记者，出席了宴会。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e281924e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
