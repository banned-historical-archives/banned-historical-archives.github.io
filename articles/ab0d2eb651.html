script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"今天本报第五版发表重要文章  人道主义就是修正主义吗？","authors":[],"dates":[{"year":1980,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"今天本报第五版发表重要文章"},{"type":"paragraph","text":"人道主义就是修正主义吗？"},{"type":"paragraph","text":"本报讯　今天本报第五版发表中国社会科学院哲学研究所副所长汝信写的长篇文章：《人道主义就是修正主义吗？》。长期以来，在报刊上一直把人道主义当作修正主义来批判。这种批判是否正确？汝信同志的文章全面地阐述了对于这个问题的看法。他认为，把马克思主义和人道主义根本对立起来，是错误的。他列举《神圣家族》、《共产党宣言》，《反杜林论》和《资本论》中的论述，说明马克思主义创始人的人道主义思想的发展。文章最后部分说明马克思主义的人道主义和其他人道主义相区别的几个特点，并且谈到了研究马克思主义的人道主义思想对实际工作的意义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab0d2eb651"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
