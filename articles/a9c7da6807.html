script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"祝贺“八一”解放军建军节金日成致电毛主席","authors":[],"dates":[{"year":1952,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京卅一日电】　朝鲜民主主义人民共和国内阁金日成首相致电我中央人民政府毛泽东主席，祝贺“八一”中国人民解放军建军节。电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府毛泽东主席阁下:"},{"type":"paragraph","text":"值此中国人民的真正武装力量、英雄的中国人民解放军建军二十五周年纪念，我代表朝鲜民主主义人民共和国政府及全体朝鲜人民并以我个人的名义，向阁下和兄弟的中国人民以及中国人民解放军指挥员、战斗员，谨致热烈的荣誉和祝贺。"},{"type":"paragraph","text":"在纪念这一光荣的建军节时，朝鲜人民对于中国人民在反对美国侵略、争取朝鲜独立自由的斗争中所给予的兄弟的援助和支持，表示深深的感谢。同时确信:战斗的团结和友谊日益巩固的朝中人民，一定能击溃朝、中人民的共同敌人美、英武力侵犯者，争取最后的胜利。"},{"type":"paragraph","text":"为了中华人民共和国的繁荣、世界和平的巩固和安全，庆祝中国人民解放军的继续壮大和胜利。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国"},{"type":"paragraph","text":"内阁首相　金日成"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9c7da6807"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
