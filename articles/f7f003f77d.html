],"dates":[{"year":1958,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席　刘委员长　周总理　陈外长"},{"type":"paragraph","text":"电贺民主德国国庆九周年"},{"type":"paragraph","text":"新华社6日讯　毛泽东主席、刘少奇委员长和周恩来总理今天致电祝贺德意志民主共和国成立九周年，电文如下：德意志民主共和国总统威廉·皮克同志，德意志民主共和国人民议院主席团主席约翰奈斯·狄克曼同志，德意志民主共和国总理奥托·格罗提渥同志，德国统一社会党中央委员会第一书记瓦尔特·乌布利希同志："},{"type":"paragraph","text":"当德意志民主共和国成立九周年的时候，我们谨代表中华人民共和国政府和中国人民向德意志民主共和国政府和德国人民致热烈的祝贺。"},{"type":"paragraph","text":"九年来，德意志民主共和国人民在德国统一社会党和德意志民主共和国政府的领导下，在建设社会主义的伟大事业中获得了巨大的成就。忠于无产阶级国际主义原则的德国人民在巩固以苏联为首的社会主义阵营的团结、捍卫马克思列宁主义的纯洁性和反对现代修正主义的斗争中作出了贡献。德意志人民正在为反对美国帝国主义和西德政府的战争政策，为保卫欧洲和世界和平和争取在和平、民主的基础上重新统一德国进行着坚决的斗争。中国人民完全支持德国人民的正义的斗争。"},{"type":"paragraph","text":"中德两国人民之间的兄弟友谊是牢不可破的。德意志民主共和国政府和人民对于当前中国人民反对美国帝国主义对我国加紧军事挑衅和战争威胁的斗争给予了有力的支持，中国人民对于这种兄弟支持，十分感谢。我们两国人民的团结一致，必将有助于加强以苏联为首的社会主义阵营和维护世界和平的崇高事业。"},{"type":"paragraph","text":"祝兄弟的德国人民在实现德国统一社会党第五次代表大会的决议的斗争中获得新的、更大的成就。"},{"type":"paragraph","text":"中华人民共和国主席、中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1958年10月6日于北京"},{"type":"paragraph","text":"新华社6日讯　陈毅副总理兼外交部长今天致电祝贺德意志民主共和国国庆，电文如下：德意志民主共和国副总理兼外交部长洛泰·博尔茨同志："},{"type":"paragraph","text":"值此德意志民主共和国国庆九周年之际，我谨向你致热烈的祝贺。祝你在执行德意志民主共和国政府的和平外交政策的事业中获得进一步的成就。祝中德两国人民的兄弟友谊日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼外交部长　陈　毅"},{"type":"paragraph","text":"1958年10月6日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7f003f77d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
