:[{"year":1968,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"水有源，树有根。门合同志所以能成为无限忠于毛主席革命路线的好干部，最根本的原因是他对伟大领袖毛主席有着无比深厚的无产阶级感情，刻苦地活学活用毛泽东思想，不忘阶级苦，永远保持劳动人民的本色。"},{"type":"paragraph","text":"今年一月，我幸福地在北京见到了日夜盼望的伟大领袖毛主席和林副主席，当时我有多少话要对毛主席他老人家讲，但激动得说不出来。我面对着毛主席立下了誓言:毛主席啊毛主席，海可枯，石可烂，我忠于您老人家的红心永不变。学习了门合同志的事迹，深深感到自己跟门合同志有很大很大的差距，我一定以门合同志为榜样，刻苦地活学活用毛泽东思想，全心全意为人民服务，在阶级斗争的风浪中，把自己锤炼成为一个无限忠于毛主席革命路线的好飞行员。"},{"type":"paragraph","text":"民航上海管理局飞行大队飞行员　王家席"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64369a4c78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
