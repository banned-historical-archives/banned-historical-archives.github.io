" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于毛主席《正确处理人民内部矛盾的问题》的通知","authors":[],"dates":[{"year":1967,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"中共中央关于宣传毛主席《关于正确处理人民内部矛盾的问题》的通知","type":"title"},{"text":"今年六月十九日，是毛主席《关于正确处理人民内部矛盾的问题》这部伟大著作公开发表十周年。这部划时代的著作，创造性地发展了马克思列宁主义的唯物辩证法和阶级斗争，无产阶级专政的学说。它第一次阐明了社会主义社会的矛盾，阶级和阶级斗争，为在无产阶级专政条件下进行革命奠定了基础。它是对于国际共产主义事业的伟大贡献。它是当前我国进行的无产阶级文化大革命的极为重要的指南。","type":"paragraph"},{"text":"中央决定，应当结合当前无产阶级文化大革命群众运动，结合继续宣传中共中央一九六六年五月十六日的《通知》，大张旗鼓地深入细致地开展纪念毛主席《关于正确处理人民内部矛盾的问题》发表十周年的宣传活动，引导群众和群众组织更深刻地认识无产阶级文化大革命的意义，进行整风，正确认识和处理两类不同性质的矛盾，实现革命的大联合，集中力量批判党内最大的一小撮走资本主义道路当权派，积极进行本单位的斗，批，改。","type":"paragraph"},{"text":"（一）于六月十九日重新发表毛主席《关于正确处理人民内部矛盾的问题》。","type":"paragraph"},{"text":"（二）中央报刊发表纪念毛主席《关于正确处理人民内部矛盾的问题》发表十周年的社论。并组织一批在无产阶级文化大革命中活学活用《关于正确处理人民内部矛盾的问题》的文章，报导革命群众组织对这部伟大著作的学习活动。","type":"paragraph"},{"text":"（三）宣传要点：","type":"paragraph"},{"text":"（1）《关于正确处理人民内部矛盾的问题》的伟大意义。","type":"paragraph"},{"text":"（2）社会主义社会的矛盾，阶级和阶级斗争。防止资本主义复辟，巩固无产阶级专政。","type":"paragraph"},{"text":"（3）正确区别和处理两类性质不同的矛盾。","type":"paragraph"},{"text":"（4）集中力量，从政治上，理论上，思想上彻底批判党内最大的一小撮走资本主义道路当权派。","type":"paragraph"},{"text":"（5）对确有证据的破坏无产阶级专政的反革命分子，要实行专政。","type":"paragraph"},{"text":"（6）以民主的方法，“团结-----批评-----团结”的方针处理人民内部矛盾，对有群众的保守组织甚至反动组织进行细致的政治思想工作，反对左派群众之间打“内战”，反对用处理敌我矛盾的方法，用压服的方法对待受蒙蔽参加保守组织甚至反动组织的群众。","type":"paragraph"},{"text":"（7）强调民主只是手段，而不是目的，强调在人民内部民主和集中，自由和纪律的统一，反对无政府主义思潮。","type":"paragraph"},{"text":"（8）推动各群众组织，以《关于正确处理人民内部矛盾的问题》为指南进行整风，总结一年来无产阶级文化大革命的经验，发扬成绩，克服缺点，改造世界观，提高革命性，科学性，组织纪律性，反对无政府主义，个人主义，主观主义，小团体主义，山头主义和资产阶级作风。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第三集）》， 北京：1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef7a3ac341"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
