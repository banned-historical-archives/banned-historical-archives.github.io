al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"给孙中山的停","alias":"","parts":[{"type":"paragraph","text":"给孙中山的信川"},{"type":"paragraph","text":"（1923年6月25日）"},{"type":"paragraph","text":"我们不能沿袭封建军阀用武力夺取政权攻占地盘的同样的方针，这会给人们造成我们与军阀是一脉相承的印象。用旧方法旧军队去建立新中国不仅不合逻辑，而且在实践中也绝对行不通。旧军队有十倍于我们的兵力，我们只能用新手段，采取新方针，建立新的力量。对于国民，我们应联合商民、学生、农民、工人并引导他们到党的旗帜下，从人民中建立的新军队将用新的方法和新的友好精神捍卫民国。"},{"type":"paragraph","text":"我们要求先生离开广州前往舆论的中心地上海，到那里去召开国民会议（如先生在“三权宪法”中所阐述，而不只限于群众游行)。这样，一支解决全国问题的集中的军队便能建立起来，一支国民革命的集中的军队便能建立起来。如果我们这样做，我们就不会丧失我们在国民革命运动中的领导地位。"},{"type":"paragraph","text":"[1]1923年6月25日，毛泽东和陈独秀、李大钊、蔡和森、谭平山以国民党员身份致信孙中山，建议国民党“在上海或广州建立强有力的执行委员会，以期合力促进党员的活动和广泛开展宣传”。这是该信的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1923,"month":6,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":39,"page_end":39},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e108423f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
