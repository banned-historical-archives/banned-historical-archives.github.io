script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马烽、张贤亮、冯骥才向港澳记者谈切身体会反对资产阶级自由化不影响中国作家创作","authors":["郭玲春"],"dates":[{"year":1987,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京4月6日电(记者郭玲春)　对中国文艺现状一次严肃的探讨，在轻松的无拘束的气氛中进行。作家马烽、张贤亮、冯骥才与关注着内地文艺动向的港澳记者今天作了历时2小时又15分钟的对话。"},{"type":"paragraph","text":"一个敏感的问题，首先向张贤亮提出:反对资产阶级自由化给中国作家带来了什么样的影响?因为曾经发表过有争议的作品而受到外界注目的张贤亮缓缓地点起一支烟，说出他的见解:中国作家经过这场斗争会更加成熟，在认识生活上更加深化，在表现生活时更为准确。“当然，”他强调说，必须遵照赵紫阳同志政府工作报告中提出的各项政策，在文艺界则坚持“百花齐放、百家争鸣”的方针。"},{"type":"paragraph","text":"“去年写的《社会改革与文学繁荣》的文章，是否给你带来了麻烦?”"},{"type":"paragraph","text":"“带来的是批评。”张贤亮回答得直截了当。随即引出一段“注解”:“批评并非麻烦。我愿意反思，以不断修正或深化自己的认识。”"},{"type":"paragraph","text":"然而，反对资产阶级自由化并不影响写作。当年天津队的篮球中锋冯骥才在选材、落笔时感到比在球场上还要自如。他说，作家写什么，怎么写，那是自己的事。一名记者向这位中国民主促进会的成员追问:是否党外作家比党员作家有更大的自由度?“一样。”冯骥才说得干脆。“作为一个作家，一个公民，我对宪法承担义务和责任。”在毛主席发表了《在延安文艺座谈会上的讲话》后走人文学行列的马烽，称自己是党培养起来的作家，他心目中的读者是农民，并且重视作品的内容与效果。"},{"type":"paragraph","text":"坚持四项基本原则，并非说党员作家就要由上级划定写作的范围。对香港记者的这一担忧，他们以为不必。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb33f0e642"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
