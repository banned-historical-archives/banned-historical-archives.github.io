德生同志先后讲话","authors":[],"dates":[{"year":1973,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗马尼亚军事代表团团长举行告别宴会"},{"type":"paragraph","text":"叶剑英李德生等同志应邀出席扬·格奥尔基同志和李德生同志先后讲话"},{"type":"paragraph","text":"新华社一九七三年六月二十八日讯　罗马尼亚军事代表团团长、罗马尼亚国防部第一副部长兼总参谋长扬·格奥尔基上将今天晚上举行告别宴会。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英，中国人民解放军总政治部主任李德生，国防部副部长肖劲光，中国人民解放军副总参谋长彭绍辉、总政治部副主任田维新、总后勤部副部长张贤约，有关方面负责人曹里怀、潘焱、阳震、高体乾、陈祥、潘永堤、王迪康、甘迈、王明修、向前等应邀出席宴会。"},{"type":"paragraph","text":"罗马尼亚军事代表团全体团员，罗马尼亚驻中国大使馆临时代办格夫列希、商务参赞廖宁、武官杜贝什迪安努上校等出席了宴会。"},{"type":"paragraph","text":"在充满团结友好气氛的宴会上，扬·格奥尔基同志和李德生同志先后讲话。"},{"type":"paragraph","text":"扬·格奥尔基同志在讲话中首先对代表团在中国访问期间所受到的热情款待表示衷心的感谢。他说，我们对访问的成果，对所进行的会见和交谈，感到十分满意。我们对中国人民解放军指战员在提高部队战斗力方面所取得的成就感到特别高兴。扬·格奥尔基同志指出，罗中两国军队之间所建立和发展的友好合作关系必将得到进一步加强。他最后说，我们将把中国人民的勤劳和才能，将把你们的友好情谊带给罗马尼亚人民和军队。"},{"type":"paragraph","text":"李德生同志在讲话中说，罗马尼亚军事代表团的这次访问，是我们两国人民和军队之间革命友谊和战斗团结日益发展的又一生动体现，对进一步增进我们的友好合作关系作出了积极的贡献。他对罗马尼亚人民为反对帝国主义的霸权主义和强权政治，为争取欧洲真正普遍的安全所进行的不断的努力，表示钦佩和支持。"},{"type":"paragraph","text":"李德生同志说，罗马尼亚同志可以相信，在你们维护民族独立和国家主权的斗争中，在你们建设社会主义的事业中，中国人民和中国人民解放军始终是你们可以信赖的朋友。他请罗马尼亚军事代表团的同志们回国以后，向兄弟的罗马尼亚人民和罗马尼亚武装部队，转达中国人民和中国人民解放军的诚挚友情和亲切问候，并祝罗马尼亚人民和罗马尼亚武装部队不断取得新的更大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b7dc0517e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
