<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席派贺龙叶剑英同志看望麦贤得贺龙叶剑英同志并转达林彪副主席对麦贤得的问候　麦贤得表示:一定要听毛主席的话，做毛主席的好战士","authors":[],"dates":[{"year":1966,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社广州8日电　国务院副总理贺龙，国防委员会副主席叶剑英，今天上午前往广州部队总医院看望钢铁战士麦贤得，转达了毛主席、林彪副主席对他的关怀和问候。"},{"type":"paragraph","text":"贺龙同志、叶剑英同志来到医院时，麦贤得兴奋地走出病房，迎上前去，贺龙同志、叶剑英同志把两束鲜花送给麦贤得。麦贤得紧紧地握着贺龙同志、叶剑英同志的手连声地说:“首长好!首长好!”"},{"type":"paragraph","text":"贺龙同志、叶剑英同志携着麦贤得的手，一同走入病房，在病床前坐下来。贺龙同志对麦贤得说:“毛主席对你很关怀，派我们来看你。”麦贤得激动地说:“感谢毛主席!”叶剑英同志接着说:“林副主席对你很关心，打电话来向你问候，要你全心全意把伤养好。”麦贤得说:“谢谢林副主席!”接着，贺龙同志对麦贤得说:“你为党为人民立了功，你是英雄。”叶剑英同志说:“现在全军都向你学习。”麦贤得谦虚地连连摆手说:“不够!不够!”"},{"type":"paragraph","text":"贺龙同志站起来，轻轻地脱下麦贤得的军帽，细致地观察了他的伤口。叶剑英同志也拉起麦贤得的右手，细致地看了又看，然后说:“毛主席要我们告诉你，要安心把伤养好。你要听毛主席的话，好好养伤。”麦贤得表示:“我一定要读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士!”贺龙同志、叶剑英同志高兴地点头说:“好!好!”"},{"type":"paragraph","text":"贺龙同志、叶剑英同志向在座的医生、护士询问了对麦贤得治疗的情况。当听到麦贤得的身体一天比一天好起来之后，贺龙同志、叶剑英同志很高兴，并且嘱咐医生、护士:“要好好地照护他，注意营养，注意休息。”"},{"type":"paragraph","text":"贺龙同志、叶剑英同志一再地嘱咐麦贤得把伤养好。麦贤得情不自禁地唱起了《我是一个兵》。贺龙同志、叶剑英同志听了，不住地点头、鼓掌。贺龙同志说:“唱得很好，你负伤之后还记得这样清楚，你的伤是能够慢慢好起来的。”叶剑英同志说:“希望你养好伤，重回战斗岗位，如果敌人胆敢再来，就再打!”麦贤得握紧拳头说:“打!”贺龙同志说:“要把伤养好了再打。”麦贤得连连地说:“打!打!”"},{"type":"paragraph","text":"临别前，麦贤得一再表示:感谢毛主席的关怀。他又一次兴奋地唱起了《大海航行靠舵手》这支歌。麦贤得送贺龙同志、叶剑英同志到门口时，举手高呼:“毛主席万岁!中国共产党万岁!”"},{"type":"paragraph","text":"陪同贺龙同志、叶剑英同志前往医院慰问麦贤得的，还有中国人民解放军海军负责人苏振华、周希汉，广州部队负责人文年生、陶汉章、相炜等。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\02\\662a010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张健昌\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e贺龙同志、叶剑英同志前往广州部队总医院看望钢铁战士麦贤得同志，转达了毛主席、林彪副主席对他的关怀和问候。"},{"type":"paragraph","text":"张健昌摄　(新华社稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b2dff1d4e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
