<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文化大革命的一个新生事物赞上海街头革命大批判大字报专栏","authors":[],"dates":[{"year":1967,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编后"},{"type":"paragraph","text":"在革命的大批判运动中，上海无产阶级革命派和革命群众创造了街头革命大批判大字报专栏和橱窗大批判报，受到革命人民的热烈欢迎和大力支持。"},{"type":"paragraph","text":"革命的大批判运动，是广大革命群众向党内最大的一小撮走资本主义道路当权派发动全面进攻的一场人民战争。“大字报是一种极其有用的新式武器”，广大的工农兵群众，红卫兵小将，革命干部和革命知识分子，拿起了这个武器。他们拿起笔当刀枪，人人当批判家。街头革命大批判大字报专栏，就是无产阶级革命派向阶级敌人开火的一个战场，也是无产阶级革命派自己教育自己的大课堂。街头革命大批判大字报专栏成了“团结人民、教育人民、打击敌人、消灭敌人的有力的武器”，好得很!"},{"type":"paragraph","text":"这里选辑的是上海街头革命大批判大字报专栏的几个侧面。你看，办报的人是那么严肃认真、一丝不苟，他们知道这是在战斗!你看，读报的人是那么全神贯注、仔细阅读，上班前，下班后，休息天，多少人在这里接受教育!"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\08\\678e040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海无产阶级革命派和革命群众，高举毛泽东思想伟大红旗，进一步掀起革命大批判的新高潮，决心把中国赫鲁晓夫彻底批倒、批臭，彻底摧毁资产阶级司令部，把无产阶级文化大革命进行到底。图为街头的革命大批判大字报专栏，受到广大革命群众的热烈欢迎。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\08\\678e040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海无产阶级革命派和革命群众，在革命大批判中运用大字报这个强有力的武器，揭发、批判中国赫鲁晓夫一贯反对毛泽东思想的罪行。图为广大革命群众在观看街头大字报。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\08\\678e040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海工人阶级奋起毛泽东思想千钧棒，更广泛、更深入地开展革命大批判和本单位斗批改，彻底肃清中国赫鲁晓夫在各条战线上的反革命修正主义流毒。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\08\\678e040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e革命红卫兵是革命大批判的闯将。图为红卫兵小将为了把中国赫鲁晓夫的反革命罪行暴露在光天化日之下，正在积极准备革命大批判的大字报。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\08\\678e040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e广大贫下中农坚决贯彻执行我们最最敬爱的伟大领袖毛主席的指示，他们也要批判资产阶级，誓把党内最大的走资本主义道路当权派及其在上海的代理人彻底批深、批透，批倒、批臭!"},{"type":"paragraph","text":"(本版图片均为本报记者摄)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3271918b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
