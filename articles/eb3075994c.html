<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华东各地工矿企业进行民主改革补课的情况","authors":[],"dates":[{"year":1951,"month":9,"day":12}],"is_range_date":false,"parts":[{"text":"华东各地工矿企业进行民主改革补课的情况","type":"title"},{"text":"【华东分社讯】目前华东各地工矿企业进行民主改革补课第一阶段的典型实验工作已告结束。华东局并依据在上海国营第一棉纺厂、上海电机厂所创造的典型经验并综合各地经验，在八月初召开的华东局扩大会议上，提出民主改革补课运动，分下述三个步骤进行：第一是镇压反革命（包括反对封建恶霸与把头制度等）运动；第二是进行民主团结运动；第三是通过反浪费运动，确定初步的定额，并建立新的管理制度与人事关系。同时拟于最近集中华东各地区负责工矿民主改革工作的同志，举行整风会议，进一步研究如何推广与贯彻工矿民主改革工作。上海市委亦准备于九月上旬开始，集合华东工业部与纺织管理局所属各厂军事代表、党委书记，经过整风学习，研究民主改革并普遍推广与贯彻这一运动。","type":"paragraph"},{"text":"华东各地进行民主改革补课的情况大致如下：","type":"paragraph"},{"text":"青岛于六七月间已在八个国营棉纺厂中，初步完成民主改革补课工作。如青岛国营棉纺六厂（全场共三千七百余职工），在此次坦白、检举运动中发现反革命分子六名；有政治问题（参加过反动军队、警察、宪兵，在反动政府中作过事，反动党团员等）有四一八名；曾经对工人有过罪行的有六十余人，多半为把头及旧警卫人员。经过广大群众声势浩大的控诉、检举及展开批评与自我批评，根据具体情况，分别处理上述三种人后，并进行了“追苦根”“寻找胜利源泉”的教育，全场已出现了新气象。","type":"paragraph"},{"text":"在浙江，则是在六月中的镇压反革命运动的基础上转入了民主团结运动，到七月底已在杭州华丰造纸厂，第一纱厂，杭江纱厂等九个大厂中基本结束，目前正准备在各地中小企业中推广民主团结运动。这一运动解决了镇压反革命与反恶霸阶段所遗留下来未解决的问题，经过发扬民主，进一步发动群众，展开批评与自我批评，消除了职工间不团结现象，改变了职员的官僚主义作风，开始改革了旧的制度，建立了新的人事制度与生产负责制度等新制度，并引导工人把这一热情转入搞好生产与增产捐献运动。华东造纸厂经过这一运动后所展开的增产捐献运动，已超过半年增产计划的百分之五点五。","type":"paragraph"},{"text":"上海各工厂企业，在镇压反革命、劳保登记及抗美援朝各种工作中，都已进行了程度不等的民主改革工作。在国营工厂中旧的制度和旧的人事关系，亦有了初步的改革。","type":"paragraph"},{"text":"关于如何系统地，有计划地改造旧企业，发动群众管理好人民企业的问题，华东局与上海市委于五月间发布了关于着手在上海创造工厂管理的典型经验的决定，在已进行过镇压反革命分子的国营上海第一棉纺厂及上海电机厂创造经验。现在这两个厂第一阶段（自五月底到八月半）的工作已经结束，通过总结劳保登记，进行了民主团结运动，接着又发动了反浪费运动，全面的了解了厂内的人员现状与生产现况，发现了旧企业中许多不合理的制度与人事关系，在现已开始的第二阶段工作中，准备进行各种可能与必要的改革，逐步建立新的制度，新的人事关系和新的作风。如国营上海棉纺第一厂，目前正按如下步骤进行民主改革工作：第一是改革车间管理制度与管理方法，改变拿摩温制度为生产小组，建立车间生产会议，并在民主团结的精神下、开展批评与自我批评，提高对于民主管理及新劳动态度的认识，然后有步骤地建立车间责任制、交班制及检查、统计等制度，以打下民主管理的切实基础。第二有重点地研究和改变不合理的奖励制度，首先以对合理化建议与提高质量，节约的奖励为主，有重点地逐步推行合理的奖励制度。并开始进行合理调整劳动力组织及改革工资制度的研究及准备。第三是推行全厂的民主管理，在生产节约运动和车间组织改革的基础上，改组与充实工厂管理委员会的机构，使能充分发挥领导生产的工作，有计划地建立全厂性的生产会议制度，真正贯彻管理民主化。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1951年9月12日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb3075994c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
