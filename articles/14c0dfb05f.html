ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对贺诚来信的批语","alias":"","parts":[{"type":"paragraph","text":"对贺诚来信的批语\""},{"type":"paragraph","text":"（1972年6月28日）贺诚同志来信请中央处理。我意应给予工作。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七二年六月二十八日"},{"type":"paragraph","text":"[1]贺诚，原任中国人民解放军军事医学科学院院长。“文化大革命”中受到林彪反革命集团的迫害。1972年6月26日，他给毛泽东写信，要求分配工作。毛泽东阅信后写了这个批语。接到毛泽东批示后，中国人民解放军总政治部曾建议贺诚任总后勤部副部长，于1973年1月17日上报中央军委，军委办公会议各同志圈阅后在1973年8月退回总政。1975年3月22日，贺诚的女儿贺礼荣再次写信，要求给其父分配工作。毛泽东阅后又写了两个批语。不久，贺诚出任总后勤部第一副部长。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":6,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":322,"page_end":322},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14c0dfb05f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
