<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶总管的“鸣鞭术”","authors":["黄世益"],"dates":[{"year":1977,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海汽轮机厂　黄世益"},{"type":"paragraph","text":"在奴隶社会，尽管奴隶们顶炎日，冒寒风，整年累月辛辛苦苦，扶耜耕地，可是，只要稍一不慎，背后就会猛地抽来一鞭子。那个背后监督奴隶的执鞭人，就叫“奴隶总管”。奴隶总管用以监督奴隶的方法，就是“鸣鞭术”。"},{"type":"paragraph","text":"在我们党内，“四条汉子”就是被鲁迅痛斥的“奴隶总管”。鲁迅一针见血地指出:他们“抓到一面旗帜，就自以为出人头地，摆出奴隶总管的架子，以鸣鞭为唯一的业绩”。他们一鸣鞭就是“轻易诬陷别人为‘内奸’，为‘反革命’，为‘托派’”(《且介亭杂文末编·答徐懋庸并关于抗日统一战线问题》)，欲置人于死地而后快。一不会种田，二不会做工，三不会打仗的王张江姚“四人帮”，也是一伙以鸣鞭为业的“奴隶总管”。"},{"type":"paragraph","text":"“四人帮”自己就是以执鞭整人的“奴隶总管”自居的。他们大肆宣扬武则天“铁鞭”的故事。说唐太宗有匹烈马，别人驯不了，武则天就要唐太宗给她“铁鞭”，去驯服这匹马。武则天是什么东西?是个地主婆头子。“四人帮”唠唠叨叨地给人们讲这个故事，无非是要充当地主婆头子。在他们眼中，人民是牛马，要用铁鞭去“驯服”实行封建法西斯的统治。这些年来，“四人帮”正是摆着“奴隶总管”的架式，口称“老娘今天要教训教训你”，手执“铁鞭”，乱挥乱舞，专横跋扈，为所欲为，称王称霸，大搞“顺我者昌，逆我者亡”。你要“整顿”，他们就说是“复辟”“倒退”；你要学大庆、学大寨，他们就说是“唯生产力论”；你要搞企业管理，他们就说是“搞管、卡、压”；你要两点论，他们就说是“否定文化大革命”；你要关心群众生活，他们就说你“收买人心”，“搞物质刺激”；你为革命钻研技术，他们就说你“走白专道路”；你要抓教育质量，他们就说是“智育第一”；你要执行双百方针，他们就说是“毒草”……等等，东一鞭，西一鞭，猛抽狠打，不一而足。"},{"type":"paragraph","text":"一切反动派都是“强权即公理”的忠实信奉者。他们既无真理，又无群众，总是要依靠屠杀、整人来维持他们的反动统治。“四人帮”人心丧尽，极端孤立，他们一天不鸣鞭整人，就一天混不下去，就会立刻垮台。但是，从来的反动派整人所得的结果，总是和他们的愿望相反。他们总是以损人开始，以害己告终。奴隶社会的奴隶总管早已连同那吃人制度被送进了历史的垃圾箱，“四条汉子”也早被鲁迅下了历史的定论。“四人帮”在二十世纪七十年代重操“鸣鞭术”，做“奴隶总管”，其结果也逃脱不了覆灭的下场!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1f16ccf9d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
