script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"收容所主任剥削难民徒刑三月罚金三百","authors":[],"dates":[{"year":1938,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京路国际红十字会第五十七收容所主任瞿兴、前勾串该所难民朱元祺、将所内难民煮食之蚕豆六袋尅扣、私自出售、得款分肥化用、经人报密、由国际红十字会报告捕房、将二人拘获、解由特一法院依法起诉、业已讯结、昨晨由钱鸿业刑庭长升座刑一庭宣告判决、瞿兴侵占因公益所持有之物、处徒刑三年、并科罚金三百元、禠夺公权三年、朱元祺帮助侵占因公益所持有之物、处徒刑三月、缓刑二年、瞿之律师许武芳请求在上诉期内准予交保、庭上当裁定准交三千元铺保、捕房律师厉志山对朱元祺之缓刑判决、声明舍弃上诉。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d703efaba"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
