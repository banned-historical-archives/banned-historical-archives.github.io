ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"给艾思奇\"的信","alias":"","parts":[{"type":"paragraph","text":"给艾思奇的信"},{"type":"paragraph","text":"（1937年）思奇同志："},{"type":"paragraph","text":"你的《哲学与生活》是你的著作中更深刻的书，我读了得益很多，抄录了一些，送请一看是否有抄错的。其中有一个问题略有疑点（不是基本的不同），请你再考虑一下，详情当面告诉。今日"},{"type":"paragraph","text":"[1]艾思奇（1910一1966），云南腾冲人，哲学家。1937年10月到延安，在抗日军政大学任主任教员。"},{"type":"paragraph","text":"[2]《哲学与生活》是艾思奇继《大众哲学》之后，以答读者问的形式写的一本宣传马克思主义哲学的著作。1937年4月由上海读书生活出版社出版。1937年9月毛泽东作了《艾著（哲学与生活）摘录》。"},{"type":"paragraph","text":"[3]指毛泽东在他所作的摘录中对艾思奇《哲学与生活》一书中一个论点的质疑。艾思奇的论点是：“差别的东西不是矛盾，例如笔、墨、椅子不是矛盾。但如果懂得推移和变化的原理，就知差别的东西在一定条件下也可以转化为矛盾，倘若某两件差别东西同时同地在一起且发生互相排斥的作用时，就成为矛盾了。例如店员与作家本无矛盾的，如果某店员有了写作兴趣而想成为作家时，二者就在统一体里互相排斥，也就成为矛盾了。”毛泽东在摘录艾思奇这个论点后，写了以下一段话：“根本道理是对的，但‘差别不是矛盾’的说法不对。应说一切差别的东西在一定条件下都是矛盾。一个人坐椅摇笔濡墨以从事作文，是因人与作文这两个一定的条件把矛盾的东西暂时的统一了，不能说这些差别不是矛盾。大师傅煮饭，把柴米油盐酱醋茶在一定的条件下统一起来。店员与作家也可以在一定条件下统一起来。半工半读，可以把工读统一起来。差别是世上一切事物，在一定条件下都是矛盾，故差别就是矛盾；这就是所谓具体的矛盾。艾的说法是不妥的。”何时有暇，我来看你。"},{"type":"paragraph","text":"毛泽东全生不风·信你A虎（1"},{"type":"paragraph","text":"绿1一些，至诱·有兄品有抄锣"},{"type":"paragraph","text":"2."},{"type":"paragraph","text":"你以#了与民死你怀父"},{"type":"paragraph","text":"M该了乃多很/"},{"type":"paragraph","text":"以中千川愈有疑太见O你叶有腕中"},{"type":"paragraph","text":"小毛泽东致艾思奇信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1937}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":210,"page_end":212},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab6235d87f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
