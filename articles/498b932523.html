art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"颗颗红心向太阳条条金线通北京热烈祝贺通信兵第二次学习毛主席著作积极分子代表大会胜利召开","authors":[],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！革命战士永远无限忠于您！通信兵某部长途台，在无产阶级文化大革命中，坚定地站在毛主席革命路线一边，保证了以毛主席为首的无产阶级司令部的通信顺畅。图为长途台的同志在工作中带着问题学习毛主席的最新指示。"},{"type":"paragraph","text":"坚持毛主席的无产阶级革命路线就无往而不胜。通信兵某部十二连，用战无不胜的毛泽东思想武装头脑，克服了重重困难，提前完成了西藏高原的架线任务，胜利地完成了大跨距的黄河飞线架设任务。这是他们在作业前学习毛主席语录。"},{"type":"paragraph","text":"人民军队的建设要突出政治，要从政治上建军。通信兵某部五连，坚定不移地走突出无产阶级政治的道路，他们把无限忠于毛主席做为革命战士思想革命化的最高标准，连续七年被评为四好连队。图为五连政治指导员和战士们正在纵情高唱毛主席语录歌。"},{"type":"paragraph","text":"全面落实毛主席的最新指示，就是无产阶级文化大革命的全面胜利。出席通信兵第二次学习毛主席著作积极分子代表大会的代表，满怀革命豪情，交流全面落实毛主席最新指示的经验，决心在夺取无产阶级文化大革命的全面胜利中为人民立新功。"},{"type":"paragraph","text":"“人类解放我解放，我愿一生为人民。”毛主席的好战士王树庆，满怀对毛主席的无限忠诚，放眼世界。他为了捍卫毛主席的无产阶级革命路线而英勇献身。这是学习毛主席著作积极分子代表们在参观王树庆同志事迹展览。"},{"type":"paragraph","text":"“你们要关心国家大事，要把无产阶级文化大革命进行到底！”通信兵机关无产阶级革命派，在两个阶级、两条道路、两条路线的斗争中，坚定地站在毛主席革命路线一边，站在无产阶级司令部一边，狠抓革命，猛促战备，在无产阶级文化大革命运动中立下了新功。图为他们在狠批中国赫鲁晓夫。"},{"type":"paragraph","text":"“派军队干部训练革命师生的方法很好。”通信兵某部驻北京市香厂路小学军训组，紧跟毛主席的伟大战略部署，大力宣传毛泽东思想和毛主席一系列最新指示，积极传播我军政治工作经验，热情帮助革命师生进行教育革命，建立红小兵组织。图为军训组的同志和红小兵一起学习毛主席关于教育革命的伟大教导。 本版照片由通信兵第二次学习毛主席著作积极分子代表大会供稿和本报记者摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"498b932523"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
