,"dates":[{"year":1954,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李亚农著　华东人民出版社出版"},{"type":"paragraph","text":"这是两本研究我国古代史的学术著作。"},{"type":"paragraph","text":"我国历史发展阶段的划分问题，关键现已集中到西周社会性质的问题上。历史学家对此有不同的看法，但迄今尚未获得一致的结论。在“中国的奴隶制与封建制”一书中，作者根据相当丰富的史料，论证“中国的奴隶社会，在周灭殷之后，还存续了将近三百年。周宣王以后，中国的历史翻开了新的一页，走进了典型的封建制社会。”作者研究氏族制的周族征服了奴隶制的殷族之后所发生的情况，比较具体，也比较全面。书中以西周为奴隶制社会的推断，是作者研究我国古代社会性质这一问题之后的看法。"},{"type":"paragraph","text":"“周族的氏族制与拓跋族的前封建制”分前后两编:前编谈周族的氏族制，后编谈北魏拓跋族的前封建制。作者认为:“周族的宗法制度像一线红丝似的贯串着三千年来的中国历史，使中国的历史，尤其是古代史，变成一个扑朔迷离、难于猜破的谜。因此彻底研究灭殷时期，或稍前于灭殷时期的周族的宗法社会，是解开中国历史之谜的一把钥匙。”这是作者写述此书的动机。至于作者写述此书的目的，则有两个。一是根据文献材料来叙述周族的氏族制是怎么一回事，一是研究氏族社会和封建社会接触之后所发生的影响。书中对于北魏社会的性质，认为是“前封建社会”——它既不是封建社会，也不是氏族社会，是由氏族制飞跃到封建制的一个历史时期。这里，作者认为北魏社会是从氏族社会跳越了奴隶社会而直接进入封建社会的这一看法是比较新颖的，值得注意。"},{"type":"paragraph","text":"这两本书是作者的姊妹篇，可以相互参阅。对于大、中学历史教师和历史研究工作者来说，是较为适合的参考读物，对于一般读者，在丰富自己历史知识方面，也有益处。　(尹)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d29db69e44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
