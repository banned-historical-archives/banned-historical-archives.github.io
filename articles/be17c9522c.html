正主义作斗争，为加强党的团结而斗争","authors":[],"dates":[{"year":1964,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京18日电】　东京消息:据《赤旗报》十八日报道，日共地方组织纷纷打电报和写信给党中央，表示支持日共中央政治局十六日发表的关于志贺义雄反党行为的声明。"},{"type":"paragraph","text":"日共东京都委员会十六日晚上举行的紧急全体会议一致通过一项声明，表示支持政治局的声明，并决心为维护党的团结而斗争。"},{"type":"paragraph","text":"声明指出，志贺的行动是“对党和人民的背叛和挑战”，是标志着“反党反人民的公开活动的开始”"},{"type":"paragraph","text":"声明接着说:“志贺对阶级犯下了罪行。他把自己置于党之上，并要向人民群众发号施令。”"},{"type":"paragraph","text":"声明号召党员“进一步提高革命的战斗性，同主要的危险——现代修正主义作斗争，为成功地完成当前的政治任务、为加强党的团结而斗争。”"},{"type":"paragraph","text":"日共大坂府委员会十七日举行的常务委员会会议也表示支持日共中央政治局的声明。志贺选区所在地的这个委员会发表的声明说:“志贺背叛了党组织和选民的信任。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be17c9522c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
