script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0affd51d-16ee-43e8-82cf-fa92baf6c913","name":"中共中央文件 中发〔69〕48号（1969.8.4）","internal":false,"official":true,"type":"img","author":"中共中央、北京卫戍区，浙江省联总《情况交流》编辑组一九六八年八月六日","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/0affd51d-16ee-43e8-82cf-fa92baf6c913/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/0affd51d-16ee-43e8-82cf-fa92baf6c913/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/0affd51d-16ee-43e8-82cf-fa92baf6c913/3.png"],"article":{"title":"中共中央同意对方剑文的问题进行公开批判的通知","alias":"中共中央文件 中发〔69〕48号","parts":[{"type":"paragraph","text":"中共中央文件"},{"type":"paragraph","text":"中发〔69]48号浙江省革委会并告南京军区、江苏省革委会："},{"type":"paragraph","text":"你们十七、十九日两次来电，均收到。同意对方剑文的问题进行公开批判，以肃清其错误影响。现随电附去中央责成方剑文写出书面检讨，并要他将私自来京的人带回去的批示，中央批准北京卫戌区要求派解放军和工、军宣队将浙江红暴二百多人押送回杭的报告和北京卫戌区关于押送红暴回杭发生问题的检讨三件，以明中央处理此事的态度。"},{"type":"paragraph","text":"在批判方剑文过程中，要遵照毛主席“打击面要小，教育面要宽”的教导，对于追随方剑文犯了错误的人，要区别对待，做好团结教育工作。通过对方剑文的批判，促进两派在毛泽东思想基础上进一步团结起来，争取更大的胜利。"},{"type":"paragraph","text":"中共中央附：中共中央六月二十五日批示，七月五日经过中共中央批准"},{"type":"paragraph","text":"的卫戌区的报告，七月二十三日北京卫戌区“对押送浙江“红暴’群众回杭州发生问题的检讨”："},{"type":"paragraph","text":"附一：中共中央批示"},{"type":"paragraph","text":"一九六九年六月二十五日，中共中央要北京卫戌区“通知方剑文，他和同来的人包围新华社是完全错误的。要他对包围新华社一事，写出一个触及灵魂、承认错误的检讨。限他三天内写出，并叫他和同来的人都立即回去”，"},{"type":"paragraph","text":"一九六九年六月二十五日"},{"type":"paragraph","text":"附二：中共中央"},{"type":"paragraph","text":"批准北京卫成区的报告"},{"type":"paragraph","text":"一九六九年七月五日，经过中共中央批准的北京卫戌区的报告全文如下："},{"type":"paragraph","text":"浙江“红暴”六月四日以来；陆续来京二百六十余人。到京后，其中近二百人，曾跑到新华社取闹，后由中央联合接待室安置在和平里接待站。遵照指示，卫戌区于六月二十日下午派出了一个连队去做宣传动员工作．组织他们办学习班。.六月二十六日上午卫戌区又向他们传达了：“通知方剑文他和同来的人包围新华社是完全错误的。要他对包围新华社一事，写出一个触及灵魂、承认错误的检讨。限他三天内写出，并叫他和同来的人都立即回去”的通知。他们对通知抵触情绪很大，扬言：通知不是无产阶级司令部的，不符合毛泽东思想的，这是卫戌区捏造的·…·。至今拒不执行。"},{"type":"paragraph","text":"半个月来军宣队向他们反复宣传了“九大”精神和党的政策，动员教育他们有问题回浙江去解决。中央联合接待室的负责同志也多次找他们谈话做工作，同时浙江省革命委员会也派了人来做了工作。目前看来他们无任何想走的迹象。他们说：中央首长不接见我们，对我们来京的行动不表态，浙江的问题不解决，我们坚决不回去。"},{"type":"paragraph","text":"在头头的严格控制下，他们采取种种办法，来对抗我们的宣传动员工作。在学习班中，凡是符合他们口味的就学，否则就用起哄、睡觉、唱歌等等手段破坏学习。近日来，他们内部控制越来越严，活动频繁，发现他们在组织人秘密写材料，并扬言：还要动员几百人来京。"},{"type":"paragraph","text":"根据以上情况，我们意见，派解放军和工人将他们分批强制押送回浙江。"},{"type":"paragraph","text":"当否，请批示。"},{"type":"paragraph","text":"北京卫戌区"},{"type":"paragraph","text":"一九六九年七月四日附三：（略）情况交流"},{"type":"paragraph","text":"浙江省联总《情况交流》编辑组"},{"type":"paragraph","text":"一九六九年八月六日"}],"authors":["中共中央","北京卫戍区"],"dates":[{"year":1969,"month":6,"day":25},{"year":1969,"month":7,"day":4},{"year":1969,"month":8,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":3},"tags":[{"name":"毛泽东","type":"人物"},{"name":"方剑文","type":"人物"},{"name":"浙江省红色暴动委员会（红暴）","type":"人物"},{"name":"浙江省红色暴动委员会（红暴）","type":"人物"},{"name":"浙江省红色暴动委员会（红暴）","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85192ac353"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
