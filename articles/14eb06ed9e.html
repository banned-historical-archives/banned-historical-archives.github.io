ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"关于批评美国对华政策的电报","alias":"","parts":[{"type":"paragraph","text":"关于批评美国对华政策的电报"},{"type":"paragraph","text":"（1945年7月30日）徐、张："},{"type":"paragraph","text":"（一）美大使馆前曾劝告我们不要批评蒋介石，这一点现在他们不说了，却来劝告我们不要批评赫尔利？。美国报纸经常批评外国元首，去年曾激烈批评蒋介石，为什么中国人不能批评赫尔利？赫尔利曾经批评中共，把中共和军阀并列，并且是当作整个党来批评的，为什么中共不能批评他？我们的批评是将美国政府与美国人民分开，又将美国政府中决定对华政策的人物与其他人员分开，又将美国政府一部分错误政策与其他正确政策分开。只要美国政府的现行扶蒋反共政策有一天能改变，我们就将停止批评这个政策，否则是不可能停止的。以上意见，请向有关方面给予解释。"},{"type":"paragraph","text":"（二）给美共福斯特电，除在《新华日报》发表（可去掉国民党三字）外，请翻成英文用快邮发寄美共。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"午三十"},{"type":"paragraph","text":"[1]徐，指徐冰（1903—1972)，河北南宫人；张，指张明，即刘少文（1905一1987），河南信阳人。他们均是中共中央南方局工作委员会负责人。"},{"type":"paragraph","text":"[2]赫尔利，当时任美国驻中国大使。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":7,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":193,"page_end":193},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]},{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"关于批评美国对华政策的电报","description":"根据手稿刊印。","dates":[{"year":1945,"month":7,"day":30}],"parts":[{"text":"关于批评美国对华政策的电报","type":"title"},{"type":"appellation","text":"徐、张："},{"type":"paragraph","text":"（一）美大使馆前曾劝告我们不要批评蒋介石，这一点现在他们不说了，却来劝告我们不要批评赫尔利。美国报纸经常批评外国元首，去年曾激烈批评蒋介石，为什么中国人不能批评赫尔利？赫尔利曾经批评中共，把中共和军阀并列，并且是当作整个党来批评的，为什么中共不能批评他？我们的批评是将美国政府与美国人民分开，又将美国政府中决定对华政策的人物与其他人员分开，又将美国政府一部分错误政策与其他正确政策分开。只要美国政府的现行扶蒋反共政策有一天能改变，我们就将停止批评这个政策，否则是不可能停止的。以上意见，请向有关方面给予解释。（二）给美共福斯特电，除在《新华日报》发表（可去掉国民党三字）外，请翻成英文用快邮发寄美共。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"午三十"}],"comment_pivots":[{"part_idx":1,"offset":3,"index":1},{"part_idx":2,"offset":45,"index":2},{"part_idx":2,"offset":264,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["徐，指徐冰（一九○三——一九七二），河北南宫人；张，指张明，即刘少文（一九○五——一九八七），河南信阳人。他们均是中共中央南方局工作委员会负责人。","赫尔利，当时任美国驻中国大使。","即《给福斯特同志的电报》（《毛泽东选集》第3卷，人民出版社1991年版，第1117页）。"],"page_start":461,"page_end":461,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14eb06ed9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
