ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺罗马尼亚解放十九周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺罗马尼亚解放"},{"type":"paragraph","text":"十九周年的电报"},{"type":"paragraph","text":"（1963年8月22日）布加勒斯特罗马尼亚工人党中央委员会第一书记、罗马尼亚人民共和国国务委员会主席格·乔治乌一德治同志，罗马尼亚人民共和国部长会议主席扬·格·毛雷尔同志："},{"type":"paragraph","text":"在罗马尼亚解放十九周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府向罗马尼亚人民、罗马尼亚工人党和罗马尼亚人民共和国政府致以热烈的祝贺。"},{"type":"paragraph","text":"一年来，兄弟的罗马尼亚人民在以乔治乌一德治同志为首的罗马尼亚工人党和罗马尼亚人民共和国政府的领导下，团结奋斗，在建设社会主义和争取实现国民经济六年计划方面取得了重大的成就，并在保卫欧洲和世界和平方面进行了不邂的努力。中国人民对此感到由衷的高兴。"},{"type":"paragraph","text":"中国和罗马尼亚是社会主义兄弟之邦。一年来，我们两国本着相互尊重独立和主权、平等互利、互助合作的原则，在经济、文化和科学技术等方面的友好合作，有了良好的发展。这种发展是符合两国人民的共同愿望的，是符合两国社会主义建设的共同利益的，是有利于增强社会主义阵营的团结和力量的。中国人民一向珍视同"},{"type":"paragraph","text":"毛泽东等祝贺罗马尼亚解放十九周年的电报罗马尼亚人民的友谊，并且相信，通过双方的努力，中罗两国人民的深厚友谊，将在马克思列宁主义和无产阶级国际主义的基础上，在一九五七年莫斯科宣言和一九六○年莫斯科声明的基础上，得到进一步的巩固和发展。"},{"type":"paragraph","text":"祝罗马尼亚人民在建设社会主义，保卫世界和平和促进人类进步事业的斗争中取得新的、更大的成就。祝中罗两国人民的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六三年八月二十二日"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":515,"page_end":516},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33d5f79c97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
