tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"离开毛泽东思想就是离开革命号召革命学生学习，宣传和运用毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"墨西哥马克思列宁主义运动联邦区委员会最近发表一篇题为《致革命学生》的文章，号召革命学生“应该首先用毛泽东思想武装自己，应该在群众中宣传毛泽东思想，并努力把它运用到国内具体现实中去”。"},{"type":"paragraph","text":"文章强调指出：“毛泽东同志通过中国革命的实践，创造性地全面地发展了马克思列宁主义，把马克思列宁主义提高到一个崭新的阶段，他已成为当代世界革命无可争辩的领袖。因此，当前要谈马克思列宁主义，基本上就是谈毛泽东思想。”"},{"type":"paragraph","text":"文章指出，只有依靠毛泽东思想，才能使学生运动走上正确的道路。文章说，“在当代世界的条件下，特别是在我国目前条件下，离开了毛泽东思想，就是离开了革命道路，就是否认马克思列宁主义的普遍真理，就是离开了群众的具体现实，甚至就是脱离了彻底的革命实践。”“因为只有毛泽东思想才能反映出当代世界的具体条件，只有毛泽东思想才能提出符合这种条件的革命路线。这是四十年来世界革命运动的历史和实践所证明的真理。”"},{"type":"paragraph","text":"文章指出，只有完全承认当代的马克思列宁主义并把她运用到墨西哥的具体实践中去，墨西哥革命者才能够正确地把广大群众引导到革命道路上去。只有承认这一点，墨西哥革命者才能清楚地看到并识别革命力量和反革命力量。"},{"type":"paragraph","text":"文章最后号召有觉悟的革命学生到阶级斗争的大海中去组织群众，并把自己组织起来。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5647daa972"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
