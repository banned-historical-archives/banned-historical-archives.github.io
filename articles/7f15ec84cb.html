script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚人民继续集会热烈支持上海工人革命行动  上海革命造反派打退了反动路线的新反扑  中国工人阶级高举毛泽东思想伟大红旗一定取得文化大革命的彻底胜利","authors":[],"dates":[{"year":1967,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚人民继续集会热烈支持上海工人革命行动"},{"type":"paragraph","text":"上海革命造反派打退了反动路线的新反扑"},{"type":"paragraph","text":"中国工人阶级高举毛泽东思想伟大红旗一定取得文化大革命的彻底胜利"},{"type":"paragraph","text":"新华社地拉那十九日电　阿尔巴尼亚广大职工和干部继续集会和写信，热烈支持上海工人革命造反总司令部等革命群众组织保卫以毛主席为代表的无产阶级革命路线，粉碎资产阶级反动路线新反扑的正义斗争。"},{"type":"paragraph","text":"阿尔巴尼亚交通部全体工作人员十七日举行了集会。计划局长绍马·克罗米洛在大会上作了报告，详细介绍了中国无产阶级文化大革命的重要意义和上海文化大革命的形势。克罗米洛报告后，交通部机关党组织和群众团体代表先后在会上发言，表示坚决支持上海工人的革命行动，热烈祝贺他们打退资产阶级反动路线的新反扑。大会最后通过了给上海工人革命造反总司令部等革命群众组织的一封信。"},{"type":"paragraph","text":"信中说，我们交通部工作人员完全同你们上海的工人站在一起，并坚决支持你们的革命行动。我们义愤填膺地谴责那些企图玩弄最卑鄙的手段，以危害革命和削弱无产阶级专政的修正主义者和资产阶级分子的敌对活动。"},{"type":"paragraph","text":"信中指出，上海革命群众组织的《紧急通告》高举以毛泽东主席为代表的无产阶级革命路线的伟大红旗，为反对反革命修正主义的斗争作出了良好的榜样。"},{"type":"paragraph","text":"信中表示，在阿尔巴尼亚劳动党和敬爱的领袖霍查同志领导下，阿尔巴尼亚人民将同伟大的中国人民和中国共产党在同一条革命道路上前进。无论在美好的日子里还是暴风雨时刻，我们将永远肩并肩地同你们站在一起，在反对帝国主义和现代修正主义、争取革命和社会主义胜利的斗争中，我们将永远同你们共同前进。"},{"type":"paragraph","text":"信中最后高呼：我们两国马克思列宁主义政党和我们敬爱的领袖霍查同志和毛泽东同志万岁！中国无产阶级文化大革命万岁！"},{"type":"paragraph","text":"巴托斯油区的石油工人最近也举行了集会。会上通过的给上海革命群众组织的支持信说，我们巴托斯油田工业区全体劳动者，衷心祝贺你们为反对资产阶级和修正主义当权派所进行的革命斗争和行动。你们以革命的号召和行动，表现了巨大的决心、智慧、锐利的政治敏感性和高度的战斗警惕性。你们保卫社会主义和无产阶级专政，保卫和发展无产阶级文化大革命和社会主义经济，给予企图破坏革命和复辟资本主义的资产阶级和修正主义分子以有力的打击。"},{"type":"paragraph","text":"信中接着说，你们的革命警惕性和革命胆略以及采取的革命行动，不仅对保卫毛泽东主席的思想和学说作出了又一巨大的贡献；而且为在反对帝国主义和修正主义的艰巨道路上应该如何保卫马克思列宁主义、无产阶级专政以及用鲜血和牺牲换得的胜利作出了光辉的榜样。"},{"type":"paragraph","text":"信中表示坚信，英勇的中国工人阶级高举毛泽东思想红旗，将进一步团结一切革命力量，取得无产阶级文化大革命的彻底胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f15ec84cb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
