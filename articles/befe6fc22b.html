script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共开办中央党校  野坂号召加强反对美帝国主义和修正主义的斗争","authors":[],"dates":[{"year":1962,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共开办中央党校"},{"type":"paragraph","text":"野坂号召加强反对美帝国主义和修正主义的斗争"},{"type":"paragraph","text":"新华社22日讯　东京消息：日本共产党从15日起在东京开办中央党校。"},{"type":"paragraph","text":"这个党校是根据共产党第八次代表大会的政治报告和去年年底举行的中央委员会第二次全体会议的决议开办的。"},{"type":"paragraph","text":"日共主席野坂参三在党校开学典礼上致贺词，预祝学校的成功。他强调说，这个学校的开办是标志着日本革命运动的发展和党的发展的重要事件。"},{"type":"paragraph","text":"野坂说，目前美日反动势力正从思想上对人民加紧进攻。与此同时，以“结构改革论”等为代表的修正主义“理论”也在顽固地歪曲马克思列宁主义。所有这些思想上的进攻的目的都在于阻挠日本人民正视美帝国主义的统治和接受共产党的纲领。野坂强调说，我们要实现纲领，并使日本革命获得成功，就必须在这场思想战线上取得胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"befe6fc22b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
