tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"先进典型要一分为二地看待自己同“四人帮”作过斗争的王勤副团长向上级写信提了很好意见","authors":[],"parts":[{"type":"paragraph","text":"本报讯 据《战友报》报道，曾与“四人帮”作过英勇斗争的北京部队某团副团长王勤同志（本报今年九月二十三日作过报道）最近给师党委、师首长写信汇报，自觉检查了自己的思想，同时，对培养和宣传典型问题提出了很好的意见。"},{"type":"paragraph","text":"王勤同志在信中，首先感谢各级党委和首长对他的关怀。接着，从理论学习、团结同志、思想改造、工作方法等六个方面检查了自己的缺点和不足。并说：“我觉得我的缺点错误很多，由于自己学习较差，认识水平低，不一定找得准确，首长和同志们可能看得更尖锐。因此，我请求首长帮助我找差距。”"},{"type":"paragraph","text":"王勤同志在信中还说：前几年我们部队出现不少典型人物和典型单位，他们都有很好的经验值得学习，但到如今没有几个站住脚的。为什么典型会垮台呢？我思考了几个原因。内因方面：典型本人缺乏自知之明，只看自己的成绩，不看自己的问题，不能一分为二地看自己，产生骄傲情绪，趾高气扬，看不起群众，觉得自己了不起，高人一等，群众很反感。这些同志躺在成绩簿上睡大觉，以为获得一点成绩能保自己一辈子，因而不再努力，不加强思想改造，头脑膨胀，忘乎所以，犯了错误，在群众中威信降低。外因方面：典型不是从群众中来，因而典型树起之后，群众不服气；领导上宣传典型，缺乏实事求是的精神，宣传过分了甚至弄虚作假，都会走向反面；典型提拔太快，有时还把典型放到能力不适应的岗位上，出了问题影响很坏；领导只是宣传典型的优点，而不批评他的缺点，甚至掩盖缺点，使典型不能一分为二地看自己。"},{"type":"paragraph","text":"王勤同志说：现在上级把我也作为一个典型了，我的压力很大。我自己要时刻注意，但也请求领导注意。爱护我的方法就是请求领导多批评我的缺点。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be795b0c14"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
