"江文"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"新乐府四首","type":"title"},{"text":"北京大学江文","type":"authors"},{"text":"（江文：北京大学中文系学生）","type":"subtitle"},{"text":"“天气好”","type":"paragraph"},{"text":"人之见面不能推心置腹交谈，动辄乱戴帽子有感而作。","type":"paragraph"},{"text":"见面欲说天气好，","type":"paragraph"},{"text":"同学数载点头交，","type":"paragraph"},{"text":"心腹岂敢坦然开，","type":"paragraph"},{"text":"祸从口出少为妙。","type":"paragraph"},{"text":"曾因斗争心胆碎，","type":"paragraph"},{"text":"更怕帽子戴得高，","type":"paragraph"},{"text":"学得三句赞美诗，","type":"paragraph"},{"text":"且换领导一声好。","type":"paragraph"},{"text":"“赠自封为特殊材料制成的人”","type":"paragraph"},{"text":"特殊材料能自封？","type":"paragraph"},{"text":"须凭事实须凭功，","type":"paragraph"},{"text":"群众巨眼识英雄，","type":"paragraph"},{"text":"自吹自擂定落空。","type":"paragraph"},{"text":"“致以维护党的利益的条件反射者”","type":"paragraph"},{"text":"一听不满暴如雷，","type":"paragraph"},{"text":"祭起帽子举起锤，","type":"paragraph"},{"text":"先查历史三十年。","type":"paragraph"},{"text":"再追祖宗到五代，","type":"paragraph"},{"text":"不问事实与根据，","type":"paragraph"},{"text":"只向教条讨救兵。","type":"paragraph"},{"text":"奉劝诸君睁开眼，","type":"paragraph"},{"text":"条件反射不能行。","type":"paragraph"},{"text":"放下架子平心气，","type":"paragraph"},{"text":"深入群众问下情。","type":"paragraph"},{"text":"“人事档案袋”","type":"paragraph"},{"text":"命运要凭祖坟定，","type":"paragraph"},{"text":"昔日曾笑太迷信，","type":"paragraph"},{"text":"如今大权满纸袋，","type":"paragraph"},{"text":"一笔一划记言行。","type":"paragraph"},{"text":"笔者赞成人事工作公开，反对人事档案，重过不重功，偏听偏信，不根据事实的作法。","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a655ed32d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
