rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志没有会见过鲁迅","authors":[],"parts":[{"type":"paragraph","text":"《书林》1982年第五期刊登唐天然的文章，认为该刊发表过的《毛泽东到八道湾会见鲁迅》等文章不符合史实。"},{"type":"paragraph","text":"文章说：从1952年开始，王士菁同志代表人民文学出版社的鲁迅著作编辑室经常和周作人打交道。有一段时间，为了注释《鲁迅日记》，几乎每周和周作人都有接触。周作人遇有记不清楚的人物或事件，经常拿出自己的旧日记来对证。1954年，有一天，周作人拿出了一本旧日记，还故意在1920年4月的一页中，夹了一张小红纸条，在4月7日的日记上这样写着：“毛泽东君来访”。后来，经周作人同意，王士菁同志把日记借回出版社，并报告了冯雪峰同志，且由冯雪峰同志通过当时一位审阅《鲁迅全集》注释工作的负责同志，向毛泽东同志面询，问周作人《日记》的记载是否真实？并问是否见到过鲁迅先生？（因为当时鲁迅和周作人共同住在八道湾十一号的住宅。）毛泽东同志答复说，他早年在北京，是会见过不少名人的，见过陈独秀，见过胡适，见过周作人，但没有见过鲁迅。对于这件事，毛泽东同志作了非常明确的答复。王士菁同志说，这些情况，当时在一起工作的同志也都知道。"},{"type":"paragraph","text":"文章说：学术研究是件严肃的工作。对于历史的考证必须持谨慎态度。毛泽东同志是我们的伟大领袖，鲁迅是中国革命史上的巨人。对于有关他们生平史实的考证，尤应慎重。当然，我们允许失误。但是，绝不容许随心所欲地编造历史。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c78cd5b49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
