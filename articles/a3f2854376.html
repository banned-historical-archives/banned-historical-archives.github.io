rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"虚心学习地方的好经验兰州部队学习毛主席著作先进人物参加地方会议收获大","authors":["慕林"],"parts":[{"type":"paragraph","text":"本报讯 兰州部队学习毛主席著作先进单位代表和个人共四十人，最近出席了西北地区学习毛主席著作先进单位和积极分子代表会议。在会上，他们认真地学习了地方上的好经验。"},{"type":"paragraph","text":"他们找出了许多差距，但最主要的是对学好毛主席著作的重要意义认识得还不深。会上陕西丹凤县的六十一岁的老太太王银琐、青海省的蒙古族姑娘增卡和兰州市的七个孩子的母亲、机关干部张惠英等，见缝插针，坚持学习毛主席著作的惊人毅力，对大家教育很深，都说：“毅力来自觉悟，为革命而学就有时间，就能坚持。”"},{"type":"paragraph","text":"会后，大家感到心明眼亮，浑身是劲。决心不骄不躁，奋勇前进，一定要把毛泽东思想真正学到手。 （慕林）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3f2854376"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
