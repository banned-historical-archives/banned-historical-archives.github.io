art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"江原道党委员长盛宴欢迎中共代表团邓小平同志等向志愿军妈妈们祝酒","authors":[],"parts":[{"type":"paragraph","text":"新华社元山20日电 朝鲜劳动党江原道委员会委员长卢龙三今天中午举行宴会，热烈欢迎由中共中央总书记邓小平率领的中国共产党代表团。"},{"type":"paragraph","text":"朝鲜劳动党中央委员会副委员长朴金哲，朝鲜劳动党江原道委员会的副委员长们，道人民委员会的领导人以及元山市党、政、军领导人也出席了宴会。"},{"type":"paragraph","text":"朝鲜国际主义战士朴在根的爱人和志愿军妈妈具富力、咸在福特意从家乡赶到元山，也出席了宴会。"},{"type":"paragraph","text":"宴会在十分热烈友好的气氛中进行。宾主为金日成同志的健康，为毛泽东主席的健康，为朝鲜劳动党中央委员会同志们的健康，为中国共产党中央委员会同志们的健康，为朝中两国、两党的永恒的牢不可破的亲密团结而干杯。"},{"type":"paragraph","text":"在宴会上，邓小平同志、康生同志、伍修权同志向朴在根的爱人和志愿军妈妈们祝了酒。"},{"type":"paragraph","text":"宴会结束后，邓小平举杯说：祝朝鲜的朴在根和中国的罗盛教所发扬的国际主义精神在中朝两国人民之中一代一代地传流。"},{"type":"paragraph","text":"宴会结束后，朴在根的爱人和志愿军妈妈具富力、咸在福向代表团赠送了礼物。咸在福在把一箱松籽赠送给代表团时说：战争时期，住在医院里的志愿军伤员同我们一起种下了一棵松树。今年这棵松树第一次结了籽。请代表团带给中国人民志愿军，把它种在中国的土地上。"},{"type":"paragraph","text":"代表团也向朴在根的爱人和志愿军妈妈具富力、咸在福赠送了礼品。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e49716f20"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
