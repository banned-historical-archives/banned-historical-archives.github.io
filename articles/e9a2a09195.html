art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远做毛主席的忠诚战士","authors":["团长谢士昌〖HH/换行〗DW：山东省军区某部"],"parts":[{"type":"paragraph","text":"红色电波传来了振奋人心的特大喜讯：党的第九次全国代表大会胜利闭幕了，以毛主席为首、林副主席为副的新的中央委员会诞生了。这是战无不胜的毛泽东思想的伟大胜利，是毛主席无产阶级革命路线的伟大胜利，是无产阶级文化大革命的伟大胜利。喜讯传来，革命战士心潮如激浪，手捧红色宝书，千遍万遍地高呼：“伟大的、光荣的、正确的中国共产党万岁！”“伟大领袖毛主席万岁！万万岁！”"},{"type":"paragraph","text":"党的第九次全国代表大会选出以毛主席为首、林副主席为副的中央委员会，实现了我们革命战士最大的心愿。新的中央委员会中，有我们党的老一辈的无产阶级革命家，有在无产阶级文化大革命中新涌现出来的无产阶级战士，有来自工农兵群众和各条战线的优秀党员，有各族的优秀的男女共产主义战士。新的中央委员会的组成，有力地表现了我们党在毛泽东思想伟大红旗下空前的朝气蓬勃，空前的革命团结。我们革命战士从心里高兴。毛主席是全党、全军和全国人民最敬爱的伟大领袖，是我们心中最红的红太阳。林副主席把毛泽东思想伟大红旗举得最高，是毛主席最好的接班人。有了以毛主席为首、林副主席为副的中央委员会的领导，我们就能从胜利走向胜利。"},{"type":"paragraph","text":"毛主席啊，毛主席！您老人家亲手缔造了我们的党，开辟了中国革命的胜利航程。您老人家在湘江岸边点燃了秋收起义的燎原烈火，在井冈山上开辟了第一个武装革命根据地，在遵义山城拨正了中国革命的航向。您老人家指挥全国人民打败了日本帝国主义强盗，捣毁了蒋家王朝，在天安门上亲自升起了第一面五星红旗。您老人家亲手点燃了无产阶级文化大革命的烈火，烧毁了以大叛徒刘少奇为代表的资产阶级司令部。您的无产阶级专政下继续革命的伟大理论，指引着我们把社会主义革命进行到底。回顾党的历史，我们更加亲切地感到您老人家的无比伟大，感到您的光辉思想的无比伟大，感到您的无产阶级革命路线的无比正确。"},{"type":"paragraph","text":"毛主席啊，毛主席！在这红旗似海、锣鼓震天的大喜日子里，曾经光荣地在您老人家身边站过岗、放过哨的警卫战士，再一次向您老人家庄严宣誓：一定以林副主席为光辉榜样，永远忠于您，永远忠于您的光辉思想，永远忠于您的无产阶级革命路线，坚决完成“九大”提出的各项战斗任务，永远紧跟您奋勇前进，永做您老人家的忠诚战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9a2a09195"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
