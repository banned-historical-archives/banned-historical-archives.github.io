art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用对比方法进行两条路线斗争教育二炮连的同志们认识到：毛主席的革命路线是为子孙万代造福的路线，是广大革命人民衷心拥护的路线，是推动历史前进的路线","authors":[],"parts":[{"type":"paragraph","text":"本报讯 无产阶级革命路线同资产阶级反动路线是针锋相对的。6916部队二炮连为了提高干部战士对两条路线斗争的认识，采取群众自己教育自己的方法，组织群众进行三比三看：一比两条路线对待革命群众的不同态度，看哪条路线是代表革命利益的；二比广大人民群众对两条路线的不同态度，看哪条路线是广大人民群众拥护的；三比两条路线的不同目的和结果，看哪条路线是合乎历史发展规律的，从而使干部战士提高了阶级斗争观念，更坚定地站在以毛主席为代表的无产阶级革命路线一边。"},{"type":"paragraph","text":"首先，他们组织大家学习了毛主席有关群众路线的论述，然后发动大家座谈资产阶级反动路线对待革命群众的态度。通过对比，使大家认识到，是相信群众，依靠群众，放手发动群众，还是压制群众，镇压革命的群众运动，是两条路线的一个根本区别。同志们说：以毛主席为代表的无产阶级革命路线，是完全依靠人民群众闹革命，为子孙万代造福的路线；而资产阶级反动路线则是替党内走资本主义道路当权派和一切牛鬼蛇神说话，把群众当成敌人的罪该万死的路线。"},{"type":"paragraph","text":"接着，他们又发动大家大摆自己所看到的、听到的和亲友来信谈到的广大人民群众对待两条路线的不同态度。副连长严声林说：“毛主席亲自制定的十六条发下后，我家整个生产队都轰动起来了，社员把以毛主席为代表的无产阶级革命路线看作是通向共产主义的指路明灯。”战士谭毓飞说：“反动路线在群众中已成了过街老鼠，人人喊打。”"},{"type":"paragraph","text":"随后，他们又组织大家学习了毛主席有关阶级和阶级斗争的论述，引导大家带着深厚的阶级感情，大谈贯彻执行毛主席的无产阶级革命路线的伟大意义，并用阶级分析方法，联系耳闻眼见的事实，大诉大摆资产阶级反动路线的危害和恶果。同志们说：“毛主席的无产阶级革命路线，是合乎历史发展规律，推动社会前进的。资产阶级反动路线，是违背历史发展规律，阻碍社会前进的。”“按照毛主席的无产阶级革命路线走，就能斗倒党内一小撮走资本主义道路的当权派，保证我们党和国家永不变色。”“不彻底批判资产阶级反动路线，就会使资本主义在我国复辟，使世界革命倒退。”"},{"type":"paragraph","text":"在认识提高的基础上，他们又召开了坚决拥护以毛主席为代表的无产阶级革命路线、彻底批判资产阶级反动路线的讲用大会。会上，同志们以无限感激的心情说：“毛主席呀毛主席！是您领导我们又一次粉碎了敌人的进攻，绕过了革命航道上的险滩。我们一定永远忠于您，永远跟您干革命！我们一定要把毛泽东思想伟大红旗高高地举起，要举一千代，一万代，要让毛泽东思想伟大红旗，在全世界每一寸土地上高高飘扬。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03538043a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
