信用社干部通报的批示","authors":[],"dates":[{"year":1963,"month":6,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央转发安徽一个关于社队随意挪用信用社资金和占用信用社干部通报的批示","type":"title"},{"text":"各中央局，各省、市、自治区党委：","type":"appellation"},{"text":"现在将安徽省委《再转发一个关于社队随意挪用信用社资金和占用信用社干部的通报》，转发给你们。","type":"paragraph"},{"text":"中央认为，信用社是群众的集体经济组织，是调剂农村资金余缺、支持农业生产、打击高利贷活动的重要工具。社队干部决不能随意挪用信用社的资金，决不能长期抽调信用社干部搞其他工作。否则，不仅会把信用社搞垮，而且还会烂掉一批干部。这个问题必须引起注意。","type":"paragraph"},{"text":"像通报中反映的情况，不仅安徽省有，其他省也可能同样存在。为此，要求你们随着农村社会主义教育运动的开展，对上述问题认真进行清理和检查，发现问题，及时抓紧解决，以保证信用社业务的正常进行。","type":"paragraph"},{"text":"此件可以发至公社和生产大队。","type":"paragraph"},{"text":" 中  央一九六三年六月二十五日","type":"paragraph"}],"comments":[],"origin":"根据中央文件原件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b759f9eb03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
