art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"翻身农奴怀念毛主席","authors":["藏族索娜"],"parts":[{"type":"paragraph","text":"默默地站在毛主席纪念堂前，"},{"type":"paragraph","text":"我思绪绵绵，"},{"type":"paragraph","text":"望一望高高的天安门城楼，"},{"type":"paragraph","text":"我泪如涌泉。"},{"type":"paragraph","text":"美好的时光您指引，"},{"type":"paragraph","text":"压顶冰山您亲自搬。"},{"type":"paragraph","text":"伟大的救星啊，毛主席，"},{"type":"paragraph","text":"翻身农奴永远把您怀念！"},{"type":"paragraph","text":"十年前那幸福的一天，"},{"type":"paragraph","text":"就在天安门城楼上边，"},{"type":"paragraph","text":"我手捧着格桑花来到您的身旁，"},{"type":"paragraph","text":"把翻身农奴的心里话向您倾谈。"},{"type":"paragraph","text":"您察看农奴主给我留下的鞭痕，"},{"type":"paragraph","text":"幸福的阳光照耀着我这高山雪莲。"},{"type":"paragraph","text":"伟大的领袖啊，毛主席，"},{"type":"paragraph","text":"翻身农奴永远把您怀念。"},{"type":"paragraph","text":"您为我们指引的道路越走越宽，"},{"type":"paragraph","text":"您为我们绘制的蓝图正在实现，"},{"type":"paragraph","text":"大庆红旗在喜马拉雅山下招展，"},{"type":"paragraph","text":"大寨红花盛开在万里高原，"},{"type":"paragraph","text":"酥油茶越打越香，"},{"type":"paragraph","text":"青稞酒越酿越甜。"},{"type":"paragraph","text":"伟大的导师啊，毛主席，"},{"type":"paragraph","text":"翻身农奴永远高举您的旗帜向前！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05d8beecce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
