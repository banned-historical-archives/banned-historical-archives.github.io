art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席在武汉参观地方工业产品展览会","authors":[],"parts":[{"type":"paragraph","text":"4月11日傍晚，细雨蒙蒙，设在东湖畔的武汉市地方工业产品展览会，灯火辉煌。这里展出了武汉市地方工业职工在大跃进中的新创造和新产品。这天晚上，展览会的职工们兴奋万状地接待了自己敬爱的领袖毛主席。"},{"type":"paragraph","text":"毛主席由中共湖北省委第一书记王任重、书记处书记张平化、武汉市委第一书记宋侃夫等陪同，首先走进了机电工业和农产品展览馆，一开头就看沼气，当毛主席看到用火柴一点，沼气灯就像六十支光的电灯一样明亮时，他高兴地笑了。毛主席仔细地看了沼气灯之后，指示说：“这要好好地推广。”"},{"type":"paragraph","text":"对一些细小的发明创造，毛主席都很关心。他看了手工业合作社生产的改良农具——五用耕种器、手推喷雾车、竹节点头喷粉器和水田除草器等。这些结构简单、效用高、价廉适用的农具，毛主席都拿到手中反复地看了一下。"},{"type":"paragraph","text":"武汉电池厂利用花生壳、棉子壳制成的空气电池灯，引起了毛主席的注意，他详细地询问了这种灯的制造方法、成本，当听到讲解员说这种灯既安全方便，又经济耐用（每小时只花一分钱），毛主席很高兴地说：“这种灯可以推广。”"},{"type":"paragraph","text":"在休息时，王任重、张平化等告诉毛主席说：“这些新产品，有很多都不是由工程师和专家发明创造的。”毛主席指示说：“要鼓励大家干。”"},{"type":"paragraph","text":"在室外，毛主席很高兴地看了万能拖拉机，接着又看了消防机器厂制造的方向云梯消防车，这个车的设计者并亲自操纵表演给毛主席看。"},{"type":"paragraph","text":"约一小时后，毛主席离开了展览会，全馆的工作人员怀着依恋的心情送别了毛主席。"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"name":"张平化","type":"人物"},{"name":"王任重","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d10a3fd1f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
