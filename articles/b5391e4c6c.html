],"dates":[{"year":1979,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"园田外相夫人宴请邓副委员长"},{"type":"paragraph","text":"宾主共赞日中友好关系不断发展"},{"type":"paragraph","text":"新华社东京四月十日电  日本外相夫人园田天光光十日代表正在美国访问的园田直外相，设晚宴招待邓颖超副委员长。"},{"type":"paragraph","text":"邓副委员长一行到达宴会厅时，受到园田夫人和应邀作陪的已故的保利茂夫人等的迎接。"},{"type":"paragraph","text":"园田夫人去年访问中国时，就同邓副委员长建立了深厚的友情，这次在东京再次相会，互相更加感到高兴和亲热。"},{"type":"paragraph","text":"晚宴上园田夫人首先祝酒。她说，周恩来总理为日本多数国民所敬爱，周总理一贯为包括日中邦交正常化在内的日中友好事业奋斗，这已为日本国民所熟知，相信邓副委员长这次访问，对日中关系的新发展将作出重大贡献。"},{"type":"paragraph","text":"邓副委员长说，邓小平副总理和夫人卓琳等访问日本的时候曾得到园田外相和天光光夫人的亲切关照，他们让我向园田外相和您表示谢意和问候。"},{"type":"paragraph","text":"邓副委员长祝酒时，对主人的盛情款待表示感谢。她说：“园田夫人去年访华，不仅促进了中日两国人民的友好关系，而且我们个人之间也建立了深厚的友谊。”"},{"type":"paragraph","text":"邓副委员长说，园田夫人刚才提到周恩来同志为中日邦交所作出的贡献，这是他应该作的。签订中日和平友好条约，是两国关系中的重大事件。这个条约是园田外相亲手签订的。园田外相既是外交家，也是政治活动家；园田夫人也既是外交家，又是政治活动家。邓副委员长表示相信，园田外相夫妇今后会对中日友好作出新的贡献。"},{"type":"paragraph","text":"园田夫人去年访华时，邓副委员长曾送给她一筐红枣，她回日本后写信给邓副委员长表示感谢。这次，邓副委员长又带来了在中国象征着吉庆的红枣，送给园田外相夫妇，表示对他们的祝福。"},{"type":"paragraph","text":"中国人大代表团副团长罗青长、林丽韫，中国驻日本大使符浩和夫人等也应邀出席了晚宴。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5391e4c6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
