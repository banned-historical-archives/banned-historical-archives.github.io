rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋总理同比兰德拉国王继续会谈比兰德拉国王应邀出席文艺晚会华国锋总理、阿沛·阿旺晋美副委员长等陪同观看演出","authors":[],"parts":[{"type":"paragraph","text":"新华社成都一九七六年六月三日电 国务院总理华国锋同尼泊尔国王比兰德拉·比尔·比克拉姆·沙阿·德瓦陛下，今天下午在成都继续举行了会谈。"},{"type":"paragraph","text":"新华社成都一九七六年六月三日电 尼泊尔国王比兰德拉·比尔·比克拉姆·沙阿·德瓦陛下及其随行人员，今天晚上应邀出席文艺晚会，观看了四川省杂技演出队演出的杂技节目。"},{"type":"paragraph","text":"陪同观看演出的有："},{"type":"paragraph","text":"国务院总理华国锋，人大常委会副委员长阿沛·阿旺晋美，外交部部长乔冠华、副部长韩念龙；"},{"type":"paragraph","text":"四川省革命委员会主任赵紫阳，成都市革命委员会副主任崔大田等。"},{"type":"paragraph","text":"当比兰德拉国王等尼泊尔贵宾由华国锋总理等陪同来到剧场时，全场起立，热烈鼓掌。"},{"type":"paragraph","text":"文艺晚会是由成都市革命委员会举办的。演出受到贵宾们的热烈欢迎。演出结束时，天幕上映出了“中尼两国人民友谊万岁”的字样。在热烈的掌声中，比兰德拉国王由华国锋总理陪同走上舞台，同演员们亲切握手，祝贺演出成功，并向他们赠送了花篮。（附照片）"},{"type":"paragraph","text":"比兰德拉国王应邀出席文艺晚会。华国锋总理、阿沛·阿旺晋美副委员长、赵紫阳主任等陪同观看演出。图为演出结束后，宾主走上舞台同演员合影。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec2b1d53a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
