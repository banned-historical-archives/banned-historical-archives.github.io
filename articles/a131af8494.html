,"dates":[{"year":1951,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者同志:"},{"type":"paragraph","text":"关于陈独秀的右倾机会主义的主要错误在那里?为什么陈独秀发展到最后叛变了革命?这两个问题是我们在学习讨论时没有搞清楚的问题，请帮助解答一下!此致敬礼!　读者　赵文"},{"type":"paragraph","text":"赵文同志:"},{"type":"paragraph","text":"陈独秀右倾机会主义路线的错误，主要表现在他没有认识到中国民主革命，已经不是旧民主主义资产阶级领导的革命了，而是新民主主义革命，是无产阶级领导的革命。正因为他没有看清这一范畴，所以他对敌我力量的估计也有了偏差，他仅仅从形式上表面上片面的机械的来看问题，没有认识到无产阶级的力量，过高的估计了资产阶级在革命中的作用；他认为现阶段中国革命既是资产阶级民主革命，就应该让资产阶级来领导。无产阶级只有在资产阶级领导的民主革命成功以后，才能起来进行无产阶级的社会主义革命，也就是所谓“二次革命论”。基于二次革命论的机会主义观点上，陈独秀在领导上造成了投降主义的错误，严重的危害了革命，而遭受到失败。"},{"type":"paragraph","text":"陈独秀右倾机会主义错误具体表现在三个问题上:第一、压制工农运动的发展，不相信农民力量，把资产阶级用来反对工农运动‘过火’的说法，搬到党内来打击正确的路线。第二、放弃对革命武装和革命政权的领导掌握，空喊重视群众运动，实际上拿防止过火来限制群众运动，号召不做“军阀官僚”，让资产阶级来掌握武装和政权向革命进攻。第三、在统一战线中不但是反对无产阶级领导革命，而且是只有团结，没有斗争，不知道资产阶级革命的两面性，结果这种取消了斗争的团结，必然变成了投降。"},{"type":"paragraph","text":"陈独秀为什么会叛变革命呢?他是一个小资产阶级出身的知识份子，加入党后，由于他在五四运动中的功劳，又是中国共产党的创始人之一，所以党一成立就被选为中央领导人。由于他没有深入的改造过思想，小资产阶级思想在被选为党的领导人以后，大肆发作了起来，拒绝无产阶级政党的思想武器——自我批评；他不肯接受组织上及同志间的一切正确的批评。在一九二七年四月党中央第五次全国代表大会上曾批评了他的错误观点，当时他在表面上承认错误，但在实际工作中不改正错误，反而右倾得更厉害了；大革命失败后的八七会议给他的批评和后来第六次全国代表大会的结论他都拒绝接受，并且和托洛斯基份子暗中勾结，在中国成立了‘托陈取消派’，叛变了革命，陷入了反革命的泥坑，因此党在一九二九年驱逐他出党了。"},{"type":"paragraph","text":"(编者)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈独秀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a131af8494"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
