script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"摧毁了黑暗诡诈的剥削  记德胜门牲畜市场整理经过","authors":[],"dates":[{"year":1950,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"摧毁了黑暗诡诈的剥削"},{"type":"paragraph","text":"记德胜门牲畜市场整理经过"},{"type":"paragraph","text":"德胜门外骡马市是北京骡马买卖集中地，郊区农民买卖牲畜都在这里。现有马店四十家，贩子、牙纪总计三百八十余人，他们均系世代相传，自幼即以“鞭杆”为生，他们代客或自行买卖。以前成交时，袖里捏手，口里黑话（如一万是“可”，二万是“门”，三万是“迷”等），用各种蒙骗、欺瞒、诡诈的办法，剥削客主（多系郊区农民）。该地曾有句俗话，说马行人“早晨挨饿，晚上骑马”，这意思是说别看他们早晨还挨着饿，只要捉住一下子，就可以赚匹马骑。北京解放后，人民政府经缜密研究，决定对此市场进行整理。经过按店业编成小组，合力经营后，当时从表面看来似已步入正规，交易员们也大喊“绝不多要佣金”，实际上，他们瞒蒙欺骗所获得的佣金，较任何市场都多。人民政府工作人员经深入群众，发现积极分子，吸取经验，渐渐了解了交易员的各种欺蒙手段，在两个月中，查出大小违章案件三十余件，分别轻重予以处罚或教育。又于十二月中旬，开了两次全体从业员大会，决定根除无限制剥削客主的现象；和保证税收不受损失。在整理期间，少数不法分子曾暗中集结同业，散布“政府要取消这个行业”等等的谣言，又要到政府去“请愿”，企图用各种方法阻碍改革，以保持他们的非法剥削。人民政府除给予教育说服外，同时积极进行市场的改进，规定买卖双方一定要在场公开讲价，佣金最高不得超过五分，此外不准以任何借口收取费用。交易员在互相监督下，一般的认识也较前提高，使市场的交易渐入正轨，不但老乡们不再吃亏，国家税收也免受损失。现在已作到：一、双方当面讲价，不再凭行中人捏手。二、牲口的残疾，由交易员当面指出，不能再用欺骗手法。三、除佣金外不得有剥削行为。四、从业人员都能兢兢业业的经营。五、市场上打架吵嘴的减少了。六、由于严格管理，经常教育，绝大多数都能彼此规劝，不犯错误。（税工通报小报）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5449e63e58"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
