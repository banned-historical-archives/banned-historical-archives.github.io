rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚持把林彪修正主义路线批深批透","authors":["战士英雄吴元明"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席亲自主持召开的党的第十次代表大会，是一次团结的大会，胜利的大会，朝气蓬勃的大会。我们驻守在西藏高原的战士欢欣鼓舞，纵情高呼：毛主席万岁！万万岁！"},{"type":"paragraph","text":"十大愤怒声讨了林彪反党集团的罪行，宣布永远开除林彪和陈伯达的党籍，这表达了全党、全军、全国人民的心愿，我们坚决拥护。我们决心继续高举革命大批判的旗帜，坚持把林彪的反革命的修正主义路线批深批透，肃清其余毒。回顾以往的斗争历程，使我深刻认识到，党内斗争是社会阶级斗争在党内的反映。林彪反党集团垮台了，但是阶级斗争还存在，党内两条路线斗争还要进行下去。帝、修、反决不甘心于他们的失败，今后，他们一定还要以各种方式、通过各种手段来破坏我们的党。我一定要提高革命警惕，用百倍的努力来保卫我们伟大的党。"},{"type":"paragraph","text":"我们热烈拥护十大通过的各项文件，一定认真学习，深刻理解。我们热烈拥护以毛主席为首的新的中央委员会，坚决在以毛主席为首的党中央的领导下，贯彻执行十大路线，完成十大提出的战斗任务。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4de47688d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
