thors":[],"dates":[{"year":1951,"month":7,"day":21}],"is_range_date":false,"parts":[{"text":"迪化各界对朝鲜停战的反应","type":"title"},{"text":"【新疆分社二十一日讯】中共迪化市委曾以朝鲜停战谈判问题分别召集各界举行座谈会，现将各界对和谈的反应综合如下：","type":"paragraph"},{"text":"(一)对于谈判的看法：多数的意见是：美帝国主义在朝鲜连遭失败，智穷力尽，妄图以谈判而获得喘息。谈判并未表示美帝放弃侵略，相反的它在谈判背后加紧进行着阴谋。因此，应深入展开抗美援朝运动，直至打倒美帝为止。部分人认为：美帝向朝鲜及我们提出谈判是向我们低头，向我们投降。他们的理由是：美帝现在已被我们打得落花流水，美帝无力进行侵略战争。部分人盲目乐观地认为：“美帝因打中、朝人民军不过想退兵，但怕面子不好看，所以提出谈判，谈判成功好退兵。”更有的认为：“现在好了，朝鲜不打仗了，爱国公约应着重提出生产问题，捐献飞机大炮用不着了。”极个别的人存在一种胆怯情绪。缺乏信心，怕谈不好战争结束无期。","type":"paragraph"},{"text":"(二)对于和谈的意见与要求：多数人拥护南日将军所提出的方案。部分人提出：“与美帝谈判时应提出台湾问题。台湾是中国的领土，占据台湾的必须撤出，将台湾交与中国。”还有人提出：“不但交出台湾，而且将蒋介石等战犯也交出来。”部分人不主张谈判，主张打。他们的理由是：“我们能打过，何必谈呢?谈不是就便宜敌人了吗？”","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年7月23日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4051db22f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
