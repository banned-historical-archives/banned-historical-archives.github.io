rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"昨日要闻简报","authors":[],"parts":[{"type":"paragraph","text":"艾地主席率印度尼西亚共产党代表团回国"},{"type":"paragraph","text":"印度尼西亚共产党中央委员会主席迪·努艾地同志和由他率领的印度尼西亚共产党代表团，结束在北京的访问，在六日上午乘专机离开北京回国，中共中央副主席周恩来、总书记邓小平，政治局委员彭真、陈毅、李先念、谭震林等同志和首都劳动人民数千人到机场欢送。当艾地同志和欢送群众亲切告别时，人们挥动手里的红旗，击鼓鸣锣，高呼“中国共产党和印度尼西亚共产党的战斗友谊万岁”、“全世界无产者和被压迫民族联合起来”等口号。欢送群众还高举着横幅标语，上面写着：“把反对美国帝国主义的斗争进行到底”、“把反对现代修正在义的斗争进行到底”、“光荣、伟大、英勇的印度尼西亚共产党万岁”。"},{"type":"paragraph","text":"彭真同志向高校应届毕业生作重要报告"},{"type":"paragraph","text":"彭真同志于七日晚向首都高等院校应届毕业生和其他学生，就当前形势，知识分子的方向和道路，以及培养革命接班人等问题作了重要报告。"},{"type":"paragraph","text":"李雪峰副委员长率人大代表团抵雅加达"},{"type":"paragraph","text":"由人大常委会副委员长李雪峰率领的中国全国人民代表大会代表团七日中午乘专机抵雅加达进行友好访问，并参加印度尼西亚宣布独立二十周年庆祝活动。印度尼西亚合作国会议长阿鲁季·卡塔威纳塔等到机场热烈欢迎。"}],"alias":""},"tags":[{"name":"李雪峰","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"783a0e34a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
