":1959,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京11日电】　毛泽东主席和周恩来总理今天下午在中南海勤政殿接见了秘鲁议员团全体成员:理卡多·阿耳卡德，阿边迪奥·阿劳乌索，豪尔赫·阿维瓦洛，卡洛斯·比索，哈辛托·卡塞罗斯。皮拉雷斯，路易斯·科罗纳多，奥古斯托·杜兰德，卡洛斯·加西亚，维克托·格瓦拉，卡洛斯·马耳皮卡，费尔南多。马尼格，尼洛·门内塞斯，埃尔内斯托。莫雷，胡安·莫列加·萨拉沙，塞萨，奥尔特加，弗洛雷斯，埃弗拉因·赖斯·卡罗，罗伯托·拉米雷斯·德比利亚，奥斯瓦耳多·雷加耳，海梅·雷·德卡斯特罗，安东尼奥·罗德里格斯·德尔巴列，维耳松·索洛古伦，爱德华多·巴列霍斯，以及随团记者:赫纳雷·卡内罗·切卡，路易斯·洛利和弗兰而斯科·米罗·格巴达。"},{"type":"paragraph","text":"接见时在座的，有中国人民外交学会会长张奚若，中国人民保卫世界和平委员会副主席廖承志，外交部副部长章汉夫等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e2856a8eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
