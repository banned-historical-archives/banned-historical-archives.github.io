script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关于辛亥革命时期的民族资产阶级问题","authors":[],"dates":[{"year":1961,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华中师范学院历史系师生最近开展了“从辛亥革命看民族资产阶级在民族解放运动中的地位与作用的讨论”。"},{"type":"paragraph","text":"关于民族资产阶级的区分问题，有人认为封建性的多少是民族资产阶级与地主阶级相区分的标准，买办性的多少才是与买办阶级相区分的标准。有人则认为买办性是划分的主要标准，但同时要注意到封建性这一因素，但不必将封建性作为标准之一提出来。"},{"type":"paragraph","text":"关于它的构成，有人不同意将大资产阶级和小资产阶级列入。因为在帝国主义侵入的条件下大资产阶级如不具买办性就大不起来。小资产阶级不代表新的生产关系，与民族资本主义的发展和帝国主义的关系都不是很直接的。只有中产阶级才是民族资产阶级的主体。也有人认为辛亥革命的大资产阶级，它与中产阶级的分化不很明显，与后来国民党统治时期的大资产阶级有所区别，当时固然有一部分有买办性的大资产阶级，也有一部分不带或少带买办性的大资产阶级，如张謇、汤寿潜就不象盛宣怀那样完全投靠帝国主义。他们在保路、保矿和商品产销竞赛上都与帝国主义有着一定的矛盾。同时认为小资产阶级中一部分小企业主、手工业工场和作场主，虽不代表新生产力，但雇用工人生产，向资本主义发展，应列入民族资产阶级。"},{"type":"paragraph","text":"关于民族资产阶级的动向，有人认为革命性与妥协性始终波浪起伏，在革命发展时期也同样表现着排斥群众，向帝国主义、封建主义妥协的一面。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfe1a45a68"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
