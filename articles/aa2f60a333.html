torical-archives/banned-historical-archives8/main/maoquanji4-1.pdf"],"article":{"title":"在中共中央政治局常委会第三十四次会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局常委会第三十四次会议上的讲话1]"},{"type":"paragraph","text":"（1927年7月4日）"},{"type":"paragraph","text":"长沙事件为何键夺唐生智政权。唐生智本欲拉我们反何，但见我们没有力量，遂拉拢何键部下打何，故唐不能打许克祥。"},{"type":"paragraph","text":"在国民革命军中有几个师和军反蒋，应促成唐生智和何键分化，拉唐反蒋。"},{"type":"paragraph","text":"三有两策略：（一）改成安抚军合法存在，此条实难办到。（二）"},{"type":"paragraph","text":"[1]本篇一是毛泽东在讨论湖南问题时讲话的一部分；本篇二是毛泽东在讨论联合唐生智反对蒋介石问题时讲话的一部分；本篇三是毛泽东关于省此外尚有两条路：（1）上山，（2）投入军队中去。上山可造成军事势力的基础。不保存武力则将来一到事变我们即无办法。"}],"authors":["毛泽东"],"dates":[{"year":1927,"month":7,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":41,"page_end":42},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa2f60a333"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
