rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我自建铂重整石油化工装置达国际先进水平为各生产部门提供了大量重要化工原料；彻底粉碎了帝国主义和修正主义的技术封锁","authors":[],"parts":[{"type":"paragraph","text":"我国完全运用自己的科学研究成果和依靠自己的技术力量建设起来的第一套铂重整石油化工联合装置，到八月二十五日为止已经安全运转了二百五十天，达到了国际上同类装置在首次开炼后长周期安全运转的先进水平。用这套装置加工出的产品，质量很好，成品合格率始终保持百分之百，主要技术经济指标也都达到和超过了国外先进水平。"},{"type":"paragraph","text":"这项新的生产技术成就，是我国职工活学活用毛泽东思想的新成果，是贯彻执行党的社会主义建设总路线和党的自力更生、奋发图强、艰苦奋斗、勤俭建国方针的新胜利。这一事实再一次向人们雄辩地说明，只要有了用毛泽东思想武装起来的人，任何困难都能战胜，任何人间奇迹都可以创造出来。"},{"type":"paragraph","text":"这套装置能够保持长期安全运转，也表明我国自行研究和设计的工艺流程是先进的，自己制造的设备和自己施工建设的工程质量是头等的，自己制造的催化剂性能是良好的，用毛泽东思想武装起来的职工队伍的技术水平也是很高的。"},{"type":"paragraph","text":"这套新型的石油化工装置投入生产以后，已经为我国国民经济各部门提供了大量的重要化工原料，彻底粉碎了帝国主义和修正主义的技术封锁。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f14a0d8674"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
