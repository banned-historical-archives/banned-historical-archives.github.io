,"dates":[{"year":1967,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海人民杂技团等单位的无产阶级革命派，高举毛泽东思想文艺大旗，创作和排演的七场大型革命杂技歌舞剧《无产阶级文化大革命万岁》，最近在市革委会大礼堂正式公演。它热烈歌颂了毛主席革命路线的伟大胜利。"},{"type":"paragraph","text":"这个革命杂技歌舞剧的创作和排练成功，是毛主席革命文艺路线的伟大胜利。长期以来，杂技艺术被资产阶级反动“权威”称为“超阶级”的“技巧的艺术”，“没有语言，没有情节，是‘无毒无害的纯技巧艺术’，不能反映生活和表现阶级斗争，不能直接为工农兵服务。”自从轰轰烈烈的无产阶级文化大革命战斗号角吹响以后，上海人民杂技团的无产阶级革命派，在毛泽东思想指引下，在革命新形势的推动下，迫切感到杂技艺术必须革命。他们反复学习毛主席“推陈出新”，“古为今用”的方针，发扬敢想敢说敢干的精神，冲破重重困难和障碍，以短短两个多月时间，在兄弟单位革命派的支持下，排练了这出表现上海人民革命斗争现实生活的杂技歌舞剧，使杂技艺术获得了新的生命力。"},{"type":"paragraph","text":"通过这次演出，他们吸取广大工农兵群众和红卫兵小将的意见，不断前进，更好地以毛泽东思想为武器，使杂技艺术成为宣传毛泽东思想的有力工具。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b37181abe7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
