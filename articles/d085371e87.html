,"authors":[],"dates":[{"year":1952,"month":1,"day":16}],"is_range_date":false,"parts":[{"text":"西安市中小学展开三反运动发生偏向","type":"title"},{"text":"【西北总分社十六日讯】陕西省级机关和西安市各界自本月七日雷厉风行地展开三反运动后，西安市许多中学和小学也同时在全体师生中开展这一运动，结果很不好。个别学校的学生把教员捆起来了，也有开除了教员的。许多小学生被迫戴上“小贪污、小浪费、小官僚主义”的帽子。西安市委书记赵伯平的两个孩子在西北保小念书，被一些同学斗争，说：“你父亲是官僚主义，你母亲是贪污分子，你两个就是小浪费分子”。昨日有关当局已下令停止了这一混乱现象，但究竟是谁发动的，现在还搞不清楚。有说是陕西省文教厅发动的，也有说是西安市文教局发动的，责任正追查中。","type":"paragraph"}],"comments":[],"origin":"1952年1月17日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d085371e87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
