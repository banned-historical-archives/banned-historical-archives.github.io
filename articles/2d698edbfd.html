tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见英国学术院代表团"},{"type":"paragraph","text":"国务院副总理邓小平十一日上午会见以英国学术院院士、应用经法学家埃立克·凯恩克劳斯爵士为团长的英国学术院代表团。会见时，邓副总理同英国朋友就我国经济建设和科学技术发展问题进行了交谈。"},{"type":"paragraph","text":"李先念副总理会见日中经济协会访华团"},{"type":"paragraph","text":"国务院副总理李先念十一日上午会见了以稻山嘉宽会长为团长的日中经济协会访华团。"},{"type":"paragraph","text":"李先念副总理同稻山嘉宽先生在谈话时都希望中日两国经济贸易关系能够不断加强，并就如何发展这一关系比较具体地进行了商谈。"},{"type":"paragraph","text":"李先念副总理会见联合国环境规划署执行主任"},{"type":"paragraph","text":"国务院副总理李先念十二日下午会见联合国环境规划署执行主任穆斯塔法·托尔巴博士及其一行。"},{"type":"paragraph","text":"宋庆龄副委员长会见并宴请西哈努克亲王和夫人"},{"type":"paragraph","text":"人大常委会副委员长宋庆龄十二日晚会见并宴请诺罗敦·西哈努克亲王和夫人。宾主进行了亲切友好的交谈。"},{"type":"paragraph","text":"中苏谈判预备会议结束"},{"type":"paragraph","text":"中苏国家关系谈判最后一次预备会议十二日在莫斯科举行。双方代表团团长和团员出席了会议。这是第五次预备会议。双方对正式谈判议程仍未达成一致意见，但双方同意结束预备会议，于下周开始举行正式谈判。在开始谈判前双方交换文件的过程中，每一方提出的问题都可以在谈判中提出来进行讨论。 （均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d698edbfd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
