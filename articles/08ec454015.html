育工作者参加讨论与批判《武训传》","authors":[],"dates":[{"year":1951,"month":5,"day":28}],"is_range_date":false,"parts":[{"text":"教育工会全国委员会 通知全国各地教育工作者参加讨论与批判《武训传》","type":"title"},{"text":"中国教育工会全国委员会于上月二十八日发出关于展开讨论《武训传》的通知。通知首先指出武训一类的故事，对教育工作者有较深的影响，批评与讨论《武训传》对教育工作者有着极重大的意义。通知号召各地教育工作者积极热烈地参加对《武训传》的批判与讨论，肃清教育工作者在这一问题上的错误思想，从而提高教育工作者的政治嗅觉与思想水平。通知最后要求各地将学习与讨论《武训传》的情况随时报告该会。","type":"paragraph"},{"text":"来源： 1951年6月5日《人民日报》。","type":"subtitle"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08ec454015"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
