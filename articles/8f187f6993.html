article":{"title":"中央组织部关于在动乱和反革命暴乱中参加非法游行等活动的预备党员转正问题的答复","dates":[{"year":1970,"month":7,"day":5}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局, 干审工作政策文件选编 (下), 1470-1493","tags":[{"name":"非法游行","type":"主题/事件"}],"parts":[{"type":"title","text":"中央组织部关于在动乱和反革命暴乱中参加非法游行等活动的预备党员转正问题的答复"},{"type":"subtitle","text":"1990年7月5日·《组工通讯》47期"},{"type":"paragraph","text":"问：在动乱和反革命暴乱中参加非法游行等活动的预备党员的转正如何处理？"},{"type":"paragraph","text":"答：各级党组织对预备期满、在动乱和反革命暴乱中参加非法游行等活动的预备党员，要按照从严治党的方针和党章规定的党员标准，严格审查其政治态度和一贯表现，正确掌握政策界限，根据不同情况，区别对待。       一、1989年5月20日北京部分地区实施戒严之前参加过非法游行、静坐、罢课等活动，起草、张贴、散发过有一般性错误的大小字报、标语、传单，或在这类大小字报、标语、传单上签过名，以及犯有其他一般性错误，经过学习、反思，检查深刻，在清查、清理工作中能够积极配合组织查清问题，主动揭发坏人坏事，一贯表现较好的，可以按期转正；平时表现一般或检查不深刻的，应延长其预备期；犯有原则性错误或拒不检查认错的，应取消其预备党员资格。"},{"type":"paragraph","text":"上述非法活动的策划者、组织者、发起者和主要骨干，一般应取消其预备党员资格。       二、1989年5月20日至6月4日平息反革命暴乱前参加了非法游行、静坐、罢课，起草、张贴、散发过有一般性错误的大小字报、标语、传单等，经过教育，检查深刻，一贯表现较好的，可延长其预备期；情节较重，或平时表现一般，或对所犯错误缺乏认识的，以及上述非法活动的策划者、组织者、发起者和主要骨干，应取消其预备党员资格。       三、1989年6月5日《中共中央、国务院吿全体共产党员和全国人民书》公布后参加非法游行等活动的预备党员，应取消其预备党员资格。个别情节较轻，对所犯错误检查认识深刻，并且一贯表现好的，可以延长其预备期。              四、公开反对四项基本原则的，应取消其预备党员资格。       五、凡书面或口头提出退党的，一律取消其预备党员资格。       六、原已延长预备期继续考察、教育的预备党员，在动乱和反革命暴乱期间犯有错误的，应取消其预备党员资格。       七、在动乱和反革命暴乱期间参加过非法游行等活动的预备党员，已经办理完转正手续的，负责办理其转正手续的党支部和党委，应对其进行一次复议（本人原所在单位党支部已不存在的，可由党委复议）。凡不符合上述精神的，应重新讨论并作出相应决定。       考虑到各地的情况有所不同，各省、区、市党委可结合本地区的实际情况，参照上述精神办理。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f187f6993"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
