script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-907","name":"中央组织部关于第二次国内革命战争期间和在这以前参加工作的干部病假期间生活待遇几个问题给国务院机关事务管理局党组的答复","author":"中央组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央组织部关于第二次国内革命战争期间和在这以前参加工作的干部病假期间生活待遇几个问题给国务院机关事务管理局党组的答复","dates":[{"year":1963,"month":8,"day":10}],"is_range_date":false,"authors":["中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 102","tags":[{"name":"待遇","type":"主题/事件"},{"name":"干部","type":"主题/事件"}],"parts":[{"type":"title","text":"中央组织部关于第二次国内革命战争期间和在这以前参加工作的干部病假期间生活待遇几个问题给国务院机关事务管理局党组的答复"},{"type":"subtitle","text":"（一九六三年八月十日）"},{"type":"paragraph","text":"你局七月十八日来文询问的关于第二次国内革命战争期间和在这以前参加工作的干部病假期间生活待遇的几个问题，现答复如下:      （一）第二次国内革命战争期间和在这以前参加工作的干部，在病假期间，原工资全部照发。      （二）对他们过去在病假期间曾经按国务院“关于国家机关工作人员病假期间生活待遇试行办法”执行了的，其原工资与病假期间生活待遇的差额，不予补发，从现在起改为工资照发。      （三）中央机关司、局长以上干部在病假期间的生活待遇，仍按一九五八年六月四日中央转发中央组织部“关于在中央一级机关中减少副职和取消部长助理职称的意见”中的规定办理。      （四）抗日战争期间及在这以后参加工作的干部（不包括中央机关司、局长以上干部），在病假期间的生活待遇，仍按国务院的规定执行。"},{"type":"paragraph","text":"（摘自《组织工作文件选编》）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16da6a9c27"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
