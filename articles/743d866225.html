art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"选举毛泽东为全国人大代表刘少奇；周恩来同样以百分之百的选票当选","authors":[],"parts":[{"type":"paragraph","text":"据新华社22日讯 毛泽东主席和他的亲密战友刘少奇委员长、周恩来总理今天被北京市第三届人民代表大会第一次会议选举为第二届全国人民代表大会代表。"},{"type":"paragraph","text":"六百八十一位代表除五十位代表因事外出或因病缺席外，其余六百三十一位代表今天都兴奋地如时进入会场。在上午九时，选举开始前，大会执行主席宣布了北京市应选的二十九名第二届全国人民代表大会代表候选人名单。这个名单是按照中华人民共和国全国人民代表大会及地方各级人民代表大会选举法的规定，由中国共产党北京市委员会和各民主党派北京市组织、北京市各人民团体共同协商联合提出，并经各代表小组的酝酿和讨论。代表们在讨论中一致认为，能够选举自己最敬爱的伟大领袖毛主席当全国人民代表大会代表，是他们最大的光荣和幸福。他们说，共产党和毛主席领导我们取得了社会主义革命和社会主义建设的伟大胜利，现在正按照社会主义建设总路线，领导我们向更幸福的日子跃进。在今天的大会上，执行主席征求了代表们对代表候选人名单的意见。最后宣布全体代表一致通过这个候选名单时，全场热烈鼓掌。"},{"type":"paragraph","text":"投票开始了。代表们怀着激动的心情，依次把选票投进票箱。在这些投票的代表中，有工业战线上技术革命的突击手，也有农业生产中的劳动模范，有创造跃进奇迹的小工厂的工人，也有商店里的售货员；有著名的作家和演员，也有普通的家庭妇女；有十八、九岁的青年，也有白发苍苍的老人。他们的心都向着毛主席，向着自己最敬爱的领袖。"},{"type":"paragraph","text":"下午七时十分，选举结果揭晓了：毛泽东主席以百分之百的选票当选为全国人民代表大会代表。毛泽东主席的亲密战友刘少奇和周恩来，同样以百分之百的选票当选为第二届全国人民代表大会代表。这时全场响起了经久不息的暴风雨般的掌声。"},{"type":"paragraph","text":"宣布选举结果以后，彭真同志代表当选的全国人民代表大会代表、市人民委员会的组成人员等讲话，他说：感谢代表们对我们的信任和委托，我们一定按照大家的委托办事，希望全体代表和全市人民进行经常的检查和监督。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"743d866225"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
