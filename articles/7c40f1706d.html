script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"新官旧势","authors":["北京大学","崔德甫"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"新官旧势","type":"title"},{"text":"北京大学崔德甫","type":"authors"},{"text":"（崔德甫：北京大学中文系学生）","type":"subtitle"},{"text":"昔有新闻发布官，今有旧闻发布官，新旧不同，官势一样。","type":"paragraph"},{"text":"余之言行，有“言行录”在，并已被拍成照片，送进了中南海，“内部参考资料”中亦暗载着，本用不着旧闻发布官们兴师动众了，然而“使其‘丰功伟绩’得以传遍燕园，历史文献得以流传后世”，为子孙作想刊了出来，则亦应感激矣！","type":"paragraph"},{"text":"程海果同学为中国少有的勇敢、坚毅、刚强之女性，污蔑不能动其心，威武不能屈其志，不独为余之朋友，且亦为广大、勇敢、正直，富有正义感的善良青年的朋友，“旧……官”诸君与之处于不同之官民等级地位，捧着“大成至圣先师”的“民可使由之，不可使知之”之愚民政策，无怪乎要之为“反”革命了，然而亦可见诸君的真形实象矣!","type":"paragraph"},{"text":"5607009(何九盈，共产党员)、108(王淑珩，前任团支委，现任小组长)、061(唐天然，前任团支委)、048(顾兰芳“非梅博士之女乃其同性弟也”)、066施光亨(前任团支书，党员)诸旧闻布官皆为余之同班同行，鉴于“见都”之艰难，捎语诸君起君等“丰功伟绩”的旧闻发布工作吧，欲转移人们向“三害”斗争的目标，已是过时的把戏！吾等唾弃歌功颂德，粉饰太平，装点门面，勿在此谄媚取宠，否则，好处落不到，反步贾府焦大之后尘。","type":"paragraph"},{"text":" 中文系  崔德甫","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c40f1706d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
