art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"李先念副总理同明托夫总理举行会谈明托夫总理瞻仰毛泽东主席遗容","authors":[],"parts":[{"type":"paragraph","text":"综合新华社讯 国务院副总理李先念同马耳他共和国总理多米尼克·明托夫四日上午举行了会谈。"},{"type":"paragraph","text":"马耳他方面参加会谈的有：总检察长埃德加·米齐博士，议员卡姆努·维拉，联邦和外交事务部常务秘书莫里斯·阿贝拉，总理办公室经济计划首席助理秘书约瑟夫·萨穆特，马耳他航空公司和海运公司董事长艾伯特·米齐，特别顾问亚力克斯·塞贝拉斯·特里戈纳博士。"},{"type":"paragraph","text":"中国方面参加会谈的有：外交部副部长韩念龙，外经部副部长魏玉明，交通部副部长彭德清，中国驻马耳他大使程之平，外贸部局长郑拓彬，外交部副司长张毅君、傅顺和。"},{"type":"paragraph","text":"四日上午，马耳他共和国总理多米尼克·明托夫及其随行人员前往毛主席纪念堂，瞻仰了毛泽东主席遗容。"},{"type":"paragraph","text":"明托夫总理在毛主席坐像前默哀，并献了花圈。花圈的白色缎带上写着：“伟大领袖毛泽东主席永垂不朽”。"},{"type":"paragraph","text":"我国外交部副部长韩念龙陪同明托夫总理前往瞻仰。"},{"type":"paragraph","text":"四日晚上，明托夫总理等马耳他贵宾出席文艺晚会，观看了舞剧《小刀会》。人大常委会副委员长阿沛·阿旺晋美等陪同观看演出。"},{"type":"paragraph","text":"图为会谈时情形。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1606aecbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
