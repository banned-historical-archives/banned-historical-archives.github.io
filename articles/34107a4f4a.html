rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"人大常委会第十四次会议开始举行叶剑英委员长主持了会议 李人俊汇报了一九七九年国民经济计划执行情况和一九八○年国民经济计划的安排","authors":[],"parts":[{"type":"paragraph","text":"新华社四月八日讯 第五届全国人民代表大会常务委员会第十四次会议今天下午开始在北京举行。"},{"type":"paragraph","text":"人大常委会委员长叶剑英主持了今天的全体会。"},{"type":"paragraph","text":"这次会议的主要议程：讨论关于一九七九年国民经济计划执行情况和一九八○年国民经济计划安排的报告，听取邓颖超副委员长关于出访几个国家的报告，关于分期分批实施刑事诉讼法规划的报告，通过关于召开第五届全国人民代表大会第三次会议的决定，讨论中华人民共和国婚姻法（修改草案）和中华人民共和国国籍法（草案），以及通过任免事项等。"},{"type":"paragraph","text":"在今天下午的全体会议上，国家计委副主任李人俊汇报了一九七九年国民经济计划执行情况和一九八○年国民经济计划的安排。"},{"type":"paragraph","text":"人大常委会副委员长宋庆龄、聂荣臻、乌兰夫、韦国清、彭真、谭震林、李井泉，邓颖超、阿沛·阿旺晋美、周建人、许德珩、胡厥文、肖劲光、朱蕴山、史良出席今天的会议。"},{"type":"paragraph","text":"国务院副总理姚依林，最高人民法院院长江华，最高人民检察院检察长黄火青，以及各省、自治区、直辖市人大常委会的负责人，列席了会议。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34107a4f4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
