ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于庐山会议简报上应一律称同志问题给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"关于庐山会议简报上应一律称同志问题给刘少奇等的信"},{"type":"paragraph","text":"（1959年8月3日）少奇、恩来、彭真、尚昆同志，各组组长同志："},{"type":"paragraph","text":"简报上对于同志的称呼不妥当，这种旧习惯应当改过来。建议：一律称某某同志。例如：主席，称毛泽东同志；总理，称周恩来同志；林总，彭总，贺总，称林彪同志，彭德怀同志，贺龙同志。其他，以此类推。如同意，请各组长在会上宣布一下。请尚昆告简报编者，一律从四日起照此改正。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月三日"},{"type":"paragraph","text":"[1]指1959年7月2日至8月16日在庐山先后举行的中共中央政治局扩大会议和八届八中全会。"},{"type":"paragraph","text":"[2]彭真，当时任中共中央政治局委员、中央书记处书记。尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"},{"type":"paragraph","text":"[3]指当时庐山会议所分各组的组长。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":254,"page_end":254},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4352d1395"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
