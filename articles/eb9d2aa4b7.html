,"authors":[],"dates":[{"year":1952,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"雅安三反中发现反革命分子阴谋暴乱","type":"title"},{"text":"【西康记者组十六日讯】雅安在“三反”中发现反革命分子进行阴谋暴乱活动。反革命分子潜入西康革大宣传队中，组成杀害干部、放火、投毒三组，并阴谋在十日举行总暴动，幸于前一日破获，主从犯十余人已逮捕。该案正在继续追查中。目前坏分子阴谋放火爆炸雅安水电厂仓库未果。自成都来的筑作工人大队八百人被反革命分子唆使，准备包围市总，幸发觉尚早，已予解决。省法院逮捕了一批奸商及贪污犯后，群众(多是白发老汉、妇女)数十人两次请愿要求释放。估计均为反革命分子所策动。","type":"paragraph"}],"comments":[],"origin":"1952年2月18日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb9d2aa4b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
