s":[],"dates":[{"year":1970,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社巴黎二十三日电　法国青年学生以及在法国的巴勒斯坦、阿拉伯、非洲学生二千人，二十一日晚在巴黎举行支持巴勒斯坦人民反对美以侵略者斗争的大会。大会热烈欢呼中国人民的伟大领袖毛主席五月二十日发表的支持世界人民反对美帝斗争的庄严声明。"},{"type":"paragraph","text":"一位代表在讲话中说，我们支持巴勒斯坦人民反对美以侵略的斗争的活动虽然遭到镇压和迫害，但是正如毛主席在声明中所指出的:“当前世界的主要倾向是革命”。因此，我们要继续开展支持巴勒斯坦人民斗争的活动。这时会场爆发了热烈的掌声，表示欢迎和拥护毛主席的这一英明论断。"},{"type":"paragraph","text":"另一位代表在讲话中热烈赞扬毛主席在声明中所阐述的伟大思想对各国人民革命斗争的鼓舞。他说，毛主席指出:“美帝国主义看起来是个庞然大物，其实是纸老虎，正在垂死挣扎。现在世界上究竟谁怕谁?不是越南人民、老挝人民、柬埔寨人民、巴勒斯坦人民、阿拉伯人民和世界各国人民怕美帝国主义，而是美帝国主义怕世界各国人民，一有风吹草动，它就惊慌失措。无数事实证明，得道多助，失道寡助。弱国能够打败强国，小国能够打败大国。小国人民只要敢于起来斗争，敢于拿起武器，掌握自己国家的命运，就一定能够战胜大国的侵略。”当这位代表读完毛主席的这段教导时，全场响起了长时间热烈的掌声和欢呼声。人们不断地高呼:“毛主席万岁!”“巴勒斯坦必胜!”"},{"type":"paragraph","text":"代表们表示坚信，只要巴勒斯坦人民和阿拉伯人民坚持持久的人民战争，在全世界革命人民的大力支持下，一定能够彻底打败美以侵略者，取得最后胜利。"},{"type":"paragraph","text":"一位代表指出，巴勒斯坦人民的武装斗争和取得的胜利表明，只有持久的人民战争，才是被压迫人民求解放的唯一道路。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb22aa122a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
