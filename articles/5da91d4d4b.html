art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底粉碎“四人帮”的帮派体系","authors":["北京部队“艰苦奋斗的二六一医院”"],"parts":[{"type":"paragraph","text":"我们纵情欢呼党的十届三中全会的胜利召开，坚决拥护全会作出的各项决议和决定。"},{"type":"paragraph","text":"在这大喜大庆的时刻，我们回首往事，心情更加激动。多年来，“四人帮”干尽坏事，罪恶累累，是披着羊皮的豺狼，是我们最凶恶的敌人。华主席继承毛主席的遗志，带领全党一举粉碎了“四人帮”，摧毁了他们阴谋篡党夺权的美梦，挽救了革命，挽救了党，为中国革命立下了不朽的功勋。粉碎“四人帮”九个多月来，华主席领导全党全军全国各族人民，满怀胜利豪情，坚决落实抓纲治国的战略决策，各行各业大干社会主义，革命和建设的热潮一浪高过一浪，形势越来越好。喜看大好形势，我们倍觉华主席英明。我们千遍万遍纵情欢呼：向英明领袖华主席致敬！"},{"type":"paragraph","text":"我们医院是遵照毛主席的教导，本着自力更生、艰苦奋斗的精神建设起来的。粉碎“四人帮”以来，我们遵照华主席抓纲治国的英明决策，深入揭批“四人帮”，大力进行传统教育，各项工作取得了新的成绩。我们决心响应三中全会的战斗号召，更加紧密地团结在以华主席为首的党中央周围，继续深入揭批“四人帮”，坚决、彻底、干净、全部地粉碎“四人帮”及其余党的资产阶级帮派体系，肃清其流毒和影响。我们全院同志决心更好地继承我党我军的光荣传统，永葆艰苦奋斗的政治本色，以实际行动迎接党的第十一次全国代表大会的胜利召开！"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5da91d4d4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
