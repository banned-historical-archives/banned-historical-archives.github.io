art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"古巴贯彻文艺为人民群众服务的方针毛主席的《讲话》受到革命文艺工作者热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"据新华社哈瓦那21日 电古巴在执行文艺为人民群众服务的方针方面取得了巨大的成就和经验。"},{"type":"paragraph","text":"自从卡斯特罗总理去年6月向古巴作家和艺术家们提出文学艺术为人民服务的政策以来，这个政策得到了革命的作家和艺术家们以及广大人民的拥护。艺术家们走出大城市，把他们的精心杰作带给全国各工厂、农村中辛勤劳动的工人和农民以及在保卫祖国最前线的士兵们。许多作家和艺术家到群众中去，同他们生活在一起，寻找创作的源泉。作家塞萨·莱安特以他参加清剿埃斯坎布赖山区反革命分子的战斗中取得的经验写成一部小说，名叫《同民兵们在一起》。"},{"type":"paragraph","text":"在作家和艺术家当中已开始了马克思主义文艺理论的学习。毛泽东的《在延安文艺座谈会上的讲话》受到了革命文艺工作者们的热烈欢迎。古巴国家印刷局在古巴第一届作家和艺术家代表大会之后把这本著作印行了二万五千册。文艺工作者们正在研读这本著作，许多文艺团体和学校正在讨论这本著作中阐述的论点。哈瓦那省文化委员会领导人洛佩斯对新华社记者说，“这本著作对我们说来很重要。它提出了同样适合于古巴情况的基本方针。”"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82fb7cfb3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
