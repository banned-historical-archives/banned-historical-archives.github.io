art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"诺沃提尼率代表团离京去朝鲜访问刘少奇等党和国家领导人到机场欢送","authors":[],"parts":[{"type":"paragraph","text":"据新华社7日讯 捷克斯洛伐克共产党中央委员会第一书记、捷克斯洛伐克共和国总统安·诺沃提尼率领的捷克斯洛伐克共和国党政代表团，今天上午乘专机离开北京，前往朝鲜民主主义人民共和国访问。"},{"type":"paragraph","text":"中共中央副主席、中华人民共和国主席刘少奇，中华人民共和国副主席宋庆龄、董必武，中共中央副主席、全国人民代表大会常务委员会委员长朱德，以及党和国家的其他领导人，都到机场欢送贵宾。"},{"type":"paragraph","text":"乐队高奏捷中两国国歌后，诺沃提尼总统由刘少奇主席陪同，检阅了陆海空三军仪仗队。全体捷克斯洛伐克贵宾接受了首都男女少先队员献给他们的鲜花。"},{"type":"paragraph","text":"捷克斯洛伐克驻中国大使布希尼亚克和各国驻华使节与外交官员，也到机场送行。"},{"type":"paragraph","text":"专程前来迎接贵宾的朝鲜民主主义人民共和国外务省副相朴光善和朝鲜驻捷克斯洛伐克大使李益焕，今天陪同代表团同机前往平壤。"},{"type":"paragraph","text":"临行前，诺沃提尼总统同刘少奇主席和我党和国家的其他领导人热烈握手道别。九时许，当贵宾们乘坐的专机徐徐起飞时，欢送的人群不断地向贵宾们挥手致意，祝他们一路顺风。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b845c7571d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
