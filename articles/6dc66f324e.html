art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“三支”“两军”不容否定","authors":["武汉部队某团“英雄红一连”"],"parts":[{"type":"paragraph","text":"在热烈庆祝文化大革命十周年的日子里，回顾“三支”、“两军”的战斗历程，我们心情十分激动。党内最大的不肯改悔的走资派邓小平否定“三支”、“两军”，把经过文化大革命锻炼的我军说得一无是处。这完全是颠倒黑白，恶毒诽谤！正如《文化大革命永放光芒》一文指出的，“我们的军队在‘三支’、‘两军’中经受了新的锻炼，为人民立了新功，更加强大。”这是对邓小平否定文化大革命、否定“三支”、“两军”的有力批判。"},{"type":"paragraph","text":"在毛主席发出“人民解放军应该支持左派广大群众”的伟大号召时，我们连干部战士热烈响应，立即走上了“三支”、“两军”第一线，先后在四个大城市、十六个点上担负着军管、军训和支工的光荣任务。大家在工厂里，与工人一起学习和批判，支持工人阶级向党内走资派夺权，实现革命大联合，抓革命，促生产；在学校里，与革命师生一道批判修正主义教育路线，改革旧的教育制度，走毛主席指引的革命道路。在斗争中，干部战士把做好“三支”、“两军”工作看作是巩固无产阶级专政的重要战斗。在担任军管任务时，连队高度分散，二人一对，三人一组，外出执勤，走遍了全国二十八个省、市、自治区，行程合计二十多万公里，经受了各种复杂斗争的锻炼，完成了任务，多次受到领导机关的表扬和奖励。"},{"type":"paragraph","text":"“三支”、“两军”是伟大领袖毛主席交给我军的光荣任务，我们执行这项任务，就是参加社会阶级斗争，就是履行人民军队无产阶级专政柱石的职责。我们从心底里欢呼：文化大革命就是好！“三支”、“两军”就是好！邓小平翻文化大革命的案，算文化大革命的帐，妄图勾销我军“三支”、“两军”的历史贡献，我们坚决不答应！坚决和他斗到底！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dc66f324e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
