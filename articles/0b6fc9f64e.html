1976,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席在《通知》里指出:“混进党里、政府里、军队里和各种文化界的资产阶级代表人物，是一批反革命的修正主义分子，一旦时机成熟，他们就会要夺取政权，由无产阶级专政变为资产阶级专政。”在反击右倾翻案风的斗争中，毛主席又指出:“搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”毛主席的这些重要指示，深刻地分析了社会主义时期阶级关系的变化和阶级斗争的特点，提出了资产阶级在共产党内的科学论断，发展了马克思列宁主义，为我们在无产阶级专政下的继续革命进一步指明了方向。"},{"type":"paragraph","text":"——摘自杂志、编辑部文章:《文化大革命永放光芒——纪念中共中央一九六六年五月十六日\u0026lt;通知\u0026gt;十周年》"}],"comments":[],"origin":"《人民日报》,《红旗》,《解放军报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b6fc9f64e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
