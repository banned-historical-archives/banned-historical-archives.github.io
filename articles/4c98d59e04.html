script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“二十世纪的人类需要象毛泽东这样的人物”","authors":["琼斯","艾克伦杜","赛业里·齐亚","辛格尔","阿列赛夫·克拉伯尔"],"dates":[{"year":1965,"month":11,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“二十世纪的人类需要象毛泽东这样的人物”"},{"type":"paragraph","text":"毛泽东值得全世界尊敬"},{"type":"paragraph","text":"毛泽东主席值得全世界尊敬，他是各国人民的朋友。毛泽东的心，不分民族、宗教信仰，向所有的人开着。他的祖国和人民对世界人民的贡献在各个角落里都表现出来了。我要向你们说，二十世纪的人类需要象毛泽东这样的人物。"},{"type":"paragraph","text":"毛里塔尼亚　赛业里·齐亚"},{"type":"paragraph","text":"他为全世界人民做好事"},{"type":"paragraph","text":"天安门广场的庆祝，跟往年一样好，盛大的庆祝游行实况广播里，有一千种乐器组成的军乐队，五十万人组成、一百二十人一列的浩浩荡荡的游行队伍在阳光下前进，我们就象亲自参加了这个庆祝大会一样，收听的时候感到分外高兴。健康的毛主席和他的各民族、各行业的人们在那里一同庆祝国庆，祝毛主席健康长寿，希望他能为全世界人民做完他正在做的好事。"},{"type":"paragraph","text":"彭真同志的讲话很好，我们很高兴地知道中国从各方面说来，都是一个好年，它的社会主义建设进行得很好。"},{"type":"paragraph","text":"澳大利亚　辛格尔"},{"type":"paragraph","text":"要是我们这里有毛泽东"},{"type":"paragraph","text":"我和我的全家还有我的朋友几乎天天在收听你们妙不可言的广播。谱成曲子的毛泽东同志的诗词真棒，这位同志是中国的歌德，只有一个具有周密的思考能力，在各方面都有条不紊地行动的人，才能领导具有古老文化的伟大的人民取得如此巨大的成就。要是我们这里有一个领导人那样象他，那么我们的祖国不论在政治或经济方面就会象一个钢铁的巨人。"},{"type":"paragraph","text":"奥地利　阿列赛夫·克拉伯尔"},{"type":"paragraph","text":"毛泽东是最伟大哲学家"},{"type":"paragraph","text":"最近我读了毛主席的诗《雪》，这首诗好极了，假使毛泽东同志是一位英国诗人，那他大大超过了莎士比亚、密尔顿、伍兹华思等英国诗人。从他的著作来看，我认为他是一位历史上最伟大的哲学家，他的实事求是地解决问题的办法和通情达理的思想吸引了我。我是一个真正的共产主义者，我热爱毛主席和我们伟大的创始人卡尔·马克思。最近我读了一本毛泽东同志的传略，从中看到了他是一位多么伟大的人物，看到了他在长征时期和他的童年所经历的艰苦。"},{"type":"paragraph","text":"英国　琼斯"},{"type":"paragraph","text":"祝中国领导人万寿无疆"},{"type":"paragraph","text":"一九四九年十月一日，中国人民从帝国主义及其追随者手中获得了解放，这是世界历史上的一件大事。人民中国的成立，在国际舞台上起了巨大的影响，对于与帝国主义斗争的被压迫的革命人民，是一个伟大的胜利，而对帝国主义和殖民主义者，是一个沉重的打击。祝中国领导人在提高中国国际地位，在与帝国主义、新老殖民主义和修正主义的斗争中，在国际工人运动和保卫世界和平的事业中，万寿无疆。"},{"type":"paragraph","text":"尼日利亚　艾克伦杜"},{"type":"paragraph","text":"（以上是北京电台听众来信）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c98d59e04"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
