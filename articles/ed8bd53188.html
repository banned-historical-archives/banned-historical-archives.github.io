"dates":[{"year":1977,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热烈庆祝党的十一大和十一届一中全会的胜利召开！"},{"type":"paragraph","text":"中国共产党第十一次全国代表大会于八月十八日下午三时举行第三次全体会议。在充分协商和酝酿的基础上，代表们以无记名投票方式选出了中国共产党第十一届中央委员会。大会一致通过了关于政治报告的决议，一致通过了新的中国共产党章程和关于修改党的章程的报告。"},{"type":"paragraph","text":"至此，党的十一次全国代表大会胜利闭幕。"},{"type":"paragraph","text":"华国锋主席，叶剑英、邓小平、李先念、汪东兴副主席投票选举中国共产党第十一届中央委员会。"},{"type":"paragraph","text":"代表们热烈鼓掌，表示坚决拥护华主席、叶副主席的报告。"},{"type":"paragraph","text":"当大会执行主席邓小平同志宣布英明领袖华国锋同志当选为中央委员会委员时，全场响起暴风雨般的热烈掌声。"},{"type":"paragraph","text":"代表们一致举手，通过了各项决议。（本版照片均为新华社记者摄）"},{"type":"paragraph","text":"代表们在热烈讨论大会文件。"},{"type":"paragraph","text":"代表们热烈鼓掌，祝贺党的十一次全国代表大会胜利闭幕。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed8bd53188"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
