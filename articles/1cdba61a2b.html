al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致董英斌电","alias":"","parts":[{"type":"paragraph","text":"致董英斌电！"},{"type":"paragraph","text":"（1935年11月26日）"},{"type":"paragraph","text":"东北军将领虽铸“九一八”大错，然而今日者固犹是食中华之粟，践中华之土。东北军之与红军，固犹属中国境内之人，何嫌何仇而自相研丧！今与贵军长约：（一）东北军不打红军，红军亦不打东北军。（二）贵军或任何其他东北军部队，凡愿抗日反蒋者，不论过去打过红军与否，红军愿与订立条约，一同打日本打蒋介石。（三）红军优待东北军官兵，不但一律不杀，且分别任职或资遣回队；负伤官兵，均照红军伤员一体医治。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":11,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":78,"page_end":78},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cdba61a2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
