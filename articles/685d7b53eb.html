thors":[],"dates":[{"year":1976,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反击右倾翻案风激发了职工的社会主义积极性"},{"type":"paragraph","text":"通化矿务局提前完成首季生产计划"},{"type":"paragraph","text":"吉林通化矿务局广大职工认真学习毛主席的重要指示，深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，进一步激发了社会主义的积极性，促进了煤炭生产的发展。全局在连续七年超额完成生产任务的基础上，今年第一季度又分别提前十天和二十九天完成了原煤生产和开拓进尺计划，各项主要经济指标也都完成得比较好。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展以后，这个局各级党组织的领导成员站在斗争的前列。全局举办了各种类型的学习班，培养理论骨干六千三百多人。广大职工积极投入战斗，在斗争中充分发挥了主力军的作用。百里矿区，井上井下，到处摆开了革命大批判的战场，斗争锋芒直指党内那个不肯改悔的走资派和他提出的“三项指示为纲”的修正主义纲领。他们以马列主义、毛泽东思想为武器，联系本局正反两方面的事实，把批判党内那个不肯改悔的走资派同批判孔孟之道、评论《水浒》结合起来，进一步认识了“三项指示为纲”这个修正主义纲领的反动实质。"},{"type":"paragraph","text":"通过学习和批判，通化矿务局的职工进一步提高了路线斗争觉悟，更自觉地贯彻执行“抓革命，促生产”的方针，决心创造革命和生产的优异成绩回击右倾翻案风。"},{"type":"paragraph","text":"（据新华社长春电）（附图片）"},{"type":"paragraph","text":"辽宁抚顺石油一厂工人、干部，认真学习马列著作和毛主席著作，以阶级斗争为纲，坚持党的基本路线，批判修正主义路线，反击右倾翻案风。"},{"type":"paragraph","text":"本报通讯员摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"685d7b53eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
