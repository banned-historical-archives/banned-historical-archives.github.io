art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"充分发挥工人阶级领导作用认真搞好斗批改","authors":["驻湖南省株洲铁路机务段某部毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"洞庭波涌连天雪，长岛人歌动地诗。"},{"type":"paragraph","text":"正当亿万军民热烈欢呼祖国山河一片红，积极投入斗、批、改的新高潮的时候，迎来了伟大领袖毛主席亲自视察华北、中南和华东地区文化大革命一周年。在毛主席一系列指示的光辉照耀下，株洲铁路机务段广大工人群众，迅速按班组实现了革命大联合，成立了革命委员会。全段呈现出一片大好革命形势。"},{"type":"paragraph","text":"当前，在无产阶级文化大革命节节胜利的凯歌声中，毛主席发出了“认真搞好斗、批、改”的最新指示。我们和革委会闻风而动，充分发挥工人阶级在文化大革命中和一切工作中的领导作用，发动广大工人群众以战无不胜的毛泽东思想为武器，狠批中国赫鲁晓夫及其代理人所推行的反革命修正主义路线，有力地推动了整党、精简机构、下放科室人员等工作的顺利进行。广大工人群众发扬彻底革命的精神，改革不合理的规章制度。过去规定只有文化水平高才能当一等司机。在斗、批、改中，我们和革委会遵照毛主席关于培养无产阶级革命事业接班人的五项条件和林副主席提出的选拔干部的三条标准，又听取工人群众的意见，打破了这个旧框框，选拔了一批工人当代理司机。广大工人群众还废除了几十种奖励制度和“工长制”。各车间、班组普遍设立了政治服务员、生产服务员、生活服务员。人人做思想政治工作，段里政治空气空前浓厚，活学活用毛主席著作的群众运动空前高涨，人们的精神面貌发生了巨大变化。革命形势越来越好，各项生产指标都节节上升。"},{"type":"paragraph","text":"在隆重纪念毛主席视察三大区一周年的时候，我们决心更高地举起毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，充分发挥工人阶级的领导作用，进一步搞好斗、批、改，全面落实毛主席一系列指示，夺取无产阶级文化大革命的全面胜利！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c938f131ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
