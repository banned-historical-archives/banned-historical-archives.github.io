<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批邓斗争是办好五·七干校的动力  天津市和平区五·七干校在反击右倾翻案风的斗争中胜利前进","authors":[],"dates":[{"year":1976,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批邓斗争是办好五·七干校的动力"},{"type":"paragraph","text":"天津市和平区五·七干校在反击右倾翻案风的斗争中胜利前进"},{"type":"paragraph","text":"在批判邓小平、反击右倾翻案风的伟大斗争中，天津市和平区五·七干校的学员，认真学习毛主席的重要指示，狠批邓小平否定社会主义新生事物，大搞复辟倒退的罪行，坚决同修正主义路线对着干。他们以阶级斗争为纲，以毛主席光辉的《五·七指示》和关于“广大干部下放劳动”的指示为指针，努力改进办校工作，使全校革命和生产出现了从未有过的新气象。目前，全校广大五·七战士，正以高昂的革命斗志，投入抗震救灾斗争。干校工作沿着毛主席的革命路线胜利前进。"},{"type":"paragraph","text":"今年年初，在市、区委的领导下，这所干校的党委学习了毛主席关于反击右倾翻案风的重要指示，联系办校工作的实际，批判邓小平反革命的修正主义路线，从发展社会主义新生事物，巩固文化大革命成果，反修防修的高度，加深了对办好五·七干校重要意义的认识。为了使五·七干校充分发挥无产阶级专政工具的作用，在斗争中培养造就大批革命战士，他们坚持把阶级斗争作为学习的主课，把批邓、反击右倾翻案风的斗争放在首位，并且相应地采取了一系列改进措施：干部轮训的期限，机关干部一年一期，基层干部半年一期；扩大了学员名额；耕地面积从一百亩扩大到七百亩；改革了校内的管理体制，精简了办校机构，吸收学员参加管理，干校工作人员轮流下队与学员一起学习、锻炼。"},{"type":"paragraph","text":"今年新学员一进干校，校党委立即组织大家认真学习，深入批邓。他们采用专题学习、专题批判的方法，组织学员刻苦攻读马、恩、列论述无产阶级专政的语录，学习毛主席关于理论问题的重要指示，学习毛主席在反击右倾翻案风中的一系列重要指示和关于社教运动的批示。学员们如饥似渴地学习，反复深入地讨论。在革命理论的指导下，全校批邓斗争的烈火越烧越旺，广大学员满怀无产阶级义愤，狠批邓小平反革命的修正主义路线，深入剖析他的反动实质。到农村插队的学员，在战三夏和搞社会调查中，坚持与贫下中农一起学习毛主席的重要指示，热烈歌颂文化大革命的伟大成果，狠批邓小平翻案复辟的罪行。"},{"type":"paragraph","text":"认真学习，深入批邓，使学员们逐步从理论与实践的结合上，加深对毛主席关于资产阶级“就在共产党内”这一科学论断的认识。大家从走资派的产生根源、阶级本质和政治特征上，看到党内确实存在着资产阶级，走资派是危害党、颠覆无产阶级专政的主要力量，同走资派作斗争是广大干部在无产阶级专政下继续革命的一项长期战斗任务。学员们在批邓斗争中深刻认识到：在社会主义时期，资产阶级法权的存在，是产生新的资产阶级分子的土壤和条件，如果不对它加以限制，就不仅革不了走资派的命，而且我们的一部分干部还可能变为新的资产阶级分子，成为走资派。所以，革命干部必须做限制资产阶级法权的促进派。有些学员还结合学习和批判，总结自己在两条路线斗争中的经验教训。一队的学员、老干部郝振亚，通过学习和批判，提高了继续革命的觉悟。他看到，自己满足于职务不低了，薪水不少了，生活不错了，滋长了贪图安逸、不求进步的情绪，正是受了修正主义路线的影响，如果不加强思想改造，就不仅不能坚持同走资派作斗争，而且自己也会变成与工农群众尖锐对立的党内资产阶级，从而提高了坚持走五·七道路，改造世界观的自觉性。学员李润兰，是文化大革命中由基层商店的服务员提拔到区委领导岗位上的青年干部，过去认为自己来自基层，有劳动人民的感情，变不了。在批邓斗争中，她认真回顾了自己到机关以后在作风上的变化，深有感触地说：“在社会主义社会中，人和人之间最本质的关系依然是阶级关系，当了干部如果不自觉限制资产阶级法权，把职权当特权，就会滋长名利思想，失去劳动人民的本色，最终必将走到群众的对立面去。”她决心做到身在机关，心想基层，职务变了，勤务员的作风永不变，誓做与党内走资派作斗争的坚强战士。"},{"type":"paragraph","text":"毛主席指出：“官僚主义者阶级与工人阶级和贫下中农是两个尖锐对立的阶级。”毛主席又指出：“管理也是社教。如果管理人员不到车间小组搞三同，拜老师学一门至几门手艺，那就一辈子会同工人阶级处于尖锐的阶级斗争状态中，最后必然要被工人阶级把他们当作资产阶级打倒。”和平区五·七干校的广大学员，反复学习毛主席的这一重要指示，深入开展批邓斗争，认识到邓小平极力强化和扩大资产阶级法权，就是妄图破坏社会主义的干群关系，培植党内资产阶级，复辟资本主义。因此，我们一定要同邓小平对着干，坚持走五·七道路。大家都自觉地在马克思主义、列宁主义、毛泽东思想的指导下，以农村广阔天地为重新学习的好课堂，以贫下中农为重新学习的好老师，在紧张、艰苦的劳动中，刻苦磨练，努力做到与工农群众划等号。劳动的汗水有力地冲刷着一些干部身上的官、暮、骄、娇四气；艰苦劳动的考验，促进了学员们思想感情的转变。在春耕和夏收中，有些学员手上打泡，肩膀压肿，腰酸腿疼，觉得又累又苦。可是同他们一起干活的贫下中农却不怕苦、不怕累，一心想着为社会主义多做贡献。为什么一起劳动，却有两种感受呢？学员们针对这个问题，查找自己在思想感情上的差距。学员李永恒说：“劳动是苦还是乐，这是个阶级感情问题。缺乏劳动人民的思想感情，劳动中就怕苦、叫苦，发展下去，就会厌恶劳动，脱离劳动，就必然要走到工农群众的对立面去，最后被工农群众打倒。”几个月下放劳动的实践，广大学员脸晒黑了，手磨粗了，与贫下中农亲了，与走资派作斗争的劲更足了。学员们的精神面貌发生了深刻变化，干校的生产面貌也焕然一新。在学员增加一倍，土地增加六倍的情况下，今年全校小麦一季就上了《纲要》，大秋作物和蔬菜长势良好。"},{"type":"paragraph","text":"唐山、丰南一带发生强烈地震后，天津市和平区五·七干校党委火速行动起来，在市、区委的领导下，组织学员和工作人员走出校门，奋勇投入抗震救灾斗争。广大五·七战士坚持以阶级斗争为纲，继续深入学习毛主席的一系列重要指示，把抗震救灾的现场，作为批邓的战场，以批邓为动力，大力做好抗震救灾工作，并决心在斗争中更好地经受锻炼和考验，改造世界观。干校党委决心在深入批邓和抗震救灾中，按照毛主席的革命路线把五·七干校办得更好。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16c85a7112"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
