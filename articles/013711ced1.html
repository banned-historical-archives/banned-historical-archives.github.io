script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"匈牙利科学院副院长福加拉希  批判卢卡奇的修正主义观点  指出修正主义是匈牙利科学界当前最危险敌人","authors":[],"dates":[{"year":1958,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"匈牙利科学院副院长福加拉希"},{"type":"paragraph","text":"批判卢卡奇的修正主义观点"},{"type":"paragraph","text":"指出修正主义是匈牙利科学界当前最危险敌人"},{"type":"paragraph","text":"新华社布达佩斯22日电　匈牙利科学院副院长福加拉希·贝洛今天在科学院举行的一次年会上说，修正主义是匈牙利科学界当前最危险的敌人。现代修正主义，特别是纳吉·伊姆雷所强调的所谓“民族特点、民族共产主义”思想，实质上是民族沙文主义加修正主义的观点。这同南斯拉夫修正主义者以民族主义观点歪曲“社会主义的不同道路”的影响有关。"},{"type":"paragraph","text":"福加拉希在今天开幕的匈牙利科学院年会上作了有关匈牙利科学领域中马克思列宁主义和修正主义的斗争的报告。他着重批判了匈牙利修正主义的代表人物卢卡奇的修正主义观点。"},{"type":"paragraph","text":"他指出，卢卡奇借口反对教条主义来宣扬修正主义。卢卡奇认为，在历史发展中，我们时代的重要矛盾不是资本主义和社会主义之间的矛盾，而是进步和反动之间的矛盾。卢卡奇停留在他的“反法西斯的民族主义”、“反法西斯的人道主义”式的“民主”的基本立场上。他用反法西斯的民主来代替社会主义。"},{"type":"paragraph","text":"福加拉希说，卢卡奇在匈牙利反革命事件时期就叫喊什么“反对斯大林主义”，但是，事实上根本不存在“斯大林主义”。卢卡奇所谓的“反对斯大林主义”，实质上是歪曲马克思列宁主义和反对运用和发展马克思列宁主义。这种突出的现代修正主义的观点，在南共纲领中到处都可以找到。"},{"type":"paragraph","text":"福加拉希指出，卢卡奇是匈牙利科学院主席团委员之一。但是他直到现在还未改变态度。"},{"type":"paragraph","text":"福加拉希还指出，在社会主义建设中，科学工作者要想作出更大的贡献，就必须精通马克思列宁主义，具备唯物辩证观点。他说，过去几年来，我们主要是反对教条主义，而当前最危险的敌人则是修正主义。"},{"type":"paragraph","text":"这次年会预计到28日结束。年会除讨论福加拉希的报告外，还将总结各部门的工作和讨论匈牙利科学事业发展的方针。"},{"type":"paragraph","text":"参加这次年会的还有各社会主义国家的科学院代表。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"013711ced1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
