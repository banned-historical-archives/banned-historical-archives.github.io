58,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蝶恋花"},{"type":"paragraph","text":"（赠李淑一）"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"我失骄杨君失柳，"},{"type":"paragraph","text":"杨柳轻飏，直上重霄九。"},{"type":"paragraph","text":"问讯吴刚何所有？"},{"type":"paragraph","text":"吴刚捧出桂花酒。"},{"type":"paragraph","text":"寂寞嫦娥舒广袖，"},{"type":"paragraph","text":"万里长空，且为忠魂舞。"},{"type":"paragraph","text":"忽报人间曾伏虎，"},{"type":"paragraph","text":"泪飞顿作倾盆雨。"},{"type":"paragraph","text":"〔编者注〕这首词是毛泽东同志在1957年5月11日写给湖南长沙第十中学语文教员李淑一同志的。词中“柳”是指李淑一同志的爱人柳直荀烈士，他是毛泽东同志的老战友，1923年加入中国共产党，曾任湖南省政府委员，湖南省农民协会秘书长，参加过南昌起义，1933年9月在湖北洪湖战役中牺牲。“骄杨”是指杨开慧烈士。她在1930年红军退出长沙后，为反动派何键杀害。她是李淑一同志的好朋友。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c60eab943"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
