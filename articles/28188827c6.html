ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"对《红旗》杂志评论员文章《无产阶级革命派联合起来》的批语","alias":"","parts":[{"type":"paragraph","text":"对《红旗》杂志评论员文章《无产阶级革命派联合起来》的批语！"},{"type":"paragraph","text":"（1967年1月14日）伯达同志："},{"type":"paragraph","text":"写得很好。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十四日"},{"type":"paragraph","text":"[1]这个批语写在中共中央政治局常委、中央文化革命小组组长、《红旗》杂志总编辑陈伯达1967年1月14日送审的这篇文稿上。陈伯达送审时在文稿上写有：“王力和关锋两同志给《红旗》写了一篇评论，请顺阅！”王力、关锋，当时均任中共中央文化革命小组组员、《红旗》杂志副总编辑。《无产阶级革命派联合起来》一文，后以本刊评论员的名义在1967年1月16日出版的《红旗》杂志第二期上发表。这篇文章中引用了毛泽东的一段话：“从党内一小走资本主义道路当权派手里夺权，是在无产阶级专政条件下，一个阶级推翻一个阶级的革命，即无产阶级消灭资产阶级的革命。”"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":272,"page_end":272},"tags":[{"name":"陈伯达","type":"人物"},{"name":"关锋","type":"人物"},{"name":"王力","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28188827c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
