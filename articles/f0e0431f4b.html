art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用实际行动悼念毛主席","authors":[],"parts":[{"type":"paragraph","text":"连日来，新疆军区巴音郭楞军分区指战员，怀着极其沉痛的心情悼念伟大领袖和导师毛主席逝世。从军分区党委到连队班排，指战员们一致表示，一定要按照党中央的要求，化悲痛为力量，努力学习马列主义、毛泽东思想，以阶级斗争为纲，坚持党的基本路线，加强党的一元化领导，维护党的团结和统一，更加紧密地团结在党中央周围，加强战备，防止敌人突然袭击，用实际行动捍卫毛主席的革命路线，巩固无产阶级专政。"},{"type":"paragraph","text":"正在军分区参加集训的县、公社的人民武装干部们，满怀对毛主席的无产阶级深情，回忆了自己的成长史，回忆了本地区在学大寨运动中发生的变化。他们深切地感到，自己的成长，本地区的变化，都是在毛主席革命路线的指引下取得的。我们一定要继承毛主席的遗志，努力学习，做好工作。库尔勒县英霞公社武装干事买买提哈斯木同志表示，我们一定要继承毛主席的遗志，努力学习毛主席的人民战争思想，加强民兵建设，把民兵建设成为一支对外反侵略、对内反复辟的武装力量。正在军分区政治部参加学习的理论骨干们，联系当前深入开展的批邓、反击右倾翻案风的斗争，一致指出，毛主席提出的资产阶级“就在共产党内”的科学论断，丰富了马克思主义的理论宝库，给我们指明了反修防修的方向。战士彭文中说，毛主席把前进道路上的坚冰打破，把革命航线开通。我们一定要继承毛主席的遗志，努力学习马列著作和毛主席著作，增强识别真假马克思主义的能力，把邓小平授意炮制的《论总纲》、《汇报提纲》和《条例》三株大毒草批深批透，把批邓、反击右倾翻案风的斗争进行到底。担任战备值班任务的二连指战员们说，毛主席和我们永别了，在这沉痛的时刻，我们一定要继承毛主席的遗志，坚决贯彻执行毛主席的建军路线，加强军队建设，加强民兵建设，提高警惕，随时准备歼灭一切敢于入侵之敌。"},{"type":"paragraph","text":"本报通讯员"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0e0431f4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
