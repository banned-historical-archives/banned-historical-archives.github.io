script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"锡《劳工报》驳现代修正主义所谓帝国主义本性已改变的谬论帝国主义者的侵略活动越来越残暴 亚非拉人民民族解放斗争如火燎原","authors":[],"dates":[{"year":1964,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社科伦坡8日电】　锡兰共产党的僧伽罗文周刊《劳工报》六日发表社论，驳斥现代修正主义者宣扬所谓帝国主义本性已经改变的谬论。"},{"type":"paragraph","text":"社论说:“以美国为首的帝国主义者正通过干涉各国内政，加紧进行侵略和反对世界上一些国家的民族独立运动。最近他们在老挝、柬埔寨、南朝鲜、古巴和其他国家所犯下的罪行，十分清楚地证明了这一点。”"},{"type":"paragraph","text":"“谁也说不上古巴什么时候会受到在美帝国主义者唆使下进行的攻击。南越军队侵入柬埔寨的领土。美国国务卿腊斯克扬言要对北越进行直接侵略。美国第七舰队在印度洋巡航。这些事实证明，修正主义者说什么帝国主义的本性已经改变，是骗人的。显然，帝国主义者正在加紧进行侵略活动。”"},{"type":"paragraph","text":"社论说:“这些地区的人民不准备牺牲自己的权利，卑躬屈膝地生活在修正主义者所宣扬的所谓和平共处之下。”"},{"type":"paragraph","text":"它说:“一方面，帝国主义在世界革命风暴的中心一一亚洲、非洲和拉丁美洲国家——的侵略越来越残暴，另一方面，反对侵略的群众性斗争正象野火般在整个地区蔓延开来。”"},{"type":"paragraph","text":"社论最后说，“拯救被压迫人民的办法，在于走民族解放斗争的道路，这将从地球上消灭帝国主义，而不是走那种要求人民相信帝国主义的共处的道路。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"146c4661a2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
