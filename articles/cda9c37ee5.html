:1976,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　奉贤县县、社两级商业部门抓批邓斗争，促支农工作。县级批发部门及早抢运“三抢”农用物资。最近除狠抓化肥、农药等物资抢运外，同时供应小农具，努力解决农村对扁担、砂砧、扫帚等物资的需要。五金交电战线除了抓紧调运下拨油类、电料、农机配件以外，还大力开展修旧利废、自修自用工作，支援农业机械化。县百货公司组织供应农用袱单布三万六千五百米，支持生产队颗粒归仓夺丰收。医药供应部门提前把九个品种三万一千七百八十瓶药物送下乡，支持农村“三抢”大忙季节防病治病的需要。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cda9c37ee5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
