":[],"dates":[{"year":1981,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"肃清左倾思想影响，提高对生产责任制认识"},{"type":"paragraph","text":"江苏冬训农村党员和干部"},{"type":"paragraph","text":"据新华社南京1月26日电  以学习、贯彻中央关于加强和完善农业生产责任制的文件为主要内容，江苏省对200万农村党员和基层干部实行冬季轮训。"},{"type":"paragraph","text":"这次冬训，各地普遍采取总结历史经验和运用典型对比等方法，提高干部、党员对生产责任制的认识，帮助他们进一步肃清“左”倾思想影响。金坛县薛埠公社东进大队，去年十个生产队搞联产计酬责任制，年终队队增产，有两个队未搞，都减了产。这些地方的冬训班运用事实进行对比教育之后，效果很好。有的地方还通过搞不同形式责任制的典型介绍，让大家权衡利弊，作出适合本地实际情况的选择。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52d5a30558"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
