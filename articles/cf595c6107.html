建国会","章乃器"],"dates":[{"year":1957,"month":5,"day":25}],"is_range_date":false,"parts":[{"text":"致上海黄苗夫函","type":"title"},{"text":"中国民主建国会章乃器","type":"authors"},{"text":"（章乃器：国务院粮食部部长，民主建国会副主任委员）","type":"subtitle"},{"text":"黄苗夫同志：","type":"paragraph"},{"text":"两次鸣文，都详细读了，十分同情你的遭遇，全力支持你彻底地鸣，彻底地放，这正是对于党的方针的信任，党希望大家这样做，如党中央的指示所说的，有少数党员像国民党，这些人如不彻底改造，对人民国家和党都是不利的，所以帮助整风，就是爱党爱国家，爱人民，要用“团结——批评——团结”的方式，把整风运动进行到底，将来如有人敢对于你打击报复，我一定尽绵薄为你撑腰。一般说来，错误是怕太阳的，所以，揭发总比不揭发好，但也不能认为一次整风就把歪风全部整掉了，企图乘机报复的人，还是会有的，但绝不可怕，致敬礼!","type":"paragraph"},{"text":" 章乃器  五·二十五","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf595c6107"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
