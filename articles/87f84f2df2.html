script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"空军某独立团党委制订措施切实抓好学习  努力搞清楚对资产阶级专政问题","authors":[],"dates":[{"year":1975,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"空军某独立团党委制订措施切实抓好学习"},{"type":"paragraph","text":"努力搞清楚对资产阶级专政问题"},{"type":"paragraph","text":"据新华社讯　人民解放军空军某独立团党委成员在认真抓好自身学习的同时，带领广大指战员认真学习毛主席关于理论问题的重要指示，使全团迅速掀起了群众性的学习热潮。"},{"type":"paragraph","text":"《人民日报》社论传达了毛主席关于理论问题的重要指示以后，这个团的党委“一班人”立即分头深入基层，和干部战士一起学习毛主席的指示，学习马克思主义关于无产阶级专政的理论，一起批判林彪攻击无产阶级专政、妄图复辟资本主义的罪行，努力从理论上搞清楚对资产阶级专政的问题。为了使干部战士学好无产阶级专政的理论，团党委“一班人”深入部队通过调查研究，制订了以下几项措施："},{"type":"paragraph","text":"（一）进行思想动员，不断提高干部战士对学习毛主席关于理论问题重要指示的重大意义的认识，增强学习的自觉性。"},{"type":"paragraph","text":"（二）举办干部学习班，抓好各级党委、支部成员的学习。他们先后两次举办干部学习班，党委成员用自己的学习体会给大家作辅导。在学习中，有的同志对社会主义国家还存在着生产关系和生产力之间、上层建筑和经济基础之间又相适应又相矛盾的问题理解不深。党委成员高远首先引导大家学习毛主席的光辉著作《关于正确处理人民内部矛盾的问题》，然后用自己的学习体会，对大家进行辅导，使大家进一步加深了对毛主席关于理论问题的重要指示的理解。"},{"type":"paragraph","text":"（三）引导干部战士把学习毛主席的重要指示同开展革命大批判结合起来。例如，在认识无产阶级专政的重要性和必要性时，引导大家学习革命导师关于加强无产阶级专政的论述，批判林彪恶毒攻击无产阶级专政的谬论。"},{"type":"paragraph","text":"（四）搞好调查研究。他们先后派出七个调查组，调查研究社会上两个阶级、两条道路、两条路线斗争的情况，并结合分析调查的材料进行学习，使大家加深了对毛主席关于理论问题的重要指示的理解。"},{"type":"paragraph","text":"这个团的党委采取这些措施，使全团迅速出现了学习毛主席重要指示的热潮。指战员们决心认真学好和运用无产阶级专政的理论，进一步搞好部队建设，使我军更好地为巩固无产阶级专政而斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87f84f2df2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
