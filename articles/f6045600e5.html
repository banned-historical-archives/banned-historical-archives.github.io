script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大家都来关心大学生寒假生活教卫党委要求高校组织学生学好文件，提高抵制资产阶级自由化思潮的能力","authors":[],"dates":[{"year":1987,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　中共上海市教卫党委日前向本市各高校发出《关于做好今年寒假学生工作的意见》，要求各校在寒假中继续做好学生的思想教育工作，组织他们学好文件，认清形势，提高认识和抵制资产阶级自由化思潮的能力；同时还要积极安排好他们的寒假生活。"},{"type":"paragraph","text":"教卫党委提出，各校要争取全社会的关心和支持，共同抓好对学生的思想教育工作。各高校可向学生家长发信，希望家长按中央有关指示和中央报刊有关社论、评论员文章的精神，协助学校共同做好学生的思想教育工作。班主任、辅导员和一部分指导教师要在寒假中对上海的学生进行家访。"},{"type":"paragraph","text":"各高校应在放假前将《人民日报》有关社论和评论员文章发给学生，要求学生在寒假中认真学习。在放假后或开学前，各高校要认真搞好干部、党员教师和学生骨干的培训工作，组织他们认真学习文件，联系方励之等极少数人的一些言论进行讨论，分清是非，旗帜鲜明地批判资产阶级自由化思潮。"},{"type":"paragraph","text":"《意见》还要求各校积极创造条件，认真安排好社会实践活动和丰富多采的文化生活。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6045600e5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
