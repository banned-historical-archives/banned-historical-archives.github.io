":[],"dates":[{"year":1958,"month":4,"day":25}],"is_range_date":false,"parts":[{"text":"毛泽东给周恩来等的信","type":"title"},{"text":"恩来、陈云、德怀、富春、一波同志：","type":"appellation"},{"text":"想在这几天内谈一下工业问题，除富春已答应来此以外，你们几位是否有时间，是否愿意来此谈一下。如果可以来的话，请于廿五日或廿六日南来。又想邀王鹤寿，彭涛，滕代远，张霖之(煤炭部长)，刘澜波，石油部长余秋里，地质部刘景范，水利部李葆华来此一谈，并请带李锐同志一道来。最好本(廿五日)日动身，以便开四天会，卅日回去，五月一日站天安门。如何，请酌复。或者今日到长沙，明日上午到此。","type":"paragraph"},{"text":" 毛泽东四月廿五日上午六时","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5663185be7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
