rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在集中营学习和宣传毛泽东思想冲破敌人重重封锁，张贴毛主席语录和标语，同敌人展开针锋相对的斗争，终于取得了胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社一日讯 据沙捞越报纸报道，被拉赫曼——拉扎克傀儡集团长期关禁在古晋集中营的沙捞越政治犯，以不屈不挠的革命精神，冲破敌人的重重封锁和限制，在集中营里开展了学习和宣传毛泽东思想的活动，并勇敢地同敌人展开针锋相对的斗争，取得了胜利。"},{"type":"paragraph","text":"报道说，二月初，当政治犯在集中营里张贴毛主席语录和标语，举行集会时，遭到了法西斯当局的残暴镇压，政治犯们不畏强暴，英勇地同敌人进行了针锋相对的斗争。随后，约三百名政治犯举行集体绝食斗争，强烈抗议法西斯当局对他们的野蛮迫害。"},{"type":"paragraph","text":"政治犯们经过无比顽强的斗争，终于取得了胜利，并已于二月二十七日结束了历时十八天的绝食斗争。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"584d1cad15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
