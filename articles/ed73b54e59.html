ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"毛泽东等祝贺勃列日涅夫和柯西金任职的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺勃列日涅夫"},{"type":"paragraph","text":"和柯西金任职的电报"},{"type":"paragraph","text":"（1964年10月16日）莫斯科苏联共产党中央委员会第一书记列·伊·勃列日涅夫同志，苏联最高苏维埃主席团主席阿·伊·米高扬同志，苏联部长会议主席阿·尼·柯西金同志："},{"type":"paragraph","text":"得悉勃列日涅夫同志当选为苏共中央第一书记，柯西金同志被任命为部长会议主席，我们代表中国人民、中国共产党和中国政府，向你们表示热烈的祝贺。"},{"type":"paragraph","text":"我们衷心地希望，兄弟的苏联人民，在苏联共产党和苏联政府的领导下，在今后各方面的建设工作中和维护世界和平的斗争中，取得新的成就。"},{"type":"paragraph","text":"中国共产党、中国政府和中国人民对于伟大的苏联、苏联共产党和苏联人民在前进道路上的每一个进展，都是高兴的。最近苏联“上升”号宇宙飞船的成功发射和顺利着陆，是苏联劳动人民的又一项伟大成就。我们愿意借此机会向你们，并且通过你们，向伟大的苏联人民，表示衷心的庆贺。"},{"type":"paragraph","text":"中苏两党、两国在马克思列宁主义和无产阶级国际主义的基础上团结起来！毛泽东全集第四十七卷"},{"type":"paragraph","text":"祝中苏两国人民兄弟的牢不可破的友谊不断发展！"},{"type":"paragraph","text":"祝中苏两国人民在反对以美国为首的帝国主义、保卫世界和平的共同斗争中不断取得胜利！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六四年十月十六日于北京"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":10,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":201,"page_end":202},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed73b54e59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
