rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理离开仰光回国吴奈温总统、山友将军、吴貌貌卡总理等和数万群众热烈欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社仰光一九七八年一月三十一日电 中华人民共和国国务院副总理邓小平圆满结束了对缅甸的六天正式友好访问，一月三十一日上午乘专机离开仰光回国。缅甸领导人和仰光数万名群众热烈欢送。"},{"type":"paragraph","text":"缅甸总统兼国务委员会主席吴奈温、国务委员会秘书山友将军、总理吴貌貌卡、国务委员会委员吴当基、外长吴拉蓬以及其他国务委员和政委部长都到机场送行。"},{"type":"paragraph","text":"今天清晨开始，大批仰光市民、青年学生、职工就陆续聚集到从宾馆通向机场的道路两旁。当邓副总理的车队经过时，群众高呼中缅友好的口号，情绪热烈。邓副总理再三向前来欢送的群众招手致意。"},{"type":"paragraph","text":"当邓小平副总理到达机场时，吴奈温总统等缅甸领导人走到坐车旁迎接。在机场举行了隆重的欢送仪式。吴奈温总统陪同邓副总理一起走在红地毯上，一直送到飞机旁，握手告别。邓小平副总理对在访问期间受到的盛情款待，向吴奈温总统再次表示感谢。吴奈温总统请邓小平副总理转达他对华国锋主席和总理、叶剑英副主席、李先念副总理和邓颖超副委员长的问候。到机场欢送的还有中国驻缅甸大使莫燕忠和大使馆全体外交官员以及中国援缅技术人员的代表和留学生。各国驻缅甸外交使节也到机场送行。"},{"type":"paragraph","text":"邓副总理的随行人员、外交部副部长韩念龙等同志离仰光回国。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6be97ffedd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
