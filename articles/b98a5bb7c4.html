<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市园林工人狠批修正主义园林路线把园林绿化和种植中草药结合起来","authors":[],"dates":[{"year":1971,"month":12,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市广大园林工人在毛主席关于“备战、备荒、为人民”的伟大战略方针指引下，充分利用公园、苗圃的零星土地，积极种植中草药，把园林绿化和种植中草药结合起来，一年来已收集各种药材达四万二千多斤。园林种植中草药后，既美化了园林面貌，又为社会提供了一部分药源。"},{"type":"paragraph","text":"今年以来，全市许多公园、苗圃学习了闸北公园园林工人利用树坛、花坛种植中草药的经验，蓬蓬勃勃地开展了种植中草药的活动，市园林管理处革委会还专门召开了园林种植中草药的经验交流会，进一步推动了这方面的工作。"},{"type":"paragraph","text":"在无产阶级文化大革命前，叛徒、内奸、工贼刘少奇及其在上海的代理人大肆鼓吹“观赏第一”等封、资、修黑货，妄图把公园变成资产阶级老爷、太太、少爷、小姐消遣玩乐的场所。在种植中草药的过程中，园林工人狠批了修正主义园林路线，大家认识到，利用公园、苗圃零星土地种植中草药，为社会增加药源，为工农兵服务，符合毛主席关于“发展多种经营”的方针，是园林斗、批、改工作的一个重要方面。大家表示，一定要克服困难，把种植中草药的工作搞好。静安区园林所的蓬场庙苗圃，是一个只有三个人十多亩地的小苗圃，苗圃工人在苗圃中间种草药，把育苗和种药结合起来。他们在有关草药店看到垂盆草不能满足工农兵病员的需要时，就把种植垂盆草面积由一分地扩大到三亩六分，一年来已为工农兵病员提供了三千多斤垂盆草。闸北公园今年收集的各种药材比去年增加了一倍左右，并向其它公园及周围的工厂、学校和公社提供了不少中草药种苗和种子，同时还交流了种植中草药的技术。"},{"type":"paragraph","text":"不少园林还与附近学校挂钩，学生们在园林工人的带领下，开展采集、种植和管理中草药等活动，使园林成为革命师生学医和搞科学实验活动的基地之一，支持了教育革命。"},{"type":"paragraph","text":"实践证明，公园、苗圃合理种植中草药，不但不会影响原来的园林面貌，反而使公园更整齐美观。据市园林管理处初步调查，园林中有四十多种花卉可以作为药材，如把这些花卉种植得当，既可观赏，又提供了药材资源。西郊公园等单位在树坛周围种上了每年开花一次的铁扁担，开花季节，很受观众的欢迎。公园土地暴露部分种上中草药后，又可以不使尘土飞扬，保持园内空气新鲜。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b98a5bb7c4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
