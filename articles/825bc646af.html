art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"江青；姚文元；李先念；李德生；王洪文；王猛；乔冠华等会见美国客人","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年六月十九日讯 我国领导人江青、姚文元、李先念、李德生、王洪文，以及国家体委主任王猛、外交部副部长乔冠华，今天晚上会见了戴维·德奇和夫人以及以他为总领队的美国大学生男子篮球联队和美国内布拉斯加州肯尼迪学院爱国女子篮球队的部分成员，吉姆·高夫伦和以他为领队的美国游泳、跳水队的部分成员，同他们进行了友好的谈话。"},{"type":"paragraph","text":"参加会见的美国男、女篮球队的成员有：艾尔弗雷德·哈丁、唐纳德·克莱因、查尔斯·康斯坦斯·狄洛。"},{"type":"paragraph","text":"参加会见的美国游泳、跳水队的成员有：艾尔·舍恩菲尔德和夫人、理查德·威廉斯、托马斯·伯恩斯泰因、英格里德·达兰。"},{"type":"paragraph","text":"美国驻中国联络处主任布鲁斯和联络处官员普拉特也参加了会见。"},{"type":"paragraph","text":"参加会见的我有关部门负责人有：李梦华、章文晋、董守义、林平、牟作云、张希让、王拓、郭雷。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"李德生","type":"人物"},{"name":"李先念","type":"人物"},{"name":"乔冠华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"825bc646af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
