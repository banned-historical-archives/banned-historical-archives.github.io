ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给李敏的信","alias":"","parts":[{"type":"paragraph","text":"给季敏的信"},{"type":"paragraph","text":"（1949年）娇娇："},{"type":"paragraph","text":"看到了你的来信很高兴。"},{"type":"paragraph","text":"你是我亲生女儿，我是你的亲生父亲。你去苏联十多年一直未见过面，你一定长大了长高了吧？爸爸想念你，也很喜欢你，希望快快回到爸爸身边来。爸爸已请贺怡同志专程去东北接你了，爸爸欢迎你来。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]李敏是毛泽东与贺子珍的女儿，小名叫“姣姣”，又叫“娇娇”。毛泽东给女儿李敏写的这封信用的便是“娇娇”。"},{"type":"paragraph","text":"[2]贺怡，江西省吉安市永新县人，毛泽东三弟毛泽覃之妻、贺子珍的胞妹。"}],"authors":["毛泽东"],"dates":[{"year":1949}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":114,"page_end":114},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e8902c02e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
