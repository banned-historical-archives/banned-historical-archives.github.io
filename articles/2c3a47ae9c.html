<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“昔孟母，择邻处”。《三字经》用孟母三迁的故事宣扬“万般皆下品，惟有读书高”的反动思想，是为了培养骑在劳动人民头上的剥削阶级接班人。原来——“择邻”是为了“教子读经”","authors":[],"dates":[{"year":1974,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海硫酸厂工人理论小组"},{"type":"paragraph","text":"《三字经》上有这样两句话:“昔孟母，择邻处”，说的是孔家店二老板孟轲小时不好好读书，孟轲的母亲就三次搬家择邻，最后搬到儒生们读经诵诗的学堂旁，用这样的环境来影响感化孟轲。果然，孟轲没有辜负他母亲的一片苦心，终于成了儒家的“亚圣”。“孟母择邻”的故事也就成为儒家的美谈，并把它塞进《三字经》，大肆加以宣扬。"},{"type":"paragraph","text":"怎样教育和培养下一代?不同的阶级有不同的回答。一切剥削阶级出于他们的阶级本性，都极端鄙视工农。两千多年前的孔老二不是破口大骂想学种菜和种田的樊迟是“小人”吗?在他们看来，种田是没出息的，免不了要饿肚子，而读书则可以升官发财。孔丘说:“耕也，馁在其中矣；学也，禄在其中矣。”这充分暴露了他鄙视生产劳动的丑恶嘴脸。"},{"type":"paragraph","text":"孟母择邻三迁，就是极端仇视劳动和劳动人民，她从反动阶级的本性出发，甚至用割断布机上正在织的布来教训儿子奋发读经，目的就是要她的儿子成为一个“治人”的“劳心者”，以培养儒家的忠实信徒，培养反动统治阶级的忠实奴才。"},{"type":"paragraph","text":"《三字经》大肆宣扬孟母择邻的故事，就是鼓吹“万般皆下品，惟有读书高”的反动思想，推行一条孔孟的“学而优则仕”的教育路线，培养一批脱离劳动人民、脱离实践、“四体不勤，五谷不分”的寄生虫，成为骑在劳动人民头上作威作福的精神贵族。"},{"type":"paragraph","text":"林彪站在剥削阶级的反动立场上，接过孔孟的这一套破烂货，恶毒诬蔑劳动人民和三大革命运动的实践，疯狂攻击知识青年上山下乡，竭力鼓吹“读书做官”的谬论，念念不忘教子尊孔读经，要他的儿子学习孔老二的“韦编三绝的治学精神”，要子女懂得“君子”和“小人”之分，学习“君子”，远离“小人”，以“天才”和“超天才”的身份骑在劳动人民头上。他还挖空心思地把奴隶主头子周文王临死前对武王传授的统治经验作为“教子经”，抄录给他儿子，梦想建立世袭相传的林家法西斯王朝。这是白日做梦，永远办不到。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c3a47ae9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
