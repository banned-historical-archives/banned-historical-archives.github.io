" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"四纵速至张家口西面办同华北第三兵团培弃逃敌","alias":"","parts":[{"type":"paragraph","text":"四纵速至张家口西面协同华北第三兵团堵歼逃敌"},{"type":"paragraph","text":"（1948年12月18日）林、罗、刘，并告杨、李，杨、罗、耿："},{"type":"paragraph","text":"（一）杨李亥电称，归绥3敌人现正东进，准备至集宁、丰镇接应张家口敌人西逃，张家口敌人正在准备动作等语。（二）请林罗刘令四纵主力速即西进，以最快速度到达张家口西面，协同杨李堵歼可能逃跑之敌。（三）请杨李令姚纵骑旅速回绥?东堵敌。（四)请杨李考虑可否从张垣?东面我军抽出一部加强西面防堵。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十八日八时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]杨、李，指杨成武、李天焕，当时分别任华北军区第三兵团司令员和副政治委员兼政治部主任。杨、罗、耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[3]归绥，旧市名，即今内蒙古呼和浩特。[4]姚纵，指绥蒙军区第八纵队，纵队司令员姚喆。[5]绥，指绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":424,"page_end":424},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20d775ecd5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
