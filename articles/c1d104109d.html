script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"争取生存权利　反抗压迫剥削拉丁美洲工农群众不断开展斗争厄瓜多尔学生运动席卷全国十多个大中城市","authors":[],"dates":[{"year":1969,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十三日电　拉丁美洲一些国家的工人、农民和学生近日来不断开展争取生存权利和反迫害的斗争。"},{"type":"paragraph","text":"智利利纳雷斯省八十个庄园的两千多名农业工人，二十日起举行不定期罢工，要求提高工资和改善生活条件。同一天，智利南部卡内特城附近少数民族马普奇族的三十名农民，用武力占领了他们在那里劳动的一个庄园。他们谴责庄园主把马普奇族农民当做奴隶使唤，对他们进行残酷的剥削。"},{"type":"paragraph","text":"在厄瓜多尔第一大城市瓜亚基尔城，从十五日起，学生们多次举行示威游行和罢课斗争，抗议当局无理封闭博尔哈·拉瓦因中学和警察对学生的武力镇压，要求教育部长辞职。二十日，学生们不顾警察的野蛮镇压，再次上街举行示威游行，并且封锁了一个警察局前面的街道，向前来镇压的警察投掷爆炸物和石块，打伤了一名反动警察。"},{"type":"paragraph","text":"秘鲁胡宁省省会万卡纳城将近两千名学生，十四日举行了一次抗议示威进军，要求当局为学生提供上学的交通便利，学生们不畏强暴，与军警展开了搏斗。学生们的家长参加了这次斗争。"},{"type":"paragraph","text":"秘鲁拔佳一里马克制鞋厂的一千名制鞋工人，从本月五日起举行了不定期罢工。利马市维多利亚区的七百多名市政工人从十四日起举行不定期的罢工，要求增加工资。"},{"type":"paragraph","text":"阿根廷门多萨省五千三百四十名教师十六日举行罢教，要求改善工资待遇。图库曼大学法律和社会科学学院的学生十七日举行二十四小时罢课，抗议让一反动教授任教。"},{"type":"paragraph","text":"阿根廷康塞普西翁城附近的一家榨糖厂的三百名工人，为抗议厂主拖欠工资，十六日切断了这个城市的一条主要公路的交通，阻止汽车和卡车通行。"},{"type":"paragraph","text":"新华社北京二十七日电　瓜亚基尔消息:厄瓜多尔学生运动蓬勃展开，席卷全国十多个大中城市。这是今年以来最大的一次反美反独裁的群众斗争。"},{"type":"paragraph","text":"十三日以来，厄瓜多尔学生抗议反动当局为镇压学生运动而封闭博尔哈·拉瓦因中学的斗争，已从瓜亚基尔蔓延到基多、乐哈、昆卡、波尔托维霍、米拉格罗、安巴托、图尔坎、马查拉等十多个大中城市。示威学生强烈谴责反动当局镇压学生的法西斯政策，要求教育部长辞职和使这所被封闭的中学复课。不少城市的学生袭击了当地政府的办公大楼和美国领事馆。"},{"type":"paragraph","text":"二十日晨，爪亚基尔学生纷纷涌向街头，举行示威游行。来自各中学的学生冲向美国驻瓜亚基尔领事馆，高呼“打倒美帝国主义!”等口号，并且同前来镇压的反动警察展开英勇的搏斗。反动警察悍然向学生开枪，杀害了两名学生，十多人受伤，二十多人被捕。警察的暴行激起了学生的极大愤慨。当天晚上，数千名大中学生再次举行集会，抗议当局的野蛮暴行。"},{"type":"paragraph","text":"二十二日，乐哈市的大中学生举行集会和游行，声援瓜亚基尔学生的斗争。示威学生高呼反对独裁政府的口号。游行一直持续到深夜，示威学生筑起街垒，同前来镇压的警察进行了搏斗。同一天，基多、瓜亚基尔的学生不顾反动军警的镇压，又举行了数起示威游行，并且袭击了警察的车辆。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1d104109d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
