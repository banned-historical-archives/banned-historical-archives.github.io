<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席在五四时代主编的刊物——湘江评论","authors":["高镒"],"dates":[{"year":1957,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高镒"},{"type":"paragraph","text":"“湘江评论”为五四时代革命影响极大的刊物之一，创刊于一九一九年七月十四日，为毛主席所主编，每周出版一期，系长沙湖南学生联合会发行，每期售铜元两枚。先烈李大钊在看了这个刊物的创刊号后，即“认为它是当时全国最有分量政治性最突出的刊物”(一)，后来在他所主编的“每周评论”上，还刊出了介绍文字。(二)该刊发表了毛主席的很多重要论著，如“开始以马克思列宁主义的观点与中国革命实际相结合的宣言之一”(三)的“民众的大联合”一篇长文，就是在这上面连续刊载的。"},{"type":"paragraph","text":"由于反动派的长期统治和对革命事业的严重破坏，革命文献的搜集是很困难的，“湘江评论”更没有例外。一九五三年北京大学图书馆整理旧存杂志期刊，“在这里头居然找到丁湘江评论自创刊号至第四号完整无缺”(四)，这个发现很重要，是非常值得兴奋的。至于第五期按出版日期计算，应在八月十一日出版，据说是出版了，但“还没有来得及发行，就被张敬尧反动政府全部没收了。”(五)去年我欣幸地读到毛主席于一九一九年九月五日寄给他朋友的一封信上说:“湘江评论出至第五号被禁停刊，第五号已寄来尊处，谅经收到?”这封信很宝贵，使我们知道“湘江评论”第五号虽被禁止、没收，但有寄出在外的。因此，我们应该很好地进行寻访，把这一期也能找到，这对革命史的研究，是有极其巨大的意义的。【编者按:读者中如珍藏有“湘江评论”第五号，请通知本报。】"},{"type":"paragraph","text":"已发现的第一期至第四期及临时增刊第一号，有很多重要的作品，其特色是大声疾呼地宣传反帝国主义、反封建主义，宣传新思潮，传播马克思列宁主义学说，热烈地歌颂十月革命的伟大胜利，最早的提出必须建立人民民主统一战线的主张，实事求是地展开社会问题的研究，而且文字非常大众化。现在把这几期的要目，摘录如次:"},{"type":"paragraph","text":"第一号目录(七月十四日出版)"},{"type":"paragraph","text":"“创刊宣言”　泽东"},{"type":"paragraph","text":"西方大事述评:“各国的罢工风潮”　泽东"},{"type":"paragraph","text":"东方大事述评:“陈独秀之被捕及营救”　泽东"},{"type":"paragraph","text":"世界杂评:“强叫化”等十七篇　泽东"},{"type":"paragraph","text":"湘江杂评:“好计策”等八篇　泽东、子暲"},{"type":"paragraph","text":"新文艺:“节孝坊”　子暲"},{"type":"paragraph","text":"甚么话:“张謇云”等四篇"},{"type":"paragraph","text":"会载:湖南学生联合会致北京徐总统龚代总理"},{"type":"paragraph","text":"第二号目录(七月二十一日出版)"},{"type":"paragraph","text":"“民众的大联合”　泽东"},{"type":"paragraph","text":"“新”“老”都可怕　剑丸"},{"type":"paragraph","text":"西方大事述评:“德意志人沉痛的签约”　泽东"},{"type":"paragraph","text":"世界杂评:“高兴和沉痛”等二篇　泽东"},{"type":"paragraph","text":"湘江杂评:“职业教育”等二篇慎厂、竹如"},{"type":"paragraph","text":"放言:“过于新”等六篇竹如、楚、弘君"},{"type":"paragraph","text":"新文艺:“纪游”　书农"},{"type":"paragraph","text":"临时增刊第一号目录(七月二十一日出版)"},{"type":"paragraph","text":"湘江大事述评:“健学会之成立及进行”　泽东"},{"type":"paragraph","text":"法国通信:“留法勤工俭学的情形”　易利宾"},{"type":"paragraph","text":"对于救国运动公言"},{"type":"paragraph","text":"第三号目录(七月二十八日出版)"},{"type":"paragraph","text":"“民众的大联合”(二)　泽东"},{"type":"paragraph","text":"东方大事述评:“日本的平民运动”　书农"},{"type":"paragraph","text":"世界杂评:“畏德如虎的法兰西”等七篇泽东、慎厂等"},{"type":"paragraph","text":"湘江杂评:“孔子与观音菩萨”等七篇泽东、慎厂等"},{"type":"paragraph","text":"法国通信:“留法勤工俭学的情形”(二)　子升"},{"type":"paragraph","text":"放言:“不新不旧是什么”等六篇竹如、剑、楚"},{"type":"paragraph","text":"第四号目录(八月四日出版)"},{"type":"paragraph","text":"“民众的大联合”(三)　泽东"},{"type":"paragraph","text":"“改造家庭与改造思想”　慎厂"},{"type":"paragraph","text":"“富-贵=妇女”　慎厂"},{"type":"paragraph","text":"东方大事述评:“日本的平民运动”(续)　书农"},{"type":"paragraph","text":"湘江大事述评:“本会总计”"},{"type":"paragraph","text":"法国通信:“留法勤工俭学的情形”(三)　子升"},{"type":"paragraph","text":"特载“本会呈省长文”"},{"type":"paragraph","text":"(一)(三)见中国青年1953年第17期"},{"type":"paragraph","text":"(二)见每周评论第36期，1919年8月24日出版"},{"type":"paragraph","text":"(四)(五)见历史研究1954年第2期"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1957\\05\\5754030401.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cf6b4ee5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
