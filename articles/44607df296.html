art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"三枚毛主席像章","authors":[],"parts":[{"type":"paragraph","text":"有人问他为什么要戴这么多毛主席像章，他说：“每一个像章都凝结着深厚的也中人民的友谊，凝结着毛主席对也门人民的关怀。看到毛主席像章，就使我想起了中国专家为了也门人民日夜不停地辛勤劳动；看到也门的第一条新型现代化公路和第一个纺织厂，就想起了毛主席派来的好专家。所有这一切，都应该归功于伟大的领袖毛主席。”"},{"type":"paragraph","text":"他还说：“我每天劳动完了以后都要看看毛主席像，因为毛主席是我们劳动人民心中最红的红太阳，他是世界上求解放、争独立、闹革命的人民的希望。我尊敬毛主席，我要歌颂毛主席，因为他是世界革命人民最伟大的领袖。”"},{"type":"paragraph","text":"（新华社记者）"},{"type":"paragraph","text":"刚果（布）工人热爱毛主席，渴望得到毛主席像章。这是中国专家把一枚心爱的毛主席像章送给刚果（布）工人。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44607df296"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
