<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"9646ca98-820c-44ef-b8ca-c656fd59b7fd","name":"毛泽东思想万岁（1949.10-1957.12）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/9646ca98-820c-44ef-b8ca-c656fd59b7fd.pdf"],"article":{"title":"在接见西藏致敬团时的谈话","alias":"","parts":[{"type":"paragraph","text":"在接见西藏致敬团时的谈话"},{"type":"paragraph","text":"（一九五一年十月八日）"},{"type":"paragraph","text":"共产党对宗教采取保护政策，信教和不信教的，信这种教的或信别种教的，一律加以保护，算重其信仰，今天对宗教采取保护政策，将来也仍然采取保护政策。"},{"type":"paragraph","text":"分地的问题，与宗教有所不同。在汉人区域已经分了士地，这里对宗教仍然是保护的。少数民族地区分不分士地，由少数民族自已决定。西藏地区，现在谈不上分地，将来分不分由你们自已决定，并且由你们自已去分，我们不代你们去分。"},{"type":"paragraph","text":"成立军政委员会和改藏军是协上规定了的。因为你们害，我通知在西藏工作的同志，要他们慢点执行。协是要执行的，但你们害怕，只好慢点执行。今年害怕，就待明年执行，如果明年还害怕，就等后年执行。"},{"type":"paragraph","text":"西藏地方大，人口少。人口需要发展，从现在二、三百万发展到五、六百万，然后再增至千几百万就好。还有经济和文化也需要发展。文化包括学校、报、电影等等，宗教也在内。过去的反动统治，清朝皇帝、蒋介石都是压迫剥削你们的，帝国主义也是这样，使得你们人口不得发展，经济削弱了，文化也没有发展。共产党实行民族平等，不要压追、削你们，而是要帮助你们；帮助你们发展人口，发展经济和文化。人民解放军进入西藏就是执行帮助你们的政策，开始进去的时候不会有帮助，三、四年之内也不可能有多的帮助，但以后就能帮助你们的，那是一定的。如果共产党不能帮助你们发展人口，发展经济和文化，那共产党就没有什么用处了。"},{"type":"paragraph","text":"在中国人民政协第一属全国委员会"},{"type":"paragraph","text":"第三次会议上的开幕词"},{"type":"paragraph","text":"（一九五一年十月二十三日）各位委员，各位同志们："},{"type":"paragraph","text":"我们的人民政治协商会第一属全国委员会第三次会曦，现在开会了。在这次会上，除了金国委员会的委员以外，应邀列席的尚有中国人民志愿军，人民解放军，工业劳动模范，农业劳动模范，老根据地代表，教育工作者，文艺工作者，工商业家，各种专家，宗教界，少数民族，华侨，妇女，青年，省市协商委员会及其它方面的代表人物，尚有许多政府工作人员。出席和列席人员中包括了许多为人民所公的战斗英雄、劳动模范和模范工作者。我们这次会的这个规模，充分表现了中华人民共和国在各个战上都有了宜大的成就和进步。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":10,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":25,"page_end":25},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34207a52ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
