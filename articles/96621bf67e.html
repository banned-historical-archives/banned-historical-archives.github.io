定的补充通知","authors":[],"dates":[{"year":1952,"month":3,"day":12}],"is_range_date":false,"parts":[{"text":"中共中央关于处理贪污浪费问题若干规定的补充通知","type":"title"},{"text":"各中央局并转分局，省、市、区党委；各大军区和志愿军党委并转各级军区、兵团、军党委：","type":"appellation"},{"text":"三月六日所发之中共中央《关于处理贪污浪费问题的若干规定》，当删去党内掌握部分，经政协和政务院讨论后，已于今日公开发布。其中与党内文件除纯文字变动外，较重要增改为：","type":"paragraph"},{"text":"一、贪污超过一百万、一千万、一亿者，均称为贪污分子，不再区分大、中、小贪污分子，以便于处理。","type":"paragraph"},{"text":"二、缓刑不列为刑事处分之一种，而改为附加，因有期、无期徒刑、死刑均可缓刑。","type":"paragraph"},{"text":"三、计算贪污时间一段中，凡“情节严重”之后均增“恶劣”二字。追查时间，‘增写为“追查到各地大城市和省城解放之日”，各地可据此标准自行规定具体时间；军队方面之具体追查时间，由总政治部即作统一的补充通知。","type":"paragraph"},{"text":"四、增加了“第五，克服官僚主义错误问题”部分，便于帮助各地全面地解决问题。","type":"paragraph"},{"text":"五、各地在执行此文件时，必须结合《人民日报》三月十二日社论所述各点，以防因转入处理阶段而放松和影响“三反”斗争的彻底胜利。","type":"paragraph"},{"text":" 中 央三月十二日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96621bf67e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
