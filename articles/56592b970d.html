script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美帝及其走狗朴正熙的残酷剥削  南朝鲜人民展开争取生存权利的斗争","authors":[],"dates":[{"year":1962,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美帝及其走狗朴正熙的残酷剥削"},{"type":"paragraph","text":"南朝鲜人民展开争取生存权利的斗争"},{"type":"paragraph","text":"新华社平壤21日电　汉城消息：在美帝国主义及其走狗朴正熙法西斯集团敲索压榨下贫困不堪的南朝鲜劳动人民，继续展开争取生存权利的斗争。"},{"type":"paragraph","text":"据《京乡新闻》报道，忠清南道青阳郡九凤矿山的七百多名工人，最近向傀儡当局提出“要求文”，强硬要求勾结军事当局的经营主立即发还拖欠的工资，并强烈谴责经营主强迫工人作苦役但不支付工资的残酷剥削行为。"},{"type":"paragraph","text":"在釜山出版的《国际新报》最近报道说，被朴正熙军事暴徒强拉到庆尚南道东莱郡作苦役的一百五十多名工人，为要求发还工资也展开了顽强斗争。"},{"type":"paragraph","text":"据《国际新报》另一报道，庆尚南道巨济岛的人民，最近向朴正熙军事法西斯集团提出了一项要求，要求立即支付军事占用农地的代价金。报道说，这个地区有三千九百多个农民，在战争时期被美帝国主义强占去了数百万坪农地和他们的住宅，在以后的十年期间，他们曾不断向美国侵略军当局要求支付代价金。但是，美国侵略军至今没有支付过一文代价金。这些农民无以为生，被迫流浪在外。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56592b970d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
