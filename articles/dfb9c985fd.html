art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《叶剑英》画册《叶剑英军事文选》出版","authors":["王文杰〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"本报北京4月28日讯 记者王文杰报道：为纪念叶剑英同志诞辰100周年，中共中央文献研究室和新华通讯社合作编辑的《叶剑英》画册，中共中央文献研究室和军事科学院合作编辑的《叶剑英军事文选》，分别由中央文献出版社、解放军出版社出版，即日起在全国发行。"},{"type":"paragraph","text":"大型画册《叶剑英》收入照片500多幅，分为十个部分：元帅英姿；梅州学子、粤军名将；广州举义、长征途中；辗转奔波、团结抗战；延安岁月、军调使命；接管北平、主政南粤；主持军训、创办军科；十年抗争、力挽狂澜；拨乱反正、心系四化；风范长存，生动地反映了叶剑英伟大光辉的一生，形象地记录了他为我党、我军和我国人民所建立的丰功伟绩。"},{"type":"paragraph","text":"《叶剑英军事文选》，收入了叶剑英从1933年至1982年各个历史时期的重要军事著作，包括电报、训令、讲话、报告、论文和回忆文章等共85篇，约60万字，其中大部分是第一次公开发表。该书全面地反映了叶剑英在中国革命和建设的长期艰苦复杂的斗争中，把马克思列宁主义普遍真理与中国的实际相结合，在人民军队的创立与建设、人民战争的运筹与指挥，以及国防现代化建设等方面所作出的巨大贡献。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfb9c985fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
