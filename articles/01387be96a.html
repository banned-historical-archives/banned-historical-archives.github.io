thors":[],"dates":[{"year":1951,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"汉阳农村基层组织严重不纯","type":"title"},{"text":"【长江日报讯】汉阳县有些村的基层组织在这次覆查中，发现严重不纯。如二区十四村土匪当了农会主席，副主席是个女流氓。八村是县委与区委亲自掌握的重点村，但两个农会副主席，一个是一贯道，一个是“八魔”之一，副乡长是恶霸的儿子，生产委员是四虎阎王之一。目前这些村的群众情绪很低，地主气焰高涨，地主普遍向农民反攻，打人、逼租、威胁、暗中倒算等破坏活动很厉害。其他各地亦有类此现象。","type":"paragraph"},{"text":"土地改革中因群众思想发动不够，群众普遍有“土地分完了，果实也有了，地主打倒了，没有什么事了”的麻痹思想。","type":"paragraph"}],"comments":[],"origin":"1951年7月28日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01387be96a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
