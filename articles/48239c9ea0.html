al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"和邹春培先生应对联（之二）","alias":"","parts":[{"type":"paragraph","text":"和邹春培先生应对联（之二）[1]"},{"type":"paragraph","text":"（1903年）牛皮菜口；(邹春培)"},{"type":"paragraph","text":"马齿苋国。（毛泽东）[1]这是毛泽东和私垫先生的应对联。"},{"type":"paragraph","text":"[2]牛皮莱，学名“叶用慕菜”，又名“菜”“厚皮菜”，属藜科，慕菜的变种之一，二年生，草本。植株矮生或直立，根小，叶片卵形，肥厚，有光泽，色淡绿或浓绿，叶柄有长者也有短者。种子小，肾形，褐色。适应性强，春秋季节栽培为主。"},{"type":"paragraph","text":"[3]马齿苋，马齿苋科。一年生肉质草本，通常匍匐，无毛，茎常带紫色，叶对生，倒卵状楔形。夏季开花，花小型，黄色。果圆锥形，盖裂。生于原野，我国分布甚广。茎、叶可作蔬莱或家畜饲料，中医学上以全草入药，性寒味酸，清热、解毒、消肿，主治痢疾、疮疡等症。毛泽东少年时最初入学就读处-南岸私垫。"},{"type":"paragraph","text":"1906学生时代的毛泽东经常在此水井旁用井水冲凉，以锻炼体魄。"}],"authors":["毛泽东"],"dates":[{"year":1903}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":71,"page_end":74},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48239c9ea0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
