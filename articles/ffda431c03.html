ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"中央关于用坚决斗争的立场保卫政协决议给重庆代表团的指示叫","alias":"","parts":[{"type":"paragraph","text":"中央关于用坚决斗争的立场保卫政协决议给重庆代表团的指示川"},{"type":"paragraph","text":"(1946年4月1日）丙、丁："},{"type":"paragraph","text":"（一）敬日以来，我党代表在综合小组会议上所取坚决斗争立场是很对的，只有如此，才能保卫政协决议，而对于过去所取不适当的让步态度，因而使自己处于很不利的被动地位这一种情况，有求得解脱与恢复主动之可能。但此项斗争尚未胜利，国民党的反动压力还将增大，务望精心研究，密切注意。"},{"type":"paragraph","text":"（二）省自治法仍应改为省宪，如目前不便提，将来适当时机仍应提出。"},{"type":"paragraph","text":"（三）在宪草与国大等问题没有解决，中央没有最后通知以前，我党参加政府的名单不要提出，名单内容亦尚待考虑。"},{"type":"paragraph","text":"甲乙卯东"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":225,"page_end":225},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffda431c03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
