art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"请看，地主的剥削","authors":[],"parts":[{"type":"paragraph","text":"左面是解放前山西省洪洞县板榻村大恶霸地主郭辅唐张贴的告白。"},{"type":"paragraph","text":"郭辅唐用高利贷盘剥农民起家，为了吮吸更多的穷苦人的脂膏，在一九二七年四月，无耻地贴出了这张告白，说自己开设了小银行，向他借钱要“八当十，四分利”。就是说，借八块现洋要当十块现洋，另加利息四分。他还狂妄地说：“十块现洋抵押一亩地，到期不还，我擒地。”多狠毒！据统计，板榻村一百三十多户，受过这狗地主高利贷盘剥的就有一百一十户。许多人被压榨得倾家荡产，子散妻离。一九三六年二月，陕北红军东渡黄河，到达了洪洞县，根据群众的要求，把这个恶霸地主判处了死刑。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"151ab796fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
