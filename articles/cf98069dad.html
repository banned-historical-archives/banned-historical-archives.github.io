script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"跳出名利苦海　跃登红专坦途资产阶级个人主义展览会之一(本报根据各地知识分子自我揭发材料编成)","authors":[],"dates":[{"year":1958,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者的话"},{"type":"paragraph","text":"本报今天举办了这个资产阶级个人主义事例的小小展览会。从这些事例中，可以使人看到:资产阶级个人主义集中地表现在名利思想上；唯利是图、唯名是图是资产阶级个人主义又脏又臭的本质。为了利，有些人可以为稿费分配争得面红耳赤，甚至不顾国家需要，取消了具有现实意义的研究项目；为了名，可以拒绝国家迫切需要的科学研究项目，而热中于所谓“地下研究”。把著书立说当作成名的阶梯者更不乏其人。真是形形色色，无奇不有，但归根到底，不外乎名利二字。"},{"type":"paragraph","text":"本报今天把这些个人主义事例展览出来，目的在于把这些事例变成镜子，可以帮助一些同志清醒过来。"},{"type":"paragraph","text":"我国知识分子、特别是高级知识分子，现在自觉地要求深入改造自己的心情益来益迫切，力争红透专深已成为风气。这是在我国新形势下出现的新气象，这种新气象是极为可贵的。但是，资产阶级个人主义严重地障碍着知识分子红透专深，严重地障碍着我国文化科学教育事业的前进。有严重资产阶级个人主义思想的知识分子在这个大时代里，他们所起的不是促进作用而是促退作用。这就值得他们深思的了。在万马奔腾的今天，已出现了知识分子大跃进的前景。用烈火烧掉资产阶级的个人主义和资产阶级的学术思想，跳出名利苦海，跃登红专坦途，知识分子才能随着时代向前跃进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf98069dad"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
