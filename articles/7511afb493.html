art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纵情歌唱祝福毛主席","authors":["建华从福玉坤"],"parts":[{"type":"paragraph","text":"为了迎接国庆节，驻云南某部特务连的苗族、彝族、哈尼族、傣族战士们欢聚一堂，举行了祝毛主席万寿无疆的歌舞晚会。苗族战士吹起了芦笙，傣族战士敲起了象脚鼓，哈尼族战士弹起了弦子……他们怀着最深厚的阶级感情，用自己民族的歌舞，表达了对党和毛主席的无限热爱，无限信仰，无限崇拜。他们激动地欢呼“毛主席万岁！万岁！万万岁！”一位傣族战士在参加晚会之后高兴地说：“我一定好好读毛主席的书，听毛主席的话，跟着毛主席干一辈子革命，世世代代不变心。” （建华、从福、玉坤）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7511afb493"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
