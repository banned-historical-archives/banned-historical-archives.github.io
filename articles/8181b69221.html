ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"致卫立煌电","alias":"","parts":[{"type":"paragraph","text":"致卫立煌电"},{"type":"paragraph","text":"（1949年10月15日）张枫转卫立煌将军："},{"type":"paragraph","text":"酉江电诵悉，极为感谢。谨此奉复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"酉删"},{"type":"paragraph","text":"[1]卫立煌，1948年任国民党政府军东北“剿匪”总司令部总司令。沈阳解放前夕回到南京，被蒋介石软禁。1949年初出走香港。他给毛泽东的电报是从香港发出的。"},{"type":"paragraph","text":"[2]张枫，即饶彰风，当时任中共中央华南分局港澳工作委员会委员。"},{"type":"paragraph","text":"[3]指卫立煌1949年10月3日给毛泽东的电报。电报全文是：“先生英明领导，人民革命卒获辉煌胜利；从此全中华人民得到伟大领袖，新中国富强有望，举世欢腾鼓舞，竭诚拥护。煌向往衷心尤为雀跃万丈。敬电驰贺。朱副主席、周总理请代申贺忱。”"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":424,"page_end":424},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8181b69221"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
