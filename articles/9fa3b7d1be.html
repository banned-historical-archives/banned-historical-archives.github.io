<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国极右分子脸谱","authors":[],"dates":[{"year":1958,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国极右分子脸谱"},{"type":"paragraph","text":"戴高乐"},{"type":"paragraph","text":"现已六十八岁的戴高乐是法国法西斯分子力图拥戴上台的中心人物。他在1946年被法国人民唾弃，退出政治舞台以后，仍然经常窥伺法国政局，寻找上台的机会。法国共产党书记杜克洛同志曾经指出：“这位要求作独裁者的家伙想把法国变成一个巨大的兵营，使人民都听从他的伍长们的指挥。”杜克洛同志说：戴高乐本身就是法西斯主义。"},{"type":"paragraph","text":"在第二次世界大战以前，戴高乐是法国军队里的一名上校，大战期间，德军攻下巴黎，他逃到伦敦，组织“自由法国”。但这位逃避到外国的流亡政客却自封为“法国第一个抵抗者”。他如何在伦敦“抵抗”德军，岂不叫人啼笑皆非。正如“人道报”所指出：整整四年之久，戴高乐冒充为法国抗战的领袖；其实他想尽了办法阻止法国人民的解放斗争，害怕法国人民自己解放自己并建立一个同他气味不相投的法国。例如，在法国凡谷尔山地的义勇军，就是由于戴高乐的遗弃和出卖，而被敌人消灭的。为了阻止人民抗德武装收复巴黎，这位“第一个抵抗者”甚至主张同德国订立休战协定。"},{"type":"paragraph","text":"大战结束后，戴高乐回到巴黎，担任“临时政府”主席，以后又担任内阁总理兼国防部长和陆军部长。他尽力加强反动势力，图谋建立军事独裁统治。他解散了人民的抗德武装，改组和加强了秘密警察部队，对民主力量实行大迫害。"},{"type":"paragraph","text":"1946年1月，戴高乐遭到法国人民的激烈反对而被迫辞职。"},{"type":"paragraph","text":"但是，戴高乐一刻也未停止反动活动，他在1947年以法兰西人民联盟（它在1954年改名为社会共和党）为招牌，拼凑了一个反动大联合，想把所有右派力量，包括暴乱分子和财阀代理人，都集合在他的旗号下。"},{"type":"paragraph","text":"近年来，戴高乐虽然“退居”在乡下，可是几乎每星期他都到巴黎去活动。他成为法国极右分子的领袖，也是叛乱分子在阿尔及利亚进行的阴谋的鼓动者和指导者。"},{"type":"paragraph","text":"戴高乐是法国垄断资本家二百家族的人。他的政党和活动历来受到国内外财阀的津贴和支持。他的许多亲友都和法国垄断资本有联系，他的兄弟比尔·戴高乐是巴黎联合银行的代理人。"},{"type":"paragraph","text":"萨兰"},{"type":"paragraph","text":"法国驻阿尔及利亚的侵略军总司令拉乌尔·萨兰是从事殖民战争的老牌战犯。在这次法国暴乱事件中，他参与和鼓励暴乱分子的活动，叫嚣要在阿尔及利亚继续进行侵略战争，并且高呼“戴高乐万岁”的反动口号。他甚至无耻地颁布命令说：“由于只有我一人了解目前的局势，因此只有我能够采取完成我的使命所需要的决定。”"},{"type":"paragraph","text":"曾在法国圣西尔军校毕业的萨兰是越南人民手下的败将。1952年1月，他从北越法军司令升任印度支那法军总司令。正在此时，越南人民军发动了三次胜利的攻势。在2月下旬解放了北越的和平城，全歼法军二万二千名。此后，萨兰指挥下的法国殖民军，在越南人民军的有力打击下，不断地遭受到惨重的挫败。1953年5月，法国政府把他撤职调回法国担任陆军总监的职务。1956年底，这位屠杀殖民地人民的刽子手又被任命为阿尔及利亚的法军总司令。由于阿尔及利亚人民愈战愈强，年余以来，萨兰又吃到不少的苦头，经常处于十分狼狈的境地。　　　（新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fa3b7d1be"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
