<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"金克木:消除我们自己的思想污毒","authors":["金克木"],"dates":[{"year":1952,"month":3,"day":12}],"is_range_date":false,"parts":[{"text":"金克木:消除我们自己的思想污毒","type":"title"},{"text":"金克木","type":"authors"},{"text":"反贪污、反浪费、反官僚主义运动在高等学校展开以后，揭发了不少可痛心的不合理现象，而更重要的是现在已进一步显露出产生这些现象的思想。","type":"paragraph"},{"text":"资产阶级的腐朽思想，恶劣的市侩思想，在高等学校教师的头脑中还严重地、相当普遍地存在着，不过采取了不同的形式而已。","type":"paragraph"},{"text":"把学术当商品，用种种商标做广告；个个都自命“世界第一”“独步全球”；而标准又无非是哈佛、耶鲁、剑桥、牛津之类的资本主义国家的洋字招牌“舶来品”；贩卖知识，广求销路。这都和商人行为同出一轨。","type":"paragraph"},{"text":"抢先把英美新书杂志霸在手中，“零趸批发”，大吹大擂，以为独得之秘；介绍参考书独不介绍自己所依靠的秘本；搜罗材料，唯恐人知，当作“家传秘方”。这岂不是“囤积”“独占”？","type":"paragraph"},{"text":"为了争“第一”，当“专家”，就钻冷门，人弃我取，然后“买空卖空”，“物稀为贵”，稳坐第一把交椅，“独占鳌头”。这岂不是怀“奇货可居”思想的大贾？","type":"paragraph"},{"text":"论文以“出口”为荣，揣摩资本主义国家主顾的脾味；或则东抄西袭，多多益善，四处发表，广作宣传；姓名必须显著刊登，稿费不惜斤斤计较；只顾推销，不管读者。","type":"paragraph"},{"text":"学术研究本如积薪，“后来居上”；但是对他人的成果常隐匿不提，而对自己的补充就夸为独创；同一字号便标榜“吾师”、“吾友”，不同字号便声明“谨防假冒”；各种“王麻子”都是“只此一家，别无分店”。","type":"paragraph"},{"text":"不是在对人民的贡献上竞赛，却专爱听“耳报神”刺探别家字号“存底”；于是就有一些“跑合”东奔西走，使别家字号关门，本号扩充，广设分店。","type":"paragraph"},{"text":"对学生夸自己教的课程重要，就一定要指摘别人，而且把学生的职业出路当做重要性的主要证明；把学生看成顾客，把同事看做竞争销路的同业。","type":"paragraph"},{"text":"只顾自己名利，不管教学结果，甚至拿学生当自己研究的实验品或助手，忘了他们是国家迫切需要的干部。看国家人民利益时都要通过自己利益的眼镜，一旦公私不能兼顾，就不惜损公利私。旧货滞销就长吁短叹，甚或乱贴商标，冒充新货出售。费尽种种心机贩来的学问只作为商品，自己的头脑只作为货栈，“自由竞争”、“倾销”、“惜售”，成了日常生活习惯，却不知世界已经换了面目。","type":"paragraph"},{"text":"这种种情形还不该在工人阶级大喝一声之下猛醒过来么？","type":"paragraph"},{"text":"资产阶级为盗窃国家财产用“糖衣炮弹”攻打我们的革命干部，而我们教师们却被自己头脑中的思想污毒所支配，也不自觉地天天用资产阶级的腐朽思想去影响未来的国家干部。这是可以容许的么？","type":"paragraph"},{"text":"为了我们伟大的祖国，珍惜学生，珍惜自己，快些消除我们自己的思想污毒吧","type":"paragraph"},{"text":"1952年3月12日人民日报电子版","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ccae89906"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
