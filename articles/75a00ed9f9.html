人的报告","authors":[],"dates":[{"year":1959,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"中共通渭县委关于逮捕不法地主郭文勤等21人的报告","type":"title"},{"text":"主送    中共定西地委","type":"paragraph"},{"text":"抄送    通渭县人民检查院\t（共印3份 ）","type":"paragraph"},{"text":"本件1页   中共通渭县委秘书部（室）1959年12月4日印发","type":"paragraph"},{"text":"地委：","type":"appellation"},{"text":"我们研究决定对不法地主：南洀，郭文勤，玉荣西，南星斗，姚发昌；反动富农：黄玉文、金自鸣；历史反革命分子，张焕南，残害儿童犯张凤林；投毒犯王振声；反社会主义分子：崔俊峰、崔逢吉、董俊；杀害耕畜犯：景彦海、王启周；破坏粮食犯：杨建仓、杨建祥、何海邦；破坏分子，杨承福、郜宪章、黎顺清等21名，应依法逮捕，现将原卷21宗随文报上，请审批。","type":"paragraph"},{"text":" 中共通渭县委","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"单行材料21份","type":"paragraph"},{"text":" 1959年12月3日","type":"paragraph"}],"comments":[],"origin":"中共通渭县委秘书室，全宗号：1，档案室案卷号：154。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75a00ed9f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
