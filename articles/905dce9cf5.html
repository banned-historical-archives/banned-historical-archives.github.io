es":[{"year":1986,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刚毅的山鹰"},{"type":"paragraph","text":"——缅怀叶剑英同志"},{"type":"paragraph","text":"赛福鼎·艾则获东方碧落又一只刚毅的雄鹰垂下了翅膀。但他那睿智的眼睛决不会闭合；他的红色的心脏决不会停止跳动——死亡与他无缘，那昂扬奋发的精神，永远活在我们心中。半个世纪以来，为了翦除狂暴不顾飓风雷霆，振翮穿云，在风雨中与邪恶抗争；无论黑色的鸮鸱，还是披着火红毛皮的狐狸，都逃脱不了锐利的眼睛。他挥动巨翼冲破乌云，痛击一切狡猾的敌人。当阴霾扫尽，艳阳重现，碧空如洗，万里无云，这只刚毅的山鹰，正欣悦地梳整翎羽，准备带领成千上万年轻的鹰隼，飞向更远的征程……多么令人惋惜，无情的死神骤然来临，但他永远不会离开我们。在疾飞的鹰群中，他那奋翮冲天的雄姿，永远激励我们，他将与山河同存。"},{"type":"paragraph","text":"一九八六年十月于北京"},{"type":"paragraph","text":"〔王一之译〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"905dce9cf5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
