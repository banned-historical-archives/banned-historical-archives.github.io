<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于广东省羊城宾馆等单位违犯清仓纪律抗拒检查的通报","authors":[],"dates":[{"year":1962,"month":6,"day":7}],"is_range_date":false,"parts":[{"text":"中央关于广东省羊城宝馆等单位违犯清仓纪律抗拒检查的通报","type":"title"},{"text":"各中央局，各省、市、自治区党委：","type":"appellation"},{"text":"自中央五月十五日发出“关于严肃处理清仓工作中违法乱纪行为的通报”以后，据中央清仓核资领导小组的汇报，最近又陆续发现不少单位仍然没有认真贯彻执行中央有关清仓核资工作的指示，清查工作进行得不全面、不彻底，有些单位甚至不顾中央一再指示，继续采取隐瞒不报、分散转移、乘机私分、抗拒检查等违法乱纪行为，性质十分恶劣。为了引起全党注意，坚决采取措施加以纠正，兹再通报如下：","type":"paragraph"},{"text":"一、广东省羊城宾馆的物资清查得很不彻底，经过复查，账物不符的仍占百分之四十二，并隐瞒酒一万六千一百六十八瓶，鱼、肉等六千四百八十五斤。而且在这次清仓中将胶鞋五百双、鱼一千六百二十七斤，金针菜一百三十斤、榨菜三百斤以及其他食品私分给职工，经省清仓检查组发现并提出意见，宾馆负责人仍置之不理，又在五月十二日私分了七百二十斤鱼。宾馆小卖部存有的许多物资，虽经清仓检查组提出意见，这个宾馆的经理仍不同意清查，并主，如果要清查须经省接待委员会批准。所以一直拖到最近才开始清点。这个宾馆还通知广州冷冻仓库，未经宾馆同意，不准任何人检查他们寄存的副食品，当省清仓库检查组去广州冷冻库检查时竟遭到拒绝。此外，羊城宾馆在四月二十日还动用了铜四吨及无缝纲管、镀锌钢管、铜管、电动机、漆包线等库存物资，动用流动资金二万五千元，建设了一个一百四十平方米的冰棍车间。","type":"paragraph"},{"text":"二、佳木斯宾馆在这次清查物资中隐瞒大豆八万六千斤，呢绒、绸缎三百二十多公尺，棉布一万三千多尺，肥皂八千多块。对于这种违法行为，该市清仓办公室副主任白英贵和省清仓库工作组曾先后提出过意见，但这个宾馆的支部书记赵强、经理王恒信不但不检查，反而搜集材料，给市工作组拟了五条罪状，由市人委交际处副处长刘汇海出面向市委告状。这件事情发生后，白英贵同志将情况向李自贡副市长汇报时，李竟批评白英贵“你声张什么！”五月十五日白英贵同志又将情况向市委第一书记赵云鹏写了报告，赵云鹏同志将报告转给李自贡同志处理，李又批评白英贵说：“大豆不光宾馆有，哪都有，你是断章取义。有些事应事先同市里统一起来再上报”。","type":"paragraph"},{"text":"三、厦门市清仓办公室樊建平同志（该市物资局副局长），对省里派出的核查组封锁消息，阻挠工作组进行检查。他向办公室的同志交代：“市里没有最后点头的情况，不能随便对外反映”。当省检查组去了解情况时，办公室同志只拿出三期简报塞责。樊建平同志把省检查组的到来，宣称为“菩萨来了”，并拿出各种非计划的物资调拨申请书：要检查组一张一张当场审批，进行刁难。","type":"paragraph"},{"text":"以上情况说明，在这次清仓工作中，要打开一些单位的“小仓库”，弄清他们的“小家底”，决不是轻而易举的事，必然会遭到种种抵抗。为此，中央除将上述事例通报全国外，并责成有关省委和省监委彻底查明情况，对有关人员进行严肃处理，情节严重的，必须给予纪律处分，决不容许这些目无组织、违法乱纪的人逍遥法外。同时，中央要求全国各地区、各部门切实加强清仓核资工作的领导，加强监察检查工作，对于那些“牌子”那样硬，甚至中央和省市派出的工作组也制服不了的单位，省委就应当出面干预，弄清是非，打击邪气，伸张正气，以便把清仓工作搞深、搞透、搞彻底。","type":"appellation"},{"text":" 中央一九六二年六月七日","type":"paragraph"},{"text":"（发至县团级党委）","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2003baeb03"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
