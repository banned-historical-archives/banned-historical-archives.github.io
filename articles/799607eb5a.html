ar":1950,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彼克"},{"type":"paragraph","text":"【新华社北京二日电】　德意志民主共和国总统彼克于十二月卅一日致电我国中央人民政府毛泽东主席，祝贺新年。电文如下:"},{"type":"paragraph","text":"北京中华人民共和国中央人民政府毛泽东主席:"},{"type":"paragraph","text":"当此新年开始之际，我祝贺你的政府和英勇的人民解放军在建立民主和独立的中国的事业上，获得更大的成功。谨代表德国人民祝贺中国人民前途幸福。"},{"type":"paragraph","text":"德意志民主共和国总统彼克"},{"type":"paragraph","text":"萨波托斯基"},{"type":"paragraph","text":"【新华社北京三日电】　捷总理安东尼·萨波托斯基致电毛主席祝贺新年，电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东先生阁下:"},{"type":"paragraph","text":"当兹新年之际，谨代表捷克斯洛伐克政府与本人恭祝阁下和贵国全体人民在贵国摆脱了内外剥削者之后的建设努力中更进一步的成功。全世界劳动人民都狂热地庆祝中国人民一年来的伟大胜利，它标志着全世界和平阵营强大堡垒的胜利。"},{"type":"paragraph","text":"安东尼·萨波托斯基十二月三十一日"},{"type":"paragraph","text":"格罗查"},{"type":"paragraph","text":"【新华社北京二日电】　罗马尼亚人民共和国部长会议主席彼特鲁。格罗查博士，于十二月三十一日致电我国中央人民政府毛泽东主席，祝贺新年。电文如下:"},{"type":"paragraph","text":"北京中华人民共和国中央人民政府毛泽东主席:"},{"type":"paragraph","text":"谨代表罗马尼亚人民、罗马尼亚人民共和国政府和我个人，当此新年之际，向英勇的中国人民和您个人，敬祝幸福。希望一九五○年，是您的伟大祖国的人民民主政体更进一步巩固的一年，您的伟大祖国，是苏联所领导的和平阵营的强有力因素。"},{"type":"paragraph","text":"罗马尼亚人民共和国部长会议主席彼特鲁·格罗查博士"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"799607eb5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
