script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1212","name":"胡启立同志在全国整党工作总结会议开幕时的讲话","author":"胡启立","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"胡启立同志在全国整党工作总结会议开幕时的讲话","dates":[{"year":1987,"month":5,"day":26}],"is_range_date":false,"authors":["胡启立"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区党委整党办公室, 处理“文革”遗留问题、清理“三种人”文件汇编(第五册), 209-210","tags":[{"name":"胡启立","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"胡启立同志在全国整党工作总结会议开幕时的讲话"},{"type":"subtitle","text":"（一九八七年五月二十六日）"},{"type":"paragraph","text":"同志们，现在我们开会了。中指委召开的全国整党工作总结会议，是一次非常重要的会议。五月四日和五月十八日，在紫阳同志主持下，中央书记处对这次会议的议题和一波同志的报告进行了两次讨论。今天许多中央领导同志都来了，这可以说是七中全会和十三大之前中央召开的一次重要的会议。"},{"type":"paragraph","text":"这次会议的主要议题有两个，一是实事求是地评估历时三年半的全国整党工作；二是研究如何巩固和发展整党的成果，把党的建设继续推向前进。这是全党上下、党内党外十分关注的大事。这件事办好了，对于统一全党的思想，加强党的工作，都有很大的意义。这件事办好了，十三大就可以集中精力研究改革和建设中的重大课题了。从这个意义上说，开好这次会议，也就为十三大的召开做了很好的准备。"},{"type":"paragraph","text":"正因为这次会议重要，所以我们把各省、市、自治区党委的书记或副书记，以及中央、国家机关各部委党组、党委的主要领导同志都请来了。我们希望与会同志开动脑筋，敞开思想，聚精会神，集思广益地开好这次会议，把各自的好的经验、好的做法、好的意见和建议都贡献出来，进一步完善和充实全国整党工作的总结，把几年来整党工作的经验和教训上升到理论的高度来认识，并且制定出加强执政党建设的切实可行的办法。现在请薄一波同志代表中央和中指委作《关于整党的基本总结和进一步加强党的建设》的报告。"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8787eeba45"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
