script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本《人民新闻》载文纪念伟大列宁诞生一百周年  现代修正主义的末日不远了  谴责苏修社会帝国主义的反革命、反人民、反社会主义的叛变行径","authors":[],"dates":[{"year":1970,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《人民新闻》载文纪念伟大列宁诞生一百周年"},{"type":"paragraph","text":"现代修正主义的末日不远了"},{"type":"paragraph","text":"谴责苏修社会帝国主义的反革命、反人民、反社会主义的叛变行径"},{"type":"paragraph","text":"新华社十五日讯　东京消息：日本《人民新闻》四月十九日刊登了一篇题为《纪念列宁诞生一百周年——修正主义的末日不远了》的文章，摘要如下："},{"type":"paragraph","text":"马克思、恩格斯逝世以后，欧洲的社会民主党抛弃了暴力革命的旗帜，堕落为资产阶级议会主义政党，一个一个地都跌进了修正主义的泥潭。"},{"type":"paragraph","text":"是列宁恢复了被考茨基和伯恩施坦篡改了的马克思主义的革命精华，创造性地发展并且出色地实践了作为帝国主义和无产阶级革命时代的指导理论马克思主义，这就是列宁主义。"},{"type":"paragraph","text":"列宁逝世以后，斯大林坚持马克思列宁主义，同党内的各种倾向和国内外的敌人胜利地进行了顽强不屈的斗争，成功地进行了社会主义经济建设，并且在第二次世界大战中掌握主导权，结成广泛的反法西斯统一战线，出色地取得了胜利。"},{"type":"paragraph","text":"斯大林的功勋是不可磨灭的。在列宁逝世以后，斯大林领导苏联，同无法形容的国内外的困难进行斗争，在世界战争中赢得了胜利，把苏联这个工农国家建设成为世界人民的坚不可摧的堡垒，革命的巩固的根据地。"},{"type":"paragraph","text":"但是，斯大林逝世以后，赫鲁晓夫及其同伙迫不及待地跳了出来，篡夺了光荣的苏联共产党和苏维埃国家的领导权。正如现在所看到的，苏联共产党已经堕落成为修正主义的党，苏联这个社会主义国家已经完全变成了资本主义国家。"},{"type":"paragraph","text":"不仅如此，取代赫鲁晓夫的勃列日涅夫及其同伙，已经使苏维埃国家堕落成为披着社会主义外衣的帝国主义的侵略国家。"},{"type":"paragraph","text":"苏联社会帝国主义同美帝国主义既争夺又勾结，为霸占世界而实行竞争的“共处”。"},{"type":"paragraph","text":"美帝国主义复活了日本军国主义，把它扶植成为远东的前哨阵地，企图破坏亚洲各国的民族解放斗争，并且侵略中国和朝鲜等社会主义国家。在这一严重的时刻，苏修社会帝国主义正扮演着反革命、反人民的角色，阻挠越南、老挝、柬埔寨的民族解放斗争的发展，支援印度反动派和印度尼西亚、马来亚、泰国等国的法西斯分子，同日本的佐藤一伙加强政治上和经济上的合作，从而成了对中国和朝鲜等社会主义国家发动武装侵略、阻挠和镇压亚洲地区民族解放斗争的帮凶。"},{"type":"paragraph","text":"宫本修正主义集团，煞有介事地鼓吹“结成”“广泛的”“国际反美统一战线”这种骗局，起着向日本人民掩盖苏联真相的作用。"},{"type":"paragraph","text":"但是，苏修社会帝国主义的这种反革命、反人民、反社会主义的叛变行为，要永远欺骗苏联人民，是办不到的。"},{"type":"paragraph","text":"在列宁和斯大林的领导下，继承了伟大十月革命的传统，克服重重困难进行了国内建设，并且赢得了世界大战胜利的光荣的苏联人民，决不会容许苏联现在的状况继续下去而置之不理。"},{"type":"paragraph","text":"苏修领导无耻地以庆祝列宁诞生一百周年为名，大肆进行五花八门的活动。但是，不管他们怎样企图打着伟大列宁的幌子而强调自己的正确性，都是徒劳的。因为列宁的教导和他们这伙修正主义者的胡说八道是有天壤之别的，列宁的实践和他们的“实践”是毫无相似之处的。"},{"type":"paragraph","text":"一九一八年，是马克思诞生一百周年，在这前一年，俄国伟大的社会主义革命取得了胜利，考茨基等老修正主义无论在理论上或者实践上，都彻底地遭到了破产。"},{"type":"paragraph","text":"在迎接列宁诞生一百周年的今天，以苏联为中心的日本宫本修正主义集团等各国的现代修正主义者们，将遭到和他们的修正主义前辈考茨基之流同样的下场，这个日子已经不是很远了。"},{"type":"paragraph","text":"因为，帝国主义走向全面崩溃，社会主义走向全世界胜利的当代的马克思列宁主义——毛泽东思想，正在日益被全世界人民所掌握。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fa548fd53"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
