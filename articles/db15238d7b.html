89号文件中几个具体问题的补充通知","authors":[],"dates":[{"year":1969,"month":7,"day":30}],"is_range_date":false,"parts":[{"text":"内蒙古自治区革命委员会关于执行内革（69）186、189号文件中几个具体问题的补充通知","type":"title"},{"text":"各盟、市、旗、县、公社革委会，内蒙直属各单位：","type":"appellation"},{"text":"各地在执行内蒙革发〔69〕186、189号两个文件中，关于对在前一阶段清理阶级队伍中被误伤的贫下中农（牧）、学生、城市贫民、下乡知识青年治疗问题，提出了一些意见。经研究作如下补充通知：","type":"paragraph"},{"text":"一、关于抚恤、丧葬、治疗的范围、标准，应按内蒙革发〔69〕189号文件附件二执行。","type":"paragraph"},{"text":"二、所需经费，自治区已筹集专款下达，各盟市要具体安排，严格掌握使用，不能与正常的民政事业费混淆。","type":"paragraph"},{"text":"三、对于来内蒙自治区上访的人员中，有关医疗费方面的问题，由内蒙革委会接待站按规定负责处理。","type":"paragraph"},{"text":" 内蒙古自治区革命委员会1969年7月30日","type":"paragraph"},{"text":" 内蒙古自治区革委会办公室秘书组1969年7月31日发出共印20,000份。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"内蒙古文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db15238d7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
