art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们的心永远向着第三世界","authors":[],"parts":[{"type":"paragraph","text":"据新华社3月24日讯 中共中央副主席邓小平今天上午会见并宴请了坦桑尼亚总统朱利叶斯·克·尼雷尔及其主要随行人员。"},{"type":"paragraph","text":"在亲切友好的谈话中，邓小平说，中国和坦桑尼亚两国建交以来一直是很好的朋友。他向尼雷尔介绍了我国国内政治经济形势和实行的政策。尼雷尔说，听了你介绍的情况，使我更加了解你们。我对你们所采取的政策很有信心。我们同中国一直保持着友好关系。"},{"type":"paragraph","text":"据新华社3月24日讯 中共中央总书记胡耀邦今天下午会见了坦桑尼亚总统、坦桑尼亚革命党主席朱利叶斯·克·尼雷尔和他的主要随行人员。"},{"type":"paragraph","text":"会见时，胡耀邦说，中国和坦桑尼亚间的友谊是长久的，我们的心永远向着非洲和第三世界。"},{"type":"paragraph","text":"尼雷尔说，在这次访问中，我感到，中国还是过去的中国。我们两国的处境不同，但我们在国际问题上的立场基本上是一致的。我们将继续进行合作。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b62b321e22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
