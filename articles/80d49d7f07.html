cle":{"title":"最高人民法院关于罪犯在公安机关收容审查期间折抵刑期两个具体问题的批复","dates":[{"year":1979,"month":1,"day":19}],"is_range_date":false,"authors":["最高人民法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"上海市司法局，司法工作手册（三），220","tags":[{"name":"审查","type":"主题/事件"},{"name":"收容","type":"主题/事件"}],"parts":[{"type":"title","text":"最高人民法院关于罪犯在公安机关收容审查期间折抵刑期两个具体问题的批复"},{"type":"subtitle","text":"1979年1月19日 （79）法办研宇第3号"},{"type":"paragraph","text":"云南省高级人民法院："},{"type":"paragraph","text":"你院法司字（1978）第50号《关于执行罪犯在公安机收容审查期间可以折抵刑期几个具体问题的请示报告》已收阅，现答复如下："},{"type":"paragraph","text":"一、在我院（78）法办研字第14号批复下达以前，已判处的有期徒刑罪犯，收容审查日期没有折抵刑期，现在是否予以折抵的问题，我们同意你们的意见，对这类犯人中仍在服刑的，可予以折抵；已服刑期满的，即不必再作变动。"},{"type":"paragraph","text":"二、犯人在判刑前多次被收容审查，应如何折抵刑期的问题，我们同意你们的意见，应以最后一次收容审查（即与逮捕、起诉相衔接的那次收容审查）的日期折抵刑期。此复。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80d49d7f07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
