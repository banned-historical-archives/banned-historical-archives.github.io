" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"傅雷遗书","authors":["傅雷"],"dates":[{"year":1966,"month":9,"day":2}],"is_range_date":false,"parts":[{"text":"傅雷遗书","type":"title"},{"text":"傅雷","type":"authors"},{"text":"〖傅雷，作家，翻译家。〗","type":"subtitle"},{"text":"人秀：","type":"appellation"},{"text":"尽管所谓反党罪证（一面小镜子和一张褪色的旧画报）是在我们家里搜出的，百口莫辩，可是我们至死也不承认是我们自己的东西（实系寄存箱内理出之物）。我们纵有千万罪行，却从来不曾有过变天思想。我们也知道搜出的罪证虽然有口难辩，在英明的共产党领导和伟大的毛主席领导之下的中华人民共和国，决不至因之而判重刑。只是含冤不白，无法洗刷的日子比坐牢还要难过。何况光是教育出一个叛徒傅聪来，在人民面前已经死有余辜了！更何况像我们这种来自旧社会的渣滓早应该自动退出历史舞台了！","type":"paragraph"},{"text":"因为你是梅馥的胞兄，因为我们别无至亲骨肉，善后事只能委托你了。如你以立场关系不便接受，则请向上级或法院请示后再行处理。","type":"paragraph"},{"text":"委托数事如下：","type":"paragraph"},{"text":"一、代付九月份房租55.29元（附现款）。","type":"paragraph"},{"text":"二、武康大楼（淮海路底）606室沈仲章托代修奥米茄自动男手表一只，请交还。","type":"paragraph"},{"text":"三、故老母剩余遗款，由人秀处理。","type":"paragraph"},{"text":"四、旧挂表（钢）一只，旧小女表一只，赠保姆周菊娣。","type":"paragraph"},{"text":"五、六百元存单一纸给周菊娣，作过渡时期生活费。她是劳动人民，一生孤苦，我们不愿她无故受累。","type":"paragraph"},{"text":"六、姑母傅仪寄存我们家存单一纸六百元，请交还。","type":"paragraph"},{"text":"七、姑傅仪寄存之联义山庄墓地收据一纸，此次经过红卫兵搜查后遍觅不得，很抱歉。","type":"paragraph"},{"text":"八、姑母傅仪寄存我们家之饰物，与我们自有的同时被红卫兵取去没收，只能以存单三纸（共370元）又小额储蓄三张，作为赔偿。","type":"paragraph"},{"text":"九、三姐朱纯寄存我们家之饰物，亦被一并充公，请代道歉。她寄存衣箱贰只（三楼）暂时被封，瓷器木箱壹只，将来待公家启封后由你代领。尚有家具数件，问周菊娣便知。","type":"paragraph"},{"text":"十、旧自用奥米茄自动男手表一只，又旧男手表一只，本拟给敏儿与魏惜蓉，但恐怕妨碍他们的政治立场，故请人秀自由处理。","type":"paragraph"},{"text":"十一、现钞53.30元，作为我们火葬费。","type":"paragraph"},{"text":"十二、楼上宋家借用之家具，由陈叔陶按单收回。","type":"paragraph"},{"text":"十三、自有家具，由你处理。图书字画听候公家决定。","type":"paragraph"},{"text":"使你为我们受累，实在不安，但也别无他人可托，谅之谅之！","type":"paragraph"},{"text":" 傅雷梅馥","type":"paragraph"},{"text":" 一九六六年九月二日夜","type":"paragraph"}],"comments":[],"origin":"叶永烈《傅雷之死》，摘自《历史在这里沉思》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3126d8e423"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
