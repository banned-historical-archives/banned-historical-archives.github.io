r":1968,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把派性和无政府主义一起埋葬"},{"type":"paragraph","text":"派性和无政府主义是一对难兄难弟。闹派性的人，同时也闹无政府主义。派性和无政府主义，都是一种反动的社会思潮。它们是阻碍毛主席最新指示条条落实、全面落实的障碍。所以，在围歼派性的“人民战争”中，也一定要把无政府主义扫除干净。"},{"type":"paragraph","text":"不是吗？无政府主义者不分青红皂白，趾高气扬地大喊大叫：“要解放思想”，“要打倒奴隶主义”，“要敢于造反”！在这些人的心目中，什么革命权威，什么组织纪律，全是“老一套”，统统都要“靠边站”。什么党的利益，什么国家的利益，什么人民的利益，全是“空道理”，统统都是口头禅。革命，愿抓就抓，不愿抓就不抓；生产，愿促就促，不愿促就不促；复课，愿复就复，不愿复就不复，谁也无权干涉。总之，合口味的事就干，不合口味的事就甩。"},{"type":"paragraph","text":"热衷于无政府主义的人，他们真的不要政府吗？不！他们要的政府不是无产阶级的政府，而是资产阶级个人主义和派性的“独立王国”。尽管它们一会儿狂热，一会儿逍遥，但是千变万变不离其宗，如同列宁所说的那样：“他们还是站在资产阶级世界观的立场上。”"},{"type":"paragraph","text":"历史是无情的，任何违反历史发展规律和人民愿望的，都会遭到亿万革命群众的抵制。现在派性正在被歼，无政府主义也在被揪。它们可耻的下场已成定局！"},{"type":"paragraph","text":"（《江西日报》二月十三日社论）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb954c9775"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
