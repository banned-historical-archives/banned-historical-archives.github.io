":["吴会劲"],"dates":[{"year":1983,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京七月十六日电　(记者　吴会劲)中国社会科学院领导和科研人员正认真学习《邓小平文选》，他们认为文选的基本精神坚持和发展了毛泽东思想，对四化建设以及社会科学研究工作有极其重要的指导意义。"},{"type":"paragraph","text":"在学习座谈会上，院长马洪说，建设有中国特色的社会主义，需要正确的理论指导，《邓小平文选》把马克思主义的普遍真理同我国社会主义建设的具体实际结合起来，从思想路线、政治路线、组织路线以及基本方针政策上，全面而系统地阐明了在我国进行社会主义现代化建设的重大理论问题和现实问题。他要求社会科学院所有工作人员特别是科研工作者，要努力学好《邓小平文选》，并且写出理论文章，帮助厂大干部和群众更好地理解和掌握《邓小平文选》的精神实质。"},{"type":"paragraph","text":"哲学研究所所长邢贲思说，《邓小平文选》有一条贯穿始终的红线，就是实事求是。文选对马克思主义认识论、对马克思主义思想路线的阐述具有重大的理论意义和现实意义，它为我们党拨乱反正、继往开来、实现历史性的大转变，为十一届三中全会以来党的一系列正确的路线、方针、政策的确立，奠定了思想基础。工业经济研究所副所长吴家骏说，《邓小平文选》中提出的从实际出发，走中国式的现代化道路的思想，是我们实现建设社会主义现代化强国这一目标的重要保证。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b7b39fc4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
