script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"4e24d1d6-8c5c-4de5-9433-2eeeae1d4c14","name":"党的阶级路线是什么——访中共中央接待站","internal":false,"type":"img","official":false,"author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/4e24d1d6-8c5c-4de5-9433-2eeeae1d4c14/1.jpg"],"article":{"title":"党的阶级路线是什么——访中共中央接待站","alias":"","parts":[{"type":"paragraph","text":"党的阶级路线是什么"},{"type":"paragraph","text":"中共中央接待站问：党在学校的阶级路线是什么？"},{"type":"paragraph","text":"有一种提法：（1）有成份输（2）不唯成份（3）重在政治表现·又有一种提法就是十六条上所说的领导要善干发现左派，发展和壮大左派队伍，坚决依靠革命的左派，哪一个是党在学校的阶级路线呢，左派的标准是什么与出身成份关系如何？"},{"type":"paragraph","text":"答：其实二个提法是一回事，头一个是怎样看一个人的成份，在学校来说，就是出身，看成份·没有成份就是旧市委的修正主义的阶级路线·我们要耕成份，就是要强调家庭影响，要看清这种影响，不唯成份输就是说出身不好，不一定不革命，不能光看成份，要重在政治表现，所谓政治上表现，不只看学习上的表现，要看学习主席著作的态度，执行党的政策情况，在历次政治运动中的表现，对劳动的态度，与餐下中农的关系，这条不仅适用黑五类子女，同样也适用于其他出身和红五类出身的子女·第二个是党的领导要善于发现左派，发展壮大左派的人伍，坚决依靠革命的左派·左派的标准\u003c红旗\u003e七月份或八月份有说·左派的大致标准是："},{"type":"paragraph","text":"1.无限热爱毛主席，毛泽东思想，努力活学活用毛泽东思想。2坚决执行党的政策“十六条”。3.无产阶级立场坚定，敢于斗净，不敢于斗争不成。4能狗联系广大群众，单枪匹马不成。"},{"type":"paragraph","text":"5有勇于批部与自我批的精神，不能人为别人全不对，自己全对，非红五类或黑七类出身的人，只要严格要求自己，坚决与自己家庭划清界限，进行脱胎换骨的改造，经过斗争考验，也可成为左派。"},{"type":"paragraph","text":"一完一\u003c抄于清华\u003e"}],"authors":[],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddc260473c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
