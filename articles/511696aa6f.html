做得好上海计算机打字机厂革委会抓住清队定案中阶级斗争的新动向，发动群众再次把嚣张起来的敌人斗倒批臭，保证了党的政策的落实","authors":[],"dates":[{"year":1969,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海计算机打字机厂革命委员会，在清理阶级队伍工作中，狠抓革命的大批判。深深体会到革命大批判是克敌制胜最有力的武器，要做好定案工作，必须狠抓一个“批”字。"},{"type":"paragraph","text":"有些同志曾错误地认为批不批都一样，“反正从宽处理，何必做难人”，还说“早知如今，何必当初。”因而放松了革命的大批判。这时一小撮阶级敌人便嚣张起来。有的叫喊自己是“受害者”，企图蒙蔽群众，有一个特务分子，还写了洋洋千言的“告状书”，妄图翻案。"},{"type":"paragraph","text":"厂革委会立即举办了学习班，总结经验和教训，用党的政策武装群众，进一步提高群众的政策水平，使广大革命群众认识到，“大批判松一松，敌人就要攻一攻。”不抓大批判，阶级敌人不倒，资产阶级思想不臭，群众不能得到教育。要认真落实无产阶级政策就必须以革命大批判开路。那种“何必当初”、“何必做难人”的想法是错误的，深入开展革命大批判是做好定案工作的前提。"},{"type":"paragraph","text":"厂革委会还举办了被审查对象的学习班，进一步对他们交代政策。对经过审查，认罪服罪比较好并已定案的对象，让他们在学习班上现身说法，使被审查对象敢于交代问题，敢于上纲上线地进行自我批判。"},{"type":"paragraph","text":"厂革委会发动群众在全厂掀起了革命大批判的热潮，车间批，班组批，大大小小的批斗会接二连三，敌人翘尾巴时，再一次发动群众，把他们斗倒批臭。"},{"type":"paragraph","text":"“批”字当头，积极做好定案处理工作，保证了对敌斗争政策的落实。他们对审查对象分别作了定案处理，通过批判，阶级敌人的面目越来越清楚，使一小撮顽固的敌人越来越孤立，从宽处理的对象，也狠触了灵魂。革命群众深有体会地说:“批倒了敌人，长了无产阶级的志气，也锻炼了我们的意志”。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"511696aa6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
