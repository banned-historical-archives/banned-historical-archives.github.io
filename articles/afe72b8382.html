s":[],"dates":[{"year":1974,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e杜鹃山农民自卫军党代表柯湘。她坚决贯彻执行毛主席的建军路线，用无产阶级思想改造农民自卫军，使它最后成为中国工农革命军的一部分。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e杜妈妈责备雷刚不听柯湘劝阻，莽撞下山，铸成大错，雷刚悔恨交加。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e李石坚带来共产党来到杜鹃山的好消息，雷刚等兴奋异常，决定劫法场，抢一个共产党员领路向前。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e柯湘在刑场上大义凛然，怒斥反动地主靖卫团头子毒蛇胆。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e农民自卫军在党的领导下进行了整训，面貌一新。队长雷刚入党后，学习、练兵都非常努力。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“阶级情，海样深，同命运，一条心!往年同受同样苦，今朝同把冤仇伸”。当雷刚误将推车雇工田大江当作“土豪”欲加责打时，柯湘用党的阶级路线教育雷刚，结果雷刚悔悟，田大江参军，广大农民自卫军战士也提高了阶级觉悟。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e鹃花似火，红旗招展。自卫军会合主力，全歼靖卫团，编入工农革命军，开赴井冈山，去见毛委员。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745p040108.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e柯湘依靠党支部，制定战斗方案，营救雷刚。"},{"type":"paragraph","text":"本版照片均新华社稿\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afe72b8382"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
