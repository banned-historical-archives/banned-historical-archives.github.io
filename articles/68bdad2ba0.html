ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"我后路不被隔断的条件下主力可留普击故","alias":"","parts":[{"type":"paragraph","text":"我后路不被隔断的条件下"},{"type":"paragraph","text":"主力可留晋击敌！"},{"type":"paragraph","text":"（1938年3月3日）朱、彭同志："},{"type":"paragraph","text":"彭电?悉。八路主力留普击敌，后路必须在黄河、汾河不被隔断之条件下，否则对于整个抗战及国共关系是非常不利的。尤其你们二人必须回来，即使留一人指挥，亦只宜留在不被隔之地点（如吕梁山脉），决不应留在汾河以东。因此，对总部之转移及徐旅?与刘师主力之部署，务望本此方针，考虑切实妥善方法，并速告我们。"},{"type":"paragraph","text":"洛甫泽东弼时"},{"type":"paragraph","text":"三日五时"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天)、八路军政治部主任任弼时给朱德、彭德怀的电报。"},{"type":"paragraph","text":"[2]指1938年3月1日彭德怀就战略问题给毛泽东、洛甫（张闻天）等的电报。该电同意毛泽东1938年2月23日关于阎锡山卫立煌所部及八路军全部暂留华北作战的意见，提出：“我在华北愈能持久削弱敌人，对全局抗战更有利”“不到最后万不得已时决不应变更此计划”。"},{"type":"paragraph","text":"[3]总部，指八路军总指挥部。[4]徐旅，指八路军第一一五师第三四四旅，旅长徐海东。[5]刘师，指八路军第一二九师，师长刘伯承。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":66,"page_end":66},"tags":[{"name":"毛泽东","type":"人物"},{"name":"张闻天","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68bdad2ba0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
