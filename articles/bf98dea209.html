<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反透右倾　鼓足干劲　以文化革命促进技术革命大抓扫盲工作　办好职工业余学校上海职工业余教育工作者交流经验力争夺取更大的胜利","authors":[],"dates":[{"year":1959,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市职工业余教育工作者600多人，昨天举行职工业余教育经验交流会。中共上海市委教育卫生工作部副部长、上海市教育局局长陈琳瑚在会上号召职工业余教育工作者认清当前有利形势和自己的光荣任务，以文化革命促进技术革命，进一步促进工农业生产大跃进。"},{"type":"paragraph","text":"陈琳瑚分析了当前形势后说，上海职工业余教育十年来已经获得了巨大的成绩，特别是去年有了巨大跃进，一年内就扫除了文盲50多万人，进业余中学的职工达到31万人。但根据工农业发展的形势，当前职工业余教育工作要与工农业生产相适应，还必须作更大的努力。要做好当前工作，首先必须认真学习党的八届八中全会决议，反右倾，鼓干劲，提高思想认识，明确方向。组织当前的职工业余教育大跃进，准备明年更大的跃进。其次必须大抓扫盲工作，大力办好职工业余学校。使脱盲的学员绝大部分能进入业余小学学习。重视培养干部，积极总结经验，特别要重视总结文化革命促进技术改革和劳动生产的经验。对去年教育革命以来创造的积极成果，如扫盲中班级教学与分散教学相结合等经验都必须坚持加以发展提高。陈琳瑚最后要求职工业余教育工作者在各项工作中不但应该有明确的目标，还要有正确的方法。敢于打破陈规，充分发动群众，鼓足干劲，乘风前进，争取职工业余教育得到更大的发展和提高。"},{"type":"paragraph","text":"会上，上海冶炼厂、港务局杨浦区装卸作业站、上海第一电机织袜厂、新成区福利事业公司、中工电容器厂等单位的业余学校或红专学校的负责同志介绍了发展和巩固职工业余教育的经验。上海冶炼厂党委由于把业余教育列为重要工作之一，经常抓思想、抓组织，把生产、学习和生活进行统一安排。采取了车间办学，分级管理、层层包干，不断改进教学，提高学习质量，结合生产竞赛进行对口评比等办法，业余教育得到了不断的巩固与提高，今年上半年期终出席率达到87.1%，下半年有条件入学的职工97.3%都已报名入学。新成区福利事业公司包括理发、照相、洗染、旅馆、沐浴等五个行业，地区分散、文化水平不齐，但由于党支部抓紧了政治思想工作、结合生产全国安排职工的学习、生活，学习方式灵活多样，上学期期终巩固率达到90.4%，提高了职工觉悟，推动了生产。"},{"type":"paragraph","text":"到会的职工业余教育干部和教师在讨论中热烈发言，他们表示:要认真学习党的八中全会文件和兄弟单位的先进经验，反右倾，鼓干劲，实现职工业余教育工作的继续大跃进。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1959\\11\\59b4020201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e申新九厂职工业余学校布厂分校六年级甲班学生在上语文课"},{"type":"paragraph","text":"(本报记者　锺志仁摄)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e锺志仁\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf98dea209"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
