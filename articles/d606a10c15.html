art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“先天不足后天补”一五六医院帮助文化大革命中的大学生提高业务水平","authors":["一正"],"parts":[{"type":"paragraph","text":"本报讯 一五六医院党委对于文化大革命中大学毕业参加工作的人员，采取“先天不足后天补”的办法，帮助他们不断提高业务技术水平。"},{"type":"paragraph","text":"这个医院的所有普通军医中，文化大革命中入校的大学生占百分之六十二，在临床科的普通军医中所占的比例达到百分之七十三，有些科室由这些医生独挡一面，成为军医队伍中的重要力量。党委在研究他们的情况时认为，这些大学毕业生的质量不太高，是林彪、“四人帮”的破坏造成的。文化大革命造成的政治损失要补，经济损失要补，人才损失也要千方百计地补回来。对这些同志不另眼相待，要积极帮助他们不断提高业务技术水平。"},{"type":"paragraph","text":"医院采取如下几种方法帮助他们：一是举办脱产、半脱产或不脱产的专业集训队、短训班。他们自一九七八年以来就举办过免疫学基础、X光诊断基础、英语等各类集训、短训班八期，全院所有文化大革命中入校的大学生都参加了学习。二是举办专题讲座。近一年来，医院举办了多种专题讲座，各科室也经常结合本科业务举办讲座。三是由老同志带徒弟，在使用中培养。外科、妇产科的老同志在中、小手术中“放手不放眼”，尽可能“坐镇”，由文化革命中入校的大学生操作；较大手术尽可能当助手，指点他们操作；难度更大的手术，要他们当助手，或在一旁观看学习。内科长期坚持采用教学查房的形式，老同志结合实际病例，出题点将要他们回答，引导他们讨论。四起送出进修。这些同志有半数以上的人已外出进修过，有的进修过三次。有时科里工作忙，医院就想方设法调配人力，保证他们外出进修。此外，医院还安排他们登台讲业务课，协同化岗位练兵中“唱主角”，讨论病案时重点发言，吸收参加科研，组织外出听学术报告，进行业务考核等，促进他们不断提高业务水平。"},{"type":"paragraph","text":"粉碎“四人帮”以来，这个医院文化大革命中毕业的大学生业务水平有了明显提高。去年年底，全院进行专业技术大考核，这些大学生平均分数达九十五分，其中百分之六十一的人取得优秀成绩。经过考核和业务评定，已有半数以上同志达到了总后制定的中年制或驻军医院军医的技术要求。（一正）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d606a10c15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
