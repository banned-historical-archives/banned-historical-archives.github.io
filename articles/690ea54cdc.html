art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的教导使我们懂得了革命","authors":["某部长途电话站话务员吕英菊"],"parts":[{"type":"paragraph","text":"站在天安门广场上，站在我们最敬爱的领袖毛主席的面前，我们感到无比幸福，无比激动。毛主席啊！您的话，我们革命战士最爱听；您的书，我们革命战士最爱读；您给我们指出的革命道路，我们坚决走到底。"},{"type":"paragraph","text":"回想几年前，我们刚参加革命的时候，都是一些刚摘下红领巾的学生，满身都是孩子气。分配到电话站，看到总机上红绿灯直闪，觉得挺有意思，可是干不多久就产生了不安心本职工作的思想，觉得成天坐在那里插插拔拔，拨拨号盘，没有什么技术，没有什么前途。特别是当受到用户批评的时候，心里更是十分委屈。领导上要我们带着问题学习了《为人民服务》、《纪念白求恩》，我们和张思德、白求恩同志一条一条做了对比，逐渐认识到自己思想上多了“个人主义”四个字，少了“完全”“彻底”四个字，逐渐认识到我们的具体工作虽然是平凡的，但是为人民服务的意义却是伟大的。看起来两根塞子接一接没有什么了不起，可却把许多部门的工作联系起来了。每当接通一个电话，就是为革命尽了一分力量。从此我们对守机工作越干越爱干，越干越感到我们工作的重要性。毛主席的教导使我们懂得了革命就是斗争，斗争就是幸福。这几年我们台始终坚持活学活用毛主席著作，用毛泽东思想和“我”字作斗争，树立一心为革命，一切为革命的思想，使我们台连续获得四好称号。许多同志光荣地入党入团了。"},{"type":"paragraph","text":"现在，我们台的同志，最爱唱《大海航行靠舵手》这首歌，用来表达我们对伟大领袖毛主席的深厚阶级感情。大家都说：“鱼儿离不开水，瓜儿离不开秧，革命战士一刻也离不开毛泽东思想。”我们向党向毛主席宣誓，我们要永远活学活用毛主席著作，永远跟着毛主席闹革命；永远沿着伟大领袖毛主席开辟的革命航道奋勇前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"690ea54cdc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
