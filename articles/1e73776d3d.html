民族民主教育学习访华团成员进行亲切友好谈话","authors":[],"dates":[{"year":1971,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张春桥姚文元郭沫若同志会见日本的两个访华团"},{"type":"paragraph","text":"同日中友协（正统）友好学生访华团和日本民族民主教育学习访华团成员进行亲切友好谈话"},{"type":"paragraph","text":"新华社九日讯　中共中央政治局委员张春桥、姚文元，人大常委会副委员长、中日友协名誉会长郭沫若，今天晚上会见了由团长铃木正实、秘书长池田直隆、日中友协（正统）中央本部代表齐藤和弘率领的日中友协（正统）友好学生访华团和由团长森胁保、秘书长富田和夫、顾问大类纯率领的日本民族民主教育学习访华团的全体成员。"},{"type":"paragraph","text":"张春桥、姚文元、郭沫若同志同日本朋友进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，有关方面负责人和工作人员张香山、狄文蔚、王晓云、郑玉珠、张雨、丁民、庄则栋、林丽韫，以及首都大专院校师生代表任守榘、秦金华、葛雷、王庆在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e73776d3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
