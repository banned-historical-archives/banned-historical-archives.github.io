揭露林彪推行右倾机会主义路线的反动面目","authors":[],"dates":[{"year":1974,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社沈阳一九七四年九月七日电　人民解放军锦州军分区部分指战员，最近在塔山与当地群众和民兵一起召开批判会，联系辽沈战役中两条路线斗争实际，批判林彪推行资产阶级军事路线，诬蔑东北军民，一再对抗毛主席关于辽沈战役的战略决策和作战方针的罪行。"},{"type":"paragraph","text":"塔山是辽沈战役的重要战场之一。著名的“塔山阻击战”就是在这里进行的。它为保证我军迅速攻克锦州，夺取辽沈战役的伟大胜利起了重要的作用。锦州军分区指战员和塔山地区的人民群众中，有不少人亲身参加过打锦州、守塔山的战斗，对于毛主席的《关于辽沈战役的作战方针》的英明正确体会特别亲切，对于林彪一再对抗毛主席的伟大战略决策的罪行，特别气愤。"},{"type":"paragraph","text":"在批判会上，一些参加过辽沈战役的老战士和支前老民兵，以当年军民并肩作战，人民踊跃支前的许多动人事迹，怒斥林彪诬蔑辽沈前线“群众条件差”，借口“粮食有困难”，公然对抗毛主席关于我军南下北宁线的指示的罪行。锦州军分区副政委徐振山说，辽沈战役期间，我在三纵队某部任指导员，亲眼看到东北人民参军参战、英勇支前的动人情景。义县攻坚战，是扫清锦州外围的重要一仗。我们攻打义县因大凌河受阻，周围的群众立即赶着十几辆大车，拉着几十块门板，搭起一座浮桥，使部队迅速渡过大凌河，攻克了义县城。我军攻打绥中、兴城，兴城县凉水泉地区的民兵在民兵英雄孙义的带领下，在望海一带扒铁道，割电线，炸岗楼，密切配合部队在梨树沟门歼灭了蒋军一个师。林彪胡说什么这些地区的“群众条件差”，完全是睁着眼睛说瞎话。塔山阻击战支前老民兵王云成说:塔山阻击战前，我们塔山堡人民受国民党反动派的残酷压榨，对敌人怀有深仇大恨，日夜盼望得到解放。当解放军开进村后，乡亲们立即腾出三百多间房接待亲人，还出动了二百多人，连续三个晚上同战士们一道挖战壕。为了帮助解放军修工事，乡亲们纷纷把炕沿、门板和准备修房用的木料贡献出来。老民兵王树德把藏了多年的木料亲自送到前沿阵地。老贫农范同发在支前中献出了宝贵的生命。林彪胡说“群众条件差”，这是对我们辽西人民的恶毒诬蔑!锦州军分区政治部干事王树森说，林彪所谓“粮食有困难”也是一派胡言。当年广大群众为了辽沈战役的胜利，尽自己最大的努力，为部队提供粮食。在塔山阻击战中，塔山村的群众组织了三十多盘碾子，昼夜给部队碾米，及时送到前线，保证了战斗的胜利。事实说明，林彪的所谓“粮食有困难”，除了暴露他眼里根本没有人民群众，看不到人民支前的强大力量以外，完全是为他不敢南下北宁线作战的右倾机会主义路线制造的一个借口。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\09\\7498010501.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e亲身参加过塔山阻击战的二连老战士、战斗英雄、副师长李培江，回到连队向大家讲战例，共同学习毛主席的英明指示，批判林彪对抗毛主席指示的罪行。　新华社记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7332bbea57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
