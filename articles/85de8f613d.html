script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji46","name":"毛泽东全集第46卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"给胡志明的复信和关于复信的批语","alias":"","parts":[{"type":"paragraph","text":"给胡志明的复信和关于复信的批语"},{"type":"paragraph","text":"（1963年12月26日、27日）请少奇、小平再阅后，交尚昆办。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"廿六日"},{"type":"paragraph","text":"二亲爱的胡志明同志："},{"type":"paragraph","text":"几次来信，都已收到，甚为感谢。中苏谈判，几个月后可以开第二次会，目前几个月内还不宜开，因为没有什么新鲜的话好讲。在十一个党会议上共同商定政策以后，中苏就可以开会了。看来不止谈三四次，可能要谈十几次或几十次，谈几年到十几年，才能谈"},{"type":"paragraph","text":"[1]胡志明，当时任越南共产党中央委员会主席、越南民主共和国主席。"},{"type":"paragraph","text":"[2]少奇，即刘少奇。小平，即邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"},{"type":"paragraph","text":"给胡志明的复信和关于复信的批语出个有利于革命有利于真正团结的结果来。对此我们是有耐心的。自前国际形势很好，料想你和你的战友们也感觉到了。听说你们的中央全会开得很好，谨致热烈的祝贺。新年将到，敬致贺忧。"},{"type":"paragraph","text":"毛泽东一九六三年十二月二十七日"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":12,"day":26},{"year":1963,"month":12,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":176,"page_end":177},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85de8f613d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
