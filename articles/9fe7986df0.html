art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"照毛主席指示办事就无往不胜","authors":[],"parts":[{"type":"paragraph","text":"林副主席指示说：“我们的一切成就，一切胜利，都是在毛主席的英明领导下取得的，都是毛泽东思想的胜利。”我国第一颗人造地球卫星发射成功，象我们所取得的各项胜利一样，是我国人民紧跟伟大领袖毛主席的战略部署，对毛主席的指示坚决照办，坚持独立自主、自力更生方针，贯彻执行鼓足干劲，力争上游，多快好省地建设社会主义总路线，以实际行动抓革命，促生产，促工作，促战备的结果。这一伟大胜利，又一次雄辩地证明，只要坚决照毛主席的指示办事，我们就能攀登科学技术高峰，创造任何人间奇迹。"},{"type":"paragraph","text":"在热烈欢呼我国第一颗人造地球卫星发射成功的大喜日子里，回顾我们连队几十年来的战斗历程，我们深深体会到，坚决照毛主席的指示办事，就无往而不胜，就能克服一切困难，战胜一切敌人。在解放战争中，在林副主席的直接指挥下，我们坚决贯彻执行毛主席关于“建立巩固的东北根据地”的伟大战略方针和有关的一系列作战命令，迎来了东北和全中国的解放。在朝鲜战场上的黄草岭战斗中，我们牢记毛主席的伟大教导：“这个军队具有一往无前的精神，它要压倒一切敌人，而决不被敌人所屈服。不论在任何艰难困苦的场合，只要还有一个人，这个人就要继续战斗下去。”坚守阵地，寸土不让，经过三天三夜的血战，打退了敌人的二十多次冲锋，歼敌二百五十多名，取得了战斗的胜利。在社会主义革命时期，特别是林副主席主持军委工作以来，我们坚决响应林副主席关于“读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士”的号召，掀起了活学活用毛泽东思想的高潮，积极开展四好连队运动，连队革命化、战斗化建设又取得了新的成绩。"},{"type":"paragraph","text":"今后，我们一定要更高地举起毛泽东思想伟大红旗，进一步贯彻执行毛主席关于“提高警惕，保卫祖国”，“备战、备荒、为人民”的伟大战略方针，进一步全面落实四好，不断提高部队的战斗力，时刻警惕美帝国主义、社会帝国主义对我国发动大规模侵略战争的阴谋，随时准备为保卫伟大的社会主义祖国作出新贡献。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fe7986df0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
