租关系者处理办法的指示","authors":[],"dates":[{"year":1950,"month":12,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央西南局关于减退中在外区有佃租关系者处理办法的指示","type":"title"},{"text":"西南局曾于12月25日通报川东、重庆有关两区退押采取联合算账、联合斗争、联合分配的办法。为进一步贯彻团结内部、一致对敌、充分发动群众，特再综合各地经验，补充规定以下几点：","type":"paragraph"},{"text":"（一）凡农民到邻区退押者，均须通过邻区党委处理，不得自行到地主家中亲自动手。必须扣捕之恶霸地主，亦应通过邻区党委，由当地政府扣捕，不能自行动手。","type":"paragraph"},{"text":"（二）凡本省区范围内属于全省区性的大地主，由省区农协统一进行退押；属于一个专署、一个县、一个区乡的大地主则由专署、县、区的农协统一退押。如系恶霸，则应交由人民法庭结合当地群众的斗争进行判处。","type":"paragraph"},{"text":"（三）凡各省区在邻区有租佃关系者，统一由邻区农协办理，必要时可设农协联合办事处。农民代表去邻区进行退押时，必须有区农协以上之介绍信，并有干部带领，并应先与邻区县以上农协接洽，以便统一办理。如无代表去时，应将押金材料送交邻区农协代为办理。","type":"paragraph"},{"text":"（四）所有果实分配，凡涉及两地区者，均按原佃分配。在原佃基础上必要的调剂，可由各该地区分别统一处理，不应互相争夺。要注意天下农民是一家的教育。以上各点请研究参考。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（上）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2134af69e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
