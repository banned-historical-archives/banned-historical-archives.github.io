ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于《各民主党派联合宣言》给胡乔木的信","alias":"","parts":[{"type":"paragraph","text":"关于《各民主党派联合宣言》"},{"type":"paragraph","text":"给胡乔木的信"},{"type":"paragraph","text":"（1950年11月4日）乔木，并徐冰同志："},{"type":"paragraph","text":"此件请乔木即印清样七份，印好后以四份分送毛、周、刘、朱，以三份交徐冰，请徐冰于今日下午再找李济深、黄炎培、罗隆基三人一阅，取得同意，于今日下午七时以前退回我。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月四日上午九时[1]胡乔木，当时任毛泽东的秘书。[2]徐冰，当时任中共中央统战部副部长。"},{"type":"paragraph","text":"[3]指包括中国共产党在内的各民主党派1950年11月4日关于全力拥护抗美援朝保家卫国的《各民主党派联合宣言》。"},{"type":"paragraph","text":"[4]李济深，当时任中国国民党革命委员会主席。黄炎培，当时是中国民主建国会主要负责人。罗隆基，当时任中国民主同盟中央常务委员、宣传委员会主任。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":346,"page_end":346},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"书信"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1af83a2f22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
