s":[{"year":1975,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见美国前总统尼克松的女儿朱莉夫妇"},{"type":"paragraph","text":"会见时，朱莉首先向毛主席转达她父亲的问候。毛主席同他们在亲切友好的气氛中进行了谈话。谈话结束时，毛主席请他们回国以后向理查德·尼克松转达他的问候，并且表示欢迎尼克松先生再次前来中国访问"},{"type":"paragraph","text":"新华社一九七五年十二月三十一日讯　毛泽东主席今天晚上会见了美国前总统理查德·尼克松的女儿朱莉·尼克松·艾森豪威尔和她的丈夫戴维·艾森豪威尔。会见时，朱莉首先向毛主席转达她父亲的问候。她说：我为有机会当面向毛主席转达我父亲的问候感到荣幸。我父亲和母亲对于他们的一九七二年中国之行，都有着深刻的印象。戴维也向毛主席转达了他的家族的问候。毛主席同他们在亲切友好的气氛中进行了谈话。谈话结束时，毛主席请他们回国以后向理查德·尼克松转达他的问候，并且表示欢迎尼克松先生再次前来中国访问。"},{"type":"paragraph","text":"会见时在座的有乔冠华外长，黄镇主任，王海容副外长，唐闻生、章含之副司长。（附图片）"},{"type":"paragraph","text":"毛泽东主席会见美国前总统尼克松的女儿朱莉夫妇。"},{"type":"paragraph","text":"新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a87b92a4bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
