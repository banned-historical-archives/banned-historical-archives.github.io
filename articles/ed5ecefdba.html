"year":1976,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用战斗来巩固发展文化大革命胜利成果"},{"type":"paragraph","text":"西藏隆子县列麦公社翻身农奴理论骨干，以毛主席的重要指示为锐利思想武器，运用列麦公社在文化大革命推动下发生的翻天覆地的变化，驳斥党内那个不肯改悔的走资派刮右倾翻案风的种种谬论。"},{"type":"paragraph","text":"民主改革后，由于刘少奇修正主义路线的破坏，列麦农牧区发生了严重的两极分化，阻碍了生产力的发展。经过无产阶级文化大革命，批判了修正主义路线，翻身农奴的社会主义积极性不断高涨，在封建农奴制的废墟上建立了人民公社。在斗争中，社会主义新生事物大批涌现，生产不断发展。粮食单产连年上“纲要”，牲畜由五千七百多头发展为一万二千多头，成为西藏农业学大寨的一面红旗。"},{"type":"paragraph","text":"翻身农奴理论骨干说：今天列麦这种“莺歌燕舞”的大好形势，不是埋头生产得来的，而是在文化大革命中，我们以阶级斗争为纲，与天斗，与地斗，与阶级敌人斗，七斗八斗斗出来的。文化大革命代表了我们百万翻身农奴的根本利益。他们决心把反击右倾翻案风的斗争进行到底，用战斗来巩固和发展无产阶级文化大革命的胜利成果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed5ecefdba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
