],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:看了三反纪录影片第一、二、三号，给我上了一堂结结实实的深刻、丰富的政治大课。同时，在我们的思想上更清楚地分明了热爱(志愿军)和憎恨(奸商)的界线。在活生生的具体事例面前，我们看到一个明显的对照:一面是志愿军归国代表大公无私、伟大光荣的高贵品质与革命的英雄气概；另一面却是伤天害理、人面兽心的万恶奸商。从这里，我们进一步的认识到不法资本家的损人利己、唯利是图、投机取巧、享乐腐化的腐朽本质。"},{"type":"paragraph","text":"影片通过艺术的形象强有力的说明了:我们决不能走资本主义腐朽的道路，我们一定要走社会主义的路；在这条光明的道路面前，我下定决心，要在以三反为中心的思想改造学习运动中，和资产阶级思想划清界线，肃清资产阶级腐朽思想的残余。"},{"type":"paragraph","text":"虹口中学学生　裘祖苏　蒋大年"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd75e96d5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
