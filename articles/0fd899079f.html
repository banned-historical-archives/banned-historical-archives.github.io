阶级敌人的罪行","authors":[],"dates":[{"year":1976,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以雷锋为榜样　保卫无产阶级专政"},{"type":"paragraph","text":"雷锋同志生前所在团坚决拥护党中央决议，批判邓小平和阶级敌人的罪行"},{"type":"paragraph","text":"据新华社沈阳电　人民解放军沈阳部队某部雷锋生前所在团的广大指战员象雷锋同志那样，以爱憎分明的阶级立场，坚决拥护中共中央关于华国锋同志任中共中央第一副主席、国务院总理的决议，关于撤销邓小平党内外一切职务的决议，愤怒声讨邓小平的反动罪行和在天安门广场制造反革命政治事件的一小撮阶级敌人的罪行。表示要以反击右倾翻案风的实际行动，保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线，保卫无产阶级专政。"},{"type":"paragraph","text":"这个团的全体指战员从广播里听到中共中央的两个决议后，群情激奋，欢欣鼓舞。党委书记、政治委员景永春一针见血地指出，发生在天安门广场的这起反革命政治事件，是一小撮阶级敌人有预谋、有组织、有计划的反革命行动。在这场你死我活的阶级斗争面前，我们要象雷锋同志那样，立场坚定，旗帜鲜明地坚决站在毛主席革命路线一边，同邓小平的修正主义路线以及一小撮阶级敌人的反革命行径斗争到底。雷锋班的战士们表示，要象雷锋同志那样，时刻牢记毛主席的教导，以阶级斗争为纲，紧跟伟大领袖毛主席的战略部署，坚决批判邓小平的修正主义路线，彻底粉碎他妄图变天复辟的阴谋。"},{"type":"paragraph","text":"这个团从反击右倾翻案风斗争开展以来，广大指战员同仇敌忾，斗志昂扬，揭发批判了邓小平搞复辟倒退的罪行。从天安门广场发生的反革命政治事件中，他们进一步看穿了邓小平提出的“三项指示为纲”的修正主义纲领的反动实质。雷锋生前战友、副团长于泉洋说，邓小平大肆鼓吹阶级斗争熄灭论，果真熄灭了吗？天安门广场的这起反革命政治事件，正是当前阶级斗争尖锐激烈的表现。活生生的阶级斗争事实，说明了阶级斗争一时一刻也没有熄灭。我们革命战士一定要听毛主席的话，以阶级斗争为纲，时刻保持高度的革命警惕，为巩固无产阶级专政而英勇奋斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fd899079f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
