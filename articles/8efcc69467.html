script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对我军南进的三点意见","alias":"","parts":[{"type":"paragraph","text":"对我军南进的三点意见"},{"type":"paragraph","text":"（1947年8月12日）刘、邓，并告陈、粟："},{"type":"paragraph","text":"有三点请你们勘酌："},{"type":"paragraph","text":"（一）鉴于二万五千里长征时期休息太少，疲劳太甚，减员太多，而那种性急有许多是不必要的；此次我军南进，必须减少不必要的性急，力争少走路、多休息；情况紧张时应当走几天长的，但应跟着休息几天，恢复疲劳。"},{"type":"paragraph","text":"（二）在目前几个星期内，必须避免打大仗，专打分散薄弱之敌，不打集中强大之敌，待我军习惯于无后方外线行动，养精蓄锐，又在有利于我之敌情、地形条件下，方可考虑打大仗。"},{"type":"paragraph","text":"（三）不要希望短期内就能在大别山、豫西、皖西等地建立巩固根据地，这是不可能的，这些都只能是临时立足点。必须估计到我军要有很长时间（至少半年）在江河之间东西南北地区往来机动，宣传群众，发动群众，并在歼灭敌人几十个旅之后，方能建立巩固根据地。"},{"type":"paragraph","text":"[1]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。"},{"type":"paragraph","text":"[2]陈、粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。"},{"type":"paragraph","text":"（四）以上三点，如刘邓认为可行，则请告知陈唐、叶陶\"一体遵行，使大家有精神准备，以利战胜蒋介石。"},{"type":"paragraph","text":"军委未文"},{"type":"paragraph","text":"中尔"},{"type":"paragraph","text":"行"},{"type":"paragraph","text":"你虎劳低毛泽东为中共中央军委起草的《对我军南进的三点意见》的手稿。"},{"type":"paragraph","text":"[1]陈唐，指陈士、唐亮，当时分别任华东野战军参谋长和政治部主任。叶陶，指叶飞、陶勇，当时分别任华东野战军第一纵队司令员和第四纵队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":202,"page_end":203},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8efcc69467"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
