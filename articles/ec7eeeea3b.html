art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入批判邓小平的反动罪行","authors":["黄继光生前所在连全体同志"],"parts":[{"type":"paragraph","text":"几天来，我们全连指战员收听了中共中央两个决议和关于粉碎天安门广场反革命政治事件的报道，心情无比激动。我们党支部七日晚就连夜召开支委会进行学习和讨论，各班排立即召开了座谈会、批判会。到深夜，大家还挥笔写大批判稿。几天来，全连呈现出一派群情激昂、紧张战斗的气氛。我们愤怒批判和声讨党内最大的不肯改悔的走资派邓小平的反动罪行，愤怒声讨在天安门广场制造反革命事件的一小撮反革命分子的滔天罪行。大家一致表示，党中央的两个决议，是伟大领袖毛主席、党中央的英明决策，表达了全国人民的共同心愿，说出了革命战士的心里话。我们一定要紧跟伟大领袖毛主席的战略部署，深入开展反击右倾翻案风的伟大斗争，彻底批判邓小平搞修正主义、复辟资本主义的罪行，不获全胜，决不收兵。"},{"type":"paragraph","text":"伟大领袖毛主席指出：“一九四九年提出国内主要矛盾是无产阶级对资产阶级之间的矛盾。十三年后重提阶级斗争问题，还有形势开始好转。文化大革命是干什么的？是阶级斗争嘛。刘少奇说阶级斗争熄灭论，他自己就不是熄灭，他要保护他那一堆叛徒、死党。林彪要打倒无产阶级，搞政变。熄灭了吗？”毛主席这一指示一针见血地揭露了刘少奇、林彪、邓小平贩卖的阶级斗争熄灭论的反动性和欺骗性。反击右倾翻案风的斗争正在全国胜利开展的时刻，一小撮反革命分子在天安门广场制造反革命政治事件，丧心病狂地把矛头指向我们伟大领袖毛主席，猖狂反对反击右倾翻案风的伟大斗争，这充分说明，阶级斗争并没有熄灭，而是十分激烈、尖锐。严重的阶级斗争现实，使我们更加认清了在无产阶级专政下革命的对象是资产阶级，重点是党内走资本主义道路的当权派，走资派还在走。我们在整个社会主义历史阶段，都必须坚持以阶级斗争为纲，坚持无产阶级对资产阶级的斗争。"},{"type":"paragraph","text":"中国人民解放军是无产阶级专政的坚强柱石。我们全连指战员坚决表示，一定认真学习伟大领袖毛主席的一系列重要指示，发扬黄继光对敌斗争一往无前的革命精神，在反击右倾翻案风的伟大斗争中打冲锋，深入批判邓小平妄图颠覆无产阶级专政、复辟资本主义的罪行，用实际行动保卫伟大领袖毛主席，保卫党中央，保卫毛主席的无产阶级革命路线，保卫伟大的社会主义祖国，和全国人民一道，把反击右倾翻案风的伟大斗争进行到底！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec7eeeea3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
