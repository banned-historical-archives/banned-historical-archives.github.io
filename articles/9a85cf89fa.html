art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"时事小测验","authors":[],"parts":[{"type":"paragraph","text":"填空题："},{"type":"paragraph","text":"1、到目前为止，我国已同（  ）个国家建立外交关系，其中亚洲（  ）个，非洲（  ）个，欧洲（  ）个，北美洲（  ）个，南美洲（  ）个，大洋洲和太平洋岛屿（  ）个。"},{"type":"paragraph","text":"问答题："},{"type":"paragraph","text":"2、著名的和平共处五项原则的内容是什么？"},{"type":"paragraph","text":"上期答案"},{"type":"paragraph","text":"一、填空题："},{"type":"paragraph","text":"中国共产党第十一届中央委员会第六次全体会议，6月27日至29日在北京举行。全会一致通过《关于建国以来党的若干历史问题的决议》。全会对中央主要领导成员进行了改选和增选，选举结果是：胡耀邦同志为中央委员会主席；赵紫阳同志、华国锋同志为中央委员会副主席；邓小平同志为中央军事委员会主席；中央政治局常委会由中央主席和副主席组成，他们是：胡耀邦、叶剑英、邓小平、赵紫阳、李先念、陈云、华国锋。习仲勋同志为中央书记处书记。这次会议将以在党的指导思想上完成拨乱反正的历史任务而载入史册。"},{"type":"paragraph","text":"二、问答题："},{"type":"paragraph","text":"《关于建国以来党的若干历史问题的决议》的主要内容是什么？"},{"type":"paragraph","text":"1、实事求是地评价了毛泽东同志在中国革命中的历史地位，科学地阐明了毛泽东思想，充分论述了毛泽东思想作为我们党的指导思想的伟大意义。"},{"type":"paragraph","text":"2、对建国三十二年来党的重大历史事件特别是“文化大革命”作出了正确的总结，科学地分析了在这些事件中党的指导思想的正确和错误，分析了产生错误的主观因素和社会原因。"},{"type":"paragraph","text":"3、肯定了三中全会以来逐步确立的适合我国情况的建设社会主义现代化强国的正确道路，进一步指明了我国社会主义事业和党的工作继续前进的方向，动员全党全军全国人民团结一致向前看，一心一意搞四化。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a85cf89fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
