rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“打狗”宣扬了资产阶级人道主义观点","authors":["对老大娘形象的描写也是极不真实的/老大娘既然能够把丈夫和两个儿子都交给革命，为什么一只小狗却舍不得了哟/这是作者为了一个不正确的企图而故意安排的/〖HH/换行〗在作者笔下，一个在抗日敌后根据地处处受到尊敬的烈属，一个把自己的个人命运和党和革命紧紧拧在一起的老大娘、一个精神崇高的妻子和母亲，却成了一个心胸狭窄、感情卑微、精神状态低下的人物，这实在是拿一个烈属随意糟蹋。〖HH/换行〗这个作品写的是抗日战争时期的故事，可是从这些故事里，我们却嗅不到那个伟大时代的战斗气息，看不到当时敌后根据地如火如茶的抗日救亡工作，看不到许许多多可歌可泣的场景。人们看到的只是一些滑稽可笑的事情和一些被歪曲了的丑化了的正面人物，从这个小故事里，我们嗅到了腐朽的资产阶级人道主义的气味。"],"parts":[{"type":"paragraph","text":"在1959年第二十四期的“文艺报”上，发表了一篇文章，批判海默同志的小说“打狗”的错误思想倾向。"},{"type":"paragraph","text":"“打狗”（载“收获”1958年第三期）是写抗日战争时期一个烈属老大娘爱一只狗。八路军为了斗争需要，决定要打狗。可是老大娘不让打，因为这是她生活中“最好的安慰”。部队没办法，后来就化装成皇协军，把她的狗打死了。故事虽然简单，可是文章却提出了一个严肃的问题：个人幸福和革命战争的关系。在作者的笔下，个人幸福和革命战争是不可调和的矛盾。战争使老大娘的两个儿子都牺牲了，老伴也被日本人挑死了，身边只剩下一只小狗，成了她“最好的安慰”，可是八路军最后还要杀死她的狗。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4251ba897"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
