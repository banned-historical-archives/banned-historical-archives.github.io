"authors":["新华社"],"dates":[{"year":1952,"month":4,"day":3}],"is_range_date":false,"parts":[{"text":"上海市“五反”运动第二战役开始","type":"title"},{"text":"新华社","type":"authors"},{"text":"上海市增产节约委员会在一日召开“五反”工作人员誓师大会，宣布“五反”运动进入第二战役。在第一战役重点试验时，市增产节约委员会已训练出大批的“五反”工作干部，现已组成一千个“五反”检查队的大军投入第二战役。在誓师大会上，市增产节约委员会总结了第一战役的经验，并宣布了第二战役的作战计划。第二战役的方针是：一面进行重点检查，争取违法资本家自动坦白；一面继续大规模地发动群众参加运动，以便迅速组成“五反”统一战线。现在，“五反”大军已分别出发，进入阵地，声势极其浩大。违法的工商业户应该看清时事，自动坦白，争取得到人民政府的宽大处理。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1952年4月3日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91bdcb29a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
