nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"引而不发，是最厉害的战略战术","parts":[{"type":"title","text":"855.引而不发，是最厉害的战略战术"},{"type":"paragraph","text":"(1967年7月26日戚本禹讲话摘要)"},{"type":"paragraph","text":"戚：你们可以在这儿批，别进中南海，解放军现在在“保护”他，我没有权力把他交出来，毛主席作决定，也要看全国无产阶级革命派的情况，解放军现在在“保护”他，你们去，解放军怎么办？你们可以喊叫他出来，发通牒，一下子出来，后面就没有高潮了。引而不发是最厉害的战略战术。"},{"type":"paragraph","text":"我有个经验，第一次土改时，农民劲很大，要求斗争地主，农民一气就打了他一顿，出了口气，再开会，人就少了，有的农民就满足了，认为地主被打倒了，威风扫地，兴趣就放在两亩地，娶个老婆，还有打内战，你当农会主席，还是我当，桃子没有熟，就把桃子摘了。下次我们就说材料不够，越说不够，他到处找材料，跑到三十多里外去找苦主，那会开得真好，大人小孩都发动起来了，连小孩都能编成唱歌了，控诉地主罪行，以前的会从来没开得这么好！会后团结的也好，我们这是小小的经验，主席的经验是大大的经验，大的了不得，我们不理解，你们别着急，水到渠成，水不到成干水沟了，无产阶级最沉着，你们不要着急，“认罪书”什么时候交出都有人考虑。"}],"authors":[],"dates":[{"year":1967,"month":7,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":312,"page_end":312,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3db8648966"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
