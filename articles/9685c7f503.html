tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"万人坑前痛斥“剥削有功”反动谬论","authors":[],"parts":[{"type":"paragraph","text":"党的八届扩大的十二中全会公报发表以后，三○一八部队七十三分队对叛徒、内奸、工贼刘少奇掀起了革命大批判的新高潮。战士们满怀对刘少奇的刻骨仇恨，来到辽源煤矿矿工墓前，狠批刘少奇的“剥削有功”的反动谬论。"},{"type":"paragraph","text":"面对那白骨成堆的万人坑，骨灰层层的炼人炉，指战员们满腔怒火涌心头，切齿难平千古恨。新战士徐子林愤怒地说：“大工贼刘少奇是资本家的孝子贤孙，为资本家涂脂抹粉，胡说什么资本家‘剥削有功’，工人是‘欢迎剥削’的。这真是胡说八道！这堆堆白骨，层层骨灰，就是对大工贼刘少奇‘剥削有功’反动谬论的有力批判。剥削有罪，罪该万死！这矿工墓永远教育我们，牢记阶级苦，不忘血泪仇！”班长华培杰联系自己家庭在旧社会的苦，他气愤地说：“刘少奇鼓吹‘剥削有功’，就是妄图在中国复辟资本主义，叫我们走回头路，受二遍苦。我们决不答应！我们坚决响应全会发出的号召，以‘只争朝夕’的革命精神，把刘少奇批深批透，斗倒斗臭，叫他永世不得翻身！”"},{"type":"paragraph","text":"大家越批对刘少奇的仇恨越大，越批火力越猛。“打倒大工贼刘少奇！”“剥削有罪，罪该万死！”的口号声响彻山谷。指战员们坚决表示：我们永远忠于伟大领袖毛主席，念念不忘阶级斗争，誓死保卫无产阶级专政，在伟大的斗、批、改运动中立新功，誓将无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"（三○一八部队报道组）"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9685c7f503"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
