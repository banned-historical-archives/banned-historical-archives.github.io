art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席林副主席接见卡翁达总统","authors":[],"parts":[{"type":"paragraph","text":"新华社二十四日讯 我们的伟大领袖毛主席和他的亲密战友林彪副主席，今天下午接见了赞比亚共和国总统肯尼思·戴维·卡翁达和夫人，以及随同卡翁达总统来访的其他赞比亚朋友。"},{"type":"paragraph","text":"被接见的其他赞比亚朋友中，包括农业部长穆登达，合作、青年和社会发展部长海顿·班达，驻巴罗兹省国务部长蒙加，驻西方省助理国务部长查利库利马，人事办公室常任秘书兼内阁副秘书西约蒙吉，外交部常任秘书乔纳，合作、青年和社会发展部下秘书奇桑加，典礼长克·班达。"},{"type":"paragraph","text":"毛主席和林彪副主席同卡翁达总统等进行了友好的谈话。"},{"type":"paragraph","text":"陪同接见的，有国务院总理周恩来，副总理陈毅、李先念。"},{"type":"paragraph","text":"毛主席、林彪副主席同卡翁达总统（右二）和夫人进行友好的谈话。左一是周恩来总理。 新华社记者 钱嗣杰摄（照片）RW：毛泽东；接见卡翁达"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"林彪","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c706d4b68f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
