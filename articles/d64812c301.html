委会的征用令","authors":[],"dates":[{"year":1967,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市革命委员会为了适应市政建设的需要，和广大革命群众的要求，于九月九日下令征用了本市中山东一路三十三号曾被英帝国主义霸占了一百多年的侵华大本营的地方，把它收回到了中国人民手里。"},{"type":"paragraph","text":"昨天，上海无产阶级革命派召开了“高举毛泽东思想伟大红旗，热烈拥护市革命委员会《九·九征用令》大会。”"},{"type":"paragraph","text":"上海市革命委员会采取这个措施，是中国人民反帝反修斗争的伟大胜利，是无产阶级文化大革命的伟大胜利，是毛泽东思想的伟大胜利。这个地方的收回，充分显示了我们伟大祖国的强大和兴旺。"},{"type":"paragraph","text":"昨天早上，在雄壮的《东方红》乐曲声中，被英帝国主义霸占过的土地上，第一次升起了伟大的五星红旗。接着，工人、农民、解放军、红卫兵和机关干部的代表，纷纷在大会上热烈欢呼市革命委员会《九·九征用令》，控诉揭发英帝国主义在上海犯下的滔天罪行，一致表示这个征用令好得很，完全符合广大无产阶级革命派和革命群众的强烈愿望。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d64812c301"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
