"year":1954,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十八日电】　十二月十九日是捷克斯洛伐克共和国总统萨波托斯基的七十寿辰。中华人民共和国主席毛泽东特致电向他祝贺。电文如下:"},{"type":"paragraph","text":"捷克斯洛伐克共和国总统"},{"type":"paragraph","text":"亲爱的萨波托斯基同志:"},{"type":"paragraph","text":"当您七十寿辰之际，请接受中国人民和我个人的衷心祝贺。"},{"type":"paragraph","text":"您为捷克斯洛伐克劳动人民的解放事业进行了长期而英勇的斗争，并作出了卓越的贡献。目前捷克斯洛伐克人民在捷克斯洛伐克共产党和您的领导下，正在把自己的祖国建设成为日益繁荣幸福的国家，并为保障欧洲和平和安全进行着不懈的斗争，中国人民对捷克斯洛伐克人民的这种正义事业表示深切的同情和支持。"},{"type":"paragraph","text":"祝您在领导捷克斯洛伐克人民为建设社会主义和维护世界和平的事业中获得更大的成就，并祝您健康长寿。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年十二月十六日"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"【新华社北京十八日电】　中国共产党中央委员会致电捷克斯洛伐克共产党中央委员会政治局委员安托宁·萨波托斯基，向他祝贺他的七十寿辰。电文如下:"},{"type":"paragraph","text":"亲爱的安托宁·萨波托斯基同志:"},{"type":"paragraph","text":"在您七十寿辰的时候，中国共产党中央委员会谨向您——捷克斯洛伐克共产党和工人阶级杰出的组织者和领导者之一，致以兄弟般的祝贺。祝贺您的身体健康，祝贺您在领导捷克斯洛伐克人民迅速发展整个国民经济，特别是在提高农业生产，提高劳动人民的物质和文化生活水平和为巩固世界和平与国际安全而进行的斗争中，获得新的成就。"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"一九五四年十二月十六日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b48943b8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
