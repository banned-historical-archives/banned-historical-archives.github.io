迁往新疆”","authors":["巩始华","甘肃定西县综合机械厂"],"dates":[{"year":1959}],"is_range_date":false,"parts":[{"text":"人民来信：建议“把通渭、甘谷几个地方人民迁往新疆”","type":"title"},{"text":"甘肃定西县综合机械厂巩始华","type":"authors"},{"text":"敬爱的刘主席同志：","type":"appellation"},{"text":"这二三（56——59）年内，甘肃的通渭、甘谷为重点的4个县，因受汗（旱）灾而发生了重大的灾难，人民乙（已）饿死了许多，逃荒数逐年增长，政府虽付出了大量的力量（每人每天4两粮左右）进行救急（济），但始终不能解决问题。同时这里的土地非常不好，务不好就是雨水多也不长庄稼，现在人无力量就是种上某些庄稼也不长。因此灾荒年年存在。我的建议把这地区的人民可以迁移到新疆或其他地方，将来再看，不然现在我国这样好的情况把人饿死，这将来总要给你总结出一个缺点吧。","type":"paragraph"},{"text":"敬爱的主席，你若不信请亲自配（派）人到这几个县的乡村去看看。如不付上述事实我负责。","type":"paragraph"},{"text":"敬礼","type":"paragraph"},{"text":" 甘肃定西县综合机械厂   巩始华","type":"paragraph"}],"comments":[],"origin":"中共甘肃省委办公厅《人民来信》档案。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90ffb7f1ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
