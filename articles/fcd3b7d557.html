:["李先念"],"dates":[{"year":1966,"month":8,"day":17}],"is_range_date":false,"parts":[{"text":"李先念在北京对外贸易学院的讲话","type":"title"},{"text":"李先念","type":"authors"},{"text":"1、打破一切旧框框，集中力量炮打司令部。所谓的炮打司令部，就是党组、公司经理、司长、局长、特别是党组。","type":"paragraph"},{"text":"2、只许炮打司令部，不许炮打群众。","type":"paragraph"},{"text":"3、学习十六条，运用十六条，在运动中学，在炮打司令部中学。活学活用，也只有这样，才能形成左派队伍，要引导群众去学习。","type":"paragraph"},{"text":"4、立即检查有没有打击左派群众，斗争群众的现象，各部门不要漫不经心。","type":"paragraph"},{"text":"5、文化革命与日常工作关系。必须高举毛泽东思想伟大红旗，以阶级斗争为纲，不要采取折衷主义的态度，要争取双丰收。","type":"paragraph"},{"text":"6、文革筹委会立即成立起来。成立以后，可以今天成立明天推翻，现在好多筹委会被推翻了。因为群众就是不拥护嘛。可以全部推翻，也可以推翻一个，补选一个，要充分发挥民主。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcd3b7d557"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
