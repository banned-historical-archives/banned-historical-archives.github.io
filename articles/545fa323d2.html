信局同仁"],"dates":[{"year":1949,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"重庆电信局人员"},{"type":"paragraph","text":"电毛主席朱总司令接受人民政府领导"},{"type":"paragraph","text":"【新华社北京一日电】重庆电信局人员在重庆解放后，立即致电我中央人民政府毛主席、朱总司令、周总理，报告重庆情况，并表示接受人民政府领导，为彻底消灭蒋匪集团而斗争。电文如下："},{"type":"paragraph","text":"人民政府毛主席，朱总司令，周总理：由于你们领导与指示的正确，西南的人民才会陆续得到解放。在投靠美帝国主义的蒋匪集团蹂躏下的重庆，今天也获得解放了。但在匪军狼狈溃退时，不顾人民的生命财产，大肆破坏，给全市人民留下了千万年不能忘记的大仇恨。我们今后站在你们的领导和指示下，一定为澈底消灭帝国主义和蒋匪集团而战，为全人类解放事业而奋斗。"},{"type":"paragraph","text":"重庆电信局同仁"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"545fa323d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
