script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"bc790ef9-2b1a-4b40-86d0-ed2310a40c24","name":"江青同志的重要讲话","internal":false,"type":"img","official":false,"author":"江青","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/bc790ef9-2b1a-4b40-86d0-ed2310a40c24/1.jpg"],"article":{"title":"江青同志的重要讲话","alias":"","parts":[{"type":"paragraph","text":"指示"},{"type":"paragraph","text":"高最"},{"type":"paragraph","text":"福"},{"type":"paragraph","text":"帝国主义者和国内反动派决不甘心于他们的失，他们还要作最后的择扎。在全国平定以后，他们也还会以各种方式从事破坏和搞乱，他们将每日每时企图在中国复辟。这是必然的，毫无疑义的，我们务必不要松懈自己的警惕性。"},{"type":"paragraph","text":"江青同志的重要讲话"},{"type":"paragraph","text":"（七月二十二日凌晨在河南代表团会上）群众呼口号）应是向同志们学习，向同志们致敬：（群众高呼：毛主席万岁！）"},{"type":"paragraph","text":"刚才有一位同志讲，要发动群众制止武斗，这个意见很好，要大力宣传。挑动武斗的人总是一小，如果广大的群众知道了他们的阴谋计，揭出了他们，他们就会象过街的老鼠人人喊打。要发动群众，要向群众作深入的宣传工作，这样我们才能胜利"},{"type":"paragraph","text":"我们不能太天烂漫。当挑起武斗的一小报人，他们拿起武器打你们的时候，革命群众可以拿起武器自卫。在双方达成停止武斗的协以后，他们仍然不把武器收起来的话，你们自卫的武器不能放下：鼓掌，并高呼：毛主席万岁！）"},{"type":"paragraph","text":"我记得好象就是河南一个革命粗织提出这样的口号，叫作“文攻武卫”，这个口号是对的。（热烈鼓掌）我们坚持毛主席提出的文斗，坚决反对武斗，做深入的群众工作，这是第一条，同志们要向群众深入地宣传这一条，做比较艰苦的群众工作，要广大的群众识破一小不人的阴谋，是要做一些工作的。但是，还要有第二条，不能天真烂漫。当他们不放下武器，拿着枪支、长矛、大刀对着你们，你们就放下武器，这是不对的。你们要吃亏的，革命小将你们要吃亏的。现在在武汉就有这个情况。当然，武汉的革命小将也在采取自卫手段，同志们，当我们听到百万维师以及他们的幕后一小接纵者拿着那样的武器对手无寸铁的革命群众行区，甚至部架、殴打我们的谢富治同志、王力同志，我们能充许：（群众高呼口号"},{"type":"paragraph","text":"河南的情况现在已经达成了协，我希望备方面都不要撕毁协，撕毁协就是蒋介石。蒋介石在一九四六年十月十号跟我们了停战协，他马上又撕毁了。"},{"type":"paragraph","text":"我今天看看同志们，又把这个道理讲一下，我们有理，理在我们这边。就是，毛泽东思想在革命小将、革命干部、革命工人、革命农民这边，不在他们一小那边。我们必胜，他们必败。如果他们挑起武斗，不肯放下武器，你们不要天真烂漫，放下武器。我支持这一点。"},{"type":"paragraph","text":"。（热烈鼓掌，并高呼：毛主席万岁：向江青同志学习，向江青"},{"type":"paragraph","text":"我就讲这么一点同志致敬！）"},{"type":"paragraph","text":"（按记录稿整理，未经本人审"},{"type":"paragraph","text":"《文汇报》星火燎原革命造反总部请翻印请张贴请传悦"},{"type":"paragraph","text":"解放日报》革命造反联合司今部九六七年七月二十三日"},{"type":"paragraph","text":"《支部生活》革命造反司今部"}],"authors":["江青"],"dates":[{"year":1967,"month":7,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"江青","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bf2a0d15e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
