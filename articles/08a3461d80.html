" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“从党成立就有三害而且越来越严重”","authors":["南开大学","姚安全"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“从党成立就有三害而且越来越严重”","type":"title"},{"text":"南开大学姚安全","type":"authors"},{"text":"[姚安全：南开大学历史系学生]","type":"subtitle"},{"text":"“今天‘三害’‘歪风’都是我们的敌人，三害是主要的，从党成立就有三害而且越来越严重，要想不动摇党的领导，不动三害分子的人身来反三害是很难的，而且今天的三害分子还打着反歪风的招牌来反整风，就好像病人借口怕医生动手术而死为名，反对开刀一样，歪风无关紧要，三害危害大于歪风，葬送社会主义的是三害，而歪风是吹不倒社会主义的”。","type":"paragraph"},{"text":"“我是偏右的，很多左倾现象我见就生气，有反感，也可说是对党不满，不过如果有个反革命组织让我参加，我还得考虑考虑，我不打着帮助党整风的旗帜，我也不是帮助党整风，你们也不用怀疑我混水摸鱼别有用心，今天绝大多数党、团员口头上讲整风，都不提意见，怎么整呢？","type":"paragraph"},{"text":"今天存在两种右派，坚决提意见者被视为右派，当然有一些别有用心者，左派也有两种，一种打着维护社会主义旗帜掩盖三害，阻碍整风。他们为名利入党，不甘心取消特权；还有一种是自觉和不自觉的左派，这些人无脑子不想问题，对不合理现象置之不理，如以前有人提出停课，他们反对，现在又拥护停课了。","type":"paragraph"},{"text":"有人提出卢郁文又接到的恐吓信是对卢郁文个人不满所写，有人认为反革命所写，我认为可能是抗拒整风的三害分子为转换目标所写，做贼心虚，反咬一口。","type":"paragraph"},{"text":"今天三害是主要的，三害分子打着反歪风的招牌抗拒整风、最后我提出口号：反歪风的勇士们，希望你们向三害作斗争，歪风吹不倒社会主义，三害是要葬送社会主义的。”","type":"paragraph"}],"comments":[],"origin":"《南开大学右派反动言论选集》（天津：南开大学社会主义思想教育教研室，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08a3461d80"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
