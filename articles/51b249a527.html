es":[{"year":1946,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报南京十一日专电】　顷据确息，今日蒋主席邀请张君劢午餐，于商讨国大延期事时主席更表示希望与中共领袖毛泽东再度晤面，直接商谈。"},{"type":"paragraph","text":"【本报南京十一日专电】　中共代表团发言人梅益，今晚对国大延期事发表书面谈话称:国大延期三天，中共不予重视，国大日期是国民党政府片面决定，现在延期三天还是片面的决定。不论延期三天或三十天，都是一样违背政协的决议。国民党如果还有丝毫尊重政协决议的诚意，那就不是延期，而是停开其一党包办之国大。"},{"type":"paragraph","text":"又今日本市某晚报曾刊出:“中共代表团是否撤离南京问题，今后十二小时内即可决定。”据中共方面表示:如国大果尔召开，谈判已毫无意义，中共代表团自无留京之必要云。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51b249a527"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
