art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓副总理会见泰国工业部长差猜·春哈旺"},{"type":"paragraph","text":"国务院副总理邓小平二十六日上午会见了泰国工业部长差猜·春哈旺一行。会见时，差猜·春哈旺向邓小平转交了泰国总理炳·廷素拉暖上将的一封信。"},{"type":"paragraph","text":"邓小平请差猜·春哈旺回国后转达华国锋总理和他本人对炳·廷素拉暖总理的问候。"},{"type":"paragraph","text":"赵紫阳同志会见罗共中央党校代表团"},{"type":"paragraph","text":"中共中央政治局常委、国务院副总理赵紫阳二十六日下午会见了“斯·乔治乌”学院副院长杜米特鲁·吉谢率领的罗马尼亚共产党中央党校代表团，同罗马尼亚同志进行了亲切交谈。"},{"type":"paragraph","text":"会见后，赵紫阳设晚宴招待罗马尼亚同志。"},{"type":"paragraph","text":"比军总参谋长贡捷离京回国"},{"type":"paragraph","text":"比利时军队总参谋长维利·贡捷中将和夫人一行，圆满结束了对我国的参观访问，二十六日晚上乘飞机离开北京回国。"},{"type":"paragraph","text":"中国人民解放军总参谋长杨得志和夫人到机场送行。机场上举行了欢送仪式。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96103f6ed6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
