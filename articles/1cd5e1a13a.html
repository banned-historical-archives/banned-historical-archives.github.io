:1953,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马林科夫给毛主席的贺电"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东同志："},{"type":"paragraph","text":"值此中华人民共和国成立四周年纪念日，主席同志，请您及中华人民共和国中央人民政府接受我衷心的祝贺。过去的四年向全世界表明了中华人民共和国的伟大的生活力和强固性，中华人民共和国正在顺利地实行国内历史性的改革并且保证人民群众经济、文化和物质生活的提高。中华人民共和国已经成为一种国际力量，这个力量不容许帝国主义者任意地奴役亚洲各国人民及为所欲为地执行旨在把亚洲变成新的世界大战温床的政策。朝鲜事件证明中国人民业已变成东方被压迫人民争取自由与独立的斗争中的强大堡垒。"},{"type":"paragraph","text":"中华人民共和国在各方面的进步使全体进步人类感到深为满意并引为骄傲，世界上没有任何一种力量能够阻止中国人民沿着全国高涨和祖国繁荣的道路前进。苏联人民热烈地祝贺伟大的中国人民在实现国家工业化计划、在发展农业和提高人民福利、在进一步全力巩固自己的人民民主国家的事业中获得新的成就。"},{"type":"paragraph","text":"为我们两国人民的福利、为巩固世界和平与国际安全，愿苏联和中华人民共和国之间牢不可破的兄弟般的友谊与紧密合作日益增长与发展！"},{"type":"paragraph","text":"格·马林科夫"},{"type":"paragraph","text":"一九五三年九月三十日于莫斯科"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cd5e1a13a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
