<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"废除封建剥削　解放农村生产力上海郊区土改胜利完成农田普遍丰收农民购买力大大提高　为上海的经济建设产生了有利影响","authors":[],"dates":[{"year":1951,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【沪市新闻处讯】本市郊区的土地改革工作，从去年十二月中旬重点试验开始，经过十一个半月，到今年十一月底已全部胜利完成。"},{"type":"paragraph","text":"本市郊区这一伟大的土地改革运动，是在本市人民政府领导下，在华东土地改革委员会指导和参加土地改革工作的全体干部努力下，结合本市郊区的实际情况，有步骤、有秩序地进行的。具体贯彻了中央的土地改革政策。整个运动也和一般农村的土地改革一样，依靠了广大农民群众，经过系统的剧烈的斗争，并得到本市各界人民的同情与支持，才打垮了地主阶级根深蒂固的封建统治及其对土地改革的反抗和破坏，而取得了胜利。"},{"type":"paragraph","text":"土地改革后，本市郊区农村已起了根本的变化，地主阶级封建剥削的土地所有制废除了，郊区农村的生产力获得了解放，农民生产积极性和爱国热情大大高涨。在本市郊区土地改革中，共没收、征收土地十八万四千一百余亩，其中农业土地十七万三千九百亩；没收、征收房屋八千一百六十一间；没收耕畜一百卅五头，农具一万五千一百余件；没收地主多余粮食三十四万三千八百余斤，家具五万五千五百四十件；收回外侨在郊区占有的农业土地、荒地、及空地一千四百八十六亩强，所有没收征收和收回的土地一律归国家所有，分配给无地、少地的农民使用，本市郊区农民分配到国有土地使用耕种的计有二十五万五千零四十一人；他们并分得了农具、耕畜、房屋、粮食等四大财产。由于废除了封建剥削的土地制度，广大农民生产热情已大大提高。他们更加省吃俭用，扩大生产投资，加工施肥，研究改进生产技术，展开爱国增产运动。因此，今年虽有台风、虫、旱等灾害而收获量仍超过了去年，获得了一般丰收年成。土地改革后，农民购买力也已提高，大大促进了城乡物资交流。"},{"type":"paragraph","text":"同时，郊区土地改革的完成，并为城市建设、工商业发展创造了有利的条件。过去由于郊区封建土地制度的存在，阻碍了城市建设与工商业发展，例如新泾区一个地主，过去以一亩三分土地出租给工商业者作厂基，每年竟收取租米四十三石。而在废除封建土地所有制后，土地所有权归国家所有，这就适应了城市建设和工商业发展的需要。如在本市郊区土地改革中，据不完全的统计，由于城市建设与工商业发展的需要而批准保留土地使用权的有一百零五个单位(内包括工商业十八户)，计土地三千二百七十七亩；由政府批准领用国有土地的有二百零一个公私单位(其中工商业二九户)，计三千三百多亩。郊区土地改革的胜利完成，对上海今后的经济建设将产生新的有利影响。"}],"comments":[],"origin":"沪市新闻处","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e48e77b4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
