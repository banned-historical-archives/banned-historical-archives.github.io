script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联出版列宁文集“反对修正主义”","authors":[],"dates":[{"year":1958,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京30日电】　据塔斯社莫斯科29日讯:苏共中央马克思列宁主义研究院和国家政治书籍出版局编纂的列宁的文集“反对修正主义”已经出版了。收入文集中的著作反映了列宁对俄国和国际工人运动中的修正主义、机会主义和教条主义所一贯进行的毫不妥协的斗争。列宁在这些著作里揭露了修正主义的实质以及它的经济基础和社会根源，指出了它的国际性和在不同历史条件下、不同国家里的表现形式，揭示了修正主义对于世界工人运动的危害。列宁写道:“修正主义或者对马克思主义的‘修正’即使不是目前资产阶级对无产阶级的影响和无产者的资产阶级蜕化的最主要的表现，那末至少也是主要表现之一”。"},{"type":"paragraph","text":"文集中的著作表明，列宁也反对教条主义，反对把马克思主义变成脱离生活的僵化的公式汇集。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b046e5da01"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
