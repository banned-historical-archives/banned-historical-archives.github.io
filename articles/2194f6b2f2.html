hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"接见中南局第九次全体会议同志时的指示","alias":"","parts":[{"type":"paragraph","text":"接见中南局第九次全体会同志时的指示"},{"type":"paragraph","text":"（一九六五年四月二十一日）"},{"type":"paragraph","text":"搞四清，要把民兵搞好。首先要落实组织。有波有队长、班长？组织起来没有？首先是有没有，然后讲政治，不要地、富、反、坏之类，要贫下中农，中农子弟进步的可以要。地富子弟进步的也可以，眞打起来他们会分化的，一部分组织维持会，插白旗，杀共产党，一部分跟我们走。地主、富农、资本家也会分化，不会全跟敌人。就是要争取多数，孤立少数，各个击破。"},{"type":"paragraph","text":"民兵，第一是组织，第二是政治，第三是军事。"},{"type":"paragraph","text":"关于劳改工作的指示"},{"type":"paragraph","text":"（一九六五年四月）"},{"type":"paragraph","text":"劳改犯办了很多事情，要用，在一定条件下，可以为我们所用。我们没有几个食污分子不行，这样大的国家没有几个反革命分子不行。"},{"type":"paragraph","text":"他们可有才能：没有才能，反革命干什么？在一定条件下他能做很多事，凡有功的，可以摘掉帽子，有的还可以奖励。二十三条为什么规定这么一条：工作队的成员不一定要十分干净，有坏人不要怕，有些人政治上不好，但很有才干，改造！改造不了也不要紧，只要把他们引到正路，就很有用，我们不会贪污，不懂贪污，也不懂技术，他们懂得这些，只要我们知道他们，政治挂帅，可以让他们办很多事，可以发挥他们的作用。就是要调动他们，他们中间可有才能，他发明具空电炉，是高级产品，我们不行，他行。"},{"type":"paragraph","text":"（1965年4月，关于王璨文发明眞空冶炼电炉的指示）"},{"type":"paragraph","text":"改造要抓紧，不要在经济上做文章，不要想在劳改犯人身上搞多少，要抓改造，让他们寄点铁同家。"},{"type":"paragraph","text":"第一是思想改造，第二是生产，劳改工作干部不能太弱，要训练。训练两个星期就行了。"},{"type":"paragraph","text":"（1965年4月，在十四次公安会议期间对劳改工作的指示）对卫生工作的指示"},{"type":"paragraph","text":"（一九六五年六月二十六日）"},{"type":"paragraph","text":"告诉卫生部，卫生部的工作只给全国人口的15%工作，而且这15%中主要还是老爷。广大农民得不到医疗。一无医生，二无药。卫生部不是人民的卫生部，改成城市卫生部或城市老爷卫生部好了。"},{"type":"paragraph","text":"·230·"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":4,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":243,"page_end":243},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2194f6b2f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
