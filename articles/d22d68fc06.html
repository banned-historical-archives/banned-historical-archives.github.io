script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刘贼是个害人精　修正主义分配路线要肃清突出政治　落实政策　把好年终分配关","authors":["周巧龙","沈无庆"],"dates":[{"year":1968,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"今年年终分配即将到来了。搞好今年的年终分配，具有极其重大的政治意义。因此，一定要高举毛泽东思想伟大红旗，突出无产阶级政治，坚持活学活用毛泽东思想，开展革命大批判，认真落实分配中的具体政策，切实把分配工作搞好。"},{"type":"paragraph","text":"我们公社革命委员会最近举办了由生产队长、会计参加的毛泽东思想学习班，以公报为武器，组织干部和群众重温毛主席“在分配问题上，我们必须兼顾国家利益、集体利益和个人利益”的伟大教导，开展革命大批判，肃清大叛徒、大内奸、大工贼刘少奇反革命修正主义分配路线的流毒，提高了干部和群众的阶级斗争和两条路线斗争觉悟，克服了少数干部“今年大幅度增产，可以少留多分”，片面强调“改善社员生活”和“平均主义”的错误想法。下坊大队第八队一九六六年年终分配时，中了刘少奇“经济挂帅”的流毒，多分集体资金一千几百元，严重影响了集体经济。这个队的会计深有体会地说:“刘贼是个害人精，他的流毒不肃清，两条道路分不清。”大家一致表示:要坚决执行毛主席“备战、备荒、为人民”的伟大战略方针，认真贯彻党的分配政策，正确处理国家、集体、个人三者之间的关系，在完成国家征购任务、归还到期贷款、预购定金、机耕、电灌等款项的前提下，多售超产粮，向毛主席献忠心。净收入增加多的生产队，首先考虑多增加集体积累；社员也应适当增加。净收入减少的生产队，集体积累和社员分配应该统筹兼顾，适当安排，而不减少集体积累。大家都坚决要把好今年年终分配关。"},{"type":"paragraph","text":"我们建议各公社大队、生产队在今年年终分配中高举起毛泽东思想伟大红旗，开展大学习，大批判，肃清反革命经济主义的流毒，坚决贯彻群众路线，依靠贫下中农，放手发动群众，切实把今年分配工作搞好。金山县兴塔公社机关造反队"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d22d68fc06"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
