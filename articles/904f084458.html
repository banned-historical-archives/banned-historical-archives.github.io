art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"延安儿女紧跟毛主席","authors":["邱静宽〖HH/换行〗DW：延安支左部队"],"parts":[{"type":"paragraph","text":"欢乐的海啊，"},{"type":"paragraph","text":"红色的浪，"},{"type":"paragraph","text":"我们集会在杨家岭上。"},{"type":"paragraph","text":"“七大”的会址就在眼前，"},{"type":"paragraph","text":"“九大”的喜讯又传到耳旁。"},{"type":"paragraph","text":"秧歌使劲扭啊，"},{"type":"paragraph","text":"爆竹震天响，"},{"type":"paragraph","text":"激动的泪水顺着脸儿淌。"},{"type":"paragraph","text":"延安儿女想念毛主席，"},{"type":"paragraph","text":"手捧“公报”眺望着东方。"},{"type":"paragraph","text":"千万句话并作一句说："},{"type":"paragraph","text":"衷心敬祝伟大领袖毛主席万寿无疆！"},{"type":"paragraph","text":"当年毛主席来到杨家岭，"},{"type":"paragraph","text":"山欢呼啊，水歌唱。"},{"type":"paragraph","text":"彻底粉碎了机会主义路线，"},{"type":"paragraph","text":"迎来中国革命胜利的曙光。"},{"type":"paragraph","text":"如今毛主席在北京亲自主持党的“九大”，"},{"type":"paragraph","text":"红太阳的光辉把祖国山河照亮。"},{"type":"paragraph","text":"团结的大会，胜利的大会，"},{"type":"paragraph","text":"毛主席的革命路线光芒万丈。"},{"type":"paragraph","text":"总结了历史的经验，"},{"type":"paragraph","text":"指引着革命的航向。"},{"type":"paragraph","text":"让帝修反在我们面前发抖吧！"},{"type":"paragraph","text":"革命的洪流不可阻挡。"},{"type":"paragraph","text":"延安儿女紧跟毛主席，"},{"type":"paragraph","text":"昂首阔步奔赴共产主义前方！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"904f084458"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
