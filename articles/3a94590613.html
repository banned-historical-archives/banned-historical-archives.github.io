art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想的伟大胜利——热烈庆祝北京市革命委员会的成立","authors":["杨昌忠"],"parts":[{"type":"paragraph","text":"大会主席台上。左起：周恩来、江青、陈伯达、康生、张春桥、王力、杨成武、姚文元、戚本禹、关锋。 新华社记者摄"},{"type":"paragraph","text":"在我们伟大的领袖毛主席的亲切关怀和指导下，北京市革命委员会四月二十日宣告成立了。这是以毛主席为代表的无产阶级革命路线的伟大胜利！这是战无不胜的毛泽东思想的伟大胜利！这是无产阶级文化大革命的伟大胜利！首都无产阶级革命派和广大革命群众坚决表示：一定要把对党内头号走资本主义道路当权派的批判同彻底摧毁旧北京市委、市人委反革命修正主义集团的斗争结合起来，同本单位的斗批改结合起来，把无产阶级文化大革命进行到底；一定要进一步开展活学活用毛主席著作的群众运动，把北京市建设成为永远闪耀着毛泽东思想光辉的最红最红的革命城市。上图为大会会场。 本报记者摄"},{"type":"paragraph","text":"大会主席台上。右起：李富春、谢富治、萧华等同志。 本报记者摄"},{"type":"paragraph","text":"首都郊区贫下中农无限热爱毛主席，无限热爱毛泽东思想，他们决心活学活用毛主席著作，彻底打倒党内最大的一小撮走资本主义道路的当权派及其支持下的一小撮反革命修正主义分子，狠抓革命，猛促生产。这是他们和部队毛泽东思想宣传队一起，热烈庆祝北京市革命委员会成立。 杨昌忠摄"},{"type":"paragraph","text":"工人阶级是无产阶级文化大革命的领导力量和最积极的因素。他们最热烈地响应毛主席和党中央的号召，更加鼓足干劲，力争上游，一定要争取成为抓革命促生产的最出色的模范。在欢庆北京市革命委员会成立声中，北京第二机床厂举行全体革命职工大会，决心更坚决地投入对党内头号走资本主义道路当权派的大批判运动，夺取革命和生产双胜利。 《人民日报》记者摄"},{"type":"paragraph","text":"我军是毛主席亲手缔造的、林彪同志直接领导的无产阶级的革命军队，是无产阶级专政的柱石，是无产阶级革命派的坚强后盾。指战员最爱读毛主席的书，最听毛主席的话，最坚决按照毛主席的指示办事，积极支持左派广大群众。图为驻京空军某部空地勤人员，从广播里听到北京市革命委员会成立的消息，热烈欢呼毛泽东思想的又一伟大胜利。 空军供稿"},{"type":"paragraph","text":"在文化大革命中冲锋陷阵的首都中等学校红代会的革命小将，高举红光闪闪的《毛主席语录》，热烈欢呼北京市革命委员会的成立，热烈欢呼以毛主席为代表的无产阶级革命路线的伟大胜利。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a94590613"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
