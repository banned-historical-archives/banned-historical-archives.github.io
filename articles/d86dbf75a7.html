art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黎德寿；黄文欢同志到达北京周恩来；张春桥同志会见越南同志中越两国战友进行了十分亲切友好的谈话会见后；张春桥同志设宴招待越友","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年五月十一日讯 越南劳动党中央政治局委员黎德寿及其随行人员，在出国途中于今天中午乘专机到达北京。"},{"type":"paragraph","text":"越南劳动党中央政治局委员、国会常务委员会副主席黄文欢同机到达。"},{"type":"paragraph","text":"前往机场热烈欢迎的有：中共中央政治局委员张春桥，中共中央委员、中共中央对外联络部部长耿飚，外交部副部长韩念龙，以及申健、陆维钊、肖簧、毛宝忠、高建中等同志。"},{"type":"paragraph","text":"到机场欢迎的还有越南民主共和国驻中国大使馆公使衔参赞阮进，越南南方共和驻中国大使馆三等秘书武发禄等越南同志。"},{"type":"paragraph","text":"新华社一九七三年五月十一日讯 中共中央政治局常委、国务院总理周恩来同志，中共中央政治局委员张春桥同志，今天下午会见了越南劳动党中央政治局委员黎德寿同志，越南劳动党中央政治局委员、国会常务委员会副主席黄文欢同志。中越两国战友进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"黎德寿同志的随行人员阮基石、潘贤、黄华、潘世栋，越南民主共和国驻中国大使馆公使衔参赞阮进等越南同志参加了会见。"},{"type":"paragraph","text":"参加会见的还有耿飚、韩念龙、申健、陆维钊、高建中、张德维、赵青田等同志。"},{"type":"paragraph","text":"会见以后，张春桥同志设宴招待越南战友。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d86dbf75a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
