uthors":[],"dates":[{"year":1960,"month":12,"day":11}],"is_range_date":false,"parts":[{"text":"湖北麻城县扩大干部会议简报第六期","type":"title"},{"text":"说话要留心","type":"subtitle"},{"text":"龟山茶厂组织干事周纸新说：“万人大会解决了一些问题，但好多问题并没有解决。我这次来是看领导上是么样的心，我就抱什么样的态度。有的说得，有的说不得。能说的就说，不能说的就不说。因此，说话要留心”。","type":"paragraph"},{"text":"态度是两个字，任务只有一条","type":"subtitle"},{"text":"龟山熊家铺管理区秘书熊楚伯说：“我来学习抱的态度就是‘两个字’：一是‘听’，一是‘看’。要说，是没有什么说的。我的任务只有一条，就是搞表格”。","type":"paragraph"},{"text":"怕么事","type":"subtitle"},{"text":"中一碰畈总支书记孔祥安同志说：“反右派我不怕，划右派都是一些历史有污点的人，我是讨米出身，有话就是要说，怕么事”。","type":"paragraph"},{"text":"要整就整","type":"subtitle"},{"text":"龟山“三八”茶厂曾祥思说：“整风我没有什么可整，上级叫我们么样做就么样做，做错了我没有什么责任，要整就整”。","type":"paragraph"},{"text":"两个账报不出，肯定要挨整","type":"subtitle"},{"text":"走马岗总支书记江志茂同志说：“这次来开会，是两个账报不出：一个是产量账报不出，二个是任务未完成，肯定挨整”。","type":"paragraph"},{"text":"过去的工作是大家哄","type":"subtitle"},{"text":"铁门公社毛家大垸徐正福说：“过去的工作是你哄我，我哄你，明知做的不对，就是不敢说”。","type":"paragraph"}],"comments":[],"origin":"湖北省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"073d8a9fe0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
