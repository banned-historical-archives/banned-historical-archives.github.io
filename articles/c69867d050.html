" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川东区党委关于梁山大竹两县地主毒杀殴打征粮人员的通报","authors":[],"dates":[{"year":1950,"month":6,"day":17}],"is_range_date":false,"parts":[{"text":"川东区党委关于梁山大竹两县地主毒杀殴打征粮人员的通报","type":"title"},{"text":"目前各县，正在抓紧小春后的征收，在梁山、大竹两县，发现地主对我有如下的对抗办法，希各地注意：","type":"paragraph"},{"text":"（一）梁山云龙区荫平乡十四保，农民代表十五人，于本月十日到该乡十二保地主刘喜山家催粮，该地主表面殷勤招待，留吃午饭，结果全部中毒，幸发觉早，十三人得救，两人生命不保，现已扣押审讯。","type":"paragraph"},{"text":"（二）梁山云龙区和林乡，地主王再美之弟向其催粮之甲长说：“我欠人民政府粮，不欠你甲长粮”。持大刀追到甲长家，甲长闭门以拒，始得脱祸；但甲长之狗被该地主以大刀刺死。","type":"paragraph"},{"text":"（三）四月下旬大竹县庙坝区清水乡，佃户陈品乐，向梁县卷洞乡红春坝地主何修全家催粮（地主家住渠县），被地主打的昏过去，幸被四百馀征粮农民发觉，将地主斗争，责其赔偿医药休养费，后押清水乡听候处理。","type":"paragraph"},{"text":"（四）五月二十二日大竹城关镇南关外南桥非法地主罗永苓，把向其催粮的八保佃客黄水桂的脖子砍了一刀（凶手罗已畏罪潜逃）。","type":"paragraph"},{"text":"（五）五月中旬大竹天池区童家乡，农协会委员宋长寿与农代黄永堂张树祥等四人，到庙坝区高穴乡五保地主李林文家催粮，遭到地主的殴打，另该乡地主李阳生把童家乡农代陈绪隆、陈朝均等七人打伤。","type":"paragraph"},{"text":"以上事件的不断发生，主要由于我干部及催粮农民为人民国家事业发挥了忘我的精神，单独外出催粮者很多，同时也说明了对继续催粮，仍然是和地主一个尖锐的斗争认识不足，有些疏忽大意；另方面在执行政策上，可能存在问题，希各地立即警惕起来，将此事件广泛的向干部和农民进行教育，有组织的催粮，不要单个去催，更不要在地主家里吃饭（吃饭现象已有不少县发生过），并注意检查政策执行情况。","type":"paragraph"}],"comments":[],"origin":"《西南工作》 第9期，中共中央西南局编印 （党内刊物发至县团）， 1950年7月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c69867d050"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
