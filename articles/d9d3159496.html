ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"对京山县合作乡八一社常年办食堂的经验的批语","alias":"","parts":[{"type":"paragraph","text":"对京山县合作乡八一社常年办食堂的经验\"的批语"},{"type":"paragraph","text":"（1958年7月14日）"},{"type":"paragraph","text":"[1]新华社1958年7月12日编印的《内部参考》第2528期刊载湖北省粮食厅工作组《农业社办食堂对发展生产改善生活有很大促进作用》一文，介绍湖北省京山县合作乡八一社常年办食堂的经验，其中说，在京山县合作乡八一社，提起办食堂这件事，无论社干部和社员都会喜笑颜开地把它赞扬一番。这个社的农民喜欢食堂，是由于办食堂对促进生产、改善生活有四大好处：第一个好处是节省了劳动力，扩大了社员的收入；第二个好处是节约了粮食；第三个好处是节约了燃料，减少了社员开支；第四个好处是有利于发展生猪生产。但这个食堂开始并没有办好，他们经历了三次兴办两次垮台的过程，主要原因是食堂的管理工作未做好，加之吃饭的分配方法有问题。社里领导针对社员群众存在的怕办得不合理、怕管理人员贪污以及富裕农民怕露富的思想顾虑，进行了以下几件工作：首先，深入一点，作出榜样，用实事解除社员的误解。其次，成立组织，加强管理。全社以管财经的主任为主，吸收有关人员参加，组成了食堂管理委员会，各队也成立了食堂管理小组。主要任务是检查账目、随时听取群众对食堂工作的反映，并定期召开会议研究改进食堂工作。再次是坚持自愿入食堂的原则。对于不愿入食堂的农户的粮食、烧柴，仍然按分配原则如数分给。由于坚持了自愿原则，加之食堂越办越好，使原来不愿入食堂的农户也自动要求参加了。1958年8月1日出版的《红旗》杂志第五期以《八一农业社的食堂是怎样办好的？》为题发表了这篇文章。毛泽东全集第三十九卷"},{"type":"paragraph","text":"陈伯达“同志阅。退毛。"},{"type":"paragraph","text":"第十一页湖北京山县合作乡一个合作社办食堂一事，可以考虑在红旗上发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十四日[1]陈伯达，当时任《红旗》杂志总编辑。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":479,"page_end":480},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9d3159496"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
