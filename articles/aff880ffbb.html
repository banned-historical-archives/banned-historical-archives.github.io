authors":[],"dates":[{"year":1960,"month":1,"day":17}],"is_range_date":false,"parts":[{"text":"部分职工对今年持续大跃进的错误看法","type":"title"},{"text":"本刊讯　据一些内部刊物反映，“开门红”、“满堂红”、“红到底”的思想已经深入人心，成为广大职工群众的实际行动，并已取得了很大的效果。但是，有小部分职工群众对今年的持续大跃进还有以下一些不正确的认识：","type":"paragraph"},{"text":"一、跃进到顶论：错误地认为去年劲头已经鼓得很足，潜力已经挖得差不多了，今年至多只能象去年那样干，难于有更大的跃进。","type":"paragraph"},{"text":"二、条件论：有些煤矿新矿井的干部错误地认为新井条件不如老井，跃进困难多。基建部门有些干部错误地认为基建任务重，设备和技术力量不足，完成任务有困难。加工厂有些工人认为命运掌握在委托加工单位的手里，从而得出“只能被动跃进，不可能主动跃进”的错误结论。","type":"paragraph"},{"text":"三、错误地认为只能开门红，不能日日红，更不能红到底。","type":"paragraph"},{"text":"四、怕紧张。如夸大说：“继续跃进，连喘气的时间都没有了。”","type":"paragraph"},{"text":"五、错误地认为月初松、月底紧是不可能改变的常规，因而对建立步步高的新常规有畏难情绪。","type":"paragraph"}],"comments":[],"origin":"1960年1月17日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aff880ffbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
