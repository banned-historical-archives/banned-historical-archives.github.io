,"dates":[{"year":1966,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修的恶毒诽谤改变不了人心所向"},{"type":"paragraph","text":"苏联人民无限爱戴毛主席"},{"type":"paragraph","text":"据新华社莫斯科电　尽管苏联修正主义领导集团，对中国共产党和毛主席进行越来越恶毒的攻击和诽谤，但是苏联人民对伟大的毛主席和毛泽东思想却更加热爱，更加敬仰。"},{"type":"paragraph","text":"莫斯科一位教师说：“现在世界革命的导师是毛泽东。”格鲁吉亚一个青年学生向中国同志说：“毛泽东是世界革命的领袖，他的健康也就是我们的幸福。”列宁格勒的一个中年人说：“毛泽东和斯大林是真正的马克思列宁主义者。”莫斯科一位老年女工说：“毛泽东就是当代的列宁。”"},{"type":"paragraph","text":"苏联人民热烈赞扬毛泽东思想和热爱毛主席著作。一个苏联人向中国同志说：“毛主席的著作不仅对世界革命斗争有伟大意义，对各行各业的工作都有指导意义。”莫斯科的一位学生说：“列宁领导了十月革命，他死后有斯大林领导建设社会主义。现在只有靠毛泽东了，要好好研究毛泽东著作。”"},{"type":"paragraph","text":"许多苏联人民不顾当局的阻挠，热情地向中国同志表达他们对当代最伟大的马克思列宁主义者毛泽东同志的无比敬爱的心情。有一次，一位老人在莫斯科红场见到中国同志，便兴奋地翘起大拇指欢呼“毛泽东！毛泽东！”当警察把他拉在一旁训斥时，他还是继续大声高呼“毛泽东！”随后又紧紧地同中国同志站在一起，要求拍照留念。一个格鲁吉亚人说：“格鲁吉亚人民对毛泽东的心永远不会变，我们把希望寄托在中国人民的身上！”莫斯科的一个老人说：“过去我们喊斯大林万岁！毛泽东万岁！现在虽然不让喊了，但我们心里仍在喊，永远在喊。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f2dedfdab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
