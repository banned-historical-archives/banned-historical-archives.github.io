art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"带着问题学习毛主席著作炊事班端正了服役态度报话班解开了思想疙瘩","authors":["马何坤熊祖熙"],"parts":[{"type":"paragraph","text":"本报讯 某营炊事班活学活用毛主席著作，端正了工作态度，积极关心群众生活。"},{"type":"paragraph","text":"过去这个班五个人有两个不安心炊事工作，认为当炊事员不光彩，没有出息，要求改行，干劲不足。在学习“为人民服务”、“纪念白求恩”时，这些同志自动作了检查，提高了思想，端正了工作态度。姚定福说：“过去我认为干炊事员不光彩，没出息，这是个大错误。毛主席教导我们，干革命工作做的都是有益于人民的事情，都有前途，干炊事工作也是为人民服务。我一定听毛主席的话，坚决搞好炊事工作。”从此，他的思想安定，干劲十足。他的身体本来就较弱，有次为了抢救一个重病员，他主动跑到医院输了二百西西血，领导上叫他休息，他说：“白求恩为了中国革命事业，献出了宝贵生命，我为了救自己的战友，献出几滴血算不了啥，工作要紧，不用休息。”"},{"type":"paragraph","text":"过去这个班的同志对人态度生硬，关心群众生活差。他们学习“关心群众生活，注意工作方法”时，边学边议，边议论边检查，边检查边改正，增强了群众观点和阶级感情。王发明病了，炊事员孙富邦经常跑去问寒问暖，把饭送到床边。王发明感动地说：“炊事员真比自己的亲兄弟还亲啊！”为了使大家喝水方便，炊事员还天天把热开水送到各班。有次部队到基地积肥，那地方尽是陡坡、杂草、丛林，炊事员硬是披荆斩棘，把热开水送到大家嘴边。"},{"type":"paragraph","text":"每当同志们表扬他们的进步时，他们总是这样说：“毛主席的话，赛过特效药，牢记他的话，思想不生病。” （马何坤、熊祖熙）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2375eeb052"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
