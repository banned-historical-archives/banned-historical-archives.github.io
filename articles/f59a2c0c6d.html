"authors":[],"dates":[{"year":1951,"month":9,"day":10}],"is_range_date":false,"parts":[{"text":"青海镇压反革命工作中有粗糙现象","type":"title"},{"text":"【西北总分社十日讯】青海省在清理积案工作中，发现在镇压反革命工作中有简单粗糙和不够严肃慎重的现象。如在该省过去已经处决的六百四十六名罪犯中，有二人在当时情况下是可以“判处死刑，缓期二年，强制劳动，以观后效”的。介乎可捕与不可捕之间而捕了的有一百五十一人。化隆县把一个向我报告匪情的群众连同土匪一同逮捕关押。贵德县将一个判处死刑的罪犯全家九口人一起逮捕。全省另有重罪轻判者十五人，轻罪重判者十人，如湟中县被迫参加匪“中国国民党西北革命委员会”当过勤务，随匪抢劫过一次，但解放后曾经登记并交出枪支的一个农民，判处了十八年徒刑，而将另一个罪大恶极的分子，也只判处了十八年徒刑。发现后已予纠正。","type":"paragraph"}],"comments":[],"origin":"1951年9月12日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f59a2c0c6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
