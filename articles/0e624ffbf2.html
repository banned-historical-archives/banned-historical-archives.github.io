朋友说中国革命武装斗争的经验是对被压迫人民的宝贵援助","authors":[],"dates":[{"year":1969,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝《人民解放军报》热情赞扬中国人民解放军"},{"type":"paragraph","text":"用毛泽东思想武装起来的革命军队"},{"type":"paragraph","text":"非洲朋友说中国革命武装斗争的经验是对被压迫人民的宝贵援助"},{"type":"paragraph","text":"新华社四日讯　据巴特寮通讯社报道，老挝《人民解放军报》一日发表社论，庆祝中国人民解放军建军四十二周年。"},{"type":"paragraph","text":"社论热情赞扬了中国人民解放军的成长和丰功伟绩。社论说，中国人民解放军在毛泽东主席缔造的中国共产党的领导下，已成了一支用毛泽东思想和现代武器——其中包括核武器——武装起来的有高度警惕性的强大的革命军队，时刻准备着击退美国及其走狗的一切军事冒险行动，保卫中华人民共和国和亚洲及全世界的和平。"},{"type":"paragraph","text":"社论热烈欢呼中国人民解放军和老挝人民解放军之间的战斗友谊。社论说，老挝人民解放军和老挝人民在过去抗击法国殖民主义的战争中和在目前反击美国侵略的斗争中，始终得到具有无产阶级国际主义的中国人民解放军和中国人民的真心诚意的支持。"},{"type":"paragraph","text":"社论最后说，老挝人民解放军和人民借此机会向中国人民解放军和中国人民致以深切的谢意，并祝他们取得更大的成就。"},{"type":"paragraph","text":"新华社巴马科三日电　非洲佛得角群岛一位朋友最近在祝贺中国人民解放军建军四十二周年的一封信中指出：由伟大的马克思列宁主义者毛泽东主席所总结的中国革命武装斗争的经验，是对被压迫民族和被压迫人民民族解放运动的极其宝贵的援助。"},{"type":"paragraph","text":"这位非洲朋友在信中写道：毛主席缔造的中国共产党，领导中国人民解放军坚持了几十年的武装斗争，打败了形形色色的阶级敌人，终于在一九四九年建立了中华人民共和国。今天，中华人民共和国已成为社会主义和世界革命的强大堡垒。几十年来，全世界无产阶级和被压迫人民的天才导师毛主席，在把马克思列宁主义的普遍真理同中国革命的具体实践相结合的过程中，创造性地发展了马克思列宁主义。"},{"type":"paragraph","text":"信中写道：毛主席关于在无产阶级专政条件下继续革命的学说，是对马克思列宁主义理论的伟大贡献。毛主席分析和总结了无产阶级专政的国际经验，防止了苏联复辟资本主义的悲剧在中国重演。"},{"type":"paragraph","text":"这位朋友热烈欢呼中国共产党第九次全国代表大会的胜利，热烈欢呼中国无产阶级文化大革命的胜利和无产阶级专政的巩固。他说：帝国主义者、现代修正主义者和他们的走狗妄图通过“和平演变”使中国无产阶级专政蜕变为资产阶级专政的企图，已成泡影。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e624ffbf2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
