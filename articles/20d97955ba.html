,"dates":[{"year":1993,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南非暂定全民大选日期白人一极右组织威胁将发动内战"},{"type":"paragraph","text":"本报哈拉雷６月４日电记者温宪报道：１９９４年４月２７日已被南非多党谈判会议暂定为举行南非历史上第一次全民大选的日期。这一日期将在今后三周内予以最后确定。"},{"type":"paragraph","text":"在５月７日通过的一项意向宣言中，南非多党谈判会议曾确定６月３日为宣布具体大选日期的最后期限。在昨天晚上举行的谈判委员会会议上，与会者就计划委员会起草的一项宣布大选日期的决议进行了激烈的辩论。主持会议的工党人士兰德斯裁定，尽管有４个政党反对这一选举日期，但在与会的２６个代表团中，此议案已获“足够多数一致意见”，予以通过。"},{"type":"paragraph","text":"此外，在由“阿非利加人抵抗运动”领导人特莱布朗齐签署的一项声明中，这一极右组织威胁说，如果多党谈判会议不在６个月内承认白人的主权，他们将“视其为宣战”。约１５０名身着军服、手持武器的“阿非利加人抵抗运动”成员３日在举行多党谈判会议的约翰内斯堡郊区世界贸易中心外举行了炫耀武力的示威活动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20d97955ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
