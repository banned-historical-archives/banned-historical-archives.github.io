<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联高等学校举行科学会议批判修正主义的经济学理论","authors":[],"dates":[{"year":1958,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社莫斯科22日电】　苏联最近在莫斯科大学举行了高等学校的科学会议，批判各种反马克思主义的修正主义的经济学理论。参加这次会议的有莫斯科、列宁格勒、基辅及其他地方许多有名的经济学家和大学教授等。"},{"type":"paragraph","text":"会议的任务是总结各高等学校教研室传播马克思列宁主义的科学工作，指出各种现代反马克思主义的经济学理论的虚伪性和毫无根据，从而在思想上武装政治经济学及其他社会科学教师。"},{"type":"paragraph","text":"在科学会议的全体会议和小组会议上，共作了约30个报告，这些报告揭露和批判了现代修正主义的基本经济论点，以及修正主义在政治经济学方法问题上的歪曲等。"},{"type":"paragraph","text":"在大会报告和小组发言中，学者们指出，现代资本主义经济学家企图搬出形形色色的臆造的“资本主义变种”理论来否认资本主义的日益严重的腐朽和没落。他们高唱“国家调节经济”、“收入分配民主化”、“资本家的作用减弱了”等所谓“人民资本主义”理论。在近代资本主义技术进步的条件下，部分资本主义经济学家散布了虚伪的概念，似乎技术发展能自动地保证资本主义各种社会经济矛盾的解决。"},{"type":"paragraph","text":"阿·鲁米扬采夫教授在他的报告中严厉地批判了现代修正主义者的基本经济观点。他说，现代修正主义的根本特点和伯恩斯坦主义有许多共同之处。在帝国主义战争时代，社会主义革命时代和殖民主义制度崩溃时代，现代修正主义都出来帮助资本主义。南斯拉夫修正主义者粉饰垄断资本主义，竟把它说成具有社会主义的和平的民主的特点。"},{"type":"paragraph","text":"会议着重批判了资本主义经济“计划化”的理论，认为这是“资本主义变种”理论的一种。会议指出，垄断资本家们散布所谓资本主义“国家在经济中作用的革命”的理论，似乎国家是决定经济发展的力量。其实，国家垄断资本主义不仅未削弱，反而加剧了资本主义的矛盾。"},{"type":"paragraph","text":"会议驳斥了修正主义者的所谓“集团理论”说，社会主义阵营合作的基础是它们在根本目的上的一致，现代修正主义者搬弄“集团理论”，无非是为帝国主义的“实力政策”辩护。这种理论的实质是企图蒙混帝国主义国家的侵略政策同社会主义国家的和平政策之间的区别。这自然是对苏联和其他社会主义国家所执行的外交政策的有意歪曲。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c65bb3ade"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
