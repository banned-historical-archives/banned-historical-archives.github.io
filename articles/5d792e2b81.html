ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"关于改造和补充陈明仁部致林彪电","alias":"","parts":[{"type":"paragraph","text":"关于改造和补充陈明仁?部致林彪?电"},{"type":"paragraph","text":"（1949年11月4日）林彪同志，并告子恢："},{"type":"paragraph","text":"十一月二日电悉。你对陈明仁部所取方针是正确的。六十二师俘虏兵如尚未分散，可以拨补陈部。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月四日"},{"type":"paragraph","text":"[1]陈明仁，原国民党政府军将领，1949年8月与程潜率部在长沙起义。当时任中国人民解放军湖南军区副司令员、第二十一兵团司令员。"},{"type":"paragraph","text":"[2]林彪，当时任中国人民解放军第四野战军司令员、华中军区司令员。"},{"type":"paragraph","text":"[3]子恢，即邓子恢，当时任中国人民解放军第四野战军第二政治委员、华中军区第二政治委员。"},{"type":"paragraph","text":"[4]林彪在1949年11月2日给毛泽东并邓子恢的电报中提出的对陈明仁部的方针是：“加紧政治上与组织上的改造，学习革命道理，提拔进步分子，改正错误思想，分批集训落后干部，而当前以政治改造为主。”电报中并说准备待广西战役结束后，抽出两三个东北来的独立师或一个完整的军与陈明仁部合编或混编，还说到陈明仁要求将俘虏的国民党政府军六十二师的官兵补充给他的部队。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":494,"page_end":494},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d792e2b81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
