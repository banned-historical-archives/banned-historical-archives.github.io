" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji7","type":"pdf","name":"毛泽东文集第七卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji7.pdf"],"article":{"title":"给胡乔木的信","description":"根据手稿刊印。","dates":[{"year":1957,"month":12,"day":25}],"parts":[{"text":"给胡乔木的信","type":"title"},{"type":"appellation","text":"乔木同志："},{"type":"paragraph","text":"除四害通知尚有缺点，不扎实，轻飘一些。这是因为没有研究各地已经取得的丰富经验，你脑子里对此问题还很不懂的原故。现在有大批经验了，可用一个星期的时间将全国各省、市、县见于报纸的经验一齐找来仔细看一遍，边看边想，形成成套思想，然后下笔成文。至少改三遍、五遍，找彭真、刘仁及北京有经验的除害干部二三人及科学家二三人开一二次会，发表意见，修正文件，字斟句酌，逻辑清楚，文字兴致勃勃。文件可以长一点，达一千字至二千字左右也可以。总之使人看了感觉解决问题，百倍信心，千钧干劲，行动起来。内容要把人人振奋，改造国家，带动消灭人病、牲口病、作物病的道理讲清楚，这是理论。然后讲办法，也要讲得入情入理，使人觉得切实可行，没有外行话。要写这一部分，也要认真研究，下苦功钻一下。然后讲到书记动手，报纸、刊物、广播、定期扫除、定期检查等事，作为结束。两星期内写好、通过、发出也就好了。送我看一次。"},{"type":"paragraph","text":"莫斯科讲话，请打字送我再看一次，还觉得有需修改之处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十五日八时"},{"type":"paragraph","text":"到济南时，可歇一宿，认真谈一下。那里的斗争文件，工业、农业计划，找一份带回去，认真看一遍。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1},{"part_idx":2,"offset":5,"index":2},{"part_idx":2,"offset":133,"index":3},{"part_idx":3,"offset":5,"index":4}],"is_range_date":false,"authors":["毛泽东"],"comments":["胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。","指中共中央、国务院关于除四害、讲卫生的指示稿。","彭真（一九○二——一九九七），山西曲沃人，当时任中共北京市委第一书记、北京市市长。刘仁（一九○九——一九七三），四川酉阳人，当时任中共北京市委第二书记。","指毛泽东一九五七年十一月在莫斯科共产党和工人党代表会议上的三次讲话。"],"page_start":345,"page_end":346,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20cae400d6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
