{"year":1976,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湖北省图书馆积极为工农兵理论队伍服务"},{"type":"paragraph","text":"据新华社武汉电　反击右倾翻案风斗争开展以后，湖北省图书馆工作人员在党的领导下，认真学习毛主席的重要指示，深入批判邓小平的修正主义路线，更加自觉地担负起了宣传马克思主义、列宁主义、毛泽东思想，为三大革命运动服务的光荣任务。为了适应日益成长壮大的工农兵理论队伍的需要，他们派人到工厂、农村调查研究，积极提供图书报刊资料，使他们在反击右倾翻案风中更好地发挥作用。"},{"type":"paragraph","text":"湖北省图书馆还采取多种形式为农村服务。他们派出部分工作人员到农村协助公社抓好文化室。同时还采取邮寄借书、印发材料等方法帮助贫下中农理论队伍提高马克思主义理论水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dad9ec4874"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
