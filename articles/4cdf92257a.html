art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"听毛主席的话，全心全意为工农兵服务","authors":["上海舞蹈学校《白毛女》演出团顾建忠"],"parts":[{"type":"paragraph","text":"毛主席观看我们的演出，这是对革命现代戏的最大关怀，最大支持，这是对我们的最大鼓舞。我们一千遍一万遍地高呼：“毛主席万岁！毛主席万岁！万岁！万万岁！”演出结束后毛主席他老人家笑容满面走上舞台，亲切地和我们握手、照像。我见到了日夜想念的心中最红最红的红太阳，激动得热泪盈眶，真是还有什么比这更幸福的呢？千言万语归成一句，就是：祝毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"我生长在一个贫苦农民的家里。我深深知道，只因有了共产党，有了毛主席，我才得了救，翻了身，当了国家的主人。"},{"type":"paragraph","text":"可是党内头号走资本主义道路的当权派，却推行修正主义路线，在文艺界大肆贩卖修正主义货色，培养资产阶级的孝子贤孙，千方百计打击工农子弟，妄图复辟资本主义。"},{"type":"paragraph","text":"我们工农子弟有志气，我们有毛泽东思想，我们要为毛主席争光，为无产阶级争光。我们克服了种种困难，在毛泽东思想的指引下创作并演出了工农兵所喜闻乐见的革命现代芭蕾舞剧《白毛女》。敌人极力咒骂污蔑，极力破坏，可是我们最最敬爱的领袖毛主席给我们撑腰，毛主席最支持我们，毛主席最关心我们。今天，毛主席看了我们的戏，我永远永远也忘不了这最幸福的一天。"},{"type":"paragraph","text":"我一定要努力学习毛主席著作，努力地改造世界观，永远听毛主席的话，照毛主席的指示办事，彻底肃清修正主义文艺黑线的流毒。坚决演好革命现代戏，永远地全心全意地为工农兵服务，让工农兵英雄形象占领舞台，坚决把无产阶级文化大革命进行到底，以实际行动来回答毛主席的关怀和支持。这一天啊，我想得很多很多，归根结底就是：忠于毛主席，忠于毛泽东思想，忠于毛主席的无产阶级革命路线。"},{"type":"paragraph","text":"祝毛主席万寿无疆！万寿无疆！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4cdf92257a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
