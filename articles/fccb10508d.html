歌","authors":["蔡笃龙","陈永祥"],"dates":[{"year":1968,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“五指山高，没有毛主席的恩情高，万全河长，没有军民的阶级情谊长”"},{"type":"paragraph","text":"五指山下苗寨唱新歌"},{"type":"paragraph","text":"在五指山下，有一个二十四户人家的苗寨。每天清晨，寨里的鹿皮鼓响过以后，苗家的孩子们就高兴地背着书包，唱着毛主席语录歌来到学校。"},{"type":"paragraph","text":"这个学校，是这个苗家寨子历史上的第一所学校，它是在解放军同志的帮助下创办起来的。"},{"type":"paragraph","text":"解放军某部的一个连队，移防来到了五指山下的这个苗寨附近，连队党支部经常组织战士到苗家访贫问苦。一天，学习毛主席著作积极分子李顺智，看到有的社员用苞米粒放进竹筒这个原始方法在记工分，思想受到很大震动。晚上，他久久不能入睡，他想起毛主席的教导：“我们的同志不论到什么地方，都要和群众的关系搞好，要关心群众，帮助他们解决困难。”对，一定要帮助苗族同胞解决缺少文化的困难。"},{"type":"paragraph","text":"第二天，李顺智把自己的心事，告诉了指导员。党支部经过研究，决定帮助苗胞办学校。战士们知道这个消息以后，纷纷利用休息时间，赶做了桌子、板凳；还割了茅草，盖起了一座新校舍。大家还送了许多“老三篇”和毛主席著作单行本，选了两名五好战士担任教师。就这样，这座五指山深处的苗寨里建立起了第一所学校。"},{"type":"paragraph","text":"从此，连队的同志们风雨无阻，把毛主席的书当基本课本，并帮助他们学习文化，使苗胞们逐渐改变了过去那种落后的记事方法。现在，这所学校里培养出来的学生，有的已经成为村里学习毛主席著作的辅导员，有的担任了生产队的会计，还有的当了民兵排长。"},{"type":"paragraph","text":"这个苗寨的苗胞们，热情地颂扬解放军：“五指山高，没有毛主席的恩情高，万全河长，没有军民的阶级情谊长。”"},{"type":"paragraph","text":"陈永祥　蔡笃龙"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fccb10508d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
