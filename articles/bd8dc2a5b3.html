art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见美籍教授林家翘"},{"type":"paragraph","text":"国务院副总理邓小平九月二十二日上午会见了美国科学院院士、麻省理工学院教授林家翘博士。会见时，邓小平副总理就我国当前的政治、经济形势和教育、科研的发展等问题，同林家翘教授进行了亲切的谈话。"},{"type":"paragraph","text":"国务院副总理、中国科学院院长方毅参加了会见。会见以后，邓小平副总理和方毅副总理同林家翘教授共进午餐。"},{"type":"paragraph","text":"王震副总理会见新加坡全国国术总会访华团"},{"type":"paragraph","text":"国务院副总理王震九月二十二日上午会见了由新加坡总理公署高级政务部长、全国国术总会会长李炯才率领的新加坡全国国术总会访华团，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"陈慕华副总理分别会见几内亚比绍和缅甸客人"},{"type":"paragraph","text":"国务院副总理陈慕华九月二十二日上午会见了由几内亚和佛得角非洲独立党最高斗争委员会执委会委员、祖国自由战士部部长保罗·科雷亚率领的几内亚比绍共和国友好代表团。会见时，宾主进行了友好的谈话。"},{"type":"paragraph","text":"同一天上午，陈慕华副总理会见了以卫生部副部长吴觉钦为团长的缅甸卫生代表团。"},{"type":"paragraph","text":"在友好的交谈中，陈慕华副总理和吴觉钦团长对中缅两国在卫生和体育方面的交往和合作关系的不断发展表示满意。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd8dc2a5b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
