script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"个体经营户请“帮手”是不是剥削?","authors":[],"dates":[{"year":1981,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"经济界和理论界有些同志提出，允许个体经济存在和发展，就应当允许雇工，这是一种必然趋势，符合生产力发展的要求。有些同志则认为，允许雇工就是恢复雇佣剥削，就会离开社会主义道路。"},{"type":"paragraph","text":"顾纪瑞、沈茂棠同志在一篇文章中认为，在我国国营经济占绝对优势的条件下，个体经济是社会主义公有经济的附属和必要的补充。这与社会主义改造以前是不同的。现在，个体经济的生产和经营活动，如原料供应、产品销售、经营规模、服务范围等，都直接或间接地受公有制经济的影响和制约，国家还以信贷、税收、价格等经济杠杆进行引导或限制，因而它已不可能发展为资本主义经济。"},{"type":"paragraph","text":"个体经济是小商品经济，个体经营者是独立劳动者。即使他们招请一两个帮手，带三五个学徒，也还不能叫雇工剥削。由于个体经营者参加生产劳动，并且往往具有较高的生产技能和组织管理能力，在劳动中处于主要地位，提供了数量较多、质量较高的劳动，因此得到较多的收入是合理的。而帮手的劳动则处于辅助地位，帮手在提供劳动后，已得到等量报酬，因此不存在剥削。个体经营者同帮手之间不是雇佣关系，而是独立劳动者之间建立在自愿基础上的互助互利关系。至于个人自筹资金，购置必要的生产资料，招请帮手四、五人的小企业，属于什么性质呢?我们认为这种小企业仍是劳动者个体经济，并非资本主义性质。这些小企业的经营者，其经济地位相当于生产资料私有制进行社会主义改造前的“小业主”，现在则属于独立劳动者中的富裕户。"},{"type":"paragraph","text":"应当看到，这里有一个量变到质变的临界点问题。个体经营者请一、二个帮手，所得利润还达不到一个帮手全年工资的一倍，这种多收入部分，不能视为剥削。招请四、五个帮手的个体经营者，由于利润收入达到一个帮手全年收入的二倍左右，应该承认存在轻微剥削，但还可以允许存在。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16ee27d9ee"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
