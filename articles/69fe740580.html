泽东"],"dates":[{"year":1967,"month":5,"day":2}],"is_range_date":false,"parts":[{"text":"关于大批判的谈话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"大批判要慎重，要确实，要调查清楚。调查清楚，批判才有力量，否则就会一风吹。引他（指刘少奇）的话不能只顾头不顾尾。批判要站得住。","type":"paragraph"},{"text":"“托拉斯”这个名词，不能一概驳，主要驳他走资本主义道路。有些旧名词要赋予新的意义。","type":"paragraph"},{"text":"“驯服工具论”要批判，但也要有无产阶级纪律。服从、团结，那是有条件的。","type":"paragraph"},{"text":"今年形势好，布、粮还是要抓。社论要搞快一些。","type":"paragraph"},{"text":"批判文章文字要短。一、二千字，写一个问题，一个问题说明了就行，不能超过三千字。长了没有人看，看了也记不清。","type":"paragraph"},{"text":"彭、罗、陆、杨可以称为“反革命修正主义分子”，其他人称“修正主义分子”。“中国的赫鲁晓夫”，文章中提，在标题上不要提。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69fe740580"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
