script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《巴特寮新闻》揭露极右派玩弄辞职骗局  号召人民制止反动派的破坏活动","authors":[],"dates":[{"year":1975,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《巴特寮新闻》揭露极右派玩弄辞职骗局"},{"type":"paragraph","text":"号召人民制止反动派的破坏活动"},{"type":"paragraph","text":"新华社万象一九七五年五月十一日电　据《巴特寮新闻》报道，在人民群众运动的强大压力下，万象方面在老挝临时民族联合政府中担任职务的一些极右分子和一些反动军官已提出“辞职”。"},{"type":"paragraph","text":"报道说，正式提出“辞职”的有：财政大臣贡·萨纳尼空、外交部国务秘书占通·占塔拉西、公共工程和运输部国务秘书洪潘·赛雅西等极右反动分子以及万象军队“第二军区司令”王宝和“第五军区司令”通立等反动军官。还有一些万象方面的大臣和反动军官也在准备“辞职”。"},{"type":"paragraph","text":"《巴特寮新闻》就此发表评论，揭露万象极右反动派玩弄辞职骗局。评论指出，面对正在沸腾高涨的人民群众运动，万象方面的一些极右反动分子和军官纷纷提出“辞职”或逃往国外。“这是正在进行最后挣扎的万象极右反动派的极其险恶的阴谋，其目的是妄图嫁祸于将继续管理国家的联合政府和民族政治联合委员会，以制造混乱。”"},{"type":"paragraph","text":"评论号召全体老挝人民不要受万象极右反动派的欺骗，紧密团结，揭露他们正在给人民制造混乱的阴谋，并采取相应措施，制止这些人的破坏活动。"},{"type":"paragraph","text":"评论最后强调指出，印度支那和老挝的形势已发生了巨大变化。现在是爱国的老挝人民紧紧掌握国家命运的时期，也是美国走狗和阻挠和平的极右反动派正在遭受失败并将遭到彻底失败的时期。美帝国主义和极右反动派已不能再为所欲为了。如果他们仍然顽固地进行叛国活动，热爱和平与民族和睦的人民就将团结起来把他们彻底消灭。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a431d912f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
