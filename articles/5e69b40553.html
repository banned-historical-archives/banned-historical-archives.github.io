国务院关于准许退职回城青年回原单位复工的通知","dates":[{"year":1979,"month":4,"day":30}],"is_range_date":false,"authors":["国务院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 523","tags":[{"name":"退职","type":"主题/事件"},{"name":"知识青年","type":"主题/事件"}],"parts":[{"type":"title","text":"国务院关于准许退职回城青年回原单位复工的通知"},{"type":"subtitle","text":"（一九七九年四月三十日）"},{"type":"paragraph","text":"各省、市、自治区革命委员会，国务院各部委、各直属机构：1 最近，一些盲目退职回城的知识青年，提出回原单位复工的要求，应该准许。现就有关问题通知如下："},{"type":"paragraph","text":"一、国营农场的知识青年，下乡插队后已安排在工矿企业和其它事业单位工作的知识青年，以及文化大革命前的支边青年，采取退职的方式返回城市的作法是不妥当的，应该制止。已退职回城的，应返回原单位，并退还所发的退职金。确有特殊困难需要调动的，国营农场的知识青年，按照中央（1978）74号文件的规定办理；下乡插队后已安排在工矿企业和其它事业单位工作的知识青年，以及文化大革命前的支边青年，可按照人事、劳动部门关于干部、工人调动的有关规定办理，事先要征得调入地区有关部门的同意。"},{"type":"paragraph","text":"二、已办理退职的上述人员，原单位要欢迎他们复工，不得歧视，并报销返回的路费。原所在地区，要允许落户。本人回原单位后，退职期间的工资不补发，但生活确实困难的，可酌情给予补助。"},{"type":"paragraph","text":"各地在贯彻执行本通知时，不要简单从事，必须注意加强思想教育，切实做好青年和家长的思想工作。"},{"type":"subtitle","text":"中华人民共和国国务院 (摘自国发〔1979〕121号文件)"},{"type":"paragraph","text":"1. This information comes from a copy of the same document found in 国务院知青办, 知青工作文件选编, 北京: 国务院知青办, 1981, p. 120."}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e69b40553"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
