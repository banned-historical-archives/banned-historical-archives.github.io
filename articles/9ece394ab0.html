art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志生活的党小组","authors":["胡宏伟"],"parts":[{"type":"paragraph","text":"红军长征途中，毛泽东同志所在的党小组被评为模范党小组……"},{"type":"paragraph","text":"在这个党小组——"},{"type":"paragraph","text":"不分什么身份和职务；"},{"type":"paragraph","text":"人人都是普通一员，"},{"type":"paragraph","text":"同志——是彼此间最亲切的称呼。"},{"type":"paragraph","text":"尽管您是党和人民的领袖，"},{"type":"paragraph","text":"他们是您的警卫、勤务；"},{"type":"paragraph","text":"融洽的情感，宛若鱼和水，"},{"type":"paragraph","text":"蓬勃的朝气，就象喷薄的日出。"},{"type":"paragraph","text":"那次选举小组长——"},{"type":"paragraph","text":"您提的候选人，就是您的马夫，"},{"type":"paragraph","text":"您按时向小组长缴党费，"},{"type":"paragraph","text":"日理万机中，从未有一次延误。"},{"type":"paragraph","text":"为了执行小组的决议——"},{"type":"paragraph","text":"“爱护苗山的一草一木！”"},{"type":"paragraph","text":"您不摘门板睡在地上，"},{"type":"paragraph","text":"处处尊重苗家的风俗。"},{"type":"paragraph","text":"为了响应小组的号召——"},{"type":"paragraph","text":"“走出草地，决不让一人落伍！”"},{"type":"paragraph","text":"您把马匹让给伤病员，"},{"type":"paragraph","text":"自己却艰难地跋涉在征途！"},{"type":"paragraph","text":"难忘那次党小组会上——"},{"type":"paragraph","text":"一个同志提的意见与事实有出入，"},{"type":"paragraph","text":"您热情鼓励他把话讲完，"},{"type":"paragraph","text":"高度赞扬了生动活泼的政治民主。"},{"type":"paragraph","text":"呵，我们党的这个小组——"},{"type":"paragraph","text":"为啥这样平凡，又这样突出？"},{"type":"paragraph","text":"平凡呵，您时刻以一个普通的党员出现。"},{"type":"paragraph","text":"突出呵，战斗集体中有一个伟大的公仆！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ece394ab0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
