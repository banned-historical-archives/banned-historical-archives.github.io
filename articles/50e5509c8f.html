"],"dates":[{"year":1967,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"谢富治谈谭震林问题","type":"title"},{"text":"谢富治","type":"authors"},{"text":"〖1967年5月14日下午两点，在市革委会全体委员会议前就农林口问题请示了谢副总理〗","type":"appellation"},{"text":"问：现在外面传说，毛主席在一次会上说过：有人不是要打倒谭震林？他今天还参加会来了！毛主席真这样说过吗？","type":"paragraph"},{"text":"谢：没有这么回事，我参加会议没有听见主席这么说过，这是有人造谣！","type":"paragraph"},{"text":"问：今后农林口的问题怎么搞？谭震林的问题怎么搞？","type":"paragraph"},{"text":"谢：你们自己干嘛！继续深入地批判他！","type":"paragraph"},{"text":"说：谭震林五月一日上天安门后，农林口形势有很大变化，他的秘书吕伊波五月二日突然死去了，有恐怖气氛！","type":"paragraph"},{"text":"谢：吕伊波揭发了谭震林吗？","type":"paragraph"},{"text":"答：他写了一个揭发谭震林问题的提纲，还来不及揭发，就突然死去了，死的原因我们正在调查。","type":"paragraph"},{"text":"谢：不论过去、现在，或者将来，你们批判谭震林的错误都是对的。即使将来给他工作，你们批判他也是对的。保守派要保就是错的。你们可以把这些问题反映给总理。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50e5509c8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
