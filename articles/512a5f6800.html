<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5415","name":"华侨事务委员会关于华侨、侨眷、归侨、归国华侨学生身份的解释","author":"华侨事务委员会","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"华侨事务委员会关于华侨、侨眷、归侨、归国华侨学生身份的解释","dates":[{"year":1957,"month":12,"day":4}],"is_range_date":false,"authors":["华侨事务委员会"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 199-201","tags":[{"name":"华侨","type":"主题/事件"},{"name":"侨务","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"华侨事务委员会"},{"type":"title","text":"关于华侨、侨眷、归侨、归国华侨学生身份的解释"},{"type":"subtitle","text":"（一九五七年十二月四日）"},{"type":"paragraph","text":"这一份对华侨、归侨、侨眷、归国华侨学生的身份的解释意见，仅是为了供各级侨务机关、各有关部门进行工作时内部参考之用，不对外公布。"},{"type":"paragraph","text":"这些解释意见，主要是为了区分工作对象、确定身份，便于进行工作。具有某项身份的人，不等于即可享受华侨、侨眷的一切优待与照顾。华侨、侨眷应当享受的优待与照顾，必须根据有关的法令和通知、规定来确定。例如：某些人可以解释为华侨、侨眷，但按照前政务院土地改革中对华侨土地财产处理办法，却不能享受优待。某些人是华侨、归国后是归侨，但按照海关携带行李物品优待办法的规定，一年中回国超过一次以上的就不能享受华侨优待。"},{"type":"paragraph","text":"人民政府对华侨、侨眷的一些优待与照顾的规定和措施，主要是从他们所具有的一些特殊情况出发的。归侨的情况也是有各种各样的。有一般归侨，有在国外因正当权益受剥夺或因保护正当权益而遭受迫害的归侨，有因天灾、战祸被迫回国的归侨，也有在国外干反动政治活动的和流氓、盗窃、刑事犯罪分子。对各种各样的归侨，要根据其不同情况，分别对待、处理，仍然是必要的。如果归侨回国多年和国外已无经济联系，虽然还可称为归侨，但待遇应与国内人民一样，不需另作优待。侨眷在国外已无亲人，其侨眷身份亦已消失，待遇也应与国内人民一样。"},{"type":"paragraph","text":"（一）华侨"},{"type":"paragraph","text":"甲、凡侨居在国外的中国公民就是华侨。"},{"type":"paragraph","text":"乙、有下列情形之一者，应视为有华侨身份："},{"type":"paragraph","text":"1. 解放前出国的留学生，现已离开学校在国外就业或从事研究工作者（包括半工半读者在内）；"},{"type":"paragraph","text":"2. 侨批员；"},{"type":"paragraph","text":"3. 在国外（不包括港澳）轮船公司（包括国外华侨资本代理、租赁或自行经营的）服务的中国籍海员；"},{"type":"paragraph","text":"4. 伪外交人员脱离蒋介石集团而从事其他社会职业者；"},{"type":"paragraph","text":"5. 解放后逃亡国外的人员，在国外从事正当职业者。"},{"type":"paragraph","text":"丙、有下列身份之一者，不是华侨："},{"type":"paragraph","text":"1. 香港、澳门的中国居民；"},{"type":"paragraph","text":"2. 出国留学生；"},{"type":"paragraph","text":"3. 出国游历或考察的人员；"},{"type":"paragraph","text":"4. 政府派往国外的公务人员；"},{"type":"paragraph","text":"5. 居住我国边境经常来往国境内外地区的边境居民；"},{"type":"paragraph","text":"6. 派往蒙古人民共和国协助建设的工人。"},{"type":"paragraph","text":"（二）侨眷"},{"type":"paragraph","text":"甲、有下列情形之一者即为侨眷："},{"type":"paragraph","text":"1. 华侨在国内的配偶和直系亲属；"},{"type":"paragraph","text":"2. 华侨在国内的旁系亲属和义父、母、子、女，其生活来源经常依靠华侨接济者；"},{"type":"paragraph","text":"3. 华侨在国内的旁系亲属，虽不依靠华侨的接济为其生活主要来源，但与华侨未分家者。"},{"type":"paragraph","text":"乙、侨眷身份的消失："},{"type":"paragraph","text":"原为侨眷，如因华侨在外死亡或已归国而失去甲项各条构成侨眷身份的条件者，原则上其侨眷身份即已消失。"},{"type":"paragraph","text":"丙、归侨的配偶及亲属是否算侨眷："},{"type":"paragraph","text":"1. 归侨在国内结婚的配偶，只有具备以下条件之一者，才算侨眷："},{"type":"paragraph","text":"（1）配偶本人具有甲项所规定的三条件之一者；"},{"type":"paragraph","text":"（2）归侨再出国者；"},{"type":"paragraph","text":"（3）归侨的直系亲属仍侨居国外者。"},{"type":"paragraph","text":"2. 归侨从国外带回的配偶及其他亲属，如果是中国人，应当是归侨；如果是外国人或无国籍人，只有在加入中国籍后、归侨再出国或归侨的直系亲属仍侨居国外的情况下，才算侨眷。"},{"type":"paragraph","text":"（三）归国华侨"},{"type":"paragraph","text":"“归国华侨”是华侨回国后的通称。不论回国时间长短,也不论是自行回国或被迫回国，都可称之为归国华侨。"},{"type":"paragraph","text":"（四）归国华侨学生"},{"type":"paragraph","text":"侨居国外的华侨子、女（包括父、母未出国而子、女被亲友携带出国者），从国外回来求学，现在还继续在国内学习的，就是归国华侨学生。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"512a5f6800"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
