rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"陈其通是个典型的资产阶级老爷","authors":["许士麟"],"parts":[{"type":"paragraph","text":"陈其通曾兼任过解放军艺术学院副院长，我虽然和他只见过两次面，但他向我们散布了不少他的有关“美”的“学问”。"},{"type":"paragraph","text":"他说：搞艺术的脚大不好看。要大家都穿尖头皮鞋把脚控制住，不要再长大了。"},{"type":"paragraph","text":"他说：女同志穿部队的鞋不好看，象“米老鼠”，他下令都要换塑料底的灯芯绒棉鞋。"},{"type":"paragraph","text":"他还说：“解放军艺术学院要广收天下美女、美男子”。什么是他所谓的“美女、美男子”，那就是：白嫩的皮肤，明亮的眼睛，柔软的身材。我们要问陈其通，你要这些“白嫩的皮肤、柔软的身材”为工农兵服务呢？还是为资产阶级老爷太太和公子小姐服务呢？事情是很清楚的，你所以要广收天下“美女”、“美男子”，搞得满台“美人”，是要适合你所代表的资产阶级老爷太太们的需要，用“美色”赢得他们的“喝采”。"},{"type":"paragraph","text":"解放军艺术学院每年招生时，陈其通总要另搞一个“加试”，他亲自出马挑选他所需要的“美女”、“美男子”。"},{"type":"paragraph","text":"记得我在报考时，陈其通就来了这么一着。他和考生握手时，见到贫农出身的马恩然同学，嫌他长得黑，说他是“黑小子”，不和他握手。这使我们立刻想起那些戴着白手套的贵族老爷来。我们要问陈其通：你嫌他黑，怕脏了你的手是吗？脸黑那是他劳动种地太阳晒的，脸黑正说明他光荣！只有资产阶级小姐太太才嫌他们黑，嫌他们不“美”。毛主席说：“拿未曾改造的知识分子和工人农民比较，就觉得知识分子不干净了，最干净的还是工人农民，尽管他们手是黑的，脚上有牛屎，还是比资产阶级和小资产阶级知识分子都干净。”"},{"type":"paragraph","text":"我们要正告陈其通：马恩然的脸虽然黑，但是他比你那资产阶级反党反社会主义的黑线、黑思想干净得多。你不愿意和劳动人民的子弟握手，这说明你完全蜕化变质，和资产阶级老爷太太成了一伙！我们一定要和你们这伙牛鬼蛇神斗争到底！捍卫毛泽东思想，捍卫无产阶级文艺大旗。"},{"type":"paragraph","text":"DW：解放军艺术学院"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9defc4f9b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
