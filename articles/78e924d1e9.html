art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席到达巴厘","authors":[],"parts":[{"type":"paragraph","text":"据新华社巴厘17日电 以诗之岛闻名的印度尼西亚巴厘岛的居民，今天穿上美丽的节日盛装，充满着热情欢迎中国贵宾刘少奇主席和夫人王光美。"},{"type":"paragraph","text":"下午两点三十分，刘少奇主席和夫人王光美在苏加诺总统和哈蒂妮·苏加诺夫人的陪同下，乘专机到达巴厘岛的首府巴塘的机场。陈毅副总理和夫人张茜、外交部副部长黄镇、中国驻印度尼西亚大使姚仲明及其他随行人员也同机到达。"},{"type":"paragraph","text":"飞机着陆后，刘少奇主席和夫人王光美受到巴厘省长苏特雅、努沙登加拉军区司令沙福丁上校、巴厘卫戍司令苏罗索中校、巴厘警察署长苏帕佐、巴厘首席检查官普尔万托和其他高级军政官员的热烈欢迎。"},{"type":"paragraph","text":"今天下午刚到达巴厘的第二副首席部长兼外交部长苏班德里约、基本教育和文化部长普里约诺，也来到机场欢迎中国贵宾。"},{"type":"paragraph","text":"军乐队奏中国和印度尼西亚国歌后，在机场举行了欢迎仪式。刘少奇主席在苏加诺总统的陪同下检阅了仪仗队、军士和警官。"},{"type":"paragraph","text":"接着，巴厘人民用他们最盛大的传统仪式对贵宾们表示欢迎。一群穿着巴厘节日服装的年青姑娘向刘少奇主席和夫人、陈毅副总理和夫人献了花环。然后，刘少奇主席和夫人、陈毅副总理和夫人在苏加诺总统和哈蒂妮·苏加诺夫人的陪同下，以两把漂亮的阳伞为先导，穿过了由一千四百个美丽的巴厘姑娘排成的“巴厘之门”，这象征贵宾们现在已经置身于巴厘人民之中了。在刘少奇主席等满面笑容地缓步穿过“巴厘之门”的时候，五彩缤纷的花瓣向他们撒来，落在他们所走的路上，在贵宾们前面铺成了一条由芬芳的鲜花组成的地毯。"},{"type":"paragraph","text":"贵宾们从机场乘车到环境优美的坦帕西林宫休息。在从机场到坦帕西林宫的五十多公里的路上，用绿色椰树叶搭起了一连串的巴厘式的牌楼，约有十万人守候在沿路欢迎贵宾。许多戴着美丽的头饰的妇女手里拿着盛了鲜花的银碗，向贵宾们乘的汽车撒鲜花瓣，民间乐队不断奏着欢乐的巴厘乐曲。"},{"type":"paragraph","text":"在进入巴塘市的时候，刘少奇主席和苏加诺总统改乘一辆敞篷车。刘少奇主席向路两旁的人群频频招手致意。汽车队在“人墙”中间穿过，这时高呼“独立”、“万岁”的欢呼声象暴风雨一般，无数带着中国和印度尼西亚国旗的彩色汽球腾空而起。"}],"alias":""},"tags":[{"name":"王光美","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78e924d1e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
