<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一位读友意见:解除中间商的剥削 农民自己运销肥料种植马铃薯，可用化学肥料。同时希望政府发展肥料工业。","authors":["顾荣申"],"dates":[{"year":1949,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者先生:读八日贵报，知道龙华区的农民，因粪肥太贵，种马铃薯要亏本，他们想采用化学肥料，而怀疑与上海土质是否相宜一点，本人站在学农见地，认为化学肥料可以采用。上海近郊用化学肥料于水稻，小麦，棉花者已很普遍，效果显著，如用作蔬菜或洋薯追肥，有效可无问题。"},{"type":"paragraph","text":"上海土壤，属冲积性之砂质或粉砂质之壤土与粘壤土。同样土壤，在杭州，广州均见栽培蔬菜，且二地均大量采用化学肥料多年，无何不良结果。现在问题，乃化学肥料同样太贵，且市上无货供应。假定用于一亩洋薯之清粪六十担，相当于浓粪十二担，则共含氮素约七斤磷素二斤需用硫酸铵卅五斤，及过磷酸钙十斤方可相抵，现价恰合白米半石之谱，故如采用，亦属无利可图。"},{"type":"paragraph","text":"对于马铃薯最适宜之肥料为厩肥，依外国用量，每亩自二七○○斤至四千斤，另加硫酸钾廿五斤。其收获量每亩亦有廿五担至四十担。本人以为农民可自己组织肥料运销合作社，直接向市中区购运人粪尿及牧场之厩肥，则成本低廉，用量自可增加，每亩产量当不至限于目前之十五担。如果办理良好，还可以承运市区垃圾，把它制成堆肥，待腐熟后作为菜圃基肥，其效不逊厩肥。其他细节，希望待以后讨论。现在的政府是人民自己的政府，农民可以自己组织起来，反对中间商的剥削。农民有反对亏本争取生存的权利。一方面希望政府发展肥料工业，有便宜而足够的化学肥料供应农村，农业才容易繁荣。"},{"type":"paragraph","text":"读者中国农业科学研究社　顾荣申上，九日。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f48d659f74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
