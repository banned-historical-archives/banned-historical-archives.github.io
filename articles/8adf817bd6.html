art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"昨日要闻简报","authors":[],"parts":[{"type":"paragraph","text":"中共中央领导人会见日共代表团"},{"type":"paragraph","text":"中共中央副主席刘少奇、周恩来和总书记邓小平，二十一日下午会见日本共产党中央委员会政治局委员、中央书记处书记袴田里见和由他率领的日本共产党中央委员会代表团。"},{"type":"paragraph","text":"同天晚上，中共中央举行宴会，热烈欢迎日共代表团。刘少奇、周恩来、邓小平等同志出席了宴会。"},{"type":"paragraph","text":"第二次亚非会议预备会下月举行"},{"type":"paragraph","text":"印度尼西亚举办第二次亚非会议学术讨论会。印度尼西亚第一副总理苏班德里约在会上宣布，第二次亚非会议预备会议将在四月十日举行。印度尼西亚共产党第一副主席鲁克曼，在会上强烈谴责现代修正主义破坏亚非会议准备工作。"},{"type":"paragraph","text":"日苏协会严正拒绝三国条约"},{"type":"paragraph","text":"日苏协会理事长松本七郎写信给苏日协会会长涅斯捷罗夫，严正拒绝了苏日协会要日苏协会支持美、英、苏三国部分禁止核试验条约的要求；并且要求缔结立即无条件地全面禁止核试验和禁止核武器的国际协定。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8adf817bd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
