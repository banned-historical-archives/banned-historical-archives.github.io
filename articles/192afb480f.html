乔木的信","authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":24}],"is_range_date":false,"parts":[{"text":"毛泽东关于指导全党整风运动问题给胡乔木的信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"乔木同志：","type":"appellation"},{"text":"全党整风运动即将开始，这件事已成当前一切工作向前推进的中心环节。这一环节不解决，各项工作便不能顺利地向前推进了。中央已指定了一个三人委员会，你为主任，负责审查各地整风文电并起草复电；尔后则负责注意这个运动的发展，替中央起草指导文电，并注意报纸刊物的报道和指导（六月上旬应写社论一篇）。各地整风指示文件均须经中央审查，截至今日止，已到者有华东，西南，西北，内蒙，一野等处，请你即于两三日内总阅一遍，邀集安子文，肖华谈一下，逐一起草复电（请叫尚昆注意各地有关此类来电，抄送你和安、肖），或者还须总复一电。其原则是大体可用者即予同意，须作部分修改者则予修改。关于学习文件，有关全国者须予统一。复电要快，本月内（只有七天了），均须将起草，送书记处各同志看过，并用四A级电拍发等事办理完毕，以便全国整风能于六月上旬一律开始。","type":"paragraph"},{"text":" 毛泽东五月廿四日上午六时","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"192afb480f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
