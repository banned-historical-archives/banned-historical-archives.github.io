script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"安山公社干部坚决执行勤俭的原则  发扬艰苦朴素优良作风  抵制资产阶级思想侵蚀","authors":[],"dates":[{"year":1970,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"安山公社干部坚决执行勤俭的原则"},{"type":"paragraph","text":"发扬艰苦朴素优良作风  抵制资产阶级思想侵蚀"},{"type":"paragraph","text":"据新华社哈尔滨三日电　黑龙江省延寿县安山公社干部，遵照毛主席关于“财政的支出，应该根据节省的方针。应该使一切政府工作人员明白，贪污和浪费是极大的犯罪”和“什么事情都应当执行勤俭的原则”的教导，发扬艰苦朴素的优良作风，不乱花国家一分钱，为国家节省了行政开支，有力地抵制了资产阶级思想的侵蚀。"},{"type":"paragraph","text":"无产阶级文化大革命以前，在叛徒、内奸、工贼刘少奇的“公私溶化论”和“活命哲学”的毒害下，这个公社有些干部沾染了图安逸、讲享受、闹排场的资产阶级作风，花钱大手大脚，甚至化公为私。当时大部分干部起来抵制这种不良倾向，坚持发扬艰苦朴素的优良传统。在无产阶级文化大革命中，安山公社的干部反复学习了毛主席关于“要节约闹革命”的伟大教导，进一步认识到，勤俭办一切事业，节省财政开支，这不仅是少花几个钱的问题，而且是保持艰苦朴素的优良传统，防止资产阶级糖衣炮弹袭击的需要。为此，公社专门制订了加强财政管理的制度。无产阶级文化大革命三年多来，在尖锐复杂的阶级斗争中，这个公社的行政开支仍然年年结余。"},{"type":"paragraph","text":"几年来，安山公社的领导成员模范地执行各种财务制度，克己奉公，自觉地为着革命事业节约每一分钱。公社革委会领导成员到县里办事，不住旅馆住便铺。从公社到县里四十多里地，他们也常常步行。在领导成员的影响和带动下，革委会工作人员也处处注意节约，一根大头针，一张稿纸，他们都十分珍惜。打电话，拍电报，都严格控制，可用信件办的事，就不用长途电话，可托人捎的信就不邮寄。"},{"type":"paragraph","text":"安山公社革委会成立后，抓革命、促生产很有成绩，地、县革委会常在这里召开现场会议。在这大好形势下，公社领导班子一度忽视了艰苦奋斗，作出了修建一个象样的会议室的决定。但是，他们通过学习党的“九大”文献，很快认识到：这是在胜利面前，滋长了骄傲自满和讲排场的资产阶级思想作风的一种表现。他们经过斗私批修，又重新作出决定，把准备修建会议室的资金和材料，拨给急需扩建厂房的地方工业部门。现在全公社上下，已经养成了以艰苦朴素为荣的良好风气。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5f9009e48"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
