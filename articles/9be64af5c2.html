ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于中央警卫团不应设立文工团的批语","alias":"","parts":[{"type":"paragraph","text":"关于中央警卫团不应设立文工团的批语\"!"},{"type":"paragraph","text":"（1953年11月5日）刘、朱、彭、罗瑞卿、周阅，尚昆处理。"},{"type":"paragraph","text":"根本不应设此文工团，三反后又发生此事是不应当的。肖华只负批发电报的错误，根本的错误在公安机关。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五三年十一月五日"},{"type":"paragraph","text":"[1]这个批语写在人民革命军事委员会总政治部副主任肖华1953年11月2日关于处理电报中的错误问题给毛泽东的检讨报告上。检讨报告中说：最近，我在处理电报中犯了错误，7月9日批发公安部为中央警卫团抽调文工团队员的电报，当时只注意到保证中央领导同志的安全问题，而未考虑到电报可能发生的政治影响，后经彭德怀副主席指出，才发觉错误。"},{"type":"paragraph","text":"[2]刘，指刘少奇。朱，指朱德。彭，指彭德怀，当时任人民革命军事委员会副主席。罗瑞卿，当时任中央人民政府公安部部长。周，指周恩来。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":11,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":428,"page_end":428},"tags":[{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9be64af5c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
