script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南朝鲜当局以“移民”为幌子 把人民当奴隶卖给外国掠夺者","authors":[],"dates":[{"year":1973,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社平壤电　据朝鲜中央通讯社报道，南朝鲜当局继续以“移民”为幌子，把南朝鲜人民卖给外国掠夺者。"},{"type":"paragraph","text":"南朝鲜有关当局计划在一九七六年以前在“农业移民”和“工业移民”的名义下，将十一万饥寒交迫的南朝鲜人民弄到外国去。"},{"type":"paragraph","text":"在过去大约十年里，南朝鲜当局通过“移民委员会”和按照所谓“移民法”，以“移民”的名义，已把八万一千三百多名贫苦的南朝鲜人民作为奴隶卖给包括美国和巴西在内的三十多个国家的掠夺成性的资本家和种植园主。"},{"type":"paragraph","text":"南朝鲜去年九月修订了“移民法”以后，“移民”生意进入了兴旺时期，更多的南朝鲜人民将被“移”到外国去。在那里等待着他们的是:在苦役中死亡、屈辱、贫穷和饥饿。"},{"type":"paragraph","text":"另据朝鲜中央通讯社报道，美帝国主义的“霍尔特收养公司”的老板又窜到南朝鲜。这个臭名昭著的现代人口贩子到达汉城机场时，宣称，他去年已经卖掉了一千九百多名南朝鲜孤儿。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c675ae719f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
