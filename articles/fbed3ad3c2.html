会所出书刊的处理办法的复示","authors":[],"dates":[{"year":1950,"month":7,"day":17}],"is_range_date":false,"parts":[{"text":"中央宣传部、中央军委总政治部对于教会所出书刊的处理办法的复示","type":"title"},{"text":"西北局转甘泗淇，并告各中央局，各分局，各大市委，各军区：","type":"appellation"},{"text":"7月7日电悉。青海乐都基督教教堂内发现的《新时代学习丛书》是基督教中比较进步的领袖吴耀宗、刘良模等所著，共计12册，已出7册。目的是为教育基督教徒，促其进步。其理论虽不全正确，但对基督教徒来说，是有进步意义的，可让其在教徒中流行，我们不应视为反动书刊加以限制。至兰州天主教中所发现之《现代问题回答》十种，确系天主教所编之反动宣传品，其内容是反共同纲领，反苏的，该书共有五组，你们所发现的，是其中第五组。此项书刊，应警告其自行销毁，否则政府和人民均得予以检举；如在教堂以外散发时，应加没收。","type":"paragraph"},{"text":"对于教会所出书刊，除违反共同纲领及政府法令者外，均不应作反动书刊论。","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部办公厅、中央档案馆编研部编：《中国共产党宣传工作文献选编》（1949－1956）北京：学习出版社，2009.","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbed3ad3c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
