ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"转发邓小平关于整风、春耕情况向中央的报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发邓小平关于整风、春耕情况"},{"type":"paragraph","text":"向中央的报告的批语"},{"type":"paragraph","text":"（1950年5月13日）华东局，中南局，西北局，华北局，东北局，华南分局，上海市委："},{"type":"paragraph","text":"兹将邓小平同志五月十一日来电?转发给你们参考。其中所说整风步骤，我们认为是正确的，请你们亦照此项步骤部署进行，即先整县委书记以上，再整广大干部。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十三日[1]邓小平，当时任中共中央西南局第一书记。"},{"type":"paragraph","text":"[2]指邓小平1950年5月11日给毛泽东并中央的电报。电报中说：西南局“确定整风的主要方法是联系实际，从检查工作入手，充分发展批评和自我批评，达到使干部提高一步的目的。整风对象着重于军队各级干部和地方三万左右的骨干，其中又以县以上干部为主。在步骤上，地方拟先由省、区党委集中县委书记以上干部整风，弄通他们是一切问题的关键；然后经过他们去领导三万人的整风。时间以半个月到二十天为度”。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":387,"page_end":387},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7efd6a9309"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
