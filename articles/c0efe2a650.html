个事例材料的批示","authors":[],"dates":[{"year":1963,"month":7,"day":20}],"is_range_date":false,"parts":[{"text":"中共中央转发吉林省委“五反”简报上反映的边反边犯的几个事例材料的批示","type":"title"},{"text":"各中央局，各省、市、自治区党委，中央各部委、各党组：","type":"appellation"},{"text":"现将吉林省委“五反”简报上反映的边反边犯的几个事例的材料，转发给你们一阅。","type":"paragraph"},{"text":"在“五反”运动期间，仍然发生请客送礼、多吃多占、特殊化走后门这类事件，很值得注意。如果这些单位和个人，已经进行过“三反洗澡”，其性质尤为严重，是明知故犯，要严肃对待，从严处理。既然发生了边反边犯的现象，也说明运动还搞得不深，还没有使干部受到深刻的教育和取得应有的教训。要以这些事例作为活的教材，反复教育干部，边犯就边反，进一步把“五反”运动搞深搞透。","type":"paragraph"},{"text":" 中   央一九六三年七月二十日（发至县团级）","type":"paragraph"}],"comments":[],"origin":"根据中央文件原件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0efe2a650"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
