ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"致林彪、鼓荣臻电","alias":"","parts":[{"type":"paragraph","text":"致林彪、聂荣臻电川"},{"type":"paragraph","text":"（1949年1月11日）"},{"type":"paragraph","text":"傅作义及其左右在接到我们意见后，企图叫我们迁就他们所设的范围（迫我就范），而拒绝我们迫傅就范的方针，明明不能指挥中央军，要说能指挥。此外，并提出什么报纸及政府用人等事，好像他们是代表人民说话，向我们要求民主权利。你们应将你们向周、张宣布的三条电告北平党，叫北平党督促傅方实行。并严正地向傅左右（刘厚同等）说明，傅方既不愿意执行我方所提意见，如果又不执行他自己所提的离城改编，那就是他反复无常，势将丧失信用。同时，请你们考虑，是否可以叫北平党将离城改编一点，在社会上及民主人士中适当地散播出去，使人们感觉我方做得仁至义尽。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致林彪、聂荣臻电的主要内容。"},{"type":"paragraph","text":"[2]周，指周北峰，当时任国民党军华北“剿总”土地处处长。张，指张东荪。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":1,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":520,"page_end":520},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"452d197215"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
