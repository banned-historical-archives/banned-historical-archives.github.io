ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"关于对苏共纲领的意见《备忘录》稿的批语","alias":"","parts":[{"type":"paragraph","text":"关于对苏共纲领的意见《备忘录》稿的批语2]"},{"type":"paragraph","text":"（1963年4月9日、20日）伯达同志："},{"type":"paragraph","text":"这些都已看过，写得很好。未完部分，请续寄来。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月九日上午二时"},{"type":"paragraph","text":"[1]这个《备忘录》初稿说，苏共领导人把苏共二十二大纲领当成国际共产党人的共同纲领，中共中央认为有必要在举行两党会谈的时候，对苏共纲领提出自己的意见。备忘录就下列问题阐述了意见：（一）关于社会主义的最终胜利；（二）关于无产阶级专政的历史使命；（三）关于所谓“全民党”；（四）关于所谓“物质刺激”；（五）关于所谓“新型的国际分工”；（六）关于所谓“一切为了人”和“人道主义”。这个备忘录后来没有发出。"},{"type":"paragraph","text":"[2]本篇一是毛泽东在《备忘录》的部分手抄稿上写的批语。本篇二是毛泽东在陈伯达1963年4月13日送阅的《备忘录（初稿）》铅印件上写的批语。"},{"type":"paragraph","text":"[3]伯达，即陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任、毛泽东的秘书。毛泽东全集第四十五卷"},{"type":"paragraph","text":"二已阅一遍。"},{"type":"paragraph","text":"毛泽东四月廿日"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":4,"day":9},{"year":1963,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":387,"page_end":388},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dc20f1514"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
