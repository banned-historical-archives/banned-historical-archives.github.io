script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"中共中央转发军事科学院编的《批判林彪资产阶级军事路线的若干问题》的通知","alias":"","parts":[{"type":"paragraph","text":"为有社会主义觉悟的有文化的劳动者，在校学生必须努力学习马列著作和毛主席著作，必须上好社会主义文化课，并使这种阶级斗争、生产斗争和科学实验的书本知识，同阶级斗争的实际，同生产劳动结合起来，去为无产阶级政治服务。如果依着《园丁之歌》宣扬的那一套修正主义教育方针，只讲脱离实际的文化知识，否定无产阶级政治挂师，否定又红又专，那就是依了地主资产阶级，即使培育出有“高度的文化知识\"的“桃李”，也不可能承当无产阶级的革命重担，而只能成为修正主义的“社会栋梁“和“精神贵族”，成为资产阶级的接班人。由他们去驾驶“时代的列车”，就会象苏修出现的那种情景、大开历史倒车，复辟资本主义！"},{"type":"paragraph","text":"《园丁之歌》所唱的，就是这种“克已复礼\"的调子。它要复“师道尊严”“智育第一”之“礼”，复资产阶级知识分子统治学校之“礼”，复修正主义教育路线之“礼”。教育战线上的两条路线斗争是长期的、象这样的调子，现在有人在唱，今后也还会有人要唱的。但是，教育革命的小闯将黄帅说得好：“在革命滚滚向前的洪流中，资产阶级老爷们发出悲哀的咳叫，挽救不了自已灭亡的命运”。坚持无产阶级教育革命，深人批判修正主义教育路线并肃清其影响，这是教育战线极其重要的战斗任务。在批林批孔运动的推动下，广大的工农兵群众和革命师生，必将在这场反复辟、反倒退的斗争中，夺得无产阶级教育革命的更大胜利！"},{"type":"paragraph","text":"（原载1974年8月4日《人民日报）毛主席已圈阅。中共中央转发军事科学院编的《批判林彪资产阶级军事路线的若干问题》的通知"},{"type":"paragraph","text":"（一九七四年八月五日）"},{"type":"paragraph","text":"为了使批林批孔不断深人，使广大工农兵进一步学习毛主席的无产阶级军事思想和军事路线，深人批判林彪的资产阶级军事路线，现将军事科学院编的《批判林彪资产阶级军事路线的若干问题》之一、之二，发给你们，请你们参照中发（1974）1号文件的传达方法、向群众进行传达，组织学习讨论，继续开展对林彪和孔孟之道的革命大批判。"},{"type":"paragraph","text":"中央这个通知和附件之、之二，军队可以发到排以上单位，地方可以发到党的支部。中共中央关于为贺龙同志恢复名誉的通知"},{"type":"paragraph","text":"（一九七四年九月二十九日）贺龙同志原任党的八届中央政治局委员、中央军委副主席、国务院副总理。林彪要整贺"}],"authors":[],"dates":[{"year":1974,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":177,"page_end":177},"tags":[{"name":"贺龙","type":"人物"},{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f8bbfe876"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
