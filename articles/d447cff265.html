ors":[],"dates":[{"year":1970,"month":11,"day":20}],"is_range_date":false,"parts":[{"text":"周总理在外语教改座谈会上的讲话（摘要）","type":"title"},{"text":"……卫生部搞孙正就是抓住了一个“3·10”大会追查清楚。抓住他的活动，至于是不是5·16，有没有填表是次要的。我说抓住“3·10”追就行。不管“3·10”还是5·16都是搞阴谋，两面派，反党，性质一样，罪行相同嘛！……卫生部搞了4年，这次才突破，就是靠发动群众，把专案公开在群众中间，抓住一件事一直追到底。结果一下就搞起来了，轰轰烈烈。否则就是有头无尾，恍恍忽忽，把专案保存起来，结果使一些人逍遥法外。","type":"paragraph"},{"text":"各单位彼此要互通消息，专案材料要公开，公布于众，不要象过去那样神秘起来。专案问题要解决，一定要发动群众，内查外调，内部发动群众。把专案公布于众，打破神秘化。","type":"paragraph"}],"comments":[],"origin":"包头市“5·16”专案联合小组办公室翻印《毛主席及中央首长对清查“5·16”的指示和讲话（摘要）》，1971年11月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d447cff265"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
