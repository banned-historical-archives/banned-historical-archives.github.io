" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、国务院、中央军委关于最近浙江发生事件的决定","authors":[],"dates":[{"year":1967,"month":1,"day":30}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委关于浙江最近发生事件的决定","type":"title"},{"text":"（一）中国人民解放军，必须根据毛主席的指示和中共中央、国务院、中央军委、中央文革小组一月廿三日的决定，遵照中央军委一月廿八日命令：坚决支持真正的无产阶级革命派，争取团结大多数，坚决反对右派，对那些证据确凿的反革命组织和反革命分子坚决采取专政措施。","type":"paragraph"},{"text":"（二）浙江省革命造反联合总指挥部最近关于追查黑材料，寻找陈伟达进行批判，要求当局执行军委三点指示，要求当局将高干子弟交出归案法办等等，所进行的群众斗争是革命行动，中央予以支持。","type":"paragraph"},{"text":"（三）由于上述斗争不仅为浙江党政军当局所压制，而且引起多次群众斗群众恶例，特别是一月廿日事件，又在中央、军委上述的决定发表之后，更加不能容许，这样激动革命造反联合指挥部所属群众，先后进驻军区大院、礼堂，其责任应完全由浙江省委，部分由军区某些领导人来负。中央对此表示极大关怀。","type":"paragraph"},{"text":"（四）中央对在上述斗争中一切受伤或受辱的同志，不论事出何处，一律表示同情和慰问，伤的应予治疗，受损失的应予赔偿，如果查出幕后有策动群众斗群众的主使人，应予严办。","type":"paragraph"},{"text":"（五）为迅速平复这一事态，以利无产阶级文化大革命的进行，中央特派南京军区政治委员杜平同志偕同浙江军区副司令员阮贤榜同志和中央办公厅丁均同志前往杭州，会同浙江省军委和浙江革命造反联合总指挥部负责查办此事及其有关问题，并将结果报中央批准。","type":"paragraph"},{"text":"（六）凡属无产阶级文化大革命中的材料，包括在这次斗争中的材料，统统由杜平同志、丁均同志会同省委、军区、造反总部派人负责清查集中，然后按一九六六年十一月十六日补充规定办理，不许有任何隐瞒。","type":"paragraph"},{"text":"（七）犯法同学责成其家属劝他们迅速归案，此案由中央公安部会同杭州市公安局按中央规定原则办理。","type":"paragraph"},{"text":"（八）省委和军区有关同志对此事向群众作深刻的检讨。","type":"paragraph"},{"text":"（九）中央希望浙江革命造反联合总部所属群众在中央这一决定传达后，主动离开军区大院、礼堂。在未离开前，双方不许再有任何挑动对方的言论和广播，传单宣传。","type":"paragraph"},{"text":"（十）中央号召浙江革命造反联合总部所属群众和一切无产阶级革命派实行大联合，高举毛泽东思想伟大红旗，向党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子进行夺权斗争。粉碎反动的修正主义的经济主义，坚决贯彻执行以毛主席为代表的无产阶级革命派路线！","type":"paragraph"},{"text":"中央号召浙江军区和全体解放军，坚决站在革命左派这一边。坚决支持无产阶级革命派的大联合，坚决支持革命造反派的夺权斗争，以利浙江阶级斗争的深入和无产阶级文化大革命的全面开展。","type":"paragraph"},{"text":" 一九六七年一月卅日","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"杜平","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0ef9e6316"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
