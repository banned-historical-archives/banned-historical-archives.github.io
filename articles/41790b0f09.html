ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"为了解人民解放军渡江后歼敌人数给李涛的信","alias":"","parts":[{"type":"paragraph","text":"为了解人民解放军渡江后"},{"type":"paragraph","text":"歼敌人数给李涛的信"},{"type":"paragraph","text":"（1950年6月5日）李涛同志："},{"type":"paragraph","text":"来件收到。我要的是从一九四九年四月廿【一】日人民解放军开始渡江作战起至现在为止的材料，不是从去年二月起的。请将去年四月起至现在止人民解放军消灭敌人正规军、非正规军的人数各若干，速告我。来件所说去年四月至今年四月剿灭土匪七十八万人，是否即是非正规军，请弄清告我。复信请于今日下午四时送至我住处为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月五日上午八时[1]李涛，当时任人民革命军事委员会作战部部长。"},{"type":"paragraph","text":"[2]毛泽东在1950年6月6日《为争取国家财政经济状况的基本好转而斗争》一文中讲到，从1949年4月21日开始渡江作战起至现在为止的13个半月内，人民解放军消灭了183万国民党反动派的军队和98万土匪游击队。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":6,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":456,"page_end":456},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41790b0f09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
