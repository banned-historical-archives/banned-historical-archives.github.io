ates":[{"year":1952,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"解放军所属工厂试制吉普车等成功"},{"type":"paragraph","text":"国庆节献给毛主席"},{"type":"paragraph","text":"【本报讯】国庆节前夕，中国人民解放军所属三个工厂分别试制吉普车、军用炊事车和电影放映机成功，作为国庆节向毛主席和朱总司令的献礼。"},{"type":"paragraph","text":"这三个工厂为了试制这些车辆和机器，都经过了很大的努力。"},{"type":"paragraph","text":"人民革命军事委员会总后勤部运输部所属某汽车修配厂，今年六月间，接到自制引擎，装配吉普车的任务后，克服各种困难，提前于九月二十五日制造军用吉普车成功。"},{"type":"paragraph","text":"人民解放军某后勤军需生产部所属装具厂于最近自制成功第一辆军用炊事车。炊事车构造完全适合中国部队的生活习惯和装备情况。"},{"type":"paragraph","text":"人民革命军事委员会总政治部文化部所属电影机器修配厂也于最近试制十六糎电影放映机成功。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd40204140"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
