问题给华南分局的指示","authors":[],"dates":[{"year":1950,"month":5,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央关于土地法草案起草工作有关问题给华南分局的指示","type":"title"},{"text":"华南分局并告中南局：","type":"appellation"},{"text":"关于土地改革问题，根据方方同志前谈情况，华南有若干特殊之处，例如华侨土地问题及广东中区的沙田问题等等，故此次准备中的《土地法（草案）》内，应有特殊规定。为使草案切合实际，责成分局对于此类特殊问题，召集有关主要人员，进行典型调查，提出具体解决草案，于五月二十五日前电告中央。并准备在起草此项草案的分局委员或专门研究土改问题的人员中，确定一人，于五月三十一日以前赶到中央，参加讨论《土地法（草案）》的会议。进行情况望告。","type":"paragraph"},{"text":" 中  央五月十三日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acdd06e22a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
