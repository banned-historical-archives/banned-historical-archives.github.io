authors":[],"dates":[{"year":1969,"month":11,"day":17}],"is_range_date":false,"parts":[{"text":"张国华等向成都军区党委、四川省革委传达中央指示","type":"title"},{"text":"【原件无标题，现标题是本刊另拟的。】","type":"paragraph"},{"text":"成都军区党委、四川省革委：","type":"appellation"},{"text":"遵照中央指示，从十一月十九日起，《四川日报》和全省各地、市（州）、县厂矿企业事业单位报纸及广播电台，目前只转载新华社、中央两报一刊的文章和转播中央广播电台节目，一律暂停刊登、播送地方新闻消息节目。","type":"appellation"},{"text":"各地支左机关，要派出军宣队帮助报纸、电台办毛泽东思想学习班，总结经验，落实政策，认真做好本单位的斗、批、改。","type":"paragraph"},{"text":"全省所有的群众组织所办的小报、刊物和有线广播（站），一律撤销。","type":"paragraph"},{"text":" 张国华、梁兴初、李大章刘结挺、张西挺、谢家祥徐 驰、何云峰、郑志士一九六九年十一月十七日","type":"paragraph"},{"text":" 四川泸州红联站派省专分站翻印一九六九年十一月十八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"张国华","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e7afc3377"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
