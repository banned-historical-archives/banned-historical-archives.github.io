<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"刘建勋在湖北省县委书记联席会上的报告(节录)","authors":["中共湖北省委第二书记","刘建勋"],"dates":[{"year":1951,"month":5,"day":10}],"is_range_date":false,"parts":[{"text":"刘建勋在湖北省县委书记联席会上的报告(节录)","type":"title"},{"text":"中共湖北省委第二书记刘建勋","type":"authors"},{"text":"半年来全省土改概况——在县委书记联席会上的报告(节录)","type":"subtitle"},{"text":"全省土改是从去年十一月正式开始的，今年四月底告一段落，历时大致六个月。参加土改的干部（51个县）计3万人左右，卷入反封建斗争的群众连同减租区在内，约计1,500万人，这次农民运动的规模之大，在湖北来说是空前未有的。","type":"paragraph"},{"text":"截止目前，全省已有4,500个乡，包括900万人口的地区完成了土地改革，约计6,000个乡，人口700万左右地区，进行了反霸、减租运动。据六个专区（缺沔阳、宜昌、恩施）1,595个乡统计，农民获得土地478万亩，占其全部土地的51.3％。全省农民获得果实粮402万担，合4,680万斤。由于这个伟大运动的结果，农村面貌大为改观。","type":"paragraph"},{"text":"土改运动中几个步骤的若干具体经验：","type":"paragraph"},{"text":"一、反霸阶段：由于过去减租、反霸不彻底，乡村通常还是恶霸统治，不打倒恶霸则无从土改，群众起来，自然首先反霸。这一阶段是斗争开始，也是战略初战，这一段搞好，就打下今后一连串胜利的基础。这一段的任务是打倒恶霸统治，树立农民威风，组织起贫农队伍，适当处理旧干部。在新的基础上，建立新的领导机关。","type":"paragraph"},{"text":"二、划阶级：划阶级的斗争，是全体农民向整个地主阶级的全面进攻，类似一个战役中的决战，也是土改运动中最精彩的一幕。","type":"paragraph"},{"text":"这一段的任务，是打倒整个地主阶级，扩大、巩固农民队伍，提高群众水平。务使群众懂得分田不但合法，而且合理，懂得反封建与反帝的联系。","type":"paragraph"},{"text":"三、没收征收：没收征收中，有几个重要经验：首先是摸底算账，要小组反复摸，然后集中起来，这样农民因为有底就有信心，又理直气壮；地主则因为底子已被摸透，就心虚不敢随便拖赖。另外，也使地主感到“有数的账好还”，易于接受。少数人乱要的方法不好，往往张个大嘴，吃不到东西，反使群众失掉信心，增强地主抵抗。其次，是查分散、查隐藏，主要发动农民自报，对于报出地主东西的人，采取欢迎态度，予以鼓励，不能乱戴狗腿帽子。第三，是压服抵抗分子，基本是采取合法斗争，结合镇压的办法；对于死抵抗分子，则依法判罪。","type":"paragraph"},{"text":"四、分配：分配问题，对团结内部，发展生产，都很关重要；但是极其复杂，不能简单从事。农民有自私心与平均主义思想，是合理分配的障碍。各种户，如被抽佃田户、新买田户、手工工人、中农等，都有其思想障碍，必须具体打通。","type":"paragraph"},{"text":"分配的总原则，还是填坑补缺。缺啥补啥，不缺不补，反对平均主义。分配还要照顾原耕基础，加以搭配的办法。","type":"paragraph"},{"text":"耕牛、农具、粮食等重要生产资料，按填空补缺的原则分配给贫雇农。若干零碎东西，可以分一点给中农，以表示一家人的意思，对中农情绪鼓励作用很大。","type":"paragraph"},{"text":"五、总结胜利，巩固胜利：全部土改完成后，为了提高群众，布置下一段工作，来一次群众性的总结工作，对教育群众意义很大。大致要讨论几个问题：总结胜利来源，如何巩固胜利？其次是查组织，一面评功表模，树立会员光荣的思想：另一面再查纯不纯。三是查地主服不服？为什么不服？研究管制办法。","type":"paragraph"}],"comments":[],"origin":"《湖北省农业合作经济史料》（上册），湖北人民出版社，1985年","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘建勋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb42756205"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
