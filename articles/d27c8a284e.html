" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"在李先念关于吕泗洋风暴事故后最近情况报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在李先念关于吕泗洋风暴事故后"},{"type":"paragraph","text":"最近情况报告\"上的批语"},{"type":"paragraph","text":"（1959年4月24日）"},{"type":"paragraph","text":"退总理。唐人诗云：沉舟侧畔千帆过，病树前头万木春。再接再厉，视死如归，在同地球开战中要有此种气概。气象预报及收音机，要认真解决。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿四日"},{"type":"paragraph","text":"[1]指国务院副总理兼第五办公室主任李先念1959年4月20日关于吕泗洋发生风暴事故后最近综合情况给周恩来总理并邓小平副总理的报告。报告说，自从吕泗洋发生风暴事故后，上海、浙江、江苏等省市委都采取了一系列的措施，渔民情绪已逐渐稳定，生产情绪也有很大提高。预计到本月21日，出海渔船可占总船只的70%。目前急需修船补网，所需物资，各省市正根据国务院通知，由本省市拨出，就地解决。国务院五办、水产部也正在予以协助。4月21日，周恩来将这一报告送毛泽东等批阅。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":461,"page_end":461},"tags":[{"name":"周恩来","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d27c8a284e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
