[{"year":1974,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最近，上海师大召开了“进一步动员学校中广大革命工人用毛泽东思想管改学校”的现场会。会上，工人们揭露和批判了轻视依靠革命工人参加管理大学方面的资产阶级习惯势力的种种表现，并对校党委的工作提出了批评和建议。有的同志列举了不依靠工人搞好教育革命的事实。如揭露了一九七○年以来学校工人参加该校理科的教研组，开始被作为装潢门面，后来遭到种种打击，最后被撵回工厂的情况。有的同志尖锐地说:校党委没有真正把我们工人放在依靠的位置上，这不是一般的工作方法问题，而是执行什么路线的问题。到会的同志一致表示，要努力学习马列著作和毛主席著作，为办好社会主义大学作出贡献。大会后，校、系工厂，校务部门的工人纷纷行动起来，积极投入了向资产阶级习惯势力进攻的战斗。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ff769e3c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
