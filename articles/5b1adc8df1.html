tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"芙蓉国里尽朝晖——誓死捍卫毛主席的革命路线的新人在成长","authors":["刘家德","排长"],"parts":[{"type":"paragraph","text":"我的弟弟是一个中学生。当红卫兵运动在伟大统帅毛主席的亲自领导下蓬勃兴起时，他就从学校杀向了社会，大破“四旧”，大立“四新”，首先使家里来了个革命化。"},{"type":"paragraph","text":"这次我探家，一进门，嘿！满屋红彤彤，毛主席的彩色画像和毛主席语录举目皆是。在弟弟的组织下，我们家成立了毛主席著作学习小组，一家老小，经常围在一起开讲用会，交流学习经验。"},{"type":"paragraph","text":"在向资产阶级反动路线猛烈开火时，我弟弟一直站在斗争的第一线。党内一小撮走资本主义道路当权派对他恨之入骨，先后抓了他两次。他们用“好话”利诱他，用皮鞭毒打他。面对阶级敌人的匕首皮鞭，我弟弟毫不畏惧，他大声朗读毛主席语录：“下定决心，不怕牺牲，排除万难，去争取胜利”，鼓励自己和战友们。当阶级敌人威胁说，不改变立场就打死他时，他大义凛然地说：“砍头不要紧，只要主义真，祖国不变色，死了也甘心。”“千变，万变，我捍卫毛主席革命路线的一颗红心永不变！”他和战友们坚持战斗，直到最后的胜利。"},{"type":"paragraph","text":"我父亲怕他出危险，几次想叫他回家，我弟弟就反复给他讲“要关心国家大事，要把无产阶级文化大革命进行到底”的道理，父亲很受感动，从此就积极支持他的革命行动了。"},{"type":"paragraph","text":"我弟弟只是千千万万革命青年中的一个。在无产阶级文化大革命的急风暴雨中，用毛泽东思想武装起来的一代新人已经迅速成长！"},{"type":"paragraph","text":"（排长 刘家德）"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b1adc8df1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
