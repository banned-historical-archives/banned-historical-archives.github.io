art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"誓死捍卫毛主席的最高领袖地位","authors":["总参谋部机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"杨成武同志重要文章的发表，给帝国主义、现代修正主义和各国反动派以迎头痛击，从政治上宣判了中国赫鲁晓夫的代理人罗瑞卿的死刑。文章说出了全军同志和全国全世界革命人民的共同心愿。"},{"type":"paragraph","text":"林副主席说：毛主席是当代最伟大的马克思列宁主义者，是当代无产阶级最杰出的领袖。是当代最伟大的天才。毛主席是中国革命和世界革命的最高领袖。"},{"type":"paragraph","text":"誓死捍卫毛主席的最高领袖地位，是时代赋予我们的历史任务。"},{"type":"paragraph","text":"中国赫鲁晓夫及其代理人反革命修正主义分子罗瑞卿跟帝、修、反一唱一和，拚命反对伟大领袖毛主席，反对伟大的毛泽东思想，反对学习毛主席著作，反对毛主席的革命路线，妄图动摇毛主席的最高领袖地位。这次无产阶级文化大革命，摧毁了以中国赫鲁晓夫为首的资产阶级司令部，巩固了无产阶级专政，捍卫了伟大领袖毛主席的最高领袖地位。"},{"type":"paragraph","text":"毛主席是全党、全军和全国人民的最高领袖。捍卫毛主席的最高领袖地位，是中国人民的最根本利益，也是全世界人民的最根本利益。中国赫鲁晓夫以及他的代理人罗瑞卿越是反对伟大领袖毛主席，妄图动摇毛主席的最高领袖地位，我们越要坚决拥护、坚决捍卫毛主席的最高领袖地位。这是我们的根本原则，是高于一切的革命大节。"},{"type":"paragraph","text":"我们人民解放军战士，对伟大统帅毛主席无限热爱，无限忠诚，无限信仰，无限崇拜。我们要一辈子读毛主席的书，一辈子听毛主席的话，一辈子照毛主席的指示办事，一辈子做毛主席的好战士。谁反对毛泽东思想、反对毛主席的最高领袖地位，谁就是我们不共戴天的敌人，我们就和他拚，就要坚决打倒他，叫他永世不得翻身。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7843651c78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
