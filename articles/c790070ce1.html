script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"红星木材厂干部坚持实行三同积极参加劳动　和工人划等号","authors":[],"dates":[{"year":1976,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　红星木材厂党总支领导成员坚持同工人实行三同，积极参加劳动，自觉改造世界观，推动了全厂批邓斗争不断深入。"},{"type":"paragraph","text":"这个厂党总支认真学习毛主席关于限制资产阶级法权的论述，建立了干部每年参加劳动不少于一百天的制度。去年一年，党总支三个正副书记每人劳动都超过一百天。批邓和反击右倾翻案风斗争开展后，他们反复学习毛主席关于文化大革命以来的一系列重要指示，坚决同邓小平反革命的修正主义路线对着干，决心和工人划等号。该厂除坚持干部每年劳动不少于一百天的制度外，还实行干部下班组拜师学艺、蹲点劳动和工人进组室参加企业管理的“两蹲点”制度，每两个月轮换一次。"},{"type":"paragraph","text":"干部下去以后，和工人一起大干，在劳动中向群众学习，促进了世界观的改造。今年六月，二车间为了适应形势的需要，决定成品箱的日产量由原来的六百只提高到八百只。在车间参加劳动的一位干部认为，只有采取加班调休办法，才能“调动”群众的积极性。但是，工人们表示:“我们要同邓小平对着干，就是不睡觉也要把产品拿出来”。由于工人群众大干快上，日产量从六百只翻到八百只、九百只，最高时达到一千一百多只，提前超额完成了任务。"},{"type":"paragraph","text":"这个厂的干部在三同中，坚持和工人一起学习毛主席的重要指示，交流心得体会，批判邓小平反革命的修正主义路线，出大批判专栏。干部还为群众搞技术革新当参谋，和群众一起制造安装了静电喷漆一条龙，使人员减少百分之三十，班产量翻了四番。全厂上半年产量完成全年计划的百分之六十八。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c790070ce1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
