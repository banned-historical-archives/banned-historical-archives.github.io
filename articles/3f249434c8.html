ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"致卫立焊电","alias":"","parts":[{"type":"paragraph","text":"致卫立煌电！"},{"type":"paragraph","text":"（1941年5月26日）"},{"type":"paragraph","text":"目前惟有国共团结并在蒋委员长领导之下实行亲苏外交，坚持抗日到底，方能挽救危亡，美国是靠不住的，日、美、华妥协阴谋必须拒绝。我们所希望于国民党的只是（甲）坚持抗日；（乙）民主政治；（丙）改善国共关系这样三点而已。关于改善国共关系又分三点，即（甲）对新四军问题予以解决；（乙）对八路军饷弹予以发给；（丙）对反共言论与反共行动予以停止。除此以外，并无其他要求。"},{"type":"paragraph","text":"赞同卫长官与胡宗南先生会见，时间约定后，我们即派南汉宸来洛，共商团结对敌大计。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德致卫立煌电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":5,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":106,"page_end":106},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f249434c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
