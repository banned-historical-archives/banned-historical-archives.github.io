art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"新共总书记威尔科克斯同志到京周恩来姚文元曹轶欧耿飚同志等前往机场热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"新华社二十一日讯 新西兰共产党总书记维·乔·威尔科克斯同志，应中共中央邀请前来我国进行友好访问，今天自广州乘飞机到达北京。"},{"type":"paragraph","text":"中共中央政治局常委周恩来同志，中共中央政治局委员姚文元同志，中共中央委员曹轶欧同志，中共中央委员、中共中央对外联络部部长耿飚同志，以及有关方面负责人任允中、申健、邢竹芳、马德传同志等，前往机场热烈欢迎。"},{"type":"paragraph","text":"专程前往深圳迎接威尔科克斯同志的中共中央对外联络部负责工作人员唐明照同志，今天同机自广州回到北京。"},{"type":"paragraph","text":"威尔科克斯同志是二十日同参加第三十一届世界乒乓球锦标赛的中国乒乓球代表团部分团员一起自香港到深圳的，并在深圳观看了我国乒乓球运动员的表演赛。"},{"type":"paragraph","text":"新西兰共产党总书记维·乔·威尔科克斯同志，应中共中央的邀请前来我国进行友好访问，四月二十一日自广州乘飞机到达北京。"},{"type":"paragraph","text":"中共中央政治局常委周恩来同志，中共中央政治局委员姚文元同志，中共中央委员曹轶欧同志，中共中央委员、中共中央对外联络部部长耿飚同志等前往机场热烈欢迎。新华社记者摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"曹轶欧","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a3c59d12d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
