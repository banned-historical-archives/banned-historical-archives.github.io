ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"给鼓荣臻“并于橡祥的信","alias":"","parts":[{"type":"paragraph","text":"给聂荣臻\"并王稼祥?的信"},{"type":"paragraph","text":"（1946年5月19日）聂，并转稼祥同志："},{"type":"paragraph","text":"关于派机接稼祥赴苏治病，自我方交涉后，彼方考虑已久，初则顾虑国际环境，要稼祥夫妇去外蒙登机，但现在已无此种顾虑，决定派机直飞张家口。因此现在只有一个稼祥身体能否坐飞机的问题。请稼祥自己决定告我，即可告远方派机来接。我意只要身体勉强可以乘机，以去苏医治为上策。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十九日[1]聂荣臻，当时任晋察冀军区司令员兼政治委员。"},{"type":"paragraph","text":"[2]王稼祥（1906一1974)，安徽泾县人。抗日战争时期曾任中共中央军委副主席兼总政治部主任。1946年去苏联治病。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":334,"page_end":334},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e941f34516"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
