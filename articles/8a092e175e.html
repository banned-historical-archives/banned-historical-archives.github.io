tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"真正学到手全靠“用”当头","authors":["学习毛主席著作积极分子/成都部队某部班长科书·仁千（藏族）"],"parts":[{"type":"paragraph","text":"山高比不过天高，天高比不过毛泽东思想的水平高。我们坚决响应林彪同志把我军活学活用毛主席著作群众运动提高到一个新阶段的号召。我们一定要把毛泽东思想真正学到手，一定要用毛泽东思想来统一我们的思想。"},{"type":"paragraph","text":"林彪同志指示我们：现在不是学不学的问题，而是真正学到没学到的问题，真正会用不会用的问题。要真正学到，会用，就必须结合实际。结合实际，才学得懂，记得住，用得上；不结合实际，就学不懂，记不住，用不上。回想起来，我在学习毛主席著作中，能够取得一些成效，全靠一个“用”字。几年来，我按照毛主席“一切革命队伍的人都要互相关心，互相爱护，互相帮助”的教导，主动帮助同志们做了一些好事。但是，开始时由于私心作怪，受表扬心中就高兴，不受表扬就感到委屈。结果，越做好事越背思想包袱。后来再学习《为人民服务》，才知道头脑里缺乏“完全”、“彻底”、“为人民的利益”这几个字，懂得了干革命不能有半点私心的道理，以后，再帮助同志时就不同了。可是，这并没有完全解决问题。我们班有个叫宋安廷的羌族战士，是在苦水里长大的，出于阶级感情，在生活上我对他特别照顾。过了一段时间，效果并不好，他的进步也不快。于是我又翻开《为人民服务》，仔细琢磨毛主席的话，才发现三个“互相”前面，有“革命队伍”四个大字。革命队伍就要政治挂帅，离开了无产阶级的政治，还叫什么革命队伍呢？这使我明白了，关心、爱护、帮助同志，最根本的要从政治上着眼。于是我就和他一起反复学习“老三篇”，从政治上关心、爱护他，使这个同志有了很大的进步。实践告诉我，要真正学到毛泽东思想，离开“用”字，是万万不行的。只有学了就用，用中再学，学中再用，对毛主席的教导理解才能越来越深，运用才能越来越熟。"},{"type":"paragraph","text":"藏族人民有句俗话：走长路的人就怕迷失方向，爬高山的人就怕心灰意懒。现在，林彪同志已经给我们活学活用毛主席著作指明了前进的方向，发出了新的动员令，我要坚决响应林彪同志的号召，更好地在用字上狠下功夫，在毛主席指引的大道上阔步前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a092e175e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
