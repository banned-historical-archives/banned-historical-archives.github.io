夫人等前往机场迎接代表团离开乌鲁木齐时，赛福鼎等和各族群众到机场欢送","authors":[],"dates":[{"year":1974,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乔森潘团长英·萨利副团长率柬埔寨代表团到达北京"},{"type":"paragraph","text":"我国领导人叶剑英、吴德，宾努首相和夫人等前往机场迎接代表团离开乌鲁木齐时，赛福鼎等和各族群众到机场欢送"},{"type":"paragraph","text":"新华社一九七四年五月二十日讯　以柬埔寨民族统一阵线中央政治局委员、王国民族团结政府副首相兼国防大臣、民族解放人民武装力量总司令乔森潘为团长，副首相府特别顾问英·萨利为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，结束对新疆维吾尔自治区的访问，今天乘专机从乌鲁木齐到达北京。"},{"type":"paragraph","text":"前往机场欢迎的有："},{"type":"paragraph","text":"我国领导人叶剑英、吴德，有关方面负责人耿飚、张才千、韩念龙、申健，中国驻柬埔寨大使康矛召；"},{"type":"paragraph","text":"柬埔寨民族统一阵线中央政治局主席、王国民族团结政府首相宾努亲王和夫人，以及柬埔寨民族统一阵线和王国民族团结政府成员。"},{"type":"paragraph","text":"到机场迎接的还有阿尔巴尼亚、南斯拉夫、罗马尼亚、阿尔及利亚、毛里塔尼亚、埃及、叙利亚驻中国的外交使节和巴勒斯坦解放组织驻北京办事处主任。"},{"type":"paragraph","text":"代表团离开乌鲁木齐时，新疆维吾尔自治区革命委员会主任、中国人民解放军新疆部队第一政委赛福鼎，自治区革委会副主任、新疆部队政委曹思明，以及自治区和乌鲁木齐市党、政、军各方面负责人和各族群众数千人，到机场热烈欢送柬埔寨贵宾。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cd4397b15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
