影被殴案从宽处理","authors":["《文汇报》"],"dates":[{"year":1952,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"许仲清、许云娥已真诚悔悟认罪 许云影被殴案从宽处理","type":"title"},{"text":"《文汇报》","type":"authors"},{"text":"【文汇报讯】 沪江大学学生、优秀的青年团团员许云影，在伟大的五反运动中，坚决站稳立场，规劝她父亲许仲清(本市祥顺机器铁管铸造厂老板)彻底坦白交代“五毒”罪行，成为广大青年学生中的一个模范人物。但是，许云影却因此在四月二十日清晨，被她的胞姊许云娥藉故无理殴伤。许云影于被殴后由沪江大学学生会伴往市立第五劳工医院治疗(按:现已出院)，并向公安局报案。这一事件的发生，曾引起了群众的愤懑，纷纷向政府提议，要求人民政府法办。市增产节约委员会特将该案送由本市人民检察署侦查。市人民检察署首与有关单位取得联系，派员前往许云影休养处所了解真实情况，并在沪江大学师生员工中广泛听取各方面意见。经半月以上之缜密侦查，确悉该案并非预谋事件，而是家庭间的殴辱纠纷。许仲清、许云娥在人民政府训诫与教育之下，已深切悔悟，真诚认罪，要求政府宽大处理，自愿公开检讨并向许云影认错。保证以后不再发生类似情事；许云影亦表示，只要他父亲和姊姊能认识自己的错误，并痛改前非，本人可不再予以追究，并请政府从宽处理。因而，市人民检察署对许仲清、许云娥父女，不再作起诉处分。","type":"paragraph"},{"text":"许仲清、许云娥对于人民政府给予他们的教育和宽大处理，对许云影的正义行动和宽大为怀，极为感动，业于日前真诚地书面检讨了自己的错误，并向许云影道歉，以挽回由于他们的错误所造成的不良影响。","type":"paragraph"},{"text":"(编者按:下面几篇文字，登在本报第三版。许云影:“我对这件事的意见”；许仲清:“我应负的责任和应有的检讨”；许云娥:“关于我殴辱胞妹云影的检讨”。)","type":"paragraph"}],"comments":[],"origin":"《文汇报》1952年5月17日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b561b7996c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
