<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"潜伏在上海的反革命分子疯狂地进行破坏活动","authors":[],"dates":[{"year":1955,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"潜伏在上海的反革命分子疯狂地进行破坏活动","type":"title"},{"text":"【上海分社讯】七月以来，潜伏在上海的反革命分子疯狂地进行破坏活动。","type":"paragraph"},{"text":"反革命分子对反革命分子检举人和积极分子行凶报复的事件不断出现。反革命分子朱燕森因怀恨新新越剧团副团长许瑞春检举他的胞弟的反革命罪行，在七月七日晚上乘许瑞春化装登台时，用菜刀向许瑞春头部猛砍两刀。上海市人民委员会严肃处理了这一案件，枪决了朱燕森。反革命分子朱周因他的儿子朱红仁屡次动员他向政府坦白交代反革命罪行，并揭发了他的反革命行为，朱周怀恨在心，竟买了一把菜刀，企图杀死儿子。他说：“你要老子心肝，老子要你腑脏”。混入东昌区税务分局的反革命分子邓恩源曾几次向该局优秀团员芮大凤探听“肃反”运动的消息没有达到目的，二十七日晚邓犯竟持刀向芮行凶。","type":"paragraph"},{"text":"反革命分子和刑事犯罪分子公开向我公安人员反扑。嵩山区公安分局审讯特务卢钟鼎时，该犯乘隙用凳子击伤审讯员后，越窗逃跑，在马路上高呼反动口号，并殴伤拦阻他逃跑的群众。普陀区公安分局逮捕流氓惯骗李五十时，李全家打我公安人员，并咬伤三名公安人员。","type":"paragraph"},{"text":"有的反革命分子写恐吓信打击积极分子。七月二十一日文汇报刊登了五爱中学学生冯燕冰协助公安人员逮捕反革命分子的事迹后，冯在二十四日就接到一封署名“反共抗俄救国军”的恐吓信，信内说：“等国军收复上海，一定把你困在树上，用烈火烧你”。","type":"paragraph"},{"text":"潜入工厂企业内部的反革命分子不断进行破坏活动。上海铁路管理局七月份曾三次发现该局的重要高空电话线被破坏分子吊上铅丝铜丝，致通话发生障碍。二十八日，中国石油公司上海批发站有一个储油所的油船装油启程时，有五千多斤石油被人抽入黄浦江中。长宁区私营三民玻璃厂和中国制革厂在完成国家的加工订货时，发生严重的废品事故，损失各在一万元以上。事故关系人都是反革命分子和阶级敌对分子。","type":"paragraph"},{"text":"反革命分子还进行政治性的盗窃活动。七月下旬，发生了两件政治性盗窃案：（一）驻福建中国人民解放军某部政治部干部王凤园等五人赴山东调查材料，在上海北站候车室休息时，一个公文包被坏分子偷掉了。公文包内放有干部材料二十份，党内介绍信十五份等重要文件。（二）长宁区私营勤丰机器厂碎火用的烈性毒药山奈、气化银被偷掉二十五斤。","type":"paragraph"},{"text":"反革命分子并用各种办法破坏粮食计划供应。龙华区中统特务高万福勾结反革命分子家属，在核实用粮时，大肆造谣，并煽动落后分子二百多人，殴打里弄干部。普陀区新昌路第二居民委员会接到恐吓信，威胁说：“五天内要使家家满意粮食供应，否则必取你头”。","type":"paragraph"},{"text":"反革命分子还不断张贴反动标语，浙江大戏院等处连续发现具名“青救团”的反动传单，污蔑我党“屠杀民主人士胡风，是不许人民有言论自由的铁证”。","type":"paragraph"},{"text":" 来源：新华社《内部参考》1955年8月20日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6375e95f8e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
