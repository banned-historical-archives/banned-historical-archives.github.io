rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"提高执行毛主席建党路线的自觉性","authors":[],"parts":[{"type":"paragraph","text":"八二二五部队二连党支部，在组织干部战士学习新党章的过程中，开展对大叛徒刘少奇的反革命修正主义建党路线的革命大批判，有效地提高了大家执行毛主席建党路线的自觉性。"},{"type":"paragraph","text":"党支部认为，毛主席的建党路线，是在同“左”的或右的错误路线的斗争中发展起来的，要使党员深刻领会毛主席的建党路线，必须在认真学习新党章的同时，狠批刘少奇的反革命修正主义建党路线。在批判会上，排长田录林用自己的亲身体会赞颂毛主席建党思想的英明、正确、伟大，狠批了刘少奇散布黑“六论”，妄图把我党变成他阴谋复辟资本主义工具的滔天罪行。田录林说：“伟大领袖毛主席教导我们共产党员要坚持无产阶级专政，在无产阶级专政下继续革命，而大叛徒刘少奇的修正主义建党路线，从根本上背叛了马克思列宁主义的无产阶级专政和党的建设的理论，他的罪恶目的就是想把我们伟大、光荣、正确的党‘和平演变’为反动腐朽的国民党、法西斯党，叫我们重受二茬罪。”通过革命大批判，干部战士对毛主席的建党路线的认识更加深刻，学习、宣传、执行、捍卫毛主席建党路线更加自觉。接着，党支部又引导大家对照新党章对党员和党组织的各项具体要求，进行检查，彻底肃清刘少奇反革命修正主义建党路线的余毒，让毛主席的建党路线在自己头脑里深深扎根。（报道组）"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"516b5e5c95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
