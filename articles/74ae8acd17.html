art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"达赖；班禅额尔德尼致电毛主席","authors":[],"parts":[{"type":"paragraph","text":"据新华社拉萨23日电 达赖喇嘛和班禅额尔德尼在西藏和平解放七周年的时候，致电毛主席和国务院。电文说，七年来，在中国共产党、您和国务院的正确领导下，由于进藏的人民解放军和工作人员以及西藏的僧俗人民积极执行了协议十七条，因而使西藏的政治、经济、文化等各项事业都取得了不少的成绩。今后，在这一基础上，我们要更进一步的反对地方民族主义，并加强汉藏族之间和藏族内部的团结，为逐步彻底实现协议十七条和建设繁荣幸福的新西藏而共同努力。"},{"type":"paragraph","text":"七年来，我们在党和您的英明领导和亲切的教养下，“关于和平解放西藏办法的协议”正在逐步实现，西藏内部和汉、藏之间的团结日益巩固，人民反帝爱国热情也日益高涨，西藏地区各项工作也都有了显著的成就和发展，人民充分享受到了民族平等和信教自由的权利，愉快地建设着自己的家园。现在，汉、藏干部和全国人民一样，在跃进的高潮中，正以无比的革命干劲比工作、比学习、比劳动、比思想进步。今年西藏春雨应时，农民已播种完毕，今秋又将再获丰收。农民普遍反映，这是共产党、毛主席带来的幸福，因此他们在日夜的替您祈祷，有的还念长寿经祈祷您万寿无疆。"},{"type":"paragraph","text":"毛主席！我们永远紧密地团结在您的周围，进一步巩固团结，加强反帝爱国的力量，坚决反对亲帝分裂分子和地方民族主义的阴谋活动，坚决维护祖国的统一；本着勤俭建国的方针，做好西藏自治区筹委会的各项工作，给今后改革创造条件，为早日成立西藏自治区而奋斗。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74ae8acd17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
