script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西哈努克亲三致电刘少奇主席热烈祝贺我国第一次进行核试验成功 完全支持我国彻底销毁核武器的建议","authors":[],"dates":[{"year":1964,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京21日电　中华人民共和国主席刘少奇今天收到了柬埔寨国家元首诺罗敦·西哈努克亲王发来的电报，热烈祝贺中国第一次进行核试验成功，井表示完全支持中国政府关于召开世界各国首脑会议讨论全面禁止和彻底销毁核武器问题的建议。电报全文如下:北京中华人民共和国主席刘少奇先生阁下共和国主席先生:"},{"type":"paragraph","text":"我与全体高棉人民一道，最近获悉中华人民共和国十分成功地进行了第一次原子试验。我愉快地向阁下和全体杰出的中国科学工作者表示我们最热烈的和兄弟般的祝贺。我们热烈欢呼中国在科学技术上取得的这一伟大成就，它打破了几个帝国主义大国企图保持的垄断，井增强了亚洲、非洲和拉丁美洲各国反对帝国主义和新老殖民主义的信心。"},{"type":"paragraph","text":"中国爆炸第一颗原子弹，是无可估量的历史事件。因为，通过这一事件，我们看到，那些极端蔑视和顽固地企图重新统治亚洲各国人民的大国，已经丧失了他们最后的优势。中华人民共和国掌握核武器不是用来威胁别的国家，而是为了保卫自己，免受帝国主义的公开威胁，我们对中华人民共和国的这种精神表示钦佩。在这方面，我们相信，中华人民共和国进入核大国行列，对促进我们一贯共同主张的全面彻底裁军正在作出卓有成效的贡献。"},{"type":"paragraph","text":"柬埔寨完全支持中华人民共和国政府关于召开世界各国首脑会议讨论全面禁止和彻底销毁核武器问题的建议。我向阁下保证，我们坚决支持和捍卫这一建议。它表明了中国的和平诚意，只有实现这一建议才能制止阻碍人类进步的军备竞赛。"},{"type":"paragraph","text":"顺致最崇高的、最友好的敬意。"},{"type":"paragraph","text":"诺罗敦·西哈努克"},{"type":"paragraph","text":"一九六四年十月十八日于金边"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cea57a039"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
