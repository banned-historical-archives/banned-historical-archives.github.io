tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛泽东诞辰110周年活动丰富多彩","authors":["曲志红/陈澎"],"parts":[{"type":"paragraph","text":"纪念毛泽东诞辰110周年活动丰富多彩"},{"type":"paragraph","text":"据新华社北京12月22日电（记者曲志红）毛泽东诞辰110周年前夕，《毛泽东传》《毛泽东时代的中国》等一批全面反映毛泽东同志光辉思想和丰功伟绩的重点图书陆续面世，集中反映了近期毛泽东研究的最新成果，更表达了广大人民群众对毛泽东的爱戴和缅怀之情。"},{"type":"paragraph","text":"据新闻出版总署署长石宗源介绍，为纪念毛泽东诞辰110周年，我国出版界今年安排了200多种相关的图书选题，经新闻出版总署和中宣部出版局邀请权威部门专家反复论证，最后确定了68种选题，作为奉献毛泽东诞辰110周年的重点图书。"},{"type":"paragraph","text":"据新华社长沙12月22日电（记者陈澎）从22日开始，韶山以及湖南各地将陆续开展纪念毛泽东同志诞辰110周年系列活动，其中包括湖南省纪念毛泽东同志诞辰110周年座谈会、毛泽东同志纪念馆开馆、毛泽东同志像章展、大型诗词歌会《东方红》、韶乐公演、“毛主席永远活在我们心中”征文大赛、焰火晚会等。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27c1ee8b4f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
