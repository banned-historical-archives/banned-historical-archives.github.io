<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"就刘海涛等盗窃国家资财案鲍尔汉主席发表谈话刘海涛等破坏森林严重影响迪化人民经济生活　证明了资产阶级的进攻是无孔不入无地不有的","authors":[],"dates":[{"year":1952,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社西安廿五日电】　迪化讯:新疆省人民政府主席鲍尔汉对迪化市木材业奸商刘海涛等盗窃国家资财五十亿元，并破坏森林，严重地影响到迪化人民经济生活的罪恶行为发表谈话说:迪化市木材业奸商贿赂、威胁、勾结迪化林业管理站的贪污分子，有组织有计划地盗窃国家巨大资财，严重地影响国计民生的罪行，充分地说明资产阶级对祖国、对人民、对国家资财的侵蚀、破坏和抢夺，不仅无孔不入，而且无地不有。迪化市远处祖国西北边疆，是一个各民族人民共居的十二万人口的城市，但资产阶级的进攻，不仅猖狂，而且极其野蛮毒辣。奸商刘海涛等千方百计向毛雄达等贪污分子行贿、威胁，相互勾结，窃取国家经济情报，偷税、漏税，以至丧心病狂地大肆破坏森林，公开抢夺国家财产的事实，就是资产阶级向新疆人民进攻的铁证。这说明了凡是有资产阶级存在的地方，就一定有资产阶级向人民猖狂进攻的罪行。"},{"type":"paragraph","text":"鲍尔汉说:在新疆，有水有树的地方，才是各族人民生息劳动的场所。众所周知，森林对于新疆五百三十万人民的生存和发展，有着特殊的重要意义。为了改变新疆气候，大量发展农业牧业，走上集体化道路，必须首先大力发展林业才有可能；同时，新疆现代化的工业建设，正在日新月异地突飞猛进，更需要大批木材。因此，新疆人民非常珍惜一树一木。人民政府每年春秋两季都宣传组织人民植树造林，并曾三令五申规定封山育林，统一采伐，以利新疆人民的生息和发展。王震将军所部劳动大军，为改造新疆自然条件，提高人民的经济生活，两年来千辛万苦植树两百万株左右。而奸商刘海涛等竟如此丧心病狂，野蛮地破坏国家宝贵的森林，破坏新疆人民生存发展的基本条件。奸商们这一罪行被人民检举后，还拒不坦白，应当罪上加罪，予以严惩。这一罪行，和上海、天津等地奸商暗害中国人民志愿军的罪行，从性质上说，完全一样。这就是资产阶级的本色和根性。"},{"type":"paragraph","text":"鲍尔汉说:新疆人民必须立即清楚地认识资产阶级唯利是图、损人利己的阶级本质；清楚地认识资产阶级猖狂地向人民进攻，是不分内地和边疆，也不分大小城市的。奸商是见孔就钻，有地必到。迪化市奸商刘海涛等的罪行和最近伊犂、塔城、喀什、吐鲁番等地人民初步揭发出的资产阶级的种种罪行，就是铁的例证。谁如果忽视这一事实，认为新疆地方偏僻，没有大城市，因而资产阶级不会有猖狂进攻，谁就会给伟大的祖国造成不可弥补的损失。"},{"type":"paragraph","text":"鲍尔汉最后说:新疆人民必须紧急动员起来，组织力量，团结一切正当的工商业者，在全疆各中、小城市，深入地展开反行贿、反偷税漏税、反盗骗国家资财、反偷工减料、反盗窃国家经济情报的运动，坚决、彻底打退资产阶级的猖狂野蛮进攻。只有这样，新疆人民才能在毛主席、中国共产党的领导下，在王震将军和其所部劳动大军的帮助下，接受汉族人民先进经验，不断地加速与巩固新疆的经济建设，改变新疆的面貌，和全国人民一起达到幸福美满的明天。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王震","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3a097cf9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
