" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"有些生产队在早稻收割后大吃口粮","authors":["新华社"],"dates":[{"year":1960,"month":8,"day":19}],"is_range_date":false,"parts":[{"text":"有些生产队在早稻收割后大吃口粮","type":"title"},{"text":"新华社","type":"authors"},{"text":"本刊讯　目前武汉地区的早稻才割完，而有些生产队已发生打场粗糙和多吃口粮等现象。","type":"paragraph"},{"text":"黄陂县委书记高启才同志在横店公社建华生产队检查，发现这个队已打过的早稻，每捆又复打出十五两谷子，全队复打谷子可以吃二十四天。","type":"paragraph"},{"text":"崇阳县北港公社陈段生产队早稻登场后，对干部、群众教育不够，社员口粮安排得又不够及时，因此出现有私分现象，这个队第四小队已私分粮食三百八十斤。","type":"paragraph"},{"text":"崇阳县通城公社三河、新合两个管理区共一万七千九百六十二人，从7月17日至25日九天超过计划用粮二万零一百四十七斤。石城公社八一生产队九小队一百一十六人，早谷收割后，干部认为从前吃少了，现在全小队一餐吃粮一百一十六斤，还叫不够。安陆县检查七十七个队，早稻口粮每人每月按三十五斤原粮安排，吃粮却按三十五斤大米吃，结果每人每月要合五十斤原粮，超过计划十五到二十斤。","type":"paragraph"},{"text":"来源： 1960年8月19日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ead67ee495"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
