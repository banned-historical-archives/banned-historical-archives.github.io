" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“社会主义不能一党专政”","authors":["中国人民大学","刘平","杨森达赖","林忠仁","王鸿章","韩惠贞","韩运德","鲍子津"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“社会主义不能一党专政”","type":"title"},{"text":"中国人民大学王鸿章林忠仁韩惠贞刘平鲍子津韩运德杨森达赖","type":"authors"},{"text":"“社会主义不能一党专政。党对现在的统治也别太乐观了”。（中国人民大学计划系学生  王鸿章）","type":"paragraph"},{"text":"“我赞成共产党为我国执政党，但政府是由各民主党派建立统一战线组织成的，许多民主人士，担任国家重要职务，实际上是有职无权，连我校及小小的班级共产党也包办一切，请问这实质上与国民党一党专政的政府有什么不同。”（中国人民大学统计系学生  林忠仁）","type":"paragraph"},{"text":"“现在以党代政的现象很严重，这是宗派主义。上自部，下至县，民主人士都有职无权，工厂也如此。如海关总署署长丁贵堂，什么问题也作不了主，得听觉员处长的，请问哪个大？（大声责问）一切由党包办。就不能发挥群众的积极性，应当让民主人士有职有权！”（中国人民大学历史系学生  韩惠贞）","type":"paragraph"},{"text":"“我看组织领导与以党代政是一回事。例：长沙市市长是由党委先派去，任职后才经人代会选举，这是形式主义，就是以党代政。”（中国人民大学历史系学生　刘平）","type":"paragraph"},{"text":"“要削弱党的领导，把党的领导缩小到最小范围”，“党应该象夺取政权前一样，只能是依靠党的威信和党员的模范作用来领导”。“党与行政关系只能是宋江与吴用的关系，党委作参谋提意见，可听也可不听。”“党委制在党内是直接民主集中制，对群众则只有集中没有民主。”反对党委直接对全体同学发通知，说“这是以党代政”，“是命令”。（中国人民大学历史系学生  杨汝栩的材料）","type":"paragraph"},{"text":"“现在是工农专政，但是通过共产党来实现，故党是统治阶级的体现，是新社会的一党专政”。（中国人民大学历史系学生　鲍子津）","type":"paragraph"},{"text":"“目前我国是一党专政，党的权力太大了，大小单位都要派个党员去做头头，这是党天下的具体表现，是一党专政，以党代政”“党和国务院联合发指示是从苏联搬来的。在苏联只有一党专政，可以施行，中国除共产党外还有其他民主党派，这样做是不尊重民主党派，是以党代政和宗派主义表现。”（中国人民大学马列主义研究班研究生　韩运德）","type":"paragraph"},{"text":"“现在是党政不分，民主党派无职无权。”“资产阶级政党可以不取消，而让它竞争，要是全民直接选举，不见得他们（指民主党派——编者）就选不上，如果把老底（指党的缺点——编者）揭露出来，那才不见得了！”（中国人民大学历史系学生  杨森达赖）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4ddb4c59d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
