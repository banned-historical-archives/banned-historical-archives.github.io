ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"不用照会即可攻取泰安等地","alias":"","parts":[{"type":"paragraph","text":"不用照会即可攻取泰安等地！]"},{"type":"paragraph","text":"（1946年5月31日）华东局，并告刘、邓、薄，邓、张、粟、谭："},{"type":"paragraph","text":"陷电悉。国民党在东北扩大战争，占我四平、长春、吉林等十余城，现正向哈尔滨进攻中。在关内，五个月来占我城镇乡村数百处，近日又占我安次、萧县、夏邑、定远，攻我水东。本日悉，北平十一战区司令部不用事先任何通，即出动数万兵力进攻我冀东三河、宝坻、香河、宁河等县。因此你们已用不着事先提出照会即可动手攻取泰安、大汶口、张店、周村、德州、枣庄等地。战况随时电告。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"辰世[1]这是毛泽东为中共中央起草的给中共中央华东局的电报。"},{"type":"paragraph","text":"[2]刘、邓、薄，指刘伯承、邓小平、薄一波，当时分别任晋冀鲁豫军区司令员、政治委员和第一副政治委员。邓、张、粟、谭，指邓子恢、张鼎丞、粟裕、谭震林，当时分别任华中军区政治委员、司令员、副司令员和副政治委员。"},{"type":"paragraph","text":"[3]指1946年5月30日中共中央华东局给中共中央的电报。电报说：我们拟就一个照会，分致南京三人委员会及北平执行部，拟于5日送出，10日不得答复，即于11日开始夺取泰安、大汶口、周村、张店、德州、枣庄，统州暂不攻取。如同意，即于5日由中央分送叶剑英、周恩来转致国美及"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":357,"page_end":357},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7eb234776"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
