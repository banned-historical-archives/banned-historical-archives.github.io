month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"如果把毛泽东的饮食列出一张菜谱，那么，你一定难以相信，这是领导着占世界人口四分之一的国家领袖的日常饮食——"},{"type":"paragraph","text":"每餐四菜一汤。一个荤菜(新鲜的普通鱼或红烧肉)，一个半荤半素，两个素菜(辣椒、白菜、萝卜、马齿苋等市场常见的蔬菜)，一个清淡的汤(最喜欢吃雄鱼头做的汤)。100克饭吃得光光(通常是红糙米、小米)，饭后再吃个烤玉米或烤红薯。还有，毛泽东特别嗜好长沙火宫殿的臭豆腐。至于辣椒，则每餐必备，到了无辣不下饭的程度。"},{"type":"paragraph","text":"(摘自《科学生活》)"}],"comments":[],"origin":"《科学生活》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ede357139"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
