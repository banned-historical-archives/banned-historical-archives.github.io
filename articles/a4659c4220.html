script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度资产阶级报纸大肆鼓吹对我作战公然叫嚷进攻西藏内地","authors":[],"dates":[{"year":1962,"month":10,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京18日电】　新德里消息:印度资产阶级报纸近日发出一片战争鼓噪，叫嚷要对中国作战，甚至公然表示要印度军队进攻西藏内地。"},{"type":"paragraph","text":"《印度斯坦时报》17日发表的一篇文章说，印度政府既定的决心是把中国人“赶出去”。它认为，“在这个地区(指印度军队已经侵入的中国扯冬地区)没有什么运动余地”，它甚至叫嚷不能“继续剥夺自己的这种可能性:即越境进入西藏以最有效、最经济的方式”打击中国人。"},{"type":"paragraph","text":"这篇文章说，“在目前，差不多可以肯定，我们将进行大规模战斗……今后，在我们打算中必须认识到有为一切后果作好准备的必要。”"},{"type":"paragraph","text":"这家报纸15日刊登的文章放肆鼓吹进攻中国。它说，“印度政府将必须根本地把它的态度和战略从防御的改为进攻的。它必须把沿边界进行军事试探的主动权拿过来。”文章又说，“中印之间现在可能有的唯一和平是武装和平。”"},{"type":"paragraph","text":"《印度斯坦旗报》在10月14日的一篇社论中叫嚷说，印度在中印边界东段地区“进行的是一场生死斗争”，印度“必须全力消灭中国入侵者”。"},{"type":"paragraph","text":"这家报纸在15日的一篇社论中，叫嚷要印度军队在中国运送供应品和派遣援军方面都“处于不利”的情况下，发动军事进攻。它说“现在是印度采取行动的时候了。”"},{"type":"paragraph","text":"《印度快报》15日还大大赞扬为印度政府矢口否认的印度飞机侵犯中国西藏首府拉萨领空的侵略行为。它说，印度侦察机在拉萨郊区上空飞行受到北京指责，“或许表明了未来的情况。(印度)空军在东北边界的部署使得地面冲突很难局部化。”"},{"type":"paragraph","text":"《闪电》周刊13日在评论考尔中将被任命为进攻中国的新军团司令时说:“我们的军事机器准备把中国人赶出麦克马洪线”。它说，应该认为考尔中将的任命表明“政府决心用一切手段把中国人赶出去”。"},{"type":"paragraph","text":"这家周刊还为考尔侵犯中国的活动吹嘘，说他“在中印边界西段困难的山地向中国推进方面“取得过相当大的成就”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4659c4220"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
