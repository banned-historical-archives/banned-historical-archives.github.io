rs":[],"dates":[{"year":1980,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十月十七日电　人大常委会副委员长彭真今天会见德意志新闻社社长蒂洛·波勒尔特时说，估计最高人民法院特别法庭可能在本月底或下月初开庭审理林彪、江青反革命集团案。"},{"type":"paragraph","text":"彭真说，这个案件经公安部侦察预审终结，已经移送最高人民检察院特别检察厅审查起诉。估计再有一个星期左右的时间，特别检察厅会向特别法庭提起公诉。按照我国的法律规定，被告在接到起诉书副本后至少有一个星期的时间考虑。这样，审判可能在本月底或下月初开始。"},{"type":"paragraph","text":"德新社社长蒂洛·波勒尔特博士和夫人是应新华社邀请来中国访问，于本月十四日到达北京的。会见时，彭真还回答了他提出的有关中国恢复和加强社会主义法制的问题。"},{"type":"paragraph","text":"参加会见的有人大常委会副秘书长武新宇，新华社社长曾涛、副社长穆青。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff302b889d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
