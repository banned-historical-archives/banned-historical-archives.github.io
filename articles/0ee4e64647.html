r":1968,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上药六厂　红战兵"},{"type":"paragraph","text":"无政府主义在党内两个最大的走资派的长期庇护下，东窜窜，西窜窜，到处兴妖作怪，腐蚀和毒害革命群众。中国赫鲁晓夫大肆叫嚣说:“任何那一个个人都不值得我们服从的……”“不要怕，什么都可以怀疑。”党内另一个最大的走资本主义道路当权派也说什么:“要学会独立思考，要有自己的见解，不要迷信别人”。同志们听听，这是一些什么话?"},{"type":"paragraph","text":"伟大领袖毛主席发动和领导的这场史无先例的无产阶级文化大革命，摧毁了以中国赫鲁晓夫为首的资产阶级司令部，一切封建主义、资本主义、修正主义的破烂货一扫而空，无政府主义这具僵尸的美丽的外套也被轰得一干二净，赤裸裸地暴露在光天化日之下。"},{"type":"paragraph","text":"但是阶级斗争是尖锐复杂的，灭资兴无的斗争是长期的。尤其，中国赫鲁晓夫的无政府主义流毒至今还未肃清。因此，只要一有机会，无政府主义便赤膊上阵，大搞什么“独立主义”、“自我管理”，叫嚷“我要造反”，不顺他的心，就“逍遥法外”，真是目空一切，谁也管不着。当有人指出其错误时，就一跳八丈高，叫嚷:“现在大民主，我有自由权”，“你又不是政府，我凭什么听你们的，我要独立思考”。当其有“小山头”可利用时，就气势汹汹地说:“我有我的政府，我有我的组织”。“小山头”不行了，又摇身一变，变成“百事不管”、“悠哉悠哉”。"},{"type":"paragraph","text":"无政府主义一变再变，千变万化，但是万变不离其宗，就是一个“我”字。"},{"type":"paragraph","text":"无政府主义的反动思潮，在当前，它同派性一样已经成为资产阶级利用来向我们进攻的一种重要形式。因此，对待无政府主义，决不能小看它，中了它的毒，在我们头脑里就栽下资产阶级思想的根子，就有复辟资本主义的危险。我们必须高举毛泽东思想伟大红旗，掀起一场围歼无政府主义的“人民战争”，进一步加强无产阶级专政，树立无产阶级红色政权的革命权威!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ee4e64647"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
