script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判右倾思想争取逐步实现四无省  中共福建省委决定发动群众加强领导","authors":[],"dates":[{"year":1958,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判右倾思想争取逐步实现四无省"},{"type":"paragraph","text":"中共福建省委决定发动群众加强领导"},{"type":"paragraph","text":"本报特约新华社专稿　全党全民立即动员起来，开展一个除四害的爱国卫生运动，并加强对这一运动的领导，以保证从1958年起十年内在福建全省范围内胜利实现除四害的规划。这是中共福建省委在12月30日举行的常委会决定的。"},{"type":"paragraph","text":"福建省从1956年贯彻全国农业发展纲要（草案）以来，各地普遍开展了除四害的爱国卫生运动，获得不少的成绩。据不完全的统计，两年来共捕鼠、雀二千九百多万只，并消灭了大量的蚊子和苍蝇。运动中涌现了二百多个先进地区和单位，及数以千计的除四害的积极分子，现在全省已有不少的无蝇无蚊无鼠无雀的乡、镇和农业合作社。在工厂和农村中都创造了不少除四害和生产相结合使运动经常化的经验。但各级领导上的右倾思想也阻碍了消灭四害获得更大的成绩，因此会议批判了那些不相信能够消灭四害，而有意和无意丢掉了除四害运动，或对这一运动缺乏信心，措施不力，或空叫喊而不发动和依靠群众等等右倾思想。会议指出，彻底克服各级党政领导上的右倾思想，是保证运动持久的开展和顺利消灭四害的重要关键。会议要求各级党委立即在全党和全民中，广泛进行大规模的消灭四害的思想动员，充分依靠群众，在全省范围内掀起一个除四害的运动。"},{"type":"paragraph","text":"会议特别强调除四害要和生产相结合，反对搞生产不消灭四害和除四害不搞生产的单打一作法。会议要求认真推广那些结合生产和群众习俗，有计划地开展群众性的除四害的突击运动，并把突击运动和经常化结合起来。会议还要求各地一年开展二次到三次为期一个月到二个月的群众性的突击运动：一次是在新年到春节期间，其他两次可分别在端阳节和中秋节进行。在从现在起到春节期间的除四害突击运动中，要求全省各地户户动员、人人动手，消灭过冬的蚊子和苍蝇，挖蝇蛹，消灭孑孓，捕捉麻雀、老鼠，捣毁雀巢、堵塞鼠洞，清除室内外所有垃圾、尘土，疏通沟渠、排除污水、铲除杂草，同时提倡人畜分居，作到猪有圈，牛有栏，粪坑加盖，以毁灭四害孳生和栖息的场所，改善环境卫生，创造更多的四无村、四无社、四无乡、四无区、四无县、四无厂、四无店、四无校、四无街，争取逐步实现四无省。"},{"type":"paragraph","text":"为了加强对运动的思想领导和具体指导，会议决定从省到乡成立各级以党委第一书记为首的包括政府、各民主党派、各人民团体及党政有关部门负责人参加的除四害爱国卫生运动委员会，并设立以卫生部门为主体的强有力的办事机构。会议指出运动中必须注意表扬各种先进人物，推广各种先进经验，并给予先进人物和先进单位以适当奖励。各经济单位要支持这一群众运动，及时供应各种药械。城市人民在技术和人力上应支持广大农民消灭四害，为实现农业发展纲要而努力。会议要求各级除四害委员会要切实负责到底，不胜利，决不罢休。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6198cd6f2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
