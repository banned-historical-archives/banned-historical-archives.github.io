<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上影继续揭露右派反动言行，项坤一贯是陈仁炳打手","authors":[],"dates":[{"year":1957,"month":7,"day":20}],"is_range_date":false,"parts":[{"text":"上影继续揭露右派反动言行，项坤一贯是陈仁炳打手","type":"title"},{"text":"【文汇报21日讯】 上海电影制片公司昨天举行的第十一次反右派斗争座谈会，继续帮助项坤，要他彻底交代和陈仁炳的反动关系及在他指使下的放“火”行为。在同志们揭露的大量事实面前，项坤不得不承认自己是个右派分子。但是这个我们新生活中的反派角色，昨天仍然咬紧牙关，不肯交代具体事实，只不过因为作恶太多无法掩盖全部，项坤的牙缝中漏出了解放前他与陈仁炳的密切关系。","type":"paragraph"},{"text":"项坤交代说:“1938年，我在武汉潦倒加入武汉合唱团时，结识了陈仁炳，他是领队。陈和团长有矛盾。团长不赞成设戏剧股，陈要发展自己的力量，使我做了戏剧股长，并且投我所好，给我演出了“前夜，等剧。”项坤说:“我和他基本上是互相利用。”项坤承认他也替陈仁炳出过力气，作过他的打手，打过团长。","type":"paragraph"},{"text":"在谈到解放后与陈仁炳关系时，项坤的牙关紧得很，他没有交代陈仁炳如何使用他的事实(按陈仁炳在交代中曾说我使用了项坤)。项坤只承认自己反党思想和陈仁炳有不谋而合之处。","type":"paragraph"},{"text":"也很奇怪，这个善于扮演反派角色的演员名为交代右派言行，但实际上有很大一部分时间用在吹嘘自己的“个人奋斗”——在旧社会里以劳动出人头地，很肯钻研艺术，艺术水平高，个人生活作风严谨，等等。","type":"paragraph"},{"text":"参加座谈会的同志尖锐地指出了项坤的自我检查的虚伪性，认为他想在政治问题上轻轻滑开的做法是欲盖弥彰，是徒劳的。有人递条子进一步地揭发这个自称一直靠拢党的项坤，曾经和屠光启等反动文人，文化特务和大商人合作演戏、拍片，并且曾经为蒋介石“中国之命运”作过解说。高衡具体地指出项坤在陈仁炳的纵火活动中起了“爆破手”的作用。项坤在厂里叫嚣“上影职工没有成为真正的主人”、“厂的领导应当撤换”，用卑劣的手段收集污蔑党的材料，帮助陈仁炳打开缺口，在这里，他和陈仁炳上下齐手想篡夺上影领导的阴谋是昭然若揭的。董霖揭发项坤挑拨青年演员与厂领导的关系说，“有一次排演‘谁是被抛弃的人?，时，项坤过来对他说:我支持你演主角!”但接着又叹气说:“领导上不同意。”这两句话说得董霖心里七上八下，无形中对领导有了距离。又有一次，项坤挑拨董霖说:“金焰在党内是贵宾，在群众中是老爷。”又说:“不搬掉这石头(指金焰、汤化达等)，我们永远不得翻身。”董霖指出项坤就是经常以这种伎俩来扩大上影厂内的矛盾的。李天济痛斥项坤在自我检查中的一派胡言说:“事情很明白，二十年前项坤为陈仁炳充任打手，今天在上影的问题上项坤又一次充任了陈仁炳的打手。项坤必须交代他是怎样从‘人事小生’变成为政治阴谋家的!”沈浮说，项坤标榜自己业务提高，其实从“湖上的斗争”等戏可以看出他演得很糟。陈鲤庭也有同感，他指出项坤由于在政治思想上的右倾，在艺术上也跟着蜕化了。陈鲤庭说:“项坤解放前群众关系很不好，昀近几个月发觉他好像很好，讲话时都站在中下层演员的立场，俨然是他们的代言人，我想他是进步了。经过反右派斗争的揭发，斗争给了我教育，使我认识他是个右派分子。过去他曾向我反映几件厂内的男女纠葛的问题，现在想起来也可能是企图点火。”这位老导演，和大家一样，要求项坤交代具体事实和他言行的目的。","type":"paragraph"},{"text":" ——原载《文汇报》1957年7月21日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ede27c74f4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
