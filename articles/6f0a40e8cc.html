<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海警备区广大指战员深入郊区农村用毛泽东思想开展支农活动和贫下中农一起战天斗地，誓夺今年农业丰收","authors":[],"dates":[{"year":1970,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海警备区广大指战员遵照毛主席关于“必须把粮食抓紧，必须把棉花抓紧，必须把布匹抓紧”的伟大教导，积极开展支农活动，深入郊区农村，热情宣传毛泽东思想，和广大贫下中农一起积极投入战斗，誓夺今年农业的丰收。"},{"type":"paragraph","text":"最近，正当上海郊区棉花吐絮、晚稻扬花的季节，雨水较多，影响到棉花、晚稻等农作物的生长。针对这种情况，警备区领导机关立即召集所属各部队负责同志参加的紧急会议，迅速部署了支农工作。警备区主要负责同志，亲自深入郊区农村，站在第一线指挥战斗。各部队领导干部以最大的决心，最快的速度，抓好这项工作。驻岛某部队正在担负着繁重的战备生产任务，他们接到支农指示后，立即成立了支农领导小组，几个主要负责同志也亲自深入基层，和贫下中农一起战斗。驻横沙岛部队一接到通知，立即召开了军民联防区党支部紧急会议，很快使全岛部队、民兵都行动了起来。目前，警备区广大指战员已深入到二百多个公社、农场进行支农活动。"},{"type":"paragraph","text":"千支援，万支援，用毛泽东思想支援广大贫下中农夺取农业更大丰收，是最大最好的支援。警备区广大指战员在支农中，把宣传毛泽东思想，作为首要任务。干部、战士组成一个个支农宣传队，手擎毛主席著作，心向红太阳，来到田间地头，边劳动边宣传。许多宣传队针对部分干部、群众中存在着的“生产定局论”和“靠天吃饭，好天再干”等活思想，带领干部和贫下中农学习毛主席关于“世间一切事物中，人是第一个可宝贵的。在共产党领导下，只要有了人，什么人间奇迹也可以造出来”的伟大教导，反复组织大家讨论人和物的关系，并带领贫下中农在田头地边开展革命大批判，批判大叛徒刘少奇在农业战线上散布的谬论，使大家认识到:用毛泽东思想武装起来的人是最大的战斗力，广大贫下中农掌握了毛泽东思想，就能天不怕，地不怕，就能战胜困难创奇迹，从而提高了广大干部、群众战天斗地的信心。驻松江某部毛泽东思想宣传队，针对驻地生产队干部、群众中对增产缺乏信心的情绪，组织大家学习毛主席有关艰苦奋斗的教导，使大家认识到:自然灾害也是纸老虎，只要有了毛泽东思想，任何困难也能克服。认识提高后，干部群众以冲天的革命干劲投入“抓革命，促生产”的战斗。某部一连指战员在支农战斗中，每天起早摸黑，跑十几里路，坚持向群众宣传毛泽东思想。某部直属工兵连，接到上级支农指示后，连夜组织一个支农小分队，同贫下中农一起投入战斗，热情宣传毛泽东思想。他们在劳动中发扬革命加拼命的精神，重活抢着干，脏活累活争着做。广大干部和战士的模范行动受到贫下中农的好评。贫下中农豪迈地说:“有毛泽东思想指挥战斗，有亲人解放军大力支持，我们一定能用自己的双手，战天斗地，改造自然，夺得粮棉大丰收，狠狠打击帝、修、反。”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f0a40e8cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
