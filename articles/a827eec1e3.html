art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国毛泽东哲学思想讨论在京举行","authors":["景抒展"],"parts":[{"type":"paragraph","text":"这次讨论会是为纪念毛泽东同志的《实践论》、《矛盾论》发表50周年，《关于正确处理人民内部矛盾的问题》发表30周年而召开的。讨论会联系实际，着重探讨毛泽东哲学思想对马克思主义哲学的贡献和对中国革命及建设的巨大指导作用，探讨在新形势下毛泽东哲学思想的新发展以及如何运用毛泽东哲学思想加快改革、开放步伐等问题。"},{"type":"paragraph","text":"中顾委常委王首道、江华在会上强调，毛泽东哲学思想既是坚持四项基本原则的思想武器，也是坚持改革、开放的理论基础。要把握党的十一届三中全会以来的路线的两个基本点，反对来自“左”或右的干扰，就必须认真学习和研究毛泽东哲学思想，正确宣传、运用和发展毛泽东哲学思想。国防大学政委李德生参加了今天的讨论会。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a827eec1e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
