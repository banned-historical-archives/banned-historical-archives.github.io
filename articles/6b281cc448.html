新闻”指出党在修正主义疯狂挑战中毫不动摇","authors":[],"dates":[{"year":1962,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜“劳动新闻”纪念劳动党成立十七周年"},{"type":"paragraph","text":"全党坚持马列主义原则继续胜利前进"},{"type":"paragraph","text":"“平壤新闻”指出党在修正主义疯狂挑战中毫不动摇"},{"type":"paragraph","text":"据新华社平壤10日电　今天是朝鲜劳动党成立十七周年纪念日。平壤各报都发表了热烈庆祝党的生日的社论。"},{"type":"paragraph","text":"《劳动新闻》发表的题为《在我们党的光荣的旗帜下》社论中说，朝鲜劳动党“十七年来把祖国和人民的命运放在自己的双肩，走过了充满胜利和光荣的战斗的路程。”朝鲜劳动党的历史，“是高举马克思列宁主义旗帜和革命旗帜，领导朝鲜人民克服重重困难和考验，取得了祖国土地上划时代的革命变化，保证了马克思列宁主义在朝鲜全面胜利的英勇斗争历史。”"},{"type":"paragraph","text":"社论指出，朝鲜人民在党的领导下，在朝鲜土地上建立了牢固的社会主义制度，使自己的祖国在短期内建成了具有自立的民族经济和灿烂的民族文化的强大的社会主义国家。"},{"type":"paragraph","text":"社论说，朝鲜劳动党“通过艰苦复杂的革命斗争，经受了很多的锻炼和考验，发展壮大成了钢铁般地团结在以金日成同志为首的党中央委员会周围、具有一百三十万党员的战无不胜的战斗队伍。我们党通过毫不妥协的反对修正主义、教条主义、宗派主义等各种反党、反马克思列宁思想的斗争，捍卫了党的思想的纯洁性和意识及行动的统一，同时连根清除了长期以来给予我国工人运动莫大毒害的宗派余毒，实现了朝鲜共产主义运动的完全一致。因而，今天全党牢固地确立起了坚持马克思列宁主义原则、不怕赴汤蹈火地为贯彻党的政策和斗争的党的思想体系。”"},{"type":"paragraph","text":"社论说，“党的钢铁般的统一及其久经考验的领导，是朝鲜人民一切胜利的基本保证。”"},{"type":"paragraph","text":"社论强调说，“坚决相信群众，决心依靠群众，熟练地组织和动员群众无穷无尽的创造力，这是我们党的领导的不可战胜的力量所在。党扩大和发展了我们时代的伟大前进运动——千里马运动，加强了党员和劳动人民中的革命传统教育和共产主义教育，因而在社会主义建设中取得了伟大胜利。”"},{"type":"paragraph","text":"社论说，“我国的威力日益加强了，我国的国际地位大大提高了。我们党高举革命的马克思列宁主义旗帜和无产阶级国际主义旗帜，最大限度地促进朝鲜革命，对加强社会主义阵营的威力和国际共产主义运动的发展作出了贡献。我们今后将继续高举这面旗帜，进一步促进朝鲜革命，为加强社会主义阵营和国际共产主义运动的团结一致而尽一切力量。”"},{"type":"paragraph","text":"《平壤新闻》在题为《朝鲜劳动党引导我们人民走向胜利》的社论中指出，前一时期，国际舞台上连续出现猖狂的反共高潮，同流合污的国际修正主义者疯狂地向马克思列宁主义挑战，但是我们党在任何风浪中毫不动摇，战胜了一切考验，在斗争的各条战线都取得了胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b281cc448"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
