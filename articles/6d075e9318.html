":[],"dates":[{"year":1958,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京26日电】　11月24日出版的“新闻战线”半月刊第13期刊载了毛泽东主席就报纸工作问题写给中共广西僮族自治区委员会第一书记刘建勋、书记处书记韦国清的信。这封信是毛主席今年1月间在南宁写的。"},{"type":"paragraph","text":"在同一期的“新闻战线”上，还登载了刘建勋的一篇文章，题目是:“认真执行毛主席关于报纸工作的指示”，文章着重说明了遵照毛主席的指示，在全党同志协助之下，广西日报已取得的改进，和将近一年以来，广西僮族自治区党委对报纸领导的主要作法。"},{"type":"paragraph","text":"毛主席的信全文如下:"},{"type":"paragraph","text":"刘建勋、韦国清二同志:"},{"type":"paragraph","text":"送上几份地方报纸，各有特点，是比较编得好的，较为引人看，内容也不错，供你们参考。省报问题是一个极重要问题，值得认真研究，同广西日报的编辑们一道，包括版面、新闻、社论、理论、文艺等项。钻进去，想了又想，分析又分析，同各省报纸比较又比较，几个月时间就可以找出一条道路来的。精心写作社论是一项极重要任务，你们自己、宣传部长、秘书长、报社总编辑，要共同研究。第一书记挂帅，动手修改一些最重要的社论，是必要的。一张省报，对于全省工作，全体人民，有极大的组织、鼓舞、激励、批判、推动的作用。请你们想一想这个问题，以为如何?"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1958年1月12日"},{"type":"paragraph","text":"上午7时"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘建勋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d075e9318"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
