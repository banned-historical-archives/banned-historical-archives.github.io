script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-1","name":"毛泽东全集第9卷(1)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"红军政治工作的问题","alias":"","parts":[{"type":"paragraph","text":"红军政治工作的问题！"},{"type":"paragraph","text":"（1936年10月11日）"},{"type":"paragraph","text":"红军的政治工作在克服长征中的疲劳现象，提高政治情绪上有成绩。应特别注意干部教育，在这方面过去有成绩，也有很多经验，主要是：军事与政治并重；理论与实际并重；理论与实际相联系；教育课少而精。"},{"type":"paragraph","text":"政治工作的方式要有计划性、纲领性和灵活性，既要集中统一，又要有伸缩性，注意各地方、各时期、各部队的差别，要适应游击战争的特点。整个红军教育，包括军事教育、政治教育、纪律教育和文化教育，提高军队的战斗力。"},{"type":"paragraph","text":"我们的干部政策：第一，是信任干部，对干部应用之不疑；第二，对个别干部的错误，不应扩大化，应帮助他彻底解决问题；第三，尊重地方干部，他们与群众有密切的联系；第四，注意对干部进行政治教育。我们的干部标准是：第一执行党的路线，第二能与群众联系，第三有独立工作能力，第四遵守党的纪律。"},{"type":"paragraph","text":"[1]1936年10月11日至12日，中共中央政治局召开会议，讨论了红军政治工作问题。毛泽东作了重要发言，指出了红军的政治工作成绩，总结了政治工作在干部教育方面的经验。这是毛泽东在会议上发言的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":10,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":221,"page_end":221},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6833aeccf9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
