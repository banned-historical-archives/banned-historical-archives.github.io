tes":[{"year":1957,"month":9,"day":2}],"is_range_date":false,"parts":[{"text":"反党野心家朱彤","type":"title"},{"text":"贵州人民出版社的全体工作人员，击败以杨守达、钱革为首的9人右派集团以后，最近又挖出一个隐蔽在党内的险恶的右派分子、出版社副社长朱彤。朱彤利用副社长身份，煽动群众，攻击社长单衍荣(党员)是“独裁”，和社内右派分子互相利用，纠合在一起反对肃反。对于右派分子要烧毁人事档案、调整社的机构、去掉出版部副主任(党员)、编辑部副主任(党员)和一些党员组长及积极分子等一连串的叫嚣，事前都得到了朱彤的秘密赞许。","type":"paragraph"},{"text":" ——原载《文汇报》1957年9月2日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c61e50c53c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
