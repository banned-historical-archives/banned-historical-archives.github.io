<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共川东区党委关于处理寄居市区地主的意见","authors":[],"dates":[{"year":1950,"month":12,"day":19}],"is_range_date":false,"parts":[{"text":"中共川东区党委关于处理寄居市区地主的意见","type":"title"},{"text":"据重庆市委反映：在退押中，靠重庆附近县区的农民，不带证明文件，亦无适当干部领带，先后到市区扣押地主。如15日江北农民二人坚持要将王朴烈士之母带走（她已答应照数退押）；又江北龙溪乡农民来捕民盟同时又是农工民主党的负责人黄道美，仅持有该乡工作组一便条；又据市染织等工会反映，农民将谢家沟宏新布厂、适中村66号津樑布厂的纺织原料与纱布等也要拿走抵充押金。按目前有很大一部分地主集中在重庆，而重庆又是众目睽睽之地，问题搞不好，影响很大。为此我们特提出以下意见，要重庆附近县份特别注意，并供各地参考：","type":"paragraph"},{"text":"（一）我们除复重庆市委所提各节外，并已取得市委、市府同意，由市府成立机构或划出专人办理寄居市区内的地主退押问题。今后重庆附近各县，对住在市区的地主退押追押，必须审慎处理，要有计划、有领导的统一进行；确定要有适当干部领带，要持取县政府的正式介绍信，要开清地主名单、住址、押金数目，再带领有关农民或农民代表，向市府请求办理。","type":"paragraph"},{"text":"（二）对几种不同地主的处理意见是：","type":"paragraph"},{"text":"（1）乡间地主，纯为逃避减退运动而潜入市区的，原则上一律应由农民带回本乡处理；因这些人在群众中一般有劣迹，有些本身就是恶霸坏人。","type":"paragraph"},{"text":"（2）住在城内的工商业者等地主，而押金退得出或限期即可退出押金的，只要退出押金即行。禁止带乡间斗争。","type":"paragraph"},{"text":"（3）地主兼工商业者，过去住在乡间，现在住在市内的，这要根据具体情况决定，如问题不多，也可以就地退押，即就地处理。反之，有重大罪恶事实，押金纠缠不清，则应经市府同意后，带回本乡处理。","type":"paragraph"},{"text":"（4）参加我政府负责工作或在地下时期对我工作确有帮助的民主人士或民主党派负责人，在退押中，首先要给他们留面子，不要先让农民跟他们纠缠；除个别确发现有重大罪恶，另行考虑外，一般是先详细调查其经济情况、负担能力，及其在群众中的影响等，把这些材料提交统战部门或有关负责人，通过他们交涉退押；绝对禁止不经市府的同意随便扣押他们。其有合于“缓、少、不”情况的也要主动跟农民说清楚，免得事后作难。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（上）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0a8c5bccf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
