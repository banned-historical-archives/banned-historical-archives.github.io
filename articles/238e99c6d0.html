tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平的理论是对毛泽东思想的继承和发展","authors":["龚育之石仲泉"],"parts":[{"type":"paragraph","text":"龚育之、石仲泉在《学习与研究》杂志1993年第20期发表的文章中指出，邓小平建设有中国特色社会主义的理论，是对毛泽东思想科学原理的继承和发展。就继承而言，主要有：①都凝结着中国共产党人的集体智慧；②都以“实事求是”为根本思路；③都具有强调中国特色，不固守本本的理论性格。就发展而言，主要有：①由以政治革命为中心到以经济建设为中心建立理论体系的飞跃；②由高度集中的计划经济理论到社会主义市场经济理论的飞跃；③实现了对社会主义理论整体认识的飞跃。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"238e99c6d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
