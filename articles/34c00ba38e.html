art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把资产阶级“权威”踩在脚下","authors":["汪永森"],"parts":[{"type":"paragraph","text":"“权威”老爷们恶毒地攻击和污蔑工农兵群众在革命实践中学习和运用毛泽东思想，我们极端愤慨，我们决不容许。"},{"type":"paragraph","text":"毛主席的书总结了工农兵闹革命、搞建设的经验，是写给工农兵看的，是替工农兵说话的，因此，工农兵一读就爱，一看就懂，一用就灵。就拿我个人来说吧：我在学校里读书时，受到了一些资产阶级思想的影响，刚入伍的时候，一心想当技术兵，学点技术好找个出路。没想到，领导上让我当了步兵，扛步枪。我当时认为“低人一头”，“没出息”。正在苦闷的时候，党支部组织我们学习了毛主席著作。毛主席说：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”毛主席的话，一下子吸住了我，越读越感到亲切，字字句句说在我的心坎上。我想：旧社会我是一个苦孩子，解放后翻了身，党把我送进学校，成了师范学生。要不是共产党、毛主席，哪有我的今天？党给了我文化，不好好为党工作，反而作为向党讨价还价的资本，这岂不是忘了本吗？想想张思德，想想为革命流血牺牲的同志，我感到十分惭愧，真是太对不起党，对不起毛主席。从此，我下定决心，为人民、为革命扛一辈子枪，当一辈子革命的“牛”。毛泽东思想哺育我不断成长，逐步树立了为人民服务的思想，连续几年被评为五好战士，光荣地参加了中国共产党。"},{"type":"paragraph","text":"毛泽东思想具有鲜明的阶级性，只有革命的工农兵才最容易理解和掌握毛泽东思想。刘少奇同志说过：“马克思列宁主义是无产阶级的革命的科学，是工人阶级建设社会主义和共产主义的科学。只有彻底站在无产阶级立场的人，以无产阶级的理想为理想的人，才能彻底了解和掌握它。没有坚定纯洁的无产阶级的立场和理想，是不能彻底了解和真正掌握马克思列宁主义这门科学的。”“权威”老爷们，你们站在资产阶级反动立场上，想的是资本主义复辟，干的是反党反社会主义的勾当，你们根本无法理解和接受毛泽东思想，你们永远也不能理解我们工农兵迅速领会和接受毛泽东思想的秘诀所在！你们与历史上一切反动的剥削阶级一样，总是把自己装得了不起，贬低劳动人民群众，把工农兵群众说成是“庸俗”“无知”。其实你们脱离了革命实践，才是最无知、最庸俗的。你们把工农兵运用毛泽东思想来指导做工、种田、打仗、卖西瓜、打乒乓球污蔑为“庸俗化”“简单化”“实用主义”，这就是你们愚蠢无知的大暴露。"},{"type":"paragraph","text":"“权威”老爷们，你们的狐狸尾巴藏不注了，你们打着“红旗”反红旗的反革命勾当干不成了。毛泽东思想是我们的命根子，是我们心中的红太阳，我们对毛泽东思想无限热爱，无限信仰，无限崇拜，我们一刻也不离开毛泽东思想。我们要坚决保卫毛泽东思想，把你们这些臭气熏天的“权威”老爷们踩在脚下。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34c00ba38e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
