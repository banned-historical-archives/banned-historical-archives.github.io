uthors":["中共云南省委第一书记","阎红彦"],"dates":[{"year":1961,"month":4,"day":29}],"is_range_date":false,"parts":[{"text":"阎红彦关于实事求是对待问题的意见","type":"title"},{"text":"中共云南省委第一书记阎红彦","type":"authors"},{"text":"注： 这是史峰同志的电话记录。","type":"paragraph"},{"text":"阎政委听了一川同志4月29日的意见后，说了以下问题：","type":"paragraph"},{"text":"同意一川同志的意见。","type":"paragraph"},{"text":"要充分估计干部作风，要他们实事求是，一下子是不容易的，特别是方向性的问题，他们不敢动。也要估计到群众也有他们的顾虑，我们干部不讲清楚，群众是不会讲真心话的。看起来，山区公社规模划小比较快，因为有些问题下相关连，例如耕地等，一宣布了，就很快解决。坝区牵连的问题多。山区主要是生产队的问题，核算单位必须根据具体条件，经济关系，把生产队作为核算单位或者一个寨子一个核算单位，宣布了很容易解决。据我们了解，群众对体制问题，反映很强烈。","type":"paragraph"}],"comments":[],"origin":"李原、明朗、王腾波、唐忠信主编《阎红彦同志讲话集》（1950·7-1966·11），1996年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb2ad1145c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
