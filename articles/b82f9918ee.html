tes":[{"year":1981,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社成都七月一日电　四川省仪陇县朱德同志旧居陈列馆今天重新开放。五千多人参加了今天的开幕式。"},{"type":"paragraph","text":"这个陈列馆在十年内乱中遭到了严重破坏。这次重新开放前，对陈列内容作了必要调整，增添了一批珍贵的历史文物。其中一九四六年朱德六十寿辰时刘少奇手书“朱总司令万岁”的题词，抗日战争、解放战争期间和建国以后朱德同宋庆龄、刘少奇、彭德怀、陈云、邓小平在一起的照片以及朱德同志逝世前将二万元存款作党费上缴的清单，都是首次展出。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b82f9918ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
