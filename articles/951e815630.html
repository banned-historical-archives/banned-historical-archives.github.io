:["同济大学政治经济学教研组助教","唐文美"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"同济大学助教唐文美的右派言论","type":"title"},{"text":"同济大学政治经济学教研组助教唐文美","type":"authors"},{"text":"“党不是大公无私的，有历史问题的人，今后只凭良心工作，不是为共产党工作。”","type":"paragraph"},{"text":"“陈望道先生的发言是没有向党开刀，他有职有权，地位占得很高，脱离了群众，看不到下层。”","type":"paragraph"},{"text":"“党群关系有问题，是党的组织对党员管理太紧，纪律太严，对群众不谈知心话。”（见校刊119期第五版）","type":"paragraph"},{"text":"“共产党员是否在鸣放中可以鸣放？党员不谈知心话，就是党的纪律严。”（见校刊135期第五版）","type":"paragraph"},{"text":"“肃反时问题没有全部掌握，方式粗暴吹毛求疵，言过其实，且打击报复。”“肃反培养了人家不实事求是，污蔑人，无耻，没人格。”“肃反有人违背良心讲话。”","type":"paragraph"},{"text":"“肃反是方针政策错了，肃反没有人情味，肃反领导上没有材料叫人拼命打，为达到目的不对手段，培养了一些道德败坏的人。”“肃反不但没有提高党的威信，反而丧失了党的威信，肃反以后共产主义道德日益降低，自己参加肃反是违背自己的良心去作的。”","type":"paragraph"},{"text":"“肃反缺乏人情味，抓一点提得很高，让本人说话少，自己在肃反中有两面性，口上说的不是自己愿意的。”（见校刊135期第五版）","type":"paragraph"},{"text":"“斯大林的错误是无产阶级专政的副作用。”","type":"paragraph"},{"text":"“无产阶级专政是三大主义的根源。”“无产阶级专政有副作用。”（见校刊135期第五版）","type":"paragraph"},{"text":"“苏联援助匈牙利，如果从立场上讲就没有问题，如果从是非上讲就是干涉内政。任何问题不是是非问题，只是立场问题。”（见校刊135期第五版）","type":"paragraph"},{"text":"“对铁托的文章，不同意的可以在报上发表，同意的就不能发表，是不民主。”（见校刊135期第五版）","type":"appellation"},{"text":"“自由市场的开放，出现的缺点是我国上层建筑的缺点。”“沈志远提出在人事上开放自由市场，免得有些人提心吊胆，搞不好可向别处，也免得一些人固定下来，没有上进心。有道理。”（见校刊135期第五版）","type":"paragraph"}],"comments":[],"origin":"同济大学马列主义资料室编印《右派分子言论汇编》第二辑（内部资料不得外传），一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"951e815630"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
