art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"图片","authors":[],"parts":[{"type":"paragraph","text":"党章草案规定，每一个党员有义务实行批评和自我批评，揭露工作中的缺点和错误，并且努力加以克服和纠正；有义务向党的领导机关直到党的中央委员会报告工作中的缺点和错误。党章草案的这个规定，无疑地将要提高全体党员的政治积极性，帮助党内批评的开展，促进党的工作中缺点和错误的揭露和消除。"},{"type":"paragraph","text":"党章草案规定，党员必须对党忠诚老实，不隐瞒和歪曲事实真相。这对于党的生活有重大的原则意义。从实际出发，实事求是，这是我们唯物主义者的根本立场。任何对党隐瞒和歪曲事实真相的行为，都只能对党造成损害。而归根结底，对于隐瞒和歪曲事实真相的人自己，也只能造成损害。"},{"type":"paragraph","text":"——邓小平“关于修改党的章程的报告”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"071d75834c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
