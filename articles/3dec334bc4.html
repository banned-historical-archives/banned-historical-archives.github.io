军事院校实行军管的通知","authors":[],"dates":[{"year":1968,"month":9,"day":2}],"is_range_date":false,"parts":[{"text":"中央军委、中央文革关于工人进军事院校及尚未联合起来的军事院校实行军管的通知","type":"title"},{"text":"遵照伟大领袖毛主席和他的亲密战友林副主席的指示，和中共中央，国务院，中央军委，中央文革八月二十五日通知的精神，现将工人进军事院校及尚未联合起来的军事院校实行军事管制的通知如下：","type":"paragraph"},{"text":"（一）伟大领袖毛主席批示：如工人条件成熟，所有军事院校均应派工人随同军管人员进去。打破知识分子独霸的一统天下。","type":"paragraph"},{"text":"毛主席的伟大批示是搞好军队院校无产阶级文化大革命的最大动力，应坚决执行，坚决照办。进军事院校的工人，可由实行了革命大联合和革命三结合，并清理了阶级队伍的军事工厂或民用工厂选派。","type":"paragraph"},{"text":"（二）凡尚未实行革命大联合的院校一律实行军事管制。军管人员除派领导干部之外，应派工人，解放军共同组成的毛泽东思想宣传队进驻学校。凡成立了革委会的院校不实行军管，但要派工人，解放军组成的，毛泽东思想宣传队进驻学校。其任务是领导学校实现革命的大联合，革命的大批判，清理阶级队伍，整党，和斗，批，改。","type":"paragraph"},{"text":"（三）对军队院校实行军事管制由院校所在地区的大军区统一组织实施；组织工人和解放军结合的毛泽东思想宣传队进驻学校，则由院校所在地区的大军区或省军区，省，市革命委员会共同组织实施。","type":"paragraph"},{"text":"（四）空军，海军不开展四大进行正面教育的飞行学校及机要学校不实行军事管制，不派工人，解放军毛泽东思想宣传队进驻学校。","type":"paragraph"},{"text":"（五）北京地区的高等军事院校，政治学院，空军学院，后勤学院，第三工程兵学校，空军第二高级专科学校等六座院校，担负着中央办的毛泽东思想学习班的训练任务。对这六所院校待训练任务告一段时，再进驻工人，解放军组成的毛泽东思想宣传队。","type":"paragraph"}],"comments":[],"origin":"根据中央文件原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3dec334bc4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
