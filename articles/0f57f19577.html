tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《人民领袖毛泽东》邮票珍藏册发行","authors":["李宣良"],"parts":[{"type":"paragraph","text":"纪念毛泽东诞辰110周年"},{"type":"paragraph","text":"《人民领袖毛泽东》邮票珍藏册发行"},{"type":"paragraph","text":"新华社北京11月14日电（记者李宣良）在12月26日毛泽东同志诞辰110周年纪念日即将到来之际，《人民领袖毛泽东》大型珍藏邮册日前发行。"},{"type":"paragraph","text":"《人民领袖毛泽东》大型珍藏邮册由中央文献出版社和湖南省韶山市邮政局承制，是国家邮政局发行《天安门》个性化专题邮票伟人系列的第一套。全套邮票的主票为《天安门》，附票由110幅毛泽东照片及“韶山故居”和“毛主席纪念堂坐像”组成，共分7个版；其中还有由毛泽东的亲属策划的首日封1枚、纪念封16枚，以及纪念毛泽东诞辰100周年邮票小型张1枚、大型毛泽东全身立体浮雕包金铜章1枚。全套珍藏邮册限量发行2万册。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f57f19577"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
