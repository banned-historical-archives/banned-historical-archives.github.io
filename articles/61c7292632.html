指出林副主席的《人民战争胜利万岁》这一文献在当代世界上具有十分重大的意义","authors":[],"dates":[{"year":1969,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）《先锋报》热情赞扬毛主席的光辉著作"},{"type":"paragraph","text":"号召澳大利亚人民认真学习毛主席著作"},{"type":"paragraph","text":"指出林副主席的《人民战争胜利万岁》这一文献在当代世界上具有十分重大的意义"},{"type":"paragraph","text":"新华社墨尔本十一日电　澳大利亚共产党（马克思列宁主义）机关报《先锋报》以《珍贵的毛主席著作选读》为题发表文章，热情赞扬中国人民的伟大领袖毛主席的光辉著作，并号召澳大利亚人民认真学习毛主席的著作。"},{"type":"paragraph","text":"文章详细介绍了《毛泽东著作选读》（甲种本）的内容，并指出，《中国社会各阶级的分析》一文提出了阶级分析的原则，是进行阶级分析的宝贵的典范；《湖南农民运动考察报告》这个文献是“阶级分析的又一篇经典著作，是认识和了解革命的深刻的一课”。"},{"type":"paragraph","text":"文章说：“毛主席继承、捍卫和发展了马克思列宁主义，把马克思列宁主义提高到一个崭新的阶段。”"},{"type":"paragraph","text":"文章还高度评价林彪副主席的《人民战争胜利万岁》一文。文章指出，这一文献在当代世界上具有十分重大的意义，它概述了毛主席关于人民战争的思想。"},{"type":"paragraph","text":"文章最后说，我们的时代是帝国主义走向崩溃，社会主义走向全世界胜利的时代，在这样的日子里，严格按照毛泽东思想办事，是一件极其重要的事情。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61c7292632"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
