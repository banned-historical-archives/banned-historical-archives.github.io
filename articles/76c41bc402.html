script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刚果（金）爱国武装负责人强调要把武装斗争进行到底  武装夺取政权是民族斗争的中心任务  刚果（金）人民决不信苏联修正主义鼓吹的“和解道路”鬼话","authors":[],"dates":[{"year":1969,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刚果（金）爱国武装负责人强调要把武装斗争进行到底"},{"type":"paragraph","text":"武装夺取政权是民族斗争的中心任务"},{"type":"paragraph","text":"刚果（金）人民决不信苏联修正主义鼓吹的“和解道路”鬼话"},{"type":"paragraph","text":"据新华社十九日讯　刚果（金）爱国武装力量一位负责人最近发表讲话，表示决心要把武装斗争坚持到底，直到解放整个刚果"},{"type":"paragraph","text":"（金）。"},{"type":"paragraph","text":"这位负责人强调指出：“毛主席关于‘枪杆子里面出政权’的论断是一条重要的、颠扑不破的、光辉的真理。它照耀着被压迫和被剥削的刚果（金）人民前进的道路，鼓舞着正在进行民族解放斗争的各国人民。”"},{"type":"paragraph","text":"他说，“刚果人民已经把这一论断看作是自己的，因为他们不走毛主席所指引的非常明确的道路，就不能实现自己的正当愿望。”"},{"type":"paragraph","text":"他指出：“我国人民揭露了苏联修正主义罪恶和卑鄙的政治阴谋和骗局，不再相信莫斯科修正主义这些敌人所鼓吹的议会道路，并认识到一切所谓‘和解道路’，议会道路，和平过渡和阶级合作的道路，只不过是已进入社会帝国主义阶段的苏联修正主义为同美帝瓜分世界而使用的完全骗人的鬼话。”"},{"type":"paragraph","text":"他接着说，刚果（金）革命者深深地懂得，武装夺取政权是我们为彻底摆脱美帝国主义及其走狗的压迫和剥削而进行的民族斗争的中心任务和最高形式。正如毛主席教导我们的那样，“革命的中心任务和最高形式是武装夺取政权，是战争解决问题。这个马克思列宁主义的革命原则是普遍地对的，不论在中国在外国，一概都是对的。”我国人民决心根据毛主席“对反动派造反有理”的教导，把武装斗争的烈火烧得更旺。"},{"type":"paragraph","text":"他还说，自从刚果（金）展开武装斗争以来，我国全体人民，主要是占全国人口百分之九十五的农民、工人和其他劳动群众，已看到展示在前面的一个民族解放和光辉道路的新时代。"},{"type":"paragraph","text":"这位负责人最后说：“刚果（金）战士要更高地举起战无不胜的毛泽东思想的红旗，下定决心，坚持武装斗争，直到最后摆脱美帝及其走狗蒙博托的统治，并且决不放下武器。我们确信，紧跟毛主席，我们就能胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76c41bc402"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
