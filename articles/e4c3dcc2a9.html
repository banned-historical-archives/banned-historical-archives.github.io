tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深揭狠批“四人帮”莆田走向大治","authors":[],"parts":[{"type":"paragraph","text":"福建省莆田地区的人们总结粉碎“四人帮”一年来当地的变化说：现在的莆田，干部、群众的精神面貌好，工农业生产好，社会秩序好，抓纲治国一年初见成效的目标，在莆田已经变成现实。"},{"type":"paragraph","text":"据统计，今年一至八月，莆田地区的工业总产值完成了全年计划的百分之七十五点五，比去年同期增长百分之二十点三，创造了历史同期最高纪录。主要产品蔗糖、原盐的产量，分别比去年同期增长百分之四十二和四十九，也创造了历史最高水平。全区七个县早稻县县增产，总产量比去年增长一成，不少社、队早稻一季跨《纲要》、上千斤。全区夏粮征购任务已超额完成，财政收入已完成全年计划的百分之九十二。（均据新华社）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4c3dcc2a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
