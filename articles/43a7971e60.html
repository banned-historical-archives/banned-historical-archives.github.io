],"dates":[{"year":1952,"month":2,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"平原省聊城专署公安处"},{"type":"paragraph","text":"负责干部应速克服右倾思想"},{"type":"paragraph","text":"编辑同志：平原省聊城专署公安处某贪污犯，在停职交代问题期间，不但不老老实实坦白自己的错误，反而百般刁难。他甚至责难给他住的屋子小了。他还带着他原来的通讯员，这个通讯员名义上是看守，实际上却任他支使。我认为，贪污分子在停职交代问题期间，仍享受原来的生活待遇，是不应该的。该处有关负责同志的这种严重的右倾思想，在群众中造成很不好的影响。不少人看到领导干部对待贪污分子的态度，就不敢大胆揭发检举了。我认为该处领导方面应该从速检查，整顿队伍，大力发动群众，严肃对待贪污犯，以便使运动顺利开展起来。  张林德"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43a7971e60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
