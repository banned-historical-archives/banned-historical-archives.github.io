ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给鲁迅艺术学院文学团体“路社”的信","alias":"","parts":[{"type":"paragraph","text":"给鲁迅艺术学院文学团体"},{"type":"paragraph","text":"“路社”的信"},{"type":"paragraph","text":"（1939年1月21日）路社常务委员会诸同志："},{"type":"paragraph","text":"信件收到了，谢谢你们的好意。"},{"type":"paragraph","text":"二月四日已约定别的集会，不能来你处，请加原谅。问我关于诗歌的意见，我是外行，说不出成片段的意见来，只有一点，无论文艺的任何部门，包括诗歌在内，我觉都应是适合大众需要的才是好的。现在的东西中，有许多有一种毛病，不反映民众生活，因此也为民众所不懂。适合民众需要这种话是常谈，但此常谈很少能做到，我觉这是现在的缺点。这一点是否有考虑的价值，请你们斟酌一番。此复。"},{"type":"paragraph","text":"敬祝努力！"},{"type":"paragraph","text":"毛泽东一月二十一日"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":1,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":183,"page_end":183},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44464e09a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
