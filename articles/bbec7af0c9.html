script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛主席建党思想武装头脑  上海国棉三十厂共产党员以新党章对照自己，积极发挥先锋模范作用","authors":[],"dates":[{"year":1970,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用毛主席建党思想武装头脑"},{"type":"paragraph","text":"上海国棉三十厂共产党员以新党章对照自己，积极发挥先锋模范作用"},{"type":"paragraph","text":"据新华社上海二十一日电　上海国棉三十厂的共产党员以毛主席的指示和新党章的各项规定对照自己，认真改造世界观，不断促进思想革命化，在革命和生产斗争中，发挥先锋模范作用。"},{"type":"paragraph","text":"这个厂的共产党员在毛主席的无产阶级建党路线的指引下，经过整党建党运动，阶级斗争和两条路线斗争觉悟大大提高。一些担任厂内各级领导职务的共产党员，牢记毛主席的教导，始终保持着劳动人民的本色，积极带领广大革命群众在继续革命的大道上奋勇前进。厂党委副书记刘汉荣，原来是一个普通工人。他担任领导工作后，努力活学活用毛泽东思想，坚持做到“既当‘官’，又当老百姓”。他为了更密切地联系群众，把铺盖搬到厂里去住。在他的带动和影响下，厂里其他领导干部都经常坚持参加集体生产劳动。"},{"type":"paragraph","text":"这个厂的共产党员在斗争中坚持把活学活用毛泽东思想放在首位。厂里有许多共产党员是老工人。他们怀着对毛主席无比深厚的无产阶级感情，克服文化水平低的困难，孜孜不倦地学习毛主席著作，学习光辉的“老三篇”，用毛泽东思想统帅自己的一切行动。他们反复学习毛主席关于“党组织应是无产阶级先进分子所组成，应能领导无产阶级和革命群众对于阶级敌人进行战斗的朝气蓬勃的先锋队组织”的伟大教导，以战无不胜的毛泽东思想为武器，狠批叛徒、内奸、工贼刘少奇鼓吹的“阶级斗争熄灭论”，经常站在阶级斗争第一线，带领革命群众向阶级敌人进行战斗。共产党员童传喜不仅在厂里积极投入阶级斗争，而且热情帮助里弄干部举办毛泽东思想学习班，大力宣传毛主席的各项无产阶级政策，同里弄革命群众一道开展对敌斗争。"},{"type":"paragraph","text":"毛主席教导说：“共产党员的先锋作用和模范作用是十分重要的。”上海国棉三十厂的共产党员牢记毛主席的这一伟大教导，在“抓革命，促生产，促工作，促战备”的战斗中，积极发挥先锋模范作用。丙班细纱间女工、共产党员李小妹，今年已经五十多岁了，但她人老心更红，年高志更坚，在落纱时争分夺秒抢时间，汗流满面，忘我劳动，争取多纺纱和纺好纱，为伟大领袖毛主席争光，为伟大的社会主义祖国争光。钳床间共产党员、老工人赵锡海，在生产斗争中是冲锋陷阵的闯将。厂里安装节煤炉时，他不仅积极向大家宣传节约用煤的重要意义，而且带头抢挑重担。筒子间共产党员王秀琳，一贯埋头苦干。有一个时期筒子间积压了一百五十多包纱，剩纱比平时增加了三倍多。王秀琳看到这种情况，心里很着急。她遵照毛主席关于“必须把布匹抓紧”的教导，把大家发动起来，利用假日坚持生产，很快把剩纱“吃掉”，为全厂实现增产计划作出了贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbec7af0c9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
