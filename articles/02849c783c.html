script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"哥穆尔卡警告资产阶级反动政客休想在波兰复辟资本主义","authors":[],"dates":[{"year":1956,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社华沙1日电:波兰统一工人党中央委员会第一书记哥穆尔卡11月29日强烈谴责那些认为党的第八次全体会议的决议是波兰回到资本主义的一个阶段的人，他认为，资产阶级政客们对这样一个“阶段”所抱的希望应该打消。"},{"type":"paragraph","text":"哥穆尔卡在华沙举行的全波社会和政治积极分子会议上发表演说时强调说，“只有社会主义的波兰，才能是自由自主的波兰。这样一个波兰能够日益强大，保证人民就业、改善人民的生活条件。我国的劳动群众决不允许有任何其他的波兰。”"},{"type":"paragraph","text":"哥穆尔卡说，在波兰，资产阶级政党是没有活动自由的。但是他同时着重指出，“波兰要走社会主义的道路，同非马克思主义、但是支持党的纲领的政党合作是不可少的，这个纲领同这些政党的愿望是一致的”。"},{"type":"paragraph","text":"哥穆尔卡在演说的开头部分还谈到了波苏关系。他说，在莫斯科签署的波苏声明是双方的政治上的胜利。他认为波苏会谈的结果可以作为社会主义国家之间应当存在的那种性质的关系的榜样，并且相信苏匈关系也将在同样的原则上建立起来。"},{"type":"paragraph","text":"哥穆尔卡强调指出，“愈来愈友好的相互关系和愈来愈深刻的了解把我们同中华人民共和国——我们的受过考验的朋友——联系起来。我们同捷克斯洛伐克、德意志民主共和国和社会主义阵营其它国家的关系是以共同的利益和友谊为标志的”。"},{"type":"paragraph","text":"他并且说，波兰同南斯拉夫关系的完全正常化最近也已经开始。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02849c783c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
