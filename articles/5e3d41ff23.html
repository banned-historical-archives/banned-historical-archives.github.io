art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入学习毛泽东军事理论探讨新形势下如何坚持发展人民战争思想","authors":["李文朝/董祥起"],"parts":[{"type":"paragraph","text":"本报讯 李文朝、记者董祥起报道：近日，记者一行走进济南军区高级干部毛泽东军事思想集训班的时候，强烈地感受到了一种热烈而浓厚的学习和研究气氛。"},{"type":"paragraph","text":"组织高级干部学习毛泽东军事思想，提高高级干部军事理论素质，是加强马列主义理论学习的重要内容，是我军建设一件带根本性的大事。为此，去年底和今年初，军区领导多次分头深入部队对中、高级干部的军事理论学习情况进行摸底，确定重点围绕新形势下如何坚持发展人民战争思想进行研究探讨，要求各级领导联系现代战争实际，用毛泽东军事思想的立场、观点和方法指导部队建设和未来作战问题。"},{"type":"paragraph","text":"在分散学习的基础上，从5月下旬到6月上旬，济南军区集中军级单位军政主官和机关三大部的主要领导，进行深入学习讨论。学原著，看战例，听讲课，分组议，交流成果。军区领导同志自始至终同大家一起听课，一起讨论。并用自己的学习体会，登台辅导。这次集训邀请了军事科学院和国防大学的专家、学者现场授课，结合世界局部战争战例，紧紧围绕如何发挥人民战争的优势等课题展开了热烈的讨论。有22位领导同志围绕在现代战争中，人的因素是否无关紧要了？局部战争如何打人民战争？现代战争对人民战争的战略战术提出了什么新要求？如何以劣势装备战胜优势装备之敌等问题，介绍了自己的研究成果。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e3d41ff23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
