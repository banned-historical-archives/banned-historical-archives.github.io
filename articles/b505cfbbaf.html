tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理会见西德客人","authors":[],"parts":[{"type":"paragraph","text":"新华社十一月二十日讯 国务院副总理邓小平今天上午会见了德意志联邦共和国研究和技术部长福尔克尔·豪夫和夫人一行。"},{"type":"paragraph","text":"邓小平副总理在谈话中对中国和西德在经济和科学技术方面合作关系的发展表示满意。他说双方合作的领域是很宽广的，并希望这种友好合作关系能够不断得到加强。"},{"type":"paragraph","text":"豪夫部长说，近来两国的关系有了迅速的发展，华国锋总理对西德的访问是我们友好关系发展的高潮。他指出，西德和中国在经济和科学技术领域的合作是很好的。他强调说，我们的合作不是针对第三国的，但在我们合作的过程中，也决不允许第三国来指挥我们。"},{"type":"paragraph","text":"宾主还就一些具体的合作项目进行了友好的商谈。"},{"type":"paragraph","text":"国务院副总理、国家科委主任方毅，国家科委副主任赵东宛等会见时在座。"},{"type":"paragraph","text":"西德驻中国大使魏克德也参加了会见。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b505cfbbaf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
