art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是战胜敌人的最强大武器","authors":["“海上猛虎艇”副指导员戴学明"],"parts":[{"type":"paragraph","text":"我怀着无比激动的心情，从海防前线来到了祖国的首都北京，来到了我们日夜想念的最最敬爱的领袖毛主席的身边。十一月三日，又在天安门广场，亲眼见到了我们的伟大统帅毛主席，这是多么的幸福！"},{"type":"paragraph","text":"毛主席是我们心中最红最红的红太阳，毛泽东思想是我们战胜一切敌人的最强大的武器。有了毛泽东思想，我们刀山敢上，火海敢闯，敢于以小艇打大舰，把敌舰“沱江号”、“永昌号”这些看起来很大的东西，打沉海底，叫它们永世不得翻身。谁要反对我们学习毛泽东思想，我们就叫他象敌舰“永昌号”一样，落一个粉身碎骨的下场！"},{"type":"paragraph","text":"毛主席一次又一次地接见革命群众，是对我们最大的关怀，最大的鼓舞，最大的幸福，最大的光荣。我们要坚决响应林彪同志的号召，活学活用毛主席著作，破私立公，在改造世界观上狠下苦功夫，真正把毛泽东思想学到手，象蔡永祥同志那样，做一个一心为公的共产主义战士。RW：毛泽东；接见红卫兵；言论"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8935eb5455"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
