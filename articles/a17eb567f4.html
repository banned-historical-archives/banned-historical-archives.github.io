ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"普东南作战的主要任务","alias":"","parts":[{"type":"paragraph","text":"晋东南作战的主要任务！"},{"type":"paragraph","text":"（1938年3月24日）朱、彭："},{"type":"paragraph","text":"甲、目前晋东南作战主要任务，似在用打击削弱与断绝后路等方法钳制进至修武、博爱并企图南犯洛阳之敌，其次则在打击进至长治之敌。"},{"type":"paragraph","text":"乙、因此刘师徐旅?两部似宜分开作战，以徐旅（或刘师）从东阳关?南下直抵道清路?侧，破坏该路并打击该路之敌，以刘师（或徐旅）位于长治附近打击该地之敌。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"二十四日十四时[1]这是毛泽东给朱德、彭德怀的电报。"},{"type":"paragraph","text":"[2]刘师，指八路军第一二九师，师长刘伯承。徐旅，指八路军第--五师第三四四旅，旅长徐海东。"},{"type":"paragraph","text":"[3]东阳关，镇名，即壶口故关，位于山西省黎城县东南。[4]道清路，指河南省滑县道口镇至博爱县清化镇的铁路。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":118,"page_end":118},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a17eb567f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
