art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"泰国国王接见邓颖超副委员长","authors":[],"parts":[{"type":"paragraph","text":"泰国国王普密蓬·阿杜德九日下尔在清迈的普平王宫接见邓颖超副委员长和中国全国人大代表团全体成员。邓副委员长向国王转达了叶剑英委员长、华国锋总理和邓小平副总理的诚挚问候。"},{"type":"paragraph","text":"普密蓬国王说，邓小平副总理一九七八年对泰国的访问给他留下了深刻的印象。访问过中国的泰国代表团对中国取得的进展和中国人民的艰苦工作也留下了深刻印象。"},{"type":"paragraph","text":"邓副委员长请国王转达她对在美国就医的诗丽吉王后的诚挚问侯，祝愿她健康。她还请国王转达她对王太后西娜卡王林德拉的诚挚问候。"},{"type":"paragraph","text":"接见时在座的有诗琳通公主、朱拉蓬公主、泰国国会议长哈林·宏沙军。中国驻泰国大使张伟烈和夫人也在座。"},{"type":"paragraph","text":"二月十日下午邓颖超副委员长在她下榻的爱侣湾旅馆会见华侨和泰籍华人的代表。她说，旅居泰国的华侨和泰籍华人应遵守泰国的政策法令，同泰国人民友好相处，为增进中泰两国人民的友谊，作出更多更大的贡献。泰国中华总商会主席黄作明、副主席郑明如、邱细见以及有关社会团体的负责人和华侨代表近一百人参加了会见。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e06878a2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
