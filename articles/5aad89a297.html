":[],"dates":[{"year":1992,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社莫斯科7月16日电　俄罗斯副总统鲁茨科伊尖锐批评了俄罗斯政府奉行的经济政策。他说，“目前，俄罗斯完全处于无政府状态，对宏观经济的调节失控”。"},{"type":"paragraph","text":"鲁茨科伊是在16日晚召开的公民联盟政治协商委员会第一次会议上发表讲话时阐述这一看法的。以鲁茨科伊为主席的自由俄罗斯人民党、特拉夫金为首的俄罗斯民主党以及沃尔斯基领导的全俄复兴联盟等于上月21日成立的公民联盟，被视为当前俄罗斯政坛上一支重要的力量。它主张在保留现有改革战略方针的情况下对改革的步骤作重大修正，即从宏观调节转向对经营过程进行直接管理，通过刺激最终需求、缓和税收政策及积极的信贷投资等措施来保持和发展工业生产。"},{"type":"paragraph","text":"据新华社莫斯科7月16日电　独联体11国外交部长、国防部长和联合武装力量总司令16日在乌兹别克斯坦首都塔什干召开联席会议，通过一项关于成立军事观察员小组和维持和平部队以解决独联体国家内部和各国之间武装冲突的议定书。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5aad89a297"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
