ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于采用会议简报办法的批语","alias":"","parts":[{"type":"paragraph","text":"关于采用会议简报办法的批语"},{"type":"paragraph","text":"（1952年12月28日）陈云、薄一波、曾山、贾拓夫四同志："},{"type":"paragraph","text":"近来政务院、军委、文委均采取会议简报的办法，很有用，极简单明了，使人一看即知道会议要点，比做长篇报告还有用些。请你们考虑是否可以仿行，先用此种简报，长篇报告则放在后头，在中央会议上也可省去许多口头报告的部分。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿八日尚昆阅。请尚昆邀集各处办公厅主任商定一会议简报的办法。"},{"type":"paragraph","text":"[1]这个批语写在1952年12月23日召开的政务院文化教育委员会党组会议的简报上。"},{"type":"paragraph","text":"[2]陈云，当时任政务院副总理兼财政经济委员会主任。薄一波，当时任政务院财政经济委员会副主任兼财政部部长。曾山、贾拓夫，当时均任政务院财政经济委员会副主任。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":397,"page_end":397},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbe820f4dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
