决心为开好将在阿尔及尔召开的第二次亚非会议而共同努力。　双方表示将进一步加强和巩固中索两国人民的友谊和两国的友好合作关采。　刘少奇主席愉快地接受了访问索马里共和国的邀请。","authors":[],"dates":[{"year":1965,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京29日电　中国和索马里联合新闻公报"},{"type":"paragraph","text":"索马里共和国总统亚丁·阿卜杜拉。欧斯曼阁下应中华人民共和国主席刘少奇和国务院总理周恩来的邀请，于一九六五年七月二十一日至二十八日在中华人民共和国进行了友好访问。陪同访问的有外交部长艾哈迈德·优素福·杜阿莱，内政部长阿卜杜勒·卡迪尔·穆罕默德·阿丁，总统办公室主任哈吉·穆罕默德·阿瓦勒·利班，外交部代理办公厅主任阿卜杜勒·拉赫曼·阿比，计划部代理办公厅主任艾哈迈德·博坦，外交部礼宾司长穆罕默德·谢里夫·埃达鲁斯，内政部政治司长阿密尔·塔尔蒙，总统侍卫官阿卜迪·穆罕默德·萨哈迪德，总统私人秘书穆罕默德。瓦贝里和其他官员。"},{"type":"paragraph","text":"在访问期间，欧斯曼总统和索马里贵宾们在北京、杭州、上海等地参观了工厂、人民公社和文化教育等机构；同中国人民进行了广泛的接触，受到中国政府和中国人民的热烈欢迎和盛情款待。欧斯曼总统向中国领导人和中国人民转达了索马里人民亲切的问候。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东会见了欧斯曼总统和索马里贵宾，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"访问期间，刘少奇主席和周恩来总理同欧斯曼总统就当前国际形势、反对帝国主义和新老殖民主义问题和进一步发展中索两国之间的友好合作关系，进行了会谈。会谈是在诚挚、友好的气氛中进行的。"},{"type":"paragraph","text":"双方表示，坚决支持亚洲、非洲和拉丁美洲各国人民的民族解放运动。"},{"type":"paragraph","text":"双方表示，决心为开好将在阿尔及尔召开的第二次亚非会议而共同努力。"},{"type":"paragraph","text":"双方高兴地看到，自从中索两国建立外交关系以来，两国之间的友好合作关系获得了顺利的发展。中华人民共和国和索马里共和国的代表就执行一九六三年签订的中华人民共和国政府和索马里共和国政府经济技术合作协定进行了富有成果的讨论。双方表示将进一步加强和巩固中索两国人民的友谊和两国的友好合作关系。"},{"type":"paragraph","text":"欧斯曼总统这次对中国的访问，为促进两国之间的相互了解和友谊，以及加强亚非团结事业作出了重要的贡献。"},{"type":"paragraph","text":"欧斯曼总统邀请刘少奇主席在他方便的时候访问索马里共和国。刘少奇主席愉快地接受了这项邀请。"},{"type":"paragraph","text":"一九六五年七月二十八日"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\07\\657t010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e陈根宝\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e周总理、李先念副总理、曹荻秋副市长等向欧斯曼总统挥手告别"},{"type":"paragraph","text":"陈根宝　摄　(新华社稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a367757897"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
