好局面","authors":[],"dates":[{"year":1976,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海海运局广大职工以阶级斗争为纲，坚持党的基本路线，以积极搞好运输生产的实际行动回击右倾翻案风。今年一月份的客货运输计划超额完成，客货运量分别比去年同期增长百分之一点六二和百分之十四。"},{"type":"paragraph","text":"这个局各级党组织积极组织广大干部和群众认真学习新近发表的毛主席的词二首和中央两报一刊元旦社论，学习中央一系列文件和《人民日报》、《红旗》杂志的有关文章，使大家加深了对社会主义革命的性质、对象、任务和前途的认识。广大干部和工人遵照毛主席关于“阶级斗争是纲，其余都是目”的教导，注意正确处理革命和生产的关系，坚持以阶级斗争为纲，抵制和批判以目代纲等奇谈怪论，使整个海运系统出现了革命和生产的大好局面。"},{"type":"paragraph","text":"这个局的广大干部和工人为了巩固无产阶级专政，努力搞好运输生产，在天气冷，煤炭、石油等供应紧张和春节客运繁忙的情况下，千方百计安排运力，抗风斗浪，加快运输，以满足生产的需要。一月份，以运输秦皇岛港煤炭为重点，大、中、小各类煤船的船员一齐上阵，基本上做到码头不断船，运出煤炭一百零六万吨，比去年同期增长百分之四十八，创该局运煤炭历史最高纪录。石油运输也超额百分之九点六完成了月度计划。对面粉、白菜、冻鱼等春节市场供应物资，他们主动上门走访，采用专船运输和捎带相结合的办法，做到保质保量地及时运输，保证供应。"},{"type":"paragraph","text":"海运局和客货轮船队党委都十分重视抓好今年的春节客运工作，事前召开专门会议，提出“春运年年搞，一年要比一年好”的要求。节日前后，局、队两级党委主要领导同志分赴重点港口、码头慰问船员和旅客。广大船员意气风发，斗志昂扬，坚守岗位，紧张战斗，不断提高服务质量，基本上做到使旅客走了、走好、走得安全。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c50b64336d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
