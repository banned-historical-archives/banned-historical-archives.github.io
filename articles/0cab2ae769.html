rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈祝贺华国锋主席当选为中共中央主席","authors":[],"parts":[{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会主席、中国共产党中央军事委员会主席华国锋先生阁下："},{"type":"paragraph","text":"我十分满意地获悉中国共产党第十一次代表大会通过决议，确认你为中华人民共和国的领袖，担任中国共产党中央委员会主席、中国共产党中央军事委员会主席。在这愉快的时刻，请允许我代表马达加斯加人民、马达加斯加全国保卫革命阵线、最高革命委员会和马达加斯加政府，并且以我个人的名义，向你表示最热烈的祝贺。我热忱地祝愿你在为建设社会主义、为伟大中国人民的幸福、为实现世界和平以及加强中、马两国的合作关系而继续进行不懈的努力，并在履行这些艰巨而又十分光荣的使命中获得成功。"},{"type":"paragraph","text":"马达加斯加民主共和国总统 迪迪埃·拉齐拉卡"},{"type":"paragraph","text":"一九七七年八月二十六日于塔那那利佛"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cab2ae769"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
