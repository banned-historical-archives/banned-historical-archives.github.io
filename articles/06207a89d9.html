script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文化大革命是毛主席对马列主义的伟大发展  阿劳动党中央委员沙姆布利指出：中国党内头号走资本主义道路的当权派的《修养》是欺人之谈，是为资本主义复辟作舆论准备的","authors":[],"dates":[{"year":1967,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命是毛主席对马列主义的伟大发展"},{"type":"paragraph","text":"阿劳动党中央委员沙姆布利指出：中国党内头号走资本主义道路的当权派的《修养》是欺人之谈，是为资本主义复辟作舆论准备的"},{"type":"paragraph","text":"新华社地拉那七日电　阿尔巴尼亚劳动党中央委员、劳动党发罗拉区委员会第一书记佩·沙姆布利，三日在发罗拉区工会举行的欢迎中国工会代表团的宴会上，热情地指出：我们的时代有了毛主席，这是全世界人民莫大的幸运。"},{"type":"paragraph","text":"沙姆布利说，目前正在中国深入开展的无产阶级文化大革命具有极其伟大的意义。无产阶级文化大革命的胜利开展，不仅关系到中国人民的命运，而且关系到全世界人民的命运。通过这场大革命，打倒了党内走资本主义道路的当权派，堵塞了产生修正主义和复辟资本主义的孔道。"},{"type":"paragraph","text":"他说，中国无产阶级文化大革命的重要意义在于，毛泽东同志进一步发展了马克思列宁主义，在实践中解决了如何防止资本主义复辟、保卫革命胜利果实的问题。"},{"type":"paragraph","text":"沙姆布利赞扬中国的无产阶级文化大革命是在伟大的马克思列宁主义的毛泽东思想的基础上进行的。在这场革命中贯彻执行了毛主席所制定的群众路线。全中国人民都投入了这场革命，并且在革命中显示了自己的巨大力量。"},{"type":"paragraph","text":"沙姆布利说，美帝国主义和现代修正主义对中国的无产阶级文化大革命怕得要死。它们的害怕和恐惧再次证明了中国的无产阶级文化大革命的重要性，证明了毛主席的论断：“被敌人反对是好事而不是坏事”。"},{"type":"paragraph","text":"他说，我们感到十分高兴的是，中国人民在毛泽东主席的领导下，在各个方面取得了辉煌的胜利。中国不仅地大物博，人口众多，而且有着伟大的马克思列宁主义毛泽东思想。我们的时代，有了毛主席，这是全世界人民的莫大幸运。我们祝中国人民和全世界无产阶级的伟大领袖、阿尔巴尼亚人民最亲密的朋友毛泽东同志万寿无疆。"},{"type":"paragraph","text":"沙姆布利还说，以毛泽东同志为首的中国共产党和伟大的中国人民始终高举马克思列宁主义的革命旗帜，同帝国主义、修正主义进行针锋相对的斗争。今天，中国是世界上所有马克思列宁主义革命力量、国际共产主义运动、为社会主义而斗争的各国人民的强大支柱和堡垒。真正站在无产阶级革命立场上的马克思列宁主义力量和进步人民，都对中国人民、对毛主席无限敬仰和无限热爱。"},{"type":"paragraph","text":"沙姆布利在谈到中国人民对党内最大的走资本主义道路当权派的大批判时说，中国共产党内头号走资本主义道路当权派的《修养》是欺人之谈，这本书是为资本主义复辟作舆论准备的。如果让党内头号走资本主义道路的当权派篡夺了领导权，中国就会变成今天的苏联，世界革命就要倒退数百年。"},{"type":"paragraph","text":"沙姆布利说，阿尔巴尼亚人民在霍查同志的英明领导下，正在革命化道路上奋勇前进。阿尔巴尼亚劳动党采取了一系列革命化措施后，全国出现了一派史无前例的大好形势，正在深入开展思想文化革命。中国人民和阿尔巴尼亚人民在毛主席和霍查同志的领导下，坚定地走在社会主义的道路上，正在做出重大的贡献，支持和援助全世界各国人民争取解放的斗争。"},{"type":"paragraph","text":"由中华全国总工会书记处书记赵国强率领的中国工会代表团，是在三日上午到达发罗拉区进行友好访问的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06207a89d9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
