script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝沙湾拿吉市举行万人夺权大会宣布夺取沙湾拿吉省旧省政府的权力建立由工、农等各界群众和知名人士代表组成的人民政权，新政权发表公告宣布隐藏的美帝和极右反动派的走狗必须在三日内向新政权自首","authors":[],"dates":[{"year":1975,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社万象一九七五年六月二日电　据《巴特寮新闻》报道，老挝万象方面控制区中寮三省(沙湾拿吉、甘蒙和占盆)“解放革命委员会”五月三十一日在沙湾拿吉市举行夺权大会，宣布夺取沙湾拿吉省旧省政府的权力。"},{"type":"paragraph","text":"沙湾拿吉省的工人、农民、职员、学生、军人、警察和居民数万人参加了夺权大会。进驻沙湾拿吉市的老挝各爱国力量部队的干部和战士也参加了大会。"},{"type":"paragraph","text":"会上宣读的一项声明强烈谴责美帝国主义及其收买的培·萨纳尼空、卡代·萨索里、富米·诺萨万和西苏·纳占巴塞等老挝反动头子的种种罪行。"},{"type":"paragraph","text":"声明指出，沙湾拿吉省的政权是落后腐朽和不符合人民愿望、不符合当前形势的反动政权。沙湾拿吉省各界人民群众庄严宣布夺取旧省政府的权力，彻底废除反动政权，在沙湾拿吉省建立由工人、农民、学生、职员、军人、僧侣等各界群众和知名人士代表组成的人民政权。"},{"type":"paragraph","text":"声明指出，沙湾拿吉省新政权的任务是，要求美帝国主义停止对老挝的军事干涉和撤销“美援署”等特务机构，要求惩办老挝极右反动派；团结各界人民群众，严格执行万象协定和十八点政治纲领；支持一切争取正义和社会进步的斗争；反对美帝国主义及其极右反动派的一切阴谋；同各爱国力量真诚合作，共同保卫和平和民族和睦。"},{"type":"paragraph","text":"大会结束后，数万群众举行了声势浩大的示威游行。"},{"type":"paragraph","text":"另据报道，沙湾拿吉省新政权还发表公告宣布，隐藏的美帝国主义和极右反动派的走狗必须在三日内向新政权自首；没收文翁·纳占巴塞等逃离老挝的反动分子的财产；惩办破坏、盗窃、囤积居奇和对临时民族联合政府和民族政治联合委员会的政策进行造谣诬蔑的人；奖励协助当局捕获敌人的人。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1975\\06\\7563040201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e老挝人民解放军应老挝人民的迫切要求，五月二十日进驻中部重镇——沙湾拿吉市。数以万计的群众从四面八方涌向街头，热烈欢迎解放军。"},{"type":"paragraph","text":"传真照片(新华社发)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ced8ba4702"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
