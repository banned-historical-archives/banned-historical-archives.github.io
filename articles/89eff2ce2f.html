<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英雄们笑谈美国纸老虎志愿军以抗美援朝亲身经历証明毛主席论断无比英明","authors":[],"dates":[{"year":1958,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京1日电】　“毛泽东同志论帝国主义和一切反动派都是纸老虎”的重要文献，博得凯旋归来的中国人民志愿军英雄们的热烈拥护和赞颂。他们衷心感激毛主席的英明教导，感激毛主席用天才的哲学思想和军事思想武装了他们，使他们在朝鲜战争中戳穿了美国纸老虎，争取了抗美援朝的伟大胜利。"},{"type":"paragraph","text":"以杨勇上将和王平上将为首的中国人民志愿军代表团全体人员，连日来热烈地展开对毛主席这一重要文献的学习，并结合他们在朝鲜战争中的亲身经历，纷纷进行座谈和漫谈。他们个个兴奋鼓舞，对毛主席的英明论断感到无限亲切和正确，而对美帝国主义和一切反动派更加仇视和藐视，充满了革命斗争的胜利信心。"},{"type":"paragraph","text":"志愿军某部师长董占林上校说，在八年的抗美援朝斗争中，我们时时刻刻都牢记着毛主席所说的“美帝国主义是一只纸老虎”，并在毛主席的军事思想指导下——在战略上藐视敌人，在战术上重视敌人，去同敌人英勇斗争，而取得了伟大的胜利。今天，当我们回到祖国，再一次重温毛主席这一英明论断的时候，更加体会深刻和感到莫大的鼓舞。我们一定要永远高举毛主席的思想红旗，在建设和保卫祖国的战线上，打败一切敌人，争取最大的胜利。"},{"type":"paragraph","text":"志愿军的每一个指挥员和普通的战士，每一个参加过朝鲜战争的人，也都深刻地认识到抗美援朝的胜利，就是毛主席的伟大战略思想和军事思想的光辉胜利。志愿军“二级战斗英雄连”的政治指导员程明玉曾经率领着他的战士们在痛打美国侵略军“王牌”第七师的战斗中，仅仅3个月，就消灭敌人4百多名，活捉了12个美国鬼子。他说:“毛主席的话，深入我们每个战士的心。在激烈的战斗中，每当看着张牙舞爪的敌人，一想起毛主席的话，就勇气百倍，心里总是亮堂堂的，充满胜利的信心。”"},{"type":"paragraph","text":"在朝鲜战争中，猖狂的美国侵略军曾经大肆施展过它的“空中优势”和“炮火优势”，企图以此就能够征服中朝人民的英雄意志。但是这也是“搬起石头打自己的脚”。中国人民志愿军后方勤务部队的张明远将军，就是一位曾经在朝鲜的钢铁运输线上，指挥着千军万马，战胜敌人的“全面控制”、“重点轰炸”和“绞杀战”的英雄指挥员。张明远将军说，美国侵略军的飞机在开始时，曾经疯狂到自己闯到电线杆子上撞死的程度，疯狂到一天在两公里的铁路上投下成千颗炸弹的地步，但是它完全没有认识到它的对手是些什么样的人!当然，他们也的确不懂得这条真理——一“人是战争的决定因素”，而我们却正是遵照着毛主席这个英明的教导，发挥我们的长处，利用敌人的短处，勇敢机智地战胜敌人。"},{"type":"paragraph","text":"许多炮兵英雄们也笑谈美国侵略军的“炮火优势”和“空中优势”不过是纸老虎的表现。他们说，在朝鲜战争初期，当我们志愿军还是“手榴弹加步枪”的时候，敌人的“优势”就不顶事，而后来，我们也拥有了飞机、大炮和坦克，敌人的“优势”神话更彻底破产了。我们夺回了白天，夺回了天空，并且用地面炮火把骄傲的敌人打得在“奇形怪状的基地”上“低下头来!”使美国纸老虎的原形赤裸裸地暴露了。曾经在朝鲜战场上用高射机枪就打落美国侵略军飞机三架、打伤四架的一等功臣张立春，更是卑视美帝国主义这只纸老虎，他说:“在朝鲜战场上，开始时，因为我们没有高射武器和空军，美国‘空中强盗’可猖狂极啦!后来，我们有了，美国的飞机就变成‘烧鸡，了，‘王牌’的飞行员被揍下来，不是‘王牌’的也害了吃惊病。真象毛主席所说的纸老虎。今天，美帝国主义竟还敢侵占我们的台湾，并且用导弹和新式飞机装备蒋介石，向我们进行军事威胁，这对它来说，决不会有好下场的。”"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1958\\11\\58b2010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e刘长忠\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在首都欢迎志愿军游园晚会上。右边第二人起:廖承志、杨勇、郭沫若、彭真、王平"},{"type":"paragraph","text":"(无线电传真新华社记者　刘长忠　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89eff2ce2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
