ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"中央关于成立川西北军政委员会的电报","alias":"","parts":[{"type":"paragraph","text":"中央关于成立川西北军政委员会的电报"},{"type":"paragraph","text":"（1949年11月7日）贺龙同志，并告西北局德怀同志及刘、邓："},{"type":"paragraph","text":"（一）同意贺龙同志六日意见。为了统一指挥十八兵团及其他临时配合作战部队，为了领导川西北地方工作，在未与西南局会合前，需要有一个统一的领导机关。此项机关似可称为川西北军政委员会，以贺龙为主任统一领导军事政治党务民运等项工作。何人为副主任及委员名单，请贺提出先在此次兰州西北局会议上斟酌通过，电告中央作决定。此项机关，因无党外人参加，又是临时的，故可将党务工作归其管辖，而不必另外成立党委组织。至于对十八兵团及其他部队指挥作战，如觉用川西北军政委员会主任名义不方"},{"type":"paragraph","text":"[1]贺龙，当时任中共中央西北局第二书记、中国人民解放军西北军区司令员。1949年8月被任命为中共中央西南局第三书记，同年10月被任命为中国人民解放军西南军区司令员，这时均未到职。"},{"type":"paragraph","text":"[2]德怀，即彭德怀，当时任中共中央西北局第一书记、中国人民解放军第一野战军司令员兼政治委员。"},{"type":"paragraph","text":"[3]刘，指刘伯承，当时任中共中央西南局第二书记、中国人民解放军第二野战军司令员。邓，指邓小平，当时任中共中央西南局第一书记、中国人民解放军第二野战军政治委员。毛泽东全集第二十七卷便，即可用西南军区司令员名义下命令。你们意见如何，盼告。（二）关于支援十八兵团等部向陕南及川西北进军的许多后勤工作及干部分配等事，应成为此次兰州会议的一项议事日程，决议事项盼电告。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十一月七日"},{"type":"paragraph","text":"1949年11月7日，为庆祝苏联十月革命三十二周年，苏联驻华大使罗申举行鸡尾酒大会。图为毛泽东在大会上举杯庆贺。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":503,"page_end":504},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c58c1be3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
