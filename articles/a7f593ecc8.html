script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"工作队初到生产队怎样着手进行工作？","authors":[],"dates":[{"year":1963,"month":7,"day":26}],"is_range_date":false,"parts":[{"text":"工作队初到生产队怎样着手进行工作？","type":"title"},{"text":"新华社南京讯  在吴县唯亭公社进行社会主义教育试点的江苏省委工作队阳东大队工作组，在入队以后，采取了以下四种方法进行工作，较快地摸清了各个生产队的基本情况，和贫下中农初步建立了感情。","type":"paragraph"},{"text":"一、串门踏田，熟悉情况。这个大队远田多，生产队分散。他们为了摸清情况，分工在各个生产队的干部，做到四熟悉，熟悉田头，熟悉人头，熟悉户头，熟悉思想。用阶级分析的方法，了解各个人的思想面貌和政治态度，这样对发动群众，贯彻阶级路线就有了可靠的基础。","type":"paragraph"},{"text":"二、访贫问苦，扎正根子。用“一排、二找、二查、二看”的方法，扎正根子。“一排”是排生产队各户的基本情况。“二找”是找土改、合作化时期的贫下中农积极分子，再找贫下中农里受苦最深的人。然后进行“二查二看”，就是查出身历史，查经济变化和思想变化，看历次政治运动中的表现，看阶级立场。同时查对土改册子，听取群众的反映。这样就逐步摸清了贫下中农的情况，根子也就扎得比较可靠。","type":"paragraph"},{"text":"三、参加劳动，建立感情。工作组入队以后，根据力所能及的原则，和社员一起参加了劳动，有的耕耘，有的筑田岸，有的帮助群众推磨。他们通过劳动，和群众建立了感情，生产队干部也逐步向工作组靠拢，这就便于进一步了解情况。","type":"paragraph"},{"text":"四、边发动群众，边调查研究。他们的具体做法是：一方面对贫下中农积极分子进行个别教育，或召开小型座谈会，通过回忆对比，提高觉悟，揭发问题，这样既了解了情况，又培养了积极分子。另一方面，抓住当前生产、分配等迫切问题，支持贫下中农的正确意见，合理地予以解决，使他们得到初步的经济利益。如第四生产队，夏季分配的口粮，经过合理安排，每人平均口粮比安排前提高了很多，歪风邪气也受到了一定的打击，这样就初步调动了贫下中农的积极性。","type":"paragraph"},{"text":"来源：1963年7月26日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7f593ecc8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
