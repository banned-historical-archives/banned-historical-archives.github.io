script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"173b340b-3108-4ae1-be57-d3fa78bb471a","name":"毛泽东思想万岁（1943-1949卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年5月，钢二司武汉大学总部、中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"为纠正“左”的错误给中央局的信","alias":"","parts":[{"type":"paragraph","text":"不过一部分，短期内也难恢复战斗力。····"},{"type":"paragraph","text":"为刻正“左”的错误给中央局的信"},{"type":"paragraph","text":"（一九四八年一月二十日）"},{"type":"paragraph","text":"（.上略）我完全同意习××的这些意见。华北华中各地老解放区如有同样情形者，必须密切注意改正。凡犯有“左”的错的地方，领导机关干万不要拖延很久才去刹正，只要处理得法，几个星期就可以翔正过来的。但刹正时，必须注意，不要使下面因刹正“左”的而认为不要动了。"},{"type":"paragraph","text":"豁中原局的指示信"},{"type":"paragraph","text":"（一九四八年二月十七日）"},{"type":"paragraph","text":"（上略）你们主张在新解放区先建立贫农团，以提高贫倔农的觉悟性与组织性，树立倔农的威信，在与国民党和地主的斗筝中，吸收中农参加；贫农团建立了几个月之后，再建立联合全体农民的农民协会。这一点我完全同意，在中央对新解放区土改要点指示中已规定了。贫农团和农民协会的组织，均须严防地主富农及其他投机分子混入。农民协会的会员及其委员会的委员中，必须有三分之二是倔农，以确实掌握贫倔农的导权。这一点也是完全必要的。"},{"type":"paragraph","text":"新解放区的斗争策略阶段，必须分为先斗地主，后斗富农的二大阶段。在前一阶段中叉必须分几步，先从斗大地主恶霸反动分子开始，根据农民群众的觉语程度，逐步把打击面推广，总的打击面，一般不要超过人口的百分之十，如果成分是富农地主（甚至个别的中农）的反动保甲长恶霸分子，为群众所痛恨，群众要求先斗他们时，我们应当允许农民这样做。特别是因为有许多乡村没有大地主，只有中、小地主与富农，更应充许农民这样做。我们允许打击富农和中小地主的反动保甲长恶霸分子，和我们在第一阶段的策略（缩小打击面，对于富农中小地主的多数暂时不去惊动他们）不矛盾。"},{"type":"paragraph","text":"复××的信"},{"type":"paragraph","text":"（一九四八年二月十七日）看到你的报告以后，对你所提出的间题，提出如下意见："},{"type":"paragraph","text":"在老区凡是已实行平分土地，地主富农经济基础已经消灭，只是还不十分彻底，须酌量调剂土地的地方，即不应再去平分土地，而是应采取合理的抽补办法来满足部分农民土地不足的要求，此种地区如再去平分土地，那是错的。在这种地区，只在农民内部组织贫农小组来保障贫倔农的利盆，在农民委员会中，在农民代麦会及政府中，能使贫倔农与新中农共占三分之二，保障他们在农村中的导权，同时又使老中农能占三分之一的地位。这样做法是很好的。在农占少数，新老中农占多数的地区，也去粗农团，硬要贫农"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":1,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":95,"page_end":95},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"febd7402bc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
