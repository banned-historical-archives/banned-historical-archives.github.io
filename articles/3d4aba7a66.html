ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"致国民参政会的贺电","alias":"","parts":[{"type":"paragraph","text":"致国民参政会的贺电"},{"type":"paragraph","text":"（1938年7月5日）武汉国民参政会汪议长精卫先生、张副议长伯苓先生暨全体参政员先生勋鉴："},{"type":"paragraph","text":"当此抗战周年，全国上下精诚团结，再接再厉，誓驱强寇，而敌人进攻有加无已之时，国民参政会集会于武汉，开宪政之先河，启民意于初步，凡在国人，庆喜同深。泽东备员一席，猥以琐务羁身，未能亲聆诸公之崇论宏议。然管见所及，凡有利于抗战建国诸大端，已托其他同志并案详陈，效其绵薄。寇深祸极，神州有陆沉之忧，然民意发舒，大难有转旋之望。转旋之术多端，窃谓以三言为最切：一日坚持抗战，二日坚持统一战线，三日坚持持久战。诚能循是猛进，勿勿懈，则胜利属我乃决然无疑。值兹本会开幕之日，肃电驰贺，并向诸兄致民族革命之礼。"},{"type":"paragraph","text":"毛泽东微"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":7,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":392,"page_end":392},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d4aba7a66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
