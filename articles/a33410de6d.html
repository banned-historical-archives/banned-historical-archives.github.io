art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"保障职工参加企业管理 行使当家作主权利全国三万六千多个工交企业事业单位建立健全职工代表大会制","authors":[],"parts":[{"type":"paragraph","text":"据新华社2月24日讯 我国工交企业和一些事业单位恢复和建立了党委领导下的职工代表大会制，以保障职工群众参加企业管理，行使当家作主的权利。"},{"type":"paragraph","text":"从1956年开始，我国工交企业逐步实行了党委领导下的职工代表大会制，使党委对企业的集中领导国民主管理结合了起来。但是，在十年动乱期间，这一制度遭到了严重破坏。粉碎“四人帮”以后，特别是1978年十月邓小平同志代表党中央、国务院在工会“九大”的致词中，明确提出要在所有企业实行党委领导下的职工代表大会制之后，各地党委就把建立、健全职工代表大会制，作为发扬社会主义民主、改善企业领导制度的一项重要措施来抓。目前，全国建立职工代表大会的企业、事业单位有8万6千2百多个，其中工交企业单位3万3千多个，财贸、文教，卫生等单位2千4百多个。全国还有3万3千2百多个基层单位民主选举了班组长、工段长；1万1千1百多个单位选举了车间主任；部分企业在党委和上级主管部门的领导下，选举了厂长、经理等行政领导干部。"},{"type":"paragraph","text":"这些企业、事业单位的职工代表大会代表，都是由职工群众直接选举产生的。代表中工人占多数，作有技术人员和一部分管理人员、各级领导干部。他们共同讨论和决定企业的重大问题。职工群众高兴地说：“万人担子万人挑，众人拾柴火焰高”。"},{"type":"paragraph","text":"有关部门认为，目前我国的职工代表大会制还很不完善。从搞得比较好的单位来看，职工代表大会已经初步行使了这样一些权力：一是有了对企业重大问题的审议、决定权。二是有了对自己部分劳动成果的支配权。企业的奖励基金、福利费等资金的分配使用权，掌握在职工代表大会的手里。三是有了监督权。一些企业的职工代表大会不仅有权审议和决定全厂的重大问题，而且有监督行政领导执行大会决议的权力。四是有了选举权和部分人事安排权。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a33410de6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
