month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"五洲风雷化为赞歌，唱不尽对毛主席的无限热爱；"},{"type":"paragraph","text":"四海红霞用作油彩，绘不完对毛主席的无限忠诚；"},{"type":"paragraph","text":"万里长空，容纳不尽对毛主席的无限信仰；"},{"type":"paragraph","text":"地动山摇，动摇不了对毛主席的无限崇拜。"},{"type":"paragraph","text":"这是七亿中国人民对伟大领袖毛主席的赞歌，这是七亿中国人民对战无不胜的毛泽东思想的颂诗。"},{"type":"paragraph","text":"中国在前进，革命在前进。世界是向前发展的。反映世界革命规律的理论也在不断发展。这个理论就是伟大的马克思主义、列宁主义、毛泽东思想。"},{"type":"paragraph","text":"无产阶级文化大革命，把毛泽东思想同广大人民群众相结合起来了。毛泽东思想在七亿人口中的空前大普及、大传播，这是人类历史上空前宏伟的大事，这是马克思主义发展史上空前宏伟的大事。"},{"type":"paragraph","text":"七亿中国人民直接掌握毛泽东思想，多么振奋人心呵!在伟大祖国九百六十万平方公里的土地上，各种类型的毛泽东思想学习班遍地开花；从白发苍苍的老人到乳牙未脱的娃娃，都如饥似渴地学习着毛主席著作。于是，人类历史上种种惊人的奇迹，都在中国的大地上出现了。"},{"type":"paragraph","text":"我们要庄严宣告:毛泽东思想是我们时代的旗帜。"},{"type":"paragraph","text":"只要高举毛泽东思想这个时代的旗帜，被压迫民族和被压迫人民就有了前途和希望，就能经过自己的艰苦斗争，得到解放。"},{"type":"paragraph","text":"只要高举毛泽东思想这个时代的旗帜，在无产阶级专政的国家里，就能经过不断革命，扫除一切剥削阶级的残渣余孽，巩固红色政权，防止资本主义复辟。"},{"type":"paragraph","text":"只要高举毛泽东思想这个时代的旗帜，国家的政权即使暂时被修正主义篡夺了，广大革命人民也会行动起来，推翻修正主义的统治，把失去的政权再夺回来，重新建立无产阶级专政。"},{"type":"paragraph","text":"只要高举毛泽东思想这个时代的旗帜，我们就一定能把这场无产阶级文化大革命进行到底!"},{"type":"paragraph","text":"在新的一年即将来临的时候，我们要更加如饥似渴地活学活用毛泽东思想。要更自觉、更有意识地用毛泽东思想的武器批判资产阶级和一切剥削阶级思想。旧思想不会自行破除，新思想不能自发诞生。这就要灌输。灌输就是斗争，斗争是万物之母。要前进就要斗争，每一步的前进就要经过一场斗争。我们一定要永远高举毛泽东思想的伟大红旗，不断取得新的胜利!"},{"type":"paragraph","text":"我们的目的一定要达到。"},{"type":"paragraph","text":"我们的目的一定能够达到。"},{"type":"paragraph","text":"让我们把千言万语汇成一句最美好的祝愿，敬祝您，我们最敬爱的伟大领袖毛主席万寿无疆!万寿无疆!!万寿无疆!!!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee9dba68df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
