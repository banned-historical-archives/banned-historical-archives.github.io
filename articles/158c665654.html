ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"致徐向前、周士第等电","alias":"","parts":[{"type":"paragraph","text":"致徐向前、周士第等电！"},{"type":"paragraph","text":"（1948年7月23日）马辰电?悉，计划甚好。全军应即进入休整及补充兵员。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致徐向前、周士第并告华北局电的主要内容。"},{"type":"paragraph","text":"[2]马辰电，指徐向前、周士第7月21日辰时致中共中央军委电，内称：今后将进入攻取太原外围据点的阵地攻坚战。阎军外围据点工事，长宽各20公里左右，据点棋布，堡垒林立，且多洋灰作成，一般颇为坚固。现我各纵最大问题为兵员不充实，必须完成补充兵员、整顿组织、调整装备、后方准备、弹药准备及攻坚战术技术训练等工作。攻取太原之作战原则是切实完成对太原的包围围困，控制南北机场及若干外围工矿，断绝其外援及粮弹、燃料补给，逐步攻取必要的外围据点，消灭其有生力量，瓦解动摇敌人，开辟攻城道路，完成攻城准备，然后一举攻取之。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":7,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":379,"page_end":379},"tags":[{"name":"毛泽东","type":"人物"},{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"158c665654"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
