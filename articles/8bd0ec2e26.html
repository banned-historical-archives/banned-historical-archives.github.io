tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"陈永贵副总理离开金边回国行前举行告别宴会，波尔布特等同志出席","authors":[],"parts":[{"type":"paragraph","text":"据新华社一九七六年十二月十五日讯 金边消息：中共中央政治局委员、国务院副总理陈永贵，圆满结束了在民主柬埔寨的友好访问，于十二月十五日乘专机离开金边回国。"},{"type":"paragraph","text":"柬共中央书记、民主柬埔寨政府总理波尔布特到国宾馆为陈永贵副总理送行，并进行了十分亲切友好谈话。波尔布特书记请陈永贵副总理转达他对华国锋主席以及叶剑英、邓小平、李先念和汪东兴副主席的亲切问候。陈永贵副总理祝波尔布特书记身体健康、长寿，请波尔布特书记转达对柬共中央其他领导同志的亲切问候。"},{"type":"paragraph","text":"柬共中央常委、政府副总理英萨利陪同陈永贵副总理从宾馆到波成东机场。前往机场送行的还有：柬共中央常委、政府副总理温威，交通委员会主席梅布兰、工业委员会主席郑奥恩、卫生部长秀臣、社会事务部长英蒂丽、文化教育部长云亚等。"},{"type":"paragraph","text":"据新华社一九七七年十二月十五日讯 金边消息：中共中央政治局委员、国务院副总理陈永贵，十二月十四日晚上在中国驻民主柬埔寨大使馆举行告别宴会。"},{"type":"paragraph","text":"柬共中央书记、民主柬埔寨政府总理波尔布特出席了宴会。出席宴会的还有，柬共中央副书记、柬埔寨人民代表大会常务委员会委员长农谢，柬共中央常委、政府副总理英萨利、温威、宋成等。"},{"type":"paragraph","text":"当波尔布特等柬埔寨党政领导同志由陈永贵等同志陪同走进宴会厅时，全体起立，热烈鼓掌。在充满中柬革命友谊和战斗团结的宴会上，陈永贵副总理和温威副总理先后讲了话。"},{"type":"paragraph","text":"陈永贵副总理说：“访问期间，我们受到了柬埔寨党和政府领导人，各级领导同志，以及柬埔寨人民和军队隆重热烈的欢迎和亲切友好的接待，特别是波尔布特书记，以及英萨利副总理、温威副总理在百忙中，亲自陪同我们访问，向我们介绍了许多情况，给了我们很大的荣誉。这十多天的参观访问，内容丰富，非常有益。”这“充分体现了兄弟的柬埔寨人民对中国人民的深情厚谊，体现了中柬两党、两国人民之间亲密的友好关系。”"},{"type":"paragraph","text":"温威副总理说，陈永贵副总理在柬埔寨的友好访问，“使我们两国人民能够表达相互尊重、友好的感情，也是我们两国人民之间绚丽的兄弟革命友谊和牢固的伟大战斗团结的光辉见证。”“它更进一步巩固和发展了我们两党、两国人民和两国之间的伟大战斗团结和伟大的友谊。”"}],"alias":""},"tags":[{"name":"陈永贵","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bd0ec2e26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
