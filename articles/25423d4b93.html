["中国人民大学","王殿彪"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"农业投资太少，工业投资过大","type":"title"},{"text":"中国人民大学王殿彪","type":"authors"},{"text":"（王殿彪：中国人民大学农业经济系学生）","type":"subtitle"},{"text":"他把必要的积累工业化资金的方法之一——适当的工农业产品差价，污蔑为“剥削”农民。他说：“工业产品价较高，农产品价较低，交换时农民吃亏”并说：“工人创造价值多，只不过是因为产品价格高造成的”，否认工人有比农民更高的生产率。","type":"paragraph"},{"text":"他对工业化政策的另一攻击就是：农业投资太少，工业投资过大。他说“农业投资太少了”“共产党不听农民的话”；“工业化解决不了农民生活苦，中上工人生活太好了。”","type":"paragraph"},{"text":"（摘自“农业经济系学生王殿彪的反社会主义言行”，载《社会主义思想教育参考资料选辑》第四辑第252页）","type":"paragraph"}],"comments":[],"origin":"中国人民大学经济系政治经济学教研室编《中国资產阶级右派经济言论批判参考资料》，1958年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25423d4b93"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
