":[{"year":1948,"month":5,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"家里有人当伪军用长工算不算剥削？"},{"type":"paragraph","text":"编辑同志："},{"type":"paragraph","text":"一、这里正在划阶级中，遇到过去（三十一年三十三年）敌人占过地方当过伪军的人很不少。可是在那时他本人走了，家庭觅长工一个或半个，这算不算剥削？另外，自愿去、被迫去有什么分别？"},{"type":"paragraph","text":"二、报上登出取消路条，儿童妇女站岗是否还站？儿童主要是查路条，妇女是招待过路军，现战争转到外线，过路军人少，是否还可以招待？"},{"type":"paragraph","text":"（左权三区王建华）建华同志："},{"type":"paragraph","text":"除革命职员革命军人家庭因没有或缺少劳动力而出租或雇工耕种土地者外，其余任何人出租或雇工耕种土地都算剥削。当伪军而觅长工的，算是剥削。不过，在划成份时，自愿去与被迫去是应该分别的，自愿去的，算是有劳力而不参加劳动；被迫去的，算是因不可抗的原因而丧失劳动力。但要注意，不管是被迫的或自愿的；其土地财产占有状况不超过一般中农的，都不应认为地主或富农，而应按其具体情况认为其他成份。"},{"type":"paragraph","text":"儿童妇女站岗，在腹心区，在平常情况下，是不必要的。过路军人口渴了喝些开水之类和对于伤病员，无论何时，只要有招待的必要，还是应该招待的。"},{"type":"paragraph","text":"——编者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7510ababf1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
