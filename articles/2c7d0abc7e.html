script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罢工浪潮席卷英国各地  伦敦、牛津和伯明翰等地工人相继斗争抗议垄断资本剥削和压迫","authors":[],"dates":[{"year":1970,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罢工浪潮席卷英国各地"},{"type":"paragraph","text":"伦敦、牛津和伯明翰等地工人相继斗争抗议垄断资本剥削和压迫"},{"type":"paragraph","text":"据新华社伦敦十二日电　英国各行各业的工人最近不断举行罢工、停工和游行示威，抗议垄断资本的残酷剥削和压迫，要求增加工资。"},{"type":"paragraph","text":"在汽车制造业中，英国雷兰德汽车公司、沃克斯霍尔汽车有限公司以及其他汽车制造厂的许多重要部门的几十万工人举行了罢工，沉重地打击了汽车制造业的垄断资本。其中雷兰德汽车公司设在牛津的工厂的一千多名仓库工人从四日开始举行了七天罢工，使许多工厂所需要的主要备件的供应完全停顿。"},{"type":"paragraph","text":"雷兰德公司设在伯明翰的汽车车身工厂的六百五十名工人也在同一天举行罢工，抗议垄断资本家企图强迫工人接受一项提高劳动强度的所谓“生产率协定”。这次罢工使英国雷兰德汽车公司轻型货车的生产处于停顿状态。"},{"type":"paragraph","text":"在苏格兰，三千多名公共汽车工人在二月份的头十天中举行了三次二十四小时罢工，愤怒抗议生活费用飞涨，要求增加工资，这些罢工使格拉斯哥和苏格兰其他地区的公共交通完全处于瘫痪状态。"},{"type":"paragraph","text":"曼彻斯特的一千五百名码头工人二月初也举行了二十四小时罢工，抗议地方当局侵犯码头工人的正当权利。在赫尔的三千多名码头工人最近停止工作，抗议货船当局对待码头工人的蛮横态度，使这个港口瘫痪了三天。伦敦皇家码头的三百名码头工人上个星期举行了好几天的罢工，要求增加工资，抗议资方的残酷剥削。这次罢工使六艘船开不出去。"},{"type":"paragraph","text":"在利兹，约翰·科利公司的三个厂的约两千名男女缝衣工人举行了三天的罢工，抗议反动工会和资本家炮制的歧视女工的“工资合同”。"},{"type":"paragraph","text":"惠特菲尔德地区的一千名建筑工人举行了联合罢工，抗议克鲁登建筑公司侵犯工人的利益。罢工工人列队到这个城市的广场举行示威。（附图片）"},{"type":"paragraph","text":"二月初，英国数千名农民从全国各地来到伦敦农业部前举行示威，抗议英国政府对农产品的收购价格过低，损害农民的利益。传真照片（新华社发）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c7d0abc7e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
