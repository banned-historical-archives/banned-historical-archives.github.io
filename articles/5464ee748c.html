["天镇中学教师","山西"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"给党、政府、广大青年学生看","type":"title"},{"text":"山西天镇中学教师","type":"authors"},{"text":"(山西省张庄：天镇中学教师)","type":"subtitle"},{"text":"给党、政府、广大青年学生看：","type":"appellation"},{"text":"你们的政策好、制度优越，一切都正常，正确——农民生活苦、待遇低，每日六分二厘五的伙食，你们反说好、正常，一个工人一月的工资能抵的上一个农民一年的生活费，每日的伙食费7—8角，穿的光、吃的饱，家属得到特殊的无理照顾，你们反说工人的生活苦，应该享受享受，我说你真是会说话的畜牲。农民吃麸子（5.55分/斤）、吃酒糟（3—4分/斤），本是喂猪喂牲口的东西，你们反说农民生活好，什么应该……。这叫什么道理？什么社会主义优越之类，整天用大课来麻痹我们，压迫和迫害我们——思想不进步，操行一、二、三分，我问你们什么叫思想进步？难道会溜沟、谄媚、拍马屁的人就是进步吗？你们细想一想。","type":"paragraph"},{"text":" 天镇中学  ×××","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（三）》（中共山西省委整风办公室编印，1957年10月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5464ee748c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
