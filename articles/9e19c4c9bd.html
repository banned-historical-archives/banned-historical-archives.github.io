ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央转发贸易部党组关于大张旗鼓地反贪污的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发贸易部党组关于大张旗鼓地"},{"type":"paragraph","text":"反贪污的报告的批语"},{"type":"paragraph","text":"（1951年12月5日）中央和军委各部门，中央人民政府各党组；各中央局并请即转中央分局，各省市区党委、地委和县委；各大军区并请即转军事系统直到团级为止；志愿军党委："},{"type":"paragraph","text":"（一）中央批准中央贸易部党组一九五一年十二月四日关于发动群众（包括民主党派及社会民主人士）大张旗鼓地公开地反对贪污现象和惩治贪污人员的报告，认为这一报告是完全正确的。（二）请你们遵照中央十二月四日二十时的指示”，参照北京市委和中央贸易部党组的分析和办法，迅速订出自己的反贪污计划，并开始着手发动这一斗争。各地党委应统一布置这一斗争，使政府系统（重点在财经部门及总务人员）、军事系统（重点在后勤部门）、党派团体系统都同时动作起来。（三）本指示及中央贸易部党组的报告应给科长以上的党员阅读，并在党内刊物上发表。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九五一年十二月五日[1]即中共中央关于批转北京市委展开反贪污斗争的报告的指示。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":112,"page_end":112},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发贸易部党组关于大张旗鼓地反贪污的报告的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":5}],"is_range_date":false,"parts":[{"text":"中央转发贸易部党组关于大张旗鼓地反贪污的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"中央和军委各部门，中央人民政府各党组；各中央局并请即转中央分局、各省市区党委、地委和县委；各大军区并请即转军事系统直到团级为止；志愿军党委：","type":"appellation"},{"text":"（一）中央批准中央贸易部党组一九五一年十二月四日关于发动群众（包括民主党派及社会民主人士）大张旗鼓地公开地反对贪污现象和惩治贪污人员的报告，认为这一报告是完全正确的。（二）请你们遵照中央十二月四日二十时的指示，参照北京市委和中央贸易部党组的分析和办法，迅速订出自己的反贪污计划，并开始着手发动这一斗争。各地党委应统一布置这一斗争，使政府系统（重点在财经部门及总务人员）、军事系统（重点在后勤部门）、党派团体系统都同时动作起来。（三）本指示及中央贸易部党组的报告应给科长以上的党员阅读，并在党内刊物上发表。","type":"paragraph"},{"text":" 中   央一九五一年十二月五日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e19c4c9bd"},"buildId":"3k8CSiaVLD8fQhU1LkfE
