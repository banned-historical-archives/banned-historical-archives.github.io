示威学生高呼“毛泽东万岁！”并在大街上张贴毛主席语录","authors":[],"dates":[{"year":1968,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对腐朽反动的教育制度　反对当局残暴镇压学生运动"},{"type":"paragraph","text":"意大利大学生斗争浪潮席卷全国"},{"type":"paragraph","text":"示威学生高呼“毛泽东万岁！”并在大街上张贴毛主席语录"},{"type":"paragraph","text":"据新华社四日讯　罗马消息：意大利大学生反对意大利现行的腐朽反动的教育制度和反对政府当局残暴镇压学生运动的斗争浪潮最近席卷全国。数千名罗马学生，连日来举行示威游行，并同镇压他们的法西斯警察进行英勇搏斗，罗马市区一再陷于瘫痪，统治当局惶惶不安。"},{"type":"paragraph","text":"意大利广大学生对于意大利现行的腐朽反动的教育制度一再起来反对。他们纷纷反对校长专制，要求改革教学内容，增加教育经费和改善贫苦学生的生活。但意大利当局一直置之不理，并且残酷镇压学生斗争，这就使得意大利全国各地的大学生最近掀起了斗争的新高潮。"},{"type":"paragraph","text":"被罗马大学生的斗争吓得惊慌失措的意大利当局，二月二十九日出动了一千五百多名警察冲入罗马大学，残酷地殴打学生。这种法西斯暴行激起罗马学生的愤慨。当天晚上，一千五百名学生举行了抗议示威。接着，在三月一日，四千多名罗马学生高举着“警察滚出大学！”“校长必须辞职！”以及谴责意大利政府的标语牌举行了示威游行。头戴钢盔，挥舞警棍的大批警察袭击了示威群众。学生们挖起铺地的石头，拔起路旁的铁栏杆作为武器，英勇地对警察进行了反击。他们打退了警察的进攻，缴获了一批警察的枪支，焚烧和捣毁了十多辆警车。"},{"type":"paragraph","text":"意大利当局连忙增派了约二千名警察，用警车对群众冲击，并使用了强力水龙和催泪弹对学生进行了野蛮的镇压，打伤了三百多名学生。二百二十八个学生被无理逮捕。在这期间，罗马市交通断绝，商店关门，市区陷于瘫痪状态。"},{"type":"paragraph","text":"二日和三日，几千名罗马学生不顾警察的威胁，继续集会游行，抗议意大利当局的法西斯暴行。他们表示不仅要坚持斗争下去，而且要推动和加强全国性的学生斗争。"},{"type":"paragraph","text":"罗马学生这几天的斗争推动了意大利其它各城市的学生运动，米兰、都灵、的里雅斯特、帕多瓦等城市的大学生都已纷纷行动起来，同反动当局进行斗争。"},{"type":"paragraph","text":"意大利学生的正义斗争获得了广泛的支持。"},{"type":"paragraph","text":"意大利的许多进步学生，在游行示威以及同警察搏斗时高呼“毛泽东万岁！”“革命，革命！”他们不怕全副武装的警察的威胁，在大街上张贴毛主席语录。"},{"type":"paragraph","text":"意大利进步学生对全世界革命人民的伟大领袖毛主席无限崇敬。上星期，中国影片《毛泽东思想的伟大胜利》在罗马大学放映时，每当毛主席的伟大形象在银幕上出现，他们就热情地高呼：“毛泽东，毛泽东！”并且爆发出雷鸣般的掌声。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e20948715d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
