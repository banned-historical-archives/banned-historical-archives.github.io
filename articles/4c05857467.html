:[{"year":1993,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京电视台筹备《人民领袖毛泽东》"},{"type":"paragraph","text":"为纪念毛泽东诞辰１００周年，北京电视台正加紧筹备大型电视文艺晚会《人民领袖毛泽东》。这台晚会从毛泽东同志生活中许多动人的故事中，精选了若干适于晚会表现的内容，以新颖的构思和角度，编织了一台以巧取胜、以情动人的节目。晚会的大背景是北京，以今天北京的建设为契机，追溯毛泽东同志对北京的关怀。"},{"type":"paragraph","text":"晚会对毛泽东形象的出现，作了“千呼万唤始出来”的精心设计，从声音、剪影直至形象出现，都有周详的安排。王仁、车豫正将在晚会上饰演毛泽东形象，田华将主持晚会。晚会计有小品《毛主席故事两则》、《训女》等１８个节目。这台节目将于１２月２６日晚与观众见面。（雅文）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c05857467"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
