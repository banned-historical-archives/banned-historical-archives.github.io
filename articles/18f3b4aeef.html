ar":1976,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:刮右倾翻案风的人，为了反对无产阶级教育革命，为十七年修正主义教育路线翻案，别有用心地攻击现在的工农兵大学生怕艰苦，不愿去边疆，想的是:“上大学，留城里，找个好对象，和过去的学生没有什么区别，都是修正主义的。”但是，他们的攻击是枉费心机的。事实胜于雄辩。请看一看华山医院医科大学工人学员贺达尔的战斗风貌吧!他保持着劳动人民的本色，甘当普通劳动者，勇于同旧的传统观念决裂，敢于向资产阶级法权观念挑战，并坚决要求到西藏去，到最艰苦的地方去干一辈子革命。他的行动，对那些颠倒是非，混淆黑白的无耻谰言是最有力的回击!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18f3b4aeef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
