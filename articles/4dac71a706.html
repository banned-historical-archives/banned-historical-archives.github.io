ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于减少军队专职体育运动员问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于减少军队专职体育运动员"},{"type":"paragraph","text":"问题的批语!!"},{"type":"paragraph","text":"（1953年3月21日）肖向荣同志："},{"type":"paragraph","text":"各项均同意。惟运动员3000人至是（是否）可以减少的问题，请由肖克、肖华二同志会同政府有关此事主管人员，商量一次，加以研究，作出统筹计划，送周总理、彭副主席和我核阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月廿一日"},{"type":"paragraph","text":"[1]这个批语写在人民革命军事委员会办公厅主任肖向荣1953年3月13日关于军委第十六次例会给毛泽东的报告上。报告谈到了军以下各部队以参谋长为第一代理人的问题，军训部的干部配备问题，军事体育问题，以及军队中的抚恤工作改由后勤部门主管的问题。关于军事体育问题，报告说，肖克提出军事体育属军事训练部门，其内容应与军事训练相结合。但目前情况，主管军事体育的军训部本身无此种力量，而在政治部系统内又有3000名专职球员。会议决定由总政治部和军训部研究，对此问题提出解决方案。并请主席考虑部队专职体育运动员是否要3000人，因地方亦有3000专职球类队员，合起来是一个很大的数目。"},{"type":"paragraph","text":"[2]肖克，当时任人民革命军事委员会军训部部长。肖华，当时任人民革命军事委员会总政治部副主任。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":86,"page_end":86},"tags":[{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4dac71a706"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
