" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"关于立即准备进行核试验的批语","alias":"","parts":[{"type":"paragraph","text":"关于立即准备进行核试验的批语！"},{"type":"paragraph","text":"（1964年9月21日）已阅，拟即办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿一日"},{"type":"paragraph","text":"[1]这个批语写在周恩来1964年9月21日为尽快批示国务院副总理、中国人民解放军总参谋长罗瑞卿关于将在10月进行正式核试验的报告给毛泽东的信上。周恩来说，中央15人专门委员会于本月16、17日开了两次会，讨论关于核爆炸及其有关问题，急需待主席回来后当面报告，以便中央早作决定，时间以不迟于9月24日为好。因为如决定今年爆炸，以10月中旬到11月上旬为最好，而事前准备时间至少需要20天。1964年10月16日，中国成功地进行了第一次核试验。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":9,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":162,"page_end":162},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"055a26a091"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
