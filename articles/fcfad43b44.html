党中央委员会总书记冯维希发表谈话","authors":[],"dates":[{"year":1968,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席支持美国黑人抗暴斗争的声明"},{"type":"paragraph","text":"极大鼓舞了世界革命人民的反美斗争"},{"type":"paragraph","text":"老挝爱国战线党中央委员会总书记冯维希发表谈话"},{"type":"paragraph","text":"新华社康开二十三日电　老挝爱国战线党中央委员会总书记富米·冯维希最近对新华社记者发表谈话说：目前，全世界革命人民在反美斗争日益取得辉煌胜利、并迅速走向最后胜利的时候，毛泽东主席代表七亿中国人民发表的支持美国黑人抗暴斗争的声明，极大地鼓舞了美国黑人反对美帝国主义的斗争、也极大地鼓舞了世界各国革命人民的反美斗争。"},{"type":"paragraph","text":"冯维希说，毛主席的声明是更有力、更迅速地推动世界革命人民反美斗争走向胜利的巨大力量。他指出，在美帝国主义的心脏爆发的黑人抗暴斗争，将加速美国反动势力的灭亡。"},{"type":"paragraph","text":"他强调说，美国黑人的抗暴斗争给正在进行反对美帝国主义侵略的老挝人民、越南人民和其他国家的人民带来了极为有利的条件。他坚信，美国黑人的斗争和老挝人民的抗美救国斗争必将取得最后胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcfad43b44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
