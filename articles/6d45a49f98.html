tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一不怕苦，二不怕死，永远忠于毛泽东思想","authors":["五好战士李春田"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“要奋斗就会有牺牲，死人的事是经常发生的。但是我们想到人民的利益，想到大多数人民的痛苦，我们为人民而死，就是死得其所。”可是，中国赫鲁晓夫却与毛主席大唱反调，胡说什么每一个共产党员都要“钟爱自己，保护自己的生命与健康”。在革命发展的每一个紧要关头，中国赫鲁晓夫总是念念不忘“活命”二字，甚至策动大批“共产党员”在狱中变节自首，出卖党，出卖革命，出卖人民。他的这一套“活命哲学”，是为他的修正主义建党路线服务的。我们决不上中国赫鲁晓夫的这个圈套。“生为捍卫毛主席的革命路线战斗，死为捍卫毛主席的革命路线献身。”这就是我们每一个共产党员、革命战士立下的钢铁誓言。"},{"type":"paragraph","text":"今年六月份，我们连在某地执行护桥任务。我们的共同决心是：人在桥在！保护大桥，就是保卫无产阶级文化大革命，就是捍卫毛主席的革命路线。有一天晚上，一小撮阶级敌人，妄图破坏大桥，中断铁路运输。这时候，毛主席的谆谆教导在我的耳边响起：“我们的责任，是向人民负责。”“为人民利益而死，就比泰山还重”。我想，这座大桥是沟通南北交通的枢纽，大桥能不能保住，是直接关系到我国无产阶级文化大革命和社会主义建设的大事。又想，不久前，我向党支部写了入党申请书，现在正是党考验自己的时候了。想到这里，我冒着生命危险，和同志们一起，粉碎了阶级敌人企图破坏大桥的阴谋诡计，保住了大桥。"},{"type":"paragraph","text":"通过这件事，我深深体会到，头脑里有战无不胜的毛泽东思想，心里就会时时装着人民，在革命需要的时候，就会挺身而出，赴汤蹈火，在所不辞。如果照中国赫鲁晓夫说的那套黑话去做，脑子里时时装着“活命”二字，就会丧失共产党员应有的品质，就会给党带来严重的损失。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d45a49f98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
