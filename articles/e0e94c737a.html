art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我国货轮首航美国","authors":[],"parts":[{"type":"paragraph","text":"新华社上海三月二十六日电 我国远洋货轮“柳林海”号三月二十五日从上海港启航，驶往美国。这是中华人民共和国成立以来，中国远洋货轮第一次赴美。"},{"type":"paragraph","text":"中美海运已经中断了三十年。中美两国关系正常化和邓小平副总理访问美国后，中美两国间的友好合作日益发展，中国远洋运输公司和美国莱克斯兄弟轮船公司很快签订了双方互派船只通航的协议。三月十八日，美国莱克斯兄弟轮船公司的“利·莱克斯”号货轮首次从美国到达上海。中美两国通航，揭开了中美海运史上的崭新一页。"},{"type":"paragraph","text":"“柳林海”号是载重三万八千吨级的散装货轮。船员们对这次首航美国的任务十分重视，在启航前作了认真细致的准备工作。"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0e94c737a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
