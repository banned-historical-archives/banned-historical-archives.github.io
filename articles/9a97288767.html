script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"有了毛主席的革命路线才有我们的今天","authors":["中共拉萨市地毯厂支部"],"dates":[{"year":1971,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"有了毛主席的革命路线才有我们的今天"},{"type":"paragraph","text":"中共拉萨市地毯厂支部"},{"type":"paragraph","text":"党的“九大”以来，全国形势一片大好。我们拉萨市地毯厂也发生了日新月异的变化。广大藏族工人意气风发，斗志昂扬，阶级觉悟和两条路线斗争觉悟空前提高。工人们从亲身经历中深刻体会到：有了毛主席，有了毛主席的无产阶级革命路线，才有新中国，才有我们的今天！"},{"type":"paragraph","text":"拉萨市地毯厂是原西藏地方政府专为三大领主纺织地毯和卡垫而筹建的。旧厂设备简陋，手工作业，许多藏族贫苦农奴和奴隶被迫到这里支差服役，受苦受难。民主改革以后，他们翻身做了主人，条件不断改善，工厂的规模也逐步扩大。在无产阶级文化大革命中，广大藏族工人活学活用“老三篇”，树立了为人民服务的思想，他们改织地毯为藏被，生产了各种藏被及毛衣等，供应西藏翻身农牧民需要，受到了热烈欢迎。"},{"type":"paragraph","text":"我们地毯厂党支部和革委会领导班子的八个成员，除了一名解放军代表和一个革命干部，全都是翻身农奴出身，工厂里的工人，大多数也是苦大仇深的翻身农奴，都有一部血泪斑斑的家史。民主改革前，这个厂的工人或工人的直系亲属被三大领主杀害、打死、逼死的就有三十五人，被打成残废的、坐过牢的、饿死的更多，还有许多人被迫讨饭。这些旧社会当牛做马的奴隶，今天成了国家的主人，他们都有一颗忠于伟大领袖毛主席的红心。"},{"type":"paragraph","text":"我们党支部遵照伟大领袖毛主席关于在全党进行一次思想和政治路线方面的教育的伟大教导，经常组织工人学习毛主席关于阶级斗争和路线斗争的有关教导，大讲党内两条路线斗争史，开展忆苦思甜、忆苦思权活动。全厂还召开了控诉旧社会三大领主压迫剥削工人罪行的现场会，办了阶级教育展览室。许多工人把三大领主压迫剥削他们的罪证拿来展览，有的老工人当场讲解展品的来历，有的工人解开胸怀，露出伤疤，愤怒地控诉三大领主的罪行。通过这些生动的阶级教育，大大提高了全厂工人的阶级斗争和路线斗争觉悟，推动了抓革命、促生产的高潮。"},{"type":"paragraph","text":"（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a97288767"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
