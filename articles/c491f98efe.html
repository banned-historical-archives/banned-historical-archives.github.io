art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"从王洪文的一条黑批示谈起","authors":["轩文〖HH/换行〗DW：新乡军分区"],"parts":[{"type":"paragraph","text":"一九七三年，政治流氓王洪文在某军事机关的一份关于编辑民兵斗争故事的请示报告上，挥笔批道：“民兵故事只写历史，不写现在，我想不通。”乍一看，王洪文对民兵斗争故事的编辑工作要求似乎很“全面”。其实不然。"},{"type":"paragraph","text":"就拿我区济源县留庄“英雄民兵营”的事迹来说吧：在炮火纷飞的战争年代，留庄民兵在毛主席的人民战争思想指引下，驾起葫芦舟，摆开石雷阵，转战太行山区，驰骋黄河两岸，配合我军驱日寇，打蒋匪。仅解放战争时期，就作战二百余次，消灭敌军近两千人。留庄民兵的葫芦队，曾被当时的太岳军区命名为“河防堡垒”。这些年来，我们在有关部门的协助下，把留庄民兵的光荣历史编写成《河防堡垒》、《黄河飞渡》等故事，并根据故事编绘出版了版画、连环画发行国内外，宣传了毛主席的人民战争思想，鼓舞了革命人民的斗志。编写这样的反映民兵光荣斗争历史的故事有什么不好？王洪文斥之为“只写历史”，充分暴露了他反对毛主席人民战争思想，反对我党武装斗争的光荣传统，抹杀我国民兵历史作用的反革命嘴脸。"},{"type":"paragraph","text":"王洪文极力反对“写历史”，叫嚷要“写现在”，他是真的主张写广大民兵在三大革命运动中的斗争事迹吗？否！谁都知道，我们建国以来的民兵工作，是被王洪文污蔑为一团漆黑、一无是处的。王洪文所谓的“写现在”，就时间范围来说，就是从他们叫嚣建立那个“文攻武卫”组织开始写起；就内容来说，就是大吹他们经营“第二武装”的所谓“新鲜经验”。不难看出：王洪文的“写现在”，正是要写他自己，写“四人帮”，把他们装扮成人民武装力量的“救世主”，捞取政治资本，大搞反军乱军、篡党夺权的阴谋活动。真是无耻之尤！"}],"alias":""},"tags":[{"name":"王洪文","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c491f98efe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
