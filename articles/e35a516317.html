hubusercontent.com/banned-historical-archives/banned-historical-archives2/main/9c4858a3-157d-4a61-8fe4-c7f8ea278502.pdf"],"article":{"title":"人民日报编辑部、红旗杂志编辑部声明","alias":"","parts":[{"type":"paragraph","text":"4ll li 0sl 5il e2:1 mLa m: :9si t:1.n.0htt ail-Ln:t It-aa LLC aal1t 28Eh1PLiius atPIn5A1 mt121THln n ti:laaF i11sl41L0sHalit8 a aet i tae i10 H3H Lun nHl"},{"type":"paragraph","text":"人民日报编辑部"},{"type":"paragraph","text":"声明"},{"type":"paragraph","text":"红旗杂志编韩部"},{"type":"paragraph","text":"今年七月十四日，苏联共产党中央委员会发表了一封给苏联各毅党租织和全体共产党责的公开信。"},{"type":"paragraph","text":"中国共产党中央委员会发言人在七月十九甘的声明中指出，*苏共中央这封公开信是对中共中央六月十四日信件的舒价。中共中央认为，这封信的内容是不符合事实的，它的观点是我们不能同意的。中共中央将在适当的时候予以澄清和许论。"},{"type":"paragraph","text":"人民日报和中国其他圣国性报以及所有省、市极报纸，已经在七月二十甘全文刊载了苏共中央的公开信。中国的广播电台也全文广播了这封公开信。"},{"type":"paragraph","text":"直从苏共中央的公开信发表以后，苏联全国性报刊上艾发表了近三百篇玫击中国的文章和材料。人民日报已经将其中一部分摘要发表。"},{"type":"paragraph","text":"从今天升始，人民日报辐辑部和缸旗杂志翰部将陆岭发表文草，舒输苏共中央的公开信，"},{"type":"paragraph","text":"一九六三年九月六日*1**14r1+tT1111004p111 4 ht4h W44h1 11 8p 111r"},{"type":"paragraph","text":"缸旗杂志·4：·（总662）"}],"authors":["《人民日报》编辑部","《红旗》杂志编辑部"],"dates":[{"year":1963,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":7,"page_end":7},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e35a516317"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
