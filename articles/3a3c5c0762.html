结","authors":[],"dates":[{"year":1953,"month":4,"day":2}],"is_range_date":false,"parts":[{"text":"财政部：三年来农业税查田定产工作总结","type":"title"},{"text":"1949年全国解放初期，新区各省人民政府成立未久，对广大农村情况不摸底，国民党原有册籍残缺不全，而数字又极不真实，“有田无赋”“有赋无田”的旧田赋制度无法沿用，且客观情势发展很快，来不及制定农业税统一的税法，各地征收农业税以上级分配的任务为根据，采取评议摊派或按阶级成分征收的办法，加以一般乡村政权未经改造，基层干部强调完成任务，忽视政策，因而引起严重的混乱现象，老区各地则各自一套，不相一致。","type":"paragraph"}],"comments":[],"origin":"中国社会科学院、中央档案馆编：《中华人民共和国经济档案资料选编（财政卷）1949-1952》，北京：经济管理出版社，1995年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a3c5c0762"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
