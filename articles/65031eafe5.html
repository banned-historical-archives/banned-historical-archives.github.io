ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"印发两份农村见闻材料的批语","alias":"","parts":[{"type":"paragraph","text":"印发两份农村见闻材料的批语"},{"type":"paragraph","text":"（1961年3月18日）"},{"type":"paragraph","text":"印发各同志\"。这两个材料都可看。河北省的工作大有起色。但交河县太大了，九十多万人，应分为两个县。公社也太大，只有二十三个，四万多人一社，太大了。交河整风还未贯彻，12条群众还不知道，应当加紧整社。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十八日[1]指当时正在广州参加中共中央工作会议的同志。"},{"type":"paragraph","text":"[2]指中共中央办公厅1961年3月11日编印的《情况简报》第八十期上刊登的《杨放之同志谈农村见闻》和《河北省和北京郊区农村的新气象》两份材料。这两份材料反映了春节期间农村群众生活安排得好、群众生产情绪高的情况和目前农村工作中还存在的一些具体问题。"},{"type":"paragraph","text":"[3]指中共中央1960年11月3日《关于农村人民公社当前政策问题的紧急指示信》，共十二条。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":3,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":217},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65031eafe5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
