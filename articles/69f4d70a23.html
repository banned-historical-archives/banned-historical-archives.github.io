rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认真学习毛主席关于理论问题重要指示决心做保卫无产阶级专政的坚强战士","authors":[],"parts":[{"type":"paragraph","text":"本报讯 在西沙群岛自卫反击作战中荣立集体二等功的南海舰队某部三九六舰党支部，组织干部战士认真学习毛主席关于理论问题的重要指示，学习马克思主义关于无产阶级专政的理论，决心为保卫祖国海防，巩固无产阶级专政进行不懈的斗争。"},{"type":"paragraph","text":"《人民日报》社论传达了伟大领袖毛主席关于理论问题的重要指示，三九六舰党支部立即组织干部战士认真学习和讨论，并进行社会调查，请驻地生产大队干部介绍农村阶级斗争和路线斗争的现状，畅谈学好无产阶级专政理论的重要意义。大家说，毛主席的重要指示是指引我们坚持反修防修，把无产阶级专政下的继续革命进行到底的指路明灯。我们一定要响应毛主席的号召，努力学好无产阶级专政的理论。"},{"type":"paragraph","text":"为了深刻理解无产阶级为什么要对资产阶级专政的问题，党支部还发动干部战士把学习无产阶级专政理论同批林批孔结合起来，深入批判了林彪恶毒攻击无产阶级专政的罪行和孔老二鼓吹的“德”、“仁义”、“忠恕”等反动谬论。三等功荣立者、电航兵赵玉先在批判时说，叛徒、卖国贼林彪极力散布孔孟之道，诋毁无产阶级专政，就是要把被推翻的地主资产阶级重新扶植起来，把社会主义的中国变为社会帝国主义的殖民地。因此，无产阶级对资产阶级的专政只能加强，不能削弱。战士们在学习讨论时还说，为了彻底粉碎资产阶级的反抗，防止资本主义复辟，我们还必须清除旧社会遗留的痕迹，战胜资本主义的自发势力和旧的习惯势力，铲除滋生修正主义的土壤，造成使资产阶级既不能存在，也不能再产生的条件。只有这样，才能保证我们国家永远沿着马克思主义、列宁主义、毛泽东思想指引的道路胜利前进。"},{"type":"paragraph","text":"马克思指出：“无产阶级专政的首要条件就是无产阶级的军队。”三九六舰指战员在学习无产阶级专政理论时，反复学习马克思这一光辉论述，从巩固无产阶级专政的高度认识无产阶级军队的每一个干部、战士必须认真改造世界观。二等功荣立者、舰长伍恭喜说，无产阶级军队的每一个干部、战士能不能坚持无产阶级专政下继续革命，抵制资产阶级思想作风的腐蚀，保持人民子弟兵的本色，这是关系到无产阶级专政柱石的大问题。我们一定要通过学习无产阶级专政的理论，自觉地斗私批修，不断提高自己的共产主义觉悟。大家一致表示，要用无产阶级专政的理论武装自己的头脑，同旧的传统观念实行彻底决裂，在保卫祖国海防和巩固无产阶级专政的斗争中，把自己锻炼成坚强的无产阶级战士。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69f4d70a23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
