script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卡特在他和他的夫人所举行的答谢招待会上说  美中友谊已发展得非常广泛  赵紫阳、方毅、黄华等应邀出席","authors":[],"dates":[{"year":1981,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卡特在他和他的夫人所举行的答谢招待会上说"},{"type":"paragraph","text":"美中友谊已发展得非常广泛"},{"type":"paragraph","text":"赵紫阳、方毅、黄华等应邀出席"},{"type":"paragraph","text":"新华社北京8月27日电 美国前总统吉米·卡特今天晚上在这里说，美中两国的合作既是为了各自的利益也是为了地区的稳定，现在美中两国的友谊已经发展得非常广泛。"},{"type":"paragraph","text":"卡特在他和他的夫人所举行的答谢招待会上指出，美中关系可以在下述基础上得到发展："},{"type":"paragraph","text":"一、双方必须一丝不苟地遵守正常化协议。"},{"type":"paragraph","text":"二、双方必须把双方的关系看作对世界力量平衡具有战略的重要性。任何一方都不应把我们的关系看成是战术性的，是为了对第三方取得暂时的优势。"},{"type":"paragraph","text":"三、在我们的关系中每前进一步本身都应该是站得住脚的，是建立在互利的基础上的。"},{"type":"paragraph","text":"四、我们的关系必须是广泛的，除了军事和政治方面，应在经济、科学和文化领域里不断得到发展。在目前阶段，我们的关系有些象骑自行车，如果我们前进的速度不够快，我们的关系就会变得不稳。"},{"type":"paragraph","text":"五、我们必须始终本着现实主义、平等和互相尊重的精神相处。"},{"type":"paragraph","text":"他说，但是，只是阐明原则是不够的。我们现在的责任是实现我们关系的全部承诺。"},{"type":"paragraph","text":"国务院总理赵紫阳在招待会上祝酒时说：“邓小平副主席和你见到的中国其他领导人，都为能在北京同你会面而感到十分高兴。至于我本人，尽管我是第一次有幸同你们见面，但你们对中国人民的友好情谊给我留下了深刻的印象。”"},{"type":"paragraph","text":"他说：“明天，卡特先生和夫人及其他朋友将要到我国其它一些城市和农村参观访问。我相信，你会亲身体验到中国人民对美国人民的友谊和对你本人的敬意。你对我国的访问，定将进一步加深中、美两国之间的相互了解和友谊。”"},{"type":"paragraph","text":"我国国务院副总理方毅，副总理兼外交部长黄华和夫人何理良，以及政府部门、群众团体等方面的负责人和访美人士，应邀出席了招待会。"},{"type":"paragraph","text":"美国驻中国大使馆临时代办傅立民，卡特先生的随行人员，参加了招待会。"},{"type":"paragraph","text":"今天下午，卡特先生访问了中国科学院计算技术研究所。（附图片）"},{"type":"paragraph","text":"胡耀邦会见美国前总统卡特。\t         新华社记者摄"},{"type":"paragraph","text":"邓小平会见加拿大外交部长马克·麦圭根。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"邓小平会见美国前总统卡特和夫人。\t新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab1ef3e480"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
