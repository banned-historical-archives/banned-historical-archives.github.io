ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对袁血卒来信的批语","alias":"","parts":[{"type":"paragraph","text":"对袁血卒来信的批语！"},{"type":"paragraph","text":"（1975年12月18日）送天津市党委酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十八日"},{"type":"paragraph","text":"[1]袁血卒1975年12月13日给毛泽东写信说，我1927年入党，1931年初受中央军委委派到二十六路军搞兵运，组织了宁都暴动，成立红五军团。从中央苏区突围后，在上海曾两次被捕。1937年到延安，经4年审查，恢复了党籍。1958年转业到天津化工学院工作。文化大革命中又经过反复调查，再次证明我在两次被捕中没有暴露党员和红军指挥员身份，是执行了而不是违背了党的隐蔽政策。1974年恢复党的组织生活，但至今没有工作。我在军队工作几十年，热爱军队，请求批准我回部队工作。毛泽东的批语，写在中共中央办公厅1975年12月17日印的这封来信摘要上。1978年，袁血卒被任命为民政部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":12,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":126,"page_end":126},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7dca197999"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
