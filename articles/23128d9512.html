script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"8de94f14-f516-4a62-8114-b58ba82333af","name":"毛主席、林彪、陈伯达同志关于反对右倾机会主义的论述","internal":false,"type":"img","official":false,"author":"毛泽东 林彪 陈伯达","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/8de94f14-f516-4a62-8114-b58ba82333af/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/8de94f14-f516-4a62-8114-b58ba82333af/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/8de94f14-f516-4a62-8114-b58ba82333af/3.jpg"],"article":{"title":"毛主席、林彪、陈伯达同志关于反对右倾机会主义的论述","alias":"","parts":[{"type":"paragraph","text":"毛主席林彪陈伯达同志关于反对右倾机会主义的迹毛泽东同志的远："},{"type":"paragraph","text":"党内的右倾机会主义分子同社会上的资本主义势力互相呼应者·有些人虽然顶着共产主义者的称号、却对于现在要做的社会主义事业很少兴趣·他们不支持热情的群众，反而向群众头上激冷水。"},{"type":"paragraph","text":"摘自\u003c机会主义的邪气跨下去·社会主义的正气升起来\u003e一"},{"type":"paragraph","text":"文按语"},{"type":"paragraph","text":"这是大海之想，一切妖魔鬼怪都被冲走了，社会上各种人物的咀，都被区分得清清楚楚，党内也是这样·这一年让出，社会主义的胜利就有很大把握了．当然还有许多战斗在后头，还要努力作战。"},{"type":"paragraph","text":"摘自\u003c机会主义的邪气下去，社会主义的正气升起来》一"},{"type":"paragraph","text":"文按语"},{"type":"paragraph","text":"但是现在的问题，还是右倾保守思想在许多方面作怪，使许多方面的工作不能适应客观情况的发展，现在的问题是经过努力本来可以做到的事情，都有很多人为做不到，因此，不断地批判那些确实存在的右倾保守思想就有完全的必要了。"},{"type":"paragraph","text":"摘自\u003c中国农村社会主义高潮"},{"type":"paragraph","text":"修正主义者或者右倾机会主义者是一种资产阶级思潮，它比教条主义有更大的危性·修正主义者，右倾机会主义者，口头上也排着马克思主义，他们也在那里攻击“教条主义”。但是他们所攻击的正是马克思主义的最根本的东西。"},{"type":"paragraph","text":"摘自\u003c关于正确处理人民内部矛盾的问题\u003e林彪同志的输通："},{"type":"paragraph","text":"害怕群众运动，是右倾机会主义分子，资产阶极革命家的本性，他在运动的前面专门挑易运动的缺点，夸大缺点，目的是散饰松勤、气、埋怨·悲观情，否定成精，否定党的总路钱·我们一定要发动群众，把社会主义进行到底，把社会主义建设工作做的烈烈。·首先看到的是亿万人民的冲天干动和伟大成，这是群众运动的主流和矛盾·"},{"type":"paragraph","text":"摘自\u003c高举总路钱和毛泽东军事思想红旗满步前进\u003e"},{"type":"paragraph","text":"党性不是抽象的东西，···坚强的党性，应当代表在任何时候和任何情况下，都要坚决稚护党的团结，全心全意地为党的领和路奋斗，这就要时时刻划关心和注意政治形势、政策、路线等方向性间题，站稳立场，分清是非，避免在大是大非问题面前摇不定，迷失方向。个人和党的位置，一定要摆对·要艳对服从党，不要有个人野心·要大公无私，老老实实，不要以伪善手段，活名钓誉、要谦虚，不要傲，要勇于接受批教育，向一切错倾向作斗手，不要拒批舒，坚持错·总之个人主义，是万恶之流，只要它一露头就要坚决批判，努力克服，不要放过一一毫。"},{"type":"paragraph","text":"摘自\u003c高举总路线和毛泽东军事思想红旗调步前进\u003e"},{"type":"paragraph","text":"我们党现在正进行反对右倾机会主义的斗争，就思想意识来，这场斗争是无产阶世界观和资产阶杀世界现的斗争。"},{"type":"paragraph","text":"只要本主义制度在世界上还没有完全灭亡，只要阶杀还有消灭，只要资产阶极思想影响还存在，就还会有阶斗争，资产阶不但要采取各种办法反对社会主义革命，而且要采取各种办法破坏社会主义建设·"},{"type":"paragraph","text":"陈伯达同志的迹："},{"type":"paragraph","text":"资产阶反抗社会主义的斗争不能不影响我们党内的不坚定分子，党内有此坚持资产阶极世界观、顽固地保存资产阶级意诚的人，在阶级斗争表现尖锐的某种时机就往往要从无产阶极政党内部来进行反党的路活动。这次右倾机会主义分子的活动不是别的，正是反映了资产阶极对社会主义的反对。"},{"type":"paragraph","text":"摘自《无产阶极世界观对资产阶极世界观的斗争》"},{"type":"paragraph","text":"现在的一些右倾机会主义者，他们和党从来就存在有原则分岐，在民主革命时期，这种分岐主要表现在革命方法上，但是到了社会主义革命时期，问题已热不是革命方法上的分岐，而是爱不要革命的分岐，在社会主义革命基本完成以后，是要不要把社会主义革命进行到底的分岐·毛泽东同志和党中央坚定的领导社会主义革命进行到，而相反，右倾机会主义分子却在实际上要使资本主义复辟，要为资本主义复辟开辟道路"},{"type":"paragraph","text":"同上"},{"type":"paragraph","text":"这大我们全党正在进行的区对右倾机会主义的斗争是一次意义重大的斗争，它关系到我们国家的命运，关系到我国社会主义的命运因此必须真进行，要把社会主义革命进行到底，首先必须把这火反对右倾机会主义的斗争进行到底·"},{"type":"paragraph","text":"一九大六年十月抄于北师大"},{"type":"paragraph","text":"毛主席语录"},{"type":"paragraph","text":"革命不是请客吃饭·不是做文章，不是稽画锈花，不能那样雅致，那样从容不迫，文彬彬，那样温良恭让。革命是暴动，是一个阶极推翻一个阶极的暴烈的行动。"}],"authors":["林彪","毛泽东","陈伯达"],"dates":[{"year":1966,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":3},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23128d9512"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
