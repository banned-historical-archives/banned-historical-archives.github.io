script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"满怀崇敬和热爱毛主席的激情日本音乐家为《毛主席语录》谱曲","authors":[],"dates":[{"year":1966,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社讯　东京消息:日本作曲家、音乐指挥、松山芭蕾舞团访华代表团副团长宗像和，最近满怀崇敬和热爱毛主席的激情为《毛主席语录》谱曲。"},{"type":"paragraph","text":"宗像和为《毛主席语录》谱了两支曲子，一首是“我们的同志在困难的时候，要看到成绩，要看到光明，要提高我们的勇气。”一首是“人民，只有人民，才是创造世界历史的动力。”这是这位音乐家十月上旬访问延安前后创作的。"},{"type":"paragraph","text":"中国国庆节前夕，当宗像和在北京时，中国朋友赠给他一册日文版的《毛主席语录》。他同松山芭蕾舞团全体团员一样，每天学习它，随时把它带在身上。他越学习，对于毛主席的话体会越深。在离开北京去延安的途中，他满怀激情地为《毛主席语录》谱曲。在创作时，他征求同车的中国红卫兵小将的意见，反复修改，在到达延安前完成了第一支歌曲。延安的中国音乐舞蹈工作者在同松山芭蕾舞团联欢时，表演了这支歌曲。"},{"type":"paragraph","text":"离开延安后不久，宗像在旅途中，又为《毛主席语录》谱了第二支曲子。"},{"type":"paragraph","text":"这两支歌曲创作出来之后，马上成为松山芭蕾舞团团员们最爱唱的歌曲。"},{"type":"paragraph","text":"松山芭蕾舞团团长清水正夫说:毛主席教导我们，在困难的时候要看到光明，要有信心。现在日本正处在美日反动派的统治下，最近又有一小撮现代修正主义的追随者兴风作浪，斗争任务很艰巨。但是我们要相信日本人民大众，永远同他们在一起，满怀信心地去争取胜利。清水称赞宗像的创作说:这两支歌曲，既体现出毛主席的教导、表达了对毛主席的热爱，又反映了日本人民的斗争激情。"},{"type":"paragraph","text":"二十八日晚，松山芭蕾舞团回到东京时，他们在机场上，拿着红光闪闪的《毛主席语录》，向欢迎他们的日本各界人士和中国朋友演唱这两支为《毛主席语录》谱出的新歌曲，欢迎者报以热烈的掌声。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"907cb64318"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
