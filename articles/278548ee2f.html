":[],"dates":[{"year":1981,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为隆重纪念辛亥革命七十周年"},{"type":"paragraph","text":"叶剑英为武昌首义纪念碑和起义门题字"},{"type":"paragraph","text":"新华社武汉7月31日电  中共中央副主席、全国人大常委会委员长叶剑英，最近为辛亥革命武昌首义纪念碑和起义门题了字。"},{"type":"paragraph","text":"叶剑英同志的亲笔题字，苍劲有力，将分别镌刻在辛亥革命武昌首义纪念碑的青灰色碑身上和起义门城门的花岗岩匾额上。"},{"type":"paragraph","text":"辛亥革命武昌首义纪念碑，是为隆重纪念辛亥革命七十周年，由湖北省和武汉市人民政府专门拨款兴建的。碑址选择在武昌起义革命军曾经战斗过的蛇山首义公园。目前正在加紧施工。"},{"type":"paragraph","text":"起义门原叫“中和门”，是武昌十道城门之一。武昌起义时，革命军首先占领中和门，迎进了起义的炮兵部队。由于屡遭北洋军阀摧残，加之年久失修，起义门仅存残破的城墙和城门拱洞。今年4月下旬，起义门开始修葺。现在，一道筑有箭垛的深灰色古城墙已重新矗立起来，墙上并已竖立城楼的骨架。城楼的高度，它的歇山重檐屋顶以至吻兽、角饰等细部装饰，将力求保持原貌。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"278548ee2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
