"authors":[],"dates":[{"year":1955,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市中小学教师学习社会主义教育思想、批判资产阶级唯心主义教育思想运动逐步展开。各校教职员已普遍听了刘季平副市长关于学习社会主义教育思想，批判资产阶级唯心主义教育思想的报告的传达，阅读了杨献珍的“怎样学习马克思主义的哲学?”和孙定国的“为什么要宣传辩证唯物主义，反对资产阶级唯心主义?”两篇文章，并联系报告和文件，展开了漫谈和讨论。在漫谈讨论中，初步体验到开展这次运动，将大大帮助教师提高思想和改进学校教育工作。"},{"type":"paragraph","text":"为推动这次思想运动的进一步开展，在上海市学术文化界胡适思想批判讨论会的领导下，中小学教师已成立中小学教育组，由市教育局、市教育工会负责同志和中、初等学校教育工作者共四十九人组成。昨天下午，中小学教育组举行了成立会，刘季平副市长并在会上作了重要的指示。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a79c0fbfa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
