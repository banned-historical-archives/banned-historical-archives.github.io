农场总数增加八倍，耕地总面积扩大三倍多","authors":[],"dates":[{"year":1964,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京18日电　我国的国营农场事业在毛泽东思想红旗和社会主义建设总路线的指引下，自一九五八年以来有了很大发展，与一九五七年相比，农场总数增加了八倍，耕地总面积扩大了三倍多。现在，分布在全国各地的几千个国营农场，已经成为农业战线上的一支重要力量。"},{"type":"paragraph","text":"国营农场向国家提供的农产品愈来愈多。一九六三年向国家提供的商品粮食和豆类比一九六二年增加了百分之八十八。此外，国营农场每年还向国家提供大量棉花、油料、果品、烟叶、茶叶、蚕丝、蔬菜、畜产品、蛋品、土特产品、热带亚热带经济作物产品。"},{"type":"paragraph","text":"各地国营农场生产几年来不断发展。一九六三年，农垦系统农场的各种农作物单位面积产量，与一九六二年相比，粮食增加了百分之三十五，大豆增加了百分之二十一，棉花增加了百分之六十二。今年国营农场的生产情况比去年更好。各地农场夏收粮食总产量比去年增加二成多，稻田作物生长也比去年好。"},{"type":"paragraph","text":"国营农场生产的机械化程度，近几年来有了很大提高。今年农垦系统的国营农场拥有的各种机械，与一九五七年相比，拖拉机(标准台)增加二点四倍，联合收割机增加二倍，载重汽车增加一点四倍，排灌机械增加了几十倍。"},{"type":"paragraph","text":"近几年来，很多地区国营农场都加强了农田基本建设。新疆生产建设兵团为改变当地戈壁沙漠的恶劣自然条件，经过几年兴修水利，营造防护林带，目前很多农场已经建成比较完整的灌溉系统，拥有有效灌溉面积七百多万亩；三十万亩防护林带已郁闭成林，形成纵横交错的林带网，有力地防止、削弱了风沙危害和次生盐渍化。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78cc12a92d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
