ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"致重庆中共代表团电","alias":"","parts":[{"type":"paragraph","text":"致重庆中共代表团电！"},{"type":"paragraph","text":"（1946年4月18日）"},{"type":"paragraph","text":"长春已得，已令彭、林、周、陈、高夺取哈、齐，并发动群众，整顿军队，为保卫长春而战。同时增强四平兵力，歼灭进攻之敌，坚决保卫整个北满。至西满、南满我军已打出经验，寸土必争，决不退让。如国、美要求我让出长春，请断然拒绝。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致重庆中共代表团电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":257,"page_end":257},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"866169e581"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
