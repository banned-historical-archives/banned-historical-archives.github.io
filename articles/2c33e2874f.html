script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沿着伟大领袖毛主席指引的光辉道路阔步前进  柳河五·七干校在斗争中不断发展","authors":[],"dates":[{"year":1974,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沿着伟大领袖毛主席指引的光辉道路阔步前进"},{"type":"paragraph","text":"柳河五·七干校在斗争中不断发展"},{"type":"paragraph","text":"六年来，先后轮训了六千多名干部。广大学员刻苦学习马列著作和毛主席著作，深入批判林彪反革命的修正主义路线和孔孟之道，自觉坚持锻炼，不断提高继续革命的觉悟"},{"type":"paragraph","text":"新华社哈尔滨一九七四年十月五日电 一九六八年十月五日，《人民日报》在发表黑龙江省柳河五·七干校为机关革命化提供了新的经验的报道时，传达了伟大领袖毛主席的重要指示：“广大干部下放劳动，这对干部是一种重新学习的极好机会，除老弱病残者外都应这样做。在职干部也应分批下放劳动。”六年来，柳河五·七干校在斗争中不断发展。在批林批孔运动普及、深入、持久开展的大好形势下，这个干校正沿着毛主席指引的光辉道路阔步前进。"},{"type":"paragraph","text":"六年来，黑龙江省柳河五·七干校遵照毛主席的指示，先后轮训了干部六千多名，其中县以上领导干部二千六百多名，为促进党政机关革命化和干部思想革命化作出了重要贡献。今年以来，柳河五·七干校领导成员在批林批孔斗争中，深入学习了毛主席的指示，进一步提高了阶级斗争、路线斗争的觉悟，认真总结了办校经验，在继续举办以县以上领导干部为主的轮训班的同时，还举办了培养工农兵理论骨干的短期学习班。全校一万多亩农田今年获得了建校以来的最大丰收。"},{"type":"paragraph","text":"这些成果是怎样取得的？柳河五·七干校的同志说：“对林彪修正主义路线和孔孟之道批得越透，对毛主席的指示就领会越深，五·七干校就办得越好。”批林批孔运动开展以来，柳河五·七干校的学员和干部以极大的无产阶级义愤，对林彪恶毒攻击五·七干校的反革命罪行进行了深入批判。他们把批判和学习结合起来，认真学习了毛主席关于无产阶级专政下继续革命的理论，学习了关于经济基础和上层建筑关系的理论，加深了对毛主席关于“广大干部下放劳动”的伟大指示的领会，大家说，林彪越是恶毒攻击五·七干校，我们越要以党的基本路线为纲，把五·七干校办好，不断提高机关革命化和干部思想革命化的水平。"},{"type":"paragraph","text":"柳河五·七干校的学员，在批林批孔斗争中进一步批判了林彪鼓吹的唯心论的先验论和反动的天才论，更自觉地发扬毛主席一贯倡导的理论和实践相结合的革命学风。他们紧密联系阶级斗争、路线斗争的实际和自己思想的实际，在下放劳动中，一面刻苦学习马列著作和毛主席著作，一面深入批判林彪反革命的修正主义路线和反动没落阶级的意识形态孔孟之道，并且走出干校和工农群众一起参加批林批孔斗争。学员们普遍反映，这样在三大革命运动中学习马克思主义，学得扎实，收获很大。有一位从事二十多年理论工作的学员，对照过去自己理论不联系实际的教训，感触很深。他说，过去学习理论，从本本到本本，从概念到概念，没有弄通弄懂。在干校学习马克思主义，注意学习和运用马克思主义的立场、观点、方法，解决现实阶级斗争和路线斗争中的问题。在三大革命运动中刻苦看书学习，是学习马克思主义的有效途径。"},{"type":"paragraph","text":"柳河五·七干校的学员还深入批判了林彪鼓吹的“在灵魂深处爆发革命”的反动谬论。他们坚持在三大革命运动第一线，发扬我们党的艰苦奋斗的革命传统和密切联系群众的优良作风，在改造客观世界的同时自觉地改造自己的主观世界。不论职位多高，资格多老，都把自己摆在普通劳动者的地位，保持劳动人民的本色。一位抗日战争时期参加革命的老同志，多年在省文化部门担任领导工作。经过无产阶级文化大革命的教育，他认识到过去在工作中犯了错误。但对于为什么犯错误，缺乏深切的认识。他来五·七干校后，深刻认识到过去犯错误的一个重要原因，就是长期脱离劳动，脱离群众，放松了世界观的改造。经过重新学习和劳动锻炼，他决心发扬党的光荣革命传统，精神面貌发生了很大变化。一位担任县委副书记职务不久的年轻女同志，通过劳动锻炼和向贫下中农学习，检查了自己当干部后滋长的一些错误思想，决心当一辈子人民的勤务员，一辈子接受贫下中农的教育，改造一辈子思想。"},{"type":"paragraph","text":"今年八月，柳河五·七干校举办了以工农兵为主体的马克思主义理论队伍短期学习班，充分利用五·七干校的经验，在三大革命运动第一线培养了来自全省各地的二百多名年轻的工农兵理论骨干。这些理论骨干绝大部分是批林批孔运动中涌现出来的积极分子，其中不少是先进生产者和劳动模范。干校同志总结这个学习班主要有四个特点：一是坚持从群众斗争中来，又回到群众斗争中去，和批林批孔斗争紧密结合，使理论学习为现实政治斗争服务；二是继承党的革命传统，发扬我们党艰苦奋斗和密切联系群众的优良作风；三是组织来自全省各地的工农兵学员交流理论学习和批林批孔的经验；四是工农兵业余理论骨干和专业理论干部相结合，互相学习，共同提高。经过一个半月的学习，这批学员已回到工厂、农村，在批林批孔斗争中发挥理论骨干的作用。目前，柳河五·七干校正在总结在三大革命运动第一线培训工农兵理论骨干的经验，使批林批孔运动中出现的这个新生事物得到发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c33e2874f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
