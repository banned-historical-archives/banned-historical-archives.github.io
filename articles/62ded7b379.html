ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"中央转发河南淮阳地区夏季征粮情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发河南淮阳地区夏季征粮情况报告的批语"},{"type":"paragraph","text":"（1950年9月9日）各中央局，分局，并转各省区党委市委及地委："},{"type":"paragraph","text":"兹将河南夏季征粮经验\"一件发给你们，值得引起极大注意。今年全国秋征工作，必须党政全力布置，加强领导，务必避免河南淮阳区那样的极端恶劣现象，切勿大意，是为至要。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"九月九日"},{"type":"paragraph","text":"[1]指中共中央中南局1950年9月1日向中央转报的河南淮阳地区夏季征粮和匪特活动情况的报告。其中讲到淮阳地区夏季征粮任务过重，干部强迫命令，按比例负担，按任务评量，畸轻畸重，贫雇农负担加重，尾欠户多为贫农，不少地方发现卖牲口、当青苗、卖树、借债等情况，多数地主耍赖不交夏征粮。已布置的解决办法是：对尾欠者可以减、免、缓交，卖东西者适当退还，秋粮多夏麦少者改征秋粮，地主耍赖者给以处分。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":9,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":142,"page_end":142},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62ded7b379"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
