拥护","authors":["李盈　贾特　潘非　王政仁　萧刚　路虹　周林文　冷林　刘云霞　华大　师大　辅大　回民学院通讯组"],"dates":[{"year":1949,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都各界广大人民"},{"type":"paragraph","text":"向毛主席庆贺"},{"type":"paragraph","text":"将以加紧生产、工作、学习的实际行动表示对毛主席的拥护"},{"type":"paragraph","text":"【本报讯】首都广大人民以高度的热情与关怀，密切注意着人民政协的选举消息，三十日晚，全市所有机关、商店的无线电前都挤满了人群，当中国共产党毛泽东主席当选为中华人民共和国中央人民政府主席的消息播出后，全市立即响起了暴风骤雨般的欢呼，一致表示万分拥护，毛主席万岁的口号声响彻云霄。七十兵工厂的工人们高兴的说：过去毛主席领导我们打败了日本，打垮了蒋介石，今后他会领导我们建设好新中国。电车修理厂职工胡泉桂说：“那可好啦！我们的领袖当选了政府主席，我们今后要更加努力生产来表示对毛主席的拥护和爱戴。”电话七局工人邢维清说：“我心里早就有这个底啦！只有毛主席领导，革命才能彻底胜利。”华北电业公司北京分公司、东水厂、华北建筑公司、电信三局、大华窑业公司、慈型铁工厂、三阳面粉厂、经纬织布厂、立安铁工厂、华兴织染厂、开源地毯厂、燕京织染等厂职工们一致怀着无限信心与极愉快的心情表示：毛主席当了主席是中国四万万七千五百万人民的幸福，我们今后一定更加努力生产，响应毛主席的一切号召，建设人民的首都！"},{"type":"paragraph","text":"毛主席当选的消息传到了北京各大、中学校以后，再度掀起了教员同学们的狂欢高潮。华北大学的全体师生为毛主席的当选而长久的浸沉在欢呼声中，一致认为：这完全符合全中国人民的愿望的，并表示今后将以更加紧学习的实际行动，来表示对毛主席的赤诚拥护。师范大学、辅仁大学的先听到消息的同学们，分头跑着把消息和选举结果传给每个角落里的同学，正赶制花灯的同学们都欢呼鼓掌，有的已经睡了的同学也起来了。同学们都充满着信心而自豪地说：有了毛主席什么困难都能解决。回民学院的师生们听到消息以后高呼毛主席万岁！他们回忆起过去回回民族受国民党“政府”的压迫的情形后说：由于共产党毛主席领导进行了中国人民解放战争，并取得了胜利，我们看到了新中国的诞生，我们回回族从此站起来了。宛耀宾同学说：“这是毛主席给我们的温暖，我们少数民族来到大家庭里了，我们回民青年以后坚决在毛主席领导下完成建设大西北建设新中国的任务。”京市农筹会委员苏民说：毛主席的军队，走到哪里，哪里的农民就得到解放。毛主席的土地政策解除了农民的痛苦，使老百姓真正翻了身。全国农民都一定会为毛主席的当选而欢庆啊！市三、十二区区委会、一区工会办事处干部们听到毛主席当选的消息后，坚信：今后全国在毛主席的领导下，革命的彻底胜利将会加速到来，新民主主义国家的建设更会很快发展起来的。"},{"type":"paragraph","text":"（李盈、贾特、潘非、王政仁、萧刚、路虹、周林文、冷林、刘云霞、华大、师大、辅大、回民学院通讯组）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"673355d88e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
