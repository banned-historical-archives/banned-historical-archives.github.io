某些付食品的建议","authors":[],"dates":[{"year":1960,"month":12,"day":12}],"is_range_date":false,"parts":[{"text":"甘肃民勤县孙润华同志关于停止收购代食品及某些付食品的建议","type":"title"},{"text":"（姚怀顺同志1960年12月12日19时半电话）","type":"subtitle"},{"text":"省委生活安排小组综合办公室：","type":"appellation"},{"text":"民勤的物资收购问题，需要给予及时的解决，不然，收购人员继续收购，收不到就强迫、违法乱纪又会产生，弄的很紧张，例如：有的群众把糖萝卜、黄蒿籽藏起来，实际还是收不到，即使能收起，也没有多少，反而影响人民生活需要，这对当前安排人民生活很不利。因此，我建议：在民勤，除棉花留足人民迫切需要的以外，其他凡能吃的东西或群众当前需要的东西，都应停止收购。这不单是民勤的问题，在灾情严重的县，都应该这样，是否妥当，请作参考。","type":"paragraph"},{"text":" 孙润华1930年12月12日19时半","type":"paragraph"},{"text":"（请王国瑞同志提出意见）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1b106b07d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
