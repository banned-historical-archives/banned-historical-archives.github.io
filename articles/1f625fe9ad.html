ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"给萧向荣“的信","alias":"","parts":[{"type":"paragraph","text":"给萧向荣\"的信"},{"type":"paragraph","text":"（1940年11月）向荣同志："},{"type":"paragraph","text":"战士课本写得很好。第一第二第四课看了，可即付印。第三课望送来看，须加修改，要将大资产阶级与民族资产阶级，亲日派大资产阶级与非亲日派（即英美派）大资产阶级，大地主与中小地主及开明绅士，加以区别。宣传部正在付印的一本书中，我已将《中国革命与中国共产党》第二章关于这一部分加了修改，请你向罗迈同志索取一阅。在第三课中，主要应说各阶级对抗日的态度，才有现实意义，亦请加以注意。"},{"type":"paragraph","text":"毛泽东第二十五课，等几天再给你看。"},{"type":"paragraph","text":"在去年十二月写《中国革命与中国共产党》第二章时，正在第一次反共高潮的头几个月，民族资产阶级与开明绅士的态度是否与大资产阶级大地主有区别，还不能明显地看出来，到今年三月就可"},{"type":"paragraph","text":"[1]萧向荣（1910—1976)，广东梅县人。当时任中央军委总政治部宣传部部长。以看出来了，请参看三月十一日我的那个《统一战线中的策略问题》。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":258,"page_end":259},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f625fe9ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
