"year":1963,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见几内亚外宾"},{"type":"paragraph","text":"新华社四日讯　毛泽东主席接见了几内亚政府经济代表团团长、几内亚共和国贸易部部长凯塔·恩法马拉，几内亚妇女代表团团长、几内亚共和国社会事务国务秘书、卫生部副部长、几内亚民主党政治局委员卡马拉·洛福夫人，以及几内亚政府经济代表团成员、几内亚经济发展部办公厅主任巴里·阿尔法·巴卡尔，几内亚妇女代表团成员：恩迪阿依·阿依萨杜夫人、贡代·阿西当夫人、玛加苏巴·雅·奈·福法纳夫人、巴里·阿米娜塔夫人。"},{"type":"paragraph","text":"毛泽东主席同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有，对外贸易部部长叶季壮、全国妇联书记处书记胡耐秋。"},{"type":"paragraph","text":"接见时，几内亚驻中国大使卡马拉·马马迪也在座。（附图片）"},{"type":"paragraph","text":"毛泽东主席接见了几内亚政府经济代表团团长、几内亚共和国贸易部部长凯塔·恩法马拉，几内亚妇女代表团团长、几内亚共和国社会事务国务秘书、卫生部副部长、几内亚民主党政治局委员卡马拉·洛福夫人，以及两个代表团的成员。图为毛泽东主席和凯塔·恩法马拉团长亲切握手。中是卡马拉·洛福夫人    新华社记者　陈娟美摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b920936d68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
