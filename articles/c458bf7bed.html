" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-33","name":"中央组织部关于高级干部子女出国审批工作的通知","author":"中共中央组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央组织部关于高级干部子女出国审批工作的通知","dates":[{"year":1988,"month":9,"day":12}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局 , 干审工作政策文件选编（上）, 649","tags":[{"name":"出国","type":"主题/事件"},{"name":"干部政策","type":"主题/事件"},{"name":"审批","type":"主题/事件"},{"name":"组织部","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"中央组织部关于高级干部子女出国审批工作的通知"},{"type":"subtitle","text":"1988年9月12日 · 中组发〔1988〕11号"},{"type":"paragraph","text":"经请示中央同意，对今后高级干部子女出国审批工作，通知如下："},{"type":"paragraph","text":"一、 高级干部子女不论因公、因私、长期、临时出国，均按一般出国人员的正常手续审批，不再报中央组织部或有关省、自治区、直辖市党委，总政治部审批。"},{"type":"paragraph","text":"二、高级干部和外事工作人员的子女公派或自费出国留学，同一般留学人员一样，按国务院和国家教委有关出国留学的规定办理。"},{"type":"paragraph","text":"三、高级干部子女出国，在履行正常审批手续后，审批单位须于15日内报送中央组织部或有关省、自治区、直辖市党委，总政治部备案。"},{"type":"paragraph","text":"四、本通知自一九八八年十月一日起执行。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c458bf7bed"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
