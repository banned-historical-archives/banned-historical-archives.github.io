tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东思想研究》创刊","authors":["田黄"],"parts":[{"type":"paragraph","text":"在毛泽东同志诞辰九十周年纪念日即将来临的时候，四川省社会科学院、四川省哲学社会科学联合会、四川省党史工作委员会共同举办，杨超同志主编的理论学术刊物——《毛泽东思想研究》（季刊），即将由四川省社会科学院出版社出版。它通过理论、历史和现状的结合，在哲学、政治经济学、科学社会主义、党史、党的建设、文艺、教育以及军事等各个方面，研究毛泽东思想，它重点探讨党的十一届三中全会以来，坚持和发展毛泽东思想、建设有中国特色的社会主义的新情况、新问题和新经验。刊物的主要阅读对象是从事毛泽东思想研究、教学和理论宣传工作者，也适合干部队政工和理论宣传干部阅读。创刊号将第一次公开发表毛泽东同志的两封信札：《致艾思奇》、《致范文澜》。       （田 黄）RW：毛泽东；诞辰九十周年"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d84bccc73c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
