","authors":[],"dates":[{"year":1966,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"让毛泽东思想的声音响遍全国全世界"},{"type":"paragraph","text":"上海中国唱片厂制作出版了大量宣传毛泽东思想的唱片"},{"type":"paragraph","text":"新华社上海二十八日电　毛主席的《为人民服务》、《纪念白求恩》、《愚公移山》三篇光辉著作，已由上海中国唱片厂制成朗读唱片。二十五日，中国唱片厂全体革命职工，为“老三篇”朗读唱片正式投入生产举行了隆重集会，热烈庆祝无产阶级文化大革命中的这一新成果。"},{"type":"paragraph","text":"过去，唱片生产为一小撮党内走资本主义道路的当权派把持，生产了大量宣扬腐朽的资产阶级和封建主义思想的坏唱片。在这场史无前例的无产阶级文化大革命中，中国唱片厂广大革命群众，活学活用毛主席著作，提高了阶级觉悟，擦亮了眼睛，斗倒了党内走资本主义道路的当权派，横扫一切牛鬼蛇神。通过斗争锻炼，全厂革命职工深刻地认识到，唱片不应该是文化娱乐品，而应该是政治宣传品，一定要用毛泽东思想去占领这个阵地。从十月份开始，他们制作出版了大量宣传毛泽东思想的唱片，其中有为毛主席语录谱曲的唱片，毛主席三次接见革命师生的实况录音片，以及林彪同志和周恩来同志在接见全国各地来京革命师生大会上的讲话录音片等。"},{"type":"paragraph","text":"上个月，当职工知道要为毛主席著作制作朗读唱片时，个个欢欣鼓舞，认为这是全国人民的一件大喜事，并认真地做好准备工作。他们下定决心，要用最快的速度，最好的质量，最低的成本，最高的产量，把它生产出来，以满足广大工农兵群众和革命师生的需要。当毛主席著作“老三篇”的朗读录音胶带，由北京带到厂里，各个部门的职工立即行动起来，夜以继日连续作战，只花了两天的时间，做完了过去需要一个多星期的工作，在二十五日中午生产出第一批密纹和粗纹两种朗读唱片。经过试听，音质很好。"},{"type":"paragraph","text":"在当天举行的庆祝大会上，各个部门的职工都纷纷表示：要努力活学活用毛主席著作，像32111钻井队的英雄们那样，把毛泽东思想印在脑子里，溶化在血液中，落实在行动上，把唱片厂办成宣传毛泽东思想的红色工厂，大量出版宣传毛泽东思想的唱片，让毛泽东思想的声音响遍全国，响遍全世界。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b3cc0ffea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
