script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海福泉山考古新发现  “良渚”古墓有陪葬奴隶  表明夏王朝前南方已出现奴隶制","authors":["李健","赵兰英"],"dates":[{"year":1988,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海福泉山考古新发现"},{"type":"paragraph","text":"“良渚”古墓有陪葬奴隶"},{"type":"paragraph","text":"表明夏王朝前南方已出现奴隶制"},{"type":"paragraph","text":"据新华社上海1月2日电　（记者赵兰英、李健）上海新发现三座“良渚”古墓有陪葬奴隶，有关专家推论，夏王朝以前我国南方地区已经出现奴隶制。"},{"type":"paragraph","text":"距今4500年前的“良渚文化”，先于被定论的我国第一个奴隶制社会夏王朝400年。"},{"type":"paragraph","text":"这三座古墓是上海考古队在西郊青浦县福泉山发掘的。"},{"type":"paragraph","text":"来到标为145号的墓穴，记者看到两具陪葬奴隶的尸骨：双手反剪、双腿曲弯、仰头侧身。这一现象，仿佛使人看到当年陪葬者挣扎、反抗、呼救的情景。他们被葬于一仰体直身，头朝南的墓主人脚后边。另外两座墓穴内的情形，也基本如此。"},{"type":"paragraph","text":"上海博物馆副馆长、考古专家黄宣佩介绍说：“只有身位不同的人，才会有死者入葬时在朝向和姿势上的不同。头朝南、仰身直肢者为墓主；头朝北、侧身曲肢者是陪葬奴隶。”"},{"type":"paragraph","text":"据考证，这三座墓同为一个家族。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6909b5161"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
