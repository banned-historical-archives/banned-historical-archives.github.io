"year":1958,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【昆明讯】云南省小凉山上宁浪彝族自治县用和平协商方式所进行的土地改革已在最近完成。"},{"type":"paragraph","text":"获得解放的2万6千多名彝族“娃子”(奴隶)变成了土地的主人。每一个人都分得了三至五亩耕地。人民政府还帮助他们每人一套农具(锄头、砍刀等)、毯子、衣服、蓝布长头巾。"},{"type":"paragraph","text":"得到解放的奴隶发挥了惊人的生产积极性。他们夜以继日地和其他的彝族人民一起兴修水利。过去小凉山上的彝族从不种水田，今年大种水稻，要求粮食亩产量由去年的120斤提高到450斤，每人收入粮食500斤以上，基本上达到自给。"}],"comments":[],"origin":"昆明","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"291d537198"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
