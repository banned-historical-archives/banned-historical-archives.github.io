script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中央负责同志欢宴阿尔巴尼亚同志共祝毛泽东同志霍查同志健康长寿周恩来同志和卡博同志在宴会上发表充满革命情谊的讲话　宾主一再举杯祝愿中阿两党、两国人民战斗友谊万古长青","authors":[],"dates":[{"year":1967,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京14日电　中央负责同志周恩来、康生、李富春、陈毅、李先念、谭震林、聂荣臻、叶剑英、谢富治、刘宁一、萧华、杨成武、江青等，今晚会见阿尔巴尼亚劳动党中央政治局委员、书记处书记希斯尼·卡博同志，中央委员贝哈尔·什图拉同志。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央政治局委员、部长会议副主席兼国防部长贝基尔·巴卢库同志，阿尔巴尼亚劳动党中央委员、阿尔巴尼亚人民军政治部主任希托·恰科同志，和由他们率领的阿尔巴尼亚军事代表团成员，以及阿尔巴尼亚驻中国大使瓦西里·纳塔奈利同志，也参加了会见。"},{"type":"paragraph","text":"中阿两国同志在热烈的兄弟般的友好气氛中，进行了极为亲切的谈话。"},{"type":"paragraph","text":"随后，周恩来等中央负责同志举行盛大宴会，热烈欢迎阿尔巴尼亚同志。"},{"type":"paragraph","text":"周恩来同志和卡博同志在宴会上先后发表了充满革命情谊的讲话。中阿两国同志一再举杯，祝愿中阿两党、两国和两国人民的战斗友谊万古长青，祝毛泽东同志和恩维尔·霍查同志，健康长寿!"},{"type":"paragraph","text":"周恩来同志在讲话中说，在毛泽东同志亲自领导的中国无产阶级文化大革命的高潮中，阿尔巴尼亚同志从欧洲反帝反修斗争前线来到我们中间，我代表我们伟大领袖毛主席和他的亲密战友林彪同志，代表党中央、国务院、中央军委、中央文化革命小组，向你们表示最热烈的欢迎。"},{"type":"paragraph","text":"周恩来同志对在恩维尔·霍查同志领导下的阿尔巴尼亚劳动党、阿尔巴尼亚人民和军队，表示崇高的敬意。他说，中阿两国人民在一起，就象一家人。中阿两国人民心心相连，正象毛泽东同志致阿尔巴尼亚劳动党第五次代表大会的贺电中说的那样，中阿两党、两国人民，一定团结在一起，战斗在一起，胜利在一起。"},{"type":"paragraph","text":"他说，卡博同志刚才在谈话中对毛泽东同志亲自发动和领导的中国无产阶级文化大革命，给了高度的评价，这对我们是一个很大的鼓舞。"},{"type":"paragraph","text":"我们一定要在我们伟大领袖毛主席和他的亲密战友林彪同志的领导下，更好地工作，把无产阶级文化大革命进行到底，用我们所取得的成就，来酬谢阿尔巴尼亚同志的崇高的称誉。"},{"type":"paragraph","text":"周恩来同志说，用毛泽东思想武装起来的革命群众，一定能够战胜以美国为首的帝国主义，一定能够战胜以苏共领导集团为中心的现代修正主义，一定能够战胜各国反动派。我们也一定能够战胜国内的资产阶级和它们的代理人。"},{"type":"paragraph","text":"卡博同志在讲话中，转达了恩维尔·霍查同志、阿尔巴尼亚劳动党和阿尔巴尼亚人民，对毛泽东同志、中国共产党和中国人民的问候和祝愿。他说，为了兄弟的中国人民和光荣的中国共产党的利益和幸福，为了全体进步人类的利益，全体阿尔巴尼亚人民、阿尔巴尼亚劳动党员，衷心地祝愿毛泽东同志健康长寿。"},{"type":"paragraph","text":"他说，阿尔巴尼亚人民、我们党和党的领导人，衷心地祝贺在毛泽东同志直接领导下的、正在完全胜利进行的中国无产阶级文化大革命。这一革命具有国际意义，它是建设社会主义和保卫社会主义胜利果实的理论和实践的进一步发展，它为所有的马克思列宁主义者和全世界的进步人民树立了一个榜样。"},{"type":"paragraph","text":"他说，阿中两党以及毛泽东同志和恩维尔·霍查同志所锤炼出来的亲密的、兄弟般的、永恒的友谊，把我们两国人民团结在一起。这个友谊将永世长存。"},{"type":"paragraph","text":"他说，阿尔巴尼亚劳动党和阿尔巴尼亚人民，从毛泽东同志发给我们党的第五次代表大会的贺电中，得到了巨大的鼓舞，正在为建设社会主义、反对以美帝国主义为首的帝国主义、反对以苏共现领导集团为首的现代修正主义而斗争。"},{"type":"paragraph","text":"周恩来同志和卡博同志的讲话，在全场激起一阵又一阵的热烈掌声。"},{"type":"paragraph","text":"参加会见和出席宴会的各有关方面的负责人还有:刘晓、伍修权、王树声、赵毅敏、彭绍辉、王新亭、袁子钦、王力、关锋、戚本禹、穆欣、汪东兴、唐平铸、乔冠华、韩念龙、曹轶欧等同志。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59ae56c218"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
