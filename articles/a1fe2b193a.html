" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"抵抗由营口葫芦岛登陆之将军道其缓进","alias":"","parts":[{"type":"paragraph","text":"抵抗由营口葫芦岛登陆之蒋军迫其缓进！]"},{"type":"paragraph","text":"（1945年10月31日）彭真："},{"type":"paragraph","text":"（一）三十一日四时电悉。时间大迫，有军队亦来不及，刘转连杨国夫3才开始到达，就是证明。（二）请严催已到冀东及山东渡海各部于十一月十二日前务必通过海城、锦州一线。黄克诚要十一月十日才能到玉田，将来只好绕道赴洮南。（三）营口、葫芦岛"},{"type":"paragraph","text":"[1]这是毛泽东给中共中央东北局书记、东北人民自治军第一政治委员彭真的电报。同一天，中共中央决定入东北部队组建为东北人民自治军，以林彪为总司令，吕正操、李运昌分别为第一、第二副司令，萧劲光为第三副司令兼参谋长，彭真、罗荣桓分别为第一、第二政治委员，程子华为副政治委员。"},{"type":"paragraph","text":"[2]指1945年10月31日彭真给林彪、萧劲光并中共中央的电报。电报说，（1）苏军允许蒋军10月30日在营口登陆，蒋军11月20日将进至沈阳、阜新线，苏军将全部撤走，请林、萧速来沈阳商讨部署。（2）为对付蒋军登陆，拟编派两个旅担任锦州方面作战，三个旅担任营口方面作战。如同意，请令有关部队星夜赶来沈阳，时间紧迫，不可再缓。"},{"type":"paragraph","text":"[3]刘转连，当时任八路军游击第二支队司令员。杨国夫，当时任山东军区第七师师长。他们正率部赴东北。"},{"type":"paragraph","text":"[4]黄克诚，当时任新四军第三师师长兼政治委员。登陆之蒋军必须抵抗，可能迫使蒋军缓进，我可争取时间。（四）蒋\"入满只两个军，现方开始由海防?、广州起运，目前拟在葫芦岛登陆者似系天津去的一小部，若能有十万军队能打的，可能用野战歼灭之，并且必须确定此方针，按此方针去部署。（五）刘其人文年生?催其速开沈阳不去热河?。黄克诚不日可通过平津线。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"三十一日十八时[1]蒋，指蒋介石。"},{"type":"paragraph","text":"[2]海防，越南东北部的港口城市。当时国民党军一部接受侵越日军投降后经此海运东北。"},{"type":"paragraph","text":"[3]刘其人，当时任八路军渤海军区副政治委员，正率渤海军区三个团挺进热河。文年生，当时任八路军游击第三支队司令员，正调赴热河。"},{"type":"paragraph","text":"[4]热河，旧省名，辖今河北省东北部、辽宁省西南部和内蒙古自治区"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":499,"page_end":500},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1fe2b193a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
