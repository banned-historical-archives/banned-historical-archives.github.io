<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"自觉地限制资产阶级法权","authors":[],"dates":[{"year":1976,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"自觉地限制资产阶级法权"},{"type":"paragraph","text":"河北省广平县委书记冯文海同志，是一个回乡知识青年成长起来的青年干部。他当县委书记以后，牢记毛主席关于“全心全意地为人民服务”的伟大教导，不脱离劳动，不脱离群众，自觉地限制资产阶级法权，坚持无产阶级专政下的继续革命。"},{"type":"paragraph","text":"有一次，他回到自己大队参加党支部会议，刚跨进门，大家“忽”地一下都站了起来，有的让座，有的倒水，非常客气。这个情景，引起了文海同志的深思。他想，干部是人民的勤务员，和群众本来是平等的关系，这些同志又和自己在一起工作过，为什么现在把自己当成“官”呢？这说明自己这个勤务员还当的不够好。"},{"type":"paragraph","text":"从此以后，冯文海时时刻刻警惕自己滋长特殊化思想。在办公室里，他坚持自己打水扫地；在机关食堂，坚持和同志们一块吃大灶；下乡工作，多半是骑自行车。同志们说他“在机关，象个普通办事员；在党内，是个普通党员；在农村，象个普通社员。”"},{"type":"paragraph","text":"前不久，县计划部门打了一些桌子和柜箱。有的同志怕县委领导同志工作忙，顾不上去买，就主张先卖给县委领导干部一部分。文海同志知道后，不同意这样做。当时有人说：“我们是花钱买，既不是走后门，又不是多占，谁要不一样。”文海同志严肃地说：“共产党的干部应该全心全意为人民服务，讲享受应该排在最后边。一个革命干部，不能只想经营自己的‘安乐窝’，要时刻想到建设共产主义的大厦。”"},{"type":"paragraph","text":"冯文海同志常说：“我们干部的权力是人民给的。对人民有利的事，要想尽一切办法去做；而利用人民给的权力，搞歪门邪道，一件事也不能办！”他担任县委领导工作后，一些亲友、同乡、同学找他办事的越来越多，冯文海同志就把自己的亲友召集在一起，作了耐心的说服教育工作。他姑母家居外县，没有到会，在去年大专院校招生时，姑母想托他把自己的孩子从外县转到广平县，送到大学去。冯文海同志坚决拒绝了。姑母说：“是亲三分向哩，你当县委书记这点小事还不能办？”文海耐心地说：“旧社会常说是亲三分向，这是地主老财们的升官发财之道。咱共产党的干部怎能搞剥削阶级那一套！依我看，共产党的理，应该是沾亲严三分！”这一番话把老人说醒悟了。冯文海同志对亲友是这样，对同乡同学也是这样，从不徇私情。"},{"type":"paragraph","text":"冯文海当了县委书记后，一直坚持参加集体生产劳动。在机关工作的时候，他主动参加机关的生产劳动；下乡蹲点的时候，就跟班劳动；白天开会耽误了劳动，他就晚上补；有时晚上开会到深夜，白天照样劳动。在劳动中，冯文海不论是挑大粪，还是拉车收割的脏活、重活，都抢着去干。一次，县里通知冯文海从他蹲点的东王封大队回县开会，他半夜两点多钟就起床下地，轮起大镐干开了。天亮社员上工了，他才回县开会。贫下中农看到他累得满头大汗，又激动又心疼地说：“文海，你身上的担子够重了，这样拚命地干，就是铁铸的身板也要垮掉呀！”冯文海笑着说：“没关系，劳动的汗水能防修；贫农出身的干部，不参加集体生产劳动，资产阶级思想就会钻空子，那可真要垮掉呀！”"},{"type":"paragraph","text":"冯文海除通过参加集体生产劳动密切联系群众外，还从处理群众的来访来信中了解群众的要求。凡是来找他的群众，他都热情接待，不推托，不敷衍。凡是群众给他的来信，他都亲自批办，写信回答。有的同志对他说：“你的事那么多，让别人处理一下就行了。”他说：“毛主席教导我们，共产党基本的一条，就是直接依靠广大革命人民群众。干部是人民的勤务员，不和群众接触，怎么了解群众，怎么为群众服务？脱离了群众，我们就会变成官僚主义者。”他从群众的来信来访中吸取丰富的政治营养，促进自己世界观的改造；同时了解到，有些党的政策还不够落实，他都认真地作了处理。　本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4bb0ce324"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
