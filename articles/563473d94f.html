script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美国垄断资产阶级的残酷剥削和压迫  美国三十七万汽车工人团结一致坚持斗争  罢工已进入第二周；通用汽车公司近二百个工厂继续陷于瘫痪","authors":[],"dates":[{"year":1970,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国垄断资产阶级的残酷剥削和压迫"},{"type":"paragraph","text":"美国三十七万汽车工人团结一致坚持斗争"},{"type":"paragraph","text":"罢工已进入第二周；通用汽车公司近二百个工厂继续陷于瘫痪"},{"type":"paragraph","text":"新华社二十二日讯　华盛顿消息：美国通用汽车公司三十七万工人从十五日凌晨开始的大罢工在二十二日进入了第二周。工人们团结一致，坚持斗争，反对美国垄断资本的残酷剥削。"},{"type":"paragraph","text":"美国通用汽车公司三十多万工人坚持罢工斗争，使美国这家最大的垄断企业在美国各地的一百九十九个工厂继续陷于瘫痪。罢工的工人以高昂的战斗精神，在工厂前设立了纠察线。美国通用汽车公司在加拿大的二万七千名工人，也在坚持斗争，使这家美国公司在加拿大的七个工厂也都停了工。"},{"type":"paragraph","text":"汽车工人反对垄断资本的斗争不断得到美国其他行业工人的大力声援。许多钢铁工人和货运司机给予汽车工人经济上的支援，充实他们的罢工基金，支持汽车工人坚持斗争。"},{"type":"paragraph","text":"汽车工人的罢工斗争，已经给了美国垄断资本以沉重打击。据报道，美国全国的汽车产量，从十四日到十九日这一周比上一周下降了百分之二十一，比去年同期下降了百分之四十八。同时，供应汽车生产原材料的钢铁、橡胶、玻璃等工业部门也受到了严重影响，这些行业的有些工厂也开始缩减生产。"},{"type":"paragraph","text":"在这同时，美国其他一些行业的工人也在不断进行罢工，抗议垄断资本的剥削和要求增加工资。例如建筑工人的罢工就波及到许多城市，其中已经坚持罢工达六个月的堪萨斯城的建筑工人，最近再次决定继续罢工。（附图片）"},{"type":"paragraph","text":"美国工人阶级反抗垄断资产阶级残酷剥削和压迫的斗争日益高涨。图为美国通用电气公司工人举行罢工集会。新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"563473d94f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
