<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1983,"month":6,"day":2}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"奴隶解放的壮歌——影片《汤姆叔叔的小屋》简介","authors":["聂德功"],"parts":[{"type":"paragraph","text":"由西德、意大利、南斯拉夫联合摄制的彩色宽银幕故事片《汤姆叔叔的小屋》在我国上映了。这部影片是根据美国女作家斯托夫人的著名小说《汤姆大伯的小屋》改编的。美国总统林肯在接见作者时，说她“写了一本书，酿成一场大战……。”"},{"type":"paragraph","text":"《汤姆叔叔的小屋》是一部描写奴隶的血泪生活，揭露奴隶主统治的残暴和罪恶的作品。小说原作在1852年问世以后，在美国引起极大的震动，燃起了人民反对奴隶统治的愤怒烈火，使美国北部废奴派同南部殖民派在奴隶问题上原有的矛盾空前激化起来，酿成了美国南北大战。"},{"type":"paragraph","text":"《汤姆叔叔的小屋》问世以后，先后被译成二十三国文字。早在1901年我国就翻译了这本书，取名《黑奴吁天录》。在世界电影史上，它曾多次被改编摄制成电影。现在我国观众看到的这部西德、意大利和南斯拉夫的合拍片，是迄今为止较成功的一部。这部影片在基本忠实于原作的基础上，根据电影艺术的特点和主题的需要，对原作作了必要的改动，进一步强化了主题。"},{"type":"paragraph","text":"影片真实地再现了奴隶的血泪生活和遭受非人待遇的悲惨情景，它主要通过两个黑奴对待奴役的不同态度、不同结局，向人们揭示出奴隶只有起来进行斗争，推翻奴隶主统治，才有出路，否则，就只能在无边的灾难中死亡。老黑奴汤姆叔叔，一辈子忠厚善良，勤劳肯干，他几次被卖，几易主人，但安于自己的奴隶地位，结果却身受重伤，惨死在奴隶主的庄园里。年轻黑奴乔治·哈里斯则不同，他不满奴役统治，奋起反抗，同奴役者进行了殊死的斗争。由于乔治·哈里斯等人的斗争，使部分黑奴摆脱了奴役，开始走上了自己掌握自己命运的自由之路。"},{"type":"paragraph","text":"另外，影片还向我们展现了蓄奴者同废奴者之间的斗争。奴隶贩子利格里，是一个贪婪、凶狠、残暴、毒辣的蓄奴者，他贩卖奴隶，玩弄女奴，镇压奴隶的反抗，无恶不作。克莱尔是一个富有正义感的开明农场主，他赞助、支持奴隶解放，对于自己农场的奴隶，决定签署法律条文，宣布他们为自由人。克莱尔这种进步的作法，引起蓄奴者的极度仇恨和极大恐慌，他们大声叫骂克莱尔是“疯子”，叫嚣要治裁他，并在圣·克莱尔举行法律条文签字仪式的前夕枪杀了他。克莱尔的死向人们表明，革命的、进步的事业在前进过程中，是必然要受到反动、没落势力的反抗的，这种反抗所引起的斗争，是不可避免的，是异常残酷的，革命的人们对此应有清醒的认识。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc252e6d04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
