torical-archives/banned-historical-archives8/main/maoquanji4-1.pdf"],"article":{"title":"给李立三“的信","alias":"","parts":[{"type":"paragraph","text":"给李立三\"的信"},{"type":"paragraph","text":"（1929年11月28日）立三兄："},{"type":"paragraph","text":"多久不和你通讯了，陈毅同志来才知道你的情形。我大病三个月，现虽好了，但精神未全复元。开慧和岸英等我时常念及他们，想和他们通讯，不知通信处。闻说泽民?在上海，请兄替我通知泽民，要他把开慧的通信处告诉我，并要他写信给我。"},{"type":"paragraph","text":"我知识饥荒到十分，请你时常寄书报给我，能抽暇写信指导尤幸。"},{"type":"paragraph","text":"独秀近来行动?真岂有此理，中央的驳议文件已经到此，我们当普遍地宣传。"},{"type":"paragraph","text":"共产主义的敬礼"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"”[5]邮政通信处“"},{"type":"paragraph","text":"[1]李立三（1899—-1967)，湖南醴陵人，当时任中共中央政治局常委、中央宣传部部长。"},{"type":"paragraph","text":"[2]开慧，即杨开慧（1901一1930)，湖南长沙人，毛泽东的夫人，1921年加入中国共产党。岸英，即毛岸英，毛泽东的长子。"},{"type":"paragraph","text":"[3]泽民，即毛泽民（1896一1943)，湖南湘潭人，毛泽东之弟，当时负责中共中央出版部的工作。"},{"type":"paragraph","text":"[4]指陈独秀当时在党内散布托派观点，成立小组织等反党活动。"},{"type":"paragraph","text":"古田会议前夕，毛泽东亲自领导红军在福建连城县新泉村进行整顿。毛泽东亲自深入部队调查研究，为召开古田会议作好准备。毛泽东在新泉村的住地“望云草室”。"}],"authors":["毛泽东"],"dates":[{"year":1929,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":294},"tags":[{"name":"毛泽东","type":"人物"},{"name":"李立三","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab4eb35c23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
