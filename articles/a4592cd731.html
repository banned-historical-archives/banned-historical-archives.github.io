<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“我们知道毛泽东、周恩来……”——记纳米比亚人民对中国人民的深厚情谊","authors":["王东方"],"dates":[{"year":1990,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“我们知道毛泽东、周恩来……”"},{"type":"paragraph","text":"——记纳米比亚人民对中国人民的深厚情谊"},{"type":"paragraph","text":"王东方"},{"type":"paragraph","text":"去年１０月２６日至１１月２０日，我参加了联合国过渡时期协助团，作为选举监督员前往纳米比亚监督制宪议会选举。在那块遥远的土地上，我感受到了纳米比亚人民对中国人民的深情厚谊，经历了一段难忘的日子。"},{"type":"paragraph","text":"在纳米比亚工作期间，一有空隙时间，当地群众就围过来向我询问，关心中国的一切。有许多人说，“我们知道毛泽东、周恩来……”然后双手合拢轻拍手掌说：“伟大！伟大！”这是当地人民的传统习惯手势，当说到所崇敬、尊敬的人时，就作出这样的手势。他们中有许多人都说对中国、中国共产党和中国人民有着深厚的感情。"},{"type":"paragraph","text":"在卡普里维地区，即西南非洲人民组织１９６６年８月２６日打响武装斗争第一枪的地方，我遇到了人组在这一地区的负责人穆多瓦。他说，“我们开展独立斗争一开始，就得到兄弟的中国人民的有力支持。伟大的中国在联合国、在世界上对我们的支持给了我们巨大的鼓舞。”他接着谈到努乔马主席访问中国的情景。最后他风趣地说：“我们一独立，明年马上就会与中国建交。我要和努乔马说，派我去到中国当大使。你看如何？”"},{"type":"paragraph","text":"有一天，我们的选举站所在地借用了当地的小学校舍。这个小学校的校长托依沃对我说：“我认为，不论中国发生了什么事，有两个重要的事实是谁也不能否认的。一个事实是，中国政府解决了１１亿人民的温饱问题，这是世界上任何一个国家都做不到的。我始终认为如果没有社会主义制度，中国人民的生活就没有保证。另一个事实是，中国正在进行的四化建设是造福人民的，这也是一场伟大的革命。尽管现在世界上对中国有些说法，我对中国的热爱和尊重是绝不会变的。”"},{"type":"paragraph","text":"有一天，我在大西洋海边碰上一对专门从首都温得和克到那里度假的年轻夫妇。当我沉醉于大西洋那血染般的晚霞景色时，两位年轻人对我说：“过去，我们在学校里从书本上知道中国有万里长城，真伟大！我们真想去亲眼看看。”我表示欢迎他们来看长城，届时我可给他们当向导。他们听了，脸上露出满意的微笑。"},{"type":"paragraph","text":"大西洋隔不断纳米比亚人民和中国人民的友谊。在纳米比亚宣告独立后，纳中两国人民的友好情谊必将得到进一步加强。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4592cd731"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
