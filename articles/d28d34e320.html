script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度“马克思主义者出版社”高度评价我国文化大革命  文化大革命是完成社会主义革命必不可少的  严厉驳斥印度资产阶级和修正主义分子对文化大革命的造谣诽谤","authors":[],"dates":[{"year":1966,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度“马克思主义者出版社”高度评价我国文化大革命"},{"type":"paragraph","text":"文化大革命是完成社会主义革命必不可少的"},{"type":"paragraph","text":"严厉驳斥印度资产阶级和修正主义分子对文化大革命的造谣诽谤"},{"type":"paragraph","text":"据新华社讯　新德里消息：印度喀拉拉邦“马克思主义者出版社”最近出版的一本小册子中，刊登了一篇题为《中国文化大革命》的文章，高度评价中国无产阶级文化大革命的伟大意义，并严厉驳斥印度资产阶级、修正主义分子对中国文化大革命的种种造谣诽谤。"},{"type":"paragraph","text":"文章说，目前一场伟大的文化革命正在席卷中国，“这是一场史无前例的大革命”，是中国社会主义革命的新阶段。"},{"type":"paragraph","text":"文章指出，无产阶级革命在解决了在政治上夺取政权和在经济上改变生产资料所有制这两方面的问题之后，还“必须在文化战线上也进行一场革命，以便彻底肃清资产阶级、封建地主和其他剥削阶级的意识形态和腐朽的文化”。这场文化革命“对于完成社会主义革命来说，是必不可少的。”"},{"type":"paragraph","text":"文章指出：“如果工人阶级不在适宜的时刻在文化领域进行革命的话，它就必定会甚至在获得政权后丧失一切成果。如果谈论巩固社会主义制度，而又不进行能够把群众的觉悟提高到新的水平的文化革命，不进行满足经济基础的需要的文化革命，那将只不过是空喊口号。”"},{"type":"paragraph","text":"文章说，作为反面教员的苏联和南斯拉夫实行资本主义复辟的历史教训，是值得深思的。"},{"type":"paragraph","text":"文章严厉谴责了印度资产阶级和修正主义分子对中国文化大革命的种种诽谤，指出：“资产阶级设法在外面通过诽谤和谎话来歪曲在中国发生的情况，而修正主义分子和其他叛徒则利用他们在工人阶级队伍里的地位和假借马克思列宁主义的名义，设法帮助资产阶级的这些肮脏企图。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d28d34e320"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
