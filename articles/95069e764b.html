ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"给谭世瑛的信","alias":"","parts":[{"type":"paragraph","text":"给谭世瑛?的信"},{"type":"paragraph","text":"（1950年8月31日）世瑛学兄："},{"type":"paragraph","text":"五月来信收读，又承赠以长歌，深感厚意。生活困难，极为同情。现在到人民政府所属机构做事，或到学校教书，薪入甚微，对于家口众多者不易赡给；又须入相当学校学些马克思主义观点，方能齐一步调，有共同作风。以吾兄状况观之，能就近获得工作职位，为最好；否则须远出参加短期研究班的学习，须准备吃很大的苦楚，又难于赡家，未知有此决心否？顺致"},{"type":"paragraph","text":"敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月开一日[1]谭世瑛，毛泽东少年时的同学。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":8,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":120,"page_end":120},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95069e764b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
