ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"在李富春关于国家计委等单位最近工作情况报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在李富春关于国家计委等单位"},{"type":"paragraph","text":"最近工作情况报告上的批语"},{"type":"paragraph","text":"（1959年9月2日）电话告富春："},{"type":"paragraph","text":"此件及前件均已看过。同意他们会议的安排。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月二日"},{"type":"paragraph","text":"[1]李富春，当时任中共中央书记处书记、国务院副总理兼国家计划委员会主任。"},{"type":"paragraph","text":"[2]李富春1959年9月1日给毛泽东的这一报告说，从庐山开会回来已10天，除布置计委和各部着手搞明年的计划外，主要是传达和讨论庐山会议的决议。从8月26日起，国家经委、建委、科委和计委党组共同开会讨论了右倾机会主义反党集团的问题。30日下午又召集了扩大的四委党组会议，中心是要把思想搞透，特别是要克服计委干部中的混乱思想，认识总路线，维护总路线，在克服工作上的缺点错误过程中来贯彻执行总路线。在9月15日左右，争取先搞一个明年计划的纲要（准备提出以钢为纲的三个不同的方案作比较）。在反右倾机会主义和搞明年的计划工作中，要求计委的干部把方向和方法两个问题搞清楚，这样思想才能一致，方法才能提高，计划才能做好。"},{"type":"paragraph","text":"[3]指国家计划委员会副主任贾拓夫1959年8月给中共中央的检讨报告。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":333,"page_end":333},"tags":[{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e97bec3294"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
