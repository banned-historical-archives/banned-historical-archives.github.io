示","authors":[],"dates":[{"year":1950,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"中共川东区党委关于整顿农协组织的指示","type":"title"},{"text":"最近发现农协组织健全与否，首先决定于领导骨干的纯洁。我们在整顿农协组织时，开始即应注意整顿农协的领导成份，不使地主、富农及坏分子混入控制。有的地区在整顿农协组织时，不注意调整领导成份，而单纯用大量清洗会员的办法。如长寿渡舟乡15保，开始以登记方式在10天时间内，即发展了420名会员；后来“大清洗”开除了210人。邻水县一区2个乡，最近清洗了140人；一区挹爽12保170名会员清洗了66名。如果首先不调整领导成份，而单纯清洗会员，则不能达到整顿农协组织的目的。反而可能被地、富坏分子利用将好的会员清洗掉。故当前整顿农协组织，首先要使领导骨干真正掌握在贫苦农民之积极分子手中，然后逐步地进行整顿。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（上）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58fcde47a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
