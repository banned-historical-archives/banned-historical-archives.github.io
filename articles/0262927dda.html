"year":1979,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英委员长七月三十一日晚上会见了以米尔扎·古拉姆·哈菲兹议长为团长的孟加拉人民共和国国民议会代表团。"},{"type":"paragraph","text":"叶剑英委员长在接见大厅前迎候哈菲兹议长，对他率领国民议会代表团来我国访问表示热烈欢迎。在交谈中，叶剑英称赞哈菲兹议长是一位长期为促进中孟两国人民友谊而努力的中国人民的老朋友。哈菲兹议长说，多年来，能为增进孟中两国人民的友谊而奋斗，感到很荣幸。他说，他这次访问中国和今天同叶剑英委员长的会见，将会对进一步发展孟中友谊作出贡献。哈菲兹议长赞扬中国支持中小国家反对帝国主义和反对霸权主义的斗争。叶剑英委员长说，孟加拉国人民同中国人民一样，反对霸权主义。他还感谢哈菲兹议长向他和华国锋总理转达了齐亚·拉赫曼总统和孟加拉国人民的问候。他请哈菲兹议长转达中国人民对齐亚·拉赫曼总统和孟加拉国人民的问候，并祝孟加拉国日益繁荣昌盛。"},{"type":"paragraph","text":"姬鹏飞副委员长参加了会见。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0262927dda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
