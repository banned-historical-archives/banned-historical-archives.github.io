,"authors":[],"dates":[{"year":1957,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"匈牙利共产党成立三十九周年"},{"type":"paragraph","text":"布达佩斯集会纪念"},{"type":"paragraph","text":"基什号召密切党群关系反对修正主义"},{"type":"paragraph","text":"据新华社布达佩斯22日电　11月20日是匈牙利共产党成立三十九周年纪念日。这一天，在布达佩斯举行了纪念大会。"},{"type":"paragraph","text":"匈牙利社会主义工人党中央委员会政治局委员基什在纪念大会上说，匈牙利共产党的建立不仅是匈牙利工人运动的历史的转折点，而且也是匈牙利整个民族的历史的转折点。我们党从成立以来，一直同布尔什维克党和列宁有紧密的合作，我们也以此自豪。"},{"type":"paragraph","text":"参加这个纪念大会的有社会主义工人党中央政治局的委员们、中央委员们和老共产党员。基什谈到关于党的群众政策，他说，必须注意不受修正主义的影响，必须坚决地站在原则立场上。不能忘记，现在修正主义对我们有着相当严重的危险，必须集中力量反对修正主义，同时经常地反对宗派主义和教条主义，必须努力使干部用马克思列宁主义的精神来处理工作，不能容许削弱党群关系的现象存在。"},{"type":"paragraph","text":"这里的报纸都在这一天发表社论和文章来纪念党的生日。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0e74adbc8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
