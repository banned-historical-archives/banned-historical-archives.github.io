art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做传播毛泽东思想的红色宣传员","authors":[],"parts":[{"type":"paragraph","text":"上海警备区部队等单位，热烈响应我们伟大领袖毛主席的号召，积极支持左派广大群众。他们适应无产阶级文化大革命形势发展的需要，深入到革命群众中去，热情地广泛地传播毛泽东思想，宣传以毛主席为代表的无产阶级革命路线，帮助革命左派和革命群众掌握毛泽东思想，发展壮大革命左派队伍。"},{"type":"paragraph","text":"伟大的毛泽东思想是无产阶级革命派展开全面夺权斗争的威力强大的思想武器。革命左派和革命群众掌握了毛泽东思想，在向党内一小撮走资本主义道路当权派夺权的斗争中，就有了最大的勇敢，就能正确地执行党的政策，一个一个地夺取无产阶级文化大革命的新胜利。因此，帮助革命左派和革命群众掌握毛泽东思想，是对无产阶级革命派最大的支援。"},{"type":"paragraph","text":"我军是无产阶级革命派和革命群众的坚强后盾。对反革命分子、反革命组织，必要时要采取军事行动。但是，就是采取军事行动的时候，也是以政治攻势为主，充分发挥毛泽东思想的威力，揭露、分化、孤立敌人，镇压首恶分子，使受蒙蔽的群众觉醒过来。"},{"type":"paragraph","text":"在支援左派广大群众进行夺权斗争中，我们的干部战士要更加努力地用毛泽东思想武装头脑，人人做毛泽东思想的红色宣传员，去宣传群众，组织群众，打击敌人，夺取胜利，为无产阶级文化大革命创立新的功勋。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3aa6e2a22d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
