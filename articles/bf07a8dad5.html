es":[{"year":1964,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社讯　湖南省第三届人民代表大会第一次会议九月十七日至二十二日在长沙举行。会议以无记名投票方式，选举了一百一十七名第三届全国人民代表大会代表，其中有中共中央政治局委员、书记处书记、国务院副总理李富春。"},{"type":"paragraph","text":"据新华社讯　内蒙古自治区第三届人民代表大会第一次会议从九月十八日到二十七日在呼和浩特市举行。在这次会议上，中共中央政治局候补委员、国务院副总理乌兰夫(蒙古族)当选为第三届全国人民代表大会代表。这次会议选出的第三届全国人民代表大会代表共五十五人。"},{"type":"paragraph","text":"据新华社讯　江苏省第三届人民代表大会第一次会议九月二十一日至二十七日在南京举行。在这次会议上，中共中央政治局候补委员、中共中央书记处书记、国务院副总理陆定一当选为第三届全国人民代表大会代表。这次江苏省选出的全国人民代表大会代表共一百五十四人。"},{"type":"paragraph","text":"据新华社讯　最近举行的中国人民解放军广州部队军人代表大会，选举中共中央委员、国防委员会副主席叶剑英元帅等十一人为第三届全国人民代表大会代表。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李富春","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf07a8dad5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
