script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要求立即停止“日韩会谈”和恢复日中邦交日本学生集会决定展开统一行动强调把现代修正主义分子从学生阵线中清除出去","authors":[],"dates":[{"year":1964,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京23日电】　东京消息:日本反对日美“安全条约”维护和平民主全国学生自治会联合会二十二日在东京举行的全国积极分子大会上决定展开统一行动，要求立即停止“日韩会谈”和恢复日中邦交。"},{"type":"paragraph","text":"出席大会的有二百六十个大学的一千名代表。这次大会是全国学生自治会联合会在五月三日举行全国积极分子大会上决定的一系列全国性统一行动的一部分。大会还要求立即无条件恢复反对日美“安全条约”国民会议的活动，把托洛茨基分子和现代修正主义分子从学生阵线中清除出去，并大量增加政府教育方面的预算。大会派遣三位代表去美国驻日本大使馆，抗议美国扩大在南越和老挝的战争，要求美国从亚洲撤除一切军事基地。"},{"type":"paragraph","text":"大会还派出代表去外务省，要求立即停止“日韩会谈”，拒绝接受美国关于对南越傀儡集团提供援助的要求。"},{"type":"paragraph","text":"日本共产党中央青年学生部副部长广谷俊二在大会上致词时说，日本共产党由于开除了进行分裂活动的志贺义雄和铃木市藏，已进一步加强了自己的队伍。他说，“部分禁止核试验条约并不妨碍美帝国主义者准备他们的核战争，但是却促使世界的和平和民主力量陷于分裂。我们决不能支持这种条约。”他的话博得了学生们的热烈掌声。"},{"type":"paragraph","text":"会后，学生们举行了示威游行。他们列队经过美国大使馆、文部省和外务省的门前，高呼“让我们起来同南朝鲜学生一道斗争”、“美国佬滚回去”等口号。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b00a335f4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
