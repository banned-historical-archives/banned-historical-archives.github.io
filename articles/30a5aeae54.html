script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席革命路线的伟大胜利　文化大革命的响亮颂歌  我国自力更生新建起大港油田  在激烈的阶级斗争和两条路线斗争中，我国石油工人发扬大庆精神新建的大港油田，将为我国提供大量的石油和天然气，对改变我国燃料构成，促进全国工农业生产发展，有重要意义","authors":[],"dates":[{"year":1974,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席革命路线的伟大胜利　文化大革命的响亮颂歌"},{"type":"paragraph","text":"我国自力更生新建起大港油田"},{"type":"paragraph","text":"在激烈的阶级斗争和两条路线斗争中，我国石油工人发扬大庆精神新建的大港油田，将为我国提供大量的石油和天然气，对改变我国燃料构成，促进全国工农业生产发展，有重要意义"},{"type":"paragraph","text":"新华社天津一九七四年五月十五日电　在毛主席的无产阶级革命路线指引下，在无产阶级文化大革命期间，我国石油工人又在华北东部滨海地区建起了一个新油田——大港油田。据油田负责人谈，自一九六七年到一九七三年，这个油田年年提前完成国家计划，原油产量平均每年递增百分之六十点九。大港油田的开发和建设，是无产阶级文化大革命的一曲响亮的颂歌。"},{"type":"paragraph","text":"大港油田是继大庆油田、胜利油田之后，依靠我国自己的力量勘探、建设起来的一个新油田。已经获得的大量地质资料表明，这个新油田的油气资源丰富，油层厚，渗透性好，原油性质好，经济价值高。这个油田的开发，将为我国提供大量的石油和天然气，对改变我国燃料构成，促进全国工农业生产的发展，有重要意义。"},{"type":"paragraph","text":"大港油田开始建设后，当近万名大庆石油工人挥师南下，踏上这个地区时，这里还是一片茫茫的盐碱荒滩，没有道路，也看不见人烟。勘探工人们发扬大庆精神，革命加拚命，冒着凛冽的寒风，踏着烂泥塘里的薄冰，夜以继日地搬运设备，安装井架，展开了勘探工作。经过近十年的艰苦奋斗，他们打了一批又一批探井，在长期被认为没油的地方找到了油田。现在，这里一排排油井和纵横交错的原油集输管网，正把沉睡千年的原油从地下采出、外运；几十部钻塔耸立工地，在进一步开发油田；四通八达的柏油马路，把采油井房、钻井工地、工厂厂房、工人新村、医院、商店联成了一个整体。"},{"type":"paragraph","text":"大港油田建设期间，正是无产阶级文化大革命的急风暴雨席卷全国的时候。在激烈的阶级斗争和两条路线斗争中，英雄的石油工人一面愤怒批判刘少奇反革命的修正主义路线，一面坚持开发油田。他们以大庆为榜样，坚持无产阶级政治挂帅，坚持集中领导同群众运动相结合，自力更生、艰苦奋斗，克服各种困难，在短短几年里，就进行了大量地质普查工作，打出了一批又一批的油井。在批林整风运动中，广大职工又狠批了林彪修正主义路线的极右实质和他散布的种种谬论，进一步提高了执行毛主席革命路线的自觉性。广大石油工人认真贯彻执行抓革命、促生产的方针，战天斗地，征服自然，使油田的开发和建设迈开了更大的步伐。"},{"type":"paragraph","text":"大港油田地质条件比较复杂。有的人曾被这种情况所迷惑，以为这里无规可循。可是工人们回答说：“地层复杂不可怕，掌握了唯物辩证法，客观规律就可以认识。”广大工人、干部和技术人员学习大庆油田以毛主席的哲学思想指导石油钻探的经验，大学《矛盾论》、《实践论》，大搞调查研究和科学实验，用唯物辩证法指导勘探、开发工作，逐步取得了生产斗争的主动权。三二二七钻井队的职工坚持用辩证唯物主义指导钻井，摸索钻井规律，努力做到敢于斗争又善于斗争。这个钻井队自从参加大港油田建设以来，已经打井一百四十三口，跨入了全国先进钻井队的行列。"},{"type":"paragraph","text":"目前，这个油田正在深入开展批林批孔运动，工人们如饥似渴地学习马列著作和毛泽东思想，努力掌握斗争武器，深入批判林彪“克己复礼”的反动纲领，愤怒声讨林彪妄图复辟资本主义的滔天罪行。工人们说：“没有无产阶级文化大革命，就没有大港油田”。他们纷纷用国家的进步，油田的发展，个人的成长等铁的事实，驳斥林彪和国内外阶级敌人恶毒攻击无产阶级文化大革命的无耻谰言，不断巩固和发展无产阶级文化大革命的伟大成果。批林批孔运动的深入发展，进一步推动了油田的开发和建设。英雄的大港工人，顶着初春的寒风，开展了修井大会战，使原油日产量提高了百分之十五。他们还在新油区开展了夺油夺气的勘探会战。经过一个春天的努力，油田条条战线传喜讯。今年第一季度原油产量比去年同期提高了百分之二十八，超额完成了国家生产计划，已经查明的石油储量也显著增加。（附图片）"},{"type":"paragraph","text":"左：在毛主席的无产阶级革命路线指引下，无产阶级文化大革命期间，我国石油工人又在华北东部滨海地区建起一个新油田——大港油田。这是大港油田某区又一口新井喷射出高压油气流。　新华社稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30a5aeae54"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
