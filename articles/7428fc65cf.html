ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"关于发表中共中央声明的批语","alias":"","parts":[{"type":"paragraph","text":"关于发表中共中央声明的批语2]"},{"type":"paragraph","text":"（1963年6月30日）康生同志："},{"type":"paragraph","text":"已看过，同意小平同志意见。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"卅日下午七时"},{"type":"paragraph","text":"[1]指中国共产党中央委员会1963年7月1日声明。声明说，中共中央决定，组成以总书记邓小平为团长的中共代表团，参加7月5日将在莫斯科举行的中苏两党会谈。声明还对中共代表团提出要求，并期望两党会谈能够取得积极的成果。这个声明在1963年7月1日《人民日报》上发表。"},{"type":"paragraph","text":"[2]这个批语写在康生（中共中央政治局候补委员、中央书记处书记）1963年6月30日给毛泽东的信上。信中说，赫鲁晓夫的报告全文已收到译出，其中攻击中国党的一段，另纸抄上。邓小平说，原中共中央声明稿可以定下，不要改了。在今晚8时政治局通过后，今晚即可广播，明天即见报。所说赫鲁晓夫报告，是指他在苏共中央6月18日至21日召开的全体会议上发表的长篇讲话。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":6,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":458,"page_end":458},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7428fc65cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
