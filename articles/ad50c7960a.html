tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我国人民伟大领袖毛主席会见阮氏萍外长对阮氏萍外长前来我国进行正式友好访问，表示热烈欢迎 阮文广大使，周恩来总理、姬鹏飞外长等参加会见","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年十二月二十九日讯 我国人民的伟大领袖毛泽东主席，今天晚上十一时在中南海会见了越南南方人民的光荣使者——越南南方共和临时革命政府外交部长阮氏萍。"},{"type":"paragraph","text":"会见时，阮氏萍外长首先代表越南南方共和临时革命政府、越南南方民族解放阵线和全体越南南方人民向毛主席表示崇高的敬意，祝毛主席身体健康。她说：正当美帝国主义对越南进行战争升级的时候，我荣幸地见到了毛伯伯，这是对我们越南南方人民的极大鼓舞。"},{"type":"paragraph","text":"毛主席告诉阮氏萍外长说：我们是一家人呵！我们、你们越南南方和北方、还有老挝、柬埔寨和朝鲜都是一家人。我们互相支持。毛主席对阮氏萍外长前来我国进行正式友好访问，表示热烈欢迎。"},{"type":"paragraph","text":"参加会见的有越南南方共和驻中国大使阮文广，我国国务院总理周恩来、外交部长姬鹏飞，以及梁枫、王德洋和唐闻生同志。"},{"type":"paragraph","text":"毛主席会见阮氏萍外长时情形。 新华社记者摄"},{"type":"paragraph","text":"毛主席和阮文广大使握手。 新华社记者摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad50c7960a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
