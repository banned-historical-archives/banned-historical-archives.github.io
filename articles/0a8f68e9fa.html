script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比共政治局通过决议坚决支持印度尼西亚共产党  抗议帝国主义代理人疯狂镇压印度尼西亚共产党  谴责赫鲁晓夫修正主义者反对印度尼西亚共产党和印度尼西亚革命的阴谋  印度尼西亚西努沙登加拉当局悍然宣布解散当地共产党组织","authors":[],"dates":[{"year":1966,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比共政治局通过决议坚决支持印度尼西亚共产党"},{"type":"paragraph","text":"抗议帝国主义代理人疯狂镇压印度尼西亚共产党"},{"type":"paragraph","text":"谴责赫鲁晓夫修正主义者反对印度尼西亚共产党和印度尼西亚革命的阴谋"},{"type":"paragraph","text":"印度尼西亚西努沙登加拉当局悍然宣布解散当地共产党组织"},{"type":"paragraph","text":"新华社布鲁塞尔十日电　由比利时共产党中央委员会书记格里巴和政治局委员兰多尔夫组成的比共政治局代表团，一月五日在布鲁塞尔向印度尼西亚驻比利时大使哈迪维查亚表达了比利时共产党和劳动人民对于帝国主义代理人一九六五年十月一日以来对印度尼西亚共产党和群众组织进行的镇压、迫害和屠杀感到的不安和愤慨，并且对此提出抗议。"},{"type":"paragraph","text":"代表团还把比共政治局一月三日的决议交给了哈迪维查亚。决议说，“我们代表比利时共产党人和我国劳动者，愤怒抗议美帝国主义及其杀人的反革命特务组织（中央情报局）豢养的傀儡军事头目对我们印度尼西亚兄弟们进行的血腥的法西斯镇压和大规模的屠杀。”"},{"type":"paragraph","text":"决议指出，“法西斯军官在美帝国主义及其代理人的唆使和公开支持下所进行的颠覆活动，矛头指向印度尼西亚共产党——坚定不移的先锋队、民族革命的核心和印度尼西亚人民反帝的核心。这种颠覆活动也是针对工人、农民、人民群众和一切反对帝国主义的力量的一切组织。”"},{"type":"paragraph","text":"决议说，“不管在印度尼西亚、南越、南朝鲜、台湾、刚果、圣多明各，还是在别的地方，美帝国主义及其傀儡都必将被消灭。目前，殖民主义和新殖民主义即使用血腥屠杀也不再能保持他们的统治了。他们的罪恶侵略是一种垂死的挣扎。”决议同时谴责赫鲁晓夫修正主义者策划反对印度尼西亚共产党、反对印度尼西亚革命的阴谋。"},{"type":"paragraph","text":"决议最后呼吁比利时劳动人民支持印度尼西亚共产党和印度尼西亚革命，支持一切反帝革命运动和民族解放运动，以便加速挫败美帝国主义的新阴谋。"},{"type":"paragraph","text":"新华社十日讯　雅加达消息：据安塔拉通讯社十日报道，西努沙登加拉地方掌权者、当地警察首脑苏塔迪·龙戈迪普罗已经在去年十二月三十一日颁布了一项命令，宣布解散印度尼西亚共产党和它所属的群众组织。这一项命令还规定，印度尼西亚共产党和它所属群众组织的全部财产要交给地方掌权者或他所指定的机构监管。"},{"type":"paragraph","text":"努沙登加拉是印度尼西亚南部、爪哇岛东面的一些小岛的总称。"},{"type":"paragraph","text":"在这以前，作出同样决定的有十一个一级地区（相当于省）。它们是西爪哇、马鲁古、南和东南苏拉威西、西加里曼丹、大雅加达和它的周围地区、中加里曼丹、南苏门答腊（包括占碑和楠榜）、南加里曼丹、苏门答腊亚齐特区，东加里曼丹以及北和中苏拉威西。"},{"type":"paragraph","text":"此外，印度尼西亚第三海军区域司令部司令、第五海军区域司令部司令和空军第三作战区司令部司令也先后宣布了解散或取缔在他们所管辖的地区内的印度尼西亚共产党和它所属的群众组织。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a8f68e9fa"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
