鹏飞等在卡鲁姆第一副总统遗像前默哀","authors":[],"dates":[{"year":1972,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年四月十一日电　国务院总理周恩来，军委副主席叶剑英，国务院副总理李先念，外交部部长姬鹏飞，今天下午前往坦桑尼亚联合共和国驻中国大使馆，吊唁坦桑尼亚联合共和国第一副总统卡鲁姆不幸遇刺逝世。"},{"type":"paragraph","text":"大使馆大厅里，安放着卡鲁姆第一副总统的遗像。遗像的上方挂着坦桑尼亚联合共和国国旗。"},{"type":"paragraph","text":"大厅里竖立着中华人民共和国代主席董必武、副主席宋庆龄、国务院总理周恩来献的花圈，以及中华人民共和国外交部献的花圈。"},{"type":"paragraph","text":"周恩来、叶剑英、李先念、姬鹏飞等，由坦桑尼亚驻中国大使万布拉以及大使馆外交官员陪同，在卡鲁姆第一副总统遗像前默哀。"},{"type":"paragraph","text":"周恩来总理等同万布拉大使进行了亲切的谈话。"},{"type":"paragraph","text":"前往大使馆吊唁的，还有政府部门、中国人民解放军、北京市革命委员会、中国人民对外友好协会的负责人肖劲光、方毅、白相国、杨杰、钟辉、陈慕华、郭鲁、周荣国、丁雪松、韩叙、何功楷、朱传贤，以及曾在坦桑尼亚工作过的中国工程技术人员。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\04\\724c010401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e国务院总理周恩来，军委副主席叶剑英，国务院副总理李先念，外交部部长姬鹏飞，四月十一日前往坦桑尼亚联合共和国驻中国大使馆，吊唁坦桑尼亚联合共和国第一副总统卡鲁姆不幸遇刺逝世。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9850c5a6db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
