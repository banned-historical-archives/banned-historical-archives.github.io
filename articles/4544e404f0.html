<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想狠斗“私”字铲除头脑里的山头中央工交财贸系统各部委实现大联合这三个系统的三十三个部委的大联合有力地推动了抓革命促生产","authors":[],"dates":[{"year":1967,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十六日电　中央工业、交通、财贸系统的无产阶级革命派和广大革命群众，热烈响应伟大领袖毛主席的最新指示，以“只争朝夕”的精神纷纷实现革命大联合。到目前为止，这三个系统的三十三个部委都已经在组织上实行了革命的大联合。"},{"type":"paragraph","text":"“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。”伟大领袖毛主席的最新指示，是无产阶级革命大联合的指路明灯。毛主席的声音传到那里，那里就出现了大联合的热潮。"},{"type":"paragraph","text":"第一轻工业部的无产阶级革命派，今年四月在学习贵阳棉纺厂大联合的经验后，虽然也曾解散了原有组织，归口闹革命，但是由于思想问题没有解决，过了不久，又分裂了。在这次革命大联合的高潮中，各群众组织都以战无不胜的毛泽东思想为武器，克服私心杂念，迅速实现了革命的大联合。他们深有体会地说:我们第一次联合以后，组织上虽然削掉了山头，但是头脑里的山头并没有彻底铲掉，“以我为核心”、“唯我独左”等思想没有清除，所以后来又搞得四分五裂。他们表示，一定要吸取过去的教训，进一步活学活用毛主席著作，狠斗“私”字，彻底排除各种资产阶级和小资产阶级思想的干扰，不仅要从组织上，而且要从思想上巩固和发展革命的大联合。"},{"type":"paragraph","text":"“群众促头头，头头带头搬山头”，这是中央工交、财贸系统的许多部委实现革命大联合的一大特点。许多革命组织负责人，在群众强烈要求下，主动撤掉山头，纷纷表示愿意回到本部门去当一名小兵，在深入开展革命的大批判中作出新的贡献。第七机械工业部的两大革命群众组织以前对立情绪很严重，最近两个组织的革命群众认真学习了毛主席的最新指示，自动联合了起来。他们向总部提出:“头头搬山头，不搬山头搬头头。”促使两个总部的负责人也学了毛主席的指示，作了自我批评，并且召开了代表会议达成了削平山头、实现革命大联合的协议。"},{"type":"paragraph","text":"中央工交、财贸系统无产阶级革命派的革命大联合，正在有力地推动着革命的大批判和抓革命、促生产的高潮。财政部、国家建委等单位在实现了革命大联合以后，原来分散在各个组织的批斗小组，现在已经开始或准备合并办公，统一使用材料和人力物力。有的部门已经联合召开了批斗党内一小撮走资本主义道路当权派的大会。铁道部机关两大革命群众组织在实现革命大联合的当天，就共同签署了“铁道部群众组织关于抓革命促生产保证铁路交通运输畅通的协议”。煤炭工业部机关的两大派群众组织在实现革命大联合后，立即给所属厂矿发了通电，把大联合的喜讯告诉战斗在煤炭生产第一线的工人同志，并且表示要和全国煤矿的无产阶级革命派一起狠抓革命，猛促生产。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4544e404f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
