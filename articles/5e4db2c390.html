art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"集训自修双管齐下昆明部队学习毛主席著作强调持久深入","authors":["向克勤"],"parts":[{"type":"paragraph","text":"本报讯 集训为自修打基础，以自修巩固提高集训成果，昆明部队领导机关在某部队召开的现场会议上，研究确定了进一步深入学习毛主席军事著作的措施。"},{"type":"paragraph","text":"现场会议从3月11日开始，一共开了七天。从各单位反映的情况看来，干部、战士自觉地学习毛主席军事著作，已经形成了良好风气。全部队已有17％的干部参加了第一批集训，更多的干部则投入了自修活动。经过学习，各级干 部都有不同程度的提高。当前的问题是如何把这个学习活动推向新的高潮，持久深入地学下去；不仅学好还要用好，以毛主席军事思想指导今年训练和其他各项工作，推动更大更好更全面的跃进。现场会议交流了这方面的经验。"},{"type":"paragraph","text":"为了学好用好，现场会议上肯定了要抓思想，要讲方法。过去干部在学习中有两种情况是值得注意的：一种是缺乏认真读书的习惯，坐不下来，钻不进去，碰到问题就要求讲课，弄不通问题就失去信心；另一种是学了一点就自满。这两种情况都妨碍学好用好。到会的同志认为，各级中心领导小组，要深入实际抓思想，反复向干部说明学习毛主席军事著作的长远意义，不断总结推广个人读书、小组讨论等经验，这些作法，是使学习不断深入发展的重要保证。今后从集训转为自修时，更要加强对学习的领导。"},{"type":"paragraph","text":"现场会议肯定了：集训和自修结合，是尽快地帮助干部领会毛主席军事思想的有效方法，不论自修或集训，都应该贯彻独立思考、互助和鸣放争辩的群众路线方法。因此，就需要党委和首长统一安排工作、学习时间，制定计划，定一些必要的制度，及时解决学习中的疑难问题。"},{"type":"paragraph","text":"在总结交流经验的基础上，现场会议根据目前学习发展情况尚不平衡，提出了组织平衡的两条措施。第一，坚持集训和自修相结合的办法，年内使80％的干部能够得到集训机会。每次集训不少于二十个学习日，集训完毕就转入继续自修。此外，结合工作、编写教材条令、连以上合练，进行多次、数天的集中学习，使学用紧密结合。第二，党委挂帅，首长动手，当前抓好集训和宣传工作，常年抓思想，使学习落到实处。为了学好，各级都要注意汇集经验，解决干部工作和学习的时间矛盾。"},{"type":"paragraph","text":"参加现场会议的各单位，都制定了今后集训转入自修的学习计划。如某部根据今年学习的“中国革命战争的战略问题”、“论持久战”、“十大军事原则”以及林彪元帅的“战术思想与战斗作风”等几个文件，把自修重点确定为学习毛主席如何研究战争指导战争、建军原则与我军光荣传统、能动性在战争中的作用、作战原则、战斗作风等五个问题。在学习这几个问题的要求上，对营以上干部和连以下干部以及战士，都各有所侧重。他们准备紧接现场会议，大张旗鼓地掀起更大的学习高潮。 （向克勤）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e4db2c390"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
