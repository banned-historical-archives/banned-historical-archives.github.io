tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"结合实践经验活学活用毛主席哲学著作","authors":[],"parts":[{"type":"paragraph","text":"本报讯 南京部队炮兵党委，组织团以上单位党委书记，结合自己的实践经验，活学活用毛主席的哲学著作。他们的作法是：联系自己的亲身实践，带着一个问题，学习毛主席的一个哲学观点，总结一条经验，深刻领会毛主席的哲学思想。他们特别强调认真总结用毛主席哲学思想解决方向、路线问题的经验体会。在学习中，大家认真地用毛主席的哲学思想分析自己的思想和工作，“将丰富的感觉材料加以去粗取精、去伪存真、由此及彼、由表及里的改造制作工夫，造成概念和理论的系统”，实现从感性认识到理性认识的能动的飞跃。在各级党委书记同台讲用的大会上，大家踊跃发言。通过讲用，不仅使大家加深了对毛主席哲学思想的理解，而且进一步尝到了学习毛主席哲学著作的甜头，提高了学习自觉性。同志们用大量事实说明，认真学习毛主席的哲学著作，用辩证唯物主义和历史唯物主义武装头脑，对于执行毛主席的革命路线，坚持正确的政治方向，有着极其重要的意义。某部党委书记、政治委员郝光说：“毛主席的哲学著作战士要学，领导干部，特别是第一把手更要带头学。老干部要永葆无产阶级革命晚节，不学习毛主席的哲学著作不行，少学或不认真学不行！”大家一致表示，一定要为继续革命认真学习毛主席哲学著作，学一点，用一点，永不自满，永不停顿。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec92d99095"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
