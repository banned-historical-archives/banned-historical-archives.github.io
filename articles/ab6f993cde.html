script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"垄断资产阶级对国内人民的欺骗和镇压越来越不灵了美国人民强烈反对“选举”骗局 抗议美帝反动的对内对外政策","authors":[],"dates":[{"year":1968,"month":11,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京八日电　美国垄断资产阶级今年上演的总统“选举”丑剧，从一开始就遭到美国广大人民群众的强烈反对。美国各城市的人民群众连续举行声势浩大的示威游行，谴责“选举”骗局，抗议美帝国主义反动的对内对外政策。这是美国历史上从未有过的，充分说明美国人民正在迅速觉醒。"},{"type":"paragraph","text":"早在今年八月，美国垄断资产阶级的御用工具民主党和共和党分别在芝加哥和迈阿密召开“全国代表大会”，物色总统候选人时，芝加哥和迈阿密的电气安装工人就连续举行罢工，使这两个党的“代表大会”还未开场就碰到了重重困难。"},{"type":"paragraph","text":"共和党、民主党和新成立的独立党的总统候选人尼克松、汉弗莱和沃利斯在全国举行“竞选”活动时，到处遭到人民群众的反对。各地的示威群众还明确指出，美国总统“选举”完全是垄断资产阶级玩弄的欺骗美国人民的大骗局，所有美国总统候选人都是垄断资产阶级的奴仆，都是一丘之貉。"},{"type":"paragraph","text":"十一月五日，美国总统“选举”丑剧正式开演的时候，美国全国十几个大城市的成千上万的青年学生，再次走上街头，举行大规模的示威游行，焚毁美国星条旗和许多选票，表示抗议不民主的“选举”制度和反对统治集团反动的国内外政策，示威的学生同镇压他们的法西斯警察进行了英勇的搏斗。广大的美国人民还用抵制投票的行动来表示他们对美国总统“选举”丑剧的唾弃。"},{"type":"paragraph","text":"美国人民对美国统治集团策划的总统“选举”丑剧进行这样强烈的抵制和反对，这在美国是一个新的事物。这个新事物的出现说明美国垄断资产阶级对本国人民的欺骗和镇压都越来越不灵了，美国人民正处于新的觉醒之中。"},{"type":"paragraph","text":"我们的伟大领袖毛主席说:“在美国，另有一类人是真正有力量的，这就是美国人民。”随着美国人民觉悟程度的不断提高，他们的力量将进一步显示出来，美国反动派的日子越来越不好过了。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab6f993cde"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
