传部的覆示","authors":[],"dates":[{"year":1952,"month":5}],"is_range_date":false,"parts":[{"text":"中央关于学校三反运动问题给中南局宣传部的覆示","type":"title"},{"text":"中南局宣传部5月×日电悉。同意你们关于学校三反的计划。","type":"paragraph"},{"text":"（一）中等学校的三反运动和组织清理工作，以分批利用暑假、寒假集中进行为好，各省可视教师数量多少，划分区域集中在省会和专署区，由省委和有关的地委指定得力干部领导进行，在暑假前各省可选择一二学校试点，地委可以酌派干部参加，以便取得经验。这样不仅领导力量较强，并且比以学校为单位分散进行容易掌握。","type":"paragraph"},{"text":"（二）进行思想改造和清理组织时，原则上不要妨害教学计划的进行，不要停课，但在运动紧张时可以酌情停课几天，也不必硬性规定一二日，停课超过一星期以上者应经中央局批准。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5fe8f78e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
