" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"薄一波对北京地质学院问题的批示","authors":["薄一波"],"dates":[{"year":1966,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"薄一波对北京地质学院问题的批示","type":"title"},{"text":"薄一波","type":"authors"},{"text":"六月二十二日，薄一波作了一个对北京地质学院问题批示，批示全文如下：","type":"appellation"},{"text":"人林同志并长工、光义同志：","type":"appellation"},{"text":"应该明确答复学生，李主任讲的话是对的。工作组是上级党委派去的，它是代表党组织工作的，要号召左派起来跟工作队一起进行文化大革命，如果院党委有问题了，派工作队去行使党委职权，这就是等于夺回了党的领导权。如果再有人非赶走工作队不可，那势必是夺工作队之权，亦即夺党的领导权，那么谁来掌权呢？工作队有缺点、错误，可以改正，但不能给工作队随便加上什么“保皇派“之名称。","type":"paragraph"},{"text":" 薄一波6月22日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2412b17bf5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
