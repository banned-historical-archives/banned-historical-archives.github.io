art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的革命文艺路线胜利万岁革命现代舞剧《白毛女》彩色电影剧照","authors":["新华社"],"parts":[{"type":"paragraph","text":"图为王大春满怀阶级仇、民族恨参加了八路军。在毛主席革命路线的胜利指引下，大春已成长为一个具有高度无产阶级觉悟的八路军指挥员。"},{"type":"paragraph","text":"图为喜儿怒指远去的黄家走狗，激昂高歌：“想要逼死我，瞎了你眼窝，我是舀不干的水，扑不灭的火，火不灭，水长流，世世代代的仇恨啊，我永远刻心头！要报仇！要报仇！”"},{"type":"paragraph","text":"图为出外躲债的老贫农场白劳，手里拿着扁担，顶风冒雪，赶回家来。"},{"type":"paragraph","text":"图为毛主席领导的八路军使喜儿获得了解放。历尽苦难的喜儿，终于认出了大春。喜儿向大春愤怒地诉说着汉奸恶霸地主的罪恶。"},{"type":"paragraph","text":"图为一轮红日从万山丛中升起，灿烂的金光普照大地。翻身的喜儿和乡亲们满怀激情地迎向红太阳。“啊！——敬爱的毛主席，人民的大救星。”"},{"type":"paragraph","text":"图为大春激昂地对乡亲们说，毛主席指出了革命真理：“枪杆子里面出政权”。军民决心打倒日本帝国主义，严惩汉奸恶霸地主，团结一条心，跟着毛主席，永远向前进。"},{"type":"paragraph","text":"图为千年的仇要报，万年的冤要伸！斗争会上，喜儿的强烈控诉，激起了八路军指战员和乡亲们满腔的阶级仇、民族恨，群情激愤，怒火万丈。"},{"type":"paragraph","text":"图为多少喜儿翻了身，锦绣河山放光彩。喜儿紧握枪杆子，参加了八路军。大春命令队伍前进。这支队伍将永远跟着毛主席、共产党，誓把革命进行到底！"},{"type":"paragraph","text":"（本报照片均为新华社稿）"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e88006d486"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
