<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"北京市劳资关系中的三种不正常现象","authors":[],"dates":[{"year":1952,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"北京市劳资关系中的三种不正常现象","type":"title"},{"text":"【本刊讯】目前北京市劳资关系呈现下面三种不正常的现象：","type":"paragraph"},{"text":"一、劳动纪律松弛。五反后，私营厂店一般都存在劳动纪律松弛现象，小铺作坊更较严重，在商店中又比工厂中更为严重。特别在没有活干的工厂中，更突出地表现了散漫。劳动纪律松弛主要表现在工作时间随便外出和工作中懒散马虎。如十区新朝阳鞋店工人李炳辰是工会主席，不关心营业，向资方借车子，以开会为名经常外出，不是串亲戚，就是找朋友。一区鸿升祥布店工人，早上睡到十二点，下午六点去上学；掌柜的在家扫地和上门。六区同益祥线店学徒梦玉文每天在柜上不是看报就是写条子骂资本家，有时出外蹓跶就是半天。八区贾云成织工厂有一工人不干活，他说：“工人当家作主，愿干就干，不愿干就不干。”","type":"paragraph"},{"text":"少数工会干部对政府“包下来”的政策有不正确认识，认为自己是积极分子，搞垮了这个买卖，马上会转到公营企业去。如八区聚宝木厂工会主席师立恭自己想到公营工厂，催着资本家去报歇业。","type":"paragraph"},{"text":"二、限制资方经营管理权。产生这种现象的原因，主要是工人店员对于“工人阶级的领导和监督”有不正确的看法，怕资方抽资金搞垮买卖后失业；其次是由于某些报复心理，认为过去你对我这样，今天可该出出气了。如九区双顺兴大车铺工人把资本家的账目和伙食都掌握过来，结果使资本家钻空子说：“你们管吧，没办法你们自己想去。”一区徐顺公西服店经理支钱要先和店员商量，要早吃饭都要经工人同意。八区国药业工人商量搞联营，不要资本家，拟以同寿堂为制药部，同秦堂、同达堂为门市部。吴韦华织布厂工人不叫资本家吃饭说：“你走吧，你别干活，别吃饭。”六区有的工人提出“不劳动不得食”！“不准我动你不动”！有的认为“五反前柜上资本家当权说了算，五反后柜上工人当权说了算”。大同电料行工人准备不再让资方掌管经营的事，“经理得听工人的”，“支使他干活，他就得干活”。有些人甚至干预资本家的家务和生活小事。","type":"paragraph"},{"text":"三、要求过高的工资与福利。五反中和五反后私营厂店工资一般都自发的进行了调整，如七区食品业十个小型行业中调整了工资的占百分之七十五点三；贸易业七个行业中调整了工资的占百分之八十三点三；其他行业调整的都在全部职工的百分之五十以上。其中工资最高的增加到百分之五百(钢铁锡业)，最低的为百分之一百○八(木梳业)，一般的都在百分之一百六十左右。这次自发的调整工资，据调查一般是适当的，但过高与追补倒算的现象也同时存在。","type":"paragraph"}],"comments":[],"origin":"1952年5月17日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"864677a343"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
