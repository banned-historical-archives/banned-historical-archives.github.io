" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来陈伯达在李先念检讨大会上的讲话","authors":["周恩来","陈伯达"],"dates":[{"year":1967,"month":8,"day":17}],"is_range_date":false,"parts":[{"text":"周恩来陈伯达在李先念检讨大会上的讲话","type":"title"},{"text":"周恩来陈伯达","type":"authors"},{"text":"陈伯达讲话","type":"subtitle"},{"text":"我认为李先念同志的检查是好的。同志们应该欢迎李先念同志的自我批评，同时希望李先念今后多到各部里面去，能听取同志们的意见，随时发现、改进自己工作中的缺点和错误。","type":"paragraph"},{"text":"祝同志们好！","type":"paragraph"},{"text":"我们伟大的导师、伟大的领袖毛主席万岁！","type":"paragraph"},{"text":"战无不胜的、光焰无际的毛泽东思想万岁！","type":"paragraph"},{"text":"周总理讲话","type":"subtitle"},{"text":"我完全同意伯达同志刚才讲的很好的几句话。今天的会证明我们经过半年多的奋斗以求的有了初步的结果，但这仅仅是开始。李先念同志的检查是好的，是得到我们伟大领袖毛主席批准的。但是我们一定要认识到如同主席所说的“情况是在不断地变化，要使自己的思想适应新的情况，就得学习。”正因为这样，先念的检查是推迟了，当然有许多客观原因，也有主观原因喽。现在，无产阶级文化大革命正在蓬勃深入开展，我们的领导同志，首先到群众中去，那么先念同志这次检查后首先到财贸系统各部里、各学校里去。先念同志也对我说过他要到各部里、各学校里听取群众意见，向你们学习，就可以使思想前进。同时要向毛主席、林副主席学习。学习主席著作要在用字上狠下功夫。遇到问题向主席请示，向领导同志请教，这就是我们常说的“相信群众，相信党”。我们不仅要求先念同志这样做，我们自己也要这样做。我们主席台上坐着的，都是受主席党中央委托的，都要兢兢业业地不断学习和改造。向你们学习。学到老，做到老，改造到老。如果坐在上边遇事不调查就随随便便发号施令，是危险的，这样要犯错误，可能被你们批判，以至非打倒不可！最后让我们呼几个口号：","type":"paragraph"},{"text":"无产阶级革命派联合起来！","type":"paragraph"},{"text":"彻底粉碎党内一小撮走资派！","type":"paragraph"},{"text":"打倒刘邓陶！","type":"paragraph"},{"text":"伟大的毛主席万岁！万岁！万万岁！！","type":"paragraph"}],"comments":[],"origin":"国务院财贸系统革命造反联络委员会主办《财贸红旗》 1967年8月30日第9期第1版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"李先念","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"899036e2f5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
