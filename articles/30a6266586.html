script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝执行协定中央联委会各爱国力量方面代表团发出抗议书强烈谴责万象极右分子阴谋暗杀活动","authors":[],"dates":[{"year":1974,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社万象一九七四年十二月三日电　据《巴特寮新闻》报道，老挝执行协定中央联合委员会各爱国力量方面代表团，十二月二日向万象方面代表团递交了一份抗议书，强烈谴责万象极右分子阴谋暗杀民族政治联合委员会成员的行径。"},{"type":"paragraph","text":"抗议书说，十一月二十八日深夜至二十九日凌晨，万象极右分子在民族政治联合委员会成员西萨旺·占蒂瓦和坎潘·辛玛拉冯的汽车上放置了一枚炸弹和一封恐吓信。炸弹在二十九日凌晨爆炸，西萨旺和坎潘先生的汽车和车库遭到严重破坏。"},{"type":"paragraph","text":"抗议书指出，万象极右派的上述行动严重违反了万象协定、议定书和关于使两城市中立化的各项规定，侵犯了老挝人民的自由民主权利，是对维护两个中立化城市的人士，特别是对民族政治联合委员会成员的威胁和谋害。"},{"type":"paragraph","text":"抗议书要求执行协定中央联合委员会万象方面代表团立即对上述事件进行调查，并制止类似事件的继续发生。"},{"type":"paragraph","text":"抗议书还说，如果万象方面不及时制止类似事件的发生，万象方面就必须对由此而引起的严重后果承担一切责任。"},{"type":"paragraph","text":"另据万象报纸报道，万象市各界人士和各群众团体近日来也纷纷发表讲话和声明，强烈谴责万象极右分子阴谋暗杀民族政治联合委员会成员的无耻行径。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30a6266586"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
