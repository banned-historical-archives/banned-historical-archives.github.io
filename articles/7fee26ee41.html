art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"外国朋友热烈欢迎我彩色影片《东方红》对于“四人帮”压制这样好的影片表示很愤慨","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 中国驻刚果、芬兰、丹麦、瑞士使馆，最近分别为外国朋友放映了中国大型音乐舞蹈史诗、彩色影片《东方红》，受到了热烈的欢迎。许多外国朋友对于“四人帮”压制这样好的影片表示很愤慨。"},{"type":"paragraph","text":"刚果外交部长泰奥菲尔·奥本加、初等和中等教育部长弗朗索瓦·奥科博等刚果党、政、军官员约二百人，二月十一日出席了中国驻刚果大使李连璧举行的电影招待会，观看了彩色影片《东方红》。热烈鼓掌，赞扬伟大领袖和导师毛泽东主席、敬爱的周恩来总理和其他老一辈革命家为中国革命建立的丰功伟绩，丹麦朋友对“四人帮”疯狂反对和长期压制这样的好影片非常气愤。芬兰朋友赞扬影片《东方红》，并且谴责“四人帮”蛮横地禁演这部电影和破坏毛主席革命文艺路线的罪行。日内瓦朋友说，《东方红》显示了毛泽东主席的英明伟大。旅居奥地利的华侨观看了《东方红》热情赞扬毛主席、周总理、朱委员长等无产阶级革命家建立的丰功伟绩。他们说，我们衷心拥戴华国锋主席领导中国人民一举粉碎“四人帮”，对粉碎“四人帮”，我们华侨感到非常欢欣鼓舞。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fee26ee41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
