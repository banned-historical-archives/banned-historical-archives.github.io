script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抵制资产阶级法权思想侵蚀　坚持乡村干革命","authors":[],"dates":[{"year":1975,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抵制资产阶级法权思想侵蚀　坚持乡村干革命"},{"type":"paragraph","text":"新溪公社下乡知识青年认真学习无产阶级专政理论，决心用实际行动批判林彪反党集团污蔑知识青年上山下乡的罪行"},{"type":"paragraph","text":"据新华社杭州一九七五年三月十六日电　浙江省吴兴县新溪公社下乡知识青年联系知识青年上山下乡问题上的两个阶级、两条路线斗争实际，认真学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的论述，更加坚定了扎根农村干革命的决心，表示坚持走与工农相结合的道路，为巩固无产阶级专政而努力奋斗。"},{"type":"paragraph","text":"一九六八年以来，先后有三百六十多名城镇知识青年来到新溪公社插队落户。毛主席关于理论问题的指示发表以后，各大队下乡知识青年立即组织学习。最近，公社党委先后两次召集全体下乡知识青年举行学习会，深入讨论对资产阶级专政的必要性和重要性。许多知识青年在学习中指出，社会主义是刚从资本主义社会脱胎而来的，在经济、道德和精神等方面，都还带着旧社会的痕迹，存在着资产阶级法权，存在着滋生资产阶级和资本主义的土壤。作为一个革命青年，一定要认真学习无产阶级专政的理论，为铲除旧社会的痕迹而斗争。女青年章丽下乡以来，虚心向贫下中农学习，努力改造世界观，坚定不移地走与工农相结合的道路，光荣地加入了中国共产党。她在学习、讨论时说，广大知识青年上山下乡，是对缩小三大差别、限制资产阶级法权有深远意义的伟大事业。我们一定要遵照毛主席的指示，认真看书学习，从理论上搞清楚对资产阶级专政的问题，更加自觉地坚持乡村，走与工农相结合的道路。"},{"type":"paragraph","text":"在学习过程中，新溪公社下乡知识青年进一步深入批判了林彪反党集团污蔑知识青年上山下乡这一新生事物的罪行。大家说，林彪反党集团污蔑知识青年上山下乡“等于变相劳改”，其罪恶目的就是妄图用资产阶级法权思想腐蚀青年，挑拨知识青年同党的关系，就是要扩大城乡之间、脑力劳动与体力劳动之间的差别，把知识青年变成新的贵族阶层，为他们颠覆无产阶级专政，复辟资本主义服务。在批判中，他们还用大量事实说明知识青年上山下乡走与工农相结合的道路，是培养无产阶级革命事业接班人、反修防修的一条重要措施。幸福大队的知识青年们说，我们一定要在这条光辉大道上走下去，用实际行动来回击林彪反党集团。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45a0ffe91e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
