<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"跳出资产阶级的旧框框","authors":["马咏"],"dates":[{"year":1975,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"茂名南路第二小学教师"},{"type":"paragraph","text":"读了《发人深思的事情》一文以后，很受启发。这里仍然是一个用什么尺子衡量学生的问题，反映了学校里修正主义教育路线的流毒还是很深的，资产阶级偏见还是很顽固的。"},{"type":"paragraph","text":"我是文章中提到的三位红小兵的班主任，对他们的看法，自己也有一个转变的过程。开始时，我听到他们智擒一个罪大恶极的反革命分子的事迹后，认为抓阶级敌人是好事，但又感到他们中有个学生其他方面表现没啥好，并有不少缺点，如果表扬他担心会有反复，过不硬，觉得在学校红小兵大会上表扬，已经算不错了。"},{"type":"paragraph","text":"后来，学校党支部组织大家学习革命理论，联系三名红小兵捉坏蛋的事例，展开了“用什么样的标准来看学生”的专题讨论，使自己受到了很大教育。我认识到，我们教师应该从反修防修，巩固无产阶级专政的高度来要求学生，应该用党的教育方针来衡量学生。显然，自己过去对这个学生的看法是不全面的。"},{"type":"paragraph","text":"我认真回忆了一下，这个学生真的没啥好吗?有一次接待外宾，他就能主动、热情、大方地邀请外马咏宾一起打羽毛球。还有一次，上课时，我发现一个同学不注意听讲，在做其他作业，我就很生气地指出:“以后再这样，你的本子我就不批改了。”顿时，全教室肃静，唯独这个学生站出来理直气壮地向我指出:“老师，这样做不能解决同学的思想问题，你不改本子是不对的。”这种可贵的革命精神，为什么我过去看不到呢?正如毛主席教导的那样:“这些同志看问题的方法不对。他们不去看问题的本质方面，主流方面，而是强调那些非本质方面、非主流方面的东西。应当指出:不能忽略非本质方面和非主流方面的问题，必须逐一地将它们解决。但是，不应当将这些看成为本质和主流，以致迷惑了自己的方向。”在这个学生身上什么是本质和主流?通过学习毛主席著作，我认真思考后，认识到这个学生对错误的东西敢顶、敢闯，敢向坏人坏事作斗争，这些一就是他身上的本质和主流，而他身上所存在的一些缺点、错误，主要是由于旧思想的侵蚀，加上我们教师缺乏深厚的无产阶级感情，没有满腔热情地关怀他，帮助他克服。这是我们教师的责任。过去，我就是被一些非主流和非本质的东西迷住眼睛，得出了不正确的结论。"},{"type":"paragraph","text":"通过学习、讨论，我认识到自己的世界观和教育观还存在严重的问题。自己平时往往从本子上、课堂上来看学生，用“安静”和“听话”的标准来要求学生。由于尺子不对头，看到的往往只是个别学生身上的缺点、错误，对于他们的点滴进步，就不善于发现，即使发现了也觉得无所谓，根本不重视。这说明我还没有跳出资产阶级的旧框框。虽然自己在道理上也懂得，今天我们要培养的是小老虎，而不是“五分加绵羊”式的学生，但实际上却往往满足于“上课安安静静，下课太太平平，校外不出事情”，欣赏的还是那些死啃课本、上课安静、下课太平的学生，而对头上长“角”、身上长“刺”的学生，就感到头痛。我今后一定要努力学习革命理论，认真接受工农兵的再教育，刻苦改造自己的世界观和教育观，按照党的教育方针，努力培养出党所需要的又红又专的革命接班人。"},{"type":"paragraph","text":"马咏"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed9292b367"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
