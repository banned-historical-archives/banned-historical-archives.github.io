script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“马来亚革命之声”揭露英帝和拉赫曼集团剥削和迫害橡胶工人的罪行  号召工人阶级在马共领导下组织起来为争取民族解放同敌人展开英勇斗争","authors":[],"dates":[{"year":1970,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“马来亚革命之声”揭露英帝和拉赫曼集团剥削和迫害橡胶工人的罪行"},{"type":"paragraph","text":"号召工人阶级在马共领导下组织起来为争取民族解放同敌人展开英勇斗争"},{"type":"paragraph","text":"新华社讯　“马来亚革命之声”电台最近广播文章，揭露英帝国主义及其走狗拉赫曼—拉扎克集团对马来亚橡胶工人的残酷剥削和迫害。文章号召工人阶级发扬光荣的斗争传统，在马来亚共产党的领导下，为争取马来亚各族人民的解放而斗争。"},{"type":"paragraph","text":"文章说，马来亚是一个大量生产橡胶的国家。但是，它的几百万英亩的橡胶园绝大部分被英国垄断资本集团所霸占，以印族群众为主体的几十万橡胶工人世世代代当奴隶。他们在英国垄断资本和马来亚买办资本的残酷剥削和疯狂迫害下，过着牛马不如的生活。"},{"type":"paragraph","text":"文章说，英国垄断资本和马来亚官僚资本，靠敲骨吸髓的残酷剥削手段，养肥了自己。一个橡胶工人每月的实际收入，高的是六、七十元（马来亚币，下同），低的只有三、四十元。但是，一个橡胶工人家庭如果每天只吃两顿饭，单单买米，每月就要花四、五十元。此外，橡胶工人，尤其是印族工人的居住条件也极其恶劣，在许多橡胶园里工人连饮水都成问题。加上工作劳累，营养不良，橡胶工人们的健康受到很大的损害，患有多种疾病。"},{"type":"paragraph","text":"文章说，拉赫曼—拉扎克傀儡集团变本加厉地推行民族压迫政策，野蛮地迫害华族、印族和其他民族人民。在一九六九年短短的几个月里，他们就剥夺了十几万华、印族工人的工作权，其中印族橡胶工人就有五、六万人被剥夺了工作权。这些祖祖辈辈从事橡胶生产劳动的印族工人，在拉赫曼—拉扎克傀儡集团的所谓“工作准证”制度下，被列为“非公民”，因而常常被反动当局遣返印度，实际上就是把他们变相地驱逐出境。这种蛮横无理的暴行激起了橡胶工人的极大愤慨和反抗。"},{"type":"paragraph","text":"文章指出，有压迫就有反抗。马来亚各族橡胶工人向来都有团结一致，英勇斗争的精神。印族橡胶工人象其他民族的橡胶工人一样，具有光荣的斗争传统。他们为了争取民族的解放，数十年来，特别是马来亚共产党成立以来，一直进行着英勇的斗争。成千成万的印族橡胶工人同其他民族的橡胶工人一起，曾经举行过千百次罢工斗争和游行示威。他们不顾反动军警的驱逐、逮捕、监禁和枪杀，勇往直前，英勇不屈。"},{"type":"paragraph","text":"文章最后说，印族橡胶工人从世世代代的悲惨遭遇中深深体会到，在英帝国主义和拉赫曼—拉扎克傀儡集团的残酷统治下，他们的唯一出路，就是在马来亚共产党的领导下，组织起来，为争取民族的解放，同万恶的敌人展开英勇的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1a9cd0a39"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
