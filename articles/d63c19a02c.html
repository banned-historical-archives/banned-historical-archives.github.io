<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中南局对河南省委关于停止“五反”的报告的批示","authors":[],"dates":[{"year":1952,"month":12,"day":7}],"is_range_date":false,"parts":[{"text":"中南局对河南省委关于停止“五反”的报告的批示","type":"title"},{"text":"河南省委并各省市委并报中央：","type":"appellation"},{"text":"（一）你们关于停止“五反”的报告是正确的，望即贯彻实施。","type":"paragraph"},{"text":"（二）报告中所提具体措施亦很好。如此做，既可使一般小城镇的紧张空气缓和下来，以利市场之活跃，同时又照顾了群众热情，注意到预防资产阶级的故态复发。这一办法各地均可仿行。","type":"paragraph"},{"text":" 中南局","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"河南省委关于停止“五反”的报告","type":"subtitle"},{"text":"（1952年11月3日）","type":"subtitle"},{"text":"（一）我省郑、汴、许3市，已于7月结束“五反”运动，其他城市于6月初根据中央、中南指示，暂时停止“五反”，但受到的震动很大。工商业者消极等待过关，隐藏资金，工人店员要求“五反”，大有跃跃欲试之势；少数干部对接受暂时停止“五反”，大力活跃市场经济的指示，不够坚决认真，如擅自进行清补偷漏税运动和其他一些变象“五反”等；加之机关“三反”运动的定案追赃又打击了一些工商业者。这样就造成了小城市及小集镇长期的紧张空气，从目前看，对于我们活跃市场经济、开展物资交流是十分不利的。同时，鉴于这些小城市和大集镇是沟通城乡关系的纽带，担负着活跃城乡经济的重要作用，而那里的工商业者一般资金不大，因而五毒并不象大城市严重，为此，我们拥护在这些中小城市和大集镇内，执行中央10月25日批示，廖鲁言同志报告的精神，一律宣布结束“五反”，使工商业者安心经营，促进城市物资交流和经济生活的活跃。至于某些城市中的五毒严重的工商户可于明年选择适当时机，经省委批准，用几天工夫通过以教育为主的适当形式，组织这些违法户坦白检讨五毒行为，一般不予处罚，但必须保证今后不再重犯。","type":"paragraph"},{"text":"（二）在执行中央结束小城镇“五反”指示时，首先必须向广大城镇干部、工人店员作深入动员。从整体利益出发，去领会中央指示的积极意义，防止可能发生的抵触情绪和某些工商业者据此而叫嚣“五反”错误的滥调。其次教育全党干部，不能因此产生对资产阶级违犯共同纲领的行为不需要再进行斗争的错误，从搞过“五反”的郑、汴、许3市来看，已发现有偷漏税的现象，因此，要随时提高警惕性，防止资产阶级再施五毒，开展必要的斗争。并把这一斗争，经常坚持下去，以斗争达到团结资产阶级与发挥其正当经营的积极性。同时还应该通过工商联、民主建国会等组织，教育工商业者，知宽而感，服从国营经济的领导，遵守共同纲领，不再施行五毒。并组织他们的积极分子，开展内部的反对五毒斗争。","type":"paragraph"},{"text":"（三）郑、汴、许3市“五反”后的追交补退罚款工作，截至10月底止，仅完成应交户的40％（1161户），应交款数的20．25％（1195930万元）。这种情况必须予以重视并切实加以解决。凡有力补退而故意拖延者，必须按期追交：目前确实有困难者，可允许其分期或缓期缴纳，但应规定期限；个别户确系当时夸大而本人要求复查者，同时确查明需要复查者，亦可予以复查，但必须慎重从事，不要形成运动，免被不法资本家假象蒙混，陷自己于被动局面。","type":"paragraph"},{"text":"以上当否请中南局指示。","type":"paragraph"}],"comments":[],"origin":"河南省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d63c19a02c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
