uthors":["山西农学院","朱先煌"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——“共产党用不着你时就一脚踢开”","type":"title"},{"text":"山西农学院朱先煌","type":"authors"},{"text":"（朱先煌：山西农学院教务长、民盟支部主任委员）","type":"subtitle"},{"text":"共产党就是这样，用着知识分子了，就抱在怀里给你住最好的房子，用不着你时，就一脚踢开；党虽然给了知识分子很高的地位，但是有职无权，没有重视，没有温暖，相反还给挂上了个“可疑人”的牌子，一直没有给摘下来。因此，知识分子对党的态度是“有情芍药含春泪，无力蔷薇卧晚枝”。","type":"paragraph"},{"text":"靠近党的知识分子有“泪”，积极性提不起来，和党有距离的知识分子更是卧倒了，没有一点积极性。知识分子的自尊心被损害了。","type":"paragraph"},{"text":" 来源：《“鸣”、“放”选集（二）》（中共山西省委整风办公室编，1957年9月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cba70d9e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
