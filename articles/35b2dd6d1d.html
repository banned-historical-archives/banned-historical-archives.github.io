声中走进剧场　周恩来陈伯达康生李富春董必武李先念聶荣臻谢富治江青等同志一起观看演出","authors":[],"dates":[{"year":1967,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京22日电　我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪同志，今晚观看了上海京剧院演出的革命现代京剧《海港》。"},{"type":"paragraph","text":"毛主席神采奕奕，在《大海航行靠舵手》的乐曲声和热烈的欢呼声中走进剧场。帷幕拉开，参加演出的一些演员列队站在台前，怀着对伟大导师毛主席无限敬仰、无限热爱的心情，手捧革命宝书，朗诵毛主席的教导，并且同全场观众一起欢呼:“敬祝我们心中最红最红的红太阳毛主席万岁!万岁!万万岁!”"},{"type":"paragraph","text":"同毛主席和林彪同志一起观看演出的，还有周恩来、陈伯达、康生、李富春、董必武、李先念、聂荣臻、谢富治、江青、萧华、杨成武、邓颖超、张春桥、王力、关锋、戚本禹、叶群、汪东兴等同志。"},{"type":"paragraph","text":"演出结束以后，毛主席同林彪、周恩来、陈伯达、康生、李富春、董必武、江青等同志，走上舞台，同演员们亲切握手，并和大家合影。演员们挥动红彤彤的《毛主席语录》，激动地一遍又一遍地高呼:“毛主席万岁!”“毛主席万万岁!”"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\06\\676n010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪同志，以及周恩来同志等，六月二十二日晚观看了上海京剧院演出的革命现代京剧《海港》以后，走上舞台，同演员们合影。(新华社传真　钱嗣杰摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"李富春","type":"人物"},{"name":"李先念","type":"人物"},{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35b2dd6d1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
