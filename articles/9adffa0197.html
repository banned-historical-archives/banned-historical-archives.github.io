script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共贵州省委监察委员会关于安顺地委监委开除盗窃犯李德村党籍的通报","authors":[],"dates":[{"year":1962,"month":10,"day":20}],"is_range_date":false,"parts":[{"text":"中共贵州省委监察委员会关于安顺地委监委开除盗窃犯李德村党籍的通报","type":"title"},{"text":"为了对党员、干部进行遵守党纪国法的教育，特将安顺发委监委“关于开除盗窃犯李德村党籍的决定”通报如下：","type":"paragraph"},{"text":"安顺市城关税务所秘书李德村，原在安顺市商业局党总支办公室任秘书（总支委员）时，于一九六一年十二月五日午夜扒窗入室，破坏木质保险柜，盗窃布票四万七千七百二十市尺，棉花票七百九十六张（可购棉花三百九十八斤）。于一九六一年古历腊月先后三次勾结私商出售布票一千六百市尺，获赃款一千六百元。一九六二年春节，借看病为名，曾两次到贵阳出售布票三万三千尺，共获赃款二万三千元和部分赃物。同时贩卖大烟三两和糖精等，共获利三百四十元。经公安部门对其进行搜查，共查出布票一万二千三百四十七尺，现金一万七千六百九十六元，黄金二两，大洋三十元，小洋十八元，手表二块，收音机一部，高级象牙麻将一付以及电炉、糖精、衣物等大批赃物。","type":"paragraph"},{"text":"李德村盗窃犯罪不是偶然的，早在一九五九年出差至贵阳工作时，曾盗窃省人委旅差空白单据伪造发票贪污公款，受党内警告处分。在国家物资暂时困难的时期，又利用职权大“走后门”，党的组织虽然对其进行严肃的处理，但他不接受党的教育，反而变本加厉，进行盗窃国家财产，以致堕落成为犯罪分子。经安顺地委监委决定并报地委批准，开除其党籍，逮捕法办。","type":"paragraph"},{"text":" 一九六二年十月二十日","type":"paragraph"},{"text":"报：省委，中央监委，西南局组织部监察处。发：省委各部委，省级机关各厅（局）机关党委（总支），各地（州、市）、县（市、区）委监委，厂矿党委监委，省委监委党委、处（室）。（共印300份）","type":"paragraph"},{"text":"中共贵州省委监委办公室 一九六二年十月二十二日印发","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9adffa0197"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
