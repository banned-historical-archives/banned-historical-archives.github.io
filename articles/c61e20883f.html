<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"有声有色有理有力，上海围剿右派之战打得漂亮","authors":[],"dates":[{"year":1957,"month":9,"day":4}],"is_range_date":false,"parts":[{"text":"有声有色有理有力，上海围剿右派之战打得漂亮","type":"title"},{"text":"【文汇报讯】 以反右派为中心、历时十七天的市二届二次人代会会议已于昨天下午胜利闭幕。经过这场前所未有的大辩论，上海的右派阵线已告总崩溃，群众斗志昂扬，热烈欢呼反右派斗争的又一次重大胜利。","type":"paragraph"},{"text":"这场为了辨明大是大非的全民性论战，是两个月来上海各条反右派战线的总会师。代表们带来了全市人民的嘱托、充分的材料证据和丰富的斗争经验，在庄严的讲坛上和右派分子进行决战。参加这场战斗的，有一千多人民代表和列席人员。在九天预备会议的小组会上，发言的代表和列席人员达三千多人次；在八天的正式会议中，有七百七十人次单独或数人联合作了三百三十篇的发言。发言人代表了工人、农民、高教界、文艺界、新闻界、宗教界、工商界、少数民族等各个方面。会议规模之大和发言人的踊跃程度，为历次人代会会议所不曾有过。全上海七百万市民密切地注视着这场斗争，每天都有许多信件和揭发材料送到会场。会内会外相互配合，形成了反击右派的浩大声势。","type":"paragraph"},{"text":"在这十七天的激烈论战中，自始至终贯彻了摆事实、讲道理的精神。大会允许右派分子充分阐述自己的论点，拿出证据，甚至允许他们请人为自己辩护。代表们对右派分子的反动言行，从具体事实的揭露到反动论点的一一批驳，针锋相对，绝不容其偷偷滑过。在一些问题上，经过反复地对质和激辩，尽管右派分子且打滚且作战，步步为营，最后也不得不在大量事实和真理面前败下阵来。准备向上海人民挑战的右派骨干分子彭文应，在预备会上以长达两个半小时的时间宣扬他的资产阶级观点，经过代表们四天半的论战，这些反动观点已被驳得体无完肤；可是在大会讲坛上，他还不断地进行狡赖和反扑。被激怒了的代表们，找出二十多年前他污蔑党、污蔑社会主义的文章和他对证，当场拆穿他的赖、逃、颠倒是非等一套无赖手法，并且从他对干部政策、民主、新闻自由等问题发表的一系列谬论进行深刻的分析、批驳，彻底地揭破了他的丑恶面目。在众目睽睽之下，彭文应不敢再走上大辩论的讲坛，他向大会主席团递了申请书，表示“要彻底的全部交代”，要求另给他一个时间。而另一些右派分子，在几个月前曾经是“风云一时”的人物，但在这次会议上，经过反复争辩、反复批驳，被驳得语无伦次，丑态毕露，陷于完全孤立的境地，最后不得不低头认输，向人民请罪。作为上海反共反社会主义主力的章罗联盟上海小集团，现在已经彻底分化瓦解，阴谋暴露无遗。","type":"paragraph"},{"text":"所有的代表和全市人民都在这场大辩论中受到了一次深刻的社会主义教育。那些原来对反右派斗争的意义认识不足的代表，随着斗争的深入和右派分子丑恶面目的暴露，逐渐认识到这是保卫社会主义道路的大是大非的斗争，绝不能袖手旁观，绝不能有温情主义。著名京剧演员俞振飞代表说，年岁在五十以上的人，因为过去受的大都是封建教育，喜欢讲究“忠恕”之道，对反右派斗争也是这样。但是，俞振飞代表强调地说，如果对右派分子讲“忠恕”，那就是对人民没有心肝!一个医学界代表在反右派斗争开始时，曾怕伤害了右派分子的“羽毛”。但经过斗争锻炼后，他明白地表示说:“右派分子是狼，一定要狠狠地打!”为了给予右派分子以狠狠的打击，许多代表在假日里外出收集材料，赶写发言提纲，许多代表利用会议间歇时间，研究右派分子材料，准备投入斗争。七十多岁的文物考古学家徐森玉患有风湿症和高血压症，在大会上本已作了一次发言，后来听了彭文应在大会的狡辩后，捺不住心中怒火，又一次登台驳斥，他说:“在这场生死斗争中，我不能沉默!”","type":"paragraph"},{"text":"这次斗争对知识分子的影响是尤其深刻的。许多代表以知识分子必须进行自我改造为中心内容在大会上发了言。他们普遍认识到，要过好社会主义这一“关”，必须站到工人阶级的立场上来，建立工农劳动人民的思想感情，坚决投入反右派斗争，在斗争中锻炼改造自己，使自己成为工人阶级的知识分子。","type":"paragraph"},{"text":"一些有严重右倾思想、在大鸣大放中有过错误言行的人，通过这场斗争，觉悟过来，自动在大会作了检查，感激党把他们从危险的边缘上挽救了过来，并投入了斗争。","type":"paragraph"},{"text":"这次人代会会议用摆事实、讲道理的方式进行反右派斗争，获得辉煌的胜利，为反右派斗争创造了一个成功的范例，从而把全市反右派斗争推向了新的高潮。","type":"paragraph"},{"text":" ——原载《文汇报》1957年9月4日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c61e20883f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
