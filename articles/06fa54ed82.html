art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"领袖的著作照亮了心军事学院以毛主席军事著作为指针编写教材","authors":["胡奇坤"],"parts":[{"type":"paragraph","text":"在去年五个文件的学习和整风中批判了教学工作上脱离实际的教条主义倾向以后，学院领导上深刻感觉到学习毛主席军事著作的重要性。去年下半年，他们便着手进行学习毛主席军事著作的准备工作。由训练部和科学研究部制订教育计划，编写参考资料，开办教员轮训班。到目前为止，他们已轮训了二百三十多个教员，并计划在今年内将全部教员轮训完毕。"},{"type":"paragraph","text":"学员学习毛主席军事著作，共分四个单元：第一单元学习“中国革命战争的战略问题”；第二单元学习“论持久战”；第三单元学习“十大军事原则”；第四单元学习彭德怀元帅所作的有关报告的文件。"},{"type":"paragraph","text":"初步学习了毛主席军事著作以后，很多教员和学员反映“思想亮堂了”。在教学中，大家敢于对不切合我军实际的训练内容提出批判，也敢于大胆提出自己的主张。同时，教员开始以毛主席军事思想作指针，根据我军经验和现实情况，吸收苏军的先进经验，动手编写新的教材。现在已经编写出：“诸兵种合同战斗概则”、“进攻战斗原则”、“防御战斗原则”和各兵种使用原则等教材的初稿。他们在这些教材中，把我军的优良传统和战斗经验恰当地运用进去了。如把我军的传统的领导制度——党委集体领导下的首长分工负责制，贯串体现在整个教材中；在“诸兵种合同战斗概则”教材“胜利的保障”一章中，党的领导作用和政治工作被强调地提出来了。在战术上，也贯彻了我军优良的战术思想。进攻时，不仅有在战役纵深内大量合围歼灭敌人的内容，而且有在战术纵深内各个歼灭敌人的内容；有阵地进攻，也有运动进攻；充分体现了我军所擅长的包围迂回战术。防御时，不仅有阵地防御，而且有运动防御。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06fa54ed82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
