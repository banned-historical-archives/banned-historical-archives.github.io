hors":[],"dates":[{"year":1951,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时保卫和平联合会主席麦克斯·哥散"},{"type":"paragraph","text":"写信给毛主席表达比国人民和平愿望"},{"type":"paragraph","text":"【本报讯】比利时保卫和平联合会写信给毛主席，表示比利时人民要求缔结五大国和平公约及禁止原子武器的愿望。信如下：北京中华人民共和国主席毛泽东阁下："},{"type":"paragraph","text":"最近发生的关于原子弹的一些事件，已经使禁用原子弹的问题再度成为首要的迫切问题。"},{"type":"paragraph","text":"本会正在领导我国争取缔结五大国和平公约的运动，本会深信如果缔结和平公约一事能够实现，则如此严重威胁人类的原子弹问题亦可随而获得解决。"},{"type":"paragraph","text":"因此我们谨将本会决议附上，希望由于全世界和平战士的努力，和平公约得以缔结。"},{"type":"paragraph","text":"请阁下接受我们的崇高敬意。"},{"type":"paragraph","text":"比利时保卫和平联合会主席麦克斯·哥散"},{"type":"paragraph","text":"一九五一年十月十日于布鲁塞尔"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"904adc8755"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
