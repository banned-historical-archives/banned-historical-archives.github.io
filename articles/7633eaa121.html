["周中规","西北农学院","赵云梦","陆帼一"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于“三反”运动的右派言论","type":"title"},{"text":"西北农学院陆帼一周中规赵云梦","type":"authors"},{"text":"1．“三反有错误，不能把‘成绩是主要的，错误是难免的’当作减轻责任，取得群众谅解的挡箭牌。”(园艺系讲师　陆帼一)","type":"paragraph"},{"text":"2．“‘三反’运动功不抵过；三反干部和积极分子，没有掌握材料，就认为管财务都不干净，把他当老虎打，……结果积极分子得到了什么教育，他们知道未掌握材料整人，因而以后不敢作财务工作，被打者打击了积极性。反浪费的结果浪费更是层层出现，反官僚，今天官僚仍很多。”(畜牧系讲师  周中规)","type":"paragraph"},{"text":"3．“‘三反’运动领导上有偏激思想，不根据实际材料，只凭借主观臆断出发，打经济老虎，先定虎数，再找虎的对象，找好了对象，再找材料，这样就侵犯了人权，使老虎失掉了人的尊严，伤了人的感情，这样被打的假虎就和领导上有了一条界限。”(农化系教授　赵云梦)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7633eaa121"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
