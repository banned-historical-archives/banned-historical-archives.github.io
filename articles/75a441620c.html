script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级革命战士和诗人密尔顿","authors":[],"dates":[{"year":1958,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"今年是英国十七世纪伟大的诗人、资产阶级革命战士约翰·密尔顿(1608—1674)诞生三百五十周年。他是世界和平理事会建议今年纪念的世界文化名人之一。"},{"type":"paragraph","text":"密尔顿的一生，是政论与诗的结合，而政论与诗都为当时的英国资产阶级革命服务。他的政论和诗篇不仅对英国的资产阶级革命起了推动作用，就是对美国的独立运动、法国的大革命，也有着十分深远的影响。"},{"type":"paragraph","text":"密尔顿十六岁入剑桥大学，二十四岁得硕士学位。毕业后，他本打算作牧师，但是当时英国的国教日渐反动，便放弃了入教会的打算，决心要当一个诗人，并且决心要使自己成为“一首真正的诗”。“真正的诗”必然是反映现实，并推动现实生活前进的，密尔顿正是这样做了，所以他的诗篇与政论就有着巨大的生命力，熠闪着智慧的光辉，而成为世界文库的宝藏。"},{"type":"paragraph","text":"国教是英国查理王朝的重要支柱。当时的英国资产阶级革命的内容之一就是反对国教。诗人密尔顿积极地参加了反对封建王朝的斗争，站在清教徒一边，向国教进攻。在密尔顿参加反国教斗争的二十年中，他连续写出了许多政论小册子，给当时英国的反动势力以有力的打击。直到英国资产阶级革命濒于失败，封建王朝正在复辟的时候，密尔顿还发表了一篇“建设自由共和国的现成的与简易的办法”的论文。查理二世王朝复辟后，密尔顿曾遭逮捕，此后他便完全从事写作。从王朝复辟到密尔顿逝世，他一共写出了三部长诗:“失乐园”“复乐园”和“力士参孙”。"},{"type":"paragraph","text":"在“失乐园”里，诗人由撒且的形象反映出当年与查理一世进行斗争、打倒王朝、成立共和国的那些资产阶级革命英雄；在“复乐园”里，诗人通过耶稣的形象，反映了王朝复辟后，革命老战士们对革命事业的怀念；“力士参孙”所反映的是这些资产阶级革命英雄对王朝复辟后的无比愤怒，反映了继续革命的强烈要求。这三部长诗，可以说把英国资产阶级革命的各个阶段都反映出来了。"},{"type":"paragraph","text":"密尔顿的思想，代表了十七世纪欧洲新兴资产阶级民主主义思想；他的理想，代表了当时一般欧洲人民的理想；同时，他也是十八世纪法国启蒙思想家的启蒙者。恩格斯曾说过:“如果法国在前一世纪(即十八世纪)曾经给了全世界一个光荣的模范，可是我们也不能就闭口不说这个事实:英国早在一百五十年前，就已经给了这个模范，并且那时代的法国甚至难以望其项背。……我们且不要让对于密尔顿的记忆淡然忘去，密尔顿正是法兰西后起之秀不可一世之前的第一个人，对弑逆、对阿尔浩南·薛乃、波林勃洛克及沙夫代司比里加以辩护”。这是对密尔顿最正确的、历史唯物主义的看法。"},{"type":"paragraph","text":"(本报辑)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75a441620c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
