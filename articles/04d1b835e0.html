好》等四篇文章的批语","authors":[],"dates":[{"year":1959,"month":8,"day":6}],"is_range_date":false,"parts":[{"text":"毛泽东关于印发《王国藩社的生产情况一直很好》等四篇文章的批语","type":"title"},{"text":"将这四篇印发各同志。请各省、市、区党委负责同志将王国藩人民公社一篇印发所属一切人民公社党委，并加介绍，请各公社党委予以研究，有哪些经验是可以采纳的。据我看，都是可以采纳的。第一条，勤俭办社；第二条，多养猪(不养猪的回族除外)；第三条，增殖大牲畜；第四条，增加大农具；第五条，食堂办法；第六条，工作踏实，实事求是；第七条，有事同群众商量，坚持群众路线。这些都是很好的。我想，每一个专区总可以找到一个至几个办得较好如同王国藩那样的公社，请你们用心去找，找到了加以研究，写成文章，公开发表，予以推广。《目前农村中讲闲话较多的是哪些人》这一篇，也值得一看。这同目前在庐山讲闲话较多的人们是有联系的。","type":"paragraph"},{"text":" 毛泽东八月六日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04d1b835e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
