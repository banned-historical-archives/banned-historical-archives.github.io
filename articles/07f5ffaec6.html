<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"盐民泣血呼吁 请求增加盐价反对血汗钱被重重剥削","authors":[],"dates":[{"year":1947,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者先生:我们是一群可怜的盐民，并且也是贵报的读者，(籍松江及奉贤县属袁浦场。)为了生活的鞭策，不管夏天的太阳怎样凶猛，冬天的寒风怎样凛冽，我们用血肉的躯体，辛勤地括泥淋漓，摊板晒盐，若在旺产的季节，把苦劳的所得，尚能免强维持生活，一到冬天淡产的时候，每逢阴雨落雪，一家大小便只好缩瑟在家里吃西北风了。"},{"type":"paragraph","text":"日出做到日没仅得三千元"},{"type":"paragraph","text":"现在这样高贵的物价，而政府规定给我们的价目，每担只有六千元，照目前淡产的时候，每块盐板只能出产四五两，只多不到半斤，每户平均板数约四十块左右，那末每天的收入不过一二千元，(冬季里一个月能有几个晴天呢)，并且还要扣我们每担一百五十元的福利费、而美其名曰“乐捐”，其实我们何赏乐捐呵!"},{"type":"paragraph","text":"再说这项福利费，依照所定的名目说起来，当然要办盐民福利事业，可是实际上呢?真是天晓得了!查最近袁浦场方面的统计数目，这项福利费已须扣千万元左右，除了在金山卫的两浦扬务所，及柘林的柘林场务所，和褚家聚的青村场务所，各设立了一只不完全盐民子弟小学(每校仅有教员一员并兼校长)之外，我们西湾漴，钱家桥。戚漴墩等区的盐民，爱到一点什么福利呢?为了子弟的求学问题已向包场长请求，他只简单地说，现在各所已设立了学校，你们可去读书，所请“应毋庸议”的一句不含实际道理的官话，试问我们的子弟是否能到相距十余里路的地方去读书呢?"},{"type":"paragraph","text":"福利金扣去了究竟为谁福利"},{"type":"paragraph","text":"关于这些福利费，场方执权人，还动用这笔款子买无线电，场长及各科长在冬天的火盆旁，大翘其“二郎腿”品茗享乐，这也是盐民的福利吗?须知你们无线电机里的音乐和京戏，有着我们忧虑的呼叹和痛苦的哭泣呀!在这笔款子里，他们任用一批失业的私人如某科长的姪子或某高级职员的亲友，美其名曰福利会职员，他们吃的是福利费，用的是福利费，办了什么福利工作呢?总而言之，这不是盐民福利；而是一种割肉的剥削吧了!"},{"type":"paragraph","text":"同时我们还有一种说不出的痛苦，如几个当权人的亲友经营盐业，某科长是主办产销的，大权在握，别的弊病暂且不说，但秤放方面，只少对我们是不利的吧!"},{"type":"paragraph","text":"盐民要求八点　请求当局注意"},{"type":"paragraph","text":"现在是民主时代，我们盐民，当然也应该出来说话，我们要有下列几个要求:"},{"type":"paragraph","text":"一，袁浦场立即组织盐民福利委员会，并有盐民推选代表参加会议。"},{"type":"paragraph","text":"二，是项已支出之福利费，立即公布用度。"},{"type":"paragraph","text":"三，嗣后是项福利费，应由盐民推选代表监视，向银行取用之支票上，由代表签字或盖章。"},{"type":"paragraph","text":"四，福利会任用人数，应由会议决定，人材之录用，须经公开考试。"},{"type":"paragraph","text":"五，推展盐民福利事业。"},{"type":"paragraph","text":"六，未设盐校各区，应立即设立学校或津贴当地学校，俾便盐民子弟就近求学。"},{"type":"paragraph","text":"七，绝对反对盐务人员，利用亲友经商。"},{"type":"paragraph","text":"八，请求增加盐价，俾资维持生活。一群可怜的盐民同上"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07f5ffaec6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
