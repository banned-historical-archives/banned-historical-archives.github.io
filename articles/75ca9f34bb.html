恩来、王洪文、叶剑英、李先念、姚文元、姬鹏飞、耿飚、方毅、李强、肖劲光同志等应邀出席玄峻极大使和叶剑英副主席在招待会上祝酒","authors":[],"dates":[{"year":1973,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜驻华大使玄峻极和夫人举行招待会"},{"type":"paragraph","text":"庆祝朝鲜民主主义人民共和国成立二十五周年"},{"type":"paragraph","text":"周恩来、王洪文、叶剑英、李先念、姚文元、姬鹏飞、耿飚、方毅、李强、肖劲光同志等应邀出席玄峻极大使和叶剑英副主席在招待会上祝酒"},{"type":"paragraph","text":"新华社一九七三年九月八日讯  朝鲜驻中国大使玄峻极和夫人今晚在大使馆举行招待会，庆祝朝鲜民主主义人民共和国成立二十五周年。"},{"type":"paragraph","text":"中共中央副主席、国务院总理周恩来，中共中央副主席王洪文、叶剑英，中共中央政治局委员、国务院副总理李先念，中共中央政治局委员姚文元，外交部部长姬鹏飞，中联部部长耿飚，外经部部长方毅，外贸部副部长李强，国防部副部长肖劲光等，应邀出席招待会。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府大臣杨森安将军和夫人也应邀出席招待会。"},{"type":"paragraph","text":"叶剑英副主席在祝酒时代表毛泽东主席、中国共产党、中国政府和中国人民，向朝鲜人民的伟大领袖金日成主席、朝鲜劳动党、朝鲜民主主义人民共和国政府和兄弟的朝鲜人民，表示热烈的祝贺。"},{"type":"paragraph","text":"玄峻极大使首先祝酒，他提议为朝中两国人民的友谊和团结干杯！"},{"type":"paragraph","text":"应邀出席招待会的有关方面负责人还有向仲华、田维新、张宗逊、郭鲁、黄庆熙、徐今强、梁其舟、肖鹏、吴有训、刘贤权、石少华、马仁辉、杨骥、徐运北，中朝友好人民公社的代表。"},{"type":"paragraph","text":"各国驻中国外交使节也应邀出席招待会。（附图片）"},{"type":"paragraph","text":"玄峻极大使九月八日举行招待会，庆祝朝鲜民主主义人民共和国成立二十五周年。图为（从左至右）杨森安、杨木安夫人、玄峻极夫人、姬鹏飞、李先念、叶剑英、周恩来、玄峻极、王洪文、姚文元、耿飚、方毅、肖劲光在招待会上。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75ca9f34bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
