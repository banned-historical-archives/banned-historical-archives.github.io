生陶铸叶剑英等同志到机场迎接　周总理在赴罗访问途中曾经过阿富汗；回国时顺道对巴基斯坦作了非正式访问","authors":[],"dates":[{"year":1966,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京1日电　访问罗马尼亚、阿尔巴尼亚归来的由中共中央副主席、国务院总理周恩来同志率领的中国党政代表团，今天下午乘专机回到北京。"},{"type":"paragraph","text":"党和国家领导人刘少奇、邓小平、李富春、贺龙、李先念、康生、陶铸、叶剑英等同志到机场迎接。"},{"type":"paragraph","text":"今天同机回到北京的，有中国党政代表团团员:中共中央候补委员赵毅敏，外交部副部长乔冠华，以及其他随行人员。"},{"type":"paragraph","text":"到机场迎接的，还有廖承志、刘宁一、许光达、汪东兴、周荣鑫、姬鹏飞、王炳南、罗青长等同志。"},{"type":"paragraph","text":"周恩来总理在赴罗马尼亚访问途中，曾经过阿富汗；回国时，顺道对巴基斯坦作了非正式访问。"},{"type":"paragraph","text":"阿富汗驻中国大使苏海尔，罗马尼亚驻中国大使馆临时代办贝特勒斯库，阿尔巴尼亚驻中国大使馆临时代办巴巴尼，巴基斯坦驻中国大使馆临时代办杜拉尼今天也到机场欢迎。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\07\\6672010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张彬\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e由中共中央副主席、国务院总理周恩来同志率领的我国党政代表团，结束了对罗马尼亚和阿尔巴尼亚的访问，七月一日乘专机回到北京。"},{"type":"paragraph","text":"到机场迎接的有党和国家领导人刘少奇、邓小平、李富春、贺龙、李先念、康生、陶铸、叶剑英等同志。图为在机场合影。"},{"type":"paragraph","text":"(新华社传真　张彬　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李富春","type":"人物"},{"name":"李先念","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f57036a722"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
