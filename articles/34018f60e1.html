es":[{"year":1970,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"海军某部　陆春元"},{"type":"paragraph","text":"翻开崭新日历头一张，"},{"type":"paragraph","text":"七十年代风雷耳边响。"},{"type":"paragraph","text":"跟着祖国的脚步朝前走呵，"},{"type":"paragraph","text":"我驾着战鹰去出航。"},{"type":"paragraph","text":"彩云伴我迎朝阳，"},{"type":"paragraph","text":"东风催我穿雾浪。"},{"type":"paragraph","text":"紧握油门操纵杆呵，"},{"type":"paragraph","text":"激起我心头千层浪……"},{"type":"paragraph","text":"忘不了啊，腊月天——"},{"type":"paragraph","text":"我爹累死在机场上。"},{"type":"paragraph","text":"娘领着讨饭顶风雪，"},{"type":"paragraph","text":"我这放牛娃流落在异乡。"},{"type":"paragraph","text":"春雷滚滚震天响，"},{"type":"paragraph","text":"我家乡升起红太阳!"},{"type":"paragraph","text":"劳动人民得解放呵，"},{"type":"paragraph","text":"无产阶级大印我们掌!"},{"type":"paragraph","text":"多年宿愿已实现，"},{"type":"paragraph","text":"一颗红心永向党。"},{"type":"paragraph","text":"从此扔下了讨饭棍，"},{"type":"paragraph","text":"毛主席给我换上飞行装。"},{"type":"paragraph","text":"看如今呵，二十年祖国大变样，"},{"type":"paragraph","text":"锦绣河山映机窗。"},{"type":"paragraph","text":"一杆一舵为政权啊，"},{"type":"paragraph","text":"咱誓死消灭帝、修、反狗豺狼!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34018f60e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
