art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想将创造出红彤彤的新世界","authors":[],"parts":[{"type":"paragraph","text":"一批保加利亚同志最近在写给中国同志的信中指出，全世界一切革命者的眼光都注视着北京，注视着世界革命的领袖，全世界一切被奴役、被压迫人民最伟大的领袖毛泽东同志。他们说，我们所有的人都非常认真地听毛主席的话，学习他的著作，只有毛泽东思想才能把人类从剥削制度下拯救出来，我们要用战无不胜的毛泽东思想进行反对美帝国主义者和赫鲁晓夫现代修正主义者的斗争。"},{"type":"paragraph","text":"他们在信中说，我们以极大的关怀注视着中国无产阶级文化大革命的发展，在以毛泽东同志为首的光荣的中国共产党的领导下，中国人民一定会把文化大革命进行到底。毛泽东同志是在各种革命斗争中久经考验的最伟大的马克思列宁主义者，是中国人民和世界革命人民的领袖。"},{"type":"paragraph","text":"来信说，现代修正主义者是世界革命运动的大祸害，是毒瘤，但这个毒瘤将被我们的领袖和统帅毛泽东同志割掉。"},{"type":"paragraph","text":"保加利亚同志们在信中热情地写道，毛泽东思想将毁灭旧世界，创造出红彤彤的新世界。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47602b6f49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
