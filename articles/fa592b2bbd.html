script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央关于印发农业生产互助合作的决议草案的通知","alias":"","parts":[{"type":"paragraph","text":"中央关于印发农业生产互助合作的"},{"type":"paragraph","text":"决议草案的通知！"},{"type":"paragraph","text":"（1951年12月15日）各中央局，并转分局，省市区党委："},{"type":"paragraph","text":"（一）兹将关于农业生产互助合作的决议草案一件发给你们，请印发到县委和区委。请即照此草案在党内外进行解释，并组织实行。这是在一切已经完成了土地改革的地区都要解释和实行的，请你们当作一件大事去做。这个决议草案可以在党内刊物上发表，但不要在党外报刊上发表，因为还是草案。（二）这个草案比十月间发给一些同志带回去的草案有了一些修改，请将十月草案收回作废。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九五一年十二月十五日"},{"type":"paragraph","text":"[1]这是毛泽东同志为批驳刘少奇反对农业合作化而起草的具有重大历史意义的党内通知。1951年7月，刘少奇背着毛泽东和党中央，以个人名义写了一个批语，肆意指责山西省委关于发展农业生产互助合作的报告，并发给各地。刘少奇在批语中，反对毛泽东关于农业社会主义改造的路线，把它污蔑为“错误的、危险的、空想的农业社会主义思想”。同年9月，毛泽东亲自主持制定了《中共中央关于农业生产互助合作的决议（草案）》，并在12月15日，为印发决议草案写了这个通知，指示全党把农业互助合作当作一件大事去做。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":142,"page_end":142},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa592b2bbd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
