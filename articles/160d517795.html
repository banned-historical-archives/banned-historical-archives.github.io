ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！]"},{"type":"paragraph","text":"（1941年12月1日）"},{"type":"paragraph","text":"这个草案很好，但有缺点，只强调研究实际，未说明研究理论的重要，只说要有的放矢，没有强调矢的重要。过去的教育，主要缺点是只教学没有注意教人家去用。最容易的是只教学，最难的是教用。要教会人分析问题，研究中国的生产关系与生产力。如学木，要学三年才能用，如果只教规矩、绳墨只要三个钟点就教好。草案中对马克思主义理论与实际联系的问题没有解决好。对于洛种问题要先做分析工作，准备若干年做过分析工作之后再作综合理论工作。要将这个草案写成两个决议，一个是延安适用的，一是给全国用的。11」这是毛泽东在中共中央政治局会议上讨论中央关于延安干部学校的"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":12,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":313,"page_end":313},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"160d517795"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
