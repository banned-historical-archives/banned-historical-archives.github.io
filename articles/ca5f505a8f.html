tes":[{"year":1959,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南罗得西亚六千工人罢工"},{"type":"paragraph","text":"反对殖民当局的残酷剥削"},{"type":"paragraph","text":"新华社25日讯　南罗得西亚首府索耳兹伯里消息：在南罗得西亚桑比西河流域，正在修建卡里巴水坝的全部非洲籍工人约六千人今天举行了总罢工，要求增加工资。这座水坝的工程已全部陷于停顿状态。"},{"type":"paragraph","text":"这次罢工是由大约九百名在这座水坝地面下面从事艰苦劳动的工人在24日首先发动的。有消息说，在20日发生的一次严重事故促成了这次罢工。在这一天，十四名非洲人和三名欧洲人因掉入通向一座地下发电厂的坑道而牺牲了生命。"},{"type":"paragraph","text":"这些非洲工人在24日罢工时高喊“我们不愿为四便士而死亡”的口号。虽然当局增派了许多警察加以威胁，工人们仍坚持斗争，拒绝复工。"},{"type":"paragraph","text":"这些非洲籍工人的基本工资每小时只有四个便士。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca5f505a8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
