script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本残酷剥削和压迫  意大利工人罢工斗争风起云涌  四十万纺织工人在全国范围内进行的轮流罢工已坚持一个月","authors":[],"dates":[{"year":1970,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削和压迫"},{"type":"paragraph","text":"意大利工人罢工斗争风起云涌"},{"type":"paragraph","text":"四十万纺织工人在全国范围内进行的轮流罢工已坚持一个月"},{"type":"paragraph","text":"据新华社六日讯　罗马消息：意大利工人反对垄断资本残酷剥削和压迫的斗争风起云涌。"},{"type":"paragraph","text":"意大利四十万纺织工人继续进行罢工斗争，要求增加工资和改善劳动条件。纺织工人在全国范围内进行的轮流罢工斗争已经达一个月之久，由于资本家拒不接受工人的合理要求，罢工斗争一直在坚持中。"},{"type":"paragraph","text":"四月三日，六万多名纺织工人在意大利北部的两个主要的纺织业中心比埃拉和斯基奥举行了强大的罢工斗争。"},{"type":"paragraph","text":"与此同时，二十万“社会保险”机构的职工继续举行全国规模的、每次二十四小时的轮流罢工，要求增加工资和改善生活条件。"},{"type":"paragraph","text":"在都灵市的“菲亚特”汽车厂，十万工人四月三日举行两小时罢工，抗议垄断资本家无理解雇工人和残酷镇压工人斗争的暴行。一千八百名汽车工人还愤怒地在举行罢工的同时占领了车间，并且同支持工人斗争的许多学生一起，高举红旗和标语牌，在车间外面举行示威。"},{"type":"paragraph","text":"此外，四万名矿工四月二日举行了第二次全国性罢工，并且在所有采矿中心举行轮流罢工。格罗塞托和卡利亚里省的罢工矿工还和学生、居民一起，举行了反对垄断资产阶级剥削和压迫的示威。"},{"type":"paragraph","text":"四月四日，三万名长途公共汽车工人也举行了二十四小时的全国性罢工。四月三日，啤酒工人举行了第二次罢工。"},{"type":"paragraph","text":"在意大利北部的莱科和意大利中部的安波利，工人在四月三日和四月一日分别举行总罢工，抗议生活费用和房租飞涨，要求降低对工资收入的征税和解决住房问题，并且要求保障充分就业的权利。"},{"type":"paragraph","text":"在意大利北部的莫德纳省，几百名腊肠工人四月二日占领了市政厅和省政府大楼。为了抗议无理解雇工人，腊肠工人坚持罢工斗争和占领工厂已经一个月。同一天，一百多名制袜厂女工也占领了米兰市附近的洛迪市政厅，几百名制袜工人在街头举行了示威。在意大利南部的莱切，工人们还占领了一家大型的车皮厂。在托斯卡纳区的维亚雷焦，一千二百名制鞋工人坚持罢工将近两个月，并且占领了工厂将近四个星期。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5516736b8b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
