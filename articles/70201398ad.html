:[{"year":1974,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见藤山爱一郎、胜间田清一等"},{"type":"paragraph","text":"新华社一九七四年八月二十日讯  国务院副总理邓小平今天下午会见了日本日中友好议员联盟会长、自民党众议员藤山爱一郎，日中友好议员联盟访华代表团团长、社会党众议员胜间田清一，以及由他们率领的日中友好议员联盟访华代表团。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的有日中友好议员联盟访华代表团干事长、社会党众议员小林进；代表团干事：自民党众议员佐佐木义武、公明党众议员北侧义一、民社党众议员永末英一；代表团团员：自民党众议员粟山秀、桥口隆、高桥千寿，社会党众议员村山喜一、河上民雄，社会党参议员森中守义、川村清一，公明党参议员阿部宪一，民社党众议员竹本孙一，参议员野末和彦；代表团随员上村幸生、山本保、真野安一。"},{"type":"paragraph","text":"日本驻中国大使小川平四郎也参加了会见。"},{"type":"paragraph","text":"会见时在座的还有中日友协会长廖承志、副会长张香山，人大常委会委员贝时璋、罗叔章，以及林丽韫、连贯、孙平化、陈抗、李福德、单达圻、林波、丁民、唐家璇、吴治安等。（附图片）"},{"type":"paragraph","text":"国务院副总理邓小平会见由藤山爱一郎、胜间田清一率领的日中友好议员联盟访华代表团。图为会见时合影。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70201398ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
