script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捷罗两国代表团发表联合声明坚决支持中国正义立场只有美军撤出中国领土才能真正缓和远东紧张局势　强调反对现代修正主义加强社会主义阵营伟大团结","authors":[],"dates":[{"year":1958,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布拉格25日电】　捷克斯洛伐克和罗马尼亚两国党和政府代表团在结束会谈以后，25日在布拉格发表了一项联合声明。声明说，两国代表团对当前国际局势的估计是一致的。它们认为，当前的主要任务是全面支持社会主义阵营的团结和力量的进一步发展。"},{"type":"paragraph","text":"声明说，两国代表团坚决支持中国对美国在台湾海峡地区的挑衅和侵略行动所持的正义立场。中国人民拥有用一切办法解放台湾和其他沿海岛屿的不可剥夺的权利。两国代表团严厉谴责了美国阻挠缓和远东紧张局势的政策，并且指出，美国应该对远东和全世界的和平和安全受到威胁一事负全部责任。两国代表团表示支持中国政府的和平倡议，并且表示相信只有美国军队撤出中国领土才能真正缓和远东的紧张局势。"},{"type":"paragraph","text":"声明还强调指出，双方认为他们有责任保卫马克思列宁主义学说的纯洁性，并且坚决反对现代修正主义的各种表现，这种修正主义在南斯拉夫共产主义者联盟的纲领和政策中表现得特别明显。声明又说，罗马尼亚工人党和捷克斯洛伐克共产党将同企图破坏社会主义国家之间的团结和合作以及企图使共产主义工人运动发生分裂的任何尝试继续进行坚决的斗争。"},{"type":"paragraph","text":"声明还指出，罗马尼亚工人党中央委员会和罗马尼亚政府已经邀请捷克斯洛伐克党和政府派遣一个党和政府代表团前往罗马尼亚进行访问，这个邀请已被接受。"},{"type":"paragraph","text":"为了扩大两国间的经济和文化合作，双方就1959—1965年的经济合作和换货的主要问题缔结了一项协定，并且还缔结了一项关于文化合作的协定。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8bf1a56ba"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
