script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"对可以争取的中间派应采取积极争取与合作态度","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1948,"month":1,"day":14}],"parts":[{"text":"对可以争取的中间派应采取积极争取与合作态度","type":"title"},{"type":"paragraph","text":"叶罗转香港分局、上海局，并告中工委、各局、邯郸局并转承志：（一）对酉感指示的原则运用时，应注意灵活性。（二）对民主同盟的恢复活动，对李济深等国民党反蒋派，对在美的冯玉祥，对一切可以争取的中间派，不管他们言论行动中包含多少动摇性及错误成分，我们应采积极争取与合作态度，对他们的错误缺点，采取口头的善意的批评态度。（三）要在报纸上刊物上对于对美帝及国民党反动派存有幻想、反对人民民主革命、反对共产党的某些中产阶级右翼分子的公开的严重的反动倾向加以公开的批评与揭露，文章要有分析，要有说服性，要入情入理。（四）对一切应当争取的中间派的错误观点，在报纸刊物上批评时，尤其要注意文章的说服性。（五）对华莱士及其一派应采联合态度。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"子寒"}],"comment_pivots":[{"part_idx":1,"offset":2,"index":1},{"part_idx":1,"offset":28,"index":2},{"part_idx":1,"offset":37,"index":3},{"part_idx":1,"offset":64,"index":4},{"part_idx":1,"offset":69,"index":5},{"part_idx":1,"offset":84,"index":6},{"part_idx":1,"offset":298,"index":7}],"is_range_date":false,"authors":["毛泽东"],"comments":["叶，指叶剑英（一八九七——一九八六），广东梅县人，当时任中共中央后方委员会书记。罗，指罗迈，即李维汉（一八九六——一九八四），湖南长沙人，当时任中共中央城市工作部副部长。","承志，即廖承志（一九○八——一九八三），广东惠阳人。当时任中共中央宣传部副部长。","指中共中央一九四七年十月二十七日给各中央局、分局及各野战军前委的指示。指示估计了蒋介石反动统治集团覆灭过程的几种形式，分析了国内各阶级、各党派在此种形势下可能会持的立场和态度，并且提出和规定了我党所应采取的策略与原则。","一九四七年十月，国民党政府宣布中国民主同盟为“非法团体”，民盟总部被迫解散。一九四八年一月，民主同盟领导人沈钧儒等在香港召开民盟一届三中全会，决定重建民盟领导机关，恢复活动，并发表宣言反对国民党反动政府和美国的对华政策，与中共及其他民主党派携手合作。参见本卷第14页注〔3〕。","李济深（一八八五——一九五九），广西苍梧人。当时任中国国民党革命委员会中央执行委员会主席。","冯玉祥（一八八二——一九四八），安徽巢县（今属巢湖市）人。当时任中国国民党革命委员会中央执行委员会常务委员兼中央政治委员会主席，在美国组织“旅美中国和平民主同盟”，反对美国援助蒋介石打内战。","华莱士（一八八八——一九六五），美国政治活动家。一九四一年至一九四五年任美国副总统。一九四四年六月曾到中国访问，主张国民党改善同共产党的关系，并促成美军观察组前往延安。"],"page_start":28,"page_end":28,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f1ab2433c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
