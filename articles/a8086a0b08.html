ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于派陈伯达去东北了解五反情况给高岗的信","alias":"","parts":[{"type":"paragraph","text":"关于中南军区应增加打虎预算"},{"type":"paragraph","text":"致谭政等电"},{"type":"paragraph","text":"（1952年2月18日）谭政同志，并告剑英？"},{"type":"paragraph","text":"二月十三日电收到。你们军区打虎预算据中南局最近电告增至打大虎八百，这比你们过去的数字是增大了，但和华东军区的一千六百相比，仅及其一半。实际上华东军区大虎将来可能打至二千五百至三千。你们基本上应与他们看齐，但可稍迟一会再增加，并须启发下面同志自动增加，始不觉得太勉强。特别是华南军区系统可能打大虎一千以上，中小虎万数，而他们定得很低，勇气不旺。最近看了四十八军打虎渐多，应即以之教育全军。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十八日[1]谭政，当时任中国人民解放军中南军区第三政治委员。[2]剑英，即叶剑英，当时任中国人民解放军华南军区司令员。"},{"type":"paragraph","text":"[3]指谭政1952年2月13日关于目前华南军区打虎预算给毛泽东的报告。报告说，华南军区第二次预算，加上驻两广各军及广西数字，计划共捉大虎183只，中小虎2164只。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":411,"page_end":411},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8086a0b08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
