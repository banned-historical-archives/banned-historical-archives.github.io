":1979,"month":5,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卡特总统接见康世恩副总理"},{"type":"paragraph","text":"新华社华盛顿五月二十九日  电美国总统卡特今天上午在白宫接见了正在这里访问的中国副总理康世恩，并同他进行了友好谈话。"},{"type":"paragraph","text":"康副总理向卡特总统转达了叶剑英委员长、华国锋总理和邓小平副总理的问候。卡特总统表示感谢，并对康副总理的来访表示欢迎。他说，康副总理访美期间不仅应该讨论两国能源合作问题，还应讨论其他互相关心的问题。他希望康副总理访问愉快，并取得成果。"},{"type":"paragraph","text":"中国石油部长宋振明、电力部副部长李锐接见时在座。"},{"type":"paragraph","text":"美国总统国家安全事务助理布热津斯基和能源部长施莱辛格接见时在座。"},{"type":"paragraph","text":"在总统接见以前，布热津斯基曾在白宫会见康副总理，讨论了中美双边关系及其他共同关心的问题。"},{"type":"paragraph","text":"康世恩副总理是二十八日上午乘飞机到达华盛顿的。"},{"type":"paragraph","text":"新华社华盛顿五月二十九日电  正在这里访问的中国副总理康世恩今天在美国能源部同美国能源部长施莱辛格就中美能源合作问题举行会谈。"},{"type":"paragraph","text":"双方在会谈中都强调两国进行能源合作的重要性，双方将为促进石油、电力和煤炭发展等领域内的合作进行工作。"},{"type":"paragraph","text":"今天晚上，施莱辛格部长在国务院大厦为康副总理举行了宴会，他们在讲话中都对两国在能源方面已经开始的合作表示满意。"},{"type":"paragraph","text":"同一天下午，康世恩副总理会见了美国总统科技顾问普雷斯和一些参议员。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1979,"month":5,"day":31}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"卡特总统接见康世恩副总理","authors":[],"parts":[{"type":"paragraph","text":"新华社华盛顿五月二十九日电 美国总统卡特今天上午在白宫接见了正在这里访问的中国副总理康世恩，并同他进行了友好谈话。"},{"type":"paragraph","text":"康副总理向卡特总统转达了叶剑英委员长、华国锋总理和邓小平副总理的问候，卡特总统表示感谢，并对康副总理的来访表示欢迎。他说，康副总理访美期间不仅应该讨论两国能源合作问题，还应讨论其他互相关心的问题。他希望康副总理这次访问愉快，并取得成果。"},{"type":"paragraph","text":"中国石油部长宋振明、电力部副部长李锐接见时在座。"},{"type":"paragraph","text":"美国总统国家安全事务助理布热津斯基和能源部长施莱辛格接见时在座。"},{"type":"paragraph","text":"在总统接见以前，布热津斯基曾在白宫会见康副总理，讨论了中美双边关系及其他共同关心的问题。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77e33a9731"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
