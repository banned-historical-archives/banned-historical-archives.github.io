:[{"year":1993,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东思想政治工作理论》评介"},{"type":"paragraph","text":"由薄一波同志题书名、李立功同志为编委会主任、黄小蕙同志等主编的《毛泽东思想政治工作理论》，在毛泽东同志一百周年诞辰的前夕，已由经济管理出版社出版。该书的主要特点："},{"type":"paragraph","text":"一是较系统地勾画了毛泽东思想政治工作理论的科学体系。该书从理论与实际的结合上，对毛泽东思想政治工作理论的内涵、本质特征、基本理论、发展过程、历史作用等方面做了深入浅出的阐述，使人们在总体上对毛泽东思想政治工作理论体系有一个较完整的、明晰的认识。这有助于人们自觉地运用毛泽东思想政治工作理论，做好新时期的思想政治工作。"},{"type":"paragraph","text":"二是阐述了坚持和发展毛泽东思想政治工作理论的重要性和紧迫性。该书从宏观出发，微观着手，运用大量资料，着重阐发了邓小平同志在新的历史条件下，关于思想政治工作的一系列指示，坚持和发展了毛泽东思想政治工作理论；概括了十一届三中全会以来思想政治工作新经验、新理论，从不同角度论述了思想政治工作对于改革开放、建设有中国特色社会主义的极端重要性，以及加强和改进思想政治工作的新途径。"},{"type":"paragraph","text":"（邱桂林）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdbacb0fb6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
