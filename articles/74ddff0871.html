" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共湖南日报委员会文件关于朱正同志被划为右派分子的改正决定(一)","authors":[],"dates":[{"year":1979,"month":1,"day":21}],"is_range_date":false,"parts":[{"text":"中共湖南日报委员会文件关于朱正同志被划为右派分子的改正决定(一)","type":"title"},{"text":"朱正同志在本报反右派运动中被划为右派分子，受到开除公职、劳动教养的处分。","type":"paragraph"},{"text":"这次根据中共中央〔1978〕五十五号文件精神进行复查，朱正在整风鸣放中有严重错误，但不应划为右派分子。经研究决定，对朱正同志被错划为右派分子予以改正，撤销原处分，恢复原工资级别行政21级，从一九七八年十月一日起按行政21级工资发给。","type":"paragraph"},{"text":" 中共湖南日报社委员会一九七九年三月三十日","type":"paragraph"},{"text":"报：省委组织部、宣传部、省摘帽办、公安局","type":"paragraph"},{"text":"发：长沙市公安局、摘帽办、文艺路办事处、派出所、文艺路测绘社","type":"paragraph"},{"text":" 来源：朱正《小书生大时代》，北京大学出版社，1999年。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74ddff0871"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
