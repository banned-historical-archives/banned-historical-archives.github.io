ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"读《汉书》批语","alias":"","parts":[{"type":"paragraph","text":"读《隋书》批语"},{"type":"paragraph","text":"上性严重，有威容。···.自强不息，朝夕孜孜。人庶殷繁，帑藏充实，虽未能臻于至治，亦足称近代之良主。然天性沉猜，素无学术，好为"},{"type":"paragraph","text":"小数，不达大体。故忠臣义士莫得尽心竭辞。其蕴藏大乱"},{"type":"paragraph","text":"草创元勋及有功诸将，诛夷罪退，罕有存者。又不悦诗书，废除学校。唯妇言是用，废诸子。逮于暮年，持法尤峻，喜怒不常，过于杀戮。尝令左右送西域朝贡使出玉门关，其人所经之处，或受牧宰小物，馈遗鹦鹉、皮、马鞭之属，上闻而大怒。又诣武库，见署中芜秽不治，于是执武库令及诸受遗者，出开远门外，亲自临决，死者数十人。又往往潜令人赂遗令史、府史，有受者必死，无所宽贷。议者以此少之。[卷二《高祖本纪》下第22~23页]"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":335,"page_end":335},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e06cd44293"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
