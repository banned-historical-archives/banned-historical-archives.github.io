"贫下中农协会","道县五区红岩公社齐心大队"],"dates":[{"year":1967,"month":8,"day":26}],"is_range_date":false,"parts":[{"text":"关于惩办反革命齐正马的材料","type":"title"},{"text":"道县五区红岩公社齐心大队贫下中农协会","type":"authors"},{"text":"齐正马，男性，现年55岁，家庭成分贫农，本人出身反革命。","type":"paragraph"},{"text":"该犯解放前在广西灌阳县平洛府任过伪仵作，骑在人民头上作威作福，剥削人民，不劳而获。","type":"paragraph"},{"text":"解放后，一九五三年勾结外省（广西省）反革命分子进行反革命活动，进行造谣，准备上山，被我政府发觉，将其法办，宣判劳动改造5年。但该宣判后，就畏罪潜逃，拦路劫抢，强奸妇女，抢夺老百姓财物，上山为匪。逃跑五年后，又给我政府捉拿，仍判徒刑五年。劳动改造五年，释放后，仍旧死不老实，不参加集体生产，大搞投机生意，对干部不满，并且打我治安员齐光高、杀民兵营长齐正接。","type":"paragraph"},{"text":"一九六二年乘备战之机，造谣生事，说蒋介石、李宗仁、白崇禧三条火线进攻，中国仍是蒋介石登台。并在这年大量开荒，大刮单干风，侵占集体土地，不接受管制，后又逃跑外流广西拦路劫抢，上山为匪，并且拉了道县50多名四类分子和四类分子子弟在广西乱来，以包工做事为掩护，进行破坏活动。","type":"paragraph"},{"text":"文化革命开始以后，在其后台胡祥的指使下，进行破坏活动，在反革命胡祥留信要他回来参加杀我贫下中农以后，于八月二十四日正式从广西回来，在广西正心被贫下中农发觉捉拿。捉回后，仍不老实交待错误事实，不承认自己的错误。要他向群众交待、承认错误，可是他死不甘心，装模作样说脚痛，手持硬棒（作拐杖），在路过学校石桥时，就手舞硬棒打群众，随即跳桥逃跑。在我民兵的努力下，仍然捉拿，但是仍不老实交待。","type":"paragraph"},{"text":"为了维护社会秩序，保卫社会主义建设，在贫下中农的迫切要求下，对其进行死刑判决，现已执行。(1)","type":"paragraph"},{"text":" 道县五区红岩公社齐心大队 贫下中农协会齐心大队党支部1967年8月26日","type":"paragraph"},{"text":"（加盖中共道县仙子脚人民公社齐家湾大队支部委员会公章）","type":"paragraph"},{"text":"代表：吴志石、吴有信、齐增屏、何益隆、齐光谢、齐邦祥","type":"paragraph"},{"text":"(1) 据齐家湾村民说，齐正马实际是打死的。他从广西捉拿回来以后，大队上对他进行了“严格的审问”，审问中腿打断了。“幸亏他嘴巴子硬，没有乱说乱咬，不然晓不得有多少人跟着倒霉。”","type":"paragraph"}],"comments":[],"origin":"根据当时的传单打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e1653ea17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
