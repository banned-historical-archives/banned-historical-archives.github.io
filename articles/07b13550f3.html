tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把“四人帮”造成的损失夺回来北京市轻工业战线掀起大干社会主义热潮","authors":[],"parts":[{"type":"paragraph","text":"北京市轻工业战线掀起认真学习马克思主义、列宁主义、毛泽东思想，狠批“四人帮”的反革命罪行，大干社会主义的热潮。广大职工在九月份创造了历史月产最高水平的基础上，十月份又超额完成了国家计划。全市轻工业总产值比去年同期增长百分之十一点三，并且生产出数百个新品种和上千种新花色的轻工业品。"},{"type":"paragraph","text":"在粉碎“四人帮”的伟大胜利鼓舞下，北京市轻工业战线的广大干部和工人，信心百倍，浑身是劲，以空前高涨的革命热情，狠抓革命，猛促生产。北京纺织工业系统的广大职工说，伟大的领袖和导师毛主席历来重视轻工业的发展，亲自为我们规定了按照农、轻、重的次序发展国民经济的正确方针。搞好轻工业生产，对于支援农业、发展重工业，改善人民生活，加快社会主义建设都具有重要意义。但是，“四人帮”这些祸国殃民的吸血鬼，为了篡党夺权，复辟资本主义，却制造种种混乱，故意把水搅挥，破坏革命，破坏生产，妄图搞垮我国的社会主义经济。对此，我们工人阶级早就深恶痛绝！现在，以华国锋主席为首的党中央把他们揪了出来，我们坚决把“四人帮”造成的损失夺回来。工人们坚持每周连续开足班次，昼夜奋战，十月份超额百分之十点四完成了国家计划。棉纱、棉布、印染布、毛线、麻袋、针织衫裤等主要产品产量都比去年同期显著提高。一些先进单位更先进，原来比较后进的单位也大踏步地赶上来。到十月底，北京市纺织局和二轻局所属的工厂中，已有北京纺织器材厂、北京证章厂、北京第二织带厂、北京地毯三厂、北京皮毛三厂、北京半导体器件六厂等一批工厂，提前两个月完成了全年国家生产计划。"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07b13550f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
