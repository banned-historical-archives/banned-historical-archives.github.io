"dates":[{"year":1978,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了对广大青少年进行革命的传统教育，在党的十一大精神鼓舞下，上海市青年宫积极筹办“毛主席革命家庭和早期伟大革命实践展览会”，并在纪念“五四”运动五十九周年之际预展。"},{"type":"paragraph","text":"这个展览会，是根据湖南韶山“毛主席旧居陈列馆”的部分文物图片复制的，共分三个部分:第一部分:毛泽东同志的革命家庭——介绍了毛泽东同志教育下的六位亲人先后为革命而英勇献身的事迹；第二部分:毛泽东同志的少年和青年学生时代——介绍毛泽东同志在青少年时代为追求革命真理勤奋学习，艰苦奋斗，积极从事革命活动的光辉事例；第三部分:毛泽东同志在中国共产党创建时期——介绍毛泽东同志把马克思列宁主义的普遍真理与中国革命运动相结合，创立中国共产党，领导湖南工农运动的革命实践。在这一部分里，有较大的篇幅介绍了毛泽东同志在五四时期领导湖南人民反帝反封建的斗争的革命活动。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eac18aaaaa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
