三八节有感”等作品的编者按语","authors":[],"dates":[{"year":1958,"month":1,"day":26}],"is_range_date":false,"parts":[{"text":"《文艺报》关于再批判王实味的“野百合花”，丁玲的“三八节有感”等作品的编者按语","type":"title"},{"text":"再批判什么呢？王实味的“野百合花”，丁玲的“三八节有感”，萧军的“论同志之‘爱’与‘耐’”，罗烽的“还是杂文的时代”，艾青的“了解作家，尊重作家”，还有别的几篇。上举各篇都发表在延安“解放日报”的文艺副刊上。主持这个副刊的，是丁玲、陈企霞。丁玲的小说“在医院中时”，是在1941年发表在延安的文艺刊物“谷雨”上的，次年改题为“在医院中”，在重庆的“文艺阵地”上重新发表。","type":"paragraph"},{"text":"王实味、丁玲、萧军的文章，当时曾被国民党特务机关当做反共宣传的材料，在白区大量印发。萧军、罗烽等人，当时和丁玲、陈企霞勾结在一起，从事反党活动。丁玲、陈企霞等人在此后的若干年中进行了一系列的反党活动，成为屡教不改的反党分子。","type":"paragraph"},{"text":"丁玲、陈企霞、罗烽、艾青是党员。丁玲在南京写过自首书，向蒋介石出卖了无产阶级和共产党。她隐瞒起来，骗得了党的信任，她当了延安“解放日报”文艺副刊的主编，陈企霞是她的助手。罗局限有志于此影响力；‘烽、艾青在敌人监狱里也有过自首行为。","type":"paragraph"},{"text":"这些文章是反党反人民的。1942年，抗日战争处于艰苦的时期，国民党又起劲地反共反人民。丁玲、王实味等人的文章。帮助了日本帝国主义和蒋介石反动派。","type":"paragraph"},{"text":"上述文章在延安发表以后，立即引起普遍的义愤。延安的文化界和文艺界，针对这些反党言论展开了严正的批判。15年前的那一场斗争，当时在延安的人，想必是记忆犹新的。去年下半年，文艺界展开了对丁玲、陈企霞反党集团的斗争和批判。许多同志在文章和发言里，重新提起了他们15年前发表出来的这一批毒草。","type":"paragraph"},{"text":"1957年，“人民日报”重新发表了丁玲的“三八节有感”。其他文章没有重载。“奇文共欣赏，疑义相与析”，许多人想读这一批“奇文”。我们把这些东西搜集起来全部重读一遍，果然有些奇处。奇就奇在以革命者的姿态写反革命的文章。鼻子灵的一眼就能识破，其他的人往往受骗。外国知道丁玲、艾青名字的人也许想要了解这件事的究竟。因此我们重新全部发表了这一批文章。","type":"paragraph"},{"text":"谢谢丁玲、王实味等人的劳作，毒草成了肥料，他们成了我国广大人民的教员。他们确能教育人民懂得我们的敌人是如何工作的。鼻子塞了的开通起来，天真烂缦、世事不知的青年人或老年人迅速知道了许多世事。","type":"paragraph"},{"text":"为了帮助读者理解这些文章对于我们有些什么教育作用，毒草何以变成肥料，我们发表了林默涵、王子野、张光年、马铁丁、严文井、冯至同志的六篇批判文章，而把每一个批判对象的原文附在批判文章的后面，当然，这个再批判还是不够的。我们希望文艺界利用这个材料，在各地的文艺刊物上发表深刻的批评文章，给读者以更多的帮助。","type":"paragraph"},{"text":" 来源： 原载“文艺报”1958年1月26日第2期，选自《再批判》，作家出版社，一九五八年北京。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b86631e84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
