:[],"dates":[{"year":1967,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"柬中友协副主席符宁说："},{"type":"paragraph","text":"中国文化大革命给民族解放运动新的鼓舞力量"},{"type":"paragraph","text":"柬中友好协会副主席符宁在《柬中友协》杂志上发表文章说，中国无产阶级文化大革命是科学的社会主义思想的一个新的最高阶段，是世界社会主义革命发展的另一个必要的阶段。"},{"type":"paragraph","text":"文章接着指出，帝国主义与各国反动派希望中国放弃社会主义革命，复辟资本主义或变成修正主义。但是，由于中国文化大革命不断获得胜利，狠狠地痛击了美帝国主义及其走狗，给亚洲、非洲、拉丁美洲民族解放运动，特别是越南人民的斗争增加了新的鼓舞的力量。"},{"type":"paragraph","text":"文章还说，毛泽东思想是当代马克思列宁主义的最高思想。占世界人口四分之一的中国人民团结在中国共产党及其英明的领袖毛主席的周围，是一种伟大的革命的统一力量，任何力量都不能消灭它。这种力量，唤醒世界人民走向社会主义革命发展的道路。"},{"type":"paragraph","text":"文章最后还祝贺中国无产阶级文化大革命获得巨大的胜利，祝贺毛泽东思想光芒永远红光四射。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c32dea298a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
