ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"关于五纵三纵十级的部署","alias":"","parts":[{"type":"paragraph","text":"关于五纵三纵十纵的部署\""},{"type":"paragraph","text":"（1948年12月11日）林、罗、刘："},{"type":"paragraph","text":"灰十八时电悉。（一）同意五纵本日继续向南口附近开进。（二）三纵不应去南口，而应开至北平以东、通县以南地区。（三）十纵原地不动。（四）理由详另电。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十一日九时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]指1948年12月10日18时林彪、罗荣桓、刘亚楼给中共中央军委的电报。电报说：已令三五两纵全力向南口前进，抓住南口之敌和防止平敌继续北援，并在南口以南寻机歼敌。该两纵统归萧劲光、陈伯钧指挥。五纵本晚以强行军出发，估计12号早晨即可到南口附近。已令我十纵先头师本晚自玉田以东直接向北平、通县间急进，截断十三军退路，伴攻北平，牵制敌人和造成敌之混乱。该纵主力继续跟进。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":374,"page_end":374},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ef6c4fa4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
