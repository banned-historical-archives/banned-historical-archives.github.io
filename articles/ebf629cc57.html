ear":1962,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为了扩大学生的知识领域，提高学生辨别是非的能力，以便更好地学习和理解马克思列宁主义，中国人民大学本学期为高年级、进修班、研究班的学生开设了介绍资产阶级学说的课程。到目前为止，哲学系开设了《黑格尔的“小逻辑”》、《现代资产阶级哲学批判》；经济系开设了《当代资产阶级经济学说》，财政贸易系开设了《资本主义财政与贸币》；法律系开设了《资产阶级民法批判》、《资产阶级刑法与司法制度》。同时，还将举办一些专题讲座，如关于康德的《统粹理性批判》的讲座等。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebf629cc57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
