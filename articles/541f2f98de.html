tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东家乡湖南韶山开通高速公路等四则","authors":[],"parts":[{"type":"paragraph","text":"毛泽东家乡湖南韶山开通高速公路"},{"type":"paragraph","text":"24日正式通车的韶山高速公路，使连接湖南省会长沙和旅游胜地、伟人故里韶山的车程只需45分钟，这将极大地方便海内外游客来韶山参观游览。"},{"type":"paragraph","text":"我国加大饮用水水源保护区环保执法力度"},{"type":"paragraph","text":"环境保护部部长周生贤24日说，我国加大了饮用水水源保护区环保执法力度，2007年，共取缔一级水源保护区内排污口942个，停建二级水源保护区内可能造成污染的建设项目1294个，限期治理931个。"},{"type":"paragraph","text":"伊利、蒙牛重新走上健康持续发展路"},{"type":"paragraph","text":"最近3个多月，内蒙古自治区伊利、蒙牛两大乳品生产企业分别实施应急、长效机制相结合的“放心奶工程”和“牛奶安全工程”，全面整顿内部各环节管理，加强产品质量监管，促使企业开始重新走上健康、持续发展之路。"},{"type":"paragraph","text":"国家全力确保地震灾区冬春口粮供应"},{"type":"paragraph","text":"国家粮食局24日表示，粮食部门将确保灾区群众粮食供应，维护粮食市场和价格稳定。据悉，目前，四川省粮油储备充足，品种丰富，供应网络健全，市场价格平稳，全省826个粮油应急供应网点运转正常，可以保障今冬明春群众口粮供应。"},{"type":"paragraph","text":"（均据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"541f2f98de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
