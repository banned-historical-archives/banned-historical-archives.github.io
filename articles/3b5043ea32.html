script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席的最新指示极大鼓舞沈阳冶炼厂革命职工  一面选派大批优秀工人进驻教育阵地  一面更好地挑起抓革命促生产的重担","authors":[],"dates":[{"year":1968,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的最新指示极大鼓舞沈阳冶炼厂革命职工"},{"type":"paragraph","text":"一面选派大批优秀工人进驻教育阵地"},{"type":"paragraph","text":"一面更好地挑起抓革命促生产的重担"},{"type":"paragraph","text":"全厂提前完成八月份生产计划，提前四个月完成十六种产品的全年生产计划"},{"type":"paragraph","text":"新华社沈阳二日电在伟大领袖毛主席的最新指示鼓舞下，沈阳冶炼厂广大革命职工意气更风发，斗志更昂扬。他们在选派出大批优秀工人开进教育阵地后，更好地承担起了抓革命促生产的光荣任务，提前全面超额完成了八月份的生产计划，还提前四个月完成了十六种产品的全年生产计划。"},{"type":"paragraph","text":"伟大领袖毛主席最近指出：“实现无产阶级教育革命，必须有工人阶级领导，必须有工人群众参加，配合解放军战士，同学校的学生、教员、工人中决心把无产阶级教育革命进行到底的积极分子实行革命的三结合。工人宣传队要在学校中长期留下去，参加学校中全部斗、批、改任务，并且永远领导学校。在农村，则应由工人阶级的最可靠的同盟者——贫下中农管理学校。”毛主席的最新指示，极大地鼓舞了沈阳冶炼厂广大革命职工。他们激动地说：“毛主席要我们工人阶级去占领教育阵地，结束资产阶级知识分子统治我们学校的现象，这是毛主席对工人阶级的最大信任，最大鞭策，我们决不辜负毛主席对我们的期望！”他们反复学习了毛主席的最新指示，并且在厂革委会领导下，迅速选出了大批优秀工人组成毛泽东思想宣传队，在统一安排下很快开进了教育阵地。"},{"type":"paragraph","text":"约占全厂职工总数百分之七的工人从各生产岗位上抽出之后，留在岗位上的职工纷纷开座谈会、写大字报，一致表示要把抓革命促生产的光荣任务更好地承担起来，以实际行动报答毛主席对工人阶级的最大信任。许多工人同志为了承担更多的任务，干脆搬到工厂，吃在工厂，睡在炉旁。铅冶炼车间收尘小组的工人，面对人少任务重的情况，发扬敢于斗争、敢于胜利的革命精神，团结一致，密切协作，大学多面手，人员减少后不仅产量没有减少，反而比过去提高了三分之一。铜冶炼和铜电解等车间职工在毛主席最新指示的鼓舞下，克服了人力不足的困难，出色地完成了八月份的生产计划。"},{"type":"paragraph","text":"沈阳冶炼厂广大革命职工在全面落实毛主席最新指示的过程中，坚持狠抓革命大批判，猛批中国赫鲁晓夫及其代理人所推行的反革命修正主义路线，更加振奋了革命精神。锌冶炼车间的设备，过去大修非得在所谓“专家”、“权威”指挥下才能进行，检修工期长，质量差。八月份，车间职工在毛主席最新指示鼓舞下，狠批了“专家治厂”的修正主义黑货，破了这个旧规矩，他们充分发挥工人阶级的创造才能，自己设计，自己指挥，结果提前二十天完成了大修计划，而且革新了很多项目，收到了工期短质量好的效果。铅冶炼鼓风炉小组通过大批判，狠狠揭露了阶级敌人煽动少数工人闹工资、闹福利，妄图破坏抓革命促生产的罪恶阴谋，极大地调动了全组工人的革命积极性，在八月二十七日创造了日产最新纪录，提前四天完成了八月份生产计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b5043ea32"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
