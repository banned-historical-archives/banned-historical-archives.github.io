":[{"year":1978,"month":7,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见并宴请尼泊尔两亲王及其夫人"},{"type":"paragraph","text":"新华社北京七月二十三日电　国务院副总理邓小平今天下午会见尼泊尔贾伦德拉·比尔·比克拉姆·沙阿亲王殿下和夫人科玛尔公主殿下，迪伦德拉·比尔·比克拉姆·沙阿亲王殿下和夫人普雷克希娅公主殿下以及尼泊尔其他贵宾，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见以后，邓小平副总理设宴招待尼泊尔两亲王和夫人一行。"},{"type":"paragraph","text":"人大常委会副委员长阿沛·阿旺晋美，外交部长黄华、副部长张海峰参加了会见和宴会。"},{"type":"paragraph","text":"尼泊尔驻中国大使雅杜·纳特·卡纳尔和夫人参加了会见并应邀出席了宴会。"},{"type":"paragraph","text":"尼泊尔两亲王和夫人等贵宾是在访问朝鲜民主主义人民共和国以后回国途中于昨天上午乘专机到达北京的。（附图片）"},{"type":"paragraph","text":"图为会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a134f023aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
