ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"复遥罗侨胞电","alias":"","parts":[{"type":"paragraph","text":"复遥罗侨胞电"},{"type":"paragraph","text":"（1946年12月22日）暹罗华侨建国救乡联合总会、暹罗职工总会、暹罗华侨青年会、通罗华侨教育协会，暹罗琼崖同乡会等七十一团体并请转全暹罗华侨公鉴："},{"type":"paragraph","text":"戌养电悉，义正词严，至深钦佩。国民党当局既拒绝开非法国大之建议于先，又拒绝解散非法国大之要求于后，实为自闭谈判之门，全国人民对该非法的分裂的一党国大与其所通过之所谓宪法决不承认。今后本党决为恢复政协路线与恢复一月十三日军事位置而奋斗到底，尚望海外国胞一致努力，以实现祖国之独立和平民主。"},{"type":"paragraph","text":"毛泽东亥养"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":324,"page_end":324},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bdd810259"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
