script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“克服资产阶级思想对党的侵蚀，反对党内的右倾思想(上)读高岗同志一月十日的报告","authors":["史营"],"dates":[{"year":1952,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"史营"},{"type":"paragraph","text":"一、对待资产阶级的问题上的右倾思想的产生原因:"},{"type":"paragraph","text":"(一)我们党将工作重点转入城市，转入经济建设，因而与资产阶级的接触日增(这是不可避免的)，而资产阶级一面承认我党的领导，一而则在各方面尽量扩大其思想影响，并采取各种新的方法和形式，在政治上、经济上与工人阶级争夺领导权。"},{"type":"paragraph","text":"(二)由于全国的胜利，在我们党内的一部分人中发生了错觉，产生了若干糊涂思想，他们以为革命在全国的胜利不是意味着在新的条件下阶级斗争的加剧，而以为是阶级斗争的缓和、他们对资产阶级一味迁就让步，欣赏资产阶级的捧场。"},{"type":"paragraph","text":"我们党内工人阶级成份的薄弱，马克思列宁主义理论教育的不够，对各种非无产阶级思想和非政治倾向的批判不够，都加重了资产阶级思想对党侵蚀的危险性。"},{"type":"paragraph","text":"二、资产阶级侵蚀党的方法:"},{"type":"paragraph","text":"(一)“拉过去”，即腐蚀我们的干部、绝大多数的贪污案件，特别是财经机关和企业中的贪污，是在资产阶级的勾引下进行的。贪污分子成为资产阶级安置在国家机关、人民企业中的暗盔、他们盗卖商情、盗卖资材、偷工减料、以贱报贵、以坏报好、涂改单据、假造账目、走私、偷税漏税，并借公家的名养和各种便利条件，替资本家追逐暴利、资本家为了笼络这些贪污分子，不惜出大的本钱、资本家向他们说:“公家如果开除了你，我养活你。”资本家同时与这些贪污分子订立合同，规定“各守据点，掉头不谈，谁也不讲谁，攻破谁算谁。”"},{"type":"paragraph","text":"(二)“派进来”，就是由资本家直接或派遣亲信打入国家机关、人民企业、根据沈阳、大连、哈尔滨、长春、吉林等大城市的材料:我们的国营商店和合作社有相当多的人员是资本家带着他的商店一起变成为国家商店或合作社的、也有资本家派其干女亲戚或亲信分子钻入国家商店或合作社，他们进来是为资本家服务、一些地方的国家商店与合作社被其篡夺领导，倒换货物，偷窃商情，囤积居奇，捣乱市场，把国家的、企业变构作为资本家盗公肥私、投机牟利的工具。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a520aaa25"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
