<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重庆、西安各界对朝鲜停战的反应","authors":[],"dates":[{"year":1951,"month":7,"day":19}],"is_range_date":false,"parts":[{"text":"重庆、西安各界对朝鲜停战的反应","type":"title"},{"text":"【西南总分社十九日讯】重庆市各界人民代表在抗美援朝代表会上，对朝鲜和谈有如下反应：","type":"paragraph"},{"text":"(一)部分工商业家因朝鲜和谈对捐献飞机大炮持观望态度，如说：“不要忙，捐早了将来和谈成功了还要退哩！”","type":"paragraph"},{"text":"(二)因捐献而引起劳资问题，资方说：“工人捐献只能从工资中拿，不得过问利润”。劳方说：“要从资方所得总利润中按比例捐献，因利润是工人的剩余劳动创造的”。现有个别行业订立“劳资捐献合同”或“劳资双方爱国增产捐献公约”。这个办法有的说：“很好”，是“私营企业推行捐献运动的正确办法”；有的说：“这个办法还值得研究。”","type":"paragraph"},{"text":"(三)工人对和谈与捐献认识较好，他们说：“不管和或战，飞机大炮是必要的，谈不好再打，当然要更多的飞机大炮，即使朝鲜和平解决了，解放台湾时也要飞机大炮，将来全国进入和平建设，用飞机灭虫、播种，也少不得飞机”。","type":"paragraph"},{"text":"(四)关于我们为什么赞成和谈问题，个别代表认为：“可让则让，我们也有困难。敌人是缓兵之计，我们也是缓兵之计”。","type":"paragraph"},{"text":"(五)个别代表说：“为何只谈军事不谈政治，思想搞不通”。有的代表解释“朝鲜谈判以朝鲜为主，中国人民政府从未出面，故所谈条件不应涉及中国问题(指中国参加联合国大会与撤退台湾美军)”。","type":"paragraph"},{"text":"(六)对谈判前途乐观者较少，警惕很高，认为美国不可能有和平诚意，最多求得“喘息”一下，工人中普遍反映“我们不能再让步了，三个条件已经够宽大了”，有的代表问：“三个条件中，如美国不同意撤出朝鲜，是否还可以让步？”","type":"paragraph"},{"text":"(七)部分工人与青年学生中的左倾情绪，不从现实出发，提出把美国当战败国处理，交出蒋介石改组美国政府为劳动人民政府。这些工人和青年学生企图在朝鲜和谈中，不仅解决朝鲜问题，而且要解决东方和全世界两个阵营的基本矛盾，要美帝投降。","type":"paragraph"},{"text":"【西北总公社十八日讯】西安市工人、居民对朝鲜和谈反应如下：","type":"paragraph"},{"text":"纱厂街商人张天福说：“帝国主义现在真是害怕了，我看主要是咱们捐了两千多架飞机，对他的威胁。”二马路工人赵元书说：“可见美帝真不中，经不起咱们的打，打了几下就受不了，不与他和谈非打垮他不可。”铁路工人谷炳麟、王学忠二人说：“美帝提出要和谈，成功不成功还说不定，但我们决不能放松一线曙光，可是要注意他的阴谋诡计。”中架村治安组长马华堂说：和谈是可以的，但我们要多提条件，第一、叫他很快的退出朝鲜和台湾；第二、把战犯蒋介石、李承晚交给人民处理；第三、中朝人民一切损失要美帝赔偿；第四、把美帝的战犯交给国际法庭处理，不准再侵略任何国家，如不答覆这些条件就要和他打。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年7月21日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee8276a7cf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
