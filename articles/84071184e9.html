" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"十省（市）财贸书记会议（在济南召开）参考资料之二","authors":["国务院财政部济南会议秘书组"],"dates":[{"year":1959,"month":12,"day":9}],"is_range_date":false,"parts":[{"text":"十省（市）财贸书记会议（在济南召开）参考资料之二","type":"title"},{"text":"国务院财政部济南会议秘书组","type":"authors"},{"text":"关于农村存棉情况的一些材料","type":"subtitle"},{"text":"现在农村到底还有没有棉花？从各地的调查材料证明，肯定说是有的。田里有（棉秸有），生产队有，社员家里也有。根据许多材料推算，只要坚决做好工作，全国农村还可以收购到1,000万担左右的棉花。（1）许多地区反映的材料估计，队里存有棉花和田里尚未采摘的棉花，在全国有棉花收购任务的生产队——大约16万个队中间，大约有一半左右——即8万个左右的生产队存棉较多，每一个队一般都在几千斤到几万斤，平均约1万斤左右，共计约有800万担棉花。（2）根据许多地区的反映，如果做好“三找”（找落地棉，找眼捷毛、找僵瓣棉）工作，每一亩田可以收起2、3斤皮棉，共可收起200万担左右。（3）不少地区社员分的棉花过多，有的每人分籽棉竟达几十斤，大大超过了国家规定标准（一般是皮棉1.5斤，折籽棉4.5斤）。在这方面也可以适当做点文章。","type":"appellation"},{"text":"现在将上海、山西、河北、山东、辽宁、湖北等省（市）反映的一些材料汇集如下：","type":"paragraph"},{"text":"上海市反映，生产队手里约有棉花14万多担，地里还有未摘的棉花约23万多担，等于现有收购量77万担的46％。","type":"paragraph"},{"text":"山西省反映，估计全省公社尚有存棉13.8万担，全省开展三找可以找出17.9万担、以437万亩计算，平均每亩可找4斤多棉花，全省号召每人节约半斤留用棉共可节约3万担，3项共计还可收起34.7万担。","type":"paragraph"},{"text":"河北省反映，南宫县七级公社，单在183个仓库的皮棉中就清查多出皮棉7万斤；河间县城关公社，果子洼生产队现存皮棉就有2万斤；丰阔县新君屯公社张格庄生产队就有存棉4万斤；定县清风店公社，清风店生产队王宝山一个人分籽棉39斤，李兴文一家4口人分籽棉77斤。","type":"paragraph"},{"text":"山东省反映，惠民县发现的200个私仓，存籽棉204万斤。这个县的杨集公社干部在贾王管理区实地检查结果是：（1）棉柴上带棉花每组拾一亩，多的每亩56斤，少的15斤，平均每亩34斤。棉叶里带棉花，多的一亩7斤，一般的5斤，少的3.5斤，平均每亩5斤。落地棉花，多的一亩8斤10两，少的6斤4两，平均每亩8斤，在搂完棉叶地里又拾，每亩平均找出3斤半。贾王管理区种棉花5,000亩平均每亩有棉花41斤，共计还能拾215,500斤，谁说棉花不多了呢？（2）分头检查仓房，经4个管理区查仓摸底存多报少的棉花175,000斤。杨集村原报存棉2,300斤，实际交售26,000斤，仓里还存棉17,000斤，较原报数多20,000斤，西龙李队原报1,700斤，实际查出3,250斤，较原报数多1,550斤，找出棉花存处，揭开棉花生长好，产量低的原因。惠民县一肥公社检查已经拔了棉秸，还没有冬耕的棉田19,366亩，每亩有落地籽棉20斤，整个惠民地区平均每亩可拾落地籽棉10斤。临邑县查出32个私仓存籽棉11万斤，这个县单报出私藏棉花就有41万斤。","type":"paragraph"},{"text":"辽宁省反映，辽阳市安平公社也发现每亩有落地籽棉7.8斤。","type":"paragraph"},{"text":"湖北省反映，监利县朱北公社和平生产队，把30担籽棉藏在楼上，用席子盖起来，不愿意卖；麻城县宋埠公社第二、三生产队原说没有棉花了，经过动员后，又卖出2.4万斤，他们本来打算明年卖高价。荆州县三店公社红旗管理区，棉花收购任务37.7万斤，干部在收购20.5万斤的时候，还差45％，就叫喊完不成任务，收购进度迟迟不前，经过县里同志现场检查，和发动群众经过几天的突击，又从食堂、田边、棉秸垛上找回16万多斤棉，很快完成了任务。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84071184e9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
