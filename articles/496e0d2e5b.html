<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文艺工作者昨会师逸园纪念大会隆重举行在毛主席思想领导下团结起来　在为人民服务条件下团结起来","authors":[],"dates":[{"year":1949,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市文艺工作者纪念七七庆祝解放大会，昨日下午三时，在逸园体育场举行。主席台是临时搭的，正中放着巨幅的毛主席朱总司令像，两旁大红布上，写着“文代战士们用不倦不怠的精神来积极地学习”。“文艺工作者团结起来为人民文艺事业而奋斗。”"},{"type":"paragraph","text":"各文艺团体在掌声中陆续来了，当剧校同学化装美帝牵着东洋鬼，和蒋介石，宋美龄在解放军，工人，农民，监视下进场的时候，所有的人都因蒋介石扮得这么像而轰动了，摄影师和大家都围住了他们。在未开会以前，各文工团，你一个我一个争先恐后的歌唱着，尽情唱出了文艺工作者的欢乐。"},{"type":"paragraph","text":"大会在“跟着共产党走”歌声中揭幕，由各单位代表组成的代表团上了台，他们是夏衍，于伶，黄源，钟敬之，文协许广平，部队文工团丁世贤，总工会文工国柯蓝，音协郭乃安，美协叶苗，平剧吕君樵，越剧袁雪芬，游艺协会刘子云。黄源是主席团主席，他演讲说:“这是胜利的大会，团结的大会，会师的大会。”又说:“七七纪念，打倒日本帝国主义，把一切侵略中国势力的帝国主义打出去，南下解放全中国!”来宾副市长潘汉年发表几点希望说:一，希望上海文艺工作者在中国共产党毛主席的思想领导下团结起来。二，为了为人民服务的条件下，紧紧的团结起来。三，要创造自己的文艺，不要以苏联或英美为标准。夏衍主委说:“残余力量等待我们去消灭”。许广平向中国共产党，中国人民解放军和毛主席致敬，她因为昨天能在逸园(原来是帝国主义骗中国人钱的地方)开会而高兴，她呼喊说:“打倒帝国主义!”于伶说:“我们要团结得像一个巨人，他需要完成解放全中国的力量，为工农兵服务的力量”。丁世贤说:“用文艺的武器，向敌人瞄准，开枪。我们手拉手，肩并肩，战斗下去”。最后有柯蓝讲话，又鼓掌通过了致毛主席朱总司令，文代大会，新政协筹委会通电致敬。总工会文工团给大会献一面大红锦旗，上面写的是:“学习鲁迅的榜样，做无产阶级和人民大众的‘牛’。”"},{"type":"paragraph","text":"本来新旅要在草地上表演“大秧歌”，因为时间关系而作罢，四时半开始游行，每一队伍依次走到街上去。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"496e0d2e5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
