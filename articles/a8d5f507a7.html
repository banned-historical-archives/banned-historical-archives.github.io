"authors":[],"dates":[{"year":1966,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阮友寿主席致电毛主席"},{"type":"paragraph","text":"南越人民把中国核导弹试验成功当作抗美救国斗争强大鼓舞力量"},{"type":"paragraph","text":"新华社三十日讯　毛主席收到了越南南方民族解放阵线中央委员会主席团主席阮友寿发来的电报，最热烈地祝贺我国发射导弹核武器试验成功。电文如下："},{"type":"paragraph","text":"“敬爱的毛泽东主席：得悉中华人民共和国发射导弹核武器试验成功，我感到无限的高兴。我代表越南南方人民，越南南方民族解放阵线中央委员会，并以我个人的名义，向敬爱的主席，向中国共产党、中华人民共和国政府、中国人民解放军、中国工人兄弟姐妹、科学技术工作者和全体兄弟的中国人民致以最热烈的祝贺。"},{"type":"paragraph","text":"中华人民共和国的这个辉煌的成就，再一次证明了中国科学技术超速度的发展和中华人民共和国国防力量的不断巩固；这对于加强反对以美国为首的帝国主义和殖民主义的力量，保卫亚洲和世界和平，是一个极其巨大和积极的贡献。"},{"type":"paragraph","text":"越南南方人民和越南南方民族解放阵线为这个巨大的成就感到非常兴奋和充满信心，并且把它当作自己抗美救国斗争事业的强大鼓舞力量。我们坚信，伟大的中国人民在以您为首的中国共产党领导下，将取得更加巨大和辉煌的胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8d5f507a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
