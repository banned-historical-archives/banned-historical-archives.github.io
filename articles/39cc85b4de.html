<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文化大革命引来幸福水——记河南省汤阴县宜沟公社兴建引淇隧洞","authors":[],"dates":[{"year":1974,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命引来幸福水"},{"type":"paragraph","text":"——记河南省汤阴县宜沟公社兴建引淇隧洞"},{"type":"paragraph","text":"无产阶级文化大革命焕发了宜沟公社广大群众战天斗地的革命精神，他们决心修建一个隧洞，把隔山相望的淇河水引上高山，改变山区干旱的面貌。群众的意见很快得到了县、社领导的支持。"},{"type":"paragraph","text":"一九七○年一月，大地封冻，瑞雪纷飞，一支浩浩荡荡的水利大军，摆开了兴建地下长河的战场。"},{"type":"paragraph","text":"修建地下隧洞，不仅需要大量的水泥、钢材和木材，而且施工技术要求高，难度大。广大贫下中农狠批了刘少奇散布的“国家出钱，农民种田”的反动谬论，树立了自力更生、战胜困难的信心和决心。没有炸药自己造，缺少石匠自己培养，没有提升机械，就用辘轳绞。工程加快了，必须及时清除隧洞的石碴。贫农社员刘全录用拖拉机上的废圆盘耙和旧水车架，改制成土卷扬机，花钱很少，工效却提高了二十倍，大大加快了工程进度。"},{"type":"paragraph","text":"在八里长的隧洞中，有三里是坚硬岩层。民工们献计献策，总结出了打深眼、斜眼、群眼的三打掏心放炮经验，使开凿硬岩层的进度由每月二、三米提高到三十米。接着他们又克服重重困难，解决了排除地下积水，防治流沙、河卵石、塌方等难题，使工程顺利进行。经过四年斗争，终于胜利地完成了这个工程。"},{"type":"paragraph","text":"引淇隧洞西起太行山脉的旗杆岭下，钻越七条沟涧、八个山头，长达八里，隧洞拱形断面高三米，宽三米，过水量为十个流量，它把十里之外的淇河水引入琵琶寺水库，使宜沟公社七万多亩历史上的望天田，变成了水浇田。"},{"type":"paragraph","text":"文化大革命引来了幸福水，改变了千年旱岗的面貌，人们的精神面貌也变了。"},{"type":"paragraph","text":"引淇隧洞乘批林批孔的浩荡东风，胜利通水了！"},{"type":"paragraph","text":"在批林批孔斗争中，民工们狠批林彪效法孔老二“克己复礼”，妄图颠覆无产阶级专政，复辟资本主义的罪行，提高了阶级斗争和路线斗争的觉悟。在引淇工程完成以后，民工们又昂首阔步奔赴新的水利工地，打响了渠道配套的新战斗。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39cc85b4de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
