al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"和约的内容","alias":"","parts":[{"type":"paragraph","text":"和约的内容"},{"type":"paragraph","text":"（1919年7月28日）"},{"type":"paragraph","text":"斯末资\"将军说：“我之签定和约，非因和约乃满意的文件。为结束战争起见，不得不签定他。”又说：“新生活，人类大主义的胜利，人民趋向于新国际制度，和优善世界，所抱如此期望的践行，像这样的约言，均没有载上和约。于今只有国民心腔里所发义侠和人道的新真意，乃能解决和会里政治家困（因）难而止的问题。”又说：“我很以和约里取消默武主义，仅限于敌国为憾。”斯末资是英国一个武人，是手签和约的一个人，他于签约后所发议论是这样，我们就可想见那和约的内容。"},{"type":"paragraph","text":"[1]斯末资，今译史末资（1870—1950)，移居南非的荷兰人—布尔人，南非联邦的政治活动家、唯心主义哲学家。1910年组成的南非联邦是英国的自治领地。第一次世界大战中率军到东非与德军作战，被任命为东线英军总司令。1916年作为外国人破例参加英国战时内阁。1919年和博塔总理"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":7,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":73,"page_end":73},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"259753e4d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
