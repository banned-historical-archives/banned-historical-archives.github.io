":["李索开","河南"],"dates":[{"year":1955,"month":6,"day":1}],"is_range_date":false,"parts":[{"text":"在河南省文联文学座谈会上的发言","type":"title"},{"text":"河南李索开","type":"authors"},{"text":"(李索开：诗人，《奔流》编辑)","type":"subtitle"},{"text":"河南人民出版社，大官容易小官难缠，《奔流》广告到一号还不给登，说怕越登订户越多。出书质量低，作者不愿拿稿子去，愿到外地出书。","type":"paragraph"},{"text":"编辑也有苦恼，无社会地位，无政治地位。人代会编辑就没有参加的，作者写文章能参加。现在是一级级的，开鲁迅纪念会、作者在主席台是主席团，编辑只能当记录。","type":"paragraph"},{"text":"编者、作者、读者有矛盾，质量低，读者有意见，不发表作者有意见，编辑两头受挤，这也是苦恼。","type":"paragraph"},{"text":" （根据记录整理）","type":"paragraph"},{"text":" 来源：《苏金伞右派集团言论与作品》（河南省文学美术工作者联合会，1958年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bf4f5998f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
