script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从奴隶到宰相","authors":["刘忠信"],"dates":[{"year":1980,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"从奴隶到宰相"},{"type":"paragraph","text":"刘忠信"},{"type":"paragraph","text":"在我国商朝，有两个奴隶做宰相的。一个是伊尹，他辅佐商汤灭亡了夏朝以后，又帮助商汤制订了各种典章制度，使得商朝初期的政治比较安定，经济也比较繁荣。另一个是武丁时候的傅说（读yuè），做了宰相以后，仅用三年工夫，就把商朝治理得秩序井然，使得商朝又一次复兴起来。"},{"type":"paragraph","text":"伊尹和傅说两个奴隶是怎样当上宰相的呢？"},{"type":"paragraph","text":"相传奴隶傅说有治国安邦之才，但当时奴隶制度等级森严，无法得到重用。武丁登上王位后，想重用他。可提拔奴隶当宰相，贵族们会闹翻天。武丁于是想出个办法，故意说梦见先王商汤推荐了一个名叫傅说的大贤人，手下人深信不疑，奴隶傅说就这样“破格”当上了宰相。"},{"type":"paragraph","text":"伊尹原是在商汤厨房里干活的奴隶。一天，商汤找伊尹来问饭菜的事，伊尹就乘机用做菜的咸淡打比方谈起治国的事来。他说治理国家也和做菜一样，既不能操之过急，也不能松弛懈怠，只有恰到好处，才能把事情办好。于是商汤发现伊尹有治国安邦之才，便委以相职。"},{"type":"paragraph","text":"这两个事例可以给我们一点有益的启示。搞四化需要人才，需要“伯乐”和“千里马”。要当伯乐，就得要有点武丁破格用人的气魄，打破陈规陋习，力排“非议”，唯才是用。同样，是千里马，就不妨站出来鸣叫几声，把自己的能耐亮出来，来个伊尹式的自荐，不要光等着伯乐来识，别人来请！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57494ad0e1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
