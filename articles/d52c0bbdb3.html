s":[],"dates":[{"year":1949,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"平招待工展参观团"},{"type":"paragraph","text":"彭真叶剑英两同志号召"},{"type":"paragraph","text":"打开城乡关系提高产品质量"},{"type":"paragraph","text":"【平市讯】中共北平市委会、北平军事管制委员会暨北平市人民政府十五日上午联合招待来平参观工业展览会的各地代表团，中共北平市委书记彭真、市政府叶剑英市长，工商局程宏毅局长均亲自出席。会上，各地代表团广泛地交换了关于发展生产与物资交流的意见。关于城市生产的指导和公营生产计划的问题，各地代表说明各地生产与需要情况后，彭真同志指出，以后各个地区相互需要的生产品的种类、规格和数量，应当加以具体研究。他并提醒说，在生产中应当特别注意提高产品质量，减低生产成本，同时按照需要量决定生产数量。关于组织各地物资交流问题，叶市长综合各地代表团连日在各种座谈会上所提出的意见说，根据目前所表现的各种征候，说明我们在经济上是患着消化不良症的，为使消化系统正常，新陈代谢，就必须解决原料销路等问题，就必须打开城乡、内外等关系，组织运输，组织贸易；就必须取消各地各种人为的限制与障碍。他并说明在贸易活动中必须照顾全面，不要只计较一个部分的得失。并要动员和组织私商和公营的贸易公司合作社共同打开城乡关系。他号召从事经济工作的干部要正确的宣传与掌握四面八方的全面政策。最后，彭真同志提议，希望各地代表团按照工作性质分别举行座谈，交换经验，并经常和北平的贸易指导机关保持联系，以便组织城乡物资的交流，恢复和发展生产。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d52c0bbdb3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
