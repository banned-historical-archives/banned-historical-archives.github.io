"https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d.pdf"],"article":{"title":"为战胜德国法西斯——告人民书","alias":"","parts":[{"type":"paragraph","text":"为战胜德国法西斯一一"},{"type":"paragraph","text":"告人民书"},{"type":"paragraph","text":"（一九四五年五月九日）"},{"type":"paragraph","text":"同志们，男女同胞们！"},{"type":"paragraph","text":"战胜德国这一伟大的日子来到了。法西斯德国被追向红军和我们盟国的军队屈膝，承认自己已经战败并宣布无条件投降了。"},{"type":"paragraph","text":"5月7日，在兰斯签订了投降的初步议定书。5月8日，德军统师部的代表在柏林，在盟军最高统师部的代表和苏军最高统师部的代表面前，签署了最终投降书，投降书自5月8日24时开始执行。"},{"type":"paragraph","text":"我们深知德国头目们的豺狼癖性，他们素来把条约和协定看成一纸空文，所以没有理由相信他们的话。但是，今大从早晨起，德军为了履行投降书，已开始大批向我军缴械投降。这已经不是纸上空文。这是德国武装力量的真止投降了。的确，捷克斯洛伐克境内的一批德军仍然不肯投降。但我相信，红军会使他们觉醒过来的。"},{"type":"paragraph","text":"现在我们可以有充分根据地声明，彻底击败德国的这个有历史意义的日子，我国人民取得对德帝国主义的伟大胜利的日子来到了。"},{"type":"paragraph","text":"我们为了我们祖国的自由和独立而遭到的巨大牺牲，我国人民在战争进程中所经受的无数苦难，为了祖国而在后方和前线进行的紧张劳动，这一切都没有白白过去，而是获得了完全战胜敌人的结果。各斯拉夫民族长期以来为了自身的生存和独立而进行的斗争，终于以战胜德国侵略者和德国暴政而告终了。"},{"type":"paragraph","text":"从此，各国人民的自由和各国人民之间的和平的伟大旗帜，将飘扬在欧洲上空。"},{"type":"paragraph","text":"三年前，希特勒公开宣称，肢解苏联，把高加索、乌克兰、白俄罗斯、波罗的海沿岸以及其他地区从苏联割裂出去是他的任务。他直截了当地声明：“我们要消灭俄国，使它永远不能再站起来。”这是三年以前的事情。但是，希特勒的妄想本来就不能实现，战争的进程更把它打得粉碎。实际结果与希特勒分子的梦话正好相反。德国被彻底打败了。德军正在投降。苏联获得了胜利，虽然它既不打算肢解德国，也不打算消灭德国。"},{"type":"paragraph","text":"同志们！伟大上国战争的结果是我们完全胜利了。欧洲的战争时期结束了。和平发展时期开始了。"},{"type":"paragraph","text":"我亲爱的男女同胞们！我向你们祝贺胜利！"},{"type":"paragraph","text":"光荣属于保卫了我们祖国的独立和赢得对敌胜利的我们的英勇的红军！"},{"type":"paragraph","text":"光荣属于我们伟大的人民，赢得胜利的人民！"},{"type":"paragraph","text":"在同敌人作战中牺牲了的、为了我国人民的自由和幸福而献出了生命的英雄们永垂不朽！"},{"type":"paragraph","text":"选自新编《斯大林全集》译自《论苏联伟大卫国战争》1952年版第192—194页"},{"type":"paragraph","text":"第16卷第159—160页"}],"authors":["斯大林"],"dates":[{"year":1945,"month":5,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":2325,"page_end":2326},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22f85f9f17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
