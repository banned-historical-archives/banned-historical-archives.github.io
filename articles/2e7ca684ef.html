script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji10","name":"毛泽东全集第10卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"如敌决心开战红军主力可分三步出击","alias":"","parts":[{"type":"paragraph","text":"如敌决心开战红军主力可分三步出击"},{"type":"paragraph","text":"（1937年1月8日）彭、任\"："},{"type":"paragraph","text":"甲、到三原后，准备休息三天，情况许可，再延长至五天或七天，请规定工作日程。十五军团在咸阳亦然。"},{"type":"paragraph","text":"乙、如敌决心开战，红军主力应以第一步出商洛，第二步出豫西，第三步出京汉路为上策。如此方能改变整个局势，分化南京，迫蒋就范。留二方面军在渭北策应友军?在内线作战。尔后内线之红军与友军同外线之红军主力互相策应为战略上之配合作战。但目前争取在三原、咸阳多休息几天，不致和平被敌人破坏，一时不向东出动。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八日二十四时"},{"type":"paragraph","text":"[1]彭、任，指彭德怀、任弼时，当时分别任红军前敌总指挥和政治委员。"},{"type":"paragraph","text":"[2]商洛，指陕西商州和洛南。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":129,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e7ca684ef"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
