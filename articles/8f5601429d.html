dates":[{"year":1956,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乌克兰舞蹈团举行告别演出"},{"type":"paragraph","text":"毛主席和刘委员长出席观看"},{"type":"paragraph","text":"新华社19日讯　毛泽东主席和刘少奇委员长今晚出席观看了苏联乌克兰国家舞蹈团在天桥剧场举行的精采演出。"},{"type":"paragraph","text":"这是舞蹈团在中国进行了为时三个半月访问演出后的、向北京观众的告别演出。舞蹈团先后在北京、武汉、广州、杭州、上海、无锡、郑州、西安、南宁等地演出了三十九场，观众达二十多万人。他们还曾深入到工厂、农村和部队，为中国的工人、农民和士兵们演出九场。他们卓越优美的艺术表演，受到了中国各界观众的热烈欢迎。"},{"type":"paragraph","text":"在今晚演出中，苏联乌克兰女艺术家们还首次表演了他们向武汉人民艺术剧院学来的荷花舞，受到了观众热烈的鼓掌欢迎。在四次谢幕后，她们又重演了一次。武汉人民艺术剧院演员刘凤今晚也同苏联乌克兰舞蹈家列昂尼德·鲁申卡一起表演了喀山鞑靼人舞。这是舞蹈团教给武汉人民艺术剧院的舞蹈节目之一。"},{"type":"paragraph","text":"在演出休息时，毛泽东主席接见了舞蹈团艺术指导维尔斯基，团长彼什缅内，乐队总指挥伊瓦什琴珂、副团长格拉斯。接见时，苏联驻中国大使尤金也在座。演出毕，毛泽东主席和刘少奇委员长同舞蹈团全体演员握手见面，向他们问好。中国艺术工作者也向他们献了花篮。苏联艺术家们长时间地鼓掌欢呼：“友谊！”"},{"type":"paragraph","text":"今晚出席观看的，还有文化部副部长钱俊瑞、夏衍，外交部副部长姬鹏飞，中国文学艺术界联合会副主席周扬，中国人民对外文化协会副会长阳翰笙，对外文化联络局代理局长陈忠经和北京各界人士。"},{"type":"paragraph","text":"苏联驻中国大使尤金也出席观看。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f5601429d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
