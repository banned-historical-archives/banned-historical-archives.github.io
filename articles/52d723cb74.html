<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对“小资产阶级的改造”的一点体味","authors":["斯勤"],"dates":[{"year":1951,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"斯勤"},{"type":"paragraph","text":"小资产阶级的改造是一个长期的痛苦的斗争过程。这一句话差不多是每一个小资产阶级出身的知识分子都知道的。但是是否每一个人都能真正懂得这句话呢?那就未必。"},{"type":"paragraph","text":"小资产阶级的改造是一个斗争过程，因为谈到“改造”，那就必然是一种变革现实的实践；是一个斗争过程。为什么又是痛苦的斗争过程呢?因为这里所要变革的“现实”，就是自己；斗争的对象就是自己。自己要“变革”自己，自己割自己的尾巴，总是有痛苦的。至于长期，那是比较容易了解的。任何一种变革现实的实践的斗争，总是不可能一蹴而就的。造成一种“现实”不是一朝一夕之故，要变革它也就非得用旦旦暮暮之功不可。"},{"type":"paragraph","text":"实践论教导我们说:“如果要直接地认识某种或某些事物，便只有亲身参加于变革现实、变革某种或某些事物的实践的斗争中，才能触到那种或那些事物的现象，也只有在亲身参加变革现实的实践的斗争中，才能暴露那种或那些事物的本质而理解它们。”要能真正认识小资产阶级的改造是个怎么样的过程，便只有亲身参加到变革小资产阶级——具体地说就是“自己”——这一现实的实践的斗争里去；只有亲身改造自己、下决心改造自己并且真正在改造自己的人，才能明自改造自己的必要。那些空口说白话的人是不曾真正认识自己，更不能改造自己的。改造自己是个痛苦的斗争过程。没有“痛苦”，这个“自己”改造不了。痛苦必需承受，并且要进一步战胜它；经过并且战胜一次痛苦，就是在改造的过程中取得了一点成绩。能够承受并且战胜痛苦，需要有顽强的意志。大家可以有这样的体验:当进步意识与落后意识激烈斗争的时候，往往需要用一种“强制工夫”把落后意识硬压下去，才能使进步意识抬头，才能得到正确的结果。譬如自己的亲人是反革命分子，要检举他，可又有对他的感情上的牵连，不用上面所说的“强制工夫”，这种感情上的牵连一时是很不易克服的。而一旦检举了他，这些牵连也就化为乌有了，会感到一种轻松、一种喜悦。这种“强制工夫”是一个很宝贵的东西，是一个关键。能够强制得住，虽然一时痛苦，但是进步意识得到了助力，就可以得到发展；反之，强制不住，就等于是放任了落后意识，在斗争中做了逃兵，其结果是可以想见的。痛苦并不难战胜，能够承受痛苦就已经战胜了它；要不得的是怕它、逃避它。因此，那些常常宽恕自己、没有勇气和决心承受一点痛苦、幻想慢慢来的人，是不会真正懂得怎样改造自己，也不会得到进步的。"},{"type":"paragraph","text":"常常听见这样一句话:“理论上我是搞通了，可是感情上接受不了。”在这种时候最需要“强制工夫”。因为这儿所谓感情，实际上是小资产阶级的感情，是需要变革的现实。如果不强使自己接受自己以为已经是“搞通”了的东西，其实仍然是没搞通。能够强使自己接受了，于是就能真的搞通了。因此，不明白理论与实践必需紧密联系；不明白感情的阶级性，常常以“感情上接受不了”做挡箭牌，逃避改造的痛苦的人，是不会真正改造自己的。"},{"type":"paragraph","text":"有人说过:小资产阶级的改造是一个脱胎换骨的过程。起初，对这句话的了解是很表面的；现在能够有点体味到“脱胎换骨”这四个字的分量和包含的内容了。但要说完全理解，那还差得远哪!"},{"type":"paragraph","text":"一九五一、五。"},{"type":"paragraph","text":"十一、傍晚"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52d723cb74"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
