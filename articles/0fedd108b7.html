ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"毛泽东等祝贺保加利亚社会主义革命二十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺保加利亚社会主义革命"},{"type":"paragraph","text":"二十周年的电报！"},{"type":"paragraph","text":"（1964年9月8日）索非亚保加利亚共产党中央委员会第一书记、保加利亚人民共和国部长会议主席托·日夫科夫同志，保加利亚人民共和国国民议会主席团主席格·特莱科夫同志："},{"type":"paragraph","text":"在保加利亚社会主义革命二十周年的时候，谨向你们和兄弟的保加利亚人民表示热烈的祝贺。祝贺保加利亚人民在社会主义建设事业中取得的成就。"},{"type":"paragraph","text":"中保两国人民之间存在着深厚的友谊。维护和加强这种友谊，不仅完全符合我们两国人民的共同愿望，而且有利于社会主义阵营的团结。中国人民将一如既往，在马克思列宁主义和无产阶级国际主义的基础上，在一九五七年宣言和一九六○年声明的革命原则的基础上，为加强两国人民的友谊和团结，为加强社会主义阵营的团"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会的名义和中华人民共和国主席刘少奇、全国人民代表大会常务委员会委员长朱德、国务院总理周恩来联名给保加利亚共产党中央委员会第一书记、保加利亚人民共和国部长会议主席托·日夫科夫，保加利亚人民共和国国民议会主席团主席格·特莱科夫的电报。祝贺保加利亚社会主义革命二十周年。毛泽东全集第四十七卷结，为反对帝国主义的侵略政策和战争政策，为保卫世界和平而继续努力。"},{"type":"paragraph","text":"祝保加利亚人民在建设自已祖国的事业中取得新的成就。祝中保两国人民的兄弟友谊巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六四年九月八日"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":9,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":141,"page_end":142},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fedd108b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
