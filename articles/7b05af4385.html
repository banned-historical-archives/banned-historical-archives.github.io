rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"郭兴福：毛主席号召推广其教学法","authors":[],"parts":[{"type":"paragraph","text":"郭兴福："},{"type":"paragraph","text":"毛主席号召推广其教学法"},{"type":"paragraph","text":"郭兴福，男，中共党员，山东省邹平县人，1930年2月出生，1948年9月入伍，73091部队二连原副连长。"},{"type":"paragraph","text":"上世纪50年代末60年代初，中央军委提出恢复和发扬群众性练兵传统，从实战需要出发，从难从严苦练精兵。作为连战术教练员的郭兴福进行战术教学就像打仗一样，不仅声音洪亮，而且动作既狠又准。"},{"type":"paragraph","text":"郭兴福结合在战斗实践中积累的经验，对现行的训练进行研究。1961年，在各级首长和机关的帮助下，郭兴福在军事教学中，把练思想和练战术结合起来，总结出一套符合部队实际的行之有效的教学方法，就是后来闻名全军的“郭兴福教学法”。"},{"type":"paragraph","text":"1963年10月，叶剑英元帅在参加南京军区推广郭兴福教学法现场会后，向毛泽东主席和中央军委呈送了专题报告，建议在全军推广。毛主席说叶帅找到了一个好方法，对郭兴福教学法给予充分肯定和赞扬。1964年1月3日，毛主席向全军发出号召：“全军立即行动起来，掀起一个学习郭兴福教学法的群众性运动，要向学雷锋、好八连那样，学习郭兴福教学法。”当时，全军掀起了大规模学习推广郭兴福教学法的群众性运动。1964年2月，南京军区领导机关授予郭兴福“优秀教练员”称号。"},{"type":"paragraph","text":"（南京军区政治部宣传部供稿）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b05af4385"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
