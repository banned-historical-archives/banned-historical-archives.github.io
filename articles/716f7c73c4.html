9,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界最高的旅馆"},{"type":"paragraph","text":"左图中最高的建筑物是美国亚特兰大的桃树广场旅馆。该旅馆高七十三层，是目前世界上最高的旅馆建筑。不久前邓小平副总理访问亚特兰大时，曾在这里下榻。这个旅馆的主楼为圆塔形建筑，有一千一百间客房。客房沿圆周布置，交通、服务部分靠近圆心，使面积得到了合理利用。顶部三层餐厅的上下两层可以旋转，客人可以边吃饭边鸟瞰市容。圆塔旁十一层的长方形楼内有一个“庭院”作为活动中心，包括各式餐厅、商店等。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"716f7c73c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
