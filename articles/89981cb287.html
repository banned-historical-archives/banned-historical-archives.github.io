ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"为杨十三题写抚联","alias":"","parts":[{"type":"paragraph","text":"为杨十三题写挽联1"},{"type":"paragraph","text":"（1939年9月）国家在风雨飘摇②之中，对我辈特增担荷；"},{"type":"paragraph","text":"燕赵多慷慨悲歌之士，于先生犹见典型。"},{"type":"paragraph","text":"[1]1939年7月21日，原冀东抗日联军政治部主任、八路军总部干部杨裕民，因长期转战，积劳成疾，不幸逝世。9月，八路军总部召开了追悼大会。毛泽东写了这副挽联。杨裕民（1889一1939），原名彦伦，字灿如，又名裕民，排行十三。河北省迁安县人。高等工业专门学校毕业，留学美国。回国后在河北省工业学院任教授多年。结交爱国革命人士，积极从事抗日救亡活动。七七事变后，在中国共产党领导下，参与策划冀东抗日工作。1938年被推为冀东抗日联军政治部主任。1939年7月21日因病逝世。"},{"type":"paragraph","text":"[2]风雨飘摇，比喻国家动荡不安。"},{"type":"paragraph","text":"[3]燕赵多慷慨悲歌之士，语出唐代韩愈《送董邵南序》：“燕赵古称多慷慨悲歌之士。”意思是说，燕赵一带古时候就以有许多慷慨激昂见义勇为的"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":102,"page_end":102},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89981cb287"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
