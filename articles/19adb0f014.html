龙"],"dates":[{"year":1993,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界乒坛八位名将会战广州"},{"type":"paragraph","text":"王涛和马文革进入半决赛"},{"type":"paragraph","text":"新华社广州６月１５日电（记者曹剑杰、方悟龙）有８位世界级选手参加的爱普生世界全明星乒乓球巡回赛第二站比赛今晚在这里揭幕。志在报一箭之仇的中国选手王涛，以３∶０击败波兰老将格鲁巴进入半决赛，另一位中国选手马文革以３∶１击败唯一一名直拍选手、韩国的刘南奎而晋升四强。"},{"type":"paragraph","text":"另外两个半决赛席位被德国的罗斯科夫和瑞典的林德获得。"},{"type":"paragraph","text":"世界排名第七的王涛，前天在香港结束的全明星赛首站比赛中不敌３５岁的格鲁巴，居于亚军。今晚一战，王涛抢拉积极，且频频使出反手弹击“绝活”，以２１∶８拿下第一局。第二、三局，王涛拉打结合，命中率颇高；而格鲁巴则失误频频。王涛以２１∶１８、２１∶１４又连胜两局。"},{"type":"paragraph","text":"在今晚另外两场比赛中，德国选手罗斯科夫以快制快，以３∶２险胜瑞典的佩尔森。比利时的塞弗意外地以１∶３败在瑞典老将林德拍下。"},{"type":"paragraph","text":"明天半决赛的对阵形势是：马文革对罗斯科夫、王涛对林德。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19adb0f014"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
