script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宁夏额济纳旗脱离匪帮接受人民政府领导额旗扎萨克塔旺嘉布电毛主席朱总司令表示拥护","authors":[],"dates":[{"year":1949,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社宁夏十三日电】　(定远营迟到消息):宁夏额济纳旗扎萨克兼防守司令塔旺嘉布，于九月二十七日致电人民解放军十九兵团司令员杨德志，并转毛主席朱总司令电报一件，宣布与广州国民党残余政府脱离关系，接受北京中央人民政府领导。原电如下:"},{"type":"paragraph","text":"北京中共中央毛主席朱总司令:"},{"type":"paragraph","text":"我为了迎接新的胜利，为了适应国情，为了促成新中华人民共和国的即早成立，今代表额济纳特别旗全体人民，即日起与广州国民党政府脱离关系，衷愿接受北京人民政府领导，请速派员亲临指导，并祝毛主席健康，中国人民政治协商会议成功。"},{"type":"paragraph","text":"额济纳旗扎萨克兼防守司令塔旺嘉布九月二十七日叩"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13be3a83f5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
