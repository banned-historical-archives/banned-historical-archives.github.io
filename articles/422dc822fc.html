[{"year":1965,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"丹麦新任驻中国大使向刘少奇主席递交国书"},{"type":"paragraph","text":"新华社二日讯　丹麦王国新任驻中国大使特罗尔斯·瓦尔德马·安德烈斯·奥尔登伯格，今天下午偕同大使馆官员向刘少奇主席递交了国书。"},{"type":"paragraph","text":"奥尔登伯格大使在颂词中说，丹麦特别重视它同中华人民共和国之间已经存在的良好关系。"},{"type":"paragraph","text":"刘少奇主席在答词中说，中国政府一贯坚持和平外交政策，愿在五项原则基础上与不同社会制度的国家和平共处。中国政府也十分珍视增进同丹麦的友好关系。刘主席表示深信，中丹两国之间的友好关系将继续得到发展。"},{"type":"paragraph","text":"递交国书时在场的，有外交部副部长罗贵波，礼宾司司长赖亚力，西欧司司长谢黎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"422dc822fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
