ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"红军主力以出商洛为宜","alias":"","parts":[{"type":"paragraph","text":"红军主力以出商洛为宜"},{"type":"paragraph","text":"（1937年1月11日）周、博\"，并告彭、任："},{"type":"paragraph","text":"过细考虑，红军主力以出商洛为宜。该路击破即可转入豫西，敌中右两路无能为矣。使用二方面军及二十七军于蒲城，威胁陈诚集团之翼侧，使之不敢猛进，协助我主力在商洛之成功。请即取得杨之同意。如主力用于渭北，则战略上全处被动地位，战术上亦有许多困难，如彭任所顾虑者，故不宜取此方针。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一日二十一时"},{"type":"paragraph","text":"[1]周、博，指周恩来、博古（秦邦宪)，当时是中共中央派往西安的代表。"},{"type":"paragraph","text":"[2]彭、任，指彭德怀、任弼时，当时分别任红军前敌总指挥和政治委员。"},{"type":"paragraph","text":"[3]商洛，指陕西商州和洛南。"},{"type":"paragraph","text":"[4]二十七军，指1936年12月组建的红军第二十七军，军长贺晋年，政治委员王平。"},{"type":"paragraph","text":"[5]陈诚，当时任国民党军“讨逆”军第四集团军总司令。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":133,"page_end":133},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a4805e347"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
