script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美日“行政协定”严重侵害日本主权激起日本各阶层人民的反对社会党左派和其他资产阶级政党发表声明　要求吉田政府把“行政协定”提交国会审议","authors":[],"dates":[{"year":1952,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京一日电】　东京消息:美日“行政协定”的赤裸裸侵害日本独立主权的条款，已激起日本各阶层人民的反对。社会党左派和其他资产阶级政党也在二十六日纷纷发表声明，反对“行政协定”，并对美国利用这个协定把日本推上战争轨道表示忧虑。社会党左派的声明指出:“行政协定”使破坏日本独立与和平的单独对日和约和美日“安全条约”变得更现实了。声明说:整个说来，“行政协定”不是由美日两国在平等的地位上制订的。由于这个协定，日本全国各地都比以前更进一步地军事基地化了，日本的工矿设备有一半置于军事管制之下。社会党左派斥责吉田政府与美国协议把所谓“紧急状态”等重要事项作为“谅解事项”秘而不宣。它说:吉田政府这一措施是“难以容忍的违反宪法的行为”，同时使日本国民因为美国事实上将有权干涉日本内政而感到不安。关于治外法权的规定，“使人有日本被作为附属国家的印象”。声明重申该党废除美日“安全条约”的主张，并要求将“行政协定”提交国会审议。声明指出:要彻底消除驻日美军的无限制的治外法权，必须展开坚决的斗争。最近以国民民主党为中心而成立的新党——改进党，谴责吉田政府违反宪法，没有在事先就“行政协定”问题向国会报告。该党的声明说:变相的治外法权——“审判权”是“奴役而屈辱的规定”，它“过分地侵害了国家权利”。该党对于把日本缚上美国战车的所谓“紧急状态”的规定，“极感惊讶”，并认为这种规定“形成人心不安的情绪”。社会党右派在声明中也反对以“行政协定”的规定来侵害日本主权和国民的基本人权。该党认为所谓“审判权”在实质上就是“治外法权性的特权”，使日本的主权“受有严重的限制”。声明并表示反对关于“紧急状态”的规定。声明说:“这种茫然的规定使我国的主权在实质上丧失独立性。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9413fa135f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
