" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对进一步实行节约闹革命、坚决节约开支的紧急通知稿的批语","alias":"","parts":[{"type":"paragraph","text":"对进一步实行节约闹革命、坚决节约开支的紧急通知稿的批语\""},{"type":"paragraph","text":"（1968年2月）在第六条的一句作了修改，请酌。"},{"type":"paragraph","text":"[1]这个批语写在周恩来等1968年2月14日送审的中央中央、国务院、中央军委、中央文革紧急通知稿上。通知稿共十一条，其中第六条讲道：“在一个单位因为派别斗争分裂成两个生产领导班子、两套财务会计、两个金库、两个银行账户的，必须按我们伟大领袖毛主席的最新指示在二月底以前迅速联合起来，实行统一领导，统一管理。否则，即由上级派军管人员或由上级革委会（革筹小组）、军管会派人来掌握生产和业务的统一领导和统一管理。”毛泽东审阅时，将这一条中的“二月底以前”改为“文到一个月内”。2月18日，中共中央、国务院、中央军委、中央文革发出了这个紧急通知，注明可以在一切基层单位宣读，在内部张贴。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":182,"page_end":182},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82af4c2aba"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
