众明确了意义，讨论和修改了一些合理的规章制度","authors":[],"dates":[{"year":1977,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海新华印刷厂广大干部、群众，联系本单位实际，狠揭猛批“四人帮”破坏工业学大庆的罪行，把开展学大庆和建立合理的规章制度结合起来，推动了工业学大庆群众运动的蓬勃开展。"},{"type":"paragraph","text":"在学大庆的过程中，这个厂首先联系实际，揭批“四人帮”破坏工业学大庆，反对建立合理的规章制度，煽动无政府主义的罪行。一九七二年，全厂职工遵循毛主席关于“制度要有利于群众”的教导，认真贯彻“鞍钢宪法”，学习大庆经验，批判了刘少奇、林彪一伙鼓吹“制度万能”、“制度无用”等谬论，依靠群众，建立和健全了一套以提高产品质量为中心，以岗位责任制为主要内容的规章制度。"},{"type":"paragraph","text":"但是，祸国殃民的“四人帮”及其在上海的余党知道这件事以后，兴师问罪，又是大会点名，又是小会批判，污蔑这些规章制度“是管、卡、压”，并多次派人来厂调查这件事的所谓“真相”，当即受到革命群众的痛斥。他们碰了一鼻子灰，在无可奈何的情况下，只能以上级名义对厂里施加压力，逼着厂党委写检查。由于“四人帮”的干扰破坏，严重挫伤了广大群众大干社会主义的积极性。"},{"type":"paragraph","text":"粉碎“四人帮”，生产力大解放。在以华主席为首的党中央领导下，这个厂轰轰烈烈、扎扎实实地开展“工业学大庆”的群众运动。为了落实华主席提出的《毛泽东选集》第五卷在今年上半年和全国人民见面的指示，厂党委坚持以阶级斗争为纲，做好思想政治工作，带领全厂职工，围绕“为什么要建立合理的规章制度”这一问题展开讨论，使大家认识到，合理的规章制度是工人群众在长期的工作实践中的经验总结。如果没有必要的规章制度，社会主义的大生产就无法进行。职工们说，我们印刷厂是党的舆论工具，政治质量要求很高，真是一字之差差千万，与世界革命人民都有关。因此，更要学习大庆人“三老四严”、“四个一样”的革命作风，对工作做到认真负责，坚守岗位，一丝不苟，极端负责。为了迎接印刷《毛泽东选集》第五卷的光荣任务，这个厂把被“四人帮”打入冷宫的过去订的规章制度重新拿出来，发至全厂各班组，让群众再次讨论、修订。如制版车间校对组，是个文字把关小组。为了做好《毛泽东选集》五卷的文字校对工作，他们对过去制订的规章制度，又进行了认真的讨论，提出了“三校灭错，力争初校、二校消灭差错”的口号，保证做到文字、标点符号一个不错，以最快速度完成这项光荣任务。这个厂的同志纷纷表示，一定要严格遵守岗位责任制，加强自检、互检和专职检验，使每道工序、每一工种都有专人负责，一环紧扣一环，保证印刷产品的政治严肃性，为宣传好马克思主义、列宁主义、毛泽东思想作出贡献。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea74da0a0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
