<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"强烈抗议日共修正主义分子的反华暴行","authors":[],"dates":[{"year":1967,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《人民日报》短评"},{"type":"paragraph","text":"日共修正主义分子，最近在东京接连组织暴徒，殴打旅日华侨青年和维护日中友好的日本朋友，制造了骇人听闻的流血事件。中国人民对此表示极大的愤慨和强烈的抗议。我们对被暴徒打伤的旅日华侨青年和日本朋友表示亲切的慰问和崇高的敬意!"},{"type":"paragraph","text":"在东京连续发生的严重流血事件，完全是日共修正主义分子有计划有组织地制造出来的。可是，《赤旗报》竟颠倒黑白，混淆是非，把赤裸裸的法西斯暴行说成是什么为了“保卫”日本的“民主运动”。这是对广大的日本共产党员和日本人民的莫大侮辱。"},{"type":"paragraph","text":"正当美帝国主义、苏共修正主义领导集团和各国反动派，疯狂攻击我国无产阶级文化大革命，掀起一股狂暴的反华浪潮的时候，特别是紧接着苏修领导集团一再制造反华暴行之后，日共修正主义分子跳出来表演了这样一场丑剧，当然不是偶然的。日共修正主义分子策动这次反华事件，完全是为苏修领导集团和美、日反动派效劳的。他们这样赤膊上阵，就进一步暴露了自己的真面目。"},{"type":"paragraph","text":"人们可以清楚地看到，日共修正主义分子喋喋不休地大讲特讲的“联合行动”，原来就是公然同美、日反动派和苏修领导集团勾结在一起，充当他们反华的打手!"},{"type":"paragraph","text":"在这一场严重的斗争中，旅日华侨青年表现出了不畏强暴、敢于斗争、敢于胜利的英勇气概。他们活学活用毛主席著作，以伟大的毛泽东思想为武器，同迫害他们的法西斯暴徒进行了顽强的斗争。他们为广大的华侨青年树立了一个光辉的榜样。他们不愧是中国人民的好儿女，是维护中日友好事业的坚强战士。他们受到了中日两国人民的尊敬。"},{"type":"paragraph","text":"许多日本朋友为了维护日中友好和主持正义，在抗击暴徒袭击中，不顾生命的危险，仗义执言，挺身而出。这些天来，日本的马克思列宁主义者和各界人民纷纷举行集会，抗议和谴责日共修正主义分子的反华暴行。这表现了日本的马克思列宁主义者和人民对中国人民的真诚的深厚的友谊。他们为日中友好事业作出了新的贡献。中国人民对于一切为维护日中友好而斗争的日本同志们和朋友们表示衷心的感谢!"},{"type":"paragraph","text":"毛主席说:“日本人民同中国人民是好朋友。”又说:“中日两国人民要联合起来”。中日友好是两国八亿人民的共同愿望。这是一个不可抗拒的历史潮流。凡是破坏中日友好的人都没有好下场，这是历史已经反复证明了的。谁要是不顾前车之鉴，一意孤行，必将被历史的潮流所淹没。"},{"type":"paragraph","text":"(新华社北京11日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cf7c08b2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
