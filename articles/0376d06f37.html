dates":[{"year":1974,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命使杜山变了样"},{"type":"paragraph","text":"湖北省鄂城县杜山大队党支部"},{"type":"paragraph","text":"伟大领袖毛主席亲自发动和领导的亿万革命群众参加的无产阶级文化大革命，摧毁了以刘少奇为头子和以林彪为头子的两个资产阶级司令部，深入批判他们反革命的修正主义路线，进一步巩固了无产阶级专政，有力地促进了社会主义事业的迅猛发展。这场革命完全必要，非常及时。我们贫下中农无不拍手叫好。"},{"type":"paragraph","text":"叛徒、卖国贼林彪站在地、富、反、坏、右的立场上，把孔丘的“克己复礼”作为自己的反动纲领，散布“今不如昔”的反动谬论，恶毒攻击无产阶级文化大革命，妄图开历史的倒车，复辟资本主义。这只能是白日做梦，枉费心机。墨写的谎言掩盖不了铁的事实。我们种田打土巴的庄稼汉，说话办事从来是实打实，无产阶级文化大革命就是好得很！"},{"type":"paragraph","text":"就拿我们大队来说吧。解放前流传着这样一首歌谣：“杜山杜山，怕涝怕旱；春季下籽一斗，秋天收粮一碗；全部交租还不够，十有九户去逃荒。”这就是那时的真实写照。解放后，我们贫下中农翻身作了主人，坚持社会主义道路，战天斗地，不断夺得农业好收成。特别是经过无产阶级文化大革命，我们大队和全国一样，发生了深刻的变化。毛主席的革命路线更加深入人心。社员群众更加关心国家大事，坚持办政治夜校，自觉刻苦攻读马列的书和毛主席的书。社员们以马克思主义、列宁主义、毛泽东思想为武器，批判修正主义，不断提高阶级斗争、路线斗争和继续革命的觉悟。“无产阶级文化大革命是使我国社会生产力发展的一个强大的推动力。”我们大队社员们在文化大革命中焕发出来的革命干劲，大大推动了生产的发展。一九七○年以来，连续三年实现粮、棉、猪超《纲要》。一九七三年粮食亩产达到一千二百多斤，比文化大革命前增长二倍。棉花亩产达到一百多斤，比文化大革命前增长一倍半。全大队兴办了排灌、榨油、养鱼、植莲、林业等各项事业，又集体修建仓库、学校、文化室、牛栏、猪圈。我们已经有拖拉机、电动机、脱粒机、轧米机等各种机械，排灌、运输、耕作、粮食加工都基本实现了机械化和半机械化。看看无产阶级文化大革命以来，我们杜山大队的巨大变化，咱贫下中农和社员群众，哪个不打心眼里感到欢欣鼓舞啊！"},{"type":"paragraph","text":"人民大众开心之日，就是反革命分子难受之时。资产阶级野心家、阴谋家林彪及其死党越是疯狂攻击无产阶级文化大革命，就越证明这场革命是完全必要的，是非常及时的，是好得很。我们也就越要牢记党的基本路线，坚持社会主义道路，反对资本主义复辟；坚持前进，反对倒退。我们一定要把批林批孔运动进行到底，进一步巩固和发展无产阶级文化大革命的伟大成果，夺取更大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0376d06f37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
