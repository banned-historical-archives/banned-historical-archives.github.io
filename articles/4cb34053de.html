者发展组织的决定（摘要）","authors":[],"dates":[{"year":1951,"month":7,"day":3}],"is_range_date":false,"parts":[{"text":"民主建国会常务委员会为向中小工商业者发展组织的决定（摘要）","type":"title"},{"text":"民主建国会常务委员会最近通过“为向中小工商业者发展组织的决定”。摘要如下：","type":"paragraph"},{"text":"一年多来，本会组织工作是有成绩的，分会由四个发展到二十二个，会员增加了五倍多。但是本会过去在中小工商业者方面发展会员这一工作做得还是十分不够。现在总会为了贯彻这一发展组织的方针，特再决定今后发展会员，应以中小工商业者为主要对象。","type":"paragraph"},{"text":"理由是：一、本会当前的政治任务是组织广大的工商业者普遍参加抗美援朝爱国运动。在各地区工商界中，中小工商业者在数量上总是占绝对的多数，过去我们在发展组织方面对于中小工商业者未曾加以充分的重视，为着更好地完成本会的政治任务，应和有关方面密切配合，积极组织和推动广大的中小工商业者，参加各种爱国运动。","type":"paragraph"},{"text":"二、在今天全国工商业中，中小工商业占有很大的比重。土地改革完成以后，广大的中小工商业者有了发展前途。本会必须帮助他们组织起来，改善经营方式，以集体的力量，来解决经营和技术上的各种具体问题，根据分工合作的原则，在国营经济领导之下，为新民主主义经济建设而发挥巨大的力量。","type":"paragraph"},{"text":"三、在目前全国各地严厉镇压反革命运动中，为了彻底肃清反革命分子，本会必须把中小工商业者更广泛地组织起来，依靠群众力量，大胆的检举反革命分子，以巩固人民民主专政。","type":"paragraph"},{"text":"四、就工商界本身来说，中小工商业者，过去是受帝国主义、封建势力、和官僚资产阶级压迫最深的，他们有较大的进步性。本会的基本任务是要把工商业者广泛地组织起来，使成为人民民主统一战线重要的一环。今后就必须把中小工商业者的积极分子大量吸收进来。因为只有依靠他们团结了广大的中小工商业者，才能使本会成为一个真正有群众基础的政治团体，巩固和扩大工商界的统一战线。","type":"paragraph"},{"text":"这是本会组织路线上一个伟大的发展阶段，愿我全体同志共同努力，为完成这一历史性的任务而奋斗！","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4cb34053de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
