art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"积极参加反击右倾翻案风的伟大斗争","authors":["尚劲/胡维标/乔天富"],"parts":[{"type":"paragraph","text":"毛主席亲自发动和领导的当前这场反击右倾翻案风的斗争，是无产阶级和资产阶级的大搏斗，是无产阶级文化大革命的继续和深入。这是“南京路上好八连”的干部战士在学习毛主席的重要指示，深入批判党内那个不肯改悔的走资派的修正主义路线。"},{"type":"paragraph","text":"防化兵某部研究所的科技人员积极参加反击右倾翻案风的斗争，批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领。"},{"type":"paragraph","text":"北京卫戍区某部六连党支部，在反击右倾翻案风的斗争中，组织干部战士继续批判孔孟之道，深挖党内不肯改悔的走资派的思想根源。"},{"type":"paragraph","text":"资产阶级在哪里进攻，无产阶级就在哪里战斗。某部文艺宣传队赞颂文艺革命的大好形势，狠批党内不肯改悔的走资派在文艺界刮起的右倾翻案风。"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，团长、战斗英雄郭忠田和北京部队某部八连理论小组一道，结合评论《水浒》，批判党内那个不肯改悔的走资派推行的修正主义、投降主义路线。"},{"type":"paragraph","text":"沈阳部队某部举办社会主义新生事物展览，用大量社会主义新生事物茁壮成长的事实，歌颂无产阶级文化大革命的伟大胜利，批判党内不肯改悔的走资派散布的“今不如昔”的谬论。"},{"type":"paragraph","text":"总后勤部某部勤务二连干部战士在党支部领导下，积极参加反击右倾翻案风的伟大斗争，深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领。图为他们办的大批判专栏。"},{"type":"paragraph","text":"（本版照片为尚劲、胡维标、乔天富、孔海、杜殿文、吴荣凯、齐迎新、丁泽、后军摄）（照片）"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aab24cf41d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
