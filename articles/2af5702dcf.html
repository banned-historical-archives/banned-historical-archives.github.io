rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席啊，毛主席！您永远和我们维吾尔族人民心连心","authors":[],"parts":[{"type":"paragraph","text":"曾经受到毛主席亲切接见的新疆维吾尔族老人库尔班吐鲁木，去年国庆节前夕，特意找到前来北京参加国庆观礼的代表巴克吐尔地，嘱咐他到了北京一定要多喊几声“毛主席万岁”，向伟大领袖毛主席充分表达新疆维吾尔族革命人民的心意："},{"type":"paragraph","text":"“毛主席啊，毛主席！您和我们维吾尔族人民心连心，您是我们的贴心人，我们世世代代无限热爱您，我们子子孙孙永远忠于您！”"},{"type":"paragraph","text":"忠于毛主席的深厚无产阶级感情，把九十岁的库尔班吐鲁木和二十三岁的巴克吐尔地的心紧密地联结在一起。巴克吐尔地是贫农的后代。当他还是个孩子的时候，就深为老贫农库尔班吐鲁木无限热爱毛主席的事迹所感动，决心沿着老一代的脚印走，象库尔班吐鲁木大叔那样热爱毛主席。一九六五年，他曾利用到西安开会的机会，专程到延安参观毛主席旧居。在毛主席住过的窑洞里，他亲眼看到了毛主席穿过的衣服，用过的笔，心潮起伏，热泪盈眶，越加想念毛主席。从那以后，他更是处处以库尔班吐鲁木为榜样，活学活用毛主席著作，不忘阶级苦，一心为贫下中农服务。去年，于田县革委会成立时，库尔班吐鲁木被选为副主任，年轻的共产党员巴克吐尔地也被选为常委。从此，他两人更加亲近，一起工作，一起学习毛主席著作。这一老一少有一个共同的心愿，就是一起去见毛主席！"},{"type":"paragraph","text":"美好的愿望要实现了。去年九月，大家推选库尔班吐鲁木和巴克吐尔地到首都参加国庆观礼。巴克吐尔地高兴得觉也睡不着，饭也吃不下，总是怪时间过得太慢。不料，临出发前，库尔班吐鲁木由于年高体弱，不能同他一道去见毛主席了。库尔班吐鲁木拉着他的手说：“我今年不能上北京，心里很难过。孩子，你要把我们维吾尔族人民的问候带给毛主席！”"},{"type":"paragraph","text":"巴克吐尔地幸福地见到了毛主席。他想起乡亲们的嘱咐，想起库尔班吐鲁木的叮咛，一遍又一遍地高呼：“毛主席万岁！毛主席万万岁！”"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2af5702dcf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
