"year":1966,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"献给毛主席"},{"type":"paragraph","text":"印度尼西亚一中学教师"},{"type":"paragraph","text":"我阅读了毛泽东主席诗词后，写了一首诗，献给毛泽东主席。"},{"type":"paragraph","text":"您的名字永远铭记在我心里，"},{"type":"paragraph","text":"给了我鼓舞和战斗力。"},{"type":"paragraph","text":"您的书和理论，"},{"type":"paragraph","text":"成了工人、农民和艺术家的武器。"},{"type":"paragraph","text":"您走过的路，也是我们要走的路。"},{"type":"paragraph","text":"你们的天空红霞万朵。"},{"type":"paragraph","text":"而我们的土地上还是群魔乱舞，"},{"type":"paragraph","text":"工人没有言论自由，"},{"type":"paragraph","text":"农民在恶魔压榨下喘息。"},{"type":"paragraph","text":"为了迎接黎明的曙光，"},{"type":"paragraph","text":"英勇战斗，前赴后继；"},{"type":"paragraph","text":"我们的道路尽管漫长，"},{"type":"paragraph","text":"我们的理想一定实现。"},{"type":"paragraph","text":"从北京寄来了，"},{"type":"paragraph","text":"您那红色的诗集，"},{"type":"paragraph","text":"它像春风一样传遍印尼各地。"},{"type":"paragraph","text":"印尼人民向您致意，"},{"type":"paragraph","text":"我们要高举马列主义红旗，"},{"type":"paragraph","text":"永远前进，直至胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"722c402513"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
