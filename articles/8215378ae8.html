ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"应迅速分割包围黄兵团","alias":"","parts":[{"type":"paragraph","text":"应迅速分割包围黄兵团！"},{"type":"paragraph","text":"（1948年11月8日）陈、邓并粟、陈、张："},{"type":"paragraph","text":"（一）刘汝明开蚌埠守备，九十九军开宿县向西扫荡，孙元良率两军返回宿县守备，邱清泉派有力一部收复永城，以上是刘峙?六日部署，现正执行，并非总退却。邱清泉主力仍在黄口”、丰县地区。（二）粟陈张应迅速分割包围黄兵团?，否则该敌可能西移。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"齐亥"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军第一副司令员陈毅和政治委员邓小平等的电报。"},{"type":"paragraph","text":"[2]粟、陈、张，指粟裕、陈士、张震，当时分别任华东野战军代司令员兼代政治委员、参谋长和副参谋长。"},{"type":"paragraph","text":"[3]刘汝明，当时任国民党军第四绥靖区司令官。[4]孙元良，当时任国民党军第十六兵团司令官。[5] 邱清泉，当时任国民党军第二兵团司令官。[6]刘峙，当时任国民党军徐州“剿匪”总司令部总司令。[7]黄口，镇名，位于安徽省萧县西北。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":181,"page_end":181},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8215378ae8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
