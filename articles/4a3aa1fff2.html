art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"平叛大军严守纪律热爱藏胞山南地区群众称赞他们是毛主席派来的“菩萨兵”","authors":[],"parts":[{"type":"paragraph","text":"本报拉萨24日电 进入西藏山南地区讨伐叛匪的我军各部队，纪律严明，秋毫无犯；群众互相传告：“毛主席派来的菩萨兵到了！”饱受叛匪蹂躏的藏胞犹如拨开云雾，重见青天，纷纷支援我军剿灭叛匪。"},{"type":"paragraph","text":"我军进入山南之前，盘踞在这里的匪徒，强迫群众参加叛乱，稍加拒绝，即遭毒打。匪徒们到处派差、派粮，大肆抢劫。拉走了青壮年，抢去了大批牛羊。把许多人家搞得家破人亡。当我军本月中旬到达泽当和颇章西卡等地时，群众痛哭流涕向我军控诉叛匪残害良民的兽行。叛匪在仓珠村奸污了所有的妇女，就连十多岁的小女孩和五十多岁的老太婆也未能幸免。八嘎雪卡有的妇女，竟遭受到十六名匪徒的集体轮奸。群众慑于叛匪的残暴行为，不敢下田生产，使春耕陷于停顿。"},{"type":"paragraph","text":"进剿山南叛匪的我军各部队，事先深入进行了政策纪律教育，人人自觉执行政策，严守三大纪律八项注意。在行军作战中，为了不惊扰群众，凡到初解放的村庄，部队不进民房，在野地露营。老乡不在家，用了柴草，按市价留下大洋，并留信说明。在战斗的间隙里，还帮助群众春耕播种。叛匪抢劫群众的牲口。被我军缴获之后，都归还了原主。同时，我军每到一地，也积极展开宣传工作，清除群众的顾虑。我军的爱民实际行动，使藏族同胞深受感动。部队所到之处，群众喜笑颜开，在村口路旁向我军鼓掌欢迎，挥手致意。为叛匪迫害外逃的群众，听到我军到来的喜讯，也纷纷赶着自己的牛羊，返回家乡。藏胞们欢欣鼓舞地互相传告：毛主席派来的“菩萨兵”到了！有的藏胞从数里以外赶回牛羊卖给部队。有的拿出自己柴火给部队烧饭，战士要付钱，他们再三推辞才收下。有的端来咸菜慰问部队，战士们不吃，藏胞说：“土匪把我家牛羊都抢跑了，你们为我们打土匪，送给你们一点咸菜也算表示了我们的敬意！”"},{"type":"paragraph","text":"在我军粉碎了山南地区大股叛匪之后，群众情绪更加高涨，广大藏胞为早日扫灭叛匪，自动组织大批人力、畜力，帮助我军架桥、修路、运输。有的藏胞热情地抱草，来给部队喂马，他们说：“让马吃饱，好快去追歼叛匪。”泽当藏胞自动组成二百多头毛驴的运输队，帮助我军运送物资。哲古、拉加里等地有一千五百名藏胞，积极参加修筑公路。很多地方藏胞，主动向我军报告匪枪，帮助收缴叛匪的枪支。群众对叛匪十分痛恨，在群马沟有一个藏胞，拒绝给匪派马，还打死打伤匪徒各一名，缴获步枪二支、短枪一支、子弹二百余发，当部队到达时，他把这些武器都献给了我军。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a3aa1fff2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
