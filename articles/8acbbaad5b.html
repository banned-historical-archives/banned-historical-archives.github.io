1967,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"让亲人戴上毛主席像章"},{"type":"paragraph","text":"有一次，一位保加利亚老人看到中国同志胸前佩戴着金光闪闪的毛主席像章，非常羡慕地问这位中国同志：“在什么地方可以买到毛主席像章？”中国同志告诉他在保加利亚买不到，并把自己胸前佩戴的毛主席像章摘下来赠送给他。这位老人非常激动，一再表示感谢。他把在旁边的一位青年人叫到跟前说：“这是我的儿子，他也想要毛主席像章，现在只有一枚，还是先让青年人戴上它为好。”于是他亲手把毛主席像章给儿子戴上，然后两人一同走到一面大镜子前，自豪地对着镜子照了又照。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8acbbaad5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
