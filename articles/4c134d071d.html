<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"在今后四个月内争取整个军事形势的转变","alias":"","parts":[{"type":"paragraph","text":"在今后四个月内争取整个军事形势的转变"},{"type":"paragraph","text":"（1947年8月21日）朱、刘，刘、邓，陈、粟，林、罗，贺、习，饶、黎、谭，陈、谢，聂、萧，杨、罗，叶、杨，井泉，徐、滕、薄："},{"type":"paragraph","text":"（一）我们自靖边之小河，经石湾、绥德、米脂、佳县及通秦寨附近，昨日转至榆林东南百二十里、镇川堡正北八十里之梁家岔地区（老苏区），与主力会合，大家都安全。"},{"type":"paragraph","text":"[1]朱、刘，指朱德和刘少奇。刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。陈、粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。林、罗，指林彪、罗荣桓，当时分别任东北民主联军总司令兼政治委员和副政治委员。贺、习，指贺龙、习仲勋，当时分别任陕甘宁晋绥联防军司令员和政治委员。饶、黎、谭，指饶漱石、黎玉、谭震林，当时分别任华东军区政治委员、副政治委员和华东野战军副政治委员。陈、谢，指陈、谢富治，当时分别任晋冀鲁豫野战军陈谢集团前委书记和副书记。聂、萧，指聂荣臻、萧克，当时分别任晋察冀军区司令员兼政治委员和副司令员。杨、罗，指杨得志、罗瑞卿，当时分别任晋察冀野战军司令员和第一政治委员。叶，指叶剑英，当时任中共中央后方委员会书记。杨，指杨尚昆，当时任中共中央后方委员会副书记。井泉，即李井泉，当时任晋绥军区政治委员。徐、滕、薄，指徐向前、滕代远、薄一波，当时分别任晋冀鲁豫军区第一副司令员、第二副司令员和第一副政治委员。"},{"type":"paragraph","text":"（二）刘戴\"率七个旅昨日进至镇川堡、佳县一线，另三个旅至绥德一带。我军集中八个旅，今日拂晓开始歼击三十六师于镇川堡、乌龙铺之间，黄昏解决战斗，除小部逃脱外，该师主力被歼。经此一战，局势即可改变，利于陈谢南进。"},{"type":"paragraph","text":"（三）我刘邓全军于未皓全部渡过沙河，并占项城等数县城，向大别山前进；我陈唐、叶陶四个纵队现至鲁西南成武、单县地区，从内线钳制敌人以利刘邓行动；陈粟率六纵及炮纵至聊城地区，会合宋时轮十纵及李先念?部，略作休整即出鲁西南；许世友谭震林\"率四个纵队现在胶东休整，准备歼击鲁中之敌；我陈谢集团（陈谢四纵四个旅，秦基伟?九纵三个旅及孔从周?三十八军）定于未马渡河进攻潼洛及豫西。由于以上各项行动及陕北胜利已"},{"type":"paragraph","text":"[1]刘，当时任国民党军整编第二十九军军长。"},{"type":"paragraph","text":"[2]1947年8月20日拂晓，西北野战军发起沙家店战役，歼灭胡宗南集团三大主力之一的整编第三十六师师部及两个旅，共歼敌6000余人。从这个战役开始，西北野战军转入战略反攻。"},{"type":"paragraph","text":"[3]未皓，即8月19日。"},{"type":"paragraph","text":"[4]陈唐，指陈士、唐亮，当时分别任华东野战军参谋长和政治部主任。叶陶，指叶飞、陶勇，当时分别任华东野战军第一纵队司令员和第四纵队司令员。"},{"type":"paragraph","text":"[5]宋时轮，当时任华东野战军第十纵队司令员。[6]李先念，当时任晋冀鲁豫野战军副司令员。"},{"type":"paragraph","text":"[7]许世友，当时任华东野战军东兵团司令员兼第九纵队司令员。谭震林，当时任华东野战军副政治委员兼东兵团政治委员。"},{"type":"paragraph","text":"[8]秦基伟，当时任陈谢集团第九纵队司令员。[9]孔从周，即孔从洲，当时任西北民主联军第三十八军军长。[10]未马，即8月21日。[11]潼洛，指陕西潼关和河南洛阳。使并将使南线各敌处于被动地位，我之战略局势大为改善。东北我军再有一个多月休整补充即可大举出击。晋察冀我军亦正准备出击。"},{"type":"paragraph","text":"（四）我全党全军应在目前数月内一致努力，克服一切困难，争取整个军事形势的转变。申酉戌亥\"四个月将是敌我两军转变形势的关键，务望各同志齐心协力，争取胜利。"},{"type":"paragraph","text":"（五）以上各点望转告所属，一体知照。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"未马[1]申酉戌亥，即9月、10月、11月、12月。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":219},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"许世友","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c134d071d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
