:[{"year":1993,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为纪念毛主席诞辰一百周年，山东省菏泽市精心挑选二千五百株牡丹运往湖南韶山，进行催花措施处理，准备在毛主席诞辰纪念日之时，使这些牡丹花竞相开放，为毛主席的家乡增光添彩。"},{"type":"paragraph","text":"菏泽牡丹冬季在广州催花已有悠久的历史，但在气候、土壤等条件差异很大的湖南催花还是头一次。为确保这次催花活动的成功，菏泽市已把派往广州、珠海等地进行催花的精干技术人员转派往湖南韶山。　(张增勤)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df3e563b0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
