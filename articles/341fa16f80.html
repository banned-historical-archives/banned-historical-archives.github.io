国防工业部、国防科学技术研究院及所属单位实行军事管制的补充决定（试行草案）","authors":[],"dates":[{"year":1967,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"中共中央，国务院，中央军委，中央文革小组关于对国防工业部，国防科学技术研究院及所属单位实行军事管制的补充决定（试行草案）","type":"title"},{"text":"中共中央，国务院，中央军委，中央文化革命小组关于对xx部（委）实行军事管制的决定（试行草案）完全适用于国防工业部，国防科学技术研究院及所属厂矿企业，科研，设计单位和基建单位的军事管制工作。上述单位是国家重点保密单位，为了确保国家机密，特作如下补充决定。","type":"paragraph"},{"text":"一，不是国防工业部，国防科学技术研究院及所属单位和厂矿企业的革命群众，一律不得前去串联。","type":"paragraph"},{"text":"二，国防工业部（院）及所属单位和厂矿企业的革命群众，可以在业余时间，只能在本地区，本部（院）范围内串联，但不得涉及国家机密。特定的机密要害部门和单位，外部门，外单位的革命群众，均不得前去串联。","type":"paragraph"},{"text":"三，国防工业部门及其所属全体人员，必须提高警惕，加强保卫，保密工作防止失密，泄密。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第三集）》， 北京：1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"341fa16f80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
