script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英雄的人民不可战胜","authors":[],"dates":[{"year":1976,"month":8,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英雄的人民不可战胜"},{"type":"paragraph","text":"最近，河北省唐山、丰南一带发生强烈地震，波及天津、北京地区。在伟大领袖毛主席、党中央的亲切关怀下，在全国人民的大力支援下，灾区人民英勇奋战，抗震救灾斗争取得了很大的胜利。我们向战斗在第一线的广大群众和干部，向支援灾区的人民解放军、医疗队和各条战线的同志，致以崇高的敬意。"},{"type":"paragraph","text":"毛主席教导我们：“这个军队具有一往无前的精神，它要压倒一切敌人，而决不被敌人所屈服。”这次严重的自然灾害考验和锻炼了我们的人民。灾区群众和干部，泰山压顶腰不弯，灾难临头无所惧。他们发扬人定胜天的革命精神，斗志昂扬，信心百倍，迅速组织起来，抢救人民的生命财产，千方百计地安排群众生活，积极地恢复生产和交通运输，向严重的自然灾害展开了坚韧不拔的斗争。"},{"type":"paragraph","text":"在抗震救灾斗争中，广大人民群众互相关心，互相爱护，互相帮助，先公后私，先人后己，出现了许许多多动人心弦、可歌可泣的英雄事迹。有的工人、贫下中农为了抢救阶级兄弟，献出了自己的生命。各级领导干部亲临现场，指挥战斗，与人民群众同呼吸、共命运。有的领导同志，自己刚被救出来，就带伤投入战斗。大批解放军指战员，奔赴重灾区，临危不惧，抢险救灾。有的医务人员不顾自己身受重伤，坚持抢救伤员。抗震救灾的同志们，用他们的行动谱写了一曲革命英雄主义的壮丽凯歌。"},{"type":"paragraph","text":"全国人民同灾区人民心连心。他们把灾区人民的困难当做自己的困难，想灾区人民所想，急灾区人民所急。一方有困难，八方来支援。一切人力物力首先满足灾区的需要，要什么就给什么。有的地区自己受灾，还尽最大努力，主动支援重灾区。大批医疗队赶赴现场。大量药物、食品、衣物、建筑材料等救灾物资，从祖国各地源源运往灾区，出现了全国人民团结救灾的生动局面，体现了我国人民自力更生的伟大力量和高度的共产主义风格。"},{"type":"paragraph","text":"所有这一切，深刻地说明用马克思主义、列宁主义、毛泽东思想武装起来的，经过无产阶级文化大革命锻炼的英雄的人民，是不可战胜的；说明我们无产阶级专政的社会主义制度，具有极大的优越性；说明广大干部和群众认真学习无产阶级专政理论，限制资产阶级法权，批判邓小平反革命的修正主义路线，反击右倾翻案风，取得了丰硕的成果。有共产党的领导，有毛主席革命路线的指引，我们的人民任何困难都可以克服，任何人间的奇迹都可以创造出来。正如毛主席所指出的：“没有什么困难可以阻碍人的前进的，只要奋斗，加以坚持，困难就赶跑了。”灾区人民豪迈地说：“它来一次地震，咱来一场革命。”“十二级台风刮不倒，七级地震震不垮。不管台风还是地震，胜利都是属于我们。”"},{"type":"paragraph","text":"目前，我们要坚决响应毛主席、党中央的战斗号召，认真学习毛主席的一系列重要指示，以阶级斗争为纲，联系各条战线阶级斗争、两条路线斗争的实际，深入开展批邓、反击右倾翻案风的伟大斗争，夺取抗震救灾斗争的新胜利。我们有力量、有信心、有能力战胜邓小平反革命的修正主义路线，也有力量、有信心、有能力战胜严重的自然灾害。我们坚信，在毛主席革命路线的指引下，在毛主席为首的党中央和各级党委的领导下，在全国人民的热情支援下，灾区人民一定能够排除万难，重建家园，在社会主义大道上继续胜利前进。"}],"comments":[],"comment_pivots":[],"description":"","pa
