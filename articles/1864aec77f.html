art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席指向哪里我们就冲向哪里","authors":["战士贾焕密"],"parts":[{"type":"paragraph","text":"每当毛主席在银幕上一出现，我就用尽全身力量鼓掌，但总觉得表达不出我无限热爱毛主席的激动心情。看到毛主席在向我们招手，就像毛主席在对我们说：“你们要关心国家大事，要把无产阶级文化大革命进行到底！”看到毛主席站在天安门上向我们微笑，就好像听到毛主席在对我们说：“希望寄托在你们身上。”毛主席呀毛主席！请您老人家放心，我们用毛泽东思想武装起来的年青一代，天不怕，地不怕，鬼不怕，神不怕！您指向哪里，我们就冲向哪里。我们刀山敢上，火海敢闯，永远高举毛泽东思想伟大红旗，彻底埋葬旧世界，创造一个红彤彤的新世界！"},{"type":"paragraph","text":"（战士 贾焕密）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1864aec77f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
