<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宣传毛泽东思想的好阵地  记浙江省宁海县长街旅馆办“旅馆政治夜校”的事迹","authors":[],"dates":[{"year":1970,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宣传毛泽东思想的好阵地"},{"type":"paragraph","text":"记浙江省宁海县长街旅馆办“旅馆政治夜校”的事迹"},{"type":"paragraph","text":"在三门湾旁，有一个闪耀着毛泽东思想光辉的旅馆。这就是浙江省宁海县长街公社旅馆。凡是到这旅馆住宿过的同志，无不称赞这里的“旅馆政治夜校”办得好，夸奖女共产党员周荷香是毛泽东思想的红色宣传员。"},{"type":"paragraph","text":"去年十二月初，周荷香从公社粮站调到长街旅馆当服务员。她在旅馆工作了几天，就开始琢磨：旅馆人员来往多，是宣传毛泽东思想的好阵地；人员来往多，阶级敌人也容易钻空子，要提高警惕；旅客中大多数是自己的阶级兄弟，要好好地招待他们。对于旅馆这块阵地，社会主义如果不去占领，资本主义就必然会去占领。于是，她就下定决心，要把长街旅馆办成毛泽东思想的宣传馆。以后，周荷香又把自己的想法告诉了另一个服务员，决定创办政治夜校。"},{"type":"paragraph","text":"在伟大七十年代的第一天晚上，长街旅馆的“政治夜校”开学了。几个月来，周荷香天天晚上组织旅客们学习，从不间断。周荷香还根据每天学习的内容，请旅客中的工农兵做老师；组织活学活用毛泽东思想经验交流会，斗私批修讲用会，开展革命大批判，政治夜校的内容丰富多采，越办越好。"},{"type":"paragraph","text":"长街位于海边，水产多，常有一些坏人到这里搞投机倒把活动。一天，有个操外地口音的人来到长街旅馆。周荷香见他行动很可疑，经过调查，原来是个投机倒把家伙。这天晚上，“旅馆政治夜校”开展了革命大批判。周荷香带领旅客们狠批叛徒、内奸、工贼刘少奇“阶级斗争熄灭论”，大摆投机倒把对社会主义经济的危害，使旅客们受到很大教育。"},{"type":"paragraph","text":"一天，有个替生产队采购树苗的青年社员来到旅馆。周荷香给他安排在楼下统铺的房间。他嫌板床硬，吵着要住单人房间，说什么“钱多没关系，生产队可以报销”。周荷香想：这个青年生在新社会，长在红旗下，没有吃过什么苦，要给他补上一堂阶级教育课。于是，她就请了一位解放军和一位老贫农做老师。晚上，在“旅馆政治夜校”里，解放军同志大讲为革命节约每一分钱的重要意义，老贫农讲起在旧社会的血泪斑斑的家史。在大家的帮助下，那个青年提高了思想觉悟。他翻来复去睡不着，越想越觉得自己忘掉了贫下中农的本色。于是，他披衣跑到旅馆值班室，惭愧地对周荷香说：“周同志，我错了。我不但在这里住了夜，政治夜校还帮助我用毛泽东思想治了‘病’。”"},{"type":"paragraph","text":"林副主席在“九大”政治报告中指出：“必须使党员真正做到理论联系实际”。周荷香想：要办好“旅馆政治夜校”，首先要搞好自己头脑里的思想革命化。她自己除天天晚上和旅客们一道学习外，还天天坚持自己选学毛主席著作，不断提高政治思想觉悟。她平时常说：“共产党员就要象张思德那样，‘完全’‘彻底’为人民服务，象白求恩那样‘对同志对人民的极端的热忱’。”不久前，另一个服务员调到别的部门工作去了，她一个人担当了两个人的工作。从旅客登记到烧水、送水、扫地、抹桌、收住宿费，她都干，从没一句怨言，也没叫声累。旅客病了，她就象自己的亲人病了一样，给他们找医生、买药，问寒问暖，端水送饭。"},{"type":"paragraph","text":"由于周荷香的努力，长街旅馆在群众中得到好评，大家都称赞它是既突出无产阶级政治，又关心旅客生活的好旅馆。"},{"type":"paragraph","text":"浙江宁海县革委会报道组"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35071e064d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
