script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"农民要批判资产阶级","authors":["本报评论员"],"dates":[{"year":1967,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报评论员"},{"type":"paragraph","text":"当前，一场彻底批判党内最大的走资本主义道路当权派的高潮，正在全国兴起。广大农民，特别是贫下中农是这场战斗中一支重要的主力军。我们要以最强烈的激情、最鲜明的态度、最坚决的行动投入这场声势浩大、意义深远的斗争中去，誓把党内最大的走资本主义道路当权派拉下马，让他靠边站。"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派是我们贫下中农的死对头。就是他，大肆叫嚷“长期保护富农经济”，发展农村的资本主义；就是他，疯狂反对农业合作化，大砍合作社，仇视我们贫下中农走社会主义集体化的道路；就是他，不遗余力地鼓吹“三自一包”，为阶级敌人复辟资本主义鸣锣开道；就是他，在农村社会主义教育运动中提出和推行了形“左”实右的资产阶级反动路线，包庇党内一小撮走资本主义道路当权派，破坏社会主义教育运动。这个党内最大的走资本主义道路的当权派是资本主义、修正主义和一切牛鬼蛇神的总后台，是阶级敌人妄图在中国篡党、篡政、篡军的罪魁祸首。他的罪恶累累，十恶不赦。如果他的阴谋得逞，我们社会主义江山就会变颜色，地、富、反、坏分子就会重新骑在我们头上，我们就会吃二遍苦。我们贫下中农一千个不答应!一万个不答应!"},{"type":"paragraph","text":"毛主席教导我们:“公社农民以农为主(包括林、牧、副、渔)，也要兼学军事、政治、文化。在有条件的时候，也要由集体办些小工厂，也要批判资产阶级。”在无产阶级文化大革命中，贫下中农发挥了主力军的作用，猛冲猛打，揪出了党内一小撮走资本主义道路的当权派。今天，在这场两个阶级、两条道路、两条路线的总决战中，我们贫下中农要继续发扬无产阶级革命造反精神，努力学习毛主席著作，挑起革命和生产两副重担。我们要立即行动起来，以毛泽东思想为武器，口诛笔伐，大开声讨会，彻底揭发和批判党内最大的走资本主义道路当权派的滔天罪行。只有这样，我们贫下中农才能沿着毛主席所指引的社会主义农业集体化的道路迅猛飞奔；只有这样，才能促进人的思想革命化，大破资产阶级和一切剥削阶级思想，大立毛泽东思想，进一步解放生产力，掀起生产高潮。"},{"type":"paragraph","text":"‘红旗卷起农奴戟’。用毛泽东思想武装起来的贫下中农不仅要做生产战线上的模范，而且要做革命斗争中的闯将，我们一定要把党内最大的走资本主义道路当权派拉下马，彻底打翻在地，叫他永世不得翻身。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a277a5c01c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
