ors":["周恩来"],"dates":[{"year":1966,"month":11,"day":15}],"is_range_date":false,"parts":[{"text":"周恩来接见来京的各路长征队时的讲话节录","type":"title"},{"text":"周恩来","type":"authors"},{"text":"我们首先庆贺你们长征胜利！这是毛泽东思想的一个伟大胜利。你们长征队是毛泽东思想的宣传队，是毛泽东思想的播种机。你们的长征是万里长征的第一步，这个开头开得好！","type":"paragraph"},{"text":"长征式的全程步行串联，好得很！毛主席支持你们。你们响应林彪同志十一月三日的号召，在步行串联的途中，广泛地接触群众，接触社会的各个方面，更深入地了解社会主义社会的阶级斗争，广泛地宣传毛泽东思想，学习工农的优秀品质，学习和发扬解放军的光荣传统，磨炼革命意志，锻炼身体，好处真是多得很。","type":"paragraph"},{"text":"群众出智慧。你们的革命毅力值得钦佩，你们的步行串联经验应该总结起来。我们希望你们的经验在全国得到推广，我们希望全国大、中学校的广大革命师生，学习你们的经验，今年冬天试行，明年春天推行全程步行的革命大串连。","type":"paragraph"}],"comments":[],"origin":"《大字报选 第二集》（北京：一院大字报选编小组，1966.12）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59cfea9379"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
