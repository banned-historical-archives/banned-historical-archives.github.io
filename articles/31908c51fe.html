al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"（湘江评论》启事叫","alias":"","parts":[{"type":"paragraph","text":"《湘江评论》启事川"},{"type":"paragraph","text":"（1919年7月14日）"},{"type":"paragraph","text":"（一）本报以宣传最新思潮为主旨。篇幅每周一张，有重要文字，发行增刊。文字全用国语。欢迎合于本报主旨之投稿，惟暂无物质上之报酬，只能精神上表示感念，并酬以本报。"},{"type":"paragraph","text":"（二）有愿担任本报之传播者，本报认为相助之好友，能多传播者，特别减少取费。函到即将所须之报寄上。"},{"type":"paragraph","text":"（三）本报所用之纸，为汉口造纸厂出蓬莱纸。"},{"type":"paragraph","text":"[1]本篇未署作者姓名，据易礼容1987年6月7日回忆说，《湘江评论》的“‘启事’和‘申明’都是毛泽东起草的”。本文原标题为《本报启事》。"},{"type":"paragraph","text":"[2]本启事连续刊载于《湘江评论》创刊号至第四号。在第四号的《本报启事》中，将第三条改为“本报代售北京《每周评论》”。《湘江评论》（素描）《青年毛泽东》（中国画）"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":34,"page_end":36},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31908c51fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
