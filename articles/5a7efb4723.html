art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"忠于毛主席刀山火海也敢闯","authors":["通信兵第二次学习毛主席著作积极分子代表大会代表沈石才"],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！为了保卫您，我刀山敢上，火海敢闯，就是粉身碎骨，我也脸不变色，心不慌。"},{"type":"paragraph","text":"有一次，部队在施工中开山放炮，我在离炸点一百米处担任安全警戒。当导火线已经点燃，炸药即将爆炸的紧急时刻，突然发现离炸点三米处有您老人家的画像，顿时，我全身热血沸腾，脑海里立刻想到：“誓死保卫毛主席，决不能让您老人家的画像受到丝毫损伤。”于是我就飞速地向炸点跑去，当我抱着您老人家的画像刚刚跑出二十多米，炸药爆炸了，碎石从我头上、身边呼啸而过，但您老人家的画像却在我的胸前，闪耀着灿烂的光芒。我怀着万分幸福和对您的无限忠心，高高举起您老人家的画像，一遍又一遍地高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"毛主席啊，毛主席！今天我见到了您，心潮澎湃，热血沸腾。我向您老人家宣誓：把最大的精力用在学习您的最新指示上，把最大的忠诚用在执行您的最新指示上，把最大的热情用在宣传您的最新指示上，把最大的勇敢用在捍卫您的最新指示上，紧跟您的伟大战略部署，在夺取无产阶级文化大革命的全面胜利中，为人民立新功。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a7efb4723"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
