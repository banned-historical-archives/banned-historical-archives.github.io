art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"卡博同志热情赞扬我国文化大革命","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十五日讯 阿尔巴尼亚劳动党中央政治局委员、书记处书记希斯尼·卡博同志，中央委员贝哈尔·什图拉同志，由中共中央政治局常委、书记处书记康生同志陪同，今天下午访问了清华大学。阿尔巴尼亚驻中国大使瓦西里·纳塔奈利同志也一道前往。"},{"type":"paragraph","text":"当卡博同志、什图拉同志等到达清华大学时，受到数千名红卫兵和革命师生的夹道欢迎。"},{"type":"paragraph","text":"清华大学“井冈山”红卫兵负责人蒯大富代表清华大学的红卫兵和革命师生讲话，热烈欢迎卡博、什图拉等同志来清华大学参观访问。"},{"type":"paragraph","text":"卡博同志和什图拉同志和清华红卫兵、革命师生的代表进行了亲切的谈话。卡博同志在讲话中，热情赞扬我们伟大的领袖毛主席，高度评价伟大的毛泽东思想，热烈赞扬我国无产阶级文化大革命和红卫兵的战绩。"},{"type":"paragraph","text":"康生同志在讲话中，对卡博同志热情友好的讲话表示感谢。康生同志说，希斯尼·卡博同志是我们反对赫鲁晓夫修正主义的老战友。在布加勒斯特会议的时候，公开同赫鲁晓夫修正主义作斗争的只有中阿两党。那时我们是少数，修正主义是多数。现在，马列主义政党和组织已经遍及五十多个国家和地区。这说明一个真理，只要沿着毛泽东思想指引的道路前进，前途是伟大的，光明的。"},{"type":"paragraph","text":"清华大学红卫兵代表把《毛泽东选集》、《毛主席语录》和毛主席像章送给阿尔巴尼亚战友。当红卫兵代表把《井冈山》红卫兵袖章给卡博同志、什图拉同志戴上时，全场响起了热烈的掌声。RW：卡博；言论"}],"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3451a753ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
