<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“无政府”的国立边疆学校她是一颗被人也被自己遗忘在石罅里的种子!","authors":["草明"],"dates":[{"year":1947,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不管它意义如何，横竖这“学潮”二学是某些人喜欢用而又怕听到的字眼，所以我也随手拈来用用。"},{"type":"paragraph","text":"学潮在“边校”，“边校”在学潮中………"},{"type":"paragraph","text":"据说当今某人物，曾把“边校”列为最爱闹学潮的学校之一。其实是冤枉了的，“边校”自来是无声无臭的，不信你随便抓一个人来问问，着他知不知遇有这个学校的存在，他会用摇头来答覆你的。她“边校”是一颗被人也被自己遗忘在石罅里的种子，过去虽也有些声音，但她并不张扬。"},{"type":"paragraph","text":"随着国都的西迁，和所谓复员，“边校”像个羞涩的姑娘，也跟随政府从南京奔到了重庆，又由重庆再复员回来，但目前还未曾奠校南京，而是暂时偏安无锡。啊!温眠在太湖的怀抱里，亲吻着她的梅园的梅花的脸蛋，够多香甜啊!"},{"type":"paragraph","text":"边校是抗战学校，她的使命是建国，有好多毕业生奔走在中国的“天涯海角”(喻边疆之意:如服务在台湾，北方及西北西南等地。)直起喉咙在呼唤新中国的未来呵!最近又一批又要整装待发了，他们是实路了“中国之命运”里的青年到边疆去的指示。"},{"type":"paragraph","text":"他们享受着与普通大学一样或不如的待遇，但担起了更艰难的担子。在今天中国的教人愚蠢的教育制度之下，像多少青年一样，他们顽强地生长着，在迫害，压制，扼杀，剥夺等等的铁魔掌下，他们仍企求健康地成长。"},{"type":"paragraph","text":"来无锡后，大部分的同学住破棚子，忍受着雨雪和寒风的侵蚀，过着精神上的制酷和贫弱的生活，以致得到了褒奖，说这是一批能“吃苦”的好青年!边疆专家一学期上了几次课，编了两张讲义，发了两张讲义，讲了两张讲义，阅览室没有半本新杂志。"},{"type":"paragraph","text":"在重庆时的被压制下来的一次护校运动和不久以前的改革学校运动之后，最近又起了学潮了。"},{"type":"paragraph","text":"校长“失踪”了，秘书不见了，训导长躲了，总务主任逃了，一月多来的“边校”成了无政府状态。"},{"type":"paragraph","text":"起因，像武大一样也为了复员费。"},{"type":"paragraph","text":"在一月末，同学听到复员费追加了两亿，而本校复员工作已大体完成，这复员费当然该用在复员的事情上，何况同学复员时因为经费大少，加以学校尽力克扣，一天每人只发一千元，致使同学颠沛途中，大吃其苦，故同学此时向学校建议:此两亿除支付学校当时所超出之复员费外，该以一部分作为同学当时私人塾支的旅运费来追发给同学，另一部分则由学校支配。故在学生代表，教授，校长的联席会议上校长答应了此项要求，月训导长担保子一定时期内办妥。"},{"type":"paragraph","text":"后来校长为“慎重”起见，却去报告了教育部，重新请示此项追加复员费之支配办法，总务主任顺便宣称，说:这是“学潮”，教部便召见了学生代表，痛斥一顿，说如再要复员费便解散学校，或惩办为首同学，于是此“潮”便沉寂了，事情很简单的，也并没有谁罢课，贴标语，喊口号。"},{"type":"paragraph","text":"就这样校长便隐在南京，因为答应了同学的要求，而又去报告了教育部，以致兑不了现，不好想思回来，训导长更是老实地以人格来担保的，也无颜见同学，总务主任等也随之而去。"},{"type":"paragraph","text":"但同学仍安静地上课，考试，放假。"},{"type":"paragraph","text":"一月完了，二月过去了，三月来了，同学的要求自动撤消了。但学校仍是“无政府”。"},{"type":"paragraph","text":"后来在各方协助之下，组织了学生福利委员会，改善同学生活，教部也答应从此改善学生生活，据说已在著手进行云云。"},{"type":"paragraph","text":"这些同学们的至诚而合理的生活要求和争取，当然谁也不敢也不该加以任何的侮衊，但这件事情中，当局却三翻五次的恩赐了帽子，动口就以开除学籍和解教学校来恫吓，是为了青年，还是为了教育，抑是为了国家民族前途，而不得不这样做呢?更奇怪的是，这样小小的事便惊动了起码三个部的大官员们，真是，真是，他们太关心教育了，太关心青年了。"},{"type":"paragraph","text":"现在校长坚决辞战，本来六号注册，已因实际的无人负责，而以“筹备不及”的公文句子布告改期了。"},{"type":"paragraph","text":"教育!这样的边疆教育!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23cfdb6fd3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
