art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席等中央领导人接见我军四个代表团队林彪元帅等分别同代表们进行了亲切的交谈","authors":["牛嵩林"],"parts":[{"type":"paragraph","text":"本报5日讯 今天上午，中共中央主席毛泽东、副主席刘少奇、周恩来、朱德，林彪，政治局委员彭真，中华人民共和国元帅刘伯承、贺龙、陈毅、罗荣桓、叶剑英等，接见了部队参加建国十周年大典观礼代表团、接受检阅的部队代表、向建国十周年献礼演出的中国人民解放军文艺代表队和参加全国运动会的中国人民解放军体育代表团。代表们、演员和运动员们在会见毛主席的时候，发出了长久的欢呼声和掌声，毛主席等中央领导同志绕场一周，同大家会见，并一起照了相。"},{"type":"paragraph","text":"接见以前，林彪元帅，刘伯承元帅、贺龙元帅、陈毅元帅、罗荣恒元帅、叶剑英元帅和总参谋部、总政治部的负责人等分别同大家进行了亲切的交谈，询问了他们的工作、学习和生活情况，并对部队工作作了指示。"},{"type":"paragraph","text":"今天陪同接见的有：谭政大将、肖劲光海军大将、粟裕大将、许光达大将、杨成武上将、张宗逊上将、张爱萍上将、傅钟上将、肖华上将、甘泗淇上将、刘亚楼空军上将、苏振华海军上将、陈锡联上将、陈土榘上将等。"},{"type":"paragraph","text":"党中央领导人和群众观礼代表团合影。前排自左至右：罗荣恒、刘伯承、彭真、林彪、朱德、毛泽东、刘少奇、周恩来、贺龙、陈毅、叶剑英。"},{"type":"paragraph","text":"毛主席等中央领导人同受阅部队代表、文艺代表队和体育代表团的同志们一起热烈鼓掌。"},{"type":"paragraph","text":"本报记者 牛嵩林摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0595f784e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
