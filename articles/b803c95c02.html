"西北农学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"杂文〈帽子〉","type":"title"},{"text":"西北农学院芦犹崇","type":"authors"},{"text":"(芦犹崇：西北农学院农60级四班学生)","type":"subtitle"},{"text":"他有三件“珍宝”，","type":"paragraph"},{"text":"“反党”“反社会主义”","type":"paragraph"},{"text":"“右派”帽子手中握，","type":"paragraph"},{"text":"别人言论他不管对也不对，","type":"paragraph"},{"text":"总是作好准备——","type":"paragraph"},{"text":"要把帽子往出抛。","type":"paragraph"},{"text":"不管你出发点怎样，","type":"paragraph"},{"text":"更不管你心内如何，","type":"paragraph"},{"text":"只要你的言语有点“不对头”那他就以为戴顶帽子最妥。","type":"paragraph"},{"text":"有时候，他觉得戴上帽子还轻，应当把历史出身追溯：","type":"paragraph"},{"text":"“哼哼！你的立场成问题，或者，在把不可告人的勾当搞！”","type":"paragraph"},{"text":"如此做了，他洋洋自得说，","type":"paragraph"},{"text":"这有利于党的整风和鸣放……","type":"paragraph"},{"text":"我说呀，得在他的话后，","type":"paragraph"},{"text":"打上一个大问号。","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b803c95c02"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
