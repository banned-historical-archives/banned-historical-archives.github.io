飞副委员长应邀出席","authors":[],"dates":[{"year":1978,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南社盟友好代表团访问上海后回京"},{"type":"paragraph","text":"德鲁洛维奇大使为代表团访华举行宴会"},{"type":"paragraph","text":"乌兰夫、姬鹏飞副委员长应邀出席"},{"type":"paragraph","text":"据新华社上海五月四日电  以马林·采蒂尼奇代主席为团长的南斯拉夫劳动人民社会主义联盟友好代表团，结束了对上海的参观访问，今天中午乘专机离开上海回北京。"},{"type":"paragraph","text":"据新华社北京五月四日电  南斯拉夫驻华大使德鲁洛维奇和夫人，为以马林·采蒂尼奇为团长的南社盟友好代表团访华，今晚举行宴会。"},{"type":"paragraph","text":"中共中央政治局委员、人大常委会副委员长、政协全国委员会副主席乌兰夫，人大常委会副委员长姬鹏飞应邀出席宴会。采蒂尼奇团长在宴会上首先祝酒。他说，我们在中国受到了热情友好的款待。他说，中南两国都是在根据本国的实际情况建设社会主义，共同为反对帝国主义、霸权主义和一切外来强加势力而斗争。他表示相信，中国人民在排除了“四人帮”的干扰以后，一定能够在本世纪末实现四个现代化的宏伟目标，把中国建设成为一个先进的社会主义强国。"},{"type":"paragraph","text":"姬鹏飞副委员长在祝酒时说，正值我们两国关系在各方面迅速发展，华主席和铁托总统的会谈精神开花结果的时候，南斯拉夫同志们的这次来访有着重大的意义。邓小平副主席和采蒂尼奇同志进行了亲切友好的谈话，乌兰夫同志同代表团进行了有成效的会谈。你们的访问为中南友谊的发展作出了有益的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83e49aa45b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
