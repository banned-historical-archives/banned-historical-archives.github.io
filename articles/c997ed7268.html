联代表发表讲话","authors":[],"dates":[{"year":1956,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京10日专电】　薄一波副总理今天在全国工商联代表大会上谈到党和国家对资产阶级的政策时说:对中国资产阶级采取的逐步赎买政策，完全是从马克思列宁主义的原则出发的，因为国家需要生产更多的产品和农民进行交换，巩固工农联盟。我们国家经济落后，而资产阶级与资产阶级的知识分子约有八百余万人。这是一个比较有生产力又有文化和生产技术的阶级，这是和地主阶级根本不同的所在。所以与资产阶级联盟的政策是党老早就决定了的。建设社会主义需要这个阶级。"},{"type":"paragraph","text":"至于定息政策，薄一波副总理说，今后7年中国家政策不会变更，等第二个五年计划终了时再看情况。他并要求工商业者不要放弃国家给他们的定息。薄一波还说，目前中国资产阶级和工人阶级之间的矛盾，已经不是对抗性的矛盾了。至于工商业者纷纷谈论的所谓摘帽子问题，尤其是定息很少的中小工商业者愿意摘掉帽子享受劳保待遇问题，针对这些意见，薄一波副总理说，希望大会加以讨论，研究出分别对待的办法。"},{"type":"paragraph","text":"薄一波还谈到共产党和各民主党派长期共存的方针，同样也适用于全国工商业联合会。"},{"type":"paragraph","text":"薄一波的发言引起了代表们的极大注意和兴趣，代表们不断地以热烈的掌声和欢乐的笑声表示对党和政府过去政策及今后措施的感谢与满意。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c997ed7268"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
