art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席无产阶级政策的全面落实就是斗；批；改的全面胜利","authors":["铁道兵某部驻北京第二通用机械厂毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"《人民日报》社论传达的伟大领袖毛主席的最新指示：“无产阶级文化大革命的斗、批、改阶段，要认真注意政策。”“在订计划的时候，必须发动群众，注意留有充分的余地。”象一盏光辉灿烂的指路明灯，给我们进一步指明了搞好斗、批、改，夺取无产阶级文化大革命全面胜利的方向，照亮了工业战线和各条战线实现新的飞跃的胜利坦途。我们最热烈地欢呼毛主席最新指示的发表！"},{"type":"paragraph","text":"毛主席的各项无产阶级政策，是毛主席无产阶级革命路线的具体体现，是团结人民、克敌制胜的法宝。我们在实践中深刻体会到：只有认真落实毛主席的各项无产阶级政策，才能取得斗、批、改的伟大胜利。北京第二通用机械厂在清理阶级队伍初期，有些人不注意党的政策。针对这种情况，我们遵照毛主席关于“我们的政策，不光要使领导者知道，干部知道，还要使广大的群众知道”的教导，帮助厂革委会开办了落实政策的学习班，组织大家认真学习毛主席关于区分两类不同性质矛盾的政策，干部政策，知识分子政策，对敌斗争政策，“给出路”的政策，等等，联系实际大讲落实政策的伟大意义。通过学习，广大革命职工的政策观念大大加强。大家说，执行不执行毛主席的各项无产阶级政策，是关系到革命成败的大问题。阶级敌人不怕我们“左”，也不怕我们右，最怕我们掌握一个“准”字。我们忠于毛主席，就一定要按照毛主席的各项无产阶级政策办事，在“准”字上狠下功夫。厂里有一个车间主任，过去有些群众要打倒他。经过政策学习，群众重新对他进行了阶级的历史的辩证的分析，认为他虽然犯有严重错误，但还不是敌我矛盾。于是革命群众找他个别谈话，开小型会议，交代党的政策，热情地帮助他提高两条路线斗争和阶级斗争觉悟。这个车间主任在工人同志的帮助下作了深刻的检查，得到了群众的谅解，并参加了三结合的领导小组。"},{"type":"paragraph","text":"毛主席的各项无产阶级政策，反映了革命斗争的客观需要，一旦被广大群众所掌握，就变为威力无穷的革命力量。经过政策学习，全厂出现了一个群众性的宣传、落实党的政策的热潮。大家以毛主席的各项无产阶级政策为锐利武器，严格区分两类不同性质的矛盾。这样，既沉重地打击了一小撮最顽固的阶级敌人，使他们陷于空前孤立的境地，又教育、帮助了一些犯错误的好人回到了毛主席的革命路线上来，从而团结了大多数，调动了一切积极因素，有力地推动了革命和生产的蓬勃发展。去年全厂提前四十二天完成国家年度生产计划，今年一月又创造了建厂以来的最高生产水平。"},{"type":"paragraph","text":"今后，我们一定要更好地学习和贯彻执行毛主席的各项无产阶级政策，把热火朝天的斗、批、改革命群众运动继续推向前进，夺取无产阶级文化大革命的全面胜利。"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86870a3ce0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
