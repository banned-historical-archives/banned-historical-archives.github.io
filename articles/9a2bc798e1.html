script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"总结中医工作成就　清除资产阶级思想全国中医中药工作会议开幕","authors":[],"dates":[{"year":1958,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社保定17日电】　全国中医中药工作会议17日在保定开幕。卫生部副部长徐运北在会上作了工作报告。"},{"type":"paragraph","text":"这次会议要用以虚带实的精神，总结在批判轻视、排斥中医的错误思想以后几年来的中医工作；并将以整风的精神，解放思想，采取大鸣大放大辩论的形式，彻底清除中医工作方面的资产阶级思想，达到思想认识上的统一，进一步贯彻党的中医政策，使中医中药工作更快地全面跃进。在思想认识一致的基础上，会议还将继续安排1959年和今后的中医中药工作。"},{"type":"paragraph","text":"这次会议也是现场会议。河北省卫生厅将在会上介绍他们近年来在中共河北省委和各级党委正确领导下，大搞群众运动，贯彻党的中医政策的经验。会议期间，代表们除了参观河北省中医中药展览会外，还将到中药生产闻名的河北省安国县参观。此外，会议还将广泛交流各省、市、自治区在中医中药工作中的经验。"},{"type":"paragraph","text":"参加会议的有全国各省、市、自治区卫生厅(局)、医学院(校)和医药部门的负责干部。"},{"type":"paragraph","text":"国务院第二办公室副主任张稼夫和中共河北省委书记处书记张承先出席了这次会议。"},{"type":"paragraph","text":"这次会议将于本月底闭幕。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a2bc798e1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
