art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一辈子为捍卫毛主席革命路线而战斗","authors":["北京部队活学活用毛主席著作积极分子/战斗英雄郭恩志"],"parts":[{"type":"paragraph","text":"在全国亿万军民乘胜前进，夺取无产阶级文化大革命全面胜利的凯歌声中，我们最敬爱的伟大统帅毛主席和他的亲密战友林副主席亲自批准，由中共中央、中央军委、中央文革发布命令，追授门合同志以“无限忠于毛主席革命路线的好干部”的光荣称号。这是毛主席和林副主席为我们树立的一个在无产阶级专政条件下继续进行革命的党的干部的光辉榜样，是全党、全军、全国人民政治生活中的一件大事，让我们千遍万遍高呼：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"伟大领袖毛主席在中国革命的每个历史阶段，都为我们指出了前进的方向，树立了光辉的榜样。在抗日战争时期，为我们树立了张思德“完全”“彻底”为人民服务的光辉榜样；在解放战争时期，为我们树立了刘胡兰为革命“生的伟大，死的光荣”的光辉榜样；在社会主义革命和社会主义建设时期，为我们树立了雷锋一心为革命、“毫不利己专门利人”的光辉榜样；在无产阶级文化大革命中，为我们树立了“支左爱民模范”李文忠的光辉榜样；在全国亿万军民夺取无产阶级文化大革命全面胜利的时刻，又为我们树立了“无限忠于毛主席革命路线的好干部”门合的光辉榜样。这是毛主席对全党、全军、全国革命人民的最大关怀，最大鼓舞，最大教育，最大鞭策。毛主席亲自为我们树立的这些英雄典范，不仅对于推动当时革命前进发挥了巨大的榜样力量，而且永远是鼓舞我们在毛泽东思想光辉照耀下胜利前进的光辉榜样。"},{"type":"paragraph","text":"我坚决响应毛主席的伟大号召，向“无限忠于毛主席革命路线的好干部”门合同志学习，永远高举毛泽东思想伟大红旗，活学活用毛主席著作，和部队指战员与广大革命群众一起，紧跟毛主席的伟大战略部署，全面落实毛主席的最新指示，深入开展革命大批判，主动地向阶级敌人猛烈进攻，在阶级斗争的大风大浪中进一步锤炼对毛主席无限忠诚的红心，不断提高坚决执行、勇敢捍卫毛主席革命路线的自觉性，永远做在无产阶级专政条件下继续进行革命的先锋战士！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bab550bf3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
