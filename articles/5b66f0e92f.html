thors":[],"dates":[{"year":1972,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来　叶剑英　李先念　李德生　白相国会见恩杰拉同志率领的阿政府贸易代表团"},{"type":"paragraph","text":"新华社一九七二年十一月七日讯  周恩来、叶剑英、李先念、李德生、白相国同志，今天晚上会见以基·恩杰拉同志为团长、德·丰多同志为副团长的阿尔巴尼亚政府贸易代表团，同他们进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使罗博，政府贸易代表团团员：斯·卢萨、穆·拉萨、雷·西奈马蒂同志，参加了会见。"},{"type":"paragraph","text":"我有关方面负责人和工作人员李强、韩宗正、顾明、王明修、王斌、朱传贤、范承祚、陶苗发、廉正保等同志，也参加了会见。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"周恩来等同志会见以基·恩杰拉同志为团长的阿尔巴尼亚政府贸易代表团时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b66f0e92f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
