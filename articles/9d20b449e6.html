" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji43","name":"毛泽东全集第43卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"印发《中国年》一文的批语","alias":"","parts":[{"type":"paragraph","text":"印发《中国年》一文的批语\""},{"type":"paragraph","text":"（1960年7月）印发。《中国年》这篇短文，值得一看。请尚昆办。"},{"type":"paragraph","text":"[1]这个批语写在中国驻瑞士大使馆1960年7月22日给外交部的电报上。电报说，7月14日，法国《快报》周刊发表该刊社长塞尔万·史莱伯写的一篇题为《中国年》的社论，指出巴黎四国首脑会议以及法国和阿尔及利亚临时政府的谈判这两件事情的破产，显示出中国对1960年世界事态的分析比苏联高明，每次都是中国所采取的态度占了上风。1960年前半年总的情况，就是事态同中国分析的一致和赫鲁晓夫因此站到北京的理论上来。"},{"type":"paragraph","text":"[2]指印发给当时正在北戴河参加中共中央工作会议的同志。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":457,"page_end":457},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d20b449e6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
