951,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"社会广大人民所加于烈军属、革命残废军人的尊敬与热爱，提高了他们的社会政治地位和更加鼓舞了他们的爱国热情。"},{"type":"paragraph","text":"本市土产展览交流大会开幕期间，曾招待了六万多烈军属和革命残废军人去参观，使他们进一步认识到祖国的伟大与可爱。"},{"type":"paragraph","text":"大会工作同志的殷勤招待，使他们感觉着处于毛泽东时代的光荣和骄傲。军属们这样说:“这个光荣，是广大人民给我们的，是中国人民志愿军给我们的，是毛主席给我们的!”"},{"type":"paragraph","text":"光荣家属在接受大会崇高的尊敬之后，感激万分，他们坚决表示要在原有工作岗位上加倍努力，带动周围群众深入开展抗美援朝运动。他们更要写信给他们的子女、丈夫、兄弟姊妹，告诉他们的亲属:他们受到了最高的荣誉。江宁区七十二岁的军属马国寿老先生说:“我要这样写信给我的儿子:‘孩子，祖国人民照顾我们无微不至，放心吧!你要努力杀敌!’”"},{"type":"paragraph","text":"照片为土产展览会工作同志引导烈军属参观。"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\08\\518b030301.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb66ca0179"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
