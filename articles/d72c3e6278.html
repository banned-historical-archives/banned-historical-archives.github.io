art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"准备接受毛主席检阅首都国庆受阅部队紧张操练","authors":[],"parts":[{"type":"paragraph","text":"本报讯 参加今年国庆节首都受阅的步兵、炮兵、装甲兵和空军、海军等部队，正在紧张地进行操练，各项动作已经基本上达到受阅要求。"},{"type":"paragraph","text":"参加受阅部队的官兵，都感到这次能接受敬爱的领袖毛主席的检阅，是一生中最大的光荣。他们决心顽强刻苦地学习，保证圆满完成任务。步兵在单个和班教练中，许多同志不怕腿痛、腰酸，甚至脚掌打泡，仍坚持苦练。装甲兵部队的驾驶员多是新手，在夏天里一进车就是一身汗，但是他们不顾热和累，钻研技术，开展互助竞赛，交流操作经验，技术水平提高很快。在炎热的夏季里，飞行员们也进行编队练习。他们坐在高热的机舱里，汗水湿透了衣衫，甚至飞行回来后，有的保险伞都湿透了好几层。为了保证飞机的出勤率，有些地勤人员有时连续工作十几个小时。空军某支队八中队在受阅训练开始的时候，还是一个技术较差的中队；由于官兵们勤学苦练，现在已经成为全支队成绩最高的中队了。在训练中，许多单位和个人受到奖励。在红旗竞赛中，装甲三方队第一列就获得了十一次红旗。炮兵部队的官兵也全力以赴，要以比往年更优良的训练成绩来接受检阅。"},{"type":"paragraph","text":"水兵们在操练 本报记者 韩荣志摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d72c3e6278"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
