script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji39","name":"毛泽东全集第39卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"对一封反映广东潮汕地区整风情况的来信的批语","alias":"","parts":[{"type":"paragraph","text":"对一封反映广东潮汕地区整风情况的来信的批语"},{"type":"paragraph","text":"（1958年4月27日）陶铸同志："},{"type":"paragraph","text":"此件所提问题？，请派一个政治上强的同志去彻查一次。宗派主义可能有的，但死者有无因而致死的特殊情况，也值妥善详查。去的人不要带任何预定估计，完全从寻找真理出发。情况弄清，群疑可释。闻你病了，要静心养病，好了再工作，不急忙。潮汕这件事件，可用几句话交付一位书记去办就行了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿七日[1]陶铸，当时任中共广东省委第一书记。"},{"type":"paragraph","text":"[2]广东省潮安县有人于1958年4月1日给中共中央办公厅写信，反映潮安县委书记在整风反右斗争中自杀的情况。来信希望从速派人到潮汕检查该地区整风中的反地方主义运动，及时解决存在的问题，使整风运动健康发展。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":4,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":257,"page_end":257},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30d8678efb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
