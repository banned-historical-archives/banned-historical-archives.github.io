script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"云南搜集到一批彝族民间文学作品内容包括创世纪史诗、神话故事、民歌、笑话等多种　反映了小凉山彝族原始社会、奴隶社会的生活和斗争","authors":[],"dates":[{"year":1962,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社昆明14日电】　云南省民族民间文学调查队，最近搜集到一批反映小凉山彝族原始社会、奴隶社会的民族民间文学作品。"},{"type":"paragraph","text":"这个调查队在宁蒗彝族自治县的小凉山区对彝族文学作了三个多月的普查。搜集到了彝族的创世纪史诗、神话故事二十六篇，民歌四百多首，加上笑话、童话、寓言、谚语、谜语资料等共有七百一十七件。"},{"type":"paragraph","text":"小凉山彝族人民在解放前一直处于奴隶社会，这次搜集到的大部分文学作品是属于奴隶社会的。但也有一部分是原始社会时期的。如记述四个神女创造大地的传说《古火此》以及关于《彝族起源》的传说等，就是属于原始社会的。这些作品有的是从古老的彝文记载翻译过来的，有的是彝族人民世代口头相传下来的。"},{"type":"paragraph","text":"这批民间文艺作品大都具有较鲜明的时代色彩，如原始社会时期的作品《洪水潮天》，反映了彝族祖先对宇宙万物的认识，以及彝族人民对自然灾害所进行的艰巨斗争。奴隶社会时期的作品，大部分是反映奴隶与奴隶主斗争的故事，还有一部分是奴隶的悲歌苦调。如《青蛙与老虎》、《小兔与老熊》一类的作品，都是借物喻志，显示弱者战胜强者，表达了奴隶制度下奴隶的愿望。《松各克忍》是反映奴隶以怠工、破坏工具和逃跑的行动，来反抗奴隶制残酷压迫的故事。《阿婼妞》、《阿婼妮惹》等，反映了奴隶没有人身自由的痛苦。"},{"type":"paragraph","text":"云南省民族民间文学调查队是由中国作协会昆明分会和云南大学中文系共同组织的。这次搜集到的作品对彝族文学史的研究有很重要的价值。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"175486e49e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
