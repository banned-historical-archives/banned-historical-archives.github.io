" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"晋察翼部队应争取每月弃敌两个旅左右山","alias":"","parts":[{"type":"paragraph","text":"晋察冀部队应争取每月歼敌两个旅左右！"},{"type":"paragraph","text":"（1946年11月9日）聂、萧、罗、刘："},{"type":"paragraph","text":"虞电悉。只要能大量歼敌，先打九十四军或五十三军，再打十六军也好。你们应争取每月歼敌两个旅左右，三至四个月歼敌六个旅左右不是不可能的。手里要经常掌握十二至十八个团一起行动，要能一次包围敌一个师（三个团）而歼灭之，就能打开局面。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"戌佳"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋察冀军区司令员兼政治委员聂荣臻、副司令员萧克、副政治委员罗瑞卿和刘澜涛的电报。"},{"type":"paragraph","text":"[2]指1946年11月7日10时聂荣臻、萧克、刘澜涛和罗瑞卿给中共中央军委的电报。电报说：怀来战役因主力未适时集结，打由矾山堡西进之敌第四十三师未能达到目的，丧失了在桃花堡以北地区打敌第十六军之机会。故决定东转平汉作战，决心以主力先在东西寻机歼敌第九十四军或五十三"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":11,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":271,"page_end":271},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"刘澜涛","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0f4e397b1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
