:[{"year":1982,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英最热烈地祝贺金日成再次当选国家主席"},{"type":"paragraph","text":"新华社北京四月七日电　叶剑英委员长六日打电报给金日成同志，最热烈地祝贺他再次当选为朝鲜民主主义人民共和国主席。电文如下："},{"type":"paragraph","text":"欣闻您再次当选为朝鲜民主主义人民共和国主席，我谨代表中国政府和中国人民，并以我个人的名义，向您表示最热烈的祝贺。"},{"type":"paragraph","text":"您的再次当选，显示了朝鲜人民对您的高度尊敬和无限信任。几十年来，在您的正确领导下，朝鲜人民在反对外来侵略、捍卫国家主权和建设社会主义的斗争中，取得了伟大的成就。我们坚信，在这次最高人民会议精神的鼓舞下，朝鲜人民必将在建设祖国和实现自主和平统一的斗争中，取得新的更大的胜利。"},{"type":"paragraph","text":"祝您在领导工作中取得新的成就。"},{"type":"paragraph","text":"祝中朝两国人民在长期斗争中用鲜血凝成的伟大友谊和战斗团结与日俱增。"},{"type":"paragraph","text":"祝您健康长寿。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a556a8cc16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
