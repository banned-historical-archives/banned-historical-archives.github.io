ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"豫中、豫东日军占领区较利于建立根据地","alias":"","parts":[{"type":"paragraph","text":"豫中、豫东日军占领区"},{"type":"paragraph","text":"较利于建立根据地！！"},{"type":"paragraph","text":"（1945年6月18日）河南区党委："},{"type":"paragraph","text":"根据来电，伏牛山似非敌占区，胡宗南?必用全力来争，我党在伏牛山建立巩固根据地的可能性似甚小，而比较利于建立根据地之豫中、豫东广大敌占区尚未开辟，因此请你们考虑根本部署问题究以何者为宜。大约日寇溃败国民党反攻仅有一年至一年半左右时间，我党如丧失这个时间则将难在河南立足。再则国民党对日寇取避战政策，对我党取坚决作战政策，其战斗力决不可轻视。请根据这一形势考虑电复。对高树勋?及其他杂牌部队必须争取其中立，对任何国民党部队必须坚守自卫立场。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"已巧[1]这是毛泽东为中共中央起草的给中共河南区委的电报。[2]胡宗南，当时任国民党军第一战区代司令长官。在南三足0"},{"type":"paragraph","text":"好外"},{"type":"paragraph","text":"T7答，对我光放留决作不故策"},{"type":"paragraph","text":"根授立一形势考魔电爱却际必须事放共中益，对任何网民壳而院"},{"type":"paragraph","text":"。快已红"},{"type":"paragraph","text":"须守自产毛泽东为中央起草的致河南区党委电的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":6,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":139,"page_end":140},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c36b678e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
