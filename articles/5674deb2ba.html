rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见美中贸易全国委员会代表团"},{"type":"paragraph","text":"邓小平副总理六月五日上午会见了以萨里先生为团长的美中贸易全国委员会代表团。"},{"type":"paragraph","text":"邓小平副总理在同美国客人的交谈中指出，中美双方要多找一些门路来扩大两国之间的经济贸易关系。目前，中国在同美国贸易中出现的很大逆差的状况应该改变。美方应该赞助更多的中国商品进入美国市场。"},{"type":"paragraph","text":"萨里先生说，作为贸易界人士，我们充分懂得，贸易必须有来有往的重要性。美国只有增加进口才能扩大出口。美中贸易全国委员会将尽一切努力，使两国贸易在尽可能平衡的基础上得到发展。"},{"type":"paragraph","text":"王震副总理宴请英国坎德公爵殿下"},{"type":"paragraph","text":"王震副总理六月五日中午在人民大会堂举行宴会，欢迎英国坎德公爵殿下。王震副总理在讲话时说：“我们高兴地注意到，最近，贵国新政府的领导人作了继续发展中英关系的友好表示，我们对此表示赞赏，我们也具有同样的愿望。我相信，在双方的共同努力下，我们两国在各方面的关系将会得到进一步的发展。”"},{"type":"paragraph","text":"邓颖超副委员长宴请宾努亲王一家"},{"type":"paragraph","text":"人大常委会副委员长邓颖超六月五日中午设宴招待宾努亲王和夫人及他们的儿子宾托拉。宴会在亲切友好的气氛中进行。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5674deb2ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
