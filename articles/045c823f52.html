<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"驻徐汇区永嘉学区工宣队领导人员在解放军帮助下用毛泽东思想加强团结无往而不胜","authors":[],"dates":[{"year":1969,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　驻徐汇区永嘉学区工宣队连部核心人员，在解放军同志热情帮助下，用毛泽东思想加强革命团结，切实做到五个“统一”，使连部在领导上层建筑斗、批、改中，发挥了战斗堡垒的作用。"},{"type":"paragraph","text":"永嘉学区工宣队连部七个核心人员来自两个公司，六个厂。他们进驻上层建筑以后，学习了林副主席的教导:“团结就是力量，无产阶级战胜敌人，就要靠团结。”努力用毛泽东思想加强革命的团结。八个多月来他们每天坚持两小时活学活用毛泽东思想，互相尊重，互相帮助，互相支持，互相学习，七个人团结得象一个人一样，在领导整个学区斗、批、改中，取得了很大的成绩。"},{"type":"paragraph","text":"“党内不同思想的对立和斗争是经常发生的”。核心人员根据毛主席的教导，在相互之间发生矛盾，有了分歧的时候，不是回避矛盾，而是运用“团结——批评和自我批评——团结”这个公式，解决矛盾，统一认识，加强革命的团结。他们的具体做法是:"},{"type":"paragraph","text":"一摆:有不同的意见，不在背后搞“小动作”，而是及时摆到桌面上来讨论，用毛泽东思想统一认识和行动。前一时期，参与街道革委会领导的一个核心人员，因为人力安排问题，同连部其他同志闹了矛盾。连部立即召开了核心小组会议，把问题放到桌面上来讨论。大家学习了毛主席的教导:“统筹兼顾、适当安排”，统一了思想，很快解决了问题。在落实政策的过程中，连部领导班子也经常产生不同的看法，他们就在核心领导会议上，学习政策，亮思想，摆观点，通过争论，统一了认识，使政策迅速落实下去。"},{"type":"paragraph","text":"二照:用毛泽东思想对照检查自己，各自多作自我批评。一次在商量工作时，一位核心人员对几个主要负责人的工作不满意，尖锐地提了意见，连部一位负责同志马上和他顶了起来说:“你有本事，你来解决。”当场争得面红耳赤，不欢而散。过后，连部的这位负责同志反复学习了毛主席“因为我们是为人民服务的，所以，我们如果有缺点，就不怕别人批评指出”的教导，愈想愈觉得不安，认识到对待同志批评的态度，不仅是个人作风问题，而且是一个路线问题、世界观的问题。于是就在连部会上作了诚恳的自我批评，自觉斗私批修，会后还同那位提意见的同志交了心，解决了矛盾，增强了团结。"},{"type":"paragraph","text":"三交:他们遵照毛主席关于“开展谈心活动，这个方法很好”的教导，把开展谈心活动作为加强革命团结的重要方法。当核心人员之间发生思想隔阂的时候，就自觉地进行个别谈心，亮出思想，解开疙瘩，增强革命团结。有一个核心成员，体弱多病，连部领导关心他的健康，和他厂里商量，想让他回厂工作。由于事先没有通气，这个同志误会为有人在背后搞“小动作”，心里有了疙瘩。连部同志就及时和他个别谈心，消除了误会，进一步增强了团结。"},{"type":"paragraph","text":"四整风:核心领导经常在全体队员面前亮私，斗私，听取革命师生的批评和意见，主动接受群众的监督，使影响团结的一些非无产阶级思想及时得到克服。"},{"type":"paragraph","text":"驻永嘉学区工宣队核心领导的团结一致，带动了全体队员和广大革命师生的团结，大家动作整齐，步伐一致，使学区的斗、批、改出现了崭新的面貌。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"045c823f52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
