,"authors":[],"dates":[{"year":1957,"month":7,"day":6}],"is_range_date":false,"parts":[{"text":"戴家祥女儿戴完华写信给本报，督促其父彻底交代问题","type":"title"},{"text":"【文汇报讯】 本报编辑部昨天收到在杭州第六中学教书的戴完华寄来的信，她表示要同她的父亲右派分子戴家祥划清界限，要戴家祥彻底向党交代出一切问题，痛改前非，以取得人民的宽恕。原信如下:","type":"paragraph"},{"text":"我是右派分子戴家祥的女儿。","type":"paragraph"},{"text":"我的父亲戴家祥是个阴毒的右派分子，是“楚歌”的幕后人之一。他的反动言论已受到华东师大师生员工和广大人民的严厉驳斥。我是个人民教师，我要坚决站在人民立场，反对他侮辱共产党和污蔑苏联的言论。","type":"paragraph"},{"text":"解放前，我们的家庭是地主家庭，我的父亲是剥削劳动人民的地主；解放后，他得到共产党和人民的宽大，给他在华东师大教书。而他辜负了人民的宽大，没有很好改造自己思想，还要趁着共产党整风的机会来反对党，在学生中放火。我现在忠告我的父亲:“父亲，你只有站在人民的一边，彻底的向党交代出你的一切问题，挖掘反动的剥削阶级思想根源，向人民痛改前非，以取得党和人民的宽恕。否则你将受到人民应有的制裁!”","type":"paragraph"},{"text":" 杭州第六中学 戴完华7月4日","type":"paragraph"},{"text":" ——原载《文汇报》1957年7月6日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7994aa424c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
