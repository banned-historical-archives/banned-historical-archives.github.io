art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伏老回到北京他带来了越南；印尼两国元首对毛主席的问候","authors":[],"parts":[{"type":"paragraph","text":"新华社记者24日讯 伏罗希洛夫主席和苏联的其他贵宾们在今天下午乘专机回到北京。"},{"type":"paragraph","text":"伏罗希洛夫主席是在5月6日离开北京前往印度尼西亚共和国和越南民主共和国访问的。今天上午他从河内乘专机来北京途经武汉的时候，还在那里第二次参观了武汉长江大桥。"},{"type":"paragraph","text":"伏罗希洛夫主席乘坐的银色飞机在五点四十分着陆。他走下飞机以后，受到了朱德副主席、刘少奇委员长、周恩来总理、副总理、副委员长以及国家的其他领导人员和有关部门的负责人的欢迎。苏联驻华大使尤金，印度尼西亚、越南、缅甸、蒙古等国的使节也都到机场欢迎。"},{"type":"paragraph","text":"伏罗希洛夫主席由朱德副主席陪同到中南海勤政殿休息。当伏罗希洛夫主席到达勤政殿时，毛泽东主席在大门口迎接。他们见面后，伏罗希洛夫主席告诉毛主席说：“苏加诺总统托我问候你，他祝你一切都好！”"},{"type":"paragraph","text":"“还有，”伏罗希洛夫主席又对毛主席说：“胡志明主席也托我问候你和中国的其他同志，他也祝你们一切都好！”"},{"type":"paragraph","text":"毛主席笑着说：“非常感谢！非常感谢！”"}],"alias":""},"tags":[{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"feaa2f54a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
