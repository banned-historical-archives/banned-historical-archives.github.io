art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"贯彻毛主席的革命路线团结革命干部 批倒党内头号走资本主义道路当权派上海市水产局集会控诉资产阶级反动路线罪行","authors":[],"parts":[{"type":"paragraph","text":"新华社十三日讯 上海市水产局机关无产阶级革命派、革命群众和革命干部日前举行“高举毛泽东思想伟大红旗，彻底批判资产阶级反动路线大会”，控诉党内头号走资本主义道路当权派在干部问题上提出“打击一大片，保护一小撮”的资产阶级反动路线的滔天罪行。"},{"type":"paragraph","text":"在文化大革命前夕，旧上海市委内一小撮走资本主义道路当权派，不仅在干部问题上推行了资产阶级反动路线，而且还把推行资本主义、修正主义黑货的罪责全部推给下面，故意夸大和歪曲水产局工作中的缺点和错误。他们急急忙忙派出工作队，划框框，定调子，污蔑水产局机关是“修正主义的黑窝”，大肆谩骂水产局机关里的一百多名干部，扬言要把他们“统统赶下去劳动”。在去年六月以后的四个月里，使这些干部饱受了中国的赫鲁晓夫的资产阶级反动路线的迫害。这时候，幸亏我们最最敬爱的伟大领袖毛主席领导全党、全国人民向资产阶级反动路线展开了全面的猛烈回击。水产局机关的革命干部纷纷与革命群众一道起来造反了。"},{"type":"paragraph","text":"最近，他们学习了《红旗》杂志《爱国主义还是卖国主义？》、《在干部问题上的资产阶级反动路线必须批判》和《“打击一大片，保护一小撮”是资产阶级反动路线的一个组成部分》等重要文章后，立即行动起来，更高地举起毛泽东思想伟大红旗，向党内头号走资本主义道路的当权派及资产阶级反动路线展开猛烈的攻击。他们说，毛主席早就教导我们：“指导伟大的革命，要有伟大的党，要有许多最好的干部。”就是对待犯错误的干部，毛主席也一再教导我们要实行“惩前毖后、治病救人”的方针。而资产阶级反动路线却要排斥一切，打倒一切，这完全是适应国内外阶级敌人的需要，阴谋复辟资本主义；猖狂地同毛主席的干部政策相对抗！"},{"type":"paragraph","text":"在群众性的大批判斗争中，水产局机关革命派、革命群众和革命干部还列举了许多事实，指出，由于资产阶级反动路线的恶劣影响还没有彻底肃清，目前群众与干部、干部与干部之间的对立情绪尚未消除。特别是受《修养》毒害的许多干部，精神上的“枷锁”还没有彻底粉碎，严重地影响了革命的大联合、革命的“三结合”，影响“抓革命，促生产”指示的贯彻，影响干部到群众中去。他们决心进一步掀起活学活用毛主席著作的新高潮，遵照毛主席的教导：“组织千千万万的民众，调动浩浩荡荡的革命军”，把一切可以团结的力量联合起来，彻底批深批臭党内头号走资本主义道路当权派。他们打算通过座谈会、回忆对比、交心会、黑板报及墙报等形式，深入批判资产阶级反动路线，批判《修养》这株大毒草，将革命的大批判放在一切工作的首位，以带动一切工作。"},{"type":"paragraph","text":"在这次群众性的大批判高潮中，水产局的革命领导干部与中层干部都坚定地站在毛主席的革命路线一边，与革命群众一道行动起来了。即使是原来执行过资产阶级反动路线的工作总团、工作分团的主要负责人，也都在群众面前承认了过去的错误，并表示要坚决地站到毛主席的革命路线上来，彻底打倒党内头号走资本主义道路的当权派。他们的革命行动，受到了水产局机关无产阶级革命派、革命群众热烈欢迎和坚决的支持。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3163cbfef7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
