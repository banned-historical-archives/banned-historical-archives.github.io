动人事部关于离休干部健康休养的几项规定","dates":[{"year":1983,"month":5,"day":25}],"is_range_date":false,"authors":["劳动人事部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 513-514","tags":[{"name":"待遇","type":"主题/事件"},{"name":"干部","type":"主题/事件"},{"name":"离休","type":"主题/事件"},{"name":"休养","type":"主题/事件"}],"parts":[{"type":"title","text":"劳动人事部关于离休干部健康休养的几项规定"},{"type":"subtitle","text":"劳人老〔1983〕17号"},{"type":"paragraph","text":"四、副部长以上（含副部长）及相当这一级的离休干部外出休养，可根据〔1980〕国办发18号文件规定办理，即：高级干部外出休养因病或年老体弱，需要家属陪同照顾的，公家一般可报销家属一人的同席车船费和住宿费。但一般不得携带已参加工作的子女。五、所需费用，按下列原则掌握：车船费和床位费按同职级在职干部差旅费标准，从离休干部所在单位差旅费中列报；休养期间的医疗费，按公费医疗规定办理，伙食费自理。未经组织批准，自行联系休养的，或在统一组织健康休养期间，自己转换疗养场所的，一切费用自理。要发扬艰苦奋斗的优良传统，防止搞特殊化。一九八三年五月二十五日（晋人老字〔1983〕53号文件转发）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"955a4dd960"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
