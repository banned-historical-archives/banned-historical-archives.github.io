:["李富春"],"dates":[{"year":1966,"month":10,"day":31}],"is_range_date":false,"parts":[{"text":"李富春传达给中央给七机部的指示","type":"title"},{"text":"李富春","type":"authors"},{"text":"材料问题是指文化革命的材料，时间是指文化大革命以来的，处理如下：","type":"paragraph"},{"text":"一、凡是斗错了的、错整了的、错压制的，一律予以平反，个人写的材料一律退回，领导干部应当承认错误。","type":"paragraph"},{"text":"二、凡是用作批判错误路线的材料，在不至于引起群众斗群众，不影响全面的情况下，由领导主动提供给受压制的一方面群众。","type":"paragraph"},{"text":"三、凡是能以引起群众对立的材料，如：排队名单、工作组报告、工作手册、会议记录、上级指示，这些材料经多方群众同意，可以当众烧毁，如果不同意，请上级处理。","type":"paragraph"},{"text":"现在有些单位比较被动，引起一些群众抢材料。处理这个问题，说不清楚的可以请上级派人处理，如不迅速处理，处理不下去，只好停职反省。因此，要求各单位主动处理这些材料。","type":"appellation"}],"comments":[],"origin":"一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（2）》：《大字报选 第二集》（北京：一院大字报选编小组，1966.12）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc7dac590d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
