[{"year":1967,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命鼓舞我们胜利前进"},{"type":"paragraph","text":"日本　冈田春子"},{"type":"paragraph","text":"毛主席亲自发动和领导的中国无产阶级文化大革命是一场史无前例的伟大的革命运动，它正以排山倒海之势，雷霆万钧之力，在全中国范围内开展着。在这场两条路线、两条道路的激烈的斗争中，中国革命妇女在毛主席无产阶级革命路线指引下，以大无畏的革命精神，向中国党内最大的一小撮走资本主义道路的当权派猛烈开火。"},{"type":"paragraph","text":"中国革命妇女在斗争中，活学活用毛主席著作，向一切“私”字开火，促进思想革命化。她们在这场史无前例的无产阶级文化大革命中立下了不朽的功勋，为世界革命妇女做出了光辉的榜样。我们日本革命妇女要向你们学习，学习你们那种高举毛泽东思想的伟大红旗，活学活用毛主席著作，改造自己的世界观，向一切牛鬼蛇神造反的精神。"},{"type":"paragraph","text":"我们在北京的日本革命妇女，和中国同志一起参加了无产阶级文化大革命，并受到了很大的教育。在革命造反精神的鼓舞下，我们正在同宫本修正主义集团进行激烈的斗争。日共修正主义集团同中国党内最大的走资本主义道路当权派一样，在妇女运动中犯下了严重的罪行。"},{"type":"paragraph","text":"日共修正主义集团在妇女运动中竭力宣扬小家庭的幸福，时髦的服装，宣传战争的残酷性，煽动人们害怕战争的心理。在日常的妇女活动中，推行小恩小惠的经济主义，其目的就是阻止广大妇女觉醒，走革命的道路。"},{"type":"paragraph","text":"我们在北京的日本革命妇女长期受着宫本修正主义集团的影响，日修不让我们学习毛泽东思想，也不让我们同中国的工人、农民进行深入的接触，企图把我们在北京的日本革命妇女培养成新的特权阶层，以便使我们老老实实地接受日修议会的道路，使我们忠心耿耿地为增加日修选票而奋斗。"},{"type":"paragraph","text":"但是，我们亲自参加了中国无产阶级文化大革命，看到文化大革命的铁扫帚，犹如暴风骤雨，荡涤着一切污泥浊水，对修正主义的堡垒猛烈开火。中国革命群众的造反精神给了我们很大勇气和支持，使我们下定决心向宫本修正主义集团开火。在我们的祖国造反之火，已经到处燃烧，已有十八个县的新日本妇女会造了日修的反，新日本妇女中央委员会的四个中央委员也造了反。"},{"type":"paragraph","text":"我们深深懂得，在惊心动魄的反修斗争中，是什么力量促使我们造宫本修正主义集团的反，这就是光焰无际的毛泽东思想。"},{"type":"paragraph","text":"世界革命人民的伟大领袖毛主席指出：“星星之火，可以燎原”。尽管日本妇女运动将会面临种种困难和挫折，但我们深信，在不久的将来，向美帝国主义、日本反动派和日共修正主义集团造反的烈火，会烧遍日本全岛。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d8f8bd812"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
