":[{"year":1994,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界全明星乒乓球巡回赛"},{"type":"paragraph","text":"马文革再夺第三站冠军"},{"type":"paragraph","text":"新华社北京１月２６日电奥运会铜牌得主、２５岁的中国选手马文革继前几天夺第二站冠军后，今天在日本东京以３∶１击败世界锦标赛冠军、法国的加蒂安，夺得世界全明星乒乓球巡回赛第三站冠军和一万美元的奖金。决赛的４局比分是２１∶１９、１９∶２１、２１∶１５和２１∶１４。排名世界第五的马文革是在半决赛中以２∶１淘汰了韩国选手金泽洙后进入决赛的。世界前六位选手和东道主的两名选手参加了这一站的角逐。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"788bccbc00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
