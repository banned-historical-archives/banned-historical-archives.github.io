ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"目前应使敌集中以利歼击","alias":"","parts":[{"type":"paragraph","text":"目前应使敌集中以利歼击"},{"type":"paragraph","text":"（1950年12月24日）德怀同志："},{"type":"paragraph","text":"目前伪军及美军一部在三十八度至三十七度之间站住脚跟，组成防线，对于我军各个歼灭该敌，最为有利。目前伪军集中于我有利，分散则于我不利。因此不但我军于此次战役后收兵休整可以向后撤退一步，使伪军又能集中起来，构成防线，以利下一次歼击，而且对于原定人民军第二、第五军团深入敌后分散敌人兵力的计划，值得重新考虑。该两兵团在此次战役后暂时和志愿军一同休整，不要南进，待下一战役后再行南进，似较适宜。究应如何，请你酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十四日[1]德怀，即彭德怀，当时任中国人民志愿军司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":461,"page_end":461},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5c1863fa3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
