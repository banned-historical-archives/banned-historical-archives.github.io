script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市交通等九个方面无产阶级革命派集会誓师进一步打击反革命经济主义和投机倒把警惕资产阶级的糖衣炮弹，坚决揪出藏在暗处破坏的坏人","authors":[],"dates":[{"year":1968,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了纪念“一月革命”一周年，进一步打击反革命经济主义，全面落实毛主席最新指示，鼓足干劲，力争上游，再接再厉，从思想上、政治上、经济上、组织上夺取无产阶级文化大革命的全面胜利，本市交通、农垦、手工、财政、银行等九个方面的无产阶级革命派，昨天在文化革命广场联合召开了“高举毛泽东思想伟大红旗，进一步打击反革命经济主义誓师大会”。"},{"type":"paragraph","text":"海港联合指挥部、上海合金厂、市手工业管理局等单位的代表在会上发了言。"},{"type":"paragraph","text":"大会回顾了“一月革命”风暴以来，全市广大无产阶级革命派和革命职工高举毛泽东思想伟大红旗，紧跟毛主席伟大战略部署，击退了阶级敌人刮起的反革命经济主义歪风，坚决贯彻执行毛主席“抓革命，促生产”的伟大方针，取得了革命和生产的巨大胜利。并对以陈丕显、曹荻秋为首的党内一小撮走资本主义道路的当权派，企图以反革命经济主义腐蚀无产阶级的阶级队伍，瓦解革命群众斗志的滔天罪行，进行了揭发和批判。"},{"type":"paragraph","text":"大会指出，阶级敌人是不甘心于他们的灭亡的。最近，本市有些地区和单位的党内一小撮走资本主义道路的当权派和社会上的牛鬼蛇神互相勾结，利用各种借口，煽动少数人搞经济主义，妄图干扰、破坏无产阶级文化大革命和社会主义建设事业的胜利进行。有的单位擅自增加工资，提高福利待遇，扩大劳动保护、保健食品的供应范围，在手工业合作社集体所有制企业中，也发生分掉企业资金等违反制度的情况。还有些单位的走资派挑动一些人离开工作岗位，以“学习”和“参观”为名，进行变相“串连”。"},{"type":"paragraph","text":"“凡是反动的东西，你不打，他就不倒。”代表们在发言中指出，进一步打击反革命经济主义，必须高举毛泽东思想伟大红旗，念念不忘阶级斗争，提高革命警惕，凡是不符合毛泽东思想和党的政策规定的一切不合理开支，坚决抵制，一文不付。同时，要坚决把那些隐藏在背后进行挑动和破坏的坏人清查出来。"},{"type":"paragraph","text":"代表们在发言中，还着重介绍了他们所在单位的无产阶级革命派和革命群众以国家利益为重，坚决抵制反革命经济主义歪风的先进事例。"},{"type":"paragraph","text":"会上，市革委会领导成员宣读了有关进一步打击反革命经济主义和投机倒把活动的文件，并作了讲话。他说:打击反革命经济主义和投机倒把，是一场严重的阶级斗争。全市无产阶级革命派要活学活用毛主席著作，全面落实毛主席的最新指示，牢记毛主席的教导，警惕资产阶级的糖衣炮弹，破私立公，破旧立新，在春节里做到不送礼、不请客、不拜年，过一个革命化的春节。"},{"type":"paragraph","text":"最后，会议宣读了上海工人革命造反总司令部等十九个革命群众组织联合发出的“高举毛泽东思想伟大红旗，坚决肃清反革命经济主义流毒，过一个革命化春节的倡议书”。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7307a1aab"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
