社被迫供认","authors":[],"dates":[{"year":1951,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国侵朝空军遭受日益严重的打击"},{"type":"paragraph","text":"所谓“空中优势”正摇摇欲坠"},{"type":"paragraph","text":"美国资产阶级反动通讯社被迫供认"},{"type":"paragraph","text":"【新华社三十日讯】美国侵略者好久以来吹嘘的在朝鲜战场上的所谓“空中优势”正摇摇欲坠。"},{"type":"paragraph","text":"美联社东京二十八日电透露美国侵朝空军正遭受日益严重的打击。电讯说：“美国的F八十六型佩刀式喷气飞机（盟方可与米格式飞机相比的最优秀的飞机）、F八十四型雷电式喷气飞机及F八十型流星式飞机在返回基地时，机身上的弹孔已经越来越多了。B二十九型超级空中堡垒一天天更多地被敌方空军和地面炮火打得勉强飞回冲绳和日本基地来，有许多中型轰炸机被迫在朝鲜的盟军机场作紧急着陆，或被迫降落在黄海上，让海军和空军的救生队救起来。有少数从未飞回来。上周联合国的损失，说明了盟方空军优势所受到的威胁正在增加中。”"},{"type":"paragraph","text":"美联社的电讯还说：美国空军“在人员和装备方面损失的数字越来越大了”。“这使人深切地感觉到，假如联合国要保持它的空中优势，保持它在停战谈判中讨价还价的资本，它必须增加它的空军装备”。“美国国防部可能不得不拿出更多的它所储存的军用飞机，空军则要修改它在朝鲜的战术，以便应付这个日益增加的威胁。”但是，美联社电讯接着又指出：美国侵略者如果要用拆东墙、补西墙的办法来挽回它在朝鲜的所谓“空中优势”，势必要破坏它的世界范围的备战计划。电讯说：“派更多飞机到朝鲜来”，就要减少美国国内的需要，并减少为了加强欧洲及加强“世界其他多事地点所必需的美国飞机的数量”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2d80b286c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
