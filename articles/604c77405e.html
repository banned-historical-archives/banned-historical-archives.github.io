art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"意大利人民示威抗议苏修侵犯中国领土示威群众散发传单；向毛主席和林副主席致敬","authors":[],"parts":[{"type":"paragraph","text":"新华社二十三日讯 罗马消息：大批意大利工人和学生二十一日举行示威，强烈抗议苏修叛徒集团侵犯中国领土，对中国发动武装挑衅。"},{"type":"paragraph","text":"示威群众高举红色横幅和伟大领袖毛主席的画像，聚集在罗马市的一个中心广场上。许多居民陆续加入示威者的队伍。"},{"type":"paragraph","text":"两名示威者发表了演说，愤怒谴责苏修新沙皇侵犯世界革命的堡垒——中国的领土，揭露苏修同美帝进行反革命勾结的阴谋。"},{"type":"paragraph","text":"示威群众散发了数千份传单。传单揭露苏修统治集团的丑恶面目。传单还欢呼向中华人民共和国以及中国人民的伟大领袖毛主席和毛主席的亲密战友林彪副主席致敬的口号。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"604c77405e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
