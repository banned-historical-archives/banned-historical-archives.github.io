激烈搏斗，并放火烧了警察所","authors":[],"dates":[{"year":1968,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十八日电　据东方通讯社报道:被日本佐藤反动政府武装警察的无理镇压激怒了的东京山谷贫民区的约两千名工人，十七日晚上举行声势浩大的集会和示威，反对资本主义的野蛮统治和残酷剥削。"},{"type":"paragraph","text":"山谷贫民区的工人们，十年来已经九次在暑期里举行这样英勇的斗争。"},{"type":"paragraph","text":"十七日晚上，山谷贫民区的工人，高举写着“毛泽东思想万岁!”“粉碎日共修正主义!”等口号的红旗，聚集在山谷贫民区的一个警察所的门前，举行集会。工人代表在集会上强烈谴责武装警察镇压工人的罪恶行径。他们还揭露了日共修正主义集团破坏山谷工人的革命斗争，分裂工人运动，为美日反动派效劳的丑恶嘴脸。一位工人代表在会上强调指出，必须把反美爱国斗争坚决地进行到底。"},{"type":"paragraph","text":"会后，工人们在这个警察所的周围游行示威，并高呼“解放山谷!”“粉碎警察所!”等口号。"},{"type":"paragraph","text":"佐藤反动政府对工人的英勇斗争怕得要死，指使警察袭击示威群众。被激怒了的工人们把警察包围起来，并放火烧了这个警察所。在工人们的英勇反击下，佐藤反动政府又急急忙忙出动了装甲车和两千名武装警察，企图把工人的正义斗争镇压下去。但是，工人们毫不胆怯，同武装警察继续进行了英勇的搏斗。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"772fcaf557"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
