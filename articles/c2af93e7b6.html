<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji49","name":"毛泽东全集第49卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"和赞比亚共和国总统卡翁达的谈话（节录）","alias":"","parts":[{"type":"paragraph","text":"和赞比亚共和国总统卡翁达的"},{"type":"paragraph","text":"谈话 （节录）"},{"type":"paragraph","text":"（1967年6月24日）毛泽东（以下简称毛）：欢迎你们，第一次到中国来吗？"},{"type":"paragraph","text":"卡翁达（以下简称卡）：我们中有三位曾来过。我本人、我的夫人和其他几位都是第一次来。"},{"type":"paragraph","text":"毛：赞比亚在热带，各种畜牧业和农业可以搞起来。"},{"type":"paragraph","text":"卡：是的。赞比亚潜力很大，过去受帝国主义控制，很多事不能做。现在各地区都在发展养牛场。"},{"type":"paragraph","text":"毛：赞比亚有七十多万平方公里，差不多等于中国几个浙江省。"},{"type":"paragraph","text":"卡：我国主要问题是交通问题，所以我们要通过坦桑尼亚搞铁路。"},{"type":"paragraph","text":"毛：要勘察吧？要下决心干，开始干就好了。毛：坦桑尼亚还没有确定究竟由谁帮忙吧？周恩来（以下简称周）：坦桑尼亚已确定由我们帮忙勘察。"},{"type":"paragraph","text":"卡：我是顺便提到铁路问题。我已和周恩来总理详谈了这个问题。我们回去和尼雷尔总统商谈后就通知你们。我们和坦桑尼亚铁路的铁轨宽窄不一样，赞比亚的铁轨宽一些，坦桑尼亚的窄一些。"},{"type":"paragraph","text":"毛：将来非洲国家都独立了，把帝国主义赶走了，就可以发展铁路了。毛泽东全集第四十九卷"},{"type":"paragraph","text":"周：非洲被帝国主义分割了。卡：很对。非洲很多民族都被人为地分割开来。毛：这就是帝国主义的分而治之。"},{"type":"paragraph","text":"卡：我们只有通过帮助其他地区的自由战士，使他们获得独立，才能报答你们的帮助。"},{"type":"paragraph","text":"毛：这不是什么报答。先独立的国家有义务帮助后独立的国家。"},{"type":"paragraph","text":"卡：是的，我完全同意主席先生所说的。我的说法可能粗糙一些，我的意思是，只有这样才能表达我们真正欣赏你们援助的心情。"},{"type":"paragraph","text":"毛：你们独立才两年半，还有很多困难。你们也帮助了未独立的国家。"},{"type":"paragraph","text":"卡：对。毛：我们独立已有十八年了，更应该帮助他们。卡：很感激主席先生。"},{"type":"paragraph","text":"毛：全世界如果不解放，中国这个国家就不可能最后解放自己，你们也不可能最后解放自己。"},{"type":"paragraph","text":"毛：总有一天帝国主义是要到我们这里来的。我们是有经验的，帝国主义也好，国内反动派也好，都可以赶走。他（指赞比亚合作、青年和社会发展部部长班达）一九六三年来时你们不是还没有独立嘛，如果你们国家和我们国家一样，独立了十八年，你们的国家建设、文化教育就会有很大的进步。你们到我们这个时候，还有十五年。到那个时候，你们的铁路早就通车了。你们修建这条铁路只有一千七百公里，投资也只有一亿英镑，没有什么了不起嘛。"},{"type":"paragraph","text":"卡：很希望有机会能和毛主席多谈谈，但因为主席先生很忙，我们有些过意不去。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":6,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":520,"page_end":521},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2af93e7b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
