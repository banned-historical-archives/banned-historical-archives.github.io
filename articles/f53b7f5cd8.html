script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜内阁总理电毛主席祝贺","authors":[],"dates":[{"year":1949,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤一日电】　朝鲜民主主义人民共和国内阁总理金日成电毛主席祝贺，电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府毛泽东主席阁下:中国人民在反对美帝国主义的侵略和蒋介石国民党反动统治的人民解放斗争中取得决定性的胜利之后，宣布了中华人民共和国及其中央人民政府的成立。我谨以朝鲜民主主义人民共和国政府的名义向阁下和中国人民致热烈的祝贺。"},{"type":"paragraph","text":"中华人民共和国的诞生与中央人民政府的成立不但表明中国人民已经做了中国的主人，而且给予朝鲜人民及东方各国人民的解放斗争以很大的鼓舞和援助，同时在世界人民争取和平与民主的斗争中也有莫大的贡献并加强了它的力量。"},{"type":"paragraph","text":"我深信中国人民的永远幸福和贵国政府的事业将有很大的成就。敬祝阁下健康。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国内阁总理金日成。(一九四九年十月一日平壤)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f53b7f5cd8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
