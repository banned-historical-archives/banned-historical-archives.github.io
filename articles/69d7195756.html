":"转发《关于涉及批判南斯拉夫图书处理意见的请示》","dates":[{"year":1978,"month":2,"day":2},{"year":1978,"month":2,"day":28}],"is_range_date":false,"authors":["国家出版局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国家出版事业管理局办公室, 出版工作文件选编(1976.10-1980.12), 125-126","tags":[{"name":"批判","type":"主题/事件"},{"name":"图书","type":"主题/事件"},{"name":"文物图书","type":"主题/事件"}],"parts":[{"type":"title","text":"转发《关于涉及批判南斯拉夫图书处理意见的请示》"},{"type":"subtitle","text":"国家出版局•1978年2月28日•（78）出版字第84号"},{"type":"paragraph","text":"我局《关于涉及批判南斯拉夫图书处理意见的请示》，已经中央宣传部批准，现转发给你们，请参照办理。"},{"type":"paragraph","text":"主送：各省、市、自治区出版(文化)局，中央一级出版社，新华书店总店，北京发行所"},{"type":"paragraph","text":"附：国家出版局党组关于涉及批判南斯拉夫图书处理意见的请示"},{"type":"subtitle","text":"国家出版局党组•1978年2月2日•（78)出版字第40号"},{"type":"paragraph","text":"遵照中央一九七七年八月二十九日《关于铁托访华的通知》的精神，我局对直属出版社出版的涉及批判南斯拉夫的图书进行了初步检查。根据检查，已出版的这类图书共有五十五种，其中公开发行的二十种，内部发行（包括原来公开发行后来改为内部发行）的三十五种。这些图书，除原已定为内部发行的拟仍按原规定办理外，对公开发行的二十种，提出如下的处理意见："},{"type":"paragraph","text":"一、国际共产主义运动历史文件，如《共产党和工人党莫斯科会议宣言》、《莫斯科宣言莫斯科声明》，改为内部发行。"},{"type":"paragraph","text":"二、我党的历史文件以及部分内容指名批判南斯拉夫，但全书还有参考价值的，如《中国共产党第八届全国代表大会第二次会议关于在莫斯科举行的各国共产党和工人党代表会议的决议》、《陈毅付总理答记者问》、《政治经济学（资本主义部分）》等，改为内部发行。"},{"type":"paragraph","text":"三、主要内容是批判南斯拉夫，参考价值也不大的，如《赫鲁晓夫是怎样下台的》、《中阿战斗友谊万岁》、《中阿战斗友谊新高峰》、《列宁主义万岁》等，停止发行。"},{"type":"paragraph","text":"四、由我们翻译出版的阿尔巴尼亚党的文件、霍查的著作、讲话等，其中有批判、攻击南斯拉夫内容的，如《阿尔巴尼亚劳动党中央委员会向第四次代表大会的工作报告》（霍查）、《在阿尔巴尼亚劳动党第五次代表大会上关于中央委员会工作的报告》（霍查）、《对选民的讲话》（霍查）、《在佩尔梅特庆祝第一次反法西斯民族解放代表大会二十周年招待会上的讲话》（霍查）、《阿尔巴尼亚劳动党史》，暂不处理。"},{"type":"paragraph","text":"以上意见当否，请批示。"},{"type":"paragraph","text":"主送：中央宣传部"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69d7195756"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
