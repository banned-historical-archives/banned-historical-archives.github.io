<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大力加强群众专政　保证文化大革命顺利进行上海昨举行公判大会严惩反革命市革委会领导成员作重要讲话，强调指出要高度警惕敌人利用派　性制造分裂，破坏革命大联合和三结合","authors":[],"dates":[{"year":1968,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天，上海市革委会政法指挥部和上海无产阶级革命派，在文化革命广场联合召开了“高举毛泽东思想伟大红旗，严厉镇压反革命，坚决打击流氓阿飞、投机倒把罪犯公判大会”。会上，上海市中级人民法院依法宣判了蒋匪特务集团首犯应功九、抢劫杀人犯赵景普死刑，立即执行；判处反革命分子陈志中死刑，缓期二年执行，强迫劳动，以观后效；判处对抗“六·六”通令，搞打、砸、抢、抄、抓的江犯崇田十年徒刑；并判处其他十五名罪犯以徒刑。这一判决，得到了会场内外广大无产阶级革命派和广大革命群众的坚决拥护。这次公判大会大长了无产阶级革命派的志气，大灭了一小撮阶级敌人的威风，充分显示出上海无产阶级专政机关和广大无产阶级革命派维护革命新秩序的坚强决心，充分显示了群众专政的强大威力。"},{"type":"paragraph","text":"上海市革命委员会领导成员在会上作了重要讲话。他指出，上海和全国无产阶级文化大革命的形势大好。但是，“一切反动势力在他们行将灭亡的时候，总是要进行垂死挣扎的。”那些混在我们内部的一小撮叛徒、特务、死不悔改的走资本主义道路的当权派、社会上没有改造好的地、富、反、坏、右、反动的资产阶级分子、流氓阿飞、投机倒把分子，以及美帝、苏修、日本特务等，决不会甘心于自己的失败，必然会千方百计地进行各种破坏活动。"},{"type":"paragraph","text":"他强调指出:煽动派性、利用无产阶级革命派内部少数头头的私心杂念，制造分裂，破坏革命大联合和革命三结合，是当前阶级敌人破坏无产阶级文化大革命的一种恶毒手段。敌人的这一手，既阴险，危害也最严重。我们每一个革命派战士，都要进一步“斗私，批修”，坚决打倒资产阶级、小资产阶级派性，增强无产阶级党性，严格遵守中央“六·六”通令，保持高度的革命警惕性，善于识别阶级敌人的一切阴谋诡计，大力加强群众专政，严惩阶级敌人的一切破坏活动，保证无产阶级文化大革命的顺利进行。"},{"type":"paragraph","text":"本市部分革命群众组织的代表在会上发了言，他们一致表示，在激烈的阶级斗争中一定要紧跟毛主席的伟大战略部署，紧紧掌握斗争大方向，念念不忘阶级斗争，念念不忘无产阶级专政，进一步贯彻执行毛主席的最新指示，大力加强群众专政，严厉镇压反革命，坚决打击流氓阿飞、投机倒把等犯罪活动，维护革命新秩序，为夺取无产阶级文化大革命的全面胜利而努力。"},{"type":"paragraph","text":"大会在全场高唱《大海航行靠舵手》的雄壮歌声中胜利结束。"},{"type":"paragraph","text":"大会结束以后，被判死刑、立即执行的反革命犯应功九和抢劫杀人犯赵景普，当即被押赴刑场，执行枪决。这时会场内外长时间口号声不绝，无不拍手称快。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bcf5589a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
