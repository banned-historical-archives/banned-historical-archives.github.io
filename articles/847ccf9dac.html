总理和克立总理签署","authors":[],"dates":[{"year":1975,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中泰两国政府联合公报在北京签字"},{"type":"paragraph","text":"决定自即日起建立大使级外交关系"},{"type":"paragraph","text":"联合公报由周恩来总理和克立总理签署"},{"type":"paragraph","text":"新华社一九七五年七月一日讯　中华人民共和国政府和泰王国政府联合公报今天在北京签字。中泰两国政府决定自即日起建立大使级的外交关系。"},{"type":"paragraph","text":"联合公报由中华人民共和国国务院总理周恩来和泰王国总理蒙拉差翁·克立·巴莫签署。"},{"type":"paragraph","text":"中国方面参加签字仪式的有：国务院副总理邓小平，外交部长乔冠华，外贸部长李强，外交部副部长韩念龙，中国人民解放军副总参谋长王尚荣，外交部司长柯华、朱传贤，副司长章含之、程瑞声。"},{"type":"paragraph","text":"泰国方面参加签字仪式的有：外交部长差提猜·春哈旺，大使、泰国常驻联合国代表阿南·班雅拉春，总理秘书长巴盖贝·因徒梭蓬，商业部次长威庄·尼瓦翁，国防部次长集·桑卡敦海军上将，财政部次长安雷·威拉旺，农业和合作社部次长比达·甲那素，内务部次长差洛·瓦那布滴，工业部次长裕·汶纳，国家安全委员会秘书长西提·沙卫西拉，总理副秘书长甲森·西里顺汶，外交部大使尼赛·维乍集瓦，外交部政治司司长哥颂·信瓦南达，总理军事副官方差洛·阿尼鲁一德瓦少将，泰国工业协会秘书长丹猜·干帕多，外交部礼宾司副司长沙提·沙提拉他耶，外交部政治司东亚处处长德·汶纳。（附图片）"},{"type":"paragraph","text":"中华人民共和国政府和泰王国政府联合公报七月一日在北京签字。中泰两国政府决定自即日起建立大使级的外交关系。"},{"type":"paragraph","text":"联合公报由周恩来总理和克立·巴莫总理签署。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"847ccf9dac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
