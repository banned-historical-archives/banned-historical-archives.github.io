art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"简评《毛泽东军事哲学思想初探》","authors":["董仲其"],"parts":[{"type":"paragraph","text":"近年，许多理论工作者以极大的热情从事毛泽东军事哲学思想的研究，取得了可喜的成果。刚刚问世的由高体乾、邓光荣合著的《毛泽东军事哲学思想初探》，就是众多成果之一。"},{"type":"paragraph","text":"《初探》对毛泽东军事哲学思想的定义、体系结构的主要内容，以及毛泽东军事哲学思想同毛泽东哲学思想、军事思想的关系等目前尚无一致看法的问题，进行了有意义的探讨。作者根据多年来研究的体会提出：“毛泽东军事哲学思想是马克思主义基本原理同中国革命具体实践相结合的中国革命战争经验的哲学概括和总结。”这一定义体现了逻辑和历史相统一的原则，具有概括性和科学性。作者指出：“毛泽东军事哲学思想是毛泽东哲学思想的组成部分，是毛泽东军事思想的最高层次、理论指导和方法论。”这就是说，毛泽东军事哲学思想相对于它的基础来讲，是哲学指导和方法论，相对于更高层次的哲学来讲，它又是有机的组成部分。这样理解三者的关系，在国内同类课题的研究中还属首次。"},{"type":"paragraph","text":"把毛泽东军事哲学思想的形成和发展同毛泽东哲学思想的形成发展紧密联系起来，认为前者对后者“起了重要的促进作用”，是《初探》的又一突出特点。该书还论证了毛泽东军事哲学思想是一个相对独立的体系，其逻辑起点和贯穿于全书的主线是实事求是。"},{"type":"paragraph","text":"要说缺陷，我认为该书所展开的结构体系基本上沿袭了现有的哲学体系结构。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c3bbecb52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
