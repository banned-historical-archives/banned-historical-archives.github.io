告的批示","authors":[],"dates":[{"year":1959,"month":1,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央转发河南省委关于浮肿病治疗情况报告的批示","type":"title"},{"text":"各省、市、自治区党委：","type":"appellation"},{"text":"现将河南省委关于浮肿病治疗情况的电话汇报转发给各地。去年秋季以来，劳动强度加大，加上生活管理不善，引起了浮肿病的发生。同时入冬以来，气候有些反常，很久不雨，过于干燥，也是发生各种病症的一个原因，如果在生活集体化的工作中不严加注意，就有出现大流行病的可能。请各地党委切实注意，并对全省地区进行一次检查，如发现流行性病症，即应组织力量迅速抢治。","type":"paragraph"},{"text":" 中央1959年1月10日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2882a3f321"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
