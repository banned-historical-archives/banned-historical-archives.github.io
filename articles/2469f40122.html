":[{"year":1980,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张西洛委员说"},{"type":"paragraph","text":"不能对左倾思想流毒丧失警惕"},{"type":"paragraph","text":"张西洛委员说，华国锋同志讲话中，有9处提到了左倾思想、左的倾向、左倾流毒等。我认为这是找到了当前障碍我们各项工作发展的要害。从1957年开始，二十多年来左倾思想越来越恶性发展，我们吃够了苦头。但是，对它的危害我以为并非所有同志都认识到了，它的流毒还在泛滥。比如，1 978年在经济工作中，左倾思想的流毒就有所表现；又如，去年报刊上断断续续开展的关于社会主义生产目的的讨论，也不断受着这种流毒的干扰。我们不能对林彪、江青、康生一伙散布的左倾思想流毒丧失警惕。现在，在干部中还有不少人把“文化大革命”中的各项政策当做正确的东西来执行，分不清是非界限。因此，继续肃清左倾思想的流毒，还是十分必要的。对林彪、“四人帮”组织上的残余也不能掉以轻心。希望中央下决心清除林彪、“四人帮”组织上的残余，绝不允许打砸抢分子还呆在一些领导工作岗位上。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2469f40122"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
