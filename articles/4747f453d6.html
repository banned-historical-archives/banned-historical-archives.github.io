rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的光辉哲学思想照亮病房","authors":[],"parts":[{"type":"paragraph","text":"广州部队某医院三所全体人员刻苦学习毛主席的哲学著作，学一点，用一点，使医疗工作取得了显著成绩。有一次，在抢救一位生命垂危的病人时遇到了复杂情况。病人有肺硬变、肺气肿等病，肺部还有新的炎症病变，情况危急。大家带着问题学习毛主席关于抓主要矛盾的教导，通过分析，认识到，当前主要病变在肺部，主要矛盾是支气管感染。他们立即对症下药，很快使病人转危为安。几个月来，他们还动用唯物辩证法正确认识防与治、大病与小病等关系，不但减轻了病人的痛苦，而且能使患者尽快恢复健康，返回战斗岗位。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4747f453d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
