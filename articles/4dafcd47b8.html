<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德勃雷法与法国极右势力","authors":["王芳"],"dates":[{"year":1997,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德勃雷法与法国极右势力"},{"type":"paragraph","text":"本报驻法国记者王芳"},{"type":"paragraph","text":"近来，围绕现任内政部长德勃雷提出的新移民法案，法国爆发一场全国性争论和社会风波，继２月２２日１０万人集会示威之后，３月９日再度掀起抗议浪潮。"},{"type":"paragraph","text":"去年１１月出台的德勃雷法，是在修改１９９３年帕斯卡移民法的基础上拟定的，目的在于强化控制和打击非法移民。该法案除个别措施放宽外，总体上较帕斯卡法更为严厉，不但加强了押解出境程序、身份证检查、行政扣留和建立指纹档案等规定，还严格了８０年代初建立的住房担保制度，要求为外国人提供住宿者向当地政府申请居住证明并在客人离去时进行申报。德勃雷法草案公布后，立即遭到非议。在２月议会修订进入二审的关键时刻，电影界带头发起了“不服从”运动，抵制该法案，仅仅几天工夫，抗议声势就蔓延到各行各业。"},{"type":"paragraph","text":"德勃雷法出台的原因，是法国东南部城市土伦的一次文化事件和维特罗尔的地方选举。２月２日，在极右国民阵线掌权的土伦，市长强行要求解散当地一家抵制极右势力的国家剧团，被激怒了的左翼文化界群起反对。一周后，在离土伦不远的维特罗尔市市长选举中，国民阵线候选人以５２．４８％的票数当选。此前，国民阵线已在一年多的时间里接连夺取３座城镇的市长职务，而以绝对多数票获胜这还是首次。这次选举预示了一个“危险的信号”，标志着极右势力正以令人担忧的势头扩展，并可能在一年后的立法选举中改变法国的政治版图。"},{"type":"paragraph","text":"在欧洲，法国极右势力的抬头是一个令人不安的现象。一些年来，国民阵线将经济持续不景气和社会不稳定归咎于移民，他们借口捍卫民族尊严和利益，宣扬反犹反移民思想，宣扬带有暴力倾向的种族歧视和排外情绪。他们主张在就业、住房、经商等方面，实施“法国人优先”政策，文化上则采取高压控制政策，煽动极端民族主义。这种种现象，引起法国社会广泛关注和高度警觉，抵制极右的呼声日高。在此背景下，德勃雷法出台，使抗议风波骤起，锋芒所向从最初的抨击住房担保条款，发展到整个移民法案，认为这个法案传播“勒庞精神”，“讨好极右”，舆论强烈要求撤消该法案。"},{"type":"paragraph","text":"这场争论反映了法国社会面对移民问题的复杂困惑心理和舆论对国家政治经济现状的不满与失望。法国的移民在欧洲并不是最多的，且移民人数在逐年减少，移民人口比例日趋稳定，但近年来法国一再紧缩移民政策。原因有二：一是东欧解体和边界开放后，非法移民呈上升之势。二是经济困难，失业率上升，政坛丑闻不断，社会缺乏安全感，几届政府都拿不出有效的解决办法，民众感到激烈的生存竞争和失业的严重威胁，严酷的现实与传统的人道价值观发生严重冲突。然而，值得注意的是，当文化界发动反德勃雷法风潮时，民意调查结果却表明，有逾２／３的法国人支持政府的这一严格管制移民的法律草案。"},{"type":"paragraph","text":"法国国民议会日前已二读通过德勃雷法，对最有争议的住房担保条款作了些许修改，但法案的强硬基调并没有改变。３月１１日，参议院将复审法案，立法程序处于决定性阶段。由德勃雷法引发的这场移民问题大论争，给法国社会留下了许多思考，并将影响今后一段时期的法国政治生活。（本报巴黎３月９日电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4dafcd47b8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
