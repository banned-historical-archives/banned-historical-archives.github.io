<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京地区经济理论工作者和实际工作者认为继续讨论生产目的问题十分必要需要总结包括粉碎“四人帮”到三中全会这段时间在内的经济建设经验，把“先生产，后生活”作为建设方针是不对的","authors":[],"dates":[{"year":1980,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十一月七日电　据《人民日报》、《光明日报》报道，北京地区一些经济理论和实际工作者认为，社会主义建设的目的是为了劳动人民的幸福，而在以往一个时期中，一讲社会主义是为了人，便扣上“人性论”的帽子，一概称之为修正主义。不把这样的问题讲清楚，生产目的性问题就不能真正得到解决。"},{"type":"paragraph","text":"这一观点是他们在十一月三日举行社会主义生产目的问题讨论会上提出来的。他们说，为了发展经济科学，推进经济工作，继续讨论社会主义生产目的问题十分必要。马克思主义经济学告诉我们，正如利润的生产是资本主义生产的根本属性一样，满足社会日益增长的物质和文化生活需要的生产，是社会主义生产的根本属性。这是事物的客观方面。从主观方面来说，生产目的是满足社会需要，这是在社会主义生产中负有各种领导责任的人，按照社会主义生产本性的要求，进行正确领导的实践方针。"},{"type":"paragraph","text":"在北京地区的部分经济理论工作者和经济工作者一百多人出席的这个讨论会上，于光远、宋涛、厉以宁、赵履宽、许毅、王榕、冯兰瑞、鲍思荣等先后发言，就宏观的社会主义生产目的问题、“先生产，后生活”问题以及社会主义基本经济规律的实现问题，进行了热烈的讨论。"},{"type":"paragraph","text":"他们在发言中分析了提出生产目的问题的历史背景，阐述了讨论生产目的问题的重要性。他们说，现在，重新讨论这个问题，是和继续调整国民经济的方针、当前正在进行的体制改革中提出的问题相结合的。生产目的的讨论是很好总结建国以来，包括总结粉碎“四人帮”到三中全会这一段时间内经济建设工作经验的需要。"},{"type":"paragraph","text":"大家认为，社会主义生产目的首先是一个宏观经济的问题。当然，讨论的深入一定会涉及企业的生产目的问题。讨论这个问题，对企业的管理者、经营者不致于忘记企业的社会主义性质，不致于迷失方向，是很重要的。"},{"type":"paragraph","text":"会上，对“先生产，后生活”问题进行了讨论。大家认为，把“先生产，后生活”作为国民经济建设方针，不仅在理论上站不住脚，在实践中也带来了极为有害的后果。发言者用大量的、具体的事实说明，“先生产，后生活”实际是“只顾生产，不顾人民生活”，“只要骨头不要肉”，不仅造成职工生活困难，使职工的劳动积极性受到挫伤，也给生产带来了严重的不利影响。"},{"type":"paragraph","text":"在讨论中，还谈了财政分配同社会主义生产目的的关系。发言者认为，近年来财政出现赤字，是和多年来我们对社会主义生产目的不明确紧密相关的。经济指导思想中的唯心主义导致了实践中的盲目生产、瞎指挥。以完成某几项指标和某些政治口号作为生产的目的，造成严重的浪费，其后果必然要在财政上表现出来。科学地运用财政分配这个重要的工具，把社会主义综合财政工作做好，对于调整好国民经济，实现社会主义生产目的，有着重要的意义。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"706e59ab15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
