tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"某部招待所是毛泽东思想宣传站组织来队家属学习毛主席著作受到热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"本报讯 空军某部招待所，坚持组织临时来队家属学习毛主席著作。这一做法受到家属们的热烈欢迎，她们说：解放军是毛泽东思想的大学校，我们来队探望亲人，要抓住这个机会好好学习毛主席著作。"},{"type":"paragraph","text":"招待所把来队家属编成小组，选出组长。小组长随缺随补，做到人换组不散。每天学习一小时，有几个人学几个人，雷打不动。讨论时，所里的同志参加，启发诱导。有不识字的家属，便分工专人进行帮助。有些家属学得比较好，所里还组织她们交流经验，向连队介绍心得体会。"},{"type":"paragraph","text":"来队家属学习了毛主席著作后，大大增强了劳动观念和集体主义思想。许多家属主动帮助招待所搞公共卫生，半年多时间就洗床单六百多条，有的还为战士缝洗衣服。她们说：白求恩是外国人，跑到中国来帮助抗日，我们到自己的部队来，做点事是应该的。通过学习，家属之间的阶级感情加强了，团结互助的好风气得到发扬。她们说：我们来自五湖四海，应当互相关心，互相帮助。有的家属病了，其他人便主动照料，并且帮助看管小孩。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f563b9dc7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
