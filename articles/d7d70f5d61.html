script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广东有没有经过奴隶社会?","authors":[],"dates":[{"year":1963,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广东历史学会考古工作者最近就广东有没有经过奴隶制社会展开了讨论。一种意见认为，广东历史上曾有过奴隶制社会；不过，与中原商代相比，广东地区的奴隶制是一种低级的、不发达的奴隶制，或者说是一种“部落联盟”的形式。主张这种意见的人们，在年代问题上，又有不同的看法。有人主张相当于中原的西周到春秋；但也有人主张在春秋、战国时期。"},{"type":"paragraph","text":"另一种意见认为，从目前材料看来，还不足以证明广东历史上存在过奴隶制社会。他们说，在特定的历史条件下，黎族社会很可能越过奴隶制社会发展阶段，由原始社会逐步地直接地过渡到封建社会。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7d70f5d61"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
