rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“学习毛主席著作的模范红九连”号召全军部队学习九连的榜样，进一步活学活用毛主席著作，创造更多的四好连队","authors":[],"parts":[{"type":"paragraph","text":"号召全军部队学习九连的榜样，进一步活学活用毛主席著作，创造更多的四好连队"},{"type":"paragraph","text":"本报讯 中华人民共和国国防部于七月二十四日发布命令，授予沈阳部队某团九连“学习毛主席著作的模范红九连”称号。"},{"type":"paragraph","text":"国防部命令说，某团九连自一九六○年以来，积极响应军委和林彪元帅“一定要把毛泽东思想真正学到手”的号召，长期坚持活学活用毛主席著作，以毛泽东思想为指针，加强连队建设，取得了显著成绩，特授予九连“学习毛主席著作的模范红九连”称号。希九连同志再接再厉，保持与发扬光荣。命令号召全军部队学习九连的榜样，为进一步活学活用毛主席著作，创造更多的四好连队而努力。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"053dc3f28f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
