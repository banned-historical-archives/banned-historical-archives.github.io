rs":[],"dates":[{"year":1948,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西北解放军各部上书毛主席"},{"type":"paragraph","text":"请求早日进军蒋管区  消灭蒋匪解放大西北"},{"type":"paragraph","text":"【新华社西北二十三日电】西北人民解放军经过两个多月的三查和练兵后，阶级觉悟普遍提高，士气高涨，纷纷上书毛主席和彭副总司令，请求早日下令向蒋管区进军，解放大西北人民。某部直属队日前召开进军蒋管区的誓师大会，全体指战员兴奋热烈的报告各人立功计划，并举行严肃的宣誓。另部某班在该部诉苦复仇请缨杀敌大会上，由正副班长率领宣读全班决心书："},{"type":"paragraph","text":"“我们人人下决心，自己私利都去尽。流血牺牲为百姓，团结起来闹革命。"},{"type":"paragraph","text":"要求上级下命令，出发最好在最近。一心上前杀蒋匪，蒋区穷人好翻身”。"},{"type":"paragraph","text":"某部八连在给毛主席的信上写着：“我们连里过去有二十人讨过饭吃，家里饿死人的有十一个，逃过难的有二十六个，逼卖儿女的有九个，为穷苦所迫母亲改嫁的有七个，被蒋匪抓去当兵的有三十一个，今天我们经过三查和练兵后，大家都一致要求打出去，替自己报仇，解放蒋管区的同胞。敬爱的毛主席，请你赶快下命令吧！我们一定坚决完成任务”。另部四连全体指战员本月八日举行公祭大会，公祭被蒋匪及地主迫害的战士家属和为革命事业忠勇牺牲的烈士们，灵台上贴着简朴有力的挽联：“为穷人闹翻身牺牲的同志们安息吧！我们坚决继承你们遗志，不消灭蒋贼心不死。”“冤有主债有头，屈磨死的爹娘们放心吧！枪杆子咱们已经拿到手，不报冤仇誓不休”。战士们在书上沉痛的控诉了蒋匪统治的黑暗，并在灵前激愤的宣誓为死者伸冤报仇，要求上级赶快下命令打到蒋管区去，消灭蒋胡卖国贼，早日解放尚未翻身的人民。各部队在进军的讨论中，战士们认真的提出到蒋管区作战应加强纪律和团结。某部十二连给毛主席的信中提到出去的七大保证中，特别说明坚决保护新区的工商业和公共建筑物。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5268f33d42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
