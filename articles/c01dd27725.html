uthors":["邱会作"],"dates":[{"year":1968,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"邱会作对新疆军区党委及建设兵团党委的三点指示","type":"title"},{"text":"邱会作","type":"authors"},{"text":"〖这是元月二十七日邱会作部长在王恩茂和张希钦作完第二次检查后，对新疆军区党委、兵团党委、7335部队党委所作的指示。〗","type":"appellation"},{"text":"目前最重要的是贯彻执行毛主席革命路线要忠于毛主席，要使毛主席革命路线在新疆贯彻下去：","type":"paragraph"},{"text":"一、认真地检讨，按林副主席指示，要在灵魂深处爆发革命，错了就改，改了就好了，保是保不住的。（越保越坏，越保越垮台）","type":"paragraph"},{"text":"二、打倒派性，派性是毒蛇，是大联合的凶恶敌人。（是文化大革命的凶恶敌人）","type":"paragraph"},{"text":"三、要用最敏锐的思想，在新疆要搞大联合，大联合是根本的方向，要拼死拼活地去抓。（大联合是文化大革命的利益，是中国人民的根本利益，是世界人民的根本利益）","type":"paragraph"},{"text":"（注）上面讲话材料摘录自新疆红二司政宣部办公室","type":"appellation"},{"text":" 一九六八年二月七日《关于拼死拼活狠抓大联合工作的通知》","type":"paragraph"}],"comments":[],"origin":"上面讲话材料摘录自新疆红二司政宣部办公室\n          一九六八年二月七日《关于拼死拼活狠抓大联合工作的通知》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邱会作","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c01dd27725"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
