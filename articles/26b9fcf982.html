:[{"year":1960,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朱德同志和邓小平同志欢宴丹共主席耶斯佩森"},{"type":"paragraph","text":"新华社24日讯　中共中央副主席朱德、总书记邓小平，今天中午设宴招待丹麦共产党主席耶斯佩森和耶斯佩森夫人，并且进行了亲切的会谈。"},{"type":"paragraph","text":"参加宴会和会谈的，还有政治局委员彭真、书记处书记王稼祥、候补书记刘澜涛、中央委员刘宁一以及中共中央机关负责工作人员李启新、张香山等人。"},{"type":"paragraph","text":"连日来，耶斯佩森同志一行在北京参观了国营北京第二棉纺织厂、二龙路人民公社、故宫博物院、民族文化宫，并看了市容，游览了颐和园。耶斯佩森同志一行已在今天去外地参观访问。（附图片）"},{"type":"paragraph","text":"朱德、邓小平宴请丹共主席克努德·耶斯佩森。右起第二人是克努德·耶斯佩森、第四人是克努德·耶斯佩森夫人。"},{"type":"paragraph","text":"新华社记者　李长永摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26b9fcf982"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
