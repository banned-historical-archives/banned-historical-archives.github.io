ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"目前我党方针是拉蒋抗战","alias":"","parts":[{"type":"paragraph","text":"目前我党方针是拉蒋抗战]"},{"type":"paragraph","text":"（1941年6月12日）朱，陈、罗，黎、罗："},{"type":"paragraph","text":"据报：我一一五D六八六R及东进队一部曾于号日向仁和庄一带之张师王团进攻，我某某二团及沂蒙支队约二千，皓日向青沙湖唐家林一带常师蒙旅进攻，又一部约三千敬日向陈庄某家城新三十六D进攻，我许、鱼、彭等部约五千分向开城某山屋基一带赵师进攻等情。是否有此等事，请查复。目前我党方针在拉蒋抗战。我军应坚持党中央“人不犯我，我不犯人，人若犯我，我必自卫”的原则。如有此种进攻行动，希即停止。并告彭、左，陈，刘\"。"},{"type":"paragraph","text":"毛朱王叶"},{"type":"paragraph","text":"六月文"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、王稼祥、叶剑英给朱瑞、陈光、罗荣桓、黎玉、罗舜初的电报。"},{"type":"paragraph","text":"[2]即一一五师六八六团。[3]指新三十六师。[4]许，指许世友。鱼，不知是指谁，疑原抄件有误。彭，指彭嘉庆。[5]指彭德怀、左权，陈毅，刘少奇。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":132,"page_end":132},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b6effc31a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
