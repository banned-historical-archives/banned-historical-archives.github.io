ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"七律·改鲁迅诗","alias":"","parts":[{"type":"paragraph","text":"七律·改鲁迅诗"},{"type":"paragraph","text":"（1961年）曾惊秋肃临天下，竞遣春温上舌端。3尘海苍茫沉百感，金风萧瑟走高官。喜攀飞翼回通身暖，苦坠空云口半截寒。悚听自吹皆圣绩，"},{"type":"paragraph","text":"起看敌焰正阑干"},{"type":"paragraph","text":"[1]鲁迅（1881—1936），浙江绍兴人。原名周树人，字豫才。鲁迅诗即《亥年残秋偶作》。"},{"type":"paragraph","text":"[2]秋肃，秋天草木凋零的肃杀凄凉景象。临天下，降临天下。[3]春温，春天的温暖。上，这里是流露的意思。舌端，指语言。"},{"type":"paragraph","text":"[4]尘海，尘世如海，指广大的人世间。苍茫，旷远迷茫。沉，浸沉、沉没。百感，各种各样的感慨。沉百感，无数感慨，沉埋心底。"},{"type":"paragraph","text":"[5]金风，秋风。我国古代以阴阳五行（金、木、水、火、土）解释季节的变化。秋天属金，故秋风称金风。走，跑的意思。高官，大官。走高官，为“高官走”的倒装。"},{"type":"paragraph","text":"[6]飞翼，飞鸟。[7]空云，空中云端。[8]阑干，横斜的样子。"}],"authors":["毛泽东"],"dates":[{"year":1961}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":534,"page_end":534},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb4940a188"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
