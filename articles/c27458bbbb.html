art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是巴勒斯坦革命的指路明灯巴人民决心走武装斗争道路，决不同美帝和以色列“和平共处”","authors":[],"parts":[{"type":"paragraph","text":"据新华社十四日讯 在“巴勒斯坦日”前夕，巴勒斯坦解放组织驻北京办事处主任加尔布接见本社记者，介绍了巴勒斯坦人民斗争的情况。加尔布强调说，毛泽东思想已经成为世界人民进行革命斗争的强大思想武器。巴勒斯坦人民和军队正努力学习毛泽东思想，因为他们认为毛泽东思想是指导巴勒斯坦人民进行革命斗争的指路明灯。"},{"type":"paragraph","text":"加尔布在谈话中说，毛主席教导说，“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要的问题。”毛主席还教导说，必须分清主要的矛盾和次要的矛盾。按照毛主席的教导，我们找到了我们的主要敌人，这就是美帝国主义；以色列只不过是美帝国主义侵略阿拉伯国家的一个基地。他说，当人民了解了他们的敌人以后，他们就会和敌人进行斗争，直至取得胜利。"},{"type":"paragraph","text":"他说，巴勒斯坦人民从斗争实践中认识到，巴勒斯坦人民要取得斗争的胜利，唯一的途径是要靠武装斗争。他说，巴勒斯坦人民在成立自己的解放组织以后，就建立了自己的军队。毛主席在他的著作中阐述了人民战争的理论。我们就是信奉武装斗争，信奉人民战争。"},{"type":"paragraph","text":"他说，我们认为，革命的思想是进行革命斗争的基础，假若人民没有用革命思想武装起来，就不能说我们的力量已经够了。因为决定战争胜负的是人，而不是武器。正因为如此，巴勒斯坦人民和军队，现在正在学习毛主席著作。"},{"type":"paragraph","text":"加尔布指出，一些大国相信同帝国主义“和平共处”，他们不要革命，不希望革命。但是巴勒斯坦人民是要革命的，他们决不会同帝国主义和以色列“和平共处”，不管付出多少代价，巴勒斯坦人民都要斗争到底。"},{"type":"paragraph","text":"加尔布表示感谢中国人民给予巴靳斯坦人民的援助。他说，巴勒斯坦人民对中国人民、中国政府、中国共产党和毛主席怀着深切的敬仰。"},{"type":"paragraph","text":"加尔布满怀信心地说，我们相信毛泽东思想的巨大威力，相信人民的力量是不可战胜的。巴靳斯坦人民的革命事业一定会取得胜利，因为我们的斗争是正义的。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c27458bbbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
