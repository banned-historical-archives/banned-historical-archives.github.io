script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时左派刊物《光明》热情赞扬中共八届十二中全会公报  欢呼中国文化大革命取得辉煌胜利  强调文化大革命敲响修正主义者的丧钟，吓破了他们的胆","authors":[],"dates":[{"year":1968,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时左派刊物《光明》热情赞扬中共八届十二中全会公报"},{"type":"paragraph","text":"欢呼中国文化大革命取得辉煌胜利"},{"type":"paragraph","text":"强调文化大革命敲响修正主义者的丧钟，吓破了他们的胆"},{"type":"paragraph","text":"新华社九日讯　比利时左派刊物《光明》周刊不久前发表文章，欢呼中国共产党第八届扩大的第十二次中央委员会全会公报的发表，热情赞扬中国无产阶级文化大革命在我们的伟大领袖毛主席的领导下取得了辉煌胜利。"},{"type":"paragraph","text":"文章说：“生活和战斗在比利时的马克思列宁主义者非常重视中国共产党第八届扩大的第十二次中央委员会全会公报的发表。”"},{"type":"paragraph","text":"文章指出：在苏联，修正主义者能够背叛十月革命和社会主义，这对我们来说，是迫使我们经常研究的一个问题。中国的无产阶级文化大革命对这个问题作出了恰当的回答。文章赞扬这次革命赢得了惊人的胜利，无产阶级专政得到了加强，资产阶级及其代言人的阴谋被粉碎了。现在，除了尚被美帝国主义者占领的台湾以外，中国各地都建立了革命委员会。"},{"type":"paragraph","text":"文章强调指出：中国共产党是一个建立在马克思列宁主义理论基础上的革命党。经过这场无产阶级文化大革命，中国共产党更加纯洁了，那些反革命修正主义分子则被清除了。这伙人当中的头号人物刘少奇作为人民的敌人，被永远清除出党，这是一件好事。"},{"type":"paragraph","text":"文章写道：“无产阶级文化大革命的胜利，使各种各样的修正主义分子吓破了胆，这是很容易理解的，因为文化大革命给他们敲响了丧钟。”"},{"type":"paragraph","text":"文章最后说：“透彻了解马克思列宁主义、毛泽东思想，认真学习共产主义的经典著作，加强马克思列宁主义的党，这是每个革命者的义务。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e322605cf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
