<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在王震、王兆国等同志护送下叶剑英同志灵骨移送到广州赵紫阳、杨尚昆、胡启立、余秋里、田纪云、李鹏等到机场送灵","authors":[],"dates":[{"year":1986,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社广州十月三十一日电　伟大的无产阶级革命家、政治家、军事家叶剑英同志的灵骨，在中共中央顾问委员会副主任王震，中共中央书记处书记王兆国，叶剑英同志的子女、亲属，治丧办公室有关人员和叶剑英同志生前身边工作人员的护送下，今天上午由专机从北京移送广州安放。"},{"type":"paragraph","text":"到机场送灵的有:中共中央政治局常委、国务院总理赵紫阳，中共中央政治局委员、中央军委常务副主席杨尚昆，中共中央政治局委员、书记处书记胡启立，中共中央政治局委员、书记处书记、人民解放军总政治部主任余秋里，中共中央政治局委员、书记处书记、国务院副总理田纪云，中共中央政治局委员、书记处书记、国务院副总理李鹏，中央顾问委员会常委李德生，全国人大常委会副委员长彭冲、荣毅仁，中央军委副秘书长洪学智，全国政协副主席杨成武等。"},{"type":"paragraph","text":"今天，机场上下了半旗。覆盖着中国共产党党旗的叶剑英同志的灵骨盒和遗像，在人民解放军礼兵护送下，由叶剑英同志的亲属叶选平、叶选宁、叶选廉等捧到机场时，军乐队奏哀乐。赵紫阳等同志和排列在舷梯两旁的党政军各界同志，向叶剑英同志的灵骨行礼致敬。"},{"type":"paragraph","text":"上午十一时许，移送叶剑英同志灵骨的专机降落在广州白云机场。当叶剑英同志的灵骨在王震、王兆国等同志和他的子女们护送下飞机时，军乐队奏起哀乐，迎灵队伍肃立默哀。随后，叶剑英同志的灵骨由迎灵队伍护送到广州农民运动讲习所旧址。"},{"type":"paragraph","text":"叶剑英同志的灵骨暂时停放在广州农民运动讲习所旧址，待墓园修好后再移到广州市红花岗广州起义烈士陵园安放。在广州农民运动讲习所旧址设有叶剑英同志的灵堂，供人们吊唁。"},{"type":"paragraph","text":"\u003cIMG alt=请插入8号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1986\\11\\86B1010501.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e刘玉生\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e十月三十一日，叶剑英同志的灵骨在王震、王兆国等同志和他的子女们的护送下，由专机从北京运到广州。　新华社记者　刘玉生　摄　(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王震","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ae0e76e31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
