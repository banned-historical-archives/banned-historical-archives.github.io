art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国文化大革命是社会主义革命大跃进日本朋友说红卫兵是完全可以信赖的革命接班人","authors":[],"parts":[{"type":"paragraph","text":"据新华社伦敦二十八日电 在中华人民共和国建国十七周年前夕，住在伦敦的英国、非洲和拉丁美洲进步人士对新华社记者发表谈话，热烈赞扬毛主席领导的无产阶级文化大革命。"},{"type":"paragraph","text":"阿扎尼亚泛非大会驻伦敦副代表易卜拉欣对新华社记者说：全世界一切革命人民都为中国的无产阶级文化大革命而欢呼，因为这是对帝国主义及其同谋者的又一打击。他说：“对我们阿扎尼亚革命群众说来，文化革命是世界革命不会被出卖的保证。”"},{"type":"paragraph","text":"英国朋友、一九三六年西班牙内战时期国际纵队的老战士图德·哈特说：“毛泽东领导着全世界。毛泽东思想改变着世界。”他说：中国“文化大革命是社会主义革命的大跃进。”"},{"type":"paragraph","text":"伦敦大学的西里尔·奥福德教授也说：“毛泽东思想在目前情况下赋予马克思列宁主义以新的生命。”他强调中国无产阶级文化大革命的重大意义说，为了取得社会主义的彻底胜利，这是一场十分重要的革命，因为“仅仅改变社会的经济基础是不够的，还必须改变人们的思想。”"},{"type":"paragraph","text":"据新华社二十九日讯 东京消息：中国的无产阶级文化大革命在日本人民心中引起了强烈的反响。"},{"type":"paragraph","text":"不久前访华归来的东京都教职员工会的竹本良美说，“中国的无产阶级文化大革命是革命发展的必然结果，是革命的群众运动”。"},{"type":"paragraph","text":"东京都立台东商业高等学校教师森干夫说：“朝气勃勃的中国青年们、红卫兵们满怀信心地活跃在文化大革命运动中，给了我最强烈的印象”。他说：“在读了中国共产党中央委员会公布的（关于无产阶级文化大革命的）十六条以后，越发感到，由于相信群众和放手发动群众而形成的革命的群众运动，培养了无数完全可以信赖的革命接班人”。"},{"type":"paragraph","text":"正在争取访华参加第二届日中青年友好大联欢的大坂日中友好学院代表团团长小林良雄说，毛主席亲自领导的中国文化大革命和红卫兵的革命行动，是为了在中国挖掉修正主义的根子。只有工人阶级当家作主之后进行不断革命，才能保证国家永不变色。他说，“我们从学习雷锋事迹中，越发感到毛泽东思想的伟大。”"},{"type":"paragraph","text":"日中友好协会山口县联合会下关分会的相见佳孝说，“中国无产阶级文化大革命好得很”，“这次文化大革命的确是触及人们灵魂的大革命，这只有今天的社会主义中国，才能做到”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a10a3f282b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
