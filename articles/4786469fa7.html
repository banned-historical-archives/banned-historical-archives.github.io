script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"关于华北作战的补充意见","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1937,"month":10,"day":6}],"parts":[{"text":"关于华北作战的补充意见","type":"title"},{"type":"appellation","text":"周、朱、彭并告林、聂："},{"type":"paragraph","text":"关于作战问题之补充意见："},{"type":"paragraph","text":"甲、程潜放弃石家庄、集中兵力守太行山山地是正确的，但敌占石家庄后将向西面进攻，故龙泉关、娘子关两点须集结重兵，实行坚守，以使主力在太原以北取得胜利。在右翼除朱怀冰外尚有些什么兵力，能达到坚守任务否？"},{"type":"paragraph","text":"乙、进入山西之敌，判断总数似不过两师半。为保卫晋北已经占领之数十县，至少分散一个师，则攻太原者似至多不过一师半。雁门关以南又须沿途分兵守备，则达忻口一带作战者，似将不过一个师左右，已处于我三面包围中。如果龙泉关、娘子关能坚守一个月，又如果我方部署适当，则以我方兵力数量与质量计算，有可能暂时破坏敌之攻击计划。因为我方兵力数量在十五万以上，红军与卫立煌军在质量上可为晋北战役之领导者，山西军已处最后关头，将不得不打一仗。"},{"type":"paragraph","text":"丙、此战役之关键在于下列三点：（1）娘子关、龙泉关之坚守。（2）正面忻口地区之守备与出击（出击是主要的）。（3）敌后方之破坏。"},{"type":"paragraph","text":"丁、为达上述目的："},{"type":"paragraph","text":"（1）要求南京速加派生力军三四个师位于娘子关。"},{"type":"paragraph","text":"（2）要求卫军四个师担任正面出击兵团之主力，晋军以两个师协助出击，余任守备。（3）红军林、贺两师主力，担任从东西两方破坏敌之侧后纵深地区。另要求南京派生力军两个师从涞源、蔚县行动。"},{"type":"paragraph","text":"戊、为此目的，我一一五师主力不但不应出河北，亦不宜位于龙泉关，似应第一步移至豆村、台怀之线，以便适时袭击大营、沙河、繁峙线，并准备于可能与必要时，北越长城出至浑源、应县，以此为中心，分为若干支队，采取夜间行动，袭击雁门大同线、大同张家口线之铁路，袭击张家口广灵线、广灵代县线之汽车路。一一五师这一行动（如再加南京两个师更好），配合贺师主力在左云、右玉、平鲁、朔县之行动，将引起山西敌军正面攻击之停顿，甚至暂时部分的后退，并将引起平汉线敌军停止深入石家庄以南，而采取以一部守备北平、石家庄线，以另一部转向灵、涞、广、蔚地区对付我军。在一一五师本身，则因转移与作战频繁，要准备付出相当之代价，即应准备减员二千至二千五百，并因减员而不得不将枪支一小部分交与地方民众，武装他们。但在支持山西作战，即用以支持华北作战较为长久之战略目的上，却有很大意义。"},{"type":"paragraph","text":"己、因此，在经过你们的详细考虑后，如果基本上同意此方针，便请执行下列步骤：（1）要求程、阎确定龙泉关、娘子关新增守备兵力是何部何人，何时到达，保证东面之安全。（2）要求程、阎派二个师出恒山北段。"},{"type":"paragraph","text":"（3）要求程、阎补充我军步枪三千至三千五百支，机关枪三十至三十五挺，并允许补充新兵五千至七千人。"},{"type":"paragraph","text":"（4）一一五师之教导营应开至太原为中心之地区，实行扩红，不要开到河北去，因为到那里扩红是靠不住的；骑兵营应随主力行动。总部及贺师亦应派人去太原地区扩红。"},{"type":"paragraph","text":"（5）刘师主力或全部使用于正太路，发动群众，配合娘子关守军，巩固后路。"},{"type":"paragraph","text":"庚、以上意见请详加考虑电复。"},{"type":"paragraph","text":"此电写完，接朱、彭本日六时电，我们意见已根本一致，但不知林、聂尚有不同意见否？又向阎、程建议，要求他们十分注意秘密，他们部署最好不用无线电，否则是十分危险的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六日一时"}],"comment_pivots":[{"part_idx":1,"offset":5,"index":1},{"part_idx":1,"offset":10,"index":2},{"part_idx":3,"offset":4,"index":3},{"part_idx":3,"offset":81,"index":4},{"part_idx":4,"offset":175,"index":5},{"part_idx":8,"offset":48,"index":6},{"part_idx":9,"offset":258,"index":7},{"part_idx":10,"offset":45,"index":8},{"part_idx":13,"offset":5,"index":9}],"is_range_date":false,"authors":["毛泽东"],"comments":["周，指周恩来。朱，指朱德。彭，指彭德怀，当时任八路军副总司令。","林、聂，指林彪、聂荣臻，当时分别任八路军第一一五师师长和副师长。","程潜（一八八二——一九六八），湖南醴陵人。当时任国民党政府军事委员会参谋总长、第一战区代司令长官。","朱怀冰（一八九二——一九六八），湖北黄冈（今黄州市）人。当时任国民党军第九十四师师长。","卫立煌，当时任国民党军第十四集团军总司令。","指林彪任师长的八路军第一一五师和贺龙任师长的八路军第一二○师。","指山西的灵丘、广灵和河北的涞源、蔚县。","阎，指阎锡山，当时任国民党军第二战区司令长官。","指刘伯承任师长的八路军第一二九师。"],"page_start":46,"page_end":48,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4786469fa7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
