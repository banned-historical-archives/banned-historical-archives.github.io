ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1941年12月20日）"},{"type":"paragraph","text":"国民党反共后，我们提出荫蔽精干的政策，精干是小而精，荫蔽是要求公开合法，但都做得不好。过去我们荫蔽精干、长期埋伏、积蓄力量、以待时机的方针口号是提出了，但没有具体的组织防法。国民党统治区的工作，主要是秘密问题、公开合法问题与领方法问题。决定草案认为过去组织不巩固，这种估计不好。过去发展党的组织是对的，不能说庞大无力。我们不可能设想绝对巩固的党，因为世界上没有绝对巩固的东西，而只是我党工作做得好些，能适应社会环境，就会巩固些。党的组织要达到精干的目的，不完全在于党员的社会地位的高低，党的组织只是上层不见得是精。我们在国民党区域战略上是退却，总方针是保护自己，但在战裘上要有进有退。关于领导方式，对下层组织我们应少管，应指示他们要保存力量，少死人，多交友，发挥其独立性和创造性。[1这是毛泽东在中共中央政治局会议上关于陕西国民党区域党的组织"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":12,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":331,"page_end":331},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a26b71828"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
