script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平会见舒尔茨时说中国只能走社会主义道路 一定要有稳定的政治局面在建设四化过程中都存在反对资产阶级自由化问题，不能搞运动，基本方法是进行教育","authors":["柴世宽"],"dates":[{"year":1987,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京3月3日电　(记者柴世宽)中共中央顾问委员会主任邓小平今天上午在人民大会堂会见美国国务卿乔治·舒尔茨，宾主就共同感兴趣的问题进行了一个小时的友好谈话。"},{"type":"paragraph","text":"邓小平在谈到中国情况时说，有两条是重要的:第一，中国只能走社会主义道路。在中国这样一个有10亿人口的大国，资本主义肯定是行不通的。第二，要搞社会主义现代化，要使中国摆脱落后状态，没有稳定的政治局面是不行的。我们一定要有一个稳定的政治局面，有秩序地进行社会主义现代化建设。这些问题，十一届三中全会以来我们一直这样讲，从来没有变过。我们的既定政策不会变。实行了八年、行之有效的政策，为什么要变呢?"},{"type":"paragraph","text":"在谈到反对资产阶级自由化问题时，邓小平对客人说，我们不搞运动。在建设四个现代化过程中，都存在反对资产阶级自由化的问题，这是个长期的事情。既然是长期的，就不能搞运动，我们的基本方法是进行教育。"},{"type":"paragraph","text":"舒尔茨对邓小平介绍的情况表示感谢。他说，美国是重视同中国的关系的。"},{"type":"paragraph","text":"邓小平说，这好。我们双方在这一点上想法一致。"},{"type":"paragraph","text":"会见开始时，舒尔茨转交了里根总统给邓小平的信。"},{"type":"paragraph","text":"邓小平对此表示感谢。他说，我知道，里根总统最近遇到了一些小的麻烦。一个国家的事情，搞政治，总会遇到一些麻烦。我们不是也遇到了一些麻烦吗?我相信美国朋友对此也会持谅解态度。现在，我们的麻烦已经过去了。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baf8e32f01"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
