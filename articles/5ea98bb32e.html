script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宣扬资产阶级腐朽堕落思想(读者来信之三十)","authors":["应青"],"dates":[{"year":1952,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们校中过去有一位语文教师经常在课上散播资产阶级腐化堕落思想，宣传封建意识。他讲课时专门喜欢谈女人，老是乱扯，什么女人的脸儿是怎样怎样的漂亮，女人的姿势是怎样怎样的风雅。他把这些大加形容，甚至把许多黄色书刊上的荒淫无耻的内容也乱七八糟的搬到课堂上来讲。"},{"type":"paragraph","text":"有一次，讲到怎样树立仇视、鄙视、蔑视美帝的心理时，同学们感到对美帝恨是恨的，可是鄙视不起来；总认为美国一切都不好，就是科学还“不错”。这时，这位先生就联系“实际”来解释了，他说:“我们要怎样来鄙视美帝呢?就拿我来说吧:我以前也是有崇美思想的，总觉得美国东西好，上次我到扬州开会，经过上海时，还特地赶去看‘出水芙蓉’，跑了好几家电影院才看到。现在想起来实在是不应该去看的；为什么不应该呢，因为虽然这里面有许多色情的成分，她们在那里快乐的游泳也使我羡慕，但继而一想，像我这样的人能跳下去和她们一起游泳吗?我就仇视美国了。……很明显的，他之所以认为不应该去看美国电影，仅仅是因为他不能和她们一起游泳，不能‘享受’这种美国的生活方式。”"},{"type":"paragraph","text":"镇压反革命运动开展以后，在谈到青年应如何对待反革命父亲的问题时，这位先生又说:“如果父亲是反革命分子被政府镇压了，我们青年应该站稳立场，但是在感情上感到很伤心这是必然的，因为父子之情是任何人都有的。”他又举了一个例子来说:“有一个人说:“如果我父亲是反革命分子而被枪毙了，我的心动都不动。”说这种话的人简直是畜牲，哪一个人没有父子感情呢?连这一点感情都没有还能算人吗?”很明显，这种荒谬的论调是不值一驳的。"},{"type":"paragraph","text":"事实说明一个教师，他若不改造思想，不把自己头脑里的资产阶级思想清除，即传地主观上想教好学生，但却由不得他作主，无形中，那些可怕的坏思想会从他的头脑中跑进学生的头脑中去，损害了学生的思想健康。"},{"type":"paragraph","text":"苏北南通中学　应青"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ea98bb32e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
