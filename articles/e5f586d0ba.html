art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席，我们永远忠于您！","authors":["守卫天安门战士徐政辉"],"parts":[{"type":"paragraph","text":"看了大型彩色纪录影片《毛主席是我们心中的红太阳》，我的心情万分激动。宽大的银幕上，红日东升，光芒万丈，我们最最敬爱的伟大领袖毛主席出现在天安门上，向群众招手致意。这时，天安门广场上雷鸣般的掌声响彻云霄。我忘记了自己是在看电影，就像去年国庆节那天我站在金水桥边一样，使劲地鼓掌，纵情地欢呼。特别是看了毛主席走过金水桥，到群众中间来了的激动人心的场面，我激动得热泪盈眶，一次又一次地在心里欢呼：“毛主席万岁！毛主席万万岁！”"},{"type":"paragraph","text":"最最敬爱的毛主席，您亲自发动和领导的无产阶级文化大革命，其势迅猛异常，锐不可挡，取得了极其伟大的胜利。您一次又一次地来到革命群众中间，永远和革命群众心连着心。您为全世界马克思列宁主义者树立了最伟大最光辉的榜样。“天大地大不如党的恩情大，爹亲娘亲不如毛主席亲”。就是用森林当笔，海水当墨，蓝天当纸，也写不尽您的英明伟大，也写不尽我们对您的无限热爱，无限信仰，无限崇拜，无限忠诚。"},{"type":"paragraph","text":"可是，党内最大的走资本主义道路的当权派，披着“老革命”的外衣，与国内外牛鬼蛇神相呼应，极其恶毒地反对我们心中的红太阳毛主席，反对伟大的毛泽东思想，反对以毛主席为代表的无产阶级革命路线。十七年来，他在政治、经济、教育、文艺等各方面放了大量的毒。一九六二年，他再次抛出大毒草《修养》，闭口不谈阶级斗争，闭口不谈无产阶级专政。在这次无产阶级文化大革命中，他又勾结另一个党内最大的走资本主义道路的当权派，提出和推行了资产阶级反动路线，和毛主席的无产阶级革命路线相对抗。他妄图把光明的新中国重新拉回黑暗的旧社会，在中国实行资本主义复辟，把我们往火坑里推，把中国人民重新送进剥削者的魔掌，居心何其毒也！我们坚决不答应！谁反对毛主席，谁反对毛泽东思想，谁就是我们的死敌！党内最大的走资本主义道路的当权派，干尽了反毛泽东思想的坏事，我们一定要彻底清算他的罪行。"},{"type":"paragraph","text":"我们革命战士向毛主席庄严宣誓：一定要高举无产阶级的革命的批判旗帜，舍得一身剐，敢把党内最大的走资本主义道路的当权派拉下马！把他批深批透，叫他靠边站！为了保卫毛主席，捍卫光焰无际的毛泽东思想，捍卫以毛主席为代表的无产阶级革命路线，我们刀山敢上，火海敢闯！誓把毛泽东思想伟大红旗插遍全中国，插遍全世界！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5f586d0ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
