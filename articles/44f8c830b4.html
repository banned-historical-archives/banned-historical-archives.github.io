"year":1978,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"三宅正一副议长等日本朋友在杭州访问"},{"type":"paragraph","text":"据新华社杭州十一月十七日电　正在这里访问的日本众议院副议长三宅正一等日本朋友今天在泛舟西湖的时候，向本社记者畅谈了日中友谊发展的广阔前景。"},{"type":"paragraph","text":"三宅正一副议长说，邓小平副总理对日本的短暂访问，大大加强了日本人民对中国的亲近感。我们这次访华正是为了表达日本国民的深切谢意。我们在北京受到了十分亲切热情的接待，我们为此深受感动，并将同中国朋友一起为发展日中友好而共同努力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44f8c830b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
