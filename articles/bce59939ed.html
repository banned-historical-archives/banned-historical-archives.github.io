<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"与西贡纺织工人反迫害反剥削斗争相呼应南越各地工人奋起斗争南越劳协号召展开强大运动坚决反对美帝及其走狗","authors":[],"dates":[{"year":1964,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社河内29日电】　据越南南方解放通讯社报道，在西贡“越南纺织厂”工人展开反迫害、反剥削斗争的同时，南越各地各行业的工人为要求增加工资和年终补助金相继展开了斗争。"},{"type":"paragraph","text":"报道说，南越铁路工人的七百五十名代表一月十九日召开特别会议，要求改善生活条件，并且谴责仍然受到新傀儡政权重用的吴庭艳家族的特务。“越南航空公司”五百名工人和“越南新闻社”一百二十多名工人向经理部门提交建议书，要求增加工资。过去被美国一吴庭艳集团强迫加入“工人战斗队”以致成为残废的工人也要求西贡当局赔偿损失。南越中部水电部门五百名工人也为要求春节补助费展开斗争。"},{"type":"paragraph","text":"与此同时，西贡、新安、嘉定等地的不少小型纺织厂工人和美国资本家开办的一些汽油公司工人以及汽车工人等，也相继举行各种形式的斗争，要求增加工资和年终补助金。"},{"type":"paragraph","text":"据报道，在这以前，一些企业工人的斗争取得了初步成果。埃苏汽油公司三百名工人一月初迫使美国资本家增加了百分之五·八到百分之二十一的工资。宁顺省一家橄榄厂的三百多名工人，从去年十二月二十六日到二十八日进行斗争，终于迫使厂主召回被解雇的十二名工人，并接受不得克扣工人工资的要求。"},{"type":"paragraph","text":"【新华社河内29日电】　据越南南方解放电台广播，越南南方劳动解放协会二十六日发表一项号召书，号召南越工人和劳动人民支持西贡“越南纺织厂”工人的斗争，坚决反对美帝国主义及其走狗的血腥罪行。"},{"type":"paragraph","text":"号召书号召南越各城市和各庄园的工人展开一次广泛而强大的运动，向美国及其走狗提出如下要求:满足“越南纺织厂”工人的要求；给死难者家属和受伤工人以适当的赔偿；停止镇压和逮捕；恢复被捕者的自由；承认他们的法西斯行动是反民主和反人民的行动；惩办制造一月十七日惨案的主谋者。"},{"type":"paragraph","text":"号召书说，越南南方劳动解放协会中央委员会十分钦佩和无限同情“越南纺织厂”工人弟兄的英勇斗争，同时热烈欢迎西贡一堤岸地区工人和劳动人民及时和踊跃地支持这次斗争。"},{"type":"paragraph","text":"劳动解放协会在号召书中代表南越工人和劳动人民向世界工会联合会和国际工会支援南越工人和人民委员会控诉美国及其走狗的血腥罪行，并提请它们把这个事件通知各国工会组织和全世界劳动人民。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bce59939ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
