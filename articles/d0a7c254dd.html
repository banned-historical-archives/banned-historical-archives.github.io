art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见拉丁美洲十二国外宾","authors":["侯波/张彬"],"parts":[{"type":"paragraph","text":"新华社30日讯 毛泽东主席和周恩来总理今天下午接见了正在我国访问的拉丁美洲十二个国家的外宾，并且同他们进行了亲切的谈话。"},{"type":"paragraph","text":"接见时，在场的有陈毅副总理。"},{"type":"paragraph","text":"被接见的外宾是来自古巴、阿根廷、玻利维亚、巴西、哥伦比亚、多米尼加、英属圭亚那、海地、墨西哥、巴拿马、萨尔瓦多、厄瓜多尔等十二个国家的党派、学生、工会、新闻、作家以及其他方面的代表团的代表。"},{"type":"paragraph","text":"接见时，在场的还有中华全国总工会副主席刘长胜，中国共产主义青年团中央书记处第一书记胡耀邦，对外文化联络委员会副主任张致祥，中国拉丁美洲友好协会副会长周而复，中华全国新闻工作者协会书记处书记李炳泉，中华全国学生联合会主席胡启立等。"},{"type":"paragraph","text":"侯波/张彬"},{"type":"paragraph","text":"毛泽东主席和周恩来总理接见拉丁美洲十二个国家外宾时合影。 新华社记者 侯波、张彬摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0a7c254dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
