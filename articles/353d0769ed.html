<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市幼小教革命派誓师迎接新学期战斗任务争当教育革命的闯将 誓作打倒派性的模范各区掀起全面落实毛主席最新指示，深入开展教育革命的比学赶帮热潮","authors":[],"dates":[{"year":1968,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了迎接新学期的战斗任务，夺取无产阶级文化大革命的全面胜利，本市幼儿园、小学的无产阶级革命派昨天举行高举毛泽东思想伟大红旗，全面落实毛主席最新指示誓师大会。"},{"type":"paragraph","text":"在战无不胜的毛泽东思想指引下，本市幼儿园、小学的无产阶级文化大革命形势一派大好，而且越来越好。全市幼儿园、小学在去年九月份已经基本上实现了革命的大联合。今年春节前后，又出现了建立革命三结合临时权力机构的高潮。截至二月十三日止，据本市十个区的初步统计，百分之八十的单位已建立了革命委员会，其中黄浦、虹口、徐汇等区所有小学都成立了革命委员会。目前，各区、县、学校都在大办毛泽东思想学习班，以“斗私，批修”为纲，巩固和发展革命的大联合和革命的三结合，发动广大革命师生员工深入开展教育革命。"},{"type":"paragraph","text":"虹口区天镇路小学革命委员会的代表在会上介绍了该校成立革命委员会前后大办毛泽东思想学习班，巩固和发展革命大联合的经验；"},{"type":"paragraph","text":"杨浦区隆昌路第二小学革命委员会代表介绍了该校革命群众组织负责人斗私批修，改造世界观，促进思想革命化的体会。上海县梅陇辅导区革命委员会的代表介绍了这个地区大办毛泽东思想学习班，打倒派性，揪出破坏无产阶级文化大革命的黑手的经验。黄浦区厦门路小学的两个红小兵也在会上发言，联系思想实际，谈自己克服无政府主义的体会。"},{"type":"paragraph","text":"市革命委员会领导成员到会讲了话。他说:革命的教工担负着培养青少年一代成为无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的革命路线的无产阶级革命事业接班人的光荣任务。他要求幼儿园、小学的无产阶级革命派在新学期中要把活学活用毛主席著作放在首要地位，大办毛泽东思想学习班，树立革命的学风，做心口如一的无产阶级革命派；要打倒资产阶级、小资产阶级派性，巩固和发展革命的大联合、三结合。幼小数革命群众组织要把工作的重点放在区里，把工作的基点放在学校里。在打倒派性的同时，还要打倒无政府主义。无产阶级革命派要成为加强革命性、科学性、组织纪律性的模范，要成为打倒派性、增强党性的模范，要做执行党的政策的模范。"},{"type":"paragraph","text":"市革委会领导成员在讲话中最后强调幼小教的革命派要争做教育革命的闯将。要认真学习和贯彻毛主席关于教育革命的最高指示，坚持把教育革命进行到底，克服自满情绪，夺取教育革命的更大胜利。要在光芒四射的毛泽东思想照耀下，为全面落实毛主席的最新指示立新功。"},{"type":"paragraph","text":"昨天大会上还出现了区与区之间落实毛主席最新指示，深入开展教育革命的比学赶帮热潮。"},{"type":"paragraph","text":"这次大会是由市革命委员会教卫组、市教育局革命委员会和上海市幼小教革命造反联合总部联合召开的。出席大会的有全市革命教工近二万人。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"353d0769ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
