:1978,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马科斯总统接见李强部长"},{"type":"paragraph","text":"据新华社马尼拉十二月九日电 菲律宾总统费尔南德·埃·马科斯和夫人伊梅尔达·马科斯十二月八日在碧瑶接见了中国外贸部长李强和夫人魏环图及其一行。"},{"type":"paragraph","text":"接见时在座的有：菲律宾贸易部长特罗阿迪奥·基亚松、工业部长维森特·帕特尔诺。中国驻菲律宾大使陈辛仁也在座。"},{"type":"paragraph","text":"马科斯同李强和其他中国客人进行了友好的谈话，并请李强转达他对华国锋主席、叶剑英委员长、邓小平和李先念副总理的问候。马科斯总统还说，菲律宾和全世界都在关注着中国现代化的进程。"},{"type":"paragraph","text":"中国外贸部长李强一行应菲律宾政府的邀请，于十二月七日下午到达马尼拉，对菲律宾共和国进行友好访问。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4d748d186"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
