rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席给我们指出了前进的方向和道路“东方红”战斗队和《体育战报》小将们决心更好地读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士","authors":[],"parts":[{"type":"paragraph","text":"二十五日晚上，当这些十六、七岁的小将听到中央人民广播电台广播这个消息的时候，大家兴奋地奔走相告，互传喜讯。"},{"type":"paragraph","text":"小将们说，我们最最敬爱的伟大领袖毛主席无微不至的关怀革命青少年，最最支持我们革命派。我们太幸福了！今天，我们好像又看到了毛主席他老人家在天安门上向我们招手。听到《红旗》杂志的短评和《人民日报》的编者按，就像听到了毛主席亲切的声音，就像毛主席在我们的身旁。"},{"type":"paragraph","text":"小将们说：毛主席这样关怀我们，我们一定听毛主席的话。我们坚决开门整风，决不遮遮掩掩，决不做自己头脑中资产阶级思想的“保皇派”。"},{"type":"paragraph","text":"《体育战报》编辑组的小将们说：我们听到这个喜讯，我们的心飞到了北京。我们《体育战报》宣传毛泽东思想还很不够，我们今后一定要更加努力地学习毛泽东思想，更热情地宣传毛泽东思想，更勇敢地捍卫毛泽东思想，力争为伟大的无产阶级文化大革命作出更大的贡献。"},{"type":"paragraph","text":"我们伟大领袖毛主席教导说：“整风就是全党通过批评和自我批评来学习马克思主义。在整风中间，我们一定可以更多地学到一些马克思主义。”毛主席的教导使小将们更加懂得了整风的深远意义，更增强了自觉整风的信心和决心。他们说：我们坚决按毛主席所教导的那样去做，通过批评和自我批评，活学活用毛主席著作，把自己锻炼得更加坚强，使自己在政治上更快地成长起来，做毛主席的好战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"433b889c10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
