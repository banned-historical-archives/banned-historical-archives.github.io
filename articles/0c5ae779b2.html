<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"毛泽东等祝贺越南民主共和国成立十九周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺越南民主共和国"},{"type":"paragraph","text":"成立十九周年的电报！"},{"type":"paragraph","text":"（1964年9月1日）河内越南劳动党中央委员会主席、越南民主共和国主席胡志明同志，越南民主共和国国会常务委员会主席长征同志，越南民主共和国政府总理范文同同志："},{"type":"paragraph","text":"在越南民主共和国成立十九周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府，向兄弟的越南人民、越南劳动党和越南民主共和国政府致以最热烈的祝贺。"},{"type":"paragraph","text":"一年来，勤劳勇敢的越南人民在越南劳动党和胡志明主席的正确领导下，在社会主义改造和社会主义建设事业中取得了巨大的成就。现在兄弟的越南人民正以自力更生的革命精神，在越南劳动党第三次代表大会决议的光辉照耀下，为胜利完成宏伟的第一个五年计划而奋斗。中国人民为越南兄弟所取得的每项成就感到欢欣鼓"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国主席刘少奇、全国人民代表大会常务委员会委员长朱德、国务院总理周恩来联名给越南劳动党中央委员会主席、越南民主共和国主席胡志明，越南民主共和国国会常务委员会主席长征，越南民主共和国总理范文同的电报。祝贺越南民主共和国成立十九周年。毛泽东全集第四十七卷舞，并祝越南兄弟取得新的、更大的成就。"},{"type":"paragraph","text":"越南民主共和国政府一贯奉行和平外交政策，坚决反对美帝国主义的侵略政策和战争政策，积极支持被压迫民族和被压迫人民的革命斗争，对维护东南亚和世界和平作出了重要的贡献。越南民主共和国政府一贯严格遵守一九五四年日内瓦协议，为争取祖国的和平统一进行了坚持不懈的斗争。"},{"type":"paragraph","text":"最近，美帝国主义对越南民主共和国发动的武装侵犯，是一个蓄谋已久的扩大印度支那战争的挑畔行动。但是，在反对帝国主义和殖民主义斗争中久经考验的越南人民是吓不倒的。英雄的越南人民以坚决的行动，对美国侵略者进行了有力的回击，取得了重大的胜利。美帝国主义必须对它侵略越南民主共和国的严重罪行负责。它欠越南人民的这笔血债是一定要偿还的。美帝国主义既然采取了扩大印度支那战争的步骤，它就不能期望越南民主共和国放弃反侵略的行动权利，也不能期望一切爱好和平的国家和人民放弃支援越南民主共和国反侵略的行动权利。正义完全在越南民主共和国一边。中国人民坚信，兄弟的越南人民在全世界一切爱好和平人民的支持下，一定能够粉碎美国侵略者的战争挑畔和一切阴谋诡计。越南南方人民为反对美帝国主义及其走狗的血腥统治而进行的武装自卫斗争，一定会取得最后胜利。越南人民和平统一祖国的民族愿望一定能够实现。"},{"type":"paragraph","text":"中国和越南是唇齿相依，患难与共的亲密邻邦。中国人民十分珍视中越两国间日益巩固和发展的伟大团结和战斗友谊。中国人民将永远同越南人民团结在一起，高举马克思列宁主义和无产阶级国际主义的旗帜，坚决反对帝国主义和现代修正主义，为世界和平、民族解放、人民民主和社会主义的新胜利而共同奋斗。"},{"type":"paragraph","text":"毛泽东等祝贺越南民主共和国成立十九周年的电报祝中越两国人民的战斗友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六四年九月一日"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":125,"page_end":127},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c5ae779b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
