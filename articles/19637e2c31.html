art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"西方资产阶级记者笔下的美帝纸老虎","authors":[],"parts":[{"type":"paragraph","text":"哀叹主动权转到“越共”手上"},{"type":"paragraph","text":"英国《每日邮报》发自西贡的一篇报道描绘了美国侵略军被南越军民打得丧魂失魄的狼狈相。这家报纸说：美国军队“已经被打得晕头转向，胆战心惊，垂头丧气”。他们整日提心吊胆，害怕人民解放武装力量的战士不定什么时候就出现在自己周围。一个美国士兵在精神紧张的状态下不禁发出绝望的呼喊：“我们这样能够坚持多久？”"},{"type":"paragraph","text":"这家报纸不得不承认，美国的侵越战争“已经输掉了。主动权已经转到了越共（指人民解放武装力量）手上”。它还说，美国“这次丢脸的影响是无法估计的”。"},{"type":"paragraph","text":"讽刺约翰逊惶惶不可终日"},{"type":"paragraph","text":"美国的《国际先驱论坛报》透露：美国总统约翰逊由于被美国侵略军的惨败弄得焦急万状，竟不得不手忙脚乱地亲自“指挥”南越的溪山战役。他不仅心神不安地阅读电报和文件，而且用电话直接同侵越美军头目威斯特摩兰联系，“甚至同更接近战斗地区的他的一些部下直接谈话”，同时又“不断去五角大楼（美国国防部）同高级司令部商量”。英国《每日快报》也讽刺约翰逊由于把很大一笔赌注放在溪山而陷于惶惶不可终日的窘态。"},{"type":"paragraph","text":"要求撤换威斯特摩兰"},{"type":"paragraph","text":"一些美国报纸还埋怨威斯特摩兰谎报军情，连吃败仗，甚至要求撤换他。《华盛顿邮报》十日写道：威斯特摩兰说局势“非常、非常令人鼓舞”，而事实是，局势“并不是令人鼓舞的”。这家报纸还忧心忡忡地承认，美国这样一个“大国”被一个“小国缠住了，实际上是击败了”，“终于成了败军之将”，因而“大失面子”，这在美国的“欧洲盟国中也引起了不安”。"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19637e2c31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
