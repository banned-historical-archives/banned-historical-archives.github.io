{"year":1952,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的复信给鞍山钢厂职工以极大鼓舞"},{"type":"paragraph","text":"【新华社鞍山十八日电】国营鞍山钢铁公司炼钢厂全体职工在十七日晚接到毛主席祝贺他们在平炉炼钢生产上的新成就并勉励他们明年炼好优质钢的回信后，职工们都纷纷奔走相告。现场上腾起了一片欢呼声。宣传员们在深夜用红色大字写出毛主席的来信，上夜班的工人们，有的在高声朗诵，有的来不及看完就欢乐得跳了起来，有的在午夜奔告各个现场工人兄弟。炼钢厂马厂长对这个光荣的成就首先感谢苏联专家的无私帮助，专家紧紧握着他们的手，也以同样兴奋的心情向他们致贺。十八日马厂长给鞍钢各兄弟厂写了报喜信，说：“这不仅是炼钢厂的光荣，也是全鞍钢工人同志们的光荣。感谢大家对炼钢厂的大力支援！”为了以实际行动回答毛主席对他们的嘉勉，全厂五十多名技术人员上午举行技术研究会，具体制订了改进技术的措施计划，要进一步和工人密切结合，为国家炼出更多质量优良的钢。下午全厂职工举行了职工代表会议，大家一致认为：炼钢厂能有这样新的成就，是由于毛主席和中国共产党的英明领导，光荣是属于毛主席和中国共产党的。代表们在会上以批评和自我批评的精神，总结了自十一月十一日到十二月十七日三十七天中的生产竞赛，找出了改进炼钢工作的努力方向。会议决定再进一步提高增产计划。炼钢厂已于十二月十日提前完成了全年生产计划，他们现决定到年底以前再为国家增产等于全年计划百分之五点七的钢。在新的鼓舞下，他们又提出了：还要增产等于全年任务百分之二的钢。此外，他们还坚决表示：要执行毛主席的指示，在一九五三年努力完成生产优质钢的任务，以支援全国大规模的经济建设。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d081582651"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
