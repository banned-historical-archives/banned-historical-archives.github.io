":[{"year":1949,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石家庄市“二七”纪念大会"},{"type":"paragraph","text":"致电毛主席致敬！"},{"type":"paragraph","text":"石家庄市全体职工“二七”二十六周年纪念大会发表致中共中央毛主席通电略称："},{"type":"paragraph","text":"我们今天能够以愉快胜利的心情来纪念“二七”，更加感到党与我们工人阶级血肉的联系，及毛主席对于我们领导的正确。现在，在全国快要胜利的今天，我们石家庄市全体职工坚决拥护毛主席的八项和平条件，反对卖国反动政府的虚伪和平。我们清楚的认识，只有将革命进行到底，才能使工人阶级与全国人民得到彻底解放，今天我们谨向党的中央，毛主席致敬，并在你的领导下为真正的和平与人民民主的新中国而奋斗。"},{"type":"paragraph","text":"致朱总司令转人民解放军全体指战员电略称："},{"type":"paragraph","text":"二十六年前中国工人阶级还没有自己的武装，今天我们不仅有了强大精锐的武装，而且在力量的对比上取得空前的优势，保证中国人民将要在全国范围内取得胜利。这是总司令英明领导和全体指战员英勇奋战的结果。我们除向总司令及全体指战员同志致革命的敬礼外，并愿加紧生产支援人民解放军，为全国的解放而努力！"},{"type":"paragraph","text":"致北平、天津、张家口、丰台、长辛店、唐山及各新解放城市的职工弟兄们电略称："},{"type":"paragraph","text":"你们虽在敌伪统治下受尽压迫和痛苦。但职工弟兄始终坚持着中国工人阶级的革命传统，斗争从未停息，你们冒着最大危险保护工厂、铁路、矿山不受敌人破坏，解放后又努力为恢复生产，支援前线而艰苦斗争。"},{"type":"paragraph","text":"对于你们这种革命的精神，我们全市职工特致兄弟的慰问与敬礼，并希今后为全国的最后解放及新中国的建设共同努力！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f68230b5b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
