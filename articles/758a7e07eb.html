script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在上海人民欢迎柬埔寨国家元首诺罗敦·西哈努克亲王的大会上  张春桥同志的欢迎词","authors":[],"dates":[{"year":1971,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在上海人民欢迎柬埔寨国家元首诺罗敦·西哈努克亲王的大会上"},{"type":"paragraph","text":"张春桥同志的欢迎词"},{"type":"paragraph","text":"新华社上海二十二日电　张春桥同志在上海人民欢迎柬埔寨国家元首诺罗敦·西哈努克亲王和夫人大会上的欢迎词，全文如下：尊敬的柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，尊敬的柬埔寨贵宾们，同志们，朋友们："},{"type":"paragraph","text":"上海人民满怀着对柬埔寨人民团结战斗的情谊，今天在这里隆重集会，热烈欢迎柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人。我代表上海市革命委员会、中国人民解放军驻上海部队和上海一千万人民向尊敬的柬埔寨国家元首、柬埔寨人民敬爱的领袖诺罗敦·西哈努克亲王和夫人，致以最崇高的敬意！向以西哈努克亲王为首的柬埔寨民族统一阵线和王国民族团结政府，致以最崇高的敬意！向英勇战斗在抗美救国战争前线的柬埔寨爱国军民，致以最崇高的敬意！"},{"type":"paragraph","text":"柬埔寨国家元首诺罗敦·西哈努克亲王是中国人民伟大的朋友。西哈努克亲王曾经多次访问我国，为发展中柬两国的传统友谊做出了伟大贡献。我们上海人民感到极其光荣的是，西哈努克亲王在一九五六年和一九六三年曾经两次访问上海。当时的情景，至今深刻地留在上海人民的记忆中。这一次，正当柬埔寨人民抗美救国战争不断取得新的胜利，印度支那三国和全世界人民反美斗争不断取得新的胜利的时候，西哈努克亲王又一次来到上海，给了上海人民极大的光荣、极大的鼓舞。"},{"type":"paragraph","text":"我们上海人民同全中国人民一样，一向敬佩具有反帝斗争光荣传统的柬埔寨人民。长时期来，柬埔寨人民在国家元首诺罗敦·西哈努克亲王领导下，为捍卫民族独立、维护国家主权和领土完整，同美帝国主义及其走狗进行了英勇顽强的斗争，取得了一个又一个胜利。去年三月十八日，美帝国主义策动了朗诺—施里玛达的反动政变，并且武装入侵柬埔寨，妄想扭转柬埔寨的发展道路。但是，历史发展的规律是任何力量也改变不了的。倒行逆施的美帝国主义，搬起石头砸了自己的脚。面对美帝及其走狗的武装侵略，英雄的柬埔寨人民热烈响应国家元首西哈努克亲王的庄严号召，拿起武器，奋起抗战，高举印度支那人民最高级会议的战斗旗帜，同越南人民、老挝人民紧密团结，并肩战斗。在不到一年的时间里，用枪杆子打出了一片大好形势，打得美国侵略者及其走狗狼狈不堪，打得朗诺—施里玛达卖国集团龟缩金边，处于风雨飘摇之中。最近，柬埔寨军民在各条战线接连打了许多胜仗，捷报传来，上海人民十分振奋。我们非常敬佩柬埔寨军民，他们用英勇的战斗，为全世界被压迫民族和被压迫人民的反侵略斗争树立了又一个光辉榜样。我们向西哈努克亲王和夫人，向柬埔寨贵宾们，表示衷心的祝贺，并预祝柬埔寨人民抗美救国战争取得新的更大的胜利！"},{"type":"paragraph","text":"尊敬的贵宾们，同志们，朋友们：侵略成性的美帝国主义，决不甘心自己的失败，目前正在印度支那进行一场新的军事冒险。侵略元凶尼克松悍然出动大量美伪军入侵老挝，同时强化对越南南方和柬埔寨的侵略战争，加紧轰炸越南北方，阴谋策划对越南民主共和国发动突然袭击。美帝国主义扩大侵略的罪行，不仅是对印度支那三国人民的严重挑衅，也是对中国人民和全世界人民的严重挑衅。我们的伟大领袖毛主席在去年五月二十日的庄严声明中指出：“目前，在世界范围内，正出现一个反对美帝国主义斗争的新高潮。”美帝国主义在印度支那扩大侵略的滔天罪行，只能推动这个高潮汹涌向前，使美国侵略者淹没在全世界人民的反美怒涛中。"},{"type":"paragraph","text":"柬埔寨国家元首诺罗敦·西哈努克亲王早已庄严宣告：“我们的人民，柬埔寨民族统一阵线，王国民族团结政府及其民族解放军，现在和将来都将坚持斗争，决不后退，决不妥协，直至高棉祖国从我国的、美国的、西贡的和曼谷的压迫者手中完全获得解放，直至他们同兄弟的老挝人民和越南人民一起把美帝国主义者及其仆从和走狗从整个我们印度支那统统赶出去。”最近，西哈努克亲王同越南民主共和国孙德胜主席、老挝爱国战线党主席苏发努冯亲王分别进行了会晤，并先后于一九七一年二月八日和九日发表联合声明，强烈谴责美帝国主义扩大侵略印度支那的战争，重申印度支那三国人民彻底打败美帝国主义及其走狗的坚强决心。对此，中华人民共和国政府在一九七一年二月十二日发表声明，表示最坚决的支持。上海人民举行了数十万人的示威游行，拥护我国政府的声明。我们坚信：印度支那三国人民紧密团结，互相支援，坚持持久的人民战争，一定能够彻底打败美国侵略者，取得抗美救国战争的彻底胜利。"},{"type":"paragraph","text":"尊敬的诺罗敦·西哈努克亲王和夫人，尊敬的柬埔寨贵宾们，同志们，朋友们：上海曾经是一个长期被帝国主义侵略、奴役的城市。这就使上海人民更加深刻地懂得：中国人民和柬埔寨人民是休戚与共的亲密战友。在反对美帝国主义的共同斗争中，我们始终互相同情，互相支持。在今天这个庄严的大会上，处在印度支那三国抗美救国战争后方的上海人民，再一次表示我们的决心：我们坚决遵循伟大领袖毛主席的教导，用抓革命、促生产、促工作、促战备的实际行动，更好地完成支援前线的各项任务。不管出现多大的风浪，我们同全国人民一样，永远同柬埔寨人民、老挝人民、越南人民团结在一起，战斗在一起，胜利在一起，直到印度支那三国人民的抗美救国战争取得彻底的胜利。"},{"type":"paragraph","text":"让我们再一次向尊敬的柬埔寨国家元首诺罗敦·西哈努克亲王和夫人，向尊敬的柬埔寨贵宾们表示最热烈的欢迎和崇高的敬意！向巍然屹立在反美斗争前线、英勇奋战的兄弟的柬埔寨人民致敬！衷心祝愿柬埔寨战友在抗美救国战争中不断取得新的更大的胜利！"},{"type":"paragraph","text":"全世界人民团结起来，打败美国侵略者及其一切走狗！"},{"type":"paragraph","text":"美帝国主义必败！印度支那三国人民必胜！"},{"type":"paragraph","text":"中柬两国人民的伟大友谊和战斗团结万岁！"},{"type":"paragraph","text":"西哈努克亲王万岁！"},{"type":"paragraph","text":"毛主席万岁！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"758a7e07eb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
