[{"year":1950,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京八日电】　五月九日为捷克斯洛伐克解放五周年纪念日，毛泽东主席和周恩来部长分别致电捷克斯洛伐克共和国哥特瓦尔德总统和外交部西罗基部长，表示祝贺。两电电文如下:"},{"type":"paragraph","text":"(一)毛主席致哥特瓦尔德总统电"},{"type":"paragraph","text":"哥特瓦尔德总统阁下:"},{"type":"paragraph","text":"我代表中华人民共和中央人民政府及中国人民，值此捷克斯洛伐克解放五周年之际，谨向阁下及捷克斯洛伐克人民致热烈的祝贺，并祝捷克斯洛伐克共和国在阁下领导下日益繁荣壮大。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东一九五零年五月三日于北京(二)周部长致西罗基部长电"},{"type":"paragraph","text":"西罗基部长阁下:欣逢捷克斯洛伐克解放五周年之际，我热诚祝贺捷克斯洛伐克人民的幸福与进步。"},{"type":"paragraph","text":"中华人民共和国中央人民政府外交部部长周恩来一九五零年五月三日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c32ce2c6c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
