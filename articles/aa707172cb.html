定县邮电局长马振青停职交代问题","authors":[],"dates":[{"year":1982,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"汕头地区邮电局调查组包庇走私犯打击揭发者"},{"type":"paragraph","text":"汕头地委决定于百惠公开检讨"},{"type":"paragraph","text":"潮阳县委决定县邮电局长马振青停职交代问题"},{"type":"paragraph","text":"本报讯　去年冬，本报曾收到署名“众职工”的来信，揭发广东省潮阳县邮电局局长马振青利用职权，包庇其在司马浦邮电支局当包裹封发员兼检查员的儿子收寄走私物品。该局工人、共产党员庄惜英向《南方日报》写信反映了同一问题。《人民日报》、《南方日报》在内部刊物上刊登了这两封信，引起有关方面重视，并转请汕头地区邮电局调查处理。据2月28日《南方日报》报道，汕头地区邮电局领导人及该局董维俭副局长带领的调查组，竟违反党的原则，制造了一宗压制、打击揭发人庄惜英同志的严重事件。他们把揭发人庄惜英当作“被告”，严加追问。为了收集所谓的“诬告材料”，竟逐一追问曾向庄惜英提供过情况的职工。在不容庄惜英申辩的情况下，就匆匆做出结论，说揭发人庄惜英抱个人目的，不顾事实，无中生有，说他诬陷潮阳县邮电局局长，是极其错误的，并决定对庄惜英的“错误”，“开展必要的思想斗争”，“给予严肃处理”。"},{"type":"paragraph","text":"《南方日报》为此派记者进行了调查。尽管地区邮电局调查组施加种种压力，但县邮电局有些职工还是写了有力的证明材料。县邮电局一位副局长证实：1981年5月初，马振青的儿子趁支局领导不在，仅在一天半的时间内，就突击收寄包裹314件，并抢先截车运走，经检查未运走的84件中就有20多件是走私包裹。事实说明，庄惜英揭发的问题，是有根据的，决不是什么无中生有。"},{"type":"paragraph","text":"《南方日报》的“记者调查”指出：汕头地区邮电局调查组，公然违反处理群众来信的原则，向被揭发人公开揭发人的姓名和材料，甚至让被揭发人参加研究处理揭发人，致使马振青的气焰更加嚣张。人们不禁要问：汕头地区邮电局领导人及其派出的调查组为什么对潮阳县邮电局局长要百般庇护？其中原因，值得深思。"},{"type":"paragraph","text":"汕头地委和潮阳县委十分重视，已分别作出决定：汕头地区邮电局局长于百惠公开检讨，待查清问题后再作处理；马振青停职交代问题。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa707172cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
