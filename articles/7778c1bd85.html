tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛泽东思想战胜帝修反又一个毛泽东思想学习小组在智利建立","authors":[],"parts":[{"type":"paragraph","text":"随着战无不胜的毛泽东思想在拉丁美洲日益广泛的传播，最近，又一个毛泽东思想学习小组在智利首都圣地亚哥建立。"},{"type":"paragraph","text":"这个学习小组的成员已经开始活动，他们表示非常愿意深入学习毛泽东思想，并学会在实践中运用伟大的毛泽东思想。他们一致认为，不管哪一国人民，只要他们反对帝国主义、反动派和现代修正主义，他们就必须学会掌握和运用毛泽东思想，因为毛泽东思想是在帝国主义走向全面崩溃，社会主义走向全世界胜利的时代的马克思列宁主义。"},{"type":"paragraph","text":"这个学习小组将每周进行一次集体学习，学习内容有“老三篇”和毛主席的其他著作。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7778c1bd85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
