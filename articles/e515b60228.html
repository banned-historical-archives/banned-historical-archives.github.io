" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"文化部关于控制戏曲艺人乱收徒弟以免发展个人名利思想的通知","authors":[],"dates":[{"year":1963,"month":6,"day":26}],"is_range_date":false,"parts":[{"text":"文化部关于控制戏曲艺人乱收徒弟以免发展个人名利思想的通知","type":"title"},{"text":"各省、市、自治区文化局（厅）：","type":"appellation"},{"text":"近几年来，各地戏曲剧团，都重视对第二代的培养工作，安排了一些有条件的青年演员向老艺人拜师学艺。有些老艺人出于爱护传统艺术，使其得以继承、发展的心情，都以认真的态度进行教艺，因此在培养第二代方面，取得了良好的成绩。在他们之间的关系上，由于剧团注意对他们进行政治思想工作，使他们互相尊重，形成了一种尊师爱徒的新的“师徒”关系。这种培养第二代的作法，今后仍是应当提倡的。但是，也出现了另外的情况：有的旧艺人，根本没有更多的时间和精力教艺，但为了追求个人名利到处收徒，不但在本剧种，甚至扩大到其他剧种广收“门徒”，借以提高个人威信，企图广为建立封建的师徒关系；有人自称要三千弟子满天下。而有些演员拜师，也不是为了学艺深造，只是虚图其名，以贴标签为荣，目的在于提高自己的“身价”。对于这样一类拜师收徒与错误思想和做法，有的文化部门，不但不加以注意，反为其举行排场宏大的仪式，请客送礼，并在报纸上大加宣传，给社会留下不良影响。为此，我部通知各地，今后拜师收徒，必须强调实际教学效果，以少而精为原则，不能徒负虚名，拜师方式必须简单朴素，切忌大摆排场。对某些艺人借“收徒”之名，壮大个人声势，发展个人名利思想，变成一种封建主义的活动，请予严加控制。","type":"paragraph"},{"text":"抄送：中宣部、国务院文教办公室、中国戏曲学院、戏曲学校、京剧院","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"文化部关于控制戏曲艺人乱收徒弟以免发展个人名利思想的通知","authors":[],"dates":[{"year":1963,"month":6,"day":26}],"is_range_date":false,"parts":[{"text":"文化部关于控制戏曲艺人乱收徒弟以免发展个人名利思想的通知","type":"title"},{"text":"各省、市、自治区文化局（厅）：","type":"appellation"},{"text":"近几年来，各地戏曲剧团，都重视对第二代的培养工作，安排了一些有条件的青年演员向老艺人拜师学艺。有些老艺人出于爱护传统艺术，使其得以继承、发展的心情，都以认真的态度进行教艺，因此在培养第二代方面，取得了良好的成绩。在他们之间的关系上，由于剧团注意对他们进行政治思想工作，使他们互相尊重，形成了一种尊师爱徒的新的“师徒”关系。这种培养第二代的作法，今后仍是应当提倡的。但是，也出现了另外的情况：有的旧艺人，根本没有更多的时间和精力教艺，但为了追求个人名利到处收徒，不但在本剧种，甚至扩大到其他剧种广收“门徒”，借以提高个人威信，企图广为建立封建的师徒关系；有人自称要三千弟子满天下。而有些演员拜师，也不是为了学艺深造，只是虚图其名，以贴标签为荣，目的在于提高自己的“身价”。对于这样一类拜师收徒的错误思想和做法，有的文化部门，不但不加以注意，反为其举行排场宏大的仪式，请客送礼，并在报纸上大加宣传，给社会留下不良影响。为此，我部通知各地，今后拜师收徒，必须强调实际教学效果，以少而精为原则，不能徒负虚名，拜师方式必须简单朴素，切忌大摆排场。对某些
