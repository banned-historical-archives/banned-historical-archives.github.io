r":1970,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"当前，各条战线都在狠抓意识形态领域的阶级斗争，狠狠打击资产阶级思想的进攻。但是，在我们街道里弄，却有些居民认为地区里家庭妇女多，不识字的多，老年和儿童多，“这件事同地区一不搭界”，这是一种错误思想，应该纠正。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们:“被推翻了的资产阶级采用各种方法，企图利用文艺阵地，作为腐蚀群众、准备资本主义复辟的温床。”正当我们深入开展革命大批判，对“四条汉子”进行猛烈开火的时刻，在我们街道北汪里弄就有一个坚持反动立场的反革命分子家属，用剥削阶级极端腐朽、反动的思想来毒害和腐蚀青少年，还搞伤风败俗的丑恶勾当。有一天深夜，被里弄巡逻值班人员发现了，当即制止，并对他们进行了批判，狠狠地刹了这股歪风。"},{"type":"paragraph","text":"在另几条里弄里，我们也发现一些从外地倒流回来，长期不回去抓革命促生产的人，公然与革命样板戏相对抗，搞什么“地下音乐会”，演奏封、资、修的腐朽没落的音乐，竭力用资产阶级思想毒害群众，腐蚀人们灵魂。"},{"type":"paragraph","text":"意识形态领域里的斗争是一场你死我活的阶级斗争。难道象以上的事实，在街道里弄里是偶然的吗?事实一再证明:资产阶级和一切剥削阶级的腐朽意识形态，总是要利用我们一些同志对思想文化战线阶级斗争的严重形势缺乏认识这个弱点，利用一部分人头脑里的旧思想，向无产阶级进攻。这是每个革命同志需要引起高度重视的事，千万不能丧失警惕呵!"},{"type":"paragraph","text":"长宁区江苏街道"},{"type":"paragraph","text":"一革命群众"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a478c43a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
