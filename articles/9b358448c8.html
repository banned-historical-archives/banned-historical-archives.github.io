script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"智共主席向智共中央作报告时指出  必须揭穿南共纲领的骗人鬼话  它的修正主义说教企图掩盖美帝国主义的侵略性质","authors":[],"dates":[{"year":1958,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"智共主席向智共中央作报告时指出"},{"type":"paragraph","text":"必须揭穿南共纲领的骗人鬼话"},{"type":"paragraph","text":"它的修正主义说教企图掩盖美帝国主义的侵略性质"},{"type":"paragraph","text":"新华社4日讯　圣地亚哥消息：智利共产党机关报“世纪报”副刊“方针”6月6日刊载了智利共产党主席埃利阿斯·拉斐尔特向智利共产党中央二十八次全体会议所作关于召开智利共产党第十一次代表大会的报告。这个报告批判了南斯拉夫共产主义者联盟领导人的修正主义立场。"},{"type":"paragraph","text":"拉斐尔特在报告中说：帝国主义正在影响工人阶级的某些部分，使他们离开世界社会主义和共产主义运动。这就是修正主义的主要根源。从这里产生了伯恩斯坦的修正主义，他在十九世纪末叶否认资本主义的必然崩溃，认为已不会再有什么无产阶级的贫困化，同时劝告工人阶级把自己局限于进行经济斗争而放弃革命的目标。从这里也产生了考茨基和希弗亭的修正主义，他们美化帝国主义的垄断组织，说什么垄断组织正在向社会主义进化，同时又反对刚刚诞生的苏联。他们主张阶级和平，从而帮助帝国主义镇压工人运动。从这里也产生了南斯拉夫领导人的修正主义，他们抨击共产主义运动和社会主义阵营的团结，掩盖美帝国主义的侵略性质，并企图把帝国主义国家描写为阶级斗争中的中立者。"},{"type":"paragraph","text":"拉斐尔特说：我们智利共产党人受过雷卡巴伦（编者按：雷卡巴伦是智利共产党创始人之一）无产阶级国际主义精神的教育。一切事实都向我们证明，修正主义的主张是反科学的，是同现实背道而驰的。既然我们大家都尝到过1947年在宣称某一日期就要打第三次世界大战的同时所发动的镇压，那末怎么能够向我们说美帝国主义不是近年来世界外交上侵略和战争的因素呢？当丘基卡马达、波特雷里约斯和塞韦耳（编者按：都是智利的地名）等地的无产阶级和整个国民经济都饱尝了垄断组织的掠夺行为和它的政策的味道的时候，我们怎么能够相信所谓垄断组织向社会主义进化的鬼话呢？当我们看到法国右翼社会党领袖们和殖民主义军事势力进行不光彩的妥协的后果以及法国无产阶级因此要用多大气力去堵塞法西斯道路（而这只是许多类似的实例之一）的时候，我们怎么能怀疑帝国主义国家的阶级性呢？正是因为这样，所以我们认识到了南斯拉夫共产主义者联盟在它的最近的第七次代表大会上所通过的纲领中的各种修正主义说教的欺骗性，这些修正主义的说教得到全世界资产阶级宣传的同声赞扬和大力鼓吹。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b358448c8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
