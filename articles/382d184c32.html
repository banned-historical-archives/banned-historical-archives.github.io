":[],"dates":[{"year":1981,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"致公党座谈叶剑英委员长的谈话"},{"type":"paragraph","text":"希望国共再次合作为祖国统一作贡献"},{"type":"paragraph","text":"新华社北京10月2日电 致公党主席黄鼎臣1日在谈到叶剑英委员长9月30日发表的谈话时说，中国共产党和人民政府对台湾回归祖国、实现和平统一的方针政策具体明确，既符合国家民族的根本利益，又照顾到台湾的现实，合情合理。他希望国民党当局很好地总结历史经验，以国家民族利益为重，对叶委员长的建议作出积极的响应。"},{"type":"paragraph","text":"致公党在京中央委员和北京市委员会委员于1日上午举行座谈会，讨论叶剑英委员长的谈话。大家认为，叶委员长的谈话篇幅不长，但内容丰富、词恳意切，把话说到了每个阶层、每个人的心上，这必将得到广大民众的热烈响应。一些人还说到，国民党与中国共产党曾有过合作的传统，希望国民党当局能够象以往一样再次与共产党实行合作，为祖国繁荣统一作贡献，为列祖列宗争光。"},{"type":"paragraph","text":"致公党的成员有许多有亲戚、朋友在台湾或者在港澳和海外。座谈会上，大家表示要利用自己的方便条件努力工作，为祖国的统一大业而奋斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"382d184c32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
