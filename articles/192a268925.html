,"authors":[],"dates":[{"year":1984,"month":10,"day":16}],"is_range_date":false,"parts":[{"text":"关于在“处遗”中被停、免、撤人员能否调整工资的复函","type":"title"},{"text":"钦州地区行署劳动人事局：","type":"appellation"},{"text":"根据国发（1981）144号、国发（1982）140号、国发（1983）65号文件的有关规定，经请示有关领导，现对你地区“处遗”办关于在“处遗”中被停、免、撤人员调资问题的几点意见答复如下：","type":"paragraph"},{"text":"一、对于现已审查完毕结案给予党内严重警告和行政记大过以上处分者，不得调整工资；受党内警告和行政记过以下处分者，如未按国发（1981）144号、国发（1982）140号、国发（1983）65号文件调整工资的，可分别按八一、八二、八三年有关调资文件的规定进行调整工资，并可按规定补发工资。","type":"paragraph"},{"text":"二、正在受审查的人员，待审查清楚后，再按第一条处理。","type":"paragraph"},{"text":" 广西壮族自治区劳动人事厅一九八四年十月十六日","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"192a268925"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
