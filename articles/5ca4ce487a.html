" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0a172fa4-cb9b-48d1-903b-a0042feddc39","name":"贵州风云（中国国际文艺出版社2014年）","internal":false,"official":false,"type":"pdf","author":"邓振新著，中国国际文艺出版社2014年","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0a172fa4-cb9b-48d1-903b-a0042feddc39.pdf"],"article":{"title":"书后附录2 贵州省历任主要领导名录（1949至今）","alias":"","parts":[{"type":"paragraph","text":"L1L贵州风云运输，并成立省交通运输领导小组，对全省运输实行统一领导，统一指挥。9月15日，中央下达解决贵州问题的中发（72)38号文件。蓝亦农去职，鲁瑞林任工作组组长。10月13日，湘黔铁路在贵州施秉县翁塘车站接轨通车。湘黔铁路全长902公里，东与株洲至上海的铁路相接，西与贵阳至昆明的铁路联通，在中国南方构成与陇海线平行、横贯东西的第二条铁路大干线。1975年1月1日全线交付营运。19731月14日.《贵州日报》报道，乌江航道整治工作成绩显著，省内航线延伸到269公里，能行驶60吨机动客货轮。2月28日，贵州省革委会发出《关于进一步做好计划生育工作的通知》，提出力争1973年全省人口自然增长率降到23%左右。任。9月10日，中共中央决定：鲁瑞林任中共贵州省委第一书记，省革委会主19741月27日-2月4日，中共贵州省委召开常委扩大会议，传达学习中共中央关于批林批孔的文件和《人民日报》社论《把批林批孔的斗争进行到底》。省委决定在全省范围内迅速掀起批林批孔的新高潮。4月27日，中共贵州省委决定成立贵州赤水天然气化肥厂领导小组。8月6日，国家计委同意贵州省建立赤水天然气化肥厂。1978年12月28日；该厂建成并投入生产。10月10日，中共贵州省委发出《关于办好医疗和加强赤脚医生队伍建设的通知》。19758月11日，贵州省革委会引发国务院批转教育部《关于边疆和少数民族地区普及小学五年教育的请示报告》的通知，要求结合贵州实际，切实解决少数民族和边远山区在普及小学教育工作中的困难和问题。8月27日-9月3日，中共贵州省委召开地（州、市）县（市、特区、去）委书记会议，制定了把钢铁生产搞上去，全面完成和超额完成全年国民经济计划措施。414"},{"type":"paragraph","text":"第二十九章否定“文革”带来改革开放19767.月28日，钢仁地区赴山西省昔阳县大赛参观团在参观大寨后，去河北省遵化县参观途中，在唐山市遗酒强烈地殿，铜仁地委副书记张仁龙等243人遇难，16人幸存。9月9日，中共中央主席、中共中央军委主席、全国政协名誉主席毛泽东，因病在北京逝世。18日，省委和贯阳市委在贵阳春雷广场陵重举行追大会，贵阳地区各族各界群众40万人参加。同日，全省各地也都降重举行了迫悼大会。10月16日-17日，中共贵州省委召开地、州、市委书记会议，传达中共中央主席华国锋、中共中央副主席叶剑英在中央召开的打招呼会议上的讲话，并进行学习讨论。会议一致拥护中共中央对王洪文、张春桥、江青、姚文元“四人帮\"采取的英明果断措施，愤怒声讨“四人帮”反党纂权的阴谋活动。书后附录2贵州省历任主要领导名录（1949至今）省委书记苏振华（1949.12~1954.05）周林（1954.12~1956.07）周林（1956.07~1964.10）李大章（1964.10～1965.05）（代）费启允（1965.05~1967.12)李再含（1967.12～1969.10)（革委核心小组长）蓝亦农（1969.10～1971.05）（代核心小组长）蓝亦农（1971.05~1973.09)鲁瑞林（1973.09~1977.02)马力(1977.02~1979.10)池必（1979.10~1980.06)（代）池必师（1980.06~1985.03)未厚泽（1985.03~1985.07)胡锦涛（1985.07~1988.12)刘正威（1988.12~1993.07)刘方仁(1993.07~2001.01)钱运录（2001.01~2005.12)"},{"type":"paragraph","text":"415贵州风云石宗源（2005.12~2010.08）乘战$（2010.08~2012.07
