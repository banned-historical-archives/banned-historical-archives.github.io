"dates":[{"year":1957,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"福建高校一批右派分子","type":"title"},{"text":"厦门大学右派分子、中文系主任郑朝宗、南洋研究所研究员陈碧笙和学生李罗芳，福建师范学院右派分子、教授钱履周、余宝笙(女)，福建医学院右派分子、副院长黄震亚、陈阅明和讲师潘秀森(共产党员)，福建农学院右派分子、教授黄震和学生赵天珍等，利用大鸣大放的机会，猖狂向共产党向社会主义进攻。他们除了异口同声地在各学校叫嚣要“党委滚出学校”，“科学、教育事业应由民盟和农工民主党来领导”外，还公然张贴“消灭红色政权”、“打倒共产党”等反动标语，煽动教师和学生罢教、罢课。各校师生员工从6月中、下旬开始，举行了各种会议，以说理的方式，彻底揭露和驳斥了右派分子的谬论和阴谋。","type":"paragraph"},{"text":" ——原载《文汇报》1957年8月16日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f68d0fdb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
