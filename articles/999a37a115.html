script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《从奴隶到将军》筹备开拍","authors":[],"dates":[{"year":1978,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一个出身在云贵高原的奴隶娃子，投身于旧民主主义革命，历经讨袁护国和北伐战争，屡建战功。他在黑暗中追寻光明，终于找到了中国共产党，参加了红军。在万里长征、抗日战争、解放战争中，英勇奋斗三十年，直到生命的最后一息。这就是《从奴隶到将军》中塑造的罗霄将军的生平梗概。"},{"type":"paragraph","text":"五月中旬，《从奴隶到将军》摄制组的同志开始了拍摄前紧张的筹备工作。摄制组的主要创作人员沿着剧本描写的罗霄将军的活动路线，跋山涉水，调查访问，收集创作素材，选择外景、实景拍摄点。"},{"type":"paragraph","text":"摄制组同志来到了彝族聚居的云南彝良奎香后山。生产队干部引导摄制组同志参观了唯一的一间留有当年奴隶生活痕迹的破烂草寮。当年在土司家当过奴隶娃子的老人还声泪俱下地给摄制组同志叙述当年奴隶受苦受难的情景。他们迫切希望摄制组同志把影片拍摄好，狠狠地反击“四人帮”对革命老一辈的污蔑和诽谤。"},{"type":"paragraph","text":"《从奴隶到将军》由梁信编剧。导演王炎、摄影师沈西林、总美术师韩尚义同志，都已年过半百，但他们不畏艰难，在高原山区翻山越岭、涉水过河，为影片的摄制工作付出了很大精力。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"999a37a115"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
