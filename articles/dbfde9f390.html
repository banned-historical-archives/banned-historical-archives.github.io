ear":1950,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布拉格八日电】　捷克共产党的红色权力报、保加利亚共产党的工人事业报、匈牙利工人党的自由人民报、罗马尼亚工人党的火花报以及德国统一社会党的新德意志报，均于三日以首页或国际版首要地位，刊载毛主席在莫斯科对塔斯社记者发表的谈话。火花报在登载毛主席的谈话时并刊出了毛主席的照片。波兰统一工人党的人民论坛报，亦于四日以第一版的显著地位刊出了毛主席的谈话。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbfde9f390"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
