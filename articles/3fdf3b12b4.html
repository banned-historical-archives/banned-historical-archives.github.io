script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第三世界国家团结反帝争取经济独立  布迈丁主席谴责外国公司靠剥削第三世界的自然资源而发财致富  赞比亚执政党领导人强调自力更生发展民族经济　巴基斯坦旁遮普省工业部长呼吁利用本国资源","authors":[],"dates":[{"year":1975,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第三世界国家团结反帝争取经济独立"},{"type":"paragraph","text":"布迈丁主席谴责外国公司靠剥削第三世界的自然资源而发财致富"},{"type":"paragraph","text":"赞比亚执政党领导人强调自力更生发展民族经济　巴基斯坦旁遮普省工业部长呼吁利用本国资源"},{"type":"paragraph","text":"新华社阿尔及尔电　阿尔及利亚革命委员会主席、政府总理胡阿里·布迈丁二月二十四日说：“如果昨天的斗争是争取自由和独立的斗争，那么今天的斗争是争取经济独立的斗争。事实上，没有经济上的独立，政治上的独立是不可想象的。应当从这个角度来考虑收回原料和对原料实行国有化的问题。”"},{"type":"paragraph","text":"布迈丁主席是在阿尔及尔举行的庆祝阿尔及利亚政府对石油实行国有化四周年的大会上说这番话的。"},{"type":"paragraph","text":"布迈丁主席在讲话中谴责外国公司靠剥削第三世界的自然资源而发财致富。他指出，阿尔及利亚的国有化措施“与国家的独立是结合在一起的”。他说，阿尔及利亚人民的斗争和命运“同第三世界国家的斗争和命运是共同的”。"},{"type":"paragraph","text":"布迈丁主席在谈到西方国家能源问题时指出：“工业国至今尚未考虑过我们的正当利益。如果在这个问题上出现了困难，不应当归咎于石油。”他指出：“在这方面，西方制度执意继续按照它从建立的时候起就奉行的殖民主义的方式行事。当第三世界国家开始支配自己的资源时，西方制度自然发生动摇。”“很明显，这种情况要求我们起来斗争，以维护我们的正当利益和基本权利。”"},{"type":"paragraph","text":"布迈丁主席在谈到目前发展中国家在经济方面进行的斗争时说：“不应当把石油和其他原料分开。”"},{"type":"paragraph","text":"同一天，阿尔及利亚的一些城市举行了各种庆祝活动。"},{"type":"paragraph","text":"新华社卢萨卡电　据赞比亚报纸报道，赞比亚联合民族独立党中央委员弗兰克·契坦巴拉二月二十四日在赞比亚中央省一次集会上说，帝国主义大国假装提供技术和财政援助来帮助发展中国家，但是它们的目的是要掠夺并利用发展中国家的原料来发展自己。"},{"type":"paragraph","text":"他指出，现在，发达国家和发展中国家的经济上的差距仍然不断扩大。他说：“除非发展中国家努力减少对发达国家的依赖，否则，它们将继续遭受剥削。”"},{"type":"paragraph","text":"他强调指出，解决发展中国家面临的问题的办法是自力更生。他说，赞比亚联合民族独立党的目标不仅是为赞比亚人民赢得独立，而且要保持独立。"},{"type":"paragraph","text":"契坦巴拉是按赞比亚执政党联合民族独立党的一项决定的精神去中央省作报告的。这项决定规定，党中央委员要经常到各省去动员人民积极参加国家建设。"},{"type":"paragraph","text":"新华社拉瓦尔品第电　据卡拉奇出版的《商业纪事报》报道，巴基斯坦旁遮普省工业部长阿卜杜勒·哈利克二月十九日在拉合尔为纪念第二次伊斯兰国家首脑会议而举行的一次座谈会上，呼吁第三世界国家团结起来，采取措施，很好地利用本国出产的原料。"},{"type":"paragraph","text":"哈利克说，发展中国家生产了大部分原料，工业国用这些原料制成成品后，又向生产原料的国家出口，从中攫取利润。它们利用这种方式掠夺第三世界的资源。"},{"type":"paragraph","text":"哈利克说，现在是发展中国家团结起来采取措施的时候了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fdf3b12b4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
