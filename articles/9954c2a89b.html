":1958,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"关于学习毛主席诗词的文章"},{"type":"paragraph","text":"刚出版的“文学知识”第三期登了“学习毛主席诗词”的一个特辑，由唐棣华、刘绶松等同志分别解释毛主席的作品，这些文章对于更好地学习主席的诗词是有帮助的。有的文章里引用了老干部的话，用自己的经验来印证长征诗的内容，说这样的诗必须是具有坚强的意志、伟大的气魄、革命乐观主义精神的革命者，才能写得出，也只有英勇的红军才能当得起那样的赞颂。“元旦”“娄山关”等，都是对红军、对革命事业的最美的颂诗。从“长沙”“送瘟神”这些作品，我们应该体会和学习主席的关心革命事业、关心人民命运的精神。这些文章都指出毛主席的诗词境界极高，气魄宏伟，有着很高的思想性和艺术性，是革命的现实主义和革命的浪漫主义相结合的典范，能够对读者的道德情操给以深刻的影响。"},{"type":"paragraph","text":"（春）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9954c2a89b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
