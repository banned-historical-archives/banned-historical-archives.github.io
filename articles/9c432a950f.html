<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市广大军民热烈欢呼毛主席革命文艺路线的伟大胜利热情赞颂《沙家浜》是人民革命战争的凯歌","authors":[],"dates":[{"year":1970,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市广大军民热烈欢呼革命现代京剧《沙家浜》一九七○年五月修订本的发表，热情歌颂毛主席《在延安文艺座谈会上的讲话》光辉思想的伟大胜利。一致表示，要以郭建光、阿庆嫂等英雄人物为榜样，发扬“一不怕苦，二不怕死”的革命精神，把中国革命和世界革命进行到底。"},{"type":"paragraph","text":"昨天，刊登《沙家浜》一九七○年五月修订本的报纸一到各单位，广大工农兵群众、革命干部和革命知识分子，争相传阅，认真学习剧本。邮局的报刊零售服务部门，昨天也格外热闹，革命群众纷纷前往购买报纸。大家兴奋地说，在两条路线斗争中诞生的、经过江青同志呕心沥血培育的革命现代京剧《沙家浜》，与《智取威虎山》、《红灯记》等革命样板戏一样，是与我们伟大的党、伟大的人民、伟大的国家、伟大的军队完全相称的伟大的毛泽东时代的无产阶级文艺。革命群众说，《沙家浜》一九七○年五月修订本的发表，具有伟大的现实意义，她深刻地揭示了“枪杆子里面出政权”的伟大真理。民航局上海虹桥机场的革命群众，在学习中，兴奋地谈到:毛主席在支持世界人民反对美帝斗争的庄严声明中指出:“当前世界的主要倾向是革命。”闪耀着毛泽东思想光辉的革命现代京剧《沙家浜》，告诉世界人民:用武装的革命消灭武装的反革命，这是被压迫人民和被压迫民族争取解放的必由之路。广大工农兵群众在学习、座谈中说，夺取政权要靠枪杆子，保卫政权也要靠枪杆子。驻沪三军指战员表示，一定要紧握手中枪，提高警惕，加强战备，用枪杆子保卫无产阶级的红色江山。上海阀门一厂党委会、革委会的成员认真地学习《沙家浜》五月修订本，表示决心学习郭建光、阿庆嫂联系群众、深入群众和群众打成一片的优良作风。他们当天就组织全厂干部进行学习，决心进一步扎根在群众之中，依靠群众，发动群众，狠抓经济领域中的阶级斗争，深入开展革命大批判，掀起群众性的揭矛盾，找差距，比学赶帮的热潮。"},{"type":"paragraph","text":"广大工农兵和文教战线的革命知识分子学习了《沙家浜》五月修订本，决心学习无产阶级革命英雄人物郭建光、阿庆嫂的优秀品质。大家认为郭建光是我军能文能武、智勇双全的优秀指挥员，在整个斗争中，他始终坚持毛主席的无产阶级革命路线，坚持武装斗争，用武装夺取政权。"},{"type":"paragraph","text":"上海青年京剧团昨晚在演出前进行了学习，演员们说，学习革命现代京剧《沙家浜》五月修订本，首先要促进自己的思想革命化，他们决心以《智取威虎山》、《红灯记》、《沙家浜》等一批革命样板戏为光辉榜样，更好地改造世界观，为塑造无产阶级的英雄形象，苦练基本功，使文艺真正成为“团结人民、教育人民、打击敌人、消灭敌人”的有力武器，为巩固无产阶级专政而努力。"},{"type":"paragraph","text":"许多共产党员和革命干部在学习《沙家浜》五月修订本的时候，都表示要象郭建光、阿庆嫂那样，培养坚强的无产阶级党性。上海火柴厂的部分共产党员、工人和革命干部通过学习，深有体会地说:《沙家浜》里的郭建光和阿庆嫂，上靠毛主席领导，下靠广大革命群众，对党赤胆忠心，战胜了狡猾的敌人，革命样板戏《沙家浜》是教育人民，打击敌人，消除隐患，教育后代的有力武器。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c432a950f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
