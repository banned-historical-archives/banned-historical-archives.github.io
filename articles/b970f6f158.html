torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"日前西方野战军以休养生息为主","alias":"","parts":[{"type":"paragraph","text":"目前西方野战军以休养生息为主！"},{"type":"paragraph","text":"（1936年8月1日）德怀同志："},{"type":"paragraph","text":"目前情况下，野战军似宜以休养生息为主，如无充分有利的作战条件，不妨以八月全月为训练时间。从政治的军事的党的各方面进行有计划的教育，务达到一定的进度。一面派出人员从陕甘宁全省进行扩红，后方医院进行治疗改善，以便在八月增加兵员。团以上高级干部宜有特别的教育计划，为将来计，高级干部教育占了特别重要地位。高级教育内容主要的是学习政治。以上意见如得到你的同意，就请你召集团以上干部大会宣布执行。如果我们在八月得到了休养生息的成绩，到九月纪念二、四方面军南北夹击夺取陕甘大道的战斗，就将更有力量地进行了。如何盼复。"},{"type":"paragraph","text":"泽东"},{"type":"paragraph","text":"一号十时半"},{"type":"paragraph","text":"[1]这是毛泽东给红军第一方面军司令员、西方野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]“纪念”二字似为“配合”之误。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":35,"page_end":35},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b970f6f158"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
