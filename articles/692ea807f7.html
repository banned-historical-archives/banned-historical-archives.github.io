script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国学生反对资产阶级教育制度斗争继续发展  提出摧毁资本主义、支持反帝斗争口号，强调学生斗争要同工人斗争结合  土耳其六万多学生大罢课要求全面改革教育制度","authors":[],"dates":[{"year":1968,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国学生反对资产阶级教育制度斗争继续发展"},{"type":"paragraph","text":"提出摧毁资本主义、支持反帝斗争口号，强调学生斗争要同工人斗争结合"},{"type":"paragraph","text":"土耳其六万多学生大罢课要求全面改革教育制度"},{"type":"paragraph","text":"新华社伦敦十四日电　英国学生反对腐朽的资产阶级教育制度和争取学生权利的斗争，正在继续发展，英国统治阶级一片惶恐。"},{"type":"paragraph","text":"目前，英国全国各地艺术学院的学生，纷纷采取示威、抵制考试等行动，反对现行艺术教育方针。吉尔福德艺术学校、克劳伊登艺术学院、伯明翰艺术学院、布赖顿艺术学院、温布尔艺术学校和诺丁汉艺术学院的学生，都要求派代表参加学院的行政和学术管理机构。有的学院的学生提出了学生要“在一切决策机构中拥有代表”的口号。"},{"type":"paragraph","text":"布里斯托尔大学、哈耳大学、基尔大学和剑桥大学学生争取权利的斗争正在热烈地展开，他们有的反对校方增加食宿费，有的要求民主管理学校。在苏塞克斯大学，学生还强烈反对一些为美国侵略越南战争制造设备的公司过问这个学校学生的就业问题。"},{"type":"paragraph","text":"英国许多大学的学生还同最近来到伦敦的一些外国大学的学生在伦敦经济学院举行了集会。许多学生提出摧毁资本主义；支持一切反对帝国主义的斗争和民族解放运动；反对种族主义等口号。他们还强调指出，学生争取教育改革的斗争不能同反对政府向工人阶级权利进攻的斗争分开。"},{"type":"paragraph","text":"英国统治阶级对学生运动的不断扩展十分惊慌，一些资产阶级报刊在评论中哀叹，英国“即将出现艰难的时期”，局面“还会更加严重”。"},{"type":"paragraph","text":"新华社十五日讯　安卡拉消息：土耳其学生要求全面改革教育制度的大罢课已经进入第五天，参加罢课的学生人数不断增加。到十四日，在土耳其首都安卡拉和伊斯坦布尔、伊兹密尔等地，已有十五个学院，六万多名学生参加了斗争的行列，坚持进行罢课。"},{"type":"paragraph","text":"学生们的大罢课吓得土耳其当局惶惶不安。据报道，土耳其当局惊呼学生的罢课是“严重问题”，并且加紧策划镇压学生斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"692ea807f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
