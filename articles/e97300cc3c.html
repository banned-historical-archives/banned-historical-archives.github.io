<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"同济大学把大批修正主义建党路线作为中心任务调动党员和革命师生积极性 有力推动教育革命深入开展","authors":[],"dates":[{"year":1967,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　同济大学最近通过大学毛主席建党思想，狠批中国赫鲁晓夫的修正主义建党路线，进一步推动了教育革命。"},{"type":"paragraph","text":"连日来，同济大学广大共产党员、红卫兵小将和革命师生怀着对毛主席无比热爱的心情，活学活用毛主席的建党思想，积极投入对修正主义建党路线的批判。他们认真讨论了批判修正主义建党路线与复课闹革命的关系。不少部门、系和班级纷纷举行批判会、座谈会、串连会和讨论会。“五·七”公社的革命师生把批判修正主义建党路线作为当前革命大批判的中心任务。在大学习、大批判中，广大革命师生一致认为，对修正主义建党路线的批判是推动教育革命强大的动力，是关系到无产阶级教育革命能不能进行到底的根本大事，是当前最大的突出政治。是关系到中国和世界革命的最大政治。许多师生在工地、工厂还和工人一起学习、讨论，开展大批判活动。"},{"type":"paragraph","text":"同济大学革命师生在以批判修正主义建党路线，进一步推动教育革命的大学习、大批判中，有以下几点体会:"},{"type":"paragraph","text":"一、以批判修正主义建党路线为中心，推动本单位的斗批改。广大革命师生员工把批判中国赫鲁晓夫的修正主义建党路线和批判本单位走资派紧紧结合起来。他们认真地调查了本校党组织的过去和现在，狠狠揭发和批判本校党内走资派如何忠实贯彻执行中国赫鲁晓夫的修正主义建党路线，把资产阶级反动学术“权威”和资产阶级知识分子拉入党内，妄图改变我们党的性质，篡夺党的领导，实行资产阶级专政的种种罪行。在各部门、各系、各班级召开的批判会上，广大革命师生员工情绪十分激昂。有的说:“原来只知道资产阶级知识分子是通过窃据教学权来统治我们学校的，经过批判，更进一步认识到资产阶级知识分子还用篡夺党的领导权，妄图把党委变成他们统治学校的工具。”"},{"type":"paragraph","text":"二、通过批判修正主义建党路线，大树特树毛主席和毛泽东思想绝对权威。学校党组织过去着重培养“业务党员”，业务挂帅、业务第一的思想没有彻底批判。最近在教学改革中，有些资产阶级知识分子还抱住“业务第一”不放，同学中也出现了埋头钻业务，忽视政治，不突出毛泽东思想的不良现象。许多革命师生在批判修正主义建党路线中，受到很大教育，进一步认识到教育革命的根本问题是政权问题，政权不解决，其它都是空话。只有彻底批判修正主义建党路线，才能从根本上解决权的问题。"},{"type":"paragraph","text":"大家认识到突出政治，坚持斗私批修，促进思想革命化是搞好教育革命的关键。现在大学“老三篇”，改造世界观成为许多决心把无产阶级文化大革命进行到底的无产阶级革命派的强烈要求。"},{"type":"paragraph","text":"三、调动了广大革命党员的积极性。广大革命党员在大学习、大批判中，提高了觉悟，决心在批判修正主义建党路线中立新功。过去不少党员中了中国赫鲁晓夫的“驯服工具论”的毒，在运动中站错了队，与群众关系比较疏远。现在许多党员纷纷表示，要积极投入大批判，在座谈讨论和批判中能把自己摆进去，按照毛主席的建党思想，对照中国赫鲁晓夫的修正主义建党路线，联系本单位的实际，又联系自己思想实际，斗私批修，决心紧跟毛主席，永远和革命群众团结在一起，为中国革命和世界革命贡献自己的一切。他们表示，决心做一个把无产阶级文化大革命进行到底的无产阶级革命派，把教育革命进行到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e97300cc3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
