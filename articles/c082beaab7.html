1976,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"队队办起《批邓战报》"},{"type":"paragraph","text":"走进湖北省松滋县南海公社联合大队，只见黑板报、墙报琳琅满目，战报、油印小报到处传看。多种形式的批邓战报，登载深入批邓的情况，推广深入批邓的经验，宣传效果很好。真是队队办战报，家家谈批邓。"},{"type":"paragraph","text":"联合大队队队办《战报》，是从一九六九年开始的。同样是《战报》，内容大不同。过去的战报主要是以登载生产情况为主。反击右倾翻案风斗争开始以后，这个大队的干部和群众，认真学习毛主席的一系列重要指示，狠批反动的唯生产力论，生产战报办成了批邓战报，体现了抓革命，促生产的方针，发挥了很好的战斗作用。今年“双抢”大忙季节，第七生产队有个别干部，由于头脑中的修正主义流毒没有肃清，生产一忙，不注意抓阶级斗争，用“工分挂帅”刺激群众的劳动积极性。阶级敌人也乘机兴风作浪，破坏抓革命，促生产。贫下中农看到这种情况，非常气愤。五十多岁的老贫农高光柱说：这不是邓小平宣扬的唯生产力论的流毒吗？流毒不肃清，邓小平的修正主义路线不批臭，农业生产怎么搞得好？于是，他连夜写了《工分挂帅，越挂越坏》的小评论。对“工分挂帅”的实质，进行了深入的剖析和批判，说明了必须以阶级斗争为纲，坚持无产阶级政治挂帅，才能调动广大群众社会主义积极性的道理。这个小评论登在《批邓战报》上，并加了编者按。油印成小报后，发到各队学习组、辅导站，组织群众学习讨论，使大家对邓小平宣扬唯生产力论，妄图复辟资本主义的罪恶目的有了进一步的认识。深入批邓，促进农业学大寨，革命和生产出现了崭新局面。"},{"type":"paragraph","text":"联合大队第四生产队的干部和群众，在批邓斗争中，联系农村阶级斗争的现实，把《批邓战报》办的有声有色。他们利用《战报》批判农村资本主义倾向，打击阶级敌人的破坏活动。今年七月，这个队曾出现过“四旧”复活的现象，这种现象一出现，他们就在《批邓战报》上开展专题讨论，专题批判，从“四旧”复活的实质，看邓小平宣扬阶级斗争熄灭论的罪恶目的，从农村阶级斗争的表现，看无产阶级与资产阶级之间斗争的长期性，发动群众参加大批判，很快刹住了这股歪风。"},{"type":"paragraph","text":"今年二月以来，联合大队坚持办好《批邓战报》，全大队共办黑板报九百多期，墙报五百多期，田头战报三百多期。看了自己队办的战报，贫下中农十分高兴，都说：《批邓战报》威力大，阶级敌人见了怕。反动路线被批臭，错误倾向被斗垮。促进生产气象新，学大寨迈出新步伐。　本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c082beaab7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
