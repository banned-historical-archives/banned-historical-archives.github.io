art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席领导下革命造反派的夺权斗争 丰富发展了巴黎公社和十月革命经验","authors":[],"parts":[{"type":"paragraph","text":"许多日本朋友最近纷纷发表谈话，热烈欢呼和祝贺中国无产阶级革命派联合起来从党内一小撮走资本主义道路的当权派手中夺权，是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"一位住在东京三鹰市的日中友好运动活动家说，“目前中国无产阶级革命派实行大联合，从党内走资本主义道路的当权派手中夺权，是阶级斗争发展的必然规律，是毛泽东思想的伟大胜利。这一自下而上的夺权，在国际无产阶级革命的历史上和在国际无产阶级专政的历史上，开创了新纪元。”"},{"type":"paragraph","text":"这位活动家高度赞扬说，中国无产阶级革命派的夺权斗争表明，毛主席创造性地发展了马克思列宁主义关于无产阶级专政的学说，为马克思列宁主义的武器库增添了新的武器，同时向全世界证明毛泽东思想是颠扑不破的真理，是当代马克思列宁主义的顶峰。"},{"type":"paragraph","text":"大坂的一位“毛泽东思想研究小组”的成员说，目前在中国进行的无产阶级文化大革命运动中开展的无产阶级革命派的夺权斗争，大大地丰富和发展了巴黎公社和伟大十月社会主义革命的经验，为人类的解放做出了新的贡献。"},{"type":"paragraph","text":"从事日中友好运动的一位活动家说，中国亿万革命群众实行大联合，展开全面夺权斗争的伟大胜利，极大地鼓舞了日本人民的斗争。这个胜利大长了世界革命人民的志气，大灭了帝国主义、修正主义和反动派的威风。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6eb1fe259a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
