script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日中友好运动知名人士三好一发表讲话纪念毛主席庄严声明一周年  为赶走美帝反对日本军国主义而奋斗","authors":[],"dates":[{"year":1971,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日中友好运动知名人士三好一发表讲话纪念毛主席庄严声明一周年"},{"type":"paragraph","text":"为赶走美帝反对日本军国主义而奋斗"},{"type":"paragraph","text":"新华社二十七日讯 东京消息：日中友好运动知名人士三好一，二十日晚上在东京举行的纪念毛主席“五·二○”声明发表一周年的一次集会上发表讲话时指出，毛主席的声明对日本人民反对美帝国主义和日本军国主义的斗争是巨大的鼓舞。"},{"type":"paragraph","text":"他说：“一年来，国际形势的发展，完全证明了毛主席在声明中提出的科学论断无比正确。”"},{"type":"paragraph","text":"三好说，毛主席在声明中指出“当前世界的主要倾向是革命”，一年来，反美斗争的风暴席卷全球，世界人民反美统一战线不断扩大，而美帝国主义及其走狗正在加速走向崩溃。"},{"type":"paragraph","text":"他说，但是，帝国主义的本性决不会改变，他们必然要作最后的挣扎，对帝国主义绝不能抱任何幻想。正如毛主席在声明中指出的那样，“新的世界大战的危险依然存在，各国人民必须有所准备。”"},{"type":"paragraph","text":"三好在讲话中强烈谴责美日反动派复活日本军国主义、加紧扩军备战和玩弄“归还”冲绳骗局的罪恶行径。"},{"type":"paragraph","text":"他说，所谓“归还”冲绳，实际上就是要美帝长期霸占冲绳，并且把整个日本变成美帝侵略亚洲的基地，要日本军国主义充当美帝侵略亚洲的急先锋。"},{"type":"paragraph","text":"三好说，“我们要努力学习毛主席的声明，为把美帝从日本赶出去，为反对日本军国主义，为争取日本的真正独立而奋斗。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c320fd106d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
