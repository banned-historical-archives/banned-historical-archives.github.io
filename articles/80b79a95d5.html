script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"辛亥革命时期资产阶级与农民的关系问题","authors":[],"dates":[{"year":1961,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"汪诒荪发表《辛亥革命时期资产阶级与农民的关系问题》一文(见《湖北日报》十月廿一、廿二日)，提出了下列论点:(一)辛亥革命期间资产阶级革命党人发动了会党和新军，但并未真正发动农民，他们对会党和新军的发动，意味着资产阶级与农民的特殊结合。(二)革命党人在对待农民的态度上从轻视到同情这一变化，反映了革命斗争逐步走向高涨，而辛亥革命以后革命党人对农民的疏远，则又反映了革命的必然失败。(三)农民群众的斗争在辛亥革命时期表现了伟大的力量和主力军的作用；而革命党人不能认识到这一点，对他们的领导远远落在革命形势后面。(四)资产阶级革命派在整个革命问题上(包括与农民的关系问题)的意见分歧，不可避免地要引起内部争论以致分裂，资产阶级不可能解决农民问题，不可能领导人民群众取得民主革命的彻底胜利。文章并谈到，由于当时中国民主革命的先行者孙中山无可避免地变成了少数派，由于资产阶级革命领导集团的妥协性不断滋长，不仅没有也不可能发动农民，给农民以真正的利益，反而接受帝国主义与封建主义势力的压力，轻易地使政权落到实国贼袁世凯之手，辛亥革命遂告失败。历史证明，只有在中国工人阶级和中国共产党的领导下，才能真正发动和依靠农民，才能真正解决土地问题，才能最后埋葬帝国主义、封建主义在中国的罪恶统治。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80b79a95d5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
