":["彭城"],"dates":[{"year":1949,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"前外成立裕民山货栈"},{"type":"paragraph","text":"便利城乡工农产品交流　减少商人中间过高剥削"},{"type":"paragraph","text":"【平市讯】北平市贸易公司与平西专署为了发展城乡生产，便利农产品与工业品交流，减少商人中间过高剥削，特于三月二十七日在本市前门外施家胡同（暂住中和贷栈内）成立裕民山货栈，于二八十日已正式营业，二十八至三十日三天中，共来该栈售货农民三十余名，售给该栈杏仁、桃仁、核桃一万一千余斤，货款总值人民币三十四万元。较在私人货栈出售，农民多得人民币四万六千三百元，减少了货物总值百分之十三点六的剥削（因私人货栈手续费百分之十，公家百分之三，私人货栈出秤百分之七，公家出秤百分之十二。在收买价格上亦稍高私人货栈）。而农民最感便利的是随来随卖，不耽误时间，因此农民对裕民山货栈非常满意，并准备通知各地农民均来该栈卖货，不再受私人货栈的过高剥削。同时裕民山货栈将货运天津出售，亦得到适当的利润。现该栈正加紧筹备，准备扩大业务经营。"},{"type":"paragraph","text":"（彭城）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8fe7562f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
