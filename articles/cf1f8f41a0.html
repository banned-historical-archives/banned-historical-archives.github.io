":1997,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尽管美国声称不存在奴隶制了，但在废除奴隶制的134年后，即20世纪末，新的奴隶问题又出现在美国。日前新加坡《海峡时报》载文称:在美国国内战争时期被林肯废除的南方奴录制近来又死灰复燃。"},{"type":"paragraph","text":"如今的农奴已不再是黑人，而是南美洲和墨西哥人。在曾是黑奴耕作的棉花地里，贫困交迫的南美洲人和墨西哥人在美元的诱惑下又在这些土地上从事最繁重、艰苦的农业劳动。他们极其听话、顺从，因为他们属于黑户口，是非法跨进美国这个领地的。"},{"type":"paragraph","text":"如今奴役这些新奴隶的决非善良之辈，都是一些可以判罪入狱的歹徒，他们心狠手辣，知道可以怎样尽情地剥削和压榨那些可怜的人们。"},{"type":"paragraph","text":"新奴隶的辛勤劳动只换来用于交换食品与肥皂的最低收入，这使他们一辈子还不清自己的债务，如果逃跑的话将被打得死去活来。"},{"type":"paragraph","text":"新农奴们没有受过教育，不会讲英语，看见警察极其害怕，因为是非法入境者。"},{"type":"paragraph","text":"来自第三世界的劳动力成为美国某些人牟取暴利的工具。"},{"type":"paragraph","text":"叶尔"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf1f8f41a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
