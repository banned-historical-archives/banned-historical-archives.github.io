art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"灯塔，照亮中国革命文艺航程大型展览《毛泽东与文艺》受到各界广泛好评","authors":["沈路涛"],"parts":[{"type":"paragraph","text":"灯塔，照亮中国革命文艺航程"},{"type":"paragraph","text":"大型展览《毛泽东与文艺》受到各界广泛好评"},{"type":"paragraph","text":"新华社北京5月21日电（记者沈路涛）今晚的中国革命博物馆灯火辉煌，200余名在京的老同志兴致勃勃地参观了正在这里举行的大型展览《毛泽东与文艺》。"},{"type":"paragraph","text":"1100多平方米的展厅陈列出各种历史图片、文物、艺术作品等800余件，比较全面地反映了毛泽东从“五四”运动到20世纪70年代重要的文艺活动。前来参观的老同志仔细观看每一幅图片、每一件实物，触景生情，有的合影留念，有的在展品前伫立良久、凝神沉思。历数41种版本的《在延安文艺座谈会上的讲话》，回忆昔日轰轰烈烈的“到群众中去”文艺运动，他们不禁感慨万千。老同志们认为，《在延安文艺座谈会上的讲话》科学地回答了文艺“为什么人”以及“如何为”的问题，是毛泽东文艺思想形成的重要标志。当年正是在毛泽东文艺思想的指引下，广大文艺工作者深入农村、工厂、军营，努力让自己的作品接受群众的检验，留下了一批重要作品，掀起了革命文艺和社会主义文艺事业建设的一次又一次高潮。"},{"type":"paragraph","text":"看着反映当代社会主义文艺蓬勃发展的图片和实物模型，听着讲解员们讲述我国社会主义文艺发展的不平凡历程，他们认为，展览从一个侧面体现中国先进文化的前进轨迹，突出中国共产党“为创造中华民族的新艺术而奋斗”。他们表示，进入新的历史时期以来，毛泽东文艺思想得到进一步的继承和发展，邓小平文艺理论和江泽民“三个代表”重要思想关于“先进文化”的论述，与毛泽东文艺思想是一脉相承的。在新的世纪里，只要广大文艺工作者坚持“二为”方向和“双百”方针，弘扬主旋律，提倡多样化，我国的文艺事业必将迎来一个繁荣发展的新高潮，为中华民族的伟大复兴提供充分的智力支持和精神动力。"},{"type":"paragraph","text":"《毛泽东与文艺》大型展览是诸多纪念毛泽东《在延安文艺座谈会上的讲话》发表60周年活动中的一项。自昨天开展以来，预售门票达2万余张，前来参观的观众已达千余人，受到社会各界的广泛好评。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59c1e33f5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
