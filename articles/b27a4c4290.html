清华大学","钱伟长"],"dates":[{"year":1957,"month":5,"day":24}],"is_range_date":false,"parts":[{"text":"“十二年是用来补课的”","type":"title"},{"text":"清华大学钱伟长","type":"authors"},{"text":"(录自钱伟长在民盟座谈会上的发言)","type":"subtitle"},{"text":"钱伟长在会上说：科学家没有时间，好象一个人几年不吃饭。不吃饭，就拉不出屎来，科学要中断了。我们不要谈赶上世界先进水平，应当先补一下前十二年的课。这个问题，共产党要负责。学部委员大部份脱离了研究。","type":"paragraph"},{"text":"钱伟长又说：让他们从行政事务中请两年长假。有些人(包括非民盟科学家)说：六分之五的时间还不能保证。即使保证也不行，应当在一年中保证连续的几个月时间搞研究才有效。每周打断一次，效果就不好。民盟认为，高校研究工作不开展，一是领导外行，不重视学术；一是高教部变化太大，没有条件，光行政号召，没有用。","type":"paragraph"}],"comments":[],"origin":"《捍卫高等教育和科学事业的社会主义方向》，清华大学新清华编辑委员会编，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b27a4c4290"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
