script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决不许修正主义的‘花儿’重‘开’","authors":[],"dates":[{"year":1970,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"在党的九届二中全会公报的鼓舞下，我们文艺战线掀起了进一步学习、宣传、普及革命样板戏的热潮，出现了一派生气勃勃的景象。但是，在大好的形势下，文艺黑线的余毒仍会不断地乘隙而入。我们在最近演出中，出现了台前在演革命样板戏，台后却有人在弹奏轻佻、缠绵的修正主义“花儿”曲调的现象。这种文艺黑线余毒的反映，很值得我们注意。"},{"type":"paragraph","text":"毛主席指出:“同资产阶级在意识形态上的斗争，是长期的阶级斗争”。今天，那些黄色的修正主义“花儿”在我们演奏革命样板戏同志的手中重新弹了起来，正是反映了这种斗争始终是十分尖锐、激烈的。回顾无产阶级文化大革命前，文艺舞台上妖雾迷漫，资产阶级的歌曲和音乐大肆泛滥，这是为什么?就是因为我们的舞台被资产阶级霸占了。反革命的“四条汉子”就是妄图以此来腐蚀青年，瓦解人们斗志，叫人们在什么“花儿”、“爱情”之类的靡靡之音中“和平演变”，实现他们的复辟阴谋。每当想起这一幕幕憷目惊心的情景，我们难道不要义愤填膺、仇恨满腔吗?!但有的人却中了毒不知毒，在今天仍然欣赏、留恋这些东西，这正是由于我们放松了革命大批判的结果。我们决不可忽视资产阶级文艺对于我们思想上的潜移默化作用，今天，我们要真正学习、宣传好革命样板戏，尤其不可忘记要深入持久地开展革命大批判。只有通过革命大批判，才能提高我们的政治觉悟和识别能力，要演革命戏，先做革命人。只有不断加强世界观和艺术观的改造，才能自觉地为保卫毛主席的革命文艺路线而战斗。我们感到，对那些资产阶级的东西，不管出现在台前还是台后，都必须坚决批判。决不容许任何修正主义的“花儿”重“开”!"},{"type":"paragraph","text":"上海合唱团"},{"type":"paragraph","text":"几个革命群众"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4274d4dbb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
