es":[{"year":1957,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河南部分领导干部需要彻底克服右倾思想"},{"type":"paragraph","text":"本报讯　河南省农村以粮食问题为中心的大辩论，正在逐步开展。淮滨、安阳、新野等县经过开展大辩论，已于本月上旬超额完成夏粮征购任务。"},{"type":"paragraph","text":"但是，目前河南省部分县以上的领导干部，对于立即在农村开展两条道路的大辩论，还有顾虑。如有的地委书记认为“现在生产很紧张，普遍开展辩论不好掌握”，耽心搞乱了。特别是一部分有右倾思想的领导干部，对解决粮食问题强调实际困难，不认识解决思想问题的重要性，因此，对开展以粮食问题为中心的大辩论更是缺乏信心。"},{"type":"paragraph","text":"为了顺利开展农村的社会主义宣传教育，中共河南省委在最近召开的一次省委全会上，强调提出了克服右倾思想的问题。会议要求全党干部正确认识农村形势，彻底批判右倾思想，把两条道路的大辩论迅速地开展起来。　（王昌隆）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f3d4a2e67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
