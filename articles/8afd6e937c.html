tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"积极探讨毛泽东海军发展战略思想","authors":["骆戒宗李杰"],"parts":[{"type":"paragraph","text":"为深刻领会毛泽东关于建立强大海军指示的伟大意义，运用毛泽东军事思想分析和解决海军建设所面临的新情况、新问题，把学习邓小平新时期军队建设思想推向深入，海军组织了一次大型理论研讨会，推出一批有创见的理论成果。"},{"type":"paragraph","text":"深入研讨毛泽东海军发展战略思想，是这次研讨会的主旨。毛泽东对海军的作用地位高度重视，建国初期就规定了海军为战略军种，主张建设一支强大的海军；在海军的性质上坚持把海军建设成为一支防御性的军种；在建设海军的道路上强调实行有重点、按比例、均衡发展的方针。这些思想，对于海军的发展仍然有重大的指导意义。"},{"type":"paragraph","text":"毛泽东海防思想，是海军近年来研究的重点课题。该思想酝酿于抗日战争和解放战争时期，形成于新中国成立后，在60年代之后的海防实际斗争中有了新的发展。我国的海防始终与国防和国家安全紧密相关，人民海军则是安全防卫的中坚力量。没有强大的海军就不可能有强大的海防，就不可能有巩固的国防，也就没有国家的安全。因此，“建立一支强大的具有现代战斗能力的海军”，才能有效地捍卫国家海洋权益和保障海洋事业的发展，遏制来自海上的可能侵略。海防斗争涉及的问题千头万绪，毛泽东同志适时提出了一系列海防斗争的方针原则和相应的斗争形式。"},{"type":"paragraph","text":"结合未来海战特点，进行现实性研究，是这次理论研讨会的又一显著特点。随着高新技术武器装备大量用于现代战场，不仅海战样式已发生了巨大变化，而且也使作战理论出现重大突破。未来海战，我海军某些武器装备与敌相比仍将处于明显的劣势。为此，依靠和发挥人民战争的巨大威力，树立以劣势装备战胜优势装备之敌的作战思想，依然是我们的基本立足点。高技术条件下的海上局部战争，与以往的海战截然不同，必须紧密追踪各国海上力量变化，深入学习和灵活运用毛泽东同志的战争指导艺术，着力提高我军的现代化水平，全面加速质量建设，在未来海战中发挥我之优长，在整体劣势中创造局部优势，逐步实现敌我优劣的转化。"},{"type":"paragraph","text":"（骆戒宗 李杰）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8afd6e937c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
