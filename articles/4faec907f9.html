art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"宣传毛泽东思想 为兄弟民族治病","authors":[],"parts":[{"type":"paragraph","text":"本报讯 新疆军区某部医疗小组深入边远公社，宣传毛泽东思想，为兄弟民族治病，受到广大群众的热烈赞扬。"},{"type":"paragraph","text":"医疗小组在巡诊过程中，身上带着毛主席和党中央的指示，肩上扛着砍土镘，每到一地，边宣传边劳动。四十多天来，他们翻高山，越戈壁，行程近千里，向广大群众宣传了毛主席“抓革命，促生产”的指示、《中共中央给全国农村人民公社贫下中农和各级干部的信》。在托甫鲁克公社第五生产队巡诊时，他们发现这个队播种质量不够好，就组织社员学习了毛主席“对工作的极端的负责任”的教导，使播种质量迅速提高。"},{"type":"paragraph","text":"他们深入到田边地头为群众治病。在第二生产队劳动时，听说社员诺尔东拉孜克突然发了高烧，卧床不起。医疗小组立即赶往患者家中，采取紧急治疗措施，使患者迅速恢复健康，八天以后就投入了生产劳动。"},{"type":"paragraph","text":"医疗小组还抢救了许多危重病人。黑孜公社老贫农莫合买德的幼儿得了急性肺炎，连续高烧三天，处于濒死状态，全家焦虑万分。医疗小组的同志们遵循毛主席“我们的责任，是向人民负责”的教导，当机立断，组织抢救。深夜，病儿的痰液堵塞气管，共产党员赵志高用嘴给幼儿吸痰，从死亡线上救活了这个孩子。莫合买德感激万分，振臂高呼：“毛主席万岁！万岁！万万岁！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4faec907f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
