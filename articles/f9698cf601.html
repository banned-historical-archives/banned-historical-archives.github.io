script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"仿效西方垄断资本经营方式　采取新殖民主义掠夺手法  苏修损人利己大肆剥削第三世界","authors":[],"dates":[{"year":1975,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"仿效西方垄断资本经营方式　采取新殖民主义掠夺手法"},{"type":"paragraph","text":"苏修损人利己大肆剥削第三世界"},{"type":"paragraph","text":"据新华社一九七五年三月二十一日讯　新华社记者报道：近些年来，苏修社会帝国主义在对外经济扩张中有了新的升级。这就是仿效西方垄断资本主义的经营方式，采取新殖民主义手法，向发展中国家输出资本，直接入股，开办所谓“合营企业”，利用当地廉价的原料和劳动力，攫取最大限度利润。"},{"type":"paragraph","text":"虽然时间不长，但在具有暴发户特点的苏修集团竭力扩展下，它的这种“合营企业”，至今已在十二个亚非拉发展中国家开设。其中规模较大的有，一九六八年在新加坡开设的“新苏航运公司”，由苏联提供货轮，负责远洋运输，这样，每年进入新加坡的苏联船只，至少不下六百艘次。在非洲，苏修和尼日利亚商人合办的“西非汽车工程公司”，苏资竟占百分之六十，尼商资本只占百分之四十。公司董事长、财务等要职，均由苏方控制，操纵了经营管理之权。在拉丁美洲，苏修在巴西一家工业公司中投资二亿美元，合伙开采圣保罗州帕拉伊巴河谷的沥青片岩矿。"},{"type":"paragraph","text":"由于有利可图，苏修并不以现有这些“合营企业”为满足。它到处试探投资的可能性。据印度《观点》周刊透露，“苏联方面表示有兴趣同印度的属于苏方所列的五十八项工业的私营企业，缔结双方联合经营的协定。”香港出版的《远东经济评论》报道，苏联和马来西亚就一九七二年进行“经济技术合作”谈判时，以更多使用合成橡胶、减少进口天然橡胶相威胁，想迫使马方同意接受苏修投资搞“合营企业”。"},{"type":"paragraph","text":"苏修的“合营企业”或“联合公司”，实际上同西方垄断资本搞的“跨国公司”是一路货色，但却作了一番乔装打扮。苏修的“合营企业”打着经济“合作”、“联系”和“协调”的幌子，装着“帮助”发展工业的样子，一开始就渗入当地要害经济部门，不仅大赚其钱，还为它进一步经济扩张和政治控制开辟道路。据统计，苏修在十二个亚非拉国家开办的十四家“合营企业”，除一家钟表业外，其余均为运输、拖拉机制造、采矿和加工工业等，特别是和进出口贸易直接相关的航运公司就有五家，几乎占了这些企业的半数。有些苏修插手的“合营企业”，连对方股金也是苏联贷款，重要设备和运输工具由苏联提供，这样的“合营企业”，实际上是苏修出钱出物资，别国出劳力，成了苏修式的劳资合伙公司。"},{"type":"paragraph","text":"列宁指出：“垄断占统治地位的最新资本主义的特征是资本输出。”苏修在发展中国家投资办“合营企业”决非偶然，而是资本主义发展规律所决定的。事实正是这样，随着它国内经济日益高度垄断化和由此产生的腐朽性和寄生性，它急需对外扩大经济掠夺和剥削，实行资本输出，以带动商品输出，捞取更多的利润，这是苏修当前对外经济扩张的新动向。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9698cf601"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
