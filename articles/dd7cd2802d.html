ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"关于中共八届六中全会议程给邓小平的信","alias":"","parts":[{"type":"paragraph","text":"关于中共八届六中全会议程"},{"type":"paragraph","text":"给邓小平的信"},{"type":"paragraph","text":"（1958年11月28日）小平同志："},{"type":"paragraph","text":"请考虑组织以大区为单位的七个小组，将北京来的同志们分别插入各小组，中央常委六人不插入，或只以一二人或二三人插入，边看文件边座谈。头几天每天只开会一次，配酿思想，交换意见。"},{"type":"paragraph","text":"此议，请提交今天下午会议上，征求各同志意见，看是否可行。没有几天座谈交换意见，人民公社决议（草案）中的许多理论和实践问题是不易弄清楚的。待【通过】1959年经济安排问题决议（草案），接着就要分组座谈这一件事。如何，请酌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月廿八日上午十一时[1]邓小平，当时任中共中央总书记。"},{"type":"paragraph","text":"[2]指准备在中共八届六中全会上讨论的《关于人民公社若干问题的决议（草案）》。"},{"type":"paragraph","text":"[3]指准备在中共八届六中全会上讨论通过的《关于1959年国民经济计划的决议（草案）》。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":526,"page_end":526},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd7cd2802d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
