<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"非洲朋友在我使馆建军节招待会上表示无限热爱毛主席  毛主席的人民战争思想威力无穷  朋友们纷纷索取毛主席著作和林彪同志著作","authors":[],"dates":[{"year":1967,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"非洲朋友在我使馆建军节招待会上表示无限热爱毛主席"},{"type":"paragraph","text":"毛主席的人民战争思想威力无穷"},{"type":"paragraph","text":"朋友们纷纷索取毛主席著作和林彪同志著作"},{"type":"paragraph","text":"新华社三日讯　中国驻索马里、摩洛哥、突尼斯大使馆和驻桑给巴尔总领事馆分别举行招待会，热烈庆祝中国人民解放军建军四十周年。"},{"type":"paragraph","text":"在这些招待会上，非洲朋友纷纷表达他们热爱和敬仰亲手缔造中国人民解放军的伟大领袖毛主席的感情，他们衷心地敬祝毛主席万寿无疆。"},{"type":"paragraph","text":"索马里内阁事务国务部长希拉维代表总理埃加勒出席中国驻索马里大使馆临时代办郑佩堂举行的招待会，并表示热烈祝贺中国人民解放军的伟大节日。"},{"type":"paragraph","text":"出席招待会的三百多位来宾中还有：前索马里总统欧斯曼、前总理和执政党索马里青年联盟总书记侯赛因、国民议会副议长鲁卜勒、警察部队司令穆萨等高级军政官员以及各界人士。"},{"type":"paragraph","text":"许多索马里朋友通过中国临时代办祝毛主席万寿无疆。一位朋友说：“毛泽东主席是当代最杰出的领袖。他领导中国人民在这样短短的时期内取得这样伟大的成就。毛泽东思想传遍了全世界，这使我们受到很大的鼓舞。”“我生在毛泽东时代，是非常幸运的。”他指着毛主席和周恩来总理席地坐在天安门广场上同革命群众一起交谈的照片说：“伟大的领袖毛主席始终同人民群众在一起。”"},{"type":"paragraph","text":"来自索马里海岸的一位自由战士表示，索马里海岸人民决心贯彻执行毛主席的军事路线，来对付统治他们祖国的法帝国主义。他说：“按照毛主席的教导，只要世界上还有帝国主义和反动派，我们就务必不要松懈自己的警惕性，帝国主义就象灰尘一样，灰尘不打扫，决不会自己跑掉；帝国主义，你不打，它就不倒。”"},{"type":"paragraph","text":"在招待会上，索马里朋友争先恐后地索取和阅读毛主席的著作。一位女军人拿了一本红彤彤的《毛主席语录》，她说：“毛主席的书是全世界人民之宝。我将认真地读毛主席的书。”"},{"type":"paragraph","text":"许多索马里朋友手里拿着毛主席的书，胸前别着闪闪发光的毛主席像章，热情洋溢地请中国大使馆的人员和他们一道，在世界革命人民心中的红太阳毛主席的画像前照相。"},{"type":"paragraph","text":"摩洛哥各界朋友二百多人出席了中国驻摩洛哥大使馆临时代办丁文彬举行的招待会。来宾们高度赞扬毛泽东思想的光辉胜利。许多阿拉伯朋友激动地说：“人民战争的确是威力无穷，阿拉伯人民要取得反侵略战争的胜利，也只有依靠人民进行人民战争。”"},{"type":"paragraph","text":"许多客人热情地表示，一定要努力学习和掌握毛泽东思想。来宾们纷纷索取毛主席著作和林彪同志的著作《人民战争胜利万岁》以及毛主席照片和像章。"},{"type":"paragraph","text":"在桑给巴尔，坦桑尼亚第一副总统卡鲁姆出席了中国驻桑给巴尔领事刘干举行的招待会。出席招待会的二百五十多位来宾中还有驻桑给巴尔的坦桑尼亚人民国防军司令希米德·优素福上校、桑给巴尔的部长们和革命委员会的委员们。"},{"type":"paragraph","text":"突尼斯各界人士四百多人出席了中国驻突尼斯大使馆一日晚隆重举行的招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"303deedf62"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
