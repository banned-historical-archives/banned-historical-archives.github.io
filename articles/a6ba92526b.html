art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"喷彩的“画笔”","authors":["叶晓山"],"parts":[{"type":"paragraph","text":"拍击浪花，我脚踩排架，"},{"type":"paragraph","text":"驾驭长风，我登上云崖，"},{"type":"paragraph","text":"饱吸一口清新的空气，"},{"type":"paragraph","text":"喊一声：亲爱的祖国，铁道"},{"type":"paragraph","text":"兵来啦！"},{"type":"paragraph","text":"铁道兵来啦，倾注满腔豪情，"},{"type":"paragraph","text":"铁道兵来啦，跨上跃进战"},{"type":"paragraph","text":"马，"},{"type":"paragraph","text":"壮志催动喷彩的“画笔”，"},{"type":"paragraph","text":"把万里江山尽情描画："},{"type":"paragraph","text":"给钢梁穿件淡蓝衫，"},{"type":"paragraph","text":"给水塔披件乳白纱，"},{"type":"paragraph","text":"给车头套件桔红袄，"},{"type":"paragraph","text":"给站台绣件金黄褂。"},{"type":"paragraph","text":"我们战斗在深山老林，"},{"type":"paragraph","text":"时刻关心着祖国的变化，"},{"type":"paragraph","text":"各条战线纷飞的捷报，"},{"type":"paragraph","text":"给我们增添热能万卡。"},{"type":"paragraph","text":"刚参加批判邓小平的大会，"},{"type":"paragraph","text":"又纵身飞向凌云的排架，"},{"type":"paragraph","text":"大批判会上的铿锵语言，"},{"type":"paragraph","text":"化作手中喷枪的万串火花！"},{"type":"paragraph","text":"无论眼前多少险山恶水，"},{"type":"paragraph","text":"不管征途几度风吹雨打，"},{"type":"paragraph","text":"只要毛主席发出号令，"},{"type":"paragraph","text":"我们的喷枪指那喷那。"},{"type":"paragraph","text":"看啊，从天山冰川，到戈壁"},{"type":"paragraph","text":"沙浪，"},{"type":"paragraph","text":"从塞北雪原，到云贵山"},{"type":"paragraph","text":"峡，"},{"type":"paragraph","text":"我们用自己手中喷彩的“画"},{"type":"paragraph","text":"笔”，"},{"type":"paragraph","text":"喷出了多少美好的图画。"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6ba92526b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
