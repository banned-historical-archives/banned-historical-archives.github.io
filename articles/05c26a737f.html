script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"深受外国资本掠夺和大地主、大资产阶级反动统治之苦  印度劳动人民日益贫困  城市失业人数激增农村每年有数百万人饿死","authors":[],"dates":[{"year":1970,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"深受外国资本掠夺和大地主、大资产阶级反动统治之苦"},{"type":"paragraph","text":"印度劳动人民日益贫困"},{"type":"paragraph","text":"城市失业人数激增农村每年有数百万人饿死"},{"type":"paragraph","text":"新华社二十五日讯　新德里消息：印度广大劳动人民深受印度大地主、大资产阶级和外国垄断资本的重重压榨，生活越来越贫困。"},{"type":"paragraph","text":"据印度报刊报道，今天印度的失业人数惊人的增加。大批失业者拥挤在贫民窟中过着悲惨的生活。在印度的第一大城市加尔各答，有一百万人住在贫民窟中，贫病交迫。在另一大城市孟买，有七十万人失业，一百万人住在贫民窟中；还有二十万人流离失所，每天露宿街头。据报道，这个城市光乞丐就有五万人。印度官方的中央就业局供认：到一九七一年印度失业人数将达两千八百万人。"},{"type":"paragraph","text":"随着印度经济情况不断恶化，物价连年上涨。在过去十年中，小麦的价格上涨了一倍多，大米和玉米的价格也上涨了将近一倍，广大劳动人民微薄的收入难于糊口，挣扎在饥饿线上。印度反动政府也不得不承认，占印度人口三分之一的人生活“极端贫困”，占人口百分之十三以上的人更是“严重贫困”。他们中每人每个月的收入不到十五个卢比。有三千五百万人每天只靠不到三十派沙（印度币分单位）的钱维持生活，而每公斤大米的价格是一百二十多派沙。"},{"type":"paragraph","text":"在印度农村，占人口百分之七十五的广大贫苦农民所占有的土地只占全部可耕地面积的百分之二十，有八千万人完全没有土地。在国大党反动政府、大地主和高利贷者的残酷剥削下，有两亿人经常处在饥饿状态，每年都有数百万人饿死。连日本资产阶级报纸《读卖新闻》的记者都说，“（印度）政府二十年的农业政策，在富了少数地主的同时，使大部分农民更加贫困”。"},{"type":"paragraph","text":"国大党的反动统治，使印度广大劳动人民陷入了重重的苦难之中。印度广大劳动人民再也无法忍受下去了，他们纷纷揭竿而起，决心推翻大地主、大资产阶级的反动统治。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05c26a737f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
