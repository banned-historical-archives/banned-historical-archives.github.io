<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"修正主义是对无产阶级专政的背叛","authors":["施戚洛"],"dates":[{"year":1975,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"市轻工业局工人理论学习班　施戚洛"},{"type":"paragraph","text":"历史证明，堡垒是最容易从内部攻破的，资产阶级也总是千方百计地从工人队伍中寻找他们的代理人，妄图从内部破坏无产阶级的革命斗争。一九二○年七月至八月在苏联召开的共产国际(第三国际)第二次代表大会上，列宁深刻地指出:“机会主义是我们的主要敌人。工人运动中的上层分子的机会主义，不是无产阶级的社会主义，而是资产阶级的社会主义。事实证明:由工人运动内部的机会主义派别活动家来维护资产阶级，比资产者亲自出马还好。”列宁多次告诫各国无产阶级，特别要警惕工人运动内部的机会主义分子，他们是无产阶级专政的叛徒。"},{"type":"paragraph","text":"十九世纪中叶以后，马克思主义在各国工人中广泛传播，无产阶级的革命斗争方兴未艾，强烈地震撼着整个资本主义世界。工人运动的发展，引起了资产阶级的极大恐慌，他们除了进行公开的和露骨的攻击、诽谤外，还竭力收买工人运动中的上层分子，篡改和歪曲马克思主义，妄图把马克思主义变成对资产阶级无害的东西。在资产阶级软硬兼施的进攻下，第二国际的伯恩施坦、考茨基之流，都投入资本家的怀抱，许多国家的工人政党也相继叛变，使国际工人运动一度受到挫折。"},{"type":"paragraph","text":"修正主义，也即右倾机会主义，是国际工人运动中的一种资产阶级思潮。修正主义者、右倾机会主义者，他们披着马克思主义的外衣，以“修正”马克思主义为名，恶毒地攻击马克思主义的基本原则，阉割马克思主义的革命内容，否定马克思主义的普遍真理，磨灭马克思主义的战斗锋芒。伯恩施坦曾大肆鼓吹什么工人运动唯一的任务就是“改善”经济状况，无产阶级专政是“微不足道”的。考茨基也胡说无产阶级专政是马克思偶然提到的“一个词”，公开宣扬“超阶级”的“纯粹民主”理论。由于在工人阶级普遍觉悟的情况下，资产阶级的任何暴力镇压措施，都会遇到工人运动日益顽强的抵抗，而修正主义者有着极大的欺骗性，他们兜售假社会主义，把无产阶级革命运动引向邪路，起着资产阶级所不能起到的作用。"},{"type":"paragraph","text":"对于第二国际修正主义头子的叛卖行径，列宁以大无畏的反潮流精神，在共产国际第二次代表大会上，驳斥了他们否定无产阶级专政的各种谬论，指出他们是由国际资产阶级从掠夺的巨额利润中施舍出一小部分金钱收买过去的叛徒，并且对他们企图钻进第三国际的阴谋进行了无情的揭露。列宁号召各国工人阶级在反对资产阶级的斗争中，必须同机会主义进行坚决的斗争，这是捍卫无产阶级专政的必要措施。在列宁的领导下，第三国际同机会主义划清了界线，使各国工人运动在正确路线指引下蓬勃发展。"},{"type":"paragraph","text":"今天，马克思主义同修正主义的斗争仍在继续进行着，斗争的焦点，仍然是坚持还是否定无产阶级专政的问题。无论是苏联的赫鲁晓夫、勃列日涅夫之流，还是中国的刘少奇、林彪一类，都恶毒咒骂和疯狂攻击无产阶级专政，这充分表明他们是无产阶级专政的死敌。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"反潮流","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c2fca491b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
