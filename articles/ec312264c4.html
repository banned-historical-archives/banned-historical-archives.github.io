script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华国锋　沙风会见日本农业记者访华团","authors":[],"dates":[{"year":1973,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋　沙风会见日本农业记者访华团"},{"type":"paragraph","text":"新华社一九七三年十月六日讯　中共中央政治局委员华国锋、农林部长沙风，今天晚上会见以团野信夫为团长、寺山义雄为副团长的日本农业记者访华团全体成员，同他们进行了友好的谈话，并且回答了他们提出的问题。"},{"type":"paragraph","text":"会见时，沈其益、彭华、郑重、胡钦岭等有关方面负责人在座。"},{"type":"paragraph","text":"日本农业记者访华团是九月二十五日到达北京的。访华团成员先后参观访问了山西大寨大队和北京、石家庄的人民公社、工厂、医院等单位，游览了名胜古迹。在北京期间，他们还参加了首都人民举行的国庆节庆祝活动。访华团将于明天前往上海、苏州、杭州、广州继续参观访问，然后回国。（附图片）"},{"type":"paragraph","text":"华国锋、沙风会见日本农业记者访华团，图为会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec312264c4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
