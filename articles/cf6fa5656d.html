民防空工作的报告”（概要）","authors":[],"dates":[{"year":1969,"month":8,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央、中央军委批转军委办事组“关于加强全国人民防空工作的报告”（概要）","type":"title"},{"text":"中共中央决定成立全国人民防空领导小组。中共中央、中央军委批转的中央军委办事组《关于加强全国人民防空工作的报告》中指出：决定组成全国人民防空领导小组，周恩来任组长。领导小组在人民解放军总参谋部设一个精干的办事机构，根据小组的意图，负责对全国人民防空工作进行督促检查。次日，经毛泽东批准，全国人民防空领导小组组成。副组长有黄永胜、谢富治、吴法宪、阎仲川（副总参谋长）。此后，根据中共中央、中央军委的指示，各省市、自治区及大中城市也相继成立了人民防空领导小组，普遍开展了群众性的挖防空洞和防空壕的活动。（１９７２年４月，全国人民防空领导小组副组长改由叶剑英、李先念、张才千担任。１９７５年５月，邓小平任组长，李先念、杨成武任副组长。）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf6fa5656d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
