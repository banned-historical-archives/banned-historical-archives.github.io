["任永忠","沈阳医学院"],"dates":[{"year":1957,"month":6,"day":10}],"is_range_date":false,"parts":[{"text":"在沈阳医学院座谈会上的发言","type":"title"},{"text":"沈阳医学院任永忠","type":"authors"},{"text":"在六月十日、十一日该校座谈会上的发言","type":"subtitle"},{"text":"列宁在敌我阶级严重矛盾着的条件下所提出的建党原则是否适合于今天值得考虑","type":"paragraph"},{"text":"但是在社会主义思想和社会主义国家已经发展到成为全世界规模的今天，特别是自从党中央和毛主席根据马克思列宁主义的学说和原理提出来在社会主义社会里也存在着人民内部的矛盾的情况下，关于在敌我阶级严重矛盾着的条件下所提出的那种建党原则似乎应当根据当前情况和估计今后可能的发展与以具体的考虑，更有成效地保持党的高度的战斗力，更加密切联系着和党血肉相关的人民大众。这样我们的党更加坚强、更加巩固、更加壮大，全国党员将不是一千二百万而是将六亿（去了婴孩只少是三亿）：这样今后的历史将会证明，党和人民是完整的统一体，永远颠扑不破。","type":"paragraph"},{"text":"我的看法可能是十分错误的，但是本着知无不言，言无不尽的精神提出供党参考，最后我预祝这次大会的胜利成功和全体与会同志的身体健康？","type":"paragraph"},{"text":"他分析了“三害”的根源，批判了学院在教学改革和向苏联学习当中的教条主义和经验主义。任副教授说：“三害”的根源是什么，报纸上登了许多，三害的根源是从唯心主义的滋长而逐渐蔓延起来的，唯心主义的思想在党内外都非常严重，来源于党内，特别是来源于党中央，但我们决不否认共产主义，社会主义建设的成绩。唯心主义的思想方法，不断滋长。任副教授并例举了一些向中医学习，接受祖国医学遗产等方面的教条主义与经验主义。","type":"paragraph"},{"text":"他说，最初有王斌、贺诚。他们说中医是“封建医”，否认了中医，是不对的。中央又纠正，又大力学习中医，先者是左，后者是右。成立了中医研究院，祖传秘方也公布了，到处扎针拔罐子。中医是经验的医学，不是理论的，它不同于数学，物理，中医有些是完全唯心的。例如用保护疗法治阑尾炎，这样整，真不像样子。","type":"paragraph"},{"text":"许多事都采取了唯心主义的方法，我们标榜的是马列主义，而实际上是贩卖唯心主义。","type":"paragraph"}],"comments":[],"origin":"《章伯钧张百生等人言论集》（中国旅大市委宣传部编，一九五七年七月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d5e48d548"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
