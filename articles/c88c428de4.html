art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"西哈努克亲王离京去我国南方访问周恩来总理、黄永胜总参谋长、李先念副总理、吴法宪副总参谋长、郭沫若副委员长和宾努首相等到车站欢送 军委副主席叶剑英陪同柬埔寨贵宾前往参观访问","authors":[],"parts":[{"type":"paragraph","text":"新华社十六日讯 柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，由中共中央军委副主席叶剑英陪同，今天乘专车离开北京前往我国南方参观访问。"},{"type":"paragraph","text":"随同西哈努克亲王访问的有：西哈努克亲王的姑母诺罗敦·凯卡妮姐公主，柬埔寨王国民族团结政府军需、军备大臣杨森安将军和夫人，国家元首办公厅主任西索瓦·梅达维亲王，柬埔寨驻中国大使凯密等。"},{"type":"paragraph","text":"前往车站欢送的有："},{"type":"paragraph","text":"国务院总理周恩来，中国人民解放军总参谋长黄永胜，国务院副总理李先念，中国人民解放军副总参谋长吴法宪，人大常委会副委员长郭沫若，以及有关方面负责人王新亭、吴德、李强、方毅、韩念龙、苑化冰、郭鲁、丁西林、林佳楣、王珍、曹克强、韩叙；"},{"type":"paragraph","text":"柬埔寨民族统一阵线中央政治局主席、王国民族团结政府首相宾努亲王和夫人，西哈努克亲王的子女诺罗敦·尤瓦那王子和诺罗敦·伦赛公主，柬埔寨王国民族团结政府大臣沙林察、周成、江裕朗、秀木、谢桑、吉春和夫人、秀蒲拉西、副大臣万比尼，柬埔寨驻朝鲜大使洪金宽和夫人。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召以及杨玲同志也陪同柬埔寨贵宾去我国南方访问。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"吴法宪","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"黄永胜","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c88c428de4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
