<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"歌唱毛主席诗词　宣传毛泽东思想“上海之春”毛主席诗词演唱专场激励听众革命斗志","authors":[],"dates":[{"year":1966,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　歌唱毛主席诗词，宣传毛泽东思想，积极参加社会主义文化大革命!第七届“上海之春”的毛主席诗词演唱专场，体现了上海音乐工作者的这种昂扬斗志。前晚举行的这场演出，始终在热烈的气氛中进行，台上台下，情绪活跃，演唱人员和听众，都从毛主席的诗词中受到教育，得到鼓舞。"},{"type":"paragraph","text":"毛主席诗词是广大人民所热爱和广泛传诵的；已经谱曲的毛主席诗词，也在群众中广为流传。这次演唱专场演出的二十多首毛主席诗词中，有独唱、评弹、合唱等，都获得听众热烈的欢迎。"},{"type":"paragraph","text":"上海音乐学院、上海实验歌剧院等单位演唱的独唱《沁园春·雪》《西江月·井冈山》《卜算子·咏梅》《蝶恋花·答李淑一》《水调歌头·游泳》《七律·长征》《浪淘沙·北戴河》《忆秦娥·娄山关》《七律二首·送瘟神》《渔家傲·反第一次大“围剿”》《清平乐·会昌》《满江红·和郭沫若同志》等演唱词曲，听众都比较熟悉。演唱人员以饱满的革命激情，努力地去反映毛主席诗词中的伟大思想和革命精神，将热爱毛主席、宣传毛泽东思想的感情，融合在歌声里，使听众有了新的感受，得到了新的教育。"},{"type":"paragraph","text":"评弹演唱中，《七律·到韶山》和《七绝·为李进同志题所摄庐山仙人洞照》都是新谱的曲调，在听众中产生了强烈的影响。这两首诗和另两阕加唱的词《如梦令·元旦》《菩萨蛮·大柏地》等新演唱都是上海市人民评弹团从新谱的八首诗词中选出来参加“上海之春”的。其他参加演唱的如《七绝·为女民兵题照》《十六字令三首》《七律二首·送瘟神》等诗词，曲调及演唱形式都有新的加工。"},{"type":"paragraph","text":"上海合唱团演唱的大合唱《七律·人民解放军占领南京》《七律·到韶山》《菩萨蛮·大柏地》《七律·长征》等，气势磅礴，充满激昂的革命感情，也受到听众的热情赞扬。"},{"type":"paragraph","text":"这次参加毛主席诗词演唱的各个单位，都表示了要突出政治，坚持学习毛主席著作，更好地演唱毛主席诗词，宣传毛泽东思想。他们认真地去理解毛主席诗词所表现的时代背景和当时的斗争形势，去反复体会诗词中的革命意境和崇高的思想。大家互相帮助，力求在原有的演唱水平上，能更进一步地去体现毛主席诗词的伟大思想内容。谱曲和演唱人员表示:在社会主义文化大革命的新形势下，我们要大唱毛主席诗词，宣传毛泽东思想，要高举毛泽东思想的伟大红旗，把社会主义文化大革命进行到底!"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\05\\665k010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(图为上海合唱团演唱毛主席诗词《七律·长征》)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f9ee23c3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
