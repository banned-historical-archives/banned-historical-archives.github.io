-historical-archives/banned-historical-archives9/main/books/maoxuan-jinghuo.pdf"],"article":{"title":"要搞一点原子弹氢弹","parts":[{"text":"要搞一点原子弹氢弹","type":"title"},{"type":"paragraph","text":"我还是希望搞一点海军，空军搞得强一点。还有那个原子弹，听说就这么大一个东西，没有那个东西，人家就说你不算数。那么好，我们就搞一点。搞一点原子弹，氢弹，我看有十年功夫完全可能。一年不是抓一次，也不是抓两次，也不是抓四次，而是抓它七八次。要下决心，搞尖端技术，赫鲁晓夫不给我们尖端技术极好。如果给了，这个账是很难还的。搞一些人吃饭不干别的，五年不行，十年，总是可以搞出来的。原子弹要有，氢弹也要快。管它什么国，管它什么弹，原子弹，氢弹，我们都要超过。"},{"type":"paragraph","text":"西方资产阶级有的，东方无产阶级要有；西方资产阶级没有的，东方无产阶级也要有。"}],"comment_pivots":[],"dates":[{"year":1958,"month":6,"day":21}],"is_range_date":false,"authors":["毛泽东"],"comments":[],"page_start":1212,"page_end":1212,"description":"这是毛泽东同志在中共中央军委扩大会议上讲话的节录。","alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60be3f1a73"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
