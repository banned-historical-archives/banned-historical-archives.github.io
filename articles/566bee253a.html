<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学好革命理论　掌握斗争大方向","authors":["学习毛主席著作的模范红九连"],"dates":[{"year":1976,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学好革命理论　掌握斗争大方向"},{"type":"paragraph","text":"学习毛主席著作的模范红九连"},{"type":"paragraph","text":"我们九连同志满怀革命激情，学习了《人民日报》社论《翻案不得人心》中发表的毛主席的重要指示：“社会主义革命革到自己头上了，合作化时党内就有人反对，批资产阶级法权他们有反感。搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”毛主席这一重要指示，是对我国社会主义时期阶级关系极其深刻的马克思列宁主义的分析，是我们批判党内不肯改悔的走资派、反击右倾翻案风的强大的思想武器。"},{"type":"paragraph","text":"列宁曾经指出：“社会主义革命不是一次行动，不是一条战线上的一次战斗，而是充满了剧烈的阶级冲突的整整一个时代，是在一切战线上，也就是说，在经济和政治的一切问题上的长长一系列的战斗，这些战斗只有靠剥夺资产阶级才能完成。”这就告诉我们，在整个社会主义历史时期，阶级斗争贯穿始终，存在于各条战线、各个领域，无产阶级必须在一切领域、一切战线上对资产阶级实行全面专政。近两年来，我们连结合学习无产阶级专政理论，对社会上的阶级斗争的现状作了调查。事实说明，被打倒了的地主资产阶级，他们人还在，心不死，时时刻刻都在窥测方向，以求一逞；新的资产阶级分子也在不断地出现；小生产“经常地、每日每时地、自发地和大批地产生着资本主义和资产阶级”。这些活生生的事实告诉我们，阶级矛盾和阶级斗争是长期存在的，而且必然要反映到党内来。党内走资本主义道路的当权派，就是代表了新旧资产阶级向无产阶级发动进攻。"},{"type":"paragraph","text":"我们知道，社会主义社会存在着阶级和阶级斗争，主要矛盾是无产阶级与资产阶级之间的矛盾。可是，资产阶级在哪里呢？毛主席最近的指示，对此作了深刻的分析。列宁也曾指出：“在无产阶级专政时代，阶级依然存在，但每个阶级都起了变化，它们相互间的关系也起了变化。在无产阶级专政条件下，阶级斗争并不消失，只是采取了别的形式。”这就引导我们如何正确地认识社会主义时期的阶级和阶级斗争，如何正确地分析阶级关系及其变化。在无产阶级专政条件下，我们不仅要和社会上的地主资产阶级作斗争，而且更要注意同党内的资产阶级代表人物作斗争。这些人过去是跑到无产阶级革命队伍里来的资产阶级民主派。在社会主义革命越来越深入的情况下，他们的思想还停留在民主革命阶段，对批判资本主义要反对，对限制资产阶级法权有抵触，总想维护旧的传统观念和既得利益，完全站到资产阶级一边去了。而且，由于滋生资本主义和资产阶级的土壤和条件还存在，在工人阶级中，在共产党员中，在国家机关工作人员中，都会产生一些新的资产阶级分子，也成为党内走资派复辟资本主义的阶级基础。这就说明了，整个社会主义历史阶段的主要矛盾是无产阶级同资产阶级的矛盾，主要危险是修正主义，革命的对象是资产阶级，重点是党内走资本主义道路的当权派。"},{"type":"paragraph","text":"我们学习了毛主席的重要指示，就进一步看清了，党内那个不肯改悔的走资派抛出“三项指示为纲”的修正主义纲领，否认以阶级斗争为纲，改变党的基本路线，要复辟资本主义，正是代表党内外新老资产阶级向无产阶级进攻。我们一定要遵照毛主席指出的斗争大方向，把矛头对准党内那个不肯改悔的走资派的修正主义路线，把反击右倾翻案风的斗争进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"566bee253a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
