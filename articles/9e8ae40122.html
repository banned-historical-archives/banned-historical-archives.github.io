script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"回击资产阶级反动路线的反扑","authors":["马延昌"],"dates":[{"year":1967,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"回击资产阶级反动路线的反扑"},{"type":"paragraph","text":"哈尔滨师范学院原党委组织部副部长　马延昌"},{"type":"paragraph","text":"《红旗》杂志《在干部问题上的资产阶级反动路线必须批判》等文章发表后，使我进一步认识了资产阶级反动路线的罪恶，更激起了我的仇恨。资产阶级反动路线就是要使我国改变颜色，断送我们的革命成果，断送我们的社会主义江山。我们在毛主席的革命路线指引下，打退了资产阶级反动路线的进攻。但是，党内走资本主义道路的当权派并不甘心于他们的失败，总是千方百计地阴谋复辟。现在，他们企图把“排斥一切”、“打倒一切”的罪名强加在革命小将们的身上，这是他们的新反扑！"},{"type":"paragraph","text":"“排斥一切”、“打倒一切”，以及对犯错误的干部无情打击，是党内头号走资本主义道路当权派的一贯主张，是这次文化大革命中提出资产阶级反动路线的那几个人搞的。他们在运动一开始，就划框框，定调子，大派工作组，一方面镇压革命群众，一方面在干部问题上实行“打击一大片，保护一小撮”的反动政策。在这条资产阶级反动路线的指导下，我院党内一小撮走资本主义道路的当权派，也依法炮制。他们派工作组到各系以后，欺骗、蒙蔽干部和群众，拉一伙，打一伙，来保他们自己。相反的，我院红色造反团认真贯彻执行了毛主席的革命路线。他们对干部进行阶级分析，区分两类不同性质的矛盾，执行了毛主席的“惩前毖后、治病救人”的干部政策。"},{"type":"paragraph","text":"我在这次无产阶级文化大革命运动中，忠实地执行了资产阶级反动路线，充当了党内一小撮走资本主义道路当权派的工具，走到了危险的边缘。革命小将挽救了我，把我从泥坑里拉出来，帮助我认识错误和寻找犯错误的原因。先后四十多人次和我谈话，用毛泽东思想武装我的头脑，对我进行耐心的教育。他们让我和党内一小撮走资本主义道路当权派划清界线，和资产阶级反动路线划清界线，给我许多机会，让我检查，亮相。我每前进一步，他们都给我很大的鼓励。提出资产阶级反动路线的人，企图把“打倒一切”、“排斥一切”的罪名强加在革命小将的身上，是万万办不到的。这是党内一小撮走资本主义道路当权派的阴谋，我坚决用我的切身体会揭露他们，回击他们。在这场尖锐复杂的阶级斗争中，我要勇敢地站起来，和革命小将共同站在一起，粉碎资产阶级反动路线的新反扑，誓死捍卫毛主席的无产阶级革命路线。坚决不允许党内一小撮走资本主义道路当权派往革命小将脸上抹灰。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e8ae40122"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
