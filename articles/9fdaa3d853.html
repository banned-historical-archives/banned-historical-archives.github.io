script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji44","name":"毛泽东全集第44卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对浙江省委关于重点商品粮地区存在问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对浙江省委关于重点商品粮地区"},{"type":"paragraph","text":"存在问题的报告的批语"},{"type":"paragraph","text":"（1960年11月25日）周总理："},{"type":"paragraph","text":"此件如未看过，请看一下，退回子恢同志。子恢同志最近考察了山西、河北、安徽、江苏四省，有些好的意见，你有暇时，可找他一谈。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月廿五日"},{"type":"paragraph","text":"[1]指中共浙江省委1960年8月26日关于重点商品粮地区存在的问题给中央并上海局的报告。报告说，我们在讨论中央大办农业、大办粮食的指示时，具体讨论了重点商品粮地区的问题。我们认为，除了进一步加强领导，深入发动群众改造落后队以外，还必须从负担政策、粮价和使用国家扶助穷队资金等方面采取有效措施，支持这些地区发展生产。近几年这些地区不断发生问题，今年春季发生饿、病、逃荒现象的也主要集中在这些地方。在一些问题特别严重的地区，几年来生产发展很慢，有的甚至停顿下来，致使群众情绪低落，生产力受到一定破坏。除了领导和工作上的原因外，主要是由于负担过重，收入少。商品粮重点县中，有10个县1959年粮食征购任务平均每亩负担在300斤以上。商品粮重点产区，农业税又比其他地方重，毛泽东全集第四十四卷越是人均产量高的地方，农业税率就越高。此外，粮价低也影响了这些地区农民的收入。我们研究了这些情况后，认为要大办粮食，必须采取以下措施：（一）根据几年来的情况，在保证完成国家任务的前提下，合理调整各县市之间的征购任务。（二）降低重点商品粮地区的农业税率，原则上不超过定产产量的11%。（三）有重点地调整粮价，准备把产商品粮1000万斤以上的公社，每斤提高一分钱。（四）国家扶助穷队的资金，主要用在重点商品粮地区，帮助这些地区的穷队发展生产。11月23日，中共中央农村工作部部长、国务院副总理邓子恢给毛泽东写信说：“你那天说没有看到《浙江省委关于重点商品粮地区存在问题》的报告，现将此电报查出送上，请收阅。”毛泽东的批语，就写在邓子恢的来信上。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":11,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":82,"page_end":83},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fdaa3d853"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
