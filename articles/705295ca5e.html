art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"给农村俱乐部送毛主席著作","authors":["纪正功"],"parts":[{"type":"paragraph","text":"一周紧张愉快的野营训练结束了。一天，六班的同志跟着班长占松林去谢厝街村农村俱乐部参观。他们走进俱乐部，书桌上摆满了各种书籍杂志，报架上放着各种报纸，墙壁上贴满了各种英雄人物的画片，同志们被这一切吸引住了。就在这时候，同志们发现图书桌上什么书籍都摆得满满的，可是一本毛主席著作也没看到。他们很奇怪，一了解，原来俱乐部的毛主席著作都被社员借光了。同志们看到社员这股子大学毛主席著作的劲头，心里十分感动。他们一商量，便立即买了一些书送去。"},{"type":"paragraph","text":"下午三点多钟，六班的同志正在屋里听班长讲故事，谢厝街村党支部书记带着社员敲锣打鼓地来了。他紧紧握住六班长的手说：“同志，谢谢你们，全体谢厝街村的社员都谢谢你们。今天中午，社员劳动回来，读着你们赠送的毛主席著作，都感激地说，毛主席给社员指明了前边的方向，解放军是社员学习的榜样！”      （纪正功）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"705295ca5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
