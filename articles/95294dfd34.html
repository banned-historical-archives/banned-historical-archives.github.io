"采薇"],"dates":[{"year":1958,"month":5,"day":28}],"is_range_date":false,"parts":[{"text":"教授并不神秘","type":"title"},{"text":"采薇","type":"authors"},{"text":"教授、专家的称号，对于不少人来说，有一种莫名其妙的神秘感。有人迷信教授，有人害怕专家，在这些人看来，似乎教授的标准高不可攀，可望而不可及；教授所掌握的知识，仿佛也是不可超越的。迷信教授、害怕专家的思想，表明有人在夺取科学文化堡垒的进程中，还处于被奴役的精神状态。","type":"paragraph"},{"text":"其实，教授、专家并不是高不可攀的。教授之所以为教授，无非是因为他们有知识。在旧社会里，劳动人民被剥夺了受教育的权利，产生了自馁的情绪和妄自菲薄的自卑感。可是在今天，人人都有上学、求知识的权利；有了知识，谁都可以当专家、当教授。我们不迷信非要到欧美去留洋、镀金才能取得教授、专家的头衔。工农出身的老干部，有了知识，可以到大学去开课，没有进过大学之门的土专家，他们解决实际问题的能力，早已超过了自命不凡的洋专家哩！","type":"paragraph"},{"text":"盲目崇拜教授、迷信专家，是因为人们还没有从屈从于资产阶级的意识形态里解放出来。在反右派和双反运动中，人们看到有一些“教授”所贩卖的货色，实际是一种“文明式”的糖衣炮弹，样子虽文明，其实是毒草。堂堂教授为了名利，可以见利忘义；自命清高的高级知识分子，可以把知识当作商品，浑身散发着奸商的气息……。有些青年知识分子追求教授、专家的头衔，不正是因为他们既有“名”又有“利”吗?然而这种人难道值得我们来钦佩?工人阶级知识分子，对于坚持资产阶级方向的教授和专家，不但不应当迷信，而且还要敢于“评头论足”，敢于蔑视他们，敢于拔掉他们的白旗，插上我们的红旗。这才是无产阶级应有的革命风格。","type":"paragraph"},{"text":"盲目迷信教授，还因为人们没有实事求是地认清事物的本质，被他们的唬人的假相所吓倒。在现今的教授中，有人确实是有学问的，但学问也就是那么多；不用说在社会科学方面有真才实学的为数极少，就是在自然科学方面，教授、专家的学问也没有什么了不起的。一位著名的化学教授自己承认，“过去不愿意接受生产部门的研究题目，就是因为怕解决不了问题，丢了大专家的脸皮”。某教授几十年来一直被推崇为某一界的权威，但在这次教学辩论中，人们发现他的学问也是有限的，他过去借以“成名”的几篇论文，仅仅是一些从外国杂志上整理出来的“读书报告”而已，既没有系统的理论，也没有独创的见解，更谈不上服务于生产实际。能否解决实际问题，是我们用来检验教师业务水平的标尺，那种光凭“学位”、“论文”来抬高身价的旧标准早该把它抛弃。","type":"paragraph"},{"text":"看来，对教授的所谓“神秘感”，是完全可以打破的。资产阶级学者们要有自知之明，狠狠地打掉那种莫名其妙的优越感，力争作一个又红又专的工人阶级知识分子。工农知识分子和知识青年们，要狠狠地打掉那种莫名其妙的自卑感，高举无产阶级的红色旗帜，用共产主义的大无畏精神攀登到科学的顶峰上去！","type":"paragraph"}],"comments":[],"origin":"原载“北京日报”1958年5月31日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95294dfd34"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
