:1976,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"斥邓小平造谣"},{"type":"paragraph","text":"首都医院内科主任　张孝骞"},{"type":"paragraph","text":"天安门广场发生的反革命政治事件，决不是偶然的、孤立的，而是蓄谋已久的，是邓小平反革命的修正主义路线的必然产物。邓小平就是这一反革命事件的罪魁祸首。我们一定要以阶级斗争为纲，牢牢掌握斗争大方向，彻底批判邓小平的反革命罪行。"},{"type":"paragraph","text":"天安门广场的反革命事件也使我受到一次极其深刻的教育。党内最大的不肯改悔的走资派邓小平，为了达到其复辟资本主义的罪恶目的，在知识分子问题上也大做文章。他别有用心地挑拨知识分子和党的关系，说什么对知识分子“要使用、教育，还要保护”，就是闭口不讲“改造”，说什么一提“改造”，知识分子的积极性就调动不起来了。他装出一副“关心”、“爱护”知识分子的样子，实际上包藏着极其险恶的用心。他采用卑鄙的手段，在我乘车的问题上，无中生有地指责领导“为什么把张孝骞的汽车卡掉了？张孝骞走路上班，过马路时险些给汽车轧了”。这完全是造谣，我感到非常气愤。"},{"type":"paragraph","text":"事实上，党对象我这样的知识分子向来是十分关心的。党对知识分子“团结、教育、改造”的政策，真正体现了党对知识分子的无微不至的关怀和爱护。拿我自己来说，正是由于解放以来历次政治运动，特别是无产阶级文化大革命和批林批孔运动对我的教育和帮助，使我更加明确了政治方向，焕发了革命青春。我现在已经七十九岁了，受到党和人民的优厚待遇，而自己对社会主义的贡献却太少了。现在我看书、看资料的时间不是少了，而是比以往任何时候都多；我的积极性不是调动不起来，而是感到有使不完的劲。工作十分愉快，生活和健康等方面都受到党的照顾，交通问题也早已解决。邓小平在我乘车问题上造谣完全是别有用心的。"},{"type":"paragraph","text":"去年夏季前后，政治谣言甚嚣尘上。邓小平就是这个谣言公司的总经理。在天安门广场行凶作恶的一小撮反革命分子，又大造反革命政治谣言，把矛头直接指向伟大领袖毛主席，分裂党中央，妄图颠覆无产阶级专政，复辟资本主义。邓小平在我身上打主意，造谣言，也是把矛头指向毛主席的革命路线和党对知识分子的政策。"},{"type":"paragraph","text":"通过天安门广场的反革命政治事件，我进一步看清了邓小平的反动面目。我决不上他的当，受他的骗。我决心努力学习毛主席的著作，继续努力改造思想，积极参加批判邓小平、反击右倾翻案风的伟大斗争，尽力为无产阶级革命卫生事业多做些事情，更好地为工农兵服务。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91c316a26b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
