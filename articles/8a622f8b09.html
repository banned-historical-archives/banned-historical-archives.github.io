art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"万岁，万岁，毛主席！","authors":["廖代谦"],"parts":[{"type":"paragraph","text":"欢乐的电波飞万里，"},{"type":"paragraph","text":"胜利凯歌震大地，"},{"type":"paragraph","text":"我国的氢弹爆炸成功了，"},{"type":"paragraph","text":"漫天东风展红旗！"},{"type":"paragraph","text":"丛林化笔海化砚，"},{"type":"paragraph","text":"写不尽毛泽东思想的新胜利，"},{"type":"paragraph","text":"千言万语凝成一句话："},{"type":"paragraph","text":"万岁，万岁，毛主席！"},{"type":"paragraph","text":"毛主席指引的大路最宽广，"},{"type":"paragraph","text":"文化大革命创奇迹，"},{"type":"paragraph","text":"革命的缰绳握在手，"},{"type":"paragraph","text":"跃进的骏马不停蹄！"},{"type":"paragraph","text":"按照毛主席的英明预言，"},{"type":"paragraph","text":"红色氢弹腾空起，"},{"type":"paragraph","text":"灭尽帝修反的臭威风，"},{"type":"paragraph","text":"大长革命人民的志气！"},{"type":"paragraph","text":"毛主席呀，毛主席！"},{"type":"paragraph","text":"我们无限信赖您，"},{"type":"paragraph","text":"您的话字字都应验，"},{"type":"paragraph","text":"您的话句句是真理。"},{"type":"paragraph","text":"跟着您，激流险滩挡不住，"},{"type":"paragraph","text":"跟着您，天大困难化为夷，"},{"type":"paragraph","text":"跟着您，无产阶级顶天立地站起来，"},{"type":"paragraph","text":"跟着您，中国人民开创新世纪！"},{"type":"paragraph","text":"欢庆胜利放声唱，"},{"type":"paragraph","text":"《东方红》歌声遍地起，"},{"type":"paragraph","text":"千支曲呀万支歌，"},{"type":"paragraph","text":"支支歌颂毛主席！"},{"type":"paragraph","text":"毛主席万岁，万万岁！"},{"type":"paragraph","text":"万岁，万岁，毛主席！"},{"type":"paragraph","text":"毛主席万岁，万万岁！"},{"type":"paragraph","text":"万岁，万岁，毛主席！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a622f8b09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
