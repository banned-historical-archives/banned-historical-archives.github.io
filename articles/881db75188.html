"authors":[],"dates":[{"year":1980,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昌都地委书记在西藏自治区党委扩大会议上表示"},{"type":"paragraph","text":"狠批极左  迅速落实中央对西藏指示"},{"type":"paragraph","text":"据新华社拉萨六月五日电 在西藏自治区党委扩大会议上，昌都地委第一书记杨有才（藏族）表示，回去以后要组织干部彻底肃清林彪、“四人帮”的流毒，把中央指示和中央领导同志的建议变为实际行动。这几天，他和地、县两级干部一起，研究制定了“治穷”的七项措施：一、狠批极左，解放思想，迅速落实人的政策、经济政策、民族政策、宗教政策，调动一切积极因素，尽快提高昌都人民的生活水平；二、对规模过大的不利于生产，不方便群众的生产队要作调整，尽量照顾自然村，一般以二十户左右为宜；三、农业上要切实尊重生产队的自主权，普遍推广包工到组、联系产量计算报酬的办法，对于一些人民生活长期困难，工作长期上不去的生产队可以实行"},{"type":"paragraph","text":"“大包干”、“口粮田”的办法，也可以实行“包产到户”的办法；四、大力发展畜牧业，扩大自留畜，对山羊、黄牛、杂牛实行队有户养，超产的仔畜和畜产品归户；五、在遵守国家有关政策、保护资源的前提下，鼓励社员搞副业和手工业生产；六、认真落实好自留地、自留树、自留山的政策，社员房前屋后种植作物、树木归社员自己所有；七、鼓励“冒尖”的富队富户广开财源，富上加富；扶持穷队穷户发展生产，政策上要更加放宽，使他们尽快翻身。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"881db75188"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
