script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向全国妇女进行一次政治思想教育　提高社会主义觉悟肃清资产阶级思想认真贯彻勤俭建国勤俭持家的方针","authors":[],"dates":[{"year":1957,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向全国妇女进行一次政治思想教育"},{"type":"paragraph","text":"提高社会主义觉悟肃清资产阶级思想认真贯彻勤俭建国勤俭持家的方针"},{"type":"paragraph","text":"据新华社19日讯　中国妇女第三次全国代表大会会议经过连日来的讨论，代表们一致表示要把勤俭建国、勤俭持家当成一个重大的战斗任务来执行。她们提出，为了切实贯彻执行这个任务，在妇女中全面展开一次政治思想教育运动，提高妇女的社会主义思想觉悟，是极为必要的。"},{"type":"paragraph","text":"江苏省副省长吴贻芳在会上说，不提高妇女的社会主义觉悟，不改造自己的思想，就不可能更好地贯彻勤俭建国勤俭持家的方针。她举例说，节约粮食、节约棉布等重要政策，在道理上很容易为大家所接受，但在具体实行时，非有赖于全国妇女提高自己的社会主义觉悟不可。她说，必须把个人利益和集体利益的关系，眼前利益和长远利益的关系，完全放在正确的地位上，这样就需要妇女们有决心改造自己，肃清头脑中自私自利的资产阶级思想意识。"},{"type":"paragraph","text":"很多代表认为，目前通过社会主义大辩论，加强对妇女群众的政治思想教育工作是极为重要的。会上谈到，目前有的地方已经发现在一部分妇女当中还存在着不少旧的思想，如有的女农业社员不关心社的管理，单纯依赖农业社来解决一切问题；在女职工中，有些人认为做工是“受苦”，少数青年女职工比吃比穿；有些市民对统购统销不满意，以及存在轻视劳动的思想。北京市妇联副主任王子如认为这些思想必须经过长期艰苦的政治思想工作才能克服，而目前的全国大辩论正是最好的教育方法。纺织工业部副部长张琴秋特别谈到对青年女工的教育问题。她说，由于大量新纺织工厂的建设，数以万计的年青姑娘走进了新纺织厂。她们不像老大姐们尝受过帝国主义和资本家压迫剥削的痛苦，没有经过激烈的阶级斗争的锻炼，因此，她们还没有具有真正工人阶级的思想品质，她们很容易接受资产阶级思想的诱惑，特别容易在虚荣中毁坏自己，因此艰苦朴素的教育对她们更有现实的意义。"},{"type":"paragraph","text":"一些高级知识分子妇女在会上谈到了她们自身改造的必要。出身在一个知识分子家庭的女水利专家钱正英，在书面发言中说，只有共产党才使她跨出了个人和家庭的小天地，走上了革命的道路。"},{"type":"paragraph","text":"南京师范学院教授刘开荣和黄友葵都谈到了高级知识分子思想改造的问题。她们认为，改造的道路只有参加实际斗争，接受共产党的领导，才能坚定地树立无产阶级立场。"},{"type":"paragraph","text":"今天在大会上发言的有二十八位代表，另有一百二十四位代表作了书面发言。"},{"type":"paragraph","text":"右派分子丁玲、彭子冈在会上作了一些交代。谭惕吾、李健生作了书面交代。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"534cd1bd75"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
