tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平会见南斯拉夫记者"},{"type":"paragraph","text":"中共中央副主席邓小平13日上午会见了南斯拉夫记者达拉·雅奈科维奇，同她进行了亲切友好的谈话。"},{"type":"paragraph","text":"李先念会见挪威工人共产党（马列）代表团"},{"type":"paragraph","text":"中共中央副主席李先念13日上午在人民大会堂会见以主席保尔·斯泰根为团长的挪威工人共产党（马列）代表团。双方就一些重大国际问题和进一步发展两党关系进行了亲切的交谈。挪威同志是10月29日来我国访问的。"},{"type":"paragraph","text":"杨得志一行离京去巴基斯坦访问"},{"type":"paragraph","text":"中国人民解放军总参谋长杨得志一行应巴基斯坦武装部队参谋长联合委员会主席伊克巴尔上将的邀请，13日上午乘飞机离开北京前往巴基斯坦进行正式友好访问。"},{"type":"paragraph","text":"到机场送行的有中国人民解放军有关方面负责人杨勇、刘道生、成钧、柴成文，以及巴基斯坦驻华大使馆临时代办卡迪尔、空军武官古尔上校、海军武官夏蒙上校等。"},{"type":"paragraph","text":"一千四百多个县开展林业“三定”"},{"type":"paragraph","text":"稳定山权林权、划定自留山和确定林业生产责任制（简称林业“三定”）工作，已在全国二十六个省、自治区的一千四百四十六个县展开。通过“三定”，各地普遍反映，林权稳，人心定，责任明，收益增，收到了明显的效果。“三定”搞得比较好的山东省莱芜县，今年雨季上山的劳动力达四万多，一季整地四万多亩，超过原计划一倍以上。四川省内江地区把被洪水冲光的宜林河滩地划分到户后，实行自育苗、自栽树、得利归己的办法，全区各县（市）很快采集了柏树、按树等种子十五万多斤，并在完成原育苗计划的基础上，秋季又新育苗一万亩。不少地方划定自留山和责任山后，当年就造上了林。陕西省共划自留山（有的是荒滩）四百二十万亩，当年就造林一百万亩。广东省河源县九百多户社员还办起了小果园、小茶园、小杉木园。做好“三定”工作，有效地制止了乱砍滥伐，加强了森林的保护管理。"},{"type":"paragraph","text":"我国渤海又一口探井喷油"},{"type":"paragraph","text":"我国渤海中日石油勘探开发合作区第三口探井又喷出了原油。这口探井，位于中日合作区前两口出油探井西部海域的另一个构造上。今年8月20日开钻，10月14日完钻，井深三千米，是由我国渤海八号钻井船承包钻探的。"},{"type":"paragraph","text":"这口井打到井深二千一百六十八米至二千一百八十四米时，在下第三系发现两个含油气层，总厚度为九点五米。11月9日至11日进行试油，日产原油二百七十二吨，天然气三万三千立方米，油质很好。"},{"type":"paragraph","text":"福建决定加强革命老根据地建设"},{"type":"paragraph","text":"中共福建省委和省人民政府最近作出关于加强革命老根据地建设的决定，要求各级党委和人民政府把革命老根据地的生产建设摆到主要议事日程上，作出切合实际的规划，尽快改变革命老根据地的落后面貌。要求从人力，物力、财力等方面给予扶持。有关部门要选派一批人员到革命老根据地的社队工作。要认真做好优抚、救济工作。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"杨得志","type":"人物"},{"name":"李先念","type":"人物"},{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"906ed1f121"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
