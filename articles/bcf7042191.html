:1961,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京田日电】　党和国家的领导人连日来先后到中山公园中山堂，悼念中国人民忠诚的革命战士陈赓同志。"},{"type":"paragraph","text":"中共中央副主席、国务院总理周恩来，中共中央副主席、国务院副总理兼国防部任林彪元帅，中共中央政治局委员、中华人民共和国副主席董必武，中共中央总书记邓小平，中共中央政治局委员彭真、陈毅元帅、刘伯承元帅、李先念，中央政治局候补委员乌兰夫、陆定一、康生、薄一波，中共中央委员徐向前元帅，国务院副总理兼中国人民解放军总参谋长罗瑞卿大将，国务院副总理习仲勋，全国人民代表大会常务委员会副委员长郭沫若、陈叔通、林枫，国防委员会副主席张治中、傅作义等，先后在陈赓同志遗象前静默致哀。在离开灵堂的时候，还慰问了陈赓同志的家属。"},{"type":"paragraph","text":"这期间，中共中央副主席、全国人民代表大会常务委员会委员长朱德元帅，贺龙元帅、罗荣桓元帅、聂荣臻元帅、叶剑英元帅，副委员长程潜、何香凝，也分别电唁陈赓同志的亲属，对陈赓同志的逝世，表示沉痛的哀悼。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1961,"month":3,"day":26}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"党和国家领导人吊唁陈赓同志","authors":[],"parts":[{"type":"paragraph","text":"新华社25日讯 党和国家的领导人连日来先后到中山公园中山堂，悼念中国人民忠诚的革命战士陈赓同志。"},{"type":"paragraph","text":"中共中央副主席、国务院总理周恩来，中共中央副主席、国务院副总理兼国防部长林彪元帅，中共中央政治局委员、中华人民共和国副主席董必武，中共中央总书记邓小平，中共中央政治局委员彭真、陈毅元帅、刘伯承元帅、李先念，中央政治局候补委员乌兰夫、陆定一、康生、薄一波、中共中央委员徐向前元帅，国务院副总理兼中国人民解放军总参谋长罗瑞卿大将，国务院副总理习仲勋，全国人民代表大会常务委员会副委员长郭沫若、陈叔通、林枫，国防委员会副主席张治中、傅作义等，先后在陈赓同志遗象前静默致哀。在离开灵堂的时侯，还慰问了陈赓同志的家属。"},{"type":"paragraph","text":"这期间，中共中央副主席、全国人民代表大会常务委员会委员长朱德元帅、贺龙元帅、罗荣桓元帅、聂荣臻元帅、叶剑英元帅，副委员长程潜、何香凝，也分别电唁陈赓同志的亲属，对陈赓同志的逝世，表示沉痛的哀悼。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcf7042191"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
