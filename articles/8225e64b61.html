南音专","陈文勋"],"dates":[{"year":1957,"month":6,"day":9}],"is_range_date":false,"parts":[{"text":"还我自由！个性解放！","type":"title"},{"text":"西南音专陈文勋","type":"authors"},{"text":"还我自由！个性解放！　　　　西南音专学生陈文勋等","type":"subtitle"},{"text":"(西南音专“呐喊社”6月9日大字报)","type":"subtitle"},{"text":"多年来思想教育的结果，造成了我国青年大多只具共性，丧失个性，某国青年代表团来访问我国后曾提出疑问：中国青年为何都象一个模型出来的？大学中空气何以不活跃？沉默？","type":"paragraph"},{"text":"其实很容易理解的，因为讲主义最吃得开，否则就有被认为反革命分子或思想不清的危险。老干部是教条大将，小干部们不甘落后，争取成为教条小将，一个个光会喊口号，跟在人家后面跑，自己没有独立见解。凡领导讲的话，一概接受，唯唯诺诺，言听计从，连孝子也没有这么乖！领导放个屁也是香的，这样就造成黑白不明，呆头呆脑，老气横秋，每人都会来上一大堆的理论，开口马列主义，闭口也是马列主义，真令人耽心，再这样发展下去，是否会“马列教！”吃饭睡觉都要先祷告一番：“马列主义赐我恩，吃饭睡觉记在心……阿门。”不信仰的就是思想落后，不愿暴露思想问题，个人主义、无组织、无纪律、无立场、自甘堕落……。","type":"paragraph"},{"text":"川大送来呼吁书后，唤醒了很多沉睡昏迷的同学，然而有一批“尾巴”害怕得很啊！这怎么了得。这些论调是“煽动性”的，“是反革命的！”(？)","type":"paragraph"},{"text":"试问什么叫革命？什么是反革命？这些人分辩得清吗？煽动性有什么不好呢？既然要唤醒我国青年继承“五四”以来的革命传统，要救我们的个性，不带有“煽动性”，给予我们当头一棍，难道再来一套温清不成？我们还没有见到过。哪一种有力量的政治性文章不带有煽动性？","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选集》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8225e64b61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
