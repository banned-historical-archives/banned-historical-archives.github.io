"何占枢","周懋政","成都工学院","曾铁超","联钦察","邓明弢","陈堃","顾耀祖"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"有关匈牙利事件的右派言论","type":"title"},{"text":"成都工学院曾铁超邓明弢顾耀祖陈堃联钦察何占枢周懋政","type":"authors"},{"text":"教师：","type":"subtitle"},{"text":"“匈牙利事件完全是匈牙利政府官僚主义，不了解群众生活所造成，不是反革命和帝国主义勾结所造成。”(曾铁超)","type":"paragraph"},{"text":"“事物必先腐而后虫生，匈牙利反革命暴动是因为党搞肃反的后果，匈牙利党犯错误是匈牙利事件的主要原因。”“铁托敢于公开批评共产党是大胆的表现。”(邓明弢)","type":"paragraph"},{"text":"匈牙利事件后说：“马尔萨斯人口论有道理”(意指匈牙利事件是由粮食问题引起的)。(顾耀祖)","type":"paragraph"},{"text":"“党的和平外交政策是一种手段，因为我们的力量还不够强。”(陈堃)","type":"paragraph"},{"text":"学生：","type":"subtitle"},{"text":"“匈牙利事件主要由于政府工作中的缺点所造成，苏联出兵匈牙利与蒋介石请美国人来中国是一样的。”(联钦察)","type":"paragraph"},{"text":"“苏联出兵匈牙利是干涉，而不是援助，因为打着苏联的旗帜驻扎在别国的领土上。”(何占枢)","type":"paragraph"},{"text":"“匈牙利事件，苏联第一次出兵是必要的，第二次出兵是错误。”(周懋政)","type":"paragraph"},{"text":" 来源：《右派言论选集》（中共成都工学院委员会办公室，1957年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba0473ba34"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
