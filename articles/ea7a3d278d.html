art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席指到哪里我们打到哪里","authors":["“航空兵英雄中队”中队长董小海"],"parts":[{"type":"paragraph","text":"听到我们伟大领袖毛主席又一次检阅文化革命大军这个振奋人心的消息时，我兴奋极了。毛主席在两个多月的时间里，六次接见革命师生，这是对广大革命群众的最大关怀，也是对我们革命战士的最大鼓舞，给我们增添了无穷无尽的力量。我们要永远跟着毛主席闹革命，坚决捍卫以毛主席为代表的无产阶级革命路线，彻底批判资产阶级反动路线，永远沿着毛主席所指引的道路奋勇前进，誓把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"最近国防部授予我们中队以“航空兵英雄中队”的光荣称号。我们在保卫祖国领空的战斗中所取得的每一个胜利，都是毛泽东思想哺育的结果，都是毛泽东思想的胜利。有了毛泽东思想，我们刀山敢上，火海敢闯。毛主席指到哪里，我们就打到哪里。帝国主义、修正主义和一切牛鬼蛇神，通通都不在我们话下。我们永远忠于毛主席，忠于毛泽东思想，保卫无产阶级铁打的江山！"},{"type":"paragraph","text":"从草原来到天安门广场……（图片）RW：毛泽东；接见红卫兵；言论"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea7a3d278d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
