ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对离职休养老干部安置情况材料的批语","alias":"","parts":[{"type":"paragraph","text":"对离职休养老干部安置情况"},{"type":"paragraph","text":"材料的批语"},{"type":"paragraph","text":"（1964年12月2日）刘、周、邓、彭、贺阅，退毛。"},{"type":"paragraph","text":"二这个材料值得看一下。"},{"type":"paragraph","text":"[1]这个批语写在中国人民解放军总政治部主任办公室1964年11月25日编印的《政治工作简报》第六十五期刊载的《离职休养老干部安置的情况和问题》材料上。材料说，自总政治部1962年12月下发《关于妥善安置年大体弱老干部的通知》以来，各级党委对部分年大体弱老干部离职休养的审批、安置工作抓得较紧。这项工作当前主要存在两个问题：一、离职休养干部中有不少思想问题尚未很好解决。二、离职休养干部的住房，多数没有落实。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。邓，指邓小平，当时任中共中央总书记。彭，指彭真，当时任中共中央政治局委员、中央书记处书记。贺，指贺龙，当时任中共中央政治局委员、中央军委副主席，主持军委日常工作。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":12,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":296,"page_end":296},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d22091838"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
