art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是世界人民革命灯塔","authors":[],"parts":[{"type":"paragraph","text":"据新华社仰光十二日电 缅甸亚非团结委员会委员德钦兑最近接见新华社记者时说：“毛泽东思想不仅是七亿中国人民的革命灯塔，并且也是世界被压迫和被剥削人民的革命灯塔。毛主席不仅是中国的领袖，而且是世界被压迫和被剥削人民的领袖。”"},{"type":"paragraph","text":"德钦兑说：“毛泽东思想深深扎根在各国反帝人民的心中，扎根在粉碎资本主义的工人的心中，扎根在反对压迫和剥削的劳动人民的心中。世界革命人民和领导革命的工人阶级政党把毛泽东思想看作是他们在消灭反革命思想和进一步促进革命的斗争中的指南。”"},{"type":"paragraph","text":"他说，在现代修正主义者试图破坏各国人民革命力量、阻挠革命向前发展时，毛泽东思想是有效革命武器，它斩断那些试图挫折劳动人民革命锋芒的现代修正主义者的罪恶之手，使革命锋芒更加锐利。"},{"type":"paragraph","text":"德钦兑说：“修正主义者阻挠反帝斗争和世界人民革命的企图决不能得逞。因为毛泽东思想正在提高（人们的）革命觉悟，激励革命精神和指出正确的道路。”"},{"type":"paragraph","text":"德钦兑指出：“今天，马克思列宁主义者的主要任务是粉碎破坏马克思列宁主义基本原则、在工人阶级队伍中制造混乱和破坏国际共产主义运动团结的修正主义。我们必须用毛泽东思想武装起来完成这项任务。”他说：“毛泽东思想是砍掉现代修正主义脑袋的一支十分锐利的宝剑。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56e49ef215"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
