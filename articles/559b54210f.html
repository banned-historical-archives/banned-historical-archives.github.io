art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"波兰出版毛主席军事著作选集罗马尼亚出版“毛泽东诗词集”","authors":[],"parts":[{"type":"paragraph","text":"新华社华沙10日电 波兰国防部出版社最近出版了毛泽东军事著作选集。"},{"type":"paragraph","text":"选集中包括“中国的红色政权为什么能够存在？”、“井冈山的斗争”、“星星之火可以燎原”、“中国革命战争的战略问题”、“论持久战”、“论联合政府”、“目前的形势和我们的任务”等篇著作。"},{"type":"paragraph","text":"选集的扉页上印有毛泽东主席的照片。"},{"type":"paragraph","text":"选集的编者在选集的前言中说：毛泽东在自己的著作里对国内革命战争的各个阶段作了深刻的马克思主义的分析。“毛泽东关于中国革命战争问题的理论和中国人民及其武装力量的极丰富的经验的总结，是对马克思列宁关于战争、军队和军事学术科学的重大贡献。”"},{"type":"paragraph","text":"“人民论坛报”今天在报道本书出版的消息中说：“包括在本书中的毛泽东的著作是对发展马克思列宁关于战争和军队学说的重大贡献。这部书也可以使我们了解中国人民及其武装力量的丰富的战斗经验和中国革命的历史。”"},{"type":"paragraph","text":"新华社布加勒斯特10日电 罗马尼亚国家文学艺术出版社最近出版了中罗文对照的“毛泽东诗词集”。"},{"type":"paragraph","text":"这本诗词集是罗马尼亚著名诗人菲利皮德根据英文版翻译的。它包括原发表在“诗刊”创刊号上的十八首以及不久前发表的“蝶恋花”和“送瘟神二首”，共计二十一首。"},{"type":"paragraph","text":"诗词集的印刷和装帧部很精英，还附有毛主席的诗词手稿。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"559b54210f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
