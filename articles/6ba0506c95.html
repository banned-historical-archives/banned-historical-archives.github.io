nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"李富春在煤炭部全国电话会议上讲话摘要","parts":[{"type":"title","text":"927.李富春在煤炭部全国电话会议上讲话摘要"},{"type":"paragraph","text":"(1967年8月17日)"},{"type":"paragraph","text":"引起大规模武斗，制造停工停产。这是他们反革命的两把杀手锏，是他们反革命的两个大阴谋，也是他们最狠毒的两手。武斗中牺牲的是我们的阶级弟兄，停工停产所损失的是国家，是人民，是社会主义的事业。对此，无产阶级革命派和广大的革命职工群众需要高度的警惕，识破敌人的阴谋诡计，千万不要上当，制止武斗，恢复生产，发展生产，主要最根本的要充分发动群众，依靠群众，要造成一股强大的舆论，刹住武斗这股歪风。你们要向北京京西煤矿长沟峪矿的无产阶级革命派学习，还有些煤矿也是比较好的，革命生产搞的还不错，如双鸦、井陆、开滦、淄汶等矿。煤炭部已经成立了煤炭部革命委员会筹备小组，我们的解放军空军部队派王素同志任组长，范文彩、赵景琦同志任副组长，做煤炭部的抓革命促生产的工作。"}],"authors":["李富春"],"dates":[{"year":1967,"month":8,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":361,"page_end":361,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ba0506c95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
