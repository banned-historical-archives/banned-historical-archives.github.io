rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席林副主席接见军训会议代表周恩来陈伯达康生等同志参加接见","authors":[],"parts":[{"type":"paragraph","text":"毛主席神采奕奕，健步走进接见大厅时，代表们长时间高呼：“毛主席万岁！”“毛主席万万岁！”毛主席离开接见大厅时，代表们高呼：“战无不胜的毛泽东思想万岁！”"},{"type":"paragraph","text":"新华社七日讯 我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪副主席，中央其他领导同志和各有关方面的负责同志周恩来、陈伯达、康生、徐向前、聂荣臻、叶剑英、江青、萧华、杨成武、粟裕、张春桥、关锋、戚本禹、李天佑、吴法宪、叶群、汪东兴，今天下午接见了出席中国人民解放军军事训练会议的代表。"},{"type":"paragraph","text":"毛主席神采奕奕，健步走进接见大厅。在这最最幸福的时刻，代表们激动万分，挥动着红彤彤的《毛主席语录》，长时间地高呼：“毛主席万岁！”“毛主席万万岁！”"},{"type":"paragraph","text":"毛主席迎着代表们一张张幸福的笑脸，向大家亲切招手，并和代表们一起合影。"},{"type":"paragraph","text":"毛主席离开接见大厅的时候，代表们高呼：“战无不胜的毛泽东思想万岁！”并且齐唱《大海航行靠舵手》，祝我们心中最红最红的红太阳毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪副主席，以及周恩来等同志，七月七日接见出席中国人民解放军军事训练会议的代表。"},{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪副主席，以及周恩来、陈伯达、康生等同志，和出席中国人民解放军军事训练会议的代表合影。 《人民日报》记者 吕相友摄（照片）RW：林彪；接见军训会议代表；附照片"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e15eda1d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
