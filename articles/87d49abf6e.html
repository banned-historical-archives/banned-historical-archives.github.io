month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"茶乡风雷"},{"type":"paragraph","text":"深入批邓、反击右倾翻案风的斗争，在名茶“舒绿”的故乡——安徽省舒城县舒茶人民公社如火如荼地展开。革命大批判的风雷，震荡着茶乡山水。"},{"type":"paragraph","text":"舒茶人民永远不会忘记那幸福时刻——一九五八年九月十六日舒茶人民公社成立的第七天，伟大领袖毛主席亲临舒茶视察。毛主席指着远处的山岗，亲切地要舒茶人民在山坡上多多开辟茶园。遵照毛主席的指示，公社党委带领贫下中农在乱石滚滚的金鸡岭上建造茶园；可是却遭到刘少奇反革命的修正主义路线的干扰和破坏，一小撮阶级敌人遥相呼应，公开煽动“种茶和栽树，不如包到户”。公社党委带领贫下中农，同修正主义斗，同阶级敌人斗。大家奋战一冬春，在金鸡岭上砌大坝、修梯田，建成了一片山坡茶园。首战的胜利使公社党委和贫下中农认识到，要改造自然抓生产斗争，首先要抓阶级斗争。一九五八年以来，他们紧紧抓住阶级斗争这个纲，扩建茶园四千多亩，干茶总产量由二十八万斤上升到六十多万斤，粮食亩产由四百多斤猛增到一千多斤。"},{"type":"paragraph","text":"舒茶人民联系学大寨的斗争经历，深入批判邓小平大刮右倾翻案风的罪行。公社党委还举办了五十多期党员、干部学习班，弄清社会主义时期阶级斗争的特点，提高大家反修防修，坚持无产阶级专政下继续革命的自觉性。接着，全公社以政治夜校为阵地，广泛发动群众，深入批判邓小平，打击阶级敌人的破坏活动。"},{"type":"paragraph","text":"舒茶公社地处交通要道，两个阶级、两条道路的斗争很激烈，资本主义自发倾向经常抬头。在反击右倾翻案风的斗争中，公社党委加强党的基本路线教育，引导大家回忆毛主席视察舒茶的幸福情景，回忆旧社会的苦难家史，畅谈今天的幸福生活，狠批邓小平的修正主义路线和他散布的“今不如昔”等谬论，狠批资本主义。干部和社员更加积极地抓革命、促生产，建设社会主义新茶乡。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87d49abf6e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
