作，加深了对文件的理解","authors":[],"dates":[{"year":1973,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　虹口区财政局第二税务所党支部在组织职工学习十大文件过程中。围绕时代和形势问题展开讨论，并结合学习马列和毛主席的有关著作，加深了对这个问题的认识。"},{"type":"paragraph","text":"在讨论中，有些同志提出:列宁逝世以后，世界形势发生了很大的变化，为什么时代没有变?大家争论了半天也说不清楚，有的说，还是请领导解答吧。党支部遵照毛主席关于要让群众自己教育自己的指示，组织大家选学了列宁的《打着别人的旗帜》、《帝国主义是资本主义的最高阶段》和斯大林的《论列宁主义基础》等著作中的若干章节，以及毛主席的《新民主主义论》等著作中的有关论述，引导大家学习无产阶级革命导师论述时代问题的立场、观点、方法。许多同志谈到，区分时代要象革命导师那样，对当前世界上存在的各种基本矛盾进行阶级的分析。列宁逝世近五十年来，世界形势发生了很大变化，但是，帝国主义还存在，美苏两个超级大国拼命争夺世界霸权，各国革命人民的反抗斗争一浪高一浪。因此，时代的基本特征没有变，只是矛盾的斗争更加激化罢了。"},{"type":"paragraph","text":"大家还回顾了国际共产主义运动史上关于时代问题的两条路线斗争。不少同志说:借口“时代变了”来否定马列主义的基本原则，这是新老机会主义者的一贯手法。当年，伯恩斯坦就胡说什么《共产党宣言》所揭示的资本主义发展规律已经过时了，应当修正。第二国际的考茨基为了宣扬“议会道路”，也竭力鼓吹世界进入了“超帝国主义阶段”，胡说什么马克思主义关于无产阶级专政的伟大学说过时了。"},{"type":"paragraph","text":"赫鲁晓夫、勃列日涅夫之流，借口历史条件变了，宣扬马列主义过时了，为推行他们的修正主义路线服务。林彪反党集团完全继承了老机会主义者的衣钵，也竭力鼓吹时代变了，马列主义的原则过时了，其罪恶目的，就是妄图歪曲和反对列宁关于帝国主义和无产阶级革命时代的理论，否定党的基本路线，为篡党夺权制造舆论。"},{"type":"paragraph","text":"通过学习，不少同志表示，要彻底批判林彪一伙在时代问题上的各种谬论，坚持无产阶级专政下的继续革命，不断夺取新的胜利。"},{"type":"paragraph","text":"(本报通讯　员学习班)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"443b52865e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
