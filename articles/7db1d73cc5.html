<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印共革命派发动农民开展武装斗争建立农村根据地印度革命沿着毛主席指引的道路前进“纳萨尔巴里式”斗争已扩及八个邦和五十个地区","authors":[],"dates":[{"year":1967,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十四日电　本社记者述评:"},{"type":"paragraph","text":"今年，是印度革命发生历史性转折的一年。在战无不胜的毛泽东思想指引下，印度人民终于走上了印度革命的唯一正确道路——毛主席领导中国人民武装夺取政权的胜利道路。印共革命派执行的革命路线正在节节胜利，印度修正主义分子推行的“和平过渡”路线日益破产。印度的革命形势空前大好。"},{"type":"paragraph","text":"具有五亿人口的亚洲大国印度，在无产阶级世界革命中占有十分重要的战略地位。伟大的列宁早在四十年前就指出:“斗争的结局归根到底取决于这一点:俄国、印度、中国等构成世界人口的绝大多数。”现在，印共革命派领导印度革命人民，决心走中国革命的道路，用武装的革命反对武装的反革命。这不仅在印度的革命史上是一个伟大的转折点，而且在无产阶级世界革命的发展中具有重大的意义。"},{"type":"paragraph","text":"长期以来，印共党内一直存在着两条路线，两条道路的斗争，近几年来斗争更加剧烈。在毛泽东思想的指引下，印共革命派坚决反对窃居党的领导地位的叛徒丹吉集团和以南布迪里巴德、乔蒂·巴苏为代表的一小撮修正主义头目推行“和平过渡”的议会道路。"},{"type":"paragraph","text":"印共革命派坚定地宣布:“伟大的领袖毛泽东所采取的战略，是印度的马克思主义者应该采取的。”他们要“认真努力成为毛泽东同志的好学生”。他们按照毛主席关于“枪杆子里面出政权”的英明教导，明确指出:印度“人民民主革命的唯一道路是:在无产阶级领导下，通过土地革命，在农村地区建立革命根据地；随后扩大这些革命根据地来包围城市；从农民游击队中组织人民解放军；用夺取城市来导致革命走向胜利。”"},{"type":"paragraph","text":"印共革命派深入到封建剥削特别严重、革命力量较强的大吉岭县等农村地区，向农民宣传毛泽东思想，发动农民、组织农民、武装农民，准备发动农民武装起义。"},{"type":"paragraph","text":"他们领导大吉岭县受尽地主压迫、剥削的无地少地农民，向地主、种植园主和反动政府发动了急风暴雨式的攻击，向他们夺地、夺枪、夺粮。他们还组织起武装小组，建立“人民法庭”，惩办顽抗的土豪劣绅，武装保卫土地革命的果实。从三月份到六月份，农民采取的暴力行动达二百二十起，把几千年封建地主和百年来外国种植园主的特权以及反动政府强加在他们头上的“法律”和“秩序”打得落花流水，把地主、种植园主的体面威风，扫地以尽；无地少地的农民，昂然抬起头来，扬眉吐气。"},{"type":"paragraph","text":"印度革命者在各地成立了“支援纳萨尔巴里农民斗争委员会”，动员人民支持武装革命。他们翻译和出版了大量的毛主席著作，传播毛泽东思想，出版了许多种刊物、书籍和印发传单，宣传武装夺取政权的真理，揭露党内一小撮修正主义分子破坏武装斗争的行径。"},{"type":"paragraph","text":"据印度报纸透露的很不完全的消息，“纳萨尔巴里式”的农民土地斗争已经在八个邦和中央直属领地内的五十个地区内开展。这些地区的农民，用暴力夺回地主和反动政府霸占的土地，夺回地主强占土地上的庄稼。目前，印度正值收割季节，不少地区的农民纷纷组织起“农民委员会”或“人民委员会”，开展“不向地主交租”、“不向政府纳税”的运动。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7db1d73cc5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
