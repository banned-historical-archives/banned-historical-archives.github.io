语","authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":13}],"is_range_date":false,"parts":[{"text":"毛泽东转发南京市委镇反工作报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局，并转分局，省委，区党委，大中市委：","type":"appellation"},{"text":"关于在镇反工作中有计划地统一逮捕和有计划地广泛宣传这两点，现在华北华东东北三大区均已实行，或者正在准备实行。请中南西南西北三大区亦研究这样做。如不能做到各大中城市同时动手统一逮捕，至少应做到一个城市统一逮捕（重庆兰州已是这样做了）。至于事前事后使民主党派，各界民主人士，宗教界，工商界，文化教育界，少数民族的代表人物，真正与闻其事，并向全体人民展开宣传讨论，使家喻户晓，人人明白，打破关门主义和神秘主义，更是非常重要的。下面是南京市委的报告，可为参考。过去该市手面太小，不敢大张旗鼓杀人，现已彻底转变，做得很好，大有成绩，并且跑到许多城市的前面去了。","type":"paragraph"},{"text":" 毛泽东四月十三日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89a628b136"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
