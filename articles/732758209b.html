art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"再现毛泽东的形象——访总政话剧团特型演员车予正","authors":["任志忠"],"parts":[{"type":"paragraph","text":"一部描写毛泽东少年时代的话剧——《之伢子》在北京上演后，反响强烈。在剧中扮演晚年毛泽东的总政话剧团的演员车予正，给观众留下了深刻印象。"},{"type":"paragraph","text":"车予正能饰演毛主席，还多亏了“周总理”的帮助。那是8年前，一位朋友请他给扮演周总理的王铁成送戏票，王铁成感到面前的这位陌生来客有着特型演员气质，兴奋地说：“你长得很像毛主席！”于是他被推荐到八一电影制片厂试妆，效果令人满意。但试戏时由于他缺乏对毛主席的了解，未能走上银幕。可通过这次试妆启发了车予正扮演领袖的浓厚兴趣。"},{"type":"paragraph","text":"此后，为了进一步了解领袖，车予正收集了几乎所有能收集的材料，仔细地琢磨、体会。1986年，他首次在话剧《潇湘秋》中饰演了毛泽东。1987年5月总政话剧团筹演大型话剧《决战淮海》，再度选中了车予正。公演后，国内外报纸纷纷载文，评论毛主席这一形象演得成功。在排演话剧《中国·1949》时，车予正不限于对毛主席特征动作的简单模仿，而是有意把握毛主席的性格特征，从而显其神韵。1989年10月该剧参加了建国40周年全军文艺调演，他以其出色的表演获得一等奖。"},{"type":"paragraph","text":"如今，车予正已从舞台走上荧屏，先后在电视连续剧《赤都财魁——毛泽民》、《井冈之子》、《傅连暲》、《奇俊峰传奇》中成功地扮演了不同时期的毛泽东形象。"},{"type":"paragraph","text":"图为车予正在《之伢子》中饰演毛泽东的一个镜头。（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"732758209b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
