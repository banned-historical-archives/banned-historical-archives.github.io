script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"深批“四人帮”反动谬论　开展财政理论研究市财政局理论队伍生气勃勃目前正在探讨财政部门如何自觉运用价值规律为高速积累资金服务","authors":[],"dates":[{"year":1978,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了使财政工作适应新形势的发展需要，上海市财政局在深入揭批“四人帮”的斗争中，于今年五月初建立了财政理论研究专业机构，并以这个机构的四名专职人员为基础，吸收二十余名有一定财政基础知识和实践经验的财政专管员、业务骨干，组成了一支包括领导骨干、财政专管员(不脱产)和少数专职人员的“三结合”理论队伍。他们紧密联系工作实践，学习理论，揭批“四人帮”，总结经验，开展财政理论研究和有关基础知识的宣传，搞得很有生气。"},{"type":"paragraph","text":"根据局党委提出的今年要帮助企业建立和健全经济核算制的工作要求，他们贯彻边学习、边战斗的精神，积极搜集材料，深入揭批“四人帮”破坏经济核算及其散布的“经济核算把龙江风格算掉了”、“核算指标上墙就是修正主义上台”和“核算无用论”等谬论，积极宣传建立经济核算的意义和作用，促进了财政业务工作。"},{"type":"paragraph","text":"这支理论队伍，认真学习马列和毛主席的财政思想，学习华主席、党中央对财政工作的一系列指示，研究探讨当前工作中需要解决的实际问题。粉碎“四人帮”以后，去年和今年上半年，上海财政收入增长的幅度大干生产增长的幅度。他们在学习五届人大文件和全国财贸“双学”会议文件时，结合财政工作业务，提出了这样一个研究课题:在新的历史条件下，财政积累的速度能否做到持续超过生产增长速度?业余理论组成员、财政二分局一位老专管员，调查和分析了两个印染企业解放以来生产增长和利润增长的情况，提出了在一个工业企业里，只要不断提高劳动生产率，不断降低成本，盈利的增长大于生产增长是可以做到的。他还提出了财政部门促进企业增加生产、开辟财源的十个方面途径。另一位业余理论组成员，是一个财政所的负责人，他通过理论讨论会，打开了思路，针对这个所联系的日用五金行业中某些产品存在的产销矛盾，组织有关同志深入调查研究，为增产挖潜广找门路，并写了五份有观点、有建议的调查报告，引起了主管部门和企业的重视。"},{"type":"paragraph","text":"目前，他们正在学习价值规律的理论，探讨财政部门如何自觉运用价值规律，为高速库积累资金服务。根据《人民日报》社论《把整顿财经纪律当作一场大斗争来抓》的精神，他们还深入探讨财政监督对巩固无产阶级专政，发展社会主义经济的重要作用。"},{"type":"paragraph","text":"这支理论队伍工作比较活跃，是由于贯彻了领导、专业、群众三结合的精神。局党委主要负责人十分重视这支队伍，亲自出题目，写论文，亲自参加理论讨论会。财政理论研究的专业机构，紧密依靠这支群众性的业余理论队伍，积极提供资料，了解研究情况，具体进行帮助，定期组织讨论，"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e3c55fc54"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
