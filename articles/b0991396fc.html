" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对胡绩伟关于山东省级机关分散现象调查报告的批语","alias":"","parts":[{"type":"paragraph","text":"对胡绩伟关于山东省级机关"},{"type":"paragraph","text":"分散现象调查报告的批语"},{"type":"paragraph","text":"（1953年3月15日）饶漱石、安子文同志："},{"type":"paragraph","text":"此件有很大的教育意义，我意可以在人民日报发表。如同意，请考虑是否需要征得山东分局的同意，请酌量处理。嗣后各地有此类好报告，请你们择要发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十五日[1]胡绩伟，当时任《人民日报》副总编辑。"},{"type":"paragraph","text":"[2]指胡绩伟1953年2月21日关于山东省级机关分散主义现象给邓拓并转胡乔木、安子文的报告。报告说：在去年12月山东分局扩大会议之前，省人民政府总的领导十分薄弱，形成各厅局各自为政的严重分散现象，很多重大的指示决定，各厅可以不经批准擅自发出。分局委员会本身的党委制也很不健全，同样存在严重分散现象，多数分局委员对全面工作关心不够，没有把参加分局全面领导当作是委员的重要任务，分局开会讨论不是自己管理的问题时，常常兴趣不大，意见不多。分局扩大会议以后，分散现象虽有根本改变，但分局的统一领导还是不强。而这个问题不很好解决，开展反对官僚主义、反对命令主义、反对违法乱纪的斗争，将会受到很大影响。胡绩伟的这个报告，中共中央于1953年3月2日批转给中共中央华东局和山东分局，后来未在《人民日报》上发表。36"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":67,"page_end":67},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0991396fc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
