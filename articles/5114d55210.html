authors":[],"dates":[{"year":1967,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:我们伟大领袖毛主席发出要斗私，批修的战斗动员令以后，在太仓县洪泾大队立即卷起了翻江倒海的“斗私，批修”的革命巨澜。洪泾大队这面光辉夺目的活学话用毛主席著作的红旗，就是不断从“斗私，批修”中成长起来的。洪泾大队的贫下中农，对毛泽东思想无限热爱，对“私”字、“修”字无比仇恨。他们把“斗私，批修”方针称之为“旱地里下了一场及时雨”，看作是刺向中国赫鲁晓夫心脏的“精神宝刀”。正因为他们深刻地理解了“斗私，批修”的伟大战略意义，所以就能闻风而动，把毛泽东思想作为武器，广泛、深入地发动群众，猛攻“私”字山，狠挖“修”字根，向中国赫鲁晓夫反动的资产阶级世界观发起猛烈攻击。下面选登的是一次批判会上部分同志的发言，供大家学习参考。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5114d55210"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
