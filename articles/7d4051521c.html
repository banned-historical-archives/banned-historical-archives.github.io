<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级思想能够“扬弃”或隐藏吗?","authors":["设成鹏"],"dates":[{"year":1952,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"设成鹏"},{"type":"paragraph","text":"某高等学校一位教师，在这次反贪污、反浪费、反官僚主义运动中向全系师生作自我检讨时说:“我要下决心扬弃资产阶级思想包袱。”另外一位教师在批判了自己在文艺教学中脱离政治的错误倾向以后说:“假如我小心点，不会发生这么大的错误。”"},{"type":"paragraph","text":"这两个例子，我认为可以说明目前某些教师中存在着的两个问题，即:对资产阶级思想本质的认识问题和对思想改造运动的态度问题。"},{"type":"paragraph","text":"前一个例子说明某些教师对资产阶级思想本质还认识不清。所谓“扬弃”，应该是肯定正确的因素，否定错误的因素；或者说，留下好的部分，去掉坏的部分。但是，我们打开资产阶级思想这个“包袱”来看看吧，里面装的都是些什么货色呢?剥削群众、不劳而食、损人利己、唯利是图、假公济私、投机取巧、铺张浪费、享乐至上，……:除了这些以外，还有别的吗?没有了。要想在这一堆肮脏东西中拣出一些“漂亮”的、“好看”的东西，或留下一部分“好”的，去掉一部分“坏”的，可能吗?不可能的。要就是把这些脏东西通通丢掉，要就是把这个脏“包袱”继续背在身上。"},{"type":"paragraph","text":"资产阶级思想的本质就是剥削。尽管它的表现形态有各种各样，或千变万化，但“万变不离其宗”，都离不了“剥削”的本质。在“剥削”这个基础上，是产生不出什么好的、进步的思想来的。在资本主义世界已经日趋没落的今天，资产阶级思想是没有什么进步的、值得保留的部分的。必须认清这一点，下决心彻底否定资产阶级思想，才能够真正改造自己的思想。"},{"type":"paragraph","text":"后一个例子说明有些教师对于思想改造运动的态度和认识是很不正确的。难道说像在教学中脱离政治这样带原则性的错误，仅仅是由于偶然“不小心”而产生的吗?而如果以后“小心点”，就“不会发生这么大的错误”了吗?说这样的话的人，如果不是表示他对思想改造运动的态度不老实——不是严肃地批判自己的错误思想，而是企图用一些进步的名词作掩蔽，把自己的错误思想隐藏起来，继续保持下去；就是说明他还不懂什么叫做思想改造。"},{"type":"paragraph","text":"思想改造是思想上“脱胎换骨”——以工人阶级思想代替非工人阶级思想、以新的思想体系代替旧的思想体系的问题，而不是枝节上、技术上的问题。如果不认清这一点，不从根本上去解决问题，那么，任凭你怎样“小心”，错误思想的“马脚”总是要露出来的。更重要的是:用这种态度来对待思想改造运动，一定不能够达到改造思想的目的，也一定不会受到群众的欢迎。"},{"type":"paragraph","text":"总之，资产阶级思想是不能够“扬弃”，也不可能隐藏的。对资产阶级思想，必须深恶痛绝，必须从本质上加以彻底的否定。在这个基础上，才谈得上真正的思想改造。　(原载中国青年报)"}],"comments":[],"origin":"中国青年报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d4051521c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
