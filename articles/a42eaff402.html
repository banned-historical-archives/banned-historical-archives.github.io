<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《历史研究》编者答读者质疑人民内部允许舆论不一律“四人帮”压制不同意见，使得报刊上只剩下清一色的帮腔帮调，是反常现象。我们必须反其道而行之。","authors":[],"dates":[{"year":1978,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月十日电　不久前出版的《历史研究》第四期上，发表了题为《大家都来提倡自由讨论》的编者答读者。这篇答读者回顾该刊今年第一期刊登了有关“孔丘杀少正卯”的两篇观点不同的文章，一篇说历史上真有这回事，一篇说很可能没有这回事，于是收到许多读者来信，要求“纠正”或“澄清”之后说:为什么许多同志当看到不同的作者对同一个学术问题看法有分歧的时候，反而觉得惊诧，甚至觉得是出了纰漏，需要赶快弥补或加以纠正呢?只能说，“四人帮”一伙在学术领域里推行文化专制主义，造成了使人窒息的气氛，使得一些被迫在其中生活了一段时间的同志，乍一看到我们的报刊上出现了发表不同学术见解的情景，反而觉得很不习惯了。"},{"type":"paragraph","text":"文章说:这一次读者在“杀少正卯”问题上，看出了意见不一。其实，在我们国家里，这些不一致的学术观点的存在，是很正常的；而象“四人帮”把各种不同意见一律压下去，使得报刊上只剩下清一色的帮腔帮调，那才是反常的现象。毛主席早就把这个道理讲得极为精辟透彻，他说:“我们在人民内部，是允许舆论不一律的，这就是批评的自由，发表各种不同意见的自由，宣传有神论和宣传无神论(即唯物论)的自由。”“在人民内部，允许先进的人们和落后的人们自由利用我们的报纸、刊物、讲坛等等去竞赛，以期由先进的人们以民主和说服的方法去教育落后的人们，克服落后的思想和制度。”在人民内部，“压制自由，压制人民对党和政府的错误缺点的批评，压制学术界的自由讨论，是犯罪的行为。”(《驳“舆论一律”》)。"},{"type":"paragraph","text":"文章接着指出:“四人帮”是压制人民自由的最大罪犯。我们必须反其道而行之，认真恢复毛主席亲手为我们党制定的正确方针和奠定的优良传统。我们同“四人帮”的矛盾，是敌我矛盾，就揭露和声讨“四人帮”的反革命罪行而言，我们的革命队伍必须步调一致，舆论一律。但是，在批判“四人帮”的战斗过程中，我们革命队伍内部，又要充分发扬民主，允许对一些学术问题舆论不一律，这样才会提高我们批判的学术水平。不待言，只有科学的批判，才是最有说服力的批判，才是具有最大威力的批判。"},{"type":"paragraph","text":"文章最后说:为了繁荣我国的历史科学，为了加强马克思列宁主义、毛泽东思想在历史学战线上的领导地位，我们热烈希望广大读者和作者，跟我们携起手来，共同努力，创造民主气氛，提倡自由讨论。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a42eaff402"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
