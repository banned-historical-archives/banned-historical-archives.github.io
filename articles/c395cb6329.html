要）","authors":["苏仲湘"],"dates":[{"year":1957,"month":9,"day":17}],"is_range_date":false,"parts":[{"text":"苏仲湘在新华社国际部全部批判李慎之大会上的发言（摘要）","type":"title"},{"text":"苏仲湘","type":"authors"},{"text":"1、李慎之强调群众运动是“暴民心理”其用意何在？","type":"paragraph"},{"text":"2、他说运动中谁是王八蛋，谁就得承认是王八蛋，我要问，他作这种诬蔑，有何事实根据？他对运动到底如何看法？","type":"paragraph"},{"text":"3、李慎之对胡适究竟有何具体看法？对胡风反革命集团如何看法？对新中国的学术发展、知识分子的进步如何看法？他认为新社会里不可能产生马克思，根据是什么？如何看待毛主席和少奇同志的著作和贡献？","type":"paragraph"},{"text":"4、李慎之对新社会到底如何看？你认为知识分子在新社会是否幸福？处境如何？你所说的新社会的压抑和不满是空前的，为什么？","type":"paragraph"},{"text":"5、李慎之把自己装扮成只是在“坐而论道”，好像他还不是反党反社会主义，实际上，他坐的是反党反社会主义的立场，论的是反党反社会主义的道，而且不止是坐而言，已经在起而行。例如。去年匈牙利事件时，他兴冲冲地立刻要我们搜集编写纳吉的资料刚完，又要我们搞卢卡奇的材料，而且亲自作非常具体的布置，告诉我们外交部有什么什么材料，可以叫什么什么同志去取。刚布置这个事情后，他又接着布置要收集编写东欧文艺界的动态（那时东欧文艺界思想混乱状态较严重）。他还说，社会主义现实主义只不过是肯定正面人物，它的意义就值得怀疑。他当时已快出国，他还叮嘱我们，他虽不在，我们还要继续搞。我要问，李慎之的用意何在？这能说仅仅是“坐而论道”吗？有一次，李慎之告诉我们说，你们可以收集第二国际的材料，特别提到可以收集布哈林、道伊彻等人的著作。他还在公开向全社同志报告的场合中，在谈锡兰新平等社会党的时候……（原稿缺字——编者注）要求用新的眼光去看待……。从这里，可以看到李慎之注意的一条黑线：纳吉——卢卡奇——布哈林——道伊彻——托洛茨基，他要收集这种材料有何打算？他要按照这条线把下面同志们工作引向何处？","type":"paragraph"}],"comments":[],"origin":"《李慎之材料之十四》（内部材料定期收回）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c395cb6329"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
