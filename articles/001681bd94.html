art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"帮助民兵活学活用毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"广东博罗县黄山洞大队，是中南地区农村活学活用毛主席著作的一面红旗。"},{"type":"paragraph","text":"黄山洞大队大学毛主席著作的群众运动，是在党支部的领导下，在民兵组织带动下开展起来的。一些有关部门做民兵工作的负责同志，曾到这里来深入蹲点，就地传播我军干部战士的学习经验，给予帮助和指导，起了很好的作用。"},{"type":"paragraph","text":"组织民兵活学活用毛主席著作，用毛泽东思想武装全体民兵的头脑，是民兵建设的根本。民兵工作干部和各级人民武装部门，要在地方党委的统一领导下，把民兵组织办成毛泽东思想的大学校。各部队在开展群众工作中，也应当积极帮助民兵活学活用毛主席著作。这样，既可以加强民兵工作，进一步搞好民兵工作三落实；又可以发挥民兵的带头作用，带动广大工农群众实现思想革命化。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"001681bd94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
