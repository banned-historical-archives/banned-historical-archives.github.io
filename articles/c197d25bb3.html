"dates":[{"year":1957,"month":5,"day":7}],"is_range_date":false,"parts":[{"text":"中央公安部办公厅通知","type":"title"},{"text":"各省、市、自治区公安厅、局：（机辰3号）","type":"appellation"},{"text":"4月22日中共中央转发了最高人民法院和司法部、最高人民检察院、中央公安部党组关于全面检查肃反工作的几个通知和报告，中央公安部党组“关于通知各地公安机关准备迎接全面检查肃反工作的报告”其中有些条文，经中央审阅修改，和三月十六日公安部发下的通知，有所不同。请各省、市公安机关注意以中央四月二十二日批转的报告为准，通知各市、县公安机关切实执行。","type":"paragraph"},{"text":" 中央公安部办公厅1957年5月7日","type":"paragraph"},{"text":"[等级　加　国务院来电　收885号已转发　各专区公安处、县（市）公安局。　批签已抄请　省委、公、办公厅、市人委、逸之、启明、司、法院、检。合邦、守一、省委办公厅、省委五人小组、书记处办公室。　阅内容 〈　类〉]","type":"paragraph"},{"text":"省机 5月8日哲抄","type":"paragraph"},{"text":"中共陕西省委办公厅","type":"paragraph"}],"comments":[],"origin":"陕西省档案馆；陕123-40-1　P.192。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c197d25bb3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
