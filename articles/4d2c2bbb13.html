ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"复彭雪枫电","alias":"","parts":[{"type":"paragraph","text":"复彭雪枫电"},{"type":"paragraph","text":"（1941年6月28日）"},{"type":"paragraph","text":"你五月三日电的观点是不适当的，是错误的，六月十五日电亦还未改变。蒋介石还在抗战，蒋在全国军队中，在中产阶级及小资产阶级中，还有很大信仰，目前抗战还少不了他，他也还没有破裂统一战线，他还是两面政策。罢工罢课的策略只能使自己陷于孤立，八路南下的策略也只能加深国共裂痕，与中央缩小裂痕的方针是不合的。我们对付蒋介石反共政策的方针只应该是有理、有利、有节的自卫政策，你的意见却超越这个方针。"},{"type":"paragraph","text":"在苏德战争爆发后，我党对国民党态度尤须慎重，不可大意。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":6,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":145,"page_end":145},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d2c2bbb13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
