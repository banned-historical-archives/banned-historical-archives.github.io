script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陕西岐山中学检举反革命分子有偏差","authors":[],"dates":[{"year":1951,"month":7,"day":7}],"is_range_date":false,"parts":[{"text":"陕西岐山中学检举反革命分子有偏差","type":"title"},{"text":"【西北总分社七日讯】陕西岐山中学在检举反革命分子的作中有偏差。该校配合岐山公安机关已在校内清出一百零五个(占全校总人数五分之二)特务匪徒，枪毙了两个首恶分子(该校教员)，并在全校掀起坦白登记热潮，接连逮捕了二十多人，管制了六十六个胁从分子。","type":"paragraph"},{"text":"该校进行坦白管训的办法是：","type":"paragraph"},{"text":"一、用所谓以毒供毒对口供的方式。如别人供出材料即以不愿坦白论处，使被攻者怕受到纪律制裁而坦白。","type":"paragraph"},{"text":"二、问题交代不清楚者交乡农会控制或留公安机关继续坦白。","type":"paragraph"},{"text":"三、睡觉时派人监视，收寻自杀工具，防止自杀。","type":"paragraph"},{"text":"针对以上情况，西北局特发出关于中等以上学校进行清理工作的指示，并责令下级党委派专人进行调查研究，了解真实情况，然后迅速进行纠正与善后工作。","type":"paragraph"}],"comments":[],"origin":"1951年7月10日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e44b8cc123"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
