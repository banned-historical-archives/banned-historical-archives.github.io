script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市仪表系统广大职工热烈拥护中央两项英明决定彻底揭露批判搞修正主义搞分裂搞阴谋诡计的走资派","authors":[],"dates":[{"year":1976,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市仪表电讯工业系统的广大职工热烈欢呼、坚决拥护中央关于建立伟大的领袖和导师毛泽东主席纪念堂和关于出版《毛泽东选集》和筹备出版《毛泽东全集》两项英明决定。连日来，各单位纷纷召开了学习讨论会和群众大会，广大职工群情振奋，欢欣鼓舞，敲锣打鼓，上街游行。大字报、大标语、决心书铺天盖地贴满了厂区和机关。大家一致表示:坚决拥护以华国锋同志为首的党中央，一定要坚持以阶级斗争为纲，坚持“三要三不要”的基本原则，立场坚定，旗帜鲜明，彻底揭露和批判那些背叛马列主义、毛泽东思想，篡改毛主席指示，搞修正主义，搞分裂，搞阴谋诡计，篡党夺权的人，同他们作坚决的斗争，把毛主席开创的无产阶级革命事业进行到底。"},{"type":"paragraph","text":"上海仪表电讯工业系统的广大干部和群众学习中央的两项英明决定，坚决响应以华国锋同志为首的党中央的号召，掀起了学习马列著作和毛主席著作的新高潮。仪表局党委怀着对伟大领袖毛主席无限崇敬和深切怀念的心情，重新制订了学习计划，除了原定的每周学习两个半天和两个晚上外，局党委中心学习小组的成员，每人每天都坚持业余自学毛主席著作，打算到明年一季度通读完《毛泽东选集》一至四卷。上海一○一厂的干部群众把对伟大领袖毛主席无限深厚的无产阶级感情倾注到学习和实践毛泽东思想中去，坚持在斗争中学，在斗争中用，彻底揭露和批判那些搞修正主义、搞分裂、搞阴谋诡计，篡党夺权的人的反革命罪行。"},{"type":"paragraph","text":"这个系统的广大职工联系当前阶级斗争和两条路线斗争的实际，反复学习了毛主席关于“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，坚决同背叛马列主义、毛泽东思想，篡改毛主席指示，搞修正主义，搞分裂，搞阴谋诡计，篡党夺权的人进行坚决斗争。自动化仪表一厂举办了党员学习班，认真学习“三要三不要”的原则，认识到毛主席提出的这三项基本原则，是对党内两条路线斗争经验的科学总结，是反修防修的强大思想武器，是我们区别真假马克思主义和识别党内走资派的标准。搞马克思主义，就一定要团结，要光明正大。搞修正主义的人手中没有真理，周围没有群众，他们必然要搞分裂，搞阴谋诡计。他们是不得人心的，只能遭到可耻的失败。上海无线电二十五厂的工人们回顾了党内两条路线斗争史，清楚地看到了搞修正主义、搞分裂、搞阴谋诡计是党内一切机会主义、修正主义路线头子最本质的政治特征，他们是极端孤立的，结果都落得身败名裂、彻底失败的下场。大家坚决表示，要最紧密地团结在以华国锋同志为首的党中央周围，在同搞修正主义，搞分裂，搞阴谋诡计，篡党夺权的人的激烈斗争中，加强党的团结，清除政治垃圾，使我们党在斗争中更加纯洁，更加坚强，更加生气勃勃。"},{"type":"paragraph","text":"这个系统的广大职工决心不辜负以华国锋同志为首的党中央对上海工人阶级的殷切期望，坚持抓革命，促生产、促工作、促战备，努力做好各项工作。上海医疗器械厂的干部和群众认真学习中央两项英明决定，进一步激发了大干社会主义的积极性。为了早日完成二十台五百毫安X光机的生产任务，工人们不计时间，日夜奋战，到本月十五日，已提前五天完成了X光机主架的铸造任务。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37d1cbb7a6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
