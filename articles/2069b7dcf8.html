ors":[],"dates":[{"year":1966,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坦桑尼亚青年组织领导人兴高采烈地说"},{"type":"paragraph","text":"中国文化大革命促进了科学巨大发展"},{"type":"paragraph","text":"据新华社达累斯萨拉姆二十九日电坦桑尼亚的坦噶尼喀非洲民族联盟青年团总书记阿纳吉西埃二十九日在这里接见新华社记者时欢呼中国又成功地进行了一次新的核爆炸。他指出，这是毛主席思想的伟大胜利。"},{"type":"paragraph","text":"这位青年领导人说，这是中国在今年一年内成功地进行的第三次核试验。它进一步证明，文化大革命对中国青年和中国人民提高政治觉悟从而促进生产和科学的发展，起了巨大的推动作用。"},{"type":"paragraph","text":"他说，坦桑尼亚青年“听到这个消息很高兴，因为我们的友好国家取得了这样巨大的成就”。他说：“这是对亚非国家的巨大鼓舞”。他指出，帝国主义妄想称霸世界。但是，中国在科学发展方面所取得的成就对帝国主义妄图实行核垄断是一个打击。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2069b7dcf8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
