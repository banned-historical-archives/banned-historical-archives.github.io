uthors":[],"dates":[{"year":1952,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"云南丽江专区受灾人民开始重建家园"},{"type":"paragraph","text":"专区人民代表会议代表致电感谢毛主席的关怀"},{"type":"paragraph","text":"【新华社昆明十日电】云南丽江专区因地震受灾的各族人民，在人民政府的领导和帮助下，已开始重建家园。"},{"type":"paragraph","text":"丽江区自去年十二月二十一日地震成灾后，中国共产党丽江地方委员会、丽江专署和人民解放军丽江边防部队便组织了急救工作组进行急救。大家忘我地救死扶伤，有些人民解放军战士跑进快要倒塌的房子里抢救负伤的人，并脱下自己的棉衣给灾民穿，灾民们极受感动。许多灾民把家里的毛主席照片抢出来，挂到树上，他们说：“有了毛主席，什么灾难都不怕了。”"},{"type":"paragraph","text":"中央人民政府、西南军政委员会、云南省军政委员会和省人民政府所拨发的大批救济粮食、药品及救济金，陆续运到了灾区。人民解放军卫生部门和昆明一百五十多名医务工作者所组成的工作队，在灾区设置了大规模的临时医院和巡回医疗队，紧张地进行医疗工作。云南省各界人民响应省各界人民协商委员会的号召，开展了群众性的救灾运动，仅昆明市人民便捐出八万多件衣物和十亿元救济金。灾区受灾较轻的农民也自动地向重灾村寨送柴、送米。"},{"type":"paragraph","text":"目前，灾区人民已经获得救济粮，并搭起了住宿的草棚；负伤的人都被送到临时医院治疗，留在村里的轻伤者由巡回医疗队来诊治，死者都已安葬。人们普遍组织了生产救灾的互助组，赶修房屋、水渠和道路，开始重建家园。"},{"type":"paragraph","text":"丽江区各族各界人民代表会议第二届第二次会议全体代表，特地致电毛主席、周总理、西南军政委员会、云南省军政委员会和省人民政府致敬。他们在给毛主席的电文中说：由于毛主席和人民政府的关怀和救济，灾民生活已得到安定；我们誓以积极响应增产节约号召、进一步加强民族团结、完成内地的土地改革、巩固国防的实际行动，来报答毛主席的关怀。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb192beec8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
