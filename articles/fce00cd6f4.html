tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"林彪贺龙叶剑英元帅视察装甲兵部队","authors":[],"parts":[{"type":"paragraph","text":"本报讯 27日上午，林彪元帅、贺龙元帅、叶剑英元帅，到装甲兵部队进行了视察。"},{"type":"paragraph","text":"林彪元帅、贺龙元帅、叶剑英元帅首先听取了某支队政委邓辉关于部队训练工作情况的汇报，接着便到了射击场，参观了坦克连战斗射击、坦克驾驶、坦克射击预习、车库和修理间。在射击预习场上，当排长梅乾泰拿着打中优秀成绩时，林彪元帅对他们的成绩表示满意。林彪元帅亲切地问乘员：是谁打的？宋怀友回答说：元帅同志，是友询问了乘员们的技术学习情况。"},{"type":"paragraph","text":"林彪元帅等还到了战士宿舍和连队俱乐部，详细询问了士兵的生活情况。"},{"type":"paragraph","text":"林彪元帅、贺龙元帅、叶剑英元帅（自左至右）参观坦克驾驶"},{"type":"paragraph","text":"坦克驾驶表演"}],"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fce00cd6f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
