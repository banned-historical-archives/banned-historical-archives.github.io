ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"务不使粤敌逃入广西","alias":"","parts":[{"type":"paragraph","text":"务不使粤敌逃人广西！"},{"type":"paragraph","text":"（1949年10月13日）林、邓，叶、陈："},{"type":"paragraph","text":"据香港十月十日电称，“（一）据空军高级人员方面获息，蒋电李白，弃守广州，坚持广西；并表示，今后对李白做法，当不予干涉。（二）据熟悉桂系的人说，桂残军如退入桂境，当会大部逃散，丧失战斗力。现白匪正大量廉价售卖枪支给地主，拟大量组织地方反动势力，并在桂东演习坚壁清野，连谷种都要毁灭”等语。请加注意，务不使粤敌逃入广西。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十月十三日"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给第四野战军兼华中军区司令员林彪、第二政治委员邓子恢，中共中央华南分局第一书记、广东军区司令员兼政治委员叶剑英和第二野战军第四兵团司令员兼政治委员陈的电报。"},{"type":"paragraph","text":"[2]蒋，指蒋介石。"},{"type":"paragraph","text":"[3]李白，指李宗仁、白崇禧，当时分别任国民党政府代总统和国民党军华中军政长官公署长官。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":410,"page_end":410},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e6f85e4df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
