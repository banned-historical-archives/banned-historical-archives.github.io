<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对我军南进的三点意见","alias":"","parts":[{"type":"paragraph","text":"对我军南进的三点意见"},{"type":"paragraph","text":"（1947年8月12日）刘、邓，并告陈、粟："},{"type":"paragraph","text":"有三点请你们勘酌："},{"type":"paragraph","text":"（一）鉴于二万五千里长征时期休息太少，疲劳太甚，减员太多，而那种性急有许多是不必要的；此次我军南进，必须减少不必要的性急，力争少走路、多休息；情况紧张时应当走几天长的，但应跟着休息几天，恢复疲劳。"},{"type":"paragraph","text":"（二）在目前几个星期内，必须避免打大仗，专打分散薄弱之敌，不打集中强大之敌，待我军习惯于无后方外线行动，养精蓄锐，又在有利于我之敌情、地形条件下，方可考虑打大仗。"},{"type":"paragraph","text":"（三）不要希望短期内就能在大别山、豫西、皖西等地建立巩固根据地，这是不可能的，这些都只能是临时立足点。必须估计到我军要有很长时间（至少半年）在江河之间东西南北地区往来机动，宣传群众，发动群众，并在歼灭敌人几十个旅之后，方能建立巩固根据地。"},{"type":"paragraph","text":"[1]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。"},{"type":"paragraph","text":"[2]陈、粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。"},{"type":"paragraph","text":"（四）以上三点，如刘邓认为可行，则请告知陈唐、叶陶\"一体遵行，使大家有精神准备，以利战胜蒋介石。"},{"type":"paragraph","text":"军委未文"},{"type":"paragraph","text":"中尔"},{"type":"paragraph","text":"行"},{"type":"paragraph","text":"你虎劳低毛泽东为中共中央军委起草的《对我军南进的三点意见》的手稿。"},{"type":"paragraph","text":"[1]陈唐，指陈士、唐亮，当时分别任华东野战军参谋长和政治部主任。叶陶，指叶飞、陶勇，当时分别任华东野战军第一纵队司令员和第四纵队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":202,"page_end":203},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"对我军南进的三点意见","description":"根据毛泽东手稿刊印。","dates":[{"year":1947,"month":8,"day":12}],"parts":[{"text":"对我军南进的三点意见","type":"title"},{"type":"appellation","text":"刘邓，并告陈粟："},{"type":"paragraph","text":"有三点请你们斟酌：（一）鉴于二万五千里长征时期休息太少，疲劳太甚，减员太多，而那种性急有许多是不必要的；此次我军南进，必须减少不必要的性急，力争少走路、多休息，情况紧张时应当走几天长的，但应跟着休息几天，恢复疲劳。（二）在目前几个星期内，必须避免打大仗，专打分散薄弱之敌，不打集中强大之敌，待我军习惯于无后方外线行动，养精蓄锐，又在有利于我之敌情、地形条件下，方可考虑打大仗。（三）不要希望短期内就能在大别山、豫西、皖西等地建立巩固根据地，这是不可能的，这些都只能是临时立足点。必须估计到我军要有很长时间（至少半年）在江河之间东西南北地区往来机动，宣传群众，发动群众，并在歼灭敌人几十个旅之后，方能建立巩固根据地。（四）以上三点，如刘邓认为可行，则请告知陈唐、叶陶一体遵行，使大家有精神准备，以利战胜蒋介石。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"未文"}],"comment_pivots":[{"part_idx":1,"offset":2,"index":1},{"part_idx":1,"offset":7,"index":2},{"part_idx":2,"offset":332,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["刘邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。","陈粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。","陈唐，指陈士榘、唐亮，当时分别任华东野战军参谋长和政治部主任。叶陶，指叶飞、陶勇，当时分别任华东野战军第一纵队司令员和第四纵队司令员。"],"page_start":300,"page_end":301,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d80906d8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
