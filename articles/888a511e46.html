art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"重视培养使用“文革”中入学的大学毕业生","authors":["崔长生/王亚东"],"parts":[{"type":"paragraph","text":"本报讯 二六四医院党委把培养使用“文革”中入学的大学毕业生作为落实知识分子政策的一项具体工作来抓，取得了好的效果。近两年时间里，他们当中有46％的人在全国性医学刊物上发表了论文，有四分之一的人获科技成果奖。"},{"type":"paragraph","text":"这个医院有在“文章”中入学的大学毕业生三十七名，绝大部分同志在临床科工作。医院党委正确对待来自社会上的某些偏见和非议，热情关心培养他们，主要采取了两条措施："},{"type":"paragraph","text":"一是组织“回炉”学习。医疗任务重，他们就让科室领导和机关医务干部下去顶班，抽出这些同志参加军区办的基础知识“回炉”班。有的工作实在离不开，他们就发动五十年代、六十年代大学毕业的中年知识分子同这部分同志结成对子，帮助他们在职补习基础知识。这些同志，最后都以合格成绩通过了地方医学院的考核。"},{"type":"paragraph","text":"二是进行“技术补血”。医院不惜财力，同军内和地方医学院、著名医院签订合同，派他们中的一部分人去进修，学习过去没有学到的东西。医院自办了骨外、放射各类学习班，请专家学者上课。再就是安排这些同志在本科“小回转”，接触本科室的所有专业；在全医院“大回转”，使他们熟悉有关专业知识。在这两年里，医院还推荐了他们当中的十七人参加全国、全军和所在省的医学学术交流会。"},{"type":"paragraph","text":"这些措施，使“文革”中入学的大学生干部进一步打牢了知识根底，提高了医疗技术。现在这批同志中有两名被选拔到医务处负责全院医疗行政工作，有五分之四的人成了本科室的业务骨干。"},{"type":"paragraph","text":"（崔长生、王亚东）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"888a511e46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
