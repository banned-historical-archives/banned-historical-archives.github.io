script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"恢复和发扬井冈山彻底革命精神  井冈山军民分别在茨坪和黄洋界举行毛主席《水调歌头·重上井冈山》诗词碑和黄洋界保卫战胜利纪念碑落成典礼","authors":[],"dates":[{"year":1977,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"恢复和发扬井冈山彻底革命精神"},{"type":"paragraph","text":"井冈山军民分别在茨坪和黄洋界举行毛主席《水调歌头·重上井冈山》诗词碑和黄洋界保卫战胜利纪念碑落成典礼"},{"type":"paragraph","text":"新华社南昌一九七七年十月二十九日电　井冈山人民二十八日分别在茨坪和黄洋界举行了毛主席《水调歌头·重上井冈山》诗词碑和黄洋界保卫战胜利纪念碑落成典礼。"},{"type":"paragraph","text":"一九六五年五月，毛主席重上井冈山时，写下了光辉诗篇《水调歌头·重上井冈山》。为了不忘毛主席对井冈山人民的深切关怀，井冈山人民在当年毛主席亲切接见的地方，建造了《水调歌头·重上井冈山》诗词碑。碑高八米，宽十四米，在正面洁白的水磨石字板上，镌刻了贴金的毛主席《水调歌头·重上井冈山》全词。碑的上端镶嵌着井冈山五大哨口风光的图案。碑的两旁栽了井冈山的常青树，显得庄严宏伟。"},{"type":"paragraph","text":"重建的黄洋界保卫战胜利纪念碑，基本上按一九六五年原碑的造型设计。碑的正面用汉白玉镌刻贴金的毛主席手书“星星之火，可以燎原”八个大字，背面刻了朱委员长的题字“黄洋界保卫战胜利纪念碑”。在这座纪念碑的对面，新建了一座巨大的横碑。横碑正面的汉白玉碑面上刻了毛主席特意为黄洋界保卫战胜利纪念碑写的《西江月·井冈山》全词，背面刻了朱委员长亲笔书写的“黄洋界”三个金色大字。纪念碑座落在当年黄洋界保卫战旧址的山颠上，面对着涛涛林海，气势磅礴。"},{"type":"paragraph","text":"二十八日，井冈山军民和前来参加毛主席创建井冈山革命根据地五十周年纪念活动的各地代表一千人，分别到茨坪和黄洋界参加落成典礼。省委常委、省革委会副主任刘俊秀，井冈山地委书记王书枫，分别主持了大会。省委第一书记江渭清，省委副书记狄生分别剪彩。"},{"type":"paragraph","text":"省委书记白栋材在毛主席《水调歌头·重上井冈山》诗词碑落成典礼上讲话。他说，毛主席《水调歌头·重上井冈山》诗词碑的兴建，铭刻着毛主席对井冈山儿女的亲切关怀，也凝结着井冈山儿女对毛主席的无限崇敬和怀念。吟诵《水调歌头·重上井冈山》的光辉诗篇，使我们在继续革命的道路上增添了无穷的力量。"},{"type":"paragraph","text":"省委书记杨尚奎在黄洋界保卫战胜利纪念碑落成典礼上讲话。他说，这座具有伟大历史意义的纪念碑的建成，是粉碎林彪反党集团和“四人帮”的一个胜利成果。解放后，井冈山人民为纪念黄洋界保卫战的伟大胜利，在当年黄洋界哨口建立了黄洋界保卫战胜利纪念碑，朱德委员长曾经亲自为这座纪念碑题字。一九六五年五月二十二日，毛主席重上井冈山时，在这座纪念碑前照了像。可是，卖国贼林彪妄图篡改井冈山斗争的历史，伙同他在江西的死党悍然炸毁了这座纪念碑，搞了一个为他们自己树碑立传的“火炬亭”。林彪反党集团垮台后，“四人帮”又极力阻挠这一工程的重建。今天，在华主席、党中央亲切关怀下，纪念碑终于胜利建成。登上黄洋界，瞻望五百里井冈，我们无限怀念毛主席，更加热爱华主席。我们一定要在华主席、党中央领导下，恢复和发扬井冈山彻底革命精神和优良传统，把井冈山建设好，把江西建设好。参加今天大会的还有省委、省革委负责同志，湖南省湘潭地区、韶山特区代表也参加了大会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77eb2e9b43"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
