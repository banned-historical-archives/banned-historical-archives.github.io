script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗马尼亚“火花报”列举事实证明修正主义者为外国服务","authors":[],"dates":[{"year":1958,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布加勒斯特11日电】　为纪念罗马尼亚实行国有化十周年，这里的“火花报”11日发表社论说:罗马尼亚的经验再一次证明了掌握国家政权的工人阶级所实行的社会主义国有化和某些资本主义国家所实行的国有化的根本不同。"},{"type":"paragraph","text":"社论说，改良主义者和修正主义者认为，资产阶级国家是超于社会之上而为普遍的福利服务的，它对工人和资本家一视同仁，根据情况需要对工人和资本家轮流加以限制，此外还会促使在国家垄断资本主义内部产生社会主义因素。但是，人们不难看出，提出这种理论的人究竟是为谁的利益服务；根据这种理论，杜勒斯先生辞去国际镍公司董事长和洛克菲勒基金会主席的职务而担任国务卿，乃是为了限制垄断资本而照料社会主义在美国的诞生!"},{"type":"paragraph","text":"社论指出，罗马尼亚的经验证实了建设新社会制度的普遍规律的正确性。罗马尼亚社会主义建设之所以取得巨大成就是由于党所实行的正确路线，它坚决拒绝了修正主义的反马克思主义理论；修正主义者认为社会主义会自发地发展而反对社会主义的国家在经济方面根据民主集中制原则进行有组织的活动和计划管理。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b65442690"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
