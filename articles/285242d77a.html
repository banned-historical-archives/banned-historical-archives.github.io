art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席会见西哈努克亲王并设宴招待柬埔寨贵宾","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社15日讯 毛泽东主席今天中午会见柬埔寨国家元首诺罗敦·西哈努克亲王和夫人。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，柬埔寨方面在场的有：索丽姬·伦赛公主、克马努拉克王子、西哈莫尼王子、额凌达拉邦王子，国家元首私人顾问宾努、松山，王位最高委员会委员、皇家空军司令努呼将军和夫人，内政国务秘书诺罗敦·富里萨拉和夫人，外交国务秘书胡森巴，公务局长西梳瓦·埃萨罗和夫人，蒙公主，外交部礼宾司司长纳伊·瓦朗坦等。柬埔寨驻中国大使西里克·马塔克和夫人也在座。"},{"type":"paragraph","text":"中国方面在场有：刘少奇主席和夫人，彭真副委员长和夫人，贺龙副总理和夫人，罗瑞卿副总理和夫人，外交部副部长姬鹏飞和夫人，我国驻柬埔寨大使陈叔亮和夫人，对外经济联络总局副局长杨琳，外交部礼宾司司长俞沛文，第二亚洲司司长周秋野。"},{"type":"paragraph","text":"会见以后，毛泽东设宴招待西哈努克亲王和夫人以及柬埔寨其他贵宾。"},{"type":"paragraph","text":"毛泽东主席二月十五日会见了柬埔寨元首西哈努克亲王和夫人。图为会见后，毛泽东主席送别西哈努克亲王。 新华社记者 吕厚民摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"285242d77a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
