hors":[],"dates":[{"year":1967,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伦敦坎登（区）共产主义青年运动发表声明"},{"type":"paragraph","text":"完全支持中国无产阶级文化大革命"},{"type":"paragraph","text":"据新华社伦敦十四日电　新成立的伦敦坎登（区）共产主义青年运动最近发表声明说，它完全支持中国无产阶级文化大革命和中国共产党中央委员会关于无产阶级文化大革命的决定（十六条）。"},{"type":"paragraph","text":"这个组织，是由反对修正主义的一批英国青年组成的，他们由于坚持马克思列宁主义的立场，在去年被英国共产主义青年团“开除”。"},{"type":"paragraph","text":"坎登共产主义青年运动的声明说：“这场无产阶级文化革命，是由毛泽东主席领导的中国人民的一次毅然决然的努力，去铲除在中国社会和中国共产党内仍然存在的反动思想和行为，进一步加强中国的社会主义和共产主义建设。"},{"type":"paragraph","text":"“我们青年本着无产阶级国际主义精神，向参加这次史无前例活动的中国革命的红卫兵、青年工人和学生，表示最好的祝愿。”"},{"type":"paragraph","text":"声明指出，中国人民在“大踏步前进建设社会主义社会，并且在他们前进的每一阶段都正确运用毛泽东主席在当代所发展的马克思列宁主义”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ded11abd33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
