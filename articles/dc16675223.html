ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"关于接待抗战文艺工作团的电报","alias":"","parts":[{"type":"paragraph","text":"关于接待抗战文艺工作团的电报！"},{"type":"paragraph","text":"（1938年5月19日）各政治部："},{"type":"paragraph","text":"边区文化界救亡协会派抗战文艺工作团一组计五人，由刘白羽率领，随同美国参赞卡尔逊，经榆林、普西北赴战区各地考察，搜集材料，建立通讯网。到希接洽，并予以帮助。"},{"type":"paragraph","text":"毛谭"},{"type":"paragraph","text":"皓4"},{"type":"paragraph","text":"[1]这是毛泽东和中共中央军委总政治部副主任谭政给陕甘宁边区、晋绥军区各机关、部队政治部的电报。"},{"type":"paragraph","text":"[2]抗战文艺工作团，是由陕甘宁边区文化界救亡协会和八路军总政治部领导的，于1938年5月中旬成立。其任务是：搜集战地材料，反映前线生活，推动文艺运动，建立文艺组织。该团先后共派出六组到各地开展工作。"},{"type":"paragraph","text":"[3]刘白羽（1916—2005)，北京人，作家。当时是抗战文艺工作团第一组组长。"},{"type":"paragraph","text":"[4]皓，即19日。电报中常以诗词韵目代日。“皓”韵在第19组，即代指19日。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":5,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":204,"page_end":204},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc16675223"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
