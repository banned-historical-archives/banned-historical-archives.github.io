script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"王震对中央党校学员提出希望增强党性做有胆有识的革命者他说，邓小平同志指出:在我们的国家，搞资产阶级自由化，就是走资本主义道路，我们内部就成了一个乱的社会，不是一个安定的社会，什么建设都搞不成","authors":[],"dates":[{"year":1985,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京九月四日电　中央党校一九八五年秋季开学典礼今天上午在中央党校举行。中共中央政治局委员、中央党校校长王震在讲话中希望党校学员增强党性，发扬党的优良传统和优良作风，在四化建设中做有胆有识的革命者。"},{"type":"paragraph","text":"王震说，胡耀邦同志不久前在中央党校的一次讲话中，送给毕业学员四个字:有胆有识。胆，就是要为党的利益奋不顾身；识，就是要有正确的方向，掌握科学知识，了解实际情况。这就需要我们认真学习马克思列宁主义、毛泽东思想，树立共产主义的世界观，掌握渊博的知识。"},{"type":"paragraph","text":"王震说，我们要继续反对“左”的思想影响，也要反对资产阶级自由化倾向。邓小平同志指出，自由化思潮一发展，我们的事业就会被冲乱。在我们的国家，搞资产阶级自由化，就是走资本主义道路，我们内部就成了一个乱的社会，不是一个安定的社会，什么建设都搞不成。对我们来说，这是一个非常关键的原则的问题。王震说，党校学员毕业以后，有的将要走上领导岗位，有的将从事思想意识形态的工作，大家一定要牢记邓小平同志讲的这段话。"},{"type":"paragraph","text":"中共中央书记处书记邓力群、中共中央纪律检查委员会书记韩天石、中共中央宣传部部长朱厚泽等，出席了开学典礼。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e090f9d9b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
