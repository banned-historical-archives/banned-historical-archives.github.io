<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要同资产阶级思想作长期斗争","authors":[],"dates":[{"year":1969,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"要同资产阶级思想作长期斗争"},{"type":"paragraph","text":"某部三营机枪连在学习林副主席的政治报告时，大家越学越亲切，越学方向越明。他们说：林副主席的政治报告，深刻地阐明了毛主席关于在无产阶级专政下继续革命的伟大理论，字字闪耀着毛泽东思想的灿烂光辉。"},{"type":"paragraph","text":"机枪连有的同志本来有一个想法，认为：我国无产阶级文化大革命，把大叛徒刘少奇为首的一小撮叛徒、特务、死不改悔的走资派揪出来了，就可以保证我们的党和国家永不变修了，革命的问题已经解决了。通过学习，提高了继续革命的自觉性，认识到原来的那种想法是不对的。"},{"type":"paragraph","text":"在学习中，大家反复学习毛主席的伟大教导：“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。所以，我们不能说最后的胜利。几十年都不能说这个话。不能丧失警惕。”他们回顾了国际共产主义运动的历史教训和我们党两条路线斗争的历史经验，以毛主席关于无产阶级专政下继续革命的伟大学说为武器，开展了“在无产阶级文化大革命取得了伟大胜利以后，还要不要继续革命”的专题讨论。"},{"type":"paragraph","text":"大家通过讨论提高了认识，很多同志深有体会地说：大叛徒刘少奇虽然被打倒了，但是他所散布的反革命修正主义的流毒还没有彻底肃清，剥削阶级的旧思想还存在，思想政治领域中的阶级斗争决不会停止。无产阶级要把革命进行到底，就要用毛泽东思想武装人们的头脑，用无产阶级思想彻底战胜资产阶级反动思想，让毛泽东思想占领一切阵地，统帅一切。如果放松了思想政治领域的阶级斗争，我们这样的社会主义国家，还会走向反面，还可能变质，还可能出现资本主义复辟。"},{"type":"paragraph","text":"大家还反复学习了林副主席政治报告中的一段话：“我们必须继续高举革命大批判的旗帜，用毛泽东思想批判资产阶级，批判修正主义，批判各种违反毛主席无产阶级革命路线的右的或极‘左’的错误思想，批判资产阶级个人主义，批判‘多中心即无中心论’。”大家深刻认识到，资产阶级思想，枪杆子是打不倒的，必须靠毛泽东思想去批判它，斗倒它，埋葬它。于是，大家都自觉地把继续深入开展革命大批判，清除各种错误思想，作为认真学习和贯彻“九大”精神的实际行动。"},{"type":"paragraph","text":"六九○○部队报道组"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e5ea3aac8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
