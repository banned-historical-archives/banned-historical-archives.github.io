对他们来访表示热烈欢迎","authors":[],"dates":[{"year":1979,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理宋庆龄副委员长出席欣赏波士顿交响乐团演出"},{"type":"paragraph","text":"演出休息时，会见乐团负责人，对他们来访表示热烈欢迎"},{"type":"paragraph","text":"新华社北京三月十七日电  国务院副总理邓小平、人大常委会副委员长宋庆龄同首都群众两千多人，今晚出席欣赏了由小泽征尔指挥的美国波士顿交响乐团在北京的首场演出。"},{"type":"paragraph","text":"今晚的演出是在红塔礼堂举行的。美国音乐家演奏了美国现代作曲家乔治·格什温的《一个美国人在巴黎》、中国作曲家吴祖强、王燕樵、刘德海的琵琶协奏曲《草原小姐妹》以及法国古典作曲家柏辽兹的《幻想交响曲》。在听众的热烈要求下，美国音乐家们加演了柏辽兹的拉科齐进行曲和中国的《白毛女》组曲选段。当琵琶协奏曲《草原小姐妹》演奏结束时，小泽征尔和刘德海，在全场观众的热烈掌声中紧紧拥抱。"},{"type":"paragraph","text":"邓小平副总理和宋庆龄副委员长在演出休息时，会见了乐团团长小泽征尔和乐团副团长托马斯·莫里斯、阿瑟·罗森等乐团主要负责人以及小泽征尔的母亲，同他们进行了亲切的交谈。"},{"type":"paragraph","text":"邓小平副总理和宋庆龄副委员长对波士顿交响乐团这次前来我国访问演出表示热烈欢迎。邓副总理说，这是中美两国关系正常化以后美国第一个艺术团到中国访问，表明中美两国人民间的交往在日益增多，这将有助于增进中美两国人民之间的了解和友谊。我们为此感到高兴。"},{"type":"paragraph","text":"小泽征尔团长说，邓副总理在美国肯尼迪中心宣布邀请波士顿交响乐团来访，我们对此感到非常高兴。我们到中国来，不仅为了演出，而且为了同中国音乐家一起工作，更重要的是两国音乐家之间能够进行交流，我们希望这种交流能继续下去。"},{"type":"paragraph","text":"美国音乐家今晚的演出，博得全场听众一阵阵长时间的掌声。演出结束时，邓小平副总理、宋庆龄副委员长等走上舞台，同小泽征尔以及美国音乐演奏家们亲切握手，祝贺他们演出成功。"},{"type":"paragraph","text":"文化部向波士顿交响乐团赠送了花篮。"},{"type":"paragraph","text":"出席今晚音乐会的还有有关部门的负责人黄镇、刘复之、周巍峙、姚仲明、章文晋、曾涛、毛联珏、吕骥、林林等。"},{"type":"paragraph","text":"美国驻中国大使伍德科克和夫人以及大使馆外交官员也出席了音乐会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8afa6c61fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
