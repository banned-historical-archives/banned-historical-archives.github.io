tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"继承毛主席遗志紧跟华主席胜利前进","authors":[],"parts":[{"type":"paragraph","text":"上海异型钢管厂老中青三结合党委成员，来到中国共产党第一次全国代表大会会址，学习毛主席的建党思想，批判“四人帮”背叛马列主义、毛泽东思想，背叛党的基本路线，阴谋篡党夺权的滔天罪行，决心一切行动听华主席指挥，同“四人帮”反党集团斗争到底。 新华社记者摄"},{"type":"paragraph","text":"毛主席永远活在亿万人民的心中，各族人民怀着无限崇敬和深切怀念的心情，络绎不绝地来到韶山，瞻仰毛主席旧居，缅怀毛主席的丰功伟绩，决心最紧密地团结在以华主席为首的党中央周围，把毛主席开创的无产阶级革命事业进行到底。 新华社记者摄"},{"type":"paragraph","text":"某部“政纪模范连”党支部，认真学习毛主席著作，继承毛主席遗志，决心最紧密地团结在华主席为首的党中央周围，一切行动听华主席为首的党中央指挥，带领全连把反对王、张、江、姚反党集团的斗争进行到底。"},{"type":"paragraph","text":"某部侦察连干部战士，发扬“宜将剩勇追穷寇”的革命精神，从政治上、思想上、组织上彻底揭发和批判“四人帮”篡党夺权的滔天罪行，进一步认清他们反革命的修正主义路线的极右实质。"},{"type":"paragraph","text":"某部“硬骨头六连”党支部带领全连认真学习毛主席指示，彻底批判“四人帮”反党乱军、妄图毁我长城的罪行。决心坚决按照毛主席的革命路线加强连队建设，跟着华主席乘胜前进。"},{"type":"paragraph","text":"广州部队军政干校学员来到毛主席亲手创建的革命老根据地井冈山，学习毛主席的伟大革命实践，高唱《三大纪律八项注意》歌，决心一切行动听华主席指挥，做无产阶级革命的坚强战士。"},{"type":"paragraph","text":"海南军区某舰艇部队指战员，在揭发批判“四人帮”反党集团的斗争取得节节胜利的大好形势下，牢记毛主席关于“提高警惕，保卫祖国”的伟大教导，日夜巡逻在祖国的南海海疆。（本版照片除署名者外均为本报通讯员、本报记者摄）（照片）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74f017706e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
