{"year":1968,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"靠毛泽东思想去占领教育阵地编辑同志："},{"type":"paragraph","text":"这几天，我心里真有说不完的高兴。当我接到参加工人毛泽东思想宣传队的通知时，激动得吃不下饭、睡不着觉，对着毛主席像，流出了热泪。"},{"type":"paragraph","text":"我是一个普通的女工，从十一岁起就当童工，在旧社会里吃不饱、穿不暖，过着牛马不如的生活。解放后，在党的培养和哺育下，我入了党，当上了先进生产者，还见到了我们日夜想念的伟大领袖毛主席，这是我终生最大最大的幸福。毛主席最近指出：“要充分发挥工人阶级在文化大革命中和一切工作中的领导作用。”这是毛主席对我们工人阶级的最大信任、最大支持、最大鼓舞、最大鞭策。毛主席指向哪里，我一定奔向哪里。现在，我们工人毛泽东思想宣传队，已经浩浩荡荡、昂首阔步开进了大专院校。"},{"type":"paragraph","text":"大学，这是一个长期被资产阶级统治的顽固堡垒。在资产阶级教育制度下培养出来的大学生，有的就看不起我们工人，也看不起贫下中农，自以为“了不起”，思想感情与我们工农格格不入。有的工农出身的子弟，在那样的大学里读了几年书，回来不肯做工种田，这不是忘本吗？因此，我的一个大孩子读到高中以后，我和我的爱人（贫农社员）商量，决定不让他读大学，而送他去参军了。想不到现在我自己却要进大学，而且这次进大学，是带着毛主席赋予我们的历史使命，受了整个阶级的委托去的，是要用毛泽东思想去占领教育阵地。我一定要按照毛主席的教导，很好地完成无产阶级教育革命这个光荣的战斗任务。"},{"type":"paragraph","text":"我做过近三十年工，平时摸熟了细纱机的脾气，现在要去和那些知识分子打交道，我曾问自己：行不行？回答是肯定的：“行！”我从小没有进过一天学堂，解放后才读了几年夜校，“喝”的墨水很少，但是，经历过的阶级斗争和生产斗争不算少，特别是通过这场无产阶级文化大革命，我更深切地感到，只要牢牢地掌握毛泽东思想这个最锐利的武器，就能无往而不胜！“无产阶级不但要解放自己，而且要解放全人类。如果不能解放全人类，无产阶级自己就不能最后地得到解放。”如果我们工人阶级不把学校中的无产阶级教育革命搞彻底，不挖掉修正主义根子，资本主义就可能复辟，我们也就要重新受压迫、受剥削，要重吃二遍苦。想到这里，我就觉得浑身有使不完的劲！我一定要打好这个硬仗！在斗争中不断提高自己的政治觉悟，和解放军战士以及学校的革命的学生、革命的教师、革命的工人一起，共同搞好大学的全部斗、批、改，誓把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"进驻上海第一医学院工人毛泽东思想宣传队"},{"type":"paragraph","text":"上海国棉三十二厂五好工人、全国先进生产者"},{"type":"paragraph","text":"张大妹"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fb4f7f909"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
