<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"团市委举行上海青年诗歌朗诵演唱会革命诗歌作武器　反击右倾翻案风来自各条战线的青年集中火力批判党内那个不肯改梅的走资派","authors":[],"dates":[{"year":1976,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　“炮火连天，弹痕遍地”。在全国人民反击右倾翻案风，批判党内那个不肯改悔的走资派的斗争中，共青团上海市委于本月五日在市青年宫举行了“批判修正主义路线，回击右倾翻案风，上海青年诗歌朗诵演唱会”。"},{"type":"paragraph","text":"青年宫中央台周围的天桥边悬挂着“以阶级斗争为纲，反击右倾翻案风”、“巩固和发展无产阶级文化大革命的胜利成果”等大幅标语。中央台周围的青年英雄画廊、天桥上和各楼面上簇拥着来自上海各条战线的四千多名青年代表。参加台下集体朗诵的有来自冶金、纺织、机电一局的青年工人，上海师大、复旦大学、第一医学院的工农兵学员，科研战线的新兵和静安区的红卫兵小将。他们用革命诗歌作武器，集中火力批判右倾翻案风的风源和总根子——党内那个不肯改悔的走资派，充分显示了经过无产阶级文化大革命锻炼的青年一代，在毛主席革命路线指引下朝气蓬勃的战斗风貌。"},{"type":"paragraph","text":"大会在毛主席词二首《水调歌头·重上井冈山》、《念奴娇·鸟儿问答》的朗诵声中开始。光辉的诗篇激励着革命青年的战斗豪情。“祖国大地，阳光普照，新生事物，如同春苗。”台上报幕员声音刚落，台下的青年们纷纷应诗。他们衷心地赞美:理论队伍茁壮成长，文艺新花朵朵向阳，卫生革命日新月异，上山下乡势不可当，朝阳农学院道路宽又广，工农兵学员大步朝前迈……一首首热情洋溢的诗，迸发出革命青年共同的心声:“我为春苗大声叫好。”"},{"type":"paragraph","text":"会上，上海师大等大学的工农兵学员一马当先，高声朗诵“铁臂举得高”，“怒火胸中烧”，青年工人们紧紧呼应。这时全场青年满腔义愤，齐声高歌《对准走资派猛开炮》。霎时，如弹上膛，刀出鞘，对准“三项指示为纲”的修正主义纲领猛烈开火的战斗打响了!上钢一厂的工人朗诵了《钢厂卷起批判潮》，展现了上海钢铁工人以钢钎作笔斩魔妖的战斗场景。上海鼓风机厂朗诵的《两朵棉桃》，形象地说明修正主义科研路线把人害，开门办科研就是好。《台阶挡不住新一代》显示了红卫兵小将敢于踏碎“台阶”，斗倒一切“还乡团”的革命造反精神。上海话剧团和长宁区青年宫分别朗诵了《批判会上》和《校园风雷》，无情鞭挞了修正主义教育路线的滔天罪恶，热情讴歌了无产阶级教育路线的伟大胜利，表达了广大革命师生决心继续与修正主义教育路线对着干，誓将无产阶级教育革命进行到底的豪迈气概。"},{"type":"paragraph","text":"大批判的战鼓越擂越响，如千钧雷霆震长空。革命青年发出了怒吼:撕下“三项指示为纲”的画皮，剥开“四个现代化”的外衣，揭穿折中主义的鬼把戏，阶级斗争永远是历史前进的动力。会场上诗浪滚滚，犹如长江的波涛，象征着我们社会主义祖国一代更比一代强。会场上歌声阵阵，犹如黄浦江的春潮和着亿万人民的心声——无产阶级文化大革命就是好!"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\03\\7636040501.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海各条战线青年以充满战斗激情的革命诗歌，狠批党内那个不肯改悔的走资派。"},{"type":"paragraph","text":"本报通讯　员摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"687f66bf46"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
