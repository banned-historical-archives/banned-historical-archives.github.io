" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给毛远悌的信","alias":"","parts":[{"type":"paragraph","text":"给毛远梯的信"},{"type":"paragraph","text":"（1950年5月12日）远悌贤侄："},{"type":"paragraph","text":"两次来信都收到了，很高兴。你做印厂工作极好，应将此项工作做好，不要来北京。学习事将来有机会时再说。远翔?是否尚在革大，有一信请转交。远翔略历我忘记了，便时请告我。此祝进步！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年五月十二日"},{"type":"paragraph","text":"[1]毛远梯，1924年生，湖南省韶山市韶山乡韶源村人，毛泽东的房侄。1945年加入中国共产党，从事过工人运动、学生运动等方面的工作。新中国成立后，曾任湖南省总工会工农印刷厂经理、湖南省医药管理局办公室主任等职。"},{"type":"paragraph","text":"[2]远翔，即毛远翔。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":382,"page_end":382},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df140e19d1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
