tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓副总理向拉扎克墓撒花瓣"},{"type":"paragraph","text":"邓小平副总理十一月十一日上午前往国家清真寺，向马来西亚已故总理敦·阿卜杜勒·拉扎克表示敬意。邓副总理在陵墓前默哀，并向陵墓撒了花瓣。然后，邓副总理到马来西亚已故副总理伊斯梅尔陵墓前，向他表示敬意。邓副总理参观了这个东南亚最大的清真寺。"},{"type":"paragraph","text":"侯赛因总理接受访华邀请"},{"type":"paragraph","text":"中国副总理邓小平十一月十一日向马来西亚总理达图·侯赛因·宾·奥恩转达了华国锋总理请他在方便的时候访问中国的邀请。侯赛因总理愉快地接受了邀请。邓小平副总理和侯赛因总理十一月十一日下午在马来西亚总理府举行了第二次，也是最后一次的会谈。"},{"type":"paragraph","text":"李先念副总理会见美国朋友"},{"type":"paragraph","text":"李先念副总理十一月十一日上午会见美国美林公司董事长里根、前国务卿罗杰斯一行，双方探讨了美林公司为中国建设项目提供资金和合作的可能性。李副总理说，在不损害我国主权的条件下，我国可以利用美国、日本和西欧等发达国家的先进技术和资金，以加快实现四个现代化的速度。李先念副总理谈话时还谴责了越南推行地区霸权主义和控制东南亚的野心。"},{"type":"paragraph","text":"国务院抗旱领导小组召开抗旱会议"},{"type":"paragraph","text":"最近，国务院抗旱领导小组召开了有长江中下游和黄、淮、海流域各省代表参加的抗旱会议。会议总结交流了今年抗旱斗争经验，针对这些地区当前塘库蓄水减少，今冬明春雨量又偏少，旱情可能继续发展的趋势，部署了抗旱任务，号召旱区人民进一步发扬连续作战的革命精神，先发制旱，春旱冬抗，保证小麦、油菜、绿肥作物安全越冬，保证明年顺利春播。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac04b71683"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
