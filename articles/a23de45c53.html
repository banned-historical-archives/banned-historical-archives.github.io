art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决支持世界人民的反美斗争","authors":["某部驻武汉锅炉厂毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席支持世界人民反对美帝斗争的庄严声明发表后，我们宣传队全体同志和全厂广大革命工人无不欢欣鼓舞，热情高呼：“毛主席万岁！”“毛主席万万岁！”"},{"type":"paragraph","text":"毛主席一贯教导我们：“已经获得革命胜利的人民，应该援助正在争取解放的人民的斗争”。我们进驻武汉锅炉厂支左以来，把抓好革命和生产当做支援世界被压迫人民求解放的实际行动。我们以八三四一部队支左人员为榜样，紧跟伟大领袖毛主席的伟大战略部署，坚决贯彻执行毛主席一系列最新指示，团结广大革命群众，不断夺取了革命和生产的新胜利。去年十一月份起，全厂产量月月刷新，今年四月份产值超过过去同期最高纪录的百分之七十八。"},{"type":"paragraph","text":"我们一定要把毛主席的庄严声明作为新的巨大动力，把已经取得的成绩作为继续革命的起点，发扬一不怕苦、二不怕死的彻底革命精神，进一步落实“九大”提出的各项战斗任务，搞好三支两军工作，帮助厂革委会扎扎实实搞好斗、批、改，掀起抓革命、促生产的新高潮，以实际行动响应毛主席的伟大号召，支持世界人民的反美斗争。"}],"alias":""},"tags":[{"name":"三支两军","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a23de45c53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
