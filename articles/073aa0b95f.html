{"year":1959,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京17日电】　毛泽东主席今天致电尼泊尔王国国王马亨德拉·比尔·比克拉姆·沙阿·德瓦，祝贺尼泊尔王国国庆。电文说:"},{"type":"paragraph","text":"欣逢贵国国庆之际，我谨代表中国人民并以我个人名义向陛下和尼泊尔人民表示热烈的祝贺。我深信，中尼两国间的传统友谊将在和平共处五项原则的基础上继续发展和巩固，祝陛下和尼泊尔人民在谋求国家繁荣昌盛和维护亚洲及世界和平的事业中获得新的成就。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"073aa0b95f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
