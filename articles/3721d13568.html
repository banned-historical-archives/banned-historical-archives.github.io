script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在美日反动统治下　日本人生活贫苦　儿童奴隶买卖盛行","authors":[],"dates":[{"year":1950,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京电】　塔斯社十六日电引东京‘东京日日新闻’报消息:尽管保护儿童法已在日本公布，儿童的买卖仍旧继续着。儿童买卖特别盛行于乡村，那里很多农民生活于赤贫中。儿童奴隶买卖的事情，每月至少有十件。在某些月份中，竟达二十至三十起之多。被出售的儿童中，十六岁至十八岁的占总数的百分之七十，其次为十四岁至十六岁的儿童。出卖九岁儿童的事情也有。"},{"type":"paragraph","text":"奴隶买卖的经纪人平均每出售一个儿童，接受一千至五千日元的‘佣金’。做奴隶的期限由三年到十二年。有一次，一个十一岁的儿童被卖做奴隶十一年。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3721d13568"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
