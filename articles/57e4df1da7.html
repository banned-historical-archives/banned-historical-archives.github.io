script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳大利亚共产党（马列）主席希尔副主席奥谢、布尔的唁电","authors":[],"dates":[{"year":1976,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳大利亚共产党（马列）主席希尔副主席奥谢、布尔的唁电北京中国共产党中央委员会："},{"type":"paragraph","text":"我们怀着沉痛的心情谨向你们并通过你们向全体中国人民对毛泽东同志的逝世表示最深切的哀悼。毛主席充分体现了他所继承、捍卫和发展了的马克思列宁主义的深刻真理。他的名字同马克思、恩格斯、列宁、斯大林的名字并列是理所当然的。科学社会主义的科学被叙述为马克思主义、列宁主义、毛泽东思想是精确的。毛主席是一切被压迫人民和劳动人民的灯塔。一切革命人民从他的著作、他的业绩和榜样中受到极大的鼓舞。他是当代最伟大的人物，也是一切时代最伟大的人物之一。一切诚实的人都感到他的个人品格的伟大力量，同他见过面的人都知道他那种出于对人民的热爱的深厚的热忱。一九二一年中国共产党建立以来，毛主席领导中国人民进行了解放斗争。一九四九年赢得解放之后，他领导了在中国建设社会主义的斗争。毛主席向阉割共产主义革命灵魂的修正主义进行了斗争。他及时地分析了苏联修正主义集团对共产主义的背叛，揭示了苏联社会帝国主义的形成及其对世界的威胁。他发动、鼓舞并领导中国人民在中国进行了批判修正主义和巩固无产阶级专政的无产阶级文化大革命。他发动并领导了批林批孔的斗争和反对邓小平复辟活动的斗争。他坚持以阶级斗争为纲是具有重大意义的。他作为中国和世界最伟大的无产阶级革命家和最伟大的无产阶级国际主义者的业绩将与世长存。我们在深感悲痛之际，知道毛主席的业绩、榜样和他对马克思主义、列宁主义的贡献是不朽的，将永远继续鼓舞和指引着为人类解放和社会主义、共产主义在全世界的胜利而斗争的人们。"},{"type":"paragraph","text":"澳大利亚共产党（马克思列宁主义）"},{"type":"paragraph","text":"主　席：爱·弗·希　尔"},{"type":"paragraph","text":"副主席：克·莱·奥谢　艾·爱·布尔"},{"type":"paragraph","text":"一九七六年九月十日于墨尔本"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57e4df1da7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
