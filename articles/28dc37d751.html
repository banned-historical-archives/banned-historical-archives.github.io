script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大领袖毛主席的亲切关怀成为巨大的鼓舞力量  河南煤炭工业战线革命职工喜创新成绩","authors":[],"dates":[{"year":1968,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大领袖毛主席的亲切关怀成为巨大的鼓舞力量"},{"type":"paragraph","text":"河南煤炭工业战线革命职工喜创新成绩"},{"type":"paragraph","text":"新华社郑州二十三日电　在伟大领袖毛主席对全国煤矿革命矿工亲切关怀的巨大鼓舞下，河南全省煤炭工业战线上的广大革命矿工，掀起了抓革命促生产的新高潮。"},{"type":"paragraph","text":"毛主席和他的亲密战友林副主席接见出席煤矿抓革命、促生产会议革命职工代表以及来自全国各地两万多名革命战士的喜讯传来的第一天，河南平顶山、焦作、鹤壁等五个煤炭部直属矿务局所属的二十五个煤矿，以及新密、义马、安阳等省属煤矿，总计超额完成了全省当天原煤生产的国家计划。平顶山矿务局比平时日产量猛增一倍半还多。进入五月以来，河南的煤炭生产有了较大幅度的上升。到二十一日止，五个矿务局平均日产水平比四月份提高百分之三十六点三，其中，焦作和鹤壁两个矿务局都超额完成了五月上旬和中旬的生产计划。"},{"type":"paragraph","text":"五月二十日深夜，当在北京开会的煤矿职工代表把伟大领袖毛主席接见的特大喜讯传到河南各煤矿以后，各矿区一片欢腾。平顶山矿区各级革委会和驻矿人民解放军支左部队，连夜组织了四十五个毛泽东思想宣传队，以最快的速度把喜讯传遍井下和工人宿舍区。顷刻之间，几万革命矿工迸发出同一个声音：“毛主席万岁！万万岁！”许多矿工含着幸福的泪花，手捧红彤彤的革命宝书《毛主席语录》，一起站在毛主席像前宣誓：“一心忠于毛主席，海枯石烂不变心。我们要永远听毛主席的话，跟着毛主席迎着阶级斗争风浪走，抓好革命，猛促生产，用优异的成绩向毛主席报喜！”平顶山二十一日有两万多名革命职工举行抓革命、促生产誓师大会，坚决表示要紧跟毛主席的伟大战略部署，夺取无产阶级文化大革命的全面胜利。平顶山十矿一四三采煤班工人二十一日下井后，碰到三处冒顶长达十一米，他们齐声朗诵“下定决心，不怕牺牲，排除万难，去争取胜利”的毛主席语录，克服困难，很快刹住了冒顶，并在当班又出煤九百多吨，比平时日产水平增加了一倍。"},{"type":"paragraph","text":"平顶山、焦作、鹤壁等各矿广大革命职工，坚持下井搞好生产，上井后就以采煤队、掘井队或班组为单位开展革命大批判，狠批中国赫鲁晓夫及其代理人所推行的反革命修正主义路线，并且把革命大批判和反击右倾翻案妖风紧密结合起来。焦作矿务局所属各矿，广大无产阶级革命派和革命群众在毛主席最新指示武装下，狠抓阶级斗争，挖出了一批隐藏的叛徒、特务等国民党反动派残渣余孽，使焦作矿区革命和生产的面貌迅速改观。现在，这个矿革命大批判搞得轰轰烈烈，煤炭生产大幅度上升。"},{"type":"paragraph","text":"河南煤炭工业战线广大革命矿工在毛主席接见煤矿抓革命、促生产会议革命职工代表这一特大喜讯的鼓舞下，正在乘胜前进，誓把无产阶级文化大革命进行到底，把河南各煤矿办成红彤彤的毛泽东思想大学校。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28dc37d751"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
