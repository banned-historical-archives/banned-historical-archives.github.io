北农学院","郭士英"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"杂文〈鸡翼下的鹰隼〉","type":"title"},{"text":"西北农学院郭士英","type":"authors"},{"text":"历次的运动中都有一群“积极分子”，他们在党的指导下冲锋陷阵勇敢斗争，他们是运动的号角，人民的战士，他们是党孵育下的宝贝，培养对象、未来党员，他们是党鸡翼下的鹰隼。","type":"paragraph"},{"text":"但是这次运动中却大大不同，鹰隼变成了娇嫩的鸡雏，他们大多沉默寡言，老成持重，他们也得不到培养和指导。","type":"paragraph"},{"text":"鹰隼们！假如你们真是人民的雄鹰，那么发挥你们历来的积极性，揭发一切污浊的东西，在这次运动中也作个急先锋。否则你们不过是可怜的鹰雏！","type":"appellation"},{"text":" (植保系讲师  郭士英)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3f28b509a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
