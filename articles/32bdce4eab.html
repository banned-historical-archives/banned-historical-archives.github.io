art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的无产阶级卫生路线给牧民们带来幸福","authors":["新华社"],"parts":[{"type":"paragraph","text":"在内蒙古锡林郭勒大草原上，活跃着一支人民解放军的医疗队。他们经常跃马扬鞭，奔驰在牧区蒙古包之间，为广大贫下中牧防病治病，受到广大牧民的热烈欢迎。"},{"type":"paragraph","text":"一天，医疗队来到白音吐嘎公社，听说老贫牧哈恩达大娘由于旧社会长年给牧主当牛做马，积劳成疾，得了严重的关节炎，腰脊骨弯曲达九十多度。卫生员杨勇不顾天黑路远，立即翻身上马向四五十里以外的蒙古包奔去。途中，狂风大作，雷电交加，大雨倾盆。忽然，马失前蹄，把小杨从马背上摔了下来。这时，杨勇想起了毛主席关于“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的”的伟大教导，想到哈恩达大娘还在受着病魔的折磨，顿时增添了无穷的力量，忍着疼痛，跨上马继续前进……。"},{"type":"paragraph","text":"对哈恩达大娘这样的病，杨勇还是第一次遇到。为了早日使哈恩达大娘恢复健康，他先在自己身上试扎，找到了适当的穴位，然后给哈恩达大娘进行治疗。经过一个多月的精心治疗，终于使哈恩达大娘弯了二十多年的腰重新挺了起来，投入了放牧、挤奶的工作。"},{"type":"paragraph","text":"一天，双目失明的老贫牧艾登听说解放军医疗队来了，他怀着对子弟兵无限信任的感情，登门求医。经过诊断，艾登患的是白内障，需要动手术。可是，医疗队的三个卫生员都是搞卫生工作不久的新战士，没有临床经验，草原上也没有手术设备。怎么办？他们带着问题学习了毛主席的有关教导，决心想尽一切办法，治好艾登的眼睛。他们听说兄弟部队用针灸疗法治好了聋哑病，便提出用针灸疗法治白内障的方案。经过多次试验，他们终于找到了治疗白内障的最好穴位。他们用这种方法给艾登进行治疗，时间不长，艾登便重见了光明。艾登仰望着伟大领袖毛主席的光辉画像，激动得热泪盈眶，一遍又一遍地高呼：“毛主席万岁！毛主席万岁！”"},{"type":"paragraph","text":"茫茫草原炼红心，全心全意为人民。在短短的一年时间里，医疗队的同志们，还为广大贫下中牧培养了一支“赤脚医生”队伍。如今，这支队伍已经分布在辽阔的锡林郭勒大草原上，肩负起为广大贫下中牧治病的革命重担。"},{"type":"paragraph","text":"段〗新华社通讯员"},{"type":"paragraph","text":"段〗新华社记者"},{"type":"paragraph","text":"段〗（本报有删节）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32bdce4eab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
