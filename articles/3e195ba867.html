工作","authors":[],"dates":[{"year":1954,"month":12,"day":17}],"is_range_date":false,"parts":[{"text":"云南省农村富农、反革命分子破坏粮食工作","type":"title"},{"text":"【云南分社17日讯】粮食统购工作展开以后，云南农村地主、反革命分子和富农等进行破坏活动。据玉溪、曲靖等9个专区的材料，有以下几种方式：","type":"paragraph"},{"text":"一、造谣：昭通、绥江、会泽、楚雄、弥勒、蒙自等县都有“还要收购余肉”等谣言，因此，农民杀猪的现象比较普遍。陆良县独木村在10天之内就杀了28条猪。蒙自、弥勒等县有的农民连小猪也杀掉。","type":"paragraph"},{"text":"二、杀害干部、放火放毒：弥勒县八区一个乡的党支部书记被刺杀。彝良县火烧坝有坏人在水缸内放上毒药，有4个干部中毒（已救活）。昆明市厂口乡党员张文德有一晚被坏分子拦路毒打。路南县白大村在11月8日至12日每晚都有坏人放黑枪。路南、金平、广南等县均发现反革命分子放火烧仓库和烧干部房屋的现象。昭通、路南两县被富农破坏了两个蓄水塘。","type":"paragraph"},{"text":"三、破坏粮食入仓工作：大部分地区均有发现。峨山县一富农在粮食中加了20%的泥沙，呈贡县一个反革命分子将三升黄豆用水泡过交仓。元江县一富农用霉谷1000多斤入仓。","type":"appellation"},{"text":"四、其他如富宁县地主魏士国组织迷信团体，并冒充干部，下乡开会，破坏粮食政策。金平、路南等县富农已鬼怪，老虎，豹子等谣言，恐吓群众不敢开会。文山县富农李韦英，用高价抢购粮食1500多斤。","type":"paragraph"},{"text":" （龚农编）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年12月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e195ba867"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
