" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中南局对郑汴许市委关于对违法资本家判刑问题的复示","authors":[],"dates":[{"year":1952,"month":7,"day":25}],"is_range_date":false,"parts":[{"text":"中南局对郑汴许市委关于对违法资本家判刑问题的复示","type":"title"},{"text":"近来郑州、开封、许昌3市违法资本家拟判刑事处分的材料已审阅。一、按各城市判刑的工商户，中央提示一般不超过工商总户的2‰。中、小城市还应略低于此数（介于0．5‰—1‰之间）。二、其中判刑而缓刑者可以略多，可占判刑总数40％左右，1年至5年有期徒刑的不得少于受刑事处分的30％；10年以上有期徒刑者不得超过10％。","type":"paragraph"},{"text":"据前次城工座谈会反映材料。开封工商总户数10377户，此次判刑10户。郑州共9283户，判刑9户，比例妥善，量刑轻重亦尚合适可以执行。至于许昌拟判3户，均过重。其中陶××可改为有期徒刑，聂××、李××、张××3名应减到5年以下，请再研究执行。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"向中南局的请示报告","type":"subtitle"},{"text":"中共河南省委","type":"subtitle"},{"text":"1952年7月9日","type":"subtitle"},{"text":"昨日（本月8日）送去郑、汴、许3市委对违法资本家刑事处分意见报告，请查收，省委除同意他们的意见外，惟觉许昌市判刑似乎太高，我们意见陶××可判10年的徒刑，其他3犯可判3年至5年徒刑。请速批示。","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a110657ded"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
