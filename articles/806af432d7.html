" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"傅崇碧对北京“革命造反者”负责人的讲话","authors":[],"dates":[{"year":1967,"month":4,"day":30}],"is_range_date":false,"parts":[{"text":"傅崇碧对北京“革命造反者”负责人的讲话","type":"title"},{"text":"〖北京“革命造反者”总部及各分部负责人出席。摘要〗","type":"appellation"},{"text":"傅崇碧：","type":"paragraph"},{"text":"大家提的意见很好，递了很多条子，因时间的关系不能再继续开了。回去我们研究一下，过了“五一”再找你们商量，现在主要不能再发生武斗了。今天周景芳同志给财贸尖兵打个电话，不能再调兵了，武斗是完全错误的，是不符合毛泽东思想的。革命造反者，红色造反者过去有很大贡献了，你们自己发表声明，自己撤销了，不是我们强迫的，主要你们适应了大联合的形势。关于北大的武斗，江青同志讲是不符合毛泽东思想的，我们应该听毛主席的话，听中央文革的话。假如说：一方要让，那怎么能打起来呢？如果用压力，是解决不了问题的，我们要求革命造反者、红色造反者，要发扬过去的造反精神，如果有人把你们打成反革命，我们给你们平反，一定在“五一节”不能发生武斗，同志们能不能做到？","type":"paragraph"},{"text":"到会者答：能！","type":"paragraph"},{"text":"有人问：“财贸尖兵不听话，不按毛泽东思想办事，利用工代会的名誉再调人怎么办？”","type":"paragraph"},{"text":"傅：“那是更错误的！”","type":"paragraph"}],"comments":[],"origin":"1967年5月北京玻璃总厂红卫兵联络站编《中央首长讲话（4）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"傅崇碧","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"806af432d7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
