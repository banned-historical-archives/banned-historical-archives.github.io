script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"控诉美帝的侵略罪行　反对残暴统治和剥削菲律宾全国各地举行反美示威","authors":[],"dates":[{"year":1971,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十七日电　马尼拉消息:二十五日，菲律宾全国各地举行示威游行和群众集会，反对美帝国主义及其在菲律宾的代理人对菲律宾的剥削和压榨。"},{"type":"paragraph","text":"据马尼拉报纸报道，二十五日是菲律宾国会开幕的日子。这天上午，在马尼拉有一万二千多名群众高举着无数的横幅和标语牌，浩浩荡荡地在马尼拉的大街上示威游行。示威群众在国会大厅附近的广场上举行了“人民大会”，控诉美帝国主义对菲律宾的侵略罪行。参加这次示威的群众除工人、农民和学生以外，还有爱国的新闻工作者、民主人士、伊斯兰教教徒和国会议员。工人、学生和各阶层群众的代表在大会上讲了话。他们愤怒地指出:菲律宾的社会现实是面对着美帝国主义、封建地主和官僚资本家对菲律宾广大人民的残暴统治和剥削。美国侵略者贪而无厌的掠夺，使菲律宾人民日益穷困。代表们在讲话中号召菲律宾的工人、农民、学生和各阶层群众进一步团结起来，更广泛地开展民族民主斗争。"},{"type":"paragraph","text":"为了支持这场反美示威，马尼拉地区的交通工人和许多工厂企业的工人举行了罢工。百分之八十以上的商店停止营业。"},{"type":"paragraph","text":"面对这种高涨的反美示威，菲律宾反动当局出动五千多名军警和几千名便衣特务、打手，包围群众集会的会场。示威群众不畏强暴，坚持斗争。"},{"type":"paragraph","text":"同一天，菲律宾全国各主要城市和中吕宋的一些农村的人民群众也举行了反美集会和示威游行。有些集会和示威游行就在当地美资企业的大门前举行的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5268c39569"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
