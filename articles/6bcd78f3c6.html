录）","authors":[],"dates":[{"year":1953,"month":3,"day":23}],"is_range_date":false,"parts":[{"text":"贵州省赤水水上民主改革情况报告（节录）","type":"title"},{"text":"赤水河能通航者达575华里，大小码头17个，木船410双，载重量6862吨，全年运输量约两万吨左右，进口食盐为主，出口多系土特产，靠水为生者越15000人。 (p. 10) ……","type":"paragraph"},{"text":"民主改革工作中存在的问题：","type":"paragraph"},{"text":"有的地区把一般对我不满的人也列入把头对待，集中起来学习（实际上是管制），造成打击面过宽，但对混入我工会的坏分子则强调他是工人，有些又不处理，因此引起了船工船民的不安不满。 在条件未成熟时即开始了全面的斗争，使工作陷于被动，至今仍有17名已扣押，究竟是把头是反革命，罪恶多大，一直都弄不清楚。赤水城关区斗争把头玉海清时说某年某月杀死金二，次日金二还进城赶场，被玉海清之妻拉去证明，在群众中造成极坏的影响。 干部的强迫命令作风严重。复兴工作组规定工人每天学习8小时，有的请假不准，致使工人装病回家，并宣布“三天不来开会就开除会籍”，个别的命令下层干部在两天内发动群众80%，胡市斗争段益山时，干部亲自当主席又当苦主，有的吹哨子点名斗争。群众凡事向干部请假，甚至工人派工站轮子也得请示干部允许。 这种盲目包办代替的作风，已造成群众极大不满。 (p. 12)","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bcd78f3c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
