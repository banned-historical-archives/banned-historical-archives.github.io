":1958,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"访波杂咏"},{"type":"paragraph","text":"叶剑英"},{"type":"paragraph","text":"华沙公园怀萧邦（菩萨蛮）金黄秋色华沙好，肖邦作曲巴黎老，"},{"type":"paragraph","text":"风柳扫残阳，搔头念故乡。"},{"type":"paragraph","text":"春来花竞秀，遗曲人争奏，"},{"type":"paragraph","text":"莫叹少知音，伯牙悔碎琴。"},{"type":"paragraph","text":"在华沙维斯拉河桥上"},{"type":"paragraph","text":"弹痕炮隙对难忘，华沙重苏苦战场，"},{"type":"paragraph","text":"今到维斯拉畔望，楼红草绿靘时妆。"},{"type":"paragraph","text":"到克拉可夫城"},{"type":"paragraph","text":"克拉可夫建古都，教堂喇叭至今呼，"},{"type":"paragraph","text":"波人一午一听省，鞑靼当年射杀吾。"},{"type":"paragraph","text":"赴卡多维兹道中"},{"type":"paragraph","text":"茫茫原野绿平芜，十七华亩授一夫，"},{"type":"paragraph","text":"闻道太阳能量少，至今衣食尚将输。"},{"type":"paragraph","text":"参观奥斯维辛集中营"},{"type":"paragraph","text":"毒尸四百五十万，希姆莱真野兽狂。"},{"type":"paragraph","text":"奥斯维辛翻作教，教人团结教人强。"},{"type":"paragraph","text":"奥波莱女孩们献花"},{"type":"paragraph","text":"几多绿叶几多福，一朵红花一片心。"},{"type":"paragraph","text":"听得儿娃献花祝，引人诗兴入微吟。"},{"type":"paragraph","text":"别波兰"},{"type":"paragraph","text":"金黄秋色缀成图，锦绣山河一览收。"},{"type":"paragraph","text":"最足使人留念处，临行友谊倍来初。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fafe7c2d39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
