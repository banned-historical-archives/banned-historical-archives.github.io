经费浪费的指示","authors":[],"dates":[{"year":1950,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"中共中央转发云南省委关于禁止村政权经费浪费的指示","type":"title"},{"text":"各中央局、分局，并转各省委、区党委、直属市委：","type":"appellation"},{"text":"村经费支用浪费是一极严重现象，云南省委发了严禁指示，西南局已通知所属遵行。望各地检查此事，按照情况采行为盼。","type":"paragraph"},{"text":" 中  央五月十四日","type":"paragraph"},{"text":"云南省委禁止村政权浪费指示","type":"subtitle"},{"text":"各地并报中央：","type":"appellation"},{"text":"兹将云南省委关于禁止村级浪费的指示，转发你们，望注意检查有无同类的现象","type":"paragraph"},{"text":" 西南局五月四日","type":"paragraph"},{"text":"各地委、工委并西南局：","type":"appellation"},{"text":"近来发现各地村经费开支惊人的浪费现象，如以办公为名，吃喝招待，起伙吃大锅饭，甚至招待工作人员看戏、洗澡等，任意挥霍，极大地加重群众负担。此种现象必须立即严禁。兹规定：","type":"paragraph"},{"text":"（一）各专区即根据村庄大小，规定村脱离生产人数及村办公费，未经批准，不得自行增加。","type":"paragraph"},{"text":"（二）工作人员下乡，自带粮草票、菜金，一律不准接受招待。","type":"paragraph"},{"text":"（三）村里不准自筹经费。违背以上规定者，予以处分。","type":"paragraph"},{"text":"接受招待者，以伙同贪污论处。","type":"paragraph"},{"text":"（四）省府、军区禁止乡村自筹经费，禁止浪费招待的布告，即日拟就发下。各专署即自行翻印，在各地带张贴。","type":"paragraph"},{"text":" 云南省委四月二十八日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a7f039b70"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
