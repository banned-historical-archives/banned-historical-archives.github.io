ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"给贸拓夫的信","alias":"","parts":[{"type":"paragraph","text":"给贾拓夫的信！"},{"type":"paragraph","text":"（1943年5月4日）"},{"type":"paragraph","text":"彭德怀同志写的这篇文章，在边区是否可行？应否与如何改变现在公营商店的方针、性质？请你研究一下，并和高、贺？、陈云诸同志谈论一番，以其意见写出交我为盼！贸易公司就是公营商店，在此次高干会上是实现了彭文所指的方针的；其他机关、部队的商店，实是私营商店，不过以公营为名而已，要使这类商店实行彭文方针，似是不可能的，因它们是以为本机关、部队营利为目的，而真正的公营商店，是不以为自己营利为目的。"},{"type":"paragraph","text":"[1]这是毛泽东关于研究彭德怀写的《论公营商店》一文给贾拓夫的信的主要内容。1943年5月1日，彭德怀关于他写的《论公营商店》一文致信毛泽东：“最近与华北来延某些干部谈及公营商店未得到解决，特别冀鲁豫、山东、太岳问题更多些，即延安最近会议虽然解决了许多问题，但金融政策及公营商店似还欠明确方向，我写了一个《论公营商店》，请审阅，如无多毛病，请加以修改后，最好以社论名义发表。”"},{"type":"paragraph","text":"[2]高、贺，指高岗、贺龙。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":5,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":29,"page_end":29},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc27ac33e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
