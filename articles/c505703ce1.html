ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"对谭震林关于国务院农口几个单位情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"对谭震林关于国务院农口几个单位情况报告的批语"},{"type":"paragraph","text":"（1967年1月30日）林彪、恩来同志："},{"type":"paragraph","text":"此件值得一阅。党、政、军、民、学、工厂、农村、商业内部，都混入了少数反革命分子、右派分子、变质分子。此次运动中这些人大部都自己跳了出来，是大好事。应由革命群众认真查明，彻底批倒，然后分别轻重，酌情处理。请你们注意这个问题。谭震林的意见是正确的。此件请周印发较多的同志看，引起警惕。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月卅日"},{"type":"paragraph","text":"[1]谭震林，当时任中共中央政治局委员、国务院副总理兼农林办公室主任。"},{"type":"paragraph","text":"[2]林彪，在中共八届十一中全会上继续当选为中央政治局常委，不久被称中央副主席。恩来，即周恩来。"},{"type":"paragraph","text":"[3]指谭震林1967年1月28日给毛泽东等并中央文化革命小组的报告。报告对农垦部、农业部、水产部等单位开展文化大革命的情况，谈了自已的看法，表明了自己的态度。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":1,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":291,"page_end":291},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c505703ce1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
