ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"黄百韬解决后华野主力速移宿县地区叫","alias":"","parts":[{"type":"paragraph","text":"黄百韬解决后华野主力速移宿县地区！"},{"type":"paragraph","text":"（1948年11月13日）刘、陈、邓，粟、陈、张："},{"type":"paragraph","text":"（一）刘陈邓已抓住孙元良歼击甚好，此点关系全局，因黄维3十四日到太阜，若你们能于日内解决孙元良，控制徐蚌路，则有余裕时间对付黄维。（二）请粟陈张考虑是否可以韦吉兵团?早日西移宿县，与中原各纵会合，以便数日后中原各纵西移永城，对付黄维。（三）中原二、六纵现至何处，是否可以迅速赶至太阜附近牵制黄维，盼告。（四）黄百韬解决后，华野主力速移宿县地区为要。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十三日三时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军司令员刘伯承、第一副司令员陈毅、政治委员邓小平和华东野战军代司令员兼代政治委员粟裕、参谋长陈士集、副参谋长张震的电报。"},{"type":"paragraph","text":"[2]孙元良，当时任国民党军第十六兵团司令官。[3]黄维，当时任国民党军第十二兵团司令官。[4]太阜，指安徽太和和阜阳。[5]徐蚌路，指徐州至蚌埠的铁路，即今京沪线一段。[6]韦吉兵团，指华东野战军苏北兵团，兵团司令员韦国清、副政治委"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":207,"page_end":207},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"077c00005d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
