tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"军委领导同志观看边防后勤建设录像叶剑英聂荣臻杨尚昆等赞扬总后机关深入解决问题作风好","authors":["士文"],"parts":[{"type":"paragraph","text":"本报讯 11月中旬，军委副主席叶剑英、聂荣臻、杨尚昆和总参谋部、总政治部负责同志，先后观看了总后工作组在赴海边防部队调查研究中拍摄的四部录像片。"},{"type":"paragraph","text":"这些录像片，纪录了西藏、新疆、海岛和东北地区边防后勤建设的情况。从这组录像中，人们可以形象的看到海边防后勤建设，多年来，尤其是党的三中全会以来，各方面都取得了很大的成就。大多数部队住进了新营房，交通状况有了很大改善；在寒区塑料大棚里，新鲜蔬菜茂密生长，南方一些哨卡实现了花果化；许多海边防连队鸡鸭成群，猪羊满圈。同时，录像也如实反映出海边防战士衣、食、住、行、照明、用水等方面仍然存在不少急待解决的问题。"},{"type":"paragraph","text":"军委和总部领导同志看了录像说，总后机关深入海边防及时发现问题，及时解决问题，这种作风值得学习。还有的说，口头汇报加录像，又生动又形象，各部队都配有录像机，我们要充分运用这种现代化的工具，做到一个部门下边防，许多部门都受益。 （士文）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"463d25b4d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
