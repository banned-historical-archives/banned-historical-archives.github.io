":1968,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"忠心献给毛主席"},{"type":"paragraph","text":"海军某部　李作民"},{"type":"paragraph","text":"浩荡的东风火红的旗，"},{"type":"paragraph","text":"万顷红涛耀红日，"},{"type":"paragraph","text":"毛主席赠送大芒果，"},{"type":"paragraph","text":"春雷般的喜讯传遍祖国大地。"},{"type":"paragraph","text":"毛主席赠送大芒果，"},{"type":"paragraph","text":"是对我们的最大支持、最大激励，"},{"type":"paragraph","text":"毛主席永远和革命群众心连心，"},{"type":"paragraph","text":"毛主席时刻和我们战斗在一起。"},{"type":"paragraph","text":"忆往昔，迢迢征途万里远啊，"},{"type":"paragraph","text":"毛主席率领工农鏖战急；"},{"type":"paragraph","text":"看今朝，天安门前红浪卷，"},{"type":"paragraph","text":"迎接无产阶级文化大革命的全面胜利。"},{"type":"paragraph","text":"千万颗红心啊在激烈地跳动，"},{"type":"paragraph","text":"周身的热血啊翻滚不息；"},{"type":"paragraph","text":"我们一定沿着您的革命路线奋勇前进，"},{"type":"paragraph","text":"把无产阶级文化大革命进行到底！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9dc45ea36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
