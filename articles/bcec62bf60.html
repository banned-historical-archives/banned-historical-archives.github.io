art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副主席和金日成主席举行会谈会谈在非常诚挚、亲切、友好的气氛中进行，双方就当前国际形势和共同关心的问题广泛交换了意见，双方意见十分融洽","authors":[],"parts":[{"type":"paragraph","text":"新华社平壤九月十二日电 中共中央副主席、国务院副总理邓小平同志，九月十二日在平壤同朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成同志举行了会谈。"},{"type":"paragraph","text":"双方就当前国际形势和共同关心的问题广泛交换了意见，双方意见十分融洽。"},{"type":"paragraph","text":"会谈是在非常诚挚、亲切、友好的气氛中进行的。"},{"type":"paragraph","text":"中国方面参加会谈的有：中共中央政治局委员、中共上海市委第三书记、上海市革命委员会第二副主任彭冲，中共中央委员、外交部长黄华。"},{"type":"paragraph","text":"朝鲜方面参加会谈的有：朝鲜劳动党中央委员会政治委员会委员、党中央书记金永南，朝鲜劳动党中央委员会政治委员会候补委员、政务院副总理兼外交部长许锬。"},{"type":"paragraph","text":"邓小平副主席同金日成主席还单独举行了会谈。"},{"type":"paragraph","text":"图为邓副主席同金主席单独会谈后热烈握手告别。 新华社记者摄（传真照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcec62bf60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
