ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"既然有权讨论停战也就有权讨论撤兵","alias":"","parts":[{"type":"paragraph","text":"既然有权讨论停战也就有权讨论撤兵！"},{"type":"paragraph","text":"（1951年7月17日）"},{"type":"paragraph","text":"我们提此条是有充分理由的。各国派兵到朝鲜是来作战的，不是来旅行的，为什么停战会议有权讨论停战，却无权讨论撤兵呢？显然这种理由是不能成立的。因此，我方坚持会议既然有权讨论停战，也就有权讨论撤兵。"},{"type":"paragraph","text":"[1]这是毛泽东在周恩来起草的以毛泽东名义给中央人民政府外交部副部长、朝鲜停战谈判中国人民志愿军代表团负责人李克农的电报上加写的一段文字。"},{"type":"paragraph","text":"[2]指在谈判中提出将一切外国军队撤离朝鲜问题列入正式议程。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":7,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":457,"page_end":457},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04b07fa3f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
