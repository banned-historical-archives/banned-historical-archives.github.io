s":[{"year":1958,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布加勒斯特15日电】　此间各报今天发表了罗马尼亚和波兰两国党和政府代表团的联合声明。声明说，两国代表团在最近举行的会谈中讨论了当前最重要的国际局势、现代工人运动和进一步发展两国的关系的问题。"},{"type":"paragraph","text":"在谈到国际局势时，声明首先指出，罗马尼亚和波兰两国政府以及苏联、中国和其他社会主义国家实行着和平政策，这种政策是符合各国人民的利益的。声明谴责美国和其他资本主义国家的帝国主义集团所奉行的战争政策，并且特别指出，用核武器武装西德军队是对欧洲安全的重大威胁。"},{"type":"paragraph","text":"罗马尼亚政府表示相信，波兰政府提出的在欧洲中部建立无原子武器地区的建议的实现，将有助于欧洲的和平。波兰政府表示支持罗马尼亚政府去年9月间向巴尔干地区各国提出的和平倡议。"},{"type":"paragraph","text":"两国政府认为，只要帝国主义集团不停止实行他们的威胁和平的政策，两国就必须支持华沙条约组织。"},{"type":"paragraph","text":"声明接着说，罗马尼亚工人党和波兰统一工人党决定要不断地促进社会主义国家间的团结的巩固和兄弟般的互助合作。为此，两党将以共产党和工人党莫斯科会议通过的两个宣言为自己的工作指针。"},{"type":"paragraph","text":"两党声明表示要不断地为反对资产阶级的思想影响、特别是为反对修正主义而斗争。同时，也要反对教条主义和宗派主义。"},{"type":"paragraph","text":"声明最后谈到了两国的关系。声明说，罗、波两国今后将进一步加强彼此在经济、文化等方面的互助合作。"},{"type":"paragraph","text":"代表双方在这个声明上签字的，波兰方面是哥穆尔卡和西伦凯维兹；罗马尼亚方面是乔治鸟一德治和基伏·斯托伊卡。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08400dafa1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
