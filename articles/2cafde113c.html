art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"按照毛主席的教导办事无往不胜","authors":["七三四一部队驻上海炼油厂毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“一定要抓好典型。”“面上的工作要先抓好三分之一。”毛主席不但为无产阶级文化大革命的斗、批、改阶段提出了战略任务，而且还为我们进行斗、批、改制定了科学的工作方法。只要按照毛主席的教导办事，斗争就深入，革命就前进，生产就发展。"},{"type":"paragraph","text":"前一个时期，炼油厂部分群众由于受阶级敌人的挑动，闹无政府主义，革命和生产受到了影响。怎样解决这个问题呢？我们在抓典型的基础上，先抓好三分之一人的工作。对那些闹无政府主义的人和单位，用毛主席关于“备战、备荒、为人民”的伟大战略思想进行教育，使他们深刻认识到闹无政府主义对于加强战备的危害，从根本上提高了群众的无产阶级觉悟，纷纷起来批判无政府主义。他们说：“闹无政府主义，不是个人犯不犯错误的问题，而是关系到无产阶级专政巩固的大问题。”"},{"type":"paragraph","text":"从实践中我们深深体会到，在斗、批、改中，只要我们认真抓好典型，面上的工作又先抓好三分之一，分期分批地解决问题，这样就使广大革命群众学有榜样，赶有方向，就能更好地落实毛主席关于“提高警惕，保卫祖国”，“备战、备荒、为人民”的伟大战略思想。"},{"type":"paragraph","text":"七三四一部队驻上海炼油厂毛泽东思想宣传队"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2cafde113c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
