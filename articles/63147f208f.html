ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"和江峡轮船员的谈话","alias":"","parts":[{"type":"paragraph","text":"和江峡轮船员的谈话\""},{"type":"paragraph","text":"（1958年3月）"},{"type":"paragraph","text":"毛泽东：（对江峡轮三副、女青年石若仪）当你对一件事物还不了解时，往往是害怕的。正如蛇一样，当人们还不了解它，没有掌握它的特性时，感到十分害怕，但是一旦了解了它，掌握了它的特性和弱点，就不再害怕了，而且可以捉住它。"},{"type":"paragraph","text":"毛泽东：（问石若仪）你在船上工作多久？（石若仪说到有四年多了。）毛泽东：（问杨大副）你呢？杨大副：三十多年了。"},{"type":"paragraph","text":"毛泽东：（对石若仪）要好好向他们学习，他们这些老工人是你的好师傅，水上经验都很丰富，许多知识是书本上学不到的。"},{"type":"paragraph","text":"毛泽东：有些地方的航道很不好，在三峡修一个大闸，又发电又便利航运，还可以防洪、灌溉···"},{"type":"paragraph","text":"毛泽东：（对江峡轮船长）你的经验是丰富的，要多带徒弟，把技术传给青年人。"},{"type":"paragraph","text":"[1]这是1958年3月，毛泽东乘江峡轮去武汉途中，和船员谈话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":196,"page_end":196},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63147f208f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
