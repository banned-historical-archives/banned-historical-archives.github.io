ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"《七律二首·送瘟神》后记","alias":"","parts":[{"type":"paragraph","text":"《七律二首·送瘟神》后记"},{"type":"paragraph","text":"（1958年7月1日）"},{"type":"paragraph","text":"六月三十日《人民日报》发表文章说：余江县基本消灭了血吸虫，十二省、市灭疫大有希望。我写了两首宣传诗，略等于近来的招贴画，聊为一臂之助。就血吸虫所毁灭我们的生命而言，远强于过去打过我们的如何一个或几个帝国主义。八国联军，抗日战争，就毁人一点来说，都不及血吸虫。除开历史上死掉的人以外，现在尚有一千万人患疫，一万万人受疫的威胁。是可忍，敦不可忍？然而今之华佗们在早几年大多数信心不足，近一二年干劲渐高，因而有了希望。主要是党抓起来了，群众大规模发动起来了。党组织，科学家，人民群众，三者结合起来，瘟神就只好走路了。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":7,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":458,"page_end":458},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6c9b4c61d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
