"杨尧深","顾乐如"],"dates":[{"year":1965,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　“南京路上好八连”的干部和战士在过去的一年中，努力学习毛主席著作，切实在“用”字上下功夫，使连队好上加好，最近又第五次被评为，四好连队。"},{"type":"paragraph","text":"今年以来，八连组织干部、战士反复学习毛主席提出的，“革命第一，工作第一，他人第一”的教导，使为人民服务的思想在干部战士的头脑里扎根扎得更深了，八八连干部、战士同过去的老同志一样，如饥如渴地学习毛主席著作，无论在行军途中，训练场上，江河海，田头地边，在任何紧急的情况下，都把毛主席著作带在身边，学一点用一点，一点一滴地磨练自己，一点一滴地积累无产阶级思想感情。"},{"type":"paragraph","text":"一年来，八连干部、战士活学活用毛主席著作，思想革命化的程度更高了，胸怀更开阔了，革命斗志更旺盛了，每做一件工作、每处理一个事情，都能与革命二字联系起来。他们说:为了革命，什么困难都可以克服，什么风险都可以顶住，只要党和革命需要，我们赴汤蹈火也不变心。在这一年中，全连涌现了大批学习毛主席著作的积极分子，有百分之七十三的战士被评为五好战士。"},{"type":"paragraph","text":"(顾乐如、杨尧深)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abf2098833"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
