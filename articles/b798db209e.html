art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"明托夫总理离开北京去朝鲜访问李先念华国锋阿沛·阿旺晋美等和数千群众到机场热烈欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年一月十日讯 马耳他共和国总理多米尼克·明托夫以及随同来访的全体马耳他贵宾，圆满地结束了对我国的友好访问，今天上午乘专机离开北京前往朝鲜民主主义人民共和国进行访问。"},{"type":"paragraph","text":"我国领导人李先念、华国锋、阿沛·阿旺晋美，外交部长乔冠华，农林部长沙风，交通部副部长马耀骥，中国民航总局副局长阎志祥，中国驻马耳他大使刘溥，以及首都群众数千人，到机场热烈欢送马耳他贵宾。"},{"type":"paragraph","text":"在飘扬着中马两国国旗的首都机场上，举行了隆重的欢送仪式。乐队奏马耳他国歌和中国国歌。明托夫总理由李先念副总理陪同检阅了中国人民解放军陆、海、空三军仪仗队。明托夫总理同欢送群众告别时，人们高兴地跳起舞蹈，高呼口号，热烈祝贺中马两国友好合作关系和两国人民的友谊的新发展，祝愿马耳他政府和人民在维护民族独立、反对霸权主义的斗争中取得新胜利。"},{"type":"paragraph","text":"朝鲜驻中国大使馆临时代办李宰弼，以及各国驻中国的外交使节，也到机场送行。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b798db209e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
