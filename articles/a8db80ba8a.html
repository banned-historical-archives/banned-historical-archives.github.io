script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《团结报》指出资本主义国家工人学生斗争势不可挡  赞扬受苦难的人民群众日益觉醒  谴责修正主义者充当资产阶级帮凶无耻破坏群众运动","authors":[],"dates":[{"year":1969,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《团结报》指出资本主义国家工人学生斗争势不可挡"},{"type":"paragraph","text":"赞扬受苦难的人民群众日益觉醒"},{"type":"paragraph","text":"谴责修正主义者充当资产阶级帮凶无耻破坏群众运动"},{"type":"paragraph","text":"新华社地拉那二日电　阿尔巴尼亚《团结报》二日发表评论，赞扬不断高涨的资本主义国家的工人和学生的革命斗争，谴责资产阶级及其仆从现代修正主义者对群众运动的镇压和破坏。"},{"type":"paragraph","text":"评论说，今年以来，资本主义世界的工人和学生反对各种政治压迫和不公正的社会现象的斗争，有了进一步的发展和加强。革命工人和学生通过共同的行动，与资产阶级展开针锋相对的斗争，正在提高自己的觉悟，并且更加相信，只要进行坚持不懈和毫不妥协的斗争，加强战斗的革命团结，以工人阶级为领导，用马克思列宁主义思想武装自己，那么他们的愿望必将实现。"},{"type":"paragraph","text":"评论指出，革命的群众运动的发展，清楚地表明了资本主义总危机的不断加深。这是资本主义国家内部阶级矛盾愈益尖锐的结果，是资本主义制度下遭受苦难的人民群众的新觉醒的结果。"},{"type":"paragraph","text":"评论指出，为了挽救必然灭亡的命运，资产阶级已在运用一切暴力镇压工具，开动各种宣传机器进行骗人的宣传。同时，它得到了修正主义党的广泛协助。这些修正主义党千方百计地在工人和学生中制造分裂，破坏他们的斗争团结，以其叛卖活动对资产阶级大帮其忙，扮演了消防队和政治骗子手的角色。"},{"type":"paragraph","text":"评论最后说，在意大利、法国、西班牙、日本、英国和拉丁美洲等地方，工人和学生互相支援，以英勇果敢的精神抗击资产阶级及其形形色色的仆从，使资本主义制度遭到沉重打击。资产阶级及其走狗绝对阻拦不了工人和学生的革命群众运动。这一革命运动今后必将变得更加强大。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8db80ba8a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
