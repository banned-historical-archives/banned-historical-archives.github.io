" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共湖南省委关于当前对私营工商业改造工作的几点指示","authors":[],"dates":[{"year":1956,"month":2,"day":19}],"is_range_date":false,"parts":[{"text":"中共湖南省委关于当前对私营工商业改造工作的几点指示","type":"title"},{"text":"省委对私营工商业改造第二次会议时，曾布置春节后再召开一次会议研究下一步改造工作的进行。现春节已过，有些地区正在开会，并请示下一步工作如何进行，有些问题除在此次地书会议上详细研究外，先扼要作如下指示：","type":"paragraph"},{"text":"（一）凡开展了改造工作的地区，应从检查生产和经营入手，对企业合营、合作后产品数量、质量、成本、商品花色品种、质量、服务方式以及工商业者、职工店员、手工业者的工资收入等方面进行一次检查。对其中好的，应及时总结推广，坏的应分析其原因，针对不同原因分别加以解决，同时应即着手加强政治工作，以提高合营、合作企业的改造质量。至于在清产核资中的偏高偏低现象，第二次改造会议时曾提出个别的应进行复查。据反映，有个别地区曾普遍布置进行，有的已引起波动，应即停止，个别不合理现象应个别解决或留待定息时予以解决。","type":"paragraph"},{"text":"（二）凡没有开展改造但已作好了准备工作的地区，应按照省委对私改造第二次会议精神，开展第一、二两步的工作，第三步的经济改组留待稍后进行。并在这些步骤中具体贯彻国务院最近公布的《关于私营工商业和手工业的社会主义改造中若干事项的决定》，《关于私营企业实行公私合营的时候对财产清理估价几项主要问题的规定》。对应实行清产（理）核资的企业，应坚决执行由企业主自填、自估、自报、行业小组审查，工作委员会批准的办法；防止动员增资、追逼长支或抽资，致形成变相的挖底财或者把生活资料也作价入股的偏向。","type":"paragraph"},{"text":"（三）对经济改组工作，不论在已经改造或正在进行工作地区，都必须在充分调查研究的基础上作好规划，经过上一级批准，逐步实施。此项工作即将由省级有关厅局召开专门会议研究布置。各地应对已改造行业的基本情况、历史特点，以及供销、信贷、生产协作、进货办法、服务方式等情况进行调查了解，为省里开会作好准备。","type":"paragraph"},{"text":"在批准合营、合作时，对那些产、供、销存在困难的私营工商业、手工业，不要随便动员他们转业或回乡生产，关于改造中的其他问题，将在省委召开的地书会议上讨论和布置。","type":"paragraph"},{"text":"以上希各地研究办理。","type":"paragraph"}],"comments":[],"origin":"湖南省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f4b12eea5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
