art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"研究毛泽东国际战略思想","authors":["张银曙"],"parts":[{"type":"paragraph","text":"与会的专家、学者认为，毛泽东作为伟大的战略家，始终注意观察国际风云，把握时代脉搏。早在青年时代，毛泽东就提出了以“民众的联合”反抗“强权者的联合”的思想，直至最后提出了“三个世界”的战略划分，形成了一个深刻完整的国际战略思想的理论体系。这一理论体系不仅保证了中国新民主主义革命的胜利和社会主义建设事业的发展，而且对促进人类进步事业，维护世界和平起了重大作用，有些则至今仍对我们有重要的指导意义。"},{"type":"paragraph","text":"国际战略研究基金会名誉会长姬鹏飞、全国政协副主席胡绳、外交和国际战略研究方面的专家学者，以及毛泽东同志的亲属共70多人参加了座谈会。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ac177e0b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
