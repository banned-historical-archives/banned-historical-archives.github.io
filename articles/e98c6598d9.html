torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"拟在铁边城以东地区消灭追敌","alias":"","parts":[{"type":"paragraph","text":"拟在铁边城以东地区消灭追敌！"},{"type":"paragraph","text":"（1935年10月17日）彭："},{"type":"paragraph","text":"（一）一纵队本日由木瓜城出发，进至离铁边城四十里之牛圈坨一带宿营。"},{"type":"paragraph","text":"（二）毛炳文令陶峙岳进至环县、洪德城之线整理待命，其骑兵团仍令其尾追侦察。本日十四时，我后卫大队在木瓜城东端高山与敌接触，似即其骑兵团。"},{"type":"paragraph","text":"（三）如该敌续追，拟于后日在铁边城以东地区回击消灭之。"},{"type":"paragraph","text":"（四）为准备后日作战，一纵队明（十八）日拟进至铁边城以东之张家湾、杨家庙台之线宿营，后卫则在铁边城。后日以后卫部队弓敌跟进，主力则从道侧突击之。"},{"type":"paragraph","text":"（五）二、三纵队明日务相当靠近一纵队宿营（史家河、阎家之线），以便后日协同消灭该敌。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十七日二十一时[1]这是毛泽东给红军陕甘支队司令员彭德怀的电报。[2]毛炳文、陶峙岳，当时分别任国民党军西北“剿匪”总司令部第一"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":10,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":246,"page_end":246},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e98c6598d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
