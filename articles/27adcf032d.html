"authors":[],"dates":[{"year":1958,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　复旦大学的整风运动进一步深入开展。全体教师开始通过检查个人红专规划，深入分析、批判资产阶级个人主义思想，彻底向党、向社会主义交心。以交得真诚、爽快、深刻、透彻的实际行动来庆祝党中央发布整风指示一周年，纪念“五一”国际劳动节。"},{"type":"paragraph","text":"自整风运动开始以来，通过反右派斗争、反浪费反保守运动，以及教学和科学研究工作上两条道路的斗争，复旦大学的教师们在政治上、思想上都向前跨进了一大步。这个思想发展过程，是教师们不断地破资产阶级思想、立无产阶级思想的过程，也是教师们不断地向党靠拢、向党交心的过程。在过去的一年中，几十万张大字报和成百成千次会议的大争大辩，有力地揭发和批判了教师们重业务、轻政治，理论脱离实际，教学脱离生产，厚古薄今，厚外薄中等错误思想。明确了教学和科学研究的方向，认清了个人前进的目标。在这个基础上，全校教师都订了又红又专的个人规划，自觉要求改造成为工人阶级的知识分子。"},{"type":"paragraph","text":"在祖国大跃进形势的鼓舞下，在党中央发布整风指示一周年的前夕，这个学校的全体教师自觉要求在总结前一时期自我思想改造收获的基础上，进一步扫清前进道路上的思想障碍。彻底搞臭资产阶级的个人主义，轻装前进。他们纷纷在教研组、民主党派小组里自觉地继续向党交心，继续破资本主义思想，立无产阶级思想。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27adcf032d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
