"dates":[{"year":1995,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典乒乓球公开赛拉开战幕"},{"type":"paragraph","text":"中国队马文革率新手参赛"},{"type":"paragraph","text":"本报斯德哥尔摩１１月２９日电记者丁刚报道：第３２届瑞典乒乓球公开赛今天在这里的爱利克达尔体育馆拉开战幕。来自３５个国家和地区的２５０多名男女选手将参加角逐，他们当中有欧洲强手瓦尔德内尔、盖亭、塞弗等。中国队由１４名选手组成，他们当中除马文革和乔云萍外，大多是年轻选手。"},{"type":"paragraph","text":"中国男队教练吴敬平向记者介绍说，中国队此次选派年轻选手参赛，是从长远考虑，为了培养接班队员。这些选手国内比赛成绩都不错，但需要增加与欧洲选手对阵的经验。男选手的实力与世界强手相比，尚有一定差距，如能进入前８名已很理想。团体赛由于马文革不参加，而中国队首战又可能与比利时队相逢，要想进入半决赛有一定难度。相比之下，中国女队虽大多是新手，但就个人技术实力而言，却在欧洲选手之上，所以此次比赛可望取得好成绩。"},{"type":"paragraph","text":"吴敬平教练还透露说，正在德国打球的马文革只参加单打比赛。从他最近在欧洲一些国家的比赛成绩看，他的竞技状态呈上升趋势。如能在此次比赛中发挥得好，估计可以打出较好成绩。按照日程安排，明晚中国男、女队将分别与男、女团体第一组的第一名对阵。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a59b12960"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
