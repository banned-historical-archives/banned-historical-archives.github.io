rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"千秋功业不朽伟人精神永存毛泽东遗物展览深深打动杭州人","authors":["张乐"],"parts":[{"type":"paragraph","text":"怀着对一代伟人的崇敬、爱戴和怀念，被毛泽东称为“第二故乡”——杭州的人民，从伟人的故乡韶山，迎来了这150件毛泽东遗物和近百幅珍贵照片。"},{"type":"paragraph","text":"“毛泽东遗物展览”展厅内，终日人来人往，川流不息。“开幕第一天参观人数就超过了3000人，一天下来讲解员的嗓子几乎发不了声。”承办单位负责人、浙江图书馆馆长程小澜说，“才一天的工夫，我们的票就预售出了两万多张。”"},{"type":"paragraph","text":"一位西装革履的中年人在毛泽东的一张月收支明细表前伫立良久。他说，主席节俭的生活态度让我汗颜。一位姓张的中学教师将工作人员关于毛泽东俭朴生活的回忆全抄了下来，准备在语文课上讲给学生们听。"},{"type":"paragraph","text":"据了解，应市民的要求，展览将在杭州持续25天。之后将在宁波、温州等浙江五个市地展出，后面的“行程”排得满满的。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09b2fbdcfe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
