ors":["谢富治"],"dates":[{"year":1967,"month":8,"day":10}],"is_range_date":false,"parts":[{"text":"谢富治在首都政法界批斗彭罗大会上的讲话","type":"title"},{"text":"谢富治","type":"authors"},{"text":"摘录：","type":"paragraph"},{"text":"政法系统长期受苏修那一套的影响，受刘、邓影响，特别是彭、罗直接抓，长期控制，不是按伟大领袖最高指示相信群众，依靠群众专政，而是搞格乌那一套，这是我们伟大领袖毛主席一贯反对的，特别是过去长期提倡没有阶级分析的奴隶主义，是彭、罗那一套“驯服工具”，不是讲毛主席的伟大思想，不是执行毛主席的革命路线，为人民服务，为广大群众服务，不是按照林付主席教导我们的那样对伟大领袖毛主席的话，理解的要执行，不理解的也要执行，他们不是这样，而是提倡奴隶主义，做那些资产阶级代表人物的“驯服工具”，中毒比较深。","type":"paragraph"},{"text":"毛主席很注意公、检、法在这次文化大革命中彻底革命，彻底批判彭、罗、肃清他们的影响，把修正主义那一套革掉，按照毛主席的无产阶级革命路线、群众路线来建立完全适合我们伟大领袖毛主席思想的公、检、法。这件事我们要求公、检、法的广大革命派和革命群众来办。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"566cdf988b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
