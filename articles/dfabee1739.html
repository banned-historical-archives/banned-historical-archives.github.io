tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"6994部队积极教唱毛主席语录歌","authors":["陈昌亮/郑礼堂/张其新"],"parts":[{"type":"paragraph","text":"本报讯 6994部队在无产阶级文化大革命深入发展的大好形势下，出现了一个更深入地活学活用毛主席语录的高潮。当他们从广播中听到了用毛主席语录谱成的歌曲后，都非常兴奋，一致认为这种崭新的形式，将会进一步推动活学活用毛主席语录的群众运动。就在刊登毛主席语录歌曲的报纸送到连队的当天，这个部队的副政委就立即组织机关干部学唱，并研究在部队开展教唱活动的计划。当天晚上，机关干部就深入连队组织教唱。他们还象培养学习毛主席著作辅导员那样，认真地为连队培养了一些教唱骨干。部队俱乐部也积极行动起来，通过广播反复对整个部队进行教唱。"},{"type":"paragraph","text":"这个部队所属的连队还组织了宣传组，利用节假日深入农村教唱。社员们都很爱唱。他们说：“我们唱着毛主席语录歌去战天斗地，感到浑身都是劲，浑身都是力量。”（陈昌亮、郑礼堂、张其新）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfabee1739"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
