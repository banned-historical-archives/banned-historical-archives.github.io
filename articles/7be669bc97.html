"authors":["毛泽东"],"dates":[{"year":1966,"month":2,"day":19}],"is_range_date":false,"parts":[{"text":"对湖北省委关于逐步实现农业机械化设想的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"任重同志：","type":"appellation"},{"text":"此件看了，觉得很好。请送少奇同志，请他酌定，是否可以发给各省、市、区党委研究。农业机械化的问题，各省、市、区应当在自力更生的基础上做出一个五年、七年、十年的计划，从少数试点，逐步扩大，用二十五年时间，基本上实现农业机械化。至于二十五年以后，那是无止境的，那时提法也不同了，大概是：在过去二十五年的基础上再作一个二十五年的计划吧。目前是抓紧从今年起的十五年。已经过去十年了，这十年我们抓得不大好。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7be669bc97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
