ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"转发邓小平关于新区土地改革问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发邓小平关于新区土地改革问题的报告的批语"},{"type":"paragraph","text":"（1948年2月17日）（一）小平所述大别山经验极可宝贵，望各地、各军采纳应用。"},{"type":"paragraph","text":"（二）分阶段、分地区极为必要。在第一阶段将打击面缩小至只打击大、中地主及国民党反动分子时，并不是说富农、小地主中的保甲长、恶霸、反动分子为农民所要求打击者，也不要打击，我们只要注意对富农、小地主的多数，暂时不去惊动，就无危险了。"},{"type":"paragraph","text":"（三）确定先组织贫农团，树立贫雇农威信，几个月后，再组织农民协会，团结全体农民，并严防地富及坏人混入。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"丑"},{"type":"paragraph","text":"[1]这是毛泽东为转发邓小平关于新区土地改革问题的报告，给中央工委、各中央局、各前委的电报。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":2,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":88},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb91ffd851"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
