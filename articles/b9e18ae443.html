rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”要的“专”","authors":["华钢夫〖HH/换行〗DW：河北省军区"],"parts":[{"type":"paragraph","text":"“四人帮”一听人讲又红又专，就骂娘不休。他们训诫青年不能求专，说是专文化、专技术、专科学都等于白专，都是“为资本主义作嫁衣裳”；同时也不必去求专，因为据他们说，“思想觉悟高，技术自然好”，多么省心！总之，就是要弄得你不敢也不想为社会主义学业务、学本领。"},{"type":"paragraph","text":"其实，“四人帮”选干部，是也讲有本领、有专长的。他们叫做要“上上下下精干”。这就是会抱粗腿，拍马屁，结帮派，拉队伍，造谣言，吹牛皮，耍阴谋，搞诡计。这同旧上海的政治流氓和资产阶级及掮客们鼓吹的七上下下“兜得转”是一个意思。他们就是提倡青年“专”这种投机钻营的反动本领。反革命分子张铁生不是被他们捧为“又红又专”的典型吗？"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9e18ae443"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
