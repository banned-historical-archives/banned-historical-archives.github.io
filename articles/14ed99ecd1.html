<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"cnd","name":"文革博物馆","internal":false,"type":"db","official":false,"author":"","article":{"title":"“九一三事件”研讨会在京召开","authors":["丁凯文"],"dates":[],"comment_pivots":[],"comments":[],"is_range_date":false,"description":"","page_start":0,"page_end":0,"parts":[{"text":"今年是“九一三事件”四十周年，８月２４日和９月４日在北京分别召开了两次关于“九一三事件”的研讨会。","type":"paragraph"},{"text":"８月２４日，文衡文化公司与《记忆》编辑部在京联合召开了“九一三事件四十周年学术研讨会”。参加会议并提交学术论文的国内学者有林蕴晖、余汝信、蒋健、董国强，专程回国参加会议的有丁凯文和夏继波。主持会议的学者是吴迪和李宇锋。列席该次会议的还有卜伟华、丁东、叶维丽、邢小群、阎长贵、王海光。林蕴晖的文章重点论述了林彪与１９６０年军委扩大会议的关系，余汝信的文章主要涉及李作鹏与“九一三事件”的关系，蒋健的文章则系统地论述了“九一三事件”的过程，试图厘清该事件发生的每个细节，董国强的文章的重点放在“批林批孔”运动与江苏省军管的关系问题，夏继波的文章关注于文革期间周恩来、林彪与文革极左派江青的关系问题，丁凯文的文章探讨了文革期间的军委办事组。学者们在讨论之间还对相关问题相互作了评论。","type":"paragraph"},{"text":"９月４日，北京召开了“九一三事件”文史研讨会。这是“九一三事件”发生后首次由民间举办的最大也是最重要的一次研讨会。与会者近五十人，参加会议的人士有亲历“九一三事件”的当事人、他们的直系亲属，以及研究学者等。与会者包括原中国驻蒙古国大使馆的翻译沈庆沂，他曾亲身参与林彪２５６号飞机坠毁现场勘察。与会者还有林豆豆丈夫张清林，原空军情报部部长贺德全儿子贺铁军，原中国人民解放军副总参谋长阎仲川儿子阎明，原空军副参谋长王飞儿子王鲁宁，原空军副参谋长兼３４师（专机师）党委书记胡萍的夫人刘继馨、儿子胡耀萍、胡幼萍、吴法宪女儿吴巴璀、江腾蛟女儿江新文、江新德、原林彪专车司机杨振纲的女儿杨军玲、２５６号飞机的机械师邰起良女儿李蔚等。参与会议的学者有李延明、姚监复、丁凯文、卜伟华、徐海亮、徐友渔、陈子明、丁东、王海光等人。会议由刘家驹筹备，高瑜主持。会议达成了预期的目的，圆满结束。————————————————————————————————————本期编辑：      《华夏文摘》执行编辑：      《ＣＮＤ》总编：胡海科（美国）    思语（美国）           陈天寒（美国）————————————————————————————————————\u003c/pre\u003e\u003c/html\u003e","type":"paragraph"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"九·一三事件","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14ed99ecd1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
