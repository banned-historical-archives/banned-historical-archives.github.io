rs":["陈炳光编"],"dates":[{"year":1960,"month":8,"day":24}],"is_range_date":false,"parts":[{"text":"广东发生多起反革命凶杀案","type":"title"},{"text":"陈炳光编","type":"authors"},{"text":"新华社广州讯  今年以来，广东省发生反革命行凶报复案件多起。上半年全省共发生一百九十二宗，比去年同期上升70%，并有逐月上升的趋势。","type":"paragraph"},{"text":"有些案件情节十分严重。罗定县罗傍公社冷水大队地主的儿子潘苏，对我怀有骨刻仇恨，一向抗拒改造，破坏食堂，恶意攻击干部，6月27日乘社员出勤生产，潘犯纠合其胞兄潘新（管制分子）、表兄佘昭（集训分子）、堂兄潘杏新（地主分子）等三人在家杀鸡饮酒，之后纵火烧毁社员房屋十五间，并持菜刀杀死杀伤小孩、老妇共十五人（当场死三人，有生命危险二人）。凶犯已捕获法办。茂名市第三工程公司右倾机会主义分子杨志杰，对党内处分不满，跳楼自杀未死，在医院治疗时乘人不备，潜入医院育婴室，用剪刀剌死了两个刚出生的婴儿，并将尸体掷到楼下。他还疯狂叫嚣：“我杀不死共产党，能杀死共产党的小孩也值得”。湛江市湖光农场五里大队队员张惠，因组织上没有满足其无理要求，怀恨不满，竟于7月4日中午持刀行凶。他在追砍党支书途中，见人便砍，共砍伤小孩、老人等十人，随后又冲入托儿所砍了十六个小孩，共砍死六人，伤二十人。张犯行凶后畏罪自杀。","type":"paragraph"},{"text":"根据以上情况，广东省公安厅地求所属各级公安部门提高警惕，严厉打击敌人的破坏活动，加强对五类分子的监督改造，加强集体福利单位的保卫工作，制止或减少反革命行凶报复案件发生。","type":"paragraph"},{"text":"来源： 1960年8月24日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5fc32a3fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
