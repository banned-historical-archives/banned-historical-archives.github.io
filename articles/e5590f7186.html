tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"军民互相促进掀起学习毛主席著作新高潮各部队积极向驻地群众宣传林彪同志的指示","authors":[],"parts":[{"type":"paragraph","text":"据新华社十三日讯 各部队指战员最近纷纷到驻地周围，向人民群众宣传林彪同志关于把活学活用毛主席著作的群众运动推向新阶段的指示。北京部队某部组织了宣传队和电影组，把林彪同志的指示制成幻灯，再次深入邢台地震地区，向人民群众宣传林彪同志指示的重大意义。武汉部队许多单位近一年来在驻地周围农村建立了一千多个学习毛主席著作辅导站。连日来，这些部队都派出大批辅导员到辅导站向人民群众宣传林彪同志的指示。广州、沈阳、南京、昆明等部队和海军、空军以及福建前线驻军的许多指战员，也积极向人民群众进行宣传。"},{"type":"paragraph","text":"广大指战员抓紧向群众宣传的时机，虚心地学习地方上学习毛主席著作积极分子的先进事迹和经验，借地方的东风，把部队学习毛主席著作群众运动推向一个新阶段。成都部队由五百多名学习毛主席著作积极分子组成的宣传队，在农村宣传林彪同志指示时，经常和社员们一起座谈学习“老三篇”的体会，提高自己。兰州部队许多单位领导干部在带领宣传队向群众宣讲林彪同志指示的过程中，不断地请人民公社介绍学习毛主席著作积极分子的先进思想和先进事迹，使大家都受到了教育。济南部队和内蒙古、新疆、西藏军区许多单位的指战员在宣传中，还不断访贫问苦，请贫下中农作报告，提高自己学习毛主席著作的阶级感情。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5590f7186"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
