ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"中央转发河北省委关于贯彻执行八届八中全会精神的第二次简报的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发河北省委关于贯彻执行"},{"type":"paragraph","text":"八届八中全会精神的第二次简报的批语"},{"type":"paragraph","text":"（1959年9月6日）此件发各省、市、区党委参考。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"九月六日"},{"type":"paragraph","text":"[1]中共河北省委1959年9月3日给毛泽东并中央的这一简报说，省委全会八次会议已经结束了关于增产节约问题的讨论，讨论中同志们一致拥护八届八中全会关于增产节约运动的决议，认为调整后的1959年国家各项主要指标是积极可靠的跃进指标，只要坚决反掉右倾思想，认真采取有效措施，是可以完成和超额完成的。但也有极少数同志存在右倾思想和畏难情绪。会议经过反复讨论，最后确定了今年全省工农业的各项主要指标。目前工业战线上已经立竿见影，钢铁煤的生产急剧上升，农业生产竞赛运动已进入一个新的阶段。毛泽东全集第四十二卷"},{"type":"paragraph","text":"刘、彭真阅，尚昆办。另印如前示。"},{"type":"paragraph","text":"[1]刘，指刘少奇。彭真，当时任中共中央政治局委员、中央书记处书记。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":346,"page_end":347},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f47e8f5197"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
