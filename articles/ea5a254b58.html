:1976,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东：《论十大关系》"},{"type":"paragraph","text":"这十种关系，都是矛盾。世界是由矛盾组成的。没有矛盾就没有世界。我们的任务，是要正确处理这些矛盾。这些矛盾在实践中是否能完全处理好，也要准备两种可能性，而且在处理这些矛盾的过程中，一定还会遇到新的矛盾，新的问题。但是，象我们常说的那样，道路总是曲折的，前途总是光明的。我们一定要努力把党内党外、国内国外的一切积极的因素，直接的、间接的积极因素，全部调动起来，把我国建设成为一个强大的社会主义国家。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea5a254b58"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
