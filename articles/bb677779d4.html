["云南大学","张士林","朱祥亭","李佳培","章忠实","谭东北"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"反对农业合作化反对统购统销","type":"title"},{"text":"云南大学李佳培章忠实朱祥亭谭东北张士林","type":"authors"},{"text":"“几年来党的政策是和马列主义有很大的出入的。如农业合作化时强调农民自私落后，与马列主义认为劳动群众是历史的创造者的理论根本不符。”（云南大学  李佳培）","type":"paragraph"},{"text":"“合作化表面上强调自愿，实际上造成压力，不入社就是落后，入了社要退社就困难万分。”（云南大学　章忠实）","type":"paragraph"},{"text":"“合作社有了强迫现象，有些合作社有问题，干部一团糟。四川合作社有减产现象，农民并不是自愿入社。”（云南大学　朱祥亭）","type":"paragraph"},{"text":"“农业合作化后猪肉少了，至少农业合作化问题，政府把粮食收光了。”（云南大学　钱××）","type":"paragraph"},{"text":"“统购统销的成绩和缺点差不多，即使有成绩，也是从农民那里榨来的。”（云南大学  谭东北）","type":"paragraph"},{"text":"“甚么合作化，农民还不是破破烂烂？！农村现在乱七八糟，农民生活没有提高。”（云南大学  张士林）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb677779d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
