ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"坚守山海关绥中兴城之线抢护我主力集中锦州","alias":"","parts":[{"type":"paragraph","text":"坚守山海关绥中兴城之线"},{"type":"paragraph","text":"掩护我主力集中锦州凹"},{"type":"paragraph","text":"（1945年11月14日）李、沙："},{"type":"paragraph","text":"（一）合众社称蒋军占领山海关，情况如何即告。（二）山海关、绥中、兴城之线必须坚守，掩护我主力黄梁集中锦州，时间至少三星期，多则两个月，望动员民众构筑多道防御工事。（三）凡不得已放弃之地必须于放弃前破坏道路阻敌前进；破坏铁路必须采公私兼顾政策（使民众得木料铁轨等物）及将路基掘毁（掘成宽深之坑，使敌不易修复）。（四）山海关、绥中、兴城一线我军共有多少兵力，战斗力如何，民众发动如何，游击队民兵组织如何，地形利于作战否，即告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十四日十四时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北人民自治军第二副司令、冀热辽军区副司令员李运昌和冀中军区参谋长沙克的电报。同日，毛泽东在为中央军委起草的给黄克诚、梁兴初的电报中命令新四军第三师和山东军区第一师两部“迅分数路平行前进，限二十四日前全部到达锦州地区。以黄师位于"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":11,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":96,"page_end":96},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73b9be5e9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
