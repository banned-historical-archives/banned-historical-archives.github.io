说我文化大革命给被压迫人民巨大鼓舞","authors":[],"dates":[{"year":1967,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都各界集会欢庆中老友协成立四周年"},{"type":"paragraph","text":"中国人民坚决支持老挝人民打败美帝"},{"type":"paragraph","text":"奔舍那夫人说我文化大革命给被压迫人民巨大鼓舞"},{"type":"paragraph","text":"新华社四日讯　在中国老挝友好协会今天为庆祝这个协会成立四周年举行的招待会上，首都各界革命群众和在北京的老挝朋友热烈祝贺中老两国人民的战斗友谊不断发展，欢庆中国无产阶级文化大革命取得的伟大胜利。"},{"type":"paragraph","text":"中老友协会长连贯在招待会上讲话。他热烈赞扬老挝人民在老挝爱国战线党的领导下，为争取和维护民族独立，反对美帝国主义的侵略和干涉进行了坚持不懈的斗争，赢得了重大胜利。"},{"type":"paragraph","text":"连贯强烈谴责美帝国主义在越南疯狂进行战争“升级”的同时玩弄“和平谈判”的花招，谴责苏修领导集团为美帝效劳。他说，用毛泽东思想武装起来的中国人民，坚决支持兄弟的老挝人民和越南人民反对美帝国主义及其走狗的正义斗争，直到他们取得最后的胜利。"},{"type":"paragraph","text":"老挝朋友贵宁·奔舍那夫人在讲话中说，老挝人民团结得象一个人一样，决心战斗到底，在老挝的国土上把美帝国主义的侵略势力和老挝反动派消灭掉。"},{"type":"paragraph","text":"贵宁·奔舍那夫人热情赞扬中国无产阶级文化大革命。她指出，这一革命震动了全世界，给全世界革命人民提供了经验，使正在进行民族解放斗争的全世界被压迫人民受到了巨大鼓舞。"},{"type":"paragraph","text":"中老友协无产阶级革命派代表在讲话中说，毛主席教导我们：“中国人民把亚洲、非洲、拉丁美洲人民的反帝国主义斗争的胜利看作是自己的胜利，并对他们的一切反帝国主义、反殖民主义的斗争给以热烈的同情和支持。”无产阶级革命派最听毛主席的话，我们和全国人民一起，将一如既往地对老挝人民的反美斗争给予全力支持。"},{"type":"paragraph","text":"对外文委副主任楚图南，对外友协副会长丁西林等，出席了招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f6b8f4b54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
