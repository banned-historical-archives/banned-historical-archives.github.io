year":1972,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"是英雄创造历史，还是奴隶们创造历史?在这个问题上，唯心史观与唯物史观两军对阵，壁垒分明。千百年来，一切剥削阶级无不鼓吹“英雄史观”。他们把人类历史的发展归诸少数“天才”、“先哲”的恩赐，把真正推动历史前进的人民群众的伟大功绩一笔抹煞。他们视群众为“群氓”、“阿斗”，搞“愚民政策”，颠倒历史。马克思主义的诞生，把被颠倒了的历史重新颠倒过来，还历史以本来面目。"},{"type":"paragraph","text":"我们伟大领袖毛主席英明指出:“人民，只有人民，才是创造世界历史的动力。”刘少奇一类骗子却竭力贩卖反动的“天才论”，作为他们篡党、篡政的理论纲领，妄图复辟资本主义，实现法西斯专政。无产阶级岂能容忍这些骗子对历史肆意的篡改!彻底揭露、彻底批判、彻底清算他们背叛马克思列宁主义的罪恶行径，这是历史赋予我们的伟大使命。"},{"type":"paragraph","text":"一部人类社会的历史，是劳动群众创造的历史。本报将陆续发表有关阶级斗争、生产斗争、科学实验方面的若干材料，摆事实、讲道理，论证人民群众推动历史前进的革命真理。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb5ab03985"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
