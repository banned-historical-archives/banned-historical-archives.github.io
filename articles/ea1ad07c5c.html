script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"最热烈地祝贺越南民主共和国成立二十七周年毛泽东主席、董必武代主席、朱德委员长、周恩来总理致电孙德胜主席、黎笋第一书记、长征主席、范文同总理","authors":[],"dates":[{"year":1972,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年九月一日电　中国共产党中央委员会主席毛泽东同志、中华人民共和国代主席董必武同志、中华人民共和国全国人民代表大会常务委员会委员长朱德同志、中华人民共和国国务院总理周恩来同志，九月一日打电报给越南民主共和国主席孙德胜同志、越南劳动党中央委员会第一书记黎笋同志、越南民主共和国国会常务委员会主席长征同志、越南民主共和国政府总理范文同同志，最热烈地祝贺越南民主共和国成立二十七周年。电报全文如下:"},{"type":"paragraph","text":"河内"},{"type":"paragraph","text":"越南民主共和国主席　孙德胜同志，"},{"type":"paragraph","text":"越南劳动党中央委员会第一书记　黎笋同志，"},{"type":"paragraph","text":"越南民主共和国国会常务委员会主席　长征同志，"},{"type":"paragraph","text":"越南民主共和国政府总理　范文同同志:"},{"type":"paragraph","text":"在越南民主共和国成立二十七周年的时候，我们代表中国共产党、中国政府和中国人民，向越南劳动党、越南民主共和国政府和兄弟的越南人民，致以最热烈的祝贺。"},{"type":"paragraph","text":"二十七年来，英雄的越南人民在越南劳动党的领导下，以大无畏的英雄气概和顽强战斗的革命精神，抗击了帝国主义一次又一次的侵略战争，捍卫了越南北方的社会主义成果，为越南民族的解放事业写下了壮丽的篇章。越南人民反帝革命斗争的英雄业绩，对中国人民是一个巨大的鼓舞，为世界上一切被压迫民族和人民争取解放的斗争作出了宝贵的贡献。"},{"type":"paragraph","text":"当前，越南人民的抗美救国战争正在胜利发展，整个印度支那的形势大好。越南南方军民在各个战场上发动的猛烈进攻，沉重打击了美帝国主义的战争“越南化”计划，取得了辉煌的胜利。美帝国主义企图加强海空袭击和布雷封锁来迫使越南人民停止战斗，这完全是妄想。美帝国主义的炸弹，过去没有、今后也决不能动摇越南人民的钢铁意志。英雄的越南人民遵循胡志明主席“宁可牺牲一切，决不愿亡国，决不愿做奴隶”的教导，团结一心，不怕困难，正以坚定的战斗步伐胜利前进。我们深信，经过长期革命战争考验的越南人民，同老挝人民、柬埔寨人民团结战斗，一定能够打败美帝国主义的侵略，取得抗美救国战争的彻底胜利。"},{"type":"paragraph","text":"中越两国人民是休戚相关、患难与共的亲密战友和兄弟。支援越南人民的抗美救国斗争，是中国人民义不容辞的国际主义义务。越南人民在抗美救国战争中，不论还会遇到什么艰难险阻，中国人民都和你们站在一起，全力支援你们的正义斗争。"},{"type":"paragraph","text":"最后胜利一定属于英雄的越南人民和印度支那各国人民!"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国代主席　董必武"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　朱德"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九七二年九月一日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea1ad07c5c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
