tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见阿尔及利亚民兵代表团","authors":["钱嗣杰"],"parts":[{"type":"paragraph","text":"新华社二十六日讯 毛泽东主席今天下午接见阿尔及利亚民主人民共和国民兵代表团团长格奈·马哈茂德，团员：格里卜·阿卜杜勒·卡里姆、萨克尔·卡迈勒、克达德拉·穆罕默德·拉伊德、赫马迈·巴希尔，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有国务院副总理兼中国人民解放军总参谋长罗瑞卿大将，以及彭绍辉上将、傅秋涛上将、潘振武少将等。"},{"type":"paragraph","text":"阿尔及利亚驻中国大使馆临时代办穆罕默德·胡利也在座。"},{"type":"paragraph","text":"新华社二十六日讯 以格奈·马哈茂德为首的阿尔及利亚民主人民共和国民兵代表团全体成员，今天上午参观了北京郊区顺义县龙湾屯人民公社焦庄户生产大队民兵斗争史陈列室。"},{"type":"paragraph","text":"焦庄户民兵们热烈欢迎远道而来的阿尔及利亚客人。他们给客人们介绍了这个村的民兵在抗日战争和解放战争时期武装斗争的历史，以及解放后在建设和保卫社会主义事业中发挥的作用。他们还引导客人们参观了在对敌斗争时期借以打击敌人的地道的一部分。随后，这个村的青年民兵为客人们进行了射击表演。"},{"type":"paragraph","text":"陪同贵宾参观的，有中国人民解放军总参谋部动员部部长傅秋涛上将、北京卫戍区副司令员李钟奇少将等。"},{"type":"paragraph","text":"近日来，代表团在北京地区还观看工厂、学校民兵的军事表演。"},{"type":"paragraph","text":"毛主席接见阿尔及利亚民兵代表团。图为接见时合影，前排左三是格奈·马哈茂德团长。"},{"type":"paragraph","text":"新华社记者 钱嗣杰 摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87eba33628"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
