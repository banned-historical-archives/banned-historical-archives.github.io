":[{"year":1949,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对野蛮的剥削制度"},{"type":"paragraph","text":"日美英加的工人英勇罢工"},{"type":"paragraph","text":"在资本主义世界，不少国家中的工人阶级正在为反对野蛮的剥削制度而斗争。日本四十五万煤矿工人因资方拒绝他们增加工资的要求，于七日开始第二次轮回罢工，十四日又开始第三次轮回罢工。在美国，最大的汽车制造公司福特汽车公司的工人六万五千人，于五日起进入了反对特别的残酷的剥削方法——赶快制度的罢工。罢工及因而停工的工人总数，已达十五万人。在英国、兰开厦那五十余处矿场的工人三万六千人于九日卷入了反对矿井中超时工作的罢工，并正在继续扩大中。在加拿大，三千石绵工人为要求增加工资于五日开始罢工。罢工工人垒起了障碍物，对配备有步枪、催泪弹的加拿大警察，进行了二十四小时的英勇的自卫斗争。工人们不顾反动政府的种种摧残，仍在坚持地战斗着。（新华社北平十四日电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10608376f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
