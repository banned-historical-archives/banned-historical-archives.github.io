" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"几个单位干部对反右派斗争的思想反映","authors":["中共上海市委员会直属机关委员会宣传部"],"dates":[{"year":1957,"month":6,"day":29}],"is_range_date":false,"parts":[{"text":"几个单位干部对反右派斗争的思想反映","type":"title"},{"text":"中共上海市委员会直属机关委员会宣传部","type":"authors"},{"text":"总号沪委委 宣综（57） 字 第003号","type":"paragraph"},{"text":"机密程度  机密","type":"paragraph"},{"text":"主送      市委、市委宣传部、党委","type":"paragraph"},{"text":"抄送      党委各部、委、机关团委","type":"paragraph"},{"text":"（共印  20份）","type":"paragraph"},{"text":"本件   页      中共上海市委直属机关委员会  1957年6月29日印发","type":"paragraph"},{"text":"几个单位干部对反右派斗争的思想反映","type":"subtitle"},{"text":"我们搜集了市委统战部（包括下面所属工商局、度管局等单位）、青委、人民电台、妇联、科普等级各单位干部在这一阶段对右派分子进行斗争中的思想情况。一般都感到右派分子借口帮助党整风，进行反党反社会主义活动，令人愤慨，认为向他们开展斗争是适时而必要的。但对这一斗争，也有不少干部存在不同程度的模糊思想，现综合如下：","type":"paragraph"},{"text":"一、关于对右派问题实质的认识","type":"subtitle"},{"text":"青委多数同志认为右派分子表谬论的人并不一定是反革命分子，有的同志认为这是反映在思想开始转化为敌我矛盾，不能用和风细雨的方式处理（党团员反映）。","type":"paragraph"},{"text":"除外，也有同志对某些右派言论表示同情，如青委、电台有同志说储安平的谈话是有根据的。市工商联有同志认为他的发言出发点可能是好的。电台技术部组长干部座谈时，有人认为从储安平的发言还看不出反党反人民的精神。","type":"paragraph"},{"text":"个别同志同情葛佩琦的谬论，认为他的发言有可取之处，只不过在情绪上有点激昂。个别同志对孙大雨的反动言论也持一定的肯定态度，甚至有同志认为孙大雨只是思想别扭，对党不满，不应该将他与其他右派分子等同看待。","type":"paragraph"},{"text":"电台政治组编辑林芷茵和政治组赵嗣训为陈仁炳进行辩护，认为对陈言论进行批判是不合理的，甚至有同志同意陈仁炳“算旧帐”。","type":"paragraph"},{"text":"此外，市工商联及新闻日报有些同志对“王造时反党”，以及章乃器的看法，都存在着不同程度的肯定。他们认为王造时说“基层很糟”有道理，只不过是把个别说成一般了；认为争鸣中可以保留和坚持自己的意见。","type":"paragraph"},{"text":"二、对人民日报等发表反右派斗争的社论、文章的看法","type":"subtitle"},{"text":"有的同志认为现在已经引起了思想紊乱，文章应该更早些公布，也有的同志认为发表得太早了。这样，右派言论不能全部出笼，客观上起了“收”的作用，影响整风的意见推掉。有的单位如度管处、市委行政处，保卫科的同志感到提的意见太多，且有些事实不符，最好机关里也来一次反批评。","type":"paragraph"},{"text":"有的同志错误地认为共产党在整人。","type":"appellation"},{"text":"市青委有党团员反映：近来报纸上正面文章多，反面意见少，这样显得我们气魄不够大，正反面文章可否一半一半？这样做是否符合和风细雨原则？不少同志对“整风”有所意见。有些同志认为报纸上对葛佩琦言论的批评是“断章取义”，认为对孙大雨的发言标题太刺眼。也有的同志对讲正面话的同志关系憎恶，统战部有人认为卢郁文是真正的“桥头堡”；电台赵嗣训、林芷茵对在该电台机关发表的反右派斗争稿件的同志报以轻蔑的态度。此外，同志们对统战工作、民主党派等也有些看法。新闻日报记者认为党对陆治太姑息，该早揭发他的错误。妇联有同志担心：民盟组织发展快，反动言论又多，长此下去是否会乱？文汇报新参加民盟的人员感到懊悔，想退盟。工商联有群众认为我国是多党合作，政策都有共产党提出交民主党派讨论而不是由民主党派提出交共产党讨论，这是否算发扬民主？工商局有一非党处长梁子高公开否认肃反成绩是基本的，并说“人事部门是特务机关”。","type":"paragraph"},{"text":" 中共上海市委直属机关委员会宣传部整理1957年6月29日","type":"paragraph"},{"text":"（印章：中共上海市委直属机关委员会宣传部）","type":"paragraph"},{"text":"来源：上海市档案馆，A77-2-404，第30-33页。","type":"paragraph"}],"comments":[],"origin":"根据中央文件翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"259440cd6f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
