script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反抗荷兰殖民者的剥削和压迫  库拉索岛人民燃起愤怒的火焰  示威工人群众同反动军警激烈搏斗，威廉城浓烟四起","authors":[],"dates":[{"year":1969,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反抗荷兰殖民者的剥削和压迫"},{"type":"paragraph","text":"库拉索岛人民燃起愤怒的火焰"},{"type":"paragraph","text":"示威工人群众同反动军警激烈搏斗，威廉城浓烟四起"},{"type":"paragraph","text":"新华社三十一日讯　库拉索岛威廉城消息：加勒比海荷属殖民地库拉索岛首府威廉城五月三十日爆发了工人群众反抗剥削和压迫的激烈斗争。为荷兰殖民军警的疯狂镇压所激怒的示威群众，同反动军警展开激烈战斗，并放火焚烧市中心商业区，使殖民当局极为恐慌。"},{"type":"paragraph","text":"英荷壳牌石油公司承包工程的一家建筑公司的工人，首先在二十七日为要求增加工资而举行罢工。接着，英荷壳牌石油公司炼油厂的几千名工人在二十九日夜举行二十四小时声援罢工。三十日上午，五千名炼油厂工人和建筑公司工人一起向威廉城市中心进军，举行抗议示威。殖民当局的警察对示威者进行残暴镇压，开枪打伤了好几个工人。"},{"type":"paragraph","text":"示威群众同警察进行了英勇的战斗，他们冲破重重阻碍，强行进入市中心。愤怒的群众放火焚烧了商店和街上的汽车。威廉城浓烟四起，殖民帝国主义者所经营的大商店到处在起火燃烧。城内两条主要大街的房屋几乎全部烧光。三十日晚，威廉城与外界的电话与电讯联系中断，威廉城与近邻委内瑞拉首都加拉加斯之间的空运联系也断绝。"},{"type":"paragraph","text":"惊慌失措的荷兰殖民当局鉴于警察已不能控制局势，慌忙下令常驻岛上的三百五十名海军陆战队开进威廉城镇压示威群众。同时，殖民当局宣布夜间实行戒严。尽管这样，群众斗争并没有平息。三十日晚间，愤怒的群众继续在城里开展斗争。"},{"type":"paragraph","text":"库拉索岛介绍"},{"type":"paragraph","text":"库拉索岛是加勒比海荷属西印度群岛六个岛屿之一，位于南美洲委内瑞拉北部。面积四百四十三平方公里。人口十三万多人。首府是威廉城。"},{"type":"paragraph","text":"库拉索岛的主要经济为提炼石油，石油占其出口总额的百分之九十八，均为英荷壳牌石油公司所有。"},{"type":"paragraph","text":"库拉索岛先后被西班牙、英国和荷兰三国殖民者所争夺和占领。一八一六年起，库拉索岛一直在荷兰殖民主义者统治之下。库拉索岛的人民不堪殖民者的剥削和压迫，长期来不断进行斗争。　　（新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0735095c4c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
