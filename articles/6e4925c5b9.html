<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"提高政治认识改造思想 全国各地学校师生纷纷展开寒假学习","authors":[],"dates":[{"year":1950,"month":2,"day":4}],"is_range_date":false,"parts":[{"text":"提高政治认识改造思想 全国各地学校师生纷纷展开寒假学习","type":"title"},{"text":"【新华社北京一日电】寒假已经到来，北京、上海、南京、杭州、武汉、重庆等城市的大中学校学生和教师正在纷纷参加寒假的学习和宣传等工作。北京清华大学文法学院师生二百九十二人于二十七日起参加京市市郊的土地改革工作，作为社会学系的寒假实习，教授冯友兰、吴泽霖、雷海宗等都参加这个实习。他们在学期考试以后即进行下乡的准备工作，学习了土地改革的理论和政策。","type":"paragraph"},{"text":"上海市各校学生在寒假中以宣传推销公债和政治学习为中心，青年团工作委员会举办寒假学园，组织时事政治思想学习、课程辅导和参加社会活动等。交通、复旦、震旦、光华、沪江、戏剧专科学校等校也在积极组织政治学习和宣传推销公债。敬业、缉槻等中学并组织同学到乡村中和到工厂中去，进行文化娱乐活动。","type":"paragraph"},{"text":"南京市青年团工作委员会和市学联举办的寒假学习团，拟吸收私立中学学生一千人，进行三个星期的政治思想教育；其余全市三十余所大中学校，按地区分成十六个学习分会，进行政治学习。市教育局和中小教联号召中小学教职员检查教学方法，并以自学的原则进行政治学习。","type":"paragraph"},{"text":"武汉市教育局、青年团工作委员会、市教联、市学联为推动寒假工作，组织了各校师生寒假学习工作委员会。该委员会主要工作为举办教师讲习会，吸收中小学教师一千人参加学习社会发展史和土地改革政策；以各大专学校学生为主组织寒假学习团和工厂服务队；在汉口、武昌、汉阳等三处举办青年学园六所；此外还举办寒假儿童学园。","type":"paragraph"},{"text":"重庆市军管会文教接管委员会所举办的大中小学教师寒假研究会已经开始报到，各校教师参加研究的有三千五百人；专科以上学校的教授决定分区研究，中小学教师则集中学习。","type":"paragraph"},{"text":"【本报讯】天津消息：此间各大中小学学期考试均已完毕，各校自二月一日开始放寒假。中共天津市委学校党委会及青年团市工委分别主持的包括八千余师生（主要为党员、团员与少年儿童队员）的寒假学习组织已于一月三十一日及二月一日开学。市委学委会举办了党员学习班，参加的有全市各大中学全部党员，青年团支部委员以上的干部，青年团员积极分子及申请入党的群众，共一千三百余人。学习内容为党史、党纲、党章、党员思想修养及支部工作等。学习方法是由专人作报告，各校支部分别组织讨论。","type":"paragraph"},{"text":"青年团市工委建立了四种学习组织。一为团员学习班，包括大、中学生团员三千八百余人。一为学生的政治学习班，参加者为十八个私立中学的团员及进步群众四百余人；一为小学教员团员寒假学习班，现已有五百七十余人报名参加，其中有二百余人系非团员，七十人为团友；学习内容有目前形势和任务、团员修养、团的生活、团的工作与任务及关于少年儿童队的几个问题等。此外，第十、第二两区十个小学的少年儿童队员与小学生二千余人，已组织了两个“少年乐园”，领导少年儿童进行学习与康乐活动。","type":"paragraph"},{"text":"【本报讯】绥远消息：青年团绥远省工委会举办的归绥市青年寒假学习团已于上月七日开学，参加学习的有该市八个中学的学生三百余人。预定学习一个月，课程包括：学习态度与工作作风问题；时事与人民政府政策，社会发展史，共产党与青年团介绍；思想总结等。","type":"paragraph"},{"text":"又，包头市公私立二十四个小学教职员二百余人，已集中进行寒假学习，由青年团市工会、教育局联合领导，计划学习一个月。","type":"paragraph"},{"text":"【本报讯】广东消息：粤中专区全区公私立中等学校教师，组织了两个寒假学习班分别集中在开平、三埠两地学习，已于一月二十三、二十四两日开学。","type":"paragraph"},{"text":"1950年2月4日人民日报电子版","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e4925c5b9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
