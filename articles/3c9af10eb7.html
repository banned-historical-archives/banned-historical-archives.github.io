tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席旧居前","authors":["崔合美"],"parts":[{"type":"paragraph","text":"跋山涉水来到毛主席故乡，"},{"type":"paragraph","text":"谁没有照相留念的愿望！"},{"type":"paragraph","text":"瞧，竹林里涌出一群战士，"},{"type":"paragraph","text":"请求摄影师照张合影的相。"},{"type":"paragraph","text":"呵，那空军战士，刚从云中来，"},{"type":"paragraph","text":"那海军战士，踏平过东海浪。"},{"type":"paragraph","text":"几个边防战士风尘仆仆，"},{"type":"paragraph","text":"来自天山脚下，珍宝岛上。"},{"type":"paragraph","text":"相逢在日夜向往的韶山，"},{"type":"paragraph","text":"心情激动呵，思潮陡涨。"},{"type":"paragraph","text":"摄影师呀，您难录下歌声、笑声，"},{"type":"paragraph","text":"可定要记下战士的幸福和畅想……"},{"type":"paragraph","text":"摄影师懂得战士的感情，"},{"type":"paragraph","text":"让大家在毛主席旧居前站成一行。"},{"type":"paragraph","text":"战士象偎依在母亲怀里，"},{"type":"paragraph","text":"满身披着温暖的阳光。"},{"type":"paragraph","text":"一排战士手挽着手、肩并着肩，"},{"type":"paragraph","text":"一个个轩昂雄健，英武豪放。"},{"type":"paragraph","text":"啊，风华正茂的战士象棵棵新松，"},{"type":"paragraph","text":"为保卫毛主席的革命路线，"},{"type":"paragraph","text":"人人有用不完的力量。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c9af10eb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
