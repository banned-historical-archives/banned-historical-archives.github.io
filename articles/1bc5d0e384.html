" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wengeqianqixinianlu1","name":"十年文革前期系年录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录1.pdf"],"article":{"title":"第三十六卷","parts":[{"type":"title","text":"第三十六卷"},{"type":"paragraph","text":"1966年9月19日至9月30日"},{"type":"paragraph","text":"(黑龙江运动情况)9月19日"},{"type":"paragraph","text":"毛泽东再次在中南海住所的游泳池接见贺龙，说“问题解决了，没事了。”“你可以登门拜访，征求一下有关同志的意见。”贺龙根据毛泽东的提议，亲自到林彪家去征求意见。林对贺说：“你的问题可大可小，今后要注意一个问题，支持谁，反对谁。”图迫使贺龙就范。"},{"type":"paragraph","text":"《中共中央关于为贺龙同志恢复名誉的通知》(一九七四年九月二十九日)"},{"type":"paragraph","text":"贺龙同志原任党的八届中央政治局委员，中央军委副主席、国务院副总理。林彪要整贺龙同志蓄谋已久，早在一九六六年就向中央提出，贺龙同志历史上曾向国民党反动派“请求收编”、和“阴谋篡军反党”等问题，要进行审查。中央当时认为，把贺龙同志的问题搞清楚也是必要的，于一九六七年九月予以同意。在“九·一三”林彪事件发生以前，对贺龙同志问题的审查，一直为林彪、黄永胜、吴法宪、叶群、李作鹏等人所把持。他们捏造事实，隐瞒真象，以欺骗和封锁中央，诬陷贺龙同志历史上“通敌”和“篡夺军权”。“九·一三”以后，中央直接对贺龙同志的问题进行了审查。毛主席多次指示，要抓紧给贺龙同志作出结论，予以平反，恢复名誉。经中央查证甄别："},{"type":"paragraph","text":"一、所谓“通敌”问题，完全是颠倒历史，蓄意陷害。事实是：一九三三年十二月蒋介石曾派反动政客熊贡卿“游说”贺龙同志，企图“收编”。贺龙同志发觉后，报告了湘鄂西中央分局，经分局决定，将熊贡卿处决，并于一九三四年三月十七日，将此事经过报告了中央。"},{"type":"paragraph","text":"二、所谓“阴谋篡夺军权”和支持军队一些单位的人“篡夺军权”的问题，经过调查，并无此事。"},{"type":"paragraph","text":"三、关于所谓贺龙同志搞“二月兵变”的问题，纯系讹传。"},{"type":"paragraph","text":"贺龙同志已于一九六九年六月九日病故。"},{"type":"paragraph","text":"贺龙同志是一个好同志，在毛主席、党中央的领导下，几十年来为党为人民的革命事业曾作出重大的贡献。在他的一生中，无论在战争年代，或在全国解放以后，他是忠于党、忠于毛主席革命路线、忠于社会主义事业的。"},{"type":"paragraph","text":"因此，中央决定，对贺龙同志予以平反，恢复名誉。"},{"type":"paragraph","text":"中央的这个通知，印发到县团级，并口头传达到党内外群众。"},{"type":"paragraph","text":"高教部给北京各驻外使馆《备忘录》：通知在华留学生均回国休学一年。从本年起，中国停止接收外国留学生达七年之久。"},{"type":"paragraph","text":"周恩来接见科学院部分同志。当问到对一些被视为反动权威的专家扣发工资时，周答：现在党的政策是不减工资；如果自愿可以减，但要能维持生活。问抄家该不该？周答：如果有确实的证据，有违法的东西像枪枝弹药武器可以抄。如果一般的东西，你们自己考虑。专家的工资不扣，由他们自己减。(《传信录137》)9月20日"},{"type":"paragraph","text":"周恩来致信江青请对拟就的对财贸和手工业的文件，请中央文革审定，江青拖延不作答复。9月21日"},{"type":"paragraph","text":"天津市召开50万人的大会，追悼19日在被揪斗折磨中病死的天津市委第一书记万晓塘，经陶铸批准，新华社播发了讣告。毛泽东指责：“这实际上是向党示威，这是用死人压活人。”"},{"type":"paragraph","text":"晚，陈伯达接见北航“红旗”，赞扬学生坚持在国防科委门前静坐，要求揪斗赵如璋的行动。"},{"type":"paragraph","text":"周恩来、陶铸接见哈尔滨工程学院部分成员，就黑龙江省的混乱局面进行商讨。此类接见，在文革高潮中，往往一天多达数起。此篇颇有助于对黑龙江局势的了解。亦有助对全国各省运动的认识，兹全文具录，以供参考。"},{"type":"paragraph","text":"中央首长接见哈尔滨工程学院部分同志时的讲话"},{"type":"paragraph","text":"时间：一九六六年九月二十一日"},{"type":"paragraph","text":"地点：人民大会堂"},{"type":"paragraph","text":"陶铸同志讲话："},{"type":"paragraph","text":"前两天与造反团、八·八团的同志谈过了，东方红的同志没有谈。先谈谈开会的目的，开个座谈会，先不谈你们三方面的问题(总理说：不是联席会议，是中共中央决定召开的座谈会)。我没有调查，也不能谈出谁对，谁不对。靠实践，实践是检验真理的标准。谈谈最近黑龙江省的工作问题。中央非常重视黑龙江省，黑龙江省是很重要的地方，三千多万人口，黑龙江是前线，有两个修正主义的国家在边界上。黑龙江省的文化大革命运动搞的不错，总的方向是对的，革命空气造起来了，搞的很不错，总的方向是对的。群众发动起来了，是不是到顶了呢？不一定，需要继续努力，但还有问题，有几个问题，需要和大家研究的。"},{"type":"paragraph","text":"黑龙江省委瘫痪了。什么叫瘫痪？象得了风湿病一样，省委九个书记，五个书记：李范五、王一伦、陈雷、任仲夷、杨易辰没有自由了，你们去研究，反正不能工作了，省委工作非常困难，现在恰恰是关键时刻，还有李瑞、谭云鹤在家等着。今年生产关键是农业生产最好的一年，有些地方小麦还没有收完，现在工作很困难，确实是紧张的时候，140亿损失20—30亿就很了不得了。有30多个县瘫痪了，六个市也瘫痪了，(总理说：你们要关心国家大事，这也是国家大事，三千多万人要吃饭，不吃饭怎么能行，在目前这是一件大事)这样好的年景，粮食拿不到手是很大损失，搞不好就会丰产不丰收。(总理说：那时候你们就带头迁移，不能在哈尔滨了。)抓革命促生产，本应该搞好生产，不然反革命右派就有话讲了，要给我们抹黑。这样好的粮食你们没有拿到手，真正的革命，一面要抓革命，促生产，多打些粮食吃饱饭更好革命，没有饭吃革命怎么搞？工农业生产已出现不好的苗头(总理说：工业生产也出现了不好的苗头，八、九月份减产影响还不太大，但是继续下去，第四季度减产不仅影响今年度，尤其是尖端上天的问题耽误一个月，尖端过关的七年计划不仅会推迟几个月，而会推迟一、二年。)你们是最反帝反修的，而现在推迟了！(总理说：你们是工程学院的，你们是搞工的，你们最懂最清楚。东北是全国尖端配套的重要地方。今年飞机生产我们的超产不能实现，越南同志表示三十万美军要打好，几十万亦要打好，胡主席声明(8月17日)决心很大。潘复生说：援越啊......任务大，今年交不了差不行。要抓着更大程度的备战，在三、四年内过关。有人说：这是唯武器论，十五日讲话有人说是大毒草，这不是唯武器论，当时我把这给主席看，主席说这不要紧，过些时候他们认识了，就行了。哈尔滨有几个工厂只完成18%，有的工厂原材料有库存的，特别是第四季度，有些工厂逐步减产，如果不加强，必会更大减产，影响生产。黑龙江省好多尖端配套的，特别是木材，如果不解决苗头，很会造成减产。生活，哈尔滨据说蔬菜有些开始紧张，买菜排队。特别是取暖，没有取暖的煤，怎么能行。当然不是什么了不起的问题，有了苗头，抓住苗头，抓革命，促生产不就更好了吗？因此首先解决省的领导问题，把省委的领导建立起来，不然多少煤、多少铁，我们可以开个单条给你们，你们签字，你们负责，东北局黑龙江省潘复生当名誉书记。造反团、八·八团的同志不同意这样做，东方红你们亦不会同意的。他们同意搞一个新的临时省委，现在省委风雨飘摇，那时他们不好，你们一炮一轰就垮了，活该。当然从考验比较好的中间挑选十全十美的是没有的，但是要区别开来，看是什么性质的，不是反党反社会主义分子支持他，有了错误可以批评。他们开会你们不要干预了。从前他们开会，有的同志要参加要列席，今后不要了。对新省委好的要支持，不好的批评，不要开会斗争他们、抓他们，不然省委不能抓工作，你们又不干。我们相信你们会共同解决的。李范五、王一伦当然不能参加，至于他们是几类，性质还不能定，组织会审查的，不会冤枉好的。"},{"type":"paragraph","text":"我建议造反团、八八团都要暂时停止争论，全市性的大会不要开了。为什么召集工程学院的同志，因为你们不是一个学院的问题。整个黑龙江省几股势力进行斗争，通过你们的影响，可以停一个月嘛！抓一下生产不影响运动嘛，你们说现在不抓生产，将来怎么办？停一个月准备一个月嘛，将来更好地斗争黑帮，现在停止双方争论，不要下去搞串联，号召把粮食拿回来，你们不是拥护党中央、听毛主席的话吗？就要拿出行动来，到底谁听党的话，谁听毛主席的话，是靠实际体现的。一部分人到工厂去，一部分人去搞秋收。把工人团结起来，工厂有问题帮助解决，协助搞好交通。开大会全国最多的有哈尔滨、西安、兰州。开大会需要，开太多了是不好的。不是不开了，而是少开，现在不要开了，将来可以开。可以到农村去到工厂中去，把生产搞起来。(总理说：大豆出口的数目是很大的，这亦是尖端，如果收不好，影响出口最大。)你们首先联合行动，抓生产，文化大革命不一定完全停。家里可以留一部分人整理材料，准备一斗二批，不要搞全省性质的，不要到外地串联，不要妨碍交通。到你们有影响的工厂去做团结工作，把工人团结起来。"},{"type":"paragraph","text":"团结问题。两个团对立情绪相当尖锐，我问过，过去你们是不是不联系，他们回答过去不是，过去有一对红，有的两兄弟，现在斗起来眼睛红通通的，这不是个人思想，而是看法不一致。这不仅是你们一个学校有，这是一个普遍的。北京有三个司令部，还有第四个没成立。我们认识的不够，文化大革命思想准备的不够。有各种各样的认识，应允许有差别存在，搞革命的搞法不一致是可以的，在斗争中解决嘛，不可能一天晚上就解决，不协商，越拉越厉害，对立情绪不要炽化下去了。可以采取共同行动，这样可以消除分歧，你们都有总部，可以开联席会议，可以在省委的帮助下先斗共同的目标，李范五、王一伦、任仲夷......。刘居英、沙克可以共同主持联席会议，慢慢成为团结基础。当然这不是一天、两天的事。你们过去都是一帮一，一对红，红五类多数嘛，是可以团结在一起的，现在还不可能，当然可以搞一些气氛，某些共同的先团结起来，至于你们以前搞的怎样，我们先不谈，我们根据黑龙江省委，哈尔滨市的具体问题，需要你们支持、帮助省委工作。据说你们的影响很大，可以通过你们的行动带动其他学校，你们回去可以先开会，在东北局省委领导下，再召开三个总部的座谈会，也可以开整个工程学院的座谈会或者更多人参加。把革命和生产搞起来，革命、生产双丰收是大家要求的。黑龙江省资本主义根子挖出来，生产焕然一新，这就是文化革命的目的。总理叫我先说，我先把这两方面交换的意见想法讲一下。"},{"type":"paragraph","text":"总理讲话："},{"type":"paragraph","text":"陶铸同志是党中央政治局常委。我们今天邀三方代表座谈，主要是抓革命、促生产。但"},{"type":"paragraph","text":"是生产的问题，我们与东北局的同志，潘复生同志谈了三次，也是征求了你们的意见，"},{"type":"paragraph","text":"陶铸同志与造反团、八·八团的同志谈了这个问题，与东方红的同志还没有谈。"},{"type":"paragraph","text":"我想先听听你们的意见，座谈自己发言，你们可以先讲。"},{"type":"paragraph","text":"(八·八团：)我们坚决执行总理、陶铸同志代表中央作的很好的指示，昨天已经打了招呼，中央把这些大事交给我们了，这就是国家大事，我们决心按中央指示去办，脑子里只装国家大事。昨天打了电话，全体同志立刻写了一个决心书表示我们的态度(宣读决心书)。今天，我们在家开大会，立即向全省发出呼吁，我们希望以三个团的名义发表联合呼吁，初步拟定了一个呼吁书，仅供参考。"},{"type":"paragraph","text":"(造反团：)我们不会讲漂亮话，不会奉承，我们坚决响应党中央的号召，第一批先遣队几十人(后来在核实时改为二十人)第二批三百多人去北安农场，准备二十四日全部回去，串联的师生全下去，立即发出紧急呼吁。"},{"type":"paragraph","text":"省委常委委员要保证正常工作，有的单位抓人较紧，我们保护起来，让他们抓生产、休息，希望从中央调人去，重新组织省委。(总理：中央就是我们两个)。与其他的争论暂时告一停止。现在，我们基本上没有发言权，停止下来，实际已经这样做了。下工厂帮助劳动，怎么下去，还不知道。"},{"type":"paragraph","text":"最近与八·八开了两次联席会议，希望他们把人放出来。"},{"type":"paragraph","text":"陶铸：不管怎么错，还是把他放出来，你们又不是公安局。"},{"type":"paragraph","text":"总理：哪一个团体，只要有点怀疑，就抓起来，那还行？如果这样子，那我们专政机构还要不要？毛主席著作和十六条中没让这样做。我们不能一个团体或所有团体都抓人，你们想，那样我们无产阶级专政是更集中了，还是更分散了？这是一个原则问题。"},{"type":"paragraph","text":"省委只靠一个团体保护也是不妥当的，势必造成团体间的对立。你们可以派解放军保护。你们要保护，另一个团体也要保护，我们北京那么多团体，还没有遇到这个问题。你们给我们上了新的一课，要听听你们的，老师们回答我的问题，怎样才能体现无产阶级专政？(生气)"},{"type":"paragraph","text":"要定性，必须把各种材料摆在一起，反复分析、研究、核实。"},{"type":"paragraph","text":"黑龙江省交给你们专政行不行？你们又不接受，即使你们接受，我们中央常委也要考虑的。"},{"type":"paragraph","text":"陶铸：把人关起来，这样做不好，一个学校好多派别，那不就乱了吗？斗争可以，黑帮随叫随到，你们以前没有经验，做了也就做了。我打过三次电话，让你们把杨易辰放出来，你们就是不放。对这个问题我有意见。"},{"type":"paragraph","text":"(造反团：)杨易辰在运动中给学生压力很大，在社教等其他方面也有不少问题，出去以后也不能很好工作，只能妨碍省委比较好的同志领导运动，阻力很大，怕人家都抓他，人家抓走了以后找不出来。"},{"type":"paragraph","text":"陶铸：省委五个常委，一个在外，现在四个在你们那一边，你们马上放，放了就争取主动了，抓了是错误的，即使他跑到苏联去，是个反革命嘛！那也没有关系。"},{"type":"paragraph","text":"(造反团：)以前没有认识到这个问题。"},{"type":"paragraph","text":"陶铸：交给公安部门嘛！"},{"type":"paragraph","text":"(造反团：)军队不能干预文化革命，我们对我省公安厅不信任，有不少群众揭发了问题。"},{"type":"paragraph","text":"总理：你们对解放军相信不相信？"},{"type":"paragraph","text":"(造反团：)对解放军相信，但军队不能干预文化革命。"},{"type":"paragraph","text":"总理：军队在必要时要干预。"},{"type":"paragraph","text":"黑龙江日报登载了斗争省委的消息，电台亦播送了。这是完全不对的，我们很不满意。在毛主席领导的国家，没有必要暴露这些东西，况且，还没有很好地核实，不一定都对，因此我们采取了断然措施，派军队管了电视台。"},{"type":"paragraph","text":"如果被坏的团体弄去了怎么办？我们是革命团体，主观认为做的对，客观上是不对的，你们这是出于不自觉的，主观上认为是好事。"},{"type":"paragraph","text":"必要时我们可以使用专政工具，我们讲话，为什么每次都讲无产阶级专政呢？"},{"type":"paragraph","text":"兰大李贵子跑了，下了全国通缉令，北京红卫兵到处戒严，搜查，为什么不相信公安部门呢？后来发现在北京中央接待站，公安部门看护起来了，不很好吗？"},{"type":"paragraph","text":"陶铸：公安局可以不怀疑，不好的中央会改组加强。"},{"type":"paragraph","text":"(造反团：)刚才很多问题，我们主观看法有错误。"},{"type":"paragraph","text":"陶铸：你们光要我们支持你们，我打了三次电话，你们对我们一点也不支持，你们没有经验，总结点经验亦好。"},{"type":"paragraph","text":"(造反团：)我们的下边不同意，所以总团没执行。"},{"type":"paragraph","text":"陶铸：原来还是总团不通，可你们过去说下边不同意？毛远新说你们骂他同情八·八，是右倾机会主义，可你们(对八·八)骂他是右倾机会主义，我看恰好。"},{"type":"paragraph","text":"总理：把原则谈清楚，不要检查。"},{"type":"paragraph","text":"陶铸：我们的话要正确理解，不可能每句话都百分之百的对。"},{"type":"paragraph","text":"总理：总有大方向是对的。"},{"type":"paragraph","text":"远新：我不是哪一个团的，我与造反团同志建议、商量，组织了一百多人去各工厂、农村等单位进行调查，劝工人在抓生产上协同起来，打算开一个抓革命促生产大会，晚上在文化宫开，其他单位收听广播。"},{"type":"paragraph","text":"陶铸：这样好。"},{"type":"paragraph","text":"总理：据说省里厅局长以上200多人，106个被斗了，你们想想，这么下去怎么办？想一想，要冷静地想一想。"},{"type":"paragraph","text":"潘复生：道外有一个区，四类分子领导，斗争了......"},{"type":"paragraph","text":"远新：造反团准备23日全部下去劳动。"},{"type":"paragraph","text":"(参加座谈的：周总理、陶铸、宋任穷、马明芳、潘复生。)9月22日"},{"type":"paragraph","text":"中共中央发布关于认真学习林彪5·18讲话的指示。该文件在经过整理后，经毛画圈同意印发。"},{"type":"paragraph","text":"中共中央关于全党全军认真学习、认真讨论、认真运用林彪同志讲话的指示"},{"type":"paragraph","text":"林彪同志一九六六年五月十八日在中央政治局扩大会议的讲话，是一个极为重要的马克思列宁主义的文件。林彪同志根据毛泽东同志关于社会主义时期阶级和阶级斗争的理论，根据党内路线斗争的严重事实，根据国际无产阶级专政的历史教训，特别是苏联赫鲁晓夫修正主义集团篡党篡政篡军的教训，对如何巩固无产阶级专政、防止反革命政变、反革命颠覆的问题，做了系统的精确的阐述。"},{"type":"paragraph","text":"林彪同志尖锐地提出了无产阶级取得政权以后，还可能丧失政权的问题。他指出，无论怎样千头万绪的事，永远不要忘记政权，忘记了政权，就是忘记了马克思主义的根本观点，那就是糊涂人，脑袋掉了，还不知怎么掉的。"},{"type":"paragraph","text":"林彪同志把毛泽东思想红旗举得最高、最好，在这篇讲话中，他对毛泽东思想做了全面的、正确的、科学的评价。他指出，全党和全国人民都要以毛主席为中心来团结，以毛泽东思想为中心来团结。他号召在全国人民中开展活学活用毛泽东同志著作的群众运动。他指出这是保证我国防止修正主义，避免走资本主义复辟，加强和巩固无产阶级专政的最根本的关键问题。"},{"type":"paragraph","text":"林彪同志说：毛主席是我们党的最高领袖，毛泽东思想是永远的普遍真理，谁反对毛主席，反对毛泽东思想，全党共诛之，全国共讨之。"},{"type":"paragraph","text":"林彪同志这个讲话，是活学活用毛泽东思想的典范，是指导无产阶级文化大革命的一个重要文件。全党全军都应认真学习，认真讨论，认真领会，把它运用到文化革命和一切行动中去。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九六六年九月二十二日"},{"type":"paragraph","text":"周恩来在中央国家机关各部委党委、党组全体成员会议上讲话：现中央、国务院各部正副部长三十六人停职反省，将来也要一分为二，不是一棍子打死。即使是反党性质的，也还有走得很远的，有愿意革命的。犯了路线错误，主观上还认为自己是革命的，只要愿意改正错误，就不能算敌我问题。"},{"type":"paragraph","text":"陈伯达亲笔立下“军令状”，要求赵如璋等“以普通劳动者的态度，同北航学生聚谈或者同住几天。科委的干部(包括罗舜初、赵如璋)如果被学生杀死或杀伤，陈伯达情愿抵偿。”翌日，国防科委交出赵如璋，北航红旗得胜回校。9月23日"},{"type":"paragraph","text":"王任重批发了《首都红卫兵纠察队西城分队几个政策性通令》。"},{"type":"paragraph","text":"地院东方红造反派查封了院文革办公室，夺了院广播台，双方发生武斗。陈伯达派戚本禹、关锋作为观察员赶至地院，对造反派含蓄地表示支持。(《传信录140》)9月24日"},{"type":"paragraph","text":"上海红卫兵拟于本日驱一二百名资本家游街示众，市委劝阻无效，中央紧急指示制止。"},{"type":"paragraph","text":"中共中央转发国务院财贸办公室、国家经济委员会《关于财政贸易和手工业方面若干政策问题的报告》。其中最主要的变化是所有“公私合营企业应当改为国营企业，资本家的定息一律取消，资方代表一律撤销。”在“割资本主义尾巴”上完全肯定了红卫兵的激进要求，标志着“社会主义革命”的进一步深化。资本家虽已成为没有资本的资本家，然犹被树为阶级斗争的风车，使继续保持这一顶帽子，以利于进行阶级斗争教育。"},{"type":"paragraph","text":"中共中央转发国务院财贸办公室、国家经济委员会"},{"type":"paragraph","text":"《关于财政贸易和手工业方面若干政策问题的报告》"},{"type":"paragraph","text":"中央原则同意国务院财贸办公室和国家经济委员会关于财政贸易和手工业方面若干政"},{"type":"paragraph","text":"策问题的报告，现在作为试行草案发给你们。请你们一面执行，一面进行仔细调查研究，"},{"type":"paragraph","text":"就执行中的问题提出意见，以便补充修改。"},{"type":"paragraph","text":"这个文件到县、团级党委和工交、基建、财贸、文教各系统的基层单位，并且向红卫兵和广大群众进行传达，同时，和他们进行商讨，欢迎他们提出新的倡议。目前这些问题不要登报。在传达时，要由负责干部亲自讲解说明，组织群众讨论。"},{"type":"paragraph","text":"附：主席、中央："},{"type":"paragraph","text":"最近在无产阶级文化大革命中，各地红卫兵和革命群众，横扫“四旧”，解决一些多年来没有解决的问题。这是具有重大历史意义的革命创举。他们在有关财政贸易和手工业方面，也提出了许多革命性的倡议。这些倡议，许多是可行的，应当采纳办理。也有些是目前还不能实行的，需要对他们进行耐心的解释和说服。现在把有关财政贸易和手工业方面若干政策问题的意见，报告如下："},{"type":"paragraph","text":"一、关于改换旧商店的招牌，扫除服务行业中陈规陋习的倡议，各地已经在实行，应当继续积极地有领导地实行。"},{"type":"paragraph","text":"二、公私合营企业应当改为国营企业，资本家的定息一律取消。资方代表一律撤销，资方人员的工作另行安排。关于取消定息，将由国务院提请全国人民代表大会或人大常委会讨论通过后实行。在未通过前，暂停支付。"},{"type":"paragraph","text":"三、大型合作商店有条件有步骤地转为国营商店，有的也可以不转，照旧营业。转为国营的，人员要经过甄别清理，没有改造好的地、富、反、坏、右分子另作安排。小型的合作商店，不转为国营商店，不要停业。小商小贩，现在还起着社会商品流通的作用，为群众所需要，应当让他们存在。但必须接受国家的管理和群众的监督，不许搞投机倒把。大量的小商小贩应当为国营商店代购代销。商业网、点的设置要便利群众。"},{"type":"paragraph","text":"四、集体所有制的手工业合作组织，是社会主义所有制的一种形式，生产比较灵活，品种多样，又便利于群众需要，目前一般不要改变。"},{"type":"paragraph","text":"五、独立劳动者包括个体手工业者，个体服务业和修理业人员，个体三轮车工人，以及家庭服务人员(例如保姆等)，应当允许继续存在，以利于安排社会就业和满足社会某些方面的需要。同时，对于这些人，应当积极加强管理，加强教育和改造。凡是有条件组织起来的，应当组织合作小组或吸收他们参加合作社。"},{"type":"paragraph","text":"六、银行和信用合作社的储蓄存款，继续执行存款自愿、取款自由的原则，利息照付。侨汇存款的优待利率应适当降低。拟于明年一月作出规定。反革命分子的储蓄存款应当没收的，依法处理。"},{"type":"paragraph","text":"七、公债已经还了绝大部分。剩下的很小一部分，应当按原定办法还本付息。"},{"type":"paragraph","text":"八、出口商品，包括工艺美术品，在商标、图案、造型等方面，有明显反动政治内容的，必须立即改变，一般的目前暂不变动；以后要坚决改革，推陈出新，表现我国人民高尚朴素的民族风格，也要适当考虑国外不同市场的需要。仓库里已经生产出来的出口商品，应当继续出口。已经签订的出口合同，应当履行，恪守信用。国外市场需要的出口商品，包括工艺美术品，应当继续生产。"},{"type":"paragraph","text":"九、国内市场的商品，在商标、图案、造型等方面，应当坚决地有领导地进行改革，改革的步子要快一些。现在已经生产出来的商品，应当继续销售。其中商标图案有浓厚的封建或者资本主义毒素的应当经过改制以后出售。呢绒、绸缎、烟、酒以及劳动人民和舞台、银幕需要的化妆品，还要继续生产和出售。商品的品种不要轻易取消。口红、脂粉、香水这类的高级化妆品，不要在国内销售。"},{"type":"paragraph","text":"十、城乡非农业人口的粮食供应定粮标准，目前不要提高。要继续严格控制吃商品粮的人数，如农村半农半读学校、民办中学、农业中学的学生，自带口粮进入半工半读的学校的农村学生、农村医务人员、兽医人员等，不要转为非农业人口，吃商品粮。要严格控制粮食销售，注意节约粮食。"},{"type":"paragraph","text":"以上意见如属可行，请批转各地执行。"},{"type":"paragraph","text":"国务院财贸办公室、国家经济委员会"},{"type":"paragraph","text":"一九六六年九月二十三日"},{"type":"paragraph","text":"关锋、吴德在地质学院讲话，支持学生要求：邹家尤应到少数派那里检讨；何长工对全部事态的发展应负责任，也应去检讨。少数派冲地质部，要求邹检讨是对的。多数派不应阻挠少数派的合理要求。(《传信录141》)"},{"type":"paragraph","text":"北航“红旗”、北外“红旗”、清华“井冈山”等造反派组织都夺取了校内的广播台。"},{"type":"paragraph","text":"遵照陶铸在9月1日的电话指示：“对于个别坏分子的反动言行......进行必要的揭露和批判。”湖南省委张平化于今天作了“抓黑鬼”的动员报告。这个报告被称为“捉鬼动员令”。湖南出现一片白色恐怖。9月25日"},{"type":"paragraph","text":"周恩来接见大专院校红卫兵革命造反司令部主要负责人讲话：表示支持少数派。“工作组承认路线错误、方向错误就行了”，所整材料一律作废。“在工厂、机关团体、还有商店，不搞红卫兵，已经搞了的暂时保留一个时期，前途是取消。这一点，毛主席、林彪同志和中央常委已经研究决定了的。”“上海抄了十万资本家”，还要拉一万人游行，我们制止了。有人说我15日的讲话是大毒草，这是不对的，它是毛主席看过的。(《传信录143》)"},{"type":"paragraph","text":"陈伯达在政协礼堂接见重庆大学“815”及其他革命师生时，指出：“《16条》是毛主席亲自主持制定的。纠正了错误路线。但错误路线还会继续用各种形式出现。看来这一个多月来。斗争的形式更加尖锐、更加复杂了。有些人不愿执行无产阶级革命路线，不愿执行毛主席的指示，虽然工作组形式上撤走了，但还用别的形式代替工作组，就事先指定、背后操纵假的文革领导来执行错误路线。”他建议：“高干子弟在文化革命运动中占有领导岗位的，应当让出来，让普通的工农子弟领导文化革命。”(《传信录144》)"},{"type":"paragraph","text":"叶剑英、戚本禹、谢镗忠接见北京十三个艺术院校、艺术团体部分师生代表。指出军队派往各艺术院校的工作组，不斗走资派，“而是去‘肃清外围’，组织学生斗学生；不是文斗而是武斗，就是打。”他要求在运动中抓思想、抓组织、抓政策、抓纪律。(《传信录145》)"},{"type":"paragraph","text":"叶剑英说毛选了四十年，选了林彪为自己的第一接班人，马、恩是两个人，毛、林也刚好是两个人，有了他们的领导，革命就无往而不胜。"},{"type":"paragraph","text":"陶铸指示熊复用中宣部名义转发国家体委《关于运动队在文化大革命期间保持一定训练的建议》。这个文件被造反派指责为假借训练压制运动员参加文化大革命。9月26日"},{"type":"paragraph","text":"周恩来参加首都大专院校红卫兵革命造反总司令部(即三司)全体红卫兵在北京工人体育馆举行的大会，讲话中再次申明，把革命群众打成反革命的黑材料一律烧掉，所加的反革命帽子取消。谈及工作组问题时，说：“这个问题解决了没有？解决了。党的十一中全会解决了这个问题。”谈到各红卫兵组织时，他说无论少数派、多数派都是革命的，应一视同仁。在政治上物质上都应当平等。(《传信录146》)"},{"type":"paragraph","text":"首都大专院校红卫兵捍卫毛泽东思想、捍卫十六条联络委员会在北师大召开了第一次批判谭力夫“发言”的大会。9月27日"},{"type":"paragraph","text":"经周恩来、陶铸致信毛、林，并由陶铸以中央名义，同意华东局关于学生和红卫兵不到医院进行革命串连的请示；并指示卫生部“要把医院的党委恢复起来”、“医院文化大革命要按‘四清’部署分期分批进行”。这个文件被指为起了压制群众运动的作用，陶铸在12月13日对卫生界的谈话中，为此作了自我检查。"},{"type":"paragraph","text":"北京及外地红卫兵组成东方红筹委会，准备在本日改北京市为东方红市。周恩来得知后劝止。9月28日"},{"type":"paragraph","text":"关锋在地质学院学生座谈会上说：极少数坚持错误的路线的人，在16条公布之后，“煽动群众斗群众，学生斗学生，工人斗学生，农民斗学生。”“路线错误是什么错误？路线错误就是打击革命群众，镇压革命左派，制造了一个反干扰的阶段，打击给院党委提意见的、给工作组提意见的、赶工作组的。”“错误的路线必须批判。”(《传信录148》)9月29日"},{"type":"paragraph","text":"戚本禹接见红卫兵(多数派)代表，说：“有两个司令部，一个是毛主席的，一个是另外一些人的。你们要看清哪个是毛主席的就保卫。”“有相当学校的工作组是执行另一个司令部的路线。”(《传信录149》)9月30日"},{"type":"paragraph","text":"陆定一被隔离反省，拘禁在看守所。《人民日报》整版刊登语录歌，并加编者按语。从此语录歌风行一时。9月"},{"type":"paragraph","text":"林彪：《关于工作组问题的讲话》①"},{"type":"paragraph","text":"派工作组本身是方向路线性错误，是资产阶级反动路线的产物。工作组在某些负责人的错误领导下，一般地贯彻了“排除干扰”、“抓游鱼”，挑动群众斗群众，学生斗学生，压制群众，把某些群众打成“反革命”的错误路线。"},{"type":"paragraph","text":"工作组有几种情况：少数对上边这条路线有所抵制，但也给运动增加了种种清规戒律，束缚群众的手脚，程度不同地犯了右倾的错误。"},{"type":"paragraph","text":"另一种是忠实地执行了这条资产阶级反动路线。"},{"type":"paragraph","text":"最甚的是发展了这条资产阶级反动路线，疯狂地镇压革命群众，有意把一些革命同志打成“反革命”。这些人是政治扒手，这些工作组当权派是反党、反社会主义、反毛泽东思想的右派分子。他们与所在单位党内走资本主义道路的当权派勾勾搭搭，采取联合行动，制造种种事件。对这些，必须进行坚决的斗争，对其方向性路线性错误，要彻底批判。"},{"type":"paragraph","text":"在有些单位虽然撤了工作组，但对其错误并未加以彻底批判，甚至由于某些人的阴谋，根本未加批判。那里的群众还未真正发动起来，被打成“反革命”的同志还未平反，根本未加批判，即从根本上未改变。"},{"type":"paragraph","text":"是不是每个工作组成员都是不革命的、反革命的呢？每个工作组都有右派分子？要进行阶级分析。从总体上看，多数还是革命的，不同程度的犯了错误。极少数是资产阶级右派分子，是反革命分子。是不是黑帮分子，要听听那些受害者的控拆，要看本单位群众的揭发，由那里的群众决定。派工作组及工作组所执行的方向性、路线性的错误必须批判。一切流毒必须彻底肃清。"},{"type":"paragraph","text":"青年工人遇罗克撰写《出身论》一文，对“老子英雄儿好汉，老子反动儿混蛋”一联进行了批判，在社会上广泛流传。遇罗克终因此被捕遇害。①流传本标“一九六六年八月”，无具体日期，姑系于此。又讲话中“资产阶级反动路线”的提法，是迟至10月底中央工作会议时才提出来的。"},{"type":"paragraph","text":"第六编"},{"type":"paragraph","text":"为渊驱鱼―批判资产阶级反动路线"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":438,"page_end":447,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"关锋","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"潘复生","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"九·一三事件","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wengeqianqixinianlu2","name":"十年文革前期系年录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录2.pdf"],"article":{"title":"第七十六卷","parts":[{"type":"title","text":"第七十六卷"},{"type":"paragraph","text":"1967年3月30日"},{"type":"paragraph","text":"（《爱国主义还是卖国主义》一文的发表）3月30日"},{"type":"paragraph","text":"戚本禹《爱国主义还是卖国主义——评反动影片〈清宫秘史〉》发表。"},{"type":"paragraph","text":"《爱国主义还是卖国主义？——评反动影片\u003c清宫秘史\u003e》"},{"type":"paragraph","text":"被人称为爱国主义影片而实际是卖国主义影片的《清宫秘史》，在全国放映之后，至今没有被批判。——毛主席：《关于（红楼梦研究）问题的一封信》"},{"type":"paragraph","text":"一九四九年的十月，朝霞照亮了东方的大地，灾难深重的祖国像巨人一样地站起来了。"},{"type":"paragraph","text":"中国人民在毛泽东思想的指引下，经过无数次的艰苦斗争，终于推翻了帝国主义、封建主义和官僚资本主义三座大山，获得了全国的解放。"},{"type":"paragraph","text":"人民大革命的暴风骤雨洗荡着中国大地的污垢，但是，反动统治阶级并不甘心死亡，他们在各个领域里继续进行着疯狂的大反扑，阶级斗争非常尖锐。文化思想战线上的阶级斗争尤其复杂，充斥于文化阵地上的反动影片、戏剧、歌曲、书刊，是配合反动统治阶级向革命人民进行大反扑的重要宣传工具。一九五O年还在北京、上海和全国其他城市大量放映的反动影片《清宫秘史》，便是最突出的一例。"},{"type":"paragraph","text":"胜利了的中国人民在这种反动文化的大反扑面前，究竟采取什么态度？是进行无产阶级文化革命，还是同大肆泛滥的反动文化妥协投降？每一个革命同志都面临着新的抉择和考验。"},{"type":"paragraph","text":"围绕着《清宫秘史》这部反动影片，以毛主席为首的无产阶级革命派同党内一小撮走资本主义道路的当权派，展开了一场严重的斗争。这是解放了的中国，在文化思想战线上的第一次重大的斗争。"},{"type":"paragraph","text":"毛主席严正指出：《清宫秘史》是一部卖国主义的影片，应该进行批判。他还说过：《清宫秘史》，有人说是爱国主义的，我看是卖国主义的，彻底的卖国主义。但是，反革命修正主义分子陆定一、周扬和当时的中央宣传部常务副部长胡××等，以及背后支持他们的党内最大的走资本主义道路的当权派，却顽固地坚持资产阶级反动立场，公然对抗毛主席的指示，说这部反动影片是“爱国主义”的，拒绝对这部影片进行批判。"},{"type":"paragraph","text":"当时，担任文化部电影事业指导委员会委员的江青同志，坚持毛主席的无产阶级革命路线，几次在会议上提出要坚决批判《清宫秘史》。但是，陆定一、周扬、胡××等人却大唱对台戏，他们极力宣扬这部反动影片的什么“爱国进步性”。江青同志要按照毛主席的指示办事，他们却抬出了他们的后台老板、党内最大的走资本主义道路的当权派的黑话，说：“某某同志认为这部影片是爱国主义的。”江青同志坚持真理、力排众议，义正词严地驳斥了他们这种反动的、荒谬的主张，坚持要批判这部影片。他们不得已，只好敷衍了事地指定一个思想反动的历史工作者，写了一篇假批判、真包庇的小文章。但是，就是这样的文章，他们还嫌“太激烈了”，扣住不发。无产阶级同资产阶级在文化思想路线上一场重大的斗争，就这样被他们活生生地扼杀了。"},{"type":"paragraph","text":"一九五一年，毛主席亲自领导了文化思想战线上批判反动电影《武训传》的斗争。一九五四年，毛主席又在全国范围内，发动了另一次重大的斗争，即对俞平伯的《红楼梦研究》和胡适反动思想的批判。同年十月十六日，毛主席曾经给中央政治局的同志和其他有关同志写了一封信，严肃地批判了党内的一些“大人物”压制新生力量向资产阶级开火，甘心作资产阶级的俘虏；并且再一次地提出了反动影片《清宫秘史》的问题。毛主席就两个青年写的关于《红楼梦研究》批判的文章指出："},{"type":"paragraph","text":"“这是三十多年以来向所谓红楼梦研究权威作家的错误观点的第一次认真的开火。作者是两个青年团员。他们起初写信给《文艺报》，请问可不可以批评俞平伯，被置之不理。他们不得已写信给他们的母校——山东大学的老师，获得了支持，并在该校刊物《文史哲》上登出了他们的文章驳《红楼梦简论》。问题又回到北京，有人要求将此文在《人民日报》上转载，以期引起争论，展开批评，又被某些人以种种理由（主要是”小人物的文章”，“党报不是自由辩论的场所”）给以反对，不能实现；结果成立妥协，被允许在《文艺报》转载此文。嗣后，《光明日报》的《文学遗产》栏又发表了这两个青年的驳俞平伯《红楼梦研究》一书的文章。看样子，这个反对在古典文学领域毒害青年三十余年的胡适派资产阶级唯心论的斗争，也许可以开展起来了。事情是两个‘小人物’做起来的，而‘大人物’往往不注意，并往往加以阻拦，他们同资产阶级作家在唯心论方面讲统一战线，甘心作资产阶级的俘虏，这同影片《清宫秘史》和《武训传》放映时候的情形几乎是相同的。被人称为爱国主义影片而实际是卖国主义影片的《清宫秘史》，在全国放映之后，至今没有被批判。《武训传》虽然批判了，却至今没有引出教训，又出现了容忍俞平伯唯心论和阻拦‘小人物’的很有生气的批判文章的奇怪事情，这是值得我们注意的。”"},{"type":"paragraph","text":"但是，阶级斗争是不以人的意志为转移的。在毛主席这样尖锐地提出问题之后，以陆定一为首的一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，仍然继续坚持资产阶级反动立场，顽固地对抗毛主席的指示。从一九五四年到现在，十二年过去了，反动的、彻底的卖国主义影片《清宫秘史》，还是一直没有得到批判。"},{"type":"paragraph","text":"史无前例的无产阶级文化大革命运动，把这个问题重新提了出来。"},{"type":"paragraph","text":"欠账总是要还的。解放以后一直没有被批判的反动的、彻底的卖国主义影片《清宫秘史》，一定要在这次无产阶级文化大革命运动中受到革命群众的彻底批判。对抗毛主席指示的一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，也一定要在运动中受到革命群众的彻底批判。他们明目张胆地反动毛主席的无产阶级革命路线，猖狂地反党、反毛泽东思想的罪行，必须受到彻底的清算。革命群众一定要把这一小撮反革命修正主义分子打倒，一定要把党内最大的走资本主义道路的当权派拉下马，让他靠边站。"},{"type":"paragraph","text":"反动影片《清宫秘史》，是一部所谓历史题材的影片，写的是清代末年戊戌变法运动和义和团斗争。它公开站在帝国主义、封建主义和反动资产阶级的立场上，任意歪曲历史事实，美化帝国主义，美化封建主义和资产阶级改良主义，歌颂保皇党，污蔑革命的群众运动和人民反帝、反封建的英勇斗争，宣扬民族投降主义和阶级投降主义。"},{"type":"paragraph","text":"反动影片《清宫秘史》是永华影业公司摄制的。这是一家反动的电影公司，它成立以后拍摄的第一部影片《国魂》，就是借文天祥的幽灵，来为垂死的蒋家王朝招魂。它的第二部影片就是《清宫秘史》。作者姚克，是一个坚持反革命立场的反动文人。他曾经编辑过反动的《天下》月刊，反对中国革命，积极为英、美帝国主义和买办资产阶级效劳。后来，又投靠国民党反动派，并不断写点反动的、黄色的剧本。他是反动统治阶级的一条小走狗。全国解放前夕，逃亡香港。这样一个反共、反人民的反动文人写出一部反动影片《清宫秘史》，是丝毫不奇怪的。奇怪的是那些披着“共产党员”、“无产阶级革命家”外衣的党中央宣传部的部长和某几个副部长，以及背后支持他们的党内最大的走资本主义道路的当权派，却对这样一部极其反动的、彻底的卖国主义影片如此垂青，把它誉之为“爱国主义”的影片，积极充当帝国主义、封建主义、反动资产阶级的代言人，这岂不是可以发人深省的吗？！"},{"type":"paragraph","text":"在对待这部反动的、彻底的卖国主义影片问题上，以毛主席为首的无产阶级革命派同一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，究竟存在着哪些重大的原则分歧呢？概括地说，有三个方面的分歧，即：怎样对待帝国主义的侵略？怎样对待义和团的革命群众运动？怎样对待资产阶级改良主义？"},{"type":"paragraph","text":"怎样对待帝国主义的侵略？"},{"type":"paragraph","text":"帝国主义同中国人民的矛盾是近代中国社会的主要矛盾。帝国主义是中国人民第一个和最凶恶的敌人，怎样对待帝国主义的侵略，这是革命的首要问题。"},{"type":"paragraph","text":"在对待帝国主义侵略问题上，被一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派歌颂为“爱国主义”的反动影片《清宫秘史》，完全是一副极端可耻的恐帝、崇帝、亲帝的奴才面孔。"},{"type":"paragraph","text":"影片对所谓英、美、德、俄、日、法、意、奥“八国联军”的帝国主义侵略害怕得要死，在影片中大肆宣扬恐帝思想。叫嚷什么“中国从甲午之战以后，财力亏损，兵力单薄，......众寡不敌，强弱悬殊”，“外畔必不可开”。大臣许景澄被帝国主义吓得放声大哭。"},{"type":"paragraph","text":"毛主席教导我们，在帝国主义野兽面前，革命的人民不可以有丝毫的怯懦。但是在电影的作者及其歌颂者们看来，在帝国主义侵略面前，除了举手投降之外，没有别的出路。——这是赤裸裸的民族投降主义，十足的亡国奴论调！"},{"type":"paragraph","text":"与此同时，影片又大肆宣扬崇帝、亲帝思想，极力散布对帝国主义的幻想，公开贩卖卖国主义理论。作者公然通过影片里所安排的帝国主义代理人珍妃之口，欢迎帝国主义对中国的侵略。说什么“各国一定会原谅皇上”，“我相信各国非但不会伤害皇上，还会帮助皇上恢复皇位，重振朝纲。”大臣孙家鼐也声称：“东西各国的使臣，也都向着皇上。”如果对照一下当时侵略中国的帝国主义分子的反革命宣传，就可以看出，影片所宣扬的论调同帝国主义所宣扬的论调简直是同出一辙。倒如沙皇俄国就欺骗国内人民说：它“不是在同中国打仗”，“只是在平定暴乱，镇压叛乱者，帮助合法的中国政府恢复正常的秩序。”列宁早在一九OO年写的第一篇有关中国的论文《中国的战争》中，就无情地驳斥了侵略者的这种反革命论调。"},{"type":"paragraph","text":"一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，极力宣扬反动影片《清宫秘史》的“爱国主义”，究竟是一些什么样的货色呢？原来他们所宣扬的“爱国主义”，就是影片里所描写的光绪皇帝等人那种不惜依靠帝国主义的力量来恢复和巩固他们对人民的统治的所谓“爱国主义”。他们在中国人民推翻了帝国主义、封建主义的反动统治之后，还提倡人们去学习那种为了恢复和巩固剥削阶级对人民的统治，而不惜当卖国贼的所谓“爱国主义”，其用心何其毒也！"},{"type":"paragraph","text":"毛主席教导我们：“爱国主义的具体内容，看在什么样的历史条件之下来决定。有日本侵略者和希特勒的‘爱国主义’，有我们的爱国主义。对于日本侵略者和希特勒的所谓‘爱国主义’，共产党员是必须坚决地反对的。”①同样，对于一小撮反革命修正主义分子和党内最大的走资本主义道路的当权派提倡的所谓“爱国主义”（即彻底的卖国主义），也是我们所必须坚决反对的。"},{"type":"paragraph","text":"影片宣扬的欢迎帝国主义帮助中国“重振朝纲”的卖国主义理论，同美帝国主义的强盗逻辑也是一路货色。美国国务卿艾奇逊之流在一九四九年曾经操着当年侵略中国的帝国主义者的同一个腔调，在《白皮书》里大谈美国如何“关心”中国，把侵略说成“友谊”。毛主席在《丢掉幻想，准备斗争》、《“友谊”，还是侵略？》等文章中，早已对这种反革命的强盗逻辑，给予了严厉的驳斥。毛主席指出：将侵略说成“友谊”，是“美国老爷的逻辑”。但是，一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道妥协，希望得到帝国主义的“谅解”和“帮助”，他们对毛主席的“丢掉幻想，准备斗争”路的当权派，屈服于帝国主义的压力，对帝国主义害怕得要命。他们幻想同帝国主义的伟大号召，极端不满，他们大肆吹捧反动的、彻底的卖国主义影片《清宫秘史》，实际上是公开抗拒毛主席对艾奇逊《白皮书》的批判，这是对毛泽东思想的猖狂进攻。"},{"type":"paragraph","text":"十分明显，在全国解放前夕，反动的电影公司和反动文人所以要制作这种宣扬帝国主义①《毛泽东选集》第2卷，人民出版社1952年第2版，第508页。可以帮助中国“重振朝纲”的影片，就是要通过电影制造反动舆论，公开鼓吹依靠美帝国主义来镇压中国人民的革命运动，为处于崩溃中的国民党反动派出谋划策，影片完全站在帝国主义和国民党反动派的立场上，迎合美帝国主义侵略中国的需要，为美帝国主义及其走狗效劳。企图维持其摇摇欲坠的反动统治。口头挂着“反帝”招牌的一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，把这样反动的、彻底的卖国主义影片吹捧为“爱国主义”影片，不正是暴露了他们假反帝，真投降的真面目吗？他们爱的是什么国？爱的是帝国主义的国，爱的是地主、资产阶级的国，而不是我们无产阶级专政的伟大祖国。他们所歌颂的“爱国主义”，正是全国革命人民所要打倒的卖国主义。"},{"type":"paragraph","text":"需要特别指出的是，党内最大的走资本主义道路的当权派，把一部反动的、彻底的卖国主义影片吹捧为“爱国主义”影片，这决不是偶然的。他早在抗日战争胜利以后，就在美帝国主义及其走狗的侵略面前吓倒了，他对中国革命的前途悲观绝望，在党内积极推行所谓“和平民主新阶段”的民族投降主义和阶级投降主义路线。毛主席号召我们丢掉幻想，同敌人进行针锋相对，寸土必争的斗争，他却大肆散布对美帝国主义及其走狗的和平幻想，公然在报上发表文章，感谢美帝国主义以中国的所谓“帮助”。向美帝国主义乞求“和平”，麻痹人民的斗志。他还欺骗人民，说什么“中国革命的主要斗争形式已变为和平的、议会的，斗争是合法的群众斗争和议会斗争”，“党的全部工作要实行转变”，“一切政治问题要和平解决”。毛主席说：敌人在磨刀，我们也要磨刀。他却要人民交出自己手里的武装。他大肆宣扬卖国主义理论，认贼作父，心甘情愿地要去当美帝国主义的奴才，说什么：美国非要在中国找买办不可，我们也可以给他当买办，红色买办么！”买办就是买办，就是帝国主义的走狗，什么“红色买办”！全是骗人的鬼话。在这种早就想当帝国主义买办的卑鄙无耻的奴才思想的支配下，反动的、彻底的卖国主义影片《清宫秘史》，成了最适合他们口味的影片。因为影片里所安排的帝国主义代理人珍妃所宣扬的帝国主义可以帮助中国“重振朝纲”的理论，恰恰反映了他们热衷于充当帝国主义买办的卖国心理！"},{"type":"paragraph","text":"“心有灵犀一点通”。影片里光绪皇帝望湖兴叹的一句诗，正好是一小撮反革命修正主义分子和党内最大的走资本主义道路的当权派同光绪、珍妃之流心心相印的写照。在充当帝国主义代理人的问题上，一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，同六十多年以前的地主、资产阶级发生了共鸣，这就是他们要把一部反动的、彻底的卖国主义影片吹捧为“爱国主义”影片的思想根源和阶级根源。"},{"type":"paragraph","text":"怎样对待义和团的革命群众运动？"},{"type":"paragraph","text":"毛主席说：“马克思主义的道理千条万绪，归根结底，就是一句话：‘造反有理。’”①对于义和团的革命群众大造帝国主义的反、大造封建主义的反的革命运动，究竟采取什么态度？是支持还是反对，是歌颂还是仇视？这是检验真革命和假革命、革命和反革命的一块试金石。"},{"type":"paragraph","text":"震撼祖国大地的义和团运动，是近代中国历史上的一次伟大的反帝、反封建的革命群众运动。这是一次表现了中国人民历史首创精神的伟大运动。当时，几乎整个中国的北方，无论是城市或者乡村，到外都有义和团在进行革命活动。在敌人统治最严密的政治中心北京城内，义和团就设坛八百余所，景山后面的宫墙下，每天都有参加义和团的青少年在操练。"},{"type":"paragraph","text":"义和团的英雄们，在祖国处于被帝国主义瓜分的严重时刻，挺身而出，高举反帝爱国斗争的革命大旗，同帝国主义强盗及其走狗进行了英勇斗争。他们一开始就在大街小巷，贴出各种标语，表达了中国人民的反帝决心："},{"type":"paragraph","text":"“还我江山还我权，刀山火海爷敢钻，哪怕皇上服了外，不杀洋人誓不完。”"},{"type":"paragraph","text":"义和团严厉禁止洋货，蔑视帝国主义分子。他们把驻有外国使馆的东交民巷改名为“切洋街”，御河桥改为“断洋桥”。义和团在游行时，经常同市民齐声高呼“杀洋鬼子”的口号，①毛泽东：《在延安各界庆祝斯大林六十寿辰大会上的讲话》。使帝国主义分子听了发抖。有的吓得躲进棺材，雇人吹打着，企图逃出城外。"},{"type":"paragraph","text":"一九OO年的六月，义和团的革命活动达到高潮，京郊各县的义和团三五十人一队，不分昼夜，一天数十起地涌进北京城内，守卫城门口的士兵，向他们致敬礼，为他们喝道让路。浩浩荡荡的革命群众，头裹红布，腰缠红带，鞋镶红边，手持大刀长矛，在大街上威风凛凛地游行。前门外打磨厂等处的铁铺里，炉火熊熊，日夜不停地为义和团赶制各种刀枪。"},{"type":"paragraph","text":"当帝国主义侵略军疯狂镇压义和团的时候，义和团的革命群众用大刀、长矛等原始武器同以洋枪、洋炮武装的侵略者进行英勇的搏斗，显示了中国人民大无畏的革命战斗精神。在著名的“廊房狙击战”中，英国海军大将西摩尔率领的一千五百多人的联军，被义和团“直逼火车，持矛猛触”，死伤将近一半，最后狼狈地逃回天津。后来西摩尔胆战心惊地说：“义和团所用设为西式枪炮，则所率联军必全体覆没。”在保卫天津的战斗中，义和团同侵略军进行肉搏战，在火车站一仗，就把一支二千人的俄国侵略军，打死打伤了五百多名。帝国主义者不得不承认：“此次天津华军与西兵苦战月余，西人咸谓如此死战，实为从来所未见”。在杨村的战斗中，美帝国主义的侵略军，被义和团战士打得落花流水。帝国主义侵略军一听到义和团的军号声，就惶恐万状，惊呼：“闻此声，可以使人血凝而不流。”"},{"type":"paragraph","text":"在义和团运动中，青少年是一支最生动、最活跃的力量，他们在这次伟大的革命运动中，建立了不朽的功勋。震骇中外的“红灯照”，就是当时北方许多地方女青年们的组织。她们很有纪律地自己组织起来，练习武艺，保卫祖国。她们着红衣，戴红帽，提红灯，拿红枪，前方作战，后方除奸，积极参加义和团的起义行列，坚决反对帝国主义及其走狗，表现了中国青年妇女反帝、反封建的革命英雄气概！"},{"type":"paragraph","text":"“红灯照，义和团，亲兄妹，闹的欢，一个心，杀洋官。”"},{"type":"paragraph","text":"这首歌谣生动地反映了“红灯照”反帝的坚强决心。“红灯照”英勇斗争的事迹，一直在人民群众中广泛地流传着。他们说，“红灯女儿，一入兵阵，视死如归，于枪林弹雨中，惟恐落后。”“中国自道咸以来，沿海防夷水陆各战，望风奔溃”，“得此番小儿女一振疲癃，不特寒众国之心，且壮中原之气。”"},{"type":"paragraph","text":"义和团的英勇斗争，是中国人民的光荣和骄傲，是五十年后中国人民伟大胜利的奠基石之一。它使侵略者亲身尝到了中国人民铁拳的滋味，粉碎了帝国主义“瓜分”中国的迷梦。帝国主义侵略军的头子瓦德西为此向德皇威廉报告说：“皇上诚然常有瓜分中国的思想”，可是，“不应忘去者，......彼等在实际上，尚含有无限蓬勃生气”。“中国所有好战精神，尚未完全丧失，可于此次‘拳民运动’中见之。”“无论欧美、日本各国，皆无此脑力与兵力，可以统治此天下生灵四分之一”，“故瓜分一事，实为下策”。"},{"type":"paragraph","text":"对于这样大规模的革命群众运动，真正的马克思主义者从来都是热情歌颂的。毛主席在他的伟大著作中，曾经一再高度评价和赞扬义和团运动的英雄业绩，他把义和团运动看作是中国资产阶级民主革命重要的发展阶段之一。毛主席指出：义和团战争是反抗压迫者的义战，它同一百年来中国人民历次的革命战争一样，“都表现了中国人民不甘屈服于帝国主义及其走狗的顽强的反抗精神”①，表现了“我们中华民族有同自己的敌人血战到底的气概，有在自力更生的基础上光复旧物的决心，有自立于世界民族之林的能力。”②中国人民，百年以来，不屈不挠、再接再厉的英勇斗争，使得帝国主义至今不能灭亡中国，也永远不能灭亡中国。”③"},{"type":"paragraph","text":"但是，被一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派所歌颂的反动的、彻底的卖国主义影片《清宫秘史》，对义和团反帝的革命群众运动却抱着刻骨的阶级仇恨，竭尽诽谤污蔑之能事。影片把义和团反对帝国主义的革命行动，①《毛泽东选集》第2卷，第626页。②《毛泽东选集》第1卷，人民出版社1952年第2版，第156页。③《毛泽东选集》第2卷，第626页。描写为一种野蛮的骚乱。并且尽量地丑化义和团，恶毒地攻击义和团是什么“杀人放火”、“状如疯魔”的“乌合之众”，是什么专搞“邪术妖法”的“无知愚民”。"},{"type":"paragraph","text":"影片及其歌颂者对义和团的这种恶毒污蔑同帝国主义完全是一个鼻孔出气。当时美帝国主义头目艾奇逊就在《白皮书》中咒骂义和团是“中国的排外骚动”，是“拳乱”。美帝国主义在中国的御用学者也大肆攻击义和团是“无知迷信与暴民歇斯底里的产物”，是“没有理性的行动”，是杀人放火的“拳匪”。"},{"type":"paragraph","text":"究竟是中国人民组织义和团跑到欧美、日本各帝国主义国家去造反，去“杀人放火”呢？还是各帝国主义国家跑到中国这块地方来侵略中国、压迫剥削中国人民，因而激起中国人民群众奋起反抗帝国主义及其在中国的走狗、贪官污吏？这是大是大非问题，不可以不辩论清楚。"},{"type":"paragraph","text":"真正的杀人放火的匪徒，不是别人，正是帝国主义者及其走狗。据帝国主义侵略军头子瓦德西自供：帝国主义侵略军侵占北京以后，烧杀抢劫，奸淫妇女，破坏文明，无恶不作。帝国主义军队在占领北京之后，“曾特许军队公开枪劫三日，其后更继以私人抢劫。”上自宫廷王府，下至民间百姓的财物均被洗劫一空。“曲槛临湖面面开，内官惊看骆驼来。”封建皇帝的宝库颐和园所贮藏的历朝文物，被侵略者用骆驼运至天津，累月不尽。中国几千年保留下来的许多文物，其中包括《永乐大典》，都被帝国主义烧抢殆尽。瓦德西还供称：“因抢劫时所发生之强奸妇女，残忍行为，随意杀人，无故放火等事，为数极属不少”。至于帝国主义的走狗对义和团的屠杀和镇压，更是惨无人道。"},{"type":"paragraph","text":"列宁曾经怀着满腔的愤怒，谴责了帝国主义侵略者杀人放火的罪行。他说：“欧洲各国政府（最先恐怕是俄国政府）已经开始瓜分中国了。......它们盗窃中国，就像盗窃死人的财物一样，一旦这个假死人试图反抗，它们就像野兽一样猛扑到他身上。它们杀人放火，把村庄烧光，把老百姓驱入黑龙江中活活淹死，枪杀和刺死手无寸铁的居民和他们的妻子儿女。就在这些基督教徒立功的时候，他们却大叫大嚷反对野蛮的中国人，说他们胆敢触犯文明的欧洲人。”①而影片及其歌颂者却颠倒黑白，为虎作伥，把杀人放火，奸淫掳掠的帝国主义侵略者美化为文明的使者，把坚决抗击帝国主义侵略、英勇不屈的义和团污蔑为“野蛮的骚乱”。这是地地道道的汉奸、卖国贼的哲学。"},{"type":"paragraph","text":"义和团的反帝爱国斗争是同反封建斗争紧密联系在一起的。义和团的战斗口号是：“杀洋人，灭赃官。”当时流传的歌谣说：“砍洋头，杀官兽、杀尽洋和官，百姓有盼头”。“先夺洋鬼头，后把贪官揍”。这些都是他们提出的朴素的反帝、反封建的革命口号。他们对封建统治阶级恨之入骨。一九OO年义和团控制北京期间，清朝的在京衙门、亲贵王公的住宅，大多数都被义和团成员把守监视。义和团时常抓住一些罪恶昭著的官吏，特别是对帝国主义奴颜婢膝的官吏，强迫他们到拳坛去叩头焚表，罪大恶极的官吏就被杀掉。"},{"type":"paragraph","text":"但是，影片却把义和团诽谤为封建统治者的工具。它借清朝大臣赵舒翘之口说：“请老佛爷旨，把义和团编为义军”。慈禧太后听了，欣然采纳。就这样把义和团污蔑为慈禧太后的一党，可谓恶毒之极。"},{"type":"paragraph","text":"在一个短时间内，清朝统治者对义和团采取了欺骗、软化的政策，这个政策一度发生了作用，义和团的一部分成员受了蒙蔽，对清朝统治者产生了一些错误的认识，有些组织提出过“扶清灭洋”的口号。这种情形，一方面反映了当时阶级矛盾的复杂性；另一方面，也反映了当时的人民大众对于帝国主义及其走狗的认识还处于感性阶段。"},{"type":"paragraph","text":"毛主席教导我们，人的认识是一步又一步地由低级向高级、由感性认识向理性认识发展的。“中国人民对于帝国主义的认识也是这样。第一阶段是表面的感性的认识阶段，表现在太平天国运动和义和团运动等笼统的排外主义的斗争上，第二阶段才进到理性认识阶段，看出了帝国主义内部和外部的各种矛盾，并看出了帝国主义联合中国买办阶级和封建阶级以压①《列宁全集》第4卷，人民出版社版，第335—336页。榨中国人民大众的实质，这种认识是从一九一九年五四运动前后才开始的。”①所以，绝不可以因为当时义和团对帝国主义和封建主义的本质认识不清楚，就把义和团污蔑为封建统治者的工具。如前所述，义和团在反帝的同时，“抗清”活动一刻也没有停止过。就在“扶清灭洋”的口号出现之后，义和团的首领朱红灯还制定“攻打北京”的计划，始终坚持了反封建的斗争。"},{"type":"paragraph","text":"反动影片《清宫秘史》大肆污蔑和攻击义和团的反帝、反封建斗争，完全是出于帝国主义和封建地主阶级的需要。他们对义和团革命群众的污蔑和攻击，反映了阶级敌人对中国革命主力军农民的刻骨仇恨，反映了阶级敌人对我们党领导的新民主主义革命运动的刻骨仇恨。一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，同帝国主义和封建主义唱着同一个调子，为一部反对中国革命，侮辱革命群众的反动的、彻底的卖国主义影片拍手叫好。他们这样做，不折不扣地充当了帝国主义、封建主义反革命宣传的应声虫、赤裸裸地暴露了他们的地主、资产阶级的反革命立场。"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派，这样仇恨历史上的革命群众运动，这使我们更加懂得了：在今天的无产阶级文化大革命运动中，他为什么要勾结党内另一个最大的走资本主义道路的当权派，抛出资产阶级反动路线，妄图扑灭毛主席亲自点燃起来的革命烈火；他为什么要颠倒是非，混淆黑白，围剿革命派，镇压群众，实行白色恐怖；他为什么要千方百计地长资产阶级的威风，灭无产阶级的志气。"},{"type":"paragraph","text":"怎样对待资产阶级的改良主义？"},{"type":"paragraph","text":"对待资产阶级改良主义抱什么态度，实际上是对社会主义道路和资本主义道路抱什么态度的问题。"},{"type":"paragraph","text":"以毛主席为首的无产阶级革命派和党内走资本主义道路的当权派，在这个关系中国革命前途的根本问题上，早已存在着原则的分歧。全国解放以后，这样原则分歧更加尖锐化。怎样对待反动影片《清宫秘史》，是这个分歧的一个爆发点，这是无产阶级和资产阶级两个阶级、社会主义和资本主义两条道路斗争在文化思想战线上的第一次短兵相接的交锋，在这次交锋中，以毛主席为首的无产阶级革命派同党内一小撮走资本主义道路的当权派，从一个电影的评价问题上，各自对中国向何处去的问题，作出了截然不同的回答。"},{"type":"paragraph","text":"一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，极力赞美这部反对革命、歌颂改良的反动影片，其目的是为了请出资产阶级改良主义的亡灵来给他们以帮助，企图借用它们的名字、口号和服装，在中国宣扬资本主义。"},{"type":"paragraph","text":"影片歌颂的戊戌变法运动是中国资产阶级的改良主义运动。这个运动是一部分封建统治阶级人物和从封建统治阶级中开始分化出来的一些资产阶级的改良主义者，在革命风暴和亡国大祸的威胁下，从地主、资产阶级的利益出发，企图通过自上而下的维新变法的改良主义办法，使中国走上资本主义的道路。"},{"type":"paragraph","text":"戊戌变法运动在当时的历史条件下，一定程度上冲击了封建统治阶级思想统治的网罗，在解放思想上起了一些启蒙的作用，这一点我们从来是承认的。但是，我们的这种承认，指的是用历史唯物主义的观点去批判地认识历史人物和历史事件。决不是无原则地对戊戌变法运动及其代表人物进行歌功颂德。戊戌变法的代表人物，他们本身就是剥削压迫劳动人民的统治者，他们改良主义的目的，从来不是也绝不可能是为了人民革命的利益，而是为了更好地剥削人民和巩固他们的统治。他们所要改变的只是旧事物的某些枝节方面，而不是旧事物的质。他们所幻想的只是以渐变的形式，使地主经济逶迤曲折地改变为半地主、半资本主义经济（实际上是半封建、半殖民地经济），并企图以此来阻挡人民革命运动，把革命消灭于无形之中。所以，改良主义即使在当时也绝不是中国人民的出路。①《毛泽东选集》第1卷，第278页。"},{"type":"paragraph","text":"十九世纪的末叶，中国的社会改革已经出现了两条道路：一条是资产阶级改良主义道路，即企图用自上而下的变法维新的办法通向资本主义。在中国当时的历史条件下，这只能是一条虚伪的、行不通的反动的道路。因为中国没有西欧和日本那样维新改良的历史条件。当时，在帝国主义的侵略下，中国正在逐步沦为半封建、半殖民地国家，而中国资产阶级改良主义的领导人康有为、梁启超，却恰好把维新变法的希望寄托在帝国主义身上，他们幻想投靠帝国主义，依赖帝国主义的力量，实现他们维新变法的主张。这样做的结果，只能是引狼入室，加速中国沦为半殖民地、半封建国家的过程，而根本谈不到发展中国的资本主义。另一条道路是广大群众起来，用武装斗争的办法进行革命。太平天国革命和义和团运动走的都是这条道路。由于没有无产阶级的领导，这样的革命不能取得最后的胜利，但是，却沉重地打击了帝国主义和封建主义、推动了中国历史的发展。"},{"type":"paragraph","text":"“我自横刀向天笑”。戊戌变法运动最悲壮的一幕是一个勇敢的启蒙思想家谭嗣同之死，他的死宣告了戊戌变法运动的夭折，宣告了资产阶级改良主义道路的破产。而在半个世纪以后，反动影片《清宫秘史》却还在鼓吹早已破产了的资产阶级改良主义。影片极力宣扬“如果要中国富强，必须要维新变法！”还通过光绪皇帝之口，大肆赞扬维新变法，把改良主义吹得天花乱坠，什么“明治维新”，什么“变法上谕”，什么“中国这样改革起来，不到三十年，就可成为世界上最最富强的国家啦！”等等。这是疯狂地为资产阶级共和国呼喊，为西文资产阶级文明呼喊，为资产阶级改良主义道路呼喊，革命人民是决不允许的！"},{"type":"paragraph","text":"影片把资产阶级改良主义的代表人物尤其光绪皇帝，捧到了九天之上。说他“为了国家，为了百姓”，“用尽了心机，受尽了闲气”，“只要国事有办法”“身体倒不在乎”。"},{"type":"paragraph","text":"特别恶毒的是，影片在大肆吹捧帝王将相和美化资产阶级改良主义的同时，又千方百计地丑化劳动人民，把群众污蔑为“群氓”。在电影末场，作者通过被歪曲、被丑化了的村民、村妇的形象，大肆美化光绪皇帝，称颂光绪皇帝是个“好皇帝”，“他是帮我们老百姓的”，“我们都惦着皇上呢！”村民、村妇把鸡蛋、饽饽“献给”光绪皇帝吃。临别时，“民众夹道跪送”。影片还污蔑说什么“老百姓是最听话的，也是最容易满足的”。难道人民群众就是这样恭顺服从、卑贱丑陋的群氓吗？绝对不许污蔑劳动人民！毛主席教导说：“人民，只有人民，才是创造世界历史的动力。”①一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，如此歌颂这部美化帝王将相，丑化劳动人民，宣扬资产阶级改良主义的反动影片，恰恰暴露了他们彻头彻尾反对马克思列宁主义、反对毛泽东思想的真面目。"},{"type":"paragraph","text":"特别令人气愤的是，当中国人民在毛主席的领导下，经过了长期的武装斗争获得革命胜利之后，当毛主席在中华人民共和国成立的前夕，亲自为近百年来的革命斗争作了总结，批判了资产阶级改良主义道路，宣告了“西方资产阶级的文明，资产阶级的民主主义，资产阶级共和国的方案，在中国人民的心目中，一齐破了产”之后，一小撮反革命修正主义分子和党内最大的走资本主义道路的当权派，竟然还把这部大肆歌颂资产阶级改良主义、鼓吹资本主义道路的反动的、彻底的卖国主义影片作为“爱国主义”影片，不加批判地在各地大量放映，是可忍，孰不可忍！"},{"type":"paragraph","text":"毛主席在《论人民民主专政》中指出：“自一八四O年鸦片战争失败那时起，先进的中国人，经过千辛万苦，向西方国家寻找真理。”那时，求进步的中国人认为，“要救国，只有维新，要维新，只有学外国。”“日本人向西方学习有成效，中国人也想向日本人学。”但是，“帝国主义的侵略打破了中国人学西方的迷梦。很奇怪，为什么先生老是侵略学生呢？中国人向西方学得很不少，但是行不通，理想总是不能实现。”“十月革命一声炮响，给我们送来了马克思列宁主义。”“中国人民在中国共产党领导之下，在驱逐日本帝国主义之后，进行了三年的人民解放战争，取得了基本的胜利。”“资产阶级的民主主义让位给工人阶级领导的人①《毛泽东选集》第3卷，人民出版社1953年第2版，第1031页。民民主主义，资产阶级共和国让位给人民共和国。这样就造成了一种可能性：经过人民共和国到达社会主义和共产主义，到达阶级的消灭和世界的大同。康有为写了《大同书》，他没有也不可能找到一条到达大同的路。资产阶级的共和国，外国有过的，中国不能有，因为中国是受帝国主义压迫的国家。唯一的路是经过工人阶级领导的人民共和国”。①"},{"type":"paragraph","text":"一小撮反革命修正主义分子和党内最大的走资本主义道路的当权派，无视历史事实，无视毛主席的警告，仍然借着反动的、彻底的卖国主义影片《清宫秘史》，美化西方资产阶级文明，美化资产阶级民主主义，美化资产阶级共和国，宣扬资产阶级改良主义和资本主义道路，这是明目张胆地反对毛泽东思想，妄图在中国实行资本主义的复辟。他们所以全力歌颂反动影片《清宫秘史》，就是因为这部反对革命、歌颂改良的影片是他们进行资本主义复辟鸣锣开道的工具。他们实际上是为了通过古人来赞美资本主义和资产阶级改良主义的道路，并利用这部影片来迷惑群众，来为资产阶级改良主义涂脂抹粉。他们的最终目的就是为了推翻人民的江山，破坏我们的无产阶级专政；使革命胜利的果实落在资产阶级的手里。"},{"type":"paragraph","text":"围绕反动影片《清宫秘史》而展开的这一场严重的斗争，绝不仅仅是一部电影的问题，而是资产阶级同无产阶级两个阶级的斗争，是马克思列宁主义、毛泽东思想同资产阶级改良主义、修正主义思想的斗争，是资本主义复辟同无产阶级反复辟的斗争，归根结底，是资本主义同社会主义谁战胜谁的斗争。"},{"type":"paragraph","text":"中国人民在伟大领袖毛主席的领导下，前赴后继，浴血苦战，终于取得了反帝、反封建斗争的胜利。全国解放了，但是解放了的中国究竟往哪里去？胜利的果实究竟归于谁？千千万万革命烈士用他们的生命和热血所浇灌、生长起来的桃子究竟由哪个阶级来摘？这样重大的问题，不仅在当时，就是在现在都是中国社会各个阶级斗争的焦点。"},{"type":"paragraph","text":"资产阶级要从人民的手中争夺胜利的果实，他们要摘桃子。他们要刚刚获得解放的中国走资本主义的道路。党内最大的走资本主义道路的当权派是代表资产阶级来摘桃子的人物。"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派，在解放以后仍旧日夜梦想着资本主义的复辟，死抱着资产阶级的世界观不放，无限向往资产阶级改良主义，极力想使中国革命半途而废，大力发展资本主义。"},{"type":"paragraph","text":"毛主席说，一九四九年十月一日中华人民共和国的成立，标志了新民主主义革命阶段的基本结束和社会主义革命阶段的开始。党内最大的走资本主义道路的当权派却大唱反调，极力宣扬“巩固新民主主义秩序”，为在中国发展资本主义而奔走呼号。"},{"type":"paragraph","text":"就在反动影片《清宫秘史》在全国放映的前后，他到处游说，大做黑报告，滥发黑指示，极力颂扬资本主义制度的所谓“进步”和“光荣”，鼓吹“剥削无罪”，“造反无理”的谬论。马克思说：“资本来到世间，就是从头到脚，每个毛孔都滴着血和肮脏的东西。”②他却胡说什么“中国不是资本主义太多了，而是资本主义太少了”。“要发展资本主义剥削，这种剥削是进步的。”“今天资本主义的剥削不但没有罪恶，而且有功劳”。大叫什么：“劳动人民不是反对剥削，而是欢迎剥削。”“今天资本主义的剥削不但没有罪恶，而且有功劳”。大叫什么：“劳动人民不是反对剥削，而是欢迎剥削。”“如果资本家多了，剥削多了，那么，我们就越感到舒服。”他还恬不知耻地向资本家说：“工人的痛苦就是失业，就是怕没有人剥削，所以有人剥削比没有人剥削好。”“工人要你剥削，不剥削人家就苦得很。”“资本家也是为人民服务，”“你们有本事多剥削，对国家对人民都有利，”“剥削得越多，功劳越大，就越光荣。”“资本家的剥削是有历史功绩的，这个功绩是永垂不朽的。”他大肆宣扬“剥削合法论”，说什么“赚多少钱都是合法的，多到什么程度，花花绿绿，胭脂水粉、大吃大喝都是合法的。”他甚至学着小丑的腔调向资本家说：“资本家先生！我请求你剥削一下吧！剥削我就有饭吃，老婆孩子就能活下下去，如果不剥削，就不得了。”①《毛泽东选集》第4卷，人民出版社1960年版，第1474—1476页。②马克思：《资本论》第1卷，人民出版社1963年第2版，第839页。"},{"type":"paragraph","text":"工人不接受他的这一套反动的臭理论，他更污蔑工人：“不懂政治，觉悟不高。”并以资本家的帮凶的口吻，恶狠狠地威胁工人说：“工人不听话，（资本家）要斗争（工人），这是合法的”。"},{"type":"paragraph","text":"与此同时，他还积极鼓吹发展农村的资本主义经济，大肆叫嚷“长期保护富农经济”，提倡“四大自由”（即放高利贷自由、雇工自由、土地买卖自由、经营自由）。主张大力发展“三马一犁一车式的农民”，发展富农经济。胡说什么“现在剥削是救人，不准剥削是教条主义，现在必须剥削，要欢迎剥削。关内难民到东北去，东北的富农剥削他，他就谢天谢地。”“雇人劳动，不叫剥削，它增加了社会财富。”还提出雇人耕种土地“没有限制”，“雇工种地是合法的，对群众也有好处。”声称“有剥削还可以做社会主义者。”“东北有一万富农党员也不怕。”企图使资本主义经济在农村中迅速泛滥开来。"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派为人吃人的资本主义剥削制度所唱的颂歌，就连资产阶级的御用学者、形形色色的新老修正主义辩护士们，也都望尘莫及。"},{"type":"paragraph","text":"什么藤结什么样瓜，什么阶级说什么话。党内最大的走资本主义道路的当权派，想的是资本主义，爱的是资本主义，讲的还是资本主义。他所贩卖的那一套人吃人的哲学，完全是为发展资本主义，维护血腥的剥削制度服务的。他的这种声音是吸血鬼和寄生虫们的声音，也是他自己那种肮脏的、丑恶的资产阶级灵魂的大暴露。"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派，自我辩解说他是“老革命遇到了新问题。”"},{"type":"paragraph","text":"什么“老革命遇到了新问题”！"},{"type":"paragraph","text":"难道竟有这样疯狂进行资本主义复辟活动的“老革命”？"},{"type":"paragraph","text":"难道竟有这样猖狂反对我们的伟大领袖毛主席，猖狂反对伟大的毛泽东思想的“老革命”？"},{"type":"paragraph","text":"如果真是“老革命”，那么，请问："},{"type":"paragraph","text":"为什么你要在抗日战争爆发前夕，大肆宣扬活命哲学、投降哲学、叛徒哲学，指使别人自首变节，要他们投降国民党，叛变共产党，公开发表“反共启事”、宣誓“坚决反共”？"},{"type":"paragraph","text":"为什么你要在抗日战争胜利以后，提出“和平民主新阶段”的投降主义路线？"},{"type":"paragraph","text":"为什么你要在解放以后极力反对资本主义工商业的社会主义改造？反对农业合作化，大砍合作社？"},{"type":"paragraph","text":"为什么你要在社会主义三大改造完成以后，竭力宣扬阶级斗争熄灭论，积极主张阶级合作，取消阶级斗争？"},{"type":"paragraph","text":"为什么你要在三年困难时期，与国内外牛鬼蛇神遥相呼应，恶毒攻击三面红旗，鼓吹“三自一包”、“三和一少”的修正主义路线？"},{"type":"paragraph","text":"为什么你要在一九六二年还重新出版过去那种不要革命，不要阶级斗争，不要夺取政权，不要无产阶级专政，反对马克思列宁主义，反对毛泽东思想，宣扬腐朽的资产阶级世界观，宣扬反动的资产阶级唯心主义哲学的、欺人之谈的大毒草《论修养》？"},{"type":"paragraph","text":"为什么你要在社会主义教育运动中提出和推行形“左”实右的机会主义路线，破坏社会主义教育运动？"},{"type":"paragraph","text":"为什么你要在无产阶级文化大革命中，勾结另一个党内最大的走资本主义道路的当权派，提出和推行资产阶级反动路线？"},{"type":"paragraph","text":"答案只有一个：你根本不是什么“老革命”！你是假革命、反革命，你就是睡在我们身边的赫鲁晓夫！"},{"type":"paragraph","text":"十七年来，一小撮反革命修正主义分子在党内最大的走资本主义道路的当权派的支持下，向无产阶级发动了一个全面性的猖狂进攻，在政治、经济、文化、教育各个领域里放了大量的毒。在这次无产阶级文化大革命中，我们一定要遵照毛主席的教导，组织起浩浩荡荡的无产阶级革命的文化大军，彻底粉碎这一小撮反革命修正主义分子和党内最大的走资本主义道路的当权派的猖狂进攻，挖出我国修正主义的总根子，打倒赫鲁晓夫那样的个人野心家和阴谋家，防止这样的坏人篡党、篡国，防止资本主义的复辟，保证我国永不变色！"},{"type":"paragraph","text":"“宜将剩勇追穷寇”。我们的伟大领袖毛主席亲自发动和领导的这场无产阶级文化大革命，就是要亿万人民动员起来，穷追一小撮反革命修正主义分子，穷追背后支持他们的党内最大的走资本主义道路的当权派，夺取一切被他们篡夺了去的堡垒，让毛泽东思想占据一切阵地。正像林彪同志所说的，这次无产阶级文化大革命是一次“大战役，是对资产阶级和一切剥削阶级思想的总攻击”。我们一定要响应毛主席的伟大号召，高举革命的批判旗帜，勇敢地投入战斗，彻底批判和肃清以党内最大的走资本主义道路的当权派为代表的资产阶级反动路线在各个方面的流毒；大破剥削阶级的旧思想，大立毛泽东思想。"},{"type":"paragraph","text":"斗争的道路是曲折的，发展是不平衡的，在前进的道路上是有阻力的，我们一定要克服种种困难，冲破一切阻力，把无产阶级文化大革命进行到底，绝不能半途而废。"},{"type":"paragraph","text":"把伟大的、战无不胜的毛泽东思想的红旗插遍全中国，让她永远永远地放射出灿烂的光芒！"},{"type":"paragraph","text":"我们敬爱的领袖毛主席亲自领导的无产阶级文化大革命运动胜利万岁！"},{"type":"paragraph","text":"文中“究竟是中国人民组织义和团到欧美、日本各帝国主义国家去造反，去‘杀人放火’呢？还是各帝国主义国家跑到中国这块地方来侵略中国、压迫剥削中国人民，因而激起中国人民群众奋起反抗帝国主义及其在中国的走狗、贪官污吏？这是大是大非问题，不可不辩论清楚。”是毛泽东所加写的。据王力交待，毛泽东亲自改了三遍，发表前，周恩来也不知道。"},{"type":"paragraph","text":"江青：《在京剧团的讲话》（摘录）"},{"type":"paragraph","text":"胡乔木是个托派。难怪我怎么也不理解。就是这《清宫秘史》，他坚决抵制主席。他说是爱国主义，因为这是刘少奇的话。我完全记得清清楚楚，是在一个桌子上，他也在那个桌子上，刘少奇也在那个桌子上。说是爱国主义，我说是卖国主义。我说主席也看了这个戏，主席说过：这是个卖国主义的戏。我那个水平只那么一点，我觉得他们为什么把义和团诬蔑成那个样子。光绪、珍妃都是想对外国人投降的。就是说中国人对外国人投降是合法的。国民党的投降主义是正确的。刘少奇的投降主义是正确的。所以他死咬了一口，我永远忘不了。那个坏蛋亲自坐镇。陆定一最后说：这是爱国主义，是艾青。我说什么爱国主义，是卖国主义！我气坏了。因为他特意站起来，回过头来，针对着我讲话：啊！江青，等等，你敢说是卖国主义！我说，就是。陆定一作为一个部长，中央委员，一个屁也不答。"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"影片《清宫秘史》：1944年姚克作，1948年由永华影业公司摄制。同年11月在香港首映，49年1月初始在上海放映。"},{"type":"paragraph","text":"毛泽东对《清宫秘史》，据传在1950年三月该片放映时便指出：“《清宫秘史》一部卖国主义的影片，应该进行批判。”1954年，他在关于《红楼梦》讨论，给政治局的信中说：“被人称为爱国主义影片而实际是卖国主义影片的《清宫秘史》，在全国放映之后，至今没有受批判。”1965年12月杭州讲话中，又提到“《清宫秘史》有人说是爱国主义，我看是卖国主义，彻底的卖国主义。为什么有人说他是爱国主义？无非以为光绪皇帝是个可怜人，和康有为一起开学校，立新军，搞了一些开明措施。”但刘少奇对于这一指责，一直否认。早在3月30日，刘少奇就“给毛主席一封信，说明了自己对《清宫秘史》的看法与经过”。在戚文发表后的4月7日，刘少奇在关于“八大罪状”的答辩中又予以否认。据刘平平等的回忆，刘少奇在4月1日见到戚文“气愤已极，他把报纸狠狠一摔，对我们说：‘这篇文章有许多假话，我什么时候说过那个电影是爱国主义的’？什么时候说过当‘红色买办’？不符合事实！是栽脏！党内斗争从来没有这么不严肃过！”（《历史在这里沉思》第1册第16页）然在1967年4月14日邮电学院批判胡乔木的会上，胡曾承认：刘少奇对他说过：光绪是爱国的，这部影片（《清宫秘史》）是爱国主义的。”当时造反派还就此对近代史所所长范文澜、研究人员荣孟源进行了调查。兹将有关材料附录于次，以存这椿公案。"},{"type":"paragraph","text":"胡乔木关于《清宫秘史》问题的检查(1967.1.21)"},{"type":"paragraph","text":"我在管理《人民日报》工作期间，曾多次抗拒毛主席的指示。1950年，毛主席指出：美化八国联军、光绪皇帝而污蔑义和团运动的卖国主义影片《清宫秘史》应当批判。这本来应当成为解放以来无产阶级思想和资产阶级思想第一场你死我活的斗争。但是我在事先接受了资产阶级反动路线的头号代表人物刘少奇说它（《清宫秘史》）是爱国主义影片的反动观点，不让批判这部电影。"},{"type":"paragraph","text":"人民大学红卫兵及北京邮电学院“东方红”部分成员调审胡乔木的摘录(1967.4.4)"},{"type":"paragraph","text":"问：关于《清宫秘史》问题，你一月二十一日的检查与戚本禹同志讲的事实不符，为什么？当时对《清宫秘史》搞的那篇假批判、真包庇的小文章是谁让反动文人荣孟源写的？"},{"type":"paragraph","text":"答：具体过程忘记了，后来我才知道我说的不对。荣孟源给范文澜写信时也没有说清楚。范文澜说是荣孟源写的。据说荣参加了那次旧中宣部召开的会议，但是究竟是谁让他写的，他也记不清。戚本禹的文章是经过中央审查的，当然可靠，我说的是不正确的。"},{"type":"paragraph","text":"问：你一月二十一日的检查与戚本禹同志讲的出入在哪里？"},{"type":"paragraph","text":"答：我的检查除不深刻外，事实也有出入。主要是关于组织文章批判的问题与事实不符。戚本禹同志说是当时旧中宣部几个人为了达到假批判、真包庇的目的而组织的，我却说是江青同志组织的。对批判文章的看法，我也说的不对，我以为是真批判。看了戚本禹同志的文章后，才知道是假批判。"},{"type":"paragraph","text":"问：你们把旧中宣部干的事推给江青同志，居心何在？你这不是嫁祸于人吗？"},{"type":"paragraph","text":"答：不，不，是我当时记不大清楚了。（随后就是长时间的沉默）"},{"type":"paragraph","text":"问：刘少奇对你讲过什么话？你为什么要宣传刘少奇的谬论？为什么要抗拒毛主席的批示？"},{"type":"paragraph","text":"答：那是我先听了刘少奇的话，毛主席的话后来从江青同志那里知道的。过程是这样的：刘少奇对我说过《清宫秘史》是爱国主义的影片。有一次在旧中宣部召开的一次会议上，陆定一和江青同志都到了。陆定一、周扬吹捧刘少奇的观点，而江青同志提出要批判《清宫秘史》。我说：少奇说的，这是个爱国主义的影片，不能批判。会后江青同志对我说，你说的是错误的，主席认为是卖国主义的。"},{"type":"paragraph","text":"问：江青同志跟你讲了，你怎么对待主席的指示？"},{"type":"paragraph","text":"答：我听了江青同志的话之后，我自己没有去组织别人批判，自己也没有去批判。相反别人有批判的文章我都压下来没有发表。我抗拒了毛主席的指示。"},{"type":"paragraph","text":"问：《清宫秘史》十几年一直不能批判，你有没有责任？你为什么反对毛主席？"},{"type":"paragraph","text":"答：我有责任，我坚持了资产阶级反动立场。但是我主观上没有反对毛主席。"},{"type":"paragraph","text":"人民大学红卫兵与北京邮电学院东方红战士与范文澜谈话记录（1967.4.9）"},{"type":"paragraph","text":"问：50年，你让荣孟源写了一篇假批判、真包庇的文章，那么是谁让你找荣孟源的？你谈谈事情的经过。"},{"type":"paragraph","text":"答：是胡乔木让我从我们所（近代史所）里找一个人写批判文章，我找了荣孟源。他看过一次电影，连《清宫秘史》的电影剧本也没有看，就简单地写了一篇一千多字的小文章。写好之后，给了我，我又寄给乔木。胡乔木批了进一步修改发表，然后退给荣。荣作了一些文字上的修改，又把胡乔木的批语“发表”两个字剪下来，贴在文章上边，就寄给《人民日报》了。后来不知为什么《人民日报》没有刊登。"},{"type":"paragraph","text":"历史研究所所长范文澜（签字）67.4.9中午"},{"type":"paragraph","text":"荣孟源交待"},{"type":"paragraph","text":"大约是1950年或51年，一天晚上，所长范文澜同志叫我去看电影，说是审查片子。我就去了，地点好象是电影局。看了两个片子，一个是关于彝族的；一个是《清宫秘史》。看过以后，当场就座谈，主持会的人好象是沈雁冰（记不准）。对于彝族的片子，一致否定，我未发言。对于《清宫秘史》，大家还同意。......现在只记得一句话：“这个片子演出来，北京的旗人不会反对。”“座谈时间不太长，大家发言也都很简单。过了几天，范文澜同志叫我把意见写出来，我就写了。现在找不到底稿。......经范文澜同志看过以后，就发出去了。是我发的还是范文澜同志发的？发给谁？想不起来了。此稿发出去之后，很长的时期没有消息。大约是几个月以后，把稿退给我修改。上有胡乔木的批语，大意是说，此稿太激烈了，修改后可以刊出......。我就把原稿修改，删去了甲午战争与戊戌变法部分，只留下义和团部分。补充了一点材料，修改了一些文字，全文不过两千来字。我把胡乔木的批语贴在修改稿上寄出去。记得是寄给《人民日报》。从此以后，就没有消息。"},{"type":"paragraph","text":"从去年夏天范文澜同志问起此事以后，只能记起这些情况。"},{"type":"paragraph","text":"荣孟源（签字）1967.4.9"},{"type":"paragraph","text":"这些材料说明，刘少奇对《清宫秘史》，评论有“爱国主义”之说，或许有之。然刘日理万机，专心党务，于一个普通电影，漫尔评之，鲜芥小事，忘之久矣，亦情理之常。即就有此评论而言，也大不了是一个看法有错，当时毛泽东对于自己的忠实同志和战友，自可坦诚交换意见，帮助改正，何至于耿耿于怀，待十七年之后，犹大张挞伐？共产党人之间的同志关系之虚伪险恶，何一至于此？用这样一个电影的评论，而推演为八大问题相质责，罗织之深，实所罕见，谁不寒心！"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":298,"page_end":311,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"范文澜","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"周扬","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bc5d0e384"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
