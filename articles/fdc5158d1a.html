script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中共上海市委召开党员干部大会  批判右倾思想猛烈围剿大贪污犯  有重大贪污罪行和作战不力的负责干部分别受到处分","authors":[],"dates":[{"year":1952,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共上海市委召开党员干部大会"},{"type":"paragraph","text":"批判右倾思想猛烈围剿大贪污犯"},{"type":"paragraph","text":"有重大贪污罪行和作战不力的负责干部分别受到处分"},{"type":"paragraph","text":"【新华社上海二十三日电】上海市一级机关的围剿大贪污分子运动第一阶段已经结束。整个说来，这一战役虽已获得成绩，但进展迟缓，战果不大。主要原因是一部分队伍尤其是指挥人员，存在着严重的右倾思想。为了扭转这种迟缓落后的局面，中共上海市委员会在二十日晚召开了二千多人的党员干部大会。会上，陈毅和谭震林都作了重要指示。陈毅在讲话中首先指出：上海市的反贪污、反浪费、反官僚主义运动虽已获得初步成绩，但是远远落后于全国各地，和应有的成绩比较起来显得大大地不够。他要求全体党员干部迅速以坚决的积极的行动，努力改变运动中的迟缓落后状态。他严正地批评在某些党员干部中所存在的错误思想。这些人对贪污分子盗窃国家财产的罪恶缺乏应有的强烈憎恨。他们居然麻木不仁地对贪污分子加以原谅宽恕，甚至因为对于“老部下”“老干部”的“偏爱”而认为自己单位中没有什么问题。这许多右倾错误思想在客观上就掩护了“老虎”，因此妨碍了伟大的反贪污、反浪费、反官僚主义和反行贿、反偷税漏税、反盗骗国家资财、反偷工减料、反盗窃国家经济情报的斗争。另外一些人因为本身就是“老虎”，他们梦想蒙混过关。陈毅警告这些人说：这些人是混不过关的，党和人民是决不允许他们混过去的。陈毅郑重地宣布：“老虎”不打干净，决不收兵。不论任何干部，如果妨碍或阻碍运动的开展，都一定要从现有的岗位上撤换下来，免得碍手碍脚，妨碍广大群众的前进。他强调指出：目前必须坚决打倒“思想老虎”，下定决心，好好学习并掌握住“打虎”的战略战术，才能使运动迅速开展起来。最后，陈毅代表中共上海市委员会和上海市人民政府，宣布对于犯有重大贪污罪行、自己手面不干净和打虎作战不力的十五个负责干部，分别给以拘捕查办、撤职查办、撤职、停职反省的处分。"},{"type":"paragraph","text":"谭震林在讲话中分析了上海市反贪污、反浪费、反官僚主义运动对于全国的重要性，并对掌握材料、组织火力、宣传政策的“三宝齐放”战术，和反行贿、反偷税漏税、反盗骗国家资财、反偷工减料、反盗窃国家经济情报运动的意义和政策等问题，作了详尽的说明。"},{"type":"paragraph","text":"这次党员干部大会开过后，全市十一路打虎大军立即召开紧急会议，严肃地批判了右倾思想，拟订新的作战计划，发动群众，组织力量，对贪污分子展开了围剿战。至此，战局大变。各路大军捷报频传。财经大队所属上海市零售公司指挥部、上海市合作社联合社都取得了很大胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdc5158d1a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
