art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"心向毛泽东","authors":[],"parts":[{"type":"paragraph","text":"我们的伟大领袖毛泽东同志天才地创造性地全面地发展了马克思列宁主义。毛泽东思想是当代马克思列宁主义的顶峰，是最高最活的马克思列宁主义。毛泽东思想不仅是中国革命和建设的指针，而且是世界无产阶级和一切被压迫人民反对帝国主义、现代修正主义和一切反动派的强大思想武器，是解放全人类的伟大旗帜。有了毛泽东思想，世界革命就一定能够成功。"},{"type":"paragraph","text":"在亚非拉辽阔的土地上，毛泽东思想正在越来越广泛地传播，越来越深入人心。世界革命人民的心，都向着北京，向着毛泽东。他们把毛主席看作是“当代的列宁”，“当代最伟大的革命领袖”。他们把毛泽东思想看作是战斗的号角，不落的太阳。他们把毛主席著作当作是“革命的武器”，“指路的明灯”。他们如饥似渴地学习毛主席著作，甚至在病床上，在敌人的监狱中也坚持不断。世界革命人民对毛泽东思想无限信仰，无限崇拜，这就是信仰真理，崇拜革命。"},{"type":"paragraph","text":"革命人民热爱毛主席，热爱毛泽东思想。帝国主义、现代修正主义和国内外一切反动派却怕得要命，恨得要死。它们恶毒地攻击毛泽东思想，诋毁毛泽东思想。但是，这正表明它们的虚弱和垂死挣扎，正是它们害怕毛泽东思想广泛传播的一种绝望哀鸣。"},{"type":"paragraph","text":"“小小寰球，有几个苍蝇碰壁。嗡嗡叫，几声凄厉，几声抽泣。”帝国主义、现代修正主义和国内外一切牛鬼蛇神，对毛泽东思想的无耻诬蔑，都无损于毛泽东思想的伟大光辉。毛泽东思想不仅照耀全中国，而且照耀全世界。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60caeb22fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
