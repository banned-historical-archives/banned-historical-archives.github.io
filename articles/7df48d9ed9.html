rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"马列托亚殿下举行盛大宴会华国锋总理、乌兰夫副委员长等应邀出席宴会 马列托亚殿下和华国锋总理先后在宴会上讲话","authors":[],"parts":[{"type":"paragraph","text":"新华社一无七六年九月八日讯 西萨摩亚国家元首马列托亚·塔努马菲利第二殿下今天晚上在人民大会堂举行盛大宴会。"},{"type":"paragraph","text":"国务院总理华国锋，人大常委会副委员长乌兰夫，外交部长乔冠华，外贸部长李强，外经部长方毅，应邀出席了宴会。"},{"type":"paragraph","text":"悬挂着中国和西萨摩亚两国国旗的宴会厅里，充满着两国人民团结友好的热烈气氛。"},{"type":"paragraph","text":"马列托亚殿下和华国锋总理先后在宴会上讲话（全文见第二版）。他们在讲话中盛赞中、西两国人民的友谊。马列托亚殿下说，我们两国之间的友谊确实在增长。我期待着我们两国人民之间今后的交往会不断增多。华国锋总理说，我们两国人民之间的友好情谊，有如太平洋一样，深厚而又广阔。他们讲话以后，乐队分别奏中国国歌和西萨摩亚国歌。"},{"type":"paragraph","text":"应邀出席宴会的还有政府有关部门和北京市革命委员会的负责人王海容、陈慕华、郝中士、陈希愈、张维民、彭迪、刘治平、张振东、阎志祥、刘锡昌等。"},{"type":"paragraph","text":"各国驻中国使节，也应邀出席了宴会。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7df48d9ed9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
