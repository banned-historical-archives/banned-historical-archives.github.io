ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"挽蔡和森、蔡畅母葛太夫人联","alias":"","parts":[{"type":"paragraph","text":"挽蔡和森、蔡畅母葛太夫人联"},{"type":"paragraph","text":"（1943年）老妇人，新妇道；"},{"type":"paragraph","text":"儿英烈，女英雄。"},{"type":"paragraph","text":"[1]葛健豪太夫人是蔡和森、蔡畅的母亲，向警予的婆婆。蔡和森（1895一1931），湖南湘乡永丰（今属双峰县）人。早年在湖南省立第一师范学校与毛泽东同学，并一起发起组织新民学会。1919年赴法国勤工俭学，1921年回国。曾任中共中央宣传部部长、中央政治局委员。1931年在广州牺牲。蔡畅（1900一1990），湖南湘乡永丰（今属双峰县）人。蔡和森之妹，新民学会会员，1919年赴法国勤工俭学，1922年加入中国社会主义青年团，1923年转入中国共产党。1924年转赴莫斯科东方大学学习，1925年回国。曾任中共中央妇女运动委员会书记、全国妇联主席、全国人大常委会副委员长等职。1990年9月在北京逝世。"}],"authors":["毛泽东"],"dates":[{"year":1943}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":285,"page_end":285},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc852ee272"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
