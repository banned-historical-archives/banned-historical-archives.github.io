":[],"dates":[{"year":1977,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年三月十二日电　中华人民共和国国务院总理华国锋三月十日打电报给莫桑比克人民共和国总统萨莫拉，对莫桑比克南部地区最近遭受水灾表示深切的同情和慰问。电报全文如下:"},{"type":"paragraph","text":"马普托"},{"type":"paragraph","text":"莫桑比克人民共和国总统萨莫拉·莫伊塞斯·马谢尔阁下:"},{"type":"paragraph","text":"惊悉贵国南部连日暴雨，河水泛滥成灾，致使人民生命财产遭受巨大损失。我代表中国政府和人民向阁下并通过阁下向灾区人民表示深切的同情和慰问。我们深信，英勇的莫桑比克人民在阁下的领导下，一定能够战胜水灾造成的暂时困难，继续胜利前进。"},{"type":"paragraph","text":"中华人民共和国国务院总理　华国锋"},{"type":"paragraph","text":"一九七七年三月十日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28ebc0d340"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
