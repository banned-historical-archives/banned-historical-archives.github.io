rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"古巴停止向关塔那摩美军基地供水美国官方和资产阶级政客发出一片反古巴叫嚣","authors":[],"parts":[{"type":"paragraph","text":"新华社哈瓦那六日电 古巴革命政府今天通过瑞士驻古巴大使递交美国一项正式照会，宣布从今天中午十二点开始停止向关塔那摩美国海军基地供水。"},{"type":"paragraph","text":"照会说，“鉴于美国政府拘禁它在国际公海内以海盗行为劫持的古巴渔船船员的无耻、非法行为，古巴革命政府已经决定从今天中午十二点开始停止向关塔那摩海军基地洪水，这次停止供水将一直实施到被劫走的古巴渔民获得释放时为止。”"},{"type":"paragraph","text":"照会继续说，“没有任何协议和国际条约规定古巴革命政府有义务必须向关塔那摩海军基地供水。到目前为止，它之所以还一直向上述基地供水，那是为了不致增加两国之间的紧张关系。为了行使自己的自由的主权意志，古巴政府将在指定的时间停止供水，作为对国际上又一起海盗行为——帝国主义者这一新的无耻勾当的庄严回答”。"},{"type":"paragraph","text":"据新华社七日讯 华盛顿消息：古巴政府为庄严回答美国在公海上强劫四艘古巴渔船的海盗行为，停止向美国军事基地关塔那摩供应淡水后，美国官方和资产阶级政客发出了一片反古巴的叫嚣。"},{"type":"paragraph","text":"美国国务卿腊斯克同国防部长麦克纳马拉和参谋长联席会议主席泰勒昨天举行了两小时的会议，商讨对策。正在纽约的美国总统约翰逊昨天通过长途电话同腊斯克、麦克纳马拉和总统国家安全事务顾问邦迪以及泛美事务助理国务卿托马斯·曼进行了会商。"},{"type":"paragraph","text":"纽约州共和党参议员基廷提出了三项反古巴的措施：掌握和保护淡水供应线；对古巴进行封锁，在淡水供应恢复并得到保证以前不让所有船只出入古巴；策动古巴反革命分子加强活动。"},{"type":"paragraph","text":"佛罗里达州民主党参议员斯马瑟斯也叫嚷要考虑对古巴实行海军封锁，禁止把粮食和其他物资运入古巴。"},{"type":"paragraph","text":"共和党参议员、总统候选人提名竞争者戈德华特叫嚷“要派一支海军陆战队打出去由我们自己来开开关”。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b522f035cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
