tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“干革命要吃苦，要坚决”“红一连”官兵牢记毛主席教诲工作年年上新台阶","authors":["李树洲于绍云"],"parts":[{"type":"paragraph","text":"本报讯 李树洲、于绍云报道：“东方红，太阳升，中国出了个毛泽东……”10月23日，满天星光的重阳节之夜，南京军区某工兵团“红一连”官兵在深情地唱歌颂毛主席的歌曲，讲毛主席的故事，回忆当年毛主席在连队留下的身影和亲切话语。"},{"type":"paragraph","text":"“红一连”是1930年以148名安源煤矿工人为骨干组成的我军第一个工兵连队。毛泽东同志在建连大会上谆谆教导大家：“干革命要吃苦，要坚决！”从此，他们跟着毛主席，为打败日本帝国主义、推翻蒋介石反动统治、解放全中国，立下了不朽功勋。建国后，“红一连”官兵进一步发扬“要吃苦、要坚决”的光荣传统，参加南京长江大桥、郑州黄河大桥等全国重点工程建设，又立下汗马功劳，中央军委授予他们“历经百战，屡建功勋”锦旗一面。"},{"type":"paragraph","text":"在发展社会主义市场经济的今天，“红一连”官兵仍然不忘毛主席的教导，献身国防、为国家经济建设创造和平环境的志向更坚定。战士全其斌，从小就读过“红一连”的故事。参军后，他不仅重视军事技术训练，还非常喜欢军事专业理论的学习，2年来先后在团以上比武中15次夺第一。问他的动力是什么，他说：“我是红一连的人，就应为红一连争光。”"},{"type":"paragraph","text":"“红一连”官兵在军事训练、施工爆破、抢险救灾中特别能吃苦，离不开有力的后勤保障。为了改善官兵生活，保证官兵身体健康，连队大力发展农副业生产。他们还建起一个小型游泳池和综合俱乐部，丰富了官兵业余文化生活。"},{"type":"paragraph","text":"“红一连”官兵在毛主席教导指引下，始终保持了高昂的斗志，使连队建设取得长足进步，先后荣立集体一等功5次、二等功6次、三等功8次；连续5年被评为基层建设达标先进连，连续6年被评为军事训练先进单位，连党支部受到总政治部表彰。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"255f53b727"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
