ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"贺龙师主力须逐渐南下以代林彪师陈光旅","alias":"","parts":[{"type":"paragraph","text":"贺龙师主力须逐渐南下以代林彪师陈光旅"},{"type":"paragraph","text":"（1938年3月21日）朱、彭："},{"type":"paragraph","text":"甲、贺师?主力须准备逐渐南下，代替林师陈旅”，以便陈旅于将来能转入新的方向，目前宜即令贺师抽一个团开至汾阳、孝义以西地区，配合陈旅作战。乙、敌占郑州后，河南、武汉形势当紧速起变化，刘师“去信阳以东，林师去豫西配合作战，保卫武汉，当能得蒋\"之同意。因此，此时徐旅?及刘师主力集结晋城长治地区作战是适当的，徐旅出河北计划应作罢论。丙、陈旅此时似无东移可能，宜确定在现地作战。诸请考虑。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"二十一日[1]这是毛泽东给朱德、彭德怀的电报。[2]贺师，指八路军第一二○师，师长贺龙。[3]林师陈旅，指八路军第一一五师第三四三旅，师长林彪，旅长陈光。[4]刘师，指八路军第一二九师，师长刘伯承。[5]蒋，指蒋介石。[6]徐旅，指八路军第一一五师第三四四旅，旅长徐海东。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":110,"page_end":110},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ba51e9206"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
