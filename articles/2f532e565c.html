将依法惩处","authors":["黄文福"],"dates":[{"year":1984,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"清理“三种人”　绝不留隐患"},{"type":"paragraph","text":"广西逮捕“文革”中杀人犯胥明德"},{"type":"paragraph","text":"开除其党籍和公职，并将依法惩处"},{"type":"paragraph","text":"本报重庆9月8日电  记者黄文福报道：在“文革”中策划、指挥屠杀大批干部、群众的犯罪分子胥明德，前些年竟先后担任重庆市綦江县搬运站党支部副书记、市二商技校綦江分校副校长，直到广西政法机关将其逮捕，罪行才得以暴露。现在，胥明德已被开除党籍和公职，由广西政法机关惩处。这一案件近日在重庆公开披露后，引起许多单位党组织对彻底清除“三种人”的重视。"},{"type":"paragraph","text":"胥明德“文革”初期在广西临桂县委工作，后来当了造反组织头头，并以“群众代表”身份任县革委会委员。1968年6月到9月，他在临桂县亲自策划、指挥杀害了大批党政干部和无辜群众，其中有县委副书记、副县长等十九名县、区干部。胥明德还亲手杀人，手段极为残忍。这个罪大恶极的犯罪分子，为了逃避人民审判，于1971年9月，以照顾父母为由调回原籍綦江县，其档案中看不出一点劣迹。胥明德善于投机钻营，伪装积极，调回綦江仅三个多月就担任搬运站党支部副书记。后又调县委工交部，1980年10月任重庆二商技校綦江分校副校长。他被捕时，县委机关的干部感到震惊，因为从他平日“表现”看不出有如此严重罪行。"},{"type":"paragraph","text":"中共重庆市委负责同志就这一案件对记者说：有些“三种人”隐藏很深，有的改头换面，还受到重用。重庆是“文革”中的重灾区，更要抓紧清除“三种人”的工作，绝不能留隐患。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"重庆文革","type":"人物"},{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f532e565c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
