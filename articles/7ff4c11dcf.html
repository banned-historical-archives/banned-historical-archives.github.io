script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批邓、反击右倾翻案风的伟大斗争促进电影事业发展  四十七部新影片在国庆期间上映","authors":[],"dates":[{"year":1976,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批邓、反击右倾翻案风的伟大斗争促进电影事业发展"},{"type":"paragraph","text":"四十七部新影片在国庆期间上映"},{"type":"paragraph","text":"新华社一九七六年九月三十日讯　批邓、反击右倾翻案风的伟大斗争，有力地促进了我国电影事业的发展。又一批故事片、戏曲片、美术片、纪录片、科教片最近摄制完成，在国庆期间和广大观众见面。"},{"type":"paragraph","text":"这次上映的新影片共四十七部。其中彩色故事片有十部：《山花》、《芒果之歌》、《新风歌》、《锁龙湖》（上集）、《南海长城》、《青春似火》、《山村新人》、《江水滔滔》、《寄托》、《山里红梅》。这批故事片有的以农业学大寨为题材，有的表现工人阶级的斗争生活，有的歌颂了英雄的人民解放军和民兵，有的反映了知识青年在农村三大革命运动中的火热斗争。它们的共同特点是着力表现了贯穿于整个社会主义革命时期的阶级斗争和路线斗争，满腔热情地歌颂了无产阶级文化大革命和社会主义新生事物，颂扬了毛主席革命路线的无比英明正确。特别是影片紧密配合了现实斗争，努力表现无产阶级同党内走资派作斗争这一重要主题，塑造了一批敢于同走资派作斗争的工农兵、革命干部和革命知识分子的典型人物，为当前深入批邓、反击右倾翻案风提供了形象的教材。这是电影工作者认真贯彻执行毛主席革命路线，深入开展文艺革命的新成果。"},{"type":"paragraph","text":"这次上映的戏曲新片有革命现代京剧《红云岗》，黄梅戏彩色戏曲片《红霞万朵》。还有为孩子们拍摄的彩色美术片《长在屋里的竹笋》、《树苗》。"},{"type":"paragraph","text":"新上映的十三部彩色纪录片，以饱满的政治热情，歌颂无产阶级文化大革命，歌颂茁壮成长的社会主义新生事物，其中《洪流滚滚》、《宣战》、《火红的战旗》、《一代新人》等，纪录了清华大学红卫兵、朝阳农学院工农兵学员和解放军指战员在毛主席革命路线指引下朝气蓬勃的战斗生活。"},{"type":"paragraph","text":"同广大观众见面的还有《文冠果》、《都江堰》、《打蛋自动化》、《宰鸡流水线》、《伏虎茧蜂防治地老虎》等二十部新拍摄的彩色科教片。这些新片分别介绍了文化大革命以来我国工农业等各条战线取得的科研新成果。"},{"type":"paragraph","text":"故事片、纪录片、科教片的丰收，标志着无产阶级文艺革命的进一步深入，反映了电影战线的大好形势。各个摄制组在批邓、反击右倾翻案风的斗争中，坚持以阶级斗争为纲，大破导演中心制，加强党的领导，发挥群众智慧，努力提高影片质量。在极其沉痛地悼念伟大领袖毛主席的日子里，广大电影工作者响应党中央的号召，化悲痛为力量，夜以继日，争分夺秒地加速影片的后期制作和赶印拷贝，保证了这批新影片在国庆期间按时上映。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ff4c11dcf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
