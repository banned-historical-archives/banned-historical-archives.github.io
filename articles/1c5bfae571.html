额剥削","authors":[],"dates":[{"year":1951,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿一日电】　罗马消息:备尝备战经济所带来的苦难的意大利人民，继续为争取他们的切身利益而斗争。"},{"type":"paragraph","text":"全意大利近三千个中学的六万二千个教职员，已在十八日上午开始总罢教，抗议教育部长、基督教民主党人戈尼拉拒绝他们所提增加薪水及其他各项要求。这次总罢教影响到全意七十二万二千个学生，是意大利长期以来连续不断的罢教浪潮继续发展的结果。它是由独立的工会组织，全国中学教师联合会所领导的。意大利总工会已发出号召，要求一切的工会会员给罢教的教职员们各种援助。"},{"type":"paragraph","text":"那不勒斯附近托勒·德尔·克莱科城的四千失业商运海员，在十六日携带家属举行了示威，要求工作和面包。摩托化警察向这支要求活命的人的队伍发动残酷的袭击，结果使十九个人负伤。"},{"type":"paragraph","text":"罗马北部工业中心特尔尼的炼钢厂在十七日举行短期罢工，抗议资本家的超额剥削制度。工人们已组织了一个专门委员会，继续为取消这个罪恶的制度而斗争"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c5bfae571"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
