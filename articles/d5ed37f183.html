script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削　英国汽车工厂的工人坚持罢工","authors":[],"dates":[{"year":1970,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削"},{"type":"paragraph","text":"英国汽车工厂的工人坚持罢工"},{"type":"paragraph","text":"新华社伦敦电　英国许多汽车工厂的工人在过去两周中坚持罢工斗争，抗议垄断资本的残酷剥削，要求增加工资。这些罢工是对英国垄断资本和英国汽车工业的沉重打击。"},{"type":"paragraph","text":"在美资沃克斯霍尔汽车公司在埃尔斯米尔港的工厂和这家公司在卢顿的工厂中，由于检查工罢工，全部小汽车和货车的生产已停止了四天。这次罢工使沃克斯霍尔公司每天少生产一千辆小汽车和货车。"},{"type":"paragraph","text":"英国雷兰德汽车公司在伯明翰的一家工厂，二百名装配工在本月初举行了一个星期的罢工，使这家公司三种牌子的小汽车的生产停止。雷兰德汽车公司在牛津的工厂中，一百五十名电工从二月底开始的罢工已经坚持了两个星期。这两次罢工使这家公司的垄断资本损失了约八百万英镑。"},{"type":"paragraph","text":"在考文垂、柴郡和德文，制造汽车主要部件的成百名工人在三月份第一周也举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5ed37f183"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
