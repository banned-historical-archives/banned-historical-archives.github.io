同志关于厦门的指示","authors":[],"dates":[{"year":1967,"month":11,"day":20}],"is_range_date":false,"parts":[{"text":"总理办公室冯秘书于20日5时20分电话传达总理、伯达同志关于厦门的指示","type":"title"},{"text":"厦门促联派，并告厦门市军管会、福州军区、福建省军管会：","type":"appellation"},{"text":"据悉，厦门市促联派所属少数组织于19日下午开始夺取军分区警卫部队和野战军的武器，并打伤战士多人。这是违犯“9·5”命令的错误行为。厦门是国防最前线，夺取前线部队的武器更是绝对不能允许的。希望你们立即停止夺取部队的武器，并将已夺走的武器全部送还原单位。如果驻厦门部队、军分区和公安局对厦门促联派有任何错误的态度和行动，请向他们提出自己的意见，要求答复，并电告中央和中央文革。","type":"paragraph"},{"text":"周恩来、陈伯达","type":"appellation"},{"text":"1967年11月20日","type":"appellation"}],"comments":[],"origin":"福建省厦门革命到底联合总司令部八·二九厦门大学红卫兵独立团《挺进》编委会编《中央（首长）对厦门文化大革命问题的指示汇编》1969年4?月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f0b069500"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
