script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想支左　用毛泽东思想搞臭派性驻上海石油采购供应站支左部队步步引导革命派在“用”字上狠下功夫　通过活学活用毛主席著作，克服派性揪出黑手，巩固了革命的三结合","authors":[],"dates":[{"year":1968,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　解放军上海警备区驻上海石油采购供应站的支左人员，按照林彪副主席“对毛泽东思想抱什么态度，是一个很重要的问题。我们就是要抓对毛主席的态度、对毛泽东思想的态度问题”的教导，心怀一个“忠”字，狠抓一个“用”字，以战无不胜的毛泽东思想为锐利武器，观察和分析阶级斗争新形势，引导全站革命职工用阶级斗争观点分析派性的反动性，及时地斩断利用派性的黑手，把资产阶级、小资产阶级派性搞臭，为全面落实毛主席最新指示扫除障碍，进一步从思想上巩固和发展了全站的革命大联合和革命三结合。"},{"type":"paragraph","text":"去年九月份，上海警备区支左人员进驻这个站后，就分别深入到全站的各个车间，找新老职工谈心，进行调查研究。他们通过和革命职工同吃同住同学习同劳动，对全站的历史和现状有了比较深刻的了解。这个站的前身是帝国主义经营的石油公司。解放以后，站内一直存在着尖锐复杂的阶级斗争。史无前例的无产阶级文化大革命，初步揭开了站内阶级斗争的盖子，但由于在“一月革命”风暴中“杀”出来的无产阶级革命派分裂成为对立的两大派组织后，“内战”一直不断，站内运动冷冷清清，谁是走资派，谁是革命干部，不清楚。群众组织中的资产阶级、小资产阶级派性掩护了一些坏人，坏人利用资产阶级、小资产阶级派性进行破坏和捣乱，企图把水搅混，这是在新的形势下两个阶级、两条道路、两条路线斗争的反映。"},{"type":"paragraph","text":"支左人员认清了新形势下阶级斗争的新特点，坚定地相信，群众是要革命的，只要向群众大力宣传毛泽东思想，坚决执行支左不支派的原则，极少数坏人一定会被群众揪出来，革命群众组织之间一定会在革命原则的基础上联合起来。有一个时期，两个群众组织的一些同志由于派性发作，都希望支左人员支持他们的一些错误作法，不断地对支左人员施加压力。面对这些情况，支左人员始终保持清醒的头脑，没有亲一派、疏一派，热一派、冷一派，坚定不移地执行支左不支派的原则，对派性进行毫不调和的斗争。"},{"type":"paragraph","text":"驻站支左人员从调查中了解到，对立的两大派群众组织，主要分歧集中在两个问题上:一个是对一月革命夺权初期成立的革命生产委员会的看法，一派认为它是夺权后的新生事物，要扶植，一派认为它是新的资产阶级反动路线的产物，要解散；另一个问题，是两派对原来一些领导干部的看法，存在着严重分歧。双方为这些问题打了八个多月的“内战”，有时发展到激烈的武斗。支左人员认为，在这些派性斗争中，人民内部矛盾和敌我矛盾错综复杂地交织在一起，但大量的还是人民内部矛盾。为了严格区别两种不同性质的矛盾，支左人员就组织双方头头坐下来学习“谁是我们的敌人?谁是我们的朋友?这个问题是革命的首要问题。”并引导大家联系双方争执的一些问题进行讨论，使大家认识到，群众组织之间的矛盾不属于敌我矛盾，不应该用对待敌人的办法对待对方，应该按照毛主席教导的“团结——批评和自我批评——团结”的公式来解决。通过学习，大家深有体会地说:工人阶级本是“一根藤上的苦瓜”，我们有共同的阶级利益，共同的革命目标，可是现在打来打去，打的都是自己的阶级兄弟，真正的敌人一个也没有碰上。为什么会造成这种局面?大家认为主要是资产阶级、小资产阶级派性作怪。接着，支左人员又通过办学习班等方式，以毛主席最新指示为武器，引导大家用阶级斗争观点分析派性的反动性。在提高认识的基础上，经过支左人员的耐心细致的思想工作，双方各自作了自我批评，进行斗私批修，使革命大联合出现良好的气氛。"},{"type":"paragraph","text":"双方群众组织有了初步联合的愿望，支左人员便组织大家学习毛主席关于阶级斗争的教导，启发双方群众讨论:为什么长期以来双方不断打“内战”?有没有坏人在背后挑动?站内阶级斗争盖子全面揭开了没有?这一系列问题，引起了大家的深思。广大革命群众提高了警惕，擦亮了眼睛。这时支左人员又引导双方联合起来揪坏人。经过发动群众，终于揪出了挑动两大派群众组织搞武斗的黑手:一个漏划地主分子和另一个蒋匪特务头子的爪牙，使全站革命群众受到了极其深刻的阶级教育。"},{"type":"paragraph","text":"驻站支左人员用这个活生生的阶级斗争现实，引导全站革命群众把资产阶级、小资产阶级派性彻底搞臭。他们通过斗争会、组织座谈讨论、大字报，使大家深刻认识到，随着无产阶级文化大革命的深入发展，资产阶级、小资产阶级派性对革命的危害也越大。大家认识到了派性真是一条大毒蛇，是阶级敌人的好帮手，起到党内一小撮走资派的别动队的作用。通过大列派性的罪状，大摆派性的危害，把资产阶级、小资产阶级派性搞得臭臭的，反动的派性就象过街的老鼠，一出现就人人喊打。现在有些人在讲话中只要稍带一些派性，就会立刻受到自己群众组织里群众的批评和抵制。过去发生了问题，就互相指责，互相揪住辫子不放，现在能严于责己，敢于自我批评，敢于承担责任。对某些干部，原来一方要解放，一方要打倒，现在克服派性后，双方能联合起来进行调查，按照毛主席的干部政策，实事求是地进行分析研究。过去讨论三结合时，争席位，争核心，现在能从党性出发，互相推荐，互相谦让。过去两派群众之间，由于派性发作，许多人见面不讲话，现在能互相关怀，互相帮助。全站呈现一派团结、紧张、朝气蓬勃的革命景象。在这个大好形势下，一月二十七日成立了革命委员会。全站革命职工在新生的革命委员会领导下，满怀信心，为夺取无产阶级文化大革命的全面胜利而奋斗到底!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"037ce49e41"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
