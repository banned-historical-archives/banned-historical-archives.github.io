<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"偷梁换柱　歪曲篡改","authors":["石水"],"dates":[{"year":1977,"month":11,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石水"},{"type":"paragraph","text":"用歪曲和篡改毛主席指示的手法，来推行反革命政治纲领，打击革命老干部，是“四人帮”阴谋篡党夺权全部罪恶活动中的一个重要组成部分。"},{"type":"paragraph","text":"“四人帮”歪曲篡改毛主席指示，其时间之长，内容之多，规模之大，影响之广，危害之烈，在我党历史上是空前的。批林批孔，学习无产阶级专政理论，评论《水浒》，关于党内走资派问题的论述，毛主席的每一项指示，他们都接过去，大肆歪曲，另搞一套。仅举二例，足可说明。"},{"type":"paragraph","text":"一是评《水浒》。一九七五年八月，伟大领袖毛主席对《水浒》作了评论。毛主席的评论，是对《水浒》这部文学作品说的，没有别的意思。可是，“四人帮”立即对这一光辉批示，进行偷梁换柱，歪曲和篡改。先是姚文元，他撇开批示所谈的内容，为评《水浒》定下一个所谓“宋江排斥晁盖是为了投降的需要”的黑基调；接着是江青，她完全不顾批示的精神，造谣说:“评论《水浒》的要害是架空晁盖，现在党内有人架空毛主席。”经过这两个反革命野心家一“发挥”，毛主席评《水浒》的批示，就被歪曲得面目全非。历史上的文学评论问题变成现实的政治问题，批宋江，变成影射攻击周总理和邓小平同志。差不多有一年时间，“四人帮”控制下的报纸杂志、广播电视，无不顺着“四人帮”定的调子唱，跟着他们的棍棒转，批“古代投降派”，抓“现代投降派”的叫嚣不绝于耳，闹得乌烟瘴气，不成样子。"},{"type":"paragraph","text":"再一个就是关于党内走资派问题。在这个问题上，“四人帮”更是肆意歪曲毛主席的指示，制造了许多混乱，直接为其反革命政治纲领服务。“四人帮”接过了反对走资派的革命口号，篡改毛主席关于党内走资派问题的完整论述，其中特别突出的，是把毛主席关于“搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派”的科学论断，歪曲为“在我们党内，首先在政治局内部有资产阶级，有买办资产阶级”，并调动他们操纵的一切舆论工具，竭力煽动人们去揪所谓“党内资产阶级”。当时，御用班子，文痞流氓，一齐出动，连篇累牍地炮制反动文章，滔滔不绝地发表反动演说，狂叫要“层层揪”，“揪一层”，从中央到地方各级党委都要“动大手术”，指名道姓地诬陷邓小平同志，含沙射影地攻击华主席，妄图把我们党的一大批领导干部统统打倒。“四人帮”用歪曲毛主席指示的手法来推行反革命政治纲领，已经到了穷凶极恶的地步。"},{"type":"paragraph","text":"林彪搞反革命的主要策略手段是“打着红旗造反”。“四人帮”不但继承了林彪的反革命路线，而且连林彪使用过的反革命策略，也全盘接受下来了。略有不同的是表现形式。林彪的“打着红旗造反”，主要表现为“语录不离手，万岁不离口，当面说好话，背后下毒手”；“四人帮”则装着一副“权威”“解释者”的样子，用篡改毛主席指示的方式进行反革命活动。揭穿“四人帮”的这一阴谋手法，识破“四人帮”所包藏的祸心，就能更加认清“四人帮”反革命政治纲领的实质和要害。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf0b36e7c4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
