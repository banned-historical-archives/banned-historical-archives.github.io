tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东选集》第五卷希腊文版在希腊出版阿姆哈拉文《毛泽东主席语录》在埃塞俄比亚出版","authors":[],"parts":[{"type":"paragraph","text":"新华社雅典一九七七年十一月十二日电 据希腊周刊《人民之路》最近一期报道，《毛泽东选集》第五卷希腊文版已经印刷装订完毕，将从十一月十五日起在希腊发行。"},{"type":"paragraph","text":"《毛泽东选集》第五卷希腊文版是由希腊教育出版社翻译和出版的。"},{"type":"paragraph","text":"《人民之路》周刊强调指出，出版和发行《毛泽东选集》第五卷在希腊是一件大事。"},{"type":"paragraph","text":"新华社讯《毛泽东主席语录》埃塞俄比亚当地语阿姆哈拉文版最近首次在亚的斯亚贝巴出版。"},{"type":"paragraph","text":"由当地出版社出版的阿姆哈拉文《毛泽东主席语录》，是由《今日埃塞俄比亚》编辑特达拉·赫沃特从英文本翻译成阿姆哈拉文本的。它的出版得到了埃塞俄比亚新闻和国家指导部的批准。第一版印刷五千册。为了满足埃塞俄比亚人民的需要，出版者决定将出第二版，印刷二万册。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6cf4f6e25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
