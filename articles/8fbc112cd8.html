tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东未正式发表的一首五言诗","authors":["汤国基"],"parts":[{"type":"paragraph","text":"毛泽东同志在1965年7月21日给陈毅同志谈诗的一封信中，说他“没有发表一首五言诗”。事实确实如此。我们从毛泽东正式发表的诗词中的确找不出一首五言诗。但若翻阅1991年第4期四川《毛泽东思想研究》杂志，便会发现毛泽东同志在抗日战争时写过一首五言律诗，是吊抗日阵亡名将戴安澜将军的。"},{"type":"paragraph","text":"戴安澜，安徽无为县人。抗战时参加过台儿庄战役、武汉会战、长沙保卫战及昆仑关大战。1942年3月奉命率第200师赴缅甸远征抗日，战绩卓著。后奉命撤退回国，在缅甸北部棠吉同日军激战时被流弹击中，因伤情恶化于5月26日以身殉国，年仅38岁。"},{"type":"paragraph","text":"第二年即1943年4月1日在广西全州为戴安澜将军举行隆重国葬，国共两党领导人都送了挽联或挽幛。毛泽东主席从延安拍去电报吊挽，报文是一首五言律诗：“外侮需人御，将军赋《采薇》。师称机械化，勇夺虎罴威。浴血东瓜守，驱倭棠吉归。沙场竟殒命，壮志也无违。”下署：“毛泽东敬挽。”诗中的《采薇》乃《诗经·小雅》中的一篇，是写周王派遣的戍卒长期在外征战的悲歌。这首挽诗用五言，讲韵律，讲平仄，对仗工整，意像鲜明，感情激昂奋发，既是对抗日将士的巨大鼓舞，也是对烈士亡灵的莫大安慰。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fbc112cd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
