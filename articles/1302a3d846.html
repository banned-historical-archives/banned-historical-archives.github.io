ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央转发铁道部党组关于三反报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发铁道部党组关于三反报告的批语"},{"type":"paragraph","text":"（1951年12月11日）中央和军委各部门，中央人民政府各党组，各中央局，并请转分局、省市区党委（无铁道的地方不必转）："},{"type":"paragraph","text":"（一）兹将中央铁道部党组关于反贪污、反浪费、反官僚主义的报告”一份发给你们参考。这个报告写得比较好，值得研究。（二）请你们向所属各单位，亦用限期要报告的方法，推动这个斗争向前发展。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十二月十一日"},{"type":"paragraph","text":"[1]铁道部党组1951年12月7日关于三反的报告，具体分析了铁路系统贪污浪费的情况，作出在增产节约运动中先发动反贪污斗争的决定。报告指出，要通过这一斗争对贪污现象和大贪污犯以严重的打击，给浪费现象以大量的揭发，在群众中公开进行反对资本主义思想的教育，教育群众保护国家财产，严格划分公私界限，造成鄙视贪污浪费的新道德观念，对铁路队伍再一次从思想上进行整顿，为增产节约运动打下巩固的基础。具体办法是：1成立各级增产节约委员会领导反贪污斗争；2.突破一点，抓住典型进行宣传教育；3.深入动员，号召贪污分子自动坦白，自己坦白与别人揭发相结合；4.搭配骨干组织检查组。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":124,"page_end":124},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发铁道部党组关于三反报告的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":11}],"is_range_date":false,"parts":[{"text":"中央转发铁道部党组关于三反报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"中央和军委各部门，中央人民政府各党组，各中央局，并请转分局、省市区党委（无铁道的地方不必转）：","type":"appellation"},{"text":"（一）兹将中央铁道部党组关于反贪污、反浪费、反官僚主义的报告一份发给你们参考。这个报告写得比较好，值得研究。（二）请你们向所属各单位，亦用限期要报告的方法，推动这个斗争向前发展。","type":"paragraph"},{"text":" 中央十二月十一日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1302a3d846"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
