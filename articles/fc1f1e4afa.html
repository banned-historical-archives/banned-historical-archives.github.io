script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"古巴坚决贯彻土地改革法卡斯特罗号召人民奋起战斗保卫革命　美国反动集团和资产阶级报纸叫嚣武装干涉古巴内政","authors":[],"dates":[{"year":1959,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社哈瓦那15日电】　古巴总理卡斯特罗13日在古巴工人联合会和烹调联合会召开的各界劳动人民的集会上，号召人民支持土地改革法，不顾一切困难实行这个法令。"},{"type":"paragraph","text":"卡斯特罗说:“到处都有挑衅的事情发生，人民看到，必须起来保卫革命；必须起来战斗……”。他指出，反革命的阴谋只不过证明，人民只能依靠自己，并且只能自己起来保卫自己。卡斯特罗在这次工人团结的大会上还说，革命政府固如磐石，它是一个完全自主的政府，古巴人民已经掌握自己的命运，在制订法律时用不着考虑别人的意见。"},{"type":"paragraph","text":"在美帝国主义阴谋干涉古巴的革命和国内反动势力加紧进行分裂活动的时候，古巴一些报纸和政党发表了评论和声明表示支持古巴政府，并且号召加强国内的团结。“革命报”13日谴责了那些以反共为口实发表的分裂言论，并且号召大家毫不犹豫地同一切渴望建立真正自由的、没有普拉特修正案的古巴的人们并肩前进。“战斗报”认为，主要之点是保持团结。这家代表革命指导委员会意见的报纸说，古巴革命不是一党一派的革命。它呼吁自由职业者、工人、学生和农民支持革命政府，抛弃一切宗派主义的分裂活动。人民社会党全国委员会执行局13日发表的声明指出，必须加紧谴责一切反革命的阴谋活动，使群众进一步警惕国家当前的危险。"},{"type":"paragraph","text":"【新华社哈瓦那14日电】　美国反动集团和资产阶级报纸由于古巴的土地改革将影响他们的利益而感到十分恼怒，正在大叫大嚷要对古巴进行武装干涉。"},{"type":"paragraph","text":"美国前任助理国务卿布莱敦最近在芝加哥对泛美企业主理事会发表的演讲中说，“古巴要想摆脱共产主义的全面渗入，唯一的希望就是人民举行武装起义，并进行另一次革命把菲德尔·卡斯特罗赶走”。他强调指出，“如果不采取某些行动的话，在我们家门口很快就会出现一个共产主义国家。唯一的补救办法就是采用武力。”"},{"type":"paragraph","text":"合众国际社社长麦卡锡在他写的一篇反对古巴的文章中露骨地叫嚣说，在古巴和在美国已经组织了反革命集团，“它们的目的是用武力推翻古巴现政权”。在这以前美国参议员艾伦·埃伦德和魏恩·海斯也曾经疯狂地攻击古巴的土地改革。"},{"type":"paragraph","text":"美国政府11日照会古巴政府对土地改革法表示“严重关切”以后，“纽约时报”发表社论主张修改古巴土地改革法的某些细节。这家报纸威胁说，要想使古巴的土地改革成功，“那就必须使它符合美国人的利益”。报纸并且“劝告”古巴政府“不要轻视美国的意见”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc1f1e4afa"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
