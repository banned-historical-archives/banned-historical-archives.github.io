art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以抗震救灾的实际行动深入批邓；反击右倾翻案风","authors":[],"parts":[{"type":"paragraph","text":"云南地震灾区广大社员和干部认真学习毛主席的重要指示和中央慰问电，深入批判邓小平的修正主义路线，决心用抗震救灾的实际行动反击右倾翻案风，报答毛主席、党中央的亲切关怀，发展革命和生产的大好形势。"},{"type":"paragraph","text":"云南地震灾区各级党组织在抗震救灾中，紧紧抓住阶级斗争这个纲，深入批判邓小平反革命的修正主义路线，掀起了反击右倾翻案风的新高潮。这是龙陵县镇安公社党委副书记张凡龙和社员群众一起批判邓小平的修正主义路线。"},{"type":"paragraph","text":"“龙江风格”大发扬。轻灾区的龙陵县龙江公社在地震之后调出一批粮食和资金，支援重灾区龙陵县镇安公社恢复生产，重建家园。当龙江公社的运粮车抵达镇安公社时，受到当地广大群众的热烈欢迎，赞扬龙江公社的共产主义风格。"},{"type":"paragraph","text":"在向地震灾害作斗争中，灾区各级党组织发挥了坚强的战斗堡垒作用。龙陵县镇安公社党委以“泰山压顶不弯腰、山崩地裂志不移”的革命精神，带领群众进行抗震救灾。这是镇安公社党委成员在研究抗震救灾夺丰收、重建家园的措施。"},{"type":"paragraph","text":"潞西县城关公社大湾大队各族社员发扬艰苦奋斗、自力更生的革命精神，用加倍的劳动，夺回地震灾害给农业生产造成的损失，插秧进度比去年同期快两倍。"},{"type":"paragraph","text":"人民解放军昆明部队获悉龙陵、潞西一带发生强烈地震的消息后，立即组织部队积极投入抗震救灾斗争。这是昆明部队某部指战员在地震灾区帮助社员群众修盖房屋。"},{"type":"paragraph","text":"（本组照片均为新华社发）（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c7898f3a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
