<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派分子洪荒作恶多端","authors":[],"dates":[{"year":1958,"month":1,"day":6}],"is_range_date":false,"parts":[{"text":"右派分子洪荒作恶多端","type":"title"},{"text":"【文汇报讯】 在上海市二届三次人民代表大会上，被撤销代表资格的右派分子洪荒，原是文艺工会筹备处秘书长、党组和行政的实际负责人。在这次反右派斗争中，文艺工会机关干部揭发出大量事实，彻底暴露了这个党内右派分子的面目。","type":"paragraph"},{"text":"去年5月，洪荒趁资产阶级右派分子在市委宣传会议上向党猖狂进攻的机会，即抓住文艺工会长期没有成立，以及对市工联和文化局领导上存在的某些缺点，特别是对文化局党组，搜集大量的反面材料，准备在宣传会议上向党和文化局施放毒箭。当组织上了解他的情况并加以劝导后，他不仅不警觉悔悟，反而越加怀恨组织。","type":"paragraph"},{"text":"洪荒不仅在宣传会议和机关内配合右派分子向党进攻，他还在5月份派了一个工作组到“人艺”基层去放火，这个工作组在洪荒直接领导下，和该院右派分子张立德、章曼苹等人向党进攻的步骤，完全合拍，在一个时期内，“人艺”的工会组织，竟渝为右派分子向党进攻的工具。","type":"paragraph"},{"text":"根据揭发的事实证明，洪荒对工会工作一贯采取了修正主义的观点进行工作的，抵制党的工会运动的正确路线。他对党领导工会不可动摇的原则采取了抽象承认实际否定的态度。","type":"paragraph"},{"text":"关于工会与行政关系上，洪荒有意抹煞工会与行政在代表工人阶级利益的根本一致性，夸大工会与行政的矛盾。他借口工会的监督作用，把工会与行政对立起来。在洪荒的影响下，文艺工会与行政的关系发展得极不正常。","type":"paragraph"},{"text":"在工会与群众的关系以及工会如何保护群众利益的问题上，洪荒一贯把自己扮演成代表群众“多数”，他认为剧团的主要演员人数少，一般演员人数多。文化局只抓少数，不管多数，只做统战工作，不走群众路线。事实上，洪荒这种观点反映在实际工作中，只能促成一般演员与主要演员之间的对立，而这正是违背了剧团大多数人的利益的。","type":"paragraph"},{"text":"洪荒所以沦为右派分子，是因为他存在着极为严重的个人主义思想。他出身于高级职员的家庭，本人又是自由职业者。入党后，又没有经过严格的阶级斗争的考验，特别在解放后，斤斤计较个人名位，一直不安心工会工作；当他的个人野心不能得逞以及“三反”时，在戏曲改进协会闹独立性受到组织严格批评，就对党埋下了不满种子，在以后的工作中一再不接受党的教育，终于堕落成为反党反社会主义的右派分子而自绝于人民。","type":"paragraph"}],"comments":[],"origin":"《文汇报》1958年1月6日。原题为：“右派分子洪荒作恶多端/抱住修正主义观点一贯抗拒党对工会的领导 污蔑文化局在行政、工会及群众间制造矛盾”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d32d7ff074"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
