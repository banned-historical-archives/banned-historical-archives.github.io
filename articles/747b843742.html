电","authors":[],"dates":[{"year":1953,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十三日电】　中华人民共和国中央人民政府毛泽东主席与外交部周恩来部长及苏维埃社会主义共和国联盟部长会议主席斯大林与外交部部长维辛斯基分别互致贺电，祝贺中苏友好同盟互助条约签订三周年。电文如下:"},{"type":"paragraph","text":"毛泽东主席致斯大林主席贺电"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟部长会议主席斯大林同志:值此中苏友好同盟互助条约签订三周年之际，我代表中国人民、中华人民共和国政府并以我个人名义谨向伟大的苏联人民、苏联政府和您表示衷心的感谢与热烈的祝贺。"},{"type":"paragraph","text":"三年来中苏两大盟国之间的亲密友好合作关系获得了极大的巩固和发展。苏联政府和人民给予新中国的真诚无私的援助，不仅加速了中国经济的恢复和发展，而且对中国大规模国家建设的第一个五年计划的实施，更有其重大的意义。"},{"type":"paragraph","text":"祝中苏两国伟大的牢不可破的友谊在反对帝国主义新侵略阴谋，保卫远东及全世界和平的事业中日益巩固与发展。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席　毛泽东"},{"type":"paragraph","text":"一九五三年二月十日北京"},{"type":"paragraph","text":"斯大林主席致毛泽东主席贺电"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东同志:"},{"type":"paragraph","text":"值此中苏友好同盟互助条约签订三周年之际，主席同志，请接受我衷心的祝贺，并祝中华人民共和国与苏维埃社会主义共和国联盟间为着各国人民和平及安全事业的友好同盟获得更进一步的巩固。"},{"type":"paragraph","text":"约·斯大林"},{"type":"paragraph","text":"一九五三年二月十一日于莫斯科"},{"type":"paragraph","text":"周恩来部长致维辛斯基部长贺电"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟外交部部长维辛斯基同志:"},{"type":"paragraph","text":"值此中苏友好同盟互助条约签订三周年之际，部长同志，请接受我衷心的祝贺。谨祝伟大的保障远东及全世界和平与安全的中苏同盟更加坚强和巩固"},{"type":"paragraph","text":"中华人民共和国中央人民政府外交部部长　周恩来"},{"type":"paragraph","text":"一九五三年二月十日北京"},{"type":"paragraph","text":"维辛斯基部长致周恩来总理兼外交部部长贺电"},{"type":"paragraph","text":"中华人民共和国政务院总理兼外交部部长:周恩来同志:"},{"type":"paragraph","text":"欣逢中苏友好同盟互助条约签订三周年，请接受我衷心的祝贺，并祝我们两国人民之间有利于世界和平的友好与合作得到进一步的巩固。"},{"type":"paragraph","text":"安·维辛斯基"},{"type":"paragraph","text":"一九五三年二月十一日于莫斯科"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1953\\02\\532e010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1953\\02\\532e010102.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"747b843742"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
