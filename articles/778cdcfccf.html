[{"year":1946,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席电复重庆名流"},{"type":"paragraph","text":"祈为和平共同奋斗"},{"type":"paragraph","text":"【新华社延安七日电】重庆各界名流黄墨涵、黄次咸、邓初民等四千二百七十一人，前电蒋介石、毛主席呼吁和平，毛主席特于五日电复如下："},{"type":"paragraph","text":"重庆黄墨涵、黄次咸、邓初民等先生均鉴："},{"type":"paragraph","text":"奉读来电，甚佩卓见！坚持和平，反对内战，乃今日中国之惟一国是，敝党决秉此方针奋斗到底，尚祈一致努力，以期和平之实现。"},{"type":"paragraph","text":"毛泽东谨复微"},{"type":"paragraph","text":"重庆基督教协进会和平祈祷大会诸先生鉴："},{"type":"paragraph","text":"铣电奉悉，诸先生热心国是，呼吁和平，无任钦佩！敝党素主以和平团结解决国共一切内争，敝党南京代表团提议双方明令全面长期无条件停战，惟少数好战分子仍在迷信武力解决，致内战危机依然存在，尚祈共同努力，制止战祸。"},{"type":"paragraph","text":"毛泽东微"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"778cdcfccf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
