:[],"dates":[{"year":1965,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杜尔总统致电刘少奇主席"},{"type":"paragraph","text":"感谢刘主席电贺中几友好条约签订五周年"},{"type":"paragraph","text":"新华社二十二日讯　刘少奇主席收到了几内亚总统塞古·杜尔二十日的一封电报，杜尔总统在电报中感谢刘少奇主席在中国几内亚友好条约签订五周年的时候打给他的贺电。电文如下："},{"type":"paragraph","text":"我代表几内亚共和国政府和人民并以我个人的名义，衷心感谢你在中华人民共和国几内亚友好条约签订五周年的时候给我的贺电。"},{"type":"paragraph","text":"这个条约的签订，事实上为我们两国决定修建的大厦又增添了一块石头。在过去五年中，中国和几内亚的友好合作关系进一步加强了。最近以来所取得的成就证明我们两国人民很好地互相了解和意见一致。"},{"type":"paragraph","text":"我们确信，在我们反对罪恶势力的共同斗争中，并且为了亚非团结的利益，为了促进人类的进步，这种关系将进一步得到巩固。"},{"type":"paragraph","text":"我们为贵国在各方面取得的巨大的进步感到高兴，并为贵国在国家建设的巨大事业中日益取得更大的成就表示良好的祝愿。中几友谊万岁！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12f43242f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
