<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都隆重集会纪念朝鲜人民祖国解放战争十二周年坚决反对美帝国主义侵略政策和战争政策朱德、邓小平等出席　彭真致开会词　陈毅和朴金哲发表重要讲话　热情颂扬朝中人民崇高的战斗友谊　　强烈谴责美帝侵略南朝鲜、南越和中国台湾的罪行","authors":[],"dates":[{"year":1962,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京25日电】　首都各界人民两万多人今天晚间隆重地举行盛大集会，纪念朝鲜人民伟大的祖国解放战争十二周年，坚决反对美帝国主义的侵略政策和战争政策。"},{"type":"paragraph","text":"大会在东郊北京工人体育馆举行。首都的工人、学生、民兵、中国人民解放军各兵种官兵、机关干部等各界群众，挤满了宽阔的体育馆的比赛场和四周观众席。在大会进行的过程中，两万多人不断地振臂高呼:“美帝国主义从南朝鲜滚出去，从台湾滚出去，从南越滚出去，从亚洲滚出去，从它所占领的一切地方滚出去!”"},{"type":"paragraph","text":"全国人民代表大会常务委员会委员长朱德，中共中央总书记邓小平，中共中央政治局委员彭真、陈毅、贺龙，政治局候补委员康生，人大常委会副委员长郭沫若、黄炎培、陈叔通、班禅额尔德尼·却吉坚赞、林枫，国务院副总理罗瑞卿、习仲勋，国防委员会副主席张治中、傅作义、蔡廷锴，外交部副部长章汉夫、姬鹏飞，以及政府各部门、各民主党派、各人民团体和北京市的负责人，中国人民解放军高级将领和首都各方面人士，出席了今天的大会。"},{"type":"paragraph","text":"由朴金哲团长、康良煜、朴信德副团长率领的朝鲜最高人民会议代表团全体贵宾，出席今晚的大会。当他们同朱德、邓小平等我国党和国家领导人一起登上主席台时，会场上两万多人全体起立，长时间地热烈鼓掌，向英雄的朝鲜人民的使者表示最崇高的敬意。"},{"type":"paragraph","text":"朝鲜驻中国大使韩益洙和使馆全体官员，在北京的其他朝鲜同志，许多国家的访华外宾，以及社会主义各国和亚洲、非洲、拉丁美洲国家的驻华使节和外交官员，也出席了大会。"},{"type":"paragraph","text":"今晚的大会由中共中央政治局委员、北京市市长彭真主持。中共中央政治局委员、国务院副总理陈毅和朝鲜劳动党中央委员会副委员长、朝鲜最高人民会议代表团团长朴金哲，先后在大会上发表了长篇的重要讲话。他们的讲话不断在会场上激起一阵又一阵暴风雨般的热烈掌声。"},{"type":"paragraph","text":"大会在军乐队奏中朝两国国歌以后开始。彭真同志在致开会词的时候说:朝鲜祖国解放战争的胜利，戳穿了美帝国主义纸老虎，粉碎了美帝国主义“不可战胜”的神话，保卫了亚洲和世界和平，鼓舞了全世界人民反对帝国主义的斗争。这个胜利是朝鲜人民对世界和平和人类进步事业的伟大贡献。"},{"type":"paragraph","text":"他强调说:帝国主义的侵略本性是不会改变的。美帝国主义今天正在疯狂地扩军备战、推行侵略政策和战争政策。美帝国主义赖在南朝鲜不走，武装干涉南越，并且支持和鼓励盘踞在台湾的蒋介石匪帮窜犯大陆沿海的军事冒险计划，严重地威胁着亚洲和世界和平。"},{"type":"paragraph","text":"他还着重指出，美帝国主义是世界反动势力的主要堡垒，它把一切反动势力集结在自己的周围，用战争、军事威胁和政治阴谋来反对全世界百分之九十以上的人民。美帝国主义和各国反动派的所作所为，使它们成为全世界人民的共同敌人，成为世界和平的敌人。"},{"type":"paragraph","text":"彭真同志说，美帝国主义做尽坏事，全世界人民决不会饶恕它。现在它已陷入了全世界人民的重围，它的日子越来越不好过了。我们坚决相信，只要全世界人民进一步团结起来，一致坚决反对以美国为首的帝国主义，一致坚决反对美帝国主义的侵略政策和战争政策，世界和平和人类进步的事业一定会得到最后的胜利。让我们高举反对帝国主义的旗帜，高举保卫世界和平的旗帜，高举战无不胜的马克思列宁主义的旗帜，高举社会主义阵营各国人民大团结和全世界人民大团结的旗帜，胜利地前进吧!"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1962\\06\\626q010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e郑小箴\u003c/FONT\u003e\u003cFONT class=imgsm\u003e郑小箴"},{"type":"paragraph","text":"首都各界人民隆重集会纪念朝鲜人民祖国解放战争12周年，反对美帝国主义侵略政策和战争政策。图为陈毅副总理在大会上讲话。　(新华社传真　郑小箴　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04b65e4282"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
