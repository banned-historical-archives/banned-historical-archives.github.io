script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度《解放》月刊谴责印修分子勾结反动派破坏农民武装斗争  印度农民武装斗争烈火是扑不灭的  激烈的阶级斗争使那些形形色色的修正主义分子充分暴露了反革命真面目","authors":[],"dates":[{"year":1970,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度《解放》月刊谴责印修分子勾结反动派破坏农民武装斗争"},{"type":"paragraph","text":"印度农民武装斗争烈火是扑不灭的"},{"type":"paragraph","text":"激烈的阶级斗争使那些形形色色的修正主义分子充分暴露了反革命真面目"},{"type":"paragraph","text":"新华社九日讯　印度《解放》月刊一九六九年十二月号发表文章，愤怒谴责印度修正主义分子伙同印度反动派破坏农民革命武装斗争的无耻行为。"},{"type":"paragraph","text":"文章说，“孙达拉雅、南布迪里巴德和乔蒂·巴苏之流已经对人民宣布了内战。这个卑鄙的反革命两面派集团同其他反动派紧紧勾结在一起，竭力企图扑灭越烧越旺的革命烈火。”他们在意识形态方面所作的种种乔装打扮，都没有妨碍西孟加拉的假马克思主义者和其他修正主义分子去同奥里萨邦和比哈尔邦的大封建地主和官僚携手合作，以便用一切反革命暴力手段来扼杀革命。在这场内战中，他们全都联合起来对付人民和对付革命了。他们只不过是效忠于帝国主义和本国反动派的政治势力中的不同的分队而已。为了欺骗和分化人民，他们只是叫着不同的口号，打着不同的旗号而已。"},{"type":"paragraph","text":"文章说，那些在西孟加拉邦执政的假马克思主义的骗子们正在使用各种暴力手段镇压英勇的农民为了粉碎封建枷锁而展开的武装斗争。今天的西孟加拉农村到处都是警察营地。在西孟加拉米德纳普尔县的德布拉和戈皮巴拉瓦普尔，革命的农民发动了真正要消灭阶级敌人、打倒农村的封建权威、进而建立红色政权的运动。为了镇压这些革命的农民，假马克思主义者警察部长乔蒂·巴苏除了派去通常的警察部队以外，还派去了几连东部边境步枪队，对戈皮巴拉瓦普尔和德布拉的农民武装发动“全力进攻”，并“指示”反动警察对农民武装部队可以“枪杀勿论”。文章说：“假马克思主义者和他们的同伙已对觉悟的农民发动了大规模的战争。他们正在步蒋介石反动派和美帝国主义者的后尘。象蒋介石反动派的做法和美帝国主义者在越南的做法一样，他们对农民武装也实行‘烧光、毁光、杀光’。但是，他们的纸老虎面目已经看得很清楚了。”这群自称为马克思主义者的卑鄙的反革命分子们期望，用逮捕、拷打，甚至枪杀革命的支持者和同情者，他们就能够摧毁战斗的农民的斗志。但是，恐怖统治——大规模逮捕、拷打、没收财产和毁掉农民的住房等等——并未能使革命的农民气馁。甚至印度资产阶级反动报纸《政治家报》也不得不供认：“村民们不愿同警方合作”。"},{"type":"paragraph","text":"文章说，孙达拉雅—南布迪里巴德—乔蒂·巴苏集团并不仅仅满足于对农民使用暴力和恐怖手段。他们还进行反对革命农民的恶毒宣传。他们和丹吉集团分子拚命地试图把斗争地区的阶级敌人及其代理人组织起来，并充当间谍和告密者。最近散发了一份呼吁农民在秋收季节保持“平静”的传单，印度修正主义分子和反动官僚、政客，警察长官等一起在“呼吁书”上签了名。“今天，激烈的阶级斗争逼使那些形形色色的修正主义者公开地、厚颜无耻地站到阶级敌人那一边。他们喋喋不休地大讲剥削的封建阶级和被剥削的农民之间的和平和那些用以维护现在的剥削和压迫政权的法律是神圣的。他们支持封建阶级在农民地区的权力，支持为这个阶级效劳的官僚机构并不顾一切地阻止建立红色政权。”"},{"type":"paragraph","text":"文章最后说：“在这个帝国主义走向全面崩溃的时代，这些反革命分子的末日的到来，要比蒋介石反动派快得多。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46bc526446"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
