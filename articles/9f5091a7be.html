usercontent.com/banned-historical-archives/banned-historical-archives21/main/7f5af46c-8087-4181-accc-2a57462ad3e3/1.jpg"],"article":{"title":"张平化同志八月二十五日讲话","alias":"","parts":[{"type":"paragraph","text":"张平化同志八月二十五日耕话"},{"type":"paragraph","text":"（接见湖南赴京及北京一部分革命师生）"},{"type":"paragraph","text":"同学们，现在开会了，在我们开会之前介绍一下好不好，（好）这是陶同志，党中央常委、书记处书记·这是王任重同志，中南局第一书记，这是孙正同志，国务院文教办公室副主任。"},{"type":"paragraph","text":"今天开会是召集中南各省来京串联的同学们的·原来没有准备其他的地区和北京的同学来，但今天有其他地区和北京同学参加，我们热烈欢迎，中南地区我已接见了湖南的同学，接见了三次，我会经向湖南同学表示过，我支持大家革命的态度。我把同学们所反映的情况向中央报告了，同时向中南局报告了，他们两位（指陶，王任重同志）中央中南局同志来了·我现在重中我对湖南同志耕过的三点·"},{"type":"paragraph","text":"第一、在长沙有人提出的所谓“三相信”（相信省委、市委、社教工作总团）的号召，这是错的口号，利用这口号压学生革命行动，这是反动的行为·"},{"type":"paragraph","text":"第二在长沙阻拦同学上北京，种种刁难，层层障碍，阻栏同学到中央向毛主席告状，这是错的·我会经过，怕人家告状的人就是有鬼的人，你若是有鬼，怕什么？若是工作上有点错，别人告状怕什么？有鬼才阻拦告状。"},{"type":"paragraph","text":"第三、在长沙挑动工农“红卫兵”围攻同学，有些同学受打，这种行为是更严重的错·这种行为要彻底追究，查究。同学们要求中央查，我们已向中央及中南局反映，中南已派人要他们检查科正。中南局第一书记王任重同志还会。我要向湖南同志检讨，因为我会经是湖南省委第一书记，离开才两个多月，我的工作没做好，没领导好·我的工作没做好，这次发生的事件，也有历史根源，直接参与的人要负任，我没领导好的历史根源也要负，现在向同学们道款。"}],"authors":["张平化"],"dates":[{"year":1966,"month":8,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"张平化","type":"人物"},{"name":"王任重","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f5091a7be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
