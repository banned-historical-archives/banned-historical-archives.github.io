script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南京大学文科学生积极支持人民大学七同学建议　决心做摧毁资产阶级旧学制的先锋","authors":[],"dates":[{"year":1966,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南京大学文科学生积极支持人民大学七同学建议"},{"type":"paragraph","text":"决心做摧毁资产阶级旧学制的先锋"},{"type":"paragraph","text":"本报讯　南京大学文科学生，积极支持中国人民大学七位同学给党中央和毛主席的信，决心做摧毁资产阶级旧学制的先锋。"},{"type":"paragraph","text":"南京大学溧阳分校文科学生听了广播后，欢欣鼓舞，十分兴奋，纷纷开座谈会，出大字报，写信给党中央和毛主席，积极支持人民大学七位同学敢想、敢说、敢干、敢闯的大无畏革命精神。"},{"type":"paragraph","text":"中文系四年级同学的信中说：“我们前年参加了农村的社会主义教育运动，从那时起，我们就开始议论大学文科还要不要办，怎样办等一系列的问题。几年来，我们深深感到，不少人考入大学文科以后，就进入了死人洋人的故纸堆中，一个朝气蓬勃、敢想、敢说的青年人，几年大学一读就变成了老夫子。在学校里，虽然口里也讲阶级斗争，可碰到具体问题，什么都忘了。”“农村一年的实际斗争生活，我们学到了在大学课堂里从来没有学到的真知识、真本领。我们多么希望永远生活在贫下中农之间，多么希望永远战斗在阶级斗争的最前线呀！我们曾经设想把全国文科大学都办到人民公社和工厂去，或者干脆不招应届高中毕业生，而每年从经过一定劳动锻炼的知识青年和复员军人中挑选符合条件的人，办党校或轮训班。然而旧的教学制度、旧的框框条条束缚着我们的手脚。”这些同学表示要坚决打碎旧学制，到工农中去锻炼，并且向毛主席表示决心：您指向哪里，我们就向哪里飞奔。"},{"type":"paragraph","text":"南京大学政治系四年级学生召开了座谈会，控诉旧的教育制度的毒害。他们说：我们在政治系学了四年，尽学了些乌七八糟的东西。在近二十门课程中，有封建主义、资本主义的各门课程，唯独没有毛主席著作。政治系不读毛主席著作，离开了毛泽东思想，怎么能有正确的政治方向！关在学校的高楼大厦里，脱离实际，脱离工农，脱离三大革命运动，怎么能真正懂得无产阶级的政治！我们坚决要到工农群众中去，到三大革命运动中去，经风雨、见世面，把文科大学变成活学活用毛主席著作的学校。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf95bee002"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
