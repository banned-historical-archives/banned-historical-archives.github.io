<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市委关于镇压反革命分子的情况及近期计划向中央、华北局的报告","authors":[],"dates":[{"year":1951,"month":2,"day":22}],"is_range_date":false,"parts":[{"text":"中共北京市委关于镇压反革命分子的情况及近期计划向中央、华北局的报告","type":"title"},{"text":"中央批示：","type":"subtitle"},{"text":"各大城市除东北外，镇压反革命的工作，一般地说来，还未认真地严厉地大规模地实行。从现在起应当开始这样做，不能再迟了。这些城市主要是北京、天津、青岛、上海、南京、广州、汉口、重庆及各省省城，这是反革命组织的主要巢穴，必须有计划地布置、侦察和逮捕，在几个月内大杀几批罪大有据的反革命分子。下面是北京的镇反计划，请你们研究仿办。其中说到拟先召集区以上各级人民代表会议的代表和各大工厂、大学校、民主党派、人民团体的代表开一次会，报告反革命情况及各种罪行和犯罪证据，提高大家对反革命的仇恨，然后再分批执行，这是完全必要的，各地都应这样做。","type":"paragraph"},{"text":" 1951年二月二十五日","type":"paragraph"},{"text":"兹将北京市解放迄今，处决、逮捕、管制反革命分子的情况及最近镇压反革命的计划报告如下：","type":"paragraph"},{"text":"甲、已处决各种匪特、恶霸等224名，其中在本市执行者204名，解往市外犯罪地点执行者20名。","type":"paragraph"},{"text":"乙、已逮捕各种反革命罪犯前后计有9855名，除已作各种处理者外，现在押者尚有4959名，最近拟再逮捕被管制后又继续进行反革命活动及罪恶较大的反动党特分子约1000名，这样，被关的反革命罪犯将近6000名。","type":"paragraph"},{"text":"丙、过去被管制的各种反革命罪犯，前后共计13293名，已作各种处理者2971名，现仍被管制者10522名（现已查明的本市反动党团和特务分子计有47500名）。","type":"paragraph"},{"text":"丁、现已逮捕并已查清的下列各类罪犯拟即分批处决：","type":"paragraph"},{"text":"1、匪军统少校站、组长与直属组长以上者。","type":"paragraph"},{"text":"2、匪中统直属通讯员、组长以上及老特工和其他专任级以上的特务分子。","type":"paragraph"},{"text":"3、其他系统的匪特分子之相当于上述标准者。","type":"paragraph"},{"text":"4、其他持有武器、电台之反革命破坏分子。","type":"paragraph"},{"text":"5、其他在解放后，继续进行破坏活动的特务分子。","type":"paragraph"},{"text":"6、曾对我有严重破坏或有血债之反革命分子。","type":"paragraph"},{"text":"7、负有血债，作恶多端的地主、恶霸、流氓、地痞。","type":"paragraph"},{"text":"8、惯匪、较大的汉奸、制造并贩运毒品的首恶分子。","type":"paragraph"},{"text":"9、一贯道等反动道会门头子，着重有血债，有党特身分，属于恶霸性质及解放后仍积极从事反革命活动者。","type":"paragraph"},{"text":"以上各类应判死刑之罪犯，共约1300名（连前已处决者共约1500名），拟分批分地执行，第一批处决350名，拟于3月15日以前执行，第二批750名，拟于3月底至4月半执行，届时拟先召集区以上各级人民代表会议的代表和各大工厂、大学校、各民主党派、人民团体的代表开一次会，报告反革命活动情况及各种罪行和犯罪证据，提高大家对反革命的仇恨，然后再分批执行。","type":"paragraph"},{"text":"戊、业已逮捕尚未审讯完毕的罪犯和尚在进行侦察未加逮捕的重大嫌疑分子中，尚有一大批该杀的（据现有材料估计，数目在300名左右），拟弄清后放在下划中去处理。","type":"paragraph"}],"comments":[],"origin":"根据《国民经济恢复时期的北京》刊印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c596c729bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
