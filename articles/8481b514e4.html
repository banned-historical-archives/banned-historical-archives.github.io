art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以色列利库德集团与极右政党达成组阁协议等二则","authors":["谢栋风"],"parts":[{"type":"paragraph","text":"以色列利库德集团与极右政党达成组阁协议"},{"type":"paragraph","text":"据新华社耶路撒冷3月16日电 以色列利库德集团发言人16日说，受权组阁的利库德集团主席内塔尼亚胡与极右翼党派“以色列是我们的家园”主席利伯曼当天达成联合组阁协议。"},{"type":"paragraph","text":"这位发言人说，根据两党协议，双方倾向于组建一个基础广泛的执政联盟。这意味着利夫尼领导的中间党派前进党仍然存在加入执政联盟的可能。另有报道说，根据协议，利伯曼可能在新政府中出任外交部长。"},{"type":"paragraph","text":"利夫尼当天在内塔尼亚胡与利伯曼达成组阁协议后向该党议员重申，前进党加入执政联盟的前提条件之一是继续推进巴以和谈。"},{"type":"paragraph","text":"由于利伯曼在巴以问题上表现出强硬的右翼色彩，他与内塔尼亚胡达成组阁协议立即引起国际社会关注。埃及外长阿布·盖特说，以色列政坛“向右转”的趋势将使解决巴以及地区问题面临重重困难。"},{"type":"paragraph","text":"索拉纳呼吁未来以色列新政府致力于巴以和平"},{"type":"paragraph","text":"据新华社布鲁塞尔3月17日电 （记者谢栋风）欧盟负责外交和安全政策的高级代表索拉纳17日在布鲁塞尔呼吁未来以色列新政府致力于巴以和平进程和实现“两国”解决方案。"},{"type":"paragraph","text":"索拉纳当天在欧盟—地中海议会大会上发表讲话说，2009年巴以和平进程必须向前推进，“虽然这很难，但还是可能的”。欧盟、美国、俄罗斯和联合国都希望巴以双方今年能尽快恢复和谈。"},{"type":"paragraph","text":"索拉纳说，为促进巴以和谈取得进展，以色列必须立即停止扩建和新建犹太人定居点，巴勒斯坦武装组织也必须停止向以色列发射火箭弹。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8481b514e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
