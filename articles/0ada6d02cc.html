s":[],"dates":[{"year":1967,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市徐汇区革命委员会于本月八日正式成立。这是该区广大无产阶级革命派和革命群众热烈响应毛主席的伟大号召，以“斗私，批修”为纲，大办毛泽东思想学习班、大学毛主席著作和毛主席最新指示，巩固、发展革命的大联合和革命的三结合所取得的胜利成果。"},{"type":"paragraph","text":"徐汇区革命委员会筹委会建立七个多月来，在光焰无际的毛泽东思想指引下，在市革委会正确领导下，区级机关、各革命群众组织以及各条战线的基层单位，都纷纷大办毛泽东思想学习班，不断提高无产阶级革命派和广大革命群众的政治思想觉悟，有力地推动了革命的大批判，在全区出现了活学活用毛主席著作和毛主席最新指示的新高潮。学习过程中，有些革命群众组织对山头主义、小团体主义、风头主义、小资产阶级的派性等不良倾向，认真地进行了自我批评。不少单位两个革命群众组织之间本来有分歧、打“内战”的，进了学习班，坐在一条板凳上学习之后，实现了革命的大联合。在联合过程中，大家不争席位，不讲名额，相互谦让。全区三百二十八个单位，已有三百二十五个单位实现了革命的大联合。"},{"type":"paragraph","text":"区革筹会、各革命群众组织举办的毛泽东思想学习班，有力地推动了革命的三结合。学习班针对干部问题上的各种活思想，重点学习了毛主席的干部政策。广大无产阶级革命派认识到除了党内一小撮走资本主义道路当权派外，大多数基层领导干部是受蒙蔽而执行了资产阶级反动路线，犯了错误，而且很多干部既是资产阶级反动路线的执行者，又是资产阶级反动路线的受害者。他们大都对党对毛主席有深厚的阶级感情，是我们的阶级兄弟，是党和国家不可缺少的宝贵财富。经过调查研究和积极帮助，促进了解放干部的工作；一些犯了错误的干部通过学习，也批判了怕当领导干部的错误思想，决心紧跟毛主席闹一辈子革命，坚决站到无产阶级革命派一边，投入到革命大批判和当前工作中去。"},{"type":"paragraph","text":"毛主席在视察华北、中南、华东地区时在干部问题上又作出了要“扩大教育面”的极为重要指示，全区广大无产阶级革命派不折不扣地贯彻毛主席的最新指示，迅速解放和结合了大批革命领导干部。目前，全区各系统属于区管的基层领导干部中，已经结合和解放的达百分之八十。参加区革筹会的革命领导干部经常深入到矛盾比较尖锐的第一线去，和无产阶级革命派、红卫兵小将一起学习，一起战斗，促进了革命的大联合和革命三结合。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ada6d02cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
