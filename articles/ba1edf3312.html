s":[],"dates":[{"year":1966,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本人民积极学习毛主席著作"},{"type":"paragraph","text":"野间省一赞扬中国人民坚持反帝反修斗争"},{"type":"paragraph","text":"据新华社二十七日讯　日本人民衷心热爱毛主席并且积极学习毛泽东著作。"},{"type":"paragraph","text":"目前，毛泽东著作和中国的革命书刊在日本极为畅销。在日本出售的《毛泽东选集》，除日文版外，还有中文版和英文版。有不少日本朋友为了能够更加准确地领会毛泽东思想，购买了《毛泽东选集》中文版来阅读和学习。有的日本朋友虽然现在还看不懂中文，但是，他们也买下了《毛泽东选集》中文版，并且表示要努力学习中文，以便在短期内能够阅读。"},{"type":"paragraph","text":"据东京几家经售中文书刊的书店主人说，人民出版社出版的《毛泽东著作选读》甲种本和乙种本，毛主席的哲学名著《实践论》和《矛盾论》的单行本，在日本都极受欢迎，甚为畅销。日本的不少大学和中国语讲习会把《实践论》和《矛盾论》当作教科书使用。专门经售中国书刊的日本大安书店为了满足广大读者的需要，特地把《实践论》和《矛盾论》汇编成集，销路一直很好。除以上版本外，人民出版社出版的《毛主席的四篇哲学论文》和人民文学出版社出版的《毛泽东论文学和艺术》等中文单行本也颇为畅销。"},{"type":"paragraph","text":"据新华社东京二十八日电　日本书籍出版协会会长、《讲谈社》社长野间省一，最近在日本中国文化交流协会机关刊物《日中文化交流》上发表访华观感。他写道，中国人民高举毛泽东思想伟大红旗，政治挂帅，团结一致，处理国内和国际问题，使他“深受感动”。他说，中国人民对美帝国主义和苏联现代修正主义“采取不妥协的态度，正在加快步伐从事本国的社会主义建设”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba1edf3312"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
