王震主持追悼会","authors":[],"dates":[{"year":1979,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一级教授、著名学者"},{"type":"paragraph","text":"何思敬同志追悼会在京举行"},{"type":"paragraph","text":"叶剑英邓小平李先念陈云等送花圈  王震主持追悼会"},{"type":"paragraph","text":"新华社北京十二月三日电  中国人民大学一级教授、著名学者何思敬同志，因受林彪、“四人帮”极左路线的残酷迫害，于一九六八年四月十四日不幸逝世，终年七十二岁。何思敬同志追悼会十二月三日在北京八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"叶剑英、邓小平、李先念、陈云，以及王震、邓颖超、胡耀邦、彭真等送了花圈。国务院、人大常委会法制委员会、中共中央组织部、中央宣传部、外交部、教育部、中共北京市委、中共浙江省委、中国人民大学、中山大学、中共余杭县委员会也送了花圈。"},{"type":"paragraph","text":"王震、胡耀邦、肖劲光、宋任穷、王昆仑、黄火青、胡乔木、蒋南翔、林乎加、成仿吾等参加了追悼会。参加追悼会的还有教育、理论、外交、法律、翻译工作者和何思敬同志生前友好、家属四百多人。"},{"type":"paragraph","text":"王震同志主持追悼会，中国人民大学校长成仿吾致悼词。"},{"type":"paragraph","text":"悼词说，何思敬同志是浙江余杭县人。一九二七年二月开始参加党领导的革命活动。一九三二年加入中国共产党。一九三八年到延安后，先后担任过抗日军政大学教授、中共中央军委编译处研究员、延安大学法学院院长、延安新哲学会负责人。一九四五年作为候补代表参加了中共第七次全国代表大会。一九四六年，任中共代表团法律顾问，随同毛泽东同志和周恩来同志赴重庆，参加国共谈判。解放战争时期，任中共中央办公厅法律组副组长、中央法律委员会委员等职。全国解放后，历任北京大学教授，中国人民大学系主任，中央法律委员会委员、外交部专门委员、政法学会常务理事。"},{"type":"paragraph","text":"悼词说，何思敬同志是中国共产党的优秀党员，为传播马列主义、为培养我国的政法干部和理论干部做出了显著的成绩。"},{"type":"paragraph","text":"悼词说，何思敬同志多年来翻译出版了马克思的《哥达纲领批判》、《哲学的贫困》、《经济学—哲学手稿》、《论综合技术教育》和恩格斯的《国民经济批判大纲》等著作。还编译出版了德国军事学家克劳塞维茨的《战争论》、黑格尔的《法律哲学批判》和《大逻辑》等。"},{"type":"paragraph","text":"悼词说，何思敬同志的一生是革命的一生，战斗的一生，是为中国无产阶级解放事业忘我地奋斗的一生。他的不幸牺牲，是我党理论战线的一个重大损失。（附图片）"},{"type":"paragraph","text":"何思敬同志遗像  新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"王震","type":"人物"},{"name":"陈云","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2398ff287b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
