:[],"dates":[{"year":1967,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"上海市工农兵文艺会演从四月二十日在街头开幕以来，充分显示它的巨大的政治意义和强大的宣传威力。一支又一支由工人、农民、红卫兵小将和解放军战士组成的文艺小分队，驰骋在工厂、码头、田头和海岛，出现在广场、工人新村和乡村集镇，受到广大工农兵群众的热烈欢迎。"},{"type":"paragraph","text":"文艺小分队是在无产阶级文化大革命中“杀”出来的，他们继承和发扬了老红军宣传队和文工团的光荣的战斗传统，以文艺为武器，向党内最大的一小撮走资本主义道路当权派猛烈开火。他们热情宣传毛泽东思想，为革命派摇旗呐喊，擂鼓助威，坚决捍卫了毛主席的革命路线，使文艺真正起到了宣传群众、组织群众、武装群众的作用。文艺小分队是一支生气勃勃的具有无限生命力的无产阶级文艺新军。他们遵循毛主席的教导，坚持文艺为无产阶级政治服务，文艺为工农兵服务的正确方向，值得专业文艺工作者好好学习。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"041b4c898d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
