art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"六连培养辅导员帮助战士学好毛主席著作","authors":["王大松"],"parts":[{"type":"paragraph","text":"本报讯 6518部队六连积极培养学习辅导员，帮助战士学好毛主席著作。"},{"type":"paragraph","text":"六连长期处于野营和流动环境，战备训练十分紧张，连里规定每周两个晚上集中学习毛主席著作，往往不能实现。以后他们采取分班学习。为了帮助班长组织好毛主席著作学习，党支部决定建立学习辅导员，每班选一名政治思想和文化水平都较高的战士担任。这些辅导员，既是学习毛主席著作的积极分子，又是思想工作的骨干。四班战士高林源、六班战士杨彬等，都通读了《毛泽东选集》第四卷和前三卷的部分文章，他们对连队常用的十多篇文章相当熟悉，不论全班共同性的问题或个别人的问题，他们都能从毛主席著作中找到解决问题的武器。"},{"type":"paragraph","text":"六连党支部非常重视培养辅导员，每逢有新的任务，他们就组织辅导员研究部队思想动向，针对可能出现的问题，从毛主席著作中找出解决问题的钥匙，让辅导员先学一步。辅导员工作遇到问题，连队领导也能及时帮助解决。（王大松）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05a34d3b65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
