952,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"郭根"},{"type":"paragraph","text":"朝鲜停战谈判，在三十天的限期过了之后，两侗小组会议仍然举行着，但迄今什么问题也没解决。因为美方仍在坚持这两点:一是不准我方修建机场；一是交换俘虏一定要在一对一的基础上进行。"},{"type":"paragraph","text":"前者虽经我方一再表示，可以明确规定双方不得输入作战飞机，以消除他们对我方空军力量增涨的恐惧，但是美方仍然死咬住一口不放。那显然就是表明美方不过是想藉此取消我方的防御设备。居心何在，一目了然。"},{"type":"paragraph","text":"关于后者，更是荒谬绝伦。"},{"type":"paragraph","text":"美方坚持要一对一地交换战俘。我们知道在任何战争中，双方也绝不会俘获同等数目的战俘。美方这种要求，绝非出于谈和的诚意，而是在作人口的买卖，也就是奴隶的买卖。"},{"type":"paragraph","text":"在奴隶社会时代，战俘失去了任何的人格而成为了奴隶主的“会说话的工具”，他们是被当作牲畜一样成为了奴隶主的财物。现在，在廿世纪人颊文明的时代，美国法西斯却要把历史的车轮拉问古代奴隶社会。这证明了今天垂死的资本主义已变得如此堕落，如此可耻!"},{"type":"paragraph","text":"而且他们更进一步还想把平民，把起义的朝鲜爱国志士，也要求我方作为战俘交给他们。"},{"type":"paragraph","text":"这就是美方谈和的目的。让全世界人民看看美方这种野蛮与无耻的意图!(郭根)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c80d5efe4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
