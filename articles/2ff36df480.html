联盟的报告稿的批语和修改","authors":["毛泽东"],"dates":[{"year":1955,"month":2,"day":3}],"is_range_date":false,"parts":[{"text":"毛泽东对邓小平关于高岗、饶漱石反党联盟的报告稿的批语和修改","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"刘、陈、彭真、小平阅后，交恩来同志：","type":"appellation"},{"text":"高、饶联盟文件已看了一遍，全文可用，作了一些修改，主要是从第九页起括掉了两段，因为我觉得这个问题不宜这样地在这里辩论，括掉后似乎要好一些，请你们斟酌。刘、陈、彭、邓各同志的修改意见，请于日内即交恩来，以便明日或后日谈一下。","type":"paragraph"},{"text":" 毛泽东二月廿一日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"我们党内曾经出现过陈独秀、张国焘等著名的大叛徒，他们都是阶级敌人在我们党内的代理人，我们曾经进行严肃的斗争驱逐了这些叛徒。有些同志觉得高饶反党联盟是难以理解的现象，这是不了解党的历史、阶级斗争的历史和现状的原\u003c缘\u003e故。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ff36df480"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
