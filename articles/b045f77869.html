"authors":[],"dates":[{"year":1967,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　驻沪空军某部热烈响应毛主席“拥军爱民”的伟大号召，最近开展了声势浩大的爱民活动。"},{"type":"paragraph","text":"连日来，该部各基层单位的广大指战员守卫在各个战斗岗位，在飞机旁，在车棚下，学习和讨论了毛主席的指示，纷纷表示，一定要热烈响应毛主席的爱民号召，热爱人民群众，坚决支持无产阶级革命派，在无产阶级文化大革命中，为保卫毛主席的革命路线立新功，建新劳。该部独立中队以毛主席关于军民关系的指示为指导思想，组织了一个“爱民飞行日”。"},{"type":"paragraph","text":"这个部队还组织了一百多人的宣传队，高擎伟大领袖毛主席的画像，敲锣打鼓到街头宣传。他们赶排了节目，用文艺形式宣传毛主席的伟大号召，受到广大群众的热烈欢迎。"},{"type":"paragraph","text":"现在，这个部队的爱民活动正在深入展开，各连队分别制订了爱民公约，决心把毛主席的爱民号召落实到一切行动中去。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b045f77869"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
