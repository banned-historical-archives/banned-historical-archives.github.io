ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"关于优待日军停房的指示","alias":"","parts":[{"type":"paragraph","text":"关于优待日军俘虏的指示！"},{"type":"paragraph","text":"（1939年2月18日）"},{"type":"paragraph","text":"一、敌军战斗力较前大为减弱，政治情绪更坏，以后在战斗中俘获之日军俘虏应尽量释放，多则不超过两星期，情况许可时当场释放，多加宣传优待，严禁枪杀及其他侮辱行为，在各后方训练之俘虏可酌情处理，如不妨碍军事秘密亦可释放，借此降低日军之作战决心而动摇其军心，以利于粉碎敌之进攻。"},{"type":"paragraph","text":"二、据说日军多数部队中国人占三分之二，日本人仅占三分之一，运输队则全属韩人，是否属实请就地调查电告。"},{"type":"paragraph","text":"毛王谭"},{"type":"paragraph","text":"十八日[1]这是毛泽东和王稼祥、谭政联名给八路军、新四军各部的电报。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":2,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":231,"page_end":231},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"137498d790"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
