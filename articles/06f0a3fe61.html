<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"关于平津战役的作战方针","alias":"","parts":[{"type":"paragraph","text":"关于平津战役的作战方针[1]"},{"type":"paragraph","text":"（1948年12月11日）林、罗、刘："},{"type":"paragraph","text":"一、张家口、新保安、怀来和整个北平、天津、塘沽、唐山诸敌，除某几个部队例如三十五军、六十二军、九十四军中的若干个别的师，在依靠工事保守时尚有较强的战斗力外，攻击精神都是很差的，都已成惊弓之鸟，尤其你们入关后是如此。切不可过分估计敌人的战斗力。我们有些同志过去都吃了过分估计敌人战斗力的亏，经过批评后他们也已懂得了。现在张家口、新保安两敌确已被围，大体上很难突围逃走。十六军约有一半迅速被歼。怀来敌一○四军慌忙南逃，估计今日或明日可能被歼。该敌被歼后，你们准备以四纵由西南向东北切断南口和北平间联系。估计此着不易实现，不是九十四军和十六军残部迅速撤回北平，就是九十四军、十六军和九十二军一起集中南口、昌平、沙河镇区域集团防守。但四纵此举直接威胁北平西北郊和北郊，可以钳制这些敌人不敢动。若"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军事委员会起草的给林彪、罗荣桓等的电报。平津战役是中国人民解放战争中3个有决定意义的最大战役的最后一个。这个战役歼灭和改编了52万多国民党军，解放了北平、天津、张家口等重要城市，基本上结束了解放华北的战争。毛泽东在这里提出的战役方针，得到了完全的实现。这些敌人再敢西进接援三十五军，则可以直接切断其后路或直接攻北平，因此，这些敌人大约不敢再西进。我华北杨罗耿\"兵团以九个师包围三十五军三个师，是绝对优势。他们提出早日歼灭该敌，我们拟要他们暂时不要打，以便吸引平津之敌不好下从海上逃走的决心。他们此次以两个纵队围住三十五军，以一个纵队阻住一〇四军，两敌都被击退。"},{"type":"paragraph","text":"二、我们现在同意你们以五纵立即去南口附近，从东北面威肋北平、南口、怀柔诸敌。将来该纵即位于该地，以便将来（大约在十天或十五天之后，即在华北杨罗耿兵团歼灭三十五军之后）腾出四纵使用于东面。如此，请令五纵本日仍继续西进。"},{"type":"paragraph","text":"三、三纵决不要去南口，该纵可按我们九日电开至北平以东、通县以南地区，从东面威胁北平，同四纵、十一纵、五纵形成对北平的包围。"},{"type":"paragraph","text":"四、但我们的真正目的不是首先包围北平，而是首先包围天津、塘沽、芦台、唐山诸点。"},{"type":"paragraph","text":"五、据我们估计，大约十二月十五日左右你们的十纵、九纵、六纵、八纵、炮纵、七纵就可集中于玉田为中心的地区。我们提议，十二月二十日至十二月二十五日数日内即取神速动作，以三纵（由北平东郊东调）、六纵、七纵、八纵，九纵、十纵等六个纵队包围天津、塘沽、芦台、唐山诸点之敌，如果诸点之敌那时大体仍如现时状态的话。其办法是以两个纵队位于以武清为中心的地区，即廊坊、河西务、杨村诸点，以五个纵队插入天津、塘沽、芦台、唐山、古冶诸点之间，隔断诸敌之联系。各纵均须构筑两面阻击阵地，务使敌人不能跑掉，然后休整部队，恢复疲劳，然后攻歼几部分较小之敌。此时，四纵应由平西北移至平东。我华北杨罗耿兵团应于四纵移动之前歼灭新保安之敌。东面则应依情况，力争先歼塘沽之敌，控制海口。只要塘沽（最重要）、新保安两点攻克，就全局皆活了。以上部署，实际上是将张家口、新保安、南口、北平、怀柔、顺义、通县、宛平（涿县、良乡已被我占领）、丰台、天津、塘沽、芦台、唐山、开平诸点之敌一概包围了。"},{"type":"paragraph","text":"六、此项办法，大体上即是你们在义县、锦州、锦西、兴城、绥中、榆关、滦县线上作战时期用过的办法\"。"},{"type":"paragraph","text":"七、从本日起的两星期内（十二月十一日至十二月二十五日）基本原则是围而不打（例如对张家口、新保安），有些则是隔而不围（即只作战略包围，隔断诸敌联系，而不作战役包围，例如对平、津、通州），以待部署完成之后各个歼敌。尤其不可将张家口、新保安、南口诸敌都打掉，这将迫使南口以东诸敌迅速决策狂跑，此点务求你们体会。"},{"type":"paragraph","text":"八、为着不使蒋介石迅速决策海运平津诸敌南下，我们准备令刘伯承、邓小平、陈毅、粟裕于歼灭黄维兵团之后，留下杜聿明指挥之邱清泉、李弥、孙元良诸兵团（已歼约一半左右）之余部，两星期内不作最后歼灭之部署。"},{"type":"paragraph","text":"九、为着不使敌人向青岛逃跑，我们准备令山东方面集中若干兵力控制济南附近一段黄河，并在胶济线上预作准备。"},{"type":"paragraph","text":"十、敌向徐州、郑州、西安、绥远诸路逃跑，是没有可能或很"},{"type":"paragraph","text":"[1]东北野战军1948年9月在北宁线作战时，为不使义县、锦州、锦西、兴城、绥中、榆关（山海关）、滦县、昌黎之敌收缩集中，采用了先以一少可能的。"},{"type":"paragraph","text":"十一、唯一的或主要的是怕敌人从海上逃跑。因此，在目前两星期内一般应采围而不打或隔而不围的办法。"},{"type":"paragraph","text":"十二、此种计划出敌意外，在你们最后完成部署以前，敌人是很难觉察出来的。敌人现时可能估计你们要打北平。"},{"type":"paragraph","text":"十三、敌人对于我军的积极性总是估计不足的，对于自己力量总是估计过高，虽然他们同时又是惊弓之鸟。平津之敌决不料你们在十二月二十五日以前能够完成上列部署。"},{"type":"paragraph","text":"十四、为着在十二月二十五日以前完成上列部署，你们应该鼓励部队在此两星期内不惜疲劳，不怕减员，不怕受冻受饥，在完成上列部署以后，再行休整，然后从容攻击。"},{"type":"paragraph","text":"十五、攻击次序大约是：第一塘芦区，第二新保安，第三唐山区，第四天津、张家口两区，最后北平区。"},{"type":"paragraph","text":"十六、你们对上述计划意见如何？这个计划有何缺点？执行有何困难？统望考虑电告。"},{"type":"paragraph","text":"军委十一日九时林辣戏我州昨版又接你们办程北年高补二）房永新样除某成个就练"},{"type":"paragraph","text":"对松选基"},{"type":"paragraph","text":"有汤缺蒸执运守性当有赞花送很差的"},{"type":"paragraph","text":"军要十一日九时毛泽东起草的《关于平津战役的作战方针》的手稿。"},{"type":"paragraph","text":"指挥平津战役业"},{"type":"paragraph","text":"1948年11月-1949年1月9491"},{"type":"paragraph","text":"河北"},{"type":"paragraph","text":"解放军第一阶段进攻方向指示战役的关键是稳住北平"},{"type":"paragraph","text":"解放军第二阶段进攻方向天津、张家口、塘法、唐山"},{"type":"paragraph","text":"国民党军集结地域线守积，不使其南逃：在乐北"},{"type":"paragraph","text":"国民党军搬退路线舒战军入关后，子以歼灭"},{"type":"paragraph","text":"办1949,1.15歼灭国民党军地区及时间"},{"type":"paragraph","text":"O解放军包围国民党军地点西柏坡.11-4"},{"type":"paragraph","text":"平津战役示意图。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":369,"page_end":373},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06f0a3fe61"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
