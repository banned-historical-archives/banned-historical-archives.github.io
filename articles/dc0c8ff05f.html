ors":[],"dates":[{"year":1969,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京四日电　中国共产党中央委员会收到了新西兰共产党总书记维·乔·威尔科克斯同志致中国共产党第九次全国代表大会的贺电。威尔科克斯同志在电报中代表新西兰共产党向中国共产党第九次全国代表大会和毛泽东同志致最热烈的兄弟般的祝贺，祝代表大会取得最大的成就。贺电全文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会:"},{"type":"paragraph","text":"新西兰共产党向中国共产党第九次全国代表大会，向社会主义中国和世界一切革命人民的伟大的马克思列宁主义领袖毛泽东同志，致以最热烈的兄弟般的祝贺。新西兰共产党祝代表大会对巩固无产阶级专政取得最大的成就。新西兰共产党欢呼文化大革命的巨大成果及其对发展世界革命运动所起的作用。新西兰共产党把文化大革命，看作是马克思列宁主义革命理论在世界范围建立社会主义时代的一个更高的阶段而表示欢迎。新西兰共产党预祝，第九次全国代表大会和大会的报告将是所有同帝国主义和修正主义进行斗争的人们的无比宝贵的指南和鼓舞。"},{"type":"paragraph","text":"我们两党之间的亲密的同志情谊万岁!"},{"type":"paragraph","text":"马克思列宁主义和世界革命运动万岁!"},{"type":"paragraph","text":"当代的列宁毛主席万岁!"},{"type":"paragraph","text":"新西兰共产党总书记"},{"type":"paragraph","text":"维·乔·威尔科克斯"},{"type":"paragraph","text":"一九六九年四月四日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc0c8ff05f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
