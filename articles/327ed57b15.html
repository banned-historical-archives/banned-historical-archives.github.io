art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"日本首相大平会见廖承志粟裕等"},{"type":"paragraph","text":"日本首相大平正芳二十一日上午在首相官邸会见了“中日友好之船”访日代表团团长廖承志和夫人经普椿，最高顾问粟裕和夫人楚青。"},{"type":"paragraph","text":"廖承志向大平首相转达了华国锋总理、叶剑英委员长、邓小平、李先念副总理、陈云、邓颖超副委员长的问候。"},{"type":"paragraph","text":"会见时，大平首相说，我们两国友好和相互理解的不断增进是难能可贵的。廖承志团长说，中华人民共和国要同日本加强友好的政策没有任何变化，中国同日本发展经济贸易往来的政策也没有变化。今后我们要从一衣带水的友好邻邦日本引进必要的先进技术，日本也可以在这方面对我们进行更多的协助。"},{"type":"paragraph","text":"对此，大平首相表示十分高兴，他说：“我们将采取相应的措施，我相信并且希望我们两国关系将更加广泛、更加深入地发展下去。”"},{"type":"paragraph","text":"廖团长在谈话时表示，华国锋总理希望能及早在北京见到大平首相。大平首相表示要尽快实现访华，并说日本国民也希望华国锋总理到日本来访问。"},{"type":"paragraph","text":"我政府代表团回到北京"},{"type":"paragraph","text":"以外交部副部长韩念龙为团长的中国政府代表团，在河内参加了中越两国副外长级谈判第一轮会议之后，五月二十一日乘专机回到北京。（均据新华社）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"327ed57b15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
