”十年两个历史阶段","authors":["张新颖"],"dates":[{"year":1995,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者张新颖)汇聚“五四”以来新文学优秀成果的精粹总集《中国新文学大系》的编选工作进入新的阶段，新中国成立以后部分的编选工作日前开始启动，着手进行的第四辑选文起迄年度从1949年10月至1976年10月，即新中国成立后的十七年和“文革”十年两个历史阶段。"},{"type":"paragraph","text":"《中国新文学大系》第一辑共十册由赵家璧于三十年代组织编选，八十年代初，上海文艺出版社重新影印出版了第一辑，并组织编选第二、三辑，继续这一重大的文学工程。去年年底，第三辑“资料卷”出版，至此，新中国成立前全部编选完成。"},{"type":"paragraph","text":"现在，这一工程延续至新中国成立以后部分的编选，计划从1949年至2000年分为第四辑、第五辑，二辑规模估计都是25册，这样《大系》总计100册，将是唯一的一套完整的具有权威性的20世纪中国新文学精粹。"},{"type":"paragraph","text":"目前着手编辑的第四辑，分理论、小说、散文、杂文、诗、报告文学、戏剧、电影卷，选文跨度27年。考虑到本辑选文所处的“十七年”和“文革”两个历史阶段的具体情况，对某些在当时具有代表性或产生过很大社会影响而质量方面比较一般的作品，也给予适当考虑，以反映新文学发展的历史全貌。在本辑选文年度内，台湾、香港、澳门作家的作品，不管于何处发表，均在编选之列。日前，各分卷主编已经落实，张光年先生撰写总序。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b75ee7026a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
