<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"以斗私、批修为纲，加强干部教育","authors":["《解放军报》编辑部社论"],"dates":[{"year":1967,"month":10,"day":4}],"is_range_date":false,"parts":[{"text":"以斗私、批修为纲，加强干部教育","type":"title"},{"text":"《解放军报》编辑部社论","type":"authors"},{"text":"伟大领袖毛主席最近号召我们，要用“斗私，批修”这四个字为纲，加强对于军队干部、地方干部和红卫兵的思想教育。这是毛主席对全军、全国干部和红卫兵革命小将的最大关怀和爱护，是无产阶级文化大革命胜利发展新形势下的一项具有深远意义的重大战略措施。我军全体干部必须坚决响应，坚决照办，认真领会，认真执行。","type":"paragraph"},{"text":"革命的干部，是革命的宝贵财富。毛主席历来十分重视干部的思想教育，十分重视教育和团结干部的大多数。","type":"paragraph"},{"text":"毛主席指出：“必须善于爱护干部。”“给以学习的机会，教育他们，使他们在理论上在工作能力上提高一步”。“检查他们的工作，帮助他们总结经验，发扬成绩，纠正错误。”“对于犯错误的干部，一般地应采取说服的方法，帮助他们改正错误。”“只有对犯了严重错误而又不接受指导的人们，才应当采取斗争的方法。”","type":"paragraph"},{"text":"一年多来无产阶级文化大革命的实践证明，我军广大干部都是忠于毛主席，忠于毛泽东思想，忠于毛主席的无产阶级革命路线的。他们不仅在几十年的革命战争中，紧跟毛主席，对革命事业作出了重要贡献，在社会主义时期两个阶级、两条道路、两条路线的斗争中，他们同样是紧跟毛主席，为人民立下新的功勋。","type":"paragraph"},{"text":"无产阶级文化大革命是史无前例的革命运动，“三支”“两军”工作是一个崭新的艰巨任务。为着适应社会主义革命和无产阶级文化大革命运动迅速向前发展的新形势，圆满完成党和毛主席交给我们的重大历史任务，我们的全体干部都需要学习。犯过错误的同志要学，没有犯过错误的同志也要参加学习，同大家一起，总结经验，提高自己的政治思想水平。要使广大干部普遍地受到教育，得到提高。","type":"paragraph"},{"text":"加强干部思想教育必须以“斗私，批修”为纲。这是毛主席给我们指出的社会主义时期政治思想教育的唯一正确的政治方向。以“斗私，批修”为纲，就是要用马克思列宁主义、毛泽东思想同自己头脑里的“私”字作斗争，用马克思列宁主义、毛泽东思想去反对修正主义，同党内一小撮走资本主义道路的当权派作斗争。“私”字是资产阶级世界观的核心，是修正主义生存和发展的思想根源。只有在批修的同时，从头脑中彻底铲除“私”字，才能真正同修正主义划清界线，挖掉修正主义的根子，大树毛泽东思想的绝对权威，大树毛主席的无产阶级革命路线的绝对权威，保证我们国家永不变色。","type":"paragraph"},{"text":"以“斗私，批修”为纲加强干部教育，要靠干部自己教育自己。这就是说，必须按照毛主席关于正确处理人民内部矛盾的教导，按照“团结——批评和自我批评——团结”的公式，惩前毖后，治病救人。同志们应该深刻体会伟大领袖毛主席对我们的亲切关怀和期望，自觉地进行批评和自我批评。对于自己的缺点和错误，主要的是通过自我批评，自己革自己的命，自己改造自己，肃清修正主义的影响，改造世界观。","type":"paragraph"},{"text":"战无不胜的毛泽东思想是“斗私，批修”的强大武器，活学活用毛主席著作是加强干部教育的根本。同志们只要能够联系无产阶级文化大革命的形势，联系自己过去的工作，联系自己的活思想，带着问题认真地读毛主席的书，在“用”字上狠下功夫，就一定能够发扬成绩，纠正缺点或错误。","type":"paragraph"},{"text":"让我们伟大的人民解放军干部同无产阶级革命派和广大革命群众一起，群策群力，为夺取无产阶级文化大革命的彻底胜利，作出更大的贡献！","type":"paragraph"},{"text":"（原载《解放军报》1967年10月4日）","type":"appellation"}],"comments":[],"origin":"原载《解放军报》1967年10月4日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be03156f74"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
