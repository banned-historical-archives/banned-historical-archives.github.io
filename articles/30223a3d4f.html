" crossorigin="">{"props":{"pageProps":{"books":[{"id":"9106ccd3-708b-474c-84a4-a2b0ae19bff3","name":"红旗一九六二年第二十三、二十四期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/9106ccd3-708b-474c-84a4-a2b0ae19bff3.pdf"],"article":{"title":"尼赫鲁推行反华政策的“代价”","alias":"","parts":[{"type":"paragraph","text":"维地批制了普列汉酷夫的孩卖和至曲写克思主义的行为。列宁在号召人们应当尽力研究和运用肠克思主义理验的时候，价特别指用：“能如果在我们这个时代不同普列汉诺夫、考关基之流曲这种理的行为进行无情的斗，就不能做一个社会主义者，不能做一个革命的社会民主党人。”o"},{"type":"paragraph","text":"十一月二十七日，印度总理尼赫鲁在一次公众集会上成，“不要用多少时间，不要花什么代价，我们部将对付中国的挑战。尼赫急政府用扩票主义的政策，来对付中国政府在任何情况下都主强和平制解决中印边界题的“提战”，使印度已特出什么代价，还要付出什么代会呢？"},{"type":"paragraph","text":"印度是世界上得到美“樱”最多的园"},{"type":"paragraph","text":"亿越鲁推行家。到个年七月底已经达到六十五亿多"},{"type":"paragraph","text":"反华政策的代价美元，其中自一九五九年尼牌鲁积极反华以来，就有三十八亿多美元。为了报答美国这种“做”的“援助”，早在一九五一年尼赫鲁政府和美国政府就订立了秘密军事协定，最近又达成了关于年授调题的正式协液。根据这种协定和协器，印度政府有义务向美国政府“提供情报，而美国使人具期有权利在印度领土上到处进行“肌察”，有权利对美“授”的使用进行“指导”和“监督”。大量美元的还本付息，是“套在印度子上的一根经绳”，正像英因《观察家报》所配的，它已经使印度一步一步地变成了“美国的政治基地”"},{"type":"paragraph","text":"印度是世界上捐税最重的国家，但是，尼鲁政府为了支付已经成信增长并且还要念剧增加的罩事预算，为了避照美国的冒意，把印度军队扩充到"},{"type":"paragraph","text":"修正主义不是偶然的现象，达在个别人疑包合着叶多值得注意的历史数测。我们回头考一下这些历史教肌，对于在现实斗学中增长酸见无疑是有好处的。《独国吐会党入的正直呼声》.《列宁全》第21"},{"type":"paragraph","text":"卷第333真的“社会名”甚至呼呼“四亿二千万每天吃不上两额绝能”的印度人民“每星期省吃一顿倾”。"},{"type":"paragraph","text":"印度当局于十月二十六日宜布进入“紧急状态”，颁布“保卫印度法”，宣布停止执行“保证所有人在法律面前平等”的条款，停止执行保障营、"},{"type":"paragraph","text":"粘社、行动和居住自由等条款。印度当局明合：在“紧念状态”下，人民不要工，不新陕中国和平蒙判的建，对那些敢于公开批环印度政府政策的人不相信所中国路脱的人，一律加以邀抽。人民无权控告当局对他朵取的一切行动，无权了解被捕理由，无权进行护，审鼠和宜判可以在“特别法庭秘密进行。"},{"type":"paragraph","text":"印度统治集团要印度人民付出这样崔承楷"},{"type":"paragraph","text":"高、这样大的代价，来推行反华政策，他们不可告人的目的究贰是什么呢？他行自以为可以一手恶尽印度人民的耳目，可以用含蒙截印度人民的良知，但是事与原这，印度人民中知道他们这种不可告人目的的人越来越多了。英国《观察"},{"type":"paragraph","text":"家报》刊登的一期报道中：“已经可以在旁普邦和其他一些处于战时状态的那里发现有许多人同道，为什么他们的儿子要为保护加尔各答和孟买的商人而死。一没有精果的长期战争会"}],"authors":["瞿承楷"],"dates":[{"year":1962,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":57,"page_end":57},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30223a3d4f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
