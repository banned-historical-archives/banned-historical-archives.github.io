ar":1947,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏北民谣中的"},{"type":"paragraph","text":"共产党和毛主席"},{"type":"paragraph","text":"（一）"},{"type":"paragraph","text":"大釉稻，黄又黄，"},{"type":"paragraph","text":"今年变成我的粮。"},{"type":"paragraph","text":"感谢恩人共产党，"},{"type":"paragraph","text":"算帐分田帮我们穷人忙。"},{"type":"paragraph","text":"（二）"},{"type":"paragraph","text":"东西地长又长，"},{"type":"paragraph","text":"小三娶个大姑娘，"},{"type":"paragraph","text":"在家能纺纱，"},{"type":"paragraph","text":"下地能帮忙，"},{"type":"paragraph","text":"人人见，喜洋洋，"},{"type":"paragraph","text":"都说小三命运强。"},{"type":"paragraph","text":"小三摇摇头："},{"type":"paragraph","text":"“不是命运强不强，"},{"type":"paragraph","text":"靠的救命恩人共产党，"},{"type":"paragraph","text":"要不是分田和分地，"},{"type":"paragraph","text":"那有我小三娶的大姑娘？"},{"type":"paragraph","text":"（三）"},{"type":"paragraph","text":"共产党，万万年！"},{"type":"paragraph","text":"有了共产党穷人才见天。"},{"type":"paragraph","text":"（四）"},{"type":"paragraph","text":"太阳一出红通通，"},{"type":"paragraph","text":"太阳好比毛泽东，"},{"type":"paragraph","text":"五谷没太阳不生长，"},{"type":"paragraph","text":"穷人没毛主席万年穷。"},{"type":"paragraph","text":"（五）童谣："},{"type":"paragraph","text":"毛泽东，暖烘烘，"},{"type":"paragraph","text":"大家来，一鞠躬。"},{"type":"paragraph","text":"（六）老太婆供奉毛主席像每天祝词"},{"type":"paragraph","text":"白米饼、喷喷香，"},{"type":"paragraph","text":"毛主席，请你尝尝！"},{"type":"paragraph","text":"不是你帮忙，"},{"type":"paragraph","text":"我家那有米饼香？"},{"type":"paragraph","text":"（新华社华中电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"555ec391fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
