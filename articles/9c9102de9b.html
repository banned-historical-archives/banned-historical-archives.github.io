<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"国务院关于严格禁止楼馆堂所建设的补充规定","authors":[],"dates":[{"year":1964,"month":7,"day":24}],"is_range_date":false,"parts":[{"text":"国务院关于严格禁止楼馆堂所建设的补充规定","type":"title"},{"text":"国务院关于严格禁止楼馆堂所建设的规定发出以后，不少地区和部门提出一些具体问题，现补充规定如下。","type":"paragraph"},{"text":"一、关于楼馆堂所的范围。","type":"paragraph"},{"text":"除已经规定的宾馆、招待所、别墅、大会堂、大礼堂、展览馆、剧院以及干部高级宿舍等都属于楼馆堂所外，其他如纪念馆、高标准的电影院、俱乐部、文化宫，也应视同楼馆堂所处理。","type":"paragraph"},{"text":"食堂兼礼堂，视同礼堂处理。","type":"paragraph"},{"text":"二、属于下列生产、事业用的房屋，服务性的设施和公共福利设施，不应视为楼馆堂所。","type":"paragraph"},{"text":"（一）城、乡和企业事业单位建设的医院、诊疗所和门诊部，以及采取低标准建设的疗养院；","type":"paragraph"},{"text":"（二）事业单位按业务需要建设的低标准的教学楼、研究楼、实验楼、资料楼、图书馆、档案馆以及运动员练习用的房屋和演员排演用的房屋；","type":"paragraph"},{"text":"（三）企业或工矿区建设的劳动保护福利用房、阅览室、运动场和低标准的小型俱乐部、电影院等文化福利设施；","type":"paragraph"},{"text":"（四）城镇服务性行业为适应群众需要，建设低标准的旅馆、浴室、理发馆、公共食堂和商业零售门市部等；","type":"paragraph"},{"text":"（五）职工宿舍、学校校舍和部队营房以及在宿舍或营房中附设接待来客或探亲家属的简易招待所。","type":"paragraph"},{"text":"三、关于办公房屋的建设。","type":"paragraph"},{"text":"原有的党、政机关、部队、团体一律禁止新建办公楼。新成立的单位，必须先从现有的办公房屋中调剂使用。经过调剂确实不能解决，必须建设低标准的办公用房时，中央和省一级机关要经过国务院批准，专区及相当专区以下的机关由省、自治区和直辖市人民委员会批准。","type":"paragraph"},{"text":"新建企业必须建设办公房屋的，应当采取低标准，并视同一般基本建设工程处理。","type":"paragraph"},{"text":"四、关于建筑标准。","type":"paragraph"},{"text":"一切非生产性建设的建筑标准，都不应当超过当地一般职工宿舍的建筑标准。在这个标准以下的为低标准，超过这个标准的为高标准。","type":"paragraph"},{"text":"高标准的城市建设工程是指超过当地近期需要的大广场、大公园、大马路和其他城市建设工程。","type":"paragraph"},{"text":"五、关于楼馆堂所的翻修。","type":"paragraph"},{"text":"现有楼馆堂所和办公房屋的日常维修，以及危险房屋必要的翻修，仍按一般房屋的维修和翻修处理。严格禁止借口维修、翻修，扩大现有楼馆堂所的建筑面积，或提高现有建筑的标准。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c9102de9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
