ates":[{"year":1956,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"雕刻象牙老艺人杨士惠"},{"type":"paragraph","text":"将刻制“毛主席家乡”"},{"type":"paragraph","text":"本报讯　北京市雕刻象牙生产合作社老艺人杨士惠，正在制作“毛主席家乡”的泥塑模型。"},{"type":"paragraph","text":"为了真实地反映“毛主席家乡”——韶山地区的新的优美面貌和劳动情景。杨士惠决定花费部分精力搞个“泥塑草稿”。"},{"type":"paragraph","text":"这件泥塑11月初就开始制作了。杨士惠还邀请了著名的捏人艺人郎绍安（即面人郎）协助他制作作品上的一百多个人物，准备再次征求美术家们的意见后12月中旬开始在一百一十八斤重的象牙料上动手雕刻。　　（白瑀）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c00d214e71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
