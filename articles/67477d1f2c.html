script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚定不移站在伟大领袖毛主席的革命路线一边  和革命群众革命干部一起把夺权斗争进行到底","authors":[],"dates":[{"year":1967,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黑龙江省军区部队隆重举行誓师大会"},{"type":"paragraph","text":"坚定不移站在伟大领袖毛主席的革命路线一边"},{"type":"paragraph","text":"和革命群众革命干部一起把夺权斗争进行到底"},{"type":"paragraph","text":"新华社哈尔滨十二日电在支持无产阶级革命派夺权斗争中创立了新功的中国人民解放军黑龙江省军区部队，十日隆重举行坚决支持无产阶级革命派把夺权斗争进行到底誓师大会。指战员们向最敬爱的伟大领袖毛主席宣誓：坚决把毛主席关于人民解放军应该积极支持左派广大群众的指示，更好地落实在行动上，誓和全省革命群众、革命干部团结在一起，战斗在一起，胜利在一起，把夺权斗争进行到底，为建设新政权，巩固新政权作出更大贡献。"},{"type":"paragraph","text":"《人民日报》就黑龙江省红色造反者夺权斗争的基本经验所发表的社论，在黑龙江省军区部队指战员中引起了强烈的反响。指战员们激动地说：“这是毛主席的声音！”“这是毛主席、党中央对我们的最大信任、最大关怀、最大鼓舞！”省军区部队指战员，当即举行坚决支持无产阶级革命派把夺权斗争进行到底誓师大会。他们冒着严寒，迈着整齐的步伐，敲锣打鼓，雄赳赳气昂昂，精神焕发地从四面八方来到会场。会场上红旗招展，欢呼声、口号声响成一片，充满了革命的战斗气氛。"},{"type":"paragraph","text":"大会在庄严的《东方红》歌声中开始。指战员们捧着红彤彤的《毛主席语录》，齐声朗读：“紧紧地和中国人民站在一起，全心全意地为中国人民服务，就是这个军队的唯一的宗旨。”“帝国主义者和国内反动派决不甘心于他们的失败，他们还要作最后的挣扎。在全国平定以后，他们也还会以各种方式从事破坏和捣乱，他们将每日每时企图在中国复辟。这是必然的，毫无疑义的，我们务必不要松懈自己的警惕性。”"},{"type":"paragraph","text":"黑龙江省军区司令员汪家道在大会上讲了话。他说，毛主席号召我们，人民解放军应该积极支持左派广大群众。我们坚决响应毛主席的伟大号召，坚定不移地站在毛主席的革命路线一边，站在无产阶级革命造反派一边，坚定地、毫不动摇地支持无产阶级革命派，坚决地、狠狠地镇压反革命组织和反革命分子的一切破坏活动。"},{"type":"paragraph","text":"汪家道说，我们要牢记毛主席的教导，相信群众，依靠群众，尊重群众的首创精神。我们要向英勇的红卫兵革命小将学习，向无产阶级革命造反派学习，学习他们敢想、敢说、敢干、敢闯、敢革命的无产阶级革命造反精神；学习他们天不怕、地不怕，誓死保卫毛主席的正确路线的大无畏精神；学习他们彻底批判旧世界、创造新世界的革命首创精神。"},{"type":"paragraph","text":"最后他代表黑龙江省军区全体指战员向毛主席宣誓：永远高举毛泽东思想伟大红旗，同广大革命群众、革命干部紧密团结在一起，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"参加镇压所谓“荣复军”反动组织的某部代表、政治指导员张永福在会上表示，坚决把毛主席的伟大号召刻在脑子里，溶化在血液中，落实在行动上，全心全意地、毫不含糊地支持无产阶级革命派夺权。"},{"type":"paragraph","text":"在热烈的掌声和欢呼声中，大会通过了给伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席的致敬电。"},{"type":"paragraph","text":"大会自始至终充满着强烈的革命战斗气氛，指战员们挥动红光闪闪的《毛主席语录》，一遍又一遍地高呼：“毛主席万岁！万岁！万万岁！”显示了人民解放军永远忠于毛主席，坚决支持无产阶级革命派，把夺权斗争进行到底，把被一小撮党内走资本主义道路当权派篡夺的党、政、财、文等各种大权统统夺回来的钢铁意志和坚强决心。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"黑龙江文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67477d1f2c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
