art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掌握思想武器搞好自身教育山东省军区党委联系实际系统学习邓小平同志关于坚持四项基本原则、反对资产阶级自由化的重要论述","authors":["高建忠管国志"],"parts":[{"type":"paragraph","text":"本报讯 高建忠、管国志报道：山东省军区党委把系统学习邓小平同志关于坚持四项基本原则、反对资产阶级自由化的重要论述，作为搞好自身教育的首要问题来抓，他们体会到，只有掌握好思想武器，学习才能深入，认识才能提高得快。"},{"type":"paragraph","text":"他们在2月初集中一个星期学习邓小平同志的有关论述，着重提高对坚持四项基本原则、反对资产阶级自由化重大意义的认识。学习中，大家联系党的十一届三中全会以来改革、开放所取得的成绩，领会邓小平同志关于“党的十一届三中全会决定实行开放政策，同时也要求刹住自由化的风，这是相互关联的问题”的论述的精神实质。大家还联系到军队自十一届三中全会以来出现的可喜变化，进一步认识到，四项基本原则也是建军之本。"},{"type":"paragraph","text":"目前，山东省军区党委成员已带领六个工作组，奔赴千里海岛部队，同基层干部战士一起学习讨论，开展正面教育，同时也进一步充实自己的学习成果。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"山东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a699e0a619"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
