<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西北局关于制止各地非法检查信件的指示","authors":[],"dates":[{"year":1953,"month":3,"day":9}],"is_range_date":false,"parts":[{"text":"西北局关于制止各地非法检查信件的指示","type":"title"},{"text":"收报纸（3月）","type":"paragraph"},{"text":"总号 44","type":"paragraph"},{"text":"等级 AAA  由 西北局 来  科号83","type":"paragraph"},{"text":"新疆分局、各省市委、并报中央：","type":"appellation"},{"text":"据西北公安局报告，各地机关、学校、企业部门、群众团体检查信件的现象相当普遍，使党与政府在人民群众中的政治威信遭受损失。西安市人民银行、保险公司、贸易公司、税务局三分局、国营新西北印染厂、人民搪瓷厂、公私合营大华纱厂、西北区银行学校，陕西省商县的银行、贸易公司、税务局、卫生局，商县、柞水的个别区，兰州市的五一公司、汽车基层公会、西北卫生学校，宁夏省银行、工业厅、报社、新城区电厂，青海化隆贸易公司、贵德、乐都等县公安局，新疆岳普湖县委、迪化海关和某些工厂、学校、焉耆、阿图什、巴楚、吐鲁番、婼羌等县公安局，都擅自检查信件；绥德公安处竟授权绥德师范党支部保卫干事检查某人信件，被其发觉，告到专署；甘肃天水某银行营业所检查信件，致某人在大会上朗诵共同纲领来抗议，影响极坏，迪化有人反映说：“究竟从口内来参加建设工作的人有什么罪过，犯了什么法，连信都要检查了。”","type":"paragraph"},{"text":"这种因在对敌斗争上有特殊需要时，西北公安局指定建立之专门机构秘密进行信件检查者外，其他机关或个人无论在邮局或本机关内检查信件均属非法。为制止非法检查信件，切实保证人民通讯自由，希即进行如下措施：","type":"paragraph"},{"text":"（一）各级党委应对所属机关、学校、企业部门、群众团体进行一次普遍的检查，立即停止信件检查，教育所属单位的党员干部，特别是行政、人事、保卫部门的负责干部，切实保证人民通讯自由。","type":"paragraph"},{"text":"（二）严禁在国际、国内统一战线活动中服务的人员及执行外宾的机关进行对统战人员及外宾的信件检查，这些部门的党组和负责同志应切实掌握。","type":"paragraph"},{"text":"（三）凡自行设有信件检查制度的机关、企业、学校、团体，特别是因非法检查扣留信件已在机关内部群众中造成恶劣影响者，均应在各该机关适当的群众会上宣布取消这种制度，并由各该单位的负责同志进行必要的检讨。","type":"paragraph"},{"text":"（四）农村区乡干部中非法检查居民信件的行为，应结合反对违法乱纪的斗争，根据情况进行检查和适当的教育处理。","type":"paragraph"},{"text":"（五）对擅自检查信件的单位及个人，应根据情节轻重，进行适当的教育和批评，经检查纠正后仍继续发生的非法乱检行为，应予纪律或法律的处分。","type":"paragraph"},{"text":"各地按照以上措施进行的情况，均于四月五日前写来报告。","type":"paragraph"},{"text":" 中共中央西北局一九五三年三月九日","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6711b7f86c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
