s":[{"year":1950,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】北京廿九日消息:十二月卅日为罗马尼亚人民共和国成立三周年纪念，我中央人民政府毛泽东主席和外交部周恩来部长，在廿九日分别打电报给该国国民议会主席团主席巴洪和外交部部长波克，表示祝贺，电文如下:"},{"type":"paragraph","text":"(一)毛主席致巴洪主席电"},{"type":"paragraph","text":"罗马尼亚人民共和国国民议会主席团主席康斯坦丁。依。巴洪先生:"},{"type":"paragraph","text":"欣逢罗马尼亚人民共和国成立三周年纪念，我代表中华人民共和国政府及人民，谨向阁下及罗马尼亚人民致庆贺之忱，并祝罗马尼亚人民共和国的繁荣与日俱增。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东"},{"type":"paragraph","text":"一九五○年十二月廿九日北京"},{"type":"paragraph","text":"(二)周恩来外长致波克外长电罗马尼亚人民共和国政府外交部安娜。波克部长阁下:"},{"type":"paragraph","text":"欣逢罗马尼亚人民共和国成立三周年纪念，谨向阁下、罗马尼亚政府及人民，致热烈的庆贺。"},{"type":"paragraph","text":"中华人民共和国外交部部长周恩来"},{"type":"paragraph","text":"一九五○年十二月廿九日北京"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"196bde2296"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
