朝战士数字的疑问","authors":[],"dates":[{"year":1952,"month":1,"day":21}],"is_range_date":false,"parts":[{"text":"湖南各地不少干部和群众对美帝俘掳中朝战士数字的疑问","type":"title"},{"text":"【湖南分社二十一讯】最近湖南各地不少干部和群众，对朝鲜停战谈判第四项议程中关于俘虏数字有许多疑问，不知为什么“美方俘掳了我们十七万六千多人，而我们却只俘掳敌人一万一千多人”。群众有的人说：“报上天天说我们打胜仗，看来并不是真的”。有的人说：“过去我们虽然释放了一些俘虏，但目前双方被俘人数也不会相差这么远”。“朝、中人民军战士都是宁死不屈的勇士，决不当俘虏，为什么我们被俘的人这样多”？积极分子想解释，但说不出更多的道理。有的解释说：“我方被俘人员中大多是北朝鲜人。”有的人说：“过去美国鬼子俘掳的有很多是朝鲜老百姓，志愿军过江后就带到南朝鲜去了。”","type":"paragraph"}],"comments":[],"origin":"1952年1月22日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"375488b1b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
