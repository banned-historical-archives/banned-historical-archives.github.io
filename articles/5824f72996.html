rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想光辉照亮文化革命胜利道路各部队学习毛主席著作积极分子表示最坚决支持红卫兵革命精神；高举毛泽东思想伟大红旗，把无产阶级文化大革命进行到底","authors":[],"parts":[{"type":"paragraph","text":"据新华社五日讯 人民解放军各部队许多学习毛主席著作积极分子，热烈欢呼红卫兵小将们在文化大革命运动中冲锋陷阵创建的伟大功勋，表示最坚决地支持小将们的革命精神和革命行动，更高地举起毛泽东思想伟大红旗，在伟大统帅毛主席的指挥下，以十六条为武器，横扫一切牛鬼蛇神，大破“四旧”，大立“四新”，大立毛泽东思想，坚决把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"这些活学活用毛主席著作的积极分子，在赞扬红卫兵小将的敢想、敢说、敢干、敢闯、敢革命的无产阶级革命精神时，都指出，他们的力量来源于伟大的毛泽东思想，是毛泽东思想的新胜利。济南部队学习毛主席著作积极分子、王杰生前战友钱正康说，红卫兵小将最听毛主席的话，毛主席怎么说，他们就怎么做，毛主席指到哪里，他们就冲向哪里。他们在大破“四旧”，大立“四新”的革命运动中创立的一切功勋，都是在伟大的战无不胜的毛泽东思想光辉照耀下取得的。"},{"type":"paragraph","text":"各部队许多学习毛主席著作积极分子还以自己的亲身体会说明，只有掌握了伟大的毛泽东思想的人，才能最勇敢、最聪明，真正作到敢于斗争，敢于革命，善于斗争，善于革命。沈阳部队某部二连是个老红军连。这个连队的学习毛主席著作积极分子在座谈会上说，我们深深体会到，毛主席的话听得越认真，党的政策执行得越坚决，革命事业的发展就越快，胜利就越大。“海上猛虎艇”副指导员傅金泉说，毛主席教导我们：帝国主义和一切反动派都是纸老虎。我们遵照毛主席的这一教导，在去年崇武海战中曾用小艇击沉击伤了敌人的大舰。在当前的无产阶级文化大革命中，红卫兵小将们发扬大无畏的无产阶级革命精神，冲锋陷阵，所向披靡，这些活生生的事实说明，我们有战无不胜的毛泽东思想这个最锐利的武器，我们就无比勇敢，无比聪明，和拿枪的敌人斗，把他打了个稀巴烂；和不拿枪的敌人斗，同样把他打得稀巴烂。"},{"type":"paragraph","text":"许多部队的学习毛主席著作积极分子还一致表示，毛主席亲自主持制定的十六条，是无产阶级文化大革命的伟大纲领。认真地、全面地、彻底地、不折不扣地贯彻执行十六条，是取得文化大革命彻底胜利的根本保证。沈阳部队雷锋生前所在班战士们表示：伟大的毛泽东思想是我们的粮食、武器和方向盘。毛泽东思想的光辉照亮了文化大革命的胜利道路。我们坚决做红卫兵小将们的坚强后盾，高举毛泽东思想伟大红旗，以十六条为武器，进一步投入无产阶级文化大革命的新高潮，把文化大革命进行到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5824f72996"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
