中央军委关于全军整党工作部署的通知（摘录）","dates":[{"year":1983,"month":10,"day":25}],"is_range_date":false,"authors":["中央军委"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"成都军区整党办公室, 清理“三种人”工作文件摘编, 31","tags":[{"name":"军队","type":"主题/事件"},{"name":"三种人","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"中央军委关于全军整党工作部署的通知（摘录）"},{"type":"subtitle","text":"〔1983〕19号"},{"type":"subtitle","text":"（一九八三年十月二十五日）"},{"type":"paragraph","text":"总的看，我军党的组织和党员队伍的主流是好的，特别是十一届三中全会以来，党的状况有了明显的改善，但是仍然存在思想、作风、组织上严重不纯的问题，必须通过整党坚决有效地加以解决。我军是人民民主专政的坚强柱石，搞好这次整党，统一思想，整顿作风，加强纪律，纯洁组织，特别是把“三种人”和他们的“军师”清理出来，对进一步巩固和加强党对军队的绝对领导，使枪杆子牢牢地掌握在马克思主义者手里，对加速我军革命化、现代化、正规化建设，具有决定性的意义。"},{"type":"paragraph","text":"……"},{"type":"paragraph","text":"要抓住纯洁组织这个关键问题，按党章规定，把坚持反对党、危害党的分子清理出来，开除出党。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c10ed1f5a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
