script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于区域自治问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于区域自治问题的批语"},{"type":"paragraph","text":"（1950年9月16日）刘、周、朱、任、李维汉同志："},{"type":"paragraph","text":"区域自治问题，牵涉很广，有西藏、青海、宁夏、新疆、甘肃、西康、云南、广西、贵州、海南、湘西等处，有的须成立内蒙那样的大区域政府，有的须成立包括几个县的小区域政府，有的是一个县或一个区的政府，疆域划分，人员配备，政策指导，问题甚多，须加统筹。此电所称东藏自治区域，是与西康省政府并立的，还是属于西康之内的？其疆域如何？是否事前得到中央批准？请维汉查告，或去电询问。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十六日"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。朱，指朱德。任，指任弼时。李维汉，当时任中共中央统战部部长、中央人民政府民族事务委员会主任委员。"},{"type":"paragraph","text":"[2]指中共西康区委1950年9月6日关于建立东藏自治区域人民政府问题给西南局并第十八军张国华、谭冠三等的电报。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":9,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":161,"page_end":161},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8447a4c33"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
