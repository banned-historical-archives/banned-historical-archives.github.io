<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"确定富农成份应按其封建剥削计算","authors":[],"dates":[{"year":1948,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"确定富农成份应按其封建剥削计算"},{"type":"paragraph","text":"问：在计算剥削量的问题上，我有几个疑问请答复："},{"type":"paragraph","text":"（一）富农的工商业剥削与对雇工及其他高利贷地租等封建剥削，是合并计算，还是分别计算？工作中有的合并有的分别，各执一理。一说百分之二十五的剥削量是指一切剥削（资本主义的和封建的）在内，故合并计算。另一说认为如把封建剥削和资本主义的工商业剥削合并计算，即提高成份，过去侵犯工商业就是因为合并计算而提高成份所致。那个说法对？请答复。"},{"type":"paragraph","text":"（二）地租、债息对纯地主纯债主来说其纯收入就是总收入，那么对富农兼有部分土地出租或放债，是否也可这样说？"},{"type":"paragraph","text":"（三）医生、小学教员、革命战士都算作为主要劳动，那么在计算其家中剥削量时，其总收入应包括什么？剥削量如何计算？"},{"type":"paragraph","text":"刘俊一"},{"type":"paragraph","text":"答：（一）富农的主要特征，是其一方面为独立劳动者；一方面经常依靠以半封建方法剥削雇工或其他封建剥削的收入作为其主要或重要生活来源。有的富农并兼营工商业，还有资本主义的剥削收入，所以在确定富农成份的时候，主要是看其各种封建半封建剥削收入的总和是否超过百分之二十五。其兼营工商业所产生的资本主义剥削部分，不应与封建剥削部分合并计算，因为在新民主主义经济制度之下，只消灭封建半封建剥削，工商业生产有益于国民经济，经营工商业生产所产生的资本主义剥削是允许其存在的。但假如某农民的封建剥削部分已占其总收入百分之二十五，如尚有其他资本主义剥削，则应划成富农成份。"},{"type":"paragraph","text":"（二）纯粹地主、债主，其总收入即其纯收入，因为他们除了封建土地所有权，及高利贷的封建债权而外，对于全部生产过程不参加劳动，不投入成本。富农如兼有部分土地出租，或放债，在出租土地收取地租及放债收利息这一点上，和纯粹地主债主相同。但因为富农不单纯出租土地、放债，他自己还参加主要劳动或雇工耕种，对生产过程得花费耕畜、农具、籽种、肥料等成本，所以其总收入不能等于纯收入。"},{"type":"paragraph","text":"（三）医生、小学教员、革命战士都算主要劳动，他们的收入应算入其家庭总收入之内。医生、教员本人的收入不包含剥削收入，（因他本人即算劳动者）所以计算其家庭的剥削量时，只按其家庭实际的剥削量计算。至于革命战士，其本人实际上没有什么收入，其家庭因缺乏劳力而雇工耕种，则不算剥削。在计算其家庭的剥削量时，对代替其劳动的雇工所生产的剩余价值，不应计入剥削量内。此外，如有其他封建剥削，则照样计算。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4e17d8372"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
