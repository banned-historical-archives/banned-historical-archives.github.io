rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阳光照山村山村一片红——记某部驻东石桥大队宣传队帮助贫下中农活学活用毛泽东思想的故事","authors":[],"parts":[{"type":"paragraph","text":"座落在胶东半岛昆嵛山脚下的东石桥大队，是一个只有百十户人家的偏僻山村。这个山村，经过无产阶级文化大革命的战斗洗礼，在毛泽东思想的阳光照耀下，到处是一片朝气蓬勃的革命景象。"},{"type":"paragraph","text":"在这里，活学活用毛泽东思想的群众运动开展得扎扎实实，用毛泽东思想统帅一切已成为广大革命群众的自觉行动。广大贫下中农和革命干部对毛泽东思想学了就用，立竿见影，表里如一，言行一致，处处都表现了他们无限忠于毛主席的一颗红心。下面介绍的是他们在驻军某部毛泽东思想宣传队的热情帮助下，活学活用毛泽东思想的动人事迹。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddff09705c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
