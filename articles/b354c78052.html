art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"空军部队又击落美制蒋匪侦察机一架国防部长林彪发布嘉奖令称赞打得好嘉奖令指出，空军部队的胜利又一次生动地证明，只要在任何时候都高举毛泽东思想的伟大红旗，在一切工作中突出政治，就能使精神变物质，无往而不胜；号召各部队很好地向他们学习，扎扎实实搞好各项战备工作，随时准备消灭一切敢于入侵之敌；","authors":[],"parts":[{"type":"paragraph","text":"嘉奖令指出，空军部队的胜利又一次生动地证明，只要在任何时候都高举毛泽东思想的伟大红旗，在一切工作中突出政治，就能使精神变物质，无往而不胜。号召各部队很好地向他们学习，扎扎实实搞好各项战备工作，随时准备消灭一切敢于入侵之敌。"},{"type":"paragraph","text":"新华社十八日讯 中国人民解放军空军部队今天上午在我东南沿海地区上空，击落入窜侦察的美制蒋匪帮RF—101型飞机一架。"},{"type":"paragraph","text":"这是今年以来我空军部队继击落美帝国主义军用无人驾驶高空侦察机和美制蒋匪帮U—2型高空侦察机各一架以后的又一次重大胜利。"},{"type":"paragraph","text":"新华社十八日讯 国务院副总理兼国防部长林彪今天发布嘉奖令，表扬今天上午在我东南沿海地区上空击落一架美制蒋匪帮RF—101型侦察机的中国人民解放军空军部队。"},{"type":"paragraph","text":"嘉奖令说：这是空军部队今年第三次打下敌机，打得好！你们的胜利又一次生动地证明了，只要在任何时候都高举毛泽东思想的伟大红旗，在一切工作中突出政治，就能使精神变物质，无往而不胜。希望你们兢兢业业，永不自满，加倍努力，在今后取得更大的胜利。"},{"type":"paragraph","text":"嘉奖令说，这次打下敌机的空军部队一贯行动快，勇猛、机智，训练从难从严，在这次战斗中继续发扬了我军优良的战斗作风。这表明这个部队在政治上和技术上都是过得硬的。嘉奖令号召各部队很好地向他们学习，扎扎实实搞好各项战备工作，随时准备消灭一切敢于入侵之敌。RW：林彪"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b354c78052"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
