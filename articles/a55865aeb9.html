ar":1973,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"姚文元会见罗新闻工作者代表团"},{"type":"paragraph","text":"新华社一九七三年九月三十日讯　中共中央政治局委员姚文元今天下午会见了由新闻出版总局局长扬·昆珀纳舒率领的罗马尼亚新闻工作者代表团全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"罗马尼亚驻中国大使格夫里列斯库、大使馆公使衔参赞道洛班楚，罗马尼亚《火花报》、罗马尼亚通讯社驻京记者伊里耶·德故泽，会见时在座。"},{"type":"paragraph","text":"参加会见的还有：《人民日报》负责人鲁瑛、王揖，新华通讯社副社长邓岗，中央广播事业局副局长金照，国家出版事业管理局负责人陈翰伯，外交部新闻司司长彭华。（附图片）"},{"type":"paragraph","text":"姚文元同志会见罗马尼亚新闻工作者代表团，图为会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a55865aeb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
