产阶级及其仆从形形色色的修正主义者妄想扑灭这个运动的企图是徒劳的","authors":[],"dates":[{"year":1968,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《人民之声报》赞扬资本主义国家人民的英勇斗争"},{"type":"paragraph","text":"人民运动斗争矛头指向资本主义制度"},{"type":"paragraph","text":"资产阶级及其仆从形形色色的修正主义者妄想扑灭这个运动的企图是徒劳的"},{"type":"paragraph","text":"新华社地拉那电　阿尔巴尼亚《人民之声报》一日发表编辑部文章，热烈赞扬资本主义国家的广大劳动群众，特别是青年学生最近为反对反动当局的暴政和残酷压迫而进行的英勇斗争，揭露和谴责资产阶级及其仆从修正主义者企图破坏和扑灭青年学生革命运动的阴谋。"},{"type":"paragraph","text":"文章说，最近，在许多资本主义国家里，比以往任何时候更为剧烈地爆发了学生反对暴政和社会不平等现象的斗争。"},{"type":"paragraph","text":"文章指出，被压迫和被剥削的群众，革命的学生，通过斗争正在提高觉悟，加强这样的信念：只有以坚持不懈的斗争和战斗的团结，在工人阶级的领导下，在无产阶级思想的指引下，才能实现自己的愿望和要求。"},{"type":"paragraph","text":"文章说，资本主义国家中爆发的学生和青年的斗争，反映了资本主义社会的腐朽。青年们现在懂得，压迫他们，剥削他们，葬送他们前途的是资本主义制度。因此，资本主义国家的青年把斗争矛头指向了导致灾难、痛苦、失业和耻辱的这一制度。"},{"type":"paragraph","text":"文章揭露说，被青年的造反运动弄得狼狈不堪的资产阶级却得到这些国家的修正主义党的支持。这些修正主义党在群众起来斗争的时候，竭力充当消防队员和破坏者的角色。他们千方百计地使学生运动离开工人阶级，孤立学生运动，从而使学生运动轻易地被镇压下去。苏修在反对学生运动中十分卖力，他们的宣传机器用资产阶级的语调攻击和咒骂这些运动的参加者。"},{"type":"paragraph","text":"文章指出，资产阶级及其仆从形形色色的修正主义者妄想扑灭青年学生革命运动的企图是徒劳的。"},{"type":"paragraph","text":"文章最后说，学生运动同工人运动的结合是这些运动的一个明显的趋势。资本主义世界的青年正在逐渐懂得：不把打击矛头集中在万恶的根源——当政的资产阶级政权，不把自己的斗争同最革命、最先进的工人阶级的斗争结合起来，即使是最起码的政治要求也无法实现。为此，资本主义国家的青年学生的造反运动应当接受无产阶级思想和无产阶级有组织的、革命的先锋队的领导，同国内和国际范围内的工人阶级的斗争结合起来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da9f532968"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
