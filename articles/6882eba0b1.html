hors":["刘志权","毛磊"],"dates":[{"year":1988,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纪念毛泽东刘少奇诞辰"},{"type":"paragraph","text":"毛主席纪念堂举行书画展  韶山举办字画和集邮展览"},{"type":"paragraph","text":"本报北京12月24日讯　记者毛磊报道：为纪念毛泽东同志诞辰95周年、刘少奇同志诞辰90周年，毛主席纪念堂今天举办书画展。刘澜涛、江华、黄镇、周谷城、陈慕华、方毅、谷牧等前往参观。"},{"type":"paragraph","text":"展厅中展出的204件作品，是从全国书法、国画家提供的600余幅作品中精选出来的，其内容是缅怀毛泽东、周恩来、刘少奇、朱德等老一辈革命家为中国人民革命事业建立的丰功伟绩。"},{"type":"paragraph","text":"记者从毛主席纪念堂管理局还了解到，1977年对外开放以来，已有5200万人前来瞻仰毛泽东主席遗容，120多个国家元首和政府首脑曾在汉白玉毛主席坐像前肃立致敬。毛泽东、周恩来、刘少奇、朱德革命业绩纪念室开放5年来，已有107万中外来宾参观。"},{"type":"paragraph","text":"据新华社韶山12月23日电　（记者刘志权）韶山今天举办纪念毛泽东诞辰95周年字画、集邮展览活动。展出的200多幅字画来自全国25个省、市、区及港澳地区。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6882eba0b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
