ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"四纵十一纵及各独立师进至遵化葡州地区之计划不变","alias":"","parts":[{"type":"paragraph","text":"四纵十一纵及各独立师进至遵化蓟州地区之计划不变1"},{"type":"paragraph","text":"（1948年11月4日）林、罗、刘，并告东北局，程、黄："},{"type":"paragraph","text":"（一）三日各电悉。迅速彻底干净歼灭各敌，光复沈阳，极为欣慰，望向全军传令嘉奖。（二）傅军南进各部已北撤，但四纵、十一纵及各独立师进至遵化、蓟州地区之计划仍不变更。程黄率各部到达后，分派几个支队向平古?、平津、津唐各线袭扰，主力择地整训，待东北主力入关后，统一发起对傅军作战。惟傅军如在我杨成武攻归绥?时派兵西援，则应暂停整训，向北平等地有所动"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]程、黄，指程子华、黄志勇，当时分别任东北野战军第二兵团司令员和参谋长。"},{"type":"paragraph","text":"[3]指1948年11月3日7时、16时半和3日林彪、罗荣桓、刘亚楼关于沈阳、营口战斗歼敌情况先后给中共中央军委、东北局的电报。"},{"type":"paragraph","text":"[4]傅，指傅作义，当时任国民党军华北“剿匪”总司令部总司令。[5]蓟州，即今天津蓟县。[6]1平古，指北平（今北京）和古北口。[7]1杨成武，当时任华北军区第三兵团司令员。作，牵制傅军西援兵力，帮助杨成武得手，因杨罗耿\"所部已开回平汉线并须休整，平张线”上傅军已不受威胁。（三）向平津作战时，冀东一带粮食必不够供应大军需要，平津攻克后，军民需粮亦多，东北需有所协助，望早日筹划。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"四日二时"},{"type":"paragraph","text":"[1]杨罗耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[2]平汉线，指北平（今北京）至汉口的铁路，即今京广线一段。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":162,"page_end":163},"tags":[{"name":"杨成武","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ac4b13403"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
