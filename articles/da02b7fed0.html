ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于接见全国各地来京师生一事给林彪等的信","alias":"","parts":[{"type":"paragraph","text":"关于接见全国各地来京师生一事"},{"type":"paragraph","text":"给林彪等的信"},{"type":"paragraph","text":"（1966年9月13日）林彪、总理、陶铸同志："},{"type":"paragraph","text":"卧病三天，尚有微温，今天略好。可在明天（十四）或后天（十五）上午十时或下午五时在天安门开七十万人大会。我能起床，即去见见群众，不能起床，则请你主持，我不去了。3"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十三日十九时"},{"type":"paragraph","text":"[1]林彪，在中共八届十一中全会上继续当选为中央政治局常委，不久被称中央副主席。"},{"type":"paragraph","text":"[2]总理，指周恩来。陶铸，当时任中共中央政治局常委、中央书记处常务书记、中央文化革命小组顾问。"},{"type":"paragraph","text":"[3]据1966年9月16日《人民日报》发表的新华社15日电讯稿报道，毛泽东于15日下午在天安门广场又一次接见了来自全国各地及首都的百万师生和红卫兵。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":70,"page_end":70},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da02b7fed0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
