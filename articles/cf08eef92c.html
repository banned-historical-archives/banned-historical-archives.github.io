script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国生产江河日下　资本家力图加紧剥削工人","authors":[],"dates":[{"year":1949,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国生产江河日下"},{"type":"paragraph","text":"资本家力图加紧剥削工人"},{"type":"paragraph","text":"【新华社北平二十五日电】塔斯社纽约二十三日电：美国经济局势的恶劣正受到美国报纸的越来越多的评论，美国新闻杂志写道：目前美国经济中些某部门的工商业活动正急剧下降。战前的生产与战后的高度相比已下降百分之十一，机器制造下降百分之七，煤下降百分之十六，铁路货运下降百分之十三。工业中的新定货下降百分之十二。生产的下降造成了失业的增加和对受雇工人的更大的剥削。美国新闻指出，由于生产的日趋下降趋势，工业家要以缩短工作周来减低成本，这样能够使他们削减每周的工资，并免去支付加班工资。人民购买力的下降也造成了日用品生产的大大下降。据该杂志说，鞋工业的生产与战后的最高水平相比下降百分之二十四，毛织品的生产下降百分之十八，纺织业中棉花的消耗减低百分之十九，尽管房屋大感缺乏，房屋的建筑最近却削减了一半。该杂志引据许多现有材料证明，如冶金、汽车等基本工业部门也即将减低生产。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf08eef92c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
