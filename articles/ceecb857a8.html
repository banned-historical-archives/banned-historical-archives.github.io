art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠抓活学活用毛泽东思想的典型","authors":[],"parts":[{"type":"paragraph","text":"本报讯 上海警备区某部十三连党支部，遵照伟大领袖毛主席关于“一定要抓好典型”的教导，在“两忆三查”之后，狠抓活学活用毛泽东思想的先进典型，有力促进了连队活学活用毛泽东思想群众运动的深入发展。"},{"type":"paragraph","text":"轰轰烈烈的“两忆三查”教育运动，大大激发了干部战士活学活用毛泽东思想的自觉性。全连上下，人人以林副主席为光辉榜样，大学大用“老三篇”，出现了许多先进典型。战士余玉斌就是其中的一个。他担任喂猪的工作。前一段时间，地冻天寒，余玉斌牢记毛主席关于“完全”、“彻底”为人民服务的教导，每天冒着刺骨的北风，跑三十多里路去采集猪饲料，手冻裂了，腿跑肿了，从不叫苦叫累。在他的精心饲养下，二十多头猪长得又肥又壮。党支部抓住这个典型，及时召开了全连活学活用毛泽东思想讲用会进行宣扬。全连干部战士自觉地学习余玉斌，对照自己，找差距，订措施，刻苦地活学活用毛泽东思想。大家说：宣扬一次典型，总结一次经验，就能使我们对毛泽东思想提高一步认识，加深一次理解，使活学活用毛泽东思想群众运动向前推进一步。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ceecb857a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
