战吉"],"dates":[{"year":1993,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"推陈出新　振兴京剧"},{"type":"paragraph","text":"首都戏剧界座谈纪念毛泽东题词５０周年"},{"type":"paragraph","text":"本报北京１月２７日讯记者李战吉报道：由文化部振兴京剧指导委员会和中国剧协等１０个单位发起组织的“纪念毛主席题词‘推陈出新’和延安平剧研究院成立５０周年”座谈会今天在人民剧场举行。张庚、金紫光、阿甲等４０余位戏剧界人士出席座谈会并发言。"},{"type":"paragraph","text":"５０年前，延安平剧研究院成立后推出新编历史剧《逼上梁山》和《三打祝家庄》，毛泽东欣然题词“推陈出新”，对戏剧改革寄予厚望。与会的同志表示，在改革开放的今天要更加坚定地执行这一发展戏剧的指导方针，改革体制、改革剧目，为继承和发展民族文化、振兴京剧而出新戏、出新人。"},{"type":"paragraph","text":"出席座谈会的还有文化部、剧协等部门的领导同志。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f546ec69da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
