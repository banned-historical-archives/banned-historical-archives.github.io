script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第三世界青年会议在阿尔及尔举行布迈丁主席在开幕词中指出，必须加强第三世界的阵线，以便打破帝国主义的剥削和掠夺的体制","authors":[],"dates":[{"year":1974,"month":7,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社阿尔及尔一九七四年七月十三日电　第三世界青年会议七月六日至十二日在阿尔及尔举行。"},{"type":"paragraph","text":"这次会议是由泛非青年运动和阿尔及利亚民族解放阵线青年组织共同组织的，五十多个国家和解放运动组织的代表团出席了会议。"},{"type":"paragraph","text":"阿尔及利亚革命委员会主席、政府总理胡阿里·布迈了在开幕会上讲了话。他说:“亚洲、非洲和拉丁美洲国家是当前各种斗争集中的辽阔的领土，因此，这些国家被看作是反帝斗争的巨大策源地。”“对亚洲、非洲和拉丁美洲解放运动采取什么态度是区分谁是民主世界的支持者和谁是压迫的支持者，谁是世界和平的保卫者和谁是侵略势力的支持者的根本标准。”"},{"type":"paragraph","text":"布迈丁主席说:“第三世界国家面对各种严重问题，必须加强它们的阵线，以便打破帝国主义进行剥削和掠夺的体制。”"},{"type":"paragraph","text":"布迈丁主席强调指出:“我们首先必须学会依靠自己的力量。我们的发展的成就决不会是由别人给予的。我们必须自己负起我们的发展的责任，这就是说，必须首先动员本国的一切物力和人力。”他号召第三世界青年团结起来，对未来的世界作出贡献。"},{"type":"paragraph","text":"这次会议经过讨论，通过了最后宣言、一项政治决议和一项经济决议。"},{"type":"paragraph","text":"最后宣言说:“第三世界反对帝国主义、反对新老殖民主义、反对种族主义和反对犹太复国主义的青年表示，他们给予非洲、拉丁美洲、亚洲和中东的真正解放运动以无条件的战斗声援。”"},{"type":"paragraph","text":"宣言说:“鉴于在印度洋、太平洋、加勒比海、地中海、红海和我们国家某些地区的外国军事基地是对世界各国人民的和平、安全和独立的威胁和经常的危险”，第三世界的青年“要求立即和无条件地撤除这些军事基地。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f290822b2e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
