art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把反击右倾翻案风的伟大斗争进行到底","authors":["刘兴华/陶俊峰"],"parts":[{"type":"paragraph","text":"某部“硬骨头六连”党支部，坚决拥护中共中央关于华国锋同志任中共中央第一副主席和国务院总理的决议，坚决拥护中共中央关于撤销邓小平党内外一切职务的决议，决心带领全连指战员以实际行动夺取反击右倾翻案风斗争的更大胜利。"},{"type":"paragraph","text":"本报通讯员摄（传真照片）"},{"type":"paragraph","text":"山西省昔阳县大寨大队民兵连，坚决拥护中共中央的两项英明决议，愤怒声讨邓小平的反动罪行，他们决心以实际行动保卫毛主席，保卫党中央，保卫毛主席的革命路线。"},{"type":"paragraph","text":"刘兴华摄"},{"type":"paragraph","text":"在批林批孔运动中涌现的先进典型——北京部队某部八连指战员，热烈欢呼中共中央的两项决议，愤怒声讨邓小平和制造天安门广场反革命政治事件的一小撮阶级敌人的罪行，决心把反击右倾翻案风的伟大斗争进行到底。"},{"type":"paragraph","text":"新华社稿"},{"type":"paragraph","text":"三三六○○部队防化连指战员，坚决拥护党中央的两项决议，愤怒声讨邓小平的反动罪行，决心提高警惕，加强战备，随时准备粉碎国内外一切阶级敌人的破坏和捣乱。"},{"type":"paragraph","text":"本报通讯员摄（传真照片）"},{"type":"paragraph","text":"济南部队工程兵某部“劈山开路先锋连”的指战员怀着极大的无产阶级义愤，在施工工地上，声讨邓小平的反动罪行，决心以实际行动夺取反击右倾翻案风的新胜利。"},{"type":"paragraph","text":"陶俊峰摄（传真照片）"},{"type":"paragraph","text":"西藏部队某部“爱民模范”洛桑单增生前所在连的指战员，坚决拥护中共中央的两项决议，愤怒声讨邓小平妄图颠覆无产阶级专政、复辟资本主义的罪行。这是同志们在看连队办的批判邓小平罪行的专栏。"},{"type":"paragraph","text":"本报通讯员摄（传真照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"764d0c8679"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
