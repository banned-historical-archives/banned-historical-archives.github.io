art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东军事思想在抗日战争时期的发展","authors":["刘先廷赵鲁杰谭一青"],"parts":[{"type":"paragraph","text":"伟大的抗日战争，一洗百年来中国人民饱受帝国主义欺凌的耻辱，为世界反法西斯战争的胜利作出了重大的贡献，在中国革命战争史乃至世界反法西斯战争史上有着重要的地位。毛泽东的军事理论成功地指导了这场胜利的战争。战争初期，毛泽东发表了《抗日游击战争的战略问题》、《论持久战》、《战争和战略问题》等宏伟著作，全面论述了指导抗战的重要战略理论；毛泽东的其他许多著作，就反对日本帝国主义的策略、抗日时期的国际战略以及争取千百万群众进入抗日斗争等问题，作了深刻阐述；毛泽东的大量文电，则对战争进程作了具体指导。这些都把毛泽东军事思想推向飞跃与成熟的阶段。"},{"type":"paragraph","text":"本文围绕毛泽东军事思想在抗日战争中的发展这一主题，论述了抗日战争时期毛泽东军事思想发展的条件、特点和基本内容，具体阐述了毛泽东关于抗日战争的持久战理论、游击战理论、兵民是胜利之本理论、人民军队理论等，分析了抗日战争时期发展了的毛泽东军事思想多方面的指导作用。"},{"type":"paragraph","text":"DW：军事科学院"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c3ec54ab6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
