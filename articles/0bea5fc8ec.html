ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"对召开军委扩大会议讨论军队缩编等问题的批语","alias":"","parts":[{"type":"paragraph","text":"对召开军委扩大会议讨论军队缩编等问题的批语\""},{"type":"paragraph","text":"（1956年11月25日）刘、朱、陈、邓即阅。退彭照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五六年十一月二十五日"},{"type":"paragraph","text":"[1]这是毛泽东对中共中央军委委员、国务院副总理兼国防部部长彭德怀1956年11月23日报告的批语。"},{"type":"paragraph","text":"[2]刘，指刘少奇。朱，指朱德。陈，指陈云，当时任中共中央副主席、国务院副总理。邓，指邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[3]彭德怀呈送的中共中央军委《召开军委扩大会议的通知》说：决定于1957年1月初在北京召开军委扩大会议，讨论军队缩编问题和1957年的军队训练工作。随《通知》附送的《关于裁减军队数量加强质量的决定（草稿）》说：“军委决定：在裁减军队数量加强质量的原则下，把我军的现有的员额裁减三分之一，即从三百八十三万人中裁减一百三十万人左右，保持二百五十万人或者更少一些的常备军队。”"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":11,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":153,"page_end":153},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bea5fc8ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
