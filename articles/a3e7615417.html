script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华国锋总理同卡马总统继续会谈中、博两国政府经济技术合作协定在京签字　卡马总统和夫人结束在南京访问返回北京","authors":[],"dates":[{"year":1976,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年八月八日电　国务院总理华国锋同博茨瓦纳共和国总统塞雷茨·卡马，今天下午继续举行了会谈。"},{"type":"paragraph","text":"会谈时，卡马总统对唐山、丰南一带发生强烈地震向中国政府和人民表示深切同情和亲切慰问。华国锋总理对此表示感谢。"},{"type":"paragraph","text":"新华社北京一九七六年八月八日电　中华人民共和国政府和博茨瓦纳共和国政府经济技术合作协定，今天下午在北京签字。"},{"type":"paragraph","text":"国务院总理华国锋和博茨瓦纳共和国总统塞雷茨·卡马分别代表本国政府在协定上签字。"},{"type":"paragraph","text":"参加签字仪式的博茨瓦纳方面有:公共事务、新闻和广播部长克韦拉戈贝，总统常务秘书斯廷坎普，外事秘书蒂博内，财政和发展计划部常务秘书莫哈埃等。"},{"type":"paragraph","text":"参加签字仪式的中国方面有:外交部长乔冠华，交通部长叶飞，外交部副部长韩念龙，外经部副部长陈慕华等。"},{"type":"paragraph","text":"新华社北京一九七六年八月八日电　博茨瓦纳共和国总统塞雷茨·卡马和夫人等贵宾，结束了在南京的参观访问，今天上午由交通部长叶飞陪同乘专机从南京返回北京。"},{"type":"paragraph","text":"贵宾们在离开南京时，江苏省革命委员会主任彭冲、副主任杨广立，中国人民解放军南京部队副司令员段焕竞，南京市革命委员会主任储江等，到机场欢送。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"叶飞","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3e7615417"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
