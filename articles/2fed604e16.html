":[],"dates":[{"year":1957,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京10日电】　纽约消息:最近一期“生活”杂志说，欧洲一些王室都过着养尊处优的生活，国王们的每年收入一般比美国总统多得多。"},{"type":"paragraph","text":"“生活”杂志说，英国王室每年共得到430万美元的津贴，并且得到“最最慷慨的供养。”伊丽莎白女王得到130万美元的个人津贴。这是“任何欧洲的统治者所得到的最大的一笔津贴。”"},{"type":"paragraph","text":"荷兰的尤丽安娜女王每年得到395，000美元，再加上维持她那几个王宫的费用9万美元。贝哈德王子和将要继承王位的贝阿特丽克斯公主每人另外得到8万美元。"},{"type":"paragraph","text":"“生活”杂志列举了其他在位的国王们每年的收入如下:瑞典的古斯塔夫·阿道尔夫:70万美元。挪威的哈康国王:14万美元。比利时的博多英国王:78万美元。丹麦的斐德烈国王:35万美元。希腊的保罗国王和弗雷德里卡王后:25万美元。"},{"type":"paragraph","text":"“生活”杂志说，美国总统每年的薪金是10万美元，还有开支津贴5万美元和旅行津贴4万美元。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fed604e16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
