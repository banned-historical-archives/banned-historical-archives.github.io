script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资本家剥削工人的新花样","authors":["树人"],"dates":[{"year":1957,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"树人"},{"type":"paragraph","text":"美国劳工部今年5月18日发表了一篇报告，题目是“生产率、收入、成本和物价”。美国政府在这篇报告中竭力证明美国当前物价的上涨是由于“工资增加得太多了”。"},{"type":"paragraph","text":"但是今天美国工人的工资是否增加得多了吗?"},{"type":"paragraph","text":"据美国钢铁工人工会所公布的统计，自从1939年以来，美国钢铁工人的每小时收入只上升了48%(如果把物价上涨计算在内，工资根本没有上升)，而工人的劳动生产率却提高了68·8%，资本家的净利润则增加得更多——达691%。从这里可以看到美国垄断资本对工人的残酷剥削的程度。"},{"type":"paragraph","text":"可是资本家追求利润的欲望是贪婪无厌的。为了便于剥削工人，美国资本家又想出搬迁工厂的更恶毒办法。"},{"type":"paragraph","text":"底特律是美国汽车工业的基地，那里集中了几百个汽车制造工厂。由于工业集中，工会较有力量，所订的工资合同比较固定。资本家为了要破坏工资合同、减低工人的工资，便把工厂搬到其他偏僻地点去。这样，就可以用低得多的工资来获得劳动力。"},{"type":"paragraph","text":"在美国汽车工业中，这类所谓“逃亡工厂”十分众多。如福特汽车公司在近年中就先后把64个与汽车生产有关的工厂搬出底特律城。今年6月底，克莱斯勒汽车工厂就把好几个工场搬到俄亥俄州，结果使1000工人失业。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1957\\09\\579r041501.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“快起来，我不愿意工会又要控诉我实行‘赶快’制度”"},{"type":"paragraph","text":"(原载美国“工人日报”)\u003c/FONT\u003e"}],"comments":[],"origin":"“工人日报”","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cb3e44c00"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
