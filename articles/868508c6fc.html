tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想就是最进步的政治精神","authors":["王文益"],"parts":[{"type":"paragraph","text":"毛主席教导我们，要用进步的政治精神贯注于军队之中。什么是进步的政治精神？就是伟大的毛泽东思想。"},{"type":"paragraph","text":"当今的世界正处在帝国主义走向崩溃、社会主义走向胜利的时代。在这场翻天复地的斗争中，我们怎样战胜帝国主义及其走狗？怎样建设社会主义？怎样反对现代修正主义？这一切都要靠毛泽东思想。毛泽东思想是当代马克思列宁主义的顶峰，是我们革命和建设的指针，是反对帝国主义和现代修正主义的强大的思想武器。"},{"type":"paragraph","text":"我们中国人民解放军，正是在毛泽东思想的武装下，由胜利走向胜利的。在战争年代里，我们依靠毛泽东思想战胜了国内外强大的敌人。最近几年来，随着学习毛主席著作进一步广泛深入的开展，我军在革命化的建设道路上又大大地向前迈进了。今后，我们还要继续活学活用毛主席著作，用毛泽东思想来武装我们的头脑，使我们每一个干部和战士都成为一不怕苦，二不怕死，胸怀祖国，放眼世界，一心为革命的硬骨头，为保卫祖国、保卫世界和平、彻底埋葬美帝国主义，作出更大的贡献。"},{"type":"paragraph","text":"要用毛泽东思想把我军彻底武装起来，就要把学习和宣传毛泽东思想，当作我们每个同志首要的毕生的战斗任务。我们要认真读毛主席的书，在“用”字上狠下功夫，以彻底的革命精神来改造自己，真正做到：毛主席怎么说的，我们就怎么做。我们的一切工作，都要把毛主席的书当作最高指示，凡是符合毛泽东思想的就坚决拥护，凡是违背毛泽东思想的就坚决反对。我们还要宣传毛泽东思想，通过“进步的政治工作去执行这种贯注”，使毛泽东思想真正在全军人员的头脑里深深扎根。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"868508c6fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
