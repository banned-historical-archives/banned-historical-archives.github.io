" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央纪律检查委员会关于开除杨金涛党籍的决定","authors":[],"dates":[{"year":1953,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"中共中央纪律检查委员会关于开除杨金涛党籍的决定","type":"title"},{"text":"杨金涛，男，38岁，哈尔滨市人，资本家家庭出身，1933年加入中国共产党，曾任中央人民政府贸易部国外贸易司苏联处副处长，于1951年2月被中央公安部逮捕扣押。","type":"paragraph"},{"text":"杨自1944年至1951年期间曾屡犯严重的政治错误：如1944年在延安时，擅经私人介绍与美军观察组某空军少校往来，并接受该少校罐头、手表等礼物；1946年在哈尔滨工作时，曾要求释放特务杨化民（未遂），且企图在蒋匪军进占哈市时请其保护家产；1949年南京解放后，曾资助其兄杨宜中（曾任日伪时代南京下关警察局局长）回哈市，并将其隐藏于中苏木材燃料公司，直至1951年始被我公安局查明逮捕枪决；杨于其家庭被斗时，曾藏匿烟土百余两及布匹麻袋等物；1950年4月杨与哈市奸商邹越千等曾合开木材公司，自任监理；7月调中央贸易部工作后利用职权骗取许可证，自东北贩运豆饼进关，获取暴利达3、4亿元，杨从中分红3000万元；在三反中并发现杨从1948年至1951年2月先后接受奸商贿赂面粉250袋，款2800万元；杨在中央贸易部工作期间，曾结识三星舞厅舞女林枫（在押特务之妻），多次与林发生肉体关系，并在该女面前夸耀自己身份，宣泄工作中的秘密；同年9月于赴天津途中又结识白俄女子代亚（系嫌疑分子）后即经常在一起鬼混。此外并曾吸食鸦片。","type":"paragraph"},{"text":"事实证明杨金涛一贯腐化堕落，敌我不分，其所犯错误极为严重恶劣，已完全蜕化变质为资产阶级分子。为严肃党的纪律，纯洁党的组织，决定开除其党籍。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed7cbcbc7d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
