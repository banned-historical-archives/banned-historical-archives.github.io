" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"最近河南省农村普选中发生四起自杀事件","authors":[],"dates":[{"year":1954,"month":3,"day":9}],"is_range_date":false,"parts":[{"text":"最近河南省农村普选中发生四起自杀事件","type":"title"},{"text":"【河南分社9日讯】自今年2月中旬至3月初，河南省农村普选运动中发生四起自杀事件。自杀而死的人有地主、农民、乡干部。死者大都是历史上有污点，又摸不透普选到底是搞什么名堂，心怀疑惧；有的再加上患有疾病或闹家庭纠纷，因而自杀。","type":"paragraph"},{"text":"乐川一区作乡乡委员赵得胜，过去偷过人家的东西，去年邻乡搞普选试点时，逮捕过一个偷东西的坏分子，曾把他吓得躲到外面五、六天。今年2月25日该乡开始普选。他找乡主席问：“历史上有问题的人能否参加普选？”主席说：“不够选民资格的，不能参加选举。”他回家后，又遇上和老婆生气，就上吊死了。","type":"paragraph"},{"text":"淮阳县11区彭老家村孟繁宾，系土改复查时到达该地，原籍不明，有时自称光山人，有时自称汝南人。进行人口调查选民登记时，问他的情况，他说：“毛主席来了，我也不能说实话。”2月19日晚自己以铁锥子刺心而受重伤，23日死去。","type":"paragraph"},{"text":"登封县死了两个人。一个是六区周三乡地主周秀，现年68岁。去年年底患有尿血症，尽夜不停。普选开始市，召开地主和被管制分子会。周去的晚了，没听到干部所讲的政策，又让他和被管制的分子站在一起，他回去后和老婆说：“我这病不能好了！”于2月27日上吊自杀身亡。登封县四区冯沟乡农民（没闹清是贫农、或是中农）李连清，在选举大会上讲了一段话，他嫂子是选民组长，在会上没发言，回家后李连清讥讽了嫂子几句，两个人吵起嘴来，李并打了嫂子一顿，他嫂子到乡政府告了他，政府派人传他，他畏罪（打人有罪）上吊死了。（吕忠爽）","type":"paragraph"},{"text":"（以上材料来源，均为各专区普选办事处在电话上向省选举委员会作的口头回报。省选举委员会催各地写详细报告，并准备通报各地引起注意，以避免类似事件发生）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年3月13日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f61e374083"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
