s":[{"year":1966,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席诗词十八首"},{"type":"paragraph","text":"译成阿拉伯文在叙利亚出版"},{"type":"paragraph","text":"新华社大马士革十九日电　毛泽东主席诗词十八首阿拉伯文译本最近在叙利亚出版。"},{"type":"paragraph","text":"译者马姆杜·哈基博士在前言中说：“诗集的作者是中国最高的政治领袖，他使中国摆脱封建主义、帝国主义的侵略和剥削。毛泽东是当代中国最伟大的诗人。”"},{"type":"paragraph","text":"译者指出：“毛主席诗词已经译成多种文字，左派报刊赞赏它，右派报刊以十分恐惧的心情对待它。”"},{"type":"paragraph","text":"译者说：“当我听到中国人亲口诵读这些诗词的时候，音韵铿锵，使我了解到它的音乐、艺术价值。”"},{"type":"paragraph","text":"他说：“叙利亚和中国的联系有很悠久的历史，毛主席诗词的出版给两国文化交流增加了一块基石”。"},{"type":"paragraph","text":"这个译本是根据毛主席诗词英文和法文译本转译的。（附图片）"},{"type":"paragraph","text":"老挝解放区军民迫切希望从毛主席著作中学到真理，用毛泽东思想指导老挝的革命实践。图为老挝人民解放军干部在夜间认真阅读毛主席著作。"},{"type":"paragraph","text":"新华社记者　薛铁军摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc2f659338"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
