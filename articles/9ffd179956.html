tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“独有英雄驱虎豹”——飞行员周宝龙的父亲受资本家剥削的血泪家史","authors":["北空新"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“中国无产阶级身受三种压迫（帝国主义的压迫、资产阶级的压迫、封建势力的压迫），而这些压迫的严重性和残酷性，是世界各民族中少见的；因此，他们在革命斗争中，比任何别的阶级来得坚决和彻底。”"},{"type":"paragraph","text":"飞行员周宝龙的父亲周有才，解放前当了三十三年工人，过着牛马不如的生活。他的两个女儿，先后被旧社会折磨死了。二儿子也被日本鬼子抓去做苦工，惨死在海南岛。"},{"type":"paragraph","text":"周大爷当搬运工人的时候，受到的剥削更加残酷。当时流传着这样一首民谣：“搬运工，真辛苦，运着粮食空着肚，运着布匹没衣服，运着砖瓦没房住，老板养得象肥猪，工人瘦得皮包骨。”有一次，沉重的货物把周大爷砸倒在地，口吐血沫。可是，狗监工还举手要打。周大爷紧握铁拳，两眼怒视，他恨不得把狗监工连同他的主子帝国主义，一起打翻在地。这时，青年工人扔掉肩上的货物挺身而出，上前抓住狗监工的手，愤怒地说：“住手！放下你的臭鞭子！你这个帝国主义的看家狗，你敢动我们阶级兄弟的一根毫毛，我们就扭断你的手，砸烂你的头！”中国工人阶级的反抗，吓坏了帝国主义分子。"},{"type":"paragraph","text":"毛主席教导我们：“我们中国人是有骨气的。”“马克思主义的道理千条万绪，归根结底，就是一句话：‘造反有理。’……根据这个道理，于是就反抗，就斗争，就干社会主义。”可是，中国赫鲁晓夫公然宣扬卖国主义，鼓吹心甘情愿地当“红色买办”，无耻地向美帝国主义乞求“和平”。对于中国赫鲁晓夫这个地地道道的卖国主义者，我们一定要奋起毛泽东思想的千钧棒，把他打翻在地，让他永世不得翻身！"},{"type":"paragraph","text":"《空军报》记者、何名泰摄影RW：周宝龙"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ffd179956"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
