ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中央转发《广州军区三支两军政治思想工作座谈会纪要》的批语","alias":"","parts":[{"type":"paragraph","text":"对中央转发《广州军区三支两军政治思想工作座谈会纪要》“的批语"},{"type":"paragraph","text":"（1971年8月）照发。"},{"type":"paragraph","text":"[1]中共广州军区委员会1971年8月5日向中央、中央军委、总政治部报送这个纪要的报告中说：最近，我们召开了三支两军政治思想工作座谈会。会议检查和讨论了在三支两军人员中深入进行路线教育，继续反对骄傲自满、特权思想和资产阶级思想腐蚀的问题，以及适应地方各级党委已经成立的新情况，改进对三支两军人员的组织领导和管理等问题，起草了会议纪要。这个文件是否妥当，请审查批示。这次座谈会在1971年7月15日至31日举行，有广州军区师、军分区以上单位及南海舰队、广州空军的有关领导同志参加。中共中央1971年8月20日转发这个纪要的批语指出：“这个《纪要》指出的问题，符合当前三支两军的实际情况，改进措施较好。望你们认真研究，参照执行。”中央批语中“认真研究”4个字是毛泽东审阅时加写的。"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":210,"page_end":210},"tags":[{"name":"毛泽东","type":"人物"},{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d63cd234e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
