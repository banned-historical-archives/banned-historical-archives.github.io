ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"给蓝公武\"的信","alias":"","parts":[{"type":"paragraph","text":"给蓝公武的信"},{"type":"paragraph","text":"（1948年4月27日）公武先生："},{"type":"paragraph","text":"三十年前，拜读先生在《晨报》及《国民公报》上的崇论宏议，现闻先生居所距此不远，甚思一唔，借聆教益。兹派车迎候，倘蒙拨冗枉驾，无任欢迎。"},{"type":"paragraph","text":"敬颂大安"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四八年四月廿七日，于陈南庄"},{"type":"paragraph","text":"[1]蓝公武（1887—1957），江苏吴江人。长期从事新闻工作。1945年秋到达晋察冀解放区，先后任察哈尔省政府教育厅厅长、华北人民政府副主席等职。新中国成立后，曾任最高人民检察署副检察长。1957年逝世，根据他临终前的申请，中共中央追认他为中国共产党党员。试先出"},{"type":"paragraph","text":"三丽打读寝崇"},{"type":"paragraph","text":"溪，了先居所的"},{"type":"paragraph","text":"巴一n，乐"},{"type":"paragraph","text":"兹派车血溪，倘蒙完究"},{"type":"paragraph","text":"平明十七月于除有庞毛泽东致蓝公武信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":4,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":237,"page_end":238},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7dc388b92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
