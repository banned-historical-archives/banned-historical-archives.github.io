dates":[{"year":1959,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"波统一工人党代表团到京"},{"type":"paragraph","text":"邓小平同志等到机场热烈欢迎"},{"type":"paragraph","text":"新华社24日讯　应中国共产党中央委员会邀请前来中国访问的波兰统一工人党代表团，在今天下午乘飞机到达北京。代表团团长是波兰统一工人党中央政治局委员、书记处书记耶日·莫拉夫斯基，团员有：中央委员、中央组织部部长瓦伦特·蒂特科夫，中央委员、中央宣传部部长安哲伊·维尔布兰，中央委员、中央经济部副部长弗朗齐歇克·布林诺夫斯基，候补中央委员、农业经济研究所所长耶日·特皮赫特，中央委员、卢布林省委第一书记瓦迪斯瓦夫·科兹德腊，中央委员、革但斯克省委第一书记约瑟夫·马赫诺，中央委员、奥波尔省委第一书记帕维沃·沃雅斯，卡托维兹省委书记耶日·古特曼，候补中央委员、冶金工人工会中央理事会主席约瑟夫·凯什钦斯基。"},{"type":"paragraph","text":"代表团在机场受到中共中央总书记邓小平的热烈欢迎。前往机场欢迎的还有中共中央书记处书记王稼祥、候补书记杨尚昆、中央委员伍修权和中共中央机关负责工作人员熊复、李启新、张香山等。"},{"type":"paragraph","text":"到机场欢迎的还有中国驻波兰大使王炳南，波兰驻中国大使馆临时代办傅拉托。（附图片）"},{"type":"paragraph","text":"右图：邓小平同志和莫拉夫斯基同志在机场上谈话"},{"type":"paragraph","text":"新华社记者　郑小箴摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af6322a5ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
