script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"泰国农民反压迫反剥削斗争蓬勃发展印度西孟加拉邦二十五万黄麻工人奋起罢工","authors":[],"dates":[{"year":1975,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京电　据“泰国人民之声”电台最近广播，一九七四年，泰国农民反对压迫剥削和要求合理权益的斗争进一步发展。"},{"type":"paragraph","text":"电台说，一九七四年农民斗争的特点是范围广，规模空前。各府成千上万的农民不断奋起展开各种形式的斗争，特别是到曼谷举行联合斗争。例如，三月份，有十一个府的五百名农民到曼谷汇合后展开了九昼夜的斗争。六月份，有十五个府的一千多名农民在曼谷展开了七昼夜的斗争。十一月份，来自三十个府的一千五百多名农民集中到曼谷进行了十二个昼夜的斗争，并且同一万名群众一起举行了示威游行，这是泰国历史上从未出现过的事件。"},{"type":"paragraph","text":"电台说，农民斗争的另一个特点是，农民在斗争中有坚强的组织性。目前他们已经成立了泰国农民同盟会作为联合斗争的中心。农民还准备抵抗敌人的镇压。"},{"type":"paragraph","text":"电台说，在激烈的斗争中，农民进一步提高了自己的觉悟，更加深刻地认识到自己痛苦的根源，更加懂得只有紧密团结，坚决斗争，才能保卫自己的耕地和合理权益。"},{"type":"paragraph","text":"新华社北京电　新德里消息:据印度报纸报道，印度西孟加拉邦约二十五万名黄麻工业工人从一月六日起罢工，要求增加工资、发给物价津贴，并且要求向贫苦农民供应低价粮食等。"},{"type":"paragraph","text":"这次罢工使印度西孟加拉邦六十二家黄麻工厂中的六十一家全部停产，其余一家部分开工。据估计，罢工使黄麻制品的产量每天减少四千多吨，约值两千万卢比。"},{"type":"paragraph","text":"印度政府为了镇压工人的罢工斗争，已调集大批警察到工厂地区巡逻。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c45e987cbe"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
