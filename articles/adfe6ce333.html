ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"在周培源关于六六至七○届大专毕业生转正定级问题来信上的批语","alias":"","parts":[{"type":"paragraph","text":"在周培源关于六六至七○届大专毕业生转正定级问题来信！上的批语"},{"type":"paragraph","text":"（1972年11月12日）"},{"type":"paragraph","text":"此事关系很大。印发政治局各同志，国务院文教组及北京市委各同志研究。请中央考虑作出决定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"72年11月12日"},{"type":"paragraph","text":"[1]北京大学革委会副主任周培源1972年11月7日给毛泽东的信中说，在落实知识分子政策和教育革命中，有一个问题急待解决，就是如何处置66届至70届的大专毕业生。66届已经毕业6年之久，至今仍未转正定级，常有人来信问及到底还算不算大学生和国家于部，是否准备给“文化大革命”中毕业的大学生降一级，将来新的工农兵大学生是否也是如此。现在一些大型国营企业工人的工资，已比同龄大学生高了，致使向此等单位招生，已有人不想上学。目前这些大学生全国有80万左右，来自各阶层、各地区，处理好他们的问题关系重大。为此，特向主席请示如下：一、鉴于我国科学文化急需加速发展，大学生还要继续培养，而且要培养质量更高的，他们的资格尤其是经济地位不能过低。二、老五届毕业生的待遇不能比65年以前的毕业生降一级。大学生待遇改革应从新招的工农兵大学生算起。三、根据老五届毕业生在校年限的多少划线，66、67届在校4年以上，按本科毕业生待遇，67至70届在校3年以下，按大专毕业生待遇。四、工资转正定级工作宜速完成，不要拖到参加工作七八年以后。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":359,"page_end":359},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adfe6ce333"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
