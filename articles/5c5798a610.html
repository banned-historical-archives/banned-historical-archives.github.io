hors":[],"dates":[{"year":1967,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"古巴朋友在我国驻古使馆国庆招待会上说"},{"type":"paragraph","text":"中国文化大革命沉重打击了美帝苏修"},{"type":"paragraph","text":"据新华社哈瓦那电　中国驻古巴大使馆临时代办李善一一日晚举行招待会，热烈庆祝中华人民共和国成立十八周年。出席招待会的有：古巴外交部长劳尔·罗亚，邮电部长赫苏斯·蒙塔尼亚，卫生部长马查多·本图拉，最高法院院长恩里克·阿特，以及古中友协主席巴尔多梅罗等。"},{"type":"paragraph","text":"出席招待会的还有：古巴各界代表，各国驻古巴外交使团的代表，在古巴的拉美朋友以及旅古华侨代表，共八百多人。"},{"type":"paragraph","text":"到会的许多古巴朋友和其他各国朋友热烈赞扬中国十八年来取得的伟大成就，热烈祝贺中国无产阶级文化大革命的伟大胜利，衷心敬祝中国人民的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席万寿无疆。有些外国朋友激动地一再高呼“毛主席万岁！”"},{"type":"paragraph","text":"一位拉丁美洲朋友指出，“中国十八年来取得的辉煌成就都是毛泽东思想的伟大胜利。”另一位拉丁美洲朋友说，“毛泽东思想之所以具有巨大的威力，在于它是颠扑不破的真理，在于它是当代最高的马克思列宁主义。”"},{"type":"paragraph","text":"一位古巴朋友说，“中国无产阶级文化大革命的伟大胜利不仅进一步巩固了中国的无产阶级专政，防止了资本主义在中国的复辟，而且对美帝国主义和苏联现代修正主义是一个沉重的打击。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c5798a610"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
