es":[{"year":1993,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社吉隆坡6月26日电　(记者丁宝忠)在今晚举行的世界全明星乒乓球赛决赛中，世界排名第三的中国马文革以5:3胜世界排名第二的比利时塞弗(9:11，11:8，11:4，8:11，11:6，11:2，6:11，11:3)，夺得冠军。"},{"type":"paragraph","text":"这两位欧亚正手横拍弧圈型选手，打法差不多。马文革凭着速度快和落点好取胜。"},{"type":"paragraph","text":"半决赛中，马文革以4:2胜韩国刘南奎。首轮以4:0胜波兰老将格鲁巴。"},{"type":"paragraph","text":"塞弗半决赛以4:0战胜中国王涛，首轮打败德国鲁斯科普夫。王涛首轮以4:1胜瑞典皮尔森。"},{"type":"paragraph","text":"吉隆坡一站比赛采用11分制，决赛前7局4胜，决赛9局5胜。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47b85984fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
