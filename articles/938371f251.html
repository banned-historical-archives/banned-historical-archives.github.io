使工厂、农场、港口、建筑工地和一些国家机关陷于瘫痪，沉重打击垄断资产阶级","authors":[],"dates":[{"year":1971,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利一千多万工人职员举行全国总罢工"},{"type":"paragraph","text":"这次罢工是一九六九年秋季以来规模最大的一次，使工厂、农场、港口、建筑工地和一些国家机关陷于瘫痪，沉重打击垄断资产阶级"},{"type":"paragraph","text":"新华社八日讯  罗马消息：意大利各行业大约一千一百万工人和职员在七日举行全国总罢工，抗议政府迟迟不接受他们关于降低房租、减少收入微薄的人的赋税负担和改善保健条件的合理要求。"},{"type":"paragraph","text":"这次声势浩大的全国总罢工，是一九六九年秋季以来意大利规模最大的一次罢工。这次罢工使工厂、农场、港口、建筑工地以及一些国家机关陷于瘫痪，还使火车和城市交通运输一度停顿。"},{"type":"paragraph","text":"在意大利的主要工业城市米兰，各工厂参加罢工的工人达百分之九十五到百分之一百。在意大利另一工业城市都灵，菲亚特汽车公司的大部分工人都参加了罢工。"},{"type":"paragraph","text":"在几百个城镇里，成千成万的罢工工人和学生还举行了游行示威和集会。"},{"type":"paragraph","text":"这次总罢工给意大利垄断资产阶级很大打击。据官方估计，由于罢工，垄断资本损失约二亿八千万美元。"},{"type":"paragraph","text":"在这同时，意大利十五万多名旅馆服务员在六日和七日举行了罢工，要求增加工资，缩短工时和改善工作条件。新闻记者和印刷工人也在六日晚上举行了罢工，使许多报纸七日不能出版。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"938371f251"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
