script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"结束对伊朗和巴基斯坦的正式访问  李先念副总理回到北京  我国领导人邓小平、纪登奎、华国锋、吴德、吴桂贤到机场迎接","authors":[],"dates":[{"year":1975,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"结束对伊朗和巴基斯坦的正式访问"},{"type":"paragraph","text":"李先念副总理回到北京"},{"type":"paragraph","text":"我国领导人邓小平、纪登奎、华国锋、吴德、吴桂贤到机场迎接"},{"type":"paragraph","text":"新华社一九七五年四月二十六日讯　国务院副总理李先念结束了对伊朗王国和巴基斯坦伊斯兰共和国的正式访问，满载着伊朗人民、巴基斯坦人民对中国人民的友好情谊，今天下午乘专机回到北京。"},{"type":"paragraph","text":"李先念副总理应邀于四月五日至十日、四月二十日至二十五日，先后访问了伊朗和巴基斯坦。"},{"type":"paragraph","text":"到机场迎接的有：我国领导人邓小平、纪登奎、华国锋、吴德、吴桂贤，外交部部长乔冠华、副部长王海容，中国人民解放军副总参谋长杨成武、总政治部副主任梁必业。"},{"type":"paragraph","text":"巴基斯坦驻中国大使阿尔维和夫人、伊朗驻中国大使馆临时代办拉加布萨德和这两个大使馆的外交官员，也到机场迎接。当阿尔维大使和拉加布萨德临时代办祝贺李先念副总理访问他们的国家获得圆满成功时，李先念副总理对两个友好国家的政府和人民对他及其一行的热烈欢迎和盛情款待，再次表示感谢。"},{"type":"paragraph","text":"李先念副总理途经乌鲁木齐时，新疆维吾尔自治区负责人赛福鼎、杨勇、曹思明、司马义·艾买提、刘星、宋致和、张世功、徐国贤、裴周玉、贾那布尔、曹达诺夫、张竭诚、李昭明、胡良才、杨立业、吴巨轮、姜林东、刘发秀、李长林和谭善和到机场迎送。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"下图：李先念副总理回到北京时，我国领导人邓小平、纪登奎、华国锋、吴德、吴桂贤到机场迎接。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29ecd046f3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
