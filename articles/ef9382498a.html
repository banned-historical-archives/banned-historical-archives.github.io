art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"走英雄成长的道路自觉地掌握毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"据新华社沈阳十六日电 向毛主席的好战士刘英俊学习的活动，在刘英俊生前所在的部队广泛展开。听毛主席的话，走刘英俊成长的道路，象刘英俊那样把毛主席的书当作最高指示，努力学习最高指示，忠实执行最高指示，热情宣传最高指示，勇敢捍卫最高指示，已成为广大干部、战士的强烈愿望和自觉行动。"},{"type":"paragraph","text":"刘英俊同志牺牲不久，这个部队党委作出了向刘英俊同志学习的决定，组织报告团在部队广泛介绍刘英俊同志的事迹，并举办刘英俊同志事迹展览和绘制幻灯，进行巡回展出和放映。刘英俊同志的崇高思想和光辉事迹在广大干部战士中激起强烈的反响，他们一致指出，刘英俊同志所以具有最高度的无产阶级觉悟，最高尚的革命品质，能够经得起最严峻的革命考验，来源于伟大的毛泽东思想。他们表示要学习刘英俊活学活用毛主席著作，在“用”字上狠下功夫的革命精神。他们认为，学英雄要学根本，只有抓住了根本，才能学得深，学得好。"},{"type":"paragraph","text":"在学习中，广大指战员都象刘英俊同志那样，把毛主席的书当作一切行动的最高指示，在改造世界观上狠下功夫。这支部队的领导干部，多次学习了刘英俊同志的事迹以后，一致认为刘英俊同志是自己后半辈子怎么革命的好榜样，决心更好地活学活用毛主席著作，改造思想，带头革命。许多干部战士把向刘英俊同志学习的过程看作是自我革命，改造思想的过程。他们把刘英俊同志生前学得最多、学得最深的几篇毛主席著作，如《为人民服务》、《愚公移山》、《纪念白求恩》和关于阶级和阶级斗争的论述等，反复读，反复想。某部二连连长郭福过去管理教育方法有些不当。最近，他以刘英俊为榜样，带着问题学习毛主席著作，抓紧了思想改造。他对战士十分关心，耐心帮助，星期天还到炊事房帮厨。战士们说：我们连长变得可亲了。"},{"type":"paragraph","text":"在这支部队里，还掀起了一个群众性的宣传毛泽东思想的活动。许多战士在给亲友写信的时候，都象刘英俊同志那样，在信里、信封上写上毛主席语录，热情宣传毛泽东思想。在假日，战士们也不断到群众中去组织人民群众学习毛主席著作，鼓励工农群众读毛主席的书，听毛主席的话，照毛主席的指示办事。"},{"type":"paragraph","text":"刘英俊同志光辉事迹也大大激励了广大指战员积极参加无产阶级文化大革命的热情。他们纷纷集会，座谈，写黑板报，出墙报，口诛笔伐，勇猛向反党黑帮开火。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef9382498a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
