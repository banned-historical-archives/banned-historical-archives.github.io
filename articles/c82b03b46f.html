主义  只有掌握和正确运用毛泽东思想才能使革命斗争取得胜利","authors":[],"dates":[{"year":1968,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"委内瑞拉学习毛主席著作小组出版毛主席光辉著作“老三篇”"},{"type":"paragraph","text":"毛泽东思想是我们时代的马列主义"},{"type":"paragraph","text":"只有掌握和正确运用毛泽东思想才能使革命斗争取得胜利"},{"type":"paragraph","text":"新华社七日讯　加拉加斯消息：在南美洲的委内瑞拉，最近成立了一个学习毛主席著作的小组，这个小组出版了毛主席的光辉著作《为人民服务》、《纪念白求恩》和《愚公移山》。"},{"type":"paragraph","text":"这个小组在出版《愚公移山》时发表了一篇评论，指出委内瑞拉人民所面临的同美帝国主义、现代修正主义和本国反动派作斗争的艰巨任务。"},{"type":"paragraph","text":"评论说：“在完成所有这些任务时，我们必须有正确的指导思想。我们时代的马克思列宁主义就是毛泽东思想。我们只有掌握了毛泽东思想并且正确地加以运用，才能在我们的斗争中取得胜利和保住斗争的成果。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c82b03b46f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
