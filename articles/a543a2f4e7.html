script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用革命的弓箭射垮“三家村”黑店  “人听毛主席的话，弓箭就听人的话。”作为一个射箭运动员，我要永远听毛主席的话。邓拓想让我们不听党的话，简直是白天做梦","authors":["李淑兰"],"dates":[{"year":1966,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用革命的弓箭射垮“三家村”黑店"},{"type":"paragraph","text":"“人听毛主席的话，弓箭就听人的话。”作为一个射箭运动员，我要永远听毛主席的话。邓拓想让我们不听党的话，简直是白天做梦"},{"type":"paragraph","text":"解放军射箭队运动员　李淑兰"},{"type":"paragraph","text":"听到邓拓一小撮黑帮反党反社会主义的罪行，我简直气炸了肺。邓拓这伙反党反社会主义分子，打着“红旗”反红旗，以说历史、讲故事、传知识、说笑话作幌子，在我们的背后一支一支地放出黑箭，攻击我们的党，攻击我们的伟大领袖，攻击我们的社会主义制度，恶毒地污蔑“东风压倒西风”的科学论断是“伟大的空话”、“陈词滥调”，污蔑我们的大跃进是“吹牛皮”，瞎说我们的社会主义事业是“一个鸡蛋的家当”。我们党中央和毛主席所说的话都是真理，所提出的方针政策都反映了全国人民的最高要求和最高利益。党领导我们创造的成绩是非常伟大的。我在全国的七个省参加过射箭比赛，看到了数不清的大工厂，城市和农村都在飞速前进。就拿我国的体育事业来说吧！解放前外国人说我们是“东亚病夫”，现在我们不但有了完整的体育事业的体系，而且有了强大的思想红、技术精、作风硬的体育队伍，而且成绩是惊人的。我国的射箭运动虽有古老的传统，但在蒋介石反动政府的歧视、限制下已快绝迹了，党领导我们发展这个运动，我们说啥就能做到啥。我们从一九五九年建队以来的短短几年里，女子队就从帝国主义、修正主义垄断的十二项的世界纪录里夺回了七项。这铁的事实难道说是“吹牛皮”吹出来的吗？我们新中国的运动员，决对不容许邓拓之流这样猖狂地进攻！我们要在这场你死我活的社会主义文化大革命中，站在最前列，拉开革命的弓箭，坚决射垮他们开设的“三家村”黑店。"},{"type":"paragraph","text":"邓拓黑帮狂妄极了，还叫喊要我们的党下台“休息”。正告你们：绝对办不到！党和毛主席永远是我们心中的红太阳。没有共产党，没有毛主席，就没有我们的活命。我出身于一个下中农的家里，过去过着吃不饱穿不暖的生活。解放后在党和毛主席的亲切关怀和教导下，我成为国家运动员，到过三个国家参加比赛。要是我在地主、资本家统治的旧社会，还不知会落到什么地步呢，还会有今天吗？我个人的成长，就是党和毛主席关怀教导的结果。我从毛主席著作里找到了方向、勇气和力量，懂得了为革命射箭，为人民服务的道理，把自己的一切和全国人民联系在一起，为党和人民争取崇高的荣誉。我在学习和运用毛主席指示的实践中，深深领悟了“人听毛主席的话，弓箭就听人的话”这条真理，因此我才有勇气克服了困难，有力量向世界纪录猛冲。几年来我们曾十一次打破了七项世界纪录，为党和国家争得了荣誉，有力地摧垮了帝国主义对国际体育运动的垄断。这都是党和毛主席给我们的。邓拓一伙想让我们不听党的话，简直是白天做梦。我们不但现在要听，而且永远要听。我们世世代代都要把毛主席的话当做最高指示。我们要牢牢掌握毛主席的阶级斗争的武器，坚决保卫人民江山，为中国革命和世界革命贡献出全部力量！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a543a2f4e7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
