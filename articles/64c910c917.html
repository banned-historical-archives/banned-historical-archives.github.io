:[],"dates":[{"year":1952,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共聊城地委节约检查委员会"},{"type":"paragraph","text":"关于反贪污运动中的右倾思想的检讨"},{"type":"paragraph","text":"编辑同志：我们看到了二月二十九日人民日报读者来信栏内登载的对于平原省聊城专署公安处负责干部的批评，特作检讨报告如下："},{"type":"paragraph","text":"中共聊城地方委员会发现聊城专署公安处处长于寿亭有贪污行为，并障碍着公安处反贪污运动的开展时，便决定于寿亭从二月十七日起到地委机关反省。并停止他阅读党内文件和参加重要会议等的权利，撤消他的警卫员，收了他的枪，并派保卫队的一个战士监视他。但因我们没有抓紧对保卫队战士进行教育，以致该战士还给于寿亭打饭、送信。因于寿亭刚到地委机关反省时是离职反省，所以还给他吃中灶饭。于寿亭问题大体弄清后，即由有关领导方面于二月二十一日宣布撤职查办。但宣布处分后，我们没有随即改变他的中灶等待遇，这是一种严重的右倾思想。见到你报的批评后，我们除作检讨以外，立即停止于寿亭的中灶，由派来监视他的保卫队战士和地委机关的警卫员轮班监视他。"},{"type":"paragraph","text":"平原省聊城专区节约检查委员会"},{"type":"paragraph","text":"中共聊城地方委员会分会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64c910c917"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
