" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji52","name":"毛泽东全集第52卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对中央关于劝阻强行登车来京人员的通知稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于劝阻强行登车来京人员的"},{"type":"paragraph","text":"通知稿的批语"},{"type":"paragraph","text":"（1976年3月24日）同意。"},{"type":"paragraph","text":"三月二十四日"},{"type":"paragraph","text":"[1]中共中央1976年3月24日发给中共浙江省委并各省、市、自治区党委的这个通知说：“最近，浙江有几批学生，强行登上火车，要求来京上访和到清华、北大看大字报。经过劝阻，大部已经回去了。中央认为，这种做法是不妥当的，不符合毛主席、党中央的指示精神，影响抓革命、促生产、促工作、促战备。”“中央要求各地要坚决贯彻执行毛主席的重要指示和中央文件的规定，对强行登车要求来京的人员，应做好思想工作，坚决劝阻。告诉他们，整个运动要根据毛主席指示，在党委一元化领导下进行。不搞串连，不搞战斗队。”这里所说的“运动”，指当时正在开展的所谓“反击右倾翻案风”运动。"}],"authors":["毛泽东"],"dates":[{"year":1976,"month":3,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":147,"page_end":147},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江文革","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"681db987eb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
