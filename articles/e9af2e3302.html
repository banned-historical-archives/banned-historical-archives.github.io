":[],"dates":[{"year":1967,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"中央文革关于银川新华社事件的指示","type":"title"},{"text":"宁夏自治区军区：","type":"appellation"},{"text":"五月卅日在银川发生的捣毁宁夏新华分社、抢劫新华分社的机密文件和其他物资，并殴打新华社记者的事件，是一个严重点政治事件。宁夏自治区军区有责任保护新华分社的正常工作和记者的人身安全。为此，责成宁夏军区负责处理这一事件：","type":"paragraph"},{"text":"1.把这次闹事的头头抓起来，审查处理。","type":"paragraph"},{"text":"2.把抢走的全部文件和物资负责追回。","type":"paragraph"},{"text":"3.由军区负责把这一事件调查清楚，依法论处。","type":"paragraph"},{"text":" 中央文革小组办事组一九六七年六月六日","type":"paragraph"}],"comments":[],"origin":"原载宁夏无产阶级革命派总指挥部政治部等编 《宁夏回族自治区无产阶级文化大革命（文件汇编）》，1968年1月27日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"宁夏文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9af2e3302"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
