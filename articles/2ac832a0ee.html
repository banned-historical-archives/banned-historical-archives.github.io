art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"日自韶山出世界人民向往毛主席故乡","authors":[],"parts":[{"type":"paragraph","text":"世界人民无比热爱毛主席。到中国访问的五大洲朋友，总希望到毛主席的故乡湖南省韶山去参观。一九六○年至一九六四年，共有两千三百多外国朋友访问了韶山。一九六五年有六十个国家的七百多人，今年头一个月又有十九个国家的一百多位外宾参观了毛主席的故乡。"},{"type":"paragraph","text":"“日自韶山出，日自东风红，当今红四面，四面起东风。”越南朋友的诗篇，表达了世界革命人民对韶山的崇敬心情。因为他们在韶山看到了革命的榜样，学到了革命的经验，增强了革命的信心。"},{"type":"paragraph","text":"一位非洲朋友在下午三时到达长沙，五时就赶到韶山毛主席旧居参观，晚上就和别人座谈农民运动问题，回到旅馆又阅读毛主席的《湖南农民运动考察报告》一文，一直到第二天清晨四时才休息，另一位非洲朋友说，我在这里受到的教育和启示，使我深信，我国工人农民手握枪支，起来推翻帝国主义走狗的反动政权，改变社会制度的日子不远了。"},{"type":"paragraph","text":"一位拉丁美洲朋友说，毛主席为了使中国人民获得解放而进行的伟大斗争，对于我们所有愿意学习做一个真正革命者的人来说，是一个取之不尽的典范的源泉，是鼓舞也是经验。"}],"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ac832a0ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
