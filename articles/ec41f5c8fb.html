script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"湘潭市冶金机械局党委把学习理论同调查研究结合起来  努力弄清对资产阶级全面专政的问题","authors":[],"dates":[{"year":1975,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湘潭市冶金机械局党委把学习理论同调查研究结合起来"},{"type":"paragraph","text":"努力弄清对资产阶级全面专政的问题"},{"type":"paragraph","text":"据新华社长沙电　湖南省湘潭市冶金机械局党委成员把看书学习同调查研究结合起来，从理论和实践的结合上努力弄清楚对资产阶级实行全面专政的问题。"},{"type":"paragraph","text":"这个局的党委成员中，有些同志原来对社会主义时期阶级斗争、两条路线斗争的长期性和复杂性认识不足。为了解决思想上的糊涂观念，党委领导成员分别到所属的一部分工厂，结合学习调查企业里阶级斗争和两条路线斗争的现状，认真地解剖麻雀。局党委书记张秀玲同党委其他几个成员到湘潭市工业学大庆先进单位第二机械厂进行调查研究。他们看到这个工厂仍然存在着社会主义和资本主义两条道路的斗争，仍然有修正主义办企业路线的影响。这个先进单位存在的问题，使他们深受教育。他们认识到，在社会主义时期，无产阶级同资产阶级的斗争，社会主义道路同资本主义道路的斗争，是长期存在的。无产阶级专政的任务是很艰巨的。经过调查研究，局党委成员加深了对无产阶级专政理论的理解。于是局党委确定六个工厂作为他们学习和调查研究的基点，他们把学习中遇到的问题，带到点上去调查研究，促进了学习的不断深入。"},{"type":"paragraph","text":"湘潭市冶金机械局党委领导成员还注意运用学到的观点，指导革命实践。有一次，一个工厂把两台不合格的产品作为正品出厂了。事情发生后，有人提出批评，厂里个别领导人却认为，这种产品是畅销货，质量差一点也会有人要。局党委一位成员就这件事组织职工学习马列和毛主席的有关教导。大家对照马克思主义理论讨论这件事，认识到以劣货充好货，是资本主义经营作风。我们是社会主义企业，决不能这样作。工厂出现这种情况，实际上是两个阶级、两条道路斗争的表现。局党委总结了这个厂的经验教训，发动群众狠抓经济领域的阶级斗争，促进了企业的斗、批、改。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec41f5c8fb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
