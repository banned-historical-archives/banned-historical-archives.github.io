rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”是流氓；阿飞的总后台","authors":["刘兵华〖HH/换行〗DW：三二三四三部队"],"parts":[{"type":"paragraph","text":"“四人帮”疯狂反对毛主席关于青年要“身体好，学习好，工作好”的指示，叫嚣“文化大革命打倒刘少奇、林彪，即使全国都成了文盲，也是最大的胜利”，明目张胆地反对青年学文化，不让青年走又红又专的道路。他们用资产阶级名利思想腐蚀青年，封官许愿，收买拉拢，还助长歪风邪气，胡说什么“流氓阿飞打群架不要紧，这样的青年可能打起仗来勇敢，当上解放军，受重伤不下火线”，等等。你要是抓阶级斗争在青年中的反映，他们就说你专找“阴暗面”，给你扣上“九斤老太”的帽子。真是一派胡言乱语。"},{"type":"paragraph","text":"培养青年，是关系到党和国家前途命运的大问题。“四人帮”竭力毒害青年，完全是为他们篡党夺权的野心服务的。他们害怕青年掌握马列主义、毛泽东思想，害怕青年懂得党的历史和社会科学、自然科学，妄图把青年变成愚昧无知的庸人，任凭“四人帮”驱使和奴役，以便他们畅行无阻地歪曲马克思主义，篡改毛主席指示，篡党夺权，复辟资本主义。他们鼓动流氓、阿飞闹事，胡说这种人会成为“勇敢战士”，是对人民军队的恶毒污蔑，也是为搞乱社会主义的革命秩序，搞垮无产阶级专政大造舆论。“四人帮”真是比蛇蝎还毒，比豺狼还狠，必须彻底批判他们的罪行。"},{"type":"paragraph","text":"“四人帮”，心肠坏，祸国殃民是罪魁。支持打砸抢，纵容武斗队，教唆青年当阿飞。"},{"type":"paragraph","text":"共青团员马洪友，批判会上声如雷。声讨“四人帮”，揭露弥天罪，誓把敌人批成狗屎堆！"},{"type":"paragraph","text":"董理忠摄（照片）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"208b3043fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
