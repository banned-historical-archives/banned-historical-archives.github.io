"authors":[],"dates":[{"year":1954,"month":12,"day":5}],"is_range_date":false,"parts":[{"text":"江西省在粮食征、购、销中死亡二十二人","type":"title"},{"text":"【江西分社五日讯】自十一月一日到二十日，江西省在粮食征、购、销中死亡二十二人，其中大都是贫农。死亡的原因：","type":"paragraph"},{"text":"一、对政府的政策有误解。永修县贫农刘东俊，去年公粮任务应减未减，怕今年再加重负担，因此在任务还未布置到户时就上吊自杀。","type":"paragraph"},{"text":"二、送粮中，不注意安全。万载县贫农许福卿带病送粮，中途昏迷，失足跌入桥下致死。弋阳县贫农张品生已病二年，这次带病担谷送粮，中途病势加重死亡。有的农民因船装过重，驶至河心沉船淹死。","type":"paragraph"},{"text":"三、部分干部强迫命令现象严重，分配任务不当。虔南县贫农郭昌佳自己报实了产量，但区干部硬说他不老实，郭因害怕而自杀。玉山县贫农张香香(女)只有五百斤余粮，但干部分配给她的任务是一千五百斤，并再三逼她卖粮，因而上吊自杀。宁都县贫农曾克信送完公粮后，家里无米下锅，要求乡政府写证明信购粮，乡政府不给证明，因而自杀。(战平编)","type":"paragraph"},{"text":"1954年12月14日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2be12fa02e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
