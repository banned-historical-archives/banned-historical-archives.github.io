tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"京沪人民踊跃参观阿图片展览会观众热烈赞扬阿尔巴尼亚人民在劳动党领导下取得的辉煌成就；对他们坚决帝国主义和现代修正主义的斗争表示敬意","authors":[],"parts":[{"type":"paragraph","text":"新华社17日讯 连日来，成千上万的首都观众，络绎不绝地来到天安门前的中国革命博物馆，参观了在这里举行的“阿尔巴尼亚劳动党领导人民解放祖国和建设社会主义图片展览会”。"},{"type":"paragraph","text":"展览会在阿尔巴尼亚劳动党成立二十周年纪念日——11月8日开幕以后，在首都各界人民中引起了极大的兴趣，人们踊跃前往参观。除首都的观众外，还有因公出差由外地来到首都的一些机关干部、解放军官兵和职工。"},{"type":"paragraph","text":"人们参观以后，纷纷在展览会留言册上写下了自己的观感。展览会留言处第一次预备的厚厚两本留言册，在展出第五天的时候，就已被观众们写满。有的写了长篇感想，还有不少人写下了热情的诗句。人们在留言中，对阿尔巴尼亚人民在以恩维尔·霍查同志为首的光荣的劳动党中央的领导下，在解放祖国胜利斗争中和在社会主义建设中取得的伟大成就，对维护社会主义阵营的团结所作出的贡献，表示热烈赞扬，并对他们坚决反对帝国主义、反对以南斯拉夫为代表的现代修正主义的斗争，表示敬意。"},{"type":"paragraph","text":"新华社上海17日电 上海举办的“阿尔巴尼亚劳动党领导人民解放祖国和建设社会主义图片展览会”开幕一个星期以来，有数万人前往参观。"},{"type":"paragraph","text":"观众当中有工人、农民、解放军官兵、学校师生、机关干部和里弄居民。很多观众参观后在留言簿上写下自己的感想。观众们对阿尔巴尼亚人民在光荣的阿尔巴尼亚劳动党的正确领导、在社会主义建设中所取得的辉煌成就，印象很深。留言中，对这些成就和他们在反对帝国主义、反对现代修正主义等方面所作出的重大贡献，表示兄弟般的祝贺和由衷的钦佩。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24f65dcd94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
