[{"year":1986,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联《现代资产阶级哲学》一书已由上海译文出版社翻译出版。作者A·C·鲍戈莫洛夫等都是长期从事西方哲学的教学和研究，有比较重要的著作，该书对近六十年来的西方哲学进行全面、系统的阐述和批判，以影响较大的新实证主义、现象学、存在主义、新托马斯主义为重点，亦广泛涉及其他流派，如晚期实用主义、哲学人类学、法兰克福学派社会哲学、哲学结构主义、宗教哲学等等。这是他们多年研究成果的概括和发展，对我国从事哲学教学和研究人员有参考价值。"},{"type":"paragraph","text":"(邹斯济)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"425d1268f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
