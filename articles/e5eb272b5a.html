<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"房山县严肃处理在四清运动中进行打击报复的现行反革命分子","authors":[],"dates":[{"year":1964,"month":10,"day":6}],"is_range_date":false,"parts":[{"text":"房山县严肃处理在四清运动中进行打击报复的现行反革命分子","type":"title"},{"text":"本报讯    北京市房山县委最近在良乡公社徐庄大队召开群众大会，严肃处理了破坏四清运动、毒打贫协委员的现行反革命分子孙德增（原来是党员、治保主任、民兵连长）和李德安（原来是团员，党支部书记的弟弟）。","type":"paragraph"},{"text":"良乡公社徐庄大队一队贫协委员、四清班子成员王淑春（女，团员，二十四岁，下放工人），在运动中揭发了党支部书记、治保主任的严重四不清问题，因此，四不清干部把她看成眼中钉。孙德增等人经常骂她“仗着四清吃饭”，“想当官”，“夜壶镶金边，嘴巧”。孙还威胁说：“你怎么闹腾，也出不了我的手心。”在分派农活时，对她故意刁难。工作组集中到县里进行整训期间，他们的报复活动更加猖狂。八月七日，王在地里劳动时，孙向她说下流话，王提出质问，孙就将王按倒在地，拳打脚踢。支部书记的弟弟李德安也乘机上去打了王两个嘴巴，还将半块四、五斤重的西瓜打在王的头上，把王打昏。王醒后，向李说理，孙又过来打王打了一顿。王不服，到孙、李两家去说理，又被孙打昏过去。事情发生后，党支部委员杨令乾向支部书记李德纯反映了这个情况，但李不仅不处理这个案子，反而向派出所指导员卢信打电话，说王“蛮横无理，疯疯癫癫”。卢信赶到孙家，不部青红皂白，即说：“这样蛮横无理，死了就埋了。”并亲自与孙、李一起，把王抬出扔在大道旁（过了一个小时，才把王抬到大队部的炕上）。卢还用电话向上级汇报，说王“无理取闹”，“装死”。王躺在大队四、五天，直到公社主任来了才把她送到医院。王的伤势很重，到医院后还继续吐血。","type":"paragraph"},{"text":"县委查清上述情况后，于九月十六日在徐庄召开了五千余人的群众大会，经过被害人家属和贫下中农控诉斗争，宣布孙德增、李德安为现行反革命分子，立即逮捕法办，开除孙德增、李德纯的党籍，开除李德安的团籍。县公安局长也代表公安局向群众做了检讨，并宣布撤销卢信的派出所指导员职务。最后县委书记霍柴同志讲了话。为了教育全体干部，更好地为贫下中农撑腰，全县各公社、机关、工厂、学校都根据县委指示派代表参加了这次大会，会后并广泛地进行了传达讨论。市公安局为了教育干部民警，也通知郊区所有派出所长参加大会。","type":"paragraph"},{"text":"会后各方面反映十分强烈。广大贫下中农欢欣鼓舞，热烈拥护政府的处理，认为给自己撑了腰出了气，表示要继续和坏人坏事作斗争。有些贫协干部检查了所得罪人的思想，表示今后要大胆工作。会后，基层干部特别是四不清干部的震动也很大，许多人反映受到了教育，认识到对提意见的人打击报复是破坏四清运动的行为，严重的还会转化为敌我矛盾，因此多数人态度较前老实，有些人还主动地交代了一些问题。四类分子纷纷表示要安分守法。（编自北京市委《简报》）","type":"paragraph"},{"text":"来源：根据1964年10月6日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5eb272b5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
