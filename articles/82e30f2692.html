长","authors":[],"dates":[{"year":1958,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席　刘委员长　周总理"},{"type":"paragraph","text":"贺蒙古人民革命胜利三十七周年"},{"type":"paragraph","text":"陈毅外长电贺阿维尔齐德外长"},{"type":"paragraph","text":"新华社10日讯　毛泽东主席、刘少奇委员长、周恩来总理今天致电蒙古人民共和国大人民呼拉尔主席团主席扎·桑布和部长会议主席尤·泽登巴尔，祝贺蒙古人民革命胜利三十七周年。电文如下：蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志：蒙古人民共和国部长会议主席尤·泽登巴尔同志："},{"type":"paragraph","text":"当蒙古人民革命胜利三十七周年的时候，我们谨代表中华人民共和国政府和中国人民向你们，并且通过你们向蒙古人民共和国政府和蒙古人民致以热烈的祝贺。"},{"type":"paragraph","text":"蒙古人民在蒙古人民革命党和蒙古人民共和国政府的领导下，在建设社会主义、巩固以苏联为首的社会主义阵营的团结和维护亚洲和世界和平各方面取得了显著的成就。为此中国人民感到无限的欢欣。不久以前，蒙古人民革命党召开的第十三次代表大会总结了蒙古人民进行社会主义建设的经验和制定了新的发展国民经济的三年计划。我们深信，勤劳勇敢的蒙古人民在建设社会主义的事业中一定会获得新的、更大的成就。"},{"type":"paragraph","text":"祝中蒙两国人民兄弟般的友谊不断发展。"},{"type":"paragraph","text":"祝蒙古人民共和国日益繁荣富强。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长  刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九五八年七月十日于北京"},{"type":"paragraph","text":"新华社10日讯　国务院副总理兼外交部长陈毅今天致电蒙古人民共和国外交部长阿维尔齐德，祝贺蒙古人民革命胜利三十七周年。电文如下：蒙古人民共和国外交部长阿维尔齐德同志："},{"type":"paragraph","text":"当蒙古人民革命胜利三十七周年的时候，谨向你致以衷心的热烈的祝贺。"},{"type":"paragraph","text":"祝中蒙两国人民的兄弟友谊在建设社会主义和维护世界和平的共同斗争中更加巩固和发展。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼外交部长　陈毅"},{"type":"paragraph","text":"一九五八年七月十日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82e30f2692"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
