" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺胡志明七十五寿辰的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺胡志明七十五寿辰的电报"},{"type":"paragraph","text":"（1965年5月18日）河内越南劳动党中央委员会主席、越南民主共和国主席亲爱的胡志明同志："},{"type":"paragraph","text":"在你七十五寿辰的时候，我们代表中国共产党、中华人民共和国政府和中国人民，并且以我们个人的名义向你，亲爱的主席同志，致以最热烈的祝贺。"},{"type":"paragraph","text":"你是越南劳动党的创始者和久经考验的领袖，是国际共产主义运动杰出的老战土，中国人民最亲密的朋友。几十年来，你高举反对帝国主义和革命的旗帜，领导越南人民为祖国的解放事业，进行了英勇顽强、坚韧不拔的斗争，取得了伟大的胜利，并在越南民主共和国的社会主义建设事业中取得了辉煌的成就。你对越南人民革命和建设事业，对国际共产主义运动和世界和平的事业，作出了卓越的贡献，受到了中国人民和全世界革命人民的尊敬。"},{"type":"paragraph","text":"目前，英勇的越南人民正在越南劳动党和你的英明领导下，以决战决胜的英雄气概进行着气壮山河的抗美救国正义斗争。越南人民的这场斗争，不仅是为了捍卫越南自己的独立、主权和民族尊严，而且也支援了亚洲、非洲、拉丁美洲的民族解放斗争，支援了毛泽东全集第四十八卷全世界各国人民的革命斗争。中国人民坚决同你们站在一起，全世界一切革命的人民也都站在你们一边。伟大的越南人民必胜，万恶的美国侵略者必败。"},{"type":"paragraph","text":"亲爱的主席同志，我们衷心祝你健康、长寿。祝越南人民在保卫北方、解放南方、统一祖国的伟大的抗美救国斗争中，不断取得新的、更加辉煌的胜利。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年五月十八日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":5,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":45,"page_end":46},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e004de13e0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
