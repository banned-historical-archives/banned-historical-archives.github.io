script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1466","name":"对违反四项基本原则的错误观点应进行适当的批驳","author":"中共中央宣传部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"对违反四项基本原则的错误观点应进行适当的批驳","dates":[{"year":1981,"month":5,"day":6}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态：1981 (选编), 120-122","tags":[{"name":"大学","type":"主题/事件"},{"name":"科学","type":"主题/事件"},{"name":"民主","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"社会主义改造","type":"主题/事件"},{"name":"四项基本原则","type":"主题/事件"},{"name":"宣传部","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"},{"name":"自我批评","type":"主题/事件"}],"parts":[{"type":"title","text":"中文"},{"type":"title","text":"对违反四项基本原则的错误观点应进行适当的批驳"},{"type":"paragraph","text":"《南京大学学报》去年第四期发表题为《关于我国社会主义改造后期的几个理论问题》一文，有严重政治错误。文章在论述我国社会主义实践的历史经验时，偏离马克思主义的方向，公开非难、反对我们党在五十年代所进行的社会主义改造。它把我国的社会主义改造看作是“开历史的倒车”；污蔑我们党的指导思想是“狭隘经验论和历史唯心主义”；指责我们党有一个“反科学、反民主、反进步的，以马克思主义为招牌，以农业社会主义为核心，以封建社会主义为归结的派别”。很显然，文章对于我党性质和我国社会主义制度的观点，都是违反四项基本原则的。"},{"type":"paragraph","text":"这篇文章的出现不是偶然的。在过去一段时间内，有一种说法，认为中国必须经过资本主义阶段或者国家资本主义阶段才能进入社会主义，或者认为中国现在应该退回到新民主主义时期。这并不是一两个人所持有的观点，而是当前理论界部分同志中存在的一种思潮。对这种错误观点如果不加批驳，不仅对我们正确认识历史的经验教训毫无裨益，而且只能引起人们对党的现行方针、政策的怀疑和不满，起一种涣散人心、瓦解斗志的作用。"},{"type":"paragraph","text":"对当前理论界出现的某些违反四项基本原则的错误观点，应该重视，并应进行适当的批驳，不能犹豫和含糊。但是，进行这种斗争，应当采取慎重的态度。一般地说，这些同志还是思想认识问题，应该采取处理人民内部矛盾的“团结——批评——团结”的方法，贯彻疏导的方针，和风细雨，摆事实，讲道理，以理服人。要欢迎他们作自我批评，不要施加压力。在公开报刊上对违反四项基本原则的错误观点进行批评时，要注意行文的分寸，不要给人造成一种印象， 以为我们党内对我党性质的评价和对我党现行的路线、方针已发生严重的分歧；或者以为我们对这些有错误观点的同志要“一棍子打死”。"},{"type":"paragraph","text":"大学学报和其他报刊是公开发行的刊物，有些还销售到国外，具有广泛的影响。发表文章应该慎重，报刊编辑部必须以对党和人民负责的态度把好关。如果不谨慎地发表一些政治上有明显错误的文章，很容易为海外反动报刊所利用，并在有些研究中国问题的学者中间造成错觉，误认为我们党现在就是文章所描述的这种状况，或者误认为这是中国学术界的公论。这都将在政治上产生不好的后果。一切办有报刊的党委，要加强领导，重要文章要亲自过目。必须严格按照中央〔1981〕七号文件办事。凡是涉及党的路线、方针、政策以及重大政治性的理论问题，对外必须统一于党中央的决定和口径，与党的步调一致，不得各行其是。无论什么报刊，都不能为那些反对四项基本原则的错误观点提供宣传阵地。涉及到对毛泽东同志和毛泽东思想的评价问题，更要严肃对待，不可以轻率地进行议论。最近有的地方党委加强对报刊的领导，拟对过去报刊上发表的文章作一次清理和检查，总结经验教训，这个做法是可取的。"},{"type":"subtitle","text":"(第20期，5月6日)"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acc647c8c7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
