<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海电力建设公司党委举办干部学习班热情歌颂文化大革命的伟大胜利狠批林彪的“克己复礼”反动纲领","authors":[],"dates":[{"year":1974,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海电力建设公司党委举办干部学习班，认真学习毛主席在无产阶级文化大革命中的一系列指示，热情歌颂文化大革命的伟大胜利，批判林彪一伙效法孔老二“克己复礼”，恶毒攻击文化大革命，妄图复辟资本主义的罪行，进一步提高了捍卫无产阶级文化大革命伟大成果的自觉性。"},{"type":"paragraph","text":"随着批林批孔斗争的深入，这个公司举办了公司党委委员、革委会委员和部分基层干部学习班，认真学习毛主席关于“这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的”教导。在学习中，同志们体会到:如果不进行这场文化大革命，刘少奇、林彪一伙的阴谋就会得逞，我们劳动人民就会吃二遍苦。讨论中，大家大摆了在文化大革命中涌现出来的新生事物，如工人阶级进驻上层建筑、五·七干校、知识青年上山下乡等，狠批了林彪的“克己复礼”反动纲领。不少同志还联系本单位干部队伍建设的情况，畅谈了文化大革命的伟大成果。在公司系统现有干部中，有一百六十三名是在文化大革命中涌现出来的新干部，占公司干部总数的百分之七十。这些新干部朝气蓬勃，在抓革命、促生产中发挥了很大的作用。如公司党委委员、团委书记原是一位普通女工。担任领导工作后，努力学习，勇挑重担，抓好对青年的思想和路线教育，把青年工作搞得生气勃勃。一些来自基层单位的老干部也用切身的体会谈了文化大革命给自己带来的变化。如在某大型电站建设中作出了成绩的一位老干部说:“文化大革命前，由于自己不努力学习，放松了世界观的改造，结果官架子大了，革命意志衰退了。文化大革命中，经过群众的帮助，使我冲刷了身上的修正主义臭气，焕发了革命朝气。”在学习班上，新老干部热情歌颂了老、中、青三结合的优越性。"},{"type":"paragraph","text":"在讨论中，大家用电力建设的发展情况，热情地歌颂了无产阶级文化大革命，迎头痛击林彪一伙对文化大革命的污蔑。同志们说:在无产阶级文化大革命中，我们狠批了刘少奇、林彪一类骗子推行的洋奴哲学、爬行主义和破坏电力建设的罪行，坚持“独立自主、自力更生”的方针，促进了电力建设的发展。就拿我们公司装机容量来说，一九七二年的装机容量和上海地区装机容量最高的一九五九年相比，增长了百分之十九点二，在闵行“一二五”工程中，我们用全部国产设备安装了两台十二万五千瓦的双水内冷汽轮发电机组，装机速度也不断地加快。第一台机组从安装到投产，前后不到十个月时间。第二台机组从安装到投产的时间又出第一台机组缩短了两个月。目前，我们又在加速安装发电容量更大的机组。通过这样的对比，大家深深感到:没有这次文化大革命，也就没有今天电力工业的蓬勃发展。大家表示:在批林批孔运动中，一定要和群众站在同一条战壕里，把这场斗争进行到底!　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3bfb3f0a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
