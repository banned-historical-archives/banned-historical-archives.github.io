script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阮友寿主席和黄晋发主席致电毛主席 衷心感谢毛主席庄严声明对越南南方人民支持和援助","authors":[],"dates":[{"year":1970,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十六日电　中国共产党中央委员会毛泽东主席，收到了越南南方民族解放阵线中央委员会主席团主席、越南南方共和临时革命政府顾问委员会主席阮友寿和越南南方共和临时革命政府主席黄晋发发来的电报。电报表示衷心地深切地感谢毛主席在五月二十日发表的支持世界人民反对美帝斗争的庄严声明中，给予越南南方人民的新的非常宝贵的支持和援助。电报全文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"毛泽东主席"},{"type":"paragraph","text":"敬爱的主席:"},{"type":"paragraph","text":"越南南方人民、民族解放阵线和越南南方共和临时革命政府，对于主席一九七○年五月二十日的重要声明，对于首都北京以及中国各地广大人民热烈拥护主席声明的沸腾的革命激情，对于中国人民对世界革命人民、尤其是对正在英勇反抗美帝国主义侵略者及其走狗的印度支那各国人民强烈表示出的战斗团结，感到无比振奋。"},{"type":"paragraph","text":"我们谨代表越南南方人民，民族解放阵线，越南南方共和临时革命政府，和以我们个人的名义，对敬爱的主席和伟大的中国人民给予我们越南南方人民和印度支那人民在抗美救国战争中的巨大动员和鼓舞，以及这一新的非常宝贵的支持和援助，表示衷心的深切的感谢。"},{"type":"paragraph","text":"越南南方人民永远记着和无限感激主席的深情的话:“七亿中国人民是越南人民的坚强后盾，辽阔的中国领土是越南人民的可靠后方。”"},{"type":"paragraph","text":"在世界人民的强有力的、充满热情的同情和支持下，我们越南南方人民更加振奋，更加相信自己的正义事业必定胜利，决心坚持和大力促进战斗，给敌人以致命的打击，一定实现敬爱的胡志明主席“抗美抗战可能还要延长。我国人民可能还要牺牲更多的人力和物力。我们无论如何也要决心抗击美国强盗，直到取得彻底的胜利”神圣遗嘱的教导。在越南南方民族解放阵线和越南南方共和临时革命政府的领导下，越南南方人民决心同兄弟的高棉人民和老挝人民一道，粉碎美帝国主义及其走狗强化和扩大侵略战争的一切阴谋和行动，出色地履行对自己祖国所肩负的神圣义务，为印度支那人民和世界人民的辉煌的革命斗争事业作出积极的贡献。越南人民、高棉人民和老挝人民一定取得彻底胜利。"},{"type":"paragraph","text":"借此机会，我们祝英雄的中国人民在主席和光荣的中国共产党的领导下，在保卫和建设自己祖国的事业中取得更加辉煌的成就。"},{"type":"paragraph","text":"敬祝主席健康，长寿!"},{"type":"paragraph","text":"越南南方民族解放阵线中央委员会主席团主席"},{"type":"paragraph","text":"越南南方共和临时革命政府顾问委员会主席"},{"type":"paragraph","text":"阮友寿"},{"type":"paragraph","text":"越南南方共和临时革命政府主席　黄晋发"},{"type":"paragraph","text":"一九七○年五月二十四日于越南南方"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"077f40ddd8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
