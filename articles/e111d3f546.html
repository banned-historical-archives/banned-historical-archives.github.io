ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对第二届全国政协会议筹备情况简报的批语","alias":"","parts":[{"type":"paragraph","text":"对第二届全国政协会议筹备情况"},{"type":"paragraph","text":"简报的批语"},{"type":"paragraph","text":"（1954年11月18日）周总理："},{"type":"paragraph","text":"章程与名单\"数日内即宜大体确定，否则十二月二十日以前开会恐来不及。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十八日"},{"type":"paragraph","text":"[1]指中国人民政治协商会议组织章程和第二届全国政协委员名单。政协全国委员会工作会议1954年11月3日讨论筹备第二届政协问题的情况简报中说：关于修改政协组织章程的工作，一致同意不必另写共同纲领，在政协组织章程前面加总纲一章，并推定13人组成起草小组，于10日内提出初稿，交工作会议讨论。关于第二届全国政协的参加单位，一致同意定为29个，即11个党派，17个团体以及特别邀请人士。政协各参加单位的名额，由各单位根据实际情况和需要进行安排，不搞平均主义。各党派、团体的人选，于10日内提出名单草案，先交工作会议协商，并加以平衡。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":343,"page_end":343},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e111d3f546"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
