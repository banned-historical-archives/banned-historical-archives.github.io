[],"dates":[{"year":1957,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"祝贺阿富汗独立纪念日"},{"type":"paragraph","text":"毛主席周总理分别致电阿富汗国王和首相"},{"type":"paragraph","text":"新华社讯　毛泽东主席在25日致电阿富汗王国国王穆罕默德·查希尔·沙阿，祝贺阿富汗王国独立纪念日。"},{"type":"paragraph","text":"贺电中说：“当阿富汗王国独立纪念日的时候，我谨代表中国人民和政府并且以我个人的名义向陛下和阿富汗人民表示诚挚的祝贺。"},{"type":"paragraph","text":"我们高兴地看到，中阿两国的友好关系，在过去一年中已经有了发展。我们深信，这种友好关系，在双方共同的努力下，今后必定会得到不断的巩固和加强。祝阿富汗国家繁荣、阿富汗人民幸福和陛下健康。”"},{"type":"paragraph","text":"新华社讯　周恩来总理在25日致电阿富汗王国首相穆罕默德·达乌德汗，祝贺阿富汗王国独立纪念日。周总理在电报中代表中国政府和中国人民，向达乌德汗首相并且通过他向阿富汗人民致衷心的祝贺。"},{"type":"paragraph","text":"电报中还说：“我一直怀着感谢的心情，回忆今年在贵国访问的时候阁下和阿富汗王国政府所给予的亲切接待和阿富汗人民对我的热情欢迎。祝中阿两国人民的友谊将日益巩固和发展。祝阁下健康。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c82701dfd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
