tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈祝贺华国锋同志任中共中央主席；中央军委主席","authors":[],"parts":[{"type":"paragraph","text":"泰国共产党中央的贺电"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"亲爱的同志们："},{"type":"paragraph","text":"泰国共产党中央委员会代表全体党员和泰国革命人民，对华国锋同志就任中国共产党中央委员会主席、中国共产党中央军事委员会主席，向中国共产党中央委员会和中国人民致以最热烈的祝贺。"},{"type":"paragraph","text":"我们祝贺并完全支持以华国锋同志为首的中国共产党中央委员会坚决粉碎王洪文、张春桥、江青、姚文元反党反革命集团篡党夺权阴谋的伟大胜利。"},{"type":"paragraph","text":"粉碎“四人帮”反党反革命集团阴谋的这一胜利，是无产阶级的伟大胜利，是中国人民具有历史意义的伟大胜利。它捍卫了毛泽东主席的无产阶级革命路线，使中国无产阶级专政更加巩固；它坚决、及时地粉碎了妄图使党变修、使社会主义中国变色的反革命阴谋。全中国人民为这一伟大胜利而感到高兴，全世界革命人民也为此而感到高兴。"},{"type":"paragraph","text":"我们坚信，在以华国锋同志为首的中国共产党中央委员会的领导下，团结在党中央周围的中国人民，一定能够在社会主义革命和社会主义建设中，取得更加伟大的成就和胜利，实现毛主席所制定的宏伟计划，为人类作出更大的贡献。"},{"type":"paragraph","text":"泰国共产党中央委员会"},{"type":"paragraph","text":"一九七六年十月二十六日于泰国"},{"type":"paragraph","text":"挪威工人共产党（马列）的贺信"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"华国锋主席"},{"type":"paragraph","text":"我们代表工人共产党（马列）对我们的兄弟党——伟大的、具有丰富经验和胜利的中国共产党选举华国锋同志为党的主席表示祝贺。"},{"type":"paragraph","text":"以马克思主义、列宁主义、毛泽东思想为基础的我们的党，把毛主席的党——中国共产党看作为它在斗争中的光辉榜样和巨大鼓舞。我们挪威共产党人将永远同中国共产党人站在一起，并支持他们反对修正主义和资产阶级的斗争。"},{"type":"paragraph","text":"保尔·斯泰根（主席）"},{"type":"paragraph","text":"代表工人共产党（马列）工作委员会"},{"type":"paragraph","text":"一九七六年十月二十三日于奥斯陆"},{"type":"paragraph","text":"日本共产党（左派）中央的贺电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"热烈祝贺华国锋同志任中国共产党中央委员会主席、中国共产党中央军事委员会主席。"},{"type":"paragraph","text":"期望中国的社会主义革命和社会主义建设继续发展。"},{"type":"paragraph","text":"愿日中两党的团结在马克思主义、列宁主义、毛泽东思想的基础上更加发展。"},{"type":"paragraph","text":"日本共产党（左派）中央委员会"},{"type":"paragraph","text":"一九七六年十月二十七日"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbf9bfb0cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
