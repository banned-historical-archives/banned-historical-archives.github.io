是不会长了","authors":[],"dates":[{"year":1968,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十九日电　在北京的美国著名作家安娜·路易斯·斯特朗十八日在接见新华社记者时说，毛主席支持美国黑人抗暴斗争的声明是一个非常重要的声明，这个声明一定也会被美国的进步白人所欢迎。"},{"type":"paragraph","text":"她谈到了毛主席在声明中说的这个论点:“这场黑人的斗争风暴发生在美国国内，是美帝国主义当前整个政治危机和经济危机的一个突出表现。它给陷于内外交困的美帝国主义以沉重的打击。”她说，美帝国主义现在面临着沉重的危机，那就是:反对进行侵越战争的斗争，遍及全国的黑人抗暴斗争，以及财政危机。这些危机互相联系，显示了美国社会的瓦解。"},{"type":"paragraph","text":"她说，从去年夏天以来，黑人运动席卷了一百多个城市。在这些地区，黑人举行起义，用武装斗争抗击暴力镇压。黑人运动每年每月都在发展，变得越来越壮大和坚决。这场斗争必将继续下去，其斗争的矛头也是指向美国垄断资本主义本身。"},{"type":"paragraph","text":"安娜·路易斯·斯特朗在结束谈话时指出:美帝国主义在国内外面临着许多困难。美帝国主义的日子是不会长了。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"252270986e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
