ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"致郑位三、李先念等电","alias":"","parts":[{"type":"paragraph","text":"致郑位三、李先念等电!"},{"type":"paragraph","text":"（1946年7月17日）"},{"type":"paragraph","text":"目前国方重心在歼灭我军，无意和平。你们应集中注意对付敌人，不要上当。只有到敌人无法歼灭我军，我军反而严重威胁敌人大后方之时，才有可能迫使敌人改变计划，停止追击，恢复和平。因此你们暂时不要派代表出去，但可写信给两小组（由地方交顽军转达），要求国方停止追击，以便派遣代表出去谈判。"},{"type":"paragraph","text":"[1]这是毛泽东关于三人小组向突围的中原部队空投通知要求谈判一事，为中共中央起草的致郑位三、李先念并告周恩来、叶剑英电的主要"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":503,"page_end":503},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13e336f6e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
