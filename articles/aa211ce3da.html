script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人大全体会议接受华国锋辞去总理职务请求决定赵紫阳为国务院总理","authors":[],"dates":[{"year":1980,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"补选彭冲、习仲勋、粟裕、杨尚昆、班禅为人大常委会副委员长；增补杨静仁、张爱萍、黄华为国务院副总理"},{"type":"paragraph","text":"接受聂荣臻、刘伯承、张鼎丞、蔡畅、周建人辞去副委员长职务请求；接受邓小平、李先念、陈云、徐向前、王震、王任重辞去副总理职务请求；还接受陈永贵要求解除副总理职务请求"},{"type":"paragraph","text":"新华社北京九月十日电　五届人大第三次会议今天上午在人民大会堂举行全体会议，决定和增选国务院、人大常委会的领导成员。"},{"type":"paragraph","text":"大会接受了华国锋辞去国务院总理职务的请求，并决定赵紫阳为国务院总理。"},{"type":"paragraph","text":"大会补选彭冲、习仲勋、粟裕、杨尚昆、班禅额尔德尼·却吉坚赞为人大常委会副委员长。"},{"type":"paragraph","text":"大会还根据国务院总理赵紫阳提名，增补杨静仁、张爱萍、黄华为国务院副总理。"},{"type":"paragraph","text":"大会执行主席叶剑英宣布开会。出席今天上午大会的代表有三千二百五十一人。本届人大代表共三千四百七十八人。"},{"type":"paragraph","text":"大会执行主席彭真主持进行今天上午大会的各项议程。"},{"type":"paragraph","text":"大会通过决议，同意中共中央提出的对国务院部分组成人员进行调整的建议，接受华国锋辞去国务院总理职务，邓小平、李先念、陈云、徐向前、王震、王任重辞去国务院副总理职务的请求。"},{"type":"paragraph","text":"大会决定接受聂荣臻、刘伯承、张鼎丞、蔡畅、周建人辞去人大常委会副委员长职务的请求。"},{"type":"paragraph","text":"大会还接受了陈永贵要求解除他国务院副总理职务的请求。"},{"type":"paragraph","text":"接着，大会进行了各项投票表决。当大会宣布决定赵紫阳为国务院总理时，全场热烈鼓掌。"},{"type":"paragraph","text":"随后，大会补选了彭冲、习仲勋、粟裕、杨尚昆、班禅额尔德尼·却吉坚赞为五届全国人大常委会副委员长，杨尚昆兼五届全国人大常委会秘书长；选举马寅初、王观澜、邓兆祥、平错汪阶、司马义·艾买提、费彝民、郭增恺、缪云台为五届全国人大常委会委员。"},{"type":"paragraph","text":"大会根据国务院总理赵紫阳的提名，投票决定增补杨静仁、张爱萍、黄华为国务院副总理。"},{"type":"paragraph","text":"根据全国人民代表大会组织法的规定，今天的选举、表决采用无记名投票方式进行，选票和表决票用汉、蒙古、藏、维吾尔、哈萨克、朝鲜六种文字印制。"},{"type":"paragraph","text":"今天上午大会执行主席还有李德生、倪志福、胡乔木、杨得志、阿沛·阿旺晋美、胡厥文、胡立教、赵林、栗又文、杜心源、徐健生、安平生、毛致用、林丽韫。"},{"type":"paragraph","text":"出席五届全国政协第三次会议的全体委员列席了今天上午的大会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王任重","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"陈永贵","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"王震","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"陈云","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa211ce3da"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
