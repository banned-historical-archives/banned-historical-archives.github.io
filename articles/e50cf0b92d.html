"dates":[{"year":1974,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年五月十二日电　国务院总理周恩来、副总理邓小平同巴基斯坦伊斯兰共和国总理佐勒菲卡尔·阿里·布托今天下午在亲切友好的气氛中举行了会谈。"},{"type":"paragraph","text":"巴基斯坦方面参加会谈的有:布托总理的随行人员贾拉勒丁·阿卜杜勒·拉希姆、阿齐兹·艾哈迈德、穆罕默德·优素福·布奇、迈拉杰·哈立德、蒙塔兹·阿里·布托、阿迦·夏希、阿夫塔卜·艾哈迈德·汗、拉希姆·汗少将、里亚兹·穆罕默德·汗。巴基斯坦驻中国大使阿尔维，大使馆外交官员米尔查、沙加德·阿里、玛苏德也参加了会谈。"},{"type":"paragraph","text":"中国方面参加会谈的有姬鹏飞、方毅、张才千、韩念龙、李克、封永顺、陆维钊、路奎、高建中、唐叶文、章含之、唐闻生。中国驻巴基斯坦大使张彤，也参加了会谈。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\745d010401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e国务院总理周恩来、副总理邓小平同巴基斯坦伊斯兰共和国总理佐勒菲卡尔·阿里·布托五月十二日下午在亲切友好的气氛中举行了会谈。这是会谈时情形。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1974,"month":5,"day":13}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来总理邓小平副总理同布托总理在亲切友好的气氛中举行会谈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年五月十二日讯 国务院总理周恩来、副总理邓小平同巴基斯坦伊斯兰共和国总理佐勒菲卡尔·阿里·布托今天下午在亲切友好的气氛中举行了会谈。"},{"type":"paragraph","text":"巴基斯坦方面参加会谈的有：布托总理的随行人员贾拉勒丁·阿卜杜勒·拉希姆、阿齐兹·艾哈迈德、穆罕默德·优素福·布奇、迈拉杰·哈立德、蒙塔兹·阿里·布托、阿迦·夏希、阿夫塔卜·艾哈迈德·汗、拉希姆·汗少将、里亚兹·穆罕默德·汗。巴基斯坦驻中国大使阿尔维，大使馆外交官员米尔查、沙加德·阿里、玛苏德也参加了会谈。"},{"type":"paragraph","text":"中国方面参加会谈的有姬鹏飞、方毅、张才千、韩念龙、李克、封永顺、陆维钊、路奎、高建中、唐叶文、章含之、唐闻生。中国驻巴基斯坦大使张彤也参加了会谈。（附照片）"},{"type":"paragraph","text":"国务院总理周恩来、副总理邓小平同巴基斯坦伊斯兰共和国总理佐勒菲卡尔·阿里·布托五月十二日下午在亲切友好的气氛中举行了会谈。"},{"type":"paragraph","text":"这是会谈时情形。（新华社记者 摄）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e50cf0b92d"},"bui
