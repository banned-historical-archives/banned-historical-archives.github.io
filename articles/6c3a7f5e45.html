垒  指出在反帝反殖反修斗争中团结起来的革命者和人民必胜","authors":[],"dates":[{"year":1969,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瓜德罗普民族组织小组热烈祝贺我国文化大革命的伟大胜利"},{"type":"paragraph","text":"中国成为反帝反修斗争的坚强堡垒"},{"type":"paragraph","text":"指出在反帝反殖反修斗争中团结起来的革命者和人民必胜"},{"type":"paragraph","text":"新华社一日讯　瓜德罗普民族组织小组不久前在一封祝贺中国无产阶级文化大革命取得伟大胜利的来信中指出，在战无不胜的毛泽东思想指引下，中国已成为反帝反修斗争的不可攻克的堡垒。"},{"type":"paragraph","text":"信中说：“在中国共产党的领导下，在战无不胜的毛泽东主席的思想的指引下，中国人民在反帝反修斗争中取得了辉煌的胜利，并进一步地开展了无产阶级文化大革命。"},{"type":"paragraph","text":"“中国的革命者在夺取无产阶级文化大革命胜利的斗争中所取得的成就，是全世界人民的成就，因为这些成就使中国成为反帝、反修和世界革命的不可攻克的堡垒。”"},{"type":"paragraph","text":"信中说，中国人民的斗争“给正在反对帝国主义和现代修正主义的全世界革命者提供了许多教益。”信中指出，中国人民站在社会主义革命的最前线。中国人民在社会主义革命和社会主义建设中所取得的光辉胜利，反映了他们能正确地领会毛主席的战无不胜的思想。"},{"type":"paragraph","text":"信中说，瓜德罗普人民欢呼中国人民的胜利，并向当代最伟大的马克思列宁主义者毛泽东主席和他的亲密战友林彪副主席以及光荣的中国共产党致以最好的祝愿。"},{"type":"paragraph","text":"信中指出，瓜德罗普人民正在为反帝、反殖、反修，争取瓜德罗普的民族独立而斗争。"},{"type":"paragraph","text":"信中说：以美帝为首的世界帝国主义必败。以苏修领导集团为中心的现代修正主义必败。在反帝、反殖、反修斗争中团结起来的革命者和人民必胜。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c3a7f5e45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
