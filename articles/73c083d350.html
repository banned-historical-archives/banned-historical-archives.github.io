" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"在中央给张经武的电报稿上加写的一段话","alias":"","parts":[{"type":"paragraph","text":"在中央给张经武的电报稿上"},{"type":"paragraph","text":"加写的一段话"},{"type":"paragraph","text":"（1951年11月14日）"},{"type":"paragraph","text":"因达赖送礼事?与你回中央一事有关，但中央认为你暂时应留拉萨帮助国华等工作一个时期，何时回来将来再定，因此达赖送礼事亦应缓办。"},{"type":"paragraph","text":"[1]张经武，当时任中央人民政府驻西藏代表。"},{"type":"paragraph","text":"[2]指西藏宗教领袖达赖喇嘛·丹增嘉措准备向毛泽东等中央领导人送礼物一事。中央在给张经武的电报中，指示了对这一问题的处理意见：“只要送毛主席一份礼物即够，且礼物不要多。锦旗外，送什么东西，由他们决定。但除供陈列的文物外，土产和用品都不要送（都是取之于民的东西），或尽少送。此外，向朱总司令、周总理送一面锦旗，对其他负责人均不要送。”"},{"type":"paragraph","text":"[3]国华，即张国华，当时任驻西藏的中国人民解放军第十八军军长。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":11,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":65,"page_end":65},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73c083d350"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
