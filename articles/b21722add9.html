script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共《赤旗报》号召人民胜利举行“三·一八”统一行动  加强统一战线推进反美斗争  加强基层活动和团结，粉碎修正主义—分裂主义者阴谋","authors":[],"dates":[{"year":1964,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共《赤旗报》号召人民胜利举行“三·一八”统一行动"},{"type":"paragraph","text":"加强统一战线推进反美斗争"},{"type":"paragraph","text":"加强基层活动和团结，粉碎修正主义—分裂主义者阴谋"},{"type":"paragraph","text":"新华社十二日讯　东京消息：日本共产党中央机关报《赤旗报》十二日发表社论，号召日本人民为争取三月十八日“反对金钟泌访日、粉碎日韩会谈、争取恢复日中邦交统一行动”的胜利而奋斗。"},{"type":"paragraph","text":"社论表示支持东京中部六个区的维护和平与民主共同斗争会议九日联合发表的呼吁书。这个呼吁书号召全国人民在三月十八日展开统一行动。"},{"type":"paragraph","text":"社论强调说，胜利举行这次统一行动，不仅能够推动反对美帝国主义和爱国的统一行动进一步发展，统一战线进一步加强，并且将有助于促使“反对安全条约维护和平民主国民会议”恢复活动。社论指出，为了争取三月十八日统一行动的胜利，目前最重要的是，加强基层的活动，加强团结，并粉碎一小撮修正主义—分裂主义者的阴谋，使他们更加陷于孤立。"},{"type":"paragraph","text":"日本京都市民两千五百多人在十日举行的一次集会上，一致通过决议，坚决反对“日韩会谈”，要求立即恢复日中邦交。大会通过的其他决议包括：反对美国核潜艇开进日本港口；反对苛捐和物价上涨；要求立即无条件地恢复“反对安全条约维护和平民主国民会议”的活动等。"},{"type":"paragraph","text":"大会一致表示支持上述东京中部六个区的联合呼吁书。"},{"type":"paragraph","text":"据新华社讯　东京消息：日本共产党机关报《赤旗报》三日发表社论，强调在国际范围内孤立美帝国主义。"},{"type":"paragraph","text":"这篇题为《日本人民的斗争和美帝国主义的国际孤立》的社论说，反对美帝国主义的斗争在世界各地蓬勃高涨。它特别提到亚洲国家的反对美帝国主义的斗争。"},{"type":"paragraph","text":"社论要求为进一步加强反对美帝国主义的斗争而努力，要求更加放手地揭露和抨击追随美国的卖国的日本反动势力。（附图片）"},{"type":"paragraph","text":"在静冈市为纪念“比基尼事件”十周年而举行的“歌声节”上，一群青年引吭高歌，表达他们坚持反美爱国斗争的决心。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b21722add9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
