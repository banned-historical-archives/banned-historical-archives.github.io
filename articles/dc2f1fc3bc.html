957,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"赶上了“毛泽东号”"},{"type":"paragraph","text":"北京铁路管理局古冶机务段徐兴旺包乘组驾驶的二二七三号机车，已经安全行驶一百万公里以上。这是我国铁路继“毛泽东号”机车包乘组之后第二个创造货运机车安全行驶百万公里无事故纪录的包乘组。"},{"type":"paragraph","text":"徐兴旺包乘组从1950年以来的近八年当中，积极地学习和推广先进经验，使操作技术不断提高，保证了机车行驶的安全。自从1951年到今年9月4日，这个包乘组共给国家节约煤一千七百八十六吨多，节省材料费一万二千八百四十三元。（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc2f1fc3bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
