script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"祝贺苏联红军成立二十五周年的电报","description":"","dates":[{"year":1943,"month":2,"day":21}],"parts":[{"text":"祝贺苏联红军成立二十五周年的电报","type":"title"},{"type":"paragraph","text":"斯大林同志、联共中央和红军的将士们："},{"type":"paragraph","text":"中国共产党中央委员会代表全党同志与中国人民热烈地庆祝红军成立的二十五周年与红军反攻的伟大胜利。"},{"type":"paragraph","text":"经过了二十五年的奋斗，特别是经过了二十个月的反法西斯侵略的奋斗，红军节已经由国际劳动群众的“狂欢节”发展为全人类的“狂欢节”。五大洲一切民族爱好自由的人民，都已由亲身的经验，一致公认红军和苏联人民是抵抗法西斯暴力的中流砥柱，是创造新的和平世界的急先锋。红军近三个月来的攻势，在全世界到处都引起欢呼和赞美。全世界到处都在研究着红军胜利的军事和政治教训。红军的攻势，无疑是历史上空前的，并且其规模和速度还在不断加大。红军从十一月十九日在伏尔加河上的危城发动反攻，三个月后就一跃而至六百多公里以西的第聂伯河附近。红军将希特勒匪徒完全驱出国境，只是时间问题了。自从红军开始对德战争，世界形势就已经发生了显著的变化，现在由于红军的胜利，新世界的未来面目也更加明朗，更加确定了。一切形式的法西斯制度和法西斯思想，已经在全世界永远失去存在的余地。民族的自由、政治的民主已经成为新世界的确定不移的原则，我们中国人民欢迎这个新时代的到来，我们欢迎全世界一切反法西斯力量为争取这个新时代的团结和努力。与红军的胜利同时，英、美在北非，美国在太平洋，也都得到了重要的胜利。英、美正在积极准备实践欧陆第二条战线的诺言。对于中国，美、英都废除了不平等条约。中国人民对于这个新时代的首要任务就是更加团结自己，准备像红军驱逐德国侵略者一样地驱逐日本侵略者。我们相信，由于中国人民的团结奋斗，由于苏联、英、美的胜利和对于中国的援助，我们也一定能够转入反攻并取得最后胜利的。"},{"type":"paragraph","text":"红军和红军的最高统帅斯大林万岁！"},{"type":"paragraph","text":"反法西斯侵略战争的胜利万岁！"},{"type":"paragraph","text":"中、苏、英、美的团结万岁！"},{"type":"paragraph","text":"中国共产党中央委员会毛泽东"},{"type":"paragraph","text":"根据一九四三年二月二十二日"},{"type":"paragraph","text":"《解放日报》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":13,"index":1},{"part_idx":3,"offset":224,"index":2},{"part_idx":3,"offset":492,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["苏联红军是一九一八年二月二十三日建立的。","指斯大林格勒，即今伏尔加格勒。","欧陆第二条战线，指第二次世界大战中英、美在欧洲大陆开辟反法西斯德国的战场。一九四一年七月十八日，苏联人民委员会主席斯大林在给英国首相丘吉尔的信中，正式提出在欧洲大陆的西部或北部开辟第二战场问题。后经苏、英、美三国政府多次协商，于一九四二年六月达成协议，英、美两国同意在一九四二年开辟欧洲第二战场。此后，由于英、美两国的一再拖延，直到一九四四年六月，英、美军队才在法国西北部诺曼底地区登陆，正式开辟了欧洲第二战场。"],"page_start":17,"page_end":18,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6ff845a72"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
