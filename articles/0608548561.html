torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"关于对阁锡山的态度致叶剑英、刘鼎电","alias":"","parts":[{"type":"paragraph","text":"关于对阎锡山的态度致叶剑英、刘鼎电"},{"type":"paragraph","text":"（1936年10月23日）剑、刘："},{"type":"paragraph","text":"经过李毅或另设他法向阎锡山表示下列各点："},{"type":"paragraph","text":"一、完全同情普绥当局及其军队对日抗战捍卫疆土的决心与行动，他们的这种决心与行动将获得全国人民的拥护，苏维埃与红军将竭力以全力以为之助。"},{"type":"paragraph","text":"二、我们十分盼望与晋绥当局成立谅解以至订立抗日协定。"},{"type":"paragraph","text":"三、只要晋绥当局真正抗日，而不与日本妥协，红军在未得普绥当局同意之前，决不冒然向普绥开进。"},{"type":"paragraph","text":"四、在双方谅解之后，红军依约进入划定之地区与防线，担任一定战斗任务，并服从统一之指挥，红军不干涉晋绥当局之行政事宜。"},{"type":"paragraph","text":"五、某方援助我们可担任介绍。"},{"type":"paragraph","text":"东十月二十三日十六时"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":10,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":251,"page_end":251},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0608548561"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
