<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共临泉县委关于缺粮地区生活摸底及安排情况的报告","authors":[],"dates":[{"year":1960,"month":2,"day":15}],"is_range_date":false,"parts":[{"text":"中共临泉县委关于缺粮地区生活摸底及安排情况的报告","type":"title"},{"text":"（一）对灾区社员生活安排，我们按照地委指示，将地委分配给我们的供应指标，现已逐级控制到食堂，绝大部份地区均已张榜公布，社员生产情绪大大稳定，我们安排情况是：","type":"paragraph"},{"text":"二月分供应442089人,占总人口49％，按每人半斤粮，半斤淀粉计算共需1325万斤，其中自救解决812万斤，国家供应513万斤。","type":"paragraph"},{"text":"三月分供应446084人，占总人口50％，共计1337万斤，其中自救解决622万斤,供应715万斤。","type":"paragraph"},{"text":"四月分供应534324人,占总人口的60％，共需1603万斤，其中自救解决857万斤，供应746万斤。","type":"paragraph"},{"text":"五月分供应540453人，占总人口60.6％，共需粮1604万斤,其中自救解决993万斤,供应621万斤。","type":"paragraph"},{"text":"共计安排面540453人，占总人口60.6％，共需粮5809万斤,其中自救解决3284万斤，供应2595万斤。","type":"paragraph"},{"text":"（二）但是经过自下而上摸底排队，实际缺粮面积比我们控制的稍大，且都超过我们控制面积，近日摸底排队情况是：","type":"paragraph"},{"text":"二月分缺粮的552289人，占总人口61.6％，比我们控制的面积大17.8％，共需1656万斤，自有粮135万斤，尚缺粮1521万斤，其中：自救能解决758万斤，需供应763万斤。与我们分配的指标相比尚差250万斤。","type":"paragraph"},{"text":"三月分缺粮的649551人,占总人口的72.5％，比我们控制面积大22.4％，共需1980万斤，其中自救解决965万斤，需供应1015万斤，与我们分配的指标相比尚差300万斤。","type":"paragraph"},{"text":"四月分缺粮的761948人，占总人口84.9％，比我们控制的面积大24.9％，共需2286万斤，其中：自救解决1165万斤，需供应1121万斤，与我们分配的指标相比尚差375万斤。","type":"paragraph"},{"text":"五月分缺粮的761948人，占总人口的84.9％，比我们控制面积大24.3％，共需2286万斤,其中自救解决1390万斤，需供应896万斤,与我们控制的指标相比，尚差275万斤。","type":"paragraph"},{"text":"共计缺粮面761948人，占总人口84.9％，比我们控制的面积大24.3％，共需粮8208万斤,自有粮135万斤，尚缺粮8073万斤，其中自救能解决4278万斤,需供应3795万斤。地委分配给我县供应指标3000万斤，元月分已供应下去405万斤，还有2595万斤，按实际需要相差1200万斤需要国家供应。","type":"paragraph"},{"text":"（三）由于上述安排数字与实际缺粮数字有所悬殊，因此，出现了三个问题：","type":"paragraph"},{"text":"第一、按实有缺粮面按标准供应，结果突破指标，如姜砦公社我们二月分控制缺粮面占20％，分给供应指标9万斤，实际供应面占30％，除自救外需供应20万斤，因此控制的9万斤指标，到本月8号已全部售完。目前已售到14万斤，超过指标49％。","type":"paragraph"},{"text":"第二、按控制面积按标准供应的地方，不能完全解决问题，生活上目前仍有困难，如城关公社肖洼大队，24个食堂有6个食堂因缺粮未作安排，现已停伙数日。","type":"paragraph"},{"text":"第三、按实有面积，按分配指标供应的地方，结果不到规定的口粮标准，如同城公社小袁庄大队，目前缺粮的3800人，公社分旬供应15000斤，每人每天只平均6.2两。长官有6个大队现在已缺粮，其中■桥大队已断粮三天，可是离2月底还有半个月时间。","type":"paragraph"},{"text":"以上仅是当前已经暴露的问题，如不解决今后就不能全部安排好生活，为此，特报告地委，呈请再增拨供应粮1200万斤，以便彻底安排好灾区社员生活。","type":"paragraph"},{"text":" 中共临泉县委员会（章）1960年2月15日","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"982602b5fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
