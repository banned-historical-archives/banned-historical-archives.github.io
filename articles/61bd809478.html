script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"必须坚决打击分裂分子赫鲁晓夫指出铁托集团扮演了不光采的角色，走上了修正主义的道路","authors":[],"dates":[{"year":1958,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京5日电】　据塔斯社列宁格勒讯:列宁格勒劳动群众4日在冬宫广场举行大会，欢迎捷共中央第一书记、捷克斯洛伐克总统诺沃提尼。赫鲁晓夫和诺沃提尼在会上讲了话。"},{"type":"paragraph","text":"赫鲁晓夫在讲话中指出，人民民主国家完成社会主义建设并开始向共产主义过渡已经为期不远了。捷克斯洛伐克将在最近一些年内建成社会主义。他说，苏联和捷克斯洛伐克之间的真正的兄弟友谊关系的基础是列宁的思想。捷克斯洛伐克人民之所以取得了巨大的成就，是由于捷克斯洛伐克共产党在工作中遵循着列宁的学说。"},{"type":"paragraph","text":"在谈到修正主义者企图分裂国际共产主义运动的问题时，赫鲁晓夫强调指出，共产党和工人党正在给分裂分子以坚决的打击。赫鲁晓夫继续说，南斯拉夫共产主义者联盟的领导人扮演了不光采的角色，走上了修正马克思列宁主义基本原则的道路。他们力图证明苏联和其他社会主义国家在进行反对南斯拉夫的运动。赫鲁晓夫说，我们曾经讲过不止一次，我们没有、也不打算进行反对南斯拉夫人民的运动，但是我们要进行反对一切修正马克思主义的分子的斗争。"},{"type":"paragraph","text":"诺沃提尼讲话说，苏捷两国人民的友谊正在日益巩固和发展。他说，捷克斯洛伐克所取得的成就是由于捷克斯洛伐克人民的顽强劳动以及同苏联的兄弟合作。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61bd809478"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
