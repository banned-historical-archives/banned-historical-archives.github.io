" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"企业管理委员会应有工程师、技师及职员参加","alias":"","parts":[{"type":"paragraph","text":"企业管理委员会应有工程师、技师及职员参加凹"},{"type":"paragraph","text":"(1948年4月26日）华东局，并告谭震林同志："},{"type":"paragraph","text":"卵东震林同志关于淄、博、周、张城市政策电甚好，请转发华"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的转发华东野战军副政治委员兼山东兵团政治委员谭震林1948年4月1日关于淄川、博山、张店、周村的情况及所取之政策报告的批语。1948年4月11日，毛泽东在审阅谭震林这个报告时，写过一段和本文内容一致的按语，说：“这里没有提到工程师、技师及有经验的职员。单是经理及工人代表是不够的，必须有工程师、技师及职员参加管理委员会。这个委员会应当是厂长负责制下面的管理委员会。在任何企业中，必须重视有知识有经验的工程师、技师及职员，必要时不惜付出高薪，即使是国民党人也要利用。”"},{"type":"paragraph","text":"[2]指谭震林1948年4月1日给中共中央华东局并转中央等的报告。报告说，周村针对去年斗错了一些商人的情况，决定召集市民座谈会、大中商人会议听取意见，解决问题。设法解决被斗错了的商人的困难，退还没收错了的房屋、机器等，私人工厂发还给私人，股份制企业用代管办法经营，归还私人的股份。协助企业搞好生产，繁荣市面。张店情况较好。淄川、博山也采取与周村一样的方针。对公营大煤矿，决定工厂管理经营的方式是由工人职员及财办派去的干部共同组织管理委员会，以后再正式成立经理、工会代表合作的正式管理委员会。东局所属各区党委、各市委、华中工委及陈粟、韦陈\"参考。但有一点请你们注意，即该电在说到企业的正式管理委员会时，只说由经理、工会代表组织管理委员会，没有提到工程师、技师及有经验的职员。须知单是经理及工人代表是不够的，必须有工程师、技师及职员参加管理委员会，这个委员会应当是厂长负责制下面的管理委员会。在任何企业中，除厂长或经理必须被重视外，还必须重视有知识有经验的工程师、技师及职员。必要时，不惜付出高薪。即使是国民党人，只要有可能，也要利用。这一点，请同时转告各地。这一点，我们在过去亦没有说清楚，故在这里补充说明。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"卵宥"},{"type":"paragraph","text":"[1]陈粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。韦，指韦国清（1913一1989），广西东兰人，当时任华东野战军苏北兵团司令员。陈，指陈不显（1916一1995），福建上杭人，当时任华东野战军苏北兵团政治委员。"},{"type":"paragraph","text":"司时辣告老地我们在过去我没有清楚，故在言"},{"type":"paragraph","text":"C卡hy"},{"type":"paragraph","text":"辅亮洗明说毛泽东为中共中央起草的致华东局电的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":4,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":234,"page_end":236},"tags":[{"name":"毛泽东","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"企业管理委员会应有工程师、技师及职员参加","description":"根据毛泽东手稿刊印。","dates":[{"year":1948,"month":4,"day":26}],"parts":[{"text":"企业管理委员会应有工程师、技师及职员参加","type":"title"},{"type":"appellation","text":"华东局，并告谭震林同志："},{"type":"paragraph","text":"卯东震林同志关于淄、博、周、张城市政策电甚好，请转发华东局所属各区党委、各市委、华中工委及陈粟、韦陈参考。但有一点请你们注意，即该电在说到企业的正式管理委员会时，只说由经理、工会代表组织管理委员会，没有提到工程师、技师及有经验的职员。须知单是经理及工人代表是不够的，必须有工程师、技师及职员参加管理委员会，这个委员会应当是厂长负责制下面的管理委员会。在任何企业中，除厂长或经理必须被重视外，还必须重视有知识有经验的工程师、技师及职员。必要时，不惜付出高薪。即使是国民党人，只要有可能，也要利用。这一点，请同时转告各地。这一点，我们在过去亦没有说清楚，故在这里补充说明。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"卯宥"}],"comment_pivots":[{"part_idx":0,"offset":20,"index":1},{"part_idx":2,"offset":20,"index":2},{"part_idx":2,"offset":50,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东为中共中央起草的转发华东野战军副政治委员兼山东兵团政治委员谭震林一九四八年四月一日关于淄川、博山、张店、周村的情况及所取之政策报告的批语。一九四八年四月十一日，毛泽东在审阅谭震林这个报告时，写过一段和本文内容一致的按语，说：“这里没有提到工程师、技师及有经验的职员。单是经理及工人代表是不够的，必须有工程师、技师及职员参加管理委员会。这个委员会应当是厂长负责制下面的管理委员会。在任何企业中，必须重视有知识有经验的工程师、技师及职员，必要时不惜付出高薪，即使是国民党人也要利用。”","指谭震林一九四八年四月一日给中共中央华东局并转中央等的报告。报告说，周村针对去年斗错了一些商人的情况，决定召集市民座谈会、大中商人会议听取意见，解决问题。设法解决被斗错了的商人的困难，退还没收错了的房屋、机器等，私人工厂发还给私人，股份制企业用代管办法经营，归还私人的股份。协助企业搞好生产，繁荣市面。张店情况较好。淄川、博山也采取与周村一样的方针。对公营大煤矿，决定工厂管理经营的方式是由工人职员及财办派去的干部共同组织管理委员会，以后再正式成立经理、工会代表合作的正式管理委员会。","陈粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。韦，指韦国清（一九一三——一九八九），广西东兰人，当时任华东野战军苏北兵团司令员。陈，指陈丕显（一九一六——一九九五），福建上杭人，当时任华东野战军苏北兵团政治委员。"],"page_start":101,"page_end":101,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af2c5c0884"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
