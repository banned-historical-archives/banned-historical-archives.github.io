rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理同贾卢德阁下举行会谈"},{"type":"paragraph","text":"国务院副总理邓小平同阿拉伯利比亚人民社会主义民众国总人民代表大会总秘书处成员阿卜杜勒·萨拉姆·贾卢德五日上午举行了会谈。"},{"type":"paragraph","text":"英萨利副总理离京回国"},{"type":"paragraph","text":"柬埔寨共产党中央委员会常委、民主柬埔寨政府负责外交事务的副总理英萨利及其随行人员，五日上午乘飞机离开北京回国。外交部部长黄华等到机场送行。"},{"type":"paragraph","text":"柬埔寨政府军事代表团离京回国"},{"type":"paragraph","text":"柬埔寨共产党中央委员会候补常委、负责国防事务的副总理、革命军总参委员会主席宋成和由他率领的民主柬埔寨政府军事代表团，圆满地结束了对我国的正式友好访问，五日上午乘飞机离开北京回国。前往机场欢送的有：中共中央政治局委员、国务院副总理陈锡联等。"},{"type":"paragraph","text":"五日上午，首都机场上悬挂着中柬两国国旗。当宋成副总理和其他柬埔寨战友驱车来到机场时，聚集在这里的指战员们敲锣打鼓，高呼口号，热烈祝贺宋成同志率领的代表团访问我国取得圆满成功。宋成副总理频频向中国同志挥手告别。"},{"type":"paragraph","text":"耿飚副总理回到北京"},{"type":"paragraph","text":"国务院副总理耿飚圆满结束了对牙买加、圭亚那、特立尼达和多巴哥、马耳他等国的友好访问，五日上午乘专机回到北京。国务院副总理李先念、康世恩等到机场欢迎。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d078c3c86d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
