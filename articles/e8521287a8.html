authors":["李富春"],"dates":[{"year":1966,"month":10,"day":9}],"is_range_date":false,"parts":[{"text":"李富春对北京地质学院“东方红”公社五同学的讲话","type":"title"},{"text":"李富春","type":"authors"},{"text":"（一）你们可以在地质部设立联络站。地质部拨房子给你们。地质部办公，你们办公，地质部的牌子你们的牌子互不干扰。你们不要把地质部的牌子摘掉，地质部也不应把你们的牌子摘掉。","type":"paragraph"},{"text":"（二）今晚你（指周荣鑫秘书长）同他们一起去，把工作队整理革命师生员工，包括干部的材料和已消毁的清单交出来，给《东方红》总部，邹家尤可以留在你们那个地方，摆事实，讲道理进行辩论。","type":"paragraph"},{"text":"（三）《东方红》不是反革命的，要平反。叫何长工宣布，向全国宣布。","type":"paragraph"},{"text":"（四）卓雄可以调回来。（卓雄是地质部付部长，因犯错误调往××探矿机械厂，调回是因为《东方红》同学了解情况所需要）","type":"paragraph"},{"text":"（五）下次开斗争会时，何长工、胥光义、赵承来、旷伏兆、卡固都要参加斗争会。","type":"paragraph"},{"text":"（另外，李富总理还交给我们找地质部所谓黑帮谈话的权利。）","type":"paragraph"}],"comments":[],"origin":"北京航空学院红旗战斗队《无产阶级文化大革命运动中首长讲话》（1966.11），《大字报选 第二集》（北京：一院大字报选编小组，1966.12）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8521287a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
