件”冤案的调查报告","authors":[],"dates":[{"year":1978,"month":12,"day":28}],"is_range_date":false,"parts":[{"text":"中共陕西省委办公厅关于所谓“恶毒攻击毛主席的反革命事件”冤案的调查报告","type":"title"},{"text":"关于所谓“恶毒攻击毛主席的反革命事件”冤案的调查报告","type":"appellation"},{"text":"在落实党的干部政策、平反昭雪“三案”中，根据省委办公厅党的核心小组决定，我们对一九六八年底一九六九年初在清队运动中，原办公厅斗批改领导小组上报省级机关斗批改小组并省革委会，错定的一起所谓“恶毒攻击毛主席的反革命事件”的冤案进行了调查，先后找了当事的二十多名同志了解情况，查阅了省委、省革委会六八年至七四年的发文、会议记录、电报和原省委机关、省委办公厅斗批改、工宣队、省级机关斗批改的档案，以及省专案办的有关档案，现将情况报告如下：","type":"paragraph"},{"text":"一、事件真相和立案经过。一九六二年七千人大会后，省委根据中央关于发扬民主、实行“三不”，听取群众意见，检查总结工作的指示精神，将大家讨论的意见向中央写了一个报告，报告中有一部分是对中央一些领导同志的批评意见。这项工作是由当时的省委第二书记赵守一同志负责的，具体组织工作由秘书长刘邦显、副秘书长白瑞生和办公厅副主任杜鲁公同志负责，办公厅综合组承担收集情况、整理简报、起草报告的工作。这事根据中央、西北局通知和毛主席在大会上的讲话精神进行的，这完全符合组织原则和党章规定的，是合理合法的，也是党内正常的民主生活的体现，是无可非议的。","type":"paragraph"},{"text":"一九六八年三月，原办公厅大联委组织人员查阅档案中，发现了这个报告的手抄件，给大联委作了报告，当即进行了一般查证。到六八年十月四日，办公厅斗批改领导小组开会研究深挖阶级敌人的问题时，正式把“给毛主席整理黑材料”的问题列为清查内容之一。以后办公厅斗批改进行了多次研究，十二月十日会上，把这个问题列为办公厅要抓的案件之一。一九六九年元月九日会上，研究确定了用十天左右时间，举办清查这一问题的专题学习班。","type":"paragraph"},{"text":"【未完】","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e4921277f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
