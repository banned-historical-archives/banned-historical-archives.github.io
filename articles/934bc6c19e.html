art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"千歌万曲唱不尽毛主席的英明伟大","authors":["北京卫戍区某部警卫连全体指战员"],"parts":[{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席到外地视察刚回到北京，又接见了在京的军事干部。这是对我们全军指战员的最大关怀、最大鼓舞，最大鞭策。天大地大不如您老人家恩情大，爹亲娘亲不如您老人家亲。让我们最最衷心地祝愿您老人家万寿无疆！万寿无疆！万寿无疆！万寿无疆！"},{"type":"paragraph","text":"毛主席啊，毛主席！我们担负北京市革命委员会警卫任务的全体战士，最听您老人家的话，最最忠于您，忠于您的伟大思想，忠于您的革命路线。革命委员会是在您老人家的光辉思想指导下出现的新事物，北京市革命委员会是在您老人家的亲切关怀下诞生的。革命委员会好，革命委员会就是好！"},{"type":"paragraph","text":"您老人家号召我们：“人民解放军应该支持左派广大群众”。我们深深懂得，保卫好革命委员会，就是具体地响应了您老人家的号召，就是最大的支左。我们坚决执行您的指示，一定圆满地完成任务。"},{"type":"paragraph","text":"您老人家号召我们“拥军爱民”，我们也深深懂得，保卫好革命委员会，就是最大的爱民。我们要为无产阶级革命派站好每一班岗，全心全意地为人民服务。要以爱民模范李文忠同志为榜样，作到：毛主席热爱我热爱，毛主席支持我支持，毛主席称赞我称赞，毛主席的指示我照办。"},{"type":"paragraph","text":"今天，在您的最新指示的鼓舞下，全国广大革命群众正在您的光辉思想指引下，实行革命大联合，无产阶级文化大革命形势空前大好。当我们看到成千上万的革命群众到革命委员会向您老人家报喜的时候，内心有说不出的喜悦，千言万语说不完您老人家的伟大，千歌万曲唱不尽您老人家的英明。我们坚决紧跟您的伟大战略部署，为搞好革命的大批判，促进革命的大联合，实现和巩固革命的“三结合”，作出最大的努力。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"934bc6c19e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
