<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央音乐学院开始大“鳴”大“放”党、团干部思想混乱","authors":["新华社記者","李正杰"],"dates":[{"year":1957,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"中央音乐学院开始大“鸣”大“放”党、团干部思想混乱","type":"title"},{"text":"新华社記者李正杰","type":"authors"},{"text":"新华社天津6日讯  中央音乐学院学生出大字报比其他学校稍晚，但是来势很猛，几天内就贴出很多。主要的内容是:","type":"paragraph"},{"text":"(一)对党员干部进行人身攻击和谩駡，有的提出要开除某党员的党籍，有的把党员说成涂了漆的共产党员。","type":"paragraph"},{"text":"(二)认为学校党委会有严重缺点，不满意和风细雨，质问为什么过去历次对待群众的运动都是暴风骤雨，而整党却要和风细雨?","type":"paragraph"},{"text":"(三)否定肃反工作的成绩，认为有几十个人被斗错了。徐荣坤在大字报中写着：肃反错误是全国性的，要求党中央再次实事求是地来重新估计肃反的成绩。","type":"paragraph"},{"text":"(四)对教学上存在的问题长期没有解决表示不满，认为学校大多数领导干部都不熟悉业务，不能领导学校。","type":"paragraph"},{"text":"(五)一致要求把学校迁至北京。","type":"paragraph"},{"text":"难以计数的大字报中，有两份大字报有独特的内容。一份是写着：狄盖特曲、张三词的“新国际歌”歌词是：“起来，飢寒交迫的奴隶，起来，全院的罪人！满腔的热血已经沸腾，作一次坚决的整风，粉碎那宗派主义的锁炼，奴隶们起来起来，莫要说我们一钱不值，我们是新社会的主人！这是坚决的斗争，团结起来反三害，真正民主自由就一定要实现，这是坚决的斗争，团结起来反三害，真正民主自由就一定要实现！”","type":"paragraph"},{"text":"另一份是署名苏三的“交响诗”：","type":"paragraph"},{"text":"序曲","type":"paragraph"},{"text":"（一）煑豆燃豆箕，豆在锅中泣；","type":"paragraph"},{"text":"同是爱国者，何必煑太急；","type":"paragraph"},{"text":"（二）话堪说时直需说，","type":"paragraph"},{"text":"莫待无人空吱吱。","type":"paragraph"},{"text":"第一乐章","type":"paragraph"},{"text":"津门之疆兮土飞扬，","type":"paragraph"},{"text":"烟雾拢照兮渺茫茫，","type":"paragraph"},{"text":"奇矣仓库兮音乐府，","type":"paragraph"},{"text":"弦外之音兮凄怆怆。","type":"paragraph"},{"text":"第二乐章","type":"paragraph"},{"text":"解放八年兮运动重重，","type":"paragraph"},{"text":"大张旗鼓兮雷厉风行，","type":"paragraph"},{"text":"今朝整风兮和风细雨，","type":"paragraph"},{"text":"宇宙干坤兮群众呼声，","type":"paragraph"},{"text":"爱党爱国兮尔吾有分，","type":"paragraph"},{"text":"助党整风分重放光明。","type":"paragraph"},{"text":"第三乐章","type":"paragraph"},{"text":"金冠王带兮紫罗袍，","type":"paragraph"},{"text":"逢迎献媚兮乌纱辑，","type":"paragraph"},{"text":"庶民疾苦兮有望日，","type":"paragraph"},{"text":"党召整风兮春放光。","type":"paragraph"},{"text":"中央音乐学院在这次整风运动中，一个值得注意的问题是有些党员干部的思想动荡不定。党委委员、团委书记陈自明曾带着团委委员和学生会的干部一起去找党委书记赵渢，通求表示对“鸣”、“放”的态度。随后他们又出黑板报表明团委会是站在群众这一边，幷对党委会不敢大胆发动“鸣”、“放”提出意见。当群众起来以后，陈自明等团委会干部又有些沉不住气，恐怕别人批评自己压制“鸣”、放”。在群众喊党员为什么不出来讲话的时候，陈自明的头脑也就热了，不顾党委的部署(党委对党员在运动中采取的步骤、方法都有过布置)也跟着喊：党员应该出来讲话。团委会一些委员不同意党委布置的校刊应该坚持“广开言路、坚定信心”的原则，提出我们为什么要服从党委的原则，校刊上应该什么都登。团委委员王振先还主办了一个来函照登的大字报“大开门”。4日陈自明和另外两个党委委员以及几个支部委员、教师党员自动组织了一个小会，对党委表示不满，认为党委没有积极领导搞大字报的活动。第二天(昨天)他们还找整风领导小组说：你们如何如何，而却把身为党委委员的自己置身事外。党委会办公室主任李芳文等人对他们说：“你们都是党委委员， 党委会决定时你们也参加了，怎么还分“你们”、“我们”呢?","type":"paragraph"},{"text":"另外，在贴大字报的风潮中，这个学校的大部分团员在团委委员的带头下，也都成了积极分子。","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参考》，第2224期，1957年6月7日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a379b8c9c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
