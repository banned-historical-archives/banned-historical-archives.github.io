script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级思想引导我做了一桩坏事情","authors":["华钰"],"dates":[{"year":1952,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东师大　华钰"},{"type":"paragraph","text":"通过三反斗争，我认识到一个从旧社会过来的青年，他是极容易受到资产阶级思想的沾染，并会立即表现在行动上的，就我自己来说，我就检查出这样的一桩事实。"},{"type":"paragraph","text":"解放时，我在重庆西南工专念书，那时我们全校同学到中美合作所实地去看反动派大屠杀的罪行，我看到那里面的地上丢着很多的无线电器材，我是学无线电的，见了便非常心爱，于是趁旁人不注意时就拿了一部中型发报机回来，心里还十分得意，后来重庆市军管会出了一张布告，大意是凡拾得的军用器材均应一律缴还政府，学校里接着也进行了一次检查，结果我想出一个“办法”，把机壳拆下丢到河里，把另件改装成两部收音机和一部扩音机，供自己使用，终于没有把它缴还人民。"},{"type":"paragraph","text":"我虽非出生在资产阶级的家庭里，但我一直受着资产阶级的思想教育，我这种行为当时曾受到好多人的夸奖，我的父兄也说我“非常机智”，我就这样由于沾染了资产阶级的自私自利思想，竟做出违犯政府法令的反人民的勾当。"},{"type":"paragraph","text":"今天我身为未来的人类灵魂工程师——人民教师，因此我应该有一个正确坚定的立场，在思想上更不能沾上资产阶级的污毒，然而事实已经造成，我痛恨，我愤怒，我要控诉这些可耻的资产阶级思想的包围和进攻，我要无情的粉碎它!"},{"type":"paragraph","text":"在人民的面前我把这件事情暴露出来，我要化愤怒为力量，把资产阶级思想全部肃清，并且提醒广大同学，资产阶级是无孔不入的，我们不能认为自己是白璧无瑕，我们之中中毒的也已不在少数了!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98e6cf7c90"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
