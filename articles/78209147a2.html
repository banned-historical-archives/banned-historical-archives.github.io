ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"视察四川省一个养猪场时的谈话","alias":"","parts":[{"type":"paragraph","text":"视察四川省一个养猪场时的谈话"},{"type":"paragraph","text":"（1958年3月）"},{"type":"paragraph","text":"毛泽东（以下简称毛）：（对饲养员）辛苦了，好同志！（握手）祝你们获得更大成功！"},{"type":"paragraph","text":"饲养员（以下简称饲）：全靠你老人家的教导！毛：主要是你们自己的努力。（对社长）能使你们全社妇女都当上模范吗？社长：保证全能当上，毛主席！"},{"type":"paragraph","text":"毛：全当上模范未必行吧！只能在二三年内做到有一半妇女当上模范就不错了。你说我这个看法保守吗？（众笑）"},{"type":"paragraph","text":"毛：参观一下你们的养猪场好吗？饲：欢迎，欢迎！毛主席多指教！"},{"type":"paragraph","text":"毛：别什么都要我指教吧，我和口口都是来向你们学习的，在许多事情上，你们比我们内行多了，是吧？"},{"type":"paragraph","text":"毛：这是什么？饲：是糖化牛粪，拿来喂猪的，猪很爱吃。"},{"type":"paragraph","text":"毛：真是新鲜事儿，牛粪也能喂猪！怎么个制法？介绍一下吧。（摸出日记本来作记录，向口口说）来，我们都记上吧，这是群众的创造！从前我们就没听见说过。看来我们中国那句老话“做到老，学到老”实在不错！"},{"type":"paragraph","text":"视察四川省一个养猪场时的谈话毛：（对一个回乡知识青年）回家喂猪有意见吗？饲：有啥意见呀！我一辈子也不愿意离开这养猪场哩！毛：很好！可要把你学的科学，传授给群众才更好。毛：·多看看先进的东西，眼光就会更开阔些。（亲自给一头猪打了蛋清针，然后对口口口说）"},{"type":"paragraph","text":"这里的经验真不少，特别是代饲料，如果全国都推广，一年要节约好几十亿斤粮食哩！请记者同志在报纸上介绍一下好吗？"},{"type":"paragraph","text":"口口：办得到。毛：最好后天见报。（对饲养员）谢谢你们！对我们教育太大了！饲：可有人看不起我们哩！毛：谁？谁是顽固派？（饲养员介绍一些人如何从轻视妇女到称赞妇女的成绩）"},{"type":"paragraph","text":"毛：看不起妇女的人虽不多，但哪里总有几个，这不完全怪他们，过去封建制度对他们影响太深了，脑筋一下不容易转过弯来，又不能用飞机大炮来对付他们。那怎么办呢？我看除了加强教育外，最好的办法，就是妇女同志们做出成绩来，多拿事实给他们看，看得多了，他们脑子里的那个“封建王国”就会不攻自破的。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":194,"page_end":195},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78209147a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
