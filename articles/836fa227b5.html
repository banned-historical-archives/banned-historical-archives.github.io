<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都举行盛大春节联欢晚会李先念赵紫阳等同万余群众共度佳节　叶剑英和彭真在广州同军民一起联欢","authors":[],"dates":[{"year":1981,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二月四日电　首都各界群众一万五千多人今晚在人民大会堂举行盛大春节联欢晚会，共贺新春。"},{"type":"paragraph","text":"李先念、赵紫阳等党和国家领导人同首都群众一起欢度佳节。叶剑英、彭真在广州同军民一起联欢。"},{"type":"paragraph","text":"除夕夜晚，首都一片鞭炮声。人民大会堂里张灯结彩，喜气洋洋，穿着节日新装的群众兴高采烈地观看各种文艺节目和参加自己喜爱的娱乐活动。大礼堂的音乐会在欢快的民乐合奏《春节序曲》中开始，一些著名歌唱家、演奏家演出了群众喜爱的节目。“一阵阵歌声，一阵阵笑声，笑声中迎来了春光好”，“千条江河奔向海洋，各族人民的心永远向着党”，歌唱家们的演唱激起了群众热烈的掌声。在三楼宴会厅里，相声演员们以幽默诙谐的表演，提倡要讲礼貌，讲道德，建设高度的社会主义精神文明，受到观众的欢迎。在一楼北大厅，运动员们表演的体操、技巧和武术，显示了朝气蓬勃的精神面貌。在三楼小礼堂和其他厅室里，京剧、电影、杂技、游艺等丰富多采的节目，吸引了大批群众，许多同志一边游玩，一边交谈，表示在新的一年里，要为实现国民经济的调整，进一步巩固和发展安定团结的大好形势，贡献自己的力量。"},{"type":"paragraph","text":"出席联欢晚会的还有韦国清、乌兰夫、方毅、余秋里、张廷发、耿飚、倪志福、彭冲、陈慕华、赛福鼎、万里、王任重、谷牧、宋任穷、杨得志、姚依林、谭震林、廖承志、阿沛·阿旺晋美、胡厥文、肖劲光、朱蕴山、史良、习仲勋、班禅额尔德尼·却吉坚赞、薄一波、杨静仁、张爱萍、黄华、黄火青、韩先楚、杨勇、王平、陈锡联、刘澜涛、陆定一、康克清、季方、周建人、胡子昂、王昆仑、何长工、肖克、程子华、杨秀峰、钱昌照等同志。"},{"type":"paragraph","text":"中共中央和国家机关各部门，各人民团体，中国人民解放军各总部、各军兵种和北京市的负责人，以及来自工业、农业、财贸、科技、文教、体育、卫生等各条战线的劳动模范和部队战斗英雄参加了联欢晚会。"},{"type":"paragraph","text":"今天的晚会是由文化部和北京市人民政府联合举办的。"},{"type":"paragraph","text":"王震、胡乔木、杨尚昆在广州，许世友在南京，李德生在沈阳，参加了军民春节联欢活动。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1981\\02\\8125010501.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e二月四日晚，首都举行盛大春节联欢晚会。中共中央副主席李先念、国务院总理赵紫阳等党和国家领导人同首都群众欢聚一堂，共庆新春佳节。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"彭真","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"836fa227b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
