:[],"dates":[{"year":1969,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沈阳重型机器厂革命工人，怀着对伟大领袖毛主席无限敬仰的深厚无产阶级感情，制造成功我国第一台八千吨多层热压机主机。这台主机，可以印制高三米六，宽一米六的毛主席塑面板彩色画像。画像表面光滑，日晒不褪色，雨淋不变形。制造一台这样大的设备，按计划需要两年半的时间。广大革命工人以“只争朝夕”的革命精神，仅仅用了九个月的时间就制造成功。　(据新华社)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82cdefac02"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
