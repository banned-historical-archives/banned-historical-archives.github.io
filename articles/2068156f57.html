rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛主席把中国领导得这么好”","authors":[],"parts":[{"type":"paragraph","text":"今年五月，比利时首都布鲁塞尔举行了国际博览会。中国首次参加这一博览会的展出，成为轰动的盛事。每天从早到晚，观众川流不息地来到中国馆，有的来自一两百公里的外地，还有的来自法国、西德、荷兰和卢森堡等国。"},{"type":"paragraph","text":"中国人民自力更生、艰苦奋斗的革命精神和新中国在二十几年中所发生的翻天覆地的变化，给观众留下了深刻的印象。一位比利时工人对中国馆的工作人员说：“过去对中国很不了解，看了你们的大庆和大寨模型，仿佛看到了你们的伟大事业。”在展出的各种机床前，参观的人时常挤得水泄不通。许多工人对新中国在工业方面所取得的成就特别感兴趣。一位比利时老工人主动走上前来，同操纵机床的我国工人握手表示祝贺，他说：“我已经参观了三十多届博览会。对中国机械工业的发展和成就，我感到惊讶。伟大的毛泽东主席把中国领导得这么好。向中国致敬，向中国工人阶级致敬。”"},{"type":"paragraph","text":"在博览会期间，中国馆先后放映了《大庆红旗》、《白毛女》、《红色娘子军》、《针刺麻醉》、《今日中国》等三十多部中国影片，受到观众的热烈欢迎。电影厅里经常座无虚席。一个星期天，本来只计划放映三场，但是结束以后，观众仍然坐着不走，要求继续放映。结果这一天共放了五场，直到快闭馆的时候，观众才恋恋不舍地离开电影厅。一位比利时妇女把她家祖传四代、珍藏了一百五十多年的手镯送给电影放映员。她没有留下姓名和住址，只是在一张卡片上写下：“献给伟大的中国人民。——布鲁塞尔一居民”。这件礼物凝结着比利时人民对中国人民的友好情谊。在博览会举行期间，许多参观过中国馆的比利时朋友纷纷写信给比中协会，要求加入协会，为加强比中友谊贡献力量。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2068156f57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
