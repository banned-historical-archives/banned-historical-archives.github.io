tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东题词墨迹选》《毛泽东手书古诗词选》即将出版收入两本书的墨迹大部分未公开发表过","authors":[],"parts":[{"type":"paragraph","text":"新华社12月24日讯 为纪念毛泽东同志诞辰九十周年，中央档案棺编辑的《毛泽东题词墨迹选》、《毛泽东手书古诗词选》，目前正由档案出版社、文物出版社和人民美术出版社精心印制。收入这两本书的毛泽东同志的墨迹，大部分没有公开发表过。"},{"type":"paragraph","text":"《毛泽东题词墨迹选》共收入毛泽东同志1938年到1965年的题词一百六十三幅，内容广泛、丰富。毛泽东同志的题词，曾经鼓舞广大人民群众为赢得革命战争、社会主义革命和建设的胜利而努力奋斗；现在和将来，也必将鼓舞我们为建设具有高度物质文明和精神文明的现代化社会主义强国而努力奋斗。"},{"type":"paragraph","text":"《毛泽东手书古诗词选》收录毛泽东同志在五十年代到六十年代于工作之暇书写的古诗词一百一十七首，以行、草为主，兼有楷书，是书法艺术珍品。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea3bcf273d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
