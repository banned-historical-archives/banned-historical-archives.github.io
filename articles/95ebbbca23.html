script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西勒加尔在印尼文协代表大会作报告揭露美帝对印尼进行文化渗入斥修正主义者在文艺方面鼓吹同反帝斗争背道而驰的谬论　号召贯彻政治挂帅深入下层进行创作","authors":[],"dates":[{"year":1963,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达27日电】　据棉兰报纸报道，印度尼西亚文学协会第一次代表大会22日在棉兰开幕。协会主席巴克里·西勒加尔在向大会所作的报告中说，在文化上，美帝国主义是印度尼西亚革命最危险的头号敌人，因为美国的帝国主义文化正在设法渗入印度尼西亚的文化教育界。"},{"type":"paragraph","text":"西勒加尔还驳斥了鼓吹“为人与人之间更富有人情味的关系而努力”的修正主义者的谬论。他指出，这种口号的根源是个人主义。修正主义的口号取消了阶级斗争，支持和平主义，这是同反对帝国主义的斗争背道而驰的。"},{"type":"paragraph","text":"他指出，印度尼西亚的文学家应当分清敌友。他号召，贯彻政治挂帅，深入下层的文学创作原则。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95ebbbca23"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
