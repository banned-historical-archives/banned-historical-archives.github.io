script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"兴平县动员余粮户卖粮时方式生硬造成部分农民恐慌","authors":[],"dates":[{"year":1953,"month":10,"day":27}],"is_range_date":false,"parts":[{"text":"兴平县动员余粮户卖粮时方式生硬造成部分农民恐慌","type":"title"},{"text":"【陕西分社10月27日讯】陕西兴平县动员余粮户出卖余粮，因其有余粮的农民恐慌。如该县第三区第一乡第一村农民张福安和第三村农民徐志明的麦子出了虫，因为害怕别人知道他们有余粮，不敢拿到场上去晒。徐志明的小孩把出了虫的麦子拿了一点给该乡支部书记张鸿禧看，徐志明知道后马上将孩子打了一顿。该区第三乡有一个姓边的木匠，因乡人民政府硬要他报出卖余粮的数目，即借口到窦马村赶集，晚上也不敢回家了。第五乡张李村农民滕志杰到窦马村，见到该村积极分子赵玉玲就说：“不得了，不得了！人民政府在20日晚上，把我们村上六户有余粮的农民完全叫到乡政府去。”赵玉玲的丈夫赵反昇听到这话，吓得一晚上没有睡觉，白天也不做活，到处打听风声，问政府对有粮户究竟怎样处理。","type":"paragraph"},{"text":"产生上述情况的主要原因是收购干部在动员余粮户出卖粮食时，方式有些生硬，如第三区第七乡都是采用直接和余粮户谈话的方式。南围方村农民陈兆壁在地里收摘棉花时，乡支部书记陈兴玉一连到他的地里去了三次，陈兆壁猜中他的来意，便问：“有粮不卖怎么办？”陈玉兴马上回答：“不卖就硬要他卖。”陈兆壁说：“那我卖100行不行？”陈兴玉说：“就像你这家，最少要卖十六石（每石三百斤）。”结果陈更不愿意卖了。区里布置该项工作时也是如此，如第三区区长魏成德在布置收购余粮任务时对各乡乡长和中共乡支部书记说：“要大胆地向有粮户谈，不管愿意不愿意卖，只要有余粮就要卖。”其次，私商借国家收购余粮来威胁农民以达到抢购粮食的目的，也是其中原因之一。如兴平县西武镇有一个私商，到窦马乡对中共党委许敬章的爱人（宣传员）说：“国家要收购余粮了，许敬长想把11石麦子卖给我，现在卖不卖？不卖我就走了”还有一个做风匣的私商在窦马村说：“河南省的麦子完全没有下种，人民政府正在开始号囤，陕西省咸阳和兴平县都有这件事情。”（刘斌）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1953年11月04日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4f5193f10"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
