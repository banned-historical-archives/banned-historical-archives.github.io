ar":1998,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"极右翼抬头德政界警惕"},{"type":"paragraph","text":"据新华社波恩5月2日电（记者刘钢）德国各主要党派领导人2日分别向报纸、电台和电视台发表谈话，呼吁人们警惕极端右翼势力在德国抬头。"},{"type":"paragraph","text":"执政的基督教联盟议会党团主席朔伊布勒指出：“如果我们现在让仇视外国人的情绪抬头，那将是我们在德国所做的最愚蠢的事。”"},{"type":"paragraph","text":"执政党之一的基督教社会联盟主席、财政部长特奥·魏格尔呼吁结成一条坚强的反对极右势力的战线。他表示，他的党将更加坚决地致力于加强德国内部的安全。内政部长曼弗雷德·坎特也宣布，要与极右分子进行“面对面的政治斗争”，要坚持不懈地打击犯罪。"},{"type":"paragraph","text":"德国最大的反对党社民党副主席沃尔夫冈·蒂尔瑟认为，极右势力在德国的一些地区重新抬头有一定的社会原因，现在尤其要警惕这种现象“成为国家的声音”。"},{"type":"paragraph","text":"绿党议会党团领导人维尔内·舒尔茨批评德国有些人对极右势力采取容忍态度，并要求取缔某些极右翼党派。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5b404b6aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
