script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"地主苛刻剥削蒋美压榨　蒋区农业生产大减","authors":[],"dates":[{"year":1948,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"地主苛刻剥削蒋美压榨"},{"type":"paragraph","text":"蒋区农业生产大减"},{"type":"paragraph","text":"【新华社陕北二十三日电】过去一年蒋管区农业生产激降。据蒋匪发言人董显光年前供称：一九四七年全蒋区平均小麦收成约为六成，估计产量为二千一百五十万公吨；稻谷收成约为六成七，估计产量为四千八百万公吨。另据“联总”及蒋匪行总估计：一九四六年农业生产较战前正常年份约减少百分之八至百分之十二；一九四五年亦仅较战前减少百分之十七；而一九四七年蒋区农产竟减少百分之三十三至百分之四十。上海某杂志十二月号在论及蒋区农产减低之原因时指出：第一、这是由于在蒋介石统治下，封建的生产关系，束缚了生产力；不到百分之十的地主富农，占有全蒋区百分之七十至八十的土地，而百分和九十的农民仅占有百分之二十至三十的土地，地主富农的苛刻剥削，迫使广大农民不能继续维持耕作或离开土地。第二、还由于（美）帝国主义侵入中国，并与中国反动势力（按指蒋介石匪帮）结为一体，加紧压榨蒋区农民，因而加重了蒋区农民的负担。该杂志表示蒋介石反动派没有力量解决当前蒋区的粮食危机称：“（蒋区）粮食问题之最后解决，有赖于实现民族经济的独立发展，有赖于改变现存的生产关系，实现耕者有其田的土地改革”。"},{"type":"paragraph","text":"【新华社陕北二十三日电】据沪报消息：本年度蒋匪征粮预算数额较去年大增。去年度蒋匪以“征实”、“征借”等名目向人民勒榨粮食六千九百九十七万市担，而一九四七年八月至一九四八年七月则预定榨取粮食八千万市担。且蒋匪粮食部又于上月初宣布：在四川、湖南及湖北三省用低价强迫“加购”“军米”三百万大包（约合稻谷一千万市担）；连前合计共达九千万市担之多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a55df0f05"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
