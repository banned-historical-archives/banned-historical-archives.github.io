ar":1996,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者　谭建忠)继“文革邮票”、“文革书画”在收藏市场走红之后，“文革瓷”又成为新的热点，其代表作品之一，1974年江西等地特地为毛泽东主席定制的60余件生活用瓷，将于本月15日在京公开拍卖。"},{"type":"paragraph","text":"“文革瓷”一般指文革时期生产并带有鲜明文革烙印的瓷器。如有毛主席语录、文革政治口号的瓷器。由于时隔近30年，这样的瓷器存世已不多。据专家介绍，在南京古玩市场上，一只印有工农兵头像和“斗私批修”字样的粗瓷碗，标价200元，11月中旬北京瀚海公司拍卖的一对印有农民劳动场面的花瓶，成交价竟高达6万元。"},{"type":"paragraph","text":"即将开拍的文革期间“主席用瓷”共60余件，包括酒壶、笔筒、茶杯、饭锅、烟灰缸等，其中一只盖碗估价8万至10万元，大汤匙估价8千至1万元，品锅估价6万至8万元，痰盂估价5万至6万元。据悉，这批被称为“当代官窑作品”的瓷器代表了中国制瓷工艺的最高水平，已吸引了不少新加坡和香港及国内收藏家的关注。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4af5ed564"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
