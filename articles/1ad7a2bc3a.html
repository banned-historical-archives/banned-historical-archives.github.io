art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副委员长拜会田中前首相","authors":[],"parts":[{"type":"paragraph","text":"据新华社东京四月十二日电 邓颖超副委员长一行今天上午拜会了日本前首相田中角荣，转达了华国锋总理、叶剑英委员长、邓小平副总理对田中先生和夫人的问候。"},{"type":"paragraph","text":"田中先生说，周恩来总理是伟大的政治家，周总理在日本读书的那年正是我出生之年。我和周总理一见如故。一九七二年日中建交后，我曾希望周总理尽可能早地访问日本，看看神田町的旧书店和上野公园，但是没有能够实现，使我非常遗憾。今天我看到邓颖超副委员长，就象迎接周总理一样，实现了我的宿愿。"},{"type":"paragraph","text":"邓副委员长说，田中先生称赞了恩来同志，如果他有什么功绩，也是毛主席教导的结果，是中国人民的培育，使他成为一名为人民服务的很好的服务员。接着田中先生向邓副委员长赠送了一千株樱花树苗，希望能种植在周恩来总理的家乡。邓副委员长表示感谢，并把五张樱花照片送给田中先生作纪念。拍摄的这些樱花的树苗是一九七二年中日建交时田中先生送给中国的，现在种植在北京天坛公园。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ad7a2bc3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
