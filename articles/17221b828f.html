ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"和古巴文化代表团的谈话","alias":"","parts":[{"type":"paragraph","text":"和古巴文化代表团的谈话"},{"type":"paragraph","text":"（1961年4月19日）"},{"type":"paragraph","text":"毛主席向古巴朋友们说：中国和古巴是两个友好的国家，我们相互帮助，相互支持。我们的目标是一个：反对帝国主义。美国帝国主义是帝国主义中最大的一个，它不但压迫我们，也压迫你们。它压追全世界人民。在一些不是帝国主义的国家中，都有一些帝国主义的走狗。我们不但要反对帝国主义，也要反对帝国主义的走狗。"},{"type":"paragraph","text":"毛主席最后在送别古巴朋友的时候，特别嘱托他们向古巴人民的领袖菲德尔·卡斯特罗总理致以亲切的问候，并祝古巴人民在反对美国帝国主义侵略的斗争中取得胜利。"},{"type":"paragraph","text":"[1]指以古巴教育部部长阿曼多·阿特·达瓦洛斯为首的古巴文化代表团。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":4,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":249,"page_end":249},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17221b828f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
