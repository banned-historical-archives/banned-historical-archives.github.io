tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英元帅率军事代表团拜会武元甲大将武元甲大将回拜我军事代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社河内15日电 由团长叶剑英元帅、副团长刘亚楼空军上将和肖华上将率领的中国军事友好代表团全体成员，今天下午拜会了越南民主共和国副总理兼国防部长武元甲大将。"},{"type":"paragraph","text":"前往拜会的中国军事友好代表团成员有：杨成武上将、黄永胜上将、肖向荣中将、吴瑞林海军中将、雷英夫少将、刘重桂大校。中国驻越南大使何伟也陪同拜会。"},{"type":"paragraph","text":"拜会时在座的有：越南人民军总参谋长文进勇上将、人民军总政治局主任双豪中将，副总参谋长黄文泰中将、陈文茶中将，总后勤局主任陈贵海少将，炮兵司令黎铁雄少将等人。"},{"type":"paragraph","text":"拜会时，宾主双方进行了亲切友好的谈话。"},{"type":"paragraph","text":"新华社河内15日电 越南民主共和国副总理兼国防部长武元甲大将，今天下午回拜了由团长叶剑英元帅，副团长刘亚楼空军上将和肖华上将率领的中国军事友好代表团。"},{"type":"paragraph","text":"随同武元甲大将回拜的有：文进勇上将、双豪中将、黄文泰中将、陈文茶中将、陈贵海少将和黎铁雄少将等人。"},{"type":"paragraph","text":"回拜时，在座的有中国军事友好代表团团员和中国驻越南大使何伟。"},{"type":"paragraph","text":"回拜是在热烈友好的气氛中进行的。"},{"type":"paragraph","text":"由叶剑英元帅（右第三人）率领的中国军事友好代表团12月15日在河内拜会了越南民主共和国副总理兼国防部长武元甲大将（左第一人）。图为拜会时情形。"},{"type":"paragraph","text":"新华社记者 李长永 摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"肖华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55a4872940"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
