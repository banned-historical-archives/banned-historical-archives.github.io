成就","authors":[],"dates":[{"year":1963,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那26日电】　阿尔巴尼亚民主阵线全国委员会和《团结报》25日晚上在地拉那联合举行大会，庆祝阿尔巴尼亚民主阵线机关报《团结报》创刊二十周年。"},{"type":"paragraph","text":"出席庆祝会的，有阿尔巴尼亚劳动党中央政治局委员、书记处书记阿利雅，劳动党中央宣传部部长、民主阵线全国委员会书记帕奇拉米，劳动党中央委员会机关报《人民之声报》总编辑马马基等人，以及地拉那的新闻、文化界人士。"},{"type":"paragraph","text":"帕奇拉米在会上代表阿尔巴尼亚劳动党中央和民主阵线全国委员会致贺词，并宣读了劳动党中央委员会第一书记霍查的贺信。"},{"type":"paragraph","text":"霍查在贺信中向《团结报》全体工作人员热情地祝贺节日。他在信中谈到了《团结报》二十年来对建立和巩固人民政权、恢复国民经济和社会主义建设所作出的巨大贡献，以及它在对加强祖国独立、反对阿尔巴尼亚人民的疯狂敌人——帝国主义者和现代修正主义者的斗争中所起的重要作用。他祝《团结报》进一步发扬它的战斗传统，在以高度的爱国主义和无产阶级国际主义的精神教育群众的斗争中，在为加强阿尔巴尼亚人民在劳动党周围的团结、揭露帝国主义者和现代修正主义者、动员劳动人民全面建设社会主义而进行的斗争中，取得更大的成就。"},{"type":"paragraph","text":"《团结报》总编辑沃格里在会上作了题为“《团结报》二十年来的光荣道路”的报告。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"886765c532"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
