tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无产阶级文化大革命使中国永不变色","authors":[],"parts":[{"type":"paragraph","text":"新华社巴黎电 法中友好协会四日在这里举行盛大群众集会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"参加集会的有三千多人，其中大部分是青年工人和学生。他们热情欢呼中国人民在伟大领袖毛主席的领导下，在各方面取得的伟大成就，欢呼中国全国除台湾省外各省、市、自治区革命委员会全部成立。全场多次热情地、有节奏地高呼中国人民的伟大领袖毛泽东主席的名字。"},{"type":"paragraph","text":"中国驻法国大使馆临时代办易素之出席了大会。"},{"type":"paragraph","text":"法中友好协会全国委员会执行主席夏尔·贝特兰和法中友好协会书记处书记埃伦娜·马希西奥在会上讲了话。"},{"type":"paragraph","text":"贝特兰在讲话中阐述了毛主席亲自发动和领导的中国无产阶级文化大革命的重大历史意义。他说，中国无产阶级文化大革命是在无产阶级专政条件下进行阶级斗争的一件具有决定性意义的重大事件。他热烈祝贺中国除台湾省外各省、市、自治区全部成立革命委员会，并且赞扬三结合的革命委员会是突出无产阶级政治和紧密联系群众的崭新的权力机构。"},{"type":"paragraph","text":"马希西奥在讲话中首先谈到中国人民十九年来在毛主席领导下把中国建设成为一个社会主义大国，并且热烈祝贺中国人民在毛泽东思想指引下取得的光辉成就。她赞扬中国全国除台湾省以外各省、市、自治区全部成立革命委员会是一个历史性的胜利。她相信，无产阶级文化大革命将使中国永不变色，“中国共产党经过文化大革命将更加巩固、更加强大、更加团结”。"},{"type":"paragraph","text":"法中友好协会在祝贺中华人民共和国成立十九周年的贺电中，热烈祝贺中国在政治、经济、文化各方面取得的新的伟大成就。贺电说：“全中国各地革命委员会的建立标志着无产阶级文化大革命的伟大胜利。这是对中国的所有朋友的巨大鼓舞。”"},{"type":"paragraph","text":"法中文化中心最近也发了贺电，热烈祝贺中华人民共和国成立十九周年，并且衷心祝愿毛泽东主席万寿无疆！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bcb59d2fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
