rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛主席诗词》出版这本书收入毛主席诗词三十七首，其中十首未曾发表过","authors":[],"parts":[{"type":"paragraph","text":"新华社一日讯 人民文学出版社和文物出版社今日同时出版发行《毛主席诗词》。这本书除收入以前发表过的毛泽东主席的二十七首诗词外，还收入了未曾发表过的十首诗词。"},{"type":"paragraph","text":"以前没有发表过的十首诗词是，七律《人民解放军占领南京》、七律《到韶山》、七律《登庐山》、七绝《为女民兵题照》、七律《答友人》、七绝《为李进同志题所摄庐山仙人洞照》、七律《和郭沫若同志》、卜算子词《咏梅》、七律《冬云》及满江红词《和郭沫若同志》。"},{"type":"paragraph","text":"以前发表过的二十七首诗词，在这次出版时，又经作者作了个别字句的修订。"},{"type":"paragraph","text":"人民文学出版社出版的《毛主席诗词》，有线装本两种，平装本两种。文物出版社出版的《毛主席诗词》，是集宋版书字体照相制版的线装本。这几种版本的《毛主席诗词》，都从一九六四年元旦起在北京、上海等大城市先后发行，并将陆续在各地新华书店普遍发售。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59749df0a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
