tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中美建交是十分重要的事件儒尔盖发表声明：中美建交符合毛主席的政治路线","authors":[],"parts":[{"type":"paragraph","text":"十六日晚提前出版的十七日《战斗报》和《政治报》分别在头版重要地位刊登了中美建交的消息。《战斗报》并发表了一篇署名评论。评论说：“在当前广泛的国际事件中，中美建交是应该受到欢迎的步骤。”这家报纸还在第四版刊登了一些国家对中美建交的反应，并且指出：“从初步反应看，绝大多数认为这是一个对和平与安全能够作出贡献的步骤。”"},{"type":"paragraph","text":"南斯拉夫通讯社十六日播发的一篇评述指出：“中美关系正常化是十分重要的事件，无论是在促进两国双边关系方面，还是在国际方面，将很快感到它的影响。”"},{"type":"paragraph","text":"新华社巴黎十二月十七日电 法国马克思列宁主义共产党总书记雅克·儒尔盖十二月十七日发表声明说：“中华人民共和国和美国之间建立外交关系是具有重大世界意义的事件。”"},{"type":"paragraph","text":"他说，只要读一下中美联合公报就能知道，这是一个反对在亚洲和太平洋地区谋求任何霸权的行动。"},{"type":"paragraph","text":"他说：“签订的协议巩固了世界和平，延缓了战争。这是中国外交的重大成功”。他还指出，这一外交是符合毛泽东主席的思想和政治路线的。"}],"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e1c74e8b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
