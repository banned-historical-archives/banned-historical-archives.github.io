script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"粉碎蔡若虹、华君武在美术界的资产阶级专政","authors":[],"dates":[{"year":1967,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"粉碎蔡若虹、华君武在美术界的资产阶级专政"},{"type":"paragraph","text":"编者按：长期隐藏在美术界的反革命修正主义分子蔡若虹、华君武，被革命群众揪出来了，揪得好！"},{"type":"paragraph","text":"蔡若虹、华君武是周扬埋在美术界的两颗定时炸弹。他们在美术界大搞资产阶级专政，招降纳叛，结党营私，千方百计地反对毛主席的文艺路线，推行周扬反革命修正主义的文艺黑线，煽动美术界的牛鬼蛇神兴风作浪，向党向社会主义猖狂进攻。在他们把持下的美术家协会，实际上已经沦为匈牙利裴多菲俱乐部式的反革命团体。"},{"type":"paragraph","text":"十多年来，蔡若虹、华君武等人顽固地站在资产阶级的反动立场上，利用美术这个工具，利用他们所掌握的各种报刊的美术阵地，举办各种美术展览会，大肆诬蔑、讽刺、攻击无产阶级专政，大量散播封建主义、资本主义、修正主义的毒素，流毒全国，危害极大。"},{"type":"paragraph","text":"一九六三年以来，蔡若虹、华君武等人在旧中宣部、旧文化部的包庇下，抗拒毛主席对文艺界多次极关重要的批示，继续玩弄反革命两面派的手法，压制革命群众对美协反党罪行的揭发和对他们反革命的黑文黑画的批判。但是，纸是包不住火的，狐狸的尾巴是藏不住的。现在他们反党反社会主义反毛泽东思想的真面目终于被揭露出来了。"},{"type":"paragraph","text":"砸烂美协这个“裴多菲俱乐部”，揪出美术界的反党头目蔡若虹、华君武，这是美术界无产阶级文化大革命的胜利。我们必须乘胜追击，彻底粉碎蔡若虹、华君武等在美术界的资产阶级专政，肃清他们的恶劣影响。在伟大的毛泽东思想的指引下，我们一定能够在美术界建立和巩固无产阶级的领导权，创造出光辉灿烂的无产阶级新美术。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7260a7d15e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
