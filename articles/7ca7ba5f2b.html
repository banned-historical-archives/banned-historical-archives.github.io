[{"year":1963,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"团结起来同修正主义者斗争"},{"type":"paragraph","text":"斯大林逝世的时候，我们已感到，一些不纯分子将会出来捶胸叫喊说自己是列宁主义者。这种现象果然出现了。社会主义阵营出现混乱，真正的马克思列宁主义者受到攻击。要对这种混乱负责的人是赫鲁晓夫。"},{"type":"paragraph","text":"从赫鲁晓夫在苏共代表大会上攻击斯大林时起，攻击一切在世的或已故的马克思列宁主义者就成了他的任务。"},{"type":"paragraph","text":"我们呼吁全世界各大洲的马克思列宁主义者团结起来，同赫鲁晓夫及其集团作斗争。"},{"type":"paragraph","text":"赫鲁晓夫为自己做了一个假面具，每次去参加集会或代表大会，他都戴着它，他称它为列宁。戴着它，他成功地伪装了自己，用列宁的名义来反对列宁主义者。"},{"type":"paragraph","text":"赫鲁晓夫为自己还做了另一个假面具，即所谓反对个人迷信，利用它来发展对他自己的个人崇拜。"},{"type":"paragraph","text":"赫鲁晓夫把苏联的真正马克思列宁主义者的嘴封住了以后，就把他的活动扩张到苏联以外。他从一个社会主义国家走到另一个社会主义国家，威胁这些国家的领导人，要他们支持他的反马克思主义的政策。他利用苏联的经济、技术和军事上的力量来威胁他们，要他们支持他反对真正马克思列宁主义的领袖和无产阶级国际主义的运动。"},{"type":"paragraph","text":"过去是在斯大林的领导下，真正的马克思列宁主义者在三十年代中击败了托洛茨基和机会主义者；现在该是苏联以外的真正马克思列宁主义者当仁不让地领导这个反对赫鲁晓夫及其集团的斗争的时候了。"},{"type":"paragraph","text":"一个非洲革命者  莫克加特尔"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ca7ba5f2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
