:[{"year":1960,"month":5,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京1日电】　欢乐的“五一”之夜，党和国家的领导人朱德、林彪、邓小平、董必武、彭真、贺龙、李富春、郭沫若等，在天安门城楼亲切会见了来自五大洲六十多个国家和地区的外宾，向他们并通过他们向全世界劳动人民致以热烈的节日祝贺。"},{"type":"paragraph","text":"入晚，天安门广场完全沉浸在欢乐的海洋里。巍峨的天安门城楼上红旗招展，八盏大红宫灯闪耀着光辉。镶在广场周围建筑物上的无数电灯，和交织在天安门上空的银色探照灯光柱，互相辉映。在天安门城楼上，党和国家的领导人，同以克里姆·贝勒卡塞姆为首的阿尔及利亚共和国临时政府代表团，古巴人民社会党总书记布拉斯·罗加和夫人，以博齐沃夫斯基为首的波兰军事代表团，法属索马里兰民主联盟主席、前总理哈比，应邀来我国访问的苏联、朝鲜、日本、刚果、巴西等国家和地区的外宾，以及各国驻华使节们，一起观看了天安门广场上群众的大联欢和五彩缤纷的礼花和焰火。"},{"type":"paragraph","text":"燃放第一批礼花和焰火之后，党和国家领导人来到天安门城楼两侧，同所有的外宾亲切会见。他们和外宾们一一握手，互致热情的祝贺，有的外宾在会见时激动地欢呼起来。天安门城楼上自始至终洋溢着中国人民和各国人民团结、友好的热烈气氛。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ecb46a1775"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
