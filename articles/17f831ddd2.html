1966,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席语录贴到了咱家"},{"type":"paragraph","text":"最近，陕西省长安县师家村为了使社员家家户户学好毛主席著作，各生产队用红纸写了许多毛主席语录，敲锣打鼓，送给各户。全村群众对毛主席语录无限热爱。当送毛主席语录时，很多贫下中农老远迎接，有的早把贴语录的地方选好了。当毛主席的最高指示送到贫农冯毛毛家里时，毛毛的母亲说：“毛主席老人家的指示可不能随便贴，我一定要贴在房正中毛主席像身边。”有的家贴了好几幅语录，有的还用玻璃框子镶起来，挂在毛主席像下边。他们说：“好极了，我们每天不但看到毛主席他老人家慈祥和蔼的面孔，现在毛主席的语录也贴到咱家了，每时每刻看到他老人家的指示，我们做事就有了方向，干劲就大了。我们一定要把毛主席的指示记在心上，用在行动上。”"},{"type":"paragraph","text":"长安县一公社干部"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17f831ddd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
