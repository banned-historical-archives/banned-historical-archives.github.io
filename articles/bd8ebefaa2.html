script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在官僚垄断资产阶级的压迫和剥削下  苏联建筑工人大量流动","authors":[],"dates":[{"year":1976,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在官僚垄断资产阶级的压迫和剥削下"},{"type":"paragraph","text":"苏联建筑工人大量流动"},{"type":"paragraph","text":"新华社一九七六年五月九日讯　在苏联官僚垄断资产阶级的压迫和剥削下，近几年苏联的建筑工人大量流动。"},{"type":"paragraph","text":"苏联《建筑业经济》杂志一九七六年第四期刊登的一篇关于建筑部门工人流动情况的文章透露，一九七四年苏联整个建筑部门中离职的工人占到建筑工人总数的百分之六十一点九。"},{"type":"paragraph","text":"从这篇文章中引用的统计材料来看，一九六八年到一九七四年，每年苏联建筑工人离职的人数都占到整个建筑部门的工人总数的百分之六十以上，最高的达百分之七十四点八；上述这七年期间平均每年几乎有百分之六十七的建筑工人离职。"},{"type":"paragraph","text":"这篇文章还透露：许多建筑单位“百分之四十以上的离职工人之所以离职，是由于对劳动条件感到不满”；“劳动组织中的缺点是工人离开一些被调查单位的主要原因之一，有百分之五十以上的离职工人指出了这一点。”"},{"type":"paragraph","text":"文章说：“在因劳动条件不能令人满意而离职的人当中，约百分之二十的人是由于劳动繁重而离开的。他们当中大部分是妇女和青年工人。”"},{"type":"paragraph","text":"文章还透露，所谓“自愿离职的工人”以及“被解雇的人”，“在转向新的工作地点时，几乎有一个月之久不参加社会生产”。这实际上是变相失业。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd8ebefaa2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
