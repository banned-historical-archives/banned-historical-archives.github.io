ors":[],"dates":[{"year":1950,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"对基督教应采取的态度","type":"title"},{"text":"（摘中央1950年5月14日给西北局电）","type":"subtitle"},{"text":"争取一些较开明者与我们合作，在教徒群众中进行教育工作，孤立不与帝国主义割断联系的顽固分子。我们要团结与改造基督教徒，使之断绝与帝国主义的一切联系，在共同纲领基础上与人民政府合作。这是一个长期的工作，要耐心去做。对他们的信仰自由应予以尊重，对他们不应有过急的限制（如没收圣经、禁止作礼拜等等），他们在教堂内是应有作礼拜及传教的自由，应说服他们在教堂以外的传教则应受些限制。在土改期内最好不去农村中活动，以免引起广大人民对宗教的反对行动，这正是尊重他们信仰自由的保证。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d054dc023a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
