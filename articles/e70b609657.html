art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大学毛主席著作是防止修正主义的保证","authors":[],"parts":[{"type":"paragraph","text":"据新华社广州二十八日电 日中友协第十二次访华代表团团长斋藤纪江和部分团员在这里对本社记者畅谈他们一个月来的访华观感时，热情赞扬中国社会主义建设所取得的光辉成就，和中国人民对社会主义、共产主义的不可动摇的信念。他们认为，这是毛泽东思想的胜利。斋藤纪江说：在中国各地访问给人印象最深的是毛泽东思想已经贯彻到中国的各个方面。"},{"type":"paragraph","text":"已经四次访问中国的斋藤说，中国比她前三次来访问时各方面都有了很大的发展和变化，可贵的是这种发展是中国人民在同连续三年的自然灾害的斗争中、在同苏联修正主义制造的困难的斗争中取得的。她说，中国人民这种力量的源泉是毛泽东思想武装了人们的头脑，人民高度地信赖政府，都懂得要为了革命而工作。"},{"type":"paragraph","text":"斋藤赞扬中国正在积极地用毛泽东思想培养和教育青年一代，使他们成为真正的革命接班人。她说，使我惊奇的是，连幼儿园的孩子都说“我听毛主席的话，我不淘气。”"},{"type":"paragraph","text":"代表团团员坂井孟一郎在谈到中国人民的精神面貌时说，在中国，毛泽东思想深入人心，已经变成有血有肉的物质力量。每到一处，接触到的无论是工人、农民、学生、列车员还是居民，想到今天的幸福，不忘过去的苦难，对中国共产党和毛主席怀着深厚的感情，对社会主义和共产主义怀着不可动摇的信念。年青的一代心里都装着全中国人民和全世界人民，而不追求个人的享乐。他说，中国人民对未来充满着乐观和信心。在中国多耽一天，这种印象便加深一分。"},{"type":"paragraph","text":"坂井十分赞扬中国人民活学活用毛主席著作的学习态度。他说：中国结合工作和实际进行学习，当发生困难时，就去向毛主席著作请教，这是最重要的一点。他今后也要这样来学习毛泽东的著作。"},{"type":"paragraph","text":"坂井表示坚信，中国人民大学毛泽东著作，掌握毛泽东思想，对防止修正主义是有保证的。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e70b609657"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
