<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"咖啡问题上的反剥削斗争","authors":[],"dates":[{"year":1972,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"咖啡问题上的反剥削斗争"},{"type":"paragraph","text":"咖啡是世界贸易中仅次于石油的第二大宗初级产品。近年来，继石油出口国之后，咖啡生产国家也在逐步联合起来同美国等西方资本主义国家展开剥削与反剥削的斗争。"},{"type":"paragraph","text":"咖啡是一种热带经济作物，原产非洲，现在主要产地是拉丁美洲，其次是非洲。出口咖啡较多的十七个国家和地区是：巴西、哥伦比亚、象牙海岸、安哥拉、乌干达、坦桑尼亚、萨尔瓦多、危地马拉、墨西哥、埃塞俄比亚、印度尼西亚、哥斯达黎加、喀麦隆、扎伊尔、马尔加什、肯尼亚、厄瓜多尔。"},{"type":"paragraph","text":"美国是世界上咖啡的最大进口国，近二十年来美国每年吸收世界咖啡总出口额的百分之四十到七十不等，而美国的咖啡进口额的百分之三十五点八又集中在六家大公司手里。美国垄断资本完全控制了美国咖啡市场，并通过它在国外的分支机构操纵着国际咖啡市场。"},{"type":"paragraph","text":"为了掠夺巨额利润，长期来，美国等西方资本主义国家用低价时大量收购、高价时限制进口的手段，竭力压低咖啡价格。从一九五五年到一九六九年，由于咖啡出口价格下跌和进口工业品价格上涨，咖啡生产国至少损失三百六十六亿美元。其中一半是被美国搜刮去的。"},{"type":"paragraph","text":"为了对抗帝国主义的压价，一九五七年巴西、哥伦比亚、墨西哥、萨尔瓦多、危地马拉、哥斯达黎加、尼加拉瓜等国就不顾美国的反对和阻挠，签订了为期一年的“墨西哥协议”，事先规定了参加国下年度出口额，以便稳定价格。以后每年这些国家都签订类似协议，并有更多的国家参加，最后达到二十个国家（拉美十五国、非洲五国）。这是咖啡生产国联合起来进行斗争的初步尝试。"},{"type":"paragraph","text":"一九六二年在联合国主持下成立了既有生产国参加又有美国等消费国参加的“国际咖啡组织”。美国利用它是最大咖啡消费国，在这个组织中取得了控制地位。它利用这个组织迫使生产国接受过高的出口定额，使世界市场上保持大量的咖啡，来达到它压低价格的目的，因而引起广大生产国的不满。一九七○年三月在“国际咖啡组织”研究出口定额理事会上，生产国一致反对美国要求的出口定额。一九七一年一、二月间，巴西、哥伦比亚、埃塞俄比亚、墨西哥等十个生产国举行会议，迫使美国修改了定额。最近，巴西、哥伦比亚、象牙海岸等国又邀请各生产国在日内瓦举行会议，商讨保卫咖啡国家权益的共同政策。咖啡生产国的联合斗争，越来越有力地打击着帝国主义国家的掠夺和剥削。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab8b486c0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
