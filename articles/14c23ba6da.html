ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1942年7月2日）"},{"type":"paragraph","text":"中央为纪念抗战五周年宣言有一个新内容，就是战后的建国方针和强调团结的问题。中国民族问题是一个基本问题，国民党五十年来都抓住民族这个口号，所以在人民中间有很大的影响。我们提出战后办法是有策略意义的。现在我们的政策，在形式上是改良的，实际上是革命的。今年七、八、九三个月是时局转变的关键，主要是日苏战争是否爆发，第二条战线是否建立，德国进攻高加索是否得手，过三个月后今年的局面就定了。国共关系也决定于这三个月。我对联络参谋说，谁打西安谁是汉奸，谁打延安也是汉奸。对何应钦，我们只是反对他的反共，何反共我反何，何不反共我也不反何。我们在统一战线中没有过去的斗争是不能存在的，在斗争之后又要团结。"},{"type":"paragraph","text":"[1]本篇一是毛泽东在中共中央政治局会议上讨论《中共中央为纪念抗战五周年宣言》（草案）和《中共中央告抗日根据地全体党员和八路军新四军将士书》（草案）时讲话的一部分；本篇二是毛泽东在中共中央政治局会议上讨论中"},{"type":"paragraph","text":"过去四方面军干部除何畏\"等以外都是好的，经过六年证明这些干部是好的。原四方面军有的干部犯了错误，要按错误的性质加以处理，不要把什么都说成是张国焘路线。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":7,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":94,"page_end":95},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14c23ba6da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
