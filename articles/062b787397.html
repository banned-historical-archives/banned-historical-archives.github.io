script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国组阁谈判继续进行  重要问题未获协议  法共反对任何极右翼分子参加  坚持陆军部应由共产党人担任","authors":[],"dates":[{"year":1946,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国组阁谈判继续进行"},{"type":"paragraph","text":"重要问题未获协议"},{"type":"paragraph","text":"法共反对任何极右翼分子参加"},{"type":"paragraph","text":"坚持陆军部应由共产党人担任"},{"type":"paragraph","text":"【新华社延安十七日电】巴黎讯：法国各政党的组阁谈判迄十六日上午止仍未获协议。十五日上午，临时总理勃伦姆与共产党领袖多列士及杜克洛会谈两次，多列士于离开勃氏办公室时，对蜂拥前来之记者称：“一切都好，谈判仍在进行。”继之人民共和运动党及“左翼集团”，（实质上乃右翼集团）的代表先后与勃伦姆会谈。据合众社记者称：各政党在原则上已获协议；但对政协中两大问题（即是否大量减缩政府支出与对越南政策）及席位分配仍未协议。据悉，法共坚持反对任何极右翼分子参加，并坚持陆军部应由共产党人担任。据路透社记者称：如各党十六日仍未获协议，则勃伦姆可能组织临时的社会党一党内阁，以渡过此四五星期，至明年一月间正式选举总统及组织永久政府时止。按国民议会规定新阁名单应于十七日提交议会批准，十六日为谈判之最后一天。"},{"type":"paragraph","text":"【新华社延安十五日电】巴黎讯：法共发言人于评论勃伦姆当选总理时称：“我们不欲拒绝任何人，但我们须要知道他将领导我国走向何处！”按勃氏之当选，乃由于法共之支持，在五百九十票中得五百七十五票。据悉勃氏近来健康情况欠佳，惟仍能勉力支持至明年一月永久政府产生时止。"},{"type":"paragraph","text":"【又讯】法国国民议会于十三日通过提交参议院的五十席名单如下：共产党十二席，社会党七席，社会民主抵抗联盟二席，急进党三席，无党派二席（以上属左翼），人民共和运动党十二席，共和自由党三席，独立回教同盟一席（以上属右翼）。此外有三席给住在摩洛哥之法国人，二席给住在突尼西亚之法国人，三席给居于其他海外各地之法国人。"},{"type":"paragraph","text":"【新华社延安十二日电】法国参议院复选已于八日举行，于上月二十四日选举出来的八万九千个选举人，于是日齐集巴黎及海外各地首府，投票复选三百一十五名参议员中的二百六十五名，另外五十名由国民议会（即众议院）推选。上月选举选举人结果，法国本市及科西嘉共产党二四、七八八人，人民共和运动党二四、七五五人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"062b787397"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
