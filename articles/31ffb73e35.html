script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美国和本国资本家剥削  秘鲁阿根廷哥伦比亚工人纷纷罢工  智利工人为争取生存权利不断展开斗争","authors":[],"dates":[{"year":1970,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国和本国资本家剥削"},{"type":"paragraph","text":"秘鲁阿根廷哥伦比亚工人纷纷罢工"},{"type":"paragraph","text":"智利工人为争取生存权利不断展开斗争"},{"type":"paragraph","text":"新华社十七日讯　秘鲁、阿根廷、哥伦比亚工人最近为反对美国和本国资本家的剥削、争取切身权利而不断举行罢工斗争。"},{"type":"paragraph","text":"秘鲁五千名铁路工人在去年年底举行罢工，要求增加工资。今年一月份以来，铁路工人的斗争还在继续。"},{"type":"paragraph","text":"铁路工人的罢工使秘鲁南方地区的铁路运输全部瘫痪，使经营这条铁路线的美资秘鲁铁路公司陷入困境。"},{"type":"paragraph","text":"阿根廷重要工业城市科尔多瓦城公共汽车工人一月十二日开始举行不定期罢工，要求资本家支付拖欠的工资。在圣菲省，由美国资本控制的阿辛达尔钢铁公司的一千名工人，一月六日举行不定期罢工，抗议资本家无理解雇工人。"},{"type":"paragraph","text":"此外，几千名电报工人最近也举行罢工，要求增加工资和改善福利条件。这次罢工使成千上万的电报积压下来，发不出去。"},{"type":"paragraph","text":"哥伦比亚近万名啤酒厂工人从去年十二月开始举行的罢工，至今仍在坚持中，工人们坚持要求增加工资。与此同时，哥伦比亚东北部乌尔瓦一个种植园的一千五百名种植工人也举行了罢工，要求庄园主支付拖欠的工资。"},{"type":"paragraph","text":"新华社十六日讯　圣地亚哥消息：智利工人最近为争取生存权利而不断展开斗争。"},{"type":"paragraph","text":"在智利首都圣地亚哥，七千多名工人十一日武力占领了拉弗罗里达区的空地，在那里建起了简陋的住房居住。据报道，目前智利有四分之一的人没有房屋居住。还有四分之一的人居住在条件很差的房屋中。"},{"type":"paragraph","text":"拉塞雷纳城的三百名农业工人十五日在城里举行抗议活动，谴责庄园主拖欠他们六个月的工资和让他们住在条件恶劣的茅棚里。另外，这个地区还有二百多名农业工人从十四日起举行罢工，要求立即恢复被庄园主无理解雇的九位农业工人的工作。"},{"type":"paragraph","text":"圣地亚哥国营铁路保管局的七百名工人从去年十二月以来一直坚持罢工斗争，要求增加工资。公共工程部会计处的三百名职员十二日也举行罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31ffb73e35"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
