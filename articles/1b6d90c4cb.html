ear":1968,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席万岁，万万岁！"},{"type":"paragraph","text":"海军学习毛主席著作积极分子、战斗功臣　张逸民"},{"type":"paragraph","text":"红旗飘扬，五洲震荡，"},{"type":"paragraph","text":"凯歌阵阵，四海翻腾。"},{"type":"paragraph","text":"全世界革命人民同声高呼："},{"type":"paragraph","text":"毛主席万岁，万万岁！"},{"type":"paragraph","text":"这声音象春风唤醒了万物，"},{"type":"paragraph","text":"这声音象惊雷滚过了长空，"},{"type":"paragraph","text":"这声音点燃了武装斗争的熊熊烈火，"},{"type":"paragraph","text":"这声音宣布帝修反的末日快要来临。"},{"type":"paragraph","text":"毛主席万岁，万万岁！"},{"type":"paragraph","text":"您的伟大思想放射出太阳的光辉，"},{"type":"paragraph","text":"给我们指明斗争的方向，"},{"type":"paragraph","text":"照耀着我们前进，前进，前进。"},{"type":"paragraph","text":"是您，"},{"type":"paragraph","text":"我们心中最红的太阳，"},{"type":"paragraph","text":"您跟革命人民心贴心，"},{"type":"paragraph","text":"您的巨手顶住了狂风恶浪，"},{"type":"paragraph","text":"扭转了整个乾坤。"},{"type":"paragraph","text":"从井冈山到天安门，"},{"type":"paragraph","text":"一盏红灯，万盏红灯。"},{"type":"paragraph","text":"革命人民热爱您，"},{"type":"paragraph","text":"到处传播着您那伟大的真理的声音。"},{"type":"paragraph","text":"读您的书，听您的话，"},{"type":"paragraph","text":"我们就有了革命的显微镜，"},{"type":"paragraph","text":"去识破一切妖魔鬼怪，"},{"type":"paragraph","text":"叫它们现出丑恶原形。"},{"type":"paragraph","text":"读您的书，听您的话，"},{"type":"paragraph","text":"我们就有了革命的望远镜，"},{"type":"paragraph","text":"茫茫雾海不迷航，"},{"type":"paragraph","text":"一往无前，去战胜一切敌人。"},{"type":"paragraph","text":"红旗飘扬，五洲震荡，"},{"type":"paragraph","text":"凯歌阵阵，四海翻腾。"},{"type":"paragraph","text":"全世界革命人民同声高呼："},{"type":"paragraph","text":"毛主席万岁，万万岁！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b6d90c4cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
