year":1968,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:这里发表的三封来信，值得那些热衷于搞山头主义、个人主义的人好好地读一读，认真地想一想。"},{"type":"paragraph","text":"为什么有些单位革命大联合貌合神离?为什么有些单位革命委员会有权无威?重要的原因就是“以我为中心”；中了反动的资产阶级的“多中心论”的毒。有些人不是把党的利益看成高于一切，不是把人民的利益看成高于一切，而是把小团体的利益看成高于一切，把小山头的利益看成高于一切；他们不是坚持无产阶级党性掌权，而是把资产阶级宗派主义带进革命委员会里来。这样做，严重地破坏了革命委员会内部的团结，妨碍了各项工作的正常开展，并且给阶级敌人以可乘之机。"},{"type":"paragraph","text":"当前各条战线上的无产阶级革命派，都要迅速行动起来，彻底批判反动的“多中心论”，铲除小山头，在无产阶级司令部的号令下’统一意志，统一步伐，统一行动。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f97796526a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
