<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决执行毛主席的革命文艺路线  认真学习革命样板戏的创作经验","authors":[],"dates":[{"year":1974,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决执行毛主席的革命文艺路线  认真学习革命样板戏的创作经验"},{"type":"paragraph","text":"参加华北地区文艺调演的同志们积极投入批林批孔的斗争，决心运用革命样板戏的经验指导自己的创作实践，为繁荣社会主义文艺创作做出新的贡献"},{"type":"paragraph","text":"新华社一九七四年二月七日讯　参加华北地区文艺调演的文艺工作者在调演过程中认真学习革命样板戏的创作经验，决心运用这些经验指导自己的创作实践，为推动文艺革命，繁荣社会主义文艺创作作出新的贡献。"},{"type":"paragraph","text":"在毛主席的革命文艺路线指引下，华北地区的文艺工作者以革命样板戏为榜样，从无产阶级文化大革命以来创作了大量文艺节目。这次调演就是对华北地区文艺工作者普及革命样板戏、学习革命样板戏成果的一次检阅。为了进一步学好革命样板戏的创作经验，在调演期间，文艺工作者们怀着兴奋的心情，先后观摩了中国京剧团演出的革命现代京剧《平原作战》和北京京剧团演出的革命现代京剧《杜鹃山》，以及中国舞剧团演出的革命现代舞剧《草原儿女》和《沂蒙颂》，听了《红灯记》和《杜鹃山》剧组的创作经验报告，并且进行了热烈的讨论。许多同志激动地说，中国京剧团等单位的同志们专场为我们演出，给我们介绍经验，这是一次难得的学习机会，使我们更加坚定了贯彻执行毛主席革命文艺路线的决心。"},{"type":"paragraph","text":"在学习讨论中，大家畅谈了以革命样板戏为标志的无产阶级文艺革命的大好形势。他们说，革命样板戏是无产阶级文艺的典范，革命样板戏的创作过程，既是一场激烈的政治斗争，又是一场深刻的艺术革命，每一个革命样板戏都是在两个阶级、两条路线的尖锐斗争中诞生的，学习革命样板戏的创作经验，首先要学习创作者的坚决贯彻执行毛主席革命文艺路线，同修正主义文艺黑线进行顽强斗争的革命精神。北京评剧团的文艺工作者回顾了《向阳商店》的修改过程，深深感到学习革命样板戏创作经验的重要。他们表示，今后要进一步发扬敢于反潮流的革命精神，狠批刘少奇、林彪推行的修正主义路线和孔孟之道，改造世界观，为塑造好无产阶级英雄形象而努力。"},{"type":"paragraph","text":"大家在学习讨论中指出，用党的基本路线指导文艺创作，深刻地反映在党的正确路线指引下我国人民的斗争生活，这是革命样板戏创作的一条根本经验。山西省晋东南上党梆子剧团的同志说，《平原作战》和《杜鹃山》同其他革命样板戏一样，都是以党的基本路线为指导思想，敢于揭示矛盾，激化冲突，在激烈的阶级斗争和路线斗争中来塑造无产阶级英雄形象。我们学习革命样板戏的创作经验，就要深刻领会党的基本路线，肃清“阶级斗争熄灭论”、“无冲突论”等修正主义流毒，努力反映阶级斗争。内蒙古自治区歌舞团的同志看了革命现代舞剧《草原儿女》、《沂蒙颂》后说，这两个舞剧所以动人，就是因为两个舞剧通过反映尖锐的阶级斗争成功地塑造了英雄人物。革命歌舞也要敢于写阶级斗争，这样才能塑造好无产阶级英雄形象。"},{"type":"paragraph","text":"经过学习讨论，文艺工作者更加深了对革命样板戏“三突出”创作原则的理解。天津市评剧团的同志说，运用“三突出”原则，满腔热情、千方百计地塑造无产阶级英雄人物，是社会主义文艺的根本任务，革命样板戏在这方面给我们提供了宝贵的经验。这次观摩了革命样板戏，使我们进一步认识到，搞好“三突出”，最重要的就是要把剧中主要英雄人物放在尖锐激烈的阶级斗争中来塑造。只有这样，才能把英雄人物真正突出出来。同志们还指出，要正确地运用“三突出”的创作原则，文艺工作者必须认真改造世界观。当前文艺工作者必须积极投入批林批孔斗争，彻底批判孔老二和林彪宣扬的“英雄创造历史”的唯心史观，牢固树立马克思主义的唯物史观。"},{"type":"paragraph","text":"参加华北地区文艺调演的文艺工作者认为，革命样板戏千锤百炼、精益求精的精神，也是值得认真学习的。河北省石家庄市丝弦剧团的同志说，革命样板戏在创作和演出过程中，对一字一句，一腔一板，一招一式，都严肃认真，一丝不苟。我们一定要认真学习这种高度的革命责任感，不断提高作品的思想和艺术水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b32d1cc8ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
