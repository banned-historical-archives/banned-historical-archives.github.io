hors":[],"dates":[{"year":1967,"month":7}],"is_range_date":false,"parts":[{"text":"林彪关于各地抢枪事件给毛泽东的信（大意）1","type":"title"},{"text":"武汉事件后，急待处理的一些问题正在处理。对于陈再道等人的问题，已按（毛）主席批示的方针办。……当前的问题仍然是两派对立，武斗升级；特别是少数群众组织抢夺部队枪支的事，已在南方一些省发生，情况比较严重。因此急需采取一些严厉措施等……","type":"paragraph"},{"text":"1，毛泽东批示：对于群众抢枪的事，不必看得过于严重。所谓群众抢枪，有些地方实际上是部队向他们所支持的一派发枪。因此，对此事的处理似可不急，待时机成熟后再去从容解决。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"472dca8a18"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
