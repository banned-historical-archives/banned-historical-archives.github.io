rs":[],"dates":[{"year":1955,"month":3,"day":24}],"is_range_date":false,"parts":[{"text":"山西省沁县部分农民缺口粮","type":"title"},{"text":"【本刊讯】据全国妇联会赴山西省沁森的工作组来件反映：该省沁县部分农村目前粮食问题很紧张。据调查全县七十九个乡中有四十六个乡的部分农民缺口粮，其中有二十八个乡缺口粮百分之十三、有十八个乡缺口粮百分之二十五。据唐村的调查，就有二十六户农民缺粮，占全乡户数的百分之十九，需粮五千三百四十斤，最低也需四千七百斤。该村牲口也缺饲料，按驴、牛每天一升半饲料，骡马每天二升半饲料为标准，全村牲口共缺饲料七千斤。全县今春尚需粮食二百三十万斤，(包括饲料一百五十万斤)，才能基本上解决粮食问题。","type":"paragraph"},{"text":"造成粮食问题紧张的原因，据该县县委反映：(一)去年全县统购粮食时实产粮的数字确定过高。县委调查全县每亩平均产量一百九十五斤，地委认为低，提高到二百一十二斤，每亩相差十七斤。在购粮中有些村为完成任务降低口粮标准，每人每年口粮都留在三百斤以下，有的农业生产合作社给社员每人留二百八十斤口粮(当地农民每人每年需粮三百六十斤)，因此，统购粮食本身就购了一部分口粮。(二)留饲料的条件很严格。耕地的牲口留的饲料少，不耕地的牲口与羊不留饲料，实际情况是不耕地的牲口与羊都需要饲料，因此全县各乡普遍缺乏牲口饲料。(完)","type":"paragraph"},{"text":"来源：1955年3月24日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山西省沁县部分农民缺口粮","authors":[],"dates":[{"year":1955,"month":3,"day":24}],"is_range_date":false,"parts":[{"text":"山西省沁县部分农民缺口粮","type":"title"},{"text":"【本刊讯】据全国妇联会赴山西省沁森的工作组来件反映：该省沁县部分农村目前粮食问题很紧张。据调查全县七十九个乡中有四十六个乡的部分农民缺口粮，其中有二十八个乡缺口粮百分之十三、有十八个乡缺口粮百分之二十五。据唐村的调查，就有二十六户农民缺粮，占全乡户数的百分之十九，需粮五千三百四十斤，最低也需四千七百斤。该村牲口也缺饲料，按驴、牛每天一升半饲料，骡马每天二升半饲料为标准，全村牲口共缺饲料七千斤。全县今春尚需粮食二百三十万斤，(包括饲料一百五十万斤)，才能基本上解决粮食问题。","type":"paragraph"},{"text":"造成粮食问题紧张的原因，据该县县委反映：(一)去年全县统购粮食时实产粮的数字确定过高。县委调查全县每亩平均产量一百九十五斤，地委认为低，提高到二百一十二斤，每亩相差十七斤。在购粮中有些村为完成任务降低口粮标准，每人每年口粮都留在三百斤以下，有的农业生产合作社给社员每人留二百八十斤口粮(当地农民每人每年需粮三百六十斤)，因此，统购粮食本身就购了一部分口粮。(二)留饲料的条件很严格。耕地的牲口留的饲料少，不耕地的牲口与羊不留饲料，实际情况是不耕地的牲口与羊都需要饲料，因此全县各乡普遍缺乏牲口饲料。(完)","type":"paragraph"}],"comments":[],"origin":"1955年3月24日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d964
