script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本·贝拉总统接见我党政代表团陈毅元帅把毛主席的信交给了本·贝拉总统","authors":[],"dates":[{"year":1964,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社阿尔及尔31日电　阿尔及利亚民族解放阵线政治局总书记、阿尔及利亚民主人民共和国总统本·贝拉，今天上午在美丽别墅接见了由中共中央政治局委员、国务院副总理兼外交部长陈毅元帅率领的中国党政代表团。"},{"type":"paragraph","text":"陈毅元帅把毛泽东主席的一封信交给了本·贝拉。"},{"type":"paragraph","text":"接见时阿尔及利亚方面在座的有:民族解放阵线政治局委员艾特·侯赛因和穆汉德乌·哈吉上校，民族解放阵线中央委员会候补委员、民族解放阵线政治局对外关系委员会主席特吉尼·哈达姆和国民议会议员卡迈勒·萨凯尔。"},{"type":"paragraph","text":"受接见的还有中国党政代表团副团长、中共中央候补委员、中国人民解放军副总参谋长杨勇上将和代表团全体团员:中共中央候补委员、外交部副部长章汉夫，中共中央候补委员赵毅敏，国务院总理办公室副主任罗青长和中国驻阿尔及利亚大使曾涛。"},{"type":"paragraph","text":"本·贝拉和陈毅进行了亲切友好的谈话。"},{"type":"paragraph","text":"陈毅元帅向本·贝拉赠送了礼品。"},{"type":"paragraph","text":"接见结束后，本·贝拉陪送中国党政代表团到美丽别墅的门口。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06ea15564a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
