的败类","authors":["饶学成"],"dates":[{"year":1957,"month":8,"day":21}],"is_range_date":false,"parts":[{"text":"对蒋介石五体投地，对共产党刻骨仇恨，刘亚休是宗教界的败类","type":"title"},{"text":"饶学成","type":"authors"},{"text":"人民日报讯：披着宗教外衣的老牌右派分子、中国佛教协会理事、民革四川省委宣传处处长刘亚休的反动原形已经彻底揭露。","type":"paragraph"},{"text":"从党整风开始，刘亚休四出扬言：“现在是共产党摆擂台，我们都要去打擂台”，他“要和共产党动真刀真枪”，恶毒地污蔑“共产党等于清朝入关以后的正黄旗，接近共产党的人等于镶黄旗”，把党和积极分子间的关系比作清朝主子和奴才的关系。","type":"paragraph"},{"text":"根据揭露，远在１９１８年，刘亚休就勾结北洋军阀，背叛了孙中山先生领导的革命。后来又投靠蒋介石反动集团。在蒋介石的峨嵋训练团毕业典礼会上，向蒋献媚说：“我是学佛的，过去我认为释迦牟尼是一尊佛，我对他是五体投地；现在，我认为蒋委员长也是一尊佛，我对他也是五体投地。”但，刘亚休对共产党却是刻骨仇恨的。刘在南充伪专员任内，曾亲自到仪陇督促伪县长挖掘朱德副主席的祖坟。","type":"paragraph"},{"text":"解放后，刘亚休更加仇恨党和人民。他把一个曾在苏北反共有功、后被提升为上海警备司令的戴传炘窝藏在家，并掩护他脱逃。土地改革时，刘亚休一面隐藏伪省参议员、大地主周首民的金、银、粮食等，把这些属于农民的胜利果实攫为己有；一面为被斗被镇压的地主反革命分子四出呼冤。刘很后悔地说：“１９５０年的民革筹委会可惜我没有参加，如果参加了，可以救一部分人。”他听到他的反革命朋友戴士琦等要自首时说：“这批人真可怜啊！当初既不努力打共产党，以后又不向外逃走，现在只有自首作阶下囚，我很同情他们。”１９５３年，由于民革中央右派头子陈铭枢的活动，把刘亚休拉进全国佛教协会理事会。自此，刘便借佛教协会名义，更加疯狂地到处点火，挑拨佛教徒和党的关系。党为了保护宗教信仰自由，修建了许多古迹庙宇，而刘却诬蔑说“这是夺取庙宇主权”。","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月21日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cfd6d696d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
