tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"放声歌唱毛泽东","authors":[],"parts":[{"type":"paragraph","text":"毛主席是红太阳"},{"type":"paragraph","text":"两位越南老人以无限喜悦和激动的心情，合写了一首颂诗，表达了越南人民热爱毛主席的真挚情感。"},{"type":"paragraph","text":"毛主席是红太阳，"},{"type":"paragraph","text":"光芒万丈照四方。"},{"type":"paragraph","text":"春天有你百花放，"},{"type":"paragraph","text":"禾苗青青菜花香。"},{"type":"paragraph","text":"夏天有你秧苗长，"},{"type":"paragraph","text":"农民心里乐无疆。"},{"type":"paragraph","text":"秋天有你收成好，"},{"type":"paragraph","text":"金黄谷粒堆满仓。"},{"type":"paragraph","text":"冬天有你冰雪化，"},{"type":"paragraph","text":"农民身上暖洋洋。"},{"type":"paragraph","text":"亲爱领袖毛主席，"},{"type":"paragraph","text":"你的恩情永不忘。"},{"type":"paragraph","text":"世界领袖是毛主席"},{"type":"paragraph","text":"这一首热情赞颂毛主席和毛泽东思想的诗歌，是一位普通的缅甸工人，在燃烧着革命烈火的缅甸土地上，最近托返回祖国的我国援缅专家转给中国人民的。这首诗唱出了正在战斗的广大缅甸革命人民的心声，表达了缅甸人民对我们伟大领袖毛主席和光焰无际的毛泽东思想的无限热爱。"},{"type":"paragraph","text":"战无不胜，"},{"type":"paragraph","text":"战无不胜，"},{"type":"paragraph","text":"我们以毛泽东思想作为武器，"},{"type":"paragraph","text":"高举光辉灿烂的红旗。"},{"type":"paragraph","text":"战无不胜，"},{"type":"paragraph","text":"战无不胜，"},{"type":"paragraph","text":"要创造无产阶级的新世纪，"},{"type":"paragraph","text":"我们的世界领袖是毛主席。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9f0acbba8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
