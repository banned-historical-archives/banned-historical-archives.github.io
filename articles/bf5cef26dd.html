],"dates":[{"year":1967,"month":8,"day":10}],"is_range_date":false,"parts":[{"text":"王力对新华社的指示","type":"title"},{"text":"王力","type":"authors"},{"text":"新华社的分社大多是好的，是经受了考验的，其中有不少同志表现很好。请你们立即排个队，把那些坐过牢的，受过打击的，在关键时反映重要情况的表现好的优秀记者排个名单，到北京开个会，报道一下，长长志气。我们中央文革要集体接见他们。这件事，请你们快办，越快越好。中央文革办事组要直接抓，新华社要快办。","type":"paragraph"},{"text":"总社那么多人，要把闲人都组织下去，到那些乱的地区跑一跑，向中央反映情况，那个部门都可以下，除了留人坚持工作，剩下的都可以下，还可以轮流下。不要老是两派在家吵架。这事可以第二步再办，先开分社的会。","type":"paragraph"}],"comments":[],"origin":"首都新闻批判联络站主编《新闻战报》第12、13期合刊 1967年8月23日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王力","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf5cef26dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
