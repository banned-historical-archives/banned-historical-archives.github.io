ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对中共七届六中全会关于农业合作化问题决议草案的批语","alias":"","parts":[{"type":"paragraph","text":"对中共七届六中全会关于农业合作化"},{"type":"paragraph","text":"问题决议草案的批语"},{"type":"paragraph","text":"（1955年9月12日）"},{"type":"paragraph","text":"刘、陈、邓、伯达\"阅，请于本日阅完，尚昆即印若干份（在北京发各中委和乔木、鲁言、农村工作部若干同志），用飞机送各省市委、自治区党委，征求修改的意见，于月底来京参加中央全会时带来。"},{"type":"paragraph","text":"此件我看可用，只作了一些文字上的修改。如伯达有不同意"},{"type":"paragraph","text":"[1]刘，指刘少奇。陈，指陈云，当时任中共中央书记处书记、国务院副总理。邓，指邓小平，当时任中共中央秘书长、国务院副总理。伯达，即陈伯达，当时任中共中央农村工作部副部长。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央副秘书长、中央办公厅主任。"},{"type":"paragraph","text":"[3]乔木，即胡乔木，当时任中共中央副秘书长、毛泽东的秘书。鲁言，即廖鲁言，当时任中共中央农村工作部副部长、农业部部长。"},{"type":"paragraph","text":"[4]指中共中央办公厅1955年9月12日印发的《中国共产党第七届中央委员会第六次全体会议（扩大）关于农业合作化问题的决议（第一次修正稿）》。1955年10月11日中共七届六中全会（扩大）通过了这个决议。"},{"type":"paragraph","text":"[5]毛泽东对关于农业合作化问题决议草案的修改，主要是在决议草案第九条的“现在各省还存在着一些土地改革不彻底的落后乡村，封建地主恶霸还在那里或明或暗地剥削和压迫农民群众”一句中的“现在各省还存在着一些土地改革不彻底的落后乡村”后，加写了“大约占乡村数的百分之五左右”13个字。"},{"type":"paragraph","text":"对中共七届六中全会关于农业合作化问题决议草案的批语见，可于下午和我一谈。"},{"type":"paragraph","text":"毛泽东九月十二日早四时"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":9,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":364},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a510a95280"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
