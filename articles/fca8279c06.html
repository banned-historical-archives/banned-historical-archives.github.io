authors":["朱继功"],"dates":[{"year":1956,"month":12,"day":12}],"is_range_date":false,"parts":[{"text":"清华大学部分师生对目前时局认识模糊","type":"title"},{"text":"朱继功","type":"authors"},{"text":"新华社北京１２日讯　　清华大学四千多名师生在１１月２５日，听了薄一波副总理关于目前形势及经济建设的报告后，解决了不少思想问题，但在部分师生中对目前时局还有些糊涂思想。","type":"paragraph"},{"text":"动力机械系副教授方崇智在听完报告后说：“从无产阶级立场看我拥护苏联出兵。在从国际法看无论如何这是干涉内政。”从美国回来不久的吴仲华教授提出假如说苏联出兵匈牙利是对的，为什么解放战争时苏联不出兵援助我们。","type":"paragraph"},{"text":"动力机械系助教伦景光（团员）说：“为什么帝国主义国家压迫人民这么重，人民还没有起来；而社会主义国家竟会有这种事（指匈牙利事件），可见帝国主义比社会主义稳定。”","type":"paragraph"},{"text":"从苏联第二十次党代表大会批判斯大林以及波匈事件发生后，少数同学对党的领导发生了怀疑。学生吴自强（团支部委员）向一党员说：“我过去认为工人阶级是最好的阶级，现在看来也不过如此”。也有人对党能否领导科学表示怀疑，担心十二年规划搞不成。","type":"paragraph"},{"text":"薄一波同志报告时，当场有人递条子要求答复：“苏联是否干涉我国内政？”、“苏联对我贸易揩了多少油？”、“海参威为何还不归还？”、“请解释伊犁条件和暖辉条约。”学生何思永等说，过去崇美，现在崇苏，中国今天不是大国主义而是小国主义，连宋景诗也要苏联专家来导演。","type":"paragraph"},{"text":"多数人追求超阶级的立场。学生谷甲修说：“什么事只要一抬出无产阶级利益就行了。现在好象党提出什么，什么就对。不一定。我是站在十字路看！那方面对，才往那方面走。”","type":"paragraph"},{"text":"来源：１９５６年１２月１２日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"清华大学部分师生对目前时局认识模糊","authors":["朱继功"],"dates":[{"year":1956,"month":12,"day":12}],"is_range_date":false,"parts":[{"text":"清华大学部分师生对目前时局认识模糊","type":"title"},{"text":"朱继功","type":"authors"},{"text":"新华社北京１２日讯　　清华大学四千多名师生在１１月２５日，听了薄一波副总理关于目前形势及经济建设的报告后，解决了不少思想问题，但在部分师生中对目前时局还有些糊涂思想。","type":"paragraph"},{"text":"动力机械系副教授方崇智在听完报告后说：“从无产阶级立场看我拥护苏联出兵。在从国际法看无论如何这是干涉内政。”从美国回来不久的吴仲华教授提出假如说苏联出兵匈牙利是对的，为什么解放战争时苏联不出兵援助我们。","type":"paragraph"},{"text":"动力机械系助教伦景光（团员）说：“为什么帝国主义国家压迫人民这么重，人民还没有起来；而社会主义国家竟会有这种事（指匈牙利事件），可见帝国主义比社会主义稳定。”","type":"paragraph"},{"text":"从苏联第二十次党代表大会批判斯大林以及波匈事件发生后，少数同学对党的领导发生了怀疑。学生吴自强（团支部委员）向一党员说：“我过去认为工人阶级是最好的阶级，现在看来也不过如此”。也有人对党能否领导科学表示怀疑，担心十二年规划搞不成。","type":"paragraph"},
