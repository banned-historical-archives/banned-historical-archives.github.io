<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对小资产阶级的再认识","authors":["沈立人"],"dates":[{"year":1957,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沈立人"},{"type":"paragraph","text":"经过反右派斗争，大家知道了在政治上和在思想上区别资本主义路线和社会主义路线、资产阶级立场和工人阶级立场的必要性，进一步看清了资产阶级的本质，懂得了在社会主义革命时期，坚持资产阶级立场，是完全反动的。但在同时，还有一些人，尤其是知识分子，对小资产阶级却认识不足，仍有意或无意地以小资产阶级自居，虽不以此为荣，然而也不以此为辱，似乎只要不属于资产阶级，就无所谓了。这是一种很危险的想法。"},{"type":"paragraph","text":"小资产阶级不等于资产阶级，是可以这样说的。但必须了解，两者固有不同的地方，可是还有更多相同的地方。只强调前者而忽略后者，就不能对小资产阶级的本质有一完整的、确切的认识。两者的相同，在于都以私有制为基础。由此出发，小资产阶级就有发展私有制并追求剥削、向往于上升为资产阶级的趋势。小资产阶级从来不是一个独立的、稳定的阶级，从历史看，主要是附属于资产阶级的，在政治上和思想上，一般是接受资产阶级的影响，接受资产阶级的领导的。这种情况不仅存在于小资产阶级的个体的体力劳动者，也存在于小资产阶级的知识分子，特别因为他们一般是个体的脑力劳动者。小资产阶级和资产阶级，一字之差，正反映了小资产阶级是资产阶级的具体而微的东西。至于小资产阶级和资产阶级的不同，主要在有无剥削；但是这种差别，无论在性质上或程度上，都不足以使小资产阶级在根本上摆脱资产阶级的血缘联系。且不论有不少自命为“小资产阶级”的知识分子，实际上就是资产阶级知识分子。"},{"type":"paragraph","text":"有人说，我国的小资产阶级不是有革命性的吗?我们认为必须分析在什么时期，以及这种革命性怎样表现。在新民主主义革命时期，资产阶级也有一定的革命性；但不能掩饰的是，同时还有相当的软弱性和动摇性。小资产阶级也一样，其革命性是有局限的，小资产阶级虽是一分革命力量，然而希望更好地有利于革命，就必须接受无产阶级政治上和思想上的领导，逐步地改造自己；否则，将同时带给革命以一定的破坏性，使革命遭到损失，如在革命高潮中的盲动和低潮中的投降逃跑等等。尤其是知识分子，这种情况更突出，拥护革命的固不少，但走“中间路线”者也不少，甚至还有卖身投靠敌人的。"},{"type":"paragraph","text":"在社会主义革命时期，生产资料的私有制已基本上不存在了，小资产阶级原来以私有制为基础的，何去何从?或者，接受工人阶级的领导，努力改造自己；或者，跟着资产阶级，那么只有靠拢资本主义。在此历史关头，小资产阶级必须抉择；而“中间路线”，即使暂时的，也没有了。小资产阶级在政治上表现为什么呢?只是改良主义和资产阶级民主等；在思想上表现为什么呢?只是个人主义和自由主义、绝对平均主义等。这些，基本上都属于资产阶级的范畴，和社会主义革命的要求是对抗的。在这样的意义上，坚持小资产阶级立场，就和坚持资产阶级立场相同，是在拖住历史车轮，再也没有什么革命性。"},{"type":"paragraph","text":"从反右派斗争中暴露的事实，使大家警惕到，小资产阶级必须改造。这个改造，首先应从对自己的再认识开始。有人如果仍以为小资产阶级有革命性或至少不算反动，于是继续以小资产阶级自居，拒绝改造，就和社会主义革命的要求针锋相对，并越来越远，其前途只有成为资产阶级的陪葬品。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a4930ac53"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
