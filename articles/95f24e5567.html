script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"中原军的战略任务是在敌后创文根据地","alias":"","parts":[{"type":"paragraph","text":"中原军的战略任务是在敌后创立根据地"},{"type":"paragraph","text":"（1946年7月15日）中原局："},{"type":"paragraph","text":"胡宗南“有强兵节节堵击，北上很难通过，且牵制大批敌军在敌后创立根据地是我中原军的光荣战略任务，因此我中原军全部应遵中央午文电在鄂、豫、皖、川、陕五省境内进行机动灵活之作战，摧毁国民党统治机构，牵制国民党大批军队配合我华北、华中主力之作战。目前为避免和胡宗南、刘峙两路大军作战，并取得休息时间起见，你们可南入巴山，进一步占领通南巴及川东北广大地区，创造根据地；我王刘?纵队则在鄂西创造根据地；皮徐\"则"},{"type":"paragraph","text":"[1]胡宗南，当时任国民党军第一战区司令长官。"},{"type":"paragraph","text":"[2]应为午元电，即中共中央1946年7月13日给中原军区郑位三、李先念的电报。"},{"type":"paragraph","text":"[3]刘峙（1892—1971)，江西吉安人，当时任国民党军郑州绥靖公署主任。[4]通南巴，指四川通江、南江和巴中。"},{"type":"paragraph","text":"[5]王，指王树声，当时任中原军区第一纵队司令员。刘，指刘子久（1901—1988），山东广饶人，当时任中原军区第一纵队副政治委员。"},{"type":"paragraph","text":"[6]皮，指皮定均（1914—1976)，安徽金寨人，当时任中原军区第一纵队第一旅旅长。徐，指徐子荣（1907—1969），河南确山人，当时任中原活动于皖西及其附近；原路东、路西根据地\"留下之部队则坚持原地区。将来你们还应准备派一部向大西南发展。总之为着根本破坏蒋介石以重兵进攻东北、华北、华中、中原之反动计划，并发展解放区至中原及长江上游，我党必须采取午文电计划及本电所述之部署。你们意见如何速告。"},{"type":"paragraph","text":"中央午删"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":492,"page_end":493},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95f24e5567"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
