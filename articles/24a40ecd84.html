天罪行（图片）","authors":[],"dates":[{"year":1976,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热烈庆祝华国锋同志任中共中央主席、中央军委主席"},{"type":"paragraph","text":"愤怒声讨“四人帮”阴谋篡党夺权的滔天罪行"},{"type":"paragraph","text":"首都一百五十万军民举行声势浩大的庆祝游行，热烈庆祝华国锋同志任中国共产党中央委员会主席、中国共产党中央军事委员会主席。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"中国人民解放军八三四一部队广大指战员和首都群众一起游行。他们决心最紧密地团结在以华国锋主席为首的党中央周围，一切行动听党中央指挥，同王洪文、张春桥、江青、姚文元反党集团斗争到底。"},{"type":"paragraph","text":"《北京日报》记者摄"},{"type":"paragraph","text":"首都广大工人群众欢欣鼓舞上街游行，热烈庆祝华国锋同志任中国共产党中央委员会主席、中国共产党中央军事委员会主席。"},{"type":"paragraph","text":"本报记者摄"},{"type":"paragraph","text":"中央民族学院各族工农兵学员载歌载舞，热烈庆祝华国锋同志任中共中央主席、中共中央军委主席，热烈庆祝粉碎“四人帮”篡党夺权阴谋的伟大胜利！    《北京日报》记者摄"},{"type":"paragraph","text":"中共平谷县委召开声讨批判“四人帮”反党集团大会，愤怒揭露和批判他们搞修正主义，搞分裂，搞阴谋诡计，篡党夺权的罪行。"},{"type":"paragraph","text":"《北京日报》记者摄"},{"type":"paragraph","text":"红卫兵、红小兵和首都军民一起游行，热烈庆祝粉碎“四人帮”反党集团篡党夺权阴谋的伟大胜利。他们振臂高呼：“打倒王洪文、张春桥、江青、姚文元反党集团！”“战无不胜的毛泽东思想万岁！”"},{"type":"paragraph","text":"《北京日报》记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24a40ecd84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
