修正主义者充当美帝国主义忠实帮手","authors":[],"dates":[{"year":1965,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最强烈谴责约翰逊政府镇压黑人的法西斯暴行"},{"type":"paragraph","text":"艾地主席号召声援美国黑人斗争"},{"type":"paragraph","text":"揭露现代修正主义者充当美帝国主义忠实帮手"},{"type":"paragraph","text":"新华社雅加达二十七日电　据印度尼西亚《人民日报》今天报道，印度尼西亚共产党主席艾地为支持美国黑人的抗暴斗争向报界发表声明说，印度尼西亚共产党最强烈地谴责约翰逊政府对美国黑人的流氓和强盗行径、法西斯和野蛮暴行。"},{"type":"paragraph","text":"艾地说，自从美国洛杉矶的黑人在八月中旬开展了声势浩大的斗争以来，美国黑人反抗约翰逊政府实行种族歧视和种族压迫的斗争火焰越烧越旺。它鼓舞着美国全国各地的黑人去进行英勇顽强的斗争。"},{"type":"paragraph","text":"艾地在揭露美国政府对黑人的暴行的时候说，这就是美帝国主义者一直在鼓吹的“美国生活方式、民主和人道主义”；也是他们在南越、刚果、多米尼加和其他地方所实行的伎俩。他们的所做所为不是别的，只是流氓和强盗行径、法西斯和野蛮暴行。美帝国主义者是希特勒和墨索里尼的法西斯主义的道道地地的继承者。"},{"type":"paragraph","text":"艾地说，为了对付美国黑人的抗暴斗争，约翰逊政府采取了两面政策。它一方面派军警用武力镇压黑人，另一方面又采用鼓吹“和平解决”和许下某些“诺言”等欺骗手段，企图削弱黑人的斗争。"},{"type":"paragraph","text":"艾地说，在对付美国黑人的抗暴斗争方面，美帝国主义者有他们的忠实的帮手，这就是他们的孪生兄弟现代修正主义者。为了掩盖美帝国主义的罪行，修正主义者在给约翰逊政府涂脂抹粉，把它装扮成似乎是“爱好和平的”政府。艾地并举出南斯拉夫修正主义者所宣扬的一套作为例子。艾地说，他们诽谤美国黑人的抗暴斗争是什么“野蛮的”和“广泛的破坏行动”。"},{"type":"paragraph","text":"艾地指出，美国黑人反对种族压迫和歧视的斗争是同美国人民争取真正的独立和社会主义的斗争分不开的。美国的黑人问题是美国和全世界的工人阶级和人民的问题，不论他们是白人还是黑人。美国白人工人的责任是无私地和大力地维护和促进黑人反抗约翰逊政府和美国垄断资本家的种族压迫和歧视的斗争。他还说，这也是全世界工人阶级和人民的责任。"},{"type":"paragraph","text":"艾地代表印度尼西亚共产党中央委员会号召印度尼西亚人民再一次对美国黑人的正义斗争表示革命的声援和无保留的支持。他还说，印度尼西亚共产党敦促政府没收在印度尼西亚的一切美国资本，来支持美国黑人的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a6586b3e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
