<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中南军政委员会关于发展春耕生产十大政策的布告","authors":[],"dates":[{"year":1950,"month":4,"day":18}],"is_range_date":false,"parts":[{"text":"中南军政委员会关于发展春耕生产十大政策的布告","type":"title"},{"text":"一　保证劳动收益权","type":"paragraph"},{"text":"保证谁种谁收，即今春谁种，秋间谁收。将来土地改革时，所有劳动农民的自耕土地，不分贫富，一律不动。","type":"paragraph"},{"text":"二　保证僱工自由","type":"paragraph"},{"text":"工资多少，由双方面议，政府农会不加限制。","type":"paragraph"},{"text":"三　保证借贷自由","type":"paragraph"},{"text":"有借有还，有本有利，利息由双方面议，禁止强迫借粮借款。","type":"paragraph"},{"text":"四　贯彻减租、停止退押","type":"paragraph"},{"text":"去年秋季租粮未减者，一律照二五退租，只退一季，不算老帐。各地押租金，已退者，不再倒还，未退者停止再退，正退者加以限制。","type":"paragraph"},{"text":"五　保障产权佃权","type":"paragraph"},{"text":"地主依法减租，农民依法交租。地主不得籍故夺佃，不得变卖土地，农民不得抗交租粮。","type":"paragraph"},{"text":"六　保护耕牛、牲口","type":"paragraph"},{"text":"禁止屠宰耕牛，奖励添买耕牛，禁止强迫租牛，借牛，民间租借耕牛，或以人工换牛工者，要根据双方自愿，牛租、牛工多少，由双方面议，不得强借强换，政府或农会，不要限制牛工牛租。畜养耕牛者，交公粮时抵作一口人或扣除一定消耗，减派负担。","type":"paragraph"},{"text":"七　奖励开垦荒田","type":"paragraph"},{"text":"熟荒3年、生荒5年免交公粮。所开荒田，在分田时，不计在分配数目之内，准作额外得田计算，现有田地，过期不耕种者，准许别人耕种，不得任其荒芜。","type":"paragraph"},{"text":"八　调整公粮负担","type":"paragraph"},{"text":"去年秋季公粮，因负担过重无法交清者，准予减免，已交清者，准由今年公粮中减轻，以为弥补。因交粮过重，无法生活者，准退还一部，以资维持。其隐瞒黑地，逃避负担者，应查明补收。补收之粮，九成交当地农民分配，一成归公。今年公粮一律按地亩及当地常年平均产量累进征收，废除按阶级分派负担办法。全年公粮，一次计算，分夏秋两季征收。因加工加肥，特别多收者，不增加负担。","type":"paragraph"},{"text":"九　严禁破坏生产","type":"paragraph"},{"text":"凡坏分子杀害牲口、焚毁房屋、破坏农具或其他生产资料者，不论属于公家的、别人的、自己的，一律严厉惩办，决不姑宽。","type":"paragraph"},{"text":"十　奖励勤劳致富","type":"paragraph"},{"text":"凡属辛勤劳动，省吃俭用，因而致富者，一律加以奖励保护，严禁任何人侵犯其利益。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e559eee9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
