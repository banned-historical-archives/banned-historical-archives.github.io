["中山大学","刘文","岑澜","林传駬","梁润成","江升日","董每戡"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——诬蔑中国共产党","type":"title"},{"text":"中山大学董每戡岑澜刘文江升日梁润成林传駬","type":"authors"},{"text":"“国民党最初十年还好的，到后来才坏了，共产党统一中国不过七、八年已经搞成这个样子。”（中山大学  董每戡）","type":"paragraph"},{"text":"“共产党好？看匈牙利共产党专政十年，到底作了些什么，看结果就知道。”（中山大学  岑澜）","type":"paragraph"},{"text":"“宗派主义像毒蛇，把我们圈在不同的圈子里，党员是第一等级，非党员是第三等级，团员不上不下，正在中间，圈套还有圈套；落后与先进各立阵营，新的老的，分派分班；连环套着连环，彼此立‘墙’立‘山’，看来一个整体，内部分崩离析。”（中山大学　刘文）","type":"subtitle"},{"text":"“有党就有宗派，有官就有官僚，要消灭宗派、官僚，除非没有党存在。”（中山大学　江升日）","type":"paragraph"},{"text":"“没有共产党就没有新中国这话不对，没有共产党也有另一些人出来搞。”（中山大学　梁润成）","type":"paragraph"},{"text":"“不是任何一个国家的共产党都能代表人民的利益，匈牙利党为大多数人民所反对，就不能代表人民，反共不一定反人民，像反匈牙利共产党就不是反匈牙利人民。”（中山大学  林传駬）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d961cf88e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
