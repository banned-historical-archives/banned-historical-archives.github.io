的爱国卫生运动的通知","authors":[],"dates":[{"year":1958,"month":1,"day":3}],"is_range_date":false,"parts":[{"text":"毛泽东撰中央关于在全国开展以除四害为中心的爱国卫生运动的通知","type":"title"},{"text":"各省委、市委、自治区党委：","type":"appellation"},{"text":"今冬必须在全国各地开始大举进行以除四害为中心的爱国卫生运动。各地尚未动员的必须立即动员起来。杭州市已决定在两年内基本肃清四害。上海市亦已大动起来。兹将一九五八年一月二日收到的《上海市开展冬季爱国〔卫生〕运动的情况》一份转发给你们，请你们参照办理。今冬除四害布置，城市一定要到达每一条街道，每一个工厂、商店、机关、学校和每一户人家，乡村一定要到达每一个合作社、每一个耕作队和每一户人家。一九五八年十二月全国各省市自治区共二十七个单位将在北京开评比会议，比较各地成绩的大小。","type":"paragraph"},{"text":" 中共中央一九五八年一月三日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b82891ede"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
