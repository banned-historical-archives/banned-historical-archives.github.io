":["戚本禹"],"dates":[{"year":1967,"month":7,"day":22}],"is_range_date":false,"parts":[{"text":"戚本禹给北京航空学院“红旗”的信","type":"title"},{"text":"戚本禹","type":"authors"},{"text":"北航红旗四五一一班战士并转王芬同志：","type":"appellation"},{"text":"我在六月十七日的北航《红旗》上看到了四五一一班红旗战士《热情帮助犯过严重错误的同志，投入战斗》的报道，也看到了六月二十七日北航《红旗》刊登王芬同志写的《毛泽东思想的光辉》的文章，最近，又收到了王芬同志的来信。我同四五一一班的红旗战士一样，看到了一个犯过错误的同志在同志们耐心的热情帮助下，改正了自己的错误，决心起来革命，心里感到很高兴。","type":"paragraph"},{"text":"毛主席教导我们说：“错误和挫折教训了我们，使我们比较地聪明起来了，我们的事情就办得好一些。”“犯了错误则要求改正，改正得越迅速，越彻底，越好。”王芬同志虽然在运动中犯了一些错误，但通过学习毛主席著作，克服了个人主义的私心杂念，迅速地认真地改正错误，提高认识，站到毛主席的无产阶级革命路线这一边来，同革命的同志们并肩战斗。我相信，象王芬这样的同志，改正了错误以后，一定能同北航红旗的战士一起沿着革命道路胜利前进。","type":"paragraph"},{"text":"祝北航四五一一班红旗战士在伟大的毛泽东思想的哺育下，迅速地成长起来，把无产阶级文化大革命进行到底！","type":"paragraph"},{"text":"希望通过王芬同志转告去年下半年因不同意北航红旗的观点而同我进行过辩论的北航红卫兵同志们，能够抛弃过去的错误观点，纠正自己的不正确认识，努力投入当前的大批判运动，为捍卫毛主席的无产阶级革命路线而战斗。","type":"paragraph"},{"text":" 戚本禹七月二十二日","type":"paragraph"}],"comments":[],"origin":"1967年7月26日红代会清华井冈山一部第三动态组编《动态》第106期；1967年7月29日北航革命委员会、红代会北航红旗主办《红旗》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"787e237949"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
