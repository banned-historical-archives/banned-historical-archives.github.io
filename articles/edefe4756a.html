rs":["昆明师范学院学生","蒋正富"],"dates":[{"year":1957,"month":5,"day":15}],"is_range_date":false,"parts":[{"text":"昆明师范学院“民众团体”十六条标语","type":"title"},{"text":"昆明师范学院学生蒋正富","type":"authors"},{"text":"[蒋正富：昆明师范学院中文专科学生]","type":"subtitle"},{"text":"5月15日清晨，昆明师范学院出现了由“民众团体”(蒋正富的化名)所制的十六条标语：","type":"paragraph"},{"text":"共产党万岁（原标语的“万”字是倒写的）","type":"paragraph"},{"text":"打倒专制独裁","type":"paragraph"},{"text":"废除共产党的一党专政","type":"paragraph"},{"text":"反对一党独裁专政","type":"paragraph"},{"text":"不要在学校建立党团制度","type":"paragraph"},{"text":"废除不民主政策","type":"paragraph"},{"text":"反对压制民主不准人说话","type":"paragraph"},{"text":"应该立即改善人民的生活","type":"paragraph"},{"text":"我们青年应该坚决起来反抗不合理制度","type":"paragraph"},{"text":"我们现在的青年团员们不要把自己看作是高人一等，应和大家一道来反抗","type":"paragraph"},{"text":"反对共产党制造人为的矛盾把人分为党团群","type":"paragraph"},{"text":"打破人为的界限把人分为党团群的等级","type":"paragraph"},{"text":"不分党团群全国人民一律平等","type":"paragraph"},{"text":"我们青年中不应有团群的分别，这是共产党的手段","type":"paragraph"},{"text":"共产党赶快回头","type":"paragraph"},{"text":"共产党若再不取消一党专政，我们就要反抗到底","type":"paragraph"}],"comments":[],"origin":"《云南省高等学校右派分子反动言论选集》(中国共产党云南省高等学校委员会办公室编印，1957.8.15)，内部资料 注意保存。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edefe4756a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
