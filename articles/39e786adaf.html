script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"和大代表团在伦敦招待记者  阐明和大宣扬保卫和平目的  斥责英资产阶级报纸抵制阴谋及谎言","authors":[],"dates":[{"year":1950,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"和大代表团在伦敦招待记者"},{"type":"paragraph","text":"阐明和大宣扬保卫和平目的"},{"type":"paragraph","text":"斥责英资产阶级报纸抵制阴谋及谎言"},{"type":"paragraph","text":"【新华社十六日讯】据塔斯社伦敦十五日讯：已抵达伦敦准备向英国议会递交保卫和平呼吁书的世界拥护和平大会常设委员会的代表团，举行记者招待会，说明此行目的。"},{"type":"paragraph","text":"邀请出席的请帖虽早由招待会的主持者分送伦敦所有的报馆和通讯社，但资产阶级报纸出席招待会的，仅有报业联合会和一家地方报纸的伦敦办事处的代表。资产阶级报纸对于招待会的这种抵制，反映出他们怎样反对代表团此行的目的。"},{"type":"paragraph","text":"英国和平委员会主席克劳瑟于招待会上讲话时说：苏联代表西蒙诺夫和卡巴列夫斯基以及匈牙利大主教雅诺斯，未被英国政府发给入境许可证，因此他们目前停留在布拉格而不能继续其行程。英国和平委员会为此已向英国外交部提出强烈抗议。"},{"type":"paragraph","text":"和大常委会代表团团员、法国国民议会议员塞伏兹指出：面对着事实上正在准备中的新战争危险，全世界人民必须组织起来宣扬和平观念。他说：“我们正在尝试做一些以前没有做过的事情，即是在世界拥护和平大会常设委员会的发起之下，把各种政党、各种职业，以及各种信仰的人士组织起来，共同为争取和平而奋斗。”"},{"type":"paragraph","text":"他斥责那些硬说代表团只代表苏联和共产党利益的论调为“处心积虑的谎话”。他说：“这些谎话正由帝国主义者和手上沾着鲜血的人们散播着。而和大常委会代表团所代表的则是整个人类的利益。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39e786adaf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
