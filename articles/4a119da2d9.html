ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"加强宗教问题的研究的批语","alias":"","parts":[{"type":"paragraph","text":"加强宗教问题的研究的批语"},{"type":"paragraph","text":"（1963年12月30日）"},{"type":"paragraph","text":"这个文件很好。但未提及宗教研究。对世界三大宗教（耶稣教、回教、佛教），至今影响着广大人口，我们却没有知识，国内没有一个由马克思主义者领导的研究机构，没有一本可看的这方面的刊物。《现代佛学》不是由马克思主义者领导的，文章的水平也很低。其他刊物上，用历史唯物主义的观点写的文章也很少，例如任继愈发表的几篇谈佛学的文章，已如凤毛麟角，谈耶稣教、回教的没有见过。不批判神学就不能写好哲学史，也不能写好文学史或世界史。这点请宣传部同志们考虑一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月三十日"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央1963年12月30日转发中央外事小组、中央宣传部关于加强研究外国工作的报告的指示稿上写的批语。"},{"type":"paragraph","text":"[2]指中共中央外事小组、中央宣传部1963年12月15日关于加强研究外国工作给中央的报告。"},{"type":"paragraph","text":"[3]任继愈（1916—2009），山东平原人。当时任北京大学教授。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":12,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":184,"page_end":184},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a119da2d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
