<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级的本性不会改变","authors":["石圣美"],"dates":[{"year":1971,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市第一商业局党委副书记　石圣美"},{"type":"paragraph","text":"伟大领袖毛主席深刻地指出:“我们主张无产阶级的人性，人民大众的人性，而地主阶级资产阶级则主张地主阶级资产阶级的人性，不过他们口头上不这样说，却说成为唯一的人性。”人性，从来都是具体的，而不是什么抽象的东西。不同阶级有不同的人性，根本没有超阶级的人性。"},{"type":"paragraph","text":"资产阶级唯利是图，贪得无厌的丑恶本质，是决不会改变的。他们为了自己发财，什么坏事都会干得出来。例如，在旧社会有个反动资本家，他在政治上勾结帝国主义和国民党反动派，雇佣了一批特务爪牙、工贼走狗，还搞了许多条所谓“店规”，用来镇压店员，把我们的店员根本不当人看待。解放后，不法资本家王康年，竟丧心病狂地卖假药，毒害我们最可爱的人——中国人民志愿军。在无产阶级文化大革命中，资产阶级还是用他们腐朽的思想，糜烂的生活方式，腐蚀群众，毒害青年，这种例子是很多的。恩格斯曾经指出:“在资产阶级看来，世界上没有一样东西不是为了金钱而存在的，连他们本身也不例外，因为他们活着就是为了赚钱，除了快快发财，他们不知道还有别的幸福，除了金钱的损失，也不知道还有别的痛苦。”无数事实证明，资产阶级的人性，完全是一种法西斯的兽性。"},{"type":"paragraph","text":"刘少奇一类政治骗子一再宣扬超阶级的人性，说什么“人，只是概念，人的这个概念，反映了人的同一性”，鼓吹阶级合作，麻痹我们的斗志，妄图使我们丧失阶级警惕，不抓阶级斗争。如果照他们一套去做，我们就会对阶级敌人放松警惕，甚至同阶级敌人讲“义气”，讲“交情”，对他们的反革命行为就会不去揭发，不作斗争，搞“阶级合作”，站在阶级敌人一边，这实际上就是向阶级敌人投降，把无产阶级“合”到资产阶级那里去。我们一定要牢记毛主席关于“千万不要忘记阶级斗争”的教导，克服轻敌麻痹思想。刘少奇这伙人，他们要抽掉阶级性，我们就要强调鲜明的阶级性；他们抹杀阶级斗争，我们就要狠抓阶级斗争不转向，决不上这些政治骗子的当。"},{"type":"paragraph","text":"毛主席教导说:“我们是站在无产阶级的和人民大众的立场。对于共产党员来说，也就是要站在党的立场，站在党性和党的政策的立场。”我们要站在无产阶级立场上，认识和处理问题。刘少奇标榜“人性论”，宣扬资产阶级的所谓“感情”，为他招降纳叛，推行修正主义路线服务。这些政治骗子还用种种手法，制造混乱，掩护敌人。我们最听毛主席的话，就要认真坚持学习马克思主义、列宁主义、毛泽东思想，不断揭露阶级敌人的阴谋诡计，坚决站在无产阶级的党性立场上，为巩固无产阶级专政而斗争。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2571140445"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
