script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坏人揪出来　好人站出来——不折不扣地贯彻执行毛主席的干部政策","authors":["本报评论员"],"dates":[{"year":1968,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报评论员"},{"type":"paragraph","text":"毛主席教导我们:“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好。”"},{"type":"paragraph","text":"当前，我们一定要全面落实毛主席的这个最新指示，不折不扣地贯彻执行毛主席的干部政策。"},{"type":"paragraph","text":"有人问，既要清理阶级队伍，又要大胆解放、使用干部，这两者怎样统一起来呢?"},{"type":"paragraph","text":"清理阶级队伍，把那些混入干部队伍中的叛徒、特务和党内一小撮死不悔改的走资派清除出去，这是无产阶级文化大革命中一项十分重大的任务。如果我们的革命队伍和新生的权力机构中混杂了一批坏人，不加清除，那就是包庇坏人；文化大革命的伟大成果，就可能被一些坏人所篡夺。所以，必须发动革命群众，毫不容情地把坏人揪出来。"},{"type":"paragraph","text":"但是，我们的干部大多数是好的和比较好的这一点，任何时候都不能动摇；相信和依靠干部的大多数这一点，任何时候也不能动摇。我们要把混入干部队伍中的一小撮坏人揪出来，同时又要继续大胆解放干部，大胆使用干部。不要一讲清理阶级队伍，就不敢大胆解放和使用干部了。大胆解放、使用干部，也正是为了更好地建立和巩固革命委员会。我们要做到:坏人揪出来，好人站出来。"},{"type":"paragraph","text":"还应看到，在我们干部队伍中，叛徒、特务、顽固不化的走资派只是一小撮。我们一定要坚持扩大教育面、缩小打击面的方针，始终把斗争的矛头指向一小撮阶级敌人。如果一概怀疑，一概排斥，扩大打击面，这样做非但不能把阶级队伍整顿、清理好，相反，会让一些坏人乘隙溜了过去。"},{"type":"paragraph","text":"我们不能不作阶级分析，把所有干部统统列为“审查”对象；不能以“谨慎”为借口，不作调查，不做工作，迟迟不着手解放干部，拖延三结合领导班子的建立；也不能发现了一个干部有问题，就把解放干部的工作停顿下来。我们要严防叛徒、特务、党内一小撮走资派混入革命委员会；但是，如果个别坏人混了进来，也不可怕。因为他们既要反革命，就不可能伪装得很彻底。他们的尾巴迟早要露出来的。只要我们经常保持革命的警惕性，一旦发现坏人混了进来，依靠群众，认真查明，还可以继续把他揪出来!"},{"type":"paragraph","text":"无产阶级只有解放全人类才能最后地解放自己。同样，无产阶级革命派只有大胆地解放干部，把大批革命干部吸收到革命三结合的领导班子里来，才能够进一步巩固我们的无产阶级政权，夺取无产阶级文化大革命的全面胜利。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36037bb5c2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
