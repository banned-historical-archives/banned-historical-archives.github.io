es":[{"year":1948,"month":7,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纠正无政府和反对领导的偏向"},{"type":"paragraph","text":"阳城吉德村整顿互助"},{"type":"paragraph","text":"【太岳电】阳城吉德村在本月九日召开包括七十八个村干部和互助组小组长的联席会上，检讨互助组散漫的两个原因：第一是干部纠偏以后，思想上认为“为群众服务”“发扬民主自由”就是“群众想干啥就干啥”“群众叫干啥就干啥”，弄的束手束脚，不敢大胆领导。刘旺本来就不和人互助，今年种玉茭时，要求组长派人帮助，大家不去，组长和分队长为了“为群众服务”，就带头去帮助，引起了全组不满。第二、有少数人以为“民主自由”，在组内“想怎样就怎样”，不服从领导。干部李怀全说：“咱去检查互助，看见大家各干各的，就问了一句，立刻有人顶嘴说：这是‘自由’，你还能强迫？咱以后就不敢吭气，不敢领导。”根据这些情况，大家分组讨论决定了今后克服这种散漫自流的办法。一、参加互助组，人人有自由，入组退组由各人自便，但参加了就应遵守组里的制度，等价交换，合理变工，民主讨论，共同执行。二、组员的困难共同设法解决，但须合理解决，变工还工，不能损害别人的利益，为少数人“服务”。当天夜里，各组都开了会，重新自愿结合。全村计重新结合了五十九个小型互助组。大家自由出组进组，有些讨巧的人被大家“孤立”出去了。整顿后刚巧下了雨，第二天一早上地，赶午饭时全村五百四十六亩回茬豆子就全部种完了。群众说：要不整顿互助，回茬还要误事哩。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9588cd5c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
