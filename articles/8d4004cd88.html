torical-archives/banned-historical-archives8/main/maoquanji4-1.pdf"],"article":{"title":"关于土地问题的意见","alias":"","parts":[{"type":"paragraph","text":"关于士地问题的意见！"},{"type":"paragraph","text":"（1927年8月18日）"},{"type":"paragraph","text":"一、没收土地必有没收的对象，中国大地主少，小地主多，若只没收大地主的土地，则没有好多被没收者，被没收的土地即少，贫农要求土地的又多，单只没收大地主的土地，不能满足农民的要求和需要，要能全部抓住农民，必须没收地主的土地交给农民。二、没收土地的办法，要由革命委员会（我们的党）制定一个土地政纲，将全部办法要农协或革命委员会执行。三、这个没收土地的政纲，如对被没收土地的地主，必须有一个妥善方法安插。因此主张在不能工作或工作能力不足及老弱的地主，应由农协在农业税之内征收若干农产物平均分配给此等分子。四、宣布废除对农民的各种苛税，征收农业税。"},{"type":"paragraph","text":"[1]这是毛泽东在改组后的中共湖南省委第一次会议上讨论湖南农民问"}],"authors":["毛泽东"],"dates":[{"year":1927,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":64,"page_end":64},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d4004cd88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
