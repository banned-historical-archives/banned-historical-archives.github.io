thors":[],"dates":[{"year":1984,"month":4,"day":5}],"is_range_date":false,"parts":[{"text":"关于处理“文革”期间抄家没收财物问题的意见","type":"title"},{"text":"（供各级党委处理问题时参考，不对外公开宣布）","type":"subtitle"},{"text":"各地、市、县委，柳铁党委，区直各部、委、办、厅局党委（党组）：","type":"appellation"},{"text":"解决“文革”期间抄家、没收财物问题，是处遗中落实政策的一项工作，必须认真抓紧抓好。现根据中央指示精神，结合我区目前的实际情况，提出如下意见：","type":"paragraph"},{"text":"一、“文革”期间，我区城乡持续发生各种形式，各种名目的抄家、没收财物事件。情况复杂，牵涉面广，人民财产损失重大，破坏公私财物的幕后策划者及主要分子和趁火打劫者都是违法的，必须在处遗或整党中尽可能把情况查明，追究责任。对于积极参与抄家、没收活动，犯了错误的同志，应该自觉地主动地作出认真的自我批评和退赔，原物尚在的退还原物，原物不在的，原则上谁占谁退赔，争取对方谅解。有些被抄没的财物确系去向不明，现已无法查清的，由组织出面讲明情况，了结此案。如原物尚在某人手中而不愿退还者，不仅要追退原物，而且要给予处分。","type":"paragraph"},{"text":"二、强加政治罪名而加以抄家、没收的，对受害者应通过一定的形式进行政治平反，恢复政治名誉。","type":"paragraph"},{"text":"三、对于抄家、没收的金银财宝及衣物等已折价变卖、价款确已交公入库者，应由财政部门退还。如财物保留在单位者，由保存单位退还。","type":"paragraph"},{"text":"有的地方强行向受害者收取所谓“专政费”的，应由大队集体经济中赔退，一时退不出，可立欠条。","type":"paragraph"},{"text":"四、由于抄家、没收而造成生活严重困难者，由当地政府民政部门和有关单位在力所能及的情况下酌情补助救济。应着眼于帮助搞好生产，从政治上解决问题为主，对有些受害者要求过高做不到的事，要耐心进行思想工作。","type":"paragraph"},{"text":"五、一九八三年分配给各地的处理“文革”遗留问题的经费，只限于处理被打死者的遗属，不能挪作别用。","type":"paragraph"},{"text":" 中共广西壮族自治区委员会整党办公室一九八四年四月五日","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4bc494a24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
