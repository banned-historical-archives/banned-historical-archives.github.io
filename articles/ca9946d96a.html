" crossorigin="">{"props":{"pageProps":{"books":[{"id":"9172bd1f-5918-4850-820a-b229e2d89b8f","name":"王洪文副主席重要电话指示（1974.3.16）","internal":false,"official":true,"type":"img","author":"王洪文，1976.3.16","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/9172bd1f-5918-4850-820a-b229e2d89b8f/1.jpg"],"article":{"title":"王洪文副主席重要电话指示","alias":"","parts":[{"type":"paragraph","text":"王供文主席复要电话指示"},{"type":"paragraph","text":"（一九七码年三月十六日级二时等五分）一、浙江两派某些头头，一不批林批孔，二不批际励耘、南萍，有些人到工厂、农村去搞串连、榆枪。物资，拾车聊等，完全违背了批林批孔的斗争大方向，是极端错误的。在外边的一些人，应当回到原单位，参加批林批孔二省委，特是节军区、不坠决执行中夹、中央军委的两次收枪的命令，是错误的，必须回中央、中央军委检查三省委里一些王安负资人：王要是招书记、需委，到外地去养病的，应当回到工作岗位上米，同辞众一起批林批孔，抓好工作，对不回东的，省妻应当严放处理四在批林批孔的同时，要注意安排好工农业生产，特别是农业生产，安认真抓好，带施妥格实。温州的就国福检等同匙，已经不是一般的错误了。要责成占军区抓志来，拘留在省里[这个电话是王副主席亲自打给启龙同志的，记录以后义核对了一次，王副主席说：前天现上中失开会议论了这个同题，这是我归纳的儿条，三月二十一日六时二十五分，王副主照办公室来电话，传达王副主席指示，将“浙江两派头头”·改为“浙江两旅某些头头”。）"}],"authors":["王洪文"],"dates":[{"year":1974,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"王洪文","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca9946d96a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
