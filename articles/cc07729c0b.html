],"dates":[{"year":1976,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"深入批判邓小平  反击右倾翻案风  歌颂文化大革命"},{"type":"paragraph","text":"在纪念毛主席的光辉著作《在延安文艺座谈会上的讲话》发表三十四周年，庆祝无产阶级文化大革命十周年的日子里，在深入批判邓小平、反击右倾翻案风的斗争取得伟大胜利的时候，中华人民共和国文化部、北京市革命委员会联合举行“首都工农兵反击右倾翻案风、歌颂无产阶级文化大革命歌咏大会”。全国各地城乡也纷纷开展各种形式的群众性歌咏活动，热情歌颂无产阶级文化大革命的伟大胜利，歌颂反击右倾翻案风斗争的伟大胜利，歌颂毛主席的革命路线的伟大胜利。广大工农兵群众在歌咏活动中表达了誓把批判邓小平、反击右倾翻案风的伟大斗争进行到底，为巩固和发展文化大革命胜利成果而奋勇战斗的坚强决心。　　“首都工农兵反击右倾翻案风、歌颂无产阶级文化大革命歌咏大会”演唱的新作品，是文化部向全国各地征集的。经过广泛征求工农兵意见，开门评选，又根据工农兵意见作了修改。现在，从大会演唱的歌曲中选出第一批优秀歌曲共六首，供广大工农兵群众和青年、少年儿童演唱。——编者（附歌曲）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc07729c0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
