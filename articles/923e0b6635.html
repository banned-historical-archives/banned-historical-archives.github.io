温宪"],"dates":[{"year":1993,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"非国大呼吁不要进行种族报复"},{"type":"paragraph","text":"南非一极右组织承认凶犯为其成员"},{"type":"paragraph","text":"本报哈拉雷４月１３日电记者温宪报道：南非非国大比勒陀利亚、沃特斯特兰德和瓦尔地区主席塞克斯瓦利今天上午在一群众集会上强烈呼吁非国大的支持者不要对南非白人施行种族报复。非国大比—沃—瓦地区组织是非国大最大的地区组织。"},{"type":"paragraph","text":"塞克斯瓦利是在约翰内斯堡东部郊外举行的群众大会上发出这一呼吁的。被指控杀害南非共产党总书记哈尼的凶手沃卢斯今天上午开始在这一地区法院出庭受审。"},{"type":"paragraph","text":"南非开普敦、约翰内斯堡和比勒陀利亚等地附近黑人城镇１２日发生了一系列示威集会、向白人和警察开枪、扔石头和汽油弹、烧汽车等事件。在约翰内斯堡东部一个黑人城镇，大约２００名愤怒的黑人放火烧毁了一个警察的住宅。大约３０００名黑人在哈尼遇害的地点举行了大规模示威游行。南非警察在各地动用了催泪弹和橡皮子弹以驱散愤怒的人群。"},{"type":"paragraph","text":"为了表示对哈尼的悼念，非国大宣布１４日为全国哀悼日，但提醒其支持者不要参与暴力冲突。"},{"type":"paragraph","text":"极右的南非白人组织“阿非利加人抵抗运动”领导人特莱布朗齐在１２日晚间的电视新闻节目中承认杀害哈尼的沃卢斯于１９８６年参加了该组织，但他否认他所领导的这一白人极右组织参与策划了暗杀事件。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"923e0b6635"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
