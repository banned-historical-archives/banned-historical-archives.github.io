恭副主席赞扬中越人民友谊","authors":[],"dates":[{"year":1968,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"庆祝我国庆　祝贺我文化大革命的胜利"},{"type":"paragraph","text":"南越民族解放阵线集会"},{"type":"paragraph","text":"阮友寿主席出席  冯文恭副主席赞扬中越人民友谊"},{"type":"paragraph","text":"新华社河内三日电　据越南南方解放通讯社报道：越南南方民族解放阵线中央委员会九月三十日在越南南方解放区举行集会，庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"越南南方民族解放阵线中央委员会主席团主席阮友寿，副主席冯文恭、黄晋发以及各党派和群众团体的负责人出席了集会。"},{"type":"paragraph","text":"出席集会的还有各根据地人民代表，人民解放武装力量有功单位代表，越南南方民族解放阵线中央各机关的干部和职工代表。"},{"type":"paragraph","text":"冯文恭在集会上发表了讲话。"},{"type":"paragraph","text":"冯文恭回顾了中国人民在中国共产党和敬爱的毛主席的领导下，取得全国胜利后，在社会主义建设中取得的极其巨大的成就。"},{"type":"paragraph","text":"他热情赞扬了中国人民和越南南方人民之间骨肉兄弟般的战斗情谊和中国人民对越南人民、特别是对越南南方人民的抗美救国事业的诚挚帮助。他说，越中两国是唇齿相依、休戚与共的邻邦，中国人民在精神上和物质上给予了越南南方人民极其巨大和强有力的支持。越南南方人民永远铭记敬爱的毛主席的具有强烈鼓舞力量的话：“七亿中国人民是越南人民的坚强后盾，辽阔的中国领土是越南人民的可靠后方。”"},{"type":"paragraph","text":"最后，冯文恭对毛主席和中国共产党、中国政府给予越南全民族抗美救国事业的充满兄弟般情谊的支持和帮助表示感谢，并且真诚地祝贺中国人民在无产阶级文化大革命和社会主义建设中取得日益巨大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dac66ed949"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
