ear":1964,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社仰光23日电　毛泽东主席的著名哲学著作《矛盾论》的缅甸文译本已由这里的温瑙乌出版社出版。"},{"type":"paragraph","text":"这家出版社还出版了毛泽东主席的著作《新民主主义论》的缅甸文译本。"},{"type":"paragraph","text":"新华社北京23日电　雅典消息:最近，希腊“历史出版社”用希腊文翻译出版了《中国革命和中国共产党》、《新民主主义论》、《论人民民主专政》三本毛泽东同志著作。《论人民民主专政》一书包括毛泽东同志的三篇文章:《论人民民主专政》、《在新政治协商会议筹备会上的讲话》和《在中国人民政治协商会议第一届全体会议上的开幕词》。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dec1ae6e8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
