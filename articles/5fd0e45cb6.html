art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠批中国赫鲁晓夫坚决走大寨道路驻梅家庄大队支农人员帮助贫下中农以毛泽东思想为武器，开展革命大批判，有力地推动了革命和生产","authors":["挺进"],"parts":[{"type":"paragraph","text":"本报讯 在河北定县梅家庄大队支农的4891部队毛泽东思想宣传队，帮助广大贫下中农以毛泽东思想为武器，狠批中国赫鲁晓夫在农村推行的反革命修正主义路线，使贫下中农提高了无产阶级觉悟和对两条路线斗争的觉悟，有力地推动了革命和生产。"},{"type":"paragraph","text":"革命大批判一开始，宣传队的同志就引导大家开展忆苦思甜活动，进一步激发起对中国赫鲁晓夫的刻骨仇恨，提高大家参加革命大批判的自觉性和积极性。梅家庄大队的一百三十户贫下中农，解放前，深受地主的压迫剥削，三十多户要过饭，七十二户卖过儿女。后来，毛主席派来了子弟兵，在梅家庄建立了党支部。贫下中农在党支部领导下，运用地道战、地雷战，坚持敌后斗争，打败了敌人，斗倒了地主，实行了土地改革，才过上了幸福的生活。许多社员和革命干部想起旧社会的苦，更加痛恨中国赫鲁晓夫和他在农村推行的反革命修正主义路线。一九三八年入党的老党员何德增说：“咱们这个大队的每一寸土地，都是用鲜血换来的。咱可不能按着中国赫鲁晓夫的黑道走，一定要跟着毛主席走社会主义的光明大道。”老贫农帅栓子说：“中国赫鲁晓夫搞什么‘三自一包’、‘四大自由’，纯粹是要把咱们贫下中农往火坑里推。”大家愤怒地表示：一定要把中国赫鲁晓夫在农村推行的反革命修正主义路线批倒批臭，彻底肃清它的流毒。"},{"type":"paragraph","text":"接着，宣传队的同志积贫下中农一起狠批了中国赫鲁晓夫疯狂反对毛主席亲自树立起的大寨这面红旗的罪行。原大队党支部书记、现在的生产班子领导人赵兵山说：“中国赫鲁晓夫派出黑工作组，胡说大寨贫下中农‘弄虚作假’，是‘黑模范’，梦想砍掉大寨这面红旗，真是罪大恶极。大寨人对毛主席心怀一个‘忠’字，对毛泽东思想狠抓一个‘用’字。我们就是要学习大寨精神，永远忠于毛主席，永远突出无产阶级政治，坚定地走自力更生、艰苦奋斗的道路。”"},{"type":"paragraph","text":"通过深入的革命大批判，广大贫下中农和革命干部的无产阶级觉悟和对两条路线斗争的觉悟大大提高，革命、生产热气腾腾，各项工作都走在前面。前些日子，在华北地区抓革命、促生产的会议上，介绍了他们的经验。（挺进）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fd0e45cb6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
