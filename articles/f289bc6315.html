thors":["沈谷容","蒋铎"],"dates":[{"year":1967,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沿着毛主席的革命航道奋勇前进"},{"type":"paragraph","text":"——武汉地区无产阶级文化大革命节节胜利"},{"type":"paragraph","text":"毛主席为我们撑腰　我们要为毛主席争气"},{"type":"paragraph","text":"武汉地区无产阶级革命派、革命群众和人民解放军广大指战员，正在认真地学习中共中央、国务院、中央军委、中央文化革命小组的一封信，决心不折不扣地贯彻执行毛主席和党中央的指示，把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"天大地大不如党的恩情大　爹亲娘亲不如毛主席亲"},{"type":"paragraph","text":"武汉地区无产阶级革命派、革命群众和人民解放军广大指战员，对伟大领袖毛主席无限热爱、无限信仰、无限崇拜、无限忠诚，决心在毛主席开辟的革命航道上乘风破浪，奋勇前进！"},{"type":"paragraph","text":"老鼠过街　人人喊打"},{"type":"paragraph","text":"武汉地区无产阶级革命派、革命群众和人民解放军广大指战员，愤怒声讨中国的赫鲁晓夫及其在武汉地区的代理人反党、反社会主义、反毛泽东思想的滔天罪行。党内、军内一小撮走资本主义道路当权派已经成为人人喊打的过街老鼠。革命的大批判运动正在武汉地区胜利发展。"},{"type":"paragraph","text":"军民团结如一人　试看天下谁能敌"},{"type":"paragraph","text":"武汉地区的革命群众和人民解放军广大指战员，热烈响应毛主席“拥军爱民”的伟大号召，决心团结在一起，战斗在一起，坚决把中国的赫鲁晓夫和武汉地区党内、军内一小撮走资本主义道路当权派斗倒、斗垮、斗臭。"},{"type":"paragraph","text":"抓革命　促生产"},{"type":"paragraph","text":"武汉地区无产阶级革命派和广大革命群众，坚决贯彻毛主席“抓革命，促生产”的伟大指示，坚守生产岗位，以自己的实际行动粉碎垂死挣扎的党内、军内一小撮走资本主义道路当权派破坏生产的阴谋。"},{"type":"paragraph","text":"受蒙蔽无罪　反戈一击有功"},{"type":"paragraph","text":"在毛主席无产阶级革命路线的光辉照耀下，武汉地区“百万雄师”中受蒙蔽的群众，纷纷觉醒，起来造反。“百万雄师”正在土崩瓦解。这是受蒙蔽的群众、干部和无产阶级革命派的同志一起座谈，控诉中国的赫鲁晓夫及其在武汉地区的代理人和“百万雄师”中一小撮坏头头的罪行。"},{"type":"paragraph","text":"（本版图片为本报记者蒋铎、沈谷容摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f289bc6315"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
