ar":1959,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席　周总理电贺苏丹独立日"},{"type":"paragraph","text":"新华社31日讯　毛泽东主席29日致电苏丹共和国武装部队最高委员会主席易卜拉欣·阿布德将军，祝贺苏丹共和国国家独立纪念日。电文如下：喀土穆苏丹共和国武装部队最高委员会主席易卜拉欣·阿布德将军阁下："},{"type":"paragraph","text":"欣逢苏丹共和国国家独立纪念日，我谨代表国家和全体中国人民，并且以我个人的名义向阁下和苏丹人民表示热烈的祝贺。祝苏丹国家繁荣，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东　1958年12月29日"},{"type":"paragraph","text":"新华社31日讯　周恩来总理29日致电苏丹共和国武装部队最高委员会主席易卜拉欣·阿布德将军，祝贺苏丹共和国国家独立纪念日。电文如下：喀土穆苏丹共和国武装部队最高委员会主席易卜拉欣·阿布德将军阁下："},{"type":"paragraph","text":"值此苏丹共和国国家独立纪念日之际，我谨代表中华人民共和国政府，并且以我个人的名义向贵国政府和阁下致以热诚的祝贺。祝苏丹政府和人民在维护民族独立的事业中获得成就，祝中国和苏丹之间的友好关系日益发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来　1958年12月29日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dee5126740"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
