art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"敢于“对着干”的党委书记","authors":[],"parts":[{"type":"paragraph","text":"去年秋天，广西壮族自治区宁明华侨农场党委临近改选的时候，刮来了一股风，说什么青年干部提拔得太快了，要把三结合中的青年干部放下去。党委书记翁伯生听到这些说法就寻思：领导班子实行老、中、青三结合，这是毛主席倡导的，是无产阶级文化大革命中涌现出来的社会主义新生事物，现在的这种说法、这样干法，岂不是拆三结合的台吗？！毛主席历来教育我们一定要从上到下地、普遍地、经常不断地注意培养和造就革命事业的接班人。现在刮来的一股风竟然打击青年干部，同毛主席的教导相对抗，这不是有问题吗！"},{"type":"paragraph","text":"青年工人芦潮柱在三大革命运动中积极向前，处处自觉地以毛主席提出的无产阶级革命事业接班人五条标准要求自己，在群众中很有威信。可是有人却说他不能团结同志，作风太生硬。经过调查研究，翁伯生了解到这个青年工人由于敢抓阶级斗争，遇到歪风邪气敢斗，碰到资本主义倾向敢批，特别是芦潮柱发现有的干部利用职权谋私利，便抓住典型事例提到阶级斗争的高度进行批判。翁伯生指出：抓阶级斗争不讲私情，这不能算作风生硬；受到批判的一些干部有意见，也不能算不能团结同志。经过翁伯生的说服，大家同意把芦潮柱提到领导岗位上来，当选为农场党委常委，并担任了农场革委会副主任。"},{"type":"paragraph","text":"由于翁伯生认真执行毛主席的革命路线，满腔热情地支持老、中、青三结合，认真培养和使用青年干部，就在党内最大的不肯改悔的走资派邓小平攻击青年干部的时候，华侨农场十九个党委成员中，选上了九个青年干部和工人；七个常委中，青年干部和工人占到了四名。十四个基层单位党支部都增补了一部分青年领导成员。他们以实际行动同右倾翻案风对着干。"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2566a689b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
