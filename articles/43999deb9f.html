<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西北区高等学校教职员对三反运动和统战政策存在不少错误的看法","authors":[],"dates":[{"year":1952,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"西北区高等学校教职员对三反运动和统战政策存在不少错误的看法","type":"title"},{"text":"【西北总分社十六日讯】“三反”运动展开后，西北区高等学校教职员思想中普遍存在一些不正确的看法。有人认为“我不沾钱”，三反运动与我无关。有人怀疑：“三反”运动能搞得彻底么？认为在私有制度未取消前是不可能的，并把“三反”运动和思想改造看成两回事，提出不要因为搞“三反”把思想改造学习打乱了。还有人认为：“共产党员老干部也贪污了，还不是天下乌鸦一般黑，我自己并没有参加革命，但没贪污过，还不错”。","type":"paragraph"},{"text":"教职员对于资产阶级猖狂进攻也存在不少错误的认识：","type":"paragraph"},{"text":"(1)资产阶级不可能进攻，因为它既无政党又无军队，贪污腐化主要是无产阶级自己堕落，说要由资产阶级负责是不公道的。“物必自腐而后虫生”，老干部贪污，为什么说是资产阶级进攻?资产阶级顶多说是“腐蚀”，而不是进攻。报纸掌握在共产党手里，资产阶级有委屈也不能申诉。","type":"paragraph"},{"text":"(2)资产阶级进攻仅在经济上取得利益，与政治上无关。商人就是牟利的，何况现在的经济政策还是“公私兼顾，劳资两利”呢！国民党统治也有贪污，那不是资产阶级自己进攻自己吗？","type":"paragraph"},{"text":"(3)打老虎的手段太激烈了，是否可以采取温和一点的办法。","type":"paragraph"},{"text":"(4)“贪污腐化，拉拢干部”无所谓对与不对，站在无产阶级立场上是资产阶级不对，相反的，无产阶级就不对了，如站在中间立场，则两边都有错误。","type":"paragraph"},{"text":"(5)“存在决定意识”，有资产阶级存在，就有资产阶级意识，既然资产阶级可以腐蚀无产阶级，那么无产阶级不是也腐蚀资产阶级吗?","type":"paragraph"},{"text":"这些教职员对于我党的统战政策也有很多不正确的看法：他们认为共产党的统战政策是用得着的时候就“统”，不用的时候就“战”。他们说：既然说奸商等于特务，资产阶级是敌人，干脆不要统一战线还好。土地改革是反封建，抗美援朝是反帝，镇反是反特，“三反”是反资产阶级，前年让工商界买胜利公债，去年捐献，今年就要“整”，还不如把资本全部缴出好了。","type":"paragraph"}],"comments":[],"origin":"1952年2月20日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43999deb9f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
