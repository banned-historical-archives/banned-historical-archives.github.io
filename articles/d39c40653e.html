":[],"dates":[{"year":1971,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳大利亚一万多工人罢工"},{"type":"paragraph","text":"维多利亚州电力工人罢工反对垄断资本剥削"},{"type":"paragraph","text":"新华社墨尔本三日电　澳大利亚悉尼的一万名自来水管理局工人从一日开始举行罢工，要求增加工资。他们在二日决定，罢工将持续到八日。"},{"type":"paragraph","text":"二日，正在罢工的将近五百名德莱德建筑工人冲进南澳大利亚制造商协会的办公处，在二层楼上的会议厅举行了集会，抗议资本家无理扣除工人假日的工资。"},{"type":"paragraph","text":"据新华社墨尔本电　澳大利亚维多利亚州的一批电力工人为反对垄断资本的剥削，最近举行了罢工。这次罢工使五千三百多家工厂因缺电而一度停止生产。悉尼市的公共汽车工人在最近也举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d39c40653e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
