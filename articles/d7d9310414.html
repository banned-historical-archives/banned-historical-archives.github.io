torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"关于筹款的训令","alias":"","parts":[{"type":"paragraph","text":"关于筹款的训令川"},{"type":"paragraph","text":"（1936年8月18日）"},{"type":"paragraph","text":"根据最近中央对于土地政策的新决定，对于地主，只要他不反对抗日红军，应避免用没收办法，而以捐募的方法使其尽量拿出金钱、粮食和物品，宁可少没收一家，不可错没收一家。在筹款中，必须注意经济政策，没收地主的商店固然不对，没收一般的商店尤不容许。在苏维埃法律范围内，给商人以适当的保护。在不损害商业的条件下，向富商作深入的救国宣传，进行募捐运动，筹得抗日经费。"},{"type":"paragraph","text":"[1]这是西北革命军事委员会主席毛泽东和副主席周恩来、彭德怀，政治部主任杨尚昆，中央财政部长林伯渠联名发布的关于筹款的训令。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":77,"page_end":77},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7d9310414"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
