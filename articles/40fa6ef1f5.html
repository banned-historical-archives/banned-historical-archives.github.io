ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对王曼恬要求免掉文化部工作来信的批语","alias":"","parts":[{"type":"paragraph","text":"对王曼恬要求免掉文化部工作"},{"type":"paragraph","text":"来信的批语"},{"type":"paragraph","text":"（1975年11月18日）请注酌处。我看可以同意她回天津。"},{"type":"paragraph","text":"十一月十八日"},{"type":"paragraph","text":"[1]王曼恬，毛泽东的表侄女。当时任文化部党的核心小组成员、天津市革委会副主任。1975年11月16日，她给毛泽东写信说：“全国正在进行组织整顿，我有一个要求，希望在这次整顿中，免掉文化部的工作，而集中精力在天津，深入基层做点工作。”“我目前的情况，太特殊了，一个地方干部，又兼文化部部分工作，别的部找不到这样的例子。作为您的亲戚，深感影响不好。加上我的马列主义、毛泽东思想水平很低，专业水平很低，非常不适应文化部的工作。”“我已六十二岁，能力很差，两头跑，既做不好工作，也有点吃不消，集中精力在天津，可能为党还能做点工作。”"},{"type":"paragraph","text":"[2]汪，指汪东兴，当时任中共中央政治局委员、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":101,"page_end":101},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40fa6ef1f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
