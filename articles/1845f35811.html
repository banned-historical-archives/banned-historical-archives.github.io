" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"辽阔中原唱凯歌──热烈欢呼河南省革命委员会成立","authors":["《人民日报》","《解放军报》编辑部"],"dates":[{"year":1968,"month":1,"day":30}],"is_range_date":false,"parts":[{"text":"辽阔中原唱凯歌──热烈欢呼河南省革命委员会成立","type":"title"},{"text":"《人民日报》《解放军报》编辑部","type":"authors"},{"text":"辽阔的中原大地传来了振奋人心的凯歌。在迎接无产阶级文化大革命全面胜利的热潮中，河南省革命委员会光荣诞生了。这是毛主席无产阶级革命路线的又一个伟大胜利，这是落实毛主席最新指示的丰硕成果。","type":"paragraph"},{"text":"我们怀着无限喜悦的心情，向河南的广大无产阶级革命派和具有光荣革命传统的河南省五千万人民，向人民解放军驻河南部队广大指战员，致以最热烈的祝贺和最崇高的敬意。","type":"paragraph"},{"text":"“大海航行靠舵手，干革命靠毛泽东思想。”无产阶级文化大革命以来，河南省发生的翻天覆地的变化，再一次证明了这一真理。中国赫鲁晓夫和反革命两面派陶铸在河南地区的代理人文敏生、赵文甫之流，曾经顽固地推行一条与毛主席无产阶级革命路线相对抗的资产阶级反动路线，疯狂地进行资本主义复辟活动。面对着中国赫鲁晓夫资产阶级反动路线的白色恐怖，河南省无产阶级革命派和广大革命群众，坚信毛泽东思想的灿烂阳光一定会照彻中原大地。他们在最困难的时候，始终活学活用毛主席著作，迅速传播毛主席的声音，紧跟毛主席的伟大战略部署。正是伟大的战无不胜的毛泽东思想，在每一个关键时刻给他们指明了前进的航向，鼓舞着他们顶黑风，战恶浪，和阶级敌人进行艰苦卓绝的斗争，在全省范围内获得了一个又一个的胜利。","type":"paragraph"},{"text":"“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好。”毛主席的这一伟大教导，在河南地区得到了光辉的体现。中国赫鲁晓夫及其在河南地区的代理人，在干部问题上，长期以来，就实行一条“打击一大片，保护一小撮”的资产阶级反动路线，在无产阶级文化大革命中，他们为了保护党内一小撮走资派，更是变本加厉地打击和迫害坚持毛主席无产阶级革命路线的革命的领导干部。河南省的无产阶级革命派，在自己的斗争实践中深深地懂得：革命干部是我们党的宝贵财富，保护革命领导干部，也就是保卫毛主席的革命路线。因此，在对待干部问题上，广大无产阶级革命派始终立场坚定、爱憎分明。对党内一小撮走资本主义道路当权派，毫不留情地揭露他们，批判他们，夺他们的权，革他们的命；对真正好的革命领导干部，热情地帮助他们改正错误，坚决支持他们站出来革命。河南省大批革命领导干部所以能够站出来，是和全省的无产阶级革命派正确地执行毛主席的干部政策分不开的。因此，对党内一小撮走资派敢不敢革命，对真正的革命领导干部敢不敢支持，是一个革命群众组织有没有无产阶级的立场、感情和风格的重要标志之一。","type":"paragraph"},{"text":"人民解放军驻河南部队广大指战员，忠于毛主席，忠于毛泽东思想，忠于毛主席的无产阶级革命路线。毛主席怎么说，他们就怎么做。毛主席指到哪里，他们就打到哪里。他们遵循毛主席的教导，立场坚定，旗帜鲜明，在关键时刻挺身而出，大力支持左派广大革命群众。他们和无产阶级革命派团结在一起，战斗在一起，胜利在一起。他们为推动河南省无产阶级文化大革命的胜利发展建立了很大的功绩。","type":"paragraph"},{"text":"目前，河南省无产阶级文化大革命的形势正如毛主席指出的那样，“比以往任何时候都好”。整个河南省，各条战线都呈现了令人鼓舞的新气象。我们希望河南省的革命委员会，河南省的无产阶级革命派和广大革命群众，以毛主席的最新指示为纲，切实办好毛泽东思想学习班，斗私批修，反对资产阶级、小资产阶级派性，增强无产阶级党性，进一步巩固和发展革命的大联合和三结合，特别要大力促进按系统、按行业、按班级的革命大联合，抓革命，促生产，促工作，促战备，为从思想上、政治上、经济上、组织上夺取无产阶级文化大革命的全面胜利而奋斗。","type":"paragraph"},{"text":"我们相信，河南省革命委员会成立以后，河南的无产阶级文化大革命和工农业生产必将搞得更好、更好！毛泽东思想的伟大红旗必将举得更高、更高！","type":"paragraph"},{"text":" （载《人民日报》、《解放军报》一九六八年一月三十日，社论）","type":"paragraph"}],"comments":[],"origin":"载《人民日报》、《解放军报》一九六八年一月三十日，社论","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1845f35811"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
