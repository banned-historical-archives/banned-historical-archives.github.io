hors":["陈云"],"dates":[{"year":1980,"month":2}],"is_range_date":false,"parts":[{"text":"陈云谈免除汪东兴纪登奎陈锡联吴德四人职务","type":"title"},{"text":"陈云","type":"authors"},{"text":"〖地点：人民大会堂。陈云在中央政治局会议上的讲话摘要〗","type":"appellation"},{"text":"当前，思想僵化，林彪、“四人帮”的极左倾向依然在我们一些同志的思想中作怪。反对十一届三中全会以来党的路线、方针和政策，甚至背后串通，两面三刀，制造混乱，比如汪东兴、纪登奎、陈锡联、吴德四位同志，就是这样的人，党内外群众和干部检举、控诉他们问题的信件，雪片似地寄到中纪委……","type":"paragraph"},{"text":"这四位同志继续留在中央政治局，对党的形象极为不利。我们还是建议政治局会议能够免去汪东兴党的副主席、政治局常委、政治局委员、军委常委、中央党校第一副校长职务；免去纪登奎、陈锡联二人的政治局委员职务，免去吴德的政治局委员、全国人大常委会中共党组副书记职务；同时遵照宪法规定的程序，提请全国人大或全国人大常委会予以免除纪登奎、陈锡联担任的国务院副总理职务，吴德担任的全国人大常委会副委员长职务。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"陈云","type":"人物"},{"name":"陈锡联","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cca93625ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
