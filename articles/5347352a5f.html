],"dates":[{"year":1974,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年十月二十六日电　军委副主席叶剑英今天下午会见了由团长、南斯拉夫人民军副总参谋长布·约克索维奇中将和副团长斯·伊利奇少将率领的南斯拉夫人民军代表团全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见的代表团团员有:博·马尔巴西奇上校、沃·克列阿契奇上校、阿·里斯蒂奇上校、兹·科斯蒂奇上校。南斯拉夫驻中国大使德鲁洛维奇参加了会见。"},{"type":"paragraph","text":"参加会见的有:中国人民解放军副总参谋长李达，中国人民解放军和外交部的有关方面负责人和工作人员何正文、詹海英、孔照年、张积慧、王振祥、甘迈、刘锦琳、于志超、李文祥、孙维学、王光明等。"},{"type":"paragraph","text":"中国驻南斯拉夫大使张海峰参加了会见。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5347352a5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
