河"],"dates":[{"year":1957,"month":5,"day":20}],"is_range_date":false,"parts":[{"text":"峨眉诗草","type":"title"},{"text":"四川石天河","type":"authors"},{"text":"（石天河：《星星》诗刊主编）","type":"subtitle"},{"text":"迟开的报春花","type":"subtitle"},{"text":"五月的峨眉山","type":"paragraph"},{"text":"杜鹃一声啼一口血","type":"paragraph"},{"text":"路边的报春花","type":"paragraph"},{"text":"你开迟了呀","type":"paragraph"},{"text":"不，陌生的旅客","type":"paragraph"},{"text":"春风只从山脚下吹过","type":"paragraph"},{"text":"山顶还有严寒的积雪","type":"paragraph"},{"text":"我开，还是花时节","type":"paragraph"},{"text":"不，陌生的旅客","type":"paragraph"},{"text":"金黄的麦子要收割了","type":"paragraph"},{"text":"链刀在田里打呼哨","type":"paragraph"},{"text":"路边的报春花","type":"paragraph"},{"text":"你开迟了呀","type":"paragraph"},{"text":"唉，陌生的旅客","type":"paragraph"},{"text":"我住在这阳光照不到的山侧","type":"paragraph"},{"text":"白茫茫的雨雾把一切都遮没","type":"paragraph"},{"text":"请告诉我，这是什么时节","type":"paragraph"},{"text":"唉，陌生的旅客……","type":"paragraph"},{"text":"庙里的木鱼","type":"subtitle"},{"text":"弥陀笑了","type":"paragraph"},{"text":"金的袈裟闪着光","type":"paragraph"},{"text":"观音笑了","type":"paragraph"},{"text":"青的莲花在脚下生长","type":"paragraph"},{"text":"木鱼呵","type":"paragraph"},{"text":"只有你","type":"paragraph"},{"text":"沉默在这样美好的季节里","type":"paragraph"},{"text":"沉默在这样美好的峨眉山里","type":"paragraph"},{"text":"沉默","type":"paragraph"},{"text":"沉默是我的美德","type":"paragraph"},{"text":"听人们念经念咒","type":"paragraph"},{"text":"听人们忏悔他自己","type":"paragraph"},{"text":"我没有什么悲哀","type":"paragraph"},{"text":"也没有什么欢喜","type":"paragraph"},{"text":"护法的金刚","type":"paragraph"},{"text":"眼睛里正冒着火光","type":"paragraph"},{"text":"降妖的韦…","type":"paragraph"},{"text":"时刻在准备打仗","type":"paragraph"},{"text":"木鱼呵","type":"paragraph"},{"text":"只有你","type":"paragraph"},{"text":"沉默在这样美好的季节里","type":"paragraph"},{"text":"沉默在这样美好的峨眉山里","type":"paragraph"},{"text":"沉默","type":"paragraph"},{"text":"沉默是我的美德","type":"paragraph"},{"text":"任人们敲敲打打","type":"paragraph"},{"text":"看人们磕头行礼","type":"paragraph"},{"text":"我没有什么悲哀","type":"paragraph"},{"text":"也没有什么欢喜","type":"paragraph"},{"text":"洪椿古树","type":"subtitle"},{"text":"听说你活过三千年","type":"paragraph"},{"text":"真算得名山的老资格","type":"paragraph"},{"text":"可是你干枯的枝干","type":"paragraph"},{"text":"既不开花，也不长叶","type":"paragraph"},{"text":"你腐朽的根子","type":"paragraph"},{"text":"早作了蝼蚁寄生的巢穴","type":"paragraph"},{"text":"唉，即使每天都是和风细雨","type":"paragraph"},{"text":"我怕你也活不了多少年月","type":"paragraph"},{"text":"古树呵，什么时候","type":"paragraph"},{"text":"我能再看见你的一线生机","type":"paragraph"},{"text":"哪怕是一条柔弱的新枝","type":"paragraph"},{"text":"哪怕是一片纤细的嫩叶","type":"paragraph"},{"text":" 1957年5月20日    峨眉山","type":"paragraph"},{"text":" 来源：《四川省右派言论选辑9》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年8月26日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7b24a7a33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
