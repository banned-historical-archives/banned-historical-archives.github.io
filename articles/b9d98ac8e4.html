威  严厉谴责宫本修正主义集团和工贼镇压工人斗争的罪行","authors":[],"dates":[{"year":1969,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"决心为粉碎日美“安全条约”体系和争取收复冲绳而斗争"},{"type":"paragraph","text":"日本三千青年工人高举红旗集会示威"},{"type":"paragraph","text":"严厉谴责宫本修正主义集团和工贼镇压工人斗争的罪行"},{"type":"paragraph","text":"据新华社十六日讯据东方通讯社报道：东京及其附近的神奈川、千叶、埼玉县的青年工人约三千人，十五日下午在东京的明治公园举行群众大会，表示决心为粉碎日美“安全条约”体系和争取收复冲绳而斗争。"},{"type":"paragraph","text":"许多青年工人的代表在会上讲了话，他们强烈谴责日本首相佐藤荣作将在十一月访美，同美帝头子尼克松策划“归还冲绳”的骗局以便重新安排和加强日美“安全条约”体系的阴谋。他们指出，佐藤对华盛顿的访问，是要帮助走投无路的美帝国主义，同时也是日本对亚洲加紧进行侵略的重要步骤。他们一致决心进行坚决斗争，阻止佐藤访美。"},{"type":"paragraph","text":"青年工人的代表还严厉谴责宫本修正主义集团和其他工贼竭力推行改良主义和经济主义的路线，并且镇压战斗的工人的罪行。工人代表表示将坚持斗争，打破这些工贼对一些工会的控制。"},{"type":"paragraph","text":"会上通过的宣言，表示决心进一步加强工人、农民和学生的团结，进一步开展斗争，把粉碎日美“安全条约”体系的斗争进行到底。"},{"type":"paragraph","text":"会后，全体与会者头戴帽盔，高举许多面红旗，举行了示威游行，示威者同前来镇压他们的武装警察进行了英勇斗争，坚持在东京的大街上游行了六公里。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9d98ac8e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
