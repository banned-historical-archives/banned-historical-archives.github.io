script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"左倾错误障碍生产　高邑订出解决办法","authors":["增亮　文彦"],"dates":[{"year":1948,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"左倾错误障碍生产"},{"type":"paragraph","text":"高邑订出解决办法"},{"type":"paragraph","text":"【高邑消息】高邑于四月二十三日召开全县生产干部会议，检查十天的下种工作。五十三个村统计，下种棉花、高粱、豆子、玉茭、山药等共达四万多亩。有些村庄结合下种整顿了互助，并按组订计划，完成得很快；但只是少数村。就全县说来，这一段生产工作仍是自流的。原因是区干部普遍存在着不敢大胆干，怕犯错误的想法。比如，石良庄去年封了八户中农门子，上次会议决定要立即启封，公开承认错误，但现在还有三户未启。该村工作同志谈，自己没经过整编，闹不清到底这三户该算啥成份。现在给他们启了封，以后划阶级如划成富农，自己不走了富农路线吗？其次是参加生产的同志，对有些具体问题，思想也肯定不起来。如对老基础问题、错斗中农问题、地富问题，以及未经过工作队成立的贫雇小组等问题，思想上都弄不清，不敢大胆解决，生产也就很难领导。"},{"type":"paragraph","text":"这次检查下种会议上，一直研究了四天，最后肯定了以下几点：（一）对老基础问题，分析认识其历史与优点缺点、与群众的关系。不能片面认为都坏了，一般应采取教育与改造方针。对特别坏的干部，必要时可撤职调换；如系群众特别仇恨的，可采用大会承认错误，然后撤职的办法。但必须注意不要闹成普遍的换干部。（二）对斗错的中农（包括富裕中农）要坚决补偿，或召开大会，让多占果实的干部或多分果实的群众，借出一部给错斗中农。封中农门的要立即启封，对中农利益绝对不能侵犯。（三）地主富农问题，要让地主富农生活下去，给其一定的生产资料。在民主自愿原则下，地富分子可参加互助组。停止地富给群众无代价的劳动，取消地富记号；但取消方法要慎重，通过群众，使群众了解取消对群众的好处，让地富懂得这是让好好生产，改造自己。（四）贫农团的取消问题。没经工作团成立的贫农团或贫农小组，大部是操纵在坏干部手中的；但也有些是代表群众的。好的可参加领导生产，坏的要在群众面前揭露他们的错误，通过群众来取消。（增亮、文彦）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea25e39cf4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
