script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本残酷剥削  要求增加工资改善劳动条件  美国许多行业工人掀起新的斗争  建筑工人和航空驾驶员的罢工斗争沉重打击了垄断资本","authors":[],"dates":[{"year":1972,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削  要求增加工资改善劳动条件"},{"type":"paragraph","text":"美国许多行业工人掀起新的斗争"},{"type":"paragraph","text":"建筑工人和航空驾驶员的罢工斗争沉重打击了垄断资本"},{"type":"paragraph","text":"新华社一九七二年七月三日讯　纽约消息：美国纽约市的六万多名建筑工人七月一日举行罢工，反对垄断资本的残酷剥削。"},{"type":"paragraph","text":"属于十二个地方工会的工人参加了这次罢工斗争。罢工将使价值二十亿美元的建筑工程停工，沉重地打击建筑业的垄断资本。"},{"type":"paragraph","text":"据新华社一九七二年七月一日讯　华盛顿消息：美国西北航空公司的一千六百名驾驶员不顾当局的阻挠在六月三十日举行罢工，要求增加工资和改善工作条件。"},{"type":"paragraph","text":"早在十五个月之前，西北航空公司的驾驶员就提出了增加工资和养老金、改善工作条件等项要求，但是，贪得无厌的垄断资本家却一直顽固拒绝接受这些合理要求。在六月二十九日驾驶员投票决定举行罢工后，美国劳工部长霍奇森急忙出面进行干涉，无理要求把罢工推迟十天，要劳资双方在此期间进行谈判。驾驶员根本不理这一所谓“呼吁”，于六月三十日凌晨两点钟开展了罢工斗争，并且立即在明尼阿波利斯—圣保罗国际机场等机场设置了纠察线。"},{"type":"paragraph","text":"今年以来，美国国内通货膨胀继续恶性发展，物价持续上涨，工人的实际工资不断下降。为了维护自己的切身利益，许多行业的工人不断掀起了新的斗争。伊利诺斯州的三万名木工、明尼苏达州的一万名建筑工人、纽约市的二万五千名医院工人、底特律克莱斯勒汽车公司的三千名工人和诺伍德通用汽车公司的四千名工人都在最近举行了反对垄断资本残酷剥削的罢工斗争。六月五日，西弗吉尼亚州洛根县的八百名煤矿工人举行罢工，抗议皮茨顿煤矿公司无视工人的疾苦。到六月中旬，这次罢工已扩大到二十七个矿井，三千名矿工投入了斗争，每天少生产煤一万五千吨，沉重地打击了煤矿垄断资本。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"232b486698"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
