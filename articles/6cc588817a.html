<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝中友协代表团在平壤作访华报告中国人民高举三面红旗成就辉煌在反对国内外敌人斗争中获巨大胜利　帝国主义和现代修正主义相互勾结进行反华活动必遭可耻失败","authors":[],"dates":[{"year":1963,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤18日电】　最近应邀访问中国并在中国参加了朝鲜民主主义人民共和国成立十五周年庆祝活动的朝中友好协会代表团，今天晚上在平壤文化会馆举行了归国报告会。"},{"type":"paragraph","text":"朝中友好协会代表团团长、朝鲜内阁第三事务局局长韩秀东在会上作了访华报告。他详细地谈到了代表团在中国访问期间亲眼看到的伟大的中国人民在中国共产党和毛泽东同志的领导下，高举总路线、大跃进、人民公社三面红旗，在社会主义革命和社会主义建设中取得的辉煌成就，特别是依靠自己的力量勇敢地克服了前进道路上的暂时性困难，使国民经济全面好转的事实。"},{"type":"paragraph","text":"他强调说，中国人民在反对国内外敌人的复杂的斗争环境中取得的巨大成就，显示出中国共产党是战无不胜的马克思列宁主义政党，它在任何狂风暴雨和考验中都一贯受到全体中国人民的绝对的支持和信赖。"},{"type":"paragraph","text":"他指出，中华人民共和国始终一贯地坚决奉行马克思列宁主义的对外政策，她的国际威望日益提高。他强烈地谴责了帝国主义者和现代修正主义者相互勾结，歪曲中国的马克思列宁主义的对外政策，进行中伤和诽谤中国的反华活动。他说，反对和企图孤立社会主义中国的任何阴谋活动都必将遭到可耻的失败。同帝国主义及其走狗的愿望相反，中国人民将继续取得胜利，并且正在为世界和平和人民的革命事业作出越来越大的贡献。"},{"type":"paragraph","text":"韩秀东谈到了中朝两国人民之间的传统友谊。他说，这种友谊是在反对共同的敌人——帝国主义侵略者的斗争中以鲜血凝成的战友之间的友谊，是互相帮助、互相学习、紧密合作的兄弟之间的友谊，是牢固地建立在马克思列宁主义思想和无产阶级国际主义原则上的伟大的友谊。"},{"type":"paragraph","text":"他还转达了中国人民对朝鲜人民的兄弟般的问候。"},{"type":"paragraph","text":"韩秀东的报告博得了与会者的雷鸣般的掌声。"},{"type":"paragraph","text":"会后，放映了中国彩色纪录影片《崔庸健委员长访问中国》和故事影片《鄂尔多斯风暴》。"},{"type":"paragraph","text":"朝中友好协会中央委员会委员长河仰天，朝鲜对外文化联络委员会副委员长康久永。朝鲜科学知识普及协会中央委员会副委员长崔安国，以及有关部门的负责人和平壤市的劳动人民参加了报告会。"},{"type":"paragraph","text":"中国驻朝鲜大使郝德青和大使馆外交官员也应邀出席了报告会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cc588817a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
