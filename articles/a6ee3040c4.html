ves/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"夏邦银、胡厚民讲话（节录）","alias":"","parts":[{"type":"title","text":"七月九日夏邦银、胡厚民讲话（节录）"},{"type":"paragraph","text":"七月九日，夏邦银、胡厚民等人，召开形势分析会。会上，他们说：“我们各省的情况都作了了解，四川最好，放了人，其他省没有这样做。四川不仅人放了，而且还安排了工作。河南造反派内部分两派闹得很厉害，我们学习河南，主要是学习他们敢于造反、上台掌权的精神。”会上，对省里领导的情况也作了分析。他们说：“赵辛初六·一九讲话后，态度后退了。最近夏邦银几次找起赵辛初，提出十几个问题要赵回答，赵答不出来。”“原来我们七月份要大搞的，现在要停停看看再搞。现在三件事要搞：街上的大标语、大字报可以贴；串连可以搞，交换交换情况嘛；定期分析会可以开。我们这样作，就抓不住什么辫子。主要在单位搞。”“对赵辛初的讲话，只能叫他前进，不能后退，看他怎么贯彻？"}],"authors":["夏邦银","胡厚民"],"dates":[{"year":1976,"month":7,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"中共武汉市委材料组，一九七六年十二月","page_start":16,"page_end":17},"tags":[{"name":"河南文革","type":"人物"},{"name":"四川文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6ee3040c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
