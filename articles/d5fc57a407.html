tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想已经变成强大物质力量","authors":[],"parts":[{"type":"paragraph","text":"据新华社康开三十日电 中国发射导弹核武器试验成功的消息传到川圹后，老挝各界人士欢欣鼓舞，热烈赞扬说，这是毛泽东思想的伟大胜利，认为中国人民的胜利就是老挝人民的胜利。"},{"type":"paragraph","text":"老挝民族团结政府新闻、宣传和游览大臣、老挝爱国战线党中央委员会总书记富米·冯维希，爱国中立力量军事指挥部负责人坦上校以及老挝人民解放军政治部负责人等怀着无比兴奋的心情，到中国驻老挝经济文化代表团表示热烈祝贺。"},{"type":"paragraph","text":"冯维希代表老挝两支爱国力量和川圹省人民讲了话。他说：这次导弹核武器试验成功是毛泽东思想的胜利，是中国人民活学活用毛主席著作所创造的巨大成就。"},{"type":"paragraph","text":"冯维希祝中国人民伟大的领袖毛主席身体健康，祝中国人民在毛主席和中国共产党的领导下在社会主义建设和保卫祖国的事业中不断前进，成为世界革命的铜墙铁壁；祝用毛泽东思想武装起来的中国人民解放军日益强大，祝中国的无产阶级文化大革命圆满成功。"},{"type":"paragraph","text":"老挝人民解放军政治部负责人在向中国代表团祝贺时说：“中国人民的胜利也是我们老挝人民的胜利。毛主席说精神可以变物质，我认为毛泽东思想就是最大的原子弹。”"},{"type":"paragraph","text":"“老挝之声”电台负责人扎伦·翁桑昂在向新华社记者祝贺时说：“中国发射导弹核武器试验成功充分证明了毛泽东思想已经变成了强大的物质力量，在毛泽东思想光辉照耀下的中国人民日益强大起来了，对全世界正在进行革命斗争的人民、特别是处在抗美救国斗争中的老挝人民和越南人民更是一个强有力的鼓舞。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5fc57a407"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
