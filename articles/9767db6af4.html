" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于工人不要离厂外出串连的指示","authors":[],"dates":[{"year":1966,"month":10,"day":30}],"is_range_date":false,"parts":[{"text":"中央关于工人不要离厂外出串联的指示","type":"title"},{"text":"安徽省委并各中央局，各省、市、自治区党委：","type":"appellation"},{"text":"十月十六日电悉。","type":"paragraph"},{"text":"关于工人离厂外出串联的问题，请按中央《关于无产阶级文化大革命的决定》第十四条和中央九月十四日《关于抓革命促生产的通知》的精神，对工人群众进行正面教育，要他们听党中央的话，听毛主席的话，坚守生产岗位，不要到厂外去串联，抓革命、促生产，保证革命、生产双胜利。","type":"paragraph"},{"text":" 中   央一九六六年十月三十日","type":"paragraph"},{"text":"（发至县团级）","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9767db6af4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
