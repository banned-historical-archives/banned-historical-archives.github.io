"党史题材文学作品不能虚构重大的党史史实","dates":[{"year":1986,"month":3,"day":22}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态（1986选编版）, 65","tags":[{"name":"党史","type":"主题/事件"},{"name":"文学","type":"主题/事件"}],"parts":[{"type":"title","text":"党史题材文学作品不能虚构重大的党史史实"},{"type":"paragraph","text":"创作以党史为题材的文学作品，党允许作家在风格和艺术上自由选择，不加干预。但在这类作品中，特别是在文学传记作品（包括小说、戏剧、电影、电视片）中，作家不应虚构重大的党史史实，对党的历史人物的描写，更不能歪曲。因为这不是什么艺术领域的是非问题，而是政治领域的是非问题，也是作家的社会责任和职业道德问题。对此，党员作家必须模范执行，不能含糊。"},{"type":"subtitle","text":"(第8期，3月22日)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"512869f744"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
