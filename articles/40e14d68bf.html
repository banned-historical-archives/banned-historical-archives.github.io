tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苏“援”波卡罗钢厂是“帝国主义剥削的典型”","authors":[],"parts":[{"type":"paragraph","text":"据新华社一九七七年十月二十日讯 在加拿大出版的《新印度公报》一九七七年九——十月合刊发表文章指出，苏联“援”建的波卡罗钢厂是“帝国主义剥削的典型”。"},{"type":"paragraph","text":"文章在谈到印度政府最近决定扩建波卡罗钢厂不要苏联的“援助”一事时说：“苏联的‘援助’，意味着价值达十亿卢比的大部分设备和工艺要由苏联来提供，尽管印度重型设备公司和其他的机械厂能够提供所需的大部分设备。”"},{"type":"paragraph","text":"文章还从波卡罗钢厂的修建过程来揭露苏联对印度进行剥削、控制的面目。文章指出：“波卡罗钢厂工程的历史是苏联以‘援助’为名，对印度进行帝国主义剥削的典型。”"},{"type":"paragraph","text":"文章回顾了在美国撤销对波卡罗钢厂的“援助”后，苏联在一九六五年乘机插手进来，排挤印度公司，而由它一手包揽了全部工程的厂史。文章说：当时，“俄国人还改变了设计方案，以便能够向印度推销陈旧的工艺。这是一个典型的帝国主义行径。”"},{"type":"paragraph","text":"文章指出：“特别有趣的是，事实上，印度重型设备公司也是由苏联修建的。这样，即使在修建了一座制造重型机器的工厂后，俄国人还要继续向印度推销（这座工厂所能生产的）同样的机器。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40e14d68bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
