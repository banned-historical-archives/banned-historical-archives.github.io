art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席会见金日成主席率领的朝鲜党政代表团","authors":[],"parts":[{"type":"paragraph","text":"毛主席同金日成主席亲切握手，互致问候。毛主席对金日成主席率领朝鲜党政代表团前来我国访问表示热烈欢迎，并且同代表团团员一一握了手。毛主席和金日成主席进行了非常亲切友好的谈话。邓小平副主席等参加了会见和谈话"},{"type":"paragraph","text":"新华社一九七五年四月十八日讯 中国共产党中央委员会主席毛泽东今天下午会见了朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成率领的朝鲜民主义人民共和国党政代表团。"},{"type":"paragraph","text":"会见时，毛泽东主席同金日成主席亲切握手，互致问候。毛主席对金日成主席率领朝鲜党政代表团前来我国访问表示热烈欢迎，并且同代表团团员金东奎、吴振宇、朴成哲、全文燮、许锬、桂应泰、郑松南、吴克列、玄峻极等同志一一握了手。"},{"type":"paragraph","text":"毛泽东主席和金日成主席进行了非常亲切友好的谈话。谈话时，朝鲜党政代表团团员吴振宇在座。"},{"type":"paragraph","text":"中共中央副主席、国务院副总理邓小平，外交部副部长王海容、副司长唐闻生参加了会见和谈话。"},{"type":"paragraph","text":"毛泽东主席同金日成主席亲切握手。 新华社记者摄"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88279ef385"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
