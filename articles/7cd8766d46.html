设中国人民海军","authors":[],"dates":[{"year":1949,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“长治”号全体起义官兵"},{"type":"paragraph","text":"电毛主席朱总司令致敬"},{"type":"paragraph","text":"毛主席朱总司令电勉努力学习积极参加建设中国人民海军"},{"type":"paragraph","text":"【新华社北京十一日电】九月十九日在吴淞口外起义的前国民党海防第一舰队旗舰“长治”号全体起义人员于九月二十七日致电毛主席、朱总司令致敬。该电原文如下：毛主席、朱总司令："},{"type":"paragraph","text":"我们因不满国民党反动派勾结帝国主义、出卖祖国，反对民主、残害人民，以及“封锁”沿海，实行杀人越货的海盗罪行，于九月十九日晨，在吴淞口外起义，摆脱国民党反动残余的统治，参加人民的海军。我们坚决拥护中国共产党的领导，在你们英明的领导下，加紧学习，改造自己，参加人民海军的建设工作，迅速肃清残匪，争取在解放台湾，解放全中国的战役中为人民立功。谨此，以万分的忠诚向你们——中国人民的领袖致最崇高的敬意，并祝你们健康！"},{"type":"paragraph","text":"前国民党海防第一舰队旗舰“长治”号全体起义人员谨上"},{"type":"paragraph","text":"九月二十七日"},{"type":"paragraph","text":"【新华社北京十一日电】毛主席朱总司令昨日电复前国民党海防第一舰队旗舰“长治”号全体起义人员称：长治号全体起义的同志们："},{"type":"paragraph","text":"庆祝你们的英勇的起义行动。由于国民党海军内的爱国官兵陆续起义，人民海军已在迅速发展。希望你们努力学习，积极参加建设中国人民海军和完成解放中国全境的伟大事业。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"朱　德"},{"type":"paragraph","text":"一九四九年十月十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cd8766d46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
