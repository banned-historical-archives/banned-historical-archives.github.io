art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认真学习毛主席的哲学著作","authors":[],"parts":[{"type":"paragraph","text":"本报讯 总字一○二部队某部运输连全体同志怀着对伟大领袖毛主席的深厚无产阶级感情，紧密联系国内外形势和本连实际，认真学习和领会党的九届二中全会公报的精神实质，以公报为强大动力，掀起活学活用毛主席哲学著作的热潮。"},{"type":"paragraph","text":"公报指出：“全党要认真学习毛主席的哲学著作，提倡辩证唯物论和历史唯物论，反对唯心论和形而上学。”运输连干部战士学习时，联系本连推广薛庆水“安全行车的辩证法”的经验后，连队面貌发生深刻变化的事实，畅谈了学习毛主席哲学著作的甜头，同时以自己的切身体会，大讲了不学毛主席哲学著作的苦头，使大家认识到：毛主席的光辉哲学思想，是我们改造主观世界和客观世界的指路明灯，只有学好用好毛主席的哲学思想，才能更好地认清形势、明确方向，自觉贯彻执行毛主席的无产阶级革命路线和政策，搞好连队革命化、战斗化建设。同志们说：学习毛主席哲学著作，是继续革命的需要，是形势发展的需要。我们一定坚决响应公报号召，真正做到认真学，认真用。党支部还针对少数同志对学哲学存在畏难情绪和学用脱节的现象，发动大家狠批叛徒刘少奇及杨献珍等一伙散布的“哲学神秘论”；重温林副主席提出的关于学习毛主席著作的方针、原则，使大家认识到，只要密切结合三大革命运动的实践，学一点，用一点，工农兵就一定能够掌握毛主席的哲学思想。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“让哲学从哲学家的课堂上和书本里解放出来，变为群众手里的尖锐武器。”运输连干部战士在党的九届二中全会公报精神的鼓舞下，自觉地带着思想、工作等方面遇到的问题学哲学、用哲学，把战备训练、检修车辆、执行运输任务都变成了学哲学的课堂，全连出现了一派热气腾腾的学哲学、用哲学的新气象。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c226136001"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
