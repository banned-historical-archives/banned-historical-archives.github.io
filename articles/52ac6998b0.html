ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"为避免仓卒作战七月底前完成大打准备","alias":"","parts":[{"type":"paragraph","text":"为避免仓卒作战七月底前"},{"type":"paragraph","text":"完成大打准备!"},{"type":"paragraph","text":"（1946年6月28日）刘、邓，陈、舒，并告邓、张："},{"type":"paragraph","text":"（一）陈舒电请由刘邓统一指挥，中央认为甚为必要。为达统一步调克敌致果之目的，请刘邓即日担负此职。（二）必须待谈判破裂国民党动手打我，然后方能打他，争取有理地位。（三）根据陈舒建议，为准备充分避免仓卒作战起见，将准备时间延长至午贺，必要时延长至午三十，但最迟不要过午三十。（四）各事均望刘邓、陈舒直接商定。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"俭亥"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给晋冀鲁豫军区司令员刘伯承、政治委员邓小平和新四军军长兼山东军区司令员陈毅、政治部主任舒同的电报。"},{"type":"paragraph","text":"[2]邓、张，指邓子恢、张鼎丞，当时分别任华中军区政治委员和司"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":438,"page_end":438},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52ac6998b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
