ar":1995,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社耶路撒冷11月19日电　(记者　谢栋风)以色列内阁今天决定取缔从事各类恐怖活动的极右组织，以消除这些组织对国家安全及民众生活构成的严重威胁。"},{"type":"paragraph","text":"以色列内阁在每周例会后责成检察总长、警察总监、以军总参谋长及国家安全局局长制订相应的计划，制止这些极右组织的“颠覆活动”，并最终取缔这些组织。"},{"type":"paragraph","text":"内阁还决定，根据以色列的《回归法》，政府将禁止那些支持极右组织或支持暴力行为的海外犹太人人境，禁止他们到以色列定居或旅游。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d1c68b845"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
