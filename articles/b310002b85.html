tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东诗词国际学术研讨会举行","authors":["殷学成"],"parts":[{"type":"paragraph","text":"此次研讨会是中国毛泽东诗词研究会和江苏省毛泽东诗词研究会联合举办的，会期3天。1996年第一届毛泽东诗词国际学术研讨会在北京举行，对推进毛泽东诗词研究事业，起到了积极作用。5年来，毛泽东诗词研究事业有了很大发展，研究队伍壮大了，研究水平提高了。这次会议既是对过去5年来研究情况的一次检阅和总结，也是对未来发展的一个有力的推动。"},{"type":"paragraph","text":"这次会议共收到论文130多篇。这些论文作者层次高；视野宽广，把毛泽东诗词放在中国诗歌发展长河中加以研究和评析；内容涉及面宽；学术研究气氛活跃；研究方向明确。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b310002b85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
