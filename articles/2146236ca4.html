的意见","authors":[],"dates":[{"year":1955,"month":9,"day":29}],"is_range_date":false,"parts":[{"text":"中央复江西省委关于搜查民主人士问题的意见","type":"title"},{"text":"江西省委并告各省市委、自治区党委：","type":"appellation"},{"text":"你们九月十五日致中央十人小组两电均悉。","type":"paragraph"},{"text":"（一）搜查人民代表和较高级民主人士，必须十分慎重。如果没有较充分的材料和把握，不要轻易搜查，免得使自己处于被动。","type":"paragraph"},{"text":"（二）你们所报要搜查的五个民主人士和人民代表，从所述材料看来，除个别嫌疑情节较大者外，其余均材料不足，情节不明。因此，对此五人暂时都不要进行搜查。熊、葛二人可由公安机关加强侦察工作，目前对他们的外围分子，倒可以抓紧一些搞，发现材料，为将来工作作准备。","type":"paragraph"},{"text":"（三）搜查中央中营厂矿中的总、副工程师必须事先报中央批准。","type":"paragraph"},{"text":"各省市有同类问题，均应按上述原则办理。","type":"paragraph"},{"text":" 中央一九五五年九月二十九日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2146236ca4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
