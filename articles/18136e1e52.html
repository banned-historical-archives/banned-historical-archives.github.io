art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"打破旧教育制度走上海机床厂的道路","authors":["驻黄土岗公社毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"大家在学习中，回顾了解放十几年来，黄土岗公社技术人员成长的情况，深深体会到，必须坚决执行毛主席的无产阶级教育路线，走毛主席指出的同工农兵结合的道路，彻底批判中国赫鲁晓夫的修正主义教育路线。黄土岗公社过去遇到这样两件事情：一件是一九六六年公社为了培养农业技术员，花了几万元盖了一所学校，从外地请来技术指导，因为他们讲的理论脱离实际，农民根本不爱听，开学不久就关了门；另一件是，前几年上级派来一个林科毕业的大学生作技术指导，社员请她指导修理桃树，她回答说自己是专搞苹果树的，不懂桃树。后来让她到苹果园去剪枝时，也是只能说不能做。通过回忆，激起大家对中国赫鲁晓夫推行的修正主义教育路线无比仇恨。大家说：我们要打破旧的资产阶级教育制度，坚决走毛主席指出的同工农兵结合的道路。"},{"type":"paragraph","text":"毛主席教导我们，要“走上海机床厂从工人中培养技术人员的道路”。大家用公社从农民中选拔对象，培养技术人员的实践，说明毛主席的最新指示的英明、伟大、正确。黄土岗公社近几年来，采取短期集训的办法，培养了一批农业技术员和半农半医的医务人员，他们在农业生产中发挥了显著作用。过去社员看病要跑几十里路，还常常跑空腿；现在这些半农半医的人员，主动找上门去，给贫下中农看病，深受广大贫下中农的欢迎。这个公社有几个大队土质不好，有几种菜根本不长，后来便组织这几个大队的技术员，虚心向贫下中农学习，听取老农意见，改造了土壤，现在各种蔬菜都能种植了。"},{"type":"paragraph","text":"通过以上事实说明：技术人员的培养和成长，尖锐地反映了两个阶级、两条道路、两条路线的斗争。我们毛泽东思想宣传队决心同公社革命委员会一起，坚决走毛主席指引的突出无产阶级政治、与工农兵结合的道路，不断从农民中选拔对象，到专业学校培养，然后再回到农业实践中去，建设一支为社会主义农业服务的技术队伍，推动农业生产的迅速发展。"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18136e1e52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
