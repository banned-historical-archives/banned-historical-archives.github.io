:[],"dates":[{"year":1981,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见日中协会第三次访华团时说"},{"type":"paragraph","text":"应从长远观点看待中日关系"},{"type":"paragraph","text":"新华社北京十月二十八日电  中共中央副主席邓小平今天上午会见由茅诚司会长率领的日中协会第三次访华团时说，中日两国不仅有着悠久的历史关系，而且在当前和今后很长的历史时期内，中日两国的关系都是十分重要的。"},{"type":"paragraph","text":"他说，我相信中日两国朋友都有一个共同的信念：应该从长远的观点而不是权宜的观点来看待两国的关系。"},{"type":"paragraph","text":"邓小平对中日邦交正常化以来两国关系的发展表示满意。他指出，在广泛的领域里，中国需要日本的帮助，日本在许多方面也需要中国的帮助，他希望两国关系进一步发展。"},{"type":"paragraph","text":"邓小平认为，中日两国在国际事务中需要经常协调彼此的观点和行动。"},{"type":"paragraph","text":"八十二岁高龄的茅诚司团长是日本著名物理学家。他说，日中协会是最近经过改选后以新的阵容访问中国的，并将努力完成促进日中友好的历史使命。"},{"type":"paragraph","text":"团员中包括诺贝尔奖金获得者江崎玲于奈、前东京大学校长向坊隆、前日本驻华大使小川平四郎以及国会议员等。邓小平感谢来访的日本新老朋友为中日友好事业所作的努力，并分别回答了他们提出的问题。人大常委会副委员长廖承志，中日友协顾问楚图南、日本驻华大使鹿取泰卫参加了会见。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fdb1ac755"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
