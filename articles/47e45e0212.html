script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"张垣铁路分局严重右倾  压抑工人留用坏分子　局长蔺子安应予撤职","authors":[],"dates":[{"year":1949,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张垣铁路分局严重右倾"},{"type":"paragraph","text":"压抑工人留用坏分子"},{"type":"paragraph","text":"局长蔺子安应予撤职"},{"type":"paragraph","text":"【华北讯】张垣铁路分局，在平绥路东段解放一个多月之后，工作上仍无明确方针，对所谓旧职员，经过草率审查，即大部恢复工作，其中有一部分坏分子，并无多大工作能力，也是“原职原薪”，对某些冗员不加裁汰；对坏分子作恶多端群众十分痛恨者，亦不依法处办，甚至把国民党特务组织叫做“警务课”的，也当成企业机构，而原封不动加以保持，且给以原职原薪，继续破坏工作，压抑工人。工人们提出这些问题，请求分局加以处理时，而分局并未调查研究，即以“证据不够”，“手续不周”予以拒绝，并用“怕搞乱了”，“影响不好”为借口，将此事一直拖下去，不给解决。解放后在抢修铁路，支援前线等工作中，新提拔的一批优秀工人则被撤消下去，或降为副职。被国民党时代无理开除的工人（不少是第一次解放张垣时的积极分子），有些直到现在还没有复工，或是复工后还没有定薪水。工人们气愤地把他们的办事处，叫做“国共合作”机关。有些勇敢的工人挺身出来，检举坏分子。南口行政上则采“大事化小，小事化无”的态度，致工人中一直酝酿着不满情绪。二月一日张垣铁路分局局长蔺子安，接到华北交通部到丰台开会的通知后，他特别下了一道命令为他准备专车：一节头等车，坐着他本人、执法队、警卫员及科员等十余人，另一节车皮载着他的小卧车；并且在事先即电令沿路各站职工人员听候在蔺局长到站时训话与“汇报工作”。“汇报工作”是饰词，主要是想摆摆威风，要让沿路员工迎接他。南口职工接到命令后，立即忙碌起来，打扫月台车站，整理内务，专车到来时，全体职工在月台上列队欢迎，等候训话。当时适逢蔺局长有些感冒，由随从的某干部代训了几句。本来就十分不满的职工、经此情景更为反感、纷纷说：“毛主席也没这大架子”。“国民党局长出来坐专车，解放军也闹这一套”，该铁路分局的官僚主义已达到惊人程度，不久以前，中共察哈尔省委，对此事提出检举，给蔺子安同志以批评，但直到现在，蔺子安仍缺乏自我批评精神，认为事实倒是事实，但不能做坏的解释，如果做成官僚主义的解释，就是打击他。据说中共察哈尔省委为了教育蔺子安同志及反对官僚主义起见，仍准备继续开展斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47e45e0212"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
