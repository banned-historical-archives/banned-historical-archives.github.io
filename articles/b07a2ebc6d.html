uthors":[],"dates":[{"year":1958,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席周总理电贺阿富汗王国国庆"},{"type":"paragraph","text":"陈毅副总理兼外长致电阿副首相兼外交大臣祝贺"},{"type":"paragraph","text":"新华社26日讯　毛泽东主席25日致电阿富汗王国国王穆罕默德·查希尔·沙阿，祝贺阿富汗王国独立四十周年。电文如下：阿富汗王国国王穆罕默德·查希尔·沙阿陛下："},{"type":"paragraph","text":"欣逢阿富汗王国独立四十周年纪念之际，我谨代表中国人民并且以我个人的名义向陛下和阿富汗人民表示诚挚的祝贺。祝阿富汗王国繁荣富强，阿富汗人民幸福兴旺。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"1958年5月25日"},{"type":"paragraph","text":"新华社26日讯　周恩来总理25日致电阿富汗王国首相萨达尔·穆罕默德·达乌德汗，祝贺阿富汗王国四十周年国庆。电文如下：阿富汗王国首相萨达尔·穆罕默德·达乌德汗殿下："},{"type":"paragraph","text":"欣逢阿富汗王国四十周年国庆之际，我谨代表中华人民共和国政府并且以我个人的名义向殿下和阿富汗王国政府表示热诚的祝贺。"},{"type":"paragraph","text":"我高兴地看到，随着中阿两国在经济和文化方面日益增多的接触，特别是通过两国领导人员的相互访问，我们两国间的相互了解和友好关系有了增进。祝殿下和阿富汗人民在国家建设事业中获得新的成就。祝中阿两国间的传统友谊在和平共处五项原则的基础上获得更进一步的发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1958年5月25日"},{"type":"paragraph","text":"新华社26日讯　国务院副总理兼外交部长陈毅25日致电阿富汗王国副首相兼外交大臣萨达尔·穆罕默德·纳伊姆汗，祝贺阿富汗王国四十周年国庆。电文如下：阿富汗王国副首相兼外交大臣萨达尔·穆罕默德·纳伊姆汗殿下："},{"type":"paragraph","text":"值此贵国四十周年国庆之际，我谨向殿下表示热烈的祝贺。祝贵国在促进亚非各国友好团结和维护世界和平的事业中作出更大的贡献。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼外交部部长　陈　毅"},{"type":"paragraph","text":"1958年5月25日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b07a2ebc6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
