ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"毛泽东等祝贺蒙古人民革命胜利四十三周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺蒙古人民革命胜利"},{"type":"paragraph","text":"四十三周年的电报！"},{"type":"paragraph","text":"（1964年7月10日）乌兰巴托蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔同志，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志："},{"type":"paragraph","text":"在蒙古人民革命胜利四十三周年的时候，我们向蒙古人民、蒙古人民革命党和蒙古人民共和国政府致以热烈的祝贺。"},{"type":"paragraph","text":"中蒙两国是社会主义的兄弟邻邦，两国人民之间有着深厚的友谊。维护和加强这种友谊，是我们两国人民的共同愿望。中国人民将一如既往，坚定不移地在马克思列宁主义和无产阶级国际主义的基础上，在一九五七年宣言和一九六○年声明的革命原则的基础"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国主席刘少奇、全国人民代表大会常务委员会委员长朱德、国务院总理周恩来联名给蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔和蒙古人民共和国大人民呼拉尔主席团主席扎·桑布的电报。祝贺蒙古人民共和国成立四十三周年。1921年蒙古人民在苏俄红军的援助下于7月8日解放库伦，击溃温甘伦白匪军，取得革命胜利。7月11日，在库伦正式成立人民革命政府。毛泽东全集第四十六卷上，为加强我们两国人民的友谊和团结，为加强社会主义阵营的团结，为反对帝国主义的侵略政策和战争政策，为保卫世界和平而努力。"},{"type":"paragraph","text":"祝蒙古人民在社会主义建设中取得新的成就。祝中蒙两国人民的兄弟友谊巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六四年七月十日"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":484,"page_end":485},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0583f23cb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
