art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深切哀悼毛泽东主席逝世","authors":[],"parts":[{"type":"paragraph","text":"文章说：“中国人民的伟大领袖、中国共产党和中华人民共和国的缔造者、越南人民的敬爱朋友毛泽东主席逝世了。”“我国人民怀着深厚的情感，衷心地向兄弟的中国人民表示最深切的哀悼。”"},{"type":"paragraph","text":"文章说：“毛泽东主席一生的轰轰烈烈的活动，是同中国人民半个多世纪来充满辉煌胜利的革命斗争分不开的。在以毛泽东主席为首的中国共产党领导下，中国革命从胜利走向胜利。毛泽东主席把马克思列宁主义的普遍原理运用于中国的具体条件，提出并成功地解决了新民主主义革命的路线和政策问题，并在世界上人口最多的国家里使这场革命取得了彻底的胜利。”"},{"type":"paragraph","text":"文章指出，在社会主义革命时期，中国人民贯彻毛泽东主席所提出的社会主义革命路线，取得了极其巨大的成就。“越南人民对兄弟的中国人民的巨大胜利和成绩感到十分高兴。越南人民和中国人民有着悠久的战斗团结友好关系。这种传统友谊在两党和两国领袖——胡志明主席和毛泽东主席的精心培育下开花结果，成为牢不可破的战斗团结。”"},{"type":"paragraph","text":"文章说：“敬爱的毛泽东主席与世长辞了，但他留下了一个正在社会主义道路上阔步前进的伟大的中国。毛泽东主席也留下了伟大的中越友谊。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b6f84f947"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
