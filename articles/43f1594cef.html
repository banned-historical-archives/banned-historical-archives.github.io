hors":[],"dates":[{"year":1978,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副主席会见朝鲜国立交响乐团团长等"},{"type":"paragraph","text":"同朝鲜同志进行了亲切友好的谈话"},{"type":"paragraph","text":"新华社北京九月四日电　中共中央副主席、国务院副总理邓小平，今天上午会见了朝鲜国立交响乐团团长张澈、第一副团长金元均、副团长李锡奎、郑春焕和主要演员，同朝鲜同志进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，张澈团长代表朝鲜国立交响乐团全体同志向邓副主席致以亲切的问候。"},{"type":"paragraph","text":"邓副主席说，我应该感谢你们。你们在我国演出了三十多场，付出了巨大的劳动，使我国成百万人欣赏了你们的艺术，并感受到你们的深情厚谊。"},{"type":"paragraph","text":"朝鲜驻中国大使全明洙参加了会见。"},{"type":"paragraph","text":"会见时在座的有文化部部长黄镇，副部长贺敬之、姚仲明等。（附图片）"},{"type":"paragraph","text":"中共中央副主席、国务院副总理邓小平九月四日会见朝鲜国立交响乐团团长张澈等领导成员和主要演员。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43f1594cef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
