况严重","authors":[],"dates":[{"year":1950,"month":9,"day":14}],"is_range_date":false,"parts":[{"text":"山西、河北等地工农业产品剪刀差额情况严重","type":"title"},{"text":"(华北总分社九月十四日讯) 山西、河北等地工农业产品剪刀差额情况严重。山西上半年收购各种农副业产品的计划完成了百分之一百二十五点六，而推销工业品的计划，仅完成百分之六十点九，山西贸易会议认为中央贸易部将布价提得过高，是形成粮、棉差额的原因。河北唐山一九三六年，一疋布换一百四十八斤小米，一九四九却换二百四十斤小米。保定、衡水、临清等地今年四月前每疋布为二百五十斤小米，现为三百斤小米。石家庄一九三六年每吨煤换一百六十七斤米，现换二百零九斤。因此，河北贸易会议建议中央再计算工业利润，缩小差额，保证农民利益。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年9月16日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e4e55d366"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
