"year":1952,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高度警惕资产阶级思想的侵袭"},{"type":"paragraph","text":"编辑同志：我读了人民日报发表的关于刘青山、张子善的贪污事件的文章后，激动得流下了热泪。当时我有两种情绪，一是痛惜刘、张这两个久经锻炼的革命战士因为经不起资产阶级思想的侵袭，变成了党的叛徒、人民的罪人；一是使我更深刻地体会到我们的领袖毛主席的英明伟大。毛主席的反贪污反浪费反官僚主义的号召，挽救了许多正在滋长贪污蜕化思想的人，这是我们党伟大的胜利。回忆入城以前，党曾要大家研究“闯王进京”的故事，要大家警惕起来，不要作李闯王第二，要大家牢牢记取这一惨痛的历史教训。可是入城不过两三年，有些人竟被资产阶级糖衣裹着的炮弹击伤，个别的则毁灭了自己，这是多么危险啊！这说明我们如果不在思想上高度警惕，在资产阶级的享乐腐化思想侵蚀下，就会有亡党亡国亡身的危险。因此每一个党员、革命干部应以刘、张事件为教训，在反贪污反浪费反官僚主义运动中好好地检查一下自己。"},{"type":"paragraph","text":"林渠"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"486a8e306f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
