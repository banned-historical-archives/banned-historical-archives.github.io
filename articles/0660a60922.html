art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东等赴重庆谈判","authors":[],"parts":[{"type":"paragraph","text":"1945年8月28日本日，毛泽东、周恩来、王若飞在赫尔利、张治中陪同下飞抵重庆，同国民党当局进行谈判。在43天的谈判中，由于中国共产党紧紧抓住和平旗帜，把革命的原则性与策略的灵活性相结合，把谈判斗争与群众斗争相结合，加之国内民主舆论的压力，终于于10月10日签订了“国共双方代表会谈纪要”，即《双十协定》。10月11日，毛泽东在张治中的陪同下返回延安，周恩来、王若飞留重庆继续与国民党代表谈判。重庆谈判，体现了中国共产党争取和平民主、反对内战独裁的真诚愿望，揭露了美蒋反动派假和平的阴谋，增加了国内外进步势力对中国共产党的理解和信任。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"重庆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0660a60922"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
