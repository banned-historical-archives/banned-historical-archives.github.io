art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"布隆迪总统巴加扎在京举行答谢宴会"},{"type":"paragraph","text":"布隆迪共和国总统让—巴蒂斯特·巴加扎上校和夫人，三月十九日晚上在人民大会堂举行答谢宴会。"},{"type":"paragraph","text":"我国国务院副总理李先念和夫人林佳楣，人大常委会副委员长乌兰夫等，应邀出席了宴会。"},{"type":"paragraph","text":"巴加扎总统和李先念副总理在宴会上讲了话。"},{"type":"paragraph","text":"中国和布隆迪政府经济技术合作协定在京签字"},{"type":"paragraph","text":"中华人民共和国政府和布隆迪共和国政府经济技术合作协定三月十九日下午在北京签字。布隆迪总统让—巴蒂斯特·巴加扎上校和我国国务院副总理李先念等，出席了签字仪式。我国外交部长黄华和布隆迪外交和合作部长爱德华·恩赞比马纳中校，分别代表本国政府在协定上签了字。"},{"type":"paragraph","text":"邓小平副总理会见瑞士经济部长霍纳格一行"},{"type":"paragraph","text":"邓小平副总理三月十九日上午会见了瑞士联邦委员、经济部长弗里茨·霍纳格一行。"},{"type":"paragraph","text":"会见时，邓副总理对瑞士朋友说，瑞士是同中国建交最早的国家之一，我们两国的政治关系很好，在发展经济合作方面也有着广阔的前景。邓副总理还阐述了我国的对外经济政策。霍纳格部长表示，瑞士愿意同中国进行更密切和有成效的经济合作。"},{"type":"paragraph","text":"陈慕华副总理抵斐济进行正式友好访问"},{"type":"paragraph","text":"应斐济政府的邀请，中华人民共和国国务院副总理陈慕华三月十九日由新西兰的奥克兰乘飞机到达斐济首都苏瓦，对太平洋上的这个岛国进行正式友好访问。陈慕华副总理一行在机场受到了热烈欢迎。"},{"type":"paragraph","text":"一九五九年参加西藏叛乱被判服刑的人员全部得到人民政府的宽大处理"},{"type":"paragraph","text":"西藏自治区司法机关决定宽大释放一九五九年参加原西藏上层反动集团发动的武装叛乱的三百七十六名罪犯，同时宣布，刑满就业后继续戴叛乱分子帽子和在社会上戴叛乱分子帽子监督改造的六千余人，一律摘掉帽子，发给摘帽通知书。至此，一九五九年在西藏服刑的参叛人员全部得到人民政府的宽大处理。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a6c0b4bd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
