],"dates":[{"year":1976,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巩固和发展文化大革命的成果"},{"type":"paragraph","text":"黑龙江举办工农兵新干部学习班"},{"type":"paragraph","text":"组织他们认真学习马列著作和毛主席著作，增强反修防修、继续革命的自觉性"},{"type":"paragraph","text":"据新华社哈尔滨一九七六年一月二日电中共黑龙江省委遵照毛主席关于“要办好工农兵干部的学习班”的教导，从一九七三年十月开始，连续举办工农兵干部学习班，组织在文化大革命中涌现出来担任县以上各级党政领导职务的新干部认真学习马列著作和毛主席著作，学习无产阶级专政理论，使他们增强了反修防修、继续革命的自觉性，巩固和发展了无产阶级文化大革命的伟大成果。"},{"type":"paragraph","text":"黑龙江省委举办的工农兵干部学习班，坚持以自学为主，读原著为主的原则，强调刻苦钻研，一篇一篇地读，着重学懂弄通马克思主义的一些基本原理，促进学员思考问题，然后联系实际，一个专题一个专题地进行讨论。"},{"type":"paragraph","text":"为了帮助学员从理论和实践的结合上学懂弄通马克思主义的一些基本原理，发扬理论联系实际的革命学风，学习班认真坚持“一面读书，一面参加工作”的原则，每期都组织学员参加省里的一些重要活动和会议，让学员到三大革命运动中去，以社会为工厂，以三大革命运动为课堂，进行调查研究，深入地学习马列主义、毛泽东思想，提高了学员的政治思想和理论水平。第三期学习班学员到巴彦县振平公社建设五队搞调查时，受到很大启示。文化大革命前，这个大队的领导权没有掌握在走社会主义道路的人手里，使这个大队吃粮靠返销，花钱靠贷款，粮食亩产只有百十来斤。文化大革命中，这个大队改选了领导班子，带领贫下中农坚持学习毛主席著作，大批修正主义，大批资本主义，用无产阶级专政理论教育农民，学大寨人，走大寨道路，从一九六九年开始，六年迈了六大步，到一九七四年粮食亩产达到一千二百五十三斤，是文化大革命前一九六五年的十倍，公共积累也增长了十倍，社员平均收入增长二点三倍。通过调查，学员们深刻认识到，能不能把无产阶级专政任务落实到基层，根本要看领导班子执行的是什么路线。"},{"type":"paragraph","text":"黑龙江省委工农兵干部学习班，把学员学习马克思主义理论同改造世界观结合起来，进一步提高了在无产阶级专政条件下继续革命的觉悟。许多工农新干部纷纷要求到艰苦的地方去，到基层去，到后进单位去，保持和发扬劳动人民的政治本色和优良作风，为社会主义革命和建设，为巩固无产阶级专政做出新贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"黑龙江文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c5cc778f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
