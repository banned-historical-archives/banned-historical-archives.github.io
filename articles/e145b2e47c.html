<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"全国九省一市实现人民公社化","authors":[],"dates":[{"year":1958,"month":9,"day":23}],"is_range_date":false,"parts":[{"text":"一千零七十万吨钢的争夺战胜利在望    钢产量跳到七百二十多万吨","type":"title"},{"text":"红十月产钢187万吨以91.7％的增长速度盖过九月飞速前进","type":"subtitle"},{"text":"当前的迫切任务：把“小土群”逐渐发展为小型的土洋结合的钢铁联合基地；加紧集运生铁，提高生铁质量，支援重点钢铁企业","type":"subtitle"},{"text":"据新华社2日讯　据冶金工业部的统计，从今年1月到10月底止，全国已产钢七百二十多万吨，被称为钢铁战线“关键月”的10月，获得了钢铁双丰收。全国钢 产量10月份达到一百八十七万七千吨，比9月份增加了91.7％，铁产量达到八百七十一万六千吨，比9月份增加了457％。在这英雄的10月，各地生产捷 报如雪片纷飞。15日到21日的钢铁高产周，曾经把全国钢铁产量提高到了一个新的水平；而紧接着高产周的最后十天，这个高产水平不仅稳定下来了，而且又增 长了许多。30日全国产钢十六万多吨，31日紧接着又产钢二十三万多吨。","type":"paragraph"},{"text":"10月份的钢铁丰收，是全党全民大搞以钢为纲的工业群众运动带来的硕果。这个月的生产实践进一步雄辩地证明：在钢铁工业战线上，不论是大、中、小型、 “土”的或“洋”的企业，大搞群众运动是保证钢铁生产高速度发展的重要方法。那些企图贬低工业群众运动的种种论调，在事实面前是根本站不住脚的。这个月， “小土群”炼钢大显威力，广大群众用各种小的、“土”的炼钢炉炼出的钢，比9月份激增了五倍多；两个月前产钢都还非常少的河南、山东两省和除去重点钢铁企 业产量的山西、四川两省，10月份每天平均钢产量都达到了一千到数千吨，而且出现过七个钢的万吨县、市，一批千吨县、市和千吨人民公社；福建、云南、贵州 等省钢产量增长得也很迅速。“小土群”炼铁发展得更快，一个月前，全国涌现的生铁千吨县、市，还只有七十多个，现在，据不完全统计，已经发展到一百六十多 个了。这些省、区、县、市，获得钢铁丰产的共同经验是群众发动得深、透、广。","type":"paragraph"},{"text":"冶金工业部认为，这些丰产地区，现在需要及时总结和提高“小土群”炼钢炼铁的经验，例如：鉴定优良的炉型；选择有煤矿、铁矿资源的地区，建立炼钢炼铁的炉 群，再在附近建立小铁矿、小煤窑、小轧钢厂等，并和“小土群”的交通运输相结合，逐渐发展成为小型的、土洋结合的钢铁联合基地，改良技术、工具、设备，提 高劳动效率；组织固定的采、运、冶炼专业队伍等等。经过总结、调整、提高，作到定炉（优良炉型）、定点（基地）、定组（炉群）、定员（人员）、定领导，把 “小土群”的炼钢炼铁经验再向前推进一大步。现在，河南、山东、湖南等省都已经采取了一些措施，正在调整和提高“小土群”的炼钢炼铁方法。","type":"paragraph"},{"text":"全国重点钢铁企业10月份的钢铁生产，随着企业群众运动的开展也续有增长。数十万职工正在猛力冲闯“土铁炼钢”和“新转炉正常生产”的技术难关，并已取得 了许多新成就。为了支援这些重点企业完成国家钢产量计划，各主要产铁省、区面前，现在摆着两项刻不容缓的急迫任务，即：加紧集运生铁，大力提高生铁质量。 各省生产的生铁极其分散，分散在土高炉旁的生铁是不能发挥作用的，只有把它们集中起来，运进重点炼钢厂，炼成钢、轧成钢材，丰产的铁才能确确实实对生产、 建设起到作用。从最近情况看，生铁质量还是一个值得十分注意的问题，各地需要采取各种措施，才能保证生铁生产的质量和数量一同跃进。","type":"paragraph"}],"comments":[],"origin":"1958年11月3日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e145b2e47c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
