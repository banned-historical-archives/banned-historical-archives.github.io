tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席革命文艺路线的伟大胜利《红灯记》表现了革命人民的英雄气概","authors":[],"parts":[{"type":"paragraph","text":"新华社加德满都十四日电 中国彩色纪录影片《钢琴伴唱〈红灯记〉》最近在尼泊尔放映，受到尼泊尔朋友的热烈赞扬。"},{"type":"paragraph","text":"一位尼泊尔学生在看了电影之后说，中国的文艺工作者遵循伟大领袖毛主席的教导，成功地创作了钢琴伴唱《红灯记》，表现了革命人民的英雄气概。这是毛主席的无产阶级革命文艺路线的胜利。他说：“我们向中国的文艺工作者表示热烈的祝贺。”"},{"type":"paragraph","text":"另一位青年说，钢琴伴唱《红灯记》反映了中国人民的斗争。它对革命人民是一种鼓舞。"},{"type":"paragraph","text":"另一位尼泊尔朋友说，钢琴伴唱《红灯记》把革命文艺带给了广大的劳动人民。因此它受到广大劳动人民的欢迎。"},{"type":"paragraph","text":"他说，这部影片反映了中国人民在反对帝国主义和反动派的斗争中的英勇事迹。这是毛泽东思想的伟大胜利，是无产阶级文化大革命的伟大胜利。"},{"type":"paragraph","text":"新华社伦敦电 中国驻英国代办处不久前连续三次举行电影招待会，放映中国人民伟大领袖毛主席接见中国人民解放军代表的影片以及《钢琴伴唱〈红灯记〉》等影片，招待英国和其他国家友好人士以及旅居英国的爱国华侨。影片受到热烈欢迎。"},{"type":"paragraph","text":"许多进步朋友从影片中看到毛主席神采奕奕，身体非常健康，看到人民解放军对毛主席那样无限忠诚、无限热爱，感到十分激动。他们说，影片充分显示了毛主席的无产阶级革命路线的伟大胜利。"},{"type":"paragraph","text":"许多朋友热烈赞扬钢琴伴唱《红灯记》，他们指出，这是毛主席无产阶级革命文艺路线的伟大胜利。一位英国青年朋友说，毛主席关于文艺革命的理论，解决了无产阶级文艺革命的一系列根本问题。另一位朋友说，看了钢琴伴唱《红灯记》的影片，更加深刻地体会到在文化领域中进行革命的重要意义。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a9c8feb2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
