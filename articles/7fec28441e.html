hors":["肖瑛"],"dates":[{"year":1987,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广播电影电视部部长艾知生强调"},{"type":"paragraph","text":"资产阶级自由化要反对屏幕绚丽多彩不受影响"},{"type":"paragraph","text":"新华社厦门2月25日电　（记者肖瑛）广播电影电视部部长艾知生在最近举行的全国电视题材规划会上强调指出，反对资产阶级自由化，决不影响电视屏幕的绚丽多彩。"},{"type":"paragraph","text":"艾知生说，要坚持四项基本原则，反对资产阶级自由化。但是，不要把什么问题都和资产阶级自由化挂上钩，而且完全应该允许在艺术风格上、题材体裁方面的多样化，提倡艺术技巧和表现手法上的创新。"},{"type":"paragraph","text":"艾知生说，前一段时间，一些文艺作品脱离人民革命斗争的历史和当前亿万人民群众为四个现代化而斗争的现实，沉溺于猎奇或身边琐事，甚至专写社会的阴暗面。这些是不正常的。"},{"type":"paragraph","text":"他说，要写现实，也要写历史，写各个革命时期的斗争。但无论写历史还是写现实，都要对人民特别是对青少年有教育意义，产生积极影响。"},{"type":"paragraph","text":"艾知生指出，电视观众是多层次的，所以它的表现手法应该努力做到雅俗共赏。有些作品出现了新的脸谱化的倾向，写改革的作品，党委书记总是特别保守，厂长总是非常先进，令人想起有一个时期强调“突出政治”，写部队时连长都很保守，指导员都很先进，这同样是搞公式化，应该努力改变这种情况。出现在屏幕和银幕上的人，应该是活生生的人，不要搞公式化，概念化。文艺创作包括电视、电影创作，一定要努力做到毛泽东同志所说的“革命的政治内容和尽可能完美的艺术形式的统一。”"},{"type":"paragraph","text":"这次会议是2月16日到21日在厦门举行的。各地摄制单位在会上提出的电视片摄制规划中，反映现实生活题材和革命历史题材的片子占绝大部分，历史题材也占相当比例，少数民族的生活斗争也将在电视屏幕上得到反映。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fec28441e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
