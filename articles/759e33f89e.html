script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji6","name":"毛泽东全集第6卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"临时中央政府人民委员会命令第二十五号","alias":"","parts":[{"type":"paragraph","text":"临时中央政府人民委员会命令"},{"type":"paragraph","text":"第二十五号"},{"type":"paragraph","text":"（1932年9月17日）"},{"type":"paragraph","text":"目前革命战争正在胜利地向前大发展，每一个工农群众都应积极到前方参加战争工作，以彻底粉碎帝国主义国民党四次围攻，争取江西首先胜利，担任军事运输是参加战争工作之一，是实际去帮助和便利红军在前方作战，各级政府对于动员群众组织担架队、运输队到前方的工作不充分，没有很好地做宣传鼓动工作，使每个工农同志热烈去参加，以至发生开小差，影响军事运输和战利品之损失，另一种不好的现象，过去各地去担任运输就要工资，形成一种雇用形势，这不仅影响军事费用增加，而且失掉了工农群众参加战争的意义，必须立即纠正，并要向工农群众作广大宣传，使其热烈的自愿的加入担架队运输队到前方工作，现规定运输员担架员的指导调动待遇等办法如下："},{"type":"paragraph","text":"一、长期运输员担架员一月到三月的，一概随军工作，每天每人发草鞋费大洋一角五分，五天发一次，并得分火食尾子，但其他零用费不发。"},{"type":"paragraph","text":"二、短期运输员担架员。由当地地方发动来的短夫，就近担运伤病兵和战利品，在二十天以下的，不发按日的草鞋费，但酌量发实际需要原则，酌量发给相当的草鞋费。"},{"type":"paragraph","text":"三、苦工队服务时间，以原判决来定，行军时每天可发草鞋费大洋五分，驻军不发可分得火食尾子，其他费用一概不发。"},{"type":"paragraph","text":"四、长期运输队员和苦工队由各县苏负责组织好，由兵站转送军委分配到各军随军工作，后方及兵站医院，均不得留用此种长期运输员担架员。"},{"type":"paragraph","text":"五、为了迅速搬运前方胜利品和物件起见，各军区各政府后以口除临时动员群众外，应调各地赤卫军来担任这一工作，不仅减少临时动员的困难，迅速将一切胜利品运回不受损失，而且是领导赤卫军实际去参加战争工作。"},{"type":"paragraph","text":"六、省苏县苏应经常督促和指挥各地对于此种工作之进行，至于集中时间地点和人数多少，须照总政治部的通知来执行。"},{"type":"paragraph","text":"以上决定各项办法，望各级政府，各兵站后方机关切实遵照执行。此令"},{"type":"paragraph","text":"主席毛泽东副主席项英张国焘一九三二年九月十七日"}],"authors":["毛泽东"],"dates":[{"year":1932,"month":9,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":133,"page_end":134},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"759e33f89e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
