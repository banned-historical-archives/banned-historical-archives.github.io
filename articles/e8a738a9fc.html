script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"解放军英雄军位与战斗英雄上书毛主席和朱总司令一致表示:只要帝国主义存在一天，就一定要为保卫祖国与世界和平而奋斗。","authors":[],"dates":[{"year":1951,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿九日电】　中国人民解放军各部战功卓著的英雄单位与战斗英雄们，于“八一”节前，纷纷写信给毛主席与朱总司令，他们一致表示:只要帝国主义还存在一天，就一定要紧握手中的武器，为保卫祖国与世界的和平面奋斗。"},{"type":"paragraph","text":"这些英雄单位与战斗英雄有:一九二九年第二次国内革命战争时期建连的“红九连”，中国人民解放战争锦州战役中进行了名震中外的塔山阻击战的“塔山英雄团”，以在广东剿匪中舍身炸毁敌堡的战斗英雄徐汉林烈士命名的“徐汉林班”，十年前坚守狼山的五壮士之一、战斗英雄葛振林，中南军区暨第四野战军五百二十三位战斗英雄，在广东钦州剿匪中以背堵住敌人机枪眼的战斗英雄王玉山，与解放万山群岛战役中荣获海上英雄称号的梁魁庭。"},{"type":"paragraph","text":"“红九连”的信上写道:二十二年来，“红九连”始终站在中国人民革命战争的最前线。在你们的教养下，“红九连”始终被誉为模范连队，仅从一九四七年至今，就立了十五次集体功，荣获奖旗十五面，先后出现模范班、排十五个与战斗英雄和模范工作者一百零八名；同时，我们连里还调出排以上干部九十八人，因此，“红九连”又被誉为培养干部的教导队。“红九连”的信继称:“我们能获得以上成绩，主要是遵照了毛主席的建军思想进行工作。我们发挥了连队里共产党支部的堡垒核心作用，经常贯彻对部队进行无产阶级思想教育和革命荣誉的传统教育，及时注意培养干部、发扬民主与爱护战士，达到内部的国结巩固。”“红九连”最后表示:“我们一定要更加努力学习，把自己建设成一支现代化的国防军，警惕地保卫国防，随时准备为保卫祖国而战斗。”"},{"type":"paragraph","text":"“塔山英雄团”报告了他们在去年五个月的剿匪作战中，歼灭土匪三千八百十九名，缴枪五千三百十二支。全国抽调干部组织了九个工作队，作了二十四个乡的发动群众工作，改造了一百八十五个村政权，建立了一百七十五个村的农会，帮助该地打下了进行土地改革的巩固基础。“塔山英雄团”的英雄们最后表示:“只要世界上帝国主义还存在，我们一定要握紧手中的枪，保卫祖国与保卫世界和平!”"},{"type":"paragraph","text":"抗日战争中坚守狼牙山五壮士之一的战斗英雄葛振林坚决反对美帝国主义重新武装日本和非法的对日单独媾和。他表示:“我永远做一个保卫祖国、保卫和平的战士，把坚守狼牙山的战斗精神带到祖国需要我的地方去!”"},{"type":"paragraph","text":"保卫着祖国海防的海军战斗英雄梁魁庭表示:愿永远做一个海上哨兵，为建设强大的中国人民海军，为巩固祖国的海防而奋斗!"},{"type":"paragraph","text":"【本报讯】　据新华社重庆廿八日电:守卫云南边防的“张英才钢铁营”，在“八一”建军节前，写信给毛主席、朱总司令，报告他们一年来保卫祖团边疆的情形。"},{"type":"paragraph","text":"(按张英才是人民解放军的战斗英雄，他所指挥的一个营，在淮海战役中因作战有功，荣获“钢铁营”的称号。)"}],"comments":[],"origin":"新华社,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8a738a9fc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
