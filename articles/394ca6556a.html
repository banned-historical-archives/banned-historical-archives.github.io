<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中华全国总工会关于私营工商企业劳资双方订立集体合同的暂行办法","authors":[],"dates":[{"year":1949,"month":11,"day":22}],"is_range_date":false,"parts":[{"text":"中华全国总工会关于私营工商企业劳资双方订立集体合同的暂行办法","type":"title"},{"text":"第一条  为了正确处理劳资关系，解决劳资争议，应由各行各业劳资双方所组织之团体，根据平等自愿协商原则，签订集体合同，明确规定劳资双方之权利义务及劳动条件；以发挥职工劳动热忱与资方对生产经营之积极性，实现“发展生产，劳资两利”之目的。","type":"paragraph"},{"text":"第二条  各行各业之劳资集体合同，系以规定劳动关系为目的之一定时间的书面合同，其主要内容应包括下列各项：","type":"paragraph"},{"text":"1．雇佣与解雇手续。","type":"paragraph"},{"text":"2．规定厂规、铺规的手续及内容。","type":"paragraph"},{"text":"3．工资。","type":"paragraph"},{"text":"4．工作时间及假期。","type":"paragraph"},{"text":"5．女工童工问题。","type":"paragraph"},{"text":"6．有关劳动保护与职工福利问题等。","type":"paragraph"},{"text":"第三条  订立劳资集体合同，应依下列原则及手续进行之。","type":"paragraph"},{"text":"一、劳资双方讨论签订集体合同应采取如下步骤：","type":"paragraph"},{"text":"甲、由各行各业劳资双方所组织之团体，各自召开全体会议或代表会议，选举委员会拟定各自之集体合同草案。","type":"paragraph"},{"text":"乙、由劳资双方各自推选能代表全体利益的同等数量之代表，根据双方自行拟定之合同方案，在平等自愿的基础上采取民主协商方法，逐条研究，取得协议。在协商时应邀请当地人民政府之劳动局派员参加。","type":"paragraph"},{"text":"丙、获得初步协议后，由劳资双方各自召集全体会议或代表会议，讨论修改，再将修改意见提交双方代表讨论协商，再次取得协议。","type":"paragraph"},{"text":"丁、双方代表为向各自所代表之全体负责起见，复将二次协议交由劳资双方各自召开之全体会议或代表会议讨论通过，然后由双方代表签字申请劳动局批准施行。","type":"paragraph"},{"text":"二、集体合同公布时须载明订签地点、时间、双方团体名称、代表姓名、有效期限（即自某年某月某日起至某年某月某日止）。","type":"paragraph"},{"text":"第四条  集体合同签订并经当地人民政府之劳动局批准后，在有效期间内适用于订立该合同之各产业行业双方全体人员，均须一律遵守执行。","type":"paragraph"},{"text":"第五条  合同有效期满后，如双方仍愿继续执行者，得由双方推举代表签订合同延期协定，申请劳动局备案后延长有效期限。在合同有效期内，劳资双方之任何一方，因特殊理由，提出修改或废止意见时，得由双方推举代表协商解决之。","type":"paragraph"},{"text":"如不能达到一致意见得申请劳动局调解或仲裁解决之。","type":"paragraph"},{"text":"第六条  在某一行业或产业之总的集体合同订立后，各该行业或产业之工厂商店，可签订本企业单独的集体合同，但此项集体合同之内容，不得与该行业总的集体合同相抵触，并须取得各该工会与同业公会之同意。","type":"paragraph"},{"text":"第七条  各工厂商店劳资双方单独订立之集体合同，有下列情况之一者得宣告废止。","type":"paragraph"},{"text":"甲、合同有效期满者。","type":"paragraph"},{"text":"乙、工厂、商店因遭受不可抗拒之灾害而停办者。","type":"paragraph"},{"text":"丙、经政府批准转业或缩小生产者。","type":"paragraph"},{"text":"丁、双方同意者。","type":"paragraph"},{"text":"第八条  本办法自公布之日起施行。","type":"paragraph"},{"text":"第九条  本办法解释及修改之权，军管时期属当地之军管会，军管时期结束，属当地之人民政府劳动局。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"394ca6556a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
