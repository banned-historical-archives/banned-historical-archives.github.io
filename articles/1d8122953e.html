rs":["王震"],"dates":[{"year":1976,"month":12,"day":19}],"is_range_date":false,"parts":[{"text":"王震会见朝鲜科学院代表团时的谈话摘录","type":"title"},{"text":"王震","type":"authors"},{"text":"〖地点：人民大会堂北京厅。〗","type":"appellation"},{"text":"1974年中国科学院代表团应邀访问了朝鲜，那时候是柳忠阳率团去的。现在他没有出面见朝鲜同志，因为他不是好人，是坏人，现在已隔离审查。我们那些老科学家也受他欺负，他是四人帮反党集团的爪牙，在无产阶级专政历史时期，有些人就是要党票，想要官位，四人帮带坏了一批青年，大部分人是可以教育过来的，有些人教育过来得花很大力气，这当然是一小撮。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王震","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d8122953e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
