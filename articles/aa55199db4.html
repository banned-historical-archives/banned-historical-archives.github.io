art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋同志的讲话","authors":[],"parts":[{"type":"paragraph","text":"尊敬的波尔布特同志，"},{"type":"paragraph","text":"尊敬的柬埔寨党政代表团全体同志，"},{"type":"paragraph","text":"同志们，朋友们："},{"type":"paragraph","text":"由波尔布特同志率领的柬埔寨党政代表团对我国的正式友好访问，就要结束了。今晚，我们应邀参加这个盛大的宴会，有机会再次同柬埔寨战友欢聚一堂，感到非常高兴。波尔布特同志这次来我国访问，对我们党，我们的国家，我们的人民，讲了许多赞扬的话，给予我们有力的支持。对此，我以中国共产党、中国政府和中国人民的名义，向你表示衷心的感谢。在访问期间，我们双方在同志般的亲切气氛中，就进一步发展我们两党、两国和两国人民之间的革命团结和友好合作，以及双方共同关心的其他问题，进行了真诚友好的会谈，取得了满意的积极的成果，符合中柬两党、两国的根本利益。中柬两国战友还在一起欢庆了柬埔寨共产党诞生十七周年和中华人民共和国国庆二十八周年这两个光辉的节日。你们作为英雄的柬埔寨人民的光荣使者，带来了柬埔寨人民的胜利喜讯，带来了对中国人民的深厚情谊，使我们受到巨大鼓舞。你们的访问，为增进中柬两党、两国和两国人民的伟大友谊作出了重大贡献，对世界人民反帝、反殖、反霸斗争，无疑将会产生积极的影响。"},{"type":"paragraph","text":"中柬两党是亲密的马列主义兄弟党。中柬两国是友好的社会主义国家。在长期的革命斗争中，马列主义的真理，使我们紧密地团结在一起；共产主义的崇高理想，鼓舞着我们并肩前进。一九七五年六月二十一日，中国人民的伟大领袖和导师毛泽东主席同波尔布特同志在北京的历史性会见，使中柬两党两国友好关系进入了一个新时期，具有深远的意义。我们将遵照毛主席的生前教导，不遗余力地继续加强中柬两党两国之间的友好合作关系，我们深信，建立在马列主义原则基础上的这种关系，必将不断获得巩固和发展。中国各族人民，在我们党中央的领导下，决心高举毛主席的伟大旗帜，坚持党的十一大路线，为把我国建成一个现代化的社会主义强国而努力奋斗。"},{"type":"paragraph","text":"你们就要离开我国，去兄弟的朝鲜民主主义人民共和国进行访问了，我们预祝你们访问朝鲜获得圆满成功。"},{"type":"paragraph","text":"最后，我提议："},{"type":"paragraph","text":"为波尔布特同志率领的柬埔寨党政代表团访问我国圆满成功，"},{"type":"paragraph","text":"为中柬两党、两国和两国人民之间的革命友谊和战斗团结不断发展，"},{"type":"paragraph","text":"为柬埔寨人民在社会主义革命和社会主义建设中不断取得新的胜利，"},{"type":"paragraph","text":"为波尔布特同志的健康、长寿，"},{"type":"paragraph","text":"为柬埔寨党政代表团全体同志的健康，"},{"type":"paragraph","text":"为各位使节和夫人的健康，"},{"type":"paragraph","text":"为在座的同志们、朋友们的健康，"},{"type":"paragraph","text":"干杯！"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa55199db4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
