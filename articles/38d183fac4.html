" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1495","name":"中共江西省委办公厅转发省委组织部、宣传部、统战部、省公安厅、民政厅《关于全省处理右派问题工作情况和遗留问题处理意见的报告》（节录）","author":"江西省委组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共江西省委办公厅转发省委组织部、宣传部、统战部、省公安厅、民政厅《关于全省处理右派问题工作情况和遗留问题处理意见的报告》（节录）","dates":[{"year":1980,"month":2,"day":1}],"is_range_date":false,"authors":["江西省委公安厅","江西省委宣传部","江西省委民政厅","江西省委组织部","江西省委统战部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共江西省纪律检查委员会，中共江西省委党史资料征集委员会，江西平反冤假错案，67-69","tags":[{"name":"城镇","type":"主题/事件"},{"name":"户口","type":"主题/事件"},{"name":"商品粮","type":"主题/事件"},{"name":"上访","type":"主题/事件"},{"name":"退休","type":"主题/事件"},{"name":"信访","type":"主题/事件"},{"name":"右派","type":"主题/事件"}],"parts":[{"type":"title","text":"中共江西省委办公厅转发省委组织部、宣传部、统战部、省公安厅、民政厅《关于全省处理右派问题工作情况和遗留问题处理意见的报告》（节录）"},{"type":"subtitle","text":"（1980年2月1日）"},{"type":"paragraph","text":"经省委领导同志同意，现将省委组织部、宣传部、统战部、省公安厅、民政厅《关于全省处理右派问题工作情况和遗留问题处理意见的报告》转发你们，请参照执行。"},{"type":"paragraph","text":"附：关于全省处理右派问题工作情况和遗留问题处理意见的报告"},{"type":"paragraph","text":"全省处理右派问题的工作，从1978年5月开始，至今年1月中旬已胜利完成。1月19日，省委摘帽工作领导小组召开了会议，听取了省委摘帽办公室的工作汇报，对遗留问题作了研究，提出了处理意见，现报告如下："},{"type":"paragraph","text":"一、处理右派问题工作完成情况（略）"},{"type":"paragraph","text":"二、 遗留问题及处理意见"},{"type":"paragraph","text":"就全省处理右派工作总的情况来看，省委摘帽工作办公室可以撤销。所遗留下来的一些问题，如清理人事档案材料的问题；少数人还正在法院复查原判的问题；某些人对于维持原结论不变有意见而上访申诉的问题；少数人安置工作尚未落实的问题；有些已死亡的人的抚恤费还未处理的问题；有些人因文化大革命中被停发的工资不予补发，过去欠下的债务无力偿还，生活发生困难，需要补助和社会救济的问题；有些因右派问题受株连的家属子女，应该恢复城镇户口、恢复商品粮的问题等等，有关部门要切实负责，继续按照党的有关政策规定，善始善终做好。"},{"type":"paragraph","text":"如何做好交接工作，提出以下具体意见："},{"type":"paragraph","text":"（一）关于清理反右派斗争中的人事档案材料问题，应由原划单位（原划单位已撤销的，由现工作单位）按照中央组织部[1979]组通字第51号文件规定，负责进行清理。"},{"type":"paragraph","text":"(二) 属于审改方面的上访申诉、各种统计数字、文书档案，由各级统战部门负责受理并加以保存。"},{"type":"paragraph","text":"(三) 有关安置工作、退休的问题，干部由各级组织、人事部门负责办理；工人由各级劳动部门负责办理。"},{"type":"paragraph","text":"(四) 对原已判刑需要复查的，由原判法院负责受理。"},{"type":"paragraph","text":"(五) 对抚恤、社会救济等问题，由各级民政部门按规定负责受理。"},{"type":"paragraph","text":"(六) 需要恢复城镇户口、恢复商品粮的问题，分别由各级公安、粮食部门负责受理。"},{"type":"paragraph","text":"(七) 省委摘帽办公室2月15日宣布撤销，印章停止使用，由省委统战部保存。"},{"type":"paragraph","text":"以上报告，如无不妥，请批转各地执行。"},{"type":"paragraph","text":"省委组织部"},{"type":"paragraph","text":"省委宣传部"},{"type":"paragraph","text":"省委统战部"},{"type":"paragraph","text":"省公安厅"},{"type":"paragraph","text":"省民政厅"},{"type":"paragraph","text":"1980年1月26日"}],"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38d183fac4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
