ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"归缓包头大同等地必须占领","alias":"","parts":[{"type":"paragraph","text":"归绥包头大同等地必须占领1]"},{"type":"paragraph","text":"（1945年10月22日）聂、萧、罗、刘，并告贺、李："},{"type":"paragraph","text":"（一）二十一日二十二时电悉。你们取得初步胜利，甚为欣慰。（二）傅部主力必须歼灭，归绥、包头、五原、固阳必须占领，如有可能则占领临河。大同必须占领，如能速占则速占之，否则待回师时再占。请按此方针部署作战。如傅部固守归绥，则先将包头、五原、固阳占领，使傅部绝粮突围，然后歼灭之。如我能迅进，可能速占归绥。（三）二局情报，归绥城内混乱恐慌，陶林被姚喆4占领。（四）速令冀普、冀中、平北各组第二批野战军，每处至少一万，共三万，候令开至平北作战。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十二日二十时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋察冀军区司令员兼政治委员聂荣臻、副司令员萧克、副政治委员兼政治部主任罗瑞卿和副政治委员刘澜涛并告晋绥野战军司令员贺龙、副政治委员李井泉的电报。"},{"type":"paragraph","text":"[2]傅，指傅作义，当时任国民党军第十二战区司令长官。"},{"type":"paragraph","text":"[3]陶林，旧县名，1954年撤销，辖区划归内蒙古察哈尔右翼后旗和察哈尔右翼中旗。原县治陶林镇为察哈尔右翼中旗旗府。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":465,"page_end":465},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"414ac4e81d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
