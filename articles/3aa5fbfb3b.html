0,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"岚山吟"},{"type":"paragraph","text":"符浩"},{"type":"paragraph","text":"一九七八年十月，中日和平友好条约正式换文之后，我随邓小平副总理游览日本著名风景区京都之岚山；一九七九年四月，我又随邓颖超副委员长到岚山参加了纪念周恩来总理诗碑落成仪式。今天，再一次随华国锋总理一行访问岚山。华总理在诗碑傍手植周总理生前喜爱的樱花树一株留念。兹赋此诗，以纪其盛。"},{"type":"paragraph","text":"三次到岚山，"},{"type":"paragraph","text":"情思更绵绵。"},{"type":"paragraph","text":"为作岚山吟，"},{"type":"paragraph","text":"诗成意翩翩。"},{"type":"paragraph","text":"又是烟雨满岚山，"},{"type":"paragraph","text":"秦筝和歌忆前贤。"},{"type":"paragraph","text":"喜看破壁酬生死，"},{"type":"paragraph","text":"几见乾坤转地天。"},{"type":"paragraph","text":"前年条约文始换，"},{"type":"paragraph","text":"去岁诗碑石新建。"},{"type":"paragraph","text":"今日又植和平树，"},{"type":"paragraph","text":"花开友谊万万年。"},{"type":"paragraph","text":"一九八○年五月三十一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3aa5fbfb3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
