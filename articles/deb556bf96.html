script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国工人罢工斗争沉重打击垄断资产阶级  给工党政府向工人转嫁财经困难的阴谋以有力反击","authors":[],"dates":[{"year":1968,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国工人罢工斗争沉重打击垄断资产阶级"},{"type":"paragraph","text":"给工党政府向工人转嫁财经困难的阴谋以有力反击"},{"type":"paragraph","text":"据新华社伦敦十四日电　最近一个时期，英国工人阶级罢工斗争的浪潮又出现新的高涨，给垄断资产阶级及其代理人工党政府以沉重的打击。"},{"type":"paragraph","text":"继去年秋季英国码头工人举行罢工使英国垄断资本特别在出口贸易方面遭到重大损失后，今年五月，英国全国各地的三百万机械工人又举行罢工，抗议资本家拒绝他们提出的增加工资的合理要求，使得英国汽车工业、机器制造业、五金工业、造船业、飞机工业和电工器材制造业的许多工厂停工减产。特别是六月份以来，罢工浪潮进一步高涨。从六月二十三日午夜到七月六日，英国约三十万铁路员工掀起了声势浩大的怠工运动，拒绝加班加点，拒绝在星期日和假日工作，以抗议英国铁路当局不但年复一年地拒不答应他们关于增加工资的合理要求，甚至还横蛮无理地提出以增加劳动强度和减少劳动力作为增加工资的先决条件。这次全国性的铁路员工大怠工开始后，英国全国铁路交通运输很快就陷于瘫痪。在怠工期间，英国的十个火车站，没有一次列车是正点到达或开出的，而数以百计的小车站则被迫关闭。六月二十九日晚到七月一日清晨，全国六千多列火车还停驶三十二小时，抗议铁路当局妄图以不发给工资来威胁怠工的铁路员工。"},{"type":"paragraph","text":"在英国铁路员工怠工的同时，英国海外航空公司一千名飞机驾驶员也从六月十六日到七月一日举行了罢工，要求增加工资；美资福特汽车公司戴根纳姆工厂和哈勒伍德工厂的三百八十多名女工为争取男女同工同酬也进行了罢工。此外，英国全国各地几十个大小城市的公共汽车司机，也还在坚持他们从去年十月就开始的要求增加工资的斗争。"},{"type":"paragraph","text":"英国工人再接再厉地奋起斗争，是对深陷在政治、经济危机中的工党政府变本加厉向工人阶级转嫁财政经济困难的反击。"},{"type":"paragraph","text":"去年十一月英镑贬值后，英国的财政经济状况持续恶化，工业生产的总趋势仍然是停滞不前。特别是被英国垄断资本家视为英国经济生命线的对外贸易，今年上半年的逆差比去年下半年又增加了三百万镑。使得英国国际收支赤字迅速扩大，并导致黄金外汇储备的进一步枯竭。"},{"type":"paragraph","text":"面对着日益加深的财政经济危机，英国工党政府一方面在物价普遍猛涨的情况下继续执行冻结工资的反动政策，一方面大肆增加苛捐杂税，今年四月通过的新预算，就规定增加税收九亿二千三百万英镑，创造了英国政府增税幅度的最高纪录。与此同时，工党政府还把越来越多的英国工人推入失业大军，据统计，今年六月，英国失业人数已达五十一万七千人，是一九四○年以来六月份的最高数字。英国统治集团还加紧利用警察、法庭、监狱等来镇压为维护生活权利而斗争的工人。正是这种残酷的迫害和剥削，激起了英国劳动人民越来越强烈的反抗，不断掀起罢工的浪潮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"deb556bf96"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
