<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoistlibrary","name":"马列毛图书馆","internal":false,"official":false,"type":"db","author":"网络资料","files":[""],"article":{"title":"纳萨尔巴里斗争一周年","authors":["查鲁·马宗达"],"dates":[{"year":1968}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"查鲁·马宗达 一九六八年"},{"type":"paragraph","text":"纳萨尔巴里农民斗争已经开始整整一年了。这场斗争不同于其他所有的农民斗争。其区别在哪里?农民们一直在与各种不公和压迫作斗争。而这次农民第一次不仅为部分要求而斗争，也为夺取国家政权而斗争。如果说纳萨尔巴里农民斗争给了我们什么经验教训的话，那就是:必须进行武装斗争，不是为了土地、庄稼等等东西，而是为了夺取国家政权。正是这一点赋予了纳萨尔巴里斗争以独特性。不同地区的农民必须以某种方式做好准备，设法打碎各自地区的国家机器。正是在纳萨尔巴里，这条道路在印度农民斗争史上首次被采用。换句话说，革命的时代已经来临，今年是这个时代的第一年。正因如此，各国的革命者都发自内心地欢迎纳萨尔巴里斗争。"},{"type":"paragraph","text":"印度已经成为帝国主义和修正主义的据点，今天又成了反动派反对人民解放斗争的据点。这就是为什么纳萨尔巴里斗争不仅是一国的斗争，更是一场具有国际意义的斗争。这场斗争是艰苦的，我们选择的道路更不是一帆风顺的，革命之路也是艰苦的，困难、危险甚至撤退都可能发生。但是，那些被新的国际主义精神武装起来的农民却蔑视这一切，拒绝投降。他们继续坚持他们的斗争道路。"},{"type":"paragraph","text":"我们在过去一年中的经验表明，这一小块地区斗争的消息已传遍印度每个角落。现存的每一个政党都反对纳萨尔巴里斗争，但人民正在思考这场斗争的方方面面，并站出来走上这场斗争所指出的道路。纳萨尔巴里斗争的英雄领导人仍然活着。反动政府尽管使出浑身解数，却至今未能消灭他们。这说明毛主席的话是多么正确:“一切反动派都是纸老虎，。看起来，反动派的样子是可怕的，但实际上并没有什么了不起的力量。”"},{"type":"paragraph","text":"毛主席说过:“殖民主义、帝国主义和一切剥削制度的彻底崩溃，世界上一切被压迫人民、被压迫民族的彻底翻身，已经为期不远了。”"},{"type":"paragraph","text":"让我们勇往直前，迎接解放的灿烂阳光!"},{"type":"paragraph","text":""}],"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd05fb66fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
