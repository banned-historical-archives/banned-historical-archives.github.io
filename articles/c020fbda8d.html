script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南劳动党中央政治局委员阮志清发表讲话  号召青年学生下乡参加农业生产  指出必须提高青年的社会主义思想反对资产阶级思想","authors":[],"dates":[{"year":1963,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南劳动党中央政治局委员阮志清发表讲话"},{"type":"paragraph","text":"号召青年学生下乡参加农业生产"},{"type":"paragraph","text":"指出必须提高青年的社会主义思想反对资产阶级思想"},{"type":"paragraph","text":"新华社河内电　据此间报纸六日报道，越南劳动党中央政治局委员阮志清，最近在越南劳动青年团中央召开的一次会议上的讲话中，号召青年学生踊跃下乡，参加农业生产。"},{"type":"paragraph","text":"越南劳动青年团中央召开的这次会议，讨论了在改进农业社管理、改进技术运动中青年团的工作问题。"},{"type":"paragraph","text":"阮志清在讲话中着重谈到动员青年，其中包括大中学生积极参加农业生产的问题。"},{"type":"paragraph","text":"阮志清说，目前，我国农村正需要许多具有文化水平的青年。因此，我们需要动员成万名的初中、高中学生和成千名大学生回农村去。劳动青年团必须教育农村青年热爱家乡，热爱田园，热爱农业社，积极参加农业生产，建设新农村。我们需要使青年们、特别是农村青年们明白，我们所以能够有今天的日子，是我们父兄不怕艰难困苦、不惜流血牺牲进行革命换来的。继承革命事业，建设农村新生活，是青年一代的责任。我们要使青年认清自己的责任，看到自己的光荣任务，同时要对建设自己的家乡怀有巨大而切实的抱负和理想。"},{"type":"paragraph","text":"阮志清说，当前对青年教育工作应注意的另一点是，必须发扬批评和自我批评精神，展开反对个人主义思想的斗争。这种思想主要表现在怕困难、怕艰苦、对农村没有责任感等方面。目前，我们必须在青年中提高社会主义思想，反对资产阶级思想和小资产阶级思想，使青年们树立正确的革命态度：“哪里党需要，青年到那里。什么工作难，青年来担当。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c020fbda8d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
