ates":[{"year":1978,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京七月六日电　位于南太平洋的所罗门群岛定于七月七日宣布独立。华国锋总理于七月六日打电报给所罗门群岛总理彼得·凯尼洛雷亚表示热烈祝贺，并通知他中国政府决定承认所罗门群岛。贺电全文如下:霍尼亚拉所罗门群岛总理彼得·凯尼洛雷亚阁下:"},{"type":"paragraph","text":"在所罗门群岛宣布独立的时候，我代表中华人民共和国政府和人民，向阁下，向所罗门群岛政府和人民表示热烈的祝贺，并愿借此机会通知阁下，中国政府决定承认所罗门群岛。祝所罗门群岛国家繁荣，人民幸福。祝中所两国人民的友谊不断发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理　华国锋"},{"type":"paragraph","text":"一九七八年七月六日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69e51082b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
