要性","authors":[],"dates":[{"year":1958,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社索非亚3日电】　保共第七次代表大会今天继续开会。"},{"type":"paragraph","text":"上午，中央检查委员会主席卡特兰吉耶夫向大会作了中央检查委员会的总结报告。"},{"type":"paragraph","text":"接着，苏联共产党代表团团长赫鲁晓夫同志在大会上讲了话。"},{"type":"paragraph","text":"当他走向讲台时，全体起立，发出长时间的鼓掌，并且高呼“乌拉!”“永恒的友谊!”“苏联共产党万岁!”"},{"type":"paragraph","text":"赫鲁晓夫在讲话中热烈祝贺保共第七次代表大会的召开，祝贺保加利亚人民在社会主义建设中的巨大成就。他以具体事实阐述了社会主义制度对资本主义制度的无比优越性，社会主义阵营以及各兄弟共产党和工人党团结的重要性。他的报告有很大一部分是严正批判南共纲领草案中的修正主义观点以及南共领导集团危害国际工人运动的分裂活动。赫鲁晓夫还宣读了苏共中央致保共第七次代表大会的贺电。他的讲话不断为热烈的掌声所打断。"},{"type":"paragraph","text":"赫鲁晓夫讲话后，全体起立，长时间的鼓掌。在热烈的掌声和欢呼声中，赫鲁晓夫同保共第一书记日夫科夫拥抱，接吻。"},{"type":"paragraph","text":"在经过短时间的休息后，会议开始讨论保共中央委员会的总结报告和中央检查委员会的总结报告。"},{"type":"paragraph","text":"在下午会议上，中国共产党代表团团长董必武同志首先致祝词。当他走向讲坛时，全场起立，发出长时间的鼓掌声，欢呼“乌拉!”“永恒的友谊!”他的讲话受到代表和来宾们的热烈欢迎。"},{"type":"paragraph","text":"接着，保加利亚农民联盟书记特莱科夫代表农民联盟向大会致祝词。"},{"type":"paragraph","text":"会议随后继续讨论中央委员会和中央检查委员会的总结报告。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4824549c6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
