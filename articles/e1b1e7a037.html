art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"对毛主席指示领会越深贯彻执行就越自觉","authors":["活学活用毛泽东思想积极分子/指导员魏世达〖HH/换行〗DW：南京部队"],"parts":[{"type":"paragraph","text":"在贯彻执行毛主席指示的过程中，我深深体会到：对毛主席指示学习得越认真，领会得越深刻，贯彻执行就越自觉、越坚决。"},{"type":"paragraph","text":"毛主席关于“共产党基本的一条，就是直接依靠广大革命人民群众”和“要注意，要他们不要脱离群众，不要脱产，又要工作”的指示发表以后，我们连有的干部认为，连队干部天天和战士在一起，联系群众的问题不大。由于有这种思想，学习时就不大认真，理解得也不深，行动上落实就不够自觉。针对这个情况，党支部及时举办了毛泽东思想学习班，组织大家反复学习毛主席的这两条指示，又重温了毛主席的伟大教导：“必须坚持干部参加集体生产劳动的制度。我们党和国家的干部是普通劳动者，而不是骑在人民头上的老爷。干部通过参加集体生产劳动，同劳动人民保持最广泛的、经常的、密切的联系。这是社会主义制度下一件带根本性的大事，它有助于克服官僚主义，防止修正主义和教条主义”，狠批叛徒刘少奇的“入党做官论”，使大家认识到：毛主席的指示是对广大干部的最大关怀、最大爱护，是防修反修的锐利思想武器。我们连队干部都是从战士中提拔起来的，和战士的关系是融洽的、密切的。但是，如果不坚决照毛主席指示办事，放松思想改造，就可能逐渐脱离群众。只有把毛主席指示化为自己的灵魂，不断提高两条路线斗争觉悟，才能永远不脱离群众。"},{"type":"paragraph","text":"通过学习讨论，大家深刻领会了毛主席指示的伟大意义，提高了照毛主席指示办事的自觉性。大家都分头住到班排，和战士们一起学习毛主席著作，一起劳动，一起斗私批修。今年春节后，连里决定把一个小水池扩大成大塘，蓄水繁殖猪饲料。当时天气很冷，寒风刺骨，水和泥冻在一起。我们连的干部都带头积极参加劳动，和战士们开展劳动竞赛。在干部带动下，很快就完成了任务。"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1b1e7a037"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
