tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"诗坛聚会鉴赏毛泽东诗词","authors":[],"parts":[{"type":"paragraph","text":"据新华社北京12月22日电 诗坛前辈与文界同仁今日聚会京郊樊家村，对毛泽东所著诗词作品评、鉴赏。"},{"type":"paragraph","text":"自1957年毛泽东诗词18首披露于《诗刊》后，普及国中并远涉海外。今日发言中，人称“不朽之作”，又是“研究、认识毛泽东以至认识时代不容忽视的方面”。"},{"type":"paragraph","text":"又云，毛泽东诗词所显示之气魄，皆因诗作与人民命运、与中华民族命运休戚相共，当今新诗应从中受到启发、教育。"},{"type":"paragraph","text":"由诗词论及毛泽东文艺思想。与会者认为，他在诗作及文艺思想中，表现无产阶级世界观，表现人民的事业，对迄今建设有中国特色的社会主义文艺，仍具积极意义。"},{"type":"paragraph","text":"与会者有艾青、臧克家、姚雪垠、阮章竞、林默涵、贺敬之、李瑛、管桦、叶君健等近百人。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc2a0ec24a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
