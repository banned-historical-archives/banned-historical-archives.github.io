"dates":[{"year":1976,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋总理举行盛大宴会"},{"type":"paragraph","text":"热烈欢迎穆巴拉克副总统等贵宾"},{"type":"paragraph","text":"乌兰夫副委员长等作陪华国锋总理穆巴拉克副总统称颂在反对帝国主义、霸权主义和犹太复国主义斗争中，中埃友谊和友好合作关系不断发展"},{"type":"paragraph","text":"新华社一九七六年四月十九日讯　国务院总理华国锋今天晚上在人民大会堂举行盛大宴会，热烈欢迎阿拉伯埃及共和国副总统胡斯尼·穆巴拉克和夫人以及由穆巴拉克副总统率领的埃及高级代表团。"},{"type":"paragraph","text":"出席宴会作陪的有人大常委会副委员长乌兰夫，外交部部长乔冠华、副部长何英，中国人民解放军副总参谋长张才千，外贸部副部长陈洁，外经部副部长陈慕华等。"},{"type":"paragraph","text":"埃及驻中国大使阿卜德和大使馆外交官员，代表团的随行记者和专机机组人员，应邀出席宴会。"},{"type":"paragraph","text":"今晚，人民大会堂灯火辉煌。宴会厅里并排悬挂着埃及国旗和中国国旗。"},{"type":"paragraph","text":"华国锋总理和穆巴拉克副总统先后在宴会上讲话，热情称颂在反对帝国主义、霸权主义和犹太复国主义的斗争中，中埃两国人民之间存在的深厚友谊和两国的友好合作关系得到不断发展"},{"type":"paragraph","text":"（讲话全文见第二版）。"},{"type":"paragraph","text":"他们讲话以后，乐队分别奏埃及国歌和中国国歌。宴会自始至终充满中埃两国人民友好的热烈气氛。席间，乐队演奏了中埃两国乐曲。"},{"type":"paragraph","text":"出席宴会的还有政府有关部门、中国人民解放军、北京市革命委员会、对外友协等方面的负责人田维新、郝中士、周宏宝、王冶秋、黄树则、李青川、缪海棱、王寿仁、杨列慎、黄作珍、傅玉芳、杨骥，以及中国伊斯兰教协会负责人张杰。"},{"type":"paragraph","text":"各国驻中国的外交使节也应邀出席宴会。"},{"type":"paragraph","text":"今天上午，穆巴拉克副总统等埃及贵宾由何英副外长陪同，参观了地下防空工事，游览了天坛。下午，穆巴拉克副总统的夫人由北京市妇女联合会主任傅玉芳陪同，游览了颐和园。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0c053ee53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
