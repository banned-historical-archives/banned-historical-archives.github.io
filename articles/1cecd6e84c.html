ors":[],"dates":[{"year":1960,"month":9,"day":20}],"is_range_date":false,"parts":[{"text":"林彪关于学校教育的两个原则","type":"title"},{"text":"学校教育要实行两个原则：一要少而精，二要短而少。学制要改革，时间不要太长。干部老住学校，就会脱离实际，越学越空。教育内容也要精简，重要的东西不在多，而在反复地学，学会运用，多讲不如多练。少而精的精，就是要求抓住精华，学得精通。无论军事、政治、文化教育都要少而精，部队、机关、院校的教育也都要少而精。这样，才能费力小而收获大。用得着就学，用不着就不学，把急需的知识先搞到手。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cecd6e84c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
