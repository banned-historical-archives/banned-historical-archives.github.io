ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"边区财政难关已渡过","alias":"","parts":[{"type":"paragraph","text":"边区财政难关已渡过"},{"type":"paragraph","text":"（1943年2月9日）周、林："},{"type":"paragraph","text":"（一）胡宗南要求派人驻延，朱已复电答应。胡盼林回时与他长谈，林到西安后可多住几天。（二）李仙洲数团到鲁西后受日寇严重打击。（三）韩德勤派人与黄克诚联络，要求合作抗日。（四）边区财政难关已渡过，现党政军积蓄资产值边币五万万以上（合法币二万万五千万以上），今年决定大发展农、工、盐、畜生产，提出丰衣足食口号，如不遭旱大有办法，人民经济亦大有发展，可达到丰衣足食。边区高干会（党政军民三百余人）展开彻底的自我批评，对过去历史、当前任务（生产与教育）、整顿三风、精兵简政、统一领导诸问题都获圆满解决，气象一新，各事均好办了。"},{"type":"paragraph","text":"毛泽东佳林一胡宗南要求辰人些运朱已爱电应胡盼林"},{"type":"paragraph","text":"西安后了引佳天仙洲回洋点他"},{"type":"paragraph","text":"荔辰人尔黄支诚到等形爱受男术合你抗习有办汽龙精宾房"},{"type":"paragraph","text":"当前任治(生虎东样气（芝政军展三司"},{"type":"paragraph","text":"公）教育)，整虹三风，毛泽东致周恩来、林彪电的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":2,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":509,"page_end":510},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4731b9f116"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
