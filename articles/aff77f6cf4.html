<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"热河省在逃的反革命分子破坏活动情况","authors":[],"dates":[{"year":1954,"month":9,"day":24}],"is_range_date":false,"parts":[{"text":"热河省在逃的反革命分子破坏活动情况","type":"title"},{"text":"【热河分社24日讯】今年以来，热河省各地在搜捕外逃反革命分子的工作中，曾多次发现漏网的反革命分子以各种方法企图长期隐蔽，伺机进行各种破坏活动。","type":"paragraph"},{"text":"青龙县伪自卫团长赵彦成，在镇压反革命时曾携枪逃跑。后看镇压反革命的运动高潮已过，便在1953年春潜回本地，在其可靠的亲友高永学（富农）、于国清（土匪）等四家轮流匿藏，夜间经常移动住址或持枪回家，企图长期顽抗。今年7月间他在高家隐蔽时，被民兵发觉前去逮捕，赵犯开枪拒捕，把民兵队长打伤，且跃窗而出，随走随打；弹尽又和民兵拼死扭打，又打伤民兵一名，最后才被捕获。","type":"paragraph"},{"text":"建平县蒋匪花子队长杨奎，为了逃避打击，对我报复。勾结土匪崔红仁探取“游击”形式，活动于朝阳、辽西一带，专事偷盗耕畜，破坏农业生产。今年6月始被捕归案。","type":"paragraph"},{"text":"平泉县蒋匪军统少尉特务陈明远，在镇压反革命时藏入他家炕洞中达三年之久，今年5月始被我发觉捕获。逮捕时，从洞中搜出陈犯与军统特务头子贾迪生（已枪决）之子贾士杰互相联系的信件和载有朝鲜战争消息的我们的报纸。","type":"paragraph"},{"text":"朝阳县捕获的匪首王岚，在区与区交界的偏僻山沟中买通窝主，隐藏了3年，并日伏夜出，进行刑事犯罪活动。承德市发现伪警察署长宫殿英在家中顶棚上藏了四年；一贯道公共坛主吴国瑞藏在家中夹皮墙内近六年。最近经过向他们的家属动员，交待政策，这二犯才出面坦白登记。","type":"paragraph"},{"text":"建平县最近从房身村天主堂管事邹学孟（混进村政权，当村干）家中，取出长短枪各一只，子弹2200多发，及银洋、布匹等物资一部。邹已替天主教保存这些武器、物资达数年之久，打算图谋不轨。另外，8月12日夜一时，敖汉旗小河沿银行营业所突然闯进土匪一人，抢走马三八枪一支，子弹三颗和现款2000万元，临走时还鸣枪威胁。凌源县七区小学教师杜彩凤（女）在6月间回家，曾被土匪强奸后用利器砍死，并抢走她随身所带的一些零星财务。","type":"paragraph"},{"text":"省公安厅除组织力量破获上述银行营业所的抢劫和对女教师的奸杀案件外，并指示各市、县、旗公安机关，教育所属干部和广大人民，提高警惕，注意发现反革命分子的破坏运动，加强搜捕工作，彻底肃清残存敌人。","type":"paragraph"},{"text":" （朱成根据公安厅报告编写）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年9月30日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aff77f6cf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
