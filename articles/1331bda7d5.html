<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级腐朽思想 侵蚀重庆文教部门","authors":[],"dates":[{"year":1952,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【重庆讯】　重庆区文教界反贪污、反浪费、反官僚主义运动，所揭露的若干事实证明:一向被认为‘清苦’、‘问题不大’的文教部门，不但浪费现象很严重，贪污行为也相当普遍而严重。以重庆区的几个高等学校为例，贪污分子主要是贪污学校修建费和设备费，其次是贪污教职员工的薪津、人民助学金和学生伙食费等。贪污的情节也是很严重的。如西南农学院事务员游建国贪污达一百八十三次，出纳员何学林贪污八十九次，农产制造系讲师孙学敏贪污化学仪器。该院被贪污、浪费掉的款项竟占该院开办(一九五零年十一月)以来全部经费的百分之二十五。"},{"type":"paragraph","text":"文教部门的某些干部受资产阶级思想侵蚀是很深的。西南人民艺术学院医务所主任刘保信是十五年前就参加革命的，但一贯不努力学习，阶级觉悟很差，在资产阶级的猖狂进攻下，他腐化堕落了，他盗卖公家的药品，并腐化到乱嫖妓女，吃上唆唆。更严重的是西南人民科学馆主任李乐元等已堕落成为不法商人。一九五零年一月，北碚军管会接管该院前夕，李乐元和馆里的秘书席朝杰、会计向空群通同烧毁账册、单据，集体贪污公款(贪污数字正清查中)；接管后，他们又披着国家机关科学工作者的衣外，暗中经营米、布、煤生意，并偷漏国税。积压器材的浪费以西南军区文化部所属的印制厂、书报社、战斗文工团等单位为最严重。印制厂积压器材的总值达百亿元，其中油墨一项即达二十四亿元，所积存的各色油墨可供该厂用五至七年，由于保管不善被虫咬坏的只张值一亿元以上。西南画报社所积存的照像胶卷可供该社全体摄影记者用三十年。战斗文工团自设有七个小保管室，该室内积存的各色绸、缎、布、绒共有一百四十一疋；此外尚有大量的只张、文具、美术器材、音乐器材、服装、道具、化装油彩等物，其中绝大部分是购置来从未使用过的，并有许多已经不能使用。"},{"type":"paragraph","text":"西南人民艺术学院戏剧系和实验剧团存在严重的本位主义，实验剧团不从实际需要出发，盲目地乱购服装道具及各项器材，戏剧系也跟着盲目地购置。两单位虽然住在一起而且是共用一个礼堂，但几乎是任何家具什物都各有一套，彼此互不借用。"},{"type":"paragraph","text":"西南人民文工团的国乐器可谓应有尽有，而且大多数是从北京买来的，有的乐器是同样三、四套。但这些国乐器买来后也从未使用过，因为不少的乐队队员们认为搞国乐器的前途不大(?)，而必须西洋乐器才有好出路。于是该团又大量购置西洋乐器，现在该团乐队全体人员除人手一把小提琴外，还多出三把无法分配。该团在北京用四百多万元的高价买一架法国风琴，运回重庆后，才发现是七十年以前的出品，已衰老到根本不能用了。"},{"type":"paragraph","text":"一般的文艺机关团体在请客、办招待方面的浪费也是很大的。如西南文学艺术界联合会和重庆市文学艺术界联合会，在一九五一年内招待费的支出，为六千九百八十四万元，仅程砚秋先生来重庆，所花的招待费即达三千六百九十五万。此外，开一个临时性的座谈会或例会也要到大馆子去包席吃饭。"},{"type":"paragraph","text":"以上的事实，仅是许多事例中的几个比较突出的例子，这已足够说明文教部门贪污、浪费现象的严重程度了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1331bda7d5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
