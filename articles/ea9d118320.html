:["山西医学院学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——不同身份，不同对待","type":"title"},{"text":"山西医学院学生","type":"authors"},{"text":"党员发言，面部表情多么自然，有说有笑，标榜自己，会嫖会赌，会喝会穿，检查没有，略为谈谈，通过没有，真太简单。团员：我是团员，工作负责，响应国家召唤！就是群众工作比较难办，今后慢慢来改。","type":"paragraph"},{"text":"组织结论：注意，注意，以后再改。","type":"paragraph"},{"text":"群众：（要说得自己是最坏的一个）","type":"paragraph"},{"text":"我是群众，家庭皆是丑态，不求进步，思想落后，今后痛改前非，改头换面，经过严厉批评，才算了结，否则的话皆由组长乱下结论，作为档案，至今想想，还是提心吊胆。","type":"paragraph"},{"text":" 山西医学院  ×××","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea9d118320"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
