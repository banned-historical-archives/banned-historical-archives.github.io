" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"关于控制高级社发展数目的批语","alias":"","parts":[{"type":"paragraph","text":"关于控制高级社发展数目的批语"},{"type":"paragraph","text":"（1956年1月19日）"},{"type":"paragraph","text":"先送廖鲁言?同志办，同意王任重同志的意见，控制在一万个左右。再送人民日报邓拓同志和新华社吴冷西同志，注意在宣传方面加以控制。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十九日"},{"type":"paragraph","text":"[1]这个批语写在廖鲁言1956年1月19日转报王任重关于湖北省发展高级社的控制数目问题的电话请示给毛泽东的报告上。报告说，目前湖北正在召开地委书记会议，关于高级合作化问题，一部分同志赞成省委的计划，即春耕前发展1万个高级社（达到农户总数的25%到30%），秋收前后再发展；另一部分同志主张放手发展高级社，达到全部农户的70%或80%，基本上实现高级合作化。王任重认为，仍按省委计划发展比较稳当。廖鲁言在报告中表示同意王任重的意见。王任重在电话中还说，最近一些报纸的宣传对一部分同志的急躁情绪，也有某种刺激作用。"},{"type":"paragraph","text":"[2]廖鲁言，当时任中共中央农村工作部副部长、农业部部长。[3]王任重，当时任中共湖北省委第一书记。[4]邓拓，当时任《人民日报》总编辑。[5]吴冷西，当时任新华通讯社社长。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":1,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":161,"page_end":161},"tags":[{"name":"王任重","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02e26e94e8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
