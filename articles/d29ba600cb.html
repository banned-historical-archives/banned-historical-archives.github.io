"dates":[{"year":1978,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国外长和美国总统助理表示"},{"type":"paragraph","text":"欢迎中日缔结和平友好条约"},{"type":"paragraph","text":"新华社东京十一月六日电　法国外交部长德居兰戈十一月六日在东京表示欢迎日中两国签订和平友好条约。"},{"type":"paragraph","text":"德居兰戈外长为出席日法外长定期协商会议，于十一月五日到达日本。日法双方六日举行了第一次会谈。园田外相对德居兰戈外长说，日中双方都认为日中和平友好条约是有助于亚洲的和平和稳定的。德居兰戈外长赞扬日中两国缔结和平友好条约获得了“很大的成功”。他还说：“法国也要一方面同日本好好地交换意见，一方面发展同中国之间的关系。”"},{"type":"paragraph","text":"新华社东京十一月三日电　美国总统助理布热津斯基十一月二日在华盛顿向日本驻美国大使东乡文彦表示欢迎日中和平友好条约的缔结。"},{"type":"paragraph","text":"据共同社报道，日本驻美国大使东乡文彦二日前往白宫会晤布热津斯基，并向布热津斯基说明了邓小平副总理访问日本的情况。布热津斯基说：“美国政府认为，日中两国的友好关系有助于亚洲和世界的稳定。衷心欢迎日中和平友好条约的缔结”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d29ba600cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
