art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"兄弟国家报纸登载毛主席讲演","authors":[],"parts":[{"type":"paragraph","text":"据新华社21日讯 波、捷、罗、保、南等国的报纸都登载了毛主席的讲演：“关于正确处理人民内部矛盾的问题”。"},{"type":"paragraph","text":"波兰“人民论坛报”、“华沙生活报”、“劳动之声报”和“自由战士报”20日都全文刊载了这篇讲演。“青年旗帜报”刊载了详细摘要。"},{"type":"paragraph","text":"捷克斯洛伐克“红色权利报”、斯洛伐克“真理报”和“新言论报”今天登载了这篇讲演的全文，其他中央报纸登载了长篇摘要。"},{"type":"paragraph","text":"罗马尼亚“火花报”、“自由罗马尼亚报”和“青年火花报”今天都登载了毛主席讲演的前三部分。明天将继续登载其余部分。"},{"type":"paragraph","text":"保加利亚“工人事业报”今天以一版半的篇幅登载了毛主席讲演的前三部分，明天将继续刊载其余部分。“祖国阵线报”、“农业旗帜报”、“劳动报”等摘要登载了这篇讲演。"},{"type":"paragraph","text":"南斯拉夫“战斗报”20日以整个第四版的篇幅登载了毛主席讲演的摘要。“政治报”昨今两天连续登载了讲演的摘要。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b790fd225c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
