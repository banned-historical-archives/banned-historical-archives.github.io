整顿工作，决定了国家机构领导人员候选人的提名毛泽东同志主持会议作了关于工作方法问题的重要讲话","authors":[],"dates":[{"year":1959,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社上海7日讯】　中国共产党八届七中全会公报:"},{"type":"paragraph","text":"中国共产党第八届中央委员会第七次全体会议4月2日至5日在上海举行。"},{"type":"paragraph","text":"八届七中全会讨论和通过了1959年国民经济计划草案，检查了农村人民公社的整顿工作，决定了国家机构领导人员候选人的提名。"},{"type":"paragraph","text":"全体会议经过充分的讨论，通过了1959年国民经济计划草案。这个国民经济计划草案，是根据八届六中全会提出的钢产量一千八百万吨、煤产量三亿八千万吨、粮食产量一万零五百亿斤、棉花产量一亿担这四大指标和今年第一季度生产和建设的情况而编制的。这个计划草案的编制，对于我国物质技术条件的客观可能性和人民群众革命干劲的主观能动性，都作了认真的考虑。这是一个能够实现国民经济继续大跃进的宏伟计划。这个计划草案将由国务院提交第二届全国人民代表大会第一次会议审议。中央委员会深信，在社会主义建设总路线的光辉照耀下，在1958年大跃进的基础上，我国人民继续鼓足干劲，继续发扬苦干、实干、巧干的精神，充分发挥各方面的潜在力量，开展轰轰烈烈的增产节约运动，一定能够完成和超额完成1959年国民经济计划。"},{"type":"paragraph","text":"全体会议检查了上次全会以来的农村人民公社的整顿工作。全会指出，三个多月来的整社工作是良好的、有成绩的，1958年12月八届六中全会关于人民公社若干问题的决议正在贯彻执行，农村人民公社运动的发展是健康的。全会对于在整社工作中所发现的问题作了进一步的研究，并且规定了具体的解决办法。全会相信，农村人民公社经过一个时期的继续整顿之后，必将更加巩固和发展起来。"},{"type":"paragraph","text":"全体会议讨论和决定了国家机构领导人员候选人的提名。这些候选人的提名将在同各方面协商之后，向第二届全国人民代表大会第一次会议提出。"},{"type":"paragraph","text":"这次全体会议是在毛泽东同志主持下进行的。毛泽东同志在会上作了关于工作方法问题的重要讲话。"},{"type":"paragraph","text":"出席这次全体会议的有中央委员81人，候补中央委员80人。不是中央委员和候补中央委员的中央各部门负责同志和省、市、自治区党委第一书记也列席了会议。"},{"type":"paragraph","text":"八届七中全会之前，中共中央政治局举行了扩大会议，为这次全会作了准备工作。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d08051945"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
