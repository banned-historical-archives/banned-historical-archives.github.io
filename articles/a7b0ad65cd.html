rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"格利戈罗夫议长致电叶剑英委员长表示祝贺","authors":[],"parts":[{"type":"paragraph","text":"新华社三月七日讯 南斯拉夫社会主义联邦共和国议会议长格利戈罗夫三月六日打电报给叶剑英同志，最热情地祝贺他担任人大常委会委员长。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长叶剑英同志"},{"type":"paragraph","text":"亲爱的委员长同志："},{"type":"paragraph","text":"我荣幸和极其愉快地代表南斯拉夫社会主义联邦共和国议会并以我个人的名义，最热情地祝贺您当选为中华人民共和国全国人民代表大会常务委员会委员长。我们祝贺你们通过贵国新宪法的重要行动。我们祝全国人民代表大会及其常务委员会，并祝委员长同志，在促进贵国人民福利和中华人民共和国社会主义建设全面进展的工作中完全成功。我们认为，进一步发展南斯拉夫社会主义联邦共和国议会和中国全国人民代表大会之间的合作，以多方面促进我们两个社会主义国家的友好关系，是具有巨大意义的。"},{"type":"paragraph","text":"议长 基罗·格利戈罗夫"},{"type":"paragraph","text":"一九七八年三月六日于贝尔格莱德"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7b0ad65cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
