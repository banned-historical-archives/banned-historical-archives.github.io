rs":[],"dates":[{"year":1970,"month":11,"day":6}],"is_range_date":false,"parts":[{"text":"中共中央关于成立中央组织宣传组的决定","type":"title"},{"text":"一、为了党在目前进行的组织宣传工作，实施统一管理，中央决定在中央政治局领导下，设立中央组织宣传组。","type":"paragraph"},{"text":"二、中央组织宣传组设组长一人，由康生同志担任，设组员若干人，由江青、张春桥、姚文元、纪登奎、李德生同志担任。","type":"paragraph"},{"text":"三、中央组织宣传组管辖中央组织部、中央党校、人民日报、红旗杂志、新华总社、中央广播事业局、光明日报、中央编译局的工作，以及中央划归该组管辖单位的工作。","type":"paragraph"},{"text":"四、工，青、妇中央一级机构和它们的五·七干校，均划归中央组织宣传组管辖。","type":"paragraph"},{"text":"五、中央组织宣传组可设短小精干的联络办公室。","type":"paragraph"},{"text":"六、中央旧中宣部、政治研究室均取消，归中央办公厅负责管理它们的五·七干校和安置工作。","type":"paragraph"},{"text":"（此件发至省、军级）","type":"paragraph"}],"comments":[],"origin":"根据中共中央文献研究室《“文革”十年资料选编","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb6e33d665"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
