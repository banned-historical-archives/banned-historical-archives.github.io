干部感到山深林寒老虎成群有些害怕","authors":[],"dates":[{"year":1952,"month":2,"day":13}],"is_range_date":false,"parts":[{"text":"湖北省级机关三反走向打虎高潮　有些干部感到山深林寒老虎成群有些害怕","type":"title"},{"text":"【湖北记者组十三日讯】湖北省级机关纠正三反运动的右倾情绪后，大部已突破重点，走向打虎高潮。最近一周内已捉到一亿元以上的大老虎三十只。但现在又出现另一种右倾情绪，有些干部发现问题很多，情况严重，感到山深林寒，老虎成群，因而发生恐惧害怕情绪。如公营大达烟厂发现重大案件后，负责干部即表现惊惶失措。","type":"paragraph"},{"text":"此外省百货公司、水利局等单位已开始发生吊打捆绑现象。以上情况省委已及时注意纠正。","type":"paragraph"},{"text":"目前资产阶级一般有三怕：一怕“众叛亲离”(即攻守同盟被突破，店员工人挖他的底，亲朋的检举等)；二怕材料、证据；三怕“写”(即宁可口说不敢写出来盖章画押)。","type":"paragraph"}],"comments":[],"origin":"1952年2月15日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"157a6c19b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
