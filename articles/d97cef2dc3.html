art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认识阶级斗争必然的发展规律四连引导干部战士深刻领会毛主席关于阶级斗争规律的教导，提高路线觉悟","authors":[],"parts":[{"type":"paragraph","text":"本报讯 在深入路线教育中，广州部队某部四连在上级工作组帮助下，引导干部战士深刻领会毛主席关于阶级斗争规律的教导的精神实质，一个观点一个观点弄懂弄通。"},{"type":"paragraph","text":"四连在组织干部战士逐字逐句地学习毛主席的教导中，引导大家抓重点反复学习。炮班抓住深刻理解社会主义时期阶级斗争规律的问题，结合社会主义时期阶级斗争的事实，研究了几个问题：阶级敌人非跳出来不可，是由他们的反动本性决定的；每隔几年牛鬼蛇神就要跳出来表演一番；天下大乱达到天下大治；前途是光明的，道路是曲折的。他们还把几个观点联系在一起学习钻研。这样，对阶级斗争规律的认识就具体了，理解更深刻了。"},{"type":"paragraph","text":"四连在学习中，强调干部要带头学，用自己的学习成果辅导战士。五班边学边议时，有的同志对在无产阶级专政条件下，阶级敌人总要自己跳出来这个问题讲不清具体道理，理解不深刻。参加学习的副指导员王自强，首先自己认真学习了这个问题。他以党的基本路线为武器，分析了建国以来几次大的阶级斗争、路线斗争的情况，明确了四点：一是阶级敌人的反动本性，决定了他们决不会心甘情愿地退出历史舞台，非跳出来妄图夺回他们失去的“天堂”不可，二是阶级敌人的唯心主义世界观，决定了他们总是过高地估计自己的力量，过低地估计革命的力量，他们主观上认为时机成熟，就会迫不及待地跳出来表演一番，三是社会主义革命越深入发展，阶级敌人越感到自己灭亡的命运已经来临，就越狗急跳墙，作垂死挣扎；四是阶级敌人跳出来还有国际背景，帝国主义、社会帝国主义为了颠覆我国的无产阶级专政，总是要在我们党内寻找代理人，隐藏在党内的阶级敌人也总是找他们做靠山，帝、修、反刮什么风，国内阶级敌人就会掀什么浪。王副指导员把自己的学习体会给战士做了介绍，大家深受启发。原来认识不深的同志深有体会地说：“阶级敌人总是要跳出来，这是阶级斗争的规律，是不以人的意志为转移的。我们千万不能松懈自己的警惕性。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d97cef2dc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
