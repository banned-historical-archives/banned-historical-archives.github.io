script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本山口县成立革命妇女组织  宣布同修正主义控制的妇女会断绝关系  强调同中国妇女加强团结满怀信心前进","authors":[],"dates":[{"year":1967,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本山口县成立革命妇女组织"},{"type":"paragraph","text":"宣布同修正主义控制的妇女会断绝关系  强调同中国妇女加强团结满怀信心前进"},{"type":"paragraph","text":"新华社七日讯　东京消息：日本山口县的革命妇女五日在山口市举行集会，宣布同修正主义分子控制的新日本妇女会断绝关系，成立革命组织“山口县民主妇女同盟”。"},{"type":"paragraph","text":"一百多名妇女代表出席了会议。经过热烈的讨论，会议通过了“山口县民主妇女同盟”的纲领和宣言。"},{"type":"paragraph","text":"纲领说：我们作为争取日本的独立、民主、和平力量的一翼，为妇女的真正解放而斗争。"},{"type":"paragraph","text":"宣言说：现在，革命与反革命的力量，正在全世界范围内进行着激烈的搏斗。我们要和全世界的革命人民紧密地团结起来，同阻碍日本妇女解放的美帝国主义以及追随它的新旧反动势力进行坚决的斗争。"},{"type":"paragraph","text":"宣言说：我们要同在伟大的毛泽东思想指导下进行着无产阶级文化大革命的中国妇女加强团结，满怀信心地前进。"},{"type":"paragraph","text":"日本妇女运动著名人士中岛千代从东京赶来参加了会议。中岛在致词中对山口县妇女首先在日本成立新的妇女解放组织表示祝贺。她说，被修正主义分子控制的新日本妇女会在日本各地都面临着崩溃的局面。她揭露了日本修正主义者联苏反华的阴谋，并且指出，如果不反对现代修正主义，就不可能有妇女的解放和民族的独立。"},{"type":"paragraph","text":"大会选出了十二名县委会委员。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6bffce0f9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
