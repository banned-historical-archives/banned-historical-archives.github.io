ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"对浙江执行侨务政策情况报道的批语","alias":"","parts":[{"type":"paragraph","text":"对浙江执行侨务政策情况报道的批语"},{"type":"paragraph","text":"（1956年12月8日）罗瑞卿同志："},{"type":"paragraph","text":"111页上关于浙江省的一条消息值得一看。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月八日[1]罗瑞卿，当时任公安部部长。"},{"type":"paragraph","text":"[2]指新华社《内部参考》1956年12月6日第二O七一期刊登的《浙江省许多地区在执行侨务政策中存在不少严重缺点》。文内说，出席浙江省最近召开的侨眷、归侨代表会议的代表反映，浙江各地（特别是农村）在对待侨眷和归侨方面存在许多问题。不少青年由于亲属在国外不能入团，甚至入工会也受阻碍；国外来信被拆阅以至传阅；干涉侨汇使用，强迫借贷、捐款和购买公债；一些公安部门对归国观光、探亲的华侨出国多方限制、留难。代表们认为，政府的政策是很好的，但宣传工作做得不够，下面执行得不好，要求大力开展对侨务政策的宣传，重视贯彻侨务政策的问题。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":12,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":184,"page_end":184},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f60b37a009"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
