authors":[],"dates":[{"year":1970,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河池县在毛主席的“备战、备荒、为人民”方针指引下"},{"type":"paragraph","text":"大办小型工业　支援农业生产"},{"type":"paragraph","text":"据新华社南宁四日电　广西河池县各级革委会，遵照毛主席关于“备战、备荒、为人民”的伟大教导，发扬自力更生、艰苦奋斗的革命精神，发动群众大力举办地方小厂矿，有力地支援了农业生产的发展。"},{"type":"paragraph","text":"河池县位于黔桂高原，是瑶、苗、仫佬、毛难、壮族等少数民族聚居的山区。解放前，这个县没有工业。解放后，由于叛徒、内奸、工贼刘少奇及其代理人疯狂破坏山区建设，阻碍了这个地区的工业的发展。伟大的无产阶级文化大革命，充分调动了各族人民社会主义革命和社会主义建设的积极性。在解放军支左人员的大力帮助下，全县各族人民认真学习了伟大领袖毛主席的有关教导，狠批了刘少奇推行的反革命修正主义路线，迅速掀起一个群众性的大办地方工业的热潮。目前全县已建成小型厂矿四十多个，其中有小煤场、小炼铁厂、水泥厂、农机厂、农具社、造纸厂等。"},{"type":"paragraph","text":"河池县在发展地方工业的过程中，始终坚持贯彻执行毛主席的“自力更生”、“艰苦奋斗”的伟大方针，充分调动各族人民的积极性，土法上马，就地取材，因陋就简，走自己武装自己的道路。资金不足自己筹，材料不够自己找，没有厂房搭草棚，有效地加速了地方工业的发展。县办的拉往煤场，在一无资料、二无资金、三无技术的情况下，靠战无不胜的毛泽东思想，放手发动群众，用土法勘探，土法开采，边干边学，迅速建成了一个月产五百吨煤的小煤场。"},{"type":"paragraph","text":"这个县的地方工业，在支援农业生产中发挥了很大的作用。仅去年一年，就为农村人民公社建立的十五个抽水站提供了设备。同时，还提供了各种农机设备近百台，半机械化农具两千多件，各种小农具两万多件，为实现农业水利化、机械化作出了贡献，受到各族贫下中农的好评。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f02a928e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
