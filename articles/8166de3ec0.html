ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"给吴晗\"的信","alias":"","parts":[{"type":"paragraph","text":"给吴晗\"的信"},{"type":"paragraph","text":"（1948年11月24日）辰伯先生："},{"type":"paragraph","text":"两次唔谈，甚快。大著阅毕，兹奉还。此书用力甚勤，掘发甚广，给我启发不少，深为感谢。有些不成熟的意见，仅供参考，业已面告。此外尚有一点，即在方法问题上，先生似尚未完全接受历史唯物主义作为观察历史的方法论。倘若先生于这方面加力用一番功夫，将来成就不可限量。谨致"},{"type":"paragraph","text":"革命的敬礼!"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月二十四日"},{"type":"paragraph","text":"介绍乔木同志来见，乞加指教。他是我这里的秘书，兼管新华社工作。"},{"type":"paragraph","text":"[1]吴晗（1909一1969)，字辰伯，浙江义乌人，历史学家，曾任清华大学等校教授。1948年秋进入解放区，11月毛泽东在河北平山会见了他。新中国成立后，曾任北京市副市长。"},{"type":"paragraph","text":"[2]指吴晗所著《朱元璋传》一书。1948年11月吴晗到达河北平山，将此书的修改稿送给毛泽东看。毛泽东看后提出了-些意见。后来，吴晗在"},{"type":"paragraph","text":"吴辰台光i2"},{"type":"paragraph","text":"生辰后光生：知次孤谈，基此。大老到率期尽。上比为用几甚勒，摇落甚质，结我"},{"type":"paragraph","text":"有些不成然"},{"type":"paragraph","text":"张。上比外鸟方上，先些似当来完全"},{"type":"paragraph","text":"主美你为知容愿史"},{"type":"paragraph","text":"。倘差先生指言12小力用一当功夫，也来成就不而证堂。请改苹的敬律然春桃契，十月亦指教口他灵我套的社龙，管社章士工作。"},{"type":"paragraph","text":"毛泽东致吴晗信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":273,"page_end":275},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8166de3ec0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
