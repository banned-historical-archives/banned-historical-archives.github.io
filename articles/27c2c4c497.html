<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"淮海战役纪念馆重新开放","authors":[],"dates":[{"year":1977,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社南京一九七七年八月三日电　座落徐州市的淮海战役纪念馆，在中国人民解放军建军五十周年前夕重新开放。"},{"type":"paragraph","text":"七月二十九日，在中共江苏省委、省革命委员会、南京部队和济南部队党委主持下，隆重举行了重新开放的庆祝大会。中共江苏省委第一书记、省革委会主任、省军区第一政委许家屯，南京部队司令员聂凤智、政治委员廖汉生，济南部队司令员曾思玉、政治委员肖望东和革命群众五千多人，参加了庆祝大会。许家屯同志为纪念馆重新开放剪了彩。"},{"type":"paragraph","text":"淮海战役纪念馆是在伟大领袖和导师毛主席、党中央的亲切关怀下筹建的。一九六五年十一月六日，淮海战役发起十七周年那天落成，并开始接待观众。毛主席亲笔为淮海战役烈士纪念塔题了字，周恩来总理、朱德委员长和邓小平、刘伯承、陈毅等同志为纪念馆题了词。由于林彪反党集团和王张江姚“四人帮”的干扰，纪念馆被关闭，长期不能重新开放。英明领袖华主席为首的党中央一举粉碎了“四人帮”，纪念馆才得以与群众见面。"},{"type":"paragraph","text":"纪念馆重新开放的那天，人们首先来到淮海战役烈士纪念塔前。这座雄伟的纪念塔建在徐州市南郊凤凰山麓，毛主席亲笔题的“淮海战役烈士纪念塔”九个金光闪闪的大字，光彩夺目。塔的四周松柏青翠，鲜花吐艳。参加庆祝大会的党政军负责同志和参加淮海战役的老战士，淮海地区的劳动模范、先进工作者以及群众代表，怀着对革命先烈的崇敬心情，在纪念塔前肃立致哀，并敬献了花圈。淮海战役纪念馆的陈列分正厅、序言、战役实施、人民支前、悼念烈士、将革命进行到底六部分，共展出照片、文物、图表、油画、雕塑等两千四百多件。这些革命文物，体现了毛主席、党中央对淮海战役的英明领导和正确指挥，体现了老一辈无产阶级革命家的历史功绩，体现了人民解放军的伟大功勋和人民群众在战争中发挥的巨大威力。"},{"type":"paragraph","text":"前来参加大会的工农兵代表怀着激动的心情参观了纪念馆。他们说，淮海战役的伟大胜利，是毛主席军事思想、军事路线的伟大胜利，也是前线指挥员忠实执行毛主席指示和人民解放军战士英勇战斗的结果。在伟大领袖和导师毛主席的领导下，老一辈无产阶级革命家为党、为人民立下的不朽功绩，是任何人也抹不掉的。“四人帮”对老一辈无产阶级革命家恨之入骨，竭尽造谣诬蔑之能事，必欲置之死地而后快，其罪恶目的就是妄图打倒一大批中央和地方的党政军领导同志，篡夺党和国家的最高领导权，复辟资本主义，党的十届三中全会永远开除王张江姚的党籍，撤销其党内外一切职务，真是大快人心!代表们看了烈士事迹介绍后说，我们今天的幸福生活是无数革命先烈用鲜血和生命换来的。我们一定要紧跟英明领袖华主席，永远高举毛主席的伟大旗帜，把毛主席开创的无产阶级革命事业进行到底。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27c2c4c497"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
