script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"时刻警惕资产阶级思想的侵蚀","authors":["文勤奋"],"dates":[{"year":1969,"month":12,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"时刻警惕资产阶级思想的侵蚀"},{"type":"paragraph","text":"在伟大领袖毛主席“抓革命，促生产，促工作，促战备”的伟大战略方针指引下，我县革命和生产搞得热气腾腾，斗、批、改步步深入。在一片大好形势下，各级革委会发扬艰苦奋斗的革命传统，坚持厉行节约，勤俭办一切事业的原则，做到少花钱多办事，不花钱也办事。"},{"type":"paragraph","text":"但是，有些单位的领导人，却看不清大好形势下的阶级斗争，对资产阶级思想的侵蚀缺乏警惕，讲排场，摆阔气，强调这也“需要”，那也“需要”，大慷国家之慨。有个单位一下子花了几千元钱买了几百个水壶、挎包，分发给工作人员；有个小单位买了几十张藤椅。有的人违反国家财政制度，挥霍国家资财，还说什么“反正是我这个单位节余的，多花点也没什么。”他们不考虑国家经费是劳动人民用血汗创造的，把艰苦奋斗的作风丢在脑后，实在使人不能容忍。"},{"type":"paragraph","text":"我们县革委会在解放军帮助下，及时发现了个别单位出现的这种情况，认为这是新形势下阶级斗争在我们一些同志头脑里的反映。能不能保持和发扬艰苦奋斗的革命传统，自觉抵制资产阶级思想的侵蚀，是忠不忠于毛主席的大问题。于是，立即组织大家学习毛主席有关“厉行节约、反对浪费”的教导，狠批叛徒、内奸、工贼刘少奇的“公私溶化论”、“入党做官论”等反革命修正主义谬论，提高了广大干部的两条路线斗争觉悟，并做出了《反对铺张浪费，勤俭办一切事业，防止资产阶级思想侵蚀》的决定，刹住了这股歪风。"},{"type":"paragraph","text":"广西揭西县　文勤奋"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d487236b63"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
