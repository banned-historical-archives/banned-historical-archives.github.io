rs":[],"dates":[{"year":1967,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天上午，十六铺码头红旗飘扬，锣鼓喧天，“打到崇明去，打倒反革命经济主义!”“抓革命，促生产，掀起春耕生产新高潮!”“上海人民公社万岁!”“毛主席万岁，万万岁!”口号声此起彼落。由红卫兵上海第三司令部交通大学革命造反团、不怕死战斗队、红卫造反团、东方红造反团等发起组织的“打倒经济主义火线兵团”第一支大军五百多人，乘轮船前往崇明，宣传毛泽东思想，打击经济主义歪风，抢救国家财产。"},{"type":"paragraph","text":"近一时期来，由于党内一小撮走资本主义道路当权派和极少数坚持资产阶级反动路线的顽固分子大刮经济主义的妖风，崇明县一些农场的大批知识青年和农场工人在这些老爷们的阴谋煽动下，离开了生产岗位，使农场生产受到了严重的影响。大批棉花至今还没有入库，大批的水稻急需脱粒，田间管理和春耕备耕工作严重脱节。许多红卫兵小将和其他革命群众听到国家财产要遭受损失的消息后，忧心如焚，踊跃要求参加这次突击战斗。他们的革命行动得到中国人民解放军海军东海舰队、反对经济主义联络总部、“抓革命，促生产”火线指挥部等单位的大力协助和支持。"},{"type":"paragraph","text":"“打倒经济主义火线兵团”的革命小将们激动地说，由旧上海市委中一小撮走资本主义道路的当权派掀起的反革命经济主义黑风是有其罪恶目的的，他们妄想破坏无产阶级文化大革命，打击新生的上海人民公社的威信。上海人民公社是我们的人民公社，我们坚定的革命造反派是当然的主人，我们对反革命经济主义黑风的泛滥不能视而不见，充耳不闻，我们要和它进行坚决的斗争。他们表示要和崇明的革命工人、农民相结合，大力宣传毛泽东思想，宣传毛主席“抓革命，促生产”的伟大号召和中央关于反对经济主义的决定，同时挑起抢救国家财产的重担。小将们说，我们希望崇明广大农场知识青年和工人能迅速打回农场去，就地闹革命。"},{"type":"paragraph","text":"“打倒经济主义火线兵团”还将组织第二支赴崇大军。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\02\\672b020701.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e革命知识分子到工农群众中去，同工农群众相结合!"},{"type":"paragraph","text":"红卫兵电影制片厂红色造反公社\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"754062ddcd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
