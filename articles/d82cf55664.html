script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"对《江苏红领巾支援四十条》新闻稿的批语","alias":"","parts":[{"type":"paragraph","text":"对《江苏红领巾支援四十条》"},{"type":"paragraph","text":"新闻稿的批语"},{"type":"paragraph","text":"（1958年1月2日）乔木\"："},{"type":"paragraph","text":"红领巾新闻可阅，并可参看江苏报纸由新华社写一条新闻播发。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二日[1]乔木，即胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。"},{"type":"paragraph","text":"[2]指1957年12月30日《新民报》晚刊登载的新闻《江苏红领巾支援四十条》。报道了南京市雨花台区第一中心小学少先队向江苏省少先队员提出开展“我们也来支援四十条”活动的倡议。主要内容是：（一）开展各种义务劳动，像积肥、修水沟、除四害、扫盲、种向日葵等，以实际行动为家乡实现农业发展纲要四十条贡献力量；（二）用我们集体劳动收入的一部分钱集中上缴，在最有意义或最需要的地方修建红领币水闸和水库，作为少先队员对第二个五年计划的献礼。报道说，他们的倡议已受到江苏省教育厅和共青团江苏省委的支持，红领币水闸和水库的修建地点也已确定，“红领币水闸”将修建在涟水县，“红领币水库”将修建在赣榆县。"},{"type":"paragraph","text":"[3]这条新闻经过改写，以新华社南京10日电播发，载于1958年1月12日《人民日报》上，题为《我们也来支援四十条》。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":1,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":390,"page_end":390},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d82cf55664"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
