" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji2","name":"毛泽东全集第2卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"《新湖南》周刊第七号刷新宣言","alias":"","parts":[{"type":"paragraph","text":"《新湖南》周刊第七号刷新宣言川"},{"type":"paragraph","text":"（1919年9月）"},{"type":"paragraph","text":"本报第七号以后的宗旨是：一、批评社会。二、改造思想。三、介绍学术。四、讨论问题。·…·第七号以后的本报，同人尽其力之所能，本着这四个宗旨去做；“成败利钝”自然非我们所顾。就是一切势力Authority也更非我们所顾。因为我们的信条是：“什么都可以牺牲，惟宗旨绝对不能牺牲！”"},{"type":"paragraph","text":"[1]《新湖南》，原为长沙湘雅医学专门学校学生自治会会刊，从第七号起由毛泽东负责编辑。毛泽东在1919年9月5日给黎锦熙的信中说道：“此间有一种《新湖南》，第七号以后归弟编辑，现正在改组，半月后可以出版。”另据周世钊回忆：当时，毛泽东主办的《湘江评论》已被禁止发行，湘雅学生自治会负责人征得毛泽东同意，从第七号起由他主持编辑，毛泽东“决心把这个刊物办好”，写了这篇《刷新宣言》。1919年12月1日，《新青年》第七卷第一号《长沙社会面面观》摘登这一宣言时在前面写道：“《新湖南》周刊的内容，自从第七号已与以前大不相同，请列位看他第七号刷新的宣言就知道的。”在摘登后又加了一段话：“再看他第七期的内容如何？其中精采真是不少。最要的如《社会主义是什么？无政府主义是什么？》一一洋洋数千言，说的很透。又有评中国假冒新招牌的《新中国》杂志及哭《每周评"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":107,"page_end":107},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43d69eaf6a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
