torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"在中共中央政治局常委会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局常委会上的讲话！"},{"type":"paragraph","text":"（1935年9月20日）"},{"type":"paragraph","text":"组织部应该调查了解干部，要了解连以上干部。我们现在只了解高级干部，中下级干部还不了解。为了巩固部队，需要了解干部；为了扩大干部，需要支配干部；为了与反革命作斗争，需要了解干部的一些倾向问题。组织部需要了解下层情形，这是组织部的主要工作。要把教育工作包括在组织工作之内。此外，对地方工作，组织部也应该给予帮助。"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"“编余”二字不大好。对于一些工作上需要的，就是编制上没有，也应该写上。我们应该承认，过去对干部的优待不够。现在的干部是精华，应该注意保护。"},{"type":"paragraph","text":"[1]1935年9月20日，中共中央政治局常委会在岩昌县哈达铺召开。本篇一是毛泽东在讨论组织部工作问题时讲话的一部分；本篇二是毛泽东关"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":9,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":234,"page_end":234},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1b744aa04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
