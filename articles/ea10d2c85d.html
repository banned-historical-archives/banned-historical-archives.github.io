委员长说支持各国人民斗争是中国人民的国际义务","authors":[],"dates":[{"year":1966,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"穆亚比议长在告别宴会上赞扬我国文化大革命"},{"type":"paragraph","text":"毛主席领导中国人民将取得更新成就"},{"type":"paragraph","text":"朱德委员长说支持各国人民斗争是中国人民的国际义务"},{"type":"paragraph","text":"新华社三日讯　刚果（布）国民议会议长穆亚比·安德烈·乔治今晚在他举行的告别宴会上说，“我们在北京的逗留，已经使我们能够看到毛泽东主席和中国共产党是多么善于领导中国的伟大的革命事业。我们确信，中国人民在英明的毛泽东思想指引下，将取得更新的成就。”"},{"type":"paragraph","text":"人大常委会委员长朱德和夫人康克清，副委员长康生、郭沫若、杨明轩、刘宁一，国务院副总理陈毅、谢富治，应邀出席了穆亚比议长和夫人举行的告别宴会。"},{"type":"paragraph","text":"穆亚比议长和朱德委员长先后在宴会上讲话。他们共祝刚果（布）和中国人民的友谊不断发展。"},{"type":"paragraph","text":"穆亚比议长在讲话中说，中国正在进行的工作和已经取得的成就，特别是中国在毛泽东思想的指导下，为了人民群众的利益，打倒和粉碎走资本主义道路的人、反动派、资产阶级和其他一切剥削阶级，争取无产阶级文化大革命的胜利，使我们感到兴趣。"},{"type":"paragraph","text":"穆亚比议长说，我们相信，在消除新老殖民主义以及帝国主义的过程中，中国人民将永远站在我们一边。我们将不断地支持中国人民对美国侵略越南所持的立场，这就是我们对亚洲、非洲及世界其它国家进步人民的反帝斗争的贡献。我们相信，越南将取得最后胜利，因为越南的斗争是正义的斗争。"},{"type":"paragraph","text":"朱德委员长在讲话中，对穆亚比议长在访问北京期间给予中国人民的支持和鼓励，表示衷心的感谢。朱德委员长重申，七亿中国人民将永远和刚果（布）人民、亚非人民以及全世界革命人民一道，相互支持，并肩前进。他说，全世界人民的反帝斗争是互相呼应、互相支援的一个不可分割的整体。中国人民把支援各国人民的反帝正义斗争，看作是自己应尽的国际义务。"},{"type":"paragraph","text":"朱德委员长谈到亚非人民反帝斗争的大好形势时指出，帝国主义和它的走狗是不赶不走，不打不倒的。只要亚非人民和全世界人民团结起来，建立最广泛的国际反美统一战线，敢于斗争、敢于胜利，就一定能够彻底打败美帝国主义和各国反动派，赢得最后的胜利。"},{"type":"paragraph","text":"朱德委员长说，毛泽东主席明确宣布过：“中国人民把亚洲、非洲、拉丁美洲人民的反帝国主义斗争的胜利看作是自己的胜利，并对他们的一切反帝国主义、反殖民主义的斗争给以热烈的同情和支持。”我们的这一坚定立场，在任何情况下，都是不可动摇的。帝国主义、现代修正主义和一切反动派的诬蔑攻击、挑拨离间，都是枉费心机。"},{"type":"paragraph","text":"应邀出席宴会的，还有外交部副部长姬鹏飞，人大常委会部分委员，以及政府其他各部门、人民解放军和人民团体的负责人。刚果（布）驻中国大使馆临时代办让·丹尼尔·巴库拉，一些非洲国家驻中国的使节，也出席了宴会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea10d2c85d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
