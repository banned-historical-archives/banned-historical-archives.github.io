ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"帮助越南训练和装备新兵","alias":"","parts":[{"type":"paragraph","text":"帮助越南训练和装备新兵！"},{"type":"paragraph","text":"（1950年8月26日）中南局，并广西省委："},{"type":"paragraph","text":"越南方面提议调一万新兵到中国训练并装备为一个炮兵师，另外调一个步兵团（大约有五千人）到中国训练及装备。接云南省委电告该省前已担任训练及装备越方二万余人，现感武器和粮食两项均不足，难于担负新任务，因此拟充许该炮兵师及步兵团于高平战役胜利结束越桂道路畅通之后，大约在十月上旬或中旬开至广西境内适当地点（距离越南敌人较远有粮食条件又能隐蔽之西军区担负装备及训练的责任。"},{"type":"paragraph","text":"[1]这是毛泽东关于帮助越南训练和装备新兵问题为中共中央起草的给中南局和广西省委的指示。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":8,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":108,"page_end":108},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84e48d71de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
