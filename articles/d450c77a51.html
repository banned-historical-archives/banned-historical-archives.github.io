rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席周恩来总理电贺阿尔及利亚独立三周年","authors":[],"parts":[{"type":"paragraph","text":"新华社五日讯 刘少奇主席和周恩来总理四日打电报给阿尔及利亚民主人民共和国革命委员会胡阿里·布迈丁，热烈祝贺阿尔及利亚独立三周年。贺电全文如下：阿尔及利亚民主人民共和国革命委员会胡阿里·布迈丁阁下："},{"type":"paragraph","text":"在阿尔及利亚独立三周年的时候，我们代表中国人民和中国政府，并以我们个人的名义，向阁下、阿尔及利亚革命委员会和阿尔及利亚全体人民表示最热烈的祝贺。"},{"type":"paragraph","text":"阿尔及利亚的独立，是阿尔及利亚人民武装斗争的结果，它揭开了非洲民族解放运动史上光辉的一页。阿尔及利亚人民是坚决反对帝国立义、坚持革命的英雄的人民，是坚信自己力量，敢于斗争，敢于胜利的人民。我们深信，阿尔及利亚人民今后一定能够继续发扬这种光荣的革命传统，继续把阿尔及利亚的革命推向前进。"},{"type":"paragraph","text":"中阿两国人民在长期的革命斗争中，建立了牢不可破的战斗友谊。阿尔及利亚人民的斗争和胜利，对中国人民是一个有力的支援。中国人民一贯支持阿尔及利亚民族解放和发展民族经济的事业。阿尔及利亚兄弟可以指望，在你们反对帝国主义和新老殖民主义、加强亚非团结、保卫世界和平的斗争中，中国人民将永远是你们的可靠的朋友。"},{"type":"paragraph","text":"祝阿尔及利亚人民在革命和建设事业中，不断取得新的更大的成就。祝阿尔及利亚民主人民共和国繁荣昌盛，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年七月四日RW：刘少奇；主席；贺电"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d450c77a51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
