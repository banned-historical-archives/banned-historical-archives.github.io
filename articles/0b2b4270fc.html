script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地主席说纳沙贡政党应互相帮助共同前进  现代修正主义是帝国主义孪生兄弟","authors":[],"dates":[{"year":1965,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"艾地主席说纳沙贡政党应互相帮助共同前进"},{"type":"paragraph","text":"现代修正主义是帝国主义孪生兄弟"},{"type":"paragraph","text":"新华社雅加达电　据《人民日报》报道，印度尼西亚共产党主席艾地二十日在改组革命机构最高行动指挥部政治训练班讲话时说，现代修正主义是帝国主义的孪生兄弟。"},{"type":"paragraph","text":"他说，印度尼西亚共产党人有责任帮助国内的民族主义政党和宗教政党继续前进。"},{"type":"paragraph","text":"艾地说：“我希望民族主义政党和宗教政党以及其他一切革命派也将帮助印度尼西亚共产党，使其不变成不革命的政党，特别是不堕落成为修正主义的政党，因为修正主义是帝国主义的孪生兄弟。”"},{"type":"paragraph","text":"他说：“如果印度尼西亚共产党堕落成为一个修正主义政党，它必将给印度尼西亚民族和人民带来灾难。”"},{"type":"paragraph","text":"艾地说：“我和印度尼西亚共产党的其他领导人将不遗余力使印度尼西亚共产党不致变成一个修正主义政党。但是，如果我们在执行共同任务中犯了错误时，我们希望印度尼西亚革命派出来批评我们。”"},{"type":"paragraph","text":"他还建议国内的纳沙贡政党在革命斗争中求同存异。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b2b4270fc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
