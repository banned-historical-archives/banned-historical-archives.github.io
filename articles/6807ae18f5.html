ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"七绝·观潮","alias":"","parts":[{"type":"paragraph","text":"七绝·观潮（1957年9月）千里波涛滚滚来，雪花飞向钓鱼台2。人山纷赞阵容阔，"},{"type":"paragraph","text":"铁马从容杀敌回。"},{"type":"paragraph","text":"[1]观潮，指观赏浙江省钱塘江口的涌潮。钱塘潮以每年阴历八月十八在海宁所见最为壮观。毛泽东在1957年9月11日（即阴历八月十八），曾乘车去海宁七星庙观潮。"},{"type":"paragraph","text":"[2]钓鱼台，即钓台，在钱塘江中段的富春江边，相传为东汉严光（子陵）隐居垂钓处。"},{"type":"paragraph","text":"[3]铁马，配有铁甲的战马，借喻雄师劲旅。陆游《十一月四日风雨大作》：“夜阑卧听风吹雨，铁马冰河入梦来。”钱塘江涌潮袭来时，波涛汹涌，如闻“十万军声”。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":236,"page_end":236},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6807ae18f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
