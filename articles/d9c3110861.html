<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想光辉照耀新生的上柴厂“八·三”赴上柴毛泽东思想宣传队昨再往该厂受到热烈欢迎　“东方红”战士和已觉醒的“联司”群众一起抓革命促生产","authors":[],"dates":[{"year":1967,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天下午，“八·三”赴上柴毛泽东思想宣传队的原班人马，即曾被上柴“联司”一小撮坏头头和打手围攻、殴打、非法绑架及隔离审讯的上海市革命委员会代表、驻沪陆海空三军毛泽东思想宣传队和新闻工作者，又一次来到上海柴油机厂宣传毛泽东思想，受到上柴东方红战斗总部的无产阶级革命派战士和参加过“联司”、现已觉醒的革命群众的热烈欢迎。新生的上海柴油机厂呈现一派热气腾腾的革命景象。"},{"type":"paragraph","text":"当宣传队的同志意气风发地来到上海柴油机厂时，早已等候在门口的“东方红”战士和已醒悟的原“联司”群众肩并肩地列队热烈欢迎。他们和毛泽东思想宣传队的同志一起高举红彤彤的《毛主席语录》，振臂高呼:“毛主席的革命路线胜利万岁!”“毛主席万岁!万万岁!”“八·三”赴上柴毛泽东思想宣传队的同志深有所感地说:十天以前，上柴还是武斗的策源地；今日之上柴，已是无产阶级革命派的天下!这充分显示了坚持毛主席革命路线的上海无产阶级革命派的强大力量，谁妄想挑起“上海第二次大乱”，决没有好下场!"},{"type":"paragraph","text":"宣传队队员和上柴“东方红”战士欢聚一堂，共同召开了“高举毛泽东思想伟大红旗，以鲜血和生命捍卫上海市革命委员会”的大会。会上，宣传队的同志再次宣读了上海市革命委员会八月二日给上柴“联司”革命群众的一封公开信，并对上柴“东方红”和参加“八·四”革命行动的无产阶级革命派表示亲切的慰问，致以崇高的敬礼。对原“联司”的群众再次阐明了“受蒙蔽无罪，反戈一击有功”的原则。上柴“东方红”的代表在会上宣读了给全市无产阶级革命派的感谢信和欢迎“联司”群众起来造一小撮坏头头的反的公开信。"},{"type":"paragraph","text":"“八·三”赴上柴毛泽东思想宣传队的代表还在会上介绍了八月三日抗击“联司”一小撮坏头头的斗争经过。"},{"type":"paragraph","text":"上柴厂的不少老工人，昨天激动得热泪盈眶。毛泽东思想宣传队再次来到工厂，使他们深深地感到毛泽东思想的无比威力。"},{"type":"paragraph","text":"近几天来，上柴“东方红”战士和革命群众，在全市无产阶级革命派的大力支援下，尤其是在广大革命派工人的具体帮助下，对因“联司”一小撮坏头头多次挑起武斗而损坏的厂房、机器，进行了突击抢修和全面检查，生产正在迅速全面恢复。各车间已陆续开工，他们争取把上柴厂新生后的第一批柴油机早日出厂。"},{"type":"paragraph","text":"上柴“东方红”战士坚决表示:“八·三”赴上柴毛泽东思想宣传队再次来到上柴厂，这是对我们又一次最有力的支持和巨大的鼓舞.我们一定不辜负全市无产阶级革命派的期望，永远高举毛泽东思想伟大红旗，团结受蒙蔽的原“联司”群众，牢牢掌握斗争大方向，坚决响应毛主席“抓革命，促生产”的伟大号召，在夺取无产阶级文化大革命的新胜利中立新功。"},{"type":"paragraph","text":"一些受蒙蔽的原“联司”成员，昨天受到了一次教育。油泵车间的一位老工人说:“八·四”的革命行动把我们这批受蒙蔽的工人真正解放出来了。“东方红”战士对我进行了耐心帮助，使我认识到过去站错了队，走错了路。他表示决心说:我一定要向“东方红”革命派靠拢，跟他们一起抓革命、促生产，把无产阶级文化大革命搞深搞透搞彻底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9c3110861"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body>
