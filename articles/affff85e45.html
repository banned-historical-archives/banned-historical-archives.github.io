art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"红心忠于毛主席 全心全意为人民——记我军卫生战士深入农村、厂矿为群众防病治病的先进事迹","authors":[],"parts":[{"type":"paragraph","text":"在伟大统帅毛主席关于“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的”的光辉思想指引下，人民解放军广大卫生战士，满怀深厚的无产阶级感情，深入农村、厂矿，热情宣传战无不胜的毛泽东思想，全心全意为广大劳动人民防病治病，作出了突出的成绩。"},{"type":"paragraph","text":"在他们的努力下，许多聋哑病人喊出了“毛主席万岁！”盲人看到了毛主席的光辉形象；瘫痪病人站了起来，重新走上了“抓革命，促生产，促工作，促战备”的战斗岗位。"},{"type":"paragraph","text":"在他们的努力下，毛主席的无产阶级卫生路线在农村、厂矿深深扎根。大批“赤脚医生”迅速成长起来，农村合作医疗日益巩固，蓬勃发展。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"affff85e45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
