rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席啊，毛主席！我们苗族人民永远忠于您的伟大思想","authors":["新华社"],"parts":[{"type":"paragraph","text":"在祖国西南边疆云南省大关县的高山上，人们经常见到一位苗族老大妈，背着革命宝书袋，爬山涉水，风里来雨里去，走村串寨，热情地宣传毛泽东思想。她就是鱼孔公社茶园生产队的贫农社员马福美。"},{"type":"paragraph","text":"不久以前，七十多岁的马福美老大妈被邀请到离家三十多里地的一个生产队参加活学活用毛主席著作的讲用会。那天，大雪纷飞，风刮得人很难迈步。她女儿劝道：“你这么大岁数了，路上有个三长两短怎么办，过天再去吧！”马福美心想：姑娘是体贴老人，可参加讲用会不是小事情，这是去送毛泽东思想，去送打倒帝、修、反的武器啊！她坚决地回答道：“毛主席教导我们：‘为人民利益而死，就比泰山还重’。为了宣传毛泽东思想，我就是在路上摔坏了也心甘。”说着，她就背上红色革命宝书袋，披起蓑衣，拄着棍子，上路了。"},{"type":"paragraph","text":"路上的雪铺得厚厚的，看不到一个脚印。马福美心里默默念着：“下定决心，不怕牺牲，排除万难，去争取胜利”，一手扶着岩石，一手用棍棒探路。她后脚踏着前脚印，一步一步地向前移动，终于走过了这一段艰险的道路。当她赶到那个生产队时，贫下中农们一起围上来问寒问暖，有的说：“这样的天气，我们想着你不会来了。”马福美热情地说：“毛泽东思想是我们的命根子。为了宣传毛泽东思想，就是天上下刀子也要来！”"},{"type":"paragraph","text":"马福美在旧社会受尽了国民党反动派和反动寨头的压迫剥削，住的是茅屋、岩洞，吃的是野菜，穿的是麻布衣。解放后，她过上了幸福生活。她怀着忠于毛主席的一颗红心，努力学习毛主席著作。她不识字，就到处请人教。她不仅自己认真学习，还带动别人学习。她常说：“旧社会比黄连苦十分，新社会比蜜糖甜十倍。一想到伟大领袖毛主席的恩情，我就浑身是劲！”（据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a93618e4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
