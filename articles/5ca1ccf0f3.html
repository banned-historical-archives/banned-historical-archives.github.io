,"dates":[{"year":1983,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为纪念毛泽东同志诞辰九十周年，本市出版部门今年已出版毛泽东思想学习文集和歌颂毛泽东同志革命业绩的回忆录，以及画页等九种，另外两种不久也将与读者见面。"},{"type":"paragraph","text":"上海人民出版社出版的是《学习和运用毛泽东哲学思想》和通俗读物《浅谈毛泽东思想》。上海人民美术出版社出版了画页《千秋颂》和连环画《巍巍昆仑》。少年儿童出版社出版了少年儿童读物《牛娃子的故事》、《我们见到了毛主席》、《少年毛泽东的故事》、《毛主席看戏》和《毛主席爱孩子》。"},{"type":"paragraph","text":"即将出版的两种是上海人民出版社的《生活与哲学》和上海人民美术出版社的《毛泽东诗意画选》。"},{"type":"paragraph","text":"(徐竖忠)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ca1ccf0f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
