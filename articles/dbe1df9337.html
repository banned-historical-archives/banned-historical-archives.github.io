art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中外学者在京研讨毛泽东诗词","authors":["曲志红"],"parts":[{"type":"paragraph","text":"毛泽东是中国人民的革命领袖，又是一位气度不凡的诗人。毛泽东的诗歌不仅深受我国人民的喜爱，也吸引了许多外国朋友和学者。目前，已有国内外的研究专家上百位，研究专著数十部。毛泽东诗歌被译成英、日、俄等许多文本发行世界各地。"},{"type":"paragraph","text":"中国毛泽东诗词研究会会长贺敬之在研讨会的开幕辞中说，以数量不多的诗作而能在我们这个诗词古国及世界上产生巨大影响者，当首推毛泽东。在他的诗歌中，凝聚了中华民族的伟大精神，使人领略到那种从百年屈辱中站起来的解放感和尊严感。"},{"type":"paragraph","text":"来自国内和日本、加拿大、美国及港台地区的学者们，将进行广泛研究交流。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbe1df9337"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
