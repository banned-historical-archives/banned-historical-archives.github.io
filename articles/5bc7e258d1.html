rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在抗震斗争中坚持学习深入批邓","authors":[],"parts":[{"type":"paragraph","text":"地震发生后，天津站运输任务更加繁忙，工人理论队伍成员就因人、因地、因时制宜，采取班前班后集中学，工作空隙分散学，大组划小机动学，休班时间多自学的办法，抓紧学习不放松。担负抢修京山铁路紧急任务的理论队伍成员，临行前尽管来不及整理行装，也要把《毛泽东选集》和中共中央给灾区人民的慰问电带上，坚持自学。他们从历史经验中懂得，在自然灾害面前，是坚信人定胜天，依靠群众战胜灾害，还是消极悲观，无所作为，这是无产阶级和资产阶级两种根本对立的世界观的反映。大家学习毛主席的光辉著作，运用马克思主义的辩证唯物论，批判孔孟之道的“天命论”和邓小平的唯心论、形而上学思想，并且回顾了革命人民同阶级敌人斗、同自然灾害斗的经验，进一步增强了战胜地震灾害的信心和决心。他们说，无论是帝、修、反还是党内资产阶级，不管他们怎样张牙舞爪，嚣张一时，最终都逃脱不了失败的命运。同样，自然灾害也不可怕。对于地震，我们要在战略上藐视它，坚信困难再大，也能克服，在战术上重视它，采取严肃认真的态度，提出积极措施去解决，这样，任何艰难险阻就都是可以战胜的。"},{"type":"paragraph","text":"天津站的工人理论队伍还研究了历史上儒法两家对待自然灾害的态度。他们指出，在对待自然灾害的态度上，历史上儒法两家从来就有尖锐的斗争。儒家总是宣扬“畏天命”、“听天由命”，借以毒害劳动人民，束缚劳动人民的手脚，维护他们的反动统治；而法家却主张“天变不足畏”，宋朝王安石就认为“薄食（日月蚀）、震摇（地震）皆有常数（规律），不足畏忌”。邓小平一类党内资产阶级出于他们的反动阶级本性，继承了孔孟之道的衣钵，在自然灾害面前，也竭力贩卖“天命论”，散布悲观失望、无所作为的思想，以便他们推行反革命的修正主义路线，搞复辟倒退。我们工人阶级要坚持用唯物论战胜“天命论”，用毛主席的革命路线战胜反革命的修正主义路线，克服自然灾害造成的困难，夺取革命和生产的更大胜利。"},{"type":"paragraph","text":"理论队伍成员把自己研究的心得体会，及时向群众宣讲，帮助全站职工和家属在抗震斗争中坚持学习，提高了阶级斗争和路线斗争觉悟，在人员少、任务重的情况下，理论骨干争先参加突击队，哪里需要就在哪里战斗，和广大群众一起，出色地完成了运输任务。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bc7e258d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
