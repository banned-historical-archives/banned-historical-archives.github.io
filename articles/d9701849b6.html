script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对反动当局参加侵越战争和垄断资本的残酷剥削澳大利亚工人纷纷罢工示威","authors":[],"dates":[{"year":1969,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十二日电　墨尔本消息:澳大利亚悉尼、哈巴特、布利斯班等港口的码头工人、海员，最近先后举行罢工和示威游行，反对澳大利亚反动当局充当美帝帮凶参加侵略越南的战争，要求立即将澳大利亚帮凶军从南越撤回。"},{"type":"paragraph","text":"从十一月下旬开始罢工的悉尼港口的码头工人，继续坚持斗争，拒绝为开往南越替澳大利亚帮凶军运送给养的供应船“杰伯里特号”装卸。他们的罢工使得一干六百吨物资堆积在码头上，并且使得从南越运目的七百吨物资搁置在船舱里。"},{"type":"paragraph","text":"在塔斯马尼亚岛的哈巴特港口，澳大利亚轮船“普尔塔号”的海员们最近到市政厅举行示威游行，要求从南越撤回澳大利亚帮凶军。停泊在这个港口的新西兰轮船“卡米洛号”的船员们，为了声援澳大利亚海员们的正义斗争，也举行了几个小、时的罢工。"},{"type":"paragraph","text":"布利所班的码头工人最近也举行了二十四小时罢工，抗议侵略越南的战争。几百名罢工工人签署了一份呼吁书，呼吁澳大利亚青年拒绝服兵役，以免被送到南越去为美国侵略者充当炮灰。"},{"type":"paragraph","text":"据新华社墨尔本十三日电　澳大牙利亚纽卡斯尔市的两千多名炼钢厂学徒工十二日罢工，反对垄断资本家的残酷剥削，要求增加工资。他们在市内的一个公园里举行了群众集会，然后上街游行示威。"},{"type":"paragraph","text":"澳大利亚国内航线的一千四百名飞机驾驶员在十一日晚上也举行了二十四，小时罢工，要求增加工资。他们的罢工给了垄断资本家以沉重的打击。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9701849b6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
