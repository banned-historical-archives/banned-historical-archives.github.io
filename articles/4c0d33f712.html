<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"水调歌头·游泳","alias":"","parts":[{"type":"paragraph","text":"水调歌头·游泳!"},{"type":"paragraph","text":"（1956年6月）才饮长沙水2，又食武昌鱼。万里长江横渡，极目楚天舒。不管风吹浪打，胜似闲庭信步，"},{"type":"paragraph","text":"今日得宽余5。[1]游泳，1956年6月，毛泽东曾由武昌游泳横渡长江，到达汉口。"},{"type":"paragraph","text":"[2]长沙水，毛泽东自注：“民谣：常德德山山有德，长沙沙水水无沙。所谓无沙水，地在长沙城东，有一个有名的“白沙井”。”"},{"type":"paragraph","text":"[3]武昌鱼，据《三国志·吴书·陆凯传》记载：吴主孙皓要把都城从建业（故城在今南京市南）迁到武昌，老百姓不愿意，有童谣说：“宁饮建业水，不食武昌鱼。”这里化用。武昌鱼，指古武昌（今鄂城）樊口的编鱼，称团头编或团头鲂。"},{"type":"paragraph","text":"[4]极目楚天舒，极目，放眼远望。武昌一带在春秋战国时属于楚国的范围，所以作者把这一带的天空叫“楚天”。舒，舒展，开阔。柳永词《雨霖铃》：“暮霭沉沉楚天阔。”毛泽东在1957年2月11日给黄炎培的信中说：“游长江二小时飘三十多里才达彼岸，可见水流之急。都是仰游侧游，故用“极目楚天舒’为宜。”"},{"type":"paragraph","text":"[5]宽余，指神态舒缓，心情畅快。"},{"type":"paragraph","text":"水调歌头·游泳子在川上日：逝者如斯夫！风动，龟蛇静，起宏图。一桥飞架南北，天堑2变通途。更立西江石壁，截断巫山云雨，高峡出平湖。神女应无恙，"},{"type":"paragraph","text":"当惊世界殊。3"},{"type":"paragraph","text":"[1]一桥飞架南北，指当时正在修建的武汉长江大桥。1958年版《毛主席诗词十九首》和1963年版《毛主席诗词》，毛泽东曾将此句改为“一桥飞架，南北天堑变通途”，后经毛泽东同意恢复原句。"},{"type":"paragraph","text":"[2]天堑，堑，沟壕。古人把长江视为“天堑”。据《南史·孔范传》记载，隋伐陈，孔范向陈后主说：“长江天堑，古来限隔，虏军岂能飞渡？”"},{"type":"paragraph","text":"[3]更立西江石壁当惊世界殊，将来还打算在鄂西川东长江三峡一带建立巨型水坝（“西江石壁”）蓄水发电，水坝上游原来高峡间狭窄汹涌的江面将变为平静的大湖。到那时，巫山的雨水也都得流入这个“平湖”里来。巫山上的神女当然会健在如故，她看到这种意外的景象，该惊叹世界真是大变样了。巫山，在四川省巫山县东南。巫山形成的峡谷巫峡和上游的瞿塘峡、下游的西陵峡合称三峡。巫山云雨，传楚宋玉《高唐赋·序》说，楚怀王在游云梦泽的高唐时曾梦与巫山神女遇，神女自称“旦为朝云，暮为行雨”，这里只是借用这个故事中的字面和人物。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":389,"page_end":390},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c0d33f712"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
