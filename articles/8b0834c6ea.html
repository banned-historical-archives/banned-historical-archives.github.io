art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想指导医疗实践的胜利内蒙古军区总医院实施大脑半球切除手术成功","authors":[],"parts":[{"type":"paragraph","text":"朱维平是地方木器厂工人，因患恶性脑瘤曾做过两次开颅手术。入院时，他的病情更加严重，剧烈呕吐，左侧偏瘫，意识蒙胧，肿瘤已长满大脑右侧半球。内蒙古军区总医院的同志，认为只有进行大脑半球的切除手术，才能挽救他的生命。这种手术，普通神经外科医生能不能做呢？领导组织医护人员学习毛主席关于“战略上藐视敌人，战术上重视敌人”的论述，提高大家战胜困难、挽救阶级兄弟的勇气，做好了手术前的全面准备工作。他们带着高度的阶级感情，实施了开颅切除手术。"},{"type":"paragraph","text":"根据国内外医疗经验，手术后容易出现脑移位或感染并发症等现象。为了防止这种情况发生，医院领导组织护理人员学习《为人民服务》等文章，进一步提高大家的革命责任心，并且学习了切除大脑半球后的护理方法。经过两个月的治疗和护理，患者朱维平已经逐步恢复了健康。"},{"type":"paragraph","text":"《内蒙古战士》报为此发表社论说：军区总医院首次对脑瘤患者进行大脑半球切除手术成功，把军区部队的医疗技术水平提高了一步，为开展部队的战伤外科治疗工作提供了有利条件。这是用毛泽东思想指导医疗实践的光辉胜利。"},{"type":"paragraph","text":"社论说，大脑半球切除手术的成功，是坚持以政治统率业务的结果。他们以全心全意为人民服务的精神，想尽一切办法，要把阶级兄弟从死亡线上挽救回来。他们按照毛主席在战略上藐视困难、在战术上重视困难的教导，在实际工作中又表现了严格的科学态度，运用辩证唯物主义的方法，分析研究从手术前的准备直至手术后护理的每一个环节，对任何一个环节，对任何一个细微地方，都给予充分的重视。社论说，这次医疗成功再一次深刻地告诉我们：毛泽东思想这个强大的思想武器被群众掌握和运用之后，会产生多么强大的物质力量。一切从事技术工作和实际业务工作的同志，一切真正的革命者，都应该象参加这次医疗工作的同志那样，努力用毛泽东思想武装自己，在自己的工作领域中运用毛泽东思想，力求有所发现，有所发明，有所创造，有所前进；通过自己的工作，使军区部队建设出现一个飞跃前进的新局面。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"内蒙古文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b0834c6ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
