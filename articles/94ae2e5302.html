泽东思想  强调要带着问题学，要重新学习《实践论》、《矛盾论》和“老三篇”","authors":[],"dates":[{"year":1970,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）机关报《先锋报》号召澳大利亚共产党人"},{"type":"paragraph","text":"更好学习马克思主义、列宁主义、毛泽东思想"},{"type":"paragraph","text":"强调要带着问题学，要重新学习《实践论》、《矛盾论》和“老三篇”"},{"type":"paragraph","text":"新华社墨尔本十五日电　澳大利亚共产党（马克思列宁主义）机关报《先锋报》十五日发表文章，号召澳大利亚共产党人更好地学习和宣传马克思主义、列宁主义、毛泽东思想。"},{"type":"paragraph","text":"文章说，澳大利亚的社会状况需要马克思主义、列宁主义、毛泽东思想。现在，澳大利亚劳动人民日益觉醒，他们的政治觉悟在迅速提高。“这就要求共产党人比过去更加努力学习马克思主义、列宁主义、毛泽东思想，而且比过去更加努力地宣传毛泽东思想。”"},{"type":"paragraph","text":"文章指出，具体问题需要具体研究。带着问题学非常重要。"},{"type":"paragraph","text":"文章还指出，青年斗争的发展，提出了学习毛主席的《青年运动的方向》这篇文章的必要性。文章说，所有的政治问题都使得我们必须重新学习《实践论》、《矛盾论》和老三篇：《为人民服务》、《纪念白求恩》、《愚公移山》。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94ae2e5302"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
