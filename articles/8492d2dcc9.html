ear":1966,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席万岁！人民万岁！"},{"type":"paragraph","text":"“毛主席来了！”“毛主席来了！”"},{"type":"paragraph","text":"五十里红色大道上，欢声雷动，地撼山摇。人们举着红光闪闪的《毛主席语录》，欢呼“毛主席万岁！万万岁！”一张张激动的脸，一颗颗火热的心，向着我们心中最红最红的太阳。千千万万个红卫兵和革命师生表示共同的心愿：誓死保卫和贯彻执行以毛主席为代表的无产阶级革命路线，彻底批判和坚决反对资产阶级反动路线，把无产阶级文化大革命进行到底。　　　　本报记者摄"},{"type":"paragraph","text":"林彪同志和伟大领袖毛主席一起检阅文化革命大军。林彪同志是毛主席最亲密的战友，最好的学生，是活学活用毛主席著作最好的榜样。我们一定要向林彪同志学习，学习他高举毛泽东思想伟大红旗，活学活用毛主席著作，始终不渝地宣传和捍卫毛泽东思想。"},{"type":"paragraph","text":"《解放军报》记者摄"},{"type":"paragraph","text":"千针万线，难以表达对毛主席的无限热爱、无限敬仰、无限崇拜的心情。来自江西省永新县革命老根据地的红卫兵，连夜绣起“井冈山地区红卫兵”的红旗，高举毛主席画像，接受伟大领袖毛主席的检阅。"},{"type":"paragraph","text":"《解放军报》记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8492d2dcc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
