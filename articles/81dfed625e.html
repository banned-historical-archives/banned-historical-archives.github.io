tes":[{"year":1949,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十七日电】　香港中国航空公司全体员工十四日致电毛主席周总理，表示遵示尽力保护公司资产。电文如下:"},{"type":"paragraph","text":"中央人民政府毛主席周总理钧鉴:奉十一月十二日钧电，敬悉。接受本公司同人请求，并任命刘敬宜为本公司总经理，至深欣慰。今后全体员工誓在人民政府及刘总经理领导下，团结一致，坚定立场，尽力保护公司资产，静待指示。谨此电覆。"},{"type":"paragraph","text":"中国航空公司全体员工十一月十四日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81dfed625e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
