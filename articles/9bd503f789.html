script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji14","name":"毛泽东全集第14卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1939年12月13日）"},{"type":"paragraph","text":"我认为不提三民主义文化为好，因为三民主义的本质就是民主主义。民主主义有两派，一派是彻底的民主主义，一派是不彻底的民主主义。以提中华民族的新文化为好，即彻底的民主主义文化。马克思主义中国化问题，不能说马克思主义早已中国化了。马克思主义是普遍的东西，中国有特殊情况，不能一下子就完全中国化。边区的教育方针应该是民主主义的，应该宣传当前民主主义的任务，同时又宣传共产主义思想体系。因此，学校也不能只教共产主义思想体系，而忽视当前实际任务。新文化用下面四大口号为好：民族化（包括旧形式），民主化（包括统一战线），科学化（包括各种科学），大众化(鲁迅提出的口号，我们需要的)。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上听取艾思奇关于准备陕甘宁边"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":179,"page_end":179},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bd503f789"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
