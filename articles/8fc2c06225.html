"year":1965,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京6日电　毛泽东主席今天下午接见刚果(布)革命妇女联盟主席扬扎·塞琳娜夫人，和她率领的刚果(布)革命妇女联盟代表团团员:朗贝尔·约瑟菲娜夫人、索利巴·安娜夫人、奔巴—日尔曼娜·伊莉莎白夫人、古埃莫·伊莉莎白夫人、坎藏济·阿加特夫人，同她们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有全国妇联副主席章蕴、书记处书记黄甘英。"},{"type":"paragraph","text":"新华社北京6日电　中非友好协会今晚为以扬扎·塞琳娜为首的刚果(布)革命妇女联盟代表团访华举行宴会。"},{"type":"paragraph","text":"宴会中，宾主进行了亲切友好的交谈。"},{"type":"paragraph","text":"宴会由中非友协副会长张铁生主持。出席的有章蕴、黄甘英、谢冰心、张晓梅等。"},{"type":"paragraph","text":"刚果(布)驻华大使馆参赞诺贝尔一乐恩巴和夫人也应邀出席。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\07\\6577010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e七月六日，毛泽东主席接见由扬扎·塞琳娜夫人(左)率领的刚果(布)革命妇女联盟代表团。"},{"type":"paragraph","text":"(新华社传真　钱嗣杰　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fc2c06225"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
