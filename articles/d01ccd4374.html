script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"各民主党派四川基层组织部分成员不同意李维汉同志讲话中对民主党派性质等问题的一些提法","authors":[],"dates":[{"year":1957,"month":11,"day":9}],"is_range_date":false,"parts":[{"text":"各民主党派四川基层组织部分成员不同意李维汉同志讲话中对民主党派性质等问题的一些提法","type":"title"},{"text":"新华社成都9日讯  目前，各民主党派四川基层组织正在普遍讨论李维汉同志的讲话。在讨论中许多人对民主党派的性质和改造立场等问题提出了一些不同的看法。如民盟中有人说：“民盟原来是以小资产阶级知识分子为主要成分的政党，不久前新盟章又提出民盟是知识分子的政党，可是现在又突然提出是资产阶级性质的政党，这真是越改造越降格，取消了小帽子，戴上大帽子，愈陷愈深”。民革中有人说：“民革的社会基础是国民党分化出来的进步分子，它过去跟着共产党实现新民主主义，今天跟着共产党实现社会主义，因此，名额不是资产阶级性质的政党。”","type":"paragraph"},{"text":"农工、九三、民进成员中有人说：“知识分子没有剥削，仅有知识，为何说它是资产阶级性质？”许多成员对民主党派是资产阶级性质政党的提法觉得很突然，后悔不该参加。","type":"paragraph"},{"text":"部分人对李维汉同志的讲话还提出了许多疑问，如：（1）过去民主党派是革命的政党，又有先烈，现在说是资产阶级政党，是否还有革命性？（2）不少科学技术人员说：技术人员一贯靠薪金收入维持生活，有的还参加了工会，勤勤恳恳的为社会主义服务，说是资产阶级如何解释？（3）如果民主党派是资产阶级性质的政党，那么四个阶级朋友中的小资产阶级是不是被抛弃了？（4）资产阶级性质的东西，在社会主义改造时期要被打倒，民主党派是不是要被打倒？（5）民主党派成员经过立场的改造后，都是无产阶级的人，那是民主党派要不要长期共存？（6）是不是因为这次揭发出了许多右派分子，才提出民主党派是资产阶级性质的政党？","type":"paragraph"},{"text":"此外，对李维汉同志所讲“痛下决心，在一、二年内即改变立场”也提出了很多问题。如有人认为改变立场不是那么容易的事，需要长时期慢慢的来，要先明确了认识，才能下决心。有人对李部长的提法极为抵触，认为这是“强迫站稳立场”。有人认为只有先树立无产阶级思想，然后才能有社会主义立场，不能先有立场，通过学习来改变思想。不少人认为，改变立场需要有一定的思想基础，很难设想，没有一定的基础，就能痛下决心。还有人认为解决立场首先是解决世界观问题，解决世界观是长期的，因此怀疑一下子就能解决立场问题。（朱实据省委统战部材料编）","type":"paragraph"},{"text":"新华通讯社编：《内部参考》，第2359期，1957年11月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d01ccd4374"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
