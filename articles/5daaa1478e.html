r":1966,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国营二机　吴治国"},{"type":"paragraph","text":"影片《舞台姐妹》在漂亮迷人的外衣遮掩下，大肆宣扬“个人奋斗”的邪路，竭力贩卖“艺术至上”的资产阶级私货，尽情赞赏孤芳自赏的小资产阶级情调，任意丑化我们劳动人民的正直形象。影片的编导者别有用心地虚构了一个所谓进步演员竺春花的形象。要我们去欣赏她、赞美她。"},{"type":"paragraph","text":"在我们今天这个社会里，一切被歌颂被赞扬的东西，必须对社会主义有利，必须能推动人们在社会主义革命和建设中奋勇前进!而《舞台姐妹》却去歌颂一个道道地地的资产阶级分子，宣扬的完全是一套发臭发霉国的资产阶级人生观。"},{"type":"paragraph","text":"这位所谓进步演员的竺春花在影片中究竟做了些什么呢?只见她孤“芳”自赏，自鸣“清高”；只见她为了成名成家，个人独“闯”。她的最高理想，就是能有一个自己的舞台，“在台上昂头做戏，在台下挺胸做人”。这里，人们不禁要问:象这样一个竺春花，不是道道地地的资产阶级个人主义者又是什么呢?"},{"type":"paragraph","text":"正当今天我们广大青年大学毛主席著作，在思想意识领域里大破“唯业务论”、“唯知识论”的错误观点时，你们却捧出这个“艺术至上”、“清白”不凡的竺春花，是何居心呢?是不是你们也要我们象竺春花一样，“两耳不闻窗外事，一心只读圣贤书”，在个人奋斗的邪路上去成名成家呢?如果是这样的话，那么，我们要对你们大喝一声:这是妄想，绝对办不到!我们青年一定要读毛主席的书，听毛主席的话。照毛主席的指示办事。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5daaa1478e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
