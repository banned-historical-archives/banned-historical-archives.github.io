s":["曾祥基","沈阳师范学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——“肃反运动糟糕透顶”","type":"title"},{"text":"沈阳师范学院曾祥基","type":"authors"},{"text":"(曾祥基：沈阳师范学院中文系学生)","type":"subtitle"},{"text":"“肃反运动糟糕透顶。……在肃反运动中，党中央主观主义地估计了残余敌人的数字，提出了‘大胆怀疑’的口号。于是，在这样的情况下，结果便斗错了很多善良的人民，而真正打中的反革命分子却没有多少。有的人在平时讲了一句怪话，也就把他当作反革命分子来斗，……类似这种情况是举不胜举的啊！”","type":"paragraph"},{"text":"“我认为肃反运动是糟糕透顶!!！‘伟大’的肃反运动，我认为这是共产党‘民主’政治的结晶。经过这个运动，共产党的威信已经一败涂地了。在肃反运动中，共产党发动了所有的党员，向人民进行了一次疯狂的打击。这时候，每一个党员，都成了神圣的法官。他们可以毫无根据的说你是反革命分子，把你斗的神魂颠倒。在这样的情况下，不知有多少的人民无辜被斗争，不知有多少的同志含冤而自杀，不知有多少的夫妇破裂了爱情，不知有多少的朋友断绝了关系。这个详细的数目字，我想恐怕只有上帝才会知道的。因此，就请上帝告诉我们吧！在‘伟大’的肃反运动中，究竟斗错了多少善良的人民？究竟死去了多少无辜的同志？究竟拆散了多少美满的家庭？究竟破坏了多少朋友的关系？”","type":"paragraph"},{"text":"“在肃反运动中，有许多做法都是违反宪法的，因此不少被斗的人，本来没有什么问题，但由于经不起精神虐杀，便含冤自杀了。甚至有些很有学问的大学教授，也在肃反时自杀了。你看，这是多么令人痛心的事情呵!”","type":"paragraph"},{"text":"“肃反是得不偿失，浪费很多的金钱。拿我们学院来说，在肃反时候花掉的经费就有十万元，而我们学院数理大楼的建筑费才不过六万元!要是把全国肃反花掉的经费合计起来，那么这笔数目一定是相当惊人的!要是把这一笔钱拿来建设的话，我们能建多少工厂，能盖多少楼房啊!”","type":"paragraph"}],"comments":[],"origin":"《右派言论选辑》（社会主义教育参考资料之一，内部材料　仅供参考，沈阳师范学院社会主义教育办公室 1958．3）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a8d5149a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
