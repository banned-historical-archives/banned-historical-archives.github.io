" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"林县调查政府部门贯彻农村阶级路线的情况","authors":[],"dates":[{"year":1963,"month":9,"day":3}],"is_range_date":false,"parts":[{"text":"林县调查政府部门贯彻农村阶级路线的情况","type":"title"},{"text":"新华社郑州讯  最近，林县县委组织县人委各科局干部就政府部门贯彻农村阶级路线的问题进行了调查。在调查中发现政府各部门工作都没有很好地贯彻农村阶级路线。","type":"paragraph"},{"text":"在贯彻阶级路线中存在问题较多的是银行、民政、司法、供销社、文教、卫生等部门。以贷款来说，由于银行对贷款限制过多，如规定累贷户不贷、没偿还能力的不袋、人多劳少不贷、五保户不贷，结果有不少贫下中农困难户得不到贷款。董家庄生产队贫农许六，去年贷款十元，已还九元，只欠一元，今年房屋倒塌，要求信用部再贷几元，干部不贷，说他是累债户。相反的，富裕中农贷款却很容易，常家庄生产队富裕中农申天街，要买缎子被面、褥子、毛衣没有钱，信用部一次就贷给他一百元。民政部门过去发放的救济款、救济品是很多的，但其中有不少部分给富裕中农了。如郭家园大队红土岭生产队去年救济五户，其中有四户都是富裕中农。法院在处理婚姻纠纷时，很少有阶级斗争观点。如常家庄大队瓦房庄生产队下中农郭清敏，长期找不到对象，后来同一个反革命家属结婚，婚前郭东拼西凑地下了三百元婚礼，婚后不久，女的要求离婚，郭要她退回婚礼，女的不干。此事告到法院，法院按照女方意见判决离婚。郭因此被骗了三百元，生活非常困难。贫下中农要求供销社收购上门，帮助推销一些零星的土副产品，而供销社很少收购；贫下中农要求供销社供应价钱便宜又很实用的东西，而供销社对这些很少供应，供应的都是价钱很高，或者不是贫下中农所急需的东西。农村学校的组织形式和教学内容也不完全适合贫下中农的要求。贫下中农为了使孩子既能上学又能参加劳动，要求增办些轮回学校、隔日制学校和识字班，可是现在办的都是单一的全日制的学校。贫下中农要求学校增加应用文、珠算、写毛笔字等教学内容，而现在的学校很少有这方面的教学内容。","type":"paragraph"},{"text":"来源：1963年9月3日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f499ba38f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
