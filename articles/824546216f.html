ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于请郭沫若修改《到韶山》《登庐山》两首诗给胡乔木的两封信","alias":"","parts":[{"type":"paragraph","text":"关于请郭沫若修改《到韶山》《登庐山》两首诗给胡乔木?的两封信"},{"type":"paragraph","text":"（1959年9月7日、13日）乔木同志："},{"type":"paragraph","text":"诗两首，请你送给郭沫若同志一阅，看有什么毛病没有？加以笔削，是为至要。主题是为了反右倾鼓干劲的，是为了惩治反党、反总路线、反大跃进、反人民公社的。主题虽好，诗意无多，只有几句较好一些的，例如“云横九派浮黄鹤”之类。诗难，不易写，经历者如鱼饮水，冷暖自知，不足为外人道也。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月七日"},{"type":"paragraph","text":"[1]郭沫若，当时任全国人大常委会副委员长、政协全国委员会副主席、中国文学艺术界联合会主席。"},{"type":"paragraph","text":"[2]胡乔木，当时任毛泽东的秘书。"},{"type":"paragraph","text":"[3]指毛泽东1959年6月写的《七律·到韶山》和7月1日写的《七律·登庐山》两首诗。"},{"type":"paragraph","text":"关于请郭沫若修改《到韶山》《登庐山》两首诗给胡乔木的两封信乔木同志："},{"type":"paragraph","text":"沫若同志两信都读，给了我启发。两诗又改了一点字句，请再送陈沫若一观，请他再予审改，以其意见告我为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十三日早上"},{"type":"paragraph","text":"“霸主”指蒋介石。这一联“写那个时期的阶级斗争。通首写三十二年的历史。"},{"type":"paragraph","text":"[1]指《七律·到韶山》一诗中“红旗卷起农奴戟，黑手高悬霸主鞭”一句。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":7},{"year":1959,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":353,"page_end":354},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"824546216f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
