ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"致华中局等电","alias":"","parts":[{"type":"paragraph","text":"致华中局等电"},{"type":"paragraph","text":"（1949年8月5日）"},{"type":"paragraph","text":"（一）我军接管长沙后，除成立长沙军事管制委员会（李明灏应参加为委员）外，湖南省政府及湖南军区两机构不要马上成立，即用长沙军管会名义统一指挥已占各县。（二）我军入长沙，望注意维持良好秩序，极力注意做程潜、陈明仁及其一派人物中的工作，尊重他们，给他们以起义者的待遇，帮助他们进步，团结多数，打击反动分子。以便经过这种统一战线的方式，顺利地接管全省政权及改编陈明仁军队为人民解放军。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致华中局并告湖南省委电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":113,"page_end":113},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a474245dac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
