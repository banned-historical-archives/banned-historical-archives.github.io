这口超深井的全体职工","authors":[],"dates":[{"year":1976,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社成都一九七六年五月四日电　在深入批邓、反击右倾翻案风斗争取得伟大胜利的大好形势下，四川省石油管理局五月二日在川中石油矿区隆重召开庆祝大会，热烈庆祝在毛主席、党中央的亲切关怀下，打成我国第一口六千零十一米超深井的胜利，表彰打成这口超深井的七○○二钻井队的全体职工。在大会上，来自四川和全国各地的六千多名代表，热烈欢呼党中央的两项英明决议，热烈欢呼毛主席革命路线的伟大胜利，决心夺取批判邓小平、反击右倾翻案风斗争的新胜利，夺取抓革命、促生产的新胜利。"},{"type":"paragraph","text":"出席大会的有石油化工部副部长张珍、孙晓风，中共四川省委书记、四川省革命委员会副主任徐驰，四川省石油管理局党委书记黄凯等有关部门的负责同志，大庆、胜利、大港、玉门、新疆等地油田的代表和全国著名的大庆油田的一二○二、一二○五钻井队，胜利油田的三二五二钻井队，华北勘探指挥部三二六九钻井队，四川的三二一一一英雄钻井队等单位的代表。"},{"type":"paragraph","text":"在大会上，中共四川省委和石油化工部的负责同志代表中共四川省委、四川省革命委员会和石油化工部，向七○○二钻井队赠送了马列著作和毛主席著作，颁发了奖旗，并授予这个钻井队为“勇攀高峰的七○○二深井钻井队”的光荣称号。"},{"type":"paragraph","text":"参加庆祝大会的代表们一致认为，我国石油战线出现了七○○二钻井队这样的先进集体，生动地反映了经过无产阶级文化大革命、批林批孔和学习无产阶级专政理论运动，石油战线广大工人、干部和工程技术人员精神面貌发生的深刻变化，是对党内最大的不肯改悔的走资派邓小平否定文化大革命，妄图翻案复辟的有力回击。"},{"type":"paragraph","text":"七○○二钻井队指导员姚光雄代表井队全体职工，在大会上发了言。他表示要认真学习毛主席的重要指示，继续深入批判不肯改悔的走资派邓小平及其反革命的修正主义路线，以钻出更多超深井的实际行动为伟大领袖毛主席争光，为伟大的社会主义祖国争光。"},{"type":"paragraph","text":"大会在热烈的掌声中，通过了四川省石油管理局全体职工给伟大领袖毛主席的决心书。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2a60c843e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
