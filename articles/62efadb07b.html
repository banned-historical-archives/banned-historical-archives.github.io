ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"代拟的给陈宗娥的信","alias":"","parts":[{"type":"paragraph","text":"代拟的给陈宗娥的信"},{"type":"paragraph","text":"（1962年5月12日）宗娥："},{"type":"paragraph","text":"你1961年6月27日给我的信，我于今天早上才收到。在北京压了十个半月，真是岂有此理！至于你说，去年三月有信，则至今未收到，正在查询。我已两年不在北京了，患了重病，不习北方气候。现病略为好些，忽（勿》以为念。闻你如此重病，又如此困难，心极不安。今送上五百元，以济眉急。如有所需，望随时告我。有病不要性急，越急越坏。安心治疗，是为上策。有信请写：北京中南海17支局109号信箱徐业夫同志收转江青。祝你健康！"},{"type":"paragraph","text":"云鹤"},{"type":"paragraph","text":"1962年5月12日[1]这封信是以江青名义写给曾在毛泽东家做过保姆的陈宗娥的。[2]徐业夫，当时任毛泽东办公室秘书。[3]云鹤，即李云鹤，江青的原名。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":5,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":140,"page_end":140},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62efadb07b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
