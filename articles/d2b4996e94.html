art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"修正主义和教条主义都有“左”、右之分","authors":[],"parts":[{"type":"paragraph","text":"长期以来，人们简单地把修正主义等同于右倾机会主义，把教条主义等同于“左”倾机会主义。《红旗》杂志一九八○年第六期发表的《修正主义、教条主义、经验主义和政治路线的关系》一文中指出，这种看法是片面的，错误的。"},{"type":"paragraph","text":"文章援引列宁在《马克思主义和修正主义》以及《共产主义运动中的“左派”幼稚病》等著作的论述，指出修正主义和教条主义都有“左”、右之分，都既可能表现为右倾机会主义，又可能表现为“左”倾机会主义。例如，我国第二次国内革命战争时期的陈独秀有时就是从右的方面对马克思主义持教条主义态度，林彪、“四人帮”就是从极左方面对马克思主义持修正主义态度（也兼有教条主义经验主义的东西）。这说明了阶级斗争的复杂性和斗争形式的多样性。只有实事求是，对具体情况作具体分析，才能更好地开展基本理论方面和政治路线方面的斗争，反对各种形式的修正主义和教条主义。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2b4996e94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
