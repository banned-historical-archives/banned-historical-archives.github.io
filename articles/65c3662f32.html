script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海仪表电讯系统广大工人闯难关攻尖端大力生产新产品为宣传毛泽东思想多贡献力量在“九大”胜利召开的特大喜讯鼓舞下，进一步掀起活学活用毛泽东思想群众运动，以革命统帅生产，以实际行动向“九大”献礼","authors":[],"dates":[{"year":1969,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　党的第九次全国代表大会隆重开幕的特大喜讯传来，上海仪表电讯系统广大革命工人欢欣鼓舞，万分激动，大家纷纷以实际行动向党的“九大”献礼。"},{"type":"paragraph","text":"仪表电讯系统的革命工人，在毛主席一系列最新指示鼓舞下，狠抓革命，猛促生产，革命搞得轰轰烈烈，生产蒸蒸日上，全局系统今年一季度总产值比去年同期增长一倍。他们遵照伟大领袖毛主席“努力办好广播，为全中国人民和全世界人民服务”的教导，为大力发展广播事业，广泛传播毛泽东思想服务。今年一季度收音机、电唱机比去年同期大量增产。中国唱片厂的革命工人怀着对毛主席无限忠诚的无产阶级感情，落实各项无产阶级政策，狠抓对敌斗争，有力促进了生产，今年一季度生产的宣传毛泽东思想的唱片比去年同期增长百分之七十以上。该厂生产的电唱机比去年同期成倍地增长，特别是新产品“一○九”电唱机，既可以收音又可扩音也能放唱片的“三用”唱机，受到广大贫下中农的欢迎。上海灯泡厂的工人在短短的几个月中，试制成功一种大型广播设备中的关键产品，为我国大力发展广播事业作出了贡献。革命工人在毛主席“备战、备荒、为人民”的伟大战略方针指引下，试制和生产了不少重要产品。"},{"type":"paragraph","text":"上海合金厂的革命工人，正在筹建半导体车间。在“九大”隆重开幕特大喜讯的鼓舞下，工人同志热血沸腾，浑身是劲，纷纷表示要以加速建成这个车间，早日投入生产的实际行动向“九大”献礼。上无二十七厂冲床组发扬了敢想敢干的革命精神，在四月二日试制成功两副土模具。该厂原来有一个进口的横条落料模，质量一直过不了关，工人同志发扬自力更生精神，自己动手搞成了土模子，质量好，工效可提高八到十倍。上海无线电六厂的革命工人听到“九大”召开的喜讯，个个精神振奋，决心加速完成献礼项目，经过连夜奋战，提前试制成功了一台关键设备。上海无线电十一厂是专门生产广播器材的，在“九大”隆重开幕的特大喜讯鼓舞下，决心提前超额完成大功率喇叭生产任务。该厂工人深深懂得，多生产一只喇叭，为大力宣传毛泽东思想多贡献一分力量，因此千方百计挖潜力，努力增产。"},{"type":"paragraph","text":"当“九大”隆重开幕的振奋人心的特大喜讯传来的那天，正在召开局系统活学活用毛泽东思想积极分子代表大会，真是喜上加喜。许多代表回到家里久久不能入睡，反复考虑用什么实际行动向“九大”献礼。他们感到千重要万重要，活学活用毛泽东思想最重要，不少代表连夜学习毛主席著作。当前，仪表电讯系统的广大革命工人，在“九大”隆重开幕的特大喜讯鼓舞下，掀起了一个更加波澜壮阔的活学活用毛泽东思想的群众运动，决心用认真总结经验，落实各项无产阶级政策，狠抓革命、猛促生产的实际行动向“九大”献礼!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65c3662f32"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
