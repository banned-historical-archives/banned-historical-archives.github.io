<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"检查我们的右倾思想","authors":["凃序彦","戴愚绪"],"dates":[{"year":1952,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武汉大学　凃序彦　戴愚绪"},{"type":"paragraph","text":"我们检查组最近讨论了增产节约委员会总会发言人第二次的谈话，并结合进行了右倾思想的检查，结果发现了我们组内存在着严重的右倾思想，主要的有下面几种:"},{"type":"paragraph","text":"(一)对“老虎”仇恨不深——反过来说也就是对人民的爱不够，一般地说是只从贪污分子个人的卑鄙无耻上面去恨他，而不从他对祖国人民的危害性上面去恨他，没有认识贪污分子就是经济上的反革命分子，因此，如林砚田同学看守大“老虎”王兆夔时，见他哭丧着脸，心里就软了，觉得他恐怕没有什么问题了吧!还有一个贪污分子患着第三期肺病，他口口声声说自己快要死了，借以拒绝坦白，有的同学竟因此可怜他，放松了对他的斗争。"},{"type":"paragraph","text":"(二)“将心比心”——拿人心去比兽心，对资产阶级的进攻，贪污分子的卑鄙狡猾估计不足。有时以为自己做不出的事，贪污分子也不会做。老怕犯错误——过“左”，竟至轻信贪污分子的话而对群众的反映和自己所掌握的充分资料怀疑起来。如查帐发现了大毛病，还常以为是帐搞错了，而不曾想到是贪污分子搞的鬼，工作中有时替贪污分子着想的多，反替人民着想的少，甚至想替贪污分子找辩解的理由。"},{"type":"paragraph","text":"(三)从表面上看问题，轻易下结论——有时单凭主观的想像，甚至只看一个人的外表，来决定他是否是“老虎”。有个别同学居然因贪污分子一说“具结”，就把门关住，不再追了，这是很危险的。更错误的是有人先凭主观对某人下了结论，决定他是“大老虎”或“小老虎”，然后再去进行调查研究工作，甚至想拿材料来凑合自己的想像，因此或者是“扑空”，或者是“老虎”没打中，反被“老虎”咬一口。"},{"type":"paragraph","text":"(四)怕麻烦和“收兵思想”——个别同学觉得查帐查来查去也没有查出什么名堂，麻烦死了，没有认识每一件细小工作的成功，乃是整个运动胜利的基础，也有些同学以为“老虎”已打得差不多了，因此松了劲，甚至工作时间也带小说去看，或是上午去，下午就不去，对打虎工作的复杂性、艰巨性认识不足。"},{"type":"paragraph","text":"(五)惜“才”思想——如觉得“他们教书教得不坏呀”“工程图绘得还可以呀!”这种思想基本上是和自己的单纯技术观点同出一辙的，没有想到贪污分子有了这种“才”，可能给人民带来更大的危害。"},{"type":"paragraph","text":"这些思想严重地阻碍了我们的工作，影响到更大成绩的获得，通过这次检查，大家已初步认清其危害性，大家都表示决心予以清除，争取打“虎”斗争的彻底胜利。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d601d22e0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
