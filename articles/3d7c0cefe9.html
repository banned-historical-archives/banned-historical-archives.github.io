torical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"关于国家资本主义经济","description":"根据毛泽东手稿刊印。","dates":[{"year":1953,"month":7}],"parts":[{"text":"关于国家资本主义经济","type":"title"},{"type":"paragraph","text":"中国现在的资本主义经济，其绝大部分是在人民政府管理之下的，用各种形式和国营社会主义经济联系着的，并受工人监督的资本主义经济。这种资本主义经济已经不是普通的资本主义经济，而是一种特殊的资本主义经济，即新式的国家资本主义经济。它主要地不是为了资本家的利润而存在，而是为了供应人民和国家的需要而存在。不错，工人们还要为资本家生产一部分利润，但这只占全部利润中的一小部分，大约只占四分之一左右，其余的四分之三是为工人（福利费）、为国家（所得税）及为扩大生产设备（其中包含一小部分是为资本家生产利润的）而生产的。因此，这种新式国家资本主义经济是带着很大的社会主义性质的，是对工人和国家有利的。"}],"comment_pivots":[{"part_idx":0,"offset":10,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东在中共中央一九五三年六月十四日至八月十二日召开的全国财经会议的领导小组会议纪要第七号上写的一段文字。"],"page_start":296,"page_end":296,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d7c0cefe9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
