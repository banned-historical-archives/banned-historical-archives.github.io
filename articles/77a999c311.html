同省地委书记座谈","authors":[],"dates":[{"year":1979,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加强广东各级领导班子建设  团结一致努力工作做出成绩"},{"type":"paragraph","text":"叶剑英同志接见广东三级干部并同省地委书记座谈"},{"type":"paragraph","text":"新华社广州六月五日电  中共中央副主席叶剑英六月一日下午在广州接见了正在这里参加中共广东省委召开的三级干部会议的地、市、县委书记。"},{"type":"paragraph","text":"参加接见的有，中共中央政治局委员、中国人民解放军广州部队负责人许世友，中共广东省委第一书记习仲勋、第二书记杨尚昆等。"},{"type":"paragraph","text":"接见以后，叶剑英同志同省、地委书记进行了座谈，详细了解了广东的农业、资源开发、交通运输、畜牧业、手工业、小水电建设、民族工作和海南岛的开发等情况，并指出要进一步加强各级领导班子的建设，重视培养地方干部和青年干部；要加快广东石油资源的开发。他还指出，广东水利资源很丰富，要多搞小水电；农业要搞好，还要大力发展畜牧业；要关心华侨，进一步落实侨务政策，鼓励海外华侨和港澳同胞积极支援祖国的社会主义现代化建设。"},{"type":"paragraph","text":"叶剑英同志特别强调要认真搞好经济体制的改革。他认为这个问题非常重要。他说，在这方面我们还没有经验。中央决定先搞试点，然后推广。"},{"type":"paragraph","text":"叶剑英同志说，中央对广东抱有很大希望，希望广东的同志们在党中央和省委的领导下，团结一致，努力工作，一年一年都有新成绩。"},{"type":"paragraph","text":"参加座谈的同志们一致拥护叶剑英同志的讲话。他们表示，一定要按照三中全会的精神，从广东的实际情况出发，搞好国民经济的调整和经济体制的改革，首先要尽快把广东的农业搞上去，为完成中央交给广东的任务，兢兢业业，努力工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77a999c311"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
