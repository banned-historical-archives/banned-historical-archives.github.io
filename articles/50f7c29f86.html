art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"化整为零的手法骗不了革命群众","authors":["海军学习毛主席著作积极分子/战斗英雄舒积成"],"parts":[{"type":"paragraph","text":"反动影片《怒潮》以化整为零的手法，炮制了三个黑形象。妄图通过所谓的“农民领袖”邱金，所谓的国民党“正义”军官黄维国，所谓的“正确路线”的党代表罗大成，来大肆美化反革命修正主义分子彭德怀，妄图为这个大野心家、大阴谋家歌功颂德、树碑立传。"},{"type":"paragraph","text":"反动影片《怒潮》中捧出的三个黑人物，都各有其妙用。篡军反党野心家彭德怀是国民党军阀出身，干过反共反人民的罪恶勾当。因此影片作者就把一个双手沾满人民鲜血的反动军官黄维国，美化为有“正义感”、倾向“革命”，最后还“勇敢”地投奔到革命队伍中来了。美化黄维国，正是美化彭德怀，竭力掩盖了他那反共反人民的罪恶史。"},{"type":"paragraph","text":"篡军反党野心家彭德怀在罢官之前，一直自称为“农民的儿子”，他的黑爪牙就在影片中采取偷天换日的手法，把他打扮成“农民的领袖”。那在影片中“英勇善战”的邱金，就正是彭德怀的第二个化身。"},{"type":"paragraph","text":"影片中出现的一个中心人物罗大成，被吹捧为“正确路线”的代表。这个人物是彭德怀阴魂附体的第三个化身。影片炮制者拚命借这个人物来美化篡军反党分子彭德怀和他所执行的机会主义路线。影片还用这个人物来借题发挥，为反党集团大鸣不平，为彭德怀招魂，真是反动透顶，疯狂之极！"},{"type":"paragraph","text":"反动影片《怒潮》采取把彭德怀一分共三的拙劣手法，为他树碑立传，鸣冤叫屈，为他的翻案大选舆论准备。我们必须奋起毛泽东思想的千钧棒，把它批深、批透，批倒、批臭，把这株大毒草抛进历史的垃圾堆。"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50f7c29f86"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
