1949,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京一日电】　中央人民政府外交部长周恩来，本日已将毛泽东主席的公告具函送达各外国政府，周部长系以公函送达各国在北京旧领事馆领事，请其转交各国政府。在北京无领事馆，而在南京有大使馆或公使馆者，则送达南京各国旧大使馆或公使馆。周部长的公函如下:‘迳启者，中华人民共和国中央人民政府毛泽东主席已在本日发表了公告。我现在将这个公告随函送达阁下，希为转交贵国政府。我认为中华人民共和国与世界各国建立正常的外交关系是需要的。中华人民共和国中央人民政府外交部部长周恩来。一九四九年十月一日，于北京。’"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b31253916"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
