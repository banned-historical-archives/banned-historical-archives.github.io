rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"马列主义者必须努力学习毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 法国马克思列宁主义共产党中央委员会书记处书记雷蒙·卡萨斯最近在《新人道报》上发表文章强调指出：越南南方军民最近在新春攻势中取得的伟大胜利表明，马克思列宁主义者必须更加努力地学习和传播毛泽东思想。"},{"type":"paragraph","text":"卡萨斯写道：根据当代的列宁——毛泽东同志的教导，共产党和党所领导的军队如果要取得革命的胜利，必须同人民群众建立最紧密的联系。毛主席在中国长期的革命斗争过程中创造了战无不胜的人民战争的学说。从越南人民最近取得的伟大胜利中，可以看出毛泽东思想的巨大威力，以及毛泽东思想对革命人民的巨大贡献。卡萨斯说：“我们必须好好研究其中所包含的对西方各国人民和工人阶级的政治含意和革命教益。”"},{"type":"paragraph","text":"卡萨斯说：决定革命和战争的命运的是人，而不是物。毛主席教导我们说：“在人类历史上，凡属将要灭亡的反动势力，总是要向革命势力进行最后挣扎的，而有些革命的人们也往往在一个期间内被这种外强中干的现象所迷感，看不出敌人快要消灭，自己快要胜利的实质。”"},{"type":"paragraph","text":"卡萨斯说：实践已经证明，毛泽东思想是战无不胜的。法国马克思列宁主义共产党的所有党员，必须更加努力地学习毛主席著作。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4573d89d89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
