场》这一篇报导","authors":[],"dates":[{"year":1961,"month":1,"day":5}],"is_range_date":false,"parts":[{"text":"文化部通知不要转载《毛主席来到我们的养猪场》这一篇报导","type":"title"},{"text":"1960年12月27日人民日报《永远要作群众的小学生》（作者：王威宣、陈济、曾铮）一文中，所引用的1958年7月1号《中国妇女》刊登的一篇报道--《毛主席来到了我们的养猪场》，是一篇虚构的假报道。两年前，全国妇联党组发现这个错误后，除曾在《宣教动态》上刊登了一则简讯外，并曾给各省市委宣传部发了通知，说明这个报道是虚假的，请不要转载。但是1958年7月人民出版社出版的《毛主席在群众中》一书选用了这篇报道；1960年5月《内蒙古妇女》杂志刊登的《毛主席关于妇女运动的语录》，也摘录了这篇报道；12月27日人民日报第7版《永远要作群众的小学生》一文又引用了这篇报道。这种以讹传讹的严重错误，有损毛主席的威信，应引起新闻出版工作者严重注意。请各省、市、自治区文化局通知有关报社、杂志社和出版社，勿再将此文予以转载或引用。","type":"paragraph"},{"text":"主送：中央一级报社、杂志社、出版社，各省、市、自治区文化（出版）局","type":"paragraph"},{"text":"抄送：中共中央宣传部","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ae0fcdc52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
