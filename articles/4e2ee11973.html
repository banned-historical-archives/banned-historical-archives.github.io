rs":["上海第一师范学院","周道南","曾凤生","王德茂"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“储安平的‘党天下’说得有理大胆”","type":"title"},{"text":"上海第一师范学院周道南曾凤生王德茂","type":"authors"},{"text":"“储安平的‘党天下’说得有理大胆，好象说出了我的心里话似的”","type":"paragraph"},{"text":"“对储的言论批驳，是向党讨好，拍马屁的表现”。(中文科21班学生周道南)","type":"paragraph"},{"text":"“我同意‘党天下’的看法，‘党天下’的情况是有的，我院革命史课代表的指派是‘党天下’的表现，过去我工作过的江西财政厅目上而下的领导都是党员，也是‘党天下，的表现，廖院长有职无权也是‘党天下’的表现，无产阶级专政就是要‘党天下’”。“党贯彻政策先通过党团员，有些事党团员先知道，群众不知道，这是‘党天下’。”(中文科㈠20班曾凤生)","type":"paragraph"},{"text":"“共产党内有宗派主义的表现，如“清一色”思想，党员自认为是伟大的为共产主义事业奋斗，但一个非党员也是可以为共产主义事业奋斗，所以应该废除‘清一色’，不应该是共产党员的‘清一色’，共产党员不应该忘记人民群众。”(政教科学生王德茂)","type":"paragraph"},{"text":" 来源：《鸣放言论选集》（上海第一师范学院，1957）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e2ee11973"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
