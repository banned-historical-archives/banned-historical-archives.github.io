[],"dates":[{"year":1970,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想引来了万代幸福泉"},{"type":"paragraph","text":"万全县建成一百华里长的四清大渠"},{"type":"paragraph","text":"在波澜壮阔的无产阶级文化大革命中，河北省万全县广大革命人民，在伟大领袖毛主席“自力更生，艰苦奋斗”的伟大方针指引下，经过四年艰苦奋斗，战天斗地，劈山导河，修建了一条横贯全县一百华里的四清大渠。这条大渠的建成，使全县百分之六十的耕地变成了水浇田，这使塞外山河更加欣欣向荣。"},{"type":"paragraph","text":"这条大渠顺着长城，穿越一百一十座山梁，横跨八十九处深谷和六条大沙河，串连了一百五十多座渡槽、桥闸等建筑物。"},{"type":"paragraph","text":"它可灌溉全县三十多万亩土地，每年要给海河、官厅水库减轻三十多万立方米泥沙的负担。它能行舟通船，夏季是水路纽带，冬季可以冰上运输。"},{"type":"paragraph","text":"毛泽东思想引来了万代幸福泉。万全县人民世世代代未能实现的愿望如今实现了。当四清大渠正式通水的时候，大渠两岸，人们敲锣打鼓，载歌载舞，一遍又一遍地高呼“毛主席万岁！”“敬祝毛主席万寿无疆！”"},{"type":"paragraph","text":"据新华社"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8e84f8614"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
