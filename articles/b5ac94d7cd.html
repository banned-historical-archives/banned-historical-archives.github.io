<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、国务院关于召开全国工业、交通运输、基本建设、财贸方面社会主义建设先进集体和先进生产者代表会议的通知","authors":[],"dates":[{"year":1959,"month":3,"day":21}],"is_range_date":false,"parts":[{"text":"中共中央、国务院关于召开全国工业、交通运输、基本建设、财贸方面社会主义建设先进集体和先进生产者代表会议的通知","type":"title"},{"text":"1958年是我国社会主义建设事业全面大跃进的一年。全国人民，在党的领导下，经过整风运动，大大提高了社会主义觉悟，高度发挥了革命干劲，贯彻执行了党的社会主义建设总路线，在农村中实现了人民公社化，使我国各方面建设工作赢得了空前伟大的胜利。1958年工农业总产值增长70％左右，粮食、棉花、钢铁、煤炭、机械等主要产品，都较1957年增产一倍，交通运输、财贸和科学文化教育事业都有很大的发展，为今年的更大跃进创造了有利的形势。在1958年伟大英勇的斗争中，在经济战线上的工业、交通运输、基本建设和财贸工作中的几千万职工，发扬了共产主义精神，破除迷信，解放思想，以国家主人翁的姿态，进行了忘我劳动，创造了许许多多惊人的奇迹。1959年的建设计划开始执行以后，工业、交通运输、基本建设和财贸战线上的全体职工，为了实现更大、更好、更全面的跃进，为了提前和超额完成国家生产建设计划，正在以更高的热情，更大的干劲，在业已取得的成就的基础上掀起了一个新的生产高潮，大闹技术革命，不断创造出新的成绩。","type":"paragraph"},{"text":"为了表扬在大跃进中工业、交通运输、基本建设和财贸战线上涌现出的先进集体和先进生产者在社会主义建设事业中的模范行动，总结和推广他们的先进经验，迎接今后更加伟大的社会主义建设的任务，中共中央和国务院决定于今年第四季度在北京召开全国工业、交通运输、基本建设、财贸方面社会主义建设先进集体和先进生产者代表会议。在上述这些系统中的企业和单位，凡是在大搞群众运动，大闹技术革命和技术革新，提高了劳动生产率，在生产上有突出成绩，在企业管理上有重大改进，在钻研先进科学技术和创造发明方面有贡献的先进集体和先进生产者，都可以选派代表出席这次会议。各地区代表名额分配、代表产生办法，以及会议的具体日期，另行通知。","type":"paragraph"},{"text":"各省、市、自治区党政领导机关和工会、共青团、妇联、科学技术协会组织接到这个通知后，应当立即在广大职工群众中广泛深入地进行宣传工作，充分发动群众，推广先进经验，并在这个基础上动员和组织广大职工继续鼓足干劲、力争上游，学先进，赶先进，掀起一个更为巨大的生产和建设的新高潮，力争经济战线上的各个方面工作中涌现出更大量的先进集体和先进人物，用更多、更好、更卓越的成就来迎接这次大会的召开。","type":"paragraph"},{"text":"来源：中华全国总工会编《建国以来中共中央关于工人运动文件选编》 （上），工人出版社，1989年。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5ac94d7cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
