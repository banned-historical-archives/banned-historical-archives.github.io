art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"六连长途行军训练中 活学活用毛主席著作干部战士思想越炼越红脚板越走越硬","authors":[],"parts":[{"type":"paragraph","text":"本报讯 4804部队六连在最近一次长途行军训练中，活学活用毛主席著作，广泛开展了群众性的政治思想工作，增强了部队的战斗意志，全连长驱六百余里，人人思想过硬。"},{"type":"paragraph","text":"这个连队近几年来没有搞过长途行军训练。支部传达任务后，有的干部顾虑很多，认为连队新战士多，负重量大，路程远，骨干都缺乏经验。还有的同志说：“这次行军，不是战斗，听不到枪炮声，练练脚板而已。”针对这些情况，党支部结合当前国内外形势，组织大家学习了毛主席的《丢掉幻想，准备斗争》一文和敌人磨刀我们也要磨刀等论述。学习后，干部战士进一步增强了敌情观念。接着，他们根据连队实际情况，结成了四十多个“一对红”的对子，不间断地开展思想互助活动。"},{"type":"paragraph","text":"行军开始后，他们有计划、有步骤地组织好“天天读”，做到：大休息集体学，行军路上小组议，学一点，用一点。炊事班反复学习了《关于重庆谈判》中有关“工作就是斗争”和“拣重担子挑”等论述，随时随地检查自己的行动。他们每个人的负重量比班排战士重二十多斤，每天还要做三顿饭，和大家一起行军，没有一个叫苦叫累的，受到战士们一致赞扬。"},{"type":"paragraph","text":"行军训练中，连队很重视运用骨干开展群众性的思想互助活动，一切思想问题做到早发现，早解决。连队从白天行军转入夜间行军以后，很多同志不习惯走山路。这时，战士们的互助活动就搞得更好了，连的干部对战士更加关心，思想工作又深又细。一天，部队通过一段三十多里长的河沟，碎石硌得战士们的脚底痛。这时，有个新战士慢慢掉到队伍后边。副指导员粟全根看到后，赶上去接过他的背包，搀住他的胳膊，边走边和他谈心。这个战士的劲头很快被鼓起来了。他接过副指导员身上的背包，赶上了部队。"},{"type":"paragraph","text":"（六连报道组）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"369b890ab4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
