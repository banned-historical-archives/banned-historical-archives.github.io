script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"帮助革命领导干部活学活用毛泽东思想","authors":[],"dates":[{"year":1968,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好。”大量的事实充分证明，毛主席这一极其重要的指示，对推动各级革命委员会的建立起了非常巨大的作用。现在，在全国一片红、各级革命委员会普遍建立的情况下，如何正确地对待革命的领导干部，热情地帮助和支持他们，让他们在革委会中充分发挥骨干作用，在斗、批、改的高潮中发挥更大的作用，仍然是一个十分重要的问题。从下面发表的这几篇文章中可以看出，革委会中的军队代表在这方面起着很好的作用。这些军队代表的作法是值得学习的。"},{"type":"paragraph","text":"——编　者"},{"type":"paragraph","text":"帮助革命领导干部活学活用毛泽东思想"},{"type":"paragraph","text":"新安江水力发电厂原党委副书记冯树仁同志自从担任了革委会主任以后，经过一段时间的工作，在群众中的威信不太高，工作有些困难。"},{"type":"paragraph","text":"为什么冯树仁同志在群众中的威信不够高呢？联系他进入“三结合”领导班子前后的思想和工作情况，军队代表吴玉柱就和他一起找问题，分析原因。原来老冯在实际工作中只忙于事务，忘了抓根本，毛泽东思想红旗举得不高。这样，在群众中的威信自然就不高了。针对这个情况，吴玉柱同志和他一起学习了毛主席关于干部问题的论述。毛主席教导说：“政治路线确定之后，干部就是决定的因素。”革命群众衡量领导干部的标准，主要是看你毛泽东思想红旗举得高不高。吴玉柱同志还和老冯一起，重温了林彪同志对毛主席、对毛泽东思想的崇高评价。林副主席说：“毛主席的话，水平最高，威信最高，威力最大”，从而使冯树仁同志认识到，一个革命者，毛泽东思想水平有多高，他在群众中的威信就有多高。"},{"type":"paragraph","text":"从这以后，吴玉柱同志还经常和老冯一起学习毛主席著作。毛主席的每一条最新指示一传达，他们就在一起分析形势，摆活思想，先学一步。去冬今春，雨水较少，五、六月份水库储水量下降到建厂以来的最低水位，给水力发电带来了一定的困难。在这个关键的时候，是就生产抓生产，还是以革命来带动生产？老冯遵照毛主席“抓革命，促生产”的教导，深入到现场，同工人和直接指挥生产的基层干部开座谈会，听取工人的意见，并和他们一起学习最新指示，把毛主席指示变为巨大的推动力量，促进了生产。在厂革委会的领导下，经过全厂革命群众的努力，克服了水库储水量下降的困难，月月完成和超额完成了发电任务。"},{"type":"paragraph","text":"在军队代表的帮助下，冯树仁同志经常自觉地按照毛主席的指示办事，广大革命群众对他也越来越信任了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0580c000c7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
