art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东评点〈智囊〉》线装本出版","authors":["卢向韬/李忠诚〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"据新华社北京8月29日电（卢向韬 李忠诚）经中共中央文献研究室、国家新闻出版署、中央档案馆批准，由中国档案出版社、海南国际新闻出版中心联合影印《毛泽东评点〈智囊〉》线装本全书已出版发行。"},{"type":"paragraph","text":"《智囊》一书是明末著名文学家和戏曲家冯梦龙纂辑的，全书搜集了上自夏商下迄明代末年3000多年间各色人物以智取胜的故事，共2000余则。"},{"type":"paragraph","text":"毛泽东同志生前对《智囊》一书十分重视，他在日理万机之余，反复阅读，并作了不少评注和圈点。毛泽东阅读过的《智囊》影印出版，不仅使读者可以了解毛泽东如何学习、研究、借鉴古人的智慧，而且也可以从《智囊》本身受到启迪。此书影印出版前，中央档案馆组织专家对这部书进行了整理、校勘。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66f6b53fb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
