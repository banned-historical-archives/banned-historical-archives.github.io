夕山"],"dates":[{"year":1989,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报扬州专讯　5月23日中午，扬州市公安局接到电话:军分区干休二所三楼有人骚扰治安。刑警查明，系在“文革”中打砸抢、判刑15年、绰号“大狮子”的刘菊生和他的儿子绰号“小狮子”的刘旭东，用半自动小口径步枪开枪作乐，威胁群众。由于地处闹市，不远处有学生集会游行。刑警小杨上楼喊话，反遭击伤。2时10分刑警大队长李厚生带10名干警赶来增援，歹徒连续开枪击碎汽车挡风玻璃，并又击伤三名干警。刑警马长旺冲出车门，直扑三楼，推开罪犯藏身处大门连开数枪，击毙“大狮子”刘菊生，“小狮子”刘旭东挥舞大刀逃出楼房被群众用砖头击昏，公安干警将其擒获。　(周兴国、王夕山)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efde166d8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
