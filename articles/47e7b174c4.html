s":[{"year":1966,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"有了毛泽东思想就没有战胜不了的敌人"},{"type":"paragraph","text":"最敬爱的党中央"},{"type":"paragraph","text":"最敬爱的毛主席："},{"type":"paragraph","text":"我国发射导弹核武器试验成功的喜讯传来后，我们的心情无限兴奋，无限激动！这是毛泽东思想的又一伟大胜利，是对帝国主义和现代修正主义的沉重打击，大大长了世界革命人民的志气，灭了帝国主义、修正主义和一切反动派的威风。"},{"type":"paragraph","text":"这次导弹核武器试验的成功，是中国人民的骄傲，是世界革命人民的骄傲。它说明，有了毛泽东思想就没有解决不了的问题，没有克服不了的困难，没有战胜不了的敌人。我们要更加热爱毛泽东思想，更加坚信毛泽东思想，在毛泽东思想的光辉照耀下，继续攀登前人没有攀登过的世界高峰。"},{"type":"paragraph","text":"在这一巨大新成就的鼓舞下，我们要更进一步响应林彪副主席的号召，把活学活用毛主席著作的群众运动推向新阶段，勤学勤用，刻苦地学，刻苦地用，用毛泽东思想把我们的头脑牢牢地武装起来。"},{"type":"paragraph","text":"我们热烈地欢呼：战无不胜的毛泽东思想万岁！万岁！万万岁！"},{"type":"paragraph","text":"福建前线空军某部指导员　丰福生"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47e7b174c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
