ar":1998,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德宣布一极右组织非法"},{"type":"paragraph","text":"据新华社波恩3月24日电（记者刘钢）设在首都柏林的德国联邦行政法院24日宣布一个名为“民族主义阵线”的极右组织为非法组织，并禁止其一切活动。"},{"type":"paragraph","text":"该组织因在德国大肆进行仇外排外活动，曾在1992年11月被内政部宣布为非法组织。为此，该组织去年向法院提出抗诉，要求法院对此做出当庭审理。法院在24日审理此案后认为，该组织公开散布激进的民族主义思想，主张种族主义和反犹主义，违反了联邦德国的有关法规，因此决定驳回其抗诉，坚持宣布该组织为非法组织。"},{"type":"paragraph","text":"“民族主义阵线”成立于1985年，其宗旨是谋求建立一个所谓的民族国家，并要求将所有的外国居民赶回他们自己的国家。北威州、巴伐利亚州及柏林和不来梅等地区是该组织的重点活动地区。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46f8c33775"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
