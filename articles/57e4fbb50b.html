ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"答谢马林科夫、莫洛托夫祝贺朝鲜停战协定签字的电报","alias":"","parts":[{"type":"paragraph","text":"答谢马林科夫、莫洛托夫祝贺朝鲜停战协定签字的电报"},{"type":"paragraph","text":"（1953年7月31日）苏联部长会议主席马林科夫同志：苏联外交部部长莫洛托夫同志："},{"type":"paragraph","text":"衷心感谢苏联各族人民和您们在朝鲜停战协定签字之际所表示的祝贺。"},{"type":"paragraph","text":"朝鲜停战的实现是以苏联为首的世界和平民主阵营的伟大胜利。苏联政府和苏联人民为和平解决朝鲜问题所作的不懈努力，对于朝鲜战争的结束起了巨大的作用。"},{"type":"paragraph","text":"中国人民将与伟大的苏联人民、英雄的朝鲜人民以及全世界爱好和平的人民永远团结在一起，为巩固与保卫远东及世界和平的事业而继续努力。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东中华人民共和国中央人民政府政务院总理兼外交部部长周恩来一九五三年七月三十一日北京"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":7,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":269,"page_end":269},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57e4fbb50b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
