script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大振人心拍手称快","authors":["中共北京市东风市场委员会"],"dates":[{"year":1976,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大振人心拍手称快"},{"type":"paragraph","text":"中共北京市东风市场委员会"},{"type":"paragraph","text":"党中央根据伟大领袖毛主席的提议作出的两个决议，极大地鼓舞了我们将反击右倾翻案风的斗争进行到底的决心。我场广大职工收听了党中央的两个决议后，全场立即沸腾起来。刚下班的售货员和赶来听广播的干部、工人扬眉吐气，立即集合队伍，高举红旗，敲锣打鼓，走上街头，到天安门广场游行。夜深了，我们还召开了座谈会，全体干部、工人一致表示坚决拥护党中央的两个决议。"},{"type":"paragraph","text":"随着反击右倾翻案风斗争的深入发展，一小撮阶级敌人不甘心他们的失败，必然会狗急跳墙，进行疯狂反扑。发生在天安门广场的反革命政治事件，就是他们进行垂死挣扎的一种表现。不肯改悔的走资派邓小平推行反革命的修正主义路线，代表资产阶级向无产阶级猖狂进攻，大搞复辟倒退和反攻倒算，拒不接受毛主席、党中央和广大人民群众对他的批判教育。他的问题的性质已经变为对抗性的矛盾。一小撮阶级敌人把邓小平作为他们复辟资本主义的靠山。在天安门广场发生的反革命政治事件中，他们明目张胆地把矛头指向伟大领袖毛主席，指向毛主席为首的党中央，抬出邓小平作中国的纳吉，妄图让匈牙利的反革命事件在中国重演。毛主席、党中央在这个关键时刻撤销了邓小平党内外一切职务，并对制造这场反革命政治事件的一小撮阶级敌人实行强有力的无产阶级专政。毛主席、党中央的决策十分英明，十分及时，大得人心，大快人心。我们无不为之拍手称快！"},{"type":"paragraph","text":"“凡是敌人反对的，我们就要拥护”，一小撮阶级敌人起劲地反对我们开展反击右倾翻案风的斗争，妄图扭转批判邓小平的斗争大方向，这说明批判邓小平、反击右倾翻案风正打中了他们的要害。他们越是反对，我们就越是要深入批判邓小平反革命的修正主义路线，把反击右倾翻案风的伟大斗争进行到底。我们市场和全国一样，经过开展反击右倾翻案风的斗争，形势大好。广大职工提高了以阶级斗争为纲，坚持党的基本路线的自觉性，发扬了革命精神，加强了企业管理，出现了许多新气象。不少柜、组在人员减少的情况下，增添了经营品种，改进了服务态度，提高了服务质量。事实充分说明，反击右倾翻案风是推动各项工作的动力。我们一定要认真学习毛主席的重要指示，坚持以阶级斗争为纲，深入批判邓小平反革命的修正主义路线，提高革命警惕性，随时揭露和打击一小撮阶级敌人的破坏活动，进一步发展革命和生产的大好形势。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abc3724cb4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
