ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"给李敏、李讷的信","alias":"","parts":[{"type":"paragraph","text":"给李敏、李讷的信"},{"type":"paragraph","text":"（1954年7月23日）李敏、李讷，我的亲爱的女儿："},{"type":"paragraph","text":"你们的信都收到了，很欢喜。北戴河、秦皇岛、山海关一带是曹孟德（操）到过的地方。他不仅是政治家，也是诗人。他的碣石诗是有名的，妈妈那里有古诗选本，可请妈妈教你们读。我好，勿念。"},{"type":"paragraph","text":"亲你们！"},{"type":"paragraph","text":"爸爸"},{"type":"paragraph","text":"一九五四年七月廿三日"},{"type":"paragraph","text":"[1]李敏，毛泽东的长女，贺子珍所生，1936年生，原籍湖南湘潭，生于陕西延安。1940年从延安赴莫斯科随贺子珍一起生活。1943年开始读苏联五年制小学，1948年秋毕业。同年冬，随贺子珍从莫斯科回哈尔滨，1949年春随姨母贺怡到北京，入北京师范大学附属女子中学，后考入北京师范大学。毕业后，1959年和孔令华结婚。后在国防科委院校局、办公厅、总政所属机关工作。李讷，毛泽东的次女，江青所生。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":7,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":171,"page_end":171},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfc4c23f2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
