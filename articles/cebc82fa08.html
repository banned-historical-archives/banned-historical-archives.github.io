"authors":[],"dates":[{"year":1950,"month":9,"day":20}],"is_range_date":false,"parts":[{"text":"江西工商界等对朝鲜战争顾虑重重","type":"title"},{"text":"【江西分社讯】朝鲜战争发生后，江西省的工商界、教职学员和公务人员中，普遍认为世界大战已爆发，因此思想动荡，顾虑重重。他们普遍害怕原子弹，认为和平签名运动无用；不敢参加中苏友好协会，怕以后有问题。商人更是在经营上表现消极观望，或投机取巧。在各阶层中谣言很流行。这些谣言大部是根据美国和台湾的广播。如战争是朝鲜人民军主动进攻，且有苏联和中国出兵相助，但总打不过美国；解放汉城是美军有计划的撤退，在把朝鲜人民军引入南部后，美军就会从北部登陆反攻；美国在苏联和东北已扔了原子弹，共产党不敢在报上公布，搞和平签名运动是向美国求和等。","type":"paragraph"}],"comments":[],"origin":"1950年9月20日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cebc82fa08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
