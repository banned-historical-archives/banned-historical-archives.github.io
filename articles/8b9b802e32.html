script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时《光明和被剥削者》发表文章揭露  苏美在“缓和”幌子下加紧争夺欧洲  挪威、丹麦和瑞士当局强调要加强防务对付战争威胁","authors":[],"dates":[{"year":1975,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时《光明和被剥削者》发表文章揭露"},{"type":"paragraph","text":"苏美在“缓和”幌子下加紧争夺欧洲"},{"type":"paragraph","text":"挪威、丹麦和瑞士当局强调要加强防务对付战争威胁"},{"type":"paragraph","text":"新华社布鲁塞尔一九七五年二月二十一日电　比利时刊物《光明和被剥削者》最近一期发表文章，揭露两个超级大国在“缓和”的幌子下加紧争夺欧洲。"},{"type":"paragraph","text":"文章说，“修正主义者不断地谈论欧安会，好象这个会议会有惊人成就，欧洲会有持久的和平。事实是，在欧洲，美帝国主义和苏联社会帝国主义的争夺在日益加剧。”"},{"type":"paragraph","text":"文章说，“苏联疯狂地加强它在西欧边界上的军事活动和压力……今天，苏联和华沙条约组织在欧洲的侵略能力，在人员和物资上都远远超过美国和北大西洋公约组织。”"},{"type":"paragraph","text":"文章说，在这种情况下，谈论“欧洲安全”是十足的讽刺。很明显，有关欧安会的宣传，目的是为了麻痹人民，是为了在欧洲人民越来越明白需要为民族独立、反对超级大国而进行斗争的时候麻痹他们的警惕性。"},{"type":"paragraph","text":"这一期《光明和被剥削者》另外还发表一篇文章指出，两个超级大国大谈其“缓和”和"},{"type":"paragraph","text":"“安全”，但是在实际上，它们疯狂地进行武装，并且准备新的世界大战。美国和苏联都在“不停地增加它们用于军备竞赛的费用”。"},{"type":"paragraph","text":"新华社斯德哥尔摩一九七五年二月二十一日电　《瑞典日报》二月二十一日刊登这家报纸的军事记者陆军中将斯蒂格·勒夫格伦写的关于北欧防务的文章，其中着重报道了挪威国防大臣阿尔夫·福斯特沃尔和丹麦前国防大臣埃林·布伦杜姆不久前发表的关于北欧防务的谈话。"},{"type":"paragraph","text":"文章说，福斯特沃尔在谈及苏联在科拉半岛的军事集结时对他说，“非常靠近我们的这个基地也许是世界上最大的基地集合体”。福斯特沃尔说，这虽然同苏联的全球战略有关，但它对挪威同样意味着是一种威胁。"},{"type":"paragraph","text":"布伦杜姆向这位军事记者强调指出了丹麦处于波罗的海往北海的出海口的暴露地位。"},{"type":"paragraph","text":"文章说，挪威国防大臣和丹麦前国防大臣都注意到，尽管苏联大谈“缓和”，苏联的军备近几年来并未减少，却反而增加了。福斯特沃尔说，“我们的实际政策必须考虑实际情况”。布伦杜姆谈到丹麦要实现国防的长远规划。"},{"type":"paragraph","text":"新华社日内瓦电　瑞士联邦军事部长鲁道夫·格内吉二月十七日在瑞士东部克瓦尔的一次集会上说，“我们国家的安全措施取决于世界政治，决不能延误。”他指出，北大西洋公约组织成员国和华沙条约国家花费的军费占世界军费的百分之八十，“这一事实当然应该使我们深思”。"},{"type":"paragraph","text":"他说，“在这个处于危机和受到战争震动的世界中，瑞士应该把主要是军事上的防御政策，改变为全面的防御政策”。"},{"type":"paragraph","text":"他说，瑞士的安全政策在于维护和平、自由和独立。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b9b802e32"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
