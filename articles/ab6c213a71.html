" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对全总关于加强资本主义工业企业中工会工作的指示和中央批语稿的修改","alias":"","parts":[{"type":"paragraph","text":"对全总关于加强资本主义工业企业中工会工作的指示和中央批语稿的修改!"},{"type":"paragraph","text":"（1953年7月）"},{"type":"paragraph","text":"加强资本主义工业中的工会工作，必须贯彻利用、限制和改造的方针。这里所说的改造还不是指取消资本家生产资料的私人所有制，使之变为社会主义企业的那种最后的改造步骤。这里所说的改造，是指在承认资本家的受限制的不完全的私人所有制的条件下，使资本主义企业逐步变为国家资本主义企业，即在人民政府管理下的用各种方式和国营社会主义经济联系着的受工人监督的资本主义。这种资本主义已经不是解放以前的那种资本主义，它主要地是为国家和人民的需要而生产的，资本家已不能唯利是图。当然，工人还要为资本家生产一部分利润，但是这一部分利润，在整个企业盈利中不过只占四分之一左右。占了四分之三左右的盈利的主要部"},{"type":"paragraph","text":"[1]本篇一是毛泽东对中华全国总工会关于加强资本主义工业企业中的工会工作的指示所作的修改。这个指示是全总党组1953年7月14日报送毛泽东并中共中央的。本篇二是毛泽东对中央转发中华全国总工会关于加强资本主义工业企业中的工会工作的指示的批语稿所作的修改，这个批语稿落款时间为1953年7月20日。文中用宋体字排印的是毛泽东加写的文字。"},{"type":"paragraph","text":"对全总关于加强资本主义工业企业中工会工作的指示和中央批语稿的修改分，是为国家（所得税）为工人（福利费）和为扩大企业设备（公积金，这里包含了为资本家生产利润的一个小的成份）而生产的。因此，这种资本主义已经不是普通意义下的资本主义，而是一种特殊的资本主义，即是新式的国家资本主义，它是带了若干（有几种程度不同的情况）社会主义性质的。必须指出，目前并不是一切或绝大多数资本主义工厂已经做到了这一步，还没有，还需要几年的努力才可以做到这一步，但是一定可以做到这一步的。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"指示中所指出的“四马分肥”的比例，是适合于多数资本主义工厂企业的，但是如果某些工厂资本家所得超过指示中所指出的比例，只要他们的所得部分是依靠正当经营而不是依靠五毒或其他不法行为，也是可以允许的。资方所得，不及此比例的工厂企业要达到此比例，须在向工人说清楚取得工人同意后，方能实行。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":247,"page_end":248},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab6c213a71"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
