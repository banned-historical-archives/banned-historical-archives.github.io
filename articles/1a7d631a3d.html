s":[],"dates":[{"year":1959,"month":4,"day":2}],"is_range_date":false,"parts":[{"text":"毛泽东撰介绍麻城的经验","type":"title"},{"text":"一","type":"subtitle"},{"text":"这几个文件都值得看。特别是《麻城县万人大会的情况》，值得看，办法很好，县、社两级该退还的，迅速地退还给生产队了，一身清净，然后进而解决队与社员的矛盾，公社就可以大大地发展起来。","type":"paragraph"},{"text":" 毛泽东一九五九年四月二日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"此件极好，每一个县、社都应这样做。算帐才能团结；算帐才能帮助干部从贪污浪费的海洋中拔出身来，一身清净；算帐才能教会干部学会经营管理方法；算帐才能教会五亿农民自己管理自己的公社，监督公社的各级干部只许办好事，不许办坏事，实现群众的监督，实现真正的民主集中制。","type":"paragraph"},{"text":" 毛泽东一九五九年四月三日","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"此件连前两件，中央、省、地、县委书记、委员人人必读，各县、社都应仿照办理。","type":"paragraph"},{"text":" 毛泽东一九五九年四月三日下午","type":"paragraph"},{"text":"四","type":"subtitle"},{"text":"毛注：是在于毁坏社会主义事业，是在于毁坏合作社和人民公社，是在于毁坏干部自身。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a7d631a3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
