art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"日本青年一定要把毛泽东思想学到手杉田日出子盛赞中国青年活学活用毛主席著作养成革命精神","authors":[],"parts":[{"type":"paragraph","text":"这个代表团是结束了在我国的访问后，于五月四日晚经香港回国的。杉田日出子说，中国青年热爱伟大的领袖毛泽东，个个一心活学活用毛泽东思想。中国青年已养成不怕苦、不怕死、永远革命的精神。他们树雄心，立大志，胸中有远大的目标。中国青年已勇敢地担负起彻底打败美帝国主义侵略，支援世界各国人民革命斗争的艰巨任务。"},{"type":"paragraph","text":"她说：“我们在美帝国主义控制下生活的日本青年男女，深切地感到，生活在毛泽东时代的中国青年是幸福的。”她说：“中国青年是我们日本青年和全世界青年的模范，我们一定要向中国青年看齐，把毛泽东思想学到手。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9859bdb3bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
