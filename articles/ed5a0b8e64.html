<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人民空军无限忠于毛主席——空军第二次学习毛主席著作积极分子代表大会胜利召开（图片）","authors":[],"dates":[{"year":1968,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人民空军无限忠于毛主席"},{"type":"paragraph","text":"——空军第二次学习毛主席著作积极分子代表大会胜利召开"},{"type":"paragraph","text":"无限忠于毛主席，就有无穷的战斗力。空军广大指战员以林副主席为光辉榜样，活学活用毛泽东思想，无限忠于伟大领袖毛主席。空中歼敌屡建战功的“航空兵英雄中队”庄严宣誓：无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的无产阶级革命路线，学好用好最新指示，为夺取无产阶级文化大革命的全面胜利立新功。"},{"type":"paragraph","text":"无限忠于毛主席，把活学活用毛泽东思想作为生活的第一需要。有了毛泽东思想，赴汤蹈火无所惧，天崩地裂志不移。无私无畏的共产主义战士杨梓云（左）与同他结成“一对红”的刘玉民，共同学习“老三篇”，进一步搞好思想革命化。"},{"type":"paragraph","text":"无限忠于毛主席，才能对革命派最亲。空军某部驻天津红卫区支左部队，始终把宣传毛泽东思想放在支左工作的首位，时时大讲毛主席的光辉思想，事事大颂毛主席的丰功伟绩，处处忠于伟大领袖毛主席。"},{"type":"paragraph","text":"无限忠于毛主席，毛主席指向哪里就战斗到哪里。空军三五一五部队“英雄炮四班”是荣立十四次集体战功的光荣集体。他们紧跟毛主席的伟大战略部署，上炮猛打敌机，下炮狠批中国赫鲁晓夫和反革命修正主义分子彭德怀、罗瑞卿。"},{"type":"paragraph","text":"无限忠于毛主席，把战无不胜的毛泽东思想一代一代传下去。爱兵模范王裕昌（前左），把帮助战士活学活用毛泽东思想当作爱兵的根本，把培养战士对毛主席的无限忠诚作为自己的崇高职责。"},{"type":"paragraph","text":"无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的无产阶级革命路线。出席空军第二次学习毛主席著作积极分子代表大会的丰福生同志（左）和战友们在一起交谈活学活用毛主席著作的体会。"},{"type":"paragraph","text":"无限忠于毛主席，永远读毛主席的书，听毛主席的话，照毛主席的指示办事。空军直属机关无产阶级革命派，发扬毛主席亲自倡导的马克思列宁主义的革命学风，对毛主席著作和最新指示，学了就用，坚决照办，反复检查，不断落实。"},{"type":"paragraph","text":"无限忠于毛主席，活学活用毛泽东思想，学出新水平，用出新水平。被誉为“昆仑山上好四站”的同志们，紧跟毛主席寸步不离，决心一辈子读毛主席的书，做毛主席的好战士。"},{"type":"paragraph","text":"（本版照片为空政、新华社记者、本报记者摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed5a0b8e64"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
