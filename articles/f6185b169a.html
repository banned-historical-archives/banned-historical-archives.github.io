:["北京政法学院","周仁","张景明","杨鹤皋","楼邦彦"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——反对党的统战政策","type":"title"},{"text":"北京政法学院杨鹤皋楼邦彦周仁张景明","type":"authors"},{"text":"“民主人士的职权被剥夺得绝无仅有……教授送进了‘牢笼’（研究组），北大的人员被压服，青年知识分子老挨整，苏联的经验进不了门。宗派主义者（指党）‘接管’（指领导）了学校之后，教授就被打入另一种形式的‘牢笼’研究室，他们只有挨整的权利，却没有研究学术的自由……从上到下，从领导者到学生，都视之为废物，视之为眼中钉。”（北京政法学院  杨鹤皋）","type":"paragraph"},{"text":"“钱端升很早就想在政法学院建立一个和党对立的大民主党派，他认为应当让政法学院的九三学社的社员、民进的会员参加民盟，成立交义党员，组成一个大党，大家在一起过组织生活，一起工作。”（北京政法学院  楼邦彦）","type":"paragraph"},{"text":"“对民主人士极不尊重，民主人士在重大的问题上有职无权，仅仅限于贯彻党委决定，思想不通也硬要贯彻，而且采取的方法使人难受。”（北京政法学院  周仁）","type":"paragraph"},{"text":"“党应该退出领导地位，和民主党派平起平坐，党委会应该退出教学领导岗位。”（北京政法学院  张景明）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6185b169a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
