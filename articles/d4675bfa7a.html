],"dates":[{"year":1978,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昔日“四人帮”破坏　今日解放军修复"},{"type":"paragraph","text":"本钢大型焦炉重新投产"},{"type":"paragraph","text":"本钢焦化厂一座被“四人帮”一伙破坏的大型焦炉，如今已抢修竣工，投入生产。"},{"type":"paragraph","text":"这座焦炉年产三十七万吨焦炭，一亿多立方煤气，三十种化工产品。它是一九五六年建成投产的，曾经多次获得全国红旗炉称号。一九七五年以来，“四人帮”一伙大搞所谓“改朝换代”，强制推行“自由炼焦”，结果这座好端端的焦炉在一九七六年九月被破坏了。粉碎“四人帮”后，本钢党委作出决定，要迅速修复这座焦炉。解放军基建工程兵某部承担了这项抢修任务。他们在省市人民协助下，高速度、高质量地砌筑起新炉，胜利地完成抢修任务。　（新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4675bfa7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
