authors":[],"dates":[{"year":1951,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿三日电】　比利时保卫和平联合会主席马克斯·考森，于十月十日自布鲁寒尔写信给我中央人民政府毛主席，表示比利时人民要求缔结五大国和平公约及禁止原子武器的愿望。"},{"type":"paragraph","text":"该信首称:最近发生的关于原子弹的一些事件，已经使禁用原子弹的问题再度成为首要的迫切问题。该信指出:比利时保卫和平联合会正在领导本国争取缔结五大国和平公约的运动，本会深信如果缔结和平公约一事能够实行，则如此严重威胁人类的原子弹问题亦可随而获得解决。希望由于全世界和平战士的努力，和平公约得以缔结。该信最后向毛主席表示崇高的敬意。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fd52e63c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
