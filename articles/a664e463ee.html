题的情况","authors":[],"dates":[{"year":1954,"month":12,"day":8}],"is_range_date":false,"parts":[{"text":"天津市高等学校讨论“红楼梦”研究问题的情况","type":"title"},{"text":"【天津分社八日讯】天津市文化学术界对“红楼梦”研究中的错误观点，正展开批判、讨论。不少大学教授认为这是一个大运动，在运动中得表明态度，否则就显得落后了。有些人对关于“红楼梦”研究问题的讨论存在模糊认识。南大中文系教授华粹深认为周汝昌对俞平伯在意见，周汝昌所写文章无非是想藉机打击俞平伯。河北师范学院文学系讲师朱泽吉认为“李希凡、蓝翎批评俞平伯是陆侃如授意的。有的人认为党中央批评俞平伯是通过李、蓝二人来实现的。","type":"paragraph"},{"text":"天津师范学院中文系韩文佑、顾随教授受胡适、周作人的影响较深，顾又是俞平伯的老朋友，有人认为这次对他们得”大搞“一下。","type":"paragraph"},{"text":" (梁一丁据天津市委宣传部材料编)","type":"paragraph"}],"comments":[],"origin":"1954年12月11日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a664e463ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
