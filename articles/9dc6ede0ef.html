ors":["陶鲁笳"],"dates":[{"year":1966,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"陶鲁笳关于毛泽东“今后不许打人”的传达","type":"title"},{"text":"陶鲁笳","type":"authors"},{"text":"1966年8月21日晚12点20分红卫兵“八·八红旗战斗团”接到北京联络站电文如下：","type":"paragraph"},{"text":"八月二十日晨，陶鲁笳同志接见铁道学院同学，谈到毛主席关于如何对待打人的问题时说，毛主席对片面使用他的话很生气。昨天中央文革小组打电话来说：“好人打坏人活该；坏人打好人，好人光荣；好人打好人误会。”主席说过。主席说，“为什么不把我的话全面谈呢？我后面还有一句话‘今后不许打人’”。陶鲁笳同志说：“今后宣传打人是犯法的。”","type":"paragraph"},{"text":"【另一个说法是：毛的谈话时间为8月2日】","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陶鲁笳","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dc6ede0ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
