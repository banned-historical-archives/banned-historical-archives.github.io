陈锡联、吴德、苏振华和数千群众到机场热烈欢送　西哈努克亲王、宾努亲王和夫人也到机场欢送","authors":[],"dates":[{"year":1974,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年五月二十七日电　以柬埔寨民族统一阵线中央政治局委员、柬埔寨王国民族团结政府副首相兼国防大臣、民族解放人民武装力量总司令乔森潘为团长，副首相府特别顾问英·萨利为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，圆满结束对我国的正式友好访问，今天上午乘专机离开北京经河内回国。"},{"type":"paragraph","text":"同机离开的代表团团员是英·蒂丽大臣、狄奥尔副大臣。"},{"type":"paragraph","text":"我国党、政领导人叶剑英、李先念、陈锡联、吴德、苏振华，以及数千名首都群众，前往机场热烈欢送。"},{"type":"paragraph","text":"柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王，柬埔寨民族统一阵线中央政治局主席、王国民族团结政府首相宾努亲王和夫人，也到机场欢送。"},{"type":"paragraph","text":"在飘扬着柬埔寨王国国旗和中国国旗的首都机场上举行了隆重的欢送仪式。乐队奏柬埔寨王国国歌和中国国歌以后，柬埔寨贵宾由我国党、政领导人陪同，检阅了中国人民解放军陆、海、空三军仪仗队。随后，柬埔寨贵宾同欢送群众亲切告别。这时，机场上鼓乐齐鸣，一片欢腾。人们热情地挥舞着花束和彩带，青少年们载歌载舞，祝贺柬埔寨民族统一阵线和王国民族团结政府代表团访问我国获得圆满成功，表达我国人民对正在浴血奋战的柬埔寨人民的兄弟般战斗情谊。持枪民兵向柬埔寨战友行注目礼。乔森潘团长、英·萨利副团长向欢送人们不断招手致意。"},{"type":"paragraph","text":"柬埔寨民族统一阵线和王国民族团结政府成员沙林察、杨森安将军和夫人、秀蒲拉西和笃坎敦大使以及我国外交部礼宾司副司长高建中等，陪送代表团到河内。"},{"type":"paragraph","text":"前往机场欢送柬埔寨战友的还有:中共中央对外联络部部长耿飚，外交部部长姬鹏飞，外贸部部长李强，卫生部部长刘湘屏，国防部副部长肖劲光，中国人民解放军副总参谋长张才千，人大常委会委员林巧稚、胡愈之，各有关方面负责人韩念龙、申健、韩宗正、张贤约、魏伯亭、马宁、孔照年、诸惠芬、丁雪松、邓岗、周荣国，中国驻柬埔寨大使康矛召，以及中柬友好人民公社革委会主任吕镒。"},{"type":"paragraph","text":"在北京的柬埔寨民族统一阵线和王国民族团结政府成员周成、江裕朗和夫人、谢桑、吉春和夫人、万比尼和夫人，以及王室成员和其他柬埔寨朋友，也到机场送行。"},{"type":"paragraph","text":"到机场送行的还有各国驻中国使节。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37a35a094f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
