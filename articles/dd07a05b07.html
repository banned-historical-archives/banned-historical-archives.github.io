tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"赞李玉和","authors":["广州部队学习毛主席著作积极分子/某部团长刘建华"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们说：“我国有七亿人口，工人阶级是领导阶级。”革命现代京剧《红灯记》塑造了李玉和这个顶天立地的工人阶级的英雄形象。看了这个戏，使我清楚地看到了用毛泽东思想武装起来的工人阶级品德高尚，智慧无穷，浑身是胆。李玉和一家三代为无产阶级革命事业前仆后继，出生入死，英勇奋斗，充分表现了无产阶级的彻底革命精神。"},{"type":"paragraph","text":"回顾几十年来，伟大领袖毛主席领导中国人民所走过的光辉战斗历程，有多少象李玉和一样的工人阶级革命先辈。他们无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的无产阶级革命路线，带领广大人民群众，为推翻帝国主义、封建主义、官僚资本主义的血腥统治，英勇战斗，不怕牺牲，终于取得了全国胜利。今天，在无产阶级文化大革命运动中，在毛主席的无产阶级革命路线的指引下，工人阶级和全国广大革命群众一起冲锋陷阵，粉碎了刘少奇妄图复辟资本主义的罪恶阴谋。当毛主席发出“工人阶级必须领导一切”的最新指示后，他们以战斗的姿态，登上了上层建筑各个领域斗、批、改的政治舞台，领导广大群众迅速掀起了斗、批、改的高潮。"},{"type":"paragraph","text":"毛主席教导我们：“整个革命历史证明，没有工人阶级的领导，革命就要失败，有了工人阶级的领导，革命就胜利了。”我们一定遵照毛主席的教导，以最高的政治热情向工人阶级学习，坚决拥护工人阶级的领导，誓作工人阶级的坚强后盾，以工人阶级为光辉榜样，作一个毛主席无产阶级革命路线的红色卫兵。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd07a05b07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
