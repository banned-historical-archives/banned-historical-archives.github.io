rs":["陈再道"],"dates":[{"year":1967,"month":3,"day":5}],"is_range_date":false,"parts":[{"text":"陈再道对湖北“省司”负责人的讲话摘要","type":"title"},{"text":"陈再道","type":"authors"},{"text":"时间：三月五日","type":"paragraph"},{"text":"地点：陈再道家里","type":"paragraph"},{"text":"〖《省司》：中共湖北省委机关群众组织。〗","type":"paragraph"},{"text":"陈再道讲话（记录大意）：","type":"paragraph"},{"text":"抓革命，促生产，是一件大事情，是周总理亲自布置的。","type":"paragraph"},{"text":"团结两个95％要抓住，对于干部要一分为二，张华等人以极左的面貌出现，你们要注意，对干部不要太残酷了，太残酷也会脱离群众，当然，革命不是请客吃饭。湖北省肯定要夺权，问题是谁来夺？你们要注意有人借群众运动搞阶级报复，搞资本主义复辟。","type":"paragraph"},{"text":"《二八声明》肯定错了，你们不要抱幻想，要发动群众，彻底批判。","type":"paragraph"},{"text":"你们要告诉群众，不要以为解放军内有个别坏人就对解放军产生怀疑。","type":"paragraph"},{"text":"来源：","type":"paragraph"},{"text":"《打倒反革命修正主义分子——陈再道》  武汉钢二司武汉大学总部宣传部  毛泽东思想武汉军区政治部红旗总部合编  河南二七公社宣传部翻印  1967年9月","type":"paragraph"}],"comments":[],"origin":"《打倒反革命修正主义分子——陈再道》　武汉钢二司武汉大学总部宣传部　毛泽东思想武汉军区政治部红旗总部合编　河南二七公社宣传部翻印　1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈再道","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"217cc7a77c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
