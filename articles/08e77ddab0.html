":[{"year":1979,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"今年，安徽省农业生产获得丰收。据统计，全省粮食总产量比去年增加二十四亿斤，增长百分之八；油料增加一百六十四万担，增长百分之二十五；生猪存栏一千二百一十八万头，增长百分之四点五。其它产品，除棉花和烤烟外，蚕茧、大牲畜、羊、禽、蛋也都获得增产。全省农村出现了多年未有的兴旺景象。"},{"type":"paragraph","text":"安徽省去年遇到大旱，不但给秋种带来极大困难，而且造成江淮丘陵地区几百万亩稻田今春无水下种，缺水栽秧。今年也不是风调雨顺，继春天的“倒春寒”、冰雹灾害之后，一些地区又遇到暴雨的袭击和连续阴雨、低温的严重威胁。在这样不利的条件下，仍然夺得农业丰收，这是各级党组织坚定不移地贯彻党的三中全会精神，批判极左路线，落实各项政策，调动广大社员生产积极性的结果。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"安徽文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08e77ddab0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
