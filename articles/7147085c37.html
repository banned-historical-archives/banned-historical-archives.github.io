art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想挂了帅牛鬼蛇神脚下踩","authors":[],"parts":[{"type":"paragraph","text":"捍卫国旗的勇士赵小寿和我国驻印度尼西亚大使馆同志们的英雄事迹，还在我们心中激荡，现在，我们又为爱国侨胞黄沐和的大无畏精神而深深感动。"},{"type":"paragraph","text":"黄沐和为什么能在印度尼西亚反动派的严刑拷打下坚贞不屈？为什么当敌人用匕首顶着他的喉咙的时候，仍然能镇定自若，宁可牺牲，也绝不向反动派屈服呢？是毛泽东思想给了黄沐和以斗争的勇气和力量。毛泽东思想挂了帅，牛鬼蛇神脚下踩。毛泽东思想使他站得高，看得远，使他能在生死关头，以祖国为怀，以人民利益为重，既不为谎言所骗，又不为威武所屈，昂首挺胸，坚决地和反动派斗争。"},{"type":"paragraph","text":"黄沐和的英勇事迹再次生动地证明，用毛泽东思想武装起来的人，骨头是最硬的。这样的人，不怕鬼，不怕魅，不怕刀，不怕戟，不怕压，不怕迫。无论帝国主义和反动派玩弄什么伎俩，硬的也好，软的也好，都动摇不了一丝一毫的革命意志。有了毛泽东思想，我们就可以无往而不胜，不但能够顶得住反共反华反人民的逆流，而且可以踏倒帝国主义、现代修正主义和一切牛鬼蛇神。"},{"type":"paragraph","text":"中国人民被欺侮的时代一去不复返了。侨居海外的我国同胞深深感到他们的处境和旧中国时代大不一样了。他们身后有个日益强大的社会主义祖国，有站起来的伟大祖国六亿五千万人民。他们感到自己有力量了，腰杆硬了。他们感到作为中国人是光荣的，能为祖国贡献一分力量是值得自豪的。他们不能容忍帝国主义和反动派对祖国的任何侮辱。他们敢于起来和帝国主义、反动派作斗争。黄沐和就是他们当中的一个。"},{"type":"paragraph","text":"用毛泽东思想武装起来的中国人民，既然连当代世界上最大的恶霸美帝国主义都不放在眼里，印度尼西亚右派一小撮跳梁小丑就更不在话下了。印度尼西亚右派尽管张牙舞爪，在血腥屠杀国内人民的同时，疯狂地反华排华，样子看起来很凶，实际上很虚弱，没有什么了不起，只不过更加暴露了它们作为美帝国主义走狗的丑恶面目。我们严正警告印度尼西亚右派，你们这样疯狂反华排华，为美帝国主义效劳，是决不会有好下场的。RW：黄沐和；先进事迹"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7147085c37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
