:[{"year":1959,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海民族乐团通过“反右倾，鼓干劲”的学习，全团同志，都纷纷立下雄心壮志，订出跃进规划，为发展我国民族音乐事业作出更大成绩。"},{"type":"paragraph","text":"该团在下乡庆丰收回来，举行了对比教育大会之后，全团同志，尤其青年，通过孙裕德、陆春龄等人的回忆对比，政治热情被进一步激发出来，青年们提出“学习前辈、超过前辈、勤学苦练、红透专深”，中、老年也表示要和大家共同跃进，负起培养年青一代的重任。同时纷纷订立个人与声部的跃进规划。规划落实以后，党支部在共青团支部配合下，迅速组织座谈，讨论具体措施。在订规划过程中，青年们首先考虑如何红，并提出要进一步依靠组织，加强政治理论学习，提高觉悟，创造入团、入党条件。在业务上，又都各自选定对象，在演奏上，订出“学、赶、超”的办法。不少青年争取一年内在演奏上分别达到全团或全国水平。年轻的声乐组也要在明年国庆节达到上海演唱水平。中老年同志，除为明年上海“音乐之春”和青年一起准备出色的音乐会节目以外，并着手编写、出版各种教材、曲谱。同时也都订出赶、超全国演奏水平的规划。"},{"type":"paragraph","text":"目前，民族乐团的青年，勤学苦练之风大兴，有的人清晨提前赶来练习，老师在教学上不仅细心琢磨，还做教学记录。师徒在教学上既严格又愉快。全团同志的精神面貌，格外焕发。他们正以全力投入元旦献礼音乐会的创作与排练工作。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efdabee6a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
