art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《忆长征》即将出版叶剑英题书名聂荣臻作序言","authors":[],"parts":[{"type":"paragraph","text":"杨成武同志撰写的长篇回忆录《忆长征》，最近将由解放军文艺社出版。叶剑英同志为这本书题了书名，聂荣臻同志写了序言。全书分二十六章，共二十余万字，并附有十二张珍贵的照片。它是杨成武同志根据自己在长征中的亲身经历撰写的。它如实地描述了在长征中经常担负开路任务的红一方面军一军团第二师红四团的战斗经历，生动地反映了中国工农红军可歌可泣的光辉业绩和革命品质。其中关于抢渡乌江、飞夺沪定、穿越草地，突破天险腊子口等重大战役和行动的描写，读来惊心动魄，令人感奋。这是一部进行革命传统教育的好教材。今天本报特地发表叶剑英同志的题签和聂荣臻同志的序言，以飨读者。"},{"type":"paragraph","text":"——编者"},{"type":"paragraph","text":"右图是叶剑英同志为《忆长征》题的书名。（图片）"}],"alias":""},"tags":[{"name":"杨成武","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a71801fbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
