tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想深入人心 精神面貌焕然一新","authors":["建新"],"parts":[{"type":"paragraph","text":"鹤贤同志："},{"type":"paragraph","text":"我满怀胜利的喜悦告诉你一个最新最新的好消息：我们生产队办起了毛泽东思想夜校。"},{"type":"paragraph","text":"那天晚上，在仓库隔壁的大屋里，高挂起伟大领袖毛主席的画像，全队贫下中农欢聚一堂，隆重举行开学典礼。大家怀着对毛主席无比热爱的心情，放声高唱《东方红》，齐声朗读毛主席语录。会上，大伙一致推选我和张方慧两个下乡的知识青年担任辅导员。我们立即和革命干部、红卫兵代表商量制订了学习计划。"},{"type":"paragraph","text":"现在，一到晚上，全队的贫下中农，男女老少都手捧红彤彤的《毛主席语录》和“老三篇”，来参加学习。张永生的爷爷七十来岁了，眼睛不好使，还特地上县城买了一副老花眼镜。他说：“毛主席著作，我要活一天，学一天，用一天。”现在他已能背《为人民服务》和几十条语录。李小英今年才八岁，每天晚上，她端着小凳子，坐在最前面，跟着大伙一字一句地念毛主席的书。"},{"type":"paragraph","text":"越学毛主席著作，队里的政治空气越浓，做到了：毛主席像到田头，毛主席语录到田头，毛主席语录歌到田头，革命红旗到田头，革命大批判到田头，讲用会到田头，毛泽东思想宣传组到田头，表扬好人好事到田头。毛泽东思想越来越深入人心，人的精神面貌焕然一新。看到这种动人的景象，真使我欢欣鼓舞。你听了这一喜讯，也一定会高兴吧！"},{"type":"paragraph","text":"你的同学 建新"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aed72f2151"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
