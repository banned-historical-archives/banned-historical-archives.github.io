ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"复彭德怀电","alias":"","parts":[{"type":"paragraph","text":"复彭德怀电!"},{"type":"paragraph","text":"（1941年2月1日）"},{"type":"paragraph","text":"日蒋矛盾仍是目前的基本矛盾，我们仍须尽量利用之，使时局再拖几个月的可能性仍是有的，国共由一月十七日的开始破裂到将来时的全部破裂有一个过程，此过程可能短，亦可能长，由日蒋矛盾的变化及我们政策来决定，我们方针是利用这个过程使破裂于我有利。但我军事准备应放在可能短一点上。目前政治上我已有主动性，军事上亦必须掌握主动性，估计此主动性要待国际条件成熟才能完全蓟我手中。我们决不能丧失主动性。这是胜利与失败的重要条件。国标条件今年夏秋必有一个变化，明春又会有一个条件。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":2,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":407,"page_end":407},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba3d2fcc12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
