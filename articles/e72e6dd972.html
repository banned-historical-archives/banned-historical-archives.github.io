ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给周文楠的信","alias":"","parts":[{"type":"paragraph","text":"给周文楠的信"},{"type":"paragraph","text":"（1950年5月12日）文楠同志："},{"type":"paragraph","text":"来信收到，甚慰。接你母亲去东北和你一道生活一事，我认为是好的。我可以写信给湖南方面发给旅费。惟你母年高，一人在路上无人招扶是否安全，是否需要你自己去湖南接她同去东北方为妥当，请你考虑告我。如你自己去接，我给湖南的信即由你带去。附件还你。江青她们都好。祝你健康"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五、五月十二日"},{"type":"paragraph","text":"[1]周文楠，原是毛泽东之弟毛泽覃的夫人。当时任沈阳市人民法院刑事庭庭长。"},{"type":"paragraph","text":"[2]指周陈轩写给女儿周文楠的信。信中叙述了她自己在湖南韶山一人生活，无人照顾等情况。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":378,"page_end":378},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e72e6dd972"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
