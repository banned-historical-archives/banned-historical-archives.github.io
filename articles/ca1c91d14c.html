":[{"year":1967,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"红卫兵敢想、敢说、敢干是文化大革命的急先锋"},{"type":"paragraph","text":"在杭州西山公园，一群红卫兵小将围坐在草地上，高唱着革命歌曲。这时，一位来自东非的外国朋友走到了他们中间，用中国话说：“红卫兵们好！”随后，这位外国朋友提出：“我们一起谈谈好吗？”小将们用热烈的掌声欢迎外宾的倡议。于是一个生动活泼的讨论会自然地开始了。"},{"type":"paragraph","text":"红卫兵小将们对外国朋友说：“我们热爱毛主席，毛主席是我们心中最红最红的红太阳。”外国朋友说：“你们说得好。毛主席不仅属于中国人民，也属于世界各国人民。毛主席不仅是你们心里的红太阳，也是我们心里的红太阳。”"},{"type":"paragraph","text":"一个女红卫兵问外国朋友：“你喜欢红卫兵，喜欢我们的文化大革命吗？”东非朋友回答说：“非常喜欢，红卫兵是我们的英雄。红卫兵敢想、敢说、敢干，是无产阶级文化大革命的急先锋。红卫兵和无产阶级文化大革命是历史上从未有过的事迹，是毛泽东领导的世界无产阶级革命的伟大发展，是国际共产主义运动的新篇章。”东非朋友的话赢得了一阵又一阵热烈的掌声。"},{"type":"paragraph","text":"最后，在高呼“毛主席万岁！”“无产阶级文化大革命万岁！”的口号声中结束了这个热烈的讨论会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca1c91d14c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
