rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"风雪高原炼红心红心永向毛主席","authors":["工程兵某团政治处副主任朱明成"],"parts":[{"type":"paragraph","text":"我们心中最红最红的红太阳毛主席亲切地接见了我们。这是我一生中最大的幸福，也是长期战斗在雪山草地、高原戈壁的工程兵战士的最大幸福。"},{"type":"paragraph","text":"敬爱的毛主席啊！是您老人家的光辉思想指挥我们战斗，哺育我们成长；是您老人家的革命路线，引导我们从胜利走向胜利。建国以来，我们遵循您老人家关于“千万不要忘记阶级斗争”、“夺取全国胜利，这只是万里长征走完了第一步。……务必使同志们继续地保持艰苦奋斗的作风”等伟大教导，把工地作为向国民党反动派和国内外一切阶级敌人进行斗争的战场。我们高举您老人家光辉思想的伟大红旗，念念不忘阶级斗争，发扬老红军的光荣传统，山再高，没有我们革命战士的斗志高，我们从雪山到草地，从高原到戈壁，劈开二郎山，打通雀儿山，架设怒江钢索桥，天山顶上开通道，战胜了难以想象的困难，取得了一个又一个的胜利。革命实践使我深深体会到，无限忠于您老人家，忠于您的光辉思想，忠于您的革命路线，就有了坚定正确的政治方向；就有艰苦奋斗、彻底革命的精神，什么困难都能克服，什么高峰都能攀登。"},{"type":"paragraph","text":"敬爱的毛主席啊！您老人家最近教导我们：“无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。”我们反复学习了您老人家的这一光辉指示，全团上下掀起了一个狠批中国赫鲁晓夫的新高潮。通过革命大批判，我们深深地认识到：以中国赫鲁晓夫为首的党内一小撮走资派、叛徒、特务和一切反革命分子，就是国民党反动派。我们和他们的斗争，就是同国民党反动派的斗争。我们一定要紧跟您老人家的伟大战略部署，深入开展革命大批判，把这场无产阶级反对资产阶级和一切剥削阶级的政治大革命进行到底。DW：工程兵某团"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3917799d79"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
