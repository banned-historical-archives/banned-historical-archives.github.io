thors":[],"dates":[{"year":1957,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"国务院给有关失职人员处分的决定","type":"title"},{"text":"国务院全体会议第五十二次会议听取了监察部对于广西省因灾造成农民大量逃荒死亡事件的报告，认为：广西省许多地区在１９５５年至１９５６年间发生了严重的自然灾害，由于省人民委员会和各有关地区的领导干部满足于几年来土地改革和农业合作化的胜利，产生了骄傲情绪，盲目乐观，放松了对于因灾减产应有的警惕，没有能够及时采取有力措施加强救灾工作，加以在１９５５年已经发生过农民逃荒和饿死的现象之后，仍然麻木不仁，不能从事实中吸取教训，以致在１９５６年造成平乐、荔浦、横县等地农民大批逃荒和饿死的严重情况。几年来，国家对于粮食统购统销政策的推行，保证了全国人民、包括灾区人民在内的粮食供应，对灾区人民克服困难渡过灾荒起了极大的作用。但是，广西省的领导干部由于在工作中严重地脱离群众，不了解下情，对灾情发展估计不足，因而没有领导有关部门正确地贯彻执行这一政策，及时地作好粮食调度供应工作，故没有能够制止灾情的扩大。","type":"paragraph"},{"text":"在１９５５年救灾工作中发生严重缺点之后，国务院曾经指示：必须加强生产救灾工作，对某些情节严重的失职干部，应该予以严肃处理。广西省人民委员会虽然从１９５６年的下半年起已经纠正了救灾工作中的缺点，在１９５７年的春荒中也采取了有效的措施，但是对于因灾死人应该负有责任的县级以上干部，一直迟迟没有处理，因此不能在群众中分清是非，不能使干部得到教育。广西省人民委员会这种对人民生命安全漠不关心的作风和严重失职的行为，不仅造成了人民生命财产的损失，而且也严重地损害了人民政府在群众中的威信。国务院各部门和地方各级人民委员会应该从这次事件中取得深刻的教训，对于有关广大人民切身利益的问题，必须给以足够的关心；对于工作中已经开始暴露的错误，应该及时地深入检查，并且采取必要的措施进行纠正，以防止错误的扩大。","type":"paragraph"},{"text":"为了严肃国家纪律，教育国家工作人员，国务院决定对于广西省人民委员会和平乐专署、荔浦县人民委员会有关负责人，分别给予处分如下：","type":"paragraph"},{"text":"郝中士，广西省副省长，在韦国清省长因公离职期间，实际上代理省长职务。在灾荒中，没朋抓紧救灾工作，严重失职，并且在事后检查的时候，企图推托责任，决定给予撤职处分。","type":"paragraph"},{"text":"萧一舟，广西省副省长，负责财经粮食工作，对粮食减产情况估计不足，在救灾工作中未能及时做好粮食供应工作，决定给予撤职处分。","type":"paragraph"},{"text":"陈漫远，广西省人民委员会委员、中共广西省委第一书记，由于严重失职，中共中央已经给予撤职处分，决定撤销其省人民委员会委员的职务。","type":"paragraph"},{"text":"段书香，平乐专署副专员，负责掌握粮食工作，不重视灾情，对于救灾粮食供应工作不及时，决定给予撤职处分。","type":"paragraph"},{"text":"李善本，荔浦县副县长，在１９５６年灾荒发生后，积压专署发下去的救灾指示达半月之久，没有及时展开救灾工作，决定给予记大过处分。","type":"paragraph"},{"text":" （１９５７年６月１４日国务院全体会议第五十二次会议通过）","type":"paragraph"}],"comments":[],"origin":"原载1957年6月18日《人民日报》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"国务院给有关失职人员处分的决定","authors":[],"dates":[{"year":1957,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"国务院给有关失职人员处分
