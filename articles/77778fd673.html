al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"和李立三应对联","alias":"","parts":[{"type":"paragraph","text":"和李立三应对联！"},{"type":"paragraph","text":"（1921年11月）洞庭有归客；（毛泽东）"},{"type":"paragraph","text":"潇湘逢故人。(李立三)"},{"type":"paragraph","text":"[1]1921年11月中旬，李立三在法国勤工俭学，由于参加爱国进步活动，因而被法国当局遣返回到上海，中共中央决定派他回湖南从事工人运动。他拿着党中央的介绍信来到长沙清水塘23号毛泽东办公及居住的地方。当时，毛泽东正在伏案疾书，抬头一望，见是阔别已久的老友，喜出望外。毛泽东的夫人杨开慧也高兴地说：“难怪方才喜鹊叫，原来是李兄大驾光临！”毛泽东接着说：“这叫做·‘洞庭有归客”。”李立三立即回答说：“潇湘逢故人。”两人握手，相视大笑。李立三（1899—1967)，原名隆鄄，湖南醴陵人。1919年赴法国勤工俭学，1921年回国，同年加入中国共产党。为中"}],"authors":["毛泽东"],"dates":[{"year":1921,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":452,"page_end":452},"tags":[{"name":"毛泽东","type":"人物"},{"name":"李立三","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77778fd673"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
