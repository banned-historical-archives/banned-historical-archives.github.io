art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广泛开展活学活用毛泽东思想群众运动以必胜的信心把爱国正义斗争进行到底","authors":[],"parts":[{"type":"paragraph","text":"据新华社香港二十三日电 广东省革命委员会和广州市革命委员会胜利诞生的喜讯传到香港，香港爱国同胞敲锣打鼓，奔走相告，撒传单，贴标语，放气球，一片欢腾。他们千遍万遍地欢呼：“热烈庆祝广东省和广州市革命委员会胜利成立！”“伟大领袖毛主席的无产阶级革命路线胜利万岁！”“战无不胜的毛泽东思想胜利万岁！”“敬祝世界革命人民心中最红最红的红太阳、我们伟大的领袖毛主席万寿无疆！万寿无疆！”"},{"type":"paragraph","text":"连日来，许多工会、学校和社会团体的工人、学生以及各阶层爱国同胞，以无限喜悦的心情，纷纷举行庆祝集会和各种庆祝活动。"},{"type":"paragraph","text":"香港工人和各界爱国同胞在庆祝集会上满怀激情地说，广东省革命委员会和广州市革命委员会的胜利诞生，是英雄的中国人民解放军和广大革命群众坚决执行毛主席革命路线的伟大胜利，它宣告了中国赫鲁晓夫、反革命两面派陶铸以及他们在广东省的代理人妄图在广东省复辟资本主义的罪恶阴谋的彻底破产，它再一次证明了我们伟大领袖毛主席的英明论断：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。”“再有几个月的时间，整个形势将会变得更好。”他们指出，广东省和广州市革命委员会的成立，是对帝、修、反的一个沉重的打击。他们严厉警告美蒋、苏修、英、日特务和各国反动势力，任何企图利用港澳地区来破坏我们伟大祖国的阴谋活动，必将被港澳爱国同胞彻底粉碎。"},{"type":"paragraph","text":"香港工人和各界爱国同胞兴奋地说，广东省是祖国的南大门，革命委员会的成立，必将使广东省在支援兄弟的越南人民的抗美救国斗争中作出更大的贡献。广东省人民和香港爱国同胞是亲骨肉，广东省人民和全国人民一样，一直在关怀和支持我们的反英抗暴斗争。广东省和广州市革命委员会的成立，给我们带来了极大的鼓舞和支持，使我们更加斗志昂扬，更加充满必胜的信心。我们决心更加广泛地开展活学活用毛泽东思想的群众运动，学习祖国人民的革命造反精神，把反英抗暴斗争进行到底。"},{"type":"paragraph","text":"喜讯传到澳门，澳门各界爱国同胞也纷纷举行庆祝集会，热烈欢呼：“伟大领袖毛主席万岁！万万岁！”“敬祝毛主席万寿无疆！”欢呼毛主席的无产阶级革命路线的伟大胜利。"},{"type":"paragraph","text":"港九工会联合会，香港学生界、教育界、新闻界、电影界和工商界，以及澳门各界同胞庆祝广东省革命委员会成立大会分别致电或写信，热烈祝贺广东省和广州市革命委员会胜利诞生。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e40d641d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
