":1966,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"见到毛主席，这是我们懂事以来最强烈的愿望。我们的父母都是在万恶的旧社会里吃尽了千辛万苦的贫苦农民，是党和毛主席把我们从火海里拯救了出来，使我们得到了翻身解放。今天，我们这些老贫农的后代继承了父辈们的光荣传统，做了我们伟大统帅毛主席的红小兵，拿起笔杆和阶级敌人搏斗。在战斗的日子里，我们伟大的领袖，伟大的导师，伟大的统帅，伟大的舵手毛主席接见了我们，我们怎么能不激动，我们又怎么能不欢呼，我们从心底里迸发出:毛主席万岁!万岁!万万岁!"},{"type":"paragraph","text":"为了表达我们的革命决心，为了彻底完成一斗二批三改的光荣而艰巨的战斗任务，为了纪念九月十五日这个光荣的日子，我们几个见到毛主席的红卫兵决定成立“九·一五”战斗小组，更高地举起毛泽东思想伟大红旗，在这场触及人们灵魂的文化大革命中发挥更大的战斗作用。"},{"type":"paragraph","text":"上海外国语学院红卫兵“九·一五”战斗小组"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa025efa7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
