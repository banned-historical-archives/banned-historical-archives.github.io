{"year":1952,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"汝堂"},{"type":"paragraph","text":"三反学习是我们思想改造的第一课。通过学习，划清无产阶级思想与资产阶级思想的界线，清算自己思想上所受资产阶级思想的影响。在我们的学校中三反学习运动开展以来，同学们都已认识到资产阶级是确实在向人民民主政权进行猖狂的进攻，严重地损害了人民利益，但在批判自己的资产阶级思想时，却表现出软弱无力，感到对资产阶级思想痛恨不起来；因此，对资产阶级思想也就清算得不彻底，对自己思想改造的要求也不迫切。有的同学认为这是从“理性”到“感性”的问题，有的同学认为这是“因为我没有亲身受过资产阶级的剥削，所以对资产阶级思想也就痛恨不起来。”这的确是一个相当严重的问题，因为它可以决定我们在这场激烈的阶级斗争中是打胜仗呢?还是吃败仗!"},{"type":"paragraph","text":"我们学习小组曾就此问题展开二次讨论，得到下列三点认识:"},{"type":"paragraph","text":"第一、要痛恨资产阶级思想，首先必须深刻认识资产阶级的丑恶本质，认识资产阶级腐化堕落思想、自私自利思想对人民国家的严重危害。"},{"type":"paragraph","text":"第二、必须正确地认识个人利益与国家利益的关系。假如已经认识到资产阶级思想的存在会对人民国家造成严重危害，而对资产阶级思想仍然痛恨不起来，这就因为我们对祖国的热爱程度不足。志愿军在朝鲜之所以能创造出许多英勇事迹，就是因为他们把国家利益放在第一位，他们对人民国家有无限的热爱，因此才对一切危害祖国的敌人有无比的憎恨。"},{"type":"paragraph","text":"第三、必须站稳无产阶级立场来批判自己的资产阶级思想。在同学们当中，有很多人不是站在无产阶级立场来批判资产阶级思想，而是站在小资产阶级或资产阶级立场来批判资产阶级思想的。例如有的同学看到王康年的丧尽天良的行为就感到痛恨，而对于一些不法商人的小的偷税行为则觉得“关系不大”；对于沾染资产阶级思想较多的人就觉得需要很彻底的批判，而对于受资产阶级毒害较少和受害程度和自己相等的人，就觉得可以“马虎一点”，所以引不起对资产阶级的痛恨或憎恨的程度不足。"},{"type":"paragraph","text":"所以，我们为什么对资产阶级思想痛恨不起呢?基本上还是一个立场问题。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d3f6a4ed7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
