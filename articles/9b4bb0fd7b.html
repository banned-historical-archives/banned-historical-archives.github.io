art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是无产阶级革命胜利的保证","authors":[],"parts":[{"type":"paragraph","text":"澳大利亚共产党（马克思列宁主义者）主席爱·弗·希尔，在二日的澳共（马列）机关报《先锋报》上发表的题为《我们向震撼世界的中国无产阶级文化革命致敬》的文章中写道：中国“正在发生巨大的变化”，“革命群众造反了，革中国共产党内那些走资本主义道路当权派的命。他们必须造反，他们必须坚持不懈地造反。这是好得很的造反。他们必须夺回被资产阶级分子篡夺的权。他们必须把权力夺归自己。”"},{"type":"paragraph","text":"文章指出：“毛泽东思想是为无产阶级革命的彻底胜利而进行的阶级斗争的最高指导。如果照毛泽东思想办事，那末无产阶级革命的胜利就有了保证。如果压制、无视毛泽东思想，或者对它采取消极态度，那末无产阶级革命就要失败。”"},{"type":"paragraph","text":"文章写道：中国的无产阶级文化大革命“已经把马克思列宁主义的顶峰毛泽东思想传播给中国的亿万人民，传播给全世界亿万人民。这意味着无产阶级革命的蓬勃高涨。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b4bb0fd7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
