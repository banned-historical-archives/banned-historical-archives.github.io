ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对政务院关于设置文史研究馆的决定草案的批语","alias":"","parts":[{"type":"paragraph","text":"对政务院关于设置文史研究馆的"},{"type":"paragraph","text":"决定草案的批语"},{"type":"paragraph","text":"（1952年8月18日）刘阅，退邓办。同意这个决定”。加了一句。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十八日[1]刘，指刘少奇。[2]邓，指邓小平，当时任政务院副总理。"},{"type":"paragraph","text":"[3]指送审的政务院关于设置文史研究馆的决定（草案）。决定草案说：中央人民政府自1951年7月成立文史研究馆，吸收了不少社会夙有声望的文人耆宿。华东、中南某些地区也设有类似组织，安置了一部分年老贫困的知识分子。估计全国各省、市有不少此类年老失业的知识分子需要照顾，因此决定：全国各省及中央或大行政区的直属市均设置文史研究馆（大区、专、县及省属市不必设立），如某些省、市原已成立类似机构的，必要时可更换名称，不必重复设立。"},{"type":"paragraph","text":"[4]毛泽东加写的一句话是：“某些省市无设立此项机构之需要者，亦不必设立。”"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":201,"page_end":201},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d131172b88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
