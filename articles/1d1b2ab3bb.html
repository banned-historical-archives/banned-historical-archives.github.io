torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"给彭雪枫的信","alias":"","parts":[{"type":"paragraph","text":"给彭雪枫的信！！"},{"type":"paragraph","text":"（1936年10月22日）"},{"type":"paragraph","text":"急须将与绥普关系弄好，得信后即赴津迅速转至绥远办理此事。我有付南汉宸一信，要求他介绍你见傅作义。"},{"type":"paragraph","text":"交涉要诚恳，要机警，要有耐性。专作上层交际，不与党的组织相关涉，不要引人见疑。"},{"type":"paragraph","text":"如傅同意，待绥远办好后，请傅介绍见阎，不同意则罢，你的工作以傅为主。"},{"type":"paragraph","text":"用费从带去之四百元中开支，十分节省用，不要爱奢华，不要失掉我们的立场，不要接受人家的馈赠，只有在万不得已时，才许可从人家借一点钱，日后如数归还，用数要报账。有闲工夫注意看书报，加紧学习。"},{"type":"paragraph","text":"[1]这是毛泽东致彭雪枫信的主要内容。[2]傅，指傅作义。[3]阎，指阎锡山。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":249,"page_end":249},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d1b2ab3bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
