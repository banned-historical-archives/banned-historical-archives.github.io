script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"遵循毛主席关于“备战、备荒、为人民”的伟大教导　福建江西广大社员踊跃交售夏粮　广大贫下中农说：我们要多送粮、快送粮、送好粮，打倒帝修反，埋葬新沙皇","authors":[],"dates":[{"year":1969,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"遵循毛主席关于“备战、备荒、为人民”的伟大教导"},{"type":"paragraph","text":"福建江西广大社员踊跃交售夏粮"},{"type":"paragraph","text":"广大贫下中农说：我们要多送粮、快送粮、送好粮，打倒帝修反，埋葬新沙皇"},{"type":"paragraph","text":"据新华社福州十三日电　在党的“九大”精神鼓舞下，夺得早稻丰收的福建广大贫下中农和社员群众，遵照伟大领袖毛主席关于“备战、备荒、为人民”的教导，正在向国家踊跃交售夏粮。到目前为止，全省向国家交售的夏粮，比去年同期多一倍以上。收割比较早的早稻主要产区龙溪、晋江两专区和厦门市郊区的许多社队，夏粮征购任务已经超额完成。"},{"type":"paragraph","text":"在今年的早稻生产季节，福建省广大贫下中农和社员群众，进一步贯彻执行毛主席关于“抓革命，促生产，促工作，促战备”的伟大战略方针，更好地坚持以革命统帅生产，不失时机地完成了早稻播种、插秧和田间管理等任务，并且战胜了干旱、雨涝和病虫等自然灾害，夺得了比去年增产一成以上的好收成。早稻登场以后，农村各社队纷纷举办各种类型的毛泽东思想学习班，广大革命群众反复学习毛主席关于“我们作计划、办事、想问题，都要从我国有六亿人口这一点出发，千万不要忘记这一点”的教导，摆正了国家、集体和个人三者之间的关系，迅速掀起了交售夏粮的热潮。地处对敌斗争最前线的厦门市郊区广大社员，一手拿枪，一手拿锄，在夺得早稻丰收以后，提出了“早交粮，交好粮，多交粮，支援祖国社会主义建设”的战斗口号，采取边收、边晒、边交售的办法，通宵达旦地把粮食送进了国家仓库。"},{"type":"paragraph","text":"据新华社南昌十三日电　在伟大领袖毛主席“抓革命，促生产，促工作，促战备”的伟大战略方针指引下，夺得今年早稻丰收的江西省农村人民公社广大贫下中农，怀着无限忠于毛主席的深厚无产阶级感情，喜气洋洋地掀起夏粮入库高潮。"},{"type":"paragraph","text":"江西今年早稻获得丰收。赣州地区和井冈山地区早稻收成比去年增产一成到两成，有的县、社、队今年早稻一季产量就超过了全年的总产量，超过了历史最高水平。在获得丰收的日子里，广大贫下中农满怀喜悦的心情，踊跃交售征购粮，他们说：我们要多送粮、快送粮、送好粮，打倒帝、修、反，埋葬新沙皇。"},{"type":"paragraph","text":"江西省各地今年在开展夏粮入库工作中，都以毛主席关于粮食工作的教导为指针，以革命大批判为动力，狠抓入库过程中的阶级斗争，把夏粮征购入库过程作为落实毛主席“备战、备荒、为人民”的伟大战略方针的过程。革命老根据地瑞金、兴国等县各级革委会在组织夏粮征购入库中，一个队一个队地过细地做工作，采取边收、边晒、边送的方法，入库进度一般比去年同期加快。广丰、弋阳两县夏粮入库已接近完成。"},{"type":"paragraph","text":"在征购入库中，各地革委会遵照伟大领袖毛主席关于“在分配问题上，我们必须兼顾国家利益、集体利益和个人利益”的教导，同时抓紧安排好社员生活和增加生产队的集体粮食储备。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd71e8095b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
