农联盟是民族统一战线政策的根本基础，必须吸收民族资产阶级和其他民主人士参加到统一战线中来","authors":[],"dates":[{"year":1964,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度尼西亚共产党举行中央全会"},{"type":"paragraph","text":"艾地号召全体党员成为马恩列斯好学生"},{"type":"paragraph","text":"全会通过决议指出工农联盟是民族统一战线政策的根本基础，必须吸收民族资产阶级和其他民主人士参加到统一战线中来"},{"type":"paragraph","text":"新华社雅加达九日电　印度尼西亚共产党中央委员会主席艾地七日号召印度尼西亚共产党全体党员“尽最大的力量，使自己成为好的和更好的共产党员，成为马克思、恩格斯、列宁和斯大林的好学生。”"},{"type":"paragraph","text":"印度尼西亚共产党中央委员会在党的第一次全国大会结束后，于六日和七日在雅加达举行了第三次全体会议。"},{"type":"paragraph","text":"艾地主席在会上致闭幕词时作出了这个号召。"},{"type":"paragraph","text":"据印度尼西亚共产党新闻局发表的新闻公报报道，艾地主席七日在讲话中说：“在印度尼西亚共产党第一次全国大会和党中央委员会第三次全体会议胜利闭幕之后，所有党员和党的干部有了在日常工作中运用的新的武器，来发展国内和国际上的进步力量，不断进行自我锻炼和自我教育，以及全力争取实现共产党员的九项条件和使我们自己成为好的和更好的共产党员。”"},{"type":"paragraph","text":"新闻公报说，艾地主席还在中央委员会第三次全体会议上作了关于党的第一次全国大会的成果的报告。"},{"type":"paragraph","text":"会议在讨论后批准了第一次全国大会关于组织、国内和国际问题的所有决议。"},{"type":"paragraph","text":"全会还批准了第一次全国大会按照党章提出的关于加强党中央委员会的组成的建议，其中包括增补中央委员会所有候补委员为正式委员，增加新的中央委员和候补中央委员的名额和增加中央委员会书记处书记的人数。"},{"type":"paragraph","text":"会议批准了党的第一副主席鲁克曼关于改进党在民族阵线中的工作的报告。"},{"type":"paragraph","text":"全会的一项决议指出：“作为所有革命力量团结的核心的纳沙贡政治合作有了发展和扩大。工农联盟是民族统一战线政策的根本基础。但是共产党员同时也必须尽一切力量建立工人同城市地区小资产阶级的联盟，并吸收民族资产阶级和其他民主人士参加到民族统一战线中来。”"},{"type":"paragraph","text":"印度尼西亚共产党中央委员会第三次全体会议的另一个决议要求对种族主义的危险提高警惕。决议说：“种族主义是在我国的一个潜在的危险。我们知道，以殖民制度为基础的种族主义已经助长了社会上的沙文主义。因此，应该提高警惕和在一切方面加强反对种族主义的斗争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8af86e43e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
