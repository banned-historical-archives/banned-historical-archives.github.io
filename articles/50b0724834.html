身体，努力学习，实现“三好”","authors":[],"dates":[{"year":1964,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京25日电】　叶剑英元帅今天下午观看了不久前获得一九六四年二十单位少年足球赛冠军的广东梅县东山中学队和亚军吉林延吉第二中学队的足球表演赛，并且接见了两个队的全体人员。"},{"type":"paragraph","text":"接见的时候，叶剑英元帅同少年足球运动员们进行了亲切的谈话，称赞他们球踢得好，并且勉励他们继续锻炼身体，努力学习，实现毛主席的“身体好，学习好，工作好”的“三好”号召。"},{"type":"paragraph","text":"接见时，团中央书记处书记惠庶昌、国家体委球类司副司长李风楼等也在场。"},{"type":"paragraph","text":"在今天这场为时六十分钟的表演赛中，配合良好、射门准确的梅县东山中学队以二比一获胜；延吉第二中学队表现出体力充沛、抢截积极等特点。"},{"type":"paragraph","text":"获得一九六四年二十单位少年足球赛前五名的各队，最近都由青岛来到北京进行表演赛。除上述两个队外，还有获得第三名到第五名的天津第五十四中学队、上海淮海中学队、北京第六十一中学队。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50b0724834"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
