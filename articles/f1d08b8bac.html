script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央首长接见军队院校学员代表时的讲话","authors":["周恩来","江青","陈伯达"],"dates":[{"year":1967,"month":1,"day":8}],"is_range_date":false,"parts":[{"text":"中央首长接见军队院校学员代表时的讲话","type":"title"},{"text":"周恩来江青陈伯达","type":"authors"},{"text":"〖一九六七年一月八日早晨二点，周总理、江青、陈伯达、穆欣、戚本禹、王力等同志在人民大会堂接见了军队院校革命学员代表和红卫兵代表，周总理和江青同志讲了话，今按记录整理如下，仅供参考。〗","type":"appellation"},{"text":"周总理：","type":"paragraph"},{"text":"同志们，同学们，今天和伯达、江青、穆欣、戚本禹、王力同志来和大家见面。让我代表毛主席，林副主席向你们问好！","type":"paragraph"},{"text":"同志们，你们在场有从农业、教育，外地到京告状的，在中南海那里不好谈话，所以在这里谈话，我们支持你们批判资产阶级反动路线的群众斗争，你们在场的有参加了批判刘邓资产阶级反动路线斗争大会的，你们高举毛泽东思想红旗，坚决拥护以毛主席为代表的无产阶级革命路线，你们在中南海西门批评中央政治局的一些领导同志，你们提出的象李富春、陈毅、谭震林，军委的徐立清，这些同志在文化大革命中做了些错事，这些同志是在文化大革命中在执行资产阶级反动路线时所犯的错误，而当时提出反动路线的在于刘邓两位，而不在这些同志，十一中全会已做结论。做检查是应该的，当然还可以检查，应该给时间，这些同志都是第一线的，谭震林抓农业，徐立清抓三线，都是很忙的，他们的错误性质不是属于路线问题，应该有所区别，批判资产阶级反动路线一定要明确斗争的方向，不要把方向指错了，而要指向刘、邓和反党集团，还有象薄一波，象安子文跟彭真一样反党罪行，我们指了些人名，所以我们一定要把斗争的矛头指对，就是反动路线和反党集团，这需要给大家说清。所以你们要让工作的同志检查，先交材料，让他们准备做检查。","type":"paragraph"},{"text":"你们在北京向国务院中央请愿，这是应该的，但一定要在接洽的地方，提出问题转向中央，还可在政协、人大会堂和一些会议室接见你们的。中南海、钓鱼台、人民大会堂是我们誓死保卫的，中南海是伟大领袖毛主席、中央同志工作的中心，一定要给安静点，让他很好地工作，考虑国内外大事。（我们不要扰乱那里工作。）喇叭不要对准中南海，影响工作，你看好不好（群众：好！）所以，我们规定中南海，北门、西门，不能让任何人冲进中南海，不管什么时候我们要挺身而出保卫中南海。","type":"paragraph"},{"text":"我曾处理几次这样的事，无论如何要遵守最高纪律，当然冲进去我们要好好劝说：望告诉……大家自觉遵守这条纪律，我们中南海保卫人员有时态度生硬点或莽撞，我们向你们道歉。同时我也要求你们尊重毛主席的好战士解放军。","type":"paragraph"},{"text":"同志们，刚才说了，你们要批判刘少奇、邓小平和继续执行资产阶级反动路线的陶铸，你们直接到中南海抓，我劝你们不要抓，中央也劝你们不要这样做。我们不同意你们的办法，我们同意转达你们的材料，中央文革小组同意转达你们的材料。以后各个单位要有组织有计划的串连，方便革命的群众运动，我们正在计划各个战线上的串连，如政法战线……。我希望得到你们的赞同和支持。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"王力","type":"人物"},{"name":"徐立清","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"穆欣","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"jqjianghua","type":"pdf","name":"江青十年讲话汇编","internal":false,"official":false,"author":"江青，本世纪初国内老左编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/jqjianghua.pdf"],"article":{"title":"中央首长接见军队院校学员代表时的讲话","description":"","dates":[{"year":1967,"month":1,"day":8}],"parts":[{"text":"中央首长接见军队院校学员代表时的讲话","type":"title"},{"type":"paragraph","text":"〖一九六七年一月八日早晨二点，周总理、江青、陈伯达、穆欣、戚本禹、王力等同志在人民大会堂接见了军队院校革命学员代表和红卫兵代表，周总理和江青同志讲了话，今按记录整理如下，仅供参考。〗"},{"type":"appellation","text":"周总理："},{"type":"paragraph","text":"同志们，同学们，今天和伯达、江青、穆欣、戚本禹、王力同志来和大家见面。让我代表毛主席，林副主席向你们问好！"},{"type":"paragraph","text":"同志们，你们在场有从农业、教育，外地到京告状的，在中南海那里不好谈话，所以在这里谈话，我们支持你们批判资产阶级反动路线的群众斗争，你们在场的有参加了批判刘邓资产阶级反动路线斗争大会的，你们高举毛泽东思想红旗，坚决拥护以毛主席为代表的无产阶级革命路线，你们在中南海西门批评中央政治局的一些领导同志，你们提出的象李富春、陈毅、谭震林，军委的徐立清，这些同志在文化大革命中做了些错事，这些同志是在文化大革命中在执行资产阶级反动路线时所犯的错误，而当时提出反动路线的在于刘邓两位，而不在这些同志，十一中全会已做结论。做检查是应该的，当然还可以检查，应该给时间，这些同志都是第一线的，谭震林抓农业，徐立清抓三线，都是很忙的，他们的错误性质不是属于路线问题，应该有所区别，批判资产阶级反动路线一定要明确斗争的方向，不要把方向指错了，而要指向刘、邓和反党集团，还有象薄一波，象安子文跟彭真一样反党罪行，我们指了些人名，所以我们一定要把斗争的矛头指对，就是反动路线和反党集团，这需要给大家说清。所以你们要让工作的同志检查，先交材料，让他们准备做检查。"},{"type":"paragraph","text":"你们在北京向国务院中央请愿，这是应该的，但一定要在接洽的地方，提出问题转向中央，还可在政协、人大会堂和一些会议室接见你们的。中南海、钓鱼台、人民大会堂是我们誓死保卫的，中南海是伟大领袖毛主席、中央同志工作的中心，一定要给安静点，让他很好地工作，考虑国内外大事。（我们不要扰乱那里工作。）喇叭不要对准中南海，影响工作，你看好不好（群众：好！）所以，我们规定中南海，北门、西门，不能让任何人冲进中南海，不管什么时候我们要挺身而出保卫中南海。我曾处理几次这样的事，无论如何要遵守最高纪律，当然冲进去我们要好好劝说：望告诉......大家自觉遵守这条纪律，我们中南海保卫人员有时态度生硬点或莽撞，我们向你们道歉。同时我也要求你们尊重毛主席的好战士解放军。"},{"type":"paragraph","text":"同志们，刚才说了，你们要批判刘少奇、邓小平和继续执行资产阶级反动路线的陶铸，你们直接到中南海抓，我劝你们不要抓，中央也劝你们不要这样做。我们不同意你们的办法，我们同意转达你们的材料，中央文革小组同意转达你们的材料。以后各个单位要有组织有计划的串连，方便革命的群众运动，我们正在计划各个战线上的串连，如政法战线......。我希望得到你们的赞同和支持。"}],"comment_pivots":[],"is_range_date":false,"authors":["周恩来","江青","陈伯达"],"comments":[],"page_start":194,"page_end":195,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"王力","type":"人物"},{"name":"徐立清","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"穆欣","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1d08b8bac"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
