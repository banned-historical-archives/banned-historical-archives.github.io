":[{"year":1969,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"桑伟川认为“杨健这人物的阶级属性是无产阶级”的。这完全是在胡说!杨健是一个地地道道的跪倒在资本家脚下的奴才。请看:当大资本家徐义德妄图以“三停”来破坏“五反”运动，工人愤慨地要采取革命行动，抄这个极端反动的资本家的老有时，杨健却站在资本家一边，充当资本家的帮凶，说什么“这么一来，我们就理亏了。”“他三停当然是违法。……我们不能用违法对待违法。”怎样才算有理?怎样才算合法?我们的伟大领袖毛主席教导我们说:“对反动派造反有理”。我们工人阶级对资产阶级和一切反动派就是造反有理，就是造反合法。徐义德伪装没钱，制造“三停”，反对伟大领袖毛主席，破坏“五反”运动，我们工人阶级就是要和他作坚决斗争，这样的革命行动就是好!好极了!然而，杨健所说的“理”和“法”，就是只许资产阶级向工人阶级进攻，不许工人阶级对资产阶级反击，用资产阶级的“理”和“法”，把工人运动镇压下去，把资本家保护起来。这同一九二二年刘少奇在安源煤矿出卖工人阶级、充当反动资本家帮凶的丑恶行径，不是如出一辙吗!杨健和刘少奇一样，就是一个不折不扣的资本家的乏走狗。"},{"type":"paragraph","text":"对于这样一个乏走狗，却被桑伟川吹捧成一个“有丰富的斗争经验”，“体现的大力向和路线、政策是正确”的“党的领导者”，桑伟川爱的是什么，僧的是什么，不是再清楚没有了吗:"},{"type":"paragraph","text":"上海炼油厂工人　娄文祥"},{"type":"paragraph","text":"上海卢湾邮电支局工人　娄文礼"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f21483a436"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
