ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"必须精心组织歼灭美军陆战第一师","alias":"","parts":[{"type":"paragraph","text":"必须精心组织歼灭美军陆战第一师"},{"type":"paragraph","text":"（1950年11月12日）彭、邓、朴："},{"type":"paragraph","text":"美军陆战第一师战斗力据说是美军中最强的，我军以四个师围歼其两个团，似乎还不够，应有一个至两个师作预备队。九兵团的二十六军应靠近前线，作战准备必须充分，战役指挥必须是精心组织的，请不断指导宋、陶完成任务。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十二日"},{"type":"paragraph","text":"[1]彭，指彭德怀，当时任中国人民志愿军司令员兼政治委员。邓、朴，指邓华、朴一禹，当时均任中国人民志愿军副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]宋、陶，指宋时轮、陶勇，当时分别任中国人民志愿军第九兵团司令员兼政治委员和副司令员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":358,"page_end":358},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afb84b49f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
