:["苏枫"],"dates":[{"year":1975,"month":9,"day":5}],"is_range_date":false,"parts":[{"text":"文年生妻子给毛泽东的信（要点）","type":"title"},{"text":"苏枫","type":"authors"},{"text":"〖文年生，原解放军广州军区副司令员。〗","type":"subtitle"},{"text":"文年生长征时曾在您身边任军委教导队队长；一九四二年在关中任警一旅旅长兼马兰分区司令员时，您曾亲笔书赠“生产教育二者兼顾”奖励他；一九四五年他任南下的第三游击支队司令员，是您亲自讲话并为部队送行。他是在您和党的长期教育下培养起来的一位老干部。一九六六年文化大革命初期，他以党委副书记身份主持军区党委工作，因不同意黄永胜等人镇压群众的做法，于一九六七年三月被撤去军区文革小组长职务，后又被撤销了党委副书记的职务及其政治待遇和生活待遇，遭到残酷斗争，于一九六八年六月六日含冤逝世。去年，我曾向军区复查小组提出给他作出政治结论、公开平反的要求，遭到拒绝。我和我的孩子们以极其悲愤而又沉痛的心情向主席写这封信，盼望着文年生同志遭受的不白之冤早日昭雪。","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c46a788c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
