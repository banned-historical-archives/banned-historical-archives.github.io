ar":1967,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　正当文艺界广泛深入开展斗批改的时候，上海音乐学院、上海电影乐团、上海合唱团、上海舞蹈学校、上海红卫兵电影制片厂、儿童艺术剧院等六个单位的无产阶级革命派，在毛主席革命文艺路线指引下，满怀激情，联合创作排演的毛主席诗词合唱组歌《风雷激》，已于日前在徐汇剧场公演。这是一曲热情歌颂毛主席革命路线取得辉煌胜利的赞歌。这是射向周扬反革命修正主义文艺黑线及其总后台的一发重炮弹。"},{"type":"paragraph","text":"上海音乐学院等六单位的无产阶级革命派在创作和排演的过程中，发扬了革命造反精神，并且积极地投入了革命的大批判运动，提高了觉悟。他们决心在毛主席文艺路线的光辉照耀下，为夺取新的胜利而斗争。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d99fa1ceb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
