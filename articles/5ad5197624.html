ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对沈阳军区党委关于农村社队领导班子调查报告的批语","alias":"","parts":[{"type":"paragraph","text":"对沈阳军区党委关于农村社队"},{"type":"paragraph","text":"领导班子调查报告的批语"},{"type":"paragraph","text":"（1968年12月）建议将此件\"转发各地参考。"},{"type":"paragraph","text":"[1]指中共沈阳军区委员会1968年11月30日给毛泽东等的报告。报告说，为作好今冬明春农村斗、批、改的准备，军区各部队组织1100多个调查组下去调查。从已调查完的34个县的3598个社、队领导班子情况看，大体可分为三类：一类是好的，占20%左右；二类是中间状态的，占60%左右，这类班子的领导权基本上掌握在贫下中农手里；三类是不好的，大体上占13%～15%，这类班子严重不纯，基本上是坏人掌权。调查情况表明，农村两条路线斗争的根本问题是领导班子问题，解决好这个问题，是今冬明春农村斗、批、改的重点。支农部队应根据领导班子的不同情况，采取不同的办法，突出重点，集中力量打歼灭战。12月7日，中共中央、中央军委、中央文革根据毛泽东的批示，转发了这个报告。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":374,"page_end":374},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ad5197624"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
