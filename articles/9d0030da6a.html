ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"致贺龙、关向应电","alias":"","parts":[{"type":"paragraph","text":"致贺龙、关向应电！"},{"type":"paragraph","text":"（1940年4月3日）"},{"type":"paragraph","text":"李文九十军主要阴谋是渡河袭取绥德，威胁延安，切断西北、华北交通。估计该军实行渡河时，高双成可能南下袭击绥德、米脂，日寇亦必乘虚攻击晋西北。因此请考虑：（一）拒李防高抗日三方面如何布置兵力。（二）现有兵力总数是否足够应付严重局面。（三）陈士支队如东调是否不感兵力不足。（四）王震旅无机动兵力如何解决。（五）王震河防部署及作战指挥统属你们负责。（六）为解决兵力不足是否有从路东调回若干部队之必要。请周详考虑电告。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":518,"page_end":518},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d0030da6a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
