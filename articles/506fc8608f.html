script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"关于部队中民主生活的指示","alias":"","parts":[{"type":"paragraph","text":"关于部队中民主生活的指示"},{"type":"paragraph","text":"（1948年3月）"},{"type":"paragraph","text":"用民主讨论方式，发动士兵群众，在作战前、作战中、作战后讨论如何攻克敌阵，歼灭敌人，完成战斗任务，特别是在作战中放手发动连队支部、班排小组，反复讨论如何攻克敌阵，收效极大。陕北攻克蟠龙敌整一师一六七旅阵地的经验，也是如此。当时有一个团打了几天，上面认为无法打了，下令撤退，但连队认为可打，不肯撤。连队战士分组讨论，找出了办法继续打，结果获得胜利。陕北将此种情形叫做军事民主，而将诉苦运动、三查三整叫做政治民主与经济民主，这些军队中的民主生活，有益无害，一切部队均应实行。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":187,"page_end":187},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"506fc8608f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
