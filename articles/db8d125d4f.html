<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国的“牛仔”","authors":["邓蜀生"],"dates":[{"year":1979,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国的“牛仔”"},{"type":"paragraph","text":"邓蜀生"},{"type":"paragraph","text":"编者按：邓小平副总理今年访问美国的时候，二月二日在休斯敦观看了美国马术竞技表演。许多读者来信，希望了解表演这种竞技的“牛仔”的情况。为此，我们特刊登这一篇短文。"},{"type":"paragraph","text":"在美国西部开拓时期，在今天的得克萨斯州一带，有许多开辟牧场、放牧菜牛的骑马牧人，他们一生中的大部分时间都是同马牛打交道，练就了一身好骑术。"},{"type":"paragraph","text":"十九世纪二十年代，美国的许多拓荒者深入西部，驯养大批生息在得克萨斯和西部大平原上的野马和长角牛。开始，这些牧人不论服装和放牧技术，都是向当地的墨西哥骑马牧人学习的。但是他们很快形成了从牧歌到服装，从放牧方式到骑术的具有自己特色的生活方式，这些牧人统称“牛仔”。“牛仔”的牧歌在美国音乐史上占有它的地位，现在保留下来的牧歌约有二百首，象《牧场上的家》这首歌从本世纪三十年代初起广泛流传，深为美国人民喜爱。"},{"type":"paragraph","text":"一八六六年后美国北部印第安人被圈禁在保留地中，因此西部大平原很快遍布“牛仔”足迹。由于对菜牛的需要量越来越大，利润越来越高，“牛仔”的人数也剧增。他们是来自得克萨斯和东部的农庄、城市以及英属岛屿上的有冒险精神的年青人。他们要控制和驯服那些性情暴烈的野马和牛群，就需要有健壮的身体、勇敢的精神和高超的技术，特别是骑术和使用套索的本领。他们还要全面掌握牲畜的习性并能在白天和黑夜准确无误地寻找路径；能在暴风雨中掌握住牛群，不使奔散；能带着牛群过流沙，涉恶水，穿越几百英里无人烟的地区。在这种艰苦条件下，一般牛仔的马上生活，平均只有七年。"},{"type":"paragraph","text":"“牛仔”身上体现的粗犷、进取、冒险和克服困难的精神，在美国文艺作品中反映得很多。我们在电影中看到“牛仔”的打扮很别致：宽边帽、高跟皮靴、皮马裤。其实，他们这样的穿着不是为了吸引人，而是适应放牧生活的需要。他们戴的宽边帽是为了防止荒野中强烈阳光的曝晒。他们穿的皮马裤，是为了保护脚腿不被荆棘刺伤，也是预防牛角顶刺和坠马受伤。高跟皮靴是为了预防脚套在马镫中抽不出来，而且在扔套索时可以用高跟作为依托。遮住嘴鼻的颈巾是为了能在风沙中进行呼吸。"},{"type":"paragraph","text":"由于“牛仔”人数众多，而且在当时的经济生活中又是不可缺少的人物，因此在一八九○年以前的大约七十年中，在西部大平原地带，“牛仔”在政治和社会生活中占有重要地位。可是从十九世纪末开始，他们的牧场逐渐让位给大农场。直到一九三九年，在西部比较偏僻的地方，还有少数“牛仔”过着与十九世纪“牛仔”相同的马背生活，这实际上只是牧歌时代的微弱余音而已。"},{"type":"paragraph","text":"今天，“牛仔”只存在于竞技场、电影和通俗画报上了。（附图片）"},{"type":"paragraph","text":"美国“牛仔”在驾驭烈马"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db8d125d4f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
