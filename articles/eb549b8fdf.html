art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟伟大领袖毛主席乘胜前进","authors":["“学习毛主席著作的模范红九连”班长仇国贤卫生员刘天智"],"parts":[{"type":"paragraph","text":"山在欢呼，海在歌唱。最最幸福的时刻来到了！五月八日，伟大领袖毛主席和他的亲密战友林副主席接见了我们。毛主席他老人家满面红光，神采奕奕，身体非常非常健康，精力非常非常充沛。这是全国人民和全军指战员最大的幸福。我们抑制不住幸福的热泪，千遍万遍高呼：“毛主席万岁！万万岁！”“敬祝毛主席万寿无疆！万寿无疆！”"},{"type":"paragraph","text":"毛主席啊，毛主席！您的指示我们坚决执行，句句照办。您老人家教导我们：“人民解放军应该是一个大学校。”我们在红九连这个学校里，坚持活学活用您的光辉思想，沿着您老人家指引的方向奋勇前进，我们的每一进步，都是您光辉思想哺育的结果。去年，我们响应您老人家“人民解放军应该支持左派广大群众”的伟大号召，紧跟您的伟大战略部署，坚定地站在您的无产阶级革命路线一边，用您的光辉思想支持、武装左派广大群众。您老人家说：“办学习班，是个好办法，很多问题可以在学习班得到解决。”我们遵照您的教导，帮助革命群众大办学习班，坚决落实您老人家一系列最新指示，促进了革命大联合和革命三结合。最近，您老人家又深刻地指出：“无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。”您的这一最新指示，进一步为我们指明了斗争的大方向。我们深深懂得，“人民大众开心之日，就是反革命分子难受之时。”无产阶级文化大革命越是接近全面胜利，阶级敌人越是要作垂死挣扎。我们一定要百倍提高革命警惕，紧跟您的伟大战略部署，深入持久地开展革命大批判，把中国赫鲁晓夫等党内一小撮走资派批深批透，批倒批臭，彻底肃清他们的流毒，我们决心紧跟您老人家乘胜前进，夺取无产阶级文化大革命的全面胜利！"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb549b8fdf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
