art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黑手遮不住红太阳的光辉——声讨中国的赫鲁晓夫攻击毛主席的滔天罪行","authors":["广州部队某部批判小组"],"parts":[{"type":"paragraph","text":"党内最大的走资本主义道路当权派，是一个阴险的野心家、阴谋家。他疯狂地攻击我们的伟大领袖，反对我们心中最红最红的红太阳毛主席。他以向马克思、列宁学习作幌子，极力贬低毛主席。我们坚决揭露和声讨他的滔天罪行。"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派，在《修养》中口口声声号召人们要“作马克思列宁主义创始人的学生”、“学习马克思列宁主义创始人的品质”，却只字不提毛主席和毛泽东思想的伟大，不提做毛主席的学生。他别有用心地写道：“我们的这一部分，比马克思、恩格斯、列宁、斯大林的那一部分，当然是小得多。”毛主席是最伟大的马克思主义者，是当代的列宁。在现时代，要作马克思、恩格斯、列宁、斯大林的学生，首先要作毛主席的好学生。中国的赫鲁晓夫贬低毛主席，把毛主席放在和马克思列宁主义的创始人相对立的地位，用心是极其恶毒的。"},{"type":"paragraph","text":"毛主席在领导中国革命的过程中，总结了我国革命的丰富经验，写出了许多伟大的马克思列宁主义的经典著作，极大地丰富和发展了马克思列宁主义。但是，党内最大的走资本主义道路当权派，一贯利用人们对于马、恩、列、斯的崇敬心情，打着做“创始人的学生”的幌子，公然否认毛主席对马列主义的全面发展和伟大创造。说什么“马克思主义的内容……世界上任何大的原则性问题均解决了”，这种违反马克思主义的历史发展观点的谬论，如果马、恩、列、斯今天还在世的话，也会嗤之以鼻的。马克思主义者从来认为，必须随着无产阶级革命斗争的发展不断地丰富和发展革命的理论。马克思、恩格斯首先创立了科学的社会主义革命的理论；列宁、斯大林发展了马克思主义，解决了帝国主义时代无产阶级革命的一系列问题，解决了在一个国家内实现无产阶级专政的理论和实践问题。我们的伟大领袖毛主席，天才地、创造性地、全面地继承、捍卫和发展了马克思列宁主义，把马克思列宁主义提高到一个崭新的阶段。毛泽东思想是在帝国主义走向全面崩溃，社会主义走向全世界胜利的时代的马克思列宁主义。历史事实证明，十九世纪的天才是马克思、恩格斯，二十世纪的天才就是列宁和我们的伟大领袖毛主席。毛泽东思想是当代最高水平的马克思列宁主义。中国共产党人和我们伟大领袖毛主席，从来十分推崇马克思列宁主义创始人的伟大功勋，并且一直为继承、捍卫马克思列宁主义进行不疲倦的斗争。中国的赫鲁晓夫妄想以推崇“创始人”为名，行贬低毛主席、诋毁毛泽东思想之实，这是绝对办不到的，是绝对不能允许的。"},{"type":"paragraph","text":"列宁说：“历史上，取得统治地位的每一个阶级，都推举出了自己善于组织运动和领导运动的政治领袖和先进代表。”我们党，我国人民有毛主席这样一个伟大的领袖，是全体党员、全国人民的最大幸福。毛主席的领导，以毛主席为代表的无产阶级革命路线，是我国革命胜利的根本保证。反对毛主席，就是反对党，反对中国革命，反对社会主义。就是全国人民最大的敌人。就要全党共诛之，全国共讨之，就要坚决把他打倒。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d24eaa7a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
