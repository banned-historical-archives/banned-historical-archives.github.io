{"year":1952,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:"},{"type":"paragraph","text":"自从本刊对传播资产阶级腐朽思想的坏小说展开批判之后，每天收到不少青年读者的来稿，一致指出“飘”这一类书对他们的毒害。事实证明，这一类书对于年青人的思想的坏影响，是极其严重的。今天发表的四篇来稿，虽然不够深刻，已经足够说明这一点。我们决定在今后的几天内，继续发表这一类来稿。我们要求凡是受过这些坏小说影响的青年读者，特别是各校同学，都能够在思想上检查一下，把身受的毒害更具体的写出来寄给我们发表。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a9f951840"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
