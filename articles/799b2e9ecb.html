" crossorigin="">{"props":{"pageProps":{"books":[{"id":"34799034-2c67-4e1f-ae74-793ab6bd754b","name":"中共党史教学参考资料 第26册 “文化大革命”参考资料 中册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/34799034-2c67-4e1f-ae74-793ab6bd754b.pdf"],"article":{"title":"《人民日报》刊登《把无政府主义思潮从工人阶级内部清除出去！》的前言","alias":"","parts":[{"type":"paragraph","text":"《人民日报》刊登《把无政府主义思潮从工人阶级内部清除出去！》的前言"},{"type":"paragraph","text":"（一九六八年三月一日）毛主席教导我们说：“必须坚决地克服许多地方存在着的某些无纪律状态或无政府状态”。"},{"type":"paragraph","text":"无政府主义思潮真是害人不浅啊！工人看到痛在心头，敌人看到喜于眉尖。不打倒无政府主义，不加强无产阶级的革命纪律性，就不能更好地同敌人战斗，就不能全面落实毛主席的最新指示，就不能更好地紧跟毛主席的伟大战略部署。我们工人阶级一定以战无不胜的毛泽东思想为武器，挥起钢铁的拳头，把无政府主义打倒，搞臭，把它从我们工人阶级内部彻底铲除！"},{"type":"paragraph","text":"无政府主义坏透了。它在政治上否定一切，生产上随心所欲，组织上分裂队伍，思想上换散斗志。一些正路不走走歪路的人，闹无政府主义不觉丑，还美其名日“造反精神”、“自己教育自己”，等等。咱们老工人一听，把肺都要气炸了！"},{"type":"paragraph","text":"我们决不能忘记，在旧社会日本帝国主义统治下的鞍钢是怎样悲惨的情景，多少阶级兄弟为了一家老小糊口，被沉重的劳动压弯了腰；多少阶级兄弟被日寇的皮鞭子抽打得遍体鳞伤，变成终生残废，全家妻离子散；多少阶级兄弟被折磨迫害，惨死在工厂、矿山。那时，要吃鞍钢的饭，就得拿命换。"},{"type":"paragraph","text":"红太阳从东方升起，中国人民的大救星毛主席把我们工人从苦难的万丈深渊里解放出来，我们工人由当牛做马的地位变成了国家主人。这一切，我们工人怎能忘记！我们日夜战斗在祖国钢铁工业基地鞍钢，肩负着支援社会主义革命和社会主义建设，支援世界革命的重担，大家都感到十分光荣。但是，不甘心失败的阶级敌人却妄图利用无政府主必思潮，破坏无产阶级专政，阻碍革命，破坏生产。我们工人阶级万万不能松懈警惕啊！"},{"type":"paragraph","text":"现在，我们鞍钢通过大办毛泽东思想学习班，斗私批修，对无政府主义思潮展开了围，已经取得了很大胜利。一些受无政府主义思潮影响的阶级兄弟纷纷起来清除无政府主义思潮的影响。我们鞍钢工人阶级决心遵照毛主席“抓革命，促生产”的教导、以国家利益为重，发扬主人翁的高度责任感、勇敢地挑起革命、生产两副重担，把革命和生产推向新高潮。"},{"type":"paragraph","text":"伟大领袖毛主席“三·七”"},{"type":"paragraph","text":"指示光芒万丈 (节录)"},{"type":"paragraph","text":"（一九六八年三月七日）"}],"authors":[],"dates":[{"year":1968,"month":3,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":36,"page_end":36},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"799b2e9ecb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
