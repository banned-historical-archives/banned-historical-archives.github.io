,"佟树强"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"一个建议","type":"title"},{"text":"中央民族学院佟树强","type":"authors"},{"text":"（佟树强：中央民族学院历史系民族学研究班学生,“蜜蜂社”成员）","type":"subtitle"},{"text":"自“一群人”提出了“取消党委制”，实行民主治校的意见后，在全校同学中展开了热烈讨论，政治系某些同志在讨论中用谩骂词句来代替说服，用画毒蛇来讽刺，这样作法，完全越出处理人民内部矛盾的范围。","type":"paragraph"},{"text":"现在，对于这一问题既然存在着两种针锋相对的意见，为了分清是非，辨别真理，我建议党、团、学生会、工会、及有关方面的领导，开辟一个“专门园地”，通过大字报、壁报、辩论会……等等方式来进行讨论，以便去伪存真，达到团结，更好地管理学校的目的。","type":"paragraph"},{"text":"我们要的是“百家争鸣”，而不是“两家相骂”。","type":"paragraph"},{"text":" 群众来稿","type":"paragraph"},{"text":" 来源：《关于“野草”、“蜜蜂”社反动小集团的材料》，中共中央民族学院整风办公室编，1957年12月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98a4fbe78f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
