" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"中央关于增加点名批判的右派骨干分子人数等问题的通知","alias":"","parts":[{"type":"paragraph","text":"中央关于增加点名批判的右派骨干分子人数等问题的通知！"},{"type":"paragraph","text":"（1957年7月9日）各省委、市委、自治区党委，中央国家机关各党组："},{"type":"paragraph","text":"有两事通知如下：（一）反右派斗争正在深入，准确的右派骨干名单扩大了一倍，全国不是4000人，而是大约有8000人。例如北京约有800人，上海有700多人，包括大学生中的右派在内（清华大学教师及学生中的全部右派骨十分子50人）。这些都是在不同范围内点名批判的右派骨干分子。现在的问题是在报纸上点名批判的大约不过占右派骨干的百分之三左右。例如上海有右派骨干700多人，报上点名的只有20多人，不到百分之三。报上老是这几个人，读者也看厌了。因此应当分阶段逐步增加一些人，最后增到右派的"},{"type":"paragraph","text":"[1]本篇一是毛泽东为中共中央起草的关于增加报纸上点名批判右派骨干分子的人数等问题的通知；本篇二是毛泽东关于这个通知给中央的便信。"},{"type":"paragraph","text":"[2]在这个通知之前，中共中央在1957年6月29日关于争取、团结中间分子的指示中估计：“右派和极右派的人数，以北京34个高等学校及几十个机关中，需要在各种范围点名批判的，大约有400人左右，全国大约有4000人左右。”"},{"type":"paragraph","text":"中央关于增加点名批判的右派骨干分子人数等问题的通知百分之十左右为止。其他百分之九十的右派骨干，则在所在单位点名批判，不要登报。报上点名的百分之十，应包括学生中的著名右派分子在内。凡报上点名的必须证据充分，最好还有历史劣迹、素来不大得人心的人。（二）北京哲学社会科学家16人已就右派在学术方面的猖狂进攻，开始举行反攻了。北京此种反攻应当扩大，各地应当响应。自然科学家中在政治方面和学术方面的猖狂进攻，只要有准确的事实，也应组织反击。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九五七年七月九日"},{"type":"paragraph","text":"二中央："},{"type":"paragraph","text":"起草了一个通知，请向彭真、维汉\"一商，如认为可行，请即决定发出。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月九日"},{"type":"paragraph","text":"[1]彭真，当时任中共中央书记处书记。维汉，即李维汉，当时任中共中央统战部部长。"}],"authors":["毛泽东"],"dates":[{"year":1,"month":957,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":156,"page_end":157},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e5442cb9f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
