佐藤政府，再次显示工人阶级的伟大力量","authors":[],"dates":[{"year":1972,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本集团的残酷剥削和压迫"},{"type":"paragraph","text":"日本一百三十万工人举行大罢工"},{"type":"paragraph","text":"罢工斗争沉重打击佐藤政府，再次显示工人阶级的伟大力量"},{"type":"paragraph","text":"新华社一九七二年四月二十日讯　东京消息：在广大日本工人掀起的春季斗争的高潮中，四月二十日在日本工会总评议会、中立工会联合会组成的“春季斗争共同斗争委员会”的号召下，日本三十六个产业工会系统的二千五百个工会的一百三十万工人，又一次举行了大规模的罢工斗争，反对垄断资本集团的残酷剥削和压迫，要求提高工资。"},{"type":"paragraph","text":"早在今年三月就进入了罢工斗争的国营铁路动力车工会和国营铁路工会的工人，在二十日这一天进一步加强了斗争。他们的斗争使东京及其附近的电气机车以及长途火车的运行陷入极大的混乱或瘫痪状态。二十日清晨，国营铁路中央线的十二次电气机车停止了行驶。有三百三十一次客车晚点。有二百四十四次货车在这一天也停止了运行。从四月九日到现在为止，停止运行的货车达一万零一百九十五次。据日本报纸报道，目前日本国内的石油、米、水泥等主要物资的运输陷于瘫痪状态。"},{"type":"paragraph","text":"二十日，邮电工会系统的电报局工人，在五十七个地方举行了罢工。邮局工人这一天也在全国九个邮局举行两小时罢工。"},{"type":"paragraph","text":"合成化学产业工会联合会、全国纸浆产业工会联合会、橡胶工会、日本出版工会、全日本港湾工会等工会的工人，分别举行了两小时、四小时、六小时和四十八小时的罢工斗争。"},{"type":"paragraph","text":"出租汽车司机这一天从上午八点到十点举行罢工，东京和大坂分别有八千辆和六千辆出租汽车停止了行驶。"},{"type":"paragraph","text":"全国医务系统的七十九个工会和日本红十字会医院等八十六个医院、诊疗所也举行了罢工斗争。"},{"type":"paragraph","text":"这次罢工斗争沉重地打击了佐藤政府，它再一次显示了日本工人阶级的伟大力量。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a23a24ab5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
