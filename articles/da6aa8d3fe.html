ear":1975,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利前总理范范尼离京前往上海"},{"type":"paragraph","text":"新华社一九七五年十二月十六日讯 意大利前总理、终身参议员阿明托雷·范范尼和夫人玛丽亚比亚·范范尼以及随行秘书马里奥·克雷马，结束在北京的参观访问，今天上午乘飞机离开北京前往上海访问，然后回国。"},{"type":"paragraph","text":"中国人民外交学会负责人谢黎、意大利驻中国大使方济曦和夫人等到机场送行。"},{"type":"paragraph","text":"临上飞机前，阿明托雷·范范尼先生在机场举行记者招待会。他对记者说，他在访问期间同邓小平副总理和乔冠华外长就当前世界的主要问题交换了意见。基于他对世界局势的看法，他认为，为了取得进一步的成就和有效的防御能力，一个坚决团结的欧洲共同体是必要的。"},{"type":"paragraph","text":"范范尼先生说，这次访问使他了解到中华人民共和国在毛泽东主席领导下所取得的进步。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da6aa8d3fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
