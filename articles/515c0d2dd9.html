,"authors":["罗瑞卿"],"dates":[{"year":1978,"month":4,"day":27}],"is_range_date":false,"parts":[{"text":"罗瑞卿在北京卫戍区《关于抢救贺龙调查报告》上的批示","type":"title"},{"text":"罗瑞卿","type":"authors"},{"text":"〖傅崇碧送呈北京卫戍区后勤部《关于警卫×师×团×连抢救贺龙同志情况的调查报告》，罗瑞卿批示〗","type":"subtitle"},{"text":"韦主任并总政党委：","type":"appellation"},{"text":"此件请阅。并建议清查一些当事人。贺龙同志是一个方面军的领袖（毛主席生前原话，在文化大革命前我亲自听到过），竟被林彪、江青、吴法宪、黄永胜、叶群一伙活活害死。这些执行他们旨意的人，不仅全部逍遥法外，而有的还升了官，这是很不正常的，很不公道的。此件所述有牵连的人，必须一个一个要他们交待清楚，并按其情节轻重或有无罪行的酌处。这次去三○一的工作组到×××医院查证材料时，该院竟拒绝接见，这也证明他们有鬼。张震部长告我后，是我要傅崇碧同志查的。","type":"paragraph"},{"text":" 罗瑞卿","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"傅崇碧","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"515c0d2dd9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
