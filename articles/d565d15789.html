ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于容许新闻记者进入开城地区问题致李克农电","alias":"","parts":[{"type":"paragraph","text":"关于容许新闻记者进人开城地区问题"},{"type":"paragraph","text":"致李克农\"电"},{"type":"paragraph","text":"（1951年7月12日）克农，并告金、彭："},{"type":"paragraph","text":"在谈判恢复后讨论记者问题时，我方可同意在议程问题取得完全协议后，容许双方同等数目之记者到达开城地区，但不得进入会场。记者数目须估计我方能到者。我方记者主要在前方组织，北京方面亦可组织苏波捷等国的一些记者去。估计议程还会有许多天争辩，才能取得协议，那时我方可以组织一些记者去。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十二日廿四时[1]李克农，当时任中央人民政府外交部副部长。"},{"type":"paragraph","text":"[2]金，指朝鲜民主主义人民共和国首相金日成。彭，指中国人民志愿军司令员兼政治委员彭德怀。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":7,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":444,"page_end":444},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d565d15789"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
