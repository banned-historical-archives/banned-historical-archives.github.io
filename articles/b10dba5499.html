tle":"中共中央、国务院关于精减职工中发放退职补助费问题的通知","dates":[{"year":1962,"month":5,"day":9}],"is_range_date":false,"authors":["中共中央","国务院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 440-441","tags":[{"name":"精减职工","type":"主题/事件"},{"name":"退职","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央、国务院关于精减职工中发放退职补助费 问题的通知"},{"type":"paragraph","text":"（一九六二年五月九日）"},{"type":"paragraph","text":"中央和国务院根据最近各地和某些职工反映的意见，经过再次考虑，为了有利于精减职工工作的进行，决定对于被精减的一九五七年底以前参加工作的职工，仍然按照一九五八年三月间颁布的“国务院关于工人、职员退职处理的暂行规定（草案）”发给退职补助费。但是为了节约财政开支和减少市场购买力，采取分期付款的发放办法。凡退职补助费在本人十个月工资以内的，今年退职时一次发给，退职补助费超过本人十个月工资的，可以今年发给一部分，明年再发给一部分，具体办法，由各省、自治区、直辖市自定。对于分两次发给退职补助费的退职职工，由各单位在今年发放第一次退职补助费时，发给第二次退职补助费的证明，写明应发金额及发放的时间、地点，并留下存据备查。关闭和停办的单位，应由其上级主管机关负责发放第二次退职补助费，与其他单位合并的，由合并后的单位负责发放。"},{"type":"paragraph","text":"对于今春以来，已经被精减的一九五七年年底以前参加工作的职工，凡按照今年二月以后新的规定发给生产补助费的，也改按本通知的办法发放退职补助费，即由原单位或主管上级发放已领取的生产补助费与应得的退职补助费之间的差额。"},{"type":"paragraph","text":"对于被精减的一九五八年以来参加工作的新职工，仍按去年的规定，发给相当于本人半个月至二个半月工资的生产补助费。"},{"type":"paragraph","text":"（摘自《组织工作文件选编》）"},{"type":"paragraph","text":"Editor's note The Identifier field contains information from 国防大学图书馆《中央文件目录》"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b10dba5499"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
