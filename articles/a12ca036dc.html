ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对中央关于反对右倾思想的指示稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于反对右倾思想的"},{"type":"paragraph","text":"指示稿的批语"},{"type":"paragraph","text":"（1959年8月7日）退彭真同志照发。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月七日"},{"type":"paragraph","text":"[1]中共中央的这一指示稿指出，现在右倾思想已经成为工作中的主要危险，如果不彻底加以批判和克服，党的总路线的贯彻执行是不可能的，各项建设事业的继续跃进是不可能的，今年调整后的生产指标和基本建设计划的完成，也是不可能的。各级党组织，必须抓紧八、九两月，鼓足干劲，坚决反对右倾思想，厉行增产节约，提高质量，降低成本，全面安排和节约使用劳动力、物力和财力。反右倾，鼓干劲，现在是时候了。机不可失，时不再来。1959年8月7日，中共中央将这一指示下发给各省市自治区党委、中央各部委、国家机关和人民团体各党组、总政、团中央。"},{"type":"paragraph","text":"[2]彭真，当时任中共中央政治局委员、中央书记处书记。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":268,"page_end":268},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a12ca036dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
