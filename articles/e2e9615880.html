山东大学","沈汉祥"],"dates":[{"year":1957,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"致《新山大》编辑部的信","type":"title"},{"text":"山东大学沈汉祥","type":"authors"},{"text":"(沈汉祥：山东大学水产系教授)","type":"subtitle"},{"text":"《新山大》270期“民盟山大支部讨论党委制”一文，关于我的发言记录中，没有将要点表达出来。我原来的发言要点是：","type":"appellation"},{"text":"“校长负责制，不要党委领导下的校长负责制，以免校长不是党员时，校长反被党委书记所领导的‘校长有职无权’等现象。重要问题应由校委会讨论，决定后作为校长的参考。校委会仍为校长的咨询机构。校委会包括党委会的人员在内。党的意图，可建议给校委会，党可在校委会中起领导作用。倘校委会的决议，校长老是不采纳的话，校委会可向高教部反映，而党委也可向高教部反映意见。这样可以纠正校长的偏差。”","type":"paragraph"},{"text":" 沈汉祥 1957年6月24日","type":"paragraph"},{"text":" 来源：1957年7月5日《新山大》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2e9615880"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
