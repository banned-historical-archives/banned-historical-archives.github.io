art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作是我们的必修课","authors":["李振生"],"parts":[{"type":"paragraph","text":"党中央关于大量出版毛主席著作的英明决定，对我们工农兵是最大的关怀，最有力的鼓舞；对反党反社会主义反毛泽东思想的黑帮是当头一棒。"},{"type":"paragraph","text":"最近，毛主席发出了人民解放军应该是一个大学校的伟大号召。毛主席著作是这个大学校的必修课。党中央的决定正是为这个大学校准备大量的最好的教科书。我们热烈欢呼党中央这一英明决定，感谢党对我们的最大关怀。"},{"type":"paragraph","text":"毛主席著作是我们的“粮食”“武器”“方向盘”。反党反社会主义反毛泽东思想的黑帮妄想断绝我们的精神食粮，妄想不让我们掌握最强大的武器，妄想夺走我们的方向盘。这是白日做梦，永远办不到！"},{"type":"paragraph","text":"我们坚信，党中央这一决定会使毛泽东思想与广大工农兵群众更紧密地结合起来，使全国成为一个毛泽东思想的大学校。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c29ed9335c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
