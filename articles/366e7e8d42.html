ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"准备阻击可能由天津经济南向青岛逃跑之敌","alias":"","parts":[{"type":"paragraph","text":"准备阻击可能由天津经济南"},{"type":"paragraph","text":"向青岛逃跑之敌"},{"type":"paragraph","text":"（1948年12月13日）华东局，并告粟、谭，林、罗："},{"type":"paragraph","text":"东北主力入关，正在部署切断北平、天津、塘沽数点间的联系，准备攻击平、津、塘（唐山敌人正在撤退）。如果敌人别处无路可逃，而由天津经济南向青岛逃走时，你们即须担负阻击之责，以便配合我追击大军歼敌于济南一带黄河北岸。你们在济南一带尚有多少兵力可用，能否堵住黄河南岸，吴化文?部现在何处，何张部可否用于此处，望预先筹划电告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十三日四时[1]这是毛泽东为中共中央军委起草的给中共中央华东局的电报。"},{"type":"paragraph","text":"[2]粟、谭，指粟裕、谭震林，当时分别任华东野战军代司令员兼代政治委员和副政治委员。林、罗，指林彪、罗荣桓，当时分别任东北野战军司令员和政治委员。"},{"type":"paragraph","text":"[3]吴化文，原为国民党军整编第九十六军军长，1948年9月起义后任"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":390,"page_end":390},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"366e7e8d42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
