script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"怎样理解“还会保留没有资产阶级的资产阶级国家”？","authors":["晓里"],"dates":[{"year":1975,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"怎样理解“还会保留没有资产阶级的资产阶级国家”？"},{"type":"paragraph","text":"晓里"},{"type":"paragraph","text":"列宁在《国家与革命》中指出：“在共产主义下，在一定的时期内，不仅会保留资产阶级法权，甚至还会保留没有资产阶级的资产阶级国家！”怎样理解这段话呢？"},{"type":"paragraph","text":"列宁的这段话用马克思主义的辩证法，揭示了社会主义阶段国家的特征，既阐明了无产阶级国家和资产阶级国家有本质区别的一面，又指出了两者有相似的一面。"},{"type":"paragraph","text":"这里讲的“在共产主义下，在一定的时期内”，是指共产主义的低级阶段，即社会主义阶段。在社会主义阶段，国家还不会、也不可能消亡。社会主义阶段的国家就是无产阶级专政。那么，列宁为什么把无产阶级专政的国家，称之为“没有资产阶级的资产阶级国家”呢？"},{"type":"paragraph","text":"“没有资产阶级的”这句话，阐明了无产阶级国家和资产阶级国家有着本质的区别。无产阶级国家，是在无产阶级进行暴力革命，打碎资产阶级国家机器之后建立起来的新型的国家，是无产阶级及其领导下的人民群众镇压少数剥削者的工具。在无产阶级专政下，资产阶级已经被推翻，不再占统治地位。所以这时的国家是“没有资产阶级的”国家。这里，并不等于说在社会主义社会里，资产阶级已经不存在了。"},{"type":"paragraph","text":"为什么又说是“资产阶级国家”？因为无产阶级国家不仅要保卫生产资料公有制，保卫劳动的平等和消费品分配的平等，还要承认和保护在消费品分配方面在事实上存在的不平等的资产阶级法权（虽然要对它加以限制）。在这一点上，无产阶级国家和资产阶级的国家是一样的，还是“迫使人们遵守法权规范的机构”。正是从这个意义上，列宁说社会主义社会“还会保留没有资产阶级的资产阶级国家”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b8b1abc49"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
