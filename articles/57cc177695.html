ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"陕甘宁边区三个月的作战情况","alias":"","parts":[{"type":"paragraph","text":"陕甘宁边区三个月的作战情况！！"},{"type":"paragraph","text":"（1947年6月15日）"},{"type":"paragraph","text":"敌以三十一个正规旅加上保安团队为数二十万人以上，压迫我仅有一百五十万人口及四万余军队的边区，约为七个半人对付一个敌人。以敌人力量论，山东第一，边区第二，以人口与敌人相比较，则边区为第一。但三个月战争已使敌人士气沮丧，对前途无信心。我军则士气甚壮，信心甚高。中央机关于四月中旬移青阳岔、卧牛城附近安静地工作了差不多两个月，本月九日至十一日刘率四个旅至我驻地游行一次，除民众略有损失外无他损失，中央仍在卧牛城附近不远地方工作。我主力现在陇东作战？，并准备于下月初调陈纵队过河，与边区部队协力歼灭胡宗南，夺取大西北。"},{"type":"paragraph","text":"[1]这是毛泽东致高岗并告各地首长电的主要内容。"},{"type":"paragraph","text":"[2]陇东作战，后称陇东、三边战役，指西北野战部队主力5月29日自安塞西进，为收复环县、定边、安边、靖边的作战。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":6,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":88},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57cc177695"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
