known","files":[],"article":{"title":"中共中央关于修改‘关于在清理‘中层’‘内层’运动中对共产党员所有隐瞒政治问题或历史问题的处理办法（草案）’第十条的通知","dates":[{"year":1953,"month":12}],"is_range_date":false,"authors":["中共中央"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区委员会组织部，审干文件汇编（一），225","tags":[{"name":"历史问题","type":"主题/事件"},{"name":"内层","type":"主题/事件"},{"name":"审干","type":"主题/事件"},{"name":"中层","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央关于修改“关于在清理‘中层’‘内层’运动中对共产党员所有隐瞒政治问题或历史问题的处理办法（草案）”第十条的通知"},{"type":"subtitle","text":"(一九五三年十二月)"},{"type":"paragraph","text":"一九五一年八月二十五日中央所发“关于在清理‘中层’‘内层’运动中对共产党员所有隐瞒政治问题或历史问题的处理办法（草案）”，其中第十条的全文，即：“凡党员因隐瞒政治问题或历史问题所受之处分，各级党委均不得撤销。但此点在处分时可不宣布。”应改为：“凡共产党员因隐瞒政治问题或历史问题所受之处分，如果这种处分是正确的，不论其后来已否撤销，本人在每次填写党员干部登记表时，均应将所受处分的情节详细填明，以便组织上随时审查；否则应以对党隐瞒历史问题论处。此项规定各级党委均不得撤销，并应在宣布处分时向受处分的党员交代清楚。”特此通知。"},{"type":"paragraph","text":"(摘自《铁道部纪检工作政策选编》)"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"946fc45135"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
