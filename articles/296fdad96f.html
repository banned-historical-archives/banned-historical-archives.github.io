[{"year":1950,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"东北人民政府和东北局国庆日电毛主席致敬"},{"type":"paragraph","text":"【新华社二日讯】东北人民政府、中共中央东北局等均于国庆日驰电毛主席祝贺。东北人民政府在贺电中向毛主席报告了一年来东北经济建设和文化建设的成绩。贺电说：仅今年东北公营工业生产总值将等于去年的百分之一百九十三，今年上半年并已完成计划的百分之一百零五点七。农业生产丰收可以超过原定的计划，人民生活已有初步改善，学校和学生均有很大的发展。贺电指出：这些成绩的获得，是毛主席和中央人民政府英明领导的结果。东北人民政府和中共中央东北局的贺电都表示今后要继续遵照毛主席的指示，为保证中央人民政府政策法令的施行，彻底贯彻共同纲领和把东北建设为中国工业化的基地而奋斗。"},{"type":"paragraph","text":"此外，沈阳市人民政府、中国共产党沈阳市委会、青年团市委及各人民团体，哈尔滨中长铁路管理局、及热河省北票县各界人民都致电毛主席祝贺。中长铁路管理局职工在贺电中叙述了中长铁路在中苏职工的亲密团结下，已胜利地超过第三季度生产财务计划，保证今后要更好地加强中苏两国的团结合作，虚心接受苏联的先进经验，使中长铁路真正成为模范铁路。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"296fdad96f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
