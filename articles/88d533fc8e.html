ar":1976,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社乔治敦一九七六年九月二十八日电　帕拉马里博消息:苏里南共和国总理亨克·阿龙最近在苏里南首都就毛泽东主席逝世发表谈话。"},{"type":"paragraph","text":"他说，他和中国人民一样，对失去这位伟大的领导人感到悲痛。他指出，作为人民的领袖，毛泽东主席不仅建立了英雄业绩，而且他的全部著作都将万古长青。"},{"type":"paragraph","text":"他说，毛泽东思想已经深入人心，它所发挥的威力是不可征服的。人民群众把毛泽东思想变成了巨大的力量，他们越过万重峭壁和无数险滩，取得了胜利。他表示希望，苏里南人民也将取得这种力量，并且运用这种力量克服困难，建设自己的国家。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88d533fc8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
