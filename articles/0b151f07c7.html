script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市春节期间体育活动丰富多彩广大体育工作者响应华主席的战斗号召，大批修正主义，大批资本主义，大干社会主义，让体育更好地为工农兵服务","authors":[],"dates":[{"year":1977,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市广大体育工作者和运动员们，满腔热情地为广大工农兵安排了丰富多彩的体育表演活动，共同欢度粉碎“四人帮”后迎来的第一个春节。"},{"type":"paragraph","text":"上海几十个体育场、馆都打扫得干干净净，挂灯结彩，迎接欢度节日的工农兵群众。上海体育馆在节日里的活动，每天都排得满满的。卢湾体育馆的职工们以战斗姿态，每天坚持工作十二小时，很多清洁工作都是利用比赛的间歇时间进行的。不少郊县的体育场、馆的体育工作者，都表示要以实际行动响应华主席在第二次全国农业学大寨会议上发出的战斗号召，大批修正主义，大批资本主义，大干社会主义，让体育事业更好地为工农兵服务。"},{"type":"paragraph","text":"市、区、县体育场、馆的春节体育表演丰富多彩。十八日下午，上海体育馆安排了市队的武术、技巧、体操表演，运动员们通过冬训，锻炼了意志，技术水平也有了显著提高。武术运动员增加了套路，体操运动员难度动作更加熟练，他们在节日活动中大显身手。十八日晚上，南市体育馆安排了一场市队的羽毛球表演，这个队近来抓住揭批“四人帮”这个纲，促体育训练，进步很快，给人一新耳目。十九日下午，杨浦体育场将进行一场工人足球赛，由上钢一厂队对南市发电厂队；崇明县体委将举办农民篮球赛，参加的单位有马桥、堡镇、大新、新河、向化、合兴等六个公社；上海体育馆有一场海军队对上海队的男子手球表演，这将为上海春节体育活动增添特色。二十日晚上，上海体育馆将举行市田径队的跳高表演，上海一些优秀跳高运动员都将参加，他们决心在这次表演活动中，创造优异的成绩。"},{"type":"paragraph","text":"节日里，有很多基层单位利用街道、厂房、田野、店堂进行小型多样的体育活动。嘉定县徐行公社在十八日、十九日两天举行农民运动会，竞赛项目新颖，有运炮弹支前接力、拔河等。不少年过半百的老妈妈都登上运动场，练练筋骨。南市区唐家湾街道于十八日上午九时起，在街道上举行“三操一拳”、排球、跳绳等比赛，街道党委书记等领导同志带头参加。静安区向阳儿童用品商店于十八日上午，利用店堂召开批判会，揭批“四人帮”破坏社会主义体育事业的罪行，并举行太极拳、广播操、乒乓球比赛等体育活动。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b151f07c7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
