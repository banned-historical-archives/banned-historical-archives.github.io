art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"中共中央副主席邓小平十八日上午在会见香港《明报》社长查良镛时说，六中全会后，我们还有三件事：（一）在国际上继续反对霸权主义、维护世界和平；（二）实现台湾归回祖国，完成祖国统一大业；（三）搞好经济建设，这是最重要的事情。"},{"type":"paragraph","text":"邓小平指出，半个月前结束的党的十一届六中全会主要办了两件大事：（一）通过了《关于建国以来党的若干历史问题的决议》；（二）对人事作了新的安排，这保证了我国政策的连续性。"},{"type":"paragraph","text":"邓小平说，写《决议》的目的是总结经验、统一认识、团结一致向前看，对历史问题作出实事求是、恰如其分的总结，然后一心一意搞四个现代化建设。"},{"type":"paragraph","text":"新华社记者周世浩、霍柏林自葛洲坝来电：十八日下午二时，建国以来长江上游最大洪水的前锋已经到达葛洲坝水利枢纽工程工地，每秒钟流量达六万八千四百立米。葛洲坝工程正在经受一场全面的考验。"},{"type":"paragraph","text":"中央爱国卫生运动委员会十八日下午在北京举行第五次会议。会议强调当前要把爱国卫生运动作为建设社会主义精神文明的一项重要内容开展下去，要列入国民经济和社会发展规划，通过开展爱国卫生运动，改善城市卫生面貌，除害灭病，保护人民健康。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"714e7f9fd5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
