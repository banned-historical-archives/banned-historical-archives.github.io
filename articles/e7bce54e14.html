国务院贺电在庆祝会上宣读时，两万多军民热烈高呼：铁路工人永远忠于毛主席","authors":[],"dates":[{"year":1968,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以“只争朝夕”的革命精神落实毛主席最新指示"},{"type":"paragraph","text":"锦州铁路地区革命大联合委员会成立"},{"type":"paragraph","text":"国务院贺电在庆祝会上宣读时，两万多军民热烈高呼：铁路工人永远忠于毛主席"},{"type":"paragraph","text":"据新华社锦州十二日电　锦州铁路局两大革命群众组织紧跟毛主席的伟大战略部署，坚决执行毛主席的最新指示，以“只争朝夕”的革命精神，最近迅速实现革命大联合，成立了锦州铁路地区革命大联合委员会。"},{"type":"paragraph","text":"今天，锦州铁路局所属单位两大革命群众组织的革命职工和人民解放军当地驻军指战员两万多人，满怀革命激情在锦州车站广场隆重集会，热烈庆祝锦州铁路地区实现革命大联合。会场上，人群沸腾，锣鼓喧天，革命工人和解放军指战员高举伟大领袖毛主席画像，手执红彤彤的《毛主席语录》，一再振臂热烈高呼：“紧跟毛主席的伟大战略部署，夺取无产阶级文化大革命的全面胜利！”“战无不胜的毛泽东思想万岁！毛主席的无产阶级革命路线胜利万岁！”“敬祝毛主席万寿无疆！万寿无疆！”"},{"type":"paragraph","text":"锦州铁路是沟通首都和祖国东北的主要交通要道，在完成国家铁路运输任务中占有重要地位。这个铁路局两大革命群众组织实现革命大联合的喜讯传到所属各基层单位，广大革命职工欢欣鼓舞，在全局迅速掀起了革命大联合的高潮。"},{"type":"paragraph","text":"庆祝大会上宣读了国务院的贺电。在宣读贺电的过程中，全场群众无比振奋，万分激动，一遍又一遍地热烈高呼：“革命的铁路工人永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席的革命路线！”"},{"type":"paragraph","text":"中国人民解放军锦州驻军负责人颜文斌、符必玖等同志参加了庆祝大会。颜文斌同志在讲话中，代表锦州驻军全体指战员，对锦州铁路地区革命大联合委员会的成立表示热烈的祝贺和坚决的支持。"},{"type":"paragraph","text":"在庆祝大会上，宣读了锦州铁路局两大革命群众组织实现革命大联合的协议书和锦州铁路地区革命大联合委员会第一号公告。公告表示，锦州铁路地区革命大联合委员会的全体战士，在新的一年里决心更高地举起毛泽东思想伟大红旗，以毛主席的最新指示为纲，鼓足干劲，力争上游，再接再厉，从思想上、政治上、经济上、组织上夺取无产阶级文化大革命的全面胜利。公告号召全局革命职工要坚决贯彻执行元旦社论提出的五项战斗任务，切实加强革命的组织纪律性，坚守生产岗位，以国家主人翁的高度责任感，确保铁路运输畅通，努力完成和超额完成运输生产计划，夺取革命和生产的更大胜利。在雷鸣般的掌声中，大会通过了给最敬爱的伟大领袖毛主席的致敬电。会后举行了盛大的游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7bce54e14"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
