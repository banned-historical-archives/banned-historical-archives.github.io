year":1978,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见里那尔多·奥索拉部长"},{"type":"paragraph","text":"新华社北京十一月一日电　国务院副总理邓小平今天上午会见了意大利外贸部长里那尔多·奥索拉和夫人一行。邓副总理同意大利朋友进行了友好的交谈。"},{"type":"paragraph","text":"奥索拉部长转达了安德雷奥蒂总理对邓副总理的问候。他说，他这次访问中国是为了加强和推动意中两国的友好和贸易关系，使中意两国的贸易今后迅速发展。"},{"type":"paragraph","text":"邓副总理对意大利朋友的来访表示欢迎。他希望在平等互利的基础上发展中意两国的经济和贸易关系。邓副总理请奥索拉部长转达华国锋总理和他本人对安德雷奥蒂总理的问候。"},{"type":"paragraph","text":"意大利驻中国大使方济曦参加了会见。"},{"type":"paragraph","text":"会见时在座的有外贸部长李强和夫人魏环图，外贸部副局长安东，外交部副司长梁上苑等。（附图片）"},{"type":"paragraph","text":"邓小平副总理十一月一日会见意大利外贸部长里那尔多·奥索拉和夫人等一行。"},{"type":"paragraph","text":"新华社记者　李生南摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"254c9d664c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
