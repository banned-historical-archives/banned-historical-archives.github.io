art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席会见宴请新共总书记威耳科克斯同志并接见了坦噶尼喀妇女代表团全体成员","authors":["陈娟美"],"parts":[{"type":"paragraph","text":"新华社23日讯 中国共产党中央委员会主席毛泽东同志，于22日会见并宴请新西兰共产党总书记维·乔·威耳科克斯同志，并同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见和宴会的，有中共中央总书记邓小平，中共中央政治局候补委员、书记处书记康生，中央委员刘宁一等。"},{"type":"paragraph","text":"新华社23日讯 毛泽东主席接见了由坦噶尼喀议会议员、坦噶尼喀非洲民族联盟中央委员、坦噶尼喀全国妇女联盟主席碧碧·蒂蒂·穆罕默德夫人率领的坦噶尼喀妇女代表团全体成员。毛泽东主席同她们进行了友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有全国妇联书记处书记曹孟君等。"},{"type":"paragraph","text":"中共中央主席毛泽东同志会见了新西兰共产党总书记维·乔·威耳科克斯同志。左图为毛泽东同志和威耳科克斯同志亲切握手。"},{"type":"paragraph","text":"新华社记者 陈娟美摄"},{"type":"paragraph","text":"毛主席接见坦噶尼喀妇女代表团。右图为毛泽东主席和碧碧·蒂蒂·穆罕默德夫人交谈。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d16ce98c2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
