<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"敬祝毛主席万寿无疆","authors":[],"dates":[{"year":1968,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“乌拉，毛泽东!”"},{"type":"paragraph","text":"一天深夜，在苏联某港口，一个失业的苏联老工人，避开盯梢的“尾巴”，走近停泊在那里的一艘中国货船，轻轻地向中国海员说:“请你送给我一本俄文版的《毛主席语录》，她是我们日夜盼望的明灯。”中国海员满足了他的要求。老工人双手捧着红色宝书，感到无比幸福和激动。他压低嗓门欢呼:“乌拉，毛泽东!”“乌拉，北京!”随后，他从怀里掏出珍藏了多年的一张列宁像和一张斯大林像，作为最珍贵的礼物赠送给中国海员。"},{"type":"paragraph","text":"这位失业老工人对中国同志热情赞扬毛主席是当代无产阶级最伟大的领袖。他语重心长地说:“我们是列宁，斯大林的好儿女，苏联人民热爱毛泽东。”他接着对苏修叛徒集团的罪恶统治表示愤慨。他满怀信心地表示，“我们要翻身、要战斗，要让克里姆林宫上空的红星重放光芒。”临走时，他紧紧地握住中国同志的手，衷心祝愿毛主席万寿无疆!"},{"type":"paragraph","text":"胜利的信念自由的号角"},{"type":"paragraph","text":"一次，一位初来我国参观的黎巴嫩朋友，走进我海关，每见到毛主席画像或毛主席照片，就停下脚步，挥手跳跃，连声欢呼“万岁，毛泽东”，“万岁，毛泽东”。周围的外国朋友都深为他热爱毛主席的精神所感动，也随声喊了起来。"},{"type":"paragraph","text":"后来，这位黎巴嫩朋友对我海关同志说:“万岁，毛泽东”是胜利的信念，是争取自由的号角。在我们黎巴嫩，反动派害怕真理，不准我们喊“万岁，毛泽东”，喊了就要坐牢、杀头。这次来到中国，才有了自由的空气，才有了欢呼“万岁，毛泽东”的自由，我要永远喊下去。"},{"type":"paragraph","text":"我很想得到小红书"},{"type":"paragraph","text":"在毛里塔尼亚工作的中国同志最近收到两封来信。一封是一位中学生写的；一封是一位叫穆罕默德的朋友写的。中学生的信写道:“我殷切地盼望您能给我寄一本《毛主席语录》。如果可能的话，再给我的朋友寄五本来，他们也和我一样，热爱毛主席著作。”那位叫穆罕默德的朋友写道:“我很想得到毛主席的小红书。我认为只要遵循毛主席的教导，我们就必定能胜利，东风一定压倒西风。我们非洲人反对苏联修正主义.中国是我们的唯一希望。”信中最后写道:“如果您能给我寄一张毛主席像来，我要把毛主席像贴在我的房间里。毛主席是永远不落的太阳，我敬祝毛主席万寿无疆!万寿无疆!万寿无疆!”(据新华社讯)"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1968\\09\\689r060201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e右图阿尔巴尼亚儿童高举毛主席像，唱着歌颂伟大领袖毛主席的歌曲。"},{"type":"paragraph","text":"新华社记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c48581f78"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
