<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于抓革命促生产的十条规定（草案）","authors":[],"dates":[{"year":1966,"month":12,"day":9}],"is_range_date":false,"parts":[{"text":"中共中央关于抓革命、促生产的十条规定（草案）","type":"title"},{"text":"（这一文件发至县、团级和工厂企业、事业、科研、设计单位，供讨论和试行用）","type":"paragraph"},{"text":"一、坚决执行毛主席、党中央关于抓革命、促生产的指示。开展无产阶级文化大革命，就是为的促进人的思想革命化，带动生产的发展。","type":"paragraph"},{"text":"二、贯彻执行以毛主席为代表的无产阶级革命路线，批判资产阶级反动路线。坚决按照十六条办事，由群众选出能够代表自己的文化革命小组、文化革命委员会或文化革命代表会议，让群众在无产阶级文化大革命中自己教育自己，自己解放自己。","type":"paragraph"},{"text":"三、八小时工作以外的时间，除了每周一次讨论生产问题以外，都由群众自己商量安排，进行文化大革命。","type":"paragraph"},{"text":"四、坚持八小时工作制，遵守劳动纪律，完成生产定额。","type":"paragraph"},{"text":"五、保证产品的质量，力求高质量。","type":"paragraph"},{"text":"六、由工人群众认真讨论，健全或者改选领导生产的班子，这个班子，对国家生产计划的完成和超额完成，担负责任。","type":"paragraph"},{"text":"七、有问题，要在本单位协商解决。必要的时候，工人群众可派少数代表到上级机关（包括省、市、自治区党委和大区中央局）反映，特别必要的时候，也可以派少数代表来京反映，不要大批离开厂矿。","type":"paragraph"},{"text":"八、在文化大革命中，不许厂矿领导因为群众提出批评，揭露事实，而实行打击报复，不准因此克扣工资，不许开除。在文化大革命中，被打成“反革命”的革命工人，必须平反。不许调动原来的生产位子，不许对工人家属进行威胁迫害。被打击而被迫离开工厂的革命工人，必须允许他们回厂参加生产，参加文化革命。革命工人被迫离厂时的工资应该照发。","type":"paragraph"},{"text":"九、按照中华人民共和国的宪法的规定，工人群众在文化革命中有建立革命组织的权利。","type":"paragraph"},{"text":"本单位或本地方工人群众之间，工人组织之间，彼此有意见，要用摆事实讲道理的方法，进行讨论，不要被坏人利用，不要造成对抗的形势。坚持文斗，不要武斗。不要动手打人。","type":"paragraph"},{"text":"一切工人组织，都应当保持工人阶级勤劳朴素的本色，不要搞一套脱离群众的官僚主义机构和物质装备。工人组织中的工作人员，一般都不要脱离生产。","type":"paragraph"},{"text":"十、各单位工人群众之间、工人群众组织之间，可以在业余时间，在本市革命串联，交流文化革命经验。","type":"paragraph"},{"text":"学生可以有计划地到厂矿，在工人业余时间进行革命串联，交流革命经验，还可以有计划地和工人一起上班，一起劳动，一起学习，一起讨论文化革命问题。工人也可以派代表到本市学校进行革命串联。","type":"paragraph"},{"text":"一切革命串联，都不要包办代替，强行干涉其他单位的文化革命。","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[一]》，武汉：1968年4月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d042d5f584"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
