art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总部机关毛泽东军事思想讲座圆满结束","authors":[],"parts":[{"type":"paragraph","text":"这次讲座始于6月13日，此前已进行过《毛泽东军事思想的科学体系与地位、作用》、《毛泽东军事思想的立场、观点和方法》、《毛泽东的战争指导艺术》、《邓小平同志关于新时期军队建设的论述》、《毛泽东军事思想在新的历史时期的运用和发展》等课。总部机关2/3以上部长和驻京部队的部分领导同志，通过听课加深了对毛泽东军事思想这一科学体系及其立场、观点、方法的理解，增强了继承和发展毛泽东军事思想的自觉性，进一步领会到邓小平同志关于新时期军队建设的论述，是对毛泽东军事思想的继承和发展。"},{"type":"paragraph","text":"总参谋长迟浩田在讲座结束时讲话，要求大家把毛泽东军事思想的学习作为一项长期的任务，坚持不懈地抓下去。参加今天听课的总部领导还有徐惠滋、韩怀智、何其宗、于永波、周克玉、许胜、李际均等。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d1d99257f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
