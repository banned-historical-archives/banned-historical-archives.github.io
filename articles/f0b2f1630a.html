art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛泽东军事思想简讯","authors":["孙长风赵军姜建明"],"parts":[{"type":"paragraph","text":"本报讯 三三六三二部队司令部把学习《毛泽东军事文选》内部本作为本部门的一项基本建设去抓，规定每周用一个晚上，每月用一天半的时间进行学习，要求上半年通读完上编，并精读《中国共产党红军第四军第九次代表大会决议案》等十篇文章。学习中要结合部队建设和作战训练问题，写点学习心得，召开一些学术交流会，并运用学习成果给分队干部上课。（孙长风）"},{"type":"paragraph","text":"本报讯 北京部队某团积极为排以上干部学习毛泽东军事思想创造条件，取得较好的学习效果。他们采取了三条措施：一是把学习列入干部训练计划，保证学习时间落实。二是搜集编写了四十多份学习毛泽东军事著作的辅导材料、参考资料。团成立了中心辅导小组，采用上大课、举办专题讲座、函授作业等方法指导学习。三是经常检查学习成果，团先后举办了多次理论讨论会、学术交流会、典型报告会，及时交流了全团干部写出的学习心得和学术文章。（赵军、姜建明）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0b2f1630a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
