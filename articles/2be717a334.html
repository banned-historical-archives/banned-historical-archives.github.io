s":[],"dates":[{"year":1970,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对腐朽的资产阶级教育制度"},{"type":"paragraph","text":"日本各地进步中学生展开不屈不挠的斗争"},{"type":"paragraph","text":"新华社十日讯　据东方通讯社报道：日本各地进步的中学学生一直不屈不挠地进行斗争，反对腐朽的资产阶级教育制度。到今年二月底止，日本各地有一百多所中学的进步学生在坚持斗争。"},{"type":"paragraph","text":"东京葛西工程技术中学的进步学生，从去年十月以来一直坚持斗争，抗议学校反动当局压制学生参加政治运动和无理解雇五名进步教师的反动行径。在进步学生的正义斗争面前，学校当局被迫取消了定于三月八日举行的向学生灌输军国主义思想的毕业典礼。东京练马区一所商业中学的进步学生，在学校当局准备举行毕业典礼的体育馆门口筑起路障，并且号召到校的学生积极参加反对毕业典礼的斗争。他们还要求学校当局取消为镇压中学生参加政治运动而制定的反动的规章制度。东京江北中学的学生九日上午也筑起路障，占领了一些校舍，抗议学校反动当局迫害四名进步学生。此外，练马区一所工程技术中学的进步学生还在校园内举行示威游行，号召全校师生抵制学校当局举行的毕业典礼。"},{"type":"paragraph","text":"在大坂，枚方中学的大约三百名进步学生在最近举行的毕业典礼上高唱《国际歌》，表示他们坚决反对腐朽的资产阶级教育制度。在大坂的另一所中学里，十几名进步学生列队前往举行毕业典礼的会场，坐在会场前面，齐声高呼：“反对毕业典礼”。"},{"type":"paragraph","text":"名古屋、宫崎、佐世保、长野等地的中学生也相继举行反对军国主义教育和腐朽的资产阶级教育制度的斗争，使学校当局举办的向学生灌输军国主义思想的毕业典礼无法进行。"},{"type":"paragraph","text":"日本各地进步的中学生反对军国主义教育和腐朽的资产阶级教育制度的斗争，同大学生的正义斗争相配合，给美日反动派以沉重的打击。他们决心把斗争的矛头对准美日反动派，将斗争进行到最后胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2be717a334"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
