al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"新民学会紧要启事","alias":"","parts":[{"type":"paragraph","text":"新民学会紧要启事"},{"type":"paragraph","text":"（1921年1月2日）"},{"type":"paragraph","text":"本会同人结合。以互助互勉为，自七年夏初成立，至今将及三年，虽形式未周，而精神一贯。惟会友个人对于会之精神，间或未能了解。有牵于他种事势不能分其注意力于本会者；有在他种团体感情甚洽因而对于本会无感情者；有自身毫无向上之要求者；有缺乏团体生活之兴趣者；有行为不为会友之多数满意者；本会对于有上述情形之人，认为虽曾列名为会友，实无互助互勉之可能。为保持会的精神起见，惟有不再认其为会员。并希望以后介绍新会员入会，务求无上列情形者。本会前途幸甚。"},{"type":"paragraph","text":"新民学会启一九二一年一月二日"}],"authors":["毛泽东"],"dates":[{"year":1921,"month":1,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":373,"page_end":373},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8a65563aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
