<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1977,"month":3,"day":6}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"雷锋的光辉形象重新矗立在社会主义文艺舞台遭“四人帮”扼杀的话剧《雷锋》在沈阳重新上演","authors":[],"parts":[{"type":"paragraph","text":"新华社沈阳一九七七年三月五日电 在纪念毛主席光辉题词“向雷锋同志学习”发表十四周年前夕，遭“四人帮”扼杀的话剧《雷锋》在沈阳重新上演，受到工农兵群众的热烈欢迎。"},{"type":"paragraph","text":"话剧《雷锋》，是人民解放军沈阳部队政治部话剧团响应敬爱的周总理的倡导，于一九六三年初创作的。这个话剧热情歌颂了雷锋憎爱分明的阶级立场，言行一致的革命精神，公而忘私的共产主义风格，奋不顾身的无产阶级斗志。一九六三年七月三日，周总理观看并肯定了这个话剧。同年八月一日，伟大领袖毛主席观看了话剧《雷锋》。演出结束后，毛主席满面笑容，走上舞台，向编导和演员们鼓掌、招手，亲切地接见了参加演出的全体同志，和大家一起照了像。"},{"type":"paragraph","text":"话剧《雷锋》上演后，全国二百六十多个专业、业余文艺团体到沈阳观摩学习。广大观众看了话剧《雷锋》，纷纷表示要坚决响应毛主席的伟大号召，象雷锋那样学习、生活和战斗，把有限的生命投入到无限的为人民服务中去。"},{"type":"paragraph","text":"王张江姚反党集团对话剧《雷锋》百般压制，疯狂扼杀。大野心家江青胡说什么“话剧《雷锋》是真人真事”，妄图一刀砍掉。一九七○年，沈阳部队政治部话剧团在部队党委关怀下，经过修改，准备再次把《雷锋》搬上舞台。刚刚排了两场，“四人帮”在辽宁的那个死党秉承江青的黑旨意，又以“写了真人真事”的罪名，强令停止排演，硬是把话剧《雷锋》打入冷宫。"},{"type":"paragraph","text":"在深入揭批“四人帮”的斗争中，沈阳部队政治部话剧团的同志们召开座谈会、批判会，回忆当年毛主席接见全体演员的幸福情景，重温毛主席、周总理、朱委员长为雷锋题的词，愤怒控诉“四人帮”妄图篡党夺权，破坏学雷锋运动和扼杀话剧《雷锋》的罪行。大家激动地说，英明领袖华主席继承毛主席的遗志，一举粉碎了“四人帮”，挽救了革命，换救了党，也挽救了革命文艺，把话剧《雷锋》解放了出来。话剧团全体同志怀着对华主席的深厚无产阶级感情，带着对“四人帮”的无比仇恨，夜以继日地赶排话剧《雷锋》，让毛主席亲自树立的雷锋这个光辉典型，重新矗立在社会主义文艺舞台上。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fb92158ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
