ors":[],"dates":[{"year":1961,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京三十日电】　毛泽东主席今天下午会见了尼泊尔国王马亨德拉·比尔·比克拉姆·沙阿·德瓦陛下和王后陛下，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时在座的，有国王和王后的随行人员香蒂·拉吉雅·拉克西米·沙阿公主殿下，外交大臣图尔西·吉里博士和夫人，凯萨尔·沙姆谢尔·拉纳元帅和其他随行人员，以及尼泊尔驻中国大使凯谢尔·巴哈杜尔。"},{"type":"paragraph","text":"会见时，刘少奇主席和夫人，朱德委员长，周恩来总理和夫人，贺龙副总理，陈毅副总理和夫人，外交部副部长耿飚和夫人，中国驻尼泊尔大使张世杰和夫人等也在座。"},{"type":"paragraph","text":"【新华社北京三十日电】　刘少奇主席和夫人、周恩来总理和夫人，今天下午前往宾馆，回访尼泊尔国王马亨德拉·比尔·比克拉姆·沙阿·德瓦陛下和王后陛下，并在友好的气氛中进行了会谈。"},{"type":"paragraph","text":"随同回访的，有国务院副总理陈毅和夫人，外交部副部长耿飚和夫人，我国驻尼泊尔大使张世杰和夫人等。"},{"type":"paragraph","text":"回访时在座的，有国王和王后的随行人员香蒂·拉吉雅·拉克西米·沙阿公主殿下，外交大臣图尔西·吉里博士和夫人，凯萨尔·沙姆谢尔·拉纳元帅和随行的其他尼泊尔贵宾，以及尼泊尔驻中国大使凯谢尔·巴哈杜尔。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bba9242958"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
