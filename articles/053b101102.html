script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"戚本禹接见中学代表时的讲话","authors":["戚本禹"],"dates":[{"year":1967,"month":4,"day":14}],"is_range_date":false,"parts":[{"text":"戚本禹接见中学代表时的讲话","type":"title"},{"text":"戚本禹","type":"authors"},{"text":"“究竟如何对待成份？这是每个人非常关心的。毛主席在第四卷1279页就讲了两句话：‘既反对忽视成份，又反对唯成份论’。这两句话是精髓，一定要好好掌握。反动对联是搞唯成份论。陈伯达同志说，这是封建的血统论；不是独创的，是封建地主阶级统治人民的舆论，早就有的。德国法西斯说日尔曼氏族的血统是高贵的，是兰色的，而犹太人就是低贱的，黄种人是不好的。中国古代帝王将相是高贵的，他们长期以来就传播这种影响。这种影响也带到劳动人民中间去，他们自以为命不好，出身不好，比如说农民起义吧，明明是自己干革命，但是就不敢树起大旗来，非要请个姓刘的来当皇帝，三国时有刘备，打着什么皇亲国戚哪个弟弟的弟弟的招牌来欺骗人……有人当官以后，老爷思想很严重，影响了自己的子弟。那些子弟呢，谁不承认他们是好汉，他们就打、砸、抢，走向反面。这是历史的悲剧。这是长期受资产阶级思想和封建血统论渗透的结果，是他们处于优越的地位，处于优越的政治地位和经济地位的结果。老红卫兵要吸取教训。这个悲剧也可以变为喜剧，可以重新革命嘛。但是现在有许多人仍然不觉悟，还有到公安部闹事的。我到过清华附中，可是走了以后他们就马上反我，说我没有小汽车，说什么戚本禹十七级干部，我们家还称两个呢，（其实他也不知道我是几级干部）这种观点实在是可悲的。他们连袖章都分等级。八一学校连擦玻璃都要调部队去擦，他们五谷不分，四体不勤，连鸡毛簟子都不认得是什么做的，还得把一个鸡搬过来。最近有些人看见扣子没有系好的普通老百姓就打一顿，说他们是流氓，其实他们不懂什么是老百姓，这是很可悲的。他们跟着他们的老子看些古戏，帝王将相，中了毒，再看些大毒草，受些影响。有些干部子弟，现在是做了二十世纪的唐吉柯德，自以为很得意，还想翻案，二十年后掌权，象这个样子劳动人民能让他们掌权吗？他们这样的结果最后只会躲到垃圾堆里哭。”","type":"paragraph"},{"text":"阎长贵同志参观展览后，与八一学校革命造反派座谈时说：","type":"paragraph"},{"text":"“我看了‘联动’展览会，很受教育。他们 ［指联动分子］ 还是学生吗？这么野，实在不象话，简直是土匪。有人认为这都是小孩子闹事，其实是反对毛主席，反对党中央，反对无产阶级专政。”","type":"paragraph"},{"text":"“修正主义的反不造不行！吃面包，喝牛奶，坐小汽车，哪会有无产阶级的感情呢，只会有谭力夫那样的感情。大观园里只能培养贾宝玉，培养赫鲁晓夫，不能培养无产阶级革命接班人。”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"053b101102"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
