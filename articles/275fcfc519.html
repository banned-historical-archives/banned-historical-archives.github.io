,"authors":["胡耀邦"],"dates":[{"year":1961,"month":9,"day":13}],"is_range_date":false,"parts":[{"text":"胡耀邦在山东金乡县委汇报会上的讲话摘要","type":"title"},{"text":"胡耀邦","type":"authors"},{"text":"为什么工作差的单位，自留地搞的好，集体生产搞的不好呢？还是个政策问题，集体没有依靠，他们就搞单干。所以说要以政策调动农民的积极性。政策的核心问题是什么呢？就是按劳分配，多劳多得。那里多劳多得、多劳多吃搞得好，那里集体生产积极性就高。","type":"paragraph"},{"text":"对干部的甄别工作要抓紧。过去批判斗争了一些人，处分了一些人，要加以甄别，分清是非，团结同志。一个风险，一个困难，一个挫折，一个委屈，革命同志一生都可能遇到，遇到了怎么办？要经得起考验。每个同志都要准备两条：挨错斗，斗错了。我在延安“抗大”时，两千多人斗我，说我有四大主义，什么官僚主义，主观主义，右倾机会主义，最后一个说不上了，说我姓胡，是糊涂主义。少奇同志找我谈话，问我没有四大主义？我说工作上有缺点错误，但没有四大主义。少奇同志说：“要实事求是嘛。”甄别工作要搞得快一些。办公室是作技术工作的，不要靠办公室，你们书记要亲自领导。为党的路线、政策负责，处理错了就纠正过来，要同他们谈谈话。","type":"paragraph"},{"text":"夏收夏种、秋收秋种是收获性的劳动和耕种性的劳动。人们都愿意参加收获性的劳动，往往对耕种性的劳动不够积极。除了加强思想教育外，是否可把耕种性劳动的工分提高一点。","type":"paragraph"},{"text":"不搞按劳分配、多劳多得，机关生产要垮台。如果搞好奖励政策，明年机关的生产搞得还要好。有的机关生产的粮食被调走了，人家搞了生产，你又平调，以后谁还搞。","type":"paragraph"}],"comments":[],"origin":"山东省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"275fcfc519"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
