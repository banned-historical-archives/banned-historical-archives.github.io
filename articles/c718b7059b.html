文教各小组的通知","authors":[],"dates":[{"year":1958,"month":6,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央关于成立财经、政法、外事、科学、文教各小组的通知","type":"title"},{"text":"各省、市、自治区党委，国家机关各党组，党中央各部委，人民团体各党组，军委各部门：","type":"appellation"},{"text":"党中央决定成立财经、政法、外事、科学、文教各小组。这些小组是党中央的，直隶中央政治局和书记处，向他们直接作报告。大政方针在政治局，具体部署在书记处。只有一个“政治设计院”，没有两个“政治设计院”。大政方针和具体部署，都是一元化，党政不分。具体执行和细节决策属政府机构及其党组。对大政方针和具体部署，政府机构及其党组有建议之权，但决定权在党中央。政府机构及其党组和党中央一同有检查之权。现将各组名单通知如下：","type":"paragraph"},{"text":"财经小组12人：","type":"paragraph"},{"text":"组长  陈云","type":"paragraph"},{"text":"副组长  李富春  薄一波  谭震林","type":"paragraph"},{"text":"组员  李先念  黄克诚  邓子恢  聂荣臻  李雪峰  贾拓夫  王鹤寿  赵尔陆","type":"paragraph"},{"text":"政法小组5人：","type":"paragraph"},{"text":"组长  彭真","type":"paragraph"},{"text":"组员  董必武  乌兰夫  罗瑞卿  张鼎丞","type":"paragraph"},{"text":"外事小组6人：","type":"paragraph"},{"text":"组长  陈毅","type":"paragraph"},{"text":"组员  张闻天  王稼祥  廖承志  刘宁一  叶季壮","type":"paragraph"},{"text":"科学小组6人：","type":"subtitle"},{"text":"组长  聂荣臻","type":"paragraph"},{"text":"组员  宋任穷  王鹤寿  韩光  张劲夫  于光远","type":"paragraph"},{"text":"文教小组10人：","type":"paragraph"},{"text":"组长  陆定一","type":"paragraph"},{"text":"副组长  康生","type":"paragraph"},{"text":"组员  陈伯达  林枫  胡乔木  张际春  周扬  杨秀峰  钱俊瑞  张子意","type":"paragraph"},{"text":" 中央1958年6月10日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c718b7059b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
