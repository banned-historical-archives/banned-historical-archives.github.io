ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对《核子劫后生机未灭》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对《核子劫后生机未灭》一文的批语\""},{"type":"paragraph","text":"（1964年12月25日）已阅。退罗瑞卿同志3"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十五日"},{"type":"paragraph","text":"[1]这是毛泽东对中共中央军委秘书长、中国人民解放军总参谋长、国务院副总理罗瑞卿1964年12月24日呈送信的批语。"},{"type":"paragraph","text":"[2]指罗瑞卿呈送的香港《新闻天地》刊载的一篇题为《核子劫后生机未灭》的署名通讯。通讯说：就科学家理论上而言，核子爆炸后的地区，因大量辐射尘的浸染，将寸草不生，动物灭绝。最近美国科学家一行，回到六年来被封锁的西太平洋比基尼岛和恩利威吐克环礁“核子靶场”时，却见杂花生树、好鸟飞鸣、鼠跳鱼跃、海藻漂浮，而莫不惊叹大自然在劫后复苏的伟大活力了。才知道所谓“核子爆炸后放射性永久存在，将使一切动植物的生机绝灭”的说法，未免过甚其辞。"},{"type":"paragraph","text":"[3]罗瑞卿1964年12月27日致信中共中央书记处书记、中共北京市委书记、北京市市长彭真：主席口头指示，此件可作为参考资料发给中央工作会议同志和人大代表。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":12,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":343,"page_end":343},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3dd8f8c1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
