","authors":[],"dates":[{"year":1958}],"is_range_date":false,"parts":[{"text":"民盟陕西省、西安市委员会关于给严树康盟纪处理报告表","type":"title"},{"text":"","type":"paragraph"},{"text":"   姓名 严树康 性别 男 年龄 42 籍贯 陕西华阴 入盟年月 1952.4   原有职务 盟内 -- 错误性质 右派分子   盟外 华阴县岳镇小学校长   主要反动言行或反革命罪行： 一、对农业合作化和粮食统购统销政策非常不满。说：“我把金筷子银碗给了这些穷光蛋（意指农民们分了他家的东西）太不放心”；又说：“我拿的金筷子银碗要饭吃”。留恋剥削生活，说：“旧社会我家粮食吃不完都搁霉了，现在没啥吃”；我父亲真可怜，在旧社会里没受过罪，也没吃过杂粮，现在却吃包谷，活受罪呢？ 二、歪曲和诬蔑整风方针。说大鸣大放是叫人诉冤屈呢？人家（指党）就越好巩固了，还说整风是整人呢？人家（指党）就好统治了；“这次整风谁不很好的交代思想问题，就要戴个右字帽子”。 三、污蔑共产党员“都没啥本领，和他们较什么量呢？” 四、同情、支持右派。当报上刊登文章开始向右派分子进行反击时，严说：“这报我就看不成。”当盟省委杨鹤斋被定为右派分子时，严说：“杨没啥，不过是说了几句错话，而且赞扬说：“杨真能干”等等。   斗争中的态度 表示向人民低头，承认自己罪过。   行政处分 撤销小学校长职务降两级使用 组织处分 留盟察看   备注 ----                  ","type":"paragraph"},{"text":" 民盟陕西省、西安市整风领导小组","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d78b2afb3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
