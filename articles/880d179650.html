{"year":1976,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市针织工业系统广大职工深入批邓，促进生产，以实际行动反击右倾翻案风。上半年他们克服各种困难，提前三天完成了国家生产计划，质量比较稳定，品种也有不少创新，实现了增产增收。"},{"type":"paragraph","text":"近年来，针织工业努力发展化纤针织外衣生产，设备改建任务很重，同时，整个行业老厂改造的项目也很多。许多主要生产车间正在向生产电子群控化过渡，生产任务也逐年增加。去年，为适应化纤生产的发展，上级决定将上袜一厂逐步改建成为针织外衣坯布染色、印花、树脂整理厂。该厂广大干部和群众批判邓小平的洋奴哲学、爬行主义，坚持独立自主、自力更生；批判邓小平的唯生产力论，坚持抓革命、促生产，基建、生产一肩挑。全厂不但基建任务按时完成，而且生产任务也月月超额完成。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"880d179650"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
