rs":[],"dates":[{"year":1947,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"晋冀鲁豫各界庆祝“八一”"},{"type":"paragraph","text":"电毛主席朱总司令致敬"},{"type":"paragraph","text":"并电慰刘邓二首长"},{"type":"paragraph","text":"【本报讯】电毛主席、朱总司令致敬并电慰刘、邓二首长，致电，原文如下：毛主席、朱总司令："},{"type":"paragraph","text":"你们是人民解放军的创造者，和最高统帅。二十年来艰苦卓绝，英勇奋斗愈战愈强，现在已成为不可战胜的力量。我区部队在你们的英明领导下，一年以来，取得了自卫战争的辉煌胜利。今天是人民解放军二十诞辰，谨向你们致敬。刘司令员、邓政委："},{"type":"paragraph","text":"今天是人民解放军二十周年纪念日，谨向你们致以崇高的敬意，一年以来，你们领导的常胜军歼敌三十余万，转变了我区战局进入反攻，保卫了我区三千六百万人民的翻身利益，今后我们一定要厉行生产节约积极支援前线，前后方团结起来，实现党中央的号召，发展爱国自卫战争，歼灭蒋介石的一切进犯军，胜利是人民的。"},{"type":"paragraph","text":"晋冀鲁豫各界庆祝人民解放军二十周年纪念大会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9081710b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
