script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席　刘委员长　周总理  电贺保加利亚国庆十四周年  陈毅外长致电卢卡诺夫外长","authors":[],"dates":[{"year":1958,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席　刘委员长　周总理"},{"type":"paragraph","text":"电贺保加利亚国庆十四周年"},{"type":"paragraph","text":"陈毅外长致电卢卡诺夫外长"},{"type":"paragraph","text":"新华社8日讯　毛泽东主席、刘少奇委员长和周恩来总理今天打电报给保加利亚共产党和国家领导人，祝贺保加利亚人民共和国国庆。电文如下：保加利亚共产党中央委员会第一书记托·日夫科夫同志，保加利亚人民共和国国民议会主席团主席格·达米扬诺夫同志，保加利亚人民共和国部长会议主席安·于哥夫同志："},{"type":"paragraph","text":"当保加利亚人民共和国国庆十四周年的时候，我们代表中华人民共和国政府和中国人民向保加利亚人民共和国政府和保加利亚人民致以最热烈的祝贺。"},{"type":"paragraph","text":"保加利亚人民在光荣的保加利亚共产党和保加利亚人民共和国政府的领导下，在短短的历史时期内，把自己的祖国从一个农业国变成了一个具有发达的工业和大规模合作化和机械化的农业的社会主义国家。保加利亚人民一贯忠实于无产阶级的国际主义，在加强社会主义阵营的团结、捍卫马克思列宁主义的原则和批判现代修正主义的伟大斗争中作出了重要的贡献。保加利亚人民共和国为和缓国际紧张局势和保卫巴尔干和世界和平进行坚持不渝的斗争。中国人民对兄弟的保加利亚人民获得的这些光辉的成就感到由衷的高兴。"},{"type":"paragraph","text":"中保两国人民的兄弟友谊和全面的互助合作，一年来有了新的发展。毫无疑问，这必将大大有助于我们两国的社会主义建设和壮大以苏联为首的社会主义阵营的力量。"},{"type":"paragraph","text":"祝保加利亚人民在实现保加利亚共产党第七次代表大会的决议、完成社会主义建设的事业中，获得新的、更大的成就。中国共产党中央委员会主席中华人民共和国主席毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1958年9月8日于北京"},{"type":"paragraph","text":"新华社8日讯　外交部长陈毅今天打电报给保加利亚人民共和国外交部长卡·卢卡诺夫，祝贺保加利亚人民共和国国庆。电文如下：保加利亚人民共和国外交部长卡·卢卡诺夫同志："},{"type":"paragraph","text":"当保加利亚人民共和国国庆十四周年的时候，请你接受我衷心的祝贺。祝你在执行保加利亚政府的和平外交政策、加强以苏联为首的社会主义阵营各国之间的团结、维护欧洲和世界和平的斗争中获得进一步的成就。"},{"type":"paragraph","text":"祝中保两国人民的兄弟友谊日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国外交部长　陈毅"},{"type":"paragraph","text":"1958年9月8日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"978c90edb0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
