rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决保卫毛主席的无产阶级革命路线","authors":["海军某部中队长李恩民"],"parts":[{"type":"paragraph","text":"《红旗》杂志、《人民日报》和《解放军报》纪念我军建军四十周年的社论好得很！这三篇社论，揭露和批判了中国的赫鲁晓夫及其在军内的代理人彭德怀、罗瑞卿篡军、篡党、篡国的罪恶阴谋。这是毛泽东思想的又一伟大胜利。这是在全国范围内掀起的对党内、军内最大的一小撮走资本主义道路当权派大批判的新的进军号。我们坚决响应毛主席、党中央的战斗号召，奋起毛泽东思想的千钧棒，发扬痛打“落水狗”的彻底革命精神，誓把党内、军内最大的一小撮走资本主义道路当权派批倒批臭。"},{"type":"paragraph","text":"大阴谋家、大野心家彭德怀、罗瑞卿，一贯把军事技术放在第一位，否定四个第一，反对无产阶级政治，突出资产阶级政治，这是彻头彻尾的修正主义的一套，实际上企图把我军变成资产阶级的军队。"},{"type":"paragraph","text":"我们伟大的领袖毛主席说：“武器是战争的重要的因素，但不是决定的因素，决定的因素是人不是物。”林副主席说：“最好的武器不是飞机，不是大炮，不是坦克，不是原子弹，最好的武器是毛泽东思想。最大的战斗力是用毛泽东思想武装起来的人，是勇敢，不怕死。”通过实践，我们深刻认识到，这些科学论断是千真万确的真理。技术装备的威力是可以用数字来计算的，然而用毛泽东思想武装起来的人所发挥的作用这是不可估量的。"},{"type":"paragraph","text":"一九五八年，我们中队的“海上猛虎艇”同兄弟艇一起，击沉美制蒋舰“沱江号”，就雄辩地说明人是战争胜负的决定的因素。当时，我们是艇新、人员新，没有实战经验，然而，我们依靠战无不胜的毛泽东思想，发扬了勇敢战斗、一往无前的革命精神，和敌人在海上拚刺刀，便一举击沉“沱江号”，首创了小艇打大舰的光辉范例。我们在崇武以东的海战中，也是依靠战无不胜的毛泽东思想，和兄弟艇一起，以压倒一切敌人的英雄气概，冲到敌人鼻子底下猛打狠打，击沉了比我艇大数倍的美制蒋舰“永昌号”。战斗的实践告诉我们，用毛泽东思想武装起来的人，最勇敢最聪明，任何困难都可以克服，任何敌人都不在话下。"},{"type":"paragraph","text":"彭德怀、罗瑞卿之流，大叫决定军队战斗力的基本标准是军事技术，公然和毛主席的无产阶级建军路线大唱反调。他们妄图把无产阶级革命军队变成他们实现资本主义复辟的工具，使军队改变颜色，使国家改变颜色。我们一千个不答应，一万个不答应！为了保卫毛主席的无产阶级革命路线，保卫伟大的毛泽东思想，保卫毛主席，保卫社会主义江山千秋万代永不变色，我们必须从政治上、思想上、理论上彻底批判党内最大的走资本主义道路的当权派和他在军内的代理人彭德怀、罗瑞卿，把这些“落水狗”淹没在革命大批判的“人民战争”的汪洋大海之中，叫他们永世不得翻身！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a80e9a33d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
