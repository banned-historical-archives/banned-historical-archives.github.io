dates":[{"year":1954,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"晓光中学学生　况圆珠"},{"type":"paragraph","text":"我以万分愉快、热烈的心情，来迎接即将召开的青年团上海市第二次代表大会。通过参加去年五月召开的团上海市第一次代表大会，给我以很大的鼓舞与教育，使我明确地认识了青年团员要自觉地劳动，密切联系群众，站到祖国建设的前列。通过总路线学习，使我更深刻地体会到为社会主义、共产主义事业而奋斗是我一生最大的幸福，也就是我生活的全部意义。伟大的事业是由全国人民在不同岗位上的各种‘平凡’‘细小’的劳动来实现的，我们青年学生的学习就是一种艰苦的劳动。因此，我在学习上能按照学校课程进度完成作业，努力学好每一门功课，遵守课堂纪律，能真正热爱知识，把每一个细小的学习过程作为获得与更牢固地掌握知识的过程，把学习变成为我的自觉要求，能乐观地对待困难与刻苦地钻研问题；同时我更注意经常的体育锻炼，保证充分的睡眠与休息，尽量克服工作上的忙乱现象，因此我的身体也更为健康，体重从九十一斤增加到一○四斤。"},{"type":"paragraph","text":"但是，我感到自己在这一年来各方面的进步还是不够的，在团上海市第二次代表大会即将召开的时候，我决心要在党、团的领导与教育下，进一步努力学习党在过渡时期的总路线总任务，深刻牢固地掌握知识，积极经常地锻炼身体，做好社会工作，逐步培养自己成为积极参加社会主义建设与保卫祖国的全面发展的新人；并团结广大同志、同学，共同前进，使自己的青春与生命在伟大的社会主义建设事业中发挥出更大的光和热来。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6aaadcc864"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
