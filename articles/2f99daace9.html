在许多模糊认识","authors":[],"dates":[{"year":1953,"month":12,"day":11}],"is_range_date":false,"parts":[{"text":"渭南县第一中学师生对粮食统购问题存在许多模糊认识","type":"title"},{"text":"【西北总分社11日讯】陕西省渭南县第一中学师生对粮食问题存在许多模糊认识。","type":"paragraph"},{"text":"渭南县第一中学自11月初实行以麦子代伙食费的办法后，学生入灶人数由10月份的492人减为216人；学生从家里背馍到学校吃的占全校757人的70%左右。距校较远的学生余谦文（长安人）等两人，曾于11月1日上渭南县城买馍30多个，准备吃一个星期；他们还到县人民政府和专署等机关去要求解决伙食问题。","type":"paragraph"},{"text":"该校五四乙班教师在讲政治课时，提到解放后四年来人民生活的提高，有的学生便质问老师：“生活提高了，为什么还没啥吃！”五四丙班教师在讲到要种植经济作物时，学生便说：种经济作物又不能吃，有钱又买不到麦子。部分学生说怪话，如“还说我们是主人翁，主人翁饿的又黄又瘦，怎能建设祖国！”","type":"paragraph"},{"text":"该校教师中，有的怀疑是别处遭了水、旱灾，政府才实行统购统销政策；还有的埋怨政府不该这样做，把粮食市场弄得很紧张。由于教师自己不了解粮食统购统销政策，因而无法回答学生在这方面提出的问题。有的教师在学生提出问题时，只能简单的说：“不管怎么样，反正政府总是给人民办事的。”还有的教师竟把国家实行粮食计划收购，解释为“国际粮要紧”，因此学生就说，把粮食向国外运，只夸张国家建设的好，而叫国内人吃苦。","type":"paragraph"},{"text":"该校行政上、学生会、青年团总支虽然都开会研究过这一问题，也采取了一些措施，但由于他们对党的政策了解很差，也就无法对学生进行教育。因此，该校师生中的混乱思想，就不能及时得到解决。（谭斐编自青年团西北工委的“情况简报”）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1953年12月18日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f99daace9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
