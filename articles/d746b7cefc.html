"year":1949,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美帝通过侵略议案"},{"type":"paragraph","text":"加重剥削欧洲人民"},{"type":"paragraph","text":"【本报讯】拟新华社报道：美新闻处华盛顿讯：美国参众两院联席会议，十三日通过了继续执行马歇尔侵略计划（援助欧洲复兴计划）拨款的折衷案，规定以五十四亿三千万美元为今后十五个月（今年四月三日至明年六月三十日）的实施经费。此外，并附加一项规定，即根据此项计划运往欧洲之物资，其半数仍由美轮装运，借以加重对“受援”国之剥削。且为鼓励美国私人资本输出，特核准一亿五千万美元基金作为美国私人资本向受“援”国投资的保证。该折衷案十四日已由参众两院批准，并已送交白宫。按迄今年四月三日为止的一年中，马歇尔“援”欧计划拨款为五十亿五千五百万美元。美国垄断资本家利用这一笔由美国人民身上剥削来的钱，不但赚取了巨额利润，而且加紧控制了受“援”国家的政治和经济生活。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d746b7cefc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
