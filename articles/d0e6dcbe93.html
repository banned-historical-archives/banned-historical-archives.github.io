起农民极大不满","authors":[],"dates":[{"year":1952,"month":4,"day":12}],"is_range_date":false,"parts":[{"text":"东北购粮工作中发生强迫命令现象　引起农民极大不满","type":"title"},{"text":"【东北总分社十二日讯】东北吉林、黑龙江、辽东等地购粮工作发生严重的强迫命令和平均摊派的现象，引起农民极大不满。中共吉林省委指示：动员卖粮户不得超过总户数的百分之二十五，但很多地方竟扩大到百分之四十至八十。辽东省西安县各区购粮任务尚未完成，但农家现在平均每户仅存粮食(包括大豆)三斗至五斗。农民对购粮不满，他们说：“第一次购余粮、第二次购口粮、第三次购节约粮，叫我们怎样过活，还谈什么生产?”","type":"paragraph"},{"text":"东北全区购粮任务，原定三月底完成，现已延期到四月中旬。据了解，购粮工作延期和发生偏向的原因有三：(一)搞“三反”，动手迟了，急于补上，出了偏向；(二)占全区购粮比重最大的黑龙江因灾荒，不能完成预定计划。(三)爱国教育差，农民待价惜售。也有些是吃到“高利贷”甜头的囤粮户，按粮不动，想待机放“高利贷”。","type":"paragraph"}],"comments":[],"origin":"1952年4月17日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0e6dcbe93"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
