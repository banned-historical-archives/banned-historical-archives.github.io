art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阳光雨露育春苗","authors":[],"parts":[{"type":"paragraph","text":"毛主席光辉的“六·二六”指示，照亮了我国卫生革命的道路。无产阶级文化大革命，使卫生战线发生了深刻变化。现在，成百万赤脚医生迎着风雨挺拔成长。合作医疗象烂熳山花，开遍祖国山乡。城市卫生工作者，冲破阻力，坚持面向基层，面向农村，上山下乡，巡回医疗，深受工农兵欢迎。开门办医院，开门办科研蔚然成风。卫生革命的巨大成就，是毛主席革命路线的伟大胜利，对于提高人民健康水平，推动社会主义革命和建设，对于限制资产阶级法权、缩小三大差别、巩固无产阶级专政，有重大的意义。"},{"type":"paragraph","text":"阳光雨露育春苗，春苗茁壮迎朝阳。让我们在大好形势的基础上，以阶级斗争为纲，狠批邓小平反革命的修正主义路线，狠批他破坏卫生革命，为“城市老爷卫生部”翻案的罪行，狠批他攻击合作医疗、赤脚医生的各种谬论，进一步贯彻“六·二六”指示，夺取卫生革命的更大胜利。"}],"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"231a597471"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
