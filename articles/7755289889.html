tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《中国出了个毛泽东丛书》将出版","authors":["邓湘田石玉山"],"parts":[{"type":"paragraph","text":"本报讯 邓湘田、石玉山报道：为客观真实地展现毛泽东一生的光辉业绩，在中央领导同志和革命老前辈的支持鼓励下，由毛岸青、邵华主持撰写的《中国出了个毛泽东丛书》，在1993年毛泽东诞辰100周年纪念日前将陆续同读者见面。"},{"type":"paragraph","text":"《中国出了个毛泽东丛书》计划第一批出30本左右，总字数约450万字。为写好这套丛书，近两年来，毛岸青、邵华带领丛书办公室的同志跑遍大江南北的十余个省市，到毛泽东当年亲手创建的革命老根据地和他成长、学习、战斗、工作过的地区进行实地调查，向革命老前辈和人民群众学习请教，收集到了大量可贵的第一手资料，为编写工作提供了有利条件。"},{"type":"paragraph","text":"丛书的作者大多是同毛泽东有过直接接触或了解、熟悉的同志，或是对毛泽东的革命生涯，以及对党史、军史作过深入研究的学者。作品通过方方面面的生动事例，展现了毛泽东一生的光辉业绩和崇高品格。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7755289889"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
