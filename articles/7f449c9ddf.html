rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"痛斥罗瑞卿的资产阶级“生意经”","authors":["北京部队机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"人民解放军是毛主席亲手缔造和领导的，林副主席直接指挥的人民军队。几十年来，我军从小到大，从弱到强，战胜了国内外强大敌人，成为举世无双的人民军队，靠的是伟大的战无不胜的毛泽东思想贯注于军队之中，靠的是坚强的革命的政治工作去执行这种贯注。而反革命修正主义分子罗瑞卿却极力对抗毛泽东思想对军队的贯注，妄图用他那一套资产阶级军事路线和资产阶级世界观来演变我军。一九六四年，他竟胆大包天，背着林副主席、中央军委，煽起了大比武的黑风。他到处发“指示”，看比武，看表演，大肆推销他那套资产阶级的黑货，明目张胆地腐蚀部队，收买军心。一次，罗瑞卿看北京部队一个“尖子”班的比武表演后，胡说什么：“你们有发展，有创造，青出于蓝而胜于蓝。我看将来你们班，不仅可以出几个将军，还可能出个把元帅。”这是他资产阶级丑恶灵魂的大暴露，是他几十年来大搞资产阶级“生意经”的自白。"},{"type":"paragraph","text":"毛主席教导我们：“我们的共产党和共产党所领导的八路军、新四军，是革命的队伍。我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”又说：“我们一切工作干部，不论职位高低，都是人民的勤务员，我们所做的一切，都是为人民服务。”我们的部队，就是按照毛主席的教导来进行革命化建设的。我们练兵，完全是为了革命，为了人民。担负什么职务也是革命的需要。反革命修正主义分子罗瑞卿，企图用“当将军、当元帅”作为诱饵，把我军拉上资产阶级军事路线的邪路，真是白日做梦！"},{"type":"paragraph","text":"反革命修正主义分子罗瑞卿玩弄的这一套，并不是什么“新创造”，全是从他主子那里批发来的黑货。罗瑞卿的主子——中国赫鲁晓夫在他的大毒草《修养》里，在他向上山下乡的知识青年的讲话中，早就露骨地贩卖了资产阶级的“生意经”，说什么：“你们和农民建立起了密切的关系，大家都说你好”，“人们就会选你当社长、当乡长、当县长”。中国赫鲁晓夫大肆贩卖的“吃小亏占大便宜”的反动哲学，和罗瑞卿贩卖的努力当“尖子”兵，将来可以“当将军，当元帅”的资产阶级“生意经”，同出一辙，完全说明他们是一丘之貉！"},{"type":"paragraph","text":"在我军的建军史上，一切搞阴谋的人都没有好下场。罗瑞卿这个罪恶昭著的反革命修正主义分子，在毛泽东思想的照妖镜下，显出了他魔鬼的原形，被革命的铁扫帚扫进了历史的垃圾堆。这是战无不胜的毛泽东思想的伟大胜利！是毛主席无产阶级革命路线的伟大胜利！我们一千遍一万遍地高呼：毛主席万岁！万岁！万万岁！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f449c9ddf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
