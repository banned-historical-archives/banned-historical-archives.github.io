ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"西北主力应在内线完成三项任务","alias":"","parts":[{"type":"paragraph","text":"西北主力应在内线完成三项任务！"},{"type":"paragraph","text":"（1947年9月23日）彭，并贺、习："},{"type":"paragraph","text":"二十三日二十时电悉。（一）决定你军主力（六个旅）在内线一个月至一个半月，完成歼敌休整补充三项任务，然后打出去。望按此部署一切，主要是筹粮一万五千大担。（二）王震两个旅相机攻占劳山、甘泉等地，阻敌数大后，即可先出渭北。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十三日二十四时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给西北野战军司令员兼政治委员彭德怀并告陕甘宁晋绥联防军司令员贺龙和政治委员习仲勋的电报。"},{"type":"paragraph","text":"[2]指1947年9月23日20时彭德怀给中共中央军委的电报。电报说：我们准备26日攻延川、延长，同时准备打援，得手后再攻清润、瓦市，准备半个月至20天完成战斗任务，一个月后打出去。"},{"type":"paragraph","text":"[3]王震，当时任西北野战军第二纵队司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":310,"page_end":310},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"843b45be76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
