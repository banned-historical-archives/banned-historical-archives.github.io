thors":[],"dates":[{"year":1958,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"李慎之：我的忏悔——读国际部大字报的感想","type":"title"},{"text":"前两天读了领导同志的大字报，今天又花了两个钟头细细读了国际部的大字报，读完以后，心情十分沉重。","type":"paragraph"},{"text":"去年受批判时，对于我的反动思想已经产生了极其深远的影响一点，总是不愿正视。我承认自己在社会主义革命的关头，在激烈的阶级斗争中，犯了站在敌人立场上向党进攻的重大错误，但是总觉得自己的错误客观上影响未必那样大，以为我讲话只限于国际部，而国际部在去年的大鸣大放中比较是风浪最小的。新华社的右派分子在新华社具体问题上搞起的风潮大多与我无关。在斗争我的时候，平常与我接近的同志都对我的错误言论进行了严肃的揭发与尖锐的批判，他们既然都认识到了我的错误，为什么能说我有什么了不起的影响。甚至还认为一些同志的思想本来与我相同，大家共鸣是事实，影响是相互的，我给人的影响可能多一些，但也不至于那样深远。","type":"paragraph"},{"text":"读了几百张几万字的大字报以后，我这样的想法有了变化，我看到自己的许多错误言论曾经一度深印在一些好同志心里，促进了他们有过的某些错误思想。如果不是党及时发动了伟大的反右派斗争，而放任这些思想发展下去，将会有更多的人蹈我的覆辙，而我现在痛感只消有一个人因为我的影响而堕落到我同样的地位，就足以使我抱痛无涯，永远愧对。我深深感到自己重负于党，也深深感到重负于那些一度对我还有好感，还有信任，因而受到过我的影响的同志。","type":"paragraph"},{"text":"最使我惊心动魄的是穆广仁同志的大字报，其中说起，我曾说过“整风是从思想上到制度上的深远的革命。”这一下就把他“在朦胧中的推移过程明确起来了”，如他所说，这是一种可怕的否定和推移，这使我清晰地看到了，在决定祖国历史的关头，我所曾扮演过的可耻的角色的丑恶的面貌。","type":"paragraph"},{"text":"同志交心的坦率、热情与勇敢，使我感动，也使我进一步认识了自己的错误，我决心在这次悔改运动中，学习同志们的精神，无顾虑地向党交心，彻底改造自己。","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84517c604d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
