script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共《赤旗报》载文痛斥所谓美国拥护和平共处的漫天大谎揭露肯尼迪“和平战略”大阴谋指出修正主义者散布所谓核武器使战性质“变化”的谬论并且抹杀人民斗争的重大作用，这是同肯尼迪阴谋进行着相互的配合","authors":[],"dates":[{"year":1963,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京30日电】　东京消息:日共《赤旗报》在29日发表文章，揭露肯尼迪的“和平战略”的大阴谋。"},{"type":"paragraph","text":"这篇由日本评论家川端治写的文章说:只要帝国主义不死亡，它仍然是帝国主义。核战略也好，和平的甜言蜜语也好，都只不过是帝国主义的干涉、压迫、侵略和剥削等帝国主义统治的各种手法而已。勿宁说，“和平”的橄榄枝是掩盖导弹和核弹头的树叶，是为了实现“核战略”目的的一种方法。"},{"type":"paragraph","text":"文章痛斥肯尼迪所说美国非常拥护和平共处和尊重他国主权的漫天大谎。文章说，对我们日本人民来说，只要对照一下事实，就很容易看穿肯尼迪的“和平战略”的意图。把(美国)在日本配备核潜艇和F-105D型飞机说成是“纯粹为了和平”，这怎么能说得通呢?文章指出，说肯尼迪的“和平战略”是一个大阴谋，这从人民的立场来看是理所当然的。"},{"type":"paragraph","text":"文章列举下面的事实说明了美帝国主义的统治今天已经发生了深刻的动摇:从美国国内的黑人问题，到非洲各国的联合反帝行动；从南朝鲜朴正熙政权和南越吴庭艳政权的摇摇欲坠，到西欧各国工人和人民各项斗争的高涨；从英国、西德和意大利政府的困难重重到这些国家同美国之间的矛盾日益尖锐。文章指出，在这种情况下，肯尼迪说已经不能采取“同归于尽的战略”，而要采取“和平战略”。"},{"type":"paragraph","text":"文章说:有些人不从美帝国主义统治所产生的整个矛盾、特别是不从各国人民要求民族解放和和平的整个斗争中去寻找肯尼迪变化的原因，而专从军事技术的发展和因此而引起的“战争的性质的变化”去寻找肯尼迪变化的原因。"},{"type":"paragraph","text":"文章写道，修正主义者说，热核武器的发展全出现这样一种情况、即增加了美国“不得不对人类命运负责的责任感”，“美国也不得不强烈地意识到世界和平”。这种修正主义的说法受到尼迪的鼓励。而肯尼迪在演说中说，我"},{"type":"paragraph","text":"文章指出，修正主义者不愿意看到，遏止看核战争的是一条由社会主义的力量、民族解放斗争和各国人民为独立、和平而进行的不屈不挠的斗争所拧成的粗壮的反帝大绳。文章还揭露肯尼迪的“和平战略”也是美国遏制中国的阴谋。"},{"type":"paragraph","text":"文章号召要彻底揭露肯尼迪的“和平战略”的欺骗性，更加提高警惕，同现实的战争、压迫以及美国核潜艇停驻日本、“贸易自由化”等所带来的各种问题作斗争。文章说，我们必须依靠全国群众的斗争力量，统一禁止原子弹氢弹大会的步调，粉碎肯尼迪的“和平”大阴谋。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60fcd4e116"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
