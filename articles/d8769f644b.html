的通知","authors":[],"dates":[{"year":1950,"month":3,"day":3}],"is_range_date":false,"parts":[{"text":"中国共产党中央关于统一国家财经工作的通知","type":"title"},{"text":"各级党委同志们：","type":"appellation"},{"text":"中央人民政府政务院已于三月三日发出了《关于统一国家财政经济工作的决定》，中共中央认为政务院这个决定是完全正确的和适时的，各级党委必须用一切方法去保障这个决定的全部实施。","type":"paragraph"},{"text":"中共中央认为过去各解放区被分割的状态，已经完全改变，全国在地域、交通及物资交流与币制等等方面已经统一。在这种情况下，如果国家财政收入的主要项目不作统一的管理和有计划的使用，则非但不利于国家的财政和经济工作，且将严重的影响人民的经济生活与妨害国家的恢复和建设。各地同志对于财政经济工作，在过去长时期内，是习惯于被分割状态下的各自分散处理的，这在当时是完全必要和正确的，并且获得了巨大成绩。但是，现在必须切实地加以转变，如果不加转变，则要犯严重的错误，望各级党委，对于这种转变的必要性，向每个党员充分地加以解释，使他们都能有正确的认识。同时，从旧的分散的管理方法变为统—的管理时，各地在财政和物资上的征收、调度与支领等等方面，要发生若干困难，是难免的。因此中共中央要求各级党委在军政、财经各部门工作的党员和非党人员中进行解释，准备承受一时的部分的困难，保证政务院决定的迅速全部实现，以便共同努力来克服国家财政上的困难，避免金融物价的大波动，以利人民经济的迅速恢复和发展。","type":"paragraph"},{"text":"中共中央认为完成今年的税收预定计划，是克服财政困难和实现一九五〇年概算的重要环节，因此责成各级党委务必立即从全国每一市、县党委中各抽一个现任部长职务的干部，担任各该市、县的税务工作，克服干部思想上存在着的轻视税务工作的错误观点以保证今年税收计划的全部完成，宁使其他各部缺少一个部长，而不要让税收机关成为一个弱的工作机关。","type":"paragraph"},{"text":"中共中央认为共产党员必须是遵守国家法令的模范。如有共产党员在财政经济工作中有虚报人数、贪污腐化、破坏制度等等违法行为，则除开受到国家法律的严重处罚外，同时还将受到党的纪律的严重制裁。","type":"paragraph"},{"text":" 中国共产党中央委员会","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8769f644b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
