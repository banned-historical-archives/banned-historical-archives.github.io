{"year":1992,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马文革获世界杯乒乓球赛冠军"},{"type":"paragraph","text":"据新华社胡志明市12月13日电　（记者侯鹤祥）中国选手马文革今天下午在第十三届世界杯乒乓球赛的决赛中以3∶2战胜韩国选手金泽洙，夺得本届世界杯乒乓球赛冠军，金泽洙获得亚军。"},{"type":"paragraph","text":"马文革胜金泽洙的5局比分是28∶26、21∶17、12∶21、15∶21和21∶17。"},{"type":"paragraph","text":"中国教练蔡振华赛后对记者说，马文革在与金泽洙的决赛中发挥较好，技战术变化多。马文革在先胜两局的情况下，被金泽洙扳回两局，主要原因之一是金泽洙在接发球时打出快速的下旋球，破坏了马文革的第一板抢攻。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"921c03b447"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
