script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对残酷剥削　要求增加工资  意大利数十万工人大罢工","authors":[],"dates":[{"year":1969,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对残酷剥削　要求增加工资"},{"type":"paragraph","text":"意大利数十万工人大罢工"},{"type":"paragraph","text":"新华社二十八日讯　罗马消息：意大利各行业工人连日来在意大利全国各地举行罢工，反对垄断资本的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"二十三日到二十五日，意大利北部、中部和南部的二十九个省的数十万工人举行了全省规模的罢工。使得这些省的大多数工业瘫痪了四十八小时。这些省的所有大城市的罢工工人都举行了集会和示威。"},{"type":"paragraph","text":"在意大利大城市罗马、那不勒斯、热那亚和米兰，由于工人的罢工使公共运输完全陷于瘫痪状态。"},{"type":"paragraph","text":"在意大利北部维琴察省的瓦尔达尼奥，参加罢工的五千名纺织工人，在三千名学生的支持下，二十四日占领了当地的毛纺企业“马佐托”工厂。"},{"type":"paragraph","text":"西西里区特拉巴尼省的四万名农场工人和佃农，连日来也分别举行罢工，并且占领了三个市政厅。在南部波坦察省，一千五百名罢工工人也占领了一个市政厅。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"026740a4a2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
