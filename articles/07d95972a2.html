script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不结盟国家政府间组织在日内瓦举行会议  建议明年初举行的研究初级产品问题大会采取措施，维护发展中国家的经济权益，反对帝国主义剥削和掠夺","authors":[],"dates":[{"year":1974,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不结盟国家政府间组织在日内瓦举行会议"},{"type":"paragraph","text":"建议明年初举行的研究初级产品问题大会采取措施，维护发展中国家的经济权益，反对帝国主义剥削和掠夺"},{"type":"paragraph","text":"新华社日内瓦一九七四年十二月二十二日电  不结盟国家初级产品政府间组织最近在日内瓦举行了第二次会议。这个组织通过了一个报告，建议明年一、二月间将在塞内加尔首都达喀尔举行的研究初级产品问题的大会采取一系列措施，维护发展中国家的经济权益，反对帝国主义的剥削和掠夺。"},{"type":"paragraph","text":"这个组织在报告中建议，发展中国家的政府在达喀尔大会上采取一切可能的措施，加强已经建立的初级产品生产国组织的行动，并鼓励建立对发展中国家出口有重要意义的其他主要产品的组织。它还建议发展中国家的政府在不同的生产国组织之间建立一个协商和合作机构，以便于互相支援并协调彼此的行动。"},{"type":"paragraph","text":"这个组织还要求发展中国家的政府提出初级产品生产国组织限制跨国公司的共同措施，以维护发展中国家对本国自然资源的主权和利益。"},{"type":"paragraph","text":"这个组织强调，发展中国家目前必须采取具体步骤，按照一九七三年九月不结盟国家第四届首脑会议通过的行动纲领以及联合国大会第六届特别会议通过的决议加强它们之间的经济合作，并且在原料和其他初级产品方面采取共同的策略和行动。"},{"type":"paragraph","text":"与会的不结盟国家的代表还研究了发展中国家当前在经济上面临的困难。他们指出，造成这种情况的根源是新老殖民主义的掠夺。发展中国家的自然资源几百年来遭到肆意掠夺。目前，它们仍然遭受发达国家的经济剥削。这些代表们强调说，少数发达国家目前已经不再能够决定世界的命运，特别是不再能够决定发展中国家的命运了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07d95972a2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
