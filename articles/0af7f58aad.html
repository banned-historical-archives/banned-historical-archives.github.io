rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《建国以来毛泽东军事文稿》出版","authors":["包国俊"],"parts":[{"type":"paragraph","text":"本报北京2月7日电记者包国俊报道：经中共中央、中央军委批准，中共中央文献研究室、军事科学院编辑的《建国以来毛泽东军事文稿》，已由军事科学出版社、中央文献出版社联合出版，即日起在全国各地发行。"},{"type":"paragraph","text":"《建国以来毛泽东军事文稿》分上、中、下三卷，收入毛泽东有关军事理论、军事战略、国防和军队现代化建设、反侵略战争准备等方面的电报、批示、讲话、谈话、书信、题词等821篇，其中91篇为首次公开发表。"},{"type":"paragraph","text":"这部文稿，是全面反映新中国成立以后毛泽东国防现代化思想和军队建设思想的重要文献集。新中国成立后，以毛泽东为核心的中共第一代中央领导集体精心指导国防和军队现代化建设，领导进行抗美援朝战争和多次边境自卫防御作战，同国内外敌对势力分裂祖国和搞“两个中国”或“一中一台”的图谋进行坚决的斗争，捍卫了国家主权、安全和领土完整，为社会主义革命和建设创造了有利的和平环境。在党中央、毛泽东的领导下，人民解放军坚持全心全意为人民服务的宗旨，发扬拥政爱民的优良传统，在支援国家建设等方面发挥了重要作用。"},{"type":"paragraph","text":"这部文稿的出版，对于以毛泽东军事思想、邓小平新时期军队建设思想、江泽民国防和军队建设思想为指导，深入贯彻落实科学发展观，系统学习、总结和研究我国国防现代化建设和军队建设的基本理论、基本经验、基本规律，推动党的军事指导理论创新，加速推进中国特色军事变革，增强全面履行党和人民赋予的新世纪新阶段军队历史使命的自觉性，具有重要意义。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0af7f58aad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
