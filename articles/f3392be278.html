:1979,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理十四日下午在会见印度外交部长瓦杰帕伊时说:“现在，我们要抓紧时间来改善我们两国的关系。”"},{"type":"paragraph","text":"瓦杰帕伊外长对邓副总理说，他这次就是为了探讨改善印中关系的可能性而来中国的。"},{"type":"paragraph","text":"邓副总理接着说:我们应该求同存异，至于我们两国的边界问题，可以通过和平协商来解决，这个问题不应该妨碍我们在其他方面改善关系。他指出，在国际问题上我们有不少共同的看法。我们两国领导人要多来往，逐渐增进相互了解。"},{"type":"paragraph","text":"瓦杰帕伊外长说，这两年来，印中两国已经有了不少接触，这对我们双方都是有益的。我们可以相互学习。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3392be278"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
