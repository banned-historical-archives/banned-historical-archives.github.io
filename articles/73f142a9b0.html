torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"红一方面军的工作方针","alias":"","parts":[{"type":"paragraph","text":"红一方面军的工作方针川"},{"type":"paragraph","text":"（1935年9月2日）"},{"type":"paragraph","text":"现在一方面军需要相当时间的休息，很重要的任务是整理部队。战略方针已确定向东，向汉人聚居区发展，给养条件是可以改善的，休息时间除作战任务外是可以争取的。一方面军整理的方针，要从头做起，重新开始，军长、师长要亲自给排以上干部上课，可参考在中央苏区时的制度，并学习四方面军的优良制度。我们到甘肃后，客观条件是有利于红军的扩大的，主要的问题是要加强领导，仔细地建立与群众的关系，重新进行三大纪律、八项注意的教育。对群众纪律的加强，与扩大红军是成正比例的。为进行整理，一方面军的司令部、政治部应该重新建立起来，立即进行工作。"},{"type":"paragraph","text":"[1]1935年9月2日，中共中央政治局在若尔盖县巴西召开会议，会议"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":9,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":220,"page_end":220},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73f142a9b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
