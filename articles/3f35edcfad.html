,"dates":[{"year":1976,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市凿井工程公司深井机械一厂广大职工学习唐山、丰南人民的革命精神，仅用了十二天的时间，就完成了过去需要近一个月才能完成的五十台潜水泵的制造任务，为支援唐山人民的抗震救灾斗争作出了贡献。"},{"type":"paragraph","text":"深井机械一厂是一个四百多人的小厂。唐山、丰南一带发生强烈地震后，当地矿区地下水猛涨，上级有关部门要求他们在最短的时间里，生产出五十台大口径深井潜水泵，支援唐山灾区排水抢险。广大职工在党支部的领导下，立即行动起来，从车间到班组层层召开动员会、誓师会，狠批邓小平的“相对依靠”、“物质刺激”等修正主义黑货，学习灾区人民人定胜天的革命精神，大讲批邓、反击右倾翻案风斗争的伟大胜利；大讲毛主席、党中央对灾区人民的亲切关怀；大讲社会主义制度的无比优越；大讲快造深井潜水泵、支援灾区人民的重大意义。广大职工以主人翁态度打破车间和工种界限，发扬共产主义风格，哪里需要就到哪里去战斗。"},{"type":"paragraph","text":"在突击生产深井潜水泵的战斗中，大家发扬“一不怕苦，二不怕死”的革命精神，许多同志病假不休息，受伤坚持干，不计时间，不讲报酬，早班连中班，中班连夜班，连续作战。在全厂职工的努力下，终于使生产潜水泵的时间缩短再缩短。不久前，五十台深井潜水泵已运往灾区，在抗震救灾斗争中发挥了作用。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f35edcfad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
