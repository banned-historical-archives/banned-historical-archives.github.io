ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"妇女工作者应参加经济工作","alias":"","parts":[{"type":"paragraph","text":"妇女工作者应参加经济工作"},{"type":"paragraph","text":"（1943年2月24日）"},{"type":"paragraph","text":"妇女工作者本身必须学习农村经济知识，了解妇女生产内容，才能真正成为农村群众生产的组织者与领导者。许多有能力的女同志必须到合作社去工作。再则许多女党员、女干部必须到公营经济机关中去工作，使公营经济发展起来。那些浮在上层、空闲无事，不以为耻，反以为荣的观点是完全错误的。"},{"type":"paragraph","text":"[1]这是毛泽东在审阅《中共中央关于各抗日根据地目前妇女工作方针"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":2,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":516,"page_end":516},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9063a13500"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
