rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决反掉右倾保守思想多快好省完成训练任务","authors":["李华/庐志远/胡永祥/曾德和"],"parts":[{"type":"paragraph","text":"本报讯 0979部队召开的训练工作专题整改会议上，集中地批评了各级领导的右倾保守思想。这次会议一共开了四天，参加会议的有支队以上军政首长和部分机关、分队的主要干部。"},{"type":"paragraph","text":"会议一致认为，只要反掉右倾保守思想，鼓起革命干劲，恰当地安排时间，就能又多又快又好又省地完成今年的各项训练任务。"},{"type":"paragraph","text":"会议首先批判了对训练指标要求偏低，强调提高质量不够的偏向。去年，各级党委曾经对完成训练计划表现信心不足，过分强调困难，可是事实怎么样呢？去年冬季采用野营训练方式，不仅较好地完成了主要课目的训练，还增加了一些行军、宿营、警戒等课目；原计划在今年1月15日完成，实际上提前二十天就完成了；体育训练只敢要求及格，训练结果却总评良好。这些事实说明，怕完不成任务是毫无根据的；领导上的右倾保守思想如果克服了，训练任务会完成得更好。"},{"type":"paragraph","text":"右倾保守思想还表现在训练方法上的因循守旧，缺乏大胆创造和革新的精神，对先进因素缺乏敏感，即使发现了也缺乏提倡推广的魄力，表现了束手束脚。如以排为单位实施教学，已经证明是个很好的方法，它能使教者更好地联系实际，有效地提高排长的任教能力；但是由于保守，不相信群众，强调排长水平低，以致现在仍然没有普遍采用。"},{"type":"paragraph","text":"右倾保守思想还表现在对合成军队的组织指挥和全面领导认识不足。部队实施正规训练好几年了，而有的领导思想仍然停留在单一兵种阶段，往往只重视步兵忽视其他，抓紧了某一科目丢了其他科目；特别是领导干部雄心不强，钻的不够，摸得少，知难而退，缺乏知难而进的精神。"},{"type":"paragraph","text":"会议认为，反对右倾保守思想，是推动训练跃进的关键。因此，在进行今年度训练准备工作的同时，必须大力进行这一斗争。（李华、卢志远、胡永祥、曾德和）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4511da82d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
