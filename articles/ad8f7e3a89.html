ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于宪法草案初稿修改情况给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"关于宪法草案初稿修改情况"},{"type":"paragraph","text":"给刘少奇等的信"},{"type":"paragraph","text":"（1954年2月24日、26日）少奇同志："},{"type":"paragraph","text":"兹将宪草初稿第二章以下二读稿及宪草小组报告送上，请印发各同志阅看。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年二月廿四日上午二时乔木同志："},{"type":"paragraph","text":"今天所谈可作修改的地方，请于明日加以修改，并由小组各同志商酌一次，于明夜廿四点以前打好清样送我，准备后天（廿六）送给中央。"},{"type":"paragraph","text":"毛泽东二月廿四日毛泽东全集第三十三卷"},{"type":"paragraph","text":"三少奇同志，并书记处各同志："},{"type":"paragraph","text":"为便于中央在这几天讨论宪法草案，这里的小组赶于两天内又作了一次修改，称为三读稿，现送上，请照此印发中央各同志阅看。"},{"type":"paragraph","text":"敬礼"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年二月廿六日上午二时1954年，毛泽东修改我国第一部宪法《中华人民共和国宪法》（草案）。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":2,"day":24},{"year":1954,"month":2,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":536,"page_end":537},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad8f7e3a89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
