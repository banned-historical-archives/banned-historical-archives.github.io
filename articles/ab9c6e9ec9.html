rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东评点二十四史》线装本印制全部结束","authors":["宋姝姝"],"parts":[{"type":"paragraph","text":"《毛泽东评点二十四史》"},{"type":"paragraph","text":"线装本印制全部结束"},{"type":"paragraph","text":"新华社南京2月29日电（宋姝姝）由线装书局推出的《毛泽东评点二十四史》线装本，印制工作全部结束，最后300套图书交书仪式近日在扬州市举行。"},{"type":"paragraph","text":"这套书印制精美，极具收藏价值。全书共80函850本，大16开型线装，封面、封底以优质真丝蓝色凌面精制，正文用玉版宣纸精印，每套书配80个真丝蓝色绢面平函套，并附有精美藏书证。这套书限量编号发行500套，首批200套于1997年7月印制结束，已陆续被各界人士购藏。最后300套图书由扬州邗江古籍印刷厂印制。"},{"type":"paragraph","text":"据了解，影印全书耗用胶片15万张、宣纸500余吨、3A级真丝绫面7.6万多米，历时4年有余。这套线装本毁版仪式将于近期在北京举行。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab9c6e9ec9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
