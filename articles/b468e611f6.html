[],"dates":[{"year":1982,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英会见巴苏等印度客人时说"},{"type":"paragraph","text":"中印两国人民应该世世代代友好"},{"type":"paragraph","text":"新华社北京12月14日电　人大常委会委员长叶剑英今天上午在住所会见由巴苏大夫率领的全印柯棣华大夫纪念委员会代表团和柯棣华大夫的亲属。"},{"type":"paragraph","text":"1938年，印度援华医疗队为援助中国人民的抗日战争来到中国。他们在武汉和延安期间，叶剑英同志曾多次会见柯棣华、爱德华和医疗队的其他成员巴苏华、卓克华和木克华几位大夫，同他们建立了深厚的友谊。"},{"type":"paragraph","text":"今天，叶剑英见到巴苏大夫，亲切地握着他的手说：老朋友，很高兴见到你。叶剑英还同其他印度客人一一热情握手。他说，热烈欢迎各位来我国访问。中印两国在亚洲是大国，是近邻。中印两国人民应该世世代代友好。"},{"type":"paragraph","text":"巴苏等印度客人是应邀前来我国参加纪念柯棣华大夫逝世四十周年、爱德华大夫逝世二十五周年的活动的。巴苏对叶剑英说，四十四年来，我们一直记住你对医疗队所给予的关怀和帮助。当年我们在延安和解放区工作了五年之久。他说，代表团在中国访问期间对新中国取得的成就和人民的幸福生活留下了深刻的印象。我们对印中两国人民的友谊不断巩固和发展而感到高兴。"},{"type":"paragraph","text":"代表团和柯棣华大夫的家属向叶剑英赠送了纪念品。叶剑英高兴地说，这是友谊和亲善的象征，我将永远留作纪念。"},{"type":"paragraph","text":"随后，叶剑英同印度客人一起合影。"},{"type":"paragraph","text":"对外友协会长王炳南，印度驻中国大使文卡特斯瓦兰参加了会见。（附图片）"},{"type":"paragraph","text":"上图：叶剑英委员长与由巴苏大夫率领的全印柯棣华大夫纪念委员会代表团和柯棣华大夫的亲属合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b468e611f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
