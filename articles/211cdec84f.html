art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"平壤三十万人举行盛大集会和游行苏；中等国兄弟党代表团长在会上致以热烈祝贺","authors":[],"parts":[{"type":"paragraph","text":"朝鲜党政领导人金日成、崔庸健、金一等陪同苏联共产党代表团团长科兹洛夫、中国共产党代表团团长邓小平等兄弟党代表团团长或代表登上主席台，这时，全场响起了长时间的雷动的欢呼声和掌声。"},{"type":"paragraph","text":"新选出的朝鲜劳动党中央委员会委员、候补委员和参加第四次代表大会的代表们都参加了这次集会。"},{"type":"paragraph","text":"各国驻平壤的外交使节也出席了集会。"},{"type":"paragraph","text":"今天，金日成广场显得格外庄严、美丽。无数的花束和彩旗汇成了红色的海洋，广场两旁建筑物上挂着马克思和列宁的画象以及大幅标语。"},{"type":"paragraph","text":"朝鲜劳动党中央委员会副委员长崔庸健首先在大会上讲话。他说：朝鲜劳动党第四次代表大会是在朝鲜革命发展中成为新的里程碑的划时代事件。大会显示了马克思列宁主义在我国胜利。他号召全国人民团结在以金日成为首的党中央委员会周围，更高地举起马克思列宁主义和无产阶级国际主义的旗帜，为争取祖国的和平统一，朝着社会主义的高峰，勇往前进。"},{"type":"paragraph","text":"接着，苏联共产党代表团团长科兹洛夫、中国共产党代表团团长邓小平、古巴统一革命组织代表团团长奥古斯托·马丁内斯、法国共产党代表团团长利奥·斐盖尔先后在大会上讲了话。他们热烈祝贺代表大会的胜利闭幕。"},{"type":"paragraph","text":"会后，举行了群众游行。"},{"type":"paragraph","text":"平壤市三十万群众举行盛大集会的盛况。朝鲜中央通讯社传真照片（新华社发）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"211cdec84f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
