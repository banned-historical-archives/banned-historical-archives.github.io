嘉奖令，向参战部队表示最热烈的祝贺　嘉奖令指出:这一胜利是对越南人民的有力支援，是对我国广大革命派的极大鼓舞，是对美帝的沉重打击。中央军委勉励他们遵照毛主席的教导，提高革命警惕，坚守战斗岗位，进一步抓革命，促战备，坚决歼灭一切敢于来犯的敌机。","authors":[],"dates":[{"year":1967,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京25日电　二十四日下午，美帝国主义F-4B型战斗机两架，侵入我广西某地上空，进行战争挑衅。我英雄的中国人民解放军空军部队当即给以迎头痛击，将敌机全部歼灭。这是我空军部队在保卫祖国领空，保卫无产阶级文化大革命中，取得的又一重大胜利。"},{"type":"paragraph","text":"新华社北京25日电　中共中央军委今天颁发嘉奖令，表扬在广西某地一举击落美帝国主义F-4B型战斗机两架的中国人民解放军空军部队。"},{"type":"paragraph","text":"嘉奖令说，这一仗，你们指挥正确，协同密切，打得好!这是你们坚决执行我们伟大领袖毛主席关于抓革命，促战备、促工作、促生产的指示和坚决响应林彪同志的号召，高举毛泽东思想伟大红旗，活学活用毛主席著作，突出无产阶级政治，大搞人的思想革命化，忠实地保卫无产阶级文化大革命，坚决地捍卫以毛主席为代表的无产阶级革命路线所取得的重大胜利，是伟大的战无不胜的毛泽东思想的胜利。特向你们致以最热烈的祝贺。"},{"type":"paragraph","text":"嘉奖令指出，最近，美帝国主义在越南的和谈阴谋破产以后，战争升级又接连失败。特别是正当我国无产阶级革命派更充分，更深入，更全面地揭发和批判党内最大的一小撮走资本主义道路当权派，进一步加强和发展无产阶级革命派大联合，革命的“三结合”，彻底向党内一小撮走资本主义道路当权派夺权的时候，美帝国主义更是恨得要命，怕得要死，正阴谋在东南亚进行新的战争冒险。因此，你们的胜利，是对越南人民抗美救国斗争的有力支援，是对我国广大无产阶级革命派的极大鼓舞，是对美帝国主义的沉重打击!"},{"type":"paragraph","text":"嘉奖令说，我们的伟大领袖毛主席教导我们:“我们决不可因为胜利，而放松对于帝国主义分子及其走狗们的疯狂的报复阴谋的警惕性”。中共中央军委希望你们遵照这一教导，提高革命警惕，坚守战斗岗位，进一步抓革命，促战备，坚决歼灭一切敢于来犯的敌机。在保卫祖国领空、保卫无产阶级文化大革命中，做出新的贡献，争取更大的胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffd216f0d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
