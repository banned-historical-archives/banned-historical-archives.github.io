uthors":[],"dates":[{"year":1956,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"中共中央关于公私合营企业定息办法的若干指示","type":"title"},{"text":"上海局、各省、自治区、直辖市党委，并抄国务院有关各部党组：","type":"appellation"},{"text":"关于公私合营企业的定息办法，中央同意陈云同志在对资改造十人小组汇报会议所作的总结，并由陈云同志在全国人民代表大会作了发言，不分工商，不分大小，不分盈户亏户，不分地区，不分行业，统一规定为年息五厘。个别需求提高息率的企业，仍然可以超过五厘。兹对定息和发息中的几个具体问题指示如下：","type":"paragraph"},{"text":"（一）对某些企业需要超过五厘定为六厘的，由省、自治区、直辖市党委审核决定后报中央对资改造十人小组备案，对个别合营企业定息需要超过年息六厘的由省、自治区、直辖市党委报中央对资改造十人小组批准。请将需要超过年息六厘的合营企业，迅速上报。以便中央平衡决定。","type":"paragraph"},{"text":"（二）一定要在本年七月或者八月发息一次（上半年的定息）定息一般自本年一月一日起计算。但是如果今年合营的企业，在合营的时候已经对合营前的盈余分配作了处理，或者资方要求对合营前的盈余仍然按“四马分肥”或者惯例分配，则定息的起息日期，可以由公私双方协商确定。","type":"paragraph"}],"comments":[],"origin":"原载国防大学党史党建政工教研室编《中共党史教学参考资料》，北京：1985-1988年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于公私合营企业定息办法的若干指示","authors":[],"dates":[{"year":1956,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"中共中央关于公私合营企业定息办法的若干指示","type":"title"},{"text":"上海局、各省、自治区、直辖市党委，并抄国务院有关各部党组：","type":"appellation"},{"text":"关于公私合营企业的定息办法，中央同意陈云同志在对资改造十人小组汇报会议所作的总结，并由陈云同志在全国人民代表大会作了发言，不分工商，不分大小，不分盈户亏户，不分地区，不分行业，统一规定为年息五厘。个别需求提高息率的企业，仍然可以超过五厘。兹对定息和发息中的几个具体问题指示如下：","type":"paragraph"},{"text":"（一）对某些企业需要超过五厘定为六厘的，由省、自治区、直辖市党委审核决定后报中央对资改造十人小组备案，对个别合营企业定息需要超过年息六厘的由省、自治区、直辖市党委报中央对资改造十人小组批准。请将需要超过年息六厘的合营企业，迅速上报。以便中央平衡决定。","type":"paragraph"},{"text":"（二）一定要在本年七月或者八月发息一次（上半年的定息）定息一般自本年一月一日起计算。但是如果今年合营的企业，在合营的时候已经对合营前的盈余分配作了处理，或者资方要求对合营前的盈余仍然按“四马分肥”或者惯例分配，则定息的起息日期，可以由公私双方协商确定。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78421acdb3"},"buildId":"3k8CSiaVLD8
