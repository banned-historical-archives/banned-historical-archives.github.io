ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对中央关于讨论和试行农村人民公社工作条例修正草案指示稿等的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对中央关于讨论和试行农村人民公社工作条例修正草案指示稿等的批语和修改！"},{"type":"paragraph","text":"（1961年6月11日、17日）"},{"type":"paragraph","text":"即退田家英同志。两件都已看过，很好，请即送小平同志照办。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"11日"},{"type":"paragraph","text":"[1]本篇一是对中共中央政治研究室副主任、毛泽东的秘书田家英1961年6月10日报送的由他起草的中央关于讨论和试行农村人民公社工作条例修正草案指示稿和中央农村工作部干部赵明、曾源1961年2月关于王国藩社西铺大队粮食生产与畜牧业生产相结合调查材料的批语；本篇二是在田家英6月10日送审的这一中央指示稿上所作的一处修改（用宋体字排印）；本篇三是在6月15日送审的这一中央指示修改稿上的批语；本篇四是在6月15日送审的这一中央指示修改稿上所作的一处修改（用宋体字排印）；本篇五是在1961年6月15日下发这一指示的中共中央文件上写的批语。"},{"type":"paragraph","text":"[2]小平，即邓小平，当时任中共中央总书记。对中央关于讨论和试行农村人民公社工作条例修正草案指示稿等的批语和修改"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"半年多以来，全党同志在中央和毛泽东同志的领导下，进行了大量的工作，现在，我们的农村人民公社的工作面貌，已经大大改变，或者说正在迅速改变。"},{"type":"paragraph","text":"三退尚昆即办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十七日"},{"type":"paragraph","text":"四"},{"type":"paragraph","text":"各级党委都要把调查研究定为经常的工作制度。要真正认识到：用马克思列宁主义观点到群众中去做深入的调查研究，是做好一切工作的前提。"},{"type":"paragraph","text":"[1]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。毛泽东全集第四十四卷"},{"type":"paragraph","text":"五"},{"type":"paragraph","text":"江青精读。两个好文件\"，可以为各级干部的学习教材。现在是一定要重新教育一切上中下干部的教育（时候）了。"},{"type":"paragraph","text":"[1]指中共中央1961年6月15日下发的《关于讨论和试行农村人民公社工作条例修正草案的指示》和6月19日下发的《农村人民公社工作条例（修正草案）》。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":6,"day":11},{"year":1961,"month":6,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":300,"page_end":302},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"021b7c6ec9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
