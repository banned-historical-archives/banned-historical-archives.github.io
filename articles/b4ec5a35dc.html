":["关贵武","哈尔滨师范学院"],"dates":[{"year":1957,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"在民盟省、市委员联席会上的发言","type":"title"},{"text":"哈尔滨师范学院关贵武","type":"authors"},{"text":"（关贵武：民盟省委宣传部长、哈尔滨师范学院讲师）","type":"subtitle"},{"text":"六月十四日在民盟省、市委员联席会上的发言","type":"subtitle"},{"text":"一、为什么副总理中没有党外人士，而其它行政部门都可以有。","type":"paragraph"},{"text":"二、报纸上登载了对我发言的指责。我在省政协发言写过稿，原稿有“三三制”，发言前印出来了。以后经过学习修改了。原提“三三制”是在贯彻“长期共存，互相监督”方针里提的，在人事安排中可以考虑。在抗日战争时期，曾实行过“三三制”，这种精神也是不无可取之处。在发言时正式提出已修改了，以现在发言为是。现在批评我主张“三三制”，这种批评是不大妥当的。","type":"paragraph"},{"text":"三、我未受过不白之冤，我发言不是发泄私愤。（市委统战部报来的发言记录整理材料）","type":"paragraph"}],"comments":[],"origin":"《鸣放言论（二）》（哈尔滨：“学习生活”编辑室编，1957年7月10日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4ec5a35dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
