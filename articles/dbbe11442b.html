script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈宗汉在党委召开的教师座谈会上发言","authors":["哈尔滨工业大学","陈宗汉"],"dates":[{"year":1957,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"陈宗汉在党委召开的教师座谈会上发言","type":"title"},{"text":"哈尔滨工业大学陈宗汉","type":"authors"},{"text":"[陈宗汉：哈尔滨工业大学教授，动力系副主任]","type":"paragraph"},{"text":"运动中，现在领导上已行动起来了，但对行动还不太明了，目前要各系选一人参加委员会，我就不明了委员会是权利机构还是建议机构，如学衔评定要通过人事处不？应研究如何作法合适。假定作个职能机构，系委员必定要收集全系意见，那凭个什么资格去收集？而且收集时会议要更多，新官僚主义又会多起来。工资委员要替群众争福利，七个系七个意见，势不相下，矛盾不统一，是否可解决麻烦？选出这个委员本身也困难，教师当委员不会拍手称快，即使无困难是个职能机构，那原有职能机构没用了，而且委员要重新了解情况，处理不一定比原职能机构好，也是个缺点，应研究。我有个想法：","type":"paragraph"},{"text":"学校机构要简单，要利用原来机构，不要重起炉灶，如学术委员会，可作图书、学衔等工作，工资可利用人事处，即利用原行政，与学术会议两方面的系统，如学衔委员会即利用学术委员会机构，提出方案交系学术委员会，系学术委员会再收集意见，讨论，在系学术委员会中成立专门委员会（或五人），这五人应对业务熟悉，大众信任，水平较高，然后提给校学术委员会，图书也设个专门委员会，其他学术性问题都可在这个系统解决。行政方面的房屋、工资也可利用行政委员会，由系行政收集提到校行政会议，校行政会议选定几人负责，然后再交校行政委员会，如出师表中，宫中之事问谁，府中之事问谁，这样要取采少数服从多数的原则，同时要尊重少数人意见，这并不矛盾，历史上看，少数人许多意见是对的，大革命时代，毛主席不同意，但当时是少数意见，这只有历史与事实才能说明。斯大林的问题一直到他死后才说出，应容纳少数人的意见，存在那里，过去上海出过一个黄色车问题再回到图书馆问题上来，图书馆的问题还要收集许多人的意见，同时，把少数人意见进行宣传，让群众来鉴别，过去如少数不服从就认为不服从领导，这办法行不通，现在可建议试，请大家考虑。","type":"paragraph"},{"text":"学苏联问题，我体会解放以来，专家起了很大作用，但我们学的不够，专家建议，我们有些听了，有些没听，有一次行政会议讨论房屋分配问题，专家意见拿图纸上算的面积一分配就行，但我们当时没作，恐怕现在也没作，这就是没有吸取专家长处。例二、汽轮机专家，强调幻灯、电影进行教学我们一直没作，办不到，条件不许可就完了，还有水利专家说：教研室挂满了水利图，但我们各敎研室是否挂了有关的图表，这都说明没有接受，过去中国搞一长制，我们也搞，苏朕一长制，厂长是工程师，而我们随便什么人都来个一长制，实际上并没学好，又如赫鲁晓夫揭发斯大林错误再没有这样彻底，这是东西方传统习惯不一样。又有这样二例子，对我们有利的东西，我们有时不顾一切，不择手段，也不经厂长、工程师同意就作了，结果不行，说明有些好东西没学到，教条是学到了，可是我所接触到的事实是还没学到。","type":"paragraph"},{"text":"我校党政不分的现象，应把界线明确一下，一个学术，一个行政，可再来个党的组织系统，党与行政如何分，正如行政与学术如何分一样，应研究。","type":"paragraph"}],"comments":[],"origin":"陈宗汉问题专辑（右派分子言论蒐集册之三），哈工大校刊编辑委员会编，1957年10月14日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbbe11442b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
