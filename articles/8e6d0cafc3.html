史功绩是难以用言语表达的","authors":[],"dates":[{"year":1978,"month":11,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十一月二十七日电　国务院副总理邓小平今天上午在会见美国专栏作家罗伯特·诺瓦克谈到我国实现四个现代化的进程时说，马克思列宁主义、毛泽东思想是我国实现四个现代化的指导思想。"},{"type":"paragraph","text":"邓副总理说，毛主席在中国历史上的伟大功绩是难以用言语表达的。在中国，人人都懂得“没有毛主席就没有新中国”。他说，我们在实现四个现代化进程中，要善于完整地准确地掌握和运用毛泽东思想。我们国家的政治生活要生动活泼，心情舒畅。"},{"type":"paragraph","text":"会见时，邓小平副总理还回答了诺瓦克先生提出的有关当前国际形势和中美关系等方面的问题。会见时在座的有外交部新闻司司长钱其琛，美大司副司长唐闻生。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e6d0cafc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
