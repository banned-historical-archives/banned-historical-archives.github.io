rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"从女奴隶到拖拉机手","authors":["杨星火李焕民"],"parts":[{"type":"paragraph","text":"在西藏军区积极分子代表会上，我访问了军区生产部女拖拉机手丁曾卓玛。她的双颊黑里透红，眼睛又黑又亮，充满了藏族姑娘特有的快乐和信心。"},{"type":"paragraph","text":"十四年前，丁曾卓玛刚刚八岁。一天，阿妈流着泪对她说：“你到彭波去吧，去给西卡头人登曾却札当奴隶。”丁曾卓玛哭叫着不肯离开阿妈，可是，这又有什么用！阿爸是老爷的奴隶。由于丢失了一头骡子，阿爸活活被头人打死了。如今，轮到她去顶替阿爸了。"},{"type":"paragraph","text":"丁曾卓玛怀着恐惧和悲伤，走进了登曾却札的庄园。每天天不亮她就起床，放牲口、挤奶、背水，上山去砍刺柴。晚上回来，老爷却嫌她干活太少，迎头一顿皮鞭，然后给她一小块发霉的豌豆糌粑。又脏又臭的牛圈，就是丁曾卓玛睡觉的地方。1954年秋天的一个夜晚，她从头人家里逃出来，回到家里，阿妈刚修完康藏公路回来，她背着酥油、糌粑，买了几件新衣服，小布袋里还装着叮叮当当的铜洋。阿妈说，这是她修路的报酬。阿妈告诉她，解放军是穷人的好朋友，共产党是“活菩萨”，往后的日子就好过了。从这天起，丁曾卓玛就想，能跟共产党、解放军在一起，有多好啊！"},{"type":"paragraph","text":"�丁曾卓玛走进了拉萨新华书店的大门�K�摆书、扫地，从早干到晚，从不感到�\u003e搿0烁鲈潞螅�领导上又送她到西藏干蚕�习�T谘�习期间，她加入了共青团�#保梗叮澳辏�她被调到西藏军区生产部，在拖拉机训练班学了两个月，就到林芝农场拖拉机队工作�D鞘保�这个农场只有一间草房、几顶帐篷�6≡�卓玛和另外三个藏族女拖拉机手，只好住在菜窖里�K�想，自己已经是个共青团员了，要〖KG/空格〗2"},{"type":"paragraph","text":"去年秋天，正当农场发电站发电的时候，正当他们从菜窖搬进新房子的时候，正当农场的糖厂制出了第一缸红糖、酒厂制出了第一缸甜酒的时候，丁曾卓玛和她的伙伴们的一千亩冬小麦试种成功了。在丰收的喜悦里，她激动地向党交了一份“入党申请书”。"},{"type":"paragraph","text":"李焕民"},{"type":"paragraph","text":"牧场（木刻） 李焕民 作"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15cf35c117"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
