修养》使帝修妄图改变中国颜色的迷梦遭到破产","authors":[],"dates":[{"year":1967,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝朋友发表谈话指出"},{"type":"paragraph","text":"《修养》作者背叛了无产阶级革命和毛泽东思想"},{"type":"paragraph","text":"中国人民批判《修养》使帝修妄图改变中国颜色的迷梦遭到破产"},{"type":"paragraph","text":"新华社康开电　老挝一位新闻工作者最近对新华社记者发表谈话指出：“《修养》的作者背叛了无产阶级专政，背叛了无产阶级革命，背叛了毛泽东思想。”"},{"type":"paragraph","text":"他指出，《修养》一书阻碍革命力量的发展，滋长了修正主义的产生。他说，《修养》一书避而不谈当时中国怎样进行抗日战争，根本不谈无产阶级应该怎样掌握政权、应该怎样实行专政，而是脱离现实斗争去谈什么“自我修养”。"},{"type":"paragraph","text":"这位新闻工作者强调指出，现在批判《修养》，使帝国主义和修正主义失望和害怕，因为帝国主义和修正主义妄想中国改变颜色的迷梦彻底破产了。这充分显示出了毛泽东思想的强大威力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5a7ac1c85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
