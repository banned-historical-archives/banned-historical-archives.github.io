ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"给邓颖超的信","alias":"","parts":[{"type":"paragraph","text":"给邓颖超\"的信"},{"type":"paragraph","text":"（1965年9月25日）邓大姐："},{"type":"paragraph","text":"自从你压迫我写诗?以后，没有办法，只得从命，花了两夜未睡，写了两首词。改了几次，还未改好，现在送上请教。如有不妥，请予痛改为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿五日"},{"type":"paragraph","text":"[1]邓颖超，当时任中共中央委员、全国人大常委会委员、全国妇联副主席。"},{"type":"paragraph","text":"[2]1965年夏，毛泽东会见外宾后，邓颖超作为陪同人，曾问毛泽东是否作有新的诗词，并说“很久未读到主席的新作品，很希望能读到主席的新作品”。毛泽东以该谐语言所写的“你压迫我写诗”，说的就是这件事。"},{"type":"paragraph","text":"[3]指1965年写的《水调歌头·重上井冈山》和《念奴娇·鸟儿问答》。这两首词1976年在《诗刊》一月号公开发表时有所修改。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":9,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":202,"page_end":202},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4366d3966c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
