来总理的问候","authors":[],"dates":[{"year":1971,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶海亚·汗总统接见中国政府代表团"},{"type":"paragraph","text":"李水清团长向叶海亚·汗总统转达了毛泽东主席和周恩来总理的问候"},{"type":"paragraph","text":"新华社拉瓦尔品第二十四日电  巴基斯坦总统叶海亚·汗二十四日接见中国政府代表团团长、第一机械工业部部长李水清和代表团其他成员。"},{"type":"paragraph","text":"叶海亚·汗总统同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时，李水清部长向叶海亚·汗总统转达了毛泽东主席和周恩来总理的问候。叶海亚·汗总统表示感谢，并且要求李水清部长向毛泽东主席和周恩来总理转达他的问候。"},{"type":"paragraph","text":"接见时在座的有：巴基斯坦总统经济顾问艾哈迈德、外交部秘书苏尔坦·汗、西巴基斯坦工业发展公司董事长阿扎姆·阿里泽。接见时，中国驻巴基斯坦大使张彤也在座。"},{"type":"paragraph","text":"新华社拉瓦尔品第二十四日电　由第一机械工业部部长李水清率领的中国政府代表团，十一月二十四日上午乘飞机到达拉瓦尔品第。代表团是应巴基斯坦政府的邀请，前来参加塔西拉重型机械厂的落成和铸锻件厂的奠基典礼并进行友好访问的。"},{"type":"paragraph","text":"到机场欢迎中国代表团的有：巴基斯坦总统经济顾问米·穆·艾哈迈德、总统国防顾问吉亚斯·乌丁·艾哈迈德、经济统筹和外援事务司秘书伊加·侯赛因、外交部辅助秘书蒙塔兹·阿尔维、西巴基斯坦工业发展公司董事长阿扎姆·阿里泽以及巴基斯坦政府其他高级官员。"},{"type":"paragraph","text":"拉瓦尔品第巴基斯坦—中国友好协会秘书长阿尤布·米尔扎和当地其他知名人士也到机场迎接。到机场迎接的还有中国驻巴基斯坦大使张彤和中国大使馆的其他外交官员以及在这里工作的中国工程技术人员的代表。机场上洋溢着友好的气氛。欢迎人群举着巴基斯坦国旗和中国国旗，不断高呼“巴中友谊万岁”等口号。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"083086c65b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
