作出努力  叶剑英会见翁毓麟和代表团全体成员","authors":[],"dates":[{"year":1980,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人大常委会欢宴马来西亚议会代表团"},{"type":"paragraph","text":"乌兰夫和翁毓麟表示，两国将为东南亚地区和平与稳定作出努力"},{"type":"paragraph","text":"叶剑英会见翁毓麟和代表团全体成员"},{"type":"paragraph","text":"据新华社北京10月6日电　人大常委会副委员长乌兰夫和马来西亚上议院议长敦·奥马尔·翁毓麟今天表示，两国将共同为东南亚地区的和平与稳定作出努力。"},{"type":"paragraph","text":"人大常委会今晚为欢迎翁毓麟和夫人以及由翁毓麟率领的马来西亚议会代表团举行了宴会。乌兰夫在宴会上讲话时指出，中马友好不仅符合两国人民的根本利益，而且有利于维护东南亚地区的和平与稳定。"},{"type":"paragraph","text":"乌兰夫强调说，马来西亚和其他东盟国家主持正义，积极维护联合国宪章和国际关系准则，坚持要求外国军队从柬埔寨和阿富汗全部撤出，让柬埔寨人民和阿富汗人民在没有外来干涉的情况下决定自己的命运。这一正义立场博得了世界爱好和平人民的高度赞赏。他指出，中国人民愿意同世界上一切主持正义和爱好和平的国家和人民一起，为挫败霸权主义的侵略扩张政策和战争政策，维护世界和平，继续作出不懈的努力。"},{"type":"paragraph","text":"翁毓麟在讲话中说，马来西亚没有忘记她在促进东南亚地区的和平与稳定中的责任和作用。他说，马来西亚和东盟其他成员国一起首先倡议使东南亚地区成为一个和平、自由和中立的地区。我们还努力为建立一个新的国际经济秩序和国际和平与安全作出自己的贡献。"},{"type":"paragraph","text":"翁毓麟说，我们欢迎中华人民共和国对我们为使东南亚地区成为一个和平、自由和中立地区作的努力所给予的支持。他还表示期待同中国的其他一些领导人进一步会晤，以便就双方关心的问题交换意见。"},{"type":"paragraph","text":"马来西亚驻中国大使塔拉拉和夫人应邀出席宴会。"},{"type":"paragraph","text":"据新华社北京10月6日电　人大常委会委员长叶剑英今晚会见了马来西亚上议院议长敦·奥马尔·翁毓麟和夫人以及由翁毓麟率领的马来西亚议会代表团全体成员。叶剑英对翁毓麟在苏联侵占阿富汗和越南侵占柬埔寨问题上所持的正义立场表示赞赏。他还重申中国支持包括马来西亚在内的东盟各国关于使东南亚成为和平、自由、中立区的主张。"},{"type":"paragraph","text":"翁毓麟说，他对有中国这样一个国家同东盟各国一道致力于国际和平与安全，很受鼓舞。叶剑英和翁毓麟都表示希望双方加强接触，以增进两国人民之间的相互了解和友好合作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a19875e1a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
