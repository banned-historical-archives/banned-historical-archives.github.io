script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"抗日根据地应实行的各项政策","alias":"","parts":[{"type":"paragraph","text":"抗日根据地应实行的各项政策"},{"type":"paragraph","text":"（1940年12月13日）中原局，并告北方局，山东分局，东南局，南方局，南委\"："},{"type":"paragraph","text":"（一）苏北组织政权机关及民意机关时，应坚决实行三三制，共产党只占三分之一，在开始时还可少于三分之一，网罗各党各派无党无派一切不积极反共之领袖人物参加，其中应有国民党中派及左派，韩国钧等民族资产阶级及开明地主均应该参加，也可容许少数右派代表，真正组织各党各派各界各军的联合政权，力避我们包办。这对于全国是有大影响的。（二）劳动政策力避过“左”，目前作轻微改良，例如十四小时工作日者减至十三小时或十二小时，环要实行八小时制，保证资本家能赚钱。（三）土地政策应实行部分的减租减息以争取基本农民群众，但不要减得太多，不要因减息而使农民借不到债，不要因清算旧债而没收地主土地，同时应规定农最有交租交息之义务，保证地主有土地所有权，富农的经营原则上不变动。要向党内及农民说明，目前不是实行土地革命的时期，避华北方面曾经发生过的过左错误。（四）同意胡服对税收办法的规，在无更好办法之时暂时照旧法征税，惟苛杂应酌量减轻。瓶）锄奸政策以镇压众人皆恶之少数最反动分子为原则，极力避免[1]南委，指中共中央南方工作委员会。多杀人。除政府外各机关团体不得自由捕人罚人。（六）经济政策是尽量发展工业农业生产与商业流通，力避破坏生产与商业，号召上海资本家到苏北办实业。（七）文化教育政策只去掉买办大资产阶级的文化专制主义，容许民族资产阶级的自由主义思想存在，容许自由主义的文化人及教育家办报办学。（八）总之，目前你们的政策只去掉买办大资产阶级及封建大地主的专制主义及作初步的民生改良，一方面保证工农小资产阶级人权、政权\"、财权及言论集会结社之自由，另方面也应保证除汉奸以外一切资本家地主的人权、政权、财权及言论集会结社之自由，只要不武装暴动，任何党派阶层有活动之自由。应容许国民党之存在，应组织进步的国民党。(九)整个华中都应执行上述方针（当然华北亦如此)。（十）你们如何具体执行各项政策，望随时电告。"},{"type":"paragraph","text":"中央书记处十二月十三日"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":275,"page_end":276},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"504a791648"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
