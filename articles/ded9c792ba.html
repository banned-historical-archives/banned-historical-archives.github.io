art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我决定不参加第二十九届世界乒乓球锦标赛中国乒乓球运动员遵照毛主席的教导，决心在各自岗位上积极参加无产阶级文化大革命，夺取文化大革命的彻底胜利？","authors":[],"parts":[{"type":"paragraph","text":"新华社十日讯 中国乒乓球协会发言人就中国乒乓球队不参加四月在瑞典斯德哥尔摩举行的第二十九届世界乒乓球锦标赛一事，向新华社记者发表了谈话。"},{"type":"paragraph","text":"中国乒乓球协会发言人指出：我们的伟大领袖毛主席亲自发动和领导的无产阶级文化大革命是二十世纪六十年代的最伟大的革命，现在正在胜利进行。中国乒乓球运动员遵照毛主席的“你们要关心国家大事，要把无产阶级文化大革命进行到底”的教导，决心在各自岗位上积极参加这一场伟大的革命运动，夺取无产阶级文化大革命的彻底胜利。因此，中国乒乓球协会决定不派出代表团参加四月在瑞典举行的第二十九届世界乒乓球锦标赛。"},{"type":"paragraph","text":"中国乒乓球协会发言人还说：我们相信，经过无产阶级文化大革命的锻炼，用战无不胜的毛泽东思想武装起来的中国乒乓球运动员将以新的姿态出现在运动场上，并继续与国际乒乓球联合会合作，同世界各国运动员一道，为增进友好，团结反帝，为发展各国人民的体育事业作出更多的贡献。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ded9c792ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
