ar":1967,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一看见毛主席像，浑身都是力量"},{"type":"paragraph","text":"一位印度青年工人在中国大使馆内看见了高大的毛主席塑像，高兴极了。他在像前久久逗留，不愿离去。最后他要求中国同志让他在毛主席像前摄影留念。中国同志立即满足了他的心愿。他激动地对中国同志说：“我最最热爱毛主席，最最崇拜毛主席。我自己还画了一张毛主席像挂在家里。我每天早晨起来首先要看一看毛主席像。一看见他老人家，我全身都是力量！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8467fd1fe3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
