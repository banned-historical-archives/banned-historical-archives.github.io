ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"党报应吸收党外人员发表言论","alias":"","parts":[{"type":"paragraph","text":"党报应吸收党外人员发表言论"},{"type":"paragraph","text":"（1942年3月14日）周："},{"type":"paragraph","text":"（一）关于韩国临时政府情形请于日内电告。（二）张申府纪念《新华日报》的文章表示对我党满腔热情，已在解放转载”。他希望把党报变为容许一切反法西斯的人说话的地方，这一点是很对的，新华、解放都应实行。关于改进《解放日报》已有讨论，使之增强党性与反映群众。《新华日报》亦宜有所改进。关于共产党员与党外人员的关系，中央已准备了一个决定草案，下周可通过，党报应容纳党外人员说话亦包括在内。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十四日[1]这是毛泽东给周恩来的电报。"},{"type":"paragraph","text":"[2]张申府，是大学教授，民主人士。他的文章载于重庆《新华日报》1942年1月11日第三版，题目是《新华，新华，我看着你生长，长大一《新华日报》创刊四周年纪念祝辞》。"},{"type":"paragraph","text":"[3]解放，指延安《解放日报》。该报于1942年3月9日转载了张申府的文章。"},{"type":"paragraph","text":"[4]新华，指重庆《新华日报》。="},{"type":"paragraph","text":"第下周流成西"},{"type":"paragraph","text":"艺作启完纳素外人负说话都忘实行"},{"type":"paragraph","text":"起括在内。6hton毛泽东致周恩来电的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":3,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":478,"page_end":479},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc34c53f01"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
