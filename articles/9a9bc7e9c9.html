<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反经验主义是假　搞修正主义是真","authors":[],"dates":[{"year":1977,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反经验主义是假　搞修正主义是真"},{"type":"paragraph","text":"新疆维吾尔自治区霍城县各族干部和群众对“四人帮”篡改马列主义、毛泽东思想，把经验主义作为当前的主要危险，大搞修正主义，无比愤恨。大家口诛笔伐，狠批这伙害人帮的以反经验主义为“纲”的黑纲领。县革委会副主任买买提卡森木、县革委会计委主任张德燧结合霍城县坚持内批修正主义路线、外批苏修社会帝国主义，不断发展霍城的大好形势的实际，从理论和实践的结合上对“四人帮”的反动谬论及其罪恶阴谋进行了深入批判。买买提卡森木、张德燧说，什么是社会主义历史时期的主要危险？我们在反修前哨从事革命工作的同志是深有体会的。我们霍城县在文化大革命前，曾经受到过刘少奇反革命的修正主义的影响和干扰，一九六二年又遭受苏联现代修正主义的颠覆破坏，使农业生产一度下降。吃一堑，长一智。我们深受过内部和外部的修正主义危害的十三个民族的人民深深懂得，不坚持内批修正主义路线、外批苏修社会帝国主义，就不能维护祖国的统一，不能增进各族人民的团结，无产阶级专政就不能巩固。主要危险是修正主义，而绝不是什么经验主义。"},{"type":"paragraph","text":"在革命大批判中，霍城县各族干部指出，“四人帮”大反经验主义，不反教条主义，其矛头首先是指向我们伟大的领袖毛主席和敬爱的周总理，指向毛主席亲自选定的接班人华国锋同志，进而妄图打倒一大批中央和地方的坚决执行毛主席革命路线的党政军领导干部，以便达到他们篡党夺权的罪恶目的。许多干部还联系本县各族干部在党的长期培育下，在反修防修的斗争中，积累了丰富的革命实践经验的有力事实，痛斥“四人帮”对各级干部的诬蔑。县委组织部负责人和长期做干部工作的同志都说，我们党在长期的革命斗争中，造就和培养了一大批具有实践经验的用马列主义、毛泽东思想武装起来的各民族的干部，这是我们党的宝贵财富，是防止党变修、国变色的重要保证，也是“四人帮”和苏修叛徒集团妄图颠覆我国无产阶级专政的最大障碍。“四人帮”借反经验主义为名，背叛毛主席“三要三不要”的原则，要把我们党有着革命实践经验的好干部打下去，甚至还反对有着三大革命实践经验的广大工人农民，其用心是十分险恶的，这充分暴露了他们搞修正主义，搞分裂，搞阴谋诡计的丑恶嘴脸。"},{"type":"paragraph","text":"据新华社"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a9bc7e9c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
