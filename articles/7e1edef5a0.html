torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"二师宜位于酯河城地域","alias":"","parts":[{"type":"paragraph","text":"二师宜位于硝河城地域凹"},{"type":"paragraph","text":"（1936年10月2日）彭："},{"type":"paragraph","text":"胡宗南还在陇县一带。我二方面军将于一星期后转移至渭水以北。据李富春报，宁夏群众很好，马部恐慌，除少数据点外，大部围寨可不战而定，并有抢夺渡船之可能。似此二师宣即位置于硝河城地域，以便待提早攻宁问题决定后，二师调动便利，不致过于疲劳。关于提早攻宁问题，请你提出意见。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"二号十四时"},{"type":"paragraph","text":"[1]这是毛泽东给红军第一方面军司令员、西方野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]李富春，当时任中共陕甘宁省委书记。"},{"type":"paragraph","text":"[3]马，指马鸿逵，当时任国民党军西北“剿匪”总司令部第一防守区（第十五路军）司令兼新编第七师师长。"},{"type":"paragraph","text":"[4]硝河城，镇名，位于今宁夏西吉县东南。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":10,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":187,"page_end":187},"tags":[{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e1edef5a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
