ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"八路军第四纵队的工作方针","alias":"","parts":[{"type":"paragraph","text":"八路军第四纵队的工作方针川"},{"type":"paragraph","text":"（1938年8月13日）聂、彭："},{"type":"paragraph","text":"八日十九时电悉。"},{"type":"paragraph","text":"宋邓纵队?主力在现地区平谷、蓟县、密云一带加紧工作，站稳脚跟，再逐渐向东南发展的方针是好的。但宋邓有立即派遣一营左右之兵力，并带干部东出玉田、丰润、滦县配合当地暴动起来的游击队行动，并给那些游击队以各种帮助的必要。因为那些游击队如果没有一个基干支队去配合，即有被敌人削弱甚至消灭的危险。至于张高峰事件3业已趋向和平解决，并告。"},{"type":"paragraph","text":"毛王胡"},{"type":"paragraph","text":"十三日"},{"type":"paragraph","text":"[1]这是毛泽东和中共中央军委副主席王稼祥，胡服（刘少奇）给八路军晋察冀军区司令员兼政治委员聂荣臻、中共中央北方局驻晋察冀代表彭真的电报。"},{"type":"paragraph","text":"[2]宋邓纵队，指八路军第四纵队（当时归晋察冀军区指挥)，司令员宋时轮、政治委员邓华。"},{"type":"paragraph","text":"[3]1938年7月底8月初，日军在中国、苏联、朝鲜交界处的张高峰（今称张鼓峰）地方向苏军挑畔。在苏军的有力回击下，日本失败求和。8月10日，在莫斯科签订张高峰停战协定，规定双方立即停战。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":422,"page_end":422},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f06d92f79d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
