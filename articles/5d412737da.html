rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"西班牙劳动者党举行成立大会规定党的思想基础是毛泽东以具有普遍意义的贡献丰富了的马克思列宁主义","authors":[],"parts":[{"type":"paragraph","text":"新华社马德里七月二日电 由西班牙劳动者革命组织和西班牙劳动党合并组成的西班牙劳动者党七月一日在马德里举行成立大会。"},{"type":"paragraph","text":"来自全国各地的两千名代表参加了大会。原西班牙劳动者革命组织总书记何塞·桑罗马和原西班牙劳动党总书记埃拉迪奥·加西亚在大会上讲了话，高度评价两党的合并。"},{"type":"paragraph","text":"大会选举了九十名中央委员和十名候补委员。随后，中央委员会选举了由二十八人组成的执行委员会和由何塞·桑罗马、埃拉迪奥·加西亚、阿曼西奥·卡夫雷罗及纳萨里奥·阿瓜多组成的执行委员会常设书记处。"},{"type":"paragraph","text":"大会通过的新党章规定：“西班牙劳动者党的思想基础是毛泽东以具有普遍意义的贡献丰富了的马克思列宁主义。西班牙劳动者党是阶级的政党，她引导工人阶级和广大人民群众从一切剥削和压迫下解放出来，通过无产阶级专政建设社会主义直至消灭阶级和建立共产主义。”"},{"type":"paragraph","text":"党章在国际政策部分中表示“遵循三个世界的理论，把西班牙工人阶级和人民的斗争同世界无产阶级和被压迫国家及人民在国际范围内开展的反对两个超级大国——美国和苏联想以及反对霸权主义和帝国主义的斗争联系起来”。"},{"type":"paragraph","text":"应邀出席大会的有二十多个外国代表团。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d412737da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
