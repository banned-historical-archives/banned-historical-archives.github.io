阶级报刊的诬蔑宣传","authors":[],"dates":[{"year":1959,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"雅加达“东星报”揭露"},{"type":"paragraph","text":"美国利用西藏叛乱挑拨亚非国家团结"},{"type":"paragraph","text":"英国“工人日报”驳斥资产阶级报刊的诬蔑宣传"},{"type":"paragraph","text":"据新华社雅加达13日电　“东星报”今天发表社论说，像印度尼西亚的叛乱事件一样，西藏的叛乱也是美国所策划的。"},{"type":"paragraph","text":"社论说，虽然中国已经镇压了西藏的叛乱，然而帝国主义者还企图继续在亚洲制造新的骚乱，以便东南亚条约组织和巴格达条约组织借机派遣它们的武装部队来进行干涉。社论说，帝国主义者竭尽全力在亚洲国家的关系中散播不和的种子，破坏以万隆精神为基础的亚非国家的团结。社论还指出，蒋介石集团派遣了特务同西藏的叛乱分子进行秘密接触。"},{"type":"paragraph","text":"据新华社伦敦13日电　英国“工人日报”今天发表社论，谴责了英国资产阶级报纸和英国广播公司利用西藏叛乱事件对中国进行恶毒的诬蔑宣传运动。报纸指出，这种企图破坏英国人民对中国的友好感情的阴谋是注定要失败的。“工人日报”说，英国资产阶级报纸利用三个谎言来欺骗英国人民。"},{"type":"paragraph","text":"第一个谎言是：“西藏不是中国的一部分，而是一个独立国家。”“工人日报”说，但是，西藏是中国的一部分，正像苏格兰或威尔士是英国的一部分一样。"},{"type":"paragraph","text":"第二个谎言是：“中国在西藏进行了侵略。”但是，甚至资产阶级报纸在它们自己叙述发生了什么事情的时候也表明是叛乱分子发动了对人民解放军的进攻。"},{"type":"paragraph","text":"第三个谎言是：“在西藏发生的事情是民族起义。”“工人日报”指出，它们企图用这个谎言来掩盖叛乱的社会背景和阶级背景。报纸强调指出，全体中国人民，包括西藏人民在内，不管舰队街（英国报界）的雇佣文人们发出怎样的胡说八道，将走向幸福的社会主义未来。中国在他们的大踏步的前进中，将得到全世界劳动人民的支持。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52aaea6127"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
