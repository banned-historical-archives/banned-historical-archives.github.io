节录）","authors":[],"dates":[{"year":1952,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"大足渠县违犯纪律乱打乱杀现象通报（节录）","type":"title"},{"text":"大足县吊打死人和乱杀人的事件不能再在其他地方出现这种无政府无纪律的状态必须严格纠正和严肃的处理必须追究责任不能听之任之，请各地采取有效办法加以制止。","type":"paragraph"},{"text":"大足县在减租退押清匪反霸运动中普遍吊打与打人的事实是严重的，全县已先后打死40余名，仅四区就打死20余名，有用乱棍打死的。恶霸地主陈少伯家除依法枪决一名外，另自杀2名，被打死5名，有的连地主的孩子也被打死，全县自杀者已达200名多，内有中贫农10余名。","type":"paragraph"},{"text":"渠县6区，副区长于洪茂同志，未经县长批准连续处死地主土匪4名，9区副书记勇林本同志擅自将已判决7年徒刑的犯人处死。","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8486dfa246"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
