<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji5","name":"毛泽东全集第5卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"分田后的富农问题”永新及北路的情形","alias":"","parts":[{"type":"paragraph","text":"分田后的富农问题！"},{"type":"paragraph","text":"永新及北路?的情形"},{"type":"paragraph","text":"（1930年10月）"},{"type":"paragraph","text":"永新红色区域富农的剥削：一是粮食居奇，二是贩卖工业品。粮食居奇又有二法：一是自己的剩余粮食，二是贱价收买贫农的粮食，以此造成今年的严重春荒。富农因要居奇，又被政府规定最高谷价，便把粮食完全藏起来，以致城里贫民工人有一个星期吃粥，办米不到手，农村里雇农贫农也闹饥荒。后头，县苏领导一个春荒斗争，对富农坚决奋斗不让步，一定要抑平谷价。党在各区乡起作用，领导少年先锋队平仓，从酒缸中，从夹壁中，从茅屋中，从土砖园子中，从床底下，搜出富农埋藏的许多谷子来。结果，不但够吃，而且有多。新谷出世时，富农纷纷把陈谷挑到城里卖。富农在贩卖工业品做小生意的事情中赚到非常之大的利钱，主要是盐、洋袜子、手币、糖、肥皂等项。他们有本钱，有各种旧的社会关系，"},{"type":"paragraph","text":"[1]这是毛泽东听取中共赣西南特委王怀和赣西南北路行委书记陈正人关于当地富农与贫雇农在土地革命中斗争情况的报告后写的调查材料。本篇副标题下毛泽东原来注有“王怀，陈正人报告，毛泽东记录”。"},{"type":"paragraph","text":"[2]北路，这里指当时赣西南特委所属北路行委管辖的地区。1930年3月赣西南特委第一次代表大会后，为了便于领导和指挥，在特委下设立了贫农雇农所不能办到的东西，富农都能办来。"},{"type":"paragraph","text":"（以上王怀报告，以下陈正人报告。）"},{"type":"paragraph","text":"不但永新如此，北路也如此，今年也做过春荒斗争。富农做生意赚钱，和永新一样。阜田有个九如堂，老板是个小资本家。北路盐荒时候，他到南昌去办盐。没有油墨纸张，他也能到南昌办。因为他同国民党守望队?的队长能接头，他有旧的社会关系。他的盐及别的货物都卖得很贵，六七月间，他的盐卖到一串六百钱一斤。他有两架缝衣机，使得阜田裁缝师父没有工做，都反对他。又因他的物价太高，阜田市苏在群众的要求之下，把他捉起，罚了他一千元。罚了之后，他依然在阜田做生意。打开吉安后，他的生意越发做大了。北路春荒时，富农把谷卖到白色区域去。春荒斗争就是阻止谷米流到白色区域去，只准在赤色区域互相流通。"},{"type":"paragraph","text":"按：这是一九三○年十月的材料。[1]王怀，1930年3月至10月任赣西南特委常委。"},{"type":"paragraph","text":"[2]陈正人，1930年5月任赣西南北路行委书记，同年10月改任江西省行委宣传部长。"},{"type":"paragraph","text":"[3]守望队，是反动豪绅地主强迫农民参加的、用以破坏红色区域的一种组织。"},{"type":"paragraph","text":"[4]市苏，市镇苏维埃政府的简称。《罗坊会议的同志》(油画）《罗坊会议》（油画)《毛委员和赤卫队员在一起》（中国画）《万人大会》（油画）"}],"authors":["毛泽东"],"dates":[{"year":1930,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":186,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fbb9ed15d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
