ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"中央关于新三反的方针和部署的指示","alias":"","parts":[{"type":"paragraph","text":"中央关于新三反的方针和部署的指示！"},{"type":"paragraph","text":"（1953年3月14日）华东局，上海市委，并各中央局、分局，并转各省市委："},{"type":"paragraph","text":"（一）上海市委三月二日及华东局三月九日两电均悉。中央同意华东局对上海市第一次党代表会议着重新三反的综合报告的批示。以后此种会议每半年应开一次，会期可缩短些。（二）今年三、四、五月应着重在大区一级，省市一级和专区一级共三级，检查领导机关和各业务机关中的官僚主义，而将检查县区乡三级的命令主义和违法乱纪，作为典型试办，取得经验，以利推广。今年六、七、八、九月应配合大选工作在县区乡三级着重检查命令主义和违法乱纪，同时继续检查大区省市和专区的官僚主义。望你们按此方针进行部署，并注意和各项具体工作相结合，不要孤立地进行新三反。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"三月十四日[1]这是毛泽东为中共中央起草的指示。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":65,"page_end":65},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于新三反的方针和部署的指示","authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":14}],"is_range_date":false,"parts":[{"text":"中央关于新三反的方针和部署的指示","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"华东局，上海市委，并各中央局、分局并转各省市委：","type":"appellation"},{"text":"（一）上海市委三月二日及华东局三月九日两电均悉。中央同意华东局对上海市第一次党代表会议着重新三反的综合报告的指示。以后此种会议每半年应开一次，会期可缩短些。（二）今年三、四、五月应着重在大区一级，省市一级和专区一级共三级，检查领导机关和各业机关中的官僚主义，而将检查县区乡三级的命令主义和违法乱纪，作为典型试办，取得经验，以利推广。今年六、七、八、九月应配合大选工作在县区乡三级着重检查命令主义和违法乱纪，同时继续检查大区省市和专区的官僚主义。望你们按此方针进行部署，并注意和各项具体工作相结合，不要孤立地进行新三反。","type":"paragraph"},{"text":" 中央三月十四日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b22bc8239"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
