"dates":[{"year":1969,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十九日电　里约热内卢消息:在美帝国主义的血腥掠夺和巴西大庄园主的残酷剥削下，巴西大批农民流离失所，无处谋生。"},{"type":"paragraph","text":"据巴西共产党机关报《工人阶级报》十一月份的一期揭露，从米纳斯吉拉斯、马托格罗索和巴拉那等州流落到圣保罗的成千户无地农民，被圣保罗反动警察和移民当局野蛮地赶出这个城市。这些农民被迫沿着苏鲁卡巴纳铁路转往内地寻找土地谋生，人们把这条铁路称为“贫穷线”。《工人阶级报》还报道，据圣保罗“移民局”长透露，流经圣保罗寻找工作的无地农民每天近一千人，一年就超过三十五万人。这些农民到处找不到工作，景况越来越糟。"},{"type":"paragraph","text":"巴西领土辽阔，土地肥沃，但耕地被一小撮外国和本国大庄园主高度垄断。据报道，巴西六千万左右的农村人口中，一千二百多万农民和农业工人没有土地，而全国百分之八十以上的耕地却控制在大庄园主手中，大片土地闲置不用。在巴拉那州，闲置土地达到五百多万公顷，占该州土地面积百分之三十七，而这个州的无地农民却大批外流。"},{"type":"paragraph","text":"巴西广大农民不堪忍受这种残酷剥削和压迫，正日益觉醒，纷纷起来斗争。据报道，今年年初，巴拉那州无地农民三千多人奋起占领了近四百平方公里的土地，并用镰刀、鸟枪同敌人展开英勇搏斗。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a47784b820"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
