tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"同“四人帮”英勇斗争的徐同新荣立一等功江苏省军区召开庆功授奖大会","authors":["李大智曹锦华"],"parts":[{"type":"paragraph","text":"本报讯 十一月十六日，江苏省军区隆重举行庆功授奖大会，给予同“四人帮”作英勇斗争的原南京警备区某营二连给养员徐同新荣记一等功，并晋升为连队副指导员。"},{"type":"paragraph","text":"徐同新一九七四年入伍以来，努力学习马列主义、毛泽东思想，提高了识别真假马克思主义的能力。一九七六年清明节前夕，“四人帮”加紧篡党夺权的步伐，丧心病狂地恶毒攻击敬爱的周总理和老一辈无产阶级革命家。在这关系到党和国家前途与命运的严重时刻，徐同新毅然挺身而出，向“四人帮”猛烈冲杀。他连夜书写了“谁反对周总理就不得人心”、“我们怀念杨开慧烈士”、“把赫鲁晓夫式的野心家、阴谋家、两面派张春桥揪出来示众”、“把《文汇报》的黑后台张春桥拉出来示众”等革命传单和标语，张贴到南京新街口、鼓楼广场等闹区，又向《人民日报》、《解放军报》写信，愤怒揭露“四人帮”的滔天罪行。一九七六年四月二十日，徐同新被捕。在二百一十三天的狱中战斗生活中，他始终坚持真理，英勇斗争，表现了“愿做人民一子弹，义无反顾打敌人”的英雄气概。粉碎“四人帮”以后，徐同新获得了自由。他怀着对华主席、党中央的感激之情，朝气蓬勃地返回战斗岗位，积极参加揭批“四人帮”的伟大斗争，兢兢业业地工作，光荣地加入了中国共产党。"},{"type":"paragraph","text":"会上，江苏省军区负责同志宣读了给徐同新的嘉奖通令，号召广大指战员以徐同新为榜样，高举毛主席的伟大旗帜，紧密地团结在华主席为首的党中央周围，坚决贯彻执行党的十一大路线和五届人大、军委会议精神，为夺取揭批林彪、“四人帮”斗争的全胜，加速我军革命化现代化建设，加速实现新时期的总任务而努力奋斗。"},{"type":"paragraph","text":"（本报通讯员 李大智 本报记者 曹锦华）"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aab6a76ae1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
