"year":1952,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蒋志惠"},{"type":"paragraph","text":"学校里同学中间有许多人的家庭成份是资产阶级，在五反运动中，他们都在考虑究竟应当以怎样的态度来对待自己家庭的问题，我想就青年学生应该怎样正确地来对待自己的资产阶级家庭的问题提出一些意见:"},{"type":"paragraph","text":"在我们学校里，有不少同学的家长是工商业者，是资产阶级的家庭。有些同学也明明知道自己的父亲、哥哥或者亲友间，是有逃税、漏税、偷工减料、贪图暴利等不法行为；但是为了照顾个人与家庭的利益，父子、兄弟、亲成间的私情，始终鼓不起勇气来检举和揭发他们的不法行为。有些同学说:“资产阶级是坏的，但我的父兄却是好人。”也有人说:“父亲虽有剥削行为，但他是为了我，把我养育得这么大了，我怎能忍心检举他?”“检举后要补税，就要倾家荡产，我不是要失学了吗?”"},{"type":"paragraph","text":"显然，这样的对待自己家庭的态度是错误的。这种思想的产生，主要是由于青年学生多数出身于剥削阶级的家庭，因此，本身存在着浓厚的剥削阶级思想意识的缘故。"},{"type":"paragraph","text":"今天我们应当怎样正确地来对待自己的资产阶级家庭呢?首先我们要将自己和家庭的阶级界限划清。今天我们青年学生都要求把自己改造成为属于工人阶级的知识分子，将来毕业后也就是国家的建设干部，是工人阶级的一分子。因此，今天我们应该站在工人阶级的立场，与资产阶级的家庭划清界限，向家庭内腐朽堕落的资产阶级思想展开斗争，检举和揭发自己不法父兄或亲友的违法行为。"},{"type":"paragraph","text":"是不是我们就全部否定自己的资产阶级的家庭呢?这是不对的。因为今天我们不是要消灭资产阶级，而是要资产阶级老老实实的遵守“共同纲领”，不要破坏国家和人民的利益。今天我们向自己的资产阶级家庭展开斗争，正为了要把自己的家庭挽救出来，使自己的父兄不往毁灭的道路上走。"},{"type":"paragraph","text":"有些同学或许会这么说:理论上我可以完全同意，但在感情上总有些搞不通。同学们，请大家想一想:假使你的父亲或是哥哥，或是亲友是奸商王康年、李寅廷之类，为了一己私利，以假药、劣药冒充真药；以带着无数病菌的废棉花制成救急包，使在朝鲜前线为保卫祖国英勇战斗的志愿军不但增加痛苦，形成残废，甚至有许多不该牺牲的因而牺牲了；假使你的父兄亲友是奸商戴云嘘、赵松涛等为了私利，不顾淮河沿岸千万人民的生命安全，以劣货木料充当好货木料危害治淮工程时，试问:你还能容忍这样的父兄亲友的不法行为吗?"},{"type":"paragraph","text":"青年同学们，三反、五反斗争对我们是一场严重的考验，为了祖国美好的将来，为了最可爱的人——中国人民志愿军，为了我们自己光辉灿烂的前途，同学们站起来罢!坚决向腐朽堕落的资产阶级家庭展开斗争，检举不法父兄亲友的犯罪行为!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"545bb79e0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
