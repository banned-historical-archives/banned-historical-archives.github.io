hors":["陈灿"],"dates":[{"year":1949,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报无锡通讯】　苏南地区在解放以来，群众觉悟一天天的提高，迫切的要求改造旧有的合作社，和成立新的合作社，以减轻中问剥削，解决生活，生产资料的供给与产品的推销。因此为适应群众需要，苏南行署特决定召开苏南行政区合作干部会议，研究讨论合作社的一切问题，确定今后的方针，共计出席五十余人，于十二日上午首先举行预备会议，采取民主方式，研究了会议日程，和会议的要求，同时划分了小组，成立了主席团，下午即开始开会，研究结果，大家要求是:一、要明确今后办理合作社的总方针，二、具体要求是:(甲)对旧有合作社应怎样改造与整理，(乙)今后办合作社的性质和方式步骤，(丙)今后合作社的领导关系，和组织机构应怎样确定，(丁)怎样解决城乡关系开展物资供销。(陈灿)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac286eac83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
