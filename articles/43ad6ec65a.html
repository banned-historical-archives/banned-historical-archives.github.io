tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿船员坚持反修正主义立场荣获勋章","authors":[],"parts":[{"type":"paragraph","text":"新华社地拉那29日电 据阿尔巴尼亚通讯社28日报道，阿尔巴尼亚人民议会主席团授予“阿里·卡尔门迪号”汽船的船员以勋章，奖励他们不顾南斯拉夫修正主义者的威胁，坚决保卫党的路线和阿尔巴尼亚人民的光荣。"},{"type":"paragraph","text":"这些船员17日在公海上航行时受到了暴风雨的袭击，曾被迫开进南斯拉夫的格鲁日港口避风。南斯拉夫当局硬要他们拿掉汽船墙报上的一篇揭露南斯拉夫现代修正主义的文章，但是这种挑衅的要求遭到了他们的拒绝，南斯拉夫当局竟违反国际航海公法，拒绝让这艘汽船避风，最后，船员们毅然冒着骇浪和危险，离港驶向公海。"},{"type":"paragraph","text":"根据政府的建议，阿尔巴尼亚人民议会主席团授给这些船员三级自由勋章。船长弗兰茨·伊瓦奈和劳动党组织副书记拉马赞·多米获得勇敢勋章，其他船员获得勇敢奖章。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43ad6ec65a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
