中央民族学院","伊里奇","佟树强","宋家丁","李范文","杨振常","范宏贵"],"dates":[{"year":1957,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"大字报——“我们要鸣”","type":"title"},{"text":"中央民族学院杨振常李范文宋家丁范宏贵伊里奇佟树强","type":"authors"},{"text":"(杨振常、李范文、宋家丁、范宏贵、伊里奇、佟树强：中央民族学院历史系民族学研究班学生,“蜜蜂社”成员)","type":"subtitle"},{"text":"虽然春天已经来到了我们学校，但是人们还觉得有些寒意。我们学校的领导象个小脚女人似的欲进不前，果(裹)足趦趄。因此我们觉得必须大声疾呼！","type":"paragraph"},{"text":"据说语文系的领导者特别强调体会文件的精神，不敢号召大鸣大放？","type":"paragraph"},{"text":"学校的某位责责同志还自鸣得意的说：我们学校搞得很“稳”(？)","type":"paragraph"},{"text":"我们不能同意目前这种“稳”的情况。","type":"paragraph"},{"text":"我们要求的是波涛汹涌，而不是死水微澜！","type":"paragraph"},{"text":"为此，我们提出如下的建议，请领导予以考虑。","type":"paragraph"},{"text":"1．广泛发动群众，揭露学校矛盾；","type":"paragraph"},{"text":"2．广开言路，开僻争鸣园地，报导各单位争鸣情况。","type":"paragraph"},{"text":" 一群同学(1957．5．23)","type":"paragraph"}],"comments":[],"origin":"《关于“野草”、“蜜蜂”社反动小集团的材料》，中共中央民族学院整风办公室编，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccbe8822aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
