script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“这盐巴也是毛主席给我们土家带来的”","authors":["李永芬"],"dates":[{"year":1952,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“这盐巴也是毛主席给我们土家带来的”"},{"type":"paragraph","text":"编辑同志：陆德明是贵州省都匀县坝固乡羊亚村的生产委员，是少数民族“土家”族人。他在解放前是贫农，土地改革后分得了田地、房屋和耕牛。今年他响应了毛主席增产节约的号召，参加了互助组，积极生产。今年天旱，他和大家一起兴修水利，使自己仅有的五挑干田变成水田。稻子快成熟时，被风吹倒了，他们进行了抢收和抢晒。加上精耕细作，多施肥料，今年得到空前的丰收。他的每亩田产谷达八百八十斤，比去年（一般年成）增产百分之八十七点九。加上大麦、油菜籽等杂粮和副业收入，他今年收入的总值为五百一十万元。这笔收入除去全家六口人（大儿已参军不计在内）全年需要的吃粮、盐巴、土布及其他杂项开支，还余一百多万元。丰收给陆德明带来了从没有过的好生活。解放前他全家七口人，和牛住在一起。租种地主王中华家二十多挑田，每年除了交租，就没有了吃的。平时就只能吃些杂粮和糠皮，野菜煮的稀饭，有时就饿着肚子流眼泪。过去他们从来不知道什么叫棉衣和棉被，冬天就盖着稻草睡在柴火边。一边身子烤热了，反过身来烤另一边。今年呢？不仅米饭能够吃饱，而且还吃了十斤猪肉和二十斤猪油。至于棉衣、棉被都有了。今年的生活和过去特别不同的是：能吃上足够的盐巴了。解放前少数民族经常得忍受“斗米斤盐”的剥削，以致吃不上盐巴。今年陆德明就吃了五十斤盐。陆德明常说："},{"type":"paragraph","text":"“一端起饭碗就想起了毛主席，这盐巴也是毛主席给我们土家带来的”。　李永芬"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"519b6dcdda"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
