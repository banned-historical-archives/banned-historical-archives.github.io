art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国的胜利是毛泽东思想的胜利","authors":[],"parts":[{"type":"paragraph","text":"刚果（布）总统马桑巴一代巴的夫人十月二十六日上午在上海参观了上海手表厂后说，中国朋友所取得的进步，“证明毛主席的思想是正确的，自力更生的道路是一切被压迫人民取得解放和建设自己国家的真正道路。”她说，你们经过艰苦奋斗自己建设起一个表厂，这对我和刚果（布）人民是一个很大的鼓舞。刚果（布）人民十分钦佩你们取得的进步，并预祝你们取得越来越大的进步。"},{"type":"paragraph","text":"巴基斯坦全国报业托辣斯主席苏马尔在谈访华观感时说，中国人民有象毛泽东、刘少奇那样世界上杰出的人物当他们的领导人，确实很幸运。这些领导人在这短短的十几年中就使中国从被剥削的弱国变成一个进步的生气勃勃的世界强国。"},{"type":"paragraph","text":"也门萨那电台台长艾哈迈德·鲁埃尼对新华社记者谈到他最近访问中国的观感时说，全体中国人民在毛泽东思想的指导下为了中国和人类的幸福而自力更生地辛勤工作。"},{"type":"paragraph","text":"他在谈到中国在各方面的成就时说，“中国在短短的十六年中取得的伟大成就归功于毛主席的英明领导。中国人民在毛泽东思想指导下紧密团结。”他说：“中国的国际威望正在不断提高。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"838e756b95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
