":[{"year":1975,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年十月二十日电　邓小平副总理、乔冠华外长今天同美国国务卿兼总统国家安全事务助理亨利·基辛格博士举行了会谈。"},{"type":"paragraph","text":"美国方面参加会谈的有:美国驻中国联络处主任乔治·布什、国务院顾问赫尔穆特·索南菲尔特、负责东亚事务助理国务卿菲利普·哈比卜、国务院政策计划司长温斯顿·洛德、负责东亚事务助理国务卿帮办小威廉·格莱斯廷、中华人民共和国和蒙古事务处长安士德、国家安全事务委员会成员理查德·索洛蒙。"},{"type":"paragraph","text":"中国方面参加会谈的有:中国驻美国联络处主任黄镇、外交部副部长王海容，以及林平、唐闻生、钱大镛、丁原洪、赵稷华。"},{"type":"paragraph","text":"基辛格博士和夫人等美国客人今天下午参观了故宫博物院绘画馆，晚上应邀观看了北京京剧团演出的革命现代京剧《杜鹃山》。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6800ab8fe7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
