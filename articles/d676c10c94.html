  朱德董必武贺龙李井泉聂荣臻等领导人在成都向柯庆施同志遗体告别","authors":[],"dates":[{"year":1965,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"柯庆施同志的骨灰从成都运到北京"},{"type":"paragraph","text":"周恩来邓小平彭真李先念陆定一康生等领导人到机场迎灵"},{"type":"paragraph","text":"朱德董必武贺龙李井泉聂荣臻等领导人在成都向柯庆施同志遗体告别"},{"type":"paragraph","text":"新华社十一日讯　柯庆施同志的骨灰今天中午从成都由专机运来北京。骨灰盒移置劳动人民文化宫“柯庆施同志灵堂”内。首都各界人民从今天起，开始前往灵堂吊唁。"},{"type":"paragraph","text":"柯庆施同志的遗体十日在成都火化。火化前，在成都的党和国家领导人朱德、董必武、贺龙、李井泉、聂荣臻，向柯庆施同志的遗体告别。柯庆施同志病重时，他们曾多次前往探望。"},{"type":"paragraph","text":"今天，柯庆施同志的骨灰运来北京时，党和国家的领导人以及其他方面的负责人周恩来、邓小平、彭真、李先念、陆定一、康生、李雪峰、郭沫若、林枫、谢富治、徐冰、杨秀峰等，前往机场迎灵。到机场迎灵的，还有中共中央委员和候补委员，中共中央和国务院各部门的负责人，中国人民解放军高级将领，各人民团体的负责人，中共中央华北局和北京市的负责人。"},{"type":"paragraph","text":"柯庆施同志的骨灰盒从专机上捧出时，迎灵的人们全体肃立，乐队奏哀乐。"},{"type":"paragraph","text":"由成都护送柯庆施同志骨灰来北京的，有中共中央华东局、中共中央西南局、上海市、四川省的负责人陈丕显、廖志高、魏文伯、王一平，以及国务院秘书长周荣鑫，卫生部部长钱信忠等。"},{"type":"paragraph","text":"十日，在成都向柯庆施同志遗体告别的，还有中共中央华东局、中共中央西南局、上海市、四川省、成都市的党、政府、军队、各民主党派地方组织、各人民团体的负责人，国务院有关部门的负责人，成都市工人、农民、学生代表和机关干部。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"李先念","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d676c10c94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
