我们都叫做第三世界，是发展中国家。祝你们国家发展，人民幸福，整个非洲团结起来，打倒帝国主义。毛主席对穆萨·特拉奥雷上校的问候表示感谢，并向整个非洲人民问好。会见时，周恩来总理等在座","authors":[],"dates":[{"year":1973,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年六月二十二日电　我国人民的伟大领袖毛泽东主席，今天晚上会见马里共和国国家元首兼政府总理穆萨·特拉奥雷上校。"},{"type":"paragraph","text":"会见时，毛主席同马里国家元首穆萨·特拉奥雷上校紧紧握手，对他和其他马里贵宾远道来访表示热烈欢迎。"},{"type":"paragraph","text":"毛主席请马里贵宾在中南海自己的书房里就座。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"马里国家元首穆萨·特拉奥雷上校说他今天能够见到毛主席感到非常高兴。他代表马里人民和政府，向毛主席和中国人民表达最热烈的兄弟般的友好情谊，祝毛主席健康长寿。"},{"type":"paragraph","text":"毛主席说，我们都叫做第三世界，是发展中国家。祝你们国家发展，人民幸福，整个非洲团结起来，打倒帝国主义。毛主席感谢穆萨·特拉奥雷上校的问候，并向整个非洲人民问好。"},{"type":"paragraph","text":"会见时，国务院总理周恩来，工作人员齐宗华、罗旭、唐闻生在座。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\06\\736n010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席和马里共和国国家元首兼政府总理穆萨·特拉奥雷上校进行亲切友好的谈话。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\06\\736n010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e会见时情形。新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e72a108da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
