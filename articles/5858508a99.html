al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致洛审、李德电","alias":"","parts":[{"type":"paragraph","text":"致洛甫、李德电"},{"type":"paragraph","text":"（1935年12月5日）"},{"type":"paragraph","text":"我率三十一分队拟明六号动身来后方。德怀、林彪、子华三人须参加六号及七号的祝捷运动大会，定九号同朱理治来后方。开会地点以安塞为便。"},{"type":"paragraph","text":"完全同意李德同志对延川、延长的部署。一方面军十天内仍在原地集结训练，俟阎锡山情况明了后，再定向南或向东的方向。"},{"type":"paragraph","text":"[1]这是毛泽东致洛甫（张闻天)、李德电的主要内容。[2]朱理治，当时任中共陕甘省委书记。"},{"type":"paragraph","text":"[3]1935年12月3日，红十五军团副军团长刘志丹奉命率一部兵力到达延川，防止延川、延长黄河东岸国民党军西渡，并相机歼灭从肤施逃出之敌。同日，李德将这个部署电告彭德怀、毛泽东。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":100,"page_end":100},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5858508a99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
