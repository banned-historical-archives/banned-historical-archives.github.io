art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"更高地举起毛泽东思想的伟大红旗坚决把泰国人民武装斗争进行到底“泰国人民之声”电台指出，泰国共产党已经成为泰国人民同美帝和他侬卖国集团进行英勇斗争的领导核心？","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十四日讯 “泰国人民之声”电台二十三日发表评论说，高举马克思列宁主义、毛泽东思想伟大红旗的泰国共产党，已经成为泰国人民同美帝国主义和他侬——巴博卖国集团进行英勇斗争的领导核心。目前泰国革命人民正响应泰国共产党的号召，更高举起毛泽东思想伟大红旗，坚决把武装斗争进行到底。"},{"type":"paragraph","text":"评论说，泰国人民的革命，泰国民族的解放，泰国人民当前驱逐美国侵略者、推翻他侬——巴博卖国集团的任务，需要有象泰国共产党这样一个政党来领导，也只有泰国共产党才能带领工人阶级和广大人民群众去战胜美帝国主义和它的走狗。"},{"type":"paragraph","text":"评论说，在泰国共产党的正确英明领导下，泰国人民的革命事业正在蓬勃发展。泰国共产党为建党二十五周年发表的文告坚决表示“决心领导人民进行武装斗争，发动农民群众，建立农村根据地，坚持人民战争，以农村包围城市，最后夺取全国政权”。"},{"type":"paragraph","text":"评论说，泰国共产党在同以苏共领导集团为中心的现代修正主义的斗争中，在支持世界人民革命的斗争中，作出了自己的贡献。因此，她不仅在泰国人民中享有崇高的威望，在世界革命人民中也享有崇高的威望。"},{"type":"paragraph","text":"评论说，美帝和它的泰国仆从对泰共的迅速发展壮大怕得要死，因此疯狂地恶毒污蔑和攻击泰国共产党。泰国人民革命斗争越是发展，它们就越加紧造谣污蔑。但是，正如世界革命人民的伟大领袖毛泽东主席指出的，被敌人反对是好事而不是坏事。毛主席说，一个政党“如若被敌人反对，那就好了，那就证明我们同敌人划清界线了。如若敌人起劲地反对我们，把我们说得一塌糊涂，一无是处，那就更好了，那就证明我们不但同敌人划清了界线，而且证明我们的工作是很有成绩的了。”美帝和他侬卖国集团的恶毒污蔑和攻击，只不过是它们垂死挣扎的表现。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0facf07dca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
