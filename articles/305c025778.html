tes":[{"year":1976,"month":4,"day":18}],"is_range_date":false,"parts":[{"text":"张春桥给儿子的信","type":"title"},{"text":"亲爱的毛弟：","type":"appellation"},{"text":"这个月，我过得相当紧张。从南京到天安门广场，到处闹。四月五日，我到大会堂，如同亲眼看到匈牙利事件一样。从望远镜里，看得很清楚。当着邓小平的面，我 骂了他是纳吉，他态度恶劣，但没有话讲，只能点头。我有幸看到这个纳吉的丑恶末日，出了一点气。（这一段，别人不知道，你也不要吹出去）现在天下已定，正在扩大胜利。我感到上海现在镇压反革命劲头不足，不知道是什么原因。你到农场，要提高警惕。阶级斗争还是很复杂的，敌人不会认输。 寄来的信，都看了。退给你。二炮一封，我留下了。内容我大体知道，近来接到不少类似的信。祝你好。我身体尚好，勿念。","type":"paragraph"},{"text":" 爸爸四月十八日","type":"paragraph"}],"comments":[],"origin":"(根据红卫兵传单打印，原印者不详)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"305c025778"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
