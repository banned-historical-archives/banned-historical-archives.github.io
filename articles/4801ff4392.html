script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"四十一名华侨小英雄昨参观中共“一大”会址欢呼毛泽东思想传遍全世界他们住在国棉二厂，和工人一起吃饭，自己洗碗洗筷，睡草垫的地铺，参加搬碎石等劳动，决心和革命造反派共同搞好文化大革命","authors":[],"dates":[{"year":1967,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　四十一名华侨青少年英雄，昨天上午在上海参观了中国共产党第一次代表大会会址，受到了一次极其深刻的教育。小英雄们在参观后满怀激情地写道:毛主席所说的“星星之火，可以燎原”，是个颠扑不破的真理。现在，毛泽东思想的革命烈火，不但烧遍了全中国，而且正在亚非拉和全世界各地燃烧。未来的世界一定是红彤彤的毛泽东思想的共产主义世界!"},{"type":"paragraph","text":"小英雄们把参观中国共产党第一次代表大会会址，看作是“无比兴奋荣幸”的时刻。他们深深地懂得，有了毛主席亲手缔造和领导的中国共产党，中国才得到独立和富强，世界人民解放才有了希望，海外华侨才摆脱了"},{"type":"paragraph","text":"“孤儿”的悲惨命运，有了强大的靠山。他们在走进中共第一次代表大会会址时，按捺不住心头的激情，不断地高唱《爹亲娘亲不如毛主席亲》，不断地高呼“我们最敬爱的伟大领袖毛主席万岁!万岁!万万岁!”等口号。他们来到中共第一次代表大会会场，怀着对亲爱的党的炽烈感情，和接待人员一起认真地学习了毛主席语录。小英雄们仔细地听取接待人员的介绍，对陈列的毛主席早期编写出版的革命刊物和毛主席的手稿等，认真地看了一遍又一遍。参观快结束时，小英雄们欣喜地接受了珍贵的礼物——毛主席年青时的照片、“一大”会址照片等纪念图片。华侨青少年代表余亚周激动地说，受尽美帝国主义和印尼反动派压迫凌辱的海外华侨，最能体会到社会主义祖国的温暖。由我们伟大领袖毛主席亲自发动和领导的无产阶级文化大革命，是为了保卫我们革命先烈用鲜血换来的革命成果，使我们伟大的祖国千秋万代永不变色。我们坚决响应毛主席的伟大号召，认真学习上海无产阶级革命派的革命造反精神，把文化大革命进行到底。"},{"type":"paragraph","text":"又讯　住在国棉二厂的四十一名华侨青少年，到上海的第一天，就努力和革命工人打成一片，主动和工人一起吃饭，自己洗碗洗筷，睡草垫的地铺，还参加搬碎石等劳动。小英雄们说，我们不是客人，我们是来革命的，我们要和工人结合在一块，向上海革命造反派学习，一起生活、劳动，共同造反，搞好无产阶级文化大革命。工人们赞扬说，华侨小将们在国际阶级斗争战线上，发扬无产阶级硬骨头精神；在国内阶级斗争战线上，也不愧是毛主席的好战士，我们为有这样的无产阶级接班人感到高兴。昨晚，工人们举行了欢迎大会，和华侨小将亲切联欢，并向华侨小将介绍本厂斗争情况。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4801ff4392"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
