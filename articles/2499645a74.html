dates":[{"year":1947,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报天津六日专电】　中共参谋长华剑英顷保证美军撤退时，沿路中共部队决不开枪射击，并已分令各地中共军保护美军撤退人员。蔡文治曾于五日晚在北京饭店设宴为共方人员饯别，中共方面亦定今日于同时同地设宴回敬。(金)"},{"type":"paragraph","text":"【联合社北平五日电】军调部中共代表叶剑英今晚在政府代表之宴会席上语联合社记者称:美国之调解虽未促成和平，但军调部三方面代表团之关系，向来和睦。本人希望确保美国人安全到达大沽撤退地点云。按上星期大沽至北平间游击队活跃，袭击铁路沿线车站，并拆毁路轨，美国人乃准备用飞机撤退人员。延安方面昨日下令停止骚扰平津路，等于美军人员可经由铁路撤退之谓。"},{"type":"paragraph","text":"【本报天津六日专电】　军调部中共新闻处长黄华，五日偕同政府方面人员飞延，携取联络电台，定今日返平。黄氏并携有中共人员撤退名单，请延安当局作最后决定。叶剑英或将撤回延安，其他人员赴邯郸，哈尔滨者少数，大部均将西返。(金)"},{"type":"paragraph","text":"【本报北平六日专电】　关于军调部国共两方于解散前交换被扣人员事，据中共发言人称:政府人员之在共方者有十二战区连络员周北峰，渠现在延安，黄华去延安，或即可决定送周回去的办法。(木)"}],"comments":[],"origin":"本报,联合社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2499645a74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
