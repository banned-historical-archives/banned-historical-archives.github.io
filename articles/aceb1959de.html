ates":[{"year":1980,"month":1,"day":17}],"is_range_date":false,"authors":["胡乔木"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态: 1980(选编), 67","tags":[{"name":"大字报","type":"主题/事件"},{"name":"胡乔木","type":"主题/事件"},{"name":"新华社","type":"主题/事件"},{"name":"新闻","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"胡乔木同志的一封信"},{"type":"paragraph","text":"编者按：这是胡乔木同志写给新华社穆青、李普同志的一封信，提出新闻要客观地叙述事实，不要写成骂人的大字报。这个意见很重要。写其他文章，无论是对内对外，包括论战、批判的东西，同样都不要大字报化，而是应该摆事实，讲道理，以理服人。 穆青、李普同志：     建议新华社在国际新闻稿中取消“跳出来”、“抛出一个……”等字样。这些字样在新闻中毫无价值，只是贬低了新华社新闻的价值。新闻总是要客观地叙述事实，而不能成为“文化大革命”时期骂人的大字报。类似的字眼还有“疯狂”，近虽已少用，仍未绝迹。关于这个词似乎格林已批评得很中肯了。     以上请考虑。"},{"type":"subtitle","text":"胡乔木一月十七日（第12期，3月1日）"}],"alias":""},"tags":[{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aceb1959de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
