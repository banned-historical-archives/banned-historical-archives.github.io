ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对民主同盟工作的意见","alias":"","parts":[{"type":"paragraph","text":"对民主同盟工作的意见！"},{"type":"paragraph","text":"（1952年10月19日）"},{"type":"paragraph","text":"同意这个意见?。据吴晗?向我表示，民盟中央和北京支委各种会议，只谈人事，不谈工作，使他们感到极为苦闷。一个政治团体不谈工作，是无法维系成员的，也势必永远陷在人事纠纷中。此件中所说“找出参加和配合文教工作的办法”，是必要的。其他民主党派恐亦须解决此问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十九日"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央统战部部长李维汉1952年10月19日关于民主同盟的工作向毛泽东、中央书记处的请示报告上写的批语。"},{"type":"paragraph","text":"[2]指李维汉在给毛泽东、中央书记处的请示报告中提出的意见。报告说，民盟自前的中心问题有两个：一是民盟今后的活动，要找出怎样参加和配合国家的文教建设工作的办法，以发挥其可能发挥的积极作用；二是在民盟内外条件已有新的变化的情况下，要使其领导机关中各派的关系得到必要的调整。具体说应做好以下几点：（一）帮助进步分子端正政策；（二）找出参加和配合文教工作的办法；（三）领导成分适当调整；（四）积极参加学习。这几项如果做得好，民盟是可以在团结上、发展上和工作上都获得更多进步的。"},{"type":"paragraph","text":"[3]吴晗（1909—1969），浙江义乌人。当时任北京市副市长，中国民主同盟中央委员、北京市支部委员会主任委员。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":10,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":304,"page_end":304},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"对民主同盟工作的意见","description":"根据手稿刊印。","dates":[{"year":1952,"month":10,"day":19}],"parts":[{"text":"对民主同盟工作的意见","type":"title"},{"type":"paragraph","text":"同意这个意见。据吴晗向我表示，民盟中央和北京支委各种会议，只谈人事，不谈工作，使他们感到极为苦闷。一个政治团体不谈工作，是无法维系成员的，也势必永远陷在人事纠纷中。此件中所说“找出参加和配合文教工作的办法”，是必要的。其他民主党派恐亦须解决此问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十九日"}],"comment_pivots":[{"part_idx":0,"offset":10,"index":1},{"part_idx":1,"offset":6,"index":2},{"part_idx":1,"offset":10,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东在中共中央统战部部长李维汉一九五二年十月十九日关于民主同盟的工作向毛泽东、中央书记处的请示报告上写的批语。","指李维汉在向毛泽东、中央书记处的请示报告中提出的意见。报告说，民盟目前的中心问题有两个：一是民盟今后的活动，要找出怎样参加和配合国家的文教建设工作的办法，以发挥其可能发挥的积极作用；二是在民盟内外条件已有新的变化的情况下，要使其领导机关中各派的关系得到必要的调整。具体说应做好以下几点：（一）帮助进步分子端正政策；（二）找出参加和配合文教工作的办法；（三）领导成分适当调整；（四）积极参加学习。这几项如果做得好，民盟是可以在团结上、发展上和工作上都获得更多进步的。","吴晗（一九○九——一九六九），浙江义乌人。当时任北京市副市长，中国民主同盟中央委员、北京市支部委员会主任委员。"],"page_start":257,"page_end":257,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e8c357c41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
