art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席等接见参加国庆观礼的劳动模范、少数民族和部队代表","authors":["牛嵩林"],"parts":[{"type":"paragraph","text":"新华社五日讯 毛泽东主席同党和国家其他领导人刘少奇、朱德、邓小平、彭真、李富春、贺龙、陈伯达、薄一波、杨尚昆，今天下午接见了参加国庆观礼和在北京开会的我国各条战线的劳动模范、先进人物和少数民族的代表共二千五百多人。"},{"type":"paragraph","text":"接见的时候，全场一次又一次地发出雷鸣般的掌声。接见结束时，人们激动地欢呼“毛主席万岁！”热烈鼓掌达数分钟之久，充分表现了我国各族人民对我们伟大领袖的无限热爱。"},{"type":"paragraph","text":"被接见的是：参加国庆观礼的全国工业、交通、财贸、文教战线上的劳动模范和模范工作者，二十二个省区的少数民族参观团和少数民族青年学习参观团，中国人民解放军和中国人民公安部队的代表，以及参加中国人民解放军空军学习毛主席著作积极分子、四好单位、五好战士代表会议的全体代表。"},{"type":"paragraph","text":"左图 毛泽东主席等党和国家领导人接见部队国庆观礼代表时合影。本报记者"},{"type":"paragraph","text":"牛嵩林摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25d25367f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
