[{"year":1976,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"提高执行毛主席革命路线自觉性"},{"type":"paragraph","text":"中共吉林省永吉县阿拉底大队总支书记　金龙九"},{"type":"paragraph","text":"中共中央、人大常委会、国务院、中央军委关于建立伟大的领袖和导师毛泽东主席纪念堂的决定和中共中央关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定公布了。我们阿拉底大队朝鲜族人民受到极大的鼓舞，一致表示坚决拥护。"},{"type":"paragraph","text":"毛主席是我们各族人民的大救星。长白山高，比不上毛主席的恩情高；松花江的水长，比不上毛主席的恩情长。旧社会的阿拉底，在日本帝国主义和蒋介石匪帮的反动统治下，万户萧疏，满目凄凉，朝鲜族人民多灾多难。解放后，在毛主席的英明领导下，我们走上了社会主义的康庄大道。无产阶级文化大革命以来，广大社员抓革命，促生产，全大队粮食亩产逐年上升，从上《纲要》到过“黄河”，进一步跨过“长江”。公共积累达到一百八十万元。社员收入逐年增加，生活越来越美满。昔日贫穷落后的阿拉底，变成了欣欣向荣的社会主义新农村。我们的一切成就都是在毛主席英明的领导下取得的，都是毛泽东思想的胜利。"},{"type":"paragraph","text":"在中央两项重要决定的鼓舞下，我们决心掀起学习马列著作和毛主席著作的新高潮。我们党总支领导成员计划在明年九月九日以前，把《毛泽东选集》通读一遍，努力提高马克思主义的理论水平，提高执行毛主席的革命路线和政策的自觉性，坚持反修防修，把各项社会主义事业做得更好。当前，要学习毛主席关于无产阶级专政下继续革命的理论，深入批邓，继续反击右倾翻案风；学习毛主席关于“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，同搞修正主义、搞分裂、搞阴谋诡计的走资派作坚决斗争。我们决心最紧密地团结在以华国锋同志为首的党中央周围，一切听从党中央的指挥，坚持以阶级斗争为纲，坚持党的基本路线，抓革命，促生产，夺取社会主义革命和社会主义建设的更大胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"017c0f0c8a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
