script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"粉碎右倾机会主义的哲学观点西安哲学界对陈元方“论否定”一文的错误展开批判","authors":[],"dates":[{"year":1959,"month":11,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国科学院陕西分院哲学研究所，从10月上旬起，先后召集了西安地区哲学工作者二百余人举行会议，对于陈元方同志在一篇题为“论否定”的文章中所散布的修正主义观点，进行了深入地揭露和批判。"},{"type":"paragraph","text":"今年8月，陈元方同志在“人文杂志”第四期上发表了“论否定”一文，立即受到了西安地区哲学和社会科学界的批判。在批判会上，大家一致指出，陈元方同志“论否定”一文在理论上的主要错误是，在马克思主义哲学理论的词句掩盖下，宣扬了形而上学的否定观，用资产阶级庸俗进化论修正马克思主义的发展观。作者企图阉割马克思主义哲学关于否定理论的革命本质，为右倾机会主义分子在哲学上建立理论根据。"},{"type":"paragraph","text":"与会同志揭露，陈元方同志为了混淆马克思主义的继承观和革命观的根本界线，竟然毫无根据地认为，社会主义制度之所以优越，是因为继承了资本主义社会中“积极有用的东西”，这是从根本上否定了事物发展中的质变，否定了社会主义革命，这正是资产阶级的改良主义和庸俗进化论。"},{"type":"paragraph","text":"发言的同志还指出，“论否定”一文在方法论上是形而上学的折衷主义的诡辩论。作者指出既有肯定，也有否定，既反对这个，又反对那个，既反“左”，又反右，貌似不偏不倚，实质上是否定和歪曲事物和社会真正的发展，否认事物有主次之分，把本质和现象等量齐观。归根结底，强调继承，否认变革，强调量变，否认质变，强调反“左”，否定反右。"},{"type":"paragraph","text":"发言的同志一致认为，“论否定”一文是为右倾机会主义从哲学上建立理论基础。其实质是反对党的总路线，大跃进和人民公社，认为我们变革得多了，继承得少了，所以作者在这篇文章中大叫特叫继承，为右倾机会主义的反党活动给以理论的根据和支持。"},{"type":"paragraph","text":"批判会将于12月初继续举行。"},{"type":"paragraph","text":"(据陕西日报)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee892790fd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
