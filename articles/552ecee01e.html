art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们的心飞到了毛主席身边","authors":["空军战斗英雄鲁珉"],"parts":[{"type":"paragraph","text":"正当无产阶级文化大革命在全国轰轰烈烈展开的时候，传来了我们伟大领袖毛主席会见首都革命群众的消息，喜上加喜，我们真是一千个高兴，一万个高兴。"},{"type":"paragraph","text":"毛主席的指示，象春雷一样响彻四方；象春风一样，温暖着我们的心房。毛主席呀毛主席！我们虽然不在首都，但是，我们的心，飞到了您老人家的身边。我们仿佛看到了您慈祥的笑容，看到了您高大健康的身躯，我们感到无限喜悦，无限幸福。您虽然站在党中央接待站对着首都革命群众讲话，但是您宏亮的声音，迅速传遍了全国。"},{"type":"paragraph","text":"我们热烈欢呼这一具有伟大历史意义的会见。伟大的领袖毛主席最了解我们的心，最相信群众，最关心群众，最支持群众的革命行动。毛主席同我们心连心，毛主席是我们心中的红太阳。毛主席的伟大号召，我们字字听得真切。我们坚决听您的话，一定关心国家大事，誓把无产阶级文化大革命进行到底！我要和全军广大指战员一样，不但积极参加这场文化大革命，而且要坚决保卫这场文化大革命。我要更加认真地活学活用毛主席著作，以毛泽东思想为武器，横扫一切牛鬼蛇神，彻底消灭剥削阶级的旧思想、旧文化、旧风俗、旧习惯，创造社会主义的新思想、新文化、新风俗、新习惯，坚决将无产阶级文化大革命进行到底。RW：毛主席；会见群众"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"552ecee01e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
