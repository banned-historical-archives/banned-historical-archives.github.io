],"dates":[{"year":1964,"month":2,"day":13}],"is_range_date":false,"parts":[{"text":"林彪与刘亚楼、吴法宪的谈话","type":"title"},{"text":"[1964年2月13日（农历正月初一），空军司令员刘亚楼、政治委员吴法宪来毛家湾给林彪拜年，林彪与他们谈话。]","type":"paragraph"},{"text":"几年来，空军工作做得很好，经得起考验。空军高举毛泽东思想红旗，把中央、军委的指示和空军的具体情况结合起来了。你们的干劲很大，作风雷厉风行。空军党委团结一致，班子很强、很协调。空军领导机关可以作为一个标兵。","type":"paragraph"},{"text":"现在全国都在学习解放军，今年是非常重要的一年。我们的工作只能做好，不能松劲；只能前进，不能后退。我们一定要做出好样子，不能做出坏样子。","type":"paragraph"},{"text":"过去我们讲过，要时而抓连队，时而抓机关，当然主要是抓连队。过去抓了四好连队，现在要开始注意抓机关。空军机关工作搞得不错，内务、卫生也搞得很好。抓机关很重要，机关松松垮垮，连队工作也领导不好。我们抓住一个好的机关典型，对其他机关也是一个考试，对其他军种、兵种和各军区都有推动的作用。宣传空军领导机关这个典型，具有全军的意义。空军领导机关，毛泽东思想红旗举得高，四个第一抓得好，三八作风抓得好，基层抓得好，特别是抓住两头，工作雷厉风行，这是我们历来提倡的战斗作风。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"吴法宪","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fa2c9a5c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
