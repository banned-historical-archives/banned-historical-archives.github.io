ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"致中央工委电","alias":"","parts":[{"type":"paragraph","text":"致中央工委电"},{"type":"paragraph","text":"（1948年3月6日）"},{"type":"paragraph","text":"合并普察冀、普冀鲁豫两个中央局，成立北方局，有利无害。时机亦已成熟，拖下去无必要。我们意见即以中工委为中心合并两个中央局成为北方局，刘少奇兼任北方局第一书记，薄一波任第二书记，聂荣臻任第三书记。两区的军政两项机构，暂时不合并，但将财经逐步集中于华北财经办事处。华北财办实际上管两区财经，同时在政策方面领导华东、西北两区的财经。经过几个月，待党务及财经两方面工作在统一之后有了头绪，再将军事机构合并。待开全区人民代表大会，选出华北人民民主政府，再将两区政府合并。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致中央工委电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":138,"page_end":138},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61ffcca2a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
