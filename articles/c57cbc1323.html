script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《人民之声报》揭露苏修勾结西德出卖德国人民的新阴谋　支持德国人民反对西德军国主义的斗争　对于帝国主义、修正主义、西德复仇主义必须进行坚决斗争","authors":[],"dates":[{"year":1969,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》揭露苏修勾结西德出卖德国人民的新阴谋"},{"type":"paragraph","text":"支持德国人民反对西德军国主义的斗争"},{"type":"paragraph","text":"对于帝国主义、修正主义、西德复仇主义必须进行坚决斗争"},{"type":"paragraph","text":"新华社地拉那二十一日电　阿尔巴尼亚《人民之声报》最近发表社论，揭露苏修领导集团勾结西德军国主义、出卖德国人民主权利益的新阴谋，支持德国人民反对西德军国主义和复仇主义的正义斗争。"},{"type":"paragraph","text":"社论说，阿尔巴尼亚人民及其党和政府一贯勇敢地支持德意志民主共和国的权利，坚决地、始终不渝地赞同当年各社会主义国家共同作出的关于解决德国问题和西柏林问题的正确决定，并且准备签订和约，甚至同德意志民主共和国单独签订，作为保证德意志民主共和国、奥得—尼斯河边界和欧洲和平的必不可少的措施。苏修及其追随者过去和现在一直是采取与此截然相反的立场，出卖德意志民主共和国主权利益的阴谋正在有计划地策划着。"},{"type":"paragraph","text":"社论说，西德总理勃兰特所鼓吹的“向东方开放”的政策，受到苏修和其它修正主义头目们的热烈欢迎。苏修领导人首先和西德进行政治交易的会谈。十二月八日在莫斯科开始了苏联—西德会谈，作为朝着加强两国之间联系的方向迈出的新的一步。勃列日涅夫—柯西金集团十分重视这次会谈，指派外交部长葛罗米柯作为西德大使的对手。苏修竭力把这件事说成是好象他们同波恩会谈是为了消除美国和德国帝国主义对欧洲的威胁。他们需要这块幕布，以便为在会谈中向西德作出的让步辩解，而这种让步是有损于德意志民主共和国主权的。"},{"type":"paragraph","text":"社论指出，莫斯科修正主义头目们把德意志民主共和国放在自己的铁掌保护之下，装作要保卫德意志民主共和国不受德国复仇主义分子可能进行的威胁。毫无疑问，德意志民主共和国共产党人和人民是了解这个阴谋诡计的。"},{"type":"paragraph","text":"社论说，苏联修正主义者和其它修正主义者的整个行动，没有一点马克思列宁主义，没有一点原则性，而他们口头上挂着马克思列宁主义和原则性是为了掩饰他们的叛卖政策。他们的政策的实质是反马克思主义的，是帝国主义的。对于他们来说，各国人民的利益是毫无意义的。"},{"type":"paragraph","text":"社论说，我们党早已明确指出，而且生活也已经证实：帝国主义—修正主义的阴谋以及对西德复仇主义分子的怂恿，是对欧洲和平与安全的威胁。我们党已经不止一次地强调指出，对于这些势力，必须毫不犹豫地进行坚决的斗争。"},{"type":"paragraph","text":"社论最后说，阿尔巴尼亚人民相信，德国人民清楚地看到了威胁着他们的危险，他们将辨别好歹。我们两国人民的事业是共同的，我们在同一条战线上斗争，我们需要互相支持。我们告诉德国共产党人和人民，他们在为维护祖国利益的正义斗争中，将永远有阿尔巴尼亚人民和共产党人作为坚定和忠实的朋友。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c57cbc1323"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
