<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服右倾思想　灵活运用战术上海第三战役胜利结束打虎第四战役已展开采取“外面跑”　“内部找”“敌方缴”三路会攻的阵势","authors":[],"dates":[{"year":1952,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市市、区两级机关和人民群众团体的反贪污、反浪费、反官僚主义的斗争，经过坚决反右倾思想、扭转局势以后，已在二月底取得了很大的成绩。从三月一日起，全市各路围剿大贪污犯的大军，正奋勇前进，继续扩展胜利。"},{"type":"paragraph","text":"自二月十日以来，各路围剿大贪污犯的大军在坚决克服右倾思想基础上，掌握与运用了打虎的战术，日夜奋战，已于二月二十九日，胜利结束了第三个战役。并把许多妄图狡赖、负隅顽抗的大贪污犯越围越紧，迫使其陷于完全孤立。更重要的是，上海市各路围剿大贪污犯的大军各级领导方面和群众在历经两句的激烈斗争中，基本上克服了右倾思想，获得了捕捉贪污犯的丰富经验。"},{"type":"paragraph","text":"在过去两旬间的三大战役中，各路围剿大贪污犯的大军，所以获得如此辉煌的胜利，首先是坚决反对右倾思想，彻底打倒“思想老虎”，及时搬开了“石头”的结果。除了在全市打虎干部大会上搬掉一些“石头”以外，各单位也搬掉不少“石头”。如区青妇大队所属的蓬莱公安分局局长高新华手面不干净，压制群众，阻挠运动，自领导上给予高新华停职反省处分后，群情高涨，士气振奋，自二十六日中午至廿八日中午两天内就破获很多大贪污犯。第二，纠正了“小手小脚”的做法，依靠已掌握的充足可靠的材料，从大处着眼、重点着手，要撒开大网捕捉成群成窝的老虎。第三，深入调查研究，有重点有秩序地边打边搜集材料。第四，重点帮助情况复杂、力量薄弱的单位推动战局。第五，加强政治攻势，展开“攻心斗智”作战。文教、公安、政法、工会矢救会等大队特别注意了这项工作，对贪污分子、真诚悔过的贪污分子及其家属展开了一系列的政治攻势。"},{"type":"paragraph","text":"目前，上海市市、区两级机关和人民团体的反贪污斗争，已进入第四个战役。反贪污斗争日益深入，大贪污犯必将更其狡猾隐蔽，为了适应这样一个新的形势，为了取得打虎斗争的更伟大的胜利，所有打虎队员有勇之外更要有谋，必须大力施展“攻心斗智”战术；加紧做好敌情调查研究工作，抓紧时机总结经验；适当调整部署，采取“外面跑”、“内部找”、“敌方缴”三路会攻的阵势，向那些至今仍不坦白认罪的贪污犯展开一个更为猛烈的进攻。"},{"type":"paragraph","text":"上海市增产节约委员会已决心非把一切大小贪污犯彻底全部剿净，决不收兵。一切贪污犯应该立即正视人民政府这种除恶务尽的坚决意志，只有迅速醒悟，立功自赎，坦白供认自己的罪行和揭发别人的罪行，才可以得到人民政府的宽大处理。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81c3a466ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
