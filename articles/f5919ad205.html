<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"中央文革关于释放“联动”小头目的重要指示","parts":[{"type":"title","text":"718．中央文革关于释放“联动”小头目的重要指示"},{"type":"paragraph","text":"(1967年4月22日)"},{"type":"paragraph","text":"江青：昨天晚上开会，讲了关于释放“联动”小头目的事，不知你们参加没有？(有的参加了，有的没有参加)今天要把他们一起放了，给你们打个招呼！放了130个，有两个杀人犯没放了，他们有血债嘛！"},{"type":"paragraph","text":"给你们讲一下，不要歧视他们，要相信他们大多数是好改造的，应欢迎他们微小的进步，要允许他们出来活动，你们有个对立面好。"},{"type":"paragraph","text":"王大宾，你要帮助朱成昭，你就说，希望他们改正归队。(戚本禹：你说是江青同志讲的。)青年人，犯了错误，改正就行了，那有不犯错误的呢？年青人不要老认为自己一贯正确，如果这样，那就错了，要听反面意见，犯错误不能犯方向错误，犯了也没有什么关系，再回来么！不回头是不行的，“联动”就是犯了方向错误，是刘邓路线的必然产物，是封建世袭的东西，这是特殊阶段。"},{"type":"paragraph","text":"(讲北大附中斗彭小蒙的事)"},{"type":"paragraph","text":"彭小蒙受王任重的影响，主要是个人英雄主义，到了一个地方就是当然主席，就夺权，那怎么行呢？我曾两次批评过她。"},{"type":"paragraph","text":"戚本禹：你批评她，她也不听。"},{"type":"paragraph","text":"江青：她十七岁，不会一直滑下去的，不会固定不变的，不要斗她了，越斗越顶牛，对他们大多数是会转变的，对犯错误的人应正确对待。"},{"type":"paragraph","text":"你们现在打内战，原因之一就是你们青年人对己批评少，大民主是对自己的，要多做自我批评。"},{"type":"paragraph","text":"现在你们成了当权派了，看别人来轰你们吧！要受得住，你们说一句话，写一篇大字报，别人也要评一评。"},{"type":"paragraph","text":"相信“联动”他们会改的，“联动”主要受社会影响，是父母级别决定的。(有人问：有些“联动”分子父母是黑帮)"},{"type":"paragraph","text":"当然，他们少数人是会搞阶级报复的，但要相信大多数，父母不革命，儿子也可能革命么！我经常讲，孩子是人民财产，国家财产，不要把孩子当成自己的私产，有些干部、孩子才二岁，就给他一个箱子，装上手表、皮鞋，他看到的就是这些，脑子里装的就是这些，有的人对自己孩子非常娇，上学吃得好，还送好的去，回来还吃好的。我知道了，我要我的孩子不要那样，他们听了我的。要星星，要月亮，就是拿不下来，那怎么能行呢？这对孩子有害无益。"},{"type":"paragraph","text":"我们有许多老革命出身不好，但背叛了自己的剥削阶级家庭，革命了。要做工作，要告诉所有大专院校，要帮助他们，不要讥笑他们，那些个别搞阶级报复的也没关系，反复一下嘛！"},{"type":"paragraph","text":"姚文元：可能有反复，没有什么关系的，有好处嘛，没有右派哪有左派，没有反复，你们哪里能得到锻炼。"}],"authors":["姚文元","戚本禹","江青"],"dates":[{"year":1967,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":63,"page_end":64,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5919ad205"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
