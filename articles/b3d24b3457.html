art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"过好粉碎“四人帮”后的第一个春节三机炮连党支部认真安排好连队节日活动","authors":[],"parts":[{"type":"paragraph","text":"本报讯 八三二二三部队三机炮连党支部，发扬我党我军关心群众生活的光荣传统，亲自动手安排伙食，组织排演文艺节目，让战士过好粉碎“四人帮”后的第一个春节。"},{"type":"paragraph","text":"“四人帮”自己花天酒地，从不关心群众生活。三机炮连党支部批判了“四人帮”，对群众生活更加关心。春节快到了，他们召集经委会对节日伙食作了具体的研究和安排：广泛听取群众意见，订好食谱，做到吃饱吃好又节约，并注意照顾少数民族和不同口味的战士。节日期间，干部轮流帮厨，使炊事班劳逸适度。对来队亲属，更要接待好，照顾好。"},{"type":"paragraph","text":"党支部还组织连队演唱组，抓紧时间排练了十几个歌颂毛主席、歌颂华主席和批判“四人帮”的节目，其中有锣鼓词《毛主席的军事思想放光辉》、小演唱《华主席和我们心连心》、对口词《“四人帮”是祸国殃民的害人帮》等。除夕将召开文娱晚会，干部战士同台演出。他们还准备和驻地生产队搞一次联欢，让春节过得更加丰富多采，更加有意义。"},{"type":"paragraph","text":"党支部这样关心干部战士的春节生活，全连同志深受鼓舞，大家决心狠揭猛批“四人帮”，努力练好杀敌本领，用学习和工作的新成绩，迎接粉碎“四人帮”后的第一个春节。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3d24b3457"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
