art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入批邓推动各项战备工作的完成沈阳空军某部十连百倍警惕地保卫着祖国领空","authors":[],"parts":[{"type":"paragraph","text":"本报讯 沈阳空军某部十连党支部带领干部战士，认真学习毛主席的一系列重要指示，狠批邓小平炮制的“三项指示为纲”的修正主义纲领，痛击右倾翻案风，有力地推动了战备任务的完成。反击右倾翻案风的斗争开始以来，这个连战争值班没有错漏过一次情，取得了近年来的最好成绩，受到了上级的好评。"},{"type":"paragraph","text":"十连驻守在反修前哨阵地。反击右倾翻案风的斗争开始后，党支部认识到，反修前哨的革命战士，不仅要百倍警惕苏修可能对我发动突然袭击，做好战备工作，而且要高度警惕党内出修正主义，积极投入反击右倾翻案风的斗争。于是，党支部立即举办小型学习班，分批组织党员、干部和理论骨干学习毛主席关于文化大革命的一系列重要指示，首先使骨干认清这场斗争的性质和意义，统一思想认识。在这些骨干的带领下，指战员们认真学习马列和毛主席关于阶级斗争的重要论述，通过大会、小会，出墙报、板报，深入批判“三项指示为纲”的修正主义纲领。"},{"type":"paragraph","text":"批邓、反击右倾翻案风的斗争大大激发了干部战士为巩固无产阶级专政而搞好战备工作的积极性。连队军事训练抓得更紧了。大家自觉坚持严格训练、严格要求，不断提高军事技术。不久前的一天，大风暴突然袭击驻地，威胁着天线的安全。正在值班的干部战士纷纷冲出值班室，迎着暴风固定天线，终于保证了兵器安全。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42698a922b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
