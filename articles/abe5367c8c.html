art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"努力掌握马克思主义基本理论新疆军区某师党委成员决心以实际行动响应十大号召；更加认真地学习马列和毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"本报讯 新疆军区某师党委响应党的十大发出的“全党要认真学习马列著作和毛主席著作”的号召，决心更加刻苦地看书学习，努力掌握马克思主义的基本理论。"},{"type":"paragraph","text":"这个师党委的成员，在学习十大政治报告中关于“掌握马克思主义的基本理论，了解马克思主义同新老修正主义和各种机会主义斗争的历史”这一要求时，回顾了自己几年来看书学习的情况。前一段时间，他们学习马克思的《哥达纲领批判》，了解了马克思、恩格斯同机会主义分子拉萨尔的斗争情况；学习恩格斯的《反杜林论》，了解了马克思、恩格斯同机会主义分子杜林的斗争情况；学习列宁的《无产阶级革命和叛徒考茨基》，了解了列宁同叛徒考茨基的斗争情况。“历史的经验值得注意。”党委成员们体会到，了解马克思主义同新老修正主义和各种机会主义斗争的历史，对于增强识别真假马克思主义的能力、提高路线斗争觉悟，有着重要的意义。有一个党委成员，开始对林彪反党集团的出现，感到有些突然，但当他结合读书，了解了马克思主义同新老修正主义和各种机会主义斗争的历史后，懂得了党内路线斗争是社会阶级斗争在党内的反映，只要社会上还存在阶级和阶级斗争，党内路线斗争就不会停止；懂得了无产阶级的发展，总是在内部斗争中实现的道理。认识提高后，这个党委成员对出现林彪反党集团，就不感到奇怪了，而且对今后还会出林彪，还会出王明、刘少奇、彭德怀、高岗这一类人物，我们还要同这类人物作斗争，也有了精神准备。党委其他成员在学习中也都谈判，读了马列著作，了解了马克思主义同新老修正主义和各种机会主义斗争的历史，把林彪同拉萨尔、杜林、考茨基之流联系起来批判，对提高自己的识别能力，认清林彪修正主义路线的极右实质，帮助很大。"},{"type":"paragraph","text":"十大政治报告中提出，要在学习中“了解毛主席怎样把马克思列宁主义的普遍真理同革命的具体实践相结合，继承、捍卫、发展了马克思列宁主义”。师党委成员回顾了自己几年来把马列著作和毛主席著作结合起来学的情况，体会到，这样学，有助于加深理解和掌握马克思主义的基本理论，进一步认识毛泽东思想的伟大、正确，从而增强贯彻执行毛主席革命路线的自觉性。"},{"type":"paragraph","text":"大家表示，一定要以实际行动响应十大号召，更加刻苦地攻读马列著作和毛主席著作，使自己能够用马克思主义的基本理论武装起来。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abe5367c8c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
