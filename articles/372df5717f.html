art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高举总路线和毛主席军事思想的红旗奋勇前进","authors":["于志"],"parts":[{"type":"paragraph","text":"伟大的国庆十周年即将来到了，全国人民正以欢欣鼓舞的心情迎接这伟大的节日。十年来，我国的社会主义建设事业有了飞跃的发展。在党的总路线和毛主席军事思想的红旗的指导下，我军在建设现代化的革命军队方面，也取得了巨大的成就。为迎接伟大的节日，接受毛主席和国家领导人的检阅，汇报我军建设的成绩，由来自各院校、部队的英雄、模范、先进单位和人物组成的受阅部队，正在加紧训练和准备。"},{"type":"paragraph","text":"（本栏照片除署名者外均为本报记者摄）"},{"type":"paragraph","text":"这是参加受阅的军事学院的学员们。"},{"type":"paragraph","text":"先进工作者、五好水兵黄宝升（左）和二级技术能手陈君清在练习阅兵式。"},{"type":"paragraph","text":"在抗美援朝斗争中曾率领一个中队击落敌F—86型飞机十四架，荣立二等功的李世英（中）和飞行员们在地面练习编队。 于志摄"},{"type":"paragraph","text":"在受阅训练中曾数次获得优胜红旗的步兵一方队。"},{"type":"paragraph","text":"行进中的坦克群。"},{"type":"paragraph","text":"某部队三连在积极训练。这个连的前身是一个红军连队，在第二次国内革命战争时期曾强渡乌江天险。"},{"type":"paragraph","text":"在惩罚金门蒋军的战斗中荣立二等动的崔保海（右）和荣立三等功的李友仁在作受阅准备。"},{"type":"paragraph","text":"孤胆英雄白治贵在领导伞兵部队进行训练。"},{"type":"paragraph","text":"某部611站一级技术能手巩世材（右）在和战友们一起擦拭深照灯。"},{"type":"paragraph","text":"某部高炮三连优秀共青团员、下士班长赵应盛来到受阅部队准备接受检阅。他们全班在汕头前线打击蒋军入侵飞机时曾荣立集体三等功。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"372df5717f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
