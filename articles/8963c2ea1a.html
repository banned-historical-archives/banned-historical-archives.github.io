ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"接受蒙古大使苏诺姆·鲁布桑呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受蒙古大使苏诺姆·鲁布桑"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1957年5月17日）"},{"type":"paragraph","text":"我很高兴地接受蒙古人民共和国大人民呼拉尔主席团委任你为驻中华人民共和国特命全权大使的国书，并且向你表示热烈的欢迎。"},{"type":"paragraph","text":"蒙古人民在蒙古人民革命党和蒙古人民共和国政府的领导下，经过三十六年的努力，在建设社会主义的事业中获得了不少的成就，中国人民为此感到欢欣鼓舞。"},{"type":"paragraph","text":"几年来，中蒙两国人民的真诚的、兄弟般的友好关系，日益巩固和发展，中蒙两国在政治、经济、文化各方面的密切合作，不仅为两国人民带来了巨大的实际利益，并且对增进以苏联为首的社会主义大家庭的团结和维护世界和平的事业也具有重大意义。大使同志，在你为巩固和发展中蒙两国友谊和合作的工作中，一定能够得到我和中华人民共和国政府的全力支持。"},{"type":"paragraph","text":"我预祝你的工作获得成功。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":5,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":90,"page_end":90},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8963c2ea1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
