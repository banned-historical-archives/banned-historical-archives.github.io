tes":[{"year":1978,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席长征时居住过的扎西镇旧址和扎西会议会址开放"},{"type":"paragraph","text":"新华社昆明一九七七年十二月二十八日电　在纪念伟大领袖和导师毛主席诞辰八十四周年的日子里，毛主席长征时居住过的扎西镇旧址和扎西会议会址经修复已正式开放。"},{"type":"paragraph","text":"扎西镇坐落在云南群峰起伏的乌蒙山中。一九三五年二月，毛主席率领中央红军来到扎西，并在这里主持召开了遵义会议后第一次中央军委（扩大）会议。毛主席在会上作出了回师东进和在川滇黔地区开展运动战的英明决策。"},{"type":"paragraph","text":"这次开放的，有毛主席、周总理、朱委员长居住过的扎西旧址和扎西会议会址，还有新建的扎西红军长征纪念馆，展出了一百多件红军珍贵文物。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b4522d141"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
