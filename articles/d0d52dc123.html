:["刘少奇","刘涛","王光美"],"dates":[{"year":1966,"month":7,"day":3}],"is_range_date":false,"parts":[{"text":"刘涛揭发的王光美与刘少奇的讲话","type":"title"},{"text":"刘涛王光美刘少奇","type":"authors"},{"text":"（刘涛揭发：）在七月三日晚上我记得她（王光美）跟我讲过一次话……记得有这么几点：","type":"paragraph"},{"text":"一、要把蒯大富当活靶子打。","type":"paragraph"},{"text":"二、要把蒯大富他们一派搞成少数，批倒了他们才能巩固工作组的地位。三、资产阶级不给我们民主，我们也不给他们民主。","type":"paragraph"},{"text":"七月二十八日，刘少奇异常激动地对我和王光美说：","type":"paragraph"},{"text":"一、现在不是要检讨吗？要我到你们学校去检讨也可以，去就去，没有什么可怕的。","type":"paragraph"},{"text":"二、工作组的工作是当着大家的面做的。（意思就是说，是好是坏，大家都能检验出来。）","type":"paragraph"},{"text":"三、工作组现在也没有什么事情了，你们就劳动，帮助抄大字报，扫扫地，这样别的同学也就不会说你们当官做老爷了。四、蒯大富是自己跳出来的，而不是工作组把他打成反革命的。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王光美","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"刘涛","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0d52dc123"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
