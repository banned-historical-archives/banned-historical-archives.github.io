script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席著作闪金光（歌曲）","authors":[],"dates":[{"year":1966,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席著作闪金光"},{"type":"paragraph","text":"亿万人民高声唱  毛主席是我们心中红太阳"},{"type":"paragraph","text":"编者按：在汹涌澎湃的无产阶级文化大革命高潮中，广大工农兵、革命干部和革命知识分子高举毛泽东思想的伟大红旗，以雷霆万钧之势，对形形色色的牛鬼蛇神口诛笔伐，揭露和批判他们的反党反社会主义言行。在这战斗的时刻，广大群众很需要尽情地歌唱，歌唱我们伟大的党，歌唱我们伟大的领袖毛主席，歌唱战无不胜、攻无不克的毛泽东思想。用歌唱抒发革命情怀，激励战斗意志。"},{"type":"paragraph","text":"今天，我们向读者推荐一批新创作的歌曲。这些歌曲反映了广大工农兵、革命干部和革命知识分子的心情，表现了他们对毛主席、对毛泽东思想的无限忠诚和无限热爱，表现了他们对无产阶级革命的坚强斗志。"},{"type":"paragraph","text":"让我们大家唱起歌来，唱“毛主席著作指方向，道路指得明又亮，要问我走的哪一条路，永远革命跟着党”，唱“工农兵，心最红，革命路上打先锋”，唱“毛泽东思想是革命的宝，谁要是反对它，谁就是我们的敌人”！用一句句雄壮的歌声鼓舞革命战士，用一句句激昂的歌声横扫牛鬼蛇神！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5be187ac12"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
