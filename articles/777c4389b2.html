ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"推退总攻确庄诱敌深人","alias":"","parts":[{"type":"paragraph","text":"推迟总攻碾庄诱敌深人1]"},{"type":"paragraph","text":"（1948年11月16日）粟、陈、张，并告谭、王："},{"type":"paragraph","text":"碾庄3之敌四十四军、一百军已歼灭，二十五军、六十四军亦已各歼一部，并已定铣夜总攻碾庄，则现在已到令七纵、十纵、苏十一纵等部向后撤退，放敌东进之时机，而且似宜推迟一二天总攻，才能诱敌深入。究应如何，望酌情机断行之。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十六日三时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军代司令员兼代政治委员粟裕、参谋长陈士、副参谋长张震的电报。"},{"type":"paragraph","text":"[2]谭、王，指谭震林、王建安，当时分别任华东野战军山东兵团政治委员和副司令员。"},{"type":"paragraph","text":"[3]碾庄，镇名，位于江苏省邳县西部。[4]苏十一纵，指苏北兵团第十一纵队，纵队司令员胡炳云、政治委员"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":224,"page_end":224},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"777c4389b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
