<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"追逐利润、投机倒把、工厂相继停工……南斯拉夫经济陷于无政府状态","authors":[],"dates":[{"year":1958,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社贝尔格莱德16日电】　南斯拉夫“战斗报”最近发表了一篇题为“糖厂为什么停工?”的文章。从这篇文章提供的情况中可以看出，在“社会主义”的南斯拉夫的经济中，那种单纯追逐利润、投机倒把和生产的无政府状态如何在破坏着生产力的发展。"},{"type":"paragraph","text":"“战斗报”的文章写道:“目前在南斯拉夫有5家糖厂已经停工，另外还有2家糖厂也将停工。因此，今年糖的产量比去年减少了7万吨。为了满足需要，今年就必须从外国进口14万吨糖。”"},{"type":"paragraph","text":"文章承认，糖厂停工是因为缺乏糖萝卜。因为“近几年来糖萝卜的播种面积不断在缩减。今年就比去年少种了1万公顷。”"},{"type":"paragraph","text":"但是糖萝卜的播种面积为什么会不断缩小呢?“战斗报”的文章说:糖萝卜的价格对播种的多少是有刺激作用的。过去，曾由糖厂直接向生产者收购糖萝卜。但在两年以前，“合作社”和“业务协会”又来办理这项“业务”了。从那时起就经常发生争执。一方面工厂要自己收购，另一方面“合作社”和“业务协会”也做这项工作。文章说，不过，他们争作这一工作并不是为了保证工厂有足够的原料，而是为了“在这方面赚取更多的利润。”"},{"type":"paragraph","text":"文章指出，按规定，生产者每出卖一公斤糖萝卜，就要从售款中被扣除半个第纳尔(南币)作为“促进萝卜生产的基金”。文章接着写道:“但是关于这半个第纳尔以及由于谁是这项基金的主人问题，就进行了相当长期的、无边无际的讨论，举行了许多次会议，双方的代表进行了谈判，但是并没有找到某种令人满意的解决办法。”文章说，除了“合作社”和“业务协会”以外，甚至某些“公社”也想获得这笔基金。生产者面对这种情况，就不愿意播种糖萝卜了。"},{"type":"paragraph","text":"文章还指出:可是有些糖厂用贿赂“业务协会”的办法仍然“保证”了糖萝卜的供应。这篇文章在举出的事例中承认，弗尔巴斯和茨尔文卡两家糖厂今年曾把给“业务协会”的“消耗费”比原定每公斤的价格提高了0.2第纳尔，因而“业务协会”就保证了原料的供应。通过这种办法，“业务协会”单从这两家糖厂就赚得了9，200万第纳尔。"},{"type":"paragraph","text":"文章悲叹地说，现在已经是为明年签订合同的旺季了。但是大家接受今年的经验仍然不够。文章写道:“合同的签订工作进展很慢。据最新材料，现在糖厂只和生产者签订了约2500公顷的合同。如按生产计划，明年要生产27万吨糖的话，就应该播种9万公顷糖萝卜才行。”"},{"type":"paragraph","text":"文章还透露，在南斯拉夫“形成了奇怪的局面”，即原有的糖厂已经停工，而新的糖厂还正在建设中。"},{"type":"paragraph","text":"文章最后写道:“请多考虑我们全国的经济，少考虑狭隘的利益吧。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9212c4db57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
