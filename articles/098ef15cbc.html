script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚民主阵线发出告人民书  号召全民讨论新五年计划指示草案  要求一面全力建设社会主义一面警惕地反对帝国主义修正主义","authors":[],"dates":[{"year":1960,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚民主阵线发出告人民书"},{"type":"paragraph","text":"号召全民讨论新五年计划指示草案"},{"type":"paragraph","text":"要求一面全力建设社会主义一面警惕地反对帝国主义修正主义"},{"type":"paragraph","text":"新华社地拉那20日电　阿尔巴尼亚民主阵线全国委员会在19日号召工人、农民和人民知识分子，认真讨论和研究劳动党制定的发展阿尔巴尼亚经济和文化的第三个五年计划（1961—1965年）指示草案。全国委员会并号召他们提出意见和建议，以便提高工农业生产、缩短时间更好更省地进行建设和降低成本、提高质量。"},{"type":"paragraph","text":"这一号召是民主阵线全国委员会在一份告全国人民书中提出的。"},{"type":"paragraph","text":"告人民书中指出，第三个五年计划指示草案是一个历史性的文件，它反映了阿尔巴尼亚在第二个五年计划期间所获得的巨大成就，并确定了阿尔巴尼亚向社会主义进一步发展的道路。告人民书说，每一个工厂、农业合作社和生产单位都要挖掘潜力，以提高劳动生产率，增加生产。农业合作社社员、拖拉机手和农业工作者要采取一切措施，以尽早地和无损失地收获农作物，又快又好地完成秋种计划。"},{"type":"paragraph","text":"民主阵线全国委员会号召阿尔巴尼亚人民进一步团结到民主阵线的行列中来和加强钢铁般的团结，在光荣的劳动党的领导下，一方面动员一切力量来建设社会主义，一方面要求永远警惕地反对以美国为首的帝国主义，反对现代修正主义，特别是反对贝尔格莱德修正主义，它们仇视阿尔巴尼亚人民的历史性的胜利，并竭力阻碍他们获得胜利。"},{"type":"paragraph","text":"告人民书并号召阿尔巴尼亚人民为以苏联为首的社会主义阵营的巩固和钢铁般团结，为巩固和平作出贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"098ef15cbc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
