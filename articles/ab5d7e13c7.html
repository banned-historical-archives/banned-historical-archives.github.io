ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对刘少奇《给普缓同志的信》的批语","alias":"","parts":[{"type":"paragraph","text":"对刘少奇《给晋绥同志的信》的批语!"},{"type":"paragraph","text":"（1947年7月25日）"},{"type":"paragraph","text":"少奇同志这封信写得很好，很必要。少奇同志在这封信里所指出的问题，不仅是在一个解放区存在着，而是在一切解放区在不同的程度上存在着；他所指出的原则，则是在一切解放区都适用的。因此，应将这封信发到一切地方去，希望各地领导机关将这封信发给党政军各级一切干部，并指示他们研究这封信，用来检查自己领导下的一切群众工作，纠正错误，发扬成绩，彻底解决土地问题，改造一切脱离群众的组织，支持人民战争一直到胜利。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四七年七月二十五日"},{"type":"paragraph","text":"[1]刘少奇发出的《给晋绥同志的信》对晋绥一些地区群众运动问题作了指示。这是毛泽东对此信的批语。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":7,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":157,"page_end":157},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab5d7e13c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
