art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"林彪和苏修是一丘之貉五连把林彪的反革命罪行同苏修的反华反共反革命叫嚣联系起来批判；认清修正主义路线的极右实质","authors":[],"parts":[{"type":"paragraph","text":"本报讯 北京部队某部五连党支部在深入批林整风中，引导干部战士把林彪阴谋复辟资本主义的罪行同苏修社会帝国主义反华反共反革命的叫嚣联系起来批判，进一步认清林彪修正主义路线的极右实质。"},{"type":"paragraph","text":"伟大导师列宁指出：“机会主义不是偶然的现象，不是个别人物的罪孽、过错和叛变，而是整个历史时代的社会产物。”（《列宁选集》第二卷第六五四页）五连党支部联系现实斗争，学习列宁的教导，认识到，修正主义是一种国际现象。林彪修正主义路线是有其国际根源的。他们引导大家把林彪阴谋复辟资本主义的罪行同苏修反华反共反革命的叫嚣联系起来批判。如：在对待马列主义的态度上，苏修以“创造性地发展马列主义”为名，否定马列主义的普遍真理；林彪也竭力反对马列主义，胡说什么马列主义“过时”了，用各种卑劣的手段歪曲篡改马列主义，反对工农兵学习马列著作和毛主席著作。在对待社会主义制度上，苏修恶毒攻击我国社会主义制度这也不好那也不好；林彪也竭力诬蔑我国的社会主义制度，胡说什么“国民经济停滞不前”、“国富民穷”等。在对待无产阶级专政上，苏修竭力咒骂我国无产阶级专政是“军事官僚专政”；林彪也恶毒咒骂我们的无产阶级专政是“专制”、“独裁”等。在对待我们党的正确路线和政策上，苏修胡说什么我党的路线和政策是与马列主义“不相容”的；林彪则采取各种阴谋手段，妄图改变我们党的基本路线和政策。大家说，苏修除了散布种种反华谬论外，还赤裸裸地对我国进行颠覆和武装侵略；林彪大搞阴谋诡计，策动反革命政变，竭力为苏修效劳，成了苏修的“超级间谍”，死有余辜。"},{"type":"paragraph","text":"通过这样批判，大家清楚地看到，林彪与苏修叛徒集团完全是一丘之貉，林彪是跟着苏修指挥棒转的。从而进一步看清了林彪修正主义路线的极右实质和国际背景，更加认清了苏修社会帝国主义的反动本性。"},{"type":"paragraph","text":"三二五三部队五连党支部引导干部战士结合训练开展革命大批判。图为架线班的同志在批判林彪叛党投修的罪行。 马家清摄"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58cc5e983a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
