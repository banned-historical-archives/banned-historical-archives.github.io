torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"力求消灭敌一部","alias":"","parts":[{"type":"paragraph","text":"力求消灭敌一部\""},{"type":"paragraph","text":"（1936年11月8日）彭，并转张、朱，贺、任："},{"type":"paragraph","text":"甲、现在地区力求消灭敌一部，就是一、二个团也好。给此打击的作用有二：第一调动胡?部第一师增加到宁夏，以利尔后机动；第二使敌进得慢些，我在金灵才有余裕时间筹粮休息。"},{"type":"paragraph","text":"乙、打法仍以待其前进为妙，惟不必待周孔两师，打一个师亦好。望酌。"},{"type":"paragraph","text":"毛周"},{"type":"paragraph","text":"八号二十时"},{"type":"paragraph","text":"[1]这是毛泽东和周恩来给红军前敌总指挥兼政治委员、第一方面军司令员彭德怀的电报。"},{"type":"paragraph","text":"[2]张，指张国焘，当时任红军总政治委员。朱，指朱德。贺、任，指贺龙、任弼时，当时分别任红军第二方面军总指挥和政治委员。"},{"type":"paragraph","text":"[3]胡，指胡宗南，当时任国民党军西北“剿匪”总司令部第一路第二纵队（第一军）司令兼第一师师长。"},{"type":"paragraph","text":"[4]金，指金积，旧县名，1960年撤销，辖区裁入宁夏吴忠、青铜峡二市。灵，指宁夏灵武。"},{"type":"paragraph","text":"[5]周孔两师，指国民党军西北“剿匪”总司令部第一路第二纵队第四十三师和第九十七师，师长分别为周祥初和孔令恂。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":11,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":280,"page_end":280},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa3beff5c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
