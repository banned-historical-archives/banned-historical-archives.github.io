,"dates":[{"year":1965,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席接见朝鲜人民代表团"},{"type":"paragraph","text":"董副主席设便宴招待朝鲜贵宾"},{"type":"paragraph","text":"新华社二十八日讯　刘少奇主席今天下午接见了朝鲜民主主义人民共和国最高人民会议常任委员会副委员长、朝鲜拥护和平全国民族委员会委员长康良煜，和由他率领的朝鲜人民代表团团员：金洪玉、洪万基、慎重珣、金炳焕。"},{"type":"paragraph","text":"刘少奇主席同朝鲜贵宾进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有刘宁一、楚图南、韩念龙、魏传统等。"},{"type":"paragraph","text":"朝鲜驻中国大使朴世昌也在座。"},{"type":"paragraph","text":"新华社二十八日讯　董必武副主席今天中午在颐和园听鹂馆设便宴，招待以康良煜副委员长为首的朝鲜人民代表团全体成员。"},{"type":"paragraph","text":"董必武副主席和康良煜团长在宴会上亲切交谈，共同举杯祝中朝两国人民用鲜血凝成的战斗友谊万古长青。"},{"type":"paragraph","text":"刘宁一副委员长和有关方面负责人楚图南、韩念龙、魏传统、刘清扬等，出席宴会作陪。朝鲜驻中国大使朴世昌应邀出席了宴会。"},{"type":"paragraph","text":"今天上午，朝鲜贵宾游览了颐和园。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘宁一","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d77d87e35d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
