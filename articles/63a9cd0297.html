重庆","陈民锋"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"党组织赐给党员六件法宝","type":"title"},{"text":"重庆陈民锋","type":"authors"},{"text":"[编者按：陈民锋，旧职员成分。现在重庆市百货公司工作。这篇文章是对共产党员、共青团员、积极分子进行恶毒的污蔑丑化。]","type":"paragraph"},{"text":"党员不是真正特殊材料制成的，党赐给党员六件法宝：","type":"paragraph"},{"text":"1．合金饭碗：在高温热下，不会熔化。","type":"paragraph"},{"text":"2．直升飞机：青云直上，步步登天。","type":"paragraph"},{"text":"3．戒尺一把：高高在上，好为人师，你说得不对，给你一戒尺。","type":"paragraph"},{"text":"4．朝笏：直接面见君王的权利，","type":"paragraph"},{"text":"5．免死金牌：犯了错误、不受处分。","type":"appellation"},{"text":"6．上方宝剑：先斩后奏。","type":"paragraph"},{"text":"另外，赐给有党员阴阳枪、绣花鞋、录音机。","type":"paragraph"},{"text":"团员起了脱离群众的助手作用。","type":"paragraph"},{"text":"1．在运动中，党员是发号司令，团员是摇旗呐喊。","type":"paragraph"},{"text":"2．工资福利，先党员后团员。","type":"paragraph"},{"text":"积极分子特别突出，一看就会扬威耀武，有人说他们是腬电报，录音机、传话筒、积极分子是糟极分子，入党糟极，提拔整人糟极，积极只是批评别人积极，开会端板凳积极，工资福利积极。（本文题目是原编者所加）","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第二集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63a9cd0297"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
