es":[{"year":1954,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在离开广州回国之前印度总理尼赫鲁致电毛主席"},{"type":"paragraph","text":"【新华社三十日讯】　印度共和国总理尼赫鲁在离开广州返国前，致电中华人民共和国毛泽东主席。电文如下：毛泽东主席阁下："},{"type":"paragraph","text":"当我作了为时短促而令人怀念难忘的访问之后行将离开中国的时候，我希望再次对于我们所得到的殷勤款待和友谊，向您表示衷心的感谢。我认为这是我们两国和两国人民之间的友谊的象征，我希望我们两国之间的合作在对它们互利的情况下和在世界和平事业中增强起来。贾瓦哈拉尔·尼赫鲁"},{"type":"paragraph","text":"一九五四年十月三十日于广州"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e147eee8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
