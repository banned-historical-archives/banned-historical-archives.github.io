al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"西方野战军在西征战役第一阶段中的战果","alias":"","parts":[{"type":"paragraph","text":"西方野战军在西征战役第一阶段中的战果！"},{"type":"paragraph","text":"（1936年6月7日）"},{"type":"paragraph","text":"我野战军执行军委西征战役计划，左路军在曲子、阜城战斗，缴获马鸿宾师步枪一千二百余支，迫炮数门，俘敌冶旅长一，官兵千六百余人，占领洪德城、环县、曲子、阜城、三岔纵横约三百余里广大地区；右路军占领了宁条梁，打击三边、盐池一带地主武装，争取长城内外教民、蒙民数万拥护抗日红军，恢复并扩大了三边苏区版图。"},{"type":"paragraph","text":"目前，野战军已完成了第一步作战任务，正胜利地向西猛烈进展中。"},{"type":"paragraph","text":"[1]这是毛泽东和周恩来致红军第一方面军红二十八军军长宋时轮、政治委员宋任穷，红三十军军长阎红彦、政治委员蔡树藩，中共陕甘宁省委军"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":6,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":450,"page_end":450},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fef3d27507"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
