"authors":[],"dates":[{"year":1951,"month":11,"day":30}],"is_range_date":false,"parts":[{"text":"反贪污、反浪费是全党的一件大事","type":"title"},{"text":"邓小平同志，并告各中央局并请转分局和省市区党委：","type":"appellation"},{"text":"你于11月25日给我们的电报以及早已送来的1952年工作要点，均收到了，你们的方针和部署均好，我们均同意。除早已将西南局1952年工作要点转发你们参考外，现又将小平此电转发你们参考。此电第三项所提反贪污反浪费一事实是全党一件大事，自从东北局揭露大批的贪污犯以后，我们已告诉你们严重地注意此事。我们认为需要来一次全党的大清理，彻底揭露一切大中小贪污事件，而着重打击大贪污犯，对中小贪污犯则取教育改造不使重犯的方针，才能停止很多党员被资产阶级所腐蚀的极大危险现象，才能克服二中全会所早已料到的这种情况，并实现二中全会防止腐蚀的方针，务请你们加以注意。","type":"paragraph"},{"text":" 中央1951年11月30日","type":"paragraph"},{"text":"[邓小平，当时任中共中央西南局第一书记。这组文电中署名中央的电报，都是毛泽东起草的。文电标题均为编者所加]","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9c221a20a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
