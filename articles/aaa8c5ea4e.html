art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想用到哪里哪里灵","authors":["王里"],"parts":[{"type":"paragraph","text":"试问资产阶级“权威”老爷们，这样活学活用毛主席著作，是“简单化”、“庸俗化”、“实用主义”吗？很显然，你们大骂工农兵学习毛泽东思想是别有用心的，那就是你们反对伟大的党，反对伟大的毛泽东思想，你们害怕工农兵群众掌握了毛泽东思想，就要扫清一切牛鬼蛇神，打掉你们的“权威”“宝座”，你们企图复辟资本主义的美梦也就无法实现了。所以，你们对学习毛主席著作的群众运动，也就有着无比的恐惧和深仇大恨，禁不住要出来破口大骂了。“权威”老爷们，咒骂救不了你们的命。你们越仇视毛泽东思想，越攻击学习毛主席著作的群众运动，我们就越要热爱毛泽东思想，大学毛泽东思想。告诉你们，谁反对毛泽东思想，谁就是我们的敌人。不管他的“地位”多高，“权威”多大，我们也要坚决和他斗争到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aaa8c5ea4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
