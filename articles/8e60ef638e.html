es":[{"year":1950,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东号（中篇连载）"},{"type":"paragraph","text":"丁克辛  轻影作  庄言插图"},{"type":"paragraph","text":"十九、再想一想"},{"type":"paragraph","text":"一路上，他想着见了段长怎么说。"},{"type":"paragraph","text":"可是，一听见“毛泽东号”和别的机车的叫声，他就无心再细想。机车喷吐着一股股的黑烟白烟，忙着调度。三十多年来他净是和它们日夜相处的呀，这次下车知道会调到哪里去？他觉得更难受了。他不仅舍不得“毛泽东号”，他觉得连哪一台机车也离不开。离开了机车，活着似乎就一点意思也没有。这时刻，他突然发现原来机车比家庭、比老伴、孩子还可爱得多，重要得多，大米不大米，更不是什么了不起的事情了。"},{"type":"paragraph","text":"想到这里，他打算返回去；但一抬头，面前就是段长办公室。他犹豫了半天，终于咬了咬牙，决定先进去找张代表。"},{"type":"paragraph","text":"张代表请老英雄坐下，问他有什么事？"},{"type":"paragraph","text":"老英雄直截了当地说："},{"type":"paragraph","text":"“我请求下车，能力不够……”说着，想不到眼泪就流了出来。"},{"type":"paragraph","text":"张代表也紧张起来。最近他已经知道了“毛泽东号”的情形，正在研究解决办法。他们对这问题注意得不够，没有及时帮助处理，领导上要负责任，他把这个先对老英雄作了检讨。然后他说："},{"type":"paragraph","text":"“下车不是办法，有问题应想法解决。”"},{"type":"paragraph","text":"老英雄说："},{"type":"paragraph","text":"“我领导得不好，不能怪段上，我有错误！……”张代表先一检讨，他进一步觉悟到大米问题是自己不好。"},{"type":"paragraph","text":"张代表又安慰了他一番，说私买东西在解放以前本来算不了什么，纠察队处理得也有缺点，比如缺乏解释，机械了一些。又说到要把工作领导好，团结大家是很重要的，这方面今后要改进。"},{"type":"paragraph","text":"李永说："},{"type":"paragraph","text":"“不是说机车人员要大调整吗？把我调到别的车上就什么问题也没有了。”"},{"type":"paragraph","text":"张代表说："},{"type":"paragraph","text":"“领导方法如果不改进，到哪个车上也会有问题；只要改进了，在‘毛泽东号’还一样能搞好，你再想一想吧。”"},{"type":"paragraph","text":"李永出来的时候，仍然没有什么信心。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e60ef638e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
