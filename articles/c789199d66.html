":1954,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见蒙古政府代表团"},{"type":"paragraph","text":"【新华社二十七日讯】我中央人民政府毛泽东主席二十七日下午二时二十分，接见了应邀来我国参加建国五周年国庆典礼的蒙古人民共和国政府代表团团长、蒙古人民共和国大人民呼拉尔主席团主席扎·桑布，团员：蒙古人民共和国国防部部长桑·巴特中将，蒙古人民共和国驻我国特命全权大使奥其尔巴特，外交部交际司司长彭·沙格达苏伦，扎木图牧业生产合作社主任查·奥特亨。"},{"type":"paragraph","text":"接见时在座的，有我中央人民政府副主席刘少奇、李济深，秘书长林伯渠，政务院总理兼外交部部长周恩来，副总理董必武。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c789199d66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
