hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"八连颂","alias":"","parts":[{"type":"paragraph","text":"当中决定胜负的还是步兵、陆军。你们在战争中，敌人有无空军？奥：他们猛烈轰炸解放区。主席：作用大不大？奥：唯一的效果，就是敌人费了很多。主席：我们在解放战争中，国民党也会大编队轰炸延安，有一次，打死了一条猪，一个人也"},{"type":"paragraph","text":"没有打伤打死，另外一次，在乡下打死了两个老百姓。今天谈的太多了吧！奥：我们非常渴望听到毛主席的谈话。主席：我今天是谈了-一点历史，以后有机会再谈。"},{"type":"paragraph","text":"八连"},{"type":"paragraph","text":"头"},{"type":"paragraph","text":"（一九六三年八月一日）好八连，"},{"type":"paragraph","text":"天下传。为什么，"},{"type":"paragraph","text":"意志坚。为人民，"},{"type":"paragraph","text":"几十年。拒腐蚀，"},{"type":"paragraph","text":"永不沾。因此叫，"},{"type":"paragraph","text":"好八连。"},{"type":"paragraph","text":"要学习，解放军，"},{"type":"paragraph","text":"要自立。全军民，"},{"type":"paragraph","text":"不怕迫，不怕压，不怕刀，"},{"type":"paragraph","text":"不怕戟，"},{"type":"paragraph","text":"不怕魅，不怕鬼，不怕帝，"},{"type":"paragraph","text":"不怕贼。"},{"type":"paragraph","text":"如松柏。奇儿女，上参天，"},{"type":"paragraph","text":"傲霜雪。"},{"type":"paragraph","text":"如坚壁。纪律好，军事好，"},{"type":"paragraph","text":"如露露。"},{"type":"paragraph","text":"称第一。政治好，思想好，"},{"type":"paragraph","text":"能分析。"},{"type":"paragraph","text":"大有益。分析好，益在哪？"},{"type":"paragraph","text":"团结力。"},{"type":"paragraph","text":"军民团结如一人，试看天下谁能敌。.58·"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":71,"page_end":71},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b25ca70512"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
