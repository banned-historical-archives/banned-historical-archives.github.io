的批示（概要）","authors":[],"dates":[{"year":1976,"month":6,"day":18}],"is_range_date":false,"parts":[{"text":"中共中央办公厅印发毛泽东1964年关于官僚主义者阶级的一个批示","type":"title"},{"text":"1976年6月18日，中共中央办公厅将毛泽东的一个批示印发全党。批示是：“官僚主义者阶级与工人阶级和贫下中农是两个尖锐对立的阶级。”“管理也是社教。如果管理人员不到车间小组搞三同，拜老师学一门至几门手艺，那就一辈子会同工人阶级处于尖锐的阶级斗争状态中，最后必然要被工人阶级把他们当作资产阶级打倒。不学会技术，长期当外行，管理也搞不好。以其昏昏，使人昭昭，是不行的。”“这些走资本主义道路的领导人，是已经变成或者正在变成吸工人血的资产阶级分子，他们对社会主义革命的必要性怎么会认识足呢？　这些人是斗争对象，革命对象，社教运动绝对不能依靠他们。我们能依靠的，只有那些同工人没有仇恨而又有革命精神的干部。”这一批示是毛泽东1964年所作，此次印发，目的是批判邓小平。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca015ae1f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
