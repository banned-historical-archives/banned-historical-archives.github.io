" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"贵州省人民政府人民监察委员会关于对睛隆县原三区捏造“破坏土改同盟军”假案有关人员的处分决定","authors":[],"dates":[{"year":1953,"month":5,"day":28}],"is_range_date":false,"parts":[{"text":"贵州省人民政府人民监察委员会关于对睛隆县原三区捏造“破坏土改同盟军”假案有关人员的处分决定","type":"title"},{"text":"一、该县原三区鲁打乡代理乡长陈谨修，在工作中一贯违法乱纪，吊打群众，体罚村干部，诱欺妇女，歪曲并破坏民族政策与土地改革政策，对批评者打击报复，制造假案，陷害乡干事龙荣礼、农民龙荣锡，以致造成当地人民群众生命、自由的严重损失和革命秩序的严重混乱，并且欺骗、压制广大群众，抗拒上级检查，其违法乱纪已达极点。为严肃国法政纪，决定予以撤职并送司法机关严惩。","type":"paragraph"},{"text":"二、该县公安局代理审讯股长梅东园对被害人直接进行诱供、刑讯逼供，捏造“破坏土改同盟军”罪名，有意制造和扩大假案，陷害广大无辜群众，混乱革命秩序决定予以撤职并送司法机关法办。","type":"paragraph"},{"text":"三、该县第三区副区长姬毅，支持陈谨修的违法乱纪行为，并以“鲁打乡反革命组织又联系到中营”为题，向上级做假报告，扩大了假案基础；最后更直接掌握、指挥破获第三期“破坏土改同盟军”假案，迫害无辜群众，进行诱供、刑讯逼供，擅自逮捕无辜群众69人；在善后工作中，又扣发救济粮，强迫被救户向欠粮户催收尾欠以作救济，使被救户不能及时得到粮食。决定予以撤职并送司法机关法办。","type":"paragraph"},{"text":"四、前任晴隆县县长何祖岳，轻信下级假报告，纵容陈谨修等的违法乱纪行为；在真情揭露后，仍不认真进行检讨，而企图推卸责任于别人，决定予以撤职。","type":"paragraph"},{"text":"五、被害的乡干事龙荣礼、农民龙荣锡等，以及因此案而无辜被捕被押的群众，应予以抚恤、慰问和救济。","type":"paragraph"}],"comments":[],"origin":"1953年5月28日《新黔日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60a99a8408"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
