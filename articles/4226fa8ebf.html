script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿驻朝大使举行宴会庆祝解放日  金光侠说阿尔巴尼亚人民反帝反修正主义斗争保卫了社会主义事业　阿利麦尔科说阿尔巴尼亚支持朝鲜人民的争取和平统一祖国的斗争","authors":[],"dates":[{"year":1961,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿驻朝大使举行宴会庆祝解放日"},{"type":"paragraph","text":"金光侠说阿尔巴尼亚人民反帝反修正主义斗争保卫了社会主义事业"},{"type":"paragraph","text":"阿利麦尔科说阿尔巴尼亚支持朝鲜人民的争取和平统一祖国的斗争"},{"type":"paragraph","text":"据新华社平壤29日电　阿尔巴尼亚驻朝鲜大使阿利麦尔科为庆祝阿尔巴尼亚解放十七周年，今天晚上在平壤举行宴会。朝鲜党政领导人李孝淳、金光侠、李周渊、河仰天出席了宴会。出席宴会的还有朝鲜最高人民会议常任委员会副委员长白南云、最高人民会议议长崔元泽，各政党和社会团体负责人，外务相朴成哲、贸易相李一卿、高等教育相金钟恒、文化相朴雄杰和内阁其他各相，以及朝鲜人民军高级将领。"},{"type":"paragraph","text":"中国驻朝鲜大使馆临时代办刘祥纶、越南驻朝鲜大使郑辉光、古巴驻朝鲜大使阿兰古连也出席了宴会。"},{"type":"paragraph","text":"阿利麦尔科和朝鲜内阁副首相金光侠先后在宴会上讲话。"},{"type":"paragraph","text":"金光侠在讲话中指出：“阿尔巴尼亚人民为反对帝国主义者及其走狗南斯拉夫修正主义者的各种阴谋活动进行坚决的斗争，光荣地保卫着和平和社会主义事业。在为社会主义事业的艰苦斗争中所取得的这一切成就，是阿尔巴尼亚人民在阿尔巴尼亚劳动党的正确领导下发挥了创造热情和劳动斗争的结果。”"},{"type":"paragraph","text":"金光侠着重指出，“朝鲜人民和阿尔巴尼亚人民之间的兄弟友谊，是在伟大的社会主义阵营大家庭中，在马克思列宁主义和无产阶级国际主义原则的基础上，巩固和发展起来的。”他说，“我们珍视我们两国人民的友谊和团结，并且确信，今后这种友谊和合作关系将通过为社会主义和共产主义事业的共同斗争，得到更加巩固和发展。”"},{"type":"paragraph","text":"阿尔巴尼亚大使阿利麦尔科在讲话中说，阿朝两国人民虽然相隔万里，但是他们亲密地团结一致，在社会主义阵营中沿着建设社会主义和保卫世界和平的道路，向同一个目标携手并进。"},{"type":"paragraph","text":"他说，阿尔巴尼亚人民完全支持朝鲜人民为争取美国军队撤出南朝鲜以及和平统一国家的正义斗争，并对朝鲜人民在朝鲜劳动党和朝鲜政府领导下在社会主义建设中所取得的成就感到非常高兴。"},{"type":"paragraph","text":"宴会在热烈友好的气氛中进行。宾主不断为社会主义阵营牢不可破的团结一致、为阿尔巴尼亚和朝鲜两国的党政领导人霍查同志、金日成同志的健康而干杯。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4226fa8ebf"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
