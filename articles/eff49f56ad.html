art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的指示是连队革命化建设的指路明灯","authors":["北京部队某团四好政治处"],"parts":[{"type":"paragraph","text":"今天，我们热烈庆祝伟大领袖毛主席视察华北、中南和华东地区一周年。回顾一年来我们政治处抓基层、抓四好的战斗历程，我们深刻地认识到，毛主席的指示是无产阶级文化大革命的指路明灯，也是连队革命化建设的指路明灯。事实证明：哪个连队对毛主席的伟大战略部署跟得紧，对毛主席的指示落实得好，干部战士就会有很高的阶级斗争和路线斗争觉悟，就会有很高的理论水平和政策水平，就会创造真正过硬的四好连队。我们团的高机连从文化大革命开始，就紧跟毛主席的伟大战略部署，狠抓毛主席指示的落实，连续三年被评为四好连队，两年被树为师、团活学活用毛泽东思想先进集体。高机连的情况说明，只有紧跟毛主席的伟大战略部署，坚决落实毛主席的一系列指示，才能跟上不断发展着的形势，使四好连队运动朝着正确的方向胜利前进。"},{"type":"paragraph","text":"无产阶级文化大革命的新形势，给我们政治机关提出了新的重大任务，这就是保证毛主席指示在连队全面落实，促进四好连队运动的新发展。我们在机关工作中突出地强调落实毛主席指示是压倒一切的中心工作。要用毛主席的最新指示统帅业务，统帅一切。只要毛主席最新指示一下达，全处人员就全力以赴，分头下到连队、哨所传达、落实。不久以前，正在连队蹲点的机关干部，从广播里听到毛主席的最新指示：“大学还是要办的，我这里主要说的是理工科大学还要办，但学制要缩短，教育要革命，要无产阶级政治挂帅，走上海机床厂从工人中培养技术人员的道路。要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。”不待上级布置，就主动组织部队大学大用，使毛主席的最新指示深入人心，迅速在连队落实。"},{"type":"paragraph","text":"自从毛主席发出“人民解放军应该支持左派广大群众”的伟大号召以来，我们政治处长期抽出三分之一的人员参加“三支”“两军”工作，任务加重了。当我们发现机关干部露出“人手少、下不去”的思想苗头以后，就反复组织大家学习了毛主席关于“国家机关的改革，最根本的一条，就是联系群众”的教导和林副主席关于机关要面向连队的指示。大家认识到：无论机关人员多少，都应该深入连队狠抓落实。我们采用蹲点和跑面相结合的方法，深入连队宣传、落实毛主席的最新指示，帮助连队解决各种困难问题。当毛主席关于“办学习班，是个好办法，很多问题可以在学习班得到解决”的最新指示下达后，部队办毛泽东思想学习班的积极性很高，班、排办，党、团小组办，连里也办。我们就及时帮助通信连总结了办好学习班的经验，向各连推广。我们还先后推广了五连开展学习毛主席一条指示举行一次讲用会，七连紧跟毛主席的伟大战略部署抓好现场革命大批判等二十四个典型经验，受到了连队的欢迎。此外，我们还建立和健全了团的通讯报道组，成立了毛泽东思想文艺宣传队，在军队内外大张旗鼓宣传部队落实毛主席最新指示、活学活用毛泽东思想的好典型、好经验，鼓舞部队步步紧跟毛主席的伟大战略部署，全面落实毛主席的指示，有力地加强了连队建设，使四好连队运动的形势越来越好。今年初评，四好单位比去年增长了百分之二十五，五好战士的数量和质量也比去年有了很大提高。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eff49f56ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
