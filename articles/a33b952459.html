0,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘汉民在《毛泽东思想研究》今年第3期上撰文阐述毛泽东诗词的人格美。文章说，毛泽东诗词，实在写出了毛泽东本人的崇高伟大的人格。诗词中的人格美，突出表现在:一、爱国主义的情操美。这是一个十分突出而重要的内容，它构成毛泽东诗词人格美的一个激动人心的层面。二、共产主义的理想美。它表现为两个方面的共产主义精神特质:一，开阔、高远的视野；二，乐观主义的情怀。这是毛泽东诗词中的人格力量之所在。三，挑战、无畏的性格美。可以说，毛泽东终其一生，是从未停止去挑战的。他的这种性格特征在他的诗词里表现得特别地充分与鲜明。毛泽东诗词中表现出的另一个十分鲜明而突出的性格特征是无畏。这种挑战、无畏的性格是毛泽东诗词人格美的异彩煜煜的部分，是中华民族性格美的浓缩与结晶。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a33b952459"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
