art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"比利时国王来我国进行正式访问彭真代表叶剑英委员长主持欢迎仪式","authors":[],"parts":[{"type":"paragraph","text":"据新华社5月25日讯 应我国人大常委会和国务院的邀请，比利时国王博杜安一世和王后法比奥拉·德莫拉—阿拉贡陛下今天下午乘专机到达北京，开始对我国进行正式访问。"},{"type":"paragraph","text":"博杜安一世是第一位来我国访问的比利时国家元首。"},{"type":"paragraph","text":"人大常委会副委员长彭真和夫人张洁清，副委员长彭冲和国务院副总理谷牧到机场迎接比利时贵宾。"},{"type":"paragraph","text":"下午四点，比利时贵宾乘坐的专机徐徐降落在飘扬着中比两国国旗的首都机场上。当博杜安一世和王后走下铺着红地毯的舷梯时，彭真和张洁清同他们热情握手。两名儿童向国王和王后献了花束。"},{"type":"paragraph","text":"彭真代表叶剑英委员长主持了在机场上举行的隆重欢迎仪式。军乐团先后奏比利时和中国国歌。博杜安一世由彭真陪同，检阅了中国人民解放军陆海空三军仪仗队。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9551c9ee17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
