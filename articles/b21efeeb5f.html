作的通知","authors":[],"dates":[{"year":1956,"month":4,"day":28}],"is_range_date":false,"parts":[{"text":"国务院关于对清产核资进行一次复查工作的通知","type":"title"},{"text":"私营企业实行全行业公私合营以后，对企业财产的清理估价，各地大体上采取资本家自估、自报、同业互评等方式，工作一般进行得很顺利。但根据各地情况，一般有偏低现象。造成偏低原因，主要是资本家表示积极，故意压低，也有的心存疑虑，宁低勿高；其次是同业互评时，彼此挤压；而职工、干部在协助监督时，怕国家吃亏，抓得比较紧。","type":"paragraph"},{"text":"对企业进行清理估价，确定私方股额是国家处理资产阶级的生产资料的一项重要工作，应该实事求是，公平合理地处理，尽量了结。他们估低了财产，并不合乎国家政策的要求，对我们非但无利，而且在政治上有害。","type":"paragraph"},{"text":"因此，各地对资本家的财产清理估价工作，如果尚未结束，应该坚决贯彻上述既定的方针，如果已经结束，应当根据具体情况，有重点地进行一次复查。在当地，先找出问题较为突出需要加以调整的若干行业，深入了解情况，摸清问题所在，加以改正；然后，对其他行业需要加以调整的，都应加以调整。","type":"paragraph"},{"text":"复查工作不要形成普查，也不是进行“纠偏”。复查的时候，要向资本家和职工、干部进行充分的宣传教育工作，交代政策，实事求是地进行。","type":"paragraph"},{"text":"复查的情况和问题，请随时电告国务院第八办公室。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b21efeeb5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
