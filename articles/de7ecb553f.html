ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"致起义海军官兵电","alias":"","parts":[{"type":"paragraph","text":"致起义海军官兵电\""},{"type":"paragraph","text":"（1949年5月18日）林遵将军、邵仑舰长，李宝英舰长、吴建安舰长、张家宝舰长、宋继宏舰长、易元方舰长、郭秉衡舰长、韩廷枫舰长、陈务笃舰长、杜澄深队长、张汝队长和第二舰队的全体员兵们："},{"type":"paragraph","text":"庆祝你们在南京江面上的壮举。你们率领二十五艘舰艇，毅然脱离反动阵营，参加到中国人民解放军的大家庭来，这是值得全国人民热烈欢迎的行动。在巡洋舰重庆号于二月间起义并被国民党反动派于三月间炸毁以后，四月间又有你们的大规模起义，可见中国爱国人民建设自已的海军和海防的伟大意志，不是任何反动残余所能阻止的。希望你们团结一致，学习人民解放军的建军思想和工作制度，并继续学习海军技术，为中国人民海军的光明前途而奋斗！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"朱德"},{"type":"paragraph","text":"一九四九年五月十八日[1]1949年4月，原国民党海军第二舰队司令林遵等率全体官兵举行起"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":407,"page_end":407},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de7ecb553f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
