ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于请班禅来京参加国庆问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于请班禅来京参加国庆问题的批语2]"},{"type":"paragraph","text":"（1959年9月4日）少奇、恩来、彭真同志："},{"type":"paragraph","text":"现离国庆只有二十几天了，宜劝班禅于九月十五日以前回拉萨，准备于九月二十日左右飞兰州，下旬来京参加国庆。如何，请酌定。张国华宜于九月十日以前返回拉萨。请彭找张谈一下，准备起程。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月四日"},{"type":"paragraph","text":"[1]班禅，即班禅额尔德尼·确吉坚赞，原西藏地方宗教和政治领袖之一。当时任全国人大常委会副委员长、西藏自治区筹备委员会代理主任委员。"},{"type":"paragraph","text":"[2]这个批语写在中共西藏工委1959年8月29日关于班禅额尔德尼·确吉坚赞等在日喀则开展民主改革的一些情况给中央的报告上。"},{"type":"paragraph","text":"[3]彭真，当时任中共中央政治局委员、中央书记处书记。"},{"type":"paragraph","text":"[4]张国华，当时任中共西藏工委副书记、中国人民解放军西藏军区司令员。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":340,"page_end":340},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"张国华","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d07dffff10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
