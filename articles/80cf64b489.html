],"dates":[{"year":1978,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十二月六日电　中华人民共和国全国人民代表大会常务委员会委员长叶剑英十二月五日复信民主柬埔寨国家主席团主席乔森潘，表示坚决支持柬埔寨人民反对越南扩张主义者侵略的正义斗争。复信全文如下:"},{"type":"paragraph","text":"金边民主柬埔寨国家主席团主席乔森潘同志尊敬的主席同志:"},{"type":"paragraph","text":"我收到了您一九七八年十一月二十四日的信件。柬埔寨人民为了捍卫自己国家的独立、主权、领土完整和民族尊严的斗争是正义的。中国政府和中国人民完全支持您代表民主柬埔寨政府在信中所表达的严正立场，坚决支持柬埔寨人民反对越南扩张主义者侵略的正义斗争。你们的斗争已经并正在得到世界人民越来越广泛的同情和支持。我们深信，柬埔寨人民在柬埔寨共产党的领导下，一定能够打败越南的侵略，赢得最后的胜利。"},{"type":"paragraph","text":"顺致最崇高的敬意。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　叶剑英"},{"type":"paragraph","text":"一九七八年十二月五日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80cf64b489"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
