rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中巴两国签订边界问题协定毛主席接见巴基斯坦代表团","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社3日讯 毛泽东主席今天下午接见巴基斯坦外交部长佐·阿·布托，以及由他率领的巴基斯坦政府代表团成员：巴基斯坦驻中国大使罗查，巴基斯坦政府新闻、广播部秘书库·夏哈布，外交部司长哈拉斯，测绘总局局长阿·拉·库雷希等。"},{"type":"paragraph","text":"毛泽东主席同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有国务院总理周恩来，外交部副部长耿飚，我国驻巴基斯坦大使丁国钰，外交部第一亚洲司副司长程之平，礼宾司副司长葛步海。"},{"type":"paragraph","text":"据新华社2日讯 “中华人民共和国政府和巴基斯坦政府关于中国新疆和由巴基斯坦实际控制其防务的各个地区相接壤的边界的协定”，今天下午在北京签字。根据协定的规定，协定自签字之日起生效。"},{"type":"paragraph","text":"刘少奇主席、周恩来总理参加了在人民大会堂举行的隆重签字仪式。"},{"type":"paragraph","text":"下午三时二十分，中华人民共和国外交部部长陈毅和巴基斯坦政府代表团团长、外交部部长佐·阿·布托，分别代表两国政府在协定上签了字。"},{"type":"paragraph","text":"中国方面参加签字仪式的还有，全国人民代表大会常务委员会副委员长彭真、陈叔通、林枫，国务院副总理贺龙、李富春等。"},{"type":"paragraph","text":"巴基斯坦方面参加签字仪式的，有巴基斯坦政府代表团成员。"},{"type":"paragraph","text":"签字以后，双方热烈握手，举杯祝贺。"},{"type":"paragraph","text":"全国人民代表大会常务委员会第八十五次会议曾经决定，派中华人民共和国外交部部长陈毅为全权代表签定这个协定，并决定这个协定自签字之日起生效。"},{"type":"paragraph","text":"毛泽东主席和佐·阿·布托外交部长亲切谈话。右为巴基斯坦驻华大使罗查。"},{"type":"paragraph","text":"新华社记者 吕厚民摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e41a88c0f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
