<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"竞争和生产无政府状态是同一个规律吗?","authors":["张文贤"],"dates":[{"year":1980,"month":10,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"斯大林同志在《苏联社会主义经济问题》一书中，把资本主义的竞争和生产无政府状态说成是同一个规律。我认为竞争和生产无政府状态不是同一规律。这是因为，竞争和生产无政府状态的客观基础是不同的。竞争的客观基础是商品生产，而生产无政府状态的客观基础是生产社会性与生产资料私人占有之间的矛盾。"},{"type":"paragraph","text":"竞争是商品生产的必然产物。有商品生产，必然会有竞争。在资本主义制度下，各生产部门间资本的分配和技术的发展，是通过激烈的竞争实现的。这种资本主义企业之间的竞争，对资本主义生产力的发展是有促进作用的，因而具有历史的进步性。自由竞争是资本主义处于上升时期的标志。"},{"type":"paragraph","text":"社会主义条件下的竞争，它与生产无政府状态就更没有必然联系。因为生产无政府状态的根源已经消除，这种竞争又是在生产资料公有制的基础上和在国家计划指导下的竞争。其根本目的在于使企业改进经营管理不仅有内在的动力，而且有外界的压力，从而发展生产力。"},{"type":"paragraph","text":"(摘自四川《社会科学研究》一九八○年第五期张文贤文)"}],"comments":[],"origin":"《社会科学研究》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1963de0ac4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
