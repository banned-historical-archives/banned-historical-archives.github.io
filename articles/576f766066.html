关锋"],"dates":[{"year":1967,"month":7,"day":24}],"is_range_date":false,"parts":[{"text":"关锋接见山西代表时的讲话","type":"title"},{"text":"关锋","type":"authors"},{"text":"武汉“百万雄师”，还有独立师的一部份人，他们要打倒谢副总理、绞死王力，反对四点指示。四点指示是周总理的四点指示，他们不敢把矛头直接指向总理，他们反对总理在政治上不利，但实际上是反对党中央，反对毛主席和林付主席。武汉事件不光是“百万雄师”那些人，还有武装部、独立师、军区机关、公检法。武汉事件是反革命暴乱。中央派去的代表公然可以绑架、毒打、带手铐、包围。我们相信武汉的广大指战员是好的，是受蒙蔽的。告诉大家一个好消息：“百万雄师”分化了，有些人不干了。他们扬言“王力犯了错误”，“不能代表中央”，“把王力交给群众斗争”等等。王力他们回来了，我们隆重的在机场迎接。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"关锋","type":"人物"},{"name":"王力","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"山西文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"576f766066"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
