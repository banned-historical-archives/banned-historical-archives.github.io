<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断统治集团的残酷剥削和压迫  意大利工人罢工斗争日益高涨  各地学生不断抗议反动当局纵容新法西斯暴徒的恶劣行径","authors":[],"dates":[{"year":1970,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断统治集团的残酷剥削和压迫"},{"type":"paragraph","text":"意大利工人罢工斗争日益高涨"},{"type":"paragraph","text":"各地学生不断抗议反动当局纵容新法西斯暴徒的恶劣行径"},{"type":"paragraph","text":"据新华社讯　罗马消息：最近，意大利人民反对垄断统治集团残酷剥削和压迫的斗争日益高涨。"},{"type":"paragraph","text":"意大利南部卢卡尼亚区的工人，于二月二十五日、二十七日举行二十四小时总罢工，抗议垄断资本的残酷剥削造成工人大量失业和越来越贫困。罢工使这个区的马特拉省和波坦察省相继陷于瘫痪状态。数万名罢工工人和学生在这两个省的省会和其他一些主要城镇举行了示威游行。罢工工人还占领了一些地方的市政厅，封锁了那不勒斯—塔兰托铁路和一些公路。"},{"type":"paragraph","text":"在西西里区的首府巴勒莫，工人于二十六日举行了总罢工，抗议资本家更加残酷地剥削工人。在巴勒莫附近科列奥奈的一次总罢工持续了八天，罢工工人强烈谴责意大利垄断统治集团的反动政策。"},{"type":"paragraph","text":"在佛罗伦萨附近的普拉托，四万名纺织工人二十六日举行罢工，要求重新制订劳资合同。纺织工人的斗争，得到了进步学生的支持，数百名学生同几千名工人一道走上街头，举行了示威游行和群众集会。"},{"type":"paragraph","text":"在米兰附近的瓦雷多，有四千名工人从二十三日起罢工五天，抗议资本家无理解雇工人。罢工工人还封锁当地的铁路和公路。"},{"type":"paragraph","text":"在工人斗争日益高涨的同时，意大利学生反对横行霸道的新法西斯暴徒的斗争也在不断发展。"},{"type":"paragraph","text":"在撒丁区卡利亚里，数千名学生和工人最近在大街上举行游行示威，抗议当地的新法西斯暴徒在当局的庇护下向进步学生进行挑衅。"},{"type":"paragraph","text":"最近，罗马大学的学生占领了化学系、药学系、卫生系、古典文学系和师范系。他们在窗口上挂起红旗，并在墙上挂了标语，其中有的写道：“工人阶级必须领导一切。”学生们还设置路障，几次击退了新法西斯暴徒的进攻，并同支持这些暴徒的警察进行斗争。"},{"type":"paragraph","text":"数千名学生最近在热那亚、佩鲁贾、卡塔尼亚、墨西拿和萨勒诺等地举行了示威游行。在意大利北部的的里亚斯特，大学全部被学生占领。在米兰、波伦亚、巴勒莫、热那亚和威尼斯，学生们也奋起占领大学校舍，表示抗议反动当局庇护、纵容新法西斯暴徒的恶劣行径。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4caff9978"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
