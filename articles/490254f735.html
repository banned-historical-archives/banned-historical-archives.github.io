tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"护送毛主席铜像归故乡","authors":["聂建军"],"parts":[{"type":"paragraph","text":"11月27日，我奉命率3名战士随以湖南湘潭市委副书记罗德文为队长的车队，赴南京参加护送毛泽东同志和他的6位亲人的铜像到韶山。"},{"type":"paragraph","text":"毛主席铜像于12月2日启运。这天天刚蒙蒙亮，制作铜像的南京晨光机械厂的厂领导和1万多名职工、家属已等候在宽敞的厂坪内。7点整，车队准时启程，人们怀着敬仰和留恋的目光，欢送铜像驶出大门。"},{"type":"paragraph","text":"铜像途经江苏、安徽、湖北、江西、湖南，每经过一个诚市时，都畅通无阻，秩序井然，军人、警察立正行礼，行人止步以目相送。在皖、鄂、赣、湘留宿的晚上，当地的公安、武警及联防队员不顾寒冷，通宵守卫在毛主席铜像旁。"},{"type":"paragraph","text":"湘赣两省交界的湖南醴陵，是毛主席从事革命活动、率领秋收起义部队上井冈山走过的地方，我们的车队一踏上这块土地，就听到鸣礼炮24响，欢迎的队伍像一条长龙，鞭炮声紧随车队一直响到醴陵城，场面十分壮观。"},{"type":"paragraph","text":"12月6日晨，毛主席铜像车队从湘潭市委大院出发驶向韶山，一进银田寺，有的步行几十里赶来迎接自己的“亲人”，墙壁上到处书写着“毛主席回来了”的标语，公路两旁的树枝上挂着长长的鞭炮，8名身披彩带的女青年打起了“欢迎毛主席回家乡”的大型横幅。"},{"type":"paragraph","text":"毛主席铜像坐落在“毛家祠堂”前坪，车队一进铜像广场，这里人山人海，锣鼓喧天，就像欢迎毛主席当年回韶山一样，整个韶山冲成了欢乐的海洋。这天，久雨的韶山，阳光灿烂。人们还发现，靠近铜像的后山上，寒冬季节竟开放了一片杜鹃花……"},{"type":"paragraph","text":"DW：武警湘潭市支队政治处"}],"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"490254f735"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
