art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席；您怎么说；我就怎么做","authors":["战士李秀茂"],"parts":[{"type":"paragraph","text":"毛主席微笑地望着沸腾的群众队伍，频频向我们招手。毛主席的慈祥的目光象暖流一样通向我的心底，这是领袖对我们最大的关怀。有什么比这更幸福呢？我不禁放开嗓门用最大气力欢呼：“最伟大的领袖毛主席万岁！伟大的战无不胜的毛泽东思想万岁！万万岁！”我本来不爱唱歌，这时我的感情实在难以抑制，《大海航行靠舵手》的歌声脱口而出。我把嗓门提得很高很高，好让我们伟大的领袖听到我对他老人家的歌颂，表达我一个革命战士无比崇敬的心情！"},{"type":"paragraph","text":"毛主席呀！我是一个革命战士，我向您宣誓：您怎样说，我就怎样做。就是上刀山下火海我也在所不惜。我们知道，革命的道路是宽阔远大而又曲折迂回的，我们只要高举毛泽东思想伟大红旗，就能冲破千难万险，闯过革命的惊涛骇浪，消灭一切牛鬼蛇神。RW：毛主席；接见红卫兵"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7507d4ada"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
