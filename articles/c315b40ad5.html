工资”","authors":["黄军"],"dates":[{"year":1958}],"is_range_date":false,"parts":[{"text":"天津部分资本家提出“放弃定息”、“取消高工资”","type":"title"},{"text":"黄军","type":"authors"},{"text":"新华社天津24日讯　天津市部分资本家提出“放弃定息”、“取消高工资”，作为跃进的目标。","type":"paragraph"},{"text":"花纱布绸商业同业公会主委、天津市纺织品公司副经理叶聘之最近召集这个行业的私方人员开会，动员大家向政府提出放弃定息、取消保留工资的要求，以表示私方人员的跃进。经过讨论，他们准备向全市私方人员提出四项倡议：(1)放弃定息，或把全部定息购买公债；(2)全市私方人员一律取消高工资；(3)资金在两千元以上的部分私方人员，过去医疗费用由公家补助，应该全部取消；(4)取消加班费和小礼拜制，延长工作时间。叶聘之说：“在生产跃进中，我们要以放弃定息、取消高工资的实际行动作一个‘促进’”派。国药商业同业公会主委、公私合营第二中药总店经理刘华圃也提出“要在大跃进中放弃定息，摘掉帽子”。百货行业的部分私方人员也有类似的要求。","type":"paragraph"},{"text":"他们提出“放弃定息”倡议的动机和目的何在，有关部门正在了解中。","type":"paragraph"},{"text":"来源：1958年(此处几月几日看不清楚)新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c315b40ad5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
