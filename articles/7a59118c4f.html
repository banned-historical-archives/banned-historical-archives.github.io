" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈时伟在“高等院校体制问题座谈会”上的发言摘要","authors":["兰州大学","陈时伟"],"dates":[{"year":1957,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"陈时伟在“高等院校体制问题座谈会”上的发言摘要","type":"title"},{"text":"兰州大学陈时伟","type":"authors"},{"text":"(陈时伟：兰州大学副校长)","type":"subtitle"},{"text":"陈时伟五月二十三日在甘肃人民广播电台召开的“高等院校体制问题座谈会”上的发言(摘要)(根据纪录)","type":"subtitle"},{"text":"“……今天，高等学校要党的领导，这是肯定的，党委会在学校管政治思想教育，党的方针贯彻与进行要多依靠党员，党要全面领导。但是教学工作要发挥校务委员会的作用，而教授、党委负责人、民主党派、工会、团、学生会的代表为校务委员会的组成成员，但是主要是教授。校务委员会是全校最高学术性机构，是最高权力机构，学校的校长、教务长、总务长是由这个委员会选举的，不要行政上级来决定校长、副校长、教务长、总务长，应该由校务委员会选举，这样才能发挥广大教师的积极性，我是一个教授，又是行政领导，目前高等学校最大的毛病，是学校中学术空气不良，官风浓厚，校长行政领导对教授尊重不够。一个教授要在学术方面有创造，要做科学研究。教授为辛勤的劳动，他们在某一方面总有三四十年的成绩，因而教授是国家宝贵的财产，有些学校对教授尊敬不够。有一个学校有一个教授很不错，而被开除学校。校长生活朴素，而能力差，应好学好问，可是把一个教授在肃反中搞成重点，停职一年多，不合理。现在，学校校长是上面派来的，就使多数人向上看不向下看，看不起教师，不走群众路线。这样选举可以使教师当家作主。学校中矛盾很多，有一个矛盾是教师对领导提意见多，无主人翁感觉。实际上科学研究机构应该以科学研究人员为主，在苏联和其他国家有成就的教授为人人尊敬才好。现在学校不象学术机构，而是官场化。例如一次在昆仑堂开科学研究的会，教授等着首长去，我看不太好，因为目前大家热爱党而不好提，要是以前早就提了，还等什么呢？教务长是要对党的方针贯彻得好的人当选，群众关系好的当选，各方面有才干才能当选，这样，比上级指派好一些。”","type":"paragraph"},{"text":"按：陈时伟反党集团，在鸣放时向党进攻中，着重的反对党对高等学校的领导。以陈时伟为首的反党集团分子在高等学校体制问题上提出整套的反动谬论。他们反对党的领导，主张“民主办校”、“民选校长”，反对国务院任命校长等。这种谬论实际上是章、罗反党联盟的反党纲领的再版。","type":"paragraph"},{"text":"陈时伟在社中央二中全会上的发言(摘要)","type":"subtitle"},{"text":"“党内有一种人，根本不听党外人士的话，认为你们都是资产阶级思想，……甚至采取打击方式，有挖墙脚的，有向上级乱汇报的。在学校里的主要矛盾很象宋仁宗同八贤王的矛盾，不过今天的八贤王手里没有那棒子罢了——这是党内外的矛盾，党外人士有冤枉，所以就不能很好团结……”。","type":"paragraph"},{"text":"注：“宋仁宗同八贤王的矛盾”，这是陈时伟用戏剧故事来攻击党的。“宋仁宗同八贤王的矛盾”在戏剧中所描述的是争夺政权的矛盾。陈时伟认为政权应当是属于蒋介石亲裔的“八贤王”，而不应当由共产党领导的无产阶级来掌握。因此从解放以来，陈时伟为了恢复“蒋家天下”，不辞劳苦地进行了八年反党活动。","type":"paragraph"},{"text":"“棒子”指戏剧中赵德芳手中拿的“瓦面金锏”而言。陈时伟说：“不过今天的八贤王手里没有那棒子罢了。”陈在检讨中说：“这个棒子，指武器而言，我要掌握武器。”不难看出，这个被解除武装的自命为“八贤王”的陈时伟，不是还在妄想重新掌握武装推翻共产党的领导，恢复资本主义的统治吗？","type":"paragraph"},{"text":" 来源：《右派分子陈时伟的材料》，九三学社中央整风工作委员会办公室编，1958年1月31日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a59118c4f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
