ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对王鹤寿关于企业思想政治工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"对王鹤寿关于企业思想政治"},{"type":"paragraph","text":"工作报告的批语"},{"type":"paragraph","text":"（1963年12月11日）薄一波同志："},{"type":"paragraph","text":"此件请你看一下。别的工业部是否也抓起了思想政治工作，请你查告我。看来学解放军，并且调一些解放军好干部到工业部门工作，是一个好办法。请你考虑一下这个问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十一日[1]王鹤寿，当时任冶金工业部部长、中共冶金工业部党组书记。"},{"type":"paragraph","text":"[2]指王鹤寿1963年12月9日关于企业思想政治工作问题给毛泽东的报告。报告说，今年我们在企业里，除了进行社会主义教育和开展增产节约、“五反”运动以外，主要抓了两件事：一是开展“经济活动分析”，一是学习解放军的政治工作。经济活动分析是在一个企业或班组里，拿它这一个月的各种经济指标（产量、质量、成本、品种、消耗、回收率、劳动生产率等）与上月比，与最好的季度比，与别的企业、班组比，与世界先进水平比，从这种比较中找出差距以及产生差距的原因。学习解放军的政治工作，就是用解放军的政治工作的方法，发扬主席过去所批示的《鞍钢宪法》精神。这不仅使我们找到了做好企业思想政治工作的范例，而且解决了许多过去长期没有解决的问题，效果是显著的。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":138,"page_end":138},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"对王鹤寿关于企业思想政治工作报告的批语","authors":["毛泽东"],"dates":[{"year":1963,"month":12,"day":11}],"is_range_date":false,"parts":[{"text":"对王鹤寿关于企业思想政治工作报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"薄一波同志：","type":"appellation"},{"text":"此件请你看一下。别的工业部是否也抓起了思想政治工作，请你查告我。看来学解放军，并且调一些解放军好干部到工业部门工作，是一个好办法。请你考虑一下这个问题。","type":"paragraph"},{"text":" 毛泽东十二月十一日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d00e91206"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
