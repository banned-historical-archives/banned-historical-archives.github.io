art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平；华国锋副总理同乔森潘；英萨利副首相会谈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年八月十五日讯 国务院副总理邓小平、华国锋同柬埔寨王国民族团结政府副首相、柬埔寨民族解放人民武装力量总司令乔森潘，柬埔寨王国民族团结政府副言相英萨利，今天下午举行了会谈。"},{"type":"paragraph","text":"柬埔寨方面参加会谈的有由乔森潘、英萨利副首相率领的柬埔寨民族统一阵线和王国民族团结政府代表团团员：外交大臣沙林察，人民教育和青年大臣英蒂丽，柬埔寨民族统一阵线中央政治局候补委员吉春、秀蒲拉西，柬埔寨驻中国大使笃坎敦，以及洛·诺特亚—薛拉。"},{"type":"paragraph","text":"中国方面参加会谈的有外经部部长方毅，外交部副部长韩念龙，中联部副部长申健，外贸部副部长陈洁，外交部司长柯华、朱传贤，副司长梁枫，中国驻柬埔寨大使孙浩，以及谢月娥。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30805c21d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
