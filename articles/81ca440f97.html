art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见古拉特副总统","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社杭州18日电 毛泽东主席今天下午接见了巴西合众国副总统若奥·贝尔希奥·古拉特，并进行了亲切友好的谈话"},{"type":"paragraph","text":"接见时在座的还有陪同古拉特副总统来杭的巴西贵宾。"},{"type":"paragraph","text":"接见时中国方面在座的有：国务院副总理陈毅，中国国际贸易促进委员会主席南汉宸。"},{"type":"paragraph","text":"接见以后，毛泽东主席设宴招待巴西贵宾。"},{"type":"paragraph","text":"新华社杭州18日电 巴西合众国副总统若奥·贝尔希奥·古拉特和部分巴西贵宾，由陈毅副总理、中国国际贸易促进委员会主席南汉宸陪同，今天中午乘专机到达杭州。"},{"type":"paragraph","text":"浙江省省长周建人、副省长李丰平，中国人民解放军驻浙江部队首长钱钧中将，杭州市副市长张世祥等人到机场迎接贵宾。"},{"type":"paragraph","text":"杭州机场上今天飘扬着中国巴西两国国旗，当专机在机场上降落时，周建人省长、李丰平副省长、钱钧中将等迎到飞机前面，同古拉特副总统和其他巴西贵宾亲切握手。一群女青年向古拉特副总统和其他巴西贵宾献花。随后，贵宾们由周建人省长、李丰平副省长等陪同，乘专车赴宾馆。"},{"type":"paragraph","text":"今天到机场迎接贵宾的，还有浙江省、杭州市政协、各机关、各民主党派地方组织、各人民团体的负责人。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东8月18日接见了巴西副总统古拉特。图为毛泽东主席和古拉特副总统亲切握手。  新华社记者 吕厚民摄"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81ca440f97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
