ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对海军党委扩大会议如何开展批林整风的意见","alias":"","parts":[{"type":"paragraph","text":"对海车党委扩大会议如何开展"},{"type":"paragraph","text":"批林整风的意见！!"},{"type":"paragraph","text":"（1972年）"},{"type":"paragraph","text":"海军的会议，纠缠着历史问题。在批林整风运动中，在历史的旧账上纠缠，容易走偏方向。"},{"type":"paragraph","text":"一首先是批林，其次才是整风。"},{"type":"paragraph","text":"[1]本篇一、二是毛泽东对中国人民解放军海军党委1972年7月至1973年2月举行的四届五次全会扩大会议如何开展批林整风提出的意见。1972年9月21日，周恩来根据毛泽东的指示，主持中共中央政治局会议，约海军负责人谈话，传达了毛泽东的意见。中共中央1973年2月24日转发的《海军党委四届五次全会扩大会议情况报告》中用黑体字引用了这些话。中央转发这个报告的批语曾送毛泽东审阅，毛泽东批示：“同意。”"}],"authors":["毛泽东"],"dates":[{"year":1972}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":352,"page_end":352},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b41c9ed6d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
