script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"部份资方钻空子 取巧剥削临时工","authors":[],"dates":[{"year":1951,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　临时工办法，在去年二月七日公布后，一方面照顾资方，在生产情况不正常而雇临时工，另一方面使失业工人有较多的就业机会，当时对情况掌握不够，只能原则性，因此资方就原则来钻空子，实行资方片面有利；因为资方取巧，因而形成劳资争议很多。同时部份工会干部，亦存在着一些偏向，认为临时工升为正式工以后，会分占正式工人的利益，因此非但不给临时工以适当的照顾与支持，相反的还抱着歧视态度。都应该纠正。"},{"type":"paragraph","text":"去年七月至十二月间，本市复工与临时工总数计四○一二八人，其中临时工一五四三八人，占总数五分之二。希望有关当局引起密切注意。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ee1561e95"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
