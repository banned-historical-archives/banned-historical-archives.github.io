国工作、学习人员有关“四大”的几项规定（草案）","authors":[],"dates":[{"year":1974,"month":2,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央关于在批林批孔运动中对外宾、外交官员和在华外国工作、学习人员有关“四大”的几项规定（草案）","type":"title"},{"text":"中共中央通知","type":"subtitle"},{"text":"一、凡是外宾、外国旅游者、外国记者、外国文化团、外国专家及其家属、外国留学生，开放城市、厂矿、学校、旅社、服务机构以及接待参观的地区和单位，有问到当前批林批孔等问题，应按中央有关文件和人民日报社论的方针和口径答复。如要求去看公开场所写出的大字报，应允许他们阅读，如涉及内部情况的大字报，应另辟一处，不对外开放。","type":"paragraph"},{"text":"二、在上述所有人员，凡持有照相机、录像机、录音机、电影机、电视机的，均须取得我方接待人员的同意，方可摄影、录音，否则我方有权干涉。","type":"paragraph"},{"text":"三、各单位、地区张贴出的大字报，除中央另有规定外，一般不许抄贴中央文件。大字报、大辩论，均不许泄露国家机密，如国家计划数字、财政支出、外交机密、国防机密等。","type":"paragraph"},{"text":" 中  共  中  央一九七四年二月十四日","type":"paragraph"},{"text":"（发至省、军级）","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8e86f2610"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
