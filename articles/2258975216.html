rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"五届人大三次会议的代表提出提案2，300件"},{"type":"paragraph","text":"到规定的提案截止日期9月7日中午12时，出席五届人大三次会议的代表共提出提案2，300件，比上次会议多提了410件。"},{"type":"paragraph","text":"这次会议的提案，数量之多，内容之广，在人代大会历次会议中是空前的。代表们在提案中，就如何加快我国四化建设的步伐，健全人民代表大会制度，加强法制以及国家的大政方针，提出了许多建设性的意见。解放军代表陈昊苏经过长时间的调查研究，提出1项长达1万多字关于健全人民代表大会制度建议的提案，要求加强全国人民代表大会的工作和权力，更有效地行使对国家事务的管理权和决定权，受到有关方面的重视。"},{"type":"paragraph","text":"很多代表在提案中建议全国人大常委会设立专门机构，监督提案的落实执行。对重大的提案要设立专门委员会，进行认真调查研究，督促有关部门处理。"},{"type":"paragraph","text":"这次会议期间的这些提案，已经提案审查委员会审查通过，分别交全国人大常委会、国务院、最高人民法院、最高人民检察院研究办理。"},{"type":"paragraph","text":"五届政协三次会议收到提案248件"},{"type":"paragraph","text":"五届政协第三次会议到9月7日止，共收到248件提案。政协委员们的提案的主要内容，集中在加强四化建设上，其中关于工业交通、文教、科技方面的问题约占三分之一。"},{"type":"paragraph","text":"全国政协提案审查委员会已审查立案189件。政协提案审查委员会的委员们表示，对能办的提案要努力协助有关部门办理。"},{"type":"paragraph","text":"邓小平对美国客人说中国人民有信心实现四化"},{"type":"paragraph","text":"邓小平副总理8日上午在会见由公司总裁查尔斯·斯旺森率领的美国《不列颠百科全书》出版公司董事会代表团时说，我们全国人民对正在召开的五届人大三次会议的反映很好。这说明，中国人民实现四化的决心是坚定的，也是有信心的。同时也说明，粉碎“四人帮”以后，我们的事情一年比一年好。但是我们还面临着许多问题和困难，我们正在研究和解决。"},{"type":"paragraph","text":"会见时，邓小平接受了这个出版公司赠送给他的一套特别精装《不列颠百科全书》。"},{"type":"paragraph","text":"张廷发会见帕年·干达叻空军上将等"},{"type":"paragraph","text":"中国人民解放军空军司令员张廷发8日在北京会见并宴请泰国国防部副部长、王家空军总司令、泰国国际航空公司董事长帕年·干达叻空军上将和由他率领的泰国国际航空公司“友好飞行团”的部分成员。"},{"type":"paragraph","text":"中美民用航空运输协定在北京草签"},{"type":"paragraph","text":"中华人民共和国政府和美利坚合众国政府民用航空运输协定8日晚在北京草签。"},{"type":"paragraph","text":"中国政府民航代表团团长、中国民航总局副局长林征和美国政府民航代表团团长、美国国务院交通与电信助理国务卿帮办波伊德·海特分别代表各自的政府在协定上签字。"},{"type":"paragraph","text":"中国民航总局局长沈图、美国驻中国大使伍德科克参加了草签仪式。 （均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2258975216"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
