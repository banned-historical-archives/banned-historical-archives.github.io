ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于对待托陈派分子的原则的指示","alias":"","parts":[{"type":"paragraph","text":"关于对待托陈派分子的原则的指示"},{"type":"paragraph","text":"（1937年9月10日）伯渠："},{"type":"paragraph","text":"请告罗汉我们对托派分子的下列原则："},{"type":"paragraph","text":"（甲）我们不拒绝同过去犯过错误而现在真心悔悟，愿意抗日的人联合，而且竭诚欢迎他们的转变。"},{"type":"paragraph","text":"（乙）在陈独秀等托派分子能够实现下列三条件时，我们亦愿与之联合抗日：（一）公开放弃并坚决反对托派全部理论与行动，并公开声明同托派组织脱离关系，承认自己过去加入托派的错误。（二）公开表示拥护抗日民族统一战线政策。（三）在实际行动中，表示这种拥护的诚意。"},{"type":"paragraph","text":"（丙）至于其他关系，则在上述三条件实现之后，可以再行考虑。"},{"type":"paragraph","text":"洛毛九月十日"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":145,"page_end":145},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"531be4e2d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
