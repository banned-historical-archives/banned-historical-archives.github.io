rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛主席最新指示送到贫下中农心坎里","authors":[],"parts":[{"type":"paragraph","text":"本报讯 在长白山地区担任支农任务的“马定夫爱民模范连”全体指战员，和驻地公社革委会成员一起，认真学习了中央两报一刊元旦社论中传达的毛主席的最新指示：“全世界人民团结起来，反对任何帝国主义，社会帝国主义发动的侵略战争，特别要反对以原子弹为武器的侵略战争！如果这种战争发生，全世界人民就应以革命战争消灭侵略战争，从现在起就要有所准备！”干部战士和革委会成员一致认为毛主席这一伟大指示，以马克思列宁主义的远见，向全世界人民指出了斗争的方向，具有深远的历史意义和现实意义，一定要认真学习，深刻领会，坚决贯彻执行。他们说，元旦社论是鼓舞我们同全世界革命人民一起为埋葬帝、修、反而英勇战斗的进军号，是向全国军民和世界革命人民发出的动员令和号召书。我们一定要用毛主席关于“提高警惕，保卫祖国”，“备战、备荒、为人民”的伟大战略思想，推动斗、批、改，检查斗、批、改，用毛泽东思想宣传群众，武装群众，把农村建设成反帝反修的钢铁堡垒。"},{"type":"paragraph","text":"他们按照毛主席最新指示和元旦社论精神，总结了去年的工作，重新修改和制定了新年度加强领导班子思想革命化等工作计划，把毛主席的最新指示和元旦社论中提出的战斗任务落实到各项工作中去。"},{"type":"paragraph","text":"为了让毛主席的最新指示迅速和广大贫下中农见面，“马定夫爱民模范连”派出毛泽东思想宣传队，冒着严寒，穿林海，走雪原，深入到生产队、参场、林场和少数民族居住的山寨，把毛主席的最新指示送到革命群众心坎上。干部战士把宣传毛主席最新指示当作最大的幸福，最光荣的职责。他们说：我们要以战斗的姿态去宣传毛泽东思想，把广大农村建设成埋葬帝、修、反的坚强堡垒，不管敌人从那里来，都叫它有来无回，统统淹没在人民战争的汪洋大海之中！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6911d156b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
