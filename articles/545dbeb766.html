ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"同意对董宋珩罗广文两部实行混编","alias":"","parts":[{"type":"paragraph","text":"同意对董宋珩罗广文两部实行混编\""},{"type":"paragraph","text":"（1950年7月15日）粟、唐、周、张，并告陈、饶："},{"type":"paragraph","text":"午寒电悉。既然董、罗亦有思想准备，我们同意你们的混编办法，但请你们注意混编时的政治说服工作，使董、罗及其干部感到满意，以便争取他们进步和安心工作。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"七月十五日"},{"type":"paragraph","text":"[1]这是毛泽东为中央人民政府人民革命军事委员会起草的电报。董宋绗、罗广文，原国民党政府军将领。1949年12月，董宋珩、罗广文先后率部在成都地区起义，起义后部队开到华东地区进行改编。"},{"type":"paragraph","text":"[2]粟，指栗裕，当时任中国人民解放军第三野战军副司令员、华东军区副司令员。唐，指唐亮，当时任中国人民解放军第三野战军政治部主任、华东军区政治部主任。周，指周骏鸣，当时任中国人民解放军第三野战军副参谋长、华东军区副参谋长。张，指张震，当时任中国人民解放军第三野战军参谋长、华东军区参谋长。"},{"type":"paragraph","text":"[3]陈，指陈毅，当时任中国人民解放军第三野战军司令员、华东军区司令员。饶，指饶漱石，当时任中国人民解放军第三野战军政治委员、华东军区政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":7,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":534,"page_end":534},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"545dbeb766"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
