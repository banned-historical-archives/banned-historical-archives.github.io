authors":[],"dates":[{"year":1964,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达15日电】　最近在这里举行的印度尼西亚共产党第一次全国大会通过的一项决议呼吁印度尼西亚政府和其他亚非国家政府为第二次亚非会议作准备，并执行第二次亚非会议筹备会议通过的决议和规定的原则。"},{"type":"paragraph","text":"印度尼西亚《人民日报》今天发表了这个题为《前进，使第二次亚非会议获得成功》的决议。"},{"type":"paragraph","text":"决议指出，第二次亚非会议的目标是，在亚非团结反对帝国主义、殖民主义和新殖民主义的基础上，维护政治上的独立，经济上的自力更生和民族文化。"},{"type":"paragraph","text":"决议说:“第二次亚非会议的成功，一定会把亚非国家的斗争推进到一个新的阶段，并使得亚非团结成为尽快地埋葬帝国主义、殖民主义和新殖民主义的真正强大的力量。”"},{"type":"paragraph","text":"决议要求对帝国主义和修正主义的破坏行动保持警惕。"},{"type":"paragraph","text":"决议还要求印度尼西亚人民和其他亚非国家的人民加强团结和为第二次亚非会议的成功而努力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f9cb431d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
