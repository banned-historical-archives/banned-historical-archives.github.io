rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"歌颂新生事物回击右倾翻案风","authors":["八三二○六部队工兵连团支部"],"parts":[{"type":"paragraph","text":"我们连团支部在党支部的领导下，组织团员和青年利用多种形式歌颂无产阶级文化大革命的丰硕成果，批判教育界、科技界和社会上其他方面否定无产阶级文化大革命，否定社会主义新生事物的奇谈怪论，有力地回击了右倾翻案风。"},{"type":"paragraph","text":"出墙报、黑板报，热情歌颂无产阶级文化大革命的伟大胜利，回击右倾翻案风。我们出了多期墙报和黑板报，写了许多诗歌，热情歌颂无产阶级文化大革命的伟大胜利，歌颂社会主义新生事物。新战士王现芹入伍前是民办教师。他从自己的实践中体会到，只有坚持开门办学，坚持教育与生产劳动相结合，才能培养出有社会主义觉悟的有文化的劳动者。他写了一篇《教育革命就是好》的墙报稿，热情地歌颂毛主席的无产阶级教育路线，批判教育界否定教育革命的奇谈怪论，同志们看了很受启发教育。"},{"type":"paragraph","text":"编演文艺节目，赞扬社会主义新生事物。我们针对否定批林批孔伟大成果的奇谈怪论，把连队批林批孔以来出现的新人新事搜集起来，编成文艺节目演出，回击奇谈怪论。不久前，部队到一个生产大队驻训，看到那里的贫下中农经过文化大革命的战斗锻炼，精神面貌发生了深刻的变化。他们热烈响应毛主席发出的关于“农业学大寨”的号召，干劲冲天，使粮食产量逐年上升，亩产超过了千斤关。他们还办起了学校、茶场、铁业组、合作医疗站，有的贫下中农的子女被选送上了大学。演唱组就把这些材料编成文艺节目，热情歌颂社会主义新生事物。"},{"type":"paragraph","text":"成立学哲学小组，引导大家用马克思主义的哲学观点，深入批判奇谈怪论。在批判奇谈怪论鼓吹者的折中主义手法时，哲学小组认真学习毛主席关于“矛盾着的两方面中，必有一方面是主要的，他方面是次要的”这一精辟论述，认识到把矛盾的两方面平列起来等同起来，实质上是用折中主义的二元论代替马克思主义的两点论。党内不肯改悔的走资派用折中主义冒充辩证法，其险恶用心，就是妄图掩盖事物的本质，抹杀阶级斗争，改变党的基本路线，反对无产阶级专政，推行修正主义路线，在中国复辟资本主义。通过用马克思主义哲学观点对折中主义的分析解剖，使大家擦亮了眼睛，进一步看清了它的反动实质，激发了大家对党内不肯改悔的走资派的无产阶级义愤。"},{"type":"paragraph","text":"我们通过多种形式，歌颂无产阶级文化大革命的丰硕成果，回击右倾翻案风，增强了团员和青年们的阶级斗争和路线斗争觉悟，提高了贯彻执行毛主席革命路线的自觉性。"}],"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd22e1fe54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
