<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"饶漱石关于纠正征粮工作中的错误偏向的指示","authors":["饶漱石"],"dates":[{"year":1950,"month":3,"day":21}],"is_range_date":false,"parts":[{"text":"饶漱石关于纠正征粮工作中的错误偏向的指示","type":"title"},{"text":"饶漱石","type":"authors"},{"text":"(一)我华东各地一九四九年秋征工作，一般是正确的，是有成绩的，征粮任务大体已经完成，尚未缴齐的只属少数。但由于华东新区解放时间先后不一，工作发展不平衡，去秋群众尚未充分发动，基层政权大部尚未改造，干部初到新区情况不热，中央人民政府政务院关于新区土改征粮指示中，所指征粮中各项缺点，华东各地在不同程度上都有存在，因此，各地必须遵奉中央指示原则，切实加以纠正和补救，以利春耕，增进人民对于政府的信仰。","type":"paragraph"},{"text":"(二)根据中央人民政府政务院新区土改征粮指示第三部份第七条之原则及第八条之精神，并参酌华东各地具体情况，对华东区一九四九年度秋征中各项缺点错误，订定下列纠正和补救办法:","type":"paragraph"},{"text":"甲、对公粮负担超过规定而尚未缴齐之户，应予酌量减征。","type":"paragraph"},{"text":"乙、对已征公粮过多过重之户，经查明属实者应给予预征收据，作为一九五○年夏季或秋季所征之公粮，如愿以此为购买公债者，亦应允许。如因缴粮过重无法生活者，应退还一部。","type":"paragraph"},{"text":"丙、凡因清查黑地不确，致征收农业税超过其实有之土地数者，对其中生活不困难之户，其超过部份应给予预征收据，作为一九五○年夏季或秋季所征之公粮；对其中缴粮过重，生活困难之户，其超过部份，应退还一部(其未退还部份，应给予预征收据)或全部。","type":"paragraph"},{"text":"丁、凡隐瞒土地意图逃避或转嫁负担，致征收不足中央规定额数之户，经当地人民揭发，人民政府查明，得按其实有土地如数补征。","type":"paragraph"},{"text":"戊、对灾区人民负担，应适当予以减免。","type":"paragraph"},{"text":"已、凡因涉及征粮事件而被扣押之人犯，应迅速清理。对故意抗缴农业税查有实据者应依法处理，其余应一律释放。对被误扣错押者，应分别情况给以解释安慰或道歉。各地应严禁乱打，乱杀，乱逮捕，乱处罚及戴高帽游行等错误现象，违者应受法律处分。","type":"paragraph"},{"text":"各级人民政府对上述办法应切实执行，并须派人作实地调查和指导，以期认真贯彻是要。","type":"paragraph"},{"text":" 主席一九五○年三月廿一日","type":"paragraph"}],"comments":[],"origin":"1950年3月22日《文汇报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"饶漱石","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8260a6be34"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
