"张伯恒"],"dates":[{"year":1975,"month":11,"day":10}],"is_range_date":false,"parts":[{"text":"张伯恒给毛泽东的信（要点）","type":"title"},{"text":"张伯恒","type":"authors"},{"text":"〖张伯恒，国防科委资料研究所干部。〗","type":"subtitle"},{"text":"信中说，我是一个停职隔离审查多年的干部，直到最近国防科委常委才做出决定，解除对我的停职隔离审查，恢复了我的党组织生活，并向中央军委写了一份审查报告。我对这份报告中的结论部分基本同意，但对其中康生的批示部分是有意见的。信中分六点对康生的批示提出质疑，并写道：“绝对地肯定和绝对地否定都不是马列主义的态度，尤其在肃反问题上更不宜先入为主地下结论。如康生同志的批示中说我‘肯定与苏修是有关系的’，我认为像这样的结论式文字，倘无充分根据，最好不这样写。”","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74a2ab4653"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
