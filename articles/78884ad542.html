[],"dates":[{"year":1965,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南党政代表团回国途中到京"},{"type":"paragraph","text":"邓小平彭真康生等同志到机场欢迎"},{"type":"paragraph","text":"新华社十八日讯　由越南劳动党中央第一书记黎笋率领的越南党政代表团，在访问苏联后回国途中，今天乘专机从莫斯科到达北京。同机到达的代表团团员有：越南劳动党中央政治局委员、越南民主共和国政府副总理兼国防部长武元甲，越南劳动党中央政治局委员、越南民主共和国政府副总理兼外交部长阮维桢，和国家科学委员会副主任陈琼等。"},{"type":"paragraph","text":"中国共产党中央总书记、国务院代总理邓小平到机场欢迎。"},{"type":"paragraph","text":"到机场欢迎的，还有中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，政治局候补委员、全国人民代表大会常务委员会副委员长康生，中央委员伍修权，中央候补委员、外交部副部长罗贵波，中国驻越南大使朱其文等。"},{"type":"paragraph","text":"越南驻中国大使陈子平，苏联驻中国大使契尔沃年科等，也到机场欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78884ad542"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
