script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命战士永远心向毛主席","authors":[],"dates":[{"year":1967,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻沪空军部队全体指战员"},{"type":"paragraph","text":"我们伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席，接见出席中国人民解放军海军首次学习毛主席著作积极分子代表大会代表的特大喜讯传来，我们全军上下无不欢欣鼓舞，奔走相告。这是海军老大哥的无尚光荣，也是全军的最大幸福!"},{"type":"paragraph","text":"毛主席的接见和林副主席的题词:“大海航行靠舵手，干革命靠毛泽东思想”。不仅是海军政治生活中两件振奋人心的大喜事，也是全党、全军、全国人民政治生活中两件激动人心的大喜事。这是伟大统帅毛主席和副统帅林副主席对我军全体指战员的最大关怀，最大鼓舞，最大信任，最大鞭策。让我们千遍万遍高唱《大海航行靠舵手》，千遍万遍高呼:“毛主席万岁!万岁!万万岁!”"},{"type":"paragraph","text":"我军是毛主席亲自缔造、林副主席直接指挥的人民军队。几十年来，我军的战斗历程，就是用毛泽东思想建设一支完全新型的人民军队的光辉历程，就是用毛泽东思想战胜一切国内外敌人的胜利历程。在国内革命战争中，我们靠战无不胜的毛泽东思想，打败了国内外反动派，推翻了压在中国人民头上的三座大山，建立了伟大的中华人民共和国；在朝鲜战场上，我们靠战无不胜的毛泽东思想，和朝鲜人民军并肩战斗，把世界上最凶恶的美帝国主义打得丢盔弃甲、屈膝投降；在保卫社会主义革命和社会主义建设的伟大斗争中，我们靠战无不胜的毛泽东思想，把一切来犯的敌人全部、彻底、干净消灭掉；在史无前例的无产阶级文化大革命运动中，我们还是靠战无不胜的毛泽东思想，和无产阶级革命派并肩战斗，揪出了党内最大的走资派及其爪牙，彻底摧毁了以中国赫鲁晓夫为首的资产阶级司令部，在两个阶级、两条道路、两条路线的激烈斗争中取得了决定性胜利。我们的一切胜利，全都归功于伟大领袖毛主席，归功于战无不胜的毛泽东思想。"},{"type":"paragraph","text":"我们伟大领袖毛主席亲自接见海军首次学习毛主席著作积极分子代表大会代表的特大喜讯，给了我们无比巨大的鼓舞和力量。伟大领袖毛主席最关心革命战士，最爱护革命战士，永远和革命战士心连心。"},{"type":"paragraph","text":"我们驻沪空军部队全体指战员最坚决地表示:我们一定要以林副主席为光辉榜样，永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席的无产阶级革命路线。我们一定要坚决响应伟大领袖毛主席的号召，以“斗私，批修”为纲，在灵魂深处爆发革命，彻底改造世界观，做一个用毛泽东思想武装起来的革命战士。我们一定要努力向海军老大哥学习，把活学活用毛主席著作的群众运动推向更新的阶段，大树特树伟大统帅毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威，把部队办成红彤彤的毛泽东思想大学校。我们一定要紧跟毛主席的伟大战略部署，更好地完成“三支”“两军”的光荣战斗任务，在保卫祖国领空和无产阶级文化大革命运动中为人民立新功。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e98fe2c37"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
