script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"痛斥修正主义分子的奴颜媚骨","authors":["常连成"],"dates":[{"year":1967,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一切危害人民群众的黑暗势力必须暴露之，一切人民群众的革命斗争必须歌颂之，这就是革命文艺家的基本任务。"},{"type":"paragraph","text":"痛斥修正主义分子的奴颜媚骨"},{"type":"paragraph","text":"北京摩托车制造厂工人　常连成"},{"type":"paragraph","text":"在纪念毛主席《在延安文艺座谈会上的讲话》发表二十五周年的喜庆日子里，又发表了毛主席的《应当重视电影〈武训传〉的讨论》的光辉文献。我们怀着万分激动的心情，左一遍右一遍地学，越学越体会到毛主席的“凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。革命的阶级是这样，反革命的阶级也是这样。”这一教导的伟大意义。"},{"type":"paragraph","text":"在全国解放不久，有人狂热地宣传封建文化，宣传阶级投降主义的电影《武训传》，这决不是偶然的。这正是那些反革命修正主义分子，在党内最大的走资本主义道路当权派的支持和鼓励下，制造反革命复辟舆论，企图推翻无产阶级政权，恢复他们失去的天堂的一次进攻。"},{"type":"paragraph","text":"武训的思想，就是中国赫鲁晓夫的思想。"},{"type":"paragraph","text":"全国解放后，中国的赫鲁晓夫几次跑到天津，和大资本家宋棐卿眉来眼去，勾勾搭搭，向资本家乞求剥削，压制工人革命。这同武训跪在地主老爷面前讨钱，不是如出一辙吗！"},{"type":"paragraph","text":"武训打着“为人民办学”的招牌，中国的赫鲁晓夫也挂着“发展民族工业”的幌子。他们一样是向剥削阶级投降，甘当剥削阶级的奴隶。党内头号走资本主义道路当权派这样干，就是要取消阶级斗争，取消无产阶级专政，企图把刚刚获得解放的劳动人民重新推进火坑，使他们重新过牛马不如的日子。"},{"type":"paragraph","text":"毛主席及时向我们发出了《应当重视电影〈武训传〉的讨论》的伟大号召。"},{"type":"paragraph","text":"这是全国解放以后思想文化领域里两个阶级、两条道路、两条路线第一次交锋。以毛主席为代表的无产阶级革命派，要运用文艺这个武器，来巩固无产阶级专政，来推进社会主义革命和社会主义建设事业；党内头号走资本主义道路的当权派和一小撮反革命修正主义分子，他们要利用文艺制造反革命舆论，毒害人们的思想，以便实现资本主义复辟。"},{"type":"paragraph","text":"史无前例的无产阶级文化大革命粉碎了一小撮反革命修正主义分子的迷梦，毛主席的革命路线取得了伟大胜利。"},{"type":"paragraph","text":"“宜将剩勇追穷寇，不可沽名学霸王。”我们工人阶级坚决按照毛主席《在延安文艺座谈会上的讲话》的教导，大鼓革命造反精神，大造党内最大的一小撮走资本主义道路当权派的反，批透奴隶主义、投降主义，把党、政、财、文大权牢牢掌握在无产阶级手里，使我们国家沿着社会主义——共产主义的大道阔步前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e51ca48de7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
