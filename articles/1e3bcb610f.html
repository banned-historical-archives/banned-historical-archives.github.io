<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"464418e7-fcf8-443c-9add-13ef394215d8","name":"学习与批判一九七三年第二期","internal":false,"official":true,"type":"pdf","author":"《学习与批判》编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/464418e7-fcf8-443c-9add-13ef394215d8.pdf"],"article":{"title":"如此“循循善诱”","alias":"","parts":[{"type":"paragraph","text":"如此“循循善诱”"},{"type":"paragraph","text":"陈雪良孔子自命是“诲人不倦”，他的学生颜渊跟着吹捧说：“夫子循循善诱人”。"},{"type":"paragraph","text":"事情果真如此吗？拿孔夫子自己说过的“听其言观其行”来一对照，就完全戳穿了这套“诲人不倦”的谎言。有一次孔子讲课，学生宰子对孔子这套宣扬奴隶制的陈词滥调听厌了，干脆打起瞌睡来，孔子顿时大怒，指着宰予的鼻子大写：“朽木不可雕也，粪土之墙不可也。”看，这样的态度对待学生，那里有半点“诲人不倦”、“循循善诱”的影子呢？汉代的唯物主义思想家王充就替宰子抱不平说：“责小过以大恶，安能服人！”"},{"type":"paragraph","text":"在孔子看来，老师说的话，学生就得听，不服也得服。因此，在孔子门下当学生，挨骂是家常便饭。“柴也愚，参也鲁，师也辟，由也”，这个孔圣人一口气就骂了四个学生，又是愚笨，又是迟钝，又是偏激，又是卤莽。学生樊迟想学种庄稼的道理，触犯了孔家店的学规，孔子就不仅拒绝教诲，而且大骂：“小人哉，樊须也！”即使是孔子最得意的学生颜渊，有时也难免挨骂。一次，孔子“畏于匡”，颜渊因来迟了，孔子便破口大骂：我以为你早死了呢！"},{"type":"paragraph","text":"孔子讲学从来不准学生“问难”，更不充许提不同意见。学生在孔子面前，只准象颜渊那样“不违，如愚”（不提意见，象个木头人）。子路叫子羔去费县做官，孔子反对说：子羔还未学好就去参政，这是要害人的。子路不买账，说：治人事神，这就是学习，为什么一定要读书才是学习？孔子无言以答，就说：我就是讨厌你这种强词夺理的人。还是这个子路，一次问孔子：如果你治理国政，准备首先干什么？孔子回答：“必也正名乎！”（首先恢复维护奴隶主阶级统治的规章制度）但子路觉得这套办法迁腐得很，不能解决实际问题。孔子一听大为恼火，便骂：“野哉，由也”。当然，对那些敢于藐视周公之礼的学生，更是摆出一副学阀的样子，动不动就扣上“不仁”的帽子，力图置之死地而后快。"},{"type":"paragraph","text":"如果说孔子对学生一点也不“诲”不“诱”，那也有点冤枉。问题是把学生“诱”向什么方向。就拿被孔子臭骂为“小人”的樊迟来说，当他向孔子问“崇德、修愿，那惑”等修养经的时候，孔子就大为赞赏地说：“善哉问！”然后就“诲”了一大通奴隶主阶级的处世哲学。因此，孔子的“诱”，完全是“循”着奴隶主阶级的道路，把学生培养成奴隶主阶级的接班人。"},{"type":"paragraph","text":"对学生采取什么样的教育方法，实际上反映了一定的师生关系，即阶级关系。孔子要维护“君君，臣臣，父父，子子”的宗族奴隶主的统治秩序，就必然要求他的学生盲目地服从他，不仅正确的要服从，错误的也要服从。在孔家店里，孔子训斥学生是天经地义，而学生“问难”则是礼犯义。这种不平等的师生关系，本质上是阶级压迫的反映。学生一进了孔门，不仅要挨骂，除了那些拿得出很重的赞见礼的贵族学生如南宫适、子贡等人外，都要替孔老夫子服役奔走，如赶车、饲马、当保镖等等。就连吃饭，也是“有酒食，先生”，非得让孔子先吃不可。有一次颜渊先吃了一口粥，就遭到了孔子的不满和训斥。因此，孔子的所谓“循循善诱”，说穿了，无非是一块为了掩盖这种不平等的阶级关系的遮羞布罢了。"}],"authors":["陈雪良"],"dates":[{"year":1973}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":84,"page_end":84},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e3bcb610f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
