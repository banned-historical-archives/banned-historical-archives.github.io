" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-944","name":"教育部关于各级公办学校教职工退职、退休时连续工龄计算问题的几点解释","author":"教育部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"教育部关于各级公办学校教职工退职、退休时连续工龄计算问题的几点解释","dates":[{"year":1964,"month":2,"day":12}],"is_range_date":false,"authors":["教育部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 315-316","tags":[{"name":"工龄","type":"主题/事件"},{"name":"公办学校","type":"主题/事件"},{"name":"退休","type":"主题/事件"},{"name":"退职","type":"主题/事件"},{"name":"职工","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"教育部关于各级公办学校教职工退职、退休时连续工龄计算问题的几点解释\n（一九六四年二月十二日）\n      近据河北、浙江、福建、江西、广东等省反映，在执行国务院批转\"教育部关于各级公办学校教职工退职、退体时解放以前和解放以后连续工龄计算的几点原则规定”（以下简称“几点原则规定”）中，仍遇有一些具体问题不够明确，要求予以解释。经与中央有关部门研究，并报请国务院文教办公室批准，现将“几点原则规定”中的几个具体问题，作如下解释：\n      一、 “几点原则规定”第一条中所指的“解放前夕所在学校连续担任工作的时间”，系指解放前夕最后所在的一个学校（不包括补习学校和私塾）连续工作的时间。“解放前夕”，系指学校所在地的解放前夕。\n      有的地区解放前夕由于局势不稳定，有的人暂时离开了学校，以后又回来的，凡是离开学校不超过三个月的（不包括暑寒假期），可以连续计算工龄。\n      二、 敌伪和国民党统治时期在大学、中学或小学连续担任工作的正、副校长，解放后仍在该校连续担任工作的，一般应计算为连续工龄，但有反动身份者（一般可参照一九五三年一月二十六日劳动部所公布的“中华人民共和国劳动 保险条例实施细则修正草案”第四十一条的规定来掌握）， 则不应计算为连续工龄；敌伪和国民党统治时期在学校担任 训导长、训育主任、军事教官和专任反动政治课程（如党 义、三民主义、公民课）的时间，不应计算为连续工龄。"},{"type":"paragraph","text":"三、 “几点原则规定”第二条中的“经过一定手续调动的”，系指经过办学单位办理过调动手续，并非教职工本人自行离职的。"},{"type":"paragraph","text":"四、 一九六三年一月以后至“几点原则规定”下达前已办理退职、退休手续的，是否要补发退职、退休费差额的问题，根据“几点原则规定”第五条“本规定自一九六三年一月起实行”的规定，应该补发。"},{"type":"paragraph","text":"五、 关于各级学校教职工退职、退休时的工龄计算办法，除按“几项原则规定”执行以外，有关计算各级学校教职工工龄的其他一些问题，仍应按照国务院“关于处理国家机关工作人员退职、退休时计算工作年限的暂行规定”办理。"},{"type":"paragraph","text":"六、 对于各级学校教师中，教学经验丰富、教龄长而连续工龄短的老教师，在确定其退职、退休待遇时，经各省、自治区、直辖市高教、教育厅、局批准，可给以适当照顾。其中所指“教龄长”，我们意见，一般应掌握在二十年以上。"},{"type":"paragraph","text":"（摘自〔64〕高人学载字第176号文件）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"897805d6d8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
