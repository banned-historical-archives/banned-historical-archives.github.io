art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席参观试验田","authors":["南"],"parts":[{"type":"paragraph","text":"梁永胜这块半亩大的试验田，共植烟八百九十棵。预计每棵两荏可长三百二十个叶子，收烟一万五千斤以上。当时毛主席站在绿油油的烟叶丛中，举起手臂试了试，还没有够到头。"},{"type":"paragraph","text":"毛主席询问了烟叶过去的产量和品种以后说：“孩子比他妈长的还大。”毛主席用手分开密密麻麻的烟叶望了望，又很关切地说：“烟栽得稠，长得高，不透阳光，不通风，用绳子攀起来就好了。”"},{"type":"paragraph","text":"梁永胜点点头，向毛主席表示照办。"},{"type":"paragraph","text":"梁永胜是这个社的生产队长，共产党员，1954年复员回乡以后，一贯积极生产，曾两次被评为县的劳动模范。但是他怎么也没想到就在自己的试验田边，会见到亲爱的毛主席，并且和毛主席握了手。"},{"type":"paragraph","text":"毛主席临走时，梁永胜还特意拿了几把烤好的烟叶，送给主席带回北京。"},{"type":"paragraph","text":"当天，梁永胜就召开队务会，根据毛主席的指示，研究了对烟叶后期的管理方法，并用绳子和木杆把烟叶隔离开，使之通风、透光，更茁壮地成长。 （南）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d7c6fe4fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
