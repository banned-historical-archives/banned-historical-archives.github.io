":[],"dates":[{"year":1976,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海高桥热电厂党委以阶级斗争为纲，带领全厂广大革命职工认真学习毛主席的词二首和《人民日报》、《红旗》杂志最近发表的一系列重要文章；厂党委还举办各种类型的学习班，采取大会、小会相结合，干部、群众相结合的方法，组织广大群众投入回击右倾翻案风的战斗。通过学习、批判，广大革命职工纷纷表示要以革命和生产的新成绩回击右倾翻案风。"},{"type":"paragraph","text":"运行第一线的同志为了多发电和多供热，以主人翁的精神，值好班，监好盘。大家勤监视、勤联系、勤调整、勤操作，保证正常发电供热。检修同志了解到有一台锅炉下联箱漏时，感到如果停炉处理，每小时要直接影响发电量五万度，于是就坚持在困难的条件下工作，终于解决了这个问题，节约燃料油约十六吨。高压加热器是影响煤耗的一个重要因素，当有两台高压加热器漏时，检修工人马上进行了抢修，很快就把高压加热器修复了，每小时多发电八千度，约节煤七吨多。"},{"type":"paragraph","text":"在广大工人和干部的共同努力下，这个厂今年一月份主要生产指标发电量比计划超额百分之一点九六，发电煤耗、厂用电比去年同期都有下降，共节煤一千多吨，节电二十四万度。(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0a0f9c0b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
