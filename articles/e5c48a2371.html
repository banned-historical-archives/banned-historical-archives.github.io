阴谋暴动事件的通报（节录）","authors":["[公安部]"],"dates":[{"year":1952,"month":5,"day":16}],"is_range_date":false,"parts":[{"text":"甘肃，平凉等地发生群众性骚动及匪特阴谋暴动事件的通报（节录）","type":"title"},{"text":"[公安部]","type":"authors"},{"text":"最近甘肃平凉，海原，固原，皋兰一带连续发生群众性骚动，匪特活动，阴谋暴乱事件。8日平固有数区遭匪袭击，9日匪聚众数百，围攻平凉城，围后退海固地区，土匪群起，民匪难办，回汉饥民互相戒备。皋兰县公安局7日破获西北剿总司令部之第14师13师以下首要份子9人，曾已准备在11日暴动此类阴谋活动，利用“大刀队”“互扒道”等迷信会门团体组织群众以“反汉救国”为号召，其活动范围广泛，平凉专署县务公安处公安局干校警卫队贸司等机关单位均有内线。宁夏境内已有类似事件发生。在西北汉回杂居的各省区发生此类事件应引起我们严重警惕。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5c48a2371"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
