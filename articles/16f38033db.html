script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"军民春节送肥　痛击右倾翻案风","authors":[],"dates":[{"year":1976,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昨天大年初一，清晨，寒气袭人。漕河泾地区广大军民又连续第七年组织一千多人，把三千多担杂肥送到集心大队十七个生产队的田头。在近百亩的广阔田野里，到处红旗招展。贫下中农敲锣打鼓，早就在等候。送肥大军一到，大队党支部书记李长年上前紧紧握住镇党委领导同志和部队首长的手，激动地说:“你们不仅是送来几千担肥，更重要的是送来了‘政治营养’啊!”接着，镇党委领导成员、部队首长还与大队、生产队干部一起，交流学习毛主席词二首和元旦社论的体会，畅谈农业学大寨以来农村的大好形势。在座谈中，镇党委书记和部队首长谈了“到处莺歌燕舞”，“天地翻覆”的大好形势，热情歌颂无产阶级文化大革命。集心三队队长、团支部书记、插队知识青年王新民说:“漕河泾军民‘雪里送炭’的精神，使我深受教育。联系自己在贫下中农再教育下成长的事实，更体会到毛主席指引的上山下乡道路是反修防修的金光道。我们一定要把生产队建成大寨队，以实际行动回击右倾翻案风。”集心十八队老队长、老共产党员、老贫农孙雨香说:“我虽然年纪大了，革命还没有完，我要坚持无产阶级专政下继续革命，坚持前进，反对倒退，沿着毛主席的革命路线胜利前进!”"},{"type":"paragraph","text":"大家一致表示，在新的一年里，要为建设大寨县作出更大贡献，以实际行动迎头痛击右倾翻案风。"},{"type":"paragraph","text":"本报通讯　员"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16f38033db"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
