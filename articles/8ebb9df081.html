ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"在全国民兵代表会议筹备情况和安排意见报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在全国民兵代表会议筹备情况"},{"type":"paragraph","text":"和安排意见报告！上的批语"},{"type":"paragraph","text":"（1960年4月14日）"},{"type":"paragraph","text":"会前，请谭政同志与小平同志商量一次。我意注重实际解决问题，对外不要大吹。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月十四日"},{"type":"paragraph","text":"[1]中国人民解放军总政治部主任、国防部副部长谭政和国务院副总理习仲勋1960年3月21日给周恩来并毛泽东和中央的这一报告说，全国民兵代表会议筹备委员会于3月17日召开了第一次会议，有关会议的筹备情况和安排意见是：一、出席这次大会的代表5500人，其中民兵代表5040人，赤卫队、少先队、老民兵代表110人，军队准备退伍的士兵代表350人。二、会议准备在4月18日正式开幕，会期10天。会议方式以大会为主，结合中小会进行。拟请罗荣桓同志致开幕词，罗瑞卿同志作关于民兵建设问题的报告，林彪同志致闭幕词。三、建议开幕时请毛主席和中央负责同志到会，并接见一次到会代表，照相留念。另给到会代表发点奖品和纪念品。4月18日，全国民兵代表会议在北京开幕，毛泽东没有出席。"},{"type":"paragraph","text":"[2]小平，即邓小平，当时任中共中央总书记、中央军委常委、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":4,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":257,"page_end":257},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ebb9df081"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
