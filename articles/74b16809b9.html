script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"转发江苏省农业高额丰产会议情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发江苏省农业高额丰产会议"},{"type":"paragraph","text":"情况报告的批语\""},{"type":"paragraph","text":"（1956年2月19日、20日）廖鲁言同志："},{"type":"paragraph","text":"此件可以转发各地。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十九日"},{"type":"paragraph","text":"[1]本篇一是对中共江苏省委1956年2月10日关于江苏省农业高额丰产会议情况报告的批语；本篇二是在中央1956年2月20日转发江苏省委报告的批语稿上写的批语。"},{"type":"paragraph","text":"[2]指中共江苏省委1956年2月10日关于江苏省农业高额丰产会议情况给中央和上海局的报告。报告说，这次会议传达和讨论了农业发展纲要四十条，打开了大家的眼界和思路，不断克服了各种保守思想，注意纠正了无根据的胡思乱想。在此基础上，分稻麦区、杂谷区、棉区、山区大组交流和总结了丰产经验：一、合理改变耕作制度，增加复种面积，争取全面增产；二、积极进行农业基本建设，兴修农田水利，增积自然肥料，改良土壤，增添耕牛、农具；三、积极改进栽培技术，从选种到收获要有一系列的技术措施；四、因地制宜地抓主要增产措施。会议还进行了全省高额丰产的布局，规定了有关竞赛运动的办法，并分片、分级、分等规定了不同的粮棉丰产指标。毛泽东全集第三十六卷"},{"type":"paragraph","text":"刘、周阅，尚昆办。"},{"type":"paragraph","text":"1956年2月22日，全国工商界青年积极分子大会在北京开幕。图为毛泽东、刘少奇等和大会代表合影。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。[2]尚昆，即杨尚昆，当时任中共中央副秘书长、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":2,"day":19},{"year":1956,"month":2,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":232,"page_end":233},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74b16809b9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
