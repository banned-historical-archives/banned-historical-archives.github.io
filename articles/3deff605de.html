art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"荣昌县委加强对农副业管理防止不法商人进行投机剥削","authors":[],"parts":[{"type":"paragraph","text":"据新华社成都9日电 四川省荣昌县最近调查发现，农村副业生产管理有相当大的漏洞，少数人钻了这个空子，开始从事资本主义剥削。"},{"type":"paragraph","text":"漏洞比较明显的是在发展鸡鸭生产方面。去年政府为了发展副食品生产，指示荣昌县有关部门给孵鸭房和鸭棚子以支持和扶助。但有些干部只求多发展和多收购鸭子，凡鸭业代表自报的要粮计划，不认真审查，常常盲目地如数供给。少数有严重资本主义思想的鸭业代表就趁机钻了空子。如御侮乡鸭业代表、新华农业社孵鸭房的负责人张广运，过去是惯作投机生意的商人，在窃取了这些职位以后，近一年来，用虚报小鸭数目的办法套购了稻谷二万二千四百六十斤。他把每斤八分钱买来的大米，以一角五分到两角的高价转卖给鸭棚子，从中赚一笔钱。他在把合作社所孵的小鸭卖给鸭棚子时，又压低小鸭的价格，使鸭棚子能获厚利，然后在各鸭棚子中搭“干股子”分红，结果合作社孵鸭房大亏本，而张广运却大发财。一年前，张广运因为劳动不好，家庭生活困难，现在已买了狐皮大衣。"},{"type":"paragraph","text":"雇工经营的事情也在好些地方出现。双河乡一个叫郭兴顺的地主，最先是替高峰农业社运鸭子去重庆出卖。他用卖一元报六角的办法赚得一大笔钱后，现在专雇一个工人给自己放牧鸭群，他则坐享其成。现在，他用剥削的钱买了大皮衫小皮衫，还给家里人都买了新衣服和用品。"},{"type":"paragraph","text":"中共荣昌县委已经注意到这些问题，正采取措施堵塞副业管理方面的漏洞，阻止农村资本主义的发展。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3deff605de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
