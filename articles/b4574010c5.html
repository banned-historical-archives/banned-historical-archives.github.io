:["史直人","吴金城","姚文生","河南农学院","王守正","郭年喜"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“派代表到北京请愿是合法的”","type":"title"},{"text":"河南农学院吴金城史直人姚文生郭年喜王守正","type":"authors"},{"text":"吴金城（农59级学生）：林系派代表到北京请愿是合法的。杜心莲（注：右派分子）拿路费支持他们去北京没有错误。","type":"paragraph"},{"text":"史直人（农59级学生）：再次要求学校给高教部拍电报（注：要求并系），否则，我们将要到北京去请愿。我们所提意见，学校不解决，我们采取有效措施——罢课。","type":"paragraph"},{"text":"姚文生（农60级学生）：我们提出的要求是合理的，如果高教部不给答复的话，我们就罢课，拒绝实习，建议农60级十个班开会讨论不做“红色饭桶”问题。","type":"paragraph"},{"text":"郭年喜（林59级学生）：我不怕闹事，我兄弟多，要枪毙先枪毙我。","type":"paragraph"},{"text":"王守正（植保教研组讲师）：在报纸上，看到处处鸣得很厉害，为什么河南不放不鸣，这恐怕是河南省委有问题。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4574010c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
