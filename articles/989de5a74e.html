tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"最爱画毛主席像","authors":[],"parts":[{"type":"paragraph","text":"毛里塔尼亚某地，有个喜欢绘画的十来岁的小学生。有一天，他特地带了他的画册来找在当地工作的中国工程技术人员。人们一打开他的画册，发现差不多所有的画面都是画的毛主席像，其中有“毛主席接见红卫兵”、“毛主席接见毛里塔尼亚访华代表团”等等。这些图画充分反映了毛里塔尼亚儿童热爱毛主席的心情。当他谈到他为什么要画毛主席像时，他很严肃地说：我特别热爱毛主席！毛主席是世界人民的伟大领袖。他还真挚地说：“毛主席好！他反对帝国主义，反对美帝侵略工具以色列的侵略，支持阿拉伯人民的斗争！”"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"989de5a74e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
