的通报（节录）","authors":[],"dates":[{"year":1951,"month":7,"day":10}],"is_range_date":false,"parts":[{"text":"西北局关于清理中层以来自杀事件事情的通报（节录）","type":"title"},{"text":"6月2日控诉会后至6月15日的半月内在西北各省和西安市的机关中共发生自杀事件10起，其中2人服毒毙命……七人经急救无恙。自杀者有新社会某党一中统调工，一中统调查员……自杀有上吊，跳井，刀杀（用菜刀割纸刀刮须刀），服毒（多用安眠药）四种。……民大自杀娄渊亭当举刀时喊出：“同学们我要自杀了，20年反革命历史我对不起人民。”西安卫生局陈孟基服毒后在其身上检查出给其妻的一信说：“镇压反革命我很害怕，死后你不要为我这种历史不清的人掉泪。……”西北总工会的阎明在服毒前几日曾在同志们面前流露过：“当你回来时已不见我了”“我要自杀”等话语，但未引起领导上的足够重视，致使13日借口“家中没吃的”要求请假回家，返家后吃了安眠药片。","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f21f3558ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
