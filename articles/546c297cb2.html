ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"集中三四两纵各个弃灭九十一师","alias":"","parts":[{"type":"paragraph","text":"集中三四两纵各个歼灭九十一师川"},{"type":"paragraph","text":"（1946年11月11日）萧、江，并告林："},{"type":"paragraph","text":"根据你们微电，二十二师向凤城、通远堡集中，一九五师在通化，该两师暂不好打。九十一师分散在永陵、新宾、桓仁三处（桓仁是主力），请你们考虑集中三四两纵全力逐一攻击永陵、新宾、桓仁，各个歼灭九十一师，收复该三地并准备歼灭增援之敌。如该三地收复则通化之敌陷于孤立，可于尔后歼击之，南满局面即可好转，并很好地配合北满之作战。你们意见如何？"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"戌真亥"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北民主联军辽东军区司令员兼政治委员萧华和副政治委员江华的电报。"},{"type":"paragraph","text":"[2]林，指林彪，当时任东北民主联军总司令兼政治委员。"},{"type":"paragraph","text":"[3]南满，指中长路沈阳至大连段以东的安东（今丹东）、庄河、通化、临江、清原和沈阳西南的辽中等地区。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":273,"page_end":273},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"546c297cb2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
