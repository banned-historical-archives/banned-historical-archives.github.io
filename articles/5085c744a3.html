art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想伟大红旗插遍一切阵地","authors":["总后勤部机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"杨成武同志的《大树特树伟大统帅毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威》这篇重要文章，表达了我们无限忠于毛主席、忠于毛泽东思想、忠于毛主席的革命路线的深厚阶级感情。"},{"type":"paragraph","text":"在全世界已经进入了毛泽东思想伟大新时代的今天，全世界被压迫民族和被压迫人民，心向着新中国，仰望着毛主席。伟大的毛泽东思想指引着世界革命人民，正在向帝、修、反进行英勇的斗争。毛主席著作已经成为世界革命人民最爱读的宝书，《东方红》已经成为世界革命人民最爱唱的颂歌。毛主席是世界革命人民心中最红最红的红太阳。毛泽东思想照亮了全世界被压迫民族和被压迫人民彻底解放的道路，给全世界无产阶级和革命人民打开了通向共产主义的胜利航道。"},{"type":"paragraph","text":"我国人民和世界革命人民从长期的斗争实践中，切身体会到，有了毛主席，有了毛泽东思想，中国革命就一定胜利，世界革命就一定成功，共产主义就一定能在全世界实现。我们必须在自己头脑中大树特树伟大统帅毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威，让毛泽东思想在自己头脑里牢牢扎根，让毛泽东思想占领一切阵地。用毛泽东思想去统帅一切，分析一切，批判一切，改造一切，夺取我国无产阶级文化大革命的彻底胜利，夺取我国无产阶级文化大革命的彻底胜利，夺取反对帝国主义、现代修正主义和各国反动派的彻底胜利，把战无不胜的、光焰无际的毛泽东思想的伟大红旗插遍全中国，插遍全世界！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5085c744a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
