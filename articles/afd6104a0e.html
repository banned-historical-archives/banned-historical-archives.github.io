伯达"],"dates":[{"year":1967,"month":1,"day":22}],"is_range_date":false,"parts":[{"text":"陈伯达给蒯大富写的字条","type":"title"},{"text":"陈伯达","type":"authors"},{"text":"深入地研究毛泽东思想，原来的功名得之不易，保持也不易，要珍惜。不要随便接受来历不明的组织(有人在借用你的名义)，不要随便同一些来历不明的组织到处乱冲，有人想拉你们下水。要知道，这些态度不但关系到一个人和一个组织的名誉，你很不注意，有可能跌下去，对革命派都是不利的。革命的考验是严峻的，要遵照毛主席的教导，同群众打成一片，要调查研究，不要自以为是。没有鲜明的坚定的无产阶级政治倾向，最终是经不住的。不要毁掉自己。听说清华现在有不少的反动大字报，你们不表示正确的立场，就把自己置于不利的地位。要驳斥。自己树立真正的旗帜，对于这些要批驳、反驳。指出那些是上当或有阴谋，故意扰乱阵线，混乱大是大非。我们是爱护你们的，怕你们被搞臭。你们旗帜要鲜明，不鲜明要被人利用。要利用你们可能的时间，整顿你们的队伍，明确方向，否则打仗是盲目的，方向是错误的。革命派要团结、通气。各个革命派要通气，要交流经验，争论是原则的。无产阶级大联合，不要有小团体主义、宗派主义，不要个人主义。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"chuanxinlu2","name":"十年文革中首长讲话传信录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"陈伯达给蒯大富写的字条","parts":[{"type":"title","text":"434．陈伯达给蒯大富写的字条"},{"type":"paragraph","text":"(1967年1月22日)"},{"type":"paragraph","text":"深入地研究毛泽东思想，原来的功名得之不易，保持也不易，要珍惜。不要随便接受来历不明的组织(有人在借用你的名义)，不要随便同一些来历不明的组织到处乱冲，有人想拉你们下水。要知道，这些态度不但关系到一个人和一个组织的名誉，你很不注意，有可能跌下去，对革命派都是不利的。革命的考验是严峻的，要遵照毛主席的教导，同群众打成一片，要调查研究，不要自以为是。没有鲜明的坚定的无产阶级政治倾向，最终是经不住的。不要毁掉自己。听说清华现在有不少的反动大字报，你们不表示正确的立场，就把自己置于不利的地位。要驳斥。自己树立真正的旗帜，对于这些要批驳、反驳。指出那些是上当或有阴谋，故意扰乱阵线，混乱大是大非。我们是爱护你们的，怕你们被搞臭。你们旗帜要鲜明，不鲜明要被人利用。要利用你们可能的时间，整顿你们的队伍，明确方向，否则打仗是盲目的，方向是错误的。革命派要团结、通气。各个革命派要通气，要交流经验，争论是原则的。无产阶级大联合，不要有小团体主义、宗派主义，不要个人主义。"}],"authors":["陈伯达"],"dates":[{"year":1967,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":101,"page_end":101,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id
