script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"目前八路军在华北华中的方针","description":"根据毛泽东手稿刊印。","dates":[{"year":1940,"month":4,"day":1}],"parts":[{"text":"目前八路军在华北华中的方针","type":"title"},{"type":"paragraph","text":"朱彭，杨，刘邓，徐朱，陈罗，雪枫，胡服，项英陈毅："},{"type":"paragraph","text":"目前我在华北、华中之方针："},{"type":"paragraph","text":"（一）某方现在黄河以北及吕梁山脉集中大军，我之任务在于极力缓和之，避免一切刺激某方之言论行动。我军则谨守防线，深沟高垒，以备不虞，对其军事挑衅极力忍耐，不还一枪，多写诚恳坚定而无刺激性的函件、传单、标语，达到缓和其情绪，稳定我防线，使山西、河北两省归于平静局面之目的。非得中央同意，不得发生军事冲突。"},{"type":"paragraph","text":"（二）某方现在鄂中、皖东、淮北三区大举进攻新四军，我新四军应坚决而有计划地进行自卫战争，其皖东、淮北两地，务须独力坚持三个月，以待援军到达，然后大举反攻。"},{"type":"paragraph","text":"（三）我八路军有抽调足够力量南下华中增援新四军，打退反动进攻，消灭投降反共势力，建设新的伟大抗日根据地之任务。此根据地以淮河以北、淮南铁路以东、长江以北、大海以西为范围。其指挥人员与兵力配备由朱、彭统筹之。其到达时间，分为三期：第一期须有一个主力团，以急行军于一个月内外到达皖东；第二期为三四四旅，须于两个月内到达淮河附近；第三期须有相当大的兵力（不少于一万五千人），于三个月内外到达苏北扬州附近。一、二、三期兵力总数，共须四万至五万人，方能完成此紧急伟大任务。"},{"type":"paragraph","text":"（四）我鲁南、胶东部队，须积极行动，消灭一切最反动的投降反共势力，扩大抗日根据地。惟须极力争取中间势力，对一切尚能与我合作抗日之部队及虽然不好但尚未向我进攻之部队，均须极力联络，不得侵犯其一人一枪。"},{"type":"paragraph","text":"（五）无论华北、华中，一律依照中央迭次指令，采取政治上的攻势，号召一切友军反对内战，拥蒋讨汪，团结抗战。"},{"type":"paragraph","text":"（六）总的目的，在于打退反动进攻，扩大抗日势力，克服投降危险，争取时局好转。"},{"type":"paragraph","text":"（七）具体布置，各地依此总方针计划之。"},{"type":"paragraph","text":"中央及军委"},{"type":"paragraph","text":"四月一日"}],"comment_pivots":[{"part_idx":1,"offset":24,"index":1},{"part_idx":3,"offset":5,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["朱，指朱德。彭，指彭德怀，当时任八路军副总司令。杨，指杨尚昆，当时任中共中央北方局书记。刘邓，指刘伯承、邓小平，当时分别任八路军第一二九师师长和政治委员。徐朱，指徐向前、朱瑞，当时分别任八路军第一纵队司令员和政治委员。陈罗，指陈光、罗荣桓，当时分别任八路军第一一五师代师长和政治委员。雪枫，即彭雪枫，当时任新四军第六支队司令员兼政治委员。胡服，即刘少奇。项英，当时任中共中央东南局书记、中央军委新四军分会书记、新四军副军长。陈毅，当时任新四军江南指挥部指挥。","指国民党当局。"],"page_start":292,"page_end":293,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bb65f81e8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
