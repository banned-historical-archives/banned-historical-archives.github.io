ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"给罗元贞的信","alias":"","parts":[{"type":"paragraph","text":"给罗元贞的信\"！"},{"type":"paragraph","text":"（1952年1月9日）元贞先生："},{"type":"paragraph","text":"一月一日来信收到，感谢你的好意。此复。顺颂教祺！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年一月九日"},{"type":"paragraph","text":"[1]罗元贞（1906一1993），广东兴宁人。早年于日本早稻田大学文学院毕业。精诗词，擅联语。新中国成立初期在东北师范大学任教，1951年，他决定到山西大学任教。可是直到1952年元旦仍未启程。那时他读了流传的毛泽东《七律·长征》诗后，在这年元旦给毛泽东写信，建议将该诗“金沙浪拍悬崖暖”中的“浪拍”改为“水拍”。这是毛泽东1月9日的复信。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":250,"page_end":250},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"162f77d0e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
