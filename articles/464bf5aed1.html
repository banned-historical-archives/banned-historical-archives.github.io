dates":[{"year":1960,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"凯莱齐副主席谈访华观感"},{"type":"paragraph","text":"中国高举反帝反修正主义旗帜"},{"type":"paragraph","text":"中国共产党所制定的社会主义总路线、大跃进和人民公社三面红旗是非常正确的方针，是创造性地发展了马克思列宁主义。"},{"type":"paragraph","text":"新华社地拉那27日电　以阿尔巴尼亚劳动党中央委员、部长会议副主席、阿中友好协会主席阿·凯莱齐为首的阿尔巴尼亚中国友好协会代表团，26日下午会见了中国驻阿尔巴尼亚大使罗士高，请他向中国人民、中国共产党和中国政府转达代表团的谢意。"},{"type":"paragraph","text":"凯莱齐在会见时说，阿中友协代表团在访问中国期间，到处都受到热情的接待。每到一个地方，都看到了伟大的中国人民对阿尔巴尼亚人民和阿尔巴尼亚劳动党的深情热爱。他说，我们带去了阿尔巴尼亚人民对中国人民的友谊，现在我们又把亲眼看到和亲身体验到的中国人民对阿尔巴尼亚人民的友谊带回到阿尔巴尼亚。他说，这种友谊是牢不可破的。"},{"type":"paragraph","text":"凯莱齐团长谈到了访问中国的所见所闻，并且热情地称赞中国人民取得的成就。他说，这种成就是伟大的。中国共产党所制定的社会主义建设总路线、大跃进和人民公社三面红旗是非常正确的方针，是创造性地发展了马克思列宁主义。人民公社办得很好。中国人民非常热爱自己的党。他还说，中国共产党是马克思列宁主义的政党，它同人民有着密切的联系，坚决地高举着反对帝国主义和反对修正主义的旗帜。"},{"type":"paragraph","text":"会见时，罗士高大使问候了阿中友协代表团全体团员，并且感谢他们为增进中阿两国友谊所作出的努力。宾主并为中阿两国人民的友谊，为马克思列宁主义的党、为毛泽东主席和霍查同志的健康祝酒。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"464bf5aed1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
