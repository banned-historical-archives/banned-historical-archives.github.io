","authors":[],"dates":[{"year":1972,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社上海一九七二年七月四日讯　上海市革命委员会今天晚上举行宴会，热烈欢迎斯里兰卡共和国总理西丽玛沃·班达拉奈克夫人及其随行人员和西丽玛沃·班达拉奈克总理的儿子阿努拉·班达拉奈克。"},{"type":"paragraph","text":"斯里兰卡驻中国大使卡朗纳戈达和夫人，大使馆参赞巴勒苏布拉马尼耶姆应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会作陪的有:国务院总理周恩来，上海市革命委员会副主任、上海警备区政治委员王洪文，上海市革命委员会副主任马天水、周纯麟、杨富珍、刘耀宗、周丽琴，外交部副部长韩念龙，水电部副部长钱正英，中国驻斯里兰卡大使马子卿和郭枫同志等。"},{"type":"paragraph","text":"宴会大厅里并排悬挂着斯里兰卡国旗和中国国旗。在洋溢着中、斯两国人民团结友好气氛的宴会上，王洪文副主任和西丽玛沃·班达拉奈克总理先后讲了话。"},{"type":"paragraph","text":"王洪文副主任在讲话中说，西丽玛沃·班达拉奈克总理到上海访问，给上海人民带来了斯里兰卡人民的深厚情谊和极大鼓舞。他说，这次西丽玛沃·班达拉奈克总理访问我国，必将进一步加强我们两国之间的友好合作关系和两国人民的传统友谊。他请西丽玛沃·班达拉奈克总理把上海人民的真挚友情和亲切问候，带给斯里兰卡人民。"},{"type":"paragraph","text":"西丽玛沃·班达拉奈克总理在讲话中说，在我们即将离开中国返回斯里兰卡的时候，我必须说，我在你们国家看到了你们发展的情况，看到了你们在改进经济方面大踏步地前进，这一切，给我们留下了深刻的印象。她说，我们所到之处都受到了热情的接待，这说明中国人民珍视我们的友谊和亲切的友情。我将带着深刻的记忆离开你们的国家，我将带去中国人民良好的祝愿。"},{"type":"paragraph","text":"西丽玛沃·班达拉奈克总理说，我毫不怀疑，我们这次对你们伟大国家的访问将会加强中国人民和斯里兰卡人民已经存在的友谊。"},{"type":"paragraph","text":"王洪文副主任和西丽玛沃·班达拉奈克总理的讲话激起全场热烈的掌声。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\07\\7275010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市革命委员会昨晚举行宴会，热烈欢迎西丽玛沃·班达拉奈克总理以及其他斯里兰卡贵宾·这是西丽玛沃·班达拉奈克总理由周恩来总理、王洪文副主任等陪同下步入宴会厅。　新华社记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a878af0ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
