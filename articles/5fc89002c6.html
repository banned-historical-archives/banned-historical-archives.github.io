<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上柴厂革委会把大抓毛泽东思想教育放在一切工作首位发动群众大学大用毛主席最新指示　依靠群众大力办好毛泽东思想学习班有力促进广大职工思想革命化，推动了抓革命促生产","authors":[],"dates":[{"year":1968,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海柴油机厂革命委员会以毛主席的最新指示为纲，“从教育着手，扩大教育面”，“先作试点，取得经验，逐步推广”，大办各种类型的毛泽东思想学习班，深入发动群众，开展“斗私，批修”，全面落实毛主席的最新指示，有力地促进了广大革命职工的思想革命化，有力地推动了“抓革命，促生产”以及各项工作全面的深入开展。全厂热气腾腾，呈现出一片“团结、紧张、严肃、活泼”的生气勃勃的革命景象。"},{"type":"paragraph","text":"这个厂在去年“八·四”新生以后，全厂的无产阶级革命派和广大革命职工，在全市无产阶级革命派的大力支持下，迅速地全面恢复了生产，月月超额完成了原定的生产计划，并实现了革命的“三结合”，建立了厂革命委员会。"},{"type":"paragraph","text":"可是，新的临时权力机构建立起来以后，马上遇到了一连串问题:厂里虽然已经没有两派，但是原来两派在思想上的隔阂和对立情绪仍然存在，一些原来站错过队、犯过错误的党员和群众，因为喝过几口水，怕再犯错误，就想一门心思埋头搞生产；有的“老造反”看看“造反派”已坐天下了，劲渐渐地松下来；有的连阶级斗争的观念也逐渐淡薄。这些问题的存在，严重地影响了斗批改深入的开展。厂革委会和“东方红”总部的负责人心里很着急，怎么办呢?他们根据毛主席关于“以后干部要分别到下面去走一走，看一看，要坚持群众路线，遇事多和群众商量，做群众的小学生。在某种意义上来说，最聪明、最有才能的，是最有实践经验的战士”的教导，深入到群众中去，终于发现了油泵车间的工人已自觉地组织了“抗大”式的毛泽东思想业余学习班。这个车间一面生产，一面坚持办好业余学习班，带着问题学习毛主席最新指示，开展以自我批评和谈心为主的学习活动，自觉“斗私，批修”，发扬“团结、紧张、严肃、活泼”的“抗大”优良传统，为落实毛主席最新指示创造了不少好经验。于是，厂革委会和“东方红”总部立即召开会议，介绍了油泵车间的经验。通过反复讨论，一致认为，要立即掀起一个学习和落实毛主席最新指示的群众运动，大办毛泽东思想学习班。干部思想统一了，立刻分头去组织战斗。"},{"type":"paragraph","text":"通过大学习、大批判，以及油泵车间经验的推广，全厂各种类型的毛泽东思想学习班象雨后春笋一样地涌现出来，职工们的精神面貌有了很大的改变。全厂所有的车间、科室，甚至连一些宿舍、家庭都分别举办了各种类型的毛泽东思想学习班。有一千七百多人轮流参加过毛泽东思想学习班。把被头铺盖搬到学习班的就有四百多人。特别是寝室里的一些过去下班后只顾打打扑克、搞搞无线电、结结绒线的青年，也组织起来，投入了大学大用毛主席最新指示的热潮。学习班里新人新事不断涌现。休假日，不少学员放弃休息，到职工家里去访问，开展谈心活动。有些原来思想隔阂很深，通过各自多做自我批评，共同“斗私，批修”，消除了隔阂。一些曾发誓互不讲话的“冤家”成了亲人，“对头”成了战友。很多工人说:“毛泽东思想学习班就是好!”"},{"type":"paragraph","text":"目前，天气寒冷，全厂的学习和落实毛主席最新指示的群众运动却搞得热火朝天。每天清晨五点多钟，天还未亮，各车间、科室的一队队“抗大”式毛泽东思想业余学习班的学员们，就开始了新的一天的战斗生活，他们学习解放军，列着队，雄赳赳气昂昂，以整齐的步伐，边跑步边高呼:“敬祝毛主席万寿无疆!万寿无疆!万寿无疆!”“读毛主席的书!”“听毛主席的话!”“照毛主席的指示办事!”“做毛主席的好战士!”坚持军事操练。毛主席的语录歌声和口号声此起彼落，真是一派热气腾腾的新气象。不少老工人激动地说:“这是上柴厂开天辟地没有过的，没有过的。”"},{"type":"paragraph","text":"现在，全厂革命职工正以饱满的革命精神，认真学习中央两报一刊的元旦社论，决心为实现毛主席的无产阶级司令部提出的伟大战略目标，夺取无产阶级文化大革命的全面胜利立新功。(上海柴油机厂革委会政宣组供稿)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fc89002c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
