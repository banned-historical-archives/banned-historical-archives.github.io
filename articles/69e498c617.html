script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《人民之声报》发表文章  揭露苏联新资产阶级统治的腐败现象  科威特报纸指出苏联是阿拉伯人民的阴险敌人","authors":[],"dates":[{"year":1975,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》发表文章"},{"type":"paragraph","text":"揭露苏联新资产阶级统治的腐败现象"},{"type":"paragraph","text":"科威特报纸指出苏联是阿拉伯人民的阴险敌人"},{"type":"paragraph","text":"新华社地拉那一九七五年八月六日电　阿尔巴尼亚《人民之声报》八月六日发表题为《行贿和犯罪是今日苏联社会的特征》的文章，揭露苏修领导集团统治下今日苏联社会的腐败现象。"},{"type":"paragraph","text":"文章说，贪污行贿和犯罪行为已成为今日苏联社会中司空见惯的现象。由党政高级官吏和军事官僚集团等组成的当权的苏联新资产阶级，把攫取最大利润和个人发财致富奉为座右铭。这一新型资产阶级把贪污行贿变成了今日苏联资本主义社会活动的一个基础。"},{"type":"paragraph","text":"文章说，外国通讯社前不久曾报道过这样一桩严重丑闻：有人揭发前苏联文化部长福尔采娃为自己的女儿在莫斯科郊区盖了一座富丽堂皇的别墅，并且少付了数千卢布的建筑材料费。人们为此要求她辞职，可是她却威胁说，如果要她下台，她就要揭发她的政府同事们更为严重的丑闻。事实上，正如苏修报刊供认的那样，当权的苏联资产阶级在莫斯科、巴库和其他气候宜人的地方已经建成并且正在建造大量私人住宅和别墅。而所有这一切都是利用官位并通过盗窃、投机、行贿等手段进行的。"},{"type":"paragraph","text":"文章指出，在今日的苏联经济生活中，各企业经理拥有一切行政权力。他们操纵了分配大权，运用这种权力使自己的收入以及由他们培植的工人贵族的收入不断增加。这一点也体现在企业管理人员、工程技术人员同工人之间巨大的工资差额上面。据苏修报刊透露，一九六七至一九七二年期间，苏联工程技术人员的工资平均要比工人的工资高出十二倍。企业中用于“物质刺激”的资金，四分之三落入管理人员的腰包。此外，工厂经理有权开除工人，通过提高劳动强度攫取利润。他们追求利润的奢欲是无止境的，他们追求利润的手段是多种多样的。"},{"type":"paragraph","text":"文章接着说，犯罪行为是今日苏联社会中另一个常见的现象。"},{"type":"paragraph","text":"新华社科威特电　科威特《政治报》七月三十日刊登了一封读者来信。这封信说，苏联“假装同阿拉伯人友好，而实际上是我们的阴险敌人，它一直在千方百计地把它的影响强加给整个阿拉伯世界。”"},{"type":"paragraph","text":"这封读者来信说：“众所周知，在（中东一九七三年）十月战争开始的时刻，在阿拉伯武装部队取得了巨大胜利的时刻，苏联驻埃及大使要求埃及和叙利亚立即停火，以便使以色列能够击败我们。这正是因为俄国人知道，如果阿拉伯人打败了以色列，那就意味着苏联在这一地区影响的结束。”"},{"type":"paragraph","text":"信中还谴责苏联力图干涉阿拉伯国家的内部事务，以达到破坏阿拉伯民族团结的目的；谴责苏联在埃及经济很困难的时候向埃及逼债。"},{"type":"paragraph","text":"读者来信最后说，阿拉伯人不仅警惕美国和以色列犹太复国主义，而且还特别警惕来自苏联的危险。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69e498c617"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
