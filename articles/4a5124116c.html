tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我党代表团离京到达平壤金日成同志接见李先念同志等一行","authors":[],"parts":[{"type":"paragraph","text":"据新华社10月9日讯 以中共中央副主席李先念为团长的中国共产党代表团，应邀参加朝鲜劳动党第六次全国代表大会，今天早晨乘专机离开北京前往平壤。"},{"type":"paragraph","text":"中共中央副主席邓小平到机场为代表团送行。"},{"type":"paragraph","text":"代表团团员有：中共中央政治局委员张廷发、中联部副部长乔石、中国驻朝鲜大使吕志先（已在平壤）。"},{"type":"paragraph","text":"据新华社平壤10月9日电 以中共中央副主席李先念为团长的中国共产党代表团今天上午乘专机到达平壤，前来参加朝鲜劳动党第六次代表大会和劳动党建党35周年纪念活动。"},{"type":"paragraph","text":"代表团到达平壤顺安机场时，受到朝鲜劳动党中央政治委员会委员金焕、劳动党中央政治委员会候补委员吴克列等朝鲜同志的欢迎。"},{"type":"paragraph","text":"据新华社平壤10月9日电 朝鲜劳动党中央委员会总书记金日成今天上午在锦绣山议事堂接见了以李先念为团长的中国共产党代表团。"},{"type":"paragraph","text":"金日成同志在议事堂门口热情地迎接李先念同志，并同代表团成员一一握手。"},{"type":"paragraph","text":"金日成同志同代表团全体同志进行了亲切友好的谈话。李先念同志热烈祝贺朝鲜劳动党第六次代表大会将要召开和建党35周年。金日成同志对李先念率领中国共产党代表团的到来表示热烈欢迎。他说，你们的到来给朝鲜劳动党六大和建党35周年庆祝活动增添了光彩。"},{"type":"paragraph","text":"接见后，金日成设午宴招待李先念一行。"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a5124116c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
