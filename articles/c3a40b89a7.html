al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"给杨钟健“的信","alias":"","parts":[{"type":"paragraph","text":"给杨钟健的信"},{"type":"paragraph","text":"（1921年9月29日）钟健先生："},{"type":"paragraph","text":"前几天接到通告，知先生当选执行部主任。今日又接来示，瞩补填入会愿书，今已照填并粘附小照奉上。惟介绍人系王君光祈为我邀集五人，我现在只能记得三人，余二人要问王君才能知道。以后赐示，请寄长沙潮宗街文化书社?为荷！"},{"type":"paragraph","text":"弟泽东"},{"type":"paragraph","text":"二十九日"},{"type":"paragraph","text":"[1]杨钟健（1897一1979)，陕西华县人，古生物学家。当时是少年中国学会执行部主任。"},{"type":"paragraph","text":"[2]王光祈（1892一1936），四川温江人，少年中国学会的发起人之一。曾任该会第一届执行部主任。"},{"type":"paragraph","text":"[3]文化书社是毛泽东等为传播新思想新文化、宣传马克思主义而在长勐多部主依。子廷事永，需满"},{"type":"paragraph","text":"经鱼气生人然饮在只秘纪三人怕三天要同更上·州人你王又光物办永尊鱼"},{"type":"paragraph","text":"衍然天属到画光知岁赏登先"},{"type":"paragraph","text":"1921年10月，毛泽东、何叔衡在长沙组建中共湖南支部。1922年5月，在此基础上成立了中共湘区委员会，毛泽东任书记。图为区委机关旧址"},{"type":"paragraph","text":"长沙清水塘。《湖南共产主义小组》(油画）《湖南共产主义小组》(油画）"}],"authors":["毛泽东"],"dates":[{"year":1921,"month":9,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":448,"page_end":451},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3a40b89a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
