ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1942年8月29日）"},{"type":"paragraph","text":"财政比例，要保证军事第一，党、政、军按比例支钱，根据人数、工作、生产能力三个条件确定财政比例。精兵简政，除包括精简、效能、统一外，加上节约和反官僚主义两项。精兵简政是一个政策，牵涉到军民关系、军事建设、行政效能、工作作风、财政政策等各方面。中央和军委共有二万四千余人，应减为五六千人。中央工作的原则是指导工作和教育干部。西北局高干会十月开会，讨论中央关于统一抗日根据地党的领导及调整各组织间关系的决定。《解放日报》今年四月改版后是有进步的，要执行党的日常政策。《解放日报》社论及广播消息，是中央向人民说话，个人发表的文章也有很大的影响。今后日常政策问题报社应请示中央。要使《解放日报》成为中共中央的机关报，还需要作很大的努力。由秦邦宪、陆定一起草一个党报工作条例。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":8,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":129,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a356ced1e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
