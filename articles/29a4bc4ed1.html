year":1966,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"打倒资产阶级的“权威”"},{"type":"paragraph","text":"南汇县新场公社　谈敬德"},{"type":"paragraph","text":"我是一个农村青年。过去，我对夏衍、田汉等等“名家”有迷信，以为他们“文化高”，“知识足”，写出来的东西一定都是很了不起的，最近这些日子，看了报纸上对他们的批判，又学习了解放军报的社论《高举毛泽东思想伟大红旗，积极参加社会主义文化大革命》，脑子豁亮了。原来他们这些“名家”，不是替工农兵服务的“家”，不是替社会主义服务的“家”，而是道道地地替资产阶级服务的“家”。他们的文化知识，不是红的，是黑的。他们写出来的东西，对于无产阶级和劳动人民说来，不但没有什么了不起，而且是害人的东西，是反党反社会主义的黑线里的货色。他们要我们的文化艺术回到三十年代去，就是要我们离开社会主义的道路，走资本主义的回头路。"},{"type":"paragraph","text":"毒草不锄，庄稼不长。我们工农兵要做文化的主人，就一定要起来参加文化战线上这场兴无灭资的大战，我们要打倒资产阶级的“权威”，要把那些封建的、资产阶级的、修正主义的“菩萨老爷”从他们的“宝座”上赶下来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29a4bc4ed1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
