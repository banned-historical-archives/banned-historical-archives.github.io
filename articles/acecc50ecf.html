tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"赞三个战士——廖初江；丰福生；黄祖示学习毛主席著作展览观后","authors":["周鹤/温民法"],"parts":[{"type":"paragraph","text":"大厅里陈列着"},{"type":"paragraph","text":"三个战士的事迹；"},{"type":"paragraph","text":"大厅里体现了"},{"type":"paragraph","text":"三个战士的形象。"},{"type":"paragraph","text":"翻阅册册笔记簿，"},{"type":"paragraph","text":"闻着页页墨迹香，"},{"type":"paragraph","text":"透过行行字，"},{"type":"paragraph","text":"望见三颗红心在跳荡。"},{"type":"paragraph","text":"他们读了主席著作十遍、四十遍，"},{"type":"paragraph","text":"一天不读心不畅，"},{"type":"paragraph","text":"觉也睡不甜，"},{"type":"paragraph","text":"饭也吃不香。"},{"type":"paragraph","text":"他们说：这书啊，"},{"type":"paragraph","text":"茫茫雾海引路灯，"},{"type":"paragraph","text":"能给革命导航向，"},{"type":"paragraph","text":"读了激情汹涌，革命有力量！"},{"type":"paragraph","text":"他们日夜勤奋学，"},{"type":"paragraph","text":"沿着真理阶梯级级上。"},{"type":"paragraph","text":"毛泽东思想的光辉照亮了"},{"type":"paragraph","text":"他的连，他的班，他的厨房……"},{"type":"paragraph","text":"是他，大路迢迢千里外，"},{"type":"paragraph","text":"捎回三个苹果给小张，"},{"type":"paragraph","text":"祝贺战友入伍后新的进步，"},{"type":"paragraph","text":"把阶级友爱种在战友心坎上。"},{"type":"paragraph","text":"是他，坐在锅炉前，"},{"type":"paragraph","text":"寻思省煤的妙方，"},{"type":"paragraph","text":"根儿扎在炊事房，"},{"type":"paragraph","text":"心比炉火旺！"},{"type":"paragraph","text":"是他，七十里路风和霜，"},{"type":"paragraph","text":"午夜担菜回营房。"},{"type":"paragraph","text":"此时战友睡正酣，"},{"type":"paragraph","text":"他又悄悄上哨去换岗。"},{"type":"paragraph","text":"什么是革命的动力？"},{"type":"paragraph","text":"哪里有力量的矿藏？"},{"type":"paragraph","text":"毛泽东思想永不忘，"},{"type":"paragraph","text":"革命马达胸前响。"},{"type":"paragraph","text":"我要唱一千支歌赞美你们——"},{"type":"paragraph","text":"廖初江、丰福生、黄祖示。"},{"type":"paragraph","text":"你们平凡又很了不平凡，"},{"type":"paragraph","text":"你们寻常又很不寻常！"},{"type":"paragraph","text":"平凡——"},{"type":"paragraph","text":"是你们战斗的岗位，"},{"type":"paragraph","text":"不平凡——"},{"type":"paragraph","text":"是你们崇高的思想！"},{"type":"paragraph","text":"寻常——"},{"type":"paragraph","text":"是你们朴素的自身，"},{"type":"paragraph","text":"不寻常——"},{"type":"paragraph","text":"是毛泽东战士的高大形象！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acecc50ecf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
