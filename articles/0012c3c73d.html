art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟毛主席奋勇前进","authors":["张金栋"],"parts":[{"type":"paragraph","text":"韶出冲，郁葱葱，"},{"type":"paragraph","text":"朝霞万里舞东风，"},{"type":"paragraph","text":"红太阳从这里升起，"},{"type":"paragraph","text":"万水千山红彤彤。"},{"type":"paragraph","text":"浏阳河，浪花飞，"},{"type":"paragraph","text":"汹涌澎湃奔腾急，"},{"type":"paragraph","text":"毛主席河边举红旗，"},{"type":"paragraph","text":"秋收起义风雷激。"},{"type":"paragraph","text":"井冈山，革命山，"},{"type":"paragraph","text":"巍峨挺拔入云天，"},{"type":"paragraph","text":"毛主席山头点火炬，"},{"type":"paragraph","text":"革命烈火遍地燃。"},{"type":"paragraph","text":"雄关漫道长征路，"},{"type":"paragraph","text":"征途万里红旗舞，"},{"type":"paragraph","text":"大渡、金沙无阻挡，"},{"type":"paragraph","text":"雪山、草地迈阔步。"},{"type":"paragraph","text":"延安窑洞油灯亮，"},{"type":"paragraph","text":"革命人民齐仰望，"},{"type":"paragraph","text":"毛主席灯下挥巨笔，"},{"type":"paragraph","text":"卷卷雄文指方向。"},{"type":"paragraph","text":"北京城，金色城，"},{"type":"paragraph","text":"光芒四射红日升。"},{"type":"paragraph","text":"毛主席登上天安门，"},{"type":"paragraph","text":"文化革命风云涌。"},{"type":"paragraph","text":"风云涌，战旗红，"},{"type":"paragraph","text":"七亿神州齐欢腾。"},{"type":"paragraph","text":"紧跟毛主席奋勇前进，"},{"type":"paragraph","text":"祖国江山万代红！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0012c3c73d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
