[{"year":1952,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:全国各高等学校及中等技术学校从九月份起一律发给人民助学金了。从这里我再一次地体验到毛主席对我们的关怀是无微不至的。我们在学校中，当天冷了，发棉衣给我们穿，天热时又替我们新做了帐子，装上了纱窗；现在为了增进同学们的健康，又供给了人民助学金，毛主席每时每刻都在关怀着我们青年学生!祖国大规模的经济建设即将开始，我一定要好好地学习，提高政治水平，掌握科学技术，用实际行动来报答毛主席对我们的爱护。"},{"type":"paragraph","text":"华东纺织工学院学生　费德琪"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d98ffdcf63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
