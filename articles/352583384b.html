1976,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"嘉定县方泰公社理论组"},{"type":"paragraph","text":"正当全国人民认真学习毛主席的重要指示，深入批判邓小平的反革命的修正主义路线的时候，在天安门广场发生了反革命政治事件。在这次反革命事件中，一小撮反革命分子公开吹捧邓小平，妄图推出邓小平当匈牙利反革命事件的头子纳吉，这充分说明邓小平是社会上地、富、反、坏、右，牛鬼蛇神的大黑伞，是资本主义复辟势力的总代表。邓小平重新工作以后，就疯狂向无产阶级反攻倒算，他背着毛主席、党中央，抛出“三项指示为纲”的修正主义纲领，否定以阶级斗争为纲，篡改党的基本路线，要翻文化大革命的案，算文化大革命的帐，以便让被打倒的剥削阶级重新上台。他的罪恶活动，不仅代表了老的地主资产阶级的复辟愿望，而且集中反映了新资产阶级妄图将社会主义的新中国一口吞下去的贪婪心理。主呼仆应，我们公社里也有一小撮阶级敌人公开跳出来，攻击无产阶级教育革命，扬言把自己的“出头之日”寄托在邓小平身上。这些触目惊心的阶级斗争事实，使我们清楚地看到，党内走资本主义道路的当权派同社会上的资产阶级和没有改造好的地、富、反、坏、右，就是这样联系在一起的。邓小平站在资产阶级立场上，否定无产阶级专政，反对社会主义革命，搞复辟倒退，就必然成为一切牛鬼蛇神的大黑伞。"},{"type":"paragraph","text":"天安门广场发生的这场反革命政治事件，其反动气焰如此嚣张，这充分反映了一小撮阶级敌人，特别是党内资产阶级反革命的疯狂性。对于他们的这种疯狂性，我们贫下中农并不陌生。文化大革命初期，刘少奇、邓小平为了挽救自己失败的命运，就极力推行资产阶级反动路线，镇压广大革命群众；林彪一伙在九届二中全会上发动的反革命政变阴谋败露后，就破釜沉舟，策划反革命武装政变。今天，一小撮反革命分子眼看邓小平原形毕露，复辟资本主义的迷梦又一次破灭了，于是，他们就公开跳出来，“扬眉剑出鞘”，杀气腾腾地赤膊上了阵。但是，他们逃脱不了“捣乱，失败，再捣乱，再失败，直至灭亡”的逻辑，在强大的无产阶级专政面前，他们得到了应有的惩罚。"},{"type":"paragraph","text":"党内资产阶级为了推行反革命的修正主义路线，总是要极力网罗复辟势力，作为他们复辟资本主义的社会基础。邓小平重新工作以后，一面对革命派开刀，一面学着孔老二，“请隐士”、“举逸民”，拼凑“还乡团”，向无产阶级反攻倒算。天安门广场的反革命政治事件，就是党内外资产阶级和社会上的残渣余孽，妄图颠覆无产阶级专政的阴谋的大暴露。惊心动魄的阶级斗争，又一次告诫我们:“切不可书生气十足，把复杂的阶级斗争看得太简单了。”广大贫下中农说得好:“邓小平搞资本主义熟门熟路，资产阶级野心越来越大，我们贫下中农一定要把他批得体无完肤。”我们一定要加倍提高革命警惕，密切注意阶级斗争新动向，用抓革命、促生产的实际行动来保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线，保卫无产阶级专政的社会主义祖国，把批邓和反击右倾翻案风的伟大斗争进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"352583384b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
