script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都举行章士钊先生追悼会会场里摆着伟大领袖毛主席送的花圈　送花圈的还有董必武、宋庆龄、朱德、周恩来、康生、叶剑英等　朱德、周恩来、叶剑英、李先念、邓小平、郭沫若、阿沛·阿旺晋美、周建人、傅作义、许德珩等参加追悼会傅作义主持追悼会郭沫若致悼词","authors":[],"dates":[{"year":1973,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年七月十二日电　第三届全国人民代表大会常务委员会委员、中国人民政治协商会议第四届全国委员会委员、中央文史研究馆馆长章士钊追悼会，今天下午在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"追悼会会场里悬挂着章士钊先生的遗像，安放着章先生的骨灰盒。"},{"type":"paragraph","text":"会场里摆着伟大领袖毛主席送的花圈。"},{"type":"paragraph","text":"送花圈的还有:中华人民共和国代主席董必武、副主席宋庆龄，人大常委会委员长朱德，国务院总理、政协全国委员会主席周恩来，人大常委会副委员长康生，军委副主席、政协全国委员会副主席叶剑英，以及人大常委会、国务院、政协全国委员会、中共中央统战部、国务院办公室、中央文史研究馆。"},{"type":"paragraph","text":"参加追悼会的有:朱德、周恩来、叶剑英、李先念、邓小平、郭沫若、阿沛·阿旺晋美、周建人、傅作义、许德珩等。他们向章士钊先生的夫人殷德贞、儿子章可、女儿章含之和章眉等表示亲切慰问。"},{"type":"paragraph","text":"追悼会由政协全国委员会副主席傅作义主持，人大常委会副委员长郭沫若致悼词。"},{"type":"paragraph","text":"郭沫若副委员长说，“章士钊先生湖南长沙人，解放前夕为国共和谈奔走，先后为上海和平代表团和南京政府和平谈判代表团代表。解放后历任中国人民政治协商会议第一届全国委员会委员和第二、第三届全国委员会常务委员，全国人民代表大会第一、第二届代表，政务院法制委员会委员。"},{"type":"paragraph","text":"“二十多年来，章士钊先生热爱中国人民的伟大领袖毛主席，拥护中国共产党，关心社会主义建设和国内外形势，晚年又以高龄孜孜不倦地从事祖国文化遗产的整理和著述，在学术问题上能接受不同的意见，这种精神是值得钦佩的。章士钊先生为国家的统一大业，不辞劳苦，鞠躬尽瘁；始终怀念在台湾省的故旧，时刻关心台湾省的解放，盼望早日实现祖国统一。"},{"type":"paragraph","text":"“章士钊先生与我们永别了。我们要化悲痛为力量，积极工作，努力学习，在毛主席无产阶级革命路线指引下，在以毛主席为首的党中央领导下，为社会主义祖国的繁荣富强，为反对帝国主义的侵略阴谋，为包括台湾同胞在内的全中国人民的团结一致，同心协力，排除各种阻挠，实现解放台湾省、统一祖国的历史任务而努力奋斗。”"},{"type":"paragraph","text":"参加追悼会的还有:"},{"type":"paragraph","text":"人大常委会委员贝时璋、邓初民、邓颖超、卢汉、史良、庄希泉、严济慈、吴有训、武新宇、茅以升、罗叔章、季方、胡子昂、胡厥文、胡愈之、胡耀邦，人大代表田富达、刘仲容、李明扬、钱昌照、黎锦熙；"},{"type":"paragraph","text":"政协全国委员会常务委员于树德、王芸生、王雪莹、刘斐、朱蕴山、孙晓村、苏子蘅、杨东莼、吴研因、陈此生、周士观、赵朴初、荣毅仁、徐伯昕、康克清、萨空了、董其武、楚图南，政协全国委员会委员王葆真、李蒸、侯镜如、梁漱溟、杨公庶、徐萌山、邹秉文、劳君展、李俊龙、赵君迈、郑洞国、杜聿明、宋希濂、范汉杰；"},{"type":"paragraph","text":"有关部门和北京市革委会的负责人廖承志、刘湘屏、罗青长、刘友法、李金德、连贯、乔冠华、韩念龙、王海容、于桑、吴庆彤、李梦夫、马仁辉、丁国钰、王磊、王栋、梁威林、李菊生、李文熙、经普椿、白光涛、侯春怀；"},{"type":"paragraph","text":"中央文史研究馆馆员马宗霍、章以吴、曾又馨、田名瑜、邹蕴真、闻承烈、孙墨佛、宫廷璋、沈裕君、楚中元、钟履坚、叶镜吾、张伯驹；"},{"type":"paragraph","text":"在京的台湾省人士蔡啸、林丽韫、叶纪东；"},{"type":"paragraph","text":"章士钊先生的生前友好程思远、傅学文、洪希厚、郭翼青、卞孝萱、陈其英、杨伯峻、黎明晖、王益知，医护人员郭普远、张惠芬、丁万菊。"},{"type":"paragraph","text":"参加追悼会的还有有关单位群众代表。"},{"type":"paragraph","text":"章士钊先生的骨灰已安放在八宝山革命公墓。"},{"type":"paragraph","text":"章士钊先生的骨灰于十一日由专机自香港接来北京。护送骨灰的有人大常委会副秘书长连贯，新华社香港分社副社长李菊生，章士钊先生的亲属殷德贞、章可、章含之、章眉等。到机场迎接章士钊先生骨灰的有廖承志、乔冠华、罗青长、杨东莼、王海容、吴庆彤、刘友法、李金德、梁威林、周志诚、经普椿、白光涛、侯春怀等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"章含之","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33e87e51ec"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
