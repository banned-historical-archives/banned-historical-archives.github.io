<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"重庆医学院广大师生开展教育革命大辩论以开门办学丰硕成果回击右倾翻案风","authors":[],"dates":[{"year":1976,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社成都一九七六年二月十一日电　重庆医学院广大师生以开门办学的丰硕成果，有力地回击教育界的右倾翻案风。"},{"type":"paragraph","text":"最近，这个学院的师生员工在院党委领导下，以阶级斗争为纲，在学院里和农村的一部分教学基点上，展开了教育革命大辩论。师生们张贴大字报，召开各种讨论会、座谈会、批判会，以开门办学的丰硕成果，有力地批驳教育界出现的什么“教育质量差”、“工农兵学员水平低”、“今不如昔”等谬论。"},{"type":"paragraph","text":"几年来，重庆医学院的广大师生在院党委领导下，坚持面向农村，开门办学，先后有一千四百多名工农兵学员和五百多名驻院工宣队员、教师、干部组成了六十个医学教育革命实践队、计划生育队、巡回医疗队和地方病防治科学研究队，到四川达县、内江、江津等地区十七个县和重庆市郊两个区的广大农村开门办学。师生们拜广大工农为老师，以工厂、农村当课堂，努力实践毛主席关于“把医疗卫生工作的重点放到农村去”的伟大号召，深入开展教育革命和卫生革命。通过三大革命运动的实践，师生们普遍提高了阶级斗争和路线斗争觉悟。他们为贫下中农诊治疾病一百多万人次，抢救了不少危重病人，保护了社员的身体健康和农村的劳动力。在达县大树区卫生院开门办学的二年级工农兵学员，怀着深厚的阶级感情，抢救一个病危的贫农的孩子，坚持护理了三天三夜，终于使病孩转危为安，受到社员群众的好评。师生们还为各地培训基层医务人员、赤脚医生一千一百多名，开办了计划生育、脑外科、骨科、放射科等短训班，举办了各种专题讲座二百五十多次，参加的听众达一万人以上，为巩固农村合作医疗，改变农村卫生工作的面貌作出了贡献，推动了教育革命和卫生革命。"},{"type":"paragraph","text":"几年来，学院党委坚持以阶级斗争为纲，把转变学生的思想放在一切工作的首位，培养学员成为有社会主义觉悟的有文化的劳动者。首届毕业的近四百名工农兵学员，有百分之九十以上是党团员。在学习无产阶级专政理论运动中，广大学员决心同旧的传统观念决裂，自觉地限制资产阶级法权，深入批判“读书做官”、“知识私有”等谬论，做到来自工农，不忘工农。毕业分配时，许多人主动提出到基层去，到农村去，到党和人民最需要的地方去。"},{"type":"paragraph","text":"学员们针对旧学校一些工农子女由于受资产阶级思想腐蚀，“一年土，二年洋，三年不认爹和娘”的沉痛教训，提出了“一年土，二年防，三年革命意志更坚强”的口号，做到环境变了，劳动人民艰苦朴素的本色不变；本领大了，为工农服务的决心不变。学员刘明芳进校后十分俭朴，个别人看不起，说她“不象个大学生的样子”，她却引以自豪。她把一双在农村穿了三年的破袜子补好了继续穿在脚上。她说:“这样的袜子，越穿革命意志越坚强。”"},{"type":"paragraph","text":"在开门办学中，院党委认真贯彻毛主席的教育方针，发动师生改革旧的教学体制、教学内容和方法。师生们批判了旧医学教育的那种“三年不沾临床边，五年不见工农面”、“理论一大套，实际不对号”的旧教学方法，努力按照“实践——认识——实践”的马克思主义认识路线来组织教学。现在，学员在一、二年级就临床实践，分管部分病床，在教师指导下担负一定的医疗任务，结合典型病例进行教学，使教学与防病治病紧密结合，提高了学员们分析问题和解决问题的能力。通过开门办学，一般工农兵学员都能做阑尾切除、剖腹产、男女绝育等多种外科手术，掌握了常见病和一些疑难病的诊治及护理方法，对一些重危病人能进行正确的抢救。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"重庆文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e46cfa97a5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
