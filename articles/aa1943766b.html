art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平王猛韩念龙会见泰国羽毛球代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年八月十三日讯 国务院副总理邓小平，国家体委主任王猛，外交部副部长韩念龙，今天下午会见了泰国羽毛球代表团团长、泰国羽毛球协会主席春蓬·洛哈差拉，副团长庵雷·威拉旺，顾问乃攀·万纳迈提，以及代表团全体成员，同他们进行了友好的谈话。"},{"type":"paragraph","text":"中华全国体育总会负责人李梦华、董守义，中国羽毛球协会负责人嵇玉华，有关方面负责人和我国羽毛球运动员程瑞声、郭雷、汤仙虎、刘晓征，参加了会见。"},{"type":"paragraph","text":"据新华社北京一九七三年八月十三日讯泰国羽毛球代表团为来我国进行友好访问今晚在这里举行答谢宴会。"},{"type":"paragraph","text":"中华全国体育总会负责人李梦华、庄则栋，秘书长宋中，中国羽毛球协会负责人嵇玉华，有关方面负责人程瑞声、张之槐、郭雷、张明增等，以及我国羽毛球教练员王文教，运动员侯加昌、汤仙虎、刘晓征等应邀出席宴会。"},{"type":"paragraph","text":"泰国羽毛球代表团团长、泰国羽毛球协会主席春蓬·洛哈差拉，副团长庵雷·威拉旺，顾问乃攀·万纳迈提，以及代表团其他成员出席作陪。"},{"type":"paragraph","text":"在友好气氛的宴会上，春蓬·洛哈差拉团长和嵇玉华先后讲话。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa1943766b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
