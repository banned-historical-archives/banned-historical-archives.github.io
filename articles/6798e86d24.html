,"authors":[],"dates":[{"year":1968,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马里军事代表团访问我国后回到巴马科"},{"type":"paragraph","text":"热情赞扬我国文化大革命和工农业取得的伟大成就"},{"type":"paragraph","text":"新华社巴马科二十一日电 由马里共和国负责国防和安全的部长级代表马马杜·迪亚基特率领的马里军事代表团，在中国进行了十五天的友好访问之后，十九日下午回到了马里首都巴马科。"},{"type":"paragraph","text":"前往机场迎接代表团的有：保卫革命全国委员会成员、司法和劳工部长马戴拉·凯塔，保卫革命全国委员会成员、外交部长乌斯曼·巴，马里陆军参谋长塞古·特拉奥雷。"},{"type":"paragraph","text":"中国驻马里大使馆临时代办刘和林也到机场迎接。"},{"type":"paragraph","text":"马马杜·迪亚基特在机场休息室向报界发表谈话时，热情赞扬中国无产阶级文化大革命和中国工农业方面取得的伟大成就。他说，在中国逗留期间，“我们清楚地看到，中国人民是怎样在他们的伟大领袖毛泽东主席的领导下动员起来去完成史无前例的无产阶级文化大革命的。”他祝愿这场大革命“取得全面胜利”。他在赞扬中国的工业生产成就后说：人民公社“从各方面来说都是成功的”。他指出，人民公社保证了五亿多中国农民走集体化的路，保证了农业获得高产。"},{"type":"paragraph","text":"马马杜·迪亚基特最后说，马里军事代表团带着在中国取得的教益回到马里。尽管马里目前面临各种困难，但是，只要敢于斗争，敢于胜利，充分依靠自己的力量，就一定能解决困难。他表示衷心感谢中国人民和中国政府对马里军事代表团的热情和友好的接待。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6798e86d24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
