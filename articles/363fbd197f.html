:[],"dates":[{"year":1964,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇同志会见崔庸健等同志"},{"type":"paragraph","text":"双方在亲切友好的气氛中进行了谈话"},{"type":"paragraph","text":"新华社三十日讯　中共中央副主席、中华人民共和国主席刘少奇，今天下午会见了朝鲜劳动党中央委员会政治委员会委员、朝鲜劳动党中央委员会副委员长、朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健和朝鲜党政代表团全体成员。双方在亲切友好的气氛中进行了谈话。"},{"type":"paragraph","text":"朝鲜方面参加会见的有：朝鲜劳动党中央委员会政治委员会委员、朝鲜劳动党中央委员会副委员长朴金喆，朝鲜劳动党中央委员会委员、朝鲜民主主义人民共和国递信相朴永淳，朝鲜劳动党中央委员会委员、朝鲜民主主义人民共和国驻中华人民共和国特命全权大使朴世昌，朝鲜劳动党中央委员会副部长金佑钟。"},{"type":"paragraph","text":"会见时中国方面在座的有：中共中央政治局委员、中华人民共和国副主席董必武，中共中央政治局候补委员康生，中共中央候补委员赵毅敏，外交部副部长韩念龙。（附图片）"},{"type":"paragraph","text":"中共中央副主席、中华人民共和国主席刘少奇和朝鲜民主主义人民共和国党政代表团合影。前排左起：董必武、崔庸健、刘少奇、朴金喆、康生。              新华社记者　陈娟美摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"363fbd197f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
