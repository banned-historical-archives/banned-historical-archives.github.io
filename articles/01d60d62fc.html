ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对高扬文的蹲点报告的批语","alias":"","parts":[{"type":"paragraph","text":"对高扬文的蹲点报告的批语"},{"type":"paragraph","text":"（1964年12月19日）"},{"type":"paragraph","text":"白银有色金属公司斗争的经验证明，要办好社会主义企业，首先必须抓好阶级斗争。不把领导权紧紧地掌握在无产阶级革命家的手里，不振起广大职工群众的革命精神，生产斗争、科学试验，都不可能搞好。抓阶级斗争要克服各种右倾思想，不怕伤害与那些“四不清”干部的和气，不怕触及上级领导，不怕妨碍生产。要有革命的决心，要抓住不放，要一直抓到底，做彻底的革命派。白银有色金属公司斗争的经验又证明，只要阶级斗争搞得好，搞深、搞透，不但不会妨碍生产，而且必然促进生产斗争、科学试验的大发展。"},{"type":"paragraph","text":"随着阶级斗争和生产斗争、科学实验的发展，必然要引起企业管理上一系列的革命。一些旧的口号、旧的指标已经过时了，要用新的口号、新的指标来代替，现行的管理制度（如工资制度、劳动组织、管理机构等等），凡不适应新的情况的，都要作适当的改革。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":318,"page_end":318},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01d60d62fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
