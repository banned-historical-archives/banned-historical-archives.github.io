/raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/175a6e6f-df63-678d-561b-ee7097c1bd9c.pdf"],"article":{"title":"编辑说明","alias":"","parts":[{"type":"paragraph","text":"编辑说明"},{"type":"paragraph","text":"《列宁选集》是1960年编辑出版的。为了适应广大读者学习马克思列宁主义的需要，现在我们重新出版这部选集，并对所选文章作了一些调整。"},{"type":"paragraph","text":"这部选集包括伟大革命导师列宁在各个时期的重要著作。这些著作表明：列宁在反对帝国主义和形形色色的机会主义、修正主义的斗争中，继承、捍卫和发展了马克思主义，把马克思主义推进到一个新的历史阶段一一列宁主义阶段。"},{"type":"paragraph","text":"选集分为四卷，第一卷是1894一1907年的著作，第二卷是1908一1917年的著作，第三卷是1917一1919年的著作，第四卷是1919一1923年的著作。"},{"type":"paragraph","text":"收入选集的著作，大部分是全文，只有小部分是摘录。所有文章都按写作或发表的时间顺序编排。"},{"type":"paragraph","text":"这次再版选集，对译文作了个别修改。每卷正文之后附有注释和人名索引。希望读者对这部选集的编译工作提出意见，以便再版时改进。"},{"type":"paragraph","text":"马克思恩格斯著作编译局中共中央列宁斯大林著作编译局"},{"type":"paragraph","text":"1972年10月"}],"authors":["中共中央马克思恩格斯列宁斯大林著作编译局"],"dates":[{"year":1972,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":5,"page_end":5},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb0235a50d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
