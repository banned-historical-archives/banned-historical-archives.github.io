{"year":1965,"month":8,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报评论员"},{"type":"paragraph","text":"上海人民艺术剧院青年演员组的同志，在火热的工农兵斗争生活中学习毛主席著作，努力改造世界观，获得了可喜的成就。文艺工作者改造世界观，一个是要努力学好毛主席著作，一个是要努力参加为工农兵服务的实践。上海人艺的青年演员们，把这两者结合起来，把读毛主席的书和实践结合起来，把理论和实际结合起来，因而取得了成绩。"},{"type":"paragraph","text":"世界观的改造是迫切的，但又是长期的。这就向我们提出了一个途径问题。怎样才能使我们比较容易听懂毛主席的话，从而较快地实现世界观的改变?上海人艺青年演员组的经验是:实践，只有通过实践，才能使我们不仅感觉，而且能够深刻理解事物，认识真理。人艺的青年演员们对于“为谁演戏”的问题，文艺为工农兵服务、尤其是为五亿农民服务的问题，原先有的人只停留在口头上，有的人虽有些认识，但也不多；也就是说，并没有真正的认识。他们以后虽然身到了农村，但思想感情上是否能和贫下中农打成一片，是否能全心全意为他们服务，还是感到问题。这些问题，后来通过在实践中活学活用毛主席著作才逐个得到了解决。这就证明，文艺工作者到了工农兵中间，真正要想为工农兵服务了，就必定会产生各种各样的问题，逼着要你会解决，这就需要带着问题活学活用毛主席著作。人艺青年演员的实践证明，人们的思想运动是有规律的，这就是实践、认识、再实践、再认识的不断前进、不断上升的规律，没有这个过程，人们就不能取得任何真正的认识，或者就不能使认识不断地前进。文艺工作者学习毛主席著作，改造世界观，也需要这个过程。把理论和实际结合起来，把读毛主席书和实践结合起来，是学好毛主席著作、改造思想的根本途径。"},{"type":"paragraph","text":"读书和实践，是辩证的、不可分割的。但在我们文艺界的日常工作中，常常有把两者分割的情形。一种是关门读书，理论停留在书斋，理论和实际脱离，读书和实践脱离。另一种是虽然每天也都在实践，但没有更自觉地把毛泽东思想作为指导自己实践的指针，因而常常是处于不自觉的状态，是一种盲目的实践。在前一种情况下，人们完全不了解读书和实践的辩证关系，完全不了解实践是检验学习的标准。用什么来检验我们读书的成绩?重要的不是用课堂考试和背诵书本，而是用实践的行动。学一点，用一点，只有“用”了，才知道“学”得如何。这是一面。另一面，这些同志不了解，实践又是学习的深化和发展。在改造客观世界的实践中，我们的主观认识得到了考验，同时也就在新的实践中继续向前发展。在改造客观世界的斗争中，不断改造了主观世界。所以，对于这些同志来说，重要的是把读书和实践结合起来。在后一种情况下，则是对于毛主席著作的学习还不是十分自觉，因此他们虽然一天到晚忙忙碌碌，但工作上、思想上提高得并不是很快，他们往往不明白工作失败了是什么原因，不明白工作胜利了又是什么缘故。对于这些同志来说，提高学习毛主席著作的自觉性，在为工农兵服务的实践中，在一切艺术实践中活学活用毛主席著作，把实践和理论结合起来，是十分重要的。"},{"type":"paragraph","text":"上海人民艺术剧院青年演员组同志，用毛主席思想指导自己的实践，为文艺界提供了有益的经验。伟大的社会主义文化革命运动正在深入发展，能不能在这场革命运动中加速步伐，有所作为，关键在于我们能不能自觉地在毛泽东思想指导下勇于实践，勇于改造。而文艺工作者实践毛泽东思想、改造世界观的最好场所，又正是在广大的工农兵群众中间。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2492a52c98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
