ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对反映李一氓、舒同、林铁情况来信的批语","alias":"","parts":[{"type":"paragraph","text":"对反映李一氓、舒同、林铁情况"},{"type":"paragraph","text":"来信的批语!!"},{"type":"paragraph","text":"（1973年1月至6月）纪、汪酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]本篇一写在中共中央对外联络部原副部长李一氓的妻子、女儿1973年1月4日的来信摘要上。信中说，李一氓年已七十，患高血压、心脏病、肺气肿等，恳请主席批准其出狱就医。本篇二写在中共陕西省委原书记处书记舒同1973年3月给毛泽东的信上。信中要求对他的同题早日做出正式结论，恢复组织生活，并能参加一定的工作。1977年，舒同复出后任陕西省革委会副主任。本篇三写在中共河北省委原第一书记林铁1973年6月11日给毛泽东的来信上。信中说，我68岁，身体还好，希望党分配我力所能及的工作，为党为人民的革命事业继续工作。1978年，林铁出任中共中央组织部顾问。毛泽东全集第五十一卷"},{"type":"paragraph","text":"纪、汪酌处。"},{"type":"paragraph","text":"73，4,2"},{"type":"paragraph","text":"三总理\"酌处。[1]总理，指周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1973,"month":1},{"year":1973,"month":6}],"is_range_date":true,"comments":[],"comment_pivots":[],"description":"","page_start":381,"page_end":382},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f40c24b565"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
