ors":[],"dates":[{"year":1967,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刚果（布）人民驳斥牛鬼蛇神的反华宣传"},{"type":"paragraph","text":"中国文化大革命被帝修攻击是好事"},{"type":"paragraph","text":"据新华社布拉柴维尔电　刚果（布）人民高度赞扬中国的无产阶级文化大革命，并驳斥帝国主义者和现代修正主义者恶毒诬蔑由中国人民的伟大领袖毛主席亲自发动和领导的这场文化大革命。"},{"type":"paragraph","text":"全国革命运动青年组织的一个支部的领导成员梭坡对新华社记者说：尽管帝国主义者和现代修正主义者现在竭力诬蔑中国和中国的文化大革命，“但是我们刚果青年决不听他们那一套，因为我们坚信，毛主席所发动的这场文化大革命的目的在于挖掉资本主义和修正主义在中国的根子，在于保卫无产阶级专政”。"},{"type":"paragraph","text":"他说：“我们支持中国的文化大革命，因为这一革命对我们来说确实是一件好事。毛主席指出：‘被敌人反对是好事而不是坏事’。帝国主义者和修正主义者这样害怕这场文化革命并且进行诽谤，这恰恰证明文化革命好得很，证明我们的立场是正确的。”"},{"type":"paragraph","text":"一位名叫富厄尼巴的刚果朋友在一封信中说：面对着帝国主义者、修正主义者及其非洲仆从所发动的反华宣传，我们将用战无不胜的毛泽东思想来击败这种宣传，以便使真理传遍全世界。他强调指出，这一反对中国文化大革命的宣传活动是注定要失败的，因为这场文化大革命是在伟大的毛泽东思想的指引下进行的。"},{"type":"paragraph","text":"一位名叫米耶卡马纳的刚果朋友在信中说：“我极其密切地注意关于中国的消息，以便用事实来驳斥国际宪兵及其走狗所完全编造的对于由伟大的舵手、敬爱的毛泽东主席亲自领导的中国无产阶级文化大革命的诬蔑。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0563fda898"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
