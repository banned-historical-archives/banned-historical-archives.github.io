tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一心为了巩固无产阶级专政——记炮兵活学活用毛泽东思想积极分子；某炮校电话员支大坤","authors":[],"parts":[{"type":"paragraph","text":"支大坤今年刚满二十岁。去年六月，她怀着保卫伟大领袖毛主席、保卫无产阶级专政的雄心壮志来到炮兵某学校，当了电话员。一年多来，她紧密联系阶级斗争形势，自觉地用毛主席关于无产阶级专政下继续革命的伟大理论武装头脑，迅速成长为一个自觉为巩固无产阶级专政而奋斗的革命战士。"},{"type":"paragraph","text":"自觉地把自己的工作和巩固无产阶级专政联系起来"},{"type":"paragraph","text":"胛椴痪镁偷叫值艿ノ坏囊桓龀ね咎ㄈパ�习。回来以后，她�3O肫鹪谛值艿ノ谎�习的情景：在宽敞的机房里，放着一部部闪闪发光的总机�N薏�阶级司令部的声音，从祖国首都经过自己的手传到四面八方，这是多么有意义啊！可是现在呢？在狭小的机房里，只放着一部小机器�K�越想越觉得守这样的机子，出息不大�K枷胍凰桑�工作责任心就不强了�S幸淮危�兄弟部队来电话，她漫不经心，迟迟没有接通�J潞螅�人家严肃地提出了意见，使她受到震动�K�带着这个问题，反复学习毛主席的教导〖JZ/加重〗：“这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的。”"},{"type":"paragraph","text":"有一次，一个外调的同志要她帮助找一个单位。她想，城市这么大，向哪里去找啊！但是，她又一想，搞好外调工作是完成斗、批、改任务，巩固无产阶级专政的需要，不管有多大困难，也要帮助这个同志找到。于是，她一个一个单位查问起来。一小时、两小时过去了，半天过去了，还没有找到。但是，她没有灰心，继续查问，终于找到了这个单位。她为了使这个外地来的同志尽快完成任务，还帮助他问清楚了去这个单位坐哪趟车，到哪里换车，在哪里下车，下车后怎么走。当她把这些情况告诉对方时，这个同志感动得连声道谢，称赞她是个革命的好电话员。"},{"type":"paragraph","text":"支大坤就是这样一个用毛泽东思想武装起来的、时刻想着巩固无产阶级专政的红色电话员。她身在机房，胸怀全国，把传播毛泽东思想当做自己义不容辞的光荣职责。每当毛主席的最新指示发表时，她就赶忙记录下来，立即传达到各单位，使毛主席的声音迅速和广大干部战士见面。有个靶场执勤小组，长期驻在一个比较偏僻的地方。毛主席的最新指示一发表，支大坤就立即传给他们。使这个小组的同志，及时听到伟大领袖毛主席的声音。"},{"type":"paragraph","text":"为巩固无产阶级专政磨炼一不怕苦、二不怕死的革命精神"},{"type":"paragraph","text":"涿�主席最近教导我们〖JZ/加重〗：“我赞成这样的口号，叫做‘一不怕苦，二不怕死’”。"},{"type":"paragraph","text":"从这以后，支大坤总是自找苦吃。哪里艰苦，她就到哪里去。查线、修线，本来不是她的本职工作，她也主动参加。有一次，她刚下班，电话坏了。她二话没说，伸手拿起工具就往外跑。来回查了两趟，没发现混线的地方，她又第三次出去查，刚出门，就下大雨。她顶风冒雨，坚持把线修好了。"},{"type":"paragraph","text":"痰嘉颐恰糐Z/加重〗：“专政还有第二个作用，就是防御国家外部敌人的颠覆活动和可能的侵略。”"},{"type":"paragraph","text":"团结和带领群众共同为巩固无产阶级专政而斗争"},{"type":"paragraph","text":"今年二月，支大坤光荣地参加了中国共产党。入党那天，她心潮澎湃，热血沸腾，激动地站在伟大领袖毛主席像前庄严宣誓：毛主席啊，毛主席！我要永远忠于您，永远忠于您的光辉思想，永远忠于您的革命路线，誓做一个朝气蓬勃的无产阶级先锋战士。"},{"type":"paragraph","text":"痰嘉颐恰糐Z/加重〗：“团结起来，为了一个目标，就是巩固无产阶级专政”。"},{"type":"paragraph","text":"今年六月，连队党支部改选，全排党员一致推选支大坤担任党小组的副组长。支大坤的工作范围大了，肩上的担子更重了，活思想也跟着出现了。她感到，全排的党员都比自己入伍早、党龄长，有的是干部，以后的工作怎么开展哪？她这么一想，工作起来就不那么泼辣了。党小组的同志们看出了她的心思，都热情地帮助她，她也带着这个问题反复学习毛主席的教导，想着自己入党的时候，在伟大领袖毛主席像前立下的誓言，脸上火辣辣的。她决心丢掉“怕”字，换上“敢”字，坚决照毛主席的指示办事，团结、带领群众为巩固无产阶级专政而奋斗。数月前，连队抽调了一部分同志去执行重要任务，副班长宫俊钱积极申请，但上级没有批准。他的情绪受了影响，工作也松下来了。支大坤就主动找他谈心，和他一起学习毛主席著作，使他认识到不论在哪里工作，都是保卫无产阶级专政的需要，都应该勤勤恳恳、拚死拚活地干好工作，宫俊钱纠正了错误思想，更加起劲地搞好全班的工作。几个月来，支大坤在排里大力突出无产阶级政治，积极开展思想互助，她和多数同志都谈过心，做过思想工作，促进了大家的思想革命化。同志们都称赞她是个朝气蓬勃的共产党员。"},{"type":"paragraph","text":"（本报通讯员、本报记者）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4cac72321"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
