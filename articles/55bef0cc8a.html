普及大庆式企业的经验","authors":[],"dates":[{"year":1977,"month":4,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年四月二十七日电　全国工业学大庆会议今天在北京继续举行大会，开始交流各地深入揭发批判“四人帮”、开展工业学大庆运动、普及大庆式企业的经验。"},{"type":"paragraph","text":"大会在雄伟的人民大会堂举行。主席台正中并排高挂着伟大的领袖和导师毛主席、英明领袖华主席的巨幅彩色画像，两侧是十面鲜艳的红旗。横贯全场的两幅醒目大字标语上写着:“高举毛主席的伟大旗帜，最紧密地团结在以华主席为首的党中央周围，将揭批‘四人帮’的伟大斗争进行到底!”“动员全党、全国工人阶级，把工业学大庆的革命群众运动推向一个新的阶段，为普及大庆式企业而奋斗!”"},{"type":"paragraph","text":"在今天下午的大会上，中共黑龙江省委常委陈剑飞、中共湖南省委书记于明涛、中共江苏省常州市委书记何冰皓、中共河北省遵化县常委王云阁发了言。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55bef0cc8a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
