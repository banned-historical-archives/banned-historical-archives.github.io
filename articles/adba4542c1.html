,"dates":[{"year":1964,"month":1,"day":20}],"is_range_date":false,"parts":[{"text":"林彪对部队政治工作的指示","type":"title"},{"text":"[1964年1月20日《解放军报》发表。]","type":"paragraph"},{"text":"四个第一和四好连队运动要抓住不放，这些工作做好了，就可以把几百万人的积极性调动起来，几百万人就可以顶几千万人，数量没有变，品质就不一样了。","type":"paragraph"},{"text":"我们现在不打仗，主要是建军，做好反侵略战争的准备。准备工作有多种多样，但最普通、最大量、最起决定作用的是把连队搞好。","type":"paragraph"},{"text":"事情在任何时候都是千头万绪的，我们几十年搞过来，搞过去，最重要的事情还是这几样，搞好政治思想工作、搞好作风、搞好训练、搞好生活，这都是过硬的东西，我们部队建设不把基础单位搞好不行，要搞好基础单位，不搞这四样也不行。","type":"paragraph"},{"text":"学习毛主席著作，要带着问题学，活学活用，学用结合，急用先学，立竿见影。这是我党历史所提倡的理论联系实际的原则的具体化，是马克思列宁主义的学习方法，是学习毛主席著作的正确途径。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adba4542c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
