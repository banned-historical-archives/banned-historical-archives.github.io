art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认真学习《毛泽东军事文选》内部本","authors":[],"parts":[{"type":"paragraph","text":"本报讯 中央军委于2月18日向全军发出关于学习和宣传《毛泽东军事文选》内部本的通知。"},{"type":"paragraph","text":"通知说，为了完整地、准确地学习和研究毛泽东军事思想，由军委审定并报经中央批准的《毛泽东军事文选》内部本（军事科学院编辑），已正式出版，将陆续发给全军团以上干部。"},{"type":"paragraph","text":"通知指出：《毛泽东军事文选》内部本，选编了毛泽东同志1927年至1958年期间的重要军事文献，包括他起草的指挥我军重大作战行动的电报四百余份，绝大多数未公开发表过。这本书的内容十分丰富，涉及人民军队、人民战争及其战略战术等各个方面，是一部非常重要的军事、政治教科书，各单位应认真组织干部学习。"},{"type":"paragraph","text":"通知要求：一、全军团以上干部，应利用军事学习时间和其它时间，自觉地认真阅读，争取在年内通读一遍，并结合各项战备任务精读有关文章。学习哲学亦可从中选学有关论著。院校团以上干部学员也应适当安排学习。具体计划，由各大单位自定。"},{"type":"paragraph","text":"二、学习中，应着重领会毛泽东军事思想的基本原理及其立场、观点和方法，去研究和解决现代条件下我军建设和作战方面的新情况和新问题。"},{"type":"paragraph","text":"三、各单位要加强对学习的领导，各级军训、宣传部门要注意掌握学习情况，加强具体指导，使学习收到实效。军内报刊应注意做好这项学习的宣传工作。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e25acc4204"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
