<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉镇反后的群众反应","authors":["叶裕森"],"dates":[{"year":1951,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"武汉镇反后的群众反应","type":"title"},{"text":"叶裕森","type":"authors"},{"text":"武汉市私营南明烟厂经过镇压反革命后，职工的积极性显著提高。该厂反革命分子冯汉卿、黄克贤、廖文春等在解放后依然欺压工人，造谣破坏。他们曾阻止在厂内推销人民胜利折实公债和捐募寒衣。他们常常歪曲朝鲜战局来威胁工人：“美国在朝鲜打胜仗了，老蒋来了，老子们还不是头儿。”工人陈世全三次想入青年团都被黄克贤阻止。解放前他们奸淫女工，解放后他们对女工还是百般侮辱。他们破坏生产，故意将烟炒湿，或有意的在烟草里放铁钉子来陷害工友。","type":"paragraph"},{"text":"在全国各地进行大张旗鼓镇压反革命时，冯汉卿等依然嚣张并威胁工人说：“你们谁敢控诉咱，就小心你的八斤半（指脑袋）。”工人参加了武汉染织厂的控诉反革命分子大会回来后纷纷议论：“别的厂里都控诉了厂里的反革命分子，我们为什么不能控诉呢？”当天晚上全体工人又听到公安分局负责同志关于镇压反革命的报告，大家在思想上就更加明确地认识了什么是反革命分子。经过在工人中间进行酝酿，大家在全厂的控诉大会上，痛痛快快地诉出了冯汉卿等三人的种种罪行，人民政府接受工人的要求，立即将三个反革命分子逮捕了。","type":"paragraph"},{"text":"反革命分子被清除后，大家情绪高昂，生产的劲头也大了，在几天之内，卷烟产量提高百分之十。大家自动注意节约，过去剩余的烟丝只筛一次就不要了；现在筛二次，就节省下好多有用的烟丝。师徒关系有的也较前融洽了，机器房的杨其鳌对他的徒弟说：“我过去像小媳妇一样，动也不敢动，现在我一定要搞好生产，你们有什么地方不懂的，尽量找我，我把技术都教给你们。”过去女工参加学习的很少，现在全部女工都要求学习。包装部六七十岁的陈秀英和十五个老女工都已参加学习了。","type":"paragraph"},{"text":"工人怕反革命分子继续破坏，警惕很高，在夜里，纠察队和消防队的岗哨增加了。过去厂里集合消防队到处磕头作揖似的求告工人还不来；现在一吹哨子都很快地跑来了。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1951年5月23日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03ea682206"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
