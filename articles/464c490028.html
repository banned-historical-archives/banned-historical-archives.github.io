":[{"year":2002,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"井冈山兴建毛泽东诗词碑廊"},{"type":"paragraph","text":"本报南昌电　在井冈山革命根据地创建75周年之际，井冈山市在当年著名的要塞桐木岭哨口兴建了一座长83米、高4.1米的毛泽东诗词碑廊。这是目前全国最长的毛泽东诗词碑廊。该碑廊投资80余万元，占地174.3平方米，全部用大理石制作。碑文内容为毛泽东公开发表的67首诗词，其中包括《西江月·井冈山》、《念奴娇·井冈山》、《水调歌头·重上井冈山》等3首为井冈山书写的诗词。"},{"type":"paragraph","text":"该诗词碑廊于国庆期间正式对外开放。"},{"type":"paragraph","text":"（廖文根　李美兴）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"464c490028"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
