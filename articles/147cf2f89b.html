tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席掌握着世界革命的方向盘","authors":["周瑞林"],"parts":[{"type":"paragraph","text":"党的八届十一中全会公报指出：“当前正处在世界革命的一个新时代。”"},{"type":"paragraph","text":"我们最最敬爱的领袖毛主席，就是这个伟大时代的伟大舵手！"},{"type":"paragraph","text":"在我国革命的每一个重要关头，毛主席总是领导我们拨开迷雾，端正航向，从胜利走向胜利。同样，在今天空前激烈的国际阶级大搏斗中，毛主席掌握着世界革命的方向盘，引导世界人民冲破惊涛骇浪，沿着革命的航道胜利前进。你看："},{"type":"paragraph","text":"毛主席“枪杆子里面出政权”和人民战争的思想深入人心，人民武装斗争的烽火燃遍了“世界的农村”——亚洲、非洲、拉丁美洲。"},{"type":"paragraph","text":"毛主席关于“帝国主义和一切反动派都是纸老虎”的英明论断，正在鼓舞着越来越多的革命人民挺起胸膛进行斗争。"},{"type":"paragraph","text":"毛主席关于全世界人民建立最广泛的国际反美统一战线的号召，已经获得最热烈的响应，美帝国主义陷在世界人民的重重包围之中。"},{"type":"paragraph","text":"以苏共领导集团为中心的现代修正主义，在毛泽东思想这个最强大的革命武器面前，也越来越暴露了它的丑恶嘴脸。"},{"type":"paragraph","text":"伟大的毛泽东思想正以排山倒海之势，磅礴于全世界。世界革命人民热烈欢呼毛泽东思想是“反帝反修斗争的最强大武器”，是“世界革命的灯塔”；热烈欢呼毛主席是“当代最伟大的革命导师”，“有了毛泽东，是世界人民最大的幸福”。"},{"type":"paragraph","text":"帝国主义、现代修正主义和一切反动派，象雪人怕太阳一样，害怕伟大的毛泽东思想。因为毛泽东思想传播到哪里，哪里的人民就要起来闹革命，牛鬼蛇神就要完蛋。"},{"type":"paragraph","text":"毛主席说：“社会主义制度终究要代替资本主义制度，这是一个不以人们自己的意志为转移的客观规律。”在我们的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席的英明指引下，社会主义在全世界胜利的日子必将到来！"},{"type":"paragraph","text":"DW：3138部队"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"147cf2f89b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
