<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席“农业学大寨”的伟大号召鼓舞下各地农村掀起波澜壮阔农田基本建设新高潮","authors":[],"dates":[{"year":1971,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十七日电　在毛主席的“农业学大寨”的伟大号召鼓舞下，去冬以来，全国各地广大贫下中农和社员群众以“愚公移山”的英雄气概，治山治水，改土造田，掀起了一个波澜壮阔的冬季农田基本建设新高潮。从去冬到现在，全国完成的农田基本建设土石方工程量，超过前一年同期。农田基本建设大规模展开，为夺取今年农业生产新丰收创造了有利条件。"},{"type":"paragraph","text":"去冬以来，从内地到边疆，从农业区到牧区，到处出现了进一步学大寨，战天斗地，建设社会主义新农村的喜人景象。用毛泽东思想武装起来的广大贫下中农和社员群众，抢晴天，战雨天，冒严寒，踏冰雪，奋战在高山峡谷、湖滩碱地，修渠筑坝、挖河打井，出工人数之多、工程规模之大、进度之快，都超过往年。吉林省去年秋、冬完成的农田基本建设土石方工程量，相当于上一年同期的六倍。甘肃省农田基本建设开工后两个月时间新修的梯田和条田，就超过了上一年度的总和。"},{"type":"paragraph","text":"在毛主席的无产阶级革命路线指引下，我国农业生产连续九年获得丰收。去年秋收以后，全国二十多个省、市、自治区先后召开农村工作会议，认真学习毛主席关于“农业学大寨”的伟大指示，认真总结经验，提高了对学大寨伟大意义的认识，进一步开展了学大寨的群众运动。许多县、社、队以大寨为榜样，找差距，订规划，迅速掀起了冬修农田水利活动。"},{"type":"paragraph","text":"在农田基本建设中，各地广大贫下中农和社员群众发扬自力更生、艰苦奋斗的革命精神，自己动手烧石灰、造水泥、制炸药，解决施工所需的原料材料和设备，使农田基本建设收到多快好省的效果。山东省广大贫下中农和社员群众在农田基本建设中，狠批叛徒、内奸、工贼刘少奇鼓吹的“贪大求洋”、“专家治水”等反革命修正主义黑货，依靠人民公社集体力量，因地制宜地治山、治水、改土，去冬以来全省新增加稳产高产农田二百八十万亩，扩大水浇地近三百万亩。河北省九个地区去冬以来新平整土地和新修的园田、台田、条田有一千三百万亩。"},{"type":"paragraph","text":"各地各级党组织和革委会，普遍加强了对农业生产的领导。许多地方把大搞农田基本建设，作为夺取一九七一年农业生产新丰收的一项重要措施来抓。各级干部遵照毛主席关于“领导一定要走在运动的前面，不要落在它的后面”的教导，纷纷深入农村，调查研究，总结推广先进经验，实行面对面的领导。广西百色专区到农业生产第一线的专区、县、社三级干部有五千多人。这些干部和贫下中农、社员群众一起活学活用毛泽东思想，认真贯彻执行党的政策，保证了农田基本建设既轰轰烈烈又扎扎实实地向前发展。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfd6464aa9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
