命的几项规定》的补充规定","authors":[],"dates":[{"year":1967,"month":2,"day":27}],"is_range_date":false,"parts":[{"text":"中央军委关于执行中央军委《关于军以上领导机关文化大革命的几项规定》的补充规定","type":"title"},{"text":"中央军委《关于军以上领导机关文化大革命的几项规定》颁发后，得到全军广大革命同志的热烈拥护。军委决定暂停四大的单位，有的已经转入正面教育，并撤销了文化革命战斗组织。继续开展四大的单位，广大革命群众按照保持军队高度集中统一的要求，也自动撤销或改组了文化革命战斗组织。为了保持军队领导机关严密、完整的指挥体系，进一步贯彻军委指示，特决定：","type":"paragraph"},{"text":"凡继续开展四大的单位的文化革命战斗组织，应以基层行政单位进行改组，所有超越基层行政单位的文化革命联合战斗组织，如各总部、各军种、各兵种、各大单位的造反总部、联络站等，应一律撤销。所有文化革命战斗组织所使用的宣传工具，如有线广播、宣传车、印刷用具等，应一律移交各单位党委文革办公室。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第二集）》， 北京：1967年6月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d68f47e1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
