1980,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英电唁张发奎逝世"},{"type":"paragraph","text":"新华社北京三月十三日电　叶剑英今天为前国民党将军张发奎逝世，向他的家属发了唁电。"},{"type":"paragraph","text":"唁电全文如下：香港张向华将军家属礼鉴："},{"type":"paragraph","text":"惊悉向华将军逝世，不胜哀悼。乡情旧谊，时所萦怀。特电致唁，尚希节哀。"},{"type":"paragraph","text":"叶剑英"},{"type":"paragraph","text":"一九八○年三月十三日"},{"type":"paragraph","text":"张发奎将军三月十日在香港病逝，终年八十五岁。"},{"type":"paragraph","text":"张发奎将军，字向华，广东省始兴县人。北伐战争时，任“铁军”第四军军长。抗日战争时期曾任国民党第四战区总司令、第二方面军司令官等职。一九四九年辞去国民党政府职位，此后一直在香港定居。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0c02bdc7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
