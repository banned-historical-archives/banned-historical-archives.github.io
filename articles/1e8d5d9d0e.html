tes":[{"year":1980,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨日，卢湾越剧团离沪赴江苏江阴演出，然后还将去苏州、无锡、常州等地巡回演出。"},{"type":"paragraph","text":"最近，他们认真地学习了邓小平同志在全国第四次文代会上的讲话精神，表示一定要发扬送戏上门的好传统。该团演员平均年龄较大，去外地演出也缺乏经验。但全团同志表示，一定要坚持党的文艺方针，只要党和群众需要，个人的困难可以克服。主要演员张云霞、筱月英、魏梅照、张小巧和特邀演员郑忠梅等都同往参加演出。　(孙定国)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e8d5d9d0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
