ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对公安部党组关于第二批特救和减刑战犯名单的请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对公安部党组关于第二批特救和减刑"},{"type":"paragraph","text":"战犯名单的请示报告的批语"},{"type":"paragraph","text":"（1960年10月20日）此件\"送少奇、富春同志阅看，在书记处通过照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月廿日"},{"type":"paragraph","text":"[1]指公安部党组1960年10月17日给中共中央的请示报告。报告说，首批战犯特赦后，我们对继续关押的战犯进行了“改恶从善”的教育，多数人向着好的方向转化。根据中央关于每年特赦一批战犯的指示，今年特救战犯名额以比去年增加一些为好，拟为50名，比去年多17名。同时，为有利于加强已判刑战犯的改造，并为今后的特赦工作准备必要的条件，今年还提出21人的减刑名单。被特救战犯的安置，仍按去年的原则，有家可归者一律释放回家，无家可归者暂不安排工作，立即给以生活安置。今后释放的战犯，均应把生活安排好，给以必要的适当照顾，并有人负责教育管理，以利进一步改造。"},{"type":"paragraph","text":"[2]富春，即李富春，当时任中共中央政治局委员、中央书记处书记、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":10,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":31,"page_end":31},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61c46a6b00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
