art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"从奴隶社会一步跳到社会主义党领导小凉山彝族人民获得解放","authors":[],"parts":[{"type":"paragraph","text":"据新华社昆明28日电 云南省小凉山彝族人民在粉碎了奴隶制度的枷锁后，以飞快速度向社会主义跃进。"},{"type":"paragraph","text":"在短短几个月内，小凉山彝族人民在党和自治机关的领导下，建立起一百零二个农业社和四十一个农场。这种农场是国家帮助从奴隶制度下解放出来的彝人过度到社会主义的特殊组织，由政府供给农具、耕牛和资金，农民将分得的土地入股，实行按劳取酬。现在，参加农场和农业社的农户，已经占小凉山宁蒗彝族自治县农户总数的26％。"},{"type":"paragraph","text":"解放了的彝族人民，发挥出很大的生产积极性。去年冬天几万彝人冒着严寒在悬岩陡坡上开沟挖渠，从黎明干到深夜，新年也不离开工地，到今春完成水利工程一千处，可灌溉田地十万亩，现在已经开出水田九千多亩，撒下了小凉山上有史以来的第一批稻种。"},{"type":"paragraph","text":"云南境内金沙江北岸的小凉山区，有五万多彝族人民。他们在解放时，正从奴隶社会向封建社会过渡。奴隶制度下的奴隶，没有任何人身自由。奴隶制度并且束缚着小凉山生产的发展。奴隶们的生活十分悲惨。解放以后，这个偏僻山区几万彝人的命运，发生了根本的变化。从1950年到1954年，人民政府共送给农奴十三万斤粮食、四千五百件农具和一万多元现款，帮助他们发展生产，建立了小学校、贸易公司和卫生所。1956年9月建立了宁蒗彝族自治县，去年底根据彝族人民的要求，全县完成和平协商民主改革，废除了奴隶制度和封建制度。从此，八千多个家奴获得了人身自由，有的与分别多年的家人团聚，无家可归的在政府帮助下安了家，小凉山上出现了七十多个解放新村。原来的奴隶和农奴们平均每人分得四百斤到八百斤产量的土地。这些获得自由、分得土地的彝族劳动人民，正鼓足劲头进行生产建设。小凉山到处呈现出一片新的景象。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6919699eb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
