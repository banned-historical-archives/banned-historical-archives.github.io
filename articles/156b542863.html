script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本剥削和压迫  英国妇女举行示威游行","authors":[],"dates":[{"year":1971,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本剥削和压迫"},{"type":"paragraph","text":"英国妇女举行示威游行"},{"type":"paragraph","text":"新华社伦敦六日电　约一千五百名英国妇女六日在伦敦举行示威游行，反对垄断资本的剥削和压迫，要求同男子享有平等的权利。"},{"type":"paragraph","text":"示威者包括工人、护士、教师、学生和家庭妇女。许多人来自伯明翰、哈尔、布赖顿、布里斯托尔等城市。示威者下午在海德公园集合，经过西区的主要街道前往英国首相官邸所在的唐宁街。"},{"type":"paragraph","text":"示威队伍冒着风雪，举着许多标语牌和横幅，有些标语牌和横幅上写着：“立即实行男女同工同酬！”“受教育和就业机会均等！”“摆脱家庭奴役！”“摆脱工资奴役！”“资本主义是妇女受压迫的原因！”“解放妇女！”"},{"type":"paragraph","text":"有的示威者手里拿的标语牌上写着中国人民的伟大领袖毛主席的语录：“团结起来，参加生产和政治活动，改善妇女的经济地位和政治地位。”“真正的男女平等，只有在整个社会的社会主义改造过程中才能实现。”"},{"type":"paragraph","text":"示威的队伍不断地高呼战斗口号，并向沿路群众散发了传单。一张传单揭露说：在这个社会里，大多数妇女事实上遭受着双重压迫，压迫妇女的根源是从她们的劳动中榨取利润的垄断资本。传单最后号召说：“妇女们，联合起来，为自己的解放而斗争！”“妇女们，联合一切其他的工人和被压迫人民为结束家庭的奴役和一切人剥削人的现象而战斗！”"},{"type":"paragraph","text":"示威游行结束前，妇女们在特拉法加广场举行了大会。"},{"type":"paragraph","text":"六日，格拉斯哥、利物浦以及其他英国城市的妇女们也举行了示威游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"156b542863"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
