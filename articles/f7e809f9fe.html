:[{"year":1980,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英委员长在五届人大三次会议上的闭幕词"},{"type":"paragraph","text":"华国锋同志的讲话很重要。这个讲话无论是总结过去的工作，或提出今后国家工作中需要解决的重大问题，都贯穿了对人民高度负责和实事求是的精神。全国人民通过这个讲话和国务院的几个工作报告，可以清楚地了解，国务院和各级人民政府一年多来为贯彻执行五届人大二次会议的各项决议，做了大量的工作，取得了显著的成绩；可以看到人民政府把工作过程中存在的缺点和错误，遇到的问题和困难，如实地报告全国人民，并且提出了解决这些问题的方向和措施。这表明我们的政府是相信人民，依靠人民的，是有能力领导全国人民克服一切困难，把四化建设不断推向前进的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7e809f9fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
