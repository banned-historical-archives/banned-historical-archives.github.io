art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"开展“学、忆、批”活动 肃清“四人帮”流毒福州部队某部警卫连进行我党我军优良传统教育","authors":[],"parts":[{"type":"paragraph","text":"本报讯 福州部队某部警卫连党支部在十个“应该不应该”的教育中，组织干部战士开展“学、忆、批”活动，提高了继承和发扬我党我军优良传统的自觉性。"},{"type":"paragraph","text":"应该不应该继承和发扬我党我军的光荣传统，这是两条路线斗争的一个重要内容。长期以来，“四人帮”怀着改变我军性质的险恶用心，散布了种种奇谈怪论，叫嚷要用他们的所谓“新鲜经验”代替我军的光荣传统，妄图把毛主席亲手培育的我党我军的优良传统一笔勾销。在“四人帮”的严重干扰破坏下，有的同志是非界限不清，不敢讲传统、学传统，生怕被扣上“复旧”的帽子。针对这个问题，党支部组织全连干部战士开展“学、忆、批”的活动，即：学习毛主席关于“发扬革命传统，争取更大光荣”的教导，学习“硬骨头六连”不怕压、不信邪、不转向，自觉发扬我党我军优良传统的先进事迹；回忆几十年来，毛主席亲手培育的我党我军优良传统代代相传，激励和鼓舞广大指战员克敌制胜的光辉战斗历程，加深对发扬我党我军优良传统的重大意义的认识；批判“四人帮”疯狂反对和破坏我党我军优良传统的罪行和谬论，认清反对还是发扬我党我军的优良传统，是资产阶级军事路线与无产阶级军事路线的根本分歧之一。通过这些活动，干部战士认识到，我党我军的优良传统，是毛主席建党思想和建军思想的体现，是革命的传家宝，无论过去、现在和将来，我们都要永远使它发扬光大。连长王福清说：“丢掉传统还是发扬传统，这是举什么旗，走什么路，建设什么样的军队的大问题，我们一定要把这个问题上的大是大非彻底搞清楚。”大家指出：“四人帮”妄想用什么“新鲜经验”取代我党我军的优良传统，这种颠倒是非的卑劣手法，是注定要失败的。"},{"type":"paragraph","text":"为了使我党我军优良传统的教育具体化、经常化，党支部还组织理论骨干把党指挥枪的原则，全心全意为人民服务的建军宗旨，三大纪律八项注意，一不怕苦、二不怕死的革命精神，严格训练、严格要求等分别编写成讲话材料，把“四人帮”破坏我党我军优良传统的罪行一条条地列出来，对照学习和批判，并且通过学传统经验交流会、座谈会等形式，进行生动具体的宣传教育。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"771b54b8d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
