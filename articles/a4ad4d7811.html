art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英王震会见烟台地区黄金生产系统职工代表勉励他们发扬艰苦奋斗革命精神，为四化建设多作贡献","authors":["汪玉春姜同川"],"parts":[{"type":"paragraph","text":"据新华社济南8月23日电 （通讯员汪玉春）中共中央政治局常委、中央军委副主席叶剑英，中共中央政治局委员王震，新近在烟台会见了烟台地区黄金生产系统的职工代表，对黄金生产系统广大干部、工人、技术人员和军队转业干部表示慰问，勉励他们发扬艰苦创业的革命精神，争取黄金生产的更大胜利。"},{"type":"paragraph","text":"会见时，叶剑英、王震同大家一一握手，并在一起照了相。烟台地委书记王济夫、烟台行署副专员姜德华向叶剑英、王震汇报了烟台地区黄金生产的情况。当他们汇报到这里的黄金生产八年翻了两番时，叶剑英、王震连声说好，称赞他们为四化建设做出了贡献。"},{"type":"paragraph","text":"叶剑英说，烟台地区是我国黄金生产的重点地区之一，近几年来，经过同志们的辛勤工作，黄金生产取得了很大的成绩，你们为国家创造了大量的财富，他勉励黄金生产系统的广大职工要认真学习《邓小平文选》，积极贯彻党的十二大和六届全国人大一次会议精神，夺取黄金生产的更大的成绩。"},{"type":"paragraph","text":"王震说，你们加强了黄金生产的领导，加强了地质勘探力量，在探明储量方面成绩显著，基本建设进度也加快了。这是符合赵紫阳总理关于提高经济效益的要求的。王震希望广大职工继续努力学习《邓小平文选》，加强思想政治工作，艰苦创业，力争上游，同时，希望领导上要搞好职工的技术培训，切实关心职工的工作、学习和生活。还要加强技术改造，虚心学习国内外的先进经验，减少消耗，降低成本，不断提高劳动生产率。他说，只要这些工作做好了，就一定会开创我国黄金生产的新局面。"},{"type":"paragraph","text":"叶剑英在会见结束时高兴地拱起双手，风趣地说：“祝同志们的事业日益发展，祝你们黄金万两！”"},{"type":"paragraph","text":"叶剑英、王震于近日在烟台会见山东省烟台地区黄金生产系统的职工代表。"},{"type":"paragraph","text":"姜同川摄（新华社稿）RW：叶剑英；中央军委副主席；会见"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4ad4d7811"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
