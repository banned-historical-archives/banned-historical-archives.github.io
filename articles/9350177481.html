<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"对学校组织和党员的看法","authors":["刘盛渠","电力部"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"对学校组织和党员的看法","type":"title"},{"text":"电力部刘盛渠","type":"authors"},{"text":"（刘盛渠：电力部干部学校教员）","type":"subtitle"},{"text":"一、对学校组织和党员的看法","type":"subtitle"},{"text":"1．学校阳奉阴违，党员的党性成问题，来校两年我认为学校宗派主义不亚于他处。人事调动不征求我的意见，党内开会不请我参加，党员来了就是科长，主任，如某主任，某科长，在旧社会当差还有试用阶段现在没有。来的党员就是科长，我来时也不挂牌子，……来了几个辅导员也未归我管。十月份才归专业组，十二月份才通知成立专业组，我认为这是对我的歧视。总之来校两年作客思想很重。没有主人翁思想……………把专业组看的很小，卢校长提到行政和教学分开，这是宗派……………。","type":"paragraph"},{"text":"2．学校应叫作招待所，只官吃，官住、而招待也招待不好学员不满意。学员是太子，教员是工具，……我们真有“陪太子读书之感”。","type":"paragraph"},{"text":"3．校务会议不起作用，每次开会都是“元老会”。建议成立咨询委员会吸收懂业务人员参加。研究讨论方针，任务，机构编制。此机构不应作校长的参谋机构，应为决策机构，并成立政治辅导组，不要清一色党团员参加。","type":"paragraph"},{"text":"4．学校有三少、教员少工程技术人员少，内行少。还有三多党员多，转业干部多，小学程度多，（客气的说是小学程度，不客气说是半文盲）。","type":"paragraph"},{"text":"5．学员借被子问题，他说：总务长没有党性就连人性也没有。他又说：人事工作应有群众参加只要保密就行。","type":"paragraph"},{"text":"6．他向卢校长说：她（刘盛渠的爱人）只能作两件事，一是扫厕所，二是当校长。","type":"paragraph"},{"text":"二、对社会上右派言论的看法","type":"subtitle"},{"text":"我看到葛佩琦的发言，最初不认为是右派，而是看到敢说敢为，至于有意识无意识，在六条标准发表以前他们的发言没有有意识与无意识的区别。六条标准公布以后，反社会主义言论不再有了。右派分子如不承认则认为是有意识的，如承认就不算有意识的了。","type":"paragraph"},{"text":"频率（与右派分子共鸣）是有的，这是引起共鸣的因素当然其中是有有意识，储安平的党天下发表后，我很感兴趣可见也有一定的频率，不必扣帽子，随着人的进步，事后也可以用六条标准来批判我……。不要一讲话就按六条标准，周总理说：有些人是反社会主义的……只要好好的工作就可以。","type":"paragraph"},{"text":"对罗隆基的平反委员会，没有发现什么问题，觉得与毛主席作报告内谈的是一样的。我思想上了70％跟共产党走30％是残留的毒素。","type":"paragraph"},{"text":"对章伯钧的“政治设计院”不太清楚……认为他不无道理。","type":"paragraph"},{"text":"三、对整风运动的意见","type":"subtitle"},{"text":"他说：校内问题最大限度能解决20％，又在整风办公室讲：你们边整边改，否则我们小组就不开小组会了。在研究成立边整边改委员会成员和小组时，他说：此组织受谁领导？有人说受整风指导小组领导，他却说：这还不是换汤不换药。","type":"paragraph"},{"text":"又在下边说：学校民主作风差，如对板报委员会，他认为不要这个组织，出稿无须审查。","type":"paragraph"},{"text":"在整风运动中他动员党员发言暴露党内秘密，并说（向党员说）你们党内有宗派主义，如果解决不了我们可以参加你们的会议来帮助解决。","type":"paragraph"}],"comments":[],"origin":"《想一想，对不对》第二集（电力工业部整风办公室编印，1957年8月10日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9350177481"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
