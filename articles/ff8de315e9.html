thors":[],"dates":[{"year":1949,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我军进驻迪化市"},{"type":"paragraph","text":"另部到达焉耆及库尔勒"},{"type":"paragraph","text":"鲍尔汉电毛主席朱总司令报告欢迎盛况"},{"type":"paragraph","text":"【新华社北京二十一日电】人民解放军一部，于二十日下午到达迪化，受到迪化军政机关及市民群众的热烈欢迎。人民解放军另一部于同日到达焉耆，库尔勒。新疆临时省政府鲍尔汉主席于二十日致毛主席朱总司令电称："},{"type":"paragraph","text":"中央人民政府毛主席、朱总司令：新疆人民欢迎人民解放军入新筹委会，早就组成，昼夜赶办一切欢迎供应等事宜。二十日午后三时左右，人民解放军装甲兵团首先抵迪。是日，热烈欢迎的迪化各族各界男女老少，充满市郊，呼声雷动，盛况空前。谨闻。　新疆省临时人民政府主席鲍尔汉　十月二十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff8de315e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
