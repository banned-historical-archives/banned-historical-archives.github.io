:1976,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　七月中旬以来，本市连续高温、干旱，严重影响了蔬菜生长。宝山县江湾公社广大贫下中农和干部决心以抓革命、促生产的实际行动支援灾区人民。他们牢固树立为革命种菜、为城市服务的思想，搞好火秋蔬菜生产，供应市场。目前他们正在积极抗旱，加强田间管理。各级领导深入生产队和社员一起战斗。整个公社的大田里，菜叶绿油油，茄果类结果累累，冬瓜等作物长势也很好，为增加八、九月份蔬菜供应，打下了基础。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e31fc58209"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
