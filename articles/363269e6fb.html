:[{"year":1968,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海纺织五金一厂革命委员会　汪成明　张国隆"},{"type":"paragraph","text":"打得好!打得狠!打得准!三报一刊《评陈丕显的五次假检讨》的文章用毛泽东思想的照妖镜和显微镜，彻底照出了旧上海市委这个头号庞然大物的反革命两面派原形。"},{"type":"paragraph","text":"中国赫鲁晓夫和他在上海的代理人陈丕显所放的毒素确实是无孔不入的。例如，利用无政府主义思潮来腐蚀瓦解我们的革命队伍，就是他们惯用的恶毒伎俩。"},{"type":"paragraph","text":"无政府主义，就其实质来说，所不要的，只能是无产阶级政府，矛头所指也只能是无产阶级政权。大刮无政府主义歪风的人，不管他们是自觉还是不自觉，实际上都适合了陈丕显之流的胃口，在为陈丕显之流效劳。看，陈丕显的炮口不是一直紧紧地瞄准无产阶级司令部吗?直到现在，陈、曹之流始终没有放松对我们的进攻。他们处心积虑地妄想扰乱毛主席的伟大战略部署，颠覆无产阶级专政，以便实现他们复辟资本主义的阴谋。而无政府主义对革命所起的破坏作用，正是陈丕显之流在今天条件下梦寐以求而不可得的。在这一点上，无政府主义成了他们的有力助手。"},{"type":"paragraph","text":"无政府主义是无产阶级文化大革命的大敌，是无产阶级专政的大敌，是新生的革命委员会的大敌。大敌当前，务必群起而攻之，鸣鼓而歼之。你真恨中国赫鲁晓夫和上海的资产阶级“大亨”陈丕显吗?你就应该听毛主席的话，坚决打倒无政府主义，共同围歼无政府主义，把批判陈丕显和本单位的斗批改结合起来。把陈丕显和他那一大堆臭气熏天的五次假检讨，连同他们积极鼓吹的无政府主义等黑货一起扫进历史的垃圾堆。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"363269e6fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
