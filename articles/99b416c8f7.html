hors":[],"dates":[{"year":1958,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据浙江日报消息:浙江省广大党员、干部在积极学习马列主义理论和毛主席著作中，解决了当前大跃进中的许多复杂问题，推动了各项工作的进展。有些同志体会到，在没有认真学习理论以前，工作中常常容易犯忽左忽右的错误，甚至有时犯了错误还找不出原因。认真学习理论后，在处理问题时，立场、观点、方法对头了，而且能总结出工作中的经验。现在全省广大党员、干部已把学习马列主义和毛主席著作，当成一项重大的政治任务，党的组织也加强了这方面的领导。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99b416c8f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
