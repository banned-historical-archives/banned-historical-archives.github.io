tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"更加努力活学活用毛主席著作","authors":["一一二四工地五个连队全体同志"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席英明地指出：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。形势大好的重要标志，是人民群众充分发动起来了。从来的群众运动都没有象这次发动得这么广泛，这么深入。”毛主席的话，句句说到了我们全体指战员的心坎上。我们怀着无比兴奋的心情，最热烈地欢呼伟大领袖毛主席关于形势的最新指示，最认真地学习伟大领袖毛主席的最新指示，最广泛地宣传毛主席的最新指示，最坚决地贯彻伟大领袖毛主席的最新指示。毛主席最最正确、最最科学、最最精辟地分析和估价了无产阶级文化大革命的形势，使我们受到了极大的鼓舞和教育。我们越学头脑越清醒，越学方向越明，越学信心越足。"},{"type":"paragraph","text":"我们施工，从表面上看，是和岩石作斗争，从实质上看，是和阶级敌人作斗争；我们执行施工任务，就是保卫毛主席、保卫无产阶级专政，保卫无产阶级文化大革命。因此，我们始终把工地当作保卫无产阶级文化大革命的战斗岗位，我们始终把自己的工作和无产阶级文化大革命联系起来。我们每时每刻都在关心着文化大革命的发展。全国无产阶级文化大革命胜利向前，取得了决定性的伟大胜利。这是毛泽东思想掌握了亿万革命群众的结果。我们就是要大讲特讲文化大革命大好形势，大颂特颂伟大领袖毛主席的丰功伟绩，大树特树毛主席、毛泽东思想的绝对权威。"},{"type":"paragraph","text":"我们深深感到：文化大革命的形势空前大好，越来越好。我们要更加努力活学活用毛主席著作，不断用毛泽东思想观察和分析阶级斗争的形势，认清形势，永远紧跟毛主席的伟大战略部署，在无产阶级文化大革命运动中天天立新功。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24ed4b300d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
