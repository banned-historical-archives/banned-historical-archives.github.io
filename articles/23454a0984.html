script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市部分文艺理论工作者座谈学习《邓小平论文艺》一致认为，邓小平同志的论述对于加强文艺队伍的思想理论建设，深入批判资产阶级自由化，坚持社会主义文艺的正确方向具有重要的现实意义","authors":["傅庆萱"],"dates":[{"year":1989,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者　傅庆萱)本市部分文艺理论工作者昨天下午在文艺会堂举行学习《邓小平论文艺》一书座谈会。"},{"type":"paragraph","text":"《邓小平论文艺》汇集了邓小平同志1975年至1989年6月间关于文化艺术问题的文章和言论。与会的文艺理论工作者在发言中一致认为小平同志根据马克思主义的基本原理，结合中国国情和新时期文艺战线的新情况，新问题，新要求，作出了一系列科学的创造性的概括和阐述，是在新的历史条件下对马列主义和毛泽东文艺思想的丰富和发展。认真学习《邓小平论文艺》，对于加强文艺队伍的思想理论建设，深入批判资产阶级自由化，坚持社会主义文艺的正确方向，具有重要的现实意义。"},{"type":"paragraph","text":"在谈到文艺作品的社会效果问题时，有的同志指出，一个时期以来文艺作品中描写和塑造社会主义新人形象的少了，而表现消极、颓废灰色人生的多了。小平同志强调文艺工作者要“认真严肃地考虑自己作品的社会效果，力求把最好的精神食粮贡献给人民”，这很值得我们深思，作为对人民负责的文艺工作者，应努力塑造更多有血有肉、生动感人的社会主义新人形象，来激发群众的社会主义积极性，提高人民的精神境界。"},{"type":"paragraph","text":"与会者谈到，小平同志关于“一切进步文艺工作者的艺术生命就在于他们同人民之间的血肉联系”的论述极为深刻，近几年来文学作品失去“轰动效应”，出现了片面强调表现作家自我的倾向，原因就在于一些文艺工作者忽略了与人民的联系，新时期文艺发展正反两方面的经验和教训都证明，背离了这一科学论断，社会主义文艺就不能健康发展。"},{"type":"paragraph","text":"座谈会上，大家还就邓小平同志关于社会主义文艺的“二为”方向和“双百”方针的阐述、文艺与政治的关系、以及反对资产阶级自由化和正确开展文艺批评等问题进行了交流。座谈会是由《文学报》和《上海文论》编辑部召开的。市委宣传部副部长徐俊西在会上发了言。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23454a0984"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
