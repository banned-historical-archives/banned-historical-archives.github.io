":["北京师范大学","黄药眠"],"dates":[{"year":1957,"month":5,"day":22}],"is_range_date":false,"parts":[{"text":"在作家协会第一次座谈会上的发言","type":"title"},{"text":"北京师范大学黄药眠","type":"authors"},{"text":"(黄药眠：北京师范大学中文系教授、系主任，中国民盟中央宣传部长)","type":"subtitle"},{"text":"黄药眠说，有些党员把知识分子一概看作是小资产阶级，是漆黑一团，远而避之，这不好。避开不是办法，可以说是党性不足。封神榜里只有自己法术不高的神仙才不敢接触妖怪。有照妖镜的，是不害怕的。他说，过去有些党员实在是党性不足，而党气凌人。好像做党员就是做官一样，什么都党员自己搞，不放手。在工作中把青年的党员一再加以提拔，这对青年党员和非党老作家都没有好处。","type":"paragraph"}],"comments":[],"origin":"1957年5月23日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f383369f85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
