{"year":1963,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亲爱的刘主席，"},{"type":"paragraph","text":"亲爱的陈毅同志，"},{"type":"paragraph","text":"亲爱的同志们，朋友们:"},{"type":"paragraph","text":"首先，我衷心地感谢主席同志对我国人民和党发表了美好和亲切的讲话。"},{"type":"paragraph","text":"刘主席及其他来访同志在我国访问期间，到处，我国人民都感到欢欣鼓舞。你们和我国人民的广泛和亲密的接触，以及你们热情洋溢的讲话，更加强了我国人民对兄弟的中国人民、中国共产党的热爱和敬佩。到处，我国人民都感到你们是坚强的战友和骨肉的兄弟。这是有着同一个崇高的主义——马克思列宁主义，有着同一个伟大的目的——建设共产主义的战友之间的同甘共苦的同志之间的深情厚谊。"},{"type":"paragraph","text":"在过去的革命和抗战时期以及当前的北方社会主义建设和争取和平统一祖国的斗争中，我们不断地得到中国共产党、中国人民的至诚帮助。此外，中国专家同志给予我们的全心全意的帮助也是十分宝贵的。我们再一次对中国共产党和兄弟的中国人民表示衷心的感谢。"},{"type":"paragraph","text":"当前，社会主义阵营日益强大，民族解放运动到处蓬勃发展，在资本主义国家，劳动人民的斗争运动日益扩大。这些强大的革命力量紧密团结起来，合成强大的统一战线，进行坚决的斗争，就一定能够消灭帝国主义和殖民主义，保卫住世界和平，各殖民地人民一定能够获得独立自由，社会主义必将获得全胜。"},{"type":"paragraph","text":"当前，国际共产党的队伍空前壮大，拥有四千万党员。这是无比强大的革命斗争的领导力量。为当代人类的幸福，为万代子孙的美好将来，我们各兄弟党，首先是苏联共产党和中国共产党在马克思列宁主义旗帜下和在1957年莫斯科宣言、1960年莫斯科声明的基础上团结一致；我们坚决为反对共同的敌人——美帝国主义，并肩战斗，最后胜利一定是我们的。"},{"type":"paragraph","text":"我们非常高兴地看到，我们两党和两国政府之间的亲密交谈取得了极其美好的结果。"},{"type":"paragraph","text":"亲爱的刘主席，"},{"type":"paragraph","text":"亲爱的陈毅同志，"},{"type":"paragraph","text":"亲爱的同志们，朋友们:"},{"type":"paragraph","text":"我请大家举杯:"},{"type":"paragraph","text":"——越中两国人民的团结友谊万岁，"},{"type":"paragraph","text":"——社会主义各国和各兄弟的共产党之间的团结一致万岁，"},{"type":"paragraph","text":"——战无不胜的马克思列宁主义万岁，"},{"type":"paragraph","text":"——为毛泽东同志身体健康!"},{"type":"paragraph","text":"——为刘少奇主席身体健康!"},{"type":"paragraph","text":"——为陈毅同志和各位同志和各位朋友身体健康，"},{"type":"paragraph","text":"干杯!　【新华社河内15日电】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd28a784e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
