script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马来亚《阵线报》发表社论指出  法国和欧洲、北美人民革命斗争蓬勃发展  猛烈地冲击着垄断资产阶级的反动统治","authors":[],"dates":[{"year":1968,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马来亚《阵线报》发表社论指出"},{"type":"paragraph","text":"法国和欧洲、北美人民革命斗争蓬勃发展"},{"type":"paragraph","text":"猛烈地冲击着垄断资产阶级的反动统治"},{"type":"paragraph","text":"据新华社三十一日讯　新加坡消息：在新加坡出版的马来亚报纸《阵线报》二十六日发表社论指出，法国和欧洲、北美最近爆发的波澜壮阔的群众革命运动，极其猛烈地冲击着垄断资产阶级的反动统治，震撼了整个资本主义世界。"},{"type":"paragraph","text":"社论说，世界革命人民的伟大导师毛主席教导我们：“哪里有压迫，哪里就有反抗。”法国和欧洲、北美其他国家的工人和学生运动的新高涨，反映了这些国家内阶级矛盾的激化。以美帝国主义为首的资本主义国家，目前正面临一场严重的政治和经济危机，垄断资产阶级为了挽救它们垂危的统治，不断地加紧对人民的剥削和压迫，这就不可避免地要激起人民的更强烈的反抗。"},{"type":"paragraph","text":"社论指出，法国工人和学生掀起的这场革命斗争，标志着法国人民的新的觉醒，它是巴黎公社革命传统的继续。"},{"type":"paragraph","text":"社论说，法国人民革命运动的发展，必将给全世界各国人民的斗争以巨大的鼓舞和支援。它直接打击了资本主义的统治，加深了资本主义国家的政治和经济危机，加速了帝国主义走向全面崩溃。"},{"type":"paragraph","text":"社论说，法国和欧洲、北美人民革命斗争的蓬勃发展，是和中国无产阶级文化大革命的影响分不开的。中国无产阶级文化大革命促进了毛泽东思想的广泛传播。"},{"type":"paragraph","text":"社论指出，人们越来越清楚地看到，战无不胜的毛泽东思想在世界革命人民当中的崇高威望和影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7e7fe8a4f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
