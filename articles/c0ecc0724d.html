<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于我党党员参加民主党派领导机构的决定","authors":[],"dates":[{"year":1952,"month":2,"day":2}],"is_range_date":false,"parts":[{"text":"中央关于我党党员参加民主党派领导机构的决定","type":"title"},{"text":"一年以来，各民主党派多要求我党党员参加其中央及地方领导机构的领导工作。我党对此种要求应采取积极而严肃的态度，为此特作如下决定，望认真执行。","type":"paragraph"},{"text":"（一）凡我党党员参加各民主党派各级委员会为委员和担任实际负责职务者，均须分别遵守下列的审核、批准和备案程序。","type":"paragraph"},{"text":"（1）参加民主党派县、市以下委员会为委员和担任负责职务者，由党的同级委员会或总支委审核、批准，并报上级党委备案。","type":"paragraph"},{"text":"（2）凡已参加心党派的我党党员被民主党派提名参加其省、市级领导机构为委员或担任实际负责职务时，须由党的省、市、区党委统战部和组织部会同审核，认为必要的适当时，即报请省、市、区党委批准，并报中央局及中央统战、组织两部备案。","type":"paragraph"},{"text":"如被提名参加民主党派大行政区领导机构为委员或担任实际负责工作，则须经中央统战、组织两部审核，中央局批准，并报中央备案。","type":"paragraph"},{"text":"（3）民主党派向我党提名或要求派送尚未加入该党派的我党负责干部加入该党派并参加其省、市级或大行政区级领导机构为委员或担任实际负责职务时，除审核、备案程序依前款（2）之规定办理外，其批准程序属于省、市级者须经中央局批准，属于大行政区级者须经中央批准。","type":"paragraph"},{"text":"（4）凡我党党员参加各民主党派中央委员会为委员或担任实际负责职务者，须经中央统战，组织两部审核，报请中央批准。","type":"paragraph"},{"text":"（二）参加民主党派领导机构的我党党员，人数不宜多，以不超过其领导成员十分之一最多不超过十分之二为宜，且一般不要担任各级委员会首席领导职务及其组织部部长的正职；除帮助民主党派领导机构制定正确的路线和政策外，应将工作重心放在帮助各民主党派成员进行学习和思想改造的上面，并切实做出成绩来。","type":"paragraph"},{"text":"（三）参加民主党派领导机构的我党党员，须具备立场坚定，作风正派，并有相当政治经验和工作能力的条件。在他们参加民主党派领导机构时，党委须对他们明确地交代清楚任务和政策，仅因偶尔犯了贪污、浪费、官僚主义的错误，情节不严重，而受到行政处分的党员，应酌情予以劝告、警告或撤销工作的处分；但对于在工作中一贯表现不好，又不够党员条件的，则应给予严格的党纪处分，直至开除党籍。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0ecc0724d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
