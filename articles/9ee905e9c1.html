script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"纪念毛泽东诞辰110周年邮品将推出","authors":["孙旗"],"dates":[{"year":2003,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纪念毛泽东诞辰110周年邮品将推出"},{"type":"paragraph","text":"本报北京11月25日讯  今年是毛泽东同志诞辰110周年，中国集邮总公司将在12月举办以“世纪缅怀颂伟业、与时俱进谱新篇”为主题的集邮联展。集邮公司还将与北京、河北、陕西、上海、浙江等省市协作，开展相关纪念活动。"},{"type":"paragraph","text":"为了配合这些活动的开展，集邮总公司将利用相关的邮票、以反映毛泽东同志光辉历程为主要内容的邮集共50框到地方进行展出；同时为了配合《毛泽东同志诞辰110周年》纪念邮票的发行，满足各地开展相关纪念活动和各族人民纪念毛泽东同志的需要，总公司届时还将发行《毛泽东同志诞辰110周年》首日封、特种封、图卡等邮品。（孙旗）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ee905e9c1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
