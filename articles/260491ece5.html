script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"安徽农民的血泪苛捐杂税重重剥削商贩　催征警来一脚踢落眼球","authors":[],"dates":[{"year":1947,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报合肥通讯】　皖境岳西潜山太湖宿松等县，因系山岳地带，可耕之地较少，一般农民，惟有乘农间之隙，兼作肩挑负贩，运销山货于六口。道经霍山境之团墩者，日必百余担。该地税务查征所，假借征收营业税特产税名义向过路商贩勒索捐款，从未给予收据，如挑花夹纸，大板纸，土报纸等粗货者，每担收过路费三千元，挑桐油，生漆，棕榈，猪鬃者，每担收九千元，如稍违抗，即扣留人货，不准通行，往往有被扣四五日之久者。乡曲一小民，慑于威势，无不俯首帖耳，忍气吞声，如数缴纳此种苛于厘金关卡之过路税，究竟由谁规定出来的?该四县地方人士，已向主管税收机关，提出质询。(六日)"},{"type":"paragraph","text":"【本报合肥通讯】　六安新安集有农民罗怀当者，年近四旬，早年操劳过度，致左眼失明，八十岁老父尚存；弟怀银，于战时应征在外，迄今渺无音讯。弟妇苦守空帏，抚育子女，全家十数口，悉由怀富担负，艰苦备尝三月廿四日，县田粮处派出警士数人前往该户催缴粮赋，怀富虽已遵章缴纳，该警复勒索草鞋背八万元，因一时筹措不到，该警等即将其八十岁之老父拘留于某饭店内，怀富已应允多方挪借，该警等以不能久待，即将怀富毒打，讵料某警士一脚飞来，恰将右眼球击落在地，顿成完全之盲人。其父目睹斯状，老泪纵横，泣不成声，闻已具状向司法机关控诉云。(六日)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"260491ece5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
