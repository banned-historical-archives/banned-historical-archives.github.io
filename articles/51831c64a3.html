authors":[],"dates":[{"year":1963,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"崔庸健委员长回拜刘少奇主席"},{"type":"paragraph","text":"刘主席由金日成首相崔庸健委员长陪同观赏《红楼梦》"},{"type":"paragraph","text":"新华社平壤十七日电　朝鲜最高人民会议常任委员会委员长、朝鲜劳动党中央委员会副委员长崔庸健，今天下午前往宾馆，回拜中华人民共和国主席、中国共产党中央委员会副主席刘少奇。"},{"type":"paragraph","text":"陪同崔庸健委员长回拜的有：朝鲜最高人民会议常任委员会委员、朝鲜劳动党中央委员会副委员长李孝淳，外务相朴成哲，外务省仪礼局局长朴麟根，朝鲜驻中国大使馆参赞郑凤珪。"},{"type":"paragraph","text":"回拜时，全国人民代表大会常务委员会副委员长、中国共产党中央委员会委员林枫，国防委员会副主席、中国共产党中央委员会委员叶剑英元帅，北京市副市长万里，外交部礼宾司司长俞沛文，外交部第二亚洲司副司长曹克强和中国驻朝鲜大使郝德青也在座。"},{"type":"paragraph","text":"回拜时，宾主进行了亲切、友好的谈话。"},{"type":"paragraph","text":"新华社平壤十七日电　刘少奇主席在金日成首相和崔庸健委员长陪同下，今天晚间在平壤大剧场观赏了歌剧《红楼梦》。"},{"type":"paragraph","text":"这个剧是朝鲜艺术家在中国的越剧台本的基础上加以改编的。朝鲜艺术家在改编过程中，通过创造性劳动，采用了朝鲜人民喜闻乐见的形式、优美的音乐和动人的语言，无情地鞭挞了封建制度，使这个剧作具有强烈的感染力。演出获得了巨大的成功。"},{"type":"paragraph","text":"陪同刘少奇主席观赏演出的还有：朝鲜劳动党中央委员会副委员长金昌满、李孝淳，外务相朴成哲、文化相朴雄杰，朝鲜劳动党平壤市委员会委员长许锡瑄，平壤市人民委员会委员长姜希源，朝鲜驻中国大使馆参赞郑凤珪等。"},{"type":"paragraph","text":"歌剧《红楼梦》台本整理者赵灵出、作曲者李冕相和其他参加改编的艺术家也陪同观赏。"},{"type":"paragraph","text":"陪同观赏的还有随同刘少奇主席访问朝鲜的林枫、叶剑英、伍修权、姬鹏飞、万里，中国驻朝鲜大使郝德青、大使馆全体外交官员和华侨代表等。"},{"type":"paragraph","text":"演出进行了三个半小时。演出后，刘少奇主席向艺术家们赠送了花篮。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"朝鲜最高人民会议常任委员会委员长、朝鲜劳动党中央委员会副委员长崔庸健，前往宾馆回拜中华人民共和国主席、中国共产党中央委员会副主席刘少奇。"},{"type":"paragraph","text":"朝鲜中央通讯社传真照片（新华社发）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51831c64a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
