<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"无极县革委会狠批叛徒刘少奇的“群众落后论”  遵照毛主席教导扎根于群众之中  革委会充分相信群众，依靠群众，虚心接受群众的意见和监督，更加耳聪目明，发挥了革命战斗指挥部的作用","authors":[],"dates":[{"year":1969,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无极县革委会狠批叛徒刘少奇的“群众落后论”"},{"type":"paragraph","text":"遵照毛主席教导扎根于群众之中"},{"type":"paragraph","text":"革委会充分相信群众，依靠群众，虚心接受群众的意见和监督，更加耳聪目明，发挥了革命战斗指挥部的作用"},{"type":"paragraph","text":"据新华社石家庄电  河北无极县革命委员会遵照伟大领袖毛主席“共产党基本的一条，就是直接依靠广大革命人民群众”的教导，充分相信群众，依靠群众，认真听取群众意见，虚心接受群众监督，促进了县革委会成员的思想革命化，使革委会深深扎根于群众之中。"},{"type":"paragraph","text":"无极县革委会在成立以后的第一次全体委员会议上，就认真学习了毛主席“应该号召全党提起警觉，注意每一个工作环节上的每一个同志，不要让他脱离群众”的教导，总结了旧县委和县人委严重脱离群众对工作造成的危害，狠批了叛徒、内奸、工贼刘少奇的“群众落后论”，使大家从历史的经验中深刻认识到，革委会要按照毛主席的指示，抓好革命，促好生产，就必须紧紧依靠广大革命人民群众，及时听取群众意见，虚心接受群众监督。从此，他们每月都发动工人、贫下中农和革命群众给县革委会提意见。县革委会根据毛主席的伟大战略部署，把群众中符合毛泽东思想的正确意见集中起来，用以指导工作。去年九月，县革委会从中学应届毕业生中选拔了一批学生参加革委会和其它一些部门工作。群众知道后，立即提出批评，认为这样做不符合毛主席的教导，应当让这些学生到农村去接受贫下中农的再教育。县革委会立即采纳了群众的意见，动员已分配工作的学生回了农村。"},{"type":"paragraph","text":"群众对县革委会这样处理很满意，以后提意见更积极了。"},{"type":"paragraph","text":"县革委会成立初期，工作千头万绪，革委会成员一度浮在上面开会、听汇报的多了，深入实际联系群众抓典型和参加劳动的少了。不少群众对此提出了批评。革委会听了群众意见，立即进行检查，迅速改变了作风。"},{"type":"paragraph","text":"无极县革委会还采取每季召开一次工人、贫下中农、各级革委会代表会议的方法来听取革命群众的意见。会上，由县革委会负责同志向大家报告全县工作，根据毛主席的战略部署和当地的实际情况，提出今后的工作安排意见，然后由大家讨论，再用毛泽东思想把正确意见集中起来，作出决定，贯彻实施。"},{"type":"paragraph","text":"毛主席教导说：“以后干部要分别到下面去走一走，看一看，要坚持群众路线，遇事多和群众商量，做群众的小学生。”无极县革委会遵照毛主席的指示，十名常委都分别选择一至两个单位，作为自己联系群众和参加劳动的点，每月都到那里劳动并召开座谈会，听取群众的意见。"},{"type":"paragraph","text":"无极县革委会由于虚心倾听群众意见，主动争取群众监督，大大调动了广大群众的积极性。贫下中农和革命群众同革委会的关系非常亲密，许多人路过县革委会的时候，都要进去看一看、坐一坐，随时反映他们对县里工作的意见，有的还随时来信反映各地工作情况。这样，就使县革委会耳聪目明，更好地发挥了革命战斗指挥部的作用。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b98421449"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
