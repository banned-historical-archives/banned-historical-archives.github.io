{"year":1951,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本一部分资产阶级对单独媾和颇有顾虑"},{"type":"paragraph","text":"【新华社二十五日讯】尽管吉田反动政府及自由党、民主党等反动政党的头子们甘充美国的走卒，积极鼓吹单独媾和，但日本资产阶级内部某些头脑比较清醒的分子已经觉察到：单独媾和将给日本带来危机和灾难。销数约三百四十万份的报纸《朝日新闻》，在十四日撰文称：单独和约将使日本的处境“更为困难和难堪”，它给日本带来的“必将是一个暂短的和平”。即使它可使日本得到“某些暂时的政治和经济利益”，但是，它“将带给日本很多的‘困难’，这些困难可能促成严重危机，而使一个创伤还没有完全恢复的日本，再遭恶运”。"},{"type":"paragraph","text":"鉴于日本人民普遍反对单独和约，保守的社会党在二十一日的全国代表大会上，也重申了全面媾和的主张。新任的该党中央执行委员会主席铃木茂三郎在二十三日撰文称：单独和约“可能使日本卷入武装冲突”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec63d627a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
