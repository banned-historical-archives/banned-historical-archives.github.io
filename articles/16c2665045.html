ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"华东应准备独力歼灭可能进犯之敌","alias":"","parts":[{"type":"paragraph","text":"华东应准备独力歼灭可能进犯之敌\""},{"type":"paragraph","text":"（1951年1月21日）"},{"type":"paragraph","text":"（一）同意即将二十五军开往福建，使福建共有四个军。（二）浙江的二十一、二十二两军，上海附近的二十三、二十四军，照你们部署不变，浙江加紧督促剿匪，务于二、三两月内完成任务。（三）杨得志部准备入朝参战，但二野三个军已集中河北，第二批三个军亦可于六月以前集中河北。如江浙有事，可给你们三个军使用。但你们应尽现有力量加强整训，准备独力歼灭台匪可能的进犯。"},{"type":"paragraph","text":"[1]这是毛泽东致华东军区司令员陈毅并告中共中央华东局第一书记、华东军区政治委员饶漱石电的主要内容。"},{"type":"paragraph","text":"[2]杨得志部，指第十九兵团，兵团司令员杨得志。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":47,"page_end":47},"tags":[{"name":"杨得志","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16c2665045"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
