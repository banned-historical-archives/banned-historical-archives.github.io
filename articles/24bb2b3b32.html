rs":["章伯骏"],"dates":[{"year":1957,"month":6,"day":25}],"is_range_date":false,"parts":[{"text":"章伯钧妹妹章伯骏揭露章伯钧政治野心","type":"title"},{"text":"章伯骏","type":"authors"},{"text":"章伯钧的妹妹章伯骏，在重庆农工民主党一次会上揭了章伯钧的底。她说，章伯钧解放前就是野心家，解放后并没转变，只收敛了些。最近趁共产党整风机会，他又野心勃勃，原形毕露。她说，章伯钧的反动立场是有历史根源的，他过去搞第三党就是为了捞政治资本。她说，我曾经问过章伯钧：“你为什么要搞个第三党？”回答是：“一个人搞一个党，不是好些吗?”这一句话，就暴露了他个人的政治企图。","type":"paragraph"},{"text":" 来源：1957年6月25日 《文汇报》第1版。转载于《右派分子的反动言论资料(二)》，新华日版出版，1957年7月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24bb2b3b32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
