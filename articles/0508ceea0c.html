主席同吴奈温总统进行了亲切友好的谈话。　李先念副总理、邓颖超副委员长等参加了会见和谈话并出席宴会作陪。　宴会在热烈的气氛中进行。　宾主频频举杯，共祝中、缅两国人民的“胞波”情谊不断发展","authors":[],"dates":[{"year":1977,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年四月二十九日电　中共中央主席、国务院总理华国锋，中共中央副主席叶剑英，今天下午在人民大会堂会见缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"李先念副总理、邓颖超副委员长、黄华外长、余湛副外长、中国驻缅甸大使叶成章，参加了会见和谈话。"},{"type":"paragraph","text":"参加会见和谈话的缅甸贵宾有:国务委员会委员吴当基、貌貌博士，外交部长吴拉蓬，国防部长觉廷将军，第二工业部部长貌丘上校，缅甸驻中国大使吴敏貌。"},{"type":"paragraph","text":"谈话结束以后，华主席、叶副主席又亲切地会见了吴奈温总统的夫人雅达娜纳梅以及随同来访的其他缅甸贵宾，并且同全体缅甸贵宾合影留念。"},{"type":"paragraph","text":"随后，华主席设宴招待吴奈温总统和夫人等缅甸贵宾。叶剑英副主席、李先念副总理、邓颖超副委员长、黄华外长、余湛副外长、林佳楣同志，出席宴会作陪。"},{"type":"paragraph","text":"宴会在热烈的气氛中进行。宾主频频举杯，共祝中、缅两国人民的“胞波”情谊不断发展。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774u010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e左上:中共中央主席、国务院总理华国锋，中共中央副主席叶剑英，四月二十九日在人民大会堂会见缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温和夫人雅达娜纳梅。图为华主席同吴奈温总统亲切握手。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774u010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e左下:华主席、叶副主席同吴奈温总统和夫人雅达娜纳梅以及随同来访的缅甸贵宾合影。"},{"type":"paragraph","text":"均新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0508ceea0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
