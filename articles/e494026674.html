<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《毛主席语录》是革命思想的总结桑给巴尔人民爱读毛主席的书","authors":[],"dates":[{"year":1966,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"红彤彤的《毛主席语录》在东非的坦桑尼亚桑给巴尔岛上一出现，就受到这里的广大革命群众的热烈欢迎。"},{"type":"paragraph","text":"桑给巴尔的一位技术工人在阅读了《毛主席语录》以后对同事说:“《毛主席语录》这本书虽然小，但是它是世界上一切革命思想的全面总结。谁要做革命者，他就得学习这本书。”"},{"type":"paragraph","text":"他举出了三点学习心得:一，应该全心全意为人民服务；二，遇到困难时，要想到《愚公移山》；三，在复杂的情况下要分清人民内部矛盾和敌我矛盾。"},{"type":"paragraph","text":"他熟练地背诵了许多毛主席语录来说明他的这些观点。"},{"type":"paragraph","text":"桑给巴尔工会领导人姆发乌梅得到一本《毛主席语录》后非常高兴。他说:“一切革命者都必须读这本《毛主席语录》，按照毛主席的指示办事，因为毛主席的话都是正确的。”"},{"type":"paragraph","text":"桑给巴尔的一位教育工作者说:“读了《毛主席语录》，我们感到，毛主席十分熟悉我们碰到的种种困难，并且教导我们如何去克服这些困难。”"},{"type":"paragraph","text":"有一次，一位桑给巴尔非洲-设拉子党的领导人谈到这样一件事:一批政府官员从奔巴岛乘船回桑给巴尔。在船上，他们不约而同地聚集在一起朗读和讨论《毛主席语录》。这位领导人说，他们完全赞同毛主席提出的自力更生建设国家的观点。他说:“我们希望有外援，但是我们不能依赖它，我们要依靠自己的努力，依靠全体军民的创造力。”"},{"type":"paragraph","text":"一位名叫哈吉的桑给巴尔革命青年曾向在中国学习过的桑给巴尔留学生借阅《毛主席语录》。哈吉不仅自己读毛主席的书，他还帮助其他青年学习《愚公移山》、《青年运动的方向》和《将革命进行到底》等毛主席著作。"},{"type":"paragraph","text":"同中国专家一道工作的桑给巴尔工人优素福，看到中国同志如饥似渴地学习毛主席著作后，请求中国翻译同志用斯瓦希利语向他解释《毛主席语录》的内容。在渐渐地懂得更多的毛主席的教导后，优素福工作得越来越努力了。他常常在上工前或下班后，向毛主席像敬礼。他还对自己的孩子们说:“我在世的时候，你们把毛主席像挂在我们家里。我去世以后，你们也要把毛主席像继续挂在我们家里。我们应当世世代代敬爱毛主席。”"},{"type":"paragraph","text":"新华社记者"},{"type":"paragraph","text":"(据新华社桑给巴尔十九日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e494026674"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
