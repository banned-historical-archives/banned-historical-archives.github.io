<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文人毛泽东","authors":["丁毅","杨景春"],"dates":[{"year":1998,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文人毛泽东"},{"type":"paragraph","text":"丁毅  杨景春"},{"type":"paragraph","text":"上海人民出版社出版的《文人毛泽东》（陈晋著），展示了毛泽东作为诗人、文化人一生的心路历程，是一部关于毛泽东的独特传记。"},{"type":"paragraph","text":"作者多年研究毛泽东，曾撰写过多部关于毛泽东的著作和电视专题片，这为他完成《文人毛泽东》有了必要的准备。在本书中，作者捕捉伟人的文心诗意，并同传主革命实践活动相联，经纬交织，特别是毛泽东政治家襟抱和诗人情怀相得益彰。作者有机地把毛泽东的创作实践和他的文艺理论糅在了一起。例如，如何看待毛泽东晚年诗作，始终是目前研究的一个难点。书中在谈到毛泽东发动“文化大革命”的时候，还反复强调诗歌创作要讲形象思维，要有比兴，但他这期间和以后的诗作则明显是说理大于形象，从而不自觉地出现了理论和创作的某种背离。作者认为，这除了毛泽东的政治思想逐渐偏离正确轨道以外，生活空间变得狭小，无疑对毛泽东晚年的创作产生不可忽视的影响。"},{"type":"paragraph","text":"正因为注意到毛泽东的特殊位置，书中在分析毛泽东的诗作或叙述毛泽东的文化交往的时候，都没有就事论事，而是放到特定的大背景中去揭示其前因后果。比如，他为什么特别看重鲁迅甚至称自己是鲁迅这位“圣人”的学生？他一生为什么出现了五次散文创作高潮？在建国初期为什么特别注意和一些旧文化人、老艺人交往？1956年前后为什么能够提出“双百方针”？1958年为什么提倡民歌运动？“文革”前夕为什么对文艺界不满意？等等，这些，如果就现象谈现象，想来是没有多大说服力的，只有把它们放到毛泽东和他从事的事业的关系中，才可能有比较准确的回答。而该书大体上做到了这一点。"},{"type":"paragraph","text":"由此，这本书写的虽然是毛泽东作为文化人的传记，但事实上，现当代文艺运动史上的诸多重大事件，也多少能从这本书中捕捉到一些“风起于青萍之末”的消息。这恰恰是由毛泽东本人的特殊位置决定的。做到这一点，除了要求作者对毛泽东的政治活动相当了解以外，自然还需要占有丰富的文艺史料并且在文艺史方面有专门的素养。"},{"type":"paragraph","text":"为色彩斑斓的毛泽东的文心立传，过于理性的笔调显然不宜。理性分析、形象描述和传统文论的诗意感悟，被融会一体，作者在还原一个毛泽东的同时，也在为读者塑造一个鲜活生动的毛泽东形象。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"705d3935b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
