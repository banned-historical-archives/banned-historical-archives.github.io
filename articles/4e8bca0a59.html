es":[{"year":1964,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席和周恩来总理电贺苏丹共和国独立九周年"},{"type":"paragraph","text":"新华社三十一日讯　中华人民共和国主席刘少奇今天打电报给苏丹共和国国家最高委员会主席穆巴拉克·法德勒·沙达德博士祝贺苏丹共和国独立九周年。电文如下：喀土穆苏丹共和国国家最高委员会主席穆巴拉克·法德勒·沙达德博士阁下："},{"type":"paragraph","text":"在苏丹共和国独立九周年的时候，我向阁下和苏丹人民表示热烈的祝贺。祝苏丹共和国繁荣、进步，祝苏丹人民康乐。祝中国和苏丹人民之间的友谊日益增进。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"一九六四年十二月三十一日"},{"type":"paragraph","text":"新华社三十一日讯　中华人民共和国国务院总理周恩来今天打电报给苏丹共和国总理塞尔·哈特姆·哈利法祝贺苏丹共和国独立九周年。电文如下：喀土穆苏丹共和国总理塞尔·哈特姆·哈利法阁下："},{"type":"paragraph","text":"在苏丹共和国独立九周年的时候，我向阁下和苏丹共和国政府致以衷心的祝贺。祝苏丹人民和苏丹共和国政府在巩固民族独立、建设自己国家的事业中，在加强亚非团结、维护世界和平的斗争中取得新的成就。祝中国和苏丹两国的友好关系不断巩固和发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九六四年十二月三十一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e8bca0a59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
