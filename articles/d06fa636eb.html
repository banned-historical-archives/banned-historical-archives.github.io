art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘主席周总理接见拉丁美洲和非洲外宾","authors":["孟庆彪侯波"],"parts":[{"type":"paragraph","text":"新华社24日讯 毛泽东主席、刘少奇主席和周恩来总理，今天下午接见了在北京的拉丁美洲和非洲的各国外宾，同他们进行了亲切的谈话。"},{"type":"paragraph","text":"这些外宾是：以奥斯卡·多诺索·洛佩斯为首的玻利维亚参议院代表团，玻利维亚工会代表托莱斯，智利和平人士万徒勒里和他的夫人，以李耀民为首的智利青年代表团，刚果非洲团结党全国指导委员会委员、第二副总书记西奥多·本基拉，马里联邦苏丹和平运动秘书长迪亚洛·摩沙·萨内，以米拉茨·谢拉布·阿卜杜勒为首的桑给巴尔民族主义党代表团团员，以艾哈迈德·阿卜杜勒·马吉德为首的苏丹学生代表团等。"},{"type":"paragraph","text":"接见时在场的，有中国亚非团结委员会主席廖承志，中国拉丁美洲友好协会会长楚图南，中国非洲人民友好协会会长、中华全国总工会副主席刘长胜，共青团中央第一书记胡耀邦，中国人民外交学会副会长胡愈之，对外文化联络委员会副主任张致祥等。"},{"type":"paragraph","text":"毛主席、刘主席、周总理和拉丁美洲、非洲外宾合影。新华社记者侯波、孟庆彪摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d06fa636eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
