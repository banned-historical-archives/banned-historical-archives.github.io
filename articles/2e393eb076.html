art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"干一辈子革命读一辈子毛主席书","authors":["王井仓"],"parts":[{"type":"paragraph","text":"庄家富和周信礼的两篇哲学文章，是活学活用毛泽东思想的好文章。可是，这两篇好文章竟被某些所谓“权威”指责为“庸俗化”、“实用主义”的典型，大肆诬蔑，抛进纸篓，这是他们恶毒诬蔑毛泽东思想，阻碍工农兵掌握毛泽东思想的又一罪证。"},{"type":"paragraph","text":"这伙所谓“权威”老爷们，根本没有把我们工农兵放在眼里，他们口口声声、夸夸其谈什么“哲学”呀，“经典”呀，可是他们对于毛主席著作却一窍不通。他们把一些哲学名词挂在嘴上，写在纸上，不过是打着“红旗”反红旗。"},{"type":"paragraph","text":"这伙所谓“权威”们，他们向我们工农兵放出毒箭，是妄图叫我们工农兵不要学习毛泽东思想，不要干革命，这是办不到的。我是个炊事员，工作所以做得有成绩，就是由于毛泽东思想哺育了我，使我懂得了烧火做饭是革命工作不可缺少的一部分，直接关系到部队的战斗力。那些“权威”们，把我们工农兵纯朴的为革命而学，学用一致，言行一致，诬蔑为“庸俗化”、“实用主义”，正是他们别有用心地歪曲毛泽东思想，害怕和阻碍我们工农兵掌握毛泽东思想的拙劣手段。他们骂工农兵“庸俗化”，实质上就是叫工农兵不要去学习毛泽东思想；他们骂工农兵“实用主义”，实质上就是要工农兵不要去运用毛泽东思想。呸！这是妄想，我们要干一辈子革命，读一辈子毛主席著作，永远做毛主席的好战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e393eb076"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
