" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"浙江省主要民主人士对“三反”运动的态度","authors":[],"dates":[{"year":1952,"month":2,"day":12}],"is_range_date":false,"parts":[{"text":"浙江省主要民主人士对“三反”运动的态度","type":"title"},{"text":"【浙江分社讯】浙江省主要民主人士对“三反”运动的态度大致可分为四种类型：","type":"paragraph"},{"text":"第一种是民族资产阶级的代表人物，如浙江省府副主席包达三，是资产阶级的代表人物，自参加北京全国政协第一届第三次全国委员会议回来后，心里就很沉重。这次“三反”运动，他因有病未参加，但情绪上很恐慌，他曾说自己是标准的资产阶级代表。我们有同志去看他，他开口就问“三反”情况，他问：在北京、上海、杭州都送过礼(其中有向资本家送的)，是否算贿赂？他老婆也很害怕，问：来客请吃烟，小孩来请吃糖是否算贿赂?这说明他们对政策还不了解，另方面包在上海搞工商联工作，可能有些问题。现省府已决定由沙文汉副主席等帮助他过关。又如市协商委员会委员、六一织造厂总经理胡海秋曾说：“两年来资产阶级根本没有向无产阶级进攻，而是工人阶级向资产阶级进攻，如买公债、捐献都是资产阶级出得最多。”他又说：“贪污是你们(指工人阶级)自己的事，怪你们自己不好。”这种论调可代表一般的资产阶级。胡在交代时不彻底，怕丢面子，怕失地位。","type":"paragraph"},{"text":"第二种是部分手脚不干净的民主人士，如浙江省人民政府交通厅厅长吴化文(济南起义的将领)，他在解放后仍贩卖金子，在济南设有金子店(他的老警卫员检举)，这次“三反”运动，他很害怕。又如市协商委员会委员苏步青(浙大教务长)、蔡邦华(浙大农学院院长)等，亦都有贪污行为，他们目前都很恐慌。省府委员、浙大副校长王国松也很害怕，估计可能也有问题。","type":"paragraph"},{"text":"第三种是从地主阶级中分裂出来的开明士绅，他们对“三反”的抵抗不大，因他们在这方面的问题比资产阶级少。如省府委员赵德三，小地主，过去做过一些地下工作，对“三反”基本上是拥护的，他已开始交代，由于对政策还不大清楚，他对自己过去讨小老婆事很害怕，现已向他解释。","type":"paragraph"},{"text":"第四种是小资产阶级的知识分子，这种人基本上拥护“三反”，但他们是倾向资产阶级的。如省府委员、民盟浙江省主席宋云彬，文化人，他对“三反”基本上是拥护的，但思想上倾向民族资产阶级，他曾说民族资产阶级不要反对，但他对自己的历史交代得还好。省府委员、省卫生厅厅长洪式闾，高级知识分子，全国有名的寄生虫学家，他积极参加“三反”。该厅机关内有七个民盟和民革的盟员和会员，其中除一个手脚不干净的对运动有些抵抗外，其余一般都拥护或积极参加。","type":"paragraph"}],"comments":[],"origin":"1952年2月12日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c51f05860"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
