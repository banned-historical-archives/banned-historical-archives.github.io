rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"和革命群众一道保卫新生的革命政权","authors":["驻北京第二轧钢厂某部毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席关于革命三结合的最新指示，为各级革命委员会的建设指出了根本方向，也为我们“三支”“两军”人员提出了伟大战斗任务。我们一定更加热情地帮助革命委员会，更加勇敢地保卫革命委员会。"},{"type":"paragraph","text":"“世界上一切革命斗争都是为着夺取政权，巩固政权。而反革命的拚死同革命势力斗争，也完全是为着维持他们的政权。”北京第二轧钢厂从无产阶级文化大革命一开始，一小撮阶级敌人就千方百计地向革命群众施加压力，对无产阶级革命派进行迫害。他们时而以右的面目出现，花言巧语蒙蔽群众；时而以极“左”的面目出现，进行破坏和捣乱。我们遵照毛主席的伟大教导，坚决支持左派广大群众，经过反复较量，在两个阶级、两条道路、两条路线的激烈斗争中，建立了“三结合”的革命委员会。"},{"type":"paragraph","text":"革命委员会一成立，阶级敌人就恨得要命，怕得要死。他们对这个革命政权，极尽恶毒攻击之能事。针对敌人的猖狂进攻，我们和革命委员会的同志一起，深入地学习了毛主席关于“千万不要忘记阶级斗争”的教导，深刻体会到，革委会成立以后，阶级斗争并没有结束，要使新生的革委会更加巩固，一定要狠抓阶级斗争，警惕阶级敌人的破坏阴谋。我们帮助革委会大办毛泽东思想学习班，深入开展革命大批判，不断向阶级敌人发动进攻，使新生的革委会在斗争中锻炼得更加巩固。"}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65a78c32ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
