:1967,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"父子争读《毛主席语录》"},{"type":"paragraph","text":"《毛主席语录》法文版运到马里后，马里朋友欢欣鼓舞，他们争着要，抢着读，轮流读，轮流抄。他们说，《毛主席语录》中的每一句话都是革命的指南。"},{"type":"paragraph","text":"巴马科吉奥利巴卷烟厂有一个化验员，他从中国专家那里得到一本法文版的《毛主席语录》。他把这本红书看作是他最珍贵的东西，一有空就认真阅读。"},{"type":"paragraph","text":"有一天，他下班回家后就读起来。他父亲回家时轻轻地走进屋，不声不响地走到他的背后，想看看儿子到底读什么。这位化验员正在专心致志地低声念着他平时最爱讲的一条毛主席语录：“我们是战争消灭论者，我们是不要战争的；但是只能经过战争去消灭战争，不要枪杆子必须拿起枪杆子。”老人一看他儿子读的是《毛主席语录》，高兴地伸手就抢了去。原来这位老人也非常热爱毛主席和毛主席著作。这时候，儿子坚持要先读，父亲也坚持要先读，父子两人热爱毛主席和毛泽东思想的感情不分高低。两人争执不下，最后商量决定轮流着读。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90d108503e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
