tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"正确认识自己提高破私立公的自觉性——沈阳部队学习毛主席著作积极分子座谈破私立公改造世界观的体会","authors":[],"parts":[{"type":"paragraph","text":"编者按：破私立公，改造世界观，是目前全军干部战士活学活用毛主席著作，在用字上狠下功夫的中心。热烈响应林彪同志的号召，把活学活用毛主席著作的群众运动提高到一个新的阶段，对每个革命者来说，归根到底，也就是要求大破私字，大立公字，向共产主义的精神世界阔步前进。"},{"type":"paragraph","text":"破私立公从哪里着手？最近，沈阳部队学习毛主席著作积极分子陈金元、廖初江、郅顺义、曹惠臣、陈作石、王道明、李新贵、唐泽新等同志，在一次座谈会上交流了这方面的心得体会。他们的经验是：破私立公，首先不是会不会的问题，而是愿不愿、敢不敢的问题。每个革命者一定要提高自觉性，要敢字当头。要用毛泽东思想武装头脑，深刻地认识社会主义革命的新时代；正确地认识和估计自己；认识和掌握思想领域中公私斗争的规律性，针锋相对地进行破私立公的斗争。"},{"type":"paragraph","text":"陈金元等同志活学活用毛主席著作破私立公、改造世界观的体会很好，对我们很有启发。我们准备把他们在这个座谈会上的发言，陆续介绍给读者。今天发表的是第二部分。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37ac24db45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
