art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠抓“用”字狠斗“私”字七连在党的“九大”鼓舞下掀起活学活用毛泽东思想新高潮","authors":[],"parts":[{"type":"paragraph","text":"本报讯 八○九五部队七连干部战士满怀无限忠于毛主席、无限忠于毛泽东思想、无限忠于毛主席革命路线的深厚无产阶级感情，在党的“九大”召开的大喜日子里，掀起了活学活用毛泽东思想的新高潮。他们遵照林副主席“学习毛主席著作，要带着问题学，活学活用，学用结合，急用先学，立竿见影，在‘用’字上狠下功夫”的指示，在学习中，狠抓了一个“用”字，狠斗了一个“私”字。"},{"type":"paragraph","text":"无产阶级文化大革命以来，七连的同志们带着两条路线斗争中的问题，活学活用毛主席著作，在“三支”“两军”中作出了贡献。但是，随着斗、批、改运动的不断深入发展，头脑里公和私的斗争越来越接近“二百米”地段，一些同志由于自觉革命的精神不强，学习毛主席著作在“用”字上下功夫做得不够：用于工作上还可以，用于思想改造不够；用于一般问题还可以，用于狠触灵魂就不够；用于小是小非还可以，用于大是大非问题不够。"},{"type":"paragraph","text":"在“九大”胜利召开的特大喜讯鼓舞下，七连针对这种情况，以学习毛主席著作“怎样才能用得好”为题，开办了毛泽东思想学习班。大家学习了毛主席关于大兴党的三大作风的教导。一致认为：活学活用毛主席著作，用于工作上和思想改造上，首先要把功夫下在思想改造上；只有自觉在灵魂深处爆发革命，才算得学得好，用得活。"},{"type":"paragraph","text":"有的同志活学活用毛主席著作解决个人思想问题，有“道理也懂，关键时刻想不通”的毛病。大家学习了毛主席关于“有些人读了一些马克思主义的书，自以为有学问了，但是并没有读进去，并没有在头脑里生根，不会应用，阶级感情还是旧的”的教导，认识到：所谓道理懂关键时刻想不通，实际上并没有真正学懂；道理懂，遇到实际问题也能行得通，才是真正学懂了。道理懂，遇到实际问题想不通，一个重要的原因就在于头脑里有一个隐藏得很深的“私”字没有挖出来。“私”字是落实毛主席最新指示的大敌。只有狠斗“私”字，才能正确理解并自觉地执行和捍卫毛主席革命路线，才能紧密地结合斗、批、改的形势，结合两条路线斗争的实际，学得懂，记得牢，用得活。班长王春海的哥哥原是一位中学教师，毛主席发出“知识青年到农村去，接受贫下中农的再教育，很有必要”的最新指示后，来信提了许多理由不愿到农村去。开始王春海想，哥哥上了一二十年学，刚有工作，现在到农村去的确有点可惜。但他想到这是毛主席的伟大号召，自己应该坚决执行。他认真学习了毛主席的最新指示，狠狠批判了大叛徒刘少奇的“读书做官论”，三次写信教育帮助哥哥提高觉悟，使他哥哥愉快地到了农村。"},{"type":"paragraph","text":"七连党支部大抓革命好学风，狠抓一个“用”字，有力地推动了全连活学活用毛泽东思想群众运动的新高潮，推动了毛主席一系列最新指示的落实。同志们以林副主席为榜样，学了就用，说了就做，在思想战线上不但能打“高射炮”，也能甩“手榴弹”，进行面对面拚刺刀。他们决心以活学活用毛泽东思想的新成绩，向党的“九大”献礼！向伟大领袖毛主席敬献忠心！"},{"type":"paragraph","text":"（八○九五部队报道组）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5162307329"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
