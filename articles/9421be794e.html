学院","雷达报"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"共产党垄断了市场","type":"title"},{"text":"西南农学院雷达报","type":"authors"},{"text":"[编者按：这篇文章是从西南农学院雷达报第二期上摘出来的，雷达报是一个右派报纸，所有的文章都不署名、作者、编者都不详。]","type":"paragraph"},{"text":"党的长期共存、互相监督的方针提出后，从党的中央直到基层组织都没有真正贯彻这个政策。暂不说非党人，大的有职有权，而独论民主党派的组织发展。如果组织发展的对象是“市场”的话，那末这个市场就被共产党垄断了，而使民主党派没有发展余地。事实说明西农民主党派也不仅在教师中个别的发展，在同学中根本没有发展，这是受到某些条件限制的结果。由此可见，这个方针仅是口号，我国某些民主党派，如民主促进会，仅有二三万成员，如果说党的消灭要五十年的话，如果这个党的最年青的成员是廿五岁的话，那末这个组织将因不能发展组织而首先“自取灭亡”，这能象毛主席说的那样“不求同年同月同日生，但求同年同月同日死”，危险！我看不行。","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第一集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9421be794e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
