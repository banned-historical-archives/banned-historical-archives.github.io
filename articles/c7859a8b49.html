展业务","authors":[],"dates":[{"year":1950,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　民主妇联生产事业委员会主办的‘妇女消费合作总社’，自去年十月成立以来，通过家庭妇联及各妇女团体，先后成立了沪中区、金家巷、常熟区、静安区、北虹区、沪东区、沪南区、沪西区、女青年会、妇女生产教育社、职业妇女会等十一区分社，发展了妇女社员七千多人，廉价供应社员及非社员的家庭妇女，米煤油盐糖纸等日用必需品，根据统计一至三月份营业收入四亿六千四百多万元，减少中间剥削二千六百多万元。妇女消费合作总社为着纪念红五月，发动了红旗竞赛，希望大量吸收社员，开展业务；竞赛目标规定为(一)广泛成立支社及里弄站，发展二千个社员，(二)巩固与组织社员小组，(三)创造适合于社员群众需要的业务方式，(四)加速资金周转率等，为着加强宣教工作，每星期三两日，下午七时半至七时三刻由各区分社轮流在人民电台广播合作社节目，并出动秧歌队、腰鼓队、业务流动车等深入里弄扩大宣传。昨日下午二时假文艺处礼堂，举行工作汇报并欢迎全国民主妇联常委兼生产部部长罗淑章同志，到各区分社代表五十多人，王辛南担任主席，各区分社代表相继报告工作情况和工作中的困难、优点、缺点后，王辛南作总结，说明了社务发达社员多、能走群众路线的几个分社，业务也随之蒸蒸日上。并说明社里的工作人员完全义务职，这种忘我的精神是值得表扬的。最后由罗淑章大姊讲话，她指出搞合作事业的姊妹应加强学习，社务与业务应结合起来，消费的合作社将来应走上生产合作社的这路。罗大姊这次来沪，负责调查研究上海妇女工作的情况，为八月间召开的城市妇女工作会议搜集资料。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7859a8b49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
