<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海国棉三厂原是本市纺织系统中著名的　“老大难”　厂，　今年二月份还经　常发生武斗。　但是，　在毛泽东思想光辉的照耀下，　两派实现了革命大联合，　全　厂呈现一片新气象　——革命形势好生产面貌新","authors":[],"dates":[{"year":1968,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海国棉三厂是本市纺织系统中著名的“老大难”厂，直到今年二月份还经常发生武斗。厂内两大派一度发展到各走各的门，各走各的路。但是，在毛泽东思想阳光照耀下，在解放军支左人员的帮助下，终于从思想上消除了势不两立的情绪，实现了革命大联合，出现“抓革命，促生产”的新高潮。"},{"type":"paragraph","text":"这里，讲一讲全厂“闻名”的细纱车间的故事。"},{"type":"paragraph","text":"去年七月份，厂内发生武斗，一派离开工厂，一派留在厂里。细纱间留下的一派人员集中起来，根据产品规格需要，开了车间南边的机台。这些机台，本来是离厂的那派同志做的。不久，离厂的同志回车间后，仍旧要做自己的车，这下矛盾可尖锐了。这派说:“你们抢过去的车可以还了。”那派听到一个“抢”字，就气炸了，没好气地说:“你们逍遥，我们挑担!我们把车做熟了，你们又想吃现成饭，没那么便当。”"},{"type":"paragraph","text":"于是，车间里出现了怪现象:少数机台开着，多数机台关着。部分车上有两套人马，双方听不进对方的半句话，一碰就关起车吵架。也严重地影响了全厂。"},{"type":"paragraph","text":"今年五月上旬，在中国人民解放军和纺管局革委会同志的帮助下，举办了干部、造反队头头和其他群众代表“三结合”的毛泽东思想学习班，在学习班里，许多同志自觉地开展了回忆对比和自我批评，顿时出现了新面貌。双方头头在斗私批修的会上表示要共同抓好革命，促好生产。头头和干部的思想通了，群众的思想也通了。"},{"type":"paragraph","text":"思想一通，立即行动。乙班的同志回到车间不但互相让车，而且主动扩台扩锭，加车速，开出全部机台。一马当先，万马奔腾，其他班看到乙班跑在前面了，不甘心落后，也以只争朝夕的精神，自觉扩台扩锭，加车速。革命干劲发挥了，不仅使整个细纱间的机台都运转了起来，而且派出人员支援兄弟车间。各车间都出现了比、学、赶、帮、超的生产新高潮，生产指标直线上升。五月份的细纱产量，比原计划超额完成七十九件。细纱车间的“老大难”问题解决了，立即推动了全厂，出现革命和生产的新气象。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4deaa95cc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
