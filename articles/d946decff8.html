script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝民族政治联合委员会发表声明  谴责万象方面军队进攻爱国力量控制区  执行协定中央联委会各爱国力量方面抗议万象极右派破坏停火","authors":[],"dates":[{"year":1975,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝民族政治联合委员会发表声明"},{"type":"paragraph","text":"谴责万象方面军队进攻爱国力量控制区"},{"type":"paragraph","text":"执行协定中央联委会各爱国力量方面抗议万象极右派破坏停火"},{"type":"paragraph","text":"新华社万象一九七五年四月五日电　据老挝《每日新闻》报道，老挝民族政治联合委员会四月二日发表声明，谴责万象方面军队进攻爱国力量方面控制的万象附近的富法南地区。"},{"type":"paragraph","text":"声明说，民族政治联合委员会认为，这一事件的发生是老挝国内反对和平和民族和睦分子们继续玩弄阴谋的结果，其目的在于破坏万象协定和议定书，企图推翻老挝临时民族联合政府和民族政治联合委员会。"},{"type":"paragraph","text":"声明要求临时民族联合政府采取紧急措施，立即派执行协定中央联合委员会双方代表前往现场调查事件真相；命令进攻这一地区的万象方面军队立即停止进攻并撤回原地；释放被捕群众；惩罚在这一地区制造混乱、发动进攻和镇压群众的人。"},{"type":"paragraph","text":"据报道，近两天来，万象极右派继续在富法南地区抓捕和镇压人民群众，并准备向该地区发动更大规模的进攻。万象方面已从第二军区抽调了三个营的军队前往增援该地区的万象军队，此外，还从万荣调了两个连作为预备队。执行协定中央联合委员会万象方面代表团则继续想方设法阻挠中央联合委员会双方代表前往该地区调查。"},{"type":"paragraph","text":"新华社万象电　据《巴特寮新闻》报道，老挝执行协定中央联合委员会各爱国力量方面代表团三月二十八日和二十九日，向万象方面代表团递交了两份抗议书，强烈抗议万象极右派违反停火协定，大规模进攻富法南解放区的行径。"},{"type":"paragraph","text":"三月二十八日的抗议书说，三月二十七日，万象极右派命令万象方面的军队，在飞机的掩护下，向万象市以北二十多公里的各爱国力量控制区的富法南、纳娘和丹松等地发动蚕食进攻。"},{"type":"paragraph","text":"三月二十九日的抗议书谴责万象方面向富法南地区增派军队和坦克，继续在该地区发动进攻和镇压群众。与此同时，进攻富法南地区的万象军队指挥官还无理拒绝执行协定中央联合委员会双方联合小组前往该地区进行调查。"},{"type":"paragraph","text":"三月二十九日，执行协定中央联合委员会各爱国力量方面代表团发言人炮·本纳蓬对记者发表讲话时指出，万象方面的这一罪恶行径是蓄谋已久的行动，其目的不仅企图夺取各爱国力量方面控制的一些地区，而且妄图在万象市周围制造紧张局势，威胁中立化城市，直接向临时民族联合政府施加压力。"},{"type":"paragraph","text":"他说，万象方面必须立即停止上述行动并立即撤回进攻该地区的军队。如果万象方面不愿停止上述进攻行动，各爱国力量将采取一切措施，保卫自己的控制区、严厉惩罚反动军队，万象方面必须对由此产生的一切严重后果负全部责任。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d946decff8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
