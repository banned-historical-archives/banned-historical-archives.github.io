中国人民在社会主义革命和社会主义建设中作出了伟大贡献","authors":[],"dates":[{"year":1969,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本文化界人士热情赞扬我党“九大”纪录影片"},{"type":"paragraph","text":"“九大”反映了文化大革命的伟大胜利"},{"type":"paragraph","text":"中国人民在社会主义革命和社会主义建设中作出了伟大贡献"},{"type":"paragraph","text":"新华社五日讯　东京消息：日中文化交流协会三日举行“中国电影会”，四百多位文化界和有关方面的日本朋友观看了中国大型彩色文献纪录影片《中国共产党第九次全国代表大会》。许多观众对他们从影片中看到中国人民的伟大领袖毛主席的光辉形象，感到无限喜悦和幸福。他们热情赞扬中国共产党第九次全国代表大会是团结的大会，胜利的大会。"},{"type":"paragraph","text":"一位日本朋友说：“今天，我第一次在影片中看到毛主席的伟大形象，听到毛主席的伟大声音，感到非常亲切，非常幸福。”有的日本朋友说：“看到伟大领袖毛主席神采奕奕，精力充沛，身体非常健康，感到无限喜悦。”"},{"type":"paragraph","text":"日本朋友满怀激情地赞扬中国无产阶级文化大革命的胜利和中国共产党第九次全国代表大会的胜利。他们说：“从影片中看到了身经百战的老革命家和经过无产阶级文化大革命锻炼和考验的新战士聚集在一堂，充分说明了中国无产阶级文化大革命取得的伟大胜利，说明了‘九大’是团结的大会，胜利的大会”。"},{"type":"paragraph","text":"一位大学讲师对有许多女共产党员代表出席了这次代表大会，对毛主席同她们热烈握手，表示深受感动。"},{"type":"paragraph","text":"许多日本朋友还赞扬了中国人民在中国社会主义革命和社会主义建设中作出的伟大贡献。"},{"type":"paragraph","text":"在这次电影会上，日本朋友还观看了《新沙皇的反华暴行》纪录影片。许多日本朋友义愤填膺地强烈谴责苏修社会帝国主义对中国进行武装挑衅的罪行，并热情赞扬中国人民一不怕苦，二不怕死的革命精神。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78f571b74e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
