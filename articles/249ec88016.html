<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西省富农和坏分子破坏夏征和粮食统购工作","authors":[],"dates":[{"year":1954,"month":8,"day":26}],"is_range_date":false,"parts":[{"text":"广西省富农和坏分子破坏夏征和粮食统购工作","type":"title"},{"text":"【广西分社8月26日讯】广西省自7月底到8月初在全省两季稻产区进行夏征和统购工作以来，各地不断发现富农及坏分子进行破坏活动，其活动方法如下：","type":"paragraph"},{"text":"（一）行凶暗杀、殴打干部。钦县十三区新塘乡乡长于8月8日晚上带一支步枪到区政府去开会，途中被人暗杀。7月29日合浦县六塘乡有一坏分子手持大刀潜入副乡长家，企图行凶，被发现后逃去。","type":"paragraph"},{"text":"（二）放火、造谣、散反动传单。7月29日晚上，合浦县境内由南康坡塘乡到北海市的大桥，被特务放火焚烧，经群众发现后扑灭。自干部进入农村开始进行随征带购工作以后，防城、灵山、合浦、北流、陆川、贵县、博白等县都先后发现有很多谣言。如：“美国打到海南岛啦，国民党要回来啦，世界乱啦”！“蒋介石要回来了，六万大山有很多国民党军队；国民党回来后，田要重分，乡长要重选，积极拥护共产党的人要杀头。”8月7日，钦县新塘乡供销合作社门市部房内发现反动传单七张。藤县第五区区政府门上也曾发现张贴有反动标语。有些地区的农民受谣言影响，有些恐慌，不愿卖粮。贵县小庄乡乡干部和代表听到谣言后，思想有顾虑，有的说：随征带购，自己的任务可完成，全乡的任务恐完不成。","type":"paragraph"},{"text":"（三）挑拨群众与政府之间的关系。博白县一区新石乡富农梁十六对农民群众说：“不要种这样多的田，不管生产多少都是政府的。”浦北县八区乐民乡富农杨球富（曾参加土匪经劳改释放），不但自己不交粮，并组织其他5户（其中4户是富农）不交粮。郁林县石南镇7月下旬有两墟群众买不到猪肉，坏分子煽动一百多人向区府请愿。","type":"paragraph"},{"text":"（四）富农装穷叫苦，顽固抵赖，公开对抗夏征和统购工作。北流县十四区西山乡富农黄德基在分配任务时说：“卖粮没有，征粮也没有，要坐监我就去”，并自动投监（释放后已交粮）。一区高车乡富农覃德贤逃跑了，民兵到他家中去催粮时，覃的小老婆大声喊“贼抢粮”，用石头打民兵，并且诬民兵强奸她。郁林县二区绿罗乡香山村召开富农会议，11户富农，只有1户到会。","type":"paragraph"},{"text":"以上情况，已引起当地党、政、公安部门的注意，对部分顽固富农及其他坏分子已予以惩处或批评教育。钦县并在购粮工作中破获了潜伏股匪黄殿昌等11人，搜出长短枪两支，子弹、手榴弹及赃物一部。","type":"paragraph"},{"text":" （陈蓬生根据省财委粮食工作指挥部材料整理）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年9月8日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"249ec88016"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
