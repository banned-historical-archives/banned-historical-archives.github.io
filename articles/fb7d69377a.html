script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"霍查谈国际形势和反修正主义","authors":[],"dates":[{"year":1960,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"霍查谈国际形势和反修正主义"},{"type":"paragraph","text":"现代修正主义者的假面具遮掩不了他们反共产主义的恶毒本质"},{"type":"paragraph","text":"为了保卫和平应当使我们在任何时候都比和平的敌人更加强大"},{"type":"paragraph","text":"新华社地拉那11日电　阿尔巴尼亚劳动党中央委员会第一书记霍查，9日在地拉那接见阿尔巴尼亚各地的妇女代表时，对她们谈到了当前国际形势、争取和平的斗争以及反对现代修正主义等问题。"},{"type":"paragraph","text":"在谈到国际问题时，霍查着重谈到了苏联的和平外交政策以及苏联对阿尔巴尼亚和对亚非民族独立国家的援助。霍查说，苏联以国际主义精神对待所有的人民民主国家和世界上所有已经和正在从帝国主义桎梏下解放出来的国家。霍查说，亚非各民族独立国家的人民接连几个世纪生活在嗜血成性的帝国主义和殖民主义的统治下，所以他们决不会忘记帝国主义是他们的主要敌人，正像我国人民不能忘记过去的封建主义和今天的帝国主义是我们的头号敌人一样。霍查指出，亚非民族独立国家的人民是反对帝国主义和殖民主义的，他们和其他各国人民一起越来越多地站在强大的和平力量这一边了。"},{"type":"paragraph","text":"霍查接着说，阿尔巴尼亚同苏联和所有其他人民民主国家非常紧密地连系在一起，在政治、思想、经济方面，在反对帝国主义战争贩子和反对现代修正主义、特别是反对社会主义阵营和国际共产主义运动的死敌——南斯拉夫修正主义的斗争中，我们彼此都是完全一致的。尽管现代修正主义者戴着假面具，尽管他们竭力企图遮掩修正主义的面目，但是，他们遮掩不了反共产主义的恶毒本质。"},{"type":"paragraph","text":"霍查说，以苏联共产党为榜样的阿尔巴尼亚劳动党曾经并将继续为反对马克思列宁主义的敌人而进行不屈不挠的斗争，这是有利于阿尔巴尼亚和整个社会主义阵营的。所以，我们对修正主义的伎俩和目的应该永远保持警惕。"},{"type":"paragraph","text":"霍查说，现代修正主义者并没有改变他们的目的，他们只能改变一下策略而已。但是，我们各国马克思列宁主义政党不会被这些策略所蒙骗，它们在反对共产主义的敌人方面有着丰富的战斗经验，懂得如何反对和揭露形形色色的修正主义者的敌对活动。"},{"type":"paragraph","text":"在谈到争取和平的问题时，霍查说，我们应当竭尽全力为保卫和平而斗争。为此，我们应当努力工作，使我们在任何时候、在各个方面都比和平的敌人更加强大。为了使我们强大，我们就必须尽一切可能巩固我们国家的政治和经济地位。我国所有男女应尽一切力量来劳动，来最大限度地提高劳动生产率。这对加强和平反对战争就是一个具体的有效的帮助。霍查同时强调指出，为了保卫和平，还应当对国内外敌人提高警惕。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb7d69377a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
