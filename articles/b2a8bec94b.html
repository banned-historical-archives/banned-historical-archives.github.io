":1984,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“废品”文化户"},{"type":"paragraph","text":"在河北省廊坊市新近召开的一次文化户经验交流会上，出席的代表中，竟有一个“废品”文化户。"},{"type":"paragraph","text":"这个人叫王乃斌，家住廊坊市码头镇，1981年秋开始收购废旧报纸、古旧书刊。三年来，他转遍方圆百里的二百多个村庄、廊坊市内大小四十多个单位，在约二万五千多斤的“废品”堆里，先后筛选出《论语》、《孟子》、《诗经》、《中庸》四部清代雍正年间的木板本书，两部清代光绪时的木板本和解放初期出版的带有彩图的《本草纲目》、美国出版的一套十二册《石矿杂志》等珍贵书刊。还收集了从1949年以后的《人民日报》、《解放军报》、《文汇报》和《大公报》约三千多斤，送到了北京市西单报纸装订储藏资料室。王乃斌激动地说：“收废品并不是简单地拾破烂，而是一项有意义的工作，干这个工作照样能为国家和人民做贡献！”"},{"type":"paragraph","text":"李文革"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2a8bec94b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
