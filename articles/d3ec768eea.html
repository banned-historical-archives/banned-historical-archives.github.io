导人强烈谴责苏修对中国进行武装挑衅","authors":[],"dates":[{"year":1969,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"介绍中国建设辉煌成就和文化大革命伟大胜利"},{"type":"paragraph","text":"日本福冈市举办“中国展览会”"},{"type":"paragraph","text":"展览会领导人强烈谴责苏修对中国进行武装挑衅"},{"type":"paragraph","text":"新华社十日讯　东京消息：由日本朋友举办的一个“中国展览会”，九日在福冈市隆重开幕。"},{"type":"paragraph","text":"展览会以大量图片，介绍了中国人民在伟大领袖毛主席的英明领导下，近半个世纪以来在中国革命和建设上所取得的辉煌成就，介绍了中国无产阶级文化大革命和中国共产党第九次全国代表大会的光辉胜利。"},{"type":"paragraph","text":"这次展览会是日本朋友为庆祝中华人民共和国成立二十周年而举办的。"},{"type":"paragraph","text":"展览会会场中央高悬着中国人民的伟大领袖毛主席的巨幅画像和"},{"type":"paragraph","text":"“毛泽东思想万岁！”的横幅标语。会场上还陈列着毛主席的光辉著作和中国共产党第九次全国代表大会文件汇编。"},{"type":"paragraph","text":"福冈中国展览会实行委员会委员长柏木正一在开幕词中，强烈谴责苏修社会帝国主义对中国进行武装挑衅。他指出，这是走投无路的苏修社会帝国主义的垂死挣扎。"},{"type":"paragraph","text":"日中友好协会（正统）中央总部理事长宫崎世民也在开幕式上讲了话。他强烈谴责美帝、苏修、日本反动派和宫本修正主义叛徒集团互相勾结，狼狈为奸的反华、反共、反革命罪行。"},{"type":"paragraph","text":"展览会上放映了大型彩色文献纪录影片《中国共产党第九次全国代表大会》。日本剧团“齿轮座”还表演了《大海航行靠舵手》、《万岁！毛主席》等革命歌舞，受到了广大观众的热烈欢迎。"},{"type":"paragraph","text":"当天晚上，日本朋友举行盛大晚会，热烈庆祝中华人民共和国成立二十周年。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3ec768eea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
