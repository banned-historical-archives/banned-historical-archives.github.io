<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一个特务剧作的黑标本——评张春桥的反动剧本《秀兰》","authors":["俊绪"],"dates":[{"year":1977,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"俊绪"},{"type":"paragraph","text":"利用文艺进行反革命活动，是老牌特务张春桥的专长。他在三十年代初期窜到上海后，就一头栽进军统文化特务崔万秋的怀抱，在各种反动报刊上炮制了大量反革命黑文，扶蒋反共，参与文化“围剿”，为国民党反动派效劳。一九三五年三月，他在《女青年月刊》上发表的独幕剧本《秀兰》，是他从戏剧领域向革命打的第一发冷枪。"},{"type":"paragraph","text":"《秀兰》是一个为国民党反动政府歌功颂德、丑化污蔑贫苦农民、鼓吹逃避现实阶级斗争的剧本。它的故事情节是:一对贫苦农民，因旱灾歉收，苛税繁重，无法活口，把仅有的一个女儿卖给了邻村富户作童养媳，女儿不堪凌虐逃回家中，于是被张春桥鄙夷地称作“乡下男人”的那个贫苦农民便大发怨天尤人之慨，强令女儿回去，最后决定全家出去逃荒。剧本的恶毒之处在于，它以关心农民疾苦为幌子，配合国民党反动派的军事“围剿”，从文化战线打开缺口，用戏剧武器进行反动宣传，从内部瓦解无产阶级革命运动。"},{"type":"paragraph","text":"出身于官僚地主家庭的张春桥，怎么会忽然“同情”起农民的不幸遭遇来了呢?这里有他反革命的特殊意图。当时，中国工农红军举行的二万五千里长征，在广大农村地区不断播下革命的火种。郁积在农民心中的深仇大恨正象火山一样开始迸出来。在这种形势下，张春桥急忙抛出《秀兰》，完全表现出这个国民党特务分子对无产阶级革命事业的拼死对抗。"},{"type":"paragraph","text":"在剧本中，张春桥对农民进行了恶毒的歪曲和诽谤，把他们写成浑浑噩噩、奴性十足、逆来顺受的群氓。面对水深火热的苦难生活，他们一会儿“千不怪，万不怪，就怪去年的水灾”，一会儿又哀叹“我们是天生的苦命人呵!”一看到具有官吏形相的人，他们就吓作一团，口称“老爷”，恭而不违。这里，造成农民深重灾难的深刻社会根源被一笔勾销了，那“债务丛集，如牛负重”的贫苦农民迫切要求变更现状的革命性被一笔勾销了，他们在中国共产党领导下展开的如火如荼的革命斗争被一笔勾销了。张春桥歪曲现实，突出渲染农民的愚昧落后，目的就是为了宣传国民党反动统治的“天生”合理性。"},{"type":"paragraph","text":"一面狂热宣扬农民不想革命、不敢革命，一面又大肆鼓吹农民不应该革命、不需要革命。为此目的，张春桥在剧本中对国民党反动政府作了尽情的美化和无耻的吹捧。他假造了一个“新闻记者”作为自己的化身，在听了贫苦农民的申诉后竟然激愤地说:“这真是太岂有此理了!国民政府不是早已下了废除苛捐杂税的命令，怎么你们的县长还不遵行呢?”那“愤然以拳击桌”的丑态，活画出了张春桥那副假革命、真反革命的伪善嘴脸。这句话全盘推翻了官僚地主政权残酷压迫剥削农民的血腥历史，根本否定了国民党反动统治的罪恶。张春桥要把农民引向哪里?第一，国民党反动政府是能够体恤民众疾苦、完全可以信赖的好政府，理该热忱拥护，无须起来推翻；第二，农民悲苦之起因乃由于地方官吏没有“遵行”政府的命令，解救之法，自当彻底“遵行”才是；第三，这样“岂有此理”的“县长”只是极少数，其它地方均已“遵行”了，此处之不遵行就更为“理”“法”所不容。经过张春桥的精心装饰，国民党反动政府就完全成了劳动人民自己的政府，农民的贫苦更反衬了政府的廉洁持平。幸福有恃，光明在望，压迫者和被压迫者之间居然有着如此共通之“理”，哪里还需要起来革命造反!对劳动人民的丑化污蔑和对国民党反动统治的粉饰美化相联合璧，相得益彰，突出揭示了剧本的扶蒋反革命的主题。"},{"type":"paragraph","text":"在《秀兰》这个剧本中，张春桥捡起托派取消主义的破烂，凶狂反对正在兴起的无产阶级革命思想的传播。逃荒是一个逃避现实阶级斗争的阴险结局。“逃荒去!”“逃”到那能够“遵行”“国民政府……的命令”的地方去!在张春桥笔下，这地方简直是“没有这许多捐”的理想天国。可见，名曰“逃荒”，实际是消除人们的革命意志，向国民党反动政府屈膝投靠，从而扑灭日益炽烈的革命斗争火焰。"},{"type":"paragraph","text":"据张春桥所写剧本题记，《秀兰》是他根据国民党政府某要员赴西北的“视察记”而作。这就说明，特务张春桥当年与国民党反动政府早有勾结。国民党反动派政治上吹号，张春桥用文艺从旁帮腔。不过，张春桥的剧本却比“视察记”之类官方语言更迂回曲折，他采用了特务的手法，深寓恶毒的意图于“为民请命”的伪善嘴脸之中。从这方面看，《秀兰》确实能照见张春桥这个老牌特务一贯反动、虚伪、狡诈的阶级本性。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e0b066aae"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
