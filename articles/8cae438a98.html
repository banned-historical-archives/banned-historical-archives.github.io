art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总政号召认真学习毛主席文献","authors":[],"parts":[{"type":"paragraph","text":"本报4日讯 今晚，总政治部召开电话会议，布置学习毛主席论纸老虎的重要文献。会上，总政治部刘志坚副主任首先讲话。他说：人民日报最近发表的“毛泽东同志论帝国主义和一切反动派都是纸老虎”是一个很重要的文献，部队要认真地组织学习。正像人民日报编者按语所说：怎样认识革命力量和反动力量的问题，在中国，在世界范围内，都还是一个大问题，有许多人总是不得解决。既是大问题，又没有解决，就必须解决它。认真学习毛主席这个重要文献，就可以解决这个问题，就可以进一步长自己的志气，灭敌人的威风。这是又一次思想解放。刘副主任指示各部队立即组织一些人进行讲解，组织大家讨论和阅读报纸上有关的章。在学习这个文献的同时，还应当学习国防部彭德怀部长两次告台湾同胞书和国防部对福建前线部队的两个命令等文件。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cae438a98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
