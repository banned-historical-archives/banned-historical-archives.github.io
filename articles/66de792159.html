art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"跟着毛主席从胜利走向胜利","authors":["红军老战士/军分区司令员刘绍堂"],"parts":[{"type":"paragraph","text":"当我听到我们伟大的统帅毛主席穿上军装，容光焕发，登上天安门检阅百万革命群众的时候，心情万分激动。毛主席穿上军装，这是对我们革命战士的极大鼓舞，极大关怀，极大支持，我们感到无上光荣。"},{"type":"paragraph","text":"我第一次见到毛主席是在长征途中的川西北草地。那时，毛主席穿着一身灰军装，鲜红的领章闪闪发光。见到了毛主席，我们浑身增加了无穷的力量。在毛主席的领导下，我们翻雪山、过草地，战胜了无数艰难险阻，胜利到达延安。抗日战争和解放战争时期，我们执行着最高统帅毛主席的命令，踏遍千山万水，英勇奋战，从胜利走向胜利，赶走了日本帝国主义，推倒了“三座大山”，解放了全中国。社会主义建设时期，我们遵循着毛主席的指示，在革命化的道路上大步前进。"},{"type":"paragraph","text":"今天，毛主席又穿上军装，检阅百万革命大军，这使我仿佛又回到了长征途中，仿佛又回到了延安，感到格外亲切。毛主席，我们的伟大导师、伟大领袖、伟大统帅、伟大舵手，又在领导我们进行新的长征，向着彻底摧毁一切旧思想、旧文化、旧风俗、旧习惯，彻底打碎一切剥削压迫制度的全人类的解放大进军。"},{"type":"paragraph","text":"毛主席穿上军装，是对我们最大的鼓舞，也是最有力的鞭策，大大增强了我们把无产阶级文化大革命、把社会主义革命进行到底的决心和信心。"},{"type":"paragraph","text":"我们一定更高地举起毛泽东思想的伟大红旗，永远跟着毛主席闹革命！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66de792159"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
