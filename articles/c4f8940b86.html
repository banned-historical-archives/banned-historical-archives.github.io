<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"国务院批转国家建委、外贸部关于接待资本主义国家技术人员工作中一些问题和意见的报告的通知","authors":[],"dates":[{"year":1975,"month":9,"day":29}],"is_range_date":false,"parts":[{"text":"国务院批转国家建委、外贸部关于接待资本主义国家技术人员工作中一些问题和意见的报告的通知","type":"title"},{"text":"1972年以来，我国从资本主义国家进口了一些成套设备，并和有关厂商先后签订了聘请技术人员议定书和合同附件。我们认为，应当认真做好这些人员的接待工作，以保证引进成套设备项目胜利建成投产，并增进同这些国家人民的友谊。","type":"paragraph"},{"text":"两年来，有关单位在接待外国技术人员方面，做了许多工作，取得很大成绩。但也存在不少问题。主要是：有的单位不能正确对待外国技术人员的建议和意见，把采纳外国技术人员的合理建议，说成是“崇洋迷外”，造成一些人员顾虑重重，怕犯错误。另外，由于社会制度和生活习惯不同，有的国家对我已经规定的外国技术人员住房及内部设施的标准，提出了一些意见和要求，希望我改善其来华技术人员的工作和生活条件。","type":"paragraph"},{"text":"为了做好接待外国技术人员的工作，我们会同有关部共同研究拟定了以下办法：","type":"paragraph"},{"text":"一、关于国际电话、电报和通信问题。应按照邮电部有关规定执行。新建电路所需投资和统配材料由国家计委安排，邮电专用设备由邮电部解决。工程设计和施工由所在省、市邮电部门负责。新增的营业点和电路的维护工作，划归地方邮电部门管理。所需新增人员，由所在省、市劳动部门解决。","type":"paragraph"},{"text":"二、关于外国技术人员在现场的活动范围问题。在确保国家安全的前提下，应适当扩大外国技术人员的活动范围。在开放城市可以划得大一些，在非开放城市和附近有国防设施的地区要划得小一些。距厂区较远的名胜古迹和风景区划入活动范围后，要划定旅行通道。在通道两侧和活动区域附近的军事单位，要采取防范措施。禁区周围要树立禁止外国人通行的标志。","type":"paragraph"},{"text":"三、关于驻华使馆人员赴施工现场问题。驻华使馆人员提出去施工现场探望他们的技术人员时，应区别不同情况处理。要求前往开放城市的，原则上均可同意。非开放的城市和地区，一般不予同意。如技术人员在现场发生严重工伤事故、死亡或其他重要问题，需使馆人员前去处理的，作为特殊情况，可予同意。驻华使节或商务参赞以上使馆主要外交官员要求前往探望，而所在地点在我安全、交通及接待安排上又无大困难的，可酌情同意。具体办法应根据外交部的规定办理。","type":"paragraph"},{"text":"四、关于商品（包括副食品）供应问题。各有关省市商业部门要切实做好安排，保证供应。商品价格和服务收费，应参照当地市场价格，优质优价。具体定价，由当地商业部门向有关单位提出意见，报省市主管部门批准执行。对所需的特殊商品，地方上解决不了的，报请商业部调剂解决。属于外贸商品，由外贸部负责解决。","type":"paragraph"},{"text":"五、关于住房标准、子女入学和休假等问题。住房标准按一人一间安排，附有卫生间。携带家属的，住房数可适当增加。现场总代表携带家属的，可以提供三间。如他们提出自炊要求，根据具体条件，可以提供自炊使用的厨房，炊具由他们自备。执行所均应安装暖气设备，气候炎热地区，他们可自备空调设备，我方提供安装条件，并可免税进出我国境。施工现场所在学校不具备外籍儿童入学条件的，可允许外国厂商自费派适当数量的教师来华，我方提供招待所内的会议室、电影室、游艺室等，作为临时教室，并提供必要的设施。休假除按合同规定执行外，未带家属的外国技术人员，如提出要求，在不影响工作的情况下，经现场双方总代表商定，半年内可允其自费休假一次（休假期间停发工资和生活津贴费）或家属自费来华短期探亲一次。享受休假的不能在同一期间又享受家属探亲。家属来华时间，一般应安排在外国技术人员来现场的人数进入高峰以前或以后，休假者的出入境手续，由当地公安部门办理。","type":"paragraph"},{"text":"六、关于招待所管理及交通工具问题。接待外国技术人员的招待所，必须加强管理。要搞好招待所的室内清洁卫生和饮食卫生，办好食堂，做好各项服务工作。收费要合理。为保证外国技术人员的安全和有利于我方管理，他们需要使用的车辆，由我方提供，不要他们自带交通工具。这些车辆要集中管理，统一调配，不得挪用。距离城市较远的施工现场，为便于他们进城购买日常用品，每月可由我方免费提供班车两次，他们如私事用车，可按北京市出租车收费标准减半收费，但只限于现场提供的车辆。","type":"paragraph"},{"text":"以上报告，如无不妥，请批转各有关地区和部门执行。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4f8940b86"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
