:[],"dates":[{"year":1967,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛泽东思想指引下闯出崭新道路"},{"type":"paragraph","text":"我国制成第一台自动化立体摄影机"},{"type":"paragraph","text":"立体摄影可以逼真地表现出实体的立体形象。它在工业、医学、新闻、文教等方面都有广泛用途"},{"type":"paragraph","text":"新华社讯　在无产阶级文化大革命的凯歌声中，我国创制成功了第一台自动化立体摄影机。这种新型摄影机的制成，是毛泽东思想的新胜利。"},{"type":"paragraph","text":"立体摄影可以逼真地表现出实体的立体形象。它在工业、医学、新闻、文教等方面都有广泛用途。"},{"type":"paragraph","text":"在无产阶级文化大革命中，上海手工业管理局的无产阶级革命派响应毛主席“抓革命，促生产”的伟大号召，决心打破资本主义国家对立体摄影器械制作技术的垄断，自己创制立体摄影机。"},{"type":"paragraph","text":"今年七月初，他们同第二轻工业部和新华社等单位的有关部门一起，组成了立体摄影技术小组，雷厉风行地投入了战斗。缺少技术资料和器材设备，试制有困难，他们就大学毛主席著作，决心在毛泽东思想的指引下闯出一条崭新的道路来。他们发扬不怕疲劳和连续作战的作风，以“只争朝夕”的革命精神，经过近三个月的艰苦努力，终于突破了技术关，创制成功了我国第一台自动化立体摄影机。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"484060b8e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
