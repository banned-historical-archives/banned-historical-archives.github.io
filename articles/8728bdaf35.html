ors":[],"dates":[{"year":1966,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻老挝经济文化代表团举行国庆招待会"},{"type":"paragraph","text":"冯沙万等颂扬我文化大革命的胜利"},{"type":"paragraph","text":"据新华社康开二日电　中国驻老挝经济文化代表团九月二十九日举行宴会，热烈庆祝中华人民共和国成立十七周年。"},{"type":"paragraph","text":"老挝爱国战线党中央代表诺哈·冯沙万和老挝爱国中立力量总指挥敦上校在会上讲话，热烈赞扬中国人民在毛泽东思想的光辉照耀下，在社会主义革命和社会主义建设中，在当前的无产阶级文化大革命中所取得的伟大胜利。"},{"type":"paragraph","text":"老挝爱国战线党中央委员会总书记、老挝民族团结政府新闻、宣传和游览大臣富米·冯维希，老挝人民解放军最高指挥部代表辛加坡将军等应邀出席了宴会。"},{"type":"paragraph","text":"越南民主共和国驻老挝经济文化代表团的代表也应邀出席了宴会。"},{"type":"paragraph","text":"新华社万象二日电　中华人民共和国驻万象大使刘春，一日晚上在中国大使馆举行招待会，热烈庆祝中华人民共和国成立十七周年。"},{"type":"paragraph","text":"出席招待会的有一百五十人，其中有万象高级官员，老挝爱国战线党驻万象代表苏·培拉西，社会知名人士和外交使节等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8728bdaf35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
