script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资本家的本能就是剥削工人","authors":["陈金福"],"dates":[{"year":1968,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇这个叛徒、内奸、工贼，早在一九二五年和一九二七年，就跪倒在国民党军阀和官僚买办资本家的脚下，干尽了出卖工人阶级利益的罪恶勾当。解放后，他百般美化资本家，胡说资本家“管理能力超过我们的共产党员……”。我们厂里的走资派根据刘少奇的黑指示，也大肆吹捧资本家是“开明”、“进步”的，在生产管理上有“贡献”，把资本家提任为副厂长，掌管全厂生产技术大权，用种种不合理的规章制度，管、卡、压我们工人，对我们工人实行资产阶级专政。资本家真的是“开明”、“进步”的吗?真的是有“才能”有“经验”的吗?这些人的所谓“才能”，就是残酷剥削、残酷压迫工人，这是剥削阶级的本能。他们的所谓“经验”，就是投机取巧，损人利己，唯利是图。如果让他们继续管理我们的工厂，我们的国家就要改变颜色，我们工人就要吃二遍苦，受二遍罪。"},{"type":"paragraph","text":"我们工人阶级坚决执行八届十二中全会公报，彻底批臭刘少奇，彻底肃清刘少奇的反革命修正主义思想，紧跟毛主席奋勇前进!"},{"type":"paragraph","text":"上海玻璃机械厂工人　陈金福"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e0fe35960"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
