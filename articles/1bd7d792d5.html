hors":[],"dates":[{"year":1950,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报广州三十一日专电】　培育华南区革命青年的南方大学，于今日下午三时半在该校举行开学典礼，到该校教职学员及首长来宾四千余人。叶剑英校长讲话中，希望大家在大锅饭菜大讲堂这个大洪炉中，锻炼一番，而成为新人，去为工农服务。该校今天红旗招展，歌声洋溢，到处贴满“横眉冷对千夫指，俯首甘为孺子牛”等标语。典礼至傍晚始毕。跟着举行游艺晚会，情况非常热烈。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bd7d792d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
