ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"在关于英国各界对我撤销出口合同的反应报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在关于英国各界对我撤销出口合同的"},{"type":"paragraph","text":"反应报告上的批语"},{"type":"paragraph","text":"（1959年2月19日）恩来、陈毅同志："},{"type":"paragraph","text":"为什么采取这种政策，是否有利，请查明告我为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十九日"},{"type":"paragraph","text":"[1]中国驻英国代办处商务参赞1959年2月14日给外贸部并外交部的这一报告说，上海土产公司与英商成交霜黄棉约2000吨，最近该公司以政府不发许可证为由撤销合同，此事已引起英国各界广泛注意和评论。我代办处在对外接触时，对类似上述问题一般不明确说明原因，亦不强调运输问题，有时适当指出贸易发展必须以政治友好为前提，对有些客户，尽量说服其接受撤销部分合约。我们认为，今后如毁约面太广，将对我政治上造成不利影响，故建议国内各公司应尽量缩小不履约的品种和客户范围，确实无法交货，亦应与对方协商解决，置之不理态度，将更会造成对方的对立情绪，采取不利于我的行动。"},{"type":"paragraph","text":"[2]陈毅，当时任国务院副总理兼外交部部长。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":2,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":226,"page_end":226},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f00c32ae9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
