讲“美国没有文化”的反映","authors":[],"dates":[{"year":1950,"month":11,"day":14}],"is_range_date":false,"parts":[{"text":"南京大专学校部份学生对陆定一同志所讲“美国没有文化”的反映","type":"title"},{"text":"【南京市委十一月十四日讯】十一月一日陆定一部长在尤金博士学术演讲会上报告后，大专学校少数学生反映：“美国没有文化”恐怕不恰当。说它的文化不好，还可以说得过去。”金女大有人说：“假如说扭秧歌、打腰鼓是文化，那么美国当然是没有文化。”金女大团副支书怀疑陆部长所说“美国没有文化”是否说错了?“我们不是说美国人民很好吗?他这样说，岂不是把美国劳动人民创造出来的文化也否定了?”当陆部长在会议上说到“美帝是个王八蛋”时，金女大两位教授退席。说到“我们要仇视美帝、鄙视美帝、蔑视美帝”时，其余两位金女大教授也全部离席。精神病院防治所某医生对我反美宣传表示反感，认为：“何必整天骂美国，亡给美国总比亡给苏联好。”","type":"paragraph"}],"comments":[],"origin":"1950年11月23日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91b2cfb374"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
