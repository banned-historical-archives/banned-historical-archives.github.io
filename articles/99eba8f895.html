script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"芜湖纺织厂革委会认真执行毛主席的干部政策  大胆使用犯过错误有了觉悟的革命干部  经过全厂革命群众充分讨论，部分干部充实到各级领导班子，其余的分别安排了适当工作，发挥了他们在斗批改中的积极作用","authors":[],"dates":[{"year":1969,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"芜湖纺织厂革委会认真执行毛主席的干部政策"},{"type":"paragraph","text":"大胆使用犯过错误有了觉悟的革命干部"},{"type":"paragraph","text":"经过全厂革命群众充分讨论，部分干部充实到各级领导班子，其余的分别安排了适当工作，发挥了他们在斗批改中的积极作用"},{"type":"paragraph","text":"新华社合肥电　安徽芜湖纺织厂革委会坚决贯彻执行毛主席的干部政策，及时解放犯错误而又有了觉悟的干部，并且大胆放手使用他们，发挥他们在斗、批、改中的积极作用，有力地推动了全厂斗、批、改的发展。"},{"type":"paragraph","text":"遵照毛主席关于“对犯错误的好人，要多做教育工作，在他们有了觉悟的时候，及时解放他们”的教导，这个厂的革委会在驻厂人民解放军支左人员的帮助下，充分发动群众，依靠群众，在进行了大量深入细致的政治思想教育工作后，已经把全厂犯了错误而又有了觉悟的干部，及时解放了出来。但是，这批干部被解放出来以后，在要不要大胆放手地使用他们的问题上，一些革命群众却产生了两种意见。一种意见认为，应当大胆放手使用他们，他们中间的一些人，还可以充实到一些三结合领导班子，担任一定的领导工作，这样可以更有利于促进全厂斗、批、改的胜利进行。另一种意见则认为这是“无关大局”。还有个别的群众担心这批干部才解放出来，在斗、批、改中不会发挥多大作用。"},{"type":"paragraph","text":"厂革委会和驻厂人民解放军支左人员，认真分析了这些不同的意见，认为必须组织大家进一步活学活用毛泽东思想，用毛泽东思想统一认识，统一政策，统一计划，统一指挥，统一行动。为此，厂革委会立即举办了以落实政策为中心的毛泽东思想学习班，组织大家反复学习毛主席关于“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好”和“必须善于使用干部”的伟大教导，用毛主席的各项无产阶级政策武装头脑。同时，狠批了叛徒、内奸、工贼刘少奇在干部问题上所推行的反革命修正主义路线，大大提高了政策水平。大家认识到：解放出来的这些干部大多数出身于工人和贫下中农家庭，不少人是从工人中提拔上来的，本质是好的，是热爱毛主席，愿意跟毛主席革命路线走的；他们在厂里当干部时间比较长，各种情况比较熟悉，又有一定的工作能力和实践斗争经验。因此，应当大胆使用这些干部，使他们在斗、批、改中发挥作用。"},{"type":"paragraph","text":"厂革委会用毛泽东思想统一了大家的认识以后，全厂革命群众经过充分讨论，大家一致同意从被解放的干部中挑选出九名充实到厂和车间两级革委会担任一定的领导工作，对其余解放出来的干部也都分别安排适当工作。这些犯错误的好干部重新担任工作以后，改变了过去脱离群众、高高在上、当官做老爷的旧作风，坚持参加生产劳动，深入调查研究，遇事和群众商量，在全厂斗、批、改运动中发挥了积极作用，受到了广大群众的好评。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99eba8f895"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
