ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于上海失守后救亡运动的方针问题的指示","alias":"","parts":[{"type":"paragraph","text":"关于上海失守后救亡运动的"},{"type":"paragraph","text":"方针问题的指示！"},{"type":"paragraph","text":"（1937年11月12日）博、潘、刘："},{"type":"paragraph","text":"甲、上海失去后，上海救亡运动必将更为困难。公开救亡团体应准备必要时转入秘密状态。党的秘密工作亦应有新的布置。严防敌人的突然袭击。"},{"type":"paragraph","text":"乙、上海失去后，救亡运动中心将转移至武汉。因此党的与非党的干部，亦应重新分配。一部分应去武汉，一部分去战区，一部分环境较好的仍留下。工作方式应召（有）必要的转变。"},{"type":"paragraph","text":"丙、汉年兄及省委所在地问题，待周博来此后再决定，汉年兄应完全秘密起来。"},{"type":"paragraph","text":"洛毛"},{"type":"paragraph","text":"十一月十二日"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）二人给博古（秦邦宪)、潘汉年和刘晓的指示电。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":386,"page_end":386},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c06d0027c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
