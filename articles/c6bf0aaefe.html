ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于推迟成立天津市革命委员会的批语","alias":"","parts":[{"type":"paragraph","text":"关于推迟成立天津市革命委员会的批语！"},{"type":"paragraph","text":"（1967年3月）以推迟到三月下旬成立，照总理十日意见办理为宜。"},{"type":"paragraph","text":"[1]这个批语写在国务院总理周恩来1967年3月9日给毛泽东等的报告上。报告中说，天津市革命学生组织多已趋向联合，5日已开了红代会会议。工人革命组织已按口分系统组织，多已组成，达17万人。中学生革命组织较差。在本周内，他们拟开各方协商会议，商定革委会及其常委会名单。群众大会预定12日开，在会上宣布成立天津市临时权力机关一革命委员会，并发表宣言等。"},{"type":"paragraph","text":"[2]1967年3月10日，周恩来打电话给中共天津市委第一书记解学恭，要他考虑先开大学、中学、工人、农民、机关革命派代表会议，然后再开全市革命组织协商会议和群众大会，宣布成立革委会的程序。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":363},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6bf0aaefe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
