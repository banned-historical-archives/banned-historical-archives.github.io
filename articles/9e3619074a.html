script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对中央一月决定“的补充意见","alias":"","parts":[{"type":"paragraph","text":"对中央一月决定的补充意见"},{"type":"paragraph","text":"（1948年1月24日）少奇同志："},{"type":"paragraph","text":"子养电悉。"},{"type":"paragraph","text":"（一）为了详尽考虑一月决定，你可召集阜平中央局诸人和中工委一道开几天会，缓几天复电不要紧。"},{"type":"paragraph","text":"（二）尚有几点拟加入此决定：甲、为了稳定中农之目的，老区新富农照富裕中农待遇，即不得本人同意不能平分；乙、给教堂、祠堂、庙宇留少数园地；丙、保护和平通商、传教的外国人；丁、货债及农民内部债务之处理；戊、新区执行土地法应与老区不同，在新区应分两阶段，第一阶段没收分配地主土地，中立富农；第二阶段平分土地。第一阶段只组织农会，第二阶段再组织贫农团。以上各点请一并考虑。"},{"type":"paragraph","text":"[1]中央一月决定，指毛泽东1948年1月18日为中共中央起草的决定草案，内容包括“党内反对错误倾向问题”“土地改革和群众运动中的几个具体政策问题”“关于政权问题”“在革命统-战线中领导者和被领导者的关系问题”4个部分。"},{"type":"paragraph","text":"[2]指刘少奇1948年1月22日给毛泽东的电报。电报说：已派人到两个县的下层搜集对《中央一月决定》的意见，三四天后可将讨论意见电告。除个别问题可能有若干意见外，一般赞成这个决定。又已将决定告知阜平中央局，他们可能有若干意见提出。"},{"type":"paragraph","text":"（三）我起草了一个给粟裕的电报\"，内容是说土改不能性急，长江以北至满洲?各大解放区三年内完成土改即是很大成绩；新区应分两阶段完成土改，第一阶段应中立富农；土改方法应逐步推广，不应普遍动手。此电拟同时告知各区，现尚未发出，你有何意见，盼告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"子敬"},{"type":"paragraph","text":"[1]指毛泽东1948年1月22日关于新解放区土改问题给华东野战军副司令员粟裕的电报。"},{"type":"paragraph","text":"[2]满洲，指中国东北地区。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":1,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":542,"page_end":543},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e3619074a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
