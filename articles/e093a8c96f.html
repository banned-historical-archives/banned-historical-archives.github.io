art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"致电毛主席表示衷心问候","authors":[],"parts":[{"type":"paragraph","text":"新华社二十一日讯 我们最最敬爱的伟大领袖毛主席，今天收到赞比亚共和国总统肯尼思·戴维·卡翁达在乘专机进入我国国境以后发来的电报。电报全文如下："},{"type":"paragraph","text":"北京，"},{"type":"paragraph","text":"毛泽东主席："},{"type":"paragraph","text":"当我飞抵你们伟大的国家上空，来对中华人民共和国进行首次访问的时候，我向您和全体中国人民致以衷心的、兄弟般的问候，并谨祝中华人民共和国在今后的发展中获得成功。我十分盼望进行这次访问，它在我们两国关系的发展中标志着一个很重要的里程碑。我期待着会见您和您的同志们。"},{"type":"paragraph","text":"卡翁达"},{"type":"paragraph","text":"一九六七年六月二十一日RW：卡翁达；慰电"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e093a8c96f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
