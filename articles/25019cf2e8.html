ar":1963,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十二日电】　《邓小平、彭真同志率中共代表团回到北京》新闻简报特号，已由中央新闻纪录电影制片厂摄制完成，二十三日起在北京放映，不日即将在全国各地放映。"},{"type":"paragraph","text":"影片报道了参加中苏两党会谈的中国共产党代表团，由团长邓小平同志、副团长彭真同志率领，于七月二十一日回到北京，在机场受到毛泽东、刘少奇、周恩来、朱德、董必武等党和国家领导人以及首都各界五千多人热烈欢迎的情况。"},{"type":"paragraph","text":"影片中毛主席以及党和国家领导人在机场与群众会见时的动人场景，充分显示出人们对敬爱的领袖的无比热爱。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25019cf2e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
