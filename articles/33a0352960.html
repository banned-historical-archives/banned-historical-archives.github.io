","authors":[],"dates":[{"year":1970,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻波使馆为爱国华侨举行电影招待会"},{"type":"paragraph","text":"侨胞们欢呼文化大革命的伟大胜利和祖国的伟大成就"},{"type":"paragraph","text":"新华社华沙电　中国驻波兰大使馆十五日为旅居波兰的爱国华侨举行电影招待会，放映大型彩色文献纪录影片《庆祝伟大的中华人民共和国成立二十周年》和《南京长江大桥》。"},{"type":"paragraph","text":"当我们伟大的领袖毛主席的光辉形象出现在银幕上时，侨胞们衷心祝愿敬爱的毛主席万寿无疆。"},{"type":"paragraph","text":"侨胞们看到毛主席神采奕奕，身体非常健康，莫不感到无比的高兴。在招待会上，侨胞们一再深情地为毛主席的健康长寿干杯。一位华侨说：“毛主席红光满面，身体健康，这是我们七亿人民的幸福，也是我们远离祖国的华侨的最大幸福。”"},{"type":"paragraph","text":"侨胞们从影片上看到经受无产阶级文化大革命锻炼的祖国人民意气风发，斗志昂扬，受到很大鼓舞，他们欢呼文化大革命的伟大胜利。一些华侨说，从天安门前的雄伟壮丽的游行看到祖国人民“团结起来，争取更大的胜利”的力量。"},{"type":"paragraph","text":"侨胞们还从另一部影片上看到了南京长江大桥的宏伟工程，都为祖国的社会主义建设的伟大成就感到骄傲。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33a0352960"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
