<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海工业研究单位反右倾鼓干劲初获战果重大课题技术关基本突破广大科技人员乘胜大战11、12月向1960年加速进军","authors":[],"dates":[{"year":1959,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海工业产品科学研究单位在工业战线大好形势鼓舞下，继续反右倾、鼓干劲，快马加鞭地开展科学研究工作，已初获战果。有些重大课题的技术难关已基本突破，为全面完成第四季度科学研究任务，提前跨进1960年创造了良好开端。"},{"type":"paragraph","text":"评为今年上海市先进集体的上海医药研究所合成药室，在国庆以后喜讯频传。高血压药物美加明的工艺改进工作，经进一步改进技术路线后，已研究成功。这种药采用国内资源丰富的原料代替原来价格昂贵而且目前国内十分缺乏的原料，成本只及原来的二十分之一。反应时间由原来的50小时缩短为5小时，收率也提高了50%左右。抗癌新药A-139的技术关，也已攻破，正在交有关医院进行临床试验。热工仪表研究所与有关单位协作在成套转炉仪表研究方面，也作出了新的成绩，其中风量积算器在进一步改进了数码盘后，精度已达一级；红外线幅射高温计，在“十一”前试验时，经常出现毫伏值的正负异常现象，经反复研究找出了主要原因，并采取了相应措施后，现在毫伏值曲线已逐渐正常。在数据处理仪表方面，码盘原采用18个电容器，现研究成功改为一个电容器，效果十分良好。这些仪表的研究成功，将克服目前因凭经验掌握冶炼操作而产生的缺点。"},{"type":"paragraph","text":"这些单位今年第四季度的任务都比三季度实际完成的任务更重，不但研究课题较以往大大增加，而且为当前生产急需的重大尖端课题所占的比重也很大，其中许多课题还是过去啃了几次没有啃下来的“硬骨头”。但是，随着反右倾斗争的不断深入，各单位职工干劲越鼓越足，许多技术人员雄心勃勃，决心千方百计战胜困难夺取更丰硕的研究成果。化工研究院的第四季度计划经过群众一再讨论修订，不但把原计划提高了四分之一，而且还决心使这个计划提前10-15天完成。船舶产品设计院二室二科全体同志为了实现10月超9月的口号，积极采取措施，连日奋战。10月份完成了原订计划的180%。现在他们决心在11月底完成第四季度任务，提前一月跨入1960年。"},{"type":"paragraph","text":"在大战第四季度的同时，这些单位还正在进一步确定1960年计划，尤其是明年第一季度的具体行动计划，以便在第四季度任务之后，立即打响1960年的第一炮。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66a7c22728"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
