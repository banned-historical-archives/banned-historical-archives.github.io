script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国一些行业工人罢工抗议垄断资本剥削  荷兰工人坚持斗争三周取得初步胜利","authors":[],"dates":[{"year":1977,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国一些行业工人罢工抗议垄断资本剥削"},{"type":"paragraph","text":"荷兰工人坚持斗争三周取得初步胜利"},{"type":"paragraph","text":"新华社一九七七年三月三日讯　华盛顿消息：美国纺织、煤矿、汽车等行业的工人，最近不断举行示威或罢工，抗议垄断资本家的残酷剥削和压迫。"},{"type":"paragraph","text":"大约一千名纺织工人和工会工作者三月二日在斯蒂文斯公司总部外面举行示威，抗议这家公司不许工人组织工会的蛮横行径。"},{"type":"paragraph","text":"斯蒂文斯公司是美国第二大纺织公司，计有八十五个工厂，四万五千名职工。近几年来，这家公司的工人为了组织工会、争取集体谈判的权利、改变资本家任意欺压的局面进行了不懈的斗争。"},{"type":"paragraph","text":"目前美国纺织工人在全国范围内掀起了抵制这家公司产品的运动。示威者不顾警察的威胁，不断高呼“抵制斯蒂文斯公司（产品）”的口号。汽车、印刷等行业的工人也参加了示威。"},{"type":"paragraph","text":"美国东部、中西部煤矿工人从二月初就开始自动组织起来的罢工斗争一直坚持到现在。参加这次罢工的有西弗吉尼亚、宾夕法尼亚、伊利诺斯和印第安那等州的煤矿工人。到二月底，罢工已使煤矿少生产了一百五十万吨煤，沉重地打击了垄断资本。"},{"type":"paragraph","text":"据报道，二月中旬以来，通用汽车公司设在俄亥俄州桑达斯基和帕马、新泽西州克拉克的工厂，福特汽车公司设在密执安州维克斯奥姆的工厂，克莱斯勒汽车公司设在密执安州沃伦的工厂数以千计的汽车工人以及艾利斯·查默斯制造公司的钢铁工人也都进行了罢工斗争。"},{"type":"paragraph","text":"新华社一九七七年三月一日讯　海牙消息：荷兰工人二月七日开始在全国范围举行的罢工，经过二十一天的斗争，取得了初步胜利，资方被迫同意工人提出的按生活费用上涨自动增加工资的要求。"},{"type":"paragraph","text":"这次罢工在荷兰是第二次世界大战结束以来规模最大的一次。在斗争高潮时，每天差不多有三万名工人参加罢工。罢工斗争使垄断资本家遭到沉重打击。据报道，在罢工的头两周，总共失去了十四万五千个劳动日。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67b6abde25"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
