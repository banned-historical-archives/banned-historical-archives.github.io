art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理会见美国科技代表团","authors":[],"parts":[{"type":"paragraph","text":"据新华社七月十日讯 国务院副总理邓小平今天上午会见由美国总统科学技术顾问、科技政策办公室主任弗兰克·普雷斯博士率领的美国科技代表团，同他们进行了友好的谈话。"},{"type":"paragraph","text":"国家科委主任方毅参加了会见。"},{"type":"paragraph","text":"会见时，邓小平副总理对美国科技代表团来访表示欢迎。他说，你们的访问很重要。中美两国进行科学技术交流具有重要的意义。邓副总理说，我们要学习包括美国在内的各国的先进科学技术。"},{"type":"paragraph","text":"普雷斯博士说，我们双方这次在科技合作领域方面进行的讨论非常好。这是美中两国科技界领导人第一次进行合作讨论。我认为，中美两国进行广泛科技合作交流对两国人民和世界人民都是有利的。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68da28e639"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
