ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！!"},{"type":"paragraph","text":"（1940年10月5日）"},{"type":"paragraph","text":"三国同盟条约订立后战争会扩大。中国有可能利用帝国主义大战来解决中国民族战争的胜利问题。我们党的政策是进行独立自主的民族革命战争。我们要利用帝国主义国家之间的矛盾，对付共同的敌人，但不能参加帝国主义战争。现在我们应加紧反对德意日同盟的宣传。关于参加国民参政会问题，发言指出，现在的国民参政会，是在大资产阶级统治条件下多请一些客罢了，只有建议权、调查权、询问权，没有决议权，人员也增加很少。我们的态度仍是主张召集有全权的国民大会。"},{"type":"paragraph","text":"[1]这是在中共中央政治局会议上，毛泽东对德、意、日三国签订军事"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":10,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":144,"page_end":144},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a86854d7fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
