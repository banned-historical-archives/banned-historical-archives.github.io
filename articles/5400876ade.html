<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1966,"month":6,"day":9}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"帮助文盲战士学文化读毛主席的书三连长期坚持扫盲活动取得成绩","authors":["赵欣泉李祥麒"],"parts":[{"type":"paragraph","text":"本报讯 7601部队三连积极开展扫除文盲活动，把学习毛主席著作和识字结合起来，帮助文盲战士既学政治，又学文化。"},{"type":"paragraph","text":"这个连的党支部很重视帮助文盲战士学习文化，认真抓学习中的活思想，并且针对这些活思想，组织大家学习毛主席的教导：“没有文化的军队是愚蠢的军队，而愚蠢的军队是不能战胜敌人的。”“革命文化，对于人民大众，是革命的有力武器。”反复讲明我们学文化是形势的要求，是为了更好地掌握毛泽东思想，是为了革命。经过讨论，文盲战士们认识到：要干好革命，首先得学好毛主席著作，时时刻刻照毛主席的指示办事，有了文化就能更好地学习毛主席著作。教员们也认识到：文盲战士是我们的阶级兄弟，帮助他们学好文化，掌握毛泽东思想，是革命事业对我们的要求。大家表示，一定要做到学为革命学，教为革命教。"},{"type":"paragraph","text":"连队干部对扫盲工作都很关心，他们主动当教员，还深入班里进行个别辅导，发现问题，及时解决。班长雷修贵识字记不住，影响了学习的信心，连长就具体帮助他，并用自己学文化的经历来鼓励他。雷修贵在连长的帮助下，终于突破了困难，达到了初小水平。连里其他干部也都分工包干，具体地帮助学习上困难比较多的文盲战士，一边教文化，一边宣传毛泽东思想。"},{"type":"paragraph","text":"在教学上，三连以毛主席著作为教材，把“老三篇”列为教学的主要文章。教学的方法大致有以下几种：一、集体学习，教员讲解。学习时，由教员念一段，找出生字，大家跟着边写边认。教员再讲解含义，然后大家进行造句，加深理解。战士们反映，这样教学记得牢，理解深，既认了生字，又学了革命道理。二、教学对子与“一对红”尽可能结合。把文化水平不同的战士适当搭配起来，学习文化，又开展思想互助。三、学的文章尽量结合活思想，学以致用。如野营时就学《中国人民解放军总部关于重行颁布三大纪律八项注意的训令》，学了文化，又教育了大家遵守群众纪律。此外，连队领导还经常教育大家发扬“钉子”精神，坚持个人自学。每季度进行一次学习总结，提出改进措施，宣扬先进事迹，激发大家的学习热情。"},{"type":"paragraph","text":"三连长期坚持扫盲活动已取得了明显成绩，有的同志入伍时一字不识，现在已能自己读毛主席著作，写学习心得了。（赵欣泉、李祥麒）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5400876ade"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
