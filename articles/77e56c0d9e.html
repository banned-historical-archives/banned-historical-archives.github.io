<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“自动化”服务的由来——驳“服务得好会出修正主义”","authors":["荣春"],"dates":[{"year":1978,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"四川饭店　荣春"},{"type":"paragraph","text":"“四人帮”及其余党搞假左真右可谓无孔不入，我们饮食服务行业也深受其毒，横遭其害。他们散布“服务得好会出修正主义”的谬论，制造思想混乱，破坏服务工作，就是突出的一例。"},{"type":"paragraph","text":"社会主义饮食服务业要不要为人民搞好服务工作?回答本来是十分肯定的。我们广大饮食行业职工把全心全意为人民服务看作是自己的光荣职责。可是，在“四害”横行时，服务得好竟然成了罪过，你要加强经营管理，他们就说你是“只抓钱，不抓线”；你对顾客服务态度好，说你是“低头哈腰的旧商人作风”；你要发扬经营特色，说你是为“资产阶级遗老遗少服务”，甚至把店堂整理得清洁美观一点，也要给戴上“培养修正主义的温床”的大帽子。这一切都上纲上线，同他们所谓的“反修防修”联系在一起，你敢等闲视之吗?于是，在“四人帮”及其余党刮起的阵阵妖风中，不少饮食店一度出现了服务自动化，品种单一化，口味一律化，营业时间机关化的怪现象。所谓“自动化”，切莫以为服务工作借助了什么电子技术，而是要顾客自己排队买票，自己端饭端菜，自己洗碗揩桌。理由呢?真是“左”得出奇:“工农兵热爱劳动，不要别人侍候”。“单一化”则美其名曰“大众化”。当时，在我们饭店里只见买票、端饭、领菜三条龙，顾客走来走去乱哄哄，群众意见纷纷。而“四人帮”及其余党却通过他们操纵的舆论工具，把这作为“反修防修”的措施，大肆宣扬，胡说这是文化大革命中涌现出来的“新生事物”。还在我们饭店炮制了一份“自动化”服务的“典型材料”，作为整个饮食服务行业“斗批改”的方向，强行推广。这不仅严重地破坏了饮食服务工作，影响了店里的营业收入，而且毒害了职工的思想，挫伤了广大服务人员的社会主义积极性。"},{"type":"paragraph","text":"大家知道，饮食服务行业对社会主义革命和建设的贡献，是通过服务工作来体现的。我们的服务对象主要是工农兵群众。随着人民生活水平的日益提高，人民对饮食服务工作的要求也就越高。我们应当在供应品种、服务项目、营业时间、服务态度等各方面，时时想着工农兵，处处方便工农兵，把党的温暖送到人民群众的心坎上。我们这样做了，得到了人民群众的赞扬。实践证明:服务得好，能激发广大群众大干社会主义的积极性；服务得好，能体现人与人之间的新型关系，充分反映社会主义制度的优越性；服务得好，能为国家增加积累，支援社会主义建设。服务得好，怎么会出修正主义?!同时，由于广大人民群众的生活习惯和饮食要求总是多种多样的，饮食服务行业有责任发扬经营特色，保持地方风味，提供美味可口的菜肴点心，满足人民群众的多种需要。而“四人帮”一伙却用极“左”的面具鼓吹品种单一化，口味一律化，并把这一套披上革命的外衣，真是荒唐至极，反动透顶。这正如斯大林所指出的:要求社会成员的“口味和个人生活都是一律的，说按马克思主义者的计划大家都应当穿一样的衣服，吃一样的和同量的饭食，那就是胡说八迈，诬蔑马克思主义。”“四人帮”就是这样一伙披着“左派”伪装的反马克思主义的阶级敌人。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77e56c0d9e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
