script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"湖北黄陂县境发掘出商代宫殿基址和奴隶殉葬墓这处三千四五百年前的商代遗址，是迄今所知我国最早的古　城，它的发掘为研究我国奴隶社会历史提供了重要的科学资料","authors":[],"dates":[{"year":1975,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社武汉一九七五年二月十三日电　三千四五百年前的一座商代宫殿基址和奴隶殉葬墓已被发掘出来，地址在湖北省黄陂县盘龙城。"},{"type":"paragraph","text":"发掘工地变成了批林批孔的新战场。在殉葬奴隶遗骸的现场，当地贫下中农和前来参观的群众召开批林批孔大会，对林彪效法孔老二“克己复礼”的罪行展开了革命大批判。"},{"type":"paragraph","text":"盘龙城的商代遗址，早在解放初期就被注意到了。历年来，在农田水利建设工程中，不断有商代中期的青铜器、玉器和陶器出土。一九七四年九月，由湖北省文物考古工作者和北京大学历史系考古专业部分师生组成的盘龙城商代遗址发掘队，同当地贫下中农一起，配合水利建设工程，对这个遗址进行了大规模发掘。此处商代遗址，同郑州发现的商城一样，是迄今所知我国最早的古城。它的发掘，证明了商代文化已扩展到长江流域，为研究我国奴隶社会历史提供了重要的科学资料。"},{"type":"paragraph","text":"这次发掘出来的大型宫殿基址，成长方形，东西三十八点二米，南北十一米。从基址来看，当时宫殿是在夯土台基上建起的，它由四室组成，外面有一周迴廊，迴廊四周有四十三个大檐柱穴，檐柱穴之外，还保存了一些较细的挑檐柱穴。这种建筑同古书上记载的商代宫殿有很多相似之处，同河南偃师二里头发现的商代早期宫殿建筑也很相似。可以看出，这座宫殿的原来形状是很壮观的。在商代中期大量使用石斧、石凿之类劳动工具的条件下，能兴建这样壮观的建筑物，充分显示了劳动人民的聪明才智。"},{"type":"paragraph","text":"在出土的奴隶殉葬墓里，保存有大量珍贵的资料。墓中有棺有椁，虽木质已朽，但形制可见。木椁外壁雕刻有很精致的兽面纹和云雷纹等图案，是我国现存最早的木雕艺术品。随葬的青铜器、玉器、陶器有六十多件。最大的一件铜鼎高五十五厘米。一件铜钺长四十一厘米，上有夔龙纹和蝉纹，是少见的精品。这次出土文物的形制和花纹，同郑州商城的出土物几乎一样。就在这座墓葬中，发现了三具殉葬奴隶的遗骸。在奴隶制度下，奴隶主惨无人道，可以任意屠杀奴隶，用奴隶殉葬。这一历史事实，再一次有力地批判了孔老二宣扬的所谓“仁政”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖北文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e71de27ab3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
