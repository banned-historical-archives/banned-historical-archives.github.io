year":1976,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江青为什么怕看卡普兰？"},{"type":"paragraph","text":"解放军昆明部队某部　王永安"},{"type":"paragraph","text":"卡普兰是什么人？她是革命影片《列宁在一九一八》中刺杀无产阶级革命的伟大导师列宁的女特务。这个银幕上的女特务，江青一见就胆战心悸。她曾借口说这个女特务“形象不好，太难看”，下令不准放映这部广大工农兵群众百看不厌，每看一次都深受教育的优秀影片。"},{"type":"paragraph","text":"江青看黄色影片时，从来是兴致勃勃，以至有一次，当她看到影片中有一个女人隔船见了情人，不怕水深流急，冒着生命危险跳水去相会时，竟情不自禁地说：“我要是她，我也跳水”。而唯独见了卡普兰，她却心悸怕看，这是为什么呢？"},{"type":"paragraph","text":"俗话说：“作贼心虚”。江青和卡普兰虽素不相识，但卡普兰谋杀革命领袖列宁的罪恶行径，卡普兰咬牙切齿的狰狞嘴脸，象一面镜子，将江青迫害毛主席、陷害周总理、结帮篡党夺权的凶狠面目反射得一清二楚。躲在阴暗角落里向列宁开枪的女特务卡普兰，终于被抓住了！愤怒的群众涌上前去唾弃她、扭打她，恨不得把她碎尸万段……看到这些镜头，江青犹如看见了自己将来的下场。她怎能不胆战心悸，暴跳如雷？怎能不托辞“形象难看”，恶狠狠地禁映这部影片呢？"},{"type":"paragraph","text":"这不禁使我们联想起鲁迅小说中的人物阿Ｑ。阿Ｑ头上长了癞疮疤，因此，他讳说“癞”以及一切近于“赖”的音，后来推而广之，连“光”、“亮”，甚至于“灯”、“烛”都一概讳了。谁要犯了讳，不管有心与无心，阿Ｑ便气得全疤发红。江青怕看卡普兰，更胜阿Ｑ忌讳“癞”三分。阿Ｑ对犯讳的人采取的措施是“精神胜利”。江青这个野心家，大权在握，自有比阿Ｑ的“骂”与“打”更妙的“高”招：怕看，就下令“不准放映”，争个“精神胜利”。但是，这种自欺欺人的把戏，难道就能逃脱和卡普兰一样失败的命运吗？在强大的无产阶级专政威力下，不管你是拿枪的敌人，如卡普兰之流也好；还是党内走资派这些不拿枪的敌人，如刘少奇、林彪、“四人帮”之流也好，无论怎样凶残狡猾，都逃脱不了覆灭的下场！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0914e0fff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
