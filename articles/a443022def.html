鲜党政代表团团员，姚文元、陈锡联、纪登奎等同志参加会谈","authors":[],"dates":[{"year":1975,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平同志同金日成同志再次会谈"},{"type":"paragraph","text":"会谈在充满革命友谊和战斗团结的热烈气氛中进行"},{"type":"paragraph","text":"朝鲜党政代表团团员，姚文元、陈锡联、纪登奎等同志参加会谈"},{"type":"paragraph","text":"新华社一九七五年四月二十日讯  中共中央副主席、国务院副总理邓小平同志同朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成同志，今天上午在充满革命友谊和战斗团结的热烈气氛中再次举行会谈。"},{"type":"paragraph","text":"参加会谈的朝鲜同志有朝鲜民主主义人民共和国党政代表团团员：朝鲜劳动党中央委员会政治委员会委员、中央委员会书记、朝鲜民主主义人民共和国副主席金东奎，朝鲜劳动党中央委员会政治委员会委员、中央委员会书记、朝鲜人民军总参谋长吴振宇，朝鲜劳动党中央委员会政治委员会委员、朝鲜民主主义人民共和国政务院副总理朴成哲，朝鲜劳动党中央委员会政治委员会候补委员、朝鲜人民军上将全文燮，朝鲜劳动党中央委员会委员、朝鲜民主主义人民共和国政务院副总理兼外交部长许锬，朝鲜劳动党中央委员会委员、朝鲜民主主义人民共和国贸易部部长桂应泰，朝鲜劳动党中央委员会委员、朝鲜民主主义人民共和国对外经济事业部部长郑松南，朝鲜劳动党中央委员会委员、朝鲜人民军空军司令吴克列，朝鲜劳动党中央委员会候补委员、朝鲜民主主义人民共和国驻中国大使玄峻极。"},{"type":"paragraph","text":"参加会谈的中国同志有：中共中央政治局委员姚文元，中共中央政治局委员、国务院副总理陈锡联、纪登奎，中共中央委员、中联部长耿飚，中共中央委员、外交部长乔冠华，中共中央委员、外贸部长李强，中共中央委员、外经部长方毅，中国人民解放军副总参谋长杨成武，外交部亚洲司司长柯华，中国驻朝鲜民主主义人民共和国大使李云川。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"陈锡联","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a443022def"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
