script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"玉门石油管理局领导干部自觉破除资产阶级法权观念  发扬党的艰苦奋斗优良作风","authors":[],"dates":[{"year":1975,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"玉门石油管理局领导干部自觉破除资产阶级法权观念"},{"type":"paragraph","text":"发扬党的艰苦奋斗优良作风"},{"type":"paragraph","text":"据新华社兰州一九七五年五月二十六日电　党的艰苦奋斗的优良传统，在玉门石油管理局大批新的领导干部中得到了继承和发扬。他们坚持参加集体生产劳动，和工人群众同甘共苦，自觉破除资产阶级法权观念，保持普通劳动者的本色，受到了工人们的赞扬。"},{"type":"paragraph","text":"领导干部坚持每年都抽出一定时间到基层蹲点，和工人同吃同住，跟班劳动，是玉门油矿形成了多年的一个好风气。去年，这里有些油矿的党委主要领导干部，在基层跟班劳动平均达三个月。全局各级领导干部除了参加工业生产劳动以外，多年来还坚持轮流到农场劳动锻炼，有时还利用节假日和职工一起去农场劳动，并在春播、夏收等农事大忙季节带头到农场参加突击生产。去年年底，局、矿的领导干部带领职工、家属冒着零下二十多度的严寒和戈壁风沙开荒造田，建设起了一个新的农副业生产基地。现在，这个矿不但石油做到了稳产增产，而且有一万多名家属人口做到了粮油自给。"},{"type":"paragraph","text":"玉门石油管理局的各级领导干部都很注意克服特殊化的作风。他们的住房、家具、用具和其它生活物资的供应，同工人基本一样。他们的家属同职工的家属一样参加集体生产劳动；他们的子女和职工子女一样上山下乡。这个局所属的石油沟矿，建矿二十年来生产有了很大发展，而矿党委等机构的办公室还是当年的旧房子。党委会议室的桌凳都是用废材做的。去年，有的同志建议做些新桌凳，党委认为旧的能用就不要做新的，没有同意。后来，又有同志提出把旧桌凳油漆一下，党委觉得桌凳不美观并不影响工作，坚持把油漆用到生产上。这个油矿的主要领导干部对自己注意严格要求。一次，革委会一个副主任的亲戚远道来看望他，回去时正好这个副主任不在，其他同志就派小汽车把他的亲戚送到火车站。这个副主任知道后，立即按里程付了车费，并且诚恳地要求大家监督领导干部不搞特殊化。"},{"type":"paragraph","text":"玉门石油管理局各级领导干部保持和发扬党的艰苦奋斗的优良作风，进一步密切了干部和群众的关系，促进了全局的革命团结。这里海拔高，气候恶劣，工作条件和生活环境都比较艰苦，但是职工和家属们都能以革命加拚命的精神大干社会主义，推动全局革命和生产的蓬勃发展。从一九七○年到一九七四年这里已连续五年实现石油稳产增产。"},{"type":"paragraph","text":"目前，玉门石油管理局的各级领导干部正在深入学习马克思主义关于无产阶级专政的理论。他们决心永远保持普通劳动者的本色，做限制资产阶级法权的模范，更好地发扬党的光荣传统，把无产阶级专政下的继续革命进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20be93b0c3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
