ear":1973,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见乔治·蓬皮杜总统"},{"type":"paragraph","text":"毛主席对蓬皮杜总统前来我国访问，表示热烈欢迎。双方在无拘束的气氛中，就共同关心的问题广泛地交换了意见"},{"type":"paragraph","text":"贵宾们由周恩来总理陪同来到毛主席住处时，首先在门口受到王洪文副主席的接待"},{"type":"paragraph","text":"新华社一九七三年九月十二日讯  毛泽东主席今天下午五时会见了法兰西共和国总统乔治·蓬皮杜。双方在无拘束的气氛中，就共同关心的问题广泛地交换了意见。"},{"type":"paragraph","text":"法国外交国务秘书让·德利普科夫斯基参加了这次会见。"},{"type":"paragraph","text":"贵宾们由周恩来总理陪同来到毛主席住处时，首先在门口受到王洪文副主席的接待。"},{"type":"paragraph","text":"毛主席、蓬皮杜总统见面时，双方长时间地握手。毛主席对蓬皮杜总统前来我国访问，表示热烈欢迎。蓬皮杜总统说：我为有机会同你见面，感到非常荣幸，因为你使世界改变了面貌。他还转达了戴高乐将军生前怀有的同毛主席会见的愿望。毛主席在随后的谈话中回顾说，十年前在戴高乐将军的推动下，法国在西欧国家中第一个同中国建立了完全的外交关系。他请蓬皮杜总统回国以后向所有他见过的法国朋友问候。"},{"type":"paragraph","text":"会见时在座的有王海容、唐闻生、齐宗华、罗旭。（附图片）"},{"type":"paragraph","text":"毛主席同蓬皮杜总统握手。"},{"type":"paragraph","text":"毛主席会见蓬皮杜总统时情形。"},{"type":"paragraph","text":"毛主席同蓬皮杜总统交谈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1973,"month":9,"day":13}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席会见乔治·蓬皮杜总统","authors":[],"parts":[{"type":"paragraph","text":"毛主席对蓬皮杜总统前来我国访问，表示热烈欢迎。双方在无拘束的气氛中，就共同关心的问题广泛地交换了意见 贵宾们由周恩来总理陪同来到毛主席住处时，首先在门口受到王洪文副主席的接待"},{"type":"paragraph","text":"新华社一九七三年九月十二日讯 毛泽东主席今天下午五时会见了法兰西共和国总统乔治·蓬皮杜。双方在无拘束的气氛中，就共同关心的问题广泛地交换了意见。"},{"type":"paragraph","text":"法国外交国务秘书让·德利普科夫斯基参加了这次会见。"},{"type":"paragraph","text":"贵宾们由周恩来总理陪同来到毛主席住处时，首先在门口受到王洪文副主席的接待。"},{"type":"paragraph","text":"毛主席、蓬皮杜总统见面时，双方长时间地握手。毛主席对蓬皮杜总统前来我国访问，表示热烈欢迎。蓬皮杜总统说：我为有机会同你见面，感到非常荣幸，因为你使世界改变了面貌。他还转达了戴高乐将军生前怀有的同毛主席会见的愿望。毛主席在随后的谈话中回顾说，十年前在戴高乐将军的推动下，法国在西欧国家中第一个同中国建立了完全的外交关系。他请蓬皮杜总统回国以后向所有他见过的法国朋友问候。"},{"type":"paragraph","text":"会见时在座的有王海容、唐闻生
