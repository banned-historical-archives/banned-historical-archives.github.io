":["程坤"],"dates":[{"year":1957,"month":3,"day":18}],"is_range_date":false,"parts":[{"text":"湖南部分地区发生春荒","type":"title"},{"text":"程坤","type":"authors"},{"text":"新华社长沙18日讯　湖南部分地区发生春荒。","type":"paragraph"},{"text":"洞口县目前无粮无钱的有三千五百八十六户，占总农户3．7％；有粮无钱的五千三百六十八户，占总农户5．7％，有钱无粮的二千九百五十三户，占总农户3．1％。全县粮钱发生困难的比上一周增加二千五百○七户。","type":"paragraph"},{"text":"桂阳县九个重灾乡春夏荒缺粮农户占总农户20％。春荒问题大于夏荒，在缺粮缺钱的九千二百三十七户中有五千四百七十三户是春荒户。宜章县的十九个乡荒情面约占总农户10％左右。由于灾情继续发展，有些灾区劳力外流。","type":"paragraph"},{"text":"来源：1957年3月18日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"798c572742"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
