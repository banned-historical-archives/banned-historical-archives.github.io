":["东北财经学院","傅鹏","叶仲乐","李宝印","杨学武","郭荣环","马思"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"我国“法制不健全”“无法无天”","type":"title"},{"text":"东北财经学院傅鹏郭荣环李宝印叶仲乐马思杨学武","type":"authors"},{"text":"“你看，对咱老师十家搜查了九家，真是没有王法。逮捕人侵犯人权，肃反干部捕错了人不能受法律制裁，这是什么样的国家，资本主义国家还有人身自由呢！”(傅鹏)","type":"paragraph"},{"text":"“我们国家没有什么法制，学法律的人最痛恨这个，法律系的学生闹事最多，其原因就在这里。”(郭荣环)","type":"paragraph"},{"text":"“我们除宪法外，再没有什么法了。”(李宝印)","type":"paragraph"},{"text":"“宪法明文规定：公民的权利和义务是平等的，但我们学院只在义务方面作到了一视同仁，可是在权利方面，只有特许‘干部’，‘劳卫制及格者’才能享受我院团委和体育教研组举办的国防运动——摩托车、射击等。现在我们质问主观主义的团委领导者们及体育教研组，是谁给的在学生享受权利方面附加上‘政治’、‘体育’条件而剥夺大多数人的权利呢？”(小天平“有义务无权利”乱弹琴)","type":"paragraph"},{"text":"“王云峰冒充公安人员，私自威胁审讯家庭妇女，逼成疯癫一事，是最严重的违法乱纪的行为，应当进行组织处理，我们要维护宪法的人权尊严……我们认为王云峰的罪行与领导肃反的干部陈、苏二院长的官僚主义和主观主义分不开，过去人事处和陈院长还以欺骗手段拖延。”(叶仲乐)","type":"paragraph"},{"text":"“官僚主义产生的原因是法制不健全。”(李宝印)","type":"paragraph"},{"text":"“从我院来看，肃反后的副作用影响面过宽，有的是属于一般常识问题而以粗暴的违法乱纪的行为斗争，实难信服……同学中的党员也参加包围学校老师住宅搜查的活动，这显然是违法乱纪，(既不是公安人员又不是军队)是谁赋予党员这种特权思想，通过整风要树立法治，保障人权。”(马思)","type":"paragraph"},{"text":"兵役法公布后，“如果要是发生战争，咱们青年一个也跑不了啊”！(杨学武)","type":"paragraph"},{"text":" 来源：《我院学生中的右派言论汇编》（中共东北财经学院委员会编，1957）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5d4fd9257"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
