ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于美机犯境我方应不示弱致李克农电","alias":"","parts":[{"type":"paragraph","text":"对集宁军分区三反斗争"},{"type":"paragraph","text":"情况报告的批语"},{"type":"paragraph","text":"（1952年1月14日）各大军区，志愿军，并转各级军区和各军："},{"type":"paragraph","text":"我们愿意看见各级军区和各军有像集宁分区这样的检讨\"，不愿意看那些好像太平无事的报告。集宁分区只说了浪费和生活腐化，还没有提到贪污事件。像一个军分区一定有大批的贪污犯，望各地严格注意。一切没有切实暴露问题和解决问题的机关和部队，必须从头做过，做好了三反再做整编，三反一天没有做好即一天不进行整编。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十四日"},{"type":"paragraph","text":"[1]中国人民解放军集宁军分区1952年1月9日关于三反情况的报告谈到，军分区召开了排以上干部会议，由司令员代表分区及个人作检讨和启发报告，发动大家进行揭发批评。会上着重揭露和批评了分区领导利用职权，擅自开支，造成铺张浪费，以及存在严重官僚主义的问题。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":265,"page_end":265},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd1ec17c29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
