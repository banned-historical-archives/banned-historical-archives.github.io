ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"致各中央局和中央分局电","alias":"","parts":[{"type":"paragraph","text":"致各中央局和中央分局电！"},{"type":"paragraph","text":"（1943年4月30日）"},{"type":"paragraph","text":"当苏联提出一九四二年打败德国时，是以英、美约定于一九四二年建立第二条战线为根据的，在当时不但可以而且应该提出此种口号以为动员努力之目标。但当英、美没有开辟第二条战线，又无新的约定时，就没有继续宣传此种口号。当苏联根据英、美约定提出上述口号时，我党亦提出一九四三年打败日本的口号，这也是不但可以而且应该的。但当英、美没有履行诺言因而去年打败德国没有实现时，我党即不应继续宣传此种口号，而应向群众解释今年所以还不能打败日本的原因，鼓励群众坚持努力争取胜利。各中央局及分局须作长期坚持打算，准备再作两年至三年的极端艰苦斗争，并须准备或有的意外变化。"},{"type":"paragraph","text":"[1]这是毛泽东为中央书记处起草的关于解释“今年打垮希特勒，明年"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":4,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":538,"page_end":538},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d94311957a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
