工群众在各个农业地区的中心城镇举行集会和声势浩大示威游行","authors":[],"dates":[{"year":1969,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资本家残酷剥削　要求充分就业和提高工资"},{"type":"paragraph","text":"意大利一百八十万农业劳动者大罢工"},{"type":"paragraph","text":"罢工群众在各个农业地区的中心城镇举行集会和声势浩大示威游行"},{"type":"paragraph","text":"新华社十七日讯　罗马消息：意大利一百八十万农业劳动者十六日和十七日连续两天在全国范围举行大罢工，反对资本家的残酷剥削，要求提高工资和充分就业。"},{"type":"paragraph","text":"罢工群众在意大利各个农业地区的中心城镇举行了集会和声势浩大的示威游行。"},{"type":"paragraph","text":"与此同时，意大利经济落后地区的人民又掀起了新的斗争浪潮。十五日，在意大利南部的加拉勃利亚区，一万名群众从二十八个地区集中到克罗托内，举行了示威游行，对他们所在地区的失业、贫困和经济衰退的情况日益恶化表示愤怒抗议。在阿浦利亚区的福贾和康帕尼亚区的卡斯特尔沃图诺，十六日也爆发了同样的群众示威。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e35b44343"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
