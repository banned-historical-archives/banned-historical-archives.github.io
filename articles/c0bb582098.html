","authors":[],"dates":[{"year":1967,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"谢胡同志赞扬中国文化大革命对世界革命具有决定性意义"},{"type":"paragraph","text":"把资产阶级和修正主义垃圾一扫光"},{"type":"paragraph","text":"新华社地拉那三十日电　阿尔巴尼亚劳动党中央政治局委员、部长会议主席谢胡同志二十八日在地拉那十一月七日综合技术学校庆祝学校重建二十周年大会上讲话时说，中国无产阶级文化大革命的胜利，对于世界革命的命运具有决定性的意义。"},{"type":"paragraph","text":"谢胡同志说，中国的无产阶级文化大革命具有伟大的意义。象岩浆滚滚的火山一样爆发并在毛泽东同志伟大的马克思列宁主义思想指导下进行的中国无产阶级文化大革命，具有历史和世界意义，因为这场大革命保证了伟大的中国的社会主义道路，粉碎和埋葬了资产阶级、修正主义的梦想，扫除了资产阶级、反动派、修正主义的垃圾，使占人类四分之一的中国人民的思想意识革命化，从而鼓舞了世界上的所有革命者和被压迫人民。"},{"type":"paragraph","text":"谢胡同志表示，阿尔巴尼亚劳动党和阿尔巴尼亚人民支持中国的无产阶级文化大革命，欢呼毛泽东同志的伟大的马克思列宁主义思想的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0bb582098"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
