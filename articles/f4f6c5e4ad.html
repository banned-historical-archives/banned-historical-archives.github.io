tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志1936年写给丁玲的一首词","authors":[],"parts":[{"type":"paragraph","text":"（临江仙）"},{"type":"paragraph","text":"壁上红旗飘落照"},{"type":"paragraph","text":"西风漫卷孤城"},{"type":"paragraph","text":"保安人物一时新"},{"type":"paragraph","text":"洞中开宴会"},{"type":"paragraph","text":"招待出牢人"},{"type":"paragraph","text":"纤笔一枝谁与似"},{"type":"paragraph","text":"三千毛瑟精兵"},{"type":"paragraph","text":"阵图开向陇山东"},{"type":"paragraph","text":"昨天文小姐"},{"type":"paragraph","text":"今日武将军"},{"type":"paragraph","text":"这首词是毛主席在1936年秋天写的。"},{"type":"paragraph","text":"丁玲同志这时到达保安，不久即随红军去陇东。毛主席把这首词用电报发到前方，由当时红军一方面军转交丁玲同志。1937年初丁玲回延安，毛主席又亲笔写录全文送给丁玲。1939年陕甘宁边区河防一度紧张，为了珍藏这份史料，丁玲当时把这首词及其它一些稿件，一并寄到重庆，委托胡风保存，至今已41年了。"},{"type":"paragraph","text":"（原载《新观察》1980年第7期）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4f6c5e4ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
