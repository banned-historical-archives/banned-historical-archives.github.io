ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给毛宇居的信","alias":"","parts":[{"type":"paragraph","text":"给毛宇居的信"},{"type":"paragraph","text":"（1952年8月21日）宇居兄："},{"type":"paragraph","text":"来信收到。李漱清老先生及邹普勋兄前曾表示，希望来京一游。我认为可以同意，借此了解乡间情况。但请你向他们二位说清楚：（一）须他们自己下决心，出远门难免有风险；（二）到京住一至两个月即还家乡。如他们同意这两点，则可于阳历九月间动身北来。到长沙湖南省委统一战线部刘道衡部长处接洽，领取来京路费，办理乘车事宜。介绍信一件，请予转致李、邹二位。其余要来京者，今年不便招待。"},{"type":"paragraph","text":"顺候近安"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年八月二十一日[1]毛宇居，湖南韶山市韶山乡韶源村人，毛泽东的房兄和私垫老师。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":204,"page_end":204},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62f57ceb62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
