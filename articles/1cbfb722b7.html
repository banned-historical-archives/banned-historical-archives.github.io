ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给向偶的信叫","alias":"","parts":[{"type":"paragraph","text":"给向隅的信!!"},{"type":"paragraph","text":"（1939年9月5日）"},{"type":"paragraph","text":"取名延生如何？如以为不妥，请你们自己拟出两三个，我替你们选择一个。因忙迟复，是以为歉！此复向、唐二同志并庆祝你们的小孩。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月五日"},{"type":"paragraph","text":"[1]1939年7月1日，音乐家向隅、唐荣枚的第二个儿子降生在延安的窑洞里，他们想请毛泽东给孩子取个名字，但考虑到毛泽东那么忙，难以启齿。8月18日，孩子的舅舅柯蓝，当时是鲁迅文学院的学生，知道这件事后，自告奋勇，从练习本上撕下一页纸，给毛泽东写了一封信。信是这样写的：“我们的小孩—一个男孩一是七月日生下来的，因为他刚巧在伟大的日子里进入了这伟大的时代，我们都希望得到你的光荣给他取一个名字·..18天后，他们收到毛泽东的一封信，中国式的信封上竖写着“鲁艺文学艺术研究院向隅同志收”。打开一看，毛泽东在他们的去信上作了批示。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":9,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":523,"page_end":523},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cbfb722b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
