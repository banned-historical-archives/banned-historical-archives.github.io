nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"张春桥在市革委会修改党章、党纲小组会上的讲话","parts":[{"type":"title","text":"998．张春桥在市革委会修改党章、党纲小组会上的讲话"},{"type":"paragraph","text":"(1967年11月27日)"},{"type":"paragraph","text":"修改党章是要大家好好读书，读《联共党史》，特别是头几段(第二章)，列宁的《做什么》、《进一步退两步》、《左派幼稚病》、《关于党的纪律问题》。纪律是有条件的，驯服工具论是不对的。党章一定要体现民主集中制，一九二一年到一九二七年党是好的，但是并不排斥党内有坏人，当时有陈独秀，党内生活比较活跃。一九二七年到一九三六年遵义会议前搞得一塌糊涂，一九三六年到一九四二年经过整顿，党内比较活跃。进城以后，又有些变了，特别是反右以后，刘少奇一套越来越糟了，有些方面把权给夺去了。搞了一个后十条，一九六三年就更严重了。总纲最难写，一定要体现毛泽东思想，社会主义国家新贡献要写上，最好要用毛主席语录写、不在于新的说法。要白天学毛选。“九大”开的时候，一定是很活跃的，姚文元同志邮给毛主席的信体现了毛泽东思想。"},{"type":"paragraph","text":"......发展新党员有可能坏人钻进来，要防止。"},{"type":"paragraph","text":"对“八大”党章怎样估价，有人说是刘少奇的党章，不能这样说。至少民主集中制讲到全党服从中央，这是体现毛泽东思想的。"}],"authors":["张春桥"],"dates":[{"year":1967,"month":11,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":459,"page_end":460,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b48672448d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
