<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"无政府主义适敌所需为敌所用","authors":[],"dates":[{"year":1968,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无政府主义适敌所需为敌所用"},{"type":"paragraph","text":"无政府主义者打出的旗号虽然变化无常，但却万变不离其宗，总是极力否定无产阶级权威，否定革命的新秩序和无产阶级的组织纪律，只要民主，不要集中；只要自由，不要纪律；只要个人随心所欲，不要统一意志。一句话，无政府主义是极端的资产阶级个人主义，一切以“我”为转移，为所欲为。任其发展下去，必然涣散我们革命组织，瓦解我们革命队伍的战斗力，损害无产阶级权威，削弱无产阶级专政，严重地阻碍着我们夺取无产阶级文化大革命的全面胜利。这一切的一切，不恰恰是适应了阶级敌人妄图复辟资本主义的需要，为阶级敌人提供了向无产阶级进攻的“缺口”吗？"},{"type":"paragraph","text":"无政府主义思潮的出现绝非偶然，而是当前新形势下两个阶级、两条道路、两条路线斗争深化的必然反映。一小撮不甘心灭亡的阶级敌人，无时无刻不在“窥测方向”，“以求一逞”，妄图分裂和动摇以毛主席为首的无产阶级司令部，颠覆无产阶级专政，实现其复辟资本主义的罪恶目的。无政府主义就是阶级敌人用来复辟资本主义的又一支别动队，它配合资产阶级向无产阶级进攻，甚至可以起到敌人所无法直接起到的破坏作用。因此，阶级敌人总是极力向我们的革命队伍灌输和煽动无政府主义思潮，利用我们革命队伍中出现的无政府主义思潮来破坏文化大革命。"},{"type":"paragraph","text":"一年多来的无产阶级文化大革命的斗争实践，充分说明了这一点。那个臭名昭著的反革命两面派陶铸，当初不是拚命散布“怀疑一切，打倒一切”的无政府主义的反动口号吗？再请同志们擦亮眼睛看一看：在目前那些无政府主义思潮泛滥的地方，究竟什么人在点鬼火、煽阴风？什么人从中渔利、得意忘形？当你开始大闹无政府主义的时候，不是有人对你笑脸相迎，在你面前阿谀奉承，煽动你脱离毛泽东思想的轨道，让你越闹越凶吗？当你大闹无政府主义不可开交的时候，他们不是马上为你鼓掌喝彩，称赞你为“虎胆英雄”、“时代的狂人”，诱使你把炮口对准无产阶级司令部吗？当你的错误言行受到同志的批评、抵制，而你又一时想不通的时候，不又是这些人鼓动你沿着危险的道路继续滑下去吗？"},{"type":"paragraph","text":"无政府主义这条毒蛇，同敌人狼狈为奸，干尽坏事。我们必须群起围歼之，群起而诛之，它在哪里冒出来，就在哪里把它打下去，直到把它彻底打倒为止！"},{"type":"paragraph","text":"（《新安徽报》二月十四日社论）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a205eba94e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
