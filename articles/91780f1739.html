hors":["陈伯达"],"dates":[{"year":1967,"month":11,"day":22}],"is_range_date":false,"parts":[{"text":"陈伯达接见天津赴京汇报代表团时的讲话摘要","type":"title"},{"text":"陈伯达","type":"authors"},{"text":"都是老话、好话，可以重复地讲。我准备说的都是好话。","type":"paragraph"},{"text":"1．我们还是主张贯彻执行毛主席按系统搞大联合的指示，不赞成跨行业的组织，包括大联筹反复辟，这就可能得罪你们了，你们要打就打。","type":"paragraph"},{"text":"2．要把参加“大联筹”的群众同头头区别开来，“大联筹”有些头头搞了很多坏事，亲者痛，仇者快。他们做的坏事是不能容忍的。对一些头头做的坏事，参加大联筹的群众不能替他负责任。这就没有压力了嘛！","type":"paragraph"},{"text":"3．遵照毛主席关于多作自我批评，少批评别人的指示，继续协商，能快一点成功是好的，对抓革命、促生产有利。","type":"paragraph"},{"text":"陈伯达同志批评了《政法公社》。他指出：","type":"paragraph"},{"text":"北京政法学院《政法公社》，这个学校里一小批学生组织《政法公社》要在全国夺权，他们到天津帮助万、张反党集团夺公安局的权，在小站帮助张凤琴夺王凤春的权。群众是最后的裁判者。","type":"paragraph"}],"comments":[],"origin":"1967年11月23日清华大学井冈山斗批改战团编印《学习资料》第50期；北京政法学院革命委员会《政法红旗》主办《红旗战报》第44期 1967年12月9日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91780f1739"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
