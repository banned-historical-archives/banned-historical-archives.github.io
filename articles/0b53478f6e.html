兰州大学","苗庆久"],"dates":[{"year":1960,"month":1}],"is_range_date":false,"parts":[{"text":"反右倾的来由","type":"title"},{"text":"兰州大学苗庆久","type":"authors"},{"text":"(苗庆久：兰州大学物理系学生，入学前为公安司令部边防保卫局参谋；1960年9月被捕，1962年判刑二十年)","type":"paragraph"},{"text":"据官方内部透露消息：中国共产党中央八届八中全会，最后一天代表们正准备闭会后游山逛景之际，彭德怀写了一封长信交给毛泽东，其内容指出了共产党执政以来的 某些错误，特别是指出大跃进、人民公社化运动给广大劳动人民带来的痛苦和灾难，他说：“……若不是中国农民愚昧无知、最富有忍耐性，早就把我们推翻了。如果继续这样下去，一旦农民起来，依靠本国军队是无用的，必须请外国军队……”毛见信后，则大发雷霆，立即召集代表继续开会，提出反右倾运动。","type":"paragraph"},{"text":"甘肃省委第二书记霍维德一些言行","type":"paragraph"},{"text":"据悉：霍维德说，思想改造、反右斗争把知识分子得罪了；合作化、人民公社化运动把农民得罪了；红旗竞赛、超先进赶先进、提高定额、加班加点把工人得罪了。","type":"paragraph"},{"text":"当看到全国市场全面紧张的局面时，他说：“老子若知道是这样，当初就不革命了。”","type":"appellation"},{"text":"他最近到农村视察人民公社时，当地给他准备了丰富的饮食，并介绍说：公社化以后社员提高了，经常吃喝这样饮食。他看见农民都是面黄肌瘦，不相信这些介绍，当即检查社员厕所，实际看到的粪便都是绿水，并严厉地提出批评。","type":"paragraph"},{"text":"（注）：上述事实也就是他成为右倾分子的主要原因。","type":"paragraph"}],"comments":[],"origin":"谭蝉雪编著《求索（兰州大学“右派反革命集团案”纪实）》，2010年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"反右倾的来由","authors":["兰州大学","苗庆久"],"dates":[{"year":1960,"month":1}],"is_range_date":false,"parts":[{"text":"反右倾的来由","type":"title"},{"text":"兰州大学苗庆久","type":"authors"},{"text":"(苗庆久：兰州大学物理系学生，入学前为公安司令部边防保卫局参谋；1960年9月被捕，1962年判刑二十年)","type":"subtitle"},{"text":"据官方内部透露消息：中国共产党中央八届八中全会，最后一天代表们正准备闭会后游山逛景之际，彭德怀写了一封长信交给毛泽东，其内容指出了共产党执政以来的某些错误，特别是指出大跃进、人民公社化运动给广大劳动人民带来的痛苦和灾难，他说：“……若不是中国农民愚昧无知、最富有忍耐性，早就把我们推翻了。如果继续这样下去，一旦农民起来，依靠本国军队是无用的，必须请外国军队……”毛见信后，则大发雷霆，立即召集代表继续开会，提出反右倾运动。","type":"paragraph"},{"text":"甘肃省委第二书记霍维德一些言行","type":"subtitle"},{"text":"据悉：","type":"paragraph"},{"text":"霍维德说，思想改造、反右斗争把知识分子得罪了；合作化、人民公社化运动把农民得罪了；红旗竞赛、超先进赶先进、提高定额、加班加点把工人得罪了。","type":"paragraph"},{"text":"当看到全国市场全面紧张的局面时，他说：“老子若知道是这样，当初就不革命了。”","type":"paragraph"},{"text":"他最近到农村视察人民公社时，当地给他准备了丰富的饮食，并介绍说：公社化以后社员提高了，经常吃喝这样饮食。他看见农民都是面
