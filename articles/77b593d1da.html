三十起","authors":["宫敬之"],"dates":[{"year":1955,"month":2,"day":7}],"is_range_date":false,"parts":[{"text":"安徽省在粮食统购工作中发生死人事件三十起","type":"title"},{"text":"宫敬之","type":"authors"},{"text":"【安徽分社七日讯】安徽省从去年十二月开展粮食统购统销工作到今年元月二十八日止，共发生死人事件三十起，死人二十九名。其中贫农四人、中农十七人(内党员一人)，富农七人，地主一人。若以工作阶段分：在四定前派购中死四人，四定时宣传动员中死六人，定产中死十一人，售粮中死八人。从死人的原因来看：因统购统销宣传的不深不透，政策交待不清，并向群众胡说乱讲，甚至说些带威胁的话，而促使自杀的有十二人。因干部强迫命令，硬性的派任务，定产量定高了不予核减，甚至挟嫌报复等而促成自杀的有十三人。有些是余粮户，懂政策，但抗拒不卖，并企图破坏统购统销工作，经揭发、检举畏罪而自杀的有四人。(宫敬之据统购统销简报编)","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年2月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77b593d1da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
