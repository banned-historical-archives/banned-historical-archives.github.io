script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华国锋总理同穆巴拉克副总统举行会谈","authors":[],"dates":[{"year":1976,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋总理同穆巴拉克副总统举行会谈"},{"type":"paragraph","text":"新华社一九七六年四月十九日讯　国务院总理华国锋，今天下午同阿拉伯埃及共和国副总统胡斯尼·穆巴拉克举行了会谈。"},{"type":"paragraph","text":"会谈在亲切友好的气氛中进行。"},{"type":"paragraph","text":"阿拉伯埃及共和国方面参加会谈的有：军工生产部国务部长贾迈勒丁·西德基工程师、工业部第一国务秘书哈米德·哈比卜、陆军少将赛义德·塔基、陆军少将阿德勒·哈希姆、空军少将纳比赫·米西里、陆军少将阿卜杜勒·阿齐兹·阿里夫、陆军少将阿里·沙欣·阿卜杜·拉布、军工生产部国务秘书扎卡里亚·扎基·萨乌迪、外贸部国务秘书艾哈迈德·瓦法·赛义德、农业部国务秘书马哈茂德·阿蒂亚·苏莱曼博士、经济合作部国务秘书贾迈勒·纳泽尔、副总理兼外长办公室主任乌萨马·巴兹大使、陆军准将易卜拉欣·阿卜杜勒·加法尔·阿拉比。"},{"type":"paragraph","text":"中国方面参加会谈的有：外交部长乔冠华、副部长何英，中国人民解放军副总参谋长张才千，外贸部副部长陈洁，外经部副部长陈慕华，农林部副部长郝中士，以及有关方面负责人王乐天、徐明德、王定烈、朱传贤、周觉。（附图片）"},{"type":"paragraph","text":"华国锋总理四月十九日同阿拉伯埃及共和国副总统胡斯尼·穆巴拉克举行了会谈。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90cc947ca9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
