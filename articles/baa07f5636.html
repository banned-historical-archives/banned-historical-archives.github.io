[],"dates":[{"year":1970,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削和压迫"},{"type":"paragraph","text":"意大利人民连日举行罢工和示威"},{"type":"paragraph","text":"新华社讯　罗马消息：意大利人民群众连日来不断举行罢工和示威游行，反对垄断资本的残酷剥削和压迫，要求增加工资，改善工作条件。"},{"type":"paragraph","text":"四万名市区公共汽车工人和四万五千名政府雇员从十三日开始举行全国性的大罢工。这次公共汽车工人的罢工原来预定三天，但是各地的工人却比预定时间提前一天在十三日就开始了大罢工，使罢工增加了一天。"},{"type":"paragraph","text":"在米兰，“阿尔法·罗米欧”汽车厂的一万五千名五金和机械制造工人举行了十天的间歇性罢工，要求增加工资、减轻劳动强度和改善工作条件。“博莱蒂”缝纫机厂的工人也举行了间歇性罢工。同时，一万八千名市政工作人员和雇员在十二日和十三日举行了两天的罢工，几千名罢工者还举行了示威游行，使这个城市的交通陷于一片紊乱。此外，来自意大利北部许多省份的五千多农民，十三日也在米兰举行了示威游行，抗议当局执行的使农业发生危机的政策。一些工人代表参加了他们的游行。示威群众齐声高呼：“工人和农民在斗争中团结起来！”"},{"type":"paragraph","text":"在都灵，“菲亚特”汽车工厂的各个工场前几天也举行了罢工。"},{"type":"paragraph","text":"威尼斯省的工人十五日举行了全省总罢工，声援“夏蒂荣”合成纤维厂工人连续坚持了几个星期的罢工，抗议资本家对工人的迫害。"},{"type":"paragraph","text":"在这同时，意大利所有医院的医助、医生和航空公司的飞行员也分别举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baa07f5636"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
