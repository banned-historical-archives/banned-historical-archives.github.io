世瑛的复信","authors":[],"dates":[{"year":1955,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"毛泽东关于调查谭世瑛的历史情况给湘乡县委的信和给谭世瑛的复信","type":"title"},{"text":"一","type":"subtitle"},{"text":"湘乡县委，并转第二区区委、石洞乡支部各同志：","type":"appellation"},{"text":"石洞乡的谭世瑛，四十多年前，曾在湘乡东山学校和我有过同学关系。解放后来过几次信，我亦回过几封信，因他叫困难，最近又寄了一点钱给他。最近因患眼病，到汉口找谭政同志求治，谭不在，到北京找我。现正进医院治眼，两三星期即回乡。我嘱他好好听区乡党政干部管教。据他说，他有两个儿子在三年前镇反斗争中被枪决，一个是营长，一个是排长，听说有血债被枪决的。他本人也被剥夺公民权，管制一年，现已解除管制但仍不能入农会。他的妻和他的其他两个儿子则有公民权并入了农会。他说，他的成分是贫农。他又说，他教了几十年书，只在二十七年前在国民党的邵阳县政府当过五个月的科员，并未作坏事云云。此人历史我完全不清楚，请你们查明告我为盼。","type":"paragraph"},{"text":"祝你们工作顺利。","type":"paragraph"},{"text":" 毛泽东一九五五年五月十七日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"世瑛兄：","type":"appellation"},{"text":"六月四日的信及大作一首收到，甚谢！我赞成你于日内返乡。","type":"paragraph"},{"text":"中共湘乡县委有信(乡支部也有一信)给我，对于你家情况有所说明。据称：你的两个儿子确实有罪，这是因为他们在几次宽释之后还要犯罪，而且犯了严重罪行的原故。因此，政府和人民对他们依法处理，是应该的。你则只有一些旧社会带来的缺点和在对待你两个儿子的态度上有些不当，故给以一年管制，现已解除。县委来信认为你无其他罪行。我认为县委对你的评语，是公道的。","type":"paragraph"},{"text":"你应当在新旧社会的根本变化上去看问题，逐步地把你的思想和情绪转变过来。这样就可以想开些，把一些缺点改掉，督促全家努力生产。最要紧的是服从政府法令，听干部们的话。这样，几年之后，人们对你的态度就会更好些了。","type":"paragraph"},{"text":"如你认为必要的话，此信可给县区乡负责同志一阅。","type":"paragraph"},{"text":"祝你平安","type":"paragraph"},{"text":" 毛泽东一九五五年六月八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2496be2be6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
