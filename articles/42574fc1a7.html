,"dates":[{"year":1967,"month":6,"day":30}],"is_range_date":false,"parts":[{"text":"韩先楚同志6月30日来电","type":"title"},{"text":"厦门市军管会转新厦门公社、新厦大公社苏××、吴××、柯××等同学：","type":"appellation"},{"text":"你们给省军管会和我的电报，省军管会已转告我。我和省军管会的同志研究了你们对《新厦门日报》的行动，特作如下答复：","type":"appellation"},{"text":"《新厦门日报》已实行军管，负责每天向广大读者传播毛主席的声音，宣传党的方针政策，为前线军民不可缺少的精神粮食。你们不管有多少理由，冲进已实行军管的报社，并妨碍报纸正常出版，这是不对的。我和省军管会的同志，都希望你们珍惜和保持自己作为一个革命群众组织的光荣称号，立即停止进占报社的行动，全部撤离报社，保证报纸能够正常出版。对报纸工作有意见，可向负责军管的同志提出，也可向上级机关反映，作为部队和革命派一家人的内部问题来研究解决。","type":"paragraph"},{"text":" 韩先楚1967年6月30日电","type":"paragraph"}],"comments":[],"origin":"福建省厦门革命到底联合总司令部八·二九厦门大学红卫兵独立团《挺进》编委会编《中央（首长）对厦门文化大革命问题的指示汇编》1969年4月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42574fc1a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
