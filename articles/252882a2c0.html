s":[{"year":1952,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京市建筑公司党委会"},{"type":"paragraph","text":"接受批评检查右倾思想"},{"type":"paragraph","text":"编辑同志：二月二十七日人民日报刊载了读者来信，批评我公司不应让贪污分子领导反贪污运动。我们立即召开党委会，检讨了我们的右倾思想。"},{"type":"paragraph","text":"我公司副经理崔彦彩手脚不干净，而我们在运动开始时不但未令其交代问题，反让他领导运动。在此期间，我们虽对他进行过批评，要他写悔过书，但明知他检讨不深刻，仍轻轻地放了过去。崔彦彩曾追问写稿给人民日报的人，我们知道后只要他写检讨，也未作适当处理。原太原市永茂分公司监理、现职工医院副主任康济时的问题很严重（见三月一日人民日报），但我们没有及时处理，直到二月二十五日始令其停职反省，交代问题。总经理办公室主任兼党委会办公室主任蔡正华的问题（见三月三日人民日报）虽然在党委会上提出过，但以后也被搁置起来。这些都说明我们在处理问题上不认真、不坚决，对这些人姑息，撕不破脸皮。这种右倾思想变成反贪污运动很大的障碍。我们已认清了右倾思想的严重性，一定要加以彻底纠正。现在，上级党委已令我公司党委书记兼总经理李公侠停职反省，撤去崔彦彩、康济时、蔡正华的职务。我们感谢程序等同志的批评和帮助。"},{"type":"paragraph","text":"北京市建筑公司党委会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"252882a2c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
