<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美强盗飞机侵犯我领空并在公海上杀害我渔民我国防部发言人表示最强烈抗议指出美帝猖狂的严重军事挑衅，是同美苏勾结妄图破坏我文化大革命的罪恶阴谋分不开的。美帝对中国人民欠下的血债必须偿还。","authors":[],"dates":[{"year":1967,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京21日电　美帝国主义军用飞机二十日和二十一日多次侵入我海南岛西部领空，并在公海上扫射我渔船，打死我渔民一人、打伤三人。我国防部发言人对美国约翰逊政府派遣强盗飞机进行严重军事挑衅犯下的滔天罪行，表示最强烈抗议。"},{"type":"paragraph","text":"二十日九时零七分至十三时，二十一日五时至十一时二十一分，美国强盗飞机多次侵入我海南岛西部领空，进行军事挑衅。二十日下午一时三十分，美国强盗飞机两架在我海南岛以西公海上，向正在捕鱼的我广东省海康县乌石公社的十七号、十八号渔船进行疯狂扫射，当场打死我渔民麦建生，打伤我渔民张宏建、麦昌金、杨来顺三人，并把我渔船打坏。"},{"type":"paragraph","text":"我国防部发言人指出，美帝国主义这种猖狂的严重军事挑衅，是同它与苏联修正主义领导集团互相勾结，狼狈为奸，进行反华罪恶活动分不开的。最近它们一面加紧策划妄图扑灭越南人民抗美救国斗争的革命烈火，一面疯狂阴谋破坏中国无产阶级文化大革命。自从我们伟大领袖毛主席亲自发动和领导的这场史无前例的无产阶级文化大革命以来，它们就怕得要死，恨得要命，处心积虑地进行破坏捣乱。现在，正当我国无产阶级革命派进入大联合、向党内一小撮走资本主义道路当权派夺权的时候，美帝国主义悍然出动强盗飞机多次侵入我国领空，并在公海上杀害我渔民，又一次欠下了中国人民的血债，激起了中国人民和中国人民解放军指战员的极大愤慨。"},{"type":"paragraph","text":"发言人说，用毛泽东思想武装起来的伟大的中国人民不是好惹的。美帝国主义对中国人民欠下的血债，必须偿还。我国无产阶级文化大革命就是最大的战备，由毛主席亲手缔造的中国人民解放军是无产阶级革命派的强大后盾，是无产阶级专政的坚强柱石，我们决心在保卫无产阶级文化大革命中做出新的贡献。中国人民解放军遵照毛主席“我们务必不要松懈自己的警惕性”的教导，坚决贯彻中共中央军委关于抓革命、促战备的指示，坚守战斗岗位，随时准备消灭一切敢于来犯的敌人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b36cc84e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
