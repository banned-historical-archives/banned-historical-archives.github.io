],"dates":[{"year":1991,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界杯乒乓球赛产生八强"},{"type":"paragraph","text":"马文革复赛将遇瓦尔德内尔"},{"type":"paragraph","text":"据新华社吉隆坡９月１２日电  （记者丁宝忠）第１２届５５５世界杯乒乓球赛今晚结束预赛，Ａ组的金泽洙和佩尔森、Ｂ组的瓦尔德内尔和加蒂安、Ｃ组的格鲁巴和塞弗、Ｄ组的马文革和黄文冠获前八名复赛权。"},{"type":"paragraph","text":"王涛和江嘉良均在小组赛中排名第三而失去晋级机会。王涛虽以２∶０胜马来西亚的黄天赐，但以２１∶１６、１３∶２１、１５∶２１负于法国的加蒂安。江嘉良以２∶０胜尼日利亚的奥拉莱耶，但以０∶２负于比利时的塞弗。"},{"type":"paragraph","text":"Ａ组的竞争最为激烈，佩尔森、金泽洙、李根相都是２胜１负，最后以净胜局多少排出名次。"},{"type":"paragraph","text":"争夺半决赛权对阵双方是南朝鲜的金泽洙对法国的加蒂安，比利时的塞弗对加拿大的黄文冠，波兰的格鲁巴对瑞典的佩尔森，中国的马文革对瑞典的瓦尔德内尔。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"762f932330"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
