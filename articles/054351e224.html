script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"锡共“祖国”周刊载文指出  必须彻底批判南共修正主义  南共领导人对社会主义阵营的看法同资本家一样","authors":[],"dates":[{"year":1958,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"锡共“祖国”周刊载文指出"},{"type":"paragraph","text":"必须彻底批判南共修正主义"},{"type":"paragraph","text":"南共领导人对社会主义阵营的看法同资本家一样"},{"type":"paragraph","text":"新华社8日讯　科伦坡消息：锡兰共产党机关刊物“祖国”周刊（僧伽罗文）在5月17日刊载的一篇文章中指出，由于南斯拉夫共产主义者联盟领导人在国际工人运动的许多原则性问题上坚持修正主义立场，因此有必要予以彻底的批判。"},{"type":"paragraph","text":"文章在批判南共纲领中关于资本主义国家性质的谬论时指出，马克思主义的一个基本原则就是国家应该在一个阶级的治理之下。如果说，国家在阶级之上，难道这不是拒绝了马克思主义吗？"},{"type":"paragraph","text":"文章驳斥了南共领导人关于世界和平的主要障碍是世界分为两个集团的荒谬说法，文章指出，南共领导人在签署了指出帝国主义制造战争（这是马克思列宁主义的基本原则）的和平宣言之后，把两个阵营等量齐观，文章指出，南共领导人对社会主义阵营的看法同资本家一样。因此，他们不直接接受工人阶级政府是社会主义的说法，他们企图抹煞社会主义国家为维护和平所做的工作。这是一种欺骗。"},{"type":"paragraph","text":"文章说，今天，大家一致公认反对战争的是社会主义国家、世界工人阶级、独立的国家以及千百万爱好和平的人民。希望战争的是北大西洋公约组织国家。当真理摆在眼前的时候，硬说和平由于两个阵营而受到威胁，这不是拒绝马克思列宁主义是什么？"},{"type":"paragraph","text":"文章还驳斥了南共纲领中关于美国可以在工会领导下“建立社会主义国家”的荒谬说法。文章说，历史证明，如果没有一个有组织的政党，工人阶级不能胜利地建立社会主义国家。伟大的十月革命以及中国人民的伟大革命都证明了这一点。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"054351e224"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
