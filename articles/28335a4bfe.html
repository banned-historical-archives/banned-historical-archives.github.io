{"year":1976,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市财政局二分局理论小组"},{"type":"paragraph","text":"中共中央关于撤销邓小平党内外一切职务的决议指出:“中共中央政治局讨论了发生在天安门广场的反革命事件和邓小平最近的表现，认为邓小平问题的性质已经变为对抗性的矛盾。”邓小平问题的性质为什么会发生转化?它是怎样转化的?弄清这个问题，有助于我们把批判邓小平、反击右倾翻案风的斗争进行到底。"},{"type":"paragraph","text":"毛主席指出:党内斗争“在开始的时候，或在个别的问题上，并不一定马上表现为对抗性的。但随着阶级斗争的发展，这种矛盾也就可能发展为对抗性的”。(《矛盾论》)这就告诉我们，矛盾由非对抗性转化为对抗性总是有一个发展过程的。就拿邓小平来说，他本来是跑到革命队伍里来的资产阶级民主派。在新民主主义革命时期，虽然他从来不想实现党的最高纲领，但他对党的最低纲领还能不同程度地接受，因此，成为党的同路人。全国解放以后，邓小平身子虽然进入了社会主义社会，但思想还停留在民主革命阶段，顽固地坚持资产阶级民主派的立场和世界观。从反对农业合作化到反对人民公社化，从支持包产到户到反对文化大革命，他的这种种行动表明他在修正主义的道上越滑越远，成了党内走资本主义道路的当权派。文化大革命中，经过毛主席、党中央的挽救和广大群众对他的批判救助，他大表《悔过》之意，并保证“永不翻案”；但是，他重新工作后，又带头刮起右倾翻案风，这就使他的问题的性质向着对抗性的方面发展。"},{"type":"paragraph","text":"辩证唯物主义告诉我们，矛盾的性质从非对抗性发展为对抗性，必须具备一定的条件。“如果犯错误的同志能够改正自己的错误，那就不会发展为对抗性的东西。”(《矛盾论》)正是从这一点出发，所以，在伟大领袖毛主席亲自发动和领导的反击右倾翻案风的斗争中，广大工农兵群众遵照毛主席关于“惩前毖后，治病救人”的教导，对邓小平的修正主义路线进行了严肃的斗争。但是，邓小平顽固坚持反动立场，装聋作哑，态度十分恶劣。这种态度实际上是挑动一小撮阶级敌人向党进攻。于是，一小撮亡命之徒就迫不及待地跳出来，妄图用外部冲突的反革命暴乱来扭转批邓的大方向，并把邓小平抬出来充当中国的纳吉。这就告诉我们，邓小平是一小撮阶级敌人在党内的总后台、总代表，是天安门广场反革命政治事件的罪魁祸首。邓小平的恶劣表现为他自己的问题转变为对抗性的矛盾创造了条件。事实再一次说明，一切机会主义路线头子改也难。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28335a4bfe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
