rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"美国朋友渴望学习毛泽东思想他们来信表示，决心用毛泽东思想同美帝残暴统治进行坚决斗争","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 一些美国朋友最近在给中国有关机构的来信中，表示要通过认真学习毛泽东思想，来同美帝国主义的残暴统治进行坚决的斗争。"},{"type":"paragraph","text":"一位美国工人在信中说，他曾读过中国的一些出版物和杂志，认识到：“毛泽东思想是全世界工人的指路明灯”。这位工人写道，在美国，被剥削的劳动人民，只有用毛泽东思想进行斗争，才能打倒剥削者。信中说，“劳动果实本来是我们的，它应该归于我们。”"},{"type":"paragraph","text":"这位工人在信中表示希望得到更多的中国出版物。他说，在美国，“很多人都渴望知道关于中国文化大革命的真实情况”。"},{"type":"paragraph","text":"另一位美国人从洛杉矶来信中一开头就引用了一段毛主席语录：“这个军队具有一往无前的精神，它要压倒一切敌人，而决不被敌人所屈服。不论在任何艰难困苦的场合，只要还有一个人，这个人就要继续战斗下去。”"},{"type":"paragraph","text":"他在信中写道：“在洛杉矶这个地方，我通过学习《毛主席语录》，掌握毛泽东思想，使我充满了力量。”他说，不论在任何艰难困苦的场合，为了毛泽东思想在洛杉矶取得胜利，我要继续战斗下去。"},{"type":"paragraph","text":"这位美国人写道，为了宣传毛泽东思想，他还曾把《毛主席语录》送给两位黑人劳动者。这黑人在得到红色宝书后都十分高兴，表示要认真的学习。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d72755870"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
