["新华社"],"dates":[{"year":1957,"month":9,"day":9}],"is_range_date":false,"parts":[{"text":"福建揪出一批隐蔽的右派分子","type":"title"},{"text":"新华社","type":"authors"},{"text":"《人民日报》讯：福建省各地机关揭发出了一批隐蔽的右派分子。","type":"paragraph"},{"text":"龙岩县邮电局的右派分子李培腾，他不但利用另一右派分子林生彬的弱点，背地捏造各种材料供给和支持林生彬向共产党向社会主义进攻；在林生彬被揭发批判后，他又教唆林生彬如何作假检讨，企图帮林生彬蒙混过关，来掩护自己。但，随着斗争的深入开展，他的丑恶面貌终被揭露。南平航管处职工陈秉华、叶仪生等在受到反右派斗争的教育，辨明了是非后，也揭发出了一个巧妙伪装起来的右派骨干分子齐国瑄。这个狡猾的右派分子在鸣放座谈会上不是一言不发，就是提了一些小问题，在暗地里则又打扮成一个富有“同情心”的“好人”，运用个别谈心、欺上瞒下等手段拉拢和煽动一小撮对共产党不满的分子，猖狂向党进攻。","type":"paragraph"},{"text":"——原载《人民日报》1957年9月9日，原标题为“不管如何伪装也难逃群众耳目　福建揪出一批隐蔽的右派分子”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5143f0d3bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
