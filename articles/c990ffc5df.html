tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入第一线指挥作战——某师各级领导干部与连队定点挂钩抓好揭批“四人帮”的情况调查","authors":[],"parts":[{"type":"paragraph","text":"今年初，北京部队某师党委为了抓好揭批“四人帮”这个全年的中心任务，作出了正营职以上干部与连队定点挂钩的决定。到九月底，全师一百多名正营职以上干部，分别与五十多个连队挂钩，实行具体帮助；平均每人在挂钩连蹲点一百一十天，其中十名师团军政第一把手平均深入和蹲点一百三十七天。各级领导象战争年代打仗那样，在第一线上领导揭批“四人帮”的伟大斗争，带动了部队各项任务的大干快上。全师到九月底，提前两个月超额百分之二十六完成年度施工任务，训练和生产形势也很好，三个营荣立集体三等功，五个连荣立集体二等功，十六个连荣立集体三等功。"},{"type":"paragraph","text":"如何领导好揭批“四人帮”的斗争？这个师党委年初回顾战争年代指挥员上第一线的情景，吸取昔阳县委“定点包干”的经验，下决心到第一线领导好揭批“四人帮”的伟大斗争。他们采取各级领导与连队定点挂钩的措施，党委统一调整力量，使全师平均每个连队经常有两个营以上领导干部具体帮助。为了保证效果，到目前为止，党委已三次派出工作组了解正营职以上干部定点挂钩情况，并且通报表扬好的，批评差的，较好地坚持了这项规定。"},{"type":"paragraph","text":"这个师党委经过今年以来的实践，认为领导与连队定点挂钩，有以下几点好处："},{"type":"paragraph","text":"首先，各级领导长期蹲在连队，对揭批“四人帮”的情况了解得深和细，解决问题也就比较及时、准确、主动。"},{"type":"paragraph","text":"其次，较好地克服了过去每次运动“搞试点抓先进，后进连队无人问”的现象，使揭批“四人帮”的斗争全面深入地发展。"},{"type":"paragraph","text":"第三，定点挂钩是切实改进领导作风的有效措施，促进了部队各项工作的发展。"},{"type":"paragraph","text":"还有一个好处是，师团领导有了挂钩连，精简了会议、汇报，带动了机关建设。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c990ffc5df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
