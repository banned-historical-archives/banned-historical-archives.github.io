art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"恩克鲁玛总统给毛主席的信","authors":[],"parts":[{"type":"paragraph","text":"新华社五日讯 毛泽东主席收到了加纳总统恩克鲁玛十月二十六日就中国爆炸原子弹一事给他的来信。来信全文如下："},{"type":"paragraph","text":"毛泽东先生阁下："},{"type":"paragraph","text":"亲爱的毛泽东主席："},{"type":"paragraph","text":"据最近的报道，中国爆炸了一个核装置，我愉快地借此机会给你写这封简短的信。虽然中国这一意义重大的技术进步肯定地说明发展中的国家只要具备了必要的人力和物质资源就能够做出什么事情，但是，我们象中国一样关心我们人民的进步和福利，必然对把我们有限的资源花费在核武器上面感到有些不安。中国要求全面销毁核武器的呼吁无疑是基于对这一原则的正当的承认，是很值得赞扬的。"},{"type":"paragraph","text":"因此，我们当中真正关心世界和平和进步的人，有必要坚定地努力消除现正威胁着人类的核灾难的阴霾和恐惧。"},{"type":"paragraph","text":"现在是促使社会主义阵营融洽起来的时候了，因为加强社会主义阵线是防止战争的主要的、最可靠的方法。它也为反对帝国主义提供坚实的基础，并且加强非洲和亚洲的解放运动。"},{"type":"paragraph","text":"祝我们在反对人剥削人和帝国主义的斗争中所作的共同努力取得胜利。"},{"type":"paragraph","text":"顺致深切的敬意和诚挚的良好祝愿。"},{"type":"paragraph","text":"总统克瓦米·恩克鲁玛"},{"type":"paragraph","text":"一九六四年十月二十六日"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a807cd11d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
