:[],"dates":[{"year":1983,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英为《纵横》题词并发表谈话"},{"type":"paragraph","text":"用历史知识激励青年为祖国奋斗"},{"type":"paragraph","text":"据新华社北京九月二十七日电即将出版的《纵横》丛刊第二期将刊登叶剑英同志九月十一日为《纵横》的题词：“办好纵横教育青年”。"},{"type":"paragraph","text":"《纵横》丛刊是全国政协文史资料研究委员会根据周恩来同志生前关于“用历史知识教育启发后代”的意见创办的青年文史读物，今年七月出版了第一期。"},{"type":"paragraph","text":"叶剑英同志最近对《纵横》丛刊记者发表谈话说：对青年进行爱国主义的教育，这是很重要的。在我们伟大的国家里，一百多年中，出了许多被人民交口传诵的英雄，也出现了许多激奋中华民族的事迹。五四以来，在中国共产党的领导下，这些不朽的人和事就更多了。你们进行历史知识的介绍，将激励广大青年人，使他们从过去看到现在，温故而知新，为爱国、为社会主义、为不断提高共产主义思想觉悟而奋斗。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"484cc3ba47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
