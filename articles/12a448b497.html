rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中共八大二次会议开幕刘少奇同志作形势任务和社会主义建设总路线报告邓小平同志报告说明莫斯科会议和宣言的重大意义","authors":["邹健东"],"parts":[{"type":"paragraph","text":"新华社5日讯 中国共产党第八届全国代表大会第二次会议今天下午三时在北京举行。"},{"type":"paragraph","text":"会议在由毛泽东同志宣布开幕后，就由刘少奇同志代表党中央委员会作工作报告。报告的内容是：目前形势，，党的社会主义建设的总路线和今后的各项任务。他的报告继续到下午六时。"},{"type":"paragraph","text":"接着，邓小平同志作了关于各国共产党和工人党的莫斯科会议的报告。他在报告中说明了莫斯科会议和莫斯科宣言的重大意义，并且对以南斯拉夫共产主义联盟的纲领为代表的现代修正主义作了批判。"},{"type":"paragraph","text":"今天的会议在下午七时五十分结束。会议将自6日起进行小组讨论。"},{"type":"paragraph","text":"刘少奇同志在会上作中央委员会的工作报告。 新华社记者 邹健东摄"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12a448b497"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
