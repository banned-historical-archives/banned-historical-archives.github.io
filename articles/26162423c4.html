art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见美国商务部长克雷普斯"},{"type":"paragraph","text":"邓小平副总理五月十日上午会见了美国商务部长朱厄妮塔·克雷普斯。"},{"type":"paragraph","text":"邓副总理同克雷普斯部长就进一步扩大中美之间的经济贸易关系交换了意见。双方表示要为保持中美经济贸易关系发展的势头作出努力。"},{"type":"paragraph","text":"会见后，邓副总理回答了随同克雷普斯部长来访的美国记者提出的问题。在回答有关美苏第二阶段限制战略武器协议的问题时，邓副总理说：“我在以前说过，不要把希望放在协议上，任何协议都约束不了苏联。”"},{"type":"paragraph","text":"耿飚副总理欢宴托尔博伊斯副总理和夫人一行"},{"type":"paragraph","text":"国务院副总理耿飚五月十日晚上在人民大会堂举行宴会，欢迎新西兰副总理布赖恩·托尔博伊斯和夫人一行。"},{"type":"paragraph","text":"耿飚副总理在讲话中赞扬新西兰政府主持公道，反对越南对柬埔寨的侵略，呼吁越南从柬埔寨撤军。他说：“中国政府愿意同新西兰政府和人民一道，为维护东南亚地区的和平和安全继续努力。”"},{"type":"paragraph","text":"托尔博伊斯副总理说，新西兰坚信，“维护这个地区的和平和稳定的一个主要条件是本地区的所有国家承认他们邻国的独立和领土完整。”"},{"type":"paragraph","text":"中美两国政府关于互办贸易展览会协议在京签字"},{"type":"paragraph","text":"我国外贸部长李强和美国商务部长朱厄妮塔·克雷普斯分别代表本国政府，五月十日晚上在这里签署了《中华人民共和国政府和美利坚合众国政府关于举办贸易展览会的协议》。"},{"type":"paragraph","text":"协议说，双方相信举办展览会将大大有助于双边贸易关系的发展。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26162423c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
