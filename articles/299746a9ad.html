<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"撤除了曹漫之职务　右倾邪气大降市民政局打虎运动收获丰硕","authors":[],"dates":[{"year":1952,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市民政局暨所属单位的打虎运动，在搬掉了“绊脚石”和批判了右倾思想以后，已由停滞不前的情况进入到群情高涨、士气振奋的新阶段。现在，该局暨所属单位的打虎队都在英勇地战斗着；战果在扩大中。"},{"type":"paragraph","text":"第一战役中，该局暨所属单位各打虎队的领导方面，普遍地存在着严重的右倾思想；对敌情估计不足，认为民政局是政权机关，不是经管钱财的部门，不会有什么大老虎，因而缺乏打虎信心。同时，对群众提供的线索、材料，总觉得是浮面现象，不具体；但又不进行深入调查和研究，甚至为老虎的伪装所迷惑；看见老虎痛哭流涕，具结保证，就软了手。例如，该局所领导的军属互助社供销处有一个盗骗了国家财产至少有八亿之巨的大老虎，虽经群众检举，但该局优抚处领导上犹豫不决，不敢肯定，让这只老虎仍能逍遥自在。"},{"type":"paragraph","text":"自听取了陈毅同志的报告，并经市府对部分手面不净、打虎不力的领导干部作出处分后，该局暨所属单位的打虎运动才有开展。特别是当中共上海市委给予该局局长、坏分子曹漫之以开除党籍和撤除职务后，右倾邪气大降，各打虎队的军心大振。领导上又连夜召开会议，运用批评与自我批评的武器，分别作了检讨，初步扫除了右倾思想。同时，又克服了以往脱离实际的偏向，领导亲自上火线，深入战场督战。该局屠基远副局长亲自深入第一劳动教养所，民政处夏雨处长深入新人习艺场，当即获得成绩。劳动教养所的打虎队，在七个小时内即捕擒大老虎两头。而供销处盗骗国家财产至少有八亿元的大老虎，也露出了原形。第二战役的战果大大超过了第一战役。"},{"type":"paragraph","text":"该局暨所属单位的打虎队，士气勇猛，乘胜追击，在第三、四两战役中，又扩大了战果。特别是第四战役，运用“三宝齐放”、“攻心斗智”的战术，收获更大。狡诈多辩的顽虎纷纷落网。"},{"type":"paragraph","text":"【又讯】十日，该局增产节约委员会召开了反贪污大会，到所属三个被服厂、一个毛巾厂、物资供销处、互助服务社(包括黄浦、中山、襄阳、复兴、虹口五公园所设分社)，新人习艺场和三个游民教养所的职工以及贪污分子家属共四百余人。会上，把盗窃国家大批资财、损害人民解放军战士健康、拒不坦白的大贪污犯史久茂予以逮捕法办(经市军管会及人民政府批准执行)；对坦白较诚恳、并愿退赃、有悔过自新表现的贪污分子张泽民(供销处会计主任)、江文华(中山公园互助服务社经理)、周焕章(黄浦公园摄影员)三人予以宽大处理，令其深刻反省，立功赎罪。这些活生生的事例明确地说明了教育与惩办相结合的政策。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"299746a9ad"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
