rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"致电毛主席表示热烈祝贺林彪同志收到武元甲和阮明芳的贺电贺信","authors":[],"parts":[{"type":"paragraph","text":"新华社三十一日讯 毛主席收到了越南南方民族解放阵线中央委员会主席团主席阮友寿打来的电报，热烈祝贺我国新的核爆炸成功。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"毛泽东主席："},{"type":"paragraph","text":"听到中华人民共和国在一九六六年内成功地进行了第三次核试验的消息，我非常高兴。我代表越南南方人民、越南南方民族解放阵线中央委员会，并以我个人的名义，向敬爱的主席，向中国共产党、中华人民共和国政府、中国人民解放军、中国工人兄弟姐妹们、中国科学技术人员和全体兄弟的中国人民致以最热烈的祝贺。"},{"type":"paragraph","text":"越南南方人民和越南南方民族解放阵线，对于中国科学技术的迅速发展，感到十分高兴，这对我们的抗美救国事业是一个强有力的鼓舞，对加强反对以美帝国主义为首的帝国主义和殖民主义的力量是一个极其重大的贡献，有助于保卫亚洲和世界的和平。"},{"type":"paragraph","text":"祝伟大的中国人民，在以敬爱的毛主席为首的中国共产党的领导下，为了建设一个富强的中国，在科学技术和其他方面取得更加辉煌的胜利。"},{"type":"paragraph","text":"越南南方民族解放阵线中央委员会主席团主席 阮友寿律师"},{"type":"paragraph","text":"一九六六年十二月三十日于越南南方"},{"type":"paragraph","text":"新华社三十一日讯 国务院副总理兼国防部长林彪收到了越南民主共和国副总理兼国防部长武元甲大将发来的电报，热烈祝贺我国新的核爆炸成功。"},{"type":"paragraph","text":"电报祝兄弟的中国人民在以毛主席为首的光荣的中国共产党领导下取得更多、更巨大的胜利。电报说：“中国的这次核试验，是在中国成功地进行导弹核武器试验刚两个月之后进行的，是中国人民的新的巨大的胜利。这件事证明了中国的核武器科学技术发展极为迅速。这对越南军民的抗美救国事业和对亚洲、非洲、拉丁美洲人民的民族解放斗争运动是一个强有力的鼓舞，同时对保卫世界和平事业是一个大贡献。”"},{"type":"paragraph","text":"新华社三十一日讯 国务院副总理兼国防部长林彪收到了越南南方民族解放阵线常驻中国代表团代理团长阮明芳的贺信，对我国新的核爆炸成功表示热烈祝贺。"},{"type":"paragraph","text":"贺信说：“这是在以毛主席为首的党和政府的领导下，不断巩固和发展着的中国现代国防科学事业所取得一个新的进展。它起着加强中国的国防力量和世界人民的革命力量的作用。它给予美帝国主义的战争政策和核讹诈政策以迎头痛击，它对正在反对美帝国主义侵略的越南南方人民和为独立、民主和保卫世界和平而斗争的世界人民是一个强有力的鼓舞。”RW：阮友寿；越南南方民族解放阵线主席；贺电"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32017b2d2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
