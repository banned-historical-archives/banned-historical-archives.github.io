ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"谈恋爱三原则","alias":"","parts":[{"type":"paragraph","text":"谈恋爱三原则！"},{"type":"paragraph","text":"（1937年）"},{"type":"paragraph","text":"第一条原则即政治上一致的原则。现在的革命任务是抗日救国，将来还要实行共产主义，男女之间的爱情首先要有这个基础，我们能爱敌人吗？能同汉奸、卖国贼谈情吗？只有政治上的志同道合才有可能说到此人可爱不可爱。第二个原则即是双方自愿，绝非单方面愿意。我们主张男女平等，我们反对男尊女卑，我们反对大男子主义，更不能有变相的强迫。第三个原则即是不妨碍工作。在青年中要提倡工作第一，绝不能恋爱第一。更不能“若为恋爱故，万事皆可抛”。"},{"type":"paragraph","text":"[1]这是毛泽东关于谈恋爱原则问题在《人民日报》上发表的一篇文章的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1937}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":457,"page_end":457},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9e5ef27fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
