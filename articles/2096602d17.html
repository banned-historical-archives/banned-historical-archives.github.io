tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席的无产阶级革命路线胜利前进——反映长征事迹的《万水千山》剧照选登","authors":[],"parts":[{"type":"paragraph","text":"（照片一）硝烟弥漫，星月无光，红军血战在“望娘石”旁。危急中，毛主席给战士送来指北针，“有了它，我们就永远不会迷失方向！”"},{"type":"paragraph","text":"（第一幕：蛇江激战）"},{"type":"paragraph","text":"（照片二）毛主席的民族政策感人肺腑，使仇恨的弓箭换成欢乐的皮鼓。工农红军是自己人啊，“咱彝人给你们摆站带路！”"},{"type":"paragraph","text":"（第四幕：彝寨新歌）"},{"type":"paragraph","text":"（照片三）遥望遵义会议的灯火，谁能入睡？东风吹来，“迎春亭”外梅松竹相映生辉。“革命得救了！红军得救了！”"},{"type":"paragraph","text":"军民欢呼毛主席又回到统帅的岗位。"},{"type":"paragraph","text":"（第二幕：遵义春晓）"},{"type":"paragraph","text":"（照片四）还是昨天的人，昨天的枪，今天声东击西锐不可当。四渡赤水，力挽狂澜，全靠毛主席拨正了航向！"},{"type":"paragraph","text":"（第三幕：运动歼敌）"},{"type":"paragraph","text":"（照片五）火网交织，恶浪翻滚，"},{"type":"paragraph","text":"天险大渡河，你挡不住我们！"},{"type":"paragraph","text":"受苦的船工，抗日的红军，"},{"type":"paragraph","text":"是毛主席在亲自指挥前进！"},{"type":"paragraph","text":"（第五幕：飞渡天险）"},{"type":"paragraph","text":"（照片六）挺起腰，迈开步，向北走！雪山低了头，草地在发抖。毛主席正在前面给我们引路，毛主席正在前面向我们招手！"},{"type":"paragraph","text":"（第七幕：草地红光）"},{"type":"paragraph","text":"（照片七）铁骨钢筋怎样铸成？最艰难的时刻想念最亲的人。回忆起初上井冈毛主席那席话，红军喊出了：“让革命骑着马前进！”"},{"type":"paragraph","text":"（第八幕：铁骨钢筋）"},{"type":"paragraph","text":"（照片八）宣言书，宣传队，播种机，“长征是历史纪录上的第一次”！在毛主席团结胜利的旗帜下并肩前进，看啊，新的革命高潮正云涌风起！"},{"type":"paragraph","text":"（第十幕：胜利会师）（照片）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2096602d17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
