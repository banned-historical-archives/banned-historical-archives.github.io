ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"向南京面交国防计划等事","alias":"","parts":[{"type":"paragraph","text":"向南京面交国防计划等事川"},{"type":"paragraph","text":"（1937年8月3日）周、博，并告叶："},{"type":"paragraph","text":"（甲）国防计划宜由周（恩来）、朱（德）、叶（剑英）携往面交，不宜由电报拍往。（乙）此种计划我们正在考虑中。请将你们商定者，连同红军作战的方针、步骤等，一并于今日电告。（丙）关于日寇西进危险、中苏国交及红军抗日须求彼方协助等，已分电战土与书记处。（丁）此次赴宁须求得下列问题一同解决：（一）发表宣言。（二）确定政治纲领。（三）决定国防计划。（四）发表红军指挥系统及确定初步补充数量。（五）红军作战方针。"},{"type":"paragraph","text":"洛毛"},{"type":"paragraph","text":"江辰[1]这是毛泽东和洛甫（张闻天）给周恩来、博古（秦邦宪）并告叶剑"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":8,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":512,"page_end":512},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f785f6fdd4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
