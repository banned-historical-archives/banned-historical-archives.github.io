year":1980,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一件具有深远意义的盛事"},{"type":"paragraph","text":"邓小平"},{"type":"paragraph","text":"在中日人民友好往来和文化交流的历史长河中，鉴真是一位作出了重大贡献，值得永远纪念的人物。他应日本留学僧荣睿、普照之请，以百折不回的毅力，经过五次东渡失败，双目俱盲之后，终于到达了日本，完成了他的使命。"},{"type":"paragraph","text":"我前年访日时，在奈良唐招提寺见到了鉴真塑像，诚如历代诗人学者所赞叹的，它具有非常高的艺术性，表现出鉴真的坚强意志和安详风度。一千二百余年来，日本人民把它作为国宝，精心保护和供奉到今天，值得我们敬佩和感谢。"},{"type":"paragraph","text":"现在，在日本政府支持下，日本文化界和佛教界人士，把国宝鉴真像郑重地送来中国供故乡人民瞻仰。这是一件具有深远意义的盛事。它必将鼓舞人们发扬鉴真及其日本弟子荣睿、普照的献身精神，为中日两国人民世代友好事业作不懈努力。（附图片）"},{"type":"paragraph","text":"（为《鉴真大师像回国巡展纪念》集而作）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a04661b3ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
