":[{"year":1980,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金缕曲  二首"},{"type":"paragraph","text":"敬悼刘少奇同志"},{"type":"paragraph","text":"吴丈蜀"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"挥泪怀先烈。忆当年，空拳只手，乾坤变革。几度铁窗经考验，不失英雄本色，志不改丹心坚决。学运燕京燃烈火，安源矿更引怒潮发。江汉浒，针锋敌。江淮运筹才卓越，苦斗争，寇师溃败，伪奸颠蹶。抗战功成来不易，四处硝烟复炽。党政军多凭谋策。宵旰何辞心力瘁，看反动王朝终覆灭。功不朽，昭日月。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"历史开新页。旧山河，疮痍满目，待兴百业。辅弼中枢资臂助，费尽许多心血！革命家恢宏气魄。狐鼠夺权谋篡党，加构陷手段何卑劣！功翻罪，尧为桀。十年动乱成浩劫。千夫指，群魔落网，灾消祸绝。拨乱从头臻反正，一大奇冤昭雪。喜音传全民欢悦。此日九州皆缟素，悼元勋亿万同呜咽。成四化，慰英杰。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c034eb063"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
