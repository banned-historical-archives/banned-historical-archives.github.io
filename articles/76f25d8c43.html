tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东大战略》一书出版","authors":["刘国利"],"parts":[{"type":"paragraph","text":"由军事科学院战略研究部撰写的《毛泽东大战略》一书，近日由解放军出版社出版。"},{"type":"paragraph","text":"该书是军事科学院重点研究课题，国务院新闻出版总署确定的纪念毛泽东诞辰110周年重点图书之一。"},{"type":"paragraph","text":"毛泽东是举世公认的大战略家，在领导中国革命、推翻“三座大山”和建设新中国的漫长征程中，他以常人所难以比肩的远见卓识，运筹帷幄、高瞻明断，指挥了一场场波澜壮阔的革命战争，创造了一个又一个惊天动地的伟业，为中国革命从胜利走向胜利，为中国社会摆脱半殖民地半封建的悲惨屈辱命运，走向独立自主，开辟了光明的道路。全书从革命战略、地缘战略、建党战略、建军战略、人民战争战略、军事战略、统战战略、反霸战略、强国战略、祖国统一战略、国家安全战略和国际战略等十二个方面，系统地论述了毛泽东博大精深的战略思想，并精辟地分析了毛泽东的战略思维特色，具有重要的理论研究价值和现实意义。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76f25d8c43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
