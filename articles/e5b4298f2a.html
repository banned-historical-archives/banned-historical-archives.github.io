es":[{"year":1952,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【南京讯】南京高等教育界为了在三反运动、特别是在反贪污运动的基础上，进一步检查资产阶级思想作风，划清资产阶级与工人阶级思想界限起见，定本月廿二日到三月八日止，继续进行两周零两天的学习。这次学习重点主要在检查、分析和批判各个人在人生态度、工作(学习)态度、生活作风、工作关系等方面所表现的资产阶级的唯利是图、损人利己等思想作风。"},{"type":"paragraph","text":"检查分三个阶段进行:第一、阅读文件、听报告，结合三反运动中的具体事实与实际体会，把共产主义与资本主义、工人阶级与资产阶级划清界限；第二、就各个单位与各个人资产阶级思想作风最突出的表现进行深入检查、大胆暴露，开展批评与自我批评；第三、进行个人总结。"},{"type":"paragraph","text":"廿二日下午，市文教委员会石西民副主任委员在金大礼堂向全市高等教育界一千余人作动员报告。"},{"type":"paragraph","text":"【又讯】南京大学为了有计划有步骤的开展这次学习，成立南京大学学习委员会学生支会来领导学习。在各院再设立工作组，各系成立支会，采取小组集中方式以发挥集体精神。学习时间，原则上定上午(八时到十一时半)阅读资料，下午(一时到四时)开会、讨论、漫谈，晚上为系级干部学习党团组织生活时间。而所有时事读报及文体活动仍照常开展。　(蒋志惠)"}],"comments":[],"origin":"南京","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5b4298f2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
