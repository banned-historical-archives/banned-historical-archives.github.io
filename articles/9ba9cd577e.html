罢工和集会","authors":[],"dates":[{"year":1970,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本的残酷剥削"},{"type":"paragraph","text":"法国三十万邮电系统职工罢工"},{"type":"paragraph","text":"码头工人和煤矿工人也纷纷举行罢工和集会"},{"type":"paragraph","text":"新华社巴黎二十七日电　法国各行业工人最近纷纷举行罢工，抗议垄断资本的残酷剥削，争取改善劳动条件。邮电系统的三十万名职工从二十六日开始举行为期一周的轮番罢工。二十七日，罢工扩大到巴黎、波尔多、克莱蒙费朗、利尔、南锡、普瓦蒂埃、雷恩、鲁昂、图卢兹、斯特拉斯堡、尼斯等城市。罢工工人要求缩短工作时间和保障就业。"},{"type":"paragraph","text":"法国第一大港口马赛的码头工人二十六日举行二十四小时罢工，要求增加工资和年金、改善劳动条件。二十五日，码头工人根据先前作出的在星期日不工作的决定，在这一天也没有装卸货物，马赛港口实际上瘫痪了四十八小时。"},{"type":"paragraph","text":"与此同时，洛林煤区的一万多名采煤工人仍在坚持一个多星期以前开始的罢工斗争。梅勒巴克煤矿的工人二十七日举行群众集会，决定把斗争坚持下去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ba9cd577e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
