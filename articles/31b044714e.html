[{"year":1967,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学习毛泽东思想参加反修斗争"},{"type":"paragraph","text":"不久前，我收到北京外文出版社寄来的《毛主席语录》和毛主席著作单行本。这真是没有想到的珍贵礼物啊！我马上把书都读了。"},{"type":"paragraph","text":"读毛主席的著作，越读越感到自己的不足。我深感到需要更加努力地学习毛主席著作，同时要做到活学活用。我决心读毛主席的书，用毛泽东思想来武装自己，坚定地参加日本的阶级斗争。我愿意做一个毛主席的忠实的学生。"},{"type":"paragraph","text":"我一定要更好地学习毛泽东思想，做毛主席的忠实的学生，彻底打倒修正主义。我亲身体会到，要与帝国主义和反动派进行斗争，就必须和修正主义进行斗争。我要更加努力地学习毛泽东思想。毛泽东思想是帝国主义走向灭亡，革命势力全面走向胜利时代的马克思列宁主义的顶峰。我要按照毛主席的指示斗争下去。"},{"type":"paragraph","text":"日本　谷川洋司"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31b044714e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
