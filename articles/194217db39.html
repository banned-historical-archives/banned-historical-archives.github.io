" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"谢富治接见外事系统代表讲话(摘录)","parts":[{"type":"title","text":"894.谢富治接见外事系统代表讲话(摘录)"},{"type":"paragraph","text":"(1967年8月9日)"},{"type":"paragraph","text":"外事系统大家都是辛辛苦苦地工作，但各个战线都有修正主义、资本主义、反对毛泽东思想的东西，外事系统不例外，要革命，要批判，这一点也要大家一致起来，外办我也去过一次，是资产阶级那一套。我到缅甸，就戴草帽，穿布鞋，人家说这个人有意思，尊重中国风格，把西服一穿不象样子，要看内容，不看形式。再一个是用钱大手大脚，送东西送多了，你们有从使馆来的，使馆为什么不中国化，要闹革命，按原来的样子，就不能支持那个地方的革命，缅甸是个典型，为了怕破坏关系，就不支持那个地方的革命，这是违反毛主席革命路线的，外交部许多地方需要批判，要有中国的外交，苏联是一套地地道道的资产阶级的，比资产阶级还资产阶级，我们为了跟人家一样，大使馆的房子和美国的房子一样，汽车、房子、吃饭，服装一概都是西方，不需要彻底批判啊？先从批判或为批斗统一起来，开大会一起多好啊！因为你们这样，和外国人搞斗争都搞不起来，和英国人作斗争搞不起来，现在搞的不是很大的原则分歧，几派，这个风气不提倡，当然你们好的是不搞武斗，武斗要坚决反对，江青同志说，文攻武卫，完全对，是讲“百万雄师”、“产业军”、“十大总部”，对“二·七”、“三钢”、“三新”、“八·二六”，他们围剿革命派，革命派要武装自卫，但我们机关学校的革命派占了优势，你们都不要跟人家乱抓帽子。搞武斗没有好下场，“百万雄师”专门训练武斗，四川“产业军”专门训练武斗，反对毛泽东思想，反对毛主席的革命路线，不听毛主席的话，不听毛主席司令部中央文革的话，人再多也不行，是纸老虎，没有好下场，千万不要武斗，那一派也不要搞武斗，要政治、思想上批透最大一小撮走资本主义道路当权派。"}],"authors":["谢富治"],"dates":[{"year":1967,"month":8,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":337,"page_end":338,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"194217db39"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
