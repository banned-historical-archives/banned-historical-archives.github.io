1967,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我要做毛主席的好学生"},{"type":"paragraph","text":"一位锡兰女教师努力学习毛主席著作。她经常用《毛主席语录》里的一段话激励自己去学习：“情况是在不断地变化，要使自己的思想适应新的情况，就得学习。”"},{"type":"paragraph","text":"她满怀激情地说，《毛主席语录》是我的行动指南。她随身携带《毛主席语录》，经常利用等公共汽车的时间学习这本宝书。她的丈夫学习毛主席著作也很积极。他说，中国人民用毛泽东思想改造自己、破私立公的生动事例，使他感受极深。他在谈到毛主席关于为全世界人民服务和斗争的教导时说：“这是马克思列宁主义的崇高思想。我愿意作毛主席的好学生”。"},{"type":"paragraph","text":"这位女教师和她的丈夫还抄录《毛主席语录》里的话贴在家里的墙壁上，要他们的孩子用心学习。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f72449a074"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
