开大学","张生彬"],"dates":[{"year":1957,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"大字报——人与“人”","type":"title"},{"text":"南开大学张生彬","type":"authors"},{"text":"[张生彬：南开大学中文系学生]","type":"subtitle"},{"text":"1、流沙河同志仅写了〈草木篇〉就被剥去了通信权，应声虫叫他“离开地球”。","type":"appellation"},{"text":"2、中文系在肃反中斗了三个同学，他们何罪之有？不得而知。可是他们带着心灵的创伤去工作，不知是否要带着创伤走进坟墓。","type":"appellation"},{"text":"3、我们怀着惴惴的心，防备那“整”的命运降临！我们没有自己的语言，像八哥一样重复着“整人阶级的辞句”，我们没有自己的行动，只配做“整人阶级”的影子。","type":"appellation"},{"text":"4、我们不仅要吃饱穿暖，更重要的是精神和个性的彻底解放！我们大学生要有自己的文艺刊物，我们要自己选出全国学生会、市区学生会。","type":"appellation"},{"text":"5、请校党委对肃反中的错误作深刻的检讨，并保证不犯此种类的错误。","type":"appellation"},{"text":"6、（特大的字）我们要自由，我们反对“金鱼缸”式的民主!","type":"appellation"},{"text":" 来源：1957年5月29日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c0a731e51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
