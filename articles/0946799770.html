art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英学术讨论会在穗举行","authors":["王洪/何德来"],"parts":[{"type":"paragraph","text":"本报广州5月30日电 王洪、记者何德来报道：在叶剑英元帅诞辰95周年之际，由中国军事科学学会和广东省中共党史学会共同主办的“叶剑英学术讨论会”于5月28日至30日在广州举行。"},{"type":"paragraph","text":"中顾委常委伍修权，中顾委委员王诚汉、任仲夷，广州军区司令员朱敦法、政委张仲先，广东省委书记谢非等领导同志出席了讨论会。"},{"type":"paragraph","text":"聂荣臻元帅生前为这次学术会题词赋诗。薄一波、王震、刘复之、耿飚、张震为会议发来了贺词贺信。"},{"type":"paragraph","text":"参加学术讨论会的代表们联系当前进一步改革开放和军队建设的实际，对叶剑英元帅在政治、经济、军事、外交、统战等领域的理论贡献与光辉业绩进行学习研究。大家结合学习邓小平南巡谈话，讨论叶帅积极倡导改革开放加速社会主义“四化”建设的理论思想，进一步坚定了坚持党的基本路线、坚持改革开放的政治信念。"},{"type":"paragraph","text":"叶帅长期从事革命军事斗争和担任军队的领导工作，在军队建设方面留下了许多宝贵思想理论。到会代表从军队工作的各个方面研讨了叶剑英同志的军事思想与军事理论。大家认为，这些军事思想理论对于今天人民军队革命化、现代化、正规化建设具有深远的历史影响，对于推动军队的质量建设具有重大的指导意义。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0946799770"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
