ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"对中央关于西藏问题复电稿的修改和批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于西藏问题复电稿的"},{"type":"paragraph","text":"修改和批语！"},{"type":"paragraph","text":"（1956年12月16日）"},{"type":"paragraph","text":"中央和毛主席历来认为改革一定要得到达赖、班禅?和僧侣领导人的同意，要各方条件成熟，方能实行。现在无论上层和人民条件都不成熟，所以自前几年都不能实行改革，中央认为第二个五年计划时期是不能实行的，第三个五年计划时期也还要看情况如何才能决定。但如果受外国指挥的反革命分子不通过协商而一定要通过"},{"type":"paragraph","text":"[1]中共西藏工委1956年12月12日电告中央，西藏拉萨等地可能发生暴乱。中央统战部于15日为中央代拟了关于西藏可能发生暴乱对策问题的复电。这份电报原只发给西藏工委，毛泽东审阅时在电头加写了“并发驻缅甸大使馆转周总理，另发驻印度大使馆知悉”等文字。本篇一是毛泽东对中央复电稿集中修改的一段，其中用宋体字排印的是他加写和改写的文字。"},{"type":"paragraph","text":"[2]达赖，即达赖喇嘛·丹增嘉措，西藏宗教领袖之一，当时任全国人大常委会副委员长、西藏自治区筹备委员会主任委员。班禅，即班禅额尔德尼确吉坚赞，西藏宗教领袖之一，当时任政协全国委员会副主席、西藏自治区筹备委员会第一副主任委员。毛泽东全集第三十七卷反叛和战争破坏十七条协议\"，把西藏情况打烂，那就有可能激起劳动人民起来推翻封建制度，建立人民民主的西藏。目前应把在六年内不改革的方针在党内在藏族上层普遍加以传达，工委可以在最近约自治区筹委会和噶厦的主要官员座谈，向他们说清上述中央的方针。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"少奇阅，即刻发，再送朱、陈、彭、谭、徐冰、洛甫、汉夫阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十六日"},{"type":"paragraph","text":"[1]指1951年5月23日在北京签订的《中央人民政府和西藏地方政府关于和平解放西藏办法的协议》，共有十七条。"},{"type":"paragraph","text":"[2]朱，指朱德。陈，指陈云，当时任中共中央副主席、国务院副总理。彭，指彭德怀，当时任中共中央政治局委员、国务院副总理兼国防部部长。谭，指谭政，当时任中共中央书记处书记、国防部副部长。徐冰，当时任中共中央统战部副部长。洛甫，即张闻天，当时任中共中央政治局候补委员、外交部常务副部长。汉夫，即章汉夫，当时任外交部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":12,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":190},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56b5fa537f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
