script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"富有战斗性的三反新闻特辑具体的表现了工人阶级领导人民战胜资产阶级的猖狂进攻","authors":["黄钢"],"dates":[{"year":1952,"month":2,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黄钢"},{"type":"paragraph","text":"目前上演的“反贪污、反浪费、反官僚主义新闻特辑”影片，它有一个总的主题:就是表现工人阶级领导人民战胜资产阶级的猖狂进攻。"},{"type":"paragraph","text":"这些新闻影片目前首先是显露了它的一个最大的特点，就是它反映实际生活中正在贯彻着的政策。在反映着人民群众所参加三反与五反运动的沸腾的热情，它用实际的斗争生活清楚地说明和交代了政策。它是在反贪污、反盗窃的运动中产生，又迅速地为这个运动服务的作品。"},{"type":"paragraph","text":"这样，通过这样的新闻影片，就看见了电影工作者的前锋部队——新闻纪录电影工作的党性和战斗性。"},{"type":"paragraph","text":"这些新闻特辑的又一个特色，就是它在表现方式上和效果上，是兼有着教育片的特点和作用的。它适当地采用了漫画、插图与说明，力求将事件交代清楚，不是陈腐的套用任何既成的格式。"},{"type":"paragraph","text":"从这里，我们就看见这些新闻影片明确的政治目的性。它完全是想直接地给观众解答问题，配合群众的爱国主义运动，推动实际斗争生活。一切编辑与拍摄都服从这个目的。"},{"type":"paragraph","text":"如像这新闻影片第二辑，它就插进了合式的漫画与图画解说。这完全是必要的、通俗化的解释。"},{"type":"paragraph","text":"在这影片的第一辑中，曾经通过大奸商刘元敬在军事工程上的危害性的具体实证，突出地表明了不法资本家恶毒的盗窃罪行。"},{"type":"paragraph","text":"北京电影厂即将出品的这项新闻影片的第三辑中，是摄自上海的，纪录着人民控诉祖国的叛徒暗害志愿军的血腥的罪行。这一辑影片由北影华东摄影队摄制，上海电影制片厂和上海联合制片厂协助完成。"},{"type":"paragraph","text":"在这些新闻影片摄制中，首要的原则就是在要求着我们的摄影员同志必须是爱情分明，每一个画面的拍摄，都被工人阶级的思想原则所指导。这当然是很难的。但势必如此才能够完成这种影片的拍摄任务。此外，还有一些同样重要的要求，如十分熟悉运动的情况和政府的政策，每一拍片前要求有周密的准备，以及有预见性的工作布署等等。"},{"type":"paragraph","text":"这种要求，对于参加这一新闻影片的每一工作人员，都是很重要的，是没有例外的。因此，这些影片的工作同志们，都毫不例外地把这工作当作是继续改造自己的思想，锻炼自己革命素质的严重任务。正因为任务之严重，而成熟的经验还有待摸索，所以大家的学习态度又是很一致的。"},{"type":"paragraph","text":"现在的希望是:请观众和同志们看过这三辑新闻影片后，对这类影片的制作多提出批评与建议，对人民电影事业继续进行协助和指导。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39dcd2e71d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
