ates":[{"year":1950,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海交大学生上书毛主席"},{"type":"paragraph","text":"决以具体行动反对美帝挑衅"},{"type":"paragraph","text":"【本报讯】上海国立交通大学全体学生签名上书毛主席称：我们全交大同学和全上海人民在一起，在您以及您所领导的党的领导下，曾经不惜流血牺牲坚决反对美蒋的罪恶统治，并且配合人民解放军摧毁敌人的统治。我们完全有信心在您的英明领导下继续团结起来，打败帝国主义的任何挑衅，解放全中国。我们坚决响应您的号召，拥护周总理兼外长的严正声明。我们决心用具体行动来反对美帝的挑衅，我们全校同学正在学习国际形势，已经完成了和平签名，并且即将出动参加和平签名运动的宣传工作，加倍的努力，更好完成目前正在进行的期考及学习总结运动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9127f945b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
