s":["何继芝","刘宝忠","北京矿业学院","尹毅夫"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——反对知识分子思想改造","type":"title"},{"text":"北京矿业学院刘宝忠尹毅夫何继芝","type":"authors"},{"text":"“知识分子要改造，如前清改民国，不能全部杀光，像做买卖一样，不改就卖不出去，所以大势所趋要适应潮流，改造也不是简单的，顽固分子是少数的，大多数是可以改造的，也不得不改造，毛主席改造知识分子就是废物利用，也不可能把中华民国的全杀掉，必须改变货色才能卖出去，这就像上海的改良服‘旧翻新’一样，不改也不行不然就要脱离群众，知识分子是必须改，但不要开倒车，不要连根拔，改的时候不要尾巴主义，改的思想要随潮流走。”（北京矿业学院  刘宝忠）","type":"paragraph"},{"text":"“党的知识分子政策非常小气，思想改造和肃反都是搞知识分子的，这些运动完了后，就来个知识分子政策，对吃，喝，拉，撤再给枣核含一含。”（北京矿业学院  尹毅夫）","type":"paragraph"},{"text":"“少数右派分子（指章，罗等的发言——原编者注）不能代表整个资产阶级。毛主席说：资产阶级要以资产阶级世界观来改造世界。这太夸张了。”（北京矿业学院  何继芝）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad83d3b5fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
