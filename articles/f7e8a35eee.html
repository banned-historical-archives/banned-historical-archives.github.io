dates":[{"year":1960,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝叛国集团倒行逆施"},{"type":"paragraph","text":"沙湾拿吉人民遭受严重剥削迫害"},{"type":"paragraph","text":"新华社河内18日电　寮国战斗部队电台17日广播：一些从沙湾拿吉到万象的职员和商人说，沙湾拿吉各阶层人民都受到富米·诺萨万—文翁·纳占巴塞叛国集团的严重剥削和迫害。他们禁止商人到任何地方经营，所有的商人都被他们监视和控制。有一些商人因被诬给富马亲王、政变委员会做间谍而被监禁。来自沙湾拿吉的人士说，叛乱集团的军队和警察已经两个月领不到薪饷。学生、职员也被迫当兵，每天都强迫进行军事训练。"},{"type":"paragraph","text":"他们揭露，沙湾拿吉叛国集团还禁止人民收听万象电台、寮国战斗部队电台的广播，禁止三人以上在一起，并且规定每户一人负责检查，如有任何违反上述禁令者，这个人都要负责任。一个商人说，目前的沙湾拿吉活像一个牢狱。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7e8a35eee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
