<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以宣传毛泽东思想为中心开展文化活动友好大队文化室被群众誉为“红色的社员之家”","authors":[],"dates":[{"year":1966,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　金山县廊下公社友好大队的文化室，建立一年来，以宣传毛泽东思想为中心，唱革命歌曲，讲革命故事，演革命戏剧，开展各种革命文化活动，使社员们的文化生活大大活跃起来。受到社员们的热烈欢迎，被大家称为“红色的社员之家”"},{"type":"paragraph","text":"友好大队在廊下公社的西北角，地位比较偏僻，交通也不便，过去社员们的文化生活比较枯燥。去年，通过社会主义教育运动，这里建立了文化室。文化室运用各种形式向社员们宣传毛泽东思想。除了教社员唱《大海航行靠舵手》、《毛主席的书我最爱读》等革命歌曲，为社员们表演《毛泽东思想放光芒》等戏剧节目，讲《雷锋》、《白求恩的故事》等革命故事以外，还先后进行了十二次毛主席著作学习辅导。去年三秋时，队里组织社员学习毛主席的《愚公移山》、《为人民服务》等著作，文化室就配合讲了《大寨之路》等革命故事。社员们通过学习受到很大启发，早出工，晚收工，使三秋工作搞得热火朝天。第七生产队有八个妇女种了块油菜田，因为天雨泥烂，坌地花工大，有四个妇女思想有些动摇，另外参加毛主席著作学习小组的四个妇女，懂得种田为革命的道理，就给她们讲愚公精神，大寨精神，这四个妇女很受感动，立即按质按量坚持坌到底。"},{"type":"paragraph","text":"大队文化室还把干部和群众学习毛主席著作中出现的先进事例，用黑板报、文娱演唱等形式，及时表扬宣传。如十二队学习毛主席著作比较好，文化室就画了六幅挂图，到各生产队进行介绍。九队有一对夫妻互相帮助，边识字，边学毛主席著作，学一点，用一点；文化室马上编了《夫妻学毛选，共同求进步》的宣传材料，进行宣传。文化室的黑板报还经常配合学习，登载毛主席语录以及群众学习毛主席著作的体会，以互相启发，互相促进。"},{"type":"paragraph","text":"由于文化室着重宣传了毛泽东思想，因而大大鼓舞了群众学先进、争上游的劲头，同时关心集体的好人好事也不断出现。这个大队有四个女青年学习了《为人民服务》后，看到一位军属生病，就争着去照顾她，帮她烧饭、烧水，还住到军属家里去陪她。这位军属十分感动，说毛主席教导的青年比自己的儿女还要亲。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2c7bb2773"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
