tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英元帅纪念馆在梅县举行开馆典礼","authors":["钟焰红/何平/陈婉雯"],"parts":[{"type":"paragraph","text":"据新华社广州10月22日电（通讯员钟焰红、记者何平、陈婉雯）叶剑英元帅纪念馆今天在叶帅家乡——广东省梅县雁洋镇雁上村举行开馆剪彩典礼，同时举行了叶帅铜像揭幕仪式。"},{"type":"paragraph","text":"国家主席杨尚昆为纪念馆题写了馆名，国家副主席王震为纪念馆剪彩并为铜像揭幕。"},{"type":"paragraph","text":"这座由海外乡亲捐建的纪念馆为两层建筑，近2000平方米。门楼两侧是表现叶帅生平事迹的浮雕像；叶帅身穿戎装铜像高2米，矗立在纪念馆门前左侧平台上。纪念馆内设5个展室，展出了叶帅的照片近300幅，生前用过的实物50件，其中包括叶帅使用过的卧具、办公用具，并按原样布置，翔实地记录了叶帅从探索革命真理、立志报效国家，到成为德高望重的开国元勋、党和军队杰出领抽的光辉历程，展示了叶帅“矢志共产宏图业，为花欣作落泥红”的革命情操。"},{"type":"paragraph","text":"中共广东省委书记林若在剪彩典礼上缅怀、赞扬了叶帅为中国人民的革命和建设事业立下的丰功伟绩。他说，在中国革命的许多重要历史转折关头，叶帅对革命无限忠贞，洞察大局，果敢善断，力挽狂澜，为党和人民作出了不可磨灭的贡献。功勋永载史册，英名长留人间。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c065631877"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
