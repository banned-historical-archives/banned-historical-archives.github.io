script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不顾朴正熙集团的残暴镇压  南朝鲜人民继续开展反压迫反剥削斗争","authors":[],"dates":[{"year":1974,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不顾朴正熙集团的残暴镇压"},{"type":"paragraph","text":"南朝鲜人民继续开展反压迫反剥削斗争"},{"type":"paragraph","text":"朝鲜《劳动新闻》谴责美国航空母舰驶进南朝鲜釜山港"},{"type":"paragraph","text":"新华社平壤一九七四年四月十七日电　汉城消息：南朝鲜青年学生和人民不顾朴正熙集团的残暴镇压，继续开展反压迫、反剥削的正义斗争。"},{"type":"paragraph","text":"据报道，四月九日，南朝鲜汉城大学工学院的五十多名学生举行了“批判政府会议”，并散发反对朴正熙集团的传单。朴正熙集团随即以违反“第四号紧急措施”为理由，把该学院学生会会长等非法赶出校门。四月十四日，伪当局又逮捕了汉城大学文理学院的一名学生。"},{"type":"paragraph","text":"报道说，南朝鲜文化界人士四月十一日向伪“汉城地方法院”递交了一份由二百八十多名文化界人士签名的文件，要求释放在今年一月二十六日被非法逮捕的文艺界人士，并对朴正熙集团的野蛮镇压行径表示愤慨。"},{"type":"paragraph","text":"在庆尚南道，马山的一家铜矿公司的三千多名工人，最近展开了要求增加工资和保障工人正常休息的斗争。这个道晋州的一家食品公司的工人，为反对反动当局阻挠他们组织工会，也进行了斗争。"},{"type":"paragraph","text":"朝鲜《劳动新闻》四月十七日发表评论指出，南朝鲜青年学生和人民将把已经开始的战斗引向最后胜利。“南朝鲜青年学生必将粉碎朴正熙法西斯暴徒的卖国叛族行径和‘维新’独裁，从而取得自由和解放。”"},{"type":"paragraph","text":"新华社平壤电　朝鲜《劳动新闻》最近发表评论，谴责美国航空母舰“中途岛号”以船员“休假”名义，于四月五日驶进南朝鲜釜山港。"},{"type":"paragraph","text":"评论说，正当南朝鲜青年学生开展反对朴正熙集团的斗争时，美帝“中途岛号”驶进南朝鲜，是“卖国贼朴正熙集团在美帝的唆使下，企图用武力来威胁奋起展开争取民主与和平统一的爱国斗争的南朝鲜青年学生和人民，以压制他们斗争的凶恶阴谋。”"},{"type":"paragraph","text":"评论说：“南朝鲜人民对于这种民族尊严和自主权遭到彻底蹂躏的情况，是决不会置若罔闻的。他们必将给侵略者和卖国贼以应有的惩罚。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61c7d560ff"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
