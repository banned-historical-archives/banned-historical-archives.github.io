rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东的“折本”讲课","authors":["方巨石山"],"parts":[{"type":"paragraph","text":"抗战初期，延安掀起学习哲学的热潮。毛泽东同志不仅要求大家积极学习，而且还身体力行，亲自给陕北公学、抗日军政大学讲课。"},{"type":"paragraph","text":"毛泽东同志虽然有很高的哲学造诣，但他仍十分重视备课这一环节。在一次给陕北公学讲课时，他用了四个晚上和三个白天的宝贵时间准备讲稿。讲课时，他那深入浅出的说理，形象生动的比喻，风趣幽默的话语，使学员们不断发出笑声，课堂气氛十分活跃。过后，郭化若到毛泽东处反映情况，毛泽东诙谐地说：“我折本了。”郭化若很诧异。毛泽东接着解释说：“我花了三天四夜才准备好了矛盾统一法则的讲课提纲，那知半天就讲完了，岂不折本了。”后来，毛泽东把这次的讲演稿整理发表，就是《矛盾论》。学而不厌，诲人不倦。一代伟人那孜孜以求，严谨治学的精神，值得我们敬仰和学习。"},{"type":"paragraph","text":"（方巨、石山辑）RW：毛泽东"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0b60fc168"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
