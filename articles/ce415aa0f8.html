":[{"year":1989,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"生民"},{"type":"paragraph","text":"’88电影金鸡奖评选在即，谢晋即将赴京再挑评委会主任之职。日前，谢晋在寓所就评选问题与笔者有所答问。谢晋说:“1988年最佳影片评选难度无疑很大。在1987年的评选片目里，《红高梁》、《老井》遥遥领先，非此即彼，而1988年的电影创作，诚如一些人士指出的:缺乏领衔之作。这或许恰恰产生了‘评选’的意义，但另一方面的确给评奖带来了困难。”"},{"type":"paragraph","text":"问:那么’88金鸡奖最佳影片会否空缺?"},{"type":"paragraph","text":"答:……任何可能都是会有的，这要看全体评委评选的结果。"},{"type":"paragraph","text":"问:去年电影创作总体来看比较平，但是这一年的城市题材影片却显示了一种长足的进展，你认为是不是这样?"},{"type":"paragraph","text":"答:这段时间，一直忙于拍片，最近才从美国回来，片子看得很少。城市题材影片比较突出的现象是王朔电影。这些影片在艺术上都有追求有建树，但是我感到问题是，创作的主体意识及对所谓“顽主”的生态心态缺乏一种较高视点的把握和透视，而创作者自己也停留在那么一种思想情绪的层次上，去“靠”在一起。我认为这是不够的。"},{"type":"paragraph","text":"问:上影厂去年的作品有没有问鼎金鸡奖的可能性?"},{"type":"paragraph","text":"答:我个人认为没有，估计会落空。"},{"type":"paragraph","text":"问:无论如何你估计一下，评选最佳影片的焦点会较多地集中在哪几部影片上?"},{"type":"paragraph","text":"答:我看的影片的确很少。这次在北京将集中补看，每天看六部，早、中、晚各两部。所以目前我很难估计。我注意到某些评论比较看好凌子风的《春桃》和王好为的《村路带我回家》，对此我目前同样谈不出个人的意见。"},{"type":"paragraph","text":"问:一些报纸披露你打算拍《江青传》，是否确有其事?"},{"type":"paragraph","text":"答:这纯属谣传。报纸这么一登，我就收到许许多多信件，都是自荐出演角色的。其实没有这回事。"},{"type":"paragraph","text":"问:巨星公司原拟拍摄的《天劫》会否因为内容涉及“文化大革命”而遭到麻烦?"},{"type":"paragraph","text":"答:我的确看到了某些“通知”，当然不是具体针对《天劫》的。我认为这是没有道理的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce415aa0f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
