ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对肖向荣摘报的总后情况简报第一号的批语","alias":"","parts":[{"type":"paragraph","text":"对肖向荣摘报的总后情况"},{"type":"paragraph","text":"简报第一号的批语"},{"type":"paragraph","text":"（1952年8月17日）这种情报有用，军委各部门均应做，由办公厅统一管理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十七日[1]肖向荣，当时任人民革命军事委员会办公厅主任。"},{"type":"paragraph","text":"[2]指肖向荣1952年8月16日报毛泽东的总后勤部情况简报第一号摘要。主要内容有：（一）8月在京召开志愿军财务、军需会议的准备工作情况。（二）军委各部门关于编制1953年度各项军费预算的座谈会情况。（三）志愿军补给工作的中心关键一汽车保证问题。（四）志愿军所需药品的订购问题。（五）卫生部所属天津医材厂缩减职工的安排问题。（六）改进文电处理办法和提高干部素质问题。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":200,"page_end":200},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34c3a43c4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
