art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"喷火连学习毛主席著作提前一天完成紧急任务","authors":["挺进/刘金岭"],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队某师政治部副主任王英光，深入喷火连蹲点，帮助干部结合工作学好毛主席著作。"},{"type":"paragraph","text":"王副主任刚到这个连，正赶上他们要执行一个紧急任务，要在七天内，盖起一座粮仓。时间紧，任务重，看来，按期完成任务有些困难。喷火连的干部决定全连大突击，炊事班只留一人做饭。王副主任认为这样做是蛮干，使建议他们认真学习毛主席的《关心群众生活，注意工作方法》。王副主任说：“文章中提到汀州市政府只管扩大红军，不管群众生活，结果没有完成扩大红军任务。你们只顾突击盖粮仓，三个炊事员抽走了两个，战士们吃不好饭，怎么去突击呢？”这样一对照，支委们感到原来的决定不正确，便重新进行了研究。决定不再从炊事班抽人，卫生员主要是照顾病号，并负责烧全连的开水。接着，王副主任又启发他们说：“毛主席说，不解决桥或船的问题，过河就是一句空话，不解决方法问题，任务也只是瞎说一顿。你们只说要突击盖粮仓，不研究怎样突击，能按时圆满完成任务吗？”于是，干部们又进一步研究了突击完成任务的方法，合理地组织了人力，结果提前一天完成了任务。干部们高兴极了，他们从心眼里感激王副主任在紧要时刻，组织他们学习毛主席著作。连长刘广仁深有感触地说：“过去学习，体会不深。这次学习，击中了要害，很解决问题。”"},{"type":"paragraph","text":"在思想认识提高的基础上，王副主任又和他们一起制定了几项具体措施。如规定了学习日；每接受一项任务，干部首先学习毛主席的有关论述等。（ 挺进、刘金岭）"},{"type":"paragraph","text":"越忙越要学"},{"type":"paragraph","text":"喷火连学了毛主席著作，七天任务，六天完成，这是一个收获。而更大的收获是，他们懂得了：越是工作最紧迫的时候，越是需要学习毛主席著作。"},{"type":"paragraph","text":"工作最紧迫的时候，往往也是困难和问题最多的时候。这个时候，更需要有正确的指导思想，更需要把群众动员起来，想出办法，战胜困难。这个时候学毛主席著作，特别能开人心窍，特别能立竿见影。这个时候学，对毛泽东思想就能领会得更深，记得更牢；也就更能够体验到学习毛主席著作的重要。"},{"type":"paragraph","text":"喷火连这样一学一做，学习毛主席著作的自觉性大大提高了。喷火连这一学一做，对我们也是生动的一课。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df18bf4f87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
