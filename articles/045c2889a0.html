art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国无产阶级文化大革命是毛主席对马列主义的新贡献","authors":[],"parts":[{"type":"paragraph","text":"叙利亚教师联合会主席艾哈迈德·哈提卜对新华社记者说：毛主席是当代最伟大的革命家。中国在各个方面所取得的伟大成就，是贯彻毛主席思想的结果。目前在中国进行的文化大革命，是毛主席对马克思列宁主义的新贡献。"},{"type":"paragraph","text":"他说，中国的文化大革命表明了中国坚定地走社会主义革命的道路。通过这场文化革命，马克思列宁主义和社会主义思想在中国更加深入人心，进一步克服文化领域内的资产阶级和修正主义的影响，防止在无产阶级内部产生修正主义。"},{"type":"paragraph","text":"哈提卜说：毛泽东以他罕有的才智成功地发展和丰富了马克思列宁主义关于无产阶级文艺必须为人民大众服务的理论。毛主席指出文化领域里存在着阶级斗争，这是十分重要的。"},{"type":"paragraph","text":"哈提卜说，资产阶级、修正主义和假左派总是企图利用文化来反对革命，但中国人民坚持学习毛主席著作，用毛泽东思想来指导自己的工作，这将使中国继续取得胜利，永远沿着革命的道路前进。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"045c2889a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
