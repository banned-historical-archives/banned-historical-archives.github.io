s":[{"year":1974,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\7458040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在上海市文化五·七干校轮训的在职干部，以毛主席的《五·七指示》和“认真看书学习，弄通马克思主义”的教导为指导思想，努力学习马列和毛主席著作，深入开展批林批孔斗争。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\7458040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市汽车运输公司修理厂的工人和干部，坚持执行“独立自主、自力更生”的伟大方针，在兄弟单位协作下，仅用九十三天时间，就造出了三百吨牵引车二辆，二百吨平板车一辆和一百吨平板车二辆，以实际行动狠批林彪的洋奴哲学。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\7458040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e本市文艺工作者在毛主席的革命文艺路线指引下，坚定地走与工农相结合的道路，有计划地到工厂、农村和部队进行学习、劳动和演出，更好地为工农兵服务。这是《智取威虎山》剧组在上海郊区为贫下中农和社员群众演出。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\7458040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e同济大学五·七公社的革命师生，在工宣队带领下，遵照毛主席《五·七指示》，坚持开门办学，理论联系实际，结合典型工程进行现场教学。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\7458040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市赴贵州省医疗队在布依族苗族自治州积极开展巡回医疗，培养赤脚医生，为“把医疗卫生工作的重点放到农村去”贡献自己的力量，受到了当地贫下中农的赞扬。　《贵州卫生》供稿\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\7458040106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海民兵牢记毛主席关于“提高警惕，保卫祖国”的教导，加强训练，对帝国主义可能发动的侵略战争，特别对苏修对我国发动突然袭击，保持高度警惕，做好一切准备。同时，在阶级斗争和路线斗争中发挥了积极作用。这是上海电机厂民兵在训练。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\05\\7458040107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在毛主席《五·七指示》的光辉照耀下，到安徽省全椒县插队的上海知识青年坚定不移地走与工农相结合的道路，在三大革命运动中茁壮成长。陶洪兴朱力摄"},{"type":"paragraph","text":"本版照片除署名者外均为本报通讯　员、本报记者摄\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e陶洪兴,朱力\u003c/FONT\u003e"}],"comments":[],"origin":"本报,《贵州卫生》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贵州文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ba608d584"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
