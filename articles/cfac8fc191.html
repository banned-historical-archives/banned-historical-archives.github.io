authors":[],"dates":[{"year":1971,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在伟大领袖毛主席关于“发展体育运动，增强人民体质”的指示指引下，一九七一年全国足球(上海区)集训已胜利结束。二十九日下午，在虹口体育场举行了隆重的闭幕式。"},{"type":"paragraph","text":"上海市革命委员会和驻沪部队领导同志出席了闭幕式并讲了话。"},{"type":"paragraph","text":"闭幕式开始时，国家二队和来自江苏、浙江、福建、江西、广东、广西以及上海市的足球代表队的同志高举红旗，在雄壮的《三大纪律八项注意》的乐曲声中，在“毛主席万岁!万万岁!”“团结起来，争取更大的胜利!”的口号声中，迈着雄健的步伐进入运动场，充分显示了在毛主席革命路线指引下，经过无产阶级文化大革命战斗洗礼的广大运动员饱满的革命精神和高昂的战斗意志。"},{"type":"paragraph","text":"这次集训，从十月五日到十月二十九日，历时二十五天。在集训过程中，广大运动员、教练员、裁判员和工作人员遵照毛主席关于“进行一次思想和政治路线方面的教育”的指示，以批修整风为纲，密切地联系实际，联系思想，认真学习毛主席对体育工作的一系列指示，狠批叛徒、内奸、工贼刘少奇一类政治骗子鼓吹的黑“四论”，狠批“锦标主义”、“技术第一”、“爬行主义”、“洋奴哲学”等修正主义黑货，进一步提高了执行毛主席革命体育路线的自觉性。许多同志批判了想赢怕输的思想，说:专门在胜负上打圈子，实际上就是“一切为了赢球，赢球就是一切”的资产阶级“锦标主义”余毒的反映。我们踢球是为工农兵服务，为无产阶级政治服务的。我们一定要贯彻党的“九大”团结、胜利的路线，增进友谊，互相学习，互相帮助，共同提高，为革命打好球。"},{"type":"paragraph","text":"在集训期间，各队认真讨论了在国内比赛中如何认真执行“友谊第一，比赛第二”的方针。许多同志认识到，在国内比赛中执行这个方针，不能片面地理解为就是让几个球。“友谊第一”是政治第一，它体现在很多方面，如兄弟队之间互相学习，互相帮助，加强团结；斗私批修，全心全意为工农兵表演；运动场上发扬“宁失球，不伤人”的风格；正确对待裁判等等。在学习讨论中，大家还进一步认识到，“友谊第一与打出风格，打出水平是一致的，决不能把两者对立起来，使比赛打得松松垮垮、马马虎虎。通过学习讨论，运动场上盛开了友谊之花，新人新事层出不穷。各队相互学习，一起总结经验，共同提高。不少队在赛前赛后真心诚意地互相介绍情况，体现了新型的兄弟队的关系，博得了工农兵的热烈赞扬。"},{"type":"paragraph","text":"在闭幕式上，近三万群众观看了广东队和上海队的精彩表演。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"广东文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfac8fc191"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
