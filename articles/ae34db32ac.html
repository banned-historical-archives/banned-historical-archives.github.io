art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"运用毛泽东军事辩证法思想研究战争动员理论","authors":["孟宏超/惠兴民/刘子强"],"parts":[{"type":"paragraph","text":"毛泽东军事思想的精髓和活的灵魂——辩证法思想，永远是我们各项工作的指针。陕西省军区最近召开“毛泽东军事辩证法思想暨战争动员理论学术研讨会”，就如何把毛泽东军事辩证法思想的学习研究引向深入，在以下两点上统一了认识。"},{"type":"paragraph","text":"注重掌握毛泽东军事辩证法的基本原理。通过精读毛泽东军事著作，理解和掌握毛泽东观察军事活动的辩证立场、分析军事矛盾的辩证观点和解决军事问题的辩证方法，深刻领会毛泽东军事辩证法思想体系的精神实质。同时，应注重与学习马克思主义哲学，以及研究战史、战例结合起来。"},{"type":"paragraph","text":"针对省军区系统的职能和特点，重点运用毛泽东军事辩证法研究战争动员理论。战争动员是一个重大的战略问题。省军区系统要以辩证法为理论武器，从风云变幻的国际形势和现代战争特点出发，把用毛泽东军事辩证法思想指导战争动员理论研究，做好平时的动员准备工作，作为当前和今后一个时期的中心课题，促使后备力量建设的不断发展。"},{"type":"paragraph","text":"（孟宏超、惠兴民、刘子强）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae34db32ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
