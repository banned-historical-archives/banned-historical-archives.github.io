:[{"year":1948,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陈谢率全体指战员"},{"type":"paragraph","text":"电毛主席、朱总司令致敬"},{"type":"paragraph","text":"【新华社中原三十一日电】陈赓、谢富治、秦基伟、孔从周将军率全体指战员于八月二十三日胜利进军豫陕鄂周年纪念日电毛主席、朱总司令致敬，电文如下："},{"type":"paragraph","text":"毛主席、朱总司令：在党中央和你们正确领导下，我们打过黄河已经一年。在一年的胜利战斗和学习中，我们实际的领会了将战争引向国民党统治区战略方针的英明伟大。今后一定坚决执行继续将战争引向国民党统治区的方针，并学习与执行党的各种政策，纠正无纪律、无组织、无政府的不良现象，在党中央和你们的正确领导下继续歼灭敌人，团结群众，打倒蒋介石反动派集团，争取全国胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"299ca81007"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
