[],"dates":[{"year":1977,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热火朝天的大修、改造火电设备、挖掘现有设备潜力的大会战，正在江西省电力工业战线普遍展开，并已取得显著成效。七月份以来，全省各主力火电厂经过大修、改造的设备相继投入生产，发电量大幅度上升，一举扭转了由于“四人帮”干扰破坏造成的电力生产下降的局面。全省第三季度发电量，比去年同期增长百分之四十，比历史最高水平的一九七五年同期增长百分之二十点六，这些电力有力地支援了工农业生产。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c8b790815"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
