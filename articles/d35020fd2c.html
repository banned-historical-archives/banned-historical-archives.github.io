rs":[],"dates":[{"year":1957,"month":5,"day":24}],"is_range_date":false,"parts":[{"text":"四川部分民主人士在座谈会上相互指责","type":"title"},{"text":"新华社成都18日讯  在成都，许多民主人士帮助共产党整风的座谈会上，部分民主人士在互相指责。下面是最近一周中的部分情况:","type":"paragraph"},{"text":"无党派民主人士李劼人，在16日成都市人民委员会召集的座谈会上，指责民主党派过去一味为共产党捧场。他说，共产党召开座谈会征求意见，幷不是从今天开始的。但是在过去，大家在会上客客气气，说话也是冠冕堂皇，空空洞洞，有意见不提。他说在一片叫好声中,共产党滋长起了官僚主义、宗派主义和主覌主义，有些民主人士是起了“助长”作用的。李劼人还指名批评了彭迪先(民盟四川省委副主任委员)。他说，去年，有人提出了民主人士有职无权的问题，可是彭迪先否认有此现象，替共产党关了门。","type":"paragraph"},{"text":"四川大学教师张怡荪、周菊吾(均系无党派民主人士)，指责川大的某些民盟成员，只晓得向共产党争房子、要汽车，要求重视。他们认为这次也应该“整”一下民盟的“风”。周菊吾还认为民盟在川大是“狐假虎威”。","type":"paragraph"},{"text":"无党派民主人士陈豹隐提出他不同意某些人对共产党“以党代政”的批评，对有些人提出“教授治校”，他也认为是不妥的。他指出有些人在发言中否定共产党过去的一切成绩。他说，这样，本来是帮助共产党整风，结果反会弄出一些乱子。","type":"paragraph"},{"text":"陈豹隐的发言马上遭到了李劼人、刘亚休(民革四川省委宣傅处长)等的反驳。李劼人说陈豹隐的发言，很像陈其通、马寒冰等四人的文章，有刚“放”出一点来就想“收”的味道。","type":"paragraph"},{"text":"发生上述情况后，主持会议的中共方面的负责人，都发言希望他们围绕对中共提意见，帮助党整风。但看趋势，这种情况以后还会发生的。(宋禾)","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参攷》第2212期, 一九五七年五月二十四日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d35020fd2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
