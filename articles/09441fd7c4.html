ntent.com/banned-historical-archives/banned-historical-archives2/main/af00400a-d352-41ad-8fb4-d9959ce7251d.pdf"],"article":{"title":"向北方报捷——一位南方女游击队员的信","alias":"","parts":[{"type":"paragraph","text":"向北方报捷"},{"type":"paragraph","text":"——位南方女游击"},{"type":"paragraph","text":"队员的信"},{"type":"paragraph","text":"腐诗袁"},{"type":"paragraph","text":"李少言画枪枝倚在肩头，信笺铺在膝上。一边儿写，一边儿想，要把千言万语，凭风寄到远方。不写十年离别，"},{"type":"paragraph","text":"滚滚红河水，不叙儿女情长。"},{"type":"paragraph","text":"走向解放战场。战斗豪情，"},{"type":"paragraph","text":"潜酒九龙江，胸中荡漾，"},{"type":"paragraph","text":"利剑劈不断阿水，"},{"type":"paragraph","text":"家乡一天天巩固，先向亲人报喜："},{"type":"paragraph","text":"队伍一天天强壮。"},{"type":"paragraph","text":"千画百转奔海洋。"},{"type":"paragraph","text":"长婴在手，又打了一个漂亮仗！"},{"type":"paragraph","text":"胜利在望，！"},{"type":"paragraph","text":"信儿寄给亲人，木船就是战壕，"},{"type":"paragraph","text":"透过那密密乌云，"},{"type":"paragraph","text":"心儿飞到北方，"},{"type":"paragraph","text":"南北一条心，"},{"type":"paragraph","text":"看到了红霞万丈。港汉就是前方。"},{"type":"paragraph","text":"狠打美国狼。不怕虎豹，"},{"type":"paragraph","text":"撸声伴着枪声，不怕豺狠，"},{"type":"paragraph","text":"让我们在凯歌声里重逢，一起笑看纸老虎的下场！"}],"authors":["李少言","袁鹰"],"dates":[{"year":1965}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":52,"page_end":52},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09441fd7c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
