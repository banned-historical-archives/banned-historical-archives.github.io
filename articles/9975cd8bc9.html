tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席林副主席接见阿党政代表团同谢胡等阿尔巴尼亚同志进行了极其亲切的谈话 周恩来、陈伯达、康生、李富春、刘宁一、杨成武等同志陪同接见","authors":[],"parts":[{"type":"paragraph","text":"新华社十二日讯 我们最最敬爱的伟大领袖、中国共产党中央委员会主席毛泽东同志和他的亲密战友林彪副主席，今天下午接见了阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚部长会议主席穆罕默德·谢胡同志和由他率领的阿尔巴尼亚党政代表团成员：拉米兹·阿利雅，米哈拉奇·齐奇什蒂，拉赫曼·佩尔拉库，托宁·雅科瓦，阿基姆·梅罗，福托·恰米，皮罗·比塔和瓦西里·纳塔奈利同志。"},{"type":"paragraph","text":"毛主席和林彪同志同阿尔巴尼亚同志进行了极其亲切的谈话。"},{"type":"paragraph","text":"陪同毛主席接见的有周恩来、陈伯达、康生、李富春、刘宁一、杨成武、刘映、罗贵波和吴法宪同志。RW：毛泽东；接见外宾"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"李富春","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9975cd8bc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
