<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席的书，我们贫下中农最爱读","authors":["王忠珍"],"dates":[{"year":1967,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的书，我们贫下中农最爱读"},{"type":"paragraph","text":"贵州省革委会常委、修文县白窑大队党支部书记　王忠珍"},{"type":"paragraph","text":"我们广大贫农下中农对毛主席无限崇拜，对毛主席著作无限热爱。我们日日盼，夜夜盼，总盼望能够得到更多更多的毛主席著作。毛主席著作是我们贫农下中农干革命的武器，有了它，我们刀山敢上，火海敢闯，任何困难都不怕；有了它，我们就能够无往而不胜。"},{"type":"paragraph","text":"一九六六年十月一日，这是我终身最最难忘的一天。我作为省的国庆节观礼代表团成员，在天安门城楼上光荣地看到了我们心中最红最红的红太阳、我们伟大的领袖毛主席。毛主席他老人家迈着矫健的步伐，满面红光，神采奕奕，来到我们身旁。我兴奋得跳起来，不断地振臂高呼：“毛主席万岁！万万岁！”毛主席呵，毛主席！您老人家身体这样健康，是我们五亿农民最大最大的幸福，是全中国全世界革命人民最大最大的幸福。这天晚上，我们代表还住在中南海里，住在毛主席的身旁。我高兴得睡不着觉，躺在床上，我轻声地一遍又一遍地发出誓言：毛主席呵，毛主席！我一定好好学习您的著作，做您的好学生。"},{"type":"paragraph","text":"来京之前，许多贫农下中农送了我一程又一程。他们拉着我的手说：“小王，你上北京见了毛主席，可要替我们多喊几声毛主席万岁啊！”我果真幸福地见到了毛主席。为了让我村的贫农下中农和我共享这个幸福，我给大家带回了五十本《毛主席语录》，一百多个毛主席像章和二百多张毛主席的像片。"},{"type":"paragraph","text":"大海航行靠舵手，干革命靠毛泽东思想。我从北京回来以后，就和贫农下中农一起，如饥似渴地学习毛主席的宝书。毛泽东思想威力最大，毛泽东思想一旦为群众所掌握，就会产生巨大的物质力量。在毛主席的革命路线的指引下，我们很快组织起一支浩浩荡荡的文化革命大军，轰轰烈烈地开展起无产阶级文化大革命运动。"},{"type":"paragraph","text":"在两个阶级、两条道路、两条路线的激烈斗争中，是毛泽东思想给了我们勇气和力量，使我们顶住了阶级敌人的恐吓和拉拢。在斗争的艰难日子里，每到深夜，我们就在伟大领袖毛主席像下面，学习毛主席著作，不断地背诵毛主席的教导：“我们的同志在困难的时候，要看到成绩，要看到光明，要提高我们的勇气。”“下定决心，不怕牺牲，排除万难，去争取胜利。”在战无不胜的毛泽东思想的光辉照耀下，经过几个月的斗争，我们终于击退了敌人一次又一次的猖狂反扑，取得了斗争的胜利。"},{"type":"paragraph","text":"毛主席著作象太阳，照得我们心里亮堂堂。现在，我们大队贫农下中农响应毛主席的伟大号召：“要斗私，批修”，大办毛泽东思想学习班，掀起了一个活学活用毛主席著作的新的高潮。我决心永远和贫农下中农在一起，一辈子读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8a6ee0fc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
