script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"盐城镇公私方人员混同交心资产阶级分子气焰重又嚣张","authors":[],"dates":[{"year":1958,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"盐城镇公私方人员混同交心资产阶级分子气焰重又嚣张","type":"title"},{"text":"本刊讯  江苏盐城县盐城镇委在组织发动工商界向党交心中，竟错误地采取了全镇的公私合营和合作行业内的全体从业人员，包括企业内的共产党员、职工和公方代表在内的发动起来和资产阶级分子混在一起向党交心，结果是：削弱了党和工人阶级在企业内部的领导威信，混淆了劳动人民和资产阶级的阶级界限，某些行业已不是公方代表、工人帮助资产阶级分子向党交心，而是形成了资产阶级分子帮助工人阶级向党交心的情况，甚至连右派分子也是如此。如公私合营茶食业工会主席、加工部主任杨振生同志向全体从业人员大会作了检查交待后，工作组和总店负责人都认为是实事求是的，但该业资产阶级分子陈端祥却在大会上公开指责杨说：“你们工人阶级心交得不深透，你拿企业商品吃，这是工人阶级大公无私吗？我们资产阶级未替右派说话，你是工人阶级为什么替右派分子陆志祥说话呀！（均无事实）你为什么不交心呀？应该挖老根子呀！”另一些资产阶级分子也硬说杨未交真心，挑起了企业内其他从业人员处处对杨不信任，目前已发展到不服从杨的领导。新药业门市部公方主任陈启明同志交心笔记中交待用掉企业十四元后未还，资产阶级分子殷洪鼎说：“工人阶级具有大公无私的本质，老陈你不该贪污盗窃国家财富呀！嘿！根据你这个本质，可能你每天都有贪污，为什么不快、真、深、透的交待清楚。“公私合营旅社业共产党员张住方同志把自己的交心笔记向大家谈过后，资产阶级分子张志中对他说：“我们交真心，你还没有交真心，这算个什么共产党员呀！”公私合营茶食业资产阶级右派分子陆志祥也在全体从业人员大会上对青年工人、共青团员钱正青说：“你贪污盗窃国家财富，还没有交真心，你们是有组织的人，不派这样……。”","type":"paragraph"},{"text":"（原载新华日报“内部参考资料”）","type":"paragraph"}],"comments":[],"origin":"1958年7月1日_第2518期《内部参考》新华通讯社编。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bf92adbe8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
