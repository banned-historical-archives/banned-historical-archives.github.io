，联系思想实际，狠斗“私”字，自觉革命","authors":[],"dates":[{"year":1967,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市长宁区教卫系统，紧跟毛主席的伟大战略部署，坚决贯彻要斗私，批修的最高指示，本年度第五期毛泽东思想学习班已于最近开学。"},{"type":"paragraph","text":"长宁区革命委员会在今年四月成立以后，教卫组就派出许多工作人员去各校促进复课闹革命。但是学校里的工作千头万绪，不知从何做起。经过实践，他们深切体会到千抓万抓，不抓毛主席著作学习，就是瞎抓。因此，从五月开始，先后举办了四期毛泽东思想学习班。全区中学的大多数革命教工、医院的革命派负责人和红卫兵组织的负责人等共三千多学员，先后参加了学习。"},{"type":"paragraph","text":"各期学习班都紧跟形势，遵循林彪副主席的指示，针对学员的思想实际，带着问题学，活学活用，学用结合，急用先学，立竿见影，在“用”字上狠下功夫。通过学习班学习，掀起了大学毛主席著作的新高潮，提高了思想，促进了革命的大联合和革命的“三结合”。毛主席的干部政策也得到了更好的贯彻，全区中学的领导干部已解放了百分之八十以上，不少革命领导干部已走上了斗争第一线。"},{"type":"paragraph","text":"第五期毛泽东思想学习班以“斗私，批修”为纲，组织红卫兵长宁军区的全体工作人员和部分学校的红卫兵团负责人参加学习。学员们决心在充分认识“斗私，批修”深远意义的基础上，深刻领会伟大领袖毛主席对红卫兵小将的亲切关怀和殷切期望，联系思想实际，带着革命大联合、“三结合”中的有关问题，学习“老三篇”；发扬亮私不怕丑，斗私不怕痛的革命精神，狠斗“私”字，自觉革命，从而在毛泽东思想的原则基础上，进一步紧密团结起来，促进学校的大学习、大批判、斗批改，搞好复课闹革命。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1fd4370bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
