script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从丁陈反党集团事件吸取教训警惕资产阶级个人主义石西民号召文艺工作者投身到火热的斗争中去","authors":[],"dates":[{"year":1957,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　中共上海市委宣传部，在前、昨两天上午举行会议，传达不久前中国作家协会党组对丁玲、陈企霞反党集团斗争的情况和会议精神。出席会议的有文学艺术界干部二千余人。会上，中共上海市委宣传部副部长周而复同志，传达了中共中央宣传部部长陆定一同志和副部长周扬同志在作协党组扩大会议上的重要讲话。作协上海分会党组负责人孙峻青、孔罗荪两位同志，分别介绍了丁玲、陈企霞和冯雪峰反党活动和对他们斗争的情况。"},{"type":"paragraph","text":"上海文艺界联合会副主席巴金同志和作家协会上海分会副主席靳以同志，以他们的切身感受，作了联合发言。"},{"type":"paragraph","text":"中共上海市委宣传部部长石西民同志在会上讲话，他说，上海文艺界反右派斗争已取得初步胜利，但还应更加深入取得彻底胜利。在斗争中，要反对厌战情绪，右派分子认为“共产党做事是一阵风”的经验错了，不彻底胜利，我们决不收兵。为此，还要批判、克服温情主义。同时，要反对简单化办法，对右派分子斗争越是说理、分析，越是狠，不能有急于求成情绪。石西民同志继续说，丁陈反党集团的一个教训就是要坚决反对资产阶级个人主义。他举出上海文艺界中某些人厌恶政治、追求个人名利、地位、争稿费等许多事例后，指出，这种思想是和社会主义水火不相容的，要严重警惕，努力加以克服，每个人都不能放松。石西民同志还希望文艺家们真正下决心投身到工农兵中去，到火热的斗争中去。最后他指出要狠狠进行反右派，狠狠改造我们思想，要狠狠改进我们工作。"},{"type":"paragraph","text":"【又讯】　上海作家纷纷表示拥护陆定一、周扬同志的讲话，从这次斗争中吸取教训。"},{"type":"paragraph","text":"罗稷南说，丁玲等并不老老实实工作，老是在争名利，争地位。作为作家自己也应感到惭愧。这特别对青年起了很坏的影响。可是，不仅如此，他们还从个人主义————个人主义和社会主义是不相容的————发展到反党野心家，这是一种罪恶。"},{"type":"paragraph","text":"罗稷南说，我年纪大，血压又高，又受了翻译这个职业性质的限制，我有些脱离实际，脱离生活，所以政治警惕性不高。通过这个事件，我更感到自己非常空虚，是生活中一个很大的矛盾。我以后要多接触实际，参加斗争。"},{"type":"paragraph","text":"唐克新认为这是一个很大教训。丁玲的“一本书主义”，腐蚀了不少青年作者。过去只强调作家光荣、特殊劳动，是不对的，今后应该提高政治觉悟，把文学看成是党的事业。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陆定一","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdfa326fdf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
