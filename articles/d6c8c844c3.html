市场管理","authors":[],"dates":[{"year":1953,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"陕西省人民政府财委要求各地切实加强市场管理","type":"title"},{"text":"自“五反”后，多数私营工商业者的思想和经营作风已获得不同程度的改进，但部分私营工商业者仍在屡犯“五毒”进行投机活动，其中掺杂掺假，改头换面，以劣货充好货等恶劣现象相当普遍，花样亦多，不仅破坏政府法令，扰乱市场，影响人民生活，妨害正当工商业的经营。目前因人力、物力等条件限制，普遍成立专业检查机构尚有困难，为此提出如下意见希研究转饬所属工商行政部门执行：","type":"paragraph"},{"text":"一、加强市场管理严格取缔非法活动。各地工商行政部门应经常通过工商联，行业公会并运用各种不同形式向私营工商业（包括行商、摊贩）进行爱国守法教育，必须服从国营经济领导，遵守政府法令。同时，应加强检查制度，对一切非法活动应采取教育与惩办相结合的方针予以适当处分。","type":"paragraph"},{"text":"二、商品产地或物资集散地，市场，其已有检验机构或交易市场者应在原基础上进行一次检查整顿工作，建立健全各项制度，加强对交易员的政治教育，使其忠于职务；缺乏上述组织的地区应进一步充分利用工商界组织发动检查检举私营商贩的违法活动。有条件的地区应考虑组织土产品检查组织，严禁掺杂掺假行为；一般城市亦应规定适当办法采取有效措施，杜绝投机活动。","type":"paragraph"},{"text":"三、各地工商行政部门必须随时与当地财经部门配合取得步调一致，主动联系工会、税局，加强国营商业部门的联系，使行政与业务密切相结合，加强市场的领导作用。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6c8c844c3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
