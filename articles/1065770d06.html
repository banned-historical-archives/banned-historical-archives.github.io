ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"力主和平避免内战保持西北自前局面叫","alias":"","parts":[{"type":"paragraph","text":"力主和平避免内战保持西北目前局面"},{"type":"paragraph","text":"（1937年1月9日）周，并告彭、任："},{"type":"paragraph","text":"甲、力主和平，拉拢蒋宋，策动国内各派各界舆论，策动英美，保持西北目前局面，非不得已不开火，乃自前基本方针。此方针应使杨、何、孙、王、缪、刘、杜、黄及宣传委员会主要人了解，改正其“左”的宣传，但军事方面，仍极力备战，绝不放松。"},{"type":"paragraph","text":"乙、红军即在三原、咸阳集结待机，不可轻动。商县方面加派杨部一团固守，但十五军团准备休息三天后开至商县待机。"},{"type":"paragraph","text":"洛毛"},{"type":"paragraph","text":"九日二十时"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）给周恩来并告红军前敌总指挥彭德怀和政治委员任弼时的电报。"},{"type":"paragraph","text":"[2]杨，指杨虎城，当时任国民党军第十七路军总指挥。何，指何柱国，当时任国民党军东北军骑兵军军长。孙，指孙蔚如，当时任国民党军第十七路军第三十八军军长兼第十七师师长。王，指王以哲，当时任国民党军东北军第六十七军军长。缪，指缪激流，当时任国民党军东北军第五十七军军长。刘，指刘多荃，当时任国民党军东北军第一〇五师师长。杜，指杜斌丞，当时任陕西省政府秘书长。黄，指黄显声，当时任国民党军东北军第五"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":131,"page_end":131},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1065770d06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
