的报告","authors":[],"dates":[{"year":1959,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"中共北京市委关于外地农民来京的情况向中央的报告","type":"title"},{"text":"近几天来，外地来京的农民日渐增多，几乎每趟到京的火车都有不少外地农民下车。据2月15日的不完全统计，晚上在前门、永定门、丰台、西直门4个车站露宿的即有2000多人，车站广场、廊道、候车室都睡满了人，旅客无法通行，秩序十分混乱。前门车站2月11日有200多人，12日增至400多人，13日增至800多人，15日即增至1500多人。另外，还有不少人住在小店或亲友家中，据崇文、宣武两个区初步统计，住小店的有400多人。白天，他们就跑“人市”、工地找工作，或到劳动局、民政局要求介绍工作。不少人整天背着行李在大街上乱转。车站附近的食堂、饭铺也被他们挤满了。有的在饭铺吃了饭不给钱，有的没有钱买饭吃就跑到居民家里要饭吃，有的在大街上要钱，有的甚至偷窃行骗，有的还准备到国务院请愿。","type":"paragraph"},{"text":"据初步了解，这些农民主要是来自河北、山东。市公安局13日派人在前门车站和619个农民谈了话。其中，有412人是来自河北省的34个县，主要是徐水、涿县、曲阳、定兴、安次等。山东主要是范县，共来了194人。他们来京的目的是找工作。问他们为什么不在农村生产而来京找工作？有的说“农村生活苦，吃不饱。”范县古文公社侯连城等12人说：“净吃山药干子，白天夜里还要干活，受不了，才来北京。”徐水县李贵章等4人说：“家里净吃白薯、白菜，生活实在困难，说什么也不回去了。”有的说：“我们是先来的，想来的还多着呢！”这些人绝大多数都私自来的，也有极少数是持公社证明出来找工作的。","type":"paragraph"},{"text":"根据中央《关于制止农村劳动力流动的指示》，市委已经责成民政、劳动、公安部门组成联合办公室，把他们集中起来，动员他们回去，暂时动员不走的，则通知有关省人民委员会来人把他们接回去。同时决定把北京现有的8个“人市”加以取缔，我们已通知全市所有单位不得招雇来京农民。","type":"paragraph"},{"text":" 特此报告。中共北京市委","type":"paragraph"}],"comments":[],"origin":"根据北京市档案馆馆藏原件刊印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"625745eff2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
