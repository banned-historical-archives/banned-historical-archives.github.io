ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"军委对中南军区关于海防检查及今后建设意见的报告的批语","alias":"","parts":[{"type":"paragraph","text":"军委对中南军区关于海防检香及今后建设意见的报告的批语"},{"type":"paragraph","text":"（1953年1月14日）华东军区："},{"type":"paragraph","text":"此件对于你们有参考价值，望加研究仿行，特别是组织考察团和慰劳团甚为重要。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"一月十四日"},{"type":"paragraph","text":"[1]指中共中南军区委员会1953年1月12日关于海防检查及今后建设意见给毛泽东、军委并叶剑英的报告。报告说，去年10月间接到毛泽东《关于纠正放松军事教育和纪律废弛现象的指示》后，中南军区除对所有部队进行普遍的点验外，特地组织了3个海防检查团，于11月初分赴粤东、粤中、粤西地区，协同沿海各军、各军区及海军、公安等机关，对海防岛屿守备情况作了一次大检查。经过这次检查，进一步了解了海防工作的情况，发现了许多函待解决的问题，对于如何加强海防已获得一些底蕴。报告针对海防工作中存在的问题，提出了提高守岛部队斗志和战斗力，加强岛屿守备和海防建设的9条办法，其中包括组织海岛守备部队慰问团等。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":446,"page_end":446},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"223fc2519e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
