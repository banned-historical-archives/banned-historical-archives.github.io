<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发中南局关于禁止乱捕乱押的通报","authors":[],"dates":[{"year":1950,"month":5,"day":12}],"is_range_date":false,"parts":[{"text":"中共中央转发中南局关于禁止乱捕乱押的通报","type":"title"},{"text":"各中央局、分局：","type":"appellation"},{"text":"中南局五月五日禁止乱捕乱押的通报转给你们，望你们注意是否有同样现象发生，如有，应即迅速禁止。","type":"paragraph"},{"text":"据报各地公安局拘押犯人甚多，湖南某些县份竟达一千二百余人之多。房小粮缺，无人看管，连续发生死亡逃跑事件。一个县押一千二百人，这在历史上都是少有的。很明显的这是区乡乱抓乱捕，而县府则乱收乱押的结果。从此可以看出该县的政策领导是有问题的，同时司法工作未建立，案件无人负责也是原因之一。自我进入新区以来，中南局及各省委对乱打乱杀偏向曾用极大的力量多次做过纠正，现在看来，除极少数地区与少数干部仍在乱打乱杀以外，一般已经停止和防止了。但存在着变相肉刑，特别是乱捕乱押尚未被注意克服。各省委、地委除据中南局指示继续认真纠正变相肉刑外，着重提出克服乱捕乱押现象。首先认真从思想上教育干部乱扣乱捕如乱打乱杀一样，都会发展干部命令主义作风，丧失人心，孤立自己，帮助敌人。假定所捕者皆系该捕，也会因此而增加教育感化被捕分子的困难，促成他们对人民政权的不满与对抗，引起人民的怀疑与反感，绝不能轻视。同样，有少数反动分子、破坏分子是非捕不可的，不捕是错误的，但既捕之后，必须结合群众调查研究，进行处理，而不能搁置不理，愈押愈多，陷于被动。大部分敌匪胁从分子，应使用集训形式，而不应用捕押办法。至于其减租征粮工作中拖交欠租公粮公债的分子，一般经过县区传讯即可解决，不应逮捕。多捕更容易形成普遍抵抗逃亡，产生困难。为此规定：","type":"paragraph"},{"text":"（一）各省必须规定一个限期，责令各县组织清理委员会，将现有监狱人犯普遍清理一次，该放的即时释放，该杀的收集群众意见及犯罪证据，报请省府批示处理，确实该处徒刑者严密监押。","type":"paragraph"},{"text":"（二）除现行犯外，在村工作干部、军队工作队及乡村政府人员无捕人权。逮捕人犯必须区公所批准，并即报县，不得隐匿不报，不得随意捕送。错送者，县公安机关须即审查释放，不得随意收押，并给错捕者以应得处分，不得姑息。","type":"paragraph"},{"text":"（三）严禁在看管期内施行肉刑虐待犯人，违犯者经人民检察机关检举上告后，应依法处分之。","type":"paragraph"},{"text":"（四）各县司法科及监所应调派干部建立组织，进行司法工作，把司法工作看为可有可无是错误的，司法工作的建立，予大家以有法可守，是巩固人民胜利的重要工作。","type":"paragraph"},{"text":"（五）各地原有监狱与看守所须一律移交公安司法部门接管，以便管押犯人。部队机关占用监所者，立即退出，纠正干部住监狱，犯人住旅馆的奇怪现象。监所破坏者应加修理，已毁者应重建。囚粮应按规定数量发给，不得克扣。","type":"paragraph"},{"text":" 中南局辰  微","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc43865f55"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
