art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"西哈努克亲王乔森潘副首相率柬埔寨代表团离开北京去河内宾努首相和夫人等到机场送行 邓小平、李先念、吴德、谭震林等到机场欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年八月三十日讯 以柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王为团长，柬埔寨王国民族团结政府副首相、柬埔寨民族解放人民武装力量总司令乔森潘为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，今天上午乘专机离开北京前往河内参加越南民主共和国成立三十周年的庆祝活动。西哈努克亲王的夫人莫尼克·西哈努克公主也同机前往。"},{"type":"paragraph","text":"代表团团员有柬埔寨王国民族团结政府人民教育和青年大臣英蒂丽、柬埔寨民族统一阵线中央政治局候补委员吉春。"},{"type":"paragraph","text":"柬埔寨民族统一阵线中央政治局主席、柬埔寨王国民族团结政府首相宾努亲王和夫人，柬埔寨民族统一阵线中央政治局委员秀木、杨森安和夫人，柬埔寨王国民族团结政府外交副大臣万比尼和夫人，到机场送行。"},{"type":"paragraph","text":"到机场欢送代表团的有我国国务院副总理邓小平、李先念，人大常委会副委员长吴德、谭震林，外交部副部长韩念龙，有关方面负责人林佳楣，朱传贤、梁枫，中国驻柬埔寨大使孙浩。"},{"type":"paragraph","text":"到机场送行的还有越南民主共和国驻中国大使阮仲永和越南南方共和驻中国大使馆临时代办阮成功。"},{"type":"paragraph","text":"柬埔寨驻中国大使笃坎敦和夫人，柬埔寨民族统一阵线成员、王室成员，也到机场送行。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fc3d8652b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
