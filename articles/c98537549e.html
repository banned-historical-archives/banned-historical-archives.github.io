ors":["赵丹"],"dates":[{"year":1969,"month":11,"day":22}],"is_range_date":false,"parts":[{"text":"139号犯人狱中报告（与194号谈话）","type":"title"},{"text":"赵丹","type":"authors"},{"text":"今天劳动的时候，我与194号谈了话。","type":"paragraph"},{"text":"我问他，专案组提审他时，讲了点外面的形势没有？","type":"paragraph"},{"text":"他回答说:“专案组交代政策，说只要交代得好，这里面的人也可以有做人民内部矛盾来处理的，不一定带帽子才放出去。”","type":"paragraph"},{"text":"他又说:“态度很重要。”","type":"paragraph"},{"text":"我说:“我的事坏就坏在态度上，常常为了这一点枝枝节节的小事，甚至一言一语，就和专案组顶起嘴来了！”","type":"paragraph"},{"text":"他说:“过去我也顶过嘴，事后，后悔得不得了！”","type":"paragraph"},{"text":"正在此时，解放军同志来对我们进行警告和教育了。我们没再谈别的，尤其是个人的案情，我们彼此从未交谈过。直到现在，他叫什么名字、在哪儿工作，我都不晓得。当然，他知道我是干电影的赵丹。","type":"paragraph"},{"text":" 139","type":"paragraph"},{"text":"一九六九年十一月二十二日","type":"appellation"}],"comments":[],"origin":"李辉整理《赵丹自述》，大象出版社，2003年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c98537549e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
