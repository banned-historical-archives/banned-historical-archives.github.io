<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"玉山县人民法院判处了一批破坏互助合作的反革命分子","authors":[],"dates":[{"year":1955,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"玉山县人民法院判处了一批破坏互助合作的反革命分子（根据玉山县法院报告材料整理）","type":"title"},{"text":"江西省玉山县最近破获了一件披着宗教外衣利用互助组作掩护进行反革命破坏活动的“公义党、勇义军”案件，玉山县人民法院于今年3月27日依法进行公开审判，吸收了3500多人参加旁听，对该案首要分子徐云廷、徐云峰两犯判处了死刑；对该案的骨干分子徐志鸿判处了无期徒刑；对被骗参加的农民徐志荣、黄旗禄、舒文山等犯分别判处1年至3年的管制。通过审判，教育群众提高了阶级觉悟和警惕，认清了暗藏的反革命分子的罪恶面目，一致表示拥护法院的判决。有的农民还表示：回去一定要整顿互助组，肃清暗藏的反革命分子。","type":"paragraph"},{"text":"该案首要分子徐云廷，在解放前是伪保安队的文书上士，并曾在福建浦城县蒋匪32集团军工作过，，他与另一首要分子徐云峰在1954年10月19日勾结了蒋匪特务组织“民众党”头子凃仁道（已另案审理），共同策划成立了这个“公义党、勇义军”的反革命组织，徐云廷自任“总司令”，徐云峰任“总书记”，两犯还亲自制订“党章”“党员守则”“警告青年书”等反动文件，并刻置关防大印，印刷“委任书”，“委任”了“副总司令”“副官处长”“军需处长”“大队长”等伪职。","type":"paragraph"},{"text":"这个反革命组织组成之后，便采取各种阴谋手段，进行破坏活动。匪首徐云廷、徐云峰首先在村中窃据了互助组的领导地位，直接担任了互助组的组长和副组长，把参加互助组的7户农民用各种欺骗诱惑的办法拉入了他们的组织，使互助组变质，成为反革命活动的依托和“据点”，针对着我们农村的各项中心工作，制造谣言，煽惑人心，进行阻挠破坏；更严重的是秘密调查、登记乡村的干部和党团员及积极分子，阴谋暗害，夺取政权。","type":"paragraph"},{"text":"徐云廷、徐云峰及其骨干分子徐志鸿等还多次与蒋匪特务组织“民众党”头子凃仁道秘密联系，阴谋组织武装暴乱，购买炸药，准备炸毁自玉山通往上饶的一座铁道“洋桥”，妄图切断我浙赣铁路的交通运输线。他们活动的一个特点是披上宗教的外衣，利用天主教作掩护，广交“教友”，作为发展对象，组织人员。如徐志鸿、徐志荣被任命为“副总司令”、“军需处长”后，在广丰柴源地方即先后发展了7名“党员”；三区鸾峰乡舒文山受命担任“大队长”后，便接受“任务”回乡拉拢“教友”发展组织等等。","type":"paragraph"},{"text":"这个“公义党、勇义军”反革命组织的破获，说明了在实现国家社会主义工业化和社会主义改造的过程中，阶级斗争是更加尖锐、更加深刻了。各种反革命分子不仅都在实行胡风分子所说的“挖心战”，而且他们有的已经把我们的组织篡夺去变成了敌人的组织，这是必须引起我们特别警惕的。所有司法工作人员都应明确镇压反革命是长期的、艰巨的斗争任务；必须积极努力，不可松懈麻痹，必须依靠群众严厉惩办一切敢于进行破坏的反革命分子与各种犯罪分子，以保障农业互助合作运动的顺利发展。","type":"paragraph"},{"text":" （根据玉山县法院报告材料整理）","type":"paragraph"}],"comments":[],"origin":"司法工作通讯编辑委员会编《司法工作通讯》，1955年第4期， 1955年7月28日出版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"609288a169"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
