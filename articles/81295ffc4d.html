year":1978,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见孟加拉邮电代表团"},{"type":"paragraph","text":"新华社北京十二月六日电　国务院副总理邓小平，今天上午会见了孟加拉邮电部长毛杜德·艾哈迈德和夫人以及由毛杜德部长率领的孟加拉邮电代表团。"},{"type":"paragraph","text":"毛杜德部长向邓副总理转交了孟加拉国总统齐亚·拉赫曼给华主席的信件。毛杜德部长说，齐亚·拉赫曼总统祝你们在社会主义建设、实现四个现代化方面取得成就。"},{"type":"paragraph","text":"邓小平副总理对此表示感谢。邓副总理说，请你们相信，中国人民是你们可以信赖的朋友。他说，我们的事情会一天天好起来，你们的事情也会一天天好起来。我们两国人民的友谊会日益加深。"},{"type":"paragraph","text":"孟加拉国驻中国大使阿卜杜勒·莫明参加了会见。会见时在座的有邮电部长王子纲、副部长申光、罗淑珍等。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见由邮电部长毛杜德·艾哈迈德率领的孟加拉邮电代表团。新华社记者赵天聘摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81295ffc4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
