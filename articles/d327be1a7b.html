<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wengeqianqixinianlu1","name":"十年文革前期系年录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录1.pdf"],"article":{"title":"第三十五卷","parts":[{"type":"title","text":"第三十五卷"},{"type":"paragraph","text":"1966年9月17日至18日"},{"type":"paragraph","text":"(《掌握斗争大方向》一文的发表"},{"type":"paragraph","text":"活学活用毛著实例)9月17日"},{"type":"paragraph","text":"《红旗》第12期发表社论《掌握斗争的大方向》。指出：“集中力量打击一小撮资产阶级右派分子，打击党内走资本主义道路的当权派，这是斗争的大方向。”“无产阶级文化大革命的目的，绝对不是斗争一切领导干部，也绝对不是斗争群众。”"},{"type":"paragraph","text":"《红旗》杂志社论：《掌握斗争的大方向》"},{"type":"paragraph","text":"无产阶级文化大革命，象一股红色的巨流，冲垮着形形色色剥削阶级的旧事物、旧思想、旧习惯势力，教育着亿万人民群众，推动着我们历史的前进。"},{"type":"paragraph","text":"毛主席教导我们：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”"},{"type":"paragraph","text":"这个问题，也是这场无产阶级文化大革命的首要问题。"},{"type":"paragraph","text":"林彪同志说：“我们一定要按照毛主席的教导，分清谁是我们的敌人，谁是我们的朋友。要注意团结大多数，集中力量打击一小撮资产阶级右派分子。打击的重点，是钻进党内走资本主义道路的当权派。一定要掌握这个斗争的大方向。”"},{"type":"paragraph","text":"我们各级党的组织，广大的工农兵、革命的干部和革命的知识分子，广大的革命青少年，一定要紧紧掌握这个斗争的大方向。如果违背了这个大方向，就会走到邪路上去。"},{"type":"paragraph","text":"在现阶段无产阶级文化革命这个大战役中，集中力量打击一小撮资产阶级右派，就是要集中力量打击资产阶级中最反动、最顽固的政治上的代表人物。打垮了资产阶级右派，就能够有力地粉碎资产阶级反革命复辟的阴谋。"},{"type":"paragraph","text":"我们的国家是伟大的无产阶级专政的国家。我们的党是伟大的，以马克思列宁主义、毛泽东思想武装起来的党。在这样的条件下，资产阶级要想夺取政权，总是要通过党内那些极少数走资本主义道路的当权派，即反革命的修正主义分子。这一小撮反革命的修正主义分子，是最主要的最危险的敌人。在他们篡夺了领导权的地方，他们实行的是资产阶级政策，实行的是资产阶级专政。他们运用窃夺到的权力，包庇资产阶级右派，镇压无产阶级左派。如果不把他们打倒，他们就会像赫鲁晓夫一样，一旦有机可乘，起来篡夺我们党和国家的领导权，使我们整个国家变颜色。"},{"type":"paragraph","text":"集中力量打击一小撮资产阶级右派分子，打击党内走资本主义道路的当权派，这是斗争的大方向。紧紧抓住这个斗争的大方向，就可以防止坏人混水摸鱼，就可以避免我们在斗争中抓住次要问题，放过了主要目标的错误。"},{"type":"paragraph","text":"不是无产阶级的当权派，就是资产阶级的当权派。抽象的超阶级的当权派是没有的。对于无产阶级当权派应该支持，支持他们，正是为了打倒走资本主义道路的当权派。对于走资本主义道路的当权派应该打倒，打倒他们，正是为了进一步巩固无产阶级专政。"},{"type":"paragraph","text":"我们的国家是无产阶级专政的国家，从根本上说来，当权的是无产阶级。在党、政、军各部门，在工、农、商、学、兵各界里负责各级领导工作的干部，在一般情况下，大多数是拥护党，拥护毛主席，坚决走社会主义道路的。他们包括十六条中第八条说的一、二类干部。钻到党和国家领导岗位的反党、反社会主义、反毛泽东思想的反革命修正主义分子，只是一小撮。这就是十六条中所说的那样第四类。"},{"type":"paragraph","text":"这是我国政治生活中客观存在的基本的事实。正因为这样，所以我们的无产阶级专政的政权是巩固的。正因为这样，所以在我们国家里，才能高举毛泽东思想的伟大红旗，取得社会主义革命和社会主义建设各条战线上的极其光辉的胜利。"},{"type":"paragraph","text":"林彪同志指出：一小撮反动资产阶级分子，没有改造好的地、富、反、坏、右分子，“他们反对无产阶级为首的广大革命人民群众对他们的专政，他们企图炮打我们无产阶级革命的司令部，我们能容许他们这样干吗？不能，我们要粉碎这些牛鬼蛇神的阴谋诡计，识破他们，不要让他们的阴谋得逞。”"},{"type":"paragraph","text":"企图炮打我们无产阶级革命司令部的牛鬼蛇神，只是一小撮人，但是他们有时候能够欺骗一些不明真相的好人。只要我们用毛泽东思想的照妖镜照一照，他们就显出了自己的原形，他们就会陷入热爱党、热爱毛主席的广大群众的包围之中。"},{"type":"paragraph","text":"无产阶级文化大革命的目的，绝对不是斗争一切领导干部，也绝对不是斗争群众。决不允许用任何借口，任何方式，打击革命积极分子，挑动群众斗群众。"},{"type":"paragraph","text":"在无产阶级文化大革命的群众运动中，群众之间是会有不同意见的，有时甚至会有激烈的争论。对于群众之间的不同意见和争论，包括对于群众中的错误意见，都应该按照毛主席正确处理人民内部矛盾的原则，恰当地进行解决。"},{"type":"paragraph","text":"《中国共产党中央委员会关于无产阶级文化大革命的决定》中说："},{"type":"paragraph","text":"“必须严格分别两类不同性质的矛盾：是人民内部矛盾，还是敌我矛盾？不要把人民内部矛盾搞成敌我矛盾，也不要把敌我矛盾当成人民内部矛盾。"},{"type":"paragraph","text":"人民群众中有不同意见，这是正常的现象。几种不同意见的争论，是不可免的，是必要的，是有益的。群众会在正常的充分的辩论中，肯定正确，改正错误，逐步取得一致。"},{"type":"paragraph","text":"在辩论中，必须采取摆事实、讲道理、以理服人的方法。对于持有不同意见的少数人，也不准采取任何压服的办法。要保护少数，因为有时真理在少数人手里。即使少数人的意见是错误的，也允许他们申辩，允许他们保留自己的意见。”"},{"type":"paragraph","text":"对于毛主席亲自主持制定的上述决定，我们每个革命的同志都应该认真地贯彻执行。"},{"type":"paragraph","text":"无产阶级文化大革命是触及人们灵魂的大革命。这场伟大的群众性的革命运动，势必涉及到人们灵魂深处的各种问题。这次运动，对我们广大的干部和群众，都是一次伟大的社会主义教育。破四旧，立四新，革命的风气迅速地普及全国，这是大好的事情，具有深远意义的事情。一切革命的同志，都应该热烈欢迎，坚决支持，都应该自觉地在革命的烈火中锻炼自己，按照毛主席的教导，坚持真理，修正错误，对于群众的批评要“有则改之，无则加勉”。"},{"type":"paragraph","text":"就整个运动来说，我们要抓住主要矛盾和重点，正确处理主要矛盾和一般矛盾的关系。人们的一般作风上的缺点和错误，应当在这次文化大革命运动中自觉改正，但不应作为运动的重点。解决这类问题，也要采用正确处理人民内部矛盾的方法。要说服教育，防止简单粗暴，不要用处理敌我矛盾的方法对待一般作风的缺点和错误问题，不要把这类问题当做运动的主要斗争目标，以免干扰我们的斗争大方向。"},{"type":"paragraph","text":"无产阶级文化大革命，是一场伟大的波澜壮阔的阶级斗争。这一场斗争是尖锐的、复杂的，而且是会有曲折和反复的。对于这一点，我们要有充分的估计。只要我们牢牢掌握运动的大方向，用阶级斗争的观点和阶级分析的方法去对待运动中出现的各种问题、各种矛盾，随时总结经验，就一定能使这场伟大的革命斗争一步一步地胜利前进。"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"所谓“走资本主义道路的当权派”一词，含义模糊，完全适用于该倒霉的一切领导干部。致使所有领导干部，只有在中央文革册封为“革命领导干部”之后，始得暂时保全。但在以后的政潮反复中，即使红极一时的“革命领导干部”，也往往又站错队伍，沦为被揪斗对象。故唯一可以打保票的是依人划线，也即依照私人关系来划分，凡是毛、林、江的私人，即使像邱会作那样的流氓，都可以用小节无碍而列为无产阶级革命司令部的人，封为革命领导干部。反之，都被谥为走资派，先打了再说。许多干部往往因站错队，表错态挨揪，被整得死去活来。当时流传：“站不完的队，请不完的罪；写不完的检查，流不完的泪。”但最后又什么问题都落实不了，冤枉遭受折磨。毛泽东轻松地美其名曰受锻炼，大有好处。呜呼！"},{"type":"paragraph","text":"《红旗》杂志同期还发表评论员文章，继续为红卫兵的疯狂行为张目。"},{"type":"paragraph","text":"《红旗》杂志评论员：《红卫兵赞》"},{"type":"paragraph","text":"现在，全国革命人民争夸红卫兵。"},{"type":"paragraph","text":"红卫兵的革命首创精神，震动了全世界。"},{"type":"paragraph","text":"红卫兵是在无产阶级文化大革命的暴风雨中涌现出来的新事物，是在无产阶级文化大革命中诞生和成长起来的。"},{"type":"paragraph","text":"红卫兵是毛泽东思想哺育出来的，红卫们说得好：毛主席是我们的红司令，我们是毛泽东的红小兵。"},{"type":"paragraph","text":"我们的红卫兵最爱读毛主席的书，最爱听毛主席的话，最热爱毛泽东思想。他们随身带着〈〈毛主席语录〉〉，把学习、宣传、执行、捍卫毛泽东思想，作为自己最高的职责。"},{"type":"paragraph","text":"在毛主席亲自发动和领导的无产阶级文化大革命中，红卫兵坚决同走资本主义道路当权派，同一切牛鬼蛇神，进行了英勇顽强的斗争，成了无产阶级文化大革命的闯将。"},{"type":"paragraph","text":"毛主席亲自主持制定的〈〈中国共产党中央委员会关于无产阶级文化大革命的决定〉〉公布之后，八月十八日，伟大领袖毛主席和他的亲密战友林彪同志，在首都检阅了红卫兵。在伟大统帅毛主席的直接鼓舞下，红卫兵和其他青少年革命组织一起，掀起了一个文化大革命的新高潮。"},{"type":"paragraph","text":"千百万红卫兵由学校走上街头，形成了一股不可抗拒的革命洪流。他们高举战无不胜的毛泽东思想红旗，发扬了敢想、敢说、敢干、敢闯、敢革命的无产阶级革命精神，荡涤着旧社会遗留下来的一切污泥浊水，清扫着几千年来堆积起来的垃圾脏物。"},{"type":"paragraph","text":"红卫兵干了大量的好事，提出了大量的好倡议。他们按照毛主席的教导，在破除剥削阶级的旧思想、旧文化、旧风俗、旧习惯，树立无产阶级的新思想、新文化、新风俗、新习惯的斗争中，取得了辉煌的战果。"},{"type":"paragraph","text":"红卫兵是无产阶级文化大革命的急先锋。他们的革命行动，激发了群众的革命热情，出现了更大规模的蓬蓬勃勃的群众运动。这种轰轰烈烈的革命群众运动，使钻进党内的一小撮走资本主义道路的当权派，陷入革命群众的汪洋大海之中。没有这样规模巨大的群众运动，就不能摧毁一小撮资产阶级右派的社会基础，就不能把无产阶级的文化大革命搞深，搞透，搞彻底。"},{"type":"paragraph","text":"红卫兵是东方地平线上出现的新生事物。革命的青少年是无产阶级的未来和希望的象征。革命的辩证法告诉我们，新生的力量是无敌的，它一定会在斗争中获得壮大和发展，最后战胜腐朽的力量。因此，我们就是要赞美新事物，歌颂新事物，为新生事物的发展，擂鼓助威，鸣锣开道，高举双手，欢迎新事物。"},{"type":"paragraph","text":"我们的红卫兵，在无产阶级文化大革命中，创建了不朽的功勋。毛主席和党中央热烈地赞扬他们的冲天革命精神，广大工农兵群众热烈欢呼他们的革命行动。"},{"type":"paragraph","text":"革命小将们的革命行动，真是好得很！他们在文化大革命中的功绩，将永远载入无产阶级的革命史册。"},{"type":"paragraph","text":"红卫兵们在游泳中学会游泳，在革命中学会革命。他们要求自己，不仅敢于斗争，敢于革命，而且善于斗争，善于革命。他们正在根据自己的实践经验，进一步地学习十六条，掌握十六条，进一步地贯彻执行十六条。"},{"type":"paragraph","text":"革命小将们受到了毛主席和广大工农兵群众的热烈赞扬之后，他们提出戒骄戒躁，要虚心向人民解放军学习，向工农群众学习。他们下定决心，要按照人民解放军的三八作风、三大纪律和八项注意，来进一步提高自己的政治觉悟，加强组织性和纪律性。他们决心在革命熔炉里，把自己锻炼成雷锋、王杰、麦贤得、刘英俊那样的革命战士，培养成为专门利人毫不利已的共产主义者，成为无产阶级革命事业的接班人。"},{"type":"paragraph","text":"对待红卫兵的革命行动，不同的阶级有不同的看法，革命的阶级认为好得很，而反革命的阶级则认为糟得很。"},{"type":"paragraph","text":"全世界的革命人民为红卫兵的革命行动拍手欢呼，向红卫兵致以崇高的敬意。帝国主义，各国反动派，现代修正主义和蒋介石匪帮，则用最恶毒的语言咒骂红卫兵。他们污蔑红卫兵是“少年狂热分子”，攻击红卫兵的革命行动是“违反人类尊严”，是“破坏社会传统”，等等。"},{"type":"paragraph","text":"毛主席教导我们，被敌人反对是好事而不是坏事。如若敌人起劲地反对我们，把我们说得一塌糊涂，一无是处，那就更好了。红卫兵受到国内外阶级敌人的起劲的反对，这真是光荣得很。"},{"type":"paragraph","text":"“少年狂热分子”。革命的敌人总是极端仇视群众的革命热情，并诬之为“狂热”。敌人所恨的，正是我们所爱的。革命小将们，不仅要继续保持充沛的革命热情，并且要进一步发扬这种冲天的革命精神。"},{"type":"paragraph","text":"“违反人类尊严”。红卫兵无情地鞭挞、揭露和批判资产阶级的反动腐朽的文化，把资产阶级右派分子的丑恶嘴脸暴露在光天化日之下，成为人人喊打的过街老鼠。于是他们大叫：“违反人类的尊严”。老实说，我们不仅要违反你们的“尊严”，而且要把你们打倒在地，叫你们永世不得翻身。"},{"type":"paragraph","text":"“破坏社会传统”吗？你们说对了。红卫兵就是要破坏地主资产阶级的传统。革命的小将们，对于封建主义的余毒，资本主义的病菌，修正主义的祸根，就是要扫清，灭绝，斩断。只有彻底破坏了剥削阶级的种种旧传统，才能够继承和发扬无产阶级的革命传统。"},{"type":"paragraph","text":"按照毛主席和党中央的指示，红卫兵小将们，集中力量打击一小撮资产阶级右派分子，重点打击党内走资本主义道路的当权派。这样，就挖掉了帝国主义、修正主义埋在我国的定时炸弹。因此，帝国主义、修正主义对红卫兵的革命行动，感到震惊，恼火和愤恨，这是很自然的。"},{"type":"paragraph","text":"反动阶级的代言人罗马教皇保罗六世无可奈何地供认，红卫兵的革命行动，对他们来说“是死亡的象征，而不是生命的象征”。不错，革命小将们的革命行动，确确实实是国内外阶级敌人的最后灭亡的象征。而我们的红卫兵，则象征着无产阶级革命事业的欣欣向荣，具有无限的生命力。"},{"type":"paragraph","text":"史无前例的无产阶级文化大革命，犹如东方升起的红太阳，以自己的辉煌光焰普照大地。"},{"type":"paragraph","text":"用毛泽东思想武装起来的红卫兵万岁！"},{"type":"paragraph","text":"我们伟大的导师，伟大的领袖，伟大的统帅，伟大的舵手毛主席万岁！"},{"type":"paragraph","text":"李先念对粮食部24位干部说：“工作组......即使犯了方向路线错误，也不能说是牛鬼蛇神，还是人民内部矛盾。”9月18日"},{"type":"paragraph","text":"林彪在接见军事单位负责人时提出把学习毛主席著作提高到一个新阶段。"},{"type":"paragraph","text":"林彪关于把学习毛主席著作提高到一个新阶段的指示(一九六六年九月十八日，接见高等军事学院、政治学院和总政治部宣传部负责同志时的谈话)"},{"type":"paragraph","text":"对毛泽东思想抱什么态度，是一个很重要的问题。我们就是要抓对毛主席的态度、对毛泽东思想的态度问题。特别是政治学院更应该这样。其他院校和一切教育机关也都要这样。"},{"type":"paragraph","text":"毛泽东思想是全党全军全国人民的统一行动纲领。全世界谁也不能代替毛泽东思想。什么李达，康斯坦丁诺夫，尤金，都不行。这些人的书怎么能同毛主席的书相比？现在全中国、全世界没有那一个人的著作能统一人们的思想。马克思、列宁的书太多，读不完，他们离我们又太远。在马克思列宁主义的经典著作中，我们要百分之九十九地学习毛主席著作，这是革命的教科书。要彻底把毛泽东思想贯彻于全党全军全国人民，用毛泽东思想来统一我们的思想。现在全国都在学习人民解放军，都在学习毛主席著作，形势和从前不一样，局面也不同了。我们军队是无产阶级专政的柱石，学不好不行。许多事情都要军队参加，如四清、文化大革命、生产、群众工作，还有许多干部不断转业到地方工作。因此，军队应该真正成为毛泽东思想的大学校。现在要真正落实，把思想搞通。干部住校学习，就要学好，不能有名无实，要真正把毛泽东思想掌握起来。毛泽东思想是革命的科学，是经过长期革命斗争考验的无产阶级的最高真理，是最现实的马克思列宁主义。毛主席的理论是几十年革命实践的总结。学好了，干部水平提高了，革命精神就能振作起来，就能把毛泽东思想、党的路线政策贯彻下去。"},{"type":"paragraph","text":"现在全国都在搞文化大革命。中央开了八届十一中全会，更高地举起了毛泽东思想伟大红旗，提出了全党全国学习毛主席著作的问题。全党全国学习毛主席著作进入了一个新的阶段。部队、院校学习毛主席著作，要有新的考虑，必须适应无产阶级文化大革命的新形势，要尽最大的努力，把毛泽东思想真正学到手，真正掌握起来。"},{"type":"paragraph","text":"你们学校明年招生，离现在还有三个月。今年一定要把文化大革命搞好。通过文化大革命，把组织机构搞得精干一些。宁肯人少一些，也不要坏家伙。把组织整顿好，把教学队伍整顿好，这个问题很重要。不把组织整顿好，思想不一致，甚至有坏人插在里边，怎么能搞好？一定要提高对毛泽东思想的认识，要严厉批评那种对毛泽东思想估计不足的倾向。"},{"type":"paragraph","text":"有些人迷信洋教条，总觉得苏联比我们的好，近的不香远的香，说什么山沟里没有马克思列宁主义。其实他们那一套那里比得上我们毛主席的思想？毛主席比马克思、恩格斯、列宁、斯大林高得多。现在世界上没有那一个人比得上毛主席的水平。有些人说〈〈资本论〉〉是理论的基本阵地，其实〈〈资本论〉〉只解决资本主义社会的规律问题。我们国家，资本主义已经打倒了，现在是解决社会主义社会的规律问题。反对帝国主义、现代修正主义和中国反动派，建设社会主义，就是要靠毛泽东思想。毛泽东思想是最高水平的马克思列宁主义。我们要把毛泽东思想伟大红旗举得高高的。要用毛泽东思想统一全党全国的思想。进一步促进人的思想革命化，挖掉资本主义的根子，防止修正主义。党的八届十一中全会很重视学习毛主席著作，现在全党全国学习毛主席著作已进入了新阶段，出现了新局面，新形势。"},{"type":"paragraph","text":"我们要打破洋人比中国人高明的民族自卑感。有这种民族自卑感，就会丧失革命斗志。有人说外国月亮比中国的好，我们不如洋人。其实，中国人到了外国，人家也是把我们看作洋人。有些中国人在外国比洋人还洋，学问都很高。洋教条的观点，土教条的观点，都是反毛泽东思想的。洋人、古人那里有毛主席高？那里有这样成熟的思想？毛主席这样的天才，全世界几百年、中国几千年才出现一个。毛主席是世界最大的天才。"},{"type":"paragraph","text":"归根到底，现在全党全国学习毛主席著作已经进入了一个新阶段，出现了新局面。军队要更进一步抓紧，更讲求落实，毛泽东思想伟大红旗一定要比过去举得更高。部队很可能有人认为，这几年搞得差不多了，搞久了就麻痹了。如果这样，就容易抓得不紧，学得不好，贯彻不好，就保持不了过去的朝气。"},{"type":"paragraph","text":"我们军队打仗，历来靠人的政治觉悟，靠勇敢。这就要靠政治教育，要用毛泽东思想来教育部队。部队战斗力的高低，取决于政治工作、政治教育抓得紧不紧。部队的纪律好坏，作风好坏，能不能出干部，能不能多出好人好事，千条万条，用毛泽东思想教育人是第一条。人的觉悟提高了，勇敢也有了，积极性也有了，创造性也有了，组织纪律性也有了，吃苦的革命精神也有了。全军工作情况虽然很复杂，有各种不同的情况，但在这一点上，又复杂又不复杂，又有差别，又没有差别，总的就是都用毛泽东思想统一起来。"},{"type":"paragraph","text":"明年怎么搞，总政宣传部要研究，各院校要研究。全党全国学习毛主席著作出现了新的形势，我们军队要把学习毛主席著作提高到新的阶段，搞出新的局面，要适应文化大革命这个新的形势。学习内容、学习方法、学习时间，你们去研究。"},{"type":"paragraph","text":"干部要学习毛主席著作。有些同志在部队里尽搞那些事务性的东西，一天忙到黑，那有那么多时间读书？他们到学校来，就是要让他们坐下来读书。如果不读毛主席的书，就要脱离理论，就要脱离方向。具体怎样搞法，你们自己去研究，可以办几个月的训练班，十个月、八个月也可以。"},{"type":"paragraph","text":"高等军事学院，政治学院，那些路子好，那些路子不好，要研究。"},{"type":"paragraph","text":"我过去曾经说过，对毛主席著作的学习，部队干什么学什么；学校与部队不同，学习时间长一点，内容可以多一点。要通读与选读相结合，通读与专题相结合。可以有三种办法：一种是按专题学，一种是完全按顺序学，一种是通读与专题相结合。时间长的采取通读与专题相结合，时间短的不通读，或者搞半通读，选读一些同当前形势和部队实际需要结合得紧的毛主席著作。究竟用那一种办法，要根据学习时间来决定，反正不要走过场。一期两个月、四个月的不搞通读，七个月、八个月的可以搞通读。时间长的可以搞通读，但重点要放在专题上。要有重点，不要搞平均主义。读书和做事，都不能搞平均主义。平均主义不合辩证法。一定要讲究效果，不要搞形式主义。要把这几年的经验总结一下，怎样才学得好，才能真正理解，熟练运用毛主席的思想，看那种形式、方法效果好，就采取那种形式、方法。现在，对毛主席思想不是学不学的问题，而是真正学到没学到、会用不会用的问题。"},{"type":"paragraph","text":"通读和选读的关系，你们怎么解决的？时间长的可以通读，但重点要放在选读上，平均主义不行。有些人有阅读能力，有学习的习惯，又有时间，也可以让他通读，不然他不放心，怕丢掉了什么。"},{"type":"paragraph","text":"要列出几个专题来作为重点。有些文章如作战命令，浏览一下就行了，重点文章就要多读。毛主席的哲学著作要学几十遍才能学懂。"},{"type":"paragraph","text":"部队里就是结合实际学，今天学这篇，明天学那篇，时间久了，就差不多通读了。有的要反复读，读好多遍，有的读几遍。还是干什么就学什么，有目的地学，和自己的工作结合起来学。用得上的学了就容易懂，容易记。例如，搞财贸工作的，学习毛主席关于财经问题的著作，就学得懂，记得住，用得上。不结合实际学，就学不懂，记不住，用不上。理论联系实际是根本原则。总之，重点是结合实际选读，同时又有通读。连队更要结合实际选读，要带着问题学习，活学活用。个别人愿意通读也可以，但不要作死规定。"},{"type":"paragraph","text":"老三篇虽然是战士必读的，但是干部也要读。老三篇最容易读，但最不容易做到。要把老三篇作为座右铭来学。哪一级干部都要学，包括我们这些人。从中央副主席到每个支部的每个党员，都要学。学了就要用，搞好思想革命化。思想方法和政策的学习也很重要。"},{"type":"paragraph","text":"《解放军报》要很好掌握，要很好突出毛泽东思想，联系部队实际，指导好部队学习毛主席著作。要反复教育，反复宣传。看起来部队是不变的，实际上干部、战士都在变，天天都在变。要反复宣传，结合新的形势，用新的语言反复宣传，就不觉得枯燥了。马克思列宁主义的根本原理，反来复去就是无产阶级立场，辩证唯物论和历史唯物论，但一结合实际，就一点也不觉得重复了。这样宣传，形式上不重复，内容上是重复，只有多次重复才能加深认识。"},{"type":"paragraph","text":"今天我提出的问题，你们回去研究。全国出现文化大革命的形势，全党全国学习毛主席著作进入一个新阶段。为了适应这个新形势，新阶段，部队特别要学好。部队一定要贯彻毛泽东思想，抵制修正主义思想和一切剥削阶级思想，加强革命化，提高人的觉悟，提高政策水平，提高思想方法。"},{"type":"paragraph","text":"总政宣传部编的战士熟读熟记的《毛主席语录一百条》，可以搞，这也是有重点的选读，不过更突出重点，更精练了。"},{"type":"paragraph","text":"无产阶级文化大革命，是不上课的政治课，是不经考试的考试。群众运动就是政治，就是最好的政治课。这话是毛主席说的。我也说过类似的话。"},{"type":"paragraph","text":"今天就谈到这里，一两个月以后，还可以再来谈一次。"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"在林彪等的竭力宣扬下，一个所谓“活学活用”毛泽东著作的新浪潮，与汹涌的红卫兵风暴一起，席卷全国。毛泽东的所有词句，都成了无可怀疑的宗教信条与包治百病的万能良药。下面收录的是两种当时在社会上广为流行的《遇到问题从\u003c毛主席语录\u003e中找答案》的传单。前者是军内流传出来的；后者则应是国家体委乒乓球队“革命小将”的杰作。都是千古奇闻，绝代妙品，对后来人了解所谓活学活用毛泽东著作是一个绝好的参证。此外，还抄录了一份石家庄开展“三忠于”活动的典型汇报。“三忠于”(忠于毛主席，忠于毛泽东思想，忠于毛的无产阶级革命路线)即“活学活用”毛泽东思想的具体内容。它有利于我们了解当时大学毛著，活用毛思想的实际情形。"},{"type":"paragraph","text":"遇到问题，从《毛主席语录》中找答案。(解放军某部编写)"},{"type":"paragraph","text":"1.对别人的思想，言论不会分析、批判怎么办？(查找)8、13、14页①"},{"type":"paragraph","text":"2.看到反动的言行及思想怎么办？10、14、18页"},{"type":"paragraph","text":"3.领导核心思想意见不一致怎么办？92、96页"},{"type":"paragraph","text":"4.工作抓不住重点怎么办？95、96、97页"},{"type":"paragraph","text":"5.想做好工作，但是没有办法怎么办？97页"},{"type":"paragraph","text":"6.自己的看法往往和群众不一致时怎么办？3、114、112、200页"},{"type":"paragraph","text":"7.不了解对干部职工培养使用方法怎么办？245、246页"},{"type":"paragraph","text":"8.遇到工作顺利时怎么办？65、88、167页①"},{"type":"paragraph","text":"即小红皮书《毛主席语录》一书的页码。在这一页上就载有毛的一段可供牵扯上的一段摘句。尽管大多数在原义上是渺不相干的。"},{"type":"paragraph","text":"9.遇到工作困难时怎么办？156、157、166、170、171页"},{"type":"paragraph","text":"10．遇到复杂艰巨的新任务怎么办？171、217、268页"},{"type":"paragraph","text":"11．工作有成绩怎么办？101、196、204、229页"},{"type":"paragraph","text":"12．工作没成绩怎么办？170、173、196页"},{"type":"paragraph","text":"13．受到表扬时怎么办？158、241页"},{"type":"paragraph","text":"14．受到批评时怎么办？146、223、226页"},{"type":"paragraph","text":"15．对同志提出意见后不接受怎么办？12、42、134页"},{"type":"paragraph","text":"16．想帮助同志怎么办？47、129、147页"},{"type":"paragraph","text":"17．对上级决定的工作有意见或有情绪怎么办？5、212、213、230页"},{"type":"paragraph","text":"18．自己有私心杂念不敢承认怎么办？208、219、229、232页"},{"type":"paragraph","text":"19．同志对自己的意见，不符合事实有出入怎么办？137、222页。"},{"type":"paragraph","text":"20．看到同志有缺点怎么办？232、208、238、223、225页"},{"type":"paragraph","text":"21．同志之间不团结怎么办？29、216、217、218页"},{"type":"paragraph","text":"22．遇到生活条件不合自己心愿或习惯怎么办？130、212页"},{"type":"paragraph","text":"23．有的同志不重视学习或理论不联系实际怎么办？263、244页"},{"type":"paragraph","text":"24．不了解开展文化娱乐活动意义怎么办？260、262页"},{"type":"paragraph","text":"25．学习和工作前信心不足怎么办？78、172、222页"},{"type":"paragraph","text":"26．学习和工作前急燥怎么办？179页"},{"type":"paragraph","text":"27．学习和工作中遇到困难怎么办？89、167页"},{"type":"paragraph","text":"28．工作有畏难情绪怎么办？18、167页"},{"type":"paragraph","text":"29．不知道如何看待青年和帮助青年怎么办？250、251页"},{"type":"paragraph","text":"30．学习和工作时疲劳怎么办？158页"},{"type":"paragraph","text":"31．受到表扬和取得成绩时怎么办？204、234、188页"},{"type":"paragraph","text":"32．受到批评和挫折时怎么办？48、176、223页"},{"type":"paragraph","text":" "},{"type":"paragraph","text":"88．和对手和不来怎么办？129页"},{"type":"paragraph","text":"89．技术与战术关系摆不好怎么办？146页"},{"type":"paragraph","text":"90．练习不认真怎么办？148页"},{"type":"paragraph","text":"91．比赛同伴失败怎么办？156页"},{"type":"paragraph","text":"92．练习时间长，疲劳厌战怎么办？156页"},{"type":"paragraph","text":"93．碰到怪球手怎么办？157页"},{"type":"paragraph","text":"94．参加政治活动影响技术怎么办？65页"},{"type":"paragraph","text":"95．有侥幸想赢球的思想怎么办？87页"},{"type":"paragraph","text":"96．对出场对手有意见怎么办？176页"},{"type":"paragraph","text":"97．战术碰到困难怎么办？110页"},{"type":"paragraph","text":"98．练搓攻，而推攻落后怎么办？184页"},{"type":"paragraph","text":"99．不善于思考问题怎么办？192页"},{"type":"paragraph","text":"100．基本技术全部不过硬怎么办？193页"},{"type":"paragraph","text":"101．比赛前急躁怎么办？197页"},{"type":"paragraph","text":"102．赢球后怎么办？229页"},{"type":"paragraph","text":"103．赛前信心不足怎么办？202页"},{"type":"paragraph","text":"104．不会做比赛前准备怎么办？203页"},{"type":"paragraph","text":"105．不重视体育活动怎么办？253页"},{"type":"paragraph","text":"106．输球后怎么办？236页"},{"type":"paragraph","text":"107．打球的目的不明确怎么办？259页"},{"type":"paragraph","text":"108．接受任务思想不通时怎么办？146、147、167页"},{"type":"paragraph","text":"109．打了败仗怎么办？75页"},{"type":"paragraph","text":"110．对事物认识不足思想害怕怎么办？77、17、222页"},{"type":"paragraph","text":"《关于学习石家庄市开展“三忠于”活动的情况汇报》(宣传稿)无产阶级革命派的战友们，革命的同志们："},{"type":"paragraph","text":"首先，让我们共同敬祝我们心中最红最红的红太阳，我们最最敬爱的伟大领袖毛主席万寿无疆！万寿无疆！万寿无疆！"},{"type":"paragraph","text":"敬祝我们伟大领袖毛主席的亲密战友林副主席身体健康！永远健康！永远健康！"},{"type":"paragraph","text":"同志们：我们市财革会，在市革委会首长的亲切关怀和支持下，组织了5个局系统的六人学习小组到石家庄市学习开展“三忠于”活动的经验。我们在石家庄市一共参观学习了八天。在这八天中，我们先后学习访问了卫东食品商店、新开街菜店、车站百货商店、桥西粮管所中心店、南马路东粮站、土产经理部、百货批发站、饮食公司、市人民银行桥西办事处、国棉二厂等十个单位。石家庄市革委会常委、财办负责人接见了我们，并向我们介绍了开展“三忠于”活动和机构革命化的情况和经验。通过八天的参观、学习、访问，给了我们极大的启发，深刻的教育，无限的感动，强烈的印象，使我们受到了一次极为生动的、深刻的毛泽东思想的教育。下面，我简要的向同志们汇报一下石家庄市开展“三忠于”活动的情况，不妥之处，请同志们批评指出。"},{"type":"paragraph","text":"一、石家庄市开展“三忠于”活动的情况"},{"type":"paragraph","text":"石家庄是个有四十万人口的新兴工业城市，有十四万产业工人，一万四千财贸职工。他们开展“三忠于”活动(三忠于即：无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的革命路线)是从今年一月份开始的。三月份以前，他们主要狠抓了对待活学活用毛泽东思想态度和马克思列宁主义的学风问题，三月份通过向驻石家庄空军O一九部队学习开展“忠”字活动以后，“三忠于”活动在全市各行各业全面展开。"},{"type":"paragraph","text":"目前，石家庄市到处都是一片“忠”字的海洋。人们的一切活动集中地突出一个“忠”字。他们说“忠”字话，做“忠”字事，当“忠”字人。他们把忠于毛主席，忠于毛泽东思想，忠于毛主席的革命路线，看成是时代的第一需要，革命的第一需要，把忠不忠于毛主席看成是两个阶级、两条道路、两条路线、两种思想斗争的分水岭，提高到革命的根本态度上来认识。当人们踏进这个革命化的城市以后，立即就会被“三忠于”活动的强烈革命气氛所感染。从机关到学校，从工厂到商店，从热闹的市中心到偏僻的街巷，从公共场所到每一个家庭，从人们乘坐的火车、汽车到住宿的旅馆，吃饭的食堂，到处都贴着、挂着一个金光灿烂光辉夺目的“忠”字。表示出他们无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命路线的坚强意志和战斗决心。"},{"type":"paragraph","text":"目前，石家庄市到处都是活学活用毛泽东思想的大课堂。他们每天早晨说的第一句话就是：敬祝毛主席万寿无疆！唱的第一只歌就是“东方红”，做的第一件事就是学习最高指示。从白发苍苍的老人到八、九岁的娃娃，人人都在读毛主席的书，听毛主席的话，照毛主席的指示办事，努力学习毛泽东思想，热情宣传毛泽东思想，活学活用毛泽东思想正在成为人们生活的第一需要。他们说：一时不读毛主席的书，干起活来劲不足；一天不读毛主席的书，有了困难顶不住；两天不读毛主席的书，忘了过去的阶级苦；几天不读毛主席的书，睁着两眼走邪路；天天都读毛主席的书，心明眼亮不含糊。大家一致认为：学习和宣传一条毛主席语录，就是一道动员令；学习和宣传一条毛主席语录，就是一根擎天柱，学习和宣传一条毛主席语录，就是一颗威力无穷的精神原子弹。"},{"type":"paragraph","text":"目前，石家庄市到处都是斗私批修的战场。各行各业都在举办各种不同类型的学习班。他们认为：斗不斗“私”，批不批“修”，是对毛主席忠不忠的问题。斗“私”要斗要害处，批“修”要提到纲上来。不管解决什么问题，他们都是通过斗私批修的方法来解决。每解决一个问题，都更加加深了对毛主席、毛泽东思想、毛主席革命路线的无限热爱，都更加加深了对中国赫鲁晓夫和他的资产阶级反动路线的无比仇恨。他们决心要心怀一个“忠”字，狠抓一个“用”字，猛攻一个“私”字，深挖一个“修”字，突出一个“群”字，强调一个“跟”字，提倡一个“敢”字，落实一个“公”字。决心把石家庄市办成一个红彤彤的毛泽东思想的大学校。"},{"type":"paragraph","text":"二、石家庄市是怎样开展“三忠于”活动的"},{"type":"paragraph","text":"石家庄市在开展“三忠于”活动的群众运动中，创造了很多好的做法和好的经验。由于我们参观学习的时间很短，和我们的水平所限，还不能把他们许多好的经验和各行各业的具体作法，向同志们作全面地、系统地介绍。下面，我着重向同志们汇报一下财贸部门开展“三忠于”活动的经验和作法。"},{"type":"paragraph","text":"（一）大抓活思想，大抓阶级教育，提高广大革命职工对开展“三忠于”活动的伟大意义的认识。"},{"type":"paragraph","text":"毛主席教导我们说：“掌握思想教育，是团结全党进行伟大政治斗争的中心环节。”“三忠于”活动，是一个具有伟大意义的政治运动。石家庄的广大革命职工都怀着对我们伟大领袖毛主席无限热爱、无限忠诚的心情，热情地、积极地投入了这个运动。但在运动一开始，有少数人对于这个运动的伟大意义认识不足，不理解，不得力，存在不同程度的思想障碍。在宣传毛泽东思想方面，开始有的很不习惯，怕难为情，张嘴就脸红，心发慌；有的怕影响业务；有的怕照顾不过来出差错；有的受无政府主义影响不愿意宣传。同有关部门办毛泽东思想学习班也有顾虑，怕在群众中亮了“私”和“丑”以后群众不信任了；怕人家不愿意和商店一起办学习班；怕同群众一起办学习班没有作用，是“瞎子点灯白费蜡”等等。他们根据不同时期的不同思想，狠狠抓住以下两方面的教育："},{"type":"paragraph","text":"第一‚进行开展“三忠于”活动的伟大意义的教育。"},{"type":"paragraph","text":"通过“三忠于”伟大意义的教育，使广大革命职工认识到：毛泽东思想是我们时代的旗帜，只有毛泽东思想才能保证我国无产阶级江山永不变色，才能使被压迫民族和人民得到解放，才能使修正主义篡夺了政权的国家的人民推翻修正主义的统治，重建无产阶级专政，引导世界革命走向彻底胜利。“三忠于”就是忠于马克思列宁主义、毛泽东思想，就是忠于共产主义事业，就是忠于国际无产阶级，就是忠于全世界人民。“三忠于”是时代的第一需要，是革命的第一需要，是无产阶级利益的第一需要。“三忠于”是我们革命人民最根本的立场，最大的革命原则，是高于一切的革命大节。对“三忠于”抱什么态度，是区分真革命和假革命、马克思列宁主义和现代修正主义的分水岭。要使广大革命职工在这个崭新的认识基础上产生对毛主席、毛泽东思想、毛主席的革命路线的忠，才是高度自觉的忠，才能完全彻底的忠，才是经得起任何严峻考验的忠。"},{"type":"paragraph","text":"第二‚进行阶级教育。"},{"type":"paragraph","text":"林彪同志说：“政治教育主要是抓阶级教育”，“抓活的教育”，“通过两忆三查(忆阶级苦，民族苦；查立场，查斗志，查工作)，学习毛泽东同志的著作，就是很好的的方法。”石家庄市就是按照林副主席的教导，狠抓了阶级教育。通过阶级教育，激励广大革命职工对毛主席、毛泽东思想、毛主席革命路线的无限热爱，无限忠诚。他们采用多种形式，如请军代表讲革命史，请贫雇农和老工人来开忆苦会，吃忆苦饭，并普遍开展了“三忆、三比、三查”的思想教育，即：一忆旧社会的苦，比新社会的甜，查对毛主席的无产阶级感情。二忆伟大领袖毛主席恩情，比对毛主席忠不忠的态度，查在工作中有哪些缺点。三忆中国赫鲁晓夫滔天罪行，比毛主席伟大英明，查文化大革命中表现。他们还开展了“五查五看”的教育，即：一查我们是否事事忠于毛主席，看我们对毛主席的思想感情。二查是否时时忠于毛主席，看斗私批修的标准高低。三查是否处处忠于毛主席，看活学活用毛主席著作的情况。四查我们是否永远忠于毛主席，看紧跟毛主席伟大战略部署紧不紧。五查我们是否无限忠于毛主席，看我们把无产阶级文化大革命进行到底的决心。通过这些教育，保证了“三忠于”活动不断深入持久的开展，使“三忠于”活动不断地向新的水平迈进！"},{"type":"paragraph","text":"（二）充分发动全市各行各业进行“忠”字化环境布置，处处体现出开展“三忠于”活动的强烈的政治气氛。"},{"type":"paragraph","text":"林副主席教导我们说：“马克思列宁主义的观点不是这样，它认为内容和形式是统一的。内容没有形式是不能发展也不能存在的，形式没有内容也就不能发展和存在，两者什么时候都是结合在一起的。好的形式能够推动内容的发展，坏的形式会阻碍内容的发展。所以，我们要重视内容，也要重视形式。”石家庄市在开展“三忠于”活动中，不仅十分重视开展“三忠于”活动的内容，也非常注意开展“三忠于”活动的形式，把好的革命内容和好的革命形式密切结合起来。在这个问题上，最好的体现是在全市“忠”字化的环境布置上。石家庄市“忠”字化的环境布置有两个非常突出的特点："},{"type":"paragraph","text":"第一‚就是它的广泛性。他们发动全市各行各业，人人动手，把石家庄市布置成了一个“忠”字城。火车头上挂着一个很大的“忠”字，公共汽车上用油漆喷上五颜六色的“忠”字，人们的胸前用红线绣上“忠”字，毛主席像周围镶着“忠”字，在毛主席像下还有个大“公”字，最大的公就是最大的忠，办公室、会计室、宿舍、食堂、公共场所到处都贴着引人注目的“忠”字。人们所到之处，耳闻目见，一言一行，到处都感到开展“三忠于”活动的强烈气氛，到处体现出石家庄市人民无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命路线的坚强决心。"},{"type":"paragraph","text":"第二，就是它的阶级性。“忠”字本身是没有阶级性的。它可以为无产阶级所利用，也可以为资产阶级所利用。石家庄市使用这个“忠”字中，充分体现出了鲜明而强烈的无产阶级的阶级性。凡是有“忠”字的地方，都有毛主席的语录和毛主席的像和向日葵。表示无产阶级和广大革命人民群众，对我们伟大的领袖毛主席无限热爱、无限忠诚、无限信仰、无限崇拜的最深厚的阶级感情。"},{"type":"paragraph","text":"（三）广泛地开展“一日活动毛泽东思想化”的群众运动，把店堂办成活学活用毛泽东思想的大课堂。"},{"type":"paragraph","text":"林副主席教导我们说：“把主席的思想灌输到工人、农民中去，才能改变劳动人民的精神面貌，才能使精神力量转化为巨大的物质力量。”石家庄财贸部门开展的“一日活动毛泽东思想化”的群众运动，就是广大革命职工把学习、执行、宣传、捍卫毛泽东思想作为自己的神圣职责，把毛泽东思想贯穿到一天每一言论和行动上。他们从营业前的准备，到营业过程，直至营业结束，都用毛泽东思想来指导。他们认为：营业前的准备，千准备，万准备，最最重要的是用毛泽东思想来统帅业务，指导自己的行动；营业结束后的晚汇报，最最根本的是活学活用毛主席著作情况的汇报。他们把整个工作过程、营业过程看成是活学活用毛泽东思想的过程。他们的具体做法是："},{"type":"paragraph","text":"1.提前开门，同顾客合办“三忠于”学习班。"},{"type":"paragraph","text":"他们除了坚持天天早请示和天天读以外，并提前开门(一般提前十五分钟)，同顾客一起开展“三忠于”活动。“三忠于”学习班活动的内容：一是在店堂同顾客一起向毛主席敬礼，一起歌唱“东方红”，一起敬祝毛主席万寿无疆，敬祝林副统帅身体健康，共同学习最高指示(老三段、新四段)和“再版前言”。二是向顾客宣传最新指示，讲形势，或同顾客一起批判中国赫鲁晓夫和伸向石家庄的黑爪牙。三是向毛主席宣誓，按照林副主席教导：紧跟毛主席，永远闹革命。“读毛主席的书，听毛主席的话，照毛主席指示办事，做毛主席的好战士。”无限忠于伟大领袖毛主席、无限忠于伟大的毛泽东思想、无限忠于毛主席的革命路线。"},{"type":"paragraph","text":"2.在营业过程中，根据不同对象宣传毛泽东思想。"},{"type":"paragraph","text":"在营业过程中，他们用毛泽东思想统帅自己的行动，用毛泽东思想接待顾客。他们除了普遍宣传最新指示外，还根据不同对象选择不同的语录进行宣传。例如："},{"type":"paragraph","text":"营业员讲"},{"type":"paragraph","text":"顾客接着讲"},{"type":"paragraph","text":"对工人："},{"type":"paragraph","text":"“狠抓革命，"},{"type":"paragraph","text":"猛促生产。”"},{"type":"paragraph","text":"“在工人阶级内部，"},{"type":"paragraph","text":"没有根本的利害冲突。”"},{"type":"paragraph","text":"对解放军："},{"type":"paragraph","text":"“要拥军、"},{"type":"paragraph","text":"爱民。”"},{"type":"paragraph","text":"“军民团结如一人，"},{"type":"paragraph","text":"试看天下谁能敌。”"},{"type":"paragraph","text":"“军队办学习班，"},{"type":"paragraph","text":"要有战士参加。”"},{"type":"paragraph","text":"“全国都要学习解放军，"},{"type":"paragraph","text":"群众是真正的英雄。”"},{"type":"paragraph","text":"“发扬革命传统，"},{"type":"paragraph","text":"争取更大光荣。”"},{"type":"paragraph","text":"“抓革命，促生产，"},{"type":"paragraph","text":"促工作，促战备。”"},{"type":"paragraph","text":"对农民："},{"type":"paragraph","text":"“抓革命，"},{"type":"paragraph","text":"促生产。”"},{"type":"paragraph","text":"要抓紧粮食、棉花生产，争取更大丰收。"},{"type":"paragraph","text":"对学生："},{"type":"paragraph","text":"“自力更生，"},{"type":"paragraph","text":"丰衣足食。”"},{"type":"paragraph","text":"“好好学习，"},{"type":"paragraph","text":"天天向上。”"},{"type":"paragraph","text":"“读毛主席的书，"},{"type":"paragraph","text":"听毛主席的话。”"},{"type":"paragraph","text":"“教育要革命，"},{"type":"paragraph","text":"学制要缩短。”"},{"type":"paragraph","text":"“紧跟毛主席，"},{"type":"paragraph","text":"永远闹革命。”"},{"type":"paragraph","text":"对干部："},{"type":"paragraph","text":"“不要吃老本，"},{"type":"paragraph","text":"要立新功。”"},{"type":"paragraph","text":"“要斗私批修，"},{"type":"paragraph","text":"要破私立公。”"},{"type":"paragraph","text":"“紧跟毛主席，"},{"type":"paragraph","text":"永远干革命。”"},{"type":"paragraph","text":"“努力学习老三篇，"},{"type":"paragraph","text":"彻底改造世界观。”"},{"type":"paragraph","text":"“为人民服务，"},{"type":"paragraph","text":"完全，彻底。”"},{"type":"paragraph","text":"对老年和家庭妇女："},{"type":"paragraph","text":"“祝毛主席万岁！"},{"type":"paragraph","text":"毛主席万岁！万万岁！"},{"type":"paragraph","text":"“勤俭持家，"},{"type":"paragraph","text":"勤俭建国。”"},{"type":"paragraph","text":"“敬祝毛主席万寿无疆！万寿无疆！万寿无疆！”"},{"type":"paragraph","text":"这种宣传毛泽东思想的方法，开始只是由营业员单方面宣传的，后来顾客提出要共同宣传毛泽东思想，发展到目前形式共同讲毛主席语录，另外，也还有以征求顾客意见的形式，同顾客一起学习最新指示。"},{"type":"paragraph","text":"3.用毛泽东思想交接班。如职工换班吃饭，也说“加强纪律性，革命无不胜”等。"},{"type":"paragraph","text":"4.营业结束后，晚上向毛主席汇报。"},{"type":"paragraph","text":"他们在每天营业终了坚持晚汇报。通过汇报，巩固开展“三忠于”的成果，以毛主席和林副主席的教导为准绳，检查当天开展“三忠于”的情况，暴露活思想，互相促进，互相帮助，这是群众自己教育自己的一种好形式。汇报的内容以毛主席、林副主席教导为准，对照、检查、小结自己一天的行动。汇报形势有两种：一种是自己站在主席像下检查汇报，另一种形式是坐下来，用毛主席语录，相互找长处，提希望。汇报后记入“斗私批修”战斗笔记本或叫“三忠于”活动笔记本。最后唱语录歌散会。"},{"type":"paragraph","text":"（四）以斗私批修为纲，大办各种类型的毛泽东思想学习班。"},{"type":"paragraph","text":"毛主席教导我们：“办学习班，是个好办法，很多问题可以在学习班得到解决。”石家庄市的无产阶级革命派遵照毛主席的这一伟大教导，他们把广泛深入的开展大办学习班作为开展“三忠于”活动的重要措施。在财贸部门不但自己举办学习班，而且同生产部门和消费者共同举办学习班。现在他们举办的有：商、农学习班，厂、批、零学习班，店、群学习班。形式灵活多样，内容十分丰富，他们抓住一个或几个专题，以“斗私批修”为纲，把斗私批修紧密结合起来，狠批以中国赫鲁晓夫为首的一小撮走资派，把对中国赫鲁晓夫的仇恨心搞得狠狠的，把无限忠于毛主席的红心搞得浓浓的。下面简要的汇报一下他们举办几种学习班的情况："},{"type":"paragraph","text":"1.农、商联合举办的毛泽东思想学习班。"},{"type":"paragraph","text":"农、商学习班，主要是菜店同贫、下中农联合举办的学习班。这里我们介绍一下新开街蔬菜店同一个生产队举办的学习班的情况。新开街菜店在大揭大批本单位走资派的基础上，认识到由于受中国赫鲁晓夫反革命修正主义路线的毒害，造成菜店与菜农的矛盾非常尖锐，他们就提出要一同和广大贫、下中农办毛泽东思想学习班。学习班怎么办？从哪里入手呢？他们就带着这些问题同贫、下农去商量，一开始生产队不同意办，说“你们是黄鼠狼给鸡拜年，不存好心眼”。后来他们说明是共同举办，生产队讲办可以，要在我们这里办。菜店答应去，生产队又说房子有问题，在解放军同志帮助下，房子解决了，菜店职工就买了毛主席的像，又写了最高指示进行布置。有个农民就说，“不要看他们现在花几个钱，以后还是在我们头上刮。”农民为什么会有这些顾虑呢？他们进行了分析，认为主要是过去受了中国赫鲁晓夫的“卡农民脖子”，实行压级压价压秤的坑害。这个菜店过去由于走资派按照他的主子中国赫鲁晓夫“卡农民脖子”的意旨办事，光一九六四年一个冬季就克扣农民四万多斤大白菜，在价格上也是不顾农民利益，“货到街头死，商店说了算”，在等级质量上刁难农民，譬如黄瓜，规定要满刺、顶花、笔直、条口均匀，才能算一级品，逼得农民在正长的黄瓜上套上硬纸套，使它长直，结果黄瓜是长直了，但是由于长的时候晒不着太阳发黄了，黄瓜真正成了“黄瓜”。他们认为这个问题是商店职工和贫、下中农共同关心的重大问题，就决定首先从这个问题入手，开展揭发批判。职工们说：“毒根伸到那里，我们就挖到那里”，他们把走资派带到学习班，与广大贫、下中农一道控诉以中国赫鲁晓夫为首的一小撮走资派破坏工农联盟的滔天罪行。菜店职工首先揭露批判走资派的罪行说：走资派给我们三把刀，压级、压价、秤杆高。有时职工不忍心压秤太多，走资派还说手段不辣，结果换上一个反革命分子，这小子心狠手辣，一天就压秤四千斤，来坑害农民兄弟。农民一看菜店的职工揭得好，批得好，他们也把生产队的走资派拉来斗。农民说菜店走资派给你们三把刀，压级，压价，秤杆高，我们生产队走资派也给了我们个‘大馅包’，上下好中间孬，来坑害国家，坑害群众。”经过共同批判，他们把仇恨统统集中到中国赫鲁晓夫和他伸向本单位的一小撮走资派身上。职工们深有体会地说：“病在我们身上，根子是中国赫鲁晓夫。”职工杨开山说：“在旧社会受剥削，恨剥削。在走资派操纵下使‘三把刀’，还认为一头是国家，一头是集体，为国家多赚钱，自己可得奖金，实质上是打着红旗反红旗，破坏工农联盟。为钱还是为革命，这是两条道路、两条路线的斗争。今后一定要按毛主席提出的‘发展生产，保障供给’的总方针办事。”东郊三队的农民说：“菜店给我们做了榜样，我们就要实打实的对待国家，过去为了钱字，不按国家计划种植，原订多种植八十亩大白菜的计划改种大蒜，虽然每亩要少收入二百多元，贫、下中农决心改良品种，争取高产，有改天换地的雄心，坚决走社会主义道路。”蔬菜的规格、等级、价格由菜店与贫、下中农协商制定。如黄瓜只要没有尖尖棒棒大肚子就算一级品。最后农民送六百斤黄瓜中，有几根不符商订的规格，菜店职工说：“算了吧”，农民不肯，要带回去当反面教材来批判中国赫鲁晓夫。菜店当晚就召集职工讨论如何向贫、下中农学习找差距。过去农民送菜都要跟四、五个人来争价、看秤，现在只要一人来就行了，也节省很多劳动力。在秤上，过去是没有斤，现在有了两，过去几斤就抹尾不算了，现在职工很认真，如送来的六百斤黄瓜，怕大磅称不准，用吊秤一搞差六两，又把六两补算上了。农民在学习班上斗私时说，你们过去坐在房里看秤，我们在磅上踏一脚，三、四个人就增加三、四百斤。通过学习班共同斗私批修，肃清了中国赫鲁晓夫的流毒，有了毛泽东思想共同语言和阶级感情，如菜店在“五一”节忙时，东交大队队长带了十几个人来菜店帮忙；菜店职工也急农民所急，协助解决十八万多根架杆，农民送给菜店一付对联：跟毛主席农商步伐一致，学毛著农商血肉相依。"},{"type":"paragraph","text":"2."},{"type":"paragraph","text":"厂、批、零联合举办毛泽东思想学习班。"},{"type":"paragraph","text":"这是产、供、销三结合的学习班。石家庄大百货批发部职工，通过革命的大批判，揭发了工厂生产、商业批发、零售等部门，由于受了中国赫鲁晓夫利润挂帅的毒害，尔虞我诈，互相扯皮，互不信任，造成了许多长期得不到解决的老大难问题。为了解决这些问题，许多同志提出联合办学习班的倡议。这个倡议一提出，认识就很不一致，批发部认为自己受毒不深，没有彻底革命的思想准备；工厂想通过学习班解决些实际问题；零售单位怕提了意见以后好商品分不到；也有认为产、供、销扯皮，这是老大难的问题，解决不了，不太关心。他们为了统一认识，端正态度，反复学习了毛主席视察三省一市的指示及有关语录，武装了头脑，统一了认识，集中火力狠批中国赫鲁晓夫利润挂帅的流毒，各自多做自我批评。批发部门着重检查批判利大大干、利小小干、没利不干；好销多收、不好销少收或不收等资本主义经营思想。例如布鞋有时脱销，一下子就签了一百万双合同，促使鞋厂粗制滥造，也造成商品积压。下一季度一看积压几十万双就不签合同，使工厂停产，不仅给国家在经济上造成很大损失，也在政治上影响很坏。工厂着重检查批判不顾产品质量，单纯追求利润的资本主义思想。鞋厂出产的鞋子有“礼拜鞋”的称号，由于质量不高，一个礼拜就穿坏了。零售部门着重检查批判过去为利经营，好销多进，不好销宁让脱销也不进的思想，忘记了毛主席“发展生产，保障供给”的教导。在革命大批判的过程中，还请了老红军、老贫农做报告，忆苦思甜，提高阶级觉悟，增强对毛主席无限热爱的感情。有的同志听了报告后讲，这两人的苦是我们整个阶级的苦，要不是毛主席领导无产阶级文化大革命，我们就要受二遍苦。中国赫鲁晓夫推行的物质刺激、利润挂帅，就是要复辟资本主义，我们一定要以斗私批修为纲，把中国赫鲁晓夫修正主义的流毒肃清。为了加深对中国赫鲁晓夫的仇恨，还举办了实物展览，在展览会现场批判了以次充好、蒙头盖面等资本主义经营方式，还把那些“长命锁”、“金项链”、“高跟鞋”“口红”、“胭脂”等等毒害人们灵魂的二十多种商品供大家批判控诉。他们是边学边改，在毛主席的光辉思想照耀下，团结一致，共同为广大工农兵服务。忠不忠看行动，全体学员怀着对毛主席的一个“忠”字，白天学习，晚上回单位，和本单位革委会、造反派共同研究整改，商业职工到工厂参加劳动，批发部门送货到零售部门，工人到零售店售货直接听取群众要求，互相帮助，互相促进，明确了要想能满足广大人民需要必须从发展生产着手。如香皂供不应求，批发站就到张家口等地积极采购原料，工业原料库存向批发部交底，商业进销计划与工厂共同研究交流，拧成一股绳。总的说来，经过三结合的毛泽东思想学习班，打破了产、批、零过去单纯的买卖关系，树立起新的协作关系，更好的贯彻了“发展生产，保障供给”的总方针。三结合学习班也体现了毛主席“五·七”指示的精神。通过一起批判，也加深了阶级感情，加深了对毛主席的无限热爱。"},{"type":"paragraph","text":"3.商店和居民联合举办店、群学习班。"},{"type":"paragraph","text":"这种学习班一般是粮店、菜店同居民合办的。因为菜店和粮店供应的消费者对象比较固定，同群众的关系也比较密切。我们在石家庄学习了桥西粮店和新开街菜店办学习班的经验。这两个学习班，与其他学习班一样，以斗私批修为纲，狠批中国赫鲁晓夫和他在石家庄的代理人。开始时也遇到些阻力和活思想。"},{"type":"paragraph","text":"如职工反映：怕在群众中亮了“私”字和“丑事”，怕群众今后不信任我们了。有的怕当群众面揭我们的短面子不好看等等。通过学习职工们下了决心，丢掉私心，换红心，和居民一同肃清中国赫鲁晓夫的流毒。"},{"type":"paragraph","text":"如有的居民反映：“你们奸商还办学习班？你们就是为了赚钱，叫我们去，你给我们多少钱”；有的就不理不睬的。有的居民说：“你们还办学习班？有一次我说你们开后门，你们把眼珠都瞪出来了，还一个劲的和咱吵，不为吃好菜谁干这个行当。有的居民是抱着听听看参加了学习班。经过职工的“斗私”，带动了居民的斗私。"},{"type":"paragraph","text":"店、群学习班主要是狠批中国赫鲁晓夫的利润挂帅、奖金挂帅和吃小亏占大便宜。通过对利润挂帅和奖金挂帅的批判，使广大职工加深了对中国赫鲁晓夫所推行的反革命修正主义路线的仇恨，增强了对毛主席无产阶级革命路线的热爱。职工们说：中国赫鲁晓夫“开店就是为了赚钱”的谬论毒害了我们，“钱”字绊住了我们腿，使我们转了向，迷了路，“钱”字使我们讲鬼话，做坏事。有的说：“奖金、奖金，是修字毒根，拿了中毒，吃了变心。”“奖金把社会主义搞乱了，把职工的团结搞散了，把国家和群众的关系搞断了。”由于职工们揭露和批判了资本主义经营思想和经营作风，认识到中国赫鲁晓夫的利润挂帅，奖金挂帅是“杀人不见血的软刀子，拿在手上，笑在脸上，毒在心上，把人引到邪路上。”居民听了职工的揭露批判，也认识到过去店群关系紧张，是中国赫鲁晓夫在搞鬼，要把账记在中国赫鲁晓夫的头上。因而店群关系改善了。有个老大娘说：“过去我认为中国赫鲁晓夫又没有到你们粮站来，那里来的中国赫鲁晓夫的毒，都是把账记在你们粮站的头上，现在才知道是中国赫鲁晓夫这个坏蛋搞的鬼。那说起来我也受了中国赫鲁晓夫的流毒，吃小亏，占大便宜，每月花二分钱买一张奖状送给您们粮店，每次来买米打油你们给我的称都是称的高高的。”有的顾客说：“过去走资派害得我们成了冤家，现在毛泽东思想把我们合成一家。”有的把过去粮站多给的粮票退了回来，还向毛主席请了罪。通过斗私批修，店群关系出现了一片新的气象。职工的服务态度好了，吵嘴的少了，开后门的少了，讲私人感情的少了。职工们说：“毛主席的话比仙丹妙药还灵”，居民们说：“毛泽东思想威力大，解开了多年的大疙瘩。”"},{"type":"paragraph","text":"三、石家庄市开展“三忠于”活动的收获"},{"type":"paragraph","text":"石家庄市开展的“三忠于”活动，虽然只有短短的五个多月的时间，但所取得的成绩是非常显著的。通过开展“三忠于”活动，石家庄市活学活用毛泽东思想的群众运动已经提高到一个更新的水平，推进到一个更新的阶段。广大革命群众由于在“三忠于”活动中，狠斗了资产阶级的“私”字，深挖了修正主义的根子，大立了无产阶级的“公”字，因而，进一步提高了阶级斗争和路线斗争的觉悟，促进了人的思想革命化。正如林副主席教导我们的：“现在我们伟大的祖国，正在出现一个工农兵掌握马克思列宁主义、毛泽东思想的新时代，毛泽东思想为广大群众所掌握，就会变成无穷无尽的力量，变成威力无比的精神原子弹。”"},{"type":"paragraph","text":"（一）通过宣传和学习毛泽东思想，“三忠于”活动家喻户晓深入人心，广大营业员都自觉用毛泽东思想指导自己的行动，接待顾客，在群众中的影响很大。过去营业员是单纯的做买卖，一手收钱，一手交货，现在首先宣传毛泽东思想，因此也促进了广大群众学习和宣传毛泽东思想的热情。如卫东副食品商店过去有一位老年顾客经常来这个店买香烟，开展“三忠于”活动后，他忽然在一段时间内自己不来买香烟，委托一个青年来代买，以后问他为什么有一段时间不来买烟，他说你们讲的都是毛主席的话，我过去没有好好学习毛主席著作，不好意思来了。他还深有体会的说：“没有毛泽东思想寸步难行。”以后这位老人经过一段时间的学习，又自己来商店买烟了。一到柜台就先讲：“毛主席万岁！”这位顾客说：“这样很好，我不仅买了东西，更重要的是你们帮助我学习了最新指示，促进我的学习。”不仅商店职工带动群众，而且群众也进一步促进了商店的职工。如有个红小兵来商店买东西，售货员一时忘掉了讲毛主席语录，小朋友不走，就问小朋友还买什么，这位红小兵说：你还没有讲毛主席语录呢！营业员立即讲：“向红小兵学习！”小朋友高呼：“毛主席万岁！”高兴的走了。这也进一步促进了这位营业员活学活用毛主席著作的热情。现在石家庄市不仅商店如此，工厂如此，街道居民如此，就连幼儿园里的小朋友也牢牢记着“三忠于”活动的开展。国棉二厂的幼儿园，有一天小朋友吃中午饭，阿姨忘掉了领着小朋友唱语录歌。饭菜端上桌子以后，可是小朋友都站在那里一个也不去吃。阿姨看到这种情况不知是为什么？便问小朋友：“小朋友，饭菜都盛好了，你们为什么不吃饭啊？”小朋友同声回答说：“阿姨，你还没有领着我们唱毛主席的语录歌呢！”这时阿姨脸通红的，立即领着小朋友唱了毛主席的语录歌。然后小朋友才去吃饭。粮店有位职工通过学习，把放在家里收藏多年的“长命百岁”银锁片拿出来和家里人说：“这是中国赫鲁晓夫的活命哲学，我们现在只要一个命，就是紧跟毛主席干革命”，就把锁片拿到银行卖了，卖的钱买了毛主席画像及毛主席的书赠送给邻居宣传“三忠于”活动。"},{"type":"paragraph","text":"（二）广大革命职工由于用毛泽东思想统帅自己的行动，服务态度改善了，服务质量提高了，商店同广大群众的关系发生了深刻的变化。广大职工进一步树立了全心全意为人民服务的思想，把方便送给顾客，把困难留给自己。如卫东商店有一个双目失明的老年人来商店买肉，但他还要买香烟，因为卖香烟的门市部开门迟，营业员便主动与香烟柜联系，把烟酒一起卖给顾客。这位老年人很受感动，说“你们真是人民的勤务员”。过去菜场与顾客吵架的情况比较多，通过开展“一日活动毛泽东思想化”以后，店群关系大大改善了，现在不但不吵嘴，而且在供应忙的时候，每天还有不少居民到菜店帮助劳动，担任义务售货员。有些营业员怀着一颗忠于毛主席的红心，发扬共产主义风格，舍已为人。如东风门市部在大雪纷飞的冬天，来了一个顾客，说是病人想吃菠菜，七十多岁的老营业员周振刚自己拄着棍，冒着大雪，跑到七里多路远的郊区生产队去买来了二斤越冬菠菜，交给了这位顾客。这位顾客激动得一遍又一遍的高呼毛主席万岁！万万岁！“一日活动毛泽东思想化”的群众运动，不但改善了商店与群众的关系，而且进一步激发了广大群众对我们伟大领袖毛主席的无限热爱。"},{"type":"paragraph","text":"（三）通过广泛宣传毛泽东思想，社会主义的新道德、新风尚大大发扬，“三忠于”活动的群众运动，正在冲刷着旧社会遗留下来的旧道德、旧风俗、旧习惯，广大人民的精神面貌为之一新。譬如过去有的售货员拾到顾客有名有姓的证件都不送，现在拾到无名无姓的东西也设法找到失主。过去有的顾客为了秤高、秤低同营业员吵嘴，现在营业员有时疏忽称多了，顾客主动送回。如一个粮站的营业员在一九六二年把六斤米看成六十斤，多给了这位顾客(退休工人)，而这个顾客那时由于私心杂念重没有讲，在今年开展“三忠于”活动中，这位顾客要求把几年前粮站多给的粮食扣下，并说：如果我把这份粮食吃下，就是吃掉了工人阶级的本色，我退的不是粮，退的是私心杂念，退的是“修”字的根，退的是中国赫鲁晓夫的修毒。有个小朋友有一次，在菜场偷拿了一个青罗卜吃了。在“三忠于”活动中，他认识这是不对的。便自觉地从家中拿了二分钱，写了一份检讨书，到菜场站在毛主席的像前作自我批评。营业员看到这个小朋友站在毛主席的像前说话，不知是怎么回事，便过去问他，这位小朋友说明了情况，交了二分钱和检讨书就走了。在场的人看到年轻一代新的共产主义社会风尚成长，心中感动极了。"},{"type":"paragraph","text":"（四）通过“一日活动毛泽东思想化”的开展，促进了商业职工的思想革命化，激发了为革命站柜台的光荣感。广大财贸职工普遍感到自己不仅是一个售货员，更主要是毛泽东思想宣传员，觉得自己肩上的担子重了，对商业工作更加热爱了。如北大街菜场有一个青年营业员，过去认为卖菜丢脸，人家问他在那里工作，他都是回答说：“在北大工作”，不敢说是在北大街菜场工作，现在他敢理直气壮地说是在菜场工作了。由于以毛泽东思想统帅自己的行动，又热情的宣传毛泽东思想，受到了广大群众的尊敬和赞扬，因而大大激励了广大商业职工的光荣感。又如有位妇女在清真门市部买了二斤粉条，他拿着走到半路上看看好象多些，又跑回去让售货员再秤秤，结果是多了一斤。这位妇女主动退了多称的一斤粉条，并说“国家的便宜不能沾，沾一点心上就多个黑点，沾多了心就变黑了，最后就要变修了。”"},{"type":"paragraph","text":"四、我们到石家庄市学习开展“三忠于”活动的一些体会"},{"type":"paragraph","text":"石家庄市在开展“三忠于”活动中，作了大量的深入细致的工作，创造了许多好的经验和作法，是值得我们很好学习的。其中最突出的我们感到有以下几点："},{"type":"paragraph","text":"（一）在市革命委员会的统一领导下，各级革命委员会把开展“三忠于”活动摆在一切工作的首位，当作头等重要的任务去抓。同时，他们还大力争取支左部队的支持，注意充分发挥革命群众组织的作用。这是搞好“三忠于”活动的政治保证和组织保证。“大海航行靠舵手，干革命靠毛泽东思想。”革命工作千头万绪，千条万件，但只要抓住了活学活用毛泽东思想这个根本，就找到了解决一切问题的关键，就能够一通百通，就能够统帅一切，就能够带动一切，就能够推动一切。毛泽东思想一旦被广大群众所掌握，就会产生无穷无尽的力量，干革命就能心明、眼亮、干劲足。反之，就会鼠目寸光，心窄、眼糊、无方向。石家庄“三忠于”活动之所以以开展得好，是各级领导重视，狠抓根本的结果。"},{"type":"paragraph","text":"(二)狠抓马克思列宁主义学风的树立，狠抓斗私批修这个伟大方针的贯彻。开展“三忠于”活动，如果不首先解决学习态度和学风问题，斗私批修这个伟大方针就不能很好地贯彻，“三忠于”活动也就不可能搞好。革命首先要革自己的命，不革自己的命，这个革命是搞不好的。只有很好地发动群众斗私，才能深入地发动群众批修。只有批判了资产阶级的“私”字，才能树立起无产阶级的“公”字，挖掉修正主义的根子。石家庄市在开展“三忠于”活动中，由于自始至终狠抓学习问题，狠抓了斗私批修这个伟大方针的贯彻，所以“三忠于”活动开展得既轰轰烈烈，又踏踏实实。"},{"type":"paragraph","text":"(三)充分发动群众，依靠群众，相信群众，尊重群众的首创精神。石家庄市开展“三忠于”活动一开始，市革委会领导上就明确提出：不划框框，不定调子。坚持从群众中来，到群众中去，集中起来，坚持下去。不断发动群众摸索创造经验，总结交流经验，大力支持群众运动中不断出现的新生事物。由于坚持了上述做法，使“三忠于”活动不断巩固，不断发展，不断提高。保证了运动深入、持久、健康的向前发展。"},{"type":"paragraph","text":"(四)充分发动群众破旧立新。毛主席教导我们说：“要破不立。破，就是批判，就是革命。破，就要讲道理，讲道理就是立，破字当头，立也就在其中了。”开展“三忠于”活动，就是两个阶级、两条道路、两条路线、两种思想的尖锐斗争，就是一场破旧立新的斗争。旧思想、旧作风、旧习惯势力不破，新思想、新作风、新习惯就立不起来。只有破掉了资本主义、修正主义的旧的一套，无产阶级的社会主义的新的一套才能树立起来。石家庄市在开展“三忠于”活动中，狠抓了革命的大批判。通过革命大批判，狠批了资本主义、修正主义思想，大立了毛泽东思想，促进了人们的思想革命化。"},{"type":"paragraph","text":"《遭遇荷兰“红宝书”》"},{"type":"paragraph","text":"1967年，我在驻荷兰使馆工作。彼时国内的“文化大革命”方兴未艾，红卫兵手捧红宝书的镜头常常出现在欧洲的电视荧屏上。欧洲人当时把《毛主席语录》称作《毛的圣经》或简称《小红书》。不少欧洲人，特别是青年人常常来使馆索要这本《小红书》，有的是为了研究它，也有的是纯粹出于好奇心。"},{"type":"paragraph","text":"有一天，一位年轻的荷兰商人来到使馆，说他即将去参加广州交易会，希望能得到一些介绍中国的有关资料。他特别提出想要一本英语版的《语录》和一枚毛主席像章。我满足了他的要求，他很高兴。突然他神秘地问道，“当今中国究竟是政治重要还是经济重要？”我对他提出的这个问题感到有点迷惑不解，于是只作了一般的解释。他对此没有说什么，只是笑了笑就起身告辞了。当我送他到会客室门口时，他回过头来真诚地对我说：“我还有另外一本‘小红书’，改日寄给你，如果你感兴趣，不妨读一读。”我说，“那你就寄来吧。”当时各种各样的《语录》翻译本在欧洲很多，我以为大概又是一种新的版本，对此没有十分在意。果然，三天后我收到了一本大小式样及装订都与《语录》相仿的《小红书》，但书名却是《与中国人做生意的秘密》。"},{"type":"paragraph","text":"书的扉页上有一段文字，大意是：“当今的中国正处于‘文化大革命’的狂热之中，一切都要服从于‘文化大革命’的政治需要。在这种情况下，按常规的办事方式已经行不通，你必须根据新的情况来调整你的策略和活动方式。为了使你能及时捕捉贸易机会并取得成功，本书收集了这个国家的最新情况并告诉你一些决窍，供你参考......”书中的条目有：文化大革命由来的背景，抓革命、促生产的情况，革委会的性质和职权，对外贸易情况，以及当时流行的一些政治口号和样板戏简介等等，最后还有一部分专门谈“诀窍”。“诀窍”告诫说，“不论你心里是否同意‘文化大革命’，但口头上你一定要表现出你是赞成和拥护‘文化大革命’的；你对中央文革小组的和当地的革委会一定要装出十分敬重的样子；你不能只谈生意，一定要谈点政治，最好能引用一两句毛的语录，这样效果更佳......”在具体活动方式方面建议你采取以下做法："},{"type":"paragraph","text":"你在广州下飞机前要检查一下胸前是否佩戴了毛的像章，以及公文包中是否装上毛的语录(像章和语录可以向中国使馆索要，他们会乐于向你提供的)。你去旅馆后争取尽快约见广交会的负责人或者你的贸易伙伴，但不要马上谈生意，也不必约他吃饭，而是最好表示你想要观看一次样板戏，说你对《红灯记》等戏仰慕已久，希望这次来中国能有机会实现这一夙愿。这样你既通报了你已经抵达，同时又表示了你政治上的友好态度，会使对方一开始就对你留下一个极好的印象。第三天，如果有可能的话，你最好上街去买一套中山装(此点如果你实在感到别扭，也可不办)，另外你在同对方交谈或接触时要很自然地显露出你读过毛的语录(在你拿文件时可“无意地”亮一下你公文包中所装的那本语录)。最后当交易谈得差不多时，你要赶在决定之前，特别是在协议签字前夕，寻找机会再次向对方表示，你想要一本毛主席的《老三篇》，你应当说这本书不仅对中国人民，而且对世界革命人民都具有深远的意义，回去后你会好好学习，并且要显得十分真诚。“诀窍”最后说，“你这样做也许会感到这是在进行表演，但不要忘记这是目前在中国最行之有效的手段，要克服自己的心理反差，始终要记住这样一句至理名言：利益是不变的，手法是可以变的。你的政治态度也许比你产品的质量和价格更为重要。......如果你被中国列入国际友人的行列，那你将财源茂盛......”"},{"type":"paragraph","text":"我读完了这本所谓的“小红书”，心里久久不能平静。我掩卷深思该书对当时我国社会状况的深刻洞察和入木三分的剖析，而“诀窍”所体现出的那种实用主义哲学，也确实到了淋漓尽致、无以复加的地步。"},{"type":"paragraph","text":"摘自2003年1月31日《文汇读书周报》卢秋田文9月17日—20日"},{"type":"paragraph","text":"由江青、陈伯达策划、张春桥主持，王力、关锋、戚本禹、姚文元参加，于18—20日连续四次召开了北京大专院校部分师生座谈会。清华、北师大、地质学院等高等学校的群众组织的代表蒯大富、王大宾等人参加座谈。一致认为在“文化大革命”中存在一条“右倾机会主义路线”，周恩来是“搞调和”、“把右倾机会主义路线保了一下”，还提出“中央十一中全会并没有领导解决这个问题”，“怀疑现在是否还有一个暗中与党中央、毛主席对抗的司令部”。张春桥把这类发言都印成材料，由江青上送毛泽东。这是为即将升级的批判资产阶级反动路线的斗争做思想和舆论上的准备。9月18日"},{"type":"paragraph","text":"中共中央发布《对被批判斗争对象的工资处理问题的通知》。"},{"type":"paragraph","text":"中共中央《对被批判斗争对象的工资处理问题的通知》①吉林省委并东北局，各中央局："},{"type":"paragraph","text":"吉林省委九月十六日电悉。对被批判斗争对象的工资处理意见，即使已定性的，也暂不改变，如本人少领工资，或捐献一部分工资作党费，听其自愿，但不强求，也不许其由减少用费而致病；私人东西，除政治性的，一般不查抄；凡未定性的，工资仍照旧。①此件系周恩来所亲拟。"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":417,"page_end":437,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"吉林文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"破四旧","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wengeqianqixinianlu2","name":"十年文革前期系年录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录2.pdf"],"article":{"title":"第七十五卷","parts":[{"type":"title","text":"第七十五卷"},{"type":"paragraph","text":"1967年3月25日至29日"},{"type":"paragraph","text":"（首都中学红代会成立）3月25日"},{"type":"paragraph","text":"在周恩来主持，林彪、江青、陈伯达、康生参加的解决青海问题会议上，林彪讲话，指责赵永夫在青海是搞法西斯大屠杀。这是带枪的刘邓路线。"},{"type":"paragraph","text":"林彪关于青海问题的指示"},{"type":"paragraph","text":"青海问题很大，是个严重的事件。前几天我们没有调查清楚，只听了赵永夫的谎言。原来他们把问题完全弄颠倒了。青海问题是个大案件，是法西斯的大镇压，元月二十三日青海军区接到中央的指示（五条），刘贤权同志召集常委开会，讨论如何贯彻执行，并向群众表明态度，支持八·一八，本来是对的，是正确的，就在这个同时，赵永夫煽动机关造刘贤权的反，同时又勾结反党分子王昭，操纵支持保守组织捍卫队、红卫兵总部，来斗刘贤权同志，赵永夫这个坏蛋并停止刘贤权、张江霖同志的工作，然后就篡了军权。后来又勾结总后办事处副主任张晓川，非法组织了联合指挥部，反抗兰州军区，操纵了驻军镇压八．一八。对内代替了青海军区党委，对外代替了青海省委，独揽了青海省党政军大权，并不经军区讨论和上级批准，张晓川非法调动了二百多辆汽车游行。二月十五日兰州军区党委有三条指示，叫把部队撤出来，赵永夫又派省军区副司令员刘斯起到兰州搞“绝食斗争”。赵为了镇压八·一八，对八·一八制造了许多莫须有的罪名，想尽一切办法找根据，谎报军情说：“群众有枪”，“群众先开枪的”。实际上部队先开枪的。二十三日调动了十三个连围攻报社，并开枪，抓了一万多人，打死打伤几百人，（有的群众面向东方，手挽手高呼毛主席万岁！高唱大海航行靠舵手）这是残忍的反革命行动。赵造谣说：“我给他们打电话，总理也打了电话。”（总理插话：根本没有那样的事）他说打电话“打得好”都是捏造。（呼口号：打倒赵永夫反革命分子。）"},{"type":"paragraph","text":"三月十一日青海问题，主席批了。经过调查已经查清楚了，这是一次反革命事件。青海事件是一个反革命政变。推翻了刘贤权同志的领导，赵永夫这个家伙，一九三三年在国民党南京交警教导纵队受了几年反革命训练，他是国民党，不是共产党，是隐藏在党内二十多年的反革命分子。刘贤权同志是个好同志，老红军，是支持八·一八的。去年反对王昭也是正确的。（叫刘贤权同志起来大家看一看，叫张江霖同志起来，大家看一看）。张江霖同志是支持刘贤权同志的，也是好同志。刘贤权同志也有个缺点呀！警惕性不高，你和老虎睡在一起，为什么没有发现。驻军其他同志也是警惕性不高，跟着跑，政治上麻痹（犯了错误）也应吸取教训，驻军调动十三个连，包围青海日报社，对八·一八进行残酷的镇压，法西斯暴行，这是带枪的刘邓路线，这是个典型，就是对于那些保守组织，甚至是反动的组织也不能开枪呀！除非是武装暴乱，只要是徒手群众就不要开枪。这一点你们回到部队要好好贯彻，开枪是没有好处的，解放军在文化大革命中不能随便开枪，不能随便抓人，一定要抓住这条死守线。（××开枪就变成大血案，大剑子手）西藏不也是为报社问题，九千人包围了六天，经过耐心的政策宣传教育，没有开枪，把群众争取过来了，也解决了问题，这样的例子其它地方也有。为什么要采取镇压的行为呢？开枪只能说明：只有那些仇恨人民的人，才能干得出来，不然是不可理解的，是想不到的的事。赵永夫造了很多谣，说“八·一八”有枪，首先开枪，是百分之一百的反革命，经调查根本没有这种事情。八·一八没有枪，怎么能首先开枪呢？就是事后也没有搜出一支枪。当时青海事情发生后，毛主席和我们都很重视，觉得问题很大，打死这些人就是问题。经过一查就是有问题，事情发生后震动很大，即使反动的，也不能这样做，即使反动的，也是头头反动，大多数受蒙蔽的群众是好的么！报告都有倾向性，对报告要慎重，不能以报告者的观点去听报告，这件事是和王昭有关系的，王昭和罗瑞卿的关系很密切，和彭真、刘澜涛是有关系的，是个坏蛋。青海公安总队改编独立师时，王昭就把独立师交给了赵永夫掌握，不交给刘贤权同志，所以独立师就掌握在他们的手中。（记不清）王昭是坚决执行刘邓路线的急先锋，是操纵保守组织与八·一八死做对，赵永夫在镇压八·一八以后就急于把王昭做为反革命的“三结合”对象。这个真是物以类聚，人以群分，根据上述情况，中央作出七条规定（中央决定已公布张贴）中央这个决定很好，把青海问题作了正确的解决。从这件事中，我们要吸取教训。军队也是不纯的，有坏分子的，象赵永夫这样的人还存在，我们的部队大多数是好的，但确有坏人，不但青海有，总政总参总后，各军也有，他们要造反，要夺我们的权。文化大革命，他们这些坏蛋都跳出来了，对我们来说好得很，坏家伙利用文化大革命，猛烈地向革命分子进攻；如果不搞一下，一旦有风吹草动，他们就会一轰而起，我们是毛主席缔造的军队，是可以信赖的，大部分是好的，有些是认识问题，但是确有一小撮坏家伙。所以我们要提高警惕性。如三个总部，空军、海军确有坏人。如果不是文化大革命，空军是会被坏人夺了权。他们不是把地位、人选都安排好了吗？海军主持工作的几个人也会被夺权。他们利用文化大革命向我们猛烈进攻。总后也是这样，黄克诚、洪学智和他们的爪牙，就抓了邱会作同志的小辩子，邱会作同志小偷小摸的事有，应该烧，但邱会作是个好同志。总政也有，总参也有，都是坏分子。从量上来看不多，但分量很重。比如，总政就有日本特务、国民党分子，总参有夺权吗？所以我们要提高警惕性，差不多我们这些组织中间，也是要一分为二。但是青海的问题有它的特殊性，是国民党分子、法西斯分子、蒋介石分子隐藏在革命队伍中的反动派，他们乘机要夺我们的权。我们军队对刘邓反动路线的认识比地方差，比红卫兵差，与刘志坚的不介入是有关系的，现在要加强两条路线斗争的教育，对群众组织要具体分析，一分为二，对那些冲击军区的，也不能一概而论，说是坏组织，比如左派冲击军区，也搞认罪、请罪那就不好了。主席在八条规定中讲得很清楚，你们要好好学，领会主席思想，我们要把文化革命搞好，就要依靠群众组织的大多数。靠解放军，靠大多数的革命干部。昨天主席又再次提出强调这个问题。特别是我们的解放军，一定要依靠群众，解放军和群众象鱼和水的关系，一刻也不能脱离群众，过去是这样，现在也是这样，永远是这样，离开了群众我们无法生活，有群众和没有群众，情况就大大不同，不是小小的不同。所以我们要好好地进行群众工作，深入群众，听取群众意见，支持左派。只有和群众站在一起，即使万一支持错了，马上就改正，昨天晚上主席还讲：军队要支援农业，支援工业，要支援革命左派，训练革命师生，任务很重，很可能犯错误，但是我们不怕，也不要把矛盾上交，要好好干，只要我们好好按主席思想和主席指示办事，紧密和群众站在一起，肯定主流是主要的，就是有了问题，及时请示军委，这样可能三分之二对，错也是三分之一。"},{"type":"paragraph","text":"关于两条路线斗争，红卫兵比我们清楚。今天主席打了电话，请示了一下，想把红卫兵出的报和传单，比如刘少奇一百例罪状，收集一下，印发下去，有了铁证如山，也能使人恨起来，不然光靠一般讲是不行的，没有群众观点，和人民没有感情，就会把群众当成坏人，就会随便开枪，就是和人民没有感情，总政要收集，快印发，要采取措施。（肖华同志说：我们印了第一册），一册还不行，还要继续印，思想上的转变，还是事实在前，没有事实，人家印象不深。还有总理、康生、伯达、肖华、杨成武等同志的讲话，也要印发下去，这场文化革命的斗争，是阶级斗争，不是宗派斗争。空军的成均就是要夺权的，这是贺龙搞的，这些坏家伙，你不斗倒他，他就斗倒你，不是什么宗派斗争。你想躲也是不行的，想防御也是不行的，只有进攻，这是不以人们意志为转移的。我们一定要认真地进行文化大革命，把无产阶级文化大革命进行到底。青海的问题给我们提供了一个血淋淋的典型。你不打倒赵永夫，他就要打倒你刘贤权，如果这样下去，我们的国家就要变颜色了。"},{"type":"paragraph","text":"首都中等学校红卫兵代表大会召开，周恩来、江青在会上讲话，号召中学生回到本校去，复课闹革命。大会发表了宣言。"},{"type":"paragraph","text":"首都中等学校红卫兵代表大会宣言"},{"type":"paragraph","text":"东风浩荡，红旗飘扬，我们，毛主席的红卫兵，沐浴着毛泽东思想的万道霞光，满怀革命的壮志豪情，从伟大红卫兵运动的发源地——北京，向全中国、全世界庄严宣告：首都中等学校红卫兵代表大会（中学红代会）在无产阶级文化大革命进行两个阶级、两条道路、两条路线决战的关键时刻，光荣诞生了！"},{"type":"paragraph","text":"这是首都中等学校数十万革命造反派的大联合，大团结，大会师。中学红代会的召开，是我们最最敬爱的伟大领袖毛主席和中央文革小组亲切关怀的结果。她标志着首都中等学校无产阶级文化大革命走上了新的战斗里程。"},{"type":"paragraph","text":"伟大的红卫兵运动发源于毛泽东思想的故乡，她是我国社会主义革命新阶段的必然产物，是二十世纪六十年代国际共产主义运动的伟大创举！"},{"type":"paragraph","text":"伟大的红卫兵运动走过了光辉的战斗历程。当她刚刚从东方地平线上出现的时候，是我们心中永远不落的红太阳毛主席，以伟大的无产阶级革命家的气魄，敏锐地发现了这一蕴藏着强大生命力的幼苗，坚决地斩断了企图把红卫兵扼杀在摇篮里的资产阶级反动路线的黑手，是毛主席高度赞扬和坚决支持了红卫兵的大无畏革命造反精神，是毛主席和他的最亲密战友林彪副统帅，一次又一次亲切地接见了成千上万的红卫兵小将，号召红卫兵在大风大浪中经风雨见世面......。伟大领袖毛主席的无限关怀，当代最伟大的无产阶级革命家的强大声音，象春雷动地，在短短的时间内，红卫兵的星星之火如烈焰滚滚，燃遍全中国，辉映全世界。"},{"type":"paragraph","text":"红卫兵从她诞生那天起，就誓作毛主席最最忠实的红小兵，对毛主席无限热爱，无限信仰，无限崇拜，无限忠诚。"},{"type":"paragraph","text":"红卫兵从她诞生那天起，就作为无产阶级文化大革命的急先锋，登上政治斗争舞台，在自己的鲜红大旗上，金光闪闪地写下了伟大领袖毛主席的教导：“马克思主义的道理千条万绪，归根结底就是一句话：‘造反有理。’”"},{"type":"paragraph","text":"红卫兵一登上政治斗争舞台，就在毛泽东思想的指导下，在无产阶级文化大革命的主力军——工农兵的全力支持下，以无比的英雄气概，“杀”出校门，冲向社会，大破剥削阶级的四旧，大立无产阶级的四新，大造党内一小撮走资本主义道路当权派的反，大造一切牛鬼蛇神的反，把旧世界打了个落花流水。红卫兵驱散了资产阶级反动路线的白色恐怖，粉碎了反革命的围剿，击败了他们一次又一次的疯狂反扑，夺取了一个又一个的辉煌胜利。"},{"type":"paragraph","text":"红卫兵在光焰万丈的毛泽东思想的哺育下，在阶级斗争中，迎险风，战恶浪，成为毛泽东时代的敢想，敢说，敢干，敢闯，敢革命的闯将。红卫兵不愧为社会主义革命新阶段的一支最可贵的政治突击力量；红卫兵为无产阶级文化大革命立下了丰功伟绩，在国际无产阶级革命史上写下了不朽的篇章。"},{"type":"paragraph","text":"红卫兵沿着伟大舵手毛主席指引的航向，历尽无数惊涛骇浪，冲破重重急流险滩，驶入了新的战斗航程，今天，我们在毛泽东思想的伟大红旗下，更加紧密地团结起来了，联合起来了！"},{"type":"paragraph","text":"我们成立了自己新型的革命组织机构——首都中等学校红卫兵代表大会，这是我们中等学校红卫兵的最高权力机构。在代表大会期间，设立一个委员会，作为常设机构，处理日常事务工作。"},{"type":"paragraph","text":"我们的最高司令是最最敬爱的伟大领袖毛主席。"},{"type":"paragraph","text":"我们的指导思想是战无不胜的毛泽东思想。"},{"type":"paragraph","text":"我们是中国人民解放军的最强大的后备军。"},{"type":"paragraph","text":"我们的组织原则是民主集中制。"},{"type":"paragraph","text":"我们红卫兵以劳动人民家庭（工、农、兵、革命干部和其它劳动者）出身的革命学生为主体，非劳动人民家庭出身的，对毛主席有深厚阶级感情，有无产阶级的革命精神，一贯在政治思想上表现比较好的，也可以参加。"},{"type":"paragraph","text":"我们无产阶级革命派钢铁般的战斗口号是：革命无罪，造反有理！"},{"type":"paragraph","text":"摆在我们面前的最根本任务，就是要牢记毛主席的伟大教导：“你们要关心国家大事，要把无产阶级文化大革命进行到底！”我们一定要不折不扣地贯彻执行毛主席亲自主持制定的无产阶级文化大革命的纲领——十六条，充分依靠群众，大搞群众运动，把社会主义革命进行到底，不获全胜，决不收兵！"},{"type":"paragraph","text":"毛主席教导我们：“我们决不可因为胜利，而放松对于帝国主义分子及其走狗们的疯狂的报复阴谋的警惕性，谁要是放松这一项警惕性，谁就将在政治上解除武装，而使自己处于被动的地位。”经过几个月来的艰苦奋斗，毛主席的无产阶级革命路线已经取得伟大胜利，并且还在节节胜利，广大革命群众发动起来了，资产阶级反动路线已陷于四面楚歌、全面惨败的境地。我们面临的，是一片光明，一片大好形势。但是，“敌人是不会自行消灭的。”我们清楚地看到，资产阶级反动路线的余毒还没有彻底肃清，它的社会基础远没有被摧毁，一小撮反革命修正主义分子还没有彻底斗倒、斗垮、斗臭，一斗二批三改的伟大历史任务还没有完成。种种迹象表明，当前出现了一股资本主义复辟的反革命逆流。党内一小撮走资本主义道路的当权派，人还在，心不死，他们还在负隅顽抗，同社会上的牛鬼蛇神遥相呼应，向无产阶级革命派反攻倒算，妄图否定无产阶级文化大革命的伟大成果。“宜将剩勇追穷寇，不可沽名学霸王。”无产阶级革命派必须联合起来，击退资产阶级反动路线的新反扑，痛击资本主义的反革命复辟逆流，把党内一小撮走资本主义道路的当权派斗倒、斗垮、斗臭，把资产阶级反动路线批倒、批臭，夺取无产阶级文化大革命的彻底胜利！"},{"type":"paragraph","text":"现在，毛主席已经发出了“复课闹革命”的伟大号召，期待着我们把中学的无产阶级文化大革命进行到底。多少年来，资产阶级及其在党内的代理人，在学校中顽固推行反革命修正主义的教育路线，对抗毛主席的无产阶级教育路线，中学是他们用以同无产阶级争夺青年一代的重要阵地。“学制要缩短，教育要革命，资产阶级知识分子统治我们学校的现象再也不能继续下去了。”领袖的教导，就是对我们的最高指示。我们要立即回到学校去，夺回被一小撮反革命修正主义分子和资产阶级分子盘踞的阵地，把反革命修正主义分子斗倒、斗垮、斗臭，打碎修正主义教育路线的枷锁，冲破旧教育制度的罗网，开创无产阶级教育的新天地，把我们的学校办成培养共产主义接班人的坚强堡垒，把毛泽东思想伟大红旗牢牢插在中等学校的阵地上！"},{"type":"paragraph","text":"毛主席说：“世界上一切革命斗争，都是为着夺权政权，巩固政权。而反革命的拼死同革命势力斗争，也完全是为着维持他们的政权。”有了政权就有了一切，丧失了政权，就丧失了一切。一个“权”字，集中地表现了整个社会主义社会的阶级斗争。我们红卫兵战士就是要高举毛泽东思想伟大红旗，无所畏惧地去造资产阶级的反，翻剥削阶级的天，就是要坚定不移地为无产阶级夺权，为无产阶级掌权，把党、政、财、文大权牢牢掌握在无产阶级的手中。"},{"type":"paragraph","text":"要夺权，就必须实行无产阶级革命派的大联合，否则夺权就是一句空话。“刻不容缓的民众大联合，我们应该积极进行。”当前，“以教学班为基础实现全校大联合”是一种很好的形式，它有利于文化大革命的深入发展，有利于彻底批判资产阶级反动路线，有利于彻底完成学校一斗、二批、三改的伟大历史任务。我们红卫兵要起模范带头作用，在实现这种联合的过程中，不断壮大左派的力量，发展革命派的队伍，为革命派大联合作出贡献。"},{"type":"paragraph","text":"要夺权，就必须坚决贯彻毛主席提出的革命的“三结合”的正确方针。这是取得夺权斗争胜利的根本保证。中学的革命“三结合”临时权力机构是由革命教师和学生、革命的领导干部以及解放军代表组成，它必须是革命的、有代表性的、有无产阶级权威的。有人歪曲革命的“三结合”的方针，搞折中主义，调和主义，合二而一，妄图混水摸鱼，实行反革命复辟，这是绝对办不到的。一切红卫兵，一切革命派，必须及时揭露，坚决反对。"},{"type":"paragraph","text":"“实行马克思所说只有解放全人类才能最后解放无产阶级自己的教导”，这是毛主席的伟大战略思想。毛主席所亲自制定的党的阶级路线，就是要分清敌我友，坚决依靠左派，争取中间派，团结大多数，彻底孤立和打击党内一小撮走资本主义道路的当权派和极端反动的右派分子。是否愿意并且真正逐步实行团结百分之九十五以上的干部和群众，这是检验执行毛主席的无产阶级革命路线还是推行资产阶级反动路线的试金石。对于那些犯了错误的干部、教师和学生，必须执行“惩前毖后，治病救人”的党的传统方针，满腔热情地启发他们的觉悟，欢迎他们回到毛主席的革命路线上来。就是犯了严重错误的人，也要根据毛主席的指示，只要不是反党反社会主义而又坚持不改和累教不改的，就要给他们改过的机会，让他们将功赎罪。对于反动的“血统论”以及排斥一切、反对一切、打倒一切的无政府主义思潮，关门主义的倾向，都必须彻底清算，坚决打倒！"},{"type":"paragraph","text":"无产阶级文化大革命是一场破“私”立“公”的思想大革命。目前，这个革命正在更广泛、更深入地触及人们的灵魂。夺“私”字的权，革“私”字的命，成了运动深入发展的关键。林彪副统帅指出：“我们要把自己当作革命的一份力量，同时又要不断地把自己当作革命的对象。”每一个红卫兵战士都必须在灵魂深处开辟灭资兴无的战场，大破“私”字，大立“公”字，实现思想革命化。当前特别要大学“老三篇”和（《关于纠正党内的错误思想》、《反对自由主义》、《中国人民解放军总部关于重行颁布三大纪律八项注意的训令》、《整顿党的作风》，《党委会的工作方法》）等毛主席的光辉著作，以“只争朝夕”的革命精神，狠抓世界观的改造，沿着毛主席指引的知识分子同工农群众相结合的宽广大道，在大风大浪中树立完全、彻底的为人民服务的世界观。红卫兵战士必须在整风中克服风头主义、小团体主义、无政府主义、极端民主化、个人主义等资产阶级思想倾向，加强革命性、科学性和组织纪律性，用毛主席提出的接班人的五项条件严格要求自己，把自己培养成为无产阶级革命事业的坚强可靠的接班人，保证我们的社会主义铁打江山千秋万代永不变色。"},{"type":"paragraph","text":"中国人民解放军是毛主席亲自缔造和领导的非常无产阶级化、非常战斗化的革命军队。我们要象人民解放军那样，高举毛泽东思想伟大红旗，永远忠于毛主席、忠于党、忠于人民，把我们的红卫兵组织办成毛泽东思想的大学校。"},{"type":"paragraph","text":"毛泽东思想是马克思列宁主义发展的一个崭新阶段，是无产阶级最强大的思想武器。我们深深体会到毛泽东思想是革命人民的命根子，是红卫兵的命根子，掌握了毛泽东思想这个最锐利的武器，我们就能战胜一切敌人，克服一切困难，把革命进行到底！这场两个阶级、两条道路、两条路线的决战，是活学活用毛主席著作的最好课堂。让我们积极响应林彪副统帅的号召，把活学活用毛主席著作的群众运动推向高潮。读一辈子毛主席的书，听一辈子毛主席的话，永远做毛主席的好战士、好学生。"},{"type":"paragraph","text":"“世界是你们的，也是我们的，但是归根结底是你们的。你们青年人朝气蓬勃，正在兴旺时期，好像早晨八、九点钟的太阳。希望寄托在你们身上。"},{"type":"paragraph","text":"......"},{"type":"paragraph","text":"世界是属于你们的，中国的前途是属于你们的。”"},{"type":"paragraph","text":"红卫兵战士们，同志们！我们的伟大领袖在召唤，我们的革命父兄在期望，让我们信心百倍地迎接更大的战斗吧！"},{"type":"paragraph","text":"“我们不但善于破坏一个旧世界，我们还将善于建设一个新世界。”我们将亲手埋葬帝国主义，我们将宣告帝国主义、修正主义在我们这一代实行“和平演变”的幻想彻底破产。我们决心同全国人民一道，把我们的祖国建设成为伟大的社会主义强国，同全世界革命人民一道，创立一个红彤彤的毛泽东思想的新世界！"},{"type":"paragraph","text":"红卫兵战士们，同志们，我们是祖国的未来，我们是世界的希望。红旗我们高高举，越举越鲜明，战歌我们唱下去，越唱越响亮。让我们在革命的暴风雨中乘胜前进，把毛泽东思想的伟大红旗插遍全球！"},{"type":"paragraph","text":"英雄的红卫兵万岁！"},{"type":"paragraph","text":"无产阶级文化大革命胜利万岁！"},{"type":"paragraph","text":"以毛主席为代表的革命路线胜利万岁！"},{"type":"paragraph","text":"伟大的中国共产党万岁！"},{"type":"paragraph","text":"伟大的战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"我们心中最红最红的红太阳毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"首都中等学校红卫兵代表大会"},{"type":"paragraph","text":"一九六七年三月二十五日于北京"},{"type":"paragraph","text":"军以上干部会议闭幕。"},{"type":"paragraph","text":"军委扩大会议精神"},{"type":"paragraph","text":"（传达记录整理"},{"type":"paragraph","text":"注意保密"},{"type":"paragraph","text":"不得外传）"},{"type":"paragraph","text":"军以上干部会议，从二月二十六日至三月二十五日，开了近一个月。会议期间，毛主席、林彪同志几次接见全体代表，会议由周、叶主持。周总理给会议作了两次重要指示，陈伯达也给会议作过指示。三月十二日，毛主席接见了全体同志。"},{"type":"paragraph","text":"①提高对文化革命的认识和两条路线斗争的认识，彻底批判资产阶级反动路"},{"type":"paragraph","text":"（一）线，坚决把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"1．文化革命的重要性及迫切性"},{"type":"paragraph","text":"开始同志对文化革命很不理解，很不认真，很不得力。后来解放军按主席指示，介入地方文化革命，好了一些，就有了五、十条，可是文化大革命完了，可能有些人还不理解。这次运动是触及每个人的灵魂的大革命，是场尖锐的阶级斗争......（记得不全）资产阶级向我党进攻十七年了，文化革命是我党向资产阶级大反击、大决战的斗争，是挖修正主义总根，保证我党不被修正主义腐蚀，保证我党千年万年不变色，胜利前进。"},{"type":"paragraph","text":"毛主席早就指出，在社会主义社会存在着阶级斗争、矛盾及资产阶级复辟的可能性，十七年来，有些地方，如北京市委、中宣部等被篡夺，中央组织部被叛徒控制了二十多年，不搞文化大革命怎么能行啊，所以毛主席对阿友（对尔巴尼亚）说：文化革命有两个可能，即（1）是资产阶级打倒我们，（2）是我们把资产阶级打倒。毛主席说把资产阶级打倒我们放到了第一位，如果不是放在第一位，就是没有敌情观念，如果不是这样认识，就是没有敌情。因为，1．地富反坏右在全国就有三千五百万人。2．八个民主党派有十多万人。3．旧中国留下的五百万旧知识分子，这些人一直统治着我们的文化部门，解放后接受了大批的旧职员、旧军人。所以复辟的危险性从目前来看，主要来自党内、国内以及上层和各机关走资本主义道路的当权派。但是，我们还是无产阶级专政的国家，毛主席在全国人民中有崇高的威信，十七年来取得的伟大成就，他们企图用武力来夺取政权是不可能的，所以他们用和平演变来搞我们，打进来拉出去，搞复辟，这个危险主要来自党内上层党的领导机关......。当然我们应看到党是毛主席亲自缔造的，是好的。但是不能光看到我们光明的一面，还看到有阴暗面，阴暗面主要表现有以下几个方面。"},{"type":"paragraph","text":"（1）老革命干部（指长征）是搞民主革命的，是搞资产阶级民主革命的，推翻三座大山他们是赞成的，但取消剥削他们就不干了，他们不是无产阶级革命家，有多少下去了，还有些在和平环境中演变过去了，所以他们搞社会主义就不行了。①编号不全，传单原件如此。"},{"type":"paragraph","text":"（2）解放后入党的占百分之八十，这些党员有的掌了权，如书记，区、县长以上的等。这些人没有经过复杂的阶级斗争的锻炼，世界观没有得到彻底的改造。"},{"type":"paragraph","text":"（3）解放后有些旧职员，表面上是共产党员，实际上是国民党员，如刘澜涛、胡锡奎。"},{"type":"paragraph","text":"（4）解放后，地、富、反、坏的子女，过去陆定一统治时，有些人上了大学，由国家统一分配，有些人是好的（指经过改造），但也有是化妆了的。他们对我党和社会主义制度怀有刻骨的仇恨。如刘澜涛这个叛徒案六十二个人除一个人是科长，死了二十二人，其余都是省委、市委以上干部。"},{"type":"paragraph","text":"我们党内也有里通外国的，自解放后不断出现反党反社会主义集团都是这些原因，资产阶级从五一年以后就向我党开始猖狂全面地进攻，我们虽然进行了一系列的政治运动，但只是解决个别问题，始终没有解决根本问题。毛主席总结了十七年来的政治斗争的经验，找到了文化革命的方法，充分发动群众，彻底揭露党的阴暗面，这是大教育，大批判，大审查，全国全党性的全面发动群众，叫群众搞，这次只要是三反分子统统打倒，这就从根本上解决了问题，不搞不行，（有一句看不清），搞晚了也不行，如再迟几年，那就不是我们揭他们了。再迟了连挂牌子的地方也没有了，不搞不行呀，在苏联就不行呀，你搞他镇压你，现在是一次不流血的内战，迟了就成了流血的大内战。"},{"type":"paragraph","text":"2．两条路线斗争的实质："},{"type":"paragraph","text":"一条是毛主席为代表的无产阶级革命路线，一条是以刘、邓为代表的资产阶级反动路线。资产阶级是搞资产阶级专政，十几年主要矛盾是两个阶级、两条道路的斗争，反映到党内来就是两条路线的斗争。"},{"type":"paragraph","text":"一系列的事实证明，刘少奇是党内走资本主义道路的当权派的代言人，是修正主义、资产阶级反动路线的总根子，是埋在党内的定时炸弹，是党内头号走资本主义道路的当权派，刘少奇是大地主出身，一九二五年是被国民党抓去的，怎样出来的不清楚。可能是叛徒，这个问题刘少奇至今未向党中央和毛主席交待。"},{"type":"paragraph","text":"抗日战争胜利之后，刘少奇宣扬我军向蒋介石投降（当时刘澜涛是赞成的）。在解放后，他说巩固民主革命，搞四大自由，五七年反对统购统销，“托拉斯”是刘少奇提出的。"},{"type":"paragraph","text":"50年到东北，当时东北正搞变工队，他不让搞，他说每户有了马、驴才能搞，他形左实右，主张把地主一律扫地出门，与毛主席提出的政策相对抗。刚解放，他就带着老婆到天津，反对搞社会主义，说社会主义太早了，现阶段搞社会主义是错误的。52年太原提出办合作化，刘少奇批了一句话：“这是空想的社会主义”。这是明目张胆地与毛主席相对抗，反对搞社会主义。59年批判彭德怀、黄克诚不积极。60年对形势悲观失望。62年带头刮单干风，搞“三和一少”、“三自一包”，与苏修遥相呼应。叛徒分布很广，各个角落。晋察冀是陆定一的一摊，文化部门是修正主义刘少奇的吹鼓手。刘少奇的外衣是“论修养”。刘少奇反对毛主席二十多年来是一贯的，毛主席说：“经过长期考察教育，我对这个人完全绝望。”“八大”是56年召开的，“九大”至今未开的原因也在于此。"},{"type":"paragraph","text":"邓小平，内战时期任七军政委，在福建有一次很紧张，假借汇报，跑了，临阵逃脱。解放后有人揭他（莫文骅中将）被打成反革命，现平反了。抗战时，彭德怀搞百团大战，毛主席不同意，实际上已经暴露了，以后伪军百分之九十五，日军的百分之六十，指向了我们，秋天，引来了冬季大扫荡。五九年斗彭黄时，邓小平、彭真、叶剑英三人小组负责处理罗瑞卿时，邓小平不参加会议，还要罗喊冤，罗顽固跳楼未死，还叫坚强，后来跑到陕西来了，到最后给罗下结论时，不都叫回来了。邓反对毛主席，自担任总书记以来，从来不给毛主席汇报，开会时，离主席远远的，主席讲话时也不记笔记。说林彪在部队搞学毛著是搞政治资本，形式化，他主张以实带虚，邓下面是贺龙、罗瑞卿。工作也不主动，吊儿郎当，整天打扑克，打麻将，专门派飞机接吴晗和他一起打桥牌，邓曾给毛选编辑部负责人说，毛选上多注解二野（突出刘、邓），少注解四野（贬低毛主席），并对林彪说，“你有平型关战役，我有淮海战役”，实际上他在淮海战役中并没有出啥力，在和林彪争功劳。"},{"type":"paragraph","text":"搞文化革命就是避免拿枪的内战。"},{"type":"paragraph","text":"毛主席提出三结合，但资产阶级搞的是两结合，其中就没有中国人民解放军。"},{"type":"paragraph","text":"3．主流与支流"},{"type":"paragraph","text":"最近（文化革命以来）中央发出了三十五个公开文件，都是解决支流问题。有些同志把支流看得多了，有些同志思想方法不对头，不看本质看支流。不要怕乱，主席讲，乱而治之，乱只能乱敌人，乱就能挖出来，没有这样的运动，他们就会把我们搞垮，把主席推翻。当然，就是敌人夺了权也不要紧，我们重新革命么！有的同志说影响生产。李富春同志讲，六六年是工业生产全面上升的一年，农业上升百分之七，工业上升百分之二十二，钢、煤、石油三月份又上升了。六七年工农业生产一定会全面地高速度的发展。死了几个人没有什么了不起，赶不上过去一个战役、战斗，淮海伤五万人；也赶不上一次流行病。革命不付代价是不行的‚群众起来了嘛，挂了就挂了（指挂牌子）。我们有些人演变，变了轰一轰，冲一冲，受受教育。这次大革命要把坏人打倒，把不坏不好的都教育过来。"},{"type":"paragraph","text":"阶级斗争不能调和的，要看主流，大方向，抓不住本质就要犯错误。"},{"type":"paragraph","text":"4．把文化大革命进行到底"},{"type":"paragraph","text":"文化大革命毛主席早有全面安排的，不理解也要执行，决不能不合自己的口味就不干了。"},{"type":"paragraph","text":"文化革命两个阶段，即：两个力量。"},{"type":"paragraph","text":"（1）从去年五月十六日至六七年元月二十三日是第一阶段，毛主席用了一张大字报，红卫兵，大串联就把全国亿万群众发动起来了，以红卫兵为急先锋，工农兵为主力，群众性的向党内一小撮走资本主义道路当权派和牛鬼蛇神冲他个不亦乐乎，来势非常之猛......"},{"type":"paragraph","text":"（2）人民日报社论《无产阶级革命派联合起来，夺党内走资本主义道路当权派的权》，这时出现了新情况：一、资产阶级反夺权，假夺权；二、左派分歧，互相争夺，牛鬼蛇神也起来夺权，形成了反复夺权，这在一、二月份是全国性的，是必然的，其原因是，革命造反派（小将）有天生的弱点，即政治上不成熟，虽然冲劲大，但是缺乏组织性。这时毛主席使用了解放军这支大军，介入地方文化革命，在这个阶段中以解放军为主力，推动各方面工作，凡没有人管的，解放军都管。"},{"type":"paragraph","text":"三个过渡："},{"type":"paragraph","text":"（1）把权过渡到解放军手里；"},{"type":"paragraph","text":"（2）从解放军手里把权过渡到革命的三结合的临时权力机构手里；"},{"type":"paragraph","text":"（3）从三结合那里过渡到象巴黎公社那样通过全面选举出来的权力机构。这样算一个大战役。"},{"type":"paragraph","text":"5．解放军的任务：三支两军。"},{"type":"paragraph","text":"三支即：支工业，支农业，支持左派，主要是支左。"},{"type":"paragraph","text":"两军即：军管、军训。"},{"type":"paragraph","text":"衡量左派的标准："},{"type":"paragraph","text":"（1）看大方向是否对准党内走资本主义道路的当权派，是否对准资产阶级反动路线，对党和毛主席的态度。对上述三点看，是认识问题还是一贯的。"},{"type":"paragraph","text":"（2）组织纯否，首先是领导成员，如果地、富、反、坏就不行。是否有走资本主义道路的当权派作后台。"},{"type":"paragraph","text":"（3）群众对这个组织的看法。"},{"type":"paragraph","text":"（4）衡量一个组织要用政治原则去衡量，不能带宗派情绪。"},{"type":"paragraph","text":"关于西安情况："},{"type":"paragraph","text":"三月十八日以后，出现了十八个群众组织，是四按（按部门结合）的必然反映。但也有些是山头主义的反映，对没有群众基础的，没有经过整风成立的，不承认，被推翻的保皇组织及改头换面的反动组织一律取缔......对民族性的组织也要一律取缔。"},{"type":"paragraph","text":"叶剑英、聂荣臻、萧华、杨成武、彭绍辉等在京西宾馆礼堂接见国防科委领导干部和群众组织代表，传达林彪指示：对二至七机部实行军事管制，各个院校及科学院新技术局由国防科委接管，实行军事管制。对几个研究院及科学院部分单位，由科委接管，进行调整改组。(《传信录633》)"},{"type":"paragraph","text":"戚本禹第五次接见青海造反派代表。(《传信录630》)"},{"type":"paragraph","text":"李富春接见团中央造反派，指出胡耀邦阴谋翻案。他写的大字报《我的申述之一》是资本主义复辟逆流的表现。(《传信录634》)"},{"type":"paragraph","text":"北京师范大学各战斗队纷纷反击苏东海攻击周恩来的大字报，贴出“周总理是坚定的无产阶级革命家”、“谁攻击周总理就是反革命”等大标语。"},{"type":"paragraph","text":"张春桥在上海与华东局造反派座谈，张说：总理要我管江苏、浙江。对刘少奇，毛主席说：我看以后我还要和他一起工作的。一些省委书记，如叶飞、江华、谭启龙都到北京去了，都是毛主席邀请他们去的。最近你们看到没有？本来提三反分子（反党、反社会主义、反毛泽东思想），现在只提二反了。本来提走资本主义道路当权派与坚持资产阶级反动路线的顽固分子，现在后一条不提了。陈伯达同志说：反动路线问题按内部矛盾处理，对走资本主义道路当权派给予出路。批判从严，处理从宽。3月26日"},{"type":"paragraph","text":"周恩来接见新疆代表团。造反派反映，军管以后，把造反派的权拿下，交给了保守派。解放军支持保守派，我们反对保守派就是矛头指向了解放军。新疆军区已勒令北京去的学生在3月10日离开，有隐瞒、窝藏的要受纪律处分。周一再肯定学生和造反派夺权大方向是正确的。解放军调查不够，支持的不对，应提醒其注意，造反派要主动与之搞好关系，否则不利于三结合。王恩茂问题，先不定性，回去作检查。(《传信录635》)"},{"type":"paragraph","text":"陈伯达、戚本禹到计委看大字报，询及3月24日召开的“彻底粉碎刘邓陶薄资本主义复辟大会”，有人反映会上有人喊“誓死保卫余秋里”。陈伯达说：“我是计委副主任，我没有来，是官僚主义，你们可以贴大字报，可以打倒我嘛。”戚本禹说：“他们连余秋里都不敢打倒，怎么还敢打倒你。”(《传信录636》)"},{"type":"paragraph","text":"陈伯达、戚本禹到清华大学，就教改问题与部分师生座谈。"},{"type":"paragraph","text":"北京钢铁学院张建旗对炮打周恩来一事拒不认错，声言“三个月后再见”。并于31日发表公开声明，坚持反周立场。"},{"type":"paragraph","text":"在上海整风动员会上，姚文元作了长篇的整风报告，张春桥作动员报告。(《传信录637、638》)3月27日"},{"type":"paragraph","text":"中共中央发布《关于安徽问题的决定》，指示立即成立以钱钧为首的军事管制委员会，把省的领导权掌握起来。"},{"type":"paragraph","text":"中共中央关于安徽问题的决定"},{"type":"paragraph","text":"今年三月间，中央召集安徽省军区负责同志、“安徽革命造反总指挥部”代表、持有不同意见的各左派群众组织代表、省市机关干部，举行了多次座谈，并分别作了多次个别谈话。中央对安徽问题，作出如下决定。"},{"type":"paragraph","text":"一、根据两个月实践检验，安徽“一·二六”夺权没有实现无产阶级革命派大联合，没有把矛头指向省委内一小撮走资本主义道路当权派，没有实行革命的“三结合”，“安徽革命造反总指挥部”个别领导人实行了一系列的错误政策，压制了有不同意见的左派群众组织和革命干部。中央认为，应立即成立以钱钧同志为首的军事管制委员会，把省的领导权掌握起来。"},{"type":"paragraph","text":"二、军管委员会要高举毛泽东思想伟大红旗，要政治挂帅，坚决按中共中央《关于无产阶级文化大革命的决定》办事，坚持以毛主席为代表的无产阶级革命路线，彻底批判资产阶级反动路线，集中揭露和打击以李葆华为首的党内一小撮走资本主义道路的当权派。坚决执行中央一九六六年十一月二十日批转的《重要通告》和中央批转的中央军委八条命令，保证大鸣、大放、大字报、大辩论正常进行。要放手发动群众，在工作中走群众路线，不要包办代替。坚决支持各左派群众组织，在左派组织之间不能片面支持一方，打击另一方。对于左派组织，要帮助他们克服缺点和错误，帮助他们整顿思想、整顿作风、整顿组织。要争取参加保守组织的群众，回到毛主席的路线一边来。对于真正的确有证据的反革命分子，才能依法处理。宣布一个群众组织是反革命组织，应经过中央批准。严防坏人利用军管镇压群众。"},{"type":"paragraph","text":"军管会要通过各项工作，实现真正的无产阶级革命派大联合，筹备革命的“三结合”的临时权力机构。"},{"type":"paragraph","text":"三、军管会下成立“抓革命、促生产”的两个班子，把无产阶级文化大革命领导起来，把工农业生产、财贸工作和救灾工作管起来。"},{"type":"paragraph","text":"四、立即接管公安厅、公安局，重新选派能够正确执行毛主席的无产阶级革命路线的得力干部作军代表，支持和依靠真正的革命派，彻底揭露这两个专政机关的阴暗面，切实进行整顿。要坚决纠正乱通缉、乱逮捕的错误做法。因为对“一·二六”夺权有不同意见被逮捕的革命群众和革命干部一律释放，被打成“反革命”的，一律平反，要严防坏人利用专政工具镇压革命群众和革命干部。"},{"type":"paragraph","text":"五、立即接管新安徽报，要宣传以毛主席为首的党中央的无产阶级革命路线和各项政策，不准一派革命组织去攻击另一革命组织。立即停止以对“一·二六”的态度作为革命与反革命标准的错误宣传。报纸如不能正常出版，可暂出新华社电讯稿。省广播电台也按同样的原则办理。"},{"type":"paragraph","text":"六、从过去和现在的情况看，“八·二七”、“八·二七革命到底联络站”、“红革会”、“工人造反派联合委员会”、工人一司、三司等，都是革命群众组织。这些组织都要整风，双方都着重进行自我批评。有原则上的不同意见，要正常的进行讨论、辩论，不准打、砸、抢、抄、抓，不准武斗。"},{"type":"paragraph","text":"七、合肥的“红卫军”，是与保字号“军总”对立的，同“八·二七”并肩作战的革命群众组织。但这种组织形式不恰当，应按中央指示办理，这一组织的成员应回到原单位参加文化大革命，不要再恢复这一组织。逮捕于得水同志、通缉程明远等同志，是错误的。"},{"type":"paragraph","text":"八、压制“安徽省暨合肥市机关革命职工造反司令部”是错误的。应支持省市机关干部起来革命，特别要支持较早站出来支持革命群众的革命干部。"},{"type":"paragraph","text":"九、对镇压合肥“红卫军”和于得水同志身死一案，应该查清。可在派往公安厅的军代表领导下，由各革命组织（包括公安厅真正的革命干部）组成调查小组，进行专门调查，参与了逮捕和处理于得水一案的有关人员，不能参加这一调查小组。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九六七年三月二十七日"},{"type":"paragraph","text":"陈伯达、戚本禹与北京大学师生代表座谈教学改革问题。陈说：“下半年就要上学了，教育制度要搞个大革命。”“我们的教育制度是从清朝末年演变来的，后来又接受苏修一套东西。教育制度、教学内容、教学方法基本上是资本主义的......我们一定要大破大立”。“要从根本上推翻现行的教学制度。”他还说：“中国人还要学什么中国语言”！(《传信录639》)"},{"type":"paragraph","text":"谢富治在北京市委、市人委工作人员会上讲话：打倒一切、反对一切，这是刘少奇搞的。文化革命初期，干部都靠边站，就是他干的嘛！(《传信录640》)"},{"type":"paragraph","text":"王力、关锋在宣传工作会议上讲话。王力说，最近要批判《清宫秘史》。新闻界要批判吴冷西、胡乔木。北京市革命委员会将在四月二日开会（后延期）。北京市的特点：由主席指示先开红代会、工代会、农代会。这样大联合就有了基础，思想容易一致。(《传信录641》)"},{"type":"paragraph","text":"中共北京市委、市人委在中山公园召开全体工作人员会议，吴德在会上指出因新市委执行了资产阶级反动路线，因此，决定将市委、市人委全部工作人员集中到市委党校，彻底肃清刘邓及彭、罗、陆、杨反革命修正主义路线的流毒。"},{"type":"paragraph","text":"作协斗争作协党组书记刘白羽，刘被指责为以亮相为名，行反攻倒算之实。"},{"type":"paragraph","text":"中央决定对大庆油田实行军管。3月28日"},{"type":"paragraph","text":"刘少奇写信给毛泽东，对大字报攻击他吹捧电影《清宫秘史》等言论，进行辩解，毛不予置答。"},{"type":"paragraph","text":"周恩来、李富春在接见国务院工业系统21个单位的代表时，周讲话说：“这次夺权是四九年夺权的继续，这次夺权是最彻底的。”“主席在这个问题上有个估计，原说在二、三、四月看出个眉目，现在还得加上个五月才能看出个眉目。明年二、三、四月或更长一些时间要看出个结果。”(《传信录643》)"},{"type":"paragraph","text":"周恩来、康生等接见安徽代表。康生宣布了中央解决安徽问题的办法。(《传信录644》)"},{"type":"paragraph","text":"王力、穆欣与唐平铸在人民日报社谈话：新闻工作要转入批判。批判分三类。有不点名批判，如刘、邓、陶是中国最大的走资本主义道路的当权派。有点姓与职务不点名，有明点姓名的。(《传信录645》)"},{"type":"paragraph","text":"王力、关锋把题为《“打击一大片，保护一小撮”是资产阶级反动路线的一个组成部分》的材料送呈毛泽东。它是关于1966年6、7月间清华大学工作组在干部问题上执行所谓资产阶级反动路线情况的调查报告。毛泽东在3月29日批示：“此件很好，可以公开发表，并予广播。还应调查一、二个学校，一、二个机关的情况。请先印发参加碰头会的同志及其他同志看一看。”该报告在3月30日出版的《红旗》上发表。"},{"type":"paragraph","text":"[按]把打击一大片，保护一小撮指为刘邓路线的组成部分是很不诚实的政治栽脏，反映了毛在担心打击面太宽后争取干部多数的诡谋。3月"},{"type":"paragraph","text":"中国驻金边使馆向外界散发毛主义的宣传品，鼓励当地华人进行红卫兵式的活动，给高棉——中国友好协会提供资金，公开介入柬埔寨内部政治，由此引起西哈努克的不满。"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":287,"page_end":297,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"关锋","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"王力","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李富春","type":"人物"},{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"邱会作","type":"人物"},{"name":"刘贤权","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"刘澜涛","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"红卫兵上海市大专院校革命委员会（红革会）","type":"人物"},{"name":"青海文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"毛主义","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d327be1a7b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
