{"year":1949,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　招商局码头自从取消了削剥的包工制度后，由码头工人们自己来管理账目，工作效率逐渐提高，上月份江安轮抵达码头时，码头工人四十挡扛力过去只扛六百包的，现在扛一六三○包，在工作秩序上和爱惜货物上也是前所未有的。堆装工人在工作中格外小心，把货物堆得很整齐，并毫不取代价的把破裂的包子缝补起来，把各种不同的货物也分别得清清楚楚，然后堆起来。"},{"type":"paragraph","text":"【本报讯】　招商局警卫队自解放以来，经过整编，并普遍地进行了政治学习，队员不但在思想上认识了为人民服务的重要，并且也具体地把新的认识贯彻到工作中去。第五码头航警四组组长杨华增，在上月八日，发现五码头工头金灵山企图营私舞弊，并藉“秋节”为由，送三万元人民币给杨，进行贿赂，当时就被杨拒绝，并加斥责。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3160ced335"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
