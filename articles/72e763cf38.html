ear":1969,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"忠于毛主席誓死不变心"},{"type":"paragraph","text":"黑龙江省驻军某部连长特级战斗英雄黄继光的弟弟  黄继恕"},{"type":"paragraph","text":"毛主席亲自主持的党的“九大”隆重开幕了，我们革命战士热血沸腾，感到无比幸福，无比自豪！"},{"type":"paragraph","text":"“九大”的召开，是毛主席无产阶级革命路线的伟大胜利，它宣告了大叛徒刘少奇及其同伙复辟资本主义的迷梦彻底破灭。"},{"type":"paragraph","text":"“九大”的召开，是对我们的最大鼓舞，给了我们无穷无尽的力量。"},{"type":"paragraph","text":"人民有今天，国家有今天，都离不开伟大领袖毛主席，离不开毛主席的革命路线。我们每个革命战士的成长，都是他老人家哺育的结果。我们革命战士永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席的无产阶级革命路线。我们革命战士，紧跟毛主席寸步不离，忠于毛主席誓死不变心，保卫毛主席冲锋在前。我哥哥黄继光在朝鲜战场上为革命流尽了最后一滴血，我也要紧握手中枪，随时准备消灭胆敢来犯的帝、修、反强盗，为革命贡献自己的一切。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72e763cf38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
