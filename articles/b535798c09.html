script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级政论家李普曼  悲叹美国地位江河日下","authors":[],"dates":[{"year":1960,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级政论家李普曼"},{"type":"paragraph","text":"悲叹美国地位江河日下"},{"type":"paragraph","text":"据新华社22日讯　纽约消息：美国著名资产阶级政论家李普曼昨天在“纽约先驱论坛报”上发表的一篇文章中，悲叹美国在世界上的地位江河日下。"},{"type":"paragraph","text":"李普曼惊呼美国“在世界上的影响和力量的地位将缩小”。他叫喊说：“虽然我们占世界首位的短暂的日子也许即将结束，但是决不可听任我们同大国的平等地位结束。”"},{"type":"paragraph","text":"李普曼在他的题为“世界上第二号国家”的文章中虽然还吹嘘说，美国“仍然比苏联富有得多”。但是，他承认，“从国家力量方面来说，在总的军事能力方面，在开辟外层空间的竞赛方面，在经济增长率对比方面，在教育方面，我们（美国）都落在后面，而没有能保持我们的地位。”"},{"type":"paragraph","text":"李普曼说，“苏联的经济目前正在以每年6％的速率（这是美国资产阶级故意缩小的说法——编者注）增长，这个估计还是保守的。我们的经济一直是在以一种不到3％的速率增长。”而苏联的“增长速度为我们的两倍”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b535798c09"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
