ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"在中共中央常委会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央常委会议上的讲话！"},{"type":"paragraph","text":"（1938年2月8日）"},{"type":"paragraph","text":"日本帝国主义决定战略方针由速战速决改变为长期进攻，目前总的目标是进攻武汉。现在日本要求中国妥协的道路还存在，如果英国出来主和，国民党便会发生和平妥协的危险。要估计到武汉、广州等地失陷以后中国将发生的新的变化，要估计到国际不能帮助时也能自力更生地干，要鼓励国民党在极端困难环境之下也要继续坚持抗战。热河、河北两省交界的雾灵山一带，派杨成武去发展新的游击区域。这是敌人的远后方，东面策应东北抗日联军，南面策应普察翼，北面与蒙古接近，西面与绥远联系，在天下有变的时候，这个地区可以首先得到国际的援助。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央常委会议上关于目前军事问题讲话的一部分。"},{"type":"paragraph","text":"[2]杨成武，当时任八路军晋察冀军区第一军分区司令员兼第一支队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":2,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":557,"page_end":557},"tags":[{"name":"杨成武","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e4234a372"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
