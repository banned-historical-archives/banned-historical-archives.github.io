art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命征途千万里步步离不开毛主席","authors":["谷红文兵"],"parts":[{"type":"paragraph","text":"凝视着《毛主席去安源》这幅光彩夺目的革命油画，一轮朝阳在我们面前升起。革命战士的心啊，在激烈地跳动！周身的热血在沸腾！我们看了一遍又一遍，情不自禁地高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"这幅革命油画，是我们伟大统帅毛主席亲自去安源开拓无产阶级革命运动的生动写照，成功地刻画出伟大导师毛主席的光辉形象，再现了毛主席当年“唤起工农千百万，同心干”的伟大情景。一九二一年，安源煤矿黑暗、阴沉。一声霹雳震天响，红太阳照亮了安源山，我们伟大领袖毛主席来到安源。安源山在欢笑，萍河水在歌唱。毛主席一到安源，就串茅棚，下矿井，和工人促膝谈心，把马克思列宁主义传播给工人，领导英雄的安源工人进行轰轰烈烈的革命斗争。毛主席在安源播下了革命的火种，揭开了中国革命史上又一伟大壮丽的新篇章。"},{"type":"paragraph","text":"多年以来，中国赫鲁晓夫这个大工贼、大叛徒，贪天之功为己功，无耻地吹嘘他是什么“安源工运的领袖”。呸！见鬼去吧！什么“工运的领袖”？“假的就是假的，伪装应当剥去。”中国赫鲁晓夫是地地道道的资本家的孝子贤孙，是镇压工人运动的刽子手。安源的革命历史，决不容许篡改！"},{"type":"paragraph","text":"“天大地大不如党的恩情大，爹亲娘亲没有毛主席亲。”毛主席是无产阶级革命运动的开拓者，毛主席是我们的伟大导师，伟大领袖，伟大统帅，伟大舵手，是我们心中永远永远不落的红太阳。"},{"type":"paragraph","text":"看着《毛主席去安源》的油画，革命战士心红眼亮，意气风发，斗志昂扬。安源煤矿的斗争烈火，永远鼓舞着我们紧跟毛主席干革命；毛主席走向群众的刚健步伐，永远激励着我们密切联系群众、扎根于群众之中，永远和群众心连心。"},{"type":"paragraph","text":"看着《毛主席去安源》的油画，想着毛主席他老人家的伟大革命实践和丰功伟绩，千言万语说不尽，万曲千歌唱不完。从井冈山的星星之火，到延安窑洞的灯光；从遵义城楼上的红旗飘扬，到天安门前礼炮齐鸣；从安源煤矿的红色风暴，到震撼世界的大字报《炮打司令部》；毛主席啊，毛主席！是您给我们开辟了前进的道路，是您给我们指明了革命的航程。革命的征途千万里啊，步步离不开我们伟大的导师毛主席！"},{"type":"paragraph","text":"看着《毛主席去安源》的油画，我们看到了共产主义的未来，看到了人类彻底解放的希望，同时也看到了我们革命战士肩上的担子，任重而道远。毛主席的革命战士，决不辜负党和人民的期望，永远坚定地沿着伟大领袖毛主席指引的航向，奋勇前进！跟着毛主席，永远闹革命！跟着毛主席，世界一片红！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8300a1a37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
