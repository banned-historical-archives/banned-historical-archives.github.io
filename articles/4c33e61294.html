rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把揭发批判搞得生动活泼","authors":[],"parts":[{"type":"paragraph","text":"读了四连、五连的这篇报道，使人看到他们揭批“四人帮”搞得生动活泼，深入扎实。“群众是真正的英雄”。“群众中蕴藏了一种极大的社会主义的积极性。”这两个连队充分发动群众，人人出主意，想办法，干部战士踊跃参战，在斗争中创造出许多好办法，把学习和批判搞得有声有色。"},{"type":"paragraph","text":"长期以来，“四人帮”形而上学猖獗，唯心主义横行，严重地破坏了我军政治思想工作的优良传统。在揭批“四人帮”的斗争中，让群众发挥一切聪明才智，放开手脚大打人民战争，就能做到教育方法活，批判效果好。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c33e61294"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
