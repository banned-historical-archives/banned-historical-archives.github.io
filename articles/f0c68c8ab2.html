" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"北京市有个别区和学校曾举行三反运动游行和街头宣传","authors":[],"dates":[{"year":1951,"month":12,"day":30}],"is_range_date":false,"parts":[{"text":"北京市有个别区和学校曾举行三反运动游行和街头宣传","type":"title"},{"text":"【内部参考讯】去年十二月三十日，北京市河北高中等学校的学生约四百人，曾举行反贪污浪费的游行。队伍中有大幅“反对贪污浪费”的红布标语和许多小的标语牌。本月三日北京市第三区也曾组织了一些宣传队进行街头宣传。这种情况反映到中共北京市委宣传部后，该部负责人认为采用这些宣传方式可能使群众产生一些错觉，也可能被敌人利用来进行反宣传。已指示各区不再组织这样的游行和街头宣传。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年1月4日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0c68c8ab2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
