al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"如果过赤志同优罐亦吾良友","alias":"","parts":[{"type":"paragraph","text":"如果讨赤志同仇亦吾良友"},{"type":"paragraph","text":"（1925年12月5日）"},{"type":"paragraph","text":"刘志陆等的电报，于数了国民政府八罪之后，加上“鸣呼”一段，接着说：“总之出师靖难，伐罪救民，如果讨赤志同，仇亦吾良友。师直为壮，胜负无待交绥。得天者昌，仁暴无难立判。”刘电列衔诸人如段执政各部总次长张萧赵方周各位督办督理，或省长以及岑吴康梁诸先生，固然是讨赤同志。但香港金总督伦敦包总理，何尝不是讨赤志同？却不将台衔列上去。而且金总督助了如许金钱军械，又保护了陈总司令在香港开设总司令部，讨赤之志，炳若日星，却偏将台衔漏列，真不知是何用意？电末师直为壮数句说的更属糊涂，他竟在替国民政府做功德颂。"}],"authors":["毛泽东"],"dates":[{"year":1925,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":153,"page_end":153},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb93fa9488"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
