:[{"year":1993,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东之子毛岸龙》一书被查封"},{"type":"paragraph","text":"１９９２年１０月，内蒙古人民出版社严重违反出版管理规定，未经批准，擅自与香港新世纪出版社合作出版了《毛泽东之子毛岸龙》一书，以胡编乱造的情节，歪曲和丑化了毛泽东等一些党和国家领导人的形象，在社会上造成了恶劣的影响。根据中央和国家有关出版管理规定，新闻出版署已发文查封此书，取消内蒙古人民出版社出版有关党和国家主要领导人图书的资格，并予以罚款。"},{"type":"paragraph","text":"出版涉及党和国家领导人工作和生活情况的传记、回忆录、纪实文学、报告文学等，是一项十分严肃、政治性很强的工作，所述内容必须客观、真实，对一些重大问题的论述，一定要符合中央有关精神。对出版这类图书的要求以及出版这类图书的审批程序，中央和国家出版管理部门都曾作过明确的规定，各有关出版单位都必须严格履行，凡未经批准出版的这类图书不得发行，违反者将严肃处理。"},{"type":"paragraph","text":"新闻出版署图书司孔哲龙"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"内蒙古文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69714c0bda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
