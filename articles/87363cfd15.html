art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓颖超同志亲切会见斯诺夫人斯诺夫人把一顶红军帽送给中国斯诺先生一九三六年访问陕北时拍摄了一张非常珍贵的照片《毛主席在陕北》，照片中毛主席戴的就是这顶军帽？这是一份有重要纪念意义的礼品","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年十月四日讯 人大常委会委员邓颖超今天上午会见了美国友好人士洛伊斯·斯诺夫人，同她进行了亲切友好的谈话。"},{"type":"paragraph","text":"在会见时，斯诺夫人把斯诺先生和她保存了三十九年的中国红军的一顶八角军帽，送给中国，邓颖超同志和国家文物事业管理局局长王冶秋同志高兴地接受了这份有重要纪念意义的礼品。一九三六年斯诺先生访问中国陕西北部的革命根据地时，红军送给他一套军服和这顶军帽。在访问期间，斯诺先生拍摄了那张非常珍贵的照片《毛主席在陕北》。照片上毛主席戴的帽子就是这顶军帽。邓颖超同志对斯诺夫人赠送这顶有历史意义的军帽表示深切的感谢。"},{"type":"paragraph","text":"斯诺夫人的随行人员卡欣·惠勒、琼·波霍尔利斯、格特鲁德·谢弗、琼·耶格、布兰森·奥卡西夫人，参加了会见。"},{"type":"paragraph","text":"会见时在座的还有对外友协副会长丁雪松，有关方面负责人胡洪范、单达圻。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87363cfd15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
