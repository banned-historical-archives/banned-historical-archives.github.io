报告","authors":[],"dates":[{"year":1960,"month":4,"day":21}],"is_range_date":false,"parts":[{"text":"中央批转鞍山市委关于改造农村落后生产队的报告","type":"title"},{"text":"鞍山市委关于改造农村落后生产队的报告很好。现在摘要转发你们参考。从这个报告中可以看出，有一些民主改革（主要是土地改革）不彻底的地方，地主，富家，坏分子以及其他反革命分子篡夺把持农村党政领导权，残害群众，破坏农村经济和人民公社，以及党的基层组织和干部队伍不纯的情况，是很严重的。对这类民主改革不彻底的地区，不论时间过了多久，都必须下定决心，发动群众，做好民主革命的补课工作，否则农业生产的跃进，人民公社的巩固和党的一切方针政策的贯彻执行，都是不可能的。希望各地结合农村三反，对所有政治上落后社、队，都采用鞍山市的办法，彻底加以改造。","type":"paragraph"},{"text":"来源：（鞍山市委关于改造农村落后生产队和进行社会主义教育，开展两条道路斗争的情况报告从略——编者注）","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ead4f24fc1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
