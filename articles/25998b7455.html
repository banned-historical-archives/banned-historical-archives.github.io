学生","山西"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"致老师的大字报","type":"title"},{"text":"山西天镇中学学生","type":"authors"},{"text":"亲爱的老师们：","type":"appellation"},{"text":"我们也知道你们是受了很大的委屈，但是你们都是经过革命锻炼，都经得起考验。我们相信你们一定很同情我们的正义行动，当看到你们忧愁的脸，我们心也痛，可是希望老师们不要作了拍马屁的人。","type":"paragraph"},{"text":" 天镇中学","type":"paragraph"},{"text":"撕传单的老师们注意","type":"appellation"},{"text":"你们如果想解决中学的问题，必须达到我们的要求，此外，因你们撕传单的行为不对，应该在全体同学面前认错，不然，我们坚决斗争！我们决不罢休！！","type":"paragraph"},{"text":"决不停止运动！！！一定坚持到胜利！！！","type":"paragraph"},{"text":" 天镇中学","type":"paragraph"},{"text":"“暴露狰狞面目”","type":"subtitle"},{"text":"（一）今天是","type":"paragraph"},{"text":"郭老师是好意，","type":"paragraph"},{"text":"撕下标语保存起，","type":"paragraph"},{"text":"同学们误会你，","type":"paragraph"},{"text":"可把你幸幸的。","type":"paragraph"},{"text":"（二）今天是","type":"paragraph"},{"text":"早晨你到五班去，","type":"paragraph"},{"text":"得意洋洋领功里，","type":"paragraph"},{"text":"你的话怎说的，","type":"paragraph"},{"text":"卑鄙无耻臭言论。","type":"paragraph"},{"text":"（三）你是我们的钱财迷，","type":"paragraph"},{"text":"因而不来说真理，","type":"paragraph"},{"text":"你的面目已暴露，","type":"paragraph"},{"text":"还想把我们麻到底。","type":"paragraph"},{"text":"（四）然而你有这行动，","type":"paragraph"},{"text":"呼吁标语撕下来，","type":"paragraph"},{"text":"撕的快来而写的繁，","type":"paragraph"},{"text":"群众力量打倒你。","type":"paragraph"},{"text":" 天镇中学","type":"paragraph"},{"text":"全体老师们、同学们：","type":"appellation"},{"text":"我们不能奴颜，不能媚骨，我们起来吧！我们都知道，今早有出现的，勇敢的，坚毅的，值得我们同学敬佩的贴出了一批“密件”，结果被校方无理地、卑鄙地撕去，请问你们是啥行为？你们讲言论自由，难道是口是心非吗？你们经常批评旧社会压制言论，这不是一丘之貉吗？","type":"paragraph"},{"text":"尤其是郭丕基老师，你的历史知识那里去了。难道你是继承镇压“一二九”爱国运动的刽子手吗？否则，你为什么压制言论自由。","type":"paragraph"},{"text":"老师们，把你们真正的心灵放在人间吧！你们不要无动于衷；不要抑人鼻息，不应被几个臭钱冲昏头脑。","type":"paragraph"},{"text":"起来吧！声援我们吧！","type":"paragraph"},{"text":" 天镇中学","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（三）》（中共山西省委整风办公室编印，1957年10月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25998b7455"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
