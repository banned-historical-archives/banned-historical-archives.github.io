进行诬蔑","authors":[],"dates":[{"year":1959,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京31日电】　东京消息:在中共八届八中全会公报发表以后，日本资产阶级的宣传机器一方面在事实面前不得不承认中国社会主义经济建设的大跃进，另一方面却极力就中国调整1959年计划指标这件事进行恶意的歪曲宣传和诬蔑。"},{"type":"paragraph","text":"“每日广播电台”28日说，“自从共产党掌握政权以来的十年间，共产党中国的确有了不寻常的发展，这是整个世界都不能不承认的事实”。它还不得不承认，“五年计划两年完成，这就不能说是失败了”。这家电台自己也说:“不得不承认”中国人民“干得相当好”。"},{"type":"paragraph","text":"但是，它却又故意散布怀疑中国人民巨大成就的调言说，从中国核实去年的产量来看，“令人感到中国所说的不能置信”。它还企图使人相信在中国这样的社会主义国家中竟会发生“危机”。"},{"type":"paragraph","text":"“每日新闻”在28日说，“中国去年的实际成绩，同前年相比，粮食增加了35%，棉花增加了28%，钢块增加了49，5%。因此，今年展开的增产节约运动如果有良好成绩，在今年完成第二个五年计划的主要生产指标，这是可能的”。"},{"type":"paragraph","text":"这家报纸还承认，“这种情况说明，中国的经济确实正在发展。我们认为，在这里有理由不能错看中国共产党的前途”。"},{"type":"paragraph","text":"然而，这家报纸却就中国调整1959年计划指标进行歪曲宣传说，“中共这次决定是果断的后退，同时是对政策失败的自我批评”。"},{"type":"paragraph","text":"“朝日新闻”27日说，“中国由于在去年执行了工农业大跃进的政策，组织了人民公社，因而在工农业生产方面取得了重大成就”。可是，它随即又歪曲宣传中国的人民公社运动“引起了经济混乱”。"},{"type":"paragraph","text":"“读卖新闻”在28日承认，中国去年增产成绩的确是大跃进。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db19d8d9ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
