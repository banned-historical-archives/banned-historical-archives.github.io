周恩来"],"dates":[{"year":1968,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"周恩来与外交部翻译的谈话","type":"title"},{"text":"周恩来","type":"authors"},{"text":"[周恩来在接见阿尔巴尼亚代表时与翻译的谈话要点]","type":"subtitle"},{"text":"一、要把解放干部的工作抓起来，到现在没有解放一个干部，有事情也不好找。","type":"paragraph"},{"text":"二、（有一翻译是原外联站的，说大联筹压他们）总理说你们过去压他们更厉害嘛，问题不是谁压谁，是看他站在哪一边的问题。","type":"paragraph"},{"text":"三、门合同志的“四个一切”提的不科学，这是一辈子的事（注：原文如此）李文忠提的科学。（注：“毛主席热爱我热爱，毛主席支持我支持，毛主席指示我照办，毛主席挥手我前进。”）","type":"paragraph"},{"text":"四、陈毅写了一个东西（注：指陈毅同志的书面检查）要拿下来。（翻译说等七·一成立大联委后再拿下来。）总理说：太迟了，要提早，尽快拿下来。（外交部现在努力准备七月一日成立大联委，并结合反“三右”清理阶级队伍。）","type":"paragraph"},{"text":"五、主席在文化大革命中的指示要整理出来，公开出版发行，现在主席正在审查。","type":"paragraph"},{"text":"来源：学习资料（第七期） [内部参考，注意保存]","type":"appellation"},{"text":"河南省工代会政宣组编 1968年7月15日","type":"paragraph"}],"comments":[],"origin":"学习资料（第七期） [内部参考，注意保存] 河南省工代会政宣组编 1968年7月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"035226b885"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
