tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伟大天才毛泽东高举革命旗帜前进","authors":[],"parts":[{"type":"paragraph","text":"据新华社墨尔本七日电 最近一期的《先锋报》在一篇纪念苏联十月社会主义革命四十九周年的文章中，热烈赞扬中国人民在以伟大的天才毛泽东为首的中国共产党领导下继承和发扬了十月革命的伟大传统。"},{"type":"paragraph","text":"文章说，中国的伟大领袖毛泽东是当代的列宁。列宁逝世了，毛泽东起来发展列宁的事业。毛泽东在我们的时代高举起列宁和十月革命的旗帜前进。这与苏联修正主义集团卑鄙地背叛这个旗帜形成鲜明的对比。"},{"type":"paragraph","text":"文章说，毛泽东所领导的中国共产党人光辉地实践和丰富了列宁和十月革命的教导。就像列宁和十月革命具有国际意义一样，中国革命和毛泽东思想也具有国际意义。"},{"type":"paragraph","text":"文章还谴责赫鲁晓夫和苏共领导集团败坏列宁和斯大林的声名，糟蹋十月革命的荣誉，在苏联国内复辟资本主义，并且镇压世界的革命运动。文章说，但是，苏共领导集团只代表极少数人，十月革命活在苏联人民的心中，在苏联，人民早晚将恢复十月革命取得的胜利。"},{"type":"paragraph","text":"文章号召澳大利亚人民深入地学习和运用列宁和毛泽东的普遍革命真理，来庆祝十月革命。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78975a6b94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
