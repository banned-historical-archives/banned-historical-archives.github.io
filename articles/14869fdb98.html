{"year":1975,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见特拉奥雷夫人等马里贵宾"},{"type":"paragraph","text":"毛主席对玛丽亚姆·特拉奥雷夫人及其一行前来我国访问，表示热烈欢迎，同特拉奥雷夫人和泰拉大使进行了亲切友好的谈话。李先念副总理等在座"},{"type":"paragraph","text":"新华社一九七五年十月十九日讯　毛泽东主席今天晚上会见了马里共和国国家元首特拉奥雷的夫人、马里全国妇女联盟主席玛丽亚姆·特拉奥雷和随同来访的马里全国解放军事委员会委员尤素福·特拉奥雷的夫人、马里全国妇女联盟对外关系书记特拉奥雷·阿斯图，财贸部长富内凯·凯塔的夫人、马里全国妇女联盟经济书记乌莱玛图·凯塔，马里全国妇女联盟新闻书记哈娃·蒂埃罗夫人，总理府专员苏莱曼·迪亚巴特。马里驻中国大使西纳利·泰拉参加了会见。"},{"type":"paragraph","text":"会见时，毛主席对玛丽亚姆·特拉奥雷夫人及其一行前来我国访问，表示热烈欢迎。毛主席同全体贵宾一一握手以后，同玛丽亚姆·特拉奥雷夫人和西纳利·泰拉大使进行了亲切友好的谈话。毛主席请他们向马里国家元首穆萨·特拉奥雷转达他的亲切问候。"},{"type":"paragraph","text":"会见时在座的有李先念副总理，王海容副外长，齐宗华、唐闻生、罗旭副司长。（附图片）"},{"type":"paragraph","text":"毛泽东主席和玛丽亚姆·特拉奥雷夫人握手。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1975,"month":10,"day":20}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席会见特拉奥雷夫人等马里贵宾","authors":[],"parts":[{"type":"paragraph","text":"毛主席对玛丽亚姆·特拉奥雷夫人及其一行前来我国访问，表示热烈欢迎，同玛丽亚姆·特拉奥雷夫人和西纳利·泰拉大使进行了亲切友好的谈话。毛主席请他们向马里国家元首穆萨·特拉奥雷转达他的亲切问候。 会见时李先念副总理等在座"},{"type":"paragraph","text":"新华社一九七五年十月十九日讯 毛泽东主席今天晚上会见了马里共和国国家元首特拉奥雷的夫人、马里全国妇女联盟主席玛丽亚姆·特拉奥雷和随同来访的马里全国解放军事委员会委员尤素福·特拉奥雷的夫人、马里全国妇女联盟对外关系书记特拉奥雷·阿斯图，财贸部长富内凯·凯塔的夫人、马里全国妇女联盟经济书记乌莱玛图·凯塔，马里全国妇女联盟新闻书记哈娃·蒂埃罗夫人，总理府专员苏莱曼·迪亚巴特。马里驻中国大使西纳利·泰拉参加了会见。"},{"type":"paragraph","text":"会见时，毛主席对玛丽亚姆·特拉奥雷夫人及其一行前来我国访问，表示热烈欢迎。毛主席同全体贵宾一一握手以后，同玛丽亚姆·特拉奥雷夫人和西纳利·泰拉大使进行了亲切友好的谈话。毛主席请他们向马里国家元首穆萨·特拉奥雷转达他的亲切问候。"},{"type":"paragraph","text":"会见时在座的有李先念副总理，王海容副外长，齐宗华、唐闻生、罗旭副司长。"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14869fdb98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","
