ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"中央关于精兵简政问题的指示","alias":"","parts":[{"type":"paragraph","text":"中央关于精兵简政问题的指示"},{"type":"paragraph","text":"（1946年3月6日）华东局、晋冀鲁豫局、华中分局，并告荣臻、贺龙："},{"type":"paragraph","text":"无论将来情况如何，我们均须精兵简政，减轻民负，方有利于解放区之巩固与坚持。你们三处兵额最大，负担极重，如何实行精简，应速决定方针。我们意见，第一期精简三分之一，并于三个月内外完成。被精简人员武器，有计划的妥善的分配到农村生产中去。第一期完成后，取得经验，第二期再精简三分之一。这样是否妥当及采取何种具体办法，望于电到十日内开会讨论，制定方案，并派员来延报告，做成最后决定，然后立即实施。晋冀察方面前已提出大致的方案，望根据恩来所告，再行考虑，制定详细方案，由荣臻尽快携来中央讨论。晋绥方面，请贺立即筹划，并偕荣臻一道，乘飞机来延开会为盼。"},{"type":"paragraph","text":"中央寅鱼比"},{"type":"paragraph","text":"环1"},{"type":"paragraph","text":"团东所露告再行业AVE寸快携来中"},{"type":"paragraph","text":"孩漏时嘴剩之多毛泽东为中共中央起草的《关于精兵简政问题的指示》的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":193,"page_end":194},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"404e17cd44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
