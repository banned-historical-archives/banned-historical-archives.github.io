script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"8ef86149-3a58-4945-a58b-815e57128935","name":"周总理接见哈河滨红色造反团代表时讲话摘要","internal":false,"type":"img","official":false,"author":"周恩来","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/8ef86149-3a58-4945-a58b-815e57128935/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/8ef86149-3a58-4945-a58b-815e57128935/2.jpg"],"article":{"title":"周总理接见哈河滨红色造反团代表时讲话摘要","alias":"","parts":[{"type":"paragraph","text":"周总理接见哈尔滨红色造反团代表时讲话摘要时间：十月二十日早晨二点三十分参加人员：哈工大红色造反团代表关于三个租织大方向一致周题："},{"type":"paragraph","text":"以前我过你们三个租织大方向都一样，因为当时刚一开始，就好象草刚发芽一样·不能就那个粗织是革命的，那个粗织是不革命的·得有一个过程明它·经过一个阶段才能分出来·我们看到全国都存在这种情况·这不是识问题，而是两条路的斗争·为什么现在强调路钱因为现在很多地方对两条路线识不够·你们造反团在黑龙江干了很多好事，对省委帮助很大·前黑龙江省委有些反党性，你们在那地得很见，你们有包，起来干，把他们冲跨了·现在黑龙新省委非常需要你们革命派支持，你们还有很多的工作要搞。为了把无产阶文化大革命进行到底·必把广大劳动人民群众发动起来不要把“八·八”团里的所有的人都成是右派。党内有左中，右的，群众中也有左，中，右的·右的有了些，但是你们不要给他们压力·象刷才开始他们压你们那样压他们·要高姿态·革命派就要高姿态·文化革命抓革命、促生产·你们在促生产中做得很好，下去了很多人，成立了服务队抓了革命，促了生产。“八．八”团在这方面做得不够，开会时我要批评他们。"},{"type":"paragraph","text":"周总理耕到哈工大贴标语时："},{"type":"paragraph","text":"你们的激动，你们讲得那样严重是可以理解的·你们是出于革命热情，对于毛主席的拳热爱。这明你们关心国家大事，政治敏感性高·今后要保持下去。你们这时要注意炼自己，想到今后要建设共产主义，就必须要大批红色接班人，决不能使苏联的悲剧在中国重演·这是斗争中总结出来的经教训。"},{"type":"paragraph","text":"你们在斗筝中学习斗争，你们的革命气概和革命精神是可嘉的。总理应用主席最近耕话，毛主席：“你们不仅要关心中国的大事，而且要关心世界的大事·”"},{"type":"paragraph","text":"（哈市毛泽东主义红卫兵总部整理）"},{"type":"paragraph","text":"防中共中央办公厅，童小鹏同志座谈要时间：十月二十日晚上一关于修正主义叔卫兵同题"},{"type":"paragraph","text":"童小腾同志：“今天我见有人间陈伯达同志，这个问题·陈伯达同志：“修正主义红卫兵耕的不是那个红卫兵粗织·指的是粗织中的个别人．如执行资产阶级反动路的王力功、立夫。有人问“中央领导人儿次不接见我们，是不是因为我们是修正主义的红卫兵？”童小鹏同志：“不是，林彪同志、周恩来同志在天安门讲了，一切红卫兵粗织·都是革命粗。”又有人间：“林彪同志、周恩来同志耕话现在是否有效”童小同志：“完全有效，林彪同志周恩来同志耕话是代表毛主席的！："},{"type":"paragraph","text":"三关于传江青同志对别人耕毛主席在中央是少数的问题："},{"type":"paragraph","text":"童小腾同志：“这是言，总理昨天已澄清”！张春桥同志“江青同志提的是儿十年前国民党时期文艺界的事·在那时主席和江青同志是少数。”孙同志（工作人员）：“从1935年遵义会起毛主席在党中央一直是多数，威望很高·不仅那时候是多数，现在是这样·将来也是这样。”"},{"type":"paragraph","text":"三关于“怀疑一切”的口号周题"},{"type":"paragraph","text":"童小鹏同志：“有人提出“怀疑一切”的口号”·陶：“毛主席能怀疑！林彪同志能怀疑？”陶同志的讲话前提是不能怀疑一切·被人傅为除了毛主席、林彪同志都可以怀疑·这样意思就改变了。"},{"type":"paragraph","text":"北京政法学院刘永福、纪文等整理大连工学院总队数理分队战士"},{"type":"paragraph","text":"10月25日大连海运学院先锋战斗队（红卫兵）"},{"type":"paragraph","text":"顾承杠王海康韩抄"},{"type":"paragraph","text":"10月27日"}],"authors":["周恩来"],"dates":[{"year":1966,"month":10,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"林彪","type":"人物"},{"name":"童小鹏","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"409d6c2fe9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
