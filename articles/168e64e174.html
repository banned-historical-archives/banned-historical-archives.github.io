":[{"year":1984,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级生活方式的表现形式多种多样，但其核心就是利己主义和金钱万能论。但我们不能把现代的生活方式同资产阶级生活方式划等号。在“左”的思想影响下，似乎社会主义社会人们的生活方式就是贫穷加艰苦，这是一种误解。随着社会主义生产的发展，我们生活方式中的物质文明和精神文明无疑会不断丰富和发展。我们不能混淆不同的生活方式，就是同一生活方式也应有不同的特点。这是历史唯物主义的观点。"},{"type":"paragraph","text":"上海江苏路568弄、5号　李守模"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"168e64e174"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
