1947,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"该团未撤退前，与中共最高统帅部及毛泽东之关系始终愉快而亲切。团址距八路军司令部仅一水之隔，共方除派遣连络官同居外并供给仆役侍奉美军。由于延安之反美宣传，膳厅中往往发生争辩，空气沉郁，共方人员则微笑示意，窥探美方对延安宣传之反响，全城并无路灯，马路，暖气，自来水等现代工业文明设备，充其量不过规模稍大之村庄。团员安然留居数年，除偶尔望见运轮机一二架外，与外界几乎完全隔绝。彼等参加共方之宴会，或观剧伴舞，共方高级长官皆身御廉价布服，每周亦渡河前住美军娱乐室参观电影。去年四月叶登部下退出延安时，遗留无线电配备价值数千美元，且有卡车与吉普车数辆，然较之遗留于政府地区者达数百万美元，为数甚微，况按华府所获情报之价值计算，耗费可谓得当，否则吾人对此严密封锁地区将仍一无所知。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"241fb98f81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
