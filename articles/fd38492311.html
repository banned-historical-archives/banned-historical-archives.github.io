ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发福建省公安厅关于镇反情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发福建省公安厅关于镇反情况报告的批语"},{"type":"paragraph","text":"（1951年4月7日）漱石，子恢，剑英，小平，仲勋，一波，高岗同志："},{"type":"paragraph","text":"兹将福建公安厅关于福建镇反工作的报告转给你们参考。福建有些地方情况特殊，反动派多，处决的比例较大，这是可以理解的，别地自不应援例也杀这样多，但有些情况相似者，亦可仿照办理。福建方面最值得重视的经验是发动最广大群众参加镇反工作和派遣工作组下去巡视镇反工作。关于工作组，我认为各省都应当注意，即由省级机关组织几个有训练有能力的工作组，分往各专区，直到县级去巡视，有偏差者帮助纠正，积案太多者帮助清理，不敢放手者帮助开展工作，发动群众不足者告知发动参加的办法。这样的工作组，对于坚决而正确地开展镇反工作，当有很大的帮助，请你们研究推行为盼。"},{"type":"paragraph","text":"毛泽东四月七日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":221,"page_end":221},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd38492311"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
