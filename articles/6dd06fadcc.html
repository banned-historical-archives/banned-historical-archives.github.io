dates":[{"year":1992,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社广州6月1日电　(记者黄平)昨晚刚刚获得中国乒乓球大奖赛男单桂冠的马文革今晚大失水准，在爱普生世界明星乒乓球赛小组赛中三战皆败，且未胜一局。"},{"type":"paragraph","text":"由于小组赛并不影响选手进入明天的四分之一决赛，今晚场上气氛轻松活跃。在中国大奖赛上表现欠佳的瓦尔德内尔打得从容潇洒，成为人们瞩目的焦点。"},{"type":"paragraph","text":"经过抽签，明晚四分之一决赛的对阵是:普里莫拉茨对于沈潼、林德对瓦尔德内尔、王涛对马文革、金泽洙对塞弗。"},{"type":"paragraph","text":"这次比赛的冠军将在明晚产生。冠军的奖金为16000美元。"},{"type":"paragraph","text":"这次比赛是世界乒乓球明星系列赛的第三站。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dd06fadcc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
