art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"印度农民武装斗争烈火不断向新地区扩展已从东部、东南部、北部、西南部一些邦，蔓延到东北部的阿萨姆邦和特里普拉区越来越多的革命农民走上武装革命道路，沉重打击印度反动派和修正主义者","authors":[],"parts":[{"type":"paragraph","text":"新华社十六日讯 据印度《解放》月刊一月号报道，在印共（马列）领导下的农民武装斗争的烈火，目前已从印度的东部、东南部、北部、西南部的一些邦，蔓延到东北部的阿萨姆邦和特里普拉区。"},{"type":"paragraph","text":"《解放》月刊刊载的题为《农民游击斗争的烈火扩大到新的地区》的文章，叙述了农民游击战火扩展到这两个地区的经过。"},{"type":"paragraph","text":"文章说：在阿萨姆邦戈阿尔帕拉县的阿巴亚普里警察局辖区，印共（马列）领导的中央游击队的一个小分队，在当地农民群众的协助下，去年十一月底成功地袭击了一个罪大恶极的地主兼高利贷者特克拉的家，使当地农民大为振奋。“它大大地增强了这个地区农民的斗志，在农民当中牢固地树立了印共（马列）的威信。”"},{"type":"paragraph","text":"文章接着引用了一位游击战士的报告，介绍了农民游击队在特里普拉地区所采取的第一次游击行动的胜利情况。一九六九年十一月的一个晚上，一支游击小队打死了马哈拉尼村的一名恶霸地主兼高利贷者埃尔弗斯·米安。这个恶霸地主依仗反动势力霸占了马哈拉尼村以及邻近的另外两个村庄的大片土地，多年来，他欺压农民，敲骨吸髓，无恶不作。游击队在当地农民群众以及基层党组织的密切配合和支援下，趁这个恶贯满盈的家伙一次去外面收完高利贷回家时，在半路上处决了他，为当地农民除了一害。"},{"type":"paragraph","text":"文章在谈到印度农民武装斗争新发展的意义时指出，尽管修正主义叛徒们伙同印度国大党反动政府，采用镇压和各种欺骗伎俩妄图扼杀早已蓬勃兴起的农民武装革命，但是，农民武装斗争的烈火仍然不断向新的地区扩展。阿萨姆邦和特里普拉区的革命农民走上了武装革命道路即纳萨尔巴里道路的事实，给了反动统治阶级的帮凶们修正主义者一记响亮的耳光，并再一次表明他们所贩卖的“和平过渡”谬论的彻底破产。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"669e8cff03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
