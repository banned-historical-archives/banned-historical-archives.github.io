语和修改","authors":["刘少奇"],"dates":[{"year":1955,"month":3,"day":11}],"is_range_date":false,"parts":[{"text":"刘少奇对关于高饶反党联盟报告稿的批语和修改","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"（文中用 [ ] 排印的是刘少奇加写的文字）","type":"subtitle"},{"text":"一","type":"subtitle"},{"text":"恩来同志：","type":"appellation"},{"text":"此件我又看了一遍，有些意见〔2〕，写在上面，请酌定。","type":"paragraph"},{"text":" 刘少奇三、十一","type":"paragraph"},{"text":"根据手稿刊印。","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"[他们〔3〕是在目前阶级斗争的特殊环境中在党内产生的毫无原则的阴谋集团。] 很明显，我们党决不能容许任何人进行这种阴谋活动，因为只要容许这种阴谋活动，就等于取消了党的一切政治原则和组织原则，就等于党的灭亡。","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"我们必须接受这个严重的教训，切实健全各种必要的制度，首先是建立和加强中央对全国各地方和上级对下级的巡视检查制度，一定的党的工作部门监督一定的国家工作部门的制度，管理干部的部门同时负责检查干部的实际工作情形的制度，以保证任何党员都在党的监督下面做工作。 [同时，建立中央和各级党的监察委员会，以便经常检查和处理党员干部和党的组织各种违法乱纪案件，同一切违反党章党纪的分子进行经常的坚决的斗争。]","type":"paragraph"},{"text":"根据刘少奇修改件刊印。","type":"paragraph"},{"text":"注释","type":"appellation"},{"text":"〔1〕本篇一是刘少奇在周恩来《关于高岗饶漱石反党联盟的报告》(第三次修正稿)上的批语。这个报告稿原拟由周恩来代表中共中央政治局在一九五五年三月二十一至三十一日召开的中国共产党全国代表会议上宣读。后因周恩来生病住院，改由中共中央秘书长、国务院副总理邓小平宣读。报告讲五个方面的问题：(一)全党在以毛泽东为首的党中央领导下，已经彻底粉碎了高岗、饶漱石反党联盟的阴谋活动。(二)高岗、饶漱石反党联盟的阴谋活动是怎样暴露的?党中央对他们的阴谋活动采取了怎样的措施?(三)高岗、饶漱石反党联盟的最大罪恶，就是在党内施用阴谋方法来夺取权力，而这是同党的生命不能并存的。(四)高岗、饶漱石这样的阴谋家为什么会在我们党内出现?(五)中央政治局认为，为严肃党纪，应当开除高岗的党籍，撤销饶漱石的中央委员资格。本篇二、三是刘少奇对这个报告稿中两段文字的修改。","type":"paragraph"},{"text":"〔2〕见本篇二、三。","type":"paragraph"},{"text":"〔3〕指高岗、饶漱石反党联盟。","type":"paragraph"}],"comments":[],"origin":"中共中央文献研究室编《建国以来刘少奇文稿第七册(一九五五年一月——一九五五年十二月)》(中央档案馆，2005年)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"高岗","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0866be6d24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
