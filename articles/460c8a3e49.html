ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对陈伯达、康生关于李雪峰不再兼任北京市委书记请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对陈伯达、康生“关于李雪峰不再兼任"},{"type":"paragraph","text":"北京市委书记请示报告?的批语"},{"type":"paragraph","text":"（1966年8月15日）"},{"type":"paragraph","text":"林、周、陶、刘、邓、雪峰同志阅，请林主持开会谈一下。雪峰市委暂时似可名义上不动，实际工作交与吴德主持，需要华北局支持时去支持一下，似较好，请酌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十五日廿二时"},{"type":"paragraph","text":"[1]陈伯达，当时任中共中央政治局常委、中央文化革命小组组长。康生，当时任中共中央政治局常委、中央文化革命小组顾问。"},{"type":"paragraph","text":"[2]陈伯达、康生1966年8月15日给毛泽东写报告说：“我们请主席考虑，雪峰同志是否可以集中力量管华北局，不必再兼北京市书记，市委书记可由吴德同志接任。”李雪峰，当时任中共中央华北局第一书记、北京市委第一书记。"},{"type":"paragraph","text":"[3]林，指林彪。周，指周恩来。陶，指陶铸。刘，指刘少奇。邓，指邓小平。中共八届十一中全会调整了中央领导机构，他们均任中央政治局常委。"},{"type":"paragraph","text":"[4]吴德，当时任中共北京市委第二书记、北京市市长。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":473,"page_end":473},"tags":[{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"吴德","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"李雪峰","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"460c8a3e49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
