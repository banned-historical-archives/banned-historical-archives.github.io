script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一条资产阶级派性的标语不见了","authors":["红宣兵　卫东司"],"dates":[{"year":1968,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一条资产阶级派性的标语不见了"},{"type":"paragraph","text":"一条贴在宿舍门上、引起过一场风波的资产阶级派性标语突然不见了。全校革命师生和工人毛泽东思想宣传队的同志，都打心眼里高兴。这条标语从出现到消失，可有一段故事哩！"},{"type":"paragraph","text":"工人毛泽东思想宣传队进驻广西柳州八中不久，有几个学生从小山头出发写了一条标语：“××组织进驻，××组织不得入内”，贴在自己宿舍的门上。标语贴出后，轰动了全校。有的说，这是破坏大联合。有的说，现在还写这个标语，这不是一般性的问题；有的人干脆说：把标语撕掉，人搬进去住就得了！他们纷纷来找工人宣传队的同志。工人宣传队队长莫绪骄同志想，这条标语的出现，说明学校里资产阶级派性还没有彻底肃清。撕下标语简单，清除他们脑子里的资产阶级派性可不容易。毛主席教导我们：“我们的同志一定要懂得，思想改造的工作是长期的、耐心的、细致的工作，……”于是，老莫和几个宣传队队员遵照毛主席“开展谈心活动，这个方法很好”的教导，一次、二次、三次地到写标语的几个学生那里，和他们谈心。可是由于他们受无政府主义影响较深，思想还是转不过弯来。老莫和工人宣传队的其他队员们并没有灰心，仍然满怀深厚的无产阶级感情，继续找他们谈。这已经是第六次了，小将们被工人同志这种紧跟毛主席伟大战略部署，耐心地细致地做思想政治工作的精神所感动，坐下来认真倾听老工人给他们讲的道理。老工人的话句句说到了小将们的心坎上，他们开始为自己没有落实毛主席最新指示而惭愧，为自己没有紧跟毛主席伟大战略部署而难过。小将们坚决表示要团结一致，共同对敌，夺取斗批改的全面胜利。"},{"type":"paragraph","text":"第二天，这条轰动全校的标语突然不见了。"},{"type":"paragraph","text":"现在这间宿舍里，贴满了毛主席的最新指示，充满着团结战斗的气氛。他们写出一张张批判修正主义教育路线的大字报，喊出一阵阵批判走资派的吼声。当人们谈起这个变化时，都异口同声地说：“这是毛主席的最新指示照亮了他们的心”。　红宣兵　卫东司"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d34f02207"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
