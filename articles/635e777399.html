script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"忠于毛主席　永远闹革命","authors":["缪德林"],"dates":[{"year":1969,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上港七区老工人、共产党员　缪德林"},{"type":"paragraph","text":"站在码头望北京，知心的话儿涌心头。听到党的“九大”隆重召开的特大喜讯时，我的心是多么激动，多么兴奋!当我在收音机里聆听到伟大领袖毛主席亲自主持了大会，并作了极其重要讲话的时候，我的心又飞到了毛主席的身旁。我永远也不会忘记，在去年盛大的国庆节日里，是毛主席请我们住进了中南海，并一次又一次亲切地接见我们工人代表，毛主席精神焕发，神采奕奕，身体非常非常健康，这是我们工人阶级最大的幸福，最大的光荣。毛主席啊，毛主席，是您说:“工人阶级最有远见，大公无私，最富于革命的彻底性。”又是您发出了伟大号召:“工人阶级必须领导一切。”这是对我们工人阶级最大的鼓舞，最大的信任。毛主席啊，毛主席，天大地大没有您的恩情大，爹亲娘亲不如您亲。让我们衷心敬祝您万寿无疆!万寿无疆!"},{"type":"paragraph","text":"回想起黑暗的旧社会，我们码头工人是被人踩在脚下的“臭小工”，吃的咸菜汤，住的滚地龙，睡的没脚床。上的“过山跳”，走的“独木桥”，过着不如牛马的悲惨生活。解放了，红太阳照亮了上海港，我们翻身当了主人，码头换上了新貌，在总路线、大跃进、人民公社的光辉照耀下，我们掌握了毛泽东思想，开动脑筋，大搞技术革命和技术革新，丢脱扛棒、搭肩布，“大老粗”掌握了机械。如今，码头吊车成林，拖车成龙，我们越干越有劲，越千越自豪。我们深深体会到“过去码头工人不如一棵草，现在毛主席把我们当成宝”。"},{"type":"paragraph","text":"在毛泽东思想的阳光下，我从一个普通的工人，加入了工人阶级的先锋队——中国共产党，在这次无产阶级文化大革命中，同志们又推选我当上了革委会的工人委员，还上北京见到了伟大领袖毛主席，我深深地感到，我的一切都是毛主席给的。毛主席是我最大最大的恩人。今后我一定要进一步活学活用毛主席著作，狠抓革命，猛促生产，大搞技术革命和技术革新，在工业生产新高潮中搞好装卸工具的革新，在短时间内攻下“舱底关”，解决了铁驳子的“老大难”，为最后实现装卸全部机械化而努力奋斗，以最优异的成绩向党的“九大”献礼!向毛主席献忠心!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"635e777399"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
