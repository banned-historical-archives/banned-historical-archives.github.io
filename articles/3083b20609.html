剑英、李先念、郭沫若和邓颖超等的热烈欢迎","authors":[],"dates":[{"year":1972,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年八月二十日电　柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，圆满结束了对我国山东省的正式访问，今天下午乘专车回到北京，受到了柬埔寨民族统一阵线中央政治局主席、王国民族团结政府首相宾努亲王和夫人，我国国务院总理周恩来的热烈欢迎。"},{"type":"paragraph","text":"下午四时，西哈努克亲王和夫人由中共中央军委副主席、人大常委会副委员长徐向前和柬埔寨国内特使英·萨利陪同，高兴地走下专车，宾努首相和夫人，周恩来总理和中共中央军委副主席叶剑英、国务院副总理李先念、人大常委会副委员长郭沫若以及邓颖超同志等，迎上前去，同他们亲切握手、热烈拥抱，祝贺访问成功。"},{"type":"paragraph","text":"随后，西哈努克亲王和夫人由周恩来总理和邓颖超同志分别陪同，乘车前往国家元首官邸。"},{"type":"paragraph","text":"同车到达北京的柬埔寨贵宾还有:柬埔寨王国民族团结政府首相府大臣吉春、诺罗敦·凯卡妮娅公主、博夫人、诺罗敦·尤瓦那王子和夫人、诺罗敦·伦赛公主、诺罗敦·西哈莫尼王子、诺罗敦·诺林达拉邦王子、古伦夫人、洪金宽大使和夫人等。"},{"type":"paragraph","text":"前往车站欢迎的还有:"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察和夫人、军需军备大臣杨森安将军和夫人、争取民族解放力量协调大臣秀蒲拉西、吉春大臣的夫人、万比尼副大臣的夫人、暹安大使的夫人等；"},{"type":"paragraph","text":"我国外交部部长姬鹏飞、中共中央对外联络部部长耿飚、北京市革命委员会主任吴德、外交部副部长韩念龙、交通部副部长郭鲁，以及林佳楣、于立群、许寒冰、王珍、韩叙、梁枫、孙浩等同志。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召和杨玲同志陪同贵宾同车到达北京。"},{"type":"paragraph","text":"西哈努克亲王和夫人等今天路过天津时，天津市革命委员会、中国人民解放军驻天津部队负责人解学恭、王曼恬、许诚、费国柱、李荣贵、孙敬文、阎达开和朱宪彝教授等到车站迎送。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3083b20609"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
