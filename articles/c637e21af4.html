[],"dates":[{"year":1966,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"陶铸与河北大学马曙光等的谈话","type":"title"},{"text":"张庆奎：我们是河北大学的（陶铸同志一一和我们握手）","type":"paragraph"},{"text":"陶铸：你们来多少人？","type":"paragraph"},{"text":"马曙光：四百多人（把材料交给陶铸同志）","type":"paragraph"},{"text":"陶铸：你们住在哪里？","type":"paragraph"},{"text":"马曙光等：外交学院。","type":"paragraph"},{"text":"陶铸：你们回去，回去继续搞革命。","type":"paragraph"},{"text":"马曙光：这不光是我们学校的问题，是河北省委和我们的问题，我们有人提出“炮轰省委司令部”，省委的同志讲炮轰省委司令员就是反省委、反党！","type":"paragraph"},{"text":"陶铸：省委问题也要轰，你们可以和他们辩论。","type":"paragraph"},{"text":"马曙光：我们要和他辩论，他们不辩，他们发动天津市的工人、学生、机关干部向我们围攻，声讨我们。","type":"paragraph"},{"text":"陶铸：你们革他们的命就要有阻力，他们这种作法就是反革命。不革命就是反革命！你们要顶住，不要怕。","type":"paragraph"},{"text":"马曙光等：我们不怕。","type":"paragraph"},{"text":"陶铸：我们把你们的材料交给文革小组。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"河北文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c637e21af4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
