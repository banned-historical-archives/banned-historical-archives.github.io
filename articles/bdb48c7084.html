script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜《劳动新闻》发表编辑部文章纪念马克思诞辰马克思的事业万古常存关于无产阶级专政的学说是区分马克思主义和修正主义的试金石　离开反帝斗争就谈不上和平也谈不上民族独立和社会主义的胜利","authors":[],"dates":[{"year":1963,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤5日电】　朝鲜《劳动新闻》今天发表编辑部文章，纪念科学共产主义的创始人、全世界劳动人民伟大的领袖和导师马克思诞生一百四十五周年。"},{"type":"paragraph","text":"这篇题为《马克思的事业万古常存》的文章中说，马克思和恩格斯的伟大的世界历史性功绩在于，他们第一次发现了人类历史的发展规律，科学地论证了资本主义灭亡的不可避免性和社会主义胜利的必然性，阐明了资本主义的掘基人、社会主义和共产主义的建设者——无产阶级的历史使命，并把解放斗争的有力武器交到他们手中。"},{"type":"paragraph","text":"文章说，马克思关于无产阶级专政的学说，是马克思主义中的最基本的东西，是区分马克思主义和修正主义的试金石。"},{"type":"paragraph","text":"文章指出，马克思主义在理论上的胜利，使得它的敌人不得不装扮成马克思主义者。"},{"type":"paragraph","text":"在马克思和恩格斯逝世后的一个时期内，伯恩斯坦、考茨基等修正主义者向马克思主义进行了疯狂的挑战，企图阉割它的革命精神。文章说，在这个严重时期，是列宁保卫并发展了马克思和恩格斯的革命学说。"},{"type":"paragraph","text":"文章说:“马克思的学说所以万能，是因为它正确；它所以战无不胜，是由于它的彻底的革命精神和科学性。”"},{"type":"paragraph","text":"文章指出，今天，国际反动派的元凶、侵略和战争的主要势力是美帝国主义。一切事实都证明，帝国主义的侵略本性不仅绝对不会改变，相反，它的力量越是削弱，它就越加恶毒和野蛮。以南斯拉夫铁托集团为代表的现代修正主义者，正在卑鄙地进行阴谋活动，在劳动群众中散布对帝国主义的幻想，积极庇护美帝国主义的侵略活动，并企图麻痹人民的革命意志。"},{"type":"paragraph","text":"文章指出，“今天离开反对帝国主义者，特别是反对美帝国主义者的侵略和战争政策的斗争，就谈不上什么和平，也谈不上民族独立和社会主义的胜利。只有不断地加强社会主义阵营的威力，紧密地团结民族解放斗争和一切反帝的革命力量，为粉碎美帝国主义及其走狗的侵略活动和阴谋展开坚决的斗争，才能在争取和平、民族独立和社会主义的斗争中取得更大的胜利。”文章在谈到加强国际共产主义运动的团结时说:“我们党一贯维护马克思列宁主义原则和彻底遵守兄弟党、兄弟国家间相互关系的准则，并为了捍卫苏联、中国等整个社会主义阵营、加强它的一致和团结而积极地进行斗争。今后，我们仍将竭尽全力来维护社会主义阵营的团结一致和加强国际共产主义运动的团结。我们将继续进行斗争，反对当前国际共产主义运动中的主要危险——修正主义，同时反对教条主义，在一切部门更加彻底地确立主体，坚决维护马克思列宁主义纯洁性。”"},{"type":"paragraph","text":"平壤其他各报也发表了纪念的文章。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdb48c7084"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
