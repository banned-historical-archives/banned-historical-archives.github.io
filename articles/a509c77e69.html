script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"c21f8808-2334-4e60-a047-27a52e8adbce","name":"夏邦银、朱洪霞、胡厚民等人的言论节录","internal":false,"official":true,"type":"img","author":"中共武汉市委材料组","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"朱洪霞、胡厚民等人在武胜路街头集会上的讲话（节录）","alias":"","parts":[{"type":"title","text":"四月四日朱洪霞、胡厚民等人在武胜路街头集会上的讲话（节录）"},{"type":"paragraph","text":"朱洪霞说：“自有人类以来的历史都是阶级斗争的历史。走资派不镇压造反派，不成其为走资派。造反派不造走资派的反，就不成其为造反派。他们之间的斗争是你死我活的斗争，社会主义历史时期不结束，这一场斗争就不会结束。”"},{"type":"paragraph","text":"胡厚民说：“当前反击右倾翻案风的斗争形势大好，这种形势是怎样来的？”他列举了他们十三次逼着省、市委召开两委会的情况后，说：“省委的领导人总是要找我们个别人谈，他们要阴谋，用威逼利诱的办法，分裂我们队伍，所以我们不同意个别谈，要谈集体谈。六九年反复旧期间，总理批评我们为什么不先向中央打个招呼？这一次，我们两个中央委员和省、市革委会的部分同志，先向毛主席、党中央写了信，报告了我们的决心和态度，这两封信拉开了反击右倾翻案风的序幕。这两封信以后，武汉三镇大字报、大标语，成批的出来了，炮火连天，弹痕遍地，吓倒了蓬间雀。”接着他介绍了纠缠省委，向省委施加压力的详细经过后，说：“我们提出的两个问题，五条要求，省、市委至今置之不理。现在，找我们谈就面对面的斗，不找我们谈就升大会，上面也斗，下面也斗，一直把走资派斗倒，不获全胜，决不收兵。”"},{"type":"paragraph","text":"胡厚民说：“他们造我们的谣言，说我们强行进驻省委。怎么叫强行进驻？我们是省、市革委会的成员，谈了之后要安置住下来等省委答复，这是天经地义的，理所当然的，说我们强行进驻这是诬蔑。朱洪霞当了省革委会副主任七、八年，这是第一次行使职权。”“他们还说我们在那里抢饭……我们住省委招待所，到省委造走资派的反，能不给我们饭吃行吗？再说我们有些同志被你搞得家破人亡，停发工资，我们就是抢了也是理所当然的。"},{"type":"paragraph","text":"胡厚民说：“最近中央发了一个通知，这个通知是指南京的嘛！他们好象捞到了什么稻草似的，实际上通知主要是讲南京有人把矛头指向党中央领导同志。我们湖北也有类似标语，省委至今不理睬，不表态。”还说：“江青同志最近接见四川的七位同志时，一个一个地问他们在文化大革命期间的观点。当然要问嘛，这是历史嘛。江青同志说：“你们要把屁股坐到造反派这边来，这才是转弯，这才算彻底转弯。”我们向省委领导提出五条要求，这是转好弯子的最起码的要求。三月一日江青同志接见湖北参加中央打招呼会议代表时说：‘你们要转好弯，快转弯，诚诚恳恳地向造反派作检查，我就是老造反派嘛’。他们封锁了中央指示精神。”"}],"authors":["朱洪霞","胡厚民"],"dates":[{"year":1976,"month":4,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"中共武汉市委材料组，一九七六年十二月","page_start":13,"page_end":14},"tags":[{"name":"江青","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a509c77e69"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
