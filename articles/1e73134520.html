art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"是否可以弃权；","authors":[],"parts":[{"type":"paragraph","text":"问：在讨论表决党的日常工作时，是否允许党员放弃表决权？弃权是否发明他缺乏责任心？"},{"type":"paragraph","text":"答：邓小平同志在“关于修改党的章程的报告”中说：“在各种日常工作问题上，党员们的意见有某些不一致，不但是许可的，而且是不可避免的。”根据这一精神，党员在参加讨论日常工作时，由于对工作情况不够了解，或意见尚未考虑成熟等原因，为了慎重，放弃表决权是可以的，这不能说明是缺乏责任心。但是，所讨论表决的问题一经形成决议后，党员不论参加表决与否，都必须按照“个人服从组织、少数服从多数、下级服从上级、全国的各个组织统一服从中央”的原则行动。否则，是党的纪律所不能允许的。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e73134520"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
