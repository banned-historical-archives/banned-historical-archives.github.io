uthors":["张天民"],"dates":[{"year":1975,"month":7,"day":18}],"is_range_date":false,"parts":[{"text":"张天民为电影《创业》给毛泽东的申诉信（要点）","type":"title"},{"text":"张天民","type":"authors"},{"text":"〖张天民，长春电影制片厂电影《创业》编剧。〗","type":"subtitle"},{"text":"电影《创业》公映后受到观众普遍欢迎，信中说：“但就在上映的第二天，有关领导做出几项决定：不继续制拷贝；报纸上不发表评介文章；不出国；电视电台停止广播。并通知了全国各地。不久，北影负责人传达了中央负责同志的指示，指出影片在政治上、艺术上都有严重错误，政治上美化刘少奇，艺术上写真人真事，公式化概念化。要求查一查背景，并写批评性的文章。这使文艺界受到极大的震动，思想上比较混乱。”","type":"paragraph"}],"comments":[],"origin":"《毛泽东传（1949—1976）》，中央文献出版社，2003年12月第一版1744页。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ab916a247"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
