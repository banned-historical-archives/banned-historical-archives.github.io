art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"跟着毛主席永远战斗永远革命","authors":["朝鲜族五好战士金万善"],"parts":[{"type":"paragraph","text":"党的八届十一中全会公报传来了，我万分激动。这是我国各族人民政治生活中有历史意义的大事，也是世界革命人民的大事。"},{"type":"paragraph","text":"正当无产阶级文化大革命迅速向前发展的时候，我们敬爱的领袖毛主席亲自主持党的八届十一中全会，给我们各族人民增强了革命到底的决心和信心，使我们看到了社会主义、共产主义最美好的前景。"},{"type":"paragraph","text":"我是一个朝鲜族战士。解放前，我家没有固定的住处，祖父领着我们全家从内蒙古流浪到黑龙江。祖父累死了，父母给地主当牛做马，过着非人的生活。是党和毛主席把我们从苦难中解放出来，又帮助我们家乡改变了贫穷落后的面貌。解放后，我们家乡走集体化的道路，提高了人民的觉悟，发展了生产，改善了生活。毛主席给我们送来了稻种，让我们开辟了稻田；毛主席给我们送来了机器，派来了技术人员，帮我们发展生产；毛主席帮我们办起了学校，使我们劳动人民也念起书来。毛主席是各族人民的大救星，是我们心中永远不落的红太阳，我们跟着毛主席，永远战斗，永远革命。"},{"type":"paragraph","text":"目前，国内一小撮反党黑帮想搞资本主义复辟，国际上帝国主义、修正主义和一些反动派，正在起劲地搞联合反华，这是白日做梦。在党和毛主席的英明领导下，我们各族人民紧密团结在毛主席的周围，我们有伟大的战无不胜的毛泽东思想，我们什么也不怕，不论什么样的敌人，我们都要统统把它消灭掉。"},{"type":"paragraph","text":"敬爱的毛主席，我向您宣誓：永远跟着您，坚决响应公报的伟大号召，高举毛泽东思想伟大红旗，将无产阶级文化大革命进行到底，将世界革命进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"193d684db7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
