script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向反革命修正主义文艺路线猛烈开火","authors":[],"dates":[{"year":1967,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:三月廿六日，本报发表文艺界革命派三战士《彻底砸烂修正主义的文艺黑线》一文以后，引起了文艺界同志的极大重视。这里我们继续发表三篇文章，供大家讨论参考。"},{"type":"paragraph","text":"无产阶级革命派联合起来向党内一小撮走资本主义道路的当权派夺权，这是目前文化大革命运动的迫切任务。文艺界当然也不例外。文艺界的领导权肯定要夺。但是，如果不彻底批判反革命修正主义文艺路线，不肃清这条反革命修正主义文艺路线的影响，不挖掉埋在文艺界的修正主义根子，某些文艺单位的运动可能走向邪路，领导权也仍可能落到个别别有用心的坏家伙手里。目前在一些文艺单位出现的情况和问题，是值得我们深思的。"},{"type":"paragraph","text":"文艺界的无产阶级革命派，在批判资产阶级反动路线的斗争中，取得了一些成绩。但是，形势是向前发展的，应当怎样不断革命，去适应新的战斗的需要呢?问题是根尖锐地摆着。成绩只能说明过去，一切应当从零开始。如果我们在砸烂反革命修正主义文艺路线这场严重的斗争面前裹足不前，热衷于打‘内战’，发展下去，岂不是很危险的吗?"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3ad1b6f12"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
