rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大树毛泽东思想的绝对权威","authors":["第二炮兵司令部无产阶级革命派"],"parts":[{"type":"paragraph","text":"在两个阶级、两条道路、两条路线、两个司令部决战的关键时刻，以毛主席为首的无产阶级司令部发出的重要战斗号令，使我们受到极大的鼓舞，增添了巨大的力量，同时也使我们的头脑更加清醒。我们一定更高地举起毛泽东思想的伟大红旗，集中火力，集中目标，搞好革命的大批判。"},{"type":"paragraph","text":"在伟大领袖毛主席的领导下，我国无产阶级文化大革命一个胜利接着一个胜利，形势空前大好。以中国赫鲁晓夫为首的党内最大的一小撮走资本主义道路当权派，一个个被揪了出来，被拉下马，他们妄图颠覆无产阶级专政、复辟资本主义的阴谋被粉碎了。全世界革命人民，都在为这个伟大的胜利欢呼。但是，在胜利中我们要保持清醒头脑，要看到如果不把敌人从政治上、思想上、理论上批倒批臭，不彻底肃清其一切流毒和影响，那就留下了祸根，一旦时机成熟，他们还会反扑过来，把亿万人民淹没在血泊中。“宜将剩勇追穷寇”。我们一定要搞好革命的大批判，把以中国赫鲁晓夫为首的党内最大的一小撮走资本主义道路当权派，从政治上、思想上、理论上批倒批臭，彻底摧毁资产阶级司令部，挖掉修正主义的根子。"},{"type":"paragraph","text":"革命的大批判，就是运用战无不胜、光焰无际的毛泽东思想，肃清中国赫鲁晓夫所贩卖的形形色色的修正主义货色。开展革命的大批判的过程，就是学习毛泽东思想，运用毛泽东思想，捍卫毛泽东思想，宣传毛泽东思想的过程。为了搞好革命的大批判，我们一定更好地活学活用毛主席著作，掀起学习毛主席著作群众运动的新高潮。在斗争的实践中，进一步用毛泽东思想把自己武装起来，破私立公，加强自己的思想革命化。"},{"type":"paragraph","text":"在革命的大批判中，我们同全国无产阶级革命派一样，以笔做刀枪，向以中国赫鲁晓夫为首的党内最大的一小撮走资本主义道路当权派，发起了猛烈进攻。为了把革命的大批判搞好，我们一定进一步发动群众，打一场更加轰轰烈烈的“人民战争”，彻底埋葬党内最大的一小撮走资本主义道路的当权派。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7596233669"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
