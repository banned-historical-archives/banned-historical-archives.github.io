art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热情宣传毛泽东思想 激发社员的革命干劲","authors":["济新"],"parts":[{"type":"paragraph","text":"济南部队 最近，济南部队各单位纷纷奔向夏收第一线。他们高举红旗，扛着毛主席语录牌，高唱毛主席语录歌，浩浩荡荡开赴田间。他们把支援夏收当作宣传毛泽东思想的大好时机，使战无不胜的毛泽东思想成为完成夏收任务的动力。各部队普遍组成了毛泽东思想宣传队，深入生产队。劳动时，他们打头阵，干重活；休息时，他们运用读报、谈心、讲用会和演唱等多种形式，向社员热情宣传毛主席“抓革命，促生产”的伟大方针。"},{"type":"paragraph","text":"某炮团在夏收中，结合当地革命、生产的大好形势，和社员一起开展了“三看三想”活动：一看今年夏粮丰产，想无产阶级文化大革命的伟大胜利；二看社员革命干劲，想毛泽东思想的无穷威力；三看集体经济的优越性，想社会主义道路的无限光明。广大贫下中农和革命干部对毛主席更加无限热爱，无限信仰，执行毛主席的无产阶级革命路线更加坚定不移。"},{"type":"paragraph","text":"某部警卫排，了解到个别社员想下湖挖藕挣钱，不想参加夏收。班长陆永清就和社员们一起学习《纪念白求恩》，介绍自己以白求恩为榜样，破私立公的体会。社员们听了很受感动。一个打算去卖藕的社员很快提高了认识，积极参加了麦收。他说：“毛主席的书给俺打开了心窍，解放军是俺学习的好榜样。我决不能上坏人的当，只顾个人，不顾集体。”"},{"type":"paragraph","text":"通过支援夏收的实践，广大指战员又一次深深体会到：用毛泽东思想武装社员的头脑，促进人的思想革命化，是最根本的支援。物质的东西多了，精神的东西要更多。农业丰收，同样要加强政治思想工作。（济新）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a25543640b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
