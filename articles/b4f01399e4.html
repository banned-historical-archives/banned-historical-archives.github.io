rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋总理同马列托亚殿下继续会谈马列托亚殿下应邀观看《沂蒙颂》乌兰夫副委员长等陪同贵宾观看演出","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年九月四日讯 国务院总理华国锋同西萨摩亚国家元首马列托亚·塔努马菲利第二殿下今天下午继续举行了会谈。"},{"type":"paragraph","text":"新华社一九七六年九月四日讯 西萨摩亚国家元首马列托亚·塔努马菲利第二殿下和随同来访的其他西萨摩亚贵宾，今天晚上应邀出席文艺晚会，观看了革命现代舞剧《沂蒙颂》。"},{"type":"paragraph","text":"陪同贵宾们观看演出的有人大常委会副委员长乌兰夫，文化部副部长张维民，北京市革命委员会副主任刘锡昌等。"},{"type":"paragraph","text":"剧场里洋溢着中国和西萨摩亚两国人民友好的热烈气氛。中国舞剧团的演出，受到西萨摩亚贵宾们鼓掌欢迎。演出结束时，马列托亚殿下由乌兰夫副委员长陪同走上舞台，同演员们热情握手，并向他们赠送了花篮。"},{"type":"paragraph","text":"晚会是由北京市革命委员会举办的。"},{"type":"paragraph","text":"马列托亚殿下等西萨摩亚贵宾今天上午由刘锡昌副主任陪同游览了长城、定陵。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4f01399e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
