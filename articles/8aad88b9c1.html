rs":["天津大学","方成"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“要求制订国家刑法，制裁违法者！”","type":"title"},{"text":"天津大学方成","type":"authors"},{"text":"肃反运动错误何在？","type":"paragraph"},{"text":"1．把人民内部矛盾当成敌我矛盾，","type":"paragraph"},{"text":"2．群众路线——被歪曲，","type":"paragraph"},{"text":"我们学校是强迫群众违背自己的认识和良心，去参加斗争。结果使他们也感到受骗了，精神上受到了责难，“群众路线”变成了党推卸责任的手段了。","type":"paragraph"},{"text":"3．斗争形式——土改的余风。","type":"paragraph"},{"text":"恐吓、威胁、捏造、疲劳审问、监视、检查文件这种方法是错误的。","type":"appellation"},{"text":"4．驳肃反的错误是不可避免论。","type":"appellation"},{"text":"拿人的生命来作试探，用“莫须有”的罪名来斗争好人，是反民主、反人权的做法，而肃反错误的不可避免是推卸责任的招牌，“莫须有”是反动透顶的主观唯心主义。","type":"appellation"},{"text":"我们要求实事求是的对肃反做估计和交代。","type":"paragraph"},{"text":"要求制订国家刑法，制裁违法者！","type":"subtitle"},{"text":"确保人权、言论自由！","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8aad88b9c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
