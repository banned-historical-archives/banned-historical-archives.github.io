ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对西北战场形势的分析","alias":"","parts":[{"type":"paragraph","text":"对西北战场形势的分析！!"},{"type":"paragraph","text":"（1947年8月22日）刘、邓，陈、谢，并告朱、刘（转聂、萧)，杨、罗、杨，陈、粟，林、罗，贺、习："},{"type":"paragraph","text":"三十六师主力被歼后，残部向绥德方向逃窜。胡宗南三个主力师（一师、三十六师、九十师），仅九十师未受歼灭打击。现刘急率九十师（二个旅）、十七师之十二旅、七十六师之一四四旅、三十八师之五十五旅由佳县乌龙铺集结镇川堡，罗列率一师（二个旅）由绥德向米脂集结。以上共计七个旅。此外，尚有九个"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承、政治委员邓小平和晋冀鲁豫野战军陈谢集团前委书记陈、副书记谢富治的电报。"},{"type":"paragraph","text":"[2]朱、刘，指朱德、刘少奇。聂、萧，指聂荣臻、萧克，当时分别任晋察冀军区司令员兼政治委员和副司令员。杨、罗、杨，指杨得志、罗瑞卿、杨成武，当时分别任晋察冀野战军司令员、第一政治委员和第二政治委员。陈、粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。林、罗，指林彪、罗荣桓，当时分别任东北民主联军总司令兼政治委员和副政治委员。贺、习，指贺龙、习仲勋，当时分别任陕甘宁晋绥联防军司令员和政治委员。"},{"type":"paragraph","text":"[3]胡宗南，当时任国民党军西安绥靖公署主任。[4]刘，当时任国民党军整编第二十九军军长。[5]罗列，当时任国民党军整编第一军第一师师长。旅，分布于榆林一个旅（三十六师之二十八旅），绥德一个旅（十七师之四十八旅），清涧、两延、瓦市川二个旅（七十六师之二十四旅），永坪一个旅（二十七师三十一旅一个团，一师一六七旅一个团，该两团是青化砭蟠龙两役未被歼者），延安一个旅（二十七师之四十七旅），甘富一个旅（十七师之八十四旅，缺一个团在运城），洛川一带一个旅（邓锡侯3三十九师之新九旅），三原、马栏一带一个旅（七十六师之新一旅），长武、彬县一个旅（七十九师之暂二旅），陇东、三边均是杂部，兰州附近尚有胡军一个旅。故不但整个陕南无正规部队，大关中极其空虚，即陕北大部分地方亦已无敌，胡宗南猖獗时期已经过去。我野战军士气高涨，仍在镇川堡以北地区休息数日，即可寻机歼敌。我王世泰率两个旅又到关中活动，完全可能吸引全部至少大部胡军不敢东调，以利陈谢放手进攻豫西，协助刘邓作战。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十二日十四时[1]两延，指陕西延川和延长。瓦市，即今陕西瓦窑堡。[2]甘富，指陕西甘泉和富县。[3]邓锡侯，当时任国民党军川康绥靖公署主任。[4]三边，指陕西西北的定边、安边和靖边。[5]王世泰，当时任西北野战军第四纵队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":220,"page_end":221},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13ca15e40b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
