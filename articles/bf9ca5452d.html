s":["新华社"],"dates":[{"year":1960,"month":8,"day":29}],"is_range_date":false,"parts":[{"text":"无锡市部分工人患浮肿病","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社南京讯　无锡市部分工厂发现少数工人患有浮肿病。据申新纺织厂、缫丝一厂、正德袜厂等一百一十一家工厂统计，发现有浮肿病患者二千四百七十一人，约占这些工厂职工的2%。患者以女工为多。据初步分析发病的原因是：有些工厂工时过长，过度疲劳；有些厂高温、潮湿、空气混浊；营养不良，特别是蛋白质之类的养份不足；有的工人原来患有其他疾病，体质弱，抵抗力差。该市已组织医务力量及时治疗。","type":"paragraph"},{"text":"来源： 1960年8月29日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf9ca5452d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
