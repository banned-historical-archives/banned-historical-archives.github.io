ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"南方游击区应注意的几个问题","alias":"","parts":[{"type":"paragraph","text":"南方游击区应注意的几个问题！"},{"type":"paragraph","text":"（1948年12月27日）港分局："},{"type":"paragraph","text":"（一）同意南方三区三个纵队²的建立及所提三个纵队负责人员的名单。"},{"type":"paragraph","text":"（二）各纵队的分散作战或集中作战，依敌情的集中或分散而灵活地决定，即敌人分散敌力薄弱时我应集中作战，敌人集中进攻情况严重时我应分散作战。"},{"type":"paragraph","text":"（三）从你们已有材料看来，各区游击部队在当地群众中生根的问题仍是一个极端严重的问题，必须克服错误倾向，批判“左”的和右的政策，深入地发展群众工作，并在部队内部队外建立群众性的党的组织，严防部队中脱离群众的单纯军事观点。"},{"type":"paragraph","text":"（四）每一个大游击区在有许多民主县政权建立之后，可以建立行署，统筹全区行政事宜，使根据地日趋巩固与扩大，但政权机关及军队后方机关的组织应适合游击战争环境，力求精简灵便，随时可以移动，切忌庞大臃肿、重形式务虚名而不顾及实际情况。"},{"type":"paragraph","text":"（五）一九四九年应是南方游击战争和游击根据地广大发展的一[1]这是毛泽东为中共中央起草的给中共中央香港分局的电报。[2]指闽粤赣边纵队、粤赣湘边纵队和桂滇黔边纵队，这三个纵队均于年，三区均应建立电台并与中央发生联系。"},{"type":"paragraph","text":"（六）你们对于各游击区的军事政策、农村政策和城市政策，仍极少向我们作报告，你们应十分重视这些政策问题，并经常向我们作报告。"},{"type":"paragraph","text":"中央亥感"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":461,"page_end":462},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aafb4ea3dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
