script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市文化局紧密联系本系统实际把揭批“四人帮”斗争深入到业务领域中去","authors":[],"dates":[{"year":1978,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抓住林彪、“四人帮”流毒深、危害大的谬论深入揭批，进一步分清是非，拨乱反正，解放思想，推动了创作、演出和各项工作"},{"type":"paragraph","text":"本报讯　上海市文化局紧密联系文化系统的实际，把揭批林彪、“四人帮”的斗争深入到业务领域中去，进一步拨乱反正，推动了创作、演出和各项工作。"},{"type":"paragraph","text":"在揭批“四人帮”的第三战役中，文化局及所属各单位抓住对文艺战线影响最大、危害最深的“文艺黑线专政”论，反复地深入地揭批林彪、“四人帮”假左真右的反动谬论。上海评弹团联系本团实际，多次揭批“四人帮”鼓吹的评弹“彻底改革”论。叛徒江青说，“评弹是靡靡之音，听了要死人的”；国民党特务张春桥紧接着就下令，“评弹要在内容、形式、语言、音乐、动作五个方面作重大改革”。结果，把评弹的流派唱腔、传统书目统统砍掉。他们还勒令演员把家藏的全部传统剧本统统上交，装了一箩筐，扛到废品回收站去卖掉。这些传统剧本，不少是评弹老艺人花了许多心血，一字一句用毛笔记下来的，有的还是孤本。这样联系实际揭批，从思想上、路线上分清了是非，打碎了套在广大文艺工作者头上的精神枷锁，调动了他们的积极性。"},{"type":"paragraph","text":"最近几个月来，文化局及所属各单位认真贯彻落实五届人大精神，努力繁荣社会主义文艺事业，先后举办了青年会演、“上海之春”和话剧汇报交流演出。他们把揭批林彪、“四人帮”的斗争，贯穿到这些重大的业务活动中去。在青年会演中，有的单位召开了动员誓师大会，揭批“四人帮”摧残文艺、摧残人才的罪行，提出了为革命苦练基本功，不交“白卷”交“红卷”的口号。在会演中，破除“四人帮”鼓吹的“知识越多越反动”、苦练基本功是“业务挂帅”、“白专道路”等谬论，扫除“四人帮”煽动的无政府主义的流毒，树立理直气壮地抓业务，钻业务，勤奋学习，热爱事业，敢于和善于发现人才培养人才的好思想、好风气。青少年演员勤学苦练，老演员甘当“人梯”，会演中得奖和受表扬的青少年演员近二百八十人，出现了艺苑里新苗茁长、承前继后的生动局面。话剧汇报演出有九个大戏，六个小戏，改变了“四人帮”统治文艺舞台时那种死气沉沉的局面，粉碎了江青“话剧死了”的谰言，打破了“三突出”、“主题先行”等那套帮规帮法。不少作品从生活出发，思想性和艺术性结合得比较好，题材、风格多样，人物形象生动，在表演、导演、舞台美术等方面，冲破了“四人帮”设置的框框，有特色，有创造，面目一新。艺术评论和学术讨论也一扫过去“四人帮”一家作主的帮风帮气，各抒己见，出现了百家争鸣的景象。"},{"type":"paragraph","text":"文化局及所属各单位在抓好各项整顿工作时，注意开展专题揭批，分清思想路线是非。上海图书馆组织群众揭批林彪、“四人帮”推行的法西斯文化专制主义和禁锢政策。张春桥曾鼓吹，“别看图书馆有几百万册书，有用的才不过两书架子”。在他们挥舞的大棒下，歌颂我国无产阶级光荣斗争历史的书籍，许多优秀的中外文艺作品以及大批古籍，几乎都被斩尽杀绝，出现了图书馆藏书堆积如山，却无书可借的怪现象。联系图书馆的业务，深入揭批林彪、“四人帮”的假左真右，澄清了路线是非，推动了图书馆的业务工作。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a41211dad"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
