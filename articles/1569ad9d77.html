国也门文化合作协定和经济技术合作协定  人大常委会会议审议了中也友好条约，决定自签字之日起立即生效","authors":[],"dates":[{"year":1964,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国和也门友好条约在北京签订"},{"type":"paragraph","text":"刘少奇主席萨拉勒总统联合公报同时签字"},{"type":"paragraph","text":"同时签订了中国也门文化合作协定和经济技术合作协定"},{"type":"paragraph","text":"人大常委会会议审议了中也友好条约，决定自签字之日起立即生效"},{"type":"paragraph","text":"新华社九日讯　中华人民共和国和阿拉伯也门共和国今天签订了两国友好条约，条约的签字仪式今晚在北京隆重举行。刘少奇主席和阿卜杜拉·萨拉勒总统联合公报同时在今晚签字。"},{"type":"paragraph","text":"中华人民共和国主席刘少奇和阿拉伯也门共和国总统阿卜杜拉·萨拉勒，在“中华人民共和国和阿拉伯也门共和国友好条约”和“中华人民共和国主席刘少奇和阿拉伯也门共和国总统阿卜杜拉·萨拉勒联合公报”上签字。"},{"type":"paragraph","text":"今天同时签订的还有：“中华人民共和国政府和阿拉伯也门共和国政府文化合作协定”、“中华人民共和国政府和阿拉伯也门共和国政府经济技术合作协定”。分别代表双方，在文化合作协定上签字的，是中华人民共和国国务院副总理陆定一和阿拉伯也门共和国副总理阿卜杜·拉赫曼·埃里亚尼；在经济技术合作协定上签字的，是中华人民共和国对外经济联络委员会主任方毅和阿拉伯也门共和国国务部长阿卜杜·加尼·穆塔哈尔。"},{"type":"paragraph","text":"中国方面参加签字仪式的有：中华人民共和国副主席董必武，全国人民代表大会常务委员会委员长朱德，国务院总理周恩来，全国人民代表大会常务委员会副委员长郭沫若、彭真、赛福鼎，国务院副总理李富春、李先念，对外贸易部部长叶季壮、副部长卢绪章，外交部副部长曾涌泉，中国人民解放军副总参谋长彭绍辉上将，对外文化联络委员会副主任陈忠经，外交部条约法律司司长甘野陶，西亚非洲司副司长宫达非，礼宾司副司长葛步海。"},{"type":"paragraph","text":"也门方面参加签字仪式的有：副总理穆罕默德·拉埃尼准将，国防部副部长哈迪·埃萨准将，总统事务国务部长穆罕默德·卡伊德·塞弗，总统顾问阿卜杜拉·道比上校，总理顾问哈桑·迈基博士，总统法律顾问艾哈迈德·弗·阿布·奥荣，总统办公室主任穆贾赫德·哈桑中校，总统府秘书长阿里·马塔里。"},{"type":"paragraph","text":"签字以后，双方热烈握手，举杯祝贺。"},{"type":"paragraph","text":"新华社九日讯　中华人民共和国第二届全国人民代表大会常务委员会今天举行第一百一十九次会议。会议审议了“中华人民共和国和阿拉伯也门共和国友好条约”，决定由中华人民共和国主席刘少奇签订这个条约，自签字之日起条约立即生效。"},{"type":"paragraph","text":"会议决定设立中华人民共和国对外经济联络委员会，批准国务院撤销对外经济联络总局。"},{"type":"paragraph","text":"会议还通过了任免事项。"},{"type":"paragraph","text":"新华社九日讯　国务院全体会议第一百四十六次会议今天举行。会议通过了“中华人民共和国和阿拉伯也门共和国友好条约”（草案），提请全国人民代表大会常务委员会审议。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"刘少奇主席和萨拉勒总统在中也友好条约和联合公报上签字。"},{"type":"paragraph","text":"新华社记者　孟庆彪摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1569ad9d77"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
