" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于对民族资本家政策问题致东北局电","authors":[],"dates":[{"year":1949,"month":5}],"is_range_date":false,"parts":[{"text":"中央关于对民族资本家政策问题致东北局电","type":"title"},{"text":"最近邹大鹏有一封信给少奇同志说我们党在东北对私人资本主义及民族资产阶级的政策，虽然经过长期争论，至今未能正确解决。我们认为这个问题是关涉党的总路线中十分重要的问题，必须完全正确地迅速地解决……最近少奇同志到天津巡视，发现我们在天津的负责同志完全不理资本家，有些干部则认为和资本家接触就是立场不稳，贸易公司在原料及市场方面统制，不给资本家的生产以应有的照顾，税收机关对私人生产亦未给以应有的照顾，在劳资关系上工人有过高的要求和过左的行动，未用坚决的办法去纠正，强令资本家开工，但资本家在开工后的各种实际困难未帮助资本家去克服，在报纸上只说资本家坏，不说资本家还有任何好处，在党内思想上只强调私人资本主义的投机性捣乱性（具有这种性质的是无益于国计民生的私人资本，例如投机商业等不是一切私人资本都有投机性捣乱性），强调限制资本主义，而不强调一切有益于国计民生的私人资本主义生产在目前及今后一个长时期内的进步性，建设性与必需性，不强调利用私人资本主义的积极性来发展生产，只强调和资本家斗争，而不强调联合愿意和我们合作的资本家。结果就使资本家恐慌消极，陷于半瘫痪状态完全没有生产积极性，许多资本家就准备停工歇业或逃跑，这是一种实际上立即消灭资产阶级的倾向，实际工作中的左倾冒险主义的错误路线，和党的方针政策是在根本上相违反的。据说在东北城市工作中也有这种倾向，望东北局立即加以检讨并纠正。因为我们顾虑到在党内存在的上述偏向，故我们尚未批准印发《东北经济构成及经济建设方针提纲》这个文件，我们认为在这个文件中必须加以批驳上述偏向的一段文字之后，才好印发。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4585b8ad30"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
