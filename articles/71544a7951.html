rs":["毛泽东"],"dates":[{"year":1950,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"毛泽东给毛逸民的信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"逸民同志：","type":"appellation"},{"text":"一月三日来信收到，感谢你的好意，感谢你详细地将乡里情形告诉我。","type":"paragraph"},{"text":"乡里贫苦人民生活困难，烈士家属更加困难，暂时只好忍耐一点，待土地改革后就可能好一些了，那时人民政府也可能给人民以一些帮助，例如贷款等，人民就可以逐步改善自己的生活。","type":"paragraph"},{"text":"烈属的照顾是全国范围内的事，全国有几百万户烈属，都要照顾，自未便单独地特殊地照顾少数地方。但最困难的人民，当地人民政府在减租时土改时及青黄不接的岁月，应当尽可能给以照顾。","type":"paragraph"},{"text":"你在乡里做工作，很好，可以常常来信，告我以乡中情形。","type":"paragraph"},{"text":"请你替我问候乡里的同志们，希望大家努力和进步。","type":"paragraph"},{"text":"此复，顺祝","type":"paragraph"},{"text":"健康！","type":"appellation"},{"text":" 毛  泽  东一九五O年五月八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71544a7951"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
