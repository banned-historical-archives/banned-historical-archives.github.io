[{"year":1966,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席，祝您万寿无疆"},{"type":"paragraph","text":"维吾尔族　阿吾提麦合买提伟大的领袖毛主席，我们心中的红太阳。您的金子一样的光辉，照亮了塔里木——我的家乡。我以无限感激的心情，弹起热瓦甫把您歌唱。＊在您的英明领导下，实现了劳动人民的愿望。您那红色的书卷，把我们的心照亮。它是我们时代的指南针，为我们指出了前进的方向。沿着您领的路走，我们永不迷失方向。在您指引的康庄大道上，我们的成就无比辉煌。您那闪光的思想，把我们的头脑武装。我们要永远革命，支援世界劳动人民求解放！伟大祖国到处红旗飘扬，革命的歌声响遍四方。全国各族人民都热爱您，祝您万寿无疆。"},{"type":"paragraph","text":"＊热瓦甫，维吾尔族乐器"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e30ebb4766"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
