红色娘子军》，革命现代交响音乐《沙家浜》，以及《钢琴伴唱\u0026lt;红灯记\u0026gt;》等一批闪耀着毛泽东思想灿烂光辉的革命样板戏，七月一日起将在首都再度公演","authors":[],"dates":[{"year":1969,"month":6,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十七日电　在全国人民高举党的“九大”的团结旗帜，满怀革命豪情夺取新的更大胜利的大好形势下，闪耀着毛泽东思想灿烂光辉的一批革命样板戏，七月一日起将在首都再度公演。"},{"type":"paragraph","text":"这次公演的革命样板戏，有革命现代京剧《红灯记》、《沙家浜》，革命现代芭蕾舞剧《红色娘子军》，革命现代交响音乐《沙家浜》，以及《钢琴伴唱\u0026lt;红灯记\u0026gt;》。这批革命样板戏是无产阶级革命文艺战士在毛主席无产阶级革命文艺路线指引下，同叛徒、内奸、工贼刘少奇一伙艰苦斗争得来的胜利果实，是无产阶级文化大革命的胜利果实，受到了国内广大革命群众的热烈欢迎，而且受到了世界革命人民的赞扬。看过这些样板戏的工农兵群众激动地说，革命样板戏是我们无产阶级的文艺，我们一心爱护它，全力支持它，坚决保卫它，要让革命样板戏永远放射出毛泽东思想的灿烂光辉。"},{"type":"paragraph","text":"为了迎接这次演出，革命文艺工作者联系文艺界和本单位阶级斗争的实际，认真学习文艺战线上两条路线斗争的历史，以毛主席《在延安文艺座谈会上的讲话》等光辉著作为强大思想武器，对反革命修正主义文艺路线进行了深入持久的革命大批判，不断地提高了自己的阶级斗争和两条路线斗争觉悟。中国京剧团、北京京剧团、中国舞剧团和中央乐团的广大革命文艺战士，在驻团工人、解放军毛泽东思想宣传队和剧团革委会的领导下，怀着对伟大领袖毛主席无限热爱、无限忠诚的深厚无产阶级感情，积极排好、演好革命样板戏。他们表示，决心永远为捍卫毛主席无产阶级革命文艺路线而战斗。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"116b177dbf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
