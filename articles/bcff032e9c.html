":[{"year":1991,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东选集》第二版"},{"type":"paragraph","text":"订数已达７００万套"},{"type":"paragraph","text":"新华社北京７月４日电  《毛泽东选集》第二版的出版发行在全国引起热烈反响，到目前为止，各地总订数已达７００万套。"},{"type":"paragraph","text":"《毛泽东选集》的修订和再版，是全国人民政治生活中的一件大事，各地新华书店对此十分重视，他们在有关部门配合下，积极作好宣传、征订工作。山东、湖南、四川等省，订数都超过７０万套。"},{"type":"paragraph","text":"《毛选》自７月１日同读者见面后，销售情况也很好。据北京王府井新华书店介绍，这次的《毛选》第二版，印制质量高，分为精装、平装、普及本三种版本，适应了不同层次读者的需要。这家书店设了专台销售《毛选》，几天内共售出８００余套。据观察，个人前来购买《毛选》的，以干部、青年学生和解放军指战员居多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcff032e9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
