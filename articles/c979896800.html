art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"北京部队步校编写出毛泽东军事思想通俗课本","authors":["孙立学/侯作田"],"parts":[{"type":"paragraph","text":"本报讯 北京部队步校编写出适合对基层指挥员教学使用的毛泽东军事思想通俗课本，帮助学员更好地学习毛泽东军事思想。"},{"type":"paragraph","text":"长期以来，部队学习毛泽东军事思想课，自学的辅导材料不适应基层指挥员的需要。这个学校从去年下半年开始，组织军事理论教员到本校各种不同类型的学员队，广泛地听取学员意见。同时，走访了十多所军事院校，搜集大量资料。经过半年多的努力，现在已完成毛泽东军事思想课讲授提纲初稿，约五万字，共分六课：马克思列宁主义的战争观，人民战争，人民军队，关于战争规律，人民战争的战略战术，学习毛泽东同志研究和指导战争的立场、观点、方法。经过反复试讲，学员们反映很好。"},{"type":"paragraph","text":"（孙立学、侯作田）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c979896800"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
