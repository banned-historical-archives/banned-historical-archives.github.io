al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"中共中央通告第十三号一关于“五一”“五四”“五五”“五七”之纪念与宣传","alias":"","parts":[{"type":"paragraph","text":"中共中央通告第十三号一关于“五一”“五四”“五五”"},{"type":"paragraph","text":"“五七”之纪念与宣传"},{"type":"paragraph","text":"（1924年4月19日）同志们！"},{"type":"paragraph","text":"“五一”“五四”“五五”“五七”纪念日都快到了，在此四日中，我们都须有相当的活动与宣传。"},{"type":"paragraph","text":"中国工人阶级正在严重的压迫之下，今年的“五一”，除广州外，当然没有大规模的示威运动之可能，同志们应在可能的范围之内，召集工人（以工人为限）讲演会，讲演“五一”的历史及中国民\"革命与集会结社之自由的关系。在广州的工人集会中，应解工人组织集中与统一的必要，痛驳安那其派独立分权之谬误；应解释工人参加政治运动的必要，痛驳安那其派“只要面包不要政治”之谬误；但同时须说明政治运动非猎官运动。"},{"type":"paragraph","text":"“五四”纪念当然以学生为中心，同志们演说词中，须发挥五四运动两个重要的意义：（一）恢复国权运动；（二）新文化运动。此时国外列强之压迫，国内旧思想之反攻，都日甚一日，因此，五四运动之精神仍有发挥之必要。"},{"type":"paragraph","text":"[1]此处原文如此，似缺一“族”字。"},{"type":"paragraph","text":"“五五”纪念恐不能成为社会的运动，然亦应集合C.P.及S.Y.同志（如不便全体集合，C与S分别集合亦可），开一纪念会，由同志中在理论上素有研究者讲演。"},{"type":"paragraph","text":"“五七”纪念日，务努力联合工商学生做大规模的示威运动。口号是：不但否认二十一条及收回旅\"，并要援照中俄协定，取消各国的租界、租借地、兵营、领事裁判权、庚子赔款，及废弃不平等的条约，改定平定的条约与关税。"},{"type":"paragraph","text":"各地同志活动的结果，望总来一报告。"},{"type":"paragraph","text":"委员长T.S.Chen3"},{"type":"paragraph","text":"秘书T.T.Mao4[1]此处原文如此，似缺一“大”字。[2]“改定平定”似应为“改订平等”。[3]签名是陈独秀。[④]签名是毛泽东。"}],"authors":["毛泽东"],"dates":[{"year":1924,"month":4,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":92,"page_end":93},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46e4a6e75d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
