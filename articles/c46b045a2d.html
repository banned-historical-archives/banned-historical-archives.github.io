<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要重视意识形态领域的阶级斗争读者来信要求抵制奇装异服等资产阶级歪风邪气，进一步发扬社会主义新风尚","authors":["杨文"],"dates":[{"year":1973,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"目前正是服装换季时节，社会上奇装异服和在业余摄影中拍摄低级庸俗照片，以丑为美的现象，又有所抬头。在服装式样方面，上装又长又阔又大，裤子又短又包又小；女式两用衫，配上大得出奇的大尖领、大贴袋和大钮扣；有的妇女用透明的稀薄浅色尼龙、涤纶做衬衫，男青年则用大格子府绸做衬衫。在业余摄影方面，有的人模仿资产阶级的发型、服饰和生活方式，拍摄庸俗和低级的照片。"},{"type":"paragraph","text":"无产阶级文化大革命以来，通过思想和政治路线方面的教育，群众的觉悟不断提高，社会风气越来越好，这是主流。穿着奇装异服、拍摄低级庸俗照片的人，仅仅是少数。但是，这些人招摇过市，影响很坏。这决不是什么“生活小事”，而是意识形态领域里阶级斗争的反映，是两种世界观、两种审美观斗争的反映。我们任何时候都不能放松阶级斗争这根弦，要注意抓意识形态领域里的阶级斗争。伟大领袖毛主席教导我们:“我国社会主义和资本主义之间在意识形态方面的谁胜谁负的斗争，还需要一个相当长的时间才能解决。”在社会主义这个历史阶段中，还存在着阶级、阶级矛盾和阶级斗争，意识形态领域的阶级斗争，也必然长期存在。我们对意识形态领域里阶级斗争的长期性，曲折性，要有充分的认识，要树立长期作战的思想，不要以为过去抓过几次已经“差不多”了，要象搞卫生大扫除那样，每年都要扫它几次。"},{"type":"paragraph","text":"我们建议工交、财贸、文教和地区等各条战线，在批修整风运动中，要结合思想和政治路线方面的教育，多做宣传工作，发动和依靠群众抵制资产阶级歪风邪气。要从政治上关心青年的业余生活，对少数穿着奇装异服或拍摄低级庸俗照片的人，要注意坚持正面教育，做深入细致的政治思想工作。建议地区、商业、工商行政管理部门要加强对服装业个体户的检查管理，教育他们不做奇装异服。商业职工不但要以身作则，自己不穿奇装异服，不拍低级庸俗照片，而且还要积极做好宣传工作，坚持把好“剪刀关”、“照相关”，为进一步发扬社会主义新风尚作出贡献。作为商业部门，既要抵制奇装异服，又要发扬为劳动人民服务的经营特色，设计一些朴素、明朗、大方的服装新式样，不断提高服务质量。"},{"type":"paragraph","text":"读者　杨文"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c46b045a2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
