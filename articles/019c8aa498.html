倒卖牲畜的现象","authors":["师海云"],"dates":[{"year":1954,"month":11,"day":20}],"is_range_date":false,"parts":[{"text":"内蒙古互助合作运动中部分旗县农民有倒卖牲畜的现象","type":"title"},{"text":"师海云","type":"authors"},{"text":"【内蒙古分社20日讯】内蒙古自治区平地泉、河套两个行政区部分旗县有些农民由于对党的互助合作政策不了解，不少户将大牲畜卖掉换为小牲畜。丰镇二区三义泉乡中农郑来云等三人，怕入社牲畜作价归公吃亏，将三头大牛换回三头小牛；凉城四区六圪堵乡10月间在一个物资交流会上就卖掉51头牲畜，人民代表廉忠贵1头骡子卖了300万元，只用70万元买回1头小牛。有的农民将卖了牲口的钱也吃喝浪费掉了。（师海云根据平地泉、河套报告材料编写）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年11月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"019c8aa498"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
