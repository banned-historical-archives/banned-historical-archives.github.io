art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"敢顶逆风的先锋战士","authors":[],"parts":[{"type":"paragraph","text":"北京大学哲学系党总支副书记张光明同志，是“七·二七”进驻清华大学的老工宣队员，一九六九年来到北大哲学系。他八年如一日，坚持以阶级斗争为纲，牢记党的基本路线，为占领和改造教育阵地，实现无产阶级对资产阶级的全面专政，同资产阶级、特别是同党内资产阶级进行了坚决的斗争。他的斗争精神，受到了全校师生员工的赞扬。"},{"type":"paragraph","text":"去年夏季前后，党内最大的不肯改悔的走资派邓小平抛出“三项指示为纲”，带头刮起右倾翻案风。一时间奇谈怪论满天飞，叫嚷什么这也不好，那也不行，“就是要扭”；鼓吹学校要由“热心科学的外行来领导”。听到这些胡说八道，张光明同志憋了一肚子气。他把系里的工宣队员召集在一起，认真学习毛主席关于阶级斗争和路线斗争的论述，辨别风向，统一认识。他对同志们说：“不管是谁，只要他反对毛主席，反对毛泽东思想，我们就要顶，就要斗，就要批判。”他和吕增禄同志把大家的想法向学校党委作了汇报，党委给他们很大的支持，更增添了他们斗争的勇气和胜利的信心。"},{"type":"paragraph","text":"就在这个时候，有人在教室、厕所，甚至在系革委会办公室的墙壁上写标语、画漫画，对张光明同志进行人身攻击。张光明同志清楚地知道，资产阶级的谩骂，决不是对他个人的，而是为了取消工人阶级对学校的领导。面对这些见不得人的流氓手段，张光明同志不畏惧，不退缩，更加坚定地进行战斗。"},{"type":"paragraph","text":"和党内走资派斗争，单靠几个人是不行的，要把广大群众发动起来。在右倾翻案风甚嚣尘上的时候，张光明同志深入到群众中间，教育师生辨风向，顶逆流。他经常和同志们谈心，热情支持群众反潮流的革命精神。他还利用小组会、干部会、团员会、教员会等各种方式，大讲阶级斗争，大摆大好形势，揭穿那些奇谈怪论，提高了广大师生的识别能力，增强了同右倾翻案风对着干的决心。"},{"type":"paragraph","text":"毛主席发出反击右倾翻案风的伟大号令后，张光明同志更加朝气蓬勃地投入了战斗。几个月来，在学校党委和系党总支的领导下，他认真学习毛主席的重要指示，在批判邓小平反革命的修正主义路线、反击右倾翻案风的斗争中，勇猛冲杀，发挥作用，经受锻炼。（本报通讯员）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"反潮流","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72567c4e51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
