":[{"year":1963,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京16日电】　印度尼西亚共产党中央委员会主席艾地同志和由他率领的印度尼西亚共产党代表团，结束了对朝鲜民主主义人民共和国的访问，在朝鲜劳动党中央国际部副部长朴旺燮陪同下，今天上午乘专车到达北京。"},{"type":"paragraph","text":"到车站迎接的，有中共中央总书记邓小平，中共中央政治局候补委员、中央书记处书记康生，中共中央委员刘宁一，中共中央机关负责工作人员张上明、赵安博等。"},{"type":"paragraph","text":"中共辽宁省委副秘书长孙峰陪同艾地同志由沈阳到达北京。"},{"type":"paragraph","text":"朝鲜驻中国大使馆临时代办李在成、印度尼西亚驻中国大使馆临时代办法达宛也到车站迎接。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b872ed0f9d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
