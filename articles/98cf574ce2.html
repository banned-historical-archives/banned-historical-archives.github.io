滨师范学院","郭宏韬"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——还我自由","type":"title"},{"text":"哈尔滨师范学院郭宏韬","type":"authors"},{"text":"（郭宏韬：哈尔滨师范学院中文系一、六班学生）","type":"subtitle"},{"text":"朋友们，请你们想一想，如果现在没有自由，被谁剥夺去了？前人曾脱光了臂膀，捏紧拳头，冲向水龙、皮鞭和刺刀，夺得了这一自由，然而今天又为什么丧失了这自由？","type":"paragraph"},{"text":"要学文学，学了医；要学工，进了师范，多少青年在为祖国前提的帽子不含着眼泪，为着剥削了自己的自由——理想。","type":"paragraph"},{"text":"给我们自由吧！不要用我们曾所用过的方法去夺取自由。","type":"paragraph"},{"text":" 来源：《鸣放言论（三）》（哈尔滨：“学习生活”编辑室编，1957年7月10日）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98cf574ce2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
