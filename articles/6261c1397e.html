rs":["兰州大学","吴文翰","屈健英","田昌文","马章福"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——“百家争鸣是党的阴谋”","type":"title"},{"text":"兰州大学马章福吴文翰屈健英田昌文","type":"authors"},{"text":"“百家争鸣是党的阴谋。","type":"paragraph"},{"text":"大鸣大放是放虎打虎，鸣放是我们(知识分子)闹事的时候，工农是无知的。” (兰州大学  马章福)","type":"paragraph"},{"text":"“‘百花齐放、百家争鸣’的方针，对中国法学界具有‘招魂’的重大作用。因为中国法学界老的一辈被一棍子打死了，新的一辈被教条主义迷了窍，要‘招魂’。”(兰州大学  吴文翰)","type":"paragraph"},{"text":"“‘群氓’（指人民群众——原编者注）没有自己的主张，只有一个‘先知者’出现，他们就会跟着这位‘先知者’走，若有另一个‘先知者’出世，‘群氓’就会放弃前者，而跟上后者。”（兰州大学  屈健英）","type":"paragraph"},{"text":"“文艺作品是公式化的，概念化的，就由于我们的生活是公式化的、概念化的。支配生活的是人，写文艺作品的也是人，因而作品就不能不是公式的，概念化的。”","type":"paragraph"},{"text":"“文艺创作没有阶级性。","type":"paragraph"},{"text":"毛主席的讲话中提到政治标准第一，是导致公式化、概念化的源泉。”(兰州大学  肖藩)","type":"paragraph"},{"text":"“只要对得起良心，我就不去考虑什么立场问题。”（兰州大学  马启凯）","type":"paragraph"},{"text":"“对苏联学习我是怀疑的，过去亲美，现在亲苏，学习苏联只是学习一套统治人民的方法。”（兰州大学　田昌文）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6261c1397e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
