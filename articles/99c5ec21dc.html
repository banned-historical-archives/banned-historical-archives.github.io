script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美吴迫害和资方残酷剥削西贡一纺织厂工人罢工斗争胜利","authors":[],"dates":[{"year":1962,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社河内27日电】　西贡消息:西贡威美德斯纺织厂的八百名工人最近举行罢工，反对吴庭艳集团武力镇压工人和资方无理解雇工人的行为，这次罢工斗争已经取得了胜利。"},{"type":"paragraph","text":"与此同时，禄宇橡胶园的三千名工人和边和省平隆橡胶园的一万多名工人，以及美萩市的面包工人等也正在展开斗争，反对吴庭艳集团的迫害政策，要求保证工作、生活和自由的民主权利。"},{"type":"paragraph","text":"威美德斯纺织厂是吴庭艳家族与美国垄断资本合股经营的一家纺织厂。据西贡报纸报道，这家工厂的全体工人曾要求资方修改劳动制度。资方不但没有接受工人的要求，反而在2月17日解雇了五十九名工人，接着又把一百名工人开除出厂。"},{"type":"paragraph","text":"这次大规模的解雇是在吴庭艳集团派出军警镇压工人无效后而采取的迫害手段。2月10日，吴庭艳集团曾派出实枪荷弹的警察到工厂抓走九十名工人，只是由于工人的坚决斗争，吴庭艳集团才被迫释放了被捕者。但到2月16日，吴庭艳集团的军警又到工厂逮捕四名工人，并开枪威胁要求释放这四名被捕者的工人。工人们英勇地对付了军警的迫害，并把四名被捕工友从军警手中抢了回来。第二天，全厂工人举行了反迫害罢工。这一天，吴庭艳当局又派出成百名军警前来镇压，逮捕了许多人。"},{"type":"paragraph","text":"但是，吴庭艳集团的疯狂镇压并未能使这家纺织厂的工人屈服。工人们在西堤其他工厂工人的积极支持下，展开更加激烈的斗争。纺织厂资方终于被迫在2月21日宣布取消开除一百名工人的决定，并且保证将继续解决在2月17日被无理解雇的五十九名工人的工作。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99c5ec21dc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
