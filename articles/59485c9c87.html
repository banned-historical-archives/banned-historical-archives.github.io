ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"关于平汉战役后的行动问题致刘伯承、邓小平电","alias":"","parts":[{"type":"paragraph","text":"关于平汉战役后的行动问题！"},{"type":"paragraph","text":"致刘伯承、邓小平电"},{"type":"paragraph","text":"（1945年11月11日）刘、邓："},{"type":"paragraph","text":"蒋介石召各战区长官、副长官、总司令于八日飞重庆开会，内容闻系剿共第一，因此反共战争更严重存在，平汉必会继续进攻。但因我邯郸战役大捷，继续北犯须时准备可能要一个月。我应利用时间，抓紧整编两个新的主力纵队，代替杨得志、陈赓两纵队。在不妨碍部队整编训练，不妨碍对付第二次平汉大进攻时迅速集中兵力之情况下，尽可能拔除根据地内的反动据点，如太行之沁县、浮山县城，冀鲁豫区之郓城、巨野、金乡、聊城，冀南永年、肥乡、武城，以及扩展同蒲南段解放区加强控制赵城等。请作通盘计算，目的在创造更大更好的战场，以利今后之作战。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十一月十一日"},{"type":"paragraph","text":"[1]这是1945年11月11日毛泽东为中央军委起草的关于平汉战役后的行动问题给刘伯承、邓小平的电报。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":86,"page_end":86},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59485c9c87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
