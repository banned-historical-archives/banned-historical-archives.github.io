ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对薄一波来信的批语","alias":"","parts":[{"type":"paragraph","text":"对薄一波“来信的批语"},{"type":"paragraph","text":"（1966年8月21日）印发常委、文革小组及薄一波同志。"},{"type":"paragraph","text":"请一波同志将一个请求和一个设想，先用书面告我，然后谈话，可以缩短谈的时间。你是一个爱讲长话的人，我有点害怕听三四小时那样的长话。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十一日夜"},{"type":"paragraph","text":"[1]薄一波，当时任中共中央政治局候补委员、国务院副总理。“文化大革命”中受到迫害。1978年12月，中共十一届三中全会审查和纠正了过去对他的错误结论，肯定了他对党和人民的贡献，使他得到了平反昭雪。"},{"type":"paragraph","text":"[2]这个批语写在薄一波1966年8月21日给毛泽东的信上。信中说：“8月18日天安门上主席跟我握手并亲切勉励要我好好革命时，我深受感动。”“最近主席如果有时间，希望找我谈一次。我想主要谈两个问题：（一）工交各部当前文化大革命的主要情况；同时检查我在运动中所犯的错误；及我的一个请求。（二）我对改革工业体制的一个设想。”"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":520,"page_end":520},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f146929cf1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
