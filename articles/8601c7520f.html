tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高雄码头工人抗议蒋匪残酷剥削","authors":[],"parts":[{"type":"paragraph","text":"在蒋匪帮残酷的压迫和剥削下，台湾高雄港码头工人，一天要干二十个小时的笨重劳动，从上午八时直干到第二天凌晨四时。码头工人劳动时间这样长，而所得的工资非常少，连维持一个人的生活都不够，根本谈不上养家。他们为了养家活口，只好利用吃饭的休息时间，加班加点劳动，以求得到一点所谓“连工津贴”。可是蒋匪帮为了加紧剥削工人，最近竟把“连工津贴”伪币三十元减为十元。这激起了码头工人的极大愤慨，他们从八月十六日起全体举行怠工，强烈抗议蒋匪帮的残酷剥削。过去拖车司机一天拖车十趟，怠工后只拖三、四趟。装卸工人以前每四小时装罐头五千箱，怠工后降低到七百箱。整个港口装卸效率大大下降，只达到以前的三分之一，使港口几乎瘫痪。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8601c7520f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
