script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"缅共中央电贺我成功发射人造卫星用毛泽东思想武装起来的人民无往不胜","authors":[],"dates":[{"year":1970,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十八日电　中国共产党中央委员会收到了缅甸共产党中央委员会发来的电报。电报热烈祝贺中国胜利地发射第一颗人造地球卫星。电报全文如下:"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"同志们:"},{"type":"paragraph","text":"我们以极其兴奋的心情，获悉中华人民共和国于一九七○年四月二十四日胜利地发射了第一颗人造地球卫星的喜讯。"},{"type":"paragraph","text":"这个胜利，是对美帝国主义和苏联社会帝国主义的沉重打击。它强有力地制止了这些帝国主义进行核战争威胁、重新瓜分和统治世界的步伐，又一次打破了它们对核武器和火箭的垄断。"},{"type":"paragraph","text":"这个胜利，将大大地鼓舞正在进行反对美帝国主义和苏联社会帝国主义斗争的世界被压迫人民。"},{"type":"paragraph","text":"这个胜利，再一次以实际行动表明，用伟大的毛泽东思想武装起来的人民，没有办不到的事情。"},{"type":"paragraph","text":"我们谨通过你们，向夺取这一胜利的、用伟大的毛泽东思想武装起来的中国科学工作者、工程技术人员、工人和民兵，表示热烈的祝贺。同时，我们也通过你们，向站在世界各国的前列同美帝国主义和苏联社会帝国主义进行斗争的伟大的中国人民，表示热烈的祝贺。"},{"type":"paragraph","text":"我们祝愿，社会主义中国为反对帝国主义和社会帝国主义核战争而进行的核武器试验、核武器生产和火箭试验，不断取得成就。"},{"type":"paragraph","text":"当代的马克思列宁主义——伟大的毛泽东思想万岁!"},{"type":"paragraph","text":"毛主席万岁!万岁!万万岁!"},{"type":"paragraph","text":"缅甸共产党中央委员会"},{"type":"paragraph","text":"一九七○年四月二十七日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7814b5ae33"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
