ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"有困难，有办法，有希望","alias":"","parts":[{"type":"paragraph","text":"有困难，有办法，有希望"},{"type":"paragraph","text":"（1949年12月2日）"},{"type":"paragraph","text":"国家的预算是一个重大的问题，里面反映着整个国家的政策，因为它规定政府活动的范围和方向。举例说，概算草案中关于养活所有旧军队和旧公教人员的问题，这就是政策问题。人民政府在这个问题上应该采取负责的态度，只有这样才是对人民有利的。"},{"type":"paragraph","text":"我们的情况概括地说来就是：有困难的，有办法的，有希望的。我们的财政情况是有困难的，我们必须要向人民说明我们的困难所在，不要隐瞒这种困难。但是我们同时也必须向人民说明，我们确实有办法克服困难。我们既然有办法克服困难，我们的事业就是有希望的，我们的前途是光明的。我们的情况会一年比一年好起来，估计明年要比今年好。在三年五年的时间内，我们的经济事业可以完全恢复；在十年八年的时间内，我们的经济就可以得到巨大的发展。"},{"type":"paragraph","text":"[1]这是毛泽东在中央人民政府委员会第四次会议上讲话的要点。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":70,"page_end":70},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"有困难，有办法，有希望","description":"根据一九四九年十二月四日《人民日报》刊印。","dates":[{"year":1949,"month":12,"day":2}],"parts":[{"text":"有困难，有办法，有希望","type":"title"},{"type":"paragraph","text":"国家的预算是一个重大的问题，里面反映着整个国家的政策，因为它规定政府活动的范围和方向。举例说，概算草案中关于养活所有旧军队和旧公教人员的问题，这就是政策问题。人民政府在这个问题上应该采取负责的态度，只有这样才是对人民有利的。"},{"type":"paragraph","text":"我们的情况概括地说来就是：有困难的，有办法的，有希望的。我们的财政情况是有困难的，我们必须要向人民说明我们的困难所在，不要隐瞒这种困难。但是我们同时也必须向人民说明，我们确实有办法克服困难。我们既然有办法克服困难，我们的事业就是有希望的，我们的前途是光明的。我们的情况会一年比一年好起来，估计明年要比今年好。在三年五年的时间内，我们的经济事业可以完全恢复；在十年八年的时间内，我们的经济就可以得到巨大的发展。"}],"comment_pivots":[{"part_idx":0,"offset":11,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东在中央人民政府委员会第四次会议上讲话的要点。"],"page_start":38,"page_end":38,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c717b53077"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallbac
