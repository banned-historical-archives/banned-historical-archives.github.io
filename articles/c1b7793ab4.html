ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在抗大检查工作总结大会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在抗大检查工作总结大会上的讲话！"},{"type":"paragraph","text":"（1939年4月8日）"},{"type":"paragraph","text":"现在日本宣言要建立“东亚新秩序”，就是要在亚洲东部建立新的国际关系一一独霸东亚，以代替旧的国际关系一一门户开放。有些人说日本已经没有力量向中国进攻了，这是不正确的。在目前敌人停顿期间，速胜论又在发展起来。有些人以为这场战争很快会结束，不需要长期合作了，所以又跟共产党多搞磨擦，这对夺取抗战胜利是不利的。必须认清中国现在还处在劣势地位，日本还要继续进攻我们，抗战是长期的，长期抗战需要长期合作。我们全国大多数人民的抗战到底的“底”是在鸭绿江。抗大要有坚定的政治方针，艰苦的工作作风，灵活的战略战术。"},{"type":"paragraph","text":"[1]这是毛泽东在抗大检查工作总结大会上作时事报告时讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":4,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":276},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1b7793ab4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
