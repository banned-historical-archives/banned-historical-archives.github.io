rs":["邓小平"],"dates":[{"year":1962,"month":3}],"is_range_date":false,"parts":[{"text":"邓小平在西楼会议上的发言","type":"title"},{"text":"邓小平","type":"authors"},{"text":"（一九六二年三月，摘录）","type":"subtitle"},{"text":"谈到如何控制劳动工资和亏损企业时，邓平说：“财政、银行要卡死，不要怕工人打扁担，厂长打跑了，免得我们撤换。这样严格了，就可以逼他们搞经济核算。现在要恢复象1953年以前那样的制度。”","type":"paragraph"},{"text":"×  ×  ×  ×","type":"paragraph"},{"text":"办法要得用，要少。如高级品。总之不能多，要搞真正捞到东西的。点子太多，作用不大。延期付款的买卖不能多做，否则积在一起，转不过来。办法有三条：","type":"paragraph"},{"text":"1.根本办法在于减人。主要表现在建设速度放慢。这不会得罪人，无非是对外名誉不好。","type":"paragraph"},{"text":"2.真正抓点生活用品，回笼票子。","type":"paragraph"},{"text":"3.制度搞严，漏洞堵死，措施要落实，能顶多少是多少。保经济作物，少而精，拿点粮食，烟叶。","type":"paragraph"},{"text":"×  ×  ×  ×","type":"paragraph"},{"text":"现在要恢复到1954年那样，管得死死的，搞一段再说。","type":"paragraph"},{"text":"几个办法：","type":"paragraph"},{"text":"1.节约一切能节约的资金，但钱不一定很多，可以变风气。","type":"paragraph"},{"text":"2.农村投放，过去剥削农民多（了），这几年是否给农民多了。提价赔退都过分了，再加上集市贸易更多了。","type":"paragraph"},{"text":"3.基本建设和生产的关系。可否两三年内基本停止基建，只有两种：（1）维持再生产；（2）保护工程。只搞这两项，连国防也可考虑停下来。把市场转过来，再来搞。","type":"paragraph"},{"text":"煤炭、矿山、森林、有色金属缺门不能停。","type":"paragraph"},{"text":"生产，首先搞零配件，拖拉机应该首先要搞零配件。主要搞生活资料。","type":"paragraph"},{"text":"×  ×  ×  ×","type":"paragraph"},{"text":"有人谈到财政、银行、农业正在搞制度时，邓小平插话说“一百条不要多花精力（指商业100条），要搞经营管理制度，写几条，什么难办，什么不难办，不要写得很多。财政、银行也是如此。”","type":"paragraph"},{"text":"有人谈到准备明年（63年）调整物价调整工资时，邓小平插话说“可以考虑，生产多一点，物价提50%，工资提50％，但关键在工业品。”","type":"paragraph"},{"text":"刘少奇谈到基建除了某些必要的外都停止时，邓小平插话说“国防基建，也要紧缩一下”。","type":"paragraph"}],"comments":[],"origin":"《反革命修正主义分子邓小平反动言论》（北京大学文化革命委员会资料组，一九六七年十月）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平在西楼会议上的发言","authors":["邓小平"],"dates":[{"year":1962,"month":3}],"is_range_date":false,"parts":[{"text":"邓小平在西楼会议上的发言","type":"titl
