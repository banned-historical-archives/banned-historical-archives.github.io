定","authors":[],"dates":[{"year":1961,"month":5,"day":2}],"is_range_date":false,"parts":[{"text":"中共沿河县委监委对田茂远所犯错误的处分决定","type":"title"},{"text":"田茂远，男，现年27岁，汉族，家庭贫农成分，个人学生出身，城关公社复兴管理区人，1953年参加工作，1958年入党，历任总支付书记、乡干等职，现任幸福坡分支部书记。其错误事实如下：","type":"paragraph"},{"text":"1，60年正月初四晚上，小土地出租田贵高，因宰杀耕牛一只，被田茂远知道以后，立即召开群众会斗争，斗争中他亲手将其衣服、裤子刮光，然后再进行绑吊打，连续打了二个多小时，当即把田贵高打得鼻口出血，放下后已不省人事，打后田贵高扣饭二天，第三天初七就死了。其爱人崔廷香为此也被毒打一顿。","type":"paragraph"},{"text":"2，60年初因病不出工和小偷小摸行为而被他吊打的社员有冉翠弟、张桂芝","type":"paragraph"},{"text":"根据以上错误事实，经研究决定，党内给予警告处分。","type":"paragraph"},{"text":" 中共沿河县委监察委员会1961年5月2日","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e416b7d94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
