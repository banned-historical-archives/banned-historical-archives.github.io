s":[{"year":1966,"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们得到了最最心爱的《毛泽东选集》"},{"type":"paragraph","text":"今天，我们领到了最最心爱的《毛泽东选集》！我们大家的高兴劲就甭提有多高了！我们心里的千言万语，迸发成了一句：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"今天，我们激动地含着热泪接过的是金光闪闪的真理，是无往而不胜的思想武器，是我们前进的方向盘，是我们生存的食粮！我们再也无法表达我们激动的心情，因为这是我们一生最大的喜事，是我们最幸福的时刻！从早到晚，我们全院师生都激动着，欢呼着，庆贺我们领到了战无不胜的思想武器！"},{"type":"paragraph","text":"我们要用毛泽东思想的光辉，把一切黑帮分子、牛鬼蛇神的原形统统照出来，把他们彻底斗倒、斗垮、斗臭！彻底完成“一斗，二批，三改”的任务，誓将无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"让一切牛鬼蛇神发抖吧！我们革命人民将永远高举金光闪闪的《毛泽东选集》前进！毛泽东思想的光辉要普照世界大地！"},{"type":"paragraph","text":"北京工业学院六二六二一班"},{"type":"paragraph","text":"吉万寿　八月十二日夜"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ced3a77f08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
