s":[],"dates":[{"year":1979,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湖南强调保持政策的严肃性稳定性"},{"type":"paragraph","text":"批判极左  兑现政策  取信于民"},{"type":"paragraph","text":"据新华社长沙九月十六日电  在最近召开的全省农田基本建设会议上，中共湖南省委强调当前要注意保持农村经济政策的严肃性和稳定性，要求各地继续批判极左路线，抓好政策兑现工作，以免翻来覆去，失信于民，挫伤群众的积极性。"},{"type":"paragraph","text":"今春以来，湖南农村贯彻中央两个农业文件，普遍实行了定额管理，建立了各种形式的生产责任制，出现了五业兴旺的景象。今年，全省油菜籽比去年增产四成，早稻获得了丰收，旱粮、中稻和晚稻也长得好，棉花、麻类、甘蔗、茶叶、烤烟、湘莲、蚕茧等都有增产的趋势。家畜、家禽和水产品增产，购销两旺。荒山造林面积比去年多一百五十万亩。干部、群众称道党的十一届三中全会制定的政策好。但是，在夏收预分时，少数地方出现政策不兑现的现象。有的怀疑春天制订的管理办法是不是对头，有的看到生产发展后一部分社员的报酬多了，认为不合理，随意扣减。省委认为，这些情况虽然出现在少数地方，但很容易挫伤群众的积极性。因此，当前农村的一项重要工作是使政策取信于民，一是要稳定，二是要兑现。并明确规定：各地在贯彻执行中央两个农业文件时，从本地实际情况出发规定的各种生产责任制和其它经营管理办法、措施，要坚持下去，不要随意变动。如果有些规定已被实践证明确实是不完善的，也应该积极引导群众进行总结，等下一年再把不合理的地方改过来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6c54ec229"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
