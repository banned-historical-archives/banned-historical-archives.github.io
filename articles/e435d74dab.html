script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席林副主席周总理致电霍查谢胡同志衷心感谢对我全国成立革委会的热烈祝贺","authors":[],"dates":[{"year":1968,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席林副主席周总理致电霍查谢胡同志衷心感谢对我全国成立革委会的热烈祝贺"},{"type":"paragraph","text":"坚决支持阿尔巴尼亚人民共和国和兄弟的阿尔巴尼亚人民退出华沙条约的革命行动，坚决支持东欧各国人民反对苏修控制的华沙条约的正义斗争，坚决支持西欧和世界各国人民反对美帝控制的北大西洋公约以及其他侵略性条约组织的正义斗争，坚决支持全世界一切受美帝、苏修侵略、控制、奴役和威胁的各国人民的革命斗争。在无产阶级文化大革命中锻炼得更加坚强的七亿中国人民，在任何时候、任何情况下，都将始终如一地站在兄弟的阿尔巴尼亚人民一边。如果美帝国主义、苏联现代修正主义及其走狗胆敢动阿尔巴尼亚一根毫毛，等着他们的只能是彻底的、可耻的、无可挽回的失败。"},{"type":"paragraph","text":"新华社十八日讯　中国人民的伟大领袖、中国共产党中央委员会主席毛泽东同志和他的亲密战友、中国共产党中央委员会副主席林彪同志以及中华人民共和国国务院总理周恩来同志，十七日打电报给阿尔巴尼亚人民的伟大领袖、阿尔巴尼亚劳动党中央委员会第一书记恩维尔·霍查同志和阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志，对他们最热烈地祝贺我国除台湾省以外的二十九个省、市、自治区全部成立革命委员会，表示衷心的感谢和最大的敬意，并且坚决支持阿尔巴尼亚人民共和国和兄弟的阿尔巴尼亚人民退出华沙条约的革命行动。电报全文如下：地拉那阿尔巴尼亚劳动党中央委员会第一书记"},{"type":"paragraph","text":"恩维尔·霍查同志，阿尔巴尼亚人民共和国部长会议主席"},{"type":"paragraph","text":"穆罕默德·谢胡同志："},{"type":"paragraph","text":"在我国除台湾省以外的二十九个省、市、自治区全部成立革命委员会的时候，我们收到了你们热情洋溢的贺电，这是对正在夺取无产阶级文化大革命全面胜利的中国人民的巨大鼓舞和巨大支持。我们对你们表示衷心的感谢和最大的敬意。"},{"type":"paragraph","text":"英勇的阿尔巴尼亚人民，在伟大的马克思列宁主义者恩维尔·霍查同志为首的阿尔巴尼亚劳动党的英明领导下，正在开展一场具有深刻的社会主义革命意义的革命化运动，取得了一个又一个的伟大胜利。今年，恩维尔·霍查同志提出的教育革命和工人阶级监督，丰富了这个运动的内容，推动了这个运动的发展。我们最热烈地祝贺兄弟的阿尔巴尼亚人民，在革命化的道路上，取得越来越辉煌的胜利。这一胜利使阿尔巴尼亚这盏欧洲的伟大的社会主义的明灯，发射出更加灿烂的光芒。"},{"type":"paragraph","text":"前几天，阿尔巴尼亚人民共和国庄严地宣布退出华沙条约的决定和法令。这是对苏修叛徒集团的又一沉重打击，是对东欧各国人民反对苏修叛徒集团斗争的巨大鼓舞。华沙条约早已成为赫鲁晓夫修正主义集团推行大国沙文主义和民族利己主义、控制和掠夺东欧各国人民的工具，早已成为苏修叛徒集团用来同美帝国主义控制的北大西洋公约组织作交易、推行美苏合作主宰世界的工具。最近，苏修叛徒集团纠集波兰、东德、匈牙利和保加利亚修正主义伙伴，公然利用华沙条约的名义，武装侵略捷克斯洛伐克，对捷克斯洛伐克人民犯下了滔天的罪行。这就在全世界人民面前彻底暴露了这个条约的侵略性和反动性。捷克斯洛伐克修正主义集团，对侵略者采取了卖国投降的政策，可耻地背叛了捷克斯洛伐克人民。阿尔巴尼亚人民在其杰出的领袖恩维尔·霍查同志为首的阿尔巴尼亚劳动党的领导下，对苏修叛徒集团利用华沙条约从事的种种罪恶活动，久已进行了坚决的斗争。中国共产党和中国人民十分钦佩阿尔巴尼亚劳动党和阿尔巴尼亚人民在这一斗争中所表现的马克思列宁主义和无产阶级国际主义的高度原则性。"},{"type":"paragraph","text":"我们坚决支持阿尔巴尼亚人民共和国和兄弟的阿尔巴尼亚人民退出华沙条约的革命行动，坚决支持东欧各国人民反对苏修控制的华沙条约的正义斗争，坚决支持西欧和世界各国人民反对美帝控制的北大西洋公约以及其他侵略性条约组织的正义斗争，坚决支持全世界一切受美帝、苏修侵略、控制、奴役和威胁的各国人民的革命斗争。"},{"type":"paragraph","text":"中阿两国人民在革命的暴风雨中建立起来的伟大的无产阶级的战斗友谊，是经受得住严峻考验的。在无产阶级文化大革命中锻炼得更加坚强的七亿中国人民，在任何时候、任何情况下，都将始终如一地站在兄弟的阿尔巴尼亚人民一边。如果美帝国主义、苏联现代修正主义及其走狗胆敢动阿尔巴尼亚一根毫毛，等着他们的只能是彻底的、可耻的、无可挽回的失败。"},{"type":"paragraph","text":"亲爱的同志们，苏修、美帝狼狈为奸，做了这么多的坏事、丑事，全世界革命人民是不会饶过他们的。世界各国人民正在起来。一个反对美帝、苏修的历史新时期已经开始。让我们更高地举起马克思列宁主义的革命红旗，在反对以美帝为首的帝国主义、以苏修为首的现代修正主义和紧随美帝、苏修的各国反动派的伟大斗争中，携手前进吧！"},{"type":"paragraph","text":"伟大的、牢不可破的中阿两国人民的战斗友谊万岁！"},{"type":"paragraph","text":"英雄的阿尔巴尼亚人民万岁！"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中国共产党中央委员会副主席　林　彪"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九六八年九月十七日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e435d74dab"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
