rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东周恩来刘少奇朱德邓小平陈云论调查研究》出版发行","authors":[],"parts":[{"type":"paragraph","text":"新华社北京2月6日电 为了便于广大干部了解我们党调查研究的优良传统和作风，学习调查研究的理论和方法，中共中央文献研究室编辑的《毛泽东周恩来刘少奇朱德邓小平陈云论调查研究》一书，近日由中央文献出版社出版发行。"},{"type":"paragraph","text":"深入实际进行调查研究，坚持理论与实际相结合，由此制定和执行正确的路线方针政策，是我们党领导革命、建设、改革的基本经验和基本工作方法。毛泽东、周恩来、刘少奇、朱德、邓小平、陈云等老一辈革命家，曾经对调查研究问题发表过许多重要而精辟的论述，他们还经常深入基层亲自做社会调查，撰写了许多调查报告。他们调查研究的实践和成果，对于指导党和人民的事业沿着正确的道路发展，起了重要的作用。"},{"type":"paragraph","text":"《毛泽东周恩来刘少奇朱德邓小平陈云论调查研究》一书分为三部分：第一部分是毛泽东等老一辈革命家关于调查研究的论语摘编；第二部分是毛泽东等老一辈革命家关于调查研究的文辑；第三部分是上个世纪六十年代初毛泽东指派的三个调查组和刘少奇、周恩来、朱德、陈云、邓小平等撰写的调查报告。这些调查报告大都是第一次公开发表。此外，还附有两篇关于上个世纪五六十年代中央领导同志进行调查研究情况的综述。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"陈云","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a12216a7ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
