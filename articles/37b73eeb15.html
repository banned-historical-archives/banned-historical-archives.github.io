ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"致王震等电","alias":"","parts":[{"type":"paragraph","text":"致王震等电！"},{"type":"paragraph","text":"（1947年11月22日）"},{"type":"paragraph","text":"各电均悉。（一）攻运未克，打援又未全歼，指战员中引起一时情绪不好，是很自然的，但我军精神很好，一二次仗未打好并不要紧，只要你们虚心研究经验，许多胜仗就在后头，望将此意向指战员解释。（二）同意二、八两纵择地休整一时期，然后找阎锡山打几仗；然后两纵同出渭北，协同西北主力歼灭胡宗南，有力地配合陈、谢。（三）在你们休整及打阎期间，注意编组新的地方军，并带领一同训练与作战，几个月后代替八纵在普南的任务。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致王震、王新亭及彭德怀、张宗逊、徐向前、滕代远、薄一波、贺龙、习仲勋，并告陈、谢富治电的主要内容。"},{"type":"paragraph","text":"[2]运，指运城。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":11,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":407,"page_end":407},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37b73eeb15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
