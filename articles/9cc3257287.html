art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚定不移地支持新生的革命委员会 为巩固和加强无产阶级政权贡献力量天津驻军决心紧跟毛主席伟大战略部署，永远为人民立新功","authors":[],"parts":[{"type":"paragraph","text":"本报讯 驻天津陆海空三军指战员，热烈欢呼天津市革命委员会诞生，一致表示要更高地举起毛泽东思想伟大红旗，步步紧跟毛主席的伟大战略部署，坚定不移地支持新生的革命委员会，在保卫社会主义祖国和“三支”“两军”工作中立新功。"},{"type":"paragraph","text":"这两天，不论是在军营内外，还是在“三支”“两军”第一线，天津驻军广大指战员无不欢欣鼓舞。他们千遍万遍高呼：“毛主席万岁！万岁！万万岁！”一次又一次放声高唱《东方红》、《大海航行靠舵手》。他们说，天津市革命委员会的建立，彻底粉碎了中国赫鲁晓夫妄图把天津变成复辟资本主义黑据点的黄粱美梦，宣告了中国赫鲁晓夫及其代理人在天津的反革命修正主义罪恶统治的彻底垮台。这是战无不胜的毛泽东思想的新胜利。我们欢呼这个胜利，庆祝这个胜利，一定要巩固这个胜利，发展这个胜利！"},{"type":"paragraph","text":"指战员们在欢庆胜利的时刻，回顾了无产阶级文化大革命的光辉历程。指战员们满怀革命豪情，大谈特谈了无产阶级文化大革命以来的巨大收获，大摆特摆了天津市的大好形势。他们说：收获千条万条，集中到一点，就是更加深刻体会到毛主席无比英明伟大、毛泽东思想威力无穷。我们一定永远忠于伟大领袖毛主席，永远忠于伟大的毛泽东思想，永远忠于毛主席的无产阶级革命路线。他们表示：我们过去和无产阶级革命派风雨同舟，并肩战斗，今后，一定要更加紧密团结，坚决响应毛主席“拥军爱民”的伟大号召，坚决贯彻毛主席的最新指示，进一步做好“三支”“两军”工作，把无产阶级文化大革命进行到底，把天津市办成红彤彤的毛泽东思想大学校。"},{"type":"paragraph","text":"广大指战员在欢庆天津市革命委员会成立时，重温了毛主席关于政权问题的教导，表示一定要保持高度的革命警惕性，坚决镇压、坚决粉碎国内外一切阶级敌人的阴谋破坏和捣乱，加强战备，巩固国防，保卫无产阶级文化大革命，巩固和加强无产阶级专政。参加过一九四九年解放天津战斗的某部二炮连八班的战士们说：过去我们班和兄弟部队一道从国民党反动派手里解放了天津，今天我们要为保卫新诞生的天津市革命委员会，巩固和加强无产阶级的政权贡献力量。"},{"type":"paragraph","text":"驻天津部队广大指战员还表示，决心响应林副主席的伟大号召，读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士。在无产阶级文化大革命中，虚心向广大无产阶级革命派学习，为人民立新功。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cc3257287"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
