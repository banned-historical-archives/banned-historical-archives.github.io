ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"致南京中共代表团电","alias":"","parts":[{"type":"paragraph","text":"致南京中共代表团电口"},{"type":"paragraph","text":"（1946年9月6日）"},{"type":"paragraph","text":"无条件停战之要求，现在已感不适宜，蒋军已占我二十余县，其中有承德、淄博、台儿庄等要地，无条件停战可使蒋军获得休整以利再战，而我则不能恢复失地，因此必须开始考虑改变此要求。必须（一）蒋军退出被侵占之解放区，（二）蒋军从东北、华北、华中、西北撤退二分之一开往华南各省，方能保证停战之后不再打，否则无保证。我军现正开始动员起来，决心将蒋军驱出解放区，在六个月至八个月内，歼灭第一线全部进犯军三分之一，即一六二个旅中五十四个旅（阎傅马及伪军保安队交警等不在内)。你们意见如何，望讨论见告"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致南京中共代表团电的主要内容。8日，周恩来复电，认为中央决定歼敌三分之一力量的胜利以转变局势，是绝"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":138,"page_end":138},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22a7a00240"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
