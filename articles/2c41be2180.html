<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席的“备战、备荒、为人民”伟大战略方针指引下大型人工运河——湖北省汉北河竣工","authors":[],"dates":[{"year":1970,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社武汉二日电　在伟大领袖毛主席的“备战、备荒、为人民”的伟大战略方针指引下，我国又一条大型人工运河——湖北省汉北河，经过六个多月的艰苦奋斗，现在已经胜利竣工。开挖汉北河是汉北水利工程的主体工程，全长一百一十多公里，槽深七米。加上同时建成的七处大型排洪涵闸和其他工程，共完成土石方六千多万立方米。"},{"type":"paragraph","text":"汉北水利工程是对汉江以北、汉宜公路以南的广大地区河流湖泊的全面治理，按照规划共分为两期进行。第一期工程主要是开挖汉北河和建筑通水涵闸；第二期工程主要是兴建几处大型电排站，扩大工程受益面积，兴建船闸，发展航运事业。整个汉北水利工程完成以后，将有一百多万亩农田可以旱涝保收，二十多万亩荒地可以变为良田。同时还将大大改善内河航运条件。"},{"type":"paragraph","text":"新开挖的汉北河，流经湖北省粮棉集中产区——天门、汉川、应城、云梦和孝感等县。这个地区内湖泊星罗棋布，河流纵横，地势低洼，过去只有一条窄狭、弯曲的老天门河和两座小型排水闸，每遇大雨，就要造成水灾。汉北河挖成后，可以把这个地区的主要湖泊串连起来，把积水引入新河，排入长江和汉江。今年五月底，汉北河刚竣工后就初步发挥了效益。当时，这个地区连续降了三百多毫米的暴雨，因积水能通过汉北河排走，境内湖泊的水位比过去降同样雨量的时候下降了三米左右，使这个地区的农田免遭水灾。"},{"type":"paragraph","text":"在工程施工期间，广大贫下中农用毛泽东思想指挥战斗，开展比、学、赶、帮的竞赛活动。他们发扬“一不怕苦，二不怕死”的彻底革命精神，哪里困难就往哪里上，哪里艰险就往哪里闯。汉北河出口道要建筑的一座一千五百个流量的大型排水闸，计划在汛期到来之前修成。广大贫下中农和水利部门的工人、革命技术人员一道，没有工具自己造，没有技术在干中学，凭着一颗红心两只手，在汛期之前高速优质地把水闸建筑起来。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c41be2180"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
