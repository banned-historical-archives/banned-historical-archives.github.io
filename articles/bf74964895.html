tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席军事思想指导训练","authors":[],"parts":[{"type":"paragraph","text":"本报讯 八三四二五部队一连党支部针对拉练中的问题，组织干部战士学习毛主席的军事著作。"},{"type":"paragraph","text":"在拉练中，有的同志对练藏的意义认识不足，如有的战士由于怕麻烦，不严格伪装；有的干部只是为了好管理部队，不认真把部队疏散隐蔽。有一次，在疏散区练藏，有的干部光想到便于管理，把车辆摆在一条线上。党支部针对这个问题，组织干部战士认真学习毛主席关于“保存自己，消灭敌人”的论述，并到兄弟连队参观学习，深刻理解毛主席的“积极防御”思想。使大家明确：搞好疏散隐蔽，尽可能地保存自己的力量，是准备转入进攻歼敌的重要手段。如果光想到少些麻烦，而不疏散隐蔽，打起仗来，就会造成不必要的伤亡，也就不能达到消灭敌人的目的。干部提高认识以后，就把管理部队和疏散隐蔽两个方面结合起来，研究疏散方案。演练中，干部战士不怕苦，不怕累，充分利用树林、草丛、土包、沟坎进行疏散隐蔽，同时认真伪装，努力达到藏得严密，能走能打的要求。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf74964895"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
