"陈伯达"],"dates":[{"year":1967,"month":12,"day":22}],"is_range_date":false,"parts":[{"text":"陈伯达与南开大学师生的谈话","type":"title"},{"text":"陈伯达","type":"authors"},{"text":"阶级斗争很激烈，很复杂，很尖锐，这就必须善于思考，按毛主席的指示想问题，平心静气，不要看表面现象，还要进一步考查。阶级斗争可能是一个人或一个小集团为代表，每个阶级都出来登台表演，有机会就出来登台表演的，被无产阶级推翻下去的剥削阶级，资产阶级不甘心他们的灭亡，要深刻记住这个话，毛主席经常说：这些人经常想恢复他们的天堂，还有国际敌人，帝国主义、修正主义，也不愿意让我们安安静静地搞阶级斗争，他们也要找他们的代理人，替他们服务，他们可以用很少的代价，要我们会出很大的代价，你们要注意。","type":"paragraph"},{"text":"可能他们有计划的搞的，也可能不是有计划，就几句话就挑动起来了。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22dca1368a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
