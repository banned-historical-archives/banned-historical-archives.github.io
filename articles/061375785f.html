版社","金满城"],"dates":[{"year":1957,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"给储安平的信","type":"title"},{"text":"人民文学出版社金满城","type":"authors"},{"text":"安平吾兄，","type":"appellation"},{"text":"多年不见，甚愿能有一谈之机会，奈彼此皆忙，徒唤奈何！","type":"paragraph"},{"text":"我原在总工会工作，五四年已调往人民文学出版社。日来本社进行整风，揭露问题甚多而且很有价值。本社同志们，都以为大可公诸报端，苦无门路，弟思兄所主持之报纸，近来仗义直言，深得多人钦佩。故望兄能商之贵报外勤部，派一外勤记者来本社采访一下，弟敢保证，绝不虚行。其他一切，当候记者来时，再为详告，知道你忙，故不多赘。","type":"paragraph"},{"text":"耑祝","type":"paragraph"},{"text":"节禧！","type":"appellation"},{"text":" 弟金满城  5月30日","type":"paragraph"},{"text":"(光明日报编者说明：储安平接此信后，立即指令本报文艺部派记者前往采访。因所谈内容多系肃反和人事问题，文艺部同志认为不宜报道，向储汇报，储却一再向文艺部副主任张常海和记者黎丁催促：要作报道！)","type":"paragraph"}],"comments":[],"origin":"《右派分子储安平的言行》，中华全国新闻工作者协会研究部、中国人民大学新闻系合编，光明日报社印，1957年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"061375785f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
