hors":[],"dates":[{"year":1959,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彭德怀元帅在德驻华武官庆祝建军节酒会上说"},{"type":"paragraph","text":"德国人民争取统一斗争一定胜利"},{"type":"paragraph","text":"新华社1日讯　德意志民主共和国驻华武官范因赫德中校今晚举行鸡尾酒会，庆祝德意志民主共和国国家人民军建军三周年。"},{"type":"paragraph","text":"我国国务院副总理兼国防部长彭德怀元帅出席了酒会，并且在会上讲话。他说，德意志民主共和国国家人民军从诞生之日起，就守卫在社会主义阵营的西方前线，保卫着德国人民社会主义建设的成果，保卫着欧洲和世界和平，并且在这方面已经做出了重大的贡献。中国人民和中国人民解放军为德国国家人民军的巨大成就感到欢欣鼓舞。"},{"type":"paragraph","text":"彭德怀元帅说，德意志民主共和国为争取建立一个统一的、爱好和平的和民主的德国进行了不懈的努力。苏联在不久以前也提出了把西柏林变为非军事的自由城市，以及有关国家召开会议讨论和缔结对德和约的建议。这些建议，对于德国的重新统一，对于欧洲安全和世界和平都是极其有利的。我们完全支持这些合理的建议。如果以美国为首的西方国家毫无理由地拒绝这些建议，或以任何新的阴谋，继续把西德和西柏林变成侵略德意志民主共和国或其他社会主义国家的基地，那么他们必将遭到可耻的失败。我国政府已经声明：“将把帝国主义国家对德意志民主共和国的任何进攻，都看作对整个社会主义阵营的进攻，并且将全力支持德意志民主共和国击退这种进攻。”这一声明，充分表达了中国人民支持兄弟的德意志民主共和国的坚强意志。"},{"type":"paragraph","text":"彭德怀元帅说，我们深信在英勇的德国人民坚持不懈的努力下，在社会主义阵营和全世界爱好和平人民的支持下，德国人民争取建立一个统一的、和平的和民主的德国，一定会取得胜利；帝国主义者一切破坏德意志民主共和国的阴谋，都是注定要失败的。"},{"type":"paragraph","text":"范因赫德中校在酒会开始时致词。他说，在过去的三年内，我们的军队在德国统一社会党的领导下，已发展成了一支现代化的有战斗力的军队，它能够保卫我国人民民主制度、主权和边界的不受侵犯。现在，我们军队的全体官兵和德意志民主共和国的劳动人民紧密团结在一起，共同为根据苏联建议的缔结对德和约和使西柏林成为自由城市而斗争。"},{"type":"paragraph","text":"范因赫德中校说，我国人民军站在保卫强大的社会主义阵营西方的最前哨。我们在保卫我们共和国的斗争中，不是孤立的。它和以把我国从法西斯主义和帝国主义奴役下解放出来的苏联军队，以及其他社会主义国家军队肩并肩地站在一起，共同为保卫世界和平而奋斗。"},{"type":"paragraph","text":"应邀出席今晚鸡尾酒会的有许光达大将、傅钟上将、彭绍辉上将、李聚奎上将、刘震空军上将、罗舜初海军中将等中国人民解放军高级将领，以及各军种、兵种的代表。外交部副部长曾涌泉和中德友好协会会长竺可桢，也应邀出席了今晚的酒会。出席今晚酒会的还有德意志民主共和国驻华临时代办皮尔巴赫和各国驻华使节和武官。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f48a1e8d33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
