","authors":[],"dates":[{"year":1967,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我留法学生回国参加文化大革命"},{"type":"paragraph","text":"法共产主义运动（马列）抗议法国警察镇压我留学生的暴行"},{"type":"paragraph","text":"新华社巴黎三十一日电　中国留法学生十九人一月三十一日动身回国参加无产阶级文化大革命。"},{"type":"paragraph","text":"三十日下午他们在巴黎的“巴黎公社烈士墙”（巴黎公社烈士受难的地点）前献了花圈，并背诵毛主席语录：“成千成万的先烈，为着人民的利益，在我们的前头英勇地牺牲了，让我们高举起他们的旗帜，踏着他们的血迹前进吧！”“社会主义制度终究要代替资本主义制度，这是一个不以人们自己的意志为转移的客观规律。不管反动派怎样企图阻止历史车轮的前进，革命或迟或早总会发生，并且将必然取得胜利。”"},{"type":"paragraph","text":"一月二十七日晚上，我留法学生四十九人，在前往苏联驻法国大使馆抗议苏修领导集团在莫斯科野蛮迫害我留学生的途中，遭到巴黎警察当局的野蛮镇压。这次回国的十九名留学生是其中的一部分，另外三十人已于一月二十九日返回祖国。"},{"type":"paragraph","text":"据新华社巴黎三十日电　法国共产主义运动（马克思列宁主义）及其机关报《新人道报》最近联名发表抗议书，强烈抗议巴黎警察当局无理殴打和拘捕中国留法学生的暴行。"},{"type":"paragraph","text":"抗议书指出，法国人民渴望和中国人民保持友好关系，这一警察暴行是法国的耻辱。"},{"type":"paragraph","text":"抗议书说，法国共产主义运动、法国所有的马克思列宁主义者和忠于无产阶级国际主义的共产党人，全力声援中国留法学生的正义行动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c19ea65e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
