rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"罗马尼亚共产党中央委员会代表团到京周恩来张春桥同志会见并宴请波德纳拉希和布尔蒂卡同志会见和宴会始终着中罗两党、两国人民的热烈友好气氛","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年九月五日讯 由罗马尼亚共产党中央执行委员会委员、中央常设主席团委员埃米尔·波德纳拉希和罗马尼亚共产党中央执行委员会候补委员、中央书记科尔内尔·布尔蒂卡组成的罗马尼亚共产党中央委员会代表团，应中共中央邀请，前来我国进行非正式友好访问，今天下午乘专机到达北京。"},{"type":"paragraph","text":"中共中央政治局常委张春桥，中共中央委员、中共中央对外联络部部长耿飚，中共中央委员、外交部副部长乔冠华，外交部副部长余湛，有关方面负责人金肇野、王明修等，到机场热烈欢迎。"},{"type":"paragraph","text":"到机场迎接的还有，罗马尼亚驻中国大使格夫里列斯库和大使馆外交官员。"},{"type":"paragraph","text":"新华社一九七三年九月五日讯 中共中央副主席周恩来，中共中央政治局常委张春桥，今天晚上会见并设宴招待了由罗马尼亚共产党中央执行委员会委员、中央常设主席团委员埃米尔·波德纳拉希和罗马尼亚共产党中央执行委员会候补委员、中央书记科尔内尔·布尔蒂卡组成的罗马尼亚共产党中央委员会代表团。会见和宴会始终洋溢着中罗两党、两国人民的热烈友好气氛。"},{"type":"paragraph","text":"罗马尼亚驻中国大使格夫里列斯库等参加了会见和宴会。"},{"type":"paragraph","text":"中国方面参加的有：中共中央委员、中共中央对外联络部部长耿飚，中共中央委员、外交部副部长乔冠华等。"},{"type":"paragraph","text":"图为周恩来、张春桥同志会见波德纳拉希和布尔蒂卡同志时情形。"},{"type":"paragraph","text":"图为张春桥同志和波德纳拉希同志在机场握手。 新华社记者摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1958eb47b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
