art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"华国锋总理会见英国友好人士格林"},{"type":"paragraph","text":"华国锋总理八月二十三日下午会见英国友好人士、英中了解协会副会长、英国作家费利克斯·格林，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"华国锋总理对格林先生说，你十几次访华，是中国人民的老朋友了。格林先生回答说，从一九五七年算起，我同中国人民的友谊已有二十二年了。"},{"type":"paragraph","text":"邓小平副总理会见美国民主党参议员杰克逊"},{"type":"paragraph","text":"邓小平副总理八月二十三日上午在北京同美国民主党参议员杰克逊进行了长达两个多小时的谈话。他们就当前印支局势、中东问题和双方关心的其他国际问题以及中美双边关系问题，广泛、充分地交换了看法。"},{"type":"paragraph","text":"李先念副总理会见路透社代表团"},{"type":"paragraph","text":"李先念副总理八月二十三日下午会见了英国路透社总经理杰拉尔德·朗和夫人以及由朗先生率领的路透社代表团。"},{"type":"paragraph","text":"李先念副总理在回答英国新闻界朋友提出的问题时，详细阐述了我国工作着重点转移到社会主义现代化建设上之后的一系列经济政策，以及我国对外政策和对印支局势的看法。"},{"type":"paragraph","text":"耿飚副总理会见阿根廷新任驻华大使"},{"type":"paragraph","text":"国务院副总理耿飚八月二十三日上午会见了阿根廷共和国新任驻中华人民共和国特命全权大使保利诺·丹尼尔·阿曼多·穆萨基约。"},{"type":"paragraph","text":"卡托议长率巴巴多斯议会代表团抵京"},{"type":"paragraph","text":"由参议院议长阿诺特·卡托率领的巴巴多斯议会代表团，应人大常委会的邀请对我国进行友好访问，八月二十三日早晨乘飞机到达北京。当晚，人大常委会举行宴会，欢迎巴巴多斯议会代表团。谭震林副委员长代表叶剑英委员长对来宾表示热烈欢迎。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0d547135f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
