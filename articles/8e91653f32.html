ubusercontent.com/banned-historical-archives/banned-historical-archives4/main/cfa8b5d5-ebd0-441b-9d76-9580abd066b7.pdf"],"article":{"title":"法文版跋","alias":"","parts":[{"type":"paragraph","text":"法文版跋"},{"type":"paragraph","text":"约·鲁瓦先生保证尽可能准确地、甚至逐字逐句地进行翻译。他非常认真地完成了自已的任务。但正因为他那样认真，我不得不对表述方法作些修改，使读者更容易理解。由于本书分册出版，这些修改是逐日作的，所以不能处处一样仔细，文体不免有不一致的地方。，在担负校正工作后，我就感到作为依据的原本（德文第二版）应当作一些修改，有些论述要简化，另一些要加以完善，一些补充的历史材料或统计材料要加进去，一些批判性评注要增加，等等。不管这个法文版本有怎样的文字上的缺点，它仍然在原本之外有独立的科学价值，甚至对懂德语的读者也有参考价值。"},{"type":"paragraph","text":"下面是我从德文第二版跋中摘引的几段，是有关政治经济学在德国的发展和本书运用的方法的。"},{"type":"paragraph","text":"卡尔·马克思1875年4月28日于伦敦"}],"authors":["马克思"],"dates":[{"year":1875,"month":4,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":38,"page_end":38},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e91653f32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
