实行大联合的通知","authors":[],"dates":[{"year":1967,"month":10,"day":17}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革关于按照系统实行革命大联合的通知","type":"title"},{"text":"各省、市、自治区革命委员会（筹备小组）、军管会，各大军区、省军区并转各群众组织：","type":"appellation"},{"text":"（一）各工厂、各学校、各部门、各企业单位，都必须在革命的原则下，按照系统，按照行业，按照班级，实现革命的大联合，以利于促进革命三结合的建立，以利大批判和各单位斗批改的进行，以利于抓革命、促生产、促工作、促战备。","type":"paragraph"},{"text":"（二）所有革命群众组织都应该以毛泽东思想为基础，经过充分协商，按照不同的具体情况，遵照毛主席上述的指示办理。一切跨行业的组织，都应该在自愿的原则下，按行业进行必要的调整。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第四集）》， 北京：1967年11月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc7558dadc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
