对全世界具有巨大指导意义","authors":[],"dates":[{"year":1966,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社地拉那15日电　本社记者报道:阿尔巴尼亚首都的一些作家和艺术家在最近向新华社记者发表谈话中，热烈赞扬中国人民高举毛泽东思想伟大红旗，开展社会主义文化大革命，并指出，毛泽东同志全面地、系统地发展了马克思列宁主义，毛泽东思想不仅对中国，而且对全世界具有巨大的指导意义。"},{"type":"paragraph","text":"阿尔巴尼亚作家、艺术家协会副主席、雕塑家弗托·斯塔莫说:中国的社会主义文化大革命是中国解放后最伟大的一次革命，是毛泽东思想又一次伟大的胜利。"},{"type":"paragraph","text":"他还指出，中国的工农兵大学毛主席著作，并在毛泽东同志领导下参加这场文化大革命，证明了毛泽东思想的正确和伟大。"},{"type":"paragraph","text":"他最后指出，毛泽东发展了马克思列宁主义，毛泽东思想不仅对中国，而且对全世界都具有伟大的意义。"},{"type":"paragraph","text":"阿尔巴尼亚作家艺术家协会国际部主任、著名诗人阿列克斯·恰奇在谈到中国社会主义文化大革命时说:“没有这场革命，就谈不上社会主义和共产主义的胜利。”他说，“这场革命在毛泽东同志的领导下，必将战胜各种各样的敌人，取得彻底的胜利。”"},{"type":"paragraph","text":"阿尔巴尼亚作家艺术家协会秘书长、小说家谢夫切特·穆萨莱说:“中国的工农兵和革命知识分子积极参加社会主义文化大革命以及他们运用毛泽东思想的巨大努力，给我留下了极其深刻的印象，并使我坚信这场文化大革命必将取得彻底的胜利。”"},{"type":"paragraph","text":"他又说:“阿尔巴尼亚作家，从中国社会主义文化大革命中找到了宝贵的经验。”"},{"type":"paragraph","text":"阿尔巴尼亚小说家拉扎尔·西里奇说:“阿尔巴尼亚作家同我们党一样，热烈祝贺中国开展的社会主义文化大革命取得的胜利。”他表示，阿中两国作家要在共同的斗争中，相互学习，共同提高，并遵照恩维尔·霍查同志和毛泽东同志的教导，完成我们共同的伟大任务。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12dc7a2de3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
