cal-archives/banned-historical-archives9/main/books/机密档案中新发现的毛泽东讲话.epub"],"article":{"title":"毛泽东主席在《关于澳共（马）主席希尔同志访华问题的请示》上的批示","parts":[{"text":"同志访华问题的请示》上的批示\u003cspan class=\"c5\"\u003e（\u003c/span\u003e","type":"paragraph"},{"text":"1968年6月28日","type":"paragraph"},{"text":"【泰德•希尔（Ted Hill），是澳大利亚共产党（马列）的创始人和主席。该党成立于1964年3月15日。由于中苏分裂，该党自创建之后一直接受中共领导。它的意识形态是共产主义、马克思列宁主义、反修正主义、左翼民族主义，尊崇马克思、恩格斯、列宁、斯大林、毛泽东以及创始人泰德•希尔为其理论指导。它的政治立场是极左。它出版报纸《先驱》。它的口号是“争取一个独立的澳大利亚和社会主义”。1968年6月，希尔提出要求，希望同年9月或11月来华访问。康生在中联部请示上批：“今年秋冬，我们大概会有许多工作要安排，建议请希尔明春来，如何。”毛主席在请示报告中的“希望今年9月或11月”字样下划了线，并作了下述批示。中联部的请示由康生批送毛主席的时间是1968年6月28日。】","type":"paragraph"},{"text":"“可以来”\u003cbr style=\"clear:both;\"\u003e","type":"paragraph"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":6,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a55ebfea3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
