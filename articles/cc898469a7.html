":1958,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席周总理电贺也门国庆"},{"type":"paragraph","text":"新华社13日讯　毛泽东主席致电也门穆塔瓦基利亚王国国王伊马姆·艾哈迈德，祝贺也门王国国庆。电文如下：也门穆塔瓦基利亚王国国王伊马姆·艾哈迈德·伊本·叶海亚·哈米德丁·纳赛尔·里迪尼拉陛下："},{"type":"paragraph","text":"值此也门王国国庆之际，我谨代表中国人民并以我个人的名义向陛下和也门人民表示衷心的祝贺。祝也门国家繁荣，人民幸福，并祝陛下身体健康。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"1958年11月13日于北京"},{"type":"paragraph","text":"新华社13日讯　周恩来总理致电也门穆塔瓦基利亚王国副首相巴德尔祝贺也门王国国庆。电文如下：也门穆塔瓦基利亚王国副首相塞弗·伊斯兰·穆罕默德·巴德尔王太子殿下："},{"type":"paragraph","text":"欣逢贵国国庆，我谨代表中华人民共和国政府并以我个人的名义向殿下和也门王国政府致热诚的祝贺。"},{"type":"paragraph","text":"我们高兴地看到，通过殿下对中国的访问，中也两国间的传统友谊已经得到了新的发展。我们热诚地希望两国间的友好合作关系将日益巩固和加强。"},{"type":"paragraph","text":"祝殿下和也门人民在维护国家独立和主权的斗争中，在促进亚非各国人民团结和保卫世界和平的事业中获得新的成就。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来\t\t              1958年11月13日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc898469a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
