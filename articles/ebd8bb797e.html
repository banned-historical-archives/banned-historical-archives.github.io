art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在四好总评中大谈毛主席的丰功伟绩","authors":[],"parts":[{"type":"paragraph","text":"某团四连在四好总评中，全连同志大谈毛主席的丰功伟绩，大想毛主席的英明伟大；大谈毛泽东思想巨大威力，大想学习毛主席著作的重要意义；大谈工农兵对毛主席的无限热爱，大想自己如何进一步学好毛主席著作。"},{"type":"paragraph","text":"大家在谈了大量事实以后，归纳了这样几句话：党是毛主席建设的；军队是毛主席缔造的；正确路线是毛主席制订的；胜仗是毛主席指挥的；三座大山是靠毛泽东思想推翻的；社会主义革命和建设的成就是靠毛泽东思想取得的；英雄人物是靠毛泽东思想哺育的。"},{"type":"paragraph","text":"谈谈想想，大家很自然地联系检查了自己学习毛主席著作的情况，都深深地感到，距离革命的需要还差得远。大家一致表示：今后要尽最大努力学习毛主席著作，尽最大努力宣传毛泽东思想。（工作组）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebd8bb797e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
