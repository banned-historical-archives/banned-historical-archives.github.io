year":1976,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用文艺武器投入批邓的战斗"},{"type":"paragraph","text":"小峦"},{"type":"paragraph","text":"首都工人民兵在人民警察和警卫战士的配合下，为保卫毛主席，保卫党中央，保卫毛主席的革命路线，保卫伟大祖国的首都，在天安门广场同一小撮阶级敌人进行了英勇的斗争。凯旋回厂，斗志益旺。他们人不卸甲，马不解鞍，立即挥笔上阵，连夜创作和排练文艺节目，用文艺武器投入批邓的战斗。他们说：“我们虽然取得了天安门广场反击战的胜利，但是斗争没有完。我们还要在各条战线打退敌人的进攻。在文艺创作方面，我们也要打好这场反击战。”这种饱满的政治热情，值得我们很好学习。"},{"type":"paragraph","text":"文艺作为阶级斗争的工具，从来都和现实斗争有着密切的联系。制造天安门广场反革命政治事件的一小撮反革命分子，是在邓小平的黑旗下兴风作浪的。这些亡命之徒一面纵火行凶，一面制造反革命舆论，抛出反动诗词，恶毒攻击伟大领袖毛主席，攻击党中央，攻击毛主席的革命路线，到了丧心病狂的程度。今天，在进一步深入批邓、反击右倾翻案风的斗争中，我们就要象首都工人民兵说的那样：敌人为复辟而舞文弄墨，我们就要用革命文艺武器作针锋相对的斗争，为巩固无产阶级专政，用革命的舆论粉碎反革命的舆论。"},{"type":"paragraph","text":"党内最大的不肯改悔的走资派邓小平，是刮右倾翻案风的总根子，也是天安门广场反革命事件的罪魁祸首。如果让他们的阴谋得逞，党就要变修，国就要变色，革命人民就要人头落地。我们从事文艺创作的同志，要学习首都工人民兵的革命精神，怀着强烈的无产阶级感情，迅速拿起笔来，运用多种多样的文艺形式，及时地反映和配合这场伟大的斗争。要把革命文艺当作匕首、投枪和大炮，向邓小平、向一小撮阶级敌人发起猛烈的攻势。我们要热情歌颂毛主席革命路线的伟大胜利，歌颂这场斗争中涌现出来的英雄人物，深刻揭露邓小平及社会上一小撮阶级敌人妄图颠覆无产阶级专政的狰狞面目和虚弱本质，使我们的革命文艺，在这场斗争中更好地发挥团结人民、教育人民、打击敌人、消灭敌人的战斗威力。"},{"type":"paragraph","text":"当前，集中批邓、反击右倾翻案风斗争的形势一派大好，各条战线都在奋勇作战。我们革命的文艺工作者，要紧紧跟上，积极创作和演出批判邓小平、反击右倾翻案风的文艺作品，迎接“五·一”这一无产阶级和劳动人民的战斗节日。为了保卫毛主席，保卫党中央，保卫毛主席的革命路线，让我们拿起文艺武器，向邓小平开火，开火，开火！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"239c0a622d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
