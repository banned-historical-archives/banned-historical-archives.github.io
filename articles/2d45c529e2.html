ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"关于解决绥远问题的指示","alias":"","parts":[{"type":"paragraph","text":"关于解决绥远问题的指示！"},{"type":"paragraph","text":"（1949年8月22日）彭、张，并西北局："},{"type":"paragraph","text":"傅作义、邓宝珊定于廿三日由北平动身去绥远。约定他们到绥远后，以两星期时间召集干部会议，宣布我党中央和平解决绥远问题的方针，成立双方合作的绥远军政委员会及绥远省政府。两星期后，傅、邓回北平参加新政协会议。会后傅去绥远实行改编军队及政权系统，邓去甘肃。"},{"type":"paragraph","text":"邓去甘肃的问题，已约定待贺到北平参加新政协会议时，与邓见面谈好后，随贺一道去西北，张治中也须那时才能去西北。"},{"type":"paragraph","text":"[1]这是毛泽东致彭德怀、张宗逊并西北局电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":158,"page_end":158},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d45c529e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
