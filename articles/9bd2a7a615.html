ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"给李讷的信","alias":"","parts":[{"type":"paragraph","text":"给李讷的信"},{"type":"paragraph","text":"（1959年12月30日）李讷："},{"type":"paragraph","text":"病好了没有？想你。要读浅近书，由浅入深，慢慢积累。大部头书少读一点，十年八年渐渐多读，学问就一定可以搞通了。我甚好。每天读书、爬山。读的是经济学。我下决心要搞通这门学问。天寒，善于保养，不要再患感冒。"},{"type":"paragraph","text":"父亲"},{"type":"paragraph","text":"十二月开日上午六时[1]李讷，毛泽东的女儿。当时在北京大学历史系读书。"},{"type":"paragraph","text":"[2]1959年12月10日至1960年2月9日，毛泽东带领一个读书小组，先后在杭州、上海和广州研读苏联《政治经济学教科书》（第三版）下册。写这封信时，毛泽东在杭州。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":12,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":31,"page_end":31},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bd2a7a615"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
