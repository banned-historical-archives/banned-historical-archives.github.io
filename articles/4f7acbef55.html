tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"河南省委副书记王维群带头违法乱纪省委决定放手发动群众对他进行彻底揭发批判","authors":[],"parts":[{"type":"paragraph","text":"据《人民日报》记者报道：中共中央通报河南省委严肃处理原驻马店地委第一书记苏华等人违犯财经纪律的严重事件之后，河南省委认真贯彻执行中央指示精神，发动群众进行财经纪律大检查。据初步清查，各地区许多部门都有不同程度违犯财经纪律的问题。为什么河南省违犯财经纪律的问题如此普遍如此严重？谁是苏华等人违法乱纪的支持者、纵容者？参加省委三级干部会议的同志，在揭发批判中常用这样一句话：“上梁不正下梁歪”。违犯财经纪律的“上梁”，就是省委主管经济工作的副书记王维群。最近，河南省委决定放手发动群众，揭发批判王维群的问题，彻底整顿财经纪律，肃清“四人帮”的流毒和影响。"},{"type":"paragraph","text":"《人民日报》十一月十三日为此发表的《严守党纪国法》的社论指出：在无产阶级专政的国家里，没有两种法律，只有一种法律，这个法律人人都要遵守。在这方面，我们的干部应起模范带头作用。最近，华主席指出：“对于违反财经纪律、浪费国家资金的一切错误行为，不论其借口如何，都要坚决制止，必要时进行经济以至法律的制裁。”王维群的问题必须彻底清算，严肃处理，以平民愤，以正法纪。"}],"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f7acbef55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
