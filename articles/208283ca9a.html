<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"纠正乱拉干部的无政府状态！","authors":[],"dates":[{"year":1951,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纠正乱拉干部的无政府状态！"},{"type":"paragraph","text":"私营隆顺营造厂乱拉技术人员应赔偿对方损失公开检讨错误编辑同志："},{"type":"paragraph","text":"天津私营隆顺营造厂因急于赶作某项工程，乃通过私人关系，将东北鞍山市公营鞍山工程公司技术人员何一峰、阎克志、王墨等三人拉去。使何一峰等三人，弃掉鞍山工程公司正在进行的突击工程任务，影响全部工程的完成，并造成当地职工情绪的很大波动。查隆顺营造厂资方用人，事先未向劳动介绍所申请，事后亦未声明，同时，何一峰等至该厂后，亦无居住户口证明。这种行为，违反了劳动力统一介绍政策，并玩忽公安户口法令。我们认为隆顺营造厂应将拉来的三个人送回原岗位，并负责赔偿鞍山工程公司因该三人弃职在工程上所受之损失，登报悔过道歉，对于私自留住无户口居民部分，则由公安局依法处理。同时，当政府有关部门至隆顺营造厂调查时，在该厂院内的河北省天津专区办公室的刘秘书和张同志，不但不帮助批评该厂的错误，反而出面袒护，对此亦应作深刻检讨。现此案已移送本市法院处理。"},{"type":"paragraph","text":"天津市人民政府劳动局"},{"type":"paragraph","text":"天津市劳动介绍所"},{"type":"paragraph","text":"江西水利局助理工程师王世纪不应通过私人关系活动工作编辑同志："},{"type":"paragraph","text":"我局原任助理工程师王世纪同志，于二月二十八日私自离职，工作未作任何交代。后经我们多方寻问，才知道王是通过南昌大学工学院院长兼中央重工业部顾问蔡方荫的私人关系，被介绍到中央重工业部基本建设局第一工程事务所工作。我们认为：（一）王世纪未经组织批准，通过私人关系活动工作；（二）基本建设局未经调查了解即随便任用在职干部；（三）蔡方荫从中进行私人拉拢介绍；这些都表现了无组织无纪律的行动。希望他们进行检讨，以便教育大家，杜绝这种不良风气。"},{"type":"paragraph","text":"江西省人民政府水利局"},{"type":"paragraph","text":"广州私立光华医学院应正确处理乱拉干部问题编辑同志："},{"type":"paragraph","text":"我们抚顺矿务局医院的医生许华生、黄鸿钧二人，于七月二十一日弃职私自逃回广州私立光华医学院任职。许、黄二人原是光华医学院的学生，经东北人民政府在关内招聘分配来我院工作。而光华医学院却一再用学校名义给许、黄二人来电报，拉他们回校工作。我们院方得知后，曾向许、黄二人说明，要调动工作必须经过组织系统。而许、黄二人不听从院方意见，竟私自弃职逃走。我希望广州市人民政府有关部门帮助光华医学院正确处理此事，纠正该院此种无组织无纪律的作风。"},{"type":"paragraph","text":"抚顺矿务局医院  王喆"},{"type":"paragraph","text":"西北艺术学院不应该私自拉东北博物馆的干部编辑同志："},{"type":"paragraph","text":"西北艺术学院有名叫匡扶的，不通过组织系统，一再私自写信拉我处干部阎万章同志到该校工作。去年冬季匡扶来信拉阎万章，当时经过我们说服教育，始未离职。但最近阎万章因又接到匡扶拉他去西北工作的来信而不安心工作。这种私人活动、乱拉干部的作风，如不严加纠正，将会影响我们国家的建设工作。"},{"type":"paragraph","text":"东北博物馆  水良箴"},{"type":"paragraph","text":"铁道部新河材料厂工会主席佟湘汶录用干部违反组织原则编辑同志："},{"type":"paragraph","text":"去年八月，铁道部材料局新河材料厂工会在招考图书馆管理员时，曾有饶阳县某村小学教师王淑英，因学校放署假回天津探亲，没有经过组织批准，就私自投考而被录取。饶阳县长知道此事后，曾给材料厂工会来信，要王淑英仍回到原岗位工作。但是材料厂基层工会主席佟湘汶同志竟利用工会名义对饶阳县长的来信再三强辩，以图庇护王淑英的无组织无纪律的错误。王淑英是青年团员，原属的团支部曾催她回去办转移手续，佟湘汶同志因为怕她回去不再转来，所以就说：“咱们不要了（指团籍），不要紧。”今年五月，佟湘汶同志调到直属工会担任文教部的副部长，他又毫不顾及材料厂工会图书馆的需要，而调王淑英到直属工会工作。就我所知，佟湘汶同志之所以如此对待王淑英的任用与调动，完全是为了达到他自己的恋爱目的。我们认为佟湘汶对自己这种自私自利的非无产阶级思想，应该深刻进行检讨。"},{"type":"paragraph","text":"中国新民主主义青年团新河材料厂支部书记  马肖印"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"208283ca9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
