uthors":[],"dates":[{"year":1971,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十七日电　中共中央政治局常委、国务院总理周恩来，中共中央政治局委员江青，外交部代部长姬鹏飞，今天晚上会见了越南南方共和临时革命政府外交部长阮氏萍和同阮氏萍部长一起到达北京的越南南方共和驻波兰大使陈文思，同他们进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"会见时，越南南方共和驻中国大使馆临时代办陈平、随员阮世厚，越南民主共和国驻中国大使吴船、三等秘书胡欣在座。"},{"type":"paragraph","text":"会见时在座的还有，我国外交部副部长韩念龙、外贸部副部长李强，以及外交部有关方面负责人和工作人员陆维钊、王海容、梁枫、王德洋等。"},{"type":"paragraph","text":"今天下午，周恩来总理前往宾馆看望了阮氏萍部长。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbb11be831"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
