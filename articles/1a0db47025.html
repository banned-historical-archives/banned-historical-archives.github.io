:[{"year":1949,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　高教联主席团第二次会议于十二日下午二时在培成女校该会举行，出席十七人，由刘佛年主席，会上作了下列重要决议:"},{"type":"paragraph","text":"(一)决定筹办高教同人暑期学习会，推请周谷城，蔡尚思，陈石英，潘震亚，郭绍虞组成暑期学习工作委员会，主持该会设计和进行事宜，并即广泛征求同人们的意见。"},{"type":"paragraph","text":"(二)号召高教同人以小组和扩大座谈会方式，普遍学习毛主席的七一论文“论人民民主专政”。"},{"type":"paragraph","text":"(三)号召高教同人对于劳苦功高的人民解放军即行展开慰劳运动，并与其他人民团体配合进行。"},{"type":"paragraph","text":"(四)通过私大教联建设:由该会发起联合各人民团体发表宣言，抗议美帝继续援蒋滥炸中国城市破坏江堤，杀害中国人民的暴行。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a0db47025"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
