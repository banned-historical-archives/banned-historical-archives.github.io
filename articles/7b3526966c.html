ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"集中最大兵力于主要方向歼敌","alias":"","parts":[{"type":"paragraph","text":"集中最大兵力于主要方向歼敌！"},{"type":"paragraph","text":"（1946年8月8日）粟，并告陈、宋，张、邓、谭："},{"type":"paragraph","text":"（一）粟虞辰电²悉。歼敌良机已至，甚好甚慰。（二）如连续歼敌两个旅有便利条件则可连续歼敌两个旅，否则可先歼其一个旅，休息数日再找机会歼其另一旅。（三）预备部队或钳制部队如有可调者，望张邓谭尽可能满足粟之要求，集中最大兵力于主要方向。（四）飞速动员新兵送上前线，并继续组训几个补充团。（五）照陈电向人民公开说明敌进不可怕，暂时失地将来可收复，号召民兵自卫，援助新四军歼敌。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"未齐申[1]这是毛泽东为中共中央军委起草的给华中野战军司令员粟裕的电报。"},{"type":"paragraph","text":"[2]陈、宋，指陈毅、宋时轮，当时分别任山东野战军司令员兼政治委员和参谋长。张、邓、谭，指张鼎丞、邓子恢、谭震林，当时分别任华中军区司令员、政治委员和副政治委员。"},{"type":"paragraph","text":"[3]指1946年8月7日辰时粟裕给陈毅和中共中央的电报。电报说：因华中兵力过于分散，形成钳制方向之兵力多于突击方向。希望调淮南第五旅"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":60,"page_end":60},"tags":[{"name":"陈毅","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b3526966c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
