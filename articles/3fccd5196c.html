ear":1975,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋副总理会见罗科学院代表团"},{"type":"paragraph","text":"新华社一九七五年十二月十八日讯　国务院副总理华国锋今天下午会见由克里斯托弗尔·西米奥内斯库副院长率领的罗马尼亚科学院代表团，同他们进行了亲切友好谈话。"},{"type":"paragraph","text":"会见以后，华国锋副总理出席了中国科学院和罗马尼亚社会主义共和国全国科学技术委员会、科学院科学合作协议以及一九七五年至一九七六年科学合作计划的签字仪式。"},{"type":"paragraph","text":"中国科学院副院长吴有训和克里斯托弗尔·西米奥内斯库副院长分别在科学合作协议和科学合作计划上签字。"},{"type":"paragraph","text":"参加会见和签字仪式的有：罗马尼亚科学院代表团团员罗马尼亚科学院秘书长、布加勒斯特大学校长乔治·丘库教授和罗马尼亚科学院行政外事局副局长阿列克山德鲁·丘翁古，罗马尼亚驻中国大使馆临时代办道洛班楚；中国科学院负责人武衡、副秘书长秦力生，有关方面负责人郝汀、郗照明、武藻文、张岐等。"},{"type":"paragraph","text":"会见和签字以后，吴有训副院长设宴招待罗马尼亚同志。"},{"type":"paragraph","text":"罗马尼亚科学院代表团将于日内离京回国。（附图片）"},{"type":"paragraph","text":"华国锋副总理会见由罗马尼亚科学院副院长克里斯托弗尔·西米奥内斯库率领的罗马尼亚社会主义共和国科学院代表团。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1975,"month":12,"day":19}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋副总理会见罗科学院代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年十二月十八日讯 国务院副总理华国锋今天下午会见由克里斯托弗尔·西米奥内斯库副院长率领的罗马尼亚科学院代表团，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见以后，华国锋副总理出席了中国科学院和罗马尼亚社会主义共和国全国科学技术委员会、科学院科学合作协议以及一九七五年至一九七六年科学合作计划的签字仪式。"},{"type":"paragraph","text":"中国科学院副院长吴有训和克里斯托弗尔·西米奥内斯库副院长分别在科学合作协议和科学合作计划上签字。"},{"type":"paragraph","text":"参加会见和签字仪式的有："},{"type":"paragraph","text":"罗马尼亚科学院代表团团员罗马尼亚科学院秘书长、布加勒斯特大学校长乔治·丘库教授和罗马尼亚科学院行政外事局副局长阿列克山德鲁·丘翁古，罗马尼亚驻中国大使馆临时代办道洛班楚；"},{"type":"paragraph","text":"中国科学院负责人武衡、副秘书长秦力生，有关方面负责人郝汀、郗照明、武藻文、张岐等。"},{"type":"paragraph","text":"会见和签字以后，吴有训副院长设宴招待罗马尼亚同志。"},{"type":"paragraph","text":"罗马尼亚科学院代表团将于日内离京回国。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fccd5196
