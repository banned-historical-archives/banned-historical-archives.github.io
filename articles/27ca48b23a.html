script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底肃清经济工作中左倾思想钟民在人大小组会上谈制订长远规划要做到六个坚持","authors":[],"dates":[{"year":1980,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京九月九日电　上海代表钟民在人大小组讨论会上发言。他说，华国锋同志在讲话中有三处提到要注意肃清经济工作中的左倾思想，我觉得这个问题很重要。在经济工作中肃清左的倾向，是一个长期的任务，还会遇到阻力。去年上海的基本建设投资额是二十四亿元，今年原计划二十九亿，到六月底增加到三十四亿，加上各类资金，达到四十亿元。基建战线越拉越长，压不下来。上海这个城市现在是“超负荷运行”，住房紧张，城市建设缺口大，三废污染严重。这种“骨头”和“肉”比例严重失调的状况必须逐步改变过来。"},{"type":"paragraph","text":"我们还要注意在制订长远规划中肃清左的遗毒，注意做到六个坚持:一、量力而行，不能只讲需要，不讲可能；二、尊重科学，按经济规律办事，避免瞎指挥；三、走群众路线，多听听专家和行家的意见，不要少数人说了算；四、在发展生产的基础上逐步改善人民群众的物质生活和文化生活；五、坚持自力更生为主，适当引进国外的先进技术和设备，能够自己造的尽量不买国外的；六、要有经济立法和经济纪律，严重浪费国家资财的应受到法律制裁。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27ca48b23a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
