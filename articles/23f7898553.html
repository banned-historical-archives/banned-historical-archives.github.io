ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"起义部队中的领导机关应实行军政委员会及军政组制度","alias":"","parts":[{"type":"paragraph","text":"起义部队中的领导机关应实行"},{"type":"paragraph","text":"军政委员会及军政组制度"},{"type":"paragraph","text":"（1950年7月12日）中南、西南、西北各中央局及军区："},{"type":"paragraph","text":"在起义部队中的领导机关应为军政委员会及军政组制度，不应如主力一样为党委制，以便吸收起义将领参加一起工作，利于团结和改造部队。兹将绥远改造傅部经验一件发给你们作参考，请你们指导所属有关部分注意研究此种经验。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"七月十二日"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中共中央中南局、西南局、西北局及各军区的电报。"},{"type":"paragraph","text":"[2]绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。"},{"type":"paragraph","text":"[3]傅部，指原隶属傅作义的董其武部。该部于1949年9月在绥远宣布起义，12月改编为中国人民解放军第二十三兵团。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":7,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":531,"page_end":531},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23f7898553"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
