rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"二连组织专题教育抓好活的思想他们说：毛主席著作是最高的教材，革命群众运动是最广阔的课堂，无产阶级革命派是最高明的老师？","authors":["黄奕策/高兴烈"],"parts":[{"type":"paragraph","text":"本报讯 北京部队空军某部二连党支部，在无产阶级文化大革命中，积极抓活思想，及时选学有关的毛主席著作，组织专题讨论，发动群众自己教育自己，使两条路线斗争教育紧紧跟上形势发展。"},{"type":"paragraph","text":"不久前，部队领导机关统一安排的两条路线斗争教育告一段落后，党支部又及时组织干部学习了毛主席的指示：“我国社会主义和资本主义之间在意识形态方面的谁胜谁负的斗争，还需要一个相当长的时间才能解决”。“情况是在不断地变化，要使自己的思想适应新的情况，就得学习。”大家认为，无产阶级文化大革命正在深入发展，阶级斗争非常尖锐复杂，每时每刻都向我们提出许多新问题。要保证干部战士在阶级斗争的大风大浪里，心明眼亮，立场坚定，坚决执行毛主席的应该支持左派广大群众的指示，胜利地完成保卫和贯彻毛主席的无产阶级革命路线的历史使命，必须随着形势的发展，不断用战无不胜的毛泽东思想武装大家的头脑，积极抓好活思想。要做到教育跟得上，工作不间断。遇到困难怎么办？大家说，毛主席著作就是最高的教材，革命群众运动就是最广阔的课堂，无产阶级革命派就是最高明的老师。"},{"type":"paragraph","text":"干部们学习以后，立即深入班、排，发现带有普遍性的问题，就组织专题讨论。例如，近来农村的无产阶级文化大革命轰轰烈烈地开展起来，家在农村的干部战士都对此十分关心。党支部就把大家提出的问题，归纳成几个思考题，引导干部战士重温毛主席的光辉著作《湖南农民运动考察报告》，并组织大家参观驻地生产大队的革命大字报，访问无产阶级革命派，然后进行讨论，使大家受到了一次极为深刻的教育。在讲用会上，全体同志一致热烈欢呼，革命的农民运动好得很！并满腔热情地制定了坚决支持革命农民运动的具体措施。大家决心提高革命警惕，严守战斗岗位，在加强战备的同时，积极投入支援春耕的战斗。连里还开展了“一封信”活动，针对亲友们的活思想，选送指路明灯——毛主席语录，教育他们“公”字当头，把文化大革命进行到底，并且立即行动起来，狠抓革命，猛促生产。 （黄奕策、高兴烈）"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abbec3d0d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
