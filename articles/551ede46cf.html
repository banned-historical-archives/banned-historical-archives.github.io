周庆"],"dates":[{"year":1993,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大型丛书《中国出了个毛泽东》出版"},{"type":"paragraph","text":"江泽民题词　杨尚昆作序"},{"type":"paragraph","text":"本报北京１２月１７日讯　记者周庆报道：在毛泽东诞辰１００周年纪念日到来之际，由毛泽东之子毛岸青及其夫人邵华主编的大型丛书《中国出了个毛泽东》正式出版发行。江泽民同志为丛书题词：“毛泽东同志永远活在人民心中”。杨尚昆同志作序。"},{"type":"paragraph","text":"今天下午，有关方面负责人和一批跟随毛泽东同志战斗一生的革命老战士雷洁琼、李锡铭、程思远、赛福鼎·艾则孜、赵朴初等出席了在人民大会堂举行的出版座谈会。"},{"type":"paragraph","text":"丛书共３２卷约６００万字。为编好丛书，毛岸青、邵华访问了大江南北１０余个省区，到毛泽东当年工作、战斗过的地方收集资料、考证史实。丛书作者有老一辈革命家，有毛泽东的亲属、身边工作人员、著名作家等，他们或是同毛泽东有过直接接触，熟悉和了解毛泽东的生平业绩，或是对毛泽东革命生涯以及党史、军史有过深入的研究。书中许多珍贵的史料首次披露。"},{"type":"paragraph","text":"首次与读者见面的１４卷有《走出韶山冲》、《谁主沉浮》、《万水千山只等闲》、《艰难的转战》、《挥师大决战》、《肝胆相照》、《开国前后》、《功盖大禹》、《故园行》、《情系骄杨》、《广读天下书》、《翰墨春秋》、《机要秘书的思念》、《话说毛泽东》。其余书稿正在审阅排印中。"},{"type":"paragraph","text":"这套丛书由中央文献出版社、中央党校出版社、军事科学出版社、海南出版社、江苏文艺出版社联合出版。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"551ede46cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
