art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"世界人民革命洪流不可阻挡","authors":["装甲兵学习毛泽东思想积极分子/某部指导员石福田"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席在全世界人民反美怒潮空前高涨的大好形势下，发出了“全世界人民团结起来，打败美国侵略者及其一切走狗”的伟大号召，我们革命战士一千个拥护，一万个照办。"},{"type":"paragraph","text":"毛主席在声明中高瞻远瞩地指出：“新的世界大战的危险依然存在，各国人民必须有所准备。但是，当前世界的主要倾向是革命。”毛主席的英明论断，科学地揭示了当前国际阶级斗争的实质，指出了美帝国主义及其一切走狗必败、全世界人民必胜的历史发展总趋势。"},{"type":"paragraph","text":"第二次世界大战后，美帝国主义手里拿着原子弹，向全世界各个角落大肆侵略扩张。它纠集各国反动势力，向革命人民猖狂进攻。但是，人民革命的洪流是谁也阻挡不了的。马克思主义、列宁主义、毛泽东思想日益深入人心，全世界无产阶级和广大人民群众的革命运动正以排山倒海之势，雷霆万钧之力，磅礴于全世界。反帝武装斗争烈火熊熊，民族解放运动波涛汹涌，帝国主义的“心脏”地区不断爆发革命，交织成一幅“四海翻腾云水怒，五洲震荡风雷激”的壮丽图景。最近，抗议美国侵略柬埔寨的群众运动席卷全球，就是世界人民革命斗争蓬勃高涨的鲜明标志。"},{"type":"paragraph","text":"毛主席教导我们：“一切反动势力在他们行将灭亡的时候，总是要进行垂死挣扎的。”面对各国人民风起云涌的革命斗争，美帝国主义及其走狗以十倍的仇恨，百倍疯狂的努力进行反扑。深深地陷在越南、老挝人民战争汪洋大海之中不能自拔的美国侵略者，悍然发动对柬埔寨的侵略战争，进行新的战争冒险，正是表明了美帝国主义濒临灭亡前的垂死挣扎。"},{"type":"paragraph","text":"世界将走向进步，决不是走向反动。革命的主流一定要压倒反革命的逆流。美帝国主义及其一切走狗一定要被革命人民所埋葬。"},{"type":"paragraph","text":"毛主席的庄严声明，向我们发出了伟大的战斗号召。我们革命战士一定念念不忘“革命”二字。我们一定在伟大统帅毛主席的英明领导下，抓革命，促生产，促工作，促战备，和全世界人民团结在一起，打败美国侵略者及其一切走狗！"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7704d54bc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
