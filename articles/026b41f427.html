],"dates":[{"year":1976,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大批修正主义  坚持社会主义方向"},{"type":"paragraph","text":"云南省地方小煤矿大发展"},{"type":"paragraph","text":"据新华社昆明电　在毛主席革命路线指引下，云南省地方小煤矿迅速发展。从一九七一年以来，全省小煤矿的原煤产量平均每年增长百分之二十。一九七五年的原煤生产计划，提前三十天超额完成。全省小煤矿五年之内原煤产量翻了一番。现在一天的产量，比一九五一年的全年产量还多。"},{"type":"paragraph","text":"云南省煤炭资源比较丰富，分布广泛。在无产阶级文化大革命和批林批孔运动中，广大干部、群众深入批判了刘少奇、林彪破坏社会主义革命和社会主义建设的罪行，用革命推动生产，使小煤矿象雨后春笋般迅速发展起来。目前，已经发展起来的二千六百多个小煤矿和小煤窑星罗棋布，遍及全省各地。"},{"type":"paragraph","text":"在大批小煤矿建设起来以后，云南省各级党委以阶级斗争为纲，认真加强对小煤窑和小煤矿的领导，促使这些企业始终坚持社会主义方向，沿着毛主席的革命路线前进。曲靖地区党委和革委会在办小煤矿的过程中，发现有些队办的小煤窑在劳力安排、处理粮煤关系以及收入分配等方面存在着一些资本主义倾向，便带领广大群众大批修正主义，大批资本主义，打击阶级敌人的破坏活动，端正了小煤窑的社会主义方向。"},{"type":"paragraph","text":"云南省地方小煤矿在建设过程中，注意依靠群众，发扬自力更生、艰苦奋斗的革命精神，大搞技术革新和技术改造。"},{"type":"paragraph","text":"云南省小煤矿的迅速发展，为工农业生产的发展和满足人民生活的需要，作出了很大贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"026b41f427"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
