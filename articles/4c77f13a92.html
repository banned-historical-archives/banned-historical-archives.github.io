<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"学术文化界加强批判胡适胡风思想的斗争","authors":["新华社"],"dates":[{"year":1955,"month":4,"day":15}],"is_range_date":false,"parts":[{"text":"学术文化界加强批判胡适胡风思想的斗争","type":"title"},{"text":"新华社","type":"authors"},{"text":"各地学术文化界对胡适、胡风资产阶级唯心主义思想的批判已经有组织地逐步展开。这一批判初步树立和发扬了我国学术界自由论辩的风气。","type":"paragraph"},{"text":"在首都北京，自去年十二月底开始，由“胡适思想批判讨论会工作委员会”主持的讨论会已举行了二十次，讨论了批判胡适哲学思想、哲学史观、政治思想、历史观、文学思想以及胡适派对红楼梦的研究等十八篇论文。其中关于批判胡适的实用主义哲学方面的讨论会举行了八次，讨论了胡绳、艾思奇、孙定国、冯友兰等人写的八篇批判论文。这些论文经讨论后大多增加了新的内容，修正了一些不正确的论点，并对某些原则性的问题展开了争论。参加讨论会的除了哲学和社会科学方面的学者外，自然科学家和许多青年学术研究工作者也参加了讨论，并写了文章在报刊上发表。","type":"paragraph"},{"text":"上海、江苏等地也都成立了批判胡适思想的工作委员会，并分成哲学、文学、教育、历史、政治等小组，在各学术领域内分别批判胡适思想。江苏省参加讨论会的有三千多个社会科学家、自然科学家和文化界人士。这两地的工作委员会还决定要举办一系列的学术报告会。天津市文学界和史学界已分别举行了座谈会，检查了胡适思想在文学、语言学和历史研究、历史教育方面的影响。兰州市文艺界已举行多次讨论会，着重批判了胡适思想对古典文学研究的危害。武汉市学术文化单位已分别成立了五个批判胡适、胡风思想的研究小组，分别在古典文学、新文学、音乐、美术等方面批判唯心主义思想。东北人民大学和东北师范大学确定了八十五项批判胡适、胡风的研究题目，现在已完成了若干题目的研究，并在各高等学校举行了十多次报告和讨论。四川大学历史系修订和增订的研究题目百分之九十都是属于批判胡适、胡风唯心主义思想的；中文系的研究题目中大部分是批判胡适在文学史、古典文学等方面的唯心观点。广州中山大学历史系在三月底结合期中教学检查，举行了一次“批判胡适史学方法”座谈会。","type":"paragraph"},{"text":"各城市的文学艺术界都展开了批判胡风反动文艺思想的斗争。著名作家郭沫若、茅盾、邵荃麟、曹禺、黄药眠、聂绀弩、欧阳予倩、袁水拍、唐弢、蔡仪等都在人民日报及“文艺报”等报刊上发表了批判胡风文艺思想的文章。在批判胡风思想的活动中，出现了许多新起的理论工作者。杨献珍、孙定国在中国文联主办的哲学讲座上着重批判了胡风及其小集团的主观唯心论的哲学思想。中国戏剧家协会已举行了两次批判胡风思想讨论会；中国音乐家协会举行了一次报告会。西安市文学艺术工作的领导干部和作家等六十多人已组成八个专题研究小组，对胡风思想进行专题研究。上海、武汉、广州市的作家撰写了一些批判胡风反动文艺思想的文章，已分别在报刊陆续发表。重庆、沈阳等地的文学艺术界也展开了这一思想批判运动。全国各主要文艺刊物和二十多种省、市级报纸上都发表了批判胡风反动文艺思想的文章。【新华社】","type":"paragraph"}],"comments":[],"origin":"《文汇报》1955年4月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c77f13a92"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
