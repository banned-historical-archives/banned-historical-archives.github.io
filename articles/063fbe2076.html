":[],"dates":[{"year":1966,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来邓小平彭真叶剑英等领导人"},{"type":"paragraph","text":"接见击落美机和美制蒋机有功人员"},{"type":"paragraph","text":"新华社十九日讯　周恩来、邓小平、彭真、叶剑英等领导人，今天中午接见了中国人民解放军空军部队一九六五年一月以来击落侵入我领空的美帝国主义军用飞机和美制蒋帮飞机的作战有功人员：汪林、李奎、高长吉、董小海、冯全民、李纯光、胡英法、张运宝、张怀连、朱以隆、鲁祥孝等。周总理等勉励他们再接再厉，争取更大的胜利。"},{"type":"paragraph","text":"参加接见的，有萧华、杨成武、吴法宪、余立金等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"063fbe2076"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
