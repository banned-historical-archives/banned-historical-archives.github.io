es":[{"year":1951,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜民主妇女同盟委员长朴正爱电毛主席祝贺五一节"},{"type":"paragraph","text":"【新华社平壤三十日电】朝鲜民主妇女同盟中央委员会委员长朴正爱于三十日致电我中央人民政府毛泽东主席，祝贺“五一”国际劳动节。电文如下："},{"type":"paragraph","text":"朝鲜妇女在迎接全世界劳动人民的节日——“五一”节之际，谨向您——伟大的中国革命的组织者与中国人民的领袖，致以热烈的祝贺。中国人民对于朝鲜人民在反抗美帝国主义武装侵略者的正义战争中所给予的巨大援助和中国人民志愿部队的英勇斗争，提高了我们朝鲜人民的胜利信心。我们将进一步巩固中、朝两国人民的友谊，并决心将美帝国主义武装侵略者驱逐出我国疆土。为了全世界劳苦大众与妇女的完全自由、解放和新中国建设事业更辉煌的成就，谨祝您万寿无疆。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f028ebf251"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
