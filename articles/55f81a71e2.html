,"authors":[],"dates":[{"year":1971,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"毛主席教导我们:“凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。革命的阶级是这样，反革命的阶级也是这样。”“天才史观”是刘少奇一类骗子为篡党篡政而制造的反革命舆论，是他们妄图颠覆无产阶级专政，复辟资本主义的理论纲领。因此，我们一定要站在阶级斗争、路线斗争的高度，从政治上戳穿这伙骗子在“天才史观”上耍弄的反革命阴谋。我们欢迎各条战线的革命同志，都来写批判“天才史观”的文章。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55f81a71e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
