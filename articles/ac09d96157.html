966,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们听了党的八届十一中全会公报的大喜讯，千言万语都变成了口号声:“中国共产党万岁!”“毛主席万岁!万万岁!”毛主席啊!即使把世界上所有的树变成了笔，把世界上所有的水变成了墨，也写不尽我们革命群众对您的深厚感情!"},{"type":"paragraph","text":"毛主席，您是我们的带路人。自从党的八届十中全会以来，在四年的时间中，我们又取得了反帝反修的伟大胜利，战胜了严重的自然灾害，出现了各行各业的全面大跃进的新局面。在您的正确领导下，我们在文化大革命的运动中，活学活用毛主席著作，使我们的运动越来越健康，取得的胜利越来越大。这一切的一切，都完全证明了您一再教导我们的阶级斗争一抓就灵的真理。这一切的一切，也反复地证明了毛泽东思想是放之四海而皆准的真理。我们一定要更高地举起毛泽东思想的伟大红旗，从胜利走向新的胜利!"},{"type":"paragraph","text":"中国共产党的领导是我们取得一切胜利的根本保证。文化大革命的实践告诉了我们，没有党的领导，我们的运动就不可能健康地向前发展；没有党的领导，我们对牛鬼蛇神的斗争就不会这样有理有利有节!我们一次又一次学习了毛主席著作，一次又一次讨论了十六条，一次又一次向牛鬼蛇神展开了无情的斗争。我们真正认识到，我们热爱党就要坚决拥护党，我们热爱党就要保证党的绝对领导，我们热爱党就要忠实执行党的政策，我们热爱党就要紧紧地团结在党的周围!我们要在党的领导下，彻底完成一斗二批三改的战斗任务，彻底闹革命，取得彻底的胜利!"},{"type":"paragraph","text":"我们决心把我们的学校和剧团办成毛泽东思想的大学校，做文化大革命的闯将，做毛主席的好学生!"},{"type":"paragraph","text":"上海市戏曲学校"},{"type":"paragraph","text":"上海青年京昆剧团　全体革命群众"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac09d96157"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
