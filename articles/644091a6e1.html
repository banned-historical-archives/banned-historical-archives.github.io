ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"转发山东省委关于抗旱夏种的紧急通知的批语","alias":"","parts":[{"type":"paragraph","text":"转发山东省委关于抗旱夏种的"},{"type":"paragraph","text":"紧急通知的批语"},{"type":"paragraph","text":"（1955年7月2日）小平同志："},{"type":"paragraph","text":"此件请转发河南、陕西两省委作参考。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月二日[1]小平，即邓小平，当时任中共中央秘书长、国务院副总理。"},{"type":"paragraph","text":"[2]指中共山东省委1955年6月29日关于当前抗旱夏种给所属地、市委并报中央的紧急通知。通知指出，目前全省灾情严重，已播的春苗缺水枯萎，如再有半月持续不雨，将造成大旱。因此要求在一切旱灾地区，全力突击抗旱播种。地、县委负责同志要深入灾区，大力发动群众，坚定干部群众的抗旱信心。同时要积极准备播种晚秋作物，力争减少损失。省委决定增拨各地抗旱贷款一百万元，专款专用。责成各地供销社大力收购晚秋作物种子，以保证晚秋作物及时播种。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":7,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":184,"page_end":184},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"644091a6e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
