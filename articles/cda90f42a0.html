dates":[{"year":1972,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋、倪志福同志会见日本长野县工人、农民友好访华团"},{"type":"paragraph","text":"新华社一九七二年六月二十六日讯  中共中央委员华国锋，中共中央委员、北京市工代会负责人倪志福，今天晚上会见了以清水勇为团长、菅沼正久为副团长、松本章为秘书长的日本长野县工人、农民友好访华团全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，有关方面负责人杨立功、王晓云、张雨、宋昌基等在座。"},{"type":"paragraph","text":"日本长野县工人、农民友好访华团是六月二十三日到达北京的。"},{"type":"paragraph","text":"在来北京前，客人们已经访问了广州、上海、长沙、韶山、大寨等地。（附图片）"},{"type":"paragraph","text":"这是会见时合影。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cda90f42a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
