青"],"dates":[{"year":1967,"month":1,"day":22}],"is_range_date":false,"parts":[{"text":"江青谈“北京日报”问题","type":"title"},{"text":"江青","type":"authors"},{"text":"〖1月22日晚在人民大会堂小礼堂开的一个会上，代表谈到北航《红旗》、北工大“东方红”的一些同志在《北京日报》问题上的错误，并提出尖锐批评。江青同志听完以后讲了话。下面是江青同志讲话的两种记录稿，基本精神完全一致。〗","type":"appellation"},{"text":"记录稿一：","type":"subtitle"},{"text":"江青同志说：","type":"paragraph"},{"text":"我们相信通过一场辩论，你们就能团结，能够大联合的。","type":"paragraph"},{"text":"我想讲一点，几个会上都碰上这个问题，你们想抓报纸，我们为了维持《人民日报》，《解放军报》还有《红旗》杂志的版面，我们就费了很大力气了。你们有小报，可以出嘛。《北京日报》不用办了吧！你们办几个月就办死了（戚本禹：就死了一半了）不要进去了，不要去抓这几张报纸。让他们停止，不出这几张报纸。我们意见是让他们搞文化大革命，让编辑老爷下去，与工农兵结合，我看就不要再参与了。你们自己的报纸很好嘛！比如《兵团战报》，清华的《井冈山》，但可能走上斜路。","type":"paragraph"},{"text":"记录稿二：","type":"subtitle"},{"text":"江青同志说：","type":"paragraph"},{"text":"我想讲一点，时间很晚了，明天再开会。你们对报纸兴趣很大，想抓几个报纸，我们维持《人民日报》这一版面就够辛苦了，我们为了《人民日报》、《解放军报》、《红旗》化费了很多精力，你们的小报还少吗？你们搞《北京日报》，我看过几天，就成架架了。（陈伯达插说：它出来就死了一半了）。你们小报办的很活泼，不要搞那些报纸了，让那些编辑老爷去搞文化大革命，下去和工农相结合，你们不要去搞那些东西了，我们赞成这些报纸停，不要消耗这些精力。","type":"paragraph"}],"comments":[],"origin":"来源：1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（1）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"jqjianghua","type":"pdf","name":"江青十年讲话汇编","internal":false,"official":false,"author":"江青，本世纪初国内老左编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/jqjianghua.pdf"],"article":{"title":"江青谈“北京日报”问题","description":"","dates":[{"year":1967,"month":1,"day":22}],"parts":[{"text":"江青谈“北京日报”问题","type":"title"},{"type":"paragraph","text":"〖1月 22日晚在人民大会堂小礼堂开的一个会上，代表谈到北航《红旗》、北工大“东方红”的一些同志在《北京日报》问题上的错误，并提出尖锐批评。江青同志听完以后讲了话。下面是江青同志讲话的两种记录稿，基本精神完全一致。〗"},{"type":"appellation","text":"记录稿一：江青同志说："},{"type":"paragraph","text":"我们相信通过一场辩论，你们就能团结，能够大联合的。我想讲一点，几个会上都碰上这个问题，你们想抓报纸，我们为了维持《人民日报》，《解放军报》还有《红旗》杂志的版面，我们就费了很大力气了。你们有小报，可以出嘛。《北京日报》不用办了吧！你们办几个月就办死了（戚本禹：就死了一半了）不要进去了，不要去抓这几张报纸。让他们停止，不出这几张报纸。我们意见是让他们搞文化大革命，让编辑老爷下去，与工农兵结合，我看就不要再参与了。你们自己的报纸很好嘛！比如《兵团战报》，清华的《井冈山》，但可能走上斜路。"},{"type":"appellation","text":"记录稿二：江青同志说："},{"type":"paragraph","text":"我想讲一点，时间很晚了，明天再开会。你们对报纸兴趣很大，想抓几个报纸，我们维持《人民日报》这一版面就够辛苦了，我们为了《人民日报》、《解放军报》、《红旗》化费了很多精力，你们的小报还少吗？你们搞《北京日报》，我看过几天，就成架架了。（陈伯达插说：它出来就死了一半了）。你们小报办的很活泼，不要搞那些报纸了，让那些编辑老爷去搞文化大革命，下去和工农相结合，你们不要去搞那些东西了，我们赞成这些报纸停，不要消耗这些精力。"}],"comment_pivots":[],"is_range_date":false,"authors":["江青"],"comments":[],"page_start":246,"page_end":246,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a026b1d412"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
