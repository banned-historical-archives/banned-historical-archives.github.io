art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚定不移地落实毛主席最新指示","authors":["张启良","装甲兵首次学习毛主席著作积极分子代表大会代表/驻密云县河南寨公社支农小组代表"],"parts":[{"type":"paragraph","text":"我们最最幸福的时刻来到了！我们见到了无产阶级的伟大导师、我们心中最红的红太阳毛主席！千言万语迸发出一个声音：敬祝毛主席万寿无疆！万寿无疆！！"},{"type":"paragraph","text":"毛主席啊，毛主席！当我们怀着对您老人家无限忠诚的心情，为保卫您的革命路线走向支农第一线的时候，我们小组全体同志立下了战斗誓言：生为捍卫您的无产阶级革命路线而战斗，死为捍卫您的无产阶级革命路线而献身。在阶级斗争大风浪中遇到困难的时候，我们遵循您的教导，顶狂风，战恶浪，争取了胜利。您的光辉思想给了我们无穷的力量。"},{"type":"paragraph","text":"毛主席啊，毛主席！您的最新指示是无产阶级专政下继续进行革命的伟大纲领，是我们夺取无产阶级文化大革命全面胜利的根本保证。我们每前进一步，都是落实您的最新指示的结果。我们按照您的指示，大办毛泽东思想学习班，条条落实您的最新指示。如今的河南寨公社，红旗漫卷似长龙，《东方红》歌声震长空，贫下中农万炮齐轰中国赫鲁晓夫，热气腾腾闹春耕。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。毛主席啊，毛主席！我们决心坚定不移地落实您的最新指示，夺取无产阶级文化大革命的全面胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66fb352ea7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
