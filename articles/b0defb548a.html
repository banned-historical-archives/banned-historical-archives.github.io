tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东手书精选》影印线装本出版","authors":[],"parts":[{"type":"paragraph","text":"新华社北京12月25日电由中国档案出版社和浙江富阳华宝斋古籍书社联手出版的我国首部《毛泽东手书精选》宣纸影印线装本今天出版发行。"},{"type":"paragraph","text":"由中央档案馆主编的《毛泽东手书精选》再现了毛泽东从童年到晚年有代表性的手书精品，有铅笔、钢笔、毛笔的各种书法和书信、电文、诗词、手稿、文件、题字、读书笔记、看书时的批注等内容，很多文献是第一次与读者见面。此书对人们了解和研究毛泽东一生思想业绩和书法风格具有十分珍贵的价值。"},{"type":"paragraph","text":"此书由浙江富阳古籍印刷厂承印。他们对古籍宣纸的用材、制版、印刷、装订等各个环节都作了精心研究。在采用传统造纸工艺同时，还吸收高科技成果。因此，这部珍贵书籍有很高的珍藏价值。"},{"type":"paragraph","text":"据悉，今天在北京举行了《毛泽东手书精选》首发式，并向国家图书馆、北大、清华等高校赠书。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0defb548a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
