art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席声明把黑人斗争提高到国际水平","authors":[],"parts":[{"type":"paragraph","text":"新华社哈瓦那十一日电 目前侨居古巴的著名美国黑人领袖罗伯特·威廉今天在单独接见新华社记者时说：“美国黑人的斗争是全世界巨大的革命浪潮的一部分。”"},{"type":"paragraph","text":"他说，“毛主席支持黑人反对种族歧视的正义斗争的声明把这个斗争提高到了国际水平。这个声明使蒙受残酷压迫的美国黑人感受到他们不再是孤立无援了。声明使人们增强战斗性，鼓舞着更广大的人们接受自卫的政策。这个声明是意义重大的，因为它使得美国黑人进一步把自己同全世界的解放斗争结合起来。”"},{"type":"paragraph","text":"罗伯特·威廉说：“求生存的天性要求黑人进行了武装自卫……非暴力已经失败了，越来越多的美国黑人群众将进行自卫。这种前景吓坏了美国的权力结构，因为他们知道，这样一种斗争在广泛的基础上展开之后，就会完全摧毁种族主义的帝国主义制度。”"},{"type":"paragraph","text":"这位美国黑人领袖说：“所谓的民权法案是有史以来美国政府对被压迫和被剥夺人权的人民的最大的骗局之一。”他又说，“野蛮、暴力、欺骗、诡计、不道德、侵略主义、沙文主义、恐怖、种族主义和倒行逆施，构成所谓美国生活方式的本质。……”"},{"type":"paragraph","text":"他说：“民权法案是一个骗局，旨在减弱美国黑人争取人权的革命运动的压力和欺骗全世界有色人种，企图使他们误信美国政府是主张维护一切人的人权的。”"},{"type":"paragraph","text":"罗伯特·威廉最后说：“广大的美国黑人群众已经从惨痛的经验中吸取了教训，他们愤慨地表示，能够用和平手段争来的果实是微不足道的。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa938e446d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
