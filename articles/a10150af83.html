r":1971,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"活学活用毛泽东思想的带头人"},{"type":"paragraph","text":"在今年八月召开的四川省党的第二次代表大会上，有一位翻身奴隶被选为省委委员。这就是美姑县瓦里沟社革命领导小组组长、共产党员吉牛布哈。"},{"type":"paragraph","text":"一九六四年，瓦里沟社开始学大寨。吉牛布哈想：大寨精神是毛泽东思想培育出来的，学大寨首先要用毛泽东思想教育人。在他的倡议下，社干部和民兵骨干首先组成了毛主席著作学习小组，带头学习“老三篇”。开始，吉牛布哈不懂汉话，不识汉字，他就一字一句地请人教。经过半年时间，就能通读“老三篇”，并且陆续学会了一百多条语录。"},{"type":"paragraph","text":"在学大寨的初期，吉牛布哈和社领导班子的成员商量，决定治理一块光长草不出粮的“烂泥凼”。不料，一个反动奴隶主却跳了出来，胡说这是块“神地”，谁动了它，不死也得脱层皮。一些有迷信思想的人听他这一说，也有点动摇了。吉牛布哈意识到，这是阶级敌人妄图破坏学大寨的群众运动。他带着问题认真学习了毛主席教导：“凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对。”决定抓住这件事教育群众，打击敌人。他和社的领导成员海来石古首先跳进“烂泥凼”，翻身奴隶也一个个地跟着跳下去。第一仗打响了，人没死一个，皮没少一块。他们把那个反动奴隶主揪到现场，狠狠地进行了批斗，使翻身奴隶受到了深刻阶级教育。"},{"type":"paragraph","text":"在吉牛布哈的带动下，社领导班子的九个成员，有五个是活学活用毛泽东思想积极分子。全社过去没有读过书、不会讲汉话的一百五十二个成年人，已有一百二十多人能通读或者背诵“老三篇”。　（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a10150af83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
