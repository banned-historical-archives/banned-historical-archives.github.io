tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向支左爱民模范李文忠学习（对口词）","authors":["南海舰队毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"大海航行靠舵手，"},{"type":"paragraph","text":"干革命靠毛泽东思想。"},{"type":"paragraph","text":"支左爱民模范排，"},{"type":"paragraph","text":"支左爱民模范李文忠，"},{"type":"paragraph","text":"响亮的名字，"},{"type":"paragraph","text":"光荣的称号，"},{"type":"paragraph","text":"象春风吹遍大江南北，"},{"type":"paragraph","text":"象春雷震动了九重云霄。"},{"type":"paragraph","text":"英雄排长李文忠，"},{"type":"paragraph","text":"破私立公，"},{"type":"paragraph","text":"努力把世界观改造。"},{"type":"paragraph","text":"紧跟伟大领袖毛主席，"},{"type":"paragraph","text":"永远向前决不动摇。"},{"type":"paragraph","text":"毛泽东思想是他们的灵魂，"},{"type":"paragraph","text":"毛泽东思想统帅他们生命的一分一秒。"},{"type":"paragraph","text":"英雄的四排真正做到："},{"type":"paragraph","text":"毛主席热爱我热爱，"},{"type":"paragraph","text":"毛主席支持我支持，"},{"type":"paragraph","text":"毛主席指示我照办，"},{"type":"paragraph","text":"毛主席挥手我前进。"},{"type":"paragraph","text":"忠实宣传毛泽东思想，"},{"type":"paragraph","text":"勇敢捍卫毛主席的革命路线。"},{"type":"paragraph","text":"他们立场坚定，"},{"type":"paragraph","text":"旗帜鲜明，"},{"type":"paragraph","text":"不怕困难，"},{"type":"paragraph","text":"敢担风险，"},{"type":"paragraph","text":"和革命左派战斗在一起，"},{"type":"paragraph","text":"流血牺牲也心甘情愿。"},{"type":"paragraph","text":"护送红卫兵小将，"},{"type":"paragraph","text":"在赣江遇险。"},{"type":"paragraph","text":"英雄排长李文忠，"},{"type":"paragraph","text":"临危不惧与激流奋战。"},{"type":"paragraph","text":"为抢救红卫兵小将，"},{"type":"paragraph","text":"用生命写下了壮丽的诗篇。"},{"type":"paragraph","text":"象雷锋，"},{"type":"paragraph","text":"象王杰，"},{"type":"paragraph","text":"象董存瑞，"},{"type":"paragraph","text":"象刘胡兰，"},{"type":"paragraph","text":"永远活在亿万人民心间。"},{"type":"paragraph","text":"李文忠，"},{"type":"paragraph","text":"你光辉的名字，"},{"type":"paragraph","text":"永远金光灿烂；"},{"type":"paragraph","text":"支左爱民模范排，"},{"type":"paragraph","text":"英雄的名字代代传。"},{"type":"paragraph","text":"学习你，"},{"type":"paragraph","text":"李文忠，"},{"type":"paragraph","text":"无限忠于毛主席，"},{"type":"paragraph","text":"无限忠于毛泽东思想，"},{"type":"paragraph","text":"无限忠于毛主席的革命路线。"},{"type":"paragraph","text":"学习你，"},{"type":"paragraph","text":"李文忠，"},{"type":"paragraph","text":"“完全”“彻底”为人民，"},{"type":"paragraph","text":"一个“公”字记心间。"},{"type":"paragraph","text":"学习你，"},{"type":"paragraph","text":"李文忠，"},{"type":"paragraph","text":"活学活用毛主席著作，"},{"type":"paragraph","text":"立竿见影；"},{"type":"paragraph","text":"执行毛主席指示，"},{"type":"paragraph","text":"雷厉风行，"},{"type":"paragraph","text":"斗私批修当模范，"},{"type":"paragraph","text":"向“私”字展开进攻战。"},{"type":"paragraph","text":"沿着毛主席指引的道路，"},{"type":"paragraph","text":"向前，向前，向前！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82fe4afed2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
