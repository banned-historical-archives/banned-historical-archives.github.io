art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们伟大的领袖毛主席在抗日战争时期","authors":[],"parts":[{"type":"paragraph","text":"毛主席在党的第七次全国代表大会上 抗日战争胜利前夜，毛主席在党的第七次全国代表大会上作《论联合政府》的政治报告，指出了决定中国抗战胜利和战后中国命运的道路。"},{"type":"paragraph","text":"毛主席在工作中 毛主席在延安指导着中国革命和抗日战争，并且写了一系列的重要著作。这是毛主席在杨家岭住室工作。"},{"type":"paragraph","text":"毛主席和杨家岭农民 在那艰苦的岁月里，毛主席非常关心群众生活，经常到群众中访问，并帮助群众解决生产和生活问题。这是毛主席和延安杨家岭农民亲切交谈。"},{"type":"paragraph","text":"毛主席在抗大作报告 毛主席领导我们战胜重重困难，和全国人民同甘共苦，从胜利走向胜利。这是毛主席在给抗日军政大学作报告。"},{"type":"paragraph","text":"毛主席在延河边 党中央和毛主席在延安领导全国人民进行抗战，延安成为全国人民心目中的灯塔。这是毛主席在延河边上。"},{"type":"paragraph","text":"毛主席和小八路 我们的军队是毛主席亲手缔造的，每个指战员都是在毛泽东思想哺育下成长起来的。这是毛主席和小八路亲切谈话。"},{"type":"paragraph","text":"（本版照片均系中国人民革命军事博物馆、解放军画报社供稿）RW：毛泽东活动；图片；抗日战争"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9727cb85cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
