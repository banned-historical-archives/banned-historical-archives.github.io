引起部分物品价格上扬","authors":[],"dates":[{"year":1951,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"川南各地发现工商业者“加价捐献” 引起部分物品价格上扬","type":"title"},{"text":"【西南总分社二十六日讯】川南泸县、宜宾、内江各地最近发现工商业者把捐献数字加入成本中，将增产捐献变为“加价捐献”。致使某些货品价格无形提高。宜宾百货公司最近连续接到一些私商的要求，希望公司把批发和零售间的差价放长些，以便将所得利润扣除“增产捐献”数字。该公司与民安火柴厂订购一批火柴，该厂亦在每箱火柴成本中（每箱一百零六万元）加价一万元。泸县福集场木机织户也在成本中加价，致使该地土布价格上扬。内江某些糖商亦在每包糖的成本中加价二万元作为“抗美援朝捐献款”。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1951年10月27日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5abe18ea25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
