art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟伟大领袖毛主席革命到底","authors":["学习毛主席著作积极分子/空军某部政治处副主任丰福生"],"parts":[{"type":"paragraph","text":"北京又一次传来了特大喜讯：我们最最敬爱的伟大领袖毛主席的亲密战友林副主席，为海军首次学习毛主席著作积极分子代表大会题了词。我们热烈欢呼！我们尽情歌唱！林副主席的题词不仅是对海军最大的关怀，也是对全党、全军、全国人民最大的关怀。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。林副主席的题词，说出了亿万人民的心里话。林副主席最关心我们，最了解我们，和我们心连心。"},{"type":"paragraph","text":"象我这样一个旧社会的放牛娃，在旧社会有谁把我当人，是伟大的领袖毛主席使我摆脱了苦难，是光焰无际的毛泽东思想哺育我成长为革命战士。我的一切都是毛主席给的。在我们国家里，象我这样在毛主席领导下翻身解放，在毛泽东思想哺育下成长的革命战士，何止千千万万。今天毛主席又领导我们进行无产阶级文化大革命，夺取社会主义革命的彻底胜利，向共产主义奋勇进军。我从切身经历中体会到，毛主席的领导，一万万个英明，一万万个正确！跟着毛主席就是光明，跟着毛主席就是幸福，跟着毛主席就是胜利！"},{"type":"paragraph","text":"我下定决心，坚决响应林副主席的伟大号召，一辈子不忘毛主席的恩情，一辈子学习毛主席著作，一辈子斗私批修，一辈子寸步不离地紧跟伟大领袖毛主席，把中国革命进行到底，把世界革命进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a63706772"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
