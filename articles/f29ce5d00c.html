<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"文化部关于继续执行剧本上演报酬制度的通知","authors":[],"dates":[{"year":1963,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"文化部关于继续执行剧本上演报酬制度的通知（63）文艺平字第1250号","type":"title"},{"text":"各省、市、自治区文化局（厅）：","type":"appellation"},{"text":"关于付给剧作者剧本上演报酬的问题，最近各地都比较关心，纷纷来函询问，有些地区还提出了一些问题和意见。现特作补充通知如下：","type":"paragraph"},{"text":"一、全国各地在1956年前就是国营的“老国营”剧团仍应继续执行文化部在1956年12月发出的“关于国营剧团试行付给剧作者剧本上演报酬的通知”（见文沈艺戏字第252号）。过去由于各种原因停止付给上演报酬的国营剧团自1963年起应一律按照“通知”所规定的办法付给剧作者上演报酬。1963年以前未付给作者的上演报酬，因为过去许多剧团这方面的制度很不健全，清算困难，是否补发，由各省、市自行决定。","type":"paragraph"},{"text":"二、1956年以后新建立的省、市、自治区级的国营剧团，也属于付给上演报酬的规定范围之内。应按照“通知”所规定办法付给剧作者上演报酬。专（市）县国营剧团情况比较复杂，目前可以暂不付给上演报酬。","type":"paragraph"},{"text":"三、原来是民间职业剧团在1956年以后改为国营的剧团，以及现在所有制属于集体经营的剧团，不在付给上演报酬的规定范围之内。","type":"paragraph"},{"text":"四、各地在执行上演报酬制度当中，对我部所发的“通知”，曾提了一些修改意见，现在正进行研究。各地如果还有具体修改意见，请在今年年底以前向我们提出，以便着手制订正式的剧本上演报酬条例。","type":"paragraph"},{"text":"抄送：中宣部，国务院二办，文联及剧协，总政文化部，广播事业局，全总宣传部，铁道部文教局，煤炭工业部办公厅，各直属剧院","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"文化部关于继续执行剧本上演报酬制度的通知","authors":[],"dates":[{"year":1963,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"文化部关于继续执行剧本上演报酬制度的通知","type":"title"},{"text":"各省、市、自治区文化局（厅）：","type":"appellation"},{"text":"关于付给剧作者剧本上演报酬的问题，最近各地都比较关心，纷纷来函询问，有些地区还提出了一些问题和意见。现特作补充通知如下：","type":"paragraph"},{"text":"一、全国各地在1956年前就是国营的“老国营”剧团仍应继续执行文化部在1956年12月发出的“关于国营剧团试行付给剧作者剧本上演报酬的通知”（见文沈艺戏字第252号）。过去由于各种原因停止付给上演报酬的国营剧团自1963年起应一律按照“通知”所规定的办法付给剧作者上演报酬。1963年以前未付给作者的上演报酬，因为过去许多剧团这方面的制度很不健全，清算困难，是否补发，由各省、市自行决定。","type":"paragraph"},{"text":"二、1956年以后新建立的省、市、自治区级的国营剧团，也属于付给上演报酬的规定范围之内。应按照“通知”所规定办法付给剧作者上演报酬。专（市）县国营剧团情况比较复杂，目前可以暂不付给上演报酬。","type":"paragraph"},{"text":"三、原来是民间职业剧团在1956年以后改为国营的剧团，以及现在所有制属于集体经营的剧团，不在付给上演报酬的规定范围之内。","type":"paragraph"},{"text":"四、各地在执行上演报酬制度当中，对我部所发的“通知”，曾提了一些修改意见，现在正进行研究。各地如果还有具体修改意见，请在今年年底以前向我们提出，以便着手制订正式的剧本上演报酬条例。","type":"paragraph"},{"text":"抄送：中宣部，国务院二办，文联及剧协，总政文化部，广播事业局，全总宣传部，铁道部文教局，煤炭工业部办公厅，各直属剧院","type":"paragraph"},{"text":"（原载中华人民共和国文化部办公厅《文化工作文件资料汇编 （二）》， 北京：[内部出版]，1988年12月）","type":"appellation"}],"comments":[],"origin":"原载中华人民共和国文化部办公厅《文化工作文件资料汇编 （二）》， 北京：[内部出版]，1988年12月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f29ce5d00c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
