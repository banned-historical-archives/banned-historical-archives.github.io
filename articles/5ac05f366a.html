,"authors":[],"dates":[{"year":1957,"month":1,"day":24}],"is_range_date":false,"parts":[{"text":"最近两个多月来合肥有六个单位发生工人集体请愿事件","type":"title"},{"text":"新华社合肥２４日讯  合肥市动力机电厂、鉄工厂、金笔厂等六个单位，最近两个多月先后发生了工人集体请愿、停工等事件。这些工人中絶大部分是上海迁来的。","type":"paragraph"},{"text":"发生这些事件的主要原因：（一）上海、合肥两地工人工资悬殊太大，如合肥鉄工厂三级工人在合肥工资是四十二元，在上海是六十三元。（二）从上海迁来的工人有些不切实际的要求。合肥新建的工厂条件差，工人要求的住房、家属就业、交通、子女就学等问题，暂时不能解决，有些工厂对工人关心和説服不够。（三）工厂党组织领导薄弱，对工人进行正面的思想教育少。","type":"paragraph"},{"text":"现在，市委已经对从上海调来的工人的工资进行了适当调整。（秦聿震）","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参攷》第2113期，1957年1月24日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ac05f366a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
