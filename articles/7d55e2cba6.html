art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席到达额不里","authors":[],"parts":[{"type":"paragraph","text":"新华社额不里23日电 中华人民共和国主席刘少奇和夫人王光美以及他们的随行人员今天上午乘专机从东枝到达额不里。"},{"type":"paragraph","text":"额不里是缅甸西南海岸的海滨休养地，这里有美丽的椰子树海滩。贵宾们将在这里休息两天。"},{"type":"paragraph","text":"当他们在奈温主席和夫人的陪同下到达额不里机场时，他们受到缅中军区司令盛温准将、亚拉干地区联合部队司令拉敏中校、亚拉干海军地区司令貌貌钦中校以及当地高级军政官员的欢迎。"},{"type":"paragraph","text":"昨晚在东枝，缅东军区司令貌瑞在司令部的花园里设便宴，招待刘少奇主席和夫人。除了中国贵宾之外，在座的还有：掸邦事务委员会主席吞埃、掸邦事务委员会委员吴旺佩、军事参谋学院院长吴丁貌上校以及其他高级军政官员。"},{"type":"paragraph","text":"在装饰着彩色电灯和汽球的幽雅的花园里，喜气洋洋，处处可以听到在欢笑声中的友好交谈。晚宴后，举行了掸邦各民族的民间舞蹈表演。在民族乐器的伴奏下，动作简易的舞蹈生动地显示出多民族聚居的掸邦的五彩缤纷的民族服装、文化和劳动生活。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d55e2cba6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
