s":[{"year":1960,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张春桥举行酒会"},{"type":"paragraph","text":"欢迎拉丁美洲八国文化代表团"},{"type":"paragraph","text":"新华社上海21日电　中国人民对外文化协会上海市分会会长、中国拉丁美洲友好协会在上海理事张春桥今晚举行酒会，欢迎来自拉丁美洲的秘鲁、哥伦比亚、玻利维亚、乌拉圭、阿根廷、巴拿马、智利、多米尼加等八个国家的文化代表团。"},{"type":"paragraph","text":"中国人民保卫世界和平委员会上海市分会副主席石西民出席了酒会。"},{"type":"paragraph","text":"酒会在热烈友好的气氛中进行。上海市文化界人士和拉丁美洲的朋友们热情地即席作诗歌唱，歌颂中国人民和拉丁美洲人民之间的深厚友谊、歌颂反对美帝国主义斗争的胜利。"},{"type":"paragraph","text":"出席今晚酒会的，还有中国人民对外文化协会上海市分会副会长张骏祥、秘书长袁冬林、副秘书长曹舜琴等。"},{"type":"paragraph","text":"拉丁美洲八个国家文化代表团是在18日由武汉乘船来上海的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47f39613a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
