":[{"year":1962,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿联经济部次长"},{"type":"paragraph","text":"指责帝国主义国家剥削非洲"},{"type":"paragraph","text":"新华社开罗15日电　阿联经济部次长阿卜杜勒·穆奈姆·班纳14日在这里指责欧洲“共同市场”国家剥削非洲国家。他说，欧洲“共同市场”国家对非洲进出口的垄断，将只能成为在非洲国家建立任何工业的巨大障碍。"},{"type":"paragraph","text":"他说，欧洲“共同市场”成员国以低价从非洲国家进口原料，而以高价向非洲国家输出用这种原料制成的商品。"},{"type":"paragraph","text":"他说，“帝国主义国家在许多非洲国家执行的只是对它们自己有利的发展计划。”"},{"type":"paragraph","text":"新华社开罗14日电　阿联经济部长凯舒尼在访问了德意志民主共和国、意大利和英国之后，13日晚回到开罗。"},{"type":"paragraph","text":"他在机场谈到他在这些国家举行会谈的结果时说，阿联同德意志民主共和国签订了一项议定书，根据这项议定书，在今年夏季缔结一项新的三年长期协定之前，两国间目前的贸易和支付协定继续有效。"},{"type":"paragraph","text":"他谈到他同英国举行的关于实施有关的协定的会谈时说，“根据这些协定，英国将从阿联输入不超过它向阿联输出总额的50％的棉花。阿联将用长期分期付款的办法支付差额。”他还说：“我们还讨论了将由英国公司建造南开罗发电站的协定。”凯舒尼说，阿联还同意大利签订了一项新的棉花协定。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31b1b797fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
