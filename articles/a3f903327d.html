ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"关于研究马克思主义的方法的批语","alias":"","parts":[{"type":"paragraph","text":"关于研究马克思主义的方法的批语！"},{"type":"paragraph","text":"（1958年6月12日）"},{"type":"paragraph","text":"陈伯达?同志阅。研究马克思主义也要用这两位青年的方法，就是为解决迫切问题而去跑图书馆。列宁为了批判一九○五年革命失败后在俄国党内兴起的有神论（卢那察尔斯基、波格丹诺夫）而去系统地研究哲学史，写出了《唯物论与经验批评（判）论》，费了巨大的精力。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十二日"},{"type":"paragraph","text":"[1]这个批语写在1958年6月11日《光明日报》上，该日《光明日报》第一版在“东风强来西风弱，真正英雄看今天”的通栏标题下，刊载了两篇文章：《消灭“沙门氏菌”的马国荣》和《孙守纲制成质量超过英国的“硅胶”》。《消灭“沙门氏菌”的马国荣》一文，介绍了只上过两年大学的天津仁立食品厂青年技术员马国荣，针对蛋制品中的“沙门氏菌”问题，从学习入手，利用空闲时间跑书店、图书馆，找有关细菌、微生物和医学方面的书籍阅读，并结合实际开展研究，经过一年多的刻苦钻研和322次试验，创造出了“真空充氮处理法”，消灭蛋品中的“沙门氏菌”，解决了国际市场上多年没有解决的问题。《孙守纲制成质量超过英国的“硅胶”》一文，介绍了天津市供电局修理试验所21罗的化验工孙守纲不畏困难，在4年多的时间里跑图书馆、查技术资料，经过多次试验，制成质量超过英国和日本的优质“硅胶”的事迹。"},{"type":"paragraph","text":"[2]陈伯达，当时任中共中央政治研究室主任、《红旗》杂志总编辑。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":401,"page_end":401},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3f903327d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
