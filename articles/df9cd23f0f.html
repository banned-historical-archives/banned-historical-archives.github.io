"authors":[],"dates":[{"year":1960,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“笑容”是凶相的伪装  “援助”是剥削的别名"},{"type":"paragraph","text":"智共“世纪报”揭露美国的侵略嘴脸"},{"type":"paragraph","text":"本报讯　智利共产党报纸“世纪报”最近发表文章，揭露美国对拉丁美洲政策的侵略实质。"},{"type":"paragraph","text":"文章指出，“现在美国政府想对拉丁美洲国家装出更带笑容，更为慈祥的‘另一副嘴脸’，并且声称它将增加美元的‘援助’，甚至连艾森豪威尔本人也将到南美来访问。但是确实的情况是，增加‘援助’只意味着帝国主义加紧对我们这些国家的控制和剥削。无论如何，拉丁美洲的人民已准备击退这样的阴谋，不放松反对共同敌人的斗争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df9cd23f0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
