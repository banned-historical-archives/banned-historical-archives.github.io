s":[],"dates":[{"year":1972,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e龙江大队党支部书记江水英带着县委关于堵江抗旱的决定，乘东风，驾轻舟，赶回龙江村。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“为革命再大的牺牲也要承当。”在大坝合龙的关键时刻，突然发生塌方，老贫农阿坚伯决心把本队烧窑的柴草用来抢救塌方，保证合龙。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“脚跟站田头，心向红太阳”。团支部书记阿莲，朝气蓬勃地战斗在大坝工地上。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e江水英在支援旱区的战斗中，访问了老贫农盼水妈，查清了阶级敌人黄国忠的历史。她临行时充满胜利信心地对盼水妈说:“龙江甜水一定及时流到后山!”\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在江水英的耐心帮助下，李志田认识了自己的错误，并沉痛地表示:“从此后永不忘阶级斗争，赤胆忠心为人民，奋斗终身!”\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e江水英带领龙江大队社员，以气壮山河的英雄气概，奋战激流，终于筑成巍巍大坝，完成了堵江送水的任务。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在毛泽东思想光辉照耀下，在党的坚强领导下，龙江大队和旱区社队互相支援，创造了大旱年大丰收的奇迹，谱出了一曲共产主义风格的凯歌。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\05\\725o040108.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e江水英当众揭破黄国忠的伪装，使这个死心塌地的反革命分子原形毕露。"},{"type":"paragraph","text":"(本版照片均新华社稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ee5fdc17d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
