，坚决稳妥清查处理“三种人”","authors":[],"dates":[{"year":1985,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"增强党性  清除派性  加强团结"},{"type":"paragraph","text":"云南省第一期整党单位认真进行彻底否定“文革”教育，坚决稳妥清查处理“三种人”"},{"type":"paragraph","text":"本报讯　云南省第一期整党单位进行彻底否定“文化大革命”教育，并坚决稳妥地做好清查处理“三种人”的工作，提高了广大党员消除派性、增强党性的自觉性。"},{"type":"paragraph","text":"云南省是“文革”中的“重灾区”。“左”的影响和流毒尚未肃清，特别是党内存在着严重的派性，对有些地区、部门、单位的整党工作时有干扰。中共云南省委在整党过程中，发现这个问题后，明确提出，要彻底否定“文革”。同时，要求各整党单位通过做大量艰苦细致的工作，从思想、作风、纪律、组织上消除“文革”遗毒。"},{"type":"paragraph","text":"云南省一期整党单位的经验表明，搞好彻底否定“文革”的教育，是抓住了云南省问题的症结和搞好整党工作的关键。开始时，有的单位怕挑起派性，引起再折腾。但事实表明，彻底否定“文革”的教育，是广大党员的自觉要求，不但没有纠缠历史旧账，而是促进了团结，有利于消除派性，增强党性，从而使广大党员认识到云南“文革”中的两派在思想体系、造反方式、宣传口号上都是错误的。一些领导干部也认识到自己盲目地陷入派性，以为自己一贯正确，其实是错误的。"},{"type":"paragraph","text":"在进行彻底否定“文革”教育的同时，云南省委还抓紧核查“三种人”的工作，清查两派中的“三种人”。对于“文革”中两派组织的头头、骨干分子和发生的重大事件，在整党中查清处理。对犯不同性质错误的人采取的方法是：一、犯有错误又不检讨的人，调离要害部门。二、犯有类似“三种人”严重错误，坚持派性，继续进行串连或搞其他派性活动的人，严肃处理。三、“三种人”的处理采取查出一个处理一个的办法。"},{"type":"paragraph","text":"现在，云南省委要求把这一期整党的总结工作做细做好，为第二期整党工作提供可以借鉴的经验。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"834322e2ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
