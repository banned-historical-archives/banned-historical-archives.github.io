script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时马列主义共产党机关刊《光明和被剥削者》发表评论  苏联社会帝国主义是挑动安哥拉内战的祸首  马来西亚报纸谴责苏联破坏各解放组织团结，企图控制安哥拉","authors":[],"dates":[{"year":1975,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时马列主义共产党机关刊《光明和被剥削者》发表评论"},{"type":"paragraph","text":"苏联社会帝国主义是挑动安哥拉内战的祸首"},{"type":"paragraph","text":"马来西亚报纸谴责苏联破坏各解放组织团结，企图控制安哥拉"},{"type":"paragraph","text":"新华社布鲁塞尔一九七五年十一月二十一日电　比利时马克思列宁主义共产党机关刊物《光明和被剥削者》最近一期发表评论指出，苏联社会帝国主义“是安哥拉内战的罪魁祸首”。"},{"type":"paragraph","text":"评论说，安哥拉人民为争取民族独立进行了多年的战斗。安哥拉的三个解放组织都参加了反对葡萄牙殖民者的战争。评论强调指出，“是三个组织而不是单独的一个”参加这场反对殖民主义、争取民族独立的斗争。"},{"type":"paragraph","text":"评论接着指出，安哥拉“是两个超级大国争夺的赌注”。从殖民主义时代起，美帝国主义“曾经通过葡萄牙政府拥有一切决定权”。现在，正是苏联社会帝国主义在安哥拉“施展阴谋诡计，从事破坏活动”。评论问道：否则，怎么解释苏联现在向安哥拉一个解放组织提供的武器“比抗击葡萄牙殖民主义者时期提供的要多”，苏联舰只“怎么会把这些武器运去进攻另外两个抵抗运动”，苏联的外交官员和其他人员“怎么会跑到扎伊尔和乌干达去搞阴谋诡计”呢？"},{"type":"paragraph","text":"评论强调说：“和睦相处是安哥拉爱国者的利益所在”。三个解放组织“显然有更多的理由和睦相处，而不是互相较量”。评论说：是苏联社会帝国主义者在安哥拉“挑起了内战和杀戮”；每当在非洲统一组织支持下达成一项协议时，这个超级大国就肆无忌惮地进行破坏。"},{"type":"paragraph","text":"评论呼吁抛弃对苏联社会帝国主义者的一切幻想，并同他们进行无情的斗争。"},{"type":"paragraph","text":"新华社一九七五年十一月二十二日讯 吉隆坡消息：马来西亚报纸最近发表评论，谴责苏联在安哥拉制造分裂，挑动内战。"},{"type":"paragraph","text":"《星槟日报》十一月二十日的社论说，苏联“在安哥拉三派之间支持一派打击两派，破坏三个组织之间的团结，并把武器运进安哥拉，在内战中火上加油，同时还派遣军事人员到安哥拉指挥作战。”"},{"type":"paragraph","text":"《光华日报》十一月十五日的社论指出：“莫斯科方面不惜违反非洲国家的愿望，充分暴露出它企图控制安哥拉的野心。”"},{"type":"paragraph","text":"《马来亚通报》十一月十九日的社论说，苏联挑动安哥拉内战，目的在于想在这个有战略意义与矿产丰富的安哥拉获取立足地。"},{"type":"paragraph","text":"《南洋商报》十一月十五日的社评说，苏联对安哥拉的插手，“明显地违反安哥拉民族团结意愿和非洲统一组织已决定下来的原则，且受到多数国家的非议”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea44776fe1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
