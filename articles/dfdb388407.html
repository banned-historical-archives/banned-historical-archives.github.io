供认，美国在国外的企业雇用工人三百多万，生产商品三百五十亿美元，每年榨取利润三十亿美元","authors":[],"dates":[{"year":1960,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美帝国主义是最大的国际剥削者"},{"type":"paragraph","text":"美国对外私人投资已达三百亿美元"},{"type":"paragraph","text":"美国商务部调查报告供认，美国在国外的企业雇用工人三百多万，生产商品三百五十亿美元，每年榨取利润三十亿美元"},{"type":"paragraph","text":"新华社11日讯　华盛顿消息：美国商务部今年发表的一份题为《美国在外国的商业与投资》的调查报告表明，美国帝国主义是世界上最大的国际剥削者。"},{"type":"paragraph","text":"商务部的报告说，美国目前在国外的私人直接投资总额达三百亿美元，这个数字约为十年前的两倍半。"},{"type":"paragraph","text":"报告指出，这些资本在国外开设的企业雇用着三百多万各国工人，每年从中榨取三十亿美元以上的利润。"},{"type":"paragraph","text":"报告说，在这三百亿美元的对外私人直接投资中，有一半以上掌握在四十五家美国大垄断企业手中，它们每家都拥有一亿美元以上的国外投资。同时，这三百亿美元中将近四分之三是投放在美国占有95％以上股份的国外企业中。"},{"type":"paragraph","text":"商务部的报告指出，美国在许多国家中拥有的工厂所生产的许多种商品的数量，已经超过从美国向这些国家输出的同类商品的数量。这份报告说，美国在国外拥有的企业所生产的商品总值1957年达三百二十亿美元，目前已增加到约三百五十亿美元。"},{"type":"paragraph","text":"报告说，美国资本的输出在石油工业中最多，目前已超过一百亿美元，同时在机器制造业方面输出的资本也正在迅速增加。"},{"type":"paragraph","text":"报告指出，美国私人国外投资有三分之一以上投在加拿大，投在拉丁美洲的资本只略少于这个数额，美国在欧洲的投资有五十多亿美元。目前，欧洲是美国私人投资增加得最快的地区。"},{"type":"paragraph","text":"美国《商业周刊》在不久前的一期中引用美国商务部的材料指出，美国垄断资本集团由于害怕亚、非、拉丁美洲日益高涨的民族独立运动，同时为了打破西欧国家及其殖民势力范围抵制进口美国商品的壁垒，目前正在增加对西欧的资本输出。《商业周刊》写道，1960年美国机器制造业资本家在国外工厂设备的投资达十三亿美元，比1958年和1959年增加一亿美元。在这十三亿美元中，投到西欧的占44％。其中约有三亿美元投在英国，约有二亿七千万美元投在西欧“共同市场”国家。投在西德的又占美国向“共同市场”国家输出资本的三分之二。据《商业周刊》估计，美国明年向西欧输出的资本还会增加，可能占明年资本输出总额的一半。"},{"type":"paragraph","text":"美国对外私人投资情况"},{"type":"paragraph","text":"（单位：亿美元）"},{"type":"paragraph","text":"年份    国外私人直接投资    所得利润"},{"type":"paragraph","text":"1940     73                  6"},{"type":"paragraph","text":"1945      84                 6"},{"type":"paragraph","text":"1950    118                  16"},{"type":"paragraph","text":"1952    148                  18"},{"type":"paragraph","text":"1953    163                  19"},{"type":"paragraph","text":"1954    176                  22"},{"type":"paragraph","text":"1955    193                  24"},{"type":"paragraph","text":"1956    222                  27"},{"type":"paragraph","text":"1957    253                  29"},{"type":"paragraph","text":"1958    271                  29"},{"type":"paragraph","text":"1959    296                  30"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfdb388407"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
