thors":[],"dates":[{"year":1976,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沿着毛主席的无产阶级文艺路线胜利前进"},{"type":"paragraph","text":"——革命现代京剧《红云岗》剧照"},{"type":"paragraph","text":"贫农女儿英嫂。"},{"type":"paragraph","text":"《人民戏剧》稿"},{"type":"paragraph","text":"第一场：《转移遇敌》"},{"type":"paragraph","text":"为了消灭敌人，我主力部队主动转移外线作战。英嫂和群众转移遇敌，决定暂回村坚持斗争，找机会再上东山。　本报记者摄"},{"type":"paragraph","text":"第三场：《抢救亲人》"},{"type":"paragraph","text":"“战士热血洒青山，人民乳汁救伤员。”英嫂毅然用自己的乳汁救醒解放军某部排长方铁军，并将他掩藏在红云岗。　新华社稿"},{"type":"paragraph","text":"第四场：《情深意长》"},{"type":"paragraph","text":"“续一把蒙山柴炉红火旺，添一瓢沂河水情深意长。”英嫂满怀对子弟兵的深情厚意，为亲人细熬鸡汤。"},{"type":"paragraph","text":"本报记者摄"},{"type":"paragraph","text":"第四场：《情深意长》"},{"type":"paragraph","text":"英嫂识破刁鬼的奸计，机智地甩开敌人，上山为伤员送饭。新华社稿"},{"type":"paragraph","text":"第五场：《军民相依》"},{"type":"paragraph","text":"方铁军在英嫂和群众的掩护、照看下，伤势渐渐好转，盼望尽快重返前方，“为人民求解放痛把敌歼！”　本报记者摄"},{"type":"paragraph","text":"第六场：《一心向党》"},{"type":"paragraph","text":"“咱一心只向共产党，不怕它火焚家舍，刺刀对胸，也要救出子弟兵！”在紧要关头，英嫂教育郑英田勇敢救护亲人解放军。"},{"type":"paragraph","text":"本报记者摄"},{"type":"paragraph","text":"第七场：《重返前方》"},{"type":"paragraph","text":"方铁军勇战还乡团，表现了人民解放军大无畏的英雄气概。"},{"type":"paragraph","text":"本报记者摄"},{"type":"paragraph","text":"第七场：《重返前方》"},{"type":"paragraph","text":"日出蒙山青，沂水颂英雄，乳汁化热血，战士重出征。乡亲们热烈欢送方铁军重返前方。　新华社稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abfafc1c87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
