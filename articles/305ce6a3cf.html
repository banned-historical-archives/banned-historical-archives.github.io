script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对苏修和印度官僚买办资本的残酷剥削  印度波卡罗钢铁厂五千建筑工人示威","authors":[],"dates":[{"year":1969,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对苏修和印度官僚买办资本的残酷剥削"},{"type":"paragraph","text":"印度波卡罗钢铁厂五千建筑工人示威"},{"type":"paragraph","text":"新华社三十一日讯　新德里消息：在印度比哈尔邦由苏修“援助”修建的波卡罗钢铁厂的五千名建筑工人，二十六日举行了罢工和示威。建筑工人发动这次斗争是因为工资太低，生活困苦。"},{"type":"paragraph","text":"在示威发生后，印度反动政府立即派警察前往镇压，逮捕了一百多名工人。"},{"type":"paragraph","text":"波卡罗钢铁厂和苏修“援助”印度反动派修建的其他官办工程一样，是苏修社会帝国主义掠夺印度资源，剥削印度廉价劳动力，倾销苏联产品的重要手段。印度建筑工人在苏修和印度官僚买办资本的残酷剥削下，不断展开要求提高工资的斗争。波卡罗钢铁厂由于苏修设备交运工作一再延误，修建工程进度也一再拖延。按已经修改的计划，第一期工程至少还要延误半年才能完成，到一九七二年六月才可能投入生产。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"305ce6a3cf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
