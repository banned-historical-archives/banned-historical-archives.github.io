国人民正满怀信心在无产阶级专政条件下继续革命的大道上迈进","authors":[],"dates":[{"year":1971,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本著名评论家松冈洋子在东京举行访华报告会"},{"type":"paragraph","text":"热情赞扬中国文化大革命的伟大成就"},{"type":"paragraph","text":"中国人民正满怀信心在无产阶级专政条件下继续革命的大道上迈进"},{"type":"paragraph","text":"新华社讯　东京消息：日本反对军事基地斗争妇女代表团团长、著名评论家松冈洋子最近在东京举行访华报告会。日本各界人士六百多人参加了报告会。"},{"type":"paragraph","text":"松冈在以《文化大革命后去中国旅行》为题的访华报告中，热情赞扬中国人民在毛主席的无产阶级革命路线指引下，在无产阶级文化大革命中取得的伟大成就。"},{"type":"paragraph","text":"她说，在无产阶级文化大革命中，一代完全新型的人正在成长。中国人民通过活学活用毛泽东思想，特别是活学活用毛主席的哲学著作，不断地武装头脑，提高路线斗争觉悟，发挥了巨大的创造性，在各条战线上创造了许多伟大成就。"},{"type":"paragraph","text":"松冈还热情赞扬毛主席亲自缔造和领导的中国人民解放军在无产阶级文化大革命的三支两军工作中做出的重要贡献，并且赞扬他们在落实毛主席《五·七指示》中取得的巨大成就。"},{"type":"paragraph","text":"松冈最后指出，七亿中国人民对帝国主义的侵略阴谋保持高度的警惕，他们正在努力抓革命、促生产、促工作、促战备。中国人民正满怀信心在无产阶级专政条件下继续革命的大道上迈进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b5b440806"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
