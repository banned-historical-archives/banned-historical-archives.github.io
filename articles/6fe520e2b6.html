nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"周恩来接见湖南三方代表讲话(摘要)","parts":[{"type":"title","text":"887.周恩来接见湖南三方代表讲话(摘要)"},{"type":"paragraph","text":"(1967年8月7日凌晨)"},{"type":"paragraph","text":"现在把湖南的形势来分析一下，总的来看，湖南的形势还是大好的，因为一切问题都暴露出来了，暴露的愈彻底，解决的愈好。上次我们说到湘潭军分区的问题，湘潭军分区确实犯了严重的错误，犯了方向的、路线的错误，把枪发给保守派，黔阳、常德、衡阳等地也有类似发枪的情况，希望龙书金把知道的情况告诉黄司令员，当然也告诉党中央。中国人民解放军应永远忠于伟大的领袖毛主席和林副主席。现在湘潭发出900多支枪，从湘潭、长沙以南到韶山，变成了“高司”红色怒火，“百万雄师”的据点，主席家乡搞成这个样子还行？！"},{"type":"paragraph","text":"说说群众组织的问题，现在有这个趋势，军区可以发枪，我们为什么不能发枪呢？这是从江西开始的，影响到湖南，刚才听说又影响到广州，保守派围攻造反派。真正的左派要求武装是可以理解的，是必然的，造反派当然要武装，这是最高统帅的指示，还要跟同志们商量，但“抢”总是不合法的。江西的例子就是军区、军分区怂恿、允许策划发枪给保守派。国内调动野战军保卫无产阶级文化大革命，是我们最高统帅的命令，林副主席同意去的，这样你还夺权，你还抓人，就是无政府状态了。是不容许的。由于军分区、武装部发枪给保守派，造反派抢枪是有理由的，象其他地区造反派少，去抢还可以，长沙地区造反派那么多，还抢枪这不应该。你们武装自卫是有道理的，但这样无组织、无纪律、无政府主义怎么办？不然成了乌合之众，一定要有步骤的工作，不然中央派谁去也不能解决问题。"}],"authors":["周恩来"],"dates":[{"year":1967,"month":8,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":335,"page_end":335,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fe520e2b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
