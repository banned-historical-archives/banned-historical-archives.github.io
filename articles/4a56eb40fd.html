:[],"dates":[{"year":1951,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　全国劳动模范、公交特等劳模张德庆于廿五日上书毛主席。"},{"type":"paragraph","text":"信里说:“二十八年的经验，使我深深体会到，只有在共产党领导之下，技术人员才有用武之地，才能发展技能，真正贯彻为人民服务的抱负。我以前也有纯技术观点，以为技术员不必过问政治，由于解放后参加政治学习，使我明白了人的阶级性，我认识了中国共产党是工人阶级自己的政党，工人阶级要巩固自己的政权，首先要使生产和一切技术为人民服务。我们今天的胜利果实，都是三十年来党领导人民不断斗争换来的，在党的阳光照耀下，我们的努力才会有准确的方向。我以后一定要保持劳模光荣。更努力与群众团结，响应政府一切号召，为提高生产、为建设新中国而奋斗到底。”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a56eb40fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
