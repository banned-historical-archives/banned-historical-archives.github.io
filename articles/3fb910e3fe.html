<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市卢湾区委领导成员带头看书学习  从理论和实践结合上弄懂对资产阶级专政问题","authors":[],"dates":[{"year":1975,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市卢湾区委领导成员带头看书学习"},{"type":"paragraph","text":"从理论和实践结合上弄懂对资产阶级专政问题"},{"type":"paragraph","text":"据新华社上海一九七五年三月十三日电　中共上海市卢湾区区委领导成员，带头认真学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的论述，力求从理论和实践的结合上弄懂对资产阶级专政的问题，不断提高阶级斗争和路线斗争的觉悟，增强无产阶级专政下继续革命的自觉性。"},{"type":"paragraph","text":"毛主席关于理论问题的重要指示发表后，这个区委的领导成员怀着无产阶级的革命激情，在组织好广大干部和群众学习的同时，认真搞好自身的学习。他们坚持每周学习四次，不断加深对学好无产阶级专政理论的重要意义的认识。他们说：是不是认真学习无产阶级专政的理论，是关系到能不能执行党的基本路线的大问题。我们一定要把这一学习当作头等大事抓好。"},{"type":"paragraph","text":"为了深入学习毛主席关于理论问题的重要指示，卢湾区委领导成员结合进行社会调查，亲自总结了勤奋中学用工人阶级面貌改造学校和嵩山街道狠抓意识形态领域里的阶级斗争的经验。在调查过程中，他们把现实的阶级斗争表现提到无产阶级专政理论的高度来认识，更加深刻认识到毛主席关于理论问题的指示的无比正确。在区百货公司蹲点的区委副书记朱大成，和基层干部、群众一起学习时，分析了商业战线上群众参加管理、商店工人组织理论队伍、深入工厂、码头、里弄为革命群众服务等新生事物的成长过程。他们看到这些新生事物在成长过程中所遇到的斗争，从而更加深刻地认识到，社会主义在大步前进，但资产阶级和旧社会习惯势力却拚命进行抵抗。两个阶级、两条路线和两种思想的斗争，是客观存在着的，是不可避免的。朱大成说，我们一定要用马克思主义理论来分析现实斗争生活，分清什么是社会主义，什么是资本主义。这样，才能有力地支持正确的东西，同错误的东西作不懈的斗争。"},{"type":"paragraph","text":"卢湾区委在学习过程中，认真贯彻从群众中来到群众中去的工作方法，从群众中吸取营养，又积极带领群众前进。区委领导成员从群众刻苦学习的精神中受到教育，并吸取他们学习计划中的长处，订出了全区的学习计划。区委还按系统、按地区分别举办了干部、理论骨干和群众共二千余人参加的学习班，区委领导成员分头参加各个学习班的学习，推动全区兴起群众性的学习无产阶级专政理论的热潮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fb910e3fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
