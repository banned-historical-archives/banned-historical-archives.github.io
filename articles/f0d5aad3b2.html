art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大树特树毛主席的绝对权威是无产阶级革命战士的大节","authors":["空军直属机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"杨成武同志的重要文章好极了！它通篇闪耀着伟大的毛泽东思想的灿烂光辉。"},{"type":"paragraph","text":"林副主席指示我们：“对毛泽东思想抱什么态度，是一个很重要的问题。我们就是要抓对毛主席的态度、对毛泽东思想的态度问题。”对待毛主席和毛泽东思想的态度，是区别真马克思主义和假马克思主义的最高标准，是革命和反革命的分水岭。无限忠于毛主席，无限忠于毛泽东思想，大树特树毛主席和毛泽东思想的绝对权威，是我们革命战士的大节。"},{"type":"paragraph","text":"无限忠于毛主席，就要永远紧跟毛主席，誓死捍卫毛主席的最高领袖地位，誓死捍卫以毛主席为首的无产阶级司令部。谁反对毛主席，反对以毛主席为首的无产阶级司令部，就坚决打倒谁。"},{"type":"paragraph","text":"无限忠于毛主席，就要最坚决地贯彻执行毛主席的指示，把毛主席的指示铭刻在脑子里，溶化在血液中，真正作到理解的坚决执行，暂时不理解的也坚决地不打折扣地执行。"},{"type":"paragraph","text":"无限忠于毛主席，就要满腔热情地宣传毛泽东思想，把传播毛泽东思想当作毕生的战斗任务，让毛泽东思想占领百分之百的阵地，把毛泽东思想的伟大红旗插遍全中国，插遍全世界。"},{"type":"paragraph","text":"无限忠于毛主席，就要最坚决勇敢地捍卫毛泽东思想，既做批修的闯将，又当斗私的先锋，以最大的勇敢、最高的姿态，向一切违背毛泽东思想的言行作不调和的斗争。"},{"type":"paragraph","text":"我们敬爱的林彪副统帅数十年如一日，最忠实、最坚决、最彻底地贯彻毛泽东思想，最英勇地捍卫了毛主席的最高领袖地位。他是毛主席最亲密的战友和最好的学生。我们一定要以林副统帅为榜样，活学活用毛主席著作，用毛泽东思想武装自己的头脑，用毛泽东思想统帅自己生命的每一分钟。我们一定要大树特树伟大统帅毛主席的绝对权威，大树特树毛泽东思想的绝对权威，创造出一个红彤彤的毛泽东思想的新世界。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0d5aad3b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
