孤”予以发放定期定额补助费问题的通知","authors":[],"dates":[{"year":1984,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"广西壮族自治区党委整党办公室关于企业单位遗属中的“三孤”予以发放定期定额补助费问题的通知","type":"title"},{"text":"桂林市委，并各地、市、县委，柳铁党委，区直各部、委、办、厅、局党委（党组）：","type":"appellation"},{"text":"桂林市处遗办来函提出：“关于企业职工‘文章’中被打死者遗属经济善后工作已按劳保条例一次性处理后，如其遗属属于孤老、孤幼、孤残者，应否予以定期定额救济问题。”","type":"paragraph"},{"text":"经与有关部门研究，凡属在“文革”中被打死的企业单位职工，其遗属中的“三孤”没有发给定期定额救济的，可以由死者生前所在单位从一九八四年元月起发给定期定额救济费；对孤老、孤残发至终世止，对孤幼发至十八周岁止（在校读书的延至毕业止）；发款的标准可参照自治区人民政府桂政发[1980]159号文件中第一条第2、3点规定执行。","type":"paragraph"},{"text":" （此件原载桂整办[1984]19号文）","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"718a805d31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
