》一文的批语和修改时加写的一段话","authors":[],"dates":[{"year":1957,"month":9,"day":15}],"is_range_date":false,"parts":[{"text":"毛泽东对《这是政治战线上和思想战线上的社会主义革命》一文的批语和修改时加写的一段话","type":"title"},{"text":"一","type":"subtitle"},{"text":"退胡乔木同志。此件可用。请送刘、邓、伯达、定一再加斟酌。","type":"paragraph"},{"text":" 毛泽东九月十五日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"我们现在所说的社会主义革命，许多时候叫作社会主义改造。在一九五六年，在经济制度方面，即在生产关系方面，主要是在生产资料所有制方面的社会主义改造，基本上完成了(没有最后完成)，人的改造则没有完成。而资产阶级右派分子则最坚决地反对这种改造。中国共产党曾经再三再四地指出人的改造的必要性和可能性，可是无法说服反动的资产阶级右派。","type":"paragraph"},{"text":" 来源：根据一九五七年九月十八日《人民日报》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e251e2d607"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
