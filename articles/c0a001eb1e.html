ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于对取消“全救”的认识及其取消后上海救亡工作方针的指示","alias":"","parts":[{"type":"paragraph","text":"关于对取消“全救”的认识及其取消后上海救亡工作方针的指示"},{"type":"paragraph","text":"（1937年10月18日）潘、刘："},{"type":"paragraph","text":"甲、关于过去全救取消的是否适当，当可研究。但把全救负责同志，分配到各方面活动，争取群众，组织各种有群众的合法团体的决定是正确的。"},{"type":"paragraph","text":"乙、全救的取消是我们自己为了开展工作，而不是为了同国民党交换抗敌抗（后）援会的上层位置。这同西安西救的取消是不相同的。"},{"type":"paragraph","text":"丙、上海党目前工作的中心，不是在恢复已经自动取消的全救，而是在加强各种救亡协会与救亡团体的群众工作，扩大这些团体的群众基础与独立民主的救亡活动。用最具体的事实，揭发国民党及抗敌后援会包办政策的错误，以达到抗会的民主的改造。"},{"type":"paragraph","text":"丁、必须彻底改变在党自己所领导的救亡团体中，命令主义与包办主义的工作方式。尽量发展民主主义，吸收无数的积极分子参加工作，发扬他们最大的积极性与创造性。"},{"type":"paragraph","text":"洛毛"},{"type":"paragraph","text":"十八日[1]这是毛泽东和洛甫（张闻天）给潘汉年和刘晓的指示。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":249,"page_end":249},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0a001eb1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
