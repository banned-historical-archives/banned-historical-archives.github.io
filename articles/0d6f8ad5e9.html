rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"武昌火车站恢复“文革”前拥军措施","authors":["郭创兴"],"parts":[{"type":"paragraph","text":"本报武汉9月5日电 今天上午，武汉铁路分局举行驻武汉新闻单位记者招待会。会上宣布，武昌火车站恢复“文革”前的五条拥军措施。"},{"type":"paragraph","text":"武昌火车站党委书记姚文达向记者谈了措施的具体内容：（一）恢复“军人候车室”、“军人售票窗口”；（二）节假日、部队兵员补退期间实行昼夜售票制度；（三）老战士退伍时，车站抽出专门人员到部队，集中办理行李托运手续；（四）在现有条件下，尽可能满足干部战士的购票需要；（五）建立车站站长挂牌服务制度，当面征求军人旅客的意见，现场解决军人提出的疑难问题，有疑难问题一时找不到站长，可拨电话“24482”。（郭创兴）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d6f8ad5e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
