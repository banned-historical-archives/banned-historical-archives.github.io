art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"田汉的反“火药味”论是反革命修正主义谬论","authors":["战士刘式伟"],"parts":[{"type":"paragraph","text":"田汉在解放军第二届文艺会演的一次会上说：外国人“看到我们机关枪、大炮响，他就害怕”，“不要专门搞大炮这个东西”，“这涉及到我们的方向问题”。田汉还说过：“戏里要打炮”，“这是我们话剧走的魔道”。这就是臭名昭著的反“火药味”论。"},{"type":"paragraph","text":"田汉反对戏剧舞台上的火药味，不准在舞台上反映人民的革命斗争，不准反映人民拿起枪杆子来进行武装斗争，实际上是反对阶级斗争中的火药味，反对毛主席的人民战争伟大思想。这是彻头彻尾的反革命修正主义谬论。"},{"type":"paragraph","text":"“这涉及到我们的方向问题。”田汉说对了！这是要不要革命文艺的方向问题，这是革命还是反革命的方向问题。我们热烈拥护并坚决支持一切正义的人民革命战争。我们把宣传毛主席的人民战争思想作为毕生光荣的战斗任务。而现代修正主义者，却从各方面削弱和破坏人民革命战争，为帝国主义的侵略政策和战争政策效劳。这是两个截然相反的方向。田汉鼓吹反“火药味”论，妄图把人们引向反革命的方向。"},{"type":"paragraph","text":"外国人听到革命人民的机关枪、大炮响就“害怕”吗？这要看什么样的外国人。帝国主义、现代修正主义和各国反动派，确实害怕得很；因为革命人民的机关枪、大炮会消灭一切害人虫，会打破美苏合作主宰世界的美梦，会粉碎他们的一切反革命阴谋。世界革命人民则是高兴得很；因为这是被压迫民族和被压迫人民争取解放的枪炮声，是埋葬旧世界、创造新世界的枪炮声。田汉把这两种人混为一谈，是别有用心的欺骗。"},{"type":"paragraph","text":"田汉对反革命的“火药味”，却是一点也不反对的。他在首都一次大会上，曾大肆渲染原子战争恐怖，绘声绘色，反革命的“火药味”浓得很，梦想把革命人民吓唬住。这就把田汉的反革命面目暴露无遗了。"},{"type":"paragraph","text":"阶级敌人拚命反对革命的“火药味”，充分说明革命的“火药味”好得很。我们一定要把革命的“火药味”搞得浓浓的，让一切阶级敌人在我们的枪炮声、火药味中发抖、死亡！"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c153b8f283"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
