rs":[],"dates":[{"year":1947,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"济愿翻身农民"},{"type":"paragraph","text":"欢庆土地还家"},{"type":"paragraph","text":"烧掉地主剥削的依据"},{"type":"paragraph","text":"换回新契过新年"},{"type":"paragraph","text":"【本报太岳二十七日电】济源翻身农民元旦焚旧契换新契，庆贺土地还家。济源四十余村翻身农民在元旦团拜席上，纵火焚去几千年来被地主作为剥削依据的旧文契换回新契，从此土地归为农民私有。北庄村全村男女老少身着新衣，向着广场上的一堆灼灼火焰高呼庆祝，欢欣若狂，当场并由土地改革委员会发给农民新契。三十六年将是农民在自己土地上劳动的开始。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f49c3bd078"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
