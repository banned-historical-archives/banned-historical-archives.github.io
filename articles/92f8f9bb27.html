":1981,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中朝两国总理会谈圆满结束"},{"type":"paragraph","text":"新华社北京1月11日电  国务院总理赵紫阳同朝鲜政务院总理李钟玉举行的会谈，今天圆满结束。"},{"type":"paragraph","text":"据悉，在今天上午会谈开始时，赵紫阳请李钟玉总理转达华国锋主席，叶剑英委员长，邓小平、李先念副主席等中国党政领导同志和他本人对金日成主席的良好祝愿。"},{"type":"paragraph","text":"在会谈中，赵紫阳高度评价中朝友谊。他指出，中朝友谊是两国人民在长期的共同斗争中用鲜血凝成的，继续巩固和发展这种友谊是中朝两国人民的共同愿望。中国党、政府和人民将为此作出不懈的努力。"},{"type":"paragraph","text":"他说，金日成主席提出的关于朝鲜南北方结成高丽民主联邦共和国的新的统一方案是合理的、正确的。他重申中国人民坚决支持朝鲜人民统一祖国正义斗争的一贯立场。"},{"type":"paragraph","text":"赵紫阳还向朝鲜同志介绍了中国对一些国际问题的看法和中国国内的政治、经济形势。"},{"type":"paragraph","text":"朝鲜政务院副总理金炅炼，我国国务院副总理陈慕华等参加了会谈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1981,"month":1,"day":12}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中朝两国总理会谈圆满结束","authors":[],"parts":[{"type":"paragraph","text":"据新华社一月十一日讯 国务院总理赵紫阳同朝鲜政务院总理李钟玉举行的会谈，今天圆满结束。"},{"type":"paragraph","text":"据悉，在今天上午会谈开始时，赵紫阳请李钟玉总理转达华国锋主席，叶剑英委员长，邓小平、李先念副主席等中国党政领导同志和他本人对金日成主席的良好祝愿。"},{"type":"paragraph","text":"赵紫阳还向朝鲜同志介绍了中国对一些国际问题的看法和中国国内的政治、经济形势。"},{"type":"paragraph","text":"朝鲜政务院副总理金炅炼，我国国务院副总理陈慕华等参加了会谈。"}],"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92f8f9bb27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
