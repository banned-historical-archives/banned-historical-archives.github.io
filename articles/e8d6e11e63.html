art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无产阶级和资产阶级决不能“溶合”","authors":["红新兵〖HH/换行〗DW：六四九五部队"],"parts":[{"type":"paragraph","text":"徘跋Γ�叛徒、内奸、工贼刘少奇就胡说资本家“是被剥削者又是剥削者”，“工人的痛苦就是失业，就是怕没有人剥削”�7锤锩�修正主义分子周而复为了把刘少奇的反革命谬论形象化，为他的黑主子复辟资本主义制造反革命舆论，就在大毒草《上�5脑绯俊分校�别有用心地炮制了一个“〖ZI；字符〗237"},{"type":"paragraph","text":"粮I/字符〗237"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“阶级斗争，一些阶级胜利了，一些阶级消灭了。这就是历史，这就是几千年的文明史。”无产阶级和资产阶级的阶级斗争，是你死我活的斗争。无产阶级就是要消灭资产阶级，无产阶级和资产阶级决不能“溶合”。"},{"type":"paragraph","text":"解放后，在我国社会主义革命和社会主义建设的进程中，资产阶级不断猖狂地反抗社会主义，反对无产阶级专政，企图复辟资本主义。我们工人阶级在伟大领袖毛主席的正确领导下，就是要加强和巩固无产阶级专政，防止资本主义复辟。我们绝不能让叛徒刘少奇及其同伙的反革命阴谋得逞，我们如果失去了无产阶级专政这个法宝，工人阶级就会失去已经得到的一切，就要受二遍苦，就要出现历史的大倒退。"},{"type":"paragraph","text":"我们要更高地举起毛泽东思想伟大红旗，彻底肃清大叛徒刘少奇的一切反革命修正主义思想的流毒，进一步巩固无产阶级专政。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8d6e11e63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
