事业的法西斯暴行，换来了香港新闻战线的一场“人民战争”。各种小报象匕首一样直刺敌人心脏，弄得港英十分恐惧和沮丧","authors":[],"dates":[{"year":1967,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"更坚决地宣传伟大的毛泽东思想"},{"type":"paragraph","text":"香港数百种反英抗暴小报杀上战场"},{"type":"paragraph","text":"英帝迫害香港爱国新闻事业的法西斯暴行，换来了香港新闻战线的一场“人民战争”。各种小报象匕首一样直刺敌人心脏，弄得港英十分恐惧和沮丧"},{"type":"paragraph","text":"新华社香港三十一日电　据香港报纸报道：在港英法西斯当局悍然非法强迫《香港夜报》、《新午报》、《田丰日报》三家爱国报纸停刊以后，香港爱国同胞奋起创办的反英抗暴斗争小报象雨后春笋一样迅猛地发展起来，目前这种小报已经有二百三十多种。"},{"type":"paragraph","text":"港英帝国主义害怕爱国报纸宣传光焰无际的毛泽东思想，害怕宣传港九同胞风起云涌的抗暴斗争，竟采取法西斯手段疯狂迫害爱国新闻事业。可是，敌人的压迫，却换来了新闻战线上的一场“人民战争”，数百种反英抗暴斗争的小报，与敌人展开了针锋相对的斗争。正如最近创刊的小报《大众报》在创刊词中所说的：“港英的阴谋休想得逞，封三家报纸，爱国同胞就出三百种、三千种、三万种爱国刊物，更大力地宣传伟大的毛泽东思想，更坚决地揭露港英的暴行。”"},{"type":"paragraph","text":"新创刊的《匕首》小报说：“匕首虽小，可戳穿英帝国主义的‘自由’、‘民主’、‘平等’、‘法治’……等假面具，把它百年来罪恶的统治暴露在港九同胞面前。匕首虽小，可划破民族败类走狗的画皮，让我同胞看清走狗的嘴脸，还可刺破走狗的胸膛，让大家看到它的黑心肝。匕首虽小，正适合近战、夜战，可直插港英心脏，叫它魂归‘天国’。”"},{"type":"paragraph","text":"新创刊的《千钧棒》小报，把新近出版的小报的报名集成一首诗歌：“东风，怒潮，漫天雪；反英，抗暴，风雷激。进军，战斗，新挺进；港九，群众，抗顽敌。灭英，尖兵，娘子军；造反，先锋，红卫兵。闯将，伏虎，文锦渡；平英，驱帝，突击队。奋斗，红色，新香港；红日，东升，满江红。星火，燎原，换新天；黎明，曙光，东方红。”"},{"type":"paragraph","text":"港九爱国同胞出版的反英抗暴斗争小报，立场鲜明，形式多样，文字尖锐泼辣。我们伟大的领袖毛主席教导我们：“人民群众有无限的创造力。”这些小报就是充分发扬了群众的智慧，成了同港英帝国主义展开斗争的一种极为有力的武器。这些小报根据斗争的需要，揭露港英的法西斯面目，戳穿港英当局的阴谋诡计，并针对反动报纸的谬论加以驳斥。这些小报集中突出地宣传毛泽东思想，它们把誓死捍卫毛泽东思想，把在斗争中活学活用毛泽东思想的宣传，作为最光荣、最自豪的任务。小报的评论，深入浅出，对反英抗暴斗争富有指导意义，收到了更广泛的宣传效果。这些小报受到广大爱国同胞的热烈欢迎和支持。目前，港九地区创办小报的高潮正在方兴未艾，港英法西斯当局对此十分恐惧和沮丧。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49a95f1e30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
