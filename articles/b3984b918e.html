art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"接见炮兵四好五好代表在炮兵学习毛主席著作积极分子和四好代表会议上树立了二十个标兵","authors":["葛振洲刘浩"],"parts":[{"type":"paragraph","text":"本报讯 贺龙元帅和中国人民解放军总参谋长罗瑞卿大将，二十六日下午接见了出席中国人民解放军炮兵学习毛主席著作积极分子和四好、五好代表会议的全体同志，并和大家合影留念。"},{"type":"paragraph","text":"陪同接见的有：张宗逊上将、彭绍辉上将、杨成武上将、李天佑上将、王新亭上将、李聚奎上将、刘志坚中将、徐立清中将、梁必业中将、萧向荣中将、吴克华中将陈仁麒中将、吴信泉中将等。"},{"type":"paragraph","text":"本报讯 最近，炮兵召开了学习毛主席著作积极分子和四好、五好代表会议。会上着重总结交流经验，表扬先进，树立标兵，以推动四好、五好运动和创造“三手”活动的进一步落实。"},{"type":"paragraph","text":"在这次会议上，炮兵树立了二十个各行各业的标兵。先进单位中有：贯彻执行少而精原则卓有成效的某学院兵器牵引车教研室，活学活用毛主席著作、思想作风过得硬的某炮兵团声测连，坚持四个第一、充分发挥党支部战斗堡垒作用的某学院第二教育班等六个单位。先进个人中有：被树立为学习毛主席著作标兵的班长陈春晨，处处作表率的班主任姜培桂，热爱党的教育事业、出色完成教学任务的教员段彬礼，为党的事业刻苦学习、成绩优异的学员朱瑞生等十四名。"},{"type":"paragraph","text":"会议期间，张宗逊副总参谋长作了讲话。   （葛振洲、刘浩）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3984b918e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
