dates":[{"year":1958,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席　刘委员长　周总理"},{"type":"paragraph","text":"电贺捷劳动人民胜利十周年"},{"type":"paragraph","text":"新华社24日讯　毛泽东主席、刘少奇委员长、周恩来总理今天致电捷克斯洛伐克共和国总统诺沃提尼、国民议会主席费林格、总理西罗基，祝贺捷克斯洛伐克劳动人民胜利十周年。贺电如下：捷克斯洛伐克共和国总统安·诺沃提尼同志，捷克斯洛伐克共和国国民议会主席兹·费林格同志，捷克斯洛伐克共和国总理威·西罗基同志："},{"type":"paragraph","text":"当捷克斯洛伐克劳动人民胜利十周年纪念日的时候，请允许我们代表中华人民共和国政府和人民向你们，并且通过你们向捷克斯洛伐克共和国政府和人民致以热烈的祝贺。"},{"type":"paragraph","text":"在一九四八年二月事件的日子里，捷克斯洛伐克劳动人民紧密地团结在捷克斯洛伐克共产党的周围，彻底地粉碎了国内外反动派企图颠复人民民主制度、恢复资本主义统治的阴谋活动，从而使捷克斯洛伐克坚定地走上了社会主义的光辉道路。"},{"type":"paragraph","text":"十年来，捷克斯洛伐克人民在捷克斯洛伐克共产党和政府的领导下，在社会主义建设中取得了巨大的成就，并且在加强以苏联为首的社会主义阵营各国的团结和维护世界和平的事业中作出了重大的贡献。中国人民为兄弟的捷克斯洛伐克人民所取得的这些巨大成就由衷地感到欢欣鼓舞，并且将继续同捷克斯洛伐克人民一起，为建设社会主义和维护和平的共同事业进行不懈的努力。"},{"type":"paragraph","text":"祝捷克斯洛伐克人民在社会主义建设和保卫世界和平的事业中取得新的、更大的成就。祝中捷两国人民牢不可破的友谊不断地巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理  周恩来"},{"type":"paragraph","text":"一九五八年二月二十四日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1b3ea4ab9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
