uthors":[],"dates":[{"year":1979,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见法国朋友"},{"type":"paragraph","text":"指出当前国际局势动荡，中法需要加强交换意见和合作"},{"type":"paragraph","text":"新华社北京五月五日电  邓小平副总理今天上午在会见法国国防高等研究院代表团时指出，在当前国际局势动荡的时刻，中法两国需要加强交换意见和合作。"},{"type":"paragraph","text":"邓副总理说，中法两国的关系发展是很好的。我们对这种发展是满意的。"},{"type":"paragraph","text":"这个一百多人的代表团是由法国国防高等研究院院长安德烈·马尔蒂中将率领的。"},{"type":"paragraph","text":"会见时，邓小平副总理回答了法国朋友的问题，就当前国际形势的一些重大问题和有关国内问题谈了他的看法。"},{"type":"paragraph","text":"马尔蒂中将说，代表团通过这次访问，增进了对中国和中国人民的进一步了解，这将有助于加强两国之间的友好合作关系。"},{"type":"paragraph","text":"法国驻中国大使阿尔诺参加了会见。"},{"type":"paragraph","text":"会见时在座的有外交学会会长郝德青等。"},{"type":"paragraph","text":"五月二日，中国人民解放军副总参谋长伍修权会见了法国朋友。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见由安德烈·马尔蒂中将率领的法国国防高等研究院代表团。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcab59ca0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
