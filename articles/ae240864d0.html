script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对《文艺报》转载《关于《红楼梦简论》及其他》一文所加编者按的批注","alias":"","parts":[{"type":"paragraph","text":"对《文艺报》转载《关于红楼梦简论）及其他》一文"},{"type":"paragraph","text":"所加编者按的批注"},{"type":"paragraph","text":"（1954年10月）青年团员，一个二十三岁，一个廿六岁。"},{"type":"paragraph","text":"二不过是小人物。2"},{"type":"paragraph","text":"[1]这句话批在《关于《红楼梦简论》及其他》一文作者署名“李希凡、蓝翎”的旁边。"},{"type":"paragraph","text":"[2]这句话是针对《文艺报》编者按中“它的作者是两个在开始研究中国古典文学的青年”一句而写的。对《文艺报》转载《关于（红楼梦简论》及其他》一文所加编者按的批注"},{"type":"paragraph","text":"三不过是不成熟的试作。"},{"type":"paragraph","text":"四对两青年的缺点则决不饶过。很成熟的文章，妄加驳斥。"},{"type":"paragraph","text":"五不应当承认俞平伯的观点是正确的。不是更深刻周密的问题，而是批判错误思想的问题。3[1]《文艺报》的编者按中说：“他们试着从科学的观点对俞平伯先生在《（红楼梦）简论》一文中的观点提出了批评。”毛泽东在其中“试着”二字旁画了两道竖线，并写了这句话。"},{"type":"paragraph","text":"[2]这两句话是针对《文艺报》编者按中“作者的意见显然还有不够周密和不够全面的地方”一句而写的。"},{"type":"paragraph","text":"[3]《文艺报》编者按中有一处说，转载这篇文章“希望引起大家讨论，使我们对《红楼梦》这部伟大杰作有更深刻和更正确的了解”，另一处又说“只有大家来继续深入地研究，才能使我们的了解更深刻和周密”。毛泽东在“更深刻和更正确的了解”与“了解更深刻和周密”旁边，画了两道竖线，打了一个问号，并分别批了这两句话。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":282,"page_end":283},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae240864d0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
