ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"毛泽东等祝贺保加利亚人民共和国国庆的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺保加利亚人民共和国国庆的电报"},{"type":"paragraph","text":"（1958年9月8日）保加利亚共产党中央委员会第一书记托·日夫科夫同志，保加利亚人民共和国国民议会主席团主席格·达米扬诺夫同志，保加利亚人民共和国部长会议主席安·于哥夫同志："},{"type":"paragraph","text":"当保加利亚人民共和国国庆十四周年的时候，我们代表中华人民共和国政府和中国人民向保加利亚人民共和国政府和保加利亚人民致以最热烈的祝贺。"},{"type":"paragraph","text":"保加利亚人民在光荣的保加利亚共产党和保加利亚人民共和国政府的领导下，在短短的历史时期内，把自己的祖国从一个农业国变成了一个具有发达的工业和大规模合作化和机械化的农业的社会主义国家。保加利亚人民一贯忠实于无产阶级的国际主义，在加强社会主义阵营的团结、捍卫马克思列宁主义的原则和批判现代修正主义的伟大斗争中作出了重要的贡献。保加利亚人民共和国为和缓国际紧张局势和保卫巴尔干和世界和平进行坚持不渝的斗争。中国人民对兄弟的保加利亚人民获得的这些光辉的成就感到由衷的高兴。"},{"type":"paragraph","text":"中保两国人民的兄弟友谊和全面的互助合作，一年来有了新的发展。毫无疑问，这必将大大有助于我们两国的社会主义建设和壮大以苏联为首的社会主义阵营的力量。"},{"type":"paragraph","text":"毛泽东等祝贺保加利亚人民共和国国庆的电报"},{"type":"paragraph","text":"祝保加利亚人民在实现保加利亚共产党第七次代表大会的决议、完成社会主义建设的事业中，获得新的、更大的成就。"},{"type":"paragraph","text":"中国共产党中央委员会主席中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九五八年九月八日于北京"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":9,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":160,"page_end":161},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d51056bbc2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
