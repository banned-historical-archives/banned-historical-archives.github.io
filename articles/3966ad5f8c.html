art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"干部下放劳动就是好（小演唱）","authors":["六二八九部队毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"合：东风阵阵传喜报，"},{"type":"paragraph","text":"全国人民斗志高，"},{"type":"paragraph","text":"毛主席领导最英明，"},{"type":"paragraph","text":"革命形势无限好！"},{"type":"paragraph","text":"我们伟大领袖毛主席发出了最新指示：“广大干部下放劳动，这对干部是一种重新学习的极好机会，除老弱病残者外都应这样做。在职干部也应分批下放劳动。”"},{"type":"paragraph","text":"甲：毛主席最新指示红光普天照，"},{"type":"paragraph","text":"干部下放劳动就是好！"},{"type":"paragraph","text":"乙：干部下放劳动为什么好？"},{"type":"paragraph","text":"请你给大家来介绍。"},{"type":"paragraph","text":"甲：干部下放劳动就是好，"},{"type":"paragraph","text":"有重新学习的极好机会了。"},{"type":"paragraph","text":"活学活用毛泽东思想，"},{"type":"paragraph","text":"把世界观彻底来改造。"},{"type":"paragraph","text":"永远和工农结合在一起，"},{"type":"paragraph","text":"为人民建立新功劳。"},{"type":"paragraph","text":"乙：重新学习机会好，"},{"type":"paragraph","text":"这是毛主席指引的光明道，"},{"type":"paragraph","text":"对干部最大的关怀和爱护，"},{"type":"paragraph","text":"广大干部心中永记牢。"},{"type":"paragraph","text":"甲：干部下放劳动就是好，"},{"type":"paragraph","text":"斗、批、改掀起新高潮。"},{"type":"paragraph","text":"干部永当普通劳动者，"},{"type":"paragraph","text":"彻底改变旧面貌。"},{"type":"paragraph","text":"肃清中国赫鲁晓夫修正主义的流毒，"},{"type":"paragraph","text":"把剥削阶级的官架子全打掉。"},{"type":"paragraph","text":"乙：斗、批、改掀起新高潮，"},{"type":"paragraph","text":"干部下放劳动不可少。"},{"type":"paragraph","text":"要实现机关革命化，"},{"type":"paragraph","text":"干部革命化很重要。"},{"type":"paragraph","text":"甲：干部下放劳动就是好，"},{"type":"paragraph","text":"是巩固无产阶级专政的法宝。"},{"type":"paragraph","text":"培养革命事业接班人，"},{"type":"paragraph","text":"永把社会主义江山保。"},{"type":"paragraph","text":"反修、防修筑长城，"},{"type":"paragraph","text":"毛泽东思想伟大红旗举得高。"},{"type":"paragraph","text":"反修、防修筑长城，"},{"type":"paragraph","text":"革命的根基打得牢。"},{"type":"paragraph","text":"干部群众血肉永相连，"},{"type":"paragraph","text":"革命路上心一条。"},{"type":"paragraph","text":"乙：毛主席最新指示红光普天照，"},{"type":"paragraph","text":"广大干部斗志高。"},{"type":"paragraph","text":"伟大舵手毛主席指航向，"},{"type":"paragraph","text":"广大干部乘风破浪永向前方。"},{"type":"paragraph","text":"甲：毛泽东思想伟大红旗飘，"},{"type":"paragraph","text":"颂歌阵阵冲云霄。"},{"type":"paragraph","text":"永远紧跟毛主席，"},{"type":"paragraph","text":"革命到底不动摇。"},{"type":"paragraph","text":"合：永远紧跟毛主席，"},{"type":"paragraph","text":"革命到底不动摇。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3966ad5f8c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
