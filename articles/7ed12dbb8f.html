script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加紧重新武装日本，奴役和剥削日本人民  美国和吉田政府签订“共同防御援助协定”","authors":[],"dates":[{"year":1954,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加紧重新武装日本，奴役和剥削日本人民"},{"type":"paragraph","text":"美国和吉田政府签订“共同防御援助协定”"},{"type":"paragraph","text":"【新华社十日讯】东京消息：所谓美日“共同防御援助协定”已于八日在东京签订。随同这个协定签订的还有“购买剩余农产品协定”、“经济措施协定”和“保障投资协定”三个有关文件和若干谅解事项。这些协定是美国加紧重新武装日本、使它充当侵略工具的新步骤，也是美国和日本反动派加紧剥削、奴役日本人民的新步骤。"},{"type":"paragraph","text":"协定签字后发表的美日联合公报指明：美日“共同防御援助协定”是根据美国“共同安全法”缔结的。这个法律规定：受“援”国必须尽力对扩充、加强和维持所谓“自由世界的防御”有所贡献，并积极地采取对发展本身军事力量所必要的“一切合理措施”。协定未规定“援助”的实际数字，要留待以后的谈判来决定。但美联社说：华盛顿美国官方人士表明，“这些军事援助大都是‘重家伙’——供日本计划要扩充的各军事部门用的主要军事装备”。合众社指出：“日本根据这个协定将得到的武器，构成为吉田政府在一九五四会计年度预算和它在两个防御法案（指‘自卫队法’和‘防卫厅组织法’）中所提出的‘新面貌’防御计划的基石。”"},{"type":"paragraph","text":"美日“共同防御援助协定”还规定设立一个监督和控制日本重整军备的太上司令部——“美国军事援助顾问团”，它的经费由日方供给。"},{"type":"paragraph","text":"所谓“购买剩余农产品协定”和“经济措施协定”，是对日本人民的残酷剥削。美国要假“援助”之名，向日本转嫁美国的农业危机，在日本销售过剩农产品，然后以取自日本人民的金钱来加强日本军火生产。“购买剩余农产品协定”规定美国以五千万美元的剩余小麦等农产品在日本出售，并按照“经济措施协定”所规定的条件在美国控制下以所得的日元的百分之二十（即一千万美元）用来扶植日本的军火工业，其余百分之八十（即四千万美元）在日本订购美国武装亚洲各傀儡政权的军火。"},{"type":"paragraph","text":"美国并以“援助”为武器替美国资本进一步渗入和剥削日本敞开了大门。“保障投资协定”规定美国投资者可以将投资的利润汇出日本，并在两年以后以每年百分之二十的比例将资金提出。"},{"type":"paragraph","text":"美国还企图通过美日“共同防御援助协定”把日本拖入太平洋侵略集团。美国驻日大使艾利逊在协定签字时发表的演说中虽然做贼心虚地硬说：“你在共同防御援助协定里绝对找不出使日本派遣青年到国外去的任何规定”，并且伪善地对“某些人士”在这方面的“误解”表示“担心”，但是“朝日新闻”指出：“在这个协定中，没有任何东西表明日本的防御部队不会被送到海外去在外国领土上作战。”“每日新闻”更指出：这个协定使日本承担了重整军备的义务，“这一点是适合于美国政府希望日本能有一天作为太平洋公约的一员，与其他自由世界的国家一道分担共同责任的计划的。”合众社在协定签字后从东京发出的消息中更直接指出：美日“共同防御援助协定”和一九五一年签订的美日“安全条约”“最后会导向日本和其他一些亚洲国家一起参加一个美国支持的太平洋公约”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ed12dbb8f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
