毛主席革命路线的自觉性，认真搞好斗批改","authors":[],"dates":[{"year":1971,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　华东师范大学广大共产党员、工宣队员、军宣队员、工农兵学员和革命教职工，遵循伟大领袖毛主席关于“认真看书学习，弄通马克思主义”的教导，满怀革命激情，连日来认真学习中央两报一刊编辑部重要文章《纪念中国共产党五十周年》。他们在学习中，初步联系了思想实际和工作实际，领会这篇重要文章的基本精神，从而更好地学习马克思主义、列宁主义、毛泽东思想，进一步提高执行毛主席革命路线的自觉性。"},{"type":"paragraph","text":"为了学好这篇重要文章，许多同志联系思想实际和工作实际，认真学习毛主席的光辉著作，学习林副主席在“九大”的政治报告，学习党内两条路线斗争史。在联系思想实际方面’许多工农兵学员在学习“各条战线斗、批、改的任务，特别是在上层建筑其中包括各个文化领域中进行斗、批、改的任务还很艰巨”这一段时，感触很深，表示决不辜负党交给自己的重任，进一步克服“不是料子”和“自来红”等不正确的思想，正确处理好政治与业务等关系，上好大学，管好大学，用毛泽东思想改造好大学。工宣队、军宣队队员在学习讨论中，从当前上层建筑斗、批、改任务的要求出发，进一步肃清“在上层建筑工作危险、回本单位去保险”等错误思想和畏难情绪，决心更好地学习，努力完成党和毛主席交给的光荣任务。有的革命教师在学习党的两条路线斗争史时说，路线决定一切，有什么样的世界观就执行什么样的路线。要更好地执行毛主席的革命路线，关键在于改造自己的世界观，克服资产阶级个人主义。"},{"type":"paragraph","text":"在联系工作实际方面，政教系同志联系党史教学，再次批判了所谓“遵义会议后没有路线斗争”的谬论。他们在学习这篇重要文章时，又学习了毛主席的光辉著作《中国社会务阶级的分析》，批判了陈独秀鼓吹的由资产阶级领导无产阶级的右倾机会主义谬论；还学习了毛主席的光辉著作《湖南农民运动考察报告》，批判了陈独秀污蔑农民“散漫”、“落后”的右倾机机会主义谬论，从而进一步加深了对毛主席革命路线的理解，加深了对陈独秀右倾机会主义路线的痛恨。政教系、历史系的师生还到工厂、农村、里弄去，和工人、农民、里弄革命同志一起学习、宣传中央两报一刊的重要文章。校办工厂一个科研组的同志通过学习，决心进一步用毛泽东思想统帅科研工作，搞好科研工作。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈独秀","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"602018a25a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
