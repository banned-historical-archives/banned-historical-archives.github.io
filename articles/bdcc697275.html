沫若副委员长等应邀出席","authors":[],"dates":[{"year":1972,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为庆祝古巴全国解放日十三周年"},{"type":"paragraph","text":"古巴驻华大使举行招待会"},{"type":"paragraph","text":"叶剑英副主席李先念副总理郭沫若副委员长等应邀出席"},{"type":"paragraph","text":"新华社北京一九七二年一月十日讯　为庆祝古巴全国解放日十三周年，古巴驻中国大使巴雷依罗今天在这里举行招待会。"},{"type":"paragraph","text":"军委副主席叶剑英，国务院副总理李先念，人大常委会副委员长郭沫若，北京市革命委员会副主任吴德，国防部副部长肖劲光，外交部副部长乔冠华，外贸部部长白相国，农林部部长沙风，以及有关方面负责人谢扶民、季方、王国权、韩宗正、郭鲁、陈维稷、张政德、李青川、郝梦笔等，应邀出席招待会。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察，应邀出席招待会。"},{"type":"paragraph","text":"各国驻中国使节也应邀出席。招待会上洋溢着中国、古巴两国人民友好的气氛。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdcc697275"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
