:[],"dates":[{"year":1974,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"采取联合行动对付跨国公司的掠夺和剥削"},{"type":"paragraph","text":"拉美香蕉生产国举行会议"},{"type":"paragraph","text":"据新华社巴拿马城一九七四年三月二十日电　拉丁美洲的香蕉生产国最近采取联合行动来对付跨国公司的掠夺和剥削。"},{"type":"paragraph","text":"三月十五日，中美四国国家和政府首脑在洪都拉斯首都特古西加尔巴开会讨论维护香蕉生产国利益的具体措施。出席会议的有洪都拉斯总统奥斯瓦尔多·洛佩斯·阿雷利亚诺、哥斯达黎加总统何塞·菲格雷斯、尼加拉瓜总统安纳斯塔西奥·索摩查和巴拿马政府首脑奥马尔·托里霍斯。厄瓜多尔驻洪都拉斯大使也出席会议。"},{"type":"paragraph","text":"据宣布，会议决定，从四月一日起拉美七个香蕉生产国出口的香蕉每磅将课以附加税二点五美分。据估计，这一项措施将为这些国家增加二亿四千万美元的收入。会议还建议今年四月份在厄瓜多尔的瓜亚基尔市签署关于成立香蕉出口国联盟的协定。"},{"type":"paragraph","text":"据报道，危地马拉总统卡洛斯·阿拉纳·奥索里奥已表示支持四国首脑会议的决定。另外，参加四国首脑会议的国家已派出一个部长级代表团前往厄瓜多尔和哥伦比亚，说明会议决定的目的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b52083979"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
