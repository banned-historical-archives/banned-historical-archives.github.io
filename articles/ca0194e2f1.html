":[{"year":1984,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《瞭望》第五十期刊载《一张名单的前前后后》，披露了周恩来同志在文革初期亲笔开列的一张“应予保护的干部”名单。这些人是:宋庆龄、郭沫若、章士钊、程潜、何香凝、傅作义、张治中、邵力子、蒋光鼐、蔡廷锴、沙千里、张奚若和李宗仁。此外，还有国务院、人大、政协等单位的主要领导干部。周总理考虑到这些人年事已高，性格倔强，不堪受辱，便委托可靠同志去动员他们暂离家庭，同时通知三○一医院对他们秘密保护。对郭沫若，亦采取措施护送到外地。对不愿离家的傅、邵、蔡、蒋、沙等，总理派解放军战士和公安人员，身着便装，到他们家中保卫，并劝阻前来抄家的红卫兵。"},{"type":"paragraph","text":"文章还记述了周恩来恳切地劝宋庆龄从上海到北京来，并安排公安部门警卫宋宅的情况。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca0194e2f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
