art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让干部战士天下大事胸中装","authors":[],"parts":[{"type":"paragraph","text":"团以上领导干部给部队作形势任务报告，是我军的优良传统。军委一九七八年六月颁布的关于加强军队政治工作的决议对此再次作了规定。北京部队某部坦克团坚持实行这一制度，取得了很好的效果。"},{"type":"paragraph","text":"这个团在抓好国内时事政策教育的同时，根据近年来世界剧烈动荡的紧张局势和部队所担负的任务，加强了国际形势教育。他们注重结合我国对外工作和对外斗争的重大成就，深入领会我们党关于国际反霸斗争的战略和策略思想，领会我国一贯奉行的外交路线和政策；结合大小霸权主义的侵略扩张行径，分析研究苏联妄图称霸世界的全球战略。这样，大家对形势的看法便不停留于表面现象，而能够透过现象认识苏联社会帝国主义的侵略本质，树立常备不懈观念，带着敌情努力搞好训练、战备和各项工作。坦克团领导干部亲自作形势报告的做法和收获，是值得重视和借鉴的。"},{"type":"paragraph","text":"邓小平同志在《目前的形势和任务》报告中，把在国际事务中反对霸权主义，维护世界和平，列为八十年代我们要做的几件大事中的一件。我们部队肩负保卫四化、保卫祖国的重任，反霸斗争这件大事与我们每个同志的战斗岗位息息相关。希望各部队都能象坦克团那样，切实把时事政策教育摆到日程上去，让干部战士的眼睛看得更远更远，真正做到身在连队，胸怀祖国，放眼世界，自觉地使自己的思想和行动服从全局的需要，跟上形势的发展。"}],"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7bfb0f6322"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
