dates":[{"year":1946,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【路透社南京二日电】延安以英语广播惊人消息谓:美制国军飞机七架，于昨日午刻轰炸延安，以机关枪扫射并投掷炸弹达二十分钟之久，损毁及死伤在调查中。自一九四一年以来，延安尚系初次被炸。国民党虽一再声明南京国共谈判并未破裂，然今已有轰炸之事实矣。"},{"type":"paragraph","text":"【路透社南京三日电】南京中共总部于今日午刻前接获延安电报，谓国军P四七型机六架，B二四型机一架，于昨午轰炸延安，向朱德将军总部共投弹拾壹枚，但投掷不准，多落于距离目标六百码之处。炸弹系B二四型机所投，战斗机则以机关枪低飞扫射城区，死伤数字在调查中。该军到时，周恩来已赴马帅行馆晤马帅，乃由中共总部派专差送交周氏。当轰炸时有美军少校二人在延安。据中共发言人王炳南称:比乃意外攻击，居民均不及躲避，更罔论抵抗，其事发生在吾人努力全面和平之时，极度严重之局势已因此造成。记者询以此事是否将使国共谈判破裂。王氏谓，于此尚不能发表意见。闻延安当局已检获上有美制字样之弹片及弹壳。"}],"comments":[],"origin":"路透社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4793abc166"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
