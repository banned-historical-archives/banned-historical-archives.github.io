"吕岩松","黄东明"],"dates":[{"year":2003,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《我的父亲邓小平——“文革”岁月》俄文版首发式在莫斯科举行"},{"type":"paragraph","text":"据新华社莫斯科7月29日电（记者黄东明）《我的父亲邓小平——“文革”岁月》俄文版首发式29日在莫斯科举行。"},{"type":"paragraph","text":"中国国际友好联络会副会长，中俄友好、和平与发展委员会副主席，该书作者邓榕在首发式上说，她撰写该书的目的之一就是让人们重温历史，牢记历史，并珍惜今天这来之不易的稳定和幸福。"},{"type":"paragraph","text":"俄罗斯外贸银行和国际文传电讯社组织了《我的父亲邓小平——“文革”岁月》俄文版的首发式，并负责该书在俄罗斯的出版发行。"},{"type":"paragraph","text":"本报莫斯科7月28日电  记者吕岩松报道：俄罗斯总统普京28日在克里姆林宫会见了前来莫斯科出席《我的父亲邓小平——“文革”岁月》俄文版首发式的中国国际友好联络会副会长，中俄友好、和平与发展委员会副主席邓榕，并对她此次访问俄罗斯表示欢迎。"},{"type":"paragraph","text":"普京说，他非常了解邓小平，邓小平在俄罗斯受到广泛尊重，邓小平思想不仅在中国国内政策中，而且在中国的对外政策中得到体现。俄中发展战略协作伙伴关系，正是邓小平思想的体现。"},{"type":"paragraph","text":"在谈到中俄历史文化时，普京说，许多中国人都知道托尔斯泰和普希金，俄罗斯有很多人也知道孔夫子。现在俄罗斯的青少年都能在课本上读到中国的历史和孔夫子。中俄应重视两国悠久的历史和文化，要让它们更好地服务于两国的未来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5736ad77d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
