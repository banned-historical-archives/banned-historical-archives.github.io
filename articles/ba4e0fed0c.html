known","files":[],"article":{"title":"有的同志说，我一没有参加‘四大’，二没有参‘三支两军’，所以，‘左’的影响不沾边，派性不沾边。这种说法为什么是错误的？","dates":[{"year":1985,"month":2,"day":28}],"is_range_date":false,"authors":["解放军报"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"北京日报社宣传手册编辑部, \"彻底否定'文化大革命,'\" 宣传手册, 第2期, 1985: 45","tags":[{"name":"派性","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"四大","type":"主题/事件"},{"name":"文革","type":"主题/事件"}],"parts":[{"type":"title","text":"有的同志说，我一没有参加“四大”，二没有参“三支两军”，所以，“左”的影响不沾边，派性不沾边。这种说法为什么是错误的？"},{"type":"paragraph","text":"“左”的错误，并不是“文化大革命”才开始出现的，也不是只有参加“四大”、参加“三支两军”的人才受其影响。早在“文化大革命”前就已经出现了“左”的错误，“左”的口号“左”的观点存在于社会生活的各个领域，人们耳濡目染，很难不受影响。对于军队来说，从林彪主持军委日常工作开始，就推行了一套“突出政治”的东西，受“左”的毒害更深。到了“文化大革命”时期，“左”的一套更加系统化、理论化了，所谓“无产阶级专政下继续革命的理论”，被写入党章、宪法，成为指导党和国家的准则；又通过“四大”等形式，以从未有过的广度和深度，把全国人民都卷入了“文化大革命”的浪潮之中。“左”的影响深入到社会生活的各个方面，具有时间长、根子深、传播广的特点，在这种形势下，即使没有参加过“四大”和“三支两军”，也不可能不受到“左”的影响。当然，由于各人的具体经历不同，受“左”的影响也有多少、深浅之分，有一定的区别。"},{"type":"paragraph","text":"关于派性，也不能看作只是在“四大”和“三支两军”中才有。“文化大革命”中派性弥漫于整个社会，渗透到我们党的肌体和社会的各个组织，甚至也渗透进家庭。没有参加过“四大”和“三支两军”的同志，虽然没有成为哪个具体“派”的成员，或没有表示过支持哪个派，比较地说，可能超脱—些。但也不是生活在真空里，他们对于所在地区或原来所在单位的两派，也是有自己的看法和倾向的，在思想上甚至行动上或多或少、或明或暗也是同情或支持着某—派的。完全超脱的人也有，为数极少。我们不能以为没有参加过“四大”和“三支两军”就与派性绝缘。可以说，“文化大革命”是个“左”的“染缸”，派性的“温床”，只要是参加过“文化大革命”的人，都可能沾染些“左”的东西和派性的影响。我们要充分地认识到这一点，才能自觉地去消除它。"},{"type":"paragraph","text":"诚然，我们看一个人受“左”的或派性影响的多少、深浅，应当看他在“文化大革命”全过程中的实际表现，看他参加过什么具体活动，干过什么事情，而不能仅以是否参加过“四大”和“三支两军”为标准。"},{"type":"paragraph","text":"（原载《解放军报》）"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba4e0fed0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
