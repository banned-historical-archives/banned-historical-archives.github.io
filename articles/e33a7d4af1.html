继续听取周总理代表国务院所作的政府工作报告　二届人大常委会向大会作了书面的工作报告　大会还通过了关于代表资格的审查报告","authors":[],"dates":[{"year":1964,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京22日电　第三届全国人民代表大会第一次会议，今天下午举行大会，继续听取周恩来总理代表国务院所作的政府工作报告。"},{"type":"paragraph","text":"毛泽东主席，刘少奇主席，宋庆龄、董必武副主席，朱德委员长，周恩来总理，邓小平总书记等党和国家领导人，出席了大会。当他们同大会主席团其他成员一起登上主席台的时候，全场起立，掌声雷动。"},{"type":"paragraph","text":"在周恩来总理的报告进行中和结束的时候，会场上响起了一阵阵的掌声。"},{"type":"paragraph","text":"第二届全国人民代表大会常务委员会，向大会作了书面的工作报告。"},{"type":"paragraph","text":"大会还通过了第三届全国人民代表大会代表资格审查委员会关于代表资格的审查报告。"},{"type":"paragraph","text":"今天大会的执行主席是:朱德、贺龙、赛福鼎、蔡畅、张治中、竺可桢、周建人、余秋里、胡愈之、桑吉悦希、陈垣、陈少敏、裔式娟、周叔弢、徐立清、金时龙、刘白羽、彭加木、邢燕子。"},{"type":"paragraph","text":"国务院组成人员，最高人民法院和最高人民检察院的负责人，中国人民解放军高级将领，列席了大会。"},{"type":"paragraph","text":"出席中国人民政治协商会议第四届全国委员会第一次会议的委员们，也列席了大会。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\12\\64cn010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e安康\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e出席第三届全国人民代表大会第一次会议的代表们为周恩来总理作的政府工作报告热烈鼓掌　(新华社传真　安康 摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e33a7d4af1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
