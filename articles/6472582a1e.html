ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等向苏联领导人祝贺新年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等向苏联领导人"},{"type":"paragraph","text":"祝贺新年的电报"},{"type":"paragraph","text":"（1962年12月31日）莫斯科苏联共产党中央委员会第一书记、苏联部长会议主席尼·谢·赫鲁晓夫同志，苏联最高苏维埃主席团主席列·伊·勃列日涅夫同志："},{"type":"paragraph","text":"在1963年新年来临的时候，我们代表中国人民、中国共产党和中国政府，向你们，并且通过你们，向伟大的苏联人民、苏联共产党和苏联政府致以衷心的、热烈的祝贺。"},{"type":"paragraph","text":"在过去的一年里，伟大的苏联人民在苏联共产党领导下，在共产主义建设中，取得了新的成就。中国人民对苏联人民所取得的成就，感到无比的喜悦。我们衷心地预祝兄弟的苏联人民在新的一年里，在建设共产主义和维护世界和平的事业中取得更大的成就。"},{"type":"paragraph","text":"中苏两党两国的团结，社会主义阵营和国际共产主义运动的团结，是中苏两国人民、社会主义阵营各国人民和全世界人民的根本利益所在。在新的一年中，中国人民将一如既往，在马克思列宁主义和无产阶级国际主义的基础上，竭尽一切努力，加强中苏两国人民的团结，加强社会主义阵营和国际共产主义运动的团结。中国人民将永远同苏联人民在一起，坚持莫斯科宣言和莫斯科声明的革命"},{"type":"paragraph","text":"毛泽东等向苏联领导人祝贺新年的电报原则，坚决反对帝国主义的战争政策和侵略政策，为争取世界和平、民族解放、民主和社会主义事业的新的胜利而奋斗。"},{"type":"paragraph","text":"祝中苏两国人民的伟大友谊和团结万古长青，祝你们身体健康，祝全体苏联人民新年快乐！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六二年十二月三十一日"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":316,"page_end":317},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6472582a1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
