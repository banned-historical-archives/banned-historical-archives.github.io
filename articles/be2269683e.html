ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"给杨开英的信","alias":"","parts":[{"type":"paragraph","text":"给杨开英的信"},{"type":"paragraph","text":"（1956年12月16日）开英同志："},{"type":"paragraph","text":"很久以前接你一信，甚为高兴。拖延未复，以后查不到你的地址了。近日毛世美他们来看我，知道你在大连的育英中学做教务长，又说你仍患肺病，甚为系念。寄上一点钱以供医药之用。如有所需，尚望告我。我的情况尚好。杨老太太及杨子珍夫妇和我仍有联系。便时望以你的情况见告。"},{"type":"paragraph","text":"祝好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五六年十二月十六日[1]杨开英，毛泽东夫人杨开慧的堂妹。当时任大连第三中学副教导主任。[2]毛世美，现名毛臻，毛泽东的远房侄孙。[3]指杨开智和杨开慧的母亲向振熙。[4]即杨开慧之兄杨开智（字子珍）和他的夫人李崇德。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":12,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":193,"page_end":193},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be2269683e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
