<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共辽宁省委关于开除反党分子前抚顺市委书记赵石党籍的决定","authors":[],"dates":[{"year":1955,"month":9}],"is_range_date":false,"parts":[{"text":"中共辽宁省委关于开除反党分子前抚顺市委书记赵石党籍的决定","type":"title"},{"text":"赵石，地主家庭出身，学生成分，一九三七年入党，同年参加工作。历任：清华大学留校学生会主席、中心县委书记、盟工委书记、省委宣传部长、组织部长、抚顺市委书记等职。根据七届四中全会以后抚顺市委扩大会议和辽西省委扩大会议所揭发的材料，赵石的反党反中央的活动，是日益发展和日益猖狂的，他在思想上、政治上和活动手法上和高岗反党宗派相一致，特别是与高岗反党宗派分子郭峰有密切的联系。几年以来，赵石对中央领导同志不断进行污蔑攻击，使用卑鄙的手法破坏中央领导同志的威信。一九四八年辽吉省委检查总结改革土地制度的干部会议上，批评“左”的偏差，赵石竟恶意地指责中央领导同志对此应首先负责。此后，他更不断地搜集、夸大和捏造中央领导同志的所谓“错误”，遇到机会就和人议论或在会议上若明若暗地提出，用以破坏中央领导同志的威信，进行反党反中央的活动。一九五三年八月底，东北局传达全国财经会议的时候，赵石的反党活动比以前更进了一步，在一次领导小组会上，他向张明远追问中央领导同志有无发言。张明远乘机散布了对中央领导同志的污蔑。这实际上是他们之间反对中央领导同志的互相响应。而赵石在会后又同别人大肆议论，并认为中央领导同志“没有检讨”，表示极为不满。在党的七届全会之前，赵石幸灾乐祸地认为高岗窃取党和国家领导权力的时机已到，于是在一九五四年一月中央“关于增强党的团结的决议”草案发下征求意见的时候，赵石即迫不及待地向高岗反党宗派进行政治投机，一夜之间给中央写了两份报告，名为“意见”和“检讨”，真实的用意则是向中央领导同志展开系统的、全面的、恶毒而猖狂的攻击，其所持的观点与所假借的口实，都和高岗反党宗派完全相同，毫无二致。这是赵石反党活动的最高峰。","type":"paragraph"},{"text":"除反党反中央的错误之外，赵石还有引用和包庇反革命罪犯的行为。当他在辽西省委任组织部长的时候，在镇压反革命运动前后，连续利用职权向我工厂、矿山、机关、学校介绍了五个政治面目不清、历史情况复杂的亲友，其中有重大的反革命分子。赵石的表弟赵志舜是亲手杀害六名革命群众的反革命罪犯，为了逃避本地人民政府逮捕前来投奔赵石，赵石就以“他的学历与工作经历是真实的”亲笔信介绍赵志舜经过学习后参加工作，使这个反革命罪犯逍遥法外数年，直到一九五四年才归案法办；赵石的党侄赵竹安是大地主，曾任蒋匪潢川等六县审判官，现已判明属于五方面的反革命分子，也是赵石给介绍的工作。这些事实说明，赵石严重地丧失了共产党员的政治立场，引用和包庇了反革命罪犯。但是，赵石在这种错误被揭发后，不是诚恳地进行检讨，接受教训，而是百般狡辩抵赖。","type":"paragraph"},{"text":"从东北高干会议揭发出赵石的反党反中央的错误，经过抚顺市委扩大会议，直到现在，已经一年多了，赵石对于自己的严重错误毫无检讨，再三抗拒党的批评和教育，在党的面前无理取闹，反复无常，当大家摆开事实使他无法抵赖的时候，就轻描淡写地承认一些错误，而过后又把自己已经承认了的错误事实全部推翻。他得到机会就向党的组织进攻，企图把党的组织对他所犯错误的批判，曲解为个人之间的无原则纠纷。在抚顺市委扩大会议后，省委为了照顾他的健康批准他到大连休养。他在休养期间，仍不断散布对党的不满的言论，并且堕落到对几个女护理员进行调戏和侮辱。","type":"paragraph"},{"text":"赵石的错误不是偶然的，是有它的历史根源和社会根源的。他出身于没落的封建官僚地主家庭，受了地主、资产阶级很深的影响，入党以来他的极端个人主义并没有得到根本的改造，长期对党不满，近几年来，他又受到高岗反党宗派的影响，他的反党观念在高岗反党宗派的支持下更日益发展和严重起来。","type":"paragraph"},{"text":"赵石的错误是反党反中央，包庇反革命罪犯，道德堕落，并且长期坚持错误，这些都证明他已经丧失了共产党员的起码条作，为了保持党的纪律的严肃性，纯洁党的组织，辽宁省委决定开除赵石的党籍。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编《县委书记以上干部受到开除党籍处分的决定汇编》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fce3b9debe"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
