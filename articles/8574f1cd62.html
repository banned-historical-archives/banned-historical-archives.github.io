ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对《人民日报》社论稿《克服右倾情绪，厉行增产节约》的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对《人民日报》社论稿《克服右倾情绪，厉行增产节约》“的"},{"type":"paragraph","text":"批语和修改2"},{"type":"paragraph","text":"（1959年8月5日）即送吴冷西同志。如六日来不及见报，七日见报也可。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月五日下午十一时半"},{"type":"paragraph","text":"[1]这是新华通讯社社长、《人民日报》总编辑吴冷西遵照毛泽东指示起草的一篇《人民日报》社论稿。原题为《克服松劲情绪，厉行增产节约》，毛泽东审阅时改为《克服右倾情绪，厉行增产节约》。"},{"type":"paragraph","text":"[2]本篇二中用宋体字排印的是毛泽东改写的文字。此外，毛泽东对社论稿还作了个别文字上的修改。"},{"type":"paragraph","text":"[3]这篇社论于1959年8月6日在《人民日报》发表。对《人民日报》社论稿《克服右倾情绪，厉行增产节约》的批语和修改"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"抓紧八、九两个月，进一步展开一个轰轰烈烈的增产节约运动，鼓足干劲，坚决反对在一部分干部中新近抬头的右倾情绪，努力完成和超额完成今年的跃进计划一这是工业、农业、运输业、商业等经济战线上当前的迫切任务。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":257,"page_end":258},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8574f1cd62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
