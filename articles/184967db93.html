"year":1976,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|各族人民学马列"},{"type":"paragraph","text":"毛主席开幸福泉，各族人民心头甜；"},{"type":"paragraph","text":"攻读马列辨路线，浪尖行船道不偏。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|老中青三结合"},{"type":"paragraph","text":"文化革命春雷响，老中青开迎春花；"},{"type":"paragraph","text":"革命代代如潮涌，铁打江山万年红。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|文艺革命"},{"type":"paragraph","text":"红梅迎得百花开，英雄工农上舞台；"},{"type":"paragraph","text":"胸有朝阳破迷雾，更有新篇入画来。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|教育革命"},{"type":"paragraph","text":"泥花油香映桃红，春风送我回工农；"},{"type":"paragraph","text":"“七·二一”道路宽又广，“朝阳”育出万棵松。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|卫生革命"},{"type":"paragraph","text":"嫩芽破土气意豪，不怕狂风撼春苗；"},{"type":"paragraph","text":"赤脚遍医千户疾，身背药箱红灯照。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|“五·七”道路"},{"type":"paragraph","text":"刀锋不磨会生锈，人不锻炼易变修；"},{"type":"paragraph","text":"干校召我重淬火，继续革命大步走。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|上山下乡"},{"type":"paragraph","text":"映日杜鹃漫山崖，我愿做棵扎根花；"},{"type":"paragraph","text":"改造山河红思想，定叫地球绕赤霞。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020108.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|工人阶级进驻上层建筑"},{"type":"paragraph","text":"谁说工人“老大粗”?从来工人擎天柱；"},{"type":"paragraph","text":"文化领域从今占，一代新章万代谱。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020109.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|工农兵理论队伍"},{"type":"paragraph","text":"朵朵新花拒霜冻，工人师傅批林、孔，"},{"type":"paragraph","text":"处处车间擂战鼓，痛击右倾翻案风。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020110.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|农业学大寨"},{"type":"paragraph","text":"千军万马齐奋战，大道金光凯歌谱；"},{"type":"paragraph","text":"斗天斗地斗敌人，全国描绘大寨图。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020111.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|工业学大庆"},{"type":"paragraph","text":"刹把震地油成河，铁人一吼地球抖；"},{"type":"paragraph","text":"爬行主义踩脚下，大庆红旗拂九州。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\05\\7653020112.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e|开门办料研"},{"type":"paragraph","text":"楼院森森路不通，打开重门向工农；"},{"type":"paragraph","text":"且看卫星任往来，高擎红旗照太空。"},{"type":"paragraph","text":"(上海人民出版社供稿)\u003c/FONT\u003e"}],"comments":[],"origin":"上海人民出版社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":
