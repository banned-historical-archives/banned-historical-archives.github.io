:1966,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席站在天安门城楼上，他老人家红光满面，向我们点头微笑。毛主席，您是在向全中国人民点头微笑啊!"},{"type":"paragraph","text":"毛主席啊，毛主席!您不断地向我们招手致意。您给我们指引了前进的方向，向我们发出了伟大的战斗的号召。您这双手是世界上最有力量的手!您用这双手写出了许多不朽的著作，为中国革命和世界革命指出了明确的方向。在这场史无前例的无产阶级文化大革命中，您又亲自主持制定了无产阶级文化大革命纲领性的文件——十六条。它照亮了无产阶级文化大革命的道路，是这场无产阶级文化大革命的行动指南。"},{"type":"paragraph","text":"毛主席啊!毛主席，我是您的忠实的红小兵。我一定在斗争中，活学活用您的著作，最坚决地按十六条指示办事，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"上海市陕北中学红卫兵　胥吉龙"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47cce0aafe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
