script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海郊区枫围公社出现一支战斗的故事员队伍  讲一个故事批判一个修正主义谬论  更加激起贫下中农对中国赫鲁晓夫的仇恨","authors":[],"dates":[{"year":1967,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海郊区枫围公社出现一支战斗的故事员队伍"},{"type":"paragraph","text":"讲一个故事批判一个修正主义谬论"},{"type":"paragraph","text":"更加激起贫下中农对中国赫鲁晓夫的仇恨"},{"type":"paragraph","text":"据新华社上海二十日电　上海郊区金山县枫围公社在革命大批判中，“杀”出了一支批判中国的赫鲁晓夫的故事员队伍。他们针对中国的赫鲁晓夫的种种修正主义论点，采取一个故事批驳一个论点的方法，充分发挥了革命故事在革命大批判中的战斗作用。"},{"type":"paragraph","text":"在革命的大批判中，这个公社的领导小组非常重视开展革命故事活动。他们首先培训了四十多个故事员，组成故事创作组。参加培训的故事员根据毛主席的“我们的文学艺术都是为人民大众的，首先是为工农兵的，为工农兵而创作，为工农兵所利用的”教导，根据当地贫下中农在大小控诉会上所揭发的中国的赫鲁晓夫的滔天罪行，贫下中农在旧社会所受的阶级压迫、阶级剥削的血泪史，抓住中国的赫鲁晓夫所鼓吹的“四大自由”、“三自一包”、“阶级斗争熄灭”论、“剥削无罪”等修正主义谬论，以及他所推行的“打击一大片，保护一小撮”的资产阶级反动路线，有的放矢地编成一批故事，逐个地加以批驳。他们带着编好的故事，深入茶馆、田头试讲，征求贫下中农的意见，边讲边改。故事从群众中来，再推广到群众中去。"},{"type":"paragraph","text":"革命故事员手拿红彤彤的《毛主席语录》，走到哪里讲到哪里。以大批判为内容的革命故事《千万不要忘记阶级斗争》、《剥削有罪，造反有理》、《打倒中国的赫鲁晓夫》等，在广大社员中广泛讲说以后，引起了很大的反响。许多贫下中农听了这些故事后义愤填膺地说，中国的赫鲁晓夫，吃农民的饭，穿农民的衣，睁着眼睛说瞎话，胡说什么“剥削无罪”，这是和地主、资本家一鼻孔出气，唱的是一个调子，他妄想复辟资本主义，我们万万不答应。"},{"type":"paragraph","text":"枫围公社故事员分布在生产大队和生产队，是一支宣传毛泽东思想的轻骑兵。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b95306a7e2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
