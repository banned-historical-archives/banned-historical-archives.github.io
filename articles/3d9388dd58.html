art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"乔治乌——德治接见彭德怀部长","authors":[],"parts":[{"type":"paragraph","text":"新华社布加勒斯特22日电 罗马尼亚工人党中央委员会第一书记乔治乌一德治在今天上午接见了以国务院副总理兼国防部长彭德怀元帅为首的中国军事友好代表团全体团员。"},{"type":"paragraph","text":"接见时在座的有罗马尼亚工人党中央政治局委员波德纳拉希、齐奥塞斯库、武装部队部部长萨拉扬以及中国驻罗马尼亚大使馆临时代办王鲁明。"},{"type":"paragraph","text":"据新华社布加勒斯特21日电 以国务院副总理兼国防部长彭德怀元帅为首的中国军事友好代表团，连日来在罗马尼亚进行了参观访问活动。"},{"type":"paragraph","text":"由彭德怀元帅率领的一组代表团团员21日访问了布加勒斯特的“毛泽东机器制造厂”，他们受到了工厂职工的热情欢迎和接待。厂长亚历山德鲁向代表团团员介绍了该厂的生产情况和工人过去的光荣斗争历史。彭德怀元帅对该厂对中国工业建设给予的兄弟的支援表示感谢。"},{"type":"paragraph","text":"代表团的这个小组当天在访问“毛泽东机器制造厂”以前，还访问了普罗什蒂的“五一”石油设备制造厂和一座石油井。他们在20日还访问了罗马尼亚的军事学院。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d9388dd58"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
