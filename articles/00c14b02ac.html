" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"同意所提战俘交换方针","alias":"","parts":[{"type":"paragraph","text":"同意所提战俘交换方针"},{"type":"paragraph","text":"（1953年3月22日）恩来同志："},{"type":"paragraph","text":"三月二十日、二十一日两电均收到。我们同意所提方针。这实际上即是去年九月上旬我们向谢明诺夫同志所提三个方案中的一个方案，即将已达成协议的俘虏按比例交换，而将未达成协议的俘虏交给如印度一类的中立国管理待后解决。后来因美国在板门店采取横蛮态度，这个方案未能提出。现在提出这个方案是适合时机的。唯我方声明中应将俘虏分为达成协议者和未达成协议者，而不称为愿回家者和不愿回家者，以免和我们历来反对所谓“自愿遭返”原则相冲突。具体步骤待你回来酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五三年三月二十二日[1]这是毛泽东给正在苏联访问的周恩来的电报。[2]谢明诺夫，即斯大林。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":89},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00c14b02ac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
