<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“鱼米之乡”为什么吃不到鲜鱼活虾","authors":["奚杰"],"dates":[{"year":1962,"month":3,"day":28}],"is_range_date":false,"parts":[{"text":"“鱼米之乡”为什么吃不到鲜鱼活虾","type":"title"},{"text":"奚杰","type":"authors"},{"text":"本刊讯    人民日报读者、江苏省商业厅奚杰来信反映了江苏省水产经营中的一些问题。","type":"paragraph"},{"text":"来信说，江苏是“鱼米之乡”，1957年以前，各个城市居民吃到的大多是鲜鱼活虾。但1958年以后，就很少能买到新鲜鱼虾了，大多是咸鱼、冰鱼、死鱼、臭鱼、红虾。病员、产妇要想买点活鲜鱼，只得出高价到自由市场上去买。造成这种情况的主要原因是：","type":"paragraph"},{"text":"（一）水产经营和理的体制问题。1957年以前，水产公司的主要任务是组织生产和运销。除在有调拨、出口任务的重点产区进行收购、加工、调拨外，对一般产区主要是组织合作商购运销，实行产运销见面。小商购每天晚上用自行车或肩挑下乡进货，早晨回来就卖，都是鲜鱼活虾。1958年以后就不同了。水产公司实行统一收购，然后再批发给商贩，经营环节由过去的渔民——商贩一道，增加为渔民——水产公司收购站——水产公司批发部或仓库——商贩三道或四道。由于高度集中，数量多，不便肩挑，只好用汽车或船只集中运输，进冷藏库保管。由于运输时间长，上下次数多，原来的新鲜水产品就变成臭的、烂的了。","type":"paragraph"},{"text":"（二）市场管理过死过严，影响地区交流和生产者自产自销。1957年以前，小商购可直接深入产区购货，起亦运亦销的作用，现在一律不准“出口”，发现了就“没收”，生产者自产的鱼拿进城出售也被视为非法，加以禁止。最后只剩国营公司独家经营了。与南京一江之隔的六合县瓜埠镇。过去渔民一向是早上捕鱼，下午送到南京水产交易所出售给小商贩，既及时又新鲜。1958年以后瓜埠镇成立了县食品水产收购站，不论大小鱼虾，数量多少，一律由收购站收购，加工成咸鱼、虾干，再调到南京水产公司出售。这样，既增加了成本（盐），又浪费了人力、物力。更重要的是消费者吃不到新鲜鱼虾了。","type":"paragraph"},{"text":"（三）由于捕鱼工具缺乏以及水利建设引起河道变化等客观原因，也使鱼产量减少。","type":"appellation"},{"text":"来信认为，要能使城市人民吃到活鲜鱼虾，在经营方式和管理体制上要恢复1957年以前的做法，减少经营环节，充分发挥城市商贩亦运亦销与渔民自产自销相结合的作用。","type":"paragraph"},{"text":" 来源：根据人民日报读者来信，载1962年3月28日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6691ed00ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
