" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"江西省宗教界人士学习班学员鸣放出的十五点反动言论","authors":[],"dates":[{"year":1957,"month":11,"day":16}],"is_range_date":false,"parts":[{"text":"江西省宗教界人士学习班学员鸣放出的十五点反动言论","type":"title"},{"text":"新华社南昌16日讯  由江西省人委办公厅举办的江西省宗教界人士学习班已在10月21日正式开始学习，预计两个月结束。参加学习的有来自全省各重点市县的天主教、基督教神职人员和部分教徒一百零九人。学习期间准备分四个阶段：第一阶段是安定情绪，学习文件；第二阶段是鸣放；第三阶段是批判、辩论；最后阶段是总结。","type":"paragraph"},{"text":"现在已由鸣放转到批判、辩论阶段。神职人员和教徒在鸣放中“放”出的反动言论大致可分为十五点：","type":"paragraph"},{"text":"1.\t社会主义是铁幕，没有民主自由，给人民带来灾难和痛苦。","type":"paragraph"},{"text":"2.\t爱国会是傀儡组织，是共产党插在宗教内的一把刀子。","type":"paragraph"},{"text":"3.\t爱国会是叛教、裂教，是脱离教皇的组织。","type":"paragraph"},{"text":"4.\t教会里没有帝国主义分子和反革命分子，肃反运动把人民内部矛盾扩大为敌我矛盾。","type":"paragraph"},{"text":"5.\t无神论与有神论者水火不相容，宗教与社会主义无法共存。","type":"paragraph"},{"text":"6.\t不能拥护共产党和社会主义，如拥护了就是承认唯物主义，承认它就是反对自己。","type":"paragraph"},{"text":"7.\t宁可失天下，不可失灵魂。","type":"paragraph"},{"text":"8.\t圣母军不是反动的，是共产党在报上渲染的。","type":"paragraph"},{"text":"9.\t公教与非公教的人不能在一起辩论。","type":"paragraph"},{"text":"10.\t梵蒂冈不是帝国主义，因为它不是独立国，要坚决跟它走，不要与它割断政治、经济联系。","type":"paragraph"},{"text":"11.\t承认中国有两个政府：北京政府和台湾政府。","type":"paragraph"},{"text":"12.\t爱国不分新中国与旧中国。","type":"paragraph"},{"text":"13.\t半个社会主义论：承认社会主义建设，不承认共产党领导宗教。","type":"paragraph"},{"text":"14.\t爱国会的进步领导是封建把头，是政府的狗腿子。","type":"paragraph"},{"text":"15.\t宗教通论是给中国教友的警惕。（董瑛）","type":"paragraph"},{"text":"新华通讯社编：《内部参考》，第2363期，1957年11月20日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4d4ecce94"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
