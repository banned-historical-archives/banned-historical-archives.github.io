<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捍卫苏联文学的党性和人民性 必须对修正主义作坚决的斗争马尔科夫作关于修改苏联作协会章的报告","authors":[],"dates":[{"year":1959,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社莫斯科22日电】　苏联第三次作家代表大会21日继续开会。代表们听取了马尔科夫关于修改苏联作家协会会章的报告、十多位代表在大会上发言，讨论苏尔科夫和马尔科夫的报告。"},{"type":"paragraph","text":"马尔科夫在报告中说，四年多以来，苏联文学获得了重要的发展，并且积累了许多新的经验，因此有必要对作家协会的会章进行某些修改和补充、在新会章中必须进一步阐述社会主义现实主义的原则，强调捍卫苏联文学的党性和人民性，马尔科夫强调指出，苏联作家为了保卫社会主义现实主义的原则，必须对资产阶级影响的各种形式，特别是修正主义(它是文学和文学理论发展中的主要危险)作坚决斗争。"},{"type":"paragraph","text":"在苏联作家协会领导机构组织形式方面，马尔科夫建议取消理事会中的主席团，而加强理事会书记处的工作、书记处的任期可以缩短为两年改选一次。"},{"type":"paragraph","text":"在上午会议的讨论发言中，哈萨克作家穆斯列波夫、巴什基尔作家比克钦塔耶夫、格鲁吉亚作家列昂尼德泽等建议成立全苏民族文学研究所。"},{"type":"paragraph","text":"在下午会议上，文学批评家留里科夫在发言中谈到了社会主义国家的作家之间的合作已经加强的情况，并且严正谴责了南斯拉夫修正主义者对苏联文学的诬蔑。"},{"type":"paragraph","text":"苏联戏剧家萨夫罗诺夫在发言中说，修正主义是苏联作家的双重敌人，因为修正主义者既诬蔑苏维埃国家制度；又诬蔑苏联文学。修正主义者的叫嚣是完全没有用的。因为苏联作家是苏共党培养出来的新型知识分子，他们用自己的文学为共产主义建设服务。"},{"type":"paragraph","text":"苏联著名诗人特瓦尔多夫斯基在发言时说，目前苏联作家的主要任务是深入地了解自己在七年计划中的任务。在大规模开展共产主义建设的新时期中，苏联人民迫切需要优秀的文学作品。新作家们应当向老作家们学习，严格地要求自己应当提高作品的思想水平和艺术水平。"},{"type":"paragraph","text":"苏联“文学报”总编辑斯米尔诺夫在发言中谈到了作家深入生活的情况。他说，在6月初，一批苏联作家组成的工作队将乘“文学报”车厢去西伯利亚的一些宏伟的建设中去生活3个月。今后，作家们还将不断轮换。使作家们都有深入生活的机会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19baa3c5cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
