:[{"year":1979,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见日本知名人士松本重治一行"},{"type":"paragraph","text":"新华社北京十月二十三日电  国务院副总理邓小平今天上午在这里会见了日本知名人士松本重治一行。"},{"type":"paragraph","text":"会见时，邓小平副总理同八十岁高龄的松本重治先生进行了亲切友好的谈话。邓副总理说，你带来的大平正芳首相给我的信已经看到了。我期待着不久能在北京同他见面。邓副总理请松本先生回国后转达他对大平首相的问候。松本先生就进一步发展日中双方的文化学术交流问题同邓副总理进行了交谈。"},{"type":"paragraph","text":"人大常委会副委员长、中日友协会长廖承志等会见时在座。"},{"type":"paragraph","text":"日本驻中国大使馆公使伴正一，会见时也在座。（附图片）"},{"type":"paragraph","text":"邓小平副总理同日本知名人士松本重治亲切握手。"},{"type":"paragraph","text":"新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9fea1c50e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
