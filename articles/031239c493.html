"year":1982,"month":6,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《凉山彝族奴隶社会》出版"},{"type":"paragraph","text":"一部介绍凉山彝族社会的著作《凉山彝族奴隶社会》，已由人民出版社出版。书中对解放以前长期存在的凉山彝族奴隶社会的生产力和生产关系、经济基础和上层建筑的各个方面及其间的相互关系，作了介绍和分析。"},{"type":"paragraph","text":"直到解放前为止，凉山彝族地区的生产力的发展水平很低，但那里又使用了由汉族地区传入的一些铁制农具和耕作技术，因而农产品除满足劳动者的生活必需以外，还有剩余。作者认为这就是凉山彝族奴隶制产生和存在的物质基础。书中介绍了凉山彝族奴隶社会存在过的兹莫、诺合、曲诺、阿加和呷西五个等级，前二者为奴隶主贵族统治等级，后三者为被统治等级。该书对该地区奴隶社会奴隶主对奴隶进行残酷剥削和压迫的制度、手段，对奴隶的痛苦生活情况，作了具体介绍。它集中说明凉山彝族社会是奴隶社会的活标本。（张效英）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"031239c493"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
