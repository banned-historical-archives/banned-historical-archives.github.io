<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"遵照毛主席教导，作越南人民的坚强后盾","authors":[],"dates":[{"year":1967,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们坚决支持你们。我们两国是唇齿相依的邻邦。我们两国人民是休戚与共的兄弟。兄弟的越南南方人民和全体越南人民可以相信，你们的斗争就是我们的斗争。七亿中国人民是越南人民的坚强后盾，辽阔的中国领土是越南人民的可靠后方。在我们两国人民坚强的战斗团结面前，美帝国主义的任何军事冒险和政治欺骗都是注定要失败的。\t\t\t\t毛泽东"},{"type":"paragraph","text":"遵照毛主席教导，作越南人民的坚强后盾"},{"type":"paragraph","text":"北京针织总厂无产阶级革命派大联合委员会"},{"type":"paragraph","text":"在越南南方人民的光荣旗手——越南南方民族解放阵线成立七周年之际，世界革命人民的伟大领袖、我们心中最红最红的红太阳毛主席给阮友寿主席的贺电，不仅是对越南南方人民的最大支持和鼓舞，而且是对世界革命人民的最大支持和鼓舞。毛主席的贺电，完全说出了七亿中国人民的心愿，说出了世界革命人民的心愿。我们针织总厂的无产阶级革命派和全体革命职工，认真地学习了这个贺电，并进行了广泛的座谈和讨论。大家对毛主席的贺电一千个支持，一万个拥护！纷纷表示坚决遵照伟大领袖毛主席的教导，把支持越南人民的抗美救国斗争，当做自己义不容辞的国际主义义务。"},{"type":"paragraph","text":"越南南方民族解放阵线在炮火纷飞的战斗岁月里，高举抗美救国的伟大旗帜，把越南南方各阶层人民最广泛地团结在自己的周围，同美帝及其走狗进行了艰苦卓绝的战斗，极大地发挥了人民战争的威力，为全世界人民树立了反美武装革命斗争的光辉榜样。"},{"type":"paragraph","text":"越南人民抗美救国战争的伟大胜利，雄辩地证明：依靠人民，坚持武装斗争，用革命战争反对反革命战争，是被压迫民族和被压迫人民争取彻底解放的唯一道路。"},{"type":"paragraph","text":"正如伟大领袖毛主席指出的：“你们的胜利又一次表明，国家不分大小，只要充分动员人民，坚决依靠人民，进行人民战争，任何强大的敌人都是可以打败的。”英雄的越南南方人民，以“独有英雄驱虎豹”的大无畏精神，敢于斗争，敢于胜利，把号称“强大”的美帝国主义及其走狗打得焦头烂额，走投无路，狼狈不堪，使之陷入了人民战争的汪洋大海之中，面临灭顶的命运。“美国侵略者在越南的日子不长了。”“胜利一定属于英雄的越南人民！”"},{"type":"paragraph","text":"苏联修正主义领导集团竭力想把越南问题纳入苏美合作的轨道，使用假支持、真出卖的反革命两面手法，积极帮助美帝国主义大搞“以炸迫和”和“停炸诱和”的阴谋，妄图扑灭越南人民抗美救国战争的革命烈火。我们正告苏修，这是绝对办不到的！在英雄的越南人民面前，在我们两国人民坚强的战斗团结面前，美帝国主义的任何军事冒险和政治欺骗，都是注定要失败的。"},{"type":"paragraph","text":"我国无产阶级文化大革命的伟大胜利，使中国人民更有力量支援越南兄弟的正义斗争。七亿中国人民永远是越南人民的坚强后盾，中国的辽阔国土永远是越南人民的可靠后方。用毛泽东思想武装起来的中国人民，将始终不渝地支持英雄的越南人民。我们针织总厂的无产阶级革命派和广大革命职工，坚决响应伟大领袖毛主席的伟大号召，步步紧跟毛主席的伟大战略部署，永远忠于毛主席的革命路线，“要斗私，批修”，要“拥军爱民”，要抓革命，促生产、促工作、促战备，把各方面的工作做得更好，把无产阶级文化大革命进行到底，以实际行动坚决支持英雄的越南人民的抗美救国正义斗争。在越南人民需要的时候，只要伟大统帅毛主席一声令下，我们立即开赴反美斗争前线，与越南兄弟并肩战斗，把美国侵略强盗一个不剩地从越南神圣的土地上赶出去！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d0033227c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
