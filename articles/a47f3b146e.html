art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想统一两派思想","authors":["北京市西城区军训联合指挥部"],"parts":[{"type":"paragraph","text":"我们在北京市西城区开办了毛泽东思想学习班。参加学习的是一些中学革命群众组织的负责人。初来时，他们有着各种各样的顾虑：有的怕搞人人过关，先来试探一下；有的让能说会道的带着对方的材料来，想利用学习班当作两派斗争的战场。"},{"type":"paragraph","text":"学习班开头几云，两派负责人坐在一起，互相不说话，却提出要开自己一派的串连会。我们研究了这一情况，认为采取硬性制止的办法是不行的，就因势利导，分别找他们谈心，交谈对毛主席伟大战略部署的看法，和他们一起学习毛主席关于促进革命大联合的指示。大家越学越感到毛主席对革命群众亲切关怀，越学越悔恨自己闹派性的错误。结果，两派开的串连会，变为讨论形势、正确对待对方、消除派性的会。"},{"type":"paragraph","text":"我们又引导两派负责人，由背靠背地检查自己，到面对面地自我批评。先组织大家学习毛主席《关于正确处理人民内部矛盾的问题》、《关于纠正党内的错误思想》的有关章节和江青同志的讲话，采取小组讨论、大会讲用的方法，引导他们分清两类矛盾，认识派性的危害。这一来，不少学校两派组织的负责人把自己打“内战”的计划揭开了。高三、初三班有的同学把自己毕业后的“接班人”的底也亮出来了。这些所谓“核心机密”，过去是根本不告诉对方的，可是，在毛泽东思想的指引下，在狠斗派性当中，都心情舒畅地谈出来，认真地作自我批评。在斗私的同时，我们又引导大家，狠批资产阶级反动路线，大家都激动地表示，要联合起来，彻底摧毁资产阶级司令部，当好无产阶级革命事业的接班人。"},{"type":"paragraph","text":"现在西城区四十二所军训的学校全部实现了革命的大联合。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a47f3b146e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
