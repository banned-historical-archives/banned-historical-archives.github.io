<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"威尔科克斯在雅加达的阿里亚哈姆社会科学学院讲话新共坚决同世界上马列主义者站在一起 为反对帝国主义和现代修正主义而斗争","authors":[],"dates":[{"year":1964,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达5日电】　据印度尼西亚《人民日报》今天报道，新西兰共产党总书记威尔科克斯三日在雅加达的阿里亚哈姆社会科学学院讲话时说:新西兰共产党将坚决地同世界上的马克思列宁主义者站在一起，为反对帝国主义和修正主义而斗争。"},{"type":"paragraph","text":"威尔科克斯说，一切马克思列宁主义政党必须同世界反帝力量一道展开联合斗争，支持越南、柬埔寨和印度尼西亚人民反对帝国主义，首先是反对美帝国主义的斗争。只有这样，他们才能尽快地埋葬帝国主义。"},{"type":"paragraph","text":"威尔科克斯说，修正主义者曾经对他说，新西兰人民将不能理解新西兰共产党发出的关于支持南越人民反对美帝国主义的斗争和印度尼西亚人民粉碎“马来西亚”的斗争的号召。修正主义者自以为是老师，并且劝告新西兰共产党采取“人民所能够理解”的立场。他说:这是不能接受的。不可能想象:竟然可以在目前正在从事反对“马来西亚”斗争的印度尼西亚人民面前，鼓吹什么事情都不做而只等待帝国主义灭亡的主张。"},{"type":"paragraph","text":"威尔科克斯说:当代世界上最主要的矛盾是被压迫人民和帝国主义之间的矛盾。他说:“资产阶级不会找上门来把他们所占有的全部财产拱手交给我们。只有笨蛋和修正主义者才会谈论去打破目前还相对强大的帝国主义堡垒而不去突破帝国主义最薄弱的环节。”"},{"type":"paragraph","text":"威尔科克斯说，他因为对帝国主义采取了坚定的立场，就被现代修正主义者扣上教条主义和宗派主义的帽子。"},{"type":"paragraph","text":"威尔科克斯在谈到新西兰共产党在国内对修正主义者和托洛茨基分子进行的斗争时说:新西兰工人阶级在新西兰共产党领导下最近对阶级合作论进行了斗争并取得胜利。工会在阶级斗争中取得了进展。"},{"type":"paragraph","text":"阿里亚哈姆社会科学院副院长苏吉约诺在讲话时对新西兰共产党支持印度尼西亚人民粉碎新殖民主义的“马来西亚”的斗争表示感谢。他说，现在印度尼西亚人民正在进行反对三害的斗争，这三害就是:美英帝国主义所建立的新殖民主义“马来西亚”、农村恶魔(指恶霸地主和高利贷者等)和现代修正主义。"},{"type":"paragraph","text":"苏吉约诺说，人们可以从威尔科克斯的讲话中得出如下的结论:新西兰共产党正在把马克思列宁主义同新西兰工人阶级运动结合起来，从而使马克思列宁主义新西兰化。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98be010560"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
