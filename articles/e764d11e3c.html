"https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d.pdf"],"article":{"title":"各国共产党应成为完全独立的党","alias":"","parts":[{"type":"paragraph","text":"各国共产党应成为完全独立的党"},{"type":"paragraph","text":"一一谈共产国际是否继续存在的问题"},{"type":"paragraph","text":"（1941年4月20日）1941年4月20日"},{"type":"paragraph","text":"在大剧院中。"},{"type":"paragraph","text":"塔吉克斯坦的闭幕演出。出席者（在政治局包厢中）有斯大林、莫洛托夫、加里宁、伏罗希洛夫、安德烈耶夫、米高扬、卡冈诺维奇、什维尔尼克、什切尔巴科夫、日丹诺夫、马林科夫、季米特洛夫。"},{"type":"paragraph","text":"演出结束后我们呆到两点。"},{"type":"paragraph","text":"当时斯大林说：一些党（暗指美国共产党）从共产国际季米特洛夫那里出来了。这并不是坏事。正相反，各国共产党应成为完全独立的党，而不是共产国际下面的支部。它们应变成叫做工人党、马克思主义党等名称的本国的共产党。名称并不重要，重要的是它们应到本国人民中间去并把力量集中于完成自己的特殊任务。"},{"type":"paragraph","text":"它们应有共产主义纲领，应依靠马克思主义的分析，而不是时不时地看一眼莫斯科，它们应独立地解决它们在各自的国家面临的具体任务。不同国家中的情况和任务完全不同。在英国是一个样，在德国又是一个样，在其他国家也是如此。当各国共产党按此方式得到巩固时，再重新恢复它们的国际组织。"},{"type":"paragraph","text":"（第一）国际是马克思时期建立的，当时正期待着即将发生世界革命。共产国际是在列宁时期同样形势下建立的。当前，每个国家本国的任务突出了，然而，各国共产党作为从属于共产国际执行委员会的国际组织下面的支部这种状况是个障碍····"},{"type":"paragraph","text":"从（共产国际）本位主义利益的观点看这可能是不愉快的事，然而，这种利益不起决定性作用！"},{"type":"paragraph","text":"在当前的条件下，各国共产党从属于共产国际使得资产阶级更易于迫害它们，使其更易于实现把共产党同本国群众隔绝起来的计划，而对各国共产党来说，则会妨碍它们的独立发展以及作为本国的政党来实现自己的任务·····"},{"type":"paragraph","text":"共产国际在近期是否继续独立存在以及在世界大战的条件下国际联络和国际工作的新形式问题尖锐地、明确地提出来了。《季米特洛夫日记选编》"},{"type":"paragraph","text":"选自新编《斯大林全集》2002年版第134-135页"},{"type":"paragraph","text":"档案附卷十第16一17页"}],"authors":["斯大林"],"dates":[{"year":1941,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":2763,"page_end":2764},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e764d11e3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
