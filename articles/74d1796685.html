"month":4,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:无政府主义是资产阶级向我们进攻的一个思想武器。在我们无产阶级革命队伍中的某些人，也在闹无政府主义，从而分散了我们的斗争目标，转移了斗争的大方向，中了党内最大的一小撮走资本主义道路当权派的鬼计。对此，我们决不能等闲视之。"},{"type":"paragraph","text":"今天，本报发表了有关这方面的读者来信和文章，对无政府主义的危害进行了揭露和批判。来信来稿列举的事实证明:无政府主义是党内最大的一小撮走资本主义道路当权派所极力宣扬的“怀疑一切，排斥一切，打倒一切”的反动思潮的恶果，使得某些受了这种反动思潮毒害的同志无视无产阶级的革命权威，走上极端民主化的邪路。其次，无政府主义也是个人第一主义，是某些同志头脑中“私”字的一种表现，这些同志老是突出一个“我”字，什么“我不同意”，什么“我不执行”，把自己置于群众之外，置于组织之外，置于革命的秩序之外。"},{"type":"paragraph","text":"无政府主义是无产阶级革命权威的大敌。我们希望广大无产阶级革命派立即行动起来，彻底肃清“怀疑一切，排斥一切，打倒一切”的反动思潮；狠夺自己头脑中“私”字的权，加强革命的组织性、纪律性，对无政府主义来一个歼灭战。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74d1796685"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
