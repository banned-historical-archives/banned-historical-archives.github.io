{"year":1967,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不许为右倾机会主义分子翻案"},{"type":"paragraph","text":"炊事员　孙先仁"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派在一九六二年再次抛出他的大毒草《修养》，极力为右倾机会主义分子鸣冤翻案，把对右倾机会主义分子的斗争，诬蔑为“捕风捉影”、“平地起风波”。"},{"type":"paragraph","text":"毛主席说：修正主义者、右倾机会主义者总是“反对或者企图削弱人民民主专政和共产党的领导”。右倾机会主义分子彭德怀一伙，拚命攻击三面红旗，反对社会主义制度，集中到一点，就是妄图变无产阶级专政为资产阶级专政，在中国复辟资本主义。他们是无产阶级专政不共戴天的仇敌。中国的赫鲁晓夫和彭德怀等右倾机会主义分子本来就是一个黑窝里的豺狼，他们做的都是资本主义的梦，走的都是修正主义的路，干的都是破坏无产阶级专政的勾当。他们在背叛无产阶级专政这点上是完全一样的，他们都是疯狂地在向无产阶级专政挑战！"},{"type":"paragraph","text":"总头目一声呼唤，牛鬼蛇神纷纷出笼。一九六二年我们家乡刮起了单干风、翻案风，村里地主、富农极为嚣张，向贫下中农要地要房，反攻倒算。当时我想不通，这些坏家伙为什么敢这样无法无天。现在才明白，原来是有这样一个“大人物”在背后给他们撑腰打气。这就说明，党内最大的走资本主义道路当权派为右倾机会主义分子翻案，就是要搞资本主义复辟。"},{"type":"paragraph","text":"无产阶级专了右倾机会主义分子的政，不准他们到处乱说乱动，兴风作浪，党内最大的走资本主义道路当权派就骂我们“横暴”，是用“党外斗争的手段来惩罚同志”。这里，党内最大的走资本主义道路当权派极端仇视无产阶级专政的一副凶相，完全赤裸裸地暴露出来了。"},{"type":"paragraph","text":"对无产阶级专政的这种咒骂，我们已经听得很多了。我们要提醒这些老爷们，我们同你们的关系是无产阶级压迫资产阶级的关系，是无产阶级对资产阶级实行专政的关系。老实告诉你们，我们和你们之间绝不能是什么平等的关系。要说这是“棍子”，那么这是无产阶级专政的“金棍子”。你们对这根“金棍子”既怕得要死，又恨得要命。你们又是骂又是跳，就是为了想叫我们放下这根“金棍子”，你们好反过来专我们的政。我们要警告党内最大的一小撮走资本主义道路当权派，你们要想让我们放下无产阶级专政这根“金棍子”，这是痴心妄想！我们一定紧握这根“金棍子”，把你们彻底打倒。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6074e979e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
