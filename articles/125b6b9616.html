规定给中南局的批复","authors":[],"dates":[{"year":1950,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"中共中央关于解决农村旧债纠纷问题的规定给中南局的批复","type":"title"},{"text":"中南局：","type":"appellation"},{"text":"十月十七日转来湖北省委关于解决农村中旧债纠纷问题的规定已阅悉。新区农村债务纠纷的处理办法，已由政务院于酉敬发出，望遵照该办法处理。至于中贫农之间的债务关系，应承认其继续有效，与农民欠地主富农的旧债应有原则的区别，否则会增加今后农村借贷上的许多思想顾虑，不利于生产。如发生纠纷时可由乡村人民政府和农民协会会同借贷双方协商调处之，只要合乎双方具体情况，而又双方同意的办法，即可解决，不必有利二倍于本停利还本及利三倍于本本利停付之明文的法律规定，但人民政府及农民协会调停此种纠纷时，可提出此种办法去征求双方同意。","type":"paragraph"},{"text":" 中  央酉  宥","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"125b6b9616"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
