<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对教学上的资产阶级思想","authors":["碧良"],"dates":[{"year":1952,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"碧良"},{"type":"paragraph","text":"上课，是学校教育的基本形式，大家都承认不该浪费一分钟；可是教师们在教学上对于时间的浪费，是很严重的。"},{"type":"paragraph","text":"有些教了多年书的老先生，经常是拿起教本一看:“喔!还不是这点东西，用得着准备么?”就兴冲冲的走上讲台，灵机一动，信口开河。"},{"type":"paragraph","text":"有些教师，走到了课堂，才问学生:“上次讲到什么地方?”接着就随心所欲的“发挥”一通。例如课文中提到杭州，就把杭州的名胜古迹谈它一个钟点；又把杭州的名产风俗，谈它两个钟点。课文的作者是孔厥，于是从孔厥是苏州人、当过苏州商务印书馆的学徒谈起，谈到他曾在京沪铁路卖过烧饼，谈到他在延安鲁迅艺术学院出来后当过乡长，越扯越远，直扯到他的爱人袁静也是作家，教师是讲得滔滔不绝，学生也识得目瞪口呆，可是这样扯了一节又一节，这与课文的主题有多少关系?"},{"type":"paragraph","text":"教学的思想性，固然是决定于教材内容；可是要把思想性表达出来，仍然是决定于教师的讲解。这样课前很少准备、上课又乱扯一阵的教学，不是浪费么?"},{"type":"paragraph","text":"有些教师常说教本内容丰富、分量过重，一个学期教不完，这或许是事实。但是检查一下，是不是有这种现象:有的是废话连篇，有意识或无意识地拖延时间。有的是学生已懂得的，也大谈一通。像极浅近的词:“难道”、“无论”、“疙瘩”，也详加注释。有的是屁股向学生，写满一黑板，等学生照抄完毕，已到了下课时间。有的是提些空洞的、庸俗的甚至没有价值的问题，也展开讨论。有的是一两个学生的问题，也解答了半个钟头。有的是对所教学科毫无计划，教到那里就算那里，要怎样教，就怎样教。有的兼班主任的老师，在课上讲了不少班级上的事情。有的是对各科的目的性不明确，于是把语文当政治讲、把历史当语文讲。有的美其名叫“听讲笔记法”，老师是慢吞吞的宣读教材，学生是记得忙不过来，廿分钟讲得了的，一小时记不了，讲的少，记得忙，学生那会有工夫思考，更谈不到“当堂吸收、当堂消化”了。这些，不是教学上的浪费么?"},{"type":"paragraph","text":"上述种种浪费时间的现象，造成教学上的严重损失，是无法拿金钱来计算的。为什么会产生这种现象的呢?一句话，这是资产阶级思想在教学上的具体表现。"},{"type":"paragraph","text":"不仅如此，资产阶级思想还反映在其他方面:"},{"type":"paragraph","text":"有些教师，认为自己是讲课的，对学生的思想意识、生活作风可以不问，对当前的政治任务也不重视，他们把讲授知识与提高思想分裂开来。其实，讲课不仅是丰富知识，也是培养学生完整人格的过程。"},{"type":"paragraph","text":"有些教师把精简课程，误解为“偷工减料”，于是教的少，学的也少；甚至机械的指定习题一、三、五不做，二、四、六试试。这样，破坏了科学的组织性与系统性，也妨害了知识的巩固。"},{"type":"paragraph","text":"有些教师，对簿本的批改不负责，或者是拖延敷衍。例如批改作文:不指出优点，不批评缺点，接连三四篇文章都评它乙等，学生不知道是进步还是退步。遇到考试，考了算了，这不是变成为考试而考试么?"},{"type":"paragraph","text":"有些教师，对于学生的要求不过问，对学生的思想情况也不了解，完全从自己愿望出发，彻头彻尾依赖教本，讲了算了，不总结，少检查。"},{"type":"paragraph","text":"上述种种资产阶级思想的表现，是贯彻新民主主义教育方针的障碍，必须坚决地反对它。　(原载苏南日报)"}],"comments":[],"origin":"苏南日报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"099dbdbb95"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
