script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越劳动党中央政治局委员黎德寿发表讲话　号召坚决反对现代修正主义　在国内反对资产阶级思想是阶级斗争的重要战线","authors":[],"dates":[{"year":1963,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越劳动党中央政治局委员黎德寿发表讲话"},{"type":"paragraph","text":"号召坚决反对现代修正主义"},{"type":"paragraph","text":"在国内反对资产阶级思想是阶级斗争的重要战线"},{"type":"paragraph","text":"新华社河内二十二日电  据越南《前锋报》报道：越南劳动党中央政治局委员黎德寿十七日向河内和中央各部门的劳动青年团团员和干部一千多人讲话。他在讲话中号召青年必须树立共产主义理想，坚决反对右倾机会主义和现代修正主义。"},{"type":"paragraph","text":"黎德寿在谈到越南劳动党的战斗目标和理想时说，我们的党为了无产阶级和全体人民的解放而战斗，使无产阶级和人民摆脱一切压迫和剥削，建立共产主义的社会，为每个人带来幸福的生活。我们党的理想就是共产主义的理想。这是人类最崇高最美丽的理想。在党刚成立的时候，我们的党就指明并坚持不懈地为这一理想而奋斗。"},{"type":"paragraph","text":"黎德寿用越南和各国的具体历史事实说明，反对帝国主义、反对资本主义和反对其他反动势力的阶级斗争是尖锐、艰巨和激烈的。他强调说，在当前国际范围的思想战线上，我们必须坚决粉碎右倾机会主义、现代修正主义，而南斯拉夫修正主义就是它的最集中和最丑恶的表现。他说，在国内，我们必须进行反对资产阶级和小资产阶级思想的斗争，反对右倾机会主义的各种表现。必须从组织上和思想上以及各方面来巩固党。这是激烈的阶级斗争的极其重要的战线。"},{"type":"paragraph","text":"黎德寿说，只有战胜右倾机会主义、现代修正主义，战胜一切非无产阶级的思想，革命队伍才能统一。这一斗争十分艰巨，但我们必将胜利。"},{"type":"paragraph","text":"黎德寿说，革命者不怕尖锐的斗争，也不怕牺牲。怕斗争、怕牺牲就不敢搞革命。他号召青年们要确立自己应走的正确道路。这就是革命的道路，就是为共产主义理想而战斗的道路。他说，胜利地到达共产主义，这不是平坦的道路，而是曲折的道路。但每当我们越过一段曲折的道路的时候，我们就将取得新的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6761ea82dd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
