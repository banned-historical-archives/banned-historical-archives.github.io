<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"章伯钧在浙江的爪牙——李士豪","authors":["屠正峰"],"dates":[{"year":1957,"month":9,"day":6}],"is_range_date":false,"parts":[{"text":"章伯钧在浙江的爪牙——李士豪","type":"title"},{"text":"屠正峰","type":"authors"},{"text":"农工民主党中央执行局委员、浙江省主委、浙江省林业厅长、右派分子李士豪，近日来，经过广大群众的揭发批判，他的反党、反社会主义的阴谋诡计已经彻底破产了。","type":"paragraph"},{"text":"右派分子李士豪，是章伯钧在浙江的爪牙。章伯钧过去说：“中共可以领导革命，我们农工也可以领导革命。”李士豪也说：“共产党员是特殊材料制成的，我们民主党派也是特殊材料制成的”。大放大鸣期间，章伯钧在北京提出“政治设计院”，李士豪就在杭州叫嚣：“要重新考虑民主党派的作用、地位和与党的关系问题。”章伯钧说国务院拿出的文件都是“成品”，李士豪也说：“省人委拿出来的文件质量很高，无法讨论”。章罗联盟提出：“平反委员会”、“取消高等学校党委制”，李士豪马上号召人们起来“告共产党的状”，“诉共产党的苦”。章伯钧“要办三个刊物”作为反党反社会主义的宣传工具，李士豪随即响应说：“我们在浙江也要办一个象样的刊物”。章伯钧在北京计划发展一、二百万党员，李士豪立即在浙江积极实行“遍地开花、各界铺开”的大发展的方针，对劳改犯、反革命分子、背叛共产党的分子大开方便之门，并用“骗、请、抢、挖、拉”的手段来加速扩充“兵马”。从去年年底起，李士豪逢人便说：“章伯老的情绪大有改变”。李士豪自己也觉得“年老的成员，不再有黄昏的感觉了”，还说：“伯老有我们这些亲信干部，可以好好地干一场了”。","type":"paragraph"},{"text":"在党提出整风的方针以后，李士豪就坐着汽车，往来于杭州、金华道上，到处点火，李士豪还发动农工党党员，到医药卫生、文教、工程技术等基层中去点火，并且再三叮咛：“要谈根本问题”，谈“党群关系”，谈“三反”、“肃反”运动中的问题。李士豪在林业厅亲自邀请“三反”、“肃反”对象和对党不满的分子举行座谈会。从５月２０日到６月１３日短短的二十五天时间内，李士豪就召开了近三十次这样的座谈会，从各方面来发动他的所谓“群众”来向党进攻。","type":"paragraph"},{"text":"在日常工作中，李士豪是利用一切机会进行反共、反人民、反社会主义的活动的。李士豪常对人说：“党员不能领导业务”，“党组的意见可听可不听。”李士豪甚至利用职权来篡改党的政策。去年春天，李士豪利用其他几个副厅长下乡推行绿化工作的机会，一个人单独召开全省国营林场工作会议，不顾林业工程技术人员的反对，擅自将浙江几年来根据中央以大力营造用材林为主的林场生产方针，篡改为要开展多种经营，三、五年内达到自给的方针，强制会议贯彻。一年来，这个错误的方针已经打乱了国家林木生产计划，使浙江国营林场不务正业，苗圃不能为造林服务，造成了很大的损失。全省十二个国营林场，有八个林场工人无心培育苗木，却上山去挖竹笋，烧木炭，苗圃里的苗木枯死了就改种西瓜、花生。有的林场感到和农场的生产方针一样，因此积极要求与附近的农场合并。","type":"paragraph"},{"text":"李士豪自己常自夸：“我李士豪一生所作的事，是没有一件不可告人的”。可是他哪些东西可以告人呢？这个出身于地主阶级的李士豪从１９２６年参加国民党第一次全国代表大会以后，不久就投靠了汪精卫，１９３１年他又加入第三党，进行政治投机。抗日战争开始，他又投靠到军统特务头子宣铁吾的门下。等到抗战胜利，宣铁吾到上海当上海警备司令，李士豪就以治病为名，住进了宣铁吾的警察公寓里，一切费用由宣供给。１９４８年农工民主党组织被破坏，一些党员被捕，而唯独李士豪却在宣铁吾的保护下，还得到ＣＣ系统的农民银行二亿元巨款大做其生意。解放以后一直到现在，他还念念不忘宣铁吾，还不时得到宣铁吾从香港汇来的钱和衣物。","type":"paragraph"},{"text":"李士豪的反动罪行已经“铁案如山”，他想蒙混过关是不行的。","type":"paragraph"},{"text":" 来源：《人民日报》1957年9月6日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09fffc762e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
