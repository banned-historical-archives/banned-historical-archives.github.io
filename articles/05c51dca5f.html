script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资本主义国家的一些资产阶级舆论  承认艾森豪威尔演说不是谋求和平的行动","authors":[],"dates":[{"year":1953,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资本主义国家的一些资产阶级舆论"},{"type":"paragraph","text":"承认艾森豪威尔演说不是谋求和平的行动"},{"type":"paragraph","text":"【新华社二十一日讯】艾森豪威尔十六日发表演说后，资本主义国家的某些资产阶级舆论也承认艾森豪威尔的演说并非谋求和平的建设性行动。"},{"type":"paragraph","text":"在美国主要的“盟国”英国，工党领袖之一比万十九日发表演说，批评艾森豪威尔的演说说：“艾森豪威尔将军对莫斯科的某些言论的答复是措辞很不好的。顾问给他的帮助是很坏的。如果你要和解，你便不能一切都要，而自己又不愿退让一点。如果你坚持要苏联接受全部侮辱性的条件，而自己根本不愿退让一点，你是得不到世界和平的。”"},{"type":"paragraph","text":"“曼彻斯特卫报”十七日社论也说：“艾森豪威尔提出了高价……但是他并未说出西方国家为了要得到这些东西而要做的和不得不做的一切事情。”"},{"type":"paragraph","text":"工党议员德斯蒙德·唐纳利在十九日发表的演说里强调：要求得世界问题的和平解决，应该“以朝鲜停战和其他问题上的有限度的协议开始”，“而不是威胁和要求。”"},{"type":"paragraph","text":"在美国的另外一个主要“盟国”法国，“战斗报”的评论说：“艾森豪威尔提出的那些条件很像大战胜利时发表的那些条件。”"},{"type":"paragraph","text":"在美国直接控制下的日本，据法新社引“朝日新闻”发表的社论说：艾森豪威尔的建议“并没有美国方面的让步，而只要求苏联方面作让步”。社论指出，艾森豪威尔所提出的“条件”和美国以往所谈论的并无区别。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05c51dca5f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
