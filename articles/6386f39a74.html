art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黄彬给地方讲党课","authors":["徐晋庭"],"parts":[{"type":"paragraph","text":"本报讯 四月下旬，原江西省丰城县人武部副部长、离休干部黄彬，为江苏省海门县财贸系统党训班上了一堂《学准则，讲传统，同心同德干四化》的党课。"},{"type":"paragraph","text":"黄彬离休后，热心参加社会活动。他是海门师范特聘的校外辅导员，曾多次为当地的工厂、中小学校、农村和知青点讲课。这次接受邀请后，他反复学习五中全会公报、《关于党内政治生活的若干准则》和叶剑英、邓小平同志的重要讲话，重温了毛泽东同志《关于纠正党内的错误思想》等有关论述，多次走访和征求党训班负责同志的意见，边学习，边备课，五次修改讲课提纲。"},{"type":"paragraph","text":"为了从理论和实践的结合上阐述问题，讲课时，他列举了二十多个战争年代和社会主义建设时期优秀共产党员的事迹，引导大家加深理解《准则》。在讲到“怎样做一个合格党员”时，他列举了焦裕禄身患癌症，带病查风口，探流沙，带领兰考人民战天斗地的生动事迹。黄彬了解到，参加党训班的有些同志，是战争年代在当地搞过武装斗争的。他就回顾了解放战争时期攻打本县三阳镇和悦耒镇时的情景，激励大家保持和发扬艰苦奋斗的优良作风。"},{"type":"paragraph","text":"黄彬还针对有些同志对贯彻《准则》缺乏信心的思想，进行现身说法。在粉碎“四人帮”以后，他曾一度对党风能不能尽快恢复缺乏信心。后来，看到在党中央的正确领导下，恢复党风取得了可喜成绩，就增强了信心。他的亲身感受使大家受到启发。（徐晋庭）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6386f39a74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
