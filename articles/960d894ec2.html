:[{"year":1969,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社伦敦十日电　英国工人阶级为反对工党政府反动的经济政策，反对垄断资本变本加厉的剥削和迫害，最近纷纷举行罢工，进行坚决斗争。"},{"type":"paragraph","text":"伦敦皇家码头的三千多名码头工人十日再次罢工，抗议资本家悍然命令四日曾经罢工半天的码头工人停止工作。他们的罢工使得停靠在码头上的四十七艘船的装卸工作陷于瘫痪。装卸英国五分之一进出口物资的伦敦皇家码头的工人，为要求增加工资，曾经在四日罢工并举行集会，会上决定:今后每星期都要罢工半天，直到资本家接受他们增加工资的合理要求为止。国际计算机公司的一千五百名工人也举行罢工，要求增加工资。三日，他们从贝尔法斯特市中心出发，列队游行四英里，到工厂去举行集会，会上大家表示要坚决斗争到底。阿姆斯特朗专利公司的机械制造厂的两千多名工人，最近也举行罢工，要求增加工资。许多工厂的工人最近还展开斗争，反对垄断企业为榨取更大利润，在工党政府鼓励下纷纷合并，大批解雇工人的反动措施。"},{"type":"paragraph","text":"英国工人罢工斗争的高涨使英国的统治者惶恐不安。不少资产阶级人士担心，今年的罢工运动将使深陷在财政经济危机中的英帝国主义遭到更加沉重的打击。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"960d894ec2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
