art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"活学活用毛泽东思想，要在用字上狠下功夫学习毛主席著作积极分子代表豪言壮语选","authors":[],"parts":[{"type":"paragraph","text":"革命战士永远要突出一个对伟大领袖毛主席的“忠”字，落实一个对战无不胜的毛泽东思想的“用”字，立起一个为人民服务的“公”字。"},{"type":"paragraph","text":"红花红，红花红，红花那有战士忠于毛主席的红心红。红花开，红花落，战士靠毛泽东思想永葆青春，永远红。"},{"type":"paragraph","text":"革命战士心最红，是靠毛泽东思想染红的；革命战士骨头硬，是靠毛泽东思想炼硬的。"},{"type":"paragraph","text":"离开爹，离开娘，革命战士离不开毛泽东思想。"},{"type":"paragraph","text":"离开毛泽东思想，前进没方向，办事无主张；掌握毛泽东思想，心明眼亮斗志昂，革命路上不迷航。"},{"type":"paragraph","text":"头脑中有毛泽东思想，浪大不晕船，雾大不迷向。"},{"type":"paragraph","text":"带着毛泽东思想上天，就能全歼敌机，威震长空；带着毛泽东思想出海，就能击沉敌舰，所向披靡。"},{"type":"paragraph","text":"用毛泽东思想指引飞行的每一寸航程，指挥每一个战斗动作，就能一往无前，无往不胜。"},{"type":"paragraph","text":"任务越繁重，环境越艰苦，部队越分散，越要用毛泽东思想掌握方向，指导行动。"},{"type":"paragraph","text":"学习毛主席著作要深刻领会；执行毛主席指示要步步紧跟；宣传毛泽东思想要满腔热情；捍卫毛主席革命路线要赤胆忠心。"},{"type":"paragraph","text":"毛主席怎么说，我们就怎么做；毛主席怎么部署，我们就怎么紧跟。"},{"type":"paragraph","text":"对毛主席最新指示，学了就用，句句照办，这就是对毛主席最大的忠。"},{"type":"paragraph","text":"学了毛主席最新指示就要用，用就是革命，用就是立公，用就是忠于毛主席。"},{"type":"paragraph","text":"读毛主席的书，要一分一秒不放过；听毛主席的话，要一字一句记心间；照毛主席的指示办事，要一丝一毫不走样。"},{"type":"paragraph","text":"凡是毛主席提倡的，我们就坚决拥护；凡是毛主席反对的，我们就勇敢斗争；凡是毛主席批评的，我们就迅速改正；凡是毛主席教导的，我们就立刻执行。"},{"type":"paragraph","text":"读毛主席的书，改造一辈子思想，当一辈子人民的老黄牛。"},{"type":"paragraph","text":"对毛泽东思想，要带着无产阶级感情学，带着无产阶级感情用。只有带着无产阶级感情学，才能学得懂；只有带着无产阶级感情用，才能用得上。"},{"type":"paragraph","text":"“老三篇”没有学够的时候，思想改造没有到头的时候，为人民服务没有到“家”的时候。"},{"type":"paragraph","text":"生按“老三篇”为党的事业战斗；死按“老三篇”为党的事业献身。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb37cbfa38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
