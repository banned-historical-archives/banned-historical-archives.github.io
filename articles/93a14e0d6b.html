ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"开灭邱清泉军的几个办法叫","alias":"","parts":[{"type":"paragraph","text":"歼灭邱清泉军的几个办法川"},{"type":"paragraph","text":"（1947年1月12日）刘、邓:"},{"type":"paragraph","text":"（一）你们鱼台胜利，陈粟又克峄县凹，并可即克枣庄，形势极为有利。（二）邱军不顾你们在徐州西北之行动，既占观城，又占范县，是否意在威胁我后方，调动我主力回援，解除徐州、陇海之威胁。对付该军有几个办法：甲、让邱军进至嘉巨地区而后歼灭之；乙、邱军被迫回至菏泽（此种可能是有的），待其由菏泽东进而后歼灭之；丙、我军至范县地区歼灭之。以上究以何者为宜？（三)金、成、鱼、济等县是否可能攻克一二处？（四）一七两纵何时可向嘉巨集中？"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"子文"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]峄县，即今山东枣庄市峄城。[3]邱军，指国民党军第五军，军长邱清泉。[4]嘉巨，指山东嘉祥和巨野。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":363},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93a14e0d6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
