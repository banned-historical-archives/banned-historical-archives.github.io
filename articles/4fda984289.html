hors":[],"dates":[{"year":1970,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社巴黎十二日电　法兰西共和国前总统夏尔·戴高乐将军的葬礼十二日下午三时在他生前居住的地方科龙贝双举行。四万多法国人从全国各地专程来到这里，向戴高乐将军遗体最后告别，对戴高乐将军表示深切的悼念和敬意。"},{"type":"paragraph","text":"法国总统蓬皮杜和总理沙邦—戴尔马十一日下午前往科龙贝双向戴高乐将军遗体致哀。"},{"type":"paragraph","text":"中华人民共和国特使、中国驻法国大使黄镇送了中国人民的伟大领袖毛主席和他的亲密战友林彪副主席献给戴高乐将军的花圈，花圈的缎带上写着:“献给夏尔·戴高乐将军”。"},{"type":"paragraph","text":"黄镇大使还送了中华人民共和国副主席董必武、国务院总理周恩来、中国人民解放军总参谋长黄永胜、国务院副总理李先念、全国人民代表大会常务委员会副委员长郭沫若献的花圈。黄镇大使也送了花圈。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fda984289"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
