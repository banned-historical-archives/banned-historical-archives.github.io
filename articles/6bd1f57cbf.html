es":[{"year":1964,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　人民日报出版社最近出版了《努力学好毛泽东思想》一书。这本书选载了人民日报同名社论和萧华著《我军指战员怎样学习毛泽东著作》两篇文章，并收集了十位作者所写的学习毛主席著作的笔记、心得和学习经验。其中有廖初江的学习笔记，食品商店营业员李素文写的学习体会，木工青年突击队长李瑞环写的学习《实践论》和《矛盾论》的心得，还有公社干部、教师、科学研究机关工作人员等所写的学习心得和经验。这本书收集的文章都曾载于《人民日报》。"},{"type":"paragraph","text":"【又讯】解放军报社编的解放军政治工作丛书之一《怎样学习毛主席著作》一书，已由上海人民出版社出版。"},{"type":"paragraph","text":"这本书向读者介绍了解放军活学活用毛主席著作的经验，其中有丰福生学习毛主席著作的经验《越学越热爱毛泽东思想》，黄祖示学习毛主席著作的经验《做毛主席的好战士》和沈阳部队写的《“红九连”为什么更红?》三篇文章，书前并载有萧华同志学习毛主席著作的文章，和《解放军报》社论《论带着问题学》。　(应)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bd1f57cbf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
