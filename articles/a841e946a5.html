],"dates":[{"year":1986,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京九月八日电　由钟文献编辑的《关于毛泽东——传略、评价、回忆》一书，已由外文出版社译成英文出版，日内将由中国国际图书贸易总公司和外文书店在国内外发行。"},{"type":"paragraph","text":"这是中国迄今用外文出版的比较全面地、实事求是地介绍和评价毛泽东一生的第一本读物。"},{"type":"paragraph","text":"它收有各类文章20篇，分三个部分。"},{"type":"paragraph","text":"第一部分是毛泽东的传略和他口述的自传。"},{"type":"paragraph","text":"第二部分是对毛泽东的评价，收入了两篇文章。一篇是周恩来在1949年中国革命胜利前夕发表的讲话《学习毛泽东》。另一篇是邓小平的《论毛泽东和毛泽东思想》，选辑了他近年来论述毛泽东和毛泽东思想的几篇重要讲话。"},{"type":"paragraph","text":"第三部分是回忆。"},{"type":"paragraph","text":"全书共16万字，插有毛泽东的生平照片70幅。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a841e946a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
