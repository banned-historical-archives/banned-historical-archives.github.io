script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席关于正确处理人民内部矛盾的学说  奠定总路线的理论基础  北京哲学界和经济学界纪念毛主席著作发表一周年","authors":[],"dates":[{"year":1958,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席关于正确处理人民内部矛盾的学说"},{"type":"paragraph","text":"奠定总路线的理论基础"},{"type":"paragraph","text":"北京哲学界和经济学界纪念毛主席著作发表一周年"},{"type":"paragraph","text":"据新华社18日讯　北京哲学界和经济学界最近连续举行座谈会，纪念毛主席的著作“关于正确处理人民内部矛盾的问题”发表一周年。参加会议的除专职的哲学和经济学研究和教学工作者外，并有国家财经机关的工作人员，石景山钢铁厂、长辛店机车车辆修理厂的党委书记，北京市朝阳区区委书记和郊区红星、金星两农业生产合作社的主任等共二百多人。"},{"type":"paragraph","text":"到会者一致强调指出，毛主席的这一著作，是运用马克思列宁主义的原理创造性地解决中国社会主义建设的实际问题的典范，是马克思列宁主义学说的重大发展。纪念“关于正确处理人民内部矛盾的问题”发表一周年，就要在哲学和社会科学的各个领域彻底干净地拔掉资产阶级的白旗，更高地举起马克思列宁主义的红旗，彻底批判资产阶级唯心主义思想。哲学和社会科学工作者要进一步认真改造自己，并且要学习毛主席的理论联系实际的作风，老老实实地向群众学习，向实际学习，把理论研究和理论批判工作推向一个新的阶段。"},{"type":"paragraph","text":"中国科学院哲学研究所所长潘梓年指出，“关于正确处理人民内部矛盾的问题”这一著作是我国社会主义建设总路线的理论基础。毛主席的哲学从来就是从实践中提炼而来，并且反过来给实践以巨大的指导作用。科学工作者必须向毛主席学习这种精神，拜工农兵人民群众为师，深入实际，研究和发现问题，这才能从根本上改变学风，发展哲学。中国科学院哲学社会科学部委员于光远在发言中指出，在毛主席“关于正确处理人民内部矛盾的问题”这一著作的思想指导下，人们能够及时地使上层建筑和生产关系的许多环节，更加适合充分发挥人民群众积极性和创造性的需要，以加速社会主义建设。中国科学院经济研究所代理所长孙冶方在发言中指出，经济学工作者必须认真学习哲学，特别必须认真学习毛主席关于两类矛盾的学说和其他哲学著作，领会毛主席深刻的哲学思想，以虚带实，指导自己的研究工作。"},{"type":"paragraph","text":"经济学家孙晓村在发言中说，毛主席关于正确处理两种性质不同的矛盾的学说，使我国资产阶级分子进一步认识自己的两面性和自己的前途，从而鼓舞他们自觉地向党交心，积极接受社会主义改造。"},{"type":"paragraph","text":"哲学界和经济学界召开的几次座谈会本身就是理论联系实际的课堂。许多来自农业社和其他业务部门的工作人员，用大跃进中无数生动的事实说明，毛主席关于正确处理人民内部矛盾的理论一为人民群众所掌握，就形成了无穷无尽的物质力量，成为推动社会主义建设的巨大动力。这些担任实际工作的同志的发言，给到会的二百多名科学家、青年科学工作者以很大的鼓舞和启示。中共北京市朝阳区委书记单昭祥和北京市郊金星农业生产合作社主任马金河在发言中谈到，朝阳区和金星社今年的生产虽然已经有了很大的跃进，但是同很多地区比较，还是处于中游甚至下游，各方面的生产潜力还很大。他们说，毛主席教导我们要不断革命，一个矛盾解决了还会产生新的矛盾。朝阳区和金星社最近经过群众性的大辩论后，领导干部和农民都批判了由于生产条件好而产生的保守和依赖思想，决心大干苦干，力争上游。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35bcd5abe6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
