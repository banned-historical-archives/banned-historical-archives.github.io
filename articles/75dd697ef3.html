大学学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"宣传机构的三大主义","type":"title"},{"text":"四川大学学生","type":"authors"},{"text":"宣传机构的三大主义　　　　川大学生　吼","type":"subtitle"},{"text":"“偷”","type":"subtitle"},{"text":"苏南谈判以前报纸上总是写：铁托大混蛋，法西斯匪徒打游击出卖了四万南军，生活腐化，甘心给美帝当干儿。又说南国人民生活在痛苦呻吟中，好象都要饿死了……。奇怪！在苏南谈判后，却说人民生活又怎样富裕，工业、农业……发展了许多倍。","type":"paragraph"},{"text":"小百姓们不禁要问：前些材料是否事实，还是从那里偷来的，难道一个国家人民生活的好坏决定于宣传机构的意识吗？？？","type":"paragraph"},{"text":"“装”","type":"subtitle"},{"text":"人民日报常说：美国人民怎样穷，一年又服了多少安眠片，都睡不着呀！","type":"paragraph"},{"text":"但是记者先生们怎不把自己的家务事料理料理呢？四川大学有多少个神经衰弱，多少人有多少个失眠的晚上呀！","type":"paragraph"},{"text":"民间谚语：","type":"paragraph"},{"text":"半天云中牵口袋(装疯)，被窝里面眨眼睛(自己哄自己)。","type":"paragraph"},{"text":"“吹”","type":"subtitle"},{"text":"我们报纸逐渐感染着这样一个弊病——报喜不报优，但是理论家们总要找出一些理由来掩盖事实的存在。今天川大展开这样一个轰轰烈烈的运动，四川日报却象哑巴一样死也不开腔。为什么不报道？！这是报喜不报忧，这是共产党的喜呀！更　奇怪是校刊的先生们为什么不向四川日报反映呢？有喜糖吃呀！","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选辑》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75dd697ef3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
