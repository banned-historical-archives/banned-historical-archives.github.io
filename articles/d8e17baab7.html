paragraph","text":"五.按想定时间放鞭炮，个准随便乱放以免形响大会正常进行市开会时放，布激行时放）"},{"type":"paragraph","text":"六.参加会义的回志，每人代语录本，服楼要整介（节日服装七大会要求各个粗架设一名连落员，与大#快回起未，密切"}],"authors":["大业公社革命委员会"],"dates":[{"year":1969,"month":4,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":11,"page_end":11},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8e17baab7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
