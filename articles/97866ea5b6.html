ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"印发河南省委关于农村人民公社整社算账工作的报告的批语","alias":"","parts":[{"type":"paragraph","text":"印发河南省委关于农村人民公社整社算账工作的报告的批语"},{"type":"paragraph","text":"（1959年7月10日）印发各同志参考。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十日"},{"type":"paragraph","text":"[1]中共河南省委1959年6月22日给中央并各地、市、县委的这一报告说，我省整社算账工作已经在麦收前基本上胜利结束。整个算账运动的发展是健康的、迅速的，始终实行了算账与生产相结合，加强领导与发动群众相结合，算清经济账与解决干部思想作风相结合，边清算边兑现，边鸣放边整改，不仅算清了经济方面的账目，同时也解决了干部思想作风上的问题，揭露出了不少坏分子。经过整社算账，整个农村已经发生了极为深刻的变化，呈现了蓬蓬勃勃的新气象，出现了新的生产高潮。当前的任务是进一步巩固和扩大整社成果，结合生产解决遗留问题。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":178,"page_end":178},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97866ea5b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
