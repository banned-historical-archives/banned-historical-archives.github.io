ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"毛泽东等祝贺中朝友好合作互助条约签订十五周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺中朝友好合作互助条约"},{"type":"paragraph","text":"签订十五周年的电报"},{"type":"paragraph","text":"（1976年7月10日）平壤朝鲜劳动党中央委员会总书记，朝鲜民主主义人民共和国主席金日成同志，朝鲜民主主义人民共和国政务院总理朴成哲同志："},{"type":"paragraph","text":"在中朝友好合作互助条约签订十五周年的时候，我们代表中国共产党、中国政府和中国人民，向朝鲜劳动党、朝鲜政府和兄弟的朝鲜人民，表示热烈的祝贺。"},{"type":"paragraph","text":"中朝两国人民是战友和兄弟。在马克思列宁主义和无产阶级国际主义基础上签订的中朝友好合作互助条约，充分体现了两国人民在长期反对共同敌人的斗争中用鲜血凝成的战斗友谊和伟大团结。条约签订以来，中朝两国的友好合作关系得到了全面和深入的发展，两国人民的友谊团结得到了进一步的巩固和加强。中国人民对此感到十分高兴。"},{"type":"paragraph","text":"中国人民热烈赞扬兄弟的朝鲜人民在自己的伟大领袖金日成主席和朝鲜劳动党的英明领导下，在社会主义革命、社会主义经济建设和国防建设各条战线上取得的光辉成就。中国人民坚决支持朝鲜人民争取祖国自主和平统一的正义斗争，坚决遣责任何制造“两个毛泽东全集第五十二卷朝鲜”的阴谋活动。我们相信，英雄的朝鲜人民必将排除任何外来势力的干涉，完成反对美帝国主义侵略、争取实现祖国自主和平统一的伟大事业。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国国务院总理华国锋"},{"type":"paragraph","text":"一九七六年七月十日于北京"}],"authors":["毛泽东"],"dates":[{"year":1976,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":173,"page_end":174},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"353361d55f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
