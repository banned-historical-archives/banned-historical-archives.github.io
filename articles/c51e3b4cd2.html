art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢呼毛主席革命路线的伟大胜利","authors":[],"parts":[{"type":"paragraph","text":"四月九日，辽宁省和沈阳市五十万军民举行盛大集会和游行，坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"四月八日，广东省和广州市军民十七万人隆重集会，坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"浙江省和杭州市广大军民举行声势浩大的集会和游行，热烈欢呼中共中央的两个英明决议，坚决拥护对在天安门广场制造破坏活动的一小撮阶级敌人实行无产阶级专政，决心以抓革命、促生产的实际行动回击右倾翻案风。"},{"type":"paragraph","text":"参加新疆维吾尔自治区、乌鲁木齐市盛大集会和游行的各族民兵，坚决拥护中共中央的两个决议，决心更紧密地团结在以毛主席为首的党中央周围，夺取反修防修斗争的更大胜利。"},{"type":"paragraph","text":"山西省太原市二十万军民举行盛大集会，坚决拥护中共中央的两个决议，决心更紧密地团结在以毛主席为首的党中央周围，夺取反击右倾翻案风斗争的更大胜利。"},{"type":"paragraph","text":"西藏自治区和拉萨市军民举行隆重集会，坚决拥护中共中央的两个决议，愤怒声讨邓小平的罪行，声讨一小撮阶级敌人制造天安门广场反革命政治事件的罪行，决心把反击右倾翻案风的斗争进行到底。"},{"type":"paragraph","text":"黑龙江省和哈尔滨市五十万人于九日下午集会和游行，坚决拥护伟大领袖毛主席、党中央的英明决策，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"陕西省和西安市举行十五万人的群众集会和游行，热烈欢呼、坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"湖南省长沙市五十多万军民，九日下午冒雨举行声势浩大的集会和游行，热烈拥护中共中央的两个决议，愤怒声讨天安门广场的反革命政治事件，严厉声讨邓小平的罪行。"},{"type":"paragraph","text":"安徽省和合肥市广大军民集会和游行，热烈欢呼中共中央两个英明决议，愤怒声讨邓小平的罪行，声讨一小撮阶级敌人在天安门广场制造反革命政治事件的罪行。"},{"type":"paragraph","text":"四月九日，湖北省和武汉市十万军民举行盛大集会，坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"河北省石家庄市军民举行盛大集会和游行，坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"四月十日，江西省和南昌市军民十五万人举行盛大集会和游行，坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"四月十日，云南省和昆明市二十多万各族军民举行盛大集会和游行，坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行。"},{"type":"paragraph","text":"四月十一日，中共福建省委、省革委会召开全省广播大会，坚决拥护中共中央两个决议，愤怒声讨邓小平的罪行，会后举行了声势浩大的示威游行。"},{"type":"paragraph","text":"本版照片均为新华社记者摄（传真照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c51e3b4cd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
