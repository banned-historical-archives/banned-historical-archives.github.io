script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发展中国家部长会议发出强烈呼声  联合起来反对大国霸权主义  智利厄瓜多尔等国代表强烈谴责以美国为首的帝国主义的掠夺和剥削","authors":[],"dates":[{"year":1971,"month":11,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"发展中国家部长会议发出强烈呼声"},{"type":"paragraph","text":"联合起来反对大国霸权主义"},{"type":"paragraph","text":"智利厄瓜多尔等国代表强烈谴责以美国为首的帝国主义的掠夺和剥削"},{"type":"paragraph","text":"据新华社四日讯　利马消息：在秘鲁首都利马举行的发展中国家部长级会议从十月二十九日起进行大会发言。几天以来会上发言的情况表明，亚非拉广大国家强烈反对以美国为首的帝国主义国家的掠夺和剥削。联合起来反对大国霸权主义的呼声，成为会议上的主流。"},{"type":"paragraph","text":"许多国家的代表在发言中控诉了以美国为首的帝国主义国家对它们的掠夺和贸易上的歧视，谴责美国推行嫁祸于人的“新的经济政策”。还有一些国家的代表表示坚决维护民族利益和国家主权，反对美国干涉他们国家的内政。一些拉丁美洲国家在会上重申了各国有权确定自己的领海范围的正义立场。许多国家的代表强调发展中国家进一步联合起来，保卫共同利益。"},{"type":"paragraph","text":"智利外长克洛多米罗·阿尔梅达在发言中重申各国有权根据本国的法律把它们的基本资源收归国有。他谴责美国由于智利采取主权行动，将铜矿收归国有而向智利施加压力的行径。"},{"type":"paragraph","text":"厄瓜多尔外长加西亚·贝拉斯科在发言中说，发达国家应该取消在“财政合作”上的附加条件。他还指出，美国最近因货币危机而采取单方面措施是一种不法行为。"},{"type":"paragraph","text":"尼日利亚矿业和动力部长阿里·蒙古诺在发言中说，美国在支付平衡方面碰到了困难，“但是竟要我们对它的后果付出代价，这是毫无道理的。”"},{"type":"paragraph","text":"墨西哥工商部长托雷斯·曼索指出，美国征收进口附加税和采取的限制进口的其他措施，给国际贸易发展带来了严重的障碍。"},{"type":"paragraph","text":"巴基斯坦代表团团长赛义德·艾哈迈德·阿里呼吁发展中国家协调它们的观点，以便保卫它们的权利和利益。"},{"type":"paragraph","text":"锡兰代表卡纳卡拉特内在发言中强调指出，发展中国家是国际上大量非正义行为的受害者，“现在是我们用自己的努力摆脱这种不幸境况的时候了”。"},{"type":"paragraph","text":"委内瑞拉外长阿里斯蒂德斯·卡尔瓦尼谴责外国投资是吸血鬼。他认为把外国投资说成是援助是错误的。他说，外国投资仅仅为谋求自己的利益和好处的愿望所驱使，它不符合也不可能符合普遍的共同利益的愿望。"},{"type":"paragraph","text":"古巴外长劳尔·罗亚在发言中谴责美帝国主义对古巴的经济封锁。他表示反对美国嫁祸于人的百分之十的进口附加税，支持关于取消这种典型帝国主义附加税的正义要求。罗亚谴责美国“在海洋、公路和市场进行海盗行径”。他表示支持沿海国家根据自己利益确定领海和捕鱼区的主张。"},{"type":"paragraph","text":"此外，叙利亚、马来西亚、黎巴嫩、印度、埃及、利比亚、埃塞俄比亚、赞比亚、阿根廷、玻利维亚、巴西等亚非拉国家和南斯拉夫的代表也在会上发了言。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcb41ca4c5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
