script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都军民满怀革命豪情欢庆“八一”","authors":[],"dates":[{"year":1966,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"更高举起毛泽东思想伟大红旗在三大革命运动中奋勇前进"},{"type":"paragraph","text":"首都军民满怀革命豪情欢庆“八一”"},{"type":"paragraph","text":"近二万人聚会联欢，热烈庆祝文化大革命的伟大胜利和我军巨大成就"},{"type":"paragraph","text":"周恩来朱德邓小平董必武等领导人参加联欢晚会"},{"type":"paragraph","text":"新华社三十一日讯今晚，中国人民革命军事博物馆灯火辉煌，一派节日景象。“东方红，太阳升”，“大海航行靠舵手”的歌声和“中国共产党万岁！”“毛主席万岁！”的口号声响彻天空。首都军民一万八千多人，满怀革命豪情，在这里欢庆中国人民解放军建军三十九周年。"},{"type":"paragraph","text":"来自全军的学习毛主席著作积极分子、四好单位、五好战士、战斗英雄代表、驻京部队指战员和民兵、烈军属、工农业劳动模范代表、首都工农群众，在革命军事博物馆欢聚一堂。他们欢歌载舞，倾心畅谈，热烈庆祝无产阶级文化大革命的伟大胜利，和人民解放军在非常无产阶级化、非常战斗化建设中取得的巨大成就。大家共同表示，要更高地举起毛泽东思想伟大红旗，紧紧地团结在党中央和毛主席的周围，加强战备，随时准备采取中越两国人民认为必要的行动，共同打击美国侵略者；在阶级斗争、生产斗争、科学实验三大革命运动的大风大浪中，朝着毛主席所指引的方向，奋勇前进！"},{"type":"paragraph","text":"党和国家领导人周恩来、朱德、邓小平、董必武、陈毅、李富春、李先念、薄一波、聂荣臻、叶剑英、陶铸、谢富治、郭沫若、杨明轩、赛福鼎等参加了今晚的联欢会。"},{"type":"paragraph","text":"晚会开始前，广播器里播送着雄壮激昂的《中国人民解放军进行曲》。八时整，晚会在《东方红》的歌声中开始。接着，广播器里传出了赞颂毛泽东思想的颂词和毛主席的语录。"},{"type":"paragraph","text":"在热烈的掌声和欢呼声中，在灯火辉煌的大厅里，平台上，广场中，开始了丰富多彩的联欢活动。来自南海前哨的海上文化工作队，带着海岛战士对党和毛主席无限热爱的心情，演出了《毛泽东思想万岁》、《我们是海上文化轻骑兵》、《歌唱英雄刘英俊》等十多个精采节目。三等功臣李少华激动地唱着：“伟大领袖畅游长江，全中国人民欢呼歌唱，我们多么幸福，我们浑身是力量，万岁万岁毛主席，我们跟着你乘风破浪；万岁万岁毛主席，我们祝你万寿无疆！”他们的演出，获得了观众们的热烈掌声。总政文工团、中国人民解放军艺术学院、军乐团、空军政治部文工团、铁道兵文工团等文艺团体，还演出了许多歌颂文化大革命和表示支援越南人民抗美救国斗争的节目。"},{"type":"paragraph","text":"前来参加联欢晚会的指战员和工农群众，参观了即将正式展出的“中国人民抗日军政大学校史展览”。他们一面观看展出的图片和实物，一面结合文化大革命，交谈斗争经验和体会，决心更高地举起毛泽东思想伟大红旗，彻底揭露和批判反党反社会主义的资产阶级代表人物，彻底清算和挖掉资产阶级和修正主义的黑线，将文化革命进行到底。人们还观看了电影，以极大兴趣欣赏了各种球赛和体操表演。这次联欢晚会，是由中国人民解放军总政治部举办的。"},{"type":"paragraph","text":"参加联欢会的，还有中共中央和国务院各部门、各人民团体、各民主党派、北京市以及人民解放军各总部、军种兵种、院校的负责人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65bab95445"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
