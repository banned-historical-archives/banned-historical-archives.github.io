tart":10,"page_end":10,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东旧居修缮开放等二则","authors":["刘颖/龙弘涛"],"parts":[{"type":"paragraph","text":"毛泽东旧居修缮开放"},{"type":"paragraph","text":"12月26日是毛泽东诞辰109周年，位于上海茂名北路120弄5号的毛泽东旧居经过大规模修缮正式对外开放。1924年，毛泽东和家人曾在此居住。左图为经过修缮后的上海毛泽东旧居的大门。"},{"type":"paragraph","text":"刘颖摄"},{"type":"paragraph","text":"毛泽东故乡交通发达"},{"type":"paragraph","text":"湖南省近几年来不断加大高速公路建设力度，到今年年底，随着临湘至长沙、湘潭至邵阳高速公路和长沙绕城高速路西南段的通车，湖南全省高速公路通车里程已达到1000公里，排名由全国中下游跃居前十位。右图为长沙绕城高速城南立交桥。"},{"type":"paragraph","text":"龙弘涛摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac11fbe708"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
