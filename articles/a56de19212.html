],"dates":[{"year":1965,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在刘少奇主席和曹荻秋副市长等陪同下"},{"type":"paragraph","text":"尼雷尔总统在上海参观"},{"type":"paragraph","text":"新华社上海二十二日电　尼雷尔总统和夫人以及随同来访的坦桑尼亚贵宾，今天下午由刘少奇主席和夫人王光美，上海市副市长曹荻秋和夫人石斌等陪同，参观了上海工业展览会。"},{"type":"paragraph","text":"随后，尼雷尔总统由曹荻秋副市长等陪同，参观了上海市玻璃一厂。尼雷尔总统在参观中，称赞这个厂的工人技术水平很高，生产很好。尼雷尔总统的夫人由王光美等陪同，还参观了上海印染一厂。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王光美","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"曹荻秋","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a56de19212"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
