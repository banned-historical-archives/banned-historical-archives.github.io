ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对发射我国第一颗人造地球卫星请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对发射我国第一颗人造地球卫星"},{"type":"paragraph","text":"请示报告的批语！"},{"type":"paragraph","text":"（1970年4月24日）照办。"},{"type":"paragraph","text":"[1]这个批语写在周恩来1970年4月24日7时给毛泽东的报告上。报告说，我国以三级火箭试放第一颗卫星，早在1968年年初得到主席、林副主席批准，直到今春才完成各项准备工作。3月底，运载火箭和卫星已运至基地，经检查测试，认为可行。4月中旬在京开会，经各方论证，认为可以发射。目前，火箭和卫星已在发射阵地竖起，经检查测试，对发现的问题，均已解决。现拟同意于今夜发射，请主席批示。周恩来还向毛泽东报送了中国人民解放军国防科学技术委员会4月23日的请示发射报告。4月24日晚，中国第一颗人造地球卫星“东方红一号”发射成功。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":4,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":534,"page_end":534},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"804e4c21da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
