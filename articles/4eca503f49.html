rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"打电报向毛主席致敬","authors":[],"parts":[{"type":"paragraph","text":"电报说：延边朝鲜族自治州成立十年来，在党中央和您的正确领导下，在国家的亲切关怀和大力支援下，在全国各族人民特别是汉族人民的热情帮助下，胜利地进行了社会主义革命和社会主义建设。现在延边的朝鲜族已经开始成为社会主义民族，州内各民族之间已经建立了团结友爱、互助合作的社会主义民族关系。"},{"type":"paragraph","text":"电报在汇报了自治州成立十年来各方面取得的显著成就以后说：这些成绩的取得，首先应归功于党中央和您的英明领导，是党中央和您所制订的政治路线和民族政策的光辉胜利。十年来的实践，使我们更加深切地体会到，我国各少数民族要想得到彻底解放，得到本民族的发展和繁荣，绝对离不开祖国的统一和汉族的帮助，绝对离不开中国共产党的领导，绝对离不开社会主义这条唯一正确的道路。"},{"type":"paragraph","text":"电报最后说，今后，我们要更加加强同祖国各族人民的团结，加强州内各族人民的团结，在党中央和国务院的统一领导下，更高地举起总路线、大跃进、人民公社三面红旗，为完成国民经济的调整任务，为争取社会主义建设的新胜利而奋勇前进！"}],"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4eca503f49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
