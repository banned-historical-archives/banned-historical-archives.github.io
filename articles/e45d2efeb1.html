,"authors":[],"dates":[{"year":1968,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"穆拉团长在庆祝中阿科技合作会议议定书签字宴会上说"},{"type":"paragraph","text":"中国文化大革命取得历史性的胜利"},{"type":"paragraph","text":"新华社二十六日讯　阿尔巴尼亚政府科技代表团团长普罗科普·穆拉，今晚在北京出席庆祝中阿科技合作第十二届会议议定书签字的宴会上说，毛主席亲自领导的中国无产阶级文化大革命已经取得了历史性的胜利。阿尔巴尼亚党和人民把中国无产阶级文化大革命取得的每一个胜利，都看成是我们的胜利，看成是世界上一切真正革命派的胜利。"},{"type":"paragraph","text":"国务院副总理聂荣臻出席了宴会。宴会是由石油部副部长孙晓风举行的。"},{"type":"paragraph","text":"普罗科普·穆拉团长在讲话中说，阿中两党和两国人民的伟大真诚的革命友谊，是建立在不朽的马克思列宁主义和无产阶级国际主义原则基础上的，是在反对共同敌人——以美国为首的帝国主义和以苏共领导集团为中心的现代修正主义的斗争中，经受了重大考验和锤炼的，因此它是不可战胜的。帝国主义及其帮凶不管策划什么恶毒阴谋，都必将遭到可耻的失败。"},{"type":"paragraph","text":"孙晓风在宴会开始时讲话，他热烈赞扬阿尔巴尼亚蓬勃开展的革命化运动，并且祝愿阿尔巴尼亚这盏欧洲的伟大的社会主义明灯，继续放出更加灿烂的光芒。他说，在进行社会主义革命和社会主义建设中，在反对美帝国主义和苏联现代修正主义的斗争中，中阿两党、两国人民一向是互相支援，并肩战斗的。我们将永远团结在一起，战斗在一起，胜利在一起。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使纳塔奈利应邀出席了宴会。出席宴会的还有外交部副部长乔冠华等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e45d2efeb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
