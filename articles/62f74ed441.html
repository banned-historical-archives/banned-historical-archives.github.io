全世界革命人民欢欣鼓舞","authors":[],"dates":[{"year":1968,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《长周新闻》热烈欢呼我全国（除台湾省外）成立革委会"},{"type":"paragraph","text":"中国文化大革命的伟大胜利使全世界革命人民欢欣鼓舞"},{"type":"paragraph","text":"据新华社十八日讯东京消息：日本《长周新闻》十五日发表社论，热烈欢呼我国各省、市、自治区（除台湾省外）革命委员会全部成立。"},{"type":"paragraph","text":"社论说，中国各省、市、自治区（除台湾省外）全部成立革命委员会，这不仅在中国历史上是第一次，也是人类历史上的创举。"},{"type":"paragraph","text":"社论说，中国无产阶级文化大革命彻底地打垮了混进中国无产阶级政权机构内部，企图变无产阶级专政为资产阶级专政，变社会主义为资本主义的中国赫鲁晓夫，进一步巩固了无产阶级专政。这就彻底地粉碎了以美国为首的帝国主义和以苏修领导集团为中心的现代修正主义和各国反动派的痴心妄想，使全世界革命人民无不感到欢欣鼓舞。"},{"type":"paragraph","text":"社论说，美帝国主义和苏联现代修正主义妄图由美苏两大国瓜分和主宰世界，但是这只能加速他们的分崩离析和土崩瓦解。"},{"type":"paragraph","text":"社论指出，伟大领袖毛主席领导下的中国，已经成为不可摧毁的强大堡垒，成为包括日本人民在内的全世界被压迫人民和被压迫民族的最可靠的后盾。"},{"type":"paragraph","text":"社论说，中国无产阶级文化大革命的全面胜利，必将鼓舞日本人民，使他们勇敢地为打倒美帝和日本反动派的统治，打倒苏修和宫本集团而斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62f74ed441"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
