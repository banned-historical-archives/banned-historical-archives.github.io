rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"揭露万象极右派加紧准备新的军事冒险今年以来，四万多群众从万象方面控制区返回解放区","authors":[],"parts":[{"type":"paragraph","text":"新华社万象一九七五年五月七日电 据《巴特寮新闻》报道，万象极右派最近正在加紧抓兵，并且在万象进行新的军事调动和部署，准备新的军事冒险。"},{"type":"paragraph","text":"报道说，四月二十九日，万象极右派出动直升飞机，把右派军队从富考奎运往万象的基乃莫兵营。第二天，他们又用军车把一批军用物资从丰庆兵营运往丰洪兵营，同时还用军车和飞机把全副武装的万象军队从丰庆兵营运往万象北部地区。"},{"type":"paragraph","text":"四月底和五月初，万象极右派在琅勃拉邦和沙耶武里抓了五百三十名青年，以补充琅勃拉邦和万象的右派军队。三月初，万象极右派还在占巴塞省征集了一百二十名新兵。"},{"type":"paragraph","text":"此外，还有一些穿便衣的美国军人住在琅勃拉邦的南坎旅馆里，充当万象右派军队的顾问，进行指挥活动。"},{"type":"paragraph","text":"《巴特寮新闻》五月六日发表评论，揭露和谴责万象极右派肆意违反万象协定及其议定书，出动军队进攻沙拉富昆等解放区的罪行。评论警告说，如果万象极右派仍然顽固违反协定，不把军队撤出沙拉富昆等地，火将进一步烧到他们的头上。"},{"type":"paragraph","text":"评论最后说，为正义而斗争的老挝爱国军民，必将不断前进。"},{"type":"paragraph","text":"据新华社万象一九七五年五月七日电 据《巴特寮新闻》报道，今年以来，四万多名在战争期间被美国和老挝极右派强迫迁入万象方面控制区的群众返回了他们在解放区的家园。"},{"type":"paragraph","text":"返回家园的群众，受到了解放区各级政权和人民群众的热烈欢迎。解放区军民还积极帮助返回家乡的群众建造房屋，开垦荒地，安排生活。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cf710de6a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
