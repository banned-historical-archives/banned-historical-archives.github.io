" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市委关于地主、富农入社的几个政策问题向中央的请示","authors":[],"dates":[{"year":1955,"month":12,"day":24}],"is_range_date":false,"parts":[{"text":"中共北京市委关于地主、富农入社的几个政策问题向中央的请示","type":"title"},{"text":"目前北京郊区农村已经实现半社会主义的合作化，入社农户已占农户总数91％。除了地主、富农分子以外，贫农、中农几乎已经全部入社。现在地主、富农动荡不安，特别是富农因为雇工剥削受到限制，已有自动交地、交生产资料的。我们认为这种情况拖久了对生产是不利的。因此，我们决定郊区每个区都选择一个或几个合作社基础巩固、领导强、上中农几乎已经全部入社的乡，分批接收地主、富农入社，待取得典型经验后，再系统地解决地主、富农的入社问题，预计在1956年秋收以前就可以准许地主、富农分子分批入社。但是，对于少数上中农还没有入社的乡，则有意识地加以推迟。","type":"paragraph"},{"text":"关于地主、富农加入农业生产合作社的办法，我们同意毛主席的指示和河南省委的意见。关于地主、富农入社后土地和其他生产资料的处理问题，我们有如下意见：","type":"paragraph"},{"text":"一、对于地主、富农的土地，在土地不分红的高级社中，可以和社员一样处理，在土地分红的低级社中，可以对其不超过全社每人平均占有土地数量的部分按社章分红，超过部分不给报酬（公粮由社缴纳）。","type":"paragraph"},{"text":"二、对于地主、富农的其他生产资料，应该全部折价入社。其折价款除缴纳和一般社员同等的一份股份基金外，还应该缴纳一份相当于每个老社员平均已有的公积金和公益金，免得老社员吃亏。折价款在抵交这两笔款项后还有多余的，其偿还年限可以比一般社员长一些，并且可以不付利息。","type":"paragraph"},{"text":"三、对于暂时不入社的地主，富农分子，由乡政府督促他们按照全乡的统一规划进行生产，并且防止他们出卖或破坏生产资料。","type":"paragraph"},{"text":"以上意见妥否，请示。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2de669493"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
