" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津市委宣传部发出纠正四区区委宣传部长余光同志在宣传工作中的错误的通报","authors":["《宣传通讯》编辑部"],"dates":[{"year":1953,"month":4,"day":20}],"is_range_date":false,"parts":[{"text":"天津市委宣传部发出纠正四区区委宣传部长余光同志在宣传工作中的错误的通报","type":"title"},{"text":"《宣传通讯》编辑部","type":"authors"},{"text":"天津市第四区委宣传部长兼团市工委委员余光同志几次在给党的宣传员和青年团员作报告时，采取极不严肃的态度，信口开河，乱打比喻，在党内外造成很坏的影响，引起群众不满。去年国庆节宣传周在召开工厂宣传员及青年团员大会布置宣传工作时，他谈到根治黄河（按应是根治淮河）的伟大工程时说：“过去由于国民党反动派的统治使黄河两岸的农民每年遭受灾害，但老百姓认为是王八泛滥，无法阻挡，因此一发水就给王八敬供。可是解放三年来，在毛主席领导下，根治了黄河，治的王八也不敢泛滥，顺着河道老老实实的走了。”","type":"paragraph"},{"text":"他在传达团代会决议时，曾将党和团的关系作了极不恰当的比喻，他说：“党领导团是不能代替的，就像结婚一样任何人也不能代替。”去年“八一”建军节庆祝大会上，他给团员讲二万五千里长征的故事，讲到红军生活艰苦并牺牲了很多人时，听众都感到沉痛，而余光同志却说：“卖棺材的可以笑了。”","type":"paragraph"},{"text":"在一次青工讲座会上，他曾说：“资本家是老虎，谁也不肯嫁给资本家了，若嫁给资本家不就成了母老虎了吗！”在党的宣传员训练班上，他曾对宣传员讲过：“只要做好宣传工作，搞恋爱找对象也好找。”","type":"paragraph"},{"text":"在反官僚主义运动中，群众曾揭发了余光同志在宣传工作上这种极不严肃的态度的错误。天津市委宣传部特就此事发出通报，指出余光同志的这种种“宣传”是极端荒谬的。他把党的宣传工作庸俗化了。我们党的宣传工作是严肃的思想工作，余光同志信口开河和用低级趣味来哗众取宠，是宣传工作上的坏作风，是对党的思想工作不负责任的表现，与党的思想工作的严肃性毫无共同之点。天津市委宣传部在通报中要党的宣传工作者及每个党员（党员都要做宣传工作）都要以次为戒，必须进一步认识党的宣传工作的重要性和严肃性，加强学习，提高思想水平，以认真负责的态度对群众进行有思想性的宣传。","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部《宣传通讯》1953年第14期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b741a0e75"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
