script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级反动统治的斗争浪潮汹涌澎湃  意大利各地三百五十万工人举行大罢工  第二主要工业区皮埃蒙特区工人举行总罢工使这个区完全陷于瘫痪","authors":[],"dates":[{"year":1970,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级反动统治的斗争浪潮汹涌澎湃"},{"type":"paragraph","text":"意大利各地三百五十万工人举行大罢工"},{"type":"paragraph","text":"第二主要工业区皮埃蒙特区工人举行总罢工使这个区完全陷于瘫痪"},{"type":"paragraph","text":"新华社十五日讯　罗马消息：意大利工人反对垄断资产阶级反动统治的斗争浪潮汹涌澎湃，最近几天，三百五十万名工人举行了罢工和示威游行。"},{"type":"paragraph","text":"在意大利的第二主要工业区皮埃蒙特区，工业、农业、交通运输和其它所有经济部门的一百三十万名工人十四日举行声势浩大的总罢工，使这个区完全陷于瘫痪，火车、电车和公共汽车停止行驶，邮件无人传送，学校、银行关闭，报纸停止出版。罢工的工人愤怒地走上这个区的首府都灵和其它主要城市的街头，举行示威游行，抗议物价、房租飞涨和苛捐杂税以及住房缺乏、医疗卫生没有保障。"},{"type":"paragraph","text":"十五日，意大利南部地区卡拉布里亚的六十万名工人举行总罢工和示威游行，抗议失业现象严重。在意大利中部的托斯卡纳区和这个区的大纺织工业中心普拉托，工人们也举行了罢工和示威游行。"},{"type":"paragraph","text":"与此同时，六十万名工人和地方机关雇员正在举行另一次全国规模的轮流罢工。在此之前，他们曾经在八日举行了一次全国规模的罢工。"},{"type":"paragraph","text":"二十万名“社会保险”机构的职工十四日掀起了新的全国规模罢工浪潮，来自全国各地的数千名罢工者汇集到罗马，举行了强大的示威游行。四十万名纺织工人和三万名长途公共汽车工人举行的全国规模的轮流罢工，仍然在继续坚持中。四万名矿工十四日又掀起了第三次全国规模的罢工浪潮。"},{"type":"paragraph","text":"在罗马，二万名旅馆工人从九日起举行了三天罢工之后，继续延长罢工两天。在威尼斯，清洁工人和渔民十日举行了示威游行。"},{"type":"paragraph","text":"此外，的里雅斯特、米兰、巴里等城市的学生最近几天也奋起斗争，占领了学校。的里雅斯特市的数千名学生十三日同工人们一起，在当地监狱外面举行了示威游行，抗议反动当局的法西斯迫害，要求释放在示威中被无理逮捕的工人和学生。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bda2c6d9c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
