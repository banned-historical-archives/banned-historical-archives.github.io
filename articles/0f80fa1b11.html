,"authors":[],"dates":[{"year":1962,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京22日电】　华盛顿消息:美国总统肯尼迪今天在向国会提出的一年一度的经济咨文里承认，在他所吹嘘的他上台一年来美国经济“复苏”的背后，美国仍然有大批人陷在失业的痛苦的深渊，国际支付逆差、通货膨胀和新的经济衰退的危险等等仍然是美国经济面临的一连串严重的难以解决的问题。"},{"type":"paragraph","text":"肯尼迪在咨文里用了很大篇幅来谈论他上台后所采取的一系列人为刺激经济的措施，和在这种刺激下所造成的美国经济的虚假的“繁荣”，他强调疯狂扩军备战的美国联邦预算“作为促进经济复苏的重要工具”“发挥了适当作用”。但是，肯尼迪不得不承认，这种饮鸩止渴的办法并不能根本解决美国经济的问题。根据咨文的数字，美国的失业比率现在仍停留在6%以上的水平上，大量失业的地区仍有六十个。而据美国报刊引用的官方数字，去年头十个月美国失业的平均总人数一直停留在五百万人以上的水平上，即达到三十年代美国大危机以来失业人数的最高峰。"},{"type":"paragraph","text":"咨文承认，生产过剩危机乃是美国资本主义经济的痼疾。咨文说，“不断出现的衰退使美国战后经济不能取得正常的进展”，“我们在战后的经济增长……一直在下降。”“在最近几年都没有保持在战后初期达到的4%-4.5%的增长率”。"},{"type":"paragraph","text":"咨文吹嘘“美国的繁荣得到越来越普遍的分享”。但是，它又不得不承认，“没有消除贫穷。在1960年，有七百万个家庭和个人的个人收入低于二千美元”(按美国一个四口之家要过普通的生活，一年的收入至少要有六千美元)。咨文还说，“失业的增加常常会使那些最经不起收入减少的人遭到最大的减少。”"},{"type":"paragraph","text":"咨文还谈到“持久的国际支付逆差和黄金外流”仍然是美国经济面临的一个“严重问题”，并且对资本主义世界发展的不平衡表示不安。"},{"type":"paragraph","text":"至于美国经济的前景，咨文承认，“企业和消费者开支的波动”在今后仍将会“经常发生的”。在“发生通货膨胀”和“陷入经济衰退”二者之间只给美国经济留下一条“狭隘的中间的道路”。"},{"type":"paragraph","text":"咨文表明，为了应付经济衰退，谋求垄断资本的利益，肯尼迪政府将加强进攻美国广大劳动人民的切身利益，并采取措施向其他资本主义国家转嫁危机。肯尼迪要求国会和美国政府“一道规定对付未来的衰退”的一些措施，其中包括“政府的开支继续增加”，“制定一项增加公共资本的备用计划”，“及时采取财政措施来抵销和减少私人经济的波动”，减少资本家的投资税8%等等。咨文表明，这些措施的重担仍将由美国人民来负。咨文要求美国工人同资方“合作”，不要要求提高工资。"},{"type":"paragraph","text":"为了向其他国家转嫁危机，咨文特别强调大力扩充美国的出口的重要性。咨文说，美国政府已加紧进行促进出口的运动。"},{"type":"paragraph","text":"咨文还强调美国商品要杀价倾销，以便在世界市场上“具有竞争力”和加强美国工业的“竞争地位”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f80fa1b11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
