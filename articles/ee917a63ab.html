script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共谴责神山伪造党员身份参加竞选  指出叛徒神山的这一活动得到苏共领导和日修正主义集团的支持","authors":[],"dates":[{"year":1965,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共谴责神山伪造党员身份参加竞选"},{"type":"paragraph","text":"指出叛徒神山的这一活动得到苏共领导和日修正主义集团的支持"},{"type":"paragraph","text":"新华社十三日讯　东京消息：日本共产党中央委员会十二日谴责叛徒神山茂夫以日本共产党党员身份参加将在七月四日举行的参议院竞选。"},{"type":"paragraph","text":"叛徒神山茂夫是在苏共领导和日本修正主义集团的支持下，宣布参加参议院竞选的。"},{"type":"paragraph","text":"日共中央委员会选举对策部部长市川正一代表日共中央委员会交给东京区检察厅一项起诉书，它指出，神山茂夫在一九六四年九月已被开除出日本共产党，因此他没有资格以日本共产党党员的身份参加竞选。"},{"type":"paragraph","text":"起诉书说，神山茂夫以伪造的身份参加竞选，其目的在于阻挠野坂参三主席参加竞选，野坂参三是参加东京地方选举的日本共产党唯一的候选人。"},{"type":"paragraph","text":"起诉书要求立即制止神山茂夫这种伪造身份参加竞选的罪行。"},{"type":"paragraph","text":"同一天，日本共产党东京都委员会的代表前往自治省，要求取消神山茂夫的候选人资格。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee917a63ab"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
