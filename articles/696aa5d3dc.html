ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于时局超向的指示","alias":"","parts":[{"type":"paragraph","text":"关于时局趋向的指示！"},{"type":"paragraph","text":"（1940年9月10日）"},{"type":"paragraph","text":"目前国际国内的政治情况，正处在剧烈变化的前夜，我党对于这种变化，必须在精神上有所准备。国际方面，帝国主义战争带有扩大、持久与准备决战的性质，抗日的中国则将成为帝国主义者双方争夺的对象。国内方面，是三种势力及三种可能性之间的激烈斗争时期，顽固派要求维持现状，投降派准备组织贝当政府，进步派与中间派则要求亲苏、和共与政治改良。第三种可能性的实现，即是中国时局的初步好转。国际国内的大势所趋，将是日益不利于顽固派，而日益有利于进步派与中间派。党内对于时局的悲观估计与不耐烦情绪，显然是不正确的。我们必须在思想上组织上政治上军事上加速准备一切条件，一方面准备迎接时局好转，一方面又准备对付投降派的突然事变。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":132,"page_end":132},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"696aa5d3dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
