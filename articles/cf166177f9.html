严重","authors":[],"dates":[{"year":1951,"month":10,"day":31}],"is_range_date":false,"parts":[{"text":"甘肃甘谷县小学教师忽视政治倾向十分严重","type":"title"},{"text":"【西北总分社十月三十一日讯】甘肃省甘谷县小学教师忽视政治倾向十分严重。三百零一名完全小学和普通小学教师学习测验的结果，及格者仅四十八人，不及格者达二百五十三人。在答案中有人把中共人民政府的主席答成是“邓宝删、张勋”，把中央人民政府答成是“一个无党无派的政府”，把中国共产党是何年何月何日成立的答成是“一九五一年十月一日成立”把抗美援朝总会的三大号召答成是“抗美援朝、镇压反革命、减租减息、反恶霸斗争等”，把中华人民共和国的新道德答成是“礼义廉耻”，把天安门答成“在陕西”、开城“在东北”，把“五一”答成是“青年节”。至于开城谈判是什么回事、新民主主义的经济政策、土地改革的总路线等，大多数人根本不知道。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年11月2日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf166177f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
