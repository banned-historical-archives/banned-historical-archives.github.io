authors":[],"dates":[{"year":1950,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国红十字会分会及总会职工"},{"type":"paragraph","text":"发表抗美援朝宣言"},{"type":"paragraph","text":"分会干部学习会上书毛主席致敬"},{"type":"paragraph","text":"【本报讯】中国红十字会总会，为了整理各地分会，贯彻新中国红十字会的精神，特召集了三十个分会负责干部，举行学习会。于本月六日，举行开学礼。首由该会兼秘书长胡兰生报告了学习会的目的；继由代理会长熊瑾玎、军委卫生部傅连暲副部长、救总林仲副秘书长及来宾干部等讲话。他们批判了红十字会过去的工作，并指出今后应认清敌我，站稳立场，为消灭灾难，反对美帝侵略而斗争。最后一致热烈通过，发表抗美援朝宣言，并向毛主席致敬。宣言内称：“中国红十字会，是人民的组织，是主张和平的团体。对于美帝这种发动侵略战争，破坏和平，制造灾害的行为，万分的憎恶与仇恨。我们为了自救和保卫世界的持久和平，坚决拥护苏联红十字会在国际红十字协会第二十一届大会提议通过的：“禁止原子弹，停止滥施轰炸”的决议，拥护各民主党派的联合宣言，并动员全中国红十字会员，一致起来，为抗美援朝保家卫国而奋斗！”签署的是：中国红十字会分会干部学习会：汉口、南宁、济宁、西安、长泾、镇江、常州、昆明、福州、凤台、内江、洛阳、南京、赣州、梧州、上海、天津、南昌、济南、青浦、广州、万县、青岛、夏邑、无锡、重庆、开封、北京、太原、广德等三十个分会及总会全体职工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"021251e914"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
