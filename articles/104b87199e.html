<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国排球联赛第一阶段比赛结束选手们的战斗风格，展现了经过无产阶级文化大革命锻炼的我国运动员的新面貌","authors":[],"dates":[{"year":1974,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年六月三日电　分别在上海、合肥、太原、泰安四个赛区举行的一九七四年全国排球联赛第一阶段比赛，五月底先后结束。"},{"type":"paragraph","text":"比赛期间，各代表队始终把批林批孔当作头等大事来抓。参加泰安赛区的各代表队一到泰山脚下的泰安县，便不顾长途跋涉的劳累认真学习马列著作和毛主席著作，赶写批判稿，召开批林批孔大会。这个赛区还邀请受过孔府残酷剥削的佃户、山东曲阜县城关公社解放大队党支部副书记贾永福等同志作忆苦思甜报告，深入批判林彪效法孔老二“克己复礼”，妄图复辟资本主义的罪行。在上海赛区，许多队利用到工厂、农村、部队和学校等基层单位比赛的机会，同工农兵一起开批判会，批判林彪修正主义路线的极右实质，接受工农兵的再教育。"},{"type":"paragraph","text":"各地排球选手在比赛中发扬敢打敢拼勇猛顽强的战斗风格，展现了经过无产阶级文化大革命锻炼的我国运动员的新面貌。在比赛过程中，实力较强的队坚持谦虚谨慎、不骄不躁，年轻的队不畏强手，敢于争夺。平均年龄不到十九岁的浙江女排，在与去年全国第二名的北京女排比赛时，虽然以二比三输给北京队，但她们积极主动，打得十分顽强，给人们留下深刻的印象。"},{"type":"paragraph","text":"获得这次联赛各赛区男、女前三名的代表队是:"},{"type":"paragraph","text":"上海赛区"},{"type":"paragraph","text":"男子——上海队、湖南队、广州部队队；"},{"type":"paragraph","text":"女子——辽宁队、“八一”队、北京青年队。"},{"type":"paragraph","text":"合肥赛区"},{"type":"paragraph","text":"男子——江苏队、天津队、安徽队；"},{"type":"paragraph","text":"女子——北京队、江苏队、湖南队。"},{"type":"paragraph","text":"太原赛区"},{"type":"paragraph","text":"男子——福建队、广东队、陕西队；"},{"type":"paragraph","text":"女子——天津队、福建队、黑龙江队。"},{"type":"paragraph","text":"泰安赛区"},{"type":"paragraph","text":"男子——“八一”队、辽宁队、广东青年队；"},{"type":"paragraph","text":"女子——四川队、上海队、江西队。"},{"type":"paragraph","text":"以上各队将参加在南京举行的第二阶段比赛。第一阶段各赛区男、女四至五名、六至八名和九名以后的各队，将分别参加在湖南衡阳、河南开封、河北承德举行的第二阶段比赛。第二阶段各赛区的比赛，将于十月举行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"104b87199e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
