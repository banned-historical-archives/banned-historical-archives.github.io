art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"靠毛泽东思想就无往而不胜","authors":["铁道兵某部一连全体指战员"],"parts":[{"type":"paragraph","text":"党的九届二中全会公报号召我们：“继续深入开展活学活用毛泽东思想的群众运动”，为我们继续前进指明了方向。"},{"type":"paragraph","text":"我们连在一条铁路线上担负施工任务，这里过去人们称为“地质博物馆”，隧道里山泉暴涌，不断塌方。我们把这艰苦的战场当作活学活用毛泽东思想的课堂。全连同志刻苦学习毛泽东思想，自觉改造世界观，锤炼一不怕苦、二不怕死的革命精神。大家踩着困难上，迎着危险闯，困难越大，斗志越旺。在毛泽东思想的指引下，战胜了五百多次塌方，打通了三座隧道，胜利地打开了“地质博物馆”。斗争实践使我们深刻地体会到：靠毛泽东思想就无往而不胜。"},{"type":"paragraph","text":"我们决心在公报精神指引下，继续深入地开展活学活用毛泽东思想的群众运动，在斗争中反复学，反复用，一定要把毛泽东思想真正学到手！ 铁道兵某部一连全体指战员"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a32e68040"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
