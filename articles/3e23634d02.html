徒刑","authors":[],"dates":[{"year":1951,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市眉州路七五○号联大锯木厂(经理何方良)，经营机器锯木。有大小锯木车十一部，各车所锯下木屑由正大木屑号承包，所有运出木屑工作，由正大号雇用的李德庆、张金龙等四人，轮班担任，经常等候在联大厂内，随有随取。三月十一日下午四时半，正大取木屑工人张金龙与李德庆往取木屑，李德庆不幸被地轴拖撞而死。该案经各有关方面调查后，一致认为此次不幸事件之所以发生，实由于该厂没有安全设备和不重视工人生命的工作制度所造成。"},{"type":"paragraph","text":"事故发生后，除死者家属抚恤部份，已据建筑工会及该业同业公会邀同死者家属，及被告等协议解决外，刑事责任部份经本市杨树浦公安分局及劳动局分别移送人民法院办理，人民法院根据上述事实，以被告何方良为该厂经理应负主要责任；同时被告曹福元为正大木屑号资方，明知联大厂没有安全设备，不向工人说明，使冒极大之生命危险在该厂从事收取木屑工作，从未相互商讨政善工作方法以致肇祸，也应负部份责任。此种只重机器不重人的残酷剥削思想，必须分别轻重予以适当惩戒，除由劳动局饬令联大厂政善安全设备和工作制度外，并由人民法院于本月廿一日判处何方良徒刑二月，曹福元予以训诫处分。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e23634d02"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
