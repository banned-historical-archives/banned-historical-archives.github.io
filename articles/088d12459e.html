ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"无产阶级专政下革命的主要对象","alias":"","parts":[{"type":"paragraph","text":"无产阶级专政下革命的主要对象"},{"type":"paragraph","text":"（1967年8月）"},{"type":"paragraph","text":"在无产阶级专政下革命的主要对象，是暗藏在无产阶级专政机构内部的资产阶级司令部，我们就是对无产阶级专政机构内部的这一部分进行革命。从我们党和我们国家的整体来说，它们是不占统治地位的，但是必须打倒他们，才能巩固和强化无产阶级专政，防止资本主义复辟。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":64,"page_end":64},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"无产阶级专政下革命的主要对象","alias":"","parts":[{"type":"paragraph","text":"无产阶级专政下革命的主要对象"},{"type":"paragraph","text":"（一九六七年八月）"},{"type":"paragraph","text":"在无产阶级专政下革命的主要对象，是暗藏在无产阶级专政机构内部的资产阶级司命部；我们就是对无产阶级专政机构内部的这一部分进行革命。从我们党和我们国家的整体来说，它们是不占统治地位的，但是必须打倒他们，才能巩固和强化无产阶级专政，防止资本主义复辟。"},{"type":"paragraph","text":"转摘自《红旗》杂志一九六七年第十三期社论"},{"type":"paragraph","text":"《彻底摧毁资产阶级司合部一纪念党的"},{"type":"paragraph","text":"八届十一中全会召开一周年》关于武斗的指示"},{"type":"paragraph","text":"（一九六七年八月）"},{"type":"paragraph","text":"对武斗不要看得太紧张，对形势不能看得太严重，不要急。那里有武斗，必然有后台，让他多表演一下，越表演越孤立，使群众看得更清楚，群众孤立他，就好办了。乱是暂时的，可以转化为好的。打架是支流，是暂时的支流。决不能转移斗争的大方向。"},{"type":"paragraph","text":"对《中共中央、国务院、中央军委、中央文革小粗煤炭工业战职工的一"},{"type":"paragraph","text":"封信》的批示和修改"},{"type":"paragraph","text":"(一九六七年八月十六日）批示：已，照办。"},{"type":"paragraph","text":"毛泽东主要修改："},{"type":"paragraph","text":"信的开头，“广大的职工群众们”句是主席加的。"},{"type":"paragraph","text":"信的第七段，在“无产阶级革命派和革命职工必须把国家利益”-一句后加了“工人阶级利盆”只字。"},{"type":"paragraph","text":"第八段“凡是坚持下去、坚持生产，做出成绩的职工，不论属于哪个群众组织或者未参加组织，都应当给予表扬和适当奖励。”整段都是主席新加进去的。"},{"type":"paragraph","text":"·323·"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":8,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":336,"page_end":336},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"088d12459e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
