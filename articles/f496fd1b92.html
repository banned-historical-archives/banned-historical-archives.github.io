和外交部分别送了花圈","authors":[],"dates":[{"year":1976,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乔外长前往尼日利亚驻华大使馆吊唁"},{"type":"paragraph","text":"尼联邦军政府首脑穆罕默德被刺逝世"},{"type":"paragraph","text":"华国锋代总理和外交部分别送了花圈"},{"type":"paragraph","text":"新华社一九七六年二月十八日讯外交部长乔冠华今天下午前往尼日利亚驻中国大使馆，吊唁尼日利亚联邦共和国联邦军政府首脑、武装部队总司令穆尔塔拉·穆罕默德上将被刺逝世。穆尔塔拉·穆罕默德上将是在最近尼日利亚发生的一次未遂政变中被杀害的。"},{"type":"paragraph","text":"中华人民共和国国务院代总理华国锋和外交部分别送了花圈。"},{"type":"paragraph","text":"前往吊唁的还有北京市革命委员会副秘书长周荣国，外交部非洲司司长何功楷、礼宾司副司长刘华。"},{"type":"paragraph","text":"吊唁时，尼日利亚驻中国大使坦科·优素福和大使馆外交官员在场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f496fd1b92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
