art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘主席接见古巴政府经济代表团周恩来总理接见古巴政府经济代表团全体成员","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社21日讯 毛泽东主席、刘少奇主席今天下午接见了古巴政府经济代表团团长、古巴对外贸易部部长阿耳贝托·莫拉以及代表团全体成员。毛泽东主席和刘少奇主席同古巴朋友进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有：对外贸易部部长叶季壮、副部长卢绪章。"},{"type":"paragraph","text":"接见时古巴驻华大使皮诺·桑托斯也在座。"},{"type":"paragraph","text":"新华社21日讯 周恩来总理今天上午接见古巴政府经济代表团团长、古巴对外贸易部部长阿耳贝托·莫拉和代表团全体成员。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有：外贸部部长叶季壮、副部长卢绪章，外交部美澳司司长郑为之，外贸部第三局局长陈明，我国驻古巴大使馆商务参赞于黎光。"},{"type":"paragraph","text":"古巴驻中国大使皮诺·桑托斯也在座。"},{"type":"paragraph","text":"毛泽东主席、刘少奇主席接见了古巴政府经济代表团全体成员。图为接见时合影。前排左起第四人是古巴政府经济代表团团长、古巴对外贸易部部长阿耳贝托·莫拉。 新华社记者 吕厚民摄（照片）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cd237ec33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
