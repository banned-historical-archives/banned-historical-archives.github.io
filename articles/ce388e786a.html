,"dates":[{"year":1973,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年十二月二十六日电　中共中央副主席、中共中央军委副主席叶剑英今天下午会见了以阿尔巴尼亚劳动党中央政治局候补委员、阿尔巴尼亚人民军总参谋长彼得里特·杜米为团长，阿尔巴尼亚劳动党中央委员、阿尔巴尼亚人民军政治部主任希托·恰科和阿尔巴尼亚国防部副部长阿里夫·哈斯科为副团长的阿尔巴尼亚人民军军事友好代表团全体成员。"},{"type":"paragraph","text":"何尔巴尼亚驻中国大使什图拉参加了会见。"},{"type":"paragraph","text":"当阿尔巴尼亚同志来到会见厅时，叶剑英副主席同他们一一亲切握手，并一起照了像。"},{"type":"paragraph","text":"会见时，叶剑英副主席同杜米团长，恰科、哈斯科副团长，什图拉大使和代表团团员卡比苏茨、沙拉班达、恰贝利等，进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"会见时在座的还有中国人民解放军副总参谋长张才千、李达，中国人民解放军总政治部副主任田维新、总后勤部政治委员张池明，外交部副部长余湛，中联部副部长任允中，国防部外事局副局长朱开印，中国驻阿尔巴尼亚大使馆武官吴好志等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce388e786a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
