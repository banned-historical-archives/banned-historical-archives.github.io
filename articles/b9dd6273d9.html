rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"印度革命者号召人民走武装斗争道路“五一”前后；在一些城市贴出毛主席画像和宣传马克思主义；列宁主义；毛泽东思想的革命标语","authors":[],"parts":[{"type":"paragraph","text":"新华社七日讯 新德里消息：在“五一”国际劳动节前后，印度革命者在一些城市中贴出了宣传马克思主义、列宁主义、毛泽东思想的革命标语，号召人民走武装斗争的革命道路。"},{"type":"paragraph","text":"“五一”节前夕，印度革命者在马德拉斯邦首府马德拉斯市的墙上贴出了革命标语，上面写着：“这个国家的问题用选举的办法是不能解决的——我们将靠枪炮来解决这些问题”、“阶级战争是必然的”、“我们将拿起武器”。"},{"type":"paragraph","text":"在喀拉拉邦首府特里凡得琅，“五一”节也出现了革命标语，上面写着：“纳萨尔巴里燃起的火焰将蔓延成为一片熊熊烈火”。还有一些标语谴责苏修叛徒集团及其走狗丹吉集团和印修分子南布迪里巴德之流出卖印度人民。"},{"type":"paragraph","text":"在比哈尔邦首府巴特那，四月三十日出现了革命者用油漆刷出的大标语。这些标语表示向毛泽东主席“致红色的敬礼”，并且宣传“枪杆子里面出政权”的真理。"},{"type":"paragraph","text":"在这个邦的另一个城市蒙吉尔，革命者在同一天贴出毛主席的画像和号召人民走武装斗争道路的标语。其中一些标语写着：“打倒甘地主义！”“打倒修正主义者！”“向纳萨尔巴里致敬！”"},{"type":"paragraph","text":"四月中，在克什米尔印度占领区首府斯利那加出现了革命者贴出的标语，号召人民抵制即将举行的选举，反对议会制度，指出议会制度是“对工人的欺骗”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9dd6273d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
