art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认真学习《决议》 彻底否定“文革”","authors":["科宣"],"parts":[{"type":"paragraph","text":"本报讯 国防科工委党委组织机关全体党员，认真学习十一届六中全会《决议》，把彻底否定“文化大革命”作为整党学习的一个专题进行讨论，自觉总结经验教训，增强党性，增强团结，使整党学习逐步深入。"},{"type":"paragraph","text":"鉴于一部分党员干部对“文革”存在着一些模糊认识，科工委党委认真作了分析，认为产生这些模糊认识的一个重要原因，是这些同志还没有从思想上彻底否定“文化大革命”。党委根据中央军委领导同志的要求，决定把开展彻底否定“文革”、消除派性、增强党性的讨论，列为整党学习的一个专题。"},{"type":"paragraph","text":"按照党委的部署，科工委机关党员拿出专门时间，学习《关于建国以来党的若干历史问题的决议》，联系“文革”中的经历，谈认识，摆问题，总结经验教训。一些原来认为自己是“保守派”，“保对了，没问题”的同志，通过学习认识到，从总体上来讲，这个派、那个派都是错误的。当然，各派中干坏事的都只是极少数人。一些领导同志在发言中说，作为领导干部，任何时候都不能搞以我划线，不能从个人的好恶出发来判别是非，认为“保我的都是好人，反我的都是坏人”。共产党员任何时候都不应该拉帮结派。"},{"type":"paragraph","text":"大家认为，能否正确总结“文革”的经验教训，首先在于能否正确认识自己。在总结经验教训时，要坚持实事求是，不文过饰非，不标榜自己，不为自己开脱。"},{"type":"paragraph","text":"经过联系实际的学习讨论，大家统一了思想，提高了觉悟，增进了团结，机关工作出现了团结奋进的新气象。（科宣）"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a703a42a09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
