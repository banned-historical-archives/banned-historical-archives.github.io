ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央批准西北局关于开展三反整风运动指示的电报","alias":"","parts":[{"type":"paragraph","text":"中央批准西北局关于开展三反整风运动指示的电报"},{"type":"paragraph","text":"（1951年12月24日）西北局："},{"type":"paragraph","text":"十二月十八日的整风指示稿\"，已收到，看过，认为是正确的，可即照此施行。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十二月二十四日"},{"type":"paragraph","text":"[1]指中共中央西北局1951年12月18日关于开展反对贪污、反对浪费、反对官僚主义的整风运动的指示。指示说，西北局决定从现在起，有系统地普遍地发动全党和所有工作人员，向贪污现象、浪费现象和官僚主义现象作坚决严肃的斗争。大行政区机关和省、市级机关，现在就应立即动手，集中力量在一个月时间内完成这个运动。各专区和县也要在本月或明年1月开始。各机关、企业、团体，一般地都要先从开展反对贪污和反对浪费斗争入手，由此联系检查领导工作中的官僚主义作风，并从而讨论堵塞漏洞，提高工作效率的各项必要办法和制度，最后在这个基础上，引导群众转到增产节约运动中去。正在进行整党工作的机关，应把这个反对贪污、反对浪费、反对官僚主义的整风和整党结合起来，首先解决那些贪污、浪费、官僚主义和脱离群众的突出问题，然后进一步进行共产主义教育，以至登记处理等。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":183,"page_end":183},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"通讯"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央批准西北局关于开展三反整风运动指示的电报","authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":24}],"is_range_date":false,"parts":[{"text":"中央批准西北局关于开展三反整风运动指示的电报","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"西北局：","type":"appellation"},{"text":"十二月十八日的整风指示稿，已收到，看过，认为是正确的，可即照此施行。","type":"paragraph"},{"text":" 中央十二月二十四日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd4523e2c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
