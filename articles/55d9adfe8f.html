art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"强烈谴责柯西金对我国文化大革命的诬蔑","authors":[],"parts":[{"type":"paragraph","text":"帝国主义、现代修正主义、各国反动派不论怎样发出反华的狂吠，绝不能阻挡我国无产阶级文化大革命的胜利前进，丝毫也损害不了伟大的战无不胜的毛泽东思想的光辉。"},{"type":"paragraph","text":"苏修领导集团再次充当反华急先锋，说明他们已经是“黔驴技穷”，恰恰暴露了他们的虚弱。"},{"type":"paragraph","text":"新华社十五日讯 国务院副总理陈毅今天强烈谴责苏联部长会议主席柯西金在访问英国期间颠倒黑白，企图把恶化中苏两国关系的责任推到中国身上，并公开诬蔑我国的无产阶级文化大革命，粗暴干涉我国内政，甚至恶毒攻击我们的伟大领袖毛主席。"},{"type":"paragraph","text":"陈毅副总理说，苏联修正主义领导集团再一次充当反华急先锋，说明他们已经是“黔驴技穷”。他们猖狂反华一点也不表明他们的强大，恰恰暴露了他们的虚弱。"},{"type":"paragraph","text":"陈毅副总理有力地指出，帝国主义、现代修正主义、各国反动派不论怎样发出反华的狂吠，绝不能阻挡我国无产阶级文化大革命的胜利前进，丝毫也损害不了伟大的战无不胜的毛泽东思想的光辉。"},{"type":"paragraph","text":"陈毅副总理是在毛里塔尼亚外交、计划部长举行的告别招待会上讲这些话的。他在讲话中说，我们伟大的领袖毛主席亲自发动和领导的无产阶级文化大革命，是一场史无前例的触及人们灵魂的大革命，是我国社会主义革命发展的一个更深入、更广阔的新阶段。我国无产阶级文化大革命就是要在我国防止修正主义篡夺党和国家的领导，防止资本主义的复辟。这将进一步巩固我国的无产阶级专政，大大推动社会主义建设事业的发展，从而有力地加强我国支援世界人民革命斗争的力量。"},{"type":"paragraph","text":"陈毅副总理说，对于我国的无产阶级文化大革命，帝国主义、现代修正主义和各国反动派怕得要死，他们勾结起来疯狂地掀起了一股新的反华逆流。苏联修正主义领导集团再一次充当了反华的急先锋。最近一个时期以来，他们更血腥镇压我国留学生，殴打我国外交人员，把中苏两国关系推向到破裂的边缘。苏联部长会议主席柯西金在访问英国期间竟颠倒黑白，企图把恶化中苏两国关系的责任推到中国身上，并且公开诬蔑我国的无产阶级文化大革命，粗暴干涉我国内政，甚至恶毒攻击我们的伟大领袖毛主席。"},{"type":"paragraph","text":"陈毅副总理严正指出，苏联修正主义领导集团已经是“黔驴技穷”。他们猖狂反华一点也不表明他们的强大，恰恰暴露了他们的虚弱。RW：陈毅；外长；言论"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55d9adfe8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
