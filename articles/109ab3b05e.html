rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席指引的道路干革命刚果（金）朋友在毛主席像前表达重返前线杀敌的决心","authors":[],"parts":[{"type":"paragraph","text":"住在一个非洲国家的三位刚果（金）朋友，在一天中午，去看望在那里工作的中国朋友。他们到达中国朋友的住所后，小心地打开了包了一层又一层的一个小包，取出了一个非常精致的战鼓，恳切地请求中国朋友把这一珍贵的礼物——非洲革命的战鼓，献给伟大的领袖毛主席。其中一个刚果（金）朋友说：“这革命的战鼓是我们革命的进军号角，是我们决心要把革命进行到底的象征。毛主席是我们的伟大导师、伟大统帅。把这个战鼓献给敬爱的毛主席，表明我们一定永远紧紧跟随他老人家所指引的道路干革命，直到取得革命的最后胜利。”"},{"type":"paragraph","text":"接着，这三个刚果（金）战士走到毛主席像前，高高举起红彤彤的《毛主席语录》，一再高呼“毛主席万岁！”“祝毛主席万寿无疆！”当他们离去之前，又站在毛主席像前，齐声朗读：“下定决心，不怕牺牲，排除万难，去争取胜利。”表达了他们要重返斗争前线去争取胜利的决心。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"109ab3b05e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
