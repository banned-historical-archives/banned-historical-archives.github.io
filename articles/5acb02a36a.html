[],"dates":[{"year":1970,"month":1,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国公司的残酷剥削和强盗行径"},{"type":"paragraph","text":"秘鲁矿区人民展开英勇斗争"},{"type":"paragraph","text":"新华社一日讯　秘鲁矿业城市塞罗德帕斯科的居民在一九六九年十二月中旬以来展开英勇斗争，抗议美国企业“塞罗德帕斯科公司”无视秘鲁主权、危害当地居民利益的罪行，并且要求把这家残酷榨取秘鲁人民血汗的公司赶出秘鲁。"},{"type":"paragraph","text":"“塞罗德帕斯科公司”最近蛮横地拉起一大片铁丝网进行圈地，截断了两万多居民通向铁路车站、工人医院和其他公共场所的通道。这家公司的强盗行径引起这个城市居民的极大愤慨。连日来他们不断举行抗议集会和进军，并且英勇地摧毁了大部分铁丝网，在那里插上标语牌，上面写道：“美国佬滚出秘鲁！”这个城市的人民还要求当局把这家罪恶累累的美国公司赶出秘鲁。塞罗德帕斯科城人民也同篡夺了一些工会组织领导权、阴谋破坏这次斗争的修正主义分子展开了斗争。“塞罗德帕斯科公司”长期以来控制秘鲁全部铜矿和锌矿的开采以及其他一些矿藏的开采，并且在秘鲁拥有大量土地和农牧业庄园。"},{"type":"paragraph","text":"与此同时，秘鲁北部皮乌拉省丘卢卡纳斯区的一百多名农民不久前勇敢地赶走了一座庄园的地主，占领了二十一公顷耕地和一个牧场。这些农民多次打退了庄园主的进攻，继续占领着土地。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5acb02a36a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
