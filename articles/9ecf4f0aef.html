script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全运会筹委会设宴热烈欢迎台湾省体育代表团华国锋副总理等出席了宴会庄则栋主任和蔡啸团长在宴会上讲了话　席间，同胞们和战友们畅叙骨肉深情，充满了亲人团聚的欢乐气氛","authors":[],"dates":[{"year":1975,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一九七五年八月二十九日电　第三届全国运动会筹备委员会今晚在人民大会堂举行宴会，热烈欢迎由海外和从祖国各地来到首都北京的台湾省籍同胞组成的台湾省体育代表团。"},{"type":"paragraph","text":"国务院副总理华国锋，第三届全国运动会筹备委员会、国家体委、北京市等有关方面的负责人罗青长、庄则栋、田维新、林丽韫、于桑、丁国钰、赵正洪、马文波、李金德、李青川、路金栋、徐运北，台湾省体育代表团团长蔡啸，副团长黄文钦、黄于燕，在北京的台湾省籍的人大常委会委员、政协全国委员会常务委员、人大代表、政协委员。中国人民解放军体育代表团团长，北京市体育代表团团长以及今年五月二十七日胜利登上世界最高峰——珠穆朗玛峰的九名男女运动员的代表等出席了宴会。"},{"type":"paragraph","text":"第三届全国运动会筹备委员会秘书长、国家体委主任庄则栋在宴会上讲话。他说:第三届全国运动会有台湾省体育代表团参加，充分体现了伟大领袖毛主席和党中央对台湾同胞的亲切关怀；显示了台湾同胞对伟大领袖毛主席和社会主义祖国的热爱；增进了台湾同胞与全国各族人民的爱国大团结；表达了包括台湾同胞在内的全国人民一定要解放台湾、统一祖国的坚强决心。我们一定要随时准备歼灭入侵之敌和解放台湾，台湾同胞一定要回到祖国的怀抱，伟大的祖国一定要实现统一。"},{"type":"paragraph","text":"台湾省体育代表团团长蔡啸在宴会上讲话。他说:我们台湾省体育代表团代表台湾省人民和台湾省体育工作者和运动员，参加第三届全国运动会，接受党中央和全国人民的检阅。这是台湾省体育工作者和运动员的幸福，也是台湾省人民的心愿。他说，我们决心紧密地团结起来，在以毛主席为首的党中央的领导下，同全国各族人民和来自各地的体育工作者、运动员一道，为促进祖国社会主义体育事业的发展，为加强社会主义革命和建设，为解放台湾、统一祖国而努力奋斗。"},{"type":"paragraph","text":"席间，同胞们和战友们畅叙骨肉深情，充满了亲人团聚的欢乐气氛。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ecf4f0aef"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
