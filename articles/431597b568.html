authors":[],"dates":[{"year":1979,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"中央纪委对云南省委纪委关于纠正文革前错案的答复","type":"title"},{"text":"中共云南省委纪律检查委员会：","type":"appellation"},{"text":"1979年4月14日函悉。根据中央有关文件精神，纠正文化大革命前被错误处理的案件，主要是澄清事实，分清是非，着重从政治上解决问题。经过复查需要改变原结论和处分，恢复原工资待遇的，除已有规定者外应从批准之日开始执行；因处分而减发的工资或少得的劳动报酬，不予补发。个别生活确有困难的，可酌情给予适当补助。过去有些处分决定手续不够完备，但实际上已执行了，复查后如需改变结论和处分的，亦按此精神掌握。","type":"paragraph"},{"text":"“四清”运动后期结论处理的，应视为文化大革命前处理的案件。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"431597b568"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
