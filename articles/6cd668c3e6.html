art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"海防战士永远忠于毛主席","authors":["国庆观礼代表/福州部队某部指导员林九来"],"parts":[{"type":"paragraph","text":"在举国上下欢庆伟大的中华人民共和国成立二十周年的光辉节日里，我们驻守在福建前线的海防战士，来到日日夜夜想念的伟大领袖毛主席身边，接受毛主席的检阅。十月一日上午十时整，我们心中的红太阳毛主席和他的亲密战友林副主席健步登上天安门城楼。毛主席他老人家红光满面，神采奕奕，身体非常非常健康，林副主席身体也很健康。在这终生难忘的幸福时刻，我们心潮滚滚喜泪流，千遍万遍地振臂高呼：毛主席万岁！万万岁！"},{"type":"paragraph","text":"锌慷媸郑�干革命靠毛泽东思想�J�多年来，我们连队一直守卫在与蒋匪军一水之隔的小岛上�T谟氲腥顺て诙氛�的日日夜夜里，我们遵照毛主席关于〖JZ/加重〗“与天奋斗，其乐无穷！与地奋斗，其乐无穷！与人奋斗，其乐无穷”"},{"type":"paragraph","text":"我们坚决响应林副主席在国庆讲话中提出的战斗号召，时刻保持高度的革命警惕，坚决保卫伟大祖国的神圣边疆。用毛泽东思想武装起来的海防战士，天不怕，地不怕，飞机不怕，大炮不怕，原子弹也不怕。敌人胆敢发动侵略战争，不管他们大打，小打，打常规战争，还是打核大战，我们都要坚决、彻底、干净、全部地把他们消灭光。我们誓为保卫伟大的社会主义祖国，保卫毛主席，而英勇战斗！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cd668c3e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
