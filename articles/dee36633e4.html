:[{"year":1976,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工农兵评报好"},{"type":"paragraph","text":"北京大学工农兵学员评报组"},{"type":"paragraph","text":"《新闻战线上的新生事物——赞工农兵评报》一文，使我们心情十分激动。同志们说：党报充分肯定和热情赞扬我们工农兵评报，并把它赞为社会主义的又一新生事物，真叫人打心眼里高兴。工农兵评报就是好！"},{"type":"paragraph","text":"我们认为，工农兵评报好就好在："},{"type":"paragraph","text":"（1）工农兵评报是落实毛主席全党办报、群众办报伟大指示的具体行动，是把报纸办成无产阶级专政工具的重大措施。"},{"type":"paragraph","text":"（2）工农兵评报是对邓小平“依靠工农兵是相对的”谬论的有力批判，是同邓小平修正主义路线对着干的实际行动。"},{"type":"paragraph","text":"（3）工农兵评报，"},{"type":"paragraph","text":"“大老粗”的话管事了，这不是一个办报方法问题，而是一个政治问题、方向问题。只有代表广大人民群众利益的无产阶级的报纸才能做到这一点。"},{"type":"paragraph","text":"（4）工农兵评报这一新生事物的出现和成长，是无产阶级文化大革命的又一胜利成果。赞扬工农兵评报，也就热情地歌颂了无产阶级文化大革命。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dee36633e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
