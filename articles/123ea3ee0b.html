能清"],"dates":[{"year":1991,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东和他的儿子》在平壤获好评"},{"type":"paragraph","text":"许多观众受感动而流泪"},{"type":"paragraph","text":"新华社平壤７月９日电  （记者黎能清）中国潇湘电影制片厂新近摄制的影片《毛泽东和他的儿子》，７月８日在平壤上映，受到好评。"},{"type":"paragraph","text":"７月８日晚，为庆祝《中朝友好合作互助条约》签订３０周年，在朝鲜对外文化联络委员会、朝中友好协会中央委员会举行的“朝中友好周”开幕式上，放映了这部影片。"},{"type":"paragraph","text":"平壤市许多观众一面观看，一面为影片中的故事情节所感动而流泪。"},{"type":"paragraph","text":"朝鲜对外文化联络委员会委员长郑浚基看后说，这部影片很新颖，它塑造了毛主席作为一个普通人和一个革命家的光辉形象。"},{"type":"paragraph","text":"朝中友好协会中央委员会委员长李子方说，这部影片思想性和艺术性都很高，人情味很浓，它反映了毛泽东主席对人民和自己的儿子的原则立场和态度，反映了毛主席作为革命家的伟大风貌。我看了都掉了泪。他说，毛岸英同志是在朝鲜战场上牺牲的，朝鲜人民对此永世不忘。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"123ea3ee0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
