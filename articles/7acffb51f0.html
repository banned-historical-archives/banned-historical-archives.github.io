ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"关于巩固河防的部署","alias":"","parts":[{"type":"paragraph","text":"关于巩固河防的部署！"},{"type":"paragraph","text":"（1938年3月2日）朱、彭，并林，聂，贺、萧、关，刘、徐、邓："},{"type":"paragraph","text":"甲、敌之企图在一面攻陕北，一面攻潼关。现军渡、口之敌两路猛攻，河防有被突破可能，绥德、延安紧急，威胁河东整个军队之归路。"},{"type":"paragraph","text":"乙、目前部队在晋西北必须照贺萧关已定部署，以警六团对付进攻河曲之敌，以一个旅攻击由五寨向临县进攻之敌，以一个旅星夜兼程至离石以北，攻击口军渡两敌之背阻碍其渡河。此三部并须猛力发动群众，巩固北段河防之一切未失渡口，保障后路。如敌突破河防攻绥德，须以一个旅渡河，配合河西部队消灭该敌，保卫延安。"},{"type":"paragraph","text":"[1]从1938年2月下旬起，日军多次向陕甘宁边区河防进犯，企图切断陕甘宁边区与山西各抗日根据地的联系。这是毛泽东就巩固河防问题给朱德、彭德怀等的电报。"},{"type":"paragraph","text":"[2]林，指林彪，当时任八路军第一一五师师长。聂，指聂荣臻，当时任八路军晋察冀军区司令员兼政治委员。贺、萧、关，指贺龙、萧克、关向应，当时分别任八路军第一二○师师长、副师长和政治委员。刘、徐、邓，指刘伯承、徐向前、邓小平，当时分别任八路军第一二九师师长、副师长和政治委员。"},{"type":"paragraph","text":"[3]潼关，位于陕西省潼关县北部，当陕西、山西、河南三省要冲。"},{"type":"paragraph","text":"丙、徐旅\"必须立即西移，归还一一五师建制，协同陈旅消灭当地之敌，猛力发动离石、中阳、石楼、永和、大宁、县、吉县及整个吕梁山脉之民众，配合友军部队，巩固中段河防一切大小渡口，保障晋东南晋西南整个国军的归路。如潼关、西安危险，在山西国军主力转移之前，准备先以一一五师之一个旅渡河南进，为保卫西安而战。"},{"type":"paragraph","text":"丁、一二九师应位于同蒲以东，布置侧面阵地，破坏铁路，阻滞敌向潼关进攻，并策应林贺两师作战，如潼关、西安危急，蒋3有另调普境国军主力渡河，改任保卫西安之任务时，该师主力亦应准备西移，而留一部永久位于晋东南坚持游击战争。上述方针，政治局会议完全同意，望坚决执行。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"三月二日[1]徐旅，指八路军第一一五师第三四四旅，旅长徐海东。[2]陈旅，指八路军第一一五师第三四三旅，旅长陈光。[3]蒋，指蒋介石。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":58,"page_end":59},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7acffb51f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
