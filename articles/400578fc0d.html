tes":[{"year":1978,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海新华印刷厂工人理论组"},{"type":"paragraph","text":"“四人帮”的狗头军师张春桥曾别有用心地提出:“要建立没有规章制度的企业”。文痞姚文元也跟着鼓吹:“要总结一个没有规章制度而搞好生产的典型”。要问什么是“四人帮”的假左真右，这就是一个例证。"},{"type":"paragraph","text":"党有党章，国有国法，厂有厂规，在一个工厂企业里，没有规章制度，怎么能进行生产?革命导师马克思说:“一切规模较大的直接社会劳动或共同劳动，都或多或少地需要指挥，以协调个人的活动”。在社会主义企业里，成百、成千、成万人在一起共同劳动，如果没有统一的指挥，没有科学的管理，不要规章制度，不讲组织纪律，就不能协同动作，步调一致地搞好生产。“四人帮”反对规章制度，打着“相位群众”的幌子，似乎不要制度也能照样搞好生产，其实，这完全是欺人之谈。"},{"type":"paragraph","text":"对于规章制度，需要具体分析。一部分规章制度是同一定的生产关系和上层建筑相联系的，是由一定的社会制度决定的。在我们社会主义社会，还有阶级和阶级斗争，还存在资产阶级的思想、作风，因此，我们还必须利用规章制度进行严格的管理和约束。一旦取消了这一部分规章制度，社会就不得安宁，生产就无法正常进行。在规章制度中，还有一部分是同生产力相联系的，反映了生产技术发展的客观规律，比如技术操作规程之类的内容，就属于这一种。只要有社会生产，就一定要有这样的规章制度。前几年，在“四人帮”控制下的一些地区和单位，取消规章制度，否定管理，不正是出现了种种混乱吗?“四人帮”提出“要建立没有规章制度的企业”的口号有着卑鄙的目的，就是要扇动无政府主义，搞乱企业，搞乱国家，以便他们乱中夺权。这不是假左真右是什么?"},{"type":"paragraph","text":"“四人帮”鼓吹不要规章制度，在我厂造成了严重恶果。一九七二年，我们厂在经过群众讨论的基础上建立了岗位责任制。一九七三年，“四人帮”在上海的余党马天水知道后，立即扣上“这是管卡压”的帽子，马上派人来我厂，又是调查，又是坐谈，又是批判，逼着我们收起岗位责任制的本本，还要交给群众“批判”，肃清“流毒”。本本批判了，规章制度不敢执行了，后果是怎样呢?结果是严重挫伤了广大干部群众大干社会主义的积极性，干部不敢抓生产、抓管理，群众不敢批判无政府主义；出现了岗位不讲责任，事故不讲分析，操作不讲规程，劳动不讲纪律，经济不讲核算，产品不讲质量的混乱现象。以纸张消耗来说:一九七一年超伸放六百六十一令，一九七二年实行岗位责任制后降低到五百四十一令，一九七三年进一步减少到三百七十三令，比一九七一年减少百分之四十四。岗位责任制被“四人帮”破坏后，一九七四年就上升到八百三十三令，一九七五年进一步发展到二千八百五十六令，一九七六年更为惊人，全年纸张损耗高达五千七百七十九令，损失十五万元。"},{"type":"paragraph","text":"粉碎“四人帮”，工厂得解放。我们加强了企业管理，坚持执行革命的纪律和岗位责任制，以“鞍钢宪法”为指南，以大庆为榜样，坚持党的基本路线，肃清“四人帮”假左真右在企业管理方面的流毒，甩开膀子大干社会主义，决心为全面贯彻落实五届人大精神，为高速度地实现新时期的总任务努力奋斗。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"400578fc0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
