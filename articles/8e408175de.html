ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"和丁玲的谈话","alias":"","parts":[{"type":"paragraph","text":"和丁玲的谈话！]"},{"type":"paragraph","text":"（1937年8月15日）"},{"type":"paragraph","text":"这个工作重要，对你也很好，前方去可以接近部队，接近群众，宣传党的政策，扩大党的影响。组织上嘛，在延安属军委管，到了前方由总政管。出发以前，需要什么，找萧劲光同志。宣传工作，问中宣部。组织机构可以小一点，你们几个领导同志，称呼团长可以，称呼主任也可以。下边就不要设“部”“科”，我看叫“股”就行了。宣传上要做到群众喜闻乐见，要大众化。现在很多人谈旧瓶新酒，我看新瓶新酒，旧瓶新酒都可以，只要对抗战有利。你是写文章的，不会演戏，但可以领导，没有搞过，可以学会。团里有几个人的历史、政治面貌没有搞清楚，这不要紧。在工作中可以慢慢了解，对他们不要有成见，不要轻易作结论，要帮助他们；有这样几个人，你们就有事情做了。"},{"type":"paragraph","text":"[1]丁玲，当时任西北战地服务团主任，毛泽东非常关心西北战地服务团"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":8,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":531,"page_end":531},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e408175de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
