art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"心系军营情注兵法——记《毛泽东战法》一书作者何太由","authors":["刘春贤"],"parts":[{"type":"paragraph","text":"《毛泽东战法》一书出版了。该书总结了毛泽东等老一辈无产阶级革命家的作战经验，提出了“三个战争史期”、“当代三重战略”、“作战六原则，十二方法”，“智勇韧战斗作风”等较新的学术问题，引起一些部队领导同志和不少读者的注意。"},{"type":"paragraph","text":"近年来，这本书的作者何太由曾多次与笔者畅叙情怀。他1958年从部队复员到地方后，人离队心不离队，坚持业余研究军事学术，取得了明显成果。何太由出生在湖南省益阳县一个贫穷的农民家庭里。1949年9月，他高中毕业后加入了中国人民解放军的行列。1955年3月他被调到南京军事学院学习、任教。对毛泽东等老一辈革命家崇敬和热爱的感情，使他在这时就萌发了系统介绍毛泽东战法的想法。然而，1957年因反右扩大化，他被处理复员。他依依不舍地离开了部队，以顽强的毅力，开始了业余从事毛泽东军事思想研究的历程。"},{"type":"paragraph","text":"党的十一届三中全会后，邓小平同志提出了阐述毛泽东思想体系的重大任务。1981年徐向前元帅又在军事科学院号召学习和研究毛泽东军事思想。何太由在政治上得到彻底平反之后，抓紧一切业余时间，开始了多年来立意、构思的《毛泽东战法》的写作。经过四年的艰苦努力，1984年春终于写完了初稿。在所在单位的支持下，他先后六次带着书稿到北京、南京等地，走访了100多名专家、学者，广泛地听取了意见，经过3次修改，终于如愿以偿。书稿完成了，但他找了六家出版社，因是学术著作，得不到出版。但是，他得到许多老同志的支持。孙毅老将军，称赞《毛泽东战法》是个很好的创造。海军政委李耀文表示支持。国防大学顾问陶汉章、李夫克审阅了书稿。张震校长题写了书名。迟浩田总参谋长在书出版时，专函致贺。"},{"type":"paragraph","text":"目前，何太由正不负老同志的厚望，积极收集研究有关资料，准备续编新作。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2c03a2198"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
