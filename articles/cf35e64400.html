<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我国美术界的一件大事中国画研究院成立叶剑英接见研究院负责人　谷牧代表党中央、国务院致贺","authors":[],"dates":[{"year":1981,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e唐斯复\u003c/FONT\u003e"},{"type":"paragraph","text":"本报北京专电　经过四年的筹备工作，中国画的创作和研究中心——"},{"type":"paragraph","text":"中国画研究院于十一月一日在北京正式成立。十月二十七日下午，叶剑英同志接见了研究院负责人蔡若虹、李可染、黄胄。叶剑英同志说:“继承和发扬中国画的优良传统是很重要的。祝你们的事业繁荣昌盛。”"},{"type":"paragraph","text":"中国画研究院将团结全国的中国画家，复兴我国民族的传统美术，保护中国画的遗产，推动中国画创作实践和理论研究的开展，提高中国画的思想水平和艺术水平，促进社会主义美术事业兴盛繁荣，满足广大人民群众精神生活的需要。"},{"type":"paragraph","text":"中国文联副主席吴作人主持成立大会。"},{"type":"paragraph","text":"谷牧副总理代表党中央、国务院讲了话。他在讲话中说:中国画研究院的成立，是党在美术界拨乱反正，贯彻党的方针、政策的一个胜利。他希望中国画研究院坚决贯彻百花齐放、百家争鸣的方针，做好画界的团结工作，做好各个地区、各种流派的画家们的团结工作，积极扶植和培养新秀，把中国画的创作和理论研究提高到一个新的水平，创作出更多更好的无愧于我们这个伟大民族、无愧于我们这个伟大时代的作品。"},{"type":"paragraph","text":"林默涵同志代表文化部对中国画研究院的方针、任务以及团结等问题作了重要讲话。"},{"type":"paragraph","text":"中国画研究院负责人李可染在会上致词。李一氓、江丰、刘开渠也在会上发了言。"},{"type":"paragraph","text":"参加大会的有:万里、方毅、谷牧、姚依林。中央各部委、北京市委、中国文联各协会负责人、文艺界著名人士及来自祖国大陆各地、台湾、港澳和海外知名画家共五百多人。"},{"type":"paragraph","text":"研究院第一届画展同时开幕。"},{"type":"paragraph","text":"(驻京记者　唐斯复)"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1981\\11\\81B2011201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e李苦禅\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中国画研究院第一届画展作品之一——《双栖图》。"},{"type":"paragraph","text":"作者:李苦禅　(新华社稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"谷牧","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf35e64400"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
