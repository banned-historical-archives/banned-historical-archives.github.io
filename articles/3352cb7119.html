<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"全国粮食征购的情况和问题","authors":["新华社"],"dates":[{"year":1962,"month":11,"day":27}],"is_range_date":false,"parts":[{"text":"全国粮食征购的情况和问题","type":"title"},{"text":"新华社","type":"authors"},{"text":"本刊讯　据粮食部农管司反映，自中央和国务院关于抓紧当前农产品收购工作的紧急通知下达以后，各地的粮食征购进度已大大加快。截至１１月１７日，全国粮食征购已完成全年计划的７５.７４％。其中，已经超额完成任务的有湖南省；完成全年任务９０％以上的，有河南、四川、北京、贵州、湖北、河北等六个省市：完成８０——９０％的有宁夏、辽宁两省；完成全年任务５０％以下的，有青海、上海两个省市。其余各地，都在５０——８０％之间。","type":"paragraph"},{"text":"但目前粮食征购工作还存在不少问题，要完成今年的任务还要作很大的努力。","type":"paragraph"},{"text":"一、部分地区粮食的征购任务，还未落实到队。例如山东、江苏、云南、山西等省都还有相当一部分地区任务没有落实。云南在全省一百二十八个县中，要调整任务的有一百一十一个，已经调整落实到队的只有七十六个。这种情况，不仅收购进度慢的地区存在，就是进度快的地区也存在，如河北省还有一亿五到一亿六千万任务未落实下去。这种情况在受灾地区更加突出。","type":"paragraph"},{"text":"二、部分地区社、队干部的思想问题还没完全解决，主要是等待观望，多留少交，拖延入库时间，希图减免任务。有的地区只顾分配，不愿交粮，如黑龙江密山县鸡林公社强调先留后购后，至今一斤粮未交。","type":"paragraph"},{"text":"三、有些地方的粮食集市贸易名义上是关了，实际还有，对征购影响不小。河北省不准集体粮食上市，但有不少生产队仍将粮食化整为零到市场出售，或进行黑市成交。如唐山市西北郊每天夜间都要成交三、四百斤白薯。黑龙江省在粮食征购期，虽宣布集体和私人粮食一律不准上市，但有些社队征购任务未完成，就把大量粮食拉到市场出售。五常县民乐公社一些生产队最近就拉了一万斤大米到安客车站出售。山西、山东、安徽、贵州等省都有类似情况。","type":"paragraph"},{"text":"此外，在已入库的粮食中，杂粮多、细粮少；有些地区的粮食质量差，水分高。","type":"paragraph"},{"text":"来源：１９６２年１１月２７日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3352cb7119"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
