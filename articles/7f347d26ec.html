供了动力","authors":[],"dates":[{"year":1971,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席的“备战、备荒、为人民”的伟大战略方针指引下，西藏各族革命人民在人民解放军驻西藏部队指战员帮助下，利用当地水力资源，自力更生，多快好省地兴建中小型水电站，取得了显著成果。现在，西藏自治区已有近百座中小型水电站，分布在二分之一以上的县和一些社、队。还有一批水电站正在或即将动工修建。一九七○年全区发电量比一九六五年增长了一倍。随着水电事业的发展，一支以藏族工人为主的水电技术队伍正在成长。"},{"type":"paragraph","text":"中小型水电站的成批涌现，正在改变着“世界屋脊”的面貌。电站发出的电，除了使不少地区祖祖辈辈靠酥油灯和松木照明的翻身农牧民点上了电灯和听到了广播以外，还给农牧业生产和地方工业提供了动力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f347d26ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
