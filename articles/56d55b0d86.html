彻底砸烂苏联反革命修正主义统治","authors":[],"dates":[{"year":1967,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国学联打电报给苏联政府强烈抗议苏修镇压我留欧学生"},{"type":"paragraph","text":"坚决支持苏联人民和学生革命造反"},{"type":"paragraph","text":"彻底砸烂苏联反革命修正主义统治"},{"type":"paragraph","text":"新华社二十八日讯　中华全国学生联合会代表全中国学生二十七日给苏联部长会议发出了一封抗议电，对苏联修正主义领导集团血腥镇压我国留欧学生的滔天罪行表示最最强烈的抗议。"},{"type":"paragraph","text":"这封抗议电写道："},{"type":"paragraph","text":"“我国留学生在列宁陵墓前献花圈和朗读毛主席语录，是百分之百的革命行动，好得很！好得很！！你们这些混蛋却怕得要死。你们就是害怕我国无产阶级文化大革命的伟大影响，就是害怕苏联人民掌握伟大的毛泽东思想，起来造你们的反，夺你们的权，革你们的命，砸烂你们的狗头！苏修集团的头子勃列日涅夫和柯西金，你们竖起耳朵听着：用伟大的毛泽东思想武装起来的中国人民和学生不是好惹的。你们镇压中国学生的旧账未清，又欠下了一笔新的血债。血债要用血来还。中国人民和学生是饶不过你们的！"},{"type":"paragraph","text":"“我们最最敬爱的伟大领袖毛主席说：‘各国反动派也就是这样的一批蠢人。他们对于革命人民所作的种种迫害，归根结底，只能促进人民的更广泛更剧烈的革命。’今天，革命造反的星星之火已经出现在苏联的大地上。我们中国人民和学生誓同伟大的苏联人民和学生联合起来，坚决支持苏联人民和同学把你们一个个打翻在地，再踏上一只脚，叫你们永世不得翻身，把你们在苏联的反革命修正主义统治砸个稀巴烂。让马克思列宁主义、毛泽东思想的伟大红旗永远高高地飘扬在红场上空！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56d55b0d86"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
