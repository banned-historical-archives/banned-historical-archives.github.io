al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"领声来于万国","alias":"","parts":[{"type":"paragraph","text":"颂声来于万国"},{"type":"paragraph","text":"（1925年12月5日）"},{"type":"paragraph","text":"有个潮梅绅学商联合会打了一个响应刘志陆的电报，里面说：“共产妖党，煽惑粤东，近之足以陷中国于万劫不复之地，远之足以酿世界以灭绝人类之忧。我刘公仗义发难，为天下先。行见旌所指，浆食争迎，拉朽摧枯，大勋立就（记者按立字有弊）。赤化赖以铲除，国基由兹奠定。岂特与云南起义马厂誓师先后鼎足，抑且全世界人类赖以保障，全球劫运赖以挽回，纪念垂于干秋，颂声来于万国。”处处不忘“全世界”“全球”，眼光何等远大！刘志陆如果真把“赤化”铲除，“颂声”之来，一定可靠。万国不得而知，但至少有下面四国：英国、美国、法国、日本国。"}],"authors":["毛泽东"],"dates":[{"year":1925,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":154,"page_end":154},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74d6164388"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
