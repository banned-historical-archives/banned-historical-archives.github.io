icle":{"title":"中央人民政府司法部关于反革命罪犯家属‘个人所有的财产’范围的解释","dates":[{"year":1952,"month":5,"day":28}],"is_range_date":false,"authors":["中央人民政府司法部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 183","tags":[{"name":"反革命","type":"主题/事件"},{"name":"没收","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"中央人民政府司法部"},{"type":"title","text":"关于反革命罪犯家属“个人所有的财产”范围的解释"},{"type":"paragraph","text":"（一九五二年五月二十八日（52）司三函字第一一〇号函复西北军政委员会司法部）"},{"type":"paragraph","text":"对于反革命罪犯财产没收全部的范围，在规定注的第一项已有了规定。凡不在上述范围内的家属个人财产，经查明有据的，应属于该家属个人所有的财产范围；包括未供犯罪使用的共有财产中应得的一份，即共同所得的财产，继承的财产及共同创置的财产中之应得的一份。至于具体区分，尚应按具体案件审定，要防止涉及面过宽的倾向。"},{"type":"paragraph","text":"注：指政务院《关于没收反革命罪犯的财产的规定》。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee147fc0d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
