:1970,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卢湾区延安理发店部分革命群众"},{"type":"paragraph","text":"在开展革命大批判中，我们批判了资产阶级的各种奇形怪状的发式。但在我们同志中间还有许多和平麻痹思想，有的同志认为，在当前形势下，四类分子、资本家已经很服贴，他们不敢吹怪式样，我们职工觉悟提高了，更加不会吹怪式样。这种思想实质上就是“阶级斗争熄灭论”的反映，看不到意识形态领域里的阶级斗争。事实无情地教育了我们。我们店里有个资本家，平时不是在吹风上下功夫，就是在剪的上面玩花样，把两边剪长、后部剪短，吹好以后，只要顾客自己一推，顶部就高起来了。这个资本家就是这样用各种隐蔽的手段来和我们对抗。"},{"type":"paragraph","text":"毛主席教导我们:“无产阶级必须在上层建筑其中包括各个文化领域中对资产阶级实行全面的专政”。我们通过进一步深入开展大批判，纠正了各种错误思想，深刻地认识到，我们理发决不是单纯的业务问题，在理发中同样存在着两个阶级、两种思想的尖锐斗争。从此以后，在我们店里，只要发现怪发型露头，大家就自觉起来抵制。"},{"type":"paragraph","text":"有一次，一个女青年来理发，要求我们替她剪两边长后部短的发式，还要吹得高、吹得蓬。当时我们一听就觉得这是变相的怪式样，就耐心地对她说:“这种式样是‘四旧’，是资产阶级从生活上向我们进攻的反映，我们应该抵制。”这个青年接受了我们的意见，理好了发，她高高兴兴地走了。"},{"type":"paragraph","text":"当前，在社会上还有一些资产阶级的发式出现，这是在新的形势下，资产阶级向我们猖狂进攻的表现，是阶级斗争在意识形态领域里的反映。我们必须高举革命大批判的大旗，对资产阶级的进攻给予迎头痛击，再来一次大破“四旧”、大立“四新”的革命群众运动，为巩固无产阶级专政而斗争!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fc5fa3f30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
