ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于减少中央及各部委所发全国性电报的批语","alias":"","parts":[{"type":"paragraph","text":"关于减少中央及各部委所发全国性电报的批语！"},{"type":"paragraph","text":"（1953年3月）"},{"type":"paragraph","text":"中央在79天中发文统计。饶、安、习、周、朱、彭、高、邓、邓阅，退毛。"},{"type":"paragraph","text":"还是太多，要减少。"},{"type":"paragraph","text":"[1]这个批语写在中共中央办公厅机要室1953年3月22日关于中央及中央直属各部委自1953年1月1日至3月20日所发出的全国性电报的统计报告上。报告说，中央署名发各地的指示、通报电有128份，中央直属各部、委署名发各地的指示、通报电有98份，以上两项共计226份，以79天计，每日平均不及3件。"},{"type":"paragraph","text":"[2]饶，指饶漱石，当时任中共中央组织部部长。安，指安子文，当时任中共中央组织部副部长。习，指习仲勋，当时任中共中央宣传部部长。周，指周恩来。朱，指朱德。彭，指彭德怀，当时任中共中央政治局委员、人民革命军事委员会副主席。高，指高岗，当时任中共中央政治局委员、中央人民政府国家计划委员会主席。邓，指邓小平，当时任政务院副总理。邓，指邓子恢，当时任中共中央农村工作部部长。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":110,"page_end":110},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b8320fc21"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
