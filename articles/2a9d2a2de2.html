<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级是我们的死敌","authors":["钱芬娣"],"dates":[{"year":1968,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"钱芬娣"},{"type":"paragraph","text":"在伟大的三反五反运动期间，反动作家周而复在我厂呆了三个月，写出了反动小说《上海的早晨》。这本小说大肆贩卖了中国赫鲁晓夫“剥削有功”、“剥削有理”的谬论，把大买办、大吸血鬼写成是“爱国发家”、“勤俭发家”的“红色资本家”。中国赫鲁晓夫在解放以后，仍然叫这些过去骑在劳动人民头上的家伙当副市长、副部长。而周而复的《上海的早晨》，却把资本家写成是劳动人民的“救命恩人”，甚至借一个受苦受难的工人汤阿英之口，胡说什么“资本家养活工人”，真是主呼奴应，毒透毒透!"},{"type":"paragraph","text":"我厂资本家说过:“若要发，工人头上刮”。在万恶的旧社会里，我们工人做死做活，还要受到资本家的狗腿子严厉监视，挨打受骂，我们每天早上六点钟上班，晚上六点钟下班，上班不见太阳，下班看见月亮。整天在花衣飞扬、潮湿闷热的车间里紧张劳动，连吃饭的时间也没有，就是这样，我们的生活也还没有保障。在物价飞涨的旧社会，我们连每月的包饭钱也付不起。我们工人创造的劳动财富到那里去了，就是给资本家刮去了。什么“爱国发家”、“勤俭发家”，都是中国赫鲁晓夫的黑话。哪一个资本家不是唯利是图的?哪一个资本家的企业不是建筑在工人的白骨堆上?哪一个资本家不是我们工人的血汗养活养肥的?中国赫鲁晓夫也好，周而复也好，不论他们居心何等险恶，把资本家捧得怎么高，阶级斗争的现实使我们工人阶级清楚地认识到:资本家是工人阶级的死敌。周而复千方百计美化资本家，目的就是为中国赫鲁晓夫复辟资本主义大造舆论，就是要使我们工人阶级再吃二遍苦。"},{"type":"paragraph","text":"周而复在美化资本家的同时，明目张胆地丑化我们工人阶级。我们伟大领袖毛主席说:“工人阶级是领导阶级”。但是，周而复在写到我们工人罢工的时候，却放肆地诬蔑我们是为了几张钞票而罢工的。这是血口喷人。告诉周而复之流，我们工人阶级不同于你们那一伙，你们这批家伙才是为了钞票，什么丑事都做得出来的坏蛋。恩格斯说过:“在资产阶级看来，……他们活着就是为了赚钱，除了快快发财，他们不知道还有别的幸福，除了金钱的损失，也不知道还有别的痛苦。”这真是把那些骑在工人头上的吸血鬼、寄生虫的丑恶面目淋漓尽致地刻画出来了!"},{"type":"paragraph","text":"解放以来，我在党和毛主席的英明领导下，为人民做了一些工作，毛主席给了我政治上莫大的光荣，我八次幸福地见到了我们心中最红最红的红太阳毛主席，站在毛主席身旁拍了照。每当我在革命工作上遇到困难的时候，我的面前就出现了毛主席的光辉形象，毛主席对我们工人阶级的关怀，是我们工人阶级巨大力量的源泉，我们决心把毕生的精力，献给共产主义事业。而周而复却厚颜无耻地为资本家涂脂抹粉，肆无忌惮地污蔑工人阶级“钞票第一”，这就是要宣扬中国赫鲁晓夫的阶级投降路线，真是反动透顶!"},{"type":"paragraph","text":"“利用小说进行反党活动，是一大发明。”《上海的早晨》就是这样一部反动小说，我们工人阶级以工为主，也要批判资产阶级，占领文艺批判的战斗阵地，领导文艺界的全部斗、批、改，坚决把一切反动小说和中国赫鲁晓夫批臭，不获全胜，决不收兵!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a9d2a2de2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
