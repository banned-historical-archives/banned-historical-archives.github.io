忠心耿耿的优秀品质","authors":[],"dates":[{"year":1977,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年十二月十四日电　湖南省革命委员会主办的《华主席在湖南》美术作品展览，从十二月十四日起，在北京中国美术馆展出。"},{"type":"paragraph","text":"今天，北京城里大雪纷飞。可是，到美术馆参观展览的人还是川流不息。许多人满怀喜悦的心情边看边议论，热烈赞颂华主席一贯高举毛主席的伟大旗帜和对革命事业忠心耿耿的优秀品质。"},{"type":"paragraph","text":"这次展出的作品，有国画、油画、版画、年画、水粉画、水彩画、连环画等，共一百一十七件。这些作品从不同侧面反映了华国锋同志在湖南工作的二十多年里，坚持贯彻毛主席的革命路线，带领广大军民不断夺取社会主义革命和社会主义建设新胜利的革命实践。不少作品取材于华国锋同志在土地改革、合作化运动、大跃进以及文化大革命运动中的革命活动，表现了华国锋同志一贯高举毛主席的伟大旗帜，坚持不懈地与刘少奇、林彪、“四人帮”针锋相对作斗争的光辉历程。还有许多作品生动地再现了华国锋同志走遍三湘四水，深入群众调查研究，在工厂，在田间，在工地，在学校，在营房，和湖南各族人民团结一心、亲密无间的动人情景。"},{"type":"paragraph","text":"这个专题美术作品展览今年五月在湖南长沙展出一个半月，受到广大群众的热烈欢迎。许多青少年把参观活动作为接受教育的极好机会。湖南省一些地、县的同志把展览会的美术作品拍照后在本地展览。这次来京展出前，湖南省美术工作者广泛听取了工农兵群众的意见，召开了观摩会，座谈会，共同研究，发挥集体的智慧，对一些作品在原来的基础上进行了加工，对有些作品重新构思构图，重新创作，提高了作品的质量。"},{"type":"paragraph","text":"展览会预定在北京展出一个月。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc6570d33d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
