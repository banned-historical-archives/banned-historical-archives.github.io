tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"爹亲娘亲不如毛主席亲","authors":["北京空军学习毛主席著作积极分子代表大会代表？战士","膝天余"],"parts":[{"type":"paragraph","text":"我光荣地见到了我日夜想念的伟大导师、伟大领袖、伟大统帅、伟大舵手、世界人民心中最红最红的红太阳毛主席。这是我终生最最幸福的时刻，是我永远永远也不能忘记的日子。毛主席他老人家满面红光，神采奕奕，身体非常非常健康，精力非常非常充沛，这是全中国人民的最大幸福，最大的光荣，也是全世界人民最大的幸福，最大的光荣。"},{"type":"paragraph","text":"爹亲娘亲不如毛主席亲。我是一个贫农出身的苦孩子。是您老人家领导中国人民闹革命，赶走了日本帝国主义，消灭了美蒋反动派，结束了几千年来的剥削制度，拯救了灾难深重的中国人民；是您老人家发动和领导了翻天覆地的无产阶级文化大革命，揪出了党内一小撮走资本主义道路当权派，您的光辉思想照亮了亿万革命群众的心，保证了无产阶级的铁打江山千秋万代永不变色，您老人家为世界无产阶级革命夺取政权、巩固政权创造了最最丰富最最宝贵的经验。毛主席啊，毛主席！真是蓝天做纸，海水当墨，也书写不尽对您毛人家无限热爱、无限忠诚、无限信仰、无限崇拜。"},{"type":"paragraph","text":"最最敬爱的毛主席，我要永远永远跟着您干革命，大树特树您老人家的绝对权威，大树特树您老人家光辉思想的绝对权威。海可枯，石可烂，忠于您老人家的红心永不变，坚决永远沿着您开辟的革命航道奋勇前进！"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8f4a1a976"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
