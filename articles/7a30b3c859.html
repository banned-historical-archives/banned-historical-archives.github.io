" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对陶鲁在中央工作会议上发言要点的批语","alias":"","parts":[{"type":"paragraph","text":"对陶鲁笼在中央工作会议上"},{"type":"paragraph","text":"发言要点的批语"},{"type":"paragraph","text":"（1962年9月8日）陈伯达同志："},{"type":"paragraph","text":"此件值得一看。我看是讲得对的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月八日退毛。"},{"type":"paragraph","text":"[1]中共山西省委第一书记陶鲁1962年8月23日在中央工作会议上的发言要点刊登在商业文件起草委员会会议简报第十一期上。要点说：一、商业工作的中心问题，是在购销活动中正确处理我们同农民的关系问题。因为，农村是我国国内市场最广阔、最主要的场所。二、商业战线形势去年比前年好，今年比去年好。当前，商业工作中有以下几个重大而又迫切需要解决的问题：（1）收购农产品的购留比例问题。（2）工农业产品的等价交换问题。（3）收购农产品时对粮、棉、油等主要农产品奖售或换购工业品的比例问题。（4）收购农产品时，对待集体经济单位和社员个人的关系上的问题。（5）工商关系问题。（6）商业队伍不强，经营管理不善，物资损失严重。毛泽东全集第四十五卷三、对市场物价问题，华北小组一致同意第三个方案，即采取大部不动、小部调整的方针。现在农民迫切要求提高粮、棉、油等主要农产品所能换购到的工业品比例，我们认为，第一步要力争达到50%，第二步达到80%以上。解决目前存在着的两种市场、两种价格的矛盾，根本关键也在于发展生产。我们要重视利用价值法则，促进工农业生产。四、开放农村集市贸易，可以做到“管而不死，活而不乱”。办法是：把供销社的工作搞得更活一些，在集市贸易上，能够有吞有吐。对集市贸易的领导，应当以经济措施为主，辅之以必要的行政管理，同时，在群众中还要经常进行两条道路斗争的政治教育，以利于打击和防止投机倒把活动。五、促进棉花生产是当前十分尖锐的问题，文件中要表示中央解决这个向题的决心。六、文件可能有三种写法：（1）只写当前的问题；（2）只写长期的根本性的问题；（3）既写当前的，又写长期的。我主张兼顾二者，侧重当前。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":9,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":236,"page_end":237},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a30b3c859"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
