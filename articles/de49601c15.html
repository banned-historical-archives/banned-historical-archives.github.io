art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"就是要把资产阶级派性批臭","authors":[],"parts":[{"type":"paragraph","text":"“四人帮”胡说什么“批派性就是批造反派”，“就是批左派”。"},{"type":"paragraph","text":"造反，有着鲜明的阶级内容：不是造资产阶级的反，就是造无产阶级的反。“四人帮”心目中的“造反派”、“左派”，无非就是象翁森鹤、张铁生那样一些新生的反革命分子。他们恶毒攻击伟大领袖毛主席和敬爱的周总理，攻击华主席和中央其他领导同志，攻击人民解放军，煽动资产阶级派性，搞打砸抢，分裂群众队伍，搞垮各级党委，破坏革命，破坏生产，破坏军队建设，破坏安定团结，进行反革命活动，到处捣乱，乱中篡权。显而易见，他们代表的是反动阶级的利益，是造无产阶级的反。对于这样的“造反派”，我们就是要批，要斗，要对他们实行无产阶级专政。"},{"type":"paragraph","text":"“四人帮”一伙靠结帮拉派起家，他们给野心勃勃、疯狂反党反社会主义的反革命分子、坏分子戴上“造反派”、“左派”的桂冠，竭力反对批资产阶级派性，以便掩护他们向无产阶级进攻，在乱中篡党夺权，这就是他们的罪恶目的所在。（战士 王官勇）"},{"type":"paragraph","text":"王洪文在一次会议上嚎叫，批判资产阶级派性“就是否定文化大革命”。"},{"type":"paragraph","text":"按王洪文的逻辑，似乎文化大革命就是搞资产阶级派性的，真是荒谬到了极点！毛主席指出，无产阶级文化大革命，是“无产阶级反对资产阶级和一切剥削阶级的政治大革命”。“文化大革命三七开，七分成绩，三分错误。”七分成绩，是毛主席领导下取得的；三分错误，完全是林彪反党集团和“四人帮”的干扰破坏造成的。我们批判资产阶级派性，就是清算“四人帮”破坏文化大革命的罪行，巩固和发展文化大革命的胜利成果。王洪文胡说批判资产阶级派性“就是否定文化大革命”，这不仅是对文化大革命的诬蔑，同时也说明他们一伙是地地道道的煽动、保护资产阶级派性，破坏和否定文化大革命的罪魁锅首。（新战士 裴彪、乔凤梧）"}],"alias":""},"tags":[{"name":"王洪文","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de49601c15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
