" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"甘肃省委改造右派工作领导小组关於清理夹边沟农场劳教人员工作中发生一些问题的通知","authors":[],"dates":[{"year":1963,"month":9,"day":19}],"is_range_date":false,"parts":[{"text":"甘肃省委改造右派工作领导小组关于清理夹边沟农场劳教人员工作中发生一些问题的通知","type":"title"},{"text":"各地、州委，兰州市委改右工作领导小组，省级各部门党委：","type":"appellation"},{"text":"自省委四月十八日和七月十二日“关于对送往夹边沟农场的被劳动教养人员进行清理工作的通知”和有关问题的规定发出后，各地区各单位都已开展了工作。目前有的地区和单位抓的较紧，已基本结束；多数地区和单位正在积极进行；少数地区和单位进展还较迟缓，有的最近才开始传达布置。根据一些地区和单位反映，有的单位没有按照省委指示，坚持内部清理的原则办事，发生泄密现象。有的将内部清理工作传播出去；少数单位不适当的召开当时参加运动的有关人员座谈会进行讨论；个别单位甚至直接找被劳教人员谈话了解问题。造成不良影响。","type":"paragraph"},{"text":"同时在清理工作中，各地、各单位还提出了一些需要解答的问题。为了坚持按照省委通知精神办事，保证此项工作的顺利进展，对发生和请示的一些具体问题作如下通知和解答：","type":"paragraph"},{"text":"(一)必须抓紧清理工作，按照省委规定于10月底基本结束。特别是行动迟缓的地区和单位，应充实力量，抓紧清理，迎头赶上。","type":"paragraph"},{"text":"(二)在清理工作中应坚决贯彻内部清理的原则，不得随意外传，不准召开座谈会，更不准找被劳教人员直接谈话；一般的也不必找原揭发人个别了解情况，个别人的问题无法弄清，须找原揭发人了解情况时，应派于党、团员和可靠的干部，并还须经领导小组批准。但所找对象必须是党团员或政治上可靠的非党群众。同时以防止泄密。","type":"paragraph"},{"text":"(三)关于送往夹边沟农场被劳动教养人员，重新犯罪被逮捕法办的是否清理的问题。仍应归原单位负责清理原定性处分问题。对劳教期间重新犯罪捕办的问题，不属夹边沟的(此处二字辨认不出)清理范围，故不作清理。","type":"paragraph"},{"text":"(四)关于劳教人员遣返原籍，档案也转走了的是否清理问题，请各地摸一下底子(分开省内省外)将数字告诉我们研究(此处二字辨认不出)定。","type":"paragraph"},{"text":"(五)关于原属省级各大口审批的劳教人员的清理结论的审批权限问题。鉴于各大口已经撤销，可不再经大口审批。仍按省委四月十八日通知中的“按干部分管范围进行”。","type":"paragraph"},{"text":"(六)过去已经甄别的，一般的可不再清理，将数字计算在此次清理的以内，并将原甄别材料报省委一份备查。如领导上认为原甄别结论有问题的，也可重新进行审核。","type":"paragraph"},{"text":" 省委改造右派工作领导小组63．9．19．","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1f66d9400"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
