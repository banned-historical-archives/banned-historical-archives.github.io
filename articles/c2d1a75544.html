art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"惊慌·悲观·绝望美国资产阶级报纸哀叹侵越战争败局已定","authors":[],"parts":[{"type":"paragraph","text":"在南越战场上，美帝国主义这只纸老虎正陷入人民战争的汪洋大海之中。尽管它的军事头目一再装模作样，吹嘘“胜利”，并且不断增派地面部队到南越，进一步扩大侵略战争，但是相信他们“胜利”的人，已经越来越少了，就连一贯为约翰逊捧场的美国资产阶级报纸也越来越流露出悲观绝望的情绪。"},{"type":"paragraph","text":"美国正在迅速地失败"},{"type":"paragraph","text":"美国《圣路易邮报》记者达德门不久以前在这家报纸上发表文章说，南越的“军事局势一直在非常迅速地恶化，以致政治上的努力几乎可以说是垮了。”“这里的美国人和越南人认为，由于打了这种错误的战争，美国人既在失去土地，也在失去人心。”"},{"type":"paragraph","text":"这个记者还谈到了美国及其走狗所处的困境。他说，“在现在的主要战场——北部和中部地区，日益加快的失败的趋势是清楚无疑的。在过去几周内，几十个本来已被列为业经绥靖的村子都落入越共之手。许多县城的官员都不再敢在县城里过夜，而是到省城等比较安全的地方去了。”"},{"type":"paragraph","text":"“一些重要公路在几个星期以前还是经济上和军事上的大动脉，现在就因为桥梁被炸毁、路面挖了横沟或出现了著名的伏击地点而被切断了。”许多道路“被完全堵塞了。”"},{"type":"paragraph","text":"这个记者得出结论说，“美国方面正在失败，而且在迅速地失败。”"},{"type":"paragraph","text":"美国的主动权已完全丧失"},{"type":"paragraph","text":"美国著名的反动专栏作家约·艾尔索普最近在《纽约先驱论坛报》上发表文章，惊呼：美国在南越的“主动权已经完全放弃给敌人了”。文章写道，在他最近离开西贡回国时，“传来了关于南越北部省分发生激烈战斗的初步消息。现在从战斗发展的方式可以看出，共产党正在比人们所预计的大大提前而且在比预料的为大的规模上发动雨季攻势”。"},{"type":"paragraph","text":"他指出，所谓在岘港和其它地方的美国军事基地周围的“油点”正在“日益扩大”的说法是“胡说八道”。离海军陆战队只有数英里的满布丛林的山岭“是越共绝对控制了的地方”。"},{"type":"paragraph","text":"人数能帮美国的忙吗？"},{"type":"paragraph","text":"《华盛顿邮报》针对美国将继续大量增派战斗部队到南越去的问题发表社论说，法国为了打败越南人，曾经投入了四十万军队，然而最后还是“被迫撤退了”；在朝鲜战争期间，美国投入的军队也曾多达三十多万，然而美国并没有能打赢。社论问道：“现在的问题是，在越南，人数能帮美国的忙吗？”"},{"type":"paragraph","text":"这家报纸的另一篇文章实际上对这个问题作了否定的回答。文章作者把美国侵略南越的战事比作英国殖民主义者一七七六年镇压美国人民独立运动的殖民战争。他指出，英国殖民军队当时之所以失败，是因为他们进行的是一场“不得人心的战争”，是在“离家很远的地方为他们所并不信仰的东西而作战”。“绕过半个世界呆在越南的美国军队今天正处于同样的境地”。"}],"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2d1a75544"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
