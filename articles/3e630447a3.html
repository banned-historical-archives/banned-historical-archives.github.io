"year":1966,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"战士想念毛主席（外一首）"},{"type":"paragraph","text":"解放军战士　徐瑞海日夜想念毛主席，多少话儿涌心里，千句万句并一句：革命战士最爱您。毛主席呀毛主席，您的书咱一刻也不离。字字闪金光，句句是真理，是我们生活里的粮食和空"},{"type":"paragraph","text":"气，是我们成长的阳光和春"},{"type":"paragraph","text":"雨。您说学习张思德，咱干革命全心全意；您说学习白求恩，咱胸中装着无产阶级国际"},{"type":"paragraph","text":"主义；您说学习老愚公，天大的困难咱踩作泥。心红眼亮方向明，革命万里路不迷；反帝反修斗志强，永远革命扛红旗！"},{"type":"paragraph","text":"明灯一盏心中挂《毛泽东选集》手中拿，心明眼亮干劲大，毛主席和咱心贴心，伴咱一道守边卡。《毛泽东选集》手中拿，明灯一盏心中挂；胸怀世界受苦人，革命干劲比天大。明灯一盏心中挂，能辨毒草和香花；驱尽妖魔除鬼怪，人民江山如铁打。《毛泽东选集》手中拿，毛主席的教导牢记下，永作彻底革命派，誓把红旗全球插！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e630447a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
