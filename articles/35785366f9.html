ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对统战部召集人物安排工作会议请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对统战部召集人物安排工作会议"},{"type":"paragraph","text":"请示报告\"的批语"},{"type":"paragraph","text":"（1953年12月12日）"},{"type":"paragraph","text":"全国人民代表大会要明年九月才召集，安排会议太早了不好，以在明年春末夏初时为宜。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十二日"},{"type":"paragraph","text":"[1]指中共中央统战部1953年11月17日给刘少奇并报毛泽东、中央的请示报告。报告说，为了统盘研究中央及各省、市在实行人民代表大会制时安排民主人士的具体方案，拟于1954年1月间召集一次人物安排工作会议。会议内容包括：审查各省、市人民代表大会，政府委员会和统一战线组织中民主人士所占比例及具体的人事安排方案；拟议全国人民代表大会及第二届政协中民主人士的比例、名单及选出地区和单位的初步方案。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":12,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":472,"page_end":472},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35785366f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
