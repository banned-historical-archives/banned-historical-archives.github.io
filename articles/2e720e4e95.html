":"国家劳动总局关于农业中学教师工龄计算问题的复函","dates":[{"year":1981,"month":3,"day":25}],"is_range_date":false,"authors":["国家劳动总局","河北省劳动局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 321","tags":[{"name":"工龄","type":"主题/事件"},{"name":"教师","type":"主题/事件"}],"parts":[{"type":"title","text":"国家劳动总局关于农业中学教师工龄计算问题的复函"},{"type":"subtitle","text":"（一九八一年三月二十五日）"},{"type":"paragraph","text":"河北省劳动局："},{"type":"paragraph","text":"你局关于农业中学教师工龄计算问题的来函收悉。经与教育部计划司、国家人事局工资福利处研究后，同意你们所提的意见。即：一、公办教师的工龄，按有关规定执行；二、民办教师（包括长期顶编代课教师和职工，下同）转为（包括招收）公办教师后，其连续工龄从最后一次经组织批准任民办教师时算起。他们在两个以上学校任教，经过正当手续调动的，其任教时间可以合并计算为连续工龄。民办教师被招收、保送或推荐到各级师范学校学习毕业或结业后，仍继续从事教育工作的，其原任民办教师的时间，可以与继续从事教育工作的时间合并计算为连续工龄。"},{"type":"paragraph","text":"(摘自〔81〕劳险字5号文件)"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e720e4e95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
