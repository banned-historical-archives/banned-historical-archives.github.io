50,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朱桂芬，(女)十九岁，她十岁时，因为穷困，被家里卖给王美英为养女，名为养女，实同蓄婢，度着艰苦的岁月，到了十六岁，送到四马路会乐里为娼，从此堕落深渊，任人摧残，这种非人的生活，身体精神极度痛苦，偶然与一个客人感情融洽，认为从此可以跳出苦海，可是养母要她供养，百般刁难，不肯放手，她在没有办法中请求本会代为调解，脱离养母女关系，恢复自由，在双方调解时严格教育了王美英解释她这种压迫剥削意识是犯罪的，本来王美英还坚持不肯答应，经过说明人民政府的法令是不再允许败坏颓废的风气继续在新社会中存在了，她才承认了自己的错误，但是竟仍然自顾每月津贴王美英一石食米，因为她没有认清王美英过去的生活享受，是建筑在使别人痛苦的基础上，她是阶级社会里单纯不劳而获的剥削者；假使朱桂芬在解放后仍按月补助养母的生活费用，就等于助长社会上剥削意识，经向王美英教育说服后，纠正她错误思想，才无条件脱离关系。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b69538fd5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
