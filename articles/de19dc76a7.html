script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠批“四人帮”反革命的修正主义路线","authors":["中共山西省平顺县委员会"],"dates":[{"year":1976,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"狠批“四人帮”反革命的修正主义路线"},{"type":"paragraph","text":"中共山西省平顺县委员会"},{"type":"paragraph","text":"华国锋同志任中共中央主席、中央军委主席和以华国锋主席为首的党中央，一举粉碎王洪文、张春桥、江青、姚文元反党集团的喜讯传来，我们全县人民欢欣鼓舞，拍手称快。大家欢呼我们党又有了自己的领袖，我们的革命事业又有了可靠的掌舵人！大家决心最紧密地团结在以华国锋主席为首的党中央周围，一切听从党中央的指挥，同“四人帮”反党集团作坚决的斗争，誓把毛主席开创的无产阶级革命事业进行到底。"},{"type":"paragraph","text":"伟大领袖和导师毛主席教导我们：“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计。”“四人帮”违背毛主席提出的这三项基本原则，搞修正主义，搞分裂，搞阴谋诡计，是党内资产阶级的典型代表，是不肯改悔的正在走的走资派。在政治上，他们集中代表被打倒的地主资产阶级的利益，妄图篡党夺权，颠覆无产阶级专政，复辟资本主义。在思想上，他们大搞唯心主义、形而上学。在手法上，他们打着红旗反红旗，大耍反革命两面派。他们手中无真理，周围无群众，只好靠舞文弄墨，招摇撞骗，靠打棍子、扣帽子来过日子。他们任意扩大资产阶级法权，大肆侵吞、挥霍人民的财富，是一群吸劳动人民血的资产阶级分子。贫下中农气愤地说，“四人帮”反党集团，打着共产党员的招牌，干着反革命的勾当。他们是一帮野心勃勃的豺狼，是钻进革命阵营中的“蛀虫”，是工人阶级和贫下中农的死对头。如果让这帮家伙篡夺了党和国家的最高领导权，我们的党就要变修，国家就要变色，广大劳动人民就要重新当牛做马，吃苦受罪。我们要彻底揭露“四人帮”反党集团的罪行，深入批判他们反革命的修正主义路线，肃清其流毒。"},{"type":"paragraph","text":"粉碎“四人帮”，使我们的党变得更加纯洁，更加朝气蓬勃，更加富有战斗力。我们信心百倍，斗志昂扬，决心在以华国锋主席为首的党中央领导下，继承毛主席的遗志，刻苦学习马列著作和毛主席著作，坚持“三要三不要”的三项基本原则，坚持反修防修，坚持抓革命，促生产，深入开展农业学大寨运动，努力把各项工作做好，保证我们的社会主义红色江山千秋万代永不变色。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de19dc76a7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
