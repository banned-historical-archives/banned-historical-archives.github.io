script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对资产阶级教育制度　反对佐藤政府的反动统治日本进步学生不畏强暴坚持斗争","authors":[],"dates":[{"year":1969,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京八日电　据东方通讯社报道:日本许多大学的进步学生，面对着日本反动政府的武装警察的法西斯镇压，毫无畏惧，坚持，斗争，反对腐朽的资产阶级教育制度，反对佐藤政府的反动统治。"},{"type":"paragraph","text":"九州长崎大学的进步学生，自从两个月前占领和封锁了大学校部和学生会馆以来，一直坚持斗争，多次和前来镇压的武装警察进行搏斗，高呼“警察，滚出去!”"},{"type":"paragraph","text":"在东京大学进步学生英勇斗争的精神鼓舞下，关西学院的学生，从一月二十六日起用路障封锁了校部大楼和七个系的许多建筑物。他们在墙上贴着毛主席语录，用来鼓舞斗志。他们严正地提出了许多合理要求。他们的要求不但没有得到反动当局的答复，反而遭到了一千多名武装警察的镇压。一千五百多名进步学生，从六日起不断举行集会和游行，抗议警察的暴行。他们挥动木棍，同警察进行激烈搏斗。"},{"type":"paragraph","text":"东京水产学院的学生，早已开展了反对学校当局实行封建统治的斗争，要求给予学生自治的权利。由于反动当局顽固地拒绝学生的要求，学生们在四日举行全校学生会议，开始举行罢课。"},{"type":"paragraph","text":"东京多摩美艺学院等学校的学生，最近以来也举行罢课斗争，坚决反对资产阶级教育制度，反对佐藤反动政府的法西斯统治。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"323f4824fc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
