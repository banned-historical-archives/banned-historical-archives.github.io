s":[{"year":1969,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京三十一日电　库拉索岛威廉城消息:加勒比海荷属殖民地库拉索岛首府威廉城三十日爆发了工人群众反抗剥削和压迫的激烈斗争。为荷兰殖民军警的疯狂镇压所激怒的示威群众，同反动军警展开激烈战斗，并放火焚烧市中心商业区，使殖民当局极为恐慌。"},{"type":"paragraph","text":"英荷壳牌石油公司承包工程的一家建筑公司的工人，首先在二十七日为要求增加工资而举行罢工。接着，英荷壳牌石油公司炼油厂的几千名工人在二十九日夜举行二十四小时声援罢工。三十日上午，五千名炼油厂工人和建筑公司工人一起向威廉城市中心进军，举行抗议示威。殖民当局的警察对示威者进行残暴镇压，开枪打伤了好几个工人。"},{"type":"paragraph","text":"示威群众同警察进行了英勇的战斗，他们冲破重重阻碍，强行进入市中心。愤怒的群众放火焚烧了商店和街上的汽车。威廉城浓烟四起，殖民帝国主义者所经营的大商店到处在起火燃烧。城内两条主要大街的房屋几乎全部烧光。三十日晚，威廉城与外界的电话与电讯联系中断，威廉城与近邻委内瑞拉首都加拉加斯之间的空运联系也断绝。"},{"type":"paragraph","text":"惊慌失措的荷兰殖民当局鉴于警察已不能控制局势，慌忙下令常驻岛上的三百五十名海军陆战队开进威廉城镇压示威群众。同时，殖民当局宣布夜间实行戒严。尽管这样，群众斗争并没有平息。三十日晚间，愤怒的群众继续在城里开展斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9b4d62765"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
