script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji17","name":"毛泽东全集第17卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给在华日本共产主义同盟的一封信","alias":"","parts":[{"type":"paragraph","text":"给在华日本共产主义同盟的一封信"},{"type":"paragraph","text":"（1942年6月25日）林哲同志："},{"type":"paragraph","text":"今天看了在华日本共产主义同盟创立的消息，非常高兴。我跟同盟诸同志的心是完全一致的，同盟给我的信，我十分感谢！现在华北日本士兵代表大会又快开了，我谨以至诚祝大会的成功。正如大山同志说：“在华北的几十万日本兄弟必能响应大会的号召，起来反对日本法西斯侵略者，与中国人民一道为打倒共同敌人而斗争。”所有同盟及大会的革命活动，都是在你领导之下的，中国共产党完全同意你及一切日本革命同志的革命活动，我们将尽一切可能援助你们，请以此意告诉同盟诸同志。敬致"},{"type":"paragraph","text":"中日两国人民团结奋斗的敬礼！"},{"type":"paragraph","text":"毛泽东一九四二年六月二十五日"},{"type":"paragraph","text":"年毛泽东致林哲信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":6,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":90},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3374a13f62"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
