" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"新疆维吾尔自治区司法界揭发杨腾高的反动言行","authors":["新华社"],"dates":[{"year":1957,"month":8,"day":23}],"is_range_date":false,"parts":[{"text":"新疆维吾尔自治区司法界揭发杨腾高的反动言行","type":"title"},{"text":"新华社","type":"authors"},{"text":"新疆维吾尔自治区高级人民法院、司法厅和律师协会筹备处最近揭发右派分子杨腾高的反党言行。","type":"paragraph"},{"text":"杨腾高是乌鲁木齐市法律顾问处的学习律师，在法厅上，公开袒护犯罪分子。在“鸣”“放”期间，他竟在劳改犯中煽动刑满留场人员去中央控告。今年７月，一个刑满的劳改犯向他诉说自己的“委屈”时，他又唆使这个人“向上级控告”。","type":"paragraph"},{"text":"杨腾高还十分露骨地污蔑司法界，说“宗派主义最严重的莫过于司法界”。","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月23日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c7b75087e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
