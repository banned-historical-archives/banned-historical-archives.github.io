art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“你们是毛主席教育出来的好兄弟”","authors":[],"parts":[{"type":"paragraph","text":"中国医疗队在阿尔及利亚工作期间，勤勤恳恳地为阿尔及利亚人民服务，博得了当地人民的衷心爱戴。阿尔及利亚人民亲眼看到过去殖民主义国家的医生是怎样对待他们的，现在那些资本主义国家、修正主义国家医生又是怎样对待他们的，和中国医疗队一对比，他们就非常清楚：谁对他们真心诚意，谁对他们口是心非，别有用心。正象一位阿尔及利亚朋友讲的：“你们和别国医生不同，他们要的是舒适的住房、电冰箱、家具，而你们只是要工作、工作。”另一位阿尔及利亚青年同我们说：“起先我真有些奇怪，你们为什么选中这么一个穷地方来工作？为什么你们不但来了，还住下来了，勤恳地工作着，一点也没有医生架子？现在我明白了，你们是社会主义中国新型的医生，是毛主席教育出来的好兄弟。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61c4a34efe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
