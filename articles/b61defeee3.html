<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"农民协会组织通则","authors":[],"dates":[{"year":1950,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"农民协会组织通则","type":"title"},{"text":"（一九五○年七月十四日政务院第四十一次政务会议通过）","type":"subtitle"},{"text":"第一章  总则","type":"subtitle"},{"text":"第一条  农民协会是农民自愿结合的群众组织。","type":"paragraph"},{"text":"第二条  农民协会的任务是：","type":"paragraph"},{"text":"（甲）团结雇农、贫农、中农及农村中一切反封建的分子，遵照人民政府的政策法令，有步骤地实行反封建的社会改革，保护农民利益。","type":"paragraph"},{"text":"（乙）组织农民生产，举办农村合作社，发展农业和副业，改善农民生活。","type":"paragraph"},{"text":"（丙）保障农民的政治权利，提高农民的政治和文化水平，参加人民民主政权的建设工作。","type":"paragraph"},{"text":"第三条  根据中华人民共和国土地改革法，农民协会是农村中改革土地制度的合法执行机关。","type":"paragraph"},{"text":"第二章  会员","type":"subtitle"},{"text":"第四条  凡雇农、贫农、中农、农村手工业工人及农村中贫苦的革命知识分子，自愿入会者，得乡农民协会委员会批准后，即可成为农民协会会员。凡被派到农村中从事农民运动的工作人员均得加入农民协会，加入时，须取得当地农民大会或农民代表大会通过。","type":"paragraph"},{"text":"在土地改革完成后，富农要求入会者，经乡农民大会或乡农民代表大会通过后，亦得成为农民协会会员。","type":"paragraph"},{"text":"第五条  农民协会会员的权利如下：","type":"paragraph"},{"text":"（甲）在农民协会内，有发言权，表决权，选举权，被选举权；并有建议撤换农民协会工作人员的权利。","type":"paragraph"},{"text":"（乙）有取得农民协会各项合法利益并取得农民协会合法保护的权利。","type":"paragraph"},{"text":"（丙）有享受农民协会所举办的文化、教育及经济事业的优先权。","type":"paragraph"},{"text":"第六条  农民协会会员的义务如下：","type":"paragraph"},{"text":"（甲）遵守会章。","type":"paragraph"},{"text":"（乙）服从组织。","type":"paragraph"},{"text":"（丙）执行决议。","type":"paragraph"},{"text":"（丁）缴纳会费。","type":"paragraph"},{"text":"第三章  组织","type":"subtitle"},{"text":"第七条  农民协会的基层组织是乡（或相当于乡的行政村）农民协会。乡以上，组织区农民协会，县农民协会，专区的农民协会及省（行政区）农民协会。","type":"paragraph"},{"text":"市得设市郊农民协会，统一领导该市所辖郊区的区、乡农民协会。","type":"paragraph"},{"text":"大行政区得视情况需要，由有关各省农民协会会同商定，召开大行政区农民代表大会，成立大行政区农民协会。","type":"paragraph"},{"text":"第八条  农民协会的组织原则是民主集中制：少数服从多数，下级服从上级，会员服从组织。","type":"paragraph"},{"text":"第九条  各级农民协会行使权利的机关是各级农民代表大会，其职权是根据政府法令和上级农民协会指示及当地农民要求，决定农民运动的方针和计划，审查农民协会委员会的工作报告，选举农民协会委员会。","type":"paragraph"},{"text":"第十条  各级农民代表大会代表的产生方法如下：","type":"paragraph"},{"text":"乡农民代表大会的代表，由全乡农民直接选举之。没有加入农民协会的农民，经乡农民协会委员会之批准，亦得参加选举。县和区农民代表大会的代表，由乡农民大会或乡农民代表大会选举之。省和专区农民代表大会的代表，由县农民代表大会选举之。","type":"paragraph"},{"text":"各级农民代表大会的代表名额，由各级农民协会委员会根据具体情况拟定，提请上级农民协会批准之。","type":"paragraph"},{"text":"第十一条  各级农民代表大会的会期由各省农民协会章程规定之。","type":"paragraph"},{"text":"第十二条  在农民代表大会闭会期间，农民协会委员会是农民协会行使权力的机关。各级农民协会委员会由各级农民代表大会选举委员及候补委员若干人组成之，由委员互推主席一人，副主席一人至数人。主持会务，在委员会下得设若干部门，分工办事。","type":"paragraph"},{"text":"第十三条  各级农民协会委员会委员的任期由各省农民协会章程规定之。","type":"paragraph"},{"text":"第十四条  在农民协会尚未成立的地区，得由当地人民政府召开临时农民代表会议，选举委员若干人，组成农民协会筹备会，执行农民协会委员会的任务，并具有与农民协会委员会同等的职权。在正式召开农民代表大会选出农民协会委员会后，筹备会的任务即告结束。","type":"paragraph"},{"text":"第十五条  各级农民代表大会和农民协会委员会对于违犯农民协会章程和纪律者，得按照具体情况给以处分。对会员个人的处分是劝告、警告、撤消工作以至开除会籍。对整个组织的处分是指责，部份改组其领导机关，撤消其领导机关并指定临时的领导机关，以至解散整个组织并派人重新组织。","type":"paragraph"},{"text":"第十六条  各级农民协会委员会认为必要时得召集农民协会代表会议。","type":"paragraph"},{"text":"第四章  经费","type":"subtitle"},{"text":"第十七条  农民协会经费的来源，是会员的会费和人民政府的补助。","type":"paragraph"},{"text":"农民协会会员每人每年缴纳会费一斤米。","type":"paragraph"},{"text":"农民协会需用的房屋和设备由人民政府拨给之。在利用邮政、电报、电话、铁路、公路、航运等方面，农民协会享有与同级人民政府机关所享受的同等待遇。","type":"paragraph"},{"text":"第十八条  农民协会的经费收支，应定期向农民代表大会报告，经代表大会审核批准后，向农民公布。","type":"paragraph"},{"text":"第五章  附则","type":"subtitle"},{"text":"第十九条  各省农民协会应根据本通则制定各该省农民协会统一的章程，经省农民代表大会通过后，公布施行。在本通则公布前已制定农民协会章程者，如有与本通则抵触之处，应根据本通则加以修正。","type":"paragraph"},{"text":"第二十条  本通则经中央人民政府政务院政务会议通过后公布施行。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b61defeee3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
