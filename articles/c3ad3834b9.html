art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广泛开展“三大讲” 深入揭批“四人帮”","authors":[],"parts":[{"type":"paragraph","text":"最近，中共南宁市委召开了广泛开展“三大讲”，深入揭批“四人帮”经验交流会。各级党组织负责人、市委派出的基本路线教育工作队共一千五百多人参加了会议。"},{"type":"paragraph","text":"在贯彻落实全国工业学大庆会议精神的热潮中，南宁市委把有关“三大讲”的材料印发到基层，并在市委抓的工交、基建、财贸战线的十五个点先走一步。市委有九个常委分别到南宁罐头食品厂、南宁化工厂、南宁手扶拖拉机厂、南宁市铸造厂、灭资煤矿等五个单位，发动群众开展“三大讲”活动。接着，市委先后两次在南宁化工厂召开现场会，推广南化开展“三大讲”的经验。全市从机关到基层，普遍开展了“三大讲”活动，使揭批“四人帮”斗争的烈火越烧越旺。"},{"type":"paragraph","text":"在经验交流会上，市委领导同志带头作了发言。南宁罐头食品厂、南宁化工厂等单位，分别介绍了他们开展“三大讲”的经验。这些经验归纳起来有以下几点：（一）抓好思想发动，提高认识，是开展“三大讲”的关键。（二）领导带头，人人上阵，是搞好“三大讲”的重要保证。"},{"type":"paragraph","text":"（三）抓好典型，以点带面，是推动群众性“三大讲”活动的有效措施。（四）形式多样，生动活泼。南宁罐头食品厂二车间在开展“三大讲”中，采用了回忆控诉、回顾总结、对比算帐等方法讲，使“三大讲”生动活泼，由浅入深，由点滴到系统，收到了很好的教育效果。（五）联系实际，肃清流毒。这些单位在开展“三大讲”中，紧紧抓住“四人帮”反革命的修正主义路线对本单位危害最大、流毒最深的问题反复讲，使大家分清了路线是非，深受教育。（据《广西日报》）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3ad3834b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
