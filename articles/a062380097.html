ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"我们在抗战过程中的总方针","alias":"","parts":[{"type":"paragraph","text":"我们在抗战过程中的总方针]"},{"type":"paragraph","text":"（1938年8月6日）陈、周、博、凯、叶："},{"type":"paragraph","text":"保卫武汉，重在发动民众，军事则重在袭击敌人之侧后，迟滞敌进，争取时间，务须避免不利的决战，至事实上不可守时，不惜断然放弃之。因目前许多军队的战斗力远不如前，若再损失过大，将增加各将领对蒋?之不满，投降派与割据派起而乘之，有影响蒋的地位及继续抗战之虞。在抗战过程中巩固蒋之地位，坚持抗战，坚决打击投降派，应是我们的总方针。而军队力量之保存，是执行此方针之基础。请加注意为盼。"},{"type":"paragraph","text":"洛陈康王胡毛"},{"type":"paragraph","text":"鱼"},{"type":"paragraph","text":"[1]这是毛泽东和中共中央书记处书记洛甫（张闻天）、陈云、康生，中共中央军委副主席王稼祥、胡服（刘少奇）给中共中央长江局领导人陈绍禹（王明）、周恩来、博古（秦邦宪）、凯丰（何克全）、叶剑英的电报。"},{"type":"paragraph","text":"[2]蒋，指蒋介石。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":8,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":418,"page_end":418},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a062380097"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
