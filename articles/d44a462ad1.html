<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"什么是修正主义、新伯恩斯坦主义?","authors":["高松"],"dates":[{"year":1958,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"所谓修正主义，是指修改马克思主义的社会改良主义而言。远在十九世纪末叶，德国社会民主党人伯恩斯坦公开提出“修改”马克思主义的基本原理。他首先提出“修改”马克思主义哲学基础，企图用庸俗的进化论来代替革命的唯物辩证法。由这里出发，否认资产阶级同无产阶级的根本矛盾，要求抛弃工人阶级的革命斗争；反对无产阶级专政，力图取消马克思主义革命实质，使它变成为改良主义的学说。他们 主张“由资本主义和平长入社会主义”，主张把革命的主要斗争形式和重点放在议会上，使工人运动限制于改良主义范围。这就是“修正主义”的由来。当马克思列宁主义思想体系已经在世界范围内取得伟大胜利、右翼社会党的修正主义在工人阶级和劳动群众中的麻痹作用日益减弱的时候，新的修正主义者，继承了伯恩斯坦的衣钵，对已为实践证明了的、伟大正确的马克思列宁主义的基本理论和观点进行诽谤和修改。这就是现代修正主义，即新伯恩斯坦主义。"},{"type":"paragraph","text":"修正主义者们，不论是伯恩斯坦主义还是现代修正主义，都是与马克思列宁主义相违背的。由于马克思列宁主义的不断胜利和发展，因此，修正主义者们也换上了一套马克思主义的衣衫，来与马克思主义对抗。正如毛主席在“关于正确处理人民内部矛盾的问题”中所说的“修正主义者，右倾机会主义者，口头上也挂着马克思主义，但是他们所攻击的正是马克思主义最根本的东西”。这就是一切修正主义的本质。"},{"type":"paragraph","text":"修正主义的共同特点和目的在于:分裂国际共产主义运动，破坏社会主义国家团结，否认无产阶级专政的历史必要性，否认马克思列宁主义政党的领导作用，否认无产阶级国际主义原则，并力图腐蚀马克思主义的革命灵魂，破坏劳动人民对社会主义的信心，而保存或恢复资本主义制度。因此，我们说，所有修正主义者，都是资产阶级意识形态的反映和表现。在目前，南共纲领草案便是一个反马克思列宁主义的、彻头彻尾的修正主义纲领。这个纲领草案的内容更清楚的表明了现代修正主义的嘴脸。"},{"type":"paragraph","text":"马克思列宁主义是同一切修正主义、右倾机会主义进行斗争而发展和壮大起来的，因此对现代修正主义也必然要进行不调和的斗争。这个斗争的重要性，正如人民日报社论所指出的:“这是马克思列宁主义和反马克思列宁主义的两条根本不同路线的斗争，这是关系国际工人阶级事业和社会主义事业一场成败的大斗争”。"},{"type":"paragraph","text":"高松答"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d44a462ad1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
