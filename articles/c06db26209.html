:[],"dates":[{"year":1967,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卡鲁姆副总统号召坦桑尼亚青年"},{"type":"paragraph","text":"向毛泽东思想哺育的中国专家学习"},{"type":"paragraph","text":"据新华社桑给巴尔电　坦桑尼亚第一副总统卡鲁姆十六日在这里的国家宫接见了一批中国水源勘查专家和水稻种植专家。"},{"type":"paragraph","text":"卡鲁姆在接见时热烈赞扬毛泽东思想哺育的中国专家。他说：“中国水源勘查专家辛勤地工作，克服了种种困难，完成了艰巨的任务。他们帮助桑给巴尔人民成功地解决了缺水的问题。他们还把技术知识传授给桑给巴尔人民，使得桑给巴尔人民在中国专家离开之后能够继续进行水源勘查工作。我们永远不会忘记中国专家所作的努力。”"},{"type":"paragraph","text":"他强调说：“坦桑尼亚政府以坦中两国政府之间的团结和合作而感到自豪。我们感谢毛泽东主席和中国政府的援助。我们相信两国之间的团结和合作将会得到进一步加强。”"},{"type":"paragraph","text":"据新华社桑给巴尔二十一日电　坦桑尼亚第一副总统卡鲁姆二十日在桑给巴尔城以北的马楚伊举行的拖拉机手训练班开学仪式上发表讲话时，号召桑给巴尔青年向毛泽东思想哺育的中国专家学习，更好地为桑给巴尔人民服务。卡鲁姆说：“我们感谢中国政府派遣中国专家来培训桑给巴尔农民驾驶拖拉机。”他号召训练班学员“努力向中国专家学习技术知识和品质，更好地为桑给巴尔人民服务。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c06db26209"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
