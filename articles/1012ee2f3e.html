tes":[{"year":1980,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月十五日电　刘少奇同志治丧委员会公告为深切悼念故中共中央副主席、中华人民共和国主席刘少奇同志，定于:一九八○年五月十七日在北京举行追悼大会。同日首都天安门，新华门，外交部，中央、国家机关，我国驻外使领馆和其它驻外机构，北京市和其它省、市、自治区政府所在地的机关、部队、企业事业、学校等单位，下半旗志哀，停止娱乐活动一天。"},{"type":"paragraph","text":"按照我国的惯例，决定不邀请外国的政府、政党和友好人士派代表团或代表参加悼念活动。"},{"type":"paragraph","text":"特此公告。"},{"type":"paragraph","text":"一九八○年五月十五日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1012ee2f3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
