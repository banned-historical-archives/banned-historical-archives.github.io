录）","authors":[],"dates":[{"year":1950,"month":10,"day":19}],"is_range_date":false,"parts":[{"text":"罗瑞卿在公安高干会上的总结报告（节录）","type":"title"},{"text":"这个会议就要结束了，在讨论中大家一致认为中央镇压反革命活动的指示很好，很及时，很切合时宜，根据当前形势需要，给我们工作上以很大支持。少奇同志的讲话又将中央指示的根据与方针，给我们以全面的深刻的指示，在会议上同志们提出许多宝贵意见，有些问题我已经讲过了，所以这个总结要谈的就不多了，仅就某些具体问题，再提一些意见。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"三、会门问题。会门是大量性普遍性的东西，这是想要同我们作斗争的最大的反革命组织，东北已打垮，华北已取缔，但潜伏势力仍然存在，一遇机会，即可再起，这个问题我不想多说，一律依照少奇同志指示办理，对会道门进行正面进攻。老区条件已成熟，即可开始进行，新区条件不同，暂不要慌，可先搞头子。","type":"paragraph"},{"text":"……","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8fe659cd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
