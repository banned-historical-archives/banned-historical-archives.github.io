ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"对中央关于进一步展开对资本主义工商业的改造工作的指示草案的修改","alias":"","parts":[{"type":"paragraph","text":"对中央关于进一步展开对资本主义工商业的改造工作的"},{"type":"paragraph","text":"指示草案的修改!"},{"type":"paragraph","text":"（1955年11月）"},{"type":"paragraph","text":"为了进一步展开对于资本主义工商业的社会主义改造工作，必须在私营工商业者中间培养出一批核心分子。每个大城市应当有几百个这样的核心分子，每个中小城市也要有几十个或者几个这样的核心分子。这些核心分子由于接受党的教育，提高了他们的政治觉悟，逐步地解决了下决心走社会主义道路的问题，因此他们逐步地不怕共产了，能够团结在党的周围，向私营工商业者进行宣传和组织的工作。党委应当经过党委负责人、政府工作人员、统一战线部门的工作人员和经济机关的工作人员，经常教育这些核心分子，关心和指导他们的工作，切实解决他们的疑难问题和困难，经过他们去团结私营工商业者。"},{"type":"paragraph","text":"[1]文中用宋体字排印的是毛泽东加写和改写的文字。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":88},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"decf9d1bdd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
