ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"程子华黄志勇部立即向南口怀来前进","alias":"","parts":[{"type":"paragraph","text":"程子华黄志勇部立即向南口怀来前进"},{"type":"paragraph","text":"（1948年12月2日）程、黄，杨、罗、耿，杨、李："},{"type":"paragraph","text":"（一）程黄东十八时电悉。三十五军既已西进，程黄应立即出动，取直径向南口、怀来前进，协同杨罗耿、杨李歼灭傅军。（二）杨罗耿应照程黄电直出涿鹿。（三）杨李应照程黄电包围张家口之敌，并阻止敌退张北。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二日四时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军第二兵团司令员程子华和参谋长黄志勇等的电报。"},{"type":"paragraph","text":"[2]杨、罗、耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。杨、李，指杨成武、李天焕，当时分别任华北军区第三兵团司令员和副政治委员兼政治部主任。"},{"type":"paragraph","text":"[3]南口，镇名，位于北京市昌平县西部。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":317,"page_end":317},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"167385bd08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
