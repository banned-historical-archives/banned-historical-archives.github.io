art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"种好地多打粮狠狠回击苏修恶豺狼","authors":["北京海淀区永丰公社革委会驻永丰公社某部毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"我们永丰公社贫下中农和支农战士，听到苏修叛徒集团继三月二日对我国进行武装挑衅之后，最近又连续组织猖狂的反华挑衅的消息，仇恨的烈火燃烧在胸膛。我们强烈抗议苏修社会帝国主义的滔天罪行。"},{"type":"paragraph","text":"毛主席教导我们：“一切反动派都是纸老虎。”苏修叛徒集团对我国接连不断的严重挑衅，是他们多次猖狂反华遭到惨败后所进行的拚命挣扎，是他们为了转移国内人民对其资产阶级法西斯统治的不满和反抗，为了讨好他们的美国主子采取的丧心病狂的行动。"},{"type":"paragraph","text":"苏修叛徒集团全面复辟资本主义，把苏联人民几十年流血牺牲、艰苦奋斗取得的社会主义成果，断送得一精二光。就拿农业方面来说，苏修在农村大搞“利润挂帅”、“物质刺激”，极力发展资本主义自由竞争和富农经济，使苏联的农业生产力遭到严重破坏，农业不断减产，粮食年年欠收，广大农民又吃二遍苦，受二茬罪。我们贫下中农和支农战士相信，苏联的广大农民同苏联的工人阶级一样，绝不会容忍苏修叛徒集团这样倒行逆施。我们一定要和伟大的苏联人民团结在一起，共同打倒这伙苏修叛徒。"},{"type":"paragraph","text":"毛主席教导我们：“抓革命，促生产”。连日来，广大贫下中农和支农战士把对苏修的仇恨化为力量，决心以抓革命、促生产的实际行动狠狠打击苏修豺狼。老贫农韩周代不识字，就叫女儿把毛主席的语录一字一句地读给她听。她说：“我虽然不能上前线打敌人，但是我还能参加劳动。种好田，多打粮，就是表达我对毛主席的一份忠心，也是对子弟兵的支援，对苏联人民的支持，对苏修叛徒的打击。”广大贫下中农以革命统帅生产，用高昂的革命热情，掀起春耕生产新高潮。他们冒着风雪严寒，积肥运粪，加强田间管理，展开了夺取一九六九年农业生产更大丰收的战斗。我们遵照毛主席的“在订计划的时候，必须发动群众，注意留有充分的余地”的最新指示，订出了今年农业大发展的计划，决定把粮食产量由去年的一千三百多万斤，增长到一千五百多万斤。贫下中农说：“我们一定要突出毛泽东思想，突出无产阶级政治，充分发挥人的因素，以改天换地的英雄气概，超额完成计划，用多打粮的实际行动回击苏修的猖狂挑衅。”"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aece6d02d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
