ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对国务院城市建设总局揭发出冒牌工程师的情况简报的批语和对中央批语稿的修改","alias":"","parts":[{"type":"paragraph","text":"对国务院城市建设总局揭发出冒牌工程师的情况简报的批语和"},{"type":"paragraph","text":"对中央批语稿的修改"},{"type":"paragraph","text":"（1955年8月12日、13日）定一同志："},{"type":"paragraph","text":"此件可转。请查告城市建设总局属何机关管辖，是否直属国务院？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十二日"},{"type":"paragraph","text":"[1]指中央十人小组办公室1955年8月10日关于国务院城市建设总局城市设计院揭发出冒牌工程师多人的情况简报。简报说，在肃反运动中，城市设计院经过群众检举和查历史，发现有不少是混进来的冒牌工程师，其中隐藏了反革命分子和坏分子。这些人技术低劣，政治历史情况复杂。他们通过伪造历史、学历，夸张吹嘘个人本领等手段，混入技术部门。而我们有些单位由于基本建设任务繁重，急需技术人员，到处搜罗，更不管真假，一概收录，听说是大学、专科毕业，便给个工程师职位，这就给这些冒牌工程师的混入开了方便之门。1955年8月12日，陆定一向毛泽东建议转发上述简报。对国务院城市建设总局揭发出冒牌工程师的情况简报的批语和对中央批语稿的修改"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"对高级知识分子一味照顾，即令有严重问题也不去触动他们的想法是错误的。正确的方针是：坚决保护一切好人；而对真正的反革命分子和其他坏分子则必须发动群众认真清查出来，并作适当的处理。川"},{"type":"paragraph","text":"[1]这是毛泽东在中央1955年8月13日转发中央十人小组关于城市建设总局城市设计院揭发出冒牌工程师的情况简报的批语稿中修改的一段话，文中用宋体字排印的是毛泽东加写和改写的文字。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":8,"day":12},{"year":1955,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":291,"page_end":292},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1d551001c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
