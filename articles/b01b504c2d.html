ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"毛泽东等祝贺蒙古人民革命胜利三十四周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺蒙古人民革命胜利"},{"type":"paragraph","text":"三十四周年的电报"},{"type":"paragraph","text":"（1955年7月9日）蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志，蒙古人民共和国总理尤·泽登巴尔同志，蒙古人民共和国代理外交部长斯·拉布丹同志："},{"type":"paragraph","text":"值此蒙古人民革命胜利三十四周年之际，谨代表中华人民共和国政府和人民向蒙古人民共和国政府和人民致衷心的祝贺。"},{"type":"paragraph","text":"中华人民共和国政府和人民以兴奋的心情注视着蒙古人民共和国三十四年来在向着社会主义前进的建设事业中所获得的光辉成就。祝蒙古人民在久经考验的蒙古人民革命党领导下，在胜利地实现第二个发展国民经济及文化的五年计划和保卫世界和平的斗争中获得更大的胜利。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来"},{"type":"paragraph","text":"一九五五年七月九日于北京"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":7,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b01b504c2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
