机关四万职员罢工使这些机关工作全部陷于停顿","authors":[],"dates":[{"year":1970,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削和压迫"},{"type":"paragraph","text":"意大利九万交通运输工人再次罢工"},{"type":"paragraph","text":"一些政府部门和地方机关四万职员罢工使这些机关工作全部陷于停顿"},{"type":"paragraph","text":"新华社八日讯　罗马消息：意大利工人和政府部门的职工连日来不断举行罢工斗争，反对意大利垄断资本的残酷剥削和压迫，要求增加工资。"},{"type":"paragraph","text":"意大利全国各大城市的九万名交通运输工人，在一月七日再次举行罢工。这是交通运输工人在最近三周内的第五次全国性罢工，使各大城市的交通再次陷入瘫痪状态。"},{"type":"paragraph","text":"罗马和其他大城市的煤气工人，在一月七日也举行了二十四小时的罢工。"},{"type":"paragraph","text":"意大利一些政府部门和地方机关（包括海关和税务局）的四万名职员，五日开始举行总罢工，使这些机关工作全部陷于停顿。这些职员自一九六九年十一月以来一直在轮番地举行罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afb8ce76be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
