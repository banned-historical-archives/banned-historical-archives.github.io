s":[{"year":1967,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保卫无产阶级文化大革命的新胜利"},{"type":"paragraph","text":"本报评论员"},{"type":"paragraph","text":"英雄的空军部队，十三日下午在华东地区，击落了一架美制蒋机。这是保卫无产阶级文化大革命的新胜利，是战无不胜的毛泽东思想的新胜利！"},{"type":"paragraph","text":"目前，广大革命群众正在联合起来，高举以毛主席为代表的无产阶级革命路线的大旗，向资产阶级反动路线发起总攻击。空军部队的这一胜利，大长了革命人民的志气，大灭了阶级敌人的威风。广大革命群众在这一胜利的鼓舞下，必将十倍、百倍地给一小撮党内走资本主义道路的当权派，给极少数坚持资产阶级反动路线的顽固分子以狠狠地打击，争取无产阶级文化大革命全面的彻底的胜利。"},{"type":"paragraph","text":"我国的文化大革命，是在无产阶级专政的条件下进行的。中国人民解放军是无产阶级专政的强大支柱，是无产阶级文化大革命的忠实保卫者。有这样一支革命的人民的军队，我们取得文化大革命的胜利就有了可靠的保障。我们向英勇地保卫文化大革命的人民解放军致以崇高的敬意！"},{"type":"paragraph","text":"社会主义时期的阶级斗争，是长期的、尖锐的、复杂的。资产阶级及其代理人总是要从政治上、经济上、文化上向无产阶级进攻。美帝国主义及其走狗，也总是要伺机捣乱。广大革命群众和人民解放军，一定要提高警惕，从各个方面打退敌人的进攻。"},{"type":"paragraph","text":"敌人来捣乱，就叫它灭亡！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59513af779"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
