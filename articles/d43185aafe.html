art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席革命路线胜利前进——纪念中国共产党诞生五十一周年","authors":["董方民高一鸣陶森元"],"parts":[{"type":"paragraph","text":"南京部队某部党委抓紧思想和政治路线教育，把学习党内两条路线斗争历史和现实阶级斗争紧密结合起来，提高指战员的阶级斗争和路线斗争觉悟。这是他们组织干部战士到党的“一大”南湖会址参观。 董方民摄"},{"type":"paragraph","text":"海军某部洛阳舰党支部经常组织干部战士学习伟大领袖毛主席一九五三年视察该舰时的亲切教导，进行思想和政治路线方面的教育。指战员们决心永远沿着毛主席的革命路线前进。 高一鸣摄"},{"type":"paragraph","text":"福州部队某部党委认真读马、列的书，读毛主席的书，自觉按照“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”三个基本原则加强党委建设。这是党委成员在征求基层党支部对改进党委工作的意见。 陶森元摄"},{"type":"paragraph","text":"空军某部飞行大队党委，组织指战员以马列主义、毛泽东思想为武器，深入批判刘少奇一类骗子推行的资产阶级军事路线，不断提高执行毛主席建军路线的自觉性。 新华社稿"},{"type":"paragraph","text":"五九一七部队九连党支部组织干部战士认真看书学习，自觉按照毛主席建军路线搞好连队建设。这是干部战士在学习毛主席的光辉著作《关于纠正党内的错误思想》。 周凤仪摄"},{"type":"paragraph","text":"广州部队某部四连党支部经常组织干部战士学唱《国际歌》和《三大纪律八项注意》，进一步提高无产阶级国际主义觉悟，加强革命纪律性，团结起来，争取更大的胜利。 本报记者摄"},{"type":"paragraph","text":"武汉部队某部党委成员王英洲，遵照毛主席关于理论联系实际的教导，坚持唯物主义的反映论，反对唯心主义的先验论，经常深入部队搞调查，不断改进领导方法。这是他在行军途中向战士作调查。 邓伟摄（照片）"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d43185aafe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
