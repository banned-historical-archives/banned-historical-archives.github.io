ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"对傅连障来信的批语","alias":"","parts":[{"type":"paragraph","text":"对傅连障来信的批语"},{"type":"paragraph","text":"（1966年9月3日、12月28日）送陶铸同志酌处。此人非当权派，又无大罪，似应予以保护。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月三日"},{"type":"paragraph","text":"二傅医生："},{"type":"paragraph","text":"前后送来各件都看到了。政治安排问题，很多人同样，现在还"},{"type":"paragraph","text":"[1]本篇一是对全国政协常委、卫生部副部长傅连障1966年8月28日来信的批语。傅连障在信中向毛泽东反映自已在文化大革命中被扣上“反党反社会主义的黑帮分子”帽子，请求给予保护。本篇二是对傅连障12月12日来信的批语。傅连障在这封信中讲到自从对他进行斗争以来，所有的政治待遇（包括全国政协常委的待遇）都被取消，文件不能看，报告不能听。"},{"type":"paragraph","text":"[2]陶铸，当时任中共中央政治局常委、中央书记处常务书记。1966年9月3日，他接到毛泽东的批示后，即指示中国人民解放军总政治部负责人：“按主席批示，对傅加以保护。”毛泽东全集第四十九卷谈不到，等将来再说。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿八日对自己的一生，要有分析，不要只见优点，不见缺点。"},{"type":"paragraph","text":"毛泽东又及"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":9,"day":3},{"year":1966,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":59,"page_end":60},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b21d2badab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
