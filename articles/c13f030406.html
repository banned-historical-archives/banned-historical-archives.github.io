tart":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伟大领袖毛主席永远活在我们心中","authors":[],"parts":[{"type":"paragraph","text":"据新华社日内瓦电 日内瓦的瑞士中国友好与文化促进协会从十一月二十二日到二十八日在日内瓦举办了中国图片展览。约有一万二千人观看了展览。"},{"type":"paragraph","text":"展览大厅正中悬挂着毛泽东主席的画像。画像两边是瑞士国旗和中国国旗。"},{"type":"paragraph","text":"在大厅里，以“伟大的领袖毛主席将永远活在我们心中”为主题展出了六十来幅毛主席生平照片。"},{"type":"paragraph","text":"此外，还展出了关于新中国的妇女和前进中的北京的情况的图片。"},{"type":"paragraph","text":"图片展出期间，还组织了一些关于中国的报告会。著名女作家韩素音二十二日作了用幻灯作说明的报告：《今日西藏》。她根据大量事实，强调指出，西藏自古以来就是中国不可分割的一部分。她说，西藏不论在社会主义革命中，还是在社会主义建设中，都取得了很大进步。"}],"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c13f030406"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
