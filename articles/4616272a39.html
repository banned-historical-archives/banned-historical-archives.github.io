art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇同志率党政代表团今日启程","authors":[],"parts":[{"type":"paragraph","text":"新华社4日讯 应苏联共产党中央委员会和苏联政府的邀请，中国共产党中央委员会副主席、中华人民共和国主席刘少奇，将于5日率领中国党政代表团前往莫斯科，参加苏联十月社会主义革命四十三周年庆祝典礼。"},{"type":"paragraph","text":"中国党政代表团的副团长是中共中央总书记邓小平，代表团团员是中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，中共中央政治局委员李井泉，中共中央政治局候补委员、国务院副总理陆定一，中共中央政治局候补委员康生，中共中央书记处候补书记杨尚昆、胡乔木，中共中央委员、中国驻苏联大使刘晓，中共中央委员廖承志、刘宁一。"},{"type":"paragraph","text":"中国党政代表团团员彭真、李井泉、陆定一、廖承志、刘宁一已于今日乘飞机离开北京去莫斯科，代表团团员刘晓已在苏联。"}],"alias":""},"tags":[{"name":"刘宁一","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4616272a39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
