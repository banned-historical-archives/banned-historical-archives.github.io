<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市环保局长靳怀刚强调严格执行环保法用经济措施解决排污无政府状态收费、罚款所得可用于治理“三废”","authors":["徐国英"],"dates":[{"year":1980,"month":7,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　记者徐国英报道:治理“三废”，保护环境，是现代化城市建设的一个大问题。市环境卫生保护局局长靳怀刚认为，当务之急是严格执行环境保护法，实行排污收费及罚款措施，解决排污的无政府状态。在近期内，则需要进行行业改造、搞专业加工中心，以便集中污源，集中处理。"},{"type":"paragraph","text":"靳怀刚说，治理“三废”的重要性人所皆知，但在实际工作中却得不到重视。很突出的一点是表现在工厂企业所考核的各项经济指标中，就是没有“三废”排放指标这一项。这是许多工厂不负责任、随便排污、形成排污无政府状态的一个重要原因。他认为，目前急需实行排污收费，对造成严重污染的则要采取强硬的罚款措施，超过“三废”排放指标的就该罚，要将“三废”处理的好坏与企业和职工眼前的切身利益紧密地联系起来，使得人人都来重视“三废”治理工作。这条措施首先可以减少因操作不慎而造成的污染，同时还可以促使工厂在考虑增产的同时也考虑“三废”的处理。这样就能改变目前这种排污的无政府状态，而且可以把收费、罚款所得来的钱用于“三废”治理，这就开辟了一条治理“三废”的资金渠道。采取这一措施不需要花国家一分投资，就能有效地减少排污。从兄弟省市实行排污收费的情况来看，是大见成效的。许多原来在“三废”处理中属于推不动的“大象屁股”，现在也动起来了。与外地相比，上海的排污量之大是名列前茅的，更应该采取这一有效的经济措施。"},{"type":"paragraph","text":"有人认为，采取这一措施会影响国家的财政收入。靳怀刚不同意这种观点。他认为，这样做不但不会减少财政收入，相反还会增加财政收入。因为，“三废”中大有“宝”在，放掉了就成为“废”，回收起来加以利用就成为“宝”。工厂企业为了避免付排污费和罚款，就会千方百计地减少排污，开展综台利用等等，还有许多因操作不慎而造成的原料流失也可以因此而避免，这就等于增加了财政收入。再说，总的排污量减少了，上海的环境可以大大改善，对生产高、精、尖的产品带来了方便，这也有利于增加工业产值和财政收入。所以，他再三强调，无论从那个角度来看，目前急需采取经济措施，以解决排污的无政府状态。"},{"type":"paragraph","text":"上海工业布局不合理，是造成上海污源多、治理难的又一重要原因。靳怀刚认为，在近期内要大搞行业性的改造、做到集中污源，集中治理。以电镀工业为例，现在许多行业都有自己的电镀厂或车间，造成电镀废液分布范围广，在种种条件的限制下，难以分散治理。因此他主张，结合城市建设，大搞行业改造，近期内要在郊区搞电镀、纸浆、食品、皮革、机械、热加工等专业加工中心，以便将原来这些行业零星、分散的排污点集中起来，统一治理。"},{"type":"paragraph","text":"为了有效地治理上海的“三废”污染，靳怀刚认为目前还必须建立系统的检测机构。只有对“三废”污染的情况有个科学的、全面的了解，才能采取对症下药的治理措施。否则，盲目的、不科学的治理，其效果是不会理想的。"},{"type":"paragraph","text":"他说，做到以上三点，就能显著地改善上海的环境污染情况，使上海的环境出现一个新的面貌，也可以为彻底治理上海“三废”污染的长远目标打下基础。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50b5b64fe1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
