<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1971,"month":3,"day":6}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"保持谦虚谨慎作风 加强军民军政团结龙门县支左部队党委，遵照毛主席关于“拥政爱民”的教导，教育三支两军人员正确处理与地方干部和群众的关系","authors":[],"parts":[{"type":"paragraph","text":"本报讯 驻广东省龙门县支左部队党委，在党的“九大”团结胜利的路线指引下，认真学习毛主席关于“拥政爱民”的伟大教导，教育三支两军人员保持谦虚谨慎的作风，从而进一步加强了军民团结、军政团结，抓革命，促生产，形势越来越好。"},{"type":"paragraph","text":"驻这个县的三支两军人员，在大好形势下，有的同志曾一度滋长了骄傲自满情绪，影响了与地方的关系。支左部队党委认为，这个问题如果不及时和彻底解决，就难以完成毛主席交给我们的三支两军任务。于是，党委举办毛泽东思想学习班，组织三支两军人员反复学习毛主席的教导：“这个军队有一个很好的内部和外部的团结。……军民之间，军政之间，我友之间，都是团结一致的。一切妨害团结的现象，都在必须克服之列。”“群众是真正的英雄”。使大家认识到，革命必须相信群众和依靠群众。如果我们骄傲了，就会脱离群众，背离毛主席的革命路线，给革命事业带来损失。有的同志检查了由于头脑里有“骄”字，对地方革命干部不够尊重的缺点和错误，狠批了叛徒、内奸、工贼刘少奇的反革命修正主义路线，大大增强了群众观念和搞好军民团结、军政团结的自觉性。"},{"type":"paragraph","text":"支左部队党委认为：时刻保持谦虚谨慎作风，是促进军民、军政团结的重要保证。于是，他们经常教育三支两军人员正确对待自己：当工作有了成绩时，归功于伟大领袖毛主席，归功于广大人民群众，主动把自己“划”出来，当工作中出了问题时，要把自己“摆”进去，严于责己，主动承担责任，多作自我批评。一次，龙华公社龙石头大队准备筹建一个会场，当时县革委会有个常委在这里蹲点。这个大队的负责同志就写了一个报告，直接交给这个常委批准。后来，上级革委会发现这个问题，批评了这个常委。支左部队党委了解到这件事情后，认为报告虽然是这个常委批的，但我们在这个大队支农的同志也有责任。于是，支左部队党委认真作了自我批评，并组织驻队的支农人员、地方干部和社员群众一起学习毛主席有关节约闹革命的教导，指出这样做的危害性，使大家受到了一次极其深刻的教育，进一步密切了支农人员和地方干部、群众的关系，使各项工作做得更好。"},{"type":"paragraph","text":"支左部队党委在教育三支两军人员加强与地方干部和群众的关系时，特别强调带头人要起模范作用。一次，县革委会主任、军队代表李财德，听到革委会中有人议论：“有事请示军队代表比请示地方干部好！”他回顾并检查前一阶段的工作，反复学习毛主席关于民主集中制的教导，找到了自己有包办代替，个人说了算的现象。于是，他在常委会上主动作了检查，多次到群众中去进行亮私斗私，请大家帮助他在灵魂深处爆发革命。此后，他遵照毛主席关于“党委要完成自己的领导任务，就必须依靠党委这‘一班人’，充分发挥他们的作用”的教导，在工作中充分发挥集体领导作用，进一步密切了革委会成员之间的关系，使革命和生产的大好形势不断向前发展。"}],"alias":""},"tags":[{"name":"三支两军","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8832304290"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
