{"year":1967,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴基斯坦进步人士欢呼毛泽东思想指导着世界革命运动"},{"type":"paragraph","text":"毛主席全面继承、捍卫和发展了马列主义"},{"type":"paragraph","text":"据新华社拉瓦尔品第电　巴基斯坦进步人士在十月社会主义革命五十周年的时候，热情欢呼伟大的毛泽东思想正在指导着全世界的革命运动；愤怒谴责苏修领导集团背叛十月革命，并同美帝国主义共谋镇压一切世界革命运动。"},{"type":"paragraph","text":"一位巴基斯坦朋友在写给新华社记者的信中说：“毛泽东主席全面继承、捍卫和发展了马克思列宁主义；并且通过总结中国、苏联和世界其他地区的阶级斗争的新经验，创造性地提出了在无产阶级专政下继续进行革命的伟大理论。毛主席亲自发动和领导的无产阶级文化大革命标志着马克思主义在同修正主义斗争中发展的一个新阶段。全世界被压迫人民在争取解放的斗争中，盼望着从中国和中国人民伟大领袖毛泽东主席那里得到指导。正是伟大的毛泽东思想在指导着全世界的革命运动。”"},{"type":"paragraph","text":"信件说：“正如毛主席所说：‘社会主义制度终究要代替资本主义制度，这是一个不以人们自己的意志为转移的客观规律。’苏修领导集团的背叛虽然是一个挫折，但是对全体进行斗争的人类也是一个良好的教训，并且证明了毛泽东主席关于在社会主义社会中仍然存在着阶级斗争和在无产阶级专政下必须继续进行革命的论断。”"},{"type":"paragraph","text":"信件说：“在苏共二十大就开始诽谤斯大林的苏联修正主义集团，现在已经达到公开同美帝国主义勾结的地步。它的‘和平共处’、‘和平竞赛’和‘和平过渡’的修正主义理论，等于同美帝国主义共谋镇压一切世界革命运动，这已经完全践踏了十月革命的旗帜。”"},{"type":"paragraph","text":"巴基斯坦的一位新闻界的朋友说，在热烈庆祝伟大十月革命节的同时，人们愤怒地看到，赫鲁晓夫最忠实的门徒——勃列日涅夫、柯西金及其一伙叛徒，企图利用这个机会中伤世界真正的革命者。他们企图通过马克思列宁主义词句、骗人的口号和虚伪的“纪念”活动作烟幕，来掩盖他们同帝国主义者相互勾结，这是绝对不能得逞的。"},{"type":"paragraph","text":"他说：“作为伟大十月革命真正继承者的革命的苏联人民把这些叛徒揪到罪犯被告席上，对他们的滔天罪行严加惩罚的日子很快就会到来的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73a467ced4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
