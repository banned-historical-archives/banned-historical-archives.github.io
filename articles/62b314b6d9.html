<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华主席由金主席陪同参观“二·八”维尼纶厂华主席在参观时指出:“毛主席和金主席缔造发展起来的中朝人民的友谊今后一定会发展得更好。”　华主席访问朝鲜人民军炮兵某部受到热烈欢迎","authors":[],"dates":[{"year":1978,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社咸兴五月八日电　华国锋主席今天上午在咸兴参观朝鲜“二·八”维尼纶联合企业时指出:“毛主席和金主席缔造发展起来的中朝人民的友谊今后一定会发展得更好。”"},{"type":"paragraph","text":"华主席是由金主席陪同，在今天上午从咸兴车站乘车直接到达“二·八”维尼纶厂参观访问的。"},{"type":"paragraph","text":"这个工厂是“二·八”维尼纶联合企业的重要组成部分。它是在朝鲜人民的伟大领袖金日成主席关怀下，自力更生建设起来的。"},{"type":"paragraph","text":"华主席由联合企业经理徐载弘陪同参观了一些车间，观看了维尼纶的生产过程，了解了这个厂经过不断技术革新，促进生产迅速提高的情况。"},{"type":"paragraph","text":"华主席问徐载弘经理到北京维尼纶工厂参观过没有。徐载弘说，去参观过。华主席说，朝鲜这个企业有哪些方面比中国的先进，中国的有哪些不足，希望提出来。徐载弘说，应该互相学习。"},{"type":"paragraph","text":"参观结束时，华主席以中共中央、中华人民共和国国务院的名义，向维尼纶联合企业赠送了锦旗。华主席指着锦旗上的字念道:“中朝两国人民的战斗友谊万岁!”"},{"type":"paragraph","text":"徐载弘经理向华主席赠送了纪念品。纪念品由一个精制的合子装着，其中有这个企业生产的维尼纶样品和维尼纶的七种原料产品，还有一个闪闪发光的金属制品，上面镌刻着这个企业的全景。"},{"type":"paragraph","text":"徐载弘经理对华主席说，华主席到他们厂参观，全厂工人感到无比光荣。"},{"type":"paragraph","text":"华主席表示向工人同志们学习，请他向全体职工转致问候，祝职工们取得更大的胜利。"},{"type":"paragraph","text":"华国锋主席今天下午访问朝鲜人民军炮兵某部时，受到吴振宇大将和金铁万上将以及官兵们的热烈欢迎。"},{"type":"paragraph","text":"华主席来到坑道，参观了坑道里的战士宿舍，观看了海岸炮操作表演。他鼓掌赞扬战士们熟练的技术和果敢敏捷的动作。"},{"type":"paragraph","text":"华主席赞扬朝鲜人民军是英雄的军队，并且希望他们继承老一辈的光荣传统，为保卫祖国，统一祖国而斗争。"},{"type":"paragraph","text":"华主席以中共中央、中华人民共和国国务院的名义向部队赠送了锦旗。锦旗上面写着:“向英雄的朝鲜人民军致敬!”华主席说:“你们为祖国辛苦了，向同志们致敬!”这时，在场的朝鲜人民军官兵热烈地鼓掌和欢呼。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\05\\7859010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e五月八日，华主席由金主席陪同，在咸兴“二·八”维尼纶厂参观。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62b314b6d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
