,"authors":[],"dates":[{"year":1959,"month":2,"day":24}],"is_range_date":false,"parts":[{"text":"毛泽东关于整顿人民公社问题给刘子厚的信","type":"title"},{"text":"一","type":"subtitle"},{"text":"刘子厚同志：","type":"appellation"},{"text":"昨天谈得相当舒畅，相当好，感谢你们!一月改变整社的方针政策，与党大会的想法不同，是很好的。我觉得你们路线好，但是还有参考别省经验和做法的必要。山西一月决议极好，你们可以打电话叫他们送一份给你们，可能对你们有某些参考价值的。你们有一个整社六个问题的指示文件没有?应当有吧。我极想看，有的话，送一份送\u003c给\u003e我，两天内送到济南即可。我在这里有两三天住，来得及的。至祷至盼!","type":"paragraph"},{"text":" 毛泽东二月廿四日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"印发各同志。此件很好，可作参考。注意看“第三，分配问题”。","type":"paragraph"},{"text":" 毛泽东1959年2月27日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a8103e960"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
