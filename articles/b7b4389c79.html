  机场上举行隆重欢送仪式","authors":[],"dates":[{"year":1978,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"圆满结束对尼泊尔的正式友好访问"},{"type":"paragraph","text":"邓小平副总理离加德满都回国"},{"type":"paragraph","text":"比斯塔首相到机场送行  机场上举行隆重欢送仪式"},{"type":"paragraph","text":"新华社加德满都一九七八年二月六日电　中华人民共和国国务院副总理邓小平，圆满地结束了对尼泊尔的四天正式友好访问，二月六日上午乘专机离开加德满都回国。"},{"type":"paragraph","text":"尼泊尔首相比斯塔到机场送行。"},{"type":"paragraph","text":"在机场上举行了隆重的欢送仪式。"},{"type":"paragraph","text":"邓副总理在比斯塔首相陪同下走过一条长长的红地毯，登台检阅了仪仗队。乐队奏中尼两国国歌。"},{"type":"paragraph","text":"在专机的舷梯旁，双方热烈握手告别。邓副总理请比斯塔首相向比兰德拉国王转达他的谢意和敬意，并对比斯塔首相说：“我希望很快在北京会见你”。比斯塔首相对邓副总理说：“我希望你再来访问尼泊尔。祝你一路平安。”"},{"type":"paragraph","text":"外交部副部长韩念龙、亚洲司司长沈平、礼宾司副司长高建中等随行人员也同机离开加德满都回国。"},{"type":"paragraph","text":"到机场送行的有：代理首席法官巴苏德夫·夏尔马、全国评议会议长拉姆·哈里·夏尔马、回农村运动中央委员会主席比什瓦·班杜·塔帕、外交大臣克里希纳·拉杰·阿里亚尔、财政大臣贝卡·巴哈杜尔·塔帕和其他大臣。"},{"type":"paragraph","text":"到机场送行的还有尼中友好协会和尼中文化协会的负责人等。"},{"type":"paragraph","text":"中国驻尼泊尔大使彭光伟、使馆的外交官员和在尼泊尔工作的中国技术人员的代表以及各国驻尼泊尔的外交使节也到机场送行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7b4389c79"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
