script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华主席接见出席全国妇代会代表叶剑英、邓小平、李先念、汪东兴副主席一起接见","authors":[],"dates":[{"year":1978,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京九月二十一日电　华国锋主席，叶剑英、邓小平、李先念、汪东兴副主席，党和国家其他领导人今天下午在人民大会堂接见了出席中国妇女第四次全国代表大会代表，同她们一起照了像。"},{"type":"paragraph","text":"全国妇联名誉主席宋庆龄、蔡畅、邓颖超，全国妇联主席康克清，参加了接见。"},{"type":"paragraph","text":"参加接见的党和国家其他领导人有:韦国清、乌兰夫、方毅、纪登奎、苏振华、吴德、余秋里、张廷发、陈永贵、耿飚、彭冲、陈慕华、赛福鼎、王震、谷牧、康世恩。"},{"type":"paragraph","text":"今天被接见的还有在北京召开的其他一些会议的代表。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\789m010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e华主席同妇女代表亲切握手。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\09\\789m010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e华主席，叶剑英、邓小平、李先念、汪东兴副主席，党和国家领导人亲切接见妇女代表。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e83ce3af20"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
