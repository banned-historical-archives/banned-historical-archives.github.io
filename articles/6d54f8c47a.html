rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"更好地发挥无产阶级专政柱石的作用“高原红色边防队”认真学习毛主席的重要指示，决心为保卫社会主义祖国作出贡献","authors":[],"parts":[{"type":"paragraph","text":"本报讯 曾荣获“高原红色边防队”称号的西藏查果拉边防队指战员，认真学习毛主席关于理论问题的重要指示，决心弄通马克思主义关于无产阶级专政的理论，坚持无产阶级专政下继续革命，为保卫社会主义祖国作出贡献。"},{"type":"paragraph","text":"学习中，边防队分别举办了领导班子和战士骨干学习班，选学了《国家与革命》、《哥达纲领批判》、《论人民民主专政》、《关于正确处理人民内部矛盾的问题》等马列著作和毛主席著作。同志们认识到，无产阶级对资产阶级实行专政，是发展社会主义的基本保证。共产党员、副排长李代富联系国际阶级斗争和解放后我们党内四次大的路线斗争的实际，进一步认清了在社会主义社会里，在生产资料所有制的社会主义改造基本完成以后，依然存在阶级矛盾和阶级斗争，存在帝国主义、社会帝国主义对我国的颠覆和侵略的威胁。在这种情况下，无产阶级专政一定要加强。党支部书记、指导员苟玉春列举苏联变成社会帝国主义的现实教训，说：“坚持不坚持无产阶级专政和无产阶级专政下的继续革命，是区别真假马克思主义的分水岭。毛主席制定的党的基本路线，是以马列主义关于无产阶级专政的理论和革命的具体实践相结合为依据的。我们学习无产阶级专政的理论，就要了解社会主义时期阶级斗争的特点和规律，切实贯彻执行党的基本路线。”"},{"type":"paragraph","text":"学习期间，曾任查果拉边防队指导员、现任仁布县武装部副政委的张志富向干部战士传达了四届人大精神，并讲了边防队的光荣传统。他说：当年建队的老同志为保卫无产阶级专政，依靠边疆各族人民，长期艰苦奋斗，扎根边疆干革命。同志们要发扬优良传统，争取更大光荣。边防队的同志们表示，中国人民解放军是无产阶级专政的柱石，我们一定要提高警惕，搞好军民联防，为巩固无产阶级专政、保卫伟大社会主义祖国贡献力量。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d54f8c47a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
