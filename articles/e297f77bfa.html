rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓颖超副委员长回到北京邓小平等党和国家领导人前往机场迎接","authors":[],"parts":[{"type":"paragraph","text":"新华社六月一日讯 中共中央政治局委员、人大常委会副委员长邓颖超及其随行人员，结束了对朝鲜民主主义人民共和国的正式友好访问，今天下午乘专机回到北京。"},{"type":"paragraph","text":"党和国家领导人邓小平、乌兰夫、陈慕华、姬鹏飞，以及朝鲜民主主义人民共和国驻中国大使全明洙和夫人等，前往机场热情迎候邓颖超副委员长等。"},{"type":"paragraph","text":"宾努亲王和夫人也到机场迎接。"},{"type":"paragraph","text":"邓颖超副委员长在掌声中健步走下飞机。邓小平副主席同她热烈握手，祝贺她访问朝鲜取得圆满成功。邓颖超副委员长见到全明洙大使时，高兴地同他紧紧握手。邓颖超副委员长说：请转告朝鲜人民的伟大领袖金日成主席，我已经平安回到北京。我们在朝鲜访问期间所受到的热烈欢迎和盛情款待，给我们留下很深的印象。我向金日成主席表示衷心感谢。全明洙大使说：我祝贺您的访问取得成功。"},{"type":"paragraph","text":"到机场迎接邓颖超副委员长的还有政协全国委员会副主席、全国妇联主席康克清，外交部部长黄华、副部长仲曦东，中联部副部长乔石，人大常委会副秘书长武新宇等。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e297f77bfa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
