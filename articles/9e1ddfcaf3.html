rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席声明激励着马来亚人民的解放斗争在马来亚许多地区出现了大量印有毛主席庄严声明的革命传单","authors":[],"parts":[{"type":"paragraph","text":"新华社四日讯 据在新加坡出版的马来亚报纸《阵线报》报道：马来亚许多地区的革命群众，不顾反动当局的白色恐怖，热烈欢呼和广泛宣传毛主席五月二十日发表的支持世界人民反对美帝斗争的庄严声明，坚决支持印度支那三国人民的反美救国斗争。"},{"type":"paragraph","text":"报道说：“毛主席的声明就象春雷战鼓，激励着亚洲、非洲、拉丁美洲和全世界各国革命人民反对美帝斗争的红心。毛主席的号召，强有力地鼓舞着站在反帝斗争最前线的印度支那人民。毛主席的声明也无限地激发着我们马来亚人民反对美国侵略者及其走狗的解放斗争。”"},{"type":"paragraph","text":"报道说：“我们马来亚人民热烈欢呼伟大领袖毛主席支持世界人民反对美帝及其一切走狗斗争的庄严声明。我们全力支持印度支那人民抗美救国的正义斗争。我们决心同世界人民一道，开展一系列反对美帝及其一切走狗的正义斗争。”"},{"type":"paragraph","text":"报道说，最近，在马来亚许多地区出现了大量的印有毛主席庄严声明的革命传单。在大街小巷还出现群众书写的反美标语。"},{"type":"paragraph","text":"报道说，在新加坡岛，马来亚群众在毛主席庄严声明的鼓舞下，自五月二十四日至三十日，连续举行了四次反美示威游行。"},{"type":"paragraph","text":"情绪激昂的示威群众，高举着醒目的横幅和标语牌，上面写着：“热烈欢呼毛主席支持世界人民反对美帝斗争庄严声明的发表！”“全世界人民团结起来，打败美国侵略者及其一切走狗！”“美帝国主义从柬埔寨和印度支那滚出去！”“全力支持印度支那人民抗美救国斗争！”"},{"type":"paragraph","text":"示威群众沿途挥动红旗，高呼“打倒美帝国主义！”“打倒拉赫曼、李光耀走狗政权！”“坚决不当傀儡兵！”等口号。示威队伍沿途受到了群众的热烈欢呼和支持。有些群众还自动加入了示威行列。"},{"type":"paragraph","text":"报道最后指出，马来亚群众的多次示威，“充分反映了马来亚人民热烈响应伟大领袖毛主席庄严声明的红心，充分表现了马来亚人民反对美帝扩大侵略印度支那战争的决心。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e1ddfcaf3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
