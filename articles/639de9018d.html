art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"福特总统和夫人举行告别宴会邓小平、李先念、吴德、李素文等应邀出席 基辛格国务卿等出席作陪 福特总统和邓小平副总理先后在宴会上祝酒","authors":[],"parts":[{"type":"paragraph","text":"新华社—九七五年十二月四日讯 美利坚合众国总统杰拉尔德·福特和夫人贝蒂·福特今天晚上在人民大会堂举行告别宴会。"},{"type":"paragraph","text":"国务院副总理邓小平、李先念，人大常委会副委员长吴德、李素文，外交部长乔冠华，外贸部长李强，文化部长于会泳，中国驻美国联络处主任黄镇，以及林佳楣同志，应邀出席了宴会。"},{"type":"paragraph","text":"福特总统的女儿苏珊·福特，国务卿亨利·基辛格博士，美国驻中国联络处主任乔治·布什和夫人等出席宴会作陪。"},{"type":"paragraph","text":"宴会厅里并排悬挂着中国国旗和美国国旗。"},{"type":"paragraph","text":"福特总统和邓小平副总理先后在宴会上祝酒（全文见第二版）。他们祝酒以后，乐队分别奏中国国歌和美国国歌。席间，乐队演奏了中美两国的乐曲。"},{"type":"paragraph","text":"应邀出席宴会的还有："},{"type":"paragraph","text":"人大常委会委员张文裕、武新宇、林巧稚、赵忠尧、童第周；"},{"type":"paragraph","text":"政府部门、北京市革命委员会等有关方面负责人王海容、朱穆之、谢静宜、严佑民、肖鹏、刘澄清、王曼恬、姜惠莲、路金栋、刘华清、刘存信、王冶秋、鲁瑛、邓岗、穆青、吴忠、刘传新、章含之、朱霖；"},{"type":"paragraph","text":"首都工人、人民公社社员的代表陈福汉、陈景泰、杜宝荣、陈永祥、郭丽云、郭福金，少数民族的代表央宗、塔里甫·达吾提、陈家才、陈玉芳、田中山，以及其他各界代表。"},{"type":"paragraph","text":"参加宴会的还有：杜聿明、黄维、张海商、赵一雪、杨南cūn。"},{"type":"paragraph","text":"美利坚合众国总统杰拉尔德·福特和夫人十二月四日在人民大会堂举行告别宴会。"},{"type":"paragraph","text":"国务院副总理邓小平、李先念，人大常委会副委员长吴德、李素文等应邀出席了宴会。图为主宾步入宴会厅。"},{"type":"paragraph","text":"新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"639de9018d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
