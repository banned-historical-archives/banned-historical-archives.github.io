thors":["周恩来"],"dates":[{"year":1967,"month":5,"day":12}],"is_range_date":false,"parts":[{"text":"周恩来关于《江西日报》问题的第二次电报指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"江西省大中学校红卫兵司令部并告江西省军区党委：","type":"appellation"},{"text":"关于《江西日报》问题，中央文革小组办事组五月二日的电话和我五月七日的电报，军区党委均已向你们传达。据悉，进驻报社的红卫兵同志尚未完全撤出，报纸 至今还没有启封出版，对此中央十分关心。为了使江西全省人民能够及时听到毛主席和党中央的声音，务望还留在报社的红卫兵同志立即撤出，以便《江西日报》启封出版。在目前，报纸可以出版新华社电讯和中央报刊上的文章。关于对《江西日报》前一时期的报道有不同意见，可以协商解决。","type":"paragraph"},{"text":" 周恩来1967年5月12日","type":"paragraph"},{"text":" 军区接待站印1967年5月15日","type":"paragraph"}],"comments":[],"origin":"《毛主席无限关怀江西：中央首长对江西问题的指示》(江西省直机关保卫毛泽东思想联合战斗团宣传组、江西省无产阶级革命派大联合筹委会新闻界联络站编印，1967年10月)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ca792d622"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
