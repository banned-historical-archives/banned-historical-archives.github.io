script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"徐汇中学革委会高举革命大批判的旗帜大反资产阶级派性　增强无产阶级党性揪出了一小撮坏人，复课闹革命出现空前未有的大好形势","authors":[],"dates":[{"year":1968,"month":4,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市徐汇中学革命委员会，高举革命大批判的旗帜，大反资产阶级派性，广大革命师生增强了无产阶级革命派的派性，即无产阶级先锋队的党性，团结起来，主动向阶级敌人发起进攻，揪出了一小撮破坏无产阶级文化大革命的反动分子，推动了学校复课闹革命。"},{"type":"paragraph","text":"去年以来，一小撮坏人利用了这个学校的一个学生组织，蒙蔽一批人，大搞形“左”实右的极“左”派的派性和右倾机会主义的派性。他们否定市六中学革命大批判推进革命大联合的经验，分裂中学运动，直接把矛头指向以毛主席为首的无产阶级司令部，指向中国人民解放军和新生的革命委员会。其中有的人还公然为党内最大的一小撮走资派翻案。在这种情况下，一部分师生受了蒙蔽，不敢大胆地开展斗争。结果，学校长期处于分裂状态，反动思潮泛滥，复课闹革命根本搞不起来。最近，通过对反动思潮的批判，开展了反对右倾分裂主义、右倾投降主义、右倾保守主义的斗争，广大师生擦亮了眼睛，他们感到对右的和极“左”的反动思潮不批、不斗就是最大的右倾。于是，革命师生口诛笔伐，狠狠地批判了各种反动思潮，提高了广大师生的阶级斗争和路线斗争的觉悟。"},{"type":"paragraph","text":"这时，有些别有用心的人又散布谣言，企图挑起群众与校革委会的对立情绪。校革委会牢牢掌握斗争大方向，继续带领广大群众坚持对反动思潮的批判斗争。同时，举办了毛泽东思想学习班，对广大受蒙蔽的同学，采取“惩前毖后，治病救人”的方针，组织他们学习毛主席著作，斗私批修，很多革命师生还找他们个别谈心，帮助他们提高思想认识。这样，团结了大多数。他们说:“过去受阶级敌人的蒙蔽，成为他们向毛主席革命路线猖狂进攻的工具，这是对毛主席最大的不忠，今后一定要吸取教训，回到毛主席革命路线上来。”"},{"type":"paragraph","text":"通过大学习，大批判，克服了资产阶级派性，大大增强了无产阶级先锋队的党性。原来非常对立的两个组织的革命群众在革命的原则下联合起来，并肩作战，把一个破坏革命大联合的反革命两面派揪了出来。通过对这个反动分子的批判、斗争，使广大师生上了一堂生动的阶级教育课，从而，学校复课闹革命出现了空前未有的大好形势。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97350fe50d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
