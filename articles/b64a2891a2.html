<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"平顶山煤矿职工在文化大革命中积极破旧创新  革命热气腾腾  生产全面跃进  生产大幅度增长，成本大幅度下降，大批技术革新项目试验成功","authors":[],"dates":[{"year":1966,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"平顶山煤矿职工在文化大革命中积极破旧创新"},{"type":"paragraph","text":"革命热气腾腾  生产全面跃进"},{"type":"paragraph","text":"生产大幅度增长，成本大幅度下降，大批技术革新项目试验成功"},{"type":"paragraph","text":"据新华社郑州九日电　在河南平顶山矿区，无产阶级文化大革命正在成为推动煤矿生产建设的巨大动力。这个煤矿的广大革命职工，以无产阶级文化大革命为纲，抓革命，促生产，使全矿到处都呈现出一片热气腾腾的革命景象和新的全面跃进的局面。"},{"type":"paragraph","text":"这个矿几年前在全国煤矿工业中还居于下游地位。社会主义教育运动和无产阶级文化大革命开展以来，极大地促进了广大职工的思想革命化，职工们以冲天的革命干劲，掀起生产建设的新高潮。他们使同样的矿井，在人员大大减少的情况下，生产却大幅度上升。"},{"type":"paragraph","text":"今年前八个月与一九六三年同期比较，矿井生产能力提高了百分之四十七，原煤产量增长百分之五十一点三七，全员效率提高百分之一零八点八九，原煤成本下降了百分之二十五点五四。其中有的矿的主要技术经济指标已列入全国先进水平。"},{"type":"paragraph","text":"平顶山煤矿职工高举毛泽东思想伟大红旗，敢字当头，对许多不合理的规章制度，不突出无产阶级政治的情况，以及一切企业管理方面的旧思想、旧作风、旧习惯、旧势力，提出了尖锐的批判，提出了一系列革命化的新措施。为了加强生产现场的政治思想工作，有的矿改革了劳动组织；有些单位在基层干部中实行了下井跟班劳动；有的单位实行了工程技术人员轮流下放当工人。实行这些措施之后，显著地促进了企业管理革命化。在生产技术上，职工们蔑视资产阶级“权威”，敢想、敢干、敢革命、敢创造，大搞技术革新和技术革命。从去年到现在，职工们提出了一千一百项革新建议，已经实现了八百三十项，其中重大的革新有一百八十项。平顶山四矿的割煤机主机滚床设计不合理，开始有人认为这种割煤机是六十年代的新技术，只有等待煤矿机械研究部门来改革。但是四矿工人说：六十年代最新技术有啥了不起，只要不合理，咱就要闹革新！结果这个矿的职工在三天内就自己设计改革成功了。由于大批技术革新项目的试验成功，有效地提高了煤矿生产的机械化程度，改变了矿井技术面貌。"},{"type":"paragraph","text":"广大职工把在社会主义教育运动和文化大革命中焕发起来的冲天干劲，全部注入到煤矿生产中去，使全矿涌现出无数生动的新人新事。许多人为革命出煤，不计个人得失，有的在井下艰险场合挺身而出；有的在狂风中爬上十几米高的电杆抢修高压线；有的在矿井停电的困难条件下，坚守井下岗位保证矿井安全，使生产迅速恢复。"},{"type":"paragraph","text":"目前，平顶山煤矿革命职工正以十六条为精神武器，一手抓革命，一手抓生产，保证在文化大革命和社会主义生产建设新高潮中夺得更大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b64a2891a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
