hors":[],"dates":[{"year":1976,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　中国科学院上海生物化学研究所第六研究室的科研人员，认真学习伟大领袖毛主席最近的重要指示和《人民日报》重要社论《翻案不得人心》，狠批党内那个不肯改悔的走资派效法孔老二，搞翻案复辟的修正主义路线，决心把反击右倾翻案风的斗争进一步引向深入。"},{"type":"paragraph","text":"“翻案不得人心。”这个研究室的科研人员认真学习毛主席的光辉指示，联系历代反动没落阶级搞翻案又总是失败的事实，进一步认识到，历史上每一个大的社会变革以后，总会有人象孔老二那样跳出来搞翻案，搞复辟，但是都没有好下场。今天，党内那个不肯改悔的走资派就是这样的翻案派，他的翻案、复辟活动遭到了广大革命人民的迎头痛击，这说明搞翻案不得人心。"},{"type":"paragraph","text":"为了深入揭露党内那个不肯改悔的走资派逆历史潮流而动的反动本质，这个室的党支部引导科研人员认真学习马列和毛主席的有关著作，选学鲁迅有关批孔的文章，结合批孔，抓住“克己复礼”这个要害，深入批判党内那个不肯改悔的走资派复辟资本主义的罪行。在批判中，大家指出:古今中外的一切反动派为了搞复辟倒退，搞反攻倒算，都要从他们的祖师爷孔老二那里找法宝。在文化大革命前，党内那个不肯改悔的走资派伙同刘少奇推行了一条修正主义路线，经过广大群众的批判，他口头上说什么“永不翻案”，但重新工作以后，却急不可待地要算文化大革命的账，要翻文化大革命的案。他抛出“三项指示为纲”的修正主义纲领，公开打出“还乡团”的旗号，向无产阶级猖狂进攻。两千多年前，孔老二一心怀念奴隶制社会，他嘴上叫的是“吾从周”，夜里梦见的也是周公。他哀叹什么“天下无道”，“礼崩乐坏”，“贵贱无序，何以为国”等等，妄图把社会扭回到西周奴隶制去。在我国社会主义革命深入发展的今天，党内那个不肯改悔的走资派一心怀念的也是那种“尊卑有序”的旧秩序，妄图复辟资本主义。大家还把党内那个不肯改悔的走资派的言行同孔老二的言行对照起来进行批判。孔老二说什么“名不正，言不顺”。他也鹦鹉学舌地叫嚷“名不正，言不顺，首先要正名。”于是，他要恢复所长制、室主任制。孔老二把革命的大变革污蔑为“天下无道”。他也叫嚷“这种创新要少点好”。孔老二要“举逸民”。他也要“请隐士”。通过对照和批判，大家进一步看清了党内那个不肯改悔的走资派与孔老二是一丘之貉。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7dd069a67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
