art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平同志率我党代表团回到北京朱德董必武彭真等同志到机场欢迎","authors":["刘庆瑞"],"parts":[{"type":"paragraph","text":"新华社二十八日讯 由中共中央总书记邓小平同志率领的中国共产党代表团，在参加了罗马尼亚共产党第九次全国代表大会以后，今天上午乘专机回到北京。"},{"type":"paragraph","text":"回到北京的代表团团员有康生、伍修权、王力同志和其他随行人员。"},{"type":"paragraph","text":"到机场欢迎的，有中共中央副主席朱德和其他领导人董必武、彭真、谭震林、陈伯达、薄一波、杨尚昆同志，以及谢富治、安子文、罗贵波、赵毅敏等同志，还有中共中央机关负责工作人员。罗马尼亚驻中国大使馆临时代办贝舍里安和使馆官员，也到机场迎接。"},{"type":"paragraph","text":"上图 邓小平同志和前往欢迎的朱德、董必武、彭真、谭震林、陈伯达、薄一波、杨尚昆、谢富治、安子文、罗贵波、赵毅敏等同志以及罗马尼亚驻华大使馆临时代办贝舍里安等在机场合影。                   新华社记者 刘庆瑞摄RW：邓小平；代表团团长"}],"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"赵毅敏","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fff9f55059"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
