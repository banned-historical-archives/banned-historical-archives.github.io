art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想的宣传员","authors":["励新"],"parts":[{"type":"paragraph","text":"毛主席检阅文化革命大军开始以前，在天安门广场东边的街上，有九名戴着鲜红的值勤袖章的解放军战士，一直活跃在红卫兵中间。他们和等待毛主席接见的广大革命师生一起，学习《毛主席语录》，高唱《大海航行靠舵手》。他们还利用值勤的空隙时间，为红卫兵表演了歌颂我们伟大领袖毛主席，歌颂以毛主席为代表的无产阶级革命路线胜利的许多节目。他们走到哪里，哪里就一片欢腾。"},{"type":"paragraph","text":"这九名战士是某部一连和二连的梁新国、戎焕忠、魏从礼等。十一月二日，他们接受毛主席第六次接见革命师生的值勤任务时，一致表示，要象一心为公的共产主义战士蔡永祥那样热爱红卫兵，为红卫兵贡献自己的力量。"},{"type":"paragraph","text":"节目一个接着一个演下去，红卫兵们情绪十分热烈，他们说：“解放军时时处处高举毛泽东思想伟大红旗，是我们学习的榜样！”“坚决响应林彪同志的号召，活学活用毛主席著作，在改造世界观上狠下功夫！”（励新）"},{"type":"paragraph","text":"政治工作员给红卫兵讲蔡永祥的故事RW：毛泽东；接见红卫兵；言论；附图"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66c5831495"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
