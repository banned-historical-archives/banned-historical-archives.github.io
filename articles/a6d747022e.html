rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决打碎颈上的奴隶枷锁南非人民展开反对“通行证法”的斗争","authors":[],"parts":[{"type":"paragraph","text":"据新华社4日讯 约翰内斯堡消息：南非白人政府的“通行证法”是套在南非人民颈上的一根奴隶枷锁。南非人民正在加紧斗争，要使1959年成为南非历史上反对“通行证法”斗争最伟大的一年。"},{"type":"paragraph","text":"“通行证法”是法西斯的马菊政府在十年前左右制定的实行种族歧视的重要法律。这个法律规定每一个年满十六岁的非洲人必须随身携带一大套证件，其中有“身份证”、“迁移证”、“寻职证”、纳税收据……。如果证件不齐，警察就要加以逮捕。仅在1956年到1957年，就有六十四万三千多人由于违反“通行证法”和其他细小的罪名被捕。"},{"type":"paragraph","text":"南非“鼓声”月刊曾经揭露了白人政府借故大批逮捕非洲人的卑鄙目的。它指出，南非的“农场主希望不花一文地获得劳工，提供这样的劳动力确乎已经成为通行证制度的主要目的。”"},{"type":"paragraph","text":"南非当局对妇女也颁发“通行证”，“鼓声”月刊指出，目前农场经常使用妇女劳工，这一事实似乎表明颁发给妇女的“通行证”有一天也可能用于同样的目的。"},{"type":"paragraph","text":"从“通行证法”制定的那一天起，南非人民就表示了强烈的反对情绪。今年5月30日，南非非洲人国民大会在约翰内斯堡召开了全国反对“通行证法”会议。会议决定从5月31日到6月21日拒绝购买白人农场利用非洲人奴隶劳动生产的马铃薯。这是南非人民在反对“通行证法”的长期斗争中第一次使用了经济抵制的武器。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6d747022e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
