art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黑板报","authors":[],"parts":[{"type":"paragraph","text":"罗工人党代表团将访问我国"},{"type":"paragraph","text":"应中共中央的邀请，由罗马尼亚工人党中央政治局委员扬·毛雷尔率领的罗马尼亚工人党中央代表团，将于三月初到我国进行友好访问。根据协议，中罗两党高级领导代表人，将就两党两国的关系以及社会主义阵营和国际共产主义和工人运动的团结问题交换意见。中共代表团团长是刘少奇，团员是邓小平、彭真和康生。"},{"type":"paragraph","text":"军师团首长纷纷下连推广郭兴福教学方法"},{"type":"paragraph","text":"全军许多军师团首长热烈响应军委号召，亲自下到连队，大力宣传推广郭兴福教学方法，培养郭兴福式的基层干部，并且组织评比竞赛，观摩学习，巡回表演和送宝取经。目前，全军正在形成一个学、赶、超郭兴福的热潮。"},{"type":"paragraph","text":"南越人民武装去年击落击伤敌机近七百架"},{"type":"paragraph","text":"去年全年，南越人民武装共击落敌机三百四十六架，击伤三百五十架，比一九六二年增加了三倍。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7667c9aa8c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
