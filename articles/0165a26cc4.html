" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji4-2","name":"毛泽东全集第4卷(2)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji4-2.pdf"],"article":{"title":"加强体力与提高射击技术的训令","alias":"","parts":[{"type":"paragraph","text":"加强体力与提高射击技术的训令！"},{"type":"paragraph","text":"（1930年4月）"},{"type":"paragraph","text":"为令遵事。我们红军作战既没有强盛的火力压倒敌人，又没有军用化学可以制胜，全凭着已腾沸的热血、誓死斗争的决心和敌人肉弹相搏，用血去染成赤色区域。所以每次胜利全靠官兵奋勇猛进，以我们的勇敢骇倒敌人。然而，这样就要靠有强健的体力才能一天奔跑百多里路，抢十多个山头，作几场恶战。这样还是不够，我们还没有制弹厂，还没有固定的后方。子弹无多，就应该特别爱惜，射击精确才能杀伤更多的敌人。如果跑步前进而落伍了一大半，就失了团结而强固的冲力；快放齐放，打不到一个敌人，就不能摧毁敌人的战斗力而动摇他们的阵地，对于掩护冲锋更不发生威力。所以没有健强的体力，就有方分的革命精神和志愿也无从施用：没有良好的射击技术，就不能在战场上杀伤得多数敌人，而自己也就多受损失。因此，锻炼身体增进体力，熟习瞄准增进射击效能，是现在红军军事训练中的第一要着。现在规定各部早操时间废除跑步，或多操持枪体操，或徒手体操。在每星期的操课表中须另有体操时间。晚上游戏多做各种运动，如竞走、踢球、演习、叠罗汉·….在休息时间比较长久的时候，可酌量设置简单器械一一单杠架、吊绳、吊棍、秋干、吊环、爬城索·..：（此等器械都可以带走的）施行器械体操和设备些障碍物，施行应用体操一一就是做超越竞走。这些事情只要有一个星期以上休息的地方，有相当的地点时就可以举行，派兵士去做并没有困难，而且他们必定也很欢喜来干。另一方面，在学术科施行中都要特别注意射击教育，加多射击教育的时间，举行射击比赛。以后军部拟在每一个月至两个月之间，召集一次各纵队及军直属队的体力比赛和射击比赛，由各部挑选选手参加，分别给奖，以资鼓励（比赛办法临时再行拟定颁布）。现在各纵队和军直属队就要开始准备，要知道这是增进红军战斗力的唯一要件。望各部长官负责转达各兵佐一体知照，并督促执行为要。此令。"},{"type":"paragraph","text":"军长朱德政治委员毛泽东"}],"authors":["毛泽东"],"dates":[{"year":1930,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":81,"page_end":82},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0165a26cc4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
