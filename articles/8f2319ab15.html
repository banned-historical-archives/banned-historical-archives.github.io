script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"徐铸成在社外编委会议上的发言","authors":["徐铸成"],"dates":[{"year":1956,"month":9,"day":14}],"is_range_date":false,"parts":[{"text":"徐铸成在社外编委会议上的发言","type":"title"},{"text":"徐铸成","type":"authors"},{"text":"【一】1956年9月14日“文汇报”第一次社外编委会议","type":"subtitle"},{"text":"“‘文汇报’于4月底休刊，旋即去北京改为教师报，这样一办，不久之后，各方面便发觉有不妥之处，中央宣传部也找我们谈话，最后决定‘文汇报’在上海复刊，……","type":"paragraph"},{"text":"全国性报纸不一定要在北京出版，上海是国际大都市，‘文汇报’在上海有根基，所以决定十月一日在上海复刊。复刊后的‘文汇报’应不同于以前的‘文汇报’，应当具有自己的特色和个性，应当反对公式和教条。‘文汇报’的主要对象从前是中小学教师，以后将是高级知识分子和一般知识分子。","type":"paragraph"},{"text":"报纸当然要刊载新闻，但是‘文汇报’将着重国内外文化、科学消息的报道。我们当努力鼓励知识分子发表意见，展开讨论，反映知识分子工作、生活各方面的问题，在报道文化、科学的消息中，当注重日本及亚非各国。","type":"paragraph"},{"text":"根据我们的对象是知识分子这一特点，我们除采用新华社电讯以外，还要进行自由采访，刊载我们自己的通讯和专电。","type":"paragraph"},{"text":"关于版面，目前这样打算：","type":"paragraph"},{"text":"第一版：重要新闻。","type":"paragraph"},{"text":"第二版：文化、学术上的新闻和文稿，中心在百家争鸣。我们想一开始就鸣，而不拟讨论怎样去鸣。这一版将报道那些问题正在鸣，分歧之处何在，并指出鸣的趋向。","type":"paragraph"},{"text":"第三版：一部分刊载综合性文艺，包括新的和旧的，其余地位用作付刊。碰到星期天，读者大都在家休息，我们的版面安排都稍有不同，例如第三版就可以专稿影剧。","type":"appellation"},{"text":"……”","type":"paragraph"},{"text":"【二】1956年1重月30日“文汇报”第二次社外编委会议","type":"subtitle"},{"text":"“‘文汇报’继续出版，到现在正是两个月。现在销数约13万，本市两万余，其余都在外埠，销行面很广。取得这些成绩，是执行编委会的方针的结果。但还存在缺点，社内编委检查的结论是：","type":"paragraph"},{"text":"编辑部人力还相当薄弱，外埠只北京、南京、广州有特派记者，北京阵营较强。现在设法扩大记者网，希望做到国内各大城市、江南各小城市、各文化学术机关团体都有特约记者。","type":"paragraph"},{"text":"读者对论坛情报、教育生活、新闻窗、外论选译等都表示欢迎。不少读者希望我们对资本主义国家的情况多多介绍。在这方面，有两个困难：一、所订资本主义国家的书刊要到明年一月以后才能收到；二、缺乏外语人才，最近聘到俄文、日文翻译各一人，懂法文的人还找不到。","type":"paragraph"},{"text":"读者的批评是：报上旧东西偏多，干涉生活的东西嫌少，培养新生力量还做得不够。","type":"paragraph"},{"text":"以我们现有的力量和社会给予的支持，我们应当比现在做得好些。可是，我们……，已经冒出了骄傲自满的情绪。此外，严重的保守思想还存在着。","type":"paragraph"},{"text":"……”    （摘自“文汇报”会议纪录）","type":"paragraph"},{"text":" 来源：《右派分子徐铸成的言论作品选》 ，中华全国新闻工作者协会.人民大学新闻系 编，人民大学新闻系1957年10月出版。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f2319ab15"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
