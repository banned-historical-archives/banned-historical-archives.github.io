tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国毛泽东文艺思想学术讨论会在石家庄举行","authors":["李荣琨"],"parts":[{"type":"paragraph","text":"学术讨论会收到四十多篇学术论文。会上，就如何在新的历史时期继承和发展毛泽东文艺思想，搞好文艺创作、文艺批评和文艺研究，清除形形色色的精神污染，繁荣社会主义文艺等方面问题，进行了学术交流和热烈的讨论。"},{"type":"paragraph","text":"与会同志运用毛泽东文艺思想，对当前我国文艺界少数人中出现的某些资产阶级自由化倾向，如有些人企图摆脱党的领导，认为文艺可以离开政治，对深入生活有反感，片面强调表现“自我”，以所谓的“社会主义异化论”作为文艺创作的主题，以及文艺商品化等，进行了严肃而认真的批评。"},{"type":"paragraph","text":"大家认为，毛泽东思想哺育了一代又一代新人。党的文艺工作者只有努力学习与运用毛泽东文艺思想，深入生活，深入实际，才能看清社会的本质和发展方向，才能获得文艺创作的源泉，才能创作出既能正确地表现人民群众在四化建设中的英雄业绩和精神风貌，又为广大人民群众所理解、所接受、所欢迎的文艺作品。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d33933c082"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
