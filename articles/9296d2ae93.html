<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海基层工厂职工要求“放”的情势日趋紧张","authors":["人民日报记者　季音"],"dates":[{"year":1957,"month":5,"day":29}],"is_range_date":false,"parts":[{"text":"上海基层工厂职工要求“放”的情势日趋紧张","type":"title"},{"text":"人民日报记者　季音","type":"authors"},{"text":"在上海知识界大“鸣”、大“放”之后，上海基层工厂的职工要求“放”的情势最近已日趋紧张。几天前才基本平息了的大批艺徒的闹事，最近几天来新的罢工、集会、准备游行示威等事件又突然增多，一部分工厂则正在“冒烟”、“冒火”，如不及时处理，很可能也要延烧开来。","type":"paragraph"},{"text":"目前基层工厂已经闹事和正酝酿闹事的工厂，大都是公私合营工厂，闹事的焦点是工资福利问题，值得注意的是：目前的闹事有向更大规模、更有组织的方面发展的趋势，据上海市委工业部初步调查，最近此类闹事已发现数起，如榆林区新丰纺织厂六百多职工的闹事，很有组织，成立了司令部，控制了全厂宣传工具，有站岗、联络，在19日下午三时召开全体大会，提出“团结就是力量”、“反对分化”等口号，公开反对干部召开小座谈会与家属访问。这个厂的闹事是要求恢复折扣工资。又如卢湾区天翔毛纺厂也有一百多人集会闹事。杨浦区上海钢窗厂19日中午四十多人集会，选出六个代表要求与工厂谈判工资改革问题。","type":"paragraph"},{"text":"目前闹事有向更公开合法斗争的形式发展的迹象。最近上海发现有工人田国瑞等公开组织一个“平难会”组织，在公共汽车站等行人要道公开散发传单，“要求民主，平等，反对官僚主义，”当群众把他们扭送到派出所后，田等提出抗议，认为派出所违反宪法，结果只好释放，市工联等找这些为首的人谈，怎么也不能说服他们。据实步调查，这些工人都没有发现有什么政治历史问题。","type":"paragraph"},{"text":"反革命政治活动在基层工厂也在抬头，卢湾区上海滚轴厂发现反动标语：“打倒共产党，拥护国民党，我们队伍快要进大陆。”上海铁路东站举行“庆祝青年团三大联欢会”后，发现一条标语：“青年们，我们是有灵魂的人，国家正在走向死亡，起来吧，打倒上海市长！”江南造船厂技工学校也发现有“打倒共产党”等标语。","type":"paragraph"},{"text":"群众要求“放”，使有些工作只好停顿，无法进行。据江宁区委工资改革办公室反映：该区有五个厂群众自动“放”(即对领导提意见)了起来，工改工作贯彻不下去。如荣华印染厂工人们在分组讨论工改时，大家从工资问题转而到对工厂领导提意见(群众对工资问题意见很大)，群情激愤，有的拍桌打凳，骂公方厂长是“骗子”，“贼坯”，“你在也好，你不在也好，反正我们不承认你是公方代表。”黑板报上也“放”了起来，出现了“去了只狼(指资本家)，来了个贼(指公方代表)”的标题。另一个协顺源翻砂厂的工人也“放”了起来，骂公方厂长是“阎罗王”，骂党支部是“派出所”。这些工厂大都是问题积压较多，工人们情绪虽有些偏激，但大多数意见还是正确的。","type":"paragraph"},{"text":"在基层工厂干部中，目前委屈情绪比较普遍，特别是一些已发生问题的工厂，许多干部认为过去坚决执行上级的决定，现在错了，群众就斗争我们，领导上又要我们向群众检讨认错。上海永大染织一厂闹事问题在上海党刊上发表后，不少党的基层干部给党刊编辑室写信，认为报道有片面，把过错全部推在基层干部身上，把工作成绩抹煞，这是不公平的。他们谴责领导上对基层干部支持不够。目前比较多的基层党员干部是不知道怎么办?终日坐在办公室里惶惶无主，有的不敢和群众见面。","type":"paragraph"},{"text":" ----来源：1957年5月29日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9296d2ae93"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
