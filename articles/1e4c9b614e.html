高举“工人和学生团结起来反对资产阶级政权！”“政权归于工人阶级！”等标语牌","authors":[],"dates":[{"year":1968,"month":10,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资本家残酷剥削　争取改善工作和生活条件"},{"type":"paragraph","text":"意大利劳动人民纷纷示威和罢工"},{"type":"paragraph","text":"示威者高举“工人和学生团结起来反对资产阶级政权！”“政权归于工人阶级！”等标语牌"},{"type":"paragraph","text":"据新华社十八日讯　罗马消息：意大利劳动人民不顾反动当局的野蛮镇压，最近在许多城市举行示威和罢工斗争，要求改善工作和生活条件，抗议资本家对他们的残酷剥削。"},{"type":"paragraph","text":"十六日，来自意大利南部整个加拉布里亚区的一万多名农业和工业工人，和许多大学生和中学生一起，在科森萨举行游行示威，要求充分就业，增加工资。示威者高举许多红旗和标语牌，标语牌上的口号有：“工人和学生团结起来反对资产阶级政权！”“政权归于工人阶级！”游行队伍中，有些群众高举的标语牌上写着他们的祝愿：祝毛主席万寿无疆！有些群众还高举毛主席语录牌。"},{"type":"paragraph","text":"在经过长时间的游行后，示威群众举行了大会。在会上，工人们相继发表讲话，谴责资本家和政府对他们的压迫和剥削。警察对示威群众进行了野蛮的袭击，他们向示威者扔催泪弹，并用棍棒打人。示威者用石块和木棒英勇还击。"},{"type":"paragraph","text":"由于意大利垄断资产阶级不断解雇工人以加强剥削，加拉布里亚区目前的农业就业人数比一九五一年减少了百分之五十以上，工业就业人数下降了将近百分之十五，失业人数不断增加，工人的生活日益困苦。"},{"type":"paragraph","text":"在威尼斯、巴勒摩、彼萨等其他城市，十六日也分别举行了游行示威，抗议资本家对工人的剥削和警察镇压工人斗争的暴行。在意大利中部的拉蒂纳市的四万名产业工人，十六日开始举行四十八小时总罢工，要求增加工资。在都灵，“兰查”汽车制造厂工人的罢工斗争已经进入第七天，他们同警察进行了英勇斗争。"},{"type":"paragraph","text":"意大利中部杜斯卡纳区彼萨市两千名玻璃制造工人，最近举行罢工，抗议资方无理解雇四百多名工人。"},{"type":"paragraph","text":"罢工工人十五日上午在工厂外面筑起路障，断绝了工厂的交通，坚持罢工斗争。工人的正义斗争得到了许多大学生的支持。"},{"type":"paragraph","text":"意大利反动当局出动数百名警察，阴谋破坏罢工，警察向工人施放催泪弹，企图拆除路障。但是，工人和大学生不畏强暴，同警察进行了英勇搏斗，打退了警察的多次进攻。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e4c9b614e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
