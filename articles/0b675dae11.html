art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"首都群众昨天买到《毛泽东选集》十六万册","authors":[],"parts":[{"type":"paragraph","text":"据新华社十四日讯 今天，北京市新华书店在门市部发行《毛泽东选集》十六万册。冒雨排队购买毛主席著作的革命群众，人人喜气洋洋，书店里一阵阵响起“毛主席万岁！”“战无不胜的毛泽东思想万岁！”等口号声，和《大海航行靠舵手》、《东方红》等颂歌。"},{"type":"paragraph","text":"北京市新华书店遍布城区郊区的六十多个门市部，今天敲锣打鼓，燃放鞭炮，呈现出节日般的欢乐景象。许多人买到新出版的《毛泽东选集》万分欣喜，情不自禁地高呼口号，欢跃雀跳，尽情表达他们对毛泽东思想的无限信仰，无限崇拜，无限热爱。在公主坟门市部一位工人带头高呼：“读毛主席的书！听毛主席的话！照毛主席的指示办事！”在前门门市部一位战士带头高呼：“伟大的毛泽东思想万岁！”在西单商场门市部一位学生带头高呼：“把无产阶级文化大革命进行到底！”“毛主席万岁！万万岁！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b675dae11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
