论宝库","authors":[],"dates":[{"year":1977,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年十二月二十七日电　“马来亚革命之声”电台十二月二十六日全文广播了毛主席著作《关心群众生活，注意工作方法》。这家电台在广播前发表的按语指出:“这篇四十三年前发表的光辉著作，对各国人民的革命斗争和革命战争，仍然具有普遍的指导意义。”"},{"type":"paragraph","text":"按语说:“伟大革命导师毛泽东同志关于人民战争和群众路线的思想，极大地丰富了马克思列宁主义的理论宝库，《关心群众生活，注意工作方法》是体现这一思想的经典著作之一。”"},{"type":"paragraph","text":"按语说:“我国全体革命同志和一切先进分子，都应该认真学习这篇光辉著作，领会其精神实质，并结合各地区各单位的实际情况加以运用。在我们党领导的长期革命斗争和革命战争中，涌现出不少很好地密切联系群众的革命同志和先进分子，我们要不断总结和推广他们的经验。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82856902bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
