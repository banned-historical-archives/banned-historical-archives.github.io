script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"胡曲园认为中国没有经过奴隶社会","authors":[],"dates":[{"year":1987,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"复旦大学胡曲园教授最近对《社会科学报》记者说，我国当代一些历史著作，都认为公元前17世纪的西周是奴隶社会，他对此说持否定态度。胡曲园说，社会性质是由社会的生产关系决定的。据古籍记载，商、周社会奴隶数量都很少，在生产上不占主导地位，占主导地位的是在井田制度下生产的公社农民。所以不能千篇一律地认定原始社会的解体形式都是奴隶社会。古希腊在公社解体后，由于奴隶劳动得到高度发展，才被人们算作奴隶社会，中国古代却不存在这个事实。原始社会情况各不相同，解体形式也不一样。古希腊公社解体后成为奴隶社会，斯拉夫和日耳曼人公社解体后成为农奴社会。由于古代东方长期存在土地公有制的形态，形成东方社会发展的特点。研究历史不能套用一个公式。私有制时代的任何社会，都可能有奴隶制度存在。"},{"type":"paragraph","text":"(摘自《社会科学报》)"}],"comments":[],"origin":"《社会科学报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e56468ca7d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
