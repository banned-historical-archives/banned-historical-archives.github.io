<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"无限敬爱毛主席　热情洋溢颂领袖  外国朋友最爱唱《东方红》和《大海航行靠舵手》","authors":[],"dates":[{"year":1967,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无限敬爱毛主席　热情洋溢颂领袖"},{"type":"paragraph","text":"外国朋友最爱唱《东方红》和《大海航行靠舵手》"},{"type":"paragraph","text":"本报讯　每天都有许多来自世界各地的外国朋友在我们伟大的祖国进行访问。他们看到了我们的国家在毛主席的英明领导下，已成为世界革命的坚强堡垒，对我们伟大的领袖更加崇敬和爱戴。他们在旅途中经常热情高歌《东方红》、《大海航行靠舵手》等歌曲，来表达他们对毛主席的无限热爱。"},{"type":"paragraph","text":"在从武汉到长沙航程中的飞机上，阿尔巴尼亚歌舞团的战友们同中国同志一起热情洋溢地高唱《大海航行靠舵手》，并且还在狭小的机舱里表演了歌舞《万岁毛主席》。他们表演得那么认真，充分反映出他们无限热爱毛主席的真挚感情。"},{"type":"paragraph","text":"有几位越南贵宾和乘务员一起歌唱《伟大的领袖毛泽东》之后，拉着乘务员的手说：“我深深地体会到中国人民在毛泽东时代的幸福和对毛主席的热爱。”"},{"type":"paragraph","text":"在由广州飞往北京的飞机上，几个泰国朋友学会了《大海航行靠舵手》和一首毛主席语录歌。他们对乘务员表示感谢，并且激动地说：“现在中国人民和世界人民这样热爱毛主席，但在泰国却没有唱这些歌曲的自由。你们太幸福了。”他说话的时候，禁不住热泪盈眶。"},{"type":"paragraph","text":"在广州机场候机室里，有一次，十几位尼泊尔朋友和中国同志一道，热情洋溢地放声歌唱伟大的领袖毛主席。他们认真地看着歌谱反复唱了三遍《东方红》，情绪一遍比一遍高昂。尼泊尔朋友说：“世界上有了毛泽东，不但你们幸福，我们也幸福，全世界人民都幸福。”然后，他们又激动地唱起了《大海航行靠舵手》。他们还请翻译发口令：“一、二、三”，然后一齐高声朗读毛主席语录，读完之后又激动地唱起了毛主席语录歌。"},{"type":"paragraph","text":"许多外国朋友非常喜爱歌唱我们伟大领袖毛主席的歌曲，他们无论在哪里，只要有机会就请中国同志教他们唱。一位已经上了年纪的外国朋友学会《东方红》第一段歌词后说：“我的脑子不好使，学不好，但我有信心学会它。”一位日本朋友也表示：“我要下定决心，排除万难，学会中国革命歌曲，回去还要教会我的妻子和孩子们。”他们一面放声歌唱，一面翘起大拇指，表示对毛主席的敬爱。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47feb1471b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
