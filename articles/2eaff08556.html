tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"巴勒斯坦人民的斗争终究会取得胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社10月9日讯 中共中央副主席邓小平今天上午在人民大会堂会见了巴勒斯坦解放组织执行委员会主席、巴勒斯坦革命武装力量总指挥亚西尔·阿拉法特和由他率领的巴勒斯坦解放组织代表团。"},{"type":"paragraph","text":"贵宾们来到会见厅时，邓小平迎上前去，同他们亲切拥抱。他说，非常欢迎阿拉法特兄弟。"},{"type":"paragraph","text":"在交谈中，邓小平说，你们处在民族解放斗争的前线，是我们的战友。我们支持巴勒斯坦人民的解放斗争是始终一贯的。他说，巴勒斯坦人民的斗争是长期的，但你们是终究会取得胜利的。"},{"type":"paragraph","text":"阿拉法特说，中国人民对我们斗争的支持，我们是永远不会忘记的。"},{"type":"paragraph","text":"邓小平说，我们的支援是有限的，主要靠你们自己，靠阿拉伯国家和人民的团结。"},{"type":"paragraph","text":"国务院副总理兼外交部长黄华、外交部副部长何英、中国人民解放军总参谋长助理徐信参加了会见。"},{"type":"paragraph","text":"巴勒斯坦解放组织驻北京办事处主任马哈茂德会见时也在座。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2eaff08556"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
