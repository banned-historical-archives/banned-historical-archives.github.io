ates":[{"year":1966,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们获得了伟大的武器"},{"type":"paragraph","text":"——毛泽东思想"},{"type":"paragraph","text":"东非反帝战士"},{"type":"paragraph","text":"我们热爱毛主席，我们伟大的导师，"},{"type":"paragraph","text":"您是我们革命道路的缔造人；"},{"type":"paragraph","text":"我们要忠实地跟随着您，"},{"type":"paragraph","text":"把斗争进行到底。"},{"type":"paragraph","text":"毛主席，您说出的每一句话，"},{"type":"paragraph","text":"都这样亲切，刚强有力；"},{"type":"paragraph","text":"您的声音给我们大家带来了希望，"},{"type":"paragraph","text":"带来了勇气和友谊。"},{"type":"paragraph","text":"有了您伟大的毛泽东思想，"},{"type":"paragraph","text":"我们就一定能够战胜帝国主义，"},{"type":"paragraph","text":"也能够战胜现代修正主义，"},{"type":"paragraph","text":"和国内的一切反动分子。"},{"type":"paragraph","text":"我们祝愿毛伯伯万寿无疆，"},{"type":"paragraph","text":"好让您领导我们在暴风雨里前进，"},{"type":"paragraph","text":"使革命的航船驶向我们的目的地，"},{"type":"paragraph","text":"让全世界属于无产阶级。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3beba78d39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
