ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"一面支持斗争一面保存干部","alias":"","parts":[{"type":"paragraph","text":"一面支持斗争一面保存干部"},{"type":"paragraph","text":"（1943年8月11日）德怀同志："},{"type":"paragraph","text":"关于一面支持斗争，一面大批保存干部的观念，除你以外，大都是不正确的。聂区所送干部好的重要的甚少，中央已去电要他们从直属机关、学校（党校、抗大）及北岳、冀中、平北各区抽调好的高级上级干部四百至五百人送延学习（可有一部分最好的中级干部)。请你和刘、邓、杨、黄等说通，从直属机关、学校，从太行、太岳、冀南、冀鲁豫，抽调好的真正可造的高级上级干部五百左右送延学习，其他大批中级干部及犯错误有嫌疑而前方不好处的人亦可送延，但不在此数目内。边区物资条件增加二三万兵、一二万干部，不成问题。边区今年雨量充足，可望丰收。"},{"type":"paragraph","text":"毛泽东未真"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":8,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":141,"page_end":141},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5a3779542"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
