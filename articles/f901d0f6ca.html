art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席戴过的斗笠","authors":["晓白"],"parts":[{"type":"paragraph","text":"这是我们敬爱的领袖毛主席三十七年前戴过的斗笠，它引我们联想起光荣而艰苦的战斗岁月。"},{"type":"paragraph","text":"一九二九年一月中旬，毛主席亲自率领红四军主力部队，由井冈山向江西南部和福建西部进军，打破了敌人对井冈山的包围，并在赣粤闽三省边境转战千里，在当地革命武装和群众配合下，经历了数十次胜利战斗，开辟了赣西南和闽西革命根据地。"},{"type":"paragraph","text":"部队向江西边境进发时，天气忽然转冷，雨雪交加。毛主席当时就戴着这顶斗笠率领红军在雨雪中前进。"},{"type":"paragraph","text":"当红军到达瑞金城北约二十里的黄柏墟一带宿营时，正巧是旧历大年夜。这时江西敌军刘士毅尾追在后。毛主席就指挥红军利用大柏地以南的有利地形，等待敌人。就在大年初一的早上，红军以胜利的枪声迎来了新春，经过终日激战，打败了敌人，并俘虏了敌团长以下八百余人，获得了这次进军中最大的一次胜利。"},{"type":"paragraph","text":"我们伟大的领袖毛主席，为了中国人民的解放事业，在那艰苦的革命年代里，穿着草鞋，戴着斗笠，终年终日地率领着革命队伍转战南北，为革命开拓道路。就在春节时分，仍然坚持战斗，从胜利走向新的胜利。（晓白）"}],"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f901d0f6ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
