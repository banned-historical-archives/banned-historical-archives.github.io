ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"坚持国共长期合作","alias":"","parts":[{"type":"paragraph","text":"坚持国共长期合作"},{"type":"paragraph","text":"（1940年3月9日）伍、李转洛阳刘、袁二同志："},{"type":"paragraph","text":"（甲）各电均悉。目前并不是什么由小决裂到大决裂，你们在外商谈要沉着、坚定，静待指示。关于普东南问题，由朱、彭答复你们以归统一。关于整个方针问题，子久可于本月十八日到西安与林老见面，接受指示。林老约一星期后由延动身去西安。（乙）袁见卫先生时，可告他中共中央坚持国共长期合作，始终不变。对蒋（介石）、程（潜）、卫（立煌）、阎（锡山）诸先生领导抗战，深表敬意。惟对一部分不讲合作、专讲磨擦的人极为不满。对八路军待遇不公，对边区不加承认，对华北不承认抗日政权，对全国不承认党派自由，对宪政采取压制政策，对舆论剥夺一切自由，深表不满。希望卫先生转达蒋先生公平处理，合理解决，是所盼望。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九日午并告朱、彭、杨[1]这是毛泽东给伍云甫、李涛转洛阳刘子久、袁晓轩的电文。袁晓"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":464,"page_end":464},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb7b1f19cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
