<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"当代爱娃·布劳恩斯在行动德国妇女极右组织一瞥","authors":["陈正权"],"dates":[{"year":1992,"month":12,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"爱娃·布劳恩斯系纳粹德国头目希特勒的私人秘书兼情妇，以追随纳粹法西斯的第三帝国而臭名远扬。谁曾料想，在第三帝国灭亡了将近半个世纪之后。纳粹的幽灵重又复活，德国出现了规模不小的“第四帝国运动”。更没有人会想到，在这股极右翼势力中竟然有一批由妇女组成的右翼组织。她们打着极右翼思想的旗号，公然宣称怀念第三帝国的“黄金时代”，对第三帝国的缔造者们大行顶礼膜拜。德国舆论将她们称为“当代的爱娃。布劳恩斯”，是再确切不过的了。"},{"type":"paragraph","text":"阿曼达·多缪拉今年十八岁，她的家乡霍伊尔斯沃达位于德国东部。她是德国各地正在崛起的妇女极右翼组织“雷尼斯”中的一位成员。只见她剃着近乎光秃的头，身着黑色皮茄克，脚踩一双大皮靴，给人以不寒而栗之感。在多缪拉家的大门上，贴着一面红、黑、白三色相间的第四帝国“国旗”，一张印有当年德国陆军元帅兴登堡肖像的名信片恭恭敬敬地钉在卧室的墙壁上，旁边是一幅德国地图，引人注目的是这张地图将波兰、捷克和奥地利的部分领土也纳入了德国的领地。"},{"type":"paragraph","text":"在德国一些地区连续发生令人震惊的残害外国难民的事件后，德国政府终于采取了行动。先是禁止一个新纳粹党的非法活动，接着又逮捕了一个自封的暴力组织的成员。据政府有关部门调查，在目前德国持极右翼政治观点的人士中，女性占相当数量，而且她们的观点也更为极端。例如，一个名为“青年北欧海盗”的颇有影响的妇女组织的主张之一是，凡父母属于非纯德国血统，其后代应在胎儿期实施流产，以免日后遭受种族歧视。这个组织的一位代表人物声称，“我们的主张与希特勒并不完全相同。我们不需要奥兹维辛。但我们由衷地感到，三十年代的德国领袖们远比今天高谈阔论的政治家们更理解德国人民最需要的是什么，那就是，重建一个德国人的德国，所有外国人滚出德国去。”"},{"type":"paragraph","text":"德国内务部长西特斯刚刚签署了宣布右翼组织德国选择党为非法组织的法令。然而，法令的墨迹未干，该党党魁弗兰克·休伯纳就在一次集会上公然叫嚣:“在未来二十年里，我们将向全世界显示并传播我们的信念。”"},{"type":"paragraph","text":"据政府的一项正式调查，目前持极右翼观点的四十万德国人中，约有三分之一是女性。其中的大多数都居住在德国西部。更有甚者，妇女极右翼组织的许多成员都把自己的孩子送到只有德国子弟入托的幼儿园。一家婚姻介绍机构也打出“保证推荐德国纯血统配偶”的招牌招徕生意。由此看来，当代爱娃·布劳恩斯们的所作所为，对德国人的思想意识所起的影响，决不在暴徒们的打砸烧杀抢之下，应该引起人们足够的警惕。　陈正权"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b9e2960d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
