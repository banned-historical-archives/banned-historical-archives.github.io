<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"有批判地带鉴资产阶级经济学说","authors":["翟中"],"dates":[{"year":1984,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"翟中"},{"type":"paragraph","text":"本文认为:何文提出了一个值得重视的问题，基本观点是正确的。但关于借鉴具体方法等论点不够全面。"},{"type":"paragraph","text":"何根祥同志《关于借鉴国外经济学说的几点看法》一文，提出了一个经济学界值得重视的问题。对资产阶级经济学说，确实应该有选择地“引进”，有批判地借鉴，有原则地吸收。"},{"type":"paragraph","text":"资产阶级经济学说作为新兴产业资本的意识形态，出现于十七世纪。从亚当·斯密开始，资产阶级经济学家一直把生产资料私有制作为其理论的前提。形形色色的资产阶级经济理论在本质上是一致的，它们无法揭示社会经济发展的规律性，把资本主义看作永恒的制度，并竭力为之辩护。19291933年资本主义大危机的爆发，使凯因斯主义应运而生。它以强调国家干预经济的理论取代了传统的庸俗资产阶级经济学而成为“主流派”。然而，自七十年代以来，资本主义国家矛盾加剧，出现了通货膨胀、经济停滞和失业上升的并发症，因此，许多资产阶级经济学家不得不承认凯因斯主义失灵了。但他们并不懂得经济危机是资本主义的不治之症，而是梦想着寻找新的灵丹妙药。由于他们的阶级局限性，他们为当前资本主义经济国境所献的谋策始终不能见效，而只能停留在孰是孰非的文字争吵上。可见，资产阶级经济学的本质和思想体系是反科学的，与马克思主义经济理论水火不相容。何文提出我们不能盲目地引进西方经济学说，是十分正确的。"},{"type":"paragraph","text":"但是何文的某些论点尚有不够全面之处，试作几点补充。"},{"type":"paragraph","text":"资产阶级经济学家无法揭示社会经济发展的规律性，但他们出于为资本主义制度服务的目的，对社会经济现象确实作了大量的研究。因此，资产阶级经济学对社会经济现象的描述、分析方法以及所提出的政策手段，是有可借鉴之处的。然而，即使是这些具体方法和政策手段，也不能盲目照搬，而应该在分析其产生的前提下加以改造和利用。如现代资产阶级微观经济理论中关于需求、供给、价格的许多分析，也是以私有制下资本完全自由竞争为条件的。就是人们经常谈及的“投入产出分析”方法，也有它的理论基础，即瓦尔拉的一般均衡分析和凯因斯的总量分析。当然，经过分析批判后，“投入产出分析”作为一个通过建立大型数学联立方程式、从量上对国民经济各部门之间或部门内各环节之间的生产与分配的相互关系进行分析的方法，可以为我们进行国民经济综合平衡所利用。此外，“微观”和“宏观”的界限并非泾渭分明，两者与资本主义制度的关系很难说孰大孰小。何文如能注意到这几点，整个立论也就更严谨了。"},{"type":"paragraph","text":"对于资产阶级经济学家用于描述其理论体系和分析方法的概念和术语的利用，何文未涉及。这里我谈点粗浅的看法。这些概念和术语大致可分为几类:一、有些概念是仅适用于描述资本主义经济，是不科学的，不能利用。例如“投机动机”、“流动陷阱”。二、有些概念的内容经过重新定义，其名称可以使用。例如政治经济学这个概念就不是马克思首先提出的，但马克思重新对其进行了科学的定义而继续使用这个名称。三、有些概念本身是正确的，可以使用。有些虽不十分科学，但目前尚无更恰切概念代替，暂时借用似乎也可以，如第一产业、第二产业、第三产业。"},{"type":"paragraph","text":"总而言之，对资产阶级经济学说的借鉴和利用，都要建立在批判分析的基础上。只有这样，才能坚持和发展马克思主义经济科学，建立有中国特色的社会主义经济理论。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5319f47617"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
