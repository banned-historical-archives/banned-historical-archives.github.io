rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国人民支持阿拉伯各国人民毛主席；朱副主席接见阿联军事代表团穆罕默德·易卜拉欣团长举行辞行宴会","authors":["郝建国"],"parts":[{"type":"paragraph","text":"新华社4日讯毛泽东主席在今晚接见了以易卜拉欣中将为首的阿拉伯联合共和国军事友好访华代表团，进行了一个多小时谈话。"},{"type":"paragraph","text":"毛主席对贵宾们说，中国人民得到了阿拉伯联合共和国的友谊，感到非常高兴。"},{"type":"paragraph","text":"毛主席说，全世界人民都支持你们，支持阿拉伯各国人民。我们是站在反殖民主义斗争的一条战线上，相互支持，相互关怀。"},{"type":"paragraph","text":"毛主席请贵宾们把问候带给纳赛尔总统，祝他身体健康。"},{"type":"paragraph","text":"在接见的时候，易卜拉欣团长表达了代表团对中国人民的友好祝愿，感谢中国人民对阿拉伯人民反殖民主义斗争的支持，并且把纳赛尔总统给毛主席的信和礼品转给了毛主席。"},{"type":"paragraph","text":"接见时在座的，有彭德怀元帅和肖向荣中将，以及阿拉伯联合共和国驻中国大使馆临时代办谢宾尼。"},{"type":"paragraph","text":"又讯 4日下午，朱德副主席也接见了穆罕默德·易卜拉欣团长和团员萨勒姆中将、卡里姆准将、蒙大奇上校。"},{"type":"paragraph","text":"又讯 阿拉伯联合共和国军事友好访华代表团团长穆罕默德·易卜拉欣中将4日为代团即将结束在中国的访问举行辞行宴会。"},{"type":"paragraph","text":"今晚出席宴会的有：朱德副主席、周恩来总理、彭德怀元帅、陈毅元帅和我军高级将领。"},{"type":"paragraph","text":"我团外交部副部长章汉夫、中阿友好协会会长包尔汉和各国驻我国外交使节和武官也出席了宴会。"},{"type":"paragraph","text":"穆罕默德·易卜拉欣团长在宴会上说：我们同属于亚非地理政治地区。我们感到骄傲的是：万隆会议和开罗会议决议中所包含的理想，在现在平衡国际政局中产生了巨大的力量。"},{"type":"paragraph","text":"他说：当侵略行动在埃及发生的时候，中国政府强有力地谴责了这种攻击。我们也永远不会忘记你们当帝国主义对我国北部地区叙利亚从事阴谋活动时，给予我们的支持。"},{"type":"paragraph","text":"彭德怀元帅在宴会上也讲了话。他说：代表团在我国的参观访问对于加深我们两国人民和军队间的相互了解和友谊起了重要的作用。"},{"type":"paragraph","text":"彭德怀元帅说：帝国主义国家，特别是美帝国主义，从来没有放松对亚非国家进行颠复活动和其他侵略阴谋。目前，美国就正在直接地并且通过蒋介石集团援助印度尼西亚的叛乱分子。我们必须保持高度的警惕，加紧团结，粉碎帝国主义的一切阴谋。  本报记者 郝建国摄"}],"alias":""},"tags":[{"name":"朱德","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5dae5c56c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
