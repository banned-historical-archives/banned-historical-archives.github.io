外侈谈自由而国内黑人却处于奴隶地位","authors":[],"dates":[{"year":1963,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“自由如此可贵，值得为此付出生命！”"},{"type":"paragraph","text":"美国黑人继续举行反迫害示威"},{"type":"paragraph","text":"揭露肯尼迪在国外侈谈自由而国内黑人却处于奴隶地位"},{"type":"paragraph","text":"新华社一日讯　华盛顿消息：美国堪萨斯州堪萨斯城的上千名黑人，昨天冒着酷热游行示威，抗议种族歧视和种族主义者对黑人的迫害。"},{"type":"paragraph","text":"示威者举着的标语牌上写着：“现在就要自由！”“就业机会均等！”“权利而不是诺言！”"},{"type":"paragraph","text":"一名示威者在发表讲话时说：“自由是如此可贵，它是值得为之付出生命的。（杰克逊城的黑人领袖）埃弗斯就是这样做的。”他说，然而，“自由的观念不是一颗子弹所能平息得了的。”"},{"type":"paragraph","text":"二十九日，纽约市有二千多名黑人在哈莱姆黑人区游行、集会，对黑人在美国所处的无权地位表示抗议。黑人穆斯林运动领袖马尔康·爱克斯向示威群众发表讲话时说，他不知道，在美国还有大量黑人实际上处于奴隶地位时，肯尼迪怎么能够到外国去向外国人谈自由。"},{"type":"paragraph","text":"同一天，在加利福尼亚州的陶兰斯，约三百名黑人和其他有色人也举行了示威，抗议当地白人拒绝把房产出卖给黑人、东方人及墨西哥血统的人。当局出动警察来对付示威者，并逮捕了十个人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc64e4fc40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
