ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对北京市公安局军管会《关于举办释放学生犯学习班的情况报告》的批语","alias":"","parts":[{"type":"paragraph","text":"对北京市公安局军管会《关于举办释放学生犯学习班的情况报告》的"},{"type":"paragraph","text":"批语"},{"type":"paragraph","text":"（1968年7月24日）林、周及文革各同志阅。"},{"type":"paragraph","text":"[1]北京市公安局军管会1968年7月16日给北京市革委会、卫戌区的这个报告说，遵照中央、中央文革指示，我们于6月11日至7月6日，举办了第一期释放学生犯学习班，收效很大。我们的体会是：一、对犯罪的青年学生，很需要做争取教育工作，他们中的绝大多数是可以教育争取过来的。二、从政治上启发觉悟入手，以自我教育为主，开展大摆、大颂、大批、大挖的“四大”活动，是促使他们自觉认罪，把他们争取教育过来的有效办法。三、专政机关的一套旧的办案作风和办案路线，必须大破，非改不可。"},{"type":"paragraph","text":"[2]林，指林彪，在中共八届十一中全会上继续当选为中央政治局常委，不久被称中央副主席。周，指周恩来。对北京市公安局军管会《关于举办释放学生犯学习班的情况报告》的批语"},{"type":"paragraph","text":"二这样做很对。对犯罪者应当扩大教育面，缩小打击面。"},{"type":"paragraph","text":"毛泽东七月廿四日"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":7,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":221,"page_end":222},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"535e0382af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
