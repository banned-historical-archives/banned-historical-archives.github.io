tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底挖掉修正主义的思想根子","authors":["4796部队战士","张义合"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“世界观的转变是一个根本的转变”。破私立公，是转变世界观的关键问题。为公还是为私，是无产阶级和资产阶级的两种根本对立的世界观。一心为公，一切为公，大公无私，是无产阶级的世界观。一心为私，一切为私，损公利己，是资产阶级的世界观。公和私是矛盾的，对立的，斗争的，在人们头脑里经常打架，不是公吃掉私，就是私吃掉公，绝对不能“公私合营”、“公私溶化”、“合二而一”。"},{"type":"paragraph","text":"中国赫鲁晓夫宣扬“公私溶化”论，其实就是要人们假公营私，私而忘公，损公肥私。"},{"type":"paragraph","text":"中国赫鲁晓夫所以大肆鼓吹“公私溶化”论，完全是出于他推行资产阶级反动路线的需要。他妄图在人们头脑里灌输“私”字，膨胀“私”字，培植修正主义的根子，以便他复辟资本主义。"},{"type":"paragraph","text":"我们坚决贯彻执行伟大领袖毛主席要斗私，批修的最新指示，用马克思列宁主义、毛泽东思想同自己头脑里的“私”字作斗争，树立共产主义的世界观，彻底铲掉修正主义的根子，使自己成为一个识大体、顾大局、大公无私的无产阶级革命战士。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"416dfdef39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
