art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿劳动党代表团到北京邓小平等同志到机场欢迎","authors":[],"parts":[{"type":"paragraph","text":"新华社14日讯 应中国共产党中央委员会邀请前来中国参观访问的阿尔巴尼亚劳动党代表团，在今天上午乘飞机到达北京。代表团团长是阿尔巴尼亚劳动党中央政治局委员、中央书记处书记希斯尼·卡博，团员有政治局候补委员拉米兹·阿利雅，中央委员、斯库台区党委第一书记舒勒·巴霍里，中央委员、科尔察区党委第一书记拉马丹·江戈利，候补中央委员、卢什尼州党委第一书记拉彼·捷尔曼尼，农业部副部长米蒂·拉搏，组织部副部长米哈尔·彼沙，佩什考比区党委第一书记雅沙尔·曼泽尔吉乌，文化教育部副部长彼彼·米特罗约尔吉，费里区执行委员会主席法伊克·阿赫麦蒂，贝拉特区执行委员会主席亚尼·巴斯科，阿尔日尼亚劳动青年联盟中央委员会巡视员于生·谢哈伊。"},{"type":"paragraph","text":"代表团在机场受到中共中央总书记邓小平的热烈欢迎。前往机场欢迎的，还有中共中央书记处书记王稼祥、候补书记杨尚昆，中央委员伍修权和中共中央机关负责工作人员熊复、李启新、张香山等人。"},{"type":"paragraph","text":"前往欢迎的还有阿尔巴尼亚驻华大使巴利里。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5e30be7c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
