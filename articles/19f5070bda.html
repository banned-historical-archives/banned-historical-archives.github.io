script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴玻等国公众舆论怒斥美洲外长会议　可耻决议全拉丁美洲人民支持古巴继续前进　美洲国家组织成了美国垄断集团统治和剥削政策的工具","authors":[],"dates":[{"year":1962,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴玻等国公众舆论怒斥美洲外长会议"},{"type":"paragraph","text":"可耻决议全拉丁美洲人民支持古巴继续前进"},{"type":"paragraph","text":"美洲国家组织成了美国垄断集团统治和剥削政策的工具"},{"type":"paragraph","text":"新华社2日讯　巴西、玻利维亚、乌拉圭和智利一些报纸、工会组织和政界人士猛烈抨击美洲外长会议在美国挟持下通过反对古巴的决议。"},{"type":"paragraph","text":"巴西《新方针》周刊社长奥尔兰多·崩芬在这家报纸上发表文章说，美国代表团在埃斯特角会议上使用了一切讹诈和收买的手段。美洲国家组织已经成了美国垄断集团统治和剥削政策的工具。"},{"type":"paragraph","text":"巴西三十五个工会和工人联合会交给古拉特总统和内维斯总理一份备忘录，表示支持古巴人民的自决权，反对美洲外长会议通过反古巴的决议。"},{"type":"paragraph","text":"在这份备忘录上签字的有：巴西产业工人全国联合会、银行雇员工会、铁路工人工会、冶金工人工会等工会的领导人。"},{"type":"paragraph","text":"乌拉圭共产党机关报《人民报》1日发表社论说，“1962年1月31日这一天将作为美洲国家组织的末日的开始载入史册。”这家报纸在分析埃斯特角美洲外长会议通过反古巴的决议时说，如果有人考虑到美国是从很早以前就准备这次外长会议而且企图强迫其他拉丁美洲各国接受制裁古巴作为进行“集体”军事侵略的先行的直接步骤的话，那末现在的情况没有使得国务院得到满足。"},{"type":"paragraph","text":"《人民报》指出，事实证明，美洲国家组织已经成了为五角大楼和华尔街的帝国主义和战争政策效劳的军事和政治集团。"},{"type":"paragraph","text":"智利工人统一工会领导机构1月31日致电古巴总统多尔蒂科斯表示，智利工人欢迎古巴政府在外长会议上反映拉丁美洲人民的实际思想和这种态度。电报说，“我们将为反对美帝国主义而斗争到底。”"},{"type":"paragraph","text":"同一天，智利社会进步运动发表公开声明，谴责美洲外长会议是“一个无耻的国际阴谋，其目的是摧毁不干涉原则”。声明同时号召全国青年和各政党的成员走上街头去表示他们对古巴革命的支持。与此同时，智利十名参议员和三十三名众议员发表联合声明，谴责美洲国家组织外长会议通过的决议是“一个将会造成流血和痛苦的违背历史的荒谬事件。”"},{"type":"paragraph","text":"智利中学生联合会号召所属基层组织保持警惕和保卫古巴革命。"},{"type":"paragraph","text":"智利《最后一点钟》报发表社论，谴责美国使用美元压力取得虚伪的多数，达到开除古巴出美洲国家组织的目的。社论说，美洲国家组织已经变成为美国政府控制的用来反对拉丁美洲各国人民利益的政治、军事集团。社论最后说，这一干涉古巴的无耻决议，决不能把古巴驱逐出美洲的范围，古巴在拉丁美洲人民的支持下，将继续存在下去，拉丁美洲人民怀着钦佩和骄傲的心情注视着古巴的斗争。"},{"type":"paragraph","text":"玻利维亚首都拉巴斯出版的官方报纸《晚报》在一篇抨击埃斯特角会议上所提出的关于“古巴和泛美制度不相容”的问题的社论中说，这个问题并不存在，恰恰相反，拉丁美洲各国人民的愿望和古巴的愿望是一致的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19f5070bda"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
