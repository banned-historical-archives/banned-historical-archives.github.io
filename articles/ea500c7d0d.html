，同资产阶级精神污染作斗争","authors":["周臻","陈可雄"],"dates":[{"year":1983,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京十月二十日专电　《中国青年》杂志社今天下午在人民大会堂隆重纪念创刊六十周年。党和国家领导人余秋里、胡乔木、邓力群、郝建秀、许德珩以及首都各界人士四百人出席了茶话会。邓力群、胡乔木、余秋里先后讲了话。"},{"type":"paragraph","text":"邓力群说，我们从事的事业是千秋万代的共产主义伟大事业。《中国青年》走过了六十年的里程，还是很年轻的，而且会更年轻。他希望《中国青年》社同志认真学习党的二中全会精神，总结经验，继续前进。"},{"type":"paragraph","text":"胡乔木说，“六十年前创办的《中国青年》、中国青年运动，是在传播马列主义、共产主义思想方面有着光荣的传统，并在同错误思想倾向作斗争中发展起来的。”他希望继续发扬这个光荣传统，帮助和引导青年读者认清和坚持正确的方向和道路，投身到建设社会主义物质文明和精神文明的伟大事业中去。"},{"type":"paragraph","text":"胡乔木在会上回忆他在二十年代第一次读到《中国青年》时的情景。他说，马列主义、共产主义思想通过各种渠道、各种形式影响着中国的历史和文化。否定五四以来中国历史和文化是在共产主义思想影响下发展起来的，这是对历史的歪曲。"},{"type":"paragraph","text":"余秋里在会上希望，要继续引导青年学习马列主义、毛泽东思想，引导青年树立共产主义的理想，坚定不移地走社会主义道路，提倡一不怕苦、二不怕死和艰苦奋斗的精神，同资产阶级的精神污染作坚决斗争。"},{"type":"paragraph","text":"参加今天纪念活动的，还有中央各部委负责同志，在京的部分省市党委书记和历届团中央领导人。"},{"type":"paragraph","text":"(本报驻京记者"},{"type":"paragraph","text":"陈可雄　周臻)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓力群","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"余秋里","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea500c7d0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
