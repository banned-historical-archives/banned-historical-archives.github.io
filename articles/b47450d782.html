,"dates":[{"year":1966,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蒙古革命群众赞扬中国文化大革命"},{"type":"paragraph","text":"中国红卫兵做得对做得好"},{"type":"paragraph","text":"据新华社乌兰巴托电　中国的无产阶级文化大革命在蒙古的革命群众中也受到了热烈的赞扬。一位蒙古朋友称颂中国的无产阶级文化大革命是“当代无产阶级的一种新型革命”。一位医生说，“中国红卫兵的革命行动做得很对，做得很好。”"},{"type":"paragraph","text":"九月中旬，中国驻蒙古某单位展出了毛主席畅游长江和毛主席在北京天安门广场同百万群众一起欢庆无产阶级文化大革命的胜利等图片。这些图片吸引了蒙古各阶层的观众。从早到晚，观看图片的人络绎不绝。他们满怀激动的心情，边看边欢呼“毛泽东非常好！”“毛泽东万岁！”"},{"type":"paragraph","text":"一位装卸工人说：“中国正在进行的文化大革命是完全必要的。蒙古的老百姓非常向往新中国。毛泽东是世界人民的革命领袖，我要为毛泽东的事业奋斗到底，我要为增进蒙中两国人民的友谊而努力。”他激动地高呼：“毛主席万岁！毛主席万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b47450d782"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
