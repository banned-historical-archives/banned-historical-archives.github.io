script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“留苏、留助教有宗派主义”","authors":["伍奂中","何玉辉","刘侠","北京地质勘探学院","姚铣","袁傅织","高明球"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“留苏、留助教有宗派主义”","type":"title"},{"text":"北京地质勘探学院姚铣伍奂中刘侠高明球何玉辉袁傅织","type":"authors"},{"text":"姚铣说：","type":"appellation"},{"text":"党员提拔快，留苏，进修有优先权，这也许是个事实（因为我只是从“鸣放”中看到的）。是否有必要这样做呢？我想这和党对科学的领导问题有关。有许多业务上不是很好的党员学生，优先选派去留苏或留下做教学，科研工作，业务上还不是很好的党员被选拔为教研室的领导，在学术教学单位党员有无比的权力。党这样做的意图也许是要侭量争取党对科学的领导，但这些作的都很勉强，都很使人不能心悦诚服，这样必然使一些更有培养前途的人才埋没了，就使有才能的，有学识的教授和老师的积极性降低，请问党委对科学领导的目的是什么？是为了要领导而领导的呢？还是要使在党的领导下科学水平更快地赶上超过世界先进水平呢？我认为党对于科学在政治，方针，组织上可以同时也应该领导，但是对于业务方面应该是可能领导就领导，不可能就不要勉强。因为党领导的目的就是要科学水平提高的更快，而党员，我想在业务上倒下一定是由“特殊材料”做成的。","type":"paragraph"},{"text":"我们都清楚地晓得党在解放全人类的先锋队，是一个大公无私的，但是如果首先解放自己，照顾自己，就会使其肩负的历文革命无法完成。","type":"paragraph"},{"text":"伍奂中认为过去选派留学生是把青年人筛了又筛，损害青年人的自尊心。","type":"paragraph"},{"text":"刘侠说：","type":"appellation"},{"text":"留学生是按百分比出国的，其中百分之九十是团员和党员。劳动模范都是上级捧出来的，评劳模先讲政治条件，没有政治条件永远评不上。","type":"paragraph"},{"text":"高明球说：","type":"appellation"},{"text":"留苏有宗派主义，毛主席的儿媳妇学习不好也留苏，很多大干部子弟都去了。","type":"paragraph"},{"text":"何玉辉说：","type":"appellation"},{"text":"近年来留下来的助教，都不是最好的，将来的教员业务水平不高的情况也未必能改进。","type":"appellation"},{"text":"现在派出去的留学生，那些外汇的一大部份是无法挽回的损失了。","type":"paragraph"},{"text":"袁傅织：","type":"appellation"},{"text":"留苏、提拔干部是党员。出身于反动家庭的子弟，则前途断送了。","type":"paragraph"},{"text":" 来源：北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2486a2b67"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
