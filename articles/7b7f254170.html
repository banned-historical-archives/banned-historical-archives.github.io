art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"带他们学好毛主席著作","authors":["李荫炎"],"parts":[{"type":"paragraph","text":"本报讯福州部队某部四连三排，组织新战士活学活用毛主席著作，按毛主席的指示，树立当好普通一兵的思想。"},{"type":"paragraph","text":"新战士补到三排以后，干部和老战士立即研究了如何带好新战士的问题。他们联想自己入伍后的进步体会，认为带好新战士的最有效办法，就是带他们学习毛主席著作。于是，老战士和新战士一起，学习了《为人民服务》、《愚公移山》等文章，边读，边讲，边谈心得体会，收效很好。新战士严春堂学习后，懂得了为谁当兵，为谁打仗，表示要安心服役，努力学好政治和军事。新战士廖天海说：“入伍后第一个收获就是学了毛主席著作，懂得了什么叫做为人民服务。”他在训练中苦练杀敌本领，不怕苦不怕累。"},{"type":"paragraph","text":"现在三排的新战士进步很快，已经初步掌握了军事技术，能够单独执勤。他们普遍要求到最前沿的哨所，担负艰巨的任务。 （李荫炎）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b7f254170"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
