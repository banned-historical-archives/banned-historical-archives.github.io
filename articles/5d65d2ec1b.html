ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"注意分割敌人逐一歼灭之","alias":"","parts":[{"type":"paragraph","text":"注意分割敌人逐一歼灭之"},{"type":"paragraph","text":"（1947年8月15日）彭："},{"type":"paragraph","text":"寒未电悉。（一）完全同意你的部署，但请注意分割该敌为几部分，逐一歼灭之。二十八旅主力可能随钟松前进。（二）刘4十六日进绥德，十七日补粮，要十八日才能开始北进，故南面顾虑甚小。（三）我们今十五日至乌龙铺。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"删丑"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给西北野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]指1947年8月14日13时彭德怀给中共中央军委的电报。电报说：刘令三十六师向米脂前进，西北野战军准备歼击之。拟集中第二、三两纵队和教导旅、新编第四旅，由西北向东南歼击三十六师于李家沟、鱼河堡、上盐湾及其以北地区。"},{"type":"paragraph","text":"[3]钟松，当时任国民党军整编第二十九军第三十六师师长。[4]刘，当时任国民党军整编第二十九军军长。[5]乌龙铺，镇名，位于陕西佳县西南。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":208,"page_end":208},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d65d2ec1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
