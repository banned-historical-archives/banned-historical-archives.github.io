script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本报纸发表社论谴责一小撮极右分子的反华行径  日中航空协定的签订将进一步巩固两国关系","authors":[],"dates":[{"year":1974,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本报纸发表社论谴责一小撮极右分子的反华行径"},{"type":"paragraph","text":"日中航空协定的签订将进一步巩固两国关系"},{"type":"paragraph","text":"新华社东京一九七四年五月十七日电　日本报纸发表社论，对日本国会通过日中航空运输协定表示欢迎，并谴责日本一小撮极右分子的反华行径。"},{"type":"paragraph","text":"《日本经济新闻》五月十七日题为《在巩固日中邦交正常化的基础上前进！》的社论说：“人们希望日中航线开设以后，两国之间在政治、经济、文化等广阔的领域内的交流往来更加活跃，并给整个亚洲、太平洋地区带来良好影响。”"},{"type":"paragraph","text":"社论说，“自从今年一月五日正式签订日中贸易协定以后，大平外相为早日缔结航空运输协定作了积极努力，这也是因为他认识到日中复交的意义和发展。”"},{"type":"paragraph","text":"社论在谴责自民党内一小撮极右势力的反华行径时指出，自民党内的“日华关系议员恳谈会”和“青岚会”等一小撮极右分子阻挠国会通过日中航空运输协定，是“妄图使历史车轮倒转”，这是“不能允许的”。"},{"type":"paragraph","text":"日本《朝日新闻》五月十六日发表的社论说，众参两院通过日中航空运输协定，表明这项协定的缔结“得到绝大多数国民的支持”。社论说，“日中航空协定的签订，与先前签订的贸易协定一样，将进一步巩固日中关系的基础。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcba14e325"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
