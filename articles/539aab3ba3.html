ors":[],"dates":[{"year":1976,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　反击右倾翻案风的斗争开展以来，上海人民出版社美术读物编辑室的领导和编辑创作人员，在社党委领导下，认真学习了毛主席一系列重要指示，召开了几十次批判会，举办了两条路线对比展览会，以无产阶级文化大革命前后的美术出版物作对照，深入批判不肯改悔的走资派邓小平抛出的“三项指示为纲”的修正主义纲领，反击文艺界的右倾翻案风。"},{"type":"paragraph","text":"为了回击右倾翻案风，这个编辑室将无产阶级文化大革命前后出版的美术读物，以对比的方法展览出来，用事实来歌颂无产阶级革命文艺路线，批判为十七年修正主义文艺路线翻案的种种谬论。文化大革命前的十七年，在修正主义文艺黑线的统治下，出版界的一部分人反对宣传马列主义、毛泽东思想，反对出版工作为无产阶级政治服务，为工农兵服务，篡改党的“双百”方针，大搞资产阶级的一“花”独放，鼓吹资产阶级自由化，让资产阶级“专家”、“权威”甚至资产阶级右派、反革命分子霸占了美术出版阵地，而广大工农兵作者却被拒之于出版社大门之外，美术读物上大量刊登的是封资修、洋名古作品，出版事业成了资产阶级专政的工具。"},{"type":"paragraph","text":"无产阶级文化大革命夺回了被一小撮走资派篡夺的领导权，工人阶级进驻上层建筑领域领导斗批改，狠批了反革命的修正主义文艺黑线，加强了对资产阶级的全面专政。以革命样板戏为标志的文艺革命，推动了美术创作出版工作的开展。该室的美术工作者创作了各种形式的美术作品，发挥了教育人民、打击敌人的作用。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展后，激发了该室广大革命美术工作者的工作积极性和创作热情。前一段时间，连环画创作组部分专业和业余作者在短短的十七天内就创作了十二幅歌颂社会主义新生事物的组画《新生事物赞》。年画、宣传画组的同志，也在突击完成两张反击右倾翻案风的宣传画创作以后，立即投入创作纪念无产阶级文化大革命十周年宣传画的战斗。大家决心用美术读物作武器，深入批判邓小平的反革命的修正主义路线，保卫文化大革命的胜利成果，为巩固无产阶级专政而战斗。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"539aab3ba3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
