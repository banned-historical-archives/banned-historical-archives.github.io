" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0390c365-6951-4e70-9dc5-9f7aa4c900ab","name":"哥达纲领批判（人民出版社1971年版）","internal":false,"official":true,"type":"pdf","author":"马克思，人民出版社1971年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/0390c365-6951-4e70-9dc5-9f7aa4c900ab.pdf"],"article":{"title":"马克思致威廉·白拉克","alias":"","parts":[{"type":"paragraph","text":"马克思致威廉·白拉克"},{"type":"paragraph","text":"1875年5月5日于伦敦亲爱的白拉克："},{"type":"paragraph","text":"对合并纲领的下列批评意见，请您阅后转交盖布和奥艾尔、倍倍尔和李卜克内西过目。我工作太忙，已经不得不远远超过医生给我规定的工作时间。所以，写这么多张纸，对我来说决不是一种“享受”。但是，为了使党内的朋友们——而这些意见就是为他们写的——以后不致误解我这方面不得不采取的步骤，这是必要的。这里指的是，在合并大会以后，恩格斯和我将要发表的一个简短的声明，声明的内容是：我们和上述原则性纲领毫不相干，我们和它毫无共同之点。"},{"type":"paragraph","text":"这样做是必要的，因为在国外有一种为党的敌人所热心支持的见解"},{"type":"paragraph","text":"一一一种完全荒谬的见解，仿佛我们在这里秘密地领导所谓爱森纳赫党的运动。例如巴枯宁还在他新近出版的一本俄文著作5里要我不仅为这个党的所有纲领等等负责，甚至要为李卜克内西自从和人民党6合作以来所采取的每一个步骤负责。"},{"type":"paragraph","text":"此外，我的义务也不容许我即使只用外交式的沉默方法来承认一个我认为极其糟糕的、会使党堕落的纲领。"},{"type":"paragraph","text":"5一步实际运动比一打纲领更重要。所以，既然不可能—而局势也不容许这样做———超过爱森纳赫纲领，那就干脆缔结一个反对共同敌人的行动协定好了。但是，制定一个原则性纲领（应该是把这件事情推迟到由较长时间的共同工作准备好了的时候再做），这就是在全世界面前树立起一些可供人们用以判定党的运动水平的界碑。拉萨尔派的领袖们之所以跑来靠拢我们，是因为他们为形势所迫。如果一开始就向他们声明决不会拿原则来做交易，那末他们就只好满足于一个行动纲领或共同行动的组织计划了。可是并没有这样做，反而允许他们拿着委托书来出席，并且自己承认他们的这种委托书是有约束力的，就是说，向那些本身需要援助的人们无条件投降。不仅如此，他们甚至在召开妥协的代表大会以前就召开代表大会，而自己的党却只是在事后才召开自己的代表大会。人们显然是想杜绝一切批评，不让自己的党有一个深思的机会。大家知道，合并这一事实本身是使工人感到满意的；但是，如果有人以为这种一时的成功不是用过高的代价换来的，那他就错了。况且，撇开把拉萨尔的信条奉为神圣这一点不谈，这个纲领也是非常糟糕的。我将在最近把《资本论》法文版的最后几册寄给您。排印工作因法国政府禁止而耽搁了很久。在本星期内或下星期初本书可以印完。前六册您收到了没有？请把伯恩哈特·贝克尔的地址告诉我，我也要给他寄最后几册7去。6"},{"type":"paragraph","text":"《人民国家报》出版社有一种特别的习气。例如到现在为止连一本新版的《科伦共产党人案件》也没有给我寄来。"},{"type":"paragraph","text":"致衷心的问候。"},{"type":"paragraph","text":"您的卡尔·马克思"}],"authors":["马克思"],"dates":[{"year":1875,"month":5,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":10,"page_end":12},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca950ca605"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
