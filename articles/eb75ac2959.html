uthors":[],"dates":[{"year":1969,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"安阳市医药公司中药批发部深入开展革命大批判"},{"type":"paragraph","text":"狠批无政府主义　加强革命纪律性"},{"type":"paragraph","text":"据新华社郑州二十六日电河南省安阳市医药公司中药批发部革命领导小组遵照毛主席关于“加强纪律性，革命无不胜”的伟大教导，在领导群众开展革命大批判中，反复批判破坏统一纪律的无政府主义思想，不断提高革命干部和群众遵守统一纪律的革命自觉性，使革命和生产不断向前发展。"},{"type":"paragraph","text":"今年五、六月份，这个批发部草药组有极少数青年保管员，受无政府主义思潮的影响，劳动纪律松懈，擅离工作岗位，使这个草药组送药下乡工作受到影响。批发部革命领导小组成员和公司革委会委员一起，深入到草药组，进行调查研究，摸清情况。在这个基础上，他们发动批发部广大群众认真学习毛主席的光辉著作《关于纠正党内的错误思想》和《反对自由主义》，并领导群众以毛泽东思想为武器，以阶级斗争为纲，展开揭、议、批活动。揭，是大揭无政府主义的表现；议，是广泛议论无政府主义的危害；批，是对无政府主义倾向进行革命大批判。经过这些活动，广大群众的政治觉悟大大提高，及时刹住了无政府主义的歪风邪气，六、七月份，送药下乡工作欣欣向荣。"},{"type":"paragraph","text":"中药批发部革命领导小组在领导群众狠批无政府主义的同时，还及时表扬模范遵守革命纪律的同志。草药组青年保管员李学英就受到了表扬。前一段时间，无政府主义的歪风邪气刮到草药组时，她顶往了。有些人说她坚守工作岗位是“奴隶主义”，她立场鲜明地向大家说：“我遵守的是无产阶级革命纪律，这不叫‘奴隶主义’。破除不合理的规章制度，对于革命有好处，但是，合理的规章制度，不仅不能破，而且必须加强。”受到大家的好评。"},{"type":"paragraph","text":"这个批发部的革命领导小组在广大群众提高阶级觉悟和两条路线斗争觉悟的基础上，领导群众积极地、主动地建立了一些革命的新制度。由于新的制度是建立在群众自觉的基础上，因此，大家都能主动执行、积极维护。"},{"type":"paragraph","text":"通过对无政府主义的批判，这个中药批发部的革命群众进一步提高了阶级斗争和两条路线斗争觉悟，大大增强了严格遵守革命纪律的自觉性，促进了革命和生产不断向前发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb75ac2959"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
