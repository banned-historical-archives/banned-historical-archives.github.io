,"authors":[],"dates":[{"year":1953,"month":7,"day":30}],"is_range_date":false,"parts":[{"text":"美姑县“新三反”总结报告（节录）","type":"title"},{"text":"用捆打办法制止黑彝阿芦叶日买卖娃子。阿怀恨偷袭打伤干部2名。黑彝马二少爷骂王作仪同志（白彝王团长）是“三道娃子”，王不顾党的政策，从狭窄的阶级报复出发当众说：“白彝团结起来和黑彝分家”事后上层说：“王作仪跟毛主席多年了， 政策他了解”。群众因而怀疑我党政策将来要变。(p. 100)… 领导上的大汉族主义思想严重。阿芦叶日打伤干部以后， 公安局副局长秦绍列同志，认为必是彝族干部所为，把彝族干部的枪收了还不让动。… 彝族干部发生争吵，秦就喊警卫员把彝族干部王德才捆起来。 (p. 101) …修建上缺乏统一问题，… 盲目施工。有四间墙脚安好又挖掉，挖了又安。 钉橼一时出现架子太高文锯底。锯成4寸厚的橼板嫌厚又用斧头砍薄。另用推光头的办法砍伐森林。把拥有230株树的小森林一砍而光。其中有100株小树不成材。施工中反反复复，费工毁料，砍伐幼树，使国家财富受到不少损失。 (p. 104)","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36ce9e0d7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
