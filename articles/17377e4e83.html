" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西安市社会知识青年的苦闷","authors":["新华通讯社","西安晚报“内部参考”"],"dates":[{"year":1962,"month":8,"day":15}],"is_range_date":false,"parts":[{"text":"西安市社会知识青年的苦闷","type":"title"},{"text":"新华通讯社西安晚报“内部参考”","type":"authors"},{"text":"本刊讯  西安市没考上学校或退学的一些知识青年，现在大都呆在家里，绝大多数表现苦闷、悲观，认为自己“命运多舛，前途茫茫”。有一个退学学生写诗道：“十二年寒窗白受苦，学的东西没处用。花了家里钱，还是落个空。回到家里真苦情，生不逢时运不能。”有的说：“政府把人弄的上不能上，下不能下。过去我抱负很大，决心为国家作一番事业，现在一回家，什么都完了。”","type":"paragraph"},{"text":"为什么苦闷、悲观？据说有“四怕”：一怕荒废学业，担心时间久了，把过去学的东西都忘光了。二怕在家里呆不住。有些靠哥嫂生活的学生，更觉得低声下气。有的说：“过去上学时，一两周回一次家，父母爱如掌上明珠；现在整天蹲在家里，家里人一见就感到厌烦。”三怕舆论压力。认为回到家里后，亲戚和周围群众说长论短，谁都看不起。四怕家里生活没办法，逼自己作投机生活(有的家庭是这么做的)。","type":"paragraph"},{"text":"关于组织自学问题，社会知识青年的想法也是各式各样的：(1)对自学的意义认识不够，学习不安心，想学就来，不想学就走。(2)认为自学没前途。如说：“出路问题不解决，学出来又能干啥？”有的认为自学“学不出名堂，学不到知识”。(3)街道自学条件不好，没合适的内容，没地址，没教师辅导，要求不一致，难于学好，难于坚持下来。","type":"paragraph"},{"text":"目前他们参加生产劳动的机会不多。但从一些青年的言论中，可以看出如果真的让他们参加劳动，也还会挑挑拣拣，会有各种思想问题的。比如，现在就有强调身体不好，不愿上山下乡。他们说：我要是愿意上山下乡的话，就不回家来了。有的失学的女学生怕下乡，忙在城市里找对象结婚。对于参加城市服务行业，有的青年也有些阻力，不愿干理发、搓澡等服务性劳动。有的青年已学会了钉锅，每天游街串巷揽活，但却认为“这是没办法，穷凑合而已”。但是对跑自由市场，有些青年却很感兴趣，认为“这样既轻松，来钱又容易”。","type":"paragraph"},{"text":"来源：1962年8月15日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17377e4e83"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
