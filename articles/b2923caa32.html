ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"全局关键在于隔断南北敌人联系歼灭美军第二师","alias":"","parts":[{"type":"paragraph","text":"全局关键在于隔断南北敌人联系"},{"type":"paragraph","text":"歼灭美军第二师"},{"type":"paragraph","text":"（1950年11月2日）彭、邓\"，并告高："},{"type":"paragraph","text":"（一）各电均悉甚慰。全局关键在于我三十八军全军以猛速动作攻占军隅里”、价川、安州、新安州一带，隔断南北敌人联系，并坚决歼灭北进的美军第二师，此是第一紧要事，其余都是第二位。"},{"type":"paragraph","text":"（二）伪八师全部及伪六师之十九团都在清川江北岸之胡沙洞、凤舞洞等处。只有伪七师在清川江以南之军隅里、松亭、价川等处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月二日二十二时"},{"type":"paragraph","text":"[1]彭、邓，指彭德怀、邓华，当时分别任中国人民志愿军司令员兼政治委员和副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]高，指高岗，当时任东北军区司令员兼政治委员。[3]军隅里，位于平安南道价川郡南部。[4]价川，位于平安南道北部。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":342,"page_end":342},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2923caa32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
