"dates":[{"year":1968,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿根廷“拉普拉塔”炼油厂的七千八百名工人，不顾反动当局的威吓，继续坚持从九月二十五日开始的罢工斗争，要求厂方取消延长工作时间等加紧剥削工人的措施。门多萨省的三千五百名石油工人宣布将举行罢工，声援“拉普拉塔”石油工人的正义斗争。阿根廷罗萨利奥一家电机厂的罢工工人在二十二日占领了工厂，同企图镇压他们的警察部队展开了激烈的搏斗。"},{"type":"paragraph","text":"智利首都圣地亚哥的美资智利电力公司的全体雇员和智利国家电力公司的电机技术员，二十三日举行罢工，要求增加工资。瓦尔迪维亚市一家鞋厂的工人为抗议解雇工人，举行了六天罢工后占领了工厂。"},{"type":"paragraph","text":"厄瓜多尔同古拉瓦省的工人联合会二十日宣布罢工，支持贝努斯鞋厂工人的斗争。这个鞋厂的工人曾提出了增加工资等要求，但一直遭到资方的顽固拒绝。"},{"type":"paragraph","text":"乌拉圭首都蒙得维的亚的报纸印刷工人不顾当局禁止罢工的法令，从二十日起又举行罢工，要求增加工资。新闻记者也同时举行罢工。到二十三日止，这个城市已连续四天没有报纸出版。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e18b7bd966"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
