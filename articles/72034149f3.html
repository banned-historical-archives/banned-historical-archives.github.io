<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于对右派分子不宜过早地作组织处理的指示","authors":[],"dates":[{"year":1957,"month":8,"day":29}],"is_range_date":false,"parts":[{"text":"中共中央关于对右派分子不宜过早地作组织处理的指示","type":"title"},{"text":"四川省委并告各省、市、自治区党委：","type":"appellation"},{"text":"八月二十七日电悉。","type":"paragraph"},{"text":"目前反右派斗争正在继续开展和深入，对于右派分子的斗争，应是从政治上和思想上进行彻底揭露把他们搞臭，但还不宜于过早地作组织处理，因为这样做会使斗争简单化，不利运动的深入和开展。在全国范围内，像张志和而且比他更多罪恶的人还有不少，对张志和过早进行组织处理，将牵涉到对其他右派分子的处理问题。请你们先在党内说清楚，并向党外说明这一问题。","type":"paragraph"},{"text":" 中央一九五七年八月二十九日","type":"paragraph"},{"text":"附：","type":"subtitle"},{"text":"中共四川省委关于撤消张志和代表资格的请示","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"民盟中央委员、全国政协委员、四川省人民代表张志和，在“民主”“革命”外衣掩护下，一贯从事反党、反人民活动，罪恶极为严重。一九三○年九月三日，党所领导的江津部队起义，张（系该起义部队副师长，当时系党员）由蓉星夜赶回，亲自坐堂审问，当场杀死共产党员和起义人士六十多人。不仅如此，他还将一个起义领导人（党员）头上打三个眼，插上香腊“活祭”一个在起义中被打死的反动军官；还把一个受伤被俘的女党员浑身脱光，亲自百般侮辱和严刑拷打，致成残废。解放前夕，不顾民盟决议和我地下党的劝告，张在川、康各地大肆发展地主反动武装，企图割据西南，与我为敌并有他发表的反动宣言为据。解放后，该反动武装纷纷叛乱。此外，张还与张群及西南特务头子徐远举、徐中齐等相勾结，一九四七年六月虽被捕，但又得特别待遇释放，其中真假尚待续查。当年十一月，他同范朴斋联名登报解散四川省和成都市民盟组织，即系根据徐远举的指示。解放后，先后参加罗隆基集团和章、罗联盟，积极进行反动活动。","type":"paragraph"},{"text":"以上严重罪行，在此次省人代会上揭发并在报上披露后，群情激动。反映非常强烈，会内会外纷纷要求撤消其代表资格，并依法处理。工农代表更义愤填膺，坚决要求将其交回邛崃原籍或金堂原选区，由群众处理。而张本人则百般狡赖顽固，在人证俱全的情况下亦拒不承认，也不认罪，企图顽抗到底，群众对此尤为义愤，绝大多数人民代表（包括左派，中左，中中及多数中右分子）坚决要求处理。省委考虑：张志和过去罪行严重，他的反动本质很难争取改变。为了同对付一般右派分子有所区别，在这种情况下，确有对张志和加以适当处理的必要。不如此，我们将很难说服广大群众，对人代大会这样一个权力机关的多数意见也难于交代。因此，省委提议：通过省人代大会建议原选区撤消其代表资格，并交由省人委继续审查斗争，弄清他的问题。当否，请能于本月二十九日前复示。","type":"paragraph"},{"text":" 中共四川省委一九五七年八月二十七日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72034149f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
