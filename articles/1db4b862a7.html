torical-archives/banned-historical-archives8/main/maoquanji4-2.pdf"],"article":{"title":"减字木兰花·广昌路上","alias":"","parts":[{"type":"paragraph","text":"减字木兰花·广昌路上！"},{"type":"paragraph","text":"（1930年2月）漫天皆白，雪里行军情更迫2头上高山，风卷红旗过大关3。此行何去？赣江风雪迷漫处。命令昨颁，"},{"type":"paragraph","text":"十万工农下吉安"},{"type":"paragraph","text":"[1]广昌路上，广昌，县名，在江西省东部。1930年2月中旬，毛泽东率红军准备攻打赣江西岸江西省中部重镇吉安时经过这里。因当时国民党军调集7个旅12个团，开始对赣西南革命根据地和红军进行“会剿”，毛泽东、朱德等遂决定不攻吉安，改在吉水县水南、吉安县值夏一带，打孤军进犯的国民党军唐云山旅。"},{"type":"paragraph","text":"[2]情更迫，首次发表时原作“无翠柏”，人民文学出版社1963年12月版《毛主席诗词》改为“情更迫”。"},{"type":"paragraph","text":"[3]大关，指险要关隘。"},{"type":"paragraph","text":"[4]赣江，江西省主要河流，由章水、贡水流到赣州市汇合而成，北流经吉安、南昌注入鄱阳湖。"},{"type":"paragraph","text":"[5]吉安，现为市，在江西中部，赣江西岸。毛泽东手书《减字木兰花·广昌路上》特"},{"type":"paragraph","text":"11"},{"type":"paragraph","text":"111《雪里行军》（诗意画）"},{"type":"paragraph","text":"报赔汉海"},{"type":"paragraph","text":"命美"},{"type":"paragraph","text":"大汉今风关卷实"},{"type":"paragraph","text":"此行红H年"},{"type":"paragraph","text":"明"},{"type":"paragraph","text":"络"},{"type":"paragraph","text":"影吉安颁米"},{"type":"paragraph","text":"旗高"},{"type":"paragraph","text":".学"},{"type":"paragraph","text":"过漫"},{"type":"paragraph","text":"大"},{"type":"paragraph","text":"厂《岁月》（诗意画）《风卷红旗过大关》（诗意画）天背白面里行罩远化图高山风巷红柜"},{"type":"paragraph","text":"去赣江风年减字水兰花"},{"type":"paragraph","text":"十万工月司"},{"type":"paragraph","text":"雪旗情清"},{"type":"paragraph","text":"过情下迷漫大夏美治"}],"authors":["毛泽东"],"dates":[{"year":1930,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":41,"page_end":48},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1db4b862a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
