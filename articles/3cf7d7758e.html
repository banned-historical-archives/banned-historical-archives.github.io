":["毛泽东"],"dates":[{"year":1967,"month":2}],"is_range_date":false,"parts":[{"text":"关于斗争方式方法问题的指示","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"斗争要文明些。我们是无产阶级专政，要高姿态，高风格。北京街上标语水平不高，到处都打倒，砸烂狗头。哪有那么多狗头，都是人头。这样搞群众很难理解。搞喷气式飞机，照象片、登报，贴在大街上让外国记者搞走了。现在要将斗争水平提高，现在水平太低。八月初也没有这么凶嘛！斗倒、斗臭，要在政治上斗臭。要对后代进行教育，不然，将来他们掌权了，也这样干。这就太简单化了。他们认为这样斗臭了，还有把别人生活上的问题摆出来，也叫斗臭了，我看不合适，主要是政治上的斗臭。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cf7d7758e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
