"authors":["徐家选","谢邦民"],"dates":[{"year":1985,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"原武汉地区帮派头目杨道远"},{"type":"paragraph","text":"因“文革”中打砸抢曾被判刑"},{"type":"paragraph","text":"释放后经济犯罪再次入狱"},{"type":"paragraph","text":"新华社武汉10月29日电　（记者谢邦民、通讯员徐家选）原武汉地区帮派头目杨道远打着搞活经济的旗号，进行经济犯罪活动，最近，被武汉市中级人民法院依法判处徒刑十五年，剥夺政治权利五年。"},{"type":"paragraph","text":"杨道远在“文化革命”中因追随“四人帮”在武汉地区大搞抢枪夺权、抢夺公文档案等打砸抢活动，触犯了刑律，被判处有期徒刑。前年刑满释放后，他又暗中勾结原帮派头面人物和“文革”中犯有错误的人，进行经济犯罪活动。仅杨道远一人半年多贪污和非法牟利的金额就达三万四千六百元。今年6月底，武汉市人民检察院以贪污罪依法将杨道远逮捕归案。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"085ae01a89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
