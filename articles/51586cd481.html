:["廖汉生子女"],"dates":[{"year":1972,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"廖汉生子女给毛泽东的信（要点）","type":"title"},{"text":"廖汉生子女","type":"authors"},{"text":"〖廖汉生，原国防部副部长，北京军区政治委员。〗","type":"subtitle"},{"text":"（廖汉生自一九六七年一月八日被隔离审查，至今已经五年多了。）我们听到主席曾几次提到要让父亲出来工作，我们非常高兴，都盼望父亲能尽早的出来为党和人民重新工作。但是，至今不见有任何动静。我们请求让父亲回到北京，回到家里，在外面等待组织结论，以便让他了解形势，熟悉情况，检查身体，治疗休养，好更早地回到为党和人民工作的岗位上。","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51586cd481"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
