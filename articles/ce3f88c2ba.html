rs":["周恩来"],"dates":[{"year":1966,"month":7,"day":24}],"is_range_date":false,"parts":[{"text":"周恩来就工作组问题给刘少奇邓小平的信","type":"title"},{"text":"周恩来","type":"authors"},{"text":"昨晚所谈之事，经再三考虑，并又看了一些文件，不同意见主要由于对形势的估计和问题的认识而来，其他原因非主因，以不谈为妥，因看法不尽一致。在北京，工作组的派出，有它普遍性和必要性，但各个工作组在本单位所发生的情况又有其特殊性，这需要进行现场调查，作具体分析。工作关系，必须谈清，并做具体规定，否则不好工作。我今晨去外语学院看大字报，增加点感性认识。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce3f88c2ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
