script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对腐朽反动的资产阶级教育制度  日本高中学生运动继续迅速扩大","authors":[],"dates":[{"year":1969,"month":11,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对腐朽反动的资产阶级教育制度"},{"type":"paragraph","text":"日本高中学生运动继续迅速扩大"},{"type":"paragraph","text":"据新华社二日讯　据东方通讯社报道：日本高中学生反对腐朽反动的资产阶级教育制度的运动继续在迅速扩大。"},{"type":"paragraph","text":"在上一个星期内，东京的中央大学附属高中、上野高中和城北高中这三所高级中学的进步学生，奋起进行反对资产阶级教育制度的斗争，并且封锁了他们学校的教室。东京学艺大学附属高中的两百多名学生，为抗议学校当局勾结反动警察镇压学生，进行了坚决的斗争。"},{"type":"paragraph","text":"尽管佐藤反动政府进行疯狂镇压，日本高中学生的斗争仍然迅速扩展到全国各地。据报道，日本全国已有十八个县的一百零二所高级中学的学生开展了斗争，其中七十三所学校的学生到现在仍在坚持斗争中。今年高中学生参加学生运动的人数比去年增加了一倍以上。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57db641d50"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
