r":1984,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“文革”遗毒犹在"},{"type":"paragraph","text":"易炳仁"},{"type":"paragraph","text":"身为国家干部的魏向中，违反有关制度，受到干涉后，非但没有认错改错，反而恣意损坏公共财物，接连踢开几家的大门，又动手打伤前来劝架的六届全国人大代表唐佛南。蛮横无理，竟到了如此疯狂的地步！"},{"type":"paragraph","text":"对魏某人目无法纪的行为，人们并不陌生。“文革”中，打、砸、抢盛行，有些人就是这么干的。在动乱年代，象魏向中这样的人，年纪尚轻，没有当过什么“造反派”头头。但他们毕竟是从“文革”年代里走过来的，不可能不受到“左”的那一套的影响。而今“文革”遗毒犹在，遇有适当时机，就会在他们身上恶性发作。"},{"type":"paragraph","text":"从这一事件中，我们又一次看到，进行彻底否定“文革”教育多么重要！但是，仅有一般的教育是不够的。对于魏某人这样极少数至今仍在靠“闹”来攫取好处，违法乱纪的人，必须坚决绳之以法纪。否则，社会安宁、人民安居乐业就要成为一句空话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a4e313348"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
