script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共中央第十一次全体会议通过决议粉碎一切反党分子的叛变活动把陷入现代修正主义泥坑的神山茂夫和中野重治开除出党","authors":[],"dates":[{"year":1964,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京7日电　东京消息:日共机关报《赤旗报》最近发表了日本共产党中央委员会第十一次全体会议九月二十五日通过的“关于开除神山茂夫和中野重治出党的决议”。决议强烈谴责神山和中野和美帝国主义及日本垄断资本主义妥协，陷入了现代修正主义的泥坑。"},{"type":"paragraph","text":"决议说，神山和中野一直盲目屈从某个外国党。从这种现代教条主义的立场出发，同诸如志贺集团和春日庄次郎—内藤知周集团这样的各种反党、叛逆集团勾结在一起进行活动。他们一直在对日本共产党进行颠覆活动，现在正企图纠集各种反党叛逆分子组织“新的”集团。"},{"type":"paragraph","text":"决议说，作为党中央委员会委员的神山茂夫，自从去年五月以来就在东京以外进行秘密旅行，举行派别会议和进行反党活动。他们一直同志贺之流进行拉拢，随后在资产阶级刊物上发表反对党的文章，并通过在电台广播来攻击党。中野虽身为中央委员，但他不执行党的决议，反对党的政策，支持神山的立场。"},{"type":"paragraph","text":"神山和中野不但拒绝了党中央今年八月关于要他们接受调查、询问的决定，而且公然联合发表了反党的“告党内外书”、“备忘录”、“意见书”，并宣布了他们已同志贺等反党分子勾结在一起。"},{"type":"paragraph","text":"决议说:神山和中野在中央委员会第十次全体会议之后采取的这些行动，无可争辩地严重违反了党的纪律。事实证明第十次中央全会对他们采取的措施是正确的。"},{"type":"paragraph","text":"决议说，“我们党具有四十二年以上的革命传统，粉碎了一切反党分子的叛变活动，并依靠工人阶级和人民的斗争变得更加坚强了。我们党将粉碎一小撮颠覆分子的活动而继续前进。"},{"type":"paragraph","text":"新华社北京7日电　东京消息:旧本共产党机关报《赤旗报》四日发表社论，号召全体党员同反党分子进行坚决斗争。"},{"type":"paragraph","text":"《赤旗报》社论指出，反对美帝国主义和日本垄断资本的斗争正日益蓬勃地发展。在这种情况下，所有得到外国势力帮助的反党叛徒正在设法建立反对日本共产党的联合阵线，竭力破坏我们的党，并企图成立新的叛变的觉。"},{"type":"paragraph","text":"《赤旗报》说，志贺、铃木、神山和中野等采取了厚颜无耻的行动，他们装成遵守党纲、忠于革命纪律的样子，这是不能容忍的。很显然，他们没有任何资格谈论革命或马克思列宁主义。"},{"type":"paragraph","text":"《赤旗报》指出:他们不仅是破坏党的人，而且是阶级叛徒，他们严重地破坏了日本人民的解放斗争。"},{"type":"paragraph","text":"《赤旗报》号召党员提高警惕，提防对党进行的颠覆活动，同时进行建党工作，加强意识形态和理论上的武装。"},{"type":"paragraph","text":"《赤旗报》最后号召全党共同努力，把第九次党代表大会变成马克思列宁主义路线取得胜利的代表大会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10e01362dd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
