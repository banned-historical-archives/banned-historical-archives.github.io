ear":1946,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央社北平十四日电】军调部新闻发布科发表特别公告，原文如次:本月十日军调部共方委员叶剑英，致函政府委员郑介民，其内容原文如下:“接获第九小组五月二十七日报告，及贵方执计定字第五八八号备忘录，得悉中共中原军区之伤病员及家属人员，已于五月十七日安全到达安阳，复报告该伤病人员等近已安全抵达目的地。此次中共伤病员安全转移，端赖第九小组及第十九小组之良好努力与合作，并赖武汉行营程主任及第四十师之热忱协助与照拂，始能获得。除已分别致电表示感谢外，兹特修函对该小组政府及美方组员之可贵努力与合作，表示赞扬，并向阁下表示谢意。"}],"comments":[],"origin":"中央社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"306b4e65e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
