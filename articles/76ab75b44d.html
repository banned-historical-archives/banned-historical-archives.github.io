倍多","authors":[],"dates":[{"year":1973,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗城县委重视在少数民族中发展党员"},{"type":"paragraph","text":"全县少数民族中共产党员的人数比文化大革命前增长二倍多"},{"type":"paragraph","text":"新华社南宁电　中共广西壮族自治区罗城县委重视在少数民族中发展党员。"},{"type":"paragraph","text":"广西罗城县地处祖国南疆的九万山区，是一个多民族聚居的地方，居民中有仫佬、侗、瑶、苗、壮等少数民族。无产阶级文化大革命以前，这个县对在少数民族中发展党员重视得不够。无产阶级文化大革命中，县委重视了在少数民族中培养和发展共产党员的工作。整党建党以来，这个县的党组织在少数民族中发展了共产党员一千三百一十九名，占全县新发展党员总数的百分之七十五。这样，就使全县少数民族中共产党员的人数，比文化大革命前增长了二倍多。"},{"type":"paragraph","text":"在少数民族中发展共产党员时，罗城县委重视对发展对象进行政治思想上的培养教育，经常举办学习班，组织他们认真读马列的书和毛主席的书，提高他们的共产主义觉悟。县委还经常给发展对象上党课，向他们讲解党的知识和党内两条路线斗争的历史，引导他们用党章中有关党员的规定和毛主席提出的三个基本原则，严格要求自己。"},{"type":"paragraph","text":"仫佬族青年梁长福在三大革命运动中表现很好，迫切要求入党。为了帮助他努力提高共产主义觉悟，党组织的领导成员几次同他谈心，和他一起学习毛主席的建党思想和党章，帮助和鼓励他用党员的条件严格要求自己。县委还给他机会，让他到三大革命运动中去经受锻炼。在党组织的帮助下，梁长福认真读书学习，认真改造世界观，不断提高了觉悟，终于被吸收入党。"},{"type":"paragraph","text":"罗城县委还注意在少数民族妇女中培养和发展共产党员。一九七二年全县在少数民族中发展的五百一十名共产党员中，女党员就占了一百七十八名。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76ab75b44d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
