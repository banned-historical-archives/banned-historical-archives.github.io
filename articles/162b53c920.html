":[{"year":1950,"month":5,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"捷总统电复毛主席"},{"type":"paragraph","text":"感谢对捷解放五周年的祝贺"},{"type":"paragraph","text":"【新华社十三日讯】中央人民政府毛泽东主席曾致电捷克斯洛伐克共和国哥特瓦尔德总统，祝贺捷克斯洛伐克解放五周年，现已收到哥特瓦尔德总统的复电如下："},{"type":"paragraph","text":"北京中华人民共和国中央人民政府主席毛泽东：我代表全捷克斯洛伐克人民及个人，对您当捷克斯洛伐克共和国被苏军解放五周年之际所表示的愿望，致以衷心的感谢。并值此机会，祝您及全中国人民战胜反动力量的光辉胜利，这些胜利有力地巩固着以苏联为领导的全世界的和平阵线。并祝在新民主主义建设中的完全胜利与进一步的成就。"},{"type":"paragraph","text":"哥特瓦尔德"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"162b53c920"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
