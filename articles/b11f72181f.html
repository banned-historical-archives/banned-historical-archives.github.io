ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于与蒋介石交涉情况给刘少奇、叶挺等的通报","alias":"","parts":[{"type":"paragraph","text":"关于与蒋介石交涉情况给刘少奇、叶挺等的通报！"},{"type":"paragraph","text":"（1941年1月14日）"},{"type":"paragraph","text":"周、叶报告称“张冲昨天用电话向蒋报我们对围攻新四军的抗议。蒋说：‘（一）新四军北开中央决不留难，此次冲突，听说是新四军先开枪。（二）希望新四军继续向北开。（三）如此路不通，转向皖北开亦可，命令李品仙勿留难。（四）我已下令新四军过江后发弹十万并饷。（五）望你转告周、叶转前方，勿将事件扩大。’我现直函蒋抗议，并坚说非经苏南过江不可。请中央询问叶、项，究竟他们采取那条道路折进苏南，以便作更具体的交涉”等语。特达你们，坚持数日，便有办法。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、王稼祥关于周恩来、叶剑英与蒋介石交涉情况"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":345,"page_end":345},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b11f72181f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
