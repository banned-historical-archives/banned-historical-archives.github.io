<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"江津地委关于肿病情况的汇报","authors":[],"dates":[{"year":1962,"month":1,"day":21}],"is_range_date":false,"parts":[{"text":"江津地委关于肿病情况的汇报","type":"title"},{"text":"同意他们这样办。   廖 22/1","type":"paragraph"},{"text":"省委：","type":"appellation"},{"text":"入冬以来，水肿病在我区急剧发展蔓延，截至1月20日统计，全区共有肿病病人259279人，占农业总人口的5．9％，比去年年底192076人增加了67203人，上升34．9％，与去年同期79451人相比，增加了179828人，增长了两倍多，特别是受灾严重，工作基础差，群众生活安排不落实的地区，病情更为突出严重，如江北县患病人数已达112000多人，占总人口18．6％；璧山县已达39521人，占总人口的11．5％，两县合计，共有病人151667人，占全区现有病人总数的60．6％，如璧山县大兴区，到去年11月底只有2656个病人，现已上升到10780人，占该区总人口的27．5％，江北的龙兴、舒家、麻柳、双溪等公社患有各种病的占总人口一半以上，近来死亡率已升高，据1月1～15日的统计，全区共死5734人，比前15天增加了2．1％。江北县这十五天就死了2805人，占全区死亡总人数的48．8％。同时，璧山、合川和其他县的部分区社，死亡率也较大。","type":"paragraph"},{"text":"从目前情况看，我区重病病情仍是处于上升发展的趋势，问题是十分严重的，如不采取坚决措施，制止肿病的发展和减少病人的死亡，劳力势必减少更大，对生产是极其不利的，为此，根据省委的指示，今后采取如下的措施：","type":"paragraph"},{"text":"1．切实加强对于治病工作的领导，集中力量打歼灭战，把安排群众的生活和防治肿病，作为我们当前一项最重要的工作来抓，本着治病第一，救命第一的精神来安排工作，地委、县委的主要负责干部，都分工负责深入重病区，集中一切人力、物力，投入治病工作。江北、璧山及合川，铜梁的部分重灾区都以抢治肿病为中心，集中力量抓好群众生活安排和抢治肿病工作，争取短期内作出显著成绩，力争一月分停止发展，减少死亡，住院的十五万病人，春节前治好三万，二、月分各治好五万，院外病人三月底基本治完，以保证有足够的劳力投入春耕生产。","type":"paragraph"},{"text":"2．认真办好医院，提高疗效，首先是加强医院的领导，公社医院都配备公社党委委员一级的干部担任院长，大队临时医院，选择觉悟高，热心为病人服务的大队主要干部担任院长，并迅速对医院进行一次整顿，对混进医院的反、坏分子，应进行清理（指领导干部和服务人员），对不适合作医院工作的人员，采用适当方式加以调换，对医务人员深入进行一次社会主义教育和为病人服务的教育，并对他们的生活劳逸作好安排，充分调动他们的积极性，对于个别贪污盗窃、克扣病人严重的分子，按政策规定及时予以处理，通过整顿，把医院的出入院制度，财务制度，医疗护理制度建立、健全起来，并发动全医院工作人员，开展高疗效运动，根据每个病人的具体情况，订出计划，采取积极措施，分期分批治好现有病人。其次，认真抓好病人的生活，对病人的补助粮和基本口粮认真安排落实，由粮食部门直接拨到医院，供病人的油、盐、粮及其他副食品，由商业部门负责保证供应，保证病人吃到一定数量的蔬菜，每天吃上一两“四合一”，同时，教育炊管人员把病人饮食烹调好，保病人吃得熟、热、干净、卫生，重病人少吃多餐，每日吃四顿饭，晚饭给病人烧一次姜、海椒、糖开水吃，以增加病人的热量。","type":"paragraph"},{"text":"当前还特别注意抓好病人的防寒保暖，保证病房不透风、漏雨，没有房屋的，把公社、大队和停办的学校的房屋，腾出来作病房，并积极设法给病人烤上火，煤铁厂的焦炭子，首先要给医院，保证病人烤火，对于没有棉衣、棉被过冬的病员，立即从民政救济款中解决。","type":"paragraph"},{"text":"3．发动群众大搞土草药，目前我区病人多，用药量大，除对省委照顾我区所拨药品及时调运，合理分配、教育医务人员节约使用外，还必须发动群众大采土草药，地委决定，立即由每个大队抽调三至五人，由公社统一组织，统一计划，采取医务人员和群众相结合的办法大采土草药，以保证治病药品的需要。","type":"paragraph"},{"text":"4．加强检查汇报工作，地、县委立即抽调一批力量，组成工作组，深入重病区，加强检查，保证省、地委指示的及时贯彻执行。同时，加强汇报制度，江北、璧山、合川等病情严重的县，两天向地委汇报一次，以及时掌握工作进度情况。","type":"paragraph"},{"text":"以上报告当否，请指示。","type":"paragraph"},{"text":" 中共江津地委一九六二年一月廿一日","type":"paragraph"},{"text":"打字：赵、松  校；马","type":"paragraph"},{"text":"抄：各书记、秘书长，办公厅，宣传部、农工部，卫生厅分党组，财贸党组，韶方同志，西南局办公厅（5）（共印34份）","type":"paragraph"},{"text":"中共四川省委办公厅秘书处  一九六二年一月廿一日印","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e8c6486f6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
