thors":[],"dates":[{"year":1969,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“打倒美帝国主义！”“打倒剥削寡头！”"},{"type":"paragraph","text":"厄瓜多尔工人农民学生不断展开斗争"},{"type":"paragraph","text":"据新华社六日讯　瓜亚基尔消息：厄瓜多尔的工人、农民和学生最近不断开展群众性斗争，抗议厄瓜多尔当局的各项反动政策。"},{"type":"paragraph","text":"瓜亚基尔市约五百名工人、农民和学生三月二十七日举行示威游行，支援瓜亚斯省的亚瓜奇、米拉格罗和巴拉萨尔等地区农民要求获得土地的正义斗争，支持要求改革入学考试制度的学生以及罢工的工人。瓜亚斯省上述地区的农民曾于三月二十四日占领了推行假土改的所谓“土地改革和开垦委员会”瓜亚基尔办事处，赶走了那里的官员，在办事处门前挂起了“土地交给农民！”的大标语。"},{"type":"paragraph","text":"示威者通过瓜亚基尔市的主要街道，不断高呼：“工、农、学团结万岁！”等口号。接着，示威者在被农民占领的“土地改革和开垦委员会”瓜亚基尔办事处门前举行集会。在会上发言的工人、农民和学生的代表一致谴责厄瓜多尔政府增加税收、提高物价、降低工资和把民族资源出卖给美帝国主义的罪行。群众在集会上高呼：“打倒美帝国主义！”“打倒剥削寡头！”"},{"type":"paragraph","text":"据厄瓜多尔劳动总局官员供认，从去年十二月到今年三月，共发生七十一起工人同资方作斗争的事件，其中许多起发生在美国资本控制的企业里。"},{"type":"paragraph","text":"厄瓜多尔首都基多的大学生三月二十六日冲进了议会大厦，占领了正在开会的议会大厅的讲台，封锁了议会的所有大门，要求制裁三年前镇压基多学生的军事独裁者。"},{"type":"paragraph","text":"学生们的造反行动吓得议员们目瞪口呆。一位学生领导人在议长席上发表演说，谴责议员们“是所谓代议制民主的最腐朽的势力”。学生们还向反动议员扔石块、木棍，骂他们是“卖国贼”。学生们占领议会大厅达十五分钟。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17ca8ed079"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
