<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山西省农村社会主义教育运动的情况和问题","authors":["冯建书"],"dates":[{"year":1957,"month":9,"day":11}],"is_range_date":false,"parts":[{"text":"山西省农村社会主义教育运动的情况和问题","type":"title"},{"text":"冯建书","type":"authors"},{"text":"新华社太原11日电　山西省农村社会主义思想教育，早在3、4月间就进行过一次。8月初又在这个基础上普遍开展。从目前情况看，这次开展的规模较大，收获也比较显著。一、由于开展反隐瞒反欺骗斗争，大大推动了夏粮征购工作，并且缓和了农村人为的粮食紧张空气；二、由于干部和农民经过思想辩论，了解到解决粮食问题的根本办法是增产，所以大大加强了当前抗旱救灾工作；三、经过批判富裕中农利用粮食进行黑市等资本主义行为，同时，加强对单干农民的管理，堵塞了资本主义发展空隙，进一步巩固了社会主义阵地；四、提高了农民的阶级觉悟和革命警惕性。","type":"paragraph"},{"text":"运动的经验是：一、加强领导，保证运动稳而有秩序的开展。全省大部分地委、县委在8月初作过具体布置后，许多书记亲自组织重点村大辩论。长治专区抽调三千多干部，并且训练了十五万宣传员。在运动过程中，一般采取由党内到党外，由干部到群众，依托重点，取得经验，然后，逐步推广到全面；二、以县为单位抓取典型事例，进行分析批判，教育效果好。三、在非夏粮产地未进行粮食问题大辩论的农村，一般地组织党的报告员、宣传员进行正面宣传，发动农民进行回忆对比等自我教育，效果也很好。但是，对下乡的报告员或一般干部，最好都要经过训练，否则，就无法掌握运动。例如保德县有些县、乡干部，思想认识不清，农民提出问题答不上来，失败而归。","type":"paragraph"},{"text":"当前，山西省农村社会主义教育的问题是：一、运动发展不平衡。以晋南地区为例，该区三十个县中，运动开展好的有八个县；运动开展晚而又不深刻的，有十八个县；根本没有布置这项工作的，有四个县。据说，长治专区个别县也有晋南第三类地区的情况；二、各地都有些县、乡干部，对运动的政治意义认识不足，有的害怕影响当前抗旱备荒，而将社会主义教育撇开不管，放弃领导；三、有一些地区的领导干部，对在社干部中开展反隐瞒斗争有顾虑。高平县有的干部认为反隐瞒是国家对下层干部不信任。四、个别地区发生乱划、乱反、乱斗右派分子的现象。襄垣有一村把“右派分子”放在桌子上斗争。长治专区已有两起因害怕斗争而自杀的事件。","type":"paragraph"},{"text":" 来源：摘自省委宣传部情况简报，原载新华社《内部参考》1957年9月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a29b5303ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
