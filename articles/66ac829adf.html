script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"孟加拉国作协举办毛主席生平和著作座谈会  毛主席为世界被压迫人民作出巨大贡献  我国影片在埃塞俄比亚放映受到观众热烈欢迎","authors":[],"dates":[{"year":1977,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"孟加拉国作协举办毛主席生平和著作座谈会"},{"type":"paragraph","text":"毛主席为世界被压迫人民作出巨大贡献"},{"type":"paragraph","text":"我国影片在埃塞俄比亚放映受到观众热烈欢迎"},{"type":"paragraph","text":"新华社达卡一九七七年二月二十五日电　孟加拉国作家协会最近在达卡举办了关于毛泽东主席生平和著作的座谈会。"},{"type":"paragraph","text":"在座谈会上，发言者热烈赞颂伟大领袖毛泽东主席为中国人民和全世界被压迫人民所作的巨大贡献。他们指出，毛泽东思想将继续是全世界革命斗争道路上的一座灯塔。伟大领袖毛泽东主席的思想和著作将继续鼓舞全世界人民反对帝国主义、扩张主义和霸权主义。"},{"type":"paragraph","text":"出席座谈会的有孟加拉国的一些作家、教授和知名人士。"},{"type":"paragraph","text":"新华社亚的斯亚贝巴一九七七年二月二十四日电中国影片《闪闪的红星》、《奇袭》、《今日中国》和《杂技》最近在埃塞俄比亚西南部的伊卢巴博省五个市镇上映，受到当地城乡五万名观众的热烈欢迎。"},{"type":"paragraph","text":"影片在这些市镇上映时，当地居民几乎全部出动，前往观看。有些人甚至步行几公里路程，在露天观看中国影片。在影片《今日中国》放映过程中，每当中国人民的伟大领袖和导师毛泽东主席的形象出现在银幕上时，观众中就爆发出雷鸣般的掌声。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66ac829adf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
