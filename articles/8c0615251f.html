art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席干革命","authors":["邱少云生前所在连队全体同志"],"parts":[{"type":"paragraph","text":"当我们从收音机里听到我们最最敬爱的伟大领袖毛主席亲自视察华北、中南和华东地区，调查了河南、湖北、湖南、江西、浙江、上海等省市的无产阶级文化大革命情况，胜利回到北京的特大喜讯后，我们全连同志，个个都激动得热泪盈眶，振臂高呼：毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"敬爱的毛主席，是您老人家率领亿万文化革命大军，展开了向资产阶级司令部的进攻。在党内最大的一小撮走资本主义道路当权派推行资产阶级反动路线，实行白色恐怖的时候，是您老人家给无产阶级革命派撑腰，给无产阶级革命派无穷的智慧和力量。在文化大革命深入发展的过程中，是您的伟大战略部署，引导无产阶级革命派和广大革命群众夺取一个又一个的胜利。今天，您老人家亲自深入群众，视察无产阶级文化大革命的情况，指引无产阶级革命派在无产阶级革命的轨道上奋勇前进。"},{"type":"paragraph","text":"毛主席啊！您是我们的最高统帅，是我们最英明的舵手，我们永远跟着您干革命，千年万代永不变心！"},{"type":"paragraph","text":"我们人民解放军是您亲手缔造、亲自领导的人民军队。我们无限忠于您，无限忠于您的伟大思想，无限忠于您的无产阶级革命路线，无限忠于以您为代表的无产阶级司令部。您的最新指示，我们一定努力学习、热情宣传、坚决执行、誓死捍卫。我们一定要深入到群众中去，和无产阶级革命派心连心，坚定不移地走您指引的革命道路，坚决帮助无产阶级革命派实现革命的大联合，进一步搞好革命的大批判和本单位的斗、批、改。为实现您的伟大战略部署贡献自己的一切！"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c0615251f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
