[],"dates":[{"year":1976,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海电力建设公司第三工程处综合工地理论小组，在当前反击右倾翻案风的斗争中，把批判奇谈怪论，同批判孔孟之道结合起来。他们的具体做法是:一、把刮右倾翻案风的人鼓吹的阶级斗争熄灭论，同孔老二宣扬的“仁政”结合起来进行批判，看清他们都是通过抹煞阶级斗争来麻痹革命人民的斗志的；二、把刮右倾翻案风的人鼓吹的“今不如昔”论，同孔老二宣扬的“信而好古”结合起来进行批判，看清他们都是反对新生事物，主张守旧复古的真面目；三、把刮右倾翻案风的人鼓吹“外行不能领导内行”的“专家路线”，同孔老二宣扬的“上智下愚”结合起来进行批判，看清他们都是坚持唯心主义的英雄史观的；四、把刮右倾翻案风的人鼓吹的读书做官论，同孔老二宣扬的“学而优则仕”结合起来进行批判，看清他们都是妄图利用反动教育思想培养剥削阶级接班人；五、把刮右倾翻案风的人采用的折中主义手法，同孔老二宣扬的“中庸之道”结合起来进行批判，看清他们都是唯心主义哲学思想的鼓吹者。理论小组的同志深切体会到，要在思想根源上把刮右倾翻案风的人推行的修正主义路线批深批透，就必须继续批孔。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a57556ed3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
