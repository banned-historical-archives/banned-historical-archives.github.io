hors":[],"dates":[{"year":1976,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时《光明和被剥削者》刊物发表文章"},{"type":"paragraph","text":"揭露苏联加紧扩军准备发动侵欧战争"},{"type":"paragraph","text":"新华社布鲁塞尔一九七六年七月九日电  比利时马克思列宁主义共产党中央委员会机关刊物《光明和被剥削者》最近一期发表文章，揭露苏联社会帝国主义在竭力准备侵略欧洲的战争。"},{"type":"paragraph","text":"文章说，苏联社会帝国主义尽管“不停地谈论和平，但是实际上，它却在积极准备战争，它是世界最大的战争策源地”，"},{"type":"paragraph","text":"“这是由苏联国家的帝国主义本性决定的”，它“想对世界进行对它更有利的新的分割”。"},{"type":"paragraph","text":"文章说，“苏联正在加紧准备反对西欧的战争，今年头六个月，苏联领导人已组织了两次特大规模的军事演习”。“从一九六九年到一九七四年，苏联进行了九十多次至少每次有一个集团军参加的军事演习”。"},{"type":"paragraph","text":"文章强调说，苏联的这些军事演习“是战役性的进攻演习，重点放在突然袭击和向纵深发展攻势”。"},{"type":"paragraph","text":"文章说，苏联在北欧也加紧军事活动，“数年来，平均每年在北欧水域要进行两次作战演习”。"},{"type":"paragraph","text":"文章指出，苏联北方舰队的活动已经从巴伦支海不断向大西洋深入，而苏联潜艇和“渔船”的活动范围则到达了北海、英国沿海甚至法国和葡萄牙的海岸。苏联海军演习的战略目的是想封锁波罗的海，并且切断欧洲同美国的海上通道。"},{"type":"paragraph","text":"文章最后说，“所有这些事实，难道不是充分证明两个超级大国的争夺，远不是导致缓和、而是导致不安全，而且争夺本身就孕育着第三次世界大战？”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f116053de8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
