<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山西省私营小窑封建剥削制度亟待废除","authors":["段宏源"],"dates":[{"year":1951,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"山西省私营小窑封建剥削制度亟待废除编辑同志："},{"type":"paragraph","text":"山西全省九十二个县有五十个县有煤田。全省共有三、○一七个井口，其中百分之八十以上是私营及合作经营的小窑。"},{"type":"paragraph","text":"这些小窑的特点是多在春冬两季生产，夏秋歇业；工人也多是季节性的工人。"},{"type":"paragraph","text":"在经营上缺乏长期建设观点，只图赚钱。见煤就采，不管安全；再加缺乏技术指导（有些窑虽有所谓“技术人员”，这些“技术人员”也是经常不下井），伤亡事故接连发生。比如：阳曲罗峪口一次塌陷，十二个工人被压在煤洞中。太原西山九院沟后关坑下通风设备不良，窑内连火柴都燃不着。义棠成义窑由于乱开采的结果，将窑挖塌，五十个工人因而失业，祖国良好的煤田，也遭受着严重的破坏。"},{"type":"paragraph","text":"在管理上，这些小窑窑主仍然沿用着封建的剥削方法，来对待工人。打骂工人，延长工时，增加劳动强度，克扣及拖欠工资，非法解雇，及超经济的剥削等是屡见不鲜的事。在太原西山十六座小窑中，还实行着“大班制”，工作时间有长达二十一小时者。拖欠工资的现象也非常严重，有两个月没发工资的，最多的欠工人工资二五、○○○斤米，最少的也欠五、○○○斤米。除从生产上剥削工人外，还以卖米、面、蒸馍来进行剥削。如晋民窑主卖给工人灯油，每两合半斤米，高于市价百分之四十。此外，资方并利用停工的威胁来达到其残酷剥削工人的目的，义棠窑主就发生过六次停工事件。至于随便打骂工人的现象，更是普遍。"},{"type":"paragraph","text":"小窑工人的生、老、病、死、伤、残至今没有一点保障。如子房沟窑对公伤工人，除每天给二斤米外啥也不管；有的窑甚至连半斤米也不给，医药费根本谈不上。解放后的小窑工人，仍过着非人的生活。"},{"type":"paragraph","text":"在采煤方法上，是极端落后，极不安全。因巷道太低，井下运输往往是匍匐前进。井多半是四十至五十度不等的斜井，台阶过窄，只能踏半只脚，如不慎失足，连人带煤一块跌下去，就跌得粉碎。同时小窑雇用十五岁以下的童工，还是很普遍的现象。"},{"type":"paragraph","text":"山西省政府对私营煤窑的管理虽作了不少工作，但仍是不够。至今大部小窑还没经政府备案，根本谈不到企业化的经营，民主化的管理。"},{"type":"paragraph","text":"读者  段宏源"},{"type":"paragraph","text":"编者按：山西省私营小窑所存在的封建落后现象，应引起有关部门的重视。"},{"type":"paragraph","text":"我们建议山西省政府应根据中央燃料工业部于去年十二月一日，颁发的《公私营煤矿暂行管理办法》、《土窑煤矿暂行处理办法》、《公私营煤矿安全生产管理要点》等草案的精神，进行严格检查，取消不合理的现象，认真执行中央人民政府规定的法令。当地工会及劳动局并应根据具体情况，适当改善童工的劳动条件，保护童工健康。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5de2a1bd7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
