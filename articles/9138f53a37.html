torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"应奉行大的战略击破敌之要害","alias":"","parts":[{"type":"paragraph","text":"应奉行大的战略击破敌之要害川"},{"type":"paragraph","text":"（1936年12月15日）彭、任："},{"type":"paragraph","text":"无论军事政治方面，目前均须击破敌之要害。敌之要害不是宁夏或甘肃，而是河南与南京。敌已奉行大规模内战，我们对战争是后发，不是先发。然在敌主力向西安进时，我军应奉行大的战略，迁回并击破敌头脑之南京政府。此方针应无疑义。行动务求荫蔽，一切人不得下达。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十五日二十时"},{"type":"paragraph","text":"[1]这是毛泽东在西安事变后为应付国民党可能发动的大规模内战，关.于红军大的战略给红军前敌总指挥彭德怀和政治委员任弼时的电报。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":168,"page_end":168},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9138f53a37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
