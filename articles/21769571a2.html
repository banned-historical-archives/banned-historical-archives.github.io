script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对设立国务院文化组请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对设立国务院文化组请示报告的批语"},{"type":"paragraph","text":"（1970年3月13日）同意。"},{"type":"paragraph","text":"三月十三日"},{"type":"paragraph","text":"[1]周恩来等1970年3月11日给毛泽东等写报告说，昨天中央政治局会议商定：一、在国务院之下设立一文化组，管理有关文艺、电影、出版、图书、博物等方面的工作。二、文化组的思想政治领导属中央政治局，政治局分工归中央文革；文化组的行政领导属国务院，党中央对该组的指示和决定，由国务院组织实施。三、文化组设组长、副组长和组员若干人，提议吴德为组长，刘贤权为副组长，石少华等7人为组员。四、文化组设一小的工作机构。毛泽东阅后，写了这个批语。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":3,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":520,"page_end":520},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21769571a2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
