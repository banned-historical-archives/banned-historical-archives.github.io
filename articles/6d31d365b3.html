script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"放屁为啥脱裤子——评人民日报社论","authors":["北京大学魏巍"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"放屁为啥脱裤子——评人民日报社论","type":"title"},{"text":"北京大学魏巍","type":"authors"},{"text":"（魏巍：北京大学法律系学生）","type":"subtitle"},{"text":"芦郁文收到一封匿名信，竟然引起人民日报为之发表社论，特别指出“这是对于……的一个警告……利用党整风运动进行阶级斗争的一个信号……它告诉我们阶级斗争没有熄灭”。","type":"paragraph"},{"text":"阶级斗争没有熄灭这是事实，但这是否由这封恐吓信警告我们才发觉，由于这封恐吓信才知道？我想对这封信的来源尽可能的主观分析一下，不外三种情况：","type":"paragraph"},{"text":"1．可能对芦有私人成见的人以此出出气。","type":"paragraph"},{"text":"2．可能出自右派（或反革命）乘机捣蛋。","type":"paragraph"},{"text":"3．可能是芦自己制造或指使别人干的。","type":"paragraph"},{"text":"如果第一种来源可能的话，那他再有莫大的危害性，也伤害不了芦本人以及……。林希翎在我校收到恐吓信，骂他臭婆娘……这对本人和运动有什么坏的或好的作用？如果起了作用，那么人民日报这篇社论发表得太迟了。","type":"paragraph"},{"text":"如果是第二种来源的话，那末也不值得小题大作，因为想把工人阶级推翻，想把伟大的社会主义打翻，想推得历史向后退……那些人对我们的恐吓是每时每刻都存在着，过去有，现在有，在到他们未被彻底消灭前，在将来仍然有，我们是过去不怕，现在不怕，将来更是不怕。对他们几百万武装不怕，几十亿美元都不怕，何况区区一纸恐吓信也何足道哉。","type":"paragraph"},{"text":"第三种来源是我大胆的假设，确实有这种人，为了博得人们对他们额外的同情和支持，把自己说成被人骂了，被人恐吓了，被人打击了（……）。大家如果不健忘的话，可以回忆一下解放前上海一次学生运动，明明是警察骑巡队打了学生，抓了学生，而吴国桢说学生打了这位市长大人，虽然今天的芦郁文≠当时的吴国桢，但是为了博得人们对他们的额外同情和支持，能保证他不制造一些雄辩的事实吗？如果说是现在新社会里没有这样虚伪阴险的人，那么我自己的切身体验证明这一点：","type":"paragraph"},{"text":"如一九五四年我被关到人民的监狱里去，据说在那边的党团写来的材料说：唯一的理由是因为我有一枝短枪，（不要误会，我当时是一个军人）他们怕我，所以叫公安局来逮捕我。我们看这不是新社会里新人“捆倒仔做”的妙技吗？","type":"paragraph"},{"text":"如果有人硬要说这是对广大人民的警告……是进行尖锐阶级斗争的信号……不妨让我再来一个反证，在资本主义国家里，那批大官贵人和议员老爷们他们自己搞些肉麻当有趣的事也说收到了匿名恐吓信等等，你说这完全是左派人士和共产党人弄的吗？","type":"paragraph"},{"text":"根据以上这些理由，我的结论是这样“如果这一恐吓信对我们的警告或信号那倒不如说是人民日报给我们警告或信号，如果人民日报的警告或信号是由恐吓信引起的，那么人民日报在小警（惊）大怪混淆是非”。","type":"paragraph"},{"text":"1．像这样的恐吓信对林本人和整风运动是否起很好的或很坏的作用。","type":"paragraph"},{"text":"2．看不清楚","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d31d365b3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
