"西北师范学院"],"dates":[{"year":1957,"month":6,"day":7}],"is_range_date":false,"parts":[{"text":"揭穿阴谋诡计","type":"title"},{"text":"西北师范学院人道社","type":"authors"},{"text":"本报讯：6．7．本社邀请著名的观察家15位，针对目前校内争鸣形势组织座谈，得出结论如下：","type":"paragraph"},{"text":"一、对总形势的估计，观察家一致认为，运动前途将归失败，李坤式的统治，无形地重新获得绝对地位，人权、人道、自由、民主、永将泯灭，其原因如下：","type":"paragraph"},{"text":"A．党领导狡猾对抗，手段如下：1．分化教师学生力量(如惟恐激起义愤、教师控诉会不让学生参加，陈光不让学生接触教授等)；2．指示部分党员，乘机篡夺群众运动的领导，并粗暴施加压力(中语、历史等班级)；3．别有用意的促成群众间互相开炮，分化削弱和瓦解对“三害”的攻击力量(如对教授民主力量开炮)；4．有计划的组织部分党员、干部以“反对党”，“扰乱社会制”“反革命破坏”等李坤遗留下来的帽子，(可怕法宝)，压制恐吓正义力量(如学生科、人事科干部科的论坛——警告性质的言论)；5．使某些党员撕毁群众标语(如教师楼某党员助教)；6．便衣警察大肆活动，搜集情报，使人心惶惶不安，感到无限恐怖(如各字报反映情况和我社记者报导)；7．花言巧语公开包庇犯罪分子(如阮迪民等老官僚们)；8．消极抗拒不答应群众意见，全部拒绝表示态度，并否定之(且命令教授不能停课)。","type":"appellation"},{"text":"B．李坤爪牙在较占优势；","type":"paragraph"},{"text":"C．我院向来民主空气淡薄，且反对派势力强大；","type":"paragraph"},{"text":"二、某观察家说：根据以上推断，运动将不免失败，冤枉者的灵魂，将在九泉之下，骂我师院儿男是暴力践踏下的奴隶(此观察家说到此流涕不止)。","type":"paragraph"},{"text":"三、另一观察家接着说：我们为了挽救局势，号召大家向北京大学、交通大学、兰州等大学看齐。要求大家罢课、请愿，以具体行动，以决定性的攻击，以澈底清除李坤余风和“三害”流毒，争取最后胜利。","type":"paragraph"},{"text":"四、但大多数观察家都对这种行动的可能与效果表示失望——以上重要评论因领导不供给我们纸张，只得用报纸发表，至为遗憾，尚希原谅！","type":"paragraph"},{"text":"必看   ——人道社6．7．","type":"paragraph"},{"text":" 来源：《香花乎？毒草乎？(1)》（西北师范学院学委会，1957年6月18日）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bcc1fa08b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
