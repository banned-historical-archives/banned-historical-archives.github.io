script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本和平活动家和我和大北京分会代表团强调  组织强大统一战线反对共同敌人美帝  阿部行藏指出必须同勾结美帝的现代修正主义者进行坚决斗争","authors":[],"dates":[{"year":1964,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本和平活动家和我和大北京分会代表团强调"},{"type":"paragraph","text":"组织强大统一战线反对共同敌人美帝"},{"type":"paragraph","text":"阿部行藏指出必须同勾结美帝的现代修正主义者进行坚决斗争"},{"type":"paragraph","text":"据新华社十五日讯　东京消息：东京一百多名和平活动家十四日晚举行集会，欢迎目前正在日本进行访问的中国人民保卫世界和平委员会北京分会代表团。日本和平委员会会长平野义太郎，东京和平委员会委员长阿部行藏，中国代表团团长廖沫沙等分别在大会上讲了话。"},{"type":"paragraph","text":"平野义太郎在谈到第十届禁止原子弹氢弹世界大会的胜利时说，在这次大会上，日本人民和世界人民在群众面前充分揭露和击败了分裂分子和修正主义分子。"},{"type":"paragraph","text":"阿部行藏在指出东京和平委员会和中国人民保卫世界和平委员会北京分会签署的联合声明的重大意义时说，“世界各国人民应当组织强大的统一战线，来反对日本、中国和世界各国人民的共同敌人——美帝国主义。”他接着强调指出：“为了同美帝国主义者进行斗争，同勾结美帝国主义者的现代修正主义者进行坚决的斗争是不可避免的。”"},{"type":"paragraph","text":"廖沫沙强调指出：“第十届禁止原子弹氢弹世界大会的胜利再一次清楚地证明：如果我们高举反对美帝国主义、争取民族独立、反对分裂和争取群众性斗争的旗帜进行斗争，我们一定会取得胜利。”"},{"type":"paragraph","text":"他接着说，美帝国主义者是纸老虎，胜利的保证在于组织强大的反对美帝国主义的统一战线，进行坚决的斗争。"},{"type":"paragraph","text":"中国人民保卫世界和平委员会北京分会代表团，应日本和平委员会和东京和平委员会的邀请，自七月三十日到达日本以来，已访问了京都、神户、大坂和名古屋。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"184eb19493"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
