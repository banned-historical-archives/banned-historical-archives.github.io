tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛主席军事思想贯彻到近海作战中海军某炮艇中队进行战评","authors":["许克周式源"],"parts":[{"type":"paragraph","text":"这一中队在福建前线战斗中，曾击伤敌猎潜舰一艘、击落敌运输机一架，活捉敌飞行员一名。战后，他们以三天时间进行战评，先后召开了两次班以上干部会议、着重评编队运动和单艇指挥。然后官兵们一起评斗志、评战术技术、评协同动作和团结互助。并在此基础上，召开本区艇以上指挥员战术研究会议，以毛主席军事思想为指导，结合战例，大论战法。"},{"type":"paragraph","text":"通过这次战评，全体官兵进一步明确了政治挂帅、运用我军作战经验，把毛主席军事思想贯彻到近海作战中去，是他们首次与敌交锋取得胜利的重要因素。在这次战斗中，他们充分利用了我艇的特点，打得敌人措手不及。这正是毛主席所说的出其不意，攻其不备的战术。"},{"type":"paragraph","text":"大家还一致指出：在近海作战中，要贯彻毛主席所指示的打歼灭战的战术思想，就必须强调指挥上的机智灵活，协同一致。这次岸上指挥果断、迅速、准确，岸炮打乱了敌舰编队，编队指挥员也能坚决贯彻首长决心，采取灵活战术，实行了突袭。大家说，在今后作战中，还应该集中火力，击沉敌人的主力舰、体现出毛主席听说的伤其十指、不如断其一指的战法。"},{"type":"paragraph","text":"大家还在实战中发现了现行条令、教范中有些地方（如关于压弹的规定、火炮射击和排除故障的程序等）不合实战要求、大家根据实战体会，进行了修改。 （许克、周式源）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db82bba8f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
