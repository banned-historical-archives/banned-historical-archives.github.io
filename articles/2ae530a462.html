art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"随时随地学习毛主席语录修理连、炮一连办“毛主席语录”小黑板收效明显","authors":["贺元发王世林张敬民"],"parts":[{"type":"paragraph","text":"本报讯 某坦克团修理连学习廖初江的经验，举办“毛主席语录”小黑板，收到立竿见影的效果。"},{"type":"paragraph","text":"修理连在学习廖初江的经验后，各车间都挂出了小黑板，结合自己车间的思想和工作实际，写上了毛主席的语录。车工组出废品比较多，焊工组有浪费器材的现象，他们就在小黑板上写了毛主席的语录：“要使我国富强起来，需要几十年艰苦奋斗的时间，其中包括执行厉行节约、反对浪费这样一个勤俭建国的方针。”然后组织大家讨论，找出了浪费的原因。经过半个月的努力，车工组的废品率明显降低；焊工组把以前扔掉的焊条头一根一根地接起来使用，十天时间节约了焊条四公斤。大家说：举办“毛主席语录”小黑板就是好，可以一边工作一边学习了。（贺元发）"},{"type":"paragraph","text":"本报讯 某团炮一连在最近一次野营训练中，举办“毛主席语录”小黑板。在过一座大山的时候，小黑板上写道：“我们要承认困难，分析困难，向困难作斗争……”战士们读了，增添了力量，仅用五十分钟就翻过了这座大山。战士们写诗称赞说：黑板小，威力大，学“毛著”的好办法。对症下药，学了就用，立竿见影收效大。 （王世林、张敬民）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ae530a462"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
