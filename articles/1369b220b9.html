ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发华东军区对营连及县区武装三反工作指示的批语","alias":"","parts":[{"type":"paragraph","text":"关于抚顺市郊发现大批昆虫等的批语！"},{"type":"paragraph","text":"（1952年3月4日）周总理："},{"type":"paragraph","text":"请准备在辽东辽西两省全体军民中注射防疫苗。冀东冀中及京津也要作准备。是否有这样多的疫苗，望告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日"},{"type":"paragraph","text":"[1]这个批语，写在沈阳3日讯资料（十五）《抚顺市郊发现大批昆虫》上。这份资料说：3月2日下午5时东北军区卫生部接到公安一师的报告，在抚顺市以南70华里的北大沟该师驻地发现大批昆虫等，当即派出检验人员驰赴现场采集标本。据调查该地有大批苍蝇、蜘蛛、跳蚤，还有一种不知名的黑色小虫，分布成集团状。据该部防疫处负责人称：美军在朝鲜撒布细菌用炸弹和纸袋两种方法，在抚顺发现的苍蝇、蜘蛛等可能是使用后一种方法撒布的。东北军区卫生部已派出30人的防疫队，配合当地政府组成防疫委员会进行室内消毒，并将上述抚顺市以南地带加以封锁。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":477,"page_end":477},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1369b220b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
