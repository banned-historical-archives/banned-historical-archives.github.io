ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"致刘伯承、邓小平等电","alias":"","parts":[{"type":"paragraph","text":"致刘伯承、邓小平等电！"},{"type":"paragraph","text":"（1947年4月15日）"},{"type":"paragraph","text":"五师文汪部七于人是该师精华，你们应当作自己建制部队一样给以积极帮助。中原局郑、李诸同志（现在离石待机过路来你处）希望你们补充该部一部新兵、一部俘虏及相当武器弹药，望召文、汪征询情况，给以关于整训的指示并商定补充计划。补充与整训完成后，可给以适当的作战任务，使该部在战斗中壮大起来，以便将来和大军一道出河南作战。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致刘伯承、邓小平、滕代远、薄一波、王宏坤并告陈、谢富治、王新亭、韩钧电的主要内容。韩钧，当时任普冀鲁豫野战军第四纵队副司令员。"},{"type":"paragraph","text":"[2]五师文汪部，即豫鄂陕军区司令员文建武、政治委员汪锋率领的部队。该部由中原突围出来的中原军区第二纵队-部和河南军区部队合编组成。因中原军区是由原新四军第五师等部组成的，这里仍沿用旧称。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":4,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":532,"page_end":532},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"133b5f2a81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
