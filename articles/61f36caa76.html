×××贪污案件的通报","authors":[],"dates":[{"year":1963,"month":7,"day":9}],"is_range_date":false,"parts":[{"text":"中央转发湖南省委批转株洲市委关于从宽处理×××贪污案件的通报","type":"title"},{"text":"现将湖南省委批转株洲市委关于从宽处理×××贪污案件的通报转发给你们。","type":"paragraph"},{"text":"中央认为，在“五反”运动中，对于揭发出来的犯有贪污行为的人，在处理上，既要有原则性，又要有灵活性。一方面要揭露从严、检讨从严、退赔从严，另一方面只要他们能自和坦白交代、检讨得好、退赔得好、决心洗手不干表现得好的，可以从宽处理，不以贪污论罪，也可以不开除公职。","type":"paragraph"},{"text":"为了使犯有贪污错误的人，取得深刻教训，今后不敢重犯，所有赃款、赃物，不论多少，必须彻底退赔，不能马马虎虎。一下退赔不起的，可以分期分批地退赔，绝不能开不退赔的口，使贪污的人在经济上占到便宜。这样，才更加有利于对犯有贪污错误的人的改造，并且可以警戒他人。","type":"paragraph"},{"text":"（湖南省委批转株洲市委关于处理×××贪污案件的通报从略——编者注）","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61f36caa76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
