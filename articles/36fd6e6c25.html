":[{"year":1976,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　市二中学党支部、革委会、工宣队发动革命师生，把郑霞萍的事迹、日记摘抄和豪言壮语编成材料，印发到各个班级，对照英雄人物，开展一事一议活动，同时还准备把郑霞萍的先进事迹绘制成彩色幻灯片，在学生中进行广泛宣传。这个学校的师生以马列主义、毛泽东思想为锐利武器，先后五次狠批了邓小平的“三项指示为纲”的修正主义纲领。红卫兵骨干还举办了专题学习班，狠批《论总纲》等三株大毒草。最近他们打算召开一次“三好”活动积极分子大会，把批毒草，学英雄，树理想，开展共产主义大目标教育活动推向新的高潮。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36fd6e6c25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
