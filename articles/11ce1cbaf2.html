<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠批“四人帮”  教好化学课","authors":["吴炳智"],"dates":[{"year":1978,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"狠批“四人帮”  教好化学课"},{"type":"paragraph","text":"安徽省贵池中学  吴炳智"},{"type":"paragraph","text":"我是一个从事化学教学三十多年的教师，曾多次参加高考试卷分析和阅卷工作。今年，我又参加了粉碎“四人帮”后第一次高考阅卷工作，这是华主席、党中央对我们知识分子的信赖和关怀。"},{"type":"paragraph","text":"在阅卷中，我们欣喜地看到，不少青少年在“四人帮”的严重干扰和破坏下，不信邪，不怕压，刻苦学习科学文化知识。特别是在粉碎“四人帮”后的一段时间里，他们把热爱华主席、为实现四个现代化而奋斗的革命热情，化成扎扎实实，埋头苦干，以优异成绩向党交红卷的实际行动，因而取得了可喜的成绩。如略高于中学教材内容的一些化学试题，也有人答得全对。但是，我们教师感到无比忿慨的是，由于“四人帮”对教育革命的干扰和破坏，不少青少年荒废了学业。就从这次试卷来看，有的考生连元素符号也不会写，分子式写不好，基础知识缺乏，基本概念模糊。这是“四人帮”把化学教学实验和基本理论教学，以及教学实验室建设统统斥之为“修正主义”，一刀砍掉而造成的严重恶果。"},{"type":"paragraph","text":"通过阅卷工作，我深深感到加强化学基础理论教学，努力提高教学质量的重要性、迫切性和艰巨性。对此，我认为应当抓好以下几点："},{"type":"paragraph","text":"一、由于化学课是一门研究物质的组成、结构、性质变化以及合成的科学，所以在中学化学的教学中，必须加强化学实验室建设，使理论更好地联系实际。尤其是重点中学，建立和健全实验室，更是当务之急。"},{"type":"paragraph","text":"二、为了适应提高教学质量的要求，化学教材应在符合现代科学发展的水平上，编写好基础知识、基本理论和基本技能方面的内容。要培养能胜任新的化学教学大纲要求的中学教师，并不断提高他们的业务水平。"},{"type":"paragraph","text":"三、在“四害”横行时，宣扬过所谓“求对不求全”、“教材只能作参考”的错误观点，使不少教师不敢抓教学，不敢进行业务进修。今后要继续批判这种错误思想，并保证教师有备课和钻研业务的时间。"},{"type":"paragraph","text":"四、虽然历年化学教材内容大致相似，但是教学对象年年变，教材的内容随着科学的发展不断更新，实验要求有所不同。因此，教师要针对学生实际程度，把课备好，在课堂上做到有的放矢；要经常研究改进实验方法，使学生由感性认识上升到理性认识，比较牢固地掌握已学的知识。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"11ce1cbaf2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
