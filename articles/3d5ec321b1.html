script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西贡纺织工人坚持斗争英勇不屈  越南北方人民同仇敌忾抗议美帝国主义又一血腥罪行  我全总致电坚决支持西贡纺织工人反迫害反剥削斗争","authors":[],"dates":[{"year":1964,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西贡纺织工人坚持斗争英勇不屈"},{"type":"paragraph","text":"越南北方人民同仇敌忾抗议美帝国主义又一血腥罪行"},{"type":"paragraph","text":"我全总致电坚决支持西贡纺织工人反迫害反剥削斗争"},{"type":"paragraph","text":"新华社河内二十八日电  据越南南方解放通讯社报道，西贡“越南纺织厂”工人不顾威胁、镇压，继续展开斗争，要求实现工人的正当权利、赔偿工人的损失。"},{"type":"paragraph","text":"据报道，在美帝国主义及其走狗血腥镇压“越南纺织厂”工人罢工斗争的第二天，即十八日，这个工厂和越美纺织厂工人的二百多名代表，在西贡伪“劳动联盟”办事处召开非常会议。工人代表们严厉谴责美帝国主义及其走狗在十七日制造镇压罢工的惨案，并谴责了充当美国特务的“劳动联盟”主席破坏工人的斗争的罪行。会议决定，要这个“主席”同“越南纺织厂”的工人代表一起去会见政变集团首脑杨文明，并要求伪当局马上释放十七日被捕工人。会议最后通过了向政变集团提出的下列要求：一、释放十七日的全部被捕者；二、调查和惩办制造这个惨案的主犯和主谋者；三、厂主要给受伤者和死难者家属赔偿损失。"},{"type":"paragraph","text":"据报道，十九日，“越南纺织厂”的工人和工人家属将近一千人又到“中正”医院探望受伤的工人弟兄。工人们站满了医院门前的广场，他们高举各种标语牌，要求释放被捕工人、给受伤和死难工人赔偿，惩办凶犯。西贡伪当局再次出动军警和用水龙对群众进行镇压。"},{"type":"paragraph","text":"据新华社河内二十八日电  美帝国主义及其南越傀儡集团野蛮镇压西贡“越南纺织厂”工人的血腥罪行，激起越南北方人民的极大愤怒。"},{"type":"paragraph","text":"河内市劳动人民代表一千多人二十七日晚上在劳动俱乐部举行抗议集会。与会者愤怒高呼：“反对美帝国主义及其走狗血腥镇压越南纺织厂工人！”等口号。"},{"type":"paragraph","text":"集会一致通过决议，表示坚决支持“越南纺织厂”工人和西贡—堤岸—嘉定地区工人以及全体南越劳动者反对美帝国主义及其走狗的压迫和剥削的英勇斗争。"},{"type":"paragraph","text":"越南北方纺织工业中心——南定市的“南定联合纺织厂”一万二千名职工、海防港口一千五百名工人、河内南区建筑公司十七个工地七百名职工二十七日中午和晚上先后举行集会，强烈谴责美帝国主义及其走狗镇压南越工人的罪行。"},{"type":"paragraph","text":"越南妇女联合会、海防市工会联合会二十七日发表声明，严厉谴责美帝国主义对南越工人的暴行。"},{"type":"paragraph","text":"据新华社二十八日讯　中华全国总工会今天打电报给越南南方劳动解放协会，对美帝国主义和南越反动傀儡当局血腥屠杀西贡“越南纺织厂”罢工工人感到无比愤慨。电报中严厉谴责美帝国主义及其走狗的这一残暴行动，坚决支持越南南方工人反迫害反剥削的英勇斗争，并对受伤工人和死难工人的家属表示衷心的慰问。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d5ec321b1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
