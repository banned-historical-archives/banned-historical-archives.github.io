onth":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"敬爱的毛主席:"},{"type":"paragraph","text":"中华人民共和国成立两周年了，这是人类历史上最光辉的两年，也是中国历史上从来没有过的两年。由落后的旧中国到先进的新中国，由被奴役被压迫的旧中国到为世界人民热爱的新中国，由半殖民地半封建社会的旧中国到新民主主义社会的新中国。尤其在这二年，土地改革的大部份完成、大张旗鼓地开展镇压反革命运动、抗美援朝的基本胜利，巩固了人民民主政权，张开了亚洲人民解放的胜利旗帜。完全由于您和中国共产党三十年来的英明领导，才有今天这样的伟大成就!"},{"type":"paragraph","text":"在革命形势胜利、人民政权日益巩固的基础上，为了培养优秀的师资，迎接文化教育建设的高潮，华东现在成立了第一所新型的师范大学。我们华东师大就在这全国欢欣鼓舞庆祝国庆的日子里，正式开学。我们感到无限光荣和骄傲!华东师大是革命胜利的产儿，我们将成为建设新民主主义教育事业的基本力量；我们也认识了只有在今天，沐浴着您的阳光，教育事业才有这样的光辉前途，教育工作者也才有这样的正确道路。"},{"type":"paragraph","text":"敬爱的毛主席!我们将以马列主义和您的思想来贯彻爱国主义教育，炼好我们的身体，做好我们的教学工作，师生员工团结一致，保证完成建校工作，作为庆祝第二届国庆的献礼。也只有这样，我们在现在和将来才称得上真正的人民教师。谨向您致以"},{"type":"paragraph","text":"最崇高的敬礼"},{"type":"paragraph","text":"华东师范大学全体师生员工"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a32dfb2f48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
