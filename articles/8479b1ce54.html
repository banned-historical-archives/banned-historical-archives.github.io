script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"上海人民喷怒声讨和揭发批判反党算权的走资派的反革命罪行","alias":"","parts":[{"type":"paragraph","text":"在世界的东方。"},{"type":"paragraph","text":"在以华国锋同志为首的党中央的统一指挥下，奋勇前进！上海人民愤怒声讨和揭发批判反党篡权"},{"type":"paragraph","text":"的走资派的反革命罪行"},{"type":"paragraph","text":"（一九七六年十月二十一日）"},{"type":"paragraph","text":"上海人民愤怒声讨那些背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席指示，搞修正主义，搞分裂，搞阴谋诡计、反党纂权的走资派的反革命罪行，其势如长空呼啸的狂飚，大海奔腾的怒涛，席卷浦江两岸。昨天下午，本市工人阶级和各界革命群众代表一百万人举行声势浩大的集会，坚决拥护以华国锋同志为首的党中央，热烈欢呼中央两项英明决定，愤怒声讨和揭发批判那些背叛马克思主义，列宁主义、毛泽东思想，算改毛主席指示，搞修正主义，搞分裂，搞阴谋论计，反党篡权的走资派的反革命罪行。到会代表重温了毛主席关于“要搞马克思主义、不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，愤怒地指出：那些篡改毛主席指示，违背“三要三不要”基本原则的人，就是分裂党、搞行帮的党内资产阶级的典型代表，就是不肯改悔的正在走的走资派，上海工人阶级和革命群众誓同他们斗到底！"},{"type":"paragraph","text":"昨天，人民广场一片沸腾。上午十一时许，各界群众代表就怀着对反党篡权的走资派的无比愤慨，列成队伍，开着宣传车，高举战旗、标语牌，象无数股洪流涌进广场，旗海翻涌，如怒涛滚滚；口号震天，似重炮排排，显示出向反党纂权的走资派展开猛烈反击的强大阵容！"},{"type":"paragraph","text":"会上，上海第十七棉纺织厂、上海第三十棉纺织厂、文汇报和解放日报、上海机床厂、共青团上海市委、市委办公室招待处等单位的工人、机关工作人员代表发了言。在他们发言时，全场不断高呼口号：“热烈欢呼、坚决拥护中央两项英明决定！”“一切行动听从以华国锋同志为首的党中央指挥！”“彻底清算那些反党纂权的走资派的反革命罪行！”“掀起学习马列著作和毛主席著作的新高潮！”"},{"type":"paragraph","text":"工人代表在发言中从党内资产阶级的反动本质上，揭露了那些阴谋纂党夺权的走资派的反革命罪行。他们愤怒地指出，这些搞修正主义、反党算权的人，窃取“左派”名声，以“一，贯正确”自居，不惜采取一切卑劣手段、搞行帮，分裂党、吹吹拍拍，安插亲信，打击革命派，已经变成吸工人血的党内资产阶级，与工人阶级处于尖锐的阶级对立状态之中，这些人是我们工人阶级的最凶恶的敌人。"},{"type":"paragraph","text":"机关革命群众代表在声讨反党算权的走资派反革命罪行的同时，还对他们的反革命手法作了充分揭露，提出，这些党内资产阶级的典型代表要反党复权，使用的一个阴险恶毒的反革命手法就是：利用手中窃取的一部分权力，疯狂地纂改毛主席的指示。他们乔装打扮，伪装革命，把马克恩主义的词句唱得比谁都响，实际上是一伙假马克思主义的骗子，尽管他们靠这点骗术能在党内混上八年、十年，甚至更长一些时间，但背叛马列主义、毛泽东思想的人、终究逃脱不了历史的惩罚！为他们代表的是占人口极少数的剥削阶级，维护的是狭隘宗派集团的私利。他们手里没有真理，周围没有群众，在人民群众中非常孤立。在以华国锋同志为首的党中央的英明领导下，全国人民--起来，上海人民起来，那些篡改毛主席指示、反党篡权的资产阶级阴谋家、野心家就迅速跨台了！"},{"type":"paragraph","text":"气壮山河的发言，铁一般事实的揭露，大长了无产阶级的志气，大灭了那些反党篡权的党内资产阶级的威风，全场人心大快！到会群众不时振臂高呼口号，充分显示了上海市广大人民群众在以华国锋同志为首的党中央英明领导下，对那些反党篡权的走资派展开猛烈反击的战斗激情。到会革命群众一致表示，继承毛主席的遗志，最紧密地团结在以华国锋同志为首的党中央周围，努力学习马列著作和毛主席著作，坚决反对任何违背三项基本原则的言论和行动，暂同那些反党纂权的资产阶级阴谋家、野心家作拼死的斗争，把毛主席开创的无产阶级革命事业进行到底。"},{"type":"paragraph","text":"会后，还分头上街举行了声势浩大的游行。"},{"type":"paragraph","text":"（原载1976年10月21日《文汇报》）北京、上海广大军民连日举行"},{"type":"paragraph","text":"声势浩大的庆祝游行（一九七六年十月二十一、二十二日）"},{"type":"paragraph","text":"首"},{"type":"paragraph","text":"都"},{"type":"paragraph","text":"二十一日，首都一百五十万军民欢欣鼓舞，豪情满怀，举行声势浩大的庆祝游行，热烈欢庆华国锋同志任中国共产党中央委员会主席、中国共产党中央军事委员会主席，热烈欢呼以华国锋主席为首的党中央继承毛主席的遗志，代表全党全军全国各族人民的根本利益和共同心愿，一举粉碎王洪文、张春桥、江青、姚文元反党集团纂党夺权阴谋的伟大胜利。"},{"type":"paragraph","text":"首都全城当天到处充满了团结、战斗、胜利的革命气氨。从清晨开始，一队又一队的工人、人民公社社员、人民解放军指战员、民兵、革命干部、革命知识分子、红卫兵、街道居民和各界人民群众，由各级党政军领导干部带队，抬着伟大的领袖和导师毛主席画像，高举红旗，敲锣打鼓，兴高采烈、斗志昂扬地从四面八方涌向天安门广场。十里长安大街上，欢庆胜利的人群如酒涌的潮水；雄伟的天安门广场，红旗如林，歌声震天，万众欢腾，锣鼓声、鞭炮声和昂的口号声响成一片。游行群众高举的横幅大标语上写着：“热烈庆祝华国锋同志任中国共产党中央委员会主席、中国共产党中央军事委员会主席！”“热烈庆祝粉碎·四人帮·纂党夺权阴谋的伟大胜利！”广大工农兵群众在天安门前仰望城楼红墙中央伟大的领袖和导师毛主席的巨幅画像，心潮澎湃，同声欢呼我们伟大的领袖毛主席生前的英明决策已得到迅速实现。他们说，华国锋同志任中共中央主席、中央军委主席，这一大喜事表达了全党全军全国各族人民的共同心愿，有力地证明了我们党的事业后继有人，兴旺发达。我们对以华"}],"authors":[],"dates":[{"year":1976,"month":10,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":606,"page_end":607},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8479b1ce54"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
