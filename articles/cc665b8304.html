script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"缅甸二十八个政党团体谴责三国条约  热烈支持我国政府建议  指出现代修正主义分子应该从事实中吸取教训","authors":[],"dates":[{"year":1963,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"缅甸二十八个政党团体谴责三国条约"},{"type":"paragraph","text":"热烈支持我国政府建议"},{"type":"paragraph","text":"指出现代修正主义分子应该从事实中吸取教训"},{"type":"paragraph","text":"新华社仰光九日电　包括缅甸人民民主党和缅甸民族团结阵线在内的二十八个缅甸政党和群众团体今天下午在这里发表联合声明，热烈支持中国周恩来总理关于举行世界各国政府首脑会议，讨论全面、彻底、干净、坚决地禁止和销毁核武器问题的建议。"},{"type":"paragraph","text":"声明指出，周恩来总理提出的召开世界各国政府首脑会议的建议，是为了制止帝国主义的核战争准备和保卫世界和平。"},{"type":"paragraph","text":"这个声明是在这些缅甸政党和群众团体所举行的庆祝朝鲜民主主义人民共和国成立十五周年的集会上宣读的。声明指出，在莫斯科签订的部分禁止核试验条约，既不能制止帝国主义的核战争准备，也不能避免核武器的威胁。这个条约增加了核战争的危险。"},{"type":"paragraph","text":"声明说，周恩来总理的建议得到了朝鲜民主主义人民共和国和其他爱好和平的国家和人民的支持。世界和平力量必须团结起来进行斗争，以便制止帝国主义战争和全面、彻底、干净、坚决地禁止和销毁核武器。"},{"type":"paragraph","text":"声明强调说，朝鲜战争证明，只有通过坚决斗争，才能够保卫住民族独立和制止帝国主义战争。害怕帝国主义的现代修正主义分子，应该从这个事实中吸取教训。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc665b8304"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
