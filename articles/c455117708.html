script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"中央转发朱德关于全党纪律检查工作总结报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发朱德关于全党纪律检香工作"},{"type":"paragraph","text":"总结报告的批语"},{"type":"paragraph","text":"（1952年6月23日）中央和军委各部门，中央人民政府各党组；各中央局、分局、并转各省市区党委；各大军区、志愿军党委并转各省军区和各军党委："},{"type":"paragraph","text":"兹将中央纪律检查委员会一九五二年六月二十二日关于全党纪律检查工作的总结报告“一件发给你们，可在党刊上登载。中央认为这个报告是正确的。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"六月二十三日"},{"type":"paragraph","text":"[1]指中共中央纪律检查委员会书记朱德1952年6月22日关于党的纪律检查工作给毛泽东并中央的总结报告。报告说，三反运动对于我们党来说，是一次有领导的、发动群众的、全体规模的、有系统的纪律大检查运动，使广大干部受到了教育和考验，证明绝大多数干部都是好的，犯有违法乱纪错误的干部受到了应得的处分。同时，暴露出我们在纪检工作和干部工作中存在的相当严重的缺点和应当吸取的教训：第一，过去有些党的组织发现了党员干部有违犯党纪的错误，不是正面地及时地提到原则高度予以批评"},{"type":"paragraph","text":"中央转发朱德关于全党纪律检查工作总结报告的批语指正，对于犯有严重错误不宜继续担任原来工作的高级干部，没有坚决地从领导岗位上撤换下来，使党纪松弛，党内各种错误倾向更加发展。第二，某些党的组织平时对干部的了解很差，不听群众的反映，不深入检查他们的工作，一些坏干部利用这些缺点骗取信任，以达到个人的目的。第三，有些部门用人单纯强调技术，忽视政治，放松党的领导和党内的思想斗争，造成了干部中违法乱纪的严重情形。因此，发扬党内民主，开展批评与自我批评，反对自由主义，就成为当前十分迫切的任务。第四，必须加强纪检工作，健全党内的组织生活和民主生活，充分发挥支部的堡垒作用，发动对党员干部违法乱纪行为的揭发和检举，经常向党员进行遵守纪律的教育。第五，在处理党员违纪案件中，要克服姑息养奸和简单化两种倾向。第六，在三反斗争的建设阶段，各级组织可适当地进行一次遵纪守法的教育，使党员干部逐渐地养成奉公守法的习惯。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":6,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":146,"page_end":147},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发朱德关于全党纪律检查工作总结报告的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":6,"day":23}],"is_range_date":false,"parts":[{"text":"中央转发朱德关于全党纪律检查工作总结报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"中央和军委各部门，中央人民政府各党组；各中央局、分局、并转各省市区党委；各大军区、志愿军党委并转各省军区和各军党委：","type":"appellation"},{"text":"兹将中央纪律委员会一九五二年六月二十二日关于全党纪律检查工作的总结报告一件发给你们，可在党刊上登载。中央认为这个报告是正确的。","type":"paragraph"},{"text":" 中央六月二十三日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c455117708"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
