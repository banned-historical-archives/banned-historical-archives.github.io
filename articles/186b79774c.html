rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席人民战争思想在亚非拉显示出强大威力","authors":[],"parts":[{"type":"paragraph","text":"毛主席关于人民战争的思想，过去在中国人民解放战争中已经显示出它的生命力和正确性，现在在非洲和亚洲人民争取民族解放的斗争中也正在显示它的生命力和正确性。"},{"type":"paragraph","text":"——桑给巴尔一位朋友"},{"type":"paragraph","text":"我最爱读毛主席写的《抗日游击战争的战略问题》和贯穿着毛泽东思想的《人民战争胜利万岁》。这两篇文章，对我们当前老挝革命斗争是很有现实意义的。毛泽东主席的人民战争思想，大大鼓舞了我们战胜美帝国主义的信心。"},{"type":"paragraph","text":"——老挝人民解放军川圹地区指挥部的领导人"},{"type":"paragraph","text":"毛泽东主席关于人民战争的思想具有伟大的威力，任何帝国主义、任何反动派都不能胜过它。"},{"type":"paragraph","text":"——老挝 陶苏·培拉西"},{"type":"paragraph","text":"马来亚人民在毛泽东思想鼓舞下，正在各方面特别在武装斗争方面，加强反对敌人——英美帝国主义者及其在当地傀儡的斗争。"},{"type":"paragraph","text":"——马来亚作家沙尔玛"},{"type":"paragraph","text":"我们正在进行革命战争，我们非常需要毛泽东同志的人民战争思想。越南人民抗美救国斗争的胜利，就是毛泽东人民战争思想的胜利。"},{"type":"paragraph","text":"——越南南方一位朋友"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"186b79774c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
