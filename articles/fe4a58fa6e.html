script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"敢走前人没走过的道路　敢攀前人没攀过的高峰  我国自建铂重整石油化工装置达国际先进水平  投产后，已为国民经济各部门提供了大量的重要化工原料，彻底粉碎了帝国主义和修正主义的技术封锁","authors":[],"dates":[{"year":1966,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"敢走前人没走过的道路　敢攀前人没攀过的高峰"},{"type":"paragraph","text":"我国自建铂重整石油化工装置达国际先进水平"},{"type":"paragraph","text":"投产后，已为国民经济各部门提供了大量的重要化工原料，彻底粉碎了帝国主义和修正主义的技术封锁"},{"type":"paragraph","text":"新华社三十日讯　我国完全运用自己的科学研究成果和依靠自己的技术力量建设起来的第一套铂重整石油化工联合装置，到八月二十五日为止已经安全运转了二百五十天，达到了国际上同类装置在首次开炼后长周期安全运转的先进水平。用这套装置加工出的产品，质量很好，成品合格率始终保持百分之百，主要技术经济指标也都达到和超过了国外先进水平。"},{"type":"paragraph","text":"这项新的生产技术成就，是我国职工活学活用毛泽东思想的新成果，是贯彻执行党的社会主义建设总路线和党的自力更生、奋发图强、艰苦奋斗、勤俭建国方针的新胜利。这一事实再一次向人们雄辩地说明，只要有了用毛泽东思想武装起来的人，任何困难都能战胜，任何人间奇迹都可以创造出来。"},{"type":"paragraph","text":"铂重整石油化工装置，是目前世界上的一种新型炼油装置，只有少数国家能够制造和建设。它的主要用途，是通过一种含“铂”催化剂的化学作用，从石油中提炼重要化工原料——高纯度的苯类。这种装置的结构十分精密，工序多，流程复杂，技术要求严格，自动化水平高，任何一道工序如果有一点轻微波动，就会影响产品质量。因此，要做到顺利开工投产和长周期运转，是一项十分艰巨的任务。"},{"type":"paragraph","text":"担负这套装置运转任务的是一支年轻的队伍，平均年龄只有二十四岁。但是，由于他们用毛泽东思想武装了头脑，坚持突出政治，活学活用毛主席著作，把炼塔当作反帝反修的战场，充分发挥敢想敢干的革命精神，敢于走前人没有走过的道路，敢于攀登前人没有攀登过的高峰。同时又大搞调查研究，刻苦钻研技术，终于在很短期间就摸索出了一套合理的操作方法，做到了一次投产成功，也保证了开炼后的安全运转。职工们说：新兵打硬仗，全靠红思想。新装置安全投产和长期运转的胜利，这是毛泽东思想的胜利。"},{"type":"paragraph","text":"这套装置能够保持长期安全运转，也表明我国自行研究和设计的工艺流程是先进的，自己制造的设备和自己施工建设的工程质量是头等的，自己制造的催化剂性能是良好的，用毛泽东思想武装起来的职工队伍的技术水平也是很高的。"},{"type":"paragraph","text":"这套新型的石油化工装置投入生产以后，已经为我国国民经济各部门提供了大量的重要化工原料，彻底粉碎了帝国主义和修正主义的技术封锁。（附图片）"},{"type":"paragraph","text":"上图：浙江省绍兴氮肥厂首期工程建成并投入生产。图为绍兴氮肥厂一角。　新华社记者摄"},{"type":"paragraph","text":"右图：一座高达二百米的现代化电视塔，在广州市建成。这座电视塔是由我国自己设计，自己制造，自己架设的。全部建成后，可以同时播送几套电视节目和几套调频广播节目。　  新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe4a58fa6e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
