助接管上海工作给邓小平、饶漱石、陈毅的指示","authors":[],"dates":[{"year":1949,"month":4,"day":7}],"is_range_date":false,"parts":[{"text":"中共中央关于争取资产阶级代表人物协助接管上海工作给邓小平、饶漱石、陈毅的指示","type":"title"},{"text":"一、长江水势一个月内（四月上旬至五月上旬）是否会有很大的变动，请即查告。","type":"paragraph"},{"text":"二、上海民主建国会主要负责人黄炎培、章乃器、盛丕华、包达三、张絅伯、施复亮等已到北平，表示向我们靠拢，他们是上海自由资产阶级的代表，我们认为接收及管理上海如果没有自由资产阶级的帮助，可能发生很大的困难，很难对付帝国主义、官僚资本及国民党强大的联合势力，很难使这些敌对势力处于孤立。这件事，你们现在就应开始注意。因此，请你们考虑，是否有必要在没有占领上海以前，即吸收他们参加某些工作。而在占领上海以后，则吸引更多的这类人物参加工作。如果允许他们参加工作，采取何种方式为宜，设立某种咨询机关，例如参议室之类是否适宜。请考虑答复。","type":"paragraph"},{"text":"三、不但上海如此，整个京、沪、杭区域都应注意此点。","type":"paragraph"},{"text":"四、黄炎培给陈毅同志的电报应给以回答。","type":"paragraph"}],"comments":[],"origin":"陈文斌、邵纬生主编《中国资本主义工商业的社会主义改造 中央卷》（上册），中共党史出版社，1992年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d93292bd3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
