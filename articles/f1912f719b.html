rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席会见老挝国王","authors":[],"parts":[{"type":"paragraph","text":"新华社6日讯 刘少奇主席今晚会见老挝国王西萨旺·瓦达纳陛下，宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，老挝方面在座的，有王子苏里亚·冯·萨旺亲王，老挝王国政府首相梭发那·富马亲王，外交大臣贵宁·奔舍那，新闻、宣传、游览大臣富米·冯维希，公共工程、运输大臣贡·萨纳尼空，老挝驻苏联大使坎番·班雅，外交部礼宾司长乌代·苏发那冯，内阁会议顾问拉·诺林，国王私人秘书通苏亲王，国王副官科·文冯苏准将，新闻局长提·塔马冯，国王传令官昭·拉塔纳·金达冯上校，首相副官塔文·乌达农中校等。老挝驻中国大使坎京·苏万拉西也在座。"},{"type":"paragraph","text":"中国方面在座的，有董必武副主席，朱德委员长，周恩来总理，人大常委会副委员长彭真、林枫，国务院副总理陈毅、聂荣臻、薄一波，政协全国委员会副主席李四光，国防委员会副主席傅作义、蔡廷锴，对外贸易部部长叶季壮，国务院外事办公室副主任张彦，外交部副部长章汉夫、姬鹏飞，对外经济联络总局局长方毅，我国驻老挝大使刘春，外交部第二亚洲司司长周秋野，礼宾司副司长葛步海。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1912f719b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
