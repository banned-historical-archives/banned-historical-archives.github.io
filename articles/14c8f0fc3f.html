script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"王亚南谈马克思对资产阶级政治经济学批判的态度与方法","authors":[],"dates":[{"year":1962,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不久前，厦门大学校长王亚南在上海经济学会一九六一年年会上作了“马克思对资产阶级政治经济学批判的态度与方法”的学术报告，论述了马克思怎样对待批判、马克思对资产阶级政治经济学批判的严肃态度、马克思对于资产阶级政治经济学批判的正确方法。"},{"type":"paragraph","text":"王亚南说，为了完成无产阶级和人类解放的阶级历史任务，马克思对以往一切社会特别是资产阶级社会的各种社会科学、学术思想进行了严肃的认真的检查、清算和批判，既不是全盘接受，也不是简单地否定。马克思经常把“非批判地”这个名词来批评那些没有经过思考的只是反映现象的庸俗的理论。这里我们不难看出马克思是如何对待批判的。马克思对资产阶级政治经济学的批判是以真理为标准，是就是是，非就是非，即以此区别什么是“古典的”，什么是“庸俗的”。在批判中，马克思从没有放过任何一个大经济学家的大著作中的小缺点，对那些不知名的作家的小册子也从没忽略过；对那些专以辩护为能的肤浅的说教，马克思给以辛辣的讽刺，而对那些在经济学上有贡献的学者及其理论则是赞扬备至。这种无一点狭隘宗派性的气魄，只有无产阶级的革命者、思想家才会有的。"},{"type":"paragraph","text":"关于马克思在批判中所使用的方法，王亚南说，马克思主义政治经济学，尽管在理论方面还批判地吸收了资产阶级政治经济学的一些古典的合理的部分，但在方法论上一开始就是同资产阶级的半历史主义的形而上学的方法相对抗的；马克思采用了辩证唯物主义的方法、研究和说明的方法、历史和逻辑的方法，通过对资本主义生产关系的研究，建立自己完整的理论体系，在这个体系中对各种错误思想错误理论进行统一的全面的批判。(泉)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14c8f0fc3f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
