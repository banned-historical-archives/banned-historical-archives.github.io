"https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/5a6e14f4-1103-48c3-bd99-37613918dd4b.pdf"],"article":{"title":"中共中央转发毛主席视察华北、中南和华东地区时的指示","alias":"","parts":[{"type":"paragraph","text":"外阶级敌人的破坏活动。"},{"type":"paragraph","text":"无产阶级文化大革命，是毛泽东思想同广大人民群众相结合的运动，毛泽东思想一旦为亿万群众所掌握，就成为不可战胜的物质力量，就可以保证我们的无产阶级专政永不变色，就可以使我国的社会主义革命和社会主义建设沿着毛泽东思想的道路胜利前进！"},{"type":"paragraph","text":"无产阶级革命派联合起来，高举毛泽东思想的伟大红旗，把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"全世界无产者联合起来，全世界无产者同被压迫人民、被压迫民族联合起来！打倒以美国为首的帝国主义！打倒以苏修领导集团为中心的现代修正主义！坚决支持越南人民伟大的抗美救国战争！坚决支持亚洲、非洲、拉丁美洲各国人民的革命斗争！坚决支持世界各国人民的革命斗争！一定要解放台湾！全国各族人民的大团结万岁！中华人民共和国万岁！伟大的、光荣的、正确的中国共产党万岁！伟大的马克思列宁主义万岁！战无不胜的毛泽东思想万岁！我们伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"（原载1967年10月2日《人民日报》）"},{"type":"paragraph","text":"中共中央转发毛主席视察华北、中南和华东地区时的指示"},{"type":"paragraph","text":"（一九六七年十月七日）"},{"type":"paragraph","text":"在无产阶级文化大革命取得决定性胜利的关键时刻，我们伟大的领袖毛主席、最近两个多月视察了华北、中南和华东地区，调查了河北、河南、湖北、湖南、江西、浙江、上海等省市无产阶级文化大革命的情况。在视察过程中，毛主席对各地区的无产阶级文化大革命运动作了极为重要的指示。"},{"type":"paragraph","text":"现将毛主席视察华北、中南和华东地区时的重要指示记录稿转发给你们。希望你们组织群众认真学习，深刻领会，以伟大领袖毛主席的重要指示为武器，总结前一阶段运动的经验教训，制定贯彻执行的具体措施，紧跟毛主席的战略部署，把无产阶级文化大革命运动推向一个新的阶段。"},{"type":"paragraph","text":"各地要将贯彻执行的情况报告中央。记录稿未经主席审阅，不要在大小报纸和刊物上发表。"}],"authors":[],"dates":[{"year":1967,"month":10,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":604,"page_end":604},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2177fc84d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
