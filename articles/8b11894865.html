script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"根据毛主席原词改编“蝶恋花”大型舞剧在京演出词的意境、音乐的旋律、舞蹈的语言，表达了当年烈士们可歌可泣的英雄事迹。","authors":[],"dates":[{"year":1959,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京3日电】　2日晚解放军文艺会演中，人民解放军前进歌舞团演出了优秀舞剧一一根据毛主席的原词改编的“蝶恋花”。"},{"type":"paragraph","text":"该剧以怀念人民革命先烈，歌颂革命忠魂永生为主题，表现了优秀的共产主义战士柳直荀、杨开慧生前的英勇斗争史迹。以浪漫主义的手法写出人民英雄牺牲后光临月宫，吴刚、嫦娥为忠魂捧酒献舞。六亿五千万中国人民在共产党的领导下继承了先烈的遗志，取得了伟大的胜利。"},{"type":"paragraph","text":"故事发生在1927年大革命失败后的湖南农村，国民党反动派对革命进行了大规模的屠杀，革命遭到了严重的损失。在一个漆黑的夜里，“宁错杀一千人，不使一个漏网”的国民党反动派正押着柳直荀走上刑场，而在这千钧一发的时候，老铁匠和杨开慧带着地下武装，粉碎了敌人的阴谋，救出了自己的阶级弟兄。就这样，他们组织起农民武装起义，巧妙地攻克了国民党反动县政府，成立苏维埃政权，建立起一支红军队伍。高举红旗，继续战斗……显示出中国革命从星星之火到燎遍原野。从大革命失败到举国欢庆新中国的诞生，遥遥的历程只用两个多小时演完，时代背景交待得很清楚。全剧根据词的意境，应用生动的形象、优美的音乐旋律、舞蹈的语言，表达了当年烈士们可歌可泣的英雄事迹。他们还运用了许多传统的民间舞蹈动作表现了刚强英勇的红军战士的形象。舞剧的高潮是这样开展的:柳直荀高举红旗冲在最前面——杨开慧带领赤卫队前来支援时，前面战士倒下去，后面紧紧跟上来。杨开慧身中数弹含笑倒下，手里紧握住的红旗始终不倒……柳直荀身负重伤，高举火炬倒下……两道彩虹冉冉升起。亲人栽上了柳树杨树。李淑一只有愤慨没有痛哭，把儿子交给红军，在烈士面前默默宣誓……。而当柳树杨树屹立在碧水荡漾的湖边，群众列队献花致敬时，观众和演员思想情感起了共鸣，一同怀念着革命忠魂。"},{"type":"paragraph","text":"按照词意，舞台上展现出一幅月宫图画:为了迎接贵宾，嫦娥舒广袖为忠魂翩翩歌舞，吴刚捧出桂花酒，而当中国革命取得伟大胜利、“人间曾伏虎”的捷音传到天上时，革命忠魂激动得“泪飞顿作倾盆雨”，都给人一种新鲜优美感觉；在灯光布景方面，也有不少创造。"},{"type":"paragraph","text":"前进歌舞团在创作这一舞剧的过程中，为了体现毛主席的原作精神，编导、作曲人和演员们，曾请郭沫若为他们解释毛主席“蝶恋花”的词意，还广泛征求了许多专家的意见。部队首长邓华上将和周桓上将对他们作了许多宝贵指示。"},{"type":"paragraph","text":"以怀念人民革命先烈、歌颂革命忠魂为舞剧主题，是一种大胆的艺术尝试。在整个舞剧的处理上，有些地方还不够理想，有待进一步精炼、提高。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b11894865"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
