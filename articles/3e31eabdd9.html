art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忠于党忠于人民忠于毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"本报讯 铁道兵某部副班长、一心为公的硬骨头战士张春玉，最近在医院里学习了刘英俊同志的英雄事迹。"},{"type":"paragraph","text":"张春玉说：“毛主席的好战士刘英俊虽然光荣地牺牲了，但是，他的英雄形象却永远活在全国人民的心里。他是我前进道路上的又一面镜子，是我永远学习的光辉榜样。我从他的事迹中，再一次看到了毛泽东思想武装起来的战士最勇敢，最坚强，最不怕死。同时，也使我深刻体会到，谁要是认真学习毛主席著作，按毛主席指示办事，谁就能在革命的大道上向前飞跑，成为一个优秀的无产阶级革命战士。我一定要努力向刘英俊同志学习，‘生为革命生，死为革命死’，永远忠于党，忠于人民，忠于毛泽东思想！”RW：张春玉；言论"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e31eabdd9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
