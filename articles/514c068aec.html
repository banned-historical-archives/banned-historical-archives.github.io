tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"昨日要闻简报","authors":[],"parts":[{"type":"paragraph","text":"中缅两国政府发表联合公报"},{"type":"paragraph","text":"中缅两国政府在十月十四日发表联合公报。公报说，两国总理对近年来两国友谊在和平共处五项原则的基础上日益加深和发展，以及两国经济技术合作的加强，表示满意。双方重申决心继续努力，在同其他各国关系中坚持贯彻五项原则，来扩大和平和友好合作的地区。"},{"type":"paragraph","text":"吴努总理离京回国"},{"type":"paragraph","text":"缅甸总理吴努十四日乘专机离开北京回国，周恩来总理和陈毅、李先念、罗瑞卿副总理等到机场欢送。"},{"type":"paragraph","text":"胡志明主席黎笋同志离京赴苏"},{"type":"paragraph","text":"越南劳动党中央委员会主席胡志明同志和第一书记黎笋同志，十四日乘飞机离开北京前往莫斯科参加苏联共产党第二十二次代表大会。朱德、邓小平、彭真等同志到机场送行。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"514c068aec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
