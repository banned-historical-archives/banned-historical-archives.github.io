ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"给习仲勋的信","alias":"","parts":[{"type":"paragraph","text":"给习仲勋“的信"},{"type":"paragraph","text":"（1946年9月2日）仲勋同志："},{"type":"paragraph","text":"来信收到。即照所定方针去做。作战时，注意集中绝对优势兵力歼敌一部，如来信所说集中六至七个团歼敌一个团。得手后看形势，如我损伤不大，又有好打之敌时，可接着打第二仗，再歼敌一个团；如不好打，则撤回休整，待机再打。此外，须准备三千人左右补充作战部队的消耗，请早为准备。最好先期交付各旅训练，临时可迅速补充。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月二日[1]习仲勋（1913一2002），陕西富平人。当时任中共中央西北局书"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":9,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":125,"page_end":125},"tags":[{"name":"毛泽东","type":"人物"},{"name":"习仲勋","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"012bb30876"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
