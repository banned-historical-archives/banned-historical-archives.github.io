torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"在中共中央政治局常委会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局常委会议上的讲话！"},{"type":"paragraph","text":"（1935年10月18日）"},{"type":"paragraph","text":"入陕作战方针主要在西边打蒋。我们需要了解红二十五军和红二十六军的情况，以及陕北苏区的情况。我们可以与他们联系见面，确定我们的方针。现在我们已到陕西，去保安尚有五天路程。到保安，如无特别敌情，把保安变为苏区。现决定在保安暂停，如敌情许可，可把部队放在吴起镇、靖边，派负责人到苏区去。过去敌人对我们是追击，现在改为“围剿”，我们要打破这一“围剿”。由司令部、政治部发一训令下去：第一，整顿部队，提高战斗力；第二，与群众建立很好的关系，扩大红军，组织游击队；第三，解决物质器材问题、衣服问题，自己解决，不要麻烦红二十五军和红二十六军。"},{"type":"paragraph","text":"[1]1935年10月18日，中共中央政治局常委召开会议，讨论陕甘支队"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":10,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":247,"page_end":247},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b73dc35c45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
