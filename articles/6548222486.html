" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中南土地改革和农业生产情况","authors":[],"dates":[{"year":1951,"month":7,"day":9}],"is_range_date":false,"parts":[{"text":"中南土地改革和农业生产情况","type":"title"},{"text":"中南区土地改革有三种情况：河南省在六月初已基本完成；鄂、湘、赣三省在春耕紧张季节到来时即暂时停止，部分地区开展减租以解决春荒和生产困难；两广仍在继续进行土改。广东土改第一阶段工作已全面铺开，至六月十日止据不完整统计农民已减租二亿斤。广西土改结合生产进行，秋收前将完成二十六个半县约四百八十万人口地区的土改，减租反恶霸工作亦已突破重点。","type":"paragraph"},{"text":"农业生产方面严重的情况是和旱灾、虫灾斗争的问题。自插秧以来，江西、湖南等地先涝后旱，最近雨量不足，已呈旱象，江西宜春，湖南新化等县数十万亩晚稻田因缺水而插不下秧。六月十四日前后，两省普降时雨，已使旱灾减轻，农民正迅速抢种补种。虫灾在各地已均有发现，稻田中多螟虫、稻包虫、棉田中有土蚕。河南嵩县、固始等十三个县发生蝗虫，最严重的鹿邑县每平方公尺土地上平均有一百个蝗蝻。初步统计受害五万三千多亩。棉蚜在河南普遍发生，为害严重的巩县全县和偃师二个区有百分之八十被害。人民政府已领导农民进行了除虫运动，以保证农产丰收。此外，河南、湖南部分地区发生雹灾，河南南阳、洛阳等二十四个县降雹，受灾人口约五十万，受害青苗地三百五十万亩。广东、湖南等地的夏荒经过减租和调剂后已好转。但灾区和贫瘠山区尚须注意。如湖南滨洞庭湖滨水灾区因历年遭受水灾，其中百分之二十至三十的人口有困难。山区如安化二区东山乡目前即有百分之四十四的人口没饭吃。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年7月9日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6548222486"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
