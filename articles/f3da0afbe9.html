art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平会见特拉奥雷总统他说，我们正在把党和国家的生活纳入正轨，包括人的思想、精神面貌和社会风气","authors":[],"parts":[{"type":"paragraph","text":"据新华社八月二十五日讯 中共中央副主席邓小平今天下午在人民大会堂会见了马里共和国总统、马里人民民主联盟总书记穆萨·特拉奥雷。"},{"type":"paragraph","text":"一九七三年特拉奥雷总统第一次来我国访问时，邓小平曾陪同他到外地参观访问。今天，特拉奥雷见到邓小平时说，我很高兴在八年以后再次见到你。"},{"type":"paragraph","text":"在交谈中，邓小平谈到了自特拉奥雷上次访华后中国所发生的变化。他说，这是情况非常复杂而且又是发生巨大变化的八年。党的三中全会使我国的政治形势开始了真正的转变。这次会议确定了现行的思想、政治和组织路线，恢复了毛泽东思想的本来面目，并确定了一心一意搞四化的目标。他说，我们正在把党和国家的生活纳入正轨，包括人的思想、精神面貌和社会风气。现在可以说，我们已经看到了成效。我们确信，我们党的方针、路线只要坚定地贯彻执行下去，我们的事业是有希望的。"},{"type":"paragraph","text":"特拉奥雷说，八年来，中国取得了很大进步。我这次在辽西和沈阳参观访问，看到了中国正在以巨人般的步伐前进。他说，我这次同你们的会谈是完全成功的。我确信中国的情况会一天天好起来，我们两国的友好合作关系将进一步得到加强。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3da0afbe9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
