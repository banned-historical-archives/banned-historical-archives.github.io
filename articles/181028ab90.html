al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"好个民族自决","alias":"","parts":[{"type":"paragraph","text":"好个民族自决"},{"type":"paragraph","text":"（1919年7月14日）"},{"type":"paragraph","text":"波兰截克复国，都所以制德国的死命，协约国尽力援助之，称之为“民族自决”。亚刺伯?有分裂土耳其的好处，故许他半自立。犹太欲在巴力斯坦复国，因为于协约国没大关系，故不能成功。西伯利亚政府有攻击过激党的功绩，故加以正式承认。日本欲伸足西伯利亚，不得不有所示好，故首先提议承认。朝鲜呼号独立，死了多少人民，乱了多少地方，和会只是不理。好个民族自决！我以为直（真）是不要脸！"},{"type":"paragraph","text":"[1]截克，今译捷克。[2] 亚剌伯，今译阿拉伯。[3]巴力斯坦，今译巴勒斯坦。"},{"type":"paragraph","text":"[4]西伯利亚政府，指1918年2月9日在俄国托姆斯克所建立的白卫分子一社会革命党人的反革命政府。1919年12月，随着高尔察克的军队完全被苏联红军粉碎而瓦解。"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":524,"page_end":524},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"181028ab90"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
