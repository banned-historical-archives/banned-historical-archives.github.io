:[{"year":1967,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把资产阶级反动路线批倒批臭守卫"},{"type":"paragraph","text":"天安门战士　卢燕财"},{"type":"paragraph","text":"毛主席教导我们：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派正是在这个革命的首要问题上，混淆了是非，颠倒了黑白。"},{"type":"paragraph","text":"早在一九五○年，他就大肆吹捧过美化敌人、污蔑革命人民、宣扬卖国主义的反动影片《清宫秘史》。"},{"type":"paragraph","text":"在这次无产阶级文化大革命中，他更变本加厉，制定了资产阶级反动路线，“打击一大片，保护一小撮”，千方百计包庇走资本主义道路的当权派，疯狂压制革命的群众运动。"},{"type":"paragraph","text":"他的地主资产阶级的立场何等的鲜明！几十年来，他的这个本性没有丝毫改变，在无产阶级文化大革命中提出资产阶级反动路线，决不是偶然的。"},{"type":"paragraph","text":"党内走资本主义道路的当权派越是害怕革命的群众运动，我们越是要起来造他们的反，把他们斗倒、斗垮、斗臭，在革命斗争中彻底埋葬旧世界，建立一个红彤彤的新世界！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c6572925f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
