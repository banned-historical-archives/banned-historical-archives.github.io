动猛烈冲击垄断资本反动统治","authors":[],"dates":[{"year":1968,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学生运动是整个人民运动的一部分。学生运动的高涨，不可避免地要促进整个人民运动的高涨。"},{"type":"paragraph","text":"中国无产阶级文化大革命激发了世界革命人民敢于斗争敢于胜利的英勇气概"},{"type":"paragraph","text":"西欧北美学生运动猛烈冲击垄断资本反动统治"},{"type":"paragraph","text":"声势浩大的学生运动正在同工人运动逐步汇合，显示西欧北美人民处在新的觉醒中"},{"type":"paragraph","text":"正当整个资本主义世界的政治危机和经济危机加速发展的时候，强大的进步学生运动正在西欧和北美兴起。资本主义世界心脏地区的学生最近掀起的反对腐朽的资产阶级教育制度，争取民主权利，反对统治集团反动的内外政策的斗争，风起云涌，迅猛异常。这是西欧、北美人民日益觉醒的一个重要标志，是国际垄断资产阶级反动统治日益不稳的一个突出表现。"},{"type":"paragraph","text":"西欧、北美声势浩大的进步学生运动正在同工人运动逐步汇合，形成一股巨大的潮流，猛烈地冲击着垄断资本的反动统治。在学生和工人的英勇斗争面前，反动统治集团惊慌不安，手足失措，它们正在伙同形形色色的叛徒、工贼对人民的斗争进行破坏和镇压。但是，反动派的任何垂死挣扎，都只能促进人民的觉醒。"},{"type":"paragraph","text":"西欧、北美进步学生运动的迅速发展，是和震动世界的中国无产阶级文化大革命的巨大影响分不开的。这场史无前例的伟大革命鼓舞了西欧、北美人民的战斗意志，加速了战无不胜的毛泽东思想在西欧、北美的传播。在这些地区的青年学生中，学习毛主席著作和《毛主席语录》的人正在不断增加。在示威游行队伍中，可以经常看到有人高举伟大领袖毛主席的画像，高举红彤彤的《毛主席语录》和佩戴毛主席像章。越来越多的人表示要走毛主席指引的革命道路。"},{"type":"paragraph","text":"我们的伟大导师毛主席指出：“不管反动派怎样企图阻止历史车轮的前进，革命或迟或早总会发生，并且将必然取得胜利。”西欧、北美人民要革命。西欧、北美的人民运动一定会不断高涨。不管各国反动派怎样玩弄反革命的两面手法，也不管现代修正主义者怎样阴谋破坏，都不可能阻挡这个汹涌澎湃的革命潮流。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cffc833ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
