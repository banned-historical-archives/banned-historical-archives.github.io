es":[{"year":1960,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京21日电】　瓜亚基尔消息:厄瓜多尔香蕉中心克维多城的人民昨天占领了市府大楼，并焚烧了几个当局首脑人物的住所。人民的这一激愤行动是为了反对欺压劳动者的地主和非法地使自己发财致富而使人民处于贫困境地的市政官员。政府曾经答应进行一些改革，但这些改革一直没有实现。"},{"type":"paragraph","text":"克维多城人民的正义行动遭到政府派到那里去的警察部队和军队的镇压，造成一些人的死亡和受伤。"},{"type":"paragraph","text":"最近几个月来，在厄瓜多尔的若干地方也发生了相似的行动、特别是在阿瓜卡塔耳、纳兰哈耳和米拉格罗，那里的农民在要求实施土地改革的口号下，占领了属于一些臭名远扬的地主的没有耕种的土地。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63b25597b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
