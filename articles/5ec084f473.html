:1966,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"跟着毛主席闹一辈子革命"},{"type":"paragraph","text":"据新华社济南电  济南十万多革命职工，最近领到了山东省总工会和济南市总工会发给的《毛主席语录》。广大革命职工领到《毛主席语录》后，个个欣喜若狂。"},{"type":"paragraph","text":"小清河航运局的老船工杨国丰得到一本《毛主席语录》以后，激动得热泪盈眶，振臂高呼：“毛主席万岁！”济南针织厂的革命职工说，毛主席的书是精神原子弹，威力最大。有了毛主席的书，掌握了毛泽东思想，就天不怕，地不怕，刀山敢上，火海敢闯。我们工人要跟着毛主席闹一辈子革命。"},{"type":"paragraph","text":"广大革命职工领到《毛主席语录》后，如饥似渴地怀着深厚的阶级感情进行学习。他们班前学，班后学，早起晚睡，抓紧一切时间进行学习。许多人学习了毛主席关于阶级和阶级斗争的语录，更加心明眼亮，不断地夺取无产阶级文化大革命的新的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ec084f473"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
