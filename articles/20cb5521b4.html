script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"前奏曲","authors":["北京市","张权"],"dates":[{"year":1948,"month":1,"day":1}],"is_range_date":false,"parts":[{"text":"前奏曲","type":"title"},{"text":"北京市张权","type":"authors"},{"text":"[张权：1957年为中央实验歌剧院独唱演员和声乐教师]","type":"subtitle"},{"text":"(海外音乐通讯“留美杂志”)","type":"subtitle"},{"text":"能得到赴美研究音乐的机会，是远在前三年时，由于斌大主教决定的，但是当时仍在水深火热的抗战期间，整个大后方的交通工具都颇感困难，而当时出国的路线，只有一条路，那就是由重庆乘飞机到印度的加尔格答城。然后再改乘美军返国的军舰渡洋赴美。可是我并没有采取这条航线。一，因为我是公费及奖学金的留学生，自己本身经济能力，可以说是极有限；二，到了加城，因等候船只而逗留三、四个月未能成行者，大有人在。倘若一旦我也如此，那将必成为流浪儿无疑了。","type":"paragraph"},{"text":"所幸上天助我，战事在第二年就胜利结束了。我在胜利初的第九个月，返抵了久别的上海，立即办理一切出国手续，到美大使馆，到医院，到南京教育部，往返京沪线上就有八次之多。与美方学校联络，到中央银行，到外交部的……到……，就是如此的东到西的，又到中国旅行社定船票，定了又退，退了又定，后来又退。第一次是因为证件，教育部成问题，给耽搁了船期而退。第二次一切都办好了，因美海员大罢工，中美停航而退。一延再延，一等再等，终于在今年五月十六日，连人带行李上了将军号船，离开了祖国，心里深深念了一句“阿门”。","type":"paragraph"},{"text":"这只船是美国一只运输船改造的，从前战时只有官长与士兵室，所以被改为将军号之后，舱位就只有头等与三等。头等房是三人一间，八人一间，二等三等的起码则是三十个人、多者六十人。我买的是三等票，票价美金一百七十一元整，同船者共有一千多人，留学生有一百多人。占全数十分之一强。船于六月二日抵达旧金山，半个月的海上生活暂告一段落。","type":"paragraph"},{"text":"在旧金山住在天主教的一个女子客室里，是教会里早就予备好的，而我人尚未到，报纸则早就有消息了，只休息了一个星期，就有了一个半公开的独唱会，以后是在两个月的期中举行了四个独唱会，最后一个是完全公开的演唱。据说在旧金山华人开独唱会者尚以此次为首次，我并没有以此为荣，我只是站在音乐工作者岗位上从事我工作而已。在这几个音乐会的情况中，我有几种感觉。一、美国的朋友们这样的惊奇，中国会有人能唱歌和有人能作歌曲，是那样的使他们兴奋与热爱。在一个他们欢迎的茶会中。曾有很多人问我“中国的音乐是如此的在进步吗？请你告诉我们吧！这是我们坦白的问话，别生气吧”；朋友们，你们知道我的心吗？我并没有生气，我只是想哭出来，我难过，为什么他们对我们的认识这样浅呢？多少年来所谓国际文化交流，就是这个成绩吗？我并没有口头回答他们，只是以事实予以答复。","type":"paragraph"}],"comments":[],"origin":"原载综合艺术杂志社出版，第一卷第一期“综艺”,1948年1月1日出版。摘自首都音乐界反右派斗争资料(二)，首都音乐界整风联合办公室编印，1957年11月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20cb5521b4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
