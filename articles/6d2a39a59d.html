的通知","authors":[],"dates":[{"year":1967,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"中共中央关于各地群众组织代表团来京谈判需达成六条协议的通知","type":"title"},{"text":"浙江，江西，广西，湖南，河南，鞍钢，鞍山市来京会谈的代表团同志们并各省，市自治区革命委员会，军事管制委员会，革命委员会筹备小组，各大军区，省军区，各部委：","type":"appellation"},{"text":"为了保证各地代表团在京会谈的顺利进行，有利于中央对各地问题的解决，中央要求各地代表团中有争议的双方，能够达成协议，保证以下六条能在各地实现：","type":"paragraph"},{"text":"一，不上街游行。","type":"paragraph"},{"text":"二，互不打架，互不冲击。","type":"paragraph"},{"text":"三，不抓人，不扣人。","type":"paragraph"},{"text":"四，不阻碍铁路，公路，轮船运输。","type":"paragraph"},{"text":"五，不动员农民进城，拦路，拦车。","type":"paragraph"},{"text":"六，不夺枪，不开枪。","type":"paragraph"},{"text":"达成协议后，双方应立即用电话通知回去，保证切实执行。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第三集）》， 北京：1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d2a39a59d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
