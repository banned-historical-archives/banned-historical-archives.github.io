" crossorigin="">{"props":{"pageProps":{"books":[{"id":"c814e28a-6a5d-435e-b402-3c375ab69c97","name":"张春桥和上海工司常委的三份指示（1967.3）","internal":false,"official":false,"type":"img","author":"张春桥，上海工司常委，1967.3，上海红旗锅炉厂造反兵团翻印、青浦县朱家角镇中心校毛泽东思想红卫兵司令部翻印","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c814e28a-6a5d-435e-b402-3c375ab69c97/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c814e28a-6a5d-435e-b402-3c375ab69c97/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c814e28a-6a5d-435e-b402-3c375ab69c97/3.jpg"],"article":{"title":"张春桥同志指示","alias":"","parts":[{"type":"paragraph","text":"1967年3月16日下午化工联合指部传达今天传达张春桥同志最近的指示和工司的指示"},{"type":"paragraph","text":"握说最近王洪文同志生疯，潘国平同志去南京。张春桥同志的指示是由陈达凭达的。张春桥同志作了如下的示;"},{"type":"paragraph","text":"给李1.月前的方向是革命组织的丈联合和三合权，在大联合的时候，对获合有利事情要多讲多做，对头联合不利的要少讲少做。造反队要对大华命群做深入细的工作。(自前大联合，三结合是广大草命群众的追吻需一再不抓做就不行了为要会来不能有吃掉或跨那个逛的想法，这种想法是很先险的我行造反一定要大方向亦车，不砸，不抓人。"},{"type":"paragraph","text":"教"},{"type":"paragraph","text":"我们上海的工人革命造反队要提高郁，现在问是复来的，在这种情凶下，我们的脑子不清醒的话，我们这些人就会二次被打成”反革命”"},{"type":"paragraph","text":"变陈不显，曹获秘这两个哪伙很不服气!不认为自已已不台了还要上台。他们打了份报告要张春桥带给陈达同志。这份东西很象话，浅地谈了一些缺点，仿东西已被压下来了。变假如我分放松警惕让他上台，我们就要人头落地。所以在大联合问题上是反派要顾起来，否则，就会被群众抛弃。工总可是毛主席亲自树起的一面大。不会有人公开反对的，但我的要爱惜自已的声，要靠自已的努力。如果有子常一恩想肯定要妮错的。3.于结问题。"},{"type":"paragraph","text":"团结大多数是我们取得最后股利的关键。对人能团结多久就团结多久。不毫老子当自唇。团给一个月，半个月也是好。十.三结”一定要体现生人所级的须导，而不是工人的守。等权后是”工人阶级”掌权，而不是人掌权。在革命委员会里一定"},{"type":"paragraph","text":"从工人中培养一干部区人掌权，或以工人为主，定是错英的一段时向的如果我行"},{"type":"paragraph","text":"然!"},{"type":"paragraph","text":"关于结合，希望你们总给几个典型来。5、关于赤卫队的问题"},{"type":"paragraph","text":"对于赤卫队，我们不能太天真了，不要以为赤卫以组跨了，就万事大吉了，赤卫队至今还未完全打倒，以里在名处迁有三十万，他们转几地下活动，当时为什么没有犯它打倒？由于我们思想上放松了，有彻底肃清它的流毒，所只现在还有三十万赤卫以大肆活动，此外，由于各厂组织不严密，赤卫队已钻入到我们造反队内部来了了)"},{"type":"paragraph","text":"我们放松了个工作，有彻底搞臭赤卫队，是我们的错，一仗今后继快要搞的。"},{"type":"paragraph","text":"另处，要特别警惕赤卫队混入我们组，改组我们组织有些单位老队靠边了，新的上上了.当里有些老的有严重缺点(.)"},{"type":"paragraph","text":"和错模的世应该靠边，但赤以现已有钻入我以搞幕后策搞跨我组织这样他心准备来个大反扑，也必定会看一次大同"},{"type":"paragraph","text":"安的。因此，对一些赤之每以以员(么其是受蒙蔽的)要励细致的是想之依争取形的醒悟，孤立一小·(有些有人抓我)仍造反派的底岸，把我仍前数花黑树料，看黑材料——这要搬当时形势看，也可不能算什么——大做文章。对这个向题我的要独立是孝。其实看了又怎《样呢!"},{"type":"paragraph","text":"一抓住这个小跨子，捞稻草看了就算了。如安梁有人纠缠不休，请他去上海方草会要员念向，心海市命委会同苍的。"},{"type":"paragraph","text":"6整额组织："},{"type":"paragraph","text":"组织要洗，要通过开门整风解头，要亢分发动草命群及"},{"type":"paragraph","text":"展提意见。"},{"type":"paragraph","text":"关于公华今的心"},{"type":"paragraph","text":"公革会的闯题要个决人民的部予盾方法处理，公草会是有缺是，有错误的。世我们平是下要去冲去，是否可从来用其他方未决呢？"},{"type":"paragraph","text":"8，要意群必思想动态，要总结群终验"},{"type":"paragraph","text":"下面是工司常委的指示，"},{"type":"paragraph","text":"1.对于我心造反以内部工作人员，不要动静一动就靠边我们头脑要复杀一点。否妙爱有什么好处，也容易在内部产不生派别。如果谁不好，可从运用四大武器，让向题表现出也好对症下药。"},{"type":"paragraph","text":"2.有强学习，特别要堂习“老三篇”苏五期社论，文汇报社论《莫风头主义》《打倒小团体主义》青·资阳手权经文不等。在止基碰上开门整风。有些以众开心的关门整风也是好的，上上不整好。"},{"type":"paragraph","text":"3不雅活，不准抓人，谁违反这两条，要中破坏先产阶级文化大革命论处。"},{"type":"paragraph","text":"4系统必须大联合，不联合的活全部解散，重新持"},{"type":"paragraph","text":".3."},{"type":"paragraph","text":"下面是工司常委的指示，"},{"type":"paragraph","text":"1.对于我心造反以内部工作人员，不要动静一动就靠边我们头脑要复杀一点。否妙爱有什么好处，也容易在内部产不生派别。如果谁不好，可从运用四大武器，让向题表现出也好对症下药。"},{"type":"paragraph","text":"2.有强学习，特别要堂习“老三篇”苏五期社论，文汇报社论《莫风头主义》《打倒小团体主义》青·资阳手权经文不等。在止基碰上开门整风。有些以众开心的关门整风也是好的，上上不整好。"},{"type":"paragraph","text":"3不雅活，不准抓人，谁违反这两条，要中破坏先产阶级文化大革命论处。"},{"type":"paragraph","text":"4系统必须大联合，不联合的活全部解散，重新持"},{"type":"paragraph","text":".3."}],"authors":["张春桥"],"dates":[{"year":1967,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"张春桥","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3e4253e8f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
