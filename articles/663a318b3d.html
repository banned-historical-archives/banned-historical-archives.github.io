ear":1962,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见亚洲非洲拉丁美洲朋友"},{"type":"paragraph","text":"新华社2日讯　毛泽东主席今天接见了正在北京访问的印度尼西亚、古巴、巴西、怯尼亚和洪都拉斯的外宾，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"这些外国朋友是，以全印度尼西亚中央职工会国际部部长穆罕默德·多希尔为首的印度尼西亚工会代表团，以革命古巴工人中央工会组织书记赫苏斯·索托·迪亚斯为首的古巴工会代表团，以巴西瓜纳巴拉州木器工会领导人罗伯托·莫雷那为首的巴西工会代表团，怯尼亚工会大会司库吉·默·穆第索，以罗迪耳·里维拉·罗迪耳为首的洪都拉斯文化代表团。接见时在座的，有刘宁一、刘长胜、李颉伯、楚图南、康永和、陈忠经、陈宇等有关方面负责人。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"毛泽东主席同在北京访问的印度尼西亚、古巴、巴西、怯尼亚和洪都拉斯的外宾合影  新华社记者　张彬摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"663a318b3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
