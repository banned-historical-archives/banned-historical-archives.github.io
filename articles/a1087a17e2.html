<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1968,"month":4,"day":8}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想武装起来的人是最大的战斗力广东惠阳军分区在深圳举行庆功授奖大会，表彰在支援港九爱国同胞反英抗暴斗争中立功的民兵","authors":[],"parts":[{"type":"paragraph","text":"新华社广州七日电 中国人民解放军广东省惠阳军分区六日在宝安县深圳隆重举行庆功授奖大会，表扬在支援港九爱国同胞反英抗暴斗争中作出了贡献的深圳地区民兵群众，勉励他们更高地举起毛泽东思想伟大红旗，突出无产阶级政治，紧跟毛主席的伟大战略部署，全面落实毛主席的最新指示，把无产阶级文化大革命进行到底，支援港九爱国同胞把反英抗暴斗争进行到底。"},{"type":"paragraph","text":"出席大会的有，广东省军区负责人毛和发，惠阳军分区负责人、宝安县革命委员会负责人。广东省民兵先进集体红色前哨连、港口英雄民兵连的代表，广州部队学习毛主席著作先进单位——黄山洞大队民兵营的代表，以及在支援港九爱国同胞反英抗暴斗争中荣立集体特等功的沙头角镇民兵连也应邀出席了大会。深圳地区的民兵和人民解放军指战员一万人参加了大会。"},{"type":"paragraph","text":"宝安县深圳文锦渡搬运站民兵排、附城公社罗坊村民兵排在会上分别荣立集体二等功一次，并有十三名民兵在会上荣立个人二等功和三等功。"},{"type":"paragraph","text":"大会在庄严的《东方红》歌声中开始。广东省军区负责人毛和发在会上讲话。他说，深圳地区民兵支援港九爱国同胞反英抗暴斗争所取得的巨大胜利再一次证明，最大的战斗力是用伟大的毛泽东思想武装起来的人。只要我们始终如一地活学活用毛泽东思想，那么，一切貌似强大的敌人都是可以被打败的，胜利必将属于我们。"},{"type":"paragraph","text":"他说，伟大领袖毛主席教导我们说：“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑，他们决不会违背这个逻辑的。”港英当局的纸老虎原形虽然已被戳穿，但它们决不甘心失败，它们还要作垂死挣扎。最近以来，港英当局还不断侵犯香港中国同胞的正当权利，对我爱国同胞的迫害一直没有停止，并且又在边境制造事端，进行挑衅，这是我们不能容忍的。我全省军民和全国人民一道，誓作港九爱国同胞的坚强后盾，坚决支持港九爱国同胞把反英抗暴斗争进行到底。他严正警告港英当局，如胆敢捣乱，继续挑衅，必将受到中国人民更加严厉的惩罚。"},{"type":"paragraph","text":"在支援港九爱国同胞反英抗暴斗争中建立功勋的先进集体和先进个人代表在讲话中一致表示，一定要更高地举起毛泽东思想伟大红旗，活学活用毛泽东思想，不断促进思想革命化，百倍提高警惕，加强战争，和伟大的中国人民解放军一起，随时准备打击国内外一切阶级敌人的种种挑衅和阴谋破坏活动，在保卫祖国安全，保卫无产阶级文化大革命，支援港九爱国同胞的反英抗暴斗争中，为人民立新功。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1087a17e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
