al-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"中央人民委员会第二十九号命令","alias":"","parts":[{"type":"paragraph","text":"中央人民委员会第二十九号命令"},{"type":"paragraph","text":"（1932年10月13日）"},{"type":"paragraph","text":"为了适应革命战争的发展，口口各级地方政府军事部的工作，以领导各地地方武装积极参战，军事部长一职，必须富有军事技能与指挥能力的才能担负这一重要工作。人民委员会特决定各级地方政府军事部长一职，改变从前的选任办法，由各军区指挥部瑞金卫戌司令部直接委任，现在各县区军事部长由军区卫戌司令部分别鉴定加以委任或改派，特此令知，希各遵照。此令"},{"type":"paragraph","text":"各级苏维埃政府各军区指挥部瑞金卫戌司令部"},{"type":"paragraph","text":"主席毛泽东副主席项英张国焘一九三二年十月十三日"}],"authors":["毛泽东"],"dates":[{"year":1932,"month":10,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":167,"page_end":167},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6975e9af0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
