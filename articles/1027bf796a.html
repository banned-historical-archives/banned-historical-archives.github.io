<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"冀南行署指示小学教育  纠正左倾偏向  提高学生文化","authors":[],"dates":[{"year":1948,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"冀南行署指示小学教育"},{"type":"paragraph","text":"纠正左倾偏向"},{"type":"paragraph","text":"提高学生文化"},{"type":"paragraph","text":"【冀南讯】今春以来，冀南各县小学教育工作中出现了某种程度的混乱现象。不少教员思想混乱，有的消极敷衍，“当一天和尚撞一天钟”，经常回家；有的怕犯错误，“多一事不如少一事”；有的认为教书没出路，想转业。学校和学生数目普遍减少，企之县去年小学有一百七十九处，今年减为一百四十九处；男女学生减少百分之六十。夏津周里长屯村，去年学生一百五十人，今年只有五十多人。其他各县也有类似现象。"},{"type":"paragraph","text":"造成这种情况的原因：主要是在土改期间，某些地区犯了左倾错误，把干部中进行三查的一套，错误的搬到学校中，没有分清是非轻重，大批解职教员。据四专区十个县的统计，去年原有教员二千八百六十六名，去冬解职一千四百九十九名；邯郸市和邯郸县第四区解职教员三分之二。被解职的教员对我不满，留任的教员，感到教书无保障，消极怠工。因此，就不得不大量停办小学，新提拔的新教员，文化程度低，教学没经验，叫做“成份好没文化”，满足不了学生和群众的要求，入学儿童也大量减少。又经常使学生参加所谓社会活动与生产，也大大影响了学生的文化学习，有的一天只上一课，有的几天不上一课，一般的一年只念一本书，使群众感觉子女在校里学不了东西。有些小学发动贫雇学生斗争地富家庭出来的学生，毫无理由没收他们的书籍被服或拒绝他们入学，学生人数大量减少。"},{"type":"paragraph","text":"冀南行署为纠正以上混乱现象，整顿与加强小学教育，特提出以下几点改进办法：第一，迅速纠正过去左倾冒险主义的错误，对过去被解职的教员，依据团结改造精神重新审查，对仅因成份关系或错误不大而解职者，应向他们解释说明过去是我们错了，将其复职，或予以短期训练再分配工作。第二、各县必须抓紧时间召开在职小学教员会议，讲明我们对小学教员的方针和态度是培养提高并十分尊重信任他们，解决其思想顾虑及实际困难，安定其工作情绪。同时要向群众宣传今后教学的精神，说明方针是培养学生文化程度、贯输科学知识并进而提高其专门职业知识。因此请教员只要“贫雇骨干”，不管文化程度和教学方法；只闹所谓“职业化”、“劳动观念”而不提高文化；学校没有学制，没有班次，随意乱来，都是错误的。对新提拔起来的工农出身的教员，要加强其业务领导与文化学习，在群众中树立其威信，使之逐渐成为小学教员中的骨干（这是错误的，让没有文化不识字的贫雇农作小学教员的骨干是开玩笑——编者）。第三、各级政府必须加强对教育工作的领导，调整教育干部与中心小学校长，加强对学校工作的教育与检查。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1027bf796a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
