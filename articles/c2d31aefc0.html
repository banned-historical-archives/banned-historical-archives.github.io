":1951,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国人民政治协商会议第一届全国委员会昨天举行第三次会议。出席和列席这次会议的人包括了全国人民所公认的战斗英雄、劳动模范和模范工作者。毛主席致开会词，指出抗美援朝的斗争必须继续进行，直到美国政府愿意和平解决的时候为止。因此，我们需要继续加强抗美援朝工作，增加生产，厉行节约，来支持中国人民志愿军，这是中国人民今天的中心任务。接着，周恩来总理作了政治报告。会议定今日继续举行。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2d31aefc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
