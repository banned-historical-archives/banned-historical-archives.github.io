script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"约旦当局准备再向右倾  打算解散议会组织更亲西方内阁","authors":[],"dates":[{"year":1957,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"约旦当局准备再向右倾"},{"type":"paragraph","text":"打算解散议会组织更亲西方内阁"},{"type":"paragraph","text":"本报综合报道　据中东通讯社6日援引许多最近从安曼到贝鲁特的著名人物的话说，约旦当局打算解散议会，并且要求副首相里法伊组织新内阁以代替现在的易卜拉欣·哈希姆内阁。中东通讯社又说，这些人还说，大选将不举行，宪法将停止生效，而国家将根据戒严令来统治。另外有一些人士认为，现任内阁将改组以吸收为宫廷和帝国主义分子所信任的成员参加。"},{"type":"paragraph","text":"同时，中东通讯社6日从大马士革报道，约旦的宵禁已经延长两小时，从晚上九点开始到第二天早上6点。中东通讯社接着说，据安曼消息，约旦公安当局继续进行大规模逮捕民族主义者，到现在为止，已有三千左右的公民被捕，其中包括安曼的艾尔·侯赛因营的许多难民。"},{"type":"paragraph","text":"约旦国王侯赛因已经把宫廷中的工作人员除了四名以外全部调任他职。"},{"type":"paragraph","text":"消息说，把这些工作人员调职是因为国王认为他们都是阿拉伯复兴社会党的党员。在留任的人员中包括宫廷总管塔尔霍尼在内。另据法新社贝鲁特7日消息说，侯赛因已经采取了一系列的剧烈措施，来限制约旦境内埃及侨民的活动。这些措施中包括关闭安曼的哥普特学院，以及没收和烧毁从埃及送去的报纸、书籍和期刊等。安曼的哥普特学院是直接受埃及教育部管辖的，约旦当局指责这个学院的教员怂恿学生们参加政治示威，这些教员将被驱逐到埃及去。"},{"type":"paragraph","text":"侯赛因这些行动，似乎还不能使西方国家安心，它们的报刊担心约旦亲西方势力能否长期控制住局势。纽约的“每日镜报”5日指出，约旦国王侯赛因“似乎已经控制住了局势”，但是“在中东起作用的力量和仇恨的潜流过于强大，目前只不过是暂时没有抬头而已”。美国已经给与约旦“一种不可限量的帮助”，然而侯赛因是否能够“成功地领导约旦向正确的道路前进，只有将来才能知道”。"},{"type":"paragraph","text":"美联社从贝鲁特发出的评论认为，侯赛因虽然获得“哄动一时的胜利”，但是并未因此获得“更高的声望”。在许多阿拉伯人看来，侯赛因应该为“美国对约旦内政的干涉而受到谴责”。"},{"type":"paragraph","text":"另据大马士革消息说，约旦实际上已经接受了艾森豪威尔主义。在目前因为害怕国内反对，约旦当局可能不会公开宣布这件事。大马士革中立的外交人士说：“一些逃至邻国的民族主义领袖已经获得了侯赛因和美国驻约旦大使以及宫庭总管塔尔霍尼之间关于约旦接受艾森豪威尔主义的秘密谈判的钢丝录音。录音表明，美国准备在一旦约旦国内发生叛乱时支持侯赛因，并给约旦足够的财政援助”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf4c940efb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
