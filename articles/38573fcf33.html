责日共修正主义分子疯狂的反华活动","authors":[],"dates":[{"year":1967,"month":7,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共福冈县委员会（左派）党员发表声明"},{"type":"paragraph","text":"高举毛泽东思想红旗大造日修的反"},{"type":"paragraph","text":"声明强烈谴责日共修正主义分子疯狂的反华活动"},{"type":"paragraph","text":"新华社十三日讯　据东方通讯社报道：日本共产党福冈县委员会领导的大约一百名党员，七日发表声明，表示坚决地造日共修正主义分子的反，决心高举马克思列宁主义、毛泽东思想的伟大红旗前进。"},{"type":"paragraph","text":"这批党员已成立起了日本共产党福冈县委员会（左派）。"},{"type":"paragraph","text":"声明在揭露日共修正主义分子的叛卖时强调指出，他们违背了工人阶级的根本利益，破坏和阻碍了广大人民群众的斗争。他们宣扬为侵略效劳的沙文主义，背叛了日本的革命事业。"},{"type":"paragraph","text":"声明谴责日共修正主义分子醉心于资产阶级民主，热中于资产阶级议会。"},{"type":"paragraph","text":"声明还揭露日共修正主义分子同在国际上屈服于帝国主义、在国内复辟资本主义的苏联修正主义领导集团搞合作和讲团结。"},{"type":"paragraph","text":"声明还强烈谴责日共修正主义分子疯狂地进行反华活动。"},{"type":"paragraph","text":"声明表示要坚决消除《修养》的影响，摆脱盲目服从和奴隶主义的错误路线。"},{"type":"paragraph","text":"声明表示要为恢复日中邦交和废除日美“安全条约”而斗争，坚决反对美国侵略越南和要求美国撤除在日本的军事基地。"},{"type":"paragraph","text":"声明说：“我们将沿着反对美帝国主义、日本军国主义和现代修正主义，并同中国、越南以及其他亚洲国家人民团结的道路前进。”"},{"type":"paragraph","text":"声明最后高呼：“用马克思列宁主义、毛泽东思想武装起来的日本共产党福冈县委员会（左派）万岁！”“向用马克思列宁主义、毛泽东思想武装起来的日本全国各地的共产党人欢呼！”“全世界无产阶级反帝、反修团结万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38573fcf33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
