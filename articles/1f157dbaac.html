:[{"year":1962,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"丹麦新任驻华大使"},{"type":"paragraph","text":"向刘少奇主席递交国书"},{"type":"paragraph","text":"新华社16日讯　丹麦王国新任驻华大使安克尔·斯怀特今天下午偕同大使馆外交官员向刘少奇主席递交国书。"},{"type":"paragraph","text":"递交国书时在场的有外交部副部长耿飚、礼宾司副司长葛步海、西欧司副司长宋之光。"},{"type":"paragraph","text":"安·斯怀特大使在递交国书时致颂词说，丹麦政府和丹麦人民特别珍视丹麦和中国之间的良好关系。丹麦将衷心愉快地欢迎两国之间文化、贸易关系的继续发展。"},{"type":"paragraph","text":"刘少奇主席致答词说，中国政府一贯坚持和平的外交政策，愿意在五项原则基础上与不同社会制度的国家和平共处。我国政府也十分珍视增进同贵国的友好关系。刘少奇主席表示深信，中丹两国之间的友好关系将继续得到发展。"},{"type":"paragraph","text":"递交国书后，刘少奇主席同安·斯怀特大使进行了亲切友好的谈话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f157dbaac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
