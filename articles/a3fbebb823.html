script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“退”就一定是修正主义吗?","authors":[],"dates":[{"year":1980,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"林彪、“四人帮”、康生把马克思主义哲学歪曲为一个“斗”字，大造“斗则进，不斗则退”的谬论。在一些同志心目中也有一种“喜进怕退”的错误观念。似乎“进”就一定是马克思主义，“退”就一定是修正主义。上海社会科学院主办的《社会科学》今年第四期发表了郑本法的来稿摘编，谈到了怎样看待“进”和“退”的问题。文章说，“退”并不一定是修正主义；“进”也不一定是马克思主义。问题是要有一定的原则和限度:“进”和“退”都要符合客观规律。跳远运动员只有“退”到合适的位置，才能达到跳远的目的。拳头缩回来，打出去才更有力，这都是生活的常识。文章说，生产关系的“进”和“退”都要以生产力的发展水平为依据。实践证明，以前刮“共产风”，搞“穷过渡”，割什么“资本主义尾巴”，批“按劳分配”、“商品交换”等等，超越客观实际办事，就必然在实践中碰壁。尤其是林彪、“四人帮”、康生一伙大批“唯生产力论”，大搞唯生产关系的“进”，使整个国民经济几乎“进”到崩溃的境地，至今尚未恢复元气。文章说，马克思主义者并不忌讳“退”字。列宁就有一本名著叫做《进一步，退两步》；列宁在谈到实行有秩序的退却时，曾经指出:“最困难的事情，就是让那些已经惯于进攻、浸透革命观点和理想、认为一切退却都是卑劣行为的人们实行退却。”(《列宁选集》第4卷650页)文章还说，粉碎“四人帮”后，“喜进怕退”的错误观念仍纠缠着一些同志，他们迷信“一大二公”，动不动就反“退”，自以为坚持的是马克思主义，殊不知恰恰是违背了马克思主义。　(张云鹄摘)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3fbebb823"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
