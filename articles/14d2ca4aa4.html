art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英元帅和加伦将军","authors":["艾阿维"],"parts":[{"type":"paragraph","text":"1957年11月，彭总和叶帅率中国军事友好代表团参加苏联“十月革命”40周年庆祝活动后到远东访问，在伯力时，叶帅挥笔写下了这样一首七言绝句："},{"type":"paragraph","text":"“不见加伦三十年"},{"type":"paragraph","text":"东征北伐费支援"},{"type":"paragraph","text":"我来伯力多怀旧"},{"type":"paragraph","text":"欲到红河认爪痕”"},{"type":"paragraph","text":"加伦，就是1924年应国民革命军邀请，到广州给孙中山先生当总军事顾问的布留赫尔元帅。"},{"type":"paragraph","text":"当时，加伦还兼住黄埔军校校长顾问，叶剑英则在该校当教官。叶帅和加伦就是在黄埔初次相识的。东征开始后，叶剑英担任国民革命军新编团团长，他智勇双全，才华出众，给加伦留下了深刻的印象。北伐期间，加伦担任北代军的司令蒋介石的总军事顾问，叶剑英在北伐军中担任主力部队——新编第二师师长。在战斗中，他们又结下了深厚的友谊。1927年蒋介石背叛革命，制造了“四·一二”反革命流血事件，加伦将军愤然离开中国。诗中头一句“不见加伦三十年”，从时间上看，即应指1927——1957年这一段时间。"},{"type":"paragraph","text":"1929年中国东北军突袭苏联红军的中东路事件发生后，在莫斯科劳动大学学习的中国师生纷纷要求到远东参战，组织了一个以布留赫尔元帅命名的“布留赫尔营”，叶剑英担任营长。当时，叶剑英化名尤赫洛夫。与此同时，第三国际东方部请示总书记布哈林后，决定在伯力成立远东工人游击队。中共驻共产国际代表瞿秋白指定当时也在劳动大学学习的刘伯承担任游击队司令。该队营地说设在矩伯力十几公里的红河。不久后，叶剑英也来到远东，开始想去游击队，但当时担任远东军总司令的加伦将军一见到他，即把他留在远东军区司令部工作。后来，经叶剑英一再要求，加伦才同意让他去红河，同刘伯承一道搞了一段时间的军事训练。其间，加伦将军还亲自到红河看望叶帅。该诗第四句中提到的“欲到红河认爪痕”，就是指叶帅与加伦将军在红河留下的难忘的记忆。"},{"type":"paragraph","text":"1937年6月，斯大林让出身贫农、对革命忠心耿耿的加伦将军充当了秘密处决图哈切夫斯基元帅等7名著名将领的执法队长。不久，又以“日本特务”、“人民敌人”等罪名密令贝利亚将加伦处决于列弗尔托夫监狱。加伦将军成了1937——1938年苏联肃反扩大化期间被无辜杀害的三名战劝赫赫的元帅之一。直到1956年苏共“二十大”，加伦将军的冤案才得平反昭雪。"},{"type":"paragraph","text":"时隔30年，叶帅重游旧地，不禁心潮起伏，感触万千。当他乘坐的图——104专机在哈巴罗央斯克（伯力）上空下降时，他立刻从舷窗里俯身下望，聚精会神地观察机身下迅速掠过的一片片城镇、森林……一首寄托着无限哀思，饱含着绵绵深情，读了令人不禁潸然泪下的诗，从元帅心中流出了。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14d2ca4aa4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
