<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东号","authors":["丁克辛　轻影","庄言"],"dates":[{"year":1950,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东号"},{"type":"paragraph","text":"（中篇连载）"},{"type":"paragraph","text":"丁克辛  轻影  作  庄言  插图"},{"type":"paragraph","text":"三十五、一件非常重大的事情"},{"type":"paragraph","text":"岳尚武和赵海盛两位同志新参加“毛泽东号”工作，全组乘务员开会欢迎。段上和工会的领导同志们也来参加他们的会，向大家保证一定很好照顾他们的家属。老英雄人口多，困难也大些，先借给他一部分煤和钱，把家安顿好。"},{"type":"paragraph","text":"接着，讨论了进关的工作计划，检讨了各人的缺点，订了立功条件。大家下定决心：要坚决贯彻和推广包乘包修负责制，继续延长甲检公里；把缺点扔在关外，绝不带到关内去；进关后不光帮助关心工友，还要向关内工友虚心学习，绝不骄傲。"},{"type":"paragraph","text":"“我提议！”末了商保恒说：“大家要提高政治，才能真正克服缺点，完成任务。我愿意在欢送会上代表全组讲一讲，来回答全段对咱们的希望。”"},{"type":"paragraph","text":"大家一致拥护老商这提议。"},{"type":"paragraph","text":"全段职工的欢送会是在机务段大礼堂召开的，管理局还派机务处长代表来参加，说不尽的热烈、愉快和兴奋。老英雄致了答辞以后，突然感到很大的不安，他想起了一件非常重大的事情，接着一连串的回忆困住了他。"},{"type":"paragraph","text":"会上，工会主任、机务处长、张代表等勉励大家：“毛泽东号”要保持在东北的光荣，到关内真正起带头作用，千万不要脱离群众，把苏联最新的三包负责制很好的推行到华北华中和华南，以至全国每一个建筑起铁路的地方。老英雄在会上答复说："},{"type":"paragraph","text":"“大军打到哪里，铁路修到哪里；铁路修到哪里，毛泽东号开到哪里；毛泽东号开到哪里，负责制就贯彻到哪里！”"},{"type":"paragraph","text":"鼓掌声真像打雷一样响起来，他说得多有精神多有力量呀。可是老英雄现在被一件非常重大的事情困住了！"},{"type":"paragraph","text":"什么重大的事情呢？"},{"type":"paragraph","text":"他想起：话也讲了，人家手心也拍痛了，一两天就要走了。可是，可是进了关，咱还不是党员，解放三年为什么没进步？……共产党诚心诚意为人民，共产党员最光荣，可是自己呢？……"},{"type":"paragraph","text":"散会以后，他走着还在想：人家郭树德实心实意帮助大家，帮助我！郭树德没有私心！……郭树德是共产党员！……人家为什么就进步这样快？……"},{"type":"paragraph","text":"“一两天就要发车了！”他对自己说。越想心里越像浇了油，脑袋嗡嗡的，脸上烘烘的；郭树德曾经好几次找他谈，他都说不够条件。说不够条件也真不够，因为老是放不下一个家。把自己的事情放在头里，哪够一个共产党员的资格？可是最不好对人明说的是：后来说不够条件已经不是真正在“家”上面，主要是推托之辞，愿意再等一等，看一看，不愿意马上参加。……"},{"type":"paragraph","text":"“老英雄，你净想什么呢？”一路走着的胡春东走近他。"},{"type":"paragraph","text":"还没等老英雄回答，小朱又说了："},{"type":"paragraph","text":"“老英雄的心事我知道！”说着就附耳告诉胡春东。"},{"type":"paragraph","text":"这下他听清看清了，也急了，说：“你是猜我又想家？”"},{"type":"paragraph","text":"“不是！”小朱说：“我猜你……”又附耳告诉他。"},{"type":"paragraph","text":"老英雄的脸飞红了！"},{"type":"paragraph","text":"胡春东和小朱都拉他到一边，低声说："},{"type":"paragraph","text":"“这是正大光明的，没关系，向郭大车大胆提出来。咱俩也早商量好了。”"},{"type":"paragraph","text":"“你两个为什么不提？”"},{"type":"paragraph","text":"“等着你哩，你提我们就提。”"},{"type":"paragraph","text":"“我怕还不够条件。”他说着，微笑了。他想：“这回我已经想开，把家庭放下，自动请求进关，决心给人民给毛主席贡献贡献，不够条件也差不远了吧？……”"},{"type":"paragraph","text":"这心思也早被两个青年猜透了，他们说："},{"type":"paragraph","text":"“嗨，老英雄你别客气啦，你不够条件，谁还够条件？”"},{"type":"paragraph","text":"老英雄听着，像洗了热水澡以后走出澡堂那样的轻爽，他变得很愉快了，决定找郭大车把这事提出来。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c40b9eaab9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
