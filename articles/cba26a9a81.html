集团辩护","authors":["吴世保","编"],"dates":[{"year":1955,"month":6,"day":15}],"is_range_date":false,"parts":[{"text":"成都市部分阶级敌对分子为胡风反革命集团辩护","type":"title"},{"text":"吴世保编","type":"authors"},{"text":"【四川分社十五日电】成都市部分阶级敌对分子为胡风反革命集团辩护。伪军官李嘉增说：胡风在解放前骂国民党骂得很出色，所以共产党才看中了他，今天说他是反革命分子，我看不至于。资产阶级分子刘永康说：胡风在鲁迅未死前就参加了当时的左翼作家联盟，并且很活跃，现在怎么能说他是反革命分子?地主分子张养和也说胡风的罪行是我们捏造的，他说：“欲加之罪，何患无词”。个别阶级敌对分子并诬称对胡风反革命集团的声讨，和封建社会的文字狱一样。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年6月18日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cba26a9a81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
