ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"致刘伯承、邓小平等电","alias":"","parts":[{"type":"paragraph","text":"致刘伯承、邓小平等电\""},{"type":"paragraph","text":"（1949年3月30日）"},{"type":"paragraph","text":"（一）白崇禧的代表（刘仲容）今日到北平，我们决定联合李、白反对蒋党，李、白对此计划已有初步认识，尚待我们深入工作。（二）决定要百让出花园以北地区，我军到信阳、武胜关附近时，如守敌南撤，则不要攻击或追击，让其退至花园及其以南，孝感、黄陂、黄安、阳逻、黄冈等地亦暂时不要去占，待东北主力到达后，再通知白崇禧连同汉口、汉阳等地一齐有秩序地让给我们。（三）麻城、浠水、黄梅、广济、太湖、安庆等处敌军分布情形如何，请刘、陈、邓即查告。这些地方的敌军一般应坚决歼灭之，扫清渡江障碍。惟麻城、浠水两处之敌，如不妨碍陈的进路，亦可以暂置不打，待后交涉要白让出。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致刘伯承、邓小平并告陈毅、饶"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":238},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b08750498"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
