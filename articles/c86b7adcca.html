rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"魏地拉总统举行答谢宴会"},{"type":"paragraph","text":"阿根廷共和国总统豪尔赫·拉斐尔·魏地拉将军和夫人，七日晚在人民大会堂举行答谢宴会。国务院总理华国锋、副总理姬鹏飞，人大常委会副委员长谭震林，政协全国委员会副主席刘澜涛等应邀出席了宴会。魏地拉总统和华国锋总理先后发表了讲话。"},{"type":"paragraph","text":"邓副总理会见魏地拉总统"},{"type":"paragraph","text":"国务院副总理邓小平在会见阿根廷总统魏地拉将军的时候说，全世界爱好和平的国家要联合起来，协调行动，同霸权主义的侵略和扩张行径进行针锋相对的斗争。邓副总理是七日上午在人民大会堂会见魏地拉总统及其部分随行人员的。宾主进行了友好的交谈。会见以后，邓副总理设宴招待魏地拉将军和夫人等阿根廷贵宾。"},{"type":"paragraph","text":"中国和阿根廷签署四个文件"},{"type":"paragraph","text":"中国和阿根廷两国政府关于经济合作和科技合作两个协定以及关于文化交流的两个换文，七日晚上在北京签字。我国国务院总理华国锋和阿根廷总统魏地拉将军出席了签字仪式。国务院副总理姬鹏飞和阿根廷外交和宗教事务部长卡洛斯·华盛顿·帕斯托签署了经济合作和科学技术合作的两个协定，文化部长黄镇和帕斯托部长签署了关于文化交流的两个换文。（据新华社）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c86b7adcca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
