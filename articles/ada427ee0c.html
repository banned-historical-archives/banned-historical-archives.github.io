坦桑第一副总统卡鲁姆在开幕式上讲话赞扬我建设成就","authors":[],"dates":[{"year":1967,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我经济和贸易展览会在桑给巴尔开幕受到热烈欢迎"},{"type":"paragraph","text":"中国的伟大成就是毛泽东思想的胜利"},{"type":"paragraph","text":"坦桑第一副总统卡鲁姆在开幕式上讲话赞扬我建设成就"},{"type":"paragraph","text":"据新华社桑给巴尔十九日电　中国经济和贸易展览会十八日下午在桑给巴尔开幕。坦桑尼亚第一副总统卡鲁姆，为展览会剪彩。"},{"type":"paragraph","text":"在展览会入口大厅的中央，耸立着世界革命人民心中的红太阳毛主席的巨大的全身塑像，背景衬托着许多鲜艳的红旗。"},{"type":"paragraph","text":"卡鲁姆在开幕式上发表讲话，赞扬中国人民在经济建设方面的伟大成就，并祝展览会的胜利开幕。"},{"type":"paragraph","text":"这个展览会反映了中国无产阶级文化大革命的概貌，展出了我们伟大领袖毛主席的著作以及在战无不胜的毛泽东思想指引下我国无产阶级革命派在文化大革命中所取得的成就的模型和图片。展览会还展出了大量的工农业产品、艺术品和手工艺品。"},{"type":"paragraph","text":"卡鲁姆在中国驻桑给巴尔领事刘干和中国展览馆馆长王步云的陪同下，参观了展览会，他以极大的兴趣观看了毛主席一年前在北京检阅几百万红卫兵和革命师生的照片，以及中国革命工人和农民热烈响应毛主席的“抓革命，促生产”的伟大号召而生产出来的工农业产品。"},{"type":"paragraph","text":"许多桑给巴尔观众都热烈赞扬伟大的毛泽东思想。他们说：中国人民的一切伟大成就归功于毛主席的正确领导。一位桑给巴尔朋友在留言簿上写道：“这个展览会好极了！它反映出战无不胜的毛泽东思想在指导中国人民建设伟大的社会主义中国，把中国变成为世界人民革命堡垒方面所取得的伟大胜利。展览会所体现的中国在政治、经济和文化方面的伟大成就，生动地证明了毛泽东思想的胜利。毛主席万岁！毛泽东思想万岁！”"},{"type":"paragraph","text":"来自莫三鼻给的一位非洲自由战士对中国展览馆工作人员说：“这个展览会对我们莫三鼻给青年来说是一个大课堂。我希望莫三鼻给青年在争取民族解放的斗争中，将效法中国人民，特别是红卫兵在文化大革命中的革命精神。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ada427ee0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
