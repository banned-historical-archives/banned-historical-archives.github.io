<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"人人都来和美国特务间谍作斗争——访中央人民政府最高人民法院沈钧儒院长","authors":["朱波"],"dates":[{"year":1951,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"人人都来和美国特务间谍作斗争——访中央人民政府最高人民法院沈钧儒院长","type":"title"},{"text":"朱波","type":"authors"},{"text":"记者就北京市军事管制委员会军法处判决美国特务间谍阴谋武装暴动案，访问了中央人民政府最高人民法院沈钧儒院长。","type":"paragraph"},{"text":"当记者走进沈院长的办公室时，他正在翻阅当日北京市各报。他愤愤地说：“美帝国主义利用其特务间谍，如此狂妄地企图谋害我国元首的阴谋事件，中国人民是不能容忍的。”","type":"paragraph"},{"text":"沈院长指着当天的人民日报说：从北京市人民检察署的起诉书，及军事管制委员会军法处的判决书中，我们可以清楚地看到，美帝国主义是中国人民的死敌。在解放前，它就收容了一切法西斯残余，从事间谍活动，破坏中国人民解放事业；解放以后，它又指使李安东、山口隆一等万恶的间谍，用各种方法潜伏下来，等待时机，阴谋暴动；并且预先就自备了迫击炮等武器，秘密测量了天安门形势，绘制射击天安门的图样，阴谋于国庆日炮击天安门。这种敌视中国人民的巨大的阴谋案，使中国人民清楚地认识到，如果不肃清那些罪大恶极的以美国为背景的特务间谍分子，中国人民将不得安宁。对于这些特务间谍分子，根据“惩治反革命条例”，处以应得之罪，是完全必要的。","type":"paragraph"},{"text":"一切反革命分子都是敌视人民的。沈院长从自己许多年的斗争中，深深地体验到这一问题，他回忆了过去在重庆时，著名战争贩子马歇尔对他说的一句话：“以美国人（应读为美帝国主义）的眼光看苏联的民主，就认为不是民主。”同样，另一个美国战争贩子魏德迈，在上海时也对他说过：“中国共产党的革命，带来了非常危险的思想。”沈院长回忆到这些帝国主义分子时，他指着山口隆一的口供说：“你看，山口隆一的口供说：‘我有仇视苏联共产党的思想，对中国共产党也同样敌对。’这些帝国主义间谍分子的口吻是完全一致的，都是反对人民的，这和我国内部的反革命分子是没有两样的。”接着沈院长非常熟习地翻出斯大林在一九二七年十一月五日与外国工人代表团的谈话，指着其中的一段说：看一看斯大林对这个问题怎样说的吧：“……我们内部的敌人并不是一个孤立的东西，他们与各国的资本家有千丝万缕的联系……。”我国的具体情况不也是这样吗？象美国间谍李安东、山口隆一等所进行的阴谋活动，和国内反革命分子的阴谋活动，是相互配合的。","type":"paragraph"},{"text":"最后，记者以“今天判决美国间谍阴谋武装暴动案在目前抗美援朝斗争形势中有什么意义，”来询问沈院长时，沈院长说：这个问题很明显，这是在反对美国侵略、保卫我们祖国安全的斗争中，所获得的又一次伟大胜利，这和英勇的中国人民志愿军在朝鲜前线所得的胜利，其性质是一样的。美帝国主义的特务间谍分子是其发动侵略战争中不可缺少的先头部队，因此，我们打击了美国间谍的阴谋活动，也就是直接打击了美帝国主义的侵略阴谋。","type":"paragraph"},{"text":"沈院长一再表示，要巩固人民民主专政，应该把这一巨大的胜利，用来教育全国人民，并向全世界人民宣布，让全国及全世界人民都能更深刻地认识美帝国主义的狰狞面目，使全国人民更积极地行动起来，发扬过去在镇压反革命运动中所表现的英勇精神与智慧，时时刻刻警惕美国间谍的阴谋活动，为彻底肃清暗藏的美国特务间谍分子而努力。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1951年8月20日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0036ed63fd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
