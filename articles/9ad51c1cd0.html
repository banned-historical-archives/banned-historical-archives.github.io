ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"中国同志必须随时检讨自己的方法和态度","alias":"","parts":[{"type":"paragraph","text":"中国同志必须随时检讨"},{"type":"paragraph","text":"自己的方法和态度！!"},{"type":"paragraph","text":"（1950年10月10日）陈："},{"type":"paragraph","text":"十月七日及八日电悉。（一）越军大胜，极慰。（二）越军经此次胜利，必能提高一步。越军还年轻，只有从今后多次作战中才能遂步学会近敌作战的各项技术和战术。中国同志帮助他们要注意自己的方法和态度，使他们乐于接受，而不可将关系弄坏。中国同志必须随时检讨自己的方法和态度，只许做好，不许做坏。（三）战役结束后须休整二十天至一个月，总结经验，补充兵员，进行近战教育及政治教育，选定下一次作战的自标，做好下一次作战的计划。（四）这次胜利是在敌人统帅部没有预料越军一次能集中二万余人及战斗力提高的情况下取得的。敌人得了此次经验，必要谨慎些。越军围攻据点时，除老街等地十分孤立的据点外，其据点的守兵必增多，其增援队必加大，即要准备围攻一二千人的据点和打四五千人或者更多些的增援队。因此，越军亦须做出新的计划，即再集中和"},{"type":"paragraph","text":"[1]这是毛泽东为中央人民政府人民革命军事委员会起草的给中国人民解放军西南军区副司令员、云南军区司令员陈的电报。陈当时奉派越南，以中共中央代表身份协助越共中央和越南人民军总部组织指挥抗击法国侵略军的边界战役。装备二万人左右，其中应有包括山炮、野炮、反坦克炮、重迫击炮、榴弹炮等各种炮火的两个炮兵团。总之，在今后半年内外，越军须建设一个总数五万人左右的正规军，而有和法军地面部队一万人的两倍以上的火力（即法军一万人如有大小炮一百门，则越军五万人须有大小炮二百门以上），准备一次能歼灭法军一万人。当然，在这样的有力兵团建设成功的过程中，只要有可能，还须打多次规模较小的仗，锻炼部队的战斗力，而不要企图很快就打大仗。但是，自前就应做出一次能歼灭法军一万人的计划，方能在半年以后能够打大仗。此项计划，请你在此次休整期内和越南同志商量做出，并电告为盼。"},{"type":"paragraph","text":"军委十月十日"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":224,"page_end":225},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ad51c1cd0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
