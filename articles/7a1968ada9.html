、机会主义和修正主义","authors":[],"dates":[{"year":1957,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德国统一社会党和意共联合声明"},{"type":"paragraph","text":"号召加强工人运动的国际团结"},{"type":"paragraph","text":"反对宗派主义、教条主义、机会主义和修正主义"},{"type":"paragraph","text":"新华社柏林19日电　德意志通讯社18日发表了以德国统一社会党中央委员会第一书记乌布利希为首的德国统一社会党代表团和以意大利共产党领导机构成员斯巴诺为首的意大利共产党代表团会谈后的联合声明，这次会谈是在5月9日到14日在柏林举行的。"},{"type":"paragraph","text":"声明谈到了重要的国际问题。它指出，西德军国主义的复活是威胁世界和平的直接危险。使国际局势趋于紧张的主要因素之一是日益增长的原子战争的威胁。因此，两党号召全世界劳动人民进行坚决斗争，争取停止试验一切原子武器和氢武器，争取放弃生产和使用原子武器和氢武器。"},{"type":"paragraph","text":"两党号召进一步加强工人运动的国际团结。它们表示，要根据马克思列宁主义的原则和学说，全面地发展和加强同群众的联系，并且要竭力使它们的政治行动同本国的经济和历史情况相配合。它们强调，要使工人阶级成为领导阶级，要使它能够表达全民族利益，共产党和工人党就必须受马克思列宁主义以及无产阶级国际主义精神的教育，就必须吸收各国的经验，特别是苏联的经验。"},{"type":"paragraph","text":"最后，德国统一社会党和意大利共产党声明：它们要坚决进行不妥协的斗争，反对宗派主义、教条主义以及其他各种形式的左倾机会主义，并且反对任何形式的修正主义，因为修正主义可能导致否定工人阶级在争取民主和社会主义的斗争中的领导作用，从而导致分裂和投降。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a1968ada9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
