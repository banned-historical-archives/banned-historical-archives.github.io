" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"诬蔑、攻击、反对马克思主义","authors":["北京政法学院","匡绍毅","康德琯","张景明","罗典荣","陈述庆"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"诬蔑、攻击、反对马克思主义","type":"title"},{"text":"北京政法学院张景明陈述庆康德琯匡绍毅罗典荣","type":"authors"},{"text":"“马列主义只不过是一种科学，它并不是工人阶级当中产生出来的。是由大知识分子马、恩客观地继承了历史文化遗产以后创造出来的，以后由信仰它的知识分子把它贯输到工人阶级中去，为工人阶级接受，用来建设社会主义。”","type":"paragraph"},{"text":"“社会发展的方式是多样的，南斯拉夫在公有基础上搞自由竞争，有它的道理。印尼搞三种主义的结合（马列主义、三民主义、回教的真理）也有它的道理。此外，还有没有别的学说和道理呢？”（北京政法学院　张景明）","type":"paragraph"},{"text":"“马列主义不实事求是，明明是错的，共产党也要说成对的，战时共产主义政策是个自杀的政策，但非要说成是在当时实行共产主义政策是对的，错就是错，为什么不敢承认？”他还说：“不同意1938年苏联建设共产主义的任务——关于按人口平均产量赶上先进资本主义国家的提法。如果产量多就是共产主义，那么现在美国就是共产主义了。”（北京政法学院  陈述庆）","type":"paragraph"},{"text":"“现在马列主义（除辩证法外）已经过时了，已经不适用了，我只相信辩证法。”（北京政法学院  匡绍毅）","type":"paragraph"},{"text":"“南斯拉夫的工人管理委员会值得研究，工人的政治权利就比较大，每个工厂的主动权也大，盈亏由自己负责，自己搞对外贸易。现在时代不同了，建设社会主义的道路有各式各样，过去总强调苏联的道路是最正确的，其实南斯拉夫也有可取之处。”（北京政法学院　罗典荣）","type":"paragraph"},{"text":"“今后应该以思想家的眼光看待各种科学（包括马列主义），我要靠自己的独立思考来鉴别各种思想的正确性，我认为马列主义也是可以怀疑的……我觉得光做一个政治教员没多大出息，只能传授别人的思想，而不能在科学上有所作为，在我看来，只有哲学和政治经济学才能做到一些独创性的研究。”（北京政法学院  康德琯）","type":"paragraph"},{"text":"“哲学我一看就头疼，我要否定哲学，哲学不能解决实际问题，都是空洞的教条！哲学课尽是教条。”（北京政法学院  尹孝松）","type":"appellation"},{"text":"“政治经济学的社会主义部分，还不能成为科学，只不过是苏联的经验总结。”（北京政法学院  王革）","type":"appellation"},{"text":"“中国经济建设，（即党在过渡时期的总路线）这门课根本不是科学，没有登上大学讲台的资格。”（北京政法学院  罗典荣）","type":"paragraph"},{"text":"“马列主义应该当作学术界里的一个学派来研究，不应把它当作一切人，一切事的指导思想。除马列主义之外，还应该吸收其他学派的思想，不然学术界就太贫乏太单调了。资产阶级有许多学派，可是无产阶级只有马列主义一派，别无分号，如果有，就说他是修正主义。……","type":"paragraph"},{"text":"产生教条主义是因为强调马列主义作指导思想的结果。……马列主义是产生教条主义的根源，马列主义关于阶级斗争的学说在中国已经过时。”（北京政法学院　赵日月）","type":"paragraph"},{"text":"“我用一种客观主义的态度来对待党，我骨子里反对理论教学中理论联系实际方针，特别反对进行思想教育，我觉得这会削弱科学性……”（北京政法学院教员  康德琯）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7aac054bf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
