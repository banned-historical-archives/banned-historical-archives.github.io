art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"工人阶级一定能领导好科研单位的斗批改","authors":["工人毛泽东思想宣传队成员沈阳部队某部训练队副中队长杨克林"],"parts":[{"type":"paragraph","text":"编辑同志："},{"type":"paragraph","text":"姚文元同志的《工人阶级必须领导一切》这篇重要文章，传达了我们伟大领袖毛主席的最新指示，大长了无产阶级革命派的志气，大灭了一小撮阶级敌人的威风。我从参加工人毛泽东思想宣传队进入化工设计研究院的实践中，深深体会到：工人阶级必须领导一切，工人阶级完全能够领导一切。"},{"type":"paragraph","text":"化工设计研究院是知识分子成堆的地方，过去始终被一些所谓“权威”垄断着。不久前，一支用毛泽东思想武装起来的工人宣传队，手捧红彤彤的《毛主席语录》开进了这个研究院，勇敢地担负起领导斗、批、改的重担，取得很大的胜利。"},{"type":"paragraph","text":"工人宣传队进入设计院时，院里两派组织“内战”打得火热，斗、批、改却搞得冷冷清清。工人宣传队经过调查研究，发现造成这种局面的主要原因，是一小撮阶级敌人在背后煽阴风，点鬼火。他们决心狠抓阶级斗争，发动群众向一小撮阶级敌人猛烈进攻，揭开阶级斗争的盖子。毛主席说：“办学习班，是个好办法，很多问题可以在学习班得到解决。”工人宣传队遵照毛主席的教导，在全院办起了各种类型的毛泽东思想学习班，反复组织广大群众学习毛主席的最新指示：“无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。”帮助两派群众用毛泽东思想克服资产阶级派性，团结起来共同对敌。在宣传队的帮助下，广大群众提高了两条路线斗争觉悟，擦亮了眼睛，很快就揪出了在背后煽阴风、点鬼火的一小撮阶级敌人，揭开了阶级斗争的盖子。"},{"type":"paragraph","text":"实践告诉我们：工人阶级对毛主席最忠，跟毛主席最紧，阶级斗争观念最强，两条路线斗争觉悟最高，实践经验最丰富。他们不但能领导工厂企业的斗、批、改，也完全能够领导科研单位的斗、批、改，完全能够领导上层建筑各个领域的斗、批、改。一切科学技术，都是工人阶级和劳动人民创造的，他们是科学技术的主人。工人阶级就是要领导科学技术，就是要领导一切。"},{"type":"paragraph","text":"工人毛泽东思想宣传队成员 沈阳部队某部训练队副中队长 杨克林"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8e2bf9cba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
