script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级反动统治　反对腐朽教育制度  西德各地学生举行示威和罢课斗争  巴伐利亚州一万余名学生已坚持罢课一个多月","authors":[],"dates":[{"year":1969,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级反动统治　反对腐朽教育制度"},{"type":"paragraph","text":"西德各地学生举行示威和罢课斗争"},{"type":"paragraph","text":"巴伐利亚州一万余名学生已坚持罢课一个多月"},{"type":"paragraph","text":"据新华社波恩二十一日电　西德各地大学生最近不断举行罢课和示威，强烈反对腐朽的资本主义教育制度。"},{"type":"paragraph","text":"在巴伐利亚州，三万六千名高等学校学生正在举行罢课，反对这个州当局正在拟订的“高等学校法”。全西德最大的慕尼黑大学的一万八千名学生，已经从十八日起宣布举行无限期罢课。罢课斗争也扩展到了这个州的维尔茨堡大学和埃尔兰根—纽伦堡大学。此外，这个州的各个工程和经济专科学校的一万余名学生的罢课斗争，已经坚持了一个多月，学生们纷纷举行集会，强烈谴责州教育部所执行的反动教育政策，并且表示“准备长期斗争”。"},{"type":"paragraph","text":"学生的正义斗争获得了工人的热烈支持。"},{"type":"paragraph","text":"西德其他一些州的学生斗争也正在迅速开展。为了反对北来因—威斯特伐利亚州当局正在炮制的“高等学校法”，波恩大学的一万六千名学生自十六日起开始了为期一周的警告性罢课。科隆大学的学生也在十九日和二十日两天举行了警告性罢课。"},{"type":"paragraph","text":"新华社波恩二十日电　西德青年、学生反对垄断资产阶级反动统治的群众斗争浪潮此伏彼起。"},{"type":"paragraph","text":"在海得尔堡，数百名大、中学生从十六日到十八日接连三天在市区举行示威，强烈抗议公共车辆票价上涨百分之三十。学生们坐在电车轨道上阻止车辆通行。海得尔堡市政当局出动了大批警察进行镇压。学生们对警察展开了顽强的斗争，使全市交通持续陷于瘫痪状态。他们的正义斗争得到广大居民的同情和支持。"},{"type":"paragraph","text":"在汉诺威，数千名青年、学生和居民从十二日开始展开的反对公共交通票价上涨的斗争已经胜利结束。在强大的群众斗争的压力下，汉诺威当局十七日被迫收回从六月一日起提高公共车辆票价的决定。"},{"type":"paragraph","text":"戈丁根大学的两千名学生十三日举行声势浩大的示威，反对腐朽的资产阶级教育制度，并抗议前西德总统吕布克和西德技术部长格哈德·施托尔顿伯根等到戈丁根活动。学生们在吕布克等经过的道路上设置了路障，并且向吕布克等乘坐的汽车投掷石块和臭鸡蛋。西德反动当局出动了大批警察对示威的学生进行镇压。学生们不畏强暴，同警察展开了激烈的搏斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9668c04794"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
