正义的，正义的斗争是一定要胜利的。我们支持你们的斗争。”","authors":[],"dates":[{"year":1978,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华主席会见宋成副总理"},{"type":"paragraph","text":"华主席在同柬埔寨政府军事代表团的同志谈话时说：“你们的斗争是正义的，正义的斗争是一定要胜利的。我们支持你们的斗争。”"},{"type":"paragraph","text":"新华社北京七月三十一日电　中共中央主席、中央军委主席、国务院总理华国锋今天下午会见了柬共中央候补常委、负责国防事务的副总理、革命军总参委员会主席宋成和由他率领的民主柬埔寨政府军事代表团。"},{"type":"paragraph","text":"会见时，华主席同宋成副总理和代表团其他同志就一些问题进行了亲切友好的谈话。华主席说：“你们的斗争是正义的，正义的斗争是一定要胜利的。我们支持你们的斗争。”"},{"type":"paragraph","text":"宋成副总理转达了柬共中央书记、副书记对华主席，叶剑英、邓小平、李先念、汪东兴副主席的问候。"},{"type":"paragraph","text":"华主席也请宋成副总理转达他对波尔布特书记和柬共中央其他领导同志的问候。"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理陈锡联，中国人民解放军副总参谋长王尚荣，中联部副部长申健，外交部副部长张海峰，国防部外事局局长柴成文，中国驻民主柬埔寨大使孙浩，参加了会见。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"388ed4d0d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
