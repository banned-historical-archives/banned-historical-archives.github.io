" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"尉凤英在“九大”全体会议上的发言","authors":["尉凤英"],"dates":[{"year":1969,"month":4,"day":14}],"is_range_date":false,"parts":[{"text":"尉凤英在“九大”全体会议上的发言","type":"title"},{"text":"尉凤英","type":"authors"},{"text":"敬爱的毛主席、林副主席，大会主席团、各位代表同志：","type":"appellation"},{"text":"中国共产党第九次全国代表大会，是在我们伟大领袖毛主席亲自主持下，在国内外一派大好形势下召开的。这是我党历史上具有伟大意义的一次大会。","type":"paragraph"},{"text":"我们热烈拥护伟大领袖毛主席极其重要的讲话；热烈拥护林副主席的政治报告；热烈拥护新的党章。这些伟大的革命文献，闪耀着马克思主义、列宁主义、毛泽东思想的灿烂光辉。是照耀着社会主义革命和共产主义运动胜利前进的灯塔。我们一定要认真学习，全面落实，坚决照办！","type":"paragraph"},{"text":"伟大领袖毛主席在二十九年前教导我们：“全国妇女起来之日，就是中国革命胜利之时。”在毛主席的英明领导下，我国妇女在伟大的革命斗争中，发挥了巨大作用。在这次大会的代表中，来自全国各条战线上的女共产党员代表，数量之多，是我党历次代表大会从来没有过的。这是伟大领袖毛主席对中国妇女的最大关怀、最大鼓舞！这是中国妇女的最大光荣、最大幸福！","type":"paragraph"},{"text":"“大海航行靠舵手，干革命靠毛泽东思想。”这是千真万确的真理。我们必须用毛泽东思想统帅一切。毛泽东思想是我们的命根子。毛主席的无产阶级革命路线是我们的生命线。","type":"paragraph"},{"text":"有了毛泽东思想，就有了一切。","type":"appellation"},{"text":"有了毛泽东思想，我们就能斗私批修，改造世界观，搞好思想革命化。","type":"paragraph"},{"text":"有了毛泽东思想，我们就能在阶级斗争、路线斗争中心明眼亮不转向。","type":"paragraph"},{"text":"有了毛泽东思想，我们就能狠抓革命、猛促生产，人换精神厂换貌、人换精神地换装。","type":"paragraph"},{"text":"有了毛泽东思想，我们无产阶级的红色江山就能千秋万代不变色。","type":"paragraph"},{"text":"有了毛泽东思想，帝、修、反胆敢来进犯，我们就能把它坚决彻底干净全部消灭光！","type":"paragraph"},{"text":"有了毛泽东思想，伟大的共产主义理想就一定能实现。","type":"paragraph"},{"text":"我们决心向伟大的中国人民解放军学习，更加深入地开展活学活用毛泽东思想的伟大群众运动，把全国办成红彤彤的毛泽东思想大学校！","type":"paragraph"},{"text":"我们要以林彪副主席为光辉榜样，永远忠于毛主席，忠于毛泽东思想，忠于毛主席的无产阶级革命路线。","type":"paragraph"},{"text":"头可断，血可流，毛泽东思想不能丢！海枯石烂心不变，天崩地裂志不移！","type":"paragraph"},{"text":"伟大领袖毛主席教导我们：“一个反对美帝、苏修的历史新时期已经开始。”经过无产阶级文化大革命锻炼的七亿中国人民，一定要永远高举毛泽东思想伟大红旗，“下定决心，不怕牺牲，排除万难，去争取胜利”，为实现共产主义的伟大理想而英勇奋斗！","type":"paragraph"},{"text":"最后让我们共同高呼：","type":"paragraph"},{"text":"无产阶级文化大革命的伟大胜利万岁！","type":"paragraph"},{"text":"无产阶级专政万岁！","type":"paragraph"},{"text":"伟大的、光荣的、正确的中国共产党万岁！","type":"paragraph"},{"text":"战无不胜的毛泽东思想万岁！","type":"paragraph"},{"text":"我们的伟大领袖毛主席万岁！万岁！万万岁！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"尉凤英","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0edc0e5f8f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
