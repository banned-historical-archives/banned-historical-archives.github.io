script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"二房东要觉悟 不该再剥削了","authors":[],"dates":[{"year":1949,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者先生:"},{"type":"paragraph","text":"我们是一班三房客，过去在黑暗里吃尽二房东无数的苦楚。现在天亮了，我们希望有吐气的一天。"},{"type":"paragraph","text":"二房东是出了最轻的代价向大房东租进一幢房子，一转手之间，当即在三房客的身上刮进许多收入，不但自己住的屋和水电从此可以白用，并且一家的享受可告无虞。如果三房客说句不平的气话，就叫你房子没得住。这种坐享其利专门剥削人家的害虫，在这光天化日之下，还能存在吗??那知二房东至今不悟，反而要三房客加倍付租，付清五六七三个月的租金。这次加租，譬如从前月租七元五角，增至十五一元，再加两成合计为十八元，按当日折实存款折付人民币，我们都是穷人，那里担当得起这笔巨大的租费呢?"},{"type":"paragraph","text":"但是我们过去三房客没有联合起来，如一片散沙。没有力量。现在想成立一个房客联谊会，一致要求二房东减轻租金，并不得再使用压迫手段对付房客。　谨请撰安　方浜路永寿"},{"type":"paragraph","text":"坊一群三房客公启"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8234732bf1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
