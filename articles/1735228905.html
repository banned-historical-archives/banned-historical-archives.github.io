script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"讨论对现代修正主义的斗争苏共中央社会科学院举行学术会聚","authors":[],"dates":[{"year":1958,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京28日电】　塔斯社莫斯科讯:苏共中央融会科学院学术委员会关于讨论对现代修正主义作斗争的问题的会议，27日在莫斯科开幕。"},{"type":"paragraph","text":"参加会议的共有800人。他们当中有各加盟共和国共产党中央委员会、苏共边疆区委员会和州委员会的宣传鼓动部门和科学部门的领导人，苏共中央马克思列宁主义研究院和高级党校的科学工作者，各加盟共和国党校、莫斯科革命历史博物馆、列宁军事政治学院以及其他机构的科学工作者等。"},{"type":"paragraph","text":"社会科学院院长多罗舍夫教授致了开幕词。苏共中央宣传鼓动部部长伊利切夫作了题为“对现代修正主义的斗争和社会科学的任务”的报告。"},{"type":"paragraph","text":"接着会议听取了许多报告，其中有库兹明诺夫教授作的“在政治经济学领域内的现代修正主义”，罗森塔尔教授作的“现代修正主义的方法学”，阿齐祥副教授作的“反对用民族主义来修正无产阶级国际主义的原则”，沃尔科夫教授作的“现代修正主义对列宁关于党的学说的歪曲”，加波切克服授作的“国际工人运动的纲领性文件——社会主义国家共产党和工人党代表会议宣言和现代修正主义”，马卡洛娃教授作的“批判现代修正主义对社会主义经济发展规律的歪曲”，克列托夫教授作的“现代修正主义和国家消亡问题”，米西斯尼科夫教授作的“反对修正主义对美学问题的歪曲”等。"},{"type":"paragraph","text":"会议将举行两天。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1735228905"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
