ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对总后关于赴朝调查野战救护等工作的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对总后关于赴朝调查野战救护"},{"type":"paragraph","text":"等工作的报告的批语"},{"type":"paragraph","text":"（1952年7月30日）德怀同志："},{"type":"paragraph","text":"这个报告很好。其末条七项建议是否可行，请你和有关方面同志商处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月卅日[1]德怀，即彭德怀，当时任人民革命军事委员会副主席。"},{"type":"paragraph","text":"[2]指人民革命军事委员会总后勤部1952年7月28日关于赴朝鲜调查野战救护、卫生防疫和反细菌战等项工作情况的报告。报告概述了志愿军入朝以后后勤部门在抢救、治疗、收转伤病员工作方面取得的成绩和存在的问题，提出了以下解决问题的建议：1.连队增加卫生员人数；2.军、师、团均建立防疫组织；3.医院、医疗队装备救护车辆；4.扩大志愿军卫生部的编制；5.师以下各级卫生机关直接归同级军政首长领导；6.师休养所编制应与军的医疗所（队）相等；7.派毒气专家及化学部队到前方担任防治工作。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":7,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":178,"page_end":178},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"082aa0c751"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
