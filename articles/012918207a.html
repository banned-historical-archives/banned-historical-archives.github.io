ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"同意迅速包围南口昌平唐山等敌","alias":"","parts":[{"type":"paragraph","text":"同意迅速包围南口昌平唐山等敌！！"},{"type":"paragraph","text":"（1948年12月12日）林、罗、刘并程、黄凹："},{"type":"paragraph","text":"各电均悉。（一）同意迅速包围南口、昌平之敌，包围时注意以主力位于南口、北平间，只以一小部攻占八达岭。（二）同意迅速包围唐山、芦台之敌，如芦台敌已撤至塘沽，则包围塘沽。（三）新保安确为三十五军两个师，三十五军之另一个师在北平，程黄全力可用于包围南口、昌平。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十二日十八时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。·"},{"type":"paragraph","text":"[2]程、黄，指程子华、黄志勇，当时分别任东北野战军第二兵团司令员和参谋长。"},{"type":"paragraph","text":"[3]南口，镇名，位于北京市昌平县西部。[4]八达岭，长城关隘，位于北京市延庆县南部。[5]芦台，镇名，今为天津市宁河县县治。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":381,"page_end":381},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"012918207a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
