<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想整顿组织，统一组织，扩大队伍控江中学红卫兵结成一个整体军威大振原有各学生组织全部撤销，革命的红卫兵成为复课闹革命的先锋队","authors":[],"dates":[{"year":1967,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市控江中学十六日建立了全校统一的革命的红卫兵组织——上海市控江中学红卫兵总部，原有的各革命学生组织，已经全部撤销。这是该校的无产阶级革命派，在毛泽东思想的指引下，整顿、巩固、发展和统一红卫兵组织所获得的成果。"},{"type":"paragraph","text":"控江中学原来在学生中有好几个革命的红卫兵组织。这些组织的战士们，通过短期的军政训练，在解放军同志的帮助下，开门整风，普遍提高了思想觉悟。他们迫切地感觉到如果保留各革命组织，已不能适应当前学校复课闹革命这一新形势的需要。全校的无产阶级革命派必须实现革命的大联合。"},{"type":"paragraph","text":"在怎样实现革命的大联合问题上，这个学校的无产阶级革命派曾展开过一场大辩论。他们在辩论中曾提出过三个实现大联合的方案。一个方案是由各革命组织派代表组成一个联合的领导机构，即所谓“联席会仪式”的大联合。经过辩论，这个方案被否定了。他们认为，这样，实际上仍保留了许多组织，不利于按班级实现大联合，不利于克服山头主义，不利于思想革命化。"},{"type":"paragraph","text":"第二个方案，是以一个影响最大的革命组织为主，把其他革命组织并进去。他们认为这种“并吞式”的联合，同样不能克服第一种方案所有的那些缺陷，因此也被否定了。"},{"type":"paragraph","text":"经过辩论，他们一致认为，应该遵照伟大领袖毛主席指引的方向，认真学习贵阳棉纺厂的经验，以教学班为基础，自下而上地实现革命的大联合，成立一个统一的革命的红卫兵组织，原有的各革命组织必须撤销。"},{"type":"paragraph","text":"他们首先在教学班里，各革命组织实行“拆墙”，统一起来。通过巴黎公社式的选举，选出了分队的负责人，成立了红卫兵分队。在实现教学班革命派大联合的基础上，再分别选举成立各年级的红卫兵支队。最后由各年级的红卫兵选举产生全校统一的红卫兵组织——上海市控江中学红卫兵总部。"},{"type":"paragraph","text":"他们在实现革命的大联合的过程中，对红卫兵队伍进行了初步整顿和发展。他们根据中共中央《关于中学无产阶级文化大革命的意见》，按照党的阶级路线，对原来各革命组织的成员作了一次审查，绝大多数的成员都被吸收参加了红卫兵组织；同时他们还吸收了班上原来没有参加组织的、但在复课闹革命中表现好的同学，参加了红卫兵组织。"},{"type":"paragraph","text":"控江中学的红卫兵组织，经过整顿后，组织统一了，队伍也扩大了。他们思想一致、行动一致，出现了空前的大团结，战斗力大大加强了，各班级过去存在的某些分歧意见，已基本消除。现在，班级里开始出现一种新气象，革命的红卫兵已成为这个学校复课闹革命的先锋队，广大同学都团结在革命的红卫兵的周围，为复课闹革命而共同战斗。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8fad304fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
