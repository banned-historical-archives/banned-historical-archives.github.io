thors":["罗茂城"],"dates":[{"year":1984,"month":6,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"消除派性，增强党性，保证整党健康发展"},{"type":"paragraph","text":"四川对党员进行彻底否定“文革”教育"},{"type":"paragraph","text":"本报讯　记者罗茂城报道：最近，四川省委针对整党中出现的问题，决定集中一段时间，对党员普遍地进行一次彻底否定“文化大革命”的教育，以保证整党的顺利进行。"},{"type":"paragraph","text":"目前，四川省级机关大部分单位已进入对照检查阶段。随着整党的深入，有个别单位出现了派性干扰，“明无山头暗有礁”，以派划线，认为自己这一派正确。有少数党员对“文革”的认识糊涂，以种种借口为自己的错误行为辩解。而有的领导干部，对派性问题采取回避态度，甚至同情和支持。这样继续下去，整党就有走弯路、走过场的危险。"},{"type":"paragraph","text":"四川省委指出：历史已经判明，“文革”是一场由领导者错误发动、被反革命集团利用、给党、国家和各族人民带来严重灾难的内乱。“文革”中的两派，都是“左”的产物，都是错误的，不存在哪一派正确、哪一派错误的问题。对“文革”是否定还是肯定，是彻底否定还是所谓一分为二，是重大的原则问题，是统一思想的一个重要内容，是能否进一步肃清“左”的影响，消除派性，增强党性，加强团结，巩固和发展安定团结的政治局面，作好核查三种人工作的关键。每一个共产党员特别是领导干部对此必须作出明确回答。"},{"type":"paragraph","text":"四川省委要求各单位领导干部认真组织党员学习《中国共产党中央委员会关于建国以来党的若干历史问题的决议》中有关“文化大革命”的内容，学习人民日报4月23日评论：《就是要彻底否定“文革”》，以及《红旗》杂志第九期文章《增强党性，克服派性》等。通过学习，联系实际讨论，彻底肃清“左”的影响，分清是非，吸取教训，解决问题。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a99f942a8b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
