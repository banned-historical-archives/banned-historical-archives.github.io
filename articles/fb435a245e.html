script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共上海市委员会转发上海市榆林区委员会的报告","authors":[],"dates":[{"year":1957,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"中共上海市委员会转发上海市榆林区委员会的报告","type":"title"},{"text":"市委：","type":"appellation"},{"text":"最近从基层中反映出关于专业公司在处理工资细则上的一些问题，反映如下：","type":"paragraph"},{"text":"缝纫机专业公司通知伙伴退伙的办法，在18元以下的按实际计算，18元以上的按18元计算，治昌缝纫机厂公方代表向下贯彻行不通。","type":"paragraph"},{"text":"丝绸公司所属绸缎冶炼厂，由于并厂伙食费不统一，原来的工人伙食在合营后约束为13元，并入厂有的15元、18元也按13元吃伙食，工人要求改食堂制（改食堂制后并进的工人会要求按18元、15元发差粮金），工人直接打电话给公司的吴科长，吴表示同意，厂里再做工作时，群众骂山门，认为公司已同意就是你们厂里不同意。","type":"paragraph"},{"text":"电镀公司所属毛锦记电镀厂，工人每月有四张浴券（共1.36元），1954年、1955年及去年因经济困难欠工人浴券1年3个月至1年6个月。约合现金2000元今年三月份工人 提出要行政拨出分给大家，请示公司（区工联也同意）后同意折合实物（面盆、毛巾、肥皂等等）发给工人，每人可拿到15元至20元的实物。","type":"paragraph"},{"text":"造漆颜料公司所属中国织业厂，25个临时工要求增加工资，向行政部，请示公司后同意修改合约后25人共增加工资100元（平均每人4元），区委的干部表示不同意，公司的干部讲“只要保证生产任务没有意见”，因之很难解决。","type":"paragraph"},{"text":"塑料公司所属新中纽扣厂，在其他两个厂并厂时有协议，新的制度未建立，原来制度不取消，但并厂以后公司又同意并进的厂有升工，隔了几天公司又不同意，结果公司科长下来检讨，工人要按原协议办事，公司又不同意。最近经理下厂，开大会，过去好多不同意的都宣传同意，群众反映是“阎王好看，小鬼难当”。支书、公方代表要辞职，你们上面做好人，我们下面好难人。","type":"paragraph"},{"text":"印刷公司所属时达印刷厂装钉车间用的10个临时工，本来已解雇，按合同规定没有什么毛病，最近这10个临时工到公司请愿要他们克服官僚主义。公司认为“三个人的饭五个人吃”同意6月1日起进厂做临时工，将生产任务的50%给长工做，50%的任务给临时工做，厂里和群众都有意见。","type":"paragraph"},{"text":"螺丝公司所属的厂反映每人夏季可以发毛巾一架，肥皂公用，所有的职工都有，我们与螺丝公司经理室联系，他们说是机电局决定的，其他如绸缎公司也有类似情况，只要不是制度可以在夏季发毛巾脂皂。","type":"paragraph"},{"text":"以上的情况可粗略有出入。","type":"paragraph"},{"text":"1、各个局、公司在处理工资福利问题时能从全局考虑慎重考虑。","type":"paragraph"},{"text":"2、在一些重大问题决定时最好能与区委联系，有关的问题也能征求基层党支部的意见。","type":"paragraph"}],"comments":[],"origin":"根据文件原件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb435a245e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
