作时期的八项纪律","authors":[],"dates":[{"year":1950,"month":12,"day":2}],"is_range_date":false,"parts":[{"text":"中南军政委员会关于干部在土地改革工作时期的八项纪律","type":"title"},{"text":"一、严格执行政府法令，认真掌握土地改革路线，依靠雇贫团结中农，不得违犯。","type":"paragraph"},{"text":"二、坚决保护农民利益，不得包庇地主，不得附和地主叫嚣。","type":"paragraph"},{"text":"三、依法严惩不法地主，坚决领导群众开展合法斗争，打击地主抵抗与破坏行为，防止乱打、乱杀。","type":"paragraph"},{"text":"四、明确划清敌我界线，不得丧失立场，制造与参加乡村宗派纠纷。","type":"paragraph"},{"text":"五、绝对禁止贪污受贿，廉洁奉公，艰苦朴素，不得侵占斗争果实，不得假公济私。","type":"paragraph"},{"text":"六、切实服从农协决议，尊重农民意见，凡事要和群众商量，不要个人决定，强迫推行。","type":"paragraph"},{"text":"七、坚决服从上级指示，不得阳奉阴违，不得各自为政。","type":"paragraph"},{"text":"八、严格请示报告制度，不得虚报情况，不得报喜不报忧。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"921ef5df2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
