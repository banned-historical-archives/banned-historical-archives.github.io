art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席会见撒切尔夫人华主席对英国客人前来我国访问表示热烈欢迎，同撒切尔夫人在友好的气氛中进行了谈话 李先念副总理等参加了会见和谈话","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年四月九日讯 华国锋主席今天下午会见了英国保守党领袖玛格丽特·撒切尔夫人。"},{"type":"paragraph","text":"英国驻中国大使游德，撒切尔夫人的随行人员道格拉斯·赫德、约翰·斯坦利、卡罗尔·撒切尔小姐，参加了会见。"},{"type":"paragraph","text":"华主席对英国客人前来我国访问表示热烈欢迎。华主席说，撒切尔夫人这是第一次访问我国，有了第一次，一定会有第二次，第三次，乃至更多次的访问。"},{"type":"paragraph","text":"华主席同撒切尔夫人在友好的气氛中进行了谈话，就共同关心的问题广泛地交换了意见。谈话时，游德大使在座。"},{"type":"paragraph","text":"李先念副总理、黄华外长、刘振华副外长、中国驻英国大使宋之光，参加了会见和谈话。"},{"type":"paragraph","text":"华国锋主席同撒切尔夫人握手。"},{"type":"paragraph","text":"华国锋主席同撒切尔夫人以及随行人员合影。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f11b89d23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
