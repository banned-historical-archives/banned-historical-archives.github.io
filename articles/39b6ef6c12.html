dates":[{"year":1958,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法共代表团应邀来中国越南访问"},{"type":"paragraph","text":"澳共总书记和主席到京"},{"type":"paragraph","text":"新华社6日讯　应中国共产党中央、越南劳动党中央邀请前来访问中国、越南的法国共产党代表团乘飞机在6日到达北京。代表团团长是法共中央政治局委员让纳特·维美徐，团员有法共中央委员让尼·贝利奥兹和法共中央财政监察委员卡米耶·瓦兰。"},{"type":"paragraph","text":"前往机场欢迎的，有中共中央总书记邓小平，中共中央书记处书记谭震林，中共中央机关负责工作人员赵毅敏、熊复、李启新等同志。"},{"type":"paragraph","text":"越南劳动党中央委员阮康也到机场欢迎。"},{"type":"paragraph","text":"法共代表团将先到越南访问后，再返回中国访问。"},{"type":"paragraph","text":"新华社6日讯　参加十月革命四十周年庆祝典礼的澳大利亚共产党总书记劳伦斯·夏基、主席李却·狄克逊在回国途中6日下午乘飞机到达北京。"},{"type":"paragraph","text":"到机场欢迎的有中共中央总书记邓小平、中共中央书记处书记谭震林，中共中央机关负责工作人员赵毅敏、熊复、李启新。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"熊复","type":"人物"},{"name":"赵毅敏","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39b6ef6c12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
