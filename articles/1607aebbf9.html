script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"珍宝岛地区广大边防战士欢庆伟大胜利  红心永向华主席　坚守反修最前哨  愤怒声讨、批判“四人帮”阴谋篡党夺权、投降卖国的滔天罪行","authors":[],"dates":[{"year":1976,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"珍宝岛地区广大边防战士欢庆伟大胜利"},{"type":"paragraph","text":"红心永向华主席　坚守反修最前哨"},{"type":"paragraph","text":"愤怒声讨、批判“四人帮”阴谋篡党夺权、投降卖国的滔天罪行"},{"type":"paragraph","text":"新华社沈阳一九七六年十一月十日电　珍宝岛地区广大边防战士热烈欢庆我党我军又有了自己的英明领袖和统帅华国锋主席，欢庆一举粉碎“四人帮”反党集团的伟大胜利，愤怒声讨、批判“四人帮”反党集团的滔天罪行，决心进一步提高警惕，加强战备，永远坚守反修最前哨。"},{"type":"paragraph","text":"珍宝岛地区的边防战士听到以华主席为首的党中央，采取果断措施，一举粉碎“四人帮”篡党夺权阴谋的特大喜讯，个个欢欣鼓舞，奔走相告。团长潘世国步行十多里路来到前沿阵地，把特大喜讯转告给警惕守卫在哨位上的战士。战士们立刻欢腾跳跃，相互拥抱。连长董少明兴奋地说：“四人帮”代表地富反坏右的利益，搞修正主义、搞分裂、搞阴谋诡计。我们同他们的斗争是两个阶级的生死大搏斗，革命战士决不能等闲视之，要勇敢地冲杀在斗争第一线。在珍宝岛自卫反击战中荣立集体一等功的七连干部战士，听到以华主席为首的党中央，粉碎了“四人帮”反党集团篡党夺权阴谋的喜讯，马上在营区、哨所和阵地上召开庆祝会、声讨会。珍宝岛自卫反击战中荣立三等功的排长封福春回忆旧社会的苦难情景和新社会的幸福生活，激动地表示，毛主席的恩情比山高，比海深，我们世世代代怀念毛主席。“四人帮”反党集团背叛毛主席的革命路线，妄想篡夺党和国家的最高权力，在中国复辟资本主义，我们边防战士坚决不答应。"},{"type":"paragraph","text":"在欢庆胜利的大喜日子里，边防战士们迅速掀起了刻苦学习马列著作和毛主席著作，深入揭发批判“四人帮”反党罪行的高潮。三连战士在批判“四人帮”投降卖国的罪行中，更加认清了这一小撮野心家、阴谋家的丑恶嘴脸。战士们说：如果让王张江姚“四人帮”阴谋得逞，中国就要沦为帝国主义的殖民地，劳动人民就要重新受压迫、被奴役。这种历史的旧剧绝不允许重演。全连同志庄严宣誓：一定要继承毛主席的遗志，在以华主席为首的党中央领导下，坚决同“四人帮”反党集团作坚决斗争，把反修防修的伟大斗争进行到底。"},{"type":"paragraph","text":"指战员们在欢庆胜利，声讨“四人帮”罪行的时候，时刻不忘加强战备。他们认真分析了敌情，重新研究了对敌斗争方案。党委成员还分头深入连队，和指战员们一起抓好战备落实。日夜在风雪严寒中执勤的战士更加提高了警惕。在珍宝岛自卫反击战中荣立集体三等功的七连三班战士说：“四人帮”妄想投降卖国搞复辟，我们就要百倍警惕，誓死保卫伟大社会主义祖国，誓死保卫以华国锋主席为首的党中央。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1607aebbf9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
