art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"遵义人民永远忠于毛主席","authors":[],"parts":[{"type":"paragraph","text":"党的八届扩大的十二中全会公报发表的第二天，在遵义的“遵义会议会址”门前，象节日一样排满了从四面八方汇集来的革命群众，隆重举行了欢庆公报发表，向伟大领袖毛主席，向以毛主席为首、林副主席为副的无产阶级司令部表忠心大会。广大革命群众表示：我们遵义儿女永远忠于毛主席，忠于毛泽东思想，忠于毛主席的无产阶级革命路线，世世代代不变心。"},{"type":"paragraph","text":"遵义市人民印刷厂的工人怀着对伟大领袖毛主席无限热爱的深厚无产阶级感情，在会上庄严表示：完全拥护全会的决议，坚决执行全会发出的伟大号召，一定认真搞好斗、批、改，向党的九大献礼！"},{"type":"paragraph","text":"遵义市人民印刷厂这个仅有一百四十七人的工厂，在文化大革命初期，就有一百零八人被走资派打成“反革命分子”。伟大领袖毛主席在党的八届十一中全会上亲自主持制定的“十六条”给了他们以最大的支持和力量，指引他们从叛徒、内奸、工贼刘少奇的资产阶级反动路线的白色恐怖下冲杀了出来。他们从自己的斗争实践中，深刻地认识到：紧跟伟大领袖毛主席就是胜利！"},{"type":"paragraph","text":"党的八届扩大的十二中全会公报的发表，使全厂工人群众沸腾起来了。他们欢呼，他们歌唱，欢呼无产阶级文化大革命的伟大胜利！歌颂心中最红最红的红太阳毛主席无比英明、无比伟大！他们对着毛主席的画像，激动地说，毛主席啊，毛主席！我们红色印刷工人，要印一辈子您的书，听一辈子您的话，永远跟着您干革命！"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82c02a42f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
