script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"汪锋同志强调肃清极左流毒、端正思想路线的任务十分艰巨  讨论真理标准必须落到实处","authors":[],"dates":[{"year":1979,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"汪锋同志强调肃清极左流毒、端正思想路线的任务十分艰巨"},{"type":"paragraph","text":"讨论真理标准必须落到实处"},{"type":"paragraph","text":"本报讯  据《新疆日报》报道：新疆维吾尔自治区党委第一书记汪锋同志，在自治区第五次团代会上号召广大干部、共青团员和各族青年，一定要把真理标准问题的学习和讨论继续开展下去，落到实处。通过学习和讨论，进一步肃清林彪、“四人帮”极左路线的流毒和影响，端正思想路线，团结一致向前看，同心同德搞四化，为打好四个现代化的第一个战役，夺取明年自治区农牧业丰收而努力奋斗。"},{"type":"paragraph","text":"汪锋同志指出，从去年五月起，我国思想战线上展开了坚持实践是检验真理的唯一标准还是坚持两个“凡是”的一场大讨论。在这场关系党和国家命运的大讨论中，我们自治区党委和各级党组织坚定地批判两个“凡是”的观点，坚持了实践是检验真理的唯一标准的观点。各地、州、市根据区党委的安排，先后组织了学习和讨论。对于打破林彪、“四人帮”的精神枷锁，解放思想，搞好各项工作，发展自治区的大好形势，起了有力的推进作用。但是，这个学习和讨论发展是不平衡的。真正搞得好的地方和单位是少数，多数一般化，有些地方和单位还未认真开展起来。就是搞得比较好的地方和单位，也主要是从理论上进行了学习，提高了思想认识，而联系实际，解决实际工作中的问题，则做得很不够。"},{"type":"paragraph","text":"汪锋同志强调指出，林彪、“四人帮”的流毒和影响还远远没有肃清。我们在贯彻党的十一届三中全会精神的过程中，遇到的主要思想障碍就在这里。他说，对三中全会精神，当前有四种情况：一种是积极拥护，坚决贯彻执行；一种总的说是拥护的，而对某些问题认识模糊；一种是心怀疑虑，等待观望；一种是有抵触，甚至反对。在干部中，特别是领导干部中，思想不解放，处于僵化、半僵化状态，仍然是一个突出的问题。这些同志因循守旧，缩手缩脚，不敢把党中央的方针、政策和本地区、本单位的实际情况结合起来，拿出主张，大胆解决问题，工作毫无生气。因此，从全区范围来看，继续深入开展真理标准问题的学习和讨论，进一步肃清林彪、“四人帮”极左路线的流毒和影响，端正思想路线，任务还十分艰巨。"},{"type":"paragraph","text":"汪锋同志说，在继续深入开展真理标准问题的学习和讨论中，要密切联系实际，解决问题，首先是解决思想路线方面的问题。要同两个“凡是”划清界线，搞清楚什么是真高举，什么是假高举，懂得坚持实事求是，一切从实际出发，实践是检验真理的唯一标准，这就是我们想问题，做工作，办事情必须坚持的辩证唯物主义的思想路线。不论机关、学校、工矿企业、农村社队等各方面的干部，都有一个解放思想的问题。我们每个同志，特别是领导同志，一定要肃清林彪、“四人帮”的流毒和影响，真正确立实践是检验真理唯一标准这个马克思主义的根本观点，把思想从僵化、半僵化中解放出来，使自己的思想适应形势发展的需要，为社会主义现代化作出积极的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc4f3bb595"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
