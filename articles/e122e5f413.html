" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1565","name":"中共江西省委纪律检查委员会关于复查历史老案有关问题的通知","author":"中共江西省委纪律检查委员会","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共江西省委纪律检查委员会关于复查历史老案有关问题的通知","dates":[{"year":1983,"month":6,"day":26}],"is_range_date":false,"authors":["中共江西省委纪律检查委员会"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共江西省纪律检查委员会，中共江西省委党史资料征集委员会，江西平反冤假错案，93-95","tags":[{"name":"大跃进","type":"主题/事件"},{"name":"复查","type":"主题/事件"},{"name":"历史老案","type":"主题/事件"},{"name":"十二大","type":"主题/事件"},{"name":"十一届三中全会","type":"主题/事件"},{"name":"文革","type":"主题/事件"}],"parts":[{"type":"title","text":"中共江西省委纪律检查委员会关于复查历史老案有关问题的通知"},{"type":"paragraph","text":"（1983年6月26日）"},{"type":"paragraph","text":"赣州地委4月21日向省委的请示报告提出：“大跃进”时期一些党员、干部因搞浮夸、瞎指挥、强迫命令等问题，受到党纪、政纪或法办处理的案件，是否需要全面复查,如何掌握政策界限；也有一些地、县纪委要求：对处理“文化大革命”前的历史老案，希望有一个比较明确的规定。党的十一届三中全会以来，我省各级纪委（组）在平反冤假错案、复查历史老案，做了大量工作，取得了显著的成绩。但是，由于历史老案不仅数量多，情况复杂，而且难度大，政策性很强。随着工作的不断深入，各地进展也很不平衡，有的正在进行,有的还在等待，还有不少应该复查的历史老案还没有复查，干部政策还未全部落实，对此，必须引起重视和关注。根据中央关于各级党委以及有关部门，都要主动抓紧，务必把一切尚未平反纠正的冤假错案都要坚决平反纠正过来的指示精神，为了进一步发展我省安定团结的大好形势，尽早实现党的十二大提出的国家财政经济状况、社会风气和党风的根本好转，促进四化建设，必须抓紧做好“文化大革命”前历史老案中被错处理的案件的复查纠正工作。现根据中央的有关规定精神和我省的实际情况，作如下通知："},{"type":"paragraph","text":"一、受理复查历史老案的指导思想"},{"type":"paragraph","text":"对“文化大革命”前、建国以来历次政治运动中（包括“大跃进”时期）处理的历史老案，凡本人和亲属提出申诉的，或虽未申诉而事实证明确实处理错了的都应受理，予以复查。在处理时，要根据实事求是的原则和有关政策规定，分辨不同情况逐个进行处理，但不要全面、普遍翻腾。历史老案同“文化大革命”中的冤假错案是有原则区别的。处理历史老案应以《关于党内政治生活的若干准则》、《建国以来党的若干历史问题的决议》为指针，坚持实事求是，有错必纠，不错不纠的原则，作具体分析。既要考虑当时的历史条件和政策，又要遵照党的十一届三中全会以来的精神结合实际解决问题。要看历史老案原结论的主要问题和定性是否有变化，不搞繁琐哲学，不纠缠枝节问题，宜粗不宜细，复查结论应采取“粗一点”、“宽一点”的方针。"},{"type":"paragraph","text":"复查的重点要放在大案、要案，错被定为敌我矛盾、错被开除党籍、错被开除公职的案件，要认真复查纠正；对影响知识分子提拔使用和老干部安排的错案，应抓紧解决。"},{"type":"paragraph","text":"二、处理历史老案的原则和政策依据"},{"type":"paragraph","text":"审理案件应以事实为依据，以党的政策为准绳。复查处理历史老案应严格按全错的全纠、部分错部分纠、不错不纠的原则办理。对原结论主要依据失实，或虽然依据属实，但定性错了或处分不当的，亦应予复查纠正；对原结论正确，已作过处理，以后未发现新问题而重新加重处分的，应将加重处分的部分予以纠正；对经过复查属于大部分事实错了的案件，原处分过重需要纠正，多年来又未再犯类似错误的，可以不再给处分；对原结论的主要依据没有大的出入，定性、处理基本恰当的，或原受一般处分有些偏重，一般不再改变。"},{"type":"paragraph","text":"对冤假错案应着重从政治上解决问题，按有关规定做好善后工作，各级党组织要做好有关人员的思想工作。"},{"type":"paragraph","text":"三、复查工作的步骤和要求"},{"type":"paragraph","text":"复查历史老案任务繁重艰巨，各级纪委（组）应组织力量对重点案件进行摸底排队，分别轻重缓急作出计划，进行深入细致的调查研究.每个案件从受理到结案都要按照办案程序进行，做到：事实清楚，证据确凿，定性准确，处理恰当，材料齐全，手续完备，经得起历史的检验。"},{"type":"paragraph","text":"对重大案件不要层层下转，有的应由党委统一领导，组织有关部门联合复查，作出结论，按处分党员的批准权限及有关规定审批。"},{"type":"paragraph","text":"四、加强对历史老案复查工作的领导"},{"type":"paragraph","text":"各级党委对复查历史老案工作要列入议事日程，遇有重大和疑难案件；党委领导同志要亲自过问。在党委统一领导下，各有关部门分工负责，密切协作。历史老案中凡涉及党员违纪案件及领导批示交办的案件，应由纪检部门承担复查工作；原由组织、人事、统战、政法部门处理的案件，应分别由有关部门处理，并由组织、人事部门协助做好有关善后工作；复查历史老案原则上由原处理单位的党组织进行，原单位撤销或合并，复查工作由它的上级组织和合并后的单位党组织负责进行，不可相互推诿，久拖不办。"},{"type":"paragraph","text":"以上通知已经省委同意，望认真贯彻执行。"}],"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e122e5f413"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
