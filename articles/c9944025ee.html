script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"右倾主义者的嘴","authors":["田雨　陈宵"],"dates":[{"year":1959,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"右倾主义者的嘴"},{"type":"paragraph","text":"田雨　陈宵"},{"type":"paragraph","text":"右倾主义的嘴，就像一支裂了缝的鼓。"},{"type":"paragraph","text":"它发不出那战斗的号召，那雄浑的高歌，那振奋人心的“咚咚”之声。"},{"type":"paragraph","text":"它发出的，是混乱的噪音，喑痖的哀叹，失败的哭泣，以及泄气的，绝望的悲鸣。"},{"type":"paragraph","text":"＊"},{"type":"paragraph","text":"人们说：右倾者是一只不祥的乌鸦。因为他善于作这样的哭泣的预言。"},{"type":"paragraph","text":"在向敌人进军之时，他就预言“错误”；"},{"type":"paragraph","text":"在和敌人搏斗之时，他就预言“失败”；"},{"type":"paragraph","text":"在取得胜利，总结经验之时，他就预言“缺点！缺点！缺点！”"},{"type":"paragraph","text":"＊"},{"type":"paragraph","text":"以为一片树叶，会打破他的脑袋；以为一株嫩草，将碰断他的双足。……"},{"type":"paragraph","text":"这是右倾者的通病。"},{"type":"paragraph","text":"＊"},{"type":"paragraph","text":"右倾的人，虽然很少，却都有“病”，"},{"type":"paragraph","text":"不是“神经质”，就是“夸大狂”。"},{"type":"paragraph","text":"因为，在他们的眼里，兔子被看成老虎，狐狸被认作猛狮。"},{"type":"paragraph","text":"如果，在他们的路上，即或碰着一块小小的石头，他也会掉头便跑，大惊大吼："},{"type":"paragraph","text":"“吙！前面一座大山挡道，过不去！”"},{"type":"paragraph","text":"＊"},{"type":"paragraph","text":"假如“困难”也变成“胜利者”，那么，它的唯一的对手，就将是右倾者。而它唯一的俘虏，也将是右倾者。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9944025ee"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
