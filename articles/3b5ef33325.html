:1966,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海音乐学院民族班　全体同学"},{"type":"paragraph","text":"这几年来，我们全班同学渴望能买到一套《毛泽东选集》，就好象久旱的禾苗望一场甘雨一样，盼呀!望呀!现在，我们的愿望终于实现了。前天上午，全院革命师生员工在震天的锣鼓声中，高唱着革命歌曲，情绪激动。我们拿到了金光闪闪的《毛泽东选集》，很多人激动得热泪夺眶而出。敬爱的党，敬爱的毛主席!我们心里有许许多多话要对您讲，可是不知从何说起，只能千言万语并着一句:中国共产党万岁!各族人民最最敬爱的领袖毛主席万岁!万万岁!"},{"type":"paragraph","text":"我们民族班大部分同学，都是贫苦农牧民的子女.在旧社会里，我们没有读书识字的权利。今天，是党和毛主席把我们从遥远的边疆送到上海音乐学院来学习，给我们深造。我们虽然碰到了各种各样的困难，但是在党的亲切关怀和教育下，我们通过学习毛主席著作，在毛泽东思想的指导下，使我们在政治思想上不断地提高，逐渐地懂得了革命的道理，懂得了做人的道理。有的同学入了团，有的同学入了党，这是党的教育和我们学习了毛主席著作的结果。因而，我们越学习毛主席著作，干劲就越足，越学心里越明亮，越学方向越正确。我们感到一天不学习毛主席著作，就比一天不吃饭还要难受。所以我们都把学习毛主席著作当作每天必不可缺少的粮食，毛主席是我们心中永远不落的红太阳。今后，我们一定要天天学，年年学，一辈子学。有了毛泽东思想这一革命的锐利武器，我们什么也不怕!我们不怕帝国主义，不怕修正主义，不怕一切牛鬼蛇神，就是天塌下来，我们也能顶得住。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b5ef33325"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
