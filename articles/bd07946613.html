script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决打击资产阶级的猖狂进攻  洗净旧社会遗留的污毒（图片）","authors":[],"dates":[{"year":1952,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决打击资产阶级的猖狂进攻"},{"type":"paragraph","text":"洗净旧社会遗留的污毒"},{"type":"paragraph","text":"在开展反贪污、反浪费、反官僚主义运动中。北京市各区人民普遍地举行了斗争贪污分子的大会。这是北京市第九区第三派出所召开的斗争贪污分子大会上，居民们检举和揭发了派出所工作人员邢长兴和关德海贪污欺压行为。"},{"type":"paragraph","text":"中央人民政府铁道部机关及附属单位职工在本月十八日举行斗争贪污分子大会，群众一致坚决要求严惩拒不坦白的贪污分子。"},{"type":"paragraph","text":"北京东华门大街津隆汽车修理工厂工人、青年团员苏少清站稳立场，带动职工，向人民政府检举经理漏税、行贿等不法行为。"},{"type":"paragraph","text":"北京市节约检查委员会动员各机关、团体、民主党派工作人员、大学教授、大学生和文化工作者近三千人，重新开始进行北京市工商业者的大规模检查工作。这是检查人员在进行检查工作时的情形。"},{"type":"paragraph","text":"北京市节约检查委员会在全市各区普遍设有检举箱，以便人民可以检举危害祖国利益的不法分子。"},{"type":"paragraph","text":"天津市节约检查委员会和黄敬市长在天津邮政管理局设置检举信箱，每天收到大批检举贪污。行贿等信件。这是信箱负责人开箱取信时的情形。"},{"type":"paragraph","text":"在这次运动中拒不坦白的北京敬业营造厂经理、前北京市营造业同业公会主任委员奸商刘元敬等五人，现已被政府逮捕。这是刘元敬等五犯被审讯时的情形。"},{"type":"paragraph","text":"前北京市合作总社生产科指导员锺笑尘生活腐化、一贯进行贪污，在运动中，他不但不坦白自己的贪污行为，反而屡次用威胁手段，阻止旁人坦白检举。在群众坚决的要求下，人民政府已把他逮捕法办。这是群众在大会上当场检举锺笑尘罪行时的情形。"},{"type":"paragraph","text":"天津市第八区店员在全市各界人民反贪污、反浪费、反官僚主义坦自检举大会后列队游行。"},{"type":"paragraph","text":"在大会场内设有接待室，人们拥挤着争先坦白检举。"},{"type":"paragraph","text":"天津市第七区五金业和联合业的店员，积极响应人民政府的号召，踊跃地检举贪污、行贿和偷税等不法分子。"},{"type":"paragraph","text":"天津市外商裕泰洋行经理、帝国主义分子麦士霖，收买我国家干部，破坏我国金融和外汇管理政策，盗窃我国家资财，在这次运动中并拒不坦白。经人检举后，天津市公安局已把主犯麦士霖等二人逮捕送人民法院。这是主犯麦士霖在人民法院审讯时供认不讳，当场具结时的情形。"},{"type":"paragraph","text":"天津市第八区联合业第二组店员在收听全市各界人民反贪污、反浪费、反官僚主义坦白检举大会广播时，当场检举贪污等案件十一件。"},{"type":"paragraph","text":"在天津市各界人民反贪污、反浪费、反官僚主义坦白检举大会上，工人们高呼：“反对行贿，反对偷税，反对盗窃国家资财的不法商人！”等口号。"},{"type":"paragraph","text":"在北京市妇女界反贪污、反浪费、反官僚主义的动员大会上，北京电业局一个职员家属钱梦梵报告她动员自己丈夫坦白贪污事实的经过。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd07946613"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
