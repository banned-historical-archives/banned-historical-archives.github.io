<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"孙本文论现代资产阶级社会学","authors":["王贞全"],"dates":[{"year":1962,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南京大学教授孙本文在一月份的《江海学刊》上，发表了《现代资产阶级社会学概观》一文。文章共分四部份:一、现代资产阶级社会学的起源；二、现代资产阶级社会学的基本特点；三、现代资产阶级社会学的主要派别；四、现代资产阶级社会学的近今趋向。"},{"type":"paragraph","text":"文章的第一部份主要论述了现代资产阶级社会学的起源。资产阶级社会学诞生于十九世纪三十年代，到了十九世纪末二十世纪初，资本主义进入了帝国主义时代，于是社会学也开始了一个新阶段，就是现代资产阶级社会学时代。"},{"type":"paragraph","text":"现代资产阶级社会学划分为“理论社会学”和“应用社会学”两个部门。前者研究关于社会现象的理论，后者根据理论社会学所揭示的原理去研究社会上的各种问题。"},{"type":"paragraph","text":"文章的第二部份揭出了资产阶级社会学的特点，即在立场、观点、方法上不同于历史唯物主义。资产阶级社会学是为资产阶级利益、为帝国主义利益服务的，因此它只笼统的承认一般社会，不承认有阶级区别的社会。例如美国社会学者弗·亨·吉丁斯认为社会就是个人的集合体。有的把社会看作仅有社会阶层而没有阶级的社会，他们否认资本主义制度下的基本矛盾和阶级斗争，从而明显地可以看出，他们是站在资产阶级的立场上为资本主义制度作辩护。"},{"type":"paragraph","text":"现代资产阶级社会学，在研究社会现象和社会发展过程中，是采取形而上学的方法，只注重社会外部联系，不注重社会内部的联系，只注重社会的量变，不注重社会的质变，只注重社会的局部和表面现象，无视社会的全面的和本质的现象。"},{"type":"paragraph","text":"文章的第三部份介绍了现代资产阶级社会学的四个主要派别:第一派是生物学派，它企图用生物学的原理来解释社会现象。在这一派中，由于研究的出发点不同，又有社会有机论、种族决定论、优生论、人口论等派。第二派是地境学派，它企图以地理环境的影响来解释社会现象。这一派包括地理环境决定论、人类地境学、农村社会学、都市社会学等派。第三派是心理学派，它企图从人类的心理来解释社会现象。这一派中，包括模仿论、同类意识论、势力论、群众心理论和本能论等派。第四派是文化学派，它企图以文化因素来解释社会现象。这一派中，包括文化社会学派、民族社会学派和比较社会学派等。"},{"type":"paragraph","text":"文章第四部份阐述了资产阶级社会学的近今趋向:第一种是经验主义社会学的趋向，这种社会学根据对个别社会生活事实的具体的经验研究，产生了社会学专门化的倾向，形成了很多专门社会学，例如工业社会学、都市社会学、农村社会学等等。第二种是“社会成层论”和“社会流动论”的趋向，现代资产阶级社会学者使用“社会成层”和“社会流动”这两个概念来反对马克思列宁主义关于阶级和阶级斗争的理论。第三种是进步理论日益增长的趋向。除了这三种倾向之外，还有微观社会学趋向、技术主义社会学的趋向等等。"},{"type":"paragraph","text":"这篇文章评述了西方资产阶级社会学的产生、成长和今后的趋势，揭露了资产阶级社会学的本质。正如作者在文章最后一段的体会中所说:资产阶级社会学思想随着社会历史的发展而被粉碎，而马克思列宁主义思想在资本主义世界或迟或早必然会代替资产阶级社会学思想，这是不以人的意志为转移的客观规律。(王贞全)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adac0775b8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
