<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"时代的潮流——日本国会批准日中和平友好条约综述","authors":["本报记者"],"dates":[{"year":1978,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"时代的潮流"},{"type":"paragraph","text":"——日本国会批准日中和平友好条约综述"},{"type":"paragraph","text":"日中和平友好条约十月十六日在日本众议院通过后，十月十八日又获得日本参议院的批准。日本国会对这项条约的批准手续，至此已全部完成。"},{"type":"paragraph","text":"日本《每日新闻》在条约批准后发表的一篇社论中指出：“条约由超党派所批准通过这件事本身，就意味着日中关系具有坚固的基础。”"},{"type":"paragraph","text":"的确，日本国会讨论通过条约的过程生动地表明了，加强日中两国的友好合作是日本人民的强烈愿望。"},{"type":"paragraph","text":"十六日下午，日本众议院洋溢着一片喜悦的气氛。两点左右，将近一个月来没有出席会议的田中角荣前首相来到了会场，引起了人们的注意。宇都宫德马等为了促进日中友好而进行了长期努力的一些议员们，怀着兴奋的心情坐在各自的席位上……。"},{"type":"paragraph","text":"两点二十二分，开始对日中和平友好条约进行讨论。在永田亮一外务委员长报告以后，各党代表一个接一个地走上讲坛。自由民主党的代表称赞日中和平友好条约的签订是“历史性的划时代的大事”。社会党代表回顾了日中友好发展的道路。公明党代表对条约“以无限喜悦的心情表示赞成”。民社党代表“衷心祝福”条约的签订。……"},{"type":"paragraph","text":"三点二十三分，保利议长宣布表决。在一片“赞成”声中，各党议员一齐站立起来。《朝日新闻》在描述表决时的情况时写道：“除了自由民主党青岚会的三位议员表示反对以外，许多直到恢复邦交为止还把促进派称为国贼、作为异己分子对待的议员们也纷纷起立，似乎是理所当然地表示了赞成。看到这种表决情景，令人感到了时代的潮流。”"},{"type":"paragraph","text":"这种时代的潮流，在十八日下午参议院全体会议上也同样地表现了出来。在表决时，除了两位议员以外，全场起立对日中和平友好条约表示赞成。"},{"type":"paragraph","text":"众参两院相继批准日中条约以后，为日中友好事业作过长期努力的一些日本朋友们心情格外激动。自由民主党议员古井喜实，在众议院十六日会议结束后以无限感慨之情说：“想出席今天这次会议的人是数不胜数的。在已经去世的人中首先有松村谦三先生、前首相石桥湛山先生、高碕达之助先生，今年逝世的川崎秀二先生，还有浅沼稻次郎等。田中前首相、大平正芳虽还在，藤山爱一郎先生离开了众议院实在令人感到寂寞。对于今天这种情景真是想也没有想到。……”"},{"type":"paragraph","text":"古井先生的谈话，反映了日中两国人民的共同心情。多少年来，不少日本朋友为日中友好事业数十年如一日地辛勤奔走，作出了贡献。饮水不忘掘井人。在中日友好已经有了丰硕成果的今天，两国人民怀着感激的心情想起他们的光辉业绩，这是很自然的。"},{"type":"paragraph","text":"近日来，日本各报纷纷发表评论，各地群众分别举行集会，热烈祝贺日中和平友好条约的批准。"},{"type":"paragraph","text":"为了迎接邓小平副总理的来访，双方交换条约批准书，朝野各方正在积极进行准备工作。整个日本，正象时事社的报道所描述的，“完全沉浸在‘日中友好的气氛’中”。不少日本朋友满怀信心地说，通过邓小平副总理的访问，中日两国的友好合作关系，必将出现一个新的高潮。"},{"type":"paragraph","text":"本报记者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dd93eb013"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
