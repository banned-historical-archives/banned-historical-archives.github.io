<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"手持《毛主席语录》，与敌人展开针锋相对斗争香港爱国师生狠斗港英“视学官”","authors":[],"dates":[{"year":1967,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社香港二十七日电　香港汉华中学爱国师生发扬勇敢战斗的革命英雄主义精神，二十五日怒斥港英“教育司”派来的两名“视学官”。"},{"type":"paragraph","text":"上午九时许，港英两名“视学官”来到汉华中学，他们立即被带进学校礼堂的接见处。学校师生员工和家长代表六人以及五十多名身受港英法西斯迫害的教师和学生，手持红彤彤的《毛主席语录》，列队进入礼堂。"},{"type":"paragraph","text":"两名“视学官”如坐针毡，正准备说话，礼堂灯光一亮，台上的帷幕拉开，出现了伟大领袖毛主席像和庄严的五星红旗。一行金色的大字写着:“敬祝毛主席万寿无疆!”"},{"type":"paragraph","text":"“视学官”神魂未定，教师代表站起来高声说:“让我们学习最高指示!”"},{"type":"paragraph","text":"“我们中华民族有同自己的敌人血战到底的气概，有在自力更生的基础上光复旧物的决心，有自立于世界民族之林的能力。”“一切反动派都是纸老虎。……”"},{"type":"paragraph","text":"接着，学生代表宣读全体师生员工对港英“教育司”简乃杰的抗议书。"},{"type":"paragraph","text":"六位代表也连续质问“视学官”。两个“视学官”面对这些严词质问，哑口无言，或答非所问，或狼狈苦笑。最后终于不得不低头承认:“爱国无罪。”“学习毛泽东思想我们不干涉，你们有自由。”"},{"type":"paragraph","text":"“视学官”在学校“巡视”时，所到之处，遇到的都是爱国学生愤怒的抗议。就在一片愤怒的抗议声中，他们带着恐惧与沮丧的心情缩着脑袋离去。"},{"type":"paragraph","text":"据新华社香港二十七日电　香港“新界”地区爱国学生的反英抗暴运动正蓬勃发展。他们高举毛泽东思想伟大红旗，大造港英帝国主义的反，同前来挑衅的港英“高级视学官”和警察特务进行了针锋相对的斗争。"},{"type":"paragraph","text":"二十四日，西贡区沙角尾村育贤学校的爱国学生近二百人，在学校的课室、门窗、校园和校舍四周大量张贴毛主席语录和最最敬爱的伟大领袖毛主席的画像，高唱毛主席语录歌，高呼“毛主席万岁!”“粉碎奴化教育!”等口号。"},{"type":"paragraph","text":"港英当局对爱国学生这一革命行动怕得要死，第二天竟派出一名“新界”“高级视学官”及一名警官，率领警察、特务多人，来到学校进行挑衅。当这班家伙进到学校时，近百名爱国学生和村内居民，立即把他们团团围住，愤怒抗议港英法西斯当局的挑衅行为。在群众怒斥声中，这班家伙心慌意乱，掉头就走。沙角尾同胞一边追赶，一边高唱《一切反动派都是纸老虎》。追至村口时，一名港英特务竟要向爱国同胞开枪。爱国学生完全不把纸老虎放在眼内，勇敢斗争，吓得那个特务赶紧随同港英“高级视学官”急急逃去。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"675275ab84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
