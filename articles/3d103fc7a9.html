rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"捍卫毛主席革命路线是我们毕生战斗任务","authors":["某部“临汾旅”全体代表"],"parts":[{"type":"paragraph","text":"最红最红的红太阳在我们面前升起，最伟大的领袖毛主席神采奕奕地出现在主席台上，我们激动得热泪盈眶，欢呼跳跃。毛主席啊，毛主席！革命战士无限忠于您。早晨，我们迎着朝阳祝福您；晚上，我们望着北斗星想念您。蘸尽东海万顷水，写满蓝天千里云，表不尽我们对您老人家的无限热爱，无限忠诚！"},{"type":"paragraph","text":"毛主席啊，毛主席！您的光辉思想和革命路线，是革命战士生命的灵魂，前进的灯塔，智慧的源泉，战斗的力量。回顾我们部队的战斗历程，哪一步不是您革命路线指引的结果！我们把无限忠于您的革命路线当作最大的幸福，把坚决执行您的每一项战斗号令当作神圣的职责。"},{"type":"paragraph","text":"毛主席啊，毛主席！两年前，您老人家发出了伟大的“五·七”指示，这是您革命路线的光辉体现。同志们说：“毛主席指向那里，我们就打到那里！”我们在您的“五·七”指示的指引下，决心把部队办成红彤彤的毛泽东思想大学校。当听到您老人家和您的亲密战友林副主席亲自批准我们部队执行皖西围湖造田工程时，广大指战员群情激奋，斗志昂扬。同志们顶烈日，冒风雪，踩污泥，战病魔，把百里湖地变成活学活用您老人家光辉思想的大课堂，变成执行和捍卫您老人家革命路线的战场。在执行您的伟大指示中，进一步锤炼了我们对您无限忠诚的红心，促进了思想革命化，提前一年半完成了您老人家亲自交给的围湖造田任务。"},{"type":"paragraph","text":"毛主席啊，毛主席！您发出了“人民解放军应该支持左派广大群众”的战斗号令，我们热烈响应，坚决执行，立即开赴“三支”“两军”第一线。在南京地区两个阶级、两条道路、两条路线大决战中，我们坚定不移地支持左派广大群众，保护广大人民群众，热情地向群众宣传您的光辉思想，和广大革命群众一起，顶狂风，战恶浪，一次又一次地粉碎了阶级敌人从“左”的或右的方面对您的革命路线的干扰，促进了革命的大联合和革命的三结合，进一步巩固了无产阶级专政。在我们部队担负“三支”“两军”任务的地区，革命委员会一个接一个出现，革命、生产出现了前所未有的大好形势。"},{"type":"paragraph","text":"毛主席啊，毛主席！千胜利，万胜利，都是您光辉思想的伟大胜利，都是您革命路线的伟大胜利。海可枯，石可烂，我们忠于您的光辉思想永不变。地可动，山可摇，我们捍卫您的革命路线的决心永远不动摇！我们一定把您的接见化为巨大的力量，以林副主席为光辉榜样，永远忠于您，永远忠于您的光辉思想，永远忠于您的革命路线；像门合同志那样：一切想着您，一切服从您，一切紧跟您，一切为着您，把学习、执行、宣传、捍卫您的革命路线作为毕生的战斗任务，把无产阶级反对资产阶级和一切剥削阶级的政治大革命进行到底！"}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d103fc7a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
