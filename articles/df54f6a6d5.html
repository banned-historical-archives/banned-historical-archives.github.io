ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"在庐山书赠中央常委的诗句","alias":"","parts":[{"type":"paragraph","text":"在庐山书赠中央常委的诗句"},{"type":"paragraph","text":"（1961年9月16日）登高壮观天地间，大江茫茫去不还。黄云万里动风色，"},{"type":"paragraph","text":"白波九道流雪山。李白庐山谣一诗中的几句。登庐山，望长江，书此以赠庐山常委诸同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六一年九月十六日"},{"type":"paragraph","text":"[1]1961年8月23日至9月16日，中共中央在庐山举行工作会议，讨论工业、粮食、财贸及教育等问题。毛泽东在会上分析了当时的经济形势，认为问题暴露出来了，将走向反面，现在是退到谷底了，形势到了今天，是一天天向上升了。在会议结束的那天，他书写了唐代诗人李白《庐山谣寄卢侍御虚舟》一诗中的4句，赠中央常委各同志。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":9,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":370,"page_end":370},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df54f6a6d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
