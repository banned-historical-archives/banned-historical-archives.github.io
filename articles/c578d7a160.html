ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对《化石》编辑部张锋来信的批语","alias":"","parts":[{"type":"paragraph","text":"对《化石》编辑部张锋来信的批语"},{"type":"paragraph","text":"（1975年9月16日）小平、文元叫同志："},{"type":"paragraph","text":"请考虑，可否将此信印发在京各中央同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十六日"},{"type":"paragraph","text":"[1]小平，即邓小平，当时任中共中央副主席、国务院副总理。文元，即姚文元。"},{"type":"paragraph","text":"[2]指《化石》杂志编辑部张锋1975年9月6日给毛泽东的一封信。信中说，我是中国科学院古脊椎研究所的一名编辑，科普刊物《化石》创办3年来虽然得到工农兵的初步好评，但却受到出版部门个别负责人的排厅、压制和少数权威的挑剔，至今仍为半年刊，且只有一名编辑。听到中央8月27日关于《动物学杂志》《化石》两刊出大学本的指示后，知道我们的刊物得到了毛主席的关注，社、所已同意改《化右》为季刊，编辑增至4人。信中还对科普工作提出了几点具体意见。毛泽东批阅时，为这封信加了标题“一封诉苦的信”"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":9,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":69,"page_end":69},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c578d7a160"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
