ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"包围大同和解决太原问题","alias":"","parts":[{"type":"paragraph","text":"包围大同和解决太原问题"},{"type":"paragraph","text":"（1945年8月16日）贺、吕、林\"："},{"type":"paragraph","text":"（一）红军占领张北、多伦。（二）我绥远”主力速包围大同，我必须和傅作义争大同。（三）运城敌十五日尚未撤退，定十九日北撤。估计太原敌暂不会撤，阎亦暂不能公开占太原。我主力必须切断汾阳、孝义与太原间，占领据点，构筑工事，准备与阎决战。（四）我太岳部队在棉上?集中向平介\"进，望派人带电台去平介联络。我太行部队十九日集中武乡后向太原进，为时太迟，你们须用自己的及太岳的力量解决太原问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十六日"},{"type":"paragraph","text":"[1]贺，指贺龙，当时任八路军第一二〇师师长、陕甘宁晋绥联防军司令员兼晋绥野战军司令员。吕、林，指吕正操、林枫，当时分别任八路军晋绥军区司令员和政治委员。"},{"type":"paragraph","text":"[2]红军，指苏联红军。[3]绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。[4]1傅作义，当时任国民党军第十二战区司令长官。[5]阎，指阎锡山，当时任国民党军第二战区司令长官。[6]棉上，村名，位于山西沁源县北部。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":8,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":274,"page_end":274},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68341fa969"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
