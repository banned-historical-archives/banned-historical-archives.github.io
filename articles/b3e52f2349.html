script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判“三项指示为纲”　继续批判孔孟之道  中山大学反击右倾翻案风的斗争不断深入发展","authors":[],"dates":[{"year":1976,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判“三项指示为纲”　继续批判孔孟之道"},{"type":"paragraph","text":"中山大学反击右倾翻案风的斗争不断深入发展"},{"type":"paragraph","text":"据新华社广州一九七六年三月一日电  广州中山大学师生员工认真学习无产阶级专政理论，狠批党内不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，狠批孔孟之道，使反击右倾翻案风的斗争不断深入发展。"},{"type":"paragraph","text":"“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目。”毛主席的这一重要指示，极大地鼓舞了中山大学的广大师生员工。他们以毛主席的指示为强大思想武器，深入批判了“三项指示为纲”这个修正主义纲领。在大批判中，师生们重温毛主席关于无产阶级文化大革命的一系列重要指示，学习马列和毛主席关于无产阶级专政的理论，从政治上、理论上、手法上深刻剖析了“三项指示为纲”的反动实质。大家认识到，“三项指示为纲”的反动理论基础是阶级斗争熄灭论和唯生产力论，它的手法是折中主义，目的是抽掉阶级斗争这个纲，篡改党的基本路线，妄图颠覆无产阶级专政，复辟资本主义。因此，我们和党内不肯改悔的走资派的这场斗争，是无产阶级和资产阶级的大搏斗，是无产阶级文化大革命的继续和深入，是关系到我们党和国家的命运和前途的大问题。"},{"type":"paragraph","text":"中山大学师生员工通过学习和批判，清楚地看到，右倾翻案风的风源，就在党内那个不肯改悔的走资派。教育界、科技界的种种奇谈怪论，万变不离其宗，它的根子就是“三项指示为纲”的修正主义纲领。在反击右倾翻案风的斗争中，中山大学师生员工继续批判孔孟之道，从思想根源上把刮右倾翻案风的人推行的修正主义路线批深批透。师生员工们说，孔孟之道是复辟之道。过去一切反动派，都从孔孟之道那里寻找毒害人民、破坏革命的思想武器。从陈独秀、王明到刘少奇、林彪这些党内的修正主义路线的头子，反对无产阶级革命，反对无产阶级专政，都乞灵于孔孟之道。今天，党内不肯改悔的走资派搞复辟倒退，搞反攻倒算，也效法孔老二“克己复礼”，取儒家之经，学孔孟之道。无数事实说明，孔孟之道是刮右倾翻案风的人推行的修正主义路线的一个重要的思想根源。中文系、哲学系师生在批判中指出，两千多年前的孔老二为了复辟奴隶制培养奴才，大肆宣扬“学而优则仕”的反动教育思想，鼓动学生为高官厚禄而奋斗。千百年来，孔老二的徒子徒孙都把“学而优则仕”奉为千古不变的信条。刘少奇、林彪鼓吹的“读书做官论”是孔孟之道的“学而优则仕”的翻版。党内不肯改悔的走资派为了复辟资本主义，又从孔家店那里拣起了“学而优则仕”这个破烂货。很明显，党内不肯改悔的走资派污蔑教育质量低，否定教育革命成果，根本的目的就是要把学校变成猎取高官厚禄，培养精神贵族，为复辟资本主义服务的工具。"},{"type":"paragraph","text":"在大批判中，师生员工们如饥似渴地攻读马列著作和毛主席著作，结合国际共产主义运动史上两条路线斗争的经验，进一步分析批判“三项指示为纲”的修正主义纲领。哲学系二年级工农兵学员重新学习了列宁的《无产阶级革命和叛徒考茨基》，联系党内不肯改悔的走资派的言行进行分析，深刻地认识到，一切修正主义路线的头子都是挖空心思，利用种种手法，抹煞无产阶级革命和无产阶级专政这个马克思主义的根本原则。叛徒考茨基为了反对无产阶级专政理论，反对马克思列宁主义路线，抓住“专政”这个词儿进行歪曲，把无产阶级专政中暴力革命的含义阉割掉，把专政的阶级内容抽掉，用这种偷梁换柱的手法，来篡改马克思主义的路线。党内不肯改悔的走资派把“阶级斗争为纲”篡改为“三项指示为纲”，就否定了社会主义社会中无产阶级和资产阶级这个主要矛盾，否定了无产阶级对资产阶级的全面专政。"},{"type":"paragraph","text":"目前，中山大学反击右倾翻案风的斗争正在逐步深入开展。师生员工们纷纷表示，一定要发扬“可上九天揽月，可下五洋捉鳖”的革命精神，遵照毛主席和党中央的指示，在校党委和各级党组织领导下，牢牢掌握斗争的大方向，锋芒直指党内那个不肯改悔的走资派，夺取反击右倾翻案风斗争的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3e52f2349"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
