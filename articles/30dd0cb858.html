师范学院学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报诗——长恨歌","type":"title"},{"text":"山西师范学院学生","type":"authors"},{"text":"师院最重公共课，千呼万唤改不得；我本物理专修科，专修几门公共课；","type":"paragraph"},{"text":"每周上课32节， 国际水平早突破；公共课程内容繁，上天下地都学遍；","type":"paragraph"},{"text":"划蛇添足狗续貂，叠林架屋洪水泛；条条类类满黑板，大本小本笔记满；","type":"paragraph"},{"text":"笔记虽多尽教条，放之四海而皆惨；专业学习大相反，大刀阔斧一起喊；","type":"paragraph"},{"text":"教学课程商量明，简而不明是特点；物理课本虽然好，先生的课会精简；","type":"paragraph"},{"text":"剪头去尾长变短，七折八扣拦腰斩；闻到数学据大纲，大纲决定在中央；","type":"paragraph"},{"text":"退之万里高教部，不见长安只见雾；今年混过复明年，秋月春风等闲渡；","type":"paragraph"},{"text":"腹中冷落知识稀，老大把人子弟误；如此师院太可怜，人类灵魂工程师；","type":"paragraph"},{"text":"领导充耳全不闻，学生意见齐禁止；同是中国读书人，相逢何如都害死；","type":"paragraph"},{"text":"读罢落泪我最多，并州司羔不想吃。","type":"paragraph"},{"text":"——白居难——","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30dd0cb858"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
