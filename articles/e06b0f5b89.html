rs":[],"dates":[{"year":1957,"month":5,"day":18}],"is_range_date":false,"parts":[{"text":"浙江临海县十三个乡发生农民哄闹事件","type":"title"},{"text":"新华社杭州18日讯  浙江临海县淮仁、广东两乡农民，因为乡人民政府下发购粮钲迟缓，于10日晚间聚集在乡政府门口，挥手呐喊，下乡干见势不对，便关了多政府的大门，这就更引起了羣衆的不满，开始殴打乡干部。事件迅速蔓延到附近的十三个乡幷波及到仙居县。闹事者幷抢劫了一个乡的供销合作社(人数不明)。","type":"paragraph"},{"text":"当地政府请求部队(高炮部队)协助维持秩序，闹事羣衆见部队来了，就躲避在附近的山沟裡，他们说:解放军来了，暂且算了，解放平走了，再干一场。","type":"paragraph"},{"text":"闹事的羣衆带有棍、棒、镰刀和土炮等，还有两支步枪，据说有一支步枪是乡干部那裡夺去的。他们的口号是:一，坚决退社;二，土地还家:三，取消三定政策。(特约通讯员汪送德)","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参攷》第2207期, 一九五七年五月十八日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e06b0f5b89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
