报组"],"dates":[{"year":1976,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"有了文化大革命   才有我们评报组"},{"type":"paragraph","text":"北京市海淀区塔院大队评报组"},{"type":"paragraph","text":"我们塔院大队的广大贫下中农，怀着激动的心情收听了电台播送的《新闻战线上的新生事物——赞工农兵评报》，当天晚上组织了学习和讨论。"},{"type":"paragraph","text":"一些老贫下中农，听了七十二岁老工人王继明写的那首诗，深有感触地说：“这诗确实说出了我们工农兵的心情和愿望。”党支部书记刘斌说：“在旧社会，咱贫下中农甭说评报，就连看报也办不到。那时资本家、地主阶级办报，办了报来专我们劳动人民的政。解放了，我们当家做了主人，经过无产阶级文化大革命，不但报纸送上门，还让我们评报，把办好党报的大权也交给了我们工农兵，交给我们这些旧社会被人看不起的大老粗。我们一定向老工人王继明学习，积极热情支持新生事物，当好评报员。”青年评报员刘淑英说：“文化大革命前，由于刘少奇修正主义新闻路线的干扰和破坏，报纸上登出的一些文章，我们看不惯，早就有意见。但那时一些人看不起工农兵，我们提意见，有谁来听呢？我们是评报无门！现在来了个大变化。这真是：有了无产阶级文化大革命，才有我们塔院大队的评报组啊！”"},{"type":"paragraph","text":"这些天来，贫下中农主动要求参加评报组，表示要为发展文化大革命的丰硕成果，为捍卫毛主席的无产阶级新闻路线，永远当好评报员、宣传员。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db011ce704"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
