r":1977,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张春桥的“废话”"},{"type":"paragraph","text":"山东师范学院中文系　刘明远"},{"type":"paragraph","text":"人们还记得，野心家林彪有个特点，作文讲话都是装腔作势，废话连篇。什么“最大的一次，而不是同他们一样大，更不是比他们小，也不是稍微大一点，而是极大、最大。”类似的废话在他的文章和讲话里有的是。"},{"type":"paragraph","text":"“四人帮”继承、发展了林彪的文风。张春桥在他的一篇文章里，在引用了马克思讲的“四个一切”以后说：“在这里，马克思讲的是一切，四个都是一切！不是一部分，不是大部分，也不是绝大部分，而是全部！”“一切”这个词，本来十分明白，可是张春桥却偏要装出比马克思、比群众都高明的样子，故弄玄虚，同义反复，大讲了一通废话！"},{"type":"paragraph","text":"这种废话连篇、空洞无物的文风，只能说明这些家伙头脑空虚、思想贫乏，又要装腔作势，借以吓人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"705be82e03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
