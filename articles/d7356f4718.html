art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见阿吉乌斯议长率领的马耳他共和国议会代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社八月十八日讯 人大常委会委员长叶剑英今天晚上在人民大会堂会见了马耳他共和国议会议长卡尔西东·阿吉乌斯和由他率领的马耳他议会代表团。"},{"type":"paragraph","text":"阿吉乌斯议长一行是中马建交后第一个访问我国的马耳他议会代表团。叶委员长说，中国人民非常欢迎你们。马耳他人口不多，国家不大，但在国际斗争中，它是一位勇敢的战士。"},{"type":"paragraph","text":"阿吉乌斯议长表示，他对能到中国访问感到十分荣幸。他说，马耳他得到中国人民的许多帮助，你们的帮助是不附带任何条件的。"},{"type":"paragraph","text":"叶委员长祝马耳他团结、安定，经济上繁荣，人民幸福，祝中马两国人民的友谊一天天加强。"},{"type":"paragraph","text":"参加会见的代表团团员有马耳他工党议员卡梅尔·布蒂吉格、国民党议员赫尔曼·法鲁加、议会秘书查尔斯·米夫萨德。"},{"type":"paragraph","text":"会见时在座的有人大常委会副委员长姬鹏飞等。"},{"type":"paragraph","text":"叶剑英委员长八月十八日会见马耳他共和国议会议长卡尔西东·阿吉乌斯。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7356f4718"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
