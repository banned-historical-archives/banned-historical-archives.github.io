script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"68b78524-8577-450f-a2a7-73b9f4d039d8","name":"国务院访问纪要","internal":false,"type":"img","official":false,"author":"周金柱","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/68b78524-8577-450f-a2a7-73b9f4d039d8/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/68b78524-8577-450f-a2a7-73b9f4d039d8/2.jpg"],"article":{"title":"国务院访问纪要","alias":"","parts":[{"type":"paragraph","text":"国务院防问纪要"},{"type":"paragraph","text":"我们带着目前运动中的几个问题，走了国务院接待站××（原文如此）现将我们的问中儿个主要问题的答复向大家谈一谈，供全体红卫兵战士和革命师生参考："},{"type":"paragraph","text":"1关于炮裹司命部问题："},{"type":"paragraph","text":"问：过去中央负责同志讲过炮裹司合部和林彪同志讲的裹司命部，我们怎样理解？"},{"type":"paragraph","text":"答：过去中央负责同志是有人讲过\u003c原话李雪峰同志讲过，陶铸同志讲过入，但是我没有见到正式文件中有过这个提法。林彪同志讲的是指一小摄别有用心的人才炮裹我们无产阶级司合部。过去有人这样提了，要具体问题具体分析，不能说，贴了几张大字报，提了意见开了揭发批判会，就说别人炮裹无产阶级司合部。但注意不要把揭发批判会，开成斗争会，即使在揭发批判会搞过火了一点，也不要老扣住这一点不放。因为文化大革命都搞过，都没经验，缺点是免不了的。重要的还是学习林彪同志讲话。"},{"type":"paragraph","text":"2.三类于部性质问题：问：三类于部是什么样的当权派？"},{"type":"paragraph","text":"答：三类干部不是资产阶级当权派，因为他不是反党反社会主义的·但他也犯了严重的错将到四类的边缘，再一发展就是四类千部·三类干部的问题也是要处理的，不能放过去。因为他是党员，还有党籍问题，给党的事业造成了很大损失。但不是重点\u003c转抄者按此句似有些费介，大概是说三类干部问题，不是这次运动的重点\u003e。"},{"type":"paragraph","text":"3.过去贴了很多大字报，而现在问题不是很特别严重，是否是方向错了？"},{"type":"paragraph","text":"答：不能这样说。不贴大字报你知道是黑帮？4有时问题性质定不准怎么办？"},{"type":"paragraph","text":"答：问题不很清楚的，可以街一街，可以从斗争黑帮中发现问题，揭发问题，可以放到运动后期处理。不是四类的干部要不要揭发问题？"},{"type":"paragraph","text":"答：最好不要定框框，轻易下结论。这个是几类，那个是几类，要靠揭发问题。"},{"type":"paragraph","text":"6怎样解决运动中的罢官问题？答：要具体问题具体分析。一般情况下有两种："},{"type":"paragraph","text":"（1)是黑郡的必罢官·这是夺权问题，必须要罢官是敌我矛"},{"type":"paragraph","text":"盾。（2）有的压制了群众，领导瘫痪了，成了运动的粹脚石，不能"},{"type":"paragraph","text":"领导运动。也要罢官。7.支持无产阶级当权派，还能否揭发问题？答：支持不等于包庇错，不等于和平共处，也不是不意见。"},{"type":"paragraph","text":"8.在揭总支问题的过程中提到工农调于的名字，也有的贴了一二张大字报，标不标“围攻调干”？"},{"type":"paragraph","text":"答：提意见，贴大字报对都可以的，不能说是调干就不能提意见，贴大字报了。如果是反党反社会主义的，也要进行斗争批判。"},{"type":"paragraph","text":"9.一二类干部在北京的是大多数，还是少数？"},{"type":"paragraph","text":"答：要具体问题具体分析，北京市不同于其他地区，具体到过大学校，某个单位也要具体问题具体分析·前北京市人委修正主义的，大学部也是烂掉了，受修正主义影响比其他地方是要多一些。具体到某个单位一二类干部可能是多数，也可能是少数，就全国一般情况，一二类于部是大多数。"},{"type":"paragraph","text":"北京矿业学院"},{"type":"paragraph","text":"周金柱北京师大生物系河水转抄"}],"authors":["周金柱"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"林彪","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e6fe3ff0b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
