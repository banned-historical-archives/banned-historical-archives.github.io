<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"天津光复道商店革委会狠抓经济领域中的阶级斗争  有步骤地打击资产阶级的腐蚀和破坏","authors":[],"dates":[{"year":1970,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天津光复道商店革委会狠抓经济领域中的阶级斗争"},{"type":"paragraph","text":"有步骤地打击资产阶级的腐蚀和破坏"},{"type":"paragraph","text":"新华社天津二十六日电　天津市光复道商店革委会牢记毛主席关于“千万不要忘记阶级斗争”的伟大教导，狠批叛徒、内奸、工贼刘少奇散布的“阶级斗争熄灭论”，积极带领革命群众有步骤地打击资产阶级的腐蚀和破坏活动，推动斗、批、改运动不断深入发展。"},{"type":"paragraph","text":"在无产阶级文化大革命中，光复道商店的广大群众以革命大批判为武器，狠批刘少奇在财贸战线上推行的“利润挂帅”等反革命修正主义黑货，使商店的面貌发生了巨大的变化。在一派大好形势下，有少数同志产生了和平麻痹思想，认为“印把子已经拿到手，以后只要站柜台卖货收款就行了。”这时，一小撮阶级敌人便趁机活动起来，有的搞贪污盗窃，挖社会主义墙脚；有的散布“干哪行吃哪行”的反动谬论，拉拢腐蚀革命群众，破坏社会主义经济基础。"},{"type":"paragraph","text":"这种情况一出现，就引起了商店革委会的高度警惕。他们及时举办了毛泽东思想学习班，组织大家反复学习毛主席关于“在社会主义这个历史阶段中，还存在着阶级、阶级矛盾和阶级斗争，存在着社会主义同资本主义两条道路的斗争，存在着资本主义复辟的危险性。要认识这种斗争的长期性和复杂性”的伟大教导，引导大家联系本单位阶级斗争新动向，开展了“四查”活动：一查本单位两个阶级、两条道路、两条路线斗争的历史；二查一小撮阶级敌人贪污盗窃、投机倒把、腐蚀革命队伍的罪行；三查资产阶级思想对革命队伍的影响；四查反革命修正主义路线的流毒。通过这些活动，使大家进一步认识了财贸战线两个阶级、两条道路、两条路线斗争的长期性和复杂性，决心把这一斗争进行到底。"},{"type":"paragraph","text":"为了有步骤地打击一小撮阶级敌人，革委会成员都纷纷深入到斗争第一线。他们同革命群众一道，进行深入细致的调查研究，及时掌握阶级斗争的新动向和新情况，主动地向一小撮阶级敌人打进攻战。有一个坏家伙，过去贪污盗窃，屡教不改；在无产阶级文化大革命中，这个家伙又利用反革命经济主义妖风和反动的无政府主义思潮，混水摸鱼，挖社会主义墙脚，并且时常采用小恩小惠的手法，拉拢、腐蚀群众和青年。在“四查”活动中，革命群众把这个贪污盗窃分子揪了出来。并且把他作为“活靶子”，狠批刘少奇的“阶级斗争熄灭论”，使广大群众受到了一次极为深刻的阶级斗争和两条路线斗争的教育。广大群众说：不抓经济领域的阶级斗争，社会主义企业就会变质。"},{"type":"paragraph","text":"这个商店革委会在领导群众深入开展经济领域里阶级斗争的过程中，积极组织群众活学活用毛主席的光辉著作“老三篇”，狠批刘少奇的“公私溶化论”，更牢固地树立一心为公、毫不利己专门利人的思想，做到为革命站柜台，拒腐蚀，永不沾。"},{"type":"paragraph","text":"在狠抓经济领域阶级斗争的过程中，革委会十分注意掌握党的政策，严格区分两类不同性质的矛盾，团结一切可以团结的力量，最大限度地孤立和打击一小撮阶级敌人。对于犯有一般错误的人，坚持正面教育，做过细的思想政治教育工作，帮助他们斗私批修，提高觉悟，放下包袱，共同对敌。"},{"type":"paragraph","text":"光复道商店通过开展经济领域里的阶级斗争，狠狠打击了一小撮破坏社会主义经济的阶级敌人，进一步促进了革命群众的思想革命化，在全商店掀起了“抓革命，促生产，促工作，促战备”的新高潮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70bc3899a6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
