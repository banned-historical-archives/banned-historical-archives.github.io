<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席教育我不断革命","authors":["王殿俊"],"dates":[{"year":1976,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席教育我不断革命"},{"type":"paragraph","text":"昔阳县白羊峪大队党支部副书记  王殿俊"},{"type":"paragraph","text":"听到伟大领袖毛主席逝世的消息，我万分悲痛，泪水一个劲地往外流。我五次见到毛主席的情景，一下子涌到眼前。"},{"type":"paragraph","text":"在旧社会，我是个穷人，祖孙几代给地主当长工，累死累活，一年也闹不下个吃穿。那时候，我恨透了吃人的旧社会，可又不知道穷人的出路在哪里。东方升起了红太阳，毛主席领导的八路军来到了我们白羊峪。一九三八年，我光荣地加入了中国共产党。从那以后，一直跟着毛主席闹革命，打游击，抓汉奸，斗地主，分田地。经过长期艰苦的斗争，我国人民终于把日本侵略者赶走了，把国民党蒋介石打倒了，夺得了伟大的胜利。"},{"type":"paragraph","text":"胜利了怎么办？我想来想去，想不出个道道来。正在这个时候，我接到通知，叫我到北京参加中华人民共和国成立盛典。象我这样祖祖辈辈赶牛放马的受苦人进北京，同毛主席一起参加伟大的开国典礼，这真是开天辟地第一回！在怀仁堂，毛主席接见了我们农民代表。当他老人家握着我的手，亲切地教导我们要不断革命的时候，我的心就象要跳出来，两眼一下冒出了泪花花。"},{"type":"paragraph","text":"从北京回来，我天天念叨着毛主席的关怀，决心照着他老人家指示的方向继续前进。一九五二年，我和白羊峪的党员、群众一起，成立了昔阳县第一个初级农业生产合作社，走上了社会主义光明大道。同年，贫下中农又派我参加赴朝慰问团，到朝鲜去慰问我们的子弟兵。代表团出发前，我在北京又一次见到了毛主席。全村贫下中农听到这个大喜讯，那个高兴劲就没法说了，大伙决心不辜负毛主席的希望，一个心眼地干革命。我们不断加强政治思想工作，巩固集体经济，一九五四年，粮食亩产超过了四百斤。"},{"type":"paragraph","text":"一九五五年，一九五七年，我又两次代表贫下中农到北京开会，幸福地见到了毛主席，再次听到他老人家的指示，干社会主义的方向更明了。一九五八年，实现了人民公社化。一九五九年，全队粮食亩产过了“黄河”，社会主义越干越红火。"},{"type":"paragraph","text":"正当毛主席领导全国人民深入进行社会主义革命的时候，有一些人总是想开倒车。一九六二年，他们鼓吹“包产到户”，单干。我们坚持走社会主义道路，顶住了单干风。在社会主义教育运动中，叛徒、内奸、工贼刘少奇一伙，炮制和推行“桃园经验”，迫害执行毛主席革命路线的干部。就在这关键时刻，毛主席亲自主持制定了“二十三条”，指出：这次运动的重点，是整党内那些走资本主义道路的当权派。我听到毛主席、党中央的指示，哭成了泪人。心想：毛主席又一次搭救了我们贫下中农，我一心奔社会主义志不移。一九六六年，毛主席发动了无产阶级文化大革命，把刘少奇资产阶级司令部挖出来了，真是大快人心！"},{"type":"paragraph","text":"一九七○年国庆节，在天安门观礼台上，我又一次幸福地见到了毛主席。那天，我实在没顾得看游行队伍，一个劲地看着毛主席。我想：王殿俊呀王殿俊，你从跟上毛主席闹革命，如今六十五岁了，毛主席还叫你到天安门来观礼，不好好干革命对得起他老人家吗？那一次回来，我的劲头鼓得更足了，同大家一起学大寨，批修正主义，斗资本主义，干社会主义。革命促进了生产的发展。过去，我们这里是“山穷一片光，村穷尽破房，地穷少产量，人穷常逃荒”的穷山沟。如今，是“进村一片新，抬头满山青，牛羊遍山坡，产量年年增，机械大发展，面貌日日新”！"},{"type":"paragraph","text":"万万没有想到，毛主席他老人家逝世了。毛主席啊！您永远活在我们贫下中农的心窝里！我们一定在您的伟大思想照耀下不断前进！我一定化悲痛为力量，按照您的教导，不断革命，一定同广大贫下中农一起，最紧密地团结在党中央周围，以阶级斗争为纲，以批邓为动力，抓革命、促生产，用实际行动悼念您！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac50c65b26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
