script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拜工农为师　做新型医生  北京医学院面向农村，培养学员能中能西、能防能治、能医病能采药、能做群众工作，受到贫下中农欢迎，回击了右倾翻案风","authors":[],"dates":[{"year":1976,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拜工农为师　做新型医生"},{"type":"paragraph","text":"北京医学院面向农村，培养学员能中能西、能防能治、能医病能采药、能做群众工作，受到贫下中农欢迎，回击了右倾翻案风"},{"type":"paragraph","text":"据新华社讯　无产阶级文化大革命以来，北京医学院把学校教育革命和农村医疗卫生革命密切结合起来，开门办学取得了丰硕成果。最近，北医广大师生联系开门办学实际，有力地反击了教育界的奇谈怪论。"},{"type":"paragraph","text":"这个学院的广大师生在开门办学过程中，积极参加农村三大革命运动，不断提高阶级斗争、路线斗争和继续革命的觉悟。医学系七二届学员在开门办学中，以阶级斗争为纲，积极支持和扶植革命新生事物。他们和广大贫下中农、赤脚医生一起，学习无产阶级专政理论，揭露阶级敌人的破坏活动，批判资本主义、批判修正主义，批判一切腐朽没落阶级的意识形态，巩固了合作医疗阵地。"},{"type":"paragraph","text":"在开门办学过程中，这个学院积极领导师生逐步改变农村缺医少药的面貌。他们培养学员在农村当前条件下开展医疗卫生工作的技能，逐步做到能中能西、能防能治、能医病能采药、能做群众工作，成为广大贫下中农养得起、用得上的新型医生。医学系七二届十四班一个小组，一九七五年在密云县太师庄大队开门办学时，发现这个大队在三夏期间痢疾流行，严重地影响了生产。师生们和赤脚医生一道，就地取材，自制预防药，发动群众普遍服用；同时大搞爱国卫生运动，预防传染，保障了广大社员的健康，为农业学大寨做出了贡献。"},{"type":"paragraph","text":"面向农村，开门办学，使学员们在实践中更好地掌握了医药学基本理论和治疗“急、重”症的医药技术。医学系应届毕业班的十名学员一九七五年在密云县不老屯公社，四个月内门诊四千八百多人次，抢救危急重病人五十例。药学系应届毕业的工农兵学员，仅四个月时间就完成了二十五项毕业专题设计，其中研制的六种新药填补了我国制药工业的空白，为发展祖国新药学做出了贡献。"},{"type":"paragraph","text":"开门办学的过程，也是教员思想上接受再教育，业务上进行再学习的过程。几年来，北京医学院广大教师通过开门办学，在三大革命实践中拜工农为师，不断改造世界观，取得了可喜的进步。他们为了方便群众，帮助建立家庭病床；为了搞好妇幼保健，走村串寨宣传疾病预防知识。贫下中农需要什么，他们就学什么、教什么、干什么，根据实践经验不断改进教学内容和教学方法，使医学教育更好适应农村卫生革命的需要。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8738269bf4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
