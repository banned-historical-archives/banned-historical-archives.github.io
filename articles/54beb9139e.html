ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对聂荣臻关于中南军区部队二期整编工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"对聂荣臻关于中南军区部队二期整编工作报告\"的批语"},{"type":"paragraph","text":"（1952年8月24日）陈明仁部应当留一个师，不应编掉，也不要编为炮兵团。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月廿四日"},{"type":"paragraph","text":"[1]中国人民解放军代总参谋长聂荣臻1952年8月23日给毛泽东等的报告说，中南军区部队的二期整编方案，拟将第二十一兵团尚余的原陈明仁起义部队的1个师编为该兵团所属3个炮兵团。聂荣臻在报告中提出，“惟目前火炮装备条件不够，不可能按照将其三个炮兵团装备起来，势必再将其编掉，在政治上这是值得考虑的。因此，我们认为现二十一兵团尚有原起义的一个师，在这次整编中仍应作为一个师编留较为适宜”。"},{"type":"paragraph","text":"[2]陈明仁，原国民党政府军将领，1949年8月与程潜率部在长沙起义。当时任中国人民解放军第二十一兵团司令员。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":210,"page_end":210},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54beb9139e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
