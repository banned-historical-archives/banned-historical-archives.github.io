:[],"dates":[{"year":1967,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东的青年使苏修发抖！"},{"type":"paragraph","text":"阿尔巴尼亚青年赞扬我留学生英勇斗争"},{"type":"paragraph","text":"阿尔巴尼亚劳动青年联盟特罗波亚区委，代表全区青年写信给六十九名中国同学说，在光辉的毛泽东思想的鼓舞下，你们在苏联修正主义者的残酷殴打面前英勇挺立，决不屈服。毫无疑问，你们的英雄气概，必将鼓舞苏联人民、青年和真正的共产党人组织起来并积蓄力量，以彻底粉碎苏修领导集团。我们完全相信，修正主义这一抔黄土被砸得稀巴烂，马克思列宁主义的旗帜重新升上克里姆林宫上空的日子已经不远了。"},{"type":"paragraph","text":"信中说，你们自豪地返回你们光荣的祖国，在你们的国家里，毛泽东的天才思想的红旗正高高飘扬，无产阶级文化大革命正给党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子以致命的打击。正因为如此，莫斯科的修正主义者害怕你们，害怕毛泽东的红卫兵。他们是胆小的叛徒，害怕革命，害怕出现在世界任何角落的革命火花。　　　　　　　（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec0fbd0a7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
