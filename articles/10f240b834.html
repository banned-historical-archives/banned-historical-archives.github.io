script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"紧紧抓住揭批“四人帮”这个纲  湖北省工业学大庆运动蓬勃发展","authors":[],"dates":[{"year":1977,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"紧紧抓住揭批“四人帮”这个纲"},{"type":"paragraph","text":"湖北省工业学大庆运动蓬勃发展"},{"type":"paragraph","text":"据新华社武汉一九七七年六月十七日电　湖北省工业学大庆、普及大庆式企业的群众运动正出现新的高潮。"},{"type":"paragraph","text":"中共湖北省委对贯彻、落实全国工业学大庆会议精神抓得很紧，采取了一系列措施迅速把会议的精神传达到基层。在省委领导下，全省各级党组织都联系实际，认真解决学大庆是真学还是假学的问题。武汉、黄石两市和荆州、孝感地区许多工矿企业的负责同志，切实转变作风，纷纷深入基层，和工人实行“三同”，扎扎实实地推动工业学大庆的群众运动。"},{"type":"paragraph","text":"湖北省各级党组织贯彻全国工业学大庆会议精神时，都紧紧抓住揭批“四人帮”这个纲。各级党委层层举办学习班，紧密联系实际，认真清查同“四人帮”阴谋活动有牵连的人和事；广泛开展“三大讲”。在全省召开的工业学大庆会议上，七千五百名代表和各级党委的负责同志，愤怒揭发批判了“四人帮”及其在湖北的黑干将破坏工业学大庆的罪行。为了抓住根本学大庆，扫清学大庆的障碍，中共武汉市委还从工业、交通、城市建设各局抽出机关干部七百多人，组成八十多个工作队，由市委领导同志带队，到八十多个重点企业，帮助基层党委深入开展揭批“四人帮”的斗争。武汉重型机床厂是我国重点企业之一，几年来由于“四人帮”的干扰破坏，成为全省有名的“老大难”单位。厂党委在市委工作队的帮助下，放手发动群众紧密联系本厂实际，揭开“四人帮”所谓依靠“先进分子”的真相，彻底撕开“四人帮”在湖北的那个黑干将的画皮，从政治上、思想上、组织上彻底摧毁“四人帮”的资产阶级帮派体系。全厂工人扬眉吐气，以革命加拚命的精神抓革命促生产，四、五月份都超额完成了生产计划。宜昌市委书记在大庆学习了大庆党委狠抓阶级斗争、路线斗争的根本经验，联系宜昌市柴油机厂在“四人帮”干扰破坏下，生产“三起三落”的实际，找到了市委在狠抓根本上的差距。他把自己的体会及时写信汇报给市委。市委立即研究，抽调三百多名干部，由市委几位领导同志带队，深入柴油机厂等二十七个工厂，放手发动群众，广泛开展“三大讲”活动，有力地推动了全市揭批“四人帮”的斗争。柴油机厂的“老大难”面貌也迅速改观，四月份生产了一千零七十台柴油机，创造了历史上的月产最好水平；五月份的柴油机产量又提高到一千五百零五台。全市工业生产五月份比四月份有较大增长。"},{"type":"paragraph","text":"湖北省各级党组织认真学习大庆人争分夺秒地大干社会主义的革命精神，把各项工作都搞得热气腾腾。全省工业总产值四月份比三月份增长百分之二十点二，创造了历史同期最好水平，五月份又比四月份增长百分之十八点九。在七十种主要工业产品中，五月份产量比四月份增长的有钢、生铁、煤炭、棉纱、棉布等五十三种，其中化肥、手扶拖拉机、拖拉机、脱粒机、收割机、喷雾器等十五种支农产品的产量，有大幅度增长。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10f240b834"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
