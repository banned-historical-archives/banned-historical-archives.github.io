<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"前中共河北省高邑县委宣传部长成泽民放高利贷剥削群众  有关部门应该认真检查处理","authors":[],"dates":[{"year":1952,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"前中共河北省高邑县委宣传部长成泽民放高利贷剥削群众"},{"type":"paragraph","text":"有关部门应该认真检查处理"},{"type":"paragraph","text":"编辑同志：我们检举前中共河北省高邑县委员会宣传部长成泽民利用职权，非法放高利贷的犯罪行为。"},{"type":"paragraph","text":"在一九五零年和一九五一年的两年中，成泽民用剥削阶级的手段，乘着群众青黄不接时节，先后把机关伙食余米三千九百二十七斤，贷给北关的群众"},{"type":"paragraph","text":"（每百斤米换一百四十斤麦子）。他在四个月中，获得暴利一千五百七十斤麦子。更严重的是，他把机关生产里有了臭味的米借给群众，规定每百斤米换一百二十斤麦子，不过三个月获得暴利一千六百八十九斤麦子。由于成泽民和县委书记王保珍带头放高利贷，县级其他机关也照样作起来了。如高邑县人民政府有六十石麦子经常在外出借。成泽民调到中共河北省委宣传部工作后，中共高邑县委员会还继续把修建费两万五千四百斤米借出取利。有的干部和通信员竟认为出贷是“合法”的。成泽民用五百七十斤米的本钱从一九五零年春天开始放高利贷，到秋后连本带利变成了一千二百五十八斤小米。一九五一年，成泽民的妻子纪德真又以四百斤小米换成四百八十斤麦子。北关的群众说：“县委机关出贷剥削，比地主还厉害。”"},{"type":"paragraph","text":"反贪污运动开始时，高邑县委机关支部就把成泽民的材料送交河北省委宣传部节约检查委员会，以帮助成泽民纠正错误。但是成泽民却采取了抵抗的态度。他在“检查”自己的来信中说：“贷粮食给群众是帮助群众生产，没有错误，我们不能因为反资产阶级思想便‘是非不分’，把‘正确的’也反掉。”成泽民明明是乘机剥削群众，自己却说成是帮助群众生产，这是何等可耻的胡说！"},{"type":"paragraph","text":"我们对成泽民的检讨是不满意的。我们认为他应该老老实实地重新作深刻检讨。"},{"type":"paragraph","text":"中共河北省高邑县委员会全体同志"},{"type":"paragraph","text":"编者按：成泽民及其他有关人员的错误，是极其严重的。河北省委和石家庄地委应认真加以处理。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e41b3c19a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
