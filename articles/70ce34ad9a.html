authors":[],"dates":[{"year":1983,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一月二十五日电　最高人民法院刑事审判庭今天作出裁定，对林彪、江青反革命集团案的主犯江青、张春桥原判处的死刑缓期二年执行的刑罚，依法减为无期徒刑，原判处剥夺政治权利终身不变。"},{"type":"paragraph","text":"裁定书全文如下:"},{"type":"paragraph","text":"中华人民共和国最高人民法院刑事裁定书"},{"type":"paragraph","text":"【1983】刑执字第一号"},{"type":"paragraph","text":"罪犯江青，女，现年六十九岁，山东省诸城县人。现在押。"},{"type":"paragraph","text":"罪犯张春桥，男，现年六十五岁，山东省巨野县人。现在押。"},{"type":"paragraph","text":"上列罪犯江青、张春桥，经最高人民法院特别法庭一九八一年一月二十五日特法字第一号判决，认定是林彪、江青反革命集团案的主犯，都犯有《中华人民共和国刑法》第九十八条组织、领导反革命集团罪，第九十二条阴谋颠覆政府罪，第一百零二条反革命宣传煽动罪，第一百三十八条诬告陷害罪，罪犯张春桥并犯有第九十三条策动武装叛乱罪，对国家和人民危害特别严重、情节特别恶劣，分别判处江青、张春桥死刑，缓期二年执行，剥夺政治权利终身。"},{"type":"paragraph","text":"罪犯江青、张春桥的死刑缓期执行期，到一九八三年一月二十五日，二年期满。"},{"type":"paragraph","text":"本院依照《中华人民共和国刑事诉讼法》规定，组成合议庭，对罪犯江青、张春桥在死刑缓期执行期间的表现，进行了审查。现已查明，罪犯江青、张春桥在死刑缓期执行期间，无抗拒改造恶劣情节。本庭依照《中华人民共和国刑法》第四十六条的规定，并经本院审判委员会第一七二次会议决定，裁定如下:"},{"type":"paragraph","text":"对原判处罪犯江青、张春桥死刑缓期二年执行减为无期徒刑；原判处剥夺政治权利终身不变。"},{"type":"paragraph","text":"一九八三年一月二十五日"},{"type":"paragraph","text":"中华人民共和国最高人民法院刑事审判庭"},{"type":"paragraph","text":"审判长　王怀安"},{"type":"paragraph","text":"审判员　彭树华"},{"type":"paragraph","text":"审判员　祝铭山"},{"type":"paragraph","text":"本件证明与原本无异。"},{"type":"paragraph","text":"一九八三年一月二十五日"},{"type":"paragraph","text":"书记员　张宝安"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"林彪","type":"人物"},{"name":"山东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70ce34ad9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
