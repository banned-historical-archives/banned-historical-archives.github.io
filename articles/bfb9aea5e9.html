<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从剥削里解放出来两万多码头工友 有了自己的工会上海自来水工会昨也成立","authors":[],"dates":[{"year":1949,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　过去在封建性的包工头剥削制度下，艰辛为搬运工作而努力的码头工友，解放后，经过七个多月的筹组，今天终于团结了全市各大小码头四十个单位二万八千多工友。由于群众的觉悟与斗争，取消一切剥削，在自己的政权下，建立自己的工会，为新上海的城乡物资交流，与进出口贸易的开展，每日不断献出神圣的劳力。"},{"type":"paragraph","text":"昨天工友代表与来宾三千多人，上午九时在天蟾舞台隆重举行工会成立大会，大团结大翻身的欢欣情绪，尽情欣愉洋溢场里。主席娄才实致开会词，首长总工会朱俊欣副主任，市青委中央青工部黄若毅部长，航运处胡斌，暨来宾海员工会栗圣法等先后讲话，综合大意，一致指出我们工人阶级要作新时代的主人，我们必须充实自己，提高我们的政治觉悟，努力加紧学习。随后团员三百余人宣誓入团，执委宣誓就职，宣读电中央人民政府毛主席暨全体委员，和中华全国总工会致敬电二通。会后有文娱节目助兴。"},{"type":"paragraph","text":"第一届执委五十三人:刘长胜、娄才实、乔关生、胡稚笙、胡治平、李鸿宾、朱庚森、孙开宇、骆瑜、曲诚、戴德、陈智元、陈镇亚、吴大如、江云龙、王云发、赵辉、石冰臣、李家荣、郑启林、张诚良、周妙祥、薛宝根、祁山、王视田、吴贤德、沈德昌、陈宏涛、伍惟儒、姜莘耕、王其发、董云梯、奚光辉、熊镇东、李凤仪、吴月亭、陈万顺、华加喜、洪志刚、徐中一、孙学宏、史新法、王俊扬、张杰、吴醒吾、吴逢春、陈必茂、刘学淳、薛子航、黄银生、徐德祥。"},{"type":"paragraph","text":"【本报讯】　市政工会上海自来水公司分会于昨日下午一时假大上海戏院举行成立大会，出席各界首长、来宾及职工共一千六百余人，大会由主席黄克勤致开会辞，他阐述工会成立的意义，希望大家“爱护自己的工会像爱护自己的眼睛”，次由工会秘书程祖坦报告由工筹会领导下所进行的历次运动中所收获的经验和缺点，后由总工会代表沈涵讲话，他说明上水工人具有光荣的革命传统，直接对上海六百万市民的日常生活起着非常重大的作用，希望大家加紧学习，为建设人民新上海努力，各兄弟工会代表相继讲话，并致贺意。全体执委计杨树浦部分十六人，江西路部分七人，新闸路部分三人，一致起立宣誓就职。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfb9aea5e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
