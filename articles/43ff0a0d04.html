rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"剥削工人的“欠薪支付券”","authors":["真"],"parts":[{"type":"paragraph","text":"平汉路变成贫寒路，"},{"type":"paragraph","text":"失业工人流落在街头！"},{"type":"paragraph","text":"琉璃河变成了流泪河，"},{"type":"paragraph","text":"眼泪比河水还要多！"},{"type":"paragraph","text":"长辛店变成伤心店，"},{"type":"paragraph","text":"伤心的事儿说不完！"},{"type":"paragraph","text":"工人哪个能吃饱！"},{"type":"paragraph","text":"工人哪个能穿暖！"},{"type":"paragraph","text":"这是解放前流行在平汉铁路北段的长辛店的一首歌谣。一九二三年“二七”惨案以后，白色恐怖笼罩着长辛店，反动统治阶级用种种办法对工人进行残酷的镇压和剥削，经常几个月不发工资。工人们整天从早到晚象牛马似地干活，到头来连一顿饱饭也吃不上。在党的领导下，工人们同反动的铁路局进行了激烈的斗争。铁路局为了欺骗工人、缓和工人的斗争情绪，一九二九年开始印发了一种“欠薪支付券”，券面值分一元、五元、十元和五十元。发工资时不给现金，只给这种欠薪券，将工资分为十年、四十次付给。在物价狂涨的旧社会，欠薪券实际上是一张废纸。图上的欠薪券是“二七”老工人孙臻保留下来的。看了这张欠薪券，也使我们想到当年反动派的狠毒和工人兄弟的痛苦。想想过去，看看今天，怎能不教人更加热爱新社会。 （真）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43ff0a0d04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
