问题","authors":[],"dates":[{"year":1956,"month":2,"day":11}],"is_range_date":false,"parts":[{"text":"哈尔滨市资本主义工商业改造中产生的问题","type":"title"},{"text":"【黑龙江分社11日讯】哈尔滨市在资本主义工商业社会主义改造工作中产生的一些问题：","type":"paragraph"},{"text":"一、领导思想和组织工作上落后于形式的发展，领导上对高潮到来之快，估计不足。在公布了第一批三十三个行业合营后，专业公司尚未成立。结果证实批准后，劳资双方不知如何行动，热情受到一定程度的挫折。同时规划工作未能跟上去，归口未分清，一些基本数字掌握得不准确，市、区分工也不够明确。因此在高潮到来时表现有些忙乱，在宣布批准三十三个行业公私合营时，其中有一个小行业还未申请，而有的已经申请了几次的行业却没有及时批准。","type":"paragraph"},{"text":"二、对一些政策性问题研究不够深刻，对干部交待不够明确。因此，有的干部不顾政策影响，擅自召开私营企业资方会议动员资方拿出帐外资财。如木材公司工作组干部在大会上号召说：“木材业经营历史较久，大家都有积蓄，应主动拿出来”，结果无一人发言。蔬菜公司酱园业工作组组长在会上号召资方要像北京资方拿出珠宝玉器那样拿出帐外资财，结果会议弄得不欢而散。西区铁工业集新工厂在清产时，工人将资方的碗架都弄翻了，工作组不加劝阻，反而支持。另外，有些工作组在资本家和小业主自愿拿出帐外资财时，没有划清生产资料和生活资料，一概收留。香坊区七十户小商店组织合作商店时，有的拿出自行车，手推车，有的牵出几头羊。","type":"paragraph"},{"text":"三、对一些小厂小店清产时，发生过严的现象。织布业新兴工厂清点后，资本家哭了一场（邹士芬）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1956年2月11日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5898d4e0cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
