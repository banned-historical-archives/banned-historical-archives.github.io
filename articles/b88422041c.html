art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作给我极大鼓舞和力量锡兰舞蹈家库玛尔盛赞《在延安文艺座谈会上的讲话》","authors":[],"parts":[{"type":"paragraph","text":"据新华社科伦坡十六日电 锡兰著名舞蹈家瓦山塔·库玛尔十四日对新华社记者说：“毛泽东主席不仅是中国人民的伟大领袖，而且是全世界被压迫人民的伟大领袖。”他还说：“每当我阅读毛主席著作的时候，总给我极大的鼓舞和力量。”"},{"type":"paragraph","text":"这位进步的锡兰艺术家，特别谈到了毛主席的著作《在延安文艺座谈会上的讲话》，他说：这篇著作指出了艺术家的正确方向。作为一个艺术家，我经常想，我应该用艺术作为武器进行战斗。"},{"type":"paragraph","text":"库玛尔还高度地赞扬了中国的新泥塑艺术“收租院”。他说：“当我看到中国艺术家的这一伟大的创作——它对被压迫人民作出了这么大的贡献——的图片时，我高兴得不得了。我过去从来没有看到过这么生动地反映被压迫人民群众受苦的创作。”他把这些成就归功于毛泽东主席的正确领导。"},{"type":"paragraph","text":"瓦山塔·库玛尔还强调说，中国人民当前正在进行的斗争，不只是为了他们自己的利益，并且是为了全世界被压迫人民反对帝国主义和殖民主义的真正利益。他说，尽管中国已经获得了解放，但是，在中国人民看来，只要世界上还有压迫，斗争就决不能停止。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b88422041c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
