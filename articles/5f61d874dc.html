" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于高等学校暑假毕业生统一分配的指示","authors":[],"dates":[{"year":1952,"month":6}],"is_range_date":false,"parts":[{"text":"中央关于高等学校暑假毕业生统一分配的指示","type":"title"},{"text":"华东局所发关于高等学校暑假毕业生统一分配工作的指示很好，各地党委应仿照进行，并提出以下几点请注意：","type":"paragraph"},{"text":"一、高等学校毕业生的分配工作是一件复杂而细致的工作，今年暑期毕业生人数增多，时间紧迫，因此各地区应有足够的重视，防止因“三反”“五反”运动或其他中心任务的繁忙而忽视对此项工作的准备和领导。","type":"paragraph"},{"text":"二、各地区在分配时，首先应保证完成中央抽调到其他地区的数字，特别是工科学生必须全部由中央统一支配。","type":"paragraph"},{"text":"三、根据政务院1951年10月1日公布“关于改革学制的决定”，通过行政单位宣布高等学校毕业生之工作由政府分配。各机关应严格制止自行洽聘毕业生等乱拉现象。","type":"paragraph"},{"text":"四、各大行政区应仿华东办法成立高等学校毕业生分配工作委员会，各高等学校由校长（或校委主席）、教务长负责组织协助毕业生分配委员会，各级党、团均派代表参加。","type":"paragraph"},{"text":"五、中央曾于1951年11月指示“凡是清理工作还没有进行的专科以上的学校，如有学生已到毕业期限，可以采用民主鉴定的方法，也同样地可以于毕业后的暑期内，采取集中学习的方式加以清理”。如若你区某些学校尚未进行清理，望依照以上指示办理。","type":"paragraph"},{"text":"六、同时中央指示“各大学于毕业时，应留一部分功课好的优秀的党团员毕业生参加学校工作”，以培养师资，加强教育领导骨干。各地党委在此次分配毕业生时应注意执行。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"华东局关于高等学校暑假毕业生统一分配工作的指示","type":"subtitle"},{"text":"华东区高等学校应届毕业生及部分系科三年级提前毕业生共11550名（非最后统计），较去年毕业生人数增加一倍。因此，今年毕业生分配任务比去年更为繁重，各地党委必须重视此项工作，并明确规定在进行三反及思想改造运动之高等学校中，对应届毕业生的思想教育，必须在各该校学委会统一领导下，以服从国家统一分配做为中心内容，务必做到分配时能完全服从国家需要，分配后能在工作岗位安心工作。如有在上半年来不及进行三反及思想改造之高等学校，党委必须负责及早做出教育计划，由行政出面组织专门的短期训练班，对毕业生进行服从统一分配的教育，为了完成这一重大任务，华东局已责成有关方面组织华东区高等学校毕业生就业委员会（中央注：最好称分配工作委员会），由人事、教育部门负责，包括团工委、公安部门（不公开出面）及党内组宣部门共同组成。委员会下设办公室、秘书组、组织组及教育组，并吸收华东高等学校学委会参加该项教育工作。各地亦可仿照进行，并及时将进行情况汇报为要。","type":"paragraph"},{"text":" 华东局\t5月","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f61d874dc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
