rt":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"靠毛泽东思想指挥战鹰歼敌","authors":[],"parts":[{"type":"paragraph","text":"伟大领袖毛主席发出伟大号召：抓革命促生产，促工作，促战备。空军某部领航员董福成和战友们一起用实际行动响应这个伟大号召，把战备工作做得更好。决心抓革命促生产，促工作，促战备，保卫文化大革命，保卫祖国的社会主义建设。"},{"type":"paragraph","text":"一次美制蒋匪侦察机RF—一○一高空入侵，敌机一露头就被我严阵以待的雷达兵抓住了。在我机起飞截击敌侦察机时，又发现敌战斗机F—一○四四架在侦察机退出航线的海面上掩护。当时指挥员命令我机左转。就在指挥所刚刚下令的时候，领航员董福成在引导雷达的萤光屏上发现隐蔽在海上的四架敌掩护机，正从我机的右前方偷袭过来。这时我机若再继续左转就等于自动把尾部交给敌人，为敌人发射导弹造成有利的攻击条件。为了保卫文化大革命，保卫抓革命、促生产的伟大成果，董福成恨不得一拳头砸烂这些狗强盗。情况万分紧急，他想向指挥所请示，可是，时间已来不及，怎么办？就在这千钧一发之际，他想起了最高指示：“我们的责任，是向人民负责。”毛主席的教导给了他巨大的力量和勇气，立即果断地下达了“×××号不能左转，右转！动作快！和敌人打对头！”的口令。紧接着又向空中通报了敌情，传达了最高指示：“下定决心，不怕牺牲，排除万难，去争取胜利。”他的口令迅速得到指挥员的批准，飞行员听到后，也立即以最大的动作量迅速向右急转反扣过去。飞行员胡寿根在急转过程中发现了敌机。在只要几秒钟就可能相撞的紧要关头，怕死的敌人吓破了胆，妄想从我机肚皮下面钻过去转弯逃命。但因距离近转弯半径大，逃跑已来不及，被胡寿根一举击落。"},{"type":"paragraph","text":"战斗结束后，同志们都鼓励董福成，称赞他为保卫国防、保卫文化大革命作出了贡献。他说：“这不是我的成绩大，是毛泽东思想的威力大。”"},{"type":"paragraph","text":"（空军某部领航处）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8836963fb2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
