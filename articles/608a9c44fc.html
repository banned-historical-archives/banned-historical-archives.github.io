art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠狠回击苏修野心狼","authors":["驻柳州铁路局某部毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"苏修叛徒集团，公然侵犯我国领土，这是苏修社会帝国主义的歇斯底里大发作，象一条快要淹死的疯狗一样进行垂死挣扎。"},{"type":"paragraph","text":"我们用毛泽东思想武装起来的革命战士，就是专为敌人掘坟墓的。苏修叛徒集团胆敢来侵犯，等待他们的只能是被彻底埋葬的命运！"},{"type":"paragraph","text":"我们把满腔怒火化动力，决心更高地举起毛泽东思想伟大红旗，用毛泽东思想统一认识，统一政策，统一计划，统一指挥，统一行动，和广大革命群众一起，更好地完成伟大的斗、批、改任务，把革委会建设成为对阶级敌人进行战斗的朝气蓬勃的指挥部。我们要以革命带动生产，把反帝、反修的物资迅速运到最前线，狠狠打击美帝、苏修和一切反动派。近日来，我们同广大革命职工一起，怀着对苏修叛徒集团的满腔怒火，在“夺取革命、生产双胜利，狠狠打击新沙皇”的战斗口号鼓舞下，狠抓革命，猛促生产。分局水电段，连续攻破了九项技术难关。维修厂日修车比以前增加了一倍多。柳州南站原计划四天完成的装车任务，一天就完成了。广大革命职工以“抓革命，促生产，促工作，促战备”的实际行动，狠狠回击苏修野心狼，支援世界人民的革命斗争。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"608a9c44fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
