art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"创造一个红彤彤的毛泽东思想新世界","authors":["总后勤部机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"我们伟大的领袖毛主席，在全国无产阶级文化大革命空前大好的形势下，视察了华北、中南和华东地区，胜利回到北京了！当这个特大特好的喜讯，传到我们总后勤部，我们群情振奋，欢欣鼓舞！我们一千遍欢呼，一万遍歌唱，衷心敬祝世界人民心中的红太阳毛主席万寿无疆！万寿无疆！万寿无疆！"},{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席，是当代最伟大的马克思列宁主义者。伟大的光焰无际的毛泽东思想，是当代马克思列宁主义的顶峰，是全中国和全世界革命人民斗争的指针。毛主席以最伟大的天才、最伟大的气魄，亲自发动和领导了震撼世界的无产阶级文化大革命，解决了当代无产阶级革命的一系列问题，解决了在无产阶级专政条件下进行革命、防止资本主义复辟的理论和实践问题，把马克思列宁主义发展到一个崭新的阶段，极大地丰富了马克思列宁主义的宝库，为中国人民和全世界革命人民指出了通向共产主义的康庄大道。全世界马克思列宁主义者和被压迫民族被压迫人民，在我国无产阶级文化大革命的巨大鼓舞下，高举马克思列宁主义、毛泽东思想的旗帜，高举“造反有理”的旗帜，向帝国主义、现代修正主义和各国反动派进行勇敢的战斗，敲响了帝国主义、现代修正主义和各国反动派的丧钟！"},{"type":"paragraph","text":"跟着毛泽东，世界一片红。在世界已经进入毛泽东思想伟大新时代的今天，各国劳动人民无限热爱伟大的革命导师毛主席。他们如饥似渴地学习毛主席的红色宝书。在监狱里，在丛林中，在反美斗争的前线，在敌人万恶统治的老巢，革命人民把读毛主席的书，当作自己革命斗争的第一需要。战无不胜的毛泽东思想，每时每刻都在鼓舞他们英勇斗争，勇往直前。亚洲、非洲、拉丁美洲，在全世界各地，正在燃起革命的燎原烈火。伟大的毛泽东思想被越来越多的革命人民所掌握。毛泽东思想的伟大红旗，必将在全世界高高飘扬！"},{"type":"paragraph","text":"毛主席啊毛主席，您的伟大思想，是当代最高的革命真理。您的伟大革命实践，是无产阶级最光辉的榜样。生长在您的伟大时代，是我们最大的幸福。在您老人家的身边是我们一生最大的光荣和骄傲。当我们最最热烈欢呼您老人家回到北京的时候，我们再一次向您保证：永远读您的书，听您的话，照您的指示办事，做您的好战士。我们永远忠于您的光辉思想，学习您的伟大革命实践，紧跟您的伟大战略部署，誓把无产阶级文化大革命进行到底。我们要关心国家大事，关心世界大事，坚决支持世界人民的革命斗争，创造一个红彤彤的毛泽东思想新世界。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d24b146c2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
