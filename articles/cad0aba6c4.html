script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真学习北京新华印刷厂清华大学经验  进一步落实毛主席的各项无产阶级政策","authors":[],"dates":[{"year":1969,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"进驻天津市上层建筑领域的工宣队在“九大”隆重开幕喜讯的鼓舞下"},{"type":"paragraph","text":"认真学习北京新华印刷厂清华大学经验"},{"type":"paragraph","text":"进一步落实毛主席的各项无产阶级政策"},{"type":"paragraph","text":"宣传队大办毛泽东思想学习班，用党的政策武装广大革命群众的头脑，通过总结经验、找出差距、制订措施，更加扎扎实实地落实毛主席的干部政策、知识分子政策和对敌斗争政策等各项无产阶级政策，加快了斗、批、改的步伐"},{"type":"paragraph","text":"新华社天津十一日电　在庆祝党的第九次全国代表大会隆重开幕的大喜日子里，进驻天津市文化、教育、出版、卫生、科学研究等上层建筑领域一千一百多个单位的工人、解放军毛泽东思想宣传队，遵照伟大领袖毛主席关于“无产阶级文化大革命的斗、批、改阶段，要认真注意政策”的教导，进一步学习北京新华印刷厂、清华大学等单位的先进经验，认真总结和交流本单位、本地区的经验，纷纷举办各种类型的毛泽东思想学习班，加速落实毛主席的知识分子政策、干部政策、对敌斗争政策等各项无产阶级政策，加快斗、批、改的步伐。"},{"type":"paragraph","text":"据南开大学、天津大学、河北大学、天津工学院、天津医学院五所高等院校统计，在“九大”隆重开幕以来，又举办了一千二百八十多个落实毛主席的各项无产阶级政策的毛泽东思想学习班。工人、解放军宣传队怀着无限忠于伟大领袖毛主席的深厚无产阶级感情，进一步用毛主席的各项无产阶级政策武装广大群众的头脑，并且通过总结经验，找出差距，制订措施，更加扎扎实实地落实毛主席的干部政策、知识分子政策和对敌斗争政策等各项无产阶级政策。驻河北大学的工人、解放军宣传队，遵照毛主席关于“全党同志必须认识，对于知识分子的正确的政策，是革命胜利的重要条件之一”的教导，认真学习了清华大学的经验，对伟大领袖毛主席心怀一个“忠”字，对毛泽东思想狠抓一个“用”字，不折不扣地落实毛主席的知识分子政策。他们在“九大”开幕的第二天，发动广大革命群众对全校教师队伍用毛泽东思想认真进行了具体分析，严格区分两类不同性质的矛盾，接着，抓紧做了细致的思想工作，结果团结了绝大多数知识分子，进一步调动了积极因素，使一小撮阶级敌人更加孤立。现在，河北大学的经验，正在全市推广。"},{"type":"paragraph","text":"四月八日，天津市革命委员会召开了向北京新华印刷厂、清华大学学习，落实毛主席的各项无产阶级政策的经验交流大会。天津医学院附属医院、天津市上海道小学等单位在会上介绍了他们落实政策的经验。天津医学院附属医院是天津市最大的综合医院，是知识分子成堆的地方。在“九大”的鼓舞下，这个医院举办了以落实政策为中心内容的毛泽东思想学习班。工人宣传队在学习班里，放手发动群众检查了前一阶段落实政策的情况。在这基础上，他们引导革命群众通过分析犯错误干部的全部历史和全部工作，帮助那些犯了严重错误但还不是属于敌我性质的矛盾的干部认真检查自己的错误。在革命群众严肃、热情的帮助下，一些犯了严重错误的干部得到了群众的谅解，回到了毛主席的无产阶级革命路线上来。同时，工人宣传队正确执行了毛主席的对知识分子团结、教育、改造的政策，在严肃批判一些知识分子的错误，帮助他们认真改造世界观的同时，团结他们一道工作，使他们在毛主席的无产阶级革命路线领导之下，在工农兵的教育下，能充分发挥自己的长处，为社会主义革命和社会主义建设事业作出贡献。"},{"type":"paragraph","text":"进驻天津市二百多所中学的工人、解放军毛泽东思想宣传队，遵照毛主席的“知识青年到农村去，接受贫下中农的再教育，很有必要”的最新指示，帮助知识青年举办毛泽东思想学习班，认真学习毛主席的光辉著作“老三篇”和毛主席关于培养无产阶级革命事业接班人的教导，深入批判叛徒、内奸、工贼刘少奇的“读书做官论”、“下乡镀金论”等反革命修正主义谬论。广大知识青年提高了阶级斗争和两条路线斗争的觉悟，纷纷向毛主席表忠心，决心走与工农兵相结合的道路，接受工农兵的再教育，把自己锻炼成为无产阶级革命事业的可靠接班人。最近，又有一批知识青年奔赴农村安家落户，接受贫下中农的再教育，建设社会主义的新农村。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cad0aba6c4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
