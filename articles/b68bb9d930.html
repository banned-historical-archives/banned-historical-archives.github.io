" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖南省有不少地区农民逃荒、自杀和卖儿女","authors":[],"dates":[{"year":1955,"month":4,"day":20}],"is_range_date":false,"parts":[{"text":"湖南省有不少地区农民逃荒、自杀和卖儿女","type":"title"},{"text":"【湖南分社二十日讯】湖南省有不少地区农民逃荒、自杀和卖儿女。据湘南的新田、嘉禾、桂阳三县半月前统计：逃荒的有八百三十六户(二一五四人)；出卖小孩的八户；送儿女的一百七十户；卖房屋傢具的三百八十多户；卖耕牛的一百五十户。据另一材料反映，仅桂阳县在三月下旬便发生卖儿女、送儿女的七十多起，嘉禾县发现卖、送小孩的七十八起。洞庭湖滨去年大水地区的农民亦陆续有出外逃荒的。据汉寿县八、九两区统计共有八百多人逃往外县。湘阴县九个区统计，出外逃荒讨米的有五百二十人。据中共湖南省委生产办公室材料：农民由于生活困难而自杀的，到四月十三日止，全省共有二十一起。","type":"paragraph"},{"text":"目前，不少县已注意到这一情况并采取措施。如浏阳县通过家属写信动员出外逃荒的灾民回家生产。宁远、嘉禾、新田等县均分别派干部出去动员逃荒的农民回乡。(罗重璋据各地委内部刊物编写)","type":"paragraph"},{"text":"来源：1955年4月26日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖南省有不少地区农民逃荒、自杀和卖儿女","authors":[],"dates":[{"year":1955,"month":4,"day":20}],"is_range_date":false,"parts":[{"text":"湖南省有不少地区农民逃荒、自杀和卖儿女","type":"title"},{"text":"【湖南分社二十日讯】湖南省有不少地区农民逃荒、自杀和卖儿女。据湘南的新田、嘉禾、桂阳三县半月前统计：逃荒的有八百三十六户(二一五四人)；出卖小孩的八户；送儿女的一百七十户；卖房屋傢具的三百八十多户；卖耕牛的一百五十户。据另一材料反映，仅桂阳县在三月下旬便发生卖儿女、送儿女的七十多起，嘉禾县发现卖、送小孩的七十八起。洞庭湖滨去年大水地区的农民亦陆续有出外逃荒的。据汉寿县八、九两区统计共有八百多人逃往外县。湘阴县九个区统计，出外逃荒讨米的有五百二十人。据中共湖南省委生产办公室材料：农民由于生活困难而自杀的，到四月十三日止，全省共有二十一起。","type":"paragraph"},{"text":"目前，不少县已注意到这一情况并采取措施。如浏阳县通过家属写信动员出外逃荒的灾民回家生产。宁远、嘉禾、新田等县均分别派干部出去动员逃荒的农民回乡。(罗重璋据各地委内部刊物编写)","type":"paragraph"}],"comments":[],"origin":"1955年4月26日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b68bb9d930"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}<
