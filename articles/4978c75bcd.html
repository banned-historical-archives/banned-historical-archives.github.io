"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"姚文元"},{"type":"paragraph","text":"有些话，常常要一遍、两遍、三遍地重复说。历史是螺旋形地前进的，这就使我们在第三阶段常常会碰到和第一阶段类似的问题，虽然问题在程度上和形式上也许起了很大的变化。"},{"type":"paragraph","text":"以上这番同正文无关的话，是为了先向读者告白一句:这篇短文中要说的话，我在以前早就说过了，都是老话，没有什么新东西。"},{"type":"paragraph","text":"何其芳同志在第十八期文艺报上有一篇文章，叫“文学艺术的春天”。在结尾的时候，他转到“红与黑”和“约翰·克利斯朵夫”两部小说上面，虽然没有发挥，但那主要思想还是可以理解的:"},{"type":"paragraph","text":"“‘约翰·克利斯朵夫’所反映的生活比较广阔一些，它的主人公也更能引起人同情一些。有些评论指出了它里面的思想的消极方面，这自然是十分必要的。但如果只着重在这一方面，忽视了它里面所写的少年人的生活、友谊、爱情，对不合理的社会的反抗和长期的奋斗，不指出这些生活本来读者是有兴趣的，而且作者又把这些生活表现得有意思，感动人，我们就无法解释这部作品为什么能够吸引那样众多的读者了。”"},{"type":"paragraph","text":"我不想在这里对这部有进步意义的古典巨著的成就和缺点作全面的评价，这不在今天要谈的范围内。这里要讨论的是一个兴趣问题。也即用什么观点来评价作品的问题。为什么这部作品“能够吸引那样众多的读者”?何其芳同志的回答原因之一是因为里面写了“少年人的生活、友谊、爱情”。我觉得这个答复未免太抽象了一点。具体说，这里“众多的读者”绝大部分是在知识分子当中，工农群众是很少的。我并不是说工农群众对这部小说一定不会发生兴趣，或者他们不可以读这本书，只是想指出一个事实:在中国，若干年以来到反右派斗争之前，对这部小说狂热地当作生活的教科书来崇拜的，主要是资产阶级、小资产阶级知识分子。为什么他们对这部书会产生如此大的兴趣呢?除了何其芳同志提到过的作品中对资本主义社会批判的内容所包含的反抗的力量(即“对不合理的社会的反抗”)和艺术上的感染力而外，还有一个重要的原因，就是书里所写的，“生活、友谊、爱情”，是一个人奋斗的资产阶级知识分子的“生活、友谊、爱情”，情感上容易起共鸣，而对于具有资产阶级世界观的知识分子，他们对克利斯朵夫的生活、友谊、爱情，对于他的抱负和个人英雄主义，是比劳动人民的生活和斗争，比集体主义的思想，有更多的“兴趣”和“吸引”力的。没有抽象的“少年人的生活、友谊、爱情”，出身于不同阶级的“少年人”，他们的生活内容和思想感情就不同。不把这个因素估计进去，是不符合讨论中不少读者自己反映的思想情况的。至少，这种说法不够全面。站在无产阶级立场上来阅读这部作品，也会受到感动，可是那“兴趣”，恐怕和站在资产阶级立场上的人并不相同或者并不完全相同。"},{"type":"paragraph","text":"“表现得有意思”，这种说法也过于抽象。到底什么叫“有意思”呢?这未免太蒙胧一点了吧；在阶级社会里，不同的生活内容，不同的思想观点，会产生不同的“意思”。抽象地说“表现得有意思”，不能说明任何问题，也不能由此判断作品。"},{"type":"paragraph","text":"这种“争鸣”缺少学术意义，使人乏味。不过，如果有人因为这乏味的文字而想起另一些并不乏味的问题，那恐怕会写出很有吸引力的好文章来的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4978c75bcd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
