报告好消息","authors":[],"dates":[{"year":1949,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社大连九日电】　大连市中苏合营的远东电业公司所属玻璃工厂全体职工，在七月二日举行的庆祝中共诞生二十八周年大会上，通过了给毛主席的一份报告书，报告该厂已在六个月中全部完成并超过了今年全年的生产任务。该报告书全文如下:亲爱的毛主席:我们以万分兴奋的心情，向您报告:我们在生产战线上打了一次大胜仗。我们在中国共产党诞生二十八周年纪念日——七月一日上午八时，胜利完成了一九四九年全年生产计划。这个计划比一九四八年中生产提高百分之三十六，比日寇时代提高百分之六十二(即超过了该厂二十五年来的最高生产水平)，并减低成本百分之十三点六，提高劳动生产率百分之七十点九。这不仅发展了我们的工厂，同时也因为厂方实行“多劳多酬”的“累进工薪制”与“计件工资制”，使全体职工的生活大为改善。"},{"type":"paragraph","text":"这一成绩之获得，是由于中国共产党及您的英明领导，旅大区党委的具体领导，我们学习并实施了苏联管理工业生产的科学的优良的制度与办法，全体职工发挥了集体的革命英雄主义，尤其是技术干部与老技术工人开动脑筋，改进了生产组织与技术，使之更合理化。这就是我们提前完成全年计划的基本原因。今天，正值我们党的生日，正值中国即将获得全部解放，正值即将召开新政协成立中华人民民主共和国之际，我们向您表示:"},{"type":"paragraph","text":"我们坚决拥护以中国共产党为领导的新政协的召开，并迅速成立中华人民民主共和国政府，我们决在工业生产上来支持我们的人民政府。为此，我们在下半年除了按计划缩短百分之八的修溶大窑(化玻璃用)的时间外，要完成相等于本年计划百分之三十五的玻璃板的超额生产，并继续减低成本百分之五。亲爱的毛主席:为了表示我们的决心，我们全厂一千零七十七名职工，给您写一个亲笔签名的报告书，保证完成任务。职工，给您写一个亲笔签名的报告书，保"},{"type":"paragraph","text":"“我们高呼:中国共产党万岁!”"},{"type":"paragraph","text":"“亲爱的毛主席万岁!”"},{"type":"paragraph","text":"“劳动创造世，工人阶级万岁!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"234bc10bd3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
