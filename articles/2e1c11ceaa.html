理李复奎反党、贪污集团案件中所取得的几点经验和教训","authors":[],"dates":[{"year":1959,"month":4,"day":24}],"is_range_date":false,"parts":[{"text":"中共孝感地委监委批转大悟县委监委从检查处理李复奎反党、贪污集团案件中所取得的几点经验和教训","type":"title"},{"text":"各县委监委会：","type":"appellation"},{"text":"“到落后地区或单位去拔白旗、插红旗，这是各级党委监察部门参加中心工作，为中心服务，充分发挥党的监察工作的战斗作用的一个重要方法”，也是工作任务之一。大悟县委监委注意了这方面的问题，并写来了专题报告，我们认为很好，现发给你们参考。","type":"appellation"},{"text":"从报告中吸取的教训来看，要求各级监委必须进一步加强对落后地区和单位的领导，经常深入下去，发现问题，深追深查，分析原因，找出白旗。（编者按：根据最近中央监委指示精神，今后在检查处理党员干部犯错误的案件中，一般不要提“拔白旗”，要实事求是地根据党员干部所犯错误是什么性质，就按什么性质处理。）树立脚踏实地的工作作风，和全面观察问题的思想方法，反对不艰苦深入的官僚主义作风和主观片面的思想方法。同时要求各级监委必须十分重视党员和人民群众的来信来访工作，加强分析研究，发现问题，跟踪追迹。","type":"appellation"},{"text":"1959年4月24日","type":"appellation"}],"comments":[],"origin":"《监察工作通报》第13期，中共武汉市监察委员会编印，1959年9月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e1c11ceaa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
