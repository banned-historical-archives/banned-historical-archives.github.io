[],"dates":[{"year":1965,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"林彪对中央军委作战会议的指示","type":"title"},{"text":"[林彪和中央常委刘少奇、周恩来、朱德、邓小平等接见军委作战会议的全体人员，在听取罗瑞卿和几位小组长汇报时分别作了重要指示。]","type":"paragraph"},{"text":"一、要立足于准备早打、大打，从各方面来打，我们准备好了，敌人就不敢轻易来打，就有可能争取推迟战争，甚至使战争打不起来。","type":"paragraph"},{"text":"二、要从战略上考虑问题，处理好经济建设和国防建设的关系。对增加兵员，要从全局来考虑，军队搞得太多，就要影响国家经济建设。","type":"paragraph"},{"text":"三、备战工作要有重点，现在必须搞好工事，搞好部队的武器装备。可以先从部队抽一点力量去搞工事。","type":"paragraph"},{"text":"四、要从军事思想、物质基础和军队的政治工作三方面做好打仗的准备。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37f59bcfd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
