ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于同意目前收兵休整致彭德怀电","alias":"","parts":[{"type":"paragraph","text":"关于同意目前收兵休整致彭德怀电"},{"type":"paragraph","text":"（1951年5月22日）德怀同志，并告高岗同志："},{"type":"paragraph","text":"廿一日廿三时电悉。根据目前情况收兵休整，准备再战，这个处置是正确的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十二日[1]彭德怀，当时任中国人民志愿军司令员兼政治委员。[2]高岗，当时任中国人民解放军东北军区司令员兼政治委员。"},{"type":"paragraph","text":"[3]指彭德怀1951年5月21日23时给毛泽东的电报。电报说：第五次战役为时一个月，进行东西两线作战，部队有些疲劳，需恢复和总结战斗经验。战斗发起后，第一线运输极端困难，且雨季已接近开始，数江湖沼尽在我军之后，一旦山洪暴发，交通全断，顾虑甚大。此役未消灭美师团建制，敌夸大我之伤亡，还有北犯可能。根据上述，我军继续前进，不易消灭敌人，徒增困难，不如后撤，使主力休整，寻机歼敌。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":323,"page_end":323},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51e755b225"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
