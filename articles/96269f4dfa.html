路","authors":[],"dates":[{"year":1967,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本朋友说中国文化大革命对世界革命发生巨大影响"},{"type":"paragraph","text":"文化大革命是向共产主义过渡的必经之路"},{"type":"paragraph","text":"新华社东京电　最近从中国访问回国的日本著名进步作家江马修和他的夫人丰田正子，怀着无限热爱毛主席的心情向中国记者发表谈话，高度赞扬伟大的毛主席和中国无产阶级文化大革命。"},{"type":"paragraph","text":"江马说，毛主席是当代最伟大的领袖，毛泽东思想是当代最高水平的马克思列宁主义。"},{"type":"paragraph","text":"江马说，毛主席天才地创造性地发展了无产阶级革命理论，毛主席的著作表现了无产阶级革命的坚定不移的原则性，充满着无限的生命力。毛主席的著作使马克思列宁主义放射出新的灿烂的光芒。"},{"type":"paragraph","text":"江马修高度评价中国无产阶级文化大革命说，毛主席总结了中国革命的经验和国际共产主义运动的经验，发动了一场目的在于防止产生修正主义的无产阶级文化大革命。这场文化大革命是无产阶级取得政权的社会主义国家向共产主义过渡的必经之路，这场大革命将对世界革命发生巨大的影响。江马和丰田都强调指出，只有毛主席才能领导这样一场史无前例的文化大革命。江马和丰田还热情赞扬在毛泽东思想哺育下，中国人民的精神面貌发生了崭新的变化。"},{"type":"paragraph","text":"江马说，他们在中国到处看到中国人民活学活用毛泽东思想的革命热潮，深深感到毛泽东思想已掌握了广大人民群众。"},{"type":"paragraph","text":"丰田正子说，她在中国看到中国人民根据毛泽东思想努力“破私立公”，使自己成为共产主义新人。她说，这是世界上从未有过的事，这能够保证中国永不变色。"},{"type":"paragraph","text":"江马和丰田热情称颂他们在北京、上海等地看到的革命青年工人、学生和红卫兵小将。江马修说，从他们一心为革命的旺盛革命豪情来看，他们不愧为毛泽东思想哺育下的新的一代，是无产阶级革命事业的最可靠的接班人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96269f4dfa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
