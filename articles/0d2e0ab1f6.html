<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热烈欢呼毛主席‘独立自主、自力更生’方针的伟大胜利“一二五”机组胜利发电向国庆献礼‘三五’工程英雄集体隆重集会庆祝，决心投入社会主义革命竞赛争取更大胜利","authors":[],"dates":[{"year":1969,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　赶超世界先进水平的由我国自己设计、自己制造、自己施工、自己安装的十二万五千瓩双水内冷汽轮发电机组胜利建成并正式发电了。这是上海工人阶级和革命人民向我们伟大的社会主义祖国成立二十周年的隆重献礼。昨天，“一二五”工程英雄集体的同志们和来自全市各有关单位的代表五千余人，在工地上举行盛大集会，热烈庆祝这个宏伟工程的伟大胜利，热烈欢呼毛主席的‘独立自主、自力更生’方针的伟大胜利。"},{"type":"paragraph","text":"参加大会的全体代表怀着对伟大领袖毛主席的无比深厚的无产阶级感情，一致通过了给毛主席的致敬电。"},{"type":"paragraph","text":"上海市革命委员会负责人张春桥同志和市革命委员会领导成员参加了大会，向‘三五’工程英雄集体的全体同志，以及在工程中创造巨大成绩的工人、革命技术人员和革命干部等致以热烈的祝贺。"},{"type":"paragraph","text":"“一二五”工程从八月四日开始，整套机组先后进行了九次试运转，集中地考验了这台赶超世界先进水平的‘争气机组’在设计、制造、施工、安装等方面的质量和性能。九月二十一日凌晨二时零四分，十二万五千瓩双水内冷汽轮发电机组正式并入电网胜利发电以来，运转正常，证明整套机组质量性能良好。我国第一台最大容量的发电机组，从试制到发电，只用了九个多月的时间，这是世界上从来没有过的速度。大长了中国人民的志气，大灭了帝、修、反的威风。"},{"type":"paragraph","text":"这个工程的高速度、高质量胜利建成，是彻底批判刘少奇的爬行主义、洋奴哲学，坚决执行伟大领袖毛主席的‘独立自主、自力更生’的伟大方针，‘走中国自己工业发展的道路’所取得的伟大成果。在整个工程的建设过程中，工人和革命技术人员、革命干部发扬‘一不怕苦，二不怕死’的革命精神，不论是在烈日盛夏，还是严寒隆冬，不论是在困难面前，还是在危险关头，都表现了工人阶级大无畏的革命英雄气概。近千个参加这场战斗的协作单位，用毛泽东思想统帅一切，发扬共产主义大协作精神，千家万户、千军万马结成了一个战斗整体。他们甘当‘配角’，不计名利；把方便让给别人，把困难留给自己。工人们豪迈地说:‘过去叛徒、内奸、工贼刘少奇把我们设计制造、施工安装和使用单位分成甲、乙、丙，现在毛泽东思想把我们拧成一股绳。工人阶级心连心，革命不分甲、乙、丙。’"},{"type":"paragraph","text":"在庆祝大会上，群情振奋。‘三五’工程英雄集体的代表们纷纷表示，一定要牢记毛主席的教导:‘夺取全国胜利，这只是万里长征走完了第一步。’一定要遵照毛主席关于两个‘务必’的教导，防松、戒骄，总结经验，找出差距，虚心向北京和兄弟地区的工人阶级学习，向首钢工人学习，投入伟大的社会主义革命竞赛。他们还表示，一定要高举‘九大’团结、胜利的旗帜，提高警惕，保卫祖国；一定要念念不忘阶级斗争，百倍提高革命警惕。工人们说:机组胜利发电，是继续革命的新的起点。我们一定要更高举起毛泽东思想伟大红旗，永远紧跟毛主席继续革命，夺取新的更大胜利。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1969\\09\\699r010401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我国自行设计、自己制造的十二万五千瓩双水内冷汽轮发电机组发电了!广大工人热烈欢呼毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"本报记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d2e0ab1f6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
