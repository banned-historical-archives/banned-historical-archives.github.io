:[],"dates":[{"year":1970,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"墙上挂起红喇叭"},{"type":"paragraph","text":"毛主席的声音传到家"},{"type":"paragraph","text":"江苏大部分生产队通广播"},{"type":"paragraph","text":"江苏全省广播战线上的革命群众以及广大贫下中农和革命干部，遵照伟大领袖毛主席关于“努力办好广播”的指示，大搞群众运动，使广播事业获得了飞跃的发展。从今年一月到九月，全省农村新装的广播喇叭相当于无产阶级文化大革命前的九倍。现在，全省百分之九十以上的生产队通了广播，百分之六十的社员家里装上喇叭。苏州、镇江、扬州三个专区基本上达到了户户通广播。"},{"type":"paragraph","text":"由于农村广播网的迅速发展，对于准确及时地传达毛主席的最新指示和党中央的战斗号令，推动活学活用毛泽东思想的群众运动，促进斗、批、改各项工作的深入发展，都起了很大的作用。广大贫下中农热情地称赞说：“墙上挂起红喇叭，毛主席的声音传到家，革命生产指方向，大风大浪不迷航。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4796f9cd1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
