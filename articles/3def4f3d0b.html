" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"给傅作义的信","alias":"","parts":[{"type":"paragraph","text":"给傅作义的信"},{"type":"paragraph","text":"（1951年1月26日）宜生兄："},{"type":"paragraph","text":"廿三兵团最近情况报告一份，送上请察阅，阅后请予掷还。廿三兵团进步如此之大且快，可为庆贺！顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿六日"},{"type":"paragraph","text":"[1]傅作义，字宜生，当时任中央人民政府委员、水利部部长、人民革命军事委员会委员。"},{"type":"paragraph","text":"[2]指中国人民解放军第二十三兵团政治部1951年1月12日关于部队纪律和军民关系情况给华北军区并绥远军区、省委的报告。第二十三兵团是由董其武率领的原傅作义所属国民党起义部队改编的。报告谈到该部于1950年12月22日从绥远出发，1951年1月4日全部到达河北景县龙华镇一带，在遵守群众纪律和军民关系上有显著进步，当地政府和群众比较满意，部队也受到了教育。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":75,"page_end":75},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3def4f3d0b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
