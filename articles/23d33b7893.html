rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让极右势力成为过街老鼠德政府动员全体公民齐声“喊打”","authors":["吕鸿"],"parts":[{"type":"paragraph","text":"德政府动员全体公民齐声“喊打”"},{"type":"paragraph","text":"据新华社柏林8月1日电（记者吕鸿）针对近来德国极右分子频频制造暴力事件，德国政府准备加大宣传力度，联合社会各界，并动员全体公民，严厉打击极右势力。"},{"type":"paragraph","text":"这是德国内政部国务秘书科尔纳利·松塔格-沃尔加斯特女士1日在此间作上述表示的。她认为，全社会都必须严密关注极右势力的活动，不能对极右势力保持缄默。她呼吁德国公民要敢于揭发极右势力的活动。德国政府还将和劳资组织结盟，以打击极右势力的嚣张气焰。"},{"type":"paragraph","text":"当天，德国南部巴伐利亚州内政部长京特·贝尔施泰因呼吁政府取缔极右政党德国国家民主党。该党现有党员约6000名，是极右分子的最大后台。"},{"type":"paragraph","text":"德国东部图林根州内政部长克里斯蒂安·科克尔特呼吁建立一个“反极右汇报系统”，以方便公民与警方合作。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23d33b7893"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
