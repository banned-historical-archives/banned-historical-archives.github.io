torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"给于学忠“的信","alias":"","parts":[{"type":"paragraph","text":"给于学忠的信"},{"type":"paragraph","text":"（1936年9月22日）于主席勋鉴："},{"type":"paragraph","text":"两军相处密迩，未能通候，甚以为歉。夙稔先生热诚爱国，对日抗战早具同心，而西北停战议和，首先贵我两军停止自相残杀，实为刻不容缓。兹派彭雨峰君普谒崇阶，申述方联合救国之旨，敬祈不妄赐教，指示一切。抗日合作成功之日，两军之利，抑亦民族国家之福也。专此。"},{"type":"paragraph","text":"即颂勋祺。不一。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月二十二日"},{"type":"paragraph","text":"[1]于学忠（1890一1964)，山东蓬莱人，当时任国民党甘肃省政府主席、国民党军第五十一军军长。新中国成立后，曾任国防委员会委员。"},{"type":"paragraph","text":"[2]彭雨峰，即彭雪枫，当时是中国共产党派往山西等地做统一战线工作的代表。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":9,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":161,"page_end":161},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0abedba856"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
