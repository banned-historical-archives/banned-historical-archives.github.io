示的通知","authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":5}],"is_range_date":false,"parts":[{"text":"中央关于实施军队参加生产建设工作指示的通知","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局、分局，各前委，各军区：","type":"appellation"},{"text":"人民革命军事委员会本日发表关于一九五O年军队参加生产建设工作的指示。你们看到后应即加以研究，就自己管辖范围内使一切可能参加生产建设工作的部队和机关积极地适当地实施起来，注意避免过去军队参加生产建设时所犯过的错误，区分前线和后方，区分具备了参加生产的条件的部队和机关与目前尚未具备此项条件的部队和机关，考虑地方条件和资金条件，适当地解决这一问题。这是一个重要问题。这个问题解决得好，将使部队和机关的生活获得改善，使国家节省一部分开支，并将在全国人民中产生良好的影响。","type":"paragraph"},{"text":" 中  央十二月五日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbc9ae920a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
