"year":1967,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"俺永远在毛主席身边"},{"type":"paragraph","text":"战士　刘庭宝　刘放双手紧捧语录板，毛主席教导写上边。字字句句金光闪哎，真理的光辉照心坎。清晨起来看一遍，五洲风云胸中翻。世界革命责任重哎，万斤担子挑在肩。上阵地带上语录板，阵阵杀声震破天。仇恨凝在刺刀上哎，为革命俺把硬功练。行军带上语录板，快步如飞一溜烟。披荆斩棘歌声高哎，千难万险无阻拦！下田带上语录板，双手来把“大寨”建。千里荒原飘稻香哎，高歌一曲南泥湾。做工带上语录板，浑身干劲大无边。铁锤打得叮当响哎，把旧世界砸个稀巴烂！宣传时带上语录板，红光万里映河山。是人民来把俺哺养哎，永做人民的勤务员。处处不离语录板，毛主席时时教导俺。谁说北京连队隔千里哎，俺永远在毛主席身边！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fa14fdbb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
