<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"前锋人民公社建社工作取得初步经验","authors":["新华通讯社","王良"],"dates":[{"year":1958,"month":9,"day":12}],"is_range_date":false,"parts":[{"text":"最近在铁路运输中发生列车冲突、脱轨、翻车等重大事故二十八起","type":"title"},{"text":"新华通讯社王良","type":"authors"},{"text":"新华社北京27日讯    最近以来，铁路运输的事故不断发生。仅10月1日到20日的统计，全国铁路就发生列车和调车冲突、脱轨、翻车等重大事故二十八起，总共死五人，重伤五人，轻伤十三人，机车撞坏了六台，客车撞坏了三辆，货车撞坏了八十辆（其中完全报废的有十九辆）。","type":"paragraph"},{"text":"济南铁路局在10月14日就出了两次列车相撞的事故。一次是在前亭车站，进站的列车本来应开到第二股道停车，但是由于搬道员和值班员没有按制度检查道岔的开道方向对不对，加上道岔又没有联锁装置，结果列车冲到第三股道，同那里正在进行装卸作业的货车相撞。撞死装车工一人，重伤一人，轻伤九人。机车破损一个，客货车破损五个。另一次是在津浦路姜家坡到郭家庄之间的线路上。正在奔驰的一列旅客列车同交叉公路上的一部汽车相撞。结果汽车车碎人亡，火车头也撞坏了。","type":"paragraph"},{"text":"北京铁路局在15日到21日全国铁路卫星周中，一连出了三次重大事故。10月15日，在长辛店车站的大灰场专用线上，有一列火车通过赵新店向长辛店开来，由于搬道员没有按时把道岔开通正线，结果火车出了轨并把调车员压死。10月16日，京广线邢台到七里河之间的铁路正在修路，但还没修好。这时一列货车来了。按制度，养路工应打信号叫车慢开，但没有这样做，结果出轨了六个车，翻了四个半。","type":"paragraph"},{"text":"去年全年，全国铁路的事故损失是二百六十万元。今年上半年损失就达三百万元。8、9月份以来，由于运输紧张，事故更多。8月26日和10月3日，兰新铁路先后有二列油车翻车 ，一次烧了二十八辆，一次烧了十五辆，损失巨大。","type":"paragraph"},{"text":"据分析，事故所以这样多，有三个原因，一是领导上光抓任务，忽视安全，在布置任务时，没有同时布置安全，有些干部甚至把注意安全也当做保守来反对；其次是规章制度光破不立，或破多立少，有些地方在破旧的规章制度时有否定一切和不加区别的偏向；三是在推行新的作业方法和先进经验时，组织措施没跟上去。如广州局老关车站安了新式道岔，但技术没弄好，列车通过时，翻了八个车。郑州局新乡车站推广“列车下蛋”经验，但组织措施没跟上，结果也发生撞车事故。","type":"paragraph"},{"text":"来源：新华社《内部参考》1958年10月27日","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d48caf6da7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
