<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服在粮食问题上的本位主义和右倾思想  山西检查隐瞒产量的行为  霍县处理农业社干部隐藏粮食事件并在全县展开讨论","authors":["商恺"],"dates":[{"year":1957,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"克服在粮食问题上的本位主义和右倾思想"},{"type":"paragraph","text":"山西检查隐瞒产量的行为"},{"type":"paragraph","text":"霍县处理农业社干部隐藏粮食事件并在全县展开讨论"},{"type":"paragraph","text":"本报讯　记者商恺报道：山西省广大农村，将展开粮食问题的大辩论。"},{"type":"paragraph","text":"山西省不少农业生产合作社，由于资本主义思想的影响，发生了隐瞒产量、抵抗统购统销的行为。有的社为了少报产量，过多的计算粮食的含水量；有的社自己分配粮食把小斗改大斗，小秤改大秤，一百五十斤算作一百斤；有些社在割麦时，故意多舍多丢，社员拾去按股均分，或者故意不把麦秸打净，等到向国家报产量后，再打再分；有的社以多报人口或造了两本账（一本是实产账，一本是向政府报告的假账），来达到多留粮少卖粮的目的。阳城县最近在乡社干部会议上，揭发出三百三十个社（占87％）有程度不同的隐瞒产量现象。仅据其中四十一个乡的不完全统计，瞒产七十二万多斤。平顺县五井乡爱国农业社最近在民主检查中，检查出从去年以来，全社共隐瞒了五万八千多斤粮食（占实产量10％），结果没有完成国家统购任务。平遥县兰村党支部作了决定，由管委会全体通过，向政府少报小麦产量一万八千斤。问题的严重性也就在这里。"},{"type":"paragraph","text":"产生这种现象的原因：从社员来说，是为了自己多吃点粮食，而不顾国家的利益；从社干部来说，有些是怕人民内部矛盾解决不好，闹起事来，自己首当其冲，因此对农民的落后思想迁就让步；个别社干部是为了自己从中贪污自肥。某些县级领导干部，对合作社这种违反国家利益的行为，竟熟视无睹，或采取姑息、宽容的态度。比如阳城县查出了合作社的瞒产现象以后，规定瞒下的粮食由瞒产社自由支配，这实际上奖励了瞒产社，因此，没有瞒产的社干部反遭到了社员们的反对，不得已也瞒起产来。"},{"type":"paragraph","text":"不少乡干部和县级领导干部，还存在着严重的官僚主义，听信社干部的假报告，不深入核实产量，不向农民进行教育，不积极地完成统购任务。在这些干部的思想里，国家利益观点被片面的群众观点所模糊，他们在资本主义思想向党进攻的时候，表现了软弱无力，束手无策。"},{"type":"paragraph","text":"上述情况，严重的影响了国家统购任务的完成，使国家少购多销，浪费了粮食，造成了粮食不应有的紧张局面。鉴于这种情况，中共山西省委和省人民委员会，决定在全省开展社会主义思想教育运动，并进行粮食问题的大辩论。其布署是：首先在县、乡两级干部中进行思想检查、开展批评和自我批评，批判那种听信假报告、不深入检查核实产量的官僚主义，和跟着群众叫喊粮食不够吃而不去积极完成统购任务的尾巴主义；然后在广大社员群众中，发动群众性的大辩论，进行国家利益、合作社利益和社员个人利益三者的一致性的教育，批判隐瞒产量的行为，核实今年的小麦产量；向社员说明国家粮食困难情况，进一步阐明统购统销政策的正确性，动员社员积极发展生产，增产粮食，尽快地改善目前国家粮食状况。"},{"type":"paragraph","text":"据新华社太原7日电　山西省霍县最近发现农业社干部隐藏粮食事件数起。全县农村干部就此展开讨论，检查、批判在粮食问题上的本位主义和右倾消极思想。"},{"type":"paragraph","text":"霍县从7月开始夏粮征购以来，绝大部分乡、社干部都积极核实产量，缴纳公粮和出售余粮，但是有的农业社干部受了右派分子影响，少报产量，隐瞒小麦，抵制夏粮征购工作。老张湾乡北星农业社韩麦岭生产队队长韩三丑和统计员韩生管，一次就隐藏小麦六千多斤。下乐平乡成庄农业社第一生产队队长成虎辰串联有本位主义思想的保管员王鸿喜等，连续掩藏小麦一千七百多斤，准备集体贪污。"},{"type":"paragraph","text":"有关单位对这两起隐瞒小麦事件已作了处理。北星社和成庄社除了全部追回被隐藏的小麦以外，并且在社员中展开讨论，批判犯错误干部的错误思想和行为。霍县人民委员会已将此事通报全县，中共霍县委员会还召开各乡党支部书记会议，专门布置在全县展开大辩论，要求各乡检查和处理一切偷盗、贪污、隐藏小麦和虚报产量的做法，并号召有类似错误的干部主动交代。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"beae5c054e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
