:[],"dates":[{"year":1965,"month":11,"day":9}],"is_range_date":false,"parts":[{"text":"林彪关于抓活思想具体办法的指示","type":"title"},{"text":"[1965年11月3日《解放军报》刊登广州军区372团总结出抓活思想的60多个“怎么办”，林彪看后对广州军区负责同志的指示。]","type":"paragraph"},{"text":"这个团政治处深入连队，总结出抓活思想的60多个“怎么办”，是一个好办法。我们现在有政治工作条例、连队管理教育工作条例，可以解决一些问题。但是，由于连队新干部多，缺乏经验，很需要一些具体办法。这个团政治处深入连队总结的60多个“怎么办”，提供了以毛泽东思想为武器抓活思想的具体做法，是一个创举。对加强兴无灭资的教育和提高部队战斗力有重要作用，值得在全军加以推广。可让部队讨论一下，看看究竟有那些经常遇到的问题，研究出一个全军统一的几十条“怎么办”，作为加强政治思想工作教育的具体办法。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2c2cbb2b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
