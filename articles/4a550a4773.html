art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席周总理电贺印度国庆","authors":[],"parts":[{"type":"paragraph","text":"据新华社25日讯 毛泽东主席、周恩来总理24日分别致电印度总统普拉沙德、总理尼赫鲁，祝贺印度共和国国庆八周年。"},{"type":"paragraph","text":"毛主席在给普拉沙德总统的贺电中，祝中印两国人民间的传统友谊青山不老，绿水长流，不断巩固和发展，并祝总统身体健康。"},{"type":"paragraph","text":"周恩来总理在贺电中赞扬印度共和国际国际事务中起着重大的作用和尼赫鲁总理对和平的贡献外，还热诚地希望：中印两国间的亲密友谊在和平共处五项原则的基础上不断增进，两国在维护世界和平、促进国际形势缓和以及加强亚非各国人民友好团结的工作中更紧密地合作。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a550a4773"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
