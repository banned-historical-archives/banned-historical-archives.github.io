" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji44","name":"毛泽东全集第44卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"祝贺古巴人民武装起义八周年的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺古巴人民武装起义八周年的电报"},{"type":"paragraph","text":"（1961年7月25日）古巴《革命报》："},{"type":"paragraph","text":"在“七·二六”古巴人民武装起义的光荣节日，我代表全体中国人民，向古巴人民表示热烈的祝贺。"},{"type":"paragraph","text":"古巴人民革命的伟大胜利，为拉丁美洲各国人民的民族民主运动，树立了光辉的榜样，并且大大地鼓舞了世界上一切被压迫民族争取解放的斗争。"},{"type":"paragraph","text":"中国人民把古巴人民革命的伟大胜利，看作是对自己的一个有力的支持；古巴人民在反对美帝国主义的侵略、维护民族独立和建设自己国家的伟大事业中，将永远得到六亿五千万中国人民的全力支持。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"1961年7月25日"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":7,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":333,"page_end":333},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa7cc4cc67"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
