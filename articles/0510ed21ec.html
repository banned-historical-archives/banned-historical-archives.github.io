" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu2","name":"十年文革中首长讲话传信录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"陈伯达、戚本禹在计委看大字报时的讲话","parts":[{"type":"title","text":"636.陈伯达、戚本禹在计委看大字报时的讲话"},{"type":"paragraph","text":"(1967年3月26日)"},{"type":"paragraph","text":"三月二十六日晚上时三十分左右到八时十分，陈伯达、戚本禹等五同志到国家计划委员会看大字报，“革命造反公社”负责同志竺慧娟等同志热烈欢迎首长，“红革会”某些人也在场。"},{"type":"paragraph","text":"一进楼门，陈伯达同志说：“怎么冷冷清清的？”，戚本禹同志说：“就是冷冷清清吗！”“造反公社”同志向首长问好。戚本禹同志说：“见过”。向陈伯达介绍说：“这是计委革命造反派。”(指“革命造反公社”。)"},{"type":"paragraph","text":"“造反公社”向首长汇报计委情况。王兴奋(“红革会”)向戚本禹同志介绍说：“我叫王兴奋”。公社同志说：“他们是保字号的！”王兴奋发火说：“他们要打倒余秋里！炮打无产阶级司令部！”戚本禹同志没有理睬。陈伯达同志说：“不能这样讲，炮打一个人怎么叫炮打无产阶级司令部呢？”接着又问：“前天的会(三月二十四日由“红革会”、“大庆公社”等组织召开的的彻底粉碎刘、邓、陶、薄资本主义复辟大会)是谁开的？”“造反公社”同志说：“是“红革会”蒙蔽一些不明真相的群众召开的。”其他同志插话：“在会上有人喊，誓死保卫余秋里！薄一波是毛主席司令部的人！”这时“红革会”有的人说这是造谣。“造反公社”同志说：“你们不要急嘛，有理讲吗？”戚本禹同志说：“他们竟喊出这样的口号。”陈伯达同志说：“我是计委的副主任，我没有来，是官僚主义，你们可以贴大字报，可以打倒我嘛。”戚本禹同志说：“他们连余秋里都不敢打倒，怎么还敢打倒你呢？”“造反公社”同志说：“‘大庆公社’每天来三、四卡车人，对我们有压力”。陈伯达同志说：“计委运动由计委群众自己解决嘛。为什么他们要来”。"},{"type":"paragraph","text":"他们走到六楼，戚本禹同志问：“骆凤大字报多还是薛暮桥的多？”“造反公社”同志说：“骆凤的多。”伯达和戚本禹看了一会儿就走了，临上车时戚本禹说：“提打倒余秋里不行，那就打倒陈伯达吧！”"}],"authors":["戚本禹","陈伯达"],"dates":[{"year":1967,"month":3,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":528,"page_end":528,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"红卫兵上海市大专院校革命委员会（红革会）","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0510ed21ec"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
