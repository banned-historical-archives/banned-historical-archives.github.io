month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京三日电】　中国保卫世界和平大会顷通过向毛泽东主席致敬电，电文如下:"},{"type":"paragraph","text":"敬爱的毛主席:"},{"type":"paragraph","text":"今天我们全国各界人民的代表，集合在首都北京，举行保卫世界和平大会。大会一致决定向你致最热烈最崇高的敬礼!因为正是你，领导着我们击败了帝国主义的侵略，推翻了国内反动派的统治，使中华民族站立起来，成为远东和平的强大堡垒。也正是你，将领导着我们发挥创造性的劳动，建设起新民主主义，以大大加强全世界的和平民主阵营。我们将永远紧紧跟随着你，保持对国内外反动派的警惕，加强团结，与伟大的苏联一道，与各新民主主义国家一道，与全世界人民一道，为巩固人民民主，争取世界持久和平，而不倦地斗争!"},{"type":"paragraph","text":"在毛泽东的名字照耀下我们将永远胜利!"},{"type":"paragraph","text":"中国保卫世界和平大会"},{"type":"paragraph","text":"十月三日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36cc975ffe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
