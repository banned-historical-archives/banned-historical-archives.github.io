tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东军事文集》出版邓小平为文集题写书名文集共6卷，计1600余篇，大部分为第一次公开发表","authors":["孪纫？"],"parts":[{"type":"paragraph","text":"本报北京12月17日讯 记者陈先义报道：经中共中央、中央军委批准，由中共中央文献研究室和军事科学院联合编辑的《毛泽东军事文集》，在毛泽东诞辰100周年之际由军事科学出版社和中央文献出版社正式出版发行。邓小平同志为文集题写了书名。"},{"type":"paragraph","text":"这部文集的编辑工作前后历经8年时间。文集按照中国革命和建设的历史分期编为6卷。第一卷为土地革命战争时期的著作，第二卷为抗日战争时期的著作，第三、四、五卷为解放战争时期的著作，第六卷为社会主义革命和社会主义建设时期的著作。"},{"type":"paragraph","text":"文集编入了毛泽东1927年8月至1972年12月关于军事方面的文章、电报、命令、批示、信函、报告、谈话等1600余篇，大部分是第一次公开发表。编入文集的著作，除已收入《毛泽东选集》的以外，主要根据中央档案馆保存的手稿、原件及当时出版的报刊和编印的文献等刊印。"},{"type":"paragraph","text":"为便于读者阅读、研究，对著作中需要说明的历史背景、战役战斗、重大事件、文献、人物、地名等，均作了必要的注释。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"375681b5ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
