ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对施复亮的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对施复亮的报告?的批语"},{"type":"paragraph","text":"（1952年5月5日）刘周阅后，送彭真同志处理。"},{"type":"paragraph","text":"这是施复亮给劳动部的报告，由李立三送来的。其中所述的问题应予迅速妥善解决，请彭真同志注意，并请彭告黄敬?注意，在五月份内解决这些问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月五日[1]施复亮，当时任民主建国会常务委员。"},{"type":"paragraph","text":"[2]指施复亮1952年4月22日写的《五反后北京工商界的情况和问题的简报》。简报反映的问题是：一、经营管理权问题。二、工人监督问题。三、工资问题。四、房产所有权问题。五、补税问题。六、劳动纪律问题。七、小企业的劳资关系问题。八、资金问题。九、分红与利润问题。十、职工福利问题。"},{"type":"paragraph","text":"[3]刘，指刘少奇。周，指周恩来。[4]彭真，当时任中共北京市委书记、北京市人民政府市长。[5]李立三，当时任中央人民政府劳动部部长。[6]黄敬，当时任天津市人民政府市长。"},{"type":"paragraph","text":"对施复亮的报告的批语"},{"type":"paragraph","text":"二退李立三同志。"},{"type":"paragraph","text":"施复亮文件已阅，已告彭真同志注意解决这些问题。这些是普遍的问题，中央已指示各地注意妥善解决。施复亮另有关于他对民建会性质任务的新的提纲一件也收到了，尚未研究，便时请告施。"},{"type":"paragraph","text":"毛泽东五月五日"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":5,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":98,"page_end":99},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"李立三","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ca8f5f3ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
