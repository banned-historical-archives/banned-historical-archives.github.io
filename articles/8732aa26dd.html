rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"洛佩斯总理等贵宾离京到上海访问邓小平、吴桂贤、姚连蔚等到机场热烈欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年三月三日讯 刚果人民共和国总理亨利·洛佩斯和夫人，以及由洛佩斯总理率领的政府代表团，在农林部长沙风陪同下，今天上午乘专机离开北京前往上海进行访问。"},{"type":"paragraph","text":"国务院副总理邓小平、吴桂贤，人大常委会副委员长姚连蔚，外交部长乔冠华、副部长何英，外经部副部长李克，财政部副部长陈希愈，中国人民解放军总后勤部副部长封永顺等，以及首都群众数千人，到机场热烈欢送刚果贵宾。"},{"type":"paragraph","text":"在飘扬着刚、中两国国旗的机场上举行了隆重的欢送仪式。乐队奏刚果国歌和中国国歌。洛佩斯总理由邓小平、吴桂贤副总理和姚连蔚副委员长陪同检阅了中国人民解放军陆、海、空三军仪仗队。当洛佩斯总理等刚果贵宾挥手同欢送群众告别时，人们高呼口号，挥动花束，祝贺中、刚两国人民的友谊和两国友好合作关系的新发展，祝愿刚果人民在维护民族独立和国家主权的斗争中取得更大的胜利。"},{"type":"paragraph","text":"各国驻中国的外交使节也到机场送行。"},{"type":"paragraph","text":"代表团团员、刚果驻中国大使伊图阿和夫人随同洛佩斯总理和夫人前往上海。"},{"type":"paragraph","text":"陪同刚果贵宾去上海访问的还有外交部非洲司副司长罗旭、礼宾司副司长高建中。"},{"type":"paragraph","text":"据新华社上海一九七五年三月三日电 刚果人民共和国总理亨利·洛佩斯和夫人，以及由洛佩斯总理率领的政府代表团，由农林部长沙风陪同，今天上午乘专机由北京到达上海参观访问。"},{"type":"paragraph","text":"上海市革命委员会副主任马天水、周丽琴、冯国柱，中国人民解放军上海警备区副司令员杨新亚和有关方面负责人，以及两千多群众到机场热烈欢迎刚果贵宾。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8732aa26dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
