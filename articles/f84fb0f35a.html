:[],"dates":[{"year":1983,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为纪念“二七”大罢工六十周年"},{"type":"paragraph","text":"叶剑英邓小平李先念陈云同志题词"},{"type":"paragraph","text":"新华社北京2月6日电　叶剑英、邓小平、李先念、陈云同志为纪念“二七”大罢工六十周年题词。"},{"type":"paragraph","text":"叶剑英同志的题词是："},{"type":"paragraph","text":"中国工人阶级要发扬二七革命传统，为全面开创社会主义现代化建设的新局面而奋斗。"},{"type":"paragraph","text":"邓小平同志的题词是："},{"type":"paragraph","text":"中国工人阶级要发扬二七革命传统，为把我国建成为现代化的，高度文明、高度民主的社会主义强国，为推进人类进步事业，而努力奋斗！"},{"type":"paragraph","text":"李先念同志的题词是："},{"type":"paragraph","text":"中国工人阶级要发扬二七革命传统，永远不忘过去，正确对待现在，努力创造未来！"},{"type":"paragraph","text":"陈云同志的题词是："},{"type":"paragraph","text":"纪念二七大罢工六十周年，为建设社会主义而奋斗！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f84fb0f35a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
