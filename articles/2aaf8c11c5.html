<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1968,"month":6,"day":1}],"page_start":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"教育孩子念念不忘阶级斗争","authors":["沈阳部队学习毛主席著作积极分子辽宁省新金县武装部家属委员会政治指导员","白秀文"],"parts":[{"type":"paragraph","text":"几年来，我遵循毛主席关于培养无产阶级革命事业接班人的教导，把养儿防修、教子保权当作自己的义务。为了更好地教育子女，我在家里办起了毛泽东思想学习班。我经常领着孩子们学习毛主席著作，向他们讲家史。星期天和假日领着他们去访贫问苦，到生产队参加劳动。去年以来，我们家庭学习班的一项经常性活动就是开展革命大批判，大摆斗私批修的战场，使毛泽东思想进一步在我们家庭里取得了统治地位。"},{"type":"paragraph","text":"长期以来，中国赫鲁晓夫这个坏家伙，大开“私”字黑店，贩卖“升官发财”、“成名成家”、“吃小亏占大便宜”等黑货。这些东西流毒很广，常常在孩子们的思想上反映出来。去年有一天，我的二儿子建华问我：“妈妈，你说我将来做什么工作好呢？”我反问他：“你自己是怎样打算的？”他说想当工程师。接着，他就讲了当工程师如何吃得好，穿得好，如何神气。从孩子的话中，我看到了中国赫鲁晓夫的修正主义思想对孩子们的毒害，于是我就遵循毛主席“要开展对于修正主义的批判”的教导，在家庭学习班里组织了革命大批判。"},{"type":"paragraph","text":"不懂得剥削，就不懂得革命。在革命大批判中，我经常用我们家在旧社会的苦难和新社会的幸福作为活教材，以过去的苦激发孩子们对旧社会、对中国赫鲁晓夫的仇恨，批判中国赫鲁晓夫的反革命罪行。去年，我们一共组织了二十多次家庭批判会。孩子们以毛主席“全心全意地为人民服务”、“毫不利己专门利人”的教导为武器，狠批中国赫鲁晓夫反动的利己主义哲学。我们还批判了中国赫鲁晓夫宣扬“剥削有功”，妄图复辟资本主义等罪行。每次批判，孩子们都咬牙切齿，挥着小拳头说：“我们决不让这条老狗的阴谋得逞，一定要把他斗倒批臭，让他永世不得翻身！”在批判中国赫鲁晓夫的反革命修正主义谬论的基础上，孩子们还联系思想实际，查危害，斗私心。他们说：“中国赫鲁晓夫的鬼道道真毒，他就是要把我们变成个人主义野心家，叫我们成为骑在劳动人民头上的官老爷，成为他复辟资本主义的工具。照他的道路发展下去，中国就要变色，我们还得和爷爷一样逃荒、要饭，饿死在野外。我们决不能走这回头路。”孩子们不断批判中国赫鲁晓夫的“私”字观，“毫不利己专门利人”的思想就在头脑里扎下根子。建华过去瞧不起农民，见了挑大粪的农民伯伯嫌脏，老远就躲开。通过革命大批判，思想感情有了很大的变化，不仅见了挑粪的农民伯伯不躲，而且自己每天也拿着粪筐拣粪，往生产队里送。"},{"type":"paragraph","text":"家庭是社会的组成部分。我深深感到，社会上阶级斗争的舞台上有什么“戏”，家里也就响什么“曲”。大量事实说明：“修”和“私”这些货色，有时在社会上找不到防空洞，但在家里倒可以“出场表演”。家庭这个阵地，社会主义如果不去占领，资本主义就必然会去占领。毛主席教导我们：“不破不立”。我们只有在家庭里经常地开展革命大批判，才能让社会主义牢牢地占领这个阵地。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2aaf8c11c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
