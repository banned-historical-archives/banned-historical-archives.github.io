:[{"year":1952,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我的父亲是一个没落了的资本家，他把腐朽的资产阶级思想原封不动的传授给我，企图使我继承他没有完成的剥削事业。过去他曾将吃喝嫖赌的经验全盘告诉我，带我上回力球场，教我巧取豪夺的方法。他也要我用功读书，叫我不要太落后，但他的目的不是为人民服务，而是学了本领可以多赚钱；总之，一切想法都是从自私自利出发的。因此，我在这种思想的支配下，课外不是打桥牌就发表反动言论，在同学中我竟以思想落后为骄傲。通过思想改造的学习阶段，我才开始认识自己严重存在资产阶级思想。在学校里我公开作了检讨，痛恨地指出:我这一套错误透顶甚至反动的人生观，完全是从所谓“家庭教育”中得来的。我又批判了在五反斗争中“洁身自好”的哲学，对亲戚中的资本家是不应该以姑息、怜悯的态度来对待的，而是要积极地帮助和挽救他们。这只是我初步的阶级觉悟，同学们都已伸出友谊的手，愿意并保证帮助我继续进步，使我在精神上感到无限的愉快。"},{"type":"paragraph","text":"交通大学学生　朱永资"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"310f522e53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
