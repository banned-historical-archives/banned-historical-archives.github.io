script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“马来亚革命之声”电台广播文章　揭露美英勾结拉赫曼集团剥削农民的罪行　马来亚农民决心在马共领导下同工人阶级团结一起开展人民战争","authors":[],"dates":[{"year":1969,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“马来亚革命之声”电台广播文章"},{"type":"paragraph","text":"揭露美英勾结拉赫曼集团剥削农民的罪行"},{"type":"paragraph","text":"马来亚农民决心在马共领导下同工人阶级团结一起开展人民战争"},{"type":"paragraph","text":"新华社讯　“马来亚革命之声”电台最近广播一篇文章，揭露美、英帝国主义勾结拉赫曼—拉扎克傀儡集团，大肆掠夺马来亚的资源，残酷迫害和剥削马来亚广大贫苦农民的滔天罪行。"},{"type":"paragraph","text":"文章说，拉赫曼—拉扎克集团几乎天天在吹嘘的所谓“联邦土地发展局”，就是外国垄断资本勾结马来亚官僚资产阶级掠夺马来亚财富和剥削农民的工具。以美国垄断资本为首的外国垄断资本，通过他们所控制的国际高利贷机构，如“世界银行”、“亚洲开发银行”、“大英联邦开发公司”等垄断机构，操纵着“联邦土地发展局”的一切活动。这些外国垄断资本给“联邦土地发展局”所规定的“任务”，就是“协助”他们掠夺马来亚的财富，特别是以最低廉的价格，向他们提供工业上所必需的大量原料，以榨取超额利润。这是典型的殖民主义的经济掠夺。"},{"type":"paragraph","text":"文章说，被迫进入外国垄断资本和马来亚官僚资产阶级所开办的“农场”农民，就象进入了地狱。"},{"type":"paragraph","text":"文章接着说，拉赫曼—拉扎克傀儡集团还巧立名目，强迫农民到马来亚官僚资本所控制的“合作社”去买粮食和日用品，从中进行残酷的剥削。例如，到普通杂货店买米，每干冬（合四点五五公升）是一点九马来亚元，但到“合作社”去买，却是二点三马来亚元。"},{"type":"paragraph","text":"文章最后说，越来越多的马来亚农民，从切身的经验中，深深地体会到：只有同工人阶级团结在一起，在马来亚共产党的领导下，参加解放军、拥护解放军，大力开展人民战争才能得到渴望的土地，才能推翻帝国主义及其走狗的反动统治，建立人民共和国。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbf0fbc2b6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
