ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"对订制军用雨衣被奸商诈骗情况简报的批语","alias":"","parts":[{"type":"paragraph","text":"对订制军用雨衣被奸商诈骗情况简报的批语！!"},{"type":"paragraph","text":"（1951年4月26日）必须严格处理，教育干部。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月二十六日"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府最高人民检察院副检察长李六如1951年4月24日简报的批语。"},{"type":"paragraph","text":"[2]李六如关于军委订制200万件军用雨衣被奸商诈骗，国家财产遭受重大损失事件的简报说，此项雨衣是1950年10月至11月由华北军区后勤部代表军委后勤部通过中央轻工业部在北京、天津、青岛三地订制55万件，另由上海等地承制145万件。单就天津承制30万件说，由于奸商预知订制雨衣之消息，并乘我军需急迫即串通活动，大量抬高雨衣成本，致使国家财产损失近90亿元（人民币旧币）。如果按京、津、青三地订制55万件计算，国家损失140亿元（人民币旧币）以上；如果按全国订制200万件计算，国家损失更大。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":257,"page_end":257},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6a63e5d44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
