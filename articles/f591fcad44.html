script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"深入查减解除封建剥削  阳城生产超过往年  涉、壶、长治积极沤肥","authors":[],"dates":[{"year":1946,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"深入查减解除封建剥削"},{"type":"paragraph","text":"阳城生产超过往年"},{"type":"paragraph","text":"涉、壶、长治积极沤肥"},{"type":"paragraph","text":"【本报阳城讯】阳城今年的生产运动超过已往任何一年，全县已组织起来的劳动力达八万九千余人，占全县劳力百分之九十六。据悉，得到这种优良成果的基本原因是领导上在大胆放手深入查减运动中，使农民较为彻底的摆脱了封建剥削，改善了生活与劳动条件，例如一区二十二个行政村，经翻身运动获得斗争果实的贫苦农民，共三千四百七十人，约占全人口之半数，共得土地五千余亩，牲口四百余头，粮食三千余石；六区岩头山村原有贫农一百四十九人，现在仅有五十户，余均上升为中富农。如后半年不发生旱潦天灾，按照全县作物面积五十四万余亩计算，可收七十余万石细粮，三万余亩棉地，预计秋后可收净花六十万六千余斤，全县二十万五千余人，即可达到足衣足食之境地。农村副业方面之养蚕业，据一百十八个村的统计，今年养蚕四万零七十八席，缫丝七千七百三十把，可卖九千二百七十六万元，比去年超过数倍；另据一区的统计，今年养猪三百十二口、养羊一千二百六十只、养鸡二千五百八十七只，也均超过去年一倍左右。"},{"type":"paragraph","text":"【本报长治讯】为准备麦地肥料，太行各地已开始沤肥运动。涉县六区大峰村在劳动英雄李保晶领导下，现已沤肥二千八百五十担，再加上化肥、圈肥，全村三百四十亩地，每亩最低限度平均可上三十五担粪。壶关四区林青庄劳动英雄白多鱼，为解决麦地肥料困难，领导全村妇女儿童上山拾羊粪蛋，四天共拾了四担。长治五区南泉庄等村，由于今年组织起来作活多，剩余劳力全部卷入沤粪运动中去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f591fcad44"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
