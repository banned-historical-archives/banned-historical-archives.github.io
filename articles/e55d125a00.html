,"dates":[{"year":1986,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沉痛悼念中国卓越的领导人叶剑英"},{"type":"paragraph","text":"一些国家领导人发来唁电"},{"type":"paragraph","text":"新华社北京11月1日电　圭亚那合作共和国总统休·德斯蒙德·霍伊特和澳大利亚总督尼尼安·马丁·斯蒂芬分别打电报给李先念主席，沉痛悼念叶剑英同志逝世。"},{"type":"paragraph","text":"霍伊特总统的唁电如下："},{"type":"paragraph","text":"“请允许我代表圭亚那人民全国大会党、圭亚那合作共和国人民，并以我个人的名义，对叶剑英同志的逝世，向您、向中国共产党和中华人民共和国人民致以诚挚的哀悼。”"},{"type":"paragraph","text":"“我们希望，叶剑英同志的聪明才智将继续作为指导贵党和贵国人民的力量源泉。”"},{"type":"paragraph","text":"斯蒂芬总督的唁电如下："},{"type":"paragraph","text":"“在叶剑英元帅逝世的悲痛时刻，我谨向您、向中国政府和人民转达澳大利亚政府和人民的同情以及我本人的深切哀悼。叶剑英元帅是一位杰出的领袖，在漫长而卓越的生涯中，他在军政事务中为建设国家作出了伟大贡献。为此，他将永远被人们铭记。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e55d125a00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
