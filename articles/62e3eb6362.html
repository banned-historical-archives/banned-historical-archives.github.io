","authors":[],"dates":[{"year":1952,"month":1,"day":17}],"is_range_date":false,"parts":[{"text":"川南省级机关发现坏分子破坏三反运动","type":"title"},{"text":"【川南分社十七日讯】川南省级机关三反运动中，发现有坏分子进行破坏活动。自贡零售公司被反革命分子放火烧毁；川南百货公司也发现有人点火；个别单位的坏分子拉拢群众，说：“以前是你们(指党团员)整我们，现在该轮到我们整你们了”。","type":"paragraph"},{"text":"在运动中发生有逮捕搜查的现象，领导机关已指示纠正。运动中如何对待民主人士、技术人员思想上也还不明确，过去对他们一律对待，他们有“吃不消”的反映，现在领导上已指示予以适当区别。工商界方面，领导上采取稳健的作法，等掌握了必要的材料后才全面开展。","type":"paragraph"}],"comments":[],"origin":"1952年1月18日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62e3eb6362"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
