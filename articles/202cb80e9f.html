rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"甘泗淇上将逝世治丧委员会由贺龙同志等四十五人组成","authors":[],"parts":[{"type":"paragraph","text":"新华社五日讯 甘泗淇同志治丧委员会讣告，全文如下："},{"type":"paragraph","text":"讣告"},{"type":"paragraph","text":"中国共产党中央委员会候补委员、中国人民解放军总政治部副主任甘泗淇上将于一九六四年二月五日十二时在北京病逝，享年六十岁。甘泗淇同志治丧委员会已经组成。定于二月八日上午九时至下午五时在中山堂举行各界吊唁，二月九日上午十时举行公祭。特此讣告"},{"type":"paragraph","text":"甘泗淇同志治丧委员会"},{"type":"paragraph","text":"一九六四年二月五日"},{"type":"paragraph","text":"甘泗淇同志 治丧委员会名单"},{"type":"paragraph","text":"主任：贺龙"},{"type":"paragraph","text":"委员：邓小平、王树声、王震、王新亭、王恩茂、王向荣、刘亚楼、刘志坚、李井泉、李天佑、李达、李聚奎、苏振华、余秋里、吴法宪、林彪、罗瑞卿、周士第、邱会作、张宗逊、张爱萍、张达志、张子意、张启龙、徐立清、许光达、许世友、萧劲光、萧华、萧克、萧向荣、梁必业、郭鹏、粟裕、傅钟、傅秋涛、彭绍辉、杨尚昆、杨成武、杨勇、廖汉生、聂荣臻、韩先楚、谭政"}],"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"202cb80e9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
