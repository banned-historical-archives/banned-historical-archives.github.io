ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"将陕南鄂西北打成一片造成根据地","alias":"","parts":[{"type":"paragraph","text":"将陕南鄂西北打成一片造成根据地！"},{"type":"paragraph","text":"（1946年8月28日）李、任、文:"},{"type":"paragraph","text":"（一）望一小队带电台与电池去找周志坚²，找着后要周部以汉水以北为根据地分散游击，站稳脚跟后酌量派队渡江向南岸发展。（二）水、镇安成立分区，站稳脚跟后极力向西面发展。（三）勋西方面我军一时期后向南发展直抵汉水，尔后并相机派队渡江。（四）要王刘及罗文各派一部向均县\"、郧县、白河、旬阳、平利各县发展建立分区。（五）总之使陕南、鄂西北打成一片，占领广大地区，造成根据地。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原军区司令员李先念、第二纵队政治委员任质斌和司令员文建武的电报。"},{"type":"paragraph","text":"[2]周志坚，当时任中原军区第二纵队副司令员，率该部第三十九团两个营与上级失去联系。"},{"type":"paragraph","text":"[3]王刘，指王树声、刘子久，当时分别任中原军区第一纵队司令员和副政治委员。"},{"type":"paragraph","text":"[4]罗文，指罗厚福、文敏生，当时分别任江汉军区司令员和政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":102,"page_end":102},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06c4cc24c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
