art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"没有参加“文革”也有“左”的影响某部汽车连干部战士同记者一席谈","authors":["李坤/王文杰"],"parts":[{"type":"paragraph","text":"本报沈阳8月24日电 没有直接参加“文化大革命”，有没有“左”的影响？彻底否定“文化大革命”与青年战士有没有关系？带着这个问题，记者今天走访了某部汽车连。"},{"type":"paragraph","text":"汽车连指导员秦华学告诉记者，我们连百十号战士绝大部分没有直接参加过“文化大革命”，对他们来说，是不是无毒可肃了呢？我们认为不是这样的。你们找几个战士谈谈，感受可能会更深一些。"},{"type":"paragraph","text":"1981年入伍的战士王洪岐说：我今年二十三岁，尽管没当过红卫兵，没搞过打砸抢，但“谁敢跟老师顶谁就是好汉”的无政府主义思潮对我还是有影响的。参军后，班长、排长管得严格点，就觉得不舒服，“谁管谁呀，要是在地方，我早就跟他们吵翻天了。”现在认识到，“文革”流毒在我头脑里也有，需要好好地清理。"},{"type":"paragraph","text":"战士林志龙谈到，“文革”时动不动就割资本主义尾巴，把发展经济的一些正当做法也当成投机倒把来批。虽然“文革”初期我还是小娃娃，但这些“左”的思想对我也有一定的影响。起初，看到有的农民搞长途贩运就不理解，总把这事与当年批的搞投机倒把联系在一起，觉得农民跑买卖不是正道。我觉得，领导上讲没有参加过“文革”的青年，也有清除“文革”影响的任务，是符合客观实际的。"},{"type":"paragraph","text":"1967年才出生的战士张金秀说：听我父母讲，“文化大革命”乱得很、糟得很。可我又觉得“文化大革命”也有点成绩，氢弹、原子弹爆炸成功，卫星上天，不都是那时搞出来的吗？经过指导员的开导我才明白，这些成就的取得不能记在“文革”的账上，而恰恰是抵制“文革”的结果。类似我过去那样的模糊认识，在我们青年中可能不少，这说明认真搞好彻底否定“文革”的教育，对我们年轻人来说，是非常必要和适时的。"},{"type":"paragraph","text":"（本报记者 李坤、王文杰）"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25a44b8197"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
