ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对章汉夫检讨的批语","alias":"","parts":[{"type":"paragraph","text":"对章汉夫检讨的批语"},{"type":"paragraph","text":"（1952年9月24日）刘、周、邓、章汉夫同志阅，存周处。"},{"type":"paragraph","text":"（一）锡兰代表所提两点，不应拒绝，具体安排请周总理处理。（二）章汉夫同志检讨尚好，这是第二次，仍不拟给予处分；如将来再犯，再议处分。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年九月廿四日[1]章汉夫，当时任中央人民政府外交部副部长。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。邓，指邓小平，当时任政务院副总理。"},{"type":"paragraph","text":"[3]指锡兰贸易代表团1952年9月22日向中国外交部提出的两点希望：一、希望中国政府将来派代表团去锡兰；二、希望代表团这次能会见毛泽东。"},{"type":"paragraph","text":"[4]参见《关于较重要外交复文的送审问题的批语》一文。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":9,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":260,"page_end":260},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"967aa3976d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
