r":1952,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"郭根"},{"type":"paragraph","text":"中国的民族资产阶级有其积极进步的一面，这是事实。也正因为这样，它们才能光荣地作为人民民主专政的四大阶级之一。"},{"type":"paragraph","text":"当五反运动初起时，资本家就据此而叫嚣着:“我们也是革命阶级呀，怎么政府反起我们来了?这不是明明要拆散统一战线了吗?”"},{"type":"paragraph","text":"后来铁一样的事实堵煞了他们这种花言巧语的嘴巴?但接着就有资本家的论客们站出来企图为之打国场了。他们说:民族资产阶级有其消极的一面，有其积极的一面，那么今后只要克服其消极的一面，而发展其积极的一面，就可以和工人阶级共同进入社会主义了。"},{"type":"paragraph","text":"这些话表面上听来是够漂亮的，但是仔细研究一下，却和资本家行贿时的嘴脸一样丑恶。"},{"type":"paragraph","text":"这是什么意思呢?拆穿来是这样:“大家都是革命的，都是朋友，又何必这样绝情绝义呢?只要资产阶级认错了，今后加强发扬他们自己的优点，不就行了吗?一家人还是一家人呀!”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37a157b6ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
