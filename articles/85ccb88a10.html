ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"政治上的持久战","alias":"","parts":[{"type":"paragraph","text":"政治上的持久战！"},{"type":"paragraph","text":"（1938年12月15日）"},{"type":"paragraph","text":"抗日的持久战需要的时间很长，要经过很多变化，我们打日本必须要有一个政治上的持久战。所以，每个革命者在政治上要有持久性，要准备应付各种曲折，准备克服困难。世界上无论什么事情都是走曲线，而不是走直线。这个问题也就是走“之”字路还是走“_”字路。无论什么事情都是走“之”字路，而不是走“二”字路，走“之”字路是世界上任何事情发展的原则。我们抗日战争要经过防御、相持和反攻三个阶段，这也是走“之”字路。"},{"type":"paragraph","text":"[1]这是毛泽东对抗大即将分配工作的八大队（女生大队）学员作关于政治上的持久战的讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":12,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":87,"page_end":87},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85ccb88a10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
