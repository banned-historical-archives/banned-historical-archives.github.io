art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"接好毛泽东思想的班","authors":[],"parts":[{"type":"paragraph","text":"“哥哥的班我来接，哥哥的枪我来打，我一定以哥哥为榜样，永远忠于毛主席！”"},{"type":"paragraph","text":"共产主义战士王杰同志的妹妹王爱军，去年四月入伍来到某野战医院担任护理员工作。一年多来，她进步很快。最近，在济南部队后勤部召开的活学活用毛泽东思想积极分子代表大会上，人们怀着兴奋的心情，听了她的先进事迹。下面，是王爱军同志谈话的一些片断。"},{"type":"paragraph","text":"毛主席怎样说的，我就怎样做"},{"type":"paragraph","text":"“哥哥的班我来接”。接哥哥的什么班呢？哥哥在他的日记中写道：“毛主席怎样说的，我就怎样做”。接哥哥的班，就是接毛泽东思想的班。我入伍以前只上过三年学，识字不多，读书有困难。但是，不好好读毛主席的书，不知道毛主席怎样说的，又怎样照着做呢！于是，我就下决心用愚公移山的精神，一字一句地读毛主席的书。我集中力量先学“老三篇”，坚持天天读，天天写，有时写到夜间十一、二点钟。这样，过了不久，我不但可以读、写“老三篇”，而且也可以学习毛主席的其他光辉著作了，写心得笔记也大体可以办到了。"},{"type":"paragraph","text":"林副主席指示我们：“‘老三篇’最容易读，真正做到就不容易了。”学习“老三篇”，是为了照着做。哥哥讲的“毛主席怎样说的，我就怎样做”，最重要的也是在那个“做”字上。我学习毛主席著作很不够，做得更不够，我只是时时要求自己，努力做到“毛主席怎样说的，我就怎样做”。"},{"type":"paragraph","text":"工作岗位不同，为人民服务一样"},{"type":"paragraph","text":"毛主席教导我们：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”毛主席在《纪念白求恩》这篇光辉著作中又教导我们：“我们大家要学习他毫无自私自利之心的精神。从这点出发，就可以变为大有利于人民的人。”怎样做个大有利于人民的人？刚入伍，我想过，如果让我到坦克部队多好，那可真是哥哥的枪我来扛了。不料却让我当了护理员，“一不拿枪，二不上前线，怎么去接英雄的班？”学习“老三篇”，我懂得了自己原来的想法不对了。张思德同志当战士、当班长，扛枪、烧炭，这都是为人民服务。我今天当护理员，也是为人民服务，为巩固无产阶级专政、为解放全人类奋斗。工作岗位尽管不同，接革命的班是一样的。懂得了这一点，不论做什么工作，都觉得有使不完的劲了。"},{"type":"paragraph","text":"为捍卫毛主席革命路线而战斗"},{"type":"paragraph","text":"有一次，我们医院里收进了一位腹部患大肿瘤病的贫农李大娘。医院决定抢救这位老大娘。这是一场捍卫毛主席无产阶级医疗卫生路线的战斗。我决心在这次战斗中贡献自己的一点力量。动手术时要输血，我同大娘的血型一样，我就请求献血。听说吃了饭后的血液对病人有影响，我就从早晨起不吃饭，直等到十二点。后来，领导上考虑到我担负着到驻地附近农村宣传毛泽东思想的任务，每天要跑几十里路，怕我身体受影响，不接受我献血。我急了，找到领导同志坚定地表示：血，我是献定了，为了保卫毛主席革命路线，抢救贫农老大娘，就是把我的血抽干，我也心甘情愿！我终于献出了自己的鲜血。"},{"type":"paragraph","text":"（济字二八五部队政治部供稿）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0da294d792"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
