rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"华主席会见孟中友协代表团"},{"type":"paragraph","text":"中共中央主席、国务院总理华国锋一月三日下午会见孟中友协主席米尔扎·吴拉姆·哈菲兹先生率领的孟中友协代表团。他说，中孟两国的关系发展的很好。孟中友协对促进两国人民的相互了解和发展两国友好关系作出了积极的贡献。"},{"type":"paragraph","text":"会见时，哈菲兹先生向华主席转交了齐亚·拉赫曼总统的信。华主席请哈菲兹先生回国后，转达中国政府、中国人民和他本人向齐亚·拉赫曼总统以及孟加拉国政府和人民表示的良好祝愿。"},{"type":"paragraph","text":"李副总理离京去非洲四国访问"},{"type":"paragraph","text":"国务院副总理李先念和夫人林佳楣及其随行人员，一月三日上午乘专机离开北京路经乌鲁木齐前往坦桑尼亚、莫桑比克、赞比亚和扎伊尔进行正式友好访问。"},{"type":"paragraph","text":"到机场送行的有国务院副总理邓小平、耿飚、方毅、王震、陈慕华，人大常委会副委员长李井泉，外交部部长黄华等。（据新华社）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc38b953f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
