令作风仍很严重","authors":[],"dates":[{"year":1950,"month":6,"day":27}],"is_range_date":false,"parts":[{"text":"浙江吴兴等地农村干部乱打乱扣强迫命令作风仍很严重","type":"title"},{"text":"(浙江日报六月二十七日讯)浙江农村干部乱打乱扣、强迫命令作风仍很严重。如：(一)慈溪庄村干部擅自召集富农、中农开借贷会，一般富农、中农都不愿出借或无可借贷时，村干部即当场把几个富农、中农绑起来打，结果被迫借出了一万二千斤谷子。(二)丽水太平区芦南乡东弄村，村长向群众梅献左妻借谷未遂，即将其粮食仓查封，致使梅献左夫妻争吵，其妻服毒自杀。(三)吴兴东林乡干部对会门迷信团体，不分青红皂白，凡是一贯道统统逮捕，先后绑送县府的已有十七人。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年7月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f6f8a4856"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
