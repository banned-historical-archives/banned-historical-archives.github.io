tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"自觉地用毛泽东思想改造世界观","authors":["金士良/孙甲佩/刘国栓/王仕国/严小沙/张昌钏"],"parts":[{"type":"paragraph","text":"一天不学习毛主席著作，就没有方向，没有灵魂。要继续革命，就必须拚命地学，拚命地用，自觉改造世界观。"},{"type":"paragraph","text":"——共青团员 金士良"},{"type":"paragraph","text":"我能扛三百斤，决不扛二百八，一个人能扛的，决不要两个人抬；只要是革命需要，就是流血牺牲，也要勇往直前。"},{"type":"paragraph","text":"——共青团员 孙甲佩"},{"type":"paragraph","text":"“完全”“彻底”，就是对人民有利的事，要想尽一切办法，尽一切力量把它做好；就是做事要做到底，赶车要赶到家，不能做半截子事，干半截子革命。"},{"type":"paragraph","text":"——共青团员 刘国栓"},{"type":"paragraph","text":"要做一个无限忠于毛主席的革命战士，就要拿出狠劲和自己头脑中的“私”字拚刺刀。"},{"type":"paragraph","text":"——共青团员 王仕国"},{"type":"paragraph","text":"改造世界观，要只争朝夕，但又不是一朝一夕可以完成的。要不断地改造思想，永远把自己摆在思想改造的起跑线上，永远以只争朝夕的革命精神去改造世界观。"},{"type":"paragraph","text":"——共青团员 严小沙"},{"type":"paragraph","text":"这理想，那理想，没有脚踏实地的革命精神，就是小资产阶级的幻想；胸怀全局，立足本职，为实现共产主义而奋斗终身，才是革命青年的崇高理想。"},{"type":"paragraph","text":"——共青团员 张昌钏"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"900bc4672f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
