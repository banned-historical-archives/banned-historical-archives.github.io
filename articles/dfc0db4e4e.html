":[],"dates":[{"year":1976,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在安徽省蒙城县楚村公社朱集生产队插队落户的上海知识青年和贫下中农一起过革命化春节。他们和贫下中农一起吃了忆苦饭，听了发扬革命传统的报告，还和贫下中农以及赴蒙城学习慰问团同志一起举行了赛诗会，歌颂文化大革命的伟大胜利，歌颂知识青年上山下乡等社会主义新生事物，批判刮右倾翻案风的奇谈怪论。"},{"type":"paragraph","text":"在春节即将来临的时候，朱集生产队的上海知识青年和贫下中农认真学习了毛主席词二首和中央两报一刊元旦社论，畅谈学习体会，更加坚定了扎根农村干革命的决心。他们逐条检查了一年前制订的六年规划的实施情况。为了尽快实现这一规划，他们与贫下中农并肩战斗，大批资本主义，大批修正主义，同时，完成了开挖窑沟和疏浚芦沟的任务，接着又投入农田基本建设的战斗。担任县委副书记、区委第一书记的上海知识青年俞自由，与群众一起挖台田，平整土地。上海知识青年王东丰今年已是在朱集连续过第四个春节了。今年春节，他一面下田战斗，一面同其他同学一起，把全大队的广播线路和各户广播喇叭检修了一遍。　(蒙城县通讯组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfc0db4e4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
