","authors":[],"dates":[{"year":1957,"month":8,"day":23}],"is_range_date":false,"parts":[{"text":"总政治部发出关于将军队的劳教人员移交地方执行的通知","type":"title"},{"text":"经与内务部、公安部商定，军队在肃反时定为劳动教养尚未处理的反革命分子、坏分子和今后须要劳动教养的人员，只要合乎国务院“关于劳动教养问题的决定”的条件经所属上级批准（可按干部任免程序办理），均交所在地区的省、自治区、直辖市人民委员会民政、公安部门执行教养，并由各军区直接办理手续，各总部、各军区、兵种驻在各军区的学校、机关、部队需要实施劳动教养的人员亦由各军区统一办理手续。志愿军的可以直接交辽宁省人民委员会。劳教人员在移交前应作好如下工作：","type":"paragraph"},{"text":"（1）作好审查结论，向本人宣布。并说明所以要这样处理的理由，希望他服从处理，愉快地走上劳动生产的岗位，从劳动中改造自己，成为新人。","type":"paragraph"},{"text":"（2）作劳教处理的人员，应以师以上首长的名义分别宣布开除军籍。","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d52ac37ea4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
