ear":1970,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金山县文化站　胡林森"},{"type":"paragraph","text":"伟大领袖毛主席教导我们:“我们的文学艺术都是为人民大众的，首先是为工农兵的，为工农兵而创作，为工农兵所利用的。”而周扬等“四条汉子”竭力鼓吹资产阶级个人主义，宣扬什么“艺术总要有尖子”。这是“四条汉子”砍向群众文艺的一把软刀子，是腐蚀工农兵的一剂毒药。我们业余文艺宣传队就是要唱英雄，学英雄，走英雄道路。他们所谓的“尖子”，戳穿了就是以“三名三高”为诱饵，把工农兵蜕变为精神贵族，煽动大家去抢角色、争名利、别苗头、出风头、讲排场、摆阔气、贪大求洋、搞形式主义，把群众文艺引到歪路上去。这对我们来说，教训是深刻的。我们县里有个贫农的女儿，一九六五年给他们“选拔”到市里去参加“名角”演出，还当报幕员，把她打扮得妖里怪气，活象一个资产阶级的小姐，周扬之流就是这样来毒害、腐蚀我们贫下中农和群众文艺队伍的。"},{"type":"paragraph","text":"当前，在蓬勃发展的革命群众文艺活动中，我们要警惕种种乔装打扮的资产阶级思想侵蚀。我们业余文艺战士坚决做到不脱离劳动，不脱离群众，不脱离当前斗争，严肃认真，因地制宜，从实际出发，大力普及革命样板戏，更好地为无产阶级政治服务。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c993da58b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
