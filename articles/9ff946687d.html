rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“听毛主席的话；什么也不怕”","authors":["陈沛霖"],"parts":[{"type":"paragraph","text":"王杰、麦贤得所以不怕流血牺牲，就是由于他们平时如饥似渴地学习毛主席著作，树立了为革命而生、为革命而死的世界观。我要想在战斗中不怕苦不怕死，就要象他们那样活学活用毛主席著作，在“用”字上狠下功夫。"},{"type":"paragraph","text":"我刚上艇时不愿当信号兵，认为信号兵站得高，战斗中不如轮机兵保险。为此，我曾几次想向领导要求改行。不久的一天晚上，突然接到战斗命令，全艇同志都进入一级战斗部署，这时我心情一阵紧张，若不是老信号兵陈天寿及时收发信号，这次战斗胜利就要受到影响。"},{"type":"paragraph","text":"战后，团小组长、航海兵林恩赐和我谈心，叫我谈谈初次参战的体会，我半响未吭声，最后恳切地问他：“打仗的时候你也站在驾驶台上，怎么不怕呢？”他笑了笑回答：“刚上艇时，我也有点怕，但听了毛主席的话，这个问题就解决啦。”我听得出神，又追问了一句：“毛主席在哪里对你说的啊？”这时，他从口袋里掏出一本《毛主席语录》，读着：“要奋斗就会有牺牲，死人的事是经常发生的。但是我们想到人民的利益，想到大多数人民的痛苦，我们为人民而死，就是死得其所。”“应该指出：战争目的中，消灭敌人是主要的，保存自己是第二位的，因为只有大量地消灭敌人，才能有效地保存自己。”我从他手中接过《毛主席语录》本，一遍又一遍地读着，想着：是呵！今天的幸福生活是无数革命先烈用鲜血换来的，现在世界上还有三分之二的人民没有获得解放，我应该为世界革命奋斗终生。后来艇上又开展了学习王杰和学习战斗英雄麦贤得的活动，使我受到很大教育。我想：王杰、麦贤得所以不怕苦、不怕死，都是由于他们平时如饥似渴地学习毛主席著作，树立了为革命而生、为革命而死的世界观。我要想在战斗中不怕苦、不怕死，真正过得硬，就要象他们那样活学活用毛主席著作，在“用”字上狠下功夫。"},{"type":"paragraph","text":"以后，我继续带着这个问题学习毛主席著作，进一步认识到，分辨死的意义的轻重标准，就在于是不是为人民的利益。认识提高了，平日我总是寻找机会锻炼自己。心想，再有一次实战机会来锻炼锻炼该多好啊！"},{"type":"paragraph","text":"前线生活真好象有意识在考验我似的，事隔不到两个月，我又参加了一次海战。在这次海战中，我没等一级战斗警报拉响，就拿出冲锋枪，飞速地爬上驾驶台，高站在自己的战斗岗位上，两目圆睁，警惕地进行观察了望，及时准确地传达战斗命令，和兄弟单位一起全歼敌人，出色地完成了战斗任务。战后，首长和同志们关切地问我：“小陈，这次战斗怕不怕呀？”我拍拍胸脯自豪地回答：“听毛主席的话，什么也不怕！”RW：王杰；先进事迹"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ff946687d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
