" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"新疆捐献情况及问题","authors":[],"dates":[{"year":1951,"month":8,"day":19}],"is_range_date":false,"parts":[{"text":"新疆捐献情况及问题","type":"title"},{"text":"【新疆分社十九日讯】新疆省决定捐献战斗机三十架，大炮六门。各地人民捐献甚为踊跃。目前各界已认捐二百亿元以上(部队在外，南疆尚未报来)，其中大部系牛羊牲畜折价。现在捐献运动中存在问题是大部乡村捐献运动尚未开展，各地已缴现款多未交到银行，据银行前日统计，全省收到现款(包括金银)只够买一架战斗机；最近已发现有些单位擅自动用捐献款项的事情，如有小学将捐款用以修理校舍，某县用以招待赴朝慰问团(县干部说“反正都是抗美援朝”)，有的机关把捐款作了小公家的款子存放起来；迪化市并发现店员工会经手人贪污会员捐献款达总数三分之二的事件。","type":"paragraph"}],"comments":[],"origin":"1951年8月21日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0dd96c23e0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
