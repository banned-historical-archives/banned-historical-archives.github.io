art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一九七八年全军政治工作会议","authors":[],"parts":[{"type":"paragraph","text":"这次会议，是在我国进入新的发展时期，党的十一大产生新的中央军委之后，所召开的第一次全军政治工作会议，是我军政治工作承先启后，继往开来的一次历史性的会议，是我军政治工作发展史上新的里程碑。"},{"type":"paragraph","text":"会议是在华国锋同志为首的党中央、中央军委亲切关怀和直接领导下进行的。华国锋同志等党和国家领导人接见了全体到会干部。华国锋同志、叶剑英同志、邓小平同志两次亲临大会，作了重要讲话。华国锋同志的讲话，明确提出了为实现新时期的总任务而奋斗，是党在新时期一切思想政治工作的中心内容。叶剑英同志的讲话，以我军五十多年的历史经验和自己的亲身阅历，深刻阐明了政治工作过去是我军的生命线，在新的历史条件下仍然是我军的生命线。邓小平同志的讲话，精辟地阐述了毛泽东同志一贯倡导的实事求是的光辉思想，批评了违背实事求是的错误思潮。这三个讲话，指明了新的历史条件下我军政治工作的方向。"},{"type":"paragraph","text":"这次会议着重研究和解决的课题，是在新的历史条件下，如何发扬政治工作的优良传统，提高我军的战斗力。韦国清同志在会上所作的报告，从六个方面阐述了这个问题，指出我军政治工作的任务是：高举毛主席的伟大旗帜，坚持党对军队的绝对领导，坚持用马列主义、毛泽东思想和党的路线教育部队，保持我军的无产阶级性质，领导和保证完成抓纲治军、准备打仗的任务，提高部队战斗力，为实现新时期的总任务而奋斗。报告强调，广泛深入地大张旗鼓地进行新时期总任务的教育，为实现这个伟大目标而奋斗，“这是我军思想政治工作的中心内容”。"},{"type":"paragraph","text":"会议集思广益，讨论修改了《中共中央军委关于加强军队政治工作的决议》。决议包括“新的历史条件和我军政治工作的任务”，“学习马列主义、毛泽东思想，反对修正主义”，“提倡唯物主义、辩证法，反对唯心主义、形而上学”，“恢复政治机关的职能、作用和威信”，“加强教育训练、科研等各项任务中的政治工作”，“大力提高我军的科学文化水平”等二十二项内容。中共中央于一九七八年七月十八日批示同意了这个决议，并给予高度评价，要求“各级党委和政治机关，要经常了解决议的贯彻执行情况，每年总结检查一次”。会议还讨论修改了《中国人民解放军政治工作条例》（由二十个条例组成）和《中国人民解放军干部服役条例》两个草案。前一个文件，中共中央已经批准，颁布全军遵照执行；后一个文件，已经五届人大常委会第三次会议于一九七八年八月十八日批准。此外，会议还讨论了《关于召开全军学雷锋、学硬骨头六连、学空军航空兵一师先进代表大会的通知》。"},{"type":"paragraph","text":"《决议》和两个条例这些历史性文件，继承我军创建以来特别是古田会议奠定的政治工作的优良传统，从当前的实际情况出发，总结了在同林彪、“四人帮”斗争中我军政治工作正反两个方面的经验，明确提出了在新的历史条件下军队政治工作的方向、任务和方法，都是加强军队政治工作的好文件、好章程。要做好军队工作着重点转移的政治工作，这些文件的精神都是适用的，要坚决贯彻执行。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22bdf5b8bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
