象","authors":[],"dates":[{"year":1950,"month":7,"day":22}],"is_range_date":false,"parts":[{"text":"宁夏各县财粮工作存在严重贪污浪费现象","type":"title"},{"text":"(西北总分社七月二十二日讯)宁夏省各县财粮工作，存在着极其混乱和严重的贪污、浪费现象。据不完全统计，该省各县其支出未开收据的公粮达三万二千九百多石，其中损失四千一百八十七石。因保管不严损失达三万多石。此外各县私自挪用公粮的现象也很严重，据宁朔、中卫、金积、中宁、永宁、贺兰、平罗、陶乐、盐池等九县统计，先后计挪用公粮二百二十四万八千八百七十多斤。在最近清查工作中，并发觉粮食管理与调运方面很多无政府无纪律的现象。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年8月2日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"415ce46fe6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
