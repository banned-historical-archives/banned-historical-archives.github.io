ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"毛泽东等祝贺蒙古人民革命胜利三十八周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺蒙古人民革命"},{"type":"paragraph","text":"胜利三十八周年的电报"},{"type":"paragraph","text":"（1959年7月10日）蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔同志，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志，蒙古人民共和国大人民呼拉尔主席巴·贾尔卡赛汗同志："},{"type":"paragraph","text":"当蒙古人民革命胜利三十八周年的时候，我们谨代表中国共产党、中华人民共和国政府和中国人民向你们，并且通过你们向蒙古人民革命党、蒙古人民共和国政府和蒙古人民致以热烈的祝贺。"},{"type":"paragraph","text":"蒙古人民在蒙古人民革命党和蒙古人民共和国政府的领导下，为加速社会主义的建设正在进行看热情的劳动，在工业、农牧业等各个战线上都获得了重大的成就。特别是农牧业合作化的迅速完成，更为进一步发展国民经济和提高人民物质文化生活创造了极为有利的条件。中国人民对于兄弟的蒙古人民所获得的各项成就感到欢欣鼓舞。"},{"type":"paragraph","text":"一年来，中蒙两国人民间的亲密友谊和互助合作又有了新的发展。这种友谊和合作将进一步促进我们两国社会主义建设事业的共同高涨并有助于加强以苏联为首的社会主义阵营的团结和保卫亚洲"},{"type":"paragraph","text":"毛泽东等祝贺蒙古人民革命胜利三十八周年的电报和世界和平的斗争。"},{"type":"paragraph","text":"祝蒙古人民共和国繁荣富强，祝中蒙两国人民的牢不可破的兄弟友谊更加巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1959年7月10日"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":181,"page_end":182},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7a9513a28"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
