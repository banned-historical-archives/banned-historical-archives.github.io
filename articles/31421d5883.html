art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"批修尖兵阮仁才","authors":["红心"],"parts":[{"type":"paragraph","text":"“小阮身在炊事班，国家大事装心间，批修斗争冲在前，批判文章篇连篇。”"},{"type":"paragraph","text":"共青团员阮仁才，是三机连的炊事员。他热爱本职工作，饭菜做得香甜，但他并不以此为满足。他认为，要做一个在毛主席革命路线指引下，积极为实现共产主义而奋斗的战士，才够得上是名副其实的共青团员。当反击右倾翻案风的号角吹响以后，他认真学习报刊上发表的文章，看清了这是无产阶级和资产阶级的生死大博斗。他说，我是一个共青团员，要用实际行动保卫无产阶级文化大革命的伟大成果，保卫毛主席的革命路线。他多次向团支部书记请战，主动挥戈上阵。工作忙，学习时间少，他就发扬雷锋的“钉子”精神，挤时间学理论，掌握批修武器，有时还边干活边思考，打好腹稿。烧火时，他一手拿煤铲，一手拿钢笔，添上一铲煤，写上一段批判稿。遇到难点一时攻不下来，他就趁开饭时间向班排理论骨干请教。假日和业余时间，他都用到了学习和批判上。"},{"type":"paragraph","text":"几个月来，共青团员阮仁才怀着强烈的无产阶级义愤，发扬顽强战斗的精神，先后写出《“三项指示为纲”是彻头彻尾的修正主义纲领》等许多篇批判文章。批判会上，经常都可以听到他怒斥邓小平修正主义路线的响亮声音。同志们都称赞他：“做饭是能手，批修是尖兵！”（红心）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31421d5883"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
