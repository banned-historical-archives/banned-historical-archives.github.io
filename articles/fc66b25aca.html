ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"复班禅额尔德尼电","alias":"","parts":[{"type":"paragraph","text":"复班禅额尔德尼\"电"},{"type":"paragraph","text":"（1957年6月14日）亲爱的班禅额尔德尼："},{"type":"paragraph","text":"你在庆祝和平解放西藏六周年的时候，拍给我的电报收到了。对你的祝贺，致以谢意。"},{"type":"paragraph","text":"西藏在和平解放以来的六年期间，已经取得了许多重要的成绩。但是建设西藏还是有不少困难的，希望你根据西藏的实际情况，协助达赖喇嘛领导、团结各方面的爱国进步的力量，一道前进，在执行协议十七条、建设西藏的工作中作出更好的贡献。"},{"type":"paragraph","text":"祝你身体健康！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五七年六月十四日"},{"type":"paragraph","text":"[1]班禅额尔德尼，即班禅额尔德尼·确吉坚赞，西藏宗教领袖之一，当时任政协全国委员会副主席、西藏自治区筹备委员会第一副主任委员。"},{"type":"paragraph","text":"[2]达赖喇嘛，即达赖喇嘛·丹增嘉措，西藏宗教领袖之一，当时任全国人大常委会副委员长、西藏自治区筹备委员会主任委员。"},{"type":"paragraph","text":"[3]指1951年5月23日在北京签订的《中央人民政府和西藏地方政府关于和平解放西藏办法的协议》，共有17条。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":6,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":129,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc66b25aca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
