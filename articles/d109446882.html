rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"到处兜售赫鲁晓夫修正主义货色","authors":[],"parts":[{"type":"paragraph","text":"新华社莫斯科二十七日电 最近出版的《乌克兰共产党人》、《乌兹别克共产党人》、立陶宛共和国《共产党人》、《摩尔达维亚共产党人》和《爱沙尼亚共产党人》等杂志，都转载了苏共中央杂志《政治自学》去年十二月发表的题为《马克思列宁主义关于党的学说及其在苏共纲领中的发展》的学习提纲，向苏联人民兜售赫鲁晓夫修正主义货色，推销反华文件。"},{"type":"paragraph","text":"上述杂志转载的学习提纲的第三部分写道，“苏联共产党在为国际共产主义运动中的团结而斗争的作用在苏斯洛夫一九六四年二月十四日在苏共中央全会上的报告中得到了阐明，其中包括第五部分”。苏斯洛夫报告的第五部分是关于所谓“中共领导人对苏共纲领的攻击”，其中百般为苏共二十二大通过的苏共纲领辩护，宣扬“全民党”、“全民国家”等谬论，同时对中国共产党对上述修正主义观点的正确批判进行了攻击。"},{"type":"paragraph","text":"立陶宛共和国《共产党人》在今年一月号的“宣传员辅导”栏内除了转载了上述学习提纲外，还把反华文集《争取国际共产主义运动的团结》和苏斯洛夫的反华报告列为学习的参考书。RW：赫鲁晓夫"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d109446882"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
