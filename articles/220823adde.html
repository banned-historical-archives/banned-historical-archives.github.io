tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为建立一支红彤彤的无产阶级文艺队伍而奋斗","authors":["第二炮兵星火文工团文革筹委会"],"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席一九六三年十二月十二日关于文学艺术的光辉批示，像一面威力无穷的照妖镜，把陆定一、周扬之流及其总后台中国赫鲁晓夫极力推行的一条又粗又长的反革命修正主义文艺黑线，暴露在光天化日之下。十七年来，文艺界在这条黑线控制下，封建主义、资本主义、修正主义的黑货到处泛滥，帝王将相、才子佳人塞满舞台。在文化领域内敌人专了我们的政。正当文艺界的牛鬼蛇神横行霸道之际，我们敬爱的江青同志最无畏地捍卫了毛主席的革命文艺路线，同敌人进行了坚决的斗争。她亲自领导无产阶级革命文艺战士，披荆斩棘，创造出八个金光灿烂的革命样板戏，把帝王将相、才子佳人统统赶下了舞台，为无产阶级新文艺树立了光辉的典范。这是毛泽东思想的伟大胜利！是毛主席革命文艺路线的伟大胜利！"},{"type":"paragraph","text":"无产阶级文化大革命的急风暴雨，冲垮了中国赫鲁晓夫和在他支撑下的阎王殿，但这些被打倒的敌人，他们人还在心不死，正象“冻僵的毒蛇”，“落水的疯狗”，时刻在窥测方向，伺机反扑。我们必须百倍警惕，增强斗志，继续扩大战果，夺取新的胜利。"},{"type":"paragraph","text":"最近，伟大领袖毛主席发出要斗私，批修的伟大号召，为我们彻底批判修正主义文艺黑线，实现文艺工作者的思想革命化，指出了光明大道。我们一定认真贯彻执行毛主席的伟大指示，用战无不胜的毛泽东思想彻底夺我们头脑中“私”字的权，彻底埋葬反革命修正主义文艺黑线，誓死保卫毛主席，誓死保卫毛泽东思想，誓死保卫毛主席的革命文艺路线。"},{"type":"paragraph","text":"今天，重新学习毛主席的批示，更加激励我们戒骄戒躁，乘胜前进！我们要以“斗私，批修”为纲，进一步搞好革命的大批判和本单位的斗、批、改，大树特树毛主席的绝对权威，大树特树毛泽东思想的绝对权威，大树特树毛主席革命路线的绝对权威，让伟大的毛泽东思想统帅我们生命的每一秒钟，为建立一支红彤彤的无产阶级文艺队伍而奋斗！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"220823adde"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
