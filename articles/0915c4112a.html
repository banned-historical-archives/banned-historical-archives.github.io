学生坚持斗争英勇抗击警察的镇压","authors":[],"dates":[{"year":1969,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对反动腐朽的资产阶级教育制度"},{"type":"paragraph","text":"日本进步中学生斗争日益发展和扩大"},{"type":"paragraph","text":"东京青山中学等学生坚持斗争英勇抗击警察的镇压"},{"type":"paragraph","text":"新华社二十三日讯  据东方通讯社报道：日本的进步高中学生起来反对反动腐朽的资产阶级教育制度的斗争，正在日益发展和扩大。"},{"type":"paragraph","text":"东京日比谷中学的进步学生自从十月初以来一直坚持斗争，反对腐朽的资产阶级教育制度。最近，学校当局又拒绝接受学生们的正当要求。愤怒的学生二十二日把课桌、凳子和橱柜堆积起来，在学校大楼的走廊里设立障碍物，封锁了九个教室。学校当局非常害怕，不得不宣布关闭学校。"},{"type":"paragraph","text":"东京竹早中学的学生要求改革考试制度，他们在二十二日举行了集会，决定举行不定期的罢课。"},{"type":"paragraph","text":"从今年九月就封锁了学校大楼的东京青山中学进步学生，仍在继续坚持斗争。他们在二十一日用石块和燃烧瓶英勇抗击了用催泪弹和高压水龙前来镇压他们的两百名警察。"},{"type":"paragraph","text":"到二十二日为止，仅在东京一地，学校大楼被学生封锁的中学有七所，由于学生斗争而停课的中学有五所。在神奈川、千叶、长野、静冈等县，高中学生的斗争也正在相继兴起。"},{"type":"paragraph","text":"近年来，佐藤反动政府竭力加强对高中学生的控制，向学生灌输腐朽的资产阶级思想，镇压学生的政治活动，妄图把中学生变成为美日反动派的侵略政策和战争政策服务的驯服工具。但是，自去年以来，在日本大学生斗争的鼓舞下，日本进步的中学生相继奋起斗争，反对腐朽反动的资产阶级教育制度，反对美日反动派的罪恶统治，反对日美“安全条约”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0915c4112a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
