,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"自从去年开始，许多作曲家将毛主席诗词谱写成歌曲在报刊上发表以来，深受广大群众的喜爱。春风文艺社为了适应广大群众的喜爱，特将这些歌曲加以编辑，出版了一本“毛主席诗词歌曲选”。其中收集了“蝶恋花”“黄鹤楼”“沁园春”“念奴娇”等二十余首歌曲。这些歌曲在一定程度上体现了毛主席诗词中的革命现实主义与革命浪漫主义的精神，并具有浓厚的民族风格及雄伟气魄，而且这些歌曲都写得深入浅出，容易演唱，能为一般音乐爱好者所接受。(浦)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c8d363f41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
