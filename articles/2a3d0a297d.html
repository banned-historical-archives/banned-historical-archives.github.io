al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"各兵团目前的工作方针","alias":"","parts":[{"type":"paragraph","text":"各兵团目前的工作方针！"},{"type":"paragraph","text":"（1936年5月5日）"},{"type":"paragraph","text":"以十天为教育部队、总结经验及准备新行动的时间。各部队依照自己的情况，立即定出军事教育、政治教育、整理组织及总结在山西作战经验的具体办法。政治上解释与鼓动的基本口号：反对卖国贼蒋介石捣乱抗日后方，粉碎卖国贼对陕甘宁苏区的进攻，猛烈扩大抗日根据地陕甘苏区，争取迅速对日作战。在十天内由军委召集一次方面军以上干部大会，由军团及军召集一次庆祝胜利并追悼刘志丹同志大会。"},{"type":"paragraph","text":"[1]这是毛泽东和彭德怀关于工作方针致各兵团首长电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":5,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":404,"page_end":404},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a3d0a297d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
