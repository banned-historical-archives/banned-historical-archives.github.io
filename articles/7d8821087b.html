tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热情歌颂中国人民的伟大领袖毛主席","authors":[],"parts":[{"type":"paragraph","text":"这首诗的全文如下："},{"type":"paragraph","text":"全世界被压迫人民的救星和引路人"},{"type":"paragraph","text":"今天，另一个太阳升起在东方，"},{"type":"paragraph","text":"全世界称他是红色革命的太阳，"},{"type":"paragraph","text":"他光芒四射，穿破黑暗和阴霾，"},{"type":"paragraph","text":"把暴虐的统治从他国土上的每个角落一扫而光。"},{"type":"paragraph","text":"他给全世界上了一堂闹革命的课，一堂争取自由、进步、繁荣和旺盛的课。"},{"type":"paragraph","text":"他把亚洲变成了埋葬帝国主义黑暗统治的地方，"},{"type":"paragraph","text":"在他自己的国家里，他使人民当家作主把权掌。"},{"type":"paragraph","text":"太阳就是毛泽东，他正义凛然，"},{"type":"paragraph","text":"把全世界一切虚伪和谬误的东西统统戳穿。"},{"type":"paragraph","text":"啊，被压迫世界的救星和引路人，"},{"type":"paragraph","text":"啊，治愈世界各国人民精神弊病的良医和领袖，"},{"type":"paragraph","text":"我国的劳动人民向您致敬，"},{"type":"paragraph","text":"寻求真理的人向您致敬。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d8821087b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
