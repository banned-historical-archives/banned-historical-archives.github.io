art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全心全意依靠工人阶级坚决走自力更生的道路","authors":["海军某部驻上海沪东造船厂毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"毛主席最近深刻教导我们：“无产阶级文化大革命的斗、批、改阶段，要认真注意政策。”“在订计划的时候，必须发动群众，注意留有充分的余地。”毛主席的最新指示字字句句都说到了我们心坎上，我们和沪东造船厂全体革命职工无不欢欣鼓舞，大家坚决表示：一定要为毛主席争气，为祖国争光，狠抓革命，猛促生产，夺取我国造船工业的新胜利！"},{"type":"paragraph","text":"毛主席教导我们：“必须全心全意地依靠工人阶级”。我们在支左斗争实践中深深体会到：广大工人群众最听毛主席的话，对毛主席最忠，在用毛泽东思想武装起来的工人阶级面前什么人间奇迹都能造出来。过去，沪东造船厂的领导大权被一小撮叛徒、特务、死不悔改的走资派所把持，打击和镇压工人的革命积极性。在无产阶级文化大革命中，工人阶级夺回了大权，使革命、生产出现了前所未有的大好景象。去年九月份，全厂派出了一千多人参加工人毛泽东思想宣传队，人员少了，照过去的情况，全年生产计划是完不成的。但是用毛泽东思想武装起来的工人阶级，根本不把困难放在眼里，大家豪迈地说：“完不成任务就是对毛主席不忠，今年的任务我们包下来了。”他们不仅逐项研究完成生产任务的措施，还派出毛泽东思想宣传队到生产配件的兄弟厂去宣传毛主席关于“抓革命，促生产”的伟大方针，大搞技术革命，解决了生产中的一系列关键问题，提前完成了全年生产计划，创造了历史上最高纪录。"},{"type":"paragraph","text":"在无产阶级文化大革命中，这个厂的工人群众夺回了技术领导大权，在厂革委会领导下，成立了工人、革命干部、技术人员三结合设计小组，大搞新产品、新项目的技术革新，他们在一无资料，二无器材的情况下，大学毛主席的“我们的方针要放在什么基点上？放在自己力量的基点上，叫做自力更生”的伟大教导，狠批大叛徒刘少奇的“爬行哲学”、“洋奴思想”，越学决心越大，越批志气越高。他们先后走访了许多单位，开了多次调查会、座谈会，经过五十多次试验，终于成功地制成了我国第一台半导体弯管机。把过去用人工操作的、占用劳力很大的弯管工序改成自动化操作，提高了工效几十倍。去年，全年实现重大技术革新项目三百多项，把过去的生产水平远远丢在后面。"},{"type":"paragraph","text":"无数事实说明，用毛泽东思想武装起来的我国工人阶级具有无穷无尽的创造力，只要我们坚决贯彻毛主席“工人阶级必须领导一切”的伟大教导，全心全意地依靠工人阶级，就一定能够攀登世界科学技术高峰，夺取我国工业战线的新胜利！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a600d8776"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
