r":1967,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"楼俊宝"},{"type":"paragraph","text":"我是一个老年职工，在旧社会吃尽了资本家的苦头，是毛主席和共产党领导我们起来革命后，才当家作主的。十七年来，我们同拿枪的敌人和不拿枪的敌人进行斗争，从来没有间断过。我们商店最大的老吸血鬼，也还是在这次文化大革命中被革命群众打倒的。而十七年来为资本家撑腰、替资本家讲话的最大后台原来就是党内头号走资本主义道路的当权派。真不由我怒火中烧!"},{"type":"paragraph","text":"我们老年职工是历史的见证人。我十三岁就进一家小店学生意。旧社会的职业是从来没有保障的，因此转过好几家商店，最后才到了旧上海赫赫有名的永安公司。永安公司的店虽大，这碗饭却更不容易吃。"},{"type":"paragraph","text":"大资本家也好，小店老板也好，统统都是靠吮吸职工血汗养肥的。我在小店学生意，学来学去是生炉子、抱小孩，只能养活自己。到了永安大店后，为了养家活口，我只好把一顿中饭吃得多一些，晚上回家少吃些，用这个办法来维持一家老小的生活。长期如此，使我至今留下了严重的胃病。毒草影片《林家铺子》却颠倒黑白，为剥削者叫起苦来，这是党内一小撮走资本主义道路当权派的一个大阴谋，必须戳穿他们的阴谋，铲除这株毒草。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e0167b504"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
