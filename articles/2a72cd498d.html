tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"怎样组织部队学好毛泽东著作？","authors":[],"parts":[{"type":"paragraph","text":"自从部队深入开展四项基本原则教育，学习贯彻《决议》以来，干部战士增强了学习毛泽东著作的自觉性。但是，怎样组织部队学好毛泽东著作？一些同志存在着“老办法不敢用，新路子不敢闯”的现象。而要解决这个问题，对过去学习的经验教训必须实事求是地加以总结，既不能因为林彪、“四人帮”干扰破坏所造成的不良影响，就把一些适用的方法全盘加以否定；也不能因为某些学习经验和方法习惯了，就不加分析地全部承袭。"},{"type":"paragraph","text":"反对实用主义，坚持理论联系实际的原则。"},{"type":"paragraph","text":"反对形式主义，坚持必要的学习形式和学习制度。"},{"type":"paragraph","text":"反对“两个凡是”、“句句照办”，认真学习和运用毛泽东思想的立场、观点、方法。"},{"type":"paragraph","text":"（福州部队政治部秘书处政研科）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a72cd498d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
