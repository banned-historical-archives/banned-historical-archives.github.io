<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央公安部对各地发生抢粮暴动事件处理的指示","authors":[],"dates":[{"year":1950,"month":4,"day":27}],"is_range_date":false,"parts":[{"text":"中央公安部对各地发生抢粮暴动事件处理的指示","type":"title"},{"text":"（一）近月来各地在征粮、护粮工作上虽获得了伟大成绩。但由于少数干部思想仍然麻痹，产生某些违犯政策的恶劣作风。加以某些地区灾情严重，则被逼死人，使得敌人钻了空子。各地都有发生煽动抢粮暴动事件，使我受到不应有的损失。据现有材料统计，一、二、三月份共发生一五零起。涉及一、二个省，六十三个县，参加人数计一四六、二三六人，损失公粮九、三一二、四五零斤（另西方南损失粮一亿余斤未统计在内），少交七八、二五零斤，食盐一万包（其他另是损失未统计在内）。按行政区划分计：华东四九起，中南五一起，西南二起，华北三起；按月份计：一月份九起，二月份四一起，三月份五五起。按暴动的性质计：会道门暴抢五起，土匪裹胁群众抢案三十七起，特务煽动群众抢六三起，其中以灾重自发抢粮者占绝少数（只苏北扬州、皖北凤台等地）。按地区计：新区四八起，灾区五零起，老区三起，沿海四起。","type":"paragraph"},{"text":"（二）根据各地经验，首先必须堵塞漏洞，事先防止问题的发生，即应深入的教育各级干部，特别是中下级干部，提高政治警惕性，纠正麻痹思想，足够的认识敌人垂死换气，无扎不入的破坏活动，并加强侦察工作与群众工作。这样许多问题事先是会发现的，使干部懂得掌握贯彻政策的重要性。各级领导机关应深入检查与纠正执行政策中的各种偏向，下层组织（村干、民兵）应逐步的加以整理与审查，清理不良份子，严密组织，只有把主观上的漏洞堵塞，方能巩固阵地和敌人斗争。","type":"paragraph"},{"text":"（三）一旦问题发生，必须详细分析事件性质，如系反革命暴动捣乱，则应明确中央关于镇压反革命份子的决定，对策动份子予以镇压。但严禁乱打、乱杀的偏向，以打击敌人教育群众，对胁从的群众不得无故伤害。同时应广泛的宣传反革命的阴谋，使群众明白是非切勿上当。护粮护食仍是今后保卫国家财产，保障军队供给的重大任务。必须配备足够的武装警戒，但又须与群众保护国家财产结合起来。生产、救灾必须按照政务院内务部历次指示执行。特别设有粮食库地方应首先做好，以免敌人有机可乘。以上望各地参考执行。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69b6275ee1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
