rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做执行毛主席革命路线的好样子","authors":["团政委华振林"],"parts":[{"type":"paragraph","text":"要把我军真正办成毛泽东思想的大学校，使我军永远按照毛主席的建军思想、建军路线胜利前进，我们领导干部首先要带头活学活用毛主席著作，活学活用“老三篇”和古田会议决议，带头改造世界观。要用毛主席的建军思想、建军路线指导我们的一切行动。《解放军报》元旦社论号召我军领导干部，要在贯彻和保卫毛主席的革命路线上做出好样子，这就是要求我们一定要把毛主席的革命路线印在脑子里，化为自觉的行动，把部队带成永远忠于毛主席、忠于毛泽东思想的革命军队。"},{"type":"paragraph","text":"团政委 华振林"},{"type":"paragraph","text":"毛主席的建军路线是在同资产阶级反动的建军路线斗争中发展起来的。毛主席教导我们：“凡是反动的东西，你不打，他就不倒。”我们要坚决地贯彻毛主席的无产阶级革命路线，就必须坚持和资产阶级反动路线作斗争。在这方面，领导干部负有重要的责任。我们领导干部对贯彻毛主席的革命路线，一定要有最高的自觉性；对抵制和反对资产阶级反动路线，一定要有最高的坚定性。我们一定要永远以古田会议决议作为指路红灯，带领部队坚定不移地沿着毛主席的革命路线前进。"},{"type":"paragraph","text":"团长 李继雷"},{"type":"paragraph","text":"贯彻毛主席的革命路线，最根本的就是要用毛泽东思想武装干部战士的头脑，而领导干部又首先要学好用好毛主席著作，用毛泽东思想改造自己的灵魂。领导干部必须正确认识自己，既把自己当作革命的一份力量，又把自己当作革命的对象。要深入到群众中去，做群众的小学生，老老实实地和战士一起活学活用“老三篇”，带头亮思想，带头斗私心，把自己放在群众的“炼钢炉”里熔炼。自己首先炼红炼硬，才能带领部队炼红炼硬。"},{"type":"paragraph","text":"团参谋长 张仕仪"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2a0d28952"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
