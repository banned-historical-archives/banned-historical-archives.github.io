tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想给我最大的勇敢","authors":["海军北海舰队航空兵某部排长王守金"],"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席说：“我们的干部要关心每一个战士，一切革命队伍的人都要互相关心，互相爱护，互相帮助。”“为人民利益而死，就比泰山还重”。毛主席的教导，我们学了就要用，就是要句句照办，字字照办。"},{"type":"paragraph","text":"去年十一月二十四日，我们站进行手榴弹实弹投掷。我要求担任安全保险员。有的战士开玩笑说：“排长，如果有人手榴弹投不出去怎么办？”我说：“只要党需要我，在危急时刻，我一定要象王杰、王裕昌那样。”投弹中，我时刻想着毛主席的教导：“我们的干部要关心每一个战士”、“对工作的极端的负责任”，认真地检查和辅导战士们每一个投弹动作。"},{"type":"paragraph","text":"投弹一直顺利地进行着。十二点二十五分，突然发生了一个意外的情况。刚从炊事班做完饭换下来的炊事员李冠金，投弹时，不慎将拉了导火线的手榴弹掉在掩体里，他一时楞住了，手榴弹在地上旋转着，嗤嗤地直冒青烟，眼看就要爆炸了。李冠金和掩体附近十多名阶级兄弟的生命安全严重地受到威胁。在这万分紧急时刻，毛主席“为人民利益而死，就比泰山还重”的教导又在我耳边响起。王杰、刘英俊、王裕昌的英雄形象出现在我的面前。于是，我一步窜过去，左手把李冠金推倒在我身后，右手去抓地上冒着青烟直打转转的手榴弹。这时，只听有人在喊：“快离开！快离开！”当时在掩体旁有一个凹坑，如果我跳进去，自己完全可以脱险。但是想到毛主席的教导：“关心他人比关心自己为重”，想到来自五湖四海的阶级兄弟的生命安全，我脑子里只有一个念头：“宁肯牺牲自己，也要抢救战友”。由于手榴弹旋转很快，第一次没抓到手，我又第二次去抓，刚刚抓起来没等我扔出去，手榴弹在我手掌里爆炸了……。"},{"type":"paragraph","text":"我虽然被炸断了一只右手，炸伤了一只右眼，左腿负伤十多处，但是换来阶级兄弟的生命安全，这就是我最大的幸福。我深深体会到，只要活学活用毛主席著作，学用结合，立竿见影，就能一不怕苦，二不怕死，完全彻底为人民服务。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"502af6d4e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
