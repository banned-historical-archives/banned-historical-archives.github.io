<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"超级大国对第三世界的剥削和掠夺","authors":[],"dates":[{"year":1974,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"超级大国对第三世界的剥削和掠夺"},{"type":"paragraph","text":"广大的第三世界国家有着勇敢勤劳的人民，广阔的土地和丰富的资源。但由于帝国主义、殖民主义、特别是超级大国的剥削和掠夺，第三世界国家还远没有能够摆脱它们长期以来的贫穷状况。"},{"type":"paragraph","text":"超级大国掠夺和剥削第三世界的一个重要手段，是通过私人直接投资和政府的所谓“援助”，对发展中国家实行政治上的控制和经济上的掠夺。"},{"type":"paragraph","text":"美国垄断资本在发展中国家的投资，到一九七二年底，总额累计已经达到二百五十二亿美元。单是在一九七二年，美国从第三世界获得的利润总额就达到五十一亿美元。美国通过附有苛刻条件的所谓“援助”推销军火和商品，通过贸易上的不等价交换和美元贬值等，使第三世界国家的经济受到很大的损害。"},{"type":"paragraph","text":"苏修社会帝国主义也以提供“经济技术援助”和“军事援助”为名，向第三世界兜售陈旧过时的机器和军火，掠夺第三世界资源，同美国争夺第三世界。据苏修对外经委头目供认，苏修通过所谓“经济援助”从第三世界掠夺到的有：有色金属精矿、石油、天然气、长纤维棉花、天然橡胶、皮料、油料、可可豆、大米、茶叶、咖啡、热带水果和其他生活必需品。"},{"type":"paragraph","text":"超级大国掠夺和剥削第三世界的另一个重要手段，是贱买贵卖，竭力压低第三世界的农矿产品价格，不断抬高向第三世界出售的工业制成品价格，在国际贸易中大肆剥削第三世界国家。发展中国家在对外贸易中由于不等价交换而蒙受的损失，从一九六○年到一九七二年，总额达到一千零三十四亿美元，平均每年损失七十九亿美元以上，其中很大一部分是超级大国造成的。"},{"type":"paragraph","text":"超级大国在同发展中国家的贸易中获得了巨额顺差。从一九五八年到一九七三年的十六年中，美国对发展中国家的贸易顺差共达二百八十一亿美元，平均每年达十七亿多美元。苏修对发展中国家的贸易顺差也日益增加，一九六五年为二亿七千六百万卢布，一九七二年增加到六亿六千四百万卢布（约合九亿七千万美元）。"},{"type":"paragraph","text":"主要由于两个超级大国的剥削和掠夺，给发展中国家的民族经济造成严重的困难。据估计，发展中国家的外债在过去十年中增加了三倍，总额已经超过八百亿美元。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2da9d1f1a9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
