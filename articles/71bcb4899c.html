","重庆"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"群芳会（讽刺诗）","type":"title"},{"text":"重庆孟叔杰","type":"authors"},{"text":"[编者按：孟叔杰，31岁，旧职员成份。现在纺职站工作。在“紫藤”“胭脂”两首诗里，他把靠拢党的积极分子和进步人士诬蔑为只会吹牛拍马谄媚逢迎。以图个人升官发财的小人。在“腊梅”一诗里，表达了右派分子对党、对人民的“孤傲”敌对情绪。]","type":"appellation"},{"text":"（1）紫藤（赠给向上爬的）","type":"paragraph"},{"text":"不结甜果不开花，却与各花竞芳华，","type":"paragraph"},{"text":"只须学会“登高术”，便可年年往上爬。","type":"paragraph"},{"text":"（2）胭脂（赠给謟上者）","type":"paragraph"},{"text":"未笑先颦最有情，万媚千娇一枝香，","type":"paragraph"},{"text":"盈盈袅袅风前柳，惹得“骚人”怪可怜！","type":"paragraph"},{"text":"（3）腊梅（赠给孤傲者）","type":"paragraph"},{"text":"独傲寒暑与天时，不爱嫣红爱枯枝，","type":"paragraph"},{"text":"有谁识我冰霜志，孤茅唯有自心知。","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第二集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71bcb4899c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
