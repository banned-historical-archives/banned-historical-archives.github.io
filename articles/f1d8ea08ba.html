ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"接受阿尔巴尼亚驻华大使斯蒂·纳赛呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受阿尔巴尼亚驻华大使斯蒂·纳赛"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1954年9月13日）大使同志："},{"type":"paragraph","text":"我非常愉快地接受您所呈递的阿尔巴尼亚人民共和国人民议会主席团任命您为驻中华人民共和国首任特命全权大使的国书，并衷心地感谢您的祝贺。"},{"type":"paragraph","text":"阿尔巴尼亚人民是勤劳勇敢的人民，它具有光荣的革命的历史传统。阿尔巴尼亚人民解放后十年来，在阿尔巴尼亚劳动党的领导下，粉碎了国内外敌人的一切破坏阴谋，满怀信心地建设着自己的美好生活，并取得了光辉的成就。阿尔巴尼亚人民在社会主义建设和捍卫祖国的独立和安全的斗争中所表现的爱国主义精神和无比的劳动热情，使中国人民感到钦佩。"},{"type":"paragraph","text":"中、阿两国人民在历史上第一次建立了友好的外交关系。五年来，我们两国人民已结成了兄弟般的友谊。我深信：在互派大使之后，我们两国之间的真诚的友好合作关系必将获得进一步的发展，这不但有利于我们两国人民幸福的增进，并有助于以苏联为首的世界和平民主力量的加强。"},{"type":"paragraph","text":"大使同志，我热烈地欢迎您出任阿尔巴尼亚人民共和国驻中华人民共和国的首任特命全权大使。在您为巩固中、阿两国友好合作毛泽东全集第三十四卷的工作中，您将得到我和中华人民共和国政府的全力支持。"},{"type":"paragraph","text":"我谨祝您在工作中获得完全的成功。1954年，毛泽东在北京。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":233,"page_end":234},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1d8ea08ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
