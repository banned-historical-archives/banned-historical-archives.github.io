<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1977,"month":8,"day":3}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"英国革命共产主义同盟祝贺我党三中全会召开","authors":[],"parts":[{"type":"paragraph","text":"中国共产党中央委员会："},{"type":"paragraph","text":"英国革命共产主义同盟在最近胜利召开的成立大会上，一致通过如下决议："},{"type":"paragraph","text":"“英国革命共产主义同盟（前英国共产主义联盟〔马列〕和共产主义团结协会〔马列〕）成立大会向伟大的中国共产党和中央委员会主席华国锋同志致以最热烈的祝贺。我们热烈欢迎中国共产党十届三中全会取得的胜利。我们完全确信，中国共产党和中国人民遵循马克思主义、列宁主义、毛泽东思想，在社会主义革命和社会主义建设中将取得更大的胜利。”"},{"type":"paragraph","text":"我们谨代表新建立的英国革命共产主义同盟中央委员会，对中国共产党十届三中全会关于追认华国锋同志任中国共产党中央委员会主席的决议表示热烈欢迎。华国锋同志是一位英明果断的好领袖。他办事，我们也同样放心，不仅如此，我们还感到欢欣鼓舞，非常乐观。"},{"type":"paragraph","text":"我们支持中国共产党中央委员会经过认真讨论，按照毛主席的革命路线和干部政策所作出的关于恢复邓小平同志一切职务的英明和旗帜鲜明的决议。“四人帮”对邓小平同志的打击、诬陷确实是他们夺权阴谋的重要组成部分。我们确信，邓小平同志必将遵循毛泽东思想，对中国革命和反修斗争进一步作出宝贵的贡献，必将对华主席为首的中国共产党的集体领导贡献力量。"},{"type":"paragraph","text":"我们热烈欢迎中国共产党十届三中全会关于开除“四人帮”党籍的决议。“四人帮”不仅有一条极右路线，他们还以极其危险的方式搞阴谋诡计。把他们清除出党是完全正确的。"},{"type":"paragraph","text":"中国共产党十届三中全会决定在今年晚些时候召开中国共产党第十一次（全国）代表大会，我们热切地期待这次大会的召开。"},{"type":"paragraph","text":"中国人民群众热情欢庆十届三中全会。我们确信，正如这次全会公报坚定地表示的那样，中国党和中国人民以阶级斗争为纲，抓纲治国，必将在社会主义革命和社会主义建设中取得更大的胜利。"},{"type":"paragraph","text":"英国革命共产主义同盟常务委员会"},{"type":"paragraph","text":"一九七七年七月二十七日"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33a8a7feb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
