rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"针对干部活思想选送毛主席语录","authors":[],"parts":[{"type":"paragraph","text":"河南省商城县城关公社紫云山大队革委会成员，在某部支农人员帮助下，自觉地置身于群众之中，同群众一起活学活用毛泽东思想。在学习中，支农人员帮助革委会发动贫下中农，针对干部的活思想选送毛主席语录，帮助干部用毛泽东思想斗私批修，促进思想革命化。革委会主任曾广发，是个新干部，一度滋长了骄傲自满情绪。他带着这个问题，主动到对他意见较多的姜湾生产队去亮私斗私，接受群众的批评、帮助。贫下中农怀着热爱新生的革命政权的感情，选了“虚心使人进步，骄傲使人落后”等几条针对性很强的毛主席语录送给他，鼓励他更好地用毛泽东思想改造自己。曾广发很受感动，经常对照群众送的毛主席语录检查思想，狠斗“骄”字，继续革命的步子迈得更大了。赵湾生产队有四个大队革委会成员，有一段时间，因忙于事务，蹲在大队多，参加集体生产劳动少。贫下中农察觉了这个苗头，就及时给他们送去了毛主席关于“必须坚持干部参加集体生产劳动的制度”的教导。支农人员立即帮助革委会认真研究了群众的意见，确定实行大队干部轮流值班制，每天除留一人主持日常工作外，其他干部都下到生产队去，坚持劳动在生产队，学习在生产队，工作在生产队。第二天一早，干部们就冒着霜寒，带头下地劳动。贫下中农满意地说：“干部这样做，我们就放心了。” （县革委会、人武部通讯组）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7101a058bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
