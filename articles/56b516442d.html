tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入阐释毛泽东思想的精神实质和当代价值凝聚坚持和发展中国特色社会主义的强大力量","authors":["隋笑飞"],"parts":[{"type":"paragraph","text":"刘云山指出，毛泽东思想是马克思列宁主义在中国的创造性运用和发展，是关于中国革命和建设的正确理论原则和经验总结，是中国共产党集体智慧的结晶，将永远激励党和人民奋勇前进。新形势下深入研究毛泽东思想，要把历史、现在和未来结合起来，科学总结我们党90多年波澜壮阔的奋斗历程和历史经验，坚定在中国特色社会主义道路上实现中华民族伟大复兴的中国梦的信念和信心。要正确把握马克思主义中国化两大理论成果的关系，深刻揭示马克思主义中国化的基本规律，在继承和发展中推进党的理论创新。要注重阐释贯穿其中的辩证唯物主义和历史唯物主义，牢牢把握实事求是、群众路线、独立自主这个活的灵魂，更好地用马克思主义立场观点方法观察、分析和处理问题。要坚持以中国的实际问题、以我们正在做的事情为中心，把理论联系实际的关节点放到重大现实问题上来，在研究回答和推动解决问题中取得新的成果。要传承和弘扬党的优良传统和作风，保持和发展党的先进性纯洁性，全面推进党的建设新的伟大工程，为推进中国特色社会主义伟大事业提供有力支撑。"},{"type":"paragraph","text":"刘云山强调，毛泽东思想哺育了一代又一代中国共产党人，学习研究宣传毛泽东思想是党的思想理论建设的一项根本任务，社科理论界肩负着重要责任。有关部门要加强组织协调，把握政治方向、正确导向，充分发挥马克思主义理论研究和建设工程、中国特色社会主义理论体系研究基地、哲学社会科学基金的引领作用，发挥党史、文献、社科研究、党校、高校等部门和单位的主力军作用，调动好各方面研究毛泽东思想的积极性主动性创造性。要坚持与时俱进，拓展研究的内容、形式和方法，更好展示毛泽东思想博大精深的内涵和历久弥新的魅力。"},{"type":"paragraph","text":"中共中央政治局委员、中央书记处书记、中宣部部长刘奇葆主持会议。"},{"type":"paragraph","text":"这次研讨会由中央宣传部、中央党校、中央文献研究室、中央党史研究室、教育部、中国社会科学院、解放军总政治部举办，会议入选论文100余篇，集中反映了近年来毛泽东生平和毛泽东思想研究成果，来自全国各地150多位专家学者在会上进行学术交流。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56b516442d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
