art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"传播真理的《少年》月刊","authors":["晓曼"],"parts":[{"type":"paragraph","text":"一九二二年八月一日，在法国巴黎南区的一个小旅馆里，诞生了一个革命刊物——《少年》。这个小旅馆，当时是旅欧中国共产主义者的中心机关所在地。十六开的油印刊物《少年》，最初是少年共产党的内部刊物，后来是中国共产主义青年团旅欧支部和中国共产党旅欧支部的内部刊物。陈延年、陈乔年同志在这里利用业余时间刻写蜡板，逐张油印。周恩来同志和邓小平同志都曾热心参加刻蜡板和油印的工作。"},{"type":"paragraph","text":"《少年》月刊的主要内容是宣传共产主义，论证中国走共产主义道路的必要性和必然性，捍卫无产阶级专政的理论。《少年》发表了马克思的《法兰西内战》的一部分和列宁的《青年团的任务》，介绍了马克思的生平和学说，刊登了共产国际的文件，报道了世界工人运动、青年运动和中国的青年运动。"},{"type":"paragraph","text":"周恩来同志当时是中国共产主义青年团旅欧总支部书记，也是中国共产党旅欧总支部的领导人之一。周恩来同志经常为《少年》撰写文章，向旅欧的工人和学生灌输马克思主义。他用“伍豪”的笔名在《少年》第二期上发表了《共产主义与中国》一文，肯定中国只有走共产主义道路，才能达到富强。他说：“我们虽是中国人，我们的眼光终须放到全世界上来。”……全世界无产阶级为创造新社会所共负的艰难责任，我们也应分担起来。世界上只有一个共产主义能使这个责任无国界无种界地放在无产阶级的肩上，也只有他能使中国民族得列于人类中间彼此一视同仁。”他告诉人们：“资本主义的祸根，在私有制，故共产主义者的主张乃为共产制，私有制不除，一切改革都归无效。”他阐明无产阶级革命和无产阶级专政的必要性，强调政权不在无产阶级手里，经济就不能真正发展。他说：“一旦革命告成，政权落到劳动阶级的手里，那时乃得言共产主义发达实业的方法。”他号召“永远不许忘掉‘全世界的无产者，团结起来啊’！”"},{"type":"paragraph","text":"《少年》出版一年左右即改名为《赤光》。《少年》和《赤光》对于旅欧的党、团组织和革命者的思想建设有着不可磨灭的功绩。（晓曼）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e48886d4a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
