ors":["周恩来"],"dates":[{"year":1967,"month":9,"day":11}],"is_range_date":false,"parts":[{"text":"周恩来对北京第二外国语学院红卫兵的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"总理联络员王文正同志11日晚11点对二外红卫兵电话传达总理指示：","type":"paragraph"},{"text":"一、有人去印度使馆问题总理已经知道了，并与外交部取得联系，没有中央命令不要随便自己行动，游行示威。","type":"paragraph"},{"text":"二、有关11日下午外交部“九·九”展览一事，你们造了反，和留学生封了展览。封了就封了，以后不要再去了。总理曾派我们几个联络员去外交部了解过这个展览，打了报告交给了总理，总理正在审查。在中央没有正式决定开放与不开放之前，不要去展览会采取什么行动了。","type":"paragraph"},{"text":"三、不要打人，不要抓人。他们封了校，不要去管他，有什么情况及时反映。对“五·一六”可疑分子整理材料上交，由中央处理。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae614094ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
