{"year":1981,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月十一日电　党和国家领导人邓小平、彭真、邓颖超、赵紫阳、王震、韦国清、乌兰夫、方毅、王任重、薄一波，政协全国委员会副主席陆定一，今天会见了参加中国科学院第四次学部委员大会的全体代表。"},{"type":"paragraph","text":"会见之前，邓小平等中央领导同志和大会主席团成员作了亲切交谈，预祝大会圆满成功。"},{"type":"paragraph","text":"参加会见的大会主席团成员(以姓氏笔划为序)有:"},{"type":"paragraph","text":"丁国瑜、马大猷、王大珩、王淦昌、贝时璋、尹赞勋、卢嘉锡、许杰、池际尚、华罗庚、伍献文、李昌、李薰、沈鸿、吴学周、严东生、严济慈、汪猷、汪德昭、张文佑、张文裕、张光斗、张存浩、张钰哲、张稼夫、汤佩松、杨乐、杨廷宝、武衡、陈世骧、陈宗基、周培源、茅以升、金善宝、郑万钧、郁文、柳大纲、查全性、胡克实、侯祥麟、秦力生、钱三强、钱志道、钱学森、涂光炽、唐敖庆、梁栋材、殷宏章、高庆狮、宦乡、黄子卿、黄辛白、黄汲清、黄秉维、黄家驷、曹天钦、谢希德。"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e五月十一日，党和国家领导人邓小平、彭真、邓颖超、赵紫阳、王震、韦国清、乌兰夫、方毅、王任重、薄一波等会见了参加中国科学院第四次学部委员大会的全体代表，并合影留念。"},{"type":"paragraph","text":"新华社记者　杨武敏摄"},{"type":"paragraph","text":"(传真照片)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e杨武敏\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1981\\05\\815C010301.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王任重","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"王震","type":"人物"},{"name":"彭真","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef013ed41b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
