　智利、乌拉圭、玻利维亚工人不断罢工","authors":[],"dates":[{"year":1968,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美帝和本国垄断资本的残酷剥削"},{"type":"paragraph","text":"拉丁美洲各国工人掀起斗争新浪潮"},{"type":"paragraph","text":"阿根廷工人示威　智利、乌拉圭、玻利维亚工人不断罢工"},{"type":"paragraph","text":"新华社十二日讯 阿根廷、智利、乌拉圭、玻利维亚的工人，最近又掀起反对压迫和剥削的斗争浪潮。"},{"type":"paragraph","text":"在阿根廷，具有斗争传统的图库曼糖业工人，十二月三日在图库曼市举行了有一千五百多人参加的街头示威。工人们强烈抗议工厂主用拖欠工资、裁减工人等手段残酷压榨工人。圣菲省比利亚奥坎博市阿尔诺糖厂的工人，十二月四日也在当地市政府大楼前举行示威，抗议工厂主拖欠工资。门多萨省“环球”酿酒厂的工人和职员在十二月四日曾占领了厂房，反对资方长期欠付工资。"},{"type":"paragraph","text":"在智利，铁路、矿业、冶金工业等系统的近七千名工人和职员，从十二月七日到十一日连续举行局部性罢工或不定期罢工，抗议垄断资本对工人的压榨，要求提高工资。"},{"type":"paragraph","text":"今年以来连续开展大规模斗争反对冻结工资和“紧急安全措施”等反动政策的乌拉圭工人，最近几天在首都蒙得维的亚又举行了三十三次罢工。在此以前，印刷工人曾举行四十八小时罢工。"},{"type":"paragraph","text":"玻利维亚由日本垄断资本控制的日东矿业公司的矿工，在十一月下旬开始举行无限期的总罢工，强烈抗议资方顽固拒绝工人们提出的正当要求。"},{"type":"paragraph","text":"阿根廷、智利等国家工人的罢工斗争，是对美帝国主义等外国和本国垄断资本残酷剥削的有力反击。在美帝国主义的掠夺下，这些国家的货币不断贬值，物价不断上涨。以智利为例，到今年十一月底为止，货币已贬值二十多次，物价上涨了百分之二十八点五。据报道，智利工人为强烈抗议垄断资本的残酷剥削而进行的罢工斗争的人次，到今年十一月底就大大超过去年全年的数字。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae42f9dfa0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
