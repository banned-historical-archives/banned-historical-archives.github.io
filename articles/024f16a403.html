[],"dates":[{"year":1986,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沉痛悼念中国卓越的领导人叶剑英"},{"type":"paragraph","text":"一些国家政党领导人发来唁电"},{"type":"paragraph","text":"新华社北京10月30日电　一些国家的政党领导人分别向胡耀邦总书记发来唁电，沉痛悼念叶剑英同志逝世。"},{"type":"paragraph","text":"法国社会党第一书记利奥内尔·若斯潘发来唁电，电文如下："},{"type":"paragraph","text":"“我以社会党和我个人的名义对叶剑英元帅的逝世向您表示诚挚的哀悼。”"},{"type":"paragraph","text":"印度共产党（马克思主义）总书记南布迪里巴德发来唁电，电文如下："},{"type":"paragraph","text":"“我们对中国共产党老一辈的领导人、中国人民解放军卓越的指挥员叶剑英元帅的逝世深感悲痛。"},{"type":"paragraph","text":"“叶剑英同志长期为发展中国革命和建设社会主义中国所作出的卓著功绩是中国当代历史的一个重要组成部分。"},{"type":"paragraph","text":"“我谨代表印度共产党（马克思主义）中央委员会表达我们对他的悼念，并向你和他的家属表示我们诚挚的慰问。”"},{"type":"paragraph","text":"日本自由民主党最高顾问二阶堂进发来唁电，电文如下："},{"type":"paragraph","text":"“惊悉叶剑英元帅阁下逝世，谨代表友好邻邦的自由民主党，表示深切的哀悼。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"024f16a403"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
