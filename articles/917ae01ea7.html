":1962,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席电贺叙利亚国庆"},{"type":"paragraph","text":"新华社16日讯　中华人民共和国主席刘少奇今天打电报给阿拉伯叙利亚共和国总统库德西，祝贺阿拉伯叙利亚共和国国庆。电文如下：大马士革阿拉伯叙利亚共和国总统纳齐姆·库德西阁下："},{"type":"paragraph","text":"值此阿拉伯叙利亚共和国国庆之际，我谨代表中华人民共和国和中国人民，并且以我个人的名义，向阁下和叙利亚人民表示热忱的祝贺。祝中国和叙利亚两国人民之间的友谊日益增进。祝贵国国家繁荣，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"1962年4月16日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"917ae01ea7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
