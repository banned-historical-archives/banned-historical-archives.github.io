尼的工厂停工，交通停顿，市政机关、银行和商店全部关门","authors":[],"dates":[{"year":1969,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资产阶级无理解雇工人"},{"type":"paragraph","text":"意大利许多城市工人举行总罢工"},{"type":"paragraph","text":"罢工使里雅斯特和特尔尼的工厂停工，交通停顿，市政机关、银行和商店全部关门"},{"type":"paragraph","text":"新华社二十六日讯  罗马消息：连日来意大利许多城市的工人举行总罢工和群众集会，抗议意大利垄断资产阶级无理解雇工人，要求保障就业。"},{"type":"paragraph","text":"意大利北部大城市的里雅斯特和中部城市特尔尼的职工二十五日举行总罢工，抗议垄断资本集团无理解雇工人，要求保障就业。罢工使这两个城市的工厂停工，公共交通停顿，政府机关、银行和商店全都关门，这两个城市的学生也举行罢课，表示支持职工的正义斗争。罢工工人和学生在一起举行了抗议游行和集会。"},{"type":"paragraph","text":"中部城市费拉拉和威尼斯省加佛西尔的工人分别在二十四日和二十五日也举行总罢工和群众示威，抗议当地糖厂无理解雇工人。"},{"type":"paragraph","text":"在北部的斯培西亚，一百名工人二十四日占领了液体煤气输送管终点站，抗议这个企业的老板无理解雇工人。"},{"type":"paragraph","text":"二十六日，北部波伦亚的工人举行总罢工，抗议警察当局非法逮捕参加三月五日在波伦亚举行示威的群众，罢工工人还举行了抗议集会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67d47eedca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
