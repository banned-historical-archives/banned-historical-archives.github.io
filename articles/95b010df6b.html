art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"更好地学习毛泽东思想 更好地运用辩证唯物论","authors":[],"parts":[{"type":"paragraph","text":"毛主席常常告诉我们：人类的历史，就是一个不断地从必然王国向自由王国发展的历史。这个历史永远不会完有阶级存在的社会内，阶级斗争不会完结。在无阶级存在的社会内，新与旧、正确与错误之间的斗争永远不会完结。在生产斗争和科学实验范围内，人类总是不断发展的，自然界也总是不断发展的，永远不会停止在一个水平上，因此，得不断地总结经验，有所发现，有所发明，有所创造，有所前进。停止的论点，悲观的论点，无所作为和骄傲自满点，都是错误的。其所以是错误，因为这些论点，不符合大约一百万年以来人类社会发的历史事实。也不符合迄今我们所知道的自然界（例如天体史，地球史，生物史，其他各种自然科学史所反映的自然界）的历史事实。"},{"type":"paragraph","text":"——周恩来总理在三届人大首次会议上作的政府工作报告RW：周恩来讲话；摘要"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95b010df6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
