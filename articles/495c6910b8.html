art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在藏族同胞中传播毛泽东思想","authors":["郭继贤"],"parts":[{"type":"paragraph","text":"本报讯 西藏驻军派出工作队深入农村和牧场，向广大农牧民宣传毛泽东思想。群众热情地赞扬他们是“毛主席派来的宣传员”，“红色种籽的播种人”。"},{"type":"paragraph","text":"参加工作队的同志，身不离毛主席的书，嘴不离毛主席的话，行动不离毛主席的指示。他们翻山涉水深入农村和牧场，展开宣传活动。帮助开办短期训练班，培养学习辅导员。许多人买了毛主席著作和革命书籍送给藏胞。为了普及毛泽东思想，他们还热情帮助文盲群众尽快提高文化水平。广大藏族人民最热爱伟大领袖毛主席，最爱读毛主席的书。工作队所到之处，村村有毛主席语录板，户户有毛主席著作，呈现出一个青年学、壮年学、老人学、儿童学，全家一起学的生动局面。藏族同胞兴奋地说：“毛泽东思想是我们翻身农奴心中的红太阳。”“毛主席的话，句句说到我们的心坎上。”“口袋不装粮食立不起来，人不学毛主席著作站不起来。”"},{"type":"paragraph","text":"毛主席的话威信最高，藏族同胞学了就坚决照办。翻身农奴次仁旺久老大爷，一天在路上拾到七十多元钱，主动送还失主。当失主向他道谢时，他说：“是毛主席教育我这样做的，应该感谢他老人家。”农牧民读了毛主席的书，脑子里“公”字多了，“私”字少了，懂得了种田放羊都是为革命的道理，更加热爱集体。巴郎乡修一条水渠，工程任务很艰巨，部队同志和民工们在工地上学习《为人民服务》、《愚公移山》以后，始终干劲十足，水渠提前竣工，节约一千多个劳动力。 （郭继贤）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"495c6910b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
