rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“私”字少一分对毛主席的忠心多一分","authors":["班长殷才龙"],"parts":[{"type":"paragraph","text":"南京抗大附中两派革命群众组织，由于资产阶级、小资产阶级派性作怪，斗争很激烈。我到了这个学校以后，一派对我很亲热，另一派对我比较冷淡。我决心帮助他们铲除派性，实现革命大联合。我先找对我比较冷淡的一派谈心，谈了三次都毫无效果。第四次找这派头头小董，和他一起学习毛主席最新指示。我说：“毛主席教导我们：‘在工人阶级内部，没有根本的利害冲突。’难道我们革命小将、贫下中农子弟之间还有根本的利害冲突吗？我们可不能搞派性啊！”话没说完，他猛地站起来说：“是我搞派性？”说着拔腿就走，并且转过身来气呼呼地加了一句：“我不跟你谈了！”"},{"type":"paragraph","text":"回来后，晚上翻来复去睡不着，想着毛主席他老人家交给我们的重任，回忆白天和小董谈心的情景：为什么谈不拢呢？我狠挖了根源，是由于自己和他不贴心，是自己有私心。我到校以来，有些感情用事。对我亲热的一派，我就比较热情，对小董他们那一派，我就不太愿多接近。想到这里，毛主席他老人家的教导在我耳边回响：“人民解放军应该支持左派广大群众。”对毛主席的指示学了不用，就是对毛主席的不忠。越想心里越是火辣辣的，深深觉得“私”字多一分，对毛主席的忠心就少一分，自己对不起毛主席他老人家。"},{"type":"paragraph","text":"我怀着对毛主席的忠诚，第五次来到小董家。一见面我就说：“我实在对不起你，对不起毛主席他老人家。和你几次谈话不耐心，都是由于我的‘私’字作怪。”接着，我就彻底地亮了“私”字，请小董批评。小董见我诚心诚意，也感到自己有错，低下了头。我便以亲身体会启发他：我们学了毛主席的最新指示，就要用，学了不用，就是对毛主席不忠！我们俩从旧社会的苦，谈到今天毛主席英明领导的甜。阶级教育，一抓就灵。他激动地说：“毛主席号召我们革命大联合，我却在这里搞派性，口头上讲忠于毛主席，行动上却不按毛主席的指示去做，对不起毛主席对我的培养和教育。”接着，他又严肃地说：“千条理万条理，不紧跟毛主席的伟大战略部署就没有理，不搞革命大联合就是不忠于毛主席。”"},{"type":"paragraph","text":"在这同时，我又给另一派的头头做思想工作。两派很快联合起来了。"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"973a5469f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
