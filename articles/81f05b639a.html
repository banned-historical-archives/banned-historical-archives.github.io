art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"交更时送毛主席语录","authors":["张怀修"],"parts":[{"type":"paragraph","text":"波涛汹涌，海浪滔天。军舰迎着风浪疾速前进。信号兵徐生冬全神贯注地了望着海面。交更时间到了，该向来接更的唐振广同志交什么呢？徐生冬想到：这几天唐振广在值更中有时精力不够集中，要针对这种情况选条语录送给他。"},{"type":"paragraph","text":"徐生冬向走来接更的唐振广说：“毛主席教导我们：‘人民解放军的全体指挥员、战斗员，绝对不可以稍微松懈自己的战斗意志，任何松懈战斗意志的思想和轻敌的思想，都是错误的。’希望你按最高指示去做，坚守战斗岗位。”毛主席的话，给了唐振广极大的教育。他立时检查了自己的麻痹思想，说：“我坚决听毛主席的话，敌人天天在磨刀，我们绝不能放松革命警惕性。”"},{"type":"paragraph","text":"舰上的同志们，执行战备任务中把毛主席的书当做最高指示，在交接更时，针对对方的实际情况，交一条毛主席语录，已经形成了制度，养成了习惯。他们说：“天天值更，天天学习毛主席语录，就好像毛主席天天在身边教导我们一样。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81f05b639a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
