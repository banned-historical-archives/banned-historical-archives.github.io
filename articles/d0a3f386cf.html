art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛主席的指示化为自觉行动","authors":[],"parts":[{"type":"paragraph","text":"对待党分配给自己的工作，应该抱什么态度？老战士郎泽前同志给我们做了很好的回答：哪里去？毛主席挥手我前进！干什么？永做人民的勤务员！怎么干？毛主席咋说我咋办！"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“什么叫工作，工作就是斗争。那些地方有困难、有问题，需要我们去解决。我们是为着解决困难去工作、去斗争的。越是困难的地方越是要去，这才是好同志。”哪里需要哪里去，这是党和人民的要求，是革命全局利益的需要。能不能做到这一点，是对自己是不是无限忠于毛主席的检验。照不照毛主席的指示办事，不在说的好听，而在实际行动。只有把毛主席的指示化为自觉的行动，坚决照办，不折不扣地办，才算得是真正地无限忠于毛主席。"},{"type":"paragraph","text":"我们要象郎泽前同志那样，真正做到坚决服从党和革命的需要，不论到什么地方，不论做什么工作，都能“地方变，条件变，对伟大领袖毛主席的忠心永不变！‘完全’、‘彻底’为人民服务的红心永不变”！"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0a3f386cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
