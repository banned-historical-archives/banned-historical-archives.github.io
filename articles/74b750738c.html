script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"农村中新的资产阶级特权阶层作威作福  苏联广大农民遭受严重剥削","authors":[],"dates":[{"year":1967,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"农村中新的资产阶级特权阶层作威作福"},{"type":"paragraph","text":"苏联广大农民遭受严重剥削"},{"type":"paragraph","text":"据新华社讯　莫斯科消息：苏修领导集团推行全面复辟资本主义的步骤，在苏联农村里形成了一个新的资产阶级特权阶层，苏联农民备受他们的剥削。"},{"type":"paragraph","text":"据苏联报刊透露，在苏联的“集体农庄”里，农庄主席、专家以及其他居领导地位的人员，已经形成一个特权阶层。他们剥削农民的劳动成果，占有比一般农民高十倍到几十倍的收入，享受着“不合理的过高的”报酬。在阿塞拜疆共和国“巴库工人”集体农庄，一九六五年领导人员的平均每月报酬是：农庄主席一千零七十六卢布，总会计七百五十六卢布，总农艺师和总畜牧师各为三百九十一卢布。而农庄庄员的报酬却不到三十八卢布。"},{"type":"paragraph","text":"由于农民受到这样惨重的剥削，庄员对所谓的“集体生产”根本没有兴趣。在白俄罗斯共和国和乌克兰共和国西部各州，农民劳动天数一年不到一百六十天。在布列斯特州平均每个人一年只参加了一百三十八天的“集体生产”。"},{"type":"paragraph","text":"苏联农民、特别是青年不堪剥削和压榨，大批地流入城市。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74b750738c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
