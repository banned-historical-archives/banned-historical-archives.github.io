rs":[],"dates":[{"year":1982,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“文革”中造反干坏事　近几年严重违法乱纪"},{"type":"paragraph","text":"黄岩邮电局长林鉴学被撤职"},{"type":"paragraph","text":"本报讯　据《浙江日报》报道：黄岩县邮电局党委副书记、局长林鉴学，“文革”期间造反，干了一系列坏事，近几年又在经济上严重地违法乱纪。黄岩县委最近已撤销其局党委副书记职务，省邮电局撤销其局长的职务，责令他交代问题。"},{"type":"paragraph","text":"林鉴学原来是杭州大学某造反派的一个头目。“文革”期间，在他的鼓动下，台州地区和临海县层层揪斗、捆绑、吊打老干部，致使有的人成为终身残废。"},{"type":"paragraph","text":"粉碎“四人帮”后，惯于投机钻营的林鉴学以“受压派”自居，不久钻入党内，窃据领导岗位。1981年以来，他滥用职权，采用欺骗、批条子、提供银行帐号等各种手段，支持坏人胡金奎投机倒把活动的公款达5万多元。"},{"type":"paragraph","text":"对于林鉴学的严重问题，群众早有揭发。可是，原黄岩县委的个别负责人却准备提拔他当副县长。省邮电局和调整后的黄岩县委坚决把林鉴学清除出领导班子，这一做法受到广大群众称赞。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"黄岩","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c231702cd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
