ors":[],"dates":[{"year":1967,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国进步劳工党《挑战》月报发表社论指出"},{"type":"paragraph","text":"中国文化大革命使美帝苏修发抖"},{"type":"paragraph","text":"新华社伦敦六日电　美国进步劳工党机关报《挑战》月报最新一期发表社论，热烈赞扬毛主席亲自发动和领导的中国无产阶级文化大革命。"},{"type":"paragraph","text":"社论说，在毛泽东主席的领导下，“中国人民正在自下而上地依靠自己进行这场革命。他们正在决定他们自己的命运……他们正在改造社会，使丑恶的修正主义和资本主义永世不得抬头。”"},{"type":"paragraph","text":"社论强调指出，以毛泽东思想为指导的中国无产阶级文化大革命，使中国“成为不可战胜的革命堡垒”。这使美帝国主义者和苏联修正主义者吓得“浑身发抖，大喊大叫”。"},{"type":"paragraph","text":"社论说：“如果修正主义和帝国主义赞成某一件事，人民就必须加以反对。他们反对文化革命，我们必须支持文化革命。”"},{"type":"paragraph","text":"社论最后说，“帝国主义及其在莫斯科的走狗反对全世界人民的利益”，目前在中国，“亿万人民正在采取革命行动，对他们来说，这是世界上最可怕的景象；对所有革命者来说，这是最令人鼓舞的景象。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1dee8b97b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
