ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"防敌从元山登陆","alias":"","parts":[{"type":"paragraph","text":"防敌从元山登陆"},{"type":"paragraph","text":"（1951年4月13日）德怀同志："},{"type":"paragraph","text":"四月十日廿四时电?悉。（一）完全同意你的预定部署，望依情况坚决执行之。（二）为防敌从元山登陆，似须以四十二军主力位于元山城内及其附近，确保元山，请酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月十三日[1]德怀，即彭德怀，当时任中国人民志愿军司令员兼政治委员。"},{"type":"paragraph","text":"[2]指1951年4月10日24时彭德怀关于第五次战役部署给毛泽东的电报。电报说：我作战企图，拟从金化至加平线，利用这一带大山区劈开一个缺口，将敌人东西割裂，然后用第九兵团和第十九兵团对西线敌人进行战役两翼迁回，第三兵团正面攻击，以各个分割歼灭敌人。力求在三八线北歼灭敌人几个师，得手后再向纵深发展。攻击时间，如敌进展快，我拟4月20日前后开始，各兵团4月15日可集结完毕，时间较仓促些；如敌进展不快时，待5月上旬出击。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":234,"page_end":234},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"446f50a030"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
