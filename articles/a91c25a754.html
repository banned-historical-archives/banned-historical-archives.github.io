{"year":1976,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:上海高等学校集中火力批邓，坚持教育革命，呈现出一派生机勃勃、热气腾腾的动人景象。连日来，广大应届毕业的工农兵学员，满怀豪情壮志，纷纷向校党委写申请书，要求到党和人民最需要的地方去，坚决同邓小平对着干，永远走同工农相结合的道路。"},{"type":"paragraph","text":"他们的革命行动好得很。这是教育史上从未有过的创举，这是向旧的传统观念，向资产阶级法权的勇敢挑战，这是毛主席无产阶级教育路线的伟大胜利，是对邓小平刮起的右倾翻案风的有力回击!"},{"type":"paragraph","text":"阶级斗争的风暴正在锻炼着一代革命新人。在批邓、反击右倾翻案风的斗争中，广大工农兵学员正进一步茁壮成长。他们想的是怎样保证我们伟大的社会主义祖国永不变色，怎样把无产阶级专政下的继续革命进行到底，怎样为实现共产主义的远大目标而斗争。这是何等崇高的思想境界!"},{"type":"paragraph","text":"这里刊登的几份申请书，代表了广大应届毕业生的共同心声。他们的豪言壮语，使人心潮澎湃。从他们的身上，我们看到了祖国的未来，人类的希望。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a91c25a754"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
