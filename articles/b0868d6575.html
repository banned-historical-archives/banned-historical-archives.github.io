art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"决不辜负毛主席的殷切期望","authors":["装甲兵某部二连指战员"],"parts":[{"type":"paragraph","text":"在纪念伟大领袖和导师毛主席逝世一周年的日子里，我们手捧毛主席检阅坦克兵的珍贵照片，更加怀念毛主席。"},{"type":"paragraph","text":"一九四九年三月二十五日，这是我们永远不会忘记的一天。在毛主席亲自指挥下，平津战役取得了伟大胜利，我们坦克连随同大部队刚刚打下天津，还未来得及抖落身上的硝烟征尘，就开进了北京城。这天一大早，全连同志满怀胜利的喜悦，驾着战车来到北京西苑机场，等候着毛主席的检阅。上午十时许，毛主席身穿普通灰色棉大衣，头戴灰色棉帽，站在敞篷汽车上，神采奕奕，亲切地微笑着，向大家频频招手。同志们凝望着毛主席慈祥的面容，激动的热泪模糊了双眼。"},{"type":"paragraph","text":"从那以后，我们连先后十次幸福地受到毛主席的检阅和接见，这是对我们装甲兵战士的巨大关怀和鼓舞。我们把毛主席检阅、接见的照片印在连史册上，有的同志还把照片从报纸上前下来，一直珍藏在身旁。一看到毛主席的光辉形象，浑身就增添了无穷的勇气和力量。一九五○年，美帝国主义发动侵朝战争后，我们坚决响应毛主席发出的“抗美援朝，保家卫国”的伟大号召，奔赴朝鲜战场。同志们手捧毛主席检阅时的照片，发出坚强誓言：“坚决打好出国第一仗，为毛主席争光！”在马良山反击战中，我们运用毛主席的军事思想奇袭马良山，神不知鬼不觉地把坦克潜伏到敌人的鼻子底下，发起攻击后，以猛烈的火力迅速摧毁了敌人的碉堡，掩护步兵一举全歼了敌人，荣立了战功。几十年来，毛主席的亲切关怀，鼓舞我们顽强斗争，英勇作战，胜利地完成了战备训练、施工等各项任务，为人民立了新功。"},{"type":"paragraph","text":"毛主席啊，毛主席！我们一定高举您的伟大旗帜，继承您的遗志，紧跟英明领袖华主席，为落实党的“十一大”提出的各项战斗任务，加强部队革命化现代化建设而奋斗。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0868d6575"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
