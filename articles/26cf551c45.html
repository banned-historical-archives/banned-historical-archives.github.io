ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"二十六军南下作战九兵团准备打增援之敌","alias":"","parts":[{"type":"paragraph","text":"二十六军南下作战九兵团准备打增援之敌！"},{"type":"paragraph","text":"（1950年12月2日）彭、邓，并宋、覃："},{"type":"paragraph","text":"（一）庆祝我九兵团的两次歼敌大胜利。（二）据新华社驻通化记者报告，三十日下午，侵占惠山镇之敌军搬运物资，有撤退模样，惠山镇以西之新架坡镇敌军已于三十日午后撤退，敌军侵入惠山镇兵力约二千五百人等语。美七师似已从惠山镇撤退。我二十六军驻厚昌之一个师，除留一部仍驻该地向东警戒外，主力可以南下作战。（三）我九兵团除应加紧歼灭被围之敌外，并应准备与必然增援之两个李承晚师和美三师一部作战。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十二月二日二十四时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中国人民志愿军司令员兼政治委员彭德怀和副司令员兼副政治委员邓华等的电报。"},{"type":"paragraph","text":"[2]宋、覃，指宋时轮、覃健，当时分别任中国人民志愿军第九兵团司令员兼政治委员和参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":408,"page_end":408},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26cf551c45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
