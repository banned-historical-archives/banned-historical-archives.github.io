script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批臭资产阶级的人生哲学","authors":["钟斌"],"dates":[{"year":1969,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叛徒孙振在反动小说《战斗的青春》里，大肆贩卖资产阶级的人生哲学，喋喋不休地向人们介绍了许多做人的“诀窍”。在“活着是美好的”一节里，孙振津津乐道地向人们推荐“女英雄”许凤的生活“理想”——同她的未婚夫李铁“坐上火车、汽车，或骑着马，跑遍祖国的大地”，“象那黄雀一样海阔天空地”，“自由地生活”、“自由地歌唱”、“自由地飞翔”。这一段“精采”的表白，把孙振之流腐朽丑恶的灵魂淋漓尽致地暴露无遗。"},{"type":"paragraph","text":"一个人生在世界上，要过什么样的生活，要争什么样的自由，无产阶级和资产阶级有着完全对立的看法。伟大领袖毛主席教导我们:“只有解放全人类才能最后解放无产阶级自己”，无产阶级革命者，必须“全心全意为中国和世界的绝大多数人服务”。只有全人类获得解放，无产阶级自己才能获得解放。因此，无产阶级革命者从来不为个人的“自由”、“幸福”而“苦斗”，而是把自己的一切贡献给全人类的解放事业。在无产阶级革命者看来，能为这个宏伟壮丽的事业艰苦奋斗终身是最美好的生活，最大的幸福。而叛徒孙振所鼓吹的所谓“自由”，其实，不过是资产阶级的“个性解放”；他所鼓吹的“美好”生活，不过是资产阶级少爷、小姐所过的腐朽糜烂的生活。一个真正的无产阶级革命者，决不会向往这种资产阶级的生活方式，只有那些被资产阶级思想浸透了灵魂的人，才把这种肮脏的生活作为自己的生活理想。"},{"type":"paragraph","text":"无产阶级革命者不仅要为革命而生，而且当革命需要的时候，也要乐于为革命而死。孙振竭力宣扬“活着是美好的”，就是要人们为了个人利益苟且偷安，一切为着活着，只要能活下去，什么原则都可以出卖，什么坏事都可以干出来。这是彻头彻尾的叛徒哲学。“宁可筋骨碎，决不把头回”，真正的革命者，从来都是视死如归的英雄。他们“不惜牺牲自己个人的一切，随时准备拿出自己的生命去殉我们的事业”。他们“浑身是胆雄赳赳”，“不屈不挠斗敌顽”。他们能在枪林弹雨中出生入死，浴血奋战，把为革命而死看作是无限的幸福，感到无比的骄傲自豪。对比之下，许凤、孙振之流及其总后台刘少奇的活着是何等的卑鄙和渺小!他们的“活命哲学”是何等的腐臭不堪啊!"},{"type":"paragraph","text":"上海警备区　钟斌"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c39e155f6e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
