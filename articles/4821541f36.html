<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"土地会议叫应该采取彻底平分土地的方针","alias":"","parts":[{"type":"paragraph","text":"土地会议\"应该采取彻底平分士地的方针"},{"type":"paragraph","text":"（1947年9月6日）中工委："},{"type":"paragraph","text":"申微电悉。平分土地，利益极多，办法简单，群众拥护，外界亦很难找出理由反对此种公平办法，中农大多数获得利益，少数分出部分土地，但同时得了其他利益（政治及一般经济利益）可以补偿。因此，土地会议应该采取彻底平分土地的方针，将农村中全部土地、山林、水利，平地以乡为单位，山地以村为单位，除少数"},{"type":"paragraph","text":"[1]指中共中央工作委员会1947年7月17日至9月13日在河北建屏县（1958年并入平山县）西柏坡村召开的全国土地会议。会议确定了彻底平分土地的政策，起草并通过《中国土地法大纲》，作出了结合土地改革整顿党的组织的决定。"},{"type":"paragraph","text":"[2]指刘少奇1947年9月5日为中共中央工作委员会起草的给中央的电报。电报说，土地会议已进入结束阶段，会议集中讨论了土地政策问题。多数意见赞成彻底平分土地，认为该办法简单，进行迅速，得利者在老区占50%~60%，不动者占20%~30%，仍可团结80%以上的农民，是利多害少。因此，决定普遍实行彻底平分，由土地会议通过一个公开的土地法大纲，各解放区政府提议，同时通过一个党内决议，以总结一年来土改经验，并提出执行政策的方法等。土地法大纲及决议草案待通过整理后，电请中央批准并发出。上述各项，特别关于彻底平分田地原则，是否妥当，望即复示。重要反动分子本身外，不分男女老少，在数量上（抽多补少）质量上（抽肥补瘦）平均分配。不但土地、山林、水利平均分配，而且要将地主、富农两阶级多余的粮食、耕牛、农具、房屋及其他财富拿出来，适当地分配给农民中缺之这些东西的人们，地主、富农所得的土地财产不超过也不低于农民所得。大规模的森林及水利工程不能分配者，由政府管理。此外，同意即由土地会议通过土地法大纲，作为向各解放区政府的建议。同时，起草一个党内决议，由中央公布\"。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"鱼酉"},{"type":"paragraph","text":"[1]1947年10月10日，中共中央作出《关于公布（中国土地法大纲\u003e的决议》。决议说：中国的土地制度极不合理，必须根据农民的要求，消灭封建性及半封建性剥削的土地制度，实行耕者有其田的制度。今年9月，中国共产党召集的全国土地会议，详细地研究了中国土地制度的情况、土地改革的经验，制定了《中国土地法大纲》，作为向各地民主政府、各地农民大会、农民代表会及其委员会的建议。中国共产党中央委员会完全同意这个土地法大纲，并予以公布。希望各地对于这个建议，加以讨论及采纳，并订出适合于当地情况的具体办法，展开及贯彻全国的土地改革运动，完成中国革命的基本任务。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":263,"page_end":264},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4821541f36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
