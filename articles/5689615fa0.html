tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘主席周总理接见亚非国家作家","authors":["钱嗣"],"parts":[{"type":"paragraph","text":"新华社二十四日讯 毛泽东主席、刘少奇主席、周恩来总理，今天下午接见参加亚非文学交流座谈会的亚非国家的作家，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"被接见的各国朋友是：亚非作家常设局访问亚洲代表团团长巴格里·西里格尔（印度尼西亚），团员：班达哈罗（印度尼西亚）、霜多正次（日本）、恩朗德（喀麦隆）、让·让·查理（喀麦隆）、马陶雷（津巴布韦）、杜宣（中国）；柬埔寨作家代表团团长马来琴，团员孙苏伦、翁萨伦；在北京的亚非国家的作家普瑞玛瑞特纳（锡兰）、康德萨密（锡兰）、梭勃伦·艾地（印度尼西亚）、艾尔曼（印度尼西亚）、努尔苏曼托（印度尼西亚）、努尔查曼（印度尼西亚）、古腊（泰国）、凯尔（苏丹）。"},{"type":"paragraph","text":"接见时在座的，有对外文委副主任曹瑛，中国作家刘白羽、张光年、袁水拍、叶君健、李季、黄钢、胡可、袁鹰、韩北屏。"},{"type":"paragraph","text":"图为接见时合影。前排左六是巴格里·西里格尔团长。"},{"type":"paragraph","text":"新华社记者 钱嗣杰摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5689615fa0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
