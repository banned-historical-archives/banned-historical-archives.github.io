s":[{"year":1980,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京四月十六日电　中华人民共和国全国人民代表大会常务委员会委员长叶剑英和中华人民共和国国务院总理华国锋今天联名打电报给民主柬埔寨国家主席团主席、政府总理乔森潘和柬埔寨人民代表大会常务委员会委员长农谢，热烈祝贺民主柬埔寨建国五周年。"},{"type":"paragraph","text":"电报说，柬埔寨人民在民主柬埔寨政府的领导下，毅然奋起抗战，同入侵之敌进行不屈不挠的战斗，广泛地开展了游击战争，挫败了越南侵略军的旱季进攻，英勇地捍卫着国家独立和民族生存，并为维护东南亚和亚洲、太平洋地区的和平与稳定作出了重要贡献。"},{"type":"paragraph","text":"电报说，中国政府和人民将一如既往，坚决支持兄弟的柬埔寨人民的抗越救国斗争。我们深信，民主柬埔寨政府以爱国、民主、民族大团结阵线纲领为指针，团结一切爱国民主力量，结成最广泛的抗越民族统一战线，坚持斗争，定能击败侵略者，取得抗越救国斗争的最后胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c0475c995"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
