art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副主席率我党政代表团离平壤回国朴成哲、吴振宇、金万金、许锬等同志到车站热烈欢送","authors":[],"parts":[{"type":"paragraph","text":"据新华社平壤九月十三日电 以中共中央副主席、国务院副总理邓小平为团长，中共中央政治局委员、中共上海市委第三书记、上海市革命委员会第二副主任彭冲为副团长的中国党政代表团，参加朝鲜民主主义人民共和国成立三十周年庆祝活动后，九月十三日上午乘专车离开平壤回国。"},{"type":"paragraph","text":"车站上举行了隆重欢送仪式。军乐团奏朝鲜国歌和中国国歌。邓小平副主席在朴成哲副主席陪同下，检阅了朝鲜人民军陆军仪仗队。"},{"type":"paragraph","text":"邓小平副主席登上专车前，在车厢前同朴成哲副主席等亲切握手，热烈拥抱。这时全场再一次爆发出热烈的欢呼声，人们祝愿朝中两国人民的友谊不断巩固和发展，祝愿邓副主席一行一路顺风。"},{"type":"paragraph","text":"到车站热烈欢送中国党政代表团的还有朝鲜党政领导人吴振宇、金万金、许锬以及有关部门负责人。"},{"type":"paragraph","text":"九月十二日下午，邓小平副主席在中国驻朝鲜大使馆接见了在朝鲜工作和学习的中国同志，并同他们一起照了相。"},{"type":"paragraph","text":"据新华社新义州九月十三日电 中共中央副主席、国务院副总理邓小平和由他率领的中国党政代表团九月十三日中午从平壤回国途中经过新义州时，受到当地负责干部和群众的热烈欢送。"},{"type":"paragraph","text":"邓副主席一行在车站短暂休息时，同前来迎送的平安北道和新义州市党政机关负责人金炳律、崔万国等亲切交谈。"},{"type":"paragraph","text":"朝鲜外交部副部长金亨律专程从平壤送行到新义州。"},{"type":"paragraph","text":"据新华社沈阳九月十三日电 以中共中央副主席、国务院副总理邓小平为团长，以中共中央政治局委员、中共上海市委第三书记、上海市革命委员会第二副主任彭冲为副团长的中国党政代表团，在参加了朝鲜民主主义人民共和国成立三十周年庆祝活动以后，今天乘专车回到沈阳。"},{"type":"paragraph","text":"代表团于今天下午抵达我国边境城市丹东，前往车站迎接的有：中共中央政治局委员、人民解放军沈阳部队司令员李德生，中共辽宁省委第一书记、省革命委员会主任、沈阳部队政治委员曾绍山，省委第二书记、省革命委员会副主任任仲夷等。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2d5f15f1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
