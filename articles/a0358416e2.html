r":1967,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国文化大革命必将取得胜利"},{"type":"paragraph","text":"我们旅居英国的巴基斯坦工人，谨向毛泽东主席表示我们最好的祝愿，祝他万寿无疆。"},{"type":"paragraph","text":"毛泽东主席是伟大的中国人民的伟大领袖，是全世界革命人民的伟大导师，是当代的列宁。在他的领导下，中国共产党作出了在中国开展无产阶级文化大革命的决定。我们相信，这场震撼全世界的无产阶级文化大革命必将取得胜利。"},{"type":"paragraph","text":"帝国主义者愈是大吵大嚷，修正主义者愈是诬蔑无产阶级文化大革命，我们愈是坚信，中国文化大革命，对全世界被压迫人民来说，是具有历史意义的一件大事。"},{"type":"paragraph","text":"毛主席万岁！伟大的中国共产党万岁！无产阶级文化大革命万岁！"},{"type":"paragraph","text":"在英国伯明翰的巴基斯坦工人联合会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0358416e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
