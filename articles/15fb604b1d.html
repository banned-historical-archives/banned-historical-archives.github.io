script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在苏修领导集团的残暴统治下苏联劳动妇女深受剥削和压迫","authors":[],"dates":[{"year":1975,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年三月六日电　在复辟资本主义的苏联，广大劳动妇女遭受剥削和压迫，不少妇女工作无保障，生活无着落。"},{"type":"paragraph","text":"在苏修领导集团篡夺了苏联党和国家大权以后，苏联工人阶级从列宁、斯大林时代作为国家和企业的主人重新沦为雇佣奴隶。根据苏修当局制定的各种“条例”，资产阶级特权分子动辄以各种各样的“罪名”解雇工人。在这方面，女工的遭遇尤其不幸。她们工伤残废、生病、体弱等等，都可能成为被企业当局解雇的理由。据苏联《劳动报》透露，加里宁制糖联合工厂女工凯里姆别科娃已经有二十五年工龄，这位老工人“在生产岗位上成了二等残废”。由于患病工厂当局最先把她转为杂工，后来又以所谓“人员超过编制”、“为了提高劳动生产率”等为“理由”，把她开除出工厂。同时，还有其他几名女工也在与凯里姆别科娃相类似的情况下被撵出工厂。在某些工厂企业中，一些女工竟然因为怀孕而被剥夺了劳动权利。据《社会主义哈萨克报》报道，哈萨克共和国的帕夫洛达尔肉类联合工厂厂长公开对比仁卡耶娃等几名怀孕女工发布命令说:“现在你们不能工作了，感谢你们在身体健康时所做的工作，你们去吧!”这些女工就这样被开除了。塔尔迪—库尔干州潘菲洛夫玉米加工厂女工谢尔巴科娃也遭到同样的不幸。她怀孕了，她要求厂长把她调任较轻的工作。厂长不仅没有同意这一合理要求，反而以“工作量减少”为由把她解雇。塔吉克共和国杜尚别纺织联合企业的领导强迫童工加丽雅上夜班，被她拒绝。这可触犯了这位领导。一怒之下，就把加丽雅赶出工厂，并没收了她的“公民证”。加丽雅被无理解雇后，由于没有“公民证”，到处找不到工作。她漂泊了两个月，最后由于生活无着落而被迫自杀。"},{"type":"paragraph","text":"据苏联报刊透露，在苏联的一些地区，还流行着买卖婚姻现象。由于苏联复辟了资本主义制度，由此也出现了资本主义制度下一些妇女为生活所迫而卖淫的现象。"},{"type":"paragraph","text":"苏修统治集团多年来一直大肆宣扬什么苏联妇女“在政治生活和社会生活的各个领域的平等”得到“保障”等等，但是今日苏联广大劳动妇女遭受剥削和压迫的事实却揭穿了它们的谎言。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15fb604b1d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
