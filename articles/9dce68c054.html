art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见阿尔及利亚客人同天接见南罗得西亚、西南非洲和摩洛哥外宾","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社18日讯 毛泽东主席今天下午接见阿尔及利亚《非洲革命》周刊社长雅克·弗吉斯，阿尔及利亚民族女英雄、《非洲革命》周刊特派记者贾米拉·布伊海德，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有中国非洲人民友好协会会长刘长胜，中华全国新闻工作者协会主席吴冷西、副主席范瑾。"},{"type":"paragraph","text":"新华社18日讯 毛泽东主席今天下午接见正在我国访问的南罗得西亚津巴布韦非洲人民联盟特派代表阿尔弗雷德·冈都，西南非洲民族联盟青年代表卡·维依和姆·卡仲括，全非工会联合会主席、摩洛哥劳工联合会总书记马佐·本·西迪克。毛泽东主席同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有，刘宁一，刘长胜，王照华和朱子奇。"},{"type":"paragraph","text":"毛泽东主席接见阿尔及利亚《非洲革命》周刊社长雅克·弗吉斯和阿尔及利亚民族女英雄、《非洲革命》周刊特派记者贾米拉·布伊海德。"},{"type":"paragraph","text":"图为接见时情形。右起：贾米拉·布伊海德，雅克·弗吉斯，毛泽东，翻译，吴冷西，刘长胜。 新华社记者 吕厚民摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dce68c054"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
