ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"公社划小不划小主要应听群众的意见","alias":"","parts":[{"type":"paragraph","text":"公社划小不划小主要应听群众的意见"},{"type":"paragraph","text":"（1961年3月5日）"},{"type":"paragraph","text":"工业企业有大、中、小，太大了就不好管。农业不比工业，公社大了就更不好管。因为公社里男女老少都有，不像军队那样，有组织有纪律，还都是男的。"},{"type":"paragraph","text":"公社划小不划小，分不分，不要只听干部的意见，主要应听群众的意见。有些干部肯定不愿意分，他会找出许多理由来，说什么没有房子，没有这个，没有那个，有许多困难等等。我们只要得到了群众也就得到了干部。我们把生产指挥权下放有什么不好？如果按有些干部的意见，社员自留地也不能留，平调的东西也不要退赔，生产指挥权也不能下放。那样，我们就得不到群众，就不能取信于民。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":198,"page_end":198},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1212b31458"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
