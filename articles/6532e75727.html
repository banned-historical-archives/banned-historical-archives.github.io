tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"对新战士进行彻底否定“文革”教育","authors":["陈亮/刘勇"],"parts":[{"type":"paragraph","text":"本报讯 八一○六五部队直属新兵连把彻底否定“文化大革命”作为对新战士进行教育的重要内容。他们针对新战士的特点系统讲了三课：一是“文化大革命”的过程，使新战士认清“文革”是一场由领导者错误发动，被反革命集团利用，给党和国家、人民带来严重灾难的内乱。二是“文化大革命”的理论和实践都是错误的，它给国家和社会造成了严重的混乱、破坏和倒退。三是“彻底否定‘文革’的重大意义”，帮助大家肃清‘左’的影响，提高贯彻执行党的路线、方针、政策的自觉性。（陈亮、刘勇）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6532e75727"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
