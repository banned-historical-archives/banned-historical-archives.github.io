script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南《人民报》文章  南斯拉夫修正主义集团作为国际共产主义运动的挑衅者和破坏者的嘴脸已经暴露","authors":[],"dates":[{"year":1963,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南《人民报》文章"},{"type":"paragraph","text":"南斯拉夫修正主义集团作为国际共产主义运动的挑衅者和破坏者的嘴脸已经暴露"},{"type":"paragraph","text":"本报讯　越南《人民报》五月二十二日发表题为《南斯拉夫修正主义集团作为国际共产主义运动的挑衅者和破坏者的嘴脸已经暴露》的文章，全文如下："},{"type":"paragraph","text":"据外国消息，南斯拉夫共产主义者联盟中央委员会最近举行全体会议，并通过了铁托的、被视为这个组织的“指导路线”的报告。这项报告中最突出的、也是西方各国通讯社最感兴趣的是，对中国的疯狂的攻击。"},{"type":"paragraph","text":"铁托在报告中重弹了帝国主义集团的一系列的陈词滥调，诬蔑中国的社会主义建设，歪曲中国关于国际问题的路线。企图明目张胆地说什么中国的政策旨在反对一切进步和社会主义力量的联合，中国的政策只能够导致消灭数以亿人计的战争，中国的政策促使亚非和拉丁美洲各民族起来反对欧洲各民族和各个发达国家。"},{"type":"paragraph","text":"在这个会议上，南斯拉夫共产主义者联盟的其他领导人，如维·弗拉霍维奇、亚·兰科维奇等也对中国进行了恶毒的诬蔑。"},{"type":"paragraph","text":"观察家们注意到把铁托集团的上述卑鄙的诬蔑行为同国际共产主义运动和工人运动内部最近的情况联系起来。目前，世界各国共产党和工人党正在致力于加强团结一致，为召开各个兄弟党之间的国际会议进行准备。特别是苏联共产党和中国共产党，作为对建立国际团结负有最大责任的两个党，即将举行两党代表团的具有重大意义的会谈。在这种情况下，人们认为，铁托攻击和诬蔑中国的恶毒言词，充分地暴露了南斯拉夫修正主义集团企图火上加油，阻挠国际共产主义运动克服内部分歧、破坏各国共产党和工人党的团结的挑衅者的嘴脸。"},{"type":"paragraph","text":"铁托在报告中还不厌其烦地再一次重申南斯拉夫同美帝国主义以及其他帝国主义的密切关系。铁托毫不隐讳地说，南斯拉夫始终不愿使它和各个资本主义国家的关系有丝毫削减。"},{"type":"paragraph","text":"人们还注意到，南斯拉夫领导人是在美国国务卿腊斯克最近访问南斯拉夫，并与铁托和南斯拉夫修正主义集团其他领导人进行了接触之后，对中国进行疯狂攻击的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45e8890e0a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
