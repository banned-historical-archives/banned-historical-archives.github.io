script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji2","name":"毛泽东全集第2卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"新民学会会员通信集》第二集序","alias":"","parts":[{"type":"paragraph","text":"《新民学会会员通信集》第二集序"},{"type":"paragraph","text":"（1920年11月30日）"},{"type":"paragraph","text":"这是《新民学会会员通信集》的“第二集”，采集会员通信计二十八封。重要者如下：向警予讨论女子发展的计划一封；讨论女子留法勤工俭学问题及女同志联络问题一封；欧阳泽讨论新民学会共同的精神一封；毛泽东主张新民学会应取潜在的态度一封；萧子障报告男女会友在法生活状况一封；易礼容主张吾人进行要有准备一封；罗阶?希望学会反抗靡俗估量最高价值一封；毛泽东讨论湖南自治并主张学会同人应为主义的结合一封；张国基讨论会务进行一封；报告湘人在南洋情形一封；毛泽东讨论湘人往南洋应取的态度，希望会友多往南洋为文化运动和南洋建国运动一封；张国基述南洋的奇闻一封；罗学瓒希望会友注意锻炼身体，祛除四种迷惑，解决家庭问题一封；毛泽东主张组织拒婚同盟一封。以上各信，或于身心之修养有益，或于学术之讨论问题之研究有益，或于会务之进行有益，并且都是很能引起会员团体生活的兴味的。其余的信，或商量进止，或讨论事宜，或报告个人状况，具载于此，以见一斑。"},{"type":"paragraph","text":"千九百二十年十一月三十号编者[1]萧子璋，即萧三。"},{"type":"paragraph","text":"通第"},{"type":"paragraph","text":"新"},{"type":"paragraph","text":"民学会会"},{"type":"paragraph","text":"信集"},{"type":"paragraph","text":"集新民学会出版的《新民学会会员通信集》第二集。"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":11,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":331,"page_end":332},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0481898ee"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
