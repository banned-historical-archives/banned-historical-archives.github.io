art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想统率后勤业务","authors":[],"parts":[{"type":"paragraph","text":"代表们的学习经验反映了总后所属单位学习毛主席著作的群众运动正在蓬勃发展。会议号召后勤人员，学习著作要继续狠抓“用”字，促使后勤工作更加革命化。"},{"type":"paragraph","text":"本报讯 总后勤部于五月四日至十五日召开了学习毛主席著作积极分子代表会议。到会代表一百九十一名。会议检阅了成绩，表彰了先进，总结和交流了经验。会议号召总后勤部全体同志突出政治，掀起更大更广泛的学习毛主席著作新高潮，为加速后勤工作革命化而奋斗。"},{"type":"paragraph","text":"会议期间，贺龙、罗瑞卿同志接见了会议全体代表。会议开始，总后勤部首长李聚奎、邱会作和卢南樵同志分别作了报告。"},{"type":"paragraph","text":"济南部队某部司务长孙乐义应邀介绍了他活学活用毛主席著作、改造思想、提高觉悟、搞好生活管理的先讲经验。代表们一致认为，孙乐义同志是后勤战线的一面旗帜，是全体后勤人员学习的榜样。"},{"type":"paragraph","text":"参加会议的先进单位和积极分子中，有在科学研究工作中用毛泽东思想挂帅、取得显著成果的某军医大学的一个研究室；有在川藏高原执勤中，学在路上，用在路上，思想、作风、技术三过硬的汽车某团五连；有用毛泽东思想带兵、不断改进管理教育方法的某仓库勤务一连连长王富周；有坚决听毛主席的活，全心全意为国防事业服务的八一军马场女牧工宋秀英；有认真学习毛主席著作，自觉改造思想，在教学、科学研究工作中取得优异成绩的某军医大学副教授程天民；有决心当一辈子护士，学一辈子《纪念白求恩》，热忱为病人服务的302医院护士张金宁，等等。各行各业的代表学习毛主席著作的共同经验，最主要的是一个“用”字，就是用毛泽东思想武装头脑，指导工作。这些丰富的经验反映了总后勤部所属机关、院校、工厂、仓库、部队学习毛主席著作的群众运动正在蓬勃深入地向前发展，有力他说明了活学活用毛主席著作是根本的根本。只有努力学习毛主席著作，才能使自己不断前进；只有用毛泽东思想统率业务，才能使后勤工作更加革命化，多快好省地完成各项任务。"},{"type":"paragraph","text":"会议指出，后勤工作技术性、业务性很强，因此，更需要突出政治，用毛泽东思想统率业务。在学习毛主席著作的新高潮中，要继续狠抓“用”字。具体要求主要是做到“三勤”："},{"type":"paragraph","text":"一是勤俭办事。就是办一切事情，都要实行节约的原则。"},{"type":"paragraph","text":"二是勤恳办事。也就是要有很好的服务态度。"},{"type":"paragraph","text":"三是勤巧办事。就是既要勤干又要巧干，"},{"type":"paragraph","text":"会议认为，活学活用毛主席著作，要切实贯彻林彪同志“减少分量，增加次数，抓住主要东西反复学”的指示，抓住一些重点文章反复精读，天天学，天天想，天天用。把基本观点记在脑里，印在心上，作为行动的指南。当前学习毛主席著作要紧密结合战备教育，把学习效果落实到提高斗志、创造四好、搞好战备工作上。（新闻科）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15d4aaa7d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
