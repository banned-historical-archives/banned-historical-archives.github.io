ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复华东局电","alias":"","parts":[{"type":"paragraph","text":"复华东局电"},{"type":"paragraph","text":"（1949年7月21日）"},{"type":"paragraph","text":"邓小平已到，中央已开会讨论了他的报告并委托陈云向你们面达。上海问题，须从农村、精简、疏散三方面着手才能解决。用大力进行苏、浙、皖三省农村工作，获得农民群众的拥护，这是首先重要的，否则上海及任何城市的困难问题都不能彻底解决。其次是精兵简政，节省国家开支，这也是很重要的，你们现在即可以开始做。又其次是疏散，这需要有可行的计划，请你们与陈云商量后提出一具体方案交中央讨论。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的复华东局电的主要内容。陈云当时受中共中央委托主持组建中央财经委员会，准备前往上海筹备召开华东、华北、华中、东北、西北五大区的财经会议。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":7,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":68,"page_end":68},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65d70a01f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
