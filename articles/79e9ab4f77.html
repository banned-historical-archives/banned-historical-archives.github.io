{"year":1952,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我是工人的儿子，我对上海计划大规模的建造工人住宅这一件大喜事，感到非常高兴。我父亲是汽车司机，过去那里能住好房子呢?现在可大不同了。工人阶级翻身做了主人，市政建设也首先为工人服务了，我们也就可能住好房子了，我曾参观“曹杨新邨”，这种建筑真可算得是工人的乐园了。这些在解放前连做梦也没想到的事，现在都已实现了。毛主席替工人想得真周到，吃饭不忘种地人，我一定要加紧学习，练好身体，站稳工人阶级立场，准备响应祖国号召来报答共产党、毛主席的恩情。"},{"type":"paragraph","text":"新华中学学生　陶志雄"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79e9ab4f77"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
