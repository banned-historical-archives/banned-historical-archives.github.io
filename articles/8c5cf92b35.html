art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想的播种站","authors":["周志迪李心平"],"parts":[{"type":"paragraph","text":"这里，人烟稀少，村寨疏落。边疆群众要出远门，只好吃冷干粮，喝生溪水。住在这里的机械连炊事班，看到这种情形，就主动为过往群众就餐尽义务，加热，供水……。雨雪天，还为群众烤衣烘被。过往群众都深受感动，感激不尽。"},{"type":"paragraph","text":"可是，班长徐世苗觉得这样做还不够。他想：我们要做群众工作，最重要的应当是用毛泽东思想去武装边疆人民。说干就干，他们准备了许多毛主席著作单行本，还逐字逐句地学习了地方语言。过往的群众一到，他们一边热情接待，一边帮助学习毛主席著作，并且运用忆苦思甜等方法，启发群众的阶级觉悟。"},{"type":"paragraph","text":"群众越听越爱听，越学越爱学。有的学了一篇还要求再学一篇。他们都说炊事班是“毛泽东思想的播种站”。（周志迪、李心平）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c5cf92b35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
