script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为刘少奇主席访越越驻南宁领事举行联欢晚会","authors":[],"dates":[{"year":1963,"month":5,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社南宁13日电】　越南民主共和国驻南宁领事黎光仁，为中华人民共和国主席、中国共产党中央委员会副主席刘少奇访问越南民主共和国，在12日晚上举行联欢晚会。"},{"type":"paragraph","text":"中共广西僮族自治区委员会书记乔晓光，中越友好协会广西分会副会长莫乃群，南宁市市长阎光彩等应邀参加了联欢会。"},{"type":"paragraph","text":"在洋溢着中越两国人民兄弟般的战斗友谊的联欢会上，越南民主共和国驻南宁领事黎光仁和中共广西僮族自治区委员会书记乔晓光先后讲话，他们在讲话中一致指出，刘少奇主席这次到越南进行友好访问，将进一步加强越中两国人民的传统的兄弟般的战斗友谊，并将进一步加强整个社会主义阵营在马克思列宁主义和无产阶级国际主义基础上的团结，对维护亚洲和世界和平作出新的贡献。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d94b32168"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
