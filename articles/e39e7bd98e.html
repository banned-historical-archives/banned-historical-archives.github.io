ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给郭建人的信","alias":"","parts":[{"type":"paragraph","text":"给郭建人的信"},{"type":"paragraph","text":"（1950年5月8日）建人兄："},{"type":"paragraph","text":"去年十一月来信收到。现在人民政府工作甚好，望于工作中加强学习，对于过去有所批判，以期日进有功。此复，顺颂健吉！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年五月八日"},{"type":"paragraph","text":"[1]郭建人（1899—1975），湖南省韶山市清溪镇清溪村人，原为乡村教师，1925年参加韶山农民运动，并加入中国共产党。曾任中共湖南湘潭地方执行委员会组织委员、湘潭县农民协会委员长、湖南农民运动特派员等职。“马日事变”后，任湖南工农义勇军中路军司令员，后脱党。新中国成立后，曾任湖南省零陵县人民政府办事员、零陵县保险公司业务员等职。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":359,"page_end":359},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e39e7bd98e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
