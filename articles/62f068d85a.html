家干涉刚果内政和让刚果人民自己决定国家事务；支持阿尔及利亚、安哥拉和突尼斯人民的正义斗争","authors":[],"dates":[{"year":1961,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卡萨布兰卡宪章国家政委会发表声明"},{"type":"paragraph","text":"谴责帝国主义干涉和剥削非洲"},{"type":"paragraph","text":"必须制止帝国主义国家干涉刚果内政和让刚果人民自己决定国家事务；支持阿尔及利亚、安哥拉和突尼斯人民的正义斗争"},{"type":"paragraph","text":"新华社开罗30日电　今天下午这里发表了关于卡萨布兰卡宪章国家政治委员会第一次会议的声明。声明说，会议“谴责帝国主义国家的立场，以及它们从幕后支使某些代理人来达到它们在非洲的目的、制造新殖民主义，借以对非洲的内部事务进行隐蔽的干涉和对非洲进行的剥削”。"},{"type":"paragraph","text":"政治委员会8月28日至29日在这里举行了会议，参加的有阿联、马里、摩洛哥、几内亚、加纳和阿尔及利亚的代表团。"},{"type":"paragraph","text":"声明说，各代表团团长对最近的刚果局势表示了意见，他们“仍旧遵守他们早先宣布的原则，这就是：必须保证刚果领土的完整和安全，建立一个体现人民要求独立和自由愿望的民族主义政府。代表团团长们认为：必须制止帝国主义国家干涉刚果内政和让刚果人民自己决定他们的事务”。"},{"type":"paragraph","text":"声明接着说，“代表团团长们讨论了阿尔及利亚的局势发展，并强调他们完全支持阿尔及利亚政府和人民争取阿尔及利亚独立和领土完整的斗争。”"},{"type":"paragraph","text":"声明说，代表团团长们“谴责葡萄牙在安哥拉犯下的残暴罪行，诸如它企图借以消灭民族主义运动的逮捕、迫害和种族隔离等”。卡萨布兰卡宪章国家一致支持安哥拉人民获得独立的权利。声明谴责“某些国家给予葡萄牙经济和军事援助的政策，并认为这是对安哥拉和葡属几内亚人民的侵略行为”。"},{"type":"paragraph","text":"声明说：“代表团团长们一致认为，法国对突尼斯人民的侵略是帝国主义者不顾突尼斯人民和政府的反对，企图巩固他们在非洲一部分地方的地位的挑衅性残暴行动。他们还认为，法国坚持留在比塞大和犯下的这些行为肯定证明了军事基地的危险，这些基地是帝国主义进攻民族解放运动和破坏这些国家的主权和独立的中心。”"},{"type":"paragraph","text":"声明说：“代表团团长们谴责许多欧洲国家在非洲实行的种族歧视政策，认为这是违反人道原则和人类尊严的。”"},{"type":"paragraph","text":"代表团团长们重申“他们以前表示不参加欧洲经济联盟的立场和这种联盟对非洲经济前途的威胁，这使宪章国家有必要奉行统一的政策来消除这些联盟的威胁，击败这些联盟可能制造的直接影响正在发展的非洲国家的独立的压迫手段”。"},{"type":"paragraph","text":"声明说，各代表团团长认为，将于贝尔格莱德举行的不结盟国家首脑会议将在消灭帝国主义和巩固和平方面对国际局势产生重大影响。"},{"type":"paragraph","text":"声明说，代表团团长们再次强调他们欢迎任何非洲国家参加卡萨布兰卡宪章。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62f068d85a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
