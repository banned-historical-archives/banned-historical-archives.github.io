<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"满脑子资产阶级个人主义，陈学昭传播反共毒素，与党内外右派分子郑伯永曹湘渠宋云彬结伙反党","authors":[],"dates":[{"year":1957,"month":9,"day":9}],"is_range_date":false,"parts":[{"text":"满脑子资产阶级个人主义，陈学昭传播反共毒素，与党内外右派分子郑伯永曹湘渠宋云彬结伙反党","type":"title"},{"text":"【据新华社杭州9日电】 共产党内右派分子陈学昭的原形，已在这几天浙江省文艺界党内外召开的一系列座谈会上被充分揭露出来。","type":"paragraph"},{"text":"会上揭露的材料证明，陈学昭是一个阴险狠毒的阶级异己分子。陈学昭污蔑党是一个玩弄权术、争权夺利、排斥异己的宗派集团。她把代表人民群众利益的党形容成为一个高高在上的统治阶级。","type":"paragraph"},{"text":"陈学昭经常和党内右派分子、省文联秘书长郑伯永和省政协副秘书长曹湘渠拉拉扯扯，形成一个小集团，把文联原有党员负责人排挤出去，和右派分子宋云彬内外呼应，以达到篡夺党对文艺工作的领导权。","type":"paragraph"},{"text":"大放大鸣开始后，这位反党女作家认为时机已到，就积极写文章和参加各种座谈会，向党大肆攻击。在她的反党言行中，和其他右派分子一样，否定党领导下的文艺工作的成绩，制造和夸大党的缺点，对党极尽污蔑之能事。她认为省委是“盖子”、她的头上有省委的“金箍”，而且处处挨省委的“闷棍”等等。","type":"paragraph"},{"text":"到会者详尽地分析了陈学昭那样一个党员老作家，为什么会堕落成资产阶级右派分子的原因。原来陈学昭生长在一个没落资产阶级的家庭里，又是期在国外受着资产阶级“人不为己、天诛地灭”的思想教育，入党以后，她又经常借口写作，不愿过组织生活，拒绝思想改造。因此，虽然她入党时间很长，但她的资产阶级个人主义思想却原封未动，并用这种现点来看党，认为党也是一个个人主义的集团。她把党的组织原则说成是“个人好恶所决定”，把党内的提级看成是“封官加爵”。","type":"paragraph"},{"text":"到会者对陈学昭在大放大鸣期间发表的反党言论进行了批驳。在省文联的座谈会上，翻译家许天虹用自己在旧社会的痛苦遭遇，有力地驳斥了陈学昭发表在5月18日文汇报上“乍暖还寒晴复雨”访问记中的论调。陈学昭在那篇访问记中说:“在浙江，一切都还是那么难，简直是千难万难!”许天虹认为把新社会说得那样千难万难，比在旧社会生活还难，这真是最恶毒的煽动。","type":"paragraph"},{"text":"到会者还指出，陈学昭经常污蔑党不重视文艺，不重视像她那样一个党员老作家。实际上，党和人民让她担任了全国政协委员、浙江省文联副主席等职位。","type":"paragraph"},{"text":"到会者又指出，陈学昭身为共产党员，却充当了反共宣传员。她经常串连小集团分子和一些对党不满分子到她家里去，恣意谩骂、诽谤党的领导。她的家成了传播资本主义毒素的巢穴。","type":"paragraph"},{"text":"到会者一致指出:从反右派斗争开始后，陈学昭还是不肯老实交代自己的问题，对党耍花招、撒无赖，先后作过三次交代，都是重复别人讲过的话，没有新内容。当别人揭露出新材料时，他就说自己“老糊涂”、“记不起来了”。更恶劣的是，每当她在群众面前作了一些交代以后，一到党内她又哭哭啼啼的把她所交代的事实全部推翻。说什么自己所以把一切承担下来，是为了“维护党在群众中的威信”，“为党撑面子”，二百斤担子，她为党挑了一百八十斤。","type":"paragraph"},{"text":"经群众揭露和批判，现在陈学昭已开始低头认罪，承认她是一个十足的党内右派分子，并且表示将进一步作全面的交代。","type":"paragraph"},{"text":" ——原载《文汇报》1957年9月10日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d794e71e2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
