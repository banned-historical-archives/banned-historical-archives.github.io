" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央对第五十九期《铁路情况快报》的批示及附件","authors":[],"dates":[{"year":1967,"month":9,"day":8}],"is_range_date":false,"parts":[{"text":"中共中央对第五十九期《铁路情况快报》的批示及附件","type":"title"},{"text":"各省、市、自治区革命委员会（筹备小组），各地军管会，各军区、省军区并转各群众组织：","type":"appellation"},{"text":"中央机关文化革命外地职工接待委员会办公室在第五十九期《铁路情况快报》上所反映的情况，值得各地重视。","type":"paragraph"},{"text":"大批人员无票扒车来京上访，是违反中央规定的。毛主席要接见上访人员也是谣传。希望各地发动群众，从组织、宣传等方面，大力加强劝阻工作，教育群众响应毛主席“抓革命、促生产”的伟大号召，坚持就地闹革命，搞好本单位的斗批改。","type":"paragraph"},{"text":" 中共中央一九六七年九月八日","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"铁路情况快报","type":"subtitle"},{"text":"（第五十九期）","type":"subtitle"},{"text":"又有大批人员无票扒车来京，其中以四川和东北为最多。（２０６）次客车上有四川学生七百多人，昨夜停在清风店车站（河北）经过六个小时的动员，劝阻下车三百多人，其余四百多人坚决不下车已来北京，被劝阻下车的三百多人，也拒不回去，可能继续扒车北上。近来从成都开出的客车，每列车都有少则数百多则上千人的无票群众扒车，成都车站无人负责，秩序很乱。东北各站无票扒车的情况也很严重。据外地来京群众反映“现在传说毛主席‘十一’要接见，要早去北京，去晚了就没有住处了。”根据这个情况各地都要早作准备，加强劝阻工作，否则将会有大量外地群众拥进北京，使接待工作更加困难。","type":"paragraph"},{"text":"津浦线离集车站（安徽）昨夜有数十名小商贩企图拦截（１４）次客车外出作买卖，并擅自扳动车站信号机，经车站制止，这些人就对车站进行围攻。车站驻军上前劝阻，并对为首者进行教育，但很快集结了小商贩一、两千人，手持扁担，赶跑了车站工作人员，围攻解放军，造成津浦线行车中断。","type":"paragraph"},{"text":"北京水电学院一名学生在安徽武斗中被打死，尸体昨天运到郑州车站，要求铁路把尸体装在冷藏货车内挂在（３６）次客车上运来北京与另一派对质。铁路部没有同意。动员他们就地火化。","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[二]》，武汉：1968年4月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d73513bea5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
