工程兵十连”"],"dates":[{"year":1971,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决支持印度支那人民的正义斗争"},{"type":"paragraph","text":"“无限忠于毛主席的风雪高原工程兵十连”"},{"type":"paragraph","text":"我们连的全体指战员，坚决拥护我国政府十二日发表的声明，坚决支持印度支那三国人民，彻底打败美国侵略者及其一切走狗！"},{"type":"paragraph","text":"伟大领袖毛主席指出：“印度支那三国人民加强团结，互相支援，坚持持久的人民战争，一定能够排除万难，取得彻底胜利。”近一年来，英雄的越南人民、高棉人民、老挝人民团结一致，并肩战斗，坚持持久的人民武装斗争，取得了辉煌的胜利。我们热烈欢呼印度支那三国人民打得好！"},{"type":"paragraph","text":"美帝调集大批美伪军大举入侵老挝南部地区。对此，我们表示极大的愤慨。美帝侵略魔爪伸得越长，手段越毒辣、越凶残，就失败得越惨。不管美帝怎样垂死挣扎，都改变不了这一规律。我国政府在声明中强调指出：“为了彻底打败美国侵略者及其走狗，中国人民将采取一切有效的措施，给予印度支那三国人民以全力的支援。”"},{"type":"paragraph","text":"越南、老挝、柬埔寨三国人民是我们的兄弟和战友。我们站在风雪高原，眼观五洲风云，决心和全国人民一道，全力支援印度支那三国人民，直到彻底打败美国侵略者及其走狗！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eba49b2a31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
