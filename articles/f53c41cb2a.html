script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"国务院批转内务部、劳动部、总参谋部关于当前安置退伍军人工作中存在问题的请示报告","authors":[],"dates":[{"year":1967,"month":11,"day":23}],"is_range_date":false,"parts":[{"text":"国务院批转内务部、劳动部、总参谋部关于当前安置退伍军人工作中存在问题的请示报告","type":"title"},{"text":"各省、市、区革命委员会（筹备小组），军管会、各大军区、省军区：","type":"appellation"},{"text":"现将《内务部、劳动部、总参谋部关于当前安置退伍军人工作中存在问题的请示报告》转发你们。国务院同意请示报告中所提的意见，请你们按此意见执行，切实做好退伍军人的安置工作。","type":"paragraph"},{"text":"最高指示","type":"subtitle"},{"text":"没有一个人民的军队，便没有人民的一切。","type":"paragraph"},{"text":"内务部、劳动部总参谋部关于当前安置退伍军人工作中存在问题的请示报告","type":"subtitle"},{"text":"国务院：","type":"appellation"},{"text":"今年八月二十日，中共中央、国务院、中央军委、中央文革小组发布的《关于进一步实行节约闹革命，控制‘社会集团购买力’，加强资金、物资和物价管理的若干规定》是完全正确的、适时的，应当坚决贯彻执行。但有些地区认为，根据这个规定，正常回到城市的复员退伍军人也不能安置了。最近据北京市、上海市、天津市、武汉市、河北省、南京市有关部门的报告和上访人员反映：回到城市的退伍军人的就业问题，遇到了很大困难，不但尚未安置的退伍军人已无安置门路，有些用人单位，甚至连原来已经决定录用的，也拒绝录用了。这是一个迫切需要解决的问题。","type":"paragraph"},{"text":"考虑到安置退伍军人是执行我们伟大领袖毛主席关于“拥军爱民”指示的一项重要内容，也是贯彻毛主席“备战、备荒、为人民”伟大战略思想的一个重要方面；同时，我们国家每年都从城市征集一批适龄青年入伍，每年也就有一批退伍军人回到城市。安排这些退伍军人就业，是一项正常的工作。为了使回到城市的退伍军人及时参加社会主义革命和社会主义建设，并避免使他们因生活无着而发生问题，遭致不良影响。我们建议，对原来从城市动员参军回到城市的退伍军人，重申以下安置原则：","type":"paragraph"},{"text":"对于退伍军人（包括复员军人，下同）在中央未作新的规定前，仍按一九五八年《国务院关于处理义务兵退伍的暂行规定》执行。对于占退伍军人绝大多数的从农村应征入伍的人员，仍安置到农村，从事农业生产；从工作岗位入伍，今后由部队处理退伍的，应准予复工复职，如用人单位由于安置这些退伍军人工资总额超出今年八月的实际水平，应当予以承认；参军前是家居城市的社会青年和学生，由当地革命委员会、军管会或抓革命促生产指挥部根据有关规定和当地用人具体情况积极设法予以安排。","type":"paragraph"},{"text":"以上意见，如可行，请批转各省、自治区、直辖市执行。","type":"paragraph"},{"text":" 内务部、劳动部、总参谋部一九六七年十一月二日","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第五集）》， 北京：1968年1月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f53c41cb2a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
