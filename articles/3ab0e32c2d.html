ors":[],"dates":[{"year":1960,"month":9,"day":8}],"is_range_date":false,"parts":[{"text":"林彪答《解放军报》编辑部问","type":"title"},{"text":"一定要把毛泽东思想真正学到手。一是掌握精神实质；二是掌握方法，就是唯物辩证法。要勤学多练。多练，就是反覆地学，学深学透，多实际运用，不要学一下就过去。","type":"paragraph"},{"text":"非常党化，就是要有坚强的组织观念、坚强的党的观念，要具有党的世界观、党的路线的观点。非常战斗化，就是在教育和训练中要实事求是，有利于战斗；不要学空教条，不要书呆子气，一定要使训练和教育适用于战斗。党化的问题，主要是红的问题，战斗化的问题，主要是专的问题，也就是业务。两者是三八作风的体现，也是三八作风的两个方面。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ab0e32c2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
