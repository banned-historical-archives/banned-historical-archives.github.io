ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对列宁反对第二国际机会主义斗争的一批材料的批语","alias":"","parts":[{"type":"paragraph","text":"对列宁反对第二国际机会主义"},{"type":"paragraph","text":"斗争的一批材料的批语"},{"type":"paragraph","text":"（1962年12月22日）柯老："},{"type":"paragraph","text":"此件很重要，请你印发会议各同志。大家读一、二遍，并讨论两天。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十二日"},{"type":"paragraph","text":"[1]指中共中央宣传部1962年12月14日编印的《宣教动态》第一O九期刊登的列宁反对第二国际机会主义斗争的材料。材料的主要内容有：一、恩格斯逝世到斯图加特大会；二、哥本哈根大会到巴塞尔大会；三、大战爆发到齐美尔瓦尔得代表会议；四、齐美尔瓦尔得代表会议；五、昆塔尔会议；六、齐美尔瓦尔得的破产与第三国际的建立。另有附件：一、巴塞尔大会宣言；二、关于大战爆发后第二国际政党的叛变的几个文件；三、俄国社会民主党的宣言；四、齐美尔瓦尔得左派的几个文件。"},{"type":"paragraph","text":"[2]柯老，指柯庆施，当时任中共中央政治局委员、中共上海市委第一书记。"},{"type":"paragraph","text":"[3]指参加中共中央政治局会议的同志。对列宁反对第二国际机会主义斗争的一批材料的批语"},{"type":"paragraph","text":"二古诗一首。咏后唐李克用和其儿子后唐庄宗李崇（存）诗。"},{"type":"paragraph","text":"三垂冈2英雄立马起沙陀，奈此朱梁跋扈何。只手难扶唐社稷，连城犹（且）拥晋山河。风云帐下奇儿在，鼓角灯前老泪多。萧讽（瑟\u003e三垂冈下\u003c畔）路，"},{"type":"paragraph","text":"至今人唱百年歌。"},{"type":"paragraph","text":"[1]李克用，唐朝沙陀部人，曾封为晋王。后其子李存建立后唐，他被尊为太祖。"},{"type":"paragraph","text":"[2]《三垂冈》这首诗为清朝诗人严遂成所作，毛泽东将它写在这一期《宣教动态》最后一页的空白处。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":302,"page_end":303},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ce59ee6a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
