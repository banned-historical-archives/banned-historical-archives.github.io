script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《巴特寮新闻》谴责万象极右派肆意违反万象协定  揭露万象极右派准备新的军事冒险  四万多群众从万象方面控制区返回解放区","authors":[],"dates":[{"year":1975,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《巴特寮新闻》谴责万象极右派肆意违反万象协定"},{"type":"paragraph","text":"揭露万象极右派准备新的军事冒险"},{"type":"paragraph","text":"四万多群众从万象方面控制区返回解放区"},{"type":"paragraph","text":"新华社万象一九七五年五月七日电　据《巴特寮新闻》报道，万象极右派最近正在加紧抓兵，并且在万象进行新的军事调动和部署，准备新的军事冒险。"},{"type":"paragraph","text":"报道说，四月二十九日，万象极右派出动直升飞机，把右派军队从富考奎运往万象的基乃莫兵营。第二天，他们又用军车把一批军用物资从丰庆兵营运往丰洪兵营，同时还用军车和飞机把全副武装的万象军队从丰庆兵营运往万象北部地区。"},{"type":"paragraph","text":"四月底和五月初，万象极右派在琅勃拉邦和沙耶武里抓了五百三十名青年，以补充琅勃拉邦和万象的右派军队。三月初，万象极右派还在占巴塞省征集了一百二十名新兵。"},{"type":"paragraph","text":"此外，还有一些穿便衣的美国军人住在琅勃拉邦的南坎旅馆里，充当万象右派军队的顾问，进行指挥活动。"},{"type":"paragraph","text":"《巴特寮新闻》五月六日发表评论，揭露和谴责万象极右派肆意违反万象协定及其议定书，出动军队进攻沙拉富昆等解放区的罪行。评论警告说，如果万象极右派仍然顽固违反协定，不把军队撤出沙拉富昆等地，火将进一步烧到他们的头上。"},{"type":"paragraph","text":"评论最后说，为正义而斗争的老挝爱国军民，必将不断前进。"},{"type":"paragraph","text":"新华社万象一九七五年五月七日电　据《巴特寮新闻》报道，今年以来，四万多名在战争期间被美国和老挝极右派强迫迁入万象方面控制区的群众返回他们在解放区的家园。"},{"type":"paragraph","text":"从今年一月底以来，返回川圹省解放区的群众共有两万三千多名；返回桑怒省解放区的有一万七千八百多名；从三月下旬到四月下旬的一个月内，返回琅南塔、沙耶武里和乌多姆塞三个省解放区的群众就有一万多名。在中、下寮各省，许多群众也纷纷返回家园，今年头三个月，仅返回甘蒙省解放区的群众就有一千六百多名。"},{"type":"paragraph","text":"返回家园的群众，受到了解放区各级政权和人民群众的热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9d661c1b9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
