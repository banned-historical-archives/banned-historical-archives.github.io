国主义和现代修正主义","authors":[],"dates":[{"year":1962,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热烈庆祝阿尔巴尼亚独立日和解放日"},{"type":"paragraph","text":"北京长辛店机车厂职工集会"},{"type":"paragraph","text":"宾主强调一定能战胜帝国主义和现代修正主义"},{"type":"paragraph","text":"据新华社26日讯　长辛店机车车辆厂职工今晚举行集会，热烈庆祝阿尔巴尼亚独立五十周年和解放十八周年。由阿尔巴尼亚劳动党中央委员、农业部长佩蒂·沙姆布利率领的阿中友好协会代表团全体成员和阿尔巴尼亚驻中国大使馆的外交官员应邀出席晚会。"},{"type":"paragraph","text":"工厂党委书记吴文彬在晚会上讲话，他代表全厂职工和家属向守卫在社会主义阵营西南最前哨的英雄的阿尔巴尼亚工人兄弟和人民热烈祝贺节日。他赞扬阿尔巴尼亚工人和人民在阿尔巴尼亚劳动党和霍查同志领导下，在同帝国主义、现代修正主义进行坚决斗争和在社会主义建设中所表现的英雄气概以及取得的伟大成就。他说，我们全厂职工和全国人民一样，对兄弟的阿尔巴尼亚人民所取得的光辉成就感到欢欣鼓舞，我们认为阿尔巴尼亚人民的每一个胜利就是我们的胜利。"},{"type":"paragraph","text":"阿中友好协会代表团团员、阿尔巴尼亚劳动党中央候补委员、萨兰达区党委书记巴·谢胡在热烈的掌声中讲话。她向机车车辆厂工人转达了阿尔巴尼亚工人阶级和人民的革命敬意，祝他们在建设社会主义祖国中取得更大的胜利。她赞扬了中国人民在中国共产党领导下进行社会主义建设中所取得的成就，以及在同帝国主义作斗争和保卫马克思列宁主义纯洁性的斗争中所表现的坚决立场。"},{"type":"paragraph","text":"阿中友好协会代表团团长佩蒂·沙姆布利也在会上讲话。"},{"type":"paragraph","text":"他说，代表团在中国访问的四天里，受到了中国工人阶级和中国人民的热烈欢迎，这种欢迎对阿尔巴尼亚人民是很大的支持。他说，战无不胜的马克思列宁主义把我们两国连在一起，我们两国人民将在今后的斗争中永远携手前进。他在讲话中表示深信，马克思列宁主义和社会主义一定能战胜帝国主义和现代修正主义。"},{"type":"paragraph","text":"参加今天晚会的还有中共北京市委书记处书记、北京市副市长冯基平，中阿友好协会秘书长刘子余等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff8a9efdbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
