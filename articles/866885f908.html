{"year":1965,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国棉一厂　杨富珍"},{"type":"paragraph","text":"看了《人民战争胜利万岁》这部影片，使我受到了一次深刻的教育，影片里的每个镜头都激励着我，鼓舞着我。影片使我看到了帝国主义者怎样侵犯我们的祖国，在我们的国土上象野兽一样惨无人道地残害我们的同胞，抢走我们的财富。而国民党反动派却采取了消极抗日、积极反共的卖国投降政策，真是使人恨之入骨。我们中国人民，在伟大的中国共产党和伟大的领袖毛主席的领导下，进行了英勇顽强的不屈不挠的斗争，在敌强我弱的十分不利的情况下，克服了重重困难，经过了艰难的岁月，终于取得了抗日战争的伟大胜利，赶走了帝国主义，打败了国民党反动派，把中国从黑暗中解放出来。"},{"type":"paragraph","text":"影片不仅使我了解了中国人民革命战争的历史，更使我懂得了中国人民只有在中国共产党的正确领导下，在毛泽东思想的指引下，坚决走毛主席指出的道路，才能战胜一切艰难、危险，取得革命斗争的胜利，才能有光明的前途。毛泽东思想，光芒万丈，它是不落的太阳，它永远照亮了我们中国人民的心。"},{"type":"paragraph","text":"革命的先辈为我们打下了江山，开辟了幸福的道路。现在党和毛主席号召我们要自力更生，奋发图强，尽快地把我们祖国建设成为一个伟大的社会主义强国。虽然这是一个十分艰巨的任务，在完成这个任务的过程中我们一定会碰到许多困难；但是，我相信，只要我们坚决听毛主席的话，按照毛主席的指示去做，那末，再艰巨的任务，再大的困难，也吓不倒我们，我们一定能够克服。这一点，我是有着深刻的体会的。就拿我们的生产来讲吧，开始我们织的是平布，后来织细布，以后做低档府绸，现在又织高档府绸，十几年来，翻改了十几个产品，而且一个比一个要求高，一个比一个难做，给我们带来了很多的困难。但是，我记住毛主席的教导，要在战略上藐视敌人，所以总是以百倍的信心和勇气，以敢于斗争、敢于胜利的态度对待翻改任务。但是毛主席还告诉我们，必须在战术上重视敌人，所以我又严格要求自己，苦练操作技术，提高操作水平。就是这样，我按照毛主席的教导，战胜了每次翻改品种的困难，顺利地完成了翻改任务，在有些翻改任务中自己还有一些创造。最近，我们纺织厂要推广不拆二时以上的坏布的措施，也碰到了许多困难，但是我们都把困难当作“纸老虎”，象对待敌人一样，一个一个地把它消灭掉。因此，我体会到不管是革命战争，还是生产斗争，只要我们按照毛主席指出的方向去做，就一定可以取得胜利。"},{"type":"paragraph","text":"在今后的社会主义革命和社会主义建设的道路上，我们还会碰到很多新的困难，特别是美帝国主义正在加紧侵略越南，并企图进一步扩大战争。我们要打击帝国主义的侵略，要积极支援越南人民的抗美斗争，同时还要支援世界上三分之二被压迫的人民的解放斗争。因此，我们肩上还挑着很重的担子，在我们的面前还有很多的困难。所以，我们更要加倍努力学习毛主席著作，用毛泽东思想来武装自己的头脑，苦练技术硬功夫，积极地学习石家庄仇锁贵掌握机械的经验，做机器的主人，把生产搞得更好，来完成这个艰巨的任务。"},{"type":"paragraph","text":"(王国强　整理)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"866885f908"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
