art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见并宴请基辛格博士"},{"type":"paragraph","text":"邓小平副总理二十七日晚上会见了亨利·基辛格博士，同他进行了友好的谈话。他们的谈话涉及到当前国际形势中的一些问题。"},{"type":"paragraph","text":"基辛格博士的部分随行人员参加了会见。"},{"type":"paragraph","text":"会见以后，邓小平副总理设宴招待基辛格博士和夫人一行。"},{"type":"paragraph","text":"李先念副主席会见索马里革命社会主义党干部代表团"},{"type":"paragraph","text":"中共中央副主席、国务院副总理李先念二十七日下午会见由团长奥马尔·萨拉德·埃勒米率领的索马里革命社会主义党干部代表团。"},{"type":"paragraph","text":"代表团是在索马里革命社会主义党和西亚德总统的关怀下组成的，成员中包括了索马里全国各州党的主要负责人。会见时，李党念副主席同代表团成员进行了亲切友好的谈话。"},{"type":"paragraph","text":"人大常委会副委员长、中联部部长姬鹏飞参加了会见，并在会见后设宴招待代表团全体成员。姬鹏飞副委员长和埃勒米团长在宴会上先后祝酒。"},{"type":"paragraph","text":"邓颖超副委员长会见斯诺夫人"},{"type":"paragraph","text":"人大常委会副委员长邓颖超二十六日上午在人民大会堂会见美国友人洛伊斯·斯诺夫人和她的朋友英格·米勒夫人。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b24bf0e9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
