art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"揭穿修正主义谬论的实质","authors":[],"parts":[{"type":"paragraph","text":"本报讯 济南部队某部读书班的同志从读书中，学习无产阶级革命导师同形形色色的修正主义头子斗争的艺术，用于当前的批修斗争。"},{"type":"paragraph","text":"他们看到，恩格斯在批判杜林的平等观时，先是揭露松林在思想方法上的先验主义，接着一层一层地揭露他的“三个退却”，批判了他的平等观在政治上的反动性和逻辑上的荒谬性，进而揭露了他的平等观的反动本质。大家认为，批判刘少奇一类骗子修正主义路线，就应当象革命导师恩格斯批判江湖骗子杜林那样，由表及里，层层剥皮，揭穿其反动谬论的实质。"},{"type":"paragraph","text":"他们在批判刘少奇一类骗子的“英雄和奴隶共同创造历史”的谬论时，首先围绕这一反动观点是在什么情况下抛出来的问题进行分析。大家清楚地看到，这一反动谬论，是他们在鼓吹“英雄创造历史”的唯心史观遭到批判后抛出来的，是唯心史观的改头换面。然后，大家学习历史唯物论的基本观点，认识到，是英雄创造历史，还是奴隶们创造历史，这是区别历史唯物论和历史唯心论的根本原则问题。刘少奇一类骗子把“英雄”和“奴隶”并列起来，这完全是一种折衷主义的骗术。最后，大家联系刘少奇一类骗子把自己吹捧成是什么“天才”、“超群之才”，清楚地看到，他们鼓吹“英雄和奴隶共同创造历史”的谬论，归根到底是要把自己打扮成“先知先觉的人物”，为他们反党篡权，复辟资本主义制造舆论。读书班的同志说，由表及里，层层剥皮，就能撕掉他们的伪装，认清他们的本来面目。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46a505f54c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
