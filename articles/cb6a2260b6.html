在杭州参观游览时受到革命群众的热烈欢迎","authors":[],"dates":[{"year":1971,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社杭州十八日电　浙江省革命委员会今天晚上举行文艺晚会，热烈欢迎柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，以及其他柬埔寨贵宾。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英，浙江省革委会副主任、浙江省军区司令员熊应堂，人大常委会副委员长、浙江省革委会副主任周建人，以及浙江省、杭州市革委会负责人赖可可、王子达等，陪同西哈努克亲王和夫人等柬埔寨贵宾观看演出。"},{"type":"paragraph","text":"西哈努克亲王的姑母诺罗敦·凯卡妮娅公主，柬埔寨王国民族团结政府军需、军备大臣杨森安将军和夫人，国家元首办公厅主任西索瓦·梅达维亲王，柬埔寨驻中国大使凯密等柬埔寨贵宾也出席了晚会。"},{"type":"paragraph","text":"晚会上，革命文艺工作者演出了西哈努克亲王作词作曲的《金边之歌》、《怀念中国》以及其他革命歌舞，受到贵宾们的热烈欢迎。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召以及杨玲同志也陪同观看演出。"},{"type":"paragraph","text":"今天上午，西哈努克亲王和夫人以及其他柬埔寨贵宾乘船游览了西湖，参观了杭州古迹灵隐寺。下午，杨森安将军和夫人等柬埔寨贵宾观看了中国人民解放军某部的军事表演，参观了杭州市东方红丝织厂。在参观、游览中，西哈努克亲王和夫人等柬埔寨贵宾受到了杭州市革命群众和人民解放军指战员的热烈欢迎。人们高呼口号，向柬埔寨贵宾表示坚决支持柬埔寨人民的抗美救国战争，坚决和印度支那三国人民团结在一起，战斗在一起，胜利在一起。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb6a2260b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
