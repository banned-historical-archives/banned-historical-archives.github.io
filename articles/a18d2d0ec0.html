ors":[],"dates":[{"year":1966,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工农结合城乡结合的大道越走越宽广"},{"type":"paragraph","text":"大庆人座谈贯彻毛主席伟大指示的体会"},{"type":"paragraph","text":"毛泽东思想哺育起来的大庆油田职工和家属，看到毛主席关于各行各业都要办成亦工亦农、亦文亦武的革命化大学校的指示以后，受到了极大的鼓舞。连日来，油田到处喜气洋洋，钻井场上，采油井旁，工农村里，人们纷纷集会学习讨论。毛主席指示的一字一句，都使他们感到非常亲切。他们联系油田开发六年来的实际，歌颂毛主席的英明、伟大、正确，歌颂毛泽东思想的威力无穷。他们说：毛主席在指示里提到了大庆，给我们提出了更高的要求。有毛主席的英明领导，过去我们能拿下世界第一流的大油田，建设了城乡结合、工农结合的新型矿区，今后也一定能把油田办成毛泽东思想的大学校，把自己锻炼成为亦工亦农、亦文亦武全面发展的共产主义新人，跟着毛主席乘风破浪，奔向共产主义！"},{"type":"paragraph","text":"我们请了一些大庆油田职工、家属和学校师生座谈毛主席的这个伟大指示，下面是发言纪要。　编者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a18d2d0ec0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
