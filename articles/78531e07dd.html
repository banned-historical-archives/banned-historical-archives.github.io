ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"给郭沫若“的信","alias":"","parts":[{"type":"paragraph","text":"给郭沫若\"的信"},{"type":"paragraph","text":"（1944年1月9日）郭沫若兄："},{"type":"paragraph","text":"收到《虎符》，全篇读过，深为感动。你做了许多十分有益的革命的文化工作，我向你表示庆贺。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月九日延安"},{"type":"paragraph","text":"[1]郭沫若（1892—1978)，四川乐山人，历史学家、文学家和革命活动家。抗日战争时期，曾在周恩来任副部长的国民政府军事委员会政治部任第三厅厅长、文化工作委员会主任，在国民党统治区组织进步文化人士从事抗日宣传工作。"},{"type":"paragraph","text":"[2]《虎符》，是郭沫若1942年2月写的一部历史话剧。剧本取材于战国时期魏国信陵君和安王的宠姬如姬窃符救赵的故事，借此宣传爱国主义思想，从而坪击国民党的卖国投降政策和摧残抗敌力量的暴行。"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":1,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":301,"page_end":301},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78531e07dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
