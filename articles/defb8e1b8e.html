rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一心为公才能一不怕苦二不怕死","authors":["武汉部队学习毛主席著作积极分子/一等功荣立者周述平〖HH/换行〗DW：武汉部队"],"parts":[{"type":"paragraph","text":"我们共产党员，要把无产阶级专政下的革命进行到底，实现共产主义的伟大理想，就要与国内外的阶级敌人进行长期的你死我活的搏斗。在党的事业需要我们献身的时候，是勇于牺牲，还是贪生怕死，这是鉴别真革命或者假革命、反革命的试金石。我们要做一个真正的共产党员、革命战士，就必须树立起一不怕苦、二不怕死的彻底的无产阶级世界观，这样才能担当实现共产主义的伟大历史使命。"},{"type":"paragraph","text":"毛主席教导我们：共产党员必须“以革命利益为第一生命”。在毛泽东思想的哺育下，我曾八次冒着生命危险抢救战友。一次，部队进行夜间手榴弹实弹投掷训练，一位新战士由于挥臂过猛，把拉燃的手榴弹扔到了右后方，落在四班战士的面前。这时，能不能牺牲自己，掩护同志，是对我的一个严重的考验。毛主席教导我们：“关心党和群众比关心个人为重，关心他人比关心自己为重。这样才算得一个共产党员。”为了阶级兄弟的生命安全，我决心牺牲自己保护同志，就向手榴弹猛扑过去。我虽然全身中弹片一百二十多片，负伤四十五处，左腿粉碎性骨折，可是，保护了十二名阶级兄弟的生命安全。只要阶级兄弟安然无恙，我粉身碎骨也心甘情愿。"},{"type":"paragraph","text":"我深深体会到，一不怕苦、二不怕死的核心是个无产阶级的“公”字。头脑里树立了“公”字，才能做到一不怕苦、二不怕死。张思德、刘胡兰、雷锋等革命烈士，他们的生命虽是短暂的，但是，他们一心为人民，一心为革命，一心为公的崇高品质，是永垂不朽的。我们只有活学活用毛泽东思想，自觉地改造世界观，彻底斗倒“私”字，树立“公”字，才能充分发扬一不怕苦、二不怕死的革命精神，真正做到为共产主义奋斗终身。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"defb8e1b8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
