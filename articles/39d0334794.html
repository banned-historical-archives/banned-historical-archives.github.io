rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平会见哈特林一行向他们介绍了粉碎“四人帮”后我国取得的显著成就","authors":[],"parts":[{"type":"paragraph","text":"据新华社9月2日讯 中共中央副主席邓小平今天上午在人民大会堂会见了联合国难民事务高级专员保尔·哈特林和夫人一行。"},{"type":"paragraph","text":"邓小平首先介绍了中国的情况。他说，粉碎“四人帮”以后，我们在三个方面取得了显著成就：一、在全国确立了安定团结的政治局面；二，在工业、农业、财贸等方面制定了一系列行之有效的政策；三、在正确政策的基础上，人民的生产积极性调动起来了。邓小平说，党的十一届六中全会以后，我们正集中精力搞四化建设，使国家好起来，人民富裕起来。同时，要千方百计使我们的干部年轻化。他说，我们的任务是艰巨的，但我们的事业是有希望的。"},{"type":"paragraph","text":"会见时，哈特林高度评价中国在解决难民问题上所作的努力。他说，中国不仅妥善安置了来自越南的二十六万难民，还向流入巴基斯坦的难民和非洲的难民提供了援助。"},{"type":"paragraph","text":"邓小平表示，中国将本着人道主义精神，在解决难民问题上继续同联合国合作。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39d0334794"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
