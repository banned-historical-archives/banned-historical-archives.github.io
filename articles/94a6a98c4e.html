art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决完成毛主席交给的伟大历史任务","authors":["长沙政治学校无产阶级革命派"],"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席在文化大革命取得决定性胜利的关键时刻，又发出了新的战斗动员令，把无产阶级教育革命的伟大历史任务，交给了学校中的广大革命的学生，革命的教员，革命的工人，决心把无产阶级文化大革命进行到底的无产阶级革命派。这是对我们的最大信任，最大关怀，最大鼓舞，最大鞭策。"},{"type":"paragraph","text":"我们军队院校，是培养伟大人民解放军建军骨干的重要基地。可是，中国赫鲁晓夫及其代理人彭德怀、罗瑞卿，却妄图把军队院校变成他们篡党篡军，复辟资本主义的工具。我们政治学校，自从成立的那一天起，从来没有间断过两种教育思想、两种教育路线的斗争。彭德怀、罗瑞卿秉承其主子的旨意，全盘否定我军院校所特有的“抗大”的光荣传统，把资产阶级的所谓正规化、系统化，强行搬到我们政治学校来，以苏修一整套陈腐不堪的教育制度来改造我们的学校。更恶毒的是，他们反对我们学习当代最高水平的马克思列宁主义——毛泽东思想；硬要把黑《修养》规定为什么“党员的必修课”，向学员灌输修正主义的毒素。"},{"type":"paragraph","text":"我们学校培养什么样的学员，对我军建设关系很大。如果按照中国赫鲁晓夫及其代理人彭德怀、罗瑞卿的资产阶级建军路线和教育路线办学校，势必将我校办成传播修正主义思想、理论的基地，变成他们篡党篡军的工具。因此，彻底地进行教育革命，彻底清除修正主义教育路线，是培养无产阶级革命事业接班人的需要，是反修防修的需要。"},{"type":"paragraph","text":"十几年来，特别是林副主席主持军委工作以来，我校广大革命教职员工，高举毛泽东思想伟大红旗，坚持“抗大”的光荣传统，对资产阶级教育思想和教育路线反复地进行了顽强斗争。我们决心更高举起毛泽东思想伟大红旗，以毛主席的“五·七”指示为最高纲领，彻底清除中国赫鲁晓夫及其代理人彭德怀、罗瑞卿推行的修正主义教育路线对我校的影响，在教育方针、教育内容、教育制度、教育方法等方面，进一步实行最彻底的革命，把我校办成完全按照毛主席建军思想和教育思想建设起来的、具有“抗大”光荣传统的新型政治学校。使我校培养出来的军队政治工作干部，决不是资产阶级的官老爷，而是无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命路线的坚强战士；不是书呆子和精神贵族，而是在阶级斗争的大风大浪中锻炼成长起来的无产阶级革命派，真正成为我军政治建军的坚强骨干。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94a6a98c4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
