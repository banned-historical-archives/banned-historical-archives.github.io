al-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"中央政府电贺东方红军的伟大胜利","alias":"","parts":[{"type":"paragraph","text":"中央政府电贺东方红军的伟大胜利"},{"type":"paragraph","text":"（1933年8月8日）东方作战军总指挥政委，并转全体指战员的同志："},{"type":"paragraph","text":"英勇的你们，在东方战线上把顽强的敌十九路军打得落花流水。这一胜利，表现出工农红军已更加壮健，更加无敌，给正在布置第五次“围剿”的帝国主义国民党以极大威胁，也就是粉碎敌人第五次“围剿”的一个开始胜利，我们听到非常欣慰。在现时这个革命和反革命决胜负的历史转变时期，苏维埃中央政府已在组织和领导全国红军及千百万工农劳苦群众，为冲破敌人的五次“围剿”，争取苏维埃中国而奋斗。相信英勇的你们，必然在这一次的任务下，奋发更大的勇气，向前消灭更多的敌人，取得更大更光荣的胜利。"},{"type":"paragraph","text":"中央政府主席毛泽东"},{"type":"paragraph","text":"副主席项英张国焘一九三三年八月八日"}],"authors":["毛泽东"],"dates":[{"year":1933,"month":8,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":356,"page_end":356},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d22fcb6c1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
