art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"按照毛泽东思想办事就是胜利","authors":[],"parts":[{"type":"paragraph","text":"我国今年新建小型化肥厂大批投入生产，化肥产量显著增加。这对于支援农业生产具有重大意义。这个新的胜利再次证明：毛泽东思想用到哪里哪里灵。按照毛泽东思想办事，就是胜利！"},{"type":"paragraph","text":"伟大的毛泽东思想，是我们一切工作胜利的根本保证。坚持毛泽东思想挂帅，我们无产阶级革命和建设事业就会前进，就会兴旺。离开毛泽东思想，依靠物质刺激，业务挂帅，社会主义企业就会蜕变为资本主义企业，一切生产建设事业不但不能前进，反而会开倒车，退下来。"},{"type":"paragraph","text":"伟大的毛泽东思想，反映了阶级斗争、生产斗争和科学实验三大革命运动的客观规律，反映了无产阶级、一切劳动人民的革命要求和根本利益。活学活用毛主席著作，使毛泽东思想同广大工农群众见面，为广大工农群众所掌握，就能大大提高人们的无产阶级觉悟，实现人的思想革命化；就能使精神力量转化为巨大的物质力量，在建设事业中不断创造奇迹。"},{"type":"paragraph","text":"我国化肥工业战线的广大职工，以大庆为榜样，按照毛泽东思想办企业，强调突出政治，用毛泽东思想武装职工头脑，把突出政治落实到促进人的思想革命化，结果，就带动了生产，创出了新水平，企业就出现了新面貌。这有力地说明，用毛泽东思想挂帅，按毛泽东思想办事，我们的革命和建设事业就会势如破竹地前进，无往而不胜。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04a25df87d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
