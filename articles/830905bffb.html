ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对贺诚关于召开第二届全国卫生会议的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对贺诚关于召开第二届全国卫生会议的报告的批语"},{"type":"paragraph","text":"（1952年11月26日）贺诚同志："},{"type":"paragraph","text":"（一）题词可写，请你们拟出几个简单语句送我择书；（二）此次会议准备工作甚为重要，应和习仲勋、胡乔木同志商酌，并在文委党组加以讨论。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月廿六日[1]贺诚，当时任中央人民政府卫生部副部长。"},{"type":"paragraph","text":"[2]指为第二届全国卫生会议的题词。毛泽东题词的全文是：“动员起来，讲究卫生，减少疾病，提高健康水平，粉碎敌人的细菌战争。”"},{"type":"paragraph","text":"[3]指定于1952年12月上旬召开的第二届全国卫生会议。这次会议拟总结爱国卫生运动及三年来卫生建设情况，并评奖爱国卫生运动模范，举办带有评比性的卫生展览。"},{"type":"paragraph","text":"[4]习仲勋，当时任中共中央宣传部部长、政务院文化教育委员会副主任。胡乔木，当时任中共中央宣传部副部长、政务院文化教育委员会秘书长。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":11,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":341,"page_end":341},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"习仲勋","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"830905bffb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
