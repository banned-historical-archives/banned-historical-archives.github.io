,"dates":[{"year":1950,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】北京廿八日消息:十一月廿九日是阿尔巴尼亚解放六周年纪念，我中央人民政府毛泽东主席和周恩来总理兼外交部部长在廿六日分别打电报给阿尔巴尼亚人民共和国国民议会主席团主席尼沙尼和部长会议主席兼外交部部长霍查，表示祝贺。电文如下:"},{"type":"paragraph","text":"(一)毛主席贺电"},{"type":"paragraph","text":"阿尔巴尼亚人民共和国国民议会主席团主席欧麦·尼沙尼先生:"},{"type":"paragraph","text":"欣逢阿尔巴尼亚解放六周年纪念，我代表中华人民共和国政府及人民谨向阁下及阿尔巴尼亚人民致庆贺之忱，并祝阿尔巴尼亚人民在经济、文化的建设上日益成功。"},{"type":"paragraph","text":"毛泽东　一九五○年十一月廿六日　北京"},{"type":"paragraph","text":"(二)周总理贺电"},{"type":"paragraph","text":"阿尔巴尼亚人民共和国部长会议主席兼外交部部长昂凡尔·霍查先生:"},{"type":"paragraph","text":"欣逢阿尔巴尼亚解放六周年纪念谨向阁下、贵国政府及人民致热烈的庆贺。"},{"type":"paragraph","text":"周恩来　一九五○年十一月廿六日　北京"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a3e3597d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
