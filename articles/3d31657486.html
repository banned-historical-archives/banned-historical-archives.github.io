:1982,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英同志祝贺团十一大"},{"type":"paragraph","text":"新华社北京12月30日电　叶剑英同志今天向新华社记者发表谈话，热烈祝贺共青团第十一次全国代表大会的召开。叶剑英说：共青团的第十一次全国代表大会，我虽然没能参加，但知道开得很好，很成功，我表示热烈的祝贺。"},{"type":"paragraph","text":"他说：党中央和老一辈革命家十分关心青年一代；青年一代决心奋起，担当历史的重任。我们的国家大有希望。"},{"type":"paragraph","text":"叶剑英说：共产主义要经过一代接着一代的坚持不懈的努力才能实现。我相信，我们今"},{"type":"paragraph","text":"天顺利实行的新老合作和交替，将产生巨大的历史推动力，引导着我们的子孙后代不断地开"},{"type":"paragraph","text":"拓前进，终于会在人类历史发展的丰碑上写着："},{"type":"paragraph","text":"共产主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d31657486"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
