:[],"article":{"title":"中共中央组织部、劳动人事部、财政部关于补发‘文化大革命’期间职工被扣发的保留工资问题的复函","dates":[{"year":1986,"month":4,"day":17}],"is_range_date":false,"authors":["中共中央组织部","劳动人事部","财政部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局, 干审工作政策文件选编 (上), 795-796","tags":[{"name":"调整","type":"主题/事件"},{"name":"工资","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部、劳动人事部、财政部关于补发“文化大革命”期间职工被扣发的保留工资问题的复函"},{"type":"paragraph","text":"1986年4月17日·劳人薪〔1986〕46号"},{"type":"paragraph","text":"最近有些地区和部门来函询问，“文化大革命”期间职工被扣发的保留工资能否恢复和补发。经研究，现答复如下："},{"type":"paragraph","text":"一九八一年中共中央组织部曾以中组发（81)14号文件转发了《中共中央对湖南省委关于“文化大革命”中冤假错案补发工资问题的请示报告的批复》，同意职工在“文化大革命”中因冤假错案而被扣发的工资，原则上应予补发。鉴于保留工资属于工资的一部分，因此职工在“文化大革命”期间被扣发的保留工资，也应按上述文件精神办理，原则上应予补发。具体处理办法，请各省、自治区、直辖市，中央和国家机关各部委，根据具体情况确定。但在补发保留工资时，如职工在扣发保留工资期间升过级的，应扣除当时文件规定升级应冲销的部分。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3100b7db17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
