,"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"毛泽东: 永远保持艰苦奋斗的作风","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"延安的同志们和陕甘宁边区的同胞们：","type":"appellation"},{"text":"接到你们的贺函，使我十分愉快和感谢。延安和陕甘宁边区，从一九三六年到一九四八年，曾经使中共中央的所在地，曾经是中国人民解放斗争的总后方。延安和陕甘宁边区的人民对于全国人民是有伟大贡献的。我庆祝延安和陕甘宁边区的人民继续团结一致，迅速恢复战争的创伤，发展经济建设和文化建设。我并且希望，全国一切革命工作人员永远保持过去十余年间在延安和陕甘宁边区的工作人员中所具有的艰苦奋斗的作风。","type":"paragraph"},{"text":" 毛泽东一九四九年十月二十六日","type":"paragraph"}],"comments":[],"origin":"原载一九四九年十月二十七日《人民日报》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a3c1905e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
