<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓住极右实质　深入批林批孔枫林中学师生员工在斗争中受到深刻的思想和政治路线方面的教育","authors":[],"dates":[{"year":1974,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　枫林中学党支部发动和组织全校师生紧密联系教育战线的斗争实际，深入批林批孔，使师生进一步认清了林彪反革命修正主义路线的极右实质，受到了一次深刻的思想和政治路线方面的教育。"},{"type":"paragraph","text":"在毛主席和党中央发出新的战斗号令后，这个学校的广大师生员工纷纷行动起来，积极投入批林批孔的斗争。连日来，学校召开了多次各种类型的批判会，出了许多大批判专栏，一批批大字报犹如一支支利箭，射向林彪和孔子。学校里还成立了战斗队，师生们自编自演快板、诗歌、活报剧，运用多种形式向林彪和孔老二猛烈开火。"},{"type":"paragraph","text":"全校师生员工抓住“克己复礼”的反动纲领进行批判。大家说:林彪鼓吹“克己复礼”，就是为了搞资本主义复辟。一位工宣队师傅说:在教育战线上，革新与反革新、前进与倒退的斗争十分激烈。关于“十七年与七年”的争论，就说明了这个问题。文化大革命前的十七年教育阵地被资产阶级专了政，这是铁的事实，有些人留恋十七年，否定文化大革命在教育战线上所取得的胜利成果。这是“克己复礼”在教育战线上的反映。我们要迎头痛击资产阶级复辟思潮，把无产阶级教育革命进行到底!"},{"type":"paragraph","text":"广大师生员工还抓住两千多年来从“学而优则仕”到“读书做官”，从“不学稼圃”到“变相劳改”，从“博学于文”到“五分多”、“尖子多”这条前后贯穿下来的黑线进行批判，使大家进一步认清了孔子和林彪在教育上搞的这一整套东西都是为他们在政治上搞复辟服务的。中四年级的贺国光同学批判了孔子的“父母在，不远游”的反动思想，坚决要求上山下乡，领导批准了他的革命要求。"},{"type":"paragraph","text":"通过学习、批判，大家深深体会到，我们无产阶级教育革命要前进，就必须狠批林彪路线的极右实质，就必须与两千多年来的剥削阶级政治偏见和习惯势力实行彻底决裂。中三(3)班原来是全校有名的“温吞水”班级，从表面上看，这个班级纪律好，学生“听话”，但是有些人“读书死用功，五敢精神看不见”。在批林批孔中，班级里的红卫兵和同学们批判了“笃信好学，守死善道”和“五分多”、“尖子多”的反动谬论，提出了“要做敢于斗争的无产阶级革命事业接班人，不做唯唯诺诺的资产阶级俘虏”的响亮口号，在全校最先贴出革命大字报，一针见血地指出，不对孔孟之道和剥削阶级的习惯势力展开进攻，资本主义随时有复辟的危险。这个班级的师生为了把林彪和孔子的谬论批深批透，冲破过去“两耳不闻窗外事，一心专读圣贤书”的反动思想的束缚，跨出校门，走进工厂，和工人老师傅一起深入批林批孔，学习工人阶级的彻底革命精神，提高了政治思想觉悟。"},{"type":"paragraph","text":"批林批孔斗争的深入开展，有力地促进了教育革命。在这个学校里，开门办学、学生上讲台、考试改革、民主评分等新生事物不断涌现。他们兴奋地说:“这是批林批孔给教育革命带来的崭新局面。”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ab9eb7f78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
