ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"和续范亭的谈话","alias":"","parts":[{"type":"paragraph","text":"和续范亭的谈话!"},{"type":"paragraph","text":"（1944年4月30日）"},{"type":"paragraph","text":"韩信在登坛拜将以前，还在汉中当过“粮食部长”。朱总司令自述他初做军官就充当司务长，旧日司务长正是管连队生活，并负训练与作战的责任。现在我们的大将们都研究粮食问题，全体指战员都亲自动手，建立各单位的大小家务。各部首长、干部不但都能管理军队生活，而且都能直接参加生产，这是全世界军队没有的奇迹，同时也是中国军队的大改革，这对革命是一件很大的事。"},{"type":"paragraph","text":"[1]这是毛泽东关于粮食对战争的重要性和续范亭谈话的一部分。续范"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":4,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":441,"page_end":441},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8607bd27a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
