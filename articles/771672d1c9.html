tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席语录","authors":[],"parts":[{"type":"paragraph","text":"处在伟大斗争面前的中国共产党，要求整个党的领导机关，全党的党员和干部，高度地发挥其积极性，才能取得胜利。所谓发挥积极性，必须具体地表现在领导机关、干部和党员的创造能力，负责精神，工作的活跃，敢于和善于提出问题、发表意见、批评缺点，以及时于领导机关和领导干部从爱护观点出发的监督作用。没有这些，所谓积极性就是空的。而这些积极性的发挥，有赖于党内生活的民主化。党内缺乏民主生活，发挥积极性的目的就不能达到。大批能干人材的创造，也只有在民主生活中才有可能。"},{"type":"paragraph","text":"《中国共产党在民族战争中的地位》，《毛泽东省选集》第517页"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"771672d1c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
