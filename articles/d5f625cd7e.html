r":1981,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十月十五日电　中华人民共和国全国人民代表大会常务委员会委员长叶剑英十四日打电报给穆罕默德·胡斯尼·穆巴拉克，祝贺他当选为阿拉伯埃及共和国总统。贺电全文如下:"},{"type":"paragraph","text":"开罗"},{"type":"paragraph","text":"阿拉伯埃及共和国总统穆罕默德·胡斯尼·穆巴拉克阁下:"},{"type":"paragraph","text":"在阁下当选为阿拉伯埃及共和国总统的时候，我代表中国政府和人民，并以我个人的名义，向阁下表示热烈的祝贺。"},{"type":"paragraph","text":"埃及政府和人民为维护民族独立、国家主权、发展民族经济和反对霸权主义干涉进行了坚持不懈的斗争，并取得了显著的成就。祝贵国政府和人民在增进民族团结、维护独立主权和建设自己国家的崇高事业中，不断取得新的胜利；祝中、埃两国的友好合作关系和两国人民的友谊不断发展和加强。"},{"type":"paragraph","text":"中华人民共和国全国"},{"type":"paragraph","text":"人民代表大会常务委员"},{"type":"paragraph","text":"会委员长　叶剑英"},{"type":"paragraph","text":"一九八一年十月十四"},{"type":"paragraph","text":"日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5f625cd7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
