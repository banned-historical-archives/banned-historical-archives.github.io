tle":"地委对西盟县委《关于划分地主问题的请示》的电话批复","dates":[{"year":1973,"month":3,"day":17}],"is_range_date":false,"authors":["中共思茅地委"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"思茅地区革命委员会边疆组, 思茅地区边疆县复查阶级手册, 483-484","tags":[{"name":"剥削","type":"主题/事件"},{"name":"地主","type":"主题/事件"},{"name":"富农","type":"主题/事件"}],"parts":[{"type":"title","text":"地委对西盟县委《关于划分地主问题的请示》的电话批复"},{"type":"paragraph","text":"西盟县委："},{"type":"paragraph","text":"县委《关于划分地主问题的请示报告》收悉。"},{"type":"paragraph","text":"根据政务院规定：“收租百担以上，或放债大洋千元以上，而家中人口不多，消费不大，则虽这家有人每年从事四个月以上的主要劳动，仍是地主，不是富农。”其中“收租百担”与“放债大洋千元”的价值是相等的，即万斤粮相当于大洋千元的价值，这是从全国解放前三年的市价来计算的。你们提出的若以剥削量超过大洋千元的划为地主，则地主的面扩大，富农面缩小的问题，这是因为解放前三年西盟的粮价较高，一万斤粮要合二千元半开所造成的。现根据上述情况，我们意见：在计算剥削量时，一律按当时价格折算为稻谷市斤计算，即削削量超过百担粮食的（折市斤一万斤）划为地主。"},{"type":"subtitle","text":"中共思茅地委"},{"type":"subtitle","text":"一九七三年三月十七日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f70e39249"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
