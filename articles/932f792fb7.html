<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"秦皇岛镇反后的群众反应","authors":["史向莱"],"dates":[{"year":1951,"month":5,"day":24}],"is_range_date":false,"parts":[{"text":"秦皇岛镇反后的群众反应","type":"title"},{"text":"史向莱","type":"authors"},{"text":"解放二年多的秦皇岛市耀华玻璃厂工人，有了自由民主，生活上也有了保障，但是还有一件事使工人们老觉得没有彻底翻身，大伙都说：“现在啥都好，就是帮助日本鬼子和蒋介石坑害咱们的坏蛋还是像从前一样吃得开，这叫人心里不舒服。”原来解放前欺压工人的坏蛋，解放后仍不肯向工人低头。例如日寇时代的“劳务系主任”张聚鑫曾殴打过工人姚作普、齐珍、孙喜朝等二百余人，扣留工人工资，私立“公堂”，刑审工人，替日寇抓“劳工”，霸占工人的妻女。这样罪大恶极的反革命分子，解放后仍没有受到人民的制裁，还在厂里为非作歹，打击工人的生产情绪。厂里改进操作规程时，大家信心很高，他却说：“这有啥好呢？又是从苏联学来的，我算这辈子也搞不通！”他鼓动别人消极怠工，他说：“给多少薪金就干多少活。”解放后二年多对张聚鑫这种人没有适当处理，工人们都不服气。","type":"paragraph"},{"text":"自从镇压反革命条例公布以后，工人们满肚子怨气再也压不住了，纷纷提出意见。秦皇岛市人民政府公安局接受了工人的要求，逮捕了张聚鑫。全厂的工人立刻活跃起来了。各车间召开控诉会，揭发了张聚鑫的罪恶。曾被张聚鑫抓作劳工的张和与高宏说：“蹩在肚子七、八年的仇恨，这回可要吐吐了。”工人们见面就说：“想起吃玉黍面苦来，现在心里还痛，应该枪毙了张聚鑫！”造箱部工友孙击民为了庆贺逮捕反革命分子，买了五斤猪肉，全家吃了一顿好饭。","type":"paragraph"},{"text":"自从反革命分子被捕以后，工人情绪显著改变了，生产成绩显著提高。如玻璃切手李文林，在四月十八一天内切出了二耗玻璃六十四标准箱，十九日赵学勤便切出了七十二标准箱，二十日李文林又切出了八十一标准箱。这是空前的纪录。解放以后，在几次劳动竞赛运动中，没有超过五十一标准箱的。造箱场也表现了同样惊人的成绩，四月二十三日提前七天胜利地完成了全月五万三千个标准箱的任务。逮捕了首恶分子后，检举暗藏的坏分子已经成为群众性运动，尚未自首登记的国民党、三青团分子及其他反革命分子也再隐蔽不住了。最近我厂反革命分子自首的就达三十六人。现在镇压反革命和继续深入抗美援朝运动，正在我厂深入开展着。工人们见面便笑着说：“这才叫真正解放了”。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1951年5月24日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"932f792fb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
