authors":["江青"],"dates":[{"year":1975,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"江青给毛泽东和在京政治局委员的书面检讨（要点）","type":"title"},{"text":"江青","type":"authors"},{"text":"〖江青，时任中共中央政治局委员。〗","type":"subtitle"},{"text":"信中说：“我对不起主席、政治局的同志们，更对不起小平同志。”检查自己一年多来“所犯的错误”，其中包括：提出“十一次路线斗争”，批林批孔中搞“三箭齐发”，“个人自作主张送材料”，以及讲“主要危险是经验主义”等等。“我在四月廿七日政治局会议上的自我批评是不够的。经几次政治局会议上同志们的批评帮助，思想触动很大，但是思想上一时转不过来。经过思想斗争，我认为会议基本上开的好，政治局比过去团结了。”“当我认识到四人帮是个客观存在，我才认识到有发展成分裂党中央的宗派主义的可能，我才认识到为什么主席从去年讲到今年，达三四次之多？原来是一个重大原则问题，主席在原则问题上是从不让步的。在这个问题上，我负主要责任，连累了他们三位同志受批评，是很对不起他们。以上的错误是严重的，是不符合主席安定团结和三要三不要方针的。造成这些错误的原因主要是世界观没有改造好，个人主义、主观主义作祟，缺乏自知之明，不谨慎，不谦虚”，“我有信心和决心遵照主席的教导、党的要求去改正错误。”","type":"paragraph"}],"comments":[],"origin":"《毛泽东传（1949—1976）》，中央文献出版社，2003年12月第一版1738页，并根据手稿片断复印件补充部分文字。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d22ee4532"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
