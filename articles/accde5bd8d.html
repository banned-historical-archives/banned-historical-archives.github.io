script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"黎城一区党员克服右倾思想积极带领群众实行组织起来","authors":["夏克勤","张公水"],"dates":[{"year":1952,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黎城一区党员克服右倾思想积极带领群众实行组织起来"},{"type":"paragraph","text":"编辑同志：山西省黎城一区三十四个农村支部的党员，在县委和区委的领导下，学习了高岗同志关于农村经济发展方向的报告，并且联系个人思想普遍地展开了反对右倾思想的斗争。经过这次学习，多数党员的阶级觉悟提高了，积极地参加和领导了互助组、农业生产合作社。在党员的带动下，今年全区的互助组织得到了发展和巩固：常年互助组从去年的九十四个增加到二百二十九个，临时拨工组却由三百零七个减少到一百八十一个；同时，互助组的内容也比去年充实多了。"},{"type":"paragraph","text":"但是，在某些村支部，还有相当数量的党员没有打通思想，因而没有发挥带头作用。如北坊村的二十三个党员，参加常年互助组的只有两人；有的支部，多数党员还没有带头组织互助组。因此，今后黎城一区的党组织还必须在现有的基础上，继续加强党员的前途教育，使全体党员都能认清社会主义前途，并为它努力奋斗。"},{"type":"paragraph","text":"夏克勤　张公水"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"accde5bd8d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
