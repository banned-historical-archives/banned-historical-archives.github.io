言稿的批语和修改","authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":6}],"is_range_date":false,"parts":[{"text":"毛泽东对安子文关于反对官僚主义的发言稿的批语和修改","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"即送李维汉同志：","type":"appellation"},{"text":"此件请即付印，在七日大会上散发，使出席者和列席者每人得到一份，并准备安子文同志出席讲话。修改处请饬一专人加以校对，不要错误。","type":"paragraph"},{"text":" 毛泽东二月六日下午十时","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"我所说的上级领导机关，是指党和政府的中央一级机关、大区一级机关、省（市）一级机关、专区一级机关和县级机关，这五级机关内都有不少的官僚主义，它们只注重布置工作，不注意检查工作。有些领导机关则有强迫命令的作风，甚至包藏有违法乱纪分子。","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"李维汉、徐冰同志：","type":"appellation"},{"text":"今天下午三时有安子文批评官僚主义的报告，请通知中央一级（党政军及各民（主）党派人民团体）部长副部长等干部一律参加，非病不许缺席。","type":"paragraph"},{"text":" 毛泽东二月七日上午九时","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7db6693aad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
