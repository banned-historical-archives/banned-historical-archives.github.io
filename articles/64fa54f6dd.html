script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持实事求是　尊重社会实践肃清“四人帮”在文艺批评上的流毒本市电影界人士讨论检验真理的标准问题","authors":[],"dates":[{"year":1978,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　最近，上海市电影局和电影协会联合举行了两次讨论会，联系电影战线的实际，就实践是检验真理的唯一标准问题进行了热烈的讨论。"},{"type":"paragraph","text":"出席会议的，有电影局和所属各制片厂、各单位的负责同志，以及各制片厂的主要编剧、导演、演员共五十多人。与会同志解放思想，畅所欲言，深入批判了林彪、“四人帮”。大家指出，林彪、“四人帮”为了推行反革命政治纲领，肆意践踏实践是检验真理的唯一标准这个马克思主义根本原则，把建国十七年来拍摄的五百多部影片，其中包括许多为人民群众所喜爱的优秀影片，不分青红皂白统统禁锢起来，搞乱了思想，搞乱了是非，严重地摧残了电影事业。不少同志指出，林彪、“四人帮”在文艺批评上的种种流毒至今还未肃清，在文艺批评上违反实事求是，不尊重社会实践的现象继续存在。影片《红日》中有一个石东根“醉酒纵马”的镜头，描写石东根穿着我军军服，用刺刀挑着国民党的军帽，疾马飞奔的情景，表现了我军胜利后的狂欢心情。这组镜头，引起了观众的共鸣。但是，“四人帮”却给这组镜头扣上了丑化人民军队的大帽子。最近在复映时，有的同志不作调查研究，也没有倾听群众的反映，就随意下定论，仍然坚持把这组镜头剪去。到会同志认为，判断一个作品、一部影片的好坏，不应以个别人的主观意志、好恶为标准，而应看它对人民群众是有益还是有害，看它在社会实践中的效果。只有人民群众的社会实践，才是检验一个作品乃至一个镜头好坏的标准。也只有彻底肃清林彪、“四人帮”在文艺批评上的流毒，坚持实事求是，尊重社会实践，才能推动电影事业大发展。"},{"type":"paragraph","text":"会上，还讨论了尊重电影创作规律，按照创作规律进行创作和领导创作的问题。大家认为，作家、编剧根据自己的生活积累，用自己的独特风格和艺术手法写出自己的剧本，这是完全符合认识规律的。许多优秀作品的产生，都是遵循了这一基本原则的。李准的电影剧本《大河奔流》所以得到好评，就在于他有深厚的生活底子，题材来源于火热的斗争生活。现在有些影片之所以不受观众欢迎，一方面是因为林彪、“四人帮”在文艺方面的种种流毒还没有彻底肃清，另一方面也是因为作品缺乏深厚的生活底子，概念化、干巴巴、没有生命力。大家谈到，不从作家的生活实际出发，不注意按照创作规律办事，而凭“长官意志”，靠行政命令领导电影创作，脱离实际作这样那样的规定、要求，是很难写出好作品来的。因此，应该让作家、编剧写自己所熟悉的题材，同时，又要根据现实斗争的需要，有组织、有计划、有目的地让作家、编剧去熟悉某一方面的生活，使他们在实际生活中积累丰富的有血有肉的材料，从而写出好作品。"},{"type":"paragraph","text":"讨论会上还谈到，在影片的审查制度方面，也要防止衙门式的作风，努力改变一切不适应电影生产发展的手续和制度。一个剧本、一部影片，有关领导部门在政治上把好关，这是坚持我们党的无产阶级文艺方针的一个重要保证。但这种把关也要坚持实践是检验真理的唯一标准，尊重作品、影片的社会实践效果。一部文艺作品，只要符合六条政治标准，在艺术上就不要求全责备，要让各种艺术形式，各种流派、风格都能够得到发展。"},{"type":"paragraph","text":"会上还就电影艺术的借鉴问题展开了热烈的讨论。大家认为，要深入揭批林彪、“四人帮”排斥一切古今中外优秀文化遗产的罪行，继承一切优秀文学艺术遗产，吸收其一切有益的东西，包括借鉴国外电影艺术方面有成就的东西，把电影事业搞上去，使电影成为加速实现四个现代化的有力武器。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64fa54f6dd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
