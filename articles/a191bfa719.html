rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"名言录","authors":["李大钊邓小平吴玉章"],"parts":[{"type":"paragraph","text":"凡事都要脚踏实地去作，不驰于空想，不鹜于虚声，而惟以求真的态度作踏实的工夫，以此态度求学，则真理可明，以此态度作事，则功业可就……"},{"type":"paragraph","text":"——李大钊"},{"type":"paragraph","text":"我们要求所有的人都努力上进，但毕竟还要看各个人自己是否努力，集体的努力也是各个人努力的综合表现。"},{"type":"paragraph","text":"——邓小平"},{"type":"paragraph","text":"一个人只有把他的才智，力量，全部地勤恳地用在工作上，事业上，并且做出成绩，这样生活才有价值，才有意义。"},{"type":"paragraph","text":"——吴玉章"},{"type":"paragraph","text":"如果你是一滴水，你是否滋润了一寸土地？如果你是一线阳光，你是否照亮了一分黑暗？如果你是一粒粮食，你是否哺育了有用的生命？如果你是一颗螺丝钉，你是否永远坚守着你的生活岗位？"},{"type":"paragraph","text":"——雷锋"},{"type":"paragraph","text":"我是一个革命者，我要做一个革命的良种，党和国家把我撒到哪里，我就在哪里生根、开花、结果。撒在沙漠上，我就要长成绿色的长城；撒在荒山上，我就要使荒山变成花果山；撒在田里，我就要长成丰产的庄稼。"},{"type":"paragraph","text":"——王杰"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a191bfa719"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
