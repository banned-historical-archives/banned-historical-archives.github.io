ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"战役和战术上均须集中兵方以期必胜","alias":"","parts":[{"type":"paragraph","text":"战役和战术上均须集中兵力以期必胜！"},{"type":"paragraph","text":"（1946年11月9日）萧、江、程、罗，并告林²及西满、东满："},{"type":"paragraph","text":"你们此次作战经验很好。（一）第一次集中五个团打二十五师未能奏效，第二次（酉世至戌冬）集中八个团打该师，就胜利了。以后作战凡打大一点的仗总要集中十团八团兵力，最好能集中十二个团打，以期必胜。这是战役上必须集中兵力。（二）战术上亦须集中兵力。你们世日包围二十五师，东日九次攻击皆未奏效，冬日晓，集中炮火攻破南北山一点，从此扩张战果，即于半天内将该师全部歼灭。尔后作战每次均须采用此种方法。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"戌佳"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给辽东军区司令员兼政治委员萧华、副政治委员江华、第三纵队（兼辽宁军区）司令员程世才和政治委员罗舜初的电报。"},{"type":"paragraph","text":"[2]林，指林彪，当时任东北民主联军总司令兼政治委员。"},{"type":"paragraph","text":"[3]西满、东满，指东北民主联军西满军区和东满军区，司令员分别为黄克诚和周保中。"},{"type":"paragraph","text":"[4]指1946年10月25日至11月2日，东北民主联军辽东（南满）军区第四"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":11,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":270,"page_end":270},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6145dde7ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
