的批示","authors":[],"dates":[{"year":1957,"month":1,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央转发天津市委关于一九五七年肃反运动规划报告的批示","type":"title"},{"text":"各省、市、自治区党委并转五人小组：","type":"appellation"},{"text":"（一）中央同意天津市委一九五六年十二月十九日《关于一九五七年肃反运动的规划的报告》，请天津市委照此执行。","type":"paragraph"},{"text":"（二）天津市委对于公私合营企业肃反的做法，中央认为是可行的，可供各地参考。","type":"paragraph"},{"text":"（三）关于在公私合营企业中进行肃反工作的问题，不但应吸收那些自愿参加的资方人员参加，而且应和工商联及民建会协商，取得他们同意，方可进行。对于资方人员中查出的反革命分子，在结案时也要有工商联、民建会参加审查，得其同意方可结案。各省市目前是否在私方人员中进行肃反，由各省市自己决定。","type":"paragraph"},{"text":"（四）各地修订过的一九五七年肃反规划，没有报来的，请于最近期间内报送中央审阅。","type":"paragraph"},{"text":" 中  央一九五七年一月五日","type":"paragraph"}],"comments":[],"origin":"根据中央文件翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0d73bb36e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
