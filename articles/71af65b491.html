r":1956,"month":11,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席设宴招待吴努主席"},{"type":"paragraph","text":"新华社4日讯　中华人民共和国毛泽东主席今天中午在中南海勤政殿举行宴会，招待缅甸联邦反法西斯人民自由同盟主席吴努和夫人。"},{"type":"paragraph","text":"随同吴努主席一同访问中国的缅甸客人们、正在中国访问的缅甸妇女代表团和缅甸驻中国大使吴拉茂也应邀出席了宴会。"},{"type":"paragraph","text":"出席作陪的，有朱德副主席，周恩来总理，副委员长李济深、沈钧儒、郭沫若、黄炎培、彭真，副总理贺龙、李先念，国防委员会副主席程潜、傅作义、龙云，政协全国委员会副主席包尔汉，中共中央副主席陈云，中国各民主党派负责人张治中、罗隆基、李烛尘、王绍鏊、章伯钧、陈其尤、梁希、谢雪红，外交部副部长章汉夫，中国驻缅甸大使姚仲明，以及政府部门和人民团体的负责人，中国人民解放军的将军们。"},{"type":"paragraph","text":"宴会结束以后，毛泽东主席、朱德副主席、周恩来总理等同吴努主席和随同吴努主席访问中国的缅甸客人们进行了谈话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71af65b491"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
