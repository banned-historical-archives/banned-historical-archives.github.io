s":[{"year":1969,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十九日电　罗马消息:意大利广大工人反对垄断资产阶级的罪恶统治，争取切身权利的群众斗争浪潮，继续一浪高于一浪地向前发展。"},{"type":"paragraph","text":"意大利一百多万冶金和机器制造工人为了反对垄断资本家的残酷剥削和要求提高工资而进行的轮番罢工，已坚持了一个半月。十七日，他们再次举行了二十四小时全国性大罢工，对顽固拒绝工人合理要求的资本家表示愤怒的抗议。在许多城市，罢工工人在市区和工厂内外举行声势浩大的示威。都灵市的汽车制造工人在菲亚特汽车制造厂里同警察展开了搏斗，并且冲进这个意大利最大的汽车托辣斯总厂的管理处。在首都罗马，几百名罢工工人在菲亚特汽车公司的建筑物外边举行了示威。"},{"type":"paragraph","text":"意大利人民反对生活费用和房租高涨，反对政府征收掠夺性的所得税的群众性斗争，也正在迅速扩展。热那亚市的工人十七日为此举行了总罢工，使这个意大利第三大工业中心陷于瘫痪。参加这次总罢工的有三十五万多名工人。五万名罢工工人高举着红旗、标语牌和横幅，在热那亚市中心举行示威。由于同样的原因，在西西里区的卡尔塔尼塞塔，杜斯卡纳区的维亚雷焦，威尼斯区的帕多瓦、特雷维佐和维琴察，十七日也爆发了总罢工。"},{"type":"paragraph","text":"在意大利的第三大城市那不勒斯，来自意大利南部各地的五金工人二万人，十六日在市中心举行了声势浩大的示威游行，要求充分就业。十七日，三千五金工人再次举行了示威。"},{"type":"paragraph","text":"意大利罢工的浪潮目前已从工业部门向政府控制的公用事业扩展。意大利的邮局职工在十六日和十七日举行了全国性的罢工，要求增加工作人员和缩短工作时间。罢工工人在许多城市中举行了示威游行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ad85c0379"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
