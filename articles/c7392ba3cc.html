art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠批“四人帮”谬论 大讲我军优良传统五四九二四部队努力把政治机关的职能和威信恢复到战争年代水平","authors":["王德宽特约/赵承凤"],"parts":[{"type":"paragraph","text":"本报讯 五四九二四部队政治处在深入进行十个“应该不应该”的教育中，组织有实践经验的老同志大讲我军政治工作的优良传统，狠批“四人帮”破坏我军政治机关建设的罪行，采取措施，努力恢复政治机关的职能和威信。"},{"type":"paragraph","text":"这个政治处的成员多数缺乏战争锻炼，政治工作经验较少。特别是近几年来，由于“四人帮”的干扰破坏，有些同志对我军政治机关和政治工作的优良传统不大了解。针对这种情况，政治处在逐条弄清十个“应该不应该”的基础上，组织大家紧紧围绕恢复我军政治机关和政治工作的优良传统问题，请打过仗的老同志介绍我军传统，传授政治工作经验。在大讲传统的基础上，政治处同志以毛主席关于政治工作的一系列教导和有关发扬优良传统的论述为武器，狠批“四人帮”鼓吹的“过去那一套吃不开了”、革命传统“过时”了的反动谬论，历数他们破坏我军政治机关建设的罪行，明确政治机关的地位和职能。然后联系实际，找政治处在思想、组织、作风、业务建设上存在的薄弱环节，研究制定了加强政治机关建设的五条措施：加强学习，完整、准确地理解和掌握马列主义、毛泽东思想，正确处理当先生和当学生的关系，既要教育别人，更要严格要求自己，搞好自身思想革命化；加强统一领导，分工不分家，全处一盘棋；深入实际，调查研究，想连队所想，急连队所急，帮连队所需，把工作的重点放到基层；学习大庆人“三老四严”的作风，实事求是，不说假话，言行一致，不放空炮，精简会议，改进文风；大兴为革命刻苦钻研业务之风，又红又专，提高工作效率。"},{"type":"paragraph","text":"订出措施之后，政治处的同志立即行动起来，纷纷深入连队调查研究，总结经验，抓点带面，决心把政治机关的职能和威信恢复到战争年代的水平，把政治处建设成受连队欢迎的政治思想战线上的战斗指挥部。他们在深入六十连队作调查的过程中，发现有的指导员缺乏经验，经常性的思想政治工作比较薄弱，就在党委领导下，集中三天时间举办指导员学习班，请老同志讲传统，分析了部队的思想现状和问题，研究了解决办法，使指导员们受到一次生动实际的教育。 （王德宽 特约通讯员 赵承凤）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7392ba3cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
