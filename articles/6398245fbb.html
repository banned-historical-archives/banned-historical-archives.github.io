art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们要天天宣传毛泽东思想","authors":["战士业余演出队员黄宝康"],"parts":[{"type":"paragraph","text":"周扬胡说什么毛泽东思想不能“一年三百六十五天都挂在嘴上”，胡说什么“不是天天讲毛主席就是毛主席思想了”。他对宣传毛泽东思想恨之入骨，充分暴露了他是个彻头彻尾的反革命，是个彻头彻尾的修正主义分子。"},{"type":"paragraph","text":"我们工农兵对毛泽东思想无限热爱，无限忠诚，无限信仰，无限崇拜。如饥似渴地学习毛泽东思想，热情地希望通过文艺宣传毛泽东思想。我是战士业余演出队队员，在一年多的演出实践中，深深感到广大干部战士和贫下中农对毛泽东思想有着无可比拟的深厚感情，他们就是喜欢看那些歌颂党、歌颂毛主席、歌颂毛泽东思想、歌颂工农兵英雄人物的文艺节目。"},{"type":"paragraph","text":"今年三月，我们演出队到福建宁化，向革命老根据地人民进行慰问演出。我们自编自演了歌颂焦裕禄、王杰、麦贤得等英雄人物的小演唱《一穗红高粱》、《王杰小唱》、《麦贤得赞歌》等节目，积极、热情地宣传毛泽东思想，深受山区人民的欢迎。有的老乡冒雨赶了几十里路来看我们的演出。有的贫下中农看完后，激动地拉着我们的手说，“你们的节目，说出了我们心里的话，表达了我们贫下中农对党、对毛主席、对毛泽东思想无限热爱的心情。”在访问中，一个在旧社会瞎了双眼的红军烈属老大娘，拿出解放前用了几十年的讨饭篮子、讨饭碗和破棉被，愤怒地控诉旧社会的罪恶。我们专门为她演唱了《社会主义好》和《不忘阶级苦》两首歌曲，她热泪盈眶，用双手抚摸我们每个人的面孔，说：“孩子！你们真是毛主席教导出来的好战士，你们为大娘唱出了几十年的心里话。”她激动地高呼：“毛主席万岁！”"},{"type":"paragraph","text":"毛泽东思想是我们亿万工农兵心中永世不落的红太阳。周扬一伙妄图把我们工农兵和毛泽东思想的阳光隔离开来，使我们成为资产阶级思想的俘虏，好实现他们复辟资本主义的迷梦。但是，几只黑手岂能遮住毛泽东思想的万丈光芒！伟大的毛泽东思想正以无比强大的威力磅礴于全世界！"},{"type":"paragraph","text":"宣传毛泽东思想，是我们毕生最光荣、最崇高的任务。我们硬是要一年三百六十五天都宣传毛泽东思想，一辈子不忘宣传毛泽东思想，让毛泽东思想深深扎在人民的心坎上，让毛泽东思想伟大红旗在全世界胜利飘扬。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6398245fbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
