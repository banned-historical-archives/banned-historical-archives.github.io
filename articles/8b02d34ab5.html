<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——关于民主与自由","authors":["北京政法学院","尹孝松","林共鸣","王明欣","章天惠"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——关于民主与自由","type":"title"},{"text":"北京政法学院王明欣章天惠林共鸣尹孝松","type":"authors"},{"text":"“如果一党专政，党员不好，引起大民主，为什么不可以呢？从前看来，大民主都是不得已引起来的，鲁迅说的对：要‘以牙还牙’！”（北京政法学院　王明欣）","type":"paragraph"},{"text":"“问题不能解决的时候，可以用大民主，如波、匈事件。”（北京政法学院  章天惠）","type":"paragraph"},{"text":"“自由就是所谓个人行动、个人负责，我爱做什么就做什么，而集体与个性是对立的，我对同志的帮助是敌对的。”（北京政法学院  林共鸣）","type":"paragraph"},{"text":"“自由就是爱怎样想就怎样想，爱怎样说就怎样说，别人不得干涉。”（北京政法学院　尹孝松）","type":"paragraph"},{"text":"“我所强调的人性是没有阶级性的，我很赞尝资产阶级革命时期提出个性解放的口号，我希望打破一切束缚让人性自由发展，我觉得一个人在思想上的成熟是要经过他自己摸索和追求的，人性是可以突破无产阶级性的限制的。”","type":"paragraph"},{"text":"“我所说的自由是指思想上的自由……我所要求的思想上的自由，是在学习了一些马列主义的词句，但又没有真正的接受马列主义，不那么信服马列主义（这不是说我不承认马列主义根本观点的正确，而是希望让我独立思考和资产阶级思想一番鉴别）。这是因为生活在社会主义而又对社会主义的某些方面不喜欢（这些方面我下面要谈到）的情况下提出的。我希望我能独立思考（不管这种思考是否背离马列主义和社会主义的道路）而不受批判，不受到社会风气的压力和党团组织的干预，这也就是说不要党对青年进行政治思想的领导。我也希望保持资产阶级和小资产阶级那一套生活兴趣，而不去进行从立场观点到情感生活的改造。”（北京政法学院  康德琯）","type":"paragraph"},{"text":"“我们应该有自由支配时间的权力（能力），如果有人强制我们光钻笔记，光钻一些参考书（不管他愿意不愿意）这实质上就是一种扼杀行为、扼杀我们才能、个性的发展。”（北京政法学院　章文岳）","type":"paragraph"},{"text":"“中共中央发出整风指示后，我想为这是个争‘民主’、争‘自由’的好机会，可以把心中的不满吐出来，攻击共产党。”","type":"paragraph"},{"text":"“我响往的是不要领导、不要集中的民主，无限度的自由。”","type":"paragraph"},{"text":"“我虽不主张资本主义那一套，但资本主义确实可以竞选，这就很民主。”（北京政法学院  赵日月）","type":"paragraph"},{"text":"我们学校是“暴力统治”“太黑暗”“太残暴”“没有民主”“个人专断”。","type":"paragraph"},{"text":"“社会主义制度下，人的个性受到挫折，要求个性解放。”“政法学院看人有问题，不把人当人，不给予起码的尊重，尤其对青年老批评老整，不许青年人自由思想，不许有个性，一说话就给扣个人主义、自由主义的帽子，把青年人压到最低层，真是有冤无处说。”（北京政法学院  王革）","type":"paragraph"},{"text":"“在中国民主、自由都不是真正的，而是形式，本来就不充分的选举权，还要受到限制。”（北京政法学院  陈守铭）","type":"paragraph"},{"text":"“我们说资本主义国家没有民主，但我认为资本主义国家内部是有民主的，不但资产阶级有，劳动人民由于组织起来了，也有一定的民主和自由的（如意大利和法国工人）所以对英国乔来教授的讲话，我就以为是真的。”（北京政法学院  陈述庆）","type":"paragraph"},{"text":"“……我国民主化是不够的，人民一直处于封建专制统治下，不参加政治生活，容易受人摆布，领导者个人崇拜也没有什么大不了，但总有一日人民也会象波兰人民那样的。”（北京政法学院  章文岳）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王明","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b02d34ab5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
