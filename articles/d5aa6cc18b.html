art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想宣传站","authors":["王滨"],"parts":[{"type":"paragraph","text":"东海前线某岛有一座高山，又高又陡，来往行人较多。在这座山的山顶上有一间草凉棚，从这里经过的人，都可以到里面歇口气，喝碗水。这就是驻守在这里的某部高炮一连为过往行人设立的茶水站。"},{"type":"paragraph","text":"有一次，副指导员陈殿举到茶水站和群众谈心，给几个过路的社员讲解农业发展纲要，宣传毛泽东思想，很受欢迎。他们都说，下次来，再给我们讲讲！这件事使陈副指导员受到了启发。从那以后，茶水站里添了黑板报，专门向群众宣传毛泽东思想，介绍国内外形势和党的方针政策。一有空，干部战士就到茶水站来当“服务员”和“宣传员”。战士何俊明当选为墙报委员后，运用群众喜闻乐见的形式，把茶水站里的黑板报办得有声有色。"},{"type":"paragraph","text":"现在，岛上群众只要到了山上，总要到茶水站坐一坐，和一连同志拉拉家常，谈谈国家大事。一个远洋归来的渔民称赞说：“解放军替我们想得真周到，我们喝了水，还学了毛泽东思想。” （王滨）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5aa6cc18b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
