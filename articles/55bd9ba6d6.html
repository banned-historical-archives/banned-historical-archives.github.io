表大会问题的讲话","authors":["毛泽东"],"dates":[{"year":1953,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"毛泽东关于召开全国和地方各级人民代表大会问题的讲话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"就全国范围来说，大陆上的军事行动已经结束，土地改革已经基本完成，各界人民已经组织起来，因此，根据中国人民政治协商会议共同纲领的规定，召开全国人民代表大会及地方各级人民代表大会的条件已经成熟了，这是中国人民流血牺牲，为民主奋斗历数十年之久才得到的伟大胜利。召开人民代表大会，可以更加发扬人民民主，加强国家建设和加强抗美援朝的斗争。人民代表大会制的政府，仍将是全国各民族、各民主阶级、各民主党派和各人民团体统一战线的政府，它是对全国人民都有利的。","type":"paragraph"}],"comments":[],"origin":"原载一九五三年一月十五日《人民日报》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55bd9ba6d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
