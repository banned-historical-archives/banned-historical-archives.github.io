"],"dates":[{"year":1997,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报西安专讯　日前，陕西省军区一军官在西安废品堆里发现一套珍贵的“文革”宣传画剪贴。剪贴以四开大的白纸作衬底，共107张，214面，整齐地贴着2000多幅“文革”中的宣传画。"},{"type":"paragraph","text":"剪贴题材广泛，内容丰富。几乎涵盖了“文革”10年所有的重大事件。从“文革”发动初期的语录画开始，紧接着是毛主席接见红卫兵、造反派夺权、革命委员会、三支两军、迎接九大，到工人阶级领导一切、知识青年上山下乡、抗美援越、备战备荒、赤脚医生、样板戏等等，都用形象的画面表现出来。这些宣传画上的人物多是扛着钢枪，举着语录，横眉瞠目，抹胳膊挽袖子的红卫兵造反派形象。此类打倒、砸烂、横扫的画法，在人类绘画史上是罕见的。画上的语言都是典型的“文革”语言，如“最红最红”、“最新最高”、“一切想着”、“一切服从”、“一切紧跟”、“一切为着”、“砸烂苏修混蛋的狗头”等等，充分反映了“文革”10年“左”的历史。这套剪贴，把“文革”中能见到的宣传画，多数都收集进来，包括油画、水彩画、木刻、剪纸、漫画、吹塑画等等，尽管有的表现手法粗糙，画面上多是冲冲杀杀，但它较为完整地反映了我国在社会发展史上的一段难忘的历史，是人类绘画史上一道奇特的景观，具有很高的收藏和研究价值。"},{"type":"paragraph","text":"(申苑)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a49e56d3c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
