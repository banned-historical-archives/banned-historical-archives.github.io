[{"year":1949,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者先生:我是郊区真如镇一个农民生产菜蔬瓜果之类。所用之肥料大都为人类。经商人用船只由沪市各码头载来。用丧尽天良手段掺入百分之五十以上的黄浦水，暴利剥削农民。现在每担粪售价竟要一千元。每亩白菜需五十担的粪。我农民的负担实在太重了。他们于过去时代，受到匪方暴利心理遗毒，刻已解放，不思痛改前非，反而变本加厉。农民的血汗，将要被他榨乾了。"},{"type":"paragraph","text":"希望该般奸商阅之，能以警惕。天良发现，改过从前作风。"},{"type":"paragraph","text":"真如镇农民姚振新"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d9f7c9a19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
