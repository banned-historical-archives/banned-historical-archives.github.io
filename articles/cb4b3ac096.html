art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"揭露“四人帮”修正主义路线极右实质","authors":[],"parts":[{"type":"paragraph","text":"本报讯 战斗在反修前哨的新疆部队某团党委遵照毛主席关于“有比较才能鉴别”的教导，把“四人帮”和苏修叛徒集团加以对照，剥画皮，批罪行，充分摆露“四人帮”修正主义路线的极右实质，进一步提高了反修防修的自觉性。他们把“四人帮”在毛主席逝世后，伪造所谓毛主席的临终嘱咐，秘密串连，加快步伐，妄图篡党夺权的罪行，和赫鲁晓夫在斯大林逝世后，施展种种阴谋手段，篡夺苏联党政大权的恶劣行径加以对照，认识到“四人帮”和赫鲁晓夫一样，是最凶狠的资产阶级野心家、阴谋家；他们把“四人帮”多年来在国内国际一系列问题上同毛主席的革命路线背道而驰，妄图改变党的基本路线，复辟资本主义的罪行，和苏修叛徒集团推行修正主义路线，全面复辟资本主义，给苏联造成历史大倒退加以对照，认识到“四人帮”和苏修叛徒集团一样，是党内资产阶级的典型代表，是不肯改悔的正在走的走资派；他们把“四人帮”肆意篡改、歪曲马列主义、毛泽东思想，大搞唯心论和形而上学，和苏修叛徒集团疯狂反对马克思主义的基本原则，任意践踏革命理论的恶劣手段加以对照，认识到，“四人帮”和苏修叛徒集团一样，是马克思主义的叛徒；他们把“四人帮”养尊处优，骄奢淫逸，任意侵吞劳动人民果实，不顾人民死活，和苏修叛徒集团对劳动人民横征暴敛，残酷剥削，骑在人民头上作威作福，穷奢极欲，挥霍无度的糜烂生活加以对照，认识到“四人帮”同苏修叛徒集团一样，拚命扩大资产阶级法权，是喝劳动人民血的大吸血鬼。通过这样对照分析，大家对“四人帮”的反革命本质认识得更清，对他们的修正主义路线的极右实质看得更透了。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb4b3ac096"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
