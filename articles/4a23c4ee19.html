art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高举毛泽东思想伟大红旗 把无产阶级教育革命进行到底","authors":["空军二高专无产阶级革命派"],"parts":[{"type":"paragraph","text":"无产阶级教育革命，是这场史无前例的无产阶级文化大革命的极其重要的组成部分，也是人类历史上的伟大创举。它将彻底摧毁资产阶级、修正主义教育制度。我们学校的无产阶级革命派，决心紧跟毛主席的伟大战略部署，积极投入这场伟大的无产阶级教育革命的斗争中去。"},{"type":"paragraph","text":"毛主席教导我们：凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。革命的阶级是这样，反革命的阶级也是这样。教育是上层建筑的重要组成部分，是在意识形态领域里无产阶级和资产阶级进行生死搏斗的重要阵地。十几年来，以中国赫鲁晓夫为首的党内一小撮走资本主义道路当权派，顽固地对抗毛主席的无产阶级教育路线，极力维护和保存资产阶级教育制度，肆无忌惮地贩卖封建主义、资本主义和修正主义的黑货，妄图为他们在中国复辟资本主义，培养资产阶级接班人。经过一年多的无产阶级文化大革命，党内一小撮走资本主义道路的当权派被拉下了马，资产阶级反动学术“权威”被揪出来了，教育战线上的无产阶级文化大革命取得了决定性的胜利。"},{"type":"paragraph","text":"但是，斗争远远没有结束，彻底砸烂资产阶级教育制度，创造无产阶级教育制度的伟大而艰巨的历史任务，还远远没有完成。如果不彻底砸烂旧的教育制度，彻底搞好斗批改，一仍旧章，按老规矩办事，其结果，新的资产阶级知识分子还会产生，教育战线上的领导权还有落在资产阶级手中的危险。因此，摆在我们无产阶级革命派面前的一个光荣任务，就是彻底摧毁旧的教育制度，改革旧的教学方针和方法，结束资产阶级知识分子统治学校的现象，让毛泽东思想占领教育阵地。"},{"type":"paragraph","text":"我们决心遵照毛主席关于教育革命的伟大指示，以“斗私，批修”为纲，彻底进行无产阶级教育革命，把无产阶级文化大革命进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a23c4ee19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
