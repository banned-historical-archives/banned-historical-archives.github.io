script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沪剧《为奴隶的母亲》大受欢迎剧协上海分会举行座谈会","authors":[],"dates":[{"year":1979,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　根据柔石烈士同名小说《为奴隶的母亲》改编的沪剧，最近由上海宝山沪剧团演出，受到热烈欢迎。"},{"type":"paragraph","text":"这个戏强烈地揭露和抨击了旧社会惨无人道、残酷野蛮的典妻制度。它从一九五四年首次公演以来，受到热烈欢迎。这次重新加工排演，又得到有关方面的重视与广大观众的好评。象这样一个优秀现代剧，在“四害”横行时一度被打成为宣扬人性论的大毒草。"},{"type":"paragraph","text":"日前，中国剧协上海分会组织部分专业文艺工作者观摩并进行了座谈。参加座谈的同志一致认为，这个剧目之所以在社会上有如此大的影响，除了题材内容具有深刻的教育意义外，无论是编、导、表演、音乐、舞美各方面，都能较好地掌握形象思维、寓理于情、寓教于娱的艺术规律，凭借栩栩如生的视觉形象与动人心弦的听觉形象感染观众，特别是剧本能充分发挥演员的风格特长，使饰演春宝娘的演员杨飞飞能运用含蓄深沉、充满韵味的唱腔，淋漓酣畅地抒发主人翁的悲愤情绪，给野蛮的典妻制度以血和泪的控诉，引起了观众的强烈共鸣。"},{"type":"paragraph","text":"参加座谈会的同志认为:沪剧《为奴隶的母亲》的演出成功，又一次生动地证明，广大观众不是不要现代剧，他们不需要的是歪曲现实生活，满台帮腔帮调的现代戏，而象《为奴隶的母亲》那样的现代戏，观众不但欢迎，而且还希望多多上演。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1927aef25f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
