rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"人民解放军是用毛泽东思想武装起来的真正的人民军队","authors":[],"parts":[{"type":"paragraph","text":"新华社达卡二日电 一些巴基斯坦朋友发表谈话，祝贺中国人民解放军建军四十一周年，热烈欢呼毛主席的军事思想的伟大胜利和中国人民解放军的辉煌成就。"},{"type":"paragraph","text":"巴基斯坦新闻工作者联合会秘书长明哈杰·巴尔纳对新华社记者说，由毛主席亲自缔造的中国人民解放军从四十一年前建军以来，经受了一切风暴，以劣势的装备打败了日本侵略者、美帝国主义及其走狗蒋介石集团。这些胜利之所以取得，是因为中国人民解放军是用毛主席的伟大的军事思想武装起来的真正的人民军队。"},{"type":"paragraph","text":"他指出，中国人民解放军的伟大在于它的思想武装。它是用马克思列宁主义、毛泽东思想武装起来的，它忠于人民事业。"},{"type":"paragraph","text":"他说，有毛主席军事思想作指导，以中国人民解放军为榜样，走上武装革命道路的世界各国被压迫人民，一定会打败他们的共同敌人美帝国主义及其帮凶苏联现代修正主义，以及它们的走狗和傀儡。"},{"type":"paragraph","text":"东巴基斯坦锡尔赫特的巴基斯坦——中国友好协会主席贾西穆丁·艾哈迈德在一次集会上讲话说，信任和依靠人民群众的力量，是毛泽东思想的重要特点。毛主席指出：“人民，只有人民，才是创造世界历史的动力。”现在，从拉丁美洲到非洲大陆，以至到战斗的越南，到处都是人民胜利的歌声。人民的胜利是不可抗拒的历史潮流。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7681a9b8c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
