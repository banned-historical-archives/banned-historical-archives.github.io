,"authors":[],"dates":[{"year":1960,"month":11,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央关于检查盲流人口处理工作的通知","type":"title"},{"text":"宁夏自治区党委，并各中央局，各省、市、自治区党委：","type":"appellation"},{"text":"十一月十六日来件悉。你们纠正了原来在收容盲目流人人员时，把他们的一切证件、粮票、布票、人民币等加以登记，代为保管的错误规定，并且对处理外流人口的工作进行了检查，这是正确的。据了解，有些地方的处理外流人口的工作和机构中，都存在若干问题，个别地方这类机构已经被坏分子篡夺，做了许多坏事。因此，中央要求，各省、市、自治区党委对于处理外流人口工作的各个环节，进行一次认真的检查，纯洁队伍，端正政策，并且经常加强对这一工作的领导。","type":"paragraph"},{"text":" 中  央一九六O年十一月二十五日","type":"paragraph"},{"text":"（发至省级有关单位）","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa565850d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
