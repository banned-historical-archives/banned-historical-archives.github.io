小组关于在肃反运动中发动落后群众初步总结的指示","authors":[],"dates":[{"year":1955,"month":10,"day":22}],"is_range_date":false,"parts":[{"text":"中共中央批转四川省委城工委系统四人小组关于在肃反运动中发动落后群众初步总结的指示","type":"title"},{"text":"上海局，各省市委、自治区党委，西藏工委，中央和军委各部门，中央国家机关各部门党组和党委（请省委转军区和省军区）：","type":"appellation"},{"text":"四川省委城工委系统四人小组关于在肃反运动中发动落后群众的初步总结很好，特转发你们研究仿行。当前运动的最大弱点之一，就是还有一部分落后分子没有发动起来。有些地方在运动发展过程中把“90％以上是好人，反革命分子和其他坏分子只占5％左右”这一条忘记掉了，把落后分子也当做坏分子斗争，这样必然会既冤枉了好人，又漏掉了反革命分子和其他坏分子。《初步总结》中说，“必须认识，教育提高落后群众的觉悟，是我们应有的责任，不仅在肃反中重要，同时在社会主义建设的各项工作中都需要”，这个观点是正确的。所提出的应该注意的5点也是对的。","type":"paragraph"},{"text":" 中央1955年10月22日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"892daa0ab0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
