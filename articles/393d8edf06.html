rs":["陈云"],"dates":[{"year":1982,"month":7,"day":30}],"is_range_date":false,"parts":[{"text":"陈云在中央政治局扩大会议上的讲话摘要","type":"title"},{"text":"陈云","type":"authors"},{"text":"另一方面，在提拔中青年干部时，必须对“三种人”保持警惕，就是说，决不能提拔造反起家的人、帮派思想严重的人、打砸抢分子。对这些人一个也不能提拔，已经提拔的，必须坚决把他们撤下来。为此，在提拔中青年干部时，组织部门对他们在“文化大革命”中的表现一定要进行切实的考察。当然，我们应当看到，在“文革”期间表现不好的中青年中，属于“三种人”的毕竟是少数，多数是跟着跑的。对于跟着跑的人，只要他们真正认识了自己的错误，与“三种人”坚决划清了界限，而且后来表现确实好，党就应该信任和使用他们，并在今后的工作中继续加以考察。不过，我们还应当看到，在“文革”期间，中青年中还有“逍遥派”。“文革”开始时，他们人数虽然较少，但随着“文革”的深入，人数越来越多。这部分人实际上是不赞成“文革”那一套的。我们在选拔中青年干部时，应当重视从他们中间挑选。","type":"paragraph"}],"comments":[],"origin":"《处理“文革”遗留问题、清理“三种人”文件汇编（第一册）》广西壮族自治区党委整党办公室。1986年8月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"393d8edf06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
