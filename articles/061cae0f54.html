,"dates":[{"year":1966,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席是伟大的舵手"},{"type":"paragraph","text":"我们怀着万分激动的心情，听了中共中央关于无产阶级文化大革命的决定。这是一个最伟大、最正确、最英明的决定，是史无前例的无产阶级文化大革命的纲领性的文件，是马克思列宁主义的新发展，是毛泽东思想的新胜利！"},{"type":"paragraph","text":"我们最最热烈欢呼这个决定！最最坚决拥护这个决定！最最忠诚执行这个决定！"},{"type":"paragraph","text":"这个决定再一次雄辩地证明了，我们的党不愧为伟大、光荣、正确的党，毛泽东思想是中国革命和世界革命的灯塔。毛主席是革命的伟大舵手，把革命的航船从胜利引向胜利，走向光辉灿烂的未来——共产主义社会！"},{"type":"paragraph","text":"我们要努力学习这个决定，忠诚执行这个决定，热情宣传这个决定，勇敢捍卫这个决定！高高举起毛泽东思想伟大红旗，高高举起无产阶级文化大革命伟大红旗，发扬敢想、敢说、敢做、敢闯、敢革命的大无畏精神，在无产阶级文化大革命中冲锋陷阵，将无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"伟大的中国共产党万岁！"},{"type":"paragraph","text":"伟大的战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"毛主席万岁！"},{"type":"paragraph","text":"北京大学数力系　周正清　陈文浦"},{"type":"paragraph","text":"李安桂　王陞臣"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"061cae0f54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
