art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛主席著作简讯","authors":["曾宪道/陈复森/李华堡/沈毅/黄代富/杨友权"],"parts":[{"type":"paragraph","text":"召开心得讲演会"},{"type":"paragraph","text":"最近，六八五七部队召开“活学活用毛主席著作讲演会”。会前，各连普遍进行了学习心得讲评，把好的学习心得笔记送到会上展览。会上，九个连队各自选拔的两名学习“尖子”，介绍了学习经验。会后，各连又邀请这些学习“尖子”到连介绍经验，并将好的学习心得笔记带回去在战士中传阅。 （曾宪道、陈复森）"},{"type":"paragraph","text":"培训学习辅导员"},{"type":"paragraph","text":"湖南湘潭专区公安大队举办了两期学习辅导员训练班。参加集训的六十名辅导员，都是从各班和执勤点的五好战士和学习积极分子中抽调的。他们集中一周时间，学习了《为人民服务》、《纪念白求恩》、《反对自由主义》、《中国社会各阶级的分析》等文章。大队领导干部都亲自讲课，进行具体指导。 （李华堡）"},{"type":"paragraph","text":"结合战例学习"},{"type":"paragraph","text":"某团“登陆英雄连”在命名十四周年前夕，邀请团长戴成宝和副团长王拴标回连作连史报告。他们介绍了当年渡海登陆作战中，全连乘坐四只木船，全歼现代化武装的敌人一个加强营的事迹。随后，连里结合这一战例，组织战士学习了《和美国记者安娜·路易斯·斯特朗的谈话》，使大家对毛主席说的“决定战争胜败的是人民，而不是一两件新式武器”的论断，领会更加深刻。 （沈 毅）"},{"type":"paragraph","text":"首长下连讲课"},{"type":"paragraph","text":"昆明部队某师政委霍宗岳来到某团，听说连队干部学习《实践论》领会不深，便立即找干部交谈，收集问题，随后给干部讲解了这篇文章。他交代了文章的时代背景和现实意义以后，着重讲了正确思想要从实践中来的道理；并联系实际，指导大家如何运用《实践论》改造思想，改进工作。 （黄代富、杨友权）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44094e450c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
