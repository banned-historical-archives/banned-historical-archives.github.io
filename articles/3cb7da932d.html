ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"对山西游击战争的方针问题的指示","alias":"","parts":[{"type":"paragraph","text":"对山西游击战争的方针问题的指示!"},{"type":"paragraph","text":"（1937年11月23日）"},{"type":"paragraph","text":"（甲）坚持山西游击战争的方针，是中央已定下的方针，谁也不应该对此方针发生动摇。（乙）坚决执行这一方针，决不能束缚红军主力的适当的使用与适当的转移，这两者不能混为一谈。（丙）红军主力的使用决定于今后全国抗战形势的发展，不决定于山西一省的形势，你们不要仅看局部，而且要看到全国。（丁）应该及时预防红军主力需要转移时，在同志中丧失坚持山西游击战的自信心。（戊）组织问题待恩来、胡服、德怀来开会决定。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）致刘少奇、杨尚昆并告朱德、周恩来、彭德怀、任弼时电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":11,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":399,"page_end":399},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cb7da932d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
