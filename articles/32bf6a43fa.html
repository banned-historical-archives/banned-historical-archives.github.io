<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"天津市工商业抗美援朝保家卫国示威游行大会致毛主席电","authors":[],"dates":[{"year":1950,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天津市工商业抗美援朝保家卫国示威游行大会致毛主席电中央人民政府毛主席钧鉴："},{"type":"paragraph","text":"我们天津市全体工商业者，为了粉碎美帝疯狂无耻的侵略，前已提出了四项具体任务，作为我们抗美援朝的行动主范，我们保证，一定要坚决彻底地执行下去。"},{"type":"paragraph","text":"今天我们又举行四万余人的示威大游行，告诉美帝，我们已经认清了它们的侵略本质。全国各阶层都已团结一致，共同为完成抗美援朝保家卫国的神圣任务而奋斗到底，谨电。致以崇高的敬礼！"},{"type":"paragraph","text":"天津市工商业抗美援朝保家卫国示威游行大会  十一月三十日"},{"type":"paragraph","text":"毛主席复电"},{"type":"paragraph","text":"天津市工商业联合会主任委员李烛尘先生，副主任委员毕鸣歧先生，朱继圣先生，天津市工商业界抗美援朝保家卫国示威游行大会的四万二千九百八十九位爱国同胞们："},{"type":"paragraph","text":"你们在十一月三十日给我的电报看到了。你们认清了美帝国主义者发动侵略中国和朝鲜的反动性质，你们不受他们的欺骗，不怕他们的恐吓，坚决地站在抗美援朝保家卫国的爱国立场上，并在十一月三十日举行了正义的示威游行，这是值得欢迎的。美国帝国主义者对于中国人民做了很多的欺骗宣传，一切爱国者都不应相信这些欺骗言论。美国帝国主义者侵略朝鲜，侵略中国的台湾，轰炸中国的东北，并使用各种流氓手段恐吓中国人民，一切爱国者都应有决心反抗美帝国主义的侵略，并不受他们的恐吓。中国人民抗美援朝保家卫国志愿军的英勇行为，是值得赞扬的。全国工人、农民、知识分子及工商业家，凡属爱国者，一致团结起来，反对美帝国主义的侵略，是完全正确的。我希望全中国一切爱国的工商业家，和人民大众一道，结成一条比过去更加巩固的反对帝国主义侵略的统一战线，这就预示着中国人民在反对帝国主义侵略的神圣斗争中一定要得到最后胜利。"},{"type":"paragraph","text":"毛泽东  一九五○年十二月二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32bf6a43fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
