<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中苏团结永远无敌于天下中苏友协举行代表会选出第三届会长和理事　宋庆龄会长和费多罗夫团长在讲话中盛赞两国伟大友谊","authors":[],"dates":[{"year":1959,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京2日电】　中苏友好协会第三次全国代表会今天下午在北京举行。中苏友好协会总会会长宋庆龄在大会上的讲话中说:“世界上没有任何东西可以动摇伟大苏联和伟大中国的团结，没有任何东西可以动摇以苏联为首的社会主义阵营的团结。我们的友谊和团结在任何敌人面前是无敌的。”"},{"type":"paragraph","text":"宋庆龄会长的这些话受到了出席大会的一千多位代表的热烈欢迎。"},{"type":"paragraph","text":"今天下午，党和国家的领导人周恩来、董必武、林彪、邓小平、林伯渠、彭真，中苏友好协会副会长李济深、吴玉章、沈钧儒、黄炎培、程潜、乌兰夫、刘宁一、马寅初、赛福鼎、邵力子、李烛尘，中苏友好协会总会理事班禅额尔德尼·却吉坚赞等都出席了大会。"},{"type":"paragraph","text":"以费多罗夫为首的苏中友好协会代表团的全体贵宾和苏联驻中国大使尤金应邀出席了大会。"},{"type":"paragraph","text":"在今天的大会上，选出了中苏友好协会总会第三届会长、副会长、理事会秘书长和理事。会长是宋庆龄。"},{"type":"paragraph","text":"下午3时，大会开始。乐队分别奏中国和苏联国歌。"},{"type":"paragraph","text":"宋庆龄会长首先以“伟大的友谊、亲密的团结”为题发表讲话。她说:苏联和中国象两个巨人一样并肩地站在世界上，站在用马克思一列宁主义的友谊团结起来的九亿人民的社会主义阵营的中心。苏联和中国，作为社会主义阵营的最大成员国，对社会主义阵营，从而对争取和平、自由和进步的斗争，负有特别的责任。世界上没有任何力量可以把我们两国人民分开，也没有任何力量可以阻拦我们两国人民友好合作的不断发展和巩固。(讲话全文兄第二版)"},{"type":"paragraph","text":"当宋庆龄会长邀请苏中友好协会代表团团长费多罗夫讲话的时候，参加大会的人长久地鼓掌。"},{"type":"paragraph","text":"费多罗夫团长兴奋地说:目前，苏中两国人民在政治、经济和文化建设各个方面进行着兄弟般的合作。伟大的苏中友谊促进着我们两国的进一步发展和繁荣，可靠地保障着我们两国的安全，大大地加强着整个社会主义阵营的威力，同时，它也是世界和平和人类进的保证。"},{"type":"paragraph","text":"费多罗夫团长还宣读了苏联对外友好和文化联系协会联合会和苏。中友好协会致中苏友好协会第三次全国代表会的贺词。"},{"type":"paragraph","text":"费多罗夫团长在讲话以后向中苏友好协会总会送了礼品。他的每一段话都博得了全场暴风雨的掌声。(讲话全文见第三版)"},{"type":"paragraph","text":"中苏友好协会总会秘书长钱俊瑞向代表会报告了过去四年来的工作，并提出了今后的工作任务。他指出，中苏友好协会今后要继续努力增进和巩日中苏友谊。要继续在广大人民群众中普遍深入地进行中苏友好的国际主义教育，系统地反复地宣传中苏友谊的伟大意义及其巨大作用，使中苏两国人民的团结合作具有更加坚实的基础，并进一步巩固和发展以苏联为首的社会主义阵营的友好团结。"},{"type":"paragraph","text":"钱俊瑞说，我们要继续宣传苏联，认真地学习苏联。苏联是我们学习的最好榜样，我们要推动全国人民结合我国的具体情况，继续努力，向苏联人民学习，认真地学习他们的先进经验和科学技术成就，以利于我们多、快、好、省地建设社会主义。"},{"type":"paragraph","text":"代表会通过决议，同意钱俊瑞秘书长关于中苏友好协会四年来的工作报告，希望全国各地中苏友好协会的组织和中苏友好协会的全体会员继续努力，为完成工作报告中所提出的光荣任务，进一步巩固和发展中苏友谊，交流中苏两国人民的智慧和经验而奋斗。"},{"type":"paragraph","text":"接着，中国国民党革命委员会副主席蔡廷错、著名工业劳动模范王崇伦、著名农业劳动模范李顺达等在发言中一致感谢苏联人民对我国的伟大援助，表示要继续努力学习苏联的先进经验，为进一步发展和巩固中苏两国牢不可的兄弟友谊而奋斗。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1959\\05\\5953010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张赫嵩\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中苏友好协会会长宋庆龄在中苏友协第三次全国代表会上讲说　(新华社记者　张赫嵩　摄　无线电　传真)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e191bc7026"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
