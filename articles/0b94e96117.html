ear":1967,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叙利亚出版阿文版《毛主席语录》"},{"type":"paragraph","text":"新华社大马士革二十日电　阿拉伯革命人民渴望已久的红书《毛主席语录》阿拉伯文版二十日在这里出版，受到广大读者的热烈欢迎。在此以前，许多读者到书店去问，阿文版《毛主席语录》什么时候出版，有的提前预订，希望早日得到这本革命人民的宝书。"},{"type":"paragraph","text":"翻译法阿德对新华社记者说：“毛泽东思想是阿拉伯人民斗争的革命武器。毛泽东思想发展了马克思列宁主义理论，是反对修正主义的最强大的武器。”读者雷卡勃说：《毛主席语录》的出版“有助于阿拉伯和世界人民的斗争。”读者沙米尔说：“毛主席是世界被压迫人民的领袖。他的思想不仅是属于中国人民的，而且也是属于世界人民的。”"},{"type":"paragraph","text":"读者达阿斯说：“毛主席著作象阳光普照大地一样，照亮我们的道路。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b94e96117"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
