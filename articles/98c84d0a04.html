rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国杂技调演在北京开始广大杂技艺术工作者坚决表示要以阶级斗争为纲，批判党内那个不肯改悔的走资派所推行的修正主义路线，批判他攻击文艺革命的种种奇谈怪论，用搞好这次调演的实际行动，回击右倾翻案风","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年三月三日讯 在反击右倾翻案风的斗争深入开展的大好形势下，一九七六年全国五项文艺调演的第二项——全国杂技调演，昨天在北京正式开始。广大杂技艺术工作者怀着极大的无产阶级义愤，坚决表示，要以阶级斗争为纲，批判党内那个不肯改悔的走资派所推行的修正主义路线，批判他攻击文艺革命的种种奇谈怪论，用搞好这次调演的实际行动，回击右倾翻案风。"},{"type":"paragraph","text":"经过无产阶级文化大革命，随着以革命样板戏为标志的文艺革命的蓬勃发展，我国具有悠久历史的杂技艺术焕发出新的异彩，生动地反映出我国人民意气风发，勇敢豪迈的革命精神，受到了广大工农兵的喜爱。这次杂技调演，是对全国各地杂技艺术革命成果的一次检阅，对于进一步贯彻执行毛主席的革命文艺路线，进一步贯彻执行“百花齐放，推陈出新”、“古为今用，洋为中用”的方针，发展无产阶级文艺革命成果，繁荣社会主义杂技艺术，具有重大意义。"},{"type":"paragraph","text":"参加这次调演的，有北京、上海、天津、辽宁、黑龙江、吉林、河北、内蒙古、山西、陕西、甘肃、新疆、宁夏、山东、安徽、江苏、浙江、福建、江西、河南、湖北、湖南、广东、广西、四川、贵州、云南等省、市、自治区，以及中国人民解放军广州部队、沈阳部队、昆明部队、铁道兵和铁路文工团等三十二个演出单位。调演将分两批进行，每一批分两轮演出。昨天开始的是第一批的第一轮演出。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98c84d0a04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
