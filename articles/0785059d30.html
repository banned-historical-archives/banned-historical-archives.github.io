ear":1980,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度仍有二百多万人从事奴隶劳动"},{"type":"paragraph","text":"据新华社北京电　据合众国际社新德里消息：印度政府十三日发表的统计材料表明，目前仍有二百多万印度人继续从事奴隶劳动，尽管四年前政府就颁布了目的在于结束“偿债劳役”的法律。"},{"type":"paragraph","text":"所谓“偿债劳役”，就是以劳动来抵偿债务。这些人只得到微薄的报酬或者根本没有任何报酬，而为他们的“主人”终生劳动。如果负债人生前偿还不完债，往往死后要由他们的子女继续以劳动来偿还。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0785059d30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
