s":[],"dates":[{"year":1967,"month":4,"day":12}],"is_range_date":false,"parts":[{"text":"谢富治、傅崇碧传达中央文革紧急通知","type":"title"},{"text":"四月十二日晚谢富治、傅崇碧同志派代表来我校传达经中央文革批准的紧急通知如下：","type":"paragraph"},{"text":"革命的同志，红卫兵战友们：我们是谢富治同志、傅崇碧同志派来的，现在宣布一个经过陈伯达同志、康生同志、江青同志、中央文革小组批准的，由谢富治同志、傅崇碧同志签署的紧急通知。全文如下：","type":"paragraph"},{"text":"地质、师大、清华等学校的同学同新北大的争论，要在红代会上解决，不能发动人到北大去。十一日夜间和十二日下午的武斗是完全错误的。希望现在去新北大的同学，一律回到自己的学校。","type":"paragraph"},{"text":" 谢富治 傅崇碧一九六七年四月十二日下午七时半","type":"paragraph"}],"comments":[],"origin":"《北京大学文革资料选编（下）》，美国华忆出版社，2020。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"傅崇碧","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38fe51d5a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
