"dates":[{"year":1974,"month":6,"day":1}],"is_range_date":false,"parts":[{"text":"给叶剑英的信","type":"title"},{"text":"白智清","type":"authors"},{"text":"敬爱的叶帅：","type":"appellation"},{"text":"我们深深知道，您非常爱国家，非常爱人民，难道你未看见在那群恶狗的践踏下，中国落到了国亡无日的田地?他们把矛头对准总理和所有的老干部，稍有一点爱国心的人，有哪一个不想吃这群恶狗的肉，喝这群恶狗的血啊！军内军外，党内党外，上上下下，人们的眼睛都快要冒火了。","type":"paragraph"},{"text":"叶帅，敬爱的叶帅，为了拯救国家，拯救民族，因势利导，担负起这个沉重又伟大的担子吧，我想第一步，告诉军队，没有总理、你、小平的名字，不管谁都调不动！！！我们相信军队是听你们话的。第二步，对林彪系统的将士，只能安抚，不能压服，以免搞出问题，不要逼上梁山。我想他们其中绝大多数人都是恨这群狗和爱国的，还是听你们的话的。","type":"paragraph"},{"text":"叶帅，农夫惜蛇被蛇咬，放虎归山虎伤人。是干的时候了。","type":"paragraph"},{"text":"为了祖国的富强","type":"paragraph"},{"text":"敬礼！","type":"appellation"},{"text":" 心赤客敬上一九七四年六月一日","type":"paragraph"}],"comments":[],"origin":"根据网络材料打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fcbc2596d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
