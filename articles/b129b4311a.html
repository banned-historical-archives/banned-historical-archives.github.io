合作决议》的批语和修改","authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":24}],"is_range_date":false,"parts":[{"text":"毛泽东对《中共中央关于农业生产互助合作决议》的批语和修改","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"子恢同志：","type":"appellation"},{"text":"指示和社论都看了，只改了几个字。互助合作社决议，改了三处，请你看过后，派人走送高岗、朱德、董必武、林伯渠、彭真、彭德怀、邓小平等同志一阅（一天轮完），如果你及他们都同意，请叫廖鲁言同志将修改处抄正，再送报社发表。","type":"paragraph"},{"text":"互助合作决议修改处，陈伯达同志已看过。","type":"appellation"},{"text":" 毛泽东三月廿四日","type":"paragraph"},{"text":"社论，陈伯达同志有些意见，请与他再加斟酌。","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"这个决议于一九五一年十二月十五日中共中央以草案形式发给各级党委试行，至一九五三年二月十五日中共中央通过成为正式决议，并作了部分的修改。","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"[中央估计了它们的两方面的性质，]即私有的性质和合作的性质。初级互助组的组员，他们的生产资料是完全私有的，但也带了共同劳动的性质，这就是社会主义的萌芽。常年互助组则使这种萌芽进一步生长起来了。农业生产合作社，就其建立[在私有财产的基础上，农民有土地私有权和其他生产资料的私有权，农民得按入股的土地分配一定的收获量，并得按入股的工具及牲畜取得合理的代价]这些条件来说，它保存着私有的性质。就其在农民以土地入股后得以统一使用土地，[合理使用工具，]共同劳动，[实行计工取酬，按劳分红，并有某些公共的财产这些]条件来说，它就比常年互助组具有更多的[社会主义的因素。]","type":"paragraph"},{"text":"原载一九五三年三月二十六日《人民日报》","type":"paragraph"},{"text":"注：“[  ]”外为毛泽东加写或改写的文字。","type":"paragraph"},{"text":"四","type":"subtitle"},{"text":"在农村中压倒一切的工作是农业生产工作，其他工作都是围绕农业生产工作而为它服务的。任何妨碍农业生产的所谓工作任务和工作方法，必须避免。","type":"paragraph"},{"text":"五","type":"subtitle"},{"text":"（十三）在解决了有关农业互助合作的许多问题之后，党中央认为必须重复地唤起各级党委和一切从事农村工作的同志和非党积极分子的注意，要充分地满腔热情地没有隔阂地去照顾、帮助和耐心地教育单干农民，必须承认他们的单干是合法的（为共同纲领和土地改革法所规定），不要讥笑他们，不要骂他们落后，更不允许采用威胁和限制的方法打击他们。农业贷款必须合理地贷给互助合作组织和单干农民两方面，不应当只给互助合作组织方面贷款，而不给或少给单干农民方面贷款。在一个农村内，哪怕绝大多数农民都加入了互助组或合作社，单干农民只有极少数，也应采取尊重和团结这少数人的态度。","type":"paragraph"}],"comments":[],"origin":"原载一九五三年三月二十六日《人民日报》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b129b4311a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
