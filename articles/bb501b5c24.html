torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"关于国内外对西安事变的反应等情况致张学良电","alias":"","parts":[{"type":"paragraph","text":"关于国内外对西安事变的反应等情况"},{"type":"paragraph","text":"致张学良电"},{"type":"paragraph","text":"（1936年12月16日）李宜\"兄："},{"type":"paragraph","text":"（甲）西安事变震动了全世界，除日、意指为赤化外，法国急进党谓：张学良已成中国第一有权威之人物；英国取调和态度。"},{"type":"paragraph","text":"（乙）国内纷扰已极，江浙金融大恐慌现象。"},{"type":"paragraph","text":"（丙）正面前进之敌，尚仅樊崧甫两师，黄杰师之第二旅，似向洛阳进，第十师方从汉口开动，共不过十三四团。李铁军师向南阳；王耀武等在汉中陇南；胡、毛、曾三部有向韦州、同心城集中讯；汤恩伯想回陕，尚未开动。"},{"type":"paragraph","text":"（丁）望兄坚持底集结部队，提高士气，发动民众，防止反侧，胜利前途是伟大的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"铣酉[1]即张学良。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":174,"page_end":174},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb501b5c24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
