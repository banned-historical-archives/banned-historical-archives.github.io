<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共南阳地委给河南省委的《关于合作化后诸多问题的报告》","authors":[],"dates":[{"year":1956,"month":12,"day":3}],"is_range_date":false,"parts":[{"text":"中共南阳地委给河南省委的《关于合作化后诸多问题的报告》","type":"title"},{"text":"一、普遍存在着轻视副业、轻视多种经营的单一化农业倾向，致使本已经很穷的农民更加贫穷。方城县劵桥区东方红高级社去年时还有副业22种，今年转入高级社后仅剩下9种，初级社时从事副业生产的540多人，今年只有90人，仅从事运输业这一项就减少收入65%；泌阳县春水区五星农业社1169户农民中，去年养猪1120头，转入高级社后减少到346头，锐减69%。据对内乡、唐河、镇平3个县580个高级社30371户访问调查发现，由于高级社后丢掉了多种经营和副业生产，社员缺粮、缺钱的现象相当严重。调查发现，经常吃不到油盐的社员有45149户，占走访调查农户的14%；有病没钱治疗的8124户，占走访调查农户的2.51%；因缺钱而无法购买返销粮的6842户，占总户数的2.12%；无房却无钱购买，房屋破烂却无钱修补的973户。不少社员“吃饭没食盐，看病没有钱，晚上瞎摸，走路光脚。”为了勉强度日，不得不把家具、衣服、首饰等物件卖掉换钱，把树木和家具破坏后当柴烧。内乡县新华高级社一队50多户人家就出现16户烧家具，5户逃荒要饭，4户卖掉自己的孩子悲惨谋生的严重问题。","type":"paragraph"},{"text":"二、出勤率虽高，生产效率却很低，更有窝工、消极怠工、糊弄集体、损公肥私和糟蹋东西等消极现象。方城县平高台乡联盟高级社有土地6870亩，夏种时竟有60亩好地啥也没种。该县劵桥乡东方红高级社今年夏季霉变小麦32万斤，秋田中竟有3000多亩麦茬地未有犁耙，造成减产80万斤。6个月来该社损坏车辆犁耙大中型农具77件，小件农具386件。865头大牲畜因管理不善和饲料不足饿死98头，累死11头，瘦弱182头。周边唐庄包产队3300亩扁豆因为收割进度迟缓，全部因遭受雨淋沤烂到地里。","type":"paragraph"},{"text":"三、干部水平低下，管理手段武断、粗放，违法乱纪的事情多有发生。走访社队干部和社员们发现，现社队干部最关心的是如何讨好上级的问题，却很少关心社员们的疾苦。他们甚至认为对社员最有效的手段就是实行高压政策，说什么：“有的人清是下贱，你不狠狠地整他，他们就不听话，狠整狠治就是对农民们最好的改造办法”。在把农民当奴隶错误思想地驱使下，一些高级社胡乱制定纪律，随便克扣社员们的口粮，扣罚社员工分，打骂社员，甚至随便把社员关押到黑屋里进行惩罚，还动辄就在大会上斗争社员，搞了不少假枪毙等违法处罚办法。据镇平县286个高级社的不完全统计，有557个社队干部突出存在着强迫命令的问题，22个高级社干部存在着乱罚款或扣工分等问题，85个社队干部打骂过社员，8个高级社干部给社员判过徒刑，32个社队干部搞过社员的女人。以至于该县薛庄乡社员们说，要想有粮吃有钱花，得有三个好：“自己的姑娘或老婆长得好；吃了大亏不吭气装的好；对社队领导处处巴结的好。”这种情况在走访的7个县580多个高级社都不同程度地存在着，未列入调查对象的4个县也有此类似现象。","type":"paragraph"}],"comments":[],"origin":"赵宗礼《1956—1961：南阳反右志逸》未刊稿，2023年2月6日。赵宗礼，《南阳日报》社退休记者。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共南阳地委给河南省委的《关于合作化后诸多问
