遗留善后工作中两个问题给玉林地委处遗办的复电","authors":[],"dates":[{"year":1983,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"广西壮族自治区党委处遗领导小组办公室关于处理“文革”遗留善后工作中两个问题给玉林地委处遗办的复电","type":"title"},{"text":"玉林地委处遗领导小组办公室：","type":"appellation"},{"text":"你室十月二十二日关于处理“文革”遗留善后工作中两个问题的请示电悉。现电复如下：","type":"paragraph"},{"text":"一、一九五八年被错划为右派的干部、职工，开除回家后在“文革”中被害致死，这次处遗善后对其子女抚养费的发放时间，应从其被害致死的第四个月算起。经济补贴原则上应由原工作单位负责发放，但事前双方要联系协商妥当。","type":"paragraph"},{"text":"二、发给家住城镇的国家机关，事业单位干部、职工受害者遗属的抚养费时，应按桂政人福字[80]21号、桂劳险字[80]26、[80]财事字88号文件执行，即从一九七九年八月份起，补助一个人的，每月增发二元五角，补助两个人（含两个人）以上的，每月增发五元，作为副食品价格补贴。","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80e4f00935"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
