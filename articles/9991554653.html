tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"莫做书本的奴隶","authors":["刘绍楹"],"parts":[{"type":"paragraph","text":"读书，可以从书本学到知识，这是尽人皆知的。但是，对书本不加分析，甚至到了迷信本本的程度，书也会束缚人的思想，甚至愚人。这个道理，两千年前的孟老夫子就有过切身体会，他有句名言：尽信书，则不如无书。"},{"type":"paragraph","text":"面对浩瀚书海，书的作者思想水平不同，材料来源不同，观察和研究问题的立场、方法不同，也就是说，作者受到各种条件的局限，书中难免会有不能正确反映实际的地方。而人类社会随着人们的社会实践不断深入、发展，不断有新课题出现。这就要求读书者在接受书本知识的时候，要勤思考，细分析，不盲从，看看哪些地方讲的正确，哪些地方讲错了，哪些地方讲的不完善需要补充。边读边分析思考，就会发现新问题，取得新收获。如果仅仅重复书本上已有的知识，永远也不去超过前人。"},{"type":"paragraph","text":"毛泽东一生傅览群书。他读书的显著特点，就是既尊重书本，又不尽信书，不当书本的奴隶。即使对马恩列斯的著作，他也要求大家随读随想，用自己的头脑加以分析，哪些是正确的，哪些说得不正确，或者不大正确。五十年代末期他读斯大林的《苏联社会主义经济问题》和《苏联政治经济学（教科书）》时，一方面从书中借鉴有益的知识，另一方面又指出书的最大缺点是缺少辩证法，讲政治经济学不从分析生产力和生产关系、经济基础和上层建筑的矛盾出发。他还对斯大林关于商品生产和其它一些经济问题的论述，发表了许多有真知灼见的评论。这种科学的、实事求是的读书方法，颇能给人以启迪。"},{"type":"paragraph","text":"古往今来的无数事实说明，许多真理的发现，就是在对前人的知识进行分析、批评、改造的基础上获得的。哥白尼对“地心说”加以否定，创立了“日心说”，实现了天文学上的一次革命。马克思、恩格斯对德国古典哲学、英国古典政治经济学、法国空想社会主义进行深入分析研究，取其精华、弃其糟粕，创立了崭新的马克思主义学说。我们今天的四化大业是前无古人为事业，同样既需要继承前人的成果，又不断创新，各方面的工作才能有所创造，不断前进。"},{"type":"paragraph","text":"当然，提倡读书不盲从，并不是说对一切书本都采取怀疑态度。已被实践证明的反映客观真理的书，就该认真学习，丰富自己的知识。对观点不甚清晰、瑕瑜互见的书，可以分析研究，开展讨论，弄个明白。对有明显谬误的书，则要把里边的刺挑出来，以防卡住“喉咙”。一句话，读书就该动脑勤思考，发挥主观能动性，而不能拜倒在书的脚下，当书本的奴隶。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9991554653"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
