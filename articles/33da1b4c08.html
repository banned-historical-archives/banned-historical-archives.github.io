script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"在反映慕中岳编著中国历代战史的《要信摘报》上的批语","alias":"","parts":[{"type":"paragraph","text":"在反映慕中岳编著中国历代战史的"},{"type":"paragraph","text":"《要信摘报》上的批语！"},{"type":"paragraph","text":"（1968年11月15日）送黄永胜同志酌办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十五日"},{"type":"paragraph","text":"[1]本篇一写在中共中央办公厅秘书局信访处1968年11月14日编印的《要信摘报》第四○八号上。摘报说，武汉市参事室研究员慕中岳（原国民党政府军少将，起义于川西）致毛泽东一信称：“我有不少危害人民的罪行。为了对党立功赎罪，从一九五七年起研究中国历代战史，到一九六六年八月止，把东周晋楚城濮战役，到北宋对西夏作战的镇戎战役，其间每个朝代的主要战役写成了初稿，共三十一卷，二百七十万余字。”他还说，“战役初稿，在文化大革命初期被红卫兵小将撤走。现将自己所记忆的每卷情况制成表和汇编成“中国历代战史’编著情况简介，向主席汇报”。毛泽东阅看时，在这句话旁写了一个批语，即本篇二。"},{"type":"paragraph","text":"[2]黄永胜，当时任中国人民解放军总参谋长。在反映慕中岳编著中国历代战史的《要信摘报》上的批语"},{"type":"paragraph","text":"二如可能，可找来看看。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":11,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":353,"page_end":354},"tags":[{"name":"毛泽东","type":"人物"},{"name":"黄永胜","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33da1b4c08"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
