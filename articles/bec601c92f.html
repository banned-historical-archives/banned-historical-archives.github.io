script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大力克服右倾思想　深入开展三反斗争上海铁路分局打虎获辉煌战果先后捉到大小老虎达二百六十一只","authors":[],"dates":[{"year":1952,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海铁路管理局上海分局大力克服右倾思想后，打虎战斗更深入一步，自二月廿五日开始第二战役，到三月二日为止，共擒获大小“老虎”一六三只。连第一战役共打下大小“老虎”二百六十一只。现正向第三战役胜利前进中。"},{"type":"paragraph","text":"上海分局在第一战役结束后，刘白涛分局长即向所有指战员及全体员工指出，要克服右倾思想，肃清各种“思想老虎”。他并指出右倾思想不克服的话，打虎战斗就不能获得彻底的胜利。如南京及沪杭线两个打“虎”指挥部起初对完成任务信心不高，经过克服了右倾思想，战果大大超过了任务。南京打下大小“老虎”廿九只；沪杭线打下大小“老虎”十二只。公安分处起初认为没有什么“老虎”，结果打下大“老虎”一只，中小“老虎”十三只。沪宁线也打下廿一只。"},{"type":"paragraph","text":"由于总结了第一战役的打“虎”经验，上海分局在第二战役中作战艺术更进一步提高。如分局直属机关创造了“三个战场，四个攻势”的新战术，将狡猾顽固的大“老虎”赵晓峰打了下来，并且由原来一窠三只，打成了六只。在各个战场上，都充分运用了政治工作，如南京将一只起义的大“老虎”释放后，“老虎”窝内部即大为震动，各个“老虎”堡垒一攻即破。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bec601c92f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
