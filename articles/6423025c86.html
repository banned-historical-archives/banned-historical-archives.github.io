ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"悼念戴高乐逝世的电","alias":"","parts":[{"type":"paragraph","text":"卓念戴高乐“逝世的信电"},{"type":"paragraph","text":"（1970年11月11日）巴黎夏尔·戴高乐夫人："},{"type":"paragraph","text":"获悉夏尔·戴高乐将军不幸逝世，谨对他，反法西斯侵略和维护法兰西民族独立的不屈战士，表示诚挚的悼念和敬意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九七〇年十一月十一日于北京"},{"type":"paragraph","text":"[1]戴高乐，法国将军、政治家。在第二次世界大战期间，率部抗击德国侵略军。法国沦陷后，在英国伦敦领导“自由法国”（后改为“战斗法国”）运动，先后组织法兰西民族委员会和法兰西民族解放委员会，领导海外和国内的抗德斗争。1944年6月任法国临时政府首脑。1958年6月出任法国总理。1958年12月至1969年4月任法兰西第五共和国总统。1970年11月9日逝世。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":121,"page_end":121},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6423025c86"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
