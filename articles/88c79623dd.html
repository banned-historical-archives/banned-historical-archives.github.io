ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于移载台湾大道通讯社两条消息的批语","alias":"","parts":[{"type":"paragraph","text":"关于移载台湾大道通讯社"},{"type":"paragraph","text":"两条消息的批语"},{"type":"paragraph","text":"（1953年2月28日）新华社："},{"type":"paragraph","text":"台湾大道通讯社的两条消息\"，可移载《参考消息》，这是蒋匪向美国人说的，表明他无力进扰大陆和海南岛，和半个月前蒋匪向美国通讯【社】发表的谈话为同一性质。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月廿八日"},{"type":"paragraph","text":"[1]指新华社1953年2月26日编印的《内部参考》第四十四号上刊登的台湾大道通讯社的两条消息。一条消息说：“中共军队的华中和华东司令部已合并成为一个所谓海岸战区，由四野司令员林彪将军指挥。这个战区将由第四野战军的五个军和第三野战军的两个军（第八军和第十军）来防守。”另一条消息说：“共产党占领的海南岛的防御力量已经大为加强，在三个月以前，它的防守兵力即已增加了一倍。”“除了地面驻军之外，在岛上的两处飞机场约有五十架各种类型的飞机，另外还经常驻有小型和大型的海军舰艇共三十艘。”"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":527,"page_end":527},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88c79623dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
