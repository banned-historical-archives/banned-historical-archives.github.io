<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"给武汉医学院×××的信 （1）","authors":["武汉大学","陈嘉勉"],"dates":[{"year":1957,"month":5,"day":26}],"is_range_date":false,"parts":[{"text":"给武汉医学院×××的信 （2）","type":"title"},{"text":"武汉大学陈嘉勉","type":"authors"},{"text":"×××：来信收到矣！殊因心情激励，未能知期回函，致歉！老友寄来相片我已收到，我很感谢。","type":"paragraph"},{"text":"数天来本人感情已达总爆炸的程度。回忆数年来官僚老爷们的残酷屠杀，拍马比的走狗门（按：官僚老爷是指党的领导者，走狗是指党团员和积极份子。），对无辜的人们的迫害真是见所未见，闻所未闻，今天还是记意犹此，血腥未散，真可谓之血洗的时代矣！今天是受害者说话的时候了，我们要报复。","type":"paragraph"},{"text":"前天我们中文系的朋友们向党委提出大鸣大放，立刻放、立刻鸣的正义要求，使得老爷们感到恼怒了，于是下令各支部要我们这些学理、法科的同学不要理会文科同学之意见。然而不是过去了，办不到！次日清晨，从中文系中发出了巨大呼声，大字报飞遍各地，其内容之可怕，标语之惊人，鼓励力之巨大，可谓“前无古人，后无来者”矣！其中有和营（按：和营是指伙营，合伙办的意思）之定期导刊，如‘炮火’、‘火焰’、“淋浴”等其他大字报，如含泪的控诉，“阴森森明月无光，黑魅魅鬼哭神号”之揭发及“张勃川滚出去”！“武大老牛破事”，“中国毒头张勃川”（张勃川乃副校长也）。","type":"paragraph"},{"text":"讽刺性文章可谓多矣哉！现搞一则如下：张斌说“我让这个党员你当拉”！说的好，“让”“当”二字尤其妙，在某些人看来党员是官衔，入党是当官，而当官的人岂可批评，怪不得他要吹胡子瞪眼睛，连党员也要人当了！","type":"paragraph"},{"text":"又有提名为：“不铲除官僚统治，誓不罢休”之控诉，其文如下“官僚主义者杀害了我们的同学——因为革命不是绣花，官僚主义者用斗争、禁闭来摧残我们的同学——因为这是教育的是好方式，啊！革命不是绣花，好一个革命不是绣花；啊！教育的最好方式，好一个最好的方式。鸣呼！可咒咀的东西！向死者哀悼，向生者鸣冤！”","type":"paragraph"},{"text":"一时大爆发起来的愤怒的火焰，席卷一切！凡有良心之人均纷纷地拔剑而起；而那些当官的党员先生们，学法律（即将政治当饭吃，没得马列主义就要俄死的君子）的法官们，以及借此时机向官僚立功的狮子狗们，亦居然欲鸣而鸣不下去，欲争而结果恼羞成怒。哈哈！真可谓积万年之雪恨动畅矣！","type":"paragraph"},{"text":"当晚八时半，在我校小操场由党委书记刘真（新调来）给全校做报告。在六时许，操场就是人山人海，中文系之大字报花花绿绿，尽忙眼底；而讲台之前大书之日：“反对右倾，大胆鸣放，武大这是寒气凌人，我们要春天”；“张勃川滚出去：“张勃川爱人当护士去”；“张勃川十大罪状”。高呼口号之声振天动地！而刘真之胆乃飞之天外矣！罪恶是见不得太阳的，而真理永远属于群众。刘之发言，用意恶毒，在于分散注意打击鸣放，维护官僚的统治，以考试等来吓同学（特别是理科）等等，其后仍禁止喊口号，中文系有数条大汉虽然上台，大声高呼，号召起来斗争到底，获得排山倒海之掌声。而党员们则顺机捣乱会场，在同学发言时，公然号召同学退出会场并带头纷纷退去，并力竭声嘶大讲：“鸣！走啊！走啊！鸣！鸣！”。","type":"paragraph"},{"text":"然而我们这些人的命是操在这些人的手里，我们的一生，我们的所有的幸福和幻想，我们盼望的生活和未来，都会被这些人毁于一旦，我们可以被他们活活杀死，可以被他们斗争、禁闭。他们的双手沾满死去的无数青年男女的鲜血；沉痛的父母的眼泪。而他们还要鸣，还要趾高气扬地！还要统治，还要领导，还要教育，还要考验。天下之黑暗，如无穷尽之黑暗，愈来愈黑，可怕矣！回想过去的生活，真可谓鬼兴神无，杜鹃泣血，惨不忍睹者矣！而在此混乱之中，刘真仍旧好汉不吃眼前亏，下令散会，由数名手持博壳（按：指手枪）之武士带领之下上汽车逃之夭夭！","type":"paragraph"},{"text":"今天形势愈来愈紧张，而斗争也尖锐与复杂了。然而任何力量，均将阻挡不住怒火。巨大的长达数米的巨幅标语出现了，程千帆（中文系教授，民主人士）也支持我们之斗争，党员成了“过街老鼠”，同学纷纷捐献纸张、笔墨。饭堂工友也捐献浆糊，假如要罢课我举双手赞成，要斗争我坚决拥护，同学！官僚主义的罪大极了，与我们的仇恨是不共戴天的，过去他们整人如麻，大兴阿房宫并雷厉风行，而今天搞到自己头上，一切要从团结愿望出发，和风细雨……同学，这是自己人啊！妙哉！好一个自己人！而我们都是敌人，是牛鬼蛇神，没有生之权利的人，而只有他们才有和风细雨，小风小雨；哈哈！确实好写意矣！再配上敷株桃花玫瑰则更美哉！有人问这是对敌人，这是敌我不分，说的好！妙！90%的同学是敌人，敌人多矣伙矣！","type":"paragraph"},{"text":"按余观之，此次所爆发之标语，其力量其艺术足抵新中国开国以来之成就，而有过之！事情在发展中，我们要斗争，我们将继续前去“轫”的战争，一时英雄之感，决非我们秃手所能形容者也。……(后略)","type":"paragraph"},{"text":" 嘉勉","type":"paragraph"}],"comments":[],"origin":"1957年9月1日《武汉大学右派言论录编》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"893fa2bbc3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
