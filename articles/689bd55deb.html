ear":1954,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"通常资产阶级国家行使立法权的议会都实行‘两院制’。在议会里有上院参议院和下院众议院。如美国，现在两院议员在形式上都是由人民‘直接选举’出来的，事实上则几乎都是两党(民主党和共和党)的党徒，其中重要分子也就是两党的重要分子，当然都是自己很有钱的或者是大资产阶级的代理人。如美国第八十一届国会，参议员共九十六人，其中工业资本家十六人，农业资本家九人，资产阶级的辩护士律师六十六人；众议院议员中则有工业资本家八十一人，农业资本家三十七人，律师二百三十五人。他们就没有一个人是代表占总人口绝大多数的工农群众的。由这样的人组成的议会是替谁办事的，一看就知道了。"},{"type":"paragraph","text":"随着资本主义总危机的到来，资产阶级为了进一步镇压劳动人民，几百人吵吵嚷嚷的议会对于资产阶级专政已不很方便，垄断资产阶级便进一步削弱了议会，将一切大权交给在它直接掌握下的总统或内阁，也就是增强了行政权。这样，在资产阶级民主的危机到来的同时，也发生了资产阶级议会制的危机。　(信)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"689bd55deb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
