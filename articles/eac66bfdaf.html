nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"江青、谢富治在中央文革召开的中学革命造反派座谈会上的讲话","parts":[{"type":"title","text":"544."},{"type":"paragraph","text":"江青、谢富治在中央文革召开的中学革命造反派座谈会上的讲话"},{"type":"paragraph","text":"(1967年2月24日)"},{"type":"paragraph","text":"对于“联动”这样的反动组织要做分化瓦解，孤立一小撮顽固分子，要对它的大多数要进行工作。提醒你们注意，他们的组织很严密，是有后台的。道路是不平坦的，是曲折的，一方面要做好精神准备，防止“联动”反扑，但不要排斥犯错误而又愿起来革命的人，你们要学会做这个工作，不能孤立自己。"},{"type":"paragraph","text":"在同一个会上，谢富治副总理指出：在中学，一个很重要的任务，就是同“联动”反动组织做坚决的斗争，把他们斗倒、斗臭。他们是一小撮，为何这样顽固呢？就是有它的后台。他代表一个反动的思潮，是资产阶级阶级反动路线的典型代表，目前他们歪曲《红旗》杂志第四期社论，替自己壮胆，准备反扑。"}],"authors":["江青","谢富治"],"dates":[{"year":1967,"month":2,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":288,"page_end":288,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"江青","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eac66bfdaf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
