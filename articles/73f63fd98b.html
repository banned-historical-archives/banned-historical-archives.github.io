script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"攻读马列著作和毛主席著作　学一点历史  武汉部队某团炮一连党支部组织理论骨干用马克思主义的立场、观点、方法研究儒法斗争和整个阶级斗争的历史，推动批林批孔深入发展","authors":[],"dates":[{"year":1974,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"攻读马列著作和毛主席著作　学一点历史"},{"type":"paragraph","text":"武汉部队某团炮一连党支部组织理论骨干用马克思主义的立场、观点、方法研究儒法斗争和整个阶级斗争的历史，推动批林批孔深入发展"},{"type":"paragraph","text":"据新华社武汉电　人民解放军武汉部队某团炮一连理论骨干在刻苦攻读马列著作和毛主席著作的同时，认真学习一些历史，使对林彪与孔孟之道的批判，不仅能从理论上进行深刻的剖析，而且有了历史材料作依据，批得更加生动有力。"},{"type":"paragraph","text":"批林批孔开始后，炮一连党支部遵循毛主席关于“指导一个伟大的革命运动的政党，如果没有革命理论，没有历史知识，没有对于实际运动的深刻的了解，要取得胜利是不可能的”这一指示，把组织连队理论骨干学习历史，用马克思主义的立场、观点、方法读一点法家的著作，作为在政治思想领域里战胜敌人，彻底摧毁反动没落阶级的意识形态孔孟之道，巩固无产阶级专政的重要措施。他们把报刊上登载的有关历史资料收集成册，结合批林批孔的重点，有目的、有计划地选读一些历史书籍。四个多月来，他们阅读了《简明中国哲学史》和一些历史著作的许多章节，以及《秦始皇》、《陈胜吴广》等历史小丛书，并且选读了一些法家的著作和儒家的反面教材。他们还多次到连队附近的著名“仰韶文化”所在地参观“仰韶文化”遗址，观看了当地发掘的西汉冶铸铁器的作坊遗址和举办的这个作坊的实物展览，把从书本上学习历史和在社会调查中学习历史结合起来，效果很好。战士王春谅在批判林彪效法孔老二“克己复礼”的罪行时，对孔老二所处的春秋末期的时代作了全面的分析，掌握了新兴的地主阶级与没落的贵族奴隶主阶级斗争的大量史实，阐明封建社会必然要代替奴隶社会，新兴地主阶级专政必然要代替奴隶主阶级专政，这在当时已是不可抗拒的历史潮流，从而对孔老二为了维护摇摇欲坠的贵族奴隶主统治，拚命鼓吹“克己复礼”的反动本质，对林彪效法孔老二“克己复礼”的反革命罪行，批判得更加深刻了。排长杨秀通，为了深入批判林彪攻击秦始皇“焚书坑儒”，认真阅读了史书对秦始皇的有关记载，并且走访了驻地县的文化馆，对秦王朝建立过程中复辟与反复辟的斗争情况，有了比较多的了解，大大丰富了自己的认识。杨秀通先后在连里作了两次辅导，运用马列主义、毛泽东思想关于阶级和阶级斗争的观点以及大量的历史资料，阐述秦始皇是一位厚今薄古的专家，执行了一条进步的路线，对推动社会发展起了积极作用，“焚书坑儒”正是他为了粉碎反动阶级的复辟活动和建立统一的中央集权国家的革命行动，有力地揭露了林彪借攻击秦始皇，恶毒攻击无产阶级专政的反动实质，对全连指战员很有教育和启发。"},{"type":"paragraph","text":"炮一连的指战员学习了历史，更加了解了两千多年来的儒法斗争，对阶级斗争的客观规律有了进一步认识。他们从法家人物少正卯被孔老二杀害后陈尸示众，吴起被乱箭射死，商鞅被车裂等血淋淋的事实中，认识到儒法两家的斗争，从来就不是什么学术之争，而是你死我活的阶级斗争、路线斗争；认识到历史上一切保守的和妄图开倒车的反动派，都是尊孔反法的，总是抬出孔老二这具政治僵尸，从孔孟之道那里寻找反动思想武器，以维护其反动统治或进行复辟活动。今天，我们为了反修防修，坚持无产阶级专政下的继续革命，就一定要彻底批判反动没落阶级的意识形态孔孟之道；认识到支持还是反对代表社会发展方向的新生事物，这是历史上法家和儒家斗争的一个重大问题，也是今天马克思主义和修正主义斗争的一个重大原则问题。为了发展无产阶级文化大革命的胜利成果，巩固无产阶级专政，坚持革命，反对倒退，我们就是要满腔热情地歌颂和支持社会主义的新生事物。"},{"type":"paragraph","text":"现在，炮一连用马克思主义的观点学习历史的空气越来越浓了。全连已有六十多人买了历史书籍，各班都建立了剪辑历史资料的剪贴本，利用业余时间学习历史和开展讲历史故事的活动。全连的理论骨干迅速成长，在批林批孔中，他们已经写出了六十多篇质量较好的批判文章，先后在本单位、兄弟连队和团党委会作了十四次辅导发言，内容包括“奴隶社会的基本概况”、“儒法代表人物简介”、“秦始皇在历史上的进步作用”、“林彪为什么要攻击秦始皇”等等，受到了广大干部和战士的好评。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"儒法斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73f63fd98b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
