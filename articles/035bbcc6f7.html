script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"希共马列主义小组谴责希共修正主义集团推行投降叛卖政策  号召人民推翻法西斯统治争取民族独立解放  决心高举革命旗帜建立地下组织反对国内外统治者","authors":[],"dates":[{"year":1967,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希共马列主义小组谴责希共修正主义集团推行投降叛卖政策"},{"type":"paragraph","text":"号召人民推翻法西斯统治争取民族独立解放"},{"type":"paragraph","text":"决心高举革命旗帜建立地下组织反对国内外统治者"},{"type":"paragraph","text":"新华社二十四日讯　侨居外国的希腊共产党马克思列宁主义小组不久前发表告希腊人民书，揭露美帝国主义及其走狗在希腊实行法西斯统治，谴责希共修正主义领导集团推行投降和叛卖的政策，号召希腊全国人民，为推翻希腊军事独裁政府、争取民族独立和解放而斗争到底。"},{"type":"paragraph","text":"告人民书揭露，今年四月二十一日在希腊爆发的法西斯军事政变，是美帝国主义通过在希腊的“美国军事顾问团”，伙同希腊国王，以及美帝国主义的仆从——希腊富豪集团及其政治代表共同策划和组织的。告人民书指出，“美国一手扶植的希腊法西斯军事独裁政权极端威胁着希腊人民的命运。”“成千上万的男女革命战士，民主人士，爱国者被关进新的法西斯的吃人的监牢里。成千上万的民主人士被追捕和被驱逐。一些政党和数百个工会和群众性组织被解散和宣布为非法，……美国佬在希腊实施野蛮的法西斯主义”。"},{"type":"paragraph","text":"告人民书说，“美帝国主义及其走狗推行法西斯独裁专制是为了镇压人民的反抗，使人民沦为奴隶，保证供给垄断集团最廉价的劳动力，供给北大西洋集团最廉价的鲜血，把希腊和塞浦路斯变成东地中海地区反对社会主义国家和阿拉伯国家的火山口。”"},{"type":"paragraph","text":"告人民书指出，赫鲁晓夫修正主义对希共的干涉和希共领导集团奉行的修正主义政策把希腊人民引入歧途，造成了可悲的后果。它指出，希共修正主义领导集团已解散了在希腊的希共地下组织，降下了革命的旗帜。他们无耻地鼓吹“和平过渡”，“议会道路”和“多党的阶级合作”。他们念念不忘的是乞讨希共的“合法化”和参加“普选”，从而使希共“堕落成为依附外国的资产阶级政党的软弱无能的卫士”。他们甚至还参加了反对中国伟大的无产阶级文化大革命的疯狂的反华大合唱。"},{"type":"paragraph","text":"告人民书强调说，“今天在希腊人民面前，摆着一个十分迫切的，生死存亡的斗争任务。马列主义者，希共中健康的力量必须抛弃希共修正主义领导集团，组织马列主义小组向修正主义作不调和的斗争，把在人民中公开谴责修正主义的投降政策和行动视为自己最高的义务”。"},{"type":"paragraph","text":"告人民书说，马列主义者得出的总的结论是，只要希腊处于美帝国主义的奴役下，就不能有任何社会进步。不通过革命，希腊是不能摆脱美帝国主义的统治的。不与苏联修正主义决裂和进行坚决的斗争，就不可能有任何社会进步。争取民族独立，人民民主和社会主义的斗争是与反美，反对外国仆从——富豪集团和反对苏联修正主义的斗争分不开的。"},{"type":"paragraph","text":"告人民书最后说，希腊马列主义者将在各地组织地下马克思列宁主义组织，他们将深深地扎根于人民之中，并以顽强的工作和充沛的革命精神担负起反对国内外统治者的艰巨的斗争任务。他们将高举“革命的旗帜，马克思列宁主义胜利的旗帜，把每个工厂，每个乡村，每条街道，每个生活和工作的地方作为反美的民主解放斗争的堡垒”。“希腊的法西斯主义必将被粉碎。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"035bbcc6f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
