"中国民主同盟","叶笃义"],"dates":[{"year":1957,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"改变高等学校的党委负责制","type":"title"},{"text":"中国民主同盟叶笃义","type":"authors"},{"text":"(叶笃义：中国民主同盟副秘书长兼办公厅主任)","type":"subtitle"},{"text":"叶笃义在会上谈了两点意见，一点是他认为清华大学是党群关系较好的一所学校，尚且问题很多，共产党对知识分子的问题，应该更加重视起来。他认为应把五百万知识分子的问题，摆在一个重要地位，并建议政协全国委员会成立一个专门机构负责处理知识分子问题。另一点是，他认为在学校中，不需要有党派的组织活动。他十分赞成改变高等学校的党委负责制。他说，过去党委会管得太多，如果说党与非党之间有一堵墙，墙的来源，主观上有些关系未处好是一个原因，但是不是因为有了党的组织，无形中就形成了一堵墙呢？他认为一个人多一种关系，多一种身份就多一个矛盾，如校长就是校长，教授就是教授，两人之间关系就简单些，如加上一种党派关系，关系就复杂些了。我们如果不以党派成员身份出现，关系就简单些，矛盾就少了。叶笃义的这一意见，是包括主张共产党员在学校中也不以党员身份进行活动。他说，党派要常开会，起码对六分之五的时间的保证就有影响。问题是在高等学校中搞这些组织，是起了推动教学的作用呢，还是抵消了教学的作用？七八年来，民主党派组织生活都过得不好，这一问题长期不得解决。除了主观原因之外，客观上，每半月或一个月开个会过组织生活，对知识分子有无必要？他对于民主党派学共产党的组织生活那一套，是不是正确的方向，表示怀疑。他对于民盟组织在大学中的活动，究竟对学校有帮助呢，还是添了麻烦？也表示怀疑。(原载光明日报1957年5月8日)","type":"paragraph"}],"comments":[],"origin":"《校内外右派言论汇集》(北京大学经济系政治经济学教研室，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b3e62d87f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
