ar":1960,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海铁路局客修段钳工　张方杜"},{"type":"paragraph","text":"这次，我参加黑龙江现场会议以后，感受很多，现在就我体会最深的谈几点。"},{"type":"paragraph","text":"首先，从会上介绍的无数事例中可以看出，广大工农群众掌握毛泽东思想后，威力无穷。以毛主席的思想来武装自己的头脑，什么问题都能解决，毛泽东思想是认识和改造世界的“金钥匙”；其次，理论什么人都可以学，只要有一颗红心，就一定能学得好。理论不是神秘的东西，不只是专家、教授、大学生能学，我们工农群众同样能学理论，而且学得很好。第三，学习理论的目的一定要明确是为阶级斗争服务，为生产斗争服务；密切联系自己思想来改造客观世界和主观世界。第四，学习理论要贯彻读、论、讲、写、用相结合，哈尔滨第七百货商店的经验的确很好，今后一定要向他们学习，多读多论多讲多写多用，推动我们各项工作，出色完成任务，力争后来居上。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f0579e041"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
