script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我国决定承认马来亚联合邦  毛主席和周总理电贺马来亚独立","authors":[],"dates":[{"year":1957,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我国决定承认马来亚联合邦"},{"type":"paragraph","text":"毛主席和周总理电贺马来亚独立"},{"type":"paragraph","text":"新华社30日讯　毛泽东主席今天致电马来亚联合邦最高元首端古·阿卜杜勒·拉赫曼祝贺马来亚独立，电文如下：马来亚联合邦最高元首端古·阿卜杜勒·拉赫曼陛下："},{"type":"paragraph","text":"欣闻马来亚联合邦宣布独立，我代表中国人民并且以我个人名义谨向陛下和马来亚人民表示热烈的祝贺。祝马来亚联合邦繁荣和马来亚人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东　1957年8月30日"},{"type":"paragraph","text":"新华社30日讯　周恩来总理兼外交部长今天致电马来亚联合邦总理兼外交部长东古·阿卜杜勒·拉赫曼祝贺马来亚独立，电文如下：马来亚联合邦总理兼外交部长东古·阿卜杜勒·拉赫曼阁下："},{"type":"paragraph","text":"我荣幸地代表中华人民共和国政府通知阁下，中华人民共和国政府已经决定承认马来亚联合邦。祝马来亚人民在缔造自己的国家和建设幸福生活的事业中获得新的成就。祝我们两国之间的友好关系日益加强和发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理兼外交部长　周恩来"},{"type":"paragraph","text":"1957年8月30日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26af5a50ab"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
