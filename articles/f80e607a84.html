"dates":[{"year":1986,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"胡耀邦叶剑英聂荣臻彭真分别致电"},{"type":"paragraph","text":"深切哀悼巴苏大夫逝世"},{"type":"paragraph","text":"新华社北京10月13日电中国共产党中央委员会总书记胡耀邦今天就巴苏大夫逝世致电全印柯棣华大夫纪念委员会，向该委员会和巴苏大夫的亲属表示哀悼。电文如下："},{"type":"paragraph","text":"惊悉全印柯棣华大夫纪念委员会主席比·库·巴苏大夫不幸逝世，我谨代表中国人民向你们并向巴苏大夫的亲属表示深切的哀悼。"},{"type":"paragraph","text":"巴苏大夫是全印柯委会的创始人，是印度人民的优秀儿子，是中国人民尊敬的老朋友。他为中国人民的民族解放事业作出了宝贵的贡献，为增进中印两国人民的相互了解和友谊作出了不懈的努力，对此，中国人民将永志不忘。我相信，巴苏大夫毕生为之奋斗的中印人民传统友谊将得到进一步的巩固和发展。"},{"type":"paragraph","text":"新华社北京10月13日电中共中央军事委员会副主席聂荣臻今天就巴苏大夫逝世致电全印柯棣华大夫纪念委员会，向该委员会以及巴苏大夫的亲属表示深切哀悼。电文如下："},{"type":"paragraph","text":"惊悉比·库·巴苏大夫不幸逝世，我谨向你们并向他的亲属表示深切的哀悼。他为发展中印人民友谊所作出的贡献将永载中印友好史册。"},{"type":"paragraph","text":"新华社北京10月13日电中共中央军事委员会副主席叶剑英今天打电报给全印柯棣华大夫纪念委员会，对巴苏大夫的不幸逝世表示深切哀悼。电文如下："},{"type":"paragraph","text":"惊悉比·库·巴苏大夫不幸逝世，我为失去这样一位老朋友而深感悲痛，谨向你们并向他的亲属表示深切的哀悼。"},{"type":"paragraph","text":"新华社北京10月13日电中华人民共和国全国人民代表大会常务委员会委员长彭真今天致电全印柯棣华大夫纪念委员会，对巴苏大夫不幸逝世表示深切哀悼。电文如下："},{"type":"paragraph","text":"惊悉比·库·巴苏大夫不幸逝世，我谨向你们并向他的亲属表示深切的哀悼。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f80e607a84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
