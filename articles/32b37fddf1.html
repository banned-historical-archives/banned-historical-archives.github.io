ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"目前中心在坚决备战拒顾迎张","alias":"","parts":[{"type":"paragraph","text":"目前中心在坚决备战拒顾迎张！"},{"type":"paragraph","text":"（1937年1月6日）周、博："},{"type":"paragraph","text":"甲、目前中心在坚决备战，拒顾迎张。乙、顾来则张杨?两部全被宰割，红军将被迫登山。"},{"type":"paragraph","text":"丙、张杨两军速筑坚固阵地，红军担任野战，坚决为保卫西北革命局面奋斗到底，不为南京和平空气所松懈。如此干法才能求得和平，广西前事可证。"},{"type":"paragraph","text":"丁、恩来此时绝对不应离开西安，张学良去宁已上了大当。"},{"type":"paragraph","text":"洛泽"},{"type":"paragraph","text":"六日二十时"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）给中共中央派往西安的代表周恩来、博古（秦邦宪）的电报。"},{"type":"paragraph","text":"[2]顾，指顾祝同，当时任国民党军事委员会委员长西安行营主任、国民党军“讨逆”军第一集团军总司令。"},{"type":"paragraph","text":"[3]张，指张学良。[4]杨，指杨虎城。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":121,"page_end":121},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32b37fddf1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
