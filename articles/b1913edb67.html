文革"],"dates":[{"year":1999,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"永城交通局运管所"},{"type":"paragraph","text":"职工不交“上岗培训费”立马下岗"},{"type":"paragraph","text":"河南永城市交通局运管所在1998年10月，不知依照什么文件，向其所辖交管站、各股室、人力三轮车管理站的职工每人收取5000至15000元不等的“上岗培训费”，除父母是运管所职工的每人交1000元外，其他人每人少则5000元，多则15000元，逾期不交或交不齐者，威胁按精简机构的要求——下岗。当时有职工向市纪检部门反映此事，但不了了之。大部分职工迫于无奈交了钱，个别交不起的，则交了一部分，写了欠条。运管所开的收据并不是行政事业性收费专用票据，而是不伦不类的“收据”，上面写着：×××交来培训费×××元，再盖上运管所的公章和会计的私章。"},{"type":"paragraph","text":"1999年1月，永城市交通局运管所以下岗相威胁，强迫职工集资———“高息揽存”。运管所发了一个文件，明文规定：“凡我所1999年1月份在岗职工均须交纳本次集资，每人10000元，五年后一次还本付息，全体人员务于1999年元月30日前交清，逾期交不清者，按精简机构的要求，自2月1日下岗。”"},{"type":"paragraph","text":"这种置国家法律、政策及职工合法权益于不顾的乱收费、乱集资难道就没人管管吗？"},{"type":"paragraph","text":"河南永城市交通局公路运输管理所冯金才李文革"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1913edb67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
