ates":[{"year":1957,"month":7,"day":7}],"is_range_date":false,"parts":[{"text":"民进中央决定整风","type":"title"},{"text":"中国民主促进会中央常务委员会第九次扩大会议在7月７日上午举行。","type":"paragraph"},{"text":"会议讨论并通过了关于进行会内整风运动的指示。指示指出会内整风以反右派斗争为主要内容。要求各地组织检查和端正会内各级领导的政治方向和政治立场；揭露和批判右派分子的思想、言论、行动，和一切反对中国共产党、反对社会主义的思想严格划清界限。","type":"paragraph"},{"text":"指示说，整风运动不同于平时一般的理论学习和生活检讨，对右派分子的言行一定要揭露干净，批判干净，不能留情。对有一般糊涂思想或者是思想上受到右派影响的人，主要是通过对右派斗争，使他们明辨是非，划清界限，端正立场。","type":"paragraph"},{"text":"指示指出会内整风的步骤应和中共的整风步骤密切配合，在中共尚未开始整风的地区和机关、学校、企业内暂不进行整风。指示还规定自中央决定开始整风起不再批准新会员，要求各地组织严格执行。","type":"paragraph"},{"text":"会议决定成立中央整风领导小组和中央整风办公室。领导小组的成员是：召集人：马叙伦、王绍鏊、周建人、许广平、车向忱、杨东莼。组员：吴若安、吴贻芳、余之介、陈礼节、陈慧、柯灵、徐伯昕、许崇清、徐楚波、章廷谦、梁纯夫、梁明、冯宾符、张明养、张纪元、雷洁琼、杨石先、赵朴初、葛志成、严景耀。整风办公室的成员是：主任杨东莼，副主任徐伯昕、冯宾符、葛志成、梁明。","type":"paragraph"},{"text":"会议还决定延期举行原定８月中旬召开的四届二中全会，以便集中力量搞好会内整风运动。","type":"paragraph"},{"text":"会议研究了上海曹杨中学民进支部的问题，一致谴责曹杨中学民进支部的反党行为，并责成中央迅速处理这一问题，作出相应的决定通报各地。","type":"paragraph"},{"text":"许广平副主席主持了这次会议。出席这次会议的有在京的中央常务委员、中央委员、候补中央委员及各部门负责人共三十四人。","type":"paragraph"},{"text":" 来源：《人民日报》1957年7月9日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8f4b4539d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
