<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国极右分子脸谱","authors":[],"dates":[{"year":1958,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国极右分子脸谱"},{"type":"paragraph","text":"皮杜尔"},{"type":"paragraph","text":"现年五十九岁的皮杜尔是法国人民共和党极右翼的领袖，是戴高乐的老搭当。他在14日和苏斯戴尔等公开发表声明，叫嚣要成立所谓“救国政府”。他要求戴高乐上台，建立独裁统治，嚎叫说这是法国的“最后的希望”。"},{"type":"paragraph","text":"皮杜尔早年是梵蒂冈的一个门客。第二次世界大战中，他秉承教廷之命钻入法国抵抗运动，以“抗敌”为名，为戴高乐作宣传，从而进一步取得了国内外反动势力的宠爱。"},{"type":"paragraph","text":"法国解放以后，皮杜尔在美国垄断资本和法国反动势力的支持下，一跃而为政界的红人。他两次担任总理、八次担任外交部长。以他为首的人民共和党人把持了法国外交部有十年，他坚持执行追随美国、出卖本国民族利益的政策。法国舆论把皮杜尔称之为“美国的法兰西事务部长”。"},{"type":"paragraph","text":"皮杜尔是一个老牌的殖民主义者。他任总理时，曾坚持在印度支那进行殖民战争。在北非问题上，他也一向主张奉行“强硬”的殖民政策，企图使阿尔及利亚永远成为法国的殖民地。"},{"type":"paragraph","text":"皮杜尔和人民共和党代表着法国的垄断资本——东方汇理银行集团的利益。"},{"type":"paragraph","text":"苏斯戴尔"},{"type":"paragraph","text":"雅克·苏斯戴尔是戴高乐的左右手，他现在是社会共和党（前戴高乐党）的领袖。阿尔及利亚暴乱发生后，他突然在17日飞到阿尔及尔，来指挥暴乱行动。在阿尔及尔的路透社记者报道说，人们指出苏斯戴尔就是制造目前危机的人。"},{"type":"paragraph","text":"苏斯戴尔现年四十六岁，他在1940年逃到伦敦，开始投靠戴高乐，负责戴高乐的全盘特务工作。"},{"type":"paragraph","text":"战后，苏斯戴尔随同戴高乐回到巴黎。1945年到1946年初，他在戴高乐的政府中先后担任情报部长和殖民部长。"},{"type":"paragraph","text":"1947年，戴高乐组成法西斯政党法兰西人民联盟，苏斯戴尔担任总书记。现在的社会共和党就是这个联盟内部发生分裂和在选举中遭到惨败以后，改组而成的。"},{"type":"paragraph","text":"1955年，苏斯戴尔受任为阿尔及利亚总督，他到任后就加紧镇压行动，公开叫嚣要用“一切力量和一切手段来打击”阿尔及利亚人民的民族解放运动。他封闭报馆，设立集中营，并且下令解散阿尔及利亚共产党。但是由于阿尔及利亚人民的坚强斗争，他的殖民政策全盘失败，1956年1月，他被法国政府撤职。"},{"type":"paragraph","text":"（据新华社）（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"131121e162"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
