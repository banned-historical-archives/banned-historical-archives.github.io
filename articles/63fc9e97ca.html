ear":1956,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席任命一批国家工作人员"},{"type":"paragraph","text":"新华社12日讯　中华人民共和国主席毛泽东十二日根据全国人民代表大会常务委员会第四十次会议通过的决定，任命薄一波为中华人民共和国国家经济委员会主任，黄敬为中华人民共和国国家技术委员会主任，王鹤寿为中华人民共和国国家建设委员会主任，王鹤寿为中华人民共和国冶金工业部部长，彭涛为中华人民共和国化学工业部部长，赖际发为中华人民共和国建筑材料工业部部长，张霖之为中华人民共和国电机制造工业部部长，万里为中华人民共和国城市建设部部长，沙千里为中华人民共和国轻工业部部长，李烛尘为中华人民共和国食品工业部部长，许德珩为中华人民共和国水产部部长，王震为中华人民共和国农垦部部长，罗隆基为中华人民共和国森林工业部部长。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63fc9e97ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
