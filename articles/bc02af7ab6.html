:[{"year":1974,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝极右派集中营部分群众奋起斗争返回家园"},{"type":"paragraph","text":"新华社一九七四年三月一日讯　据巴特寮通讯社报道，被美国—老挝极右反动集团强行劫入集中营的琅勃拉邦省川银县和乌多姆塞省芒赛县的许多群众，最近奋起斗争，返回了解放区的家园。"},{"type":"paragraph","text":"仅从去年十二月一日到今年一月十七日，就有六十三户包括三百一十二人挣脱集中营，陆续返回琅勃拉邦省和乌多姆塞省的故乡谋生。他们受到了解放区老挝爱国战线组织、当地人民政权和人民群众的热情欢迎和关怀。"},{"type":"paragraph","text":"另据巴特寮电台广播，老挝右派军队许多官兵由于不满极右反动集团破坏和平与民族和睦的政策，接连脱离右派军队向老挝各爱国力量投诚。据统计，自去年二月万象协定的签订到目前为止，已有四百三十八名右派军队官兵向各爱国力量投诚。这些官兵投诚后受到了解放区军民的热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc02af7ab6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
