京政法学院","姚明","张景明","张西冰","钱端升","黄盛业"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——法制问题","type":"title"},{"text":"北京政法学院张西冰姚明黄盛业钱端升张景明","type":"authors"},{"text":"“今天以前，我国只有原则性法律，下边执行中有很大偏差，是不是真正的法制，国家还要研究。”（北京政法学院  张西冰）","type":"paragraph"},{"text":"“国民党的民法是所有资本主义民法中最进步的，集中了资本主义，所以许多外国学生都研究它。”（北京政法学院  姚明）","type":"paragraph"},{"text":"“现在的问题不在于生活苦，而在于太悬殊。有差异就有矛盾，国家现在不是有犯罪吗？根源就在于生活太悬殊。不消灭悬殊，也不能消灭犯罪。”（北京政法学院  黄盛业）","type":"paragraph"},{"text":"1．教育工会在学校中如何接受党委的领导，目前没有明确规定。","type":"paragraph"},{"text":"2．工会可以“过问”党委的发展工作，我校有一会员，自从来政法学院以来一直要求入党，但未得到解决，这时工会组织应起公断作用，客观公平地向党委提出意见。","type":"paragraph"},{"text":"3．工会领导机构以民主集中制选举办法产生是不民主的。党委不应提出初步候选人名单……我校工会这些领导机构的产生是免强的……过去名单是校党委指定的。(北京政法学院院长钱端升)","type":"paragraph"},{"text":"“国民党的六法全书还有可取之处。”“资产阶级的意志也可继承。”（北京政法学院　张景明）","type":"paragraph"},{"text":"组织的批评是“压”力“惩办”和“报复”他说：“精神上的折磨比肉体折磨还厉害。”他还认为：“组织纪律会束缚人们的个性限制人们的自由。”（北京政法学院  陈守铭的材料）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0502d22e49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
