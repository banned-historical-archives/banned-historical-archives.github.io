script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沪江附中同学交出黄色小说决心清除资产阶级思想","authors":["张重耀"],"dates":[{"year":1952,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我们沪江附中初中部同学，在三反、五反运动的教育之下，认识到资产阶级思想的危害性。资产阶级曾用黄色小说来毒害我们的思想，这就是资产阶级向我们青年学生猖狂进攻的一个具体表现。现在我们同学都已看清楚了这一点，纷纷把黄色小说交给学校，保证以后不再看这些有毒素的书籍。由学校把这些黄色小说卖给造纸厂作为造纸原料，然后再买有益的书籍，来提高我们的思想和认识。这一实际的行动，就说明我们同学已决心清除资产阶级的思想了。"},{"type":"paragraph","text":"沪江大学附中学生　张重耀"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b47d311302"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
