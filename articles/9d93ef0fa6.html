tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国毛泽东军事思想与现代国防理论研讨会结束","authors":["唐庆贵"],"parts":[{"type":"paragraph","text":"这次研讨会是经军委、总部同意召开的，其主旨是总结交流学习研究毛泽东军事思想成果；深入探讨毛泽东军事思想在现代国防建设中的历史地位和重大指导作用；探讨邓小平新时期国防建设理论对毛泽东国防思想作出的巨大历史性发展及其指导意义；探讨高技术条件下国家防卫的特点和规律以及现代国防发展战略问题；探讨有中国特色并反映时代特征的现代国防建设的道路问题，并重点研究了如何运用毛泽东军事思想和邓小平新时期军队建设思想指导我国现代国防建设和改革，深入贯彻军委新时期军事战略方针的问题。"},{"type":"paragraph","text":"来自国防大学、军事科学院、中央党校、中国社会科学院、全军各大军区、军兵种、武警部队及全国理论界的领导和专家学者近百人出席了研讨会。会议共收到论文154篇，并从中评选出优秀论文76篇。这次研讨会将推动全国特别是全军对毛泽东军事思想和邓小平新时期军队建设思想的深入研究，对我国国防建设和军队建设产生积极的影响。"},{"type":"paragraph","text":"全国人大常委会委员、原国防大学副校长黄玉章主持了这次会议。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d93ef0fa6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
