rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"董必武；朱德；周恩来等我国党政领导同志亲切会见黎笋；范文同同志率领的党政代表团宾主双方进行了亲切友好的谈话","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年六月四日讯 中国党政领导同志今天晚上在充满兄弟情谊的气氛中，会见了越南劳动党和越南民主共和国政府代表团。"},{"type":"paragraph","text":"参加会见的越南同志是：黎笋、范文同、黎清毅、李班、吴船、黄文进、陈参和代表团其他成员。"},{"type":"paragraph","text":"我国党政领导同志董必武、朱德、周恩来、叶剑英、张春桥、姚文元、李先念、纪登奎、李德生、汪东兴、王洪文、华国锋、吴德、邓小平、徐向前、郭沫若参加了会见。"},{"type":"paragraph","text":"宾主双方进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时在座的还有："},{"type":"paragraph","text":"正在北京的越南民主共和国卫生部代部长武文谨，越南南方共和驻中国大使阮文广；"},{"type":"paragraph","text":"我国有关部门负责同志耿飚、姬鹏飞、方毅、李强、张才千、肖劲光、韩念龙和中国驻越南民主共和国大使王幼平。"},{"type":"paragraph","text":"中国党政领导同志亲切会见越南党政代表团。图为会见时合影。 新华社记者摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5510365652"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
