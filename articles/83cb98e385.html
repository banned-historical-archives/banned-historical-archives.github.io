tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理访问泰、马、新三国","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理应泰国总理江萨·差玛南的邀请十一月五日抵达曼谷，对泰国进行正式友好访问。在机场上，邓小平副总理和江萨总理在检阅台上检阅三军仪仗队。"},{"type":"paragraph","text":"十一月五日，邓小平副总理抵达曼谷，受到泰国人民的热烈欢迎。"},{"type":"paragraph","text":"十一月九日，邓小平副总理在曼谷参观泰国大王宫。"},{"type":"paragraph","text":"十一月九日，邓小平副总理圆满结束对泰国的正式友好访问，曼谷女青年在机场撒花瓣，热烈欢送中国客人。"},{"type":"paragraph","text":"邓小平副总理应马来西亚政府的邀请，十一月九日乘专机抵达吉隆坡，对马来西亚进行正式友好访问。在机场上受到马来西亚总理侯赛因的热烈欢迎。"},{"type":"paragraph","text":"十一月十一日，邓小平副总理参观马来西亚国家清真寺。"},{"type":"paragraph","text":"十一月十一日，邓小平副总理参观马来西亚橡胶研究所实验站时割胶。"},{"type":"paragraph","text":"邓小平副总理应李光耀总理的邀请，十一月十二日抵达新加坡，对新加坡共和国进行友好访问，李光耀总理到机场欢迎中国客人。"},{"type":"paragraph","text":"十一月十三日，邓小平副总理在新加坡住房和发展局二十二层办公大厦的顶层，观看周围新建的公共住房。（本版照片为新华社记者胥志成、张桂玉摄）（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83cb98e385"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
