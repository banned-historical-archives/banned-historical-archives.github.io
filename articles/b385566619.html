art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做活学活用毛泽东思想的带头人","authors":["共产党员？副班长","张文刊"],"parts":[{"type":"paragraph","text":"新党章对我们党员提出的要求，第一条就是“活学活用马克思主义、列宁主义、毛泽东思想”。一个共产党员要成为无产阶级的先锋战士，首先必须活学活用毛主席关于无产阶级专政下继续革命的伟大理论，要带头落实毛主席的最新指示。"},{"type":"paragraph","text":"毛主席的最新指示，是毛主席高瞻远瞩地分析了每一时期阶级斗争的新形势和革命事业的新发展，所作出的伟大战略部署，是指引我们胜利前进的灯塔。只有紧跟毛主席的最新指示，才能跟上阶级斗争的新形势；只有不折不扣地落实毛主席的最新指示，才能从根本上巩固无产阶级专政。"},{"type":"paragraph","text":"“全世界人民团结起来，反对任何帝国主义，社会帝国主义发动的侵略战争，特别要反对以原子弹为武器的侵略战争！如果这种战争发生，全世界人民就应以革命战争消灭侵略战争，从现在起就要有所准备！”毛主席这一伟大号召发表后，我立即和全班同志一起反复学习，认真领会这一伟大号召对巩固我国无产阶级专政、指导世界革命的伟大意义，并且决心以实际行动来落实毛主席的伟大号召。在架设舟桥码头的训练中，我的肺病突然发作，有点支持不住。但一想到毛主席号召我们从现在起就要有所准备，于是我坚持带领新同志一起训练，直到他们能比较熟练地掌握了技术。训练告一段落后，我又和大家一起，针对训练中的活思想，反复学习最新指示，召开讲用会，总结经验，进一步推动最新指示的落实。"},{"type":"paragraph","text":"我在实践中深深地体会到，千带头，万带头，最重要的是带头活学活用毛泽东思想，带头搞好思想革命化。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b385566619"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
