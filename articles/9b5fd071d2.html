art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掀起活学活用毛主席著作新高潮培养千万个刘英俊式的英雄人物","authors":[],"parts":[{"type":"paragraph","text":"新华社十七日讯 中共中央工业交通政治部、中共中央农林政治部、中共中央财贸政治部、中共中央基本建设政治部、中共国家体委政治部最近分别发出通知，号召各个战线上的职工、农村人民公社社员以及体育战线上的人员认真学习刘英俊同志的光辉事迹，把活学活用毛主席著作的群众运动推向新的高潮，把无产阶级文化大革命进行到底，促进思想革命化，做到革命、生产建设双胜利。"},{"type":"paragraph","text":"各单位在通知中都特别强调指出：学习刘英俊同志的模范事迹，要同当前正在轰轰烈烈展开的无产阶级文化大革命结合起来，进一步掀起活学活用毛主席著作的新高潮。要象刘英俊同志那样，把毛主席的书当作最高指示，努力地学习最高指示，忠实地执行最高指示，热情地宣传最高指示，勇敢地捍卫最高指示，做毛主席的好战士好学生。"},{"type":"paragraph","text":"中共中央工交政治部的通知指出，刘英俊同志是全国广大职工学习的好榜样。学习刘英俊同志，就是要象他那样，无限热爱毛泽东思想，无限信仰毛泽东思想，把学习毛主席著作当做毕生的战斗任务；就是要象他那样忠实地贯彻执行毛主席的指示，毛主席怎么说，我们就怎么做；就是要象他那样，热情地宣传毛泽东思想，让毛泽东思想为广大群众所掌握；就要象他那样勇敢地捍卫毛泽东思想，积极参加意识形态领域里的阶级斗争，向一切反党反社会主义反毛泽东思想的罪恶言行进行坚决斗争，做文化革命的闯将，做捍卫毛泽东思想的战斗员。就是要象他那样永远忠于党，忠于人民，忠于毛主席，忠于毛泽东思想。通知号召工业交通战线全体干部和广大职工，认真学习刘英俊同志的模范事迹，掀起活学活用毛主席著作的新高潮，促进思想革命化，促进生产建设的发展。"},{"type":"paragraph","text":"中共中央农林政治部的通知号召各级农林政治机关，在各级党委领导下，认真组织社员、职工向刘英俊同志学习，并把学习刘英俊同志的活动，和当前国内外阶级斗争形势、无产阶级文化大革命和农村社会主义教育运动、生产斗争以及宣扬本地区、本单位的好人好事紧密地结合起来。通过学习刘英俊同志的模范事迹，在农业战线上培养出更多的刘英俊式的活学活用毛主席著作、永远忠于毛泽东思想的先进人物，进一步在广大社员、职工中掀起活学活用毛主席著作的新高潮。"},{"type":"paragraph","text":"中共中央财贸政治部的通知中要求各级财贸政治机关，在各级党委的统一领导下，宣传和学习刘英俊同志的活动同当前的无产阶级文化大革命运动和城乡社会主义教育运动结合起来，同突出政治，活学活用毛主席著作，实现财贸职工思想革命化结合起来，同进一步做好财贸工作，建设人民的财贸结合起来。通知号召全体财贸职工，一定要念念不忘阶级斗争，念念不忘无产阶级专政，念念不忘突出政治，念念不忘高举毛泽东思想伟大红旗。为在财贸部门培养出成千上万个刘英俊式的英雄模范人物而奋斗。"},{"type":"paragraph","text":"中共中央基本建设政治部通知中要求基本建设战线各级领导和政治机关，要通过各种形式，大力组织好学习刘英俊同志的活动。通过这一学习活动，把广大职工活学活用毛主席著作的群众运动推向一个新的高潮，进一步促进全体职工的思想革命化，有力地推动广大职工积极参加当前的无产阶级文化大革命，多快好省地完成建设任务，为建设一支非常无产阶级化、非常革命化的基本建设队伍而奋斗。"},{"type":"paragraph","text":"中共国家体委政治部今天也发出通知，号召体育战线上的同志认真地学习刘英俊同志，心怀祖国，放眼世界，做彻底的无产阶级革命派。通知阐述怎样向刘英俊同志学习以后说：中国人民解放军是把毛泽东思想伟大红旗举得最高的队伍，是一支非常无产阶级化、非常革命化、非常战斗化的队伍，是活学活用毛泽东思想的典范。我们必须继续大学解放军，突出政治，坚持四个第一，大兴三八作风，按照军委和林彪同志指示的突出政治的五项原则建设体育队伍，使我们的队伍永远忠于党、忠于人民、忠于毛主席、忠于毛泽东思想。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b5fd071d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
