tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"发迹地——王洪文自嘲（政治讽刺诗）","authors":["凝燕"],"parts":[{"type":"paragraph","text":"“伟人”登了基，"},{"type":"paragraph","text":"要重视自己的发迹地。"},{"type":"paragraph","text":"快！小兄弟，"},{"type":"paragraph","text":"去擦一擦我当年用的破桌椅；"},{"type":"paragraph","text":"修一修门窗地板最好再涂点漆。"},{"type":"paragraph","text":"另外，不要忘写一部我当年的《大事记》。"},{"type":"paragraph","text":"张江姚都怕说过去。"},{"type":"paragraph","text":"可我不一样，"},{"type":"paragraph","text":"一提过去就神气！"},{"type":"paragraph","text":"喏！"},{"type":"paragraph","text":"我身上曾打下几个“红色”印记。"},{"type":"paragraph","text":"施阴谋，搞诡计，"},{"type":"paragraph","text":"顾什么马列主义。"},{"type":"paragraph","text":"挥霍人民血汗，"},{"type":"paragraph","text":"情愿当新生的资产阶级分子。"},{"type":"paragraph","text":"发迹，登基，"},{"type":"paragraph","text":"发迹，登基，……"},{"type":"paragraph","text":"哎呀呀！美梦正酣，"},{"type":"paragraph","text":"轰！一声霹雳。"},{"type":"paragraph","text":"三魂出了窍；"},{"type":"paragraph","text":"六魄落了地，"},{"type":"paragraph","text":"哎呀，上哪里找我的发迹地……"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d299999409"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
