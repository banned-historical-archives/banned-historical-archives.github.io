art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掌握理论武器 彻底否定“文革”","authors":["杨玉辰"],"parts":[{"type":"paragraph","text":"本报讯 石家庄高级陆军学校学员入学第一课，就进行彻底否定“文化大革命”教育。9月上旬他们从本校的特点和学员的实际出发，引导大家着重掌握理论武器，划清是非界限，收到了较好的效果。"},{"type":"paragraph","text":"学员入学后，学校派出工作组分赴各学员队进行思想调查，发现有相当一部分学员虽然在原则上同意否定“文化大革命”，但说不出多少道理，在一些具体问题上仍然存有各种模糊认识。领导上经过研究认为，这些模糊认识的根源在于理论根底浅，不能用马克思主义基本原理剖析“文化大革命”的实质，划清是非界限。学校开了动员大会，强调要搞好否定“文化大革命”教育，清除“左”的思想影响，必须认真学好指定的文章和文件，学好马克思主义经典著作，掌握彻底否定“文化大革命”的锐利武器。各学员队除了集中时间学习有关文件、文章外，还请党史教研室的同志做了理论辅导。学员们在总结收获时一致反映，这入学的第一课为今后的学习开了个好头。（杨玉辰）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eebaa2c592"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
