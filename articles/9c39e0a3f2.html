ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"和苏班德里约的谈话","alias":"","parts":[{"type":"paragraph","text":"和苏班德里约的谈话"},{"type":"paragraph","text":"（1965年1月27日）"},{"type":"paragraph","text":"好的拿来，坏的丢掉。无论是本国的或外国的都一样，只能批判地接受，不能教条主义，照搬。这样才有希望。"},{"type":"paragraph","text":"军事学校办得一塌糊涂，正在整理。过去没有军事学校，可好了。打了几十年仗，就是没有军事学校。我们的军队百分之九十以上是不识字和小学程度的。国民党尽办军事学校，什么陆军大学毕业，就是我们这些不识学的兵打倒了它。我们各军区的司令过去都是老粗嘛。"},{"type":"paragraph","text":"进军事学校的时间太长了。蒋介石办的黄埔军校，五个月入伍训练，四个月学校毕业。蒋介石的军队主要就是这些人还比较能打，陆军大学毕业的实在不能打。"},{"type":"paragraph","text":"我们有陆军大学吗？（口口口：有高等军事学校。）那就危险了。"},{"type":"paragraph","text":"（口口口：现在要缩短时间了。现在我们大体上就是实现抗大的方针，四至六个月毕业。工程技术学校，要学技术，可能时间长些。）"},{"type":"paragraph","text":"书可以读一点，但是读多了害人，的确害人。是革命斗争培养干部。[1]苏班德里约（1914-2004），当时任印度尼西亚共和国外交部部长。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":1,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":468,"page_end":468},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c39e0a3f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
