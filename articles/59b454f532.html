al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"对随行部队的讲话","alias":"","parts":[{"type":"paragraph","text":"对随行部队的讲话！]"},{"type":"paragraph","text":"（1935年11月5日）"},{"type":"paragraph","text":"从江西瑞金算起，我们走了一年多时间。我们每人开动两只脚，走了二万五千里。这是从来未有过的长征。我们红军的人数比以前是少了一些，但是留下来的是革命的精华，都是经过严峻锻炼与考验的。留下来的同志不仅要以一当十，而且要以一当百、当千。今后，我们要和陕北红军、陕北人民团结一一致，要做团结的模范，共同完成中国革命的伟大使命，开创中国革命新局面。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":11,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":40,"page_end":40},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59b454f532"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
