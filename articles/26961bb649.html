script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度尼西亚共产党中央祝贺越南国庆  谴责修正主义者配合美帝搞和谈阴谋  现代修正主义者把一切革命原则抛得干干净净，他们要求越南民主共和国无条件地来到会议桌旁，而让美国军队继续留在越南的国土上","authors":[],"dates":[{"year":1965,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度尼西亚共产党中央祝贺越南国庆"},{"type":"paragraph","text":"谴责修正主义者配合美帝搞和谈阴谋"},{"type":"paragraph","text":"现代修正主义者把一切革命原则抛得干干净净，他们要求越南民主共和国无条件地来到会议桌旁，而让美国军队继续留在越南的国土上"},{"type":"paragraph","text":"新华社雅加达三日电　印度尼西亚共产党中央委员会高度赞扬越南人民把反对美国侵略的战争进行到底的英雄气概，并且谴责美帝国主义勾结修正主义，企图通过所谓“和平谈判”，使它自己免于遭到彻底失败。"},{"type":"paragraph","text":"印度尼西亚共产党中央委员会在祝贺越南民主共和国成立二十周年的贺词中表示了这种立场。印度尼西亚《人民日报》今天刊载了这个贺词。"},{"type":"paragraph","text":"贺词说：美帝国主义在越南连续遭到失败之后变得越来越猖狂了。但是英勇的越南军民万众一心，坚决要战斗到获得最后胜利。贺词说，美国侵略者一面进行暴力战争，一面搞和平骗局，这种反动的两面政策丝毫没有使越南人民感到混乱，也决不能使他们低头。美帝国主义的轰炸和威胁不能消灭越南军民的战斗精神。相反，那些美国轰炸机正在免费地充当越南战士的很容易打中的靶子。"},{"type":"paragraph","text":"贺词还说，由于这一切企图和威胁都失败了，美帝国主义竟然进行卑鄙的细菌战和化学战，从而进一步违反人道主义原则和国际法。尽管这样，美帝国主义没有能够，也永远不能消灭越南人民的战斗精神。"},{"type":"paragraph","text":"贺词指出，在美国侵略越南的战争面前，人们可以看到现代修正主义者配合帝国主义搞“和谈”阴谋的丑恶面目。它指出，现代修正主义者把一切革命原则抛弃得干干净净，他们要求越南民主共和国无条件地来到会议桌旁，而让美国军队继续留在越南的国土上。"},{"type":"paragraph","text":"贺词在抨击了铁托和夏斯特里签署的联合声明后指出，人们能够指望于现代修正主义者的只有背叛和伪善。贺词还说，没有什么态度比联合声明里的态度更加野蛮、无理和背信弃义的了。"},{"type":"paragraph","text":"贺词强调指出，解决这个问题的唯一途径是实现越南民主共和国的四项主张和越南南方民族解放阵线的五点声明。"},{"type":"paragraph","text":"贺词最后说：“印度尼西亚人民和其他爱好和平与独立的人民深信，越南人民定将赢得最后胜利，世界恶魔美帝国主义定将滚出越南的国土，这象太阳从东边出来那样肯定，是任何力量都阻挡不了的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26961bb649"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
