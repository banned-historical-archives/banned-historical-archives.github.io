" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-205","name":"中央组织部、劳动人事部关于犯‘三种人’错误和严重错误的人如何参加工资改革的通知","author":"中共中央组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央组织部、劳动人事部关于犯‘三种人’错误和严重错误的人如何参加工资改革的通知","dates":[{"year":1985,"month":10,"day":16}],"is_range_date":false,"authors":["中共中央组织部","劳动人事部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 317-318","tags":[{"name":"调整","type":"主题/事件"},{"name":"工资","type":"主题/事件"},{"name":"三种人","type":"主题/事件"},{"name":"严重错误","type":"主题/事件"}],"parts":[{"type":"title","text":"中央组织部、劳动人事部关于犯“三种人”错误和严重错误的人如何参加工资改革的通知"},{"type":"subtitle","text":"劳人薪〔1985〕48号[1]"},{"type":"paragraph","text":"关于犯“三种人”错误或罪行以及在“文革”中犯严重错误的人如何进行工资改革的问题，经研究，现通知如下："},{"type":"paragraph","text":"一、对结论为犯“三种人”错误或罪行以及“文革”中犯严重错误的人，只要他们现实表现好，不再进行派性的串联活动或其他的反党活动，可按照劳人薪〔1985〕19号文件的有关规定套改新工资标准，其中现行标准工资额加10元后为122元（六类地区）以下的，符合高套条件的人员：可以"},{"type":"paragraph","text":"在就近套级后再高套一级。"},{"type":"paragraph","text":"对于结论后受处分的上述人员，凡受降职或撤职处分的，应按其降职或撤职处分后的级别工资就近靠入新工资标准，但靠级后工资低于现任职务工资最低档的，可以进入本职务工资最低档。受其他处分的人员，均按省、自治区、直辖市的规定办理。"},{"type":"paragraph","text":"二、对正在受核查的对象，暂按本人现任职务和现行标准工资额及劳人薪〔1985〕19号文件的有关规定套改新工资标准，待问题查清后，再根据结论及处分和本人现实表现。按第一条规定办理。"},{"type":"paragraph","text":"一九八五年十月十六日"},{"type":"paragraph","text":"[1] Note: This document is also available in 中央组织部干审局, 干审工作政策文件选编 (下), pp. 1402-1403."}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"860aac6d4e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
