script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"党和国家领导人以及首都各界前往柯庆施同志灵堂默哀悼念柯庆施同志遗像两侧放着中共中央、全国人大常委会、国务院，和毛泽东、刘少奇等党和国家领导人献的花圈　周恩来、邓小平、彭真、李光念等同志到灵堂吊唁","authors":[],"dates":[{"year":1965,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京12日电　党和国家领导人以及首都各界五万多人，这两天陆续前往劳动人民文化宫，吊唁柯庆施同志。"},{"type":"paragraph","text":"灵堂内悬挂柯庆施同志的遗像。骨灰盒四周布满了青松和鲜花。灵堂中央的黑底横幅上写着:“中国人民的伟大战士柯庆施同志永垂不朽”。"},{"type":"paragraph","text":"柯庆施同志遗像两侧，放着中国共产党中央委员会、全国人民代表大会常务委员会、国务院，和毛泽东、刘少奇、周恩来、朱德、陈云、林彪、邓小平、宋庆龄、董必武等党和国家领导人献的花圈。"},{"type":"paragraph","text":"党和国家领导人以及其他方面的负责人周恩来、邓小平、彭真、李先念、陆定一、陈伯达、康生、李雪峰、罗瑞卿、郭沫若、陈叔通、杨明轩、林枫、叶剑英、谢富治、徐冰、李四光、杨秀峰、张鼎丞等，分别前往劳动人民文化宫，在柯庆施同志遗像前默哀悼念，并向柯庆施同志的家属表示慰问。"},{"type":"paragraph","text":"从十一日下午二时开始，首都工人、农民、学生、人民解放军官兵、机关干部、街道居民和少先队员，佩戴着黑纱、素花，在哀乐声中，络绎不绝地前往灵堂，悼念把毕生精力贡献给中国人民的解放事业和伟大的共产主义事业的柯庆施同志。"},{"type":"paragraph","text":"前往吊唁的，还有中共中央委员和候补委员，中共中央和国务院各部门的负责人，中国人民解放军的将军，各民主党派、各人民团体的负责人，中共中央华东局、中共中央华北局、中共中央西南局、北京市、华东各省和上海市的负责人，以及上海市各界代表。"},{"type":"paragraph","text":"各国驻中国的使节和外交官员，以及在北京的一些外国友人，也到劳动人民文化宫吊唁，并献了花圈。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ab6b7cfc8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
