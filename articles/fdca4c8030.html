script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我驻朝临时代办设宴庆祝中朝友好条约两周年热情赞颂中朝伟大团结和友谊刘祥纶临时代办强调坚决反对认敌为友替肯尼迪涂脂抹粉的可耻行径　郑准泽副首相说朝中两国人民在反帝反修正主义斗争中永远一道前进","authors":[],"dates":[{"year":1963,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤12日电】　中国驻朝鲜大使馆临时代办刘祥纶今晚举行宴会，庆祝中朝友好合作互助条约签订两周年。"},{"type":"paragraph","text":"朝鲜党政领导人朴金喆、李孝淳、洪命熹、河仰天、郑准泽出席了宴会。"},{"type":"paragraph","text":"刘祥纶临时代办和朝鲜内阁副首相郑准泽先后在宴会上致词，高度评价中朝友好合作互助条约的伟大意义，热情赞颂中朝两国人民的伟大团结和友谊。"},{"type":"paragraph","text":"刘祥纶说，“中朝友好合作互助条约把我们两国结成了牢不可破的同盟，显示了中朝两国人民保卫和平、反对美帝国主义的坚定意志和伟大力量。我们两国间的友谊一天比一天加深，我们的团结一天比一天巩固。”"},{"type":"paragraph","text":"他说，“为了共产主义的伟大事业，我们将进一步加强团结，高举马克思列宁主义的革命旗帜，坚决反对那种认敌为友、为帝国主义头子肯尼迪涂脂抹粉的可耻行径，坚决捍卫马克思列宁主义的纯洁性，维护莫斯科宣言和声明的革命原则，把反对现代修正主义的斗争进行到底。我们满怀着信心，深信暂时笼罩在天空的修正主义乌云必将被驱散，马克思列宁主义的光芒必将普照大地”。"},{"type":"paragraph","text":"郑准泽副首相说，朝中友好合作互助条约“使在同敌人直接相对峙的情况下建设社会主义的朝鲜人民更加坚定了对胜利的信心，给进行反对帝国主义斗争的整个东方人民以巨大的鼓舞力量”。"},{"type":"paragraph","text":"他说，“中国共产党把马克思列宁主义普遍真理创造性地运用到中国的具体实践，一向引导中国人民走向新的胜利。今天，中华人民共和国作为东方人民解放斗争的坚强堡垒俨然屹立在亚洲的中心。”"},{"type":"paragraph","text":"郑准泽谴责了美帝国主义在南朝鲜、台湾、南越、老挝和世界其他地方进行的侵略和战争挑衅行为，并且揭露了帝国主义和修正主义者为破坏社会主义阵营的团结一致而进行的恶毒活动。他说，“朝中两党和两国人民，过去和现在始终不渝地象保护自己眼珠一样捍卫马克思列宁主义的纯洁性，坚强地站在无产阶级国际主义原则的基础上，为加强社会主义阵营和国际共产主义运动的团结一致而竭尽一切努力。”他说，“朝鲜人民为有忠于革命原则的中国人民这样伟大的人民作为自己最亲密的战友而感到无限幸福。朝鲜人民今后在反对帝国主义和修正主义、争取共同事业——社会主义和共产主义完全胜利的斗争中永远同中国人民一道前进。”"},{"type":"paragraph","text":"宴会充满极其亲密和友好的气氛。宾主频频举杯，祝中朝两国人民之间以鲜血凝成的战斗友谊进一步加强，祝朝鲜人民敬爱的领袖、中国人民亲密的朋友金日成同志健康，祝中国人民敬爱的领袖、朝鲜人民亲密的朋友毛泽东同志健康。"},{"type":"paragraph","text":"宴会后，放映了中国彩色故事片《槐树庄》。"},{"type":"paragraph","text":"出席今晚的宴会的还有:朝鲜最高人民会议常任委员会副委员长白南云，最高人民会议议长崔元泽，外务相朴成哲，朝中友好协会中央委员会副委员长、高等教育相金宗恒，对外文化联络委员会委员长徐哲，朝鲜人民军总参谋长崔光大将，贸易省副相柳成义，朝鲜军事停战委员会朝中方面首席委员张正桓少将，以及各政党社会团体负责人和科学、文化、新闻、出版机关的负责人等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdca4c8030"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
