script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东主席会见吴奈温总统等缅甸贵宾","authors":[],"dates":[{"year":1975,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见吴奈温总统等缅甸贵宾"},{"type":"paragraph","text":"毛主席对吴奈温总统前来我国进行正式友好访问，表示热烈欢迎，并同吴奈温总统、"},{"type":"paragraph","text":"貌貌博士和吴吞林进行了亲切友好的谈话。邓小平、张春桥副总理等会见时在座新华社一九七五年十一月十三日讯　毛泽东主席今天下午会见了缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温及其随行人员。参加会见的吴奈温总统的随行人员有：国务委员会委员貌貌博士，国务委员会委员、缅甸社会主义纲领党书记（1）吴吞林，外交部长吴拉蓬，国防部副部长觉廷准将，缅甸驻中国大使德钦千吞，总统办公厅主任吴塔吞。会见时，毛泽东主席对吴奈温总统前来我国进行正式友好访问，表示热烈欢迎。毛主席同全体缅甸贵宾一一握手后，同吴奈温总统、貌貌博士和吴吞林进行了亲切友好的谈话。会见时在座的有邓小平、张春桥副总理，王海容副外长，唐闻生、程瑞声副司长。（附图片）"},{"type":"paragraph","text":"毛泽东主席同吴奈温总统握手。"},{"type":"paragraph","text":"新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c76356acf4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
