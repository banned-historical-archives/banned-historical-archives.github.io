art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"歌颂伟大领袖毛主席的立体彩色印刷画片试制成功","authors":[],"parts":[{"type":"paragraph","text":"据新华社十九日讯 在无产阶级文化大革命取得节节胜利的凯歌声中，《毛主席是世界人民心中的红太阳》、《祝毛主席万寿无疆》、《毛主席万岁》等立体彩色印刷画片，由北京商标装潢印刷一厂试制成功。现在，这个厂的无产阶级革命派和革命职工正在利用这种新技术，成批印制宣传毛泽东思想的画片。"},{"type":"paragraph","text":"“七·一”党的生日那天，这个厂的无产阶级革命派的代表带着全厂革命职工对伟大领袖毛主席无限热爱的心情，来到中共中央和国务院接待站报喜，并且把他们试制成功的《毛主席是世界人民心中的红太阳》、《祝毛主席万寿无疆》、《毛泽东思想宣传队》的立体彩色画片，敬献给我们心中最红最红的红太阳毛主席和他的亲密战友林彪副主席以及中央其他领导同志。"},{"type":"paragraph","text":"北京商标装潢印刷一厂革命职工试制成功的立体彩色印刷画片，是一门技术要求较高的新技术。目前，只有少数国家能够制造。北京商标装潢印刷一厂试制成功的立体彩色印刷画片，打破了资本主义国家的技术垄断，大长了无产阶级的志气，大灭了帝国主义、修正主义的威风。"},{"type":"paragraph","text":"这个厂是在一九六五年开始试验这种新技术的。当时，厂内一小撮走资本主义道路的当权派依靠少数技术“权威”，关在试验室里偷偷进行试验，结果搞了一年多，一事无成。厂里的无产阶级革命派夺取了工厂的领导大权后，他们马上改变这种冷冷清清的局面，依靠群众，发动广大革命职工通过活学活用毛主席著作，终于在没有任何技术资料和设备的条件下，经过上千次的试验，攻克了各种技术难关，取得了成功。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"501261f4c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
