<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji5","name":"毛泽东全集第5卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"题城岗乡苏维埃政府党支部联","alias":"","parts":[{"type":"paragraph","text":"题城岗乡苏维埃政府党支部联"},{"type":"paragraph","text":"（1931年7月）主义遵马列；"},{"type":"paragraph","text":"政权归工农。"},{"type":"paragraph","text":"[1]1931年7月的一天，毛泽东率领红军来到江西省兴国县城岗乡。第二天，由乡苏维埃政府党支部书记老胡作向导，观察地形，准备在这一带打好第三次反“围剿”的第二仗。中午登上城岗乡制高点白华山。观察好地形，老胡引着毛泽东来到山顶的书院里。毛泽东用过饭，私塾老师邀请毛泽渔家傲·反第二次大“围剿”[]"},{"type":"paragraph","text":"(1931年夏）白云山口头云欲立，白云山下呼声急，枯木朽株齐努力。[3]枪林逼，"},{"type":"paragraph","text":"飞将军自重霄入。[4]"},{"type":"paragraph","text":"[1]反第二次大“围剿”，红军在这次作战中仍采取诱敌深入，集中优势兵力，各个击破敌人的战术。1931年5月16日先对由富田（在吉安县城东南90里）向东固（在吉安县城东南120里）地区前进之敌一个师和一个旅突然猛攻，经一昼夜激战大部歼灭之。然后向东横扫，一直打到江西、福建两省的边境。5月31日，第二次反“围剿”胜利结束。前后共歼敌3万余人，缴枪两万余支。"},{"type":"paragraph","text":"[2]白云山，在江西省吉安县东南，吉安、泰和、兴国三县交界处，距东固西南17里，是第二次反“围剿”中毛泽东、朱德指挥打第一仗的地方。"},{"type":"paragraph","text":"[3]枯木朽株齐努力，西汉司马相如《谏猎疏》：“枯木朽株尽为害矣。”（见《史记·司马相如列传》）这里反其意而用之，说在红军包围歼灭国民党军队的时候，连枯木朽株也发挥了帮助红军反对敌军的作用。"},{"type":"paragraph","text":"[4]枪林逼，飞将军自重霄入，这是倒装笔法。飞将军，指矫捷勇猛的将军。《史记·李将军列传》：“（李）广居右北平，匈奴闻之，号日‘汉之飞将军’。”这里用来称赞行动隐蔽神速的红军。当时红军隐蔽集结在山上，敌七百里驱十五日，赣水苍茫闽山碧，横扫千军如卷席。有人泣，"},{"type":"paragraph","text":"为营步步嗟何及！[2]"},{"type":"paragraph","text":"[1]七百里驱十五日，赣水苍茫闽山碧，当时红军从赣江流域的富田地区打起，打到同江西省毗邻的福建省建宁地区（闽山，指那一带的武夷山)，东西约700里。战役从5月16日开始至31日结束。"},{"type":"paragraph","text":"[2]有人泣，为营步步嗟何及，蒋介石鉴于第一次“围剿”冒进失败，这次“围剿”改用所谓“稳扎稳打，步步为营”的办法，但仍遭惨败，嗟叹"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":369,"page_end":371},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f45dcecb56"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
