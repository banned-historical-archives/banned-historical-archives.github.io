<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共沈阳市人民委员会机关委员会关于开除王化南党籍的决定","authors":["(王化南)"],"dates":[{"year":1958,"month":5,"day":29}],"is_range_date":false,"parts":[{"text":"中共沈阳市人民委员会机关委员会关于开除王化南党籍的决定","type":"title"},{"text":"(王化南)","type":"authors"},{"text":"王化南在反右斗争中已定为极右派分子，并经支部大会和机关党委讨论决定开除其党籍。","type":"paragraph"},{"text":"附：对极右分子王化南的处理意见","type":"subtitle"},{"text":"王化南，原名王林瑞，男，三十八岁，高中文化，自由职业出身，共产党员，市文化局副局长，兼市文联主任，极右分子。","type":"paragraph"},{"text":"一、 历史上的主要问题：","type":"subtitle"},{"text":"在军队时系正营级，在治病修养时，伪报团级干部。","type":"paragraph"},{"text":"二、主要右派言行：","type":"subtitle"},{"text":"1、借反对教条主义为名，反对党对文艺事业的领导。说：“辽宁地区党的领导对政策领导无力，重视工业轻视文艺……文艺是可有可无的，没有文艺死不了人，出不了乱子”。“领导上不了解上层建筑对基础的积极作用。”“更多的是教条主义领导，不但挫伤了文艺创作的积极性，也毒害了广大文艺爱好者和读者的心灵”。和郭虚共同提出八条反党的文艺纲领。诬蔑党只许说好不许说坏，只许写政治题材，不许写儿女情家务事，欢乐歌颂，不要讽刺，抽象的只许写工农兵，不喜欢写工农兵以外的题材……。诬蔑党对文艺领导是一种行政压力。说：“我们市的工作不好作，是因为省设在市内，工作受到限制”“文艺界不平等，省比市高，大比小高，国营比民营高，老比新高”，演戏派人坐在首长跟前，观看脸色是笑了还是皱眉了这是一种行政压力。","type":"paragraph"},{"text":"2、抗拒省委决定，指使“芒种”变成反党阵地。因纸张缺乏，省委决定停刊“芒种”，王化南对此不满，和右派分子郭虚共同上书省委黄书记，提出：辛辣大胆，干预生活等十六字作招牌，发表攻击党的毒草文章。同右派分子郭虚、吴山等人组织反党小集团，进行反党活动。","type":"paragraph"},{"text":"3、在剧团体制改革的幌子下，取消党对京剧团的领导。","type":"paragraph"},{"text":"4、反对党所领导的正确的文艺批评。他认为青年人在创作上有问题，也应迁就。主张文学艺术上的问题不应同党员政治生活联系起来。","type":"paragraph"},{"text":"5、挑拨党与艺人的关系，说党不重视民间艺人，过去曾说民间艺人是“下流人”而在鸣放时，却装出关心艺人的样子说：民间艺人过着吉普赛人的生活，房子像贫民窟似的，都吃不上饭。”","type":"paragraph"},{"text":"6、反对私营文化企业社会主义改造。认为私营文化企业的社会主义改造是冒进了，公私合营没有优越性。","type":"paragraph"},{"text":"三、平时表现与认罪的程度：","type":"subtitle"},{"text":"1、平时表现","type":"paragraph"},{"text":"王由军队转到地方后，伪造历史功迹，以“保尔”自居，目无领导，因经常不参加组织生活和少交纳党费，被市委通报两次，他对此不满，说：“市委看我王化南威信太高了，想往下压一压”。","type":"paragraph"},{"text":"执行干部政策任人唯亲，重才轻德；并以私人名义介绍坏分子到剧团工作，经常吹虚并让别人写文章以个人名义发表。","type":"paragraph"},{"text":"2、认罪的程度","type":"paragraph"},{"text":"揭发反党事实之初，是对抗的，认为报上发表批判他的文章是“整人”“扣帽子”还狂妄的说：“‘芒种’既然出了错误，那我王化南可以包下来”，之后又推卸责任说：“芒种我未管”。在经过大力揭发与批判承认了自己是右派分子，只抽象的作了检讨，对具体罪恶事实不肯彻底交代。无深刻悔罪表现，对自己成为右派不以为然，经常打朴克下象棋，一九五八年元旦，还请右派分子和有严重错误的人吃饭。并彻夜的狂欢，对人扬言：“不要党票了”。","type":"paragraph"},{"text":"四、处理意见：","type":"subtitle"},{"text":"根据中央关于对右派分子处理原则规定，该人适合第三类情节严重，没有深刻的悔罪表现，本人残废，不能参加劳动，处理意见：撤销原有职务，分配到市图书馆编目录，降六级，由十一级降为十七级。","type":"paragraph"},{"text":" 一九五八年五月二十九日","type":"paragraph"}],"comments":[],"origin":"原载 《关于清除党内右派分子的决定汇编》，中共中央监察委员会办公厅编，一九五九年十二月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"935ab6e245"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
