" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"建阳专区部分区、乡干部怕作统销工作","authors":["刘葵华"],"dates":[{"year":1955,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"建阳专区部分区、乡干部怕作统销工作","type":"title"},{"text":"刘葵华","type":"authors"},{"text":"【福建分社九日讯】福建省建阳专区在整顿统销工作中，部分区、乡干部怕作统销工作。特别是经过邵武县发生农民骚动殴打区、乡干部事件后，有些区、乡干部不敢搞统销工作。有的干部说：再搞统销工作，家中就要挂起烈属牌了。崇安县三区区长说：“现在是工作一天算一天，被群众打死就算了。”乡村干部普遍后悔过去统购时不该太积极，现在受到群众威胁。","type":"paragraph"},{"text":"邵武县发生农民骚动事件后也影响了附近群众。与邵武靠近的光泽县四区百岭等好几个乡的群众传说：邵武县群众没粮吃打区长，我们这里人真怕死，不敢干。随后百岭乡就有三百多人公开斗争了大公无私、统销工作积极的乡公安员。崇安县三区有些群众说：打了工作组，再去劳改，反正是劳动，并且每天还能吃到一斤半米，总比饿肚子强。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年5月19日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0d8f50d00"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
