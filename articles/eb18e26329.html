<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山东三反运动的情况与问题","authors":[],"dates":[{"year":1952,"month":1,"day":16}],"is_range_date":false,"parts":[{"text":"山东三反运动的情况与问题","type":"title"},{"text":"【山东分社十六日讯】山东三反运动在省级机关和济南市已形成群众运动。有的机关已进入处理阶段，有的正在坦白检举，有的刚发动起来，个别动的较差。济南市的工商界已开始坦白检举。农村中地委一级已行动起来，县以下尚未动。据目前发现的问题是：","type":"paragraph"},{"text":"一、急需一个明确的惩治贪污分子的标准和条例。一般的讲分别轻重处理，有些贪污分子不能破除顾虑，影响坦白。有的贪污数目虽不大，但影响极坏，如贪污救济粮、爱国捐献款等。有的贪污数目虽多，但坦白较好。浪费和贪污的界限也不很清楚，需要划分清楚。","type":"paragraph"},{"text":"二、领导人心中无数，开始以为自己机关没有贪污，待发现问题以后，又不摸底。如省府交通厅，开始厅长说他们没有贪污，以后运动展开，贪污分子找厅长坦白、检举才感到有问题。直到贪污分子占到该厅总人数的百分之二十以后，厅长便不敢估计是否彻底，所以这个运动开展的彻底与“无底”都应注意。现在领导上的阻力一般不大，主要是缺乏材料和如何做到心中有数的问题。使之既彻底又有“底”。","type":"paragraph"},{"text":"三、由于某些单位不根据具体情况，简单强调限期发动，指名坦白，而且要求一次彻底，缺乏思想动员，因此发生自杀现象，现在已有四起。","type":"paragraph"},{"text":"四、领导上应当注意依照不同情况发动群众，不然有些不理财政的单位、人员就不易接触思想，群众就不易发动起来。山东新华书店由反官僚主义进而反贪污，结果还好。其他有些部门只在检查贪污一个信封，两张邮票，零零星星劲头不大。有的单位只集中几个贪污分子身上，大部分人未接触到自己的问题。如何肃清资产阶级的思想影响，一般都注意不够。","type":"paragraph"},{"text":"五、群众思想动态：机关干部大部都很积极，也有少数人对运动冷淡，甚至误解，如有一个一九四六年参加工作的干部，平时不关心政治，这次对三反的看法是：“毛老先生(毛主席)想个办法，就够人受的。”济南市工商界在省法庭判决一部分贪污分子以后，情绪很曏。他们普遍存在的问题是行贿，很多人顾虑今后不行贿是否会影响营业。","type":"paragraph"}],"comments":[],"origin":"1952年1月19日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb18e26329"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
