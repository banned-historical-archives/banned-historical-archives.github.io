s":[{"year":1997,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社香港10月1日电　(记者　陶文革)参加八运会的香港代表团全体成员，今天出席了先后于沙田香港体育学院和香港会议展览中心举行的火炬传递活动及授旗仪式，为香港首次参加全国运动会作好准备。"},{"type":"paragraph","text":"曾代表香港出席在天安门广场举行的八运会圣火点燃仪式的李继贤，今天在多名运动员及全港十八区代表的陪同下在沙田体院起跑。他手持火炬绕场跑了一周后，旋即登上专车，直抵尖沙嘴，然后再乘船抵达会展中心。李继贤在会展中心把火炬交予特区行政长官董建华。董建华再交给香港代表团团长霍震霆。霍震霆表示，这是香港在回归以后，首次以特别行政区名义参加全国运动会，因此格外受到重视。"},{"type":"paragraph","text":"火炬传递活动之后，董建华代表特区政府将一面区旗授予代表团。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b06b61cf3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
