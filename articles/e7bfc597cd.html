script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关于古代东方奴隶制的性质问题","authors":[],"dates":[{"year":1962,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华南师范学院历史教授唐陶华，最近在广东史学会作了关于古代东方奴隶制性质问题的学术报告，他不同意把古代东方奴隶制和希腊罗马的古典奴隶制区别为早期和发展期“两个阶段”的提法，认为它们是两个不同类型的奴隶社会，而不是两个阶段。他指出:不能把商品生产作为决定古代东西方奴隶社会性质的主要依据；把古代东方奴隶制断为以生产生活资料为主，而西方古典奴隶制则以生产为消费服务的商品为主的说法，很难令人置信。因为在古代东方的国家中，奴隶也参加手工业劳动，古代东方奴隶制并不是发展不充分的奴隶制，中国奴隶社会很早就向封建社会过渡的历史事实就是证明。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7bfc597cd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
