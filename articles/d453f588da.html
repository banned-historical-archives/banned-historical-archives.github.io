ear":1966,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"誓做无产阶级文化大革命的主力军最敬爱的党中央最敬爱的毛主席："},{"type":"paragraph","text":"当我们从广播里听到您作出的关于无产阶级文化大革命的英明决定以后，全体革命师生欢欣鼓舞，大家振臂高呼：“中国共产党万岁！”“毛主席万岁！”我们最热烈地拥护、最坚决地执行您的英明决定，誓作无产阶级文化革命的主人。"},{"type":"paragraph","text":"中共中央的英明决定是毛泽东思想的新胜利，是无产阶级文化革命的最新总结和纲领性的文件，是我们取得无产阶级文化革命彻底胜利的根本保证，是对世界无产阶级革命的伟大贡献。它指出了我国无产阶级文化革命的根本道路，它将把我国无产阶级文化革命推向一个崭新的阶段。这一英明决定，号召我们革命师生，特别是我们革命青年学生，做无产阶级文化革命的主人。这是您对我们的无限信任和关怀，大大地增长了我们的革命志气，我们感到浑身都是劲，浑身都是胆。在您的英明领导和亲切关怀下，我系无产阶级文化革命筹备小组已经成立，我们真正做了无产阶级文化革命的主人。我们决不辜负您对我们的希望，我们坚决听您的话，您怎么说，我们就怎么做。我们一定要把毛泽东思想作为我们一切工作的指导方向，把您的英明决定作为我们最锐利的武器，发扬“舍得一身剐，敢把皇帝拉下马”的大无畏革命精神，是刀山我们敢上，是火海我们敢闯！下定决心，不怕牺牲，排除万难，去争取胜利。把无产阶级文化革命搞深搞透搞彻底！"},{"type":"paragraph","text":"祝最最敬爱的领袖毛主席万寿无疆！　　　　　　　湖北大学法律系全体革命师生"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d453f588da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
