art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿尔巴尼亚翻译出版《毛泽东论文学与艺术》","authors":[],"parts":[{"type":"paragraph","text":"新华社地拉那15日电 阿尔巴尼亚最近翻译出版了《毛泽东论文学与艺术》。"},{"type":"paragraph","text":"这本书是根据中国外文出版社出版《毛泽东论文学与艺术》英文本转译成阿文的。书中选择了毛主席从1927年到1957年期间撰写的有关文学和艺术问题的论文共十五篇，其中包括《在延安文艺座谈会上的讲话》、《反对党八股》、《改造我们的学习》、《关于百花齐放、百家争鸣》等。"},{"type":"paragraph","text":"这本书精装成一册，共一百五十四页。鲜红色的封面上印着“毛泽东论文学与艺术”几个大字，首页并印有毛主席照片。"},{"type":"paragraph","text":"在此以前，阿尔巴尼亚还翻译出版了毛主席的著作《实践论》、《矛盾论》、《关于农业合作化问题》、《论人民民主专政》、以及他的诗词等。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fe30a0d33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
