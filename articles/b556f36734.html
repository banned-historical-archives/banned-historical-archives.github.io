art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"招待正在我国访问的各国外宾来自二十多个国家的外宾四百多人应邀观看革命现代舞剧《白毛女》 我国党政领导人周恩来江青张春桥姚文元李先念郭沫若等陪同观看","authors":[],"parts":[{"type":"paragraph","text":"应邀出席晚会观看演出的有来自二十多个国家的外宾四百多人，他们当中有秘鲁共和国贝拉斯科总统夫人和由渔业部长坦塔莱安将军、工商部长希门尼斯将军率领的秘鲁政府代表团，朝鲜民主主义人民共和国驻中国大使玄峻极和夫人及大使馆其他人员。"},{"type":"paragraph","text":"我国党政领导人周恩来、江青、张春桥、姚文元、李先念、郭沫若，外交部部长姬鹏飞，国务院文化组组长、北京市革命委员会代主任吴德，中国人民对外友好协会负责人王国权，上海市革命委员会副主任、中国上海舞剧团团长徐景贤，陪同观看演出。"},{"type":"paragraph","text":"晚会的演出受到各国朋友的热烈欢迎。"},{"type":"paragraph","text":"陪同观看演出的，还有我国有关方面负责人刘贤权、白相国、陈慕华、林佳楣、于立群、许寒冰、杨阳、谢静宜、于会泳、浩亮、刘庆棠等。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李先念","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b556f36734"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
