解放进步运动将产生深刻影响","authors":[],"dates":[{"year":1966,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希腊《再生》杂志发表文章指出"},{"type":"paragraph","text":"中国文化大革命决定世界前途"},{"type":"paragraph","text":"“十六条”对全世界民族解放进步运动将产生深刻影响"},{"type":"paragraph","text":"据新华社二十二日讯  希腊《再生》杂志今年第二十三期发表文章指出：“毛主席是我们时代最杰出的人民领袖”，“中国文化大革命证明了社会主义制度的无限生命力，也证明了中国领导同人民群众血肉相连的关系，以及中国青年朝气勃勃的首创精神。”"},{"type":"paragraph","text":"这篇题为《任何污蔑都无损于具有世界历史意义的中国无产阶级文化大革命》的文章指出，社会主义文化革命是一次史无前例的勇敢的深刻的革命。它的目的在于巩固社会主义制度，巩固无产阶级专政，对人进行深刻的社会主义教育。"},{"type":"paragraph","text":"文章说：现在国际帝国主义和各国反动派把新中国作为他们的主要战略目标，他们在国际修正主义，首先是它的中心苏联领导集团的帮助下直接威胁中国人民，威胁他们的胜利果实，从而也威胁着全世界一切民族和人民，因为他们在斗争中的最主要支柱是人民中国。因此，这场革命在今天具有更大的意义。"},{"type":"paragraph","text":"文章指出：“中共中央的决定不仅仅对中国本身而且对整个世界的民族解放进步运动将产生深刻的影响。”文章指出：“帝国主义，各国反动派和修正主义对文化革命所采取的立场有力地证明了中国的事情进行得很好。”"},{"type":"paragraph","text":"文章说，中国无产阶级文化大革命的进程将决定着新中国的前途及世界的前途。希腊广大人民群众以巨大革命激情热烈欢迎和支持中国的文化大革命。"},{"type":"paragraph","text":"文章最后说：反动派的污蔑“绝不能贬低势如破竹的横扫整个中国的具有世界历史意义的无产阶级文化大革命。帝国主义、反动派和修正主义疯狂的反华、反共、反人民的运动必将遭到惨败。任何力量都不能够阻止人民群众的胜利前进。”"},{"type":"paragraph","text":"这家杂志还全文刊载了中共八届十一中全会公报和《中国共产党中央委员会关于无产阶级文化大革命的决定》。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d86f33d6e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
