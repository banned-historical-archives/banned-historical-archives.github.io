ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于调香地主资产阶级和国民党军官的通知","alias":"","parts":[{"type":"paragraph","text":"关于调查地主资产阶级和国民党军官的通知"},{"type":"paragraph","text":"（1940年9月6日）恩来、剑英、克农、漱石\"："},{"type":"paragraph","text":"甲、将大资产阶级和民族资产阶级加以区别，以人为单位，每类每省调查数十人至一百人。"},{"type":"paragraph","text":"乙、大资产阶级是带买办性的，与外国资本有联系，大银行、大商业及与外国资本联系的大工业属之，他们是现时主要当权者，如蒋介石、孔祥熙、宋子文、虞洽卿等是。"},{"type":"paragraph","text":"丙、民族资产阶级是受大资产阶级统制，与外国资本联系少，现时还基本上没有政权，主张团结抗战的，如陈光甫、穆藕初、康心如、范旭东等是。"},{"type":"paragraph","text":"丁、将大地主与开明绅士加以区别，亦以人为单位每类调查数十人至一百人。"},{"type":"paragraph","text":"戊、分省调查，请恩来负责调查四川、云南、贵州、湖南、湖北五省，克农负责调查广西、广东、福建三省及香港，小姚负责调"},{"type":"paragraph","text":"[1]剑英，即叶剑英，当时任中共中央南方局常委、八路军参谋长。克农，即李克农（1899—1962)，安徽巢县（今属巢湖市）人，当时任八路军驻桂林办事处主任。漱石，即饶漱石（1903—1975），江西临川人，当时任查江西、浙江、安徽、江苏四省及上海。克农、小姚的材料限于十二月一日以前托人带交恩来带来延安，给七大用。"},{"type":"paragraph","text":"己、每人为立一小传，要有籍贯、年龄、出身、履历、派别、资产活动、嗜好、政治动向、对我态度等项。"},{"type":"paragraph","text":"庚、关于军官调查，总司令、军长、师长、团长四项，每人立一小传，传内亦有履历、派别、资产活动、政治动向、对我态度等项。"},{"type":"paragraph","text":"辛、以上调查统称名人录，先从经济、军事两方着手，将来可发展到政治、文化方面。"},{"type":"paragraph","text":"毛九月六日"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":130,"page_end":131},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"240c88fe0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
