" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"给陈毅的信","description":"","dates":[{"year":1944,"month":12,"day":1}],"parts":[{"text":"给陈毅的信","type":"title"},{"type":"appellation","text":"陈毅同志："},{"type":"paragraph","text":"来示读悉，启示极多，十分感谢！"},{"type":"paragraph","text":"今日已电渝不交复案，周、董均回，拖一时期，再议下着。至于基本方针，如你所说那样，除此再无二道。"},{"type":"paragraph","text":"白区劳绩必须承认，你说得非常之对。还有“南北”问题，南方党问题，久想讲，那天临时忘了，恐怕还有别的。七大讲一次，似有必要。一切不公不平之事，必须使之归于公平，以利团结对敌。有所见时，请随时告我。"},{"type":"paragraph","text":"自从你及聂公开后，伯承即无秘密之必要。昨日党校的会，请他未到，是未正式告他可以公开之故。请你先告他，我亦当告他。"},{"type":"paragraph","text":"下游干部配备请和彭真一商。你的意见我以为是好的。"},{"type":"paragraph","text":"你的思想一通百通，无挂无碍，从此到处是坦途了。随时准备坚持真理，又随时准备修正错误，没有什么行不通的。每一个根据地及他处只要有几十个领导骨干打通了这个关节，一切问题就可迎刃而解。整个党在政治上现在是日见成熟了，看各地电报就可以明了。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月一日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":3,"index":1},{"part_idx":2,"offset":2,"index":2},{"part_idx":3,"offset":9,"index":3},{"part_idx":3,"offset":13,"index":4},{"part_idx":4,"offset":50,"index":5},{"part_idx":5,"offset":5,"index":6},{"part_idx":5,"offset":11,"index":7},{"part_idx":6,"offset":10,"index":8}],"is_range_date":false,"authors":["毛泽东"],"comments":["陈毅，当时任新四军代理军长，这时在延安准备出席中国共产党第七次全国代表大会。","一九四四年十一月二十一日，蒋介石在拒绝赫尔利同毛泽东十一月十日在延安签署的《中国国民政府、中国国民党与中国共产党协定（草案）》后，提出另一协定草案，主要内容是要中共交出军队，然后允许中共派几个人到国民党政府去做官。周恩来为中共中央草拟了一个复案，毛泽东将此复案批送中央负责人和陈毅等阅看，征求意见。陈毅在看了复案和研究了有关材料后，于十二月一日写信给毛泽东，信中分析了国共谈判的两种可能的发展趋势，认为蒋介石不会走真正同共产党合作的这条路，而是要照他提出的协定办，因此建议中央暂不交复案，拖一段时间，等待蒋介石集团力量的削弱，同时在此期间发展自己的力量，从而“取得全局的中心地位”。","复案，指周恩来为中共中央起草的对蒋介石一九四四年十一月二十一日提出的国共之间的协定草案的答复。","周，指周恩来。董，指董必武，当时任中共中央南方局副书记兼宣传部部长、统战部部长。周恩来、董必武在收到毛泽东一九四四年十二月一日关于暂不交复案，“请周、董同时回延”的电报后，于十二月七日回到延安。","一九四五年二月十五日，毛泽东在中共中央党校的讲演中，特意补充讲了南方、北方问题，大后方党的问题和白区工作问题。参见本卷第264—267页。","聂，指聂荣臻，当时任八路军晋察冀军区司令员兼政治委员，这时在延安准备出席中国共产党第七次全国代表大会。","伯承，即刘伯承，当时任八路军第一二九师师长、晋冀鲁豫军区司令员，这时在延安准备出席中国共产党第七次全国代表大会。","彭真，当时任中共中央组织部代理部长。"],"page_start":240,"page_end":241,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"805c20c151"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
