指引着前进的方向","authors":[],"dates":[{"year":1966,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社东京十二日电　日本著名的民族音乐家冈本文弥十一日晚向东京听众演唱《王杰赞歌》时唱道:毛泽东思想象一轮红日，照亮人民的心，光芒万丈；它象座灯塔，指引着人民前进的方向!"},{"type":"paragraph","text":"《王杰赞歌》是冈本根据王杰的故事改编的新作——和风(日本)评弹。这种评弹是在日本民族曲艺“新内”的基础上吸收了中国苏州评弹的一些特点。"},{"type":"paragraph","text":"冈本在评弹中唱道:"},{"type":"paragraph","text":"王杰的枪，我们来扛，"},{"type":"paragraph","text":"王杰的歌，我们唱!"},{"type":"paragraph","text":"王杰不怕苦、不怕死，"},{"type":"paragraph","text":"一心为革命，"},{"type":"paragraph","text":"永远跟着共产党，"},{"type":"paragraph","text":"永远跟着毛主席，"},{"type":"paragraph","text":"向前进!"},{"type":"paragraph","text":"冈本文弥曾在一九六四年访问过中国。回国后他运用苏州评弹的一些特点创造和演唱过《越南南方来信》和一些日本人民斗争的故事。"},{"type":"paragraph","text":"冈本在演唱《王杰赞歌》时，充满了对毛主席和在毛泽东思想教育下的革命战士的热爱和尊敬。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24a645aa99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
