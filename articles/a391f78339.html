rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向上级反映情况是“文革遗毒”吗？","authors":["英锐"],"parts":[{"type":"paragraph","text":"临高县人武部长带头搞不正之风，这本来够理亏的。然而，他竟“理直气壮”地对向上级反映他的问题的同志横加追查与恫吓，说人家那是“文革遗毒”。这顶帽子戴错了！"},{"type":"paragraph","text":"确确实实，对于那种心怀恶意，捕风捉影，无中生有，捏造罪名，诬陷他人的“文革遗毒”，我们应该警惕，坚决加以反对。同时，对于那种见领导的某项决定不合自己的心意，便乱向上级告状，“花上八分钱，叫你忙半年”的错误做法，也决然不能提倡。但是，群众对领导的正常批评、对不正之风的检举揭发，无论如何不能叫“文革遗毒”。"},{"type":"paragraph","text":"值得指出的是，现在有少数搞不正之风的领导干部，常常把反“文革遗毒”当作一根棒子，用来对付敢于坚持党性原则的同志。如实向上级反映情况，他说你是“不安定因素”；揭发某领导的不正之风，他说你是“打小报告”；若反映情况稍有出入，那更不得了。这些单位，搞不正之风的人得不到迫究，而检举揭发者日子却很不好过。这是一种极不正常的现象。"},{"type":"paragraph","text":"纠正不正之风，维护党的纪律，一个行之有效的办法，就是发挥广大党员的监督作用。拒绝群众批评，对揭发自己问题的同志打击报复，这是党的纪律所不容许的！对于带头搞不正之风，又对揭发人加以追查、恫吓的人，需要进行思想教育，也应当依照党的纪律予以严肃处理。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a391f78339"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
