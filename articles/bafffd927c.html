art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《讲话》光辉照万代——批判“四人帮”散布《讲话》“过时论”的罪行","authors":["战士夏春华〖HH/换行〗DW：五二八二五部队"],"parts":[{"type":"paragraph","text":"《在延安文艺座谈会上的讲话》这篇光辉著作，是我们伟大领袖和导师毛主席在三十五年前同“左”右倾机会主义路线的大论战中产生的。《讲话》继承、捍卫和发展了马克思列宁主义的世界观和文艺理论，对思想文化领域的资产阶级思潮和修正主义路线作了最有力、最深刻的揭露和批判。《讲话》阐明了文艺要为工农兵服务和如何为工农兵服务的根本问题，制定了发展无产阶级文艺的路线、方针和政策，为我国新民主主义革命时期和社会主义革命时期的文艺革命指明了方向。"},{"type":"paragraph","text":"然而，祸国殃民的“四人帮”却极端仇恨毛主席的光辉《讲话》。他们尽其攻击、诬蔑之能事，胡诌什么“学习《讲话》也要有个历史条件，《讲话》是主席四二年讲的，……当时是民主革命阶段”，明目张胆地散布《讲话》“过时论”。这不禁使我们联想起五十年代，胡风分子曾叫嚣“这书（指《讲话》）也许在延安时有用，但，现在，我觉得是不行了。”“四人帮”和胡风反革命集团异口同声地攻击《讲话》过时了，足以证明他们完全是一丘之貉，是马列主义、毛泽东思想的死敌。"},{"type":"paragraph","text":"“四人帮”在《讲话》“过时”的鼓噪声中，指使“江天”“梁效”之流肉麻地吹捧江青一九六四年那个所谓《谈京剧革命》的讲话。胡说江青的讲话“如平地一声雷”，“开拓革命之路”等等。江青也就毫无羞耻地把自己打扮成“文艺革命旗手”，把文艺革命的成果，特别是京剧革命的成果一古脑儿窃为己有。其野心之大，真是无以复加了。"},{"type":"paragraph","text":"历史证明，抗日战争和解放战争时期，正是在《讲话》的指引下，革命文艺起到了“团结人民、教育人民、打击敌人、消灭敌人”的作用，为中国革命的胜利作出了应有的贡献。在社会主义革命时期，《讲话》同样发挥了无穷的威力，指引着广大工农兵和革命文艺战士同资产阶级右派斗，同胡风反党集团斗，同牛鬼蛇神斗，同刘少奇、林彪修正主义文艺路线斗，粉碎了形形色色的“三家村”和“斐多菲俱乐部”。在《讲话》的光辉照耀下，无产阶级文艺革命蓬勃发展，社会主义文艺园地日益繁荣。“四人帮”为了篡党夺权，复辟资本主义，疯狂干扰破坏毛主席的革命文艺路线，犯下了滔天罪行。我们今天仍然要以《讲话》为锐利武器，揭批“四人帮”在文艺战线的倒行逆施。叛徒江青一伙妄图用“过时论”来贬低、抹煞《讲话》的巨大历史意义和现实意义，反对毛主席的伟大旗帜，真是“蚍蜉撼树谈何易”！"},{"type":"paragraph","text":"疯狗的狂吠，丝毫无损于毛主席伟大旗帜的光辉。“四人帮”诽谤《讲话》过时了，恰恰说明毛主席的《讲话》光芒万丈，永远照耀着革命文艺胜利前进的道路。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bafffd927c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
