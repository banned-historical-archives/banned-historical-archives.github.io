thors":[],"dates":[{"year":1951,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社上海六日电:苏南区苏州专区吴县、吴江、常熟、昆山、太仓五县和苏州市，在今年三月曾分别举行土地改革图片实物展览会。苏州市的展览会四月中旬才结束。参观这些展览会的共二十一万多人。展览品有说明地主阶级压迫和剥削农民的各种实物，如地契、租约、农民的卖身契等，有图表，有照片。苏州市的展览会，展览品共一千多件，可分三个内容:一、暴露地主阶级对农民的压迫和剥削。二、介绍土地改革运动，包括运动中不法地主的抵抗、破坏和农民的正义斗争。三、介绍土地改革后农村的新气象和土地改革的成绩。全部内容使观众对封建制度的罪恶和土地改革的正义性可以有了一较明确、完整的了解，效果极为良好。观众们一致认为参观了展览会如同上了一次课，对自己的教育很大。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92aa8b2ce6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
