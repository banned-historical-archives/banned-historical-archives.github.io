ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"毛泽东等祝贺朝鲜解放十二周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺朝鲜解放"},{"type":"paragraph","text":"十二周年的电报\"!"},{"type":"paragraph","text":"（1957年8月13日）朝鲜民主主义人民共和国最高人民会议常任委员会委员长金科奉同志，朝鲜民主主义人民共和国内阁首相金日成同志，朝鲜民主主义人民共和国外务相南日同志："},{"type":"paragraph","text":"当朝鲜解放十二周年的时候，我们谨代表中华人民共和国政府和中国人民向你们，并通过你们向朝鲜民主主义人民共和国政府和朝鲜人民致衷心的热烈的祝贺。"},{"type":"paragraph","text":"朝鲜人民在朝鲜劳动党和朝鲜民主主义人民共和国政府的领导下，通过战后三年计划的胜利完成，在国家的恢复和建设事业中已经取得了很大的成就，中国人民为此而感到欢欣。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国政府在维护朝鲜停战协定和为实现国家的和平统一方面所作的巨大努力，不仅为全体朝鲜人民所拥护，"},{"type":"paragraph","text":"[1]这是毛泽东以中华人民共和国主席的名义和全国人民代表大会常务委员会委员长刘少奇、国务院总理兼外交部长周恩来联名给朝鲜民主主义人民共和国最高人民会议常任委员会委员长金科奉、朝鲜民主主义人民共和国内阁首相金日成、朝鲜民主主义人民共和国外务相南日的电报。祝贺朝鲜解放十二周年。毛泽东全集第三十八卷而且获得了全世界爱好和平的人民的同情和支持。"},{"type":"paragraph","text":"祝朝鲜人民在为祖国的和平统一和独立，在为实现第一个五年计划的斗争中获得更大的成就。"},{"type":"paragraph","text":"祝中朝两国牢不司破的，兄弟般的友谊日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来一九五七年八月十三日于北京"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":203,"page_end":204},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0486aa7211"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
