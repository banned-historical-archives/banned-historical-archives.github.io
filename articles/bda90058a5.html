script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"和资产阶级思想宣告决裂昆明师院学生现身说法","authors":[],"dates":[{"year":1958,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据“云南日报”消息:昆明师范学院双反运动进入新的高潮后，学生们自觉要求思想改造的心情越来越迫切，他们决心与一切资产阶级思想言行彻底决裂，纵火烧人又烧己。这个学校在不久前举办了一次“思想跃进展览会”，32个学生亲自站在自己的漫画和实物前现身说法，向观众解说自己以往错误思想言行和今后又红又专的规划，使全院师生员工受到一次深刻、实际的社会主义思想教育。"},{"type":"paragraph","text":"在这次展览会上，学生们都以十分沉痛的，心情，追述和批判以往不红不专、只专不红以及各种资产阶级的错误思想和言行。化学系一年级女生陈蔓莉将自己的思想、生活和学习上的缺点概括为“多、快、好、省”的打油诗。即开会请假名堂多，益章领助学金跑得快……。她说过去她认为人生最幸福的是吃得好、穿得好和住得好，平时不关心政治，不努力学习，在反右斗争中几乎被右派分子牵着走了。她决心今后要加强政治学习，痛改前非。化专二年级学生杨茂远展览了自己的“平生无大志，但求得三分”观点和表现。曹××展览了自己的“暮气”沉沉曾经产生过自杀念头的情形。他们对这些错误思想和行为作了详尽的分析和批判，并且介绍了自己的又红又专规划。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bda90058a5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
