cle":{"title":"地委对孟连县委《关于复查阶级成份中几个具体政策问题的请示》的电话批复","dates":[{"year":1973,"month":3,"day":22}],"is_range_date":false,"authors":["中共思茅地委"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"思茅地区革命委员会边疆组, 思茅地区边疆县复查阶级手册, 466-468","tags":[{"name":"成分","type":"主题/事件"},{"name":"地主","type":"主题/事件"},{"name":"富农","type":"主题/事件"},{"name":"工商业者","type":"主题/事件"},{"name":"国民党","type":"主题/事件"},{"name":"婚姻","type":"主题/事件"},{"name":"阶级成分","type":"主题/事件"},{"name":"农村","type":"主题/事件"},{"name":"贫农","type":"主题/事件"},{"name":"小商小贩","type":"主题/事件"}],"parts":[{"type":"title","text":"地委对孟连县委《关于复查阶级成份中几个具体政策问题的请示》的电话批复"},{"type":"paragraph","text":"孟连县委："},{"type":"paragraph","text":"县委《关于复查阶级成份中几个具体政策问题的请示》的电话请示收悉。基本同意。"},{"type":"paragraph","text":"关于新富农问题。报告中所提“如群众不加反对者就不划，仍以解放前三年的经济状况划定阶级成份”可删去。"},{"type":"paragraph","text":"关于解放后地富子女与农民子女结婚或农民子女与地富子女结婚者阶级成份问题。在最后应加上对他们所生子女的成份，按1948年中共中央《关于一九三三年两个文件的决定》中“无论何时与何种成份结婚所生子女的成份与父同”的规定执行。"},{"type":"paragraph","text":"关于划定地主、富农家庭成员个人成份问题中，对于地主家庭中属于被支配地位，常年参加农业主要劳动的人，“应定为农民成份，作为团结对象对待”。"},{"type":"paragraph","text":"关于划分农村工商业家、小商、小贩、贫民阶级成份问题。“过去在划分阶级成份时常常把商业利润视为剥削而计入剥削量中，以致将一部份从事商业的大户划为地主、富农，这是不对的”，应予删去。商业资本家应按人民内部矛盾对待。关于小商，根据毛主席在《中国革命和中国共产党》一文中的指示：“农民以外的小资产阶级，包括广大的知识分子、小商人、手工业者和自由职业者。”“所有这些小资产阶级，和农民阶级中的中农的地位有某些相象……”“……故必须争取和保护之”。因此，应按中农对待。小贩阶级成份问题，根据政务院的有关规定“属于贫民范围之内”，作为依靠对象。"},{"type":"paragraph","text":"关于农民内部雇请短工问题及山区农民向坝区出租耕牛问题。都应计算剥削与被剥削量。"},{"type":"paragraph","text":"关于国民党的杂派和土司头人的官租、杂派混合在一起难于划分清楚的问题，应尽量发动群众划分清楚，土司头人的加派部份属于特权剥削，应计算剥削与被剥削量。"},{"type":"subtitle","text":"中共思茅地委"},{"type":"subtitle","text":"1973年3月22日"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21d29318d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
