61,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"姚文元"},{"type":"paragraph","text":"报载:“西方文明”的最“新”成就是:骑在自行车或摩托车上，车尾挂着画笔，以最短的时间完成“创作”。车子狂奔二小时，就足够一个展览会上满满的布置了。——此曰“行动派”。"},{"type":"paragraph","text":"这种鬼画符，我们已经见过很多了。什么“垮掉派”“野兽派”“超现实主义派”“阳伞派”……名称繁多，但其实是一样的:用极其丑恶的形式赤裸裸的展览“上等人”的极其丑恶的心灵，并以此来毒害人民。"},{"type":"paragraph","text":"嘲笑它，揭露它，鞭挞它，是一种思想战线上的战斗。它是一面最好的镜子，活活照出了肯尼迪之流嘴巴上挂着的“自由民主”的虚伪。"},{"type":"paragraph","text":"然而我们不能忘记，除了不包糖衣的毒药外，帝国主义手里还有另一种毒药。它用某种形式美的外壳包裹着丑恶的内容。这种艺术，也讲情节，也讲技术，电影则玩弄光影，绘画则运用色彩，但都用于美化丑恶的资本主义社会和丑恶的极端个人主义者。它们形式上并不那样赤裸裸的张扬色情和野蛮，但在艺术形象中则深深地透进了资产阶级世界观的毒性。明明是歪曲现实，却要诱引你去欣赏它；明明是灌输敌视劳动人民的观念，却还要用牛油面包把劳动人民装成很“幸福”的模样；明明是最丑的资产阶级糜烂的生活方式，还为它披上一件轻柔的外衣，使它显出一种幽雅而富有诗意的气氛；明明是最肮脏、最冷酷的资产阶级道德，表面上却把它化装成“美”的模样；明明是要被压迫人民俯首贴耳去受宰割，却还弄上一个大团圆的结尾来显示资产阶级对劳动人民的“博爱”。……这种艺术，较之前一种，毒害性会更大些。随着“东风压倒西风”形势的发展，同前一手一样这后一手也会不断变换“新”花样的。"},{"type":"paragraph","text":"赤裸裸的反动艺术，我们已经揭露过不少了，今后也还要继续不断的揭露它。为了增强人民的抗毒素，对于帝国主义手里的另一种艺术，还需要加强批判的力量。正同肯尼迪在政治上有核武器，搞“局部战争”与“和平队”两手一样，在艺术上美帝国主义也是有两手的，对这两手认识得较深，我们的目光就越锐利。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ee7b90497"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
