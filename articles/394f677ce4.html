dates":[{"year":1960,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京24日电】　北京市历史学会今日正式成立。参加成立大会的有北京市的历史科学工作者，包日高等院校和中等学校的教师等200多人。"},{"type":"paragraph","text":"大会通过会章，确定北京市历史学会的宗旨是:团结并推动北京的历史学研究力量，在毛泽东思想的指导下，根据百家争鸣的方针，进行历史科学的研究和学习。"},{"type":"paragraph","text":"中共北京市委书记处书记邓拓在会上就如何以毛泽东思想为指导，发展马克思列宁主义的革命的历史科学问题讲了话。"},{"type":"paragraph","text":"北京市副市长、历史学家吴哈在会上讲话，概述了北京市史学界一年来的工作和活动。"},{"type":"paragraph","text":"大会选举吴哈为北京市历史学会会长，赵征夫、邹循正为副会长，王芝兰等46人为理事会理事"},{"type":"paragraph","text":"成立大会结束以后，理事会举行了第一次会议，讨论了学会1961年的工作计划。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"394f677ce4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
