"],"dates":[{"year":1967,"month":12}],"is_range_date":false,"parts":[{"text":"康生对宁夏军区的指示","type":"title"},{"text":"康生","type":"authors"},{"text":"（宁夏军区副司令员张怀礼同志传达）","type":"appellation"},{"text":"一、筹备处派代表去北京谈判，不是搞重庆谈判，是受教育。","type":"paragraph"},{"text":"二、加强宣传，报纸、电台、宣传车，对中央首长关于宁夏问题的谈话、兰州军区公告，要反复宣传，把有线广播搞起来（特别是电台有线广播）。","type":"paragraph"},{"text":"三、不要抓头头，抓来要放。","type":"paragraph"},{"text":"四、适当的分发武器，要武装造反派，如果他们对银川进行反扑，坚决自卫。","type":"paragraph"},{"text":"五、筹备处破坏铁路，康老很生气，把朱声达叫去训一顿。这是反革命事件。","type":"paragraph"},{"text":"六、第三势力对自己参加谈判的代表数量少，他们很有意见，中央说可以考虑。","type":"paragraph"},{"text":"七、继续用飞机散发传单。","type":"paragraph"}],"comments":[],"origin":"宁夏回族自治区无产阶级文化大革命（文件汇编），宁夏无产阶级革命派总指挥部、宁夏自治区革命工人代表大会政宣部合编，一九六八年元月二十七日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"宁夏文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ede440e00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
