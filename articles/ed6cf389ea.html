art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以愚公移山的精神把农业生产推向高峰——北京市东郊区复员军人等代表给彭德怀部长的信","authors":[],"parts":[{"type":"paragraph","text":"敬爱的国防部长彭德怀元帅："},{"type":"paragraph","text":"我们以极其兴奋的心情向您报告：我们是北京市东郊区1958年烈属、军属、革命残废军人、复员军人代表会议的全体代表。我们代表着全区一千五百六十五户烈、军属和残废、复员军人，出席了这次会议。"},{"type":"paragraph","text":"这次的会议历时三天。会议的主要内容是贯彻党的八届三中全会精神和如何提前实现全国农业发展纲要所提出的增产指标。同时我们还听取了区人民委员会和兵役局关于1958年优抚、复员安置和兵役工作的两个报告。更重要的是到会代表，一致讨论通过了下面这个决议："},{"type":"paragraph","text":"在党和政府的领导下，我们要继续发扬烈、军属、革命残废军人和复员军人的光荣传统，在保卫祖国和建设社会主义事业中，发挥骨干作用。我们要和全区人民一道，以革命的精神，愚公移山的毅力和社会主义的干劲，把我区已掀起的农业生产高潮，推向更高峰，在农业战线上来一个大跃进，并在1958年一年内，要求粮食、棉花等主要作物的年产量，达到全国农业发展纲要在十二年内规定的粮食每亩四百斤、籽棉二百斤的指标。同时还要兴修水利，大量积肥，密切结合生产积极开展除四害、讲卫生、扫除文盲、反对浪费运动和树立勤俭持家、爱社如家的风气。"},{"type":"paragraph","text":"敬爱的彭部长，现在我们已把上述决议作为条件向北京市各郊区进行了友谊挑战。请您随时听着我们胜利的捷报吧。我们坚决向您保证：我们有决心有信心做一个建设社会主义的积极分子，我们一定要把自己的一切，全部献给伟大的社会主义建设事业！在我们中间虽然有的同志身体残废了，但是思想和意志仍然是健康的。我们要以艰苦奋斗，不屈不挠的革命干劲和移山倒海，乘风破浪，勇往直前的精神，争取更大的成绩！"},{"type":"paragraph","text":"最后，我们希望能经常得到您的教导，衷心地祝您身体健康。"},{"type":"paragraph","text":"此致敬礼"},{"type":"paragraph","text":"北京市东郊区烈、军属、革命残废军"},{"type":"paragraph","text":"人、复员军人代表会议全体代表上"},{"type":"paragraph","text":"1月25日"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed6cf389ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
