uthors":[],"dates":[{"year":1969,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"严正谴责修正主义者破坏学生斗争的可耻行径"},{"type":"paragraph","text":"阿报支持资本主义国家革命学生运动"},{"type":"paragraph","text":"据新华社地拉那电　阿尔巴尼亚《人民之声报》二十五日发表文章，热烈赞扬法国、英国、意大利等资本主义国家内正在蓬勃发展的进步学生运动。"},{"type":"paragraph","text":"文章指出，这一运动表明，资本主义国家内的青年再也不能容忍垄断资本的压迫和残酷剥削了，再也不能容忍腐朽没落的资本主义教育制度了。文章谴责资本主义国家的统治集团对进步学生运动进行残酷镇压。文章指出，这些国家的统治集团，不论是用公开的暴力，还是用卑鄙的欺骗手法，都不能阻挡学生运动的发展。"},{"type":"paragraph","text":"文章说，修正主义党的头目们，无耻地指责起来反对资本主义制度的学生是“冒险分子”、“极左分子”、“挑衅分子”，把学生的革命行动说成是“闹事”和“政治冒险”，极力配合资本主义国家统治集团，企图把学生运动镇压下去。他们还竭力阻挠学生运动同工人运动相结合。但是，广大的进步学生懂得，只有同工人阶级结合在一起，并在工人阶级的领导之下，他们的斗争才能取得胜利。"},{"type":"paragraph","text":"文章最后说：阿尔巴尼亚的青年学生毫无保留地支持资本主义国家的革命学生为反对反动的资产阶级及其走狗现代修正主义者所进行的正义斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fa4caa604"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
