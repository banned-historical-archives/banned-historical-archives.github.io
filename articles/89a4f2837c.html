rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"进一步学好毛主席著作0216部队提出具体要求","authors":["孙树增"],"parts":[{"type":"paragraph","text":"本报讯 0216部队召开现场会议，总结了去年一年来，特别是《毛泽东著作选读》下发以来，学习毛主席著作的情况和经验，提出了进一步学好的具体要求。"},{"type":"paragraph","text":"这个部队的广大干部战士，一年来积极学习毛主席著作，提高了思想觉悟，加强了战备观念，推动了四好运动的开展，积累了一些学习的经验，为深入学习毛主席著作，打下了良好的基础。为进一步学好毛主席著作，他们在总结了一年来学习经验的基础上，提出了下述要求：一、加强领导，一方面党支部要把学习毛主席著作列入支部工作计划，提出要求，安排时间，检查效果，另一方面干部要带头学好，以便指导战士学习。二、方法要灵活，可采取连为单位学、小组为单位学和个人自学，但应以小组学习为主，便于抓时间、联系实际和进行互助。三、带着问题学，活学活用，即结合当前思想、工作的现实问题，本着急用先学、学用一致的原则，有目的有重点地学；共青团、革委会应通过各种形式，积极地配合学习。（孙树增）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89a4f2837c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
