script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蒙古人民共和国驻我国大使  贾尔卡赛汗向毛主席呈递国书","authors":[],"dates":[{"year":1950,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蒙古人民共和国驻我国大使"},{"type":"paragraph","text":"贾尔卡赛汗向毛主席呈递国书"},{"type":"paragraph","text":"【新华社三日讯】蒙古人民共和国驻我国首任特命全权大使巴雅伦·贾尔卡赛汗于今日下午六时偕参赞桑达温·拉布丹、一等秘书巴特杰尔格伦·达尔哈热布、二等秘书达姆基奈·尼玛、三等秘书巴托奇伦·郭多夫，向我国中央人民政府毛泽东主席呈递国书。在场的有中央人民政府秘书长林伯渠、中央人民政府外交部副部长章汉夫、中国人民解放军代总参谋长聂荣臻、外交部办公厅主任王炳南、中央人民政府典礼局局长余心清、外交部交际处处长王倬如。巴雅伦·贾尔卡赛汗大使呈递国书时，曾向毛主席致颂词，毛泽东主席致答词。"},{"type":"paragraph","text":"贾尔卡赛汗大使颂词敬爱的中华人民共和国中央人民政府主席："},{"type":"paragraph","text":"我荣幸地向您呈递蒙古人民共和国小呼拉尔主席团任命我为驻中华人民共和国特命全权大使的国书。"},{"type":"paragraph","text":"主席先生，向您呈递国书的时候，让我代表蒙古人民向伟大的中国人民表示真诚的友情，伟大的中国人民站在以伟大的苏联为首的和平、民主和社会主义阵营战斗的最前列。"},{"type":"paragraph","text":"我幸运地代表我国政府出使友邦中华人民共和国，她是我国人民及全世界爱好和平的各国人民的真诚朋友。"},{"type":"paragraph","text":"主席先生，我愿向您保证，我理解本人所负从事更进一步发展和巩固贵我两国间真诚友谊和充分相互了解之一切责任。"},{"type":"paragraph","text":"主席先生，我愿向您保证，我将竭我所能致力于此项应尽任务之顺利完成。"},{"type":"paragraph","text":"我希望在完成此项光荣任务中，将得到您，主席先生，以及中华人民共和国中央人民政府方面的充分了解和支持。"},{"type":"paragraph","text":"毛泽东主席答词大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使呈递的蒙古人民共和国小呼拉尔主席团的国书，并感谢贵大使的热忱祝贺。"},{"type":"paragraph","text":"中蒙两国人民之间原已存在有密切的关系，数十年来，由于帝国主义和中国反动统治的挑拨离间，隔断了彼此间的来往。蒙古人民在十月革命的影响下，不但早已脱离了中国的反动统治，建立了真正的人民民主国家，而且正朝着经济、文化建设的发展道路前进，中国人民衷心地为蒙古人民的这一成就庆贺。现在，中国人民革命已基本胜利了，中蒙两国的外交关系业已建立，我相信，这不但将使贵我两国人民间的友谊更加发展与巩固，而且将有助于亚洲及世界的持久和平。"},{"type":"paragraph","text":"我热烈地欢迎阁下出任蒙古人民共和国驻中华人民共和国首任特命全权大使，并愿对贵大使加强两国合作的工作，予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并祝贵国元首健康。"},{"type":"paragraph","text":"（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12a65f90bf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
