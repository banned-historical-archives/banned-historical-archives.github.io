ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"在薄一波送审的一九五一年预算草案上的批语","alias":"","parts":[{"type":"paragraph","text":"在薄一波送审的一九五一年"},{"type":"paragraph","text":"预算草案上的批语"},{"type":"paragraph","text":"（1950年9月13日）薄一波同志："},{"type":"paragraph","text":"要有详细说明及两年比较，否则无法审查。因此（一）概算表须列出今明两年比较数学及明年比今年增减数字，表尾说明栏内亦要将今明两年的比较变化加以说明，方明历史演进；（二）各部分支出预算，须另造几张详表，指明每部分中的各项细目，例如军费的各项细目及两年历史比较，投资的各项细目及历史比较（例如工业投资的各项细目及两年的历史比较，其中如铁路投资要有每一条铁路的预算数字，水利投资要有每一条河流的数字，文教费要有每一项文教事业的数字及比较），其他类推。此项工作务请于九月廿五日以前办好送我。关于要有详细内容，还在八月政治局讨论此事我就向你提出了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十三日[1]薄一波，当时任政务院财政经济委员会副主任兼财政部部长。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":155,"page_end":155},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a38ed4437e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
