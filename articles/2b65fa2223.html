rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全军学用毛泽东军事思想成果显著军内130余名军事理论工作者及各大单位代表在合肥举行研讨","authors":["周涛"],"parts":[{"type":"paragraph","text":"总参谋长迟浩田向大会发来了贺信。中顾委常委宋时轮及军内130余名代表出席会议。"},{"type":"paragraph","text":"军事科学院院长蒋顺学、政委杨永斌在接受记者采访时指出，毛泽东军事思想以其完整严密的体系和博大精深的内容，极大地丰富了马克思主义军事理论，是我军建军和作战的胜利指南。党的十一届三中全会以来，军事理论战线在中央军委的正确领导下，顶住了资产阶级自由化思潮的冲击，将学习、研究和应用毛泽东军事思想不断推向新阶段。这次全军毛泽东军事思想学术讨论会，各大单位共提交论文近400篇，其中168篇参加大会发言。论文的作者不仅来自军事理论研究战线，而且有许多军队高层领导岗位上的带兵人，其中佩带将军军衔的作者便有90余人。"},{"type":"paragraph","text":"邓小平军事理论是毛泽东军事思想的一个重要组成部分。将毛泽东军事思想和邓小平军事理论结合起来进行研究，是全军毛泽东军事思想学习研究活动的一个显著特点。许多论文指出，邓小平同志的军事理论，特别是他的军队建设和改革理论，具有时代意义和中国特色，是今后我军建设和改革必须遵循的重要指导思想。强化毛泽东军事思想在我军的指导地位，就必须加强对邓小平军事理论和改革理论的研究。"},{"type":"paragraph","text":"旨在交流近年来的学习成果，以更好地弘扬毛泽东军事思想的这次全军毛泽东军事思想学术讨论会，是由军事科学院主持召开的。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b65fa2223"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
