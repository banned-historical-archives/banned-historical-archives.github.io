" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共贵阳市委监委关于省煤管局第一基建公司虚报冒领国家粮食情况的调查及处理意见","authors":[],"dates":[{"year":1962,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"中共贵阳市委监委关于省煤管局第一基建公司虚报冒领国家粮食情况的调查及处理意见","type":"title"},{"text":"贵州省煤管局第一基建公司自一九六一年七月至十二月共虚报冒领国家粮食52,256斤，菜油641斤，黄豆760斤以及其他副食品等。其手段主要是：（1）将散居户统计在集体户中和以逃跑、请假不归的统计为实有人数，七至九月共虚报1,494人，冒领多购国家粮食91,964斤，菜油584斤，黄豆590斤；（2）职工久假不归及逃跑、死亡不及时注销户口97人，共冒领国家粮食8，169斤，菜油57斤，黄豆163斤；（3）工种变动不及时更改吃粮标准，低工种吃高标准定量的553人，多购粮食3,026斤，高工种吃低标准定量的244人，少购粮食905斤，两项相抵仍多购粮食2,123斤。","type":"paragraph"},{"text":"该公司大量虚报冒领国家粮、油后：（1）供应长达两个月之久未入户的职工和家属352人；（2）供应无户无粮职工和家属211人；（3）被贪污分子从中贪污盗窃3,852斤。如粮食办公室干部何兴华（地主，已潜逃）和食堂事务长周恩惠勾结劳改释放犯何忠平，贪污地方粮票和全国粮票2,752斤，在贵阳、重庆等地高价出售1,030斤，得人民币1,847元。又如粮食办公室干部周祖祥，贪污粮票1,100斤，除高价出售部分外，并叫其爱人将粮票换其他物品做投机生意，共获取暴利1,000多元（周已交出现金850元，手表两块，全国通用粮票38斤和其他物资一部分；（4）乱批条子补助粮食及请客送礼等挥霍浪费。据沙冲工区调查，吃超过定量的186人，工区党总支书记战景光和工区主任毛玉同志，定量25斤，实际吃到33、35、38斤。调度员姚能光，定量30斤，实际吃到38、40、46斤。该公司还在一九六一年十月十七日擅自规定吃粮标准，对职工家属或多子女的职工等乱批条子给予补助，仅九月份多子女补助104户，334人，补粮505斤。","type":"paragraph"},{"text":"该公司虚报冒领国家粮食的错误是极为严重的，因此，我们意见并经市委同意，给予公管生活的副经理卜跃松同志党内严重警告处分，给予福利科副科长刘庆仁同志撤销副科长职务处分，对于从中贪污进行盗卖粮票牟取暴利的何兴华、周恩惠、周祖祥等人必须认真追查，进行严肃处理。","type":"paragraph"},{"text":" 1962年6月5日","type":"paragraph"},{"text":"中共贵州省委监察委员会办公室 1962年6月18日；打字：潘  校对：谭。","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7da6e2cac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
