art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"极其沉痛地哀悼周恩来总理逝世","authors":[],"parts":[{"type":"paragraph","text":"摩洛哥首相奥斯曼的唁电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国副总理"},{"type":"paragraph","text":"邓小平先生："},{"type":"paragraph","text":"我十分沉痛地获悉中华人民共和国总理周恩来不幸逝世。周恩来总理是当代伟大人物之一，他的品德深刻地影响了伟大的中国人民的历史。在这悲痛的时刻，我谨以个人的名义，并且代表哈桑二世国王陛下政府向你表示沉痛的哀悼，并请向伟大逝世者的家属转达我们诚挚的慰问。"},{"type":"paragraph","text":"顺致崇高的敬意。"},{"type":"paragraph","text":"摩洛哥王国政府首相 艾哈迈德·奥斯曼"},{"type":"paragraph","text":"一九七六年一月十九日于拉巴特"},{"type":"paragraph","text":"巴林国埃米尔哈利法的唁电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国"},{"type":"paragraph","text":"国务院首脑阁下："},{"type":"paragraph","text":"我们非常悲痛和十分惋惜地获悉周恩来总理阁下逝世。我们向你、向中国政府和人民哀悼和慰问。"},{"type":"paragraph","text":"巴林国埃米尔 伊萨·本·苏莱曼·哈利法"},{"type":"paragraph","text":"一九七六年一月十七日于巴林"},{"type":"paragraph","text":"伊拉克革命指挥委员会副主席萨达姆·侯赛因的唁电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国国务院副总理邓小平先生："},{"type":"paragraph","text":"极其沉痛地获悉中华人民共和国国务院总理周恩来先生逝世的消息，谨向阁下和阁下的同事及逝世者的家属对这一巨大的损失表示沉痛的哀悼。祝友好的中国人民永远进步繁荣。"},{"type":"paragraph","text":"伊拉克共和国革命指挥委员会副主席 萨达姆·侯赛因"},{"type":"paragraph","text":"喀麦隆副议长等前往我使馆吊唁"},{"type":"paragraph","text":"新华社一九七六年一月二十日讯 喀麦隆副议长哈吉·穆萨·亚雅·萨尔基法达一月十八日前往中国驻喀麦隆大使馆，深切哀悼周恩来总理逝世。"},{"type":"paragraph","text":"一月九日，巴勒斯坦解放组织前主席艾哈迈德·舒凯里前往中国驻埃及大使馆，对周恩来总理逝世表示哀悼。"},{"type":"paragraph","text":"几内亚和佛得角非洲独立党已故总书记阿米卡尔·卡布拉尔的夫人安娜·玛丽亚·卡布拉尔一月十九日到中国驻几内亚比绍大使馆，哀悼周恩来总理逝世。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bca5b13911"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
