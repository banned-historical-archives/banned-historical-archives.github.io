":[{"year":1968,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"我们伟大领袖毛主席的“五·七”指示发表即将两周年了。“五·七”指示，这是一个具有伟大历史意义的极其重要的文献，是巩固无产阶级专政、防止资本主义复辟的根本措施，是建设社会主义、逐步过渡到共产主义的宏伟纲领。毛主席的“五·七”指示，对于当前正在深入开展的无产阶级文化大革命，有着十分深刻的指导意义。目前，各级革命委员会正在全面落实毛主席关于革命委员会的最新指示、关于阐明无产阶级文化大革命伟大意义的最新指示，坚决打击右倾翻案妖风，反对右倾分裂主义、右倾投降主义、右倾保守主义。我们要更加迅速地行动起来，赶紧把毛主席的最新指示条条落实下去，创造出更多的新经验，以“一切想着毛主席，一切服从毛主席，一切紧跟毛主席，一切为着毛主席”的实际行动，迎接毛主席“五·七”指示发表两周年。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"767aaf8005"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
