ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于审查藏文广播问题","alias":"","parts":[{"type":"paragraph","text":"关于审查藏文广播问题！"},{"type":"paragraph","text":"（1950年5月13日）请李维汉负责审查藏文广播并规定该项广播内容及方针。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十三日"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央西南局1950年5月3日关于转报甘孜情报站的情况给中央的报告上的批语。甘孜情报站的报告中说：有藏人反映，北京藏语广播曾播出“西藏人民系受神权与贵族双重压迫，我们决来解放你们”这样的话。如果以武力解决西藏问题，这样说是可以的。否则，不必如此，特别是在西藏又具向内之心的情况下，应争取达赖。如此，则解放西藏可收事半功倍之效。"},{"type":"paragraph","text":"[2]李维汉（1896—1984），又名罗迈，湖南长沙人。当时任中共中央统战部部长、中央人民政府民族事务委员会主任委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":388,"page_end":388},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a6e986005"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
