<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"继承一个破烂摊子面临一堆棘手问题  尼克松的日子比约翰逊更加难过  西方资产阶级报刊哀叹美国新政府前景黯淡","authors":[],"dates":[{"year":1969,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"继承一个破烂摊子面临一堆棘手问题"},{"type":"paragraph","text":"尼克松的日子比约翰逊更加难过"},{"type":"paragraph","text":"西方资产阶级报刊哀叹美国新政府前景黯淡"},{"type":"paragraph","text":"新华社二十九日讯　在约翰逊怀着“痛苦的心情”灰溜溜地滚下总统“宝座”，尼克松强打精神、粉墨登场的时候，美国和其他西方国家的资产阶级报刊以及尼克松新内阁的头面人物，回顾过去、瞻望未来，纷纷绝望地哀叹尼克松在美国政治、经济、军事危机的“深渊”中，日子只会比约翰逊更加难过。"},{"type":"paragraph","text":"西方资产阶级报刊普遍认为，尼克松从约翰逊那里继承下来的是一个残破的烂摊子。他刚一跨进白宫的大门，摆在面前的棘手问题就有“一大堆”：侵越战争屡遭惨败，财政危机深重，通货膨胀如“脱缰之马”，美元地位岌岌可危，美国国内和世界各地人民革命斗争蓬勃发展等等。"},{"type":"paragraph","text":"在国际方面，美国垄断资产阶级的喉舌《美国新闻与世界报道》周刊给这个刚上台的美帝新头目描绘了一幅黯淡的图景。"},{"type":"paragraph","text":"这家周刊写道：侵越战争是“一个庞大的帝国在遥远的地方进行的、谁都不知其道义理由的战争”。它使美国“在全世界威信扫地”，并且惊人地消耗美国的人力物力。在中东，阿拉伯人民反对美帝侵略工具以色列的斗争对美帝的利益是一个“越来越大的危险”。在非洲，人民革命武装斗争深入发展，“局势也很紧张”。在西欧，“盟国陷于四分五裂，它们的货币制度处在危险中”。"},{"type":"paragraph","text":"《基督教科学箴言报》谈到，美帝国主义的“后院”——拉丁美洲是一个“比新总统面临的其他麻烦地区更麻烦的地区。”美帝为了推行新殖民主义而炮制的“争取进步联盟”遭到破产，需要“重新进行全面的估价”。"},{"type":"paragraph","text":"正是在这种情况下，尼克松的高级智囊、外交决策顾问基辛格在一篇关于美国对外政策的文章中不得不承认，美帝妄想称霸世界的反革命“全球战略”惨遭失败。"},{"type":"paragraph","text":"他哀叹说：“美国不再能够实行全球性的计划了”，“不再能够把它所喜欢的解决办法强加于人了。”“在最好的情况下，新政府也将面临各种危机。”"},{"type":"paragraph","text":"尼克松政府的国防部长莱尔德在重重危机面前胆战心惊，他说，他自己是在美国“历史上最危险的时期上任的”。"},{"type":"paragraph","text":"在美国国内，使尼克松感到最头痛的问题是汹涌澎湃的群众运动的发展。美国工人阶级、黑人群众和广大被压迫人民正在加速觉醒，他们的斗争猛烈地冲击着美国垄断资本的反动统治。"},{"type":"paragraph","text":"美国的《时代》杂志在回顾去年美国黑人在一百六十八个城市中进行抗暴斗争时，心有余悸地说，“其他地方的抗议行动都没有象在美国那么广，那么有力。”“越来越多的富于战斗性的黑人把自己武装起来了”。"},{"type":"paragraph","text":"美国统治集团为了转嫁财政经济危机，加紧对劳动人民的压榨，激起了美国人民的强烈反对。"},{"type":"paragraph","text":"《明星晚报》惊呼：一九六八年美国的罢工次数达四千九百五十次，是十五年来最高的数字，罢工所造成的工时损失是十年来最多的。尽管美国政府禁止雇员罢工，但政府雇员举行罢工也成了“家常便饭”。今年以来，美国工人斗争有了新的发展。对此，美国报刊忧心忡忡地哀叹这将给美国统治集团带来更严重的“麻烦”。"},{"type":"paragraph","text":"美国进步学生反对反动腐朽的教育制度的斗争的迅速发展，也使美国统治集团焦虑不安。"},{"type":"paragraph","text":"《时代》周刊写道：“哥伦比亚大学去年春天几乎被他们搞垮”。"},{"type":"paragraph","text":"《美国新闻与世界报道》预言，在新的一年中，进步学生运动还会进一步加强，“暴力斗争会有增加，自发的暴力行动将转为有计划的暴力行动”。"},{"type":"paragraph","text":"面对着国内外的重重危机，尼克松为了麻痹人民的斗志，一上台就大肆玩弄反革命两面手法，他在“就职演说”中用了一大堆漂亮的词藻。然而，尼克松的虚伪言词，掩饰不了他内心的恐慌。"},{"type":"paragraph","text":"英国《卫报》二十一日说：尼克松“花了漫长的日日夜夜的时间拟写的、他毕生最重要的这篇演说，调子很低、措辞暧昧、空洞无物。”"},{"type":"paragraph","text":"许多报刊指出尼克松从约翰逊那里接过来的一系列危机将使他的日子比他的前任不好过得多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df7d384fb7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
