art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"他能读毛主席的语录了","authors":["广州部队总医院神经外科主任刘明铎"],"parts":[{"type":"paragraph","text":"麦贤得同志负伤后，先在某地医院治疗，去年八月十五日转入广州部队总医院继续治疗。刚转入我院时，还有意识障碍，不能说话，也不能吃东西；视神经乳头有水肿；因为颅前凹右侧筛板处有骨折和该处脑膜有很大的破损，脑脊液时常由右鼻孔流出来。"},{"type":"paragraph","text":"经过治疗、护理和脑部手术，意识逐步恢复，视神经乳头水肿已消退，筛板骨折和脑膜破损已用手术修补好了，鼻孔不再流脑脊液了。现在，已能自己吃东西，能自己走动；能念毛主席语录，能用左手写字；能唱《我是一个兵》、《东方红》、《学习雷锋好榜样》和《毛主席的战士最听党的话》等歌曲了。但讲话还差，只能作简单答话，右手不大灵活，动作比较迟缓。目前，我们正在为进一步恢复麦贤得同志的健康而努力。RW：麦贤得；战斗英雄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55dbf86d0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
