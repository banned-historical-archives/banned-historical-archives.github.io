<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"社会主义人事制度万岁！——斥右派分子黄席群的[阎罗王考]","authors":["蒋同式","西北畜牧兽医学院讲师"],"dates":[{"year":1957,"month":8,"day":23}],"is_range_date":false,"parts":[{"text":"社会主义人事制度万岁！——斥右派分子黄席群的[阎罗王考]","type":"title"},{"text":"西北畜牧兽医学院讲师蒋同式","type":"authors"},{"text":"凡是我们歌颂的事物，右派分子就痛恨、诅咒。这是一个规律。不是吗？我们拥护共产党，盛赞社会主义的成就，欢呼保证社会主义建设和改造事业顺利进行的人事制度万岁！而右派分子却声言要“杀共产党人”，污蔑社会主义“一团糟”，谩骂执行社会主义人事制度的机构是杀气腾腾的“阎王殿”。","type":"paragraph"},{"text":"西北畜牧兽医学院的右派分子黄席群在他的一张题名为“阎罗王考”的大字报里，不仅把我们盛赞的社会主义社会喻为阴曹地府，把我们敬爱的毛主席比作“玉皇大帝”，而且明目张胆地攻击人事部门。他污蔑人事部门是“阎王殿”，是“治罪人的法庭”，说人们“听到人事处的传呼，便感到胆战心惊，凶多吉少。”在污蔑中，黄席群还挖心呕血地给人们制造这样一个印象：人事部门对党团员是“热烘烘的”，对其他人则是“阴森森的”；人事部门把除党团员之外的人都看作是“罪人”、“嫌疑犯”，甚至使这些人因而成为“屈死鬼”也在所不惜。似乎是，党团员是专门“整人的”，而群众则是“挨整的”。这种谎言本不值一驳，因为，除别有用心的右派分子之外，谁也不会有这样的感觉，不会这样仇恨人事部门。然而，从这几句谎言中，我们倒可以看出黄席群的真面目。试想想，这种有意把群众和党团员对立起来的滥调，不正和右派分子杨子恒的“一千二百万党员是一个立场，五亿八千万人民又是一个立场”的谬论一样吗？如果说他们之间还有什么不同，我以为这不同之处只在于一个是使的明枪，另一个是用的暗箭，其阴险、恶毒并不差分毫。","type":"paragraph"},{"text":"黄席群为什么如此痛恨人事部门，又如此热衷于煽动群众向人事部门开刀呢？这是因为人事部门是贯彻执行党和国家干部政策与管理干部的机构；人事部门是按照党和国家的德才兼顾的原则来甄选干部，以保证社会主义建设和改造事业顺利进行的。取消人事部门，就意味着从组织上取消党对社会方义建设和改造事业的领导，而这样右派分子便可以胡作非为，从根本上取消社会主义。许多右派分子都抓着这个关键向党和社会主义展开了攻击。自诩为反共嗅觉锐敏到如“苍蝇飞过也能辨出雌雄”的右派野心家黄席群，自然更不肯放过这个“主要目标”。因此，他一再骂人事部门是“三害的堡垒”、“ 三害的大本营”、“三害的神经中枢”、“阎王殿”，甚至最后叫嚣着要改组人事部门。","type":"paragraph"},{"text":"人事部门根据德才兼顾的原则提拔干部，而一切右派分子都是缺德少才的；人事部门要了解干部的思想情况，而所有右派分子的思想中都充满着卑鄙污秽的资产阶级的货色。人事部门要审查干部的历史，而许多右派分子的历史上都有着不可告人的东西。这就使那些别有用心的的右派分子对人事部门满怀仇恨。说人事部门是“阎王殿”，这只能是右派分子“内心里的真实反映”，听到人事部门“传呼”“便感到胆战心惊，凶多吉少”的也只是一小撮右派分子。因为他们心怀鬼胎，时时都在担心露了马脚。右派分子企图把这种感觉说成是群众的感觉，不只是对党和人事部门的污蔑，而且是对群众的污蔑。黄席群妄想借此煽起群众向党开火，也是枉费心机。我们仍然要欢呼：社会主义的人事制度万岁！不仅欢呼，我们还决心以自己的一切来保卫这个制度，保卫党和社会主义。让那些野心勃勃而又自不量力的资本主义余孽永远“胆战心惊”吧！","type":"paragraph"},{"text":" --- 原载《甘肃日报》1957年8月23日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de41dd679e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
