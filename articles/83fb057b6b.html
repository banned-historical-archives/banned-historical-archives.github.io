" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji51","name":"毛泽东全集第51卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"苏联的战略重点在欧洲和中东","alias":"","parts":[{"type":"paragraph","text":"苏联的战略重点在欧洲和中东！"},{"type":"paragraph","text":"（1975年4月20日）"},{"type":"paragraph","text":"毛泽东（以下简称毛）：欧洲人来，我都劝他们要注意苏联。现在的世界不太平，不安宁。你们不要怕我们，我们不会侵略到你们欧洲去。"},{"type":"paragraph","text":"莱奥·廷德曼斯（以下简称廷）：我正是接受了你们的友好邀请才来访问的。"},{"type":"paragraph","text":"毛：我希望你们团结起来。"},{"type":"paragraph","text":"廷：我们两个人都在致力于实现欧洲团结。我认为我们这一代人的主要任务就是实现欧洲、西欧的统一，实现欧洲一体化。"},{"type":"paragraph","text":"毛：这个好，我们赞成。"},{"type":"paragraph","text":"廷：我可以提一个问题吗？主席先生曾两次去过莫斯科，你是什么时候发现不能再和苏联友好下去的？"},{"type":"paragraph","text":"毛：他们骂我们，毁了合同，撤了人员。他们偏印度人，反对我们。他们要来，我们就不客气。现在是打舌仗。"},{"type":"paragraph","text":"他们现在还不敢侵略中国。我看他们主要的战略重点在欧洲、中东。我不是吓你们，我是希望你们注意，不然会吃苏联人的亏。"},{"type":"paragraph","text":"[1]这是毛泽东会见比利时首相莱奥·廷德曼斯时谈话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":545,"page_end":545},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83fb057b6b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
