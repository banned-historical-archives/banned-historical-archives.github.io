month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在北京开会的战斗英雄们，当他们看到了毛主席的时候，在“东方红”的乐声中，在历久不息的掌声中，他们虽然都是铁打的汉子，但都兴奋得流下泪来。"},{"type":"paragraph","text":"只要闭目想想，这是多么一种动人的景象!"},{"type":"paragraph","text":"在毛主席领导下，三四千年的旧中国获得新生，三四千年来的被压迫者站了起来。所以，中国人民对毛主席的感激之情，实在是无法形容的，今天每个中国人民第一个愿望敢说就是看看毛主席。"},{"type":"paragraph","text":"女战斗英雄郭俊卿说，她看到了毛主席，更鼓舞了她的战斗意志，和更增加了战斗力量。"},{"type":"paragraph","text":"是的，她的话是全中国人民想说的话。在毛主席照耀下，中国人民巳结成了一个战斗的整体。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a62d54a68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
