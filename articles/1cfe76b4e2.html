ar":1946,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北平八日下午九时加急专电】　停战令下后，东北是否已真正停战，尚未得切实报告。国军方面，杜聿明长官已下令停战，共军在松花江一带，本采守势，国军如不攻，战事自不致发生。此间一般观察，东北军事之能否停下，要看这十五天内双方军队是否停止调动，否则仅停止进攻，则十五天后可能发生更可怕之战事。军调部中共代表叶剑英，定日内返延安一行。"},{"type":"paragraph","text":"【本报北平八日专电】　军调部政府及中共双方负责人，对十五日停战协定，拒绝发表意见，仅称一切静候南京指示，同时政府及中共即将调派干员赴长春，协同白鲁德工作，政府方面为钮先铭，中共方面饶漱石。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cfe76b4e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
