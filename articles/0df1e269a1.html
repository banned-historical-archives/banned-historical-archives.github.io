s":["建平·炳耀"],"dates":[{"year":1951,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　在“八一”建军节前夕，本市很多烈军属写信向毛主席和朱总司令致敬，并报告他们的生活情况，有的将各界人民对他们的优待和帮助的情形写信告诉他们在国防前线的亲人，鼓励他们加倍努力，捍卫祖国。法华西镇军属金如训老先生在写给毛主席、朱总司令的信中说:“上海解放二年来，人民政府经常派同志来慰问我家，称我家为“光荣之家”、“模范家庭”。今年元旦，我收到了陈毅市长寄给我的贺年片。最近上海市土产展览交流大会又邀请我们去参观，送给我们东西。我欣赏了祖国的物产，深深地感觉到祖国的伟大与可爱。我虽爱我的儿子，我更爱那伟大的祖国；因此我写信告诉我的儿子，要他在部队里加紧学习军事技术，来捍卫祖国。"},{"type":"paragraph","text":"“今天“八一”建军节二十四周年的时候，我们地区里的居民委员会把我以前一间简陋矮小倾斜歪倒的房子重新翻造成宽敞高大的新房子。又免费给我妻子治病；送给我许多实用品，协助我解决生活困难。我感激得说不出话来，心里想:毛主席领导下的祖国人民是多么可爱啊!”"},{"type":"paragraph","text":"住在本市闸北区共和新路五十九弄二十号的军属尤竹轩老先生，他今年六十七岁，他的儿子在解放军某部政治部工作。尤老先生在“八一”节前写信给他的儿子，鼓励他在部队里好好工作，并且叫他不要再为家庭挂念，虽然他自己年纪大了，但政府照顾他很周到。(建平·炳耀)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0df1e269a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
