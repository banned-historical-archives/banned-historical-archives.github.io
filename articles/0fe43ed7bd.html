"dates":[{"year":1968,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广大贫下中农活学活用毛泽东思想"},{"type":"paragraph","text":"许昌地区夺得早烟丰收"},{"type":"paragraph","text":"我国著名的烤烟产区河南省许昌地区，广大贫下中农和革命干部对伟大领袖毛主席心怀一个“忠”字，对战无不胜的毛泽东思想狠抓一个“用”字，发扬敢于斗争、敢于胜利的大无畏革命精神，夺得了今年全区六十四万亩早烟的优质高产，创造了全区烤烟生产的新纪录。今年许昌地区的新烟具有色泽好，油分足，香味浓等特点，平均单产超过往年。社员们激动地说：今年的烤烟这么好，是活学活用毛泽东思想的成果，是毛主席无产阶级革命路线的胜利！"},{"type":"paragraph","text":"目前，许昌地区广大贫下中农和革命干部，正以“只争朝夕”的革命精神，一面加紧早烟的收烤、交售，一面积极加强晚烟的田间管理，决心夺取今年烤烟生产的更大丰收。"},{"type":"paragraph","text":"（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fe43ed7bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
