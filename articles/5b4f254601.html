[{"year":1952,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523n020701.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(13)一九五○年冬，中央人民政府决定在全国各大城市制造纺织机的消息传到。“星四聚餐会”的首脑分子余桂铨、印仁基立即召集一家工厂负责人开紧急会议。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523n020702.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(14)到会各厂负责人一致表示“坚决拥护组织”、“坚决争取制造纺织机”，随即成立了“十一厂联络处”，由印仁基等五人主持“对内”，由余桂铨等三人为飞京接洽承制纺织机的“全权代表”。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523n020703.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(15)他们经常的联络地点是民国路一六八号，从“十一厂联络处”成立到工程掌握在手，先后开过三十六次会议。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523n020704.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张伯诚,汪伟光,王木天\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(16)他们派人在北京讨论的各种机件单价，要拿到这里研究，各种合同要经这里批准，工程任务由他们统一分配，原料统一购买，甚至偷工减料也是统一安排。"},{"type":"paragraph","text":"张伯诚　汪伟光　王木天　合绘"},{"type":"paragraph","text":"钱子凡　改编\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱子凡\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b4f254601"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
