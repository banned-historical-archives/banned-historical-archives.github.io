s":[],"dates":[{"year":1968,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在美帝苏修和印度反动派残酷剥削压迫下"},{"type":"paragraph","text":"印度两亿人长期挨饿苦难深重"},{"type":"paragraph","text":"新华社伦敦电　在美帝、苏修和印度反动派的残酷剥削和压迫下的印度人民，处在饥饿的苦难之中。现在，印度有二亿人长期吃不饱，百分之八十的幼儿患“营养不良萎缩症”。"},{"type":"paragraph","text":"这是英国资产阶级报纸《星期日镜报》的记者不久前在这家报纸上透露的印度的黑暗的现状。"},{"type":"paragraph","text":"这个记者说：“我被要求去了解一些救济工作的情况。我看见居住在比哈尔邦伽耶车站的老年人每天在等待着运输谷物的口袋，希望有少量的谷物会从这些口袋中漏出来，他们就可以把它们括集起来充当一餐，即使这样要花费三天的时间。"},{"type":"paragraph","text":"“我在帕拉毛看到一位母亲在乞求较多一些的食物，因为她胸前抱着一个濒临死亡的孩子。一位奥克斯范救济所的工作人员说，‘当我看见他们的骨瘦如柴的手臂和腿时，我简直不能相信他们之中有谁还活着。’”"},{"type":"paragraph","text":"这个记者说：“我看到的村庄土房都快倒塌了。我看到妇女们从凌晨到火热的中午一直蹲在地里为家畜挖掘青草嫩苗。我看到孩子们在地上爬来爬去寻找青草吃。我看到每天都能看到的兀鹰盘旋在天空中的景象。它们等待着……"},{"type":"paragraph","text":"“这就是比哈尔（邦）的景象。”"},{"type":"paragraph","text":"这个记者还说：“在五亿印度人中，有二亿人长期营养不足。孩子们挨饿的景象是一个人难以遗忘的……污垢的皮肤，鼓胀的肚子，应该是漆黑的头发已变白，疏稀脱落。许多孩子都有着眼疾和耳疾。一个在海得拉巴的政府调查队估计，在印度五岁以下的小孩，有百分之八十还在受着‘营养不良的萎缩症’的折磨。这对身体有极坏的影响。但现在不断增加的迹象表明，食物的缺乏同样对智力也有影响。它有害于大脑。这是最糟糕的恶性循环。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e288ac079"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
