script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"保共中央号召电影工作者同修正主义作斗争捍卫社会主义现实主义道路指出无阶级性的人道主义倾向和抹杀党性是主要缺点","authors":[],"dates":[{"year":1958,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社索非亚10日电】　为使电影更好地为社会主义建设服务，保加利亚共产党中央批判了电影艺术中的缺点。保加利亚电影事业在人民政权的年代里获得了很大的发展。为了使电影事业更好地为社会主义建设服务，最近，保共中央就电影事业的状况作了一项决议，指出了目前电影艺术存在的主要缺点和今后的任务。"},{"type":"paragraph","text":"到去年年底为止，保加利亚就已经生产了28部故事片，比解放前资产阶级统治的66年中所生产的故事片还要多。预计，今年1年就要生产8部故事片。如果考虑到保加利亚是从1950年才开始生产第一部故事片的话，那么社会主义制度的优越性就更明显了。"},{"type":"paragraph","text":"保共中央8日关于电影事业的决议中指出，目前保加利亚电影艺术方面的主要缺点是:某些电影作品表现了一定程度追求无阶级性的抽象人道主义主题的倾向，抹煞和降低了影片鲜明的共产主义思想性和党性。决议说，这表明了近年来个别电影工作者的创作活动开始远离人民、远离党的原则和社会主义现实主义，受了那些同社会主义现实主义相抵触的电影艺术观点和方法的影响。"},{"type":"paragraph","text":"决议指出，保加利亚的电影艺术今后必须沿着经过生活考验的社会主义现实主义道路发展。电影工作者必须同电影艺术中的各种修正主义企图进行坚决斗争，捍卫社会主义现实主义方法，同时也不减弱同教条主义、公式主义和粉饰现实等不良现象作斗争。"},{"type":"paragraph","text":"决议还强调指出，今后要加强电影艺术部门中党组织的作用，加强对电影工作人员的政治思想教育。电影艺术部门中的党组织要系统地研究电影创作的主要问题，创造一种深刻思考，自由地和批判地研究影片创作问题的气氛。"},{"type":"paragraph","text":"决议还谈到，今后生产的影片，主要应该以保加利亚城乡劳动人民的现实生活为题材，反映劳动人民在建设社会主义中的精神和道德面貌。同时还必须创作能鲜明反映保加利亚人民过去在保加利亚共产党领导下反对法西斯主义和资本主义的英勇斗争的影片。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"345ce53d7c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
