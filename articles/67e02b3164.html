art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想永远是指引革命人民胜利前进的明灯","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年十月七日讯 据“马来亚革命之声”电台九月三十日广播，马来亚共产党人、马来亚民族解放军指战员和革命人民，连日来举行各种活动，沉痛哀悼毛泽东主席逝世。"},{"type":"paragraph","text":"广播说，马来亚共产党中央委员会九月九日向全党全军和全国各革命群众组织发出公告，决定丛九月九日至十八日为伟大导师毛泽东主席的不幸逝世志哀。"},{"type":"paragraph","text":"广播说，“在中央机关和边区我军各支队，在哀悼期间，都设灵堂，挂毛主席遗像，并敬献了花圈。”“各支队、各突击队的全体战士多次在清晨或晚上集队，在毛泽东主席遗像前默哀致敬。”"},{"type":"paragraph","text":"广播说，“九月十八日晚上，我党各单位，我军各支队、各突击队和各革命群众组织，都隆重举行伟大导师毛泽东主席追悼大会或追悼仪式。”“在根据地和游击区，各单位按具体情况，在群众中普遍举行伟大导师毛泽东主席追悼大会或其他形式的追悼活动。许多群众参加了追悼大会，有的群众还带着子女一起来参加，对毛主席的逝世表示最沉痛的哀悼。”"},{"type":"paragraph","text":"广播说，在深切悼念伟大导师毛泽东主席的时候，全体同志以无限崇敬的心情，缅怀毛主席为中国革命和世界革命建树的丰功伟绩，缅怀毛主席对我国革命的伟大的国际主义支援。“全体同志一想到伟大导师毛泽东主席和我们永别了，都感判无比悲痛，禁不住热泪盈眶，许多同志泣不成声。”"},{"type":"paragraph","text":"广播说，“伟大导师毛泽东主席与世长辞了，但他的英名和业绩将永世长存。最敬爱的毛主席永远活在我国和世界革命人民心中，战无不胜的毛泽东思想永远是指引我国和世界革命人民胜利前进的明灯。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67e02b3164"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
