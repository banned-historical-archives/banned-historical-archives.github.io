tart":11,"page_end":11,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"开车送毛主席开会","authors":[],"parts":[{"type":"paragraph","text":"在延安时，毛主席乘坐他开的大卡车，对他说：要好好干革命，将来革命胜利了，汽车有的是。这成为空军修建一总队原副总队长张增瑞永恒的记忆——"},{"type":"paragraph","text":"1938年6月，我们被调到延安兵站部。那里有从新疆运来的苏联十轮卡车，叫“羊毛”车，很笨重。当时延安没有小车，中央领导同志外出就乘坐这些卡车。我们行驶的路线，南至西安办事处，有时也去重庆办事处；北到米脂、绥德、宋家川等地。"},{"type":"paragraph","text":"1939年春，正是冰河解冻时节，汽车队长彭传清同志通知我，有重要任务，把车子很好检查一下。第二天早饭后，彭队长通知我把车开到杨家岭，说有首长要出去。从头晚起我就猜想很可能是毛主席要用车。第二天，我把车开到指定地点等候。大约等了1个小时，从窑洞里出来一个警卫班上了车，接着一位首长来了，我一看，正是毛主席。他一身灰色棉衣，棉裤腿上有一块补丁，脚穿一双青布齐口鞋，戴一顶深灰色棉帽。我站在车前看着他，不知说什么好。还是毛主席先对我说：“工人同志们好！”我这才想起来向毛主席问好，并和毛主席握了握手。毛主席坐进了驾驶室，警卫员告诉了行车方向。这条路线没有公路，只有大车道，一直沿着延河上行。在路上，毛主席问我是哪里人？什么时候参加革命的？他还说：“要好好干革命，将来革命胜利了，汽车有的是。”在车上，毛主席除同我说些话外，一直在看书。下午，毛主席开完会又乘车返回，在过延河时，车子被冰块卡住了，怎么也开不出来。毛主席说：“不要急。”他派警卫员去安塞弄来几头牛才把车拖了出来。回到杨家岭，毛主席对我说：“工人同志，你辛苦了，谢谢你。”这次开车，使我终生难忘。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"820d87c4d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
