],"dates":[{"year":1988,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"波兰在罢工地区实行宵禁"},{"type":"paragraph","text":"内务部长说不允许无法制无政府状态"},{"type":"paragraph","text":"新华社华沙8月22日电  波兰内务部长基什查克上将今晚在华沙电视台宣布，鉴于波兰目前罢工形势的发展，他已指示卡托维兹、什切青和格但斯克3个省省长在公民安全面临威胁的某些地区实行宵禁。"},{"type":"paragraph","text":"基什查克是以波兰部长会议遵守法律、公共秩序和社会纪律问题委员会主席身份就波兰国内局势发表这一谈话的。"},{"type":"paragraph","text":"基什查克说，目前的形势严重地危害民族谅解的进程、气氛和前景。只有停止破坏社会秩序的违法行为，尤其是停止非法的罢工，才有可能继续并扩大建设性的对话。"},{"type":"paragraph","text":"这位部长还说，他已命令治安力量，不允许那些与罢工的厂区无关的人员继续留在罢工厂区进行有害社会利益的行动。治安力量要加强它担任警卫的工厂的内部保卫工作。"},{"type":"paragraph","text":"基什查克最后说，“随着形势的进一步发展，我们将动用符合现行法律的相应手段。我们不允许波兰成为无法制的、无政府状态的国家。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e8a50f113"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
