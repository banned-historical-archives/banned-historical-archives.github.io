,"authors":[],"dates":[{"year":1977,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奥地利共产主义同盟中央书记林德纳的贺信"},{"type":"paragraph","text":"中共十一大继承毛主席革命事业争取更大胜利"},{"type":"paragraph","text":"新华社一九七七年九月十六日讯　奥地利共产主义同盟中央委员会书记瓦尔特·林德纳最近写信给中国共产党中央委员会和华国锋主席，衷心祝贺中国共产党第十一次全国代表大会的召开。"},{"type":"paragraph","text":"贺信说：“在中国共产党第十一次代表大会召开之际，奥地利共产主义同盟中央委员会谨向中国共产党中央委员会致以衷心的革命的祝贺。我们坚决拥护和支持十一大作出的各项决议。党的第十一次代表大会是中国共产党历史上的一个里程碑，它也是巩固和发展粉碎‘四人帮’所取得的伟大胜利，捍卫和运用中国共产党的马克思列宁主义的思想和政治路线，特别是毛主席关于无产阶级专政下继续革命的伟大理论，以及在中国全面开展阶级斗争，继续进行无产阶级革命并推动社会主义建设迅猛发展的一个里程碑。”"},{"type":"paragraph","text":"贺信说，“党的第十一次代表大会将作为一个极其重要的事件载入中国共产党的光荣史册。”“十一大为中国人民、中国工人阶级和中国共产党人取得新的更大的胜利奠定了基础，为继续执行和全面实现毛主席开创的事业和毛主席制定的中国共产党的对内对外政策创造了条件。”"},{"type":"paragraph","text":"贺信指出，“全世界革命人民曾以极大的关切心情注视着中国共产党和中国人民与‘四人帮’这一小撮不肯改悔的走资派之间所进行的马列主义同修正主义、革命同反革命的巨大搏斗。在打倒‘四人帮’以后，在中国共产党中央委员会越来越全面地揭露出‘四人帮’的本质和他们的政策以后，巨大的忧虑即代之以无比的欢欣鼓舞。中国共产党历史上的第十一次重大路线斗争具有极大的世界历史的和国际的影响和意义。”"},{"type":"paragraph","text":"贺信最后说，“中国共产党第十一次代表大会使我们非常欢欣鼓舞，并使我们充满胜利的信心。中国人民的胜利和对世界无产阶级革命的贡献鼓舞着我们更好地完成我们的政治任务，在奥地利准备进行无产阶级革命，为争取世界上一切革命力量的团结而斗争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce6ddf098e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
