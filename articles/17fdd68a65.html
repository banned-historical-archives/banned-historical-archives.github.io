":1954,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"格罗查主席电谢毛泽东主席"},{"type":"paragraph","text":"【新华社三十一日讯】乌兰巴托消息：罗马尼亚人民共和国国民议会主席团主席彼·格罗查博士，在返国途中于三十日下午到达乌兰巴托并停留一天。"},{"type":"paragraph","text":"三十日到机场欢迎的有蒙古人民共和国大人民呼拉尔主席团主席桑布，副总理曾德，蒙古人民革命党中央委员会书记拉姆苏伦，内务部部长占奇布，外交部副部长伊丹甲布和乌兰巴托市劳动人民代表呼拉尔执行局主席巴格等人。"},{"type":"paragraph","text":"到机场欢迎的还有：苏联驻蒙古大使皮萨列夫、中华人民共和国大使何英和朝鲜民主主义人民共和国大使洪东哲。"},{"type":"paragraph","text":"格罗查在抵达乌兰巴托后，致电中华人民共和国毛泽东主席。电文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国主席毛泽东同志："},{"type":"paragraph","text":"当我离开伟大中国人民的祖国国境的时候，请允许我，向您再一次致深切的谢意。"},{"type":"paragraph","text":"格罗查  十月三十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17fdd68a65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
