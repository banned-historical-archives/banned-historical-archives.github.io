art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"理论界纪念毛泽东《愚公移山》发表六十周年","authors":["黄昆仑"],"parts":[{"type":"paragraph","text":"60年前的6月11日，在抗日战争即将夺取最后胜利、我国面临两个命运抉择的重要关头，毛泽东同志以《愚公移山》为题作了中共七大闭幕词，意味深长地讲述了愚公移山的故事，并赋予这个寓言故事以新的内涵和时代精神。从此，《愚公移山》作为中共七大的重要文献，成为具有历史意义的毛泽东思想的经典篇目载入史册，愚公精神则成为中国共产党团结带领全国各族人民战胜一切困难险阻、从胜利走向胜利的强大精神动力。"},{"type":"paragraph","text":"与会专家学者认为，深入研讨《愚公移山》，挖掘愚公精神的科学内涵和时代价值，探索弘扬愚公精神的途径，对于落实科学发展观和构建社会主义和谐社会，具有重要的现实意义。愚公精神的核心是信仰、信念、信心问题。党的事业的得失成败和前途命运，很大程度上就取决于全党同志的信仰、信念、信心问题解决得如何。只有保持敢想敢干的昂扬锐气、开拓进取的精神状态、团结奋斗的优良作风和坚韧不拔的顽强意志，才能克服前进征途上遇到的各种困难，才能在改革开放的伟大实践中不断赋予愚公精神以新的时代价值。"},{"type":"paragraph","text":"全国党建研究会会长张全景、中华全国总工会副主席苏立清、中央党校副校长李君如、中央党史研究室副主任李忠杰、中央文献研究室副主任李捷等专家学者70多人参加了座谈会。座谈会由中央党校科研部和河南省济源市委、市政府联合举办。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ecb233cc57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
