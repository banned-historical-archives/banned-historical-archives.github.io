<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来“现在不是要预防冒进，而是需要反对了”","authors":["周恩来"],"dates":[{"year":1956,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"周恩来“现在不是要预防冒进，而是需要反对了”","type":"title"},{"text":"周恩来","type":"authors"},{"text":"[这是在国务院全体会议第30次会议讨论《1955年国家决算和1956年国家预算的报告（草稿）》时的讲话节录。会上，有人不同意在报告中提出既反保守又反冒进，认为这是同去年夏季以来开展反对右倾保守思想的斗争相背离的，会引起思想混乱。周恩来的讲话针对这种认识作了耐心的说明和解释。]","type":"paragraph"},{"text":"从去年反保守到现在，注意了发掘群众的积极性，所以各方面都出现了高潮。农业、手工业和资本主义工商业的三大改造高潮，推动了工作，迎来了整个社会主义建设的高潮。","type":"paragraph"},{"text":"在这种高潮的形势下，应该加强计划性，首先搞生产计划，然后搞人力、物力计划的平衡，最后搞财政预算。反过来预算又会影响生产和人民群众的生活。这就告诉我们：“生产的发展和其他一切事业的发展都必须放在稳妥可靠的基础上。在反对保守主义的时候，必须同时反对急躁冒进的倾向，而这种倾向在过去几个月中，在许多部门和许多地区都已经发生了。急躁冒进的结果并不能帮助社会主义事业的发展，而只能招致损失。”[这段话引自正在讨论的《1956年国家决算和1958年国家预算的报告（草稿）》。]","type":"paragraph"},{"text":"这段话是比较精炼地说出来的。我们这样提，如不解释，会发生一些误解。反保守的好处已经说过了，但也带来了一些不实际的主观主义的要求，带来了急躁冒进。","type":"paragraph"},{"text":"建设社会主义必须全面发展。去年12月以后冒进就冒头了，因此，现在的情况和去年不同了，已经不是预防而是需要反对冒进了！如果冒进继续下去，又会脱离实际，脱离群众，脱离今天的需要和可能。不能向群众泼冷水，但也不能把少数积极分子的要求当成群众的要求。","type":"paragraph"},{"text":"今年的收入不能打得太冒，要打在稳妥可靠的基础上。现在，人们对财政和生产方面有两种看法：一是打得稳妥，争取超过，二是多打，再力争。我看多打、再力争的好处不多。上次同河北省的负责同志谈话，他们说打得差不多，还要努力完成。其实打得太多了，无法完成，也就干脆不完成了。这不外乎是对人大会议的不负责任。因此，1956年的国家预算必须放在稳妥可靠的基础上。","type":"paragraph"},{"text":"虽然今年预算支出已经削减了10亿元，但打得还是紧张。向人大会议提出的这个报告是工作报告，我们可以以此检查和推动政府的工作。人大开会时，希望财政部要作详细的解释。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4da2e60cf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
