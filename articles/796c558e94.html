ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对二十二兵团清算贪污的时间界限的批语","alias":"","parts":[{"type":"paragraph","text":"转发新华社关于南京市在五反中集中训练工商界高级职员的经验的批语"},{"type":"paragraph","text":"（1952年3月5日）"},{"type":"paragraph","text":"下面是新华社南京记者发来的内部通讯\"，说的是争取高级店员的经验，很好，特为转发，请各地仿行。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月五日"},{"type":"paragraph","text":"[1]新华社驻南京记者1952年2月25日写的这篇关于南京市在五反中集中训练工商界高级职员的经验的内部通讯，刊登在1952年第44号《内部参考》上。通讯说，最近南京市将粮油、营造、五金、水电等行业的账房、监工、工程师等高级职员集中起来进行短期学习，效果很好。不少高级职员在经过集中学习之后，解除了思想顾虑，成为运动中的积极分子，检举了盗骗国家财产的案情巨大的事件。他们组织学习的经验主要是：领导思想上应当贯彻以团结教育为主的方针，着重消除他们因曾被奸商拖下水而害怕处分的思想顾虑，不能采取施加压力的方针和粗暴的做法。学习成员中要配备1/3在五反运动中表现较好、群众中有威信的高级职员和部分普通工人，对他们认真进行政策教育，发挥他们的骨干作用。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":486,"page_end":486},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"796c558e94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
