[],"dates":[{"year":1976,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金日成主席和朴成哲总理致电毛泽东主席、朱德委员长和华国锋总理"},{"type":"paragraph","text":"新华社一九七六年六月七日讯　朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成和政务院总理朴成哲六月四日打电报给毛泽东主席、朱德委员长和华国锋总理，就我国云南省西部地区发生地震，表示深切慰问。电报全文如下：北京中国共产党中央委员会主席　毛泽东同志中华人民共和国全国人民代表大会　朱　德同志常务委员会委员长中华人民共和国国务院总理　华国锋同志"},{"type":"paragraph","text":"获悉五月二十九日中国云南省西部龙陵、潞西一带发生强烈地震并受到灾害的不幸消息，我们向你们，并通过你们向受灾地区人民表示深切同情和慰问。"},{"type":"paragraph","text":"我们深信，兄弟的中国人民在毛泽东同志和中国共产党的英明领导下，将高度发扬自力更生、艰苦奋斗的革命精神，早日战胜地震灾害，安定灾区人民生活。"},{"type":"paragraph","text":"朝鲜劳动党中央委员会总书记"},{"type":"paragraph","text":"金日成"},{"type":"paragraph","text":"朝鲜民主主义人民共和国主席"},{"type":"paragraph","text":"朝鲜民主主义人民共和国政务院总理"},{"type":"paragraph","text":"朴成哲"},{"type":"paragraph","text":"一九七六年六月四日于平壤"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0582a8521"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
