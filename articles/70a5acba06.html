<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中央派往武汉处理当地无产阶级文化大革命问题的代表谢富治王力同志光荣回到北京","authors":[],"dates":[{"year":1967,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来陈伯达康生江青等同志和解放军负责人到机场热烈欢迎"},{"type":"paragraph","text":"前往欢迎的数万群众满怀革命激情，不断高呼:“无产阶级文化大革命万岁!”“毛主席的无产阶级革命路线胜利万岁!”当谢富治王力同志在周恩来等同志陪同下同革命群众见面时，“毛主席万岁!”“毛主席万万岁!”的口号声响彻云霄，经久不息。"},{"type":"paragraph","text":"新华社北京二十二日电　由中央派往武汉处理当地无产阶级文化大革命问题的代表:中共中央政治局候补委员、国务院副总理、全军文化革命小组副组长谢富治同志和中央文化革命小组成员、《红旗》杂志第一副总编辑王力同志，以及工作人员张根成同志和北京航空学院红旗战士井冈山、尹聚平、吴介之、胡慧娟同志，今天下午由武汉乘专机光荣地回到无产阶级文化大革命的策源地——北京，受到中央领导同志、中国人民解放军陆、海、空三军指战员和首都各界革命群众数万人的热烈欢迎。"},{"type":"paragraph","text":"到机场欢迎的中央领导同志和中央文化革命小组和其他方面的负责同志有:周恩来、陈伯达、康生、江青、关锋、戚本禹、姚文元、叶群等。"},{"type":"paragraph","text":"到机场迎接的中国人民解放军各总部、各军种、各兵种和驻京部队的负责人有:李天佑、王新亭、邱会作、李作鹏、王宏坤、吴法宪、郑维山、李天焕、陈先瑞、傅崇碧、邝任农、王辉球、黄志勇、谭辅仁、刘华清、江文、张秀川、黄作珍等同志。"},{"type":"paragraph","text":"下午四时五十分，谢富治同志、王力同志在数万革命群众热烈的欢呼声中走下飞机。周恩来、陈伯达、康生、江青等同志迎上前去，同谢富治、王力等同志亲切握手、拥抱。"},{"type":"paragraph","text":"从首都各个地区赶来欢迎的中国人民解放军陆、海、空三军指战员、工人、贫下中农、革命师生、红卫兵和机关革命干部，满怀革命激情，有力地挥动红彤彤的《毛主席语录》，不断高呼:“无产阶级文化大革命万岁!”“毛主席的无产阶级革命路线胜利万岁!”“把无产阶级文化大革命进行到底!”“战无不胜的毛泽东思想万岁!”“毛主席万岁，万岁，万万岁!”当谢富治、王力等同志在周恩来、陈伯达、康生、江青等同志陪同下，同数万革命群众见面的时候，“毛主席万岁!”“毛主席万万岁!”的口号声响彻云霄，经久不息。"},{"type":"paragraph","text":"北京市革命委员会和首都工代会、农代会、大专院校红代会、中学红代会的负责成员和代表吴德、刘建勋、丁国钰、周景方、聂元梓、蒯大富、韩爱晶、谭厚兰、王大宾、王老民、鲁文阁、邓万田等同志，到机场欢迎。"},{"type":"paragraph","text":"到机场欢迎的，还有中央各部门的负责同志以及《红旗》杂志、《人民日报》、《解放军报》、新华社等新闻单位的负责同志。他们当中有杨奇清、李震、于桑、张本、李广文、唐平铸、赵易亚、王唯真、金敬迈、李英儒、陆公达、刘巨成、林杰、申健等同志。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"王力","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70a5acba06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
