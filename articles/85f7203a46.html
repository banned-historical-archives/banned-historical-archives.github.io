ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"用和平方法解决西北向题的可能性是存在的","alias":"","parts":[{"type":"paragraph","text":"用和平方法解决西北问题的"},{"type":"paragraph","text":"可能性是存在的"},{"type":"paragraph","text":"（1949年4月28日）德怀同志："},{"type":"paragraph","text":"假如西野?方面暂时不打大仗，你可否于回陕前来中央一谈关于用和平方法解决西北的问题。看样子，此种可能性是存在的。张治中3等人现在决定留平，并向我方靠拢。用和平方法解决西北问题这件事，我们或须考虑通过张治中的帮助去做。如何，盼复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"卵俭[1]德怀，即彭德怀，当时任第一野战军司令员兼政治委员。[2]西野，指西北野战军，1949年2月改称第一野战军。"},{"type":"paragraph","text":"[3]张治中，原任国民党军西北军政长官公署长官。1949年1月任国民党政府和平谈判代表团首席代表，率代表团到北平和中共代表团进行谈判。4月15日，双方拟定“国内和平协定（最后修正案）”，4月20日国民党政府"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":4,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":335,"page_end":335},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85f7203a46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
