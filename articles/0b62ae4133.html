ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"关于攻击太原所需兵力的问题","alias":"","parts":[{"type":"paragraph","text":"关于攻击太原所需兵力的问题！"},{"type":"paragraph","text":"（1948年12月28日）周、陈、胡："},{"type":"paragraph","text":"（一）关于要你们准备以主力出石家庄堵击北平逃敌一事，业已电告。这只是一种可能情况的准备，不一定实行，但你们应有此项准备。（二）关于将来攻击太原的兵力问题，请你们按照敌我力量对比，确实计算后电告：是否增加杨罗耿三个纵队即已够用，除杨罗耿以外是否还需加调兵力，及是否还需从林罗③处抽调一部炮兵（在平津攻克后）。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"俭子"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第一兵团副司令员兼副政治委员周士第、参谋长陈漫远和政治部主任胡耀邦的电报。"},{"type":"paragraph","text":"[2]杨罗耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":466,"page_end":466},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b62ae4133"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
