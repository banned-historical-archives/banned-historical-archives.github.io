script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意共代表团结束访朝经北京前往广州  胡耀邦、姬鹏飞前往机场热烈欢送","authors":[],"dates":[{"year":1980,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意共代表团结束访朝经北京前往广州"},{"type":"paragraph","text":"胡耀邦、姬鹏飞前往机场热烈欢送"},{"type":"paragraph","text":"新华社北京四月二十五日电  由总书记恩里科·贝林格率领的意共中央代表团，结束了对朝鲜民主主义人民共和国的访问之后，于今天中午到达北京。代表团在机场稍事休息后，乘飞机前往广州，然后回国。"},{"type":"paragraph","text":"中共中央总书记胡耀邦、中联部部长姬鹏飞，前往机场热烈欢送。在机场贵宾休息室，胡耀邦、姬鹏飞等同贝林格、巴叶塔等意共同志亲切交谈，双方再一次对两党会谈的结果表示满意。在互相珍重道别的时候，胡耀邦对贝林格说：我们还会见面的。祝你们党取得新的成就。贝林格说：希望我们再次见面的时间不会太远。他请胡耀邦转达他对华国锋主席、邓小平副主席和中国党其他领导同志，全体党员和中国人民的问候，并感谢中国同志对代表团的热情款待。"},{"type":"paragraph","text":"中联部副部长冯铉陪同意共代表团前往广州。"},{"type":"paragraph","text":"前往机场欢送的还有中联部副部长吴学谦，朝鲜民主主义人民共和国驻中国大使全明洙，意大利驻中国大使方济曦等。（附图片）"},{"type":"paragraph","text":"由贝林格总书记率领的意共中央代表团离京，胡耀邦总书记等前往机场送行。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d840f75f7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
