ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于培养干部问题的指示","alias":"","parts":[{"type":"paragraph","text":"关于培养干部问题的指示"},{"type":"paragraph","text":"（1951年3月）"},{"type":"paragraph","text":"一、旧技术人员是国民党的遗产，是很有本领，但还不能依靠，应争取团结。"},{"type":"paragraph","text":"二、全国大中学生多是地主、资产阶级的儿女，也是国民党的遗产，但经培养改造，其中有一部分能依靠，也有一部分不能依靠。"},{"type":"paragraph","text":"三、现在我们最重要的是培养技术干部的骨干，最重要的是培养我们党、军队中十多年的知识分子，还有一部分是参加土改的知识分子，可抽调大部分去训练。另一部分从工农速成中学、从工农子弟中培养一部分，即是说要这两类人经过培养后，团结上边这两种人。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":205,"page_end":205},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"9646ca98-820c-44ef-b8ca-c656fd59b7fd","name":"毛泽东思想万岁（1949.10-1957.12）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/9646ca98-820c-44ef-b8ca-c656fd59b7fd.pdf"],"article":{"title":"关于培养干部问题的指示","alias":"","parts":[{"type":"paragraph","text":"叉怕麻。“"},{"type":"paragraph","text":"（×××提到，有关战部门本身的工作还缺乏一个章程，此次会准备拟出几条，主席指示—）"},{"type":"paragraph","text":"对统战部的制、任务、范围和作法均有所规定，这是好的。直到地委一一均应有统战部门的组织才好，是如何办，也研究一下。"},{"type":"paragraph","text":"（有同志反映，主席去年过，注意统战工作的，在党内还是少数派，这个状态，今年在若干地区没有多大改变。主席指示～一)"},{"type":"paragraph","text":"这个少数派是正确的，只要坚持士改与肃反，这就不是右倾，这就是马克思主义。要用积极态度去组织民主人士、民主党派，教育他们，使他们参加斗争，带他们共同前进，这对劳动人民是有盆的，对进入社会主义是有盆的。少数派会慢慢扩大，主要依靠好好服人家。应当每年开两次统战会，一次大的，一次小的，各中央局至区党委都应如此。不要怪别人，只怪你们自已没有招兵买马、积草囤粮。不要使自已陷于孤立，要好好做出成续来给大家看。你们要很好地取得党委书记和组、宣傅等部门的帮助，善于经过党委和党委负责同志，把我们的国家建设起来。你们当中要出些专家，要熟悉人物和历史，精通此中门道。"},{"type":"paragraph","text":"（中南同志提出压反革命分子应与土改中反霸斗争有所区别。主席一-）"},{"type":"paragraph","text":"此-一问题，×××同志已经发了指示。江西四十七军向中央的报告，在一个多月中，二十多县里，杀了匪首×××人，得到老百姓的欢呼。（主席已将此报告批示转发各大行政区傅看，并嘱到会同志都看一看。）"},{"type":"paragraph","text":"关于培养干部问题的指示"},{"type":"paragraph","text":"（铁俊瑞同志传达）"},{"type":"paragraph","text":"（一九五一年三月）关于培养干部问题1、旧技术人员是国民党的遗产，是很有本，但还不能依靠，应争取团结。"},{"type":"paragraph","text":"2、全国大中学生多是地主、资产阶级的儿女，也是国民党的遗产，但给培养改造，其中有-部分能依靠，也有一部分不能依靠。"},{"type":"paragraph","text":"3、现在我们最重要的是培养技术干部的骨干，最重要的是培养我们党、军队中十多年的知识分子，还有-一部分是参加士改的知分子，可抽调大部分去训。另--部分从工农速成中学、从工农子弟中培养-部分，即是要从这两类人经过培养后，团结.上边这两种人。"},{"type":"paragraph","text":"（摘自徐方庭同志笔记本）"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":19,"page_end":19},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47d4da304a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
