script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比共机关报指出修正主义集团之间矛盾重重莫斯科三月分裂会议组织者自掘坟墓 赫鲁晓夫继承人的投降路线到处碰壁","authors":[],"dates":[{"year":1965,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京17日电　比利时共产党机关报《人民之声》周刊三月十九日一期发表的一篇罗伯·德蒂写的文章指出，莫斯科三月分裂会议的公报和声明“证明了修正主义分裂者公开遭到的第一个重大失败”。"},{"type":"paragraph","text":"文章指出，苏共新领导想要保全面子，那是徒劳的，各个马克思列宁主义政党“都拒绝赫鲁晓夫的继承人得到早已不让赫鲁晓夫得到的东西。”"},{"type":"paragraph","text":"文章说，“分析一下赫鲁晓夫式的会议文件，就表明和证实了现代修正主义论点的极其贫乏以及各修正主义集团之间的不可避免的重重矛盾。”"},{"type":"paragraph","text":"“赫鲁晓夫及其继承人强加于跟着指挥棒转的国家和党的总路线，即同美帝国主义合作和向它投降的路线，到处碰到了越来越不可克服的障碍。”"},{"type":"paragraph","text":"文章说，“赫鲁晓夫的老一套讹诈早在一九六○年就遭到挫败，这种讹诈实质上是向越南民主共和国领导人说:‘你们不要援助南越爱国者和南越人民反对美国占领者及其卖国傀儡军队的斗争，那时，我们将重新提供大量援助来保卫社会主义北越。’今天，正当每一寸土地和每一根草在北美的希特勒继承者的脚下燃烧的时候，这种讹诈更不可能得逞。”"},{"type":"paragraph","text":"“但是，这些活动毕竟使得五角大楼领导人、美国垄断资本家和约翰逊抱有不切实际的希望，因为已经通过叛卖性的热线把这些活动的内容告诉了这些有权知道的人。这就是麦克纳马拉和空军将领泰然地继续扩大战争的原因之一”。"},{"type":"paragraph","text":"文章指出，十九个党的莫斯科公报侈谈积极支持各国人民的民族解放斗争，在口头上表示声援越南民主共和国，声援民族解放阵线领导的南越人民的英勇斗争。"},{"type":"paragraph","text":"文章说，“这份公报在口头上也要求美国军队立即撤出南越，停止对拥有主权的越南民主共和国的侵略。但是实际上，与此同时，布鲁塞尔的修正主义者却在为在越南被杀死或受到伏击而死亡的美国人、美国军官和士兵痛哭流涕。”"},{"type":"paragraph","text":"文章说，“这些分裂主义叛徒说的是团结，什么‘要求’停止公开论战，而与此同时，他们却在报刊上声嘶力竭地咒骂全世界的马克思列宁主义者。”"},{"type":"paragraph","text":"文章指出，“莫斯科分裂主义的文件反映了修正主义者之间无法掩饰的分歧的加深。”"},{"type":"paragraph","text":"“新鲜之处也许就是显然比赫鲁晓夫时期更加虚伪。”"},{"type":"paragraph","text":"“至于马克思列宁主义政党和真正的社会主义国家，它们并没有被加在修正主义向北美帝国主义投降并同它合作的劣货上面的新装璜所欺骗。”"},{"type":"paragraph","text":"文章最后说，“正如马克思列宁主义者早在一年前已经断然预言的那样，正如赫鲁晓夫自己所已经体会了的那样，推迟到三月一日召开的十二月十五日分裂会议的组织者，在为他们自己掘坟墓。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd4b44b405"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
