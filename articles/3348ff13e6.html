":[],"dates":[{"year":1981,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见美国前副总统蒙代尔时说"},{"type":"paragraph","text":"要从全球战略角度考虑中美关系"},{"type":"paragraph","text":"新华社北京十一月二十二日电　中共中央副主席邓小平今天上午会见了美国前副总统蒙代尔。"},{"type":"paragraph","text":"宾主就共同关心的问题友好地交换了意见。在谈到中美双边关系时，邓小平说，中美关系不只是同中美两国利益有关的问题，而且是一个全球战略的问题。只有把这个问题放在全球战略角度、也就是政治角度来考虑，才能处理好这个问题。他希望中美关系不要出现曲折。蒙代尔对此表示赞同。"},{"type":"paragraph","text":"随同蒙代尔来访的美国前助理国务卿霍尔布鲁克，美国驻中国大使恒安石，参加了会见。"},{"type":"paragraph","text":"会见时，我国外交部副部长章文晋在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3348ff13e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
