"高"],"dates":[{"year":1957,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"右派言论——挑拨党群关系","type":"title"},{"text":"高","type":"authors"},{"text":"上海申报、新闻报许多老记者，同蒋介石反动政府和帝国主义并无关系，可是在解放后全被辞掉了。新设立了一个新闻图书馆，成为这些人的养老院，他们当然很有意见。现在人们都不尊重老记者。有人反映，人民日报记者自高自大，从不向老记者请教。","type":"paragraph"},{"text":"顾执中认为现在各科都有了理论，可是新闻学还没有。许多人都说新闻有阶级性，可是没有东西可以参考。他说：“新闻内容有阶级性新闻编排没有阶级性”。想想看，“为什么资产阶级的报纸能够办的生动活泼，社会主义的报纸却作不到呢？”","type":"paragraph"},{"text":"顾执中主张记者要抢消息。“抢消息绝对不是资产阶级的东西”。任何消息，只要不是军事秘密和外交秘密，都可以抢。现在许多主要事情要隔几天才发表，弄得读者的思想也麻痹了。(人民日报5月17日)","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04ced0fd9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
