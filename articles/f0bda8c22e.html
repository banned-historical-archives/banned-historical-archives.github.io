tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"鼓吹“奴隶主义”就是为了篡党","authors":["班长","韩廷茂"],"parts":[{"type":"paragraph","text":"中国赫鲁晓夫长期以来向党员拚命散布他那套奴隶主义的毒素，叫党员去搞什么“组织上和纪律上的修养”，去做什么“驯服工具”，叫嚷什么“服从组织，服从多数，服从上级是绝对的，无条件的”，甚至说“大多数和上级或中央真错了，你也还要服从，……”一句话，不管是符合毛泽东思想，还是违背毛泽东思想，不管是对革命事业有利，还是有害，都要一概服从。在中国赫鲁晓夫的眼里，这样的“党员”就算是一个“组织上和纪律上有修养”的“共产党员”，就是一个“好党员”。这是中国赫鲁晓夫明目张胆地反对毛主席，反对毛泽东思想。"},{"type":"paragraph","text":"一个真正的共产党员，怎么能服从危害革命事业的错误领导而不作抵制呢？怎么能见到反对毛泽东思想的罪恶言行而不去反对呢？怎么能见到对革命事业不利的事情而不去斗争呢？如果这样，那还算什么共产党员！"},{"type":"paragraph","text":"中国赫鲁晓夫鼓吹“驯服工具”的谬论，完全是别有用心的。他和一些混入党内的资产阶级代表人物，一贯反对毛主席，对抗无产阶级司令部的正确领导。他鼓吹“绝对服从”，只不过要大家做他复辟资本主义的“驯服工具”，以便他肆无忌惮地进行反革命复辟活动。"},{"type":"paragraph","text":"毛主席教导我们：“对于任何东西都用鼻子嗅一嗅，鉴别其好坏，然后才决定欢迎它，或者抵制它。”我们共产党员、革命战士无限热爱、无限忠诚、无限崇拜、无限信仰的是我们伟大领袖毛主席，我们绝对服从的是伟大的毛泽东思想，无条件执行的是以毛主席为首的无产阶级司令部的指示，自觉遵守的是无产阶级的革命纪律。对于反党反社会主义反毛泽东思想的中国赫鲁晓夫之流，我们不仅不服从，而且要坚决造他们的反，把他们彻底打倒，叫他们永世不得翻身。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0bda8c22e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
