ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"和卡尔逊的谈话","alias":"","parts":[{"type":"paragraph","text":"和卡尔逊的谈话！"},{"type":"paragraph","text":"（1938年5月5日）"},{"type":"paragraph","text":"只要人民有志气忍受困难，有决心继续抵抗，中国就不会垮台。中国像一个容量一加仑的细颈瓶，而日本灌进了半瓶多水。它的部队进占一地方，我们转向另一地方；他们追击，我们就后退。日本兵力不足，无法占领全部中国，只要人民决心继续抵抗，它就无法用政治手段控制。"},{"type":"paragraph","text":"有几种围困。日本在五台山包围我们，围困我们。但我们有另一种围困，比如日本在太原驻守，太原的东北是聂荣臻的部队，西北是贺龙的部队，林彪的部队在西南，朱德的部队在东南。日军在山西一出动就会撞上我们的巡逻队。正像山西是华北的战略锁钥一样，五台山地区也是山西的锁钥，我们占领五台山，日本人就不能控制山西。另一种围困应是美国、苏联同中国一道围困日本，这将是一种国际的围困。"},{"type":"paragraph","text":"[1]这是毛泽东和美国海军陆战队优秀指挥官埃文斯·福代斯·卡尔逊关"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":5,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":186,"page_end":186},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80b8c13573"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
