里希南副总统","authors":[],"dates":[{"year":1957,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中印两国人民将永远站在一起"},{"type":"paragraph","text":"首都各界八千人盛会欢迎印度贵宾"},{"type":"paragraph","text":"毛泽东主席回拜拉达克里希南副总统"},{"type":"paragraph","text":"据新华社20日讯　印度副总统拉达克里希南今天在北京各界人民举行的欢迎大会上说，只要各国遵循和平共处五项原则，用和平协商的方法处理问题，世界上没有一个问题是不可以解决的。副总统还主张废除核武器和停止核武器试验。"},{"type":"paragraph","text":"有八千多人参加的这个欢迎大会，是在北京体育馆举行的。下午四时，拉达克里希南副总统和朱德副主席、周恩来总理、贺龙副总理、郭沫若副委员长以及印度驻华大使拉·库·尼赫鲁等步入会场登上主席台。这时，人们一致起立，掌声、欢呼声和军乐声响成一片。首都的少年儿童向贵宾们献了鲜花。"},{"type":"paragraph","text":"拉达克里希南副总统在他的讲话中谈到了他对中国人民的印象。他说，他看到了一个有纪律和充满献身精神的民族。"},{"type":"paragraph","text":"副总统强调说，只有废除核武器和停止核武器试验，才能使世界趋于团结一致和产生富有成果的世界友谊。他呼吁各国政府要利用原子核动力为人类谋福利。"},{"type":"paragraph","text":"副总统最后说，印度政府和印度人民保证遵守在中国所提出的原则，那就是“中印友谊”和“世界和平”。副总统的讲话受到了极其热烈的欢迎（讲话全文见第四版）。"},{"type":"paragraph","text":"在欢迎大会开始的时候，军乐队高奏中国和印度两国的国歌。彭真市长首先致词欢迎拉达克里希南副总统。他说，中印两国人民的友谊像连结我们两国的喜马拉雅山的雪峰一样崇高、永恒、坚固不拔。"},{"type":"paragraph","text":"彭真说，殖民主义者正在对叙利亚进行露骨的侵略阴谋和挑衅行动，威胁着中近东地区和全世界的和平，是亚非人民所不能容忍的。"},{"type":"paragraph","text":"彭真还说，只要亚非各国人民坚定地团结起来，同世界上一切爱好和平的人民站在一起，亚非人民的正义事业一定会胜利。"},{"type":"paragraph","text":"彭真市长还代表北京市人民向拉达克里希南副总统献旗和献礼。"},{"type":"paragraph","text":"在今天的大会上，首都的艺术家们还为贵宾表演了精采的文艺节目，其中有印度的舞蹈和歌曲。表演结束以后，拉达克里希南副总统由朱德副主席、周恩来总理等陪同，走下主席台来到大厅中央。在这里，副总统向演员们赠送了花篮，并同演员们一起照了像。"},{"type":"paragraph","text":"新华社20日讯　毛泽东主席在今天下午回拜了印度共和国副总统拉达克里希南博士。（附图片）"},{"type":"paragraph","text":"毛主席把一朵鲜花佩在拉达克里希南副总统衣襟上"},{"type":"paragraph","text":"新华社记者  刘东鳌摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"885fb2118f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
