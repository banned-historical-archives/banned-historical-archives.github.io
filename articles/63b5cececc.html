art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沉痛悼念毛主席军民并肩守海防","authors":[],"parts":[{"type":"paragraph","text":"九月十八日，驻守在福建前线的某岛部队和民兵冒着大雨，坚守在自己的战斗岗位上。下午三时，当北京天安门广场追悼大会开始时，他们面向北京，肃立在阵地上，向伟大领袖毛主席静默志哀三分钟，并认真聆听首都的大会实况转播。大会结束后，他们又怀着沉痛的心情，在阵地、哨所、码头、渔村，举行座谈，缅怀伟大领袖毛主席的丰功伟绩，表达自己对伟大领袖毛主席的无限崇敬和无限哀思。副政委温贤福带着一九六九年参加国庆观礼时在天安门前的留影，来到炮阵地，和战士一起追思当年见到毛主席时的幸福情景，鼓励大家一定要响应党中央号召，化悲痛为力量，继承毛主席的遗志，百倍警惕地守卫在祖国的海防线上。"},{"type":"paragraph","text":"在军民联防指挥所里，战士、民兵含着眼泪回顾岛上军民坚决贯彻毛主席人民战争思想、守岛建岛的战斗历程。海岛公社人武部副部长蒋兴春，手捧一九六○年参加全国民兵代表会时从毛主席身边带回的一支半自动步枪，站在毛主席遗像前，庄严宣誓：我们一定不辜负您老人家的期望，军民守岛建岛一条心，紧握钢枪守海防。当晚，他带领着军民联防小分队，对每一个礁丛、山洞，都进行了认真检查搜索。"},{"type":"paragraph","text":"他们不放过一点可疑的迹象，他们随时准备消灭来犯的敌人。"},{"type":"paragraph","text":"（福建省军区报道组）"}],"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63b5cececc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
