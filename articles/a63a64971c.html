art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"悼念领袖毛主席百倍警惕守边疆","authors":["新疆军区某边防站全体指战员"],"parts":[{"type":"paragraph","text":"我们怀着极其悲痛的心情，一遍又一遍地收听了中共中央、人大常委会、国务院、中央军委《告全党全军全国各族人民书》。我们敬爱的伟大领袖和导师毛主席逝世的消息，使我们边防战士无比悲痛，大家含着泪水，面向北京，怀着最深厚的无产阶级感情，缅怀毛主席一生为中国人民、为国际无产阶级和全世界革命人民所立下的丰功伟绩。我们深深感到，从内地到边疆社会主义革命和建设的每一项成就，都是在毛主席的英明领导下取得的。站在边防放眼望：边防线那一边，一片死气沉沉，真是人间地狱；边防线这一边则完全是另外一种景象。我们这里，到处莺歌燕舞，一派兴旺景象。我国边疆各族人民和全国人民一样，过着幸福的生活，从事着伟大的社会主义革命和建设。这一切，都是毛主席领导下取得的，都是毛主席的无产阶级革命路线指引的结果。可是，我国各族人民的伟大领袖毛主席今天却离开我们了，怎能不使我们心痛欲裂，泪如泉涌！"},{"type":"paragraph","text":"在这悲痛的日子里，我们边防战士决心化悲痛为力量，以实际行动来悼念伟大领袖毛主席。我们一定要更加努力学习马列著作和毛主席著作，学习毛主席为中国人民、世界人民求解放而奋斗一生的伟大革命实践。我们要更加紧密地团结在党中央周围，进一步搞好军政、军民和各民族的团结，建设好、保卫好祖国的西北边疆。我们要以阶级斗争为纲，深入批判邓小平的反革命的修正主义路线、反击右倾翻案风，永远沿着毛主席的无产阶级革命路线前进。我们要百倍提高革命警惕，加强战备，随时准备歼灭一切敢于入侵之敌。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a63a64971c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
