uthors":[],"dates":[{"year":1959,"month":11,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央印发总政治部编写的学习提纲(概要)","type":"title"},{"text":"中共中央转发人民解放军总政治部关于《为保卫党的总路线，反对右倾机会主义而斗争》的学习提纲。《提纲》根据中共中央指示精神把学习宣传问题归纳为8个：(一)保卫党的总路线，拥护大跃进和人民公社；(二)马克思主义者应当怎样对待革命的群众运动；(三)社会主义建设时期的阶级斗争；(四)阶级、政党与领袖的关系，领袖的作用和意义；(五)人民解放军是党和人民进行政治斗争的驯服工具；(六)增强党的团结，反对资产阶级个人主义；(七)树立辩证唯物主义的世界观，反对资产阶级的唯心主义世界观；(八)国际主义和爱国主义。","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f6d45c3a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
