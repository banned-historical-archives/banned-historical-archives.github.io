art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠批“四人帮”努力为祖国革命和建设贡献力量","authors":[],"parts":[{"type":"paragraph","text":"据新华社福州一九七七年三月十三日电 福建各条战线上的台湾省籍同胞在各级党组织的亲切关怀下，努力学习马列著作和毛主席著作，积极投入揭批“四人帮”的斗争，努力为祖国社会主义革命和建设事业贡献力量。"},{"type":"paragraph","text":"目前居住在福建各地的台湾省籍同胞有一千多户，共四千多人，主要分布在福州、厦门、龙溪、晋江、莆田、宁德等沿海地区。他们多数出身贫苦，其中有些人是抗日战争胜利后被国民党抓丁来到祖国大陆，后被中国人民解放军解放过来的；有些人是由于生活所迫离开台湾来到大陆谋生的。解放后，在毛主席、共产党领导下，他们和祖国大陆人民一样，翻了身，作了国家的主人。"},{"type":"paragraph","text":"在举国上下深揭猛批“四人帮”反党集团的斗争中，广大台湾省籍同胞积极响应以华主席为首的党中央的号召，口诛笔伐“四人帮”妄图篡党夺权，复辟资本主义的滔天罪行。他们把“四人帮”的所作所为同龟缩在台湾的蒋帮作对比，更认清了这些家伙是一丘之貉，都是祸国殃民帮。人家说，如果让“四人帮”的阴谋得逞，那我们的国家就要改变颜色，我们的人民就要重新过牛马不如的生活，同今天仍在蒋帮统治下的我们的父老兄妹们一样。以华主席为首的党中央采取英明果断的措施，一举粉碎“四人帮”，挽救了革命，挽救了党，也使正在受苦受难的我们的父老兄妹充满希望，早日得解放。"},{"type":"paragraph","text":"战斗在工农业生产和文教卫生战线的台湾省籍同胞，积极为祖国社会主义革命和建设事业贡献力量，不断做出新成绩，受到祖国人民的赞扬。福州起重设备厂台湾省籍工人严文荣，出生在台中县一个贫苦工人家庭，因为在台湾生活不下去，被迫逃来大陆谋生。解放后，他刻苦学习，努力工作，先后四次被评为福建省先进生产者，五次被评为福州市工业系统劳动模范。经过无产阶级文化大革命的锻炼，他进一步提高了阶级斗争和路线斗争觉悟，被群众选进厂革委会领导班子。他和职工们一道深入开展工业学大庆的运动，被群众称赞为厂里的好带头人。"},{"type":"paragraph","text":"在中国人民解放军福州部队和一些军分区、人民武装部工作的台湾省籍同胞，通过揭批“四人帮”，路线觉悟大提高，决心最紧密地团结在以华主席为首的党中央周围，提高警惕，加强战备，随时准备歼灭一切敢于来犯之敌，为解放台湾、统一祖国积极贡献力量。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86ab66f7fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
