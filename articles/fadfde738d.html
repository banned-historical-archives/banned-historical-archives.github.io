<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河北省委关于防治浮肿病情况的报告","authors":[],"dates":[{"year":1960,"month":2,"day":18}],"is_range_date":false,"parts":[{"text":"河北省委关于防治浮肿病情况的报告","type":"title"},{"text":"中央：","type":"appellation"},{"text":"近来，我省农村部分的地区，程度不同的发生了浮肿病。到今年二月十五日，全省有四十九个县、二百三十九个公社、五千六百多个村（约占百分之十的村），发现浮肿病人五万九千多名，已病放四百五十多人，平均死亡率百分之零点七六。其中唐山地区最为严重，只玉田、宝坁两个县就发现浮肿病人一万九千多名，保定、石家庄地区发现浮肿病人在万人以上；天津、邯郸地区都在五千名以上。绝大部分病人是脚部、下肢浮肿，少数的已发展到面部、上肢和全身。患这种病的，五十岁以上的老年人约占百分之五十，壮年占百分之三十，青年、儿童占百分之二十左右。","type":"paragraph"},{"text":"发生浮肿病的主要原因是营养不良，旧病恶化。去年我省有部分地区遭受自然灾害，粮食减产，再加当地领导上存有麻痹思想，对群众生活安排的不够好。因此，使原来患有心脏病、肾脏病、咳喘等老病的人更加严重，再加痢疾、腹泻、肠炎等病症的发生，造成消化机能减弱而收起浮肿。据蓟县一千九百多名浮肿病人的调查，有百分之七十七是因久病体弱、缺乏营养而引起浮肿的。其次是居住潮湿和疲劳过度也是引起浮肿病的一个原因。凡是患浮肿病较多的都是去年水灾严重的地区。唐山市的宝坁、玉田、蓟县去年水灾严重，这三个县的浮肿病人占该市发病总人数的百分之八十左右。","type":"paragraph"},{"text":"发现浮肿病以后，各级党委都很重视，采取了紧急措施，并由书记挂帅，组识了大批干部和医务人员，深入疫病区检查治疗。仅唐山地区就组织起七千多名医务人员，由市委书记率领，深入疫病区，逐户检查治疗。同时，对病人增加了适当的营养。除适当增加粮食供应指标以外，并供应了一部分富有营养的大豆、玉米和细粮。经过大力组织防治，目前情况已基本好转，全省已经治好和恢复健康的有近两万名病人。较严重的唐山地区，已有百分之七十的浮肿病人恢复了健康。","type":"paragraph"},{"text":"为了彻底消灭浮肿病，保证春耕生产的顺利进行，我们在最近召开的县委第一书记会议与五级干部大会上，均强调地提出春耕前要把安排好群众生活作为一项突出的任务，并要求各级党委抓紧、抓实，一直抓到麦收，保证不发生问题。除了对已经发生的浮肿病人抓紧治疗以外，还采取了以下措施：","type":"paragraph"},{"text":"（一）对那些缺粮地区保证粮食供应。我们确定在麦收前在农村再增加四亿七千万斤粮食的销售指标，保证群众的吃粮在二、三月份每人每天不少于十二两，四、五、六月份每人每天不少于一斤。","type":"paragraph"},{"text":"（二）发展、巩固和提高农村食堂。提倡“书记进食堂，人人管食堂”。切实把食堂搞好，使社员不仅注意节约，而且要吃饱吃好。","type":"paragraph"},{"text":"（三）坚持劳逸制度，保证社员每天睡眠八小时。","type":"paragraph"},{"text":"（四）大搞除田害讲卫生的群众运动，积极防止春季疫病流行。","type":"paragraph"},{"text":" 河北省委一九六○年二月十八日","type":"paragraph"},{"text":"等级  特急  河北 来  号","type":"paragraph"},{"text":"机编号46    1960．2．18","type":"paragraph"},{"text":"抄送  省委办公厅、农村部、财贸部、研究室、宣传部、省粮食厅、商业厅、卫生厅、省财委、省委常委。","type":"paragraph"},{"text":"首长批示","type":"paragraph"}],"comments":[],"origin":"河北省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fadfde738d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
