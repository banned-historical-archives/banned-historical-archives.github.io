ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"和陈嘉庚的谈话","alias":"","parts":[{"type":"paragraph","text":"和陈嘉庚的谈话1]"},{"type":"paragraph","text":"（1940年6月1日）"},{"type":"paragraph","text":"因为国民党中的顽固派企图消灭我们，他们日思夜想的是扫除共产党这个障碍，以便毫无顾忌地投降日寇。所以，在迫不得已的情况下，我们只有对他们政治上、军事上的进攻给予适当的还击，才能使他们承认进步势力及各抗日党派、团体的地位，不敢轻易同敌人妥协，不敢轻易发动全面内战。我们的政策是以斗争求团结。若以团结求团结，不但团结搞不成，进步势力会横遭摧残，统一战线也必将破裂，全国将重新陷入内战之中，还会亡党亡国。"},{"type":"paragraph","text":"我们承认国民党是第一大党，拥护蒋委员长是全国抗战的领袖，拥护中央政府的领导。统一战线的政治基础是三民主义，组织基础就是国共两党，二者失去了任何一方，统一战线都不能设想。因此，我们的总方针是团结，但只有在进步的基础上才能达到真止的团结。"},{"type":"paragraph","text":"[1]5月31日下午5点多钟，陈嘉庚一行到达延安，受到5000多名群众的热烈欢迎。第二天下午，毛泽东在杨家岭会见陈嘉庚，并与他亲切交谈。陈嘉庚首先表明海外华侨希望国共两党加强团结、一致对外的意愿。他对共产党进行反磨擦斗争不理解，他认为在国共两党关系的问题上，共产党应多做让"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":6,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":64,"page_end":64},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc749fa59f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
