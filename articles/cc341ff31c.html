<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市外贸系统深入批修加强无产阶级国际主义教育胸怀世界革命　做好外贸工作广大职工坚决执行毛主席的指示，使援外和出口工作出现了新气象","authors":[],"dates":[{"year":1971,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市外贸系统各级党组织遵照毛主席关于“进行一次思想和政治路线方面的教育”的指示，结合实际，深入进行无产阶级国际主义教育，狠批刘少奇一类骗子在外贸工作中的修正主义黑货，使干部和群众提高了无产阶级国际主义觉悟，增强了执行毛主席革命路线的自觉性，积极做好援外和出口工作。"},{"type":"paragraph","text":"外贸局各级领导干部通过学习认识到，是不是抓好国际主义教育，是对毛主席和毛主席革命路线的态度问题。在提高认识的基础上，该局各级党组织坚持对广大职工进行无产阶级国际主义教育，并且把它作为思想建设的一项重要工作经常抓、反复抓。上海服装、畜产、机械、粮油、五金进出口公司等单位的党委，努力做到:布置工作时，布置国际主义教育；检查工作时，检查国际主义教育的情况；总结工作时，总结进行国际主义教育的经验和教训。"},{"type":"paragraph","text":"随着世界革命形势的迅速发展，我国对外贸易工作的任务愈来愈重，要求也愈来愈高。有的同志产生了一些畏难情绪，认为援外任务时间紧、要求高，不大好办。针对这些思想，该局各级党组织今年以来先后五次集中地对广大革命职工进行无产阶级国际主义教育，并且还结合国际形势，结合国内的重大节日，结合援外和出口任务，反复地进行教育，采用办学习班、报告会、外销员训练班等形式，组织广大革命职工学习《共产党宣言》，学习毛主席“五·二○”庄严声明、《纪念白求恩》等光辉著作，开展革命大批判，坚持“四破四立”:破刘少奇一类骗子鼓吹的“三和一少”的修正主义观点，立积极支援世界革命的思想；破大国沙文主义，立虚心向世界各国人民学习的思想；破“恩赐观点”，立无产阶级只有解放全人类才能最后解放自己的思想；破“怕、难、烦”的思想，立“中国应当对于人类有较大的贡献”的雄心大志。通过学习和批判，大家认识到:民族利己主义和大国沙文主义都是无产阶级国际主义的大敌。援助从来是相互的，世界各国人民反对美帝国主义及其一切走狗的斗争，就是对我们的最大支持。中国取得的胜利，是和世界革命人民的支持分不开的，中国革命的最后胜利，有待于世界革命的胜利。大家坚决表示，一定要做支援世界革命的促进派，以做好外贸工作的实际行动，支持世界革命人民的正义斗争。"},{"type":"paragraph","text":"通过经常的无产阶级国际主义教育，广大革命职工遵照伟大导师列宁关于“真正的国际主义只有一种，就是进行忘我的工作来发展本国的革命运动和革命斗争，毫无例外地支持(用宣传、同情和物质来支持)所有国家的同样的斗争、同样的路线，而且只支持这种斗争和这种路线”的教导，努力把本职工作与支援世界革命紧密地联系起来，立足本职，胸怀祖国，放眼世界，发挥了革命的积极性，使援外和出口工作出现了新气象。该局所属各单位今年承担的援外任务，比去年又有很大的增长，任务虽然很重，困难虽然很多，但是广大干部和群众急世界革命人民所急，想世界革命人民所想，把每一项援外任务，当作重要的政治任务来抓。因此，都较好地完成了任务。上海化工、轻工业品进出口公司承担的援外任务中，有许多商品过去从未经营过，对商品的规格、名称等都不了解，而且品种繁杂，数量零星。针对这些困难，他们深入实际，调查研究，向工人请教，排除了困难，都提前完成了任务。"},{"type":"paragraph","text":"该局所属单位的广大革命职工，在认真做好援外工作的同时，还积极做好对外贸易工作。他们遵照毛主席关于“发展经济，保障供给”的教导，支持生产，促进生产的发展。一年来先后派出工作人员到全国二十二个省、市的一千二百多个工厂、人民公社和生产单位学习先进经验，听取意见，不断改进工作，从而向生产部门提供各种新产品和新技术资料三万八千余件，帮助生产部门发展生产，扩大了出口货源。在生产部门积极努力下，出口产品新品种不断增加，质量也有了进一步的提高。在对外贸易中，他们遵照毛主席关于“中国人民愿意与世界各国人民实行友好合作，恢复和发展国际间的通商事业，以利发展生产和繁荣经济”的教导，坚决执行平等互利、互通有无的社会主义对外贸易政策，进一步发展了与世界各国、各地的贸易关系。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc341ff31c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
