tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"约法三章改作风","authors":["李婵军/原文革"],"parts":[{"type":"paragraph","text":"本报讯李婵军、原文革报道：上级机关下基层，基层陪同检查，陪同吃喝，陪同玩乐的现象，已在山西省宁武县人武部消失。"},{"type":"paragraph","text":"该部要求领导和机关干部下基层不准提前打招呼，不准提出接待标准，不准以接待标准高低评判业务工作，违者严肃处理。机关同基层单位约法三章：不因工作中的上下级的关系搞“破例”，不因个人之间的私交搞特殊。同时，该部把下乡工作队变为服务队，下乡轻车简从，直接深入基层单位，帮助解决难办的事，帮助实现想办的事，帮助办好该办的事，沉到一线搞好服务。党委还推出为基层解难题、献良策、办实事活动，领导带科室分片落实。目前，机关已协助基层解决13个具体困难。基层的同志说：过去领导来了怕陪不好，现在盼领导下乡解难题，部党委的这个规定，让我们有更多的时间精力抓工作了。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a91085962"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
