工会篡党夺权的滔天罪行","authors":[],"dates":[{"year":1978,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　五日，上海市工会第六次代表大会筹备委员会在文化广场召开大会，揭批“四人帮”及其在上海的余党破坏工人运动和工会工作的罪行。全市各条战线六千多名工会工作干部和劳动模范、先进生产(工作)者的代表出席了大会。"},{"type":"paragraph","text":"会上，上海市总工会和静安区工会、轻工业局工会、市工人文化宫以及江南造船厂工会的代表，列举大量的事实，忿怒揭批“四人帮”及其余党改变工会性质，大搞资产阶级帮派体系，打击迫害广大干部和劳动模范，以邦代会，以会代党，妄图把工会系统变成他们篡党夺权的反革命工具的滔天罪行。"},{"type":"paragraph","text":"发言的同志回顾了在党长期领导下的上海总工会的光荣革命传统。伟大领袖毛主席和敬爱的周总理十分关怀上海的工会工作，周总理曾经多次亲切接见上海的工会干部和劳动模范。建国十七年来，上海总工会和各级工会组织在毛主席工运路线指引下，围绕党在各个时期的中心任务，动员和组织全市工人积极投入护厂接管、镇压反革命、抗美援朝、三反五反、民主改革、对私改造、整风反右、社教等历次政治运动；开展社会主义劳动竞赛，向工人进行共产主义教育，全面关心职工群众的生活，发挥了党的助手作用，在群众中有广泛的影响。但是，新生资产阶级分子王洪文冒充工人运动领袖，勾结国民党特务分子张春桥，阶级异己分子姚文元，猖狂抛出“工运黑线统治”论，全盘否定解放十七年来的上海工会工作，另立他们的帮工会。“四人帮”及其上海余党利用工会打头阵，大搞篡党夺权的反革命活动，极大地破坏了上海的工人运动和工会工作，颠倒了工运路线的是非，搞乱了人们的思想，搞垮了工会的组织，搞掉了工会的优良传统和作风。发言的代表以大号铁的事实，批得“四人帮”在上海的余党马天水、陈阿大等及其安插在市总工会的骨干汗流浃背。"},{"type":"paragraph","text":"大会指出:当前不仅要对“四人帮”及其余党利用工会搞篡党夺权的反革命罪行进行深入的揭发批判，还必须进一步联系各单位实际，抓住“四人帮”及其余党破坏最大，危害最重，流毒最深的问题，深入揭批“四人帮”的反革命修正主义工运路线，明辨是非肃清流毒，拨乱反正。"},{"type":"paragraph","text":"市第六次工会代表大会筹备委员会副主任李家齐在会上讲了话。他要求全市工人阶级和工会干部继续努力，在揭批“四人帮”的斗争中把工会整顿好、建设好，以实际行动迎接上海市工会第六次代表大会和全国工会九大的召开，在完成新时期总任务的伟大长征中作出上海工人阶级应有的贡献。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王洪文","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59e80c0d23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
