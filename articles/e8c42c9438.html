art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛主席十大军事原则西安炮校检查训练中的党性和战斗作风","authors":["林江"],"parts":[{"type":"paragraph","text":"本报讯 西安炮校从4月中旬开始学习毛主席军事著作，并联系实际研究训练中的党性问题。最近并以毛主席十大军事原则为武器，检查战斗作风和战术思想。"},{"type":"paragraph","text":"校党委对这一学习十分重视，全校军官一律编入小组，校长丛蓉滋大校亲自担任组长。"},{"type":"paragraph","text":"在检查训练工作的党性中，批判了“技术课没有党性”以及“按训练大纲办事就是党性”的单纯军事观点。许多同志指出，有的教员不举我国人民移山倒海建设社会主义的例子来说明地形变迁，却举了朝鲜战争中美军炮击山头改变地貌的例子，这难道不是违背训练的党性吗？"},{"type":"paragraph","text":"在学习毛主席十大军事原则中，大家十分重视十大军事原则的第六条，即发扬勇敢战斗、不怕牺牲、不怕疲劳与连续作战（即短期内不休息地接连打几仗）的作风，并联系批判该校在最近两次实弹射击中的娇气。同时也根据十大军事原则研究了集中使用炮兵的问题。 （林江）"}],"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8c42c9438"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
