s":[],"dates":[{"year":1976,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"市轻机公司组织部分理论队伍学习列宁的《国家与革命》，深入批判“三项指示为纲”的修正主义纲领。"},{"type":"paragraph","text":"他们学习列宁批判折中主义的论述，揭露右倾翻案风制造者提出“三项指示为纲”所玩弄的卑劣手法。党内不肯改悔的走资派鼓吹以“三项指示为纲”，看上去既讲政治，又讲经济，似乎很“全面”，实际上，是玩弄老机会主义头子考茨基耍的折中主义鬼把戏，表面上不偏不倚，从根本上却偏于资产阶级，倚于修正主义。"},{"type":"paragraph","text":"他们学习列宁关于马克思主义的发展论的论述，批判右倾翻案风制造者提出“三项指示为纲”的修正主义纲领理论依据。大家通过学习，认识到整个社会主义历史时期的矛盾集中地表现为无产阶级和资产阶级的矛盾。这是整个社会主义时期的主要矛盾，提出以“三项指示为纲”，就是根本否认无产阶级和资产阶级这个主要矛盾。而否定阶级斗争这个主要矛盾，就是机会主义路线的修正主义纲领的理论依据。"},{"type":"paragraph","text":"他们学习列宁关于社会主义历史阶段阶级斗争规律的论述，戳穿右倾翻案风制造者提出“三项指示为纲”的反动实质。党内那个不肯改悔的走资派，站在地主、资产阶级立场上，否定阶级斗争这个纲，反对限制资产阶级法权，否定和扼杀社会主义的新生事物，反对批判资本主义和修正主义，这就充分暴露了他的反马克思主义的丑恶嘴脸。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a465f43ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
