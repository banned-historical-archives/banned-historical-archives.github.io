件","authors":[],"dates":[{"year":1951,"month":12,"day":28}],"is_range_date":false,"parts":[{"text":"西北区在三反运动中发现坏分子诬告事件","type":"title"},{"text":"【西北总分社二十八日讯】西北畜牧部武功种畜场总务主任张明良(工作一贯积极负责)被坏分子诬告有贪污行为于十一月十五日跳井自杀。西北财政部和畜牧部组织的联合检查小组，到该场检查工作时，发现有两笔账目不清楚，潜伏在该场的坏分子即趁机向检查组诬告张明良有贪污行为，张受刺激很深，终于投井自杀。其绝命书上写着：我死得真冤枉，谁也不知道我是怎样死的？西北贸易部工程处副处长李剑彭(留用人员)在作整风动员报告时强调贪污、浪费必须严厉惩办，没有讲清对真诚坦白者轻处或免处的原则，使该处有贪污腐化行为的办事员王季云(重庆大学毕业生)对整风发生恐慌，企图吞安眠药自杀，幸被发觉制止。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年12月29日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0696bc6ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
