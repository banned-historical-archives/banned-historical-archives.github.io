ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在抗大干部晚会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在抗大干部晚会上的讲话！]"},{"type":"paragraph","text":"（1938年12月12日）"},{"type":"paragraph","text":"现在抗大有一万人，陕公有三千人，青训班有二千人，还有鲁迅艺术学院、马列学院、党校，共约两万人。我们办了许多学校，训练了许多干部，这个政策是对的。怎样才能使全盘的工作真正推动起来、开展起来，这就是要有干部。我们训练大批干部到前线去，领导游击队，领导军队，组织群众，发展统一战线，等等，这就是教育工作的意义。在工作方面，六中全会一共说了十五条，其中一条就是关于物质的保证。以后我们要自己解决物质上的供给，要自己种地，自己动手。"},{"type":"paragraph","text":"[1]这是毛泽东在抗大干部晚会上讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":12,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":78,"page_end":78},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28a88a9fe2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
