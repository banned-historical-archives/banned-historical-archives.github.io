ors":["南开大学","王贻武"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——“接受资产阶级民主遗产”","type":"title"},{"text":"南开大学王贻武","type":"authors"},{"text":"[王贻武：南开大学物理系学生]","type":"subtitle"},{"text":"“资本主义的民主是历史的积累，我们应该学习这种历史遗产，我们国家应该学习他们选举代表的方法，即代表应直接向选民汇报工作，不能强调垂直系统。”","type":"paragraph"},{"text":"“争人权争民主争自由，提的并不确切，问题并不是争，而是如何保证，很好实现民主自由，反社会主义的言论是否允许存在，还是强力压制，还是自由争论。舆论压力是不可避免的，但是不是可以让不同见解的人发表意见，肯定是人民内部的事情，虽然是资产阶级，也应受到宪法的保证。”","type":"paragraph"},{"text":"“选举制度是有缺点的，以前也提过（再论学习时）如果不改，我们要考虑自己的行动。”","type":"paragraph"},{"text":"“在我国应该允许资产阶级办报，如果蒋介石想在大陆上办报也可以，只要人们不看就行。因为解放几年来人民有能力来批判，那些好，那些坏，可以任其泛滥，对提坏的，人民对它置之不理，就行了。报纸只要对人民负责，不必对党负责。我不同意（报纸）执行党的一个政策、一个方针，除了党报和机关报而外，都可以离开党的领导。”","type":"paragraph"},{"text":"“报纸是否是教育人民的工具，我否认。报纸的报导是不能完全正确的。报纸是人民的喉舌，反映客观现实。反映不同看法是可以的。我国的报纸不应是清一色的。编辑可以根据自己的见解来编排。人们对于党报是信任的，党报批评那个刊物，那个刊物就减产了。","type":"paragraph"},{"text":"文汇报是否有自主的权力？不同的编排是否可以？我认为可以自己来决定，不必管他，他爱怎样就怎样。”","type":"paragraph"},{"text":"“大学生来自各个阶层，最能反映人民的意志，大学生应该在政治上起很大的作用。政治积极性应该指得更广泛些，包括对党的政策的积极思考，每人都有责任去影响当前的工作，不只是去执行政策”。","type":"paragraph"},{"text":"“中国青年报忘记了，青年学生有知识，纯洁，简单、热情，有思想逻辑，有理智的特点，他们服从真理。对知识分子是不能压服的。高等学校产生了“情况”，应该用理争，党委不用害怕。工农的发言是简单的，我想青年的大部分是求真理的，虽然发表“反共”论点，也是为真理。”","type":"paragraph"}],"comments":[],"origin":"《南开大学右派反动言论选集》（天津：南开大学社会主义思想教育教研室，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ab0c315b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
