{"year":1958,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据“云南日报”消息:双反运动在昆明各科学研究机构和高等学校中环绕着科研和教学整改正在进一步展开，在许多高级知识分子中，已经形成了一个争取红透专深的自我思想革命的高级。他们用交心会、大字报和思想展览的形式，开始向党推心置腹，吐露真情，大胆地暴露自己的错误思想，检查错误的言行。揭露出腐朽的资产阶级个人主义名利思想，是影响科学研究和教学质量的最大障碍。"},{"type":"paragraph","text":"在这种思想指导下，许多高等学校的教授、副教授和讲师，对待自己的培养社会主义接班人的光荣职务敷衍塞责，但为了挣几千元的稿费，真是“鞠躬尽瘁”，不惜连续深夜不眠。有的教师讲义长期不改，甚至还写着“解放五年来”的字样。就在反右派斗争以后，还有教授企图培养一个右派分子接替自己的教学任务，以便脱身去搞“黑题目”的科研，为名利宝座奠基。重业务经政治的现象，也很突出。有的人把每天的时间作了这样的安排:平时搞业务，上厕所才看政治(指读报)。甚至产生“政治危险”的论调，根本不读政治书籍。有的公开向学生宣称，只要搞好科学就会受到党和政府的重视，鼓吹谁要在三天之内将小鸡变成大鸡，就可得到多少诺贝尔奖金。"},{"type":"paragraph","text":"资产阶级个人主义的表现尽管形形色色，但归根到底，是从个人而不是从国家和集体利益出发，科学研究既变成了一些人猎取名利的手段，科学不一定要结合生产，一本书主义等等论调也就自然产生。中国科学院植物研究所昆明工作站的一些科学研究人员采集了植物后，只进行分类、定名和化学分析，然后就归档作标本，而这些植物的俗称乃至利用方法等则不加以调查研究。研究医学的大学教授，撇开了许多迫切需要解决的研究课题，而去搞肾上线皮质技术，即研究如何消除人脸上的黑疤，因为据说研究成功后可以取得很高的医疗代价，易于达到“国际水平”。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a57f36807"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
