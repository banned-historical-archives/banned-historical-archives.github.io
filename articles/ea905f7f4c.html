等问题给刘少奇、邓小平的电报","authors":[],"dates":[{"year":1958,"month":11,"day":13}],"is_range_date":false,"parts":[{"text":"毛泽东关于建议在北京开会为武昌会议作准备等问题给刘少奇、邓小平的电报","type":"title"},{"text":"少奇、小平同志：","type":"appellation"},{"text":"建议在北京在政治局、书记处同志并再参加若干同志的范围内，在这几天内，开三次至四次会：(一)讨论郑州起草的两个文件，当作问题提出，征求意见；(二)讨论斯大林苏联经济问题“意见书”部分的第一第二第三章。这样做，是为了对武汉会议先作精神准备。是否可行，请酌办。我认为省级也应这样做，讨论上述同样的两个问题，也应当只是当问题提出，征求意见的性质。如以为可行，请以电话通知各省。所谓当作问题提出，即对每一个问题，都提出正反两面。例如对划一条线弄清界限问题，提出划线好，还是不划线好?对商品问题，提出现阶段要商品好，还是不要商品好。其他问题，以此推类。","type":"paragraph"},{"text":" 毛泽东十一月十三日上午七时于郑州","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea905f7f4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
