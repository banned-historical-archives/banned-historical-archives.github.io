tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席转战陕北时用过的望远镜","authors":["孙良成潘仁毅"],"parts":[{"type":"paragraph","text":"1947年3月，蒋介石调动了胡宗南的二十二万兵力向我陕甘宁解放区进犯。当时延安我军只有兵力二万多人，在敌我力量悬殊的情况下，党中央、毛泽东同志决定撤离延安，转战陕北。"},{"type":"paragraph","text":"毛泽东同志以无产阶级军事家的战略气魄，采用“蘑菇”战术，拖着敌人的主力在陕北的荒山野岭中“大游行”，使之疲于奔命，然后再集中优势兵力，伺机歼灭敌人。在转战途中，毛泽东同志发表了《关于西北战场的作战方针》，《中国人民解放军宣言》、《中国人民解放军总部关于重行颁布三大纪律八项注意的训令》、《目前形势和我们的任务》等光辉论著，不但指导了西北战场，也指导了全国解放战争从胜利走向更大的胜利。同时，他还多次亲临前线，极大地鼓舞了广大指战员的斗志。这个望远镜，就是他在陕北转战时用过的，如今陈列在延安革命纪念馆里，供人们参观。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5268f6166c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
