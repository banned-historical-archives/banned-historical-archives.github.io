hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"接见谢富治同志时的谈话","alias":"","parts":[{"type":"paragraph","text":"与×同志的一段对话"},{"type":"paragraph","text":"(一九六七年四月）主席问：你们说是北京的大学大联合了，成立了红代会，很好呀：那三个司合部呢？"},{"type":"paragraph","text":"答：没有了，都取消了。主席：啊，为什么要取消呀？我才不相信呢：已经取消了？"},{"type":"paragraph","text":"（摘自周恩来同志1967年4月18日在广州群众组织座谈会的讲话）关于军管问题"},{"type":"paragraph","text":"(一九六七年四月）军管太少了。刘邓派工作组是压迫革命、反对群众，我们军管是支持革命的。"},{"type":"paragraph","text":"（摘自谢富治副总理四月十八日讲话）关于革命派的大联合"},{"type":"paragraph","text":"(一九六七年四月）"},{"type":"paragraph","text":"目前全国斗争形势很好，成绩很大，经验很多，全国都在前进中。革命派在优势情况下，可按系统、按部门、按单位实行大联合。但要注意保守派把造反派吃掉，不要用解散革命造反派的办法实行大联合。"},{"type":"paragraph","text":"接见谢富治同志时的话"},{"type":"paragraph","text":"（一九六七年四月十九日下午）我贺你，祝贺这次大会的成功。请代向全北京市革命造反派祝贺。致敬电是全世界无产者联合起来的大宣言，就不要再搞宣言了。"},{"type":"paragraph","text":"青年人要参加你们的工作，使前辈人不脱离群众，使青年人得到。青年人不能脱产，这样会造成脱离群众的，要半官半民。"},{"type":"paragraph","text":"北京的形势还有反复，无政府主义就是机会主义的惩。要不怕犯错误，各种反动的观点和反动的群众组织是极少数的。就是反动组织也要做工作，但是还得斗争。"},{"type":"paragraph","text":"无政府主义是对机会主义的惩"},{"type":"paragraph","text":"(一九六七年四月）"},{"type":"paragraph","text":"过去的八条，现在的十条结合起来是对的。左派起来了，对立面也起来了，这也不要紧，有点反复有好处。无政府主义是对机会主义的惩，要走向反面。"},{"type":"paragraph","text":"要把所有的联动放出来。·302·"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":4,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":315,"page_end":315},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57aeb3e24a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
