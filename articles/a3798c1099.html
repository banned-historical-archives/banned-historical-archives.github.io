art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"条条金线通北京最高指示传九洲","authors":["通信兵学习毛主席著作先进集体/某部长途台代表张奋石玉环"],"parts":[{"type":"paragraph","text":"毛主席啊，世界革命人民伟大的导师！您亲切地接见我们，这是对我们最大的关怀，最大的鼓舞。无限忠于您的长途台通信战士，要以最高的政治热情，最快的速度，把这特大的喜讯传遍五湖四海，让全国人民和我们共同分享这个最大的幸福。"},{"type":"paragraph","text":"我们工作间里喜气洋洋，欢乐的红灯在闪耀，激动的红心在欢跳，双双巧手连通了千万条线，股股电流报喜讯。喜讯传到某机务站，他们怀着对毛主席的无限热爱，马上通过有线广播，传播了这个特大喜讯；喜讯传到祖国南大门，战士们要我们向毛主席表达他们的忠心。天南海北在欢呼，五岭三河在欢唱。千歌万曲唱出世界最强音：敬祝毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"东方红，红满天。战斗了一夜的守机员更加意气风发，英姿飒爽，迎着东方升起的红太阳，向我们伟大领袖毛主席请示来了。面对着毛主席像，我们庄严宣誓：毛主席，您是我们心中的红太阳，我们对您无限热爱，无限信仰，无限崇拜，无限忠诚。我们要努力学习、全面落实您的“三·七”指示和一系列最新指示，坚守岗位，兢兢业业地做好通信工作，保证以您为首的无产阶级司令部指挥顺畅，在夺取无产阶级文化大革命全面胜利的斗争中为人民立新功。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3798c1099"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
