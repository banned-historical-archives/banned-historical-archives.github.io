ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"关于学校要减轻学生负担的批语","alias":"","parts":[{"type":"paragraph","text":"关于学校要减轻学生负担的批语！"},{"type":"paragraph","text":"（1965年7月3日）陆定一同志："},{"type":"paragraph","text":"学生负担太重，影响健康，学了也无用。建议从一切活动总量中，砍掉三分之一。请邀学校师生代表，讨论几次，决定实行。如何，请酌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六五年七月三日"},{"type":"paragraph","text":"[1]这个批语写在共青团中央办公厅1965年6月25日编印的《团的情况》（增刊）第十八期登载的《北师一个班学生生活过度紧张，健康状况下降》一文上。文章说，据共青团北京市委反映，最近他们对北京师范学院历史系二年级一个班调查，发现学生由于学习负担过重，体育锻炼运动量过大，课余活动多，严重地影响了学生的身体健康。"},{"type":"paragraph","text":"[2]陆定一，当时任中共中央宣传部部长、中央文教小组组长、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":7,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":84,"page_end":84},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0707211365"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
