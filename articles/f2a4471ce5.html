ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对成功发射“实践一号”科学实验卫星新闻稿的批语","alias":"","parts":[{"type":"paragraph","text":"对成功发射“实践一号”科学实验卫星新闻稿的批语！"},{"type":"paragraph","text":"（1971年3月16日）照办。"},{"type":"paragraph","text":"[1]这个批语写在周恩来1971年3月16日关于发表我国成功发射“实践一号”科学实验卫星新闻报道的请示报告上。新闻稿写道，1971年3月3日，我国发射了一颗科学实验人造地球卫星。卫星在3月3日至15日运行过程中，成功地向地面发回了各项科学实验数据，现仍在继续进行预定的科学实验工作。毛泽东审阅时，删去了新闻稿中以下一段话：“这是毛泽东思想的伟大胜利，是毛主席无产阶级革命路线的伟大胜利，是无产阶级文化大革命的又一丰硕成果。”这篇新闻稿1971年3月17日在《人民日报》发表。"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":184,"page_end":184},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2a4471ce5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
