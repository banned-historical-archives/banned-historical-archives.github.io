script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿拉伯人民颂扬毛主席是当代最伟大的革命领袖  毛主席最支持我们的反帝斗争","authors":[],"dates":[{"year":1967,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿拉伯人民颂扬毛主席是当代最伟大的革命领袖"},{"type":"paragraph","text":"毛主席最支持我们的反帝斗争"},{"type":"paragraph","text":"据新华社讯　阿拉伯革命人民高度颂扬毛主席是当代最伟大的天才、最杰出的马克思列宁主义者，是当代世界人民最伟大的领袖和导师。"},{"type":"paragraph","text":"一位巴勒斯坦工人对着毛主席像激动地说：“毛主席啊，您是我们敬爱的领袖。在今天的世界上，毛主席，是您最了解我们的疾苦，最支持我们的斗争。我要永远作您的忠诚战士！”巴勒斯坦朋友艾哈迈德说：“我读过毛主席的一些著作，越来越认识到，毛泽东思想是全世界被压迫人民走向解放道路的指南，也是我们巴勒斯坦难民解放自己祖国、重返家园的指南。我们巴勒斯坦难民要用毛主席教导的愚公移山的精神来搬掉压在我们头上的帝国主义、犹太复国主义和反动派的大山。”"},{"type":"paragraph","text":"叙利亚一位进步人士不久前著文说：“毛主席是当代最杰出的马克思列宁主义者，毛泽东思想是帝国主义和世界资本主义势力走向崩溃、社会主义革命走向全世界胜利的时代的最高最活的马克思列宁主义。”有些叙利亚朋友还指出，毛主席不仅领导着七亿中国人民而且也领导着全世界人民进行革命斗争。"},{"type":"paragraph","text":"伊拉克一位青年说：“毛主席的确是当代最伟大的天才和革命的导师。世界革命人民把希望寄托于毛主席——斗争中的人民的心中的红太阳。”"},{"type":"paragraph","text":"黎巴嫩一位老出租汽车司机说：“毛泽东主席太伟大了。正是毛泽东和在他领导下的七亿中国人民坚决地支持了越南人民、巴勒斯坦人民和其他被压迫人民反对帝国主义的斗争。毛泽东是当代的伟大领袖。”另一位年轻的出租汽车司机向记者索取毛主席像章，他拿到后立即别在自己的胸前，并高呼：“毛泽东万岁！人民中国万岁！”"},{"type":"paragraph","text":"一位黎巴嫩新闻工作者说：“毛主席是中国人民和世界革命人民的伟大领袖。我们非常敬佩他，感谢他对亚非人民反帝事业作出的巨大贡献。”"},{"type":"paragraph","text":"一位读过《毛主席语录》的黎巴嫩朋友说：“毛泽东思想是革命的真理。《毛主席语录》是伟大的中国革命的宝贵经验的结晶。通过阅读这本宝书，我们受到了极大的鼓舞。”"},{"type":"paragraph","text":"一位曾经访问过中国的黎巴嫩朋友说：“没有毛泽东，就不会有中国革命的伟大胜利和中国的一切伟大成就。你们拥有原子弹，就是因为你们有毛泽东思想。毛泽东思想比起任何原子弹和核弹都强大。我们同你们一样，以有毛主席这样伟大的领袖而感到非常幸运。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1d7702086"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
