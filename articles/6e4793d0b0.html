:1967,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"当我们听到极为振奋人心的特大喜讯——我国氢弹爆炸成功的消息时，红卫兵小将和革命教师个个内心无比激动，人人从内心里迸发出一个共同的欢呼声:毛主席万岁!毛主席万万岁!"},{"type":"paragraph","text":"我国氢弹试验的成功，再一次大大长了中国人民的志气，这是对正在抗英斗争的港九同胞和正在抗美斗争的越南人民、阿拉伯人民的巨大鼓舞，也是对美英帝国主义苏联现代修正主义和各国反动派的沉重打击。"},{"type":"paragraph","text":"我们在文化大革命中锻炼成长起来的红卫兵小将，决心听毛主席的话，向解放军学习，加强革命性、科学性、组织纪律性，高举革命的批判大旗，狠抓大批判这条纲，下定决心使学校的无产阶级文化大革命走上正轨，把无产阶级文化大革命进行到底!"},{"type":"paragraph","text":"上海市第六女中文化革命委员会、红卫兵团"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e4793d0b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
