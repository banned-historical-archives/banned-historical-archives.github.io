rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"表扬学习毛主席著作的先进单位和个人","authors":["陈执儒"],"parts":[{"type":"paragraph","text":"本报四日讯 今天工程兵某部集会隆重纪念毛主席《青年运动的方向》一文发表二十五周年，表扬了一批活学活用毛主席著作的先进单位和知识青年。"},{"type":"paragraph","text":"部队长刘万通报告了“五四”运动的来历和毛主席发表这篇文章的伟大意义。号召全体青年特别是知识青年遵循毛主席的指示，发扬革命传统，沿着革命化、工农化的道路前进。"},{"type":"paragraph","text":"三连战士、工程兵学习毛主席著作的积极分子钱茂先在会上报告了学习毛主席著作的体会，和与工农结合不断革命化、工农化的成长过程。"},{"type":"paragraph","text":"这个部队的许多青年，由于努力学习毛主席著作，在部队工作中进步很快。去年百分之五十点三的青年成为五好战士。在立功人数中，知识青年占百分之二十三点四。去年入党的青年，知识青年占百分之五十八点四。会上，表扬了四个活学活用毛主席著作的先进连队和一批知识青年战士。部队首长号召各单位向他们学习，掀起新的学习高潮。 （陈执儒）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35eb3747a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
