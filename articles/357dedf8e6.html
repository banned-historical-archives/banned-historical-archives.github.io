" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"重庆形势严重项英曾山暂勿离开军队","alias":"","parts":[{"type":"paragraph","text":"重庆形势严重项英曾山暂勿离开军队！"},{"type":"paragraph","text":"（1940年12月18日）叶、项："},{"type":"paragraph","text":"甲、重庆形势严重，项曾二人暂勿离开军队。乙、希夷及一部人员北上，望速作部署。丙、秘密文件必须烧毁，严防袭击。"},{"type":"paragraph","text":"毛朱王"},{"type":"paragraph","text":"十八日"},{"type":"paragraph","text":"[1]1940年12月9日，蒋介石强令江南新四军全部限期本年12月31日前开到长江以北。12月10日，蒋介石又密电江南第三战区司令长官顾祝同，如江南新四军在31日以前没有遵命北渡，就立即消灭之。这是毛泽东和朱德、中共中央军委副主席王稼祥给新四军军长叶挺和副军长项英的电报。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":280,"page_end":280},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"357dedf8e6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
