ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"对中央关于动员青壮年入藏屯垦生产的指示稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对中央关于动员青壮年人藏屯垦生产的"},{"type":"paragraph","text":"指示稿的批语和修改"},{"type":"paragraph","text":"（1959年1月22日）"},{"type":"paragraph","text":"送刘、小平、德怀、克诚阅后，尚昆办。我在尾上增了一段。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"一月廿二日"},{"type":"paragraph","text":"[1]指中共中央总书记邓小平1959年1月20日送审的中央关于动员两千青壮年入藏屯垦生产的指示稿。1959年1月24日，中共中央给四川省委并西藏工委正式下发了这一指示。"},{"type":"paragraph","text":"[2]刘，指刘少奇。小平，即邓小平。德怀，即彭德怀，当时任中共中央政治局委员、国务院副总理兼国防部部长。克诚，即黄克诚，当时任中共中央书记处书记、中央军委秘书长、中国人民解放军总参谋长。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。[4]即本篇二。毛泽东全集第四十一卷"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"在西藏地区，现在及今后几年内，是敌我双方争夺群众和锻炼武装能力的时间。几年之后，例如三四年，五六年，或者七八年之后，总要来一次总决战，才能彻底解决问题。西藏统治者原有兵力很弱，现在他们有了一支斗志较强的万人叛乱武装，这是我们的严重敌人。但这并没有什么不好，反而是一件好事，因为有可能最后用战争解决问题。但是（一）必须在几年中将基本群众争取过来，孤立反动派；（二）把我军锻炼得很能打。这两件事，都要在我军同叛武斗争中予以完成。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":173,"page_end":174},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a7039a034"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
