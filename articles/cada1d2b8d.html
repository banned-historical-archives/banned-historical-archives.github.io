"张秀龙"],"dates":[{"year":1970,"month":11,"day":17}],"is_range_date":false,"parts":[{"text":"张秀龙给毛泽东的信（要点）","type":"title"},{"text":"张秀龙","type":"authors"},{"text":"〖张秀龙，原解放军浙江省军区司令员。〗","type":"subtitle"},{"text":"信中说，您一九六七年九月视察浙江时讲：张秀龙犯了错误应帮助他站出来。可是我数年来都在靠边站，现在湖北省军队农场锻炼已有年余。我认为自己在文化大革命中犯错误，主客观原因很多，主要是自己跟不上您的思想，路线觉悟不高，世界观改造不好，有私心杂念，一切由自己负责。但我认为自己是好人犯犯错误，是人民内部矛盾。可是将我长期靠边站，不让过问政治，不让夫妻双方来往（我爱人有病，不准我请假去探望），我想不通，所以写信，请您要军委办事组了解一下我在此地锻炼的情况，指出我的努力方向，并允许我能在一定的时间里探家走动。","type":"paragraph"},{"text":"。","type":"appellation"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cada1d2b8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
