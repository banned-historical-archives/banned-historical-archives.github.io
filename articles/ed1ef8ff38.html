<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"愤怒高呼“打倒美帝国主义！”“打倒苏联修正主义！”  阿拉伯人民示威矛头直指美帝苏修  各国群众袭击美英机构怒冲苏修使馆","authors":[],"dates":[{"year":1967,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"愤怒高呼“打倒美帝国主义！”“打倒苏联修正主义！”"},{"type":"paragraph","text":"阿拉伯人民示威矛头直指美帝苏修"},{"type":"paragraph","text":"各国群众袭击美英机构怒冲苏修使馆"},{"type":"paragraph","text":"据新华社十二日讯　阿拉伯各国人民，面对着美国、以色列的疯狂侵略和美、英、苏串通一气策划的“停火”阴谋，近日来，群情激昂，同仇敌忾，继续举行声势浩大的示威，并采取行动，严惩侵略者。"},{"type":"paragraph","text":"在也门大城市塔伊兹，五千群众十日举行反对美、以武装侵略阿拉伯国家的大示威。示威者高呼：“我们要巴勒斯坦，打倒美帝国主义！”愤怒的示威者向塔伊兹的苏联大使馆扔石块，并高呼：“苏修是背叛者，中国是我们的真正朋友！”"},{"type":"paragraph","text":"同一天，在也门重要城市荷台达，数千工人也举行了游行示威，声讨苏修出卖阿拉伯人民的利益的罪行。示威工人义愤填膺地冲进苏联领事馆，并砸碎了门窗玻璃。工人们高呼：“打倒美帝国主义！”“打倒叛徒柯西金！”"},{"type":"paragraph","text":"在荷台达苏联修配厂内工作的全体也门工人，为了抗议苏修出卖阿拉伯人民的利益，举行了罢工。"},{"type":"paragraph","text":"在也门首都萨那，这些天来，人们到处听到抗议苏修、谴责苏修的愤怒的呼声。他们几乎异口同声地说：“苏联是美帝国主义的大帮凶！苏联是阿拉伯人民的大叛徒！”"},{"type":"paragraph","text":"在阿联首都开罗，愤怒的阿联人民十日在苏联大使馆附近举行示威，高呼打倒苏联修正主义的口号。苏联大使馆人员吓得躲在屋里不敢出来。"},{"type":"paragraph","text":"伊拉克首都巴格达人民十日举行盛大示威游行，反对美帝和以色列对阿拉伯国家的侵略。数千名愤怒的群众还到苏联大使馆门前示威。他们指着苏联大使馆喊道：“苏修是胆小鬼！”“我们要同叙利亚的兄弟们共同战斗，直到最后胜利！”"},{"type":"paragraph","text":"接着，这些示威者又列队来到中国大使馆门前，感谢中国对阿拉伯人民反侵略战争的真诚支持。示威者不断高呼：“毛泽东万岁！”“人民中国万岁！”激动地说：“人民中国是我们真诚的弟兄。人民中国坚决支持我们，而苏联是修正主义和叛徒。它出卖了我们。它的罪行将载入史册。他们将受到惩罚！”"},{"type":"paragraph","text":"同一天，伊拉克工会总联合会执行局写信给苏联驻伊拉克大使，强烈谴责苏修领导集团背叛阿拉伯人民的反帝斗争。信件指出：“苏联政府的立场是投降主义的，是向世界帝国主义势力的明显的投降。”"},{"type":"paragraph","text":"信件说：伊拉克的工人明确坦率地认为，苏联必须对由于它的投降行为而导致帝国主义的侵略负责。"},{"type":"paragraph","text":"在阿尔及利亚，十日继续举行群众示威，示威者不断高呼：“我们要战斗”等口号。"},{"type":"paragraph","text":"数日来，在苏丹也举行了好几次反对苏修的示威。苏丹青年十日用燃烧弹袭击了美国在喀土穆的文化中心，使美国图书馆遭到了破坏。"},{"type":"paragraph","text":"在英国殖民主义者统治下的亚丁，人民十日袭击了亚丁以东四十英里的一个英国棉花种植园，捣毁了种植园的办公室。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed1ef8ff38"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
