script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"商会性质与资产阶级的产生———中国商会与资产阶级学术讨论会观点综述","authors":["王翔"],"dates":[{"year":1986,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"十一月十六日至二十一日，中国商会与资产阶级学术讨论会在苏州举行。中国最早的八大商会的所在城市:北京、上海、天津、武汉、广州、重庆、南京、苏州，均有代表参加了会议，现择其要者述之。"},{"type":"paragraph","text":"中国商会的性质和作用。与会代表基本上肯定了商会的资产阶级性质，但对一些具体问题的看法则不尽相同。有代表指出，以前认为商会主要代表中上层资产阶级，但从商会人员组成、经济、政治要求等方面来看，商会是代表中小资产阶级的，不能说是大资产阶级的团体。另一种意见则认为各地情况有所不同，并以上海商会的情况为例，说明商会的领导权确实把持在上层资产阶级手中。还有人认为一般说商会具有资产阶级性质，但其中成员的身份则不能一概而论；而且由于中国经济、政治发展的不平衡，恐怕不能说每个地区都具有资产阶级性质。与会代表还探讨了中国商会与旧式行会的联系与区别。国外一些学者认为商会就是联合行会，否认商会是资产阶级的组织；代表们认为，中国商会主要是从公所、行帮的基础上发展起来的，在组织上需依靠公所、行帮的原有人员，在资金上要借助公所、行帮的资助，这是两者之间的联系；但更重要的是区别，商会内部具有资产阶级民主色彩，而且不具备限制资本主义竞争的职能，主要是促进工商业的发展，所以尽管商会还沾带着一些旧的痕迹，但与封建行会有本质的区别。"},{"type":"paragraph","text":"对于商会的作用，有人认为，成立商会是清末“新政”的一项重要内容，作为合法组织，商会比革命党人更便于活动，但因其合法性，也就具有较大局限性，当权人物多为有功名的绅商，在辛亥革命阶段，对政府的支持要多于对革命的支持，只是在各地独立成为既成事实时，才勉强表示承认。另一种意见认为，各地的民间团体实际上是商会的隶属组织，通过各种民间组织的相互配合，商会已控制了各地的教育、经济、财政，甚至一部分武装，形成为一种类似于地方政府的职能。这种社会基础，对于清政府在武昌起义后的很快土崩瓦解，对于辛亥革命后社会秩序的迅即安定，起了很大的作用。"},{"type":"paragraph","text":"中国资产阶级的最早形式和不同形态。传统的观点认为:随着近代工业在中国的出现，近代资产阶级就产生了。与会代表对此表示异议，认为近代中国资产阶级首先产生于流通领域，其最早形态恰恰不是工业资产阶级而是商业资产阶级。随着中国与世界资本主义经济发生联系，一些买办、商人转化为新式商人，参与剩余价值的分割，积累起资本，形成为近代商业资产阶级，其后又投资新式工业，发展成为工业资产阶级，这是中国资产阶级产生的一条特殊道路。不少代表认为，早期中国资产阶级的主体是商业资产阶级。商业资产阶级力量的发展，与清政府在甲午战争前后由“困商”政策到“促商”政策的转变有关，所以对辛亥革命的态度一般都较保守。代表们一致认为，对资产阶级的历史作用应正确评价，即使主张君主立宪的人，也不应一概骂倒，而应以历史主义的观点，进行实事求是的分析与研究。"},{"type":"paragraph","text":"买办的阶级属性和进出口贸易的作用。有人认为，以前把外国对华贸易称为经济侵略，把中国的出口贸易称为帝国主义掠夺，把经营进出口贸易的中国商人称为买办，划为一个专门的阶级，这是很可怀疑的。以前说买办是由外国资本家豢养的走狗，实际上，经营进口贸易是拿外商的佣金，出口贸易则是拿中商的佣金，为什么不说是华商豢养的呢?而且，许多买办在经营进出口贸易的同时，还投资经营其他工矿企业，这些都说明买办与民族资产阶级是密不可分的，根本不可能划清。以前说“买办是一个很不稳定的阶级，转进转出很频繁”，这是不妥当的，阶级的转化是一个长期的、痛苦的过程，怎么可能忽而转进、忽而转出呢?实际上这不是阶级间的转化，而是本阶级内部的转业。以前常按大、中、小划分买办阶级，认为大买办最反动，其实不然，大买办恰恰最先进，因为其积聚起大量资本，向新式工业转化最有条件。　(王翔)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d89edb0044"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
