ear":1990,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"研究和宣传毛泽东思想"},{"type":"paragraph","text":"薄一波"},{"type":"paragraph","text":"同志们："},{"type":"paragraph","text":"喜闻“毛泽东思想在中国的拓展与胜利学术研讨会”即将召开，不禁欣然命笔，写此短信，以表达一个老共产党员对你们的祝贺和感谢。"},{"type":"paragraph","text":"毛泽东思想是我们党的指导思想，它是马克思主义与中国革命和建设实践相结合的产物，是中国共产党集体智慧的结晶。过去新民主主义革命的胜利是在毛泽东思想指导下取得的。今天改革开放的路线、方针、政策，也是在毛泽东思想指导下提出的。近７０年的历史证明，坚持毛泽东思想，我们的革命和建设事业就向前发展，反之，就要受挫折。因此，研究和宣传毛泽东思想是一项长期而重要的工作。你们在这方面带了一个好头，应该受到鼓励和支持。"},{"type":"paragraph","text":"坚持毛泽东思想，最根本的就是要坚持实事求是、一切从实际出发、理论联系实际的原则。实事求是是马列主义毛泽东思想活的灵魂，不讲这一条，什么事情也办不好。建设有中国特色的社会主义，核心问题还是要坚持把马列主义毛泽东思想基本原理与中国社会主义现代化建设实践相结合，善于用马列主义毛泽东思想的立场、观点、方法去研究现代化建设中出现的新情况新问题，并在此基础上，制定出符合中国社会发展规律的路线、方针、政策，用以指导各项工作。不这样做，建设社会主义现代化强国的宏伟目标是不可能实现的。希望同志们大力宣传实事求是的思想路线。"},{"type":"paragraph","text":"把马列主义毛泽东思想基本原理与中国社会主义现代化建设实践相结合的过程，也就是丰富和发展马列主义毛泽东思想的过程，但这需要从理论上加以总结和提高。我们的理论工作者既要在坚持和宣传马列主义毛泽东思想方面下大力气，也要注意协助党中央总结社会主义现代化建设中取得的新经验，使之理论化、系统化，以便进一步指导社会主义现代化事业向前发展。这方面的工作还十分薄弱，希望大家予以重视，把这项艰巨任务义不容辞地担当起来。"},{"type":"paragraph","text":"同志们，研究和宣传毛泽东思想，是中国社会主义现代化建设事业的需要，是历史赋予你们的神圣使命，任重而道远，希望大家齐心协力，坚持不懈，把这一工作做好，为社会主义事业多做贡献。"},{"type":"paragraph","text":"（这是薄一波同志１０月１９日给“中国毛泽东思想理论与实践研究会第三次学术年会”的贺信，题目为本报所加。）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e18f53bd9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
