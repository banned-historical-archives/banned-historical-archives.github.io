批权限问题的指示（复江西省委的请示）","authors":[],"dates":[{"year":1958,"month":2}],"is_range_date":false,"parts":[{"text":"中央关于内部肃反案件的逮捕和判刑的党内审批权限问题的指示（复江西省委的请示）","type":"title"},{"text":"你们1月7日来电已悉。关于内部肃反案件的逮捕和判刑的党内审批权限问题，中央曾在1957年12月17日批转了浙江省委一个电报。最近，各地又不断要求党内审批权限的继续下放。中央考虑了这些意见之后，认为：为了保证审批的准确和防止可能发生的偏差，特对党内审批权限作如下规定：","type":"paragraph"},{"text":"（一）内部肃反案件的逮捕和判刑的审批权，不宜下放，仍由省委负责审批。","type":"paragraph"},{"text":"（二）为了照顾运动的实际需要，保证审批的及时，必要时，可由省委指派负责人员代表省委就地进行审批，但对于属于省委管理干部名单范围内，应当逮捕的分子，及一切需要判处无期徒刑或者死刑（包括死刑缓期）的案件，仍须报省委审批。死刑的判处必须先报告中央审批然后再执行。","type":"paragraph"},{"text":"（三）判处管制的案件，可交由地（市）、县委负责审批。","type":"paragraph"}],"comments":[],"origin":"摘自《组织工作文件选编》，转载于铁道部政治部审干办公室《审干工作政策选编》， 1982年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65e95a9444"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
