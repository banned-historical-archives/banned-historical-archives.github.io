<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"谢富治对红代会各院校代表的谈话","authors":[],"dates":[{"year":1967,"month":5,"day":7}],"is_range_date":false,"parts":[{"text":"谢富治对红代会各院校代表的谈话","type":"title"},{"text":"同学们：","type":"appellation"},{"text":"今天来看看大家，来向你们学习。红代会是一个很重要的工具，红代会对执行毛主席的无产阶级革命路线有很大的贡献，对全国无产阶级文化大革命有很大的贡献。在新的阶段，北京的各个大学又起了带头作用，在大批判大联合中起了很好的作用，你们要高举毛泽东思想伟大红旗，把工作做得更好。（下略）","type":"paragraph"},{"text":"不能反新北大，谁反新北大我不赞成，应该去反对刘少奇嘛！北大去核心组的问题不是他们自己提出的，是我们几个人研究决定的。不要反聂元梓同志，她有错误可进行自我批评。北大有缺点也有贡献，贡献是主流，缺点和错误是支流，毛主席教导我们看问题要看主流嘛！北大聂元梓成绩是主流，但有缺点，甚至错误。地质学院也是如此嘛，对别人来讲主要看主流，对自己应该看自己的支流。（下略）","type":"paragraph"},{"text":"地质学院现在一个指头的问题不能轻视。北大和聂元梓有自己的缺点可以检查，可以写信，可以写小字报，不要到外面宣传嘛！在外面要支持北大，支持聂元梓，因为不完全是北大的问题和聂元梓的问题。因为资产阶级当权派最希望聂元梓、蒯大富等等垮台，保守势力最高兴，希望你们注意，触及自己的灵魂，注意大方向，不能到处是无政府主义。（下略）","type":"paragraph"},{"text":"红代会中要把北大同志搞出去，我不赞成，聂元梓有缺点可以批评，不能把北大搞出去。我看中央文革小组也不赞成。北大一定要参加核心小组，这是中央决定的。一定要把北大搞出去，我是不赞成的，中央文革也不赞成，你们一定要搞，得不到支持，你们核心小组一定要解决这个问题。再说一点，北大不能离开核心组。（下略）","type":"paragraph"},{"text":"我们就想听听同学们的意见，使我们了解很多问题，就是时间短一些。这次在北大，下次可以在别的学校。无产阶级文化大革命经过一月风暴，中间也有一些大小的曲折。不管什么曲折，以毛主席为代表的革命路线取得决定性胜利，正在胜利前进，以刘邓为代表的资产阶级反动路线得到彻底失败。我们现在要彻底批判刘、邓、陶和北京市的反革命修正主义路线，要把总根子挖掉。在需要夺权的地方要夺权，已经夺权的地方，现在看来有的夺得好一些，有的夺得差一些，由于没有经验，但总的大方向是对的。有的夺权中没有实行三结合，这并不是革命造反派的错误，而是没有经验。现在就是要大批判、大斗争、大联合，只有通过大批判、大斗争，才能实行大联合。只有革命的大联合才有革命的三结合，有了三结合和大联合，就可以进一步促进大批判和大斗争。","type":"paragraph"},{"text":"现在又提出左派内部要大动荡、大分化、大改组是错误的，为什么有些单位联合不起来呢？就是无政府主义。没有十全十美的东西，红代会也是如此，对领导有意见可以提，但是大方向是对的，在全国的影响很大，威信高，红代会有缺点，是一个指头的问题，你们要维护她，要支持她。联合是我们的大方向，分裂不是大方向，越分裂保守派越猖狂。要抓大方向，抓大斗争，大批判，要促进大联合，反对武斗，反对内部分裂。不能敌人还没有打倒，自己就瓦解了。小道理要服从大道理，大道理要管小道理，不管对某个人、对某个组织有意见，都要服从革命的大联合，违背这点我们就不赞成。在这里我要表个态，红代会核心组北大一定要参加，这是北京市革命委员会、中央文革的意见，北大和聂元梓成绩、主流是主要的，也有缺点错误，但是支流。主席教导我们看人要看主流，但对一定单位不能只看主流，作为你自己来讲要先看支流。","type":"paragraph"},{"text":"……","type":"appellation"},{"text":"北大有缺点应当检查，地质就没有缺点了吗？你就那么正确？地质的朱成昭思想没有完全肃清，不要背着包袱走到反面，我们支持大方向，但是不能不批评。我今天批评还客气点，如果文革小组的批评还严厉一点，这是同志式的批评，是内部批评，要把红代会搞好，要把北大和地质的关系搞好，都要作自我批评。地质学院同志们，提醒你们注意，要理解这一点。我个人有什么缺点可以提，但我要提请你们注意，要注意大方向。","type":"paragraph"},{"text":"地质学院现在一个指头的问题不能轻视。北大和聂元梓有自己的缺点可以检查，可以写信，可以写小字报，不要到外面宣传嘛！在外面要支持北大，支持聂元梓，因为不完全是北大的问题和聂元梓的问题。因为资产阶级当权派最希望聂元梓、蒯大富等等倒台，保守势力最高兴，希望你们注意，触及自己的灵魂，注意大方向，不能到处无政府主义，如果我这些都是毒草，你们就批评，我这个人毛泽东思想水平不高可以批评。","type":"paragraph"}],"comments":[],"origin":"《北京大学文革资料选编（下）》，美国华忆出版社，2020。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"聂元梓","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84e36d7727"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
