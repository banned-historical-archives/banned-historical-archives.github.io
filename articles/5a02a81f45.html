命造反团体和革命群众通力协作共同搞好接待工作","authors":[],"dates":[{"year":1967,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席和党中央的亲切关怀和强有力的支持下，上海无产阶级文化大革命的形势大好，接待任务愈来愈繁重。但是，上海市委完全无视这一形势，竟在前一阶段实行所谓“紧缩”方针，把大批接待人员遣散回去，制造人为紧张，结果使大批外地来沪的革命造反同志的食宿问题无法解决。为了迅速扭转这一局势，上海市接待人员革命造反司令部正在积极采取措施，加强接待工作。可是由于接待任务繁重，有些问题又不是这个司令部本身所能全部解决的，因此他们向全市革命造反派和革命群众，发出了五项紧急呼吁，希望大家给予全力支持。这五项呼吁是:"},{"type":"paragraph","text":"一、希望全市革命造反派和革命群众，特别是直接参加接待工作的同志，坚定地站在以毛主席为代表的无产阶级革命路线一边，高举毛泽东思想伟大红旗，随时准备粉碎上海市委破坏接待工作的阴谋诡计，克服一切困难，满怀阶级感情，接待来自全国各地的阶级弟兄。"},{"type":"paragraph","text":"二、希望全市各革命造反团体和广大革命群众，尽可能给予人力、物力的支援，以保证接待工作的顺利进行。"},{"type":"paragraph","text":"三、凡是自行搬入接待用房的居民，按照上海工人革命造反总司令部等三十二个单位的《紧急通告》的规定，立即搬回原来住所。否则大批外地阶级弟兄的住宿问题就无法解决。"},{"type":"paragraph","text":"四，希望已经返回原单位的接待人员见报以后，立即到原来工作的接待站报到。有关单位的当权派，对此绝对不准刁难和阻挠，否则必须承担一切严重后果的责任。"},{"type":"paragraph","text":"五、希望各厂矿企业、人民团体(包括里弄委员会)原来所办接待站，迅速恢复接待工作。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a02a81f45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
