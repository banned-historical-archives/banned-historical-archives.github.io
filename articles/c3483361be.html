script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国侵略者自己套上了绞索  “红旗”杂志发表社论阐述毛主席讲话论点","authors":[],"dates":[{"year":1958,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国侵略者自己套上了绞索"},{"type":"paragraph","text":"“红旗”杂志发表社论阐述毛主席讲话论点"},{"type":"paragraph","text":"新华社14日讯　将在9月16日出版的“红旗”第八期上，发表了一篇题为“美国侵略者自己套上了绞索”的社论。这篇社论是阐述毛主席在第十五次最高国务会议上讲话的论点的。社论首先指出：“历史为一切帝国主义反动派准备了一个悲剧的角色，注定他们要努力制造自己的掘墓人。他们愈是穷凶极恶，结果就愈加激发人民的革命斗志。他们的侵略范围愈是扩大，套在他们脖子上的绞索就愈来愈多。他们的挑衅活动愈是疯狂，被人民控制了的绞索就愈拉愈紧。美国侵略者如果继续坚持制造绞索套自己脖子的政策，它被全世界人民宣判绞刑的日子也就愈益临近了。”"},{"type":"paragraph","text":"社论说：“自己制造绞索套在自己脖子上的美国侵略者，每一次制造紧张局势，结果都是日益紧张地把全世界人民的觉悟性、积极性动员起来，促使那些控制着绞索另一端的各国人民日益将绞索拉紧。在美国侵略者不断制造的紧张局势中，全世界人民，包括一些原来认识不清的人们，都会逐步看清楚美帝国主义是世界和平的最凶恶的敌人，每一个人在战争和和平的问题上都日益明确地表明自己的态度。”社论说，“对于中国人民和世界各国人民来说，杜勒斯真称得起是最好的‘反面教员’。他所坚持的敌视中国人民和敌视世界人民的政策，经常在中国人民和世界人民中，激起愈来愈大的抗美怒潮和奋发图强的斗志。就凭这一点，可以说，杜勒斯是为中国和世界各国革命事业间接地做了有益的工作，应当给他一个勋章。”"},{"type":"paragraph","text":"社论说，“最近美帝国主义企图对金门、马祖等我国内海岛屿扩大侵略，不过是它一贯决心与中国人民为敌的继续和发展。中国人民是热爱和平的，但是，如果美国侵略者一定要强迫我们进行战争，中国人民决不害怕战争。美国侵略者如果一定要挑起世界战争，那么正如我们多年来反复说过的，毫无疑问，战争的结果，必然是整个帝国主义体系的彻底毁灭，必然是世界持久和平和人类进步事业的伟大胜利。”社论最后说，“最近几十年，特别是最近十几年，乃是充满着革命事件和革命胜利的时期。帝国主义原来当作稳固的基石的地方，一大片一大片地突然崩陷。帝国主义者绝对不能阻止这个过程，因为他们的政策客观上永远是在加速这个过程”。"},{"type":"paragraph","text":"“红旗”第八期还发表了吴芝圃的“由农业生产合作社到人民公社”、中共河北省委关于建立人民公社的指示、蒋南翔的“党的教育方针促进了高等学校的革命”、梁寒冰的“半工半读是教育和生产劳动相结合的最好形式”、药远保的“山西机床厂办起了红专大学”、赵守一的“文教战线上的大跃进”等文。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3483361be"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
