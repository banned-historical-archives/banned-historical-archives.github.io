script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上港三区结合落实毛主席的最新指示和各项无产阶级政策掀起两条路线斗争史的大学习大宣传热潮决心扎扎实实地学习林副主席的政治报告，边学边干，在斗批改高潮中创立新功","authors":[],"dates":[{"year":1969,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上港三区革委会结合落实毛主席的最新指示和各项无产阶级政策，组织广大革命群众进行两条路线斗争史的大学习、大宣传，不断提高广大群众的两条路线斗争觉悟，推动斗批改深入发展。"},{"type":"paragraph","text":"这个区在文化大革命前是刘少奇及其在上海和交通部门的代理人推行修正主义路线的一个据点，两条路线斗争一直非常尖锐、复杂。文化大革命中，革命造反派起来夺了走资派的权以后，一小撮叛徒、特务、反革命分子千方百计地想从右的或极“左”的方面来破坏斗、批、改。革命委员会的新老干部认真学习毛主席最新指示:“历史的经验值得注意。一个路线，一种观点，要经常讲，反复讲。只给少数人讲不行，要使广大革命群众都知道。”认识到，只有使广大革命群众都懂得党的两条路线斗争史，才能懂得毛主席无产阶级革命路线的正确，才能正确落实毛主席的各项无产阶级政策。所以，他们非常重视两条路线斗争史的教育。这个区群众性的两条路线斗争史学习，有以下几个特点:"},{"type":"paragraph","text":"第一，大办毛泽东思想学习班，把学习毛主席的最新指示和学习党内两条路线斗争史结合起来。边学边批，学与批结合，在批判修正主义路线过程中加深对毛主席最新指示的理解。"},{"type":"paragraph","text":"第二，结合落实党的政策，深入学习两条路线斗争史。革委会认识到毛主席的各项无产阶级政策，代表了无产阶级的根本利益。他们把落实党的各项无产阶级政策看作是执行毛主席革命路线的一个组成部分，在落实政策过程中，学习两条路线斗争历史。有一次，在对三个审查对象进行定案时，许多同志感到宽严很难掌握，有的主张严一些好，宽了有人会说是“右倾”，后来，反复学习了毛主席对敌斗争政策，统一了思想，对三个对象作了适当的处理。由于处理得当，许多审查对象在党的政策感召下，纷纷交代了问题。"},{"type":"paragraph","text":"第三，通过总结经验，进一步学习两条路线斗争史，加深对毛主席革命路线的认识。他们学习了毛主席“要认真总结经验”的最新指示，认识到两年多来无产阶级文化大革命的战斗历程，就是两条路线激烈斗争的历程，总结经验，就要总结两条路线斗争的经验，他们把总结经验当作一次最生动、最活的两条路线斗争教育活动，在总结经验的过程中，学习两条路线斗争史，边总结、边学习，学为了“结”，“结”中有学，使总结经验变成为一场两条路线斗争的再教育。"},{"type":"paragraph","text":"第四，把两条路线斗争史的学习与阶级教育密切结合起来。他们根据海港工人苦大仇深，人人有篇血泪史，家家有本血泪账的特点，在学习两条路线斗争史中，狠抓阶级教育，举办阶级教育展览会，组织老工人讲“三史”，把群众通过阶级教育激发出来的对毛主席无限热爱的阶级感情，及时引导到两条路线斗争高度，提高捍卫毛主席革命路线的自觉性。每次进行两条路线斗争史学习时，都要启发群众回忆对比，使群众清楚地懂得，谁是敌人，谁是恩人，爱谁，恨谁，牢固树立反修防修，不走回头路，紧跟毛主席闹一辈子革命的思想。"},{"type":"paragraph","text":"党的“九大”向全国人民发出了学习党内两条路线斗争史的战斗号召，进一步鼓舞了上港三区革委会狠抓两条路线斗争教育，加快斗、批、改步伐的信心。他们决心以最迅速的行动，认认真真扎扎实实地学习林副主席的政治报告，逐段逐节地学，联系实际、联系思想学，学一点，用一点，边学边干，坚决落实“九大”提出的各项战斗任务，把大学习和大落实结合起来，在斗批改高潮中立新功。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6053c4b176"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
