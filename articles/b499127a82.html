ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致刘少奇电","alias":"","parts":[{"type":"paragraph","text":"致刘少奇电"},{"type":"paragraph","text":"（1940年11月3日）"},{"type":"paragraph","text":"目前时局，处在转变关头，我们处理恰当与否，关系前途甚大。蒋介石准备投降，决心驱我军于黄河以北，然后沿河封锁，置我于日蒋夹击中而消灭之，其计至毒。"},{"type":"paragraph","text":"在此次反共高潮中，甚至以后相当长时期内，我们与蒋介石并不表示决裂，而提出请求撤惩何应钦，坚持抗战国策，撤退反共军，给人民以自由，释放抗日政治犯，恢复国内和平，召开国民大会等条件。"},{"type":"paragraph","text":"惟你们一切部署，应放在反共军必出动之判断上，放在最黑暗局面上，丝毫不能动摇，以免上蒋的当。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":190,"page_end":190},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b499127a82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
