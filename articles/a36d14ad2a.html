al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"给李思安的信","alias":"","parts":[{"type":"paragraph","text":"给李思安的信"},{"type":"paragraph","text":"（1920年11月25日）钦文\"姊："},{"type":"paragraph","text":"你这信我八月里就接到了。后来还接到你在星加坡寄来的一封长信，并一些印刷物。很感你的厚意。我因事忙，没有即答，想能厚（原）谅我罢。“湘江”尚未出版。湖南须有一些志士从事实际的改造，你莫以为是几篇文章所能弄得好的。大伟人虽没有十分巩固，小伟人（政客）却很巩固了。我想对付他们的法子，最好是不理他们，由我们另想办法，另造环境，长期的预备，精密的计划。实力养成了，效果自然会见，到不必和他们争一日的长短。你以为然么？你事务谅是忙的，我劝你总要有时间看一点新书报。并且希望你能够继续省察自己，能够知道自己的短处。你前信嘱转集虚？，已《已）转他看了。有暇望告我以近状。"},{"type":"paragraph","text":"弟泽东"},{"type":"paragraph","text":"十一月二十五日"},{"type":"paragraph","text":"[1]钦文，即李思安（1892—1969)，湖南长沙人，新民学会会员，当时在新加坡坤成女校教书。第一次大革命失败后去印度尼西亚，1950年回国，后任湖南文史研究馆馆员。"},{"type":"paragraph","text":"[2]集虚，即蒋竹如（1899—1967)，湖南湘潭人。毛泽东在湖南省立"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":11,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":312,"page_end":312},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a36d14ad2a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
