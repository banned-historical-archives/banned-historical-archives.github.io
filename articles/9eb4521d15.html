rs":["毛泽东"],"dates":[{"year":1967,"month":2,"day":1}],"is_range_date":false,"parts":[{"text":"关于坚持文斗、反对武斗的一封信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"恩来同志：","type":"appellation"},{"text":"最近以来，许多革命师生和革命群众来信问我，给走资本主义道路当权派和牛鬼蛇神戴高帽子，打花脸游街，是否算武斗？我认为是武斗的一种形式。这种作法起不了教育人的目的。这里我顺便强调一下，在斗争中一定坚持文斗，摆事实，讲道理，以理服人，才能斗出水平，才能达到教育人的目的。应当分析武斗的大多数是党内一小撮别有用心的资产阶级反动分子挑起的，他们有意破坏文化大革命，破坏党的政策，降低党的威信。凡动手打人应依法处之。请你转告给革命师生和革命群众。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9eb4521d15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
