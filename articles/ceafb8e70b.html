art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"保卫毛主席歌颂毛主席","authors":["刘老安刘明亮"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“革命文化，对于人民大众，是革命的有力武器。革命文化，在革命前，是革命的思想准备；在革命中，是革命总战线中的一条必要和重要的战线。”"},{"type":"paragraph","text":"我们是毛主席身边的警卫战士。在毛主席接见红卫兵的光辉日子里，我们这些在旧社会被人视为牛马的穷孩子，一次又一次见到了我们心中最红最红的红太阳毛主席，沐浴着世界上最温暖、最幸福的阳光。我们无比激动，无限自豪，无上光荣！每当我们见到毛主席，每当我们看见天安门前的壮丽情景，我们的心象大海澎湃的波涛，抑制不住内心的激动，立即拿起笔杆，把这些展现在我们面前的动人故事，编成节目，用革命的文艺向广大革命人民作宣传。几年来，我们连队演唱组编演了《最高统帅登上天安门》、《毛主席，我们永远忠于您》等充满对毛主席无限深情的文艺节目，尽情地歌颂我们心中最红最红的红太阳毛主席。我们经常在天安门广场上给广大革命群众演唱，为战无不胜的毛泽东思想高唱赞歌，为无产阶级文化大革命的大好形势大喊大叫。革命群众看了我们的演出，赞扬我们说：“你们不仅是毛主席的忠诚警卫战士，也是毛泽东思想的红色宣传员。”"},{"type":"paragraph","text":"我们守卫在天安门，肩负着全国人民和全世界革命人民交给的重任。保卫毛主席，保卫毛泽东思想，保卫毛主席的革命路线，就是保卫全世界革命人民最根本的利益。谁敢反对我们伟大领袖毛主席，我们就奋起毛泽东思想的千钧棒，把它打得落花流水，将它彻底埋葬。我们决心永远拿起革命文艺的武器，为人类进入毛泽东思想的伟大新时代大写、大演、大唱。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ceafb8e70b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
