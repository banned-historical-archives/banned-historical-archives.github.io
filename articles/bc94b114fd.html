" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批准公安部“关于公安系统落实干部政策情况和意见的报告”（概要）","authors":[],"dates":[{"year":1972,"month":7,"day":9}],"is_range_date":false,"parts":[{"text":"中共中央批准公安部“关于公安系统落实干部政策情况和意见的报告（概要）","type":"title"},{"text":"1972年7月9日，公安部向中共中央提出《关于公安系统落实干部政策情况和意见的报告》。这个报告是在周恩来指示下起草的。《报告》建议对应解放的干部抓紧工作，及时解放，原则上都应在公安部门分配适当工作。公安部机关军管已经完成了历史任务，应当予以撤销。中共中央批准了这个报告，并转发各地党委督促贯彻执行。到1973年，全国公安机关陆续解放了一批领导干部，调回了一大批业务骨干。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc94b114fd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
