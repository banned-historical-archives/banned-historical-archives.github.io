s":[],"dates":[{"year":1980,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热烈祝贺津巴布韦共和国宣告诞生"},{"type":"paragraph","text":"叶剑英委员长致电卡南·巴纳纳总统"},{"type":"paragraph","text":"新华社北京四月十七日电  中华人民共和国全国人民代表大会常务委员会委员长叶剑英四月十五日打电报给津巴布韦共和国总统卡南·巴纳纳，热烈地祝贺津巴布韦宣布独立和卡南·巴纳纳就任总统。电报全文如下：索尔兹伯里津巴布韦共和国总统卡南·巴纳纳先生阁下："},{"type":"paragraph","text":"在津巴布韦光荣宣布独立，阁下就任津巴布韦共和国总统的时候，我谨代表中华人民共和国和中国人民，向阁下和津巴布韦人民表示热烈的祝贺。"},{"type":"paragraph","text":"祝津巴布韦人民在维护民族独立和建设国家的事业中，不断取得新的胜利和成就。祝中、津两国人民的友谊日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长 叶剑英"},{"type":"paragraph","text":"一九八○年四月十五日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"518751f069"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
