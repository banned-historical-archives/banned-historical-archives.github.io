<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1978,"month":2,"day":4}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理抵加德满都受到热烈欢迎比兰德拉国王会见邓小平副总理 邓副总理拜会比斯塔首相并举行会谈","authors":[],"parts":[{"type":"paragraph","text":"据新华社加德满都一九七八年二月三日电 中华人民共和国国务院副总理邓小平，应尼泊尔王国首相比斯塔的邀请，二月三日上午乘专机到达加德满都，对亲密邻邦尼泊尔王国进行正式友好访问。"},{"type":"paragraph","text":"当邓小平副总理的坐机飞越了世界屋脊喜马拉雅山脉，在加德满都特里布文机场降落以后，比斯塔首相同走下飞机舷梯的邓副总理紧紧握手，并且说：“热烈友好地欢迎你。”邓副总理回答说：“非常感谢”。比斯塔首相又指着随同来访的韩念龙副部长、沈平司长、高建中副司长说：“我认识他们。”"},{"type":"paragraph","text":"比斯塔首相陪同邓小平副总理走在长长的红地毯上。五个身穿紫红色衣裳的尼泊尔小姑娘，把几个用鲜花编成的花环献给邓副总理，挂在他的颈上。"},{"type":"paragraph","text":"接着，举行了隆重的欢迎仪式。邓副总理被邀请站到台上，乐队奏中尼两国国歌。在比斯塔首相陪同下，邓副总理检阅了仪仗队，随后同前来迎接的尼泊尔官员和驻尼泊尔的外交使节等数百人见面。"},{"type":"paragraph","text":"今天，加德满都阳光灿烂，机场被布置得象过节一般。从机场到市区的道路上和市中心许多地方悬挂着两国国旗和用尼中两国文字写着“尼中友谊万岁”的横幅。"},{"type":"paragraph","text":"比斯塔首相陪同邓小平副总理乘汽车去国宾馆。"},{"type":"paragraph","text":"据新华社加德满都一九七八年二月三日电 尼泊尔王国比兰德拉国王二月三日下午在王宫会见了正在尼泊尔进行正式友好访问的中华人民共和国国务院副总理邓小平，并同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"国王对邓小平副总理说：“欢迎你到尼泊尔来。”邓副总理向国王转达了华国锋主席的问候。国王表示感谢。"},{"type":"paragraph","text":"会见时，比斯塔首相在坐。"},{"type":"paragraph","text":"随同邓副总理访问的韩念龙副部长、沈平司长以及中国驻尼泊尔大使彭光伟也在坐。"},{"type":"paragraph","text":"在此之前，邓小平副总理到加德满都市中心的烈士纪念碑前献了花圈，并在纪念册上签了名。"},{"type":"paragraph","text":"据新华社加德满都一九七八年二月三日电 中华人民共和国国务院副总理邓小平二月三日下午到尼泊尔外交部拜会了尼泊尔首相比斯塔，随后同他举行了诚挚友好的会谈。"},{"type":"paragraph","text":"拜会时，邓副总理向比斯塔首相转达了华国锋总理和李先念副总理对他的问候。"},{"type":"paragraph","text":"中华人民共和国国务院副总理邓小平二月三日上午乘专机抵达加德满都，对尼泊尔进行正式友好访问。尼泊尔首相比斯塔到机场热烈欢迎邓副总理。 新华社记者摄（传真照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2083a4077a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
