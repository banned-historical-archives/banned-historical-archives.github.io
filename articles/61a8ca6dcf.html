["北京矿业学院","单锡运","张处俊","李一"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——反对农业合作化","type":"title"},{"text":"北京矿业学院单锡运张处俊李一","type":"authors"},{"text":"“农业合作化搞坏了，农民非常不满，都要求退社，合作社要垮台了。”（北京矿业学院  单锡运）","type":"paragraph"},{"text":"“农业合作化问题很多，不要只看北京城外的情况，因为它是全国政治中心，搞的好并不足以为据，应到其他地区了解去。”（北京矿业学院  张处俊）","type":"paragraph"},{"text":"“党中央和毛主席近三年来在工作中犯了“左”右倾摇摆不定的错误；农业合作方面太冒进了，合作化发展太快，应当根据情况成立一个算一个，合作化以后生产率降低，牲畜死亡率特别大，农具乱丢无人管；一般农民都吃不上饭，生活很苦；乡干部，合作社领导贪污腐化剥削压迫农民。统购统销有错误，也影响了生产，现在多数农民对党不满，如不彻底的纠正这种不合理的社会现象，共产党是很危险的。”（北京矿业学院　李一）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61a8ca6dcf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
