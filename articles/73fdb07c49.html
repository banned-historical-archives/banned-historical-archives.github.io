ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给谢觉截的信","alias":"","parts":[{"type":"paragraph","text":"给谢觉哉的信！]"},{"type":"paragraph","text":"（1942年8月15日）"},{"type":"paragraph","text":"关于“还政于民”这个口号之不妥，我记得对你说过了。早几天解放报社论?末带有“官方干部”“纯老百姓代表”的话，也有不妥处，不知此文是否你写的？我们的政府是真正代表老百姓的，是民的，故不可说“还政于民”，也不可分为“官方”“非官方”。那天社论的意思并不坏，是说要让新选代表多说话，只是不宜将“官方”“纯老百姓”这样对称起来。请加考虑。"},{"type":"paragraph","text":"[1]这是毛泽东致谢觉哉信的主要内容。谢觉哉，当时任中共中央西北局副书记、陕甘宁边区参议会副议长。"},{"type":"paragraph","text":"[2]指1942年8月12日《解放日报》社论《迎接第二届第二次边区参"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":8,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":118,"page_end":118},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73fdb07c49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
