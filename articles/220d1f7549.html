:[],"dates":[{"year":1952,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社朝鲜前线四日电】　在“五四”青年节前夕，朝鲜前线中国人民志愿军中的中国新民主主义青年团员们纷纷写信给毛主席、青年团中央和志愿军首长报告自己的战斗和工作成绩，并表示为保卫和平而继续奋战的决心。"},{"type":"paragraph","text":"志愿军某部第五连全体青年团员的信中说:“我连在第二次战役中立了集体二等功，在第五次战役中又立了集体一等功。在我连五十七名功臣中，有四十多名是青年。青年团员倪友因巧妙地理设地雷，炸死了一个班的敌人，荣立了一等功。原是东北青年农民陶荣和同志负伤不下火线，修工事积极努力，也荣立了二等功。在党的教育下和在战争中受到了锻炼，我们许多青年已经成了站在保卫和平最前线的优秀的青年战士。”"},{"type":"paragraph","text":"志愿军炮兵某部青年团支部第三小组的信中说:“为了响应毛主席增产节约的号召，我部全体指挥员和战斗员已决定将去年的冬装洗刷后留着今年穿。在战斗空隙中，我们还准备开荒种菜，节约菜金。我们认为:多节约一分，祖国就多一分财富，我们就能够多消灭一个敌人。”"},{"type":"paragraph","text":"志愿军某后勤部队卫生机关的全体青年团员在信中说:“美国强盗进行惨无人道的细菌战，这并不表示它的强大，恰正表示它的最后挣扎。我们现在已取得反细菌战的胜利，今后我们一定会取得更大的胜利。在反细菌战的战线上，我们决心团结广大青年群众，为这一神圣任务贡献出自己全部的力量，争取为世界人民立功。”"},{"type":"paragraph","text":"志愿军中的许多青年团员们都在信中表示要努力学习马克思列宁主义，学习先进的军事科学和军事技术，为反对侵略保卫和平而奋斗到底。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"220d1f7549"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
