" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji13","name":"毛泽东全集第13卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在陕甘宁边区第一届参议会上作关于目前政治形势的报告","alias":"","parts":[{"type":"paragraph","text":"在陕甘宁边区第一届参议会上作关于"},{"type":"paragraph","text":"目前政治形势的报告！]"},{"type":"paragraph","text":"（1939年1月18日）"},{"type":"paragraph","text":"武汉失守了，但还没有进到敌我相持的新阶段，而是敌攻我守与敌我相持两个阶段中间的过渡时期。完成这个过渡需要三个条件：中国坚持持久抗战并增强抗日力量；日本的困难增长；国际上给中国更多的援助。目前军事、经济、国内矛盾、国际环境都使日本更加困难，这就逼使日本不得不在一定时间停止其进攻。中国的抗战，一方面更加困难，一方面更加进步，而进步一定压倒困难。近几个月来的国际形势也对中国有利。"},{"type":"paragraph","text":"共产党的任务，是要坚持抗战，强固与扩大统一战线。八路军、新四军的任务，主要是在敌后拖牛尾巴，配合国民党军队的正面作战。陕甘宁边区要成为抗战的堡垒，民主的模范。"},{"type":"paragraph","text":"[1]这是毛泽东在陕甘宁边区第一届参议会上作的关于目前政治形势报告的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":1,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":180,"page_end":180},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ce3df7cac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
