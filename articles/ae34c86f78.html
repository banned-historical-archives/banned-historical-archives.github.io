工作经验给陆定一等的信","authors":["刘少奇"],"dates":[{"year":1950,"month":2,"day":1}],"is_range_date":false,"parts":[{"text":"刘少奇关于学习朝鲜越南等国文字改革工作经验给陆定一等的信","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"定一、乔木[1]同志：","type":"appellation"},{"text":"中国的文字改革，尚无定案。但现在我们亚洲邻国蒙古、朝鲜、越南的文字改革均已成功。在某一方面来讲，他们的文字已较中国文字为进步，而他们原来是学并用中国文字的。朝鲜的字母已有数百年历史，日文字母历史亦有多年，据朝鲜大使李周渊说：全用朝鲜字母翻译各种著作均无困难。这是二件值得注意的事。我想我们的文字研究者应即研究他们的字母及文字改革经验，为此，并可派学生或研究工作者去这些国家学习，以便为我们的文字改革制订方案。此事，请你们提出一谈。","type":"paragraph"},{"text":"敬礼！","type":"paragraph"},{"text":" 刘少奇二月一日","type":"paragraph"},{"text":"根据手稿刊印","type":"paragraph"},{"text":"注释","type":"appellation"},{"text":"[1]定一，即陆定一，当时任政务院文化教育委员会副主任。乔木，即胡乔木，当时任中央人民政府新闻总署署长。","type":"paragraph"}],"comments":[],"origin":"《建国以来刘少奇文稿第一册(一九四九年七月——一九五〇年三月)》，中共中央文献研究室，中共档案馆，2005年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae34c86f78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
