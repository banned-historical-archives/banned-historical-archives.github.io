es":[{"year":1979,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月二日电　马来西亚总理达图·侯赛因·奥恩和夫人应我国政府邀请前来进行正式友好访问，今天下午乘专机到达北京。"},{"type":"paragraph","text":"华国锋总理、邓小平副总理和夫人卓琳到机场热烈欢迎马来西亚贵宾。到机场欢迎的还有，外交部长黄华、副部长仲曦东，外贸部副部长贾石，交通部副部长陶琦，民航总局副局长吕正哲，中国驻马来西亚大使叶成章和夫人张琬。"},{"type":"paragraph","text":"当侯赛因总理和夫人微笑着步出机舱时，欢迎群众手捧花束，高举两国国旗，向贵宾们致意，机场上顿时沉浸在友谊的欢乐中。华国锋总理和邓小平副总理在飞机舷梯旁迎候马来西亚贵宾，同侯赛因总理和夫人热情握手。"},{"type":"paragraph","text":"去年十一月，邓小平副总理访问马来西亚时曾经表示，热切地期望在今年春暖花开的时候，欢迎侯赛因总理和夫人访问中国。今天，侯赛因总理和夫人在这生机勃勃的春天来到中国进行正式友好访问，将会使中马两国友好关系得到进一步发展。"},{"type":"paragraph","text":"首都机场上举行了隆重的欢迎仪式。军乐团奏马来西亚国歌和中国国歌。侯赛因总理由华国锋总理陪同，检阅了中国人民解放军陆海空三军仪仗队。"},{"type":"paragraph","text":"随同侯赛因总理和夫人来访的成员有:已故前总理拉扎克的夫人敦·哈贾赫·拉哈，外交部长东古·艾哈迈德·里陶丁和夫人，工程和公用事业部长达图·李三春和夫人，运输部长坦·斯里·马尼卡华沙甘，政府部门的其他高级官员、沙捞越州和沙巴州的高级官员，侯赛因总理的妹妹和女儿等，以及随行记者共七十多人。"},{"type":"paragraph","text":"到机场欢迎的还有马来西亚驻中国大使达图·阿卜杜·拉赫曼·贾拉尔和夫人以及大使馆外交官员。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be66bbaf2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
