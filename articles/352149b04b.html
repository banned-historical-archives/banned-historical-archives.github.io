ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"毛泽东等祝贺保加利亚社会主义革命十六周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺保加利亚社会主义"},{"type":"paragraph","text":"革命十六周年的电报"},{"type":"paragraph","text":"（1960年9月8日）保加利亚共产党中央委员会第一书记托·日夫科夫同志，保加利亚人民共和国国民议会主席团主席迪·加涅夫同志，保加利亚人民共和国部长会议主席安·于哥夫同志："},{"type":"paragraph","text":"当保加利亚社会主义革命十六周年的时候，我们谨代表中国共产党、中华人民共和国政府和中国人民向保加利亚共产党、保加利亚人民共和国政府和保加利亚人民致以兄弟般的祝贺。"},{"type":"paragraph","text":"中国人民以愉快的心情关注着兄弟的保加利亚人民在保加利亚共产党和保加利亚人民共和国政府的领导下，在建设社会主义和维护欧洲和世界和平的事业中所取得的成就。保加利亚人民正在为提前完成第三个五年计划进行着辛勤的劳动，这个计划的完成将使保加利亚人民共和国更加繁荣和昌盛。"},{"type":"paragraph","text":"中保两国人民建立在马克思列宁主义和无产阶级国际主义基础上的兄弟友谊的发展，有助于我们两国的社会主义建设和壮大以苏联为首的社会主义阵营的力量。中国人民将努力维护和发展我们两国人民的友好和合作关系。"},{"type":"paragraph","text":"祝保加利亚人民在建设社会主义、维护世界和平和促进人类进步的事业中获得新的成就。毛泽东全集第四十三卷"},{"type":"paragraph","text":"祝中保两国人民的牢不可破的兄弟友谊更加巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1960年9月8日于北京"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":9,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":494,"page_end":495},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"352149b04b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
