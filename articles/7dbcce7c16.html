r":1967,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"修正主义接班人的“制造所”"},{"type":"paragraph","text":"在中国的赫鲁晓夫支持和庇护下，党内一小撮走资本主义道路当权派在体育界推行了一条修正主义路线，大肆贩卖锦标主义、物质刺激、技术挂帅等等黑货，使许多运动队简直成了修正主义接班人的“制造所”。"},{"type":"paragraph","text":"上海乒乓队是党内一小撮走资本主义道路当权派推行修正主义路线的重点场所。在他们的把持下，乒乓队长期不突出无产阶级政治，运动员一天生活几乎就是“吃饭——睡觉——打球”，连社会上的政治活动、游行集会也不参加；整个运动队，成了不问政治的“世外桃源”。党内一小撮走资本主义道路当权派公开叫嚷：“运动队是出成绩的，不是马列主义学院，政治好，不出成绩有啥用场？”并且疯狂地反对运动员学习毛主席著作，大肆贩卖党内头号野心家的《修养》的黑货。"},{"type":"paragraph","text":"我们一到运动队，他们就“教育”我们要“苦练”，要“出成绩”，就是不谈如何学习毛主席著作，接好无产阶级革命事业的班。一旦出了成绩，什么“委员”、“代表”、“五好运动员”，都接踵而来。为了得锦标，他们可以慷国家之慨，大搞物质刺激，请吃糖，加工资，等等。平时比赛胜了，这伙混蛋就请客吃饭，输了就破口大骂，完全是资本主义社会球老板的丑恶嘴脸！这一小撮混蛋的阴谋，就是要把我们的运动队纳入资本主义的轨道，要使我们完完全全地成为修正主义接班人。"},{"type":"paragraph","text":"毛主席教导我们：“帝国主义的预言家们根据苏联发生的变化，也把“和平演变”的希望，寄托在中国党的第三代或者第四代身上。我们一定要使帝国主义的这种预言彻底破产。”我们一定要以毛泽东思想为武器，进一步批判修正主义体育路线，彻底肃清它的流毒，把体育界办成红彤彤的毛泽东思想的大学校。"},{"type":"paragraph","text":"上海体育战线革命造反司令部"},{"type":"paragraph","text":"鲁迅兵团怒火造反纵队"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7dbcce7c16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
