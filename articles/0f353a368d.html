" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"符国华的反党反社会主义言论","authors":["广西师范学院","符国华"],"dates":[{"year":1957,"month":11}],"is_range_date":false,"parts":[{"text":"符国华的反党反社会主义言论","type":"title"},{"text":"广西师范学院符国华","type":"authors"},{"text":"(符国华：广西师范学院助教)","type":"subtitle"},{"text":"1．他说：“我在武大学习四年，什么东西都看清楚了，什么共产党，什么为人民服务？根本是统治人民，压迫人民，统购统销统死了人”，又说：“我学历史的，对历史事情比你看得全面和透彻，什么革命和反革命？还不是胜者为王，败者为寇”？","type":"paragraph"},{"text":"2．诬蔑我革命领袖。他说：“党中央有些高级干部是没有什么才干的，不过他们都是湖南人，官官相护罢了”。在苏共中央处理莫洛托夫等反党事件后，他说：“这是苏联共产党内部的分化”。","type":"paragraph"},{"text":"3．他说：“什么政协？这总是一个戏台，在台上讲话的人都是过去的大头子，没有什么，这都是骗人的。历史好像戏台一样，廿四个朝代的更换，像演戏一样一出一入”。","type":"paragraph"},{"text":"4．他认为社会主义政治是不民主的，在选举时只许举手赞成，不欢迎举手反对，是假的民主。此外又恶意地把党的领导比喻为历代王朝的统治。他曾对×××说：“历代以来的反动统治政府为了更好地剥削人民，为了迷惑人民，也作了一些好事，(如：修桥修路，兴修水利，救灾等)今天共产党为了迷惑人民也在城市中建设。但是乡村农民却饿死了。","type":"paragraph"},{"text":"5．他说：“目前市场很紧张，有钱都买不着猪肉和白米，造成这现象的根本原因是政府把大量的肥猪和白米运往苏联去换飞机大炮来准备和帝国主义作垂死的挣扎。说什么近来猪的产量少了，人民购买力提高了，都是骗人的假话”","type":"paragraph"},{"text":"他在家信中写道：我知道农村到处都是贫困与痛苦的，我们家乡不能例外，的确我对故乡情况是有所了解的，许多人有钱无处买东西吃。在广西省整年买不到四两油吃的人是不少的，其实现在的农民也没有钱购买他们所理想的东西。","type":"paragraph"},{"text":"6．他又说：“我家在八字运动还是中农，到进行土改时，因排班乡村干部想要钱，而把我家评为地主”。又说：“我乡的乡村党团员干部，均是乱搞男女关系，这班家伙只(都)要杀”。","type":"paragraph"},{"text":"又说：评划他家庭是地主阶级成分，“这是共产党给他的苦楚”，“这样的仇恨一定要报”。","type":"paragraph"},{"text":"7．他说：“世界大战可能很快即爆发了，从今年国内外形势来看，便可以证实了这种估计是不会错的，军事实力大大超过苏联的美国为什么还不发动向苏联和各民主国家的进攻呢？当然是美国考虑到战争的后果，也是美国发动第三次世界大战的极力准备，不能说是美国害怕苏联”。并说：“世界大战只要爆发，共产党是要夸台的。”","type":"paragraph"},{"text":"8．恶毒的诬蔑反右派斗争的重大意义是压制。他说：“为什么反右派？是人民对共产党不满，而共产党怕垮台，起来压制。”又说：“鸣放时标语大字报那么多，而反右派却那么少，是因为右派斗争不得人心。”","type":"paragraph"},{"text":" 来源：《广西师院右派言论汇编第二辑》(中共广西师院委员会社会主义思想教育办公室，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f353a368d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
