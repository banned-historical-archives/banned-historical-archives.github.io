52,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:于春银同志是上海铁路管理局上海分局麦根站总务副主任，今年四十九岁。在进‘速成识字法实验班’前，他只认识一百余字，经过二十天的学习，已经认识了一千二三百字，阅读了铁路职工业余学校国语课本第一、二、三、四册。为了庆祝党的生日，为了表示他对毛主席衷心的感激，他在教员、学员具体帮助下，给毛主席写了一封简短的信。他表示:他写的信，还不能表达他对党、对毛主席的感激于万一。他保证更进一步加强学习，为党、为人民做更多更好的工作。他写给毛主席的信，原文制版如上。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\07\\5271030301.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5317a3b7cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
