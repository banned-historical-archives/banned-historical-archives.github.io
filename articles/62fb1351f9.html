ates":[{"year":1978,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京市革委会举行招待会欢迎日横滨市民之翼友好访华团"},{"type":"paragraph","text":"据新华社北京十月二十二日电　北京市革命委员会今天举行招待会，欢迎以横滨市副市长松宫理一郎为团长的日本第二次横滨市民之翼友好访华团。"},{"type":"paragraph","text":"访华团一百三十八位朋友是在上海参加上海和横滨结成友好城市五周年庆祝活动，并访问了苏州、无锡之后，于昨天抵达北京的。"},{"type":"paragraph","text":"招待会洋溢着中日友好的热烈气氛。两国朋友为邓小平副总理今天上午离开北京前往日本进行正式友好访问并出席互换中日和平友好条约批准书的仪式，而欢欣鼓舞。北京市革委会副主任毛联珏在招待会上祝酒时说，邓小平副总理出访日本，必将使中日两国的传统友谊在新的条件下获得新的发展。松宫理一郎团长说，我们能在邓小平副总理去日本出席互换日中和平友好条约批准书的仪式的大喜日子里访问中国，感到十分光荣和幸福。他强调说，日中和平友好条约的签订向全世界宣告：日中关系进入了新的阶段。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62fb1351f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
