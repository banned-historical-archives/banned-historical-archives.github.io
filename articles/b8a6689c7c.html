" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"平原、察哈尔省三反运动简况","authors":[],"dates":[{"year":1952,"month":1,"day":15}],"is_range_date":false,"parts":[{"text":"平原、察哈尔省三反运动简况","type":"title"},{"text":"【华北总分社十五日讯】平原、察哈尔省的三反运动开展较为缓慢。平原省仍在动员和思想酝酿阶段，还未进入群众性的检举坦白阶段。目前省直属机关已普遍开过动员大会，现正学习文件。省正召开各界代表会，以贯彻增产节约和三反运动。各专区、县正在传达党代表会议精神和具体布置工作。省、专区两级三反运动的时间约定一个月(至一月底)，县、区级在旧历年前后进行，二月底可结束。农村的三反运动在县、区结束后进行。就全省来说现在大体上已解决了以下几个问题：(1)工作重点已转向三反运动；(2)省领导上的重视和决心已无多大问题；(3)已建立起直接领导三反运动的组织，全力推动这一运动；(4)一般干部已感到贪污、浪费、官僚主义的严重性，但自觉性还很不够。察哈尔省三反运动发动最好的是张家口，其次是大同市，群众检举出来的案件有二百多起。省级各机关大部已开始动起来，发动最早的是交通局。银行、法院、财委会、劳动局、卫生部等，因负责干部官僚主义或手上不干净，至今尚未将群众发动起来。省委机关以党代会方式发动省委直属党委会各部门，现已坦白揭发出许多问题。宣化市党政机关也已开始动起来。省委要求张家口、宣化、大同三市(包括省级各部门)于一月底告一段落，二月份把运动推向工商界。专区争取在旧历年前派出干部到县区，与县区干部一齐搞，旧历正月十五日前告一段落。农村现除在进行整党的村子结合三反运动外，一般村庄只进行宣传教育，暂不发动斗争。","type":"paragraph"}],"comments":[],"origin":"1952年1月19日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8a6689c7c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
