{"year":1952,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:"},{"type":"paragraph","text":"本刊自从转载了力扬同志的“‘飘’——一部反历史的宣扬资产阶级腐朽思想的作品”之后，曾经连续收到了许多读者的来稿、来信，控诉“飘”这部坏小说对他们生活、思想各方面所起的严重影响；根据我们的了解，“飘”和类似的传播资产阶级思想毒素的作品，不仅在过去曾经严重的毒害了中国青年的思想；即使在现在，在部份大、中学生和中、小学教师及其他青年群中，也还或多或少的受到这些坏书的影响。"},{"type":"paragraph","text":"为了结合思想改造运动，进一步批判传播资产阶级思想毒素的文艺作品的影响，是有其必要的。我们决定把原来对“飘”的批判加以扩大，进而批判到和“飘”类似的堕落文艺作品，如“虎魄”、“风萧萧”(徐訏)等。主要在集中批判这些坏小说所宣传的腐化堕落的生活方式，不劳而获的剥削观点，以及对于金钱、对于社会的错误看法等方面给予青年同学的影响。希望各校的青年团组织和读报组、通讯员同志有计划的协助我们组织稿件，使这一次批判能和学校的思想改造运动结合起来，使这一次批判的内容更为丰富，对青年朋友的帮助更多、更大；因而使我们的肃清资产阶级思想毒素的工作，得到更大的胜利。此外，我们也热烈欢迎凡是受过资产阶级文艺毒素影响的各界青年，来参加讨论。"},{"type":"paragraph","text":"对于这一方面的来稿，我们要求联系思想实际，集中在一个或几个具体问题上加以批判。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\06\\5263070101.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7190d67b62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
