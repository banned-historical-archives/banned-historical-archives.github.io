art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让革命群众得到更多更好的毛主席彩色相片我国制做印制精美彩色相片铜版的高精密电子刻版机安装成功","authors":[],"parts":[{"type":"paragraph","text":"据新华社十四日讯 革命群众渴望得到更多更好的伟大领袖毛主席精制彩色相片的美好愿望就要实现了。可以用来制做印制精美彩色相片铜版的高精密电子刻版机，最近在中国科学院印刷厂安装调整试验成功，不久即将正式投入生产。"},{"type":"paragraph","text":"这台自动化的电子刻版机，是这个印刷厂以及中国科学院有关研究单位的革命工人、技术人员和研究人员，怀着对伟大领袖毛主席无限热爱、无限忠诚、无限信仰、无限崇拜的心情，以敢想、敢干的大无畏革命精神，克服了重重困难，通力协作安装成功的。过去，这个厂在党内一小撮走资本主义道路当权派的把持下，让资产阶级反动技术“权威”垄断制版技术，只能用落后的手工方式生产些科学技术书籍的彩色插图。无产阶级文化大革命中，这个厂的无产阶级革命派，在取得向党内一小撮走资本主义道路当权派夺权斗争的胜利以后，就着手用自己的技术力量迅速安装电子刻版机。在安装过程中，他们坚决遵循毛主席自力更生，奋发图强的教导，破除迷信，打破洋框框，带着问题活学活用毛主席著作，以愚公移山的精神克服了不少困难，安装成功了这台自动化的电子刻版机。不久，他们怀着万分激动的心情，用电子刻版机刻出的铜版印制出了毛主席在天安门城楼上检阅红卫兵的第一张彩色相片的样品。这张相片色彩鲜丽，层次分明。"},{"type":"paragraph","text":"高精密电子刻版机的安装成功证明，用战无不胜的毛泽东思想武装起来的无产阶级革命派有着无穷的智慧和力量。过去，这个厂用手工方式生产一副四种颜色的十六开彩色相片的铜版，需要半个多月。现在，用电子刻版机生产只需要一天就能完成，用这种铜版印制出的相片的质量也大大提高。"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44a75afc96"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
