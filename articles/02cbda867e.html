ercontent.com/banned-historical-archives/banned-historical-archives21/main/aab7c071-dba8-49ae-8bcf-311c8234250b/1.jpg"],"article":{"title":"陶铸同志谈左派的四个条件","alias":"","parts":[{"type":"paragraph","text":"陶同志谈左派的四个条件"},{"type":"paragraph","text":"一、左派最听毛主席的话，最听党的话。你反对毛泽东思想，你就不是左派。听不听毛主席的话，不是听你说，要看你的表现，不但要看运动中的表现，还要看运动前的表现。一表现不好的，现在一下子表现的极好，这大家就怀疑了。"},{"type":"paragraph","text":"二、真正的左派，因为最听毛主席的话，所以斗争最坚定，最勇敢。"},{"type":"paragraph","text":"三、你是左派，要把文化大革命搞好，就要团结大多数，不然就不是左派。"},{"type":"paragraph","text":"四、真正的左派，就要在各方面起模范作用，在革命中不起模范作用，你这算什么左派。"},{"type":"paragraph","text":"毛主席説："},{"type":"paragraph","text":"我们应当相信群众，我们应当相信党，这是两条根本的原理。如果怀疑这两条原理，那就什么事情也做不成了。"},{"type":"paragraph","text":"《关于农业合作化周题》毛主席："},{"type":"paragraph","text":"中国共产党是全中国人民的领导核心。有这样一个核心，社会主义事业就不能胜利。"},{"type":"paragraph","text":"《在接见出席中国新民主主义青年团"},{"type":"paragraph","text":"第三次全国代表大会的全体代表时的耕话》"}],"authors":["陶铸"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"陶铸","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02cbda867e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
