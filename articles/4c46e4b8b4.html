script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一定要把资产阶级“权威”老爷斗倒","authors":["沈锦溪"],"dates":[{"year":1966,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"松江县曙光电器厂　《三根电线通到农村来》作者之一　沈锦溪"},{"type":"paragraph","text":"我以无比愤怒的心情，声讨反党反社会主义分子贺绿汀。你披着共产党员的外衣，以音乐界“权威”自居，称王称霸，连续抛出了大量黑曲、黑调和黑话，污蔑我们伟大的党和毛主席，胡说革命歌曲是“写得快，唱得快，忘得快，丢得快”，对我们革命的群众性的歌咏活动，泼冷水，打当头棒。呸!这种阴谋诡计，一定要戳穿。"},{"type":"paragraph","text":"在党和毛主席的领导下，我们广大劳动人民已经成了文化的主人。就拿我来说，在万恶的旧社会，因为贫穷所逼，我四岁的时候，父母把我卖掉，在解放前的二十八年中，过着非人的生活。一九四九年五月，一声春雷震地响，千家万户尽开颜，在党和毛主席的领导下，我们劳动人民翻了身，在我的生命史上，展开了新的一页。后来，我在工厂工作，还参加了文艺创作活动，依靠集体的力量，写了一些小型作品，其中《我伲工作为革命》、《三根电线通到农村来》参加了“上海之春”的演出。《三根电线通到农村来》唱出了农村中贫下中农热爱党、热爱我们伟大的领袖毛主席的无比喜悦的心情，表示了广大社员对党的方针政策和发展农业纲要的衷心拥护，也唱出了对人民公社热情的赞歌。这里所说的三根电线(高压线、电话线、广播线)实际上是由一根红线——总路线串成的，它同时也是对毛泽东思想的颂歌。这些歌子在毛主席的文艺方针指导下，依靠党的领导和群众的支持，的确是写得好，传得广，演得多，效果好，受到广大工农兵群众的欢迎，多快好省，好得很!我们革命者创作和演唱红色的歌曲，而贺绿汀只会唱黑歌、谱黑曲、说黑话。当我们取得巨大的成绩欢欣鼓舞的时候，贺绿汀却拣起三十年前的破烂，重新唱起《荒村夜笛》和《佛曲》等哀调，咒骂我们欣欣向荣的新农村是“荒村”，多么恶毒!贺绿汀完全同地富反坏右唱一个调子。你反对我们和工农兵群众相结合，胡说什么“假如经常离开自己的业务下乡去体验生活的话，那么最后的结果只好是‘改行’完事”。你用这些黑话来挑拨革命的文艺工作者，我说这是你自己操修正主义之业，改社会主义革命之行，你瞎了眼，昧了心，你不想想，你吃的、穿的、用的、住的，那一件不是劳动人民的创造!你反对别人革命，同人民为敌，这一回被我们揪出来了，这是党的领导英明，是毛泽东思想的新胜利!我们在伟大的中国共产党和毛泽东思想红旗照耀下觉悟起来的劳动人民，敢与天斗，敢与地斗，敢与帝国主义斗，敢与现代修正主义斗，敢与一切反动派斗，也敢与文化战线上的资产阶级“学者”“权威”老爷们斗!我们业余文艺工作者要用毛泽东思想武装自己，用笔杆当枪杆，大写革命剧本，大唱革命歌曲，大演革命现代戏。我们坚决拥护党中央和毛主席，坚决捍卫马克思列宁主义，捍卫毛泽东思想，保卫总路线，拔掉黑线，横扫一切牛鬼蛇神，扫清文化革命道路上的一切障碍，坚决把无产阶级文化大革命进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c46e4b8b4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
