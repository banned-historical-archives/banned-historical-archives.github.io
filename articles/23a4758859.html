s":[{"year":1963,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的好战士——雷锋"},{"type":"paragraph","text":"吴敏　高山画"},{"type":"paragraph","text":"?雷锋看病回来，经过某建筑工地时，听到广播说运砖队供不上砖了，他忘了自己的病，操起小车就推起砖来。工人们受到鼓舞，立即展开了一个“向解放军战士学习”的劳动竞赛，运砖的劳动效率飞快上升。"},{"type":"paragraph","text":"?后来工地的干部们敲锣打鼓送来了表扬信，雷锋带病参加劳动的事迹传开了。同志们纷纷表示要向雷锋学习，学习他随时随地为人民服务的精神。"},{"type":"paragraph","text":"?一九六○年十一月八日，雷锋参加了中国共产党。他在这天日记上写道：“伟大的党啊！英明的毛主席！有了您，才有我新的生命！……为了党和人民的事业，就是入火海进刀山，我甘心情愿！……”"},{"type":"paragraph","text":"?“永远做一个人民的勤务员！”雷锋念念不忘毛主席的这一教导。一九六二年春节，雷锋想到：过年过节正是服务部门最忙的时候，便向连里请假，到抚顺车站上去帮忙接待旅客。　〔待续〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23a4758859"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
