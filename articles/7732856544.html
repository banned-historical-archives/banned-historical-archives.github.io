s":[{"year":1993,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报香港6月12日专电　两名中国球员马文革及王涛今日在世界乒乓球明星赛的首轮赛事中，分别以三比二及三比○挫败瑞典的林德及韩国的刘南奎，双双进入准决赛。而准决赛的另两个席位则分别被比利时的塞弗及波兰老将格鲁巴所得。他们皆以三比○分别轻取香港的卢传淑及瑞典的皮尔逊。"},{"type":"paragraph","text":"半决赛分别由马文革对格鲁巴，王涛对塞弗。胜方可晋身决赛，争夺一万九千五百美元的冠军奖金。"},{"type":"paragraph","text":"今日首轮赛事，马文革对林德一仗争夺最为激烈。受到肩伤困扰的马文革，昨日先失两局，再扳三局，反败为胜。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7732856544"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
