<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"20世纪的奴隶市场“自由欧洲”的黑暗勾当奥难民营真相败露受骗匈牙利人相继返回祖国","authors":[],"dates":[{"year":1956,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布达佩斯1日电】　在匈牙利反革命叛乱期间被胁迫和受欺骗到奥地利去的匈牙利公民，正陆续返回他们的祖国。"},{"type":"paragraph","text":"被法西斯匪徒胁迫和受“自由欧洲”电台欺骗宣传到国外去的匈牙利人，在奥地利的处境非常困难。他们像犯人似的住在奥地利当局所设的难民营里，有许多人流落在街头，住在废弃的火车车厢，草棚和其它冬天无法栖身的地方。连奥地利的报纸也承认“难民营里时常缺乏最必需的东西”，在那里存在着“难以形容的贫困现象”。而某些西方国家的代理人就利用这些匈牙利人的困难处境，在难民营里招募雇佣兵或者诱骗他们去从事最繁重的奴隶劳动。"},{"type":"paragraph","text":"许多归来的人向新闻记者谈到了他们在奥地利的遭遇。一位名叫帕拉的归来者说，匈牙利人被集中在一个集中站，四周被警察包围起来，而且长期不让匈牙利人到任何地方去。有时还有些行动诡秘的人来引诱我们到南美洲大农场去，或者引诱我们到法国外籍军团去当兵。这个难民营就像是供奴隶主挑选自己奴隶的市场。"},{"type":"paragraph","text":"两位叫阿洛兹和季鲍尔的多瑙潘泰莱人说，“自由欧洲”电台所有的许诺原来都是卑鄙的撒谎。他们所碰到的只是常有一些穿半身军服的人来搜查他们，对他们进行讯问，还恫吓那些不愿到西德矿山去工作的人。每天夜间都有一批一批的人突然不见了。听说，有的人被送到铅矿场去了，有的人被送到美国水银矿场去了。这两位受够了苦头的人说，许多人都想从那里逃出来，可是他们常常受到恫吓。"},{"type":"paragraph","text":"值得注意的是，美国和英国的间谍机关竟阴谋胁迫匈牙利人充当特务，背叛他们的祖国。西德的“南德意志报”11月23日写道，“美国的特务机构”对于匈牙利人“所感到的兴趣大得惊人”。外国间谍机关对这些难民施加了多方面的压力，要他们不承认匈牙利的人民民主政权，并且要利用他们的名字发表关于匈牙利的最耸人听闻的消息。"},{"type":"paragraph","text":"在这种恶劣的遭遇下，离开奥地利当局所设的难民营的匈牙利人越来越多。奥地利官方发言人在萨尔斯堡举行的记者招待会上说，住在齐岑赫姆收容所的四十个匈牙利难民表示希望返回祖国，已经有二十八个人离开了收容所。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cb9572ed8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
