<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"必须继续批判资产阶级　关于“工人宣传队在新形势下怎么办?”的讨论(八),工人宣传队员的话","authors":[],"dates":[{"year":1969,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"随着斗、批、改革命形势的发展，新事物不断出现，新问题不断产生。形势发展越快，我们肩上的担子越重，对我们的要求也越高。在这新的形势面前，应该“敢”字当头，不求“过得去”，要求“过得硬”。我们和知识分子打交道，确实是一门新课题，我们必须按照党的政策，正确地看待他们的成绩、缺点和错误，应该突出一个“帮”字。帮人要帮到心，谈心要谈到底。要以理服人，使人口服心服。"},{"type":"paragraph","text":"驻电影系统工宣队一连一队员"},{"type":"paragraph","text":"我们工人阶级不但要做到在困难面前不畏缩，失败面前不气馁，而且要做到在成绩面前不自满，胜利面前不停顿。我们要学习毛主席一分为二的唯物辩证法，运用这个尖锐武器批判资产阶级，同时也要运用一分为二的观点，全面地、历史地分析和解决在领导上层建筑斗、批、改中所遇到的一系列问题，戒骄戒躁，把上层建筑的斗、批、改进行到底。"},{"type":"paragraph","text":"驻遵义中学工宣队一队员"},{"type":"paragraph","text":"我们工人阶级要领导好上层建筑的斗、批、改，确实会遇到很多困难，但从另一方面看，你感到“难”了，就说明你已经发现问题了，就是变“易”的开始。办法是人摸索出来的，我们上靠毛泽东思想领航，下靠广大革命群众的支持，“敢”字当头，就能闯出一套办法来，再大的困难也能克服。"},{"type":"paragraph","text":"驻上海中医学院工宣队一队员"},{"type":"paragraph","text":"知识分子的最大弱点就是理论脱离实际，因此，我们对知识分子的再教育，就不能单纯依靠安排好的那几次政治学习会议，更大量的是在阶级斗争、生产斗争、科学实验三大革命运动中，在当前斗、批、改的群众运动中，针对他们暴露出来的活思想，对症下药，及时教育。我们要了解在“听筒”、“针筒”、“手术刀”背后存在的两个阶级、两条路线、两种思想的斗争，这样才能把政治思想教育工作抓深、抓细、抓活。"},{"type":"paragraph","text":"驻胸科医院工宣队一队员"},{"type":"paragraph","text":"我们工宣队员的一举一动、一言一行，都直接影响着广大知识分子的思想改造和进步，直接影响他们对整个工人阶级的认识。以身作则，就是最好的再教育，因此，我们必须加强工宣队的自身建设。在工作中，我们还要相信群众、依靠群众，虚心倾听群众的意见，把自己扎根于群众之中。"},{"type":"paragraph","text":"驻市卫生防疫站工宣队一队员"},{"type":"paragraph","text":"我们工人就象一颗万能的螺丝钉，不管拧在那里、就在那里发挥作用。我们工人阶级在工厂里能捏起铁锤子，“抓革命，促生产”；到了学校就能拿起笔杆子，用毛泽东思想批判资产阶级和一切剥削阶级的意识形态，把上层建筑永远占领下来，彻底改造过来。"},{"type":"paragraph","text":"驻上海财经学院工宣队一队员"},{"type":"paragraph","text":"艰苦奋斗，不怕牺牲，一不怕苦，二不怕死，这是毛主席的一贯教导，也是我们工人阶级优秀的革命传统。要把文化教育阵地牢固地占领下来，并用毛泽东思想把它彻底改造过来，这本身就是一个持久的艰苦细致的工作。在文化教育阵地上存在着一个谁改造谁，是走社会主义道路还是走资本主义道路的问题。这就需要我们用一不怕苦，二不怕死的无产阶级彻底革命的精神来占领它，彻底改造它，这就决定了我们工宣队员要有自我革命、自觉革命、继续革命的精神。"},{"type":"paragraph","text":"驻华东纺织工学院工宣队一队员"},{"type":"paragraph","text":"我们有的同志，放下了鎯头柄，进驻上层建筑后，就认为已经领导了一切，江山坐定，天下太平，这是革命到顶的一种非常危险的错误思想。我们工人阶级应该永远紧握革命的鎯头柄，在阶级斗争中时刻保持进攻的姿态，随时随地、毫不留情地狠狠打击资产阶级来自各方面的挑战!"},{"type":"paragraph","text":"驻上海财经学院工宣队一队员"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87a2f03fc4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
