"王宝娣","虞骁"],"dates":[{"year":1993,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者　王宝娣　通讯员　虞骁)《毛泽东在上海——纪念毛泽东同志100周年诞辰图片史料展》昨天在黄陂南路374号上海革命历史博物馆开幕。市委副书记陈良宇致开幕词。"},{"type":"paragraph","text":"陈良宇说，上海在中国革命和建设中具有重要的地位，受到毛泽东的高度关注。翻开上海的历史，上面镌刻着毛泽东莅临上海50多次重要活动，以及他指导上海工作的许多重要指示，留下了他光辉的足迹和伟大的思想。为了表达上海1300万人民对毛泽东同志的深切怀念，缅怀毛泽东同志的丰功伟绩，继承和发展毛泽东思想，推进上海的改革开放和现代化建设事业，今年5月市委决定隆重举办《毛泽东在上海》图片史料展览。"},{"type":"paragraph","text":"陈良宇还说，纪念毛泽东诞辰100周年活动，是全党和全国人民政治生活中的一件大事。他希望通过《毛泽东在上海》图片史料展览，使广大参观者充分认识毛泽东同志的历史地位和毛泽东思想的指导作用，充分认识邓小平同志继承和发展毛泽东思想的丰功伟绩和用建设有中国特色社会主义理论指导各项工作的重大意义，推动广大干部、群众结合实际学习毛泽东著作和邓小平文选，抓住机遇，加快上海的改革开放和现代化建设步伐，为实现上海市第六次党代会确定的各项任务而努力奋斗。"},{"type":"paragraph","text":"展览由市委党史研究室、市档案馆、市文物管理委员会、中共“一大”会址纪念馆联合主办。这次展出的毛泽东在上海图片史料共155件，其中照片95件，文献53件，实物7件，是至今展出毛泽东在上海史料最系统、数量最多的一次。"},{"type":"paragraph","text":"市委党史研究室主任邵有民主持了昨天的开幕式。市委常委、市委宣传部长金炳华以及老同志陈沂、杨士法、张承宗和市委组织部、宣传部、统战部、老干部局的领导；市委党史资料征集委员会领导；市总工会、团市委、市妇联、警备区的领导；各大口、各区县党委的领导参加了开幕式。开幕式后，陈良宇同志和大家一起观看了展览。"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e周学忠\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入9号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1993\\12\\93cg010701.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e陈良宇、金炳华等参观了《毛泽东在上海——纪念毛泽东同志100周年诞辰图片史料展》。　本报记者　周学忠　摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"888cb4124a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
