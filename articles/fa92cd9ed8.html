script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本革命人士强调毛主席题词为革命人民指明了方向  马列主义同革命实践相结合无往不胜  齿轮座朋友决心用文艺形式宣传毛主席题词推进日本人民斗争","authors":[],"dates":[{"year":1968,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本革命人士强调毛主席题词为革命人民指明了方向"},{"type":"paragraph","text":"马列主义同革命实践相结合无往不胜"},{"type":"paragraph","text":"齿轮座朋友决心用文艺形式宣传毛主席题词推进日本人民斗争"},{"type":"paragraph","text":"本报综合报道：据新华社消息，日本进步朋友继续欢呼毛主席书赠日本工人朋友们的重要题词的发表，决心要使理论与实践相结合，把马克思列宁主义、毛泽东思想运用到日本革命实践中去，解决革命的实际问题。"},{"type":"paragraph","text":"日本齿轮座剧团的文艺工作者二十日举行的座谈会指出，伟大领袖毛主席六年前书赠日本工人朋友们的重要题词，是放之四海而皆准的普遍真理，它为全世界革命人民指出了方向。"},{"type":"paragraph","text":"藤井义昭在座谈会上说：毛主席的重要题词，给全世界马克思列宁主义者和革命人民指出了应走的道路。"},{"type":"paragraph","text":"藤井说，日本革命的文艺工作者遵循毛主席关于“革命文化，对于人民大众，是革命的有力武器”的教导，向日本人民宣传暴力革命即武装夺取政权的思想。"},{"type":"paragraph","text":"绵津蕗说：我们现在正在排练日本工人阶级活学活用毛泽东思想、开展工人运动的戏剧，我们将在这个工作中，突出毛主席在题词中提出的伟大思想。"},{"type":"paragraph","text":"武井米实说，我们从事革命文艺工作的人，有责任尽快地通过艺术形式，广泛地向日本人民宣传毛主席的重要题词。特别是我们去年访问中国受到毛主席接见的文艺工作者，更有责任把毛主席的这个重要题词宣传好。"},{"type":"paragraph","text":"日本共产党兵库县委员会（左派）代表松井志郎在欢呼毛主席书赠日本工人朋友们的重要题词的发表时说，把马克思列宁主义、毛泽东思想与日本革命的具体实践紧紧地结合起来，这是日本一切革命者所必须坚持的最根本的原则，也是日本革命获得胜利的根本保证。"},{"type":"paragraph","text":"松井说，毛主席教导我们说：“工人阶级最有远见，大公无私，最富于革命的彻底性。整个革命历史证明，没有工人阶级的领导，革命就要失败，有了工人阶级的领导，革命就胜利了。”日本革命的领导阶级和主力军是工人阶级。日本工人阶级必须在毛泽东思想指引下，在斗争中，加强和发展自己的革命队伍，以便完成日本革命的伟大历史使命。"},{"type":"paragraph","text":"日本共产党大坂府委员会（左派）代表保田敏男说：我们认为，现在比任何时候都应该认真地努力学习毛泽东同志的这一光辉题词。保田指出：今天，世界革命已经进入了一个伟大的新时代。日本人民的革命斗争正在走向新的高潮。他说，我们在学习毛主席著作时，特别重视理论与实践相结合，以便用毛泽东思想解决实际问题。"},{"type":"paragraph","text":"日本“毛泽东思想学院”院长大塚有章说，毛主席在六年前书赠日本工人朋友的重要题词的发表，使我们感到莫大的鼓舞。"},{"type":"paragraph","text":"他指出：日共宫本修正主义叛徒集团借口所谓日本的“国内外条件不同”，竭力歪曲马克思列宁主义的最根本的原则，反对用暴力夺取政权，鼓吹“和平革命”，标榜所谓“独立自主”路线，这是最可耻的叛徒行为。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"日本革命青年九月二十四日在东京举行政治学习会，认真学习毛主席给日本工人的光辉题词，并庆祝我国全国（除台湾省外）山河一片红。"},{"type":"paragraph","text":"新华社发（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa92cd9ed8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
