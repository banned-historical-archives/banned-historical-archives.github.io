es":[{"year":1960,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"对刘少奇主席所赠水稻插秧机"},{"type":"paragraph","text":"缅甸总理深感满意"},{"type":"paragraph","text":"新华社仰光7日电　缅甸总理奈温今天在茂边模范农场举行的一个仪式上，接受了刘少奇主席赠送给他的两架水稻插秧机。"},{"type":"paragraph","text":"参加仪式的有缅甸外交部长吴千吞昂、陆军副总参谋长昂季以及政府其他高级官员。中国驻缅甸大使李一氓也出席了这个仪式。"},{"type":"paragraph","text":"这两架水稻插秧机是在奈温总理今年1月底访问中国时，刘少奇主席赠送给他的。"},{"type":"paragraph","text":"在移交时，中国专家们作了使用水稻插秧机的表演。奈温总理和缅甸政府官员们对于这些插秧机的工作效率非常满意。表演表明，“南京一○五号B型”水稻插秧机能把人力插秧的工作效率提高二十五至三十倍，“湖南醴陵二号”水稻插秧机能提高工作效率四至五倍。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a1e99c0a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
