ear":1957,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京12日电】"},{"type":"paragraph","text":"中华人民共和国主席令"},{"type":"paragraph","text":"1958年国家经济建设公债条例已由中华人民共和国第一届全国人民代表大会常务委员会于1957年11月6日第八十三次会议通过，现予公布。"},{"type":"paragraph","text":"中华人民共和国　主席毛泽东"},{"type":"paragraph","text":"1957年11月6日"},{"type":"paragraph","text":"1958年国家经济建设公债条例(1957年11月6日全国人民代表大会常务委员会第八十三次会议通过)"},{"type":"paragraph","text":"第一条　中华人民共和国国务院为加速国家经济建设，逐步提高人民物质和文化生活水平，促进人民节约储蓄，特发行1958年国家经济建设公债。"},{"type":"paragraph","text":"第二条　本公债的募集和还本付息，一律以人民币为计算单位。"},{"type":"paragraph","text":"第三条　本公债发行总额定为人民币6亿3千万元，于1958年1月开始发行，1958年10月1日起计息。提前交款的，按照规定利率贴息。"},{"type":"paragraph","text":"第四条　本公债债券面额分为1元、2元、5元、10元、50元和100元6种。"},{"type":"paragraph","text":"第五条　本公债利率定为年息4厘，公债利息在偿还本金时一次付给，不计复利。"},{"type":"paragraph","text":"第六条　本公债本金分10年作10次偿还，自1959年起，每年9月30日抽签还本一次，第一、二、三、四次各抽还总额的5%，第五、六、七次各抽还总额的10%，第八、九次各抽还总额的15%，其余总额的20%于第十次还清。"},{"type":"paragraph","text":"第七条　本公债的发行和还本付息事宜，指定由中国人民银行及其所属机构办理。"},{"type":"paragraph","text":"第八条　本公债债券不得当作货币流通，不得自由买卖。"},{"type":"paragraph","text":"第九条　伪造本公债债券或破还本公债的信用者，依法惩处。"},{"type":"paragraph","text":"第十条　本条例自1958年1月1日起施行。【新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d53b99926"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
