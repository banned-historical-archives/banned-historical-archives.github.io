nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"周恩来对北京红卫兵司令部谈话中的一段","parts":[{"type":"title","text":"117．周恩来对北京红卫兵司令部谈话中的一段"},{"type":"paragraph","text":"(1966年9月9日)"},{"type":"paragraph","text":"......学生不要到部里去闹，因为他们跟你们不一样。你们整天搞运动，他们还有工作。你们去了，他们就不好工作。部是专政机关，你们有意见，可以贴大字报，可以写信嘛，还可以派人听取你们的意见。你们不要干涉人家的运动。你们要相信人家自己会把运动搞好的。......"},{"type":"paragraph","text":"地质学院学生到地质部静坐示威好几天。我们是社会主义国家，没有必要这样搞。后来他们闹到国务院去，他们撤了，但是校内的多数学生又有人刺激他们，说他们失败了，念捣乱、失败、再捣乱、再失败的语录。这些学生就反而坚持错了就错了，不走了，这样也不好。......"}],"authors":["周恩来"],"dates":[{"year":1966,"month":9,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":176,"page_end":176,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e61f85d57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
