" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji46","name":"毛泽东全集第46卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"中央关于在全党组织干部宣讲队伍把全党全民的社会主义教育运动进行到底的指示","alias":"","parts":[{"type":"paragraph","text":"中央关于在全党组织干部宣讲队伍把全党全民的社会主义教育运动"},{"type":"paragraph","text":"进行到底的指示！"},{"type":"paragraph","text":"（1964年3月22日）各中央局，各省、市、区党委，中央各部委，国家机关各部委党委、党组，各人民团体党组，军委总政治部，地方各地委、县委，各大、中工厂、矿山、交通部门以及企业、事业党委、党组，各大、中学校党委，科学、文化机关党委、党组，省、专区、县三级政府党委、党组："},{"type":"paragraph","text":"我党从一九六三年开始的全党全民的社会主义教育运动，必须进行到底，需要几年才能完成（至少要三年到四年）。地方要学习解放军的经验，解放军也要学习地方的经验。中央的三个社会主义教育文件（五反指示，决定草案，规定草案），除五反指示限于城市及县以上机关以外，其余两个（即所谓双十条）应在几年内分几次在城乡全党全民中宣读，讲解，发问，答问，由粗到细，由浅入深，"},{"type":"paragraph","text":"[1]本篇一是毛泽东为中共中央起草的指示，中央以中发[64]208号文件下发。二是他在这一指示稿上写的批语。"},{"type":"paragraph","text":"中央关于把全党全民的社会主义教育运动进行到底的指示结合当地实际情况，深入调查研究，直到确实解决问题。为此要组织宣讲队伍。这种队伍，要使一切能讲（即能看懂文件）会讲（即政治水平较高，在群众中有较高威信）的同志都得到机会去讲。从中央委员到县委市委委员，与县一级相同的党委委员以及其他有相当文化和政治水平的同志，除年老体弱及有病者外，一律要使他们充当宣读员，至少一次到两次。避免不去的，叫作消极怠工分子。这样做，于已于人，好处极多，能使全党全民获得社会主义教育，首先是各级干部获得这种教育，免除官僚主义、修正主义和教条主义的危害。现将两个文件发给你们。一个是解放军总政治部一九六四年三月十六日的报告\"，一个是孔天子故乡山东曲阜县委一九六四年二月十日的报告。请你们研究这两个文件，从其中可以得到许多启发。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九六四年三月二十二日"},{"type":"paragraph","text":"[1]中国人民解放军总政治部的报告说，全军从1963年12月16日开始宣讲中央关于农村社会主义教育运动的两个文件，到今年2月中旬基本结束。这次教育，大体经过以下三个步骤：（一）由高级首长和各级领导干部原原本本地向官兵进行宣讲，让党的政策不走样地同群众直接见面；（二）发动群众进行专题讨论，深入解决官兵的模糊认识和思想疙瘩；（三）总结提高，使教育落到实处。通过这次教育运动，在部队中收到了很好的效果。"},{"type":"paragraph","text":"[2]中共曲阜县委关于颜家村大队开展社会主义教育运动情况的报告说，这个大队从1963年12月1日至今年2月间开展了社会主义教育运动，经历了“四清”和干部洗手洗澡、对敌斗争、组织建设、生产建设4个阶段。毛泽东全集第四十六卷"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"刘、周、邓、彭、贺龙、陈毅、康生、伯达、定一、冷西“各同志阅后，尚昆处理。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。邓，指邓小平，当时任中共中央总书记。彭，指彭真，当时任中共中央政治局委员、中央书记处书记。贺龙，当时任中共中央政治局委员、国务院副总理。陈毅，当时任中共中央政治局委员、国务院副总理兼外交部部长。康生，当时任中共中央政治局候补委员、中央书记处书记。伯达，即陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任、毛泽东的秘书。定一，即陆定一，当时任中共中央政治局候补委员、中央书记处书记、中央宣传部部长。冷西，即吴冷西，当时任新华通讯社社长、《人民日报》总编辑。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":3,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":297,"page_end":299},"tags":[{"name":"康生","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于在全党组织干部宣讲队伍把全党全民的社会主义教育运动进行到底的指示","authors":["毛泽东"],"dates":[{"year":1964,"month":3,"day":22}],"is_range_date":false,"parts":[{"text":"中央关于在全党组织干部宣讲队伍把全党全民的社会主义教育运动进行到底的指示","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"我党从一九六三年开始的全党全民的社会主义教育运动，必须进行到底，需要几年才能完成（至少要三年到四年）。地方要学习解放军的经验，解放军也要学习地方的经验。中央的三个社会主义教育文件（五反指示，决定草案，规定草案），除五反指示限于城市及县以上机关以外，其余两个（即所谓双十条）应在几年内分几次在城乡全党全民中宣读，讲解，发问，答问，由粗到细，由浅入深，结合当地实际情况，深入调查研究，直到确实解决问题。为此要组织宣讲队伍。这种队伍，要使一切能讲（即能看懂文件）会讲（即政治水平较高，在群众中有较高威信）的同志都得到机会去讲。从中央委员到县委市委委员，与县一级相同的党委委员以及其他有相当文化和政治水平的同志，除年老体弱及有病者外，一律要使他们充当宣读员，至少一次到两次。避免不去的，叫作消极怠工分子。这样做，于已于人，好处极多，能使全党全民获得社会主义教育，首先是各级干部获得这种教育，免除官僚主义、修正主义和教条主义的危害。现将两个文件发给你们。一个是解放军总政治部一九六四年三月十六日的报告，一个是孔夫子故乡山东曲阜县委一九六四年二月十日的报告。请你们研究这两个文件，从其中可以得到许多启发。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"179efeab80"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
