script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决反对美伪集团的残酷压迫和剥削  西贡工人连续举行大规模罢工斗争  工人的斗争得到西贡各阶层人民广泛同情和支持","authors":[],"dates":[{"year":1971,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决反对美伪集团的残酷压迫和剥削"},{"type":"paragraph","text":"西贡工人连续举行大规模罢工斗争"},{"type":"paragraph","text":"工人的斗争得到西贡各阶层人民广泛同情和支持"},{"type":"paragraph","text":"新华社九日讯　西贡消息：西贡广大工人最近连续举行大规模的罢工斗争，坚决反对美伪集团的残酷压迫和剥削。"},{"type":"paragraph","text":"美伪集团为了继续进行反人民战争和维持残暴统治，横征暴敛，巧立名目，加紧搜刮民脂民膏，激起了西贡人民的愤怒反抗。"},{"type":"paragraph","text":"四月二十四日，西贡航空、石油、水电、铁路、银行等十八个行业工会所属的八万多工人和职员举行罢工，坚决反对阮文绍集团的“薪金税”。四月二十五日，参加这场罢工斗争的行业工会增加到二十一个。这次罢工使西贡市的水电供应发生困难，有的航空班机被迫停航。"},{"type":"paragraph","text":"四月二十六日，西贡水电公司行业工会二十八个分会的代表一千人举行集会，要求阮文绍集团提高工人工资并取消“薪金税”。"},{"type":"paragraph","text":"四月二十七日，西贡一千多名纺织工人代表也举行集会，强烈反对阮文绍集团实施的为统治阶级利益服务的“新经济措施”。"},{"type":"paragraph","text":"在美国驻西贡的一个打着“援助”招牌的侵略机构工作的四百多名汽车司机，从五月一日开始也举行罢工，要求增加工资。司机工会代表在五日说，如果不满足工人们的要求，罢工将无限期地延长下去。"},{"type":"paragraph","text":"西贡工人的斗争得到了西贡各阶层人民的广泛同情和支持。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44015f323c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
