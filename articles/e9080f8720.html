rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席林彪副主席周恩来总理致电孙德胜黎笋长征范文同同志就越南北方遭受严重水灾向越劳动党、政府和人民表示最深切慰问","authors":[],"parts":[{"type":"paragraph","text":"新华社二日讯 中国共产党中央委员会主席毛泽东同志、中国共产党中央委员会副主席林彪同志、中华人民共和国国务院总理周恩来同志，九月二日打电报给越南民主共和国主席孙德胜同志、越南劳动党中央委员会第一书记黎笋同志、越南民主共和国国会常务委员会主席长征同志、越南民主共和国政府总理范文同同志，就越南北方遭受严重水灾向越南劳动党、越南政府和兄弟的越南人民表示最深切的慰问。电报全文如下："},{"type":"paragraph","text":"河内"},{"type":"paragraph","text":"越南民主共和国主席孙德胜同志，"},{"type":"paragraph","text":"越南劳动党中央委员会第一书记黎笋同志，"},{"type":"paragraph","text":"越南民主共和国国会常务委员会主席长征同志，"},{"type":"paragraph","text":"越南民主共和国政府总理范文同同志："},{"type":"paragraph","text":"获悉越南北方遭受严重水灾，我们对此极为关切。谨代表中国共产党、中国政府和中国人民，向越南劳动党、越南政府和兄弟的越南人民表示最深切的慰问。"},{"type":"paragraph","text":"在这次抗洪斗争中，英雄的越南人民在越南劳动党的坚强领导下，英勇顽强、日夜奋战，表现了无比的革命气概。中国人民对此十分钦佩。"},{"type":"paragraph","text":"中越两国是亲密邻邦，中越两国人民是战友和兄弟。中国人民一贯把越南人民的困难看成是自己的困难，当尽一切可能，大力支援兄弟的越南人民战胜这次水灾。"},{"type":"paragraph","text":"我们坚信，在抗美救国战争中已经取得伟大胜利的英雄的越南人民，一定能够克服自然灾害造成的暂时困难，取得抗洪斗争的胜利。"},{"type":"paragraph","text":"中国共产党中央委员会主席 毛泽东"},{"type":"paragraph","text":"中国共产党中央委员会副主席 林彪"},{"type":"paragraph","text":"中华人民共和国国务院总理 周恩来"},{"type":"paragraph","text":"一九七一年九月二日于北京"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9080f8720"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
