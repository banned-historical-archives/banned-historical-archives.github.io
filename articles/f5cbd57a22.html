script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席的旗帜是胜利的旗帜","authors":[],"dates":[{"year":1977,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻沪海军“长江”、“洛阳”、“黄河”舰全体指战员"},{"type":"paragraph","text":"二十多年来，我们在毛主席的“为了反对帝国主义的侵略，我们一定要建立强大的海军”光辉题词和伟大革命实践鼓舞下，坚持毛主席提出的海军建设方向，坚持高举毛泽东思想伟大旗帜，战胜了彭德怀、刘少奇、林彪、“四人帮”反革命修正主义路线的干扰和破坏，在部队建设中，不断取得了新胜利。斗争的实践使我们体会到:毛主席的旗帜是胜利的旗帜，是我国人民团结战斗、继续革命的旗帜。毛主席的光辉著作和一系列重要指示，就象大海中的灯塔，军舰上的舵轮，永远是指引我们绕暗礁、过险滩、战妖雾、斗恶浪的强大思想武器，是我们建设强大海军的力量源泉。"},{"type":"paragraph","text":"我们翻开《毛泽东选集》第五卷中的一篇篇光辉著作，就象当年毛主席的谆谆教导又响在耳边一样，顿时感到心明眼亮，力量倍增。在选集第五卷的第一篇《中国人民站起来了》一文中，毛主席就指出:“我们的国防将获得巩固，不允许任何帝国主义者再来侵略我们的国土。在英勇的经过了考验的人民解放军的基础上，我们的人民武装力量必须保存和发展起来。我们将不但有一个强大的陆军，而且有一个强大的空军和一个强大的海军。”一九五○年，在我国第一个国庆纪念日快要到来的时候，毛主席又指出:“中国必须建立强大的国防军，必须建立强大的经济力量，这是两件大事。”毛主席根据国内外无产阶级专政的历史经验和社会主义社会存在着阶级、阶级矛盾和阶级斗争这一规律而发出的这些伟大号召，是多么英明，多么正确!对“四人帮”一伙妄图搞乱人民军队、毁我长城的反革命阴谋是多么有力的批判!"},{"type":"paragraph","text":"我们坚决拥护中共中央关于学习《毛泽东选集》第五卷的决定，一定响应中共中央的号召，在学习《毛泽东选集》第五卷时，要发扬毛主席一贯倡导的理论联系实际的革命学风，把学习毛主席的光辉著作和深入揭批“四人帮”结合起来，和加强我们党、我们军队的建设结合起来，和改造世界观结合起来，扎扎实实地把《毛泽东选集》第五卷中的每一篇著作、每一个基本观点学深、学懂、弄通。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5cbd57a22"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
