:[],"dates":[{"year":1967,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坦桑尼亚朋友赞扬中国文化大革命"},{"type":"paragraph","text":"文化大革命一定会取得完全胜利"},{"type":"paragraph","text":"据新华社达累斯萨拉姆电　坦桑尼亚的一位领导人以及坦桑尼亚工会、青年和妇女团体的领导人不久前向中国工会、青年和妇女代表表示坚信在伟大的领袖毛泽东主席的领导下，中国的无产阶级文化大革命将进行到底，并取得最后胜利。"},{"type":"paragraph","text":"坦桑尼亚的一位领导人说：目前在中国开展的文化大革命是一场正确的革命。坦桑尼亚人民非常真诚地关注着中国的文化大革命，不会相信帝国主义对中国文化大革命的任何诬蔑。他说，帝国主义者反对中国文化大革命，这证明这场革命好得很，假如帝国主义者喜欢它，那就是一件坏事了。"},{"type":"paragraph","text":"坦桑尼亚妇女团体的一位领导人对中国妇女代表说：毛泽东思想不仅指导着中国人民，而且指导着全世界的进步人民。"},{"type":"paragraph","text":"坦桑尼亚的一位工会领导人在同中国工会代表的谈话中表示，他深信中国的文化大革命是具有世界意义的，一定会取得完全胜利。"},{"type":"paragraph","text":"许多坦桑尼亚青年赞扬中国无产阶级文化大革命好得很，表示深信中国青年在毛主席的领导下，一定会把文化大革命进行到底，取得最后胜利。他们还要中国青年代表向积极参加文化大革命的中国青年，特别是向中国红卫兵转达他们热烈的问候。坦桑尼亚青年团体的一位领导人在听到以毛主席为代表的无产阶级革命路线取得伟大胜利和中国的文化大革命呈现一片大好形势之后表示十分高兴。他说，坦桑尼亚青年将象中国青年一样保卫祖国和建设祖国。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8be5eaf3ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
