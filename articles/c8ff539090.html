art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在战斗中学习毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"文章说，四周已经坐满了许多男女学员。同志们有的在读《毛主席语录》，有的在准备上今天的第一课——《为人民服务》，有的在做笔记，有的在小声议论。这个新来的小伙子来到这个学习班里已经两、三天了。他第一次真正感受到革命大家庭的温暖。他的目光久久地停留在横梁上的一幅大字标语：“热烈欢迎新同志的到来！”他回想过去在敌占区里黑暗的岁月，人民的痛苦，反动派对他的迫害，又看看眼前，在这个学习班里，感到无限的亲切，无限的温暖，激动得泪水盈眶。"},{"type":"paragraph","text":"文章说，一位领导同志来到了课堂。这个新来的小伙子激动地翻开了今天的第一课：《为人民服务》。他看着领导同志久经考验的、亲切的脸，暗自下了决心：“一定要把毛泽东思想学到手，用我们的血汗和战斗去打开北加里曼丹革命的新局面。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8ff539090"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
