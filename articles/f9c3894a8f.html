art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"文化大革命的丰硕成果","authors":["空军某部杜凤瑞生前所在中队"],"parts":[{"type":"paragraph","text":"东风劲吹，捷报频传，我国第一颗氢弹爆炸成功了！我们以无比激动的心情，最最热烈地欢呼，欢呼战无不胜的毛泽东思想的新胜利！欢呼又一支毛泽东思想胜利的凯歌！"},{"type":"paragraph","text":"这次氢弹爆炸成功，是毛主席亲自领导和发动的无产阶级文化大革命结出的又一丰硕成果，是彻底批判党内最大的走资本主义道路当权派的又一重大胜利。事实再次证明，毛泽东思想一旦被群众所掌握，就会变成威力无穷的物质力量，就能做到无坚不可摧，无高不可攀，无往而不胜。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“中国人民有志气，有能力，一定要在不远的将来，赶上和超过世界先进水平。”从事核武器研制和试验的我军指战员、工人、工程技术人员、科学工作者和一切有关人员，正是遵照毛主席的这一伟大教导，努力学习毛主席著作，促进人的思想革命化，“抓革命，促生产，促战备”，在不到三年的时间里，成功地进行了六次核试验，而且一次比一次先进。美帝、苏修和那些反华的小丑们，不是诬蔑我们文化大革命“搞糟了”吗？这次氢弹爆炸成功，给了这帮反华小丑们一记最响亮的耳光。让那些反华跳梁小丑的无耻谰言见鬼去吧。"},{"type":"paragraph","text":"我国氢弹爆炸成功，是对世界革命人民有力的支持和鼓舞，是对保卫世界和平的重大贡献。我们一定快马加鞭，乘胜前进，夺取新的胜利！我们一定要念念不忘阶级斗争，念念不忘无产阶级专政，强化无产阶级专政，紧握枪杆子、笔杆子，高举起革命的批判旗帜，把党内最大的走资本主义道路的当权派批倒、批臭，把无产阶级文化大革命进行到底。我们一定要提高革命警惕性，严阵以待，像英雄杜凤瑞那样，坚决、彻底消灭一切敢于来犯的敌人。“要扫除一切害人虫，全无敌。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9c3894a8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
