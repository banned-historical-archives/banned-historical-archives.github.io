ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发东北军区党委关于在军事系统进行镇反和清理工作的指示的批语","alias":"","parts":[{"type":"paragraph","text":"转发东北军区党委关于在军事系统进行镇反和清理工作的指示的批语"},{"type":"paragraph","text":"（1951年5月21日）华东、中南、华南、西南、西北、华北各大军区："},{"type":"paragraph","text":"兹将东北军区五月十八日关于在军事系统进行镇反和清理工作的指示\"发给你们参考。这是根据最近中央指示而规定的方针和办法，除时间一点外，各区均应当照此办理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月廿一日"},{"type":"paragraph","text":"[1]中共东北军区委员会指示的主要内容是：（一）对已逮捕的反革命分子，应立即组织力量加强审讯工作，从审讯中证实已有材料，发现新的材料，弄清具体罪恶事实，然后按其问题轻重拟出名单、意见，实行分别处理，但严禁刑讯逼供。（二）对已有材料但尚不够逮捕条件的反革命分子及复杂分子，应继续收集材料，研究分析，如经查对证实，可根据不同情况分别采取调离重要部门，留部队继续审查，由军区集中劳动管训继续审查，或予以清洗的办法处理。（三）部队应进行一次有重点、有步骤、有对象的审查工作，把混入部队的各种反革命分子清查出来，面目不清者弄清，以纯洁内部。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":322,"page_end":322},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0762bc96af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
