ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在中共中央书记处会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央书记处会议上的讲话！]"},{"type":"paragraph","text":"（1939年1月26日）"},{"type":"paragraph","text":"一、准备工作。现在到春耕还有两个月，要雷厉风行、不失时机地进行准备工作。二、进行生产动员。在二月一、二、三日进行生产动员，分配生产任务，并使各单位有余利以提高其兴味。各机关学校等单位组织生产委员会。三、总的生产运动委员会，以林伯渠为主任，李富春为副主任。四、生产运动的意义，是在长期抗战中实行自给自足等。"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"东北义勇军抗战最久，有七年的历史，现在虽只有一万人，但成为很好的基础。现在的问题是使中央同东北抗日联军建立联系，首先派交通员并设法派电台去。东北抗日联军，如果有好的领导，在有山村及反对民族敌人等条件下有发展的可能，否则也有削弱的可能。"},{"type":"paragraph","text":"[1]1939年1月26日，毛泽东出席中共中央书记处会议，会议讨论生产运动与东北抗日联军问题。本篇一是毛泽东关于生产运动讲话的一部分；本篇二是毛泽东在听取关于东北抗日联军的报告后讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":1,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":187,"page_end":187},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74c3546bdf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
