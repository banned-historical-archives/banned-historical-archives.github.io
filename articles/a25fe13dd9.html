张春桥"],"dates":[{"year":1967}],"is_range_date":false,"parts":[{"text":"张春桥对上海体育界的指示","type":"title"},{"text":"张春桥","type":"authors"},{"text":"上海市体革会胡永年同志问张春桥同志，体育界怎么办，专业以后要不要。","type":"paragraph"},{"text":"春桥同志讲：我们没有什么决定（中央文革），但是也谈过。专业队总还是要有，但是是否这样存在，不能象贺龙那样，在战争那样紧张情况下还带一个篮球队和一个剧团，我们专业队如何与工农兵结合，但总要有些高标准出来，问题是怎样与工农兵相结合。","type":"paragraph"},{"text":"胡：是否保证重点项目存在，如足、篮、排……","type":"paragraph"},{"text":"春桥：不但要保持这几种项目存在，国际比赛总还是要有，我们可以象京剧那样搞样板，推陈出新，问题是怎样推陈出新，如何为工农兵服务。我们不要一概否定，我们要按毛主席的教导：“发展体育运动，增强人民体质。”为工农兵服务，为社会主义建设服务。……","type":"paragraph"},{"text":"胡：中央是否对体育界有最新指示？","type":"paragraph"},{"text":"春桥：你最有发言权，斗批改不能靠我们，斗批改要靠你们，请你拿出一个方案来，我都是没学问的，最有学问的是毛主席。","type":"paragraph"},{"text":"","type":"appellation"}],"comments":[],"origin":"1967年11月3日清华大学井冈山斗批改战团编印《学习资料》第32期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a25fe13dd9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
