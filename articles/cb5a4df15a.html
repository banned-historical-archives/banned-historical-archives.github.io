[{"year":1967,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:上海市革命委员会关于《掀起革命大批判的新高潮，迎接文化大革命的新高涨》的决议中号召’“上海革命群众所创造的街头批判大字报专栏和橱窗大批判报要办得更好。”这是一件具有重大意义的政治任务。"},{"type":"paragraph","text":"街头革命大批判大字报专栏和橱窗大批判报，是革命群众在文化大革命中的创造，它是革命大批判和本地区、本系统、本单位斗批改结合的产物。它是宣传毛泽东思想的阵地，是活学活用毛主席著作的书面讲用会，是没有会场的群众性批判会。它是一把把匕首，直刺党内最大的走资本主义道路当权派及其在上海代理人的胸膛；它是照妖镜，使党内最大的一小撮走资本主义道路当权派的丑恶嘴脸在革命人民面前现出了原形；它是展览会，把中国赫鲁晓夫及其一伙的反革命修正主义行径暴露在光天化日之下，形成人人批判，人人喊打，彻底摧毁资产阶级司令部的革命的新局面，它使这一小撮反革命修正主义分子真正成为不齿于人类的狗屎堆。"},{"type":"paragraph","text":"为了交流办好街头批判大字报专栏和橱窗大批判报的经验，日前，我们召开了一次座谈会。下面发表的就是座谈会上的发言摘要。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb5a4df15a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
