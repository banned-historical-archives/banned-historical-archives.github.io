"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"词二首","type":"title"},{"text":"重庆徐崇职","type":"authors"},{"text":"[原编者按：徐崇职，男，38岁，做过伪军官，现在重庆西南供销局材料科工作。他在“浪淘沙”“西江月”二首词里，把党的领导污蔑为“是非不辨无真理，实在糟糕”的官僚主义，并以“在团真正好，在党更逍遥，只有群众莫开交”，等词句把党、团污蔑为欺压群众的特权阶级。]","type":"paragraph"},{"text":"浪淘沙","type":"subtitle"},{"text":"级别看今朝，偏低偏高，官僚宗派竟当朝；是非不辨无真理，实在糟糕；在团真真好，在党更逍遥，只有群众莫开交；万里堪钦毛主席，明察秋毫。","type":"paragraph"},{"text":"西江月","type":"subtitle"},{"text":"侮辱原非教育，欺人莫太欺心，身为领导处优尊，只有良心一时，八年二十二级。苍天！是否公平？医生同志记分明，看是什么病症？","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第二集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8a198407b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
