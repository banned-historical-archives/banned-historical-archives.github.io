[{"year":1951,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们听了工会干部关于增产节约的动员报告后，我们小组即展开讨论。我们体会到我们是国家的主人，回忆过去牛马一样的生活，每逢拿工资就得躭心，拿了一大捆伪金圆券，只能买一二个“大头”，而不够生活，想想现在真大大不同了，拿了年终奖金可买许多东西，我们的政府还向我们保证在年底称定物价，并发行保本保值的定额存单，还有利息，政府这样的关心我们工人的生活，这完全是党与毛主席带来的，我们感谢共产党、毛主席。我们组内讨论决定把过年节约的钱，每人捐献十万元，支持中国人民志愿军，并且我们保证把每次拿到工资而暂时不用的钱来买定额存单，帮助政府收回现金，称定物价，我们在增产节约中，保证做到关电氽车，节约废票根，准时准点行车。来更好的为人民服务。"},{"type":"paragraph","text":"英电汇山基层委员会司机794号、859号；售票2385号、2177号、2605号、2037号、2239号、2164号、2476号、2097号。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"983af34c6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
