" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"复西北各族人民抗美援朝代表会议电","alias":"","parts":[{"type":"paragraph","text":"复西北各族人民抗美援朝代表会议电"},{"type":"paragraph","text":"（1951年12月12日）西北各族人民抗美援朝代表会议全体代表同志们："},{"type":"paragraph","text":"感谢你们给我的电报。过去一年多以来，西北区各族人民在抗美援朝的爱国斗争中，作了很大的努力，得到了很大的成绩。你们的这次代表会议，决定进一步团结各族人民，增加生产，厉行节约，开展爱国主义的宣传教育工作，以支持中国人民志愿军，这是很好的。帝国主义过去敢于欺负中国的原因之一，是中国各民族不团结，但是这个时代已经永远过去了，从中华人民共和国成立的那一天起，中国各民族就开始团结成为友爱合作的大家庭，足以战胜任何帝国主义的侵略，并且把我们的祖国建设成为繁荣强盛的国家。"},{"type":"paragraph","text":"祝你们的会议成功！"},{"type":"paragraph","text":"毛泽东十二月十二日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":129,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bcb31f38e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
