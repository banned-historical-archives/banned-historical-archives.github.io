ear":1980,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见美国坦普尔大学代表团"},{"type":"paragraph","text":"新华社北京六月十三日电　国务院副总理邓小平今天上午会见了由马文·瓦克曼校长率领的美国费城坦普尔大学代表团。"},{"type":"paragraph","text":"去年邓小平访美时，坦普尔大学曾授予他荣誉法学博士学位。"},{"type":"paragraph","text":"会见时，邓小平对美国朋友说，坦普尔大学是最早同我国学术机构建立联系的美国大学之一。早在一九七二年，瓦克曼校长就支持牛满江教授同我国科学院进行合作研究，取得了很好的成果。"},{"type":"paragraph","text":"邓小平说，你们学校给予我荣誉法学博士学位，使我感到很荣幸。我同你们是校友了。这时，在场的美国朋友高兴地鼓起了掌。"},{"type":"paragraph","text":"瓦克曼表示，希望坦普尔大学同中国方面的学术交流不断扩大。"},{"type":"paragraph","text":"正在中国科学院工作的坦普尔大学牛满江教授和夫人张葆英参加了会见。"},{"type":"paragraph","text":"会见时，科学院秘书长郁文等在座。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见由马文·瓦克曼校长率领的美国费城坦普尔大学代表团。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b80f6204b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
