<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"实行了毛主席的正确政策  一个私营纺织厂不断前进——天津恒源纺织厂劳动模范的信","authors":["王世麟　高秀蓉　陈德明　王德文　郭玉成　马国良　郑秀英"],"dates":[{"year":1951,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"实行了毛主席的正确政策"},{"type":"paragraph","text":"一个私营纺织厂不断前进"},{"type":"paragraph","text":"——天津恒源纺织厂劳动模范的信敬爱的毛主席："},{"type":"paragraph","text":"在党成立三十周年纪念日的前夕，我们怀着万分兴奋和感激的心情，向您报告我们厂的情况。"},{"type":"paragraph","text":"我们是天津私营恒源纺织厂的几个工人、职员，去年我们被选为天津市的特等和一等劳动模范。两年多以来，在您的光辉照耀之下，我们亲眼看到了恒源纺织厂发生的巨大的变化。二十支棉纱的单位产量从零点六磅提高到一点一二磅，十二磅市布每台产量从五十码提高到八十二码。解放前，我们每天最多出四百四十六匹布，现在已经达到了九百匹以上。我们开好了劳资协商会议，团结了我们厂的资方。去年九月，我厂边经理在全厂庆功大会上表示，要把全部纯利润扩大再生产。另一方面，我们在物质生活和文化生活方面也有了显著的改善。从前我们一到饭厅就腻了，因为饭太坏了。现在我们能经常吃到鱼、肉、鸡。我们有一千二百人参加了业余学校（全厂职工一千七百余人）。一年多来，有四十个文盲已有了小学毕业的文化程度。"},{"type":"paragraph","text":"今年新年时，我们曾总结过我们的工作。我们大家都一致了解了：您领导着人民解放军解放了我们，我们成了新社会的主人，同时我们又按照您所嘱咐的发展生产、劳资两利的政策努力作了，这就是我们获得成绩的最主要的原因。"},{"type":"paragraph","text":"连一九四九年在内，恒源的股东共提了二十九亿的股息，资方用二十二亿改善了工人的福利设备，新盖了二十多间房，新买了五千锭子，十万多纱管，十余个马达等机件。还剩了九十多亿元，用了十亿装设临时的通风设备，准备用三十亿元改善机器设备。用了十亿元投资了天津市投资公司，用二十亿元修理清花间危险的房顶、重建暖汽锅炉房和新购一部暖汽锅炉；准备到明年初再用三、四十亿元装设正式的通风装备；最近又用十五亿元捐献了一架飞机。我们认为这些数字就说明您的政策的正确，就说明您的思想的胜利。"},{"type":"paragraph","text":"我们全厂职工都为这一胜利感到兴奋和光荣，我们一致决心更加努力克服困难，提高生产；并且用最大力量支援朝鲜的志愿军保卫我们的胜利。就以现在还不完全的统计，这次我们捐献飞机大炮的款项已将近四亿元，其中大部是由于我们搞好生产，搞好业务所得到的奖金。"},{"type":"paragraph","text":"我们向您保证，我们一定虚心地更好地团结全厂职工，保持全国模范工会的光荣称号，保持天津市二等模范厂的光荣称号。我们现在正在为提高技术，改进机械效率，提高产量质量，大力开展文化技术学习而努力。目前正筹备一中级的业余技术学校，培养技术人员，开展合理化建议运动，坚持爱国主义劳动竞赛，大力开展节约运动，节省原棉。"},{"type":"paragraph","text":"我们现在正在进行学习和检修机器。我们将本着以上方向，用马克思列宁主义和您的思想武装我们自己，学好政治、文化、技术，修好机器，准备大步前进，为我们祖国经济建设的胜利而奋斗！"},{"type":"paragraph","text":"祝您健康！"},{"type":"paragraph","text":"天津私营恒源纺织厂"},{"type":"paragraph","text":"天津市特等劳动模范王世麟  高秀蓉"},{"type":"paragraph","text":"一等劳动模范陈德明  王德文  郭玉成  马国良  郑秀英"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27de753425"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
