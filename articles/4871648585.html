:1981,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京六月二日电　叶剑英同志今天上午在人民大会堂会见了宋庆龄名誉主席的亲属和生前友好，对宋庆龄同志逝世表示沉痛哀悼，对他们表示诚挚的慰问。"},{"type":"paragraph","text":"叶剑英与宋庆龄的亲属孙穗英、孙穗华、戴成功、张家恭、林达光、陈恕、陈志昆、黄寿珍、陈燕、倪冰以及宋庆龄同志的生前友好伍竞仁和夫人、郑恩基、李赣骝等一一握手，并合影留念。"},{"type":"paragraph","text":"会见时，谭震林、廖承志、杨尚昆同志在座。"},{"type":"paragraph","text":"在这以前，邓小平、李先念、邓颖超、胡耀邦、赵紫阳等同志，曾分别会见了宋庆龄同志的亲属，对他们表示亲切慰问。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1981\\06\\8163010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e叶剑英同志会见宋庆龄同志的孙女孙穗英、孙穗华及宋庆龄同志的其他亲属，向他们表示亲切慰问。　新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4871648585"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
