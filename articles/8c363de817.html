ors":[],"dates":[{"year":1966,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"也门人民喜看我纪录片《光辉的节日》"},{"type":"paragraph","text":"毛主席的领导使中国成为强大的国家"},{"type":"paragraph","text":"新华社萨那电  中国大型彩色纪录片《光辉的节日》自十二月十一日在也门塔伊兹放映以来，场场客满，受到公众的热烈欢迎。"},{"type":"paragraph","text":"人们一清早就排着长队等候买票。由于观众太多，有许多人买了票站着看。"},{"type":"paragraph","text":"当毛主席出现在银幕上的时候，观众发出暴风雨般的掌声。有些观众在看完电影后说：“中国所以能在短短的十五年时间里成为一个强大的国家，是因为它有坚强的人民和坚强的领导。”有的观众说：“毛主席是一个伟大的人物，他使有六亿五千万人民的中国成了这样了不得的国家。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c363de817"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
