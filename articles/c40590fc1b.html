script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji35","name":"毛泽东全集第35卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对邓小平在七届六中全会上的发言稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对邓小平在七届六中全会上的"},{"type":"paragraph","text":"发言稿的批语和修改"},{"type":"paragraph","text":"（1955年10月7日）退邓小平同志。此件很好。作了一点修改，请你斟酌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月七日"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"在对于农业社会主义改造抱着右倾观点的共产党员中，确有一些同资产阶级共呼吸的人，他们是对资产阶级思想的投降主义者。"},{"type":"paragraph","text":"[1]邓小平，当时任中共中央秘书长、国务院副总理。"},{"type":"paragraph","text":"[2]毛泽东对邓小平在中共七届六中全会上关于农业合作化问题的发言稿所作的修改，即本篇二、三，其中用宋体字排印的是毛泽东加写和改写的文字。"},{"type":"paragraph","text":"对邓小平在七届六中全会上的发言稿的批语和修改他们中的多数则是反映富裕中农的思想。"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"一切在这个问题上犯右倾错误的同志，因为他们同党外的资产阶级思想有某些共同点，他们在资产阶级分子向党进攻的时候，就会丧失警觉，解除武装，不能理直气壮地驳斥资产阶级分子的谬论。例如在一九五三年，党内党外都有人叫喊所谓“农民苦”，而在一九五五年，党内党外又都有人叫喊所谓“农民生产情绪低落”，我们怎样能够希望这样的同志去理直气壮地驳斥党外的那些谬论呢？"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":10,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":483,"page_end":484},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c40590fc1b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
