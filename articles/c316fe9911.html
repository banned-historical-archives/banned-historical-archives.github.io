1955,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南京大学和南京师范学院"},{"type":"paragraph","text":"南京大学、南京师范学院的许多教师最近在新华日报和“江苏教育”等报纸杂志上发表了批判胡适派的资产阶级唯心论思想的文章。"},{"type":"paragraph","text":"南京师范学院院长陈鹤琴发表的文章题目是“我中了杜威实用主义反动教育思想的三枪”。他在这篇文章中批判杜威的反动教育理论，并批判了自己在教育方面的唯心论思想。他说他过去提倡过的一种反动教育体系“活教育”，就是实用主义教育思想的翻版。"},{"type":"paragraph","text":"南京大学中文系教授陈中凡写了“坚决肃清胡适派的反动思想在古典文学研究中的毒素”一篇文章。他引证胡适的“水浒传考证”“红楼梦考证”等文中的许多荒谬论点，说明胡适歪曲和抹煞“水浒传”“红楼梦”等作品的人民性。他说:这是胡适全面否定祖国文学遗产，主张“全盘欧化”的买办思想的具体表现。南京师范学院中国语文学系主任孙望和南京大学历史系讲师洪焕椿都在自己发表的文章中批判了胡适“整理国故”的反科学性和反革命性。"},{"type":"paragraph","text":"南京师范学院中国语文学系教员周镜泉在“胡适派的资产阶级主观唯心论在儿童文学上的流毒”一文中，说到胡适派提倡所谓儿童本位主义的文学，宣传了封建宿命思想和资产阶级腐朽庸俗的生活方式。【新华社】"},{"type":"paragraph","text":"浙江文艺界"},{"type":"paragraph","text":"浙江省文学艺术界开始了对胡风资产阶级唯心主义文艺思想的批判。二十天来，浙江日报和杭州市当代日报陆续刊登了不少有关批判胡风文艺思想的文章。浙江师范学院中国语言文学系教师在最近召开了关于批判胡风的文艺思想座谈会，对胡风的反马克思主义的文艺思想和宗派主义的文艺活动，作了概括性的批判。浙江省文学艺术工作者联合会在最近举行了一次常务委员扩大会议，决定结合第二次全苏作家代表大会文件的学习，集中力量批判胡风的资产阶级唯心主义文艺思想；会上还成立了文艺理论研究组。研究组除将研究结果撰写文章陆续在报刊上发表外，并将通过报告会和文学讲座等形式，分别在文艺界、教育界及爱好文艺的群众中进行讲演或传达。【新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c316fe9911"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
