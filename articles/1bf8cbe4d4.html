["新华社"],"dates":[{"year":1957,"month":9,"day":20}],"is_range_date":false,"parts":[{"text":"首都法学界追击谭惕吾杨玉清","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社１９日讯:首都法学界座谈会今天乘胜追击右派分子谭惕吾、杨玉清，有力地批驳了这两个右派分子的反动言行。出席妇女第三次全国代表大会的代表、上海市高级人民法院副院长张文秀到会揭发出谭惕吾在上海进行反共活动的一些新的材料。","type":"paragraph"},{"text":"张文秀说，谭惕吾今年４月利用在上海视察的机会，进行了许多反共、反社会主义的活动。除报上已揭发出谭惕吾在上海为反革命翻案和开脱罪责的事实外，她还在上海市高级人民法院煽动干部反对共产党。她在听取民事案件的汇报时，再三带着煽动的口吻问审判人员，“没有成文法，你们判案有无困难？”会后，她又向法院个别领导干部说：“党的政策指示不能作判案的根据，你们办案有困难，可以向中央提出抗议”。张文秀又说，谭惕吾在上海视察时很仇视工农干部。在汇报会上，当她知道向她汇报工作的审判人员没有受过法律方面的专门训练或者不是法律学校毕业的，她便以粗暴的态度盛气凌人地说，“不要你讲”。她在上海召开的旧律师座谈会上恶意地说：“水平高的律师没有办案，而工人出身、业务不高、诉状也写不好的人却在办案”。她认为这是“偏向”，要求及时纠正。","type":"paragraph"},{"text":"国务院参事李仲公、陈修和、王艮仲和政法学会理事郭纶在会上发言，指出杨玉清是一个反动透顶图谋资产阶级复辟的右派分子。郭纶在发言中全面地批驳了杨玉清要共产党“下台下轿”，煽动文人起来“反对现状”等各种反动言论。郭纶说，据最近揭发出的材料，杨玉清不仅想当司法部副部长，还秘密活动想当全国人民代表大会代表。今春他以回武汉省亲的名义，找湖北省的右派骨干分子马哲民和晏勋甫，要他们帮助他在１９５８年普选时能在湖北省选为全国人民代表大会代表。","type":"paragraph"},{"text":"——原载《人民日报》1957年9月20日，原标题为“首都法学界追击谭惕吾杨玉清，又揭露这两个右派分子一些反动活动材料”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bf8cbe4d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
