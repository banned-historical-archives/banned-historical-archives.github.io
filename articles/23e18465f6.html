" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"完成各大学初步改造:董必武作总结报告","authors":["金凤"],"dates":[{"year":1949,"month":10,"day":21}],"is_range_date":false,"parts":[{"text":"完成各大学初步改造:董必武作总结报告","type":"title"},{"text":"金凤","type":"authors"},{"text":"【人民日报讯】华北高等教育委员会昨（二十日）举行第四次常委会及最后一次全体委员会议。华北人民政府主席兼高教会主任委员董必武向全体委员提出了五个月来华北高教会的工作总结报告。报告中说明华北高教会于六月一日正式成立（前身是北平文管会），所属单位，计有大学、独立学院、专科学校、学术研究机关、文物机关等共二十个。根据人民政府对于接管高等教育、文物机关“暂维现状，逐步改进”的方针，经过数月来的整顿，所属各单位已作了初步的改造：在各大学组织了校务委员会；并初步作了一些院系的调整，取消了清华人类学系，并入社会系，合并北大教育系及南开哲学系于师大，合并清华法律系于北大，取消南开政治系，改南开政法学院为财经学院；经过各校师生的讨论与专家的洽商，决定了各大学公共必修课课目，和文法学院各系基本课程；重行评定了学生的人民助学金，办理了本届大学毕业生学习团，统一分配了毕业生的工作，在某些学校内帮助了教职员生的暑期学习，解决了若干私立大学的问题及纠纷；各文物机关接收并整理了旧的文献古物，开辟了新的各种展览，搜集了历史及革命文物；此外又在各学校机关中清除了一部分贪污分子及冗员，提高了工作效率，初步进行了员工的思想改造，推行节约运动，取消国民党统治下不合理的薪金制度，普遍进行评薪，并做了些人事调整的初步准备工作。","type":"paragraph"},{"text":"董必武在报告中指出五个月来高教会的工作，是取得了一定成绩的，尤其是学制课程改革方面，给其他解放区的高教机构以有价值的参考；他又提出高教会在实施过程中所继续发现或尚未解决的问题，如理工学医的课程改革问题，各校永久性的行政组织问题等，要留交即将成立的新高教会来继续研究，寻求解决。副主任委员张奚若、钱俊瑞，秘书长张宗麟关于高教会工作又提出了一些补充：如合并北大、清华、华大三校的农学院，成立了农业大学，加强了山西大学等。全体委员热烈讨论并一致通过了董主任委员所提出的工作总结报告，华北高教会正式结束。会后全体摄影留念。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1949年10月21日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23e18465f6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
