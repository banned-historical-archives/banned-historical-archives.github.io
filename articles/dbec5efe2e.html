rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"加强青年学习毛主席著作的领导从根本上提高青年的阶级觉悟九连团支部认真学习李家庄团支部经验","authors":["于奇江"],"parts":[{"type":"paragraph","text":"本报讯 3126部队九连团支部，最近认真学习山东省临朐县城关公社李家庄团支部组织青年活学活用毛主席著作的经验，受到很大启发。"},{"type":"paragraph","text":"九连团支部通过学习李家庄团支部的经验，进一步明确了团支部工作的首要任务，就是组织青年活学活用毛主席著作，用毛泽东思想武装青年的头脑，从根本上提高青年的阶级觉悟，促进思想革命化。他们联系自己支部的工作，深深体会到：要提高团员的思想觉悟，非引导青年学习毛主席著作不可；要做好团支部的工作，团的骨干非学习毛主席著作不可。"},{"type":"paragraph","text":"九连团支部在学习和讨论李家庄团支部经验的时候，用一分为二的方法，认真总结了自己的工作经验，肯定了成绩，找出了薄弱环节。大家认为跟李家庄团支部比，在领导青年学习毛主席著作方面，有三点不如他们。第一，时时处处把学习毛主席著作放在首位不如他们；第二，在引导青年学习毛主席著作中，从青年的实际出发，多种多样、生动活泼方面不如他们；第三，团支部骨干带头学、带头用、带头宣传，也不如他们。要把李家庄团支部的经验学到手，就要在这三点上下功夫。"},{"type":"paragraph","text":"九连团支部加强了学习毛主席著作的组织领导，已收到了初步效果。（于奇江）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbec5efe2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
