" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji2","name":"毛泽东全集第2卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"高兴和沉痛","alias":"","parts":[{"type":"paragraph","text":"高兴和沉痛"},{"type":"paragraph","text":"（1919年7月21日）"},{"type":"paragraph","text":"克勒满沙在办公室接得德国接受和约的电话，高兴了不得。站起身来，和在办公室的阁员及同僚握手，说：“诸君！我之静候这一分钟，已（已）西（四》十九年了！”这话何等高兴。虽然，不第高兴，又含有多少沉痛的意思。一千八百七十一年，威廉第一和俾士马克\"，高踞凡尔塞，接受法国屈服文的时候，何等高兴。结果遂酿成此次的战争。虽然，威廉第一，俾士马克，不第高兴，又含有多少沉痛的意思。一千八百年至一千八百一十五年，拿破仑躁德意志，分裂他的国，占据他的地，解散他的兵。普王屈服，称藩纳聘。拿破仑何等高兴。结果遂酿成［一】千八百七十一年的战争。虽然，拿破仑不第高兴，又含多少沉痛的意思。一千七百八十九年至一千七百九十年，德奥为巨璧的神圣同盟军，深恶法国的民权自由，几度躁法境，围巴黎。结果遂崛起拿破仑，而有躁德国，令德人头痛的事。我们执因果而看历史，高兴和沉痛，常相联"},{"type":"paragraph","text":"[1]威廉第一，即威廉一世（1797—1888)。1861—1888年，出任普鲁士国王，并于1871年开始同时为德国皇帝。在1848一1849年革命时期，曾参加镇压巴登一普伐尔茨起义。在位时重用首相俾斯麦，通过王朝战争统一德国。俾士马克，今译俾斯麦。"},{"type":"paragraph","text":"[2]指1870一1871年的普法战争。法国战败后，法国资产阶级政府与普系，不可分开。一方的高兴到了极点，一方的沉痛也必到极点。我们看这番和约\"所载，和拿破仑对待德国的办法，有什么不同？分裂德国的国，占据德国的地，解散德国的兵，有什么不同？克勒满沙高兴之极，即德国人沉痛之极。包管十年二十年后，你们法国人，又有一番大大的头痛，愿你们记取此言。"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":7,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":54,"page_end":55},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fcfec1e3d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
