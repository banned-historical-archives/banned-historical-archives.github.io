局的指示","authors":[],"dates":[{"year":1950,"month":4}],"is_range_date":false,"parts":[{"text":"中央关于停止向地主退押金问题给中南局的指示","type":"title"},{"text":"中南局四月一日电关于目前退租运动中几项问题的解决办法是对的，望切实执行，但向地主退还押金口号应即停止执行，因事实上有许多地主特别是小地主无法退还押金，势必走到农民逼索，走到无计划地没收地主浮财，以致乱打乱杀。而地主的浮财除房屋、牲畜、农业工具及多余粮食外，在将来我们也是决定不没收的，乱打乱杀我们是必须避免的，因此必须停止退押，才能确实避免这些。现在湖南方面已有许多反映在退押方面出了毛病，有些地主已经逃跑或准备逃跑。望令各地停止退押，已退者，亦不要送还，地主自愿退还者，农民亦可接受，但不要再去动员群众退押，不要向地主追逼，如何望即电复。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70ab89e98b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
