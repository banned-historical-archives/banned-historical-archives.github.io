["余新恩"],"dates":[{"year":1952,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我要清除所受资产阶级教育的毒素"},{"type":"paragraph","text":"“中华健康杂志”编者的检讨"},{"type":"paragraph","text":"编辑同志：去年十二月十九日人民日报发表了孟驰同志批评“中华健康杂志”的来信。我担任这一杂志的编辑已有十年，第一次得到真诚的批评，这对我和读者都有很大的帮助。杂志封面不合适，因为我专注意美术设计，忽略了科学、艺术应和政治结合的问题，所以采用了那样不好的封面。这是我的思想麻痹的表现。孟驰同志指出：“嚼食与工作”一文中，“我们也可看到打字员常喜在打字时嚼口香糖”一语，是为英美生活方式作宣传。这种批评是对的，这是我受英美资产阶级生活薰染过深的缘故。我对“勤劳有礼的酬报”、“女人不爱谈自己的岁数”、“精神病患者闯进女医生卧室”、“一封信治好一个精神失常的人”等文中所说的事情，都没有加以批判，确是很危险的。“中华健康杂志”在一九三九年创刊。当时这个杂志取材于美国的“健康”杂志，并且仿照那个刊物来编辑。解放以后，虽然作了一些改进，但还很不够。这主要是由于我政治觉悟不高。我多半还是利用自己所熟悉的文字和材料来编稿，而不顾及对读者有什么危害。此外，我也没有很好地遵照中央卫生部所明白指出的“面向工农兵”的总方针去努力，以致这个杂志不但不能对卫生宣教工作有所帮助，反而在客观上替英美资产阶级的生活方式作了宣传。经过这次批评和自我批评，我决心努力学习，改造自己的思想，彻底清除残存着的资产阶级教育的毒素。在编辑方面，要面向大众，除加强和有关部门的联系外，并听取读者宝贵的意见，以使自己在政府和读者的正确指导下，办好“中华健康杂志”。"},{"type":"paragraph","text":"余新恩"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"535da253e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
