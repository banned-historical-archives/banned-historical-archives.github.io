tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见捷军事代表团贵宾们参观某部队对鸣放景象很感兴趣","authors":["邹健东"],"parts":[{"type":"paragraph","text":"据新华社讯 毛泽东主席在7日下午接见了捷克斯洛伐克共和国军事代表团团长洛姆斯基上将和团员伏萨赫洛中将、科洛夫腊特尼克中将、普尔赫利克少将、贝德日赫少将、拉洛上校等。接见时在座的，有周恩来总理，彭德怀元帅，肖华上将和肖向荣中将。捷克斯洛伐克驻中国大使布希尼亚克也在座。"},{"type":"paragraph","text":"本报讯 7日晚，国防部举行盛大歌舞晚会，欢迎捷克斯洛伐克共和国军事代表团。总政治部文工团、海军政治部文工团、空军文工团和“战友”文工团，把自己最精采的音乐、舞蹈、杂技等节目献给了贵宾。"},{"type":"paragraph","text":"出席晚会作陪的有陈赓大将、肖华上将、甘泗淇上将、洪学智上将、杨成武上将等我军高级将领。"},{"type":"paragraph","text":"晚会进行中间，团长洛姆斯基上将及代表团的全体人员对演员们的精采表演，一再地热烈鼓掌。晚会结束时，洛姆斯基上将及代表团的同志们到台上和演员们一一握手，并摄影留念。"},{"type":"paragraph","text":"本报天津9日电 以洛姆斯基上将为首的捷克斯洛伐克军事代表团，由肖华上将、杨成武上将等陪同，今天乘专机到某部参观，受到了官兵们的热烈欢迎。"},{"type":"paragraph","text":"贵宾们参观了这个部队的操场教练，参观了宿舍、车场、炮场和俱乐部，参观了养猪场、白菜窖、豆腐坊。洛姆斯基上将向二连连长陈锡祥中尉详细询问了连队的工作和训练情况，普尔赫利克少将询问了这个部队的党委工作和政治工作情况。客人们对我们部队采取大鸣、大放、大辩论的方法进行社会主义教育特别感到兴趣。他们在该部营房的走廊里，观看了琳琅满目的大字报，很称赞这种广泛的民主方式。"},{"type":"paragraph","text":"贵宾们参观结束后，正在休息的官兵们拥上前来鼓掌欢迎。洛姆斯基上将向官兵们讲了话，他代表捷克斯洛伐克人民军向中国战士致敬。他说：“捷克斯洛伐克人民军守卫在社会主义阵营的西方前线。和你们一样，捷克斯洛伐克的战士们在党的领导下正在加紧训练，提高战斗力。如果帝国主义胆敢发动战争，我们将和你们一起粉碎敌人的进攻。”为了表达捷克斯洛伐克人民军对我军战士的战斗友谊，洛姆斯基上将将捷克斯洛伐克人民军模范战士奖章和伏契克奖章赠给优等射手李少福、王春孝等二十九人。官兵们热情鼓掌，高呼“中捷友谊万岁！”张一波大校向贵宾们赠送了部队战斗演习的照片集。"},{"type":"paragraph","text":"晚上，代表团到达天津，杨成武上将设宴招待贵宾。天津市党、政、军负责人都出席了宴会。宴会以后，杨成武上将将华北解放纪念章和首都风景图片集等礼品赠送给贵宾们。"},{"type":"paragraph","text":"毛泽东主席和洛姆斯基上将握手 新华社记者 邹健东摄"}],"alias":""},"tags":[{"name":"杨成武","type":"人物"},{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2077cc709e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
