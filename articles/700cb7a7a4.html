{"year":1953,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联“真理报”"},{"type":"paragraph","text":"刊载毛主席对苏共的颂词"},{"type":"paragraph","text":"【新华社莫斯科三十一日电】苏联“真理报”三十日在庆祝苏联共产党建党五十周年的时候，在“世界革命和工人运动的突击队”的总标题下，摘录了各国共产党和工人党领袖对苏联共产党的颂词。“真理报”把毛主席的语录放在第一条，标题是“共产主义运动的最高的总结”。该报摘引的毛主席语录的头一部分，是毛主席的著作“改造我们的学习”中的一段话：“‘苏联共产党（布）历史简要读本’是一百年来全世界共产主义运动的最高的综合和总结，是理论和实际结合的典型，在全世界还只有这一个完全的典型。”“真理报”摘引的毛主席语录的另一部分，是他在去年致苏联共产党第十九次代表大会的贺辞。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"700cb7a7a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
