1953,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"匈牙利人民共和国的劳动人民热爱毛泽东主席的著作。据匈牙利驻我国大使馆编印的匈牙利新闻第十二期刊载的消息:在匈牙利城乡各地的国家书店里，译成匈牙利文的毛主席的著作很快就销售一空。到现在为止，毛主席的各种著作已在匈牙利发行了将近十万册，这在人口九百五十万的国家里是一个很大的发行量。为了满足匈牙利劳动人民的要求，毛主席的“实践论”和“矛盾论”曾经再版，总共发行了约四万册。由一个专门编译委员会出版的匈牙利文毛泽东选集第一卷，现在已经印行了一万五千二百册，将来还要继续出版第二卷、第三卷和第四卷。离布达佩斯拉科西钢厂不远的一家国家书店，最近收到了六百五十本毛泽东选集第一卷，但不满一个星期就快卖完了。　(据新华社)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"367d116050"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
