" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平给华国锋和中共中央的信","authors":["邓小平"],"dates":[{"year":1976,"month":10,"day":10}],"is_range_date":false,"parts":[{"text":"邓小平给华国锋和中共中央的信","type":"title"},{"text":"邓小平","type":"authors"},{"text":"中共中央关于转发邓小平同志给党中央的信的通知","type":"paragraph"},{"text":"1977.05.03；中发 [1977] 15号","type":"paragraph"},{"text":"各省市、市、自治区党委、各大军区、省军区、野战军党委，中央和国家机关各部委党委、领导小组或党的核心小组，军委各总部、各军兵种党委：","type":"appellation"},{"text":"华主席、党中央决定，将邓小平同志一九七七年四月十日给华主席、叶副主席并党中央的信和一九七六年十月十日给华主席并中央的信印发给你们。中央认为，邓小平同志的态度是好的，同志们看了这两封信会高兴的。中央希望，全党高举毛主席的伟大旗帜，紧密地团结在以华主席为首的党中央周围，深入揭批“四人帮”，争取社会主义革命和社会主义建设的新胜利。","type":"paragraph"},{"text":" 中共中央一九七七年五月三日","type":"paragraph"},{"text":"一九七六年十月十日邓小平给党中央的信","type":"subtitle"},{"text":"东兴同志转呈","type":"appellation"},{"text":"国锋同志并中央：","type":"appellation"},{"text":"我衷心地拥护中央关于由华国锋同志担任党中央主席和军委主席的决定，我欢呼这个极其重要的决定对党和社会主义事业的伟大意义。不仅在政治上思想上，国锋同志是最适合的毛主席的接班人，就年龄来说，可以使无产阶级领导的稳定性，至少可以保证十五年或二十年之久，这对全党全军全国人民来说是何等重要啊！怎不令人欢欣鼓舞呢？","type":"paragraph"},{"text":"最近这场反对野心家、阴谋家篡党夺权的斗争，是在伟大领袖毛主席逝世后这样一个关键时刻紧接着发生的，以国锋同志为首的党中央战胜了这批坏蛋，取得了伟大的胜利，这是无产阶级对资产阶级的胜利，这是社会主义道路战胜资本主义道路的胜利，这是巩固无产阶级专政。防止资本主义复辟的胜利，这是巩固党的伟大事业的胜利，这是毛泽东思想和毛泽东革命路线的胜利。我同全国人民一样，对这个伟大斗争的胜利，由衷地感到万分的喜悦，情不自禁地高呼万岁、万岁、万万岁！我用这封短信表达我的内心的真诚的感情。","type":"paragraph"},{"text":"党和社会主义事业的伟大胜利万岁！","type":"paragraph"},{"text":" 邓小平一九七六年十月十日","type":"paragraph"},{"text":"","type":"appellation"}],"comments":[],"origin":"中央文件的翻印件；1977.05.03《中共中央转发邓小平致华国锋的两封信》，中发 [1977] 15号。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b96dce7dc6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
