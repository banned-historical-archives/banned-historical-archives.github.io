战斗","authors":[],"dates":[{"year":1971,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社巴黎二十八日电　最新一期法国《红色人道报》发表文章，纪念中国人民的伟大领袖毛主席“五·二○”庄严声明发表一周年。"},{"type":"paragraph","text":"文章指出，毛主席向全世界人民发出的“全世界人民团结起来，打败美国侵略者及其一切走狗!”这个号召，已经整整一年了。“毛主席的这一声明是对大家的一个强有力的鼓舞。每一个被剥削者，每一个被压迫者，每一个战士，都从中汲取了勇气和力量、希望和决心。”"},{"type":"paragraph","text":"文章在引用了毛主席在声明中提出的“小国人民只要敢于起来斗争，敢于拿起武器，掌握自己国家的命运，就一定能够战胜大国的侵略。这是一条历史的规律。”的论断后指出，美国侵略者可以加强他们的舰队，“可以对斗争中的各国人民倾泻数以百万吨计的炸弹，可以一再发动疯狂进攻，但是各国人民必将取得胜利”。“我们的希望、我们的战斗，正是建立在这种必胜的信心、这种对敌人的根本蔑视的基础上的。毛主席的声明激励着我们。我们要敢于斗争，我们必胜!”"},{"type":"paragraph","text":"文章说:“我们还要善于斗争。这也是一九七○年五月二十日声明对我们的教导。我们要孤立主要的敌人美帝国主义。”文章说:“决不能向莫斯科和其他地方的修正主义者让步，他们嘴上说反帝，而实际上是侵略者的帮凶。”文章指出:“必须同一切真正反对美帝国主义及其走狗的人结成广泛的统一战线。”"},{"type":"paragraph","text":"文章指出，一年来，生活本身已经证实了毛主席这一论断:“目前，在世界范围内，正出现一个反对美帝国主义斗争的新高潮。”文章说:“在亚洲、非洲和美洲各国人民的打击下，帝国主义在日益进行垂死挣扎。唇齿相依、团结一致的印度支那各国人民的救国斗争日益取得更加辉煌的胜利，美国人民越来越扬眉吐气。”"},{"type":"paragraph","text":"文章最后指出，一年来的种种战斗和胜利证实了毛主席的论断:“新的世界大战的危险依然存在，各国人民必须有所准备。但是，当前世界的主要倾向是革命。”文章强调，要通过语言和行动来使这一论断发挥不可抗拒的力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"039882a0a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
