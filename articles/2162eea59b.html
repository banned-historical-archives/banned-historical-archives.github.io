"authors":[],"dates":[{"year":1966,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社本市13日讯　中共中央政治局委员、书记处书记彭真和政治局候补委员、书记处书记康生，十三日下午同以日共中央总书记宫本显治为首的日本共产党代表团进行了谈话。谈话始终在亲切友好的气氛中进行。"},{"type":"paragraph","text":"谈话时在座的还有刘宁一、陈丕显、吴冷西、赵安博。"},{"type":"paragraph","text":"新华社本市13日讯　中共上海市委十三日晚举行文艺晚会，招待日本共产党代表团。"},{"type":"paragraph","text":"在晚会上，日本共产党代表团团员藏原惟人、米原昶、上田耕一郎同志等在康生、刘宁一同志陪同下，观看了上海舞蹈学校演出的芭蕾舞剧《白毛女》。"},{"type":"paragraph","text":"陪同日本同志看剧的，还有陈丕显、张春桥、梁国斌等同志。"},{"type":"paragraph","text":"演出结束后，藏原惟人、米原昶等同志由康生、刘宁一、陈丕显同志陪同走上舞台，同演员们亲切握手。这时，全场响起一片热烈的掌声。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"彭真","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2162eea59b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
