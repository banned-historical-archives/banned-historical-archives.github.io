art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"给毛主席的致敬电","authors":[],"parts":[{"type":"paragraph","text":"我们最最最最敬爱的领袖，我们心中最红最红最红的红太阳毛主席："},{"type":"paragraph","text":"一九六七年一月二十七日，当莫斯科的天还没有亮的时候，我们和使馆全体同志一起收到了周恩来同志和陈毅同志代表您老人家和林彪同志、代表党中央和国务院给我们发来的电报。"},{"type":"paragraph","text":"您的电报——这是您对我们全体的战斗动员令。"},{"type":"paragraph","text":"我们把您的语录紧紧贴在胸口，一股巨大的暖流流遍全身。我们一千遍、一万遍地高呼：“毛主席万岁，万岁，万万岁！”"},{"type":"paragraph","text":"这是对我们最大最大的支持，最大最大的鼓舞，最大最大的关怀。您老人家最理解群众，最信任群众，最支持群众的革命造反精神。"},{"type":"paragraph","text":"您是我们的红司令，我们是您最忠实的红小兵。您教导我们：“凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对”，“下定决心，不怕牺牲，排除万难，去争取胜利。”我们天不怕，地不怕，难道还怕几个在冬天雪地里快要冻死的臭苍蝇么！我们头可断，血可流，刀山敢上，火海敢闯。我们一定要大造特造现代修正主义勃列日涅夫、柯西金这群小丑们的反。我们一定要大造特造、猛烈地造世界上一切牛鬼蛇神的反。把它们打得落花流水，叫它们永世不得翻身。把旧世界砸它个稀巴烂，创造一个红彤彤的新世界，让伟大的毛泽东思想永远在全世界大放光芒。"},{"type":"paragraph","text":"我们在国外亲身体验到了帝国主义、现代修正主义和一切反动派对您亲自发动和领导的无产阶级文化大革命怕得要死，它们早已吓得六神无主，魂不附体了。"},{"type":"paragraph","text":"我们就要回到您老人家的身边了。我们决心全力投入无产阶级文化大革命，和国内无产阶级革命造反派联合在一起，誓死捍卫以您为代表的无产阶级革命路线，坚决地、彻底地粉碎资产阶级反动路线。誓死跟着您把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"打倒美帝国主义！"},{"type":"paragraph","text":"打倒现代修正主义！"},{"type":"paragraph","text":"扫除一切害人虫！"},{"type":"paragraph","text":"无产阶级文化大革命万岁！"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"最最伟大的领袖毛主席万岁！衷心地祝您老人家万寿无疆！万寿无疆！"},{"type":"paragraph","text":"途经莫斯科的全体国外留学生"},{"type":"paragraph","text":"一九六七年一月二十七日"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"496df5224d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
