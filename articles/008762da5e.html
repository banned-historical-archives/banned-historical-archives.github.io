tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席和夫人江青同志接见并宴请斯特朗等外国朋友毛主席和他们在友好愉快的气氛中进行了亲切的交谈","authors":["钱嗣杰"],"parts":[{"type":"paragraph","text":"新华社二十四日讯"},{"type":"paragraph","text":"这些美国朋友是："},{"type":"paragraph","text":"柯弗兰夫妇，艾德勒夫归，爱泼斯坦夫妇，马海德，李敦白夫妇，米尔顿夫妇，舒子章夫妇。"},{"type":"paragraph","text":"同时被接见的还有：智利的万徒勒里夫妇，印度尼西亚的威利夫妇，新西兰的艾黎。"},{"type":"paragraph","text":"今天是斯特朗女士八十寿辰，毛主席和江青同志首先向她表示贺忱。"},{"type":"paragraph","text":"毛主席和外国朋友们在友好、愉快的气氛中，进行了亲切的交谈。"},{"type":"paragraph","text":"接见时在座的中国同志有：廖承志和他的夫人经曾椿，以及吴冷西、姚溱、唐明照、区棠亮、郑森禹、浦寿昌等。"},{"type":"paragraph","text":"接见以后，毛主席和江青同志设宴招待外国朋友。RW：毛泽东；国家主席；接见美国作家；附照片"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"008762da5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
