rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"按照毛主席指示全国电业系统利用修配力量大搞电机制造","authors":[],"parts":[{"type":"paragraph","text":"据新华社31日讯 根据毛主席和刘少奇同志的指示，全国好多电厂已经改变旧传统，开始利用修配力量大造发电设备来装备自己。据统计，这些电厂今年将生产出总容量为十一万千瓦的成套发电设备。"},{"type":"paragraph","text":"今年全国各地掀起全民办工业的热潮以后，用电需要量迅速增加，电机制造部门和基本建设方面一时赶不上。毛主席和刘少奇同志对这个问题非常关怀。毛主席在8月12日参观天津市工业技术革命展览会的时候，听说天津发电厂的修配工人工在制造发电设备，称赞这个办法很好。毛主席说，发电厂为什么只能发电而不能制造发电机呢？可以扩大一点，固定一些工人，成为发电厂附带的车间。刘少奇同志7月间在石景山发电厂同职工座谈的时候，也鼓励这个厂利用修配和检修力量制造发电机，解决当前部分发电设备不足的问题。"},{"type":"paragraph","text":"毛主席和刘少奇同志的这些指示，给了全体电业职工极大的启发与鼓舞。许多修配工人都纷纷表示，愿意竭尽全力来贯彻两位领导同志的指示。水利电力部也在最近召开各省电业局会议，专门研究了发电设备的制造问题。"},{"type":"paragraph","text":"根据各电业局汇报，全国电业系统虽然没有制造过成套的发电设备，但是修配与制造的潜力还是很大的。一百多个大中型的发电厂中，差不多都有规模大小不等的修配车间和若干数量的金属加工机床。同时，各个发电厂还有数量众多的运行人员和检修人员，他们对设备的性能与结构都非常熟悉。因此，只要把这些分散的积极力量很好组织起来，适当地加以补充、调整和技术上的帮助，就可以大量承担制造小型和成套大型发电设备的任务。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3552aad41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
