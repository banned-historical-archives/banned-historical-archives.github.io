tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席巨著《中国革命战争的战略问题》照亮了非洲人民争取解放的战斗道路","authors":[],"parts":[{"type":"paragraph","text":"据新华社开罗二十一日电 在毛主席的光辉著作《中国革命战争的战略问题》发表三十周年之际，来自刚果（利）、莫三鼻给和津巴布韦的自由战士们在这里分别向新华社记者发表谈话，他们一致认为：毛主席所阐明的人民战争的伟大战略思想和一整套战略战术原则，向被压迫人民指出了争取解放斗争的胜利道路。"},{"type":"paragraph","text":"这些自由战士都说，他们和他们的战友正在加紧学习毛主席在一九三六年十二月发表的这一著作和毛主席的其他军事著作。"},{"type":"paragraph","text":"来自武装斗争前线的刚果（利）的一位自由战士说：“中国人民在毛主席的领导下已经赢得了革命战争的最后胜利。毛主席所指引的中国人民走过的道路，也就是包括刚果（利）人民在内的被压迫人民将要走的道路。”"},{"type":"paragraph","text":"一位莫三鼻给自由战士表示深深信服毛主席在《中国革命战争的战略问题》一书中的这句名言：“用民族革命战争反对民族反革命战争”。他以莫三鼻给遭受葡萄牙殖民主义者的统治为例说：“如果不是像毛主席指出的那样，用革命的暴力来反对殖民主义统治的暴力，莫三鼻给人民怎么能够取得独立呢？这对我们被压迫人民来说，是一个真理。”"},{"type":"paragraph","text":"一位津巴布韦自由战士说：“毛主席总结的中国革命战争的经验对我们十分有益，我们在斗争中运用它是我们取得胜利的保证。”他说，他感到非常幸运，因为有毛泽东思想指导着他们的斗争。他接着指出，毛主席“关于人民战争的理论已经被中国、越南和其他国家的人民革命战争证明是成功的。”"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50fd9bb8a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
