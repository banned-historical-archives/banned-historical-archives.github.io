ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于加强上海防空工作的批语","alias":"","parts":[{"type":"paragraph","text":"关于加强上海防空工作的批语"},{"type":"paragraph","text":"（1953年2月4日、9日）聂、黄："},{"type":"paragraph","text":"为了防御台匪空军向上海一带的可能的攻击，上海空军及防空两方面均须提高警惕，加紧整顿，准备随时可以对敌作战，确保上海一带的安全。为此请与空司、防司筹商应敌计划告我为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月四日"},{"type":"paragraph","text":"[1]毛泽东的这两个批语，其一写在中国人民解放军总参谋部关于1952年11、12月份部队发生严重事件给毛泽东并中央、军委的综合报告上。其二写在军委办公厅主任肖向荣1953年2月6日关于加强上海防空问题给毛泽东的报告上。"},{"type":"paragraph","text":"[2]空司，指中国人民解放军空军司令部。防司，指中国人民解放军防空军司令部。"},{"type":"paragraph","text":"关于加强上海防空工作的批语同意这个部署。高射炮弹药问题，请周总理注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月九日彭、周、朱、刘、黄克诚阅，退肖向荣。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":4},{"year":1953,"month":2,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":468,"page_end":469},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7db4528493"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
