{"year":1962,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为了进一步修改《瑶族简史简志合编(初稿)》一书，广西僮族自治区民族事务委员会曾邀请区内史学界人士和民族研究工作者，举行瑶族社会历史问题座谈会。"},{"type":"paragraph","text":"座谈会讨论了瑶族古代是否经过奴隶制社会发展阶段的问题。在讨论中有两种不同的意见:一种意见认为，在瑶族人民的近代生活中，没有发现关于奴隶制的痕迹，史书上也没有这方面的记载。历史上瑶族迁徙频繁，分布极广，且多与汉、僮族杂居，因此瑶族与其他民族的经济文化交往关系是密切的。当瑶族在原始社会组织崩溃时，周围民族(汉、僮民族)早已进入封建社会，在这种外力的推动下，瑶族越过了奴隶社会的发展阶段，直接向封建制转化。另一种意见认为，关于瑶族奴隶制的史料虽然较少，但毕竟是有的。如瑶族历史上土官死后被迫陪祭的青年男女就是没有人身自由的奴隶。又如有些瑶族地区瑶民行猎，瑶头不参加行猎活动，也照例分得一份猎物。这就是奴隶主剥削奴隶的残余痕迹。他们认为，说瑶族越过奴隶制社会发展阶段的意见是不能成立的。(陈维刚)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d71b8d1874"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
