","authors":["周恩来"],"dates":[{"year":1961,"month":5,"day":7}],"is_range_date":false,"parts":[{"text":"周恩来在河北武安县视察期间给毛泽东的电话","type":"title"},{"text":"周恩来","type":"authors"},{"text":"5月7日凌晨3时，总理在下榻处给在上海的毛泽东主席打电话汇报了调查的情况，《瞭望》周刊1984年第7期曾刊载那一次的电话记录。周总理说：","type":"paragraph"},{"text":"我到邯郸之后，听了3天汇报，就到武安县伯延公社，现在已经5天了（总理从3日至6日在伯延4天，因打电话已是7日凌晨3时，故称5天）。5天中，我找了公社、大队、小队的干部和社员群众谈了话，开了座谈会，现在有下面四个问题简要地向主席汇报一下。","type":"paragraph"},{"text":"一、食堂问题。绝大多数甚至全体社员，包括妇女和单身汉在内，都愿意回家做饭。我正在一个食堂搞试点，解决如何把食堂散好和如何安排好社员回家吃饭的问题。","type":"paragraph"},{"text":"二、社员不赞成供给制，只赞成把五保户包下来和照顾困难户的办法。现在社员正在展开讨论。","type":"paragraph"},{"text":"三、社员群众迫切要求恢复到高级社时评工记分的办法，但是已有发展。办法是：包产到小队，以产定分，包活到组。这样才能真正实现多劳多得的原则。因此，这个办法势在必行。只有这样，才能提高群众的生产积极性。","type":"paragraph"},{"text":"四、邯郸专区旱灾严重，看来麦子产量很低，甚至有的颗粒不收，棉花和秋季作物还有希望。目前最主要的问题是恢复社员的体力和恢复畜力问题。","type":"paragraph"},{"text":"我明天还要看一个食堂（指涉县堰头一个食堂），8日返回北京，帮助陈总解决出席日内瓦会议的一些问题。以后再给主席写报告。问题解决了以后，我还要返回邯郸。","type":"paragraph"},{"text":"我到邯郸之前，已经派许明同志带领一个工作组在这里工作了20天。","type":"paragraph"}],"comments":[],"origin":"《武安县志》（北京：中国广播电视出版社，1990）145页。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa074b6177"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
