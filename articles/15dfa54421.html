es":[{"year":1979,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理向林肯纪念堂献花圈并参观全国宇航博物馆"},{"type":"paragraph","text":"新华社华盛顿一月三十一日电  邓小平副总理今天上午在这里瞻仰了林肯纪念堂。"},{"type":"paragraph","text":"他在亚伯拉罕·林肯（一八○九——一八六五年）的大理石座像下献了花圈，并静默致敬。"},{"type":"paragraph","text":"亚伯拉罕·林肯是美国第十六届总统，他为解放黑奴而进行的英勇斗争赢得了美国和其他国家许多人的尊敬。这个纪念堂是美国政府在一九二二年兴建的。"},{"type":"paragraph","text":"华盛顿陆军军区司令肯尼思·多利曼和来自林肯总统家乡伊利诺斯州的一些议员陪同邓副总理瞻仰林肯纪念堂。"},{"type":"paragraph","text":"前往瞻仰林肯纪念堂的还有邓副总理的夫人卓琳、副总理方毅以及其他随行人员。"},{"type":"paragraph","text":"纪念堂负责人向邓副总理赠送了一本《亚伯拉罕·林肯传》。"},{"type":"paragraph","text":"当邓副总理一行离开纪念堂时，仪仗队向他们举旗致敬。"},{"type":"paragraph","text":"新华社华盛顿一月三十一日电  邓小平副总理今天上午参观了华盛顿的全国宇航博物馆。"},{"type":"paragraph","text":"同邓副总理一起参观的有：方毅副总理以及邓副总理的其他随行人员。博物馆里展出了二百四十架过去的飞机，四十艘宇宙飞船和五十个导弹和火箭。这些展品生动地表现了人类为开拓征服空间而作的努力。"},{"type":"paragraph","text":"邓副总理来到阿波罗一十一号指令舱的时候，宇航员柯林斯向他叙述了一九六九年他和他的同事们是怎样乘坐这个座舱飞往月球的。"},{"type":"paragraph","text":"邓副总理用手摸了一下从月球上带回来的石块。博物馆馆长齐塞因对他说：“先生，你接触到月球啦。”邓副总理高兴地笑了起来。"},{"type":"paragraph","text":"他们随后看了一部关于人类飞行史的影片。宽达二十三米，高十五米的银幕使在场的每一个人感到自己仿佛也置身于空间一样。"},{"type":"paragraph","text":"这个博物馆于一九七六年建成并向公众开放，它是全国性的一个宇航展览、教育和研究的中心。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15dfa54421"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
