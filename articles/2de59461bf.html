ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复傅作义电","alias":"","parts":[{"type":"paragraph","text":"复傅作义电"},{"type":"paragraph","text":"（1949年9月19日）"},{"type":"paragraph","text":"毛主席说：我们可以将马鸿宾部与马鸿逵部分别看待，但问题的解决必须在前线而不能在北平。全国各地都是如此，宁夏不能独异。无论马鸿宾或马敦静如欲解决问题，应速派代表至兰州第一野战军司令部找彭德怀司令员接洽，或到固原十九兵团司令部找杨得志司令员接洽。如马鸿宾能亲去兰州或固原一趟，则更好。彭德怀将军已知马鸿宾为人是和马鸿逵有区别的，他正想找马鸿宾接洽。如马能亲自去，或派代表去，必被欢迎，不会有任何危险。请傅宜生速为转知，以免误事。又西北前线对宁夏进军的时间已很道近，宁夏代表应速去固原或兰州，不要再迁延了。"},{"type":"paragraph","text":"[1]这是毛泽东起草的以薄一波名义复傅作义电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":266,"page_end":266},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2de59461bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
