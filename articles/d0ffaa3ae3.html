ates":[{"year":1975,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大批修正主义，大干社会主义山西粮食总产超过去年"},{"type":"paragraph","text":"据新华社太原电　在深入开展的农业学大寨运动中，山西省农业生产在去年丰收的基础上今年又获得丰收，粮食总产量比去年增长一成以上；油料等经济作物的产量也比去年有所增长。"},{"type":"paragraph","text":"今年山西省农业生产的一个显著特点是，在先进社、队成批涌现的同时，许多县在学大寨、赶昔阳的道路上加快了前进的步伐。今年，晋中、晋东南地区和长治市、阳泉市，粮食平均亩产上了《纲要》；昔阳县粮食平均亩产在八百斤以上，跨过了“长江”。去年，全省粮食平均亩产过“黄河”的县、市只有八个，今年增加到十九个。全省粮食平均亩产上《纲要》的县、市也由去年的十五个增加到二十六个。"},{"type":"paragraph","text":"在夺取农业丰收的斗争中，山西省各级党组织以阶级斗争为纲，带领广大干部和群众以大寨为榜样，大批修正主义，大批资本主义，大干社会主义，加快了农业发展的步伐。省委和雁北、吕梁、忻县地委派出大批干部，深入到目前处于后进状态的县、社、队，同基层干部和社员群众一起认真学习大寨经验，批判修正主义，批判资本主义，破除“低产难变”的论调，树立了加快农业发展的雄心壮志。今年，这些地区不少县、社、队，革命和生产形势发生了很大变化。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0ffaa3ae3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
