script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认清资产阶级的本质(全文完)","authors":[],"dates":[{"year":1952,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"有人问:这么斗争起来，会不会过火呀?人民民主统一战线的方针会不会改变?"},{"type":"paragraph","text":"只要我们不是随便去没收、封闭资产阶级的企业，又不超过国家的规定去增加税收，我们允许私人资本家在合法范围内，在国家经济领导下经营他们的工商业，领导他们自觉地进行改造。这就不是过火。相反的，若是对资产阶级盗窃国家资财置之不理，对奸商投机违法，损害人民利益的行为不当一回事，对奸商勾引我们的工作人员不给他惩罚，那就叫做“右倾”，就是一种向资产阶级投降的行为。"},{"type":"paragraph","text":"在新民主主义这个革命阶段里，人民民主统一战线的方针是不会改变的。我们要知道，工人阶级和资产阶级的统一战线，从来就是又团结又斗争的政策。因为中国民族资产阶级从来就有两面性。周总理说过:“今天的中国民族资产阶级有其积极进步的一面，那就是由于他们长期受过帝国主义、封建主义和官僚资本主义的压迫，因此他们中间一部分代表人物，在一定时期，一定程度上参加过或同情过人民解放斗争，解放后，他们逐渐参加了人民中国的建设，并在国家的领导下，发挥着一定的积极作用；但是中国民族资产阶级还有其黑暗腐朽的一面，那就是由于他们与帝国主义的、封建的、官僚买办的经济有着千丝万缕的联系，同时，中国资产阶级本身也同世界各国的资产阶级一样，具有唯利是图、损人利己、投机取巧的本质。”所以我们说这一次斗争，正是要反对资产阶级黑暗腐朽的那一面，只有这样，才能达到团结、改造的目的，才能符合全体人民(也包括资产阶级)的利益。也只有这样，我们的人民民主统一战线才能更加巩固。"},{"type":"paragraph","text":"也有人这样耽心，经过这么一次剧烈的斗争，是不是会把资产阶级的经营积极性斗掉了?"},{"type":"paragraph","text":"这种耽心是不必要的，甚至是错误的。斗掉的是资产阶级黑暗腐朽的东西，受惩办的也只会是少数的大奸商。多数的工商业者经过改造以后，是会拥护我们党和人民政府的政策，看清他们的出路。"},{"type":"paragraph","text":"周总理给他们指示得很清楚:“人民政府所保护和欢迎的是那些拥护共同纲领，服从政府法令的工商业家，而不是那些不受领导和限制而想自由发展、盲目生产、贪图暴利的工商业家。中国的工商业家如果按照共同纲领的方向发展，遵守国家政策法令，服从国营经济和国家生产计划的领导，那么，他们的出路是光明的；他们不但在目前时期可以充分地发展他们的有利于国计民生的事业，而且在将来全国转入社会主义的时期，也一定可以得到工作的机会，并且可以保留他们的消费财产。相反的，如果有人违背共同纲领和国家政策法令，抵抗国营经济和国家生产计划的领导，那是与新民主主义的经济背道而驰，必将遭受全国最大多数人民的反对而归于失败无疑。”　(全文完)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4c67f80a2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
