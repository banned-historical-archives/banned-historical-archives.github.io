<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第三世界加强联合反对帝国主义掠夺  布迈丁主席发表谈话表示决不容许对任何原料采取任何霸权行径马里、巴拿马部长强调消除建立在剥削基础上的不平等国际经济秩序","authors":[],"dates":[{"year":1975,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第三世界加强联合反对帝国主义掠夺"},{"type":"paragraph","text":"布迈丁主席发表谈话表示决不容许对任何原料采取任何霸权行径马里、巴拿马部长强调消除建立在剥削基础上的不平等国际经济秩序"},{"type":"paragraph","text":"据新华社阿尔及尔电　据阿尔及利亚新闻社二月五日报道，阿尔及利亚革命委员会主席布迈丁向伊朗新闻工作者发表谈话时强调第三世界国家团结的重要性。"},{"type":"paragraph","text":"他说：“工业化国家和发展中国家之间存在着矛盾”。“这个确实存在的矛盾，其根源在于这样的事实：工业化国家占有强有力的手段。因此，我们必须努力改变目前我们同这些国家之间的不平等关系。”"},{"type":"paragraph","text":"布迈丁主席说，我们决不容许对任何原料，特别是对石油这种十分重要的资源，采取任何霸权行径。"},{"type":"paragraph","text":"他说：“石油政策是各国主权的一个组成部分。我们认为，在利用这种资源的方式上，任何第三国想强加一定条件的企图，都被认为是对我们国家主权和对所有石油生产国作为一个整体的主权的损害。”"},{"type":"paragraph","text":"布迈丁主席在阐述第三世界国家团结的重要性时，提出要警惕发达国家分化离间第三世界中石油生产国和其他国家的关系的阴谋。他说：“由于我们已经具有在第三世界中实行合作政策的现实可能性，因此，我们第一次能够在世界范围内发挥政治作用。”他接着谈到石油输出国组织成员国由于积极团结而取得了成果，并强调说：“我们就是要不惜任何代价来维护这个团结。”"},{"type":"paragraph","text":"据新华社巴马科电　马里外交和合作部长夏尔·桑巴·西索科，最近在对马里报界发表谈话时说，主要建立在暴力、统治和剥削基础上的旧的国际秩序正日益瓦解，并且必定要消失，一个新的合理的秩序必须在国际关系中建立。"},{"type":"paragraph","text":"西索科部长指出：“世界正在经历极为深刻的变化，几个大国可以独自决定人类前途的时代已一去不复返。”"},{"type":"paragraph","text":"他说，现在，第三世界国家比过去任何时候都更加意识到它们的力量和团结在国际事务中起着越来越大的作用。"},{"type":"paragraph","text":"据新华社巴拿马城电　巴拿马外交部长胡安·安东尼奥·塔克二月六日对《巴拿马明星报》记者说，争取真正的社会发展的斗争应该是反对各种形式的压迫、垄断、剥削和政治保护的斗争，以便最大限度地消除不平等的依附和从属状态。塔克外长指出，目前存在着不公正、强暴、压迫和不平等的国际结构。“这种依附结构阻碍着自然资源和人力资源可能得到的充分、民主和自由的发展，并造成各国人民的社会落后。”"},{"type":"paragraph","text":"塔克外长说，巴拿马政府主张：在确立政治、经济和社会制度时实行民族自决；在国际活动中独立自主；反对由于跨国剥削和其它外来压力而造成的依附状态；在称霸的大国的国际政策面前保持独立，实行不结盟国家的基本原则；不干涉各国内政；消除运河区的殖民独立王国。"},{"type":"paragraph","text":"新华社科纳克里电　几内亚《自由报》最近发表文章说，当前在资本主义国家出现的经济危机是这些国家生产力和生产关系之间对抗性矛盾所造成的。文章谴责跨国公司正在把这场经济危机转嫁给第三世界各国人民。"},{"type":"paragraph","text":"文章还揭露帝国主义大国通过免除关税和它们在发展中国家获得的其他的经济利益进行扩张。"},{"type":"paragraph","text":"文章说，面对这种情况，发展中国家必须制定一项共同战略和采取共同一致的行动。文章赞扬了阿拉伯联盟在石油问题上采取的果敢立场以及铝土生产国建立国际铝土协会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec7a7fce7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
