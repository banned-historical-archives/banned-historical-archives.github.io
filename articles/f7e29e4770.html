的通报（节录）","authors":["[西北局]"],"dates":[{"year":1954,"month":3,"day":2}],"is_range_date":false,"parts":[{"text":"关于陕西凤翔县天主教堂囤积粮食问题的通报（节录）","type":"title"},{"text":"[西北局]","type":"authors"},{"text":"……","type":"paragraph"},{"text":"凤翔县天主教堂于1953年粮食市场一度紧张后，在夏收期间大肆囤积，以秘密抢购和募捐等手法共的小麦1千老石。现已查明者计购买小麦135市石；行医付账得小麦15石 4斗5升。在其购买粮食时，因正值国家夏季收购工作开始，他们为实现囤积企图，竟以每斗高出牌价1500元的办法进行抢购，并采取秘密讲价后，由售粮者夜间偷运，或借口念经，把粮食送进村舍神学院等处。… 共存粮250余石… 如此大肆囤粮是为:","type":"paragraph"},{"text":"1．做投机生意，扩大教会基金。","type":"paragraph"},{"text":"2．在青黄不接时，出借给部分教徒群众，借以扩大宗教影响。","type":"paragraph"},{"text":"3．作为宣传组织，发展宗教活动的经费。","type":"paragraph"}],"comments":[],"origin":"陕西省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7e29e4770"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
