r":1946,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“我是走毛主席路线回来的”"},{"type":"paragraph","text":"王震将军在一个欢迎会上给大家讲了个故事："},{"type":"paragraph","text":"在山阳附近的战斗中，有一个平时很勇敢的战士掉了队，而四面又是蒋军追击部队，他只得昼伏夜走。白天老百姓家中隐蔽，每晚走几十里，走了两个月，虽走坏了脚，却仍背着枪和子弹回到了边区。"},{"type":"paragraph","text":"有同志问他：“你身无半文，路又不熟，一个人怎样能回来？”"},{"type":"paragraph","text":"他说：“我是走毛主席的路线回来的。”有些同志不明白他这话。他眼睛瞪了瞪，说：“不明白吗？毛主席的路线，就是群众路线嘛！我就是照着毛主席开的这条路线走回来的！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73450247ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
