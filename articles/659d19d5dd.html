rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"主队以3∶2获胜","authors":[],"parts":[{"type":"paragraph","text":"据新华社8日讯 捷克斯洛伐克布尔诺市“斯巴达克”男子排球队8日在北京和中国青年男子排球队进行了一场友谊比赛。结果，主队以3∶2获胜。五局的比数是15∶8、12∶15、15∶12、6∶15、16∶14。"},{"type":"paragraph","text":"在今天的友谊比赛中，当青年队队员冯正海在关键性的第五局中猛扣一球成功，打成第七次平局——14平的时候，场上的争夺达到了最高潮。这时候轮到青年队队员容植聪发球，对方队员接球失误，青年队以15∶14领先。后来，双方都曾经因为接球失误，先后交换了两次发球权。最后，青年队发球，客队组织进攻。捷克斯洛伐克国家队队员汉特利什猛扣的一球，被青年队队员挡回得分，青年队才以16∶14获得最后胜利。"},{"type":"paragraph","text":"随后，国务院副总理邓小平和捷克斯洛伐克驻中国大使布希尼亚克、客队领队乌尔班尼克等，由主席台走到球场上同双方队员握手，并合影留念。"},{"type":"paragraph","text":"在今天这场历时两个钟头的友谊比赛中，客队中的国家队队员拉兹尼契卡和身材最高的鲁塞克，都表演了出色的“吊球”技术。他们常常利用这种突然性的“吊球”，使对方措手不及。青年队队员今天的大力发球，给对方很大威胁。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"659d19d5dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
