"dates":[{"year":1967,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海第七(原信谊)制药厂无产阶级革命派坚决响应毛主席“抓革命，促生产”的伟大号召，在实现了革命大联合的大好形势鼓舞下，全厂掀起了革命、生产新热潮，试制成功了一次成型的耐压无缝气雾剂铝容器。"},{"type":"paragraph","text":"气雾剂是目前世界上较新的药物剂型之一，具有使用方便、显效快的特点，但它要求有一个耐压而且安全的容器。耐压无缝气雾剂铝容器的试制成功为进一步提高气雾剂质量创造了条件。"},{"type":"paragraph","text":"第七制药厂广大革命职工早想试制这种气雾剂铝容器，但缺乏工艺技术资料，加上来自党内一小撮走资本主义道路当权派的阻力，试制工作迟迟不能开展。无产阶级文化大革命大大提高了职工的觉悟，无产阶级革命派掌权后进一步解放了生产力。在《中共中央给全国厂矿企业革命职工、革命干部的信》的鼓舞下，该厂无产阶级革命派和革命职工表示一定要争做现阶段全国劳动群众“抓革命，促生产”的最出色的模范。在中国人民解放军东海舰队毛泽东思想宣传队的热情帮助下，在试制工作中相信群众、依靠群众，放手发动群众，发扬敢想、敢说、敢闯、敢干、敢革命的精神，革命职工、技术人员大家出主意、想办法，虽经十多次的失败，但大家都抱着“下定决心，不怕牺牲，排除万难，去争取胜利”的决心，几次改进了工具，多次到外厂取经，及时商量研究新的加工工艺，边试制，边改进，克服重重困难，终于试制成一次成型的耐压无缝气雾剂铝容器，经过试装，使用效果良好，产品质量符合要求。"},{"type":"paragraph","text":"该厂原来使用的气雾剂容器，是用白铁皮做的，要三十道工序才能制成，这次在有关兄弟厂大力协助下试制成功的气雾剂铝容器只要四道工序，而且成本低廉。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83284a1476"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
