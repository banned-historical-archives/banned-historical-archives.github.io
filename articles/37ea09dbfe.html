script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对印巴问题采取所谓“中立”态度其实就是赞成侵略者艾地谴责修正主义者站在侵略者一边","authors":[],"dates":[{"year":1965,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社雅加达15日电　据《人民日报》今天报道:印度尼西亚共产党主席艾地，昨天再次谴责现代修正主义者在印巴冲突中不分是非的态度。"},{"type":"paragraph","text":"艾地主席是在全印度尼西亚中央职工会全国理事会第二次会议上称赞苏加诺总统前天正确地揭露了“马来西亚”对印度一巴基斯坦问题采取的所谓“中立”态度的政策。他说，这样的“中立”态度，其实并不是中立，而是站在印度侵略者一边。对于侵略保持“中立”，不外乎是赞成侵略，站在侵略者一边。他同时指出:“采取这种态度的，不仅是‘马来西亚’而且还有现代修正主义者。他们不分谁是谁非”。"},{"type":"paragraph","text":"艾地指出:“美国为把注意力从越南转移开去而点燃起来的印巴战争，不会有利于美国和印度反动派。全世界革命人民的关怀和援助仍然在越南人民方面，同时也向巴基斯坦提供援助。”"},{"type":"paragraph","text":"艾地号召印度尼西亚革命干部努力学习南越人民的斗争经验。他说，“南越是革命者的政治和军事大学。依靠自己把命运掌握在自己手中，并且为维护自己的命运而积极斗争的南越人民，是任何美国武器和军队都征服不了的。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37ea09dbfe"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
