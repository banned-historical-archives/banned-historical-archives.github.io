，创建第一个农村革命根据地，到一九二九年一月带领红四军离开井冈山，向赣南、闽西进军，发展革命根据地的革命斗争历史","authors":[],"dates":[{"year":1963,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社南昌8日电】　江西井冈山革命博物馆于7月1日上午隆重开馆，并且举行有四百多人参加的开馆仪式。"},{"type":"paragraph","text":"井冈山的农民、工人、学生、解放军官兵、机关干部和外地参观者共六百多人，1日上午参观了博物馆。几十位当年参加过井冈山革命斗争的老红军、老赤卫队员，也兴高采烈地参观了博物馆。"},{"type":"paragraph","text":"井冈山革命博物馆建立在井冈山中心茨坪村。全馆共分六个陈列室，用三百多件革命文物和各种图表、模型，以及数十件艺术作品，系统地介绍了毛泽东同志1927年10月率领秋收起义部队上井冈山，亲手创建我国第一个农村革命根据地，到1929年1月带领红四军离开井冈山，向赣南、闽西进军，发展革命根据地的革命斗争历史。陈列的展品生动地说明了毛泽东同志率领秋收起义部队向井冈山进军，为中国革命开辟了一条唯一正确道路的历史意义；介绍了毛泽东同志在井冈山把武装斗争、农民运动、建立革命根据地三者有机地结合起来，使革命运动得以蓬勃发展的历史经验。同时还突出地介绍了毛泽东同志在井冈山斗争时期，为红军制定的一整套建军原则，从而确定了党对军队的绝对领导，使红军成为一支与一切旧军队不同的具有高度政治觉悟和高度战斗力量的新型的人民军队；介绍了毛泽东同志在频繁的战斗中，总结出一系列的游击战术原则，如著名的“敌进我退，敌驻我扰；敌疲我打，敌退我追”以及“分兵以发动群众，集中以应付敌人”等等。毛泽东同志所创造的这些伟大的历史经验和理论原则，不仅指导中国革命取得了伟大胜利，而且丰富了马克思列宁主义理论宝库，对我国的社会主义革命和社会主义建设也有着极其伟大的现实意义。"},{"type":"paragraph","text":"在井冈山革命博物馆筹备预展期间，前来参观的约有两万人次，其中有一些是外宾。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5855f4ba1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
