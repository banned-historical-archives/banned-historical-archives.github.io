ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"在黄炎培关于提倡平地深葬的来信上的批语","alias":"","parts":[{"type":"paragraph","text":"在黄炎培\"关于提倡平地深葬的"},{"type":"paragraph","text":"来信上的批语"},{"type":"paragraph","text":"（1958年1月）"},{"type":"paragraph","text":"电话告黄：信收到了，谢谢他。我赞成他的意见。因忙不写回信了。"},{"type":"paragraph","text":"[1]黄炎培，当时任中国民主建国会主任委员、全国人大常委会副委员长。"},{"type":"paragraph","text":"[2]指黄炎培1958年1月29日给毛泽东的信。信中说：我最近写了一篇《试倡平地深葬》文，认为一般采用土葬法，把很好的可耕地为埋葬死人而浪费，这种不合理的风俗习惯，应按农业发展纲要修正草案第二十三条的规定，予以改变。此文曾发表在1月11日《人民日报》和1月12日《新闻日报》，是一种公开建议性质。各报先后转载，人民来信有直接给我的，有送报纸发表的，纷纷表示赞成。我以为此时应广泛地宣传，请新华社宣传一下。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":509,"page_end":509},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26855ea5c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
