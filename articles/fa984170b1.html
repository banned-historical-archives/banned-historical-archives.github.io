tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"基辛格国务卿一行到达北京","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年十一月二十五日讯 美国国务卿兼总统国家安全事务助理亨利·基辛格博士及其一行前来我国进行访问，今天下午乘专机到达北京。"},{"type":"paragraph","text":"随同基辛格博士来访的有总统助理、白宫办公厅主任唐纳德·拉姆斯菲尔德，基辛格博士的夫人南希·基辛格等。"},{"type":"paragraph","text":"到机场迎接基辛格博士一行的有外交部部长乔冠华，副部长王海容，中国驻美国联络处主任黄镇，新华通讯社社长朱穆之，中国民用航空总局局长马仁辉，有关方面负责人林平、朱传贤、唐闻生、章含之、朱霖、钱大镛等。"},{"type":"paragraph","text":"美国驻中国联络处主任乔治·布什、副主任约翰·霍尔德里奇和联络处官员，也到机场迎接。（附照片）"},{"type":"paragraph","text":"外交部长乔冠华十一月二十五日举行宴会，欢迎美国国务卿兼总统国家安全事务助理亨利·基辛格博士及其一行。邓小平副总理出席了宴会。图为宴会前合影。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"乔冠华","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa984170b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
