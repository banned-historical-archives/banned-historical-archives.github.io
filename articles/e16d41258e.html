ar":1978,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见索马里新闻代表团"},{"type":"paragraph","text":"新华社北京三月十三日电　邓小平副总理今天上午会见了索马里新闻和国家指导部部长阿卜迪卡西姆·萨拉德·哈桑率领的索马里新闻代表团。"},{"type":"paragraph","text":"邓小平副总理同索马里新闻界朋友们进行了亲切友好的谈话。他说：中索两国人民是好朋友，两国人民在任何时候都是友好的。他表示相信，在西亚德总统领导下，索马里人民团结一致，一定能够取得反霸斗争的胜利。"},{"type":"paragraph","text":"索马里驻中国大使卡欣参加了会见。"},{"type":"paragraph","text":"会见时在座的有中央广播事业局局长张香山、副局长顾文华，新华社副社长缪海棱，人民日报社秘书长郭渭，外交部新闻司副司长王珍、非洲司副司长李珩。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见以索马里新闻和国家指导部长阿卜迪卡西姆·萨拉德·哈桑为团长的索马里新闻代表团。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e16d41258e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
