art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"联系批邓斗争实际选读鲁迅著作某团司令部指战员学习鲁迅的彻底革命精神反击右倾翻案风","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 在认真学习毛主席的一系列重要指示，深入批判邓小平的斗争中，解放军北京部队某团司令部指战员积极选读鲁迅的作品，学习鲁迅的彻底革命精神，推动反击右倾翻案风斗争不断向前发展。"},{"type":"paragraph","text":"这个团的指战员从批林批孔以来，就注意学习和研究鲁迅的著作。反击右倾翻案风的斗争开始以后，他们遵照毛主席有关学习鲁迅的教导，紧密结合当前斗争实际，更自觉地展开了学习鲁迅的活动。团司令部党支部还专门召开会议，认真讨论安排了学习计划，在政治夜校里开设了学习鲁迅的课程，并挑选出八名同志组成学习鲁迅著作的小组，举办专题讲座，辅导大家学习。几个月来，他们紧密联系批邓斗争实际，重点阅读了鲁迅的《风波》、《革命时代的文学》、《习惯与改革》、《论“费厄泼赖”应该缓行》等杂文、小说和书信，写出了一百多篇学习体会和批邓稿件，促使司令部机关的学习与批判活动搞得更加热气腾腾。"},{"type":"paragraph","text":"这个团的指战员为了加深理解毛主席关于资产阶级“就在共产党内”的指示，选学了鲁迅的有关著作，研究了鲁迅关于要警惕革命队伍中的“蛀虫”的论述。他们说，党内资产阶级就是革命营垒里的“蛀虫”。这些家伙打着红旗反红旗，比党外资产阶级具有更大的欺骗性和危险性。如果让他们的阴谋得逞，就会路线一变政权变，社会主义的红色江山就会被这些“蛀虫”从“内里蛀空”。我们要学习鲁迅的榜样，牢记党的基本路线，在尖锐复杂的阶级斗争中，时刻保持清醒的头脑，把反对党内资产阶级的斗争进行到底。"},{"type":"paragraph","text":"这个团的干部和战士还学习鲁迅热情支持新生事物的坚定立场，批判邓小平妄图否定和扼杀社会主义新生事物的罪行。副参谋长李耀荣学习了鲁迅的《习惯与改革》、《忽然想到》等文章后，在批判邓小平的会上说，我们要学习鲁迅支持和颂扬新生事物的精神，做社会主义新生事物的促进派，以实际行动反击右倾翻案风。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edbd3311a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
