script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以毛泽东思想为武器，以斗私批修为纲  边教学  边改革  边总结  边提高  天津市中学广大革命师生踊跃投入教育革命","authors":[],"dates":[{"year":1967,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以毛泽东思想为武器，以斗私批修为纲"},{"type":"paragraph","text":"边教学  边改革  边总结  边提高"},{"type":"paragraph","text":"天津市中学广大革命师生踊跃投入教育革命"},{"type":"paragraph","text":"新华社天津二十六日电　天津市中学的广大革命师生、革命干部和红卫兵小将，坚决响应伟大领袖毛主席关于进行无产阶级教育革命的伟大号召，在复课闹革命中，以毛主席的“五·七”指示为最高指针，以“斗私，批修”为纲，彻底批判修正主义教育路线，大破旧的教育制度，掀起了一个边教学，边改革，边总结，边提高的群众性的教育革命的热潮。"},{"type":"paragraph","text":"天津市区、郊区的全日制普通中学，已经先后复课闹革命。广大革命师生在复课闹革命中，以战无不胜的毛泽东思想为武器，对以中国赫鲁晓夫为代表的修正主义教育路线进行了大揭发、大控诉、大批判。许多革命师生以亲身经历，控诉了中国赫鲁晓夫推行智育第一、升学第一、分数挂帅、脱离政治、脱离劳动、脱离三大革命实践等滔天罪行。有的学生还控诉了旧的教育制度对自己的迫害和排斥工农子女等罪行。通过对修正主义教育路线的大揭发、大批判，广大革命师生的阶级觉悟大大提高。他们深刻地认识到：搞不搞教育革命，是关系到培养什么接班人的大问题，是关系到国家前途和命运的大问题。"},{"type":"paragraph","text":"各学校在复课闹革命中，都把活学活用毛主席著作放在高于一切、大于一切、先于一切、重于一切的地位。许多学校以教学班为基础，建立了天天读毛主席著作的制度。革命师生在担负军训任务的解放军同志的帮助下，加强了革命性、科学性和组织纪律性。他们向解放军学习，大抓四个第一，大兴三八作风。"},{"type":"paragraph","text":"在教育革命的热潮中，广大革命师生根据边教学、边改革的原则，在批判中教，在批判中学，一面派人深入到附近的工厂、农村，进行调查研究，根据工人和贫下中农的意见，大胆地提出教学改革的方案和设想。天津延安中学、第三女子中学、第二中学、第一○五中学、第四十二中学等学校，都摸索出了初步的方案，取得了初步的经验。"},{"type":"paragraph","text":"在教育革命中，许多学校放手发动群众，充分发挥广大革命师生、革命干部、革命工人和红卫兵小将的积极性，并且特别注意调动革命教师的积极性。许多中学的革命教师，一面在批判中进行教学，一面走出教研室，到学生中间去，和学生一起进行生产劳动，一起搞军训，一起搞社会调查，一起搞大批判。在教学上，实行“官教兵、兵教官、兵教兵”的教学方法，既当先生，又当学生，师生结合，教学相长，共同改进，共同提高。"},{"type":"paragraph","text":"为了更好地领导中学的教育革命，天津市革命委员会筹备小组文教办公室、天津驻军有关单位、天津市教育局和天津市中学红代会还联合成立了教育革命领导机构，各区、各学校也分别成立了教学改革领导班子。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"405e4f1110"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
