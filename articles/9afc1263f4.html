ves/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"朱洪霞在武重俱乐部集会上的讲话（节录）","alias":"","parts":[{"type":"title","text":"三月八日朱洪霞在武重俱乐部集会上的讲话（节录）"},{"type":"paragraph","text":"朱洪霞在会上介绍了所谓河南的经验，他说：“河南来的姓唐的说：毛主席说，支持革命造反派，对造反派要高抬贵手，对压制革命造反派的要赶下台，城市的要赶到农村去’。河南的造反派已经组织起来了，抵制了党内的走资派，现在已经轰轰烈烈地搞起来了……”。"},{"type":"paragraph","text":"戴行江说：“我这次准备掉脑袋，也要干到底。我们打算把王福魁（武重党委书记）的讲话收集起来进行批判，要把王轰下台。我们要听夏邦银、谢望春的指挥。他们要我们冲就冲，要我们打就打，要我们杀就杀。夏邦银、谢望春要我们把火点得旺一些。团结起来，共同战斗。胜利一定属于我们的。”"},{"type":"paragraph","text":"朱洪霞还说：“我们过去错过了三次机会，一次是陈再道下台，一次是刘丰下台，一次是批林批孔。现在走资派还在走，革命造反派就要斗。”"},{"type":"paragraph","text":"会议开始前，散发了二十条“口号报”，恶毒攻击李先念副总理和省委领导同志。"}],"authors":["戴行江","朱洪霞"],"dates":[{"year":1976,"month":3,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"中共武汉市委材料组，一九七六年十二月","page_start":7,"page_end":7},"tags":[{"name":"河南文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9afc1263f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
