ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央关于补报重大贪污犯的处理情况致薄一波、刘澜涛电","alias":"","parts":[{"type":"paragraph","text":"中央关于补报重大贪污犯的处理情况"},{"type":"paragraph","text":"致薄一波、刘澜涛电"},{"type":"paragraph","text":"（1951年12月1日）薄一波、刘澜涛同志："},{"type":"paragraph","text":"你们十一月二十八日关于华北方面发现的贪污事件的报告收到了。在这个报告中没有说到对于那些重大贪污犯，党和政府是如何处理的，请你们将处理的情况补告我们，即对太原市区委书记赵城、区长任华，唐山市粮食公司负责人（报告中无姓名），河北徐水县银行经理赵增非，山西交城县长张进才，辽东工业厅驻津办事处主任刘治宇，山西交通局保管科副科长赵以儒，华北军区后勤部汽车学校政治委员李晋吾，河北省供销社西北小组负责人（报告中无姓名）等重大贪污犯判处了何种罪刑，向我们作一补充的报告。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九五一年十二月一日"},{"type":"paragraph","text":"[1]薄一波，当时任中共中央华北局第一书记。刘澜涛，当时任中共中央华北局第三书记。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":100,"page_end":100},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"刘澜涛","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ca9d3a722"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
