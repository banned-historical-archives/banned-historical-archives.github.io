<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"稳健升值的“文革”邮票","authors":["孙宗礼"],"dates":[{"year":1998,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在新中国邮票中，升值最快的当属“文革”票了。未正式发行的“全国山河一片红”“全面胜利万岁”和“黑题词”等偶在大型拍卖会上出现，其新票市价平均都已逾十万元一枚了。而正式发行的十九套邮票，六年前，在太原路邮票市场上花一万多元就可配全，而今天的市价已达七万多元，并以每年平均20%以上的升值继续向高价位攀升。即使在邮市低迷时，“文革”票仍以其独特的历史题材稳住价位。十九套“文革”票的面值为七元九角六分。三十年升值达一万倍，不仅在中国集邮史上，即使在世界集邮史上也是罕见的。“文革”票反映了一个政治狂热时代，其邮票内容带有强烈的政治宣传性质。随着时间的推移，其历史文物地位日益显示出来，它是中国邮票史上特殊年代的特殊产物。"},{"type":"paragraph","text":"“文革”票的发行量有大有小，其中大套票的印量并不多(除文10外)，比今天新邮印量2500万套要少多了，只是单枚套票印量很大，但在“文革”年代，集邮作为“封资修”遭批判、取缔，几乎无人再集邮。所有的新邮均可以在大小邮局、烟杂店里购到，用于贴平信之用，大量消耗。留至今日，“文革”新邮存世量就有限了，而“四方连”、“八方连”、全张票就更少了。如今，国内1800万集邮大军中，能集全“文革”票的集邮者比例是不会超过5%的，而能集齐全套“文革”新票、旧票、实寄封的人数更少。"},{"type":"paragraph","text":"“文革”票发行时间短，从1967年4月“文1”至1970年1月“文19”“金训华”邮票为止不足三年时间，而其鲜明的时代烙印却永远流传下来。作为新中国邮票的组成部分，凡集中国邮票者缺乏这一部分实是憾事。无论是新票、信销票，尤其是实寄封，都颇具历史价值。“文革”票也绝不同于可由市场炒作的年份编号票、JT票，它的市场流通量少，价值高，至今无人能够大量拥有“文革”票，更无法操纵市场行情。它的地位是不断地在北京、上海、香港等地拍卖行的成交记录上树立的，因此具有较稳固的基础。　孙宗礼/文"},{"type":"paragraph","text":"\u003cIMG alt=请插入11号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1998\\03\\9837120901.JPG\"\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入11号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1998\\03\\9837120902.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b21c6e7dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
