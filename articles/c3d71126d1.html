rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"两个“务必”记心中革命路上打先锋","authors":["驻人民大学工人/解放军毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"中央两报一刊的重要社论，传达了伟大领袖毛主席的最新指示，给了我们极大的鼓舞和教育。"},{"type":"paragraph","text":"去年秋天，我们在伟大领袖毛主席的指挥下，开进了中国人民大学。我们依靠战无不胜的毛泽东思想，团结广大革命群众和革命干部，打破了过去那种资产阶级知识分子独霸的一统天下，把领导权夺回到无产阶级手中，使学校发生了翻天覆地的变化，斗、批、改步步深入。在一片大好形势面前，我们学习了毛主席的最新指示，深深认识到，斗、批、改的任务还远未完成。不是“没有事情可做了”，而是还有许多事情要做；不是“大功告成”了，而是要再立新功。我们一定要牢记毛主席关于两个“务必”的伟大教导，永远保持谦虚、谨慎、不骄、不躁和艰苦奋斗的作风，在继续革命的征途中永远当先锋，打头阵，胜利完成毛主席交给我们的伟大历史任务。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3d71126d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
