"authors":[],"dates":[{"year":1972,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一九七二年五月十九日电　坦桑尼亚联合共和国军事代表团团长、国防和国民服务部副部长杰弗里·奥斯卡·姆哈加马，今天晚上举行告别宴会。"},{"type":"paragraph","text":"应邀出席宴会的有:我国国防部副部长王树声，中国人民解放军副总参谋长王新亭，总后勤部副部长张令彬，外交部副部长何英，以及中国人民解放军和其他有关方面的负责人潘焱、薛少卿、孔从周、杨昆山，胡奇才、别祖后、龙振彪、陈祥、王以智、吕村夫、柴成文、王岳西、路奎、王安居、韩叙、温业湛、胡为新、向前、陈大远。"},{"type":"paragraph","text":"坦桑尼亚驻中国大使馆参赞阜姆、武官辛巴少校和其他外交官员出席了宴会。"},{"type":"paragraph","text":"姆哈加马团长在宴会上讲话说:在毛主席和尼雷尔总统领导下，我们两国、两国军队之间的友谊是建立在牢固的基础之上的。他说:我们很珍视中国提供的援助。因为它增强了我们争取彻底解放、摆脱贫困、走向繁荣富强和敢于斗争的勇气。只要艰苦奋斗，就能取得胜利。"},{"type":"paragraph","text":"姆哈加马团长谴责美帝国主义在越南民主共和国港口布雷、对越南进行狂轰滥炸的罪恶行径。"},{"type":"paragraph","text":"王树声副部长在讲话中说，坦桑尼亚联合共和国军事代表团在我国访问期间，同我们进行了诚挚的会谈，双方就进一步加强友好合作关系交换了意见。代表团的访问，对加强中国、坦桑尼亚两国人民和军队的友谊，发展两国人民和军队的友好合作关系具有重要意义。"},{"type":"paragraph","text":"王树声副部长谴责美帝国主义在越南的战争升级。他说，中国人民坚决支持印度支那三国人民的抗美救国战争。"},{"type":"paragraph","text":"据新华社北京一九七二年五月十九日电　军委副主席叶剑英，国防部副部长王树声，中国人民解放军副总参谋长王新亭，外交部副部长何英，今天下午会见了坦桑尼亚国防和国民服务部副部长杰弗里·奥斯卡·姆哈加马和由他率领的坦桑尼亚联合共和国军事代表团全体成员，同他们进行了亲切友好的谈话。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王树声","type":"人物"},{"name":"王新亭","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"995267d26a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
