<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海电镀厂某些头头对外地兄弟厂封锁技术故意刁难这种资产阶级的恶劣做法必须严肃批判","authors":[],"dates":[{"year":1969,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:这封来信提出对上海电镀厂某些头头的批评，很值得引起我们的重视。外地兄弟地区对上海的支持和帮助，是十分巨大的。我们应该十分虚心地向北京学习，向兄弟地区学习。同时，在和外地单位搞协作时，应该发扬共产主义风格，把方便让给别人，把困难留给自己。上海电镀厂某些头头这种做法，完全是搞资产阶级的一套，必须加以严肃批判。"},{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"六月下旬，我厂接受了武汉锅炉厂一个产品的电镀加工任务。对这件事，厂革委会的某些人不是以毛主席的指示来指导工作，而是对武汉锅炉厂的同志故意拖延时间，封锁技术，搞资本主义的经营方式。"},{"type":"paragraph","text":"当时，武汉锅炉厂来了八位同志，顺便学习加工这个产品的经验。但是厂革委会的某些人要么推说没有空，要么约人家星期三来，而星期三明明是厂休日，结果使武汉的同志空跑一趟。他们趁八位同志不在时，由革委会委员和生产服务组组长亲自指挥，以惊人的速度对这个产品进行电镀，使武汉的八位同志没能看到我厂加工这个产品的实际操作工艺。革委会有个委员还得意洋洋地说:“这个产品，我们一看就知道他们自己镀过了，没有镀好。我们今天抓紧时间电镀，等他们明天来，我们已经镀得差不多了。”"},{"type":"paragraph","text":"更恶劣的是，产品的电镀，经武汉锅炉厂同志检验不合格，是次品。一些老师傅认为这是生产责任事故。这样重大的事故，厂革委会某些人非但不追究原因，而百般推卸责任。这个产品必须处理掉原来的镀层，重新电镀，象这样大的处理槽子，我厂没有，外厂有。革委会的某些人就对武汉的同志进行刁难，说:“要么你们做槽子来，我们处理；要么你们自己找厂子去处理。”后来，武汉的同志找到了厂子，进行处理时，要求我厂同去一个老师傅，以便临场指导。但我厂就是不予协作。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们:“我们都是来自五湖四海，为了一个共同的革命目标，走到一起来了。”我们工人阶级应该互相支援，互相帮助，发扬“全国一盘棋”的精神，共同完成“抓革命，促生产”的任务。我厂革委会某些人的这种做法，是和毛主席的无产阶级工业路线背道而驰的。在我厂还有不少类似的情况，我认为应该加以严肃的批判。"},{"type":"paragraph","text":"上海电镀厂一工人"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0814d3b16"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
