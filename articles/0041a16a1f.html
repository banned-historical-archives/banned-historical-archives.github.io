<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"评“三项指示为纲”","alias":"","parts":[{"type":"paragraph","text":"评“三项指示为纲” (节录)"},{"type":"paragraph","text":"（一九七六年二月二十九日）"},{"type":"paragraph","text":"梁效任明"},{"type":"paragraph","text":"伟大领袖毛主席最近指出：“什么三项指示为纲”，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目。“毛主席这个重要指示，一针见血地揭露了“三项指示为纲”是一个否定以阶级斗争为纲的、彻头彻尾的修正主义纲领。这个纲领的要害，是复辟资本主义。"},{"type":"paragraph","text":"“三项指示为纲”，是党内那个坚持刘少奇、林彪修正主义路线的不肯改悔的走资派，背着毛主席和党中央提出来的。它的出笼，有着深刻的政治背景。"},{"type":"paragraph","text":"“三项指示为纲”，是直接反对无产阶级文化大革命和批林批孔运动的。毛主席亲自发动和领导的文化大革命和批林批孔运动是干什么的？就是一场伟大的阶级斗争。全国亿万群众在毛主席革命路线的指引下，发扬“可上九天揽月，可下五洋捉鉴”的革命精神，权毁了刘少奇，林彪两个资产阶级司令部，批判了他们的修正主义路线，有力地推动了我国社会主义革命和社会主义建设向前发展。但是，党内不肯改悔的走资派对文化大革命的伟大胜利，极端仇视。他们在文化大革命中受到了群众的批判，口头上大表“悔过”之意，实际上心怀复辟之志。提出“三项指示为纲”，否定以阶级斗争为纲，就是要翻文化大革命的案，算文化大革命的帐。“三项指示为纲”，是同毛主席关于理论问题的重要指示直接对抗的。一九七四年底，毛主席指出：“列宁为什么说对资产阶级专政，这个问题要搞清楚。这个问题不搞清楚，就会变修正主义。要使全国知道。”“我国现在实行的是商品制度、工资制度也不平等，有八级工资制，等等。这只能在无产阶级专政下加以限制。所以，林彪一类如上台，搞资本主义制度很容易。\"毛主席的光辉指示，进一步提高了全国人民以阶级斗争为纲，坚持党的基本路线，加强无产阶级专政，反修防修的自觉性。这就更加引起了党内不肯改悔的走资派的恐惧。他们对于全党、全军和全国人民学习无产阶级专政理论，批判资本主义和修正主义，深人进行上层建筑和经济基础两个方面的社会主义革命，限制资产阶级法权，非常反感。因此，就迫不及待地抛出了“三项指示为纲”的修正主义纲领。"},{"type":"paragraph","text":"这个修正主义纲领，修就修在它完全背叛了我们党以阶级斗争为纲的基本理论和基本实践。："},{"type":"paragraph","text":"在整个社会主义历史时期，指导我们各项工作的纲只能有一个，就是以阶级斗争为纲，即坚持无产阶级对资产阶级的阶级斗争，坚持无产阶级对资产阶级的全面专政。这是由社会主义社会的阶级关系和主要矛盾所决定的。"},{"type":"paragraph","text":"党内不肯改悔的走资派大谈三项指示“互相联系，不能分割”，“是一个整体，不能丢掉任何一一句”，说得振振有词，似乎很全面，其实是在玩弄折中主义的鬼把戏。他们故意把安定团结和发展国民经济这些属于“目”的东西，摆进“纲”里，就是为了以自乱纲，以自代纲。经他们这样一摆，安定和不安定、团结和不团结的矛盾，还有科研落后和实现四个现代化的矛盾，等等，统统成了主要矛盾。他们就是这样用混淆主要矛盾和次要矛盾的手法，淹没了无产阶级同资产阶级这一社会主义社会的主要矛盾。"},{"type":"paragraph","text":"“三项指示为纳”的炮制者明明是自己代表资产阶级，却说看不见阶级矛盾了。这完全是大量未改造好的知识分子都还在，小生产仍然经常地、每日每时地、自发地和大批地产生着资本主义和资产阶级，这些明摆着的事实，难道都看不见了吗？新中国成立以来，党内一次又一次的两条路线斗争，不是令人惊心动魄吗？列宁对社会主义时期的阶级矛盾作了精辟的南述，指出；阶级还存在，而且在任何地方，在无产阶级夺取政权之后都还要存在好多年，在这个时期“不仅会保留资产阶级法权，甚至还会保留没有资产阶级的资产阶级国家”。我们现在就是这样一个国家。怎么会没有阶级斗争？“只要有利益相互对立、相互冲突和社会地位不同的阶级存在，阶级之间战争的就不会熄灭。”所谓阶级斗争熄灭论，从来都是骗人的。刘少奇和林彪都讲阶级斗争熄灭，他们自己就根本没有熄灭。刘少奇围剿革命派，保护他那一小叛徒、死党。林彪发动反革命武装政变，阴谋颠覆无产阶级专政。哪里是什么熄灭？现在，党内不肯改悔的走资派又鼓吹阶级斗争熄灭论，不过是为复辟资本主义施放烟幕，掩护资产阶级向无产阶级进攻，实行反攻倒算，"},{"type":"paragraph","text":"\"个纲领“是一面公开树立起来的旗帜”。“三项指示为纲”的杏黄旗一举，右倾翻案势力就迅速地聚集在这面修正主义旗帜下，大搞复辟活动。他们攻击无产阶级文化大革命的大好形势是什么“今不如昔”呀，“问题相当多”呀，“积重难返”呀，把自已打扮成救世主，要由他们来扭转局势，大有“当今之世，舍我其谁”之概。党内那个不肯改悔的走资派，同当年的孔老二一样，公然以复辟派自居，说什么“无非有人讲“还乡团回来了，复辟了”，“不管它那一套，他说他的。”于是，一股右颂翻案风就刮了起来，越刮越凶。有些人奔走串连，弹冠相庆，或做演说，或拟提纲，或写黑信，或造谣言，教育界、科技界以及其他方面的种种修正主义奇谈怪论，甚尘上，其予头对着无产阶级文化大革命和批林批孔运动，对着毛主席的革命路线。难道这些都是孤立的偶然的现象吗？现在人们明白了：“这股右倾翻案风，是党内那个不肯改悔的走资派从上边刮下来的，是存在着一个“三项指示为纲”的反动纲领、存在着一条与毛主席革命路线相对抗的修正主义路线所造成的。追根溯源，盖出于此。"},{"type":"paragraph","text":"提出“三项指示为纲”的人，为了推行修正主义路线，大刮右倾翻案风，采取了一个很有欺骗性的、容易使人丧失警惕的手法。他们讲的三项指示，看起来都是毛主席的话，但由于纳人了那个对抗以阶级斗争为纲的修正主义纲领之中，毛主席指示的革命灵魂就完全被阉割了。"},{"type":"paragraph","text":"我们要在毛主席为首的党中央领导下，坚持以阶级斗争为纲，彻底批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，批判那条同毛主席革命路线相对抗的修正主义路线。要善于识破党内不肯改悔的走资派打着红旗反红旗的手法，警惕他们为了保护自己、挑动群众斗群众的花招，防止他们用破坏生产来破坏革命的阴谋。要执行党的“惩前后，治病救人\"的政策，团结百分之九十五以上的干部和群众，牢牢掌握斗争的大方向，把反击右倾翻案风的伟大斗争进行到底。"},{"type":"paragraph","text":"（原载1976年2月29日《人民日报》"}],"authors":["任明","梁效"],"dates":[{"year":1976,"month":2,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":381,"page_end":382},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0041a16a1f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
