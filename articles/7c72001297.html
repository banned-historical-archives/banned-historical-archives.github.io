rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底揭露资产阶级反动路线制定者的罪恶","authors":["北京航空学院工会副主席罗俊章"],"parts":[{"type":"paragraph","text":"看了《红旗》杂志评论员的文章，心情很激动。这篇文章说出了我的心里话，我相信也说出了全国广大革命干部的心里话！"},{"type":"paragraph","text":"“打击一大片，保护一小撮”，难道仅仅是一个清华大学吗？不，决不是！凡是推行了资产阶级反动路线的地方都是这样！"},{"type":"paragraph","text":"在北航的中上层干部中，由于我外出工作，回院参加无产阶级文化大革命较晚，是受迫害较少的一个。但是资产阶级反动路线在精神上给我的折磨，是无法用语言能够表达出来的。工作组一到学院，就把中上层干部集中管理，劳动改造。他们根本违反毛主席在干部问题上的教导，把所有中上层干部都当作敌人看待，一会儿一个通令，一会儿一个勒令，“只许规规矩矩，不许乱说乱动。”大字报不准看，大辩论不准听，劳动有人监督，行动不得自由。在劳动改造时，他们这个说“这是一群黑帮”，那个说“全是一群坏蛋”。我们的活动，每天从清早到深夜，都安排得满满的，晚上十一点钟以后，还得汇报一天的“思想动态”。他们还规定，中上层干部和革命战斗组织有什么谈话，必须向他们汇报。"},{"type":"paragraph","text":"资产阶级反动路线的这些罪恶做法，实际上是把我们参加无产阶级文化大革命的权力剥夺了，把我们同广大群众隔离了。使群众看到我们，不敢接近，不敢说话，熟识的同志，也是低头而过，打个招呼都怕“沾了黑边”！甚至我们的家属、子女也遭受歧视。我们一定要彻底揭露资产阶级反动路线的制定者打击、陷害广大革命干部的罪恶！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c72001297"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
