ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对外交部关于美议员访华团成员问题请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对外交部关于美议员访华团成员问题请示报告\"的批语"},{"type":"paragraph","text":"（1974年8月27日）都可以莱，多做工作，表示欢迎。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月廿七日"},{"type":"paragraph","text":"[1]国务院副总理邓小平1974年8月26日报送的这个外交部请示报告中说，美议员团定于9月2日至14日访问我国。美方原在8月14日通知我方说，该团由众议院共和党领袖罗兹任团长。8月22日又通知我方，团长改由民主党参议员、参议院外交委员会主席富布赖特担任，团员有参议员2人，众议员4人。经查，在4名众议员中有2人是众议院的亲蒋派，他们于今年2月和4月两次访台，发表亲蒋言论。我们考虑，对美方有意塞进两个亲蒋派应做出必要的反应，以使美方今后有所收敛。据此我们草拟了给我驻美联络处的电报稿，请一并审核。"}],"authors":["毛泽东"],"dates":[{"year":1974,"month":8,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":505,"page_end":505},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7dbf4e4386"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
