script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"王震在交大校委会扩大会议上要求加强思想政治工作  肃清极左路线的流毒和影响  教育青年集中精力学好功课","authors":[],"dates":[{"year":1980,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"王震在交大校委会扩大会议上要求加强思想政治工作"},{"type":"paragraph","text":"肃清极左路线的流毒和影响"},{"type":"paragraph","text":"教育青年集中精力学好功课"},{"type":"paragraph","text":"新华社上海12月14日电  中共中央政治局委员、上海交大校务委员会主任王震，在主持上海交通大学校务委员会扩大会议时，要求校党委加强党对学校工作的领导，加强思想政治工作。他指出，交大党委过去由于加强了党对学校工作的领导，加强了思想政治工作，较好地保证了教学和科研等项任务的完成，对这一传统要发扬光大。"},{"type":"paragraph","text":"王震在会上听了校务委员和教授们的发言。他在讲话中对交大学生发奋学习，教师辛勤教学，教学和科研工作都取得可喜成绩表示热烈祝贺。他对共青团员们入校后进步较快，有的正在积极争取入党，感到十分高兴。"},{"type":"paragraph","text":"王震指出，在当前情况下，加强思想政治工作具有十分重要的意义。要正视十年浩劫在青年一代身上留下的创伤，肃清林彪、“四人帮”在“文化大革命”中散布的流毒和影响。他说，青年们要坚决反对无政府主义，自觉抵制社会上错误思想的侵袭，集中全部精力学好功课。有什么问题，可以向组织反映，通过正常途径加以解决。交大师生要发扬爱民族、爱祖国的光荣传统，增强组织性、纪律性，提倡尊师守纪，发扬中华民族勤劳、勇敢的好风尚，以建设社会主义强国为己任，听从祖国召唤，志在四方，献身四化。"},{"type":"paragraph","text":"王震在谈到克服十年浩劫所造成的经济困难时说，当前正处于经济调整阶段。他希望大家发扬艰苦奋斗、勤俭办学的优良传统，共同克服前进道路上的暂时困难。他说，我国人口多，底子薄，有些问题只能一步一步地解决。王震还代表校务委员会对交大校友、华裔科学家和企业家包玉刚、王安、朱传榘、朱琪瑶等对交大建设的关心和支持表示感谢。"},{"type":"paragraph","text":"这次会议是12月11日举行的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王震","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2c6982351"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
