["周恩来"],"dates":[{"year":1967,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"周恩来对浙江省军区的电话指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"浙江现在有敌情，你们都知道嘛！敌情第一！浙江的沿海蒋介石很可能搞乱子，你们要提高警惕。","type":"paragraph"},{"text":"省军区直属机关搞四大。司、政、局直属学校可以搞四大，文工团也可以搞。军队不能搞四大，军委早规定了，军以下部队进行正面教育，可以用发扬民主的方式提出批评，不能用四大的形式。","type":"paragraph"},{"text":"最高统帅、付统帅早就规定了部队搞正面教育，独立师、独立营不能例外，部队不能搞四大。但是，他们有权批评省军区领导的资产阶级反动路线，可以送大字报、小字报，可以进行讨论。部队是一个战斗组织，不能成立战斗小组，部队不能乱，部队一乱，就不能作战了。","type":"paragraph"},{"text":"浙江是前线，部队更不能这样，独立二师是公安部队改编的，他们的领导人自己不好，有错误，激起了部队的反感，可以允许他们民主讨论，用三大民主，不用四大的方法，要说服独立二师。","type":"paragraph"},{"text":"对二十多县来的造反派要动员他们回本县闹革命，通过军分区、人武部支持他们，使各地方军分区、人武部的态度明朗起来。当然有的支持，有的还会不支持。要劝二十多县的造反派回去闹革命。你们支持他们，对他们提出的各种要求，主要从政治上满足。","type":"paragraph"},{"text":"杭州本地的造反派不要去军区来来往往，军队不要串联，有意见可以送大字报，你们可以同造反派讲清楚，让省军区关起门来搞四大，不要把秩序搞乱了，部队秩序乱了对敌人有利。","type":"paragraph"},{"text":"杭州湾、浙江沿海敌人很容易钻空子，你们也可以设想设想。","type":"paragraph"},{"text":"对浙江省军区所属各部队，由造反派说服他们。不要搞四大，部队搞正面教育，发扬三大民主。","type":"paragraph"},{"text":"现在红暴会怎么样？（陈励耘北京回来后，已在分化了。）那就是说，红暴会回去后靠拢省联总，形势向好的方面转，浙江是个好形势，再往好转，要一致对敌，照顾大局，这是最重要的两条。要教育造反派照顾大局，要把无产阶级革命派联合起来。省一级不行的话，看看厅一级有没有人站出来。这样过一段，就可以成立革命委员会的筹备小组。","type":"paragraph"}],"comments":[],"origin":"1967年8月30日红代会清华井冈山一部第三动态组编《动态》第136期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"浙江省红色暴动委员会（红暴）","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ed5eaa52e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
