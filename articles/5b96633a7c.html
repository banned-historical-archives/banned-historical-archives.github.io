ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对李达《（实践论》解说》的修改","alias":"","parts":[{"type":"paragraph","text":"对西藏在政治上必须采取极端谨慎的态度!"},{"type":"paragraph","text":"（1952年4月1日）"},{"type":"paragraph","text":"拉萨等地物价高涨，康藏公路短期难通，军队生产今年尚难自给，我们对西藏人民的物质福利一时尚难有所改进。总之我们在西藏的基础在目前和今后一年至两年内还是不稳固的。因此我们在政治上必须采取极端谨慎的态度，稳步前进，以待公路修通、生产自给并对藏民物质利益有所改善之后，方能谈得上某些较大的改革。"},{"type":"paragraph","text":"[1]这是毛泽东在审阅《中共中央关于西藏工作问题的指示》稿时加写的一段话。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":541,"page_end":541},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b96633a7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
