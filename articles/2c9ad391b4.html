" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"关于华中成立军政委员会问题致林彪等电","alias":"","parts":[{"type":"paragraph","text":"关于华中成立军政委员会问题"},{"type":"paragraph","text":"致林彪等电"},{"type":"paragraph","text":"（1949年10月31日）林彪，子恢凹，湖南省委，并告刘、邓："},{"type":"paragraph","text":"（一）程潜程星龄和我们谈得很好。我对程星龄谈的许多话，已托他向你们转告。请你们十分注意拉好对程潜、程星龄、李明灏、唐星及其他进步分子的关系，争取他们和我党进一步靠拢，"},{"type":"paragraph","text":"[1]林彪，当时任中共中央华中局第一书记。[2]子恢，即邓子恢，当时任中共中央华中局第三书记。"},{"type":"paragraph","text":"[3]刘，指刘伯承，当时任中共中央西南局第二书记。邓，指邓小平，当时任中共中央西南局第一书记。"},{"type":"paragraph","text":"[4]程潜，原国民党政府军将领，1949年8月与陈明仁率部在长沙起义；当时任中央人民政府委员、湖南人民军政委员会主任。程星龄，程潜族弟，曾任国民党政府台湾行政长官公署参议，1948年12月至1949年8月在长沙参与程潜、陈明仁起义活动；当时任中央人民政府政务院参事、湖南人民军政委员会顾问。"},{"type":"paragraph","text":"[5]李明灏，原国民党政府军将领，1948年到华北解放区，参加过北平和平解放的工作，并对1949年8月程潜、陈明仁起义做出贡献；当时任湖南人民军政委员会秘书长。唐星，原国民党政府长沙绥靖公署副主任，曾对1949年8月程潜、陈明仁起义做出贡献，担任程潜方面的首席谈判代表；当时任湖南人民军政委员会委员。"},{"type":"paragraph","text":"关于华中成立军政委员会问题致林彪等电站在共同纲领基础上，打击反动分子，改造陈明仁“部，以利民众运动的发展。（二）陈明仁返湘后表现如何，陈明仁兵团的改造工作做到了什么程度，程潜等一行已到汉口否？（三）请湖南湖北两省委各将统一战线工作及民众运动工作向中央作一次报告。（四）华中须准备成立以我党为中心的统一战线的军政委员会，以为管辖六省军事政治财经文化等项工作的过渡时期的最高权力机关。拟以林彪为主任，邓子恢程潜为副主任，委员须网罗六省党内党外重要人物。现林彪已去衡阳指挥作战，请子恢考虑是否有必要召集王首道（或金明），陈正人，张玺，李先念四人在一起商量一下，开出一张不包括两广的四十人左右的名单电告中央考虑；或者用电报叫湘赣豫三省委开出三省名单，加上湖北的名单，电告我们（两广名单由中央拟定）。此项名单，希望能于两星期内电告，但不要向外面泄露。（五）关于组织华中军政委员会“及请程潜当副主任事，我们己和程潜程星龄谈过。程潜表示愿就副主任，在林彪领导之下从事工作。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月卅一日"},{"type":"paragraph","text":"[1]陈明仁，原国民党政府军将领，1949年8月与程潜率部在长沙起义。当时任中国人民解放军湖南军区副司令员。"},{"type":"paragraph","text":"[2]指河南、湖北、湖南、江西、广东、广西六省。"},{"type":"paragraph","text":"[3]王首道，当时任中共湖南省委第一副书记。金明，当时任中共湖南省委第二副书记。陈正人，当时任中共江西省委书记。张玺，当时任中共河南省委书记。李先念，当时任中共湖北省委书记。"},{"type":"paragraph","text":"[4]1949年12月军政委员会正式成立时名称为中南军政委员会。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":482,"page_end":483},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c9ad391b4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
