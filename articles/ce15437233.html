ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"不论新区、老区均须召开县的各界代表会议","alias":"","parts":[{"type":"paragraph","text":"不论新区、老区均须召开"},{"type":"paragraph","text":"县的各界代表会议！"},{"type":"paragraph","text":"（1949年8月25日）华中局，并告东北局、华北局、华东局、西北局、山东分局、华南分局："},{"type":"paragraph","text":"（一）八月二十日电悉。望将各城各界人民代表会经验扼要电告。"},{"type":"paragraph","text":"（二）务须催促各城开会每月至少一次。"},{"type":"paragraph","text":"（三）各县应开县各界代表会议，由农会、工会、学生会、文化教育界、工商业界及党政军，选派代表，可以选择若干开明绅士参加，讨论全县工作。大县代表二百余人，中县代表一百余人，小县代表数十人。每月或每两月开会一次，每次两天至三天开完。此事华东、华中、西北、南方各新区均可做。各老解放区更不待说。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"未有[1]这是毛泽东为中共中央起草的给华中局等的电报。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":169,"page_end":169},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce15437233"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
