导人逝世周年纪念活动","dates":[{"year":1980,"month":12,"day":24}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态: 1980(选编), 294-295","tags":[{"name":"个人崇拜","type":"主题/事件"},{"name":"纪念","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"},{"name":"周恩来","type":"主题/事件"}],"parts":[{"type":"title","text":"不举行领导人逝世周年纪念活动"},{"type":"paragraph","text":"最近，有的友好国家驻华使馆人员向有关部门询问：明年一月八日是周恩来总理逝世五周年，我国是否准备组织纪念活动？"},{"type":"paragraph","text":"明年一月、七月、九月，分别是周恩来同志、朱德同志、毛泽东同志逝世五周年。根据中央关于“少宣传个人”的指示和有关礼仪、制度改革的精神，今后一般不搞去世的领导同志的周年纪念活动。明年毛泽东同志、周恩来同志、朱德同志逝世五周年，国内将不举行有组织的纪念活动。至于逝世十周年是否举行纪念活动，将来再作研究。"},{"type":"subtitle","text":"（第51期，12月24日）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a48ce4de4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
