" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"刘宁一谈澳大利亚和阿尔巴尼亚共产党","authors":["刘宁一"],"dates":[{"year":1967,"month":11,"day":2}],"is_range_date":false,"parts":[{"text":"刘宁一谈澳大利亚和阿尔巴尼亚共产党","type":"title"},{"text":"刘宁一","type":"authors"},{"text":"摘要：","type":"paragraph"},{"text":"我特别要介绍的是，希尔同志本人是对苏修，对阿仑尔集团的第一个造反者，是造反派！他们两个是澳大利亚有代表性的造反派，我们对他们表示衷心的欢迎！在希尔同志领导下的澳共（马）和在毛主席领导下的中国共产党在反对苏修、美帝及各国反动派的战斗中，肩并肩，手携手，我们是亲密战友。我们是两个战斗、友谊、马列主义、毛泽东思想的党。澳共（马）在希尔同志领导下，已经在大洋洲把红旗插起来了，他们为了把毛泽东思想在澳大利亚革命党中成为武器做了很多工作，取得了重大成就，而且在将来一定要取得更大成就。我们和他们一起在反对帝、修、反的斗争中已经取得了光辉的成就，而且将要取得更加辉煌的成就。希尔同志和我们大家有这样的信心，要把澳大利亚变成到处插遍毛泽东思想伟大红旗的、红彤彤的澳大利亚，我们中国人民、澳大利亚人民和全世界人民都有这个信心，把中国做为世界革命的根据地，把毛泽东思想红旗插遍全世界。","type":"paragraph"},{"text":"阿尔巴尼亚国家虽小，革命搞得很快，拿取消军衔来说，他们比我们实行军衔还早，说取消马上就取消了。减薪，真是雷厉风行，最高工资、包括霍查同志，比如一般干部最低工资为五十元，他最高不超过一百元。学习毛主席著作最迫切，很快。给我们提出帮他们印一百万册毛主席语录，最后我们答应印五十万册，需要量很大，文字很复杂。有些为得到毛主席著作，还向我们提抗议，你们见过没有？为得到毛主席著作提抗议呀！毛主席语录在阿尔巴尼亚非常重视。他们看到我们搞文化大革命，因此就搞革命化运动，不叫文化大革命。","type":"paragraph"}],"comments":[],"origin":"《红旗周刊》（首都红代会北京外国语学院红旗战斗大队，1967年12月4日）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"318dcce91e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
