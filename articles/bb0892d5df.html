rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”要的是哪家的“法”？","authors":["北京第三轧钢厂民兵团"],"parts":[{"type":"paragraph","text":"一九七三年春节期间，我厂几名民兵在一处长途汽车站维持社会秩序时，发现一个人横冲直闯，购票不排队，上车不按顺序，破坏了公共秩序，在场群众意见很大。根据群众的要求，我厂民兵对这个人进行了批评和教育。没想到这一下却触到了“帮”上。第二天，有一名衣着讲究的人来到我厂，一进门就喊叫着：“我们是江青身边的文艺战士，今天和你们算账来了！”我们没有买他的账，同志们针锋相对地告诉他：“我们是毛主席身边的工人阶级，维护首都革命秩序是我们应尽的责任。”把他给顶了回去。事隔不久，“四人帮”亲自插手，竟以“中央”的名义下了“指示”，责成我厂主管民兵工作的同志和地区的领导层层检查，并向肇事者“公开陪礼道歉”。我们还是没理这个茬。"},{"type":"paragraph","text":"“四人帮”不是大喊大叫民兵不仅要“执法”，还要“立法”、“管法”吗？为什么我们民兵根据群众的要求“触犯”了他们一点就大动肝火呢？这再清楚不过地表明，他们所要的“法”，完全是保护他们一群一党私利、为他们篡党夺权、复辟资本主义服务的“法”，是修正主义的“法”，资产阶级的“法”，是维护他们“帮”天下的“法”。对这样的“法”，我们一定要把它扔到历史的垃圾堆里去。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb0892d5df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
