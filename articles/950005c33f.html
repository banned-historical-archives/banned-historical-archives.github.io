" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华东区土改全面展开","authors":["文汇报"],"dates":[{"year":1951,"month":1,"day":8}],"is_range_date":false,"parts":[{"text":"华东区土改全面展开","type":"title"},{"text":"文汇报","type":"authors"},{"text":"华东地区的土地改革运动已在苏南、苏北、皖南、浙江、山东等省区农村中全面展开，广大有组织的农民队伍随着觉悟程度的日益提高，正向一贯骑在他们头上作威作福的封建势力展开坚决的斗争，并予严重危害土地改革运动的非法地主以严厉镇压。","type":"paragraph"},{"text":"在土地改革运动全面展开的过程中，各地仍继续发现不法地主千方百计破坏土地改革、藐视政府法令。各地人民法庭已及时予以分别处理，并成为鼓舞群众向恶霸封建势力进行斗争的有利武器。凡坚决与人民为敌的反动地主如王洁卿等则已被坚决镇压，对于非法转移、破坏土地、房屋、农具的不法地主，除分别勒令如数追回或赔偿外，并予应得的徒刑处分。很多地区并通过个别教育、小组漫谈、乡农代会讨论等方式，启发农民明确了地主的土地财产都是农民的血汗以后，都自觉起来监视地主的破坏活动，揭发地主埋藏粮食、农具的地点，苏南、浙江等部分地区民兵并普遍组织流动监视哨，日夜巡逻，有的地区从而基本上制止了地主的破坏。但仍有不少地区在土地改革过程中，部分干部对于地主阶级的本质特别在目前形势下将更加加紧对土地改革的反抗和破坏认识不足，有的人民法庭还积压许多案件，也有的在处理上过分宽大，对罪犯处刑太轻，引起群众不满。个别乡村且有由于对罪大不法地主未能主动逮捕和及时处理，因而发生了乱打乱抓，甚至个别乱杀现象。所以今后对不法地主反抗破坏土地改革行为，必须及时处理迅速法办；另方面对惩治不法地主又必须严格遵照土地改革法及惩治不法地主条例的各项规定办理。防止乱打乱抓乱杀等无政府无纪律的现象的发生。","type":"paragraph"}],"comments":[],"origin":" 《文汇报》1951年1月8日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"950005c33f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
