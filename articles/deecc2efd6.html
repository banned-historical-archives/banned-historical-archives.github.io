script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"扎根西藏干革命回击右倾翻案风  北京市一批应届高中毕业生到西藏插队落户","authors":[],"dates":[{"year":1976,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"扎根西藏干革命回击右倾翻案风"},{"type":"paragraph","text":"北京市一批应届高中毕业生到西藏插队落户"},{"type":"paragraph","text":"新华社一九七六年三月三日讯　北京市十四名应届高中毕业生和一名中学青年女教师，在党和人民的热情支持、关怀下，到祖国西南边疆西藏插队落户，决心以扎根在百万翻身农奴之中的实际行动，回击右倾翻案风。他们已于二日离开北京，满怀革命豪情地去西藏高原。"},{"type":"paragraph","text":"通过批林批孔和学习无产阶级专政理论运动，参加当前回击右倾翻案风的斗争，北京广大中学毕业生的阶级斗争、路线斗争觉悟大大提高。到农村去，到艰苦的地方去，到祖国最需要的地方去，永远走与工农相结合的道路，已成为广大学生的革命志愿。这次赴西藏的十五名小将，勇敢地向旧传统观念和资产阶级法权挑战，多次主动向党组织申请到西藏去当个普通劳动者。北京大学附属中学四名赴西藏的应届高中毕业生谈到他们去西藏的决心时说，刮右倾翻案风的人叫嚷要从高中生中直接选拔大学生，妄图否定无产阶级文化大革命，我们就是要坚持上山下乡的正确方向，用到西藏插队落户的实际行动，来保卫文化大革命的胜利成果，保卫社会主义新生事物，让刮右倾翻案风的人看看，这就是经过文化大革命锻炼的中国青年一代的理想和志愿。我们要在大风大浪里闯革命的路，在艰苦环境中锻炼成长为无产阶级革命事业的接班人。"},{"type":"paragraph","text":"革命小将们临行前，认真学习了《共产党宣言》、《青年运动的方向》、《井冈山的斗争》等马列著作、毛主席著作，他们还学习了毛主席关于民族问题的指示，有的还找中央民族学院、民族出版社的藏族同志学习藏语藏文，了解西藏的情况。有的为了更好地适应西藏的气候，坚持天天长跑锻炼身体。小将们还到天安门前宣誓，表示他们扎根西藏干革命的决心。"},{"type":"paragraph","text":"他们去西藏的革命行动，受到有关党组织和广大工农兵及革命家长的热情支持。临出发前，中共北京市委、市革委会负责人，在京的中共西藏自治区委员会、西藏自治区革委会负责人和小将们见了面，并到车站送行，勉励他们到西藏后，坚持以阶级斗争为纲，虚心接受贫下中农再教育，认真学习马列主义、毛泽东思想，在党的领导下，努力为西藏的社会主义革命和建设贡献力量，以实际行动回击右倾翻案风。"},{"type":"paragraph","text":"清华大学四名赴西藏当农民的应届毕业工农兵学员已在一日离开北京去西藏。（附图片）"},{"type":"paragraph","text":"图为清华大学建筑工程系暖气通风专业毕业班的工农兵学员钟友元（左二）、习亚华（左五）等报名去青藏高原。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"deecc2efd6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
