东北财经学院","凃安民","姜纯洪","符百诚"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"反对党的领导的右派言论","type":"title"},{"text":"东北财经学院符百诚凃安民姜纯洪","type":"authors"},{"text":"“我认为：领导国家的政党要通过各民主党派选举，选上哪个党，就要那个领导，民主党派也好，爱国不等于爱党。只要能把国家领导，什么党都行。”(符百诚)","type":"paragraph"},{"text":"“工人阶级既然有革命的历史必然性，何必要共产党的领导？”(凃安民)","type":"paragraph"},{"text":"“中国没有共产党也不会亡国，你要知道中国人民是爱国的，勇敢的。”(姜纯洪)","type":"paragraph"},{"text":"“供销合作社有民主组织：理事会、监事会和社员代表大会，为了搞好民主管理，党、团组织必须退出合作社，有党的领导，就不能有民主管理，因为合作社的一切问题都是由党来决定。”(凃安民)","type":"paragraph"},{"text":"“自然科学的发展，是不取决于党领导，而取决于人对自然研究的成果，你看资本主义国家，没有共产党的领导，科学那么发达。一百年前没有共产党就有原子能了。”(凃安民)","type":"paragraph"},{"text":" 来源：《我院学生中的右派言论汇编》（中共东北财经学院委员会编，1957）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00645e0c36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
