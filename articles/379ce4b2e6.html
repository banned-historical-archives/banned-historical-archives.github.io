authors":["夏连纯","张春林","李英华","沈阳师范学院","焦玉纯","董振东","郭抗"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——对农业社会主义改造的攻击 (2)","type":"title"},{"text":"沈阳师范学院夏连纯郭抗张春林李英华焦玉纯董振东","type":"authors"},{"text":"夏连纯　(外语系学生)说：“当前我国农民有很大的不满，工人生活水平高，农民生活水平低，这是工农之间发生矛盾的原因。”","type":"paragraph"},{"text":"郭抗  (外语系学生)说：“假期我看到办社一般比过去糟了，党的领导比从前薄弱了，农民都有不满情绪，表面不说，背后发牢骚，对干部不满，农民反映：‘党员都非常自私，组织生活都不参加’。农民如果不好好劳动就罚工分，这是强制劳动。”又说：“我真有疑问：为啥毛主席在‘关于正确处理人民内部矛盾问题’一文中每个问题都分析得清清楚楚，就是回避了农民生活水平低的问题。”","type":"paragraph"},{"text":"“我们今天的棉布计划供应，和伪满时的配给是一样的。”","type":"paragraph"},{"text":"“棉花的收购价降低了，但棉布的售价却提高了，农民是吃亏了。”“农民是有不满情绪，表面不敢说只有背后发牢骚。”","type":"paragraph"},{"text":"张春林　(中文系学生)说：“中国是农业国，居然统购统销起来，粮食棉花都输出了。”","type":"paragraph"},{"text":"李英华　(历史系学生)说：“实行统购统销政策，弄得粮食反倒不够吃。”","type":"paragraph"},{"text":"焦玉纯  (历史系学生)说：“我们周围几县，粮食都叫干部强迫统购去了，农民无法，只得吃豆饼，甚至豆饼都有吃不上的，要不是强大的国家机器(主要指武器)农民都起来了。”","type":"paragraph"},{"text":"“我们武装力量大，是党领导严的缘故，还有农民‘觉悟’不高，如果有匈牙利人民的(主要指工人)觉悟，早就起来暴动了。”","type":"paragraph"},{"text":"董振东  (外语系学生)污蔑党的粮食政策，否认今天人民生活的提高，经常说：“粮食供应是不合理的。现在人民生活提高了，尽吃高粮米饭和苞米查子，过去我们尽喝西北风活着啦!”又说：“过去我尽吃大米白面，可是现在尽吃粗粮，这样提高改善，可真好啊！”并说：“我们吃窝窝头，真是新闻，大学生吃窝窝头，可是为什么高级干部不吃粗粮呢？”","type":"paragraph"}],"comments":[],"origin":"《右派言论选辑》（社会主义教育参考资料之一，内部材料　仅供参考，沈阳师范学院社会主义教育办公室 1958．3）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"379ce4b2e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
