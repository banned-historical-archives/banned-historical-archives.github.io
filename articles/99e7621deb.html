script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朴正熙集团大量引进外资加重剥削人民","authors":[],"dates":[{"year":1974,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朴正熙集团大量引进外资加重剥削人民"},{"type":"paragraph","text":"新华社平壤一九七四年六月二十日电　汉城消息：南朝鲜朴正熙集团为了维持其法西斯统治，不惜出卖民族利益，大量引进外国资本，加重剥削和压榨南朝鲜人民。"},{"type":"paragraph","text":"据报道，到今年三月为止，南朝鲜当局引进外国资本达六十亿七千九百八十多万美元。其中，仅在一九七一年间，朴正熙集团就引进外国资本将近七亿美元。去年前十一个月，朴正熙集团又引进外国资本达十六亿多美元。南朝鲜当局还以乞求“贷款”的方式引进大量外国资本。据报道，到去年底，南朝鲜接受外国“贷款”的总额已达四十三亿八千万美元。如果加上利息，南朝鲜的外债共达五十一亿三千多万美元，这意味着南朝鲜每户居民平均负债七百二十五美元，每人平均负债一百四十五美元。"},{"type":"paragraph","text":"朴正熙集团把南朝鲜庆尚南道马山一带划为“输出自由区”，让外国垄断资本家在那里任意投资开厂。他们还炮制“外资导入法”和用免除“关税”等做法，给予外国垄断资本家种种特权，为外国垄断资本对南朝鲜进行经济侵略大开方便之门。在朴正熙集团的庇护下，外国垄断资本从南朝鲜人民身上不断榨取超额利润。仅去年一年内，外国垄断资本家在南朝鲜榨取的利润高达二亿零五百万美元。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99e7621deb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
