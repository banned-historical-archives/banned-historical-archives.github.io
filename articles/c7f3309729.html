学院教师"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"肃反你们反了谁？","type":"title"},{"text":"太原工学院教师","type":"authors"},{"text":"五人小组严重歪曲党的政策，把好事化为恐怖，133人的名单，使许多无辜的青年人受到了非人的待遇，使人的理想和尊严受到摧残，肃反后逼供的检举材料，封入了毒辣的人事档案袋里，从此便让这些青年人永远投入十八层地狱，永不能翻身。","type":"paragraph"},{"text":"肃反你们都反了谁呢？我们所知道的是：","type":"paragraph"},{"text":"（1）爱提意见的（不顺风使舵的）；","type":"paragraph"},{"text":"（2）努力工作的（不依靠汇报吃饭的）；","type":"paragraph"},{"text":"（3）侵犯党员个人虎威的（不拍马的）；","type":"paragraph"},{"text":"（4）不服从党员个人命令的（不卑躬屈节的）；","type":"paragraph"},{"text":"（5）爱国的华侨和欧美的留学生；","type":"paragraph"},{"text":"（6）爱国的港澳同胞。","type":"paragraph"},{"text":"你们忍心如此，使他们背包袱，政治热情及理想永远消沉，而永远不能冒烟。","type":"paragraph"},{"text":"我们愤怒高呼，把善良人的逼供材料假检举，中伤伪汇报人事室蛮横的肃反材料，在公开大会上烧！烧！烧！","type":"paragraph"},{"text":" 太原工学院一大群教师","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（三）》（中共山西省委整风办公室编印，1957年10月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7f3309729"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
