<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"遵义市五级干部大会简报 第四期","authors":["大会秘书处"],"dates":[{"year":1959,"month":3,"day":24}],"is_range_date":false,"parts":[{"text":"遵义市五级干部大会简报 第四期","type":"title"},{"text":"大会秘书处","type":"authors"},{"text":"[发至公社党委定期收回]","type":"paragraph"},{"text":"大会鸣放三天，已逐步达到深透，已做到知无不言，发言争先恐后，各谈自己的认识，说出了内心话，充分暴露了农村存在着的各种矛盾，为下一步讨论解决所有制和制定具体政策提供了十分有利的条件，与会人员一致反映，话明气散，一身轻快，这就为解决上下级之间，党与农民群众之间的紧张关系创造了良好条件。到会干部进一步理解到主席的指示给了我们以锐利的思想武器和光辉灿烂的前进指南，这就为了下一步解决具体问题和实现59年更大更好更全面的跃进奠定了坚强的信心。","type":"paragraph"},{"text":"在三天的鸣放中首先表现在，当主席的指示传达后，一个个恍然大悟，深感一针见血，画龙点睛。因而在鸣放中争先恐后，有言就发，有话就讲，基层干部说：毛主席看透了他们的心。但也有一部分好心人，对主席赞同之余，又有几分担心，他们说：“这样放是否会影响公社的巩固？会不会裁短通往共产主义的天梯？”但是随着问题的不断揭露，很快地教育了这部分同志“不按主席的指示办事不行”很快地解除了忧虑，观潮派、算账派看风使舵，初到会谨小慎微，胡揣乱测，他们说：“大庭广众，少说为佳”，直到亲眼看到别人发言热烈，语无不尽，才说“共产党这回是真心实意不辩人”，于是比手划脚，连说带骂大发牢骚，如松林公社松林管理区支委赵天德说：“人民公社的优越性我不敢否认，但有点混乱，毛主席一到农村就把矛盾看得清清楚楚，你们这些市和社的干部天天在田边转，眼睛瞎了？猪牛死了，装住看不见……我是放了，整不整随你们的便，当个党员没搞了。干部要多做点，吃饭领工资一点也不能多。”鸣放中涉及的问题很广，有体制、分配、粮食、政策、生产等问题，也涉及干部的作风问题，中心仍是集中在所有制问题上，归纳起来，暴露的主要问题有以下几个方面：","type":"paragraph"},{"text":"一、关于平均主义倾向问题，从以上的材料看主要有以下八点：","type":"subtitle"},{"text":"1·分配拉平。由于穷富拉平分配，影响群众的生产积极性。我市58年的分配一般都是以原来的乡，现在的管理区为单位分配的，一乡数社的富社大部分减少了收入。如虾子公社的兰生管理区，他们具体的算了一个账，58年如果按高级社为单位分配，该区的胜利社（富社）户户都能增加收入，每户可分得现金258.8元，结果是以乡为单位一分的，每户平均只分得104.1元，比高级社分配减少154.7元，胜利社121户，就有103户减少了收入，占总数的85%以上。","type":"paragraph"},{"text":"2·工资拉平。对劳力评级，按级发工资大家意见很多，认为男女强弱劳力干活不一样，拿钱差不多。这样不能发挥积极性，不如高级评工分起劲，有的社员这样说：“工资平均摊，干部真难办，你干我不干，任你怎样干，一月还是三元半”，在不少的地区，流行着这样的歌谣：“做不做，有干部；干不干，每天三顿饭；搞不搞，工资定死少不了。”","type":"paragraph"},{"text":"3·伙食拉平。龙坪公社有社员反映，不管大人小孩，都是一天14两米，一月半斤肉，大人多的闹粮食，小孩多的有积余。","type":"paragraph"},{"text":"4·住房拉平。有些在去年集中居住统一分配住房，有些是因为公社借用了私人的房子，这些人有意见，认为住得稍为宽敞一点的房子也要平均分。有的社员问干部：“你把我的房子划给别人住，是征收呢还是没收？”","type":"paragraph"},{"text":"5·任务平摊：有的反映说上级分配工作和布置任务，常是平坝与山区一样要求。","type":"paragraph"},{"text":"6·奖金平摊：前段是以工资定额的15%作为奖励工资，不分各队的任务是否完成或超额都照比例领取同样的奖励金。","type":"paragraph"},{"text":"7·菜金拉平：不分山区、平坝，不分菜源丰、歉，不分大口小口，菜金一律按人口平摊。","type":"paragraph"},{"text":"8·劳力平调：不分别各地的耕地多少，任务大小，外调劳力时一律按总数平均计调。","type":"paragraph"},{"text":"二、关于“调”的问题，集中起来主要有七点：","type":"subtitle"},{"text":"1·调劳力：层层调，直接调，无偿调，少用多调。反映劳力调得过多，生产受损失，去年放钢铁卫星，谷子烂在田里没有人收割；龙坪公社大窝管理区自公社成立来，调出劳力1200人，现才转来50人。现有劳力900个，要做9千亩田土，每人平均百多亩，该管理区支书说：“这怎样搞好生产啊！”劳力调动频繁，无法计划和安排生产，劳力调出突击未得工资等。有的不满地说：“青壮年调的调，跑的跑，家里剩的都是些老蜷蜷（老残之意），怎样搞生产？”有的观潮派恶毒地攻击说：“你们把人种都不让留一个。”","type":"paragraph"},{"text":"2·调粮食。市调，社调，管理区调，工厂调，铁道调，对调，互调。富裕地区是大为不满，认为做了一年到头是给人家做的，一张小条条就要调谷子。茅坡公社李降林（中农、乡长）说：“上面调得凶，我们就藏得凶，看你怎样调。”","type":"paragraph"},{"text":"3·调现金。公社对管理区的现金随时调，厂矿调，有钱就调，调了后就不记账，不认账。社员反映公社是有进无出，各种农副业的现金收入要定期上缴。泮水公社肖福兴（营长）说：“我们管理区多种经营开展得好，上缴了7万多元，但是菜金都和收入少的地区一样，光是跟人家凑包包。”（下缺）","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4386af7a8e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
