year":1976,"month":4,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西藏文艺战士欢呼胜利"},{"type":"paragraph","text":"西藏歌舞团　才旦卓玛"},{"type":"paragraph","text":"党中央的两项决议，反映了全国各族人民的根本利益，表达了我们西藏百万翻身农奴和文艺战士的共同心愿！"},{"type":"paragraph","text":"党内最大的不肯改悔的走资派邓小平，极力推行反革命的修正主义路线，大刮右倾翻案风，妄图复辟资本主义，成为党内外资产阶级的总代表。他拒不接受毛主席、党中央对他的挽救和广大人民群众对他的教育帮助。在天安门广场进行反革命破坏的一小撮阶级敌人，又要抬出他来当中国的纳吉。他的问题的性质已经变为对抗性的矛盾。我们百万翻身农奴、革命文艺战士坚决拥护党中央关于撤销他党内外一切职务的决议。"},{"type":"paragraph","text":"雄伟的天安门广场，是我们伟大社会主义祖国的心脏，是第一面五星红旗升起的地方，是毛主席检阅革命群众队伍的地方。在天安门城楼上，我曾经三次幸福地见到了伟大领袖毛主席，同他老人家握过手，并聆听了他老人家的亲切教导。我曾千百遍地歌唱伟大领袖毛主席，歌唱雄伟的天安门。而一小撮阶级敌人竟敢在这里制造反革命政治事件，丧心病狂地把矛头指向各族人民的伟大领袖毛主席，阴谋分裂以毛主席为首的党中央，使我怒火满腔，无比愤慨。我坚决支持对这一小撮反革命分子实行无产阶级专政。"},{"type":"paragraph","text":"我们从这次发生在天安门广场的反革命政治事件中清楚地看到，邓小平推行的反革命的修正主义路线，是有其社会基础的。这就是党内外的新旧资产阶级和社会上没有改造好的地、富、反、坏、右，他们总是把复辟的希望寄托在修正主义头子身上。这说明，修正主义上台，就是资产阶级上台，就是资本主义复辟，对我们西藏来说，就是封建农奴制度复辟。我们百万翻身农奴，是在毛主席、党中央的领导下才砸碎了千年封建枷锁，才有了幸福的今天。邓小平搞复辟倒退，妄图叫我们百万翻身农奴吃二遍苦，受二茬罪，我们坚决和他斗争到底。阶级敌人疯狂之时，就是他们灭亡之日。谁敢反对无产阶级专政，必将自取灭亡。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0899108c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
