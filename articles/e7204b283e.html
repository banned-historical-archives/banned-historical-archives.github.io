rt":9,"page_end":9,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席发明英语单词","authors":["曲鸣明"],"parts":[{"type":"paragraph","text":"〖TM/中图〗"},{"type":"paragraph","text":"〖BH/版号〗009〖-BH/版号〗"},{"type":"paragraph","text":"〖WJ/文件〗2014050600902.T01〖-WJ/文件〗"},{"type":"paragraph","text":"〖-TM/中图〗"},{"type":"paragraph","text":"■曲鸣明"},{"type":"paragraph","text":"毛泽东从青年时代就开始接触英语。长征胜利后，在延安的窑洞里，他又跟着来访的美国记者学英语、学唱外国民歌，甚至学跳西方的交谊舞。就是在解放战争中，他也没有忘记自己的英语学习，常常手拿一本《学英语》手册，坐在窑洞外的小凳子上看。"},{"type":"paragraph","text":"1946年8月，毛主席在延安杨家岭与美国女记者安娜·路易斯·斯特朗会面。这次采访中，毛主席第一次提出了那个著名的论断：一切反动派都是纸老虎。当时，翻译用了“scare-crow”（稻草人）一词来翻译。毛泽东感到很奇怪，因为他没有听到paper（纸）和tiger（虎）这两个他知道的词，于是便问翻译怎么回事。在得知情况后，他立刻表示：“不行，我的意思是纸糊的老虎，是paper-tiger。”"},{"type":"paragraph","text":"生造的“paper-tiger”一词，直到1973年仍被美国国务卿基辛格提起。那是在一次会晤中，基辛格说：“听说，主席发明了一个英文词。”毛泽东立即爽快地承认：“是的，我发明了一个英文词汇，paper-tiger。”机敏的基辛格则马上对号入座：“纸老虎。对了，那是指我们。”"},{"type":"paragraph","text":"有一点人们也许不知道，毛泽东是这样念这个由他生造的英文词的：“拍拍，太根儿。”虽然，他的发音不太标准，但这丝毫不影响他作为“战后国家领导人”的形象在全世界高高挺立。"},{"type":"paragraph","text":"毛主席学英语时用过的单词卡片，由其秘书林克、翻译唐闻生制作。"},{"type":"paragraph","text":"资料图片"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7204b283e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
