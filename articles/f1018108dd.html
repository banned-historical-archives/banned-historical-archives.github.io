es":[{"year":1949,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　近百年来，帝国主义者为了操纵中国经济，吮吸中国人民的脂膏，曾在我国建立了无数进行经济侵略的金融机构，这其中以英商汇丰银行的“牌子最老”，规模最大，外滩汇丰大厦前面的一对铜狮子，张着血盆大口，七十余年来不知已吞下了多少中国人民的血汗!可是服务于这家银行的三百五十多个职工，却因了薪水不足维持最低限度生活，虽曾与资方一再磋商而毫无结果，不得不于最近以行动抗议资方的一拖延政策”!"},{"type":"paragraph","text":"原来汇丰银行工人的待遇，最低底薪仅三十七元，普通底薪都在六十元以内，工人要求合理调，使足以维持最低限度生活，但资方却一直置诸不理，解放后工人再度与资方洽商，拖延多日后，始允稍稍增加些，工人们觉得和他们要求相距太远，无法接受，在参加游行之后，就进入半复工状态，促使资方注意，当时华籍职员对工人的行动也表示同情。"},{"type":"paragraph","text":"昨天下午二时，劳资双方，到总工会实行协商，虽经总工会代表多方调解，由于资方坚决不肯让步，毫无结果，最后就移至劳工处解决，在劳工处代表主持下又经银钱业工作组陈秉铨从中多方解释，终于获得了协议，这件劳资纠纷终算很快的宣告解决了。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1018108dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
