<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"匈牙利议会通过宪草  拉科西指出新政权属于劳动人民保证民族民主权利消灭阶级剥削","authors":[],"dates":[{"year":1949,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"匈牙利议会通过宪草"},{"type":"paragraph","text":"拉科西指出新政权属于劳动人民保证民族民主权利消灭阶级剥削"},{"type":"paragraph","text":"【新华社北平二十日电】布达佩斯讯：匈牙利议会十七日听取拉科西关于匈牙利人民共和国宪法草案的报告后，进行两日讨论，在十八日会上最后通过该宪法。塔斯社报道，十七日会上工人党议员洛松齐发言说：宪法草案完全符合于匈牙利人民解放斗争全部历史的精神。我们的国家能够独立自由，是由于叛国的反动派已被赶走，政权已交给了劳动人民。小农党的议员米哈菲维说宪法是建立在匈牙利人民解放斗争的传统之上的。国家农民党的议员纳纳西说：以宪法为基础，匈牙利人民将循进步的道路前进。"},{"type":"paragraph","text":"十八日继续辩论，急进党议员费连查勒赞同宪草，并说：匈牙利人民共和国之取得独立，首先要归功于苏联及其领袖斯大林大元帅的友谊帮助。塞尔盖代表劳动农民欢迎宪草，利兹尼雅克教授代表知识分子、贝拉萨莱代表青年、巴利尔库上校代表匈牙利人民军的官兵一致拥护宪草。至此，议会副议长莫尔纳即宣布在辩论中全体发言人都赞同宪草，并提议议会对宪草通过决定。全体议员当即起立，鼓掌赞同宪草。当主席宣布匈牙利人民共和国的宪法正式通过时，议员们再次起立，热烈鼓掌、欢呼，向匈牙利人民领袖拉科西致敬。"},{"type":"paragraph","text":"议会又通过与该宪法生效有关的各项暂行条例的法令。"},{"type":"paragraph","text":"【新华社北平二十日电】塔斯社布达佩斯讯：匈议会十七日会上，部长会议副主席拉科西代表政治与制宪委员会作了关于匈牙利人民共和国宪法草案的报告。拉科西在报告宪草委员会的工作时指出：委员会力求在宪法中体现匈牙利人民已经达成的一切成就。宪草不仅巩固了已赢得的成就，而且也提出了进一步发展的道路。宪草的拟订工作是根据苏军解放匈牙利以来的时期中匈国所发生的变革——工人阶级的执政、工业百分之九十一的国有化、土地改革等——着手进行的。然后拉氏指出，匈牙利在国民经济的每一部门中都已走上了社会主义的道路。"},{"type":"paragraph","text":"拉科西在指出现时匈牙利国家制度的特点时强调称：在匈牙利，整个政权属于劳动人民。因此宪草中规定匈牙利人民共和国社会制度的基础是劳动，每一个健壮公民的权利、义务以及名誉攸关的问题是各尽所能。匈牙利人民共和国保证公民的工作、休息、与受教育的权利。宪草的拟订是为了消灭剥削阶级和进一步巩固由工人与农民两个友好联盟的阶级组成的社会。匈国政权属于劳动人民，在这里，起领导作用的是更加发展、更有组织和有更高的阶级觉悟的工人阶级。"},{"type":"paragraph","text":"拉科西进而指出宪法草案从一切民族与种族平等的原则出发，它是彻底的民主的，它不仅宣布公民的权利，并且保障这些权利的真正实现。宪法草案认可男女平等，维护青年的利益，给予青年以发展的一切条件。宪草保护由劳动获得的财产，保证信仰的自由，并且从而规定国家与教会分离。宪草保护婚姻和家庭。"},{"type":"paragraph","text":"拉科西叙述宪法草案公布后报纸的评论时说：匈牙利的劳动人民，以巨大的热情来接受宪法草案。苏联和各人民民主国家的人民都表示赞成。至于帝国主义者，宪草自然是不为他们所喜欢的，然而我必须强调，我们宪草委员会的目标并不是求得帝国主义者的欢心。"},{"type":"paragraph","text":"拉科西继详论关于修改宪草的建议，最后要求议员们讨论并通过宪草。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69d3c92a42"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
