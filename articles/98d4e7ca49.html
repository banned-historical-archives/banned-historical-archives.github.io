month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为了使得三反运动能够迅速勇猛推进，必须打倒右倾思想。"},{"type":"paragraph","text":"右倾思想，就是对三反运动这一场激烈的阶级斗争认识不足，体会不深。有了右倾思想，便会视力模糊，软弱无力，麻木不仁，缺乏应有的强烈憎恨。有了右倾思想，便会对贪污分子原谅宽恕，大发慈悲之心，乃至以种种理由，对他们姑息起来。忘记了“在野兽面前，不可以表示丝毫的怯懦，我们要学景阳冈上的武松。”于是在客观上纵容了“老虎”，包庇了“老虎”。"},{"type":"paragraph","text":"右倾思想，会让“老虎”在自己身旁乱钻，把贪污犯看作同志。有了材料，仍然怀疑，处处打上问号，怕打错。于是碍手碍脚，使运动陷入迟缓落后状态。"},{"type":"paragraph","text":"赶快打倒右倾思想，使三反运动能够迅速勇猛推进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98d4e7ca49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
