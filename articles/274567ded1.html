al-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"由萍乡出发向吉安的命令","alias":"","parts":[{"type":"paragraph","text":"由萍乡出发向吉安的命令"},{"type":"paragraph","text":"（1930年9月23日）"},{"type":"paragraph","text":"本军团奉中国共产党中央命令，夺取南昌、九江，消灭鲁涤平，为夺取长沙、武汉，进攻南京起见，·...决定先攻下吉安城，使赣西南工农群众势力向下游发展与我们配合并补充大量新兵，扩大红军队伍····"},{"type":"paragraph","text":"（一）三军团于明二十四日由萍乡动身，进驻樟树，占领临江一带，截断赣江，并堵住敌人援军。"},{"type":"paragraph","text":"（二）一军团分两路：左路十二军攸县出发，右路三、四军从萍乡出发，经袁州（二十军）汇合，共在安源、萍乡集结工作，限于二十七日出动，部队准时在阜田集中，攻击吉安城。"},{"type":"paragraph","text":"（三）总部直属队随同中军委于明二十四日移至安源工作三天，限于二十七日全军团（缺十二军）由安源、萍乡出动，向宜春进发，经宜春到吉安城北九十里之阜田附近集中，出动后全随总部行止。"},{"type":"paragraph","text":"（四）十二军由攸县向吉安城北集中。（五）....."},{"type":"paragraph","text":"总指挥朱德兼"},{"type":"paragraph","text":"政治委员毛泽东"}],"authors":["毛泽东"],"dates":[{"year":1930,"month":9,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":79,"page_end":79},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"274567ded1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
