ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"为中央社会部题词","alias":"","parts":[{"type":"paragraph","text":"为中央社会部题词！"},{"type":"paragraph","text":"（1937年）为党即是为人民服务。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]中央社会部是公安部的前身，最早是1931年11月成立的中华苏维埃政治保卫局，1935年11月随红军长征到达陕北，更名组建成了西北政治保卫局，·成为保卫中共中央的主要机构，由毛泽东的老部下周兴任局长。1937年又改名为边区保安处，它是陕甘宁边区公开的治安管理部门，仍由周兴负责。中央社会部成立之前，边区保安处代行社会部的职能，组成社会部和情报部的工作人员基本上也是从边区保安处调出，所以保安处与社会部原本是一个机构的派生关系。鉴于边保锄奸肃特工作的重要性，毛泽东在中央社会部内部刊物上，做了“为党即是为人民服务”的题词。为念服"},{"type":"paragraph","text":"为亮是孔小毛泽东为中央社会部的题词。"}],"authors":["毛泽东"],"dates":[{"year":1937}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":434,"page_end":435},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd68c2b604"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
