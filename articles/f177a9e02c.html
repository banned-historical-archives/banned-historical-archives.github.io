ors":["蒋葆生"],"dates":[{"year":1975,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"一个原林办工作人员给毛泽东的信（要点）","type":"title"},{"text":"蒋葆生","type":"authors"},{"text":"〖蒋葆生，原林彪办公室工作人员，保健医生。〗","type":"subtitle"},{"text":"我是一个共产党员，原系北京医院医生，“九·一三”事件前经组织派往林彪处做保健工作。“九·一三”事件后，组织上决定我参加学习班，集中学习，到现在已近四年，而我的问题如同其他学员一样，至今仍未作出正式结论。当前，全国正遵照您的指示，认真落实政策，我感到十分鼓舞，渴望自己早日回到原工作单位，为党、为人民做一点有益的工作。同时，也希望其他学员同志的问题能够得到妥善的解决。","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"九·一三事件","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f177a9e02c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
