":["山西师范学院学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——茅坑里的石头又臭又硬","type":"title"},{"text":"山西师范学院学生","type":"authors"},{"text":"前些日子，中文系一同学王××，为了更正被逼成招的肃反交代，去找过一次档案科，马科长说，遗憾的是你的材料丢失了，你再重新写一份吧。因为一次偶然的机会，王××遇见了陈正同志，与他提起了丢失材料的问题，不知道陈正还是同学，把王××被丢失材料的事传到杨立杰耳里，该王××倒霉，这天他与杨立杰碰头了，杨立杰不禁肝火大发，竟然提出质问，“谁告诉你，把你的材料丢了？！”王××在肃反逼供中是成了“惊弓之鸟”那里还经得起这一吓，他只好战战兢兢地纠正他以前的说法，“大概不是丢了，是找不见了”。","type":"paragraph"},{"text":"D.D.T．写到这里，冒然叹曰：自己错了还威胁人家不准说，真是茅坑里的石头，又臭又硬。","type":"paragraph"},{"text":" 山西师范学院 D.D.T．","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3368e09371"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
