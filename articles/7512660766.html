<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"公安部转发山东省公安厅分党组关于“滕县专区取缔反动会道门问题”几点意见","authors":[],"dates":[{"year":1953,"month":2,"day":10}],"is_range_date":false,"parts":[{"text":"公安部转发山东省公安厅分党组关于“滕县专区取缔反动会道门问题”几点意见","type":"title"},{"text":"现将经山东分局同意的山东省公安厅分党组关于滕县专区取缔反动会道门问题提出的几点意见，摘要转发你们参考。","type":"paragraph"},{"text":"山东省公安厅分党组关于滕县专区取缔反动会道门的几点意见：","type":"subtitle"},{"text":"滕县专区反动会道门基础比较雄厚，据现有材料统计：全区有会道门52种，点传师、法官以上的道首1166人，办道人员1319人，道众约20万以上。1951年镇压反革命时，因力量所限，没有发动全面取缔。因而，对会道门未从组织上加以摧毁；甚至更严重的个别乡村民兵组织和党的支部被会道门掌握和篡夺；平邑县一个乡有党员52人，就有45人是会道徒；白颜县12区14个乡有13个乡长是会道徒，该区铁山乡乡长、民兵队长是小道首，他们在全乡120个民兵中发展了94个道众。因此，群众对我们搜集反动会道门材料的干部说：“你们去找干部吧！”有的党员宁愿退党不愿退道。","type":"paragraph"},{"text":"根据以上情况，山东省公安厅分党组提出以下处理意见：","type":"paragraph"},{"text":"一、逮捕道首的控制比例数问题：省第七次公安会议规定捕道首总数的80％，根据滕县具体情况，凡在1951年镇压反革命后至今仍有现实活动的点传师、公共坛主以上及相当于上述的道首，应捕90％以上；1949年6月省府颁布安字第一号取缔会道门布告以后，至镇反之前有活动的点传师、公共坛主以上及相当于上述的道首，应捕60％左右；至于在省府布告以后停止活动的道首，只对那些历史罪恶确属严重，并有血债，不捕办不足以平民愤的个别道首，进行个别逮捕，一般不要捕办。除合于上述条件的道首，应该捕办之外，对于办道人员中的个别罪恶严重，有民愤的分子，亦可个别捕办。总之，要以解决问题为原则；但在执行逮捕时，把发动群众与逮捕首恶分子循环结合，步步深入，善于掌握运动的环节。这样层层深入，发动群众，既便于控制，又使运动逐步深入巩固；只有如此，才能既稳且速，不致搞乱运动，而达取缔和摧毁会道门组织的目的。","type":"paragraph"},{"text":"二、应捕道首的条件是：公共坛主、点传师以上及相当于上述道首，有如下情形之一者，可逮捕法办：","type":"paragraph"},{"text":"1.利用反动会道门勾结蒋美匪帮特务或阴谋叛乱者；2.有严重的敲诈、骗取道徒财产和奸污妇女的罪行，为群众所公愤者；3.假借治病，骗人财物，害死人命者；4.在省府明令取缔之后，进行假登记、假悔过的道头、会首或办道人员，仍继续进行非法活动者；5.虽未犯上述罪恶，但犯有其他罪行，民愤很大者。","type":"paragraph"},{"text":"三、对于乡村干部、民兵、党、团员参加会道门的问题，在处理上应特别慎重，应弄清系历史问题或现实问题，是道首还是一般道徒等，分别处理。首先采取教育，启发觉悟，在提高觉悟的基础上使其主动坦白，坚决与会道门割断联系，变为取缔会道门的力量。在具体处理上应当：?对入党前曾为道徒，入党时已向党声明，入党后又未参与会道门活动者不究；?入党前曾为道徒，虽入党时未向党声明，但入党后未与会道门发生任何关系，现在又自动坦白的党员，只要其向党声明坚决与会道门割断联系，不再追究；入党前系一般道众，入党后仍与会道门保持联系，只要其主动坦白，表示今后真诚愿与会道门断绝联系，应记一笔账，暂不追究；但对于经教育后，宁愿退党，不愿退道者，应坚决清洗出党；?对于会道门有计划地派入党内别有企图的会道门分子，不论是道首或道众，一经查明要严予处理；?对于为会道门所掌握把持或篡夺了领导的党的支部、民兵组织等，应当先行教育，争取被蒙蔽的分子，从思想上提高其觉悟；然后宣布解散，个别进行审查，分别处理；?非党员的乡村干部和民兵中的会道门分子的处理，一般的应比党内要宽。以上问题，因为牵连到内部，在处理时必须严格控制，故在批准制度上，对党员中参加了会道门而应逮捕的分子，逮捕批准权归分局，对非党的乡村干部、民兵中的会道门分子应逮捕者，可由地委批准。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7512660766"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
