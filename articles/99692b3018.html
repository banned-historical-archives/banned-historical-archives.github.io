script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从王康年欺骗志愿军的罪恶行为认识资产阶级的丑恶面貌","authors":[],"dates":[{"year":1952,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奸商王康年(大康西药房经理)骗取志愿军巨额药款的消息在本报刊出后，连续收到各地及本市读者来信四十余封；他们对王犯康年这种丧尽天良的无耻行为一致表示愤慨，要求人民政府给以最严厉的惩罚。在这些来信中，已选择刊出三篇，因篇幅限制，现将未经发表的来信综述如下:"},{"type":"paragraph","text":"中国人民志愿军是我们最可爱的人，是最受尊敬和最受爱戴的英雄人物；而王犯康年这个极端丑恶的奸商竟敢于任意欺骗和危害他们的健康和生命，这是国人民都不能容忍的事情。华东人事部金琦同志说:“这个‘笑面虎’大摆筵席，以‘慰劳志愿军’的虚假口号来欺骗志愿军的采购员；这正说明资产阶级恶毒的本质。”淡水路二四六号居民王铭动说:“全国人民正以增产节约支援志愿军的时候，怎能容忍这种丧天害理的罪恶行为呢?”金科中学吴景洪说:“这种禽兽，和武装侵犯我们的敌人相比较是有同等罪恶的!”苏州西海岛居民张竞棣说:“我们捐献飞机大炮的钱，不能让奸商盗窃去。”王康年的罪恶还不仅如此，他千方百计地来腐蚀干部，企图把所有和他接触的政府干部都“改造”成为他的摇钱树。正如镇江医政路居民黄立武所说:“大康药房自称为‘老干部思想改造所’，就应予以彻底粉碎，不准资产阶级毒化我们的机构存在。”"},{"type":"paragraph","text":"还有卅七个读者一致指出:王犯康年的无耻行为，正是资产阶级猖狂进攻的具体表现。朝鲜前线的志愿军正在寒风凛烈、冰雪满地的恶劣气候下，为保卫祖国安全和人民幸福而抗击着美国侵略强盗；我们何忍让这些最可爱的人遭受奸商欺骗呢?像王康年这类奸商如不严加惩办，怎能对得起志愿军和支援前线的爱国人民呢?"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99692b3018"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
