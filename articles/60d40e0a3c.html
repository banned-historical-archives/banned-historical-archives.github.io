art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"站在昆仑望北京红心永向毛主席","authors":["七二六六部队参谋长/喀喇昆仑山上某部四连原连长陈宝森"],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！喀喇昆仑山上的战士有一千个、一万个愿望，最大的愿望就是能见到您。今天，我来到您的身边，受到您的亲切接见，怎么能不叫我心潮翻滚，热血沸腾。我千遍万遍地欢呼：毛主席万岁！万万岁！千遍万遍地祝愿毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"敬爱的毛主席啊！您三十九年前亲手为我军写的古田会议决议，象一盏指路明灯，指引着我们在您的建军路线上胜利前进！"},{"type":"paragraph","text":"敬爱的毛主席啊！您在伟大诗篇《念奴娇·昆仑》里描写了昆仑雄伟壮丽的景色：“横空出世，莽昆仑，阅尽人间春色。飞起玉龙三百万，搅得周天寒彻。”我们初上山，困难重重，最严重的是缺乏氧气，呼吸困难。我们在您的光辉的古田会议决议的指引下，认识到越是环境艰苦，越要坚定地走政治建军的道路，越要活学活用您的光辉思想。您的光辉思想就是我们取之不尽、用之不竭的氧气。我们自己动手做毛主席语录牌，设在营区、路旁，让您的伟大教导在昆仑山上永放光芒。我们用您的光辉的“老三篇”作武器，在昆仑山上大摆破私立公的战场。大家决心以艰苦为荣，以喀喇昆仑为家，身在昆仑山，胸怀全世界。"},{"type":"paragraph","text":"敬爱的毛主席啊！您教导我们要“宣传群众”，我们在几百里的高山顶上，也想方设法向群众宣传您的伟大思想。在无产阶级文化大革命中，我们写信宣传您的最新指示，帮助亲友坚定地站在您的革命路线上。部队下山执行任务，就组织毛泽东思想宣传队，深入农村向维吾尔族贫下中农宣传您的伟大思想，和群众一起忆苦思甜，批判中国赫鲁晓夫，使农村出现了活学活用您的伟大思想的热潮。"},{"type":"paragraph","text":"毛主席啊，毛主席！在全国解放以后，您写下了“万方乐奏有于阗”的伟大诗句，这一诗句永远是对新疆各族人民的最大鼓舞，最大鞭策，最大期望。我们决心更高地举起您的伟大思想红旗，紧跟您的伟大战略部署，坚决执行以您为首的无产阶级司令部的一切战斗号令，和新疆各族革命人民团结在一起，在万方高奏您的革命路线伟大胜利的乐章中，迎接新疆维吾尔自治区革命委员会的早日诞生。DW：七二六六部队"}],"alias":""},"tags":[{"name":"新疆文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60d40e0a3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
