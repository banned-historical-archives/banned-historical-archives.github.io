art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让毛泽东思想占领一切思想阵地","authors":["炮兵某技术学院七中队全体同志"],"parts":[{"type":"paragraph","text":"十月一日，我们看见了敬爱的领袖毛主席。我们有多少知心话对他老人家讲，但我们什么都说不出来，只是一个劲儿地高呼：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"我们这些旧社会的苦孩子、放牛娃，今天能够站在天安门广场上，接受我们最高统帅毛主席的检阅，叫我们怎能不万分激动，怎能不淌下幸福的泪花！"},{"type":"paragraph","text":"几年来，由于贯彻执行了林彪副主席的指示，大力突出政治，大学毛主席著作，在“用”字上狠下功夫，狠抓世界观的改造，我们中队的各项工作都取得了一些成绩，连续三年被评为四好单位。我们深深感到：革命战士成长的过程就是用毛泽东思想武装自己头脑的过程。我们工作上的一切成就，都是毛泽东思想的胜利。"},{"type":"paragraph","text":"毛主席啊毛主席，我们一定紧紧跟着您，永远永远忠于您！一辈子做您的忠实战士，干一辈子革命，海枯石烂不变心！"},{"type":"paragraph","text":"我们一定要以抗大为榜样，把我们院校办成毛泽东思想的学校，一切工作都是为了转变我们的思想，真正让毛泽东思想完全占领一切思想阵地。"},{"type":"paragraph","text":"我们一定响应您的伟大号召，关心国家大事，把无产阶级文化大革命进行到底！我们一定要在您的英明领导下，发扬无产阶级硬骨头精神，经风雨，见世面，在阶级斗争的大风大浪中锻炼成长！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cbff048bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
