,"dates":[{"year":1967,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席亲自发动和领导的无产阶级文化大革命中，上海地区涌现了大量的档案、资料、文物、图书。这些材料应该及时收集，系统整理，统一保管，以便更好地宣传毛泽东思想，宣传毛主席革命路线的胜利；同时，也有助于总结历史经验，使文化大革命更加深入地开展。"},{"type":"paragraph","text":"现在，上海市档案局、上海市文物保管委员会、上海博物馆、上海图书馆等有关单位，根据中共中央、国务院、中央军委历次通知中关于加强文物、图书管理和保护工作的指示，联合成立了“上海市无产阶级文化大革命档案、资料、文物征集小组”，负责收集工作。收集的材料包括:能反映两个阶级、两条道路、两条路线斗争的正反面材料，如文告、函电文件、会议记录、手稿、大字报、海报、传单、报刊、小册子、大事记、运动史料等书面材料；在历次重大革命事件中出现的旗帜、标语、横幅、袖章、证章、纪念章、宣传工具、录音磁带等实物材料；群众活动和重大事件发生现场的照片，和以革命运动为主题的艺术创作，如绘画、版画等图片材料。"},{"type":"paragraph","text":"本市各区、县革命组织和革命群众提供材料和线索，可与“征集小组”联系，地址是上海博物馆七楼，电话:二八九○八○、二八○一六○—五。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d427c2b41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
