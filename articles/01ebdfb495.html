hors":[],"dates":[{"year":1956,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"甘南县移民骚动情况续志","type":"title"},{"text":"【新华社哈尔滨31日讯】嫩江、齐齐哈尔市和各县、市机关、部队、学校共抽调五千多名干部，在27日前分五批下乡，把甘南县骚动起来的四千五百多名山东移民阻挡回村。","type":"paragraph"},{"text":"在动员移民回村途中，嫩江专署公安处，非正式地逮捕了三十二个骚动的带头人，县公安局也捕了一批人。","type":"paragraph"},{"text":"现在干部正在乡下帮助移民返原籍，当地领导干部认为“可以向移民说，愿走者则走，愿留者则留。这样做，要比目前动员移民回村的做法在政治和经济上的损失要少一些”","type":"paragraph"},{"text":" （任永达）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1956年5月31日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01ebdfb495"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
