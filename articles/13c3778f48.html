查结论","authors":[],"dates":[{"year":1986,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"云南人民出版社关于错定蒋敏学同志为“反动分子”的复查结论","type":"title"},{"text":"蒋敏学 女 1921年生 湖南长沙人  家庭出身职员 本人成份学生 1953年参加工作 原系我社美术编辑 工资行政22级 现在我社美术编辑部工作。","type":"paragraph"},{"text":"1958年蒋敏学同志被错定为“反动分子”，受到留用察看的处分。1979年我社进行复查，中共云南省出版局党组批准，予以改正，恢复名誉、恢复原工资行政22级（56元）。现根据云办发（85）73号文件精神，再次进行复查，认为蒋敏学同志在1958年被定为“反动分子”是错误的，实属错定，应彻底改正。","type":"paragraph"},{"text":" 中共云南人民出版社委员会1986年8月20日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13c3778f48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
