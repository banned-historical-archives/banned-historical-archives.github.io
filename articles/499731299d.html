art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚持新闻工作的党性原则在制止动乱中发挥舆论引导作用电台电视台是党、政府和人民的喉舌，必须理直气壮地宣传四项基本原则，反对资产阶级自由化，抵制和克服形形色色的资产阶级新闻观点","authors":[],"parts":[{"type":"paragraph","text":"本报北京5月30日讯 为了坚决执行党中央、国务院关于迅速制止动乱、稳定局势的重大决策，做好广播电视宣传和其他各项工作，今天，广播电影电视部向所属各单位发出通知："},{"type":"paragraph","text":"一、要继续组织广大党员、干部认真学习李鹏、杨尚昆同志5月19日的重要讲话，认清形势，坚定地拥护党中央、国务院的决策，在思想上、行动上与中央保持高度一致。在这场关系到党和国家的命运和前途的严肃政治斗争中，每个党员和干部都要以自己的实际行动，立场坚定、旗帜鲜明地反对动乱、制止动乱，坚持四项基本原则，保证社会主义现代化事业的顺利进行。"},{"type":"paragraph","text":"二、广播电视是党、政府和人民的喉舌，作为国家电台、电视台必须理直气壮地宣传四项基本原则，反对资产阶级自由化，宣传党中央、国务院关于制止动乱的英明决策，揭露极少数人制造动乱，妄图否定共产党的领导，否定社会主义制度的阴谋，教育广大群众自觉维护安定团结的局面。要坚持新闻工作的党性原则，坚决抵制和克服形形色色的资产阶级新闻观点，在制止动乱中发挥舆论引导作用。"},{"type":"paragraph","text":"三、广播电影电视系统的所有工作人员都要坚守岗位，努力工作，遵守法纪，自觉维护安定团结的局面。在京单位的工作人员，必须严格执行国务院、北京市人民政府和戒严部队指挥部发布的各项命令和文告，不得参加游行、示威、请愿、罢课、罢工等活动。对亲属子女也应加强教育，不要参加上述活动。"},{"type":"paragraph","text":"四、提高警惕，加强电台、电视台和其他要害部位的安全保卫工作。要主动、热情地支持守卫电台、电视台的武警部队和解放军的工作，军民协力，确保电台、电视台的安全播音。"},{"type":"paragraph","text":"五、各级党组织、各级行政领导，要认真做好深入细致的思想政治工作，团结教育广大党员、群众，为迅速结束动乱做出贡献。在制止动乱、稳定局势中，共产党员要起先锋模范作用，党的组织要充分发挥核心领导和战斗堡垒作用。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"499731299d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
