tes":[{"year":1970,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海柴油机厂　张洪才　余彭年"},{"type":"paragraph","text":"当前，正在进行着一场保卫革命样板戏的尖锐的阶级斗争。这是一场关系到无产阶级能否占领文艺阵地的大问题，关系到无产阶级能否在上层建筑其中包括各个文化领域对资产阶级实行全面专政的大问题。面对这样一场严重的斗争，我们工人难道能不管吗?不，我们一定要管。"},{"type":"paragraph","text":"早在一百多年前，无产阶级的伟大导师马克思、恩格斯就在《共产党宣言》中庄严指出:无产阶级如果不炸毁旧上层建筑，“就不能抬起头来，挺起胸来”。今天，闪耀着毛泽东思想光辉的无产阶级的革命样板戏，在江青同志的亲自培育下，顶黑风、战恶浪，千锤百炼、精益求精，终于使无产阶级在舞台上抬起了头，挺起了胸。一个个无产阶级的英雄形象巍然屹立，光照四方。我们工人多么喜爱革命样板戏呵!英雄的形象是我们学习的榜样，英雄的精神鼓舞着我们前进。我们把革命样板戏看作是继续革命的巨大动力，战斗的有力武器，是无产阶级对资产阶级实行全面专政的伟大胜利，是毛主席革命文艺路线的伟大胜利!"},{"type":"paragraph","text":"可是，现在竟有那么一些人，打着什么“宣传”革命样板戏的旗号，以“讲革命故事”为幌子，大肆贩卖封、资、修的黑货，肆意破坏革命样板戏，这是在新的形势下资产阶级向我们进攻的新形式。在经过了三年多无产阶级文化大革命的今天，资产阶级要在什么地方公开的演出帝王将相、才子佳人，已经不行了，于是，他们便采用“偷梁换柱”的手法以达到复辟旧势力的目的。这一事实严肃地告诉我们:“陈旧的东西总是企图在新生的形式中得到恢复和巩固。”因此，我们决不能等闲视之。"},{"type":"paragraph","text":"我们在厂里有时也听到这样一种说法:我们不是文艺单位，文艺界的斗争可以少管管。这种说法是完全错误的。意识形态领域里的阶级斗争从来是不以行业来划分的，资产阶级的思想决不会因为你不是搞文艺就不来向你进攻。桑伟川公开跳出来为资产阶级翻案、极少数的旧艺人肆意歪曲革命样板戏的事实不是很好的教训吗?在我们厂里，就曾经来过一个所谓“业余宣传队”，他们以演出现代戏为名，肆意歪曲工农兵的形象，当时就遭到了我厂广大工人的严肃批判。这就充分说明了，保卫革命样板戏，批判周扬等“四条汉子”，根本不单纯是文艺界的事。如果我们丧失警惕，只抓生产，不管思想文化领域里的阶级斗争，只捏鎯头，不抓笔头，那么，就会把毒草认作香花，被资产阶级思想腐蚀，以至中了毒还叫好，这样，资产阶级就会复辟，我们的国家就要改变颜色，到那时，我们生产的东西再多，也只能是在为资产阶级创造财富。因此，我们对于当前正在展开的这场保卫革命样板戏的斗争，决不能袖手旁观，必须挺身而出，坚决击退资产阶级在思想文化领域中的进攻。我们要一手拿鎯头，一手拿笔头，既要搞生产，“也要批判资产阶级”，把上层建筑领域的斗、批、改进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f9f29d918"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
