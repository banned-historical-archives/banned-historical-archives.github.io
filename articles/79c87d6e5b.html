s":[],"dates":[{"year":1970,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在美帝和本国大庄园主、大资产阶级压榨下"},{"type":"paragraph","text":"拉美劳动人民生活不如牛马"},{"type":"paragraph","text":"据新华社讯　在美帝国主义和本国大庄园主、大资产阶级的残酷掠夺和压榨下，越来越多的拉丁美洲劳动人民被迫拥进了暗无天日的贫民窟，过着牛马不如的生活。这种非人的生活，正在激起他们越来越强烈的反抗。"},{"type":"paragraph","text":"在绝大多数拉美国家的首都和其他大、中、小城市，都可以看到许多破烂不堪的贫民窟，与那些豪华的摩天大楼和花园别墅形成鲜明的对比，成为拉丁美洲贫富两极分化的活生生的写照。据报道，巴西重要城市里约热内卢有一百二十万人住贫民窟，占全市人口的四分之一。阿根廷首都布宜诺斯艾利斯市和它附近地区，约二百五十万人住在贫民窟里，占全国人口十分之一以上。哥伦比亚一个十五万人口的省会蒙特里亚市，贫民窟居民竟高达五万人。"},{"type":"paragraph","text":"美帝直接统治下的殖民地波多黎各，三分之一的城市人口住在贫民窟里。墨西哥首都墨西哥城自一九六○年以来，贫民区居民增加了五倍。委内瑞拉每年约十万贫苦农民流入城市，住进贫民窟。在拉美其它绝大多数国家都有这样的情况，有些国家的情况甚至更严重。"},{"type":"paragraph","text":"拉美许多国家的反动当局经常借“美化市容”为名，出动大批军警，武力占领和强行拆除这些贫民窟，甚至放火烧房，使得成千上万的贫苦居民流离颠沛，露宿街头。"},{"type":"paragraph","text":"居住在贫民窟的拉丁美洲劳动人民越来越认识到，美帝国主义和本国反动派是造成他们苦难生活的罪魁祸首。近几年来，贫民窟的劳苦居民不断展开争取生存权利的斗争。（附图片）"},{"type":"paragraph","text":"图为智利的贫民窟，房屋破旧，摇摇欲坠。无处安身的劳动人民就在这种环境中度日。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79c87d6e5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
