营团结和发展两国的友好合作问题广泛地交换了意见","authors":[],"dates":[{"year":1958,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社武汉6日电】　毛泽东主席和金日成首相今天晚间在武汉市举行了会谈。"},{"type":"paragraph","text":"朝鲜方面参加会谈的，有朴正爱、南日、李一卿同志。"},{"type":"paragraph","text":"中国方面参加会谈的，有刘少奇、周恩来、陈毅同志。"},{"type":"paragraph","text":"在会谈中，双方对目前国际形势、进一步加强社会主义阵营的团结和进一步发展两国的友好合作问题广泛地交换了意见。会谈是在诚挚亲切的气氛中进行的。双方对于所讨论的各项问题取得了完全一致的意见。"},{"type":"paragraph","text":"会谈以后，毛泽东主席和金日成首相等共进晚餐。"},{"type":"paragraph","text":"【据新华社武汉6日电】　金日成首相和朴正爱、南日、李一卿同志今晚同毛泽东主席和刘少奇、周恩来、陈毅同志一起，会见了出席湖北省第二届人民代表大会第一次会议的全体代表和出席中国人民解放军驻武汉空军部队党委扩大会议的全体代表，以及湖北省共青团地、县委书记。"},{"type":"paragraph","text":"会见以后，金日成首相和毛泽东主席等出席了晚会，观看了著名京剧演员俞振飞、李玉茹、言慧珠、张美娟等演出的京剧。"},{"type":"paragraph","text":"【新华社武汉6日电】　金日成首相和朝鲜政府代表团的贵宾今天上午11时30分由陈毅副总理等陪同，从上海乘专机来武汉向毛主席辞行并举行会谈。"},{"type":"paragraph","text":"金日成首相和朝鲜贵宾在武汉机场受到了在这里的国务院总理、中共中央副主席周恩来，国务院副总理、中共中央副主席陈云等同志的热情欢迎。"},{"type":"paragraph","text":"到机场欢迎的还有在这里的中共中央政治局委员彭真、贺龙、李先念，政治局候补委员张闻天，中共中央书记处候补书记杨尚昆，中共中央委员廖承志、聂荣臻、杨秀峰、钱瑛，中共中央候补委员杨得志、杨成武、杨勇、章汉夫。"},{"type":"paragraph","text":"湖北省省长、中共湖北省委书记处书记张体学，武汉市市长刘惠农，中共武汉市委第一书记宋侃夫和中国人民解放军驻武汉部队首长陈再道上将等也到机场欢迎。"},{"type":"paragraph","text":"武汉市少年儿童向金日成首相和贵宾们献了鲜花。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bde572359"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
