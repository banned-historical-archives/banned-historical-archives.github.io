script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对中央军委工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"对中央军委工作报告的批语"},{"type":"paragraph","text":"（1962年8月18日）"},{"type":"paragraph","text":"发各同志？。我们的军队，我们的人民，我们的党，我们的政府，总之，党、政、军、民，都是很好的，是天下无敌的。看不出这一个本质，就是机会主义者。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十八日"},{"type":"paragraph","text":"[1]指中共中央军委1962年8月10日关于军委5月至7月的工作情况给党中央、毛泽东的报告。报告说，这3个月军事工作的主要内容是：（一）采取紧急措施，准备粉碎美蒋匪帮对我东南沿海的可能进犯；（二）在中印边境西段，同印度的蚕食政策进行针锋相对的斗争；（三）提前进行1962年度的征兵工作。在5月下旬至6月中旬的紧急备战中，部队士气高昂，各参战部队都做到了“一声令下，立即出动”，党政机关密切配合，全力支援，人民群众积极支前，团结对敌。以上工作现在均已大体告一段落。"},{"type":"paragraph","text":"[2]指中共中央政治局常委毛泽东、刘少奇、周恩来、朱德、陈云、邓小平、林彪和中央书记处书记彭真、中央书记处候补书记杨尚昆。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":218,"page_end":218},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6f4717a46"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
