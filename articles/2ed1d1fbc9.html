script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"建德县革命委员会用毛泽东思想实行一元化领导  狠抓思想革命化　建设战斗指挥部  注意倾听群众的声音，集中正确的意见坚持下去","authors":[],"dates":[{"year":1969,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"建德县革命委员会用毛泽东思想实行一元化领导"},{"type":"paragraph","text":"狠抓思想革命化　建设战斗指挥部"},{"type":"paragraph","text":"注意倾听群众的声音，集中正确的意见坚持下去"},{"type":"paragraph","text":"据新华社杭州电　浙江建德县革命委员会遵循伟大领袖毛主席“革命委员会要实行一元化的领导”的教导，认真用毛泽东思想统帅一切，狠抓革委会成员的思想革命化，使革委会成为革命化的密切联系群众的战斗指挥部。"},{"type":"paragraph","text":"怎样才能做到用毛泽东思想统帅一切，切实做到毛主席说的统一认识，统一政策，统一计划，统一指挥，统一行动。建德县革委会领导成员深深体会到：要做到五个“统一”，首先要思想统一。这个县的革委会在去年春天成立后，参加“三结合”的军队代表为了把三股力量拧成一股绳，遵循毛主席“掌握思想教育，是团结全党进行伟大政治斗争的中心环节”的教导，组织县革委会成员到全县活学活用毛泽东思想先进单位下涯公社黄饶大队去办了一期毛泽东思想学习班。革委会全体成员背起铺盖，步行三十多里来到黄饶大队，和贫下中农同学习、同批判、同吃住、同劳动。在黄饶大队贫下中农活学活用毛泽东思想的先进事迹推动下，他们反复学习了毛主席的《在中国共产党第七届中央委员会第二次全体会议上的报告》和林副主席的指示：“离开世界观的改造，就不能很好地增强党性锻炼。”全体成员受到了深刻的教育，他们以“斗私，批修”为纲，自觉地检查了一切不符合毛泽东思想的错误思想。革委会常委中一位革命领导干部，原来工作不够大胆。通过学习，他认识到，执行毛主席的无产阶级革命路线，应当“敢”字当头，这是自己忠于毛主席，忠于毛泽东思想，忠于毛主席无产阶级革命路线的一个具体表现。一些革命群众代表也表示要克服资产阶级派性的残余，用毛泽东思想掌好权、用好权，坚决维护革委会的一元化领导。"},{"type":"paragraph","text":"思想统一了，革委会内步调一致，胜利地领导全县革命群众进行斗、批、改和抓革命、促生产等各项工作。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“党内不同思想的对立和斗争是经常发生的，这是社会的阶级矛盾和新旧事物的矛盾在党内的反映。党内如果没有矛盾和解决矛盾的思想斗争，党的生命也就停止了。”建德县革委会遵照毛主席这一教导，开展积极的思想斗争，运用批评和自我批评这个武器，经常扫除不符合毛泽东思想的政治灰尘。去年，社会上一小撮阶级敌人不甘心灭亡，千方百计挑动分裂，制造混乱，以达到其破坏文化大革命的罪恶目的。县革委会为了更好地同阶级敌人进行斗争，立即举办毛泽东思想学习班，组织大家认真学习毛主席《反对自由主义》和关于民主集中制的教导，并且积极开展批评和自我批评，使革委会成员在毛泽东思想的原则基础上保持团结一致。在学习中，大家用明察秋毫的毛泽东思想分析了当前阶级斗争和两条路线斗争的新形势、新动向，使革委会全体成员提高了两条路线斗争觉悟，自觉地捍卫毛主席的无产阶级革命路线，维护革委会用毛泽东思想掌好权、用好权，实行一元化的领导。"},{"type":"paragraph","text":"建德县革委会在实现一元化领导的过程中，十分注意倾听群众的声音，充分发扬民主，把群众中符合毛泽东思想的正确意见集中起来，再贯彻到群众中去。去年十月，毛主席关于干部下放劳动的最新指示发表以后，县革委会连夜学习、讨论，第二天又举办了落实毛主席最新指示的学习班。当时有的人主张马上就下放干部，有的人主张等一等，还有些同志把干部下放劳动当作“丢包袱”，认为机关干部不好安置，这一下可有出路了。革委会成员就这些不同认识、不同意见，展开了热烈的讨论，大家以毛主席的最新指示为武器，狠揭猛批叛徒、内奸、工贼刘少奇反对和破坏干部参加集体生产劳动的反革命罪行。同时县革委会成员又分头深入群众，和广大革命干部一起学习毛主席最新指示，集中群众的正确意见。通过学习、批判和争论，最后在毛泽东思想的基础上统一了认识，对下放干部的问题作出了安排。去年十二月，毛主席关于知识青年到农村去接受贫下中农再教育的最新指示发表后，建德县革委会成员又分别深入到工人、贫下中农和知识青年中去，集中群众正确意见，不折不扣地贯彻执行。全县过去三年的应届初、高中毕业生和社会知识青年两千六百多人，除少数年龄小或有病的以外，已全部到农村安家落户，成为浙江全省动员知识青年到农村去的工作做得最快最好的一个县。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ed1d1fbc9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
