" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海黨員幹部討論毛主席講話時流露出相當大的抵觸情緒","authors":[],"dates":[{"year":1957,"month":4,"day":25}],"is_range_date":false,"parts":[{"text":"上海党员干部讨论毛主席讲话时流露出相当大的抵触情绪","type":"title"},{"text":"新华社上海２５日讯：上海市机关科、处长级党员干部在讨论毛主席关于正确处理人民内部矛盾问题的讲话中，流露出相当大的抵触情绪。","type":"paragraph"},{"text":"一、对毛主席这次报告没有先党内后党外，而是党内外一起来，大有意见。有人认为这是党内政治生活不正常的表现，民主党派成员反比党员早听到报告，是否因知识分子会闹所以才这样做的。上海电影製片厂一个党员处长说，我们现在是靠小广播过日子，像赫鲁晓夫批判斯大林的报告，民主人士都知道了，党员还不晓得。","type":"paragraph"},{"text":"交通部门有的党员认为毛主席的报告批评了古今中外的人物，批评了斯大林、赫鲁晓夫，又批评了匈牙利，会影响国际关係和苏联的国际威望。怀疑毛主席有骄傲自满情绪。","type":"paragraph"},{"text":"二、对“放”有三怕，一怕放了会出乱子；二怕放了以后老一套的工作方法吃不开，事情不好办，又怕反官僚主义反到自己头上，下不了台；三怕自己水平低，跟不上去。有人要求提高一下再“放”。青年团的干部提出放要有五个条件：有领导、有准备，有计划，有控制，有范围。","type":"paragraph"},{"text":"有的要求领导给个底，这次“放”，下一步干什麽，否则明年整起风来吃不消。","type":"paragraph"},{"text":"最近有一个区召开政协会，大家发表意见很热烈，区委书记著急了，怕无法收场，于是出了个“点子”，请大家发言要有事实根据，结果第二天会场上冷冷清清，大家不讲话了。","type":"paragraph"},{"text":"三、有人感慨现在老干部不如新干部，老革命不如新革命，说井岗山时代的驴子现在还要喂喂粮食，老干部也要照顾照顾。","type":"paragraph"},{"text":"有人提出党内也要“放”，希望党内办一张报纸，什麽意见都可以在上面发表。","type":"paragraph"},{"text":"目前干部讨论中情况比较好的是少数。","type":"paragraph"},{"text":"党内干部这种抵触情绪，党外人士也已觉察到，复旦大学教授张孟闻对上海市委书记处书记魏文伯说：“光开我们的会还不行，你们党内也要谈谈”。（杨瑛）","type":"paragraph"},{"text":"新华通讯社编：《内部参攷》，第2188期，1957年4月25日.","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"688ed33b93"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
