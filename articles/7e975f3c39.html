script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"关于经学问题给范文澜的信","description":"根据手稿刊印。","dates":[{"year":1940,"month":9,"day":5}],"parts":[{"text":"关于经学问题给范文澜的信","type":"title"},{"type":"appellation","text":"文澜同志："},{"type":"paragraph","text":"提纲读了，十分高兴，倘能写出来，必有大益，因为用马克思主义清算经学这是头一次，因为目前大地主大资产阶级的复古反动十分猖獗，目前思想斗争的第一任务就是反对这种反动。你的历史学工作继续下去，对这一斗争必有大的影响。第三次讲演因病没有听到，不知对康、梁、章、胡的错误一面有所批判否？不知涉及廖平、吴虞、叶德辉等人否？越对这些近人有所批判，越能在学术界发生影响。"},{"type":"paragraph","text":"我对历史完全无研究，倘能因你的研究学得一点，深为幸事。致以敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月五日"}],"comment_pivots":[{"part_idx":0,"offset":10,"index":1},{"part_idx":2,"offset":2,"index":2},{"part_idx":2,"offset":127,"index":3},{"part_idx":2,"offset":151,"index":4}],"is_range_date":false,"authors":["毛泽东"],"comments":["范文澜（一八九三——一九六九），浙江绍兴人。当时任延安马列学院历史研究室主任。","指范文澜一九四○年在延安新哲学会年会上关于中国经学简史的讲演提纲。这个提纲后经整理于同年连续发表在延安《中国文化》第二卷第二、第三期上，题为《中国经学史的演变》。","康、梁、章、胡，指康有为（一八五八——一九二七，广东南海人）、梁启超、章炳麟、胡适。他们都是在近代中国经学史和思想史上有重大影响的学者。","廖平（一八五二——一九三二），四川井研人，中国近代经学家。吴虞（一八七一——一九四九），四川新繁（今属新都）人，五四运动前后曾写文章批判旧礼教，后来很少发表新见。叶德辉（一八六四——一九二七），湖南湘潭人，是维护封建统治的古文学者。"],"page_start":309,"page_end":309,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"范文澜","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e975f3c39"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
