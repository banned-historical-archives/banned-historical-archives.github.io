s":["康生"],"dates":[{"year":1966,"month":7,"day":27}],"is_range_date":false,"parts":[{"text":"康生在北京大学革命师生大会上的讲话","type":"title"},{"text":"康生","type":"authors"},{"text":"我同意小组长（陈伯达同志）的建议，不知同志们怎样？我们只是一个建议（指撤张承先），不是要强加于你们。赞成否，权力不在我们，在你们大家。……","type":"paragraph"},{"text":"昨天我们调查过，张承先的最大错误：（1）不能使同学们意识到北大革命由革命师生来进行，不相信群众，不走群众路线；（2）一个全校的文化革命委员会都没有组织起来，工作组包办代替了工作，组织上都犯了严重的错误。为什么不依靠同学们进行文化大革命呢？","type":"paragraph"},{"text":"张承先的路线错误完全违反了毛主席思想。成立文化革命委员会必须高举毛泽东思想红旗，离开了群众是不好的……我们是人民的勤务员。放手发动群众，把文化大革命进行到底！……","type":"paragraph"},{"text":"文化革命委员会的工作方向：","type":"paragraph"},{"text":"接班人的五个条件，不仅是接什么的问题，而且是放之四海而皆准的真理，关键在于能否真正把革命力量组织起来。","type":"paragraph"},{"text":"你们了解北大情况，改教材改学制，都要靠你们！……","type":"paragraph"}],"comments":[],"origin":"一九六六年十月中央教育部八•一八红卫兵总部编印《无产阶级文化大革命运动期间中央及有关负责同志讲话（选编 ）》（第一集）；《文化大革命研究资料（上册）》（北京：中国人民解放军国防大学党史党建政工教研室，1988年10月）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d97eff6e9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
