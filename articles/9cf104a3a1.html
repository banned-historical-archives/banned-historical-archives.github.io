art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见美国专栏作家蔡尔兹和夫人"},{"type":"paragraph","text":"国务院副总理邓小平二十五日上午会见美国专栏作家马奎斯·威廉·蔡尔兹和夫人。七十五岁的蔡尔兹先生和夫人是第二次来中国访问。会见时，邓小平副总理同他们进行了友好的谈话，并回答了他们提出的问题。"},{"type":"paragraph","text":"李先念副总理会见科威特政府代表团"},{"type":"paragraph","text":"国务院副总理李先念二十五日下午会见由科威特住房大臣哈马德·穆巴拉克·阿亚尔率领的科威特政府代表团，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"黄华外长电贺不结盟国家外长会议召开"},{"type":"paragraph","text":"黄华外长七月二十四日打电报祝贺不结盟国家外长会议的召开。电报说，许多年来，不结盟运动坚持反对帝国主义、反对新老殖民主义、反对霸权主义，反对一切形式的外国统治，在国际事务中起着日益重大的作用。中国政府和中国人民坚决支持不结盟国家所奉行的独立自主、维护和平和不结盟的政策，坚决支持它们反帝、反殖、反霸和反对一切形式的外国统治的正义斗争。同广大的第三世界国家和人民一样，中国人民坚信不结盟运动将在反对外来干涉和反对分裂的斗争中继续团结前进。我们衷心希望这次会议将为促进第三世界团结，为反对帝国主义、新老殖民主义、种族主义、犹太复国主义和霸权主义的斗争作出积极贡献。预祝会议成功。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cf104a3a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
