团员的几点意见","authors":[],"dates":[{"year":1958,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"共青团上海市委关于在整风、整团中处理犯有各种错误的团员的几点意见","type":"title"},{"text":"共青团是先进青年的组织，对于犯有各种错误的团员，基本上可以参照党对犯有各种错误的党员的处理原则进行处理，但是应该比党员稍放宽一些（指对不开除团籍留在团内给予组织处分的团员的掌握上）应该更着重于教育。在处理时既要坚持团的原则，严肃、慎重，又要实事求是，区别对待。首先必须严格划清敌我问题和团内是非问题的界限。对于混入团内的政治上的敌对分子必须坚决清除出团。但对其他犯有各种错误，不是敌对分子的团员，应看到青年人正在处在成长时期，缺乏政治经验，一般说来，更是比较容易犯错误的，但是在团组织能够帮助他真正从思想上认识到自己错误的时候，他们也是比较容易改正错误的。因此，必须按照“思想批判从严、组织处理从宽”的精神，并深入、全面、具体地分析团员所犯错误的情节、原因及时对待错误的态度，实事求是地进行处理。","type":"paragraph"}],"comments":[],"origin":"上海市档案馆，C21-1-629，第23-25张。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c6242fef2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
