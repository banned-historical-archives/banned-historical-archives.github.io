,"dates":[{"year":1985,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社广州一月二十日电　(记者张才龙)杀害彭湃烈士侄儿彭科的凶手洪桂文今天在海丰县被依法处决。"},{"type":"paragraph","text":"罪犯洪桂文，捕前任海丰县马宫供销社长新站站长。“文革”期间，海丰县掀起一股反彭湃烈士的逆风，彭湃的亲属和大批干部群众遭到残酷迫害。一九六七年八月二十九日下午四时左右，进山躲避的彭科在海丰县将军帽山沟的石壁下被搜山坏人用枪击伤，躺倒在乱石滩上。洪桂文知道后，从山上冲下山沟，用砍竹刀对准彭科的喉颈猛砍六、七刀，并将头割下。"},{"type":"paragraph","text":"一九七八年六月，彭科的亲属向有关部门反映了洪桂文等人的杀人行径，要求予以严惩。一九八四年八月十六日，海丰县人民法院将全案事实查清，以故意杀人罪依法判处洪桂文死刑，剥夺政治权利终身。现经广东省高级人民法院核准，依法执行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"410ff41ff8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
