art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国文化大革命拔掉了修正主义根子","authors":[],"parts":[{"type":"paragraph","text":"新华社加德满都五日电 尼泊尔朋友热烈赞扬毛主席亲自发动和领导的中国无产阶级文化大革命好得很。"},{"type":"paragraph","text":"一个名叫普拉德汉的学生对新华社记者说：“无产阶级文化革命拔掉了中国的修正主义根子，使得中国不会改变颜色，这是正在为反对帝国主义和殖民主义而斗争的世界人民的大喜事。”他说：“毛泽东主席是当代最伟大、最英明的领袖。只有在毛主席领导下的中国才能发动这样的无产阶级文化大革命。”"},{"type":"paragraph","text":"一位新闻工作者说：“帝国主义和修正主义恶毒地诬蔑中国的无产阶级文化大革命，这恰好证明，无产阶级文化大革命好得很。”他接着指出：“毛主席说：‘捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑，他们决不会违背这个逻辑的。’帝国主义和现代修正主义要在中国实行‘和和平演变’，而文化大革命粉碎了帝国主义和现代修正主义的痴心妄想。这就是帝国主义和现代修正主义诬蔑文化大革命的原因。”"},{"type":"paragraph","text":"一位名叫沙尔玛的青年说：“毛主席说：‘凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对。’帝国主义和现代修正主义反对中国的无产阶级文化大革命。我们——中国的朋友和世界一切爱好和平的人民，却完全支持无产阶级文化大革命。”"},{"type":"paragraph","text":"一个学生在看了红卫兵的图片后说：“红卫兵为自己祖国和人民做了许多好事。他们的行动是革命的行动。”"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34fd5ac31a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
