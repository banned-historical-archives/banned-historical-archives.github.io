ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"加厚对北平东南的阻击兵方","alias":"","parts":[{"type":"paragraph","text":"加厚对北平东南的阻击兵力!"},{"type":"paragraph","text":"（1948年12月15日）林、罗、刘："},{"type":"paragraph","text":"十四日各电?均悉。（一）三纵、十纵已插到北平以南及铁路上甚好。六纵现至何处？我们认为六纵仍应使用于北平以南铁路线上，加厚对北平东南的阻击兵力，以防北平敌人集中全力（十八个师）向天津突逃。（二）宛平3之敌是一○一军两个师，均地方保安部队编成，由保定撤回者。我们认为你们既已令五纵、十一纵包围该敌，即应令该两纵迅速歼灭该敌，然后转至北平东南，加厚该方兵力，以便将来攻击天津时，能从北平东南抽出一部力量。此点请"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]指1948年12月14日11时和20时林彪、罗荣桓、刘亚楼给中共中央军委等的电报。前电说，东北野战军第三纵、十纵昨今两日已陆续到达北平、通县以南，廊坊以北地区。我在平津间、廊坊以北地区，数日内可达5个纵队（含华北第七纵），粮草需要量甚大，盼令固安、永清、霸县等地设法分担部分供应。后电说，由于我三纵、十纵本日已插到北平以南及铁路上，尚未发现敌人撤退，故已改令五纵、十一纵包围宛平之敌。酌办。华北七纵在程黄\"歼灭宛平之敌后，可移至宛平地区防守。以上请酌办。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十五日二时[1]程黄，指程子华、黄志勇，当时分别任东北野战军第二兵团司令员"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":402,"page_end":403},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34a762d164"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
