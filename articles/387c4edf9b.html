<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关于对小农经济进行社会主义改造问题——学习斯大林“论国家工业化与联共(布)党内的左倾”笔记之二","authors":[],"dates":[{"year":1953,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"斯大林在这篇讲演中是那样深刻地分析了当前苏联的内部条件，出内部条件要恭贺联以很快的速度去发展工业。因为当时作为整个国民经济主脑的工业比得还很少，而农业技术和农业耕作方法还很落后，散漫零碎的小生产者及其非常落后的生产在当时的数量还是很大，就使社会主义大工业和这些小生产比较起来有如大海中的一个岛屿。而苏维埃政权和社会主义建设却不能无止境地过于长期地依靠这两上不同的基础:即一方面依靠最大的统一的社会主义工业，另一方面依靠最零散和落后的小商品生产的农民经济。因此，就必须依靠工业这把钥匙，在这把钥匙帮助之下，改造落的的零散的农业，把农业推进到新技术的基础和大生产的基础上去，引导它接近社会主义的工业。不根据社会主义公有制的原则，把工业与农业结合起来“不把这两个经济部门结合起来，便不能有什么社会主义。”(斯大林:在联共(布)第十四次代表大会上关于中央政治工作的总结报告)"},{"type":"paragraph","text":"首先我们必须了解工业与农业的正确关系，斯大林指出:“如果工业是主脑，那末农业就是工业底基础。”这样，只有农业随着工业底发展而发展了，才可能为销售工业品开拓出广大的市场，也才可能供给工业更多的原料和粮食。而且，在工业发展的初期，出口货的主要来源就是农产品。有了出口货，才可以输入机器供给国民经济的需要。如果农业的发展过度落后于工业的发展，就要影响工业的发展，斯大林在这篇讲演中所提出的“谷物问题”，正是由于当时恭贺联蒸日上的城市和工业区域对商品粮食的需要急剧地增加了，而农业的发展却过度落后，不能适应工业的需要。当然，要改善这种情况，决不能是把工业发展的速度降低到农业发展的速度，需是要提高农业发展的速度，不解决这个问题，社会主义的城市与小农的乡村之间就不可避免地要发生破裂。要解决这个问题，工业对农业就要起积极的领导作用，工业就要供给农业以必要的生产资料和工具，这就是说，要依靠重工业替改进农业技术制造 出大量的拖拉机、联合收割机和其他现代农业机器，有了这些才谈得上农业的改造、技术的提高、生产的增进，才有可能使农业走上社会主义的道路。这也意味着只有农业电气化、农业生产力的大大的提高，才可能引起在农业方面的生产关系的变化，在使用机器的大规模，耕种的基础上，才会有集体农场的社会 主义的集体所有制。"},{"type":"paragraph","text":"要依靠小农经济来建设社会主义，这是绝对不可能的，因为散漫的小农经济底发展前途，不是走向资本主义的道路，就是走向社会主义的道路。没有工人阶级对农民的领导，没有社会主义的工业对农业的领导，小农经济自发的趋势，就要引起农民阶级的分化，少数人的富有和大多数农民的贫困，就要走向资本主义。因此，必须以很快的速度去发展工业的重大意义时，他引证列宁的教言:“我们现在还生存在小农国家中，在俄国资本主义比共产主义有更坚固的经济基础。……国内敌人牢守着小经济，要铲除它只有一种方法，就是把全国经济(农业也在内)转移到新的技术基础上，转移到现代大生产的技术基础上去”。否则，“那末无论如何都不可避免地将恢复到资本主义去”。是的，也只有这样，才是使农民从贫穷中摆脱出来的基本道路，才能有真正巩固的工农联盟。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"387c4edf9b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
