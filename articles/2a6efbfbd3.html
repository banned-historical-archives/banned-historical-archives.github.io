art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英李先念彭真等电唁何贤逝世","authors":[],"parts":[{"type":"paragraph","text":"新华社香港12月8日电 叶剑英同志发来唁电，对全国人大常委会委员、港澳知名人士何贤不幸逝世表示深切哀悼。"},{"type":"paragraph","text":"新华社香港12月8日电 李先念主席、彭真委员长和全国人大常委会、政协全国委员会相继发来唁电，对全国人大常委会委员、港澳知名人士何贤于6日不幸逝世表示哀悼。这些唁电赞扬何贤一贯热爱祖国，热爱家乡，关心祖国统一和四化建设。"},{"type":"paragraph","text":"发来唁电的领导人还有习仲勋、杨尚尾、姬鹏飞、康克清等。中共中央统战部、国务院港澳办公室、国务院侨务办公室以及全国工商联也发来了唁电。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a6efbfbd3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
