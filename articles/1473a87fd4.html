":1971,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在党的“九大”团结、胜利路线指引下，各级党委和广大党员遵照毛主席的教导，正在深入进行思想和政治路线方面的教育，认真学习和总结加强党的领导的经验。图为北京第二机床厂党委成员在学习中央两报一刊社论《总结加强党的领导的经验》。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海第一印染厂工人遵照毛主席关于“一切产品，不但求数量多，而且求质量好，耐穿耐用”的教导，一九七一年以来采取了请进来、走出去、站柜台、搞展销、开座谈会等方法进行调查研究，广泛征求工农兵群众意见，提高了印染花布的质量，增加了花色品种。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e鞍钢工人把学习和革命大批判结合起来，不断提高执行毛主席革命路线的自觉性。这是鞍钢第一炼钢厂平炉车间青年突击队的工人在批判刘少奇一类骗子散布的所谓在发展钢铁工业中要“抓中间带两头”等修正主义谬论。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在毛主席关于“鼓足干劲，力争上游，多快好省地建设社会主义”总路线和一整套两条腿走路的方针指引下，我国地方工业蓬勃发展。云南省昆明钢铁厂的罗茨铁矿开采大量矿石，有力地支援了本厂的生产。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在毛主席革命路线指引下，我国粮食连续十年获得了丰收，初步改变了南粮北调的局面。一九七○年冀鲁豫三省的粮食达到了初步自给。这是一九七一年粮食平均亩产跨《纲要》的河南省郑州市郊区花园口公社的社员在用电动脱粒机打稻。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中共湖南省衡东县委坚持唯物论的认识论，经常深入实际调查研究，落实党的政策，促进了革命和生产的发展。这是县委常委的同志们在大沅渡公社杨梓大队向干部和社员调查林业政策的落实情况。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e山西省柳林县贫下中农和社员群众，以大寨为榜样，治山治沟，大搞农田基本建设，仅一九七一年一年全县就修梯田八万多亩，农业生产取得了大幅度增产。这是这个县的韩家峪大队修建的水平梯田。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060108.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中国人民解放军广大指战员认真落实毛主席的建军路线，正确处理政治和军事的关系，结合实战要求苦练杀敌本领，不断提高训练质量。这是四八○○部队某部“英雄营”指战员在进行军事训练。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cu060109.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e甘肃省甘南藏族自治州碌曲县贡巴大队党支部书记才让卓玛，努力学习毛泽东思想，理论联系实际，认真贯彻执行毛主席革命路线，受到藏族贫下中牧的好评。这是才让卓玛(右)和大队党支部副书记杨旦共同勘察草原，规划大队牧业生产发展的远景。　(本版照片均新华社稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1971,"month":12,"day":30}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席的革命路线胜利前进","authors":[],"parts":[{"type":"paragraph","text":"武汉部队某团党委，遵照毛主席关于“认真看书学习，弄通马克思主义”的教导，认真读马、列的书，读毛主席的书，不断提高路线斗争觉悟，增强识别真假马克思主义的能力。这是团党委成员在一起交流读书的体会。"},{"type":"paragraph","text":"南京部队装甲兵某部四连，以《国际歌》和《三大纪律八项注意》歌为重要教材，进行思想和政治路线方面的教育，努力学唱和实践两首歌，提高执行毛主席革命路线的自觉性。"},{"type":"paragraph","text":"空军某部九连党支部，组织干部战士深入开展革命大批判，狠批刘少奇一类骗子的“阶级斗争熄灭论”、“唯心论的先验论”等反动谬论。"},{"type":"paragraph","text":"新疆部队某部抓紧冬季大好时机进行野营训练，练思想，练作风，练技术，培养部队一不怕苦、二不怕死的革命精神，切实做好战备工作。"},{"type":"paragraph","text":"成都铁路分局绵阳工务段党委书记、革委会军队代表王朝海，谦虚谨慎，戒骄戒躁，虚心向地方干部和群众学习，进一步增强了干群团结和军民团结。这是他在向老工人学习生产技术。"},{"type":"paragraph","text":"海军某潜艇指战员，坚持官兵一致的原则，开展尊干爱兵活动，干部战士互相关心，互相爱护，互相帮助。这是鱼雷长张广祥和战士一起一面劳动一面谈心。"},{"type":"paragraph","text":"沈阳部队某部指战员在完成各项政治任务和战备任务的同时，发扬自力更生、艰苦奋斗的革命精神，积极开荒生产，粮食连年获得好收成，支援了社会主义建设。这是他们正在装运丰收的粮食。"},{"type":"paragraph","text":"福建前线军民牢记毛主席关于“提高警惕，保卫祖国”的教导，积极开展军事训练，不断提高战斗力，随时准备消灭敢于来犯之敌！"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1473a87fd4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
