ear":1961,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"辽宁大学历史系世界古代中世纪史教研室，就束世澂在有关从奴隶制向封建制过渡的规律问题上所提出的论点，发表了不同的意见(见《历史研究》本年第一期)。"},{"type":"paragraph","text":"该教研室不同意束世澂把早期奴隶制和古典奴隶制当作两种截然不同的类型，也不同意“星期奴隶制是不向发达的奴隶制发展的，它的自发的发展方向是封建制”这一说法。该教研室认为，在东方的封建国家中，奴隶制关系长期地残留在封建制的机体里，但这只是东方奴隶制瓦解得不充分的结果，决不能说“在古代东方不曾有过奴隶制崩溃”，也不能说古代东方的奴隶制“没有成为社会前进的阻碍物”。该教研室还认为:“当封建的生产方式因素——隶农制，在奴隶制社会内部孕育起来的时候，旧的生产关系成为束缚新的生产力发展的桎梏的时候，必然要导致社会革命，这才是由奴隶制过渡到封建制的根本原因，从古典奴隶制到封建制恰好是这种革命过程的范例。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f76dc95ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
