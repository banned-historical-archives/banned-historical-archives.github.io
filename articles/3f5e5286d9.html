ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"复美共产党全代大会等","alias":"","parts":[{"type":"paragraph","text":"复美共产党全代大会等！"},{"type":"paragraph","text":"（1938年6月8日）"},{"type":"paragraph","text":"美国纽约工人日报转美国共产党中央委员会主席福斯特，总书记白劳德，第十次全国代表大会全体代表鉴："},{"type":"paragraph","text":"我们谨代表中国共产党中央及全党党员，向美国工人阶级的先锋，努力保卫美国和平、进步及民主的先锋致敬，并感谢贵党及美国人民对中国民族解放战争的帮助和同情。"},{"type":"paragraph","text":"拥护中美兄弟党和两国人民的紧密团结！打倒日本侵略者！美国共产党万岁！独立自由幸福的新中国万岁！"},{"type":"paragraph","text":"毛泽东朱德王明周恩来"},{"type":"paragraph","text":"洛莆博古项英陈云"},{"type":"paragraph","text":"[1]1938年6月4日，《新华日报》刊载美国共产党第十次全国代表大会和美共中央主席福斯特、总书记白劳德给中共中央毛泽东的电报，电报祝贺中国军队在台儿庄战役取得的重大胜利，并表示将尽一切力量援助中国的抗日战争。这是毛泽东、朱德、陈绍禹（王明）、周恩来、洛甫（张闻天）等联名代表中共中央给美国共产党第十次全国代表大会，美共中央主席福斯特、总书记白劳德的复电，感谢美国共产党和美国人民对中国民族解放战争的同情和帮助。这个复电发表于1938年6月8日《新中华报》。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":6,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":351,"page_end":351},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"王明","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f5e5286d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
