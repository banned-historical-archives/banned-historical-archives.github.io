s":[{"year":2003,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"电视文献纪录片《毛泽东在湖北》首映"},{"type":"paragraph","text":"本报武汉12月20日电  记者龚达发报道：一部反映毛泽东在革命年代和建设时期在湖北工作、生活的5集电视文献片《毛泽东在湖北》，今天在武汉首映。"},{"type":"paragraph","text":"从1918年到1974年的56年间，毛泽东曾经40多次来到湖北。《毛泽东在湖北》一片，通过大量历史资料和实地采访拍摄相结合的方式，全面、生动地展现毛泽东在湖北生活、工作的岁月和他与人民群众心心相印的为民思想。片中展示了许多珍贵的历史图片和资料，部分资料是第一次披露，涉及了我们党和国家的一些重大历史事件。《毛泽东在湖北》通过生动感人的细节，表达了湖北人民对领袖的怀念之情，具有很强的感染力。该片由中央文献研究室、湖北省党史研究室、湖北电视台联合摄制。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efd8f28b7d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
