script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席接见基伏·斯托伊卡主席罗政府代表团在周总理陪同下昨从武汉回到北京","authors":[],"dates":[{"year":1958,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社武汉6日电】　毛泽东主席5日在武汉市接见了罗马尼亚部长会议主席基伏·斯托伊卡。同时被接见的有罗马尼亚人民共和国政府代表团团员:部长会议副主席兼交通和邮电部长埃米尔·波德纳拉希，外交部部长阿夫拉姆·布纳丘和罗马尼亚驻中国大使特奥多尔·鲁登科。"},{"type":"paragraph","text":"接见时在座的有:周恩来总理，中共湖北省委第一书记王任重，湖北省省长张体学，外交部副部长曾涌泉，武汉市市长刘惠农，中国驻罗马尼亚大使柯柏年。"},{"type":"paragraph","text":"【新华社北京6日电】　以基伏·斯托伊卡主席为首的罗马尼亚政府代表团结束在武汉市的参观访问后，由周恩来总理等陪同乘专机在今天傍晚回到北京。"},{"type":"paragraph","text":"到机场迎接的，有陈毅副总理，国务院副秘书长齐燕铭，外交部社会主义国家司司长王雨田等人。"},{"type":"paragraph","text":"陪同贵宾到达北京的，还有外交部副部长曾涌泉，我国驻罗马尼亚大使柯柏年和外交部礼宾司司长俞沛文。"},{"type":"paragraph","text":"【据新华社武汉6日电】　湖北省省长张体学和武汉市市长刘惠农今天中午举行宴会，招待以基伏·斯托伊卡主席为首的罗马尼亚政府代表团全体贵宾。"},{"type":"paragraph","text":"今天上午，贵宾们由周恩来总理和张体学省长等人陪同到达距武汉市50公里的武昌县山河多，参观了中共区委书记吴才生在这个多的锦绣农业合作社种的一块试验田，以及山河乡农民最近兴修的一座小型水库和这个乡的农业展览会。"},{"type":"paragraph","text":"下午3时，贵宾们乘专机离开武汉前往北京。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0486d4f403"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
