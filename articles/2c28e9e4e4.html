dates":[{"year":1993,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全运会乒乓球预赛收兵"},{"type":"paragraph","text":"男单马文革等名将纷纷落马"},{"type":"paragraph","text":"本报鞍山６月１１日电七运会乒乓球预赛经过７天激战，今天在这里结束。继一些强队在团体赛中落马之后，在单项争夺中又冷门迭爆，不少名将遭淘汰命运。"},{"type":"paragraph","text":"中国男单头号种子马文革被黑龙江小将王飞击败，已与全运会单打金牌无缘。此外，王浩、于沈潼等好手也未能进入决赛阶段。而３６岁的成应华、３２岁的许增才以及老将陈龙灿等则跻身前２４名决赛。"},{"type":"paragraph","text":"本次比赛也涌现一批后起之秀，如团体赛时胜邓亚萍的广东小将朱清妮，还有辽宁１５岁的女选手王楠、江苏女将李菊、四川姑娘张凌以及董伦、冯喆等。在打法风格上，这次参赛选手也是百花齐放，给中国乒坛带来新的气息。"},{"type":"paragraph","text":"进入男女单打前２４名、双打前１６名的选手取得了９月进京决赛资格。（津友）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c28e9e4e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
