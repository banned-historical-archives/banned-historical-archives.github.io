ors":["东北工学院马列主义教研室"],"dates":[{"year":1957,"month":11}],"is_range_date":false,"parts":[{"text":"报刊摘录：关于少数人闹事问题上的右派言论","type":"title"},{"text":"东北工学院马列主义教研室","type":"authors"},{"text":"苏辛涛(新湖南报副总编辑)“报社三大主义特别严重，单是小民主不能解决。”“报社罢工、上街不可能；上书、请愿是可能的。”(人民8．20)","type":"paragraph"},{"text":"许宝骙(民革北京市常委)社会人士的就业救济问题是客观存在的，我们(民革)不能解决，让他们闹起来才好解决。(人民9．17)","type":"paragraph"},{"text":"李升杰(武汉第四中学)公开煽动学生和毕业生闹事。他对学生说：“你们闹嘛!游行嘛!要闹就象武汉大学、北京大学那样闹，你们怕什么，你们应该斗争。”(人民10．13)","type":"paragraph"},{"text":"陈子君(中国少年报编辑)过去搞学生运动是为民主斗争，今天反得不到民主，今天的民主也应该争取。认为：“不用大民主就解决不了。”(中青8．6)","type":"paragraph"},{"text":"流沙河(“星星”编辑)我不管你们这些正人君子部长老爷，你们干涉老子，老子就罢工，老子就要造反。(文汇7．3)","type":"paragraph"},{"text":"徐懋庸：在我国当前社会中，有时也偶然发生一些看来是不正常的现象，如个别地方的闹事。这些现象，是人民内部的矛盾的一种特殊表现形式，那是毫无疑问的。在目前国内的情况下，一般说来，有敌我矛盾参杂在内的闹事，是很少的了。(哲学研究57第3期)","type":"paragraph"},{"text":" 来源：《右派言论选辑》，社会主义思想教育参考资料之二，东北工学院马列主义教研室编，1957年11月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5428fc01a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
