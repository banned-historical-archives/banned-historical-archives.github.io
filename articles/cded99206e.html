[{"year":1967,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命使中国永远保持红色"},{"type":"paragraph","text":"目前，中国人民正在进行的无产阶级文化大革命是一场史无前例的革命，是毛泽东主席——当代的列宁——的光辉思想的伟大胜利。以伟大的统帅、伟大的舵手、中国和世界革命人民伟大领袖毛主席亲自发动和领导的无产阶级文化大革命，是一场触及人们灵魂的防止资本主义在中国复辟、使中国永远保持红色的革命运动。当以美国为首的帝国主义和苏共领导集团为中心的现代修正主义反对和污蔑中国无产阶级文化大革命和毛泽东主席的时候，全世界的马克思列宁主义者和反帝的革命人民都坚决保卫中国无产阶级文化大革命和毛泽东思想——当代的列宁的思想。"},{"type":"paragraph","text":"多米尼加工会工作者  堪普斯"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cded99206e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
