art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"文化大革命巩固了无产阶级专政","authors":[],"parts":[{"type":"paragraph","text":"新华社六日讯 中国共产党中央委员会收到了智利革命共产党祝贺中华人民共和国成立二十周年的信件。贺信全文如下："},{"type":"paragraph","text":"在庆祝中华人民共和国成立二十周年之际，我们向中国共产党和中国人民致以热烈的祝贺。这一新的周年特别重要，因为它标志着无产阶级文化大革命取得了全面胜利，无产阶级文化大革命巩固了中国的无产阶级专政，使马克思主义——列宁主义——毛泽东思想成为中国社会的指导思想，从而加强了中国在世界革命中所占有的先锋地位。世界各国人民在反对美帝国主义、各国反动派及其同伙和反对以苏联共产党领导为首的现代修正主义的斗争中，把毛泽东同志的思想和革命实践做为照亮他们求得解放的道路的指南和典范。在这一节日里，我们再一次强调指出中国共产党和中国人民的伟大领袖毛泽东同志所起的具有历史意义的作用，中国共产党和中国人民的伟大领袖毛泽东同志高举坚决反对美帝国主义的斗争旗帜，揭发了苏修扮演的叛徒角色，开拓了世界各国人民及其无产阶级先锋队战斗的团结道路。"},{"type":"paragraph","text":"中华人民共和国周年万岁！"},{"type":"paragraph","text":"光荣的中国共产党万岁！"},{"type":"paragraph","text":"中国人民的伟大领袖毛泽东同志万岁！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56baf4afd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
