第一师范学院","王家瑞"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"大字报诗——卫道者","type":"title"},{"text":"上海第一师范学院王家瑞","type":"authors"},{"text":"[王家瑞：中文科学生]","type":"subtitle"},{"text":"卫道者","type":"subtitle"},{"text":"老子姓卫名道者，平日听好不听坏，","type":"paragraph"},{"text":"委员书记是官衔，马列主义当招牌，","type":"paragraph"},{"text":"唬七吓八来头大，理论帽子耍无赖，","type":"paragraph"},{"text":"正风实在没办法，挡风避雨计在坏，","type":"paragraph"},{"text":"张东望西摸行情，一言不发笑嘻嘻，","type":"paragraph"},{"text":"党委团委有亲朋，得罪谁都不应该，","type":"paragraph"},{"text":"眼看雷响风云起，只得对人把口开，","type":"paragraph"},{"text":"小张你得郑重点，乱开玩笑我不来，","type":"paragraph"},{"text":"你们应该有分村，对党唯应学点乖，","type":"paragraph"},{"text":"黑板报和大字报，冷讽热嘲太不该，","type":"paragraph"},{"text":"监定命运在党手，现在学乖不会坏，","type":"paragraph"},{"text":"请君莫做卫道者，把它当作破草鞋。","type":"paragraph"},{"text":" (中文科（一）4王家瑞)","type":"paragraph"},{"text":" 来源：《鸣放言论选集》（上海第一师范学院，1957）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"103c095c3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
