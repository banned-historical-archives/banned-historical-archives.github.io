art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永做忠于毛主席的雷锋式战士","authors":["雷锋生前所在连全体同志"],"parts":[{"type":"paragraph","text":"伟大的领袖和导师毛主席逝世的不幸消息传来，我们全连干部战士无比悲痛。千言万语说不尽毛主席为中国人民、为国际无产阶级和全世界革命人民立下的丰功伟绩，表不尽我们对毛主席衷心的热爱和无限的崇敬。"},{"type":"paragraph","text":"毛主席是我党、我军和新中国的缔造者和英明领袖，毛主席是我们的大救星。压在我国人民头上的三座大山，是毛主席领导我们推翻的；旧社会遗留下来的一穷二白的面貌，是毛主席领导我们改变的；轰轰烈烈的文化大革命、批林批孔、批邓、反击右倾翻案风的斗争，是毛主席亲自发动和领导的。毛主席为中国革命和世界革命创建的丰功伟绩，永世长存。"},{"type":"paragraph","text":"伟大领袖毛主席极其关怀我军建设和青年的成长。一九六三年三月五日，毛主席亲笔题词，向我们发出了“向雷锋同志学习”的伟大号召。十三年来，在毛主席光辉题词的照耀下，我们连从西双版纳的原始森林，到松花江畔的小兴安岭，从繁华的城市，到边远的山区，圆满地完成了党和人民交给的一项又一项任务。雷锋式的战士一茬又一茬的茁壮成长。我们连队的代表曾经七次见到伟大领袖毛主席。在悼念伟大领袖毛主席的时候，我们要象老班长雷锋那样，发扬“钉子”精神，刻苦攻读马列著作和毛主席著作，不断提高阶级斗争、路线斗争和继续革命的觉悟。我们要象老班长雷锋那样，提高警惕，加强战备，“紧握刀把子，专政对敌人”，时刻准备打击一切敢于破坏和捣乱的阶级敌人，时刻准备歼灭一切敢于入侵之敌。现在的雷锋班班长、四届人大代表曾树林同志怀着对毛主席无限崇敬的心情说：解放前，我的家和雷锋同志的家是一样的苦，是毛主席、共产党使我们翻身得解放，没有毛主席就没有新中国，没有毛主席就没有我们的一切。我们一定要响应党中央的号召，坚决把毛主席开创的无产阶级革命事业进行到底。"},{"type":"paragraph","text":"在沉痛悼念毛主席的时刻，我们全连同志站在毛主席的遗像前，庄严宣誓：坚决响应党中央的号召，化悲痛为力量，继承毛主席的遗志，向雷锋同志学习，以憎爱分明的无产阶级立场，深入批邓，继续开展反击右倾翻案风的斗争，巩固和发展无产阶级文化大革命的胜利成果。毛主席亲自树立的雷锋这面红旗，我们要扛到底，毛主席指引的雷锋成长的道路我们要走到底，永远做忠于毛主席的雷锋式的战士。"}],"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd72481d62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
