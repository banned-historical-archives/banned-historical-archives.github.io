tes":[{"year":1957,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"应毛泽东主席的邀请"},{"type":"paragraph","text":"伏罗希洛夫主席将来我国访问"},{"type":"paragraph","text":"新华社21日讯　中华人民共和国毛泽东主席邀请苏联最高苏维埃主席团伏罗希洛夫主席来中国访问，伏罗希洛夫主席已接受邀请。毛泽东主席的邀请信和伏罗希洛夫主席的复信如下：苏维埃社会主义共和国联盟最高苏维埃主席团主席敬爱的伏罗希洛夫同志："},{"type":"paragraph","text":"我代表中华人民共和国和中国人民热烈地邀请你，敬爱的主席同志来我国进行访问。我深信，你的访问必将进一步巩固和发展我们两国之间的亲密合作和伟大友谊。如你同意，请将你认为合适的访问日期，通知我们。我和全中国的人民以十分愉快的心情期待着你的光临。谨向你致最崇高的敬意。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东（签署）\t\t\t\t　1957年1月6日于北京中华人民共和国主席敬爱的毛泽东同志："},{"type":"paragraph","text":"请允许我以苏维埃社会主义共和国联盟最高苏维埃主席团和我个人的名义对您热情地邀请我访问中华人民共和国表示衷心的感谢。我怀着感激的心情接受您的邀请。如果对您方便的话，我准备在1957年4月15日至5月5日期间访问兄弟般的中华人民共和国。"},{"type":"paragraph","text":"顺致诚挚的敬礼。"},{"type":"paragraph","text":"苏联最高苏维埃主席团主席　克·伏罗希洛夫\t\t\t\t\t　1957年1月18日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d31a5b5ef5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
