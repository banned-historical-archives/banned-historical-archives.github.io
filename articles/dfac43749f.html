文","何秀亭","党文蔚","卢犹崇","朱庭训","杨亚军","西北农学院","贠虎璋"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"对各大运动总的估计","type":"title"},{"text":"西北农学院朱庭训党文蔚杨亚军任德文卢犹崇贠虎璋何秀亭","type":"authors"},{"text":"1．“‘成绩是主要的，缺点是不可避免的’，这是教条。”(园59级学生　朱庭训)","type":"paragraph"},{"text":"2．“‘成绩是基本的，错误在所难免’，这是教条主义。”(水58级学生　党文蔚)","type":"paragraph"},{"text":"3．“那一次运动不整几个人，不整几个人咋能叫运动。”(水58级学生　杨亚军)","type":"paragraph"},{"text":"4．应该纠偏：过去运动，烈烈轰轰；陈康领导，只图报功。违反政策，“守‘左’毋‘右’”；偏差不少，压服很凶。希望领导，改变作风；解决矛盾，积极整风。深入工作，纠偏立功。(林58级学生　任德文)","type":"paragraph"},{"text":"5．“‘三反’中冤枉了一些好人，是因为党的政策不好。”(农60级学生　卢犹崇)","type":"paragraph"},{"text":"2．“公私合营后，经营管理技术，不如过去私人经营的好。”(水58级学生　贠虎璋)","type":"paragraph"},{"text":"3．“社会主义改造的政策太厉害，使资本家多么痛苦……流浪成为摊贩。”(林58级学生　何秀亭)","type":"paragraph"},{"text":"4．“资产阶级不需要再改造了。”(农60级学生　卢犹崇)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfac43749f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
