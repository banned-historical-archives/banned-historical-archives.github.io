<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"联系实际读宝书　推进革命大批判华东师范大学革命小将每天坐下来学两小时毛主席著作雷打不散　同学们联系政权问题来考虑大批判深切感到必须批倒头号野心家","authors":[],"dates":[{"year":1967,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　华东师范大学革命红卫兵和革命学生，在革命大批判中进一步加强学习毛主席著作，用毛泽东思想推进革命大批判。"},{"type":"paragraph","text":"革命小将们在红卫兵新师大师的推动下，把每天坐下来至少学习二小时毛主席著作当作一项雷打不散的制度，不少学生早晨起来就背诵“老三篇”等光辉著作。许多班级、年级经常举行毛主席著作专题讲用会，认真学习，深刻领会，坚决照办，紧跟毛主席的最新指示，开始学着运用毛泽东思想来分析和解决革命大批判中碰到的问题。"},{"type":"paragraph","text":"华东师大革命小将对毛主席著作具有深厚的阶级感情和正确的学习态度。在当前两个阶级、两条道路、两条路线大决战的关键时刻，他们深深地领会到，真革命假革命的区别，归根结底，就是对待毛泽东思想的态度问题。中文、物理等系都非常重视同学们对待学习毛主席著作的态度，把它当作一项最重要的思想工作去抓。政教系四年级二班十多个学生还步行到江苏太仓沙溪公社洪泾大队，向贫下中农学习毛主席著作积极分子顾阿桃、沈玉英取经，受到很大的教育。革命小将激动地说:“贫下中农这样热爱毛主席，毛主席著作学得这样好，比比他们，我们太惭愧了!”他们改变了过去对毛主席著作学习不认真的态度，认真地活学活用毛主席著作，积极投入文化大革命。"},{"type":"paragraph","text":"在开展思想政治教育活动的基础上，中文、生物、化学、数学等系还分别采取措施，提出要求:第一，保证学习时间，在一般情况下，每天早晨两个小时的学习时间不安排任何活动。第二，学习必须联系革命大批判，联系本单位斗争实践，联系活思想。第三，革命组织负责人和战士一起学习毛主席著作，用自己的实际行动作出榜样。第四，由专人(有的是第一把手)负责抓学习毛主席著作的工作。第五，举办各种讲用会、座谈会，举办墙报、黑板报等学习园地，进行个别谈心，交流学习体会。第六，总结紧跟毛主席最新指示、活学活用毛主席著作的班级、小组的经验，以树立样板。"},{"type":"paragraph","text":"革命小将们在革命大批判中努力活学活用毛主席著作方面，开始有了收获。他们联系一年来斗争实践，学习了毛主席亲自主持制定的中共中央一九六六年五月十六日《通知》等伟大文献后，更加认识到毛泽东思想的伟大和正确，更加热爱中国人民和世界人民心中的红太阳毛主席，热烈欢呼马列主义发展到一个崭新的阶段——毛泽东思想的阶段，热烈欢呼全世界进入毛泽东思想的新时代!他们还带着革命的根本问题——政权问题去学习毛主席著作，深深地认识到，要紧紧掌握斗争大方向，就要把斗争的焦点集中到政权问题上来，从而提高了对革命大批判的认识。"},{"type":"paragraph","text":"革命小将们还以毛泽东思想为武器，破私立公，横扫头脑中的无政府主义等非无产阶级的思想。物理系一年级四班的一些学生，原来以为革命大批判与己关系不大，打球下棋结绒线衣，学习了《反对自由主义》和毛主席关于无产阶级革命事业接班人五项条件的论述以及《\u0026lt;修养\u0026gt;的要害是背叛无产阶级专政》等重要文章以后，向自己严肃地提出了如何做革命事业接班人的问题，通过忆苦思甜，控诉、批判中国的赫鲁晓夫和以他为代表的资产阶级反动路线，激起了强烈的战斗热情，自动组织战斗组，已经写出了十多篇批判《修养》的文章。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e68f8bcab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
