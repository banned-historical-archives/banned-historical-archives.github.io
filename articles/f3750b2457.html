《团结》周刊和加纳《新闻晚报》谴责美国种族歧视","authors":[],"dates":[{"year":1963,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南保卫世界和平委员会等组织集会"},{"type":"paragraph","text":"支持美国黑人斗争  热烈欢迎毛主席声明"},{"type":"paragraph","text":"索马里《团结》周刊和加纳《新闻晚报》谴责美国种族歧视"},{"type":"paragraph","text":"新华社河内十五日电　越南保卫世界和平委员会、越南亚非人民团结委员会、越南法律工作者协会十四日晚在河内团结俱乐部联合举行集会，坚决支持美国黑人反对种族歧视的斗争，热烈欢迎毛泽东主席发表的支持美国黑人斗争的声明。"},{"type":"paragraph","text":"出席集会的有，越南保卫世界和平委员会主席黎廷探，越南亚非人民团结委员会副主席阮文享，越南法律工作者协会副主席范文白，越南劳动党中央委员、民族委员会主任黎广波以及各党派、各团体、各宗教代表和河内各机关代表等。"},{"type":"paragraph","text":"越南保卫世界和平委员会秘书长双松在集会上讲话，他强烈谴责美国政府对美国黑人实行种族歧视政策。他说，我们热烈欢迎和支持毛泽东主席发表的支持美国黑人斗争的声明，我们坚决支持美国黑人的正义斗争。"},{"type":"paragraph","text":"双松指出，美国黑人忍受不了美国统治阶级的残暴压迫、剥削和种族歧视，几世纪以来，他们就一直进行斗争，反对美国统治阶级的种族政策。最近，美国黑人反对种族歧视的斗争达到了新的高潮。这是正义的斗争。他们这场斗争唤醒了美国黑人和劳动人民起来反对美国统治者。这是美国阶级斗争的激烈表现，是世界被压迫、被剥削的民族革命斗争的一部分。"},{"type":"paragraph","text":"双松说，美国的种族歧视政策，与它对世界各国的侵略政策和战争政策有着密切的联系，尤其在越南南方，美帝国主义对越南人民犯下了滔天的罪行，我们越南人民深切同情美国黑人的遭遇。"},{"type":"paragraph","text":"双松讲话以后，越南文学艺术联合会主席邓泰梅、越南妇女联合会常委裴氏锦、越南法律工作者协会副秘书长丁嘉祯等先后在会上发言，他们一致谴责美国政府对美国黑人实行种族歧视政策。"},{"type":"paragraph","text":"集会最后通过一项决议，强烈抗议美国政府迫害美国黑人的暴行，坚决支持美国黑人的斗争。"},{"type":"paragraph","text":"新华社摩加迪沙十四日电　索马里执政党索马里青年联盟新创刊的机关报《团结》周刊在最近一期发表文章，谴责美国的种族歧视。"},{"type":"paragraph","text":"文章说：“美国黑人正在进行争取民权和平等政治权利的声势浩大的斗争。发生在美国的这一事件不再是次要的政治事件，而是有关全人类的历史性事件。”"},{"type":"paragraph","text":"这篇文章在揭露美国各州实行种族隔离的罪行和三K党的暴行之后指出，“亚非新独立国家把种族问题看作是它们同美国之间关系上的十分重要的问题。美国黑人正处在同殖民地人民相似的地位。”"},{"type":"paragraph","text":"据新华社阿克拉十四日电　加纳舆论继续就三名加纳学生在美国遭到一帮武装和蒙面的白人种族主义者殴打事谴责美国种族歧视。"},{"type":"paragraph","text":"《新闻晚报》十三日发表社论说，这种殴打事件是种族歧视和奴役的另一种表现。在美国，非洲人和有非洲血统的人民所受到的待遇是野蛮的，原始的。"},{"type":"paragraph","text":"社论说，非洲人民强烈反对美国的这种无耻的野蛮行为。"},{"type":"paragraph","text":"这家报纸还刊载读者来信，谴责美国种族主义暴行是穷凶极恶的，是可耻的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3750b2457"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
