ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"复陈毅、邓小平电","alias":"","parts":[{"type":"paragraph","text":"复陈毅、邓小平电川"},{"type":"paragraph","text":"（1948年10月28日）"},{"type":"paragraph","text":"我们同意你们不出淮南，但是否打孙元良，要看孙元良是否被你们调动到徐蚌线。如果仍在汴徐线，则似以不打为宜。你们在徐蚌线以西地区出现，对整个敌人威胁极大。这种威胁作用，胜过在汴徐线上打一胜仗。请你们考虑到达毫、涡、永中间地区休息数日之后，第一步是否可以分路攻占亳、涡、蒙三城，再看形势。估计三城占领，淮南即将震动，孙、邱两部均将被调动，而你们行动的目的是调动孙、邱，主要是调动邱清泉。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":128,"page_end":128},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff5604ab0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
