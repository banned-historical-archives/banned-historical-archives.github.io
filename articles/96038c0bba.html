<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抛弃资产阶级思想全心全意为工农服务","authors":["玉光"],"dates":[{"year":1952,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"玉光"},{"type":"paragraph","text":"沈天慧老师在关于教育要向工农开门这个方针问题上所暴露的错误思想，主要是她只看到享受教育的权利要均等(实际上是绝对平均)，她根本不去看工人阶级对人民的贡献。一个日以继夜为人民创造财富的工人，一直到现在还住在黑而且脏的小鸽房里，连沈老师都不敢走进去，而大呼倒霉，正因为如此，工人们住到曹杨新村去有什么不可呢?一个资产阶级家庭有华丽的公寓可住，享有丰富的晚餐，在暴热的暑季里，坐在冰箱电扇旁边反大呼其穷。在这样一个鲜明的对照下，沈天慧老师竟不认识教育首先应该为谁服务的道理，她的思想问题是多么严专呵!"},{"type":"paragraph","text":"我们学校要为工农服务，并不是说对其他阶级就一点都不照顾了。但是我们应该看一看现在为人民创造财富的工人阶级子弟在学校里的情况是怎样的:上海市全部入学儿童为五十余万人，但工人子女仅占八万左右，现在尚有大批工人子女失学并且有的已经超过了入学的年龄，我想这种严重现象沈老师是没有看见，恐怕也不愿看见这个事实。今天我们首先解决工农子女入校，并不是要其他阶级子女失学，而是在今天的条件下，来有步骤的有计划的予以解决。解决的办法是政府尽可能的来兴办新的学校，更多的来吸收失学的儿童入学。"},{"type":"paragraph","text":"几十年来广大的工人阶级为资本家作牛马，生活不得一饱，子女长期被拒之于校门外。在解放以后生活才开始有了一点好转，过去为少数人服务的校门刚刚打开让失学众多的工人阶级子女走进来，就有人大呼‘不平’了，这种‘不平之鸣’对不对，请沈老师自己来回答!今天沈老师提出‘权利教育’来掩盖资产阶级的思想本质，那么沈老师既然主张‘权利教育’，为什么过去工农子女被拒之于校门外，而不大声疾呼呢?解放三年，沈老师依然陷于错误的资产阶级教育思想的泥坑而不自知，这是多么危险"},{"type":"paragraph","text":"近来有个别教师希望收工人子女入学，但他们不从政治上着眼；而是因为工人阶级有了固定工资，可以出得起学费，而沈老师不愿工人子女入学是因为工人穷出不起学费，怕影响自己收入，这两种思想是同出一辙的，持别是沈老师这种鄙视工人阶级的态度，不是感情问题，而是立场问题。沈天慧老师应该及时深刻检查，端正自己的立场和观点。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96038c0bba"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
