ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"致中原局、鄂西北区党委、鄂院边地委诺同志电","alias":"","parts":[{"type":"paragraph","text":"致中原局、鄂西北区党委、"},{"type":"paragraph","text":"鄂皖边地委诸同志电"},{"type":"paragraph","text":"(1946年9月10日)"},{"type":"paragraph","text":"在陕南、鄂西、鄂中、鄂东对付我中原军者共十四个旅，分属胡宗南、程潜、刘峙三人指挥。我中原军的任务就是咬紧牙关，克服困难，在当地立稳脚跟，创立根据地，钳制这十四个旅，协助老解放区粉碎国民党进攻。你们过去两个多月英勇斗争已起了极大的战略作用，中央希望并责成你们今后还要起同样的作用，全党全军均关心你们，你们不是孤立的。"},{"type":"paragraph","text":"[1]这是毛泽东关于通报各地战况为中共中央起草的致中原局、鄂西北区党委、鄂皖边地委诸同志电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":152,"page_end":152},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac6737358e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
