ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"中央军委转发五十四军对反对派进行工作情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央军委转发五十四军对反对派"},{"type":"paragraph","text":"进行工作情况报告\"的批语"},{"type":"paragraph","text":"（1967年5月27日）各军区、各军、各军种兵种："},{"type":"paragraph","text":"五十四军在重庆的工作做得不错，可供你们参考。凡属两派革命群众组织互相对立很严重的，只要进行细致的思想政治工作，问题总是可以解决的。对于有群众的保守组织，甚至反动组织，也要细致地进行思想政治工作。"},{"type":"paragraph","text":"中央军委"},{"type":"paragraph","text":"五月二十七日"},{"type":"paragraph","text":"[1]中国人民解放军第五十四军1967年5月26日给成都军区并报中共中央文革小组、全军文革小组的这个电报说，近几天，军队的领导同志全力以赴，在重庆先后十多次约见了工人组织、学生组织和解放军后勤工程学院“红总”等组织的负责人交谈，听取他们的批评和意见。此外，通过接待来访，对反对派的一般群众进行了工作，并同有的组织搞了军民联欢。通过这些工作和活动，消除了一些误解，对立情绪有所缓和，思想感情较前有所接近。反对派表示拥护中央处理重庆问题的“五条”，愿意接受市革委会筹备小组的领导，原则上同意实现两派联合。但要真正实现两派联合，还需要进行大量艰苦细致的政治思想工作。中央军委转发五十四军对反对派进行工作情况报告的批语"},{"type":"paragraph","text":"二林彪、恩来同志阅发。[1]林彪，当时任中共中央军委副主席。恩来，即周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":5,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":481,"page_end":482},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"重庆文革","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央军委转发五十四军对反对派进行工作情况报告的批语","authors":["毛泽东"],"dates":[{"year":1967,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"中央军委转发五十四军对反对派进行工作情况报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各军区、各军、各军种兵种：","type":"appellation"},{"text":"五十四军在重庆的工作做得不错，可供你们参考。凡属两派革命群众组织互相对立很严重的，只要进行细致的思想政治工作，问题总是可以解决的。对于有群众的保守组织，甚至反动组织，也要细致地进行思想政治工作。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0000fe895f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"g
