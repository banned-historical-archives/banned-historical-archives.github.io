" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1976","name":"最高人民法院特别法庭司法警察工作守则","author":"法庭管理组","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"最高人民法院特别法庭司法警察工作守则","dates":[{"year":1980,"month":10,"day":13}],"is_range_date":false,"authors":["法庭管理组"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院研究室，中华人民共和国最高人民法院特别法庭审判林彪江青反革命集团案主犯纪实，457-458","tags":[{"name":"警察","type":"主题/事件"},{"name":"特别法庭","type":"主题/事件"},{"name":"最高人民法院","type":"主题/事件"}],"parts":[{"type":"title","text":"最高人民法院特别法庭"},{"type":"title","text":"司法警察工作守则"},{"type":"paragraph","text":"一、 司法警察的任务是：在法庭庭长、副庭长、审判长的指挥下，警卫法庭，维持法庭秩序，押解看管被告人，传唤证人，送达法律文书，保障审判活动的正常进行。"},{"type":"paragraph","text":"二、 司法警察必须做到："},{"type":"paragraph","text":"1. 模范遵守法庭规则和纪律，忠于职守。"},{"type":"paragraph","text":"2. 提高警惕，坚守岗位，一切行动听指挥。"},{"type":"paragraph","text":"3. 严肃认真，态度和蔼。"},{"type":"paragraph","text":"4. 保守国家机密。"},{"type":"paragraph","text":"5. 及时请示报告。"},{"type":"paragraph","text":"三、 各值勤法警的职责和要求："},{"type":"paragraph","text":"1. 值庭法警听从庭长（审判长）的命令，受值庭书记员的分派，准确及时的送达法律文书，办理提押传票等法律手续。"},{"type":"paragraph","text":"2. 站庭法警负责警卫法庭，保卫审判人员、公诉人、辩护人的安全，维护法庭秩序，保障审判活动正常进行。"},{"type":"paragraph","text":"3. 门卫法警，守卫“中华人民共和国最高人民法院"},{"type":"paragraph","text":"特别法庭”及第一、第二“审判庭”，保证诉讼参与人及旁听人员出入法庭门口的畅通安全。"},{"type":"paragraph","text":"4. 押解被告人的法警负责从候审室将被告人安全地押解到庭，在庭审中看管被告人，在休庭或闭庭时押解被告人退庭，将被告人交还候审室监管人员，并办好法律手续。在押解看管被告人时，要提高警惕，防止发生意外，严禁打骂体罚和侮辱虐待被告人。"},{"type":"paragraph","text":"四、法警出庭执行任务，一律佩带手枪，服装要整洁，举止要端正。站岗，值庭，站庭，看管被告人的法警一律用立正姿式。"},{"type":"subtitle","text":"法庭管理组"},{"type":"subtitle","text":"一九八〇年十月十三日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94e02d4527"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
