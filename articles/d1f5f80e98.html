ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对黄克诚来信的复信和批语","alias":"","parts":[{"type":"paragraph","text":"对黄克诚来信的复信和批语"},{"type":"paragraph","text":"（1959年8月24日）克诚同志："},{"type":"paragraph","text":"信收到，很高兴。你的那种态度很好。我表示热情的欢迎。错误并不可怕，只要能改就好了。错而能改，出以真诚老实，就能逐步地见信于人、变为一个好同志。这样一想，忧愁就可以减轻了，顺复。祝你"},{"type":"paragraph","text":"大进一步"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月廿四日[1]指黄克诚1959年8月22日给毛泽东的信。本篇三就写在这封信上。"},{"type":"paragraph","text":"对黄克诚来信的复信和批语"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"此信及黄来信送刘、周、朱、林、彭真同志一阅，尚昆将我复信抄一份存底，连同黄来信归档。然后将我复信送与克诚。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月廿四日"},{"type":"paragraph","text":"三刘、周、朱、林、彭真阅，退毛。已复，欢迎他这种态度。[1]指本篇一。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。朱，指朱德。林，指林彪，当时任中共中央副主席、国务院副总理。彭真，当时任中共中央政治局委员、中央书记处书记。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":315,"page_end":316},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1f5f80e98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
