script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"金山县张埝镇干部和群众狠批“阶级斗争熄灭论”克服右倾麻痹思想　深入开展对敌斗争","authors":[],"dates":[{"year":1971,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　金山县张埝镇党委带领干部、群众认真学习毛主席关于“在社会主义这个历史阶段中，还存在着阶级、阶级矛盾和阶级斗争，存在着社会主义同资本主义两条道路的斗争，存在着资本主义复辟的危险性”的伟大教导，狠批叛徒、内奸、工贼刘少奇等所散布的阶级斗争熄灭论和地主资产阶级人性论，克服右倾麻痹思想，深入开展“一打三反”运动，取得了对敌斗争的不断胜利。"},{"type":"paragraph","text":"在毛主席革命路线的指引下，这个镇前一时期在“一打三反”运动中取得了一些成绩，全镇革命、生产形势很好。就在这时，部分干部和群众产生了右倾麻痹思想，认为阶级敌人被打下去了，歪风邪气批倒了，群众阶级斗争觉悟提高了，阶级敌人不敢再活动了，因而有些单位一度放松了对敌斗争和革命大批判。镇党委针对这种情况，连续召开了三次党委会和一次党委扩大会，认真学习了毛主席关于“千万不要忘记阶级斗争”的伟大教导，分析了阶级斗争的形势，首先检查和批判了党委本身存在的右倾麻痹思想，认识到这种右倾麻痹思想实际上是大叛徒刘少奇的“阶级斗争熄灭论”的流毒在头脑中的反映。他们说，要巩固和发展无产阶级文化大革命的成果，要进一步巩固无产阶级专政，就必须深入开展革命大批判，狠抓阶级斗争，把“一打三反”运动搞深搞透。"},{"type":"paragraph","text":"镇党委通过大学习、大批判，提高了认识，统一了思想，由党委正、副书记和一名委员组成领导小组，深入基层，掌握重点，在群众中实行面对面领导，把“一打三反”运动引向深入。镇党委委员、手工业社党支部书记和本单位群众一起商量，对本单位的阶级斗争情况进行了认真细致的分析，并且积极主动带领群众向阶级敌人发动进攻，终于挖出了一个现行反革命分子和一个破坏知识青年上山下乡的坏分子。"},{"type":"paragraph","text":"“革命战争是群众的战争，只有动员群众才能进行战争，只有依靠群众才能进行战争。”镇党委深深体会到:要抓好阶级斗争，稳、准、狠地打击一小撮阶级敌人，关键是要放手发动群众，打人民战争。两个多月来，他们先后开了七次群众大会，大讲国内外大好形势和阶级斗争的长期性、复杂性、尖锐性；发动群众认真学习毛主席的阶级斗争学说，狠批阶级斗争熄灭论和地主资产阶级人性论，从而进一步提高了基层干部和广大革命群众的阶级斗争觉悟，在斗争中形成了一支对敌斗争的积极分子队伍，有力地打击了一小撮阶级敌人。这个镇的解放街，还发动老年居民，排敌情，议线索，开展对敌斗争。一个老妈妈在大议、大排敌情中，回忆起有人经常鬼鬼祟祟到地主分子家里去的线索，经过大家深入调查研究，终于揭出了一个恶毒攻击无产阶级专政的坏家伙。"},{"type":"paragraph","text":"这个镇由于狠抓了阶级斗争，狠狠打击了阶级敌人，因而进一步巩固了无产阶级专政，发展了大好形势。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"一打三反","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"799c76c478"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
