tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛主席永远和我们越南人民在一起”越南同志喜看《毛主席和百万文化革命大军在一起》纪录片","authors":[],"parts":[{"type":"paragraph","text":"据新华社河内十六日电 中国驻越南大使馆和经济代表处，最近分别举行电影招待会，连续放映大型彩色纪录片《毛主席和百万文化革命大军在一起》，受到参加招待会的越南同志的热烈欢迎。许多观众在看了电影后赞扬说，毛主席领导中国人民进行的这场无产阶级文化大革命，真是好得很！"},{"type":"paragraph","text":"许多观众从银幕上看到毛主席非常健康时，纷纷对中国同志说：“毛主席这样健康，是中国人民的幸福，也是我们越南人民的幸福！”"},{"type":"paragraph","text":"在招待会上，观众们还纷纷索取毛主席照片，并且把金光闪闪的毛主席纪念章戴在胸前。一位越南同志给他的小女儿戴上毛主席纪念章后嘱咐说：“这是敬爱的毛伯伯。你要听胡伯伯和毛伯伯的话，做一个红色的革命接班人。”一位集结在越南北方的南方人员戴上了毛主席纪念章，还要求给他一张毛主席穿着军装站在天安门上的照片。他一面端详着毛主席像，一面激动地说：“毛主席和中国人民在一起，也永远和我们越南人民在一起。毛主席穿上了军装，是对我们越南人民很大的鼓舞。我们一定要实现胡主席的神圣号召，握紧枪杆，战斗到底，争取抗美救国斗争的彻底胜利！”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f25eb1cf8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
