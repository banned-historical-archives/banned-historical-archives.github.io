村互助合作，粮食统购统销，镇压反革命等问题的报告（节录）","authors":[],"dates":[{"year":1955,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"中央批转马明芳同志关于对西北地区农村互助合作，粮食统购统销，镇压反革命等问题的报告（节录）","type":"title"},{"text":"… 宝鸡, 银川专区的大部分地区, 天水，渭南专区的部分地区建社中的问题较为严重。发生社员退社，拉走耕畜，甚至因要退社和不满意对耕畜，青苗等问题的处理捆绑社主任，乡干部，包围县长的事件；窝工，减产，耕畜死亡的现象也比较普遍。… 问题较多的社陕甘两省约占 15， 青海省约占12%， 新疆省约占7%。(p. 7) …","type":"paragraph"},{"text":"机关，工厂，学校中浮支，冒领，浪费粮食的现象是普遍严重的。铁道部驻陕第二工程局等四个单位今年第一季度共多报冒领粮食230万斤，即多领去 77千多人一个月的吃粮。国棉二厂等6个单位在一个月内浪费粮食达8800多斤；兰州市最近在11个单位中作了一次检查，即发现虚报多领粮食3万多斤；兰州师范学校的合作食堂一次扫出剩饭 15斤；有色金属局第三工程公司一次在洗碗盆内捞出饭13斤，在阴沟内捞出米20斤。(p. 8)…","type":"paragraph"},{"text":"西北几省过去约有各种反革命分子12万人， 几年来处理逮捕8万7千多。 (p. 9) …","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5ec08bdcf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
