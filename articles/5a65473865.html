" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"土地改革要有秩序分阶段进行","alias":"","parts":[{"type":"paragraph","text":"王地改革要有秩序分阶段进行"},{"type":"paragraph","text":"（1951年2月7日）中南局，华南分局，并告华东局及福建省委，西南局，西北局："},{"type":"paragraph","text":"一月二十六日中南局转来杜润生同志一月十九日电已收到，我们同意杜润生所提的方法，即首先在各县普遍发动群众，进行减租、退押、反霸及镇压反革命的斗争，整顿基层组织，将此作为一个阶段，接着转入分田阶段。这样做是完全必要的，而且也是最迅速的。土地改革的正确秩序，本来应当如此。华东、中南许多地方，凡土改工作做得最好的，都是经过了这样的秩序。过去华北、东北及山东的土改经验也是如此。我们所说广东土改工作应当加快进行，并不是要求广东同志违反这样的秩序，群众还没有起来，基层组织还不可靠，就要生硬地不成熟地进行分配土地的工作，而是要加快发动群众，整顿基层组织，接着进行分田。广东在过去一年多的时间内，没有抓紧发动群众、整顿基层这一个最基本的环节，所以现在一提到分田就感觉吃力，但现在这样去做还不算迟，还应该这样去做。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月七日"},{"type":"paragraph","text":"[1]杜润生，1913年生，山西太谷人。当时任中共中央中南局秘书长，中南土地改革委员会副主任。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":108,"page_end":108},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"土地改革要有秩序分阶段进行","description":"根据毛泽东手稿刊印。","dates":[{"year":1951,"month":2,"day":7}],"parts":[{"text":"土地改革要有秩序分阶段进行","type":"title"},{"type":"paragraph","text":"中南局，华南分局，并告华东局及福建省委，西南局，西北局："},{"type":"paragraph","text":"一月二十六日中南局转来杜润生同志一月十九日电已收到，我们同意杜润生所提的方法，即首先在各县普遍发动群众，进行减租、退押、反霸及镇压反革命的斗争，整顿基层组织，将此作为一个阶段，接着转入分田阶段。这样做是完全必要的，而且也是最迅速的。土地改革的正确秩序，本来应当如此。华东、中南许多地方，凡土改工作做得最好的，都是经过了这样的秩序。过去华北、东北及山东的土改经验也是如此。我们所说广东土改工作应当加快进行，并不是要求广东同志违反这样的秩序，群众还没有起来，基层组织还不可靠，就要生硬地不成熟地进行分配土地的工作，而是要加快发动群众，整顿基层组织，接着进行分田。广东在过去一年多的时间内，没有抓紧发动群众、整顿基层这一个最基本的环节，所以现在一提到分田就感觉吃力，但现在这样去做还不算迟，还应该这样去做。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月七日"}],"comment_pivots":[{"part_idx":2,"offset":14,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["杜润生，一九一三年生，山西太谷人。当时任中共中央中南局秘书长、中南土地改革委员会副主任。"],"page_start":153,"page_end":153,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a65473865"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
