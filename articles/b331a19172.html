art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"水上娘子军","authors":[],"parts":[{"type":"paragraph","text":"郭村大队妇女游泳活动是从去年开始的，这在伏牛山区是一件新事。同一切新生事物一样，女民兵练游泳是经过两个阶级、两种思想的激烈斗争的。刚开始，阶级敌人就跳出来进行破坏，一个富农婆四处造谣。在大队党支部的支持下，共产党员郭春香领着女民兵，开了批判会，批得那个富农婆理屈词穷。刚刮过一阵风，又掀起一层浪。去年秋天，正当女民兵游泳练得起劲的时候，邓小平又出来宣扬体育工作“无非是提高运动技术水平，争取好的成绩”的谬论，反对工农兵搞体育。一时间，社会上谣言四起，攻击和反对妇女游泳。女民兵们重温毛主席关于开展游泳活动的教导，决心同邓小平的修正主义体育路线对着干。基干民兵赵春英贴出了一张革命的大字报：《工农兵是体育运动的主人》，马上就有许多民兵响应，一夜之间，大字报贴满了大街小巷，社会主义正气压倒了形形色色的奇谈怪论，女民兵参加游泳的人数越来越多。她们为了练好杀敌本领，在群众游泳活动的基础上，正式建立一支女基干民兵游泳队。"},{"type":"paragraph","text":"然而，前进的道路上并不是一帆风顺的。女民兵排长郭秀珍，带头第一个下水，大家称赞她。可是回到家里，她娘却想不通。秀珍就和母亲共同学习毛主席的教导：“时代不同了，男女都一样。男同志能办到的事情，女同志也能办得到。”并且联系《渡江侦察记》等电影，耐心地向母亲解释游泳为革命为战备的道理。她说：“难道打起仗来女的就不要过河歼敌？抗洪抢险女的就不要下水救人？毛主席说男女都一样，咱游泳就是要给妇女们争气，给毛主席争光。”并且用忆苦思甜的方法帮助妈妈打通思想。骨干一带头，大家便一齐起来向旧思想冲击。就连老年人也给劳动起来了，贫农老大娘徐玉花也夹着两块木板下水了，五十多岁的梁书贵大娘领着几个闺女也来了，女民兵更加受到鼓舞，不长时间，全大队百分之四十的妇女都参加了游泳活动。（报道组）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b331a19172"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
