tes":[{"year":1958,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席　刘委员长　周总理当选全国人民代表大会代表"},{"type":"paragraph","text":"据新华社22日讯　毛泽东主席和他的亲密战友刘少奇委员长、周恩来总理今天被北京市第三届人民代表大会第一次会议选举为第二届全国人民代表大会代表。"},{"type":"paragraph","text":"上午九时，选举开始前，大会执行主席宣布了北京市应选的二十九名第二届全国人民代表大会代表候选人名单。这个名单是按照中华人民共和国全国人民代表大会及地方各级人民代表大会选举法的规定，由中国共产党北京市委员会和各民主党派北京市组织、北京市各人民团体共同协商联合提出，并经各代表小组的酝酿和讨论。在今天的大会上，执行主席征求了代表们对代表候选人名单的意见。最后宣布全体代表一致通过这个候选名单时，全场热烈鼓掌。接着开始投票。下午七时十分，选举结果揭晓了：毛泽东主席以百分之百的选票当选为全国人民代表大会代表。毛泽东主席的亲密战友刘少奇和周恩来，同样以百分之百的选票当选为第二届全国人民代表大会代表。这时全场响起了经久不息的暴风雨般的掌声。"},{"type":"paragraph","text":"当选为第二届全国人民代表大会代表的还有：（以姓氏笔划为序）万里、王昆仑、乐松生、刘德珍、安朝俊、宋汀（女）、李恕（回族）、吴晗、林巧稚（女）、罗淑珍（女）、范瑾（女）、浦洁修（女）、殷维臣、张友渔、张百发、张奚若、张晓梅（女）、郭树德、梁思成、梅兰芳、黄润萍、彭真、舒舍予（满族）、载涛（满族）、蒋南翔、诸福棠。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e5ceba17d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
