script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚劳动党中央委员会发表公报　阿提前实现全国农村电气化   这一辉煌成果是阿尔巴尼亚人民依靠自力更生粉碎帝国主义—修正主义封锁的伟大胜利","authors":[],"dates":[{"year":1970,"month":11,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚劳动党中央委员会发表公报"},{"type":"paragraph","text":"阿提前实现全国农村电气化"},{"type":"paragraph","text":"这一辉煌成果是阿尔巴尼亚人民依靠自力更生粉碎帝国主义—修正主义封锁的伟大胜利"},{"type":"paragraph","text":"新华社地拉那四日电　阿尔巴尼亚劳动党中央委员会三日发表公报，宣布阿尔巴尼亚提前实现全国农村电气化。"},{"type":"paragraph","text":"公报说，阿尔巴尼亚劳动党中央委员会向阿尔巴尼亚人民报告令人振奋的大好喜讯：我国所有农村胜利实现了电气化。"},{"type":"paragraph","text":"公报说，今天，电灯，象人民所称的“党的光明”，照亮了每一座农民住房，照亮了我国英雄的山区和遥远的地区。"},{"type":"paragraph","text":"公报说，这比阿尔巴尼亚劳动党中央委员会第四次全体会议规定的期限提前十三个月完成，比远景计划预计的期限提前十五年完成。这是一个辉煌的历史性胜利，它证明了党的高瞻远瞩思想的伟大，证明了我国社会主义制度的生命力和劳动群众的革命及创造能力，证明了我国英雄的人民为建设社会主义和共产主义的伟大事业而斗争的愿望和决心。"},{"type":"paragraph","text":"公报说，阿尔巴尼亚过去曾是欧洲最落后的一个国家，现在正在成为世界上农村完全电气化的首批国家之一。实现这一宏伟的事业，体现了我国革命的最崇高的革命目标之一，并且朝着提高劳动群众的福利和逐步缩小农村和城市之间的根本差别迈出了质的一步。"},{"type":"paragraph","text":"公报指出，电力输送到每个乡村，为农业和畜牧业的集约化发展开辟了无限的前景，为建立新的经济部门创造了可能，有力地推动了生产力和社会主义生产关系的发展。"},{"type":"paragraph","text":"公报说，在庆祝这一伟大胜利的时候，阿尔巴尼亚劳动党中央委员会向工人阶级、合作社农民、人民知识分子、人民军，向所有响应党的号召，以革命精神和空前的忘我劳动，提前实现农村电气化决议的人们，致以热烈的革命的祝贺。这一活动也最好地体现了阿尔巴尼亚人民在以恩维尔·霍查同志为首的党的周围的牢不可破的团结，体现了人民永远把党的号召、党的建设社会主义的纲领变为行动的决心。"},{"type":"paragraph","text":"公报说，阿尔巴尼亚劳动党中央委员会号召全体劳动人民以这次活动中所表现出来的英雄主义作为鼓舞、激励的旗帜，时刻准备胜利地完成我们面前的任务以及党在新的五年计划和党的第六次代表大会将要确定的新的巨大的目标，使社会主义祖国进一步繁荣富强。"},{"type":"paragraph","text":"公报说，阿尔巴尼亚劳动党中央委员会赞同群众的这一愿望：把十月二十五日，即最后一个农村实现电灯照明的日子宣布为“人民光明节”，并且每年纪念这一人民和党的伟大的历史性胜利。"},{"type":"paragraph","text":"公报最后说，这一节日将使我们的后代永远回忆起我国人民历史上的最光辉时期之一——我们今天正在生活着的这一光荣的时代。在这一时代，尽管帝国主义—修正主义的包围和封锁而造成了困难条件，但是阿尔巴尼亚人民依靠自力更生，以马克思列宁主义的不朽学说武装自己，在以恩维尔·霍查同志为首的光荣的党的领导下，依然奋勇前进并不断取得胜利。（附图片）"},{"type":"paragraph","text":"阿尔巴尼亚在现代化工业建设中取得了巨大成就。图为费里热电站工人在操纵台工作。　本报记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04fe528964"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
