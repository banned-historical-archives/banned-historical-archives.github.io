script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修残酷剥削劳动人民特权阶层营私舞弊　利用吃空额加紧剥削","authors":[],"dates":[{"year":1968,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修一小撮特权阶层分子营私舞弊成风，利用职权吃空额是他们最近剥削劳动人民的一种新方式。"},{"type":"paragraph","text":"据苏修《消息报》透露，乌克兰社会广告公司系统的画室主任格拉西金也擅长吃空额的办法。格拉西金还物色一些替他签字的合伙者。例如他找到了一个“喜欢赚外快”的中学庶务主任，一进门他就直截了当地提出了他的建议。"},{"type":"paragraph","text":"下面就是画室主任同这位庶务主任见面后的一段“绝妙”的对话:"},{"type":"paragraph","text":"格拉西金说:“需要一个画家……临时工作……于是就想到了你。”"},{"type":"paragraph","text":"庶务主任惊奇地说:“我算什么画家?我从来就没有拿过画笔。”"},{"type":"paragraph","text":"“不是让你拿画笔。”"},{"type":"paragraph","text":"“那让我干什么?”"},{"type":"paragraph","text":"“在收条上签名。”"},{"type":"paragraph","text":"“这还行，那你给多少钱?”"},{"type":"paragraph","text":"“十个卢布。”"},{"type":"paragraph","text":"“对我的签名的定价太低了。”"},{"type":"paragraph","text":"格拉西金心里发火，但是忍住了。他说:“十五个卢布行了吧。”"},{"type":"paragraph","text":"庶务主任最后说:“好吧，就这样吧。”"},{"type":"paragraph","text":"他们拍板成交了。庶务主任充当了为格拉西金在工资表上签自己名字的“活机器”，为此他每半个月得到十五个卢布。格拉西金于是每月又多领一百四十到一百七十卢布工资，除了付出签名费三十个卢布外，他全部据为己有。"},{"type":"paragraph","text":"据透露，两年来，格拉西金经营着他所发现的“金矿”，收买下许多人的签字，过着豪华阔绰的资产阶级生活。"},{"type":"paragraph","text":"今日苏联社会中的种种乌烟瘴气，正是苏修领导集团全面复辟资本主义的必然结果，这伙叛徒绝逃脱不了苏联人民的惩罚。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c571407c3b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
