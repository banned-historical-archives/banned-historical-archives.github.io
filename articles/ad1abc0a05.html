1976,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"歪风吹不倒的青年干部"},{"type":"paragraph","text":"无产阶级文化大革命初期，王爱珍还是一个刚刚摘下红领巾的红卫兵。经过大风大浪的严峻考验，她在两个阶级、两条道路、两条路线的激烈斗争中，茁壮成长，担任了中共山西省榆次市委常委、鸣谦公社北胡大队党支部书记，逐步锻炼成为一名敢于同党内走资派斗，敢于同修正主义路线斗的坚强战士。"},{"type":"paragraph","text":"去年冬季的一天，王爱珍看到了邓小平的一个“讲话”材料，思想上引起很多疑问。她与大队党支部副书记等几位同志讨论说：“我看了这个讲话，越想越觉得不是滋味，你们有没有这个感觉？”"},{"type":"paragraph","text":"一位同志惊奇地问："},{"type":"paragraph","text":"“有什么问题？”"},{"type":"paragraph","text":"王爱珍直爽地回答：“讲话中一句也没有提文化大革命，也不讲大寨的根本经验，更不说抓阶级斗争。左一个生产，右一个粮食，我看这里边有问题。”"},{"type":"paragraph","text":"那位同志听了有点紧张，他压低了嗓音对王爱珍说：“这可不能随便怀疑，你这话最好不要在会上说，不然……”还没等他说完，王爱珍接上说：“咱不怕，不管谁的讲话，只要是不符合毛泽东思想，我们就应该象大寨贫下中农那样，坚决进行抵制。”"},{"type":"paragraph","text":"过了一段时间，大队党支部讨论如何改进劳动管理的问题时，又展开了一场激烈的争论。"},{"type":"paragraph","text":"有的同志主张，改进劳动管理，主要是在工分上做文章，只有每天记好工，加班多记工，劳动多分红，才能调动起社员群众大干社会主义的积极性。"},{"type":"paragraph","text":"王爱珍一听就立即反驳说：“抓好阶级斗争，坚持无产阶级政治挂帅，才能调动社员的社会主义积极性，光在工分上打圈圈，就会走上修正主义的邪路。”那位同志瞪了她一眼，说：“这可不是我的意思，请大家听听。”说着拿出邓小平的一个“讲话”材料，就在会上念了一段。"},{"type":"paragraph","text":"王爱珍听完，霍地一下站起来，十分激动地说：“不管是谁讲的，凡是不符合毛泽东思想的，我们就要反对。毛主席教导我们：‘政治工作是一切经济工作的生命线。’大寨就一贯坚持无产阶级政治挂帅、毛泽东思想领先的原则。我们学大寨就是要学大寨的根本经验。如果搞工分挂帅、物质刺激那一套，那还不走到修正主义的邪路上去？不管怎么说，咱们一定要按照大寨的根本经验办。”"},{"type":"paragraph","text":"散会以后，王爱珍认真学习了毛主席有关阶级斗争的论述，反复思考了大寨的根本经验，起草了一个坚持无产阶级政治挂帅的关于改进劳动管理制度的意见。经过党支部和社员群众的充分讨论，立即在全大队推广了。"},{"type":"paragraph","text":"反击右倾翻案风的伟大斗争开始以后，党内最大的不肯改悔的走资派邓小平大搞翻案复辟的罪行被揭发了出来，北胡的贫下中农都称赞王爱珍路线斗争觉悟高，识别真假马克思主义的能力强，对大寨的根本经验认得准，对邓小平煽起的右倾翻案风顶得硬！"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad1abc0a05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
