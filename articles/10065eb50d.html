thors":["武汉东西湖兽牧场人事组干部"],"dates":[{"year":1959,"month":2,"day":22}],"is_range_date":false,"parts":[{"text":"关于豫东事件上中共中央内务部书","type":"title"},{"text":"武汉东西湖兽牧场人事组干部","type":"authors"},{"text":"内务部：","type":"paragraph"},{"text":"今天我要反映一个情况，请作参考。","type":"paragraph"},{"text":"我是在武汉市东西湖兽牧场工作，我所反映的是：河南省商丘专区的人跑到我们场的人很多。每天都有30—50人（劳动力）。在汉口车站每天下车100多人到东西湖去。这些人都是和我场工人是同乡，同村，亲戚和朋友，都是跑来要求做工，因为他们没有户口，我们也不敢收留，可又动员不走，只有我场工人给他们买饭吃，但对工人的生活影响很大，如职工薛XX的同乡从河南来5人，每天需吃十几斤饭，但薛无钱给他们买饭吃，又动员不走。我们追问原因，他们反应说：因社里假报成绩，争光荣，群众没饭吃。如虞城县小郭楼村，实收入8万多斤粮食，但上报了30多万斤。囤底下用柴草垫上，上面放粮食。这是留下的口粮，余粮卖出去后，群众无饭吃。再如夏邑县太平乡阎阁村，干部报小麦每亩530斤，其实每亩实收87斤。有一个60多岁的老大娘反映：在家有50天没吃过面啦，均吃萝卜、野菜。如有外来人和上级去参观时，就叫吃饭，吃好的。由于以上情况和原因，造成群众没饭吃，形成劳力外出，流动性很严重。同时也影响社会主义建设和生产。","type":"paragraph"},{"text":"他们这些人的反映是否真实，不了解实情，只是听他们反映后向你们反映一下，请做参考。我想他们都是20多岁或30多岁的劳动力，为什么要往外跑呢？家里的妻子老下都不顾了吗？但是河南人跑来的很多，我们也动员，给买车票送一些回河南，但有的送回河南后不到10天又跑回来了。为此，我们虽然做了很多工作，但河南为什么不制止呢？他们自己的人管理不住乱往外跑，我们的工人请假回家的给带上手铐关起来，也有的直接交到劳改队去劳动，工作证给收去。如孟献文搜去70多元，韩保善搜去100多元，拘留40多天，他们是逃跑回来的。现在我们的工人戴文荣（共产党员、复员军人）还在虞城县杨集公社押着、带着手铐不放。难道说工人请假回家就犯法了吗？他们并没有犯法，是河南的工作有问题。我的反映就到这里。","type":"paragraph"},{"text":"再见！","type":"paragraph"},{"text":"此致","type":"paragraph"},{"text":"敬礼！","type":"paragraph"},{"text":" 我是在武汉市东西湖兽牧二场人事组工作1959年2月22日","type":"paragraph"}],"comments":[],"origin":"河南省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10065eb50d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
