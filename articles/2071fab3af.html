ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"征调老兵补充志愿军具有极大意义","alias":"","parts":[{"type":"paragraph","text":"征调老兵补充志愿军具有极大意义"},{"type":"paragraph","text":"（1951年1月4日）各大军区，并告志司，九兵团："},{"type":"paragraph","text":"兹将华东、中南两区十二月开日对其所属的指示电发给你们参考。此次在全国范围内征调老兵（除新疆及入藏军），不但对志愿军的补充有极大意义，对整个人民解放军亦有极大意义，因为这样就使整个人民解放军的各部分均有志愿人员参加了抗美援朝战争，这件事的教育意义是很大的。请各大军区均认真进行这一征调工作，按时完成任务。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"一月四日[1]这是毛泽东为中共中央军委起草的给各大军区的电报。[2]志司，即中国人民志愿军司令部。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":509,"page_end":509},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2071fab3af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
