art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"简明新闻","authors":[],"parts":[{"type":"paragraph","text":"据新华社二月二十一日讯 据记者从国家建委了解：一九八○年我国有六十个大中型项目和一百八十三个单项工程建成投产，使能源、轻纺、交通、建材等薄弱环节增加了一批新的生产能力。"},{"type":"paragraph","text":"据新华社二月二十一日讯 中共中央副主席邓小平今天上午会见美国约翰·霍普金斯大学应用物理研究所顾问、清华大学名誉教授任之恭和夫人。"},{"type":"paragraph","text":"会见后，邓小平设宴招待任之恭和夫人。"},{"type":"paragraph","text":"据新华社二月二十一日讯 我国人民的消费品中，纺织品的比重在逐年增加。一九八○年，穿的商品已占全国消费品零售总额的百分之二十五，而一九七七年占百分之二十二。这个变化，反映出人民群众的穿着水平有了提高。继六十年代的确良大量供应市场以后，近几年来，中长纤维织物、化纤针织外衣、涤纶长丝织物以及一批性能良好的新纺织品种已经进入广大群众的消费领域。"},{"type":"paragraph","text":"据新华社二月二十一日讯 日本国际贸易促进协会理事长森田尧丸在结束访华回国之前对新华社记者说，他在这次访华期间得到的印象是，中国的经济调整将为日中双方的贸易发展打下扎扎实实的基础。"},{"type":"paragraph","text":"据新华社海牙二月二十日电 荷兰政府不顾中国政府的抗议和荷兰议会的否决，仍然坚持它准许向台湾出售潜艇这一错误决定。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29bc41aae3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
