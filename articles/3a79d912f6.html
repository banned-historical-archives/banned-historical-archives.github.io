:["广西师范学院","鲍铸陶"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——“人是高于温饱的”","type":"title"},{"text":"广西师范学院鲍铸陶","type":"authors"},{"text":"“人是高于温饱的。”","type":"appellation"},{"text":"但在上上下下的某些执事者们，对别人也好，对自己也好，却忽略了这一点。你们以为每个人都象你们一样，凭一系列的政治概念而生活，因为你们把握了实权，有各方面的保障，这当然是可以的，人们需要的却是民主自由，是人生权利，是自由自主的生活，你们企图用有限度的组织纪律来拢络人们，换取人们的信任，这是幻想，这只有对天生的奴才，才有效，而真正的人们是高于温饱的，他们所需要的不是施予而是创造，你们企图用集体主义，组织纪律的压力，把人们组织成一个机械的整体，是不可能的，因为人们决不是木偶，人是有个性有感情的，人们所需要的是人格的尊重，人权的尊严，只有恭顺的绵羊才任驱赶。","type":"appellation"},{"text":"不要再恕己而量人，不要再执迷不悟了，人们的力量，人们的思想是你们所无法限制和不能理解的。(赤子)","type":"paragraph"}],"comments":[],"origin":"《广西师院右派言论汇编第一辑》(中共广西师院委员会社会主义思想教育办公室，1957年11月)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a79d912f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
