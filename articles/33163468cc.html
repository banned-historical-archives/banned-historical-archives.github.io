art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永生永世做毛主席的好战士","authors":["全体指战员"],"parts":[{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。林副统帅的题词，说出了我们无限忠于伟大统帅毛主席的心里话。我们热血沸腾，群情激奋，千遍万遍地高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"“大海航行靠舵手”，舵手就是伟大领袖毛主席。过去，我们在毛泽东思想的指引下，从胜利走向胜利。今天，我们又靠毛泽东思想，和安庆地区的无产阶级革命派心连心，肩并肩，团结战斗在一起。当党内一小撮走资派进行疯狂反扑，残酷镇压无产阶级革命派时，毛主席的“人民解放军应该支持左派广大群众”的伟大号召，给我们指明了方向，增强了力量。我们用战无不胜的毛泽东思想正确分析形势，认真调查研究，坚决地支持了安庆地区无产阶级革命派，为人民立了新功。"},{"type":"paragraph","text":"正如林副主席指出的：“我们的一切成就，一切胜利，都是在毛主席的英明领导下取得的，都是毛泽东思想的胜利。”"},{"type":"paragraph","text":"毛主席啊，毛主席！您是当代最伟大的天才，最伟大的舵手。您的光辉思想战无不胜，威力无穷。有了您的思想，我们心明眼亮，立场坚定，意志如钢。有了您的思想，我们胜利不骄，斗志更旺，永远向前。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。我们决心做到：学习毛泽东思想如饥似渴，贯彻毛泽东思想完全彻底，宣传毛泽东思想满腔热忱，捍卫毛泽东思想赤胆忠心，紧跟毛泽东思想寸步不离。用最大的决心，最大的毅力，让毛泽东思想在头脑里深深扎根，大树特树伟大统帅毛主席的绝对权威，大树特树伟大毛泽东思想的绝对权威，大树特树毛主席无产阶级革命路线的绝对权威。永生永世做毛主席的好战士。"},{"type":"paragraph","text":"DW：6449部队"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33163468cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
