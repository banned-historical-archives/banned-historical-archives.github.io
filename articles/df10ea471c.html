实”指示十周年","authors":["武学军"],"dates":[{"year":1972,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛泽东思想的阳光雨露哺育下，上海民兵朝气蓬勃，斗志昂扬，日夜战斗在三大革命运动的第一线。他们在车间里，狠抓革命，猛促生产；在操场上，劈风斗雨，勤学苦练；在里弄里，披星戴月，进行战斗……。他们是宣传马列主义、毛泽东思想的战士，是建设社会主义祖国的闯将，是巩固无产阶级专政的尖兵。"},{"type":"paragraph","text":"为了贯彻执行毛主席关于民兵工作“三落实”的指示，他们认真看书学习，不断提高路线斗争觉悟，努力从思想上、行动上做到“召之即来，来之能战，战之能胜”。这里发表的一组小故事反映了他们战斗生活的几个侧面。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df10ea471c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
