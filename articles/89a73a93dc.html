"year":1952,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:全国高等学校的人民助学金制，在九月份开始了，从此，我们的膳费都由国家供给，而且经济困难的同学，仍可申请生活补助；从这件事情中，使我更加体会到政府对于我们的学习和健康真是照顾得无微不至。"},{"type":"paragraph","text":"今天，国家经济情况才开始好转，还要继续进行抗美援朝战争，巩固国防，在这国家财政开支仍相当浩大的时候，政府就决定实行人民助学金制，并且提高助学金标准，我觉得只有在毛主席的关怀下，我们才能得到这样的幸福，也只有在新的社会制度下才能实行这种伟大的决定。我决定要积极学习功课，学习政治，锻炼身体，做好调整院系工作，来回答祖国人民对我们的期望。　浙江农学院学生　何俊华"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89a73a93dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
