ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"军事攻势与政治攻势同时并举叫","alias":"","parts":[{"type":"paragraph","text":"军事攻势与政治攻势同时并举！"},{"type":"paragraph","text":"（1948年12月21日）林、罗、刘："},{"type":"paragraph","text":"攻击塘活的迟早，以我军由大活?或塘活附近是否可以炮击塘活海港和完全封锁塘沽来作决定。如果不能完全封锁，该地敌人仍有由海上跑掉的危险（据外国通讯社报导，国民党有一批军舰在塘沽附近），则我军应不惜疲劳，争取于尽可能迅速的时间内歼灭塘沽敌人。如果塘沽海港能由炮火完全封锁，敌人无法逃跑，则可从容部署攻击，不必性急，大体上于本月底或下月上旬夺取塘沽即可。据过去数日所得情报，敌在塘沽有八个师，在天津只有五个师，侯镜如3亦在塘沽，侯镜如从葫芦岛撤回很悲观，他自己的九十二军又被调往北平，故你们可用送信劝降方法去试一试，至少可以使他发生某种动摇。假如你们能用炮火完全封锁塘沽，使他感到走投无路，此种方法可能发生更多的效力。此外，你们还可起草公开的劝降书，发来中央审查作口语广播，并在前线印发传单。嗣后，每攻一城都可采用公开劝降的办法，即军事攻势与政治"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]大沽，位于天津市东部。攻势同时并举。"},{"type":"paragraph","text":"军委二十一日二十四时"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":443,"page_end":444},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb29d53f98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
