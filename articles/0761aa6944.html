art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以实际行动回答毛主席的无比关怀","authors":["三一六八部队全体指战员"],"parts":[{"type":"paragraph","text":"我们伟大的领袖毛主席视察大江南北的特大喜讯在我们心头引起的激情，还没有平静，象阵阵春风，从北京又传来了他老人家接见在京学习和开会的军事干部的喜讯。我们这些日夜守卫着祖国东北边境的指战员们，感到无限幸福，心情更加激动。我们千遍万遍地高呼：“毛主席万岁！万万岁！”也表达不尽我们对毛主席他老人家的无限热爱、无限忠诚、无限信仰、无限崇拜的心情。大家说，毛主席接见在京军事干部，就是接见我们全军指战员；毛主席对在京军事干部的关怀和希望，就是对全军指战员的关怀和希望。我们一定要以实际行动，紧跟毛主席的伟大战略部署，来回答我们最高统帅对全军指战员的无比关怀和期望。"},{"type":"paragraph","text":"在史无前例的无产阶级文化大革命中，毛主席赋予了我军以新的历史使命。我们遵照伟大领袖毛主席的指示，担负了驻地的“三支”“两军”工作。我们深深体会到，做好“三支”“两军”工作，最根本的就是要紧跟毛主席，紧跟毛主席就是胜利。"},{"type":"paragraph","text":"在毛主席的亲切关怀下，现在延边地区的文化大革命和全国一样，形势大好，农业生产一派丰收景象，革命大批判一浪高过一浪，“拥军爱民”的伟大号召越来越深入人心。最近我们紧跟毛主席的最新指示，深入到革命群众中去，帮助革命群众活学活用毛主席著作，破私立公，促进革命大联合。现在延吉市各条战线上的革命群众，在毛主席最新指示的鼓舞下，正在以“只争朝夕”的革命精神，为尽快实现延边地区的革命大联合和革命的“三结合”而努力。"},{"type":"paragraph","text":"国内外的阶级敌人对我国的文化大革命所取得的伟大胜利，怕得要死，恨得要命，随时都想进行破坏。我们全体指战员深深感到自己责任的重大，我们一定要提高革命警惕性，严防国内外阶级敌人的破坏，要像保护眼睛一样保护毛主席的伟大战略部署，誓将无产阶级文化大革命进行到底！"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0761aa6944"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
