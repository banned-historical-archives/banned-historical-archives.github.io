["孟繁甡","武汉测量制图学院","董金渊","邢荷芳","高时浏"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——诬蔑中国共产党","type":"title"},{"text":"武汉测量制图学院高时浏邢荷芳孟繁甡董金渊","type":"authors"},{"text":"“党的工作华而不实，很会说话，过去听了觉得头头是道，现在听了没有什么内容，听报告身边笔记本也不带了，从历史上看凡是刚刚执政的党都是励精图治，但慢慢就骄傲了，党的三大主义很厚，党委不要群众提意见就打回去，今天鸣放都是爱国的爱党的，不能认为是肃反不高兴。”（武汉测量制图学院  高时浏）","type":"paragraph"},{"text":"“党独揽大权，现在是党的天下，共产党本身是一个大宗派。党团员平时在一起或者商量问题都是宗派主义的表现。”（武汉测量制图学院  邢荷芳）","type":"paragraph"},{"text":"“党组织是‘局子’。”（即封建衙门）（武汉测量制图学院图书馆职员  孟繁甡）","type":"paragraph"},{"text":"“国民党没有共产党可恨，共产党员是阴森森的。”（武汉测量制图学院  董金渊）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac297f5ded"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
