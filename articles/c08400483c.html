{"year":1967,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持批判资产阶级的阶级斗争"},{"type":"paragraph","text":"北京市革命委员会常委、通县宋庄公社翟里大队大队长　邓万田"},{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席发出的“五·七”指示，已经一周年了。这一年，是无产阶级同资产阶级大决战的一年。通过这一年同资产阶级的较量，使我进一步体会到：毛主席在“五·七”指示中强调的学政治，批判资产阶级，就是要同阶级敌人作你死我活的斗争，就是要在阶级斗争中用毛泽东思想武装广大农民群众。我们翟里大队的贫下中农，在农村四清运动和文化大革命中，是一直在阶级斗争的大风大浪中受教育、受锻炼的。"},{"type":"paragraph","text":"一年多以前，旧北京市委派人来到翟里要为阶级敌人翻案，阶级敌人也蠢蠢欲动。这时候，我们贫下中农就学习毛主席著作，我们根据毛主席的“凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对”的教导，坚持斗争，一直到党中央和毛主席改组了旧北京市委，我们才胜利了。"},{"type":"paragraph","text":"今年二月，翟里的文化大革命中的两条路线斗争十分尖锐，一小撮坏人煽动不明真相的群众，对我们革命派实行白色恐怖。在这个危急的关头，我们还是坚持斗争，大家齐声朗读毛主席的教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”后来，在外单位的无产阶级革命派的支援下，我们又取得了胜利。这都是毛泽东思想的胜利。"},{"type":"paragraph","text":"六天以前，我们最最敬爱的伟大领袖毛主席在天安门城楼上接见了我们北京市革命委员会的成员，并和我们握了手。当我们激动地高呼“毛主席万岁，万万岁！”“祝毛主席万寿无疆！”的时候，他老人家慈祥地笑着，亲切地说：“谢谢！”“谢谢！”毛主席他老人家和广大群众，和我们贫下中农真是心连心啊！我们今后一定要更努力地读他老人家的书，听他老人家的话，照他老人家的指示办事，特别要照他老人家的“五·七”指示办事，把这个伟大的指示逐步地变成伟大的现实，把翟里大队办成培养一代新人的毛泽东思想大学校。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c08400483c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
