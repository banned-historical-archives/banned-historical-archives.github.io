<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶们的斗争推动着历史前进","authors":["黄耀南"],"dates":[{"year":1974,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最近，广州部队某部指战员到太平天国起义的地方——广西桂平县金田村，和贫下中农一起批判林彪、孔老二鼓吹“上智下愚”的唯心史观。下面是批判会上部分同志的发言摘要。"},{"type":"paragraph","text":"奴隶们的斗争推动着历史前进"},{"type":"paragraph","text":"贫农社员、太平天国文物讲解员　黄耀南"},{"type":"paragraph","text":"人类的历史是劳动人民创造的。可是，孔老二却说什么“无君子莫治野人，无野人莫养君子”。叛徒、卖国贼林彪也把自己吹成“天才”、“超人”，极力宣扬“上智下愚”的唯心史观。听到他们的这些胡话，我心里真是火冒三丈。"},{"type":"paragraph","text":"历史究竟是谁创造的？毛主席说：“在中国封建社会里，只有这种农民的阶级斗争、农民的起义和农民的战争，才是历史发展的真正动力。”就拿太平天国起义来说吧，当时的清朝封建政权残酷地压迫、剥削农民。我们桂平、贵县、平南一带，地主豪绅霸占了百分之八十以上的土地，向农民收租七、八成。一八五一年天大旱，庄稼颗粒无收。地主象恶狼一样催租逼债，农民饿死很多。在这种情况下，洪秀全领导广大穷苦人民举行了武装起义。起义军坚持斗争十八年，从根本上动摇了清朝政权，同时也抵抗了帝国主义的侵略。太平天国农民起义的英勇事迹，是奴隶们创造历史的一个铁证。"},{"type":"paragraph","text":"太平天国革命的主力军，是被压在社会最底层的贫苦农民。我祖父是地主的佃户，起义一开始，他就拿起大刀、长矛跟着洪秀全造反。当时，金田地区大部分穷苦农民都参加了革命。太平军的骨干队伍是紫荆山里的烧炭工人。他们无田无地，受苦最深。地主佬骂他们是“炭黑仔”。可是，就是这些“炭黑仔”，后来成了太平天国革命的台柱子，有的成了统率千军万马的军事领袖。东王杨秀清就是其中的一个。他家世世代代烧炭，九岁丧失父母，从小孤苦伶仃，受尽压迫。这样“贫贱”出身的“贱民”，在领导革命运动中，身经百战，智勇双全，清兵和帝国主义都很怕他。太平军的年青将领英王陈玉成，同样是贫苦出身。他在战斗中逐步成长，后来成了出色的革命将领。看！创造历史功绩，推动历史前进的就是这些工农群众。相反，那些封建地主、儒家学者，总是要开历史倒车。混入太平天国领导集团的地主分子韦昌辉，起初投机革命，到南京后，他搞反革命叛乱，杀害了杨秀清以及太平军将士两万多人。至于清朝皇帝和曾国藩等一帮反动派，都是镇压人民革命的大刽子手，都是企图拉着历史往后走的，只有推翻他们，历史才能前进。"},{"type":"paragraph","text":"太平天国起义和无数的历史事实，都证明了一个真理：“人民，只有人民，才是创造世界历史的动力。”有了毛主席领导工人阶级和广大劳动人民进行长期的革命斗争，才有今天社会主义的新中国。决不是什么“上智”、“天才”创造历史，而是奴隶们前仆后继的斗争推动着历史前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c008658a4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
