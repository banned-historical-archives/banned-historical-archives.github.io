" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"对转载《关于“特殊材料制成的”》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对转载《关于“特殊材料制成的”》"},{"type":"paragraph","text":"一文的批语"},{"type":"paragraph","text":"（1957年5月30日）乔木同志："},{"type":"paragraph","text":"此篇\"似可转载，何时转载适宜，请你和报馆商量一下。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"五月卅日"},{"type":"paragraph","text":"[1]指《新闻日报》1957年5月29日刊载的小雅写的《关于“特殊材料制成的”一和章乃器先生商》一文。在整风运动中，章乃器于1957年5月14日在《人民日报》上发表了一篇文章，题为《从“墙”和“沟”的思想基础说起》。文章说：“已经有不少人说过，党与非党之间有‘一道墙”“一条沟’。”“‘联共党史’记载了斯大林在哀悼列宁时候的誓词，一开头就说：“我们共产党员是具有特种性格的人。我们是由特殊材料制成的。”由于这一句话的影响，可能有不少非党人士便以特殊的眼光看待党员，某些修养不够的党员，也就不免以特殊自居了。这样，这一句话自然也就成为“墙”和‘沟”的一种思想基础了。”小雅不同意章乃器的这些说法，他在文章中说，所谓“特种性格”“特殊材料”，不同于旧时法国贵族所自谢的在他们身上流着“高贵的血液”，而是说作为工人阶级的先锋战士的共产党员，担负着伟大毛泽东全集第三十八卷的历史任务，献身于一个崇高的理想，他们必须具有大无畏的、自我牺牲的精神，必须具有前所未有的革命者的高尚品格，全心全意为人民服务的精神。至于“某些修养不够的党员”，看了斯大林的话，竟飘飘然以“特殊”自居了，这种情形不是没有，但这是他们自身的问题，不能据此就把斯大林的话贬为“墙”和“沟”的“思想基础”。根据毛泽东的批语，1957年6月8日《人民日报》转载了这篇文章。"},{"type":"paragraph","text":"1957年5月30日，毛泽东会见法国前总理埃德加·富尔和夫人。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":5,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":105,"page_end":106},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2410b2ed71"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
