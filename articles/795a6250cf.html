art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席是我们心中的红太阳","authors":["曹惠臣"],"parts":[{"type":"paragraph","text":"我是一九六二年八月高中毕业后入伍的。刚到部队，有不少私心杂念。读了毛主席的书以后，才懂得了全心全意为人民服务是一个革命战士的最高志愿，懂得了革命是一个革命战士的终身职责。听了毛主席的话，使我从一个幼稚的青年学生成为一个共产党员，革命干部；听毛主席的话，使我克服了工作中的许多困难，不断地有所前进。"},{"type":"paragraph","text":"实践告诉我：毛主席是我们心里的红太阳。听一辈子毛主席的话，干一辈子革命，学一辈子毛主席著作，永远当毛主席的好战士，这是我们革命战士的共同心愿！但是，邓拓居然恶毒地攻击毛泽东思想是“伟大的空话”，“陈词滥调”，“越说得多，反而越糟糕”。这和帝国主义、现代修正主义对我们党和毛主席的污蔑有什么区别呢？邓拓！你这个钻进我们党内，打着“红旗”反红旗的资产阶级和现代修正主义的走卒！几年来，你开黑店，结黑伙，说黑话，放黑线，尽干坏事！我们革命战士就是要群起而攻之，向你开火，向你反击！彻底打垮你们这伙反党反社会主义的黑帮。"},{"type":"paragraph","text":"毛主席教导我们：“凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对。”邓拓反对我们读毛主席的书，听毛主席的话，我们偏要读，偏要听！毛主席著作我们要学一辈子，子孙万代永远学，永远听毛主席的话！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"795a6250cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
