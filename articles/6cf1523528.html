三次简报（节录）","authors":[],"dates":[{"year":1951,"month":7,"day":9}],"is_range_date":false,"parts":[{"text":"云南玉溪地委关于清理工作进行情况第三次简报（节录）","type":"title"},{"text":"……目前病犯很多，河西，华宁，易门，江川，玉溪，关宁六个县的病犯达434人，近月来病死者32人，河西病犯占23％，计147名，病症以回归热（河西84人），癞病（易门近百人）及伤害痢疾为多。由于医药设备差，病势乃蔓延。患病原因主要是狱小人多，医药不足，天气渐热，管理不善。个别县因囚粮不足影响犯人健康。……河西目前问题为医生不足，医药设备太差及干部管理无经验。……","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cf1523528"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
