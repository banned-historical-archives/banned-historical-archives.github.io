<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji49","name":"毛泽东全集第49卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于干部问题的指示","alias":"","parts":[{"type":"paragraph","text":"关于干部问题的指示！！"},{"type":"paragraph","text":"（1967年4、5月）"},{"type":"paragraph","text":"我们一定不要脱离群众，不能脱离群众是一条；另外一条就是不能脱离马列主义。"},{"type":"paragraph","text":"我们党在四九年、五○年、五一年这三年当中，群众是拥护我们的，是尊重我们的，因为当时是艰苦朴素的，吃小米，住帐篷。当时刚打完仗，还有饱满的革命热情，和群众有密切的联系。"},{"type":"paragraph","text":"一九五二年以后情况就发生了一定的变化，我们干部在群众当中升始受冷落。当时，在于部当中实行了薪金制，军队住了营房，机关盖了高楼大厦，过去和群众在一起吃、穿、住，现在有些脱离群众了。为什么会这样？就是没有听我的话。刘少奇、高岗、彭德怀学习了苏联那一套。薪金制我是不赞成的。学苏联那一套我也是不赞成的。我们这次文化大革命要把它改变过来。"},{"type":"paragraph","text":"我们这些干部是经过长期锻炼的，还是要有些人站出来。现在的情况是：站出来就打。我们的事情总是要有人挂师的。红卫兵能挂帅吗？今天上台，明天就会被打倒，原因是政治上不成熟。现在我们要做很多工作，使那些主要干部站出来，哪怕是黎元洪?式的"},{"type":"paragraph","text":"[1]这是毛泽东在1967年4月29日至5月1日举行的中央常委、中央文革小组和政治局会议上讲话的一部分。"},{"type":"paragraph","text":"[2]黎元洪，1911年，武昌起义爆发，黎元洪被革命党人强迫推举为湖北都督。毛泽东全集第四十九卷人物也是好的，出来两年也好。红卫兵不行，没有经过锻炼，这样大的事情，信不过他们。"},{"type":"paragraph","text":"要依靠干部，干部绝大多数是好的，很多事是要让于部去办，政策靠他们去执行。有些省委书记要赶快解放出来，要让他们好好检讨。有的省委书记过去犯了错误，就是因为他们害怕群众，动员一些人去“保护”他们，结果害了自己。"},{"type":"paragraph","text":"对于犯有错误的干部，要正确对待，不能一概打倒。只要不是反党反社会主义分子而又坚持不改和累教不改的，就要充许他们改过，鼓励他们将功续罪。惩前后，治病救人，这是党的传统政策。只有这样才能使犯错误的本人心悦诚服，也才能使无产阶级革命派取得大多数人的衷心拥护，使自己立于不败之地，否则是很危险的。"},{"type":"paragraph","text":"要爱护干部，要支持革命领导干部出来，革命小将现在叫他们挂帅还不行，有个培养的过程，但小将是可爱的，是无产阶级革命事业的接班人。"},{"type":"paragraph","text":"我们现在要搞三结合，要使青年参加各方面的领导工作。不要看不起青年人，二十几岁、三十几岁都可以接受他们做事情，不把新一代搞上来怎么使他们受到锻炼？这个三结合就是老、中、小，就是二十岁以上就行了。"},{"type":"paragraph","text":"我们提倡青年人上台，有人说青年人没有经验，上台就有经验了。过去也提培养无产阶级革命事业接班人，那是从形式上讲的，现在要落实在组织上。"},{"type":"paragraph","text":"三结合，老、中、小要三结合，不主张把老干部都打倒，老干部一天天见上帝了。"},{"type":"paragraph","text":"国家机关的改革最根本的一条就是联系群众，机构改革要适合"},{"type":"paragraph","text":"关于干部问题的指示联系群众，不要搞官僚机构。"},{"type":"paragraph","text":"过去党团员受《修养》的影响脱离了群众，没有独立的意见，成了驯服工具，各地不赞成过早地恢复党团组织，过半年或一年后再恢复。文化大革命不仅对干部，而且也是对党团员的大审查，大多数一定是好的。有的干部群众意见较大，可过二三年以后再说工作，有些干部可以立即恢复工作。对于犯错误的人要给以改正的机会。联动要放出来，没有右派，就没有左派。搞薪金制军衔我从来就反对。"}],"authors":["毛泽东"],"dates":[{"year":1967}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":432,"page_end":434},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57c1d86ce7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
