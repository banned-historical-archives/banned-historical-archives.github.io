script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳《先锋报》谴责苏修搞“和谈”骗局出卖越南人民  各国人民要反帝必须同时反修  痛斥修正主义者散布的各种所谓“走向社会主义的不同道路”的谬论","authors":[],"dates":[{"year":1968,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳《先锋报》谴责苏修搞“和谈”骗局出卖越南人民"},{"type":"paragraph","text":"各国人民要反帝必须同时反修"},{"type":"paragraph","text":"痛斥修正主义者散布的各种所谓“走向社会主义的不同道路”的谬论"},{"type":"paragraph","text":"新华社墨尔本二十五日电　澳大利亚共产党（马克思列宁主义）机关报《先锋报》二十五日发表文章指出，各国人民在进行反帝斗争的同时，必须进行反对以苏修叛徒集团为中心的现代修正主义的斗争。"},{"type":"paragraph","text":"文章说，在最近几年里，世界革命运动的经验表明，除非在进行反帝斗争的同时，进行严肃的、不屈不挠的反修斗争，否则，反帝斗争就不能进行到底。"},{"type":"paragraph","text":"文章驳斥了各种各样的所谓“走向社会主义的不同道路”的谬论。文章强调说：“‘走向社会主义的不同道路’的时髦说法，其目的是要掩盖停止对资产阶级进行阶级斗争的做法和掩盖复辟资本主义的阴谋。”"},{"type":"paragraph","text":"文章说，对澳大利亚革命派说来，学习有关最近印度尼西亚事态发展的文件是十分重要的。“今天，印度尼西亚革命人民开始进行反对苏哈托—纳苏蒂安法西斯军人政权的武装斗争。在这场斗争中，将会建立起一支强有力的群众的革命力量。印度尼西亚的革命人民走上了胜利的道路，毛泽东思想所照亮的道路。”"},{"type":"paragraph","text":"文章接着说：“修正主义者背离了人民战争的航向。他们以为，他们用不着军队，用不着战斗，光靠施展种种手腕就能获得解放。”"},{"type":"paragraph","text":"“现代修正主义的中心是苏联领导集团。这个集团正在处心积虑地制止越南的人民战争，而依靠谈判。”"},{"type":"paragraph","text":"文章强调，被压迫民族和人民“只有全心全意投入由当代最伟大的马克思列宁主义者毛主席领导的世界革命运动，才能取得真正的独立”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e02e3b72e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
