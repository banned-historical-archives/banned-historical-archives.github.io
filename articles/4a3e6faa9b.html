art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"时刻不忘读毛主席的书","authors":[],"parts":[{"type":"paragraph","text":"贺相魁从早到晚没啥闲时间。本来连里规定，三十多头猪由一个人专管，外加一个人帮忙。他却主动要求自己一个人喂。为了节省开支，他还经常四处拾菜叶；放猪的时候，也带着麻袋、绳子，不是打猪草，就是拾柴禾。"},{"type":"paragraph","text":"工作再忙，他一刻也没有忘记学习毛主席著作。去年夏天，他刚从游泳集训队回来，连里让他休息一天，处理一下个人问题。他知道炊事班人手少，衣服也没顾得换，就跑到伙房干了起来。中午，大家都休息了，他一个人就翻开《愚公移山》，一字一句地读了起来。"},{"type":"paragraph","text":"工作越是困难，越是艰苦，贺相魁就越是努力读毛主席的书。有次他托坯垒猪圈，整整干了一天，晚上回来还要煮猪食。工作间里又闷又热，衣服全被汗水湿透了，就在这种情况下，贺相魁也不放松学习。他点起马灯，一边烧火，一边拿起《毛主席语录》，认真地学起来。平日，他学得最多的是《为人民服务》、《纪念白求恩》和《愚公移山》，在这三篇文章里画满了道道，写满了体会。他记得最牢的是“完全”“彻底”四个字，只要一想起毛主席为人民服务的教导，他就觉得浑身有用不完的力量。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a3e6faa9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
