<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"扎根农村　为限制资产阶级法权而战斗","authors":["毛永霞"],"dates":[{"year":1975,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"扎根农村　为限制资产阶级法权而战斗"},{"type":"paragraph","text":"江苏省如东县新店公社七大队下乡知识青年　毛永霞"},{"type":"paragraph","text":"伟大领袖毛主席最近指出：“我国现在实行的是商品制度，工资制度也不平等，有八级工资制，等等。这只能在无产阶级专政下加以限制。”毛主席的这一教导，深刻地指出了在社会主义社会还不可避免地存在着资产阶级法权，以及对它加以限制的必要性。"},{"type":"paragraph","text":"如何对待资产阶级法权，是限制还是扩大？这是社会主义社会两个阶级、两条道路和两条路线斗争的一个重要方面。在毛主席革命路线的指引下，无产阶级文化大革命以来，我国各条战线涌现出的一大批社会主义新生事物，都是从各个方面对资产阶级法权的冲击和限制，都是为了巩固和加强无产阶级专政。知识青年上山下乡，这是对缩小三大差别、限制资产阶级法权有深远意义的革命措施。林彪反党集团对此特别仇恨，诬蔑知识青年上山下乡“等于变相劳改”，拚命扩大城市同农村之间、脑力劳动同体力劳动之间的差别，妄图把知识青年变成新的贵族阶层。知识青年上山下乡充满着两个阶级、两条路线和两种思想的激烈斗争。从我的亲身实践看来，我觉得知识青年要做缩小三大差别、限制资产阶级法权的自觉战士，必须注意以下几个问题。"},{"type":"paragraph","text":"对资产阶级法权思想的影响，要坚决抵制。我下乡以后，经过三大革命运动的锻炼，加入了共青团，担任了大队团支部书记。正当我沿着毛主席指引的方向胜利前进的时候，由于林彪反革命的修正主义路线的干扰，社会上出现了一股煽动知识青年返回城市的歪风。有些和我一起下乡的知识青年，通过一些渠道离开了农村。我的家里很羡慕这种作法，也通过私人关系帮我在城里找到一个工作，并写信要我立即回去。"},{"type":"paragraph","text":"面对这种情况，应该怎样对待呢？大队党支部书记对我说：“一种潮流来了，就盲目地跟着跑，这是很危险的。种田人秧苗稗草要分清，干革命两条路线要辨明。你可要站稳脚跟呀！”一席话，对我教育很大。我反复学习毛主席的《青年运动的方向》这篇光辉著作，认识到实行不实行与工农群众相结合，这是区别一个青年是革命或不革命的试金石；知识青年扎根农村，就是用实际行动缩小三大差别。于是，我毅然给家里写信，表达了自己扎根农村干一辈子革命的决心。通过学习毛主席关于理论问题的重要指示，我进一步弄清楚了，家里那次对我“拔根”，要我回城市工作，就是资产阶级法权思想的影响在作怪。可见，欣赏资产阶级法权那一套，就会偏离毛主席的革命路线，走上资本主义邪路。"},{"type":"paragraph","text":"对扩大资产阶级法权的行为，要坚决斗争。在我下乡第四年的冬天，我的一个亲戚利用给我所在公社农机厂支援机器的机会，要把我弄进这个厂里去。我想，机器是国家的，利用支援机器的机会谋私利，不就是利用方便开后门、搞不正之风吗？我越想越觉得不对头，就及时写信拒绝，并对这个亲戚进行了批评。现在，我更加清楚地认识到，这种把知识青年当作商品来交换的做法，就是在扩大资产阶级法权。我们有的同志受了商品交换原则的侵蚀，自觉或不自觉地把自己甚至自己的子女当成商品，进行交易，这是十分危险的！"},{"type":"paragraph","text":"对资产阶级法权思想的引诱，要及时识破。一九七三年春节，我回城探亲期间，有人怕我在乡下“受苦受累”，要给我在城市郊区介绍一个对象，说这样可以舒舒服服地过一辈子。我意识到，这是对我扎根农村的又一次挑战，就斩钉截铁地回答：“我要坚持知识青年上山下乡的正确方向，甘愿在农村艰苦奋斗一辈子！”最近，学习了马克思主义关于无产阶级专政的理论，我更加清醒地意识到，在生活上能不能及时识破资产阶级法权思想的引诱，是关系到能不能沿着毛主席指引的与工农相结合的道路走到底的问题。"},{"type":"paragraph","text":"一次斗争一堂课。从自己在扎根农村的征途上遇到的几次斗争中，我总结出一条经验，这就是：知识青年要扎根农村，就要敢于同资产阶级法权思想斗。资产阶级法权的存在，是产生资本主义和新的资产阶级分子的重要的经济基础。我们革命青年对于资产阶级法权和资产阶级法权思想的影响，必须旗帜鲜明地进行抵制，争当缩小三大差别的促进派，带头做限制资产阶级法权的模范，为把巩固无产阶级专政的任务落实到基层而努力奋斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf18003970"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
