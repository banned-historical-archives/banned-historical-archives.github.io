rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"修正主义者的真面目南斯拉夫将和英意联合举行海军演习","authors":[],"parts":[{"type":"paragraph","text":"新华社莫斯科31日电 据苏联“海军报”今天报道，西德的“午报”据刚来自贝尔格莱德的消息说，南斯拉夫海军今年8月间将在亚得里亚海中部和北部进行有北大西洋集团参加国英国和意大利的军舰参加的海军学习。演习将由英国海军上将指挥。"},{"type":"paragraph","text":"据“午报”说，这次演习是南斯拉夫倡议进行的，演习的目的是“保护从西方去南斯拉夫的船队”。这家西德报纸指出，如果不算至今还保守秘密的、有英国军舰参加的1951年南斯拉夫海军演习，那末，第二次世界大战以后，南斯拉夫海军还没有进行过类似的演习。这家报纸认为，从军事观点看来，南斯拉夫将举行的有北大西洋集团成员国参加的这个演习是“意味深长的”。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07ae0db7cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
