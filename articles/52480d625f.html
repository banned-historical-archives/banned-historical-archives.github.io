dates":[{"year":1966,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"多出好纸　支援文化大革命"},{"type":"paragraph","text":"广州造纸厂提前完成年计划"},{"type":"paragraph","text":"据新华社广州六日电　广州造纸厂革命职工坚决贯彻执行毛主席抓革命，促生产的指示，在文化大革命运动中，活学活用毛主席著作，把在文化大革命中焕发起来的冲天干劲用到生产上，促进了生产的发展，全厂提前完成了今年的生产计划。和去年同期相比，这个厂今年在产品质量稳定上升的基础上，各类纸的总产量提高了百分之一七点三二；劳动生产率也有所提高，成本有所降低。"},{"type":"paragraph","text":"无产阶级文化大革命运动开始以后，职工们决心多出纸、出好纸，支援文化大革命。从七月份起，日产量节节上升，十月份创造了建厂以来日产量的最高纪录。"},{"type":"paragraph","text":"过去，这个厂用马尾松生产的商品木浆，质量一直不如其他兄弟厂好。半年来，工人们群策群力先后革新四十多项工艺操作和机械设备，终于使马尾松造的木浆，达到了白松、白杨木浆的质量水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52480d625f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
