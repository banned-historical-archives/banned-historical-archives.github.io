art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把资产阶级“权威”连根拔掉","authors":["徐恒禄杨继尧傅本礼"],"parts":[{"type":"paragraph","text":"某些所谓“权威”老爷们，打着“学者”、“权威”的招牌，吃着劳动人民的饭，穿着劳动人民的衣，干的却是反党、反毛泽东思想的勾当。告诉这些“权威”老爷们，你们用毒笔、毒舌向毛泽东思想射出的毒箭，除了暴露你们的丑恶嘴脸外，丝毫也无损于毛泽东思想的伟大光辉。我们工农兵群众对毛主席有着比海还深的阶级感情。毛泽东思想是我们的命根子，谁反对毛泽东思想，谁就是我们的敌人。不管是“三家村”还是“四家村”，不管有多大“权威”，多高的地位，多响的名声，也不管是明的暗的，文的武的，只要反对毛泽东思想，反对工农兵学习毛主席著作，我们就要统统把他们连根拔掉。"},{"type":"paragraph","text":"战斗英雄 徐恒禄"},{"type":"paragraph","text":"毛主席的书是写给我们劳动人民看的书，毛主席的话说出了我们劳动人民心里的话，毛主席的理论是我们求解放、干革命的理论。我们能够学好它，也一定能够掌握它。我要学习一辈子毛主席的书，听一辈子毛主席的话，狂风恶浪打不动我学习的决心，什么鬼“权威”也阻挠不了我的革命理想。某些“权威”老爷，妄想不让我们学习和掌握毛泽东思想，妄想阻挡我们干革命，叫我们走资本主义的邪路，这是作梦！不管你是什么“权威”，只要反对毛泽东思想，反对我们学习毛主席著作，我们就同你斗争到底，把你彻底打倒。"},{"type":"paragraph","text":"战士 杨继尧"},{"type":"paragraph","text":"毛主席教导我们：“如若敌人起劲地反对我们，把我们说得一塌糊涂，一无是处，那就更好了，那就证明我们不但同敌人划清了界线，而且证明我们的工作是很有成绩的了。某些“权威”老爷们污蔑我们活学活用毛主席著作是“庸俗化”、“实用主义”，正说明我们学习毛主席著作是很有成绩的。我们革命的人民掌握了毛泽东思想，什么人间奇迹都可以创造出来。过去，我们用毛泽东思想推翻了三座大山，赶走了黑暗，建立了一个社会主义的新中国。今后我们还要用毛泽东思想打倒帝国主义、现代修正主义和一切反动派，建立一个没有人剥削人的新世界。这个历史发展趋势是任何人也改变不了的。不管是帝国主义、修正主义，还是资产阶级的“权威”老爷，都无法阻挡这个历史车轮的前进；你们要违背历史发展的规律，就要把你们碾得粉身碎骨。"},{"type":"paragraph","text":"副团长 傅本礼"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44b7c29ac6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
