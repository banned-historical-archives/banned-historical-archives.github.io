","河南医学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"朱简文的右派言论","type":"title"},{"text":"河南医学院朱简文","type":"authors"},{"text":"(朱简文：河南医学院会计科会计)","type":"subtitle"},{"text":"镇反时党的宽大政策是假的，真的坦白了该杀的还是杀，共产党可以籍口不杀不足以平民愤来搞。","type":"paragraph"},{"text":"党在运动中是不忠实的，共产党统治一切。","type":"paragraph"},{"text":"三反思想改造交待材料，一遍两遍通不过，在精神上受到很大的创伤，肃反运动也是如此太残忍了一些，这到底是谁不忠诚不老实，而是相信投机的勇敢分子害人不浅。","type":"paragraph"},{"text":"农业合作化“左倾”完成了农业合作化任务，所以发生供求矛盾，要不是毛主席，不知人饿死多少人。","type":"paragraph"},{"text":"党比反革命罪更大，整风的办法和风细雨，本身就是宗派主义，肃反平白把人打骂一顿，官僚主义造成的损失不比肃反中的重点罪恶大吗？为什么要和风细雨，反正政权在手愿咋搞咋来。","type":"paragraph"},{"text":"整风开始是：“知无不言，言无不尽；言者无罪，闻者足戒”，现在变成了“知不敢言，言不敢尽，闻者记账，言者挨整”。","type":"paragraph"},{"text":"×××在反右派的掩护下贩卖私货，拿别人给共产党献礼，想藉此早点入党。拥护党的人都是随声附和。","type":"paragraph"}],"comments":[],"origin":"《右派言论集》（河南医学院马列主义教研室编印，1958年4月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1afbda4e0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
