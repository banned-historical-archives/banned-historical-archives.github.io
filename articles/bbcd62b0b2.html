tes":[{"year":1998,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　据新华社二月十日报道，规模空前的二十世纪书法大展，今日上午在中国美术馆开幕。毛泽东巨幅草书《七律·长征》真迹首次展出。"},{"type":"paragraph","text":"二十世纪书法大展动用了中国美术馆的全部十个展厅，同时推出四大展览。毛泽东书于一九六二年四月二十日的《七律·长征》，是一幅一点九七米乘零点四六五米的横卷巨制，在《二十世纪著名书法家遗作展》中展出。朱德、董必武、陈毅等老一辈无产阶级革命家的作品，还有孙中山、康有为、梁启超、鲁迅、郭沫若与黄宾虹、徐悲鸿、潘天寿、齐白石、张大千等近百位著名人士的遗作，也在这个展览中展出。另外的三个展览是《当代中国书坛名家作品展》、《全国第七届中青年书法篆刻家作品展》和《全国第四届篆刻艺术展》。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbcd62b0b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
