script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平副总理  会见日本学术文化代表团  会见时乔冠华外长等在座","authors":[],"dates":[{"year":1975,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理"},{"type":"paragraph","text":"会见日本学术文化代表团"},{"type":"paragraph","text":"会见时乔冠华外长等在座"},{"type":"paragraph","text":"新华社一九七五年四月五日讯国务院副总理邓小平今天上午会见了以日本京都大学名誉教授、著名汉学家吉川幸次郎为团长的日本学术文化代表团，同他们进行了友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团团员有：茅诚司、石川淳、越智勇一、堀江薰雄、樱田一郎、永井龙男、弥永昌吉、长尾雅人、内村直也、中村光夫、川野重任、林健太郎、小西甚一、森口繁一、佐伯彰一、藤泽令夫、中根千枝、曾野绫子、卫藤沈吉等日本学术文化界的著名人士。"},{"type":"paragraph","text":"日本驻中国大使小川平四郎，大使馆公使柳谷谦介等也参加了会见。"},{"type":"paragraph","text":"中国方面参加会见的有：外交部长乔冠华、中日友协会长廖承志、对外友协会长柴泽民、文化部负责人刘庆棠和周培源教授、周一良教授、作家浩然，以及有关方面负责人杨骥、孙平化、王晓云、单达圻、徐敦信、唐家璇。（附图片）"},{"type":"paragraph","text":"左图：邓小平副总理会见日本学术文化代表团。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"乔冠华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f95f492ff3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
