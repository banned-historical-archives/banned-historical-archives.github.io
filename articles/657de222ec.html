tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘主席等领导人吊唁罗荣桓同志","authors":[],"parts":[{"type":"paragraph","text":"新华社22日讯 刘少奇、朱德、林彪、邓小平等党和国家领导人，今天上午在举行公祭罗荣桓同志仪式前，来到劳动人民文化宫，以无比沉痛的心情，吊唁亲密战友罗荣桓同志。"},{"type":"paragraph","text":"今天九时许，刘少奇、朱德、林彪、邓小平、彭真、李富春、刘伯承、贺龙、乌兰夫、陈伯达、康生、薄一波、聂荣臻、李雪峰、罗瑞卿、杨尚昆、叶剑英、郭沫若、黄炎培、陈叔通、李维汉、林枫、张鼎丞、阿沛·阿旺晋美等，先后来到罗荣桓同志灵堂，默哀悼念，轮流守灵，并慰问了罗荣桓同志的家属。"},{"type":"paragraph","text":"中国人民解放军高级将领今天参加了守灵。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"657de222ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
