ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"在中央关于安徽问题决定稿中加写的一段话","alias":"","parts":[{"type":"paragraph","text":"在中央关于安徽问题决定稿中"},{"type":"paragraph","text":"加写的一段话\""},{"type":"paragraph","text":"（1967年4月1日）"},{"type":"paragraph","text":"许多外地学生冲入中南海，一些军事院校冲进国防部，中央和军委并没有斥责他们，更没有叫他们认罪、悔过或者写检讨，讲清问题，劝他们回去就行了。而各地把冲军事机关一事，却看得太严重了。"},{"type":"paragraph","text":"[1]周恩来1967年3月30日送审的中共中央关于安徽问题的决定稿共五条，其中第二条讲到：“不得把群众打成反革命”，不准乱捕人。仅仅因为冲军区和对军区提意见，或对本地区、本单位的夺权有不同意见，而被打成反革命”的，应一律平反，被捕的，应一律释放，通缉令，应一律取消。”在此后面，毛泽东加写了这段话。4月1日，中共中央下发了这个决定。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":4,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":408,"page_end":408},"tags":[{"name":"毛泽东","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b34bfa6a0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
