鼓舞朝鲜人民从胜利走向胜利","authors":[],"dates":[{"year":1960,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜劳动党决定隆重纪念列宁诞辰九十周年"},{"type":"paragraph","text":"维护列宁主义反对国际修正主义"},{"type":"paragraph","text":"列宁的旗帜鼓舞朝鲜人民从胜利走向胜利"},{"type":"paragraph","text":"新华社平壤7日电　朝鲜劳动党中央委员会主席团最近通过了关于隆重纪念列宁诞辰九十周年的决议。（编者注：4月21日是列宁诞辰）"},{"type":"paragraph","text":"决议说，列宁主义是朝鲜整个革命过程中的指路明灯，是朝鲜人民争取自由和幸福的斗争的旗帜。"},{"type":"paragraph","text":"决议说，朝鲜劳动党继承了在列宁主义旗帜下进行的抗日民族解放斗争的光荣革命传统，通过同国内外各式各样的敌人进行的激烈斗争，维护了马克思列宁主义的事业，并且创造性地把马克思列宁主义的革命原理应用到朝鲜，从而在社会主义建设和和平统一祖国的斗争中取得了辉煌的胜利。今天伟大的列宁思想正在朝鲜发出灿烂的光辉，它的光荣的旗帜正在鼓舞着朝鲜人民为争取更幸福的未来而进行斗争。"},{"type":"paragraph","text":"决议要求在劳动党党员和劳动人民中进行各种政治工作，使他们坚决地反对国际修正主义和维护列宁主义，并使他们加强同苏联共产党和苏联人民的联系。"},{"type":"paragraph","text":"决议中规定了一项关于庆祝列宁诞辰九十周年的计划。根据这项计划，平壤、各省会、各城市以及工厂、建筑工地、农村、机关、学校和居民区将举行报告会。"},{"type":"paragraph","text":"各地将举行纪念列宁诞辰的图片展览会。还将举行纪念“电影周”，放映关于列宁生活和活动的影片以及朝鲜人民抗日游击战争的影片。"},{"type":"paragraph","text":"计划还规定出版大量关于列宁的书籍和组织各种活动，以便教育人民进一步加强同以苏联为首的社会主义阵营各国的友谊和团结。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8c6b8e2a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
