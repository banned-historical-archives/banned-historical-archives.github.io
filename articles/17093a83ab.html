ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"关于原林办工作人员处理问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于原林办工作人员"},{"type":"paragraph","text":"处理问题的批语2"},{"type":"paragraph","text":"（1975年6月30日）中央："},{"type":"paragraph","text":"林办各下级人员，责任较轻，不宜久在学习班。似宜早作结论，免予追究，分配工作，以观后效。"},{"type":"paragraph","text":"请讨论决定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九七五年六月三十日[1]林办，指林彪办公室。"},{"type":"paragraph","text":"[2]这是对蒋葆生1975年6月24日来信的批语。信中说，我是一个共产党员，原系北京医院医生，“九一三”事件前被组织派往林彪处做保健工作。“九一三”事件后，组织上决定我参加学习班，集中学习，到现在已近4年，而我的问题如同其他学员一样，至今仍未作出正式结论。当前，全国正遵照您的指示，认真落实政策，我感到十分鼓舞，渴望自己也能早日回到原工作单位，为党、为人民做一点有益的工作。同时，也希望其他学员同志的问题能够得到妥善的解决。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":6,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":39,"page_end":39},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"九·一三事件","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17093a83ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
