["张春桥"],"dates":[{"year":1967,"month":6,"day":17}],"is_range_date":false,"parts":[{"text":"张春桥关于上海高校运动的讲话","type":"title"},{"text":"张春桥","type":"authors"},{"text":"〖摘录〗","type":"appellation"},{"text":"现在你们就象我们去年搞文化革命初期那样，不知怎么搞下去，要在实践中想问题，尊重群众的首创精神。眼睛要看到新的苗子要出来，不要只看到逍遥派，不要重复过去当权派不看主流的错误。象同济、新师大大联合，新的东西就会出来，目前处于两个阶段的过程中，将会出现大量的新生事物。主要的精力，发现新生事物，支持群众的首创精神，找出斗批改的道路。可以大鸣大放、大辩论，我们就靠群众运动，靠群众的智慧，才能把文化大革命进行到底。后边的仗是持久一点，又不是几个月就打下来了，比不得把常溪萍、杨西光拉下来，那么容易。","type":"paragraph"},{"text":"主席在去年七月就讲，大学怎么改？还不是靠大学里的人？主席当时指着到会的人说：“你去行吗？你也不懂物理学，不懂……”","type":"paragraph"},{"text":"要依靠群众，从不是当权到当权，可能我们的群众观点不当心也会出问题的，不注意群众，总想我们是高明的。现在最明显的，各个省市委瘫痪了，农业收成还是很好的，可见人民决定着历史的命运。原来很多人担心，会不会收成受影响，没有估计到充分发动群众的力量。我们自己实在不行，完全靠你们。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"zhangchunqiao","name":"春桥文录","internal":false,"type":"pdf","official":false,"author":"张春桥","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/zhangchunqiao.pdf"],"article":{"title":"张春桥关于上海高校运动的讲话","parts":[{"type":"title","text":"张春桥关于上海高校运动的讲话"},{"type":"paragraph","text":"〖摘录〗"},{"type":"paragraph","text":"现在你们就象我们去年搞文化革命初期那样，不知怎么搞下去，要在实践中想问题，尊重群众的首创精神。眼睛要看到新的苗子要出来，不要只看到逍遥派，不要重复过去当权派不看主流的错误。象同济、新师大大联合，新的东西就会出来，目前处于两个阶段的过程中，将会出现大量的新生事物。主要的精力，发现新生事物，支持群众的首创精神，找出斗批改的道路。可以大鸣大放、大辩论，我们就靠群众运动，靠群众的智慧，才能把文化大革命进行到底。后边的仗是持久一点，又不是几个月就打下来了，比不得把常溪萍、杨西光拉下来，那么容易。"},{"type":"paragraph","text":"主席在去年七月就讲，大学怎么改？还不是靠大学里的人？主席当时指着到会的人说：“你去行吗？你也不懂物理学，不懂......”"},{"type":"paragraph","text":"要依靠群众，从不是当权到当权，可能我们的群众观点不当心也会出问题的，不注意群众，总想我们是高明的。现在最明显的，各个省市委瘫痪了，农业收成还是很好的，可见人民决定着历史的命运。原来很多人担心，会不会收成受影响，没有估计到充分发动群众的力量。我们自己实在不行，完全靠你们。"}],"authors":["张春桥"],"dates":[{"year":1967,"month":6,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"",
