" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji3","name":"毛泽东全集第3卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"“省宪经”与赵恒物","alias":"","parts":[{"type":"paragraph","text":"“省宪经”与赵恒惕"},{"type":"paragraph","text":"（1923年8月15日）"},{"type":"paragraph","text":"…·自湘西问题发生，赵氏地位动摇，不能不假省宪以自卫，故前数日即令其党羽方克刚李济民等以金钱买公团通电，或作一群众运动·…·寓拥护赵氏于维持省宪之中.···定五号午前八时举行游街，·….彼辈发信以工人团体为多，以为工人头脑简单，必有千余人可来，是日候至十时，不特无一团体到会，即私人参与者亦只彼辈亲朋数人而已，彼等焦急万分，乃派人四出，至素为匪徒包办之中华工会及养济院佛化讲演院等处，每人大洋五角，并备点心一餐，雇请百数十人，于十二时出发游街，游街之先，在教育会幻灯场开会，一党和尚叫化等共-一百二三十人。首由："},{"type":"paragraph","text":"（1）和尚炽培主席，报告开会宗旨，略谓："},{"type":"paragraph","text":"省宪法不如谓之省宪经，如佛家之有佛经·..坐中和尚叫化即两手乱舞；"},{"type":"paragraph","text":"（2）散会后出发："},{"type":"paragraph","text":"-一书省宪维持会"},{"type":"paragraph","text":"一书省民请愿大会；前有大旗二面第一队一一为长衫马褂队，俨然省民代表，约二三十人；第二队一中华工会，约五六人；第三队一一佛化讲演团，光头博衣，约四五十人；第四队一养济院，约四十人；五光十色.····演此丑剧，尽滑稽之能事.···（见民国日报）"},{"type":"paragraph","text":"我们历来反对联省自治，因为他不是联省自治，乃是联督割据；我们历来反对军阀烂政客假窃名义的省宪，因为他不能做人民的保障，反做了军阀烂政客争权争利的保障，湖南最是个明证。赵恒惕现在堂哉皇哉兴“护宪之师”了，而他两年来一有省宪以来一一惨杀劳工（黄庞等），勒封报馆（大公报，自治新报，新湘报），剥夺人民书信自由（邮电检查员未曾撤去一日），剥夺集会结社自由（封人力车工会，封碾谷工会，封外交后援会，多次禁止学生工人的集会），庇护其军队贩卖栽种鸦片烟，贿买选举（派遣属员私造省宪的总投票，用钱私造省议会，用钱买的省长），向商人勒捐（长沙总商会会长，屡被迫逃），向农人提征田赋（有些县提征到民国十七年），破坏法定的预算此例减教育实业费增加军费，勾结吴佩孚萧耀南，何一不是戴省宪假面具与人民为敌！他这次兴师动众，也是和蔡钜猷争鸦片税（所谓特税）起始。赵恒惕这样万恶不赦的东西，居然还在那里假借名义大吹大擂“护宪”，真不怕羞死湖南人！"}],"authors":["毛泽东"],"dates":[{"year":1923,"month":8,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":60,"page_end":61},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7ffb787db"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
