ear":1977,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英副主席会见港澳工人代表团"},{"type":"paragraph","text":"新华社一九七七年五月三日讯　中共中央副主席叶剑英今天下午会见前来北京参加“五一”国际劳动节的港澳工人代表团。"},{"type":"paragraph","text":"当叶副主席来到会见大厅同代表团全体成员见面时，全场响起热烈的掌声。叶副主席高兴地向大家说，同志们节日好。他同杨光团长、梁培副团长等热情握手，并同代表团全体成员一起合影留念。叶副主席向港澳同胞和工人弟兄表示了亲切的慰问，并同他们进行了亲切的谈话。叶副主席在谈话中讲述了以华主席为首的党中央一举粉碎“四人帮”反党集团后，半年多来全国人民在华主席英明领导下，继承毛主席的遗志，努力抓革命促生产，各条战线出现的大好形势。"},{"type":"paragraph","text":"廖承志、罗青长、刘振华、刘锡昌、王静儒、梁上苑等同志参加了会见。（附图片）"},{"type":"paragraph","text":"中共中央副主席叶剑英五月三日会见前来北京参加“五一”国际劳动节的港澳工人代表团。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daef1c1894"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
