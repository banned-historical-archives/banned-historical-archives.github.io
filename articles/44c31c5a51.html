art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"交流劳动中活学活用毛泽东思想的经验","authors":[],"parts":[{"type":"paragraph","text":"本报讯 阜新矿务局革委会在军队代表的带动下，经常针对革委会成员在参加集体生产劳动中产生的活思想，召开活学活用毛泽东思想讲用会，破除各种思想障碍，不断提高参加劳动的认识，使革委会成员进一步增强了参加集体生产劳动的自觉性，促进了思想革命化，巩固了新生的革命政权。"},{"type":"paragraph","text":"在局革委会成立后的第一次全委会上，革委会主任、军队代表张健奎就组织大家反复学习了毛主席关于“必须坚持干部参加集体生产劳动的制度”的教导，总结了过去有些干部因为长期脱离劳动犯走资派错误的教训，大家一致决定，要把干部参加劳动作为一项制度坚持下来。开始，大家纷纷深入矿井参加劳动。过了不久，有些同志又慢慢“浮”上来，坐办公室的时候多了。怎样及时有效地帮助干部自觉地坚持参加生产劳动呢？革委会从一次讲用会上受到了启发。"},{"type":"paragraph","text":"在一次讲用会上，革委会副主任、革命群众代表王禄，讲用了他在坚持参加劳动中保持革命本色的体会。王禄原来是海州露天矿的电镐司机，全国劳动模范。从群众选他当局革委会副主任的第二天起，就一直挎着工具包，始终身不离群众，手不离劳动。无论什么时候，都做到毛主席著作学在前，斗私批修走在前，艰苦工作干在前，生死关头冲在前。群众亲切地称他是“没有办公室的好主任”、“联系群众的贴心人”、“不脱离劳动的好矿工”。听了他的讲用，许多革委会成员深受教育，都自觉地深入井下坚持劳动。有个革命群众代表，经常浮在上面忙于事务，群众批评他高高在上。这次听了讲用，他立即回到原来的班组，和工人实行“五同”，既改造了思想，又帮助工人解决了很多实际问题，受到了工人的好评。"},{"type":"paragraph","text":"通过这次讲用会，张健奎认识到：干部在劳动中有许多活学活用毛泽东思想的深刻体会，总结交流这些经验，既深刻又实际，针对性也强。开好这种讲用会，就能帮助干部坚持参加集体生产劳动。于是，他建议局革委会把经常召开讲用会，作为推动干部坚持参加劳动的一个措施。以后，革委会就经常针对革委会成员在劳动中出现的活思想，召开讲用会，有针对性地总结交流经验。有个时期，有的革委会成员担心到一个地方参加劳动，不了解全局情况，抓不住主要矛盾，丢掉了面上的工作。张健奎就在讲用会上介绍了自己在五龙煤矿一边坚持参加劳动、一边做好工作的体会。这个矿前一个时期塌方事故较多，革委会为此发了不少通令、文件，都没有得到很好解决。张健奎便带着这个问题，在和工人一起劳动中进行调查，发现原来是有的工人图省事，赶进度，打支撑木太少造成的。他立即和大家一起分析了安全和进度的关系，提高大家的革命责任感，发动大家制定安全措施，从而大大减少了事故。同时，他还在井下帮助工人解决了矿灯充电不足、上下班乘车不便、井下工学矛盾等问题。这样，到上面找革委会解决问题的人大大减少了，矿革委会忙于事务的现象也大大减少了。大家从张健奎的实践中看到，革委会成员下去参加劳动，对问题了解深，抓得准，解决快，见效大，能更好地指导面上的工作，及时消除了抓了点丢掉面的顾虑。"},{"type":"paragraph","text":"今年以来，他们开了八次这种讲用会。通过讲用，树立了坚持参加劳动的先进典型，传播了坚持劳动的先进思想，带出了坚持劳动的优良作风，有力地推动了各级干部更好地坚持参加集体生产劳动的制度。许多基层革委会都以局革委会为榜样，检查自己，找出差距，迎头赶上，促进了各级领导班子和广大机关干部的思想革命化。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44c31c5a51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
