r":1954,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十一日电】　中央人民政府毛泽东主席，在十一日下午五时在中南海勤政殿接见了达赖喇嘛·阿旺洛桑丹增嘉措和班禅额尔德尼·罗桑慈勒伦珠却吉坚赞。同时被接见的还有他们的随行的高级僧俗官员林仓活佛、赤江活佛、朵金洛桑尼玛、噶玛巴活佛、孔管家、阿沛·阿旺晋美、计晋美、德吉才仁等。"},{"type":"paragraph","text":"接见时在座的有:中央人民政府副主席刘少奇、宋庆龄、李济深、张澜，中央人民政府政务院副总理郭沫若、黄炎培，中国人民政治协商会议全国委员会副主席陈叔通，中央人民政府民族事务委员会主任委员李维汉，副主任委员汪锋。"},{"type":"paragraph","text":"接见时在座的还有中央人民政府驻西藏代表张经武将军和中国人民解放军西藏军区副政治委员范明将军。"},{"type":"paragraph","text":"在接见时，达赖喇嘛和班禅额尔德尼向毛泽东主席致敬和献哈达，然后他们还向刘少奇、宋庆龄、李济深、张澜副主席，郭沫若、黄炎培副总理，陈叔通副主席，李维汉主任委员献了哈达。"},{"type":"paragraph","text":"接见完毕，毛泽东主席和达赖喇嘛、班禅额尔德尼等进行了亲切的谈话。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1954\\09\\549c010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e潘文煦\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e铜图说明　　九月十一日，毛泽东主席接见达赖喇嘛和班禅额尔德尼及其他高级僧俗官员等。图为接见后合影。自左至右:(前排)李维汉、黄炎培、张澜、宋庆龄、班禅额尔德尼、毛泽东、达赖喇嘛、刘少奇、李济深、郭沫若、陈叔通；(后排)平错汪阶、德吉才仁、阿沛·阿旺晋美、噶玛巴活佛、范明、赤江活佛、张经武、林仓活佛、汪锋、朵金洛桑尼玛、孔管家、计晋美、齐燕铭、余心清。　(新华社无线电传真稿　潘文煦　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72c3d0f4ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
