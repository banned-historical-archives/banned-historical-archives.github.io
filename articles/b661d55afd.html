":[{"year":1994,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席纪念堂接受一微雕精品"},{"type":"paragraph","text":"本报北京１月１９日讯记者卢继传、张安南报道：今天，福建省漳州市委、市政府向毛主席纪念堂献出中国第一部《毛泽东选集》大型微雕精品。"},{"type":"paragraph","text":"刚刚完成的这部微雕精品，采用魏碑、行楷字体，把《毛泽东选集》一至四卷中的１０７．２万字雕在１００枚形状各异、精心磨制的名贵寿山石上，每平方厘米约刻４００字。象征毛泽东百年诞辰的１００块寿山石拼成了中国地图形状。"},{"type":"paragraph","text":"这部大型寿山石微雕，是南靖县文化馆许通海历时１年３个月创作完成的。在雕刻期间，日本、新加坡等国家和地区的客商欲出巨资，请许通海去雕刻。许通海婉言谢绝了：“金钱固然重要，但我对毛主席的感情超过金钱。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b661d55afd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
