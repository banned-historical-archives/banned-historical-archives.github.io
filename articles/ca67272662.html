tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"勇于揭发假报道被表扬 一再制造假报道受处分","authors":["袁良/朱英秋"],"parts":[{"type":"paragraph","text":"本报讯 某部政治机关发出通报，表扬勇于揭发《小画家有了用武之地》这篇虚假报道，维护新闻真实性的孙金财等同志；同时，直属党委又作出决定，给予搞虚假报道的作者杨光霖同志党内警告处分，并将其调离政治机关和新闻工作岗位。"},{"type":"paragraph","text":"表扬通报说，共产党员、班长孙金财等同志，为维护党报威信，积极向领导和报社反映真实情况，揭露虚假报道，充分表现了一个共产党员和革命战士高度的革命原则性，反映了部队贯彻落实全军政工会议精神已经取得可喜成果，实事求是的优良传统和作风更加深入人心。通报号召全体指战员学习孙金财等同志，坚决同报道工作和其它各项工作中的弄虚作假现象作斗争。"},{"type":"paragraph","text":"处分决定指出，杨光霖同志身为共产党员、新闻工作干部，无视新闻真实性的原则，一再弄虚作假，编造假报道，欺骗读者，严重损害了党报威信，在军内外造成恶劣影响。为了严肃党纪，教育本人和广大干部战士，决定给予纪律处分。"},{"type":"paragraph","text":"九月二十六日，在某部的宣传工作会议上，部队领导宣读表扬通报和宣布处分决定后，到会同志一致拥护，一位从事新闻工作多年的同志感慨地说：“这样做就对了！”（袁良、朱英秋）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca67272662"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
