ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"给陈理昆“的信","alias":"","parts":[{"type":"paragraph","text":"给陈瑾昆\"的信"},{"type":"paragraph","text":"（1947年11月18日）瑾昆同志："},{"type":"paragraph","text":"十月八日来示敬悉。国内外大势观察正确，不会有第二个方向，进度亦快，不会稽延不决，诚如尊论。惟我们宁可作从长打算，估计到一切可能的困难，以自力更生精神，准备付以较长时间，似属有益。兄及诸同志对于宪草惨淡经营，不胜佩慰。惟发表时机尚未成熟，内容亦宜从长斟酌，以工农民主专政为基本原则（即拙著《新民主主义论》及《论联合政府》中所指之基本原则），详由王谢?二同志面达。弟身体有时略有毛病，大体尚好，勿以为念。天寒尚祈珍摄。"},{"type":"paragraph","text":"敬祝安好！并问陈夫人及诸小弟妹好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四七年十一月十八日江青附笔祝全家安好！[1]陈瑾昆，当时任中共中央法律委员会委员。"},{"type":"paragraph","text":"[2]王，指王明，当时任中共中央法律委员会主任。谢，指谢觉哉，当时是中共中央法律委员会负责人之一。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":403,"page_end":403},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdb2faf7e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
