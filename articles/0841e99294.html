"year":1974,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:否定无产阶级文化大革命，扼杀社会主义的新生事物，就是妄图复辟倒退。在深入批林批孔的斗争中，我们必须紧密联系这个实际。这对于巩固和发展无产阶级文化大革命的胜利成果，巩固无产阶级专政，坚持无产阶级专政下的继续革命，击退复辟倒退的右倾思潮，是十分必要的。在斗争中，我们要从两个阶级、两条路线斗争的高度认识问题，决不能就事论事；要牢牢掌握斗争的大方向，坚决执行党的方针政策，严格区分和正确处理两类不同性质的矛盾。这样，就能团结一切可以团结的力量，把斗争不断引向深入，夺取胜利。广大革命干部和革命知识分子，要积极参加这场斗争，努力改造世界观。一些受孔孟之道毒害较深的知识分子，在这场斗争中进行自我教育，工农兵对他们的进步是欢迎的。那些妄图开历史倒车、逆历史潮流而动的顽固派，必将被前进的历史车轮碾成尘埃!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0841e99294"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
