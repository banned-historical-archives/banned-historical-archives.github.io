ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"给程潜的信","alias":"","parts":[{"type":"paragraph","text":"给程潜的信"},{"type":"paragraph","text":"（1949年7月4日）颂云先生勋鉴："},{"type":"paragraph","text":"备忘录诵悉。先生决心采取反蒋反桂及和平解决湖南问题之方针，极为佩慰。所提军事小组联合机构及保存贵部予以整编、教育等项意见均属可行，此间已派李明灏兄至汉口林彪将军处，请先生派员至汉与林将军面洽，商定军事小组联合机构及军事处置诸项问题。为着迅赴事功打击桂系，贵处派员以速为宜。如遇桂系压迫，先生可权宜处置一切。只要先生决心站在人民方面，反美反蒋反桂，先生权宜处置，方均能谅解。诸事待理，借重之处尚多。此间已嘱林彪将军与贵处妥为联络矣。"},{"type":"paragraph","text":"毛泽东午支支毛"},{"type":"paragraph","text":"?"},{"type":"paragraph","text":"3.6成六前原夫及桂，先生带宣更我不均"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":7,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":539,"page_end":540},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28247f4077"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
