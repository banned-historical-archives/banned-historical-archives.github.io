地工人和学生纷纷展开反对剥削和压迫的斗争","authors":[],"dates":[{"year":1969,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议失业、贫困、饥饿和农业危机"},{"type":"paragraph","text":"意大利福贾省三万工人学生大示威"},{"type":"paragraph","text":"那不勒斯、米兰等地工人和学生纷纷展开反对剥削和压迫的斗争"},{"type":"paragraph","text":"据新华社二十六日讯  罗马消息：意大利工人、学生反对垄断资产阶级残酷剥削和压迫的群众斗争浪潮，此伏彼起，继续高涨。"},{"type":"paragraph","text":"在意大利南部的福贾省，三万工人、学生和居民二十三日举行了声势浩大的示威，抗议失业、贫困、饥饿和农业危机。这是愤怒的群众八天以来在福贾省接连举行的第三次抗议示威。"},{"type":"paragraph","text":"在意大利的第三大城市那不勒斯，一千多名罢工的码头工人二十四日在闹市区举行了持续五个小时的示威，要求提高工资和就业。他们沿途高呼口号，并举着许多标语牌，上面写着：“权力归工人阶级”、“意大利有九十万人失业，那不勒斯有九万人失业”。数百名警察使用高压水龙，并挥舞着警棍，对示威者进行了野蛮的袭击，打伤了几十名工人。工人们用石头英勇地进行自卫还击，同警察浴血搏斗。"},{"type":"paragraph","text":"意大利国营广播电视网的一万名职工和记者，二十六日举行了二十四小时罢工，要求提高工资和参加管理。"},{"type":"paragraph","text":"在意大利的第二大城市米兰，二千多名罢课的学生二十四日又一次上街举行示威，抗议学校反动当局镇压学生。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"071f16c773"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
