script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"非洲民族主义政党代表热烈欢呼我第三次核爆炸  毛泽东思想是取得伟大成就的指路明灯  中国核武器使被压迫人民不受美帝讹诈","authors":[],"dates":[{"year":1966,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"非洲民族主义政党代表热烈欢呼我第三次核爆炸"},{"type":"paragraph","text":"毛泽东思想是取得伟大成就的指路明灯"},{"type":"paragraph","text":"中国核武器使被压迫人民不受美帝讹诈"},{"type":"paragraph","text":"新华社达累斯萨拉姆十一日电　驻在这里的非洲民族主义政党代表热烈欢呼中国成功地进行了含有热核材料的核爆炸。"},{"type":"paragraph","text":"阿扎尼亚"},{"type":"paragraph","text":"（南非）泛非主义者大会总司库恩科博十日向新华社记者表示祝贺时说，“毛泽东思想是取得这次伟大科学成就的指路明灯。”"},{"type":"paragraph","text":"他指出，这次核爆炸的成功“再一次增强了世界和平的保障。核武器掌握在广大人民手中是安全的，因为在他们手中的核武器只能是为了防御”。"},{"type":"paragraph","text":"他强调指出，美国和欧洲国家的核垄断已经结束了，因为属于亚非的一个国家今天也拥有了最现代化的武器。这对这些正在同帝国主义和新老殖民主义进行斗争的人民有着重大的意义。"},{"type":"paragraph","text":"西南非洲人民组织主席萨姆·努乔姆说，西南非洲人民组织向中华人民共和国政府进行这次核爆炸的伟大成就表示祝贺。"},{"type":"paragraph","text":"他说：“西南非洲人民组织认为中国人民进行的这次爆炸是对于保卫世界和平的巨大贡献。”他说，这是对帝国主义势力的极大打击。"},{"type":"paragraph","text":"来自南非、津巴布韦和西南非洲的许多自由战士看到新华社记者时都同他热烈握手，对中国人民所取得的这一新的重大成就表示由衷的高兴，并且向中国人民表示祝贺。"},{"type":"paragraph","text":"新华社开罗十一日电　在开罗的非洲自由战士九日晚上向新华社记者表示，他们对中国成功地进行了含有热核材料的核爆炸感到欢欣鼓舞，并且对中国人民所取得的这个新的重大成就表示热烈祝贺。"},{"type":"paragraph","text":"阿扎尼亚（南非）泛非主义者大会代理主席勒巴洛说：“阿扎尼亚泛非主义者大会为中国核爆炸成功的光辉成就而欢呼，这是对以美国为首的帝国主义的沉重打击。全世界被压迫人民对中国人民按照毛泽东主席思想而取得的辉煌成就感到高兴。”"},{"type":"paragraph","text":"贝专纳人民党驻开罗代表波比·马克说：“贝专纳人民党祝贺中国人民、工人、科学家和工程师进行核爆炸的巨大成功。我们民族解放运动认为这是对我们反对以美国为首的帝国主义和保卫世界革命人民的民族独立的共同斗争的巨大贡献。中国的核武器是用来保卫世界和平的，不象帝国主义的武器是用来进行侵略的。”"},{"type":"paragraph","text":"巴苏陀兰大会党代表马帕法尼说：“我们巴苏陀兰大会党人要强调这一事实：中国人民的伟大成功是一切反对帝国主义的被压迫人民的成功。掌握在爱好和平的中国人民手中的核武器是为了保卫世界和平和人民的，而掌握在帝国主义手中的核武器是用来进行侵略的。”"},{"type":"paragraph","text":"莫三鼻给革命委员会军事书记马赫卢扎说：“我们莫三鼻给人民对中国的核爆炸成功感到非常非常的高兴。中国拥有的核武器保护我们被压迫人民不受美帝国主义核讹诈政策的威胁。我们被压迫人民在斗争中的确感到鼓舞，而美帝国主义者及其走狗却不高兴。我们祝贺中国人民的伟大成就。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19fb18e038"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
