右倾机会主义反党集团”向中央、华东局的报告","authors":[],"dates":[{"year":1962,"month":4,"day":25}],"is_range_date":false,"parts":[{"text":"中共福建省委关于平反“以江一真同志为首的右倾机会主义反党集团”向中央、华东局的报告","type":"title"},{"text":"[省委常委会1962年4月24日通过]","type":"subtitle"},{"text":"中央、华东局：","type":"appellation"},{"text":"我们于1959年9、10月间，召开了省委第一届第十六次全体（扩大）会议，对江一真、魏金水、卢叨等同志进行了批判斗争。 10月8日向中央和主席作了「关于以江一真同志为首的右倾机会主义反党集团的处理意见的请示报告」，10月16日通过了「关于以江一真同志为首的右倾机会主义反党集团的错误的决议」。经过甄别复查，说明当时对他们的批判斗争，以及向中央的请示报告和省委全体（扩大）会议的决议都是错误的，应予平反。","type":"paragraph"},{"text":"造成这一错误的主要原因，在于当时我们具有严重的「左」的情绪，对党的八届八中全会的精神讨论不够，领会不深，没有划清右倾机会主义反党问题和在党的路线和组织原则范围内对于具体工作，具体措施抱有不同意见的原则界限；思想上主观、片面，不实事求是，冷静分析问题；采取了简单化的斗争方法，对被批判的同志没有给予申辩的机会，具有逼供信的错误，这和几年来我们贯彻执行党的民主集中制不够，党内民主生活不正常有密切关系。这些都是我们应该引以为训的。","type":"paragraph"},{"text":"我们除向中央，华东局作检讨，并向江一真，魏金水、卢叨等同志道歉以外，建议撤销对他们的处分，恢复他们被撤销的原有工作职务，恢复他们的名誉。我们准备在中央审核批示以后，在五、六月份召开省委扩大会议上，撤销省委第一届第十六次全体(扩大)会议的决议，并通报福建全党。","type":"paragraph"},{"text":"在扩大的中央工作会议后，我们已进一步部署，要求各级党委，认真执行中央，华东局历次指示，切实抓紧并做好甄别工作；对在近年来历次运动中凡是被批判处理错了的同志，都要迅速纠正错误，以达到团结全党，做好工作的目的。","type":"paragraph"},{"text":"以上报告，请中央，华东局批示。","type":"paragraph"},{"text":" 1962年4月25日","type":"paragraph"}],"comments":[],"origin":"钟兆云、王盛泽《赤子之心——江一真传》(香港：天地图书有限公司，2008)584-586页。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de879c91f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
