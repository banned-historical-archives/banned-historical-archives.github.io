[{"year":1946,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我乡嘉兴，地当沪杭要冲，八年来抗战期内，受创最深，所有热闹市街，焚毁殆尽，在沦陷时，不良份子藉敌伪势力，设立建筑事务所，强迫建造房屋，完工后迫令业主限期缴付重价购回，当时于产权处于淫威之下，忍痛缴付。此次胜利光临，普天同庆，讵意县府借名处理敌产，限令业主续备重价，订定每幢六七十万元法币取赎，雷厉风行发表于当地报纸，有“逾期不赎，勒令迁出”等语。窃业主中仅赖一二幢房屋为生活者居多，何来如此巨款?势非破产不可。此种设施殊与还政于民相背而驰，实属罗掘民财，假公济私，为此吁请社会公正人士，以民主正义立场，纠正此越权行为，不胜幸甚!"},{"type":"paragraph","text":"嘉兴小市民钱庚上"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1abe1fd845"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
