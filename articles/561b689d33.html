],"dates":[{"year":1970,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对残酷剥削　争取切身权利"},{"type":"paragraph","text":"秘鲁工人学生不畏强暴展开斗争"},{"type":"paragraph","text":"新华社十七日讯　利马消息：秘鲁工人、学生最近以来不断开展反对残酷剥削、争取切身权利的斗争。"},{"type":"paragraph","text":"在首都利马，数百名城市建筑工人六日走上街头，在市中心举行集会和示威游行，抗议失业人数急剧增加和要求提高工资。据报道，目前秘鲁有三十多万城市建筑工人失业。全国的失业人数已超过一百万。"},{"type":"paragraph","text":"在游行中，工人们不畏强暴，与前来镇压的反动军警展开了激烈的搏斗。"},{"type":"paragraph","text":"位于利马南面的巴尔内亚罗斯市的城市建筑工人提出要开展工人和农民的联合斗争，达到彻底打倒他们的阶级敌人和夺取政权的目的。"},{"type":"paragraph","text":"阿雷基帕省查皮铜矿的四百余名工人五日宣布罢工，要求增加工资。"},{"type":"paragraph","text":"同时，秘鲁学生为反对禁止大学生进行政治活动的大学法的斗争正在不断发展。"},{"type":"paragraph","text":"在利马，圣马科斯大学医学院的学生六日冲上街头，举行游行示威。学生们不顾警察用催泪弹等武器的野蛮进攻，展开了英勇搏斗。"},{"type":"paragraph","text":"阿亚库乔省的乌亚曼加大学学生四日和五日连续两天与反动军警进行激烈战斗。在斗争中四名学生英勇负伤。警察开枪镇压学生的暴行，激起了学生家长和当地居民的极大愤慨，他们也纷纷投入了斗争。"},{"type":"paragraph","text":"在库斯科，圣安东尼奥·德阿瓦德大学学生最近举行多次示威游行。学生们还占领过大学的校舍。"},{"type":"paragraph","text":"特鲁希略的数百名学生连日来也在市中心举行抗议示威，号召人民反对当局颁布的大学法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"561b689d33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
