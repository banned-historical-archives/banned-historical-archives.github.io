<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命职工高举毛泽东思想伟大红旗走自力更生道路  邢台大型现代化煤矿投入生产","authors":[],"dates":[{"year":1968,"month":10,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命职工高举毛泽东思想伟大红旗走自力更生道路"},{"type":"paragraph","text":"邢台大型现代化煤矿投入生产"},{"type":"paragraph","text":"据新华社石家庄十二日电　在全国掀起斗、批、改的新高潮，革命、生产捷报频传的大好形势下，我国煤炭工业战线又传来了一个振奋人心的喜讯：具有我国煤矿建井独特风格、年产数十万吨的大型现代化矿井——邢台煤矿，已在最近正式投入生产。"},{"type":"paragraph","text":"邢台矿井是由我国自己设计、自己施工、自己装备的大型竖井。从采掘、运输到提升，整个生产过程完全是机械化的。煤质优良，是很好的工业用煤。经过试产，所有建筑、安装工程完全符合质量要求。邢台煤矿的投入生产，标志着我国煤矿建井技术有了新的发展。"},{"type":"paragraph","text":"邢台矿井的建成，是毛主席的无产阶级革命路线的胜利。参加矿井建设的广大革命职工，高举毛泽东思想伟大红旗，发扬敢想、敢干的无产阶级革命精神，狠批了中国赫鲁晓夫及其在煤炭部门的代理人推行的反革命修正主义路线，冲破洋框框，坚持走毛主席指引的自力更生、艰苦奋斗的道路，在一无资料、二无样板可借鉴的情况下，克服重重困难，夺得了胜利。十米厚的流沙层，这在我国凿井史上是史无前例的，在国外也是少见的。中国赫鲁晓夫在煤矿部门的代理人曾从外单位调来一些资产阶级技术“权威”来负责这项工程，结果这些人白白浪费了国家大量资材，只留下一个烂摊子。"},{"type":"paragraph","text":"毛主席教导说：“在某种意义上来说，最聪明、最有才能的，是最有实践经验的战士。”有着丰富实践经验的建井工人，凭着一颗无限忠于毛主席，无限忠于毛主席的无产阶级革命路线的红心和高度的革命责任感，突破一道道难关，成功地进行了一百多项技术革新，圆满地完成了这项工程。"},{"type":"paragraph","text":"在今年五月召开的全国煤炭工业会议上，矿井的工人代表两次幸福地受到了我们的伟大领袖毛主席和毛主席的亲密战友林副主席的接见。毛主席的亲切关怀，极大地鼓舞了广大革命职工。他们在工程处革命委员会的领导下，坚决贯彻全国煤炭工业会议的决议，深入持久地开展革命的大批判，坚持以革命统帅生产，推动革命和生产都出现了新局面，大大加快了施工进度。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8c42e9e18"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
