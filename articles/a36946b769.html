art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"歌唱毛主席派来的菩萨兵","authors":["克"],"parts":[{"type":"paragraph","text":"雪山的牡丹十里红，"},{"type":"paragraph","text":"牡丹送给解放军。"},{"type":"paragraph","text":"解放军是勇敢的神鹰，"},{"type":"paragraph","text":"是毛主席派来的菩萨兵。"},{"type":"paragraph","text":"帮助我们藏族人民"},{"type":"paragraph","text":"扑灭了残暴的叛匪，"},{"type":"paragraph","text":"赶走了灾难的魔影。"},{"type":"paragraph","text":"我们重建了幸福的家园，"},{"type":"paragraph","text":"我们看到了美好的黎明。"},{"type":"paragraph","text":"洁白的哈达情谊深，"},{"type":"paragraph","text":"哈达献给解放军。"},{"type":"paragraph","text":"解放军是吉祥的彩凤，"},{"type":"paragraph","text":"是毛主席派来的菩萨兵。"},{"type":"paragraph","text":"帮助我们藏族人民"},{"type":"paragraph","text":"摧毁了黑暗的农奴制，"},{"type":"paragraph","text":"翻身分地作主人。"},{"type":"paragraph","text":"百万农奴得解放，"},{"type":"paragraph","text":"齐声欢唱“东方红”。"},{"type":"paragraph","text":"青稞煮酒香味浓，"},{"type":"paragraph","text":"美酒敬给解放军。"},{"type":"paragraph","text":"解放军呀是亲人，"},{"type":"paragraph","text":"是毛主席派来的菩萨兵。"},{"type":"paragraph","text":"帮助我们藏族人民"},{"type":"paragraph","text":"开发宝藏开荒地，"},{"type":"paragraph","text":"万水千山架长虹。"},{"type":"paragraph","text":"军民永远一条心，"},{"type":"paragraph","text":"同建社会主义大家庭。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a36946b769"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
