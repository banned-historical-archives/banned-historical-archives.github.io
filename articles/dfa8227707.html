<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"三反简讯","authors":[],"dates":[{"year":1952,"month":4,"day":19}],"is_range_date":false,"parts":[{"text":"三反简讯","type":"title"},{"text":"▲沈阳珐琅厂在“三反”运动中，先后草率地把尚未处理的贪污犯放回工作岗位，影响很坏。该厂先将原在化验室工作的日籍技师、贪污犯松本(贪污受贿东北币二亿二千多万元、人民币六百多万元)、见习技术员、贪污犯沈德才(贪污受贿盗窃东北币一亿六千多万元、人民币四千三百多万元)未宣布处理就放了回去，理由是“工作需要”；以后，该厂厂长觉得看管贪污犯浪费人力，又把药炉车间主任、集体贪污盗窃案的主犯陈庆有(党员)同样没有宣布处理便放回工作岗位，说是让他“继续工作，听候处理”。如药炉车间主任陈庆有不但偷盗，而且进去一贯压制民主，对工人进行报复，工人不敢说话，恨之入骨。这次他回到车间，有些工人就以为“主任又上台了”，大为不满。","type":"paragraph"},{"text":"▲沈阳市分三批处理了全市百分之九十二的工商户后，预计在四月十五日攻下大盗窃犯，因进展不快，已决定展期五天。和平区围攻五金行十几个大盗窃犯已月余，仍相持不下。各区都有这种现象产生。因此，部分干部便想草率地把大盗窃犯推给人民法庭处理。有的产生急躁情绪，南市、北市等区使用变相肉刑逼供。","type":"paragraph"},{"text":"▲萍乡煤矿贪污现象严重。目前初步暴露了三个大贪污集团。第一个：经理科(管卖煤)。从科长起，到广州、汉口、长沙、株州等分站主任、会计、管理运输人员，莫不贪污。第二个：材料科(管买材料)。从处长(从前叫处)起，到两个分厂主任、库主任、采购员到验收员，绝大部分贪污。第三个：土木事务所(管房屋建筑工程)。从所长起，到工程师、技术员共十一人，全部贪污。这些贪污分子百分之九十以上是留用人员。大老虎全是留用人员，其贪污手段有数十种。被贪污去的款项近百亿元(已定案的有五十余亿元)。这个数目比该矿一九五零年经营所获全部利润还多；加上浪费数目(极不完全材料：浪费四十余亿元)，比该矿一九五一年经营所得全部利润也要多。劳动果实大部被盗窃的严重事实使全矿职工大为震惊，大家都说：没有毛主席提出搞三反运动，建设祖国是空话。","type":"paragraph"},{"text":"目前该矿存在两个问题：(一)运动中有了某些“左”的斗争方式，如要贪污分子跪桌子等。(二)运动中，领导方面对生产照顾不够，一、二月份生产计划均未圆满完成。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年4月19日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfa8227707"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
