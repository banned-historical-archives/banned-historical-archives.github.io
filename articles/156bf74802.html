ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺德意志民主共和国成立十三周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国"},{"type":"paragraph","text":"成立十三周年的电报"},{"type":"paragraph","text":"（1962年10月6日）柏林德国统一社会党中央委员会第一书记、德意志民主共和国国务委员会主席瓦尔特·乌布利希同志，德意志民主共和国部长会议主席奥托·格罗提渥同志，德意志民主共和国人民议院主席约翰尼斯·狄克曼博士，民主德国全国阵线全国委员会主席埃里希·柯伦斯教授博士："},{"type":"paragraph","text":"当德意志民主共和国成立十三周年的时候，我们代表中国共产党、中国人民和中华人民共和国政府，向德国统一社会党、德意志民主共和国政府和人民，致热烈的祝贺。"},{"type":"paragraph","text":"兄弟的德意志民主共和国人民，在德国统一社会党和德意志民主共和国政府的领导下，取得社会主义建设的重大成就，并为反对美帝国主义扶植下的西德军国主义和维护世界和平，进行了坚持不解的努力。中国人民为此感到十分高兴。"},{"type":"paragraph","text":"现在，美帝国主义正积极支持西德军国主义，变本加厉地对德意志民主共和国进行侵略挑畔，严重地威胁着欧洲和世界和平。这一切不仅遭到了德国人民的强烈反对，也受到中国人民和全世界人民的严厉遣责。我们再次重申：中国人民坚决支持德意志民主共和国和苏联关于缔结对德和约并在此基础上使西柏林局势正常化的严"},{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国成立十三周年的电报正立场和合理主张。我们深信：德意志民主共和国人民反对美帝国主义和西德军国主义以及争取和平解决德国问题的正义斗争，一定能够取得最后胜利。"},{"type":"paragraph","text":"中德两国人民在反对帝国主义的斗争中和建设社会主义的事业中，一向互相支持，互相援助。中国人民将始终不渝地在1957年莫斯科宣言和1960年莫斯科声明的基础上，致力于增强中德两国人民的友好团结，并同德意志民主共和国人民一道，为加强社会主义阵营的团结，维护世界的和平和促进人类的进步事业而奋斗。"},{"type":"paragraph","text":"祝德意志民主共和国繁荣昌盛，祝中德两国人民的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理、中国人民政治协商会议全国委员会主席周恩来"},{"type":"paragraph","text":"一九六二年十月六日"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":284,"page_end":285},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"156bf74802"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
