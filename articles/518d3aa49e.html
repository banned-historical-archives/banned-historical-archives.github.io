uthors":["邓小平"],"dates":[{"year":1975,"month":9,"day":15}],"is_range_date":false,"parts":[{"text":"邓小平在全国农业学大寨会议开幕式上的讲话摘录","type":"title"},{"text":"邓小平","type":"authors"},{"text":"在国内，二十五年来，尽管有几次机会主义、修正主义路线的干扰和破坏，但总的是循着毛主席的革命路线走的。","type":"paragraph"},{"text":"过去斯大林的时候，后来赫鲁晓夫的时候，吹的很凶，本来不是第一，本来落后，要吹第一。","type":"paragraph"},{"text":"全国还有部分县、地区，粮食产量还不如解放初期。就是个别的，也是值得很好注意的事。","type":"paragraph"},{"text":"学大寨提出一个问题，现在跑大寨的人不晓得有多少万罗？是跑来看风景，游山玩水，还是真正来取点经？或者中间状态，坐一次火车，逛一点地方，也取点经。","type":"paragraph"},{"text":"我们现在全国存在着各方面的整顿问题。你们都看了中央发的十八号文件，军队要整顿，是毛主席指示的。这次军委扩大会议，就是讲的军队要整顿，要准备打仗，就是两条。这是毛主席提出的两个纲。毛主席讲过，军队要整顿，地方要整顿。地方就是好多方面嘛。工业要整顿，农业要整顿，商业也要整顿。我们的文化教育也要整顿，科学技术队伍也要整顿。文艺，毛主席叫调整。实际上调整也就是整顿。现在农村有的省百分之十五的社会主义集体经济垮台，有的县就百分之二十，有多有少。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"518d3aa49e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
