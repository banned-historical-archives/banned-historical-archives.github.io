<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央西南局关于8月份农村工作的简报","authors":[],"dates":[{"year":1951,"month":9,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央西南局关于8月份农村工作的简报","type":"title"},{"text":"（一）西南区二期土改自6月开始，迄目前止已有1300多个乡完成分配工作，188个乡正在进行分配工作，978个乡将进入分配阶段。9月前可完成2229个乡，约2050余万人口，和第一期完成土改的1512个乡1300余万的人口加在内，总共9月份前可完成3741个乡，3375万人口地区的土改，占全区总人口数40％，占全区总乡数30％。其中川东9月前可完成873个乡，人口约920余万；川南可完成1072个乡，人口约440余万；川西可完成188个乡，人口约220余万；川北可完成1068个乡，人口1200余万；贵州可完成338个乡、人口380余万；云南可完成19个乡，人口11万余；西康可完成101个乡，人口53万余；重庆所属之巴县可完成87个乡，人口110余万。","type":"paragraph"},{"text":"就已完成的情况看，据初步检查，第二期土改比第一期较深入细致，对地主阶级打击较狠较准。一般在发动雇贫农消灭地主阶级作得较好的地区达80％，坏的约20％。川西各县一般已发动起来的群众在60％以上，妇女占三分之一、青壮年占五分之一；西康敢于斗争的雇贫农约占本阶层总户数70％左右。川东42个县426个乡不完全统计，在反对地主阶级顽抗、破坏法令的斗争中，农民获得7000余万斤的胜利果实，40％的人口分得果实，平均每人约30市斤；经过斗争，农民协会会员已达610余万，占全区人口32％。川北农协会员已发展到560万，约占农业人口38.8％，自卫队员81万，占农业人口5.5％。好的地区农民有80％以上参加了斗争，地主威风一扫而光。但也有个别地区由于干部工作简单、粗糙、急躁、代替包办，强迫命令作风未彻底纠正，因此，土改后遗留的问题不少且有些夹生地区。如川南仁寿县有30个村70％的群众未发动起来，秀山、酉阳、黔江三县35个村65％的雇贫农未当家，农会领导权在地主、土匪、特务操纵下的在10％以上，这些乡村还须重新作。划成份划错的，如贵州息峰县文化乡一个村将小土地出租者、富农、小商均划成地主的就有12户，还须纠正。另外评产不合理的，如川东巴县反映，有的地区一般评高了，有超过300％、400％的；贵州4个村6种田土的调查，有4种评低了，有2种评高了，还须改正。其他土改后如建政、巩固人民民主专政，农民剩余劳动力的组织，（有达50％的），手工业合作社的开展，一系列的新问题还待解决。","type":"paragraph"},{"text":"（二）关于农业生产，全区正普遍进行秋收，川东、川南、川北坝地已基本完成，川西、西康现正大量收割，云南早稻已收完，晚稻亦开始，贵州刚开始，除云贵较迟外，其他各区9月底可全部结束。今年收成除云贵个别地区由于水、旱、虫、雹已减产成灾较为严重外，全区一般收成不错。四川各地秋收估计可达7成半至8成，川北稻谷、棉花、高粱可收7、8成，三台可收9成半，川东大部地区比去年增产1、2成，贵州除铜仁、镇远、独山三专区约在7成左右。今年秋收农民一般情绪很高，川东巴县农民反映说：“毛主席的谷子，吊吊大，杆杆硬，今年是丰年”。","type":"paragraph"},{"text":"（三）其他参加二期土改的民主人士，除北京来的628人外，重庆及西南各省共7,774人，内参观的291人，目前已先后陆续返回，一般反映良好。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（下）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c039a1909c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
