s":[],"dates":[{"year":1947,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英同志等"},{"type":"paragraph","text":"电慰我全区将士"},{"type":"paragraph","text":"热切期望再接再厉，粉碎蒋介石进攻。"},{"type":"paragraph","text":"【本报特讯】叶剑英同志暨北平军调部中共代表团全体同志于元旦日致电军区首长慰问全区将士，原文如下：伯承代远宏坤小平一波际春李达诸同志并转晋冀鲁豫人民解放军全体同志："},{"type":"paragraph","text":"当此胜利的一九四七年元旦来临之际，我们谨向你们为保卫中华民族独立和平民主而浴血自卫的同志遥致热烈的慰问，并祝新年健康。"},{"type":"paragraph","text":"自从去年七月蒋介石在美帝国主义者支持下，一手撕毁了四大协议，发动全面内战以来，已经有半年了。在这半年的过程中，你们为了保卫解放区，保卫全中国人民的独立和平与民主，坚决执行毛主席指示，粉碎了蒋介石许多次疯狂的进攻，坚决干脆彻底地消灭了蒋军十八个旅，这真是对国家民族的无上贡献，也是你们最大的光荣。"},{"type":"paragraph","text":"但现在蒋介石不愿这半年的失败，还依旧一意孤行继续其卖国独裁内战方针，因此全国人民的眼睛都热望着你们，全中国人民的希望也都寄托在你们的身上，他们深知：只有你们的胜利，才是中国人民之福，因此大家都热切地期望着你们再接再厉，在今后半年内再消灭蒋军第二个十八个旅，第三个十八个旅……以彻底粉碎蒋介石的进攻，收复失地，来迎接独立和平民主新中国的到来。"},{"type":"paragraph","text":"叶剑英暨北平军调部中共代表团全体同志启"},{"type":"paragraph","text":"一九四七年元旦于北平"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"326a260612"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
