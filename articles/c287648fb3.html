art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"批判林彪资产阶级军事路线","authors":[],"parts":[{"type":"paragraph","text":"在辽沈战役中荣获“锦州尖刀连”称号的某部一连指战员，认真学习毛主席《关于辽沈战役的作战方针》，紧密结合本连的战斗历史，批判林彪的资产阶级军事路线。在一次批判会上，一班长于晓明愤怒地说：林彪在辽沈战役中，胡说锦州敌人兵力多，工事强，难打，把敌人吹得神乎其神，其实根本不是那么回事。当时我们连担任突破伪省府大楼北侧城垣的尖刀任务。固守在那里的敌人自吹是永久工事，是攻不破的。但战斗打响后，只经过十八分钟炮火袭击，就摧毁了敌人的大部分工事，发起冲击后，我们排的同志用手榴弹、炸药包连续爆破了敌人三个暗堡，其他地堡的敌人见势不妙，举手投降。我们班的老战士黄德福将红旗插上了锦州城。铁的事实证明，并不是敌人难打，而是林彪右倾不敢打，他根本不是什么“常胜将军”，而是畏敌如虎的懦夫。（本报通讯员）"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c287648fb3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
