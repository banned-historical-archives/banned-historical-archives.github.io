r":1948,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决纠正学校教育的左倾错误"},{"type":"paragraph","text":"去年秋季，我区有些地方借口“贫雇路线”、“树立贫雇骨干”，极其错误的把农村的阶级划分、阶级斗争搬到学校里边来，称之为“挤封建”。象北大农学院及不少的中学小学均曾先后成立了所谓的“贫农会”、“贫农小组”、“贫农团”。这些组织在有些地方居然领导起斗争。许多出身地主富农而从事教育工作多年的人被斗了。太岳某中学则发生有贫雇学生会餐让地主富农出身学生端饭的现象，更为严重者：是把斗争对象的子弟当做“小恶霸”、“小地主”来斗，挂牌管制，剥夺一切民主权利，甚至没收他们的文具分给贫雇学生，实行所谓平分。"},{"type":"paragraph","text":"这些严重错误，完全违背了毛主席所规定的“无产阶级领导的，人民大众的反帝反封建的”新民主主义教育方针，放弃了无产阶级的领导，学校的任务不是培养人民的健全的新民主主义思想，提高文化，消灭文盲，肃清各种文化政治落后现象，反而是发动贫雇制造斗争。打击了一部分教员学生，严重的损害了新民主主义教育事业。"},{"type":"paragraph","text":"现在，这些错误有些地方是纠正了。但还有不少地方没有引起足够重视，从今天本报所报导的这些检讨看，也还显得不够深刻，没有从教育工作的方针路线去发掘错误。我们希望凡是发生这类错误地区，各地政府学校要坚决纠正，要认真改正去年因“追三代”“割尾巴”“掂都卢”而错订的教员成份，注意解决他们的生活困难，被斗户的子弟要一律允许入学（地主富农子弟在内）。各村的学校生活要恢复正常状态，目前很多教员无人供给薪金柴米，政府必须迅速设法解决。必要时可以召开教员会议，征求他们意见，纠正偏向。只要领导上有决心，这一切错误在很短期间不难肃清。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85b22ee0d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
