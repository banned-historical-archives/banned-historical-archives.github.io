rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远忠于毛主席完全彻底为人民","authors":["副指导员田广武文书孙思新五好战士叶春泉"],"parts":[{"type":"paragraph","text":"为人民服务就要全心全意、完全彻底。有了全心全意为人民服务的思想，才能不图名利，不计报酬，不讲功劳，一心为革命，一心为人民；有了完全彻底为人民服务的思想，才能在胜利面前不停步，困难面前不低头，生死关头不畏惧，继续革命志不移。（副指导员 田广武）"},{"type":"paragraph","text":"一不怕苦、二不怕死的彻底革命精神，靠毛泽东思想培养；继续革命的觉悟，在为人民服务中提高。有了继续革命的思想，才能全心全意为人民服务；也只有树立了全心全意为人民服务的思想，才能一不怕苦，二不怕死，继续革命，彻底革命。（文书 孙思新）"},{"type":"paragraph","text":"革命需要是我的第一志愿，为人民服务是我最大的幸福，革命到底是我最高的理想。我要做一颗永不生锈的螺丝钉，党把我拧在哪里，就在哪里闪闪发光。（五好战士 叶春泉）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28dc90b072"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
