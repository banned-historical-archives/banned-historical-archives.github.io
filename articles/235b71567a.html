倒黑白继续恶毒诽谤我国","authors":[],"dates":[{"year":1959,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新加坡妇女理事会秘书对报界表示"},{"type":"paragraph","text":"中国的人民公社为人民造福"},{"type":"paragraph","text":"西欧资产阶级报刊颠倒黑白继续恶毒诽谤我国"},{"type":"paragraph","text":"新华社7日讯　新加坡消息：新加坡妇女理事会秘书福兹达尔夫人5日对新加坡报界说，中国的人民公社是提高人民生活水平计划的一个组成部分，它所创造的生活条件远比旧中国的为好。"},{"type":"paragraph","text":"福兹达尔夫人应中华全国妇女联合会的邀请，曾经在中国访问了三个星期。福兹达尔夫人强调指出，中国妇女已经获得同男子一样的平等地位和权利。她说，今天中国不分男女老幼都一致为建设美好的未来而努力，中国人民的建设热情是可敬的。"},{"type":"paragraph","text":"据新华社7日讯　西欧一些国家的资产阶级报刊利用我国调整今年生产计划指标，连篇累牍地对中国社会主义建设事业进行疯狂的攻击和污蔑，它们竭力歪曲事实，宣传我国大跃进和人民公社已经失败。"},{"type":"paragraph","text":"英国“每日电讯报”在一篇评论中胡说什么我国“公开承认经济上的失败”，去年核实后的数字“大概也是夸大的”，并且断言今年调整后的棉花和钢的指标“还是雄心过大”。最近一期的“经济学家”杂志用心恶毒地写道：“中国共产党人已经供认了。中国共产党中央委员会第八次全体会议大刀阔斧地修改了今年的生产计划。这里所牵涉到的削减之严重，是连中国今年夏季使农业受到严重损失的水旱灾也远不能解释的”。"},{"type":"paragraph","text":"法国和西德的反动报刊也积极参加了这个诽谤中国的大合唱。法国报刊大肆宣传中国“失败”、“后退”，北京“悲观”、“失望”，并且诽谤中国去年大跃进只是“纸面上的胜利”，国家计划内不列入土钢是等于承认小高炉“完全失败”。“巴黎新闻”诬蔑大跃进说，“去年，中国经济并没有实现北京的统计家所宣布的跃进，党内的诗人们所过早地歌颂的生产方面的胜利，往往是纸面上的胜利。这就是在毛泽东主持下的中国共产党中央委员会庐山会议后发表的有些地方令人苦恼的、并不辉煌的总结”。"},{"type":"paragraph","text":"西德“法兰克福汇报”1日以“中国的失败”为题发表评论，诽谤中国“把明显的失败说成是成就”，说人们对中国“现在这些数字的信任也支离破碎了”。这篇社论还造谣说中国承认“小高炉生产不合算”，对“提高农业产量有害”，并且宣传中国在东南亚“威信降低”，甚至说什么东南亚人民对中国“最后的幻想也破灭了”。"},{"type":"paragraph","text":"但是，甚至这些仇视我国的西欧资产阶级报刊也无法抹煞这样一个事实：中国正满怀信心地在社会主义建设道路上继续向前跃进。英国“每日电讯报”在对我国大加攻击以后，仍然不得不承认中国在工农业生产方面，“1959年可能的产量仍然会给人深刻印象，并且达到1962年第二个五年计划结束时的原定指标”。一些报纸很重视中国“十年赶上英国”的口号，认为“中国共产党仍然是乐观的”。巴黎“费加罗报”说，中共八届八中全会的决议极其重要，这些决议表明中国要继续跃进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"235b71567a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
