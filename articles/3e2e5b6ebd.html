art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"钻理论摆战例搞演习汉口高级步校学习毛主席著作有的放矢","authors":["杨运昌陆辉"],"parts":[{"type":"paragraph","text":"本报讯 汉口高级步校最近组织一、二营学员学习毛主席军事著作，本着步步深入，以虚带实的精神，通过鸣放辩论，结合研究战例、写战斗经验和野外现地战术作业，收到了比较明显的学习效果。"},{"type":"paragraph","text":"他们根据学员都是初级干部，文化水平一般较低的特点，除了在学习每一篇著作之前由领导干部作启发报告，和学习中不断进行小结、解答疑难问题之外，在组织阅读著作时，采取了由教员领读、讲解和个人精读相结合的方法。在漫谈讨论中，诱导大家广泛地联系自己的战斗经历和部队、学校训练中的实际情况。这样就使大家越学越深入，越学也就越有兴趣了。为了使学员深刻领会并学习运用毛主席军事思想，他们在学习中联系进行了战例研究。研究的方法是这样的：选择了抗美援朝战争中一个营进攻的战例，一个连防御的战例。教员事先不告诉大家战斗过程和结果，只把当时的敌情、我情和地形等情况在沙盘上作个介绍，象进行战术作业出个想定似的，就叫每个人学习运用毛主席军事思想进行处置，而后就在沙盘上进行集团作业，展开辩论；最后由教员把当时的战斗过程和结果公布出来，再叫大家对照自己的看法进行讨论，分析战例中体现出的战术思想和优点、缺点，对照自己的战术思想。这样做，比一般列举战例又进了一步。学员反映，不但领会毛主席的军事思想更深刻了，而且也开始学会运用了。从每个人写的战斗经验（学习心得）可以看出，许多同志都能把自己的感性知识提高到理性上来。"},{"type":"paragraph","text":"在学习毛主席军事著作告一段落，他们就趁热打铁到野外进行了连的攻、防战术演习。这些课目过去都学过了，这次重做，是为了加深理解毛主席军事思想，并学习运用，切实贯彻从实际出发的训练方针。经过这次野营演习，教员们一方面感到战术思想提高了，深刻地理解到如何根据敌情、地形和我军的任务等各种具体情况，灵活地运用我军的战术原则；另一方面也研究了一些战术训练的方法，进一步认识到在训练中要发挥部队的积极性、创造性，培养部队优良的战斗作风，提高在复杂条件下进行战斗活动的本领。 （杨运昌、陆辉）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e2e5b6ebd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
