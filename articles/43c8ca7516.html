":[],"dates":[{"year":1957,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日社会党抗议美国包庇凶犯"},{"type":"paragraph","text":"日本驻军工会决定发动罢工反对美军剥削"},{"type":"paragraph","text":"新华社20日讯　东京消息：日本社会党军事基地对策特别委员会的代表，今天上午访问了美国驻日本大使馆和远东美军司令部，抗议美国国防部命令远东美军当局不把在相马原杀害日本农妇的美国兵哲腊德交给日本审判，并且要求美国收回这项命令。"},{"type":"paragraph","text":"日美联合委员会曾经在5月16日作出决定，要把哲腊德交给日本方面审判，但是美国国防部次日就发出了违背这项决定的命令。"},{"type":"paragraph","text":"新华社20日讯　横滨消息：拥有一万一千八百多名会员的日本驻军工会，为了反对驻日美军当局新的剥削措施，决定在5月下旬到6月下旬的期间内举行罢工。"},{"type":"paragraph","text":"驻日美军当局在今年4月2日提出了新的日美劳务基本合同，这个合同实质上是要降低工资，并且使劳动条件恶化。"},{"type":"paragraph","text":"日本驻军工会19日在横滨举行的临时全国代表大会作出了罢工的决定，并且授权工会总部领导这次罢工，罢工的具体计划将由中央斗争委员会决定。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43c8ca7516"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
