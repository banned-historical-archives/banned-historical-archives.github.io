al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"抚易白沙烈士联","alias":"","parts":[{"type":"paragraph","text":"挽易白沙烈士联!"},{"type":"paragraph","text":"（1921年8月）无用之人不死，有用之人愤死，我为民国前途哭；去年追悼杨公，今年追悼易公，其奈长沙后进何3？"},{"type":"paragraph","text":"[1]易白沙（1886—1921），名坤，字越村，湖南长沙人，家居白沙井附近，反清烈士易培基之弟。1921年5月间，他只身赴北京，准备伺机刺杀北洋军阀政府首脑，但未成功。于是又乘海轮至广州谒见孙中山，请求组织军队北伐。由于广东形势未稳，亦未如愿。激愤之下，于农历五月初五晚来到明代大儒陈白沙（1428—1500）故里新会县陈村海边蹈海，以死报国，年仅35岁。毛泽东书此挽联。"},{"type":"paragraph","text":"[2]愤死，悲愤而死。"}],"authors":["毛泽东"],"dates":[{"year":1921,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":446,"page_end":446},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdc110ac57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
