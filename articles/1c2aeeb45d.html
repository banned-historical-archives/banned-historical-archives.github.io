script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"奠边府作战最大可能发生的危险在后方交通线","alias":"","parts":[{"type":"paragraph","text":"奠边府作战最大可能发生的危险"},{"type":"paragraph","text":"在后方交通线！"},{"type":"paragraph","text":"（1954年4月28日）彭德怀、黄克诚同志："},{"type":"paragraph","text":"目前越南最大可能发生的危险，似乎不在奠边府以南，而在我军的后方交通线。如敌以两个伞兵营降落在我后方交通线上最扼要的地点，筑堡据守起来，整个交通将为之切断，如我军不能迅速歼灭此敌，旷日持久，奠边府我军即有被迫撤退之可能。军委去电已估计到敌有袭占交通线可能，但强调不够，并以之与郎勃拉邦方向并列。请你们再加考虑，叫越方迅调必要兵力位于适当地区，专门对付此种意外事变，以免奠边府作战功亏一。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月二十八"},{"type":"paragraph","text":"[1]这是毛泽东写给中央人民政府人民革命军事委员会副主席彭德怀、人民革命军事委员会副总参谋长兼总后方勤务部部长黄克诚的信。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":4,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":84,"page_end":84},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c2aeeb45d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
