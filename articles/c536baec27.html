art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"南也门代表团参观我北京部队某部扎莱部长盛赞我军贯彻毛主席建军路线的成就","authors":[],"parts":[{"type":"paragraph","text":"新华社二十日讯 南也门外交部长塞弗·艾哈迈德·扎莱和由他率领的南也门人民共和国代表团，今天由国务院副总理陈毅陪同，参观访问了中国人民解放军驻北京部队某部，受到指战员的热烈欢迎。"},{"type":"paragraph","text":"扎莱部长和代表团的朋友们听取了部队负责人介绍这个部队贯彻伟大领袖毛主席建军思想和建军路线所取得的成就，听了这个部队学习毛主席著作积极分子汇报活学活用毛主席著作的体会，参观了步兵武器实弹射击表演和部队经营的农田、稻米加工房、军械修理所、豆腐加工房，还看了毛泽东思想宣传队战士业余演出队演出的革命歌舞。"},{"type":"paragraph","text":"扎莱部长在参观中说：“我们亲眼看到了伟大的人民中国是如何培养伟大的战士的。你们的建军原则是从政治上建军，我们今天的确从你们战士身上看到了毛泽东思想。”"},{"type":"paragraph","text":"他说：“你们的军队有很高的政治思想觉悟和熟练的军事技术，又参加农副业生产，你们的军队真正地减轻政府的负担，据我所知，这一点是世界上任何国家的军队所没有的。”"},{"type":"paragraph","text":"南也门朋友昨天还参观了北京针织总厂，受到工人的热烈欢迎。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c536baec27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
