script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海木工机械厂干部群众坚持以阶级斗争为纲痛击右倾翻案风　夺得首季生产开门红提前一个月完成首季产量任务，提前二十四天完成首季产值任务","authors":[],"dates":[{"year":1976,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在反击右倾翻案风的斗争中，上海木工机械厂党支部发动干部和群众以阶级斗争为纲，狠批反动的唯生产力论，进一步增强了抓革命、促生产的自觉性，提前一个月完成了今年第一季度的产量任务，比去年同期增加百分之一百六十四点六，提前二十四天完成了今年第一季度的产值任务，比去年同期增加百分之六十七点三。"},{"type":"paragraph","text":"这个厂的干部和群众在党支部的领导下，掀起了一个批判党内那个不肯改悔的走资派刮起的右倾翻案风的热潮。党支部组织干部认真学习毛主席“抓革命，促生产”的有关教导，回顾解放以来我国生产发展的历史和本厂生产发展的历史，清楚地看到要高速度地发展生产力，就必须及时地调整生产关系中某些不适应生产力发展的部分，及时调整上层建筑某些不适应经济基础的部分。不少同志说，“抓革命，促生产”是伟大领袖毛主席对社会生产力发展规律的深刻总结，它正确地反映了革命同生产、政治同经济的辩证关系，是指导社会主义建设不断发展的灯塔。而修正主义者竭力否认生产关系对生产力的反作用，否认上层建筑对经济基础的反作用，否认革命对生产、政治对经济的统帅作用，把社会生产力的发展说成是单纯的科学技术的发展，其目的是反对无产阶级革命，推行修正主义路线。通过批判，大家分清了抓革命，促生产同搞唯生产力论的界限。同志们纷纷表示一定要以抓革命，促生产的优异成绩回击右倾翻案风。认识提高后，这个厂的干部和群众一起商量，在安排今年年度和一季度生产计划时，提出了三条措施。:第一，把今年十二个月的任务安排在十个月内完成。第二，争取第一季度三个月的任务两个月完成，今年第一季度公司下达的产量计划一百六十台，他们安排了二百二十台，产值计划七十万，他们安排了八十八万。第三，把一周六天的任务安排在五天完成。"},{"type":"paragraph","text":"一季度的计划要在两个月内完成，任务艰巨，怎么办?厂党支部首先广泛发动群众反击右倾翻案风，举办了各种学习班，集中批判了党内那个不肯改悔的走资派鼓吹的“三项指示为纲”，批判“物质刺激”，批判污蔑和攻击工人阶级的谬论。全厂干部和群众通过大学大批促大干，精神面貌发生了深刻的变化，很快地在全厂掀起了一个抓革命，促生产的热潮。许多工人争分夺秒，一个人干几个人的活。目前全厂工时利用率普遍达到七个小时。全厂平均每个工人八小时完成了十二、三个小时的定额。"},{"type":"paragraph","text":"大学大批促进了革命的团结，让方便，留困难，抢挑革命重担的“龙江风格”大发扬，许多工人既搞生产，又当调度，那里任务重，就到那里支援。在总装进入紧张阶段时，全厂组室人员、后勤人员和汽车司机等九十多人都前去支援，终于胜利完成了二月份的生产任务。两个月来，全厂大小技术革新就实现了十五、六项。"},{"type":"paragraph","text":"群众积极行动起来了，领导和群众一起，同学习，同劳动，同战斗，以身作则。党支部正副书记四个人，每人深入班组抓一个点。党支部、厂革委会成员每天早晨上班到班组，下午学习、处理日常工作，晚上再和工人一起劳动。组室人员也经常下车间和工人一起，战斗在生产第一线。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93f72d1e31"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
