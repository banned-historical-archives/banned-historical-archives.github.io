<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"武汉大学举行三反展览会揭露了资产阶级腐朽的一面","authors":[],"dates":[{"year":1952,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报汉口讯】　武汉大学二月十八日举行三反展览会。资产阶级腐朽的一面，在展览会中可以看得非常清楚。"},{"type":"paragraph","text":"第一部展出了一些破铜烂铁破玻璃等奇形怪状的东西。如空气吸筒、离心机等放着无人管而被侵蚀坏了。实验不小心被损坏的温度计多得像一大把筷子，其中有精密可量百分之一度的贵重温度计。一个在市场上很难买到的石英燃烧管也被损坏了。万分之一的天平被放着锈坏了。数学系在战前用一万马克在德国买回的一套数学模型，因说明书被弄丢，有些模型被打破，因此成了废物。"},{"type":"paragraph","text":"第二部份是讲排场而盲目花费金钱，以致积压许多不必要的东西。如试卷年年印，年年多，从一九四六年到一九五○年，一共多出十万份。一个小小的出版组积压资金就达一亿二千多万元。其中有八种讲义印了就放在那里原封未动。卫生组为了讲排场，拿了卫生部拨的一亿八千万元买了一些自己不会用也从来用不到的东西，如万能手术台、太阳灯电疗器、电气吸脓机等，买的大虫药在武大可用一千九百年，硫酸铜可用五百年，橡皮手套买了一百多双，根本没有用过。事务组存放的蓝墨水可供一千二百三十二人用一学期，吸墨纸可用一百三十年。体育组用七十多万买了两个笼球，谁也不喜欢打，除了“排场”外，完全无用。"},{"type":"paragraph","text":"第三部份展览的是崇美思想所造成的损失。如事务组国货三星铅笔，放了一大堆不用而去买外国货，图书馆用三十万元买一把美国裁纸刀。为了学美国图书馆的派头，做了一个推书车，而且做得四不像，推不动，一拉就翻。"},{"type":"paragraph","text":"还有因为官僚主义所造成的损失，如工厂承制汉口一个纱厂的一千个压锤，模子做大了，每个要重半磅，工友向领导提意见改制模子，领导上不理，结果造成了严重的损失。"},{"type":"paragraph","text":"最后是化公为私的贪污部份，如有人把图书借了十八年，搞三反才拿出来。一位先生交出一部幻灯机，一位职员交出了九部电话机，三套学士服，一盘帆布水带，已有人交出许多工具。卫生组有一人用公家药棉纱布做了纹帐被窝。这些资产阶级思想所造成的具体例子，教育了每一个来参观的人。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"420831109a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
