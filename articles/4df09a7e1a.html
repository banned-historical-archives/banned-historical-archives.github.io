ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"关于世界大战的两种可能性","alias":"","parts":[{"type":"paragraph","text":"关于世界大战的两种可能性"},{"type":"paragraph","text":"（1969年）"},{"type":"paragraph","text":"关于世界大战问题，无非是两种可能：一种是战争引起革命，一种是革命制止战争。"},{"type":"paragraph","text":"[1]林彪1969年4月1日在中共九大上的报告中，在“毛主席最近指出”后面用黑体字引用了这段话。林彪的报告4月14日在大会上通过，4月28日在《人民日报》发表。1968年11月28日，毛泽东在会见澳大利亚共产党（马列）中央主席希尔时曾经讲道：“请你考虑一下，世界上是战争呢？还是革命？是发生战争后引起革命，还是革命能制止战争？总之，现在既不打仗，又不革命，这种状态不会维持很久了。”"}],"authors":["毛泽东"],"dates":[{"year":1969}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":454,"page_end":454},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4df09a7e1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
