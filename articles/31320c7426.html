" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"江青给林彪的一封信","authors":["江青"],"dates":[{"year":1966,"month":3,"day":19}],"is_range_date":false,"parts":[{"text":"给林彪的信","type":"title"},{"text":"江青","type":"authors"},{"text":"林彪同志：","type":"appellation"},{"text":"根据你的委托，我于二月二日至二十日，邀请刘志坚等四位同志就部队文艺工作问题进行了座谈。座谈后，他们整理了座谈纪要，送给你和军委其他领导同志，也送给我一份。我看了，觉得座谈纪要整理得不够完整；不够确切。因此，请春桥、亚丁两同志一起座谈修改，然后，送主席审阅。主席很重视，对纪要亲自作了修改，并指示伯达同志参加，再作充实和修改。我于三月十日至十五日，请伯达、志坚、春桥、亚丁四同志一起讨论修改后，又送主席审阅，主席再次作了修改，并于十七日批示：“此件看了两遍，觉得可以了。我又改了一点，请你们斟酌。”此件建议用军委名义，分送中央一些负责同志征求意见，请他们指出错误，以便修改。当然首先要征求军委各同志意见。十九日，我又请志坚、春桥、镗忠、曼村、亚丁五位同志一起座谈，大家一致同意这一纪要。现将座谈纪要送上，请审批。","type":"paragraph"},{"text":"此致","type":"paragraph"},{"text":"敬礼","type":"appellation"},{"text":" 江青一九六六年三月十九日","type":"paragraph"}],"comments":[],"origin":"来源：1967年6月1日红代会清华井冈山一部第三动态组编《动态》第64期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31320c7426"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
