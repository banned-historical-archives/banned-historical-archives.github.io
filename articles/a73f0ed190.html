script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利工人奋起反剥削罢工斗争遍及全国各地","authors":[],"dates":[{"year":1969,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利工人奋起反剥削罢工斗争遍及全国各地"},{"type":"paragraph","text":"据新华社四日讯　罗马消息：意大利广大工人最近接连举行罢工和示威游行，反对垄断资本的残酷剥削。"},{"type":"paragraph","text":"在意大利北部的工业城市都灵，菲亚特汽车公司的五万工人三日举行罢工，对资本家强行停止一万五千名工人的工作，妄图借此压制工人正义斗争的行为表示强烈的抗议。数千名被停止工作的工人冲进车间，举行集会和示威游行。在艾米利亚区莫德纳的菲亚特汽车工厂的工人，二日也举行罢工并走上街头举行示威游行。这些工人最近两个月来每天坚持举行两小时罢工。"},{"type":"paragraph","text":"在意大利主要的工业城市米兰，一万二千名职工在皮雷利橡胶托拉斯的主要工厂举行了二十四小时罢工，要求增加工资和保障工人的权利。罢工者在米兰闹市区和皮雷利公司的行政大楼外举行示威。工人们在大楼的所有入口处布置了纠察线，断绝了交通。许多学生参加了这次示威，支持工人们的正义斗争。皮雷利工厂工人的斗争，已进行了一个多月。九月以来，在塞蒂莫托里内塞、贝加摩和罗马等地的皮雷利工厂的工人也举行了罢工。"},{"type":"paragraph","text":"在意大利南部的萨勒诺，大约两百名蔬菜和水果市场的工人，二日举行罢工，要求提高工资和缩短工作时间。罢工工人设置了路障，切断了萨勒诺通向那不勒斯和罗马的铁路。"},{"type":"paragraph","text":"在诺切拉因费里奥雷城，工人们一日举行了总罢工和示威游行，要求充分就业和提高工资，并且声援占领了工厂达一个月之久的蕃茄罐头公司工人的斗争。"},{"type":"paragraph","text":"约有一万名农业工人，在皮亚琴察省和勒佐艾米利亚省进行了几天的联合斗争。艾米利亚地区几千名甜菜种植者，最近一直在坚持停止供应甜菜的斗争，以抗议制糖托拉斯的残酷剥削。"},{"type":"paragraph","text":"在那不勒斯、热那亚、米兰以及其它城市，许多金属和机器制造工厂的工人，最近也举行了罢工。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"意大利北部工业中心都灵市工人不久前举行大罢工和集会示威，抗议垄断资本家残酷剥削工人。图为罢工工人在示威中烧毁汽车，同镇压他们的法西斯警察展开斗争。"},{"type":"paragraph","text":"新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a73f0ed190"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
