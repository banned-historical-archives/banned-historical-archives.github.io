art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"敬祝伟大领袖毛主席万寿无疆！万寿无疆！万寿无疆！万寿无疆","authors":["杨明辉","钱嗣杰"],"parts":[{"type":"paragraph","text":"（照片一）毛主席满面红光，神采奕奕，向我们亲切微笑。他老人家身体非常非常健康，精力非常非常充沛。这是全中国人民和全世界人民的最大幸福。"},{"type":"paragraph","text":"新华社记者 钱嗣杰摄"},{"type":"paragraph","text":"（照片二）我们伟大领袖毛主席同谢胡同志亲切交谈。"},{"type":"paragraph","text":"解放军画报记者 杨明辉摄"},{"type":"paragraph","text":"（照片三）红日东升啊，光芒万丈。亿万人民啊，心花怒放。万水千山纵情欢呼，五湖四海放声歌唱。最最敬爱的伟大领袖毛主席啊，衷心地祝您万寿无疆！万寿无疆！"},{"type":"paragraph","text":"新华社记者 楚英摄"},{"type":"paragraph","text":"（照片四）首都广大工农群众和革命干部热烈响应毛主席“抓革命，促生产”的伟大号召，在工农业生产战线上取得了新的巨大成绩。他们决心乘胜前进，夺取革命、生产的更大胜利。"},{"type":"paragraph","text":"新华社记者 郑书福摄"},{"type":"paragraph","text":"（照片五）参加我国国庆的日本齿轮座话剧团的演员们，热情歌颂世界人民心中最红最红的红太阳毛主席，歌颂伟大的战无不胜的毛泽东思想。"},{"type":"paragraph","text":"本报记者 李书良摄"},{"type":"paragraph","text":"（照片六）伟大统帅毛主席啊，革命战士永远跟着您乘风破浪向前进！来自国防前哨和“三支”“两军”前线的战士们，怀着对伟大领袖毛主席无限热爱的心情，千遍万遍高呼：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"本报记者 孙振宇摄"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5987eb284b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
