art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"党的“九大”胜利万岁（对口词）","authors":["七三五六部队二二五毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"旭日东升，朝霞火红。"},{"type":"paragraph","text":"喜报飞传，普天同庆。"},{"type":"paragraph","text":"党的“九大”胜利闭幕，"},{"type":"paragraph","text":"新的中央委员会光荣诞生。"},{"type":"paragraph","text":"我们心潮澎湃，热血沸腾。"},{"type":"paragraph","text":"张张笑脸仰望毛主席，"},{"type":"paragraph","text":"颗颗红心向着北京城。"},{"type":"paragraph","text":"放声歌唱毛泽东思想的伟大胜利，"},{"type":"paragraph","text":"热烈庆贺党的“九大”圆满成功。"},{"type":"paragraph","text":"蓝天当纸，海水做墨，"},{"type":"paragraph","text":"万首颂歌唱不完毛主席的伟大英明！"},{"type":"paragraph","text":"毛主席永远是我们党的最高领袖，"},{"type":"paragraph","text":"这是革命人民的共同心声。"},{"type":"paragraph","text":"高山当鼓，大河做琴，"},{"type":"paragraph","text":"万支赞歌唱不尽林副主席的丰功伟绩！"},{"type":"paragraph","text":"林副主席是毛主席的接班人，"},{"type":"paragraph","text":"这是革命人民的一致心情。"},{"type":"paragraph","text":"以毛主席为首、林副主席为副的新的党中央，"},{"type":"paragraph","text":"是领导我们事业的核心力量，"},{"type":"paragraph","text":"是我们取得胜利的根本保证。"},{"type":"paragraph","text":"党的“九大”的召开，"},{"type":"paragraph","text":"使我们党团结得更紧更紧。"},{"type":"paragraph","text":"新的党中央领导我们从胜利走向更大的胜利，"},{"type":"paragraph","text":"奔向共产主义的锦绣前程。"},{"type":"paragraph","text":"无限忠于毛主席，"},{"type":"paragraph","text":"天塌地陷，胆壮心红。"},{"type":"paragraph","text":"誓死捍卫党中央，"},{"type":"paragraph","text":"愿洒热血，不怕牺牲。"},{"type":"paragraph","text":"永远团结在以毛主席为首、林副主席为副的新的党中央周围，"},{"type":"paragraph","text":"完成伟大时代赋予我们的历史使命。"},{"type":"paragraph","text":"落实“九大”提出的各项战斗任务，"},{"type":"paragraph","text":"紧跟毛主席踏上崭新的征程。"},{"type":"paragraph","text":"永远高举毛泽东思想伟大红旗，"},{"type":"paragraph","text":"让共产主义的灿烂光辉映天红！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"115286c49f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
