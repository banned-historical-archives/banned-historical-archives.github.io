"],"dates":[{"year":1993,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社广州8月20日电　(记者　范丽花、何惠飞)喜力世界杯乒乓球赛今天在广州揭幕。中国选手马文革和王涛均以小组第一名的成绩进入前八名。"},{"type":"paragraph","text":"在今天下午开始的第一阶段小组循环赛中，D组的王涛战胜德国的罗斯科普夫、奥地利的丁毅和巴西的小山，以3战全胜的成绩获小组第一名，丁毅获第二名。"},{"type":"paragraph","text":"在B组的争夺中，去年世界杯冠军、中国的马文革以3战2胜1负积3分的成绩列小组第一名。原中国队队员、现代表英国参赛的陈新华也是3战2胜1负积3分，名列小组第二。"},{"type":"paragraph","text":"A组比赛出现了意外，瑞典的瓦尔德内尔在第二场比赛中与加拿大黄文冠打到第三局时，颈部拉伤，退出比赛。结果世界排名第十六位的黄文冠不战而胜，获得了小组第二名。这个组第一名是克罗地亚选手普里莫拉茨。"},{"type":"paragraph","text":"C组瑞典好手卡尔松以2:1胜比利时的塞弗，以3战全胜成绩获小组第一名，塞弗3战2胜1负，获小组第二名。"},{"type":"paragraph","text":"各小组前两名进入第二阶段淘汰赛。王涛将与世界亚军塞弗较量，马文革的对手是加拿大的黄文冠。另两场，丁毅对卡尔松，陈新华对普里莫拉茨。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"123c142e72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
