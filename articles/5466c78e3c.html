script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"一份号码“中产阶级”起来斗争的反动宣传品","authors":[],"dates":[{"year":1957,"month":1,"day":25}],"is_range_date":false,"parts":[{"text":"一份号码“中产阶级”起来斗争的反动宣传品","type":"title"},{"text":"最近光明日报收到由九三学社许德珩转来一份油印的反动宣传品，这是由陕西西安一署名贺君勉的人寄给他的。这一宣传品的题目是“中运生路群最高吼声”其中分三部份：一、中产（阶级）的处境；二、资（产阶级）无（产阶级）的争端；三、人类的要求。大意说，资产阶级和无产阶级的斗争，到现在双方都是用尽了气力，把压力落在中产阶级身上。现在所有无产阶级事故的国家“团结中农”，“因为中产阶级占人类百分之七十强，他们一直认为是国家最宝贵的财产，尤其在战斗需要上，人力物力都要靠我们这个哑巴来供应。于是提出号召，‘站起来，我们坚决要参加阶级斗争！’铲消人类的不平，再不是给这些人衬马蹄”。","type":"paragraph"},{"text":"来源：《宣教动态》中共中央宣传部（总第一八七期）一九五七年一月二十五日。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5466c78e3c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
