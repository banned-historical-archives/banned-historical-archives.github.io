"武汉水利学院学生"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"大字报诗——致勇敢的战士","type":"title"},{"text":"武汉水利学院学生","type":"authors"},{"text":"致勇敢的战士　　　　·小兵·","type":"subtitle"},{"text":"我们不是勇敢的战士，","type":"paragraph"},{"text":"只是一个平凡的小兵，","type":"paragraph"},{"text":"我们不愿追问“居心何在？”","type":"paragraph"},{"text":"也不愿意“咄咄逼人”，","type":"paragraph"},{"text":"我们不需要“大民主”，","type":"paragraph"},{"text":"也反对拖拉不改“官僚主义”，","type":"paragraph"},{"text":"我们有几个诚恳的愿望：","type":"paragraph"},{"text":"该撤职的撤职，","type":"paragraph"},{"text":"该调薪的适当调整，","type":"paragraph"},{"text":"从福利金中吸取教训，","type":"paragraph"},{"text":"只后再不要只顾“自己人”的享受，","type":"paragraph"},{"text":"而忘记了广大群众的贫困，","type":"paragraph"},{"text":"几个疑难的案件：","type":"paragraph"},{"text":"私改档案，","type":"paragraph"},{"text":"陷害干部，","type":"paragraph"},{"text":"诱骗少女，","type":"paragraph"},{"text":"推下历承根，","type":"paragraph"},{"text":"都希望早日弄清，","type":"paragraph"},{"text":"假如是真的，","type":"paragraph"},{"text":"就不要让那些罪犯法外，","type":"paragraph"},{"text":"假如是假的，","type":"paragraph"},{"text":"也让我们知道内中详情。","type":"paragraph"},{"text":"(虽然我们不必追问)","type":"paragraph"},{"text":"我们希望对肃反问题重心估价","type":"paragraph"},{"text":"让成绩和缺点占适当的成分，","type":"paragraph"},{"text":"让那些受冤者得到平反，","type":"paragraph"},{"text":"让那些“该斗的”得到新生。","type":"paragraph"},{"text":"让那些违法乱纪分子，","type":"paragraph"},{"text":"受到应得的处分。","type":"paragraph"},{"text":"我们还有一个最大的愿望：","type":"paragraph"},{"text":"勇敢的战士，","type":"paragraph"},{"text":"望你们团结一致，","type":"paragraph"},{"text":"领导着我们这些小兵。","type":"paragraph"},{"text":"共同一致，","type":"paragraph"},{"text":"向三害开火，","type":"paragraph"},{"text":"和风细雨，","type":"paragraph"},{"text":"让雨不停的下，","type":"paragraph"},{"text":"风不住的吹，","type":"paragraph"},{"text":"让我们这些无名小卒，","type":"paragraph"},{"text":"能够在和风细雨中大胆争鸣。","type":"paragraph"},{"text":"在争鸣中，","type":"subtitle"},{"text":"让真理抬头，","type":"paragraph"},{"text":"让错误得到纠正，","type":"paragraph"},{"text":"让“三害”消灭掉，","type":"paragraph"},{"text":"让我们大伙儿团结得更紧！","type":"subtitle"}
