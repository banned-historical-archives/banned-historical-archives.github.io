ors":["据农村工作部“农村情况汇集”编"],"dates":[{"year":1960,"month":4,"day":17}],"is_range_date":false,"parts":[{"text":"口粮究竟掌握在哪一级为好？","type":"title"},{"text":"据农村工作部“农村情况汇集”编","type":"authors"},{"text":"四川、贵州、河北三省对社员口粮掌握在管理区还是下放到食堂，有不同的认识和作法。四川和贵州都主张粮权一定要抓在管理区或基本核算单位手里，集中保管，定期支付。好处是：粮食可以完全控制起来，便于主动安排生活，两省的事实证明，凡是这样作的，粮食局势就很稳定，食堂就能办好。河北的作法恰与此相反，他们正在贯彻口粮下放到食堂的工作，要求放得快，放得彻底。全省已下放了二十二亿多斤，粮食全部下放到食堂的占食堂总数30%。他们认为，这样可以消除干部群众的紧张心理，有利于生产。但部分地区下放口粮对工作做的不细，发生了向国家多要粮食的现象。","type":"paragraph"},{"text":"来源：1960年4月17日《新华社内参》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec829c4c20"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
