" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"柴春泽能做到的，我也一定要做到","authors":["段文秋"],"dates":[{"year":1974,"month":1,"day":22}],"is_range_date":false,"parts":[{"text":"柴春泽能做到的，我也一定要做到","type":"title"},{"text":"段文秋","type":"authors"},{"text":"（山东平原县段集大队回乡知识青年段文秋）","type":"paragraph"},{"text":"知识青年柴春泽给他父亲的信，我读了一遍又一遍，心里很不平静。","type":"paragraph"},{"text":"一九六八年七月，我中学毕业后，满怀革命豪情回到了家乡，决心在农村干一辈子革命。回乡后，贫下中农推选我当会计、生产队长。一九七一年，我入了党，担任了大队党支部副书记。几年来，贫下中农曾几次推荐我当工人，去上学。我想想金训华，看看俺大队的变化，毅然决然地留了下来。最近，我的一个表哥从城市来了一封信，说给我找了个工作，要我快去。我的思想波动很大，反复考虑，是去城市，还是留在农村？","type":"paragraph"},{"text":"正在我踌躇不决的当儿，忽然看到了《人民日报》发表的柴春泽给他父亲的回信。我边读边想：我和柴春泽同样都是知识青年，都是共产党员，为啥在同样的情况下，柴春泽敢于同旧的传统观念实行彻底的决裂；而我却踌躇不前呢？我越想越感到惭愧。我回乡五年多了，柴春泽下乡才两年，可他做到的，我却没做到。如果不是读了柴春泽的信，擦亮了我的双眼，岂不要上了刘少奇、林彪鼓吹的“下乡镀金论”的当吗？我如梦初醒，连夜给表哥写了回信，批评他搞不正之风的错误做法，表示我要永远扎根农村干革命的决心。","type":"paragraph"},{"text":"今后，我一定要向柴春泽学习，努力改造世界观，扎根农村，建设农村，与轻视农村、轻视农业劳动的旧观念彻底决裂。","type":"paragraph"},{"text":" （载《人民日报》一九七四年一月二十二日）","type":"paragraph"}],"comments":[],"origin":"载《人民日报》一九七四年一月二十二日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"柴春泽","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94476ebc2f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
