script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"接连举行强大示威  英勇反击警察镇压  西德人民坚决反对新法西斯党蠢动  万名西德冶金工人罢工抗议资本家残酷剥削","authors":[],"dates":[{"year":1969,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"接连举行强大示威  英勇反击警察镇压"},{"type":"paragraph","text":"西德人民坚决反对新法西斯党蠢动"},{"type":"paragraph","text":"万名西德冶金工人罢工抗议资本家残酷剥削"},{"type":"paragraph","text":"据新华社二日讯　波恩消息：西德人民反对新法西斯党——德国国家民主党的示威运动，继续迅猛地在西德各地发展。"},{"type":"paragraph","text":"自从八月二十一日国家民主党在波恩反动当局的支持下开展进行“竞选”活动以来，西德各地的人民连续举行强大的示威，反对这个法西斯党进行罪恶的“竞选”活动。从八月二十一日至二十六日一周内，萨尔布吕肯、弗伦斯堡、基尔、雷克林豪森、比勒弗尔特、德莫尔特等城市的人民都举行了示威。"},{"type":"paragraph","text":"近几天来，各地抗议国家民主党“竞选”活动的群众示威继续发展。八月二十七日晚间，在西德和荷兰接壤的边境城市诺德霍恩，二千名示威群众高举“纳粹分子滚出去”的标语牌，在国家民主党头目阿道夫·冯·塔登正在进行“竞选”演说的会议厅周围举行示威。同一天，卢卑克城的几百名群众也举行示威，抗议阿道夫·冯·塔登在那里召开记者招待会。当地反动当局派出骑警用催泪弹镇压示威者。示威群众同反动警察勇敢地进行了搏斗。"},{"type":"paragraph","text":"八月二十八日晚上，吕内堡二千名青年举行示威，抗议国家民主党在这个城市召开“竞选”集会。示威者高呼口号，打碎会议厅窗户的玻璃，把臭气弹扔进会议厅，使这次“竞选”集会不得不在混乱中散伙。同一天，在卡塞尔，一百多名群众也举行了示威。"},{"type":"paragraph","text":"八月三十日，当国家民主党在路德维希港召开“竞选”集会时，大批示威群众拥到会议厅前，谴责这个法西斯党的罪行。国家民主党头目阿道夫·冯·塔登被愤怒的示威群众吓破了胆，偷偷地从会场的旁门溜走了。"},{"type":"paragraph","text":"新华社波恩二日电　西德的一万名冶金工人二日举行大规模罢工，抗议资本家的残酷剥削，要求提高工资。"},{"type":"paragraph","text":"西德大垄断企业赫施公司在多特蒙德市的威斯特伐伦冶金工厂的六千名工人，在二日白天为要求增加工资举行罢工。罢工工人打着红旗，浩浩荡荡地走向工厂管理处举行示威，抗议资本家对他们进行残酷剥削。有一部分工人还冲进了工厂管理处。"},{"type":"paragraph","text":"示威工人的正义斗争，得到了广大工人群众的支持。据报道，到二日晚上为止，罢工人数已经增加到九千人。"},{"type":"paragraph","text":"此外，这个垄断企业在多特蒙德的另一家冶金工厂的一千名工人，也参加了罢工的行列。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9fcce6c5a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
