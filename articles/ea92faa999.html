script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英美等国资产阶级报刊承认  苏联在经济竞赛中将击败西方","authors":[],"dates":[{"year":1959,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英美等国资产阶级报刊承认"},{"type":"paragraph","text":"苏联在经济竞赛中将击败西方"},{"type":"paragraph","text":"本报综合报道　据新华社讯：苏共第二十一次代表大会和这次大会上讨论的苏联发展国民经济的七年计划，引起了西方资产阶级舆论的巨大震动。尽管西方资产阶级报刊对苏联的七年计划进行各种诬蔑，但是它们不得不承认，苏联七年计划规模宏伟，而西方国家的经济则陷于停滞，在两个制度的经济竞赛中，西方正在节节败退。"},{"type":"paragraph","text":"英国“雷诺新闻”在评论苏联的七年计划时说：“现在只有傻子才会嘲笑这些计划。在这些计划的背后是空前巨大的成就。支持这些计划的是高等学院，它们训练的工程师比美国高等学校训练的工程师多将近三倍；一般地说来，高等学校的入学人数大约比英国、法国、西德和意大利的入学人数的总和多四倍。”"},{"type":"paragraph","text":"这家报纸还指出，苏联“没有削减货物生产的人为障碍。他们得以充分地发展他们的经济”，而西方却“把人和机器搁置起来，因为使人和机器工作是不‘上算的’”。"},{"type":"paragraph","text":"“纽约时报”1月29日刊载了一篇特稿，题目是：“乌龟和兔子——美国经济发展的缓慢速度说明苏联可能在竞赛中获胜。”"},{"type":"paragraph","text":"这篇特稿写道：“赫鲁晓夫预言，今后七年，苏联的经济发展将达到每年增长8.6％左右。根据最近的成就来看，他的话可能不致错到那里去。赫鲁晓夫先生说这话时同美国每年2％的增长率作了比较。其实他未免太客气了。因为自从朝鲜战争结束以来，我国每年的经济发展速度（除去物价提高的因素以外）平均不到1.5％。”"},{"type":"paragraph","text":"作者问道：“（美国的）发展为什么会慢下来？”他在回答这个问题时说，美国各方面的经济学家都认为，美国经济发展缓慢是由于资本主义制度下出现的“经济衰退”。他写道：“一切方面都承认过去六年平均增长率下降的主要原因是这个阶段出现两次衰退，在衰退期间经济是下降的，而不是上升的。”"},{"type":"paragraph","text":"作者承认，美国经济的发展仍然“几乎陷于停滞状态”。这几年中所有的某些“增长”主要是由于价格上涨。"},{"type":"paragraph","text":"作者认为，照这种情况继续下去，苏联在1970年赶上美国的目标将能够实现。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea92faa999"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
