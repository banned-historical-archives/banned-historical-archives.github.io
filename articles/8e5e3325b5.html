<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5a6e14f4-1103-48c3-bd99-37613918dd4b","name":"中共党史教学参考资料 第25册 “文化大革命”参考资料 上册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/5a6e14f4-1103-48c3-bd99-37613918dd4b.pdf"],"article":{"title":"中共中央关于农村生产大队和生产队在春耕期间不要夺权的通知","alias":"","parts":[{"type":"paragraph","text":"动立场而又不接受改造的地、富、反、坏、右分子（是指本人，不是指家庭出身）必须清除出去。但是应该看到，中小学的教员和干部大多数是好的和比较好的。不要排斥一切，打倒一切。对于犯了错误的人，要按照毛主席“惩前后、治病救人”的方针，积极地帮助他们改正错误，回到以毛主席为代表的无产阶级革命路线上来。群众之间的不同意见，要采取摆事实，讲道理的方法，正确解决。要坚持文斗，不用武斗。在文化大革命初期被打成“反革命”、“假左派，真右派”、“小牛鬼蛇神”的革命学生、革命教职员工，必须认真平反。我们要严格区分敌我矛盾和人民内部矛盾，团结大多数，衡底孤立党内一小走资本主义道路的当权派。"},{"type":"paragraph","text":"中共中央关于农村生产大队和生产队"},{"type":"paragraph","text":"在春耕期间不要夺权的通知"},{"type":"paragraph","text":"（一九六七年三月七日）"},{"type":"paragraph","text":"中共中央关干农村无产阶级文化大革命的指示发布以来，广大贫下中农高举毛泽东思想的伟大红旗，大造党内一小撮走资本主义道路当权派的反，大造坚持反动立场的地富反坏右分子的反，农村文化革命形势一片大好。当前正是春耕大忙时节，各地农村应该在这样大好形势下，认真贯彻毛主席提出的“抓革命、促生产”的方针，立即掀起一个轰轰烈烈的春耕生，产高潮，这是关系到“备战、备荒、为人民”、关系到全年收成和巩固无产阶级政权的头等大事。"},{"type":"paragraph","text":"为此，中央决定：一、在春耕大忙期间，生产大队和生产队不要进行夺权斗争。"},{"type":"paragraph","text":"二、已经夺权并经革命群众和上级同意的生产大队和生产队领导班子，应该切实地挑起革命和生产的两副重担，用毛泽东思想指挥好春耕战斗。领导瘫痪的生产大队和生产队，应由贫下中农积极分子、革命干部组成临时的领导班子来抓好春耕生产。"},{"type":"paragraph","text":"三、农村干部（包括正职）大多数是好的和比较好的，对于犯有错误的干部，应该本着毛主席“惩前后，治病救人”的方针，对他们进行批评教育，帮助他们改正错误。只要不是反党反社会主义分子而又坚持不改和累教不改的，就要允许他们改过，鼓励他们将功赎罪。"},{"type":"paragraph","text":"四、在已经四清过的地方，决不允许那些走资本主义道路的下台干部和地富反坏右分子翻案，要坚决卫护四清运动的成果。"},{"type":"paragraph","text":"（这一通知可在农村中宜读和张贴）"}],"authors":[],"dates":[{"year":1967,"month":3,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":347,"page_end":347},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于农村生产大队和生产队在春耕期间不要夺权的通知","authors":[],"dates":[{"year":1967,"month":3,"day":7}],"is_range_date":false,"parts":[{"text":"中共中央关于农村生产大队和生产队在春耕期间不要夺权的通知","type":"title"},{"text":"各级党委：","type":"appellation"},{"text":"中共中央关于农村无产阶级文化大革命的指示发布以来，广大贫下中农高举毛泽东思想的伟大红旗，大造党内一小撮走资本主义道路当权派的反，大造坚持反动立场的地富反坏右分子的反，农村文化革命形势一片大好。当前正是春耕大忙时节，各地农村应该在这样大好形势下，认真贯彻毛主席提出的“抓革命、促生产”的方针，立即掀起一个轰轰烈烈的春耕生产高潮，这是关系到“备战、备荒、为人民”，关系到全年收成和巩固无产阶级政权的头等大事。","type":"paragraph"},{"text":"为此，中央决定：","type":"paragraph"},{"text":"一、在春耕大忙期间，生产大队和生产队不要进行夺权斗争。","type":"paragraph"},{"text":"二、已经夺权并经革命群众和上级同意的生产大队和生产队领导班子，应该切实地挑起革命和生产的两副重担，用毛泽东思想指挥好春耕战斗。领导瘫痪的生产大队和生产队，应由贫下中农积极分子、革命干部组成临时的领导班子来抓好春耕生产。","type":"paragraph"},{"text":"三、农村干部（包括正职）大多数是好的和比较好的，对于犯有错误的干部，应该本着毛主席“惩前毖后、治病救人”的方针，对他们进行批评教育，帮助他们改正错误。只要不是反党反社会主义分子而又坚持不改和累教不改的，就要允许他们改过，鼓励他们将功赎罪。","type":"paragraph"},{"text":"四、在已经四清过的地方，决不允许那些走资本主义道路的下台干部和地富反坏右分子翻案，要坚决卫护四清运动的成果。","type":"paragraph"},{"text":"（这一通知可在农村中宣读和张贴）","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第二集）》， 北京：1967年6月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e5e3325b5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
