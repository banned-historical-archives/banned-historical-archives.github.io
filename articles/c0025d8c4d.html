script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"吉林铁路局扫除右倾思想及时提拔积极分子到领导岗位上工作","authors":[],"dates":[{"year":1952,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社沈阳四日电】　吉林铁路局已在反贪污、反浪费、反官僚主义运动中及时提拔了一批积极分子到领导岗位上来。这次被提拔的积极分子的共同特点是:作风踏实，思想开展，对革命事业都很忠诚。他们之中有些一贯表现很好，工作能力也比较强，但从前为贪污分子所排斥，未能被领导方面发现。如生产处人事干事张洪仁，工作一贯认真负责，在群众中有很高的威信，在此次反贪污运动中，起了骨干和领导的作用，现已被提升为生产科长。也有的如领工员(相当于工长)韩士来，是个二十多年工龄的老工人，他几年来不断被选为劳动模范，在这次运动中也发挥了骨干作用。他被提拔为材料厂副厂长。"},{"type":"paragraph","text":"这批积极分子被提拔担任领导工作之后，不仅接替了某些部门被撤除的贪污分子的工作，保证了业务工作照当进行，而且扫除了过去有的领导干部怕撤换了贪污分子会影响业务工作的右倾思想，坚定了他们对穷追贪污分子，特别是清除“大老虎”的决心。"},{"type":"paragraph","text":"积极分子提拔到领导工作岗位上来，对贪污分子也是个沉重打击。不少贪污分子曾认为自己有“能力”，革命离不开他；甚至有的贪污分子还嚣张地说:“看你们把‘老子’整掉了，怎样工作?”提拔积极分子到领导岗位上来工作，就迅速地粉碎了这种无耻的论调，促使他们认识到只有彻底坦白，改过自新，才是唯一出路。"},{"type":"paragraph","text":"现在吉林铁路局的领导干部正继续对运动中涌现的大批积极分子进行周密的鉴别，并有计划地加强对他们的教育和培养，以便提拔更多的新干部补充到各个部门中去。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0025d8c4d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
