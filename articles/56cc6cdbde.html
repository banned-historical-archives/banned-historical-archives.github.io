art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"奴隶们创造历史，从来没有“救世主”","authors":["胡长海〖HH/换行〗DW：开滦煤矿工会"],"parts":[{"type":"paragraph","text":"人类历史是劳动人民创造的。离开了劳动人民的物质生产劳动，人类就不能生存，社会也不可能发展。可是，所有的反动统治阶级都把自己打扮成“先知先觉”的“救世主”，否定劳动人民在历史上的伟大作用。孔孟之流胡说“无君子莫治野人，无野人莫养君子”。孔孟的忠实信徒林彪胡诌“英雄和奴隶共同创造历史”。他们否定奴隶创造历史的真理，就是想把创造历史的功劳记在他们那些所谓“君子”、“英雄”的账上，妄图永远骑在劳动人民头上作威作福。"},{"type":"paragraph","text":"解放初期，帝国主义者被赶出开滦的时候，也和孔老二、林彪一样，以“救世主”的腔调，狂妄地断言：“窑花子管不了矿山，没有我们，开滦三个月就得闭矿停产”。"},{"type":"paragraph","text":"二十多年过去了，事实怎样呢？开滦不但没有闭矿停产，而且越办越兴旺。解放后二十五年的煤产量，远远超过解放前七十多年产量的总和。特别是经过无产阶级文化大革命锻炼的开滦工人阶级，更加意气风发，斗志昂扬。唐山矿一号井采用双机拖动，一年就多提升五十万吨煤炭，这是群众创造出来的。唐家庄矿复活四号井，每年加大提升能力三十万吨左右，也是群众干出来的。吕家坨矿的三、五采区合并，林西矿的中深部开发设计，给国家节省了几百万元资金，为大幅度增产煤炭开辟了道路，也是工人、干部和工程技术人员“三结合”搞成功的。一九三六年被帝国主义者封闭的马家沟矿，解放后很快恢复了生产。一九七三年这个矿的产量比设计能力高一倍，一个矿出产了两个矿的煤，充分显示了工人阶级的伟大力量。这些奇迹，都是旧日被称为“窑花子”创造出来的。"},{"type":"paragraph","text":"同样有说服力的是，解放前拉大筐、驮煤炭的“窑花子”，今天有的当了矿党委书记、副书记，有的当了副总工程师。现在，开滦的各级领导成员中，百分之九十以上的干部是从工人中提拔的。我们这些“窑花子”管理矿山，一心为公，一心为革命，根本不是旧社会那些自称“君子”的资本家和反动的资产阶级技术权威所能比得上的！"},{"type":"paragraph","text":"大量的事实说明了一个真理：“人民，只有人民，才是创造世界历史的动力。”历史的车轮不会倒转，革命的潮流是任何人也阻挡不了的，人民群众永远是历史的主人。“君子”蒙蔽不了“小人”，“小人”必将打倒林彪、孔老二这类“君子”。所有违背历史潮流而倒行逆施的反动派，到头来都必然被滚滚前进的历史车轮碾得粉碎。林彪的下场就是如此。我们煤矿工人坚决紧跟毛主席的伟大战略部署，认真学习马克思主义、列宁主义、毛泽东思想，贯彻执行党的基本路线，狠抓两个阶级、两条道路、两条路线的斗争，把批林批孔斗争进行到底！"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56cc6cdbde"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
