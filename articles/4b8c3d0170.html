art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国钓鱼协会成立叶剑英受聘担任名誉主席","authors":[],"parts":[{"type":"paragraph","text":"新华社南京9月9日电 我国又一个群众性业余体育团体——中国钓鱼协会，最近在江苏无锡市成立。叶剑英同志接受聘请，担任这个协会的名誉主席。"},{"type":"paragraph","text":"钓鱼活动在我国已有几千年的历史，深受各阶层人士的喜爱，是项有益于身心健康的体育娱乐活动。出席成立会议的有来自全国二十多个省、市、自治区和解放军、中央部委的钓鱼爱好者、垂钓能手共一百余人。会上制定了中国钓鱼协会章程，推选了协会的领导人，中日友好协会副秘书长金黎当选为协会主席。"},{"type":"paragraph","text":"大会期间，举行了全国首届个人钓鱼邀请赛。RW：叶剑英金黎"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b8c3d0170"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
