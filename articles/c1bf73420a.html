" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对张宗逊等关于西北军区整编问题指示的批语","alias":"","parts":[{"type":"paragraph","text":"转发济南市委关于五反斗争的报告\"的批语"},{"type":"paragraph","text":"（1952年2月10日）"},{"type":"paragraph","text":"[1]指中共济南市委1952年2月5日关于五反斗争中举行劳资见面会议的报告。报告说，济南市工商业界的五反已进入全面检查阶段。根据一个多月的经验，搞好这一工作的基本环节，在于搞好基层工会工作，充分地发动和依靠工人阶级。在坦白限期内和限期过后检查时，都要以厂店为单位举行劳资见面会议。这两个回合搞得好，可以使资方完全低头缴械，如政府的行政压力和分化瓦解工作再配合得及时得力，就可以完全打垮资产阶级的疯狂进攻，并使工人阶级在斗争中得到生动有力的教育和发动。举行劳资见面会议的主要做法是：（一）必须做好充分的思想准备与组织准备，特别是要采用多种方法提高工人阶级对五反斗争重要意义的认识，激发他们参加这一斗争的积极性。（二）必须特别注意对高级职员的工作，争取多数直至全部职员积极投入五反斗争。这一着关系斗争的全局，十分重要。（三）劳资见面一般必须具备下列几个条件：（1）基层工会组织比较健全；（2）大多数职工已经发动起来；（3）对干部和职工进行了充分的政策教育和策略教育；（4）已经掌握了较全面的、充分的材料。（四）劳资见面前，应要资方先交出坦白书，做到知已知彼，心中有数。要严密地组织火力，并进行适当的宣传鼓动工作。要有统一指挥。第一次见面要在火力充分展开后适可而止，指出问题，令其准备再做坦白。会后要总结经验，重新组织火力，准备第二次见面。（五）检查队下去时，也要在充分准备的基础上开好基层厂店劳资见面会议，使检查取得成功。毛泽东全集第三十一卷各中央局，并转所属各大中城市党委同志们："},{"type":"paragraph","text":"兹将济南市委二月五日关于五反斗争的报告发给你们仿行，并在党刊上发表。济南市委的领导艺术是成熟的，各城市正在开展五反斗争，必须研究济南同志的经验。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十日"},{"type":"paragraph","text":"1951年12月，三反运动在全国范围内展开。图为1952年2月10日，河北省在保定召开公审大贪污犯刘青山、张子善大会。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":374,"page_end":375},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1bf73420a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
