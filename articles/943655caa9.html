" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共酒泉市委关于面粉厂发生对偷粮群众鸣枪错误的检查报告","authors":[],"dates":[{"year":1961,"month":1,"day":11}],"is_range_date":false,"parts":[{"text":"中共酒泉市委关于面粉厂发生对偷粮群众鸣枪错误的检查报告","type":"title"},{"text":"地委并省委：","type":"appellation"},{"text":"元月五日晚十点，我市总寨公社和泉湖公社的八九十名社员到面粉厂偷粮。市上得悉后当即通知总寨、泉湖公社派干部前去劝阻认领，同时通知粮食局、面粉厂加强值班劝阻工作，随后由面粉厂、粮站、城关区组织三十多名职工在厂内外进行劝阻。在出厂巡查过程中，该厂行政办公室主任卜凤岐、工会付主席贾长青(均系党员、支部委员)同志，各带数人分头进行巡查，当发现群众带有棍子时，该二人便朝天鸣枪，吓唬群众，使偷粮群众一哄而散，四处乱跑，丢下的多数是老人、妇女、小孩，当即将这些群众召集到厂里，计有46名社员(其中男31名，女15名)，查清内党员一名，富农一人，其它均系基本群众(总寨公社的27人，泉湖公社的19人)。并抬回准备爬墙的梯子一架。当时，将群众召请到会议室，由杨耀文(城关区付区长)、李克文(面粉厂支部书记)等同志宣传讲解了党的政策，组织了座谈后，群众基本清除了顾虑，路近的泉湖公社派来了两名干部将社员带回，路远的总寨公社派来七名干部认领，由面粉厂派汽车送回公社。","type":"paragraph"},{"text":"在此事件发生过程中，市委闻枪声后，立即派人前往，查清上述情况，同时责成卜、贾二同志进行深刻检讨外，并以此教育职工，应热情劝阻前来抢粮、劫粮的群众，尤其是要大力搞好生产克服暂时困难。","type":"paragraph"},{"text":"同时，立即召集有关单位，研究和健全粮食系统的工作制度和保卫制度，加强巡查劝阻工作。","type":"paragraph"},{"text":"以上不妥之处，请省、地委指示。","type":"paragraph"},{"text":" 中共酒泉市委1961年1月11日","type":"paragraph"},{"text":"已印发：王甫、王林、王昭同志；各常委、坤润、秘书长、办公厅、生活安排小组各同志及综合、调运办公室、公安厅党组、民警总队党委。存档。　　共印56分","type":"paragraph"},{"text":"1月14日9时彩抄","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"943655caa9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
