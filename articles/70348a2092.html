<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1967,"month":9,"day":9}],"page_start":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席是我们心中最红最红的红太阳","authors":[],"parts":[{"type":"paragraph","text":"一九五九年五月，正当党内最大的走资本主义道路当权派纠集他的帮凶，准备在庐山会议上向毛主席、向以毛主席为首的党中央猖狂进攻的前夕，反革命修正主义分子陶铸抛出了一株名为《太阳的光辉》的大毒草。"},{"type":"paragraph","text":"陶铸的这株大毒草，紧密地配合了中国赫鲁晓夫及彭德怀反党集团向毛主席的猖狂进攻，为这场反革命的妖风魔雨大造舆论准备。在这株大毒草中，反革命两面派陶铸以太阳比喻我们伟大领袖毛主席和伟大的中国共产党，他虚伪地赞许了一下太阳的光辉，接着假借指责太阳的缺点，恶毒地大肆攻击我们的伟大领袖毛主席。"},{"type":"paragraph","text":"林副主席说：“毛泽东同志是当代最伟大的马克思列宁主义者。”“毛主席是当代无产阶级最杰出的领袖，是当代最伟大的天才。”“毛主席的话，句句是真理，一句超过我们一万句。”全国人民、全世界革命人民对我们心中最红最红的红太阳毛主席，对光焰无际的毛泽东思想无限热爱，无限忠诚，无限信仰，无限崇拜。但是反革命修正主义分子陶铸，在《太阳的光辉》一文中，却恶毒地攻击和咒骂我们伟大领袖毛主席，说什么“有谁说过太阳毫无缺点呢？……大家都知道并且也都指出过，太阳本身上还有黑点”。陶铸还唯恐达不到他诬蔑党，诬蔑毛主席的卑鄙目的，于是，更露骨地说：“我们的党，我们的党领导下的伟大事业，也正是如此”，“在工作中没有缺点和错误的人是没有的”。呸！这是一派胡言乱语！我们革命人民，对伟大领袖毛主席无限信仰，毛主席的每句话，都是我们的行动指南，毛主席几十年的伟大革命实践，是我们最伟大最光辉的榜样。"},{"type":"paragraph","text":"陶铸在庐山会议前夕，写这篇文章，难道是偶然的吗？不！决不是！看看这株大毒草，再看看党内最大的走资本主义道路当权派在庐山会议上向党向毛主席的猖狂进攻，难道不是发人深醒的吗？"},{"type":"paragraph","text":"在庐山会议上，中国赫鲁晓夫就曾经气势汹汹地骂道：不论谁，有了错误都可以批评，可以反对的。丧心病狂地攻击我们伟大领袖毛主席。这说明了陶铸和中国赫鲁晓夫完全是一丘之貉，都是从骨子里反党反社会主义反毛泽东思想的。陶铸的《太阳的光辉》一文，就是为他们一伙在庐山会议上搞阴谋活动，为反革命复辟作舆论准备的。"},{"type":"paragraph","text":"毛主席是中国人民和世界革命人民心中最红最红的红太阳，毛泽东思想是我们的命根子，陶铸的卑劣的反革命伎俩，丝毫也损害不了毛泽东思想的灿烂光辉。几只嗡嗡叫的苍蝇，企图阻挡住毛泽东思想的灿烂光辉，那是白日作梦！让我们一千遍一万遍地高呼：我们心中最红最红的红太阳毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"DW：第二炮兵医科学校革命造反总部"}],"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70348a2092"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
