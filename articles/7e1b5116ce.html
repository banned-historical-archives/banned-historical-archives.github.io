torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"关于向南京进一步谈判等问题致潘汉年电","alias":"","parts":[{"type":"paragraph","text":"关于向南京进一步谈判等问题"},{"type":"paragraph","text":"致潘汉年电"},{"type":"paragraph","text":"（1936年8月25日）小开兄："},{"type":"paragraph","text":"甲、向南京进行具体的进一步的谈判，期在短期内成立统一战线，是我们进行整个统一战线的重心。兄应于接电后七天内回到保安，受领新的方针，再以七天至十天到达南京开始谈判。"},{"type":"paragraph","text":"乙、向李毅\"说明这种谈判的成功，对于甲乙两军合作有大的帮助，将使两军合作更加密切，而不是不利于合作，并要求李毅于外出活动时，注意督促南京与我们迅速成立谅解。"},{"type":"paragraph","text":"丙、对李、白代表暂时抑留在西安，但不可向他作具体表示。李毅对之亦然。"},{"type":"paragraph","text":"丁、我们与杨虎臣谈判交通、工商问题，张文彬如到，速查其交涉程度，并请李毅向杨交涉，务在日内将肤施、洛川间交通恢复原状。"},{"type":"paragraph","text":"戊、张子华如尚在西安即与同来，特别注意将他手中之曾养甫亲笔信及密码带来。"},{"type":"paragraph","text":"已、为求迅速，要求李毅派飞机送你至肤施，要李向杨交涉保[1]即张学良。[2]即李宗仁、白崇禧。护，以利与南京谈判。"},{"type":"paragraph","text":"庚、需款甚急，三万元速送来。"},{"type":"paragraph","text":"赵东八月二十五日午速复"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":8,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":93,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e1b5116ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
