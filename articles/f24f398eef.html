art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"罗总长接见来京的部队文艺工作者他勉励部队文艺工作者戒骄戒躁，谦虚谨慎，向地方学习；更高地举起毛泽东思想伟大红旗，突出政治，坚持四个第一，使我军的文艺工作获得更大的繁荣；","authors":[],"parts":[{"type":"paragraph","text":"本报二十四日讯 国务院副总理、人民解放军总参谋长罗瑞卿，今天接见了我军参加中南区、西北区戏剧观摩演出大会后来京演出的文艺工作者和战士业余演出队的同志们，并亲切地同他们作了长时间的谈话。"},{"type":"paragraph","text":"罗总长说，中南区、西北区以及其他地区的观摩演出，出了很多好戏。这是继一九六四年京剧现代戏会演以来，在文化革命上的新成就。他代表军委、林彪副主席和各总部对文艺战线所取得的新成绩表示热烈的祝贺！"},{"type":"paragraph","text":"罗总长强调指出：部队的文艺工作者必须戒骄戒躁，更加谦虚谨慎，向地方的文艺工作者学习。他最后勉励部队的文艺工作者，要更高地举起毛泽东思想伟大红旗，突出政治，坚持四个第一，使我军的文艺工作更进一步发展，获得更大的繁荣，在教育自己、打击敌人方面，发挥出更大的作用。"},{"type":"paragraph","text":"参加今天接见的有：演出六场话剧《英雄工兵》的广州部队战士话剧团，演出七场话剧《喀喇昆仑颂》的新疆军区文工团，演出小话剧《刺刀见红》、《灵活处理》、《球衣问题》、《驾驶执照》、《先别肯定》的兰州部队战斗文工团和战士业余演出队，演出歌剧《红松店》、《枪之歌》的广州部队战士歌剧团、武汉部队胜利歌剧团，以及昆明部队国防话剧团在京拍摄电影《胜利在望》的同志们。"},{"type":"paragraph","text":"接见时在座的有：副总参谋长李天佑，总政治部副主任刘志坚、梁必业，国防部办公厅主任萧向荣和中南区、西北区戏剧观摩演出大会负责来京演出的领队同志。�筊W：罗瑞卿；副总理总参谋部长；社会活动；军队文艺工作者"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f24f398eef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
