ates":[{"year":1976,"month":6,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年六月二十四日电　中共中央政治局委员姚文元今天下午会见以埃及解放出版社兼《共和国报》董事长、埃及报业协会主席阿卜杜勒·莫内姆·萨韦为团长的埃及新闻代表团，同他们进行了热情友好的谈话。"},{"type":"paragraph","text":"会见时，姚文元同志对埃及新闻界朋友说，中国人民遵循伟大领袖毛主席的教导，坚决支持埃及和阿拉伯各国人民反对超级大国的霸权主义和犹太复国主义的正义斗争。他希望朋友们用自己的笔为非洲人民和阿拉伯人民的独立、解放和团结的事业作出贡献。萨韦团长说，埃及人民赞赏中国政府和人民在支持阿拉伯事业方面所持的正确立场，并重视同中国人民进一步发展友谊。"},{"type":"paragraph","text":"埃及驻中国大使馆临时代办陶菲克参加了会见。"},{"type":"paragraph","text":"会见时在座的有《人民日报》总编辑鲁瑛，新华社副社长缪海稜，中央广播事业局副局长顾文华，外交部新闻司副司长王珍等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"对话"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1976,"month":6,"day":25}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"姚文元同志会见埃及新闻代表团同他们进行了热情友好的谈话","authors":[],"parts":[{"type":"paragraph","text":"会见时，姚文元同志对埃及新闻界朋友说，中国人民遵循伟大领袖毛主席的教导，坚决支持埃及和阿拉伯各国人民反对超级大国的霸权主义和犹太复国主义的正义斗争。他希望朋友们用自己的笔为非洲人民和阿拉伯人民的独立、解放和团结的事业作出贡献。萨韦团长说，埃及人民赞赏中国政府和人民在支持阿拉伯事业方面所持的正确立场，并重视同中国人民进一步发展友谊。"},{"type":"paragraph","text":"埃及驻中国大使馆临时代办陶菲克参加了会见。"},{"type":"paragraph","text":"会见时在座的有《人民日报》总编辑鲁瑛，新华社副社长缪海棱，中央广播事业局副局长顾文华，外交部新闻司副司长王珍等。"}],"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78a926fb76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
