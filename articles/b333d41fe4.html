<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习毛泽东思想是根本","authors":["杨士文"],"dates":[{"year":1965,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学习毛泽东思想是根本"},{"type":"paragraph","text":"我们在设计一种新产品的曲折过程中，逐渐领悟到，实行产品设计革命必先进行思想革命，而思想革命的核心问题是活学活用毛泽东思想。"},{"type":"paragraph","text":"不久前，我们几个才出学校校门的青年人，同工人们一起，完成了一种客车上使用的车电装置的设计，使这个原来只有二十年代初期的水平的产品，一跃而达到了六十年代水平。在这次设计过程中，我们深深体会到，要实行产品设计革命，首先必须思想革命，而思想革命的根本关键，就是学习和掌握毛泽东思想。"},{"type":"paragraph","text":"我国现有客车使用的L型车电装置，是一九一三年从英国进入我国的。以后经过日本改进定型，几十年来再没有改动过。这种车电装置的机组结构复杂，重量大，功率小，电压低，使用不可靠，检修保养困难，供应的电能只有二至三瓩，远远不能满足近代客车发展的需要。"},{"type":"paragraph","text":"前年，领导上决定要克服这个薄弱环节，设计一种新的车电装置。当时，我们虽然有为祖国争口气的劲头，但思想没有解放，认为我们几个是学车辆专业的，又是初出茅庐，缺乏经验，怕力不能及，搞不出名堂。思想上怕了，行动上就不敢闯，也就踢不开原来的框框。开始的时候，我们只能在老车电装置中摸索一些改进的方案。结果作了两个多月的试验，随车跑了一万五千多公里，还是毫无眉目。"},{"type":"paragraph","text":"正想寻找新出路的时候，听说铁道部从国外进口了一批新式的车电装置。当时，我们真是如获至宝，认为是进口货，一定错不了。在这种思想的支配下，既不了解装置的性能，也不结合国内情况，一听说兄弟单位正要组织仿制，我们就参加了这项工作。经过一番努力，造出了两台样机。在试制试验的过程中，我们才察觉这套装置太复杂，一个控制箱就有上千个零件，调整非常困难，零件不耐震，容易损坏。同时试验又证明，这套装置不能适应我国地区广、线路长、气温气候骤变的应用环境。连从国外进口的原装置，也经不起从满洲里到广州长途运行考验。这条路显然是行不通，一年多时间就这样过去了。"},{"type":"paragraph","text":"这次失败之后不久，我们从科学技术情报上，逐渐了解到许多国家正在研究采用无触点整交流车电装置。这是一种六十年代水平的新技术，电机是无触点交流的，重量轻，功率大，构造简单，制造容易，采用半导体整流供车内用电，整个供电系统没有一个触点，因而工作非常可靠，作为近代客车的车电装置，是比较理想的。怎样作设计呢？我们虽然跳出了迷信外国的框框，却又钻进了本本的框框。一年多时间，我们读遍了电机学、电机设计等书籍，确实增加了不少知识，但无触点整交流车电装置还是纸上谈兵，无法付诸实现。"},{"type":"paragraph","text":"怎么办呢？打退堂鼓吗？当然不能，这口气一定要争。但怎么争呢？直到这时候，形势才逼着我们去向毛主席的著作请教。毛主席说：“无论何人要认识什么事物，除了同那个事物接触，即生活于（实践于）那个事物的环境中，是没有法子解决的。”这一段话一下给我们指明了方向。我们振作起精神，总结了前一阶段的教训，决心下楼出院，到生产实践中去学习，向工人去请教。在领导的支持下，我们与长春客车工厂和长春市电机厂密切配合，边摸索、边设计、边试验。现场设计人员的丰富实践知识，大大补充了我们的不足。工人师傅们也提出了二十多条建议，帮助我们改进了装置的结构和性能。仅仅四个月的时间，我们与长春客车工厂一起，就设计出了第一套无触点整交流车电装置。"},{"type":"paragraph","text":"产品很快试制出来了，但是试验结果，没有达到预想的要求，当转速为每分钟七百五十转的时候，发出的电能还不到一瓩，仅为要求的七分之一。我们兴奋的心情，顿时又冷了下来。这时我们记起了毛主席的话：“……一般地说来，不论在变革自然或变革社会的实践中，人们原定的思想、理论、计划、方案，毫无改变地实现出来的事，是很少的”。对，就是这个道理。我们这还是第一次试验，已经发出电来了，这就是胜利。工人同志们也鼓励我们说：“搞新玩艺儿，哪有个不失败的，失败了再来嘛！”毛主席的教导和工人们的鼓励，给了我们勇气和力量。我们不断总结，不断修改设计，反复进行试验。这样经过大约四次修改设计，二十余次反复试验，十六个月的艰苦工作，新型无触点整交流车电装置终于获得了基本成功。"},{"type":"paragraph","text":"铁道部四方车辆研究所  杨士文"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"九·一三事件","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b333d41fe4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
