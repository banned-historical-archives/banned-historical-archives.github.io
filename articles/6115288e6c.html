"李炳章　李暖　王钧　卞汝良"],"dates":[{"year":1950,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"济南建筑工人感谢毛主席"},{"type":"paragraph","text":"——李炳章、李暖、王钧、卞汝良等来信编者同志："},{"type":"paragraph","text":"我们是建筑工人。在敌伪时代，我们在包工头子的把持垄断下，受着层层的剥削和压迫；任凭你有多么好的技术，你要不走门子托人情，就找不到活干，即使托人找到了工作，工资也不过拿到五、六成。平时包工头子把我们当作牛马、当作奴隶，时常受到他们的打骂，遭到他们的白眼。"},{"type":"paragraph","text":"济南解放以后，我们参加了修建济南和铁路沿线房子的工作。公家为了纠正以前的弊端，为了工人弟兄多得些实惠，特采用自办方式，不让包工头子从中渔利。公家发下多少工资，我们就得到多少工资。"},{"type":"paragraph","text":"干部对工人生活的照顾，真是无微不至，我们有了病，就给看病，受了伤，就给治伤。举两个具体例子吧：修理济南南郊五十二号宿舍时，木工李润生砍伤了手，负责干部立刻将他送到医院去治疗，疗养期间除照常发给工资外，还给他的家里送了小米五十斤；瓦工吴建梅建大礼堂时摔伤了腰，当时即把他送医院，在两个多月的治疗期间不但照发工资，领工的张处长还亲自跑到医院去慰问他。"},{"type":"paragraph","text":"我们在各处工作时，不但领工同志对我们和霭可亲，处处体贴，各站的护路同志也经常协助我们，随时照顾我们的生活，帮助大家解决困难。"},{"type":"paragraph","text":"一年来，我们认识了毛主席的伟大，认识了共产党的政策真正是依靠工人，团结工人，并且把工人当作了主人。因此，我们全体工友都能自觉自愿、诚心诚意地努力工作。济南及铁路沿线纵横两千余里的一百多处工程，不须监工督促，大家都能自动的加油干活，争先恐后的分头抢修，使每个工程都能先期完成。全部工程结束以后，领导上又把我们介绍到生产建筑部门去工作。从此，我们的生活安定了。"},{"type":"paragraph","text":"济南市建筑工人李炳章、李暖、王钧、卞汝良等"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6115288e6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
