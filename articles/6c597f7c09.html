" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发华东局关于减租交租及退押的意见","authors":[],"dates":[{"year":1950,"month":8,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央转发华东局关于减租交租及退押的意见","type":"title"},{"text":"中南局、西北局并告西南局：","type":"appellation"},{"text":"兹将华东局关于减租交租及退押的意见转给你们，望你们参考，并由你们规定办法处理。","type":"paragraph"},{"text":" 中  央八月二十五日","type":"paragraph"},{"text":"关于新区减租交租问题，我们除同意中央意见外，还有以下补充意见，提供中央参考：","type":"paragraph"},{"text":"（一）我们认为今年实行土地改革的一般地区，农会组织较健全的，群众得到初步发动，可以由区乡农会统一掌握，代地主收租和代地主交公粮，并酌量留给地主口粮及种子外，将多余粮食由农会保管。在分配土地时统一分配给雇贫农，做生产与生活资料。但为了防止集中由农会保管造成贪污浪费，最好采取由原佃户依法减租后，除代地主应交公粮，留给地主口粮及种子外，多余粮食暂保存在原佃户家中，由乡村农协组织保管委员会，保管该乡村所有粮食数目，待分配土地时统一分配。但在分配时，对原佃户曾交地主押金者，应适当加以照顾，酌量多分给一些或允许其扣留一些押金。","type":"paragraph"},{"text":"（二）在今年尚不进行土地改革的地区，一般的农会组织尚不能健全，除要农民代地主交公粮外，仍以依法减租交租，农协不加控制为宜。即是在准备今年进行土地改革，而农会组织尚不健全的地区，亦应照此办理，不必勉强由农会控制，因恐办理不好，反会引起农民内部不必要的纠纷。不论今年进行土地改革与否，对小土地出租者及富农出租土地仍应按减租条例，依法减租交租，农民早已不交租，地主早已收不到租者，公粮由农民完全负担。农会不应再向农民收租。但必须说服农民，对小土地出租者，仍应依法交租，对生活确实困难的小地主亦应酌量交给他们一部分口粮。","type":"paragraph"},{"text":"（三）但我们认为即使在第一项条件下，亦不宜一般强调采取农会代地主收租的办法，因为这种办法的好处较少（如避免地主于收租后转移资金或浪费等），但毛病则甚多（如农会不健全易搞乱，农会强者亦易引起干部贪污浪费，脱离群众，易造成群众内部纠纷，又不按政府政策办事，易使领导陷于被动，使今年不土改地区发生顾虑混乱。同时农会代地主收租，会使国家征粮减低，因无法进行对地主累进征收等等）。","type":"paragraph"},{"text":" 华东局未  马","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c597f7c09"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
