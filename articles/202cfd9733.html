ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对总政关于一九五二年敌军工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"对总政关于一九五二年敌军工作报告的批语"},{"type":"paragraph","text":"（1953年1月14日）"},{"type":"paragraph","text":"退总政。此件\"很好。敌军工作必须加强。大中型播音机应多制。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十四日周、朱、彭阅。"},{"type":"paragraph","text":"[1]指人民革命军事委员会总政治部主任罗荣桓、副主任傅钟、肖华1953年1月10日关于一年来朝鲜战场上的敌军工作向毛泽东并中央、军委的报告。报告说，1952年下半年我军曾连续地有重点地向敌伪军发动了4次政治攻势（六·二五攻势，八·一五攻势，中秋节攻势以及目前正在进行的圣诞节攻势），以前那种火线上只见敌人传单到处飞，广播、喊话频繁，而我们活动较少的情况已经扭转过来。目前，供给部队以较充分的现代化宣传工具，已成为开展对敌宣传的重要问题。播音用的播音机宣传效果很好，但现有的多属小播音机，声音只能达到3华里以内。250瓦的效力好，可以压倒敌人广播，最为部队欢迎。播音机除用于对敌宣传外，也是我们自己部队进行政治工作的一个工具。"},{"type":"paragraph","text":"[2]周，指周恩来。朱，指朱德。彭，指彭德怀，当时任人民革命军事委员会副主席、中国人民志愿军司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":447,"page_end":447},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"202cfd9733"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
