art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我友好代表团到巴基斯坦进行友好访问在达卡机场受到热烈欢迎，巴基斯坦朋友高呼：“巴中友谊万岁！”“毛主席万岁万岁！”","authors":[],"parts":[{"type":"paragraph","text":"新华社达卡九日电 以中华人民共和国全国人民代表大会常务委员会副委员长、中国科学院院长郭沫若为团长的中华人民共和国友好代表团应巴基斯坦政府的邀请，九日下午乘飞机到达这里，对巴基斯坦进行友好访问。"},{"type":"paragraph","text":"代表团在机场上受到巴基斯坦朋友的热烈欢迎。当郭沫若和代表团其他成员走下飞机的时候，欢迎者给他们献了花环，并且高呼：“巴中友谊万岁！”“毛主席万岁！”"},{"type":"paragraph","text":"到机场欢迎中华人民共和国友好代表团的，有东巴基斯坦首席秘书沙菲乌勒·阿扎姆，达卡专区专员穆罕默德·阿拉乌丁和东巴基斯坦巴中友好协会主席米尔扎·吴拉姆·哈菲兹。"},{"type":"paragraph","text":"中国驻巴基斯坦大使张彤和中国驻巴基斯坦使、领馆官员也到机场迎接。"},{"type":"paragraph","text":"新华社加德满都九日电 以中华人民共和国全国人民代表大会常务委员会副委员长、中国科学院院长郭沫若为团长的中华人民共和国友好代表团，在尼泊尔进行友好访问之后，九日下午乘飞机离开这里，前往巴基斯坦进行友好访问。"},{"type":"paragraph","text":"尼泊尔外交大臣杰亨德拉·巴哈杜尔·拉杰班达里，交通、运输和工程国务大臣赫·巴哈杜尔·什雷斯塔，外事秘书雅杜·纳特·卡纳尔，全国评议会秘书忠格·巴哈杜尔·昌德，尼泊尔驻中国大使伦迪尔·苏巴以及其他高级官员前往机场为代表团送行。"},{"type":"paragraph","text":"到机场送行的还有：尼泊尔——中国友好协会会长普尔纳·巴哈杜尔，尼泊尔——中国文化协会主席布班·拉尔·普拉丹和尼泊尔和平委员会主席西迪·查兰·什雷斯塔。"},{"type":"paragraph","text":"巴基斯坦驻尼泊尔大使阿卜杜勒·拉乌夫汗也到机场送行。"},{"type":"paragraph","text":"前往机场送行的，还有中国驻尼泊尔大使王泽、中国大使馆官员和在尼泊尔的中国工程技术人员的代表。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3261a8c35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
