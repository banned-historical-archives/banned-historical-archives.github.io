<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"进一步维护资产阶级特权所有制苏修推行“新体制”残酷压榨工人","authors":[],"dates":[{"year":1967,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京5日电　苏修领导集团正在工业企业中推行的“新体制”，是进一步以资产阶级特权阶层的所有制代替社会主义的全民所有制，使广大职工沦为出卖劳动的雇佣奴隶。"},{"type":"paragraph","text":"“新体制”给予企业领导人更多和更大的特权。根据苏联官方有关的“条例”规定，一小撮企业领导人可以“不经委托即以企业名义办事”。他们有权支配生产资料和流动资金，可以擅自确定和改变职工的工资和奖金，有权自行招收、解雇和处罚工人，可以自行批准企业的结构和编制。据苏联报刊透露，他们经常借口“裁减多余人员”和“紧缩编制”，大量解雇工人，以牟取高额利润。妇女特别受到歧视，有些工厂首先解雇多子女的女工、暂时不能工作的孕妇以及家中生活困难的寡妇。由于解雇工人而剩下来的工资的大部分，都装进企业领导人的腰包。而大批大批被强行解雇的失业职工，却为生活所迫到处奔走，寻找职业。一些侥幸被留下来的人，也是提心吊胆，朝不保夕。企业领导还千方百计地加重对他们的剥削。许多工厂勒令暂时留下的工人“自愿”代替被解雇人员的工作，一个人甚至要担负两个人到三个人的工作。许多工厂还加重对童工的剥削，让他们担任有损健康的工作。按苏联“劳动法”规定，童工只劳动六小时，但很多工厂为了赚钱，都强迫童工劳动七小时。"},{"type":"paragraph","text":"在推行“新体制”以后，企业领导人可以随便招收和解雇工人，造成了劳动力的严重流动。苏联报刊承认:“国家的工业和工地每年接收和解雇数百万工人和职员”。在大批解雇职工的同时，一些企业领导人运用职权，安插亲信，培植家族势力。如阿拉米利呢绒厂经理的侄子担任该厂“织布生产主任”；经理的侄子的妻子长期担任“主任定额员”。工厂的“许多重大问题”，常常由他们一家“开家庭会议来决定”。"},{"type":"paragraph","text":"压迫和剥削工人的“新体制”，受到苏联劳动人民日益强烈的抵制。这使苏修领导集团感到不安，慌忙在去年十二月以苏共中央的名义发表一个所谓关于加强劳动纪律的决议，对工人阶级实行镇压。苏修领导集团对苏联工人阶级加紧进行压迫和剥削，只能加速他们自己的灭亡。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b46706154f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
