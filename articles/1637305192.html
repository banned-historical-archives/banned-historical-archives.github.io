ors":[],"dates":[{"year":1974,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社东京一九七四年二月九日电　据日本报纸报道，日本执政党自由民主党的一些议员二月六日决定成立“党正常化联络会议”，以批判党内一小撮极右分子组成的“青岚会”的反动行径。"},{"type":"paragraph","text":"“党正常化联络会议”的发起人有:河野洋平、田川诚一、鲸冈兵辅、盐谷一夫、田村元等。在五日举行的发起人会议决定广泛地号召日本国会议员参加“党正常化联络会议”，并且准备发起签名运动。"},{"type":"paragraph","text":"最近，“青岚会”的一系列旨在复活军国主义和反华反共的活动，引起了日本一些政界人士的不满和谴责。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1637305192"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
