" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"在接见日本朋友时的谈话","alias":"","parts":[{"type":"paragraph","text":"在接见日本朋友时的谈话"},{"type":"paragraph","text":"（一九六一年十月七日）"},{"type":"paragraph","text":"日本除了亲美的垄断资本家和军国主义军阀之外，广大人民都是我们的眞正朋友。你们也会威到中国人民是你们的眞正朋友。朋友有眞有假，但通过实践可以看清谁是眞朋友，谁是假朋友。"},{"type":"paragraph","text":"中国有句古话，物以类聚，人以群分。日本的岸信介和池田勇人是美帝国主义和蒋介石集团的好朋友。日本人民同中国人民是好朋友。"},{"type":"paragraph","text":"是美帝国主义追使我们中日两国人民联合起来的。我们两国人民都遭受美帝国主义的压追，我们有着共同的遭遇，就团结起来了。我们要扩大团结的范围，把全亚洲、非洲、拉丁美洲以及全世界除了帝国主义和各国反动派以外的百分之九十以上的人民团结在一起。"},{"type":"paragraph","text":"尽管斗争道路是曲折的，但是日本人民的前途是光明的。中国革命经过无数次的曲折，胜利、失败、再胜利、再失败，最后的胜利属于人民。日本人民是有希望的。"},{"type":"paragraph","text":"（原载《新华月报》1961年第十一期）12"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":10,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":25,"page_end":25},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a46fe3161"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
