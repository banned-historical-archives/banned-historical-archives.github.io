script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级政客  鼓吹美国尽速恢复核试验","authors":[],"dates":[{"year":1961,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级政客"},{"type":"paragraph","text":"鼓吹美国尽速恢复核试验"},{"type":"paragraph","text":"新华社14日讯　华盛顿消息：美国许多资产阶级政客近来纷纷鼓吹美国应尽速恢复核武器试验。"},{"type":"paragraph","text":"美国国会两院原子能联合委员会主席霍利菲尔德14日在众议院发表演说时抱怨说，继续推迟进行核试验将会阻挠在核武器方面的“重大发展”。他说，美国不可能“无限期地”参加日内瓦关于禁止核试验问题的“徒劳无益”的谈判。美国“必须进一步作好准备，以便在总统认为国防上有此需要时，立即恢复地下核试验”。"},{"type":"paragraph","text":"前总统艾森豪威尔12日在俄亥俄州辛辛那提市一次讲话中说，日内瓦不继续核试验会议看来是走向无休止的谈判而不是达成一项实际的条约。他要美国给日内瓦禁止核试验谈判达成协议“规定一个期限”，并且表明逾期美国即将“不再受任何约束”。"},{"type":"paragraph","text":"同一天，民主党参议员薛明顿在参议院发表演说，企图把日内瓦禁止核试验谈判久久未能达成协议的责任推给苏联，并且主张美国恢复核试验。"},{"type":"paragraph","text":"民主党参议员杰克逊11日也鼓吹美国应“尽早地”恢复地下核武器试验。他说，在进行了三年的禁止核试验谈判之后，美国的“耐心已经耗尽了”。"},{"type":"paragraph","text":"美联社记者罗伯茨13日在从纽约发出的一篇评论中写道，“肯尼迪政府可能会决定恢复核试验，并顶住一阵全世界范围内的批评浪潮”。罗伯茨说，“在作出决定之前，美国可能会放出若干试探性气球来试一试世界的政治气候。”他透露，气球之一将是“力图把日内瓦核谈判失败的责任推在苏联身上”。另一个气球则将是“设法确证恢复核试验的必要性”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ba8fd6efc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
