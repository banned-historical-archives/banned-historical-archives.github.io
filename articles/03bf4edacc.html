thors":[],"dates":[{"year":1967,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席革命路线的颂歌"},{"type":"paragraph","text":"——“毛主席革命路线胜利万岁”美术作品展览选刊"},{"type":"paragraph","text":"东风浩荡，举国欢腾。在我们欢庆建国十八周年的日子里，“毛主席革命路线胜利万岁”革命美术作品展览，在北京展出了。这是毛泽东文艺思想的新胜利，这是美术创作革命化的新成果。"},{"type":"paragraph","text":"一年多来，在伟大的无产阶级文化大革命中，广大工农兵、红卫兵小将和革命美术工作者，高举毛泽东思想伟大红旗，紧跟毛主席伟大战略部署，满怀革命的激情，一方面挥起画笔，热情洋溢地歌颂我们心中最红最红的红太阳毛主席，歌颂无产阶级文化大革命中出现的崭新气象；另一方面，以画笔作刀枪，向以中国赫鲁晓夫为首的党内最大的一小撮走资本主义道路当权派，向资产阶级反动路线，展开了猛烈的进攻。这些革命美术作品发挥了团结人民，教育人民，打击敌人，消灭敌人的战斗作用。"},{"type":"paragraph","text":"毛主席教导我们：“革命文化，对于人民大众，是革命的有力武器。革命文化，在革命前，是革命的思想准备；在革命中，是革命总战线中的一条必要和重要的战线。”革命的美术创作是革命文化的一部分，我们应当重视和发展革命美术创作，通过工农兵所喜爱的艺术形式来宣传伟大的毛泽东思想，让革命美术永远成为宣传毛泽东思想的坚固阵地！"},{"type":"paragraph","text":"毛主席的革命文艺路线胜利万岁！"},{"type":"paragraph","text":"——编　者"},{"type":"paragraph","text":"东方红"},{"type":"paragraph","text":"响应毛主席“斗私，批修”的伟大号召，把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"坚决遵照毛主席的最新指示，实行按系统革命大联合"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03bf4edacc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
