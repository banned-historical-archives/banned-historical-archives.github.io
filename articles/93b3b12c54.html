script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"头泉车站工头　严重剥削工人","authors":[],"dates":[{"year":1949,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"头泉车站工头"},{"type":"paragraph","text":"严重剥削工人编辑同志："},{"type":"paragraph","text":"井陉八区东方岭砸石子工人赵喜柱等对我们谈：工头从石家庄铁路局包工筑路，每方小米十五斤，放给工人每方八斤，他们虽然还出些锤、钳、炮药的开支，但仍旧获利很大。在收方上（即排收石子以方作计算单位的）也有毛病，因为在地面上收，无形中压缩了石子的体积（据谈在车上收公道），工人吃了亏。如前几天收方时，南方岭一伙工人，用工二百个，只排收了八十余方，每一个工人一天连半方也合不住，只能赚三斤多米，以致工人情绪很低落，认为是白干哩！"},{"type":"paragraph","text":"据说上安村大工头许泰山一次从铁路局包出石子一万方，每方赚米二斤，又转包给二头子，共赚米两万斤，他自己只跑了一趟道，说了说话。其它工头，也都是数千斤米赚到家里，大发其财。个人吃喝浪费，任意挥霍，工人见此现象，非常不满。"},{"type":"paragraph","text":"以上问题，关系很多工人生活（头泉车站，现有砸石子工人约一千六、七百名），国家拿出好多粮食，没有到了出劳力的工人手里，而大部被工头从中剥夺，以致工人生产情绪降低，这对国家建设事业也是非常不利的。希望有关方面，即刻进行检查，认真纠正这一不合理的措施，以达增进工人福利的目的。"},{"type":"paragraph","text":"井陉县委通讯组刘永彬执笔"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93b3b12c54"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
