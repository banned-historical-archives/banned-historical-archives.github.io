将最听毛主席话》，七月一日起在北京、上海和全国各地陆续上映。","authors":[],"dates":[{"year":1967,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海制成两部纪录文化大革命的新影片"},{"type":"paragraph","text":"纪录影片《高举革命批判大旗奋勇前进》和《革命小将最听毛主席话》，七月一日起在北京、上海和全国各地陆续上映。"},{"type":"paragraph","text":"新华社三十日讯 纪录影片《高举革命批判大旗奋勇前进》和《革命小将最听毛主席话》，七月一日起在北京、上海和全国各地陆续上映。"},{"type":"paragraph","text":"《高举革命批判大旗奋勇前进》，纪录了上海市无产阶级革命派和广大革命群众，高举毛泽东思想伟大红旗，奋起批判党内最大的一小撮走资本主义道路当权派的战斗情景。无产阶级革命派的大联合和革命的“三结合”发挥了强大威力，广大工农兵、革命师生和革命干部站在斗争第一线，抓革命凯歌高奏，促生产捷报频传。整个影片，以真实而动人的镜头，构成了当前我国无产阶级文化大革命一派大好形势的缩影。"},{"type":"paragraph","text":"纪录上海市中小学“复课闹革命”的影片《革命小将最听毛主席话》，广泛地展示了上海中小学校的革命师生坚决执行毛主席的无产阶级革命路线的革命景象。他们热烈响应伟大领袖毛主席的号召，从社会上“杀”回学校去，以教学班为基础实行革命大联合，认真学习毛主席著作和积极投入军政训练。一幕幕动人的场面，表明在无产阶级文化大革命中经受了锻炼的革命师生们，进一步加强了革命性、科学性和组织纪律性，他们既是停课闹革命的闯将，又是“复课闹革命”的模范。这两部影片，是由上海工农兵电影制片厂和上海东方红电影制片厂分别摄制的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abfb9ff158"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
