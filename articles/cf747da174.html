rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓副总理会见森本孝顺长老等日本朋友"},{"type":"paragraph","text":"邓小平副总理五月六日上午会见了以唐招提寺森本孝顺长老、朝日广播社社长原清、日中文化交流协会理事长宫川寅雄为首的日本“国宝鉴真和尚像中国展”访华团全体成员。"},{"type":"paragraph","text":"邓副总理感谢唐招提寺、朝日广播社和日中文化交流协会为鉴真大师像回国巡展所给予的大力支持，感谢日本朋友为发展中日友好关系所作的贡献。他说，鉴真大师像回国巡展是个盛举，这说明中日两国友好关系源远流长。他希望两国人民的友谊继续长远地传下去。"},{"type":"paragraph","text":"邓副总理一九七八年十月访日时曾参观唐招提寺，接受了森本长老提出的让鉴真大师像回国“探亲”的建议，并欢迎森本长老访问中国。这次会见时，森本长老激动地对邓副总理说，感谢您的邀请使我多年来梦寐以求的夙愿得以实现。他说，鉴真和尚像在一千二百多年后回国探亲又为日中文化交流点燃了一盏明灯，我将努力使这盏明灯永不熄灭，为日中友好继续作出努力。"},{"type":"paragraph","text":"李先念副总理到达堪培拉"},{"type":"paragraph","text":"国务院副总理李先念和随行人员，在澳大利亚社会保险部长玛格丽特·吉福伊尔的陪同下，五月六日上午乘专机离开墨尔本抵达澳大利亚首都堪培拉。"},{"type":"paragraph","text":"到机场迎接的有澳大利亚副总理兼贸易和资源部长道格拉斯·安东尼等政府官员。"},{"type":"paragraph","text":"五月六日下午，在议会大厦前面的草坪上举行了欢迎仪式。澳大利亚总理弗雷泽陪同李先念走上检阅台。乐队奏中、澳两国国歌。李先念检阅了仪仗队。"},{"type":"paragraph","text":"随后，李先念到议会大厦会见了弗雷泽。"},{"type":"paragraph","text":"五月六日上午，中国和澳大利亚政府科学技术合作协定在堪培拉的议会大厦签署。"},{"type":"paragraph","text":"五月六日下午，李副总理和弗雷泽总理在议会大厦举行首次会谈。"},{"type":"paragraph","text":"李先念副总理是在圆满结束对巴布亚新几内亚的访问后，于五月三日到达澳大利亚进行正式友好访问的。"},{"type":"paragraph","text":"齐亚·哈克总统离京回国"},{"type":"paragraph","text":"巴基斯坦总统齐亚·哈克将军和夫人以及随同来访的贵宾，结束了对我国的正式友好访问，五月六日下午乘专机离开北京回国。"},{"type":"paragraph","text":"国务院副总理耿飚和夫人赵兰香，人大常委会副委员长谭震林，外交部副部长韩念龙，中国人民解放军副总参谋长伍修权，外经部副部长魏玉明，中国驻巴基斯坦大使徐以新和夫人陆红等，到机场欢送。在飘扬着中巴两国国旗的首都机场上举行了欢送仪式。"},{"type":"paragraph","text":"许多国家驻中国的外交使节也到机场送行。在同南斯拉夫驻中国大使馆临时代办格里西奇见面时，哈克总统对铁托总统的逝世表示深切哀悼。"},{"type":"paragraph","text":"到机场送行的还有：巴基斯坦驻中国大使尤纳斯和夫人以及大使馆外交官员。"},{"type":"paragraph","text":"杜尔总统离开北京赴南斯拉夫"},{"type":"paragraph","text":"几内亚人民革命共和国总统艾哈迈德·塞古·杜尔结束了对我国的正式访问，五月六日上午乘专机离开北京前往贝尔格莱德参加南斯拉夫总统铁托的葬礼活动。"},{"type":"paragraph","text":"杜尔总统的夫人及其随行人员同机离开北京。"},{"type":"paragraph","text":"国务院副总理陈慕华，人大常委会副委员长阿沛·阿旺晋美，外交部副部长宫达非，中国人民解放军副总参谋长迟浩田，外经部副部长李克，中国驻几内亚大使彭华等，到机场送行。机场上举行了隆重的欢送仪式。（均据新华社）"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf747da174"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
