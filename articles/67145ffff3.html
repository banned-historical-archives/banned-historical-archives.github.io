" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1506","name":"‘文化大革命’已过去八年，为什么现在还要提出彻底否定‘文化大革命’问题？","author":"解放军报","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"‘文化大革命’已过去八年，为什么现在还要提出彻底否定‘文化大革命’问题？","dates":[{"year":1985,"month":2,"day":28}],"is_range_date":false,"authors":["解放军报"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"北京日报社宣传手册编辑部, \"彻底否定'文化大革命,'\" 宣传手册, 第2期, 1985: 18","tags":[{"name":"第三梯队","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"三种人","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"一分为二","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"},{"name":"左倾","type":"主题/事件"}],"parts":[{"type":"title","text":"“文化大革命”已过去八年，为什么现在还要提出彻底否定“文化大革命”问题？"},{"type":"paragraph","text":"“文化大革命”是一场内乱，它的影响很深广，危害很严重。虽然结束“文化大革命”已经八年，党的十一届六中全会通过的《关于建国以来党的若干历史问题的决议》，对“文化大革命”作出否定的结论也已有三年，但是，“文化大革命”的“左”倾错误的流毒和影响，还没有肃清。首先，有的同志对“文化大革命”依然存在一些错误和模糊的认识。如有人认为不能说“文化大革命”一点好处也没有，有的认为“文化大革命”起了“反修防修”的作用，也有的认为对“文化大革命”要所谓“一分为二”，既否定错误,也肯定成绩。"},{"type":"paragraph","text":"其次，有的人对自己在“文化大革命”中的错误，认识还很差，而且有的还在坚持派性、进行派性活动，一遇到落实政策，调整班子，选拔干部，清理“三种人”，派性的表现尤其明显；有的人还以“正确路线”的代表自居，伸手向组织要职务，要级别，要进领导班子。"},{"type":"paragraph","text":"再次，在贯彻党的一届三中全会以来的路线、方针、政策中，特别是在当前正在进行的改革中，也经常会遇到“文化大革命”遗留下来的“左”的流毒和影响的阻碍。这说明彻底否定“文化大革命”是十分必要的，它应该成为整党的一个重要内容。只有彻底否定“文化大革命”，才能肃清“左”的流毒和影响，贯彻三中全会以来的路线、方针、政策，实现党的十二大提出的总任务和总目标，才能从根本上消除派性，增强党性，解决党内思想不纯、作风不纯、组织不纯的间题，才能做好清理“三种人”和选拔“第三梯队”的工作。所以，必须把彻底否定“文化大革命”作为整党的一件大事抓紧抓好。"},{"type":"subtitle","text":"（原载《解放军报》）"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67145ffff3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
