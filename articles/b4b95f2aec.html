art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的指示我们坚决照办青岛驻军某部指战员决心为支援春耕生产做出新贡献","authors":["陆宣"],"parts":[{"type":"paragraph","text":"本报讯 在支持青岛市革命左派夺权斗争中起过重大作用的我军某部，二十三日召开了大力支持、帮助春耕生产的誓师大会，指战员们高呼：坚决响应毛主席和党中央的伟大号召，在支援春耕生产中立新功！大会最后通过了向最最伟大的统帅毛主席的致敬电，表达了指战员们的决心。"},{"type":"paragraph","text":"二十二日，这个部队的干部战士一听到党中央给全国农村人民公社贫下中农和各级干部的信，就立即行动起来。正在红卫大队帮助兴修水库的某工兵分队的同志们劲头更足了。他们说：“这是毛主席对我们的最大信任，最大关怀，最大鼓舞。我们一定要以‘只争朝夕’的革命精神，以最大的热情，最大的干劲，最快的速度来完成毛主席、党中央交给的这一光荣任务。”原来每天坚持早出晚归到生产队助民劳动的某连，听到广播后，立即打起背包，到农村扎营，决心同贫下中农肩并肩，心连心，在春耕生产中做出新的贡献。某团从团的领导干部到战士，从机关到连队，来了个全团总动员。二十二日当天，就唱着雄壮豪迈的战歌，冒着风雨，一齐奔赴附近的生产队，支援修水库，平整土地。他们还把党中央的信印成了传单，散发给各个生产队。"},{"type":"paragraph","text":"在誓师大会上，部队党委还下达了党委作出的决定，要求各单位立即展开广泛的宣传活动，把党中央的信，最迅速地传到每个村、每个岛、每个人。要和贫下中农、农村干部并肩作战，打好春耕生产这一仗。要抓住春耕季节，尽最大努力抽调人力物力积极支援。党委还特别强调，在支援春耕生产活动中，要活学活用毛主席著作，遵守三大纪律八项注意，通过生产劳动，把贫下中农的好思想、好作风、好经验学到手，促进部队的思想革命化。"},{"type":"paragraph","text":"指战员们在给毛主席的致敬电里激动地表示：“最最敬爱的毛主席，我们无限热爱您！您的话我们句句听，党中央的指示，我们坚决照办！”“我们决心和贫下中农、革命干部在一起，大干一春，誓夺革命、生产双胜利！” （陆宣）"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4b95f2aec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
