ors":["上海第一师范学院师生员工"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——攻击汇报、保密、人事制度","type":"title"},{"text":"上海第一师范学院师生员工","type":"authors"},{"text":"1．攻击汇报制度","type":"paragraph"},{"text":"“班主席班长很忙，因为有汇报”，而系秘书××不深入下层，“这样墙越筑越深”。(徐钦农)","type":"paragraph"},{"text":"“共产党不听汇报就不能做事。”(中文科六班徐庆祯)","type":"paragraph"},{"text":"“反对汇报制度”这是“抄黑名单”，“党员汇报是为了升官发财。”(中文科（二）二班学生周天性 陈咏春)","type":"paragraph"},{"text":"“人事材料袋里，不知里面搞的是什么鬼”，“干部的鉴定只凭几个人写上几句，往往材料袋里一放，这有什么用，应一或二分，一分交本人以便作努力方向，”(图书馆职员俞寿潜)","type":"paragraph"},{"text":"2．取消保密制度","type":"paragraph"},{"text":"“这次正风上面不重视，在团员大会上讲到要独立思考一下，有的需要保密的东西就要保密，我认为我们的党不是地下的党，我们应该很好的把党内事情揭露，这样讲我是不要我们彻底的放。”(政教科学生姚开干)","type":"paragraph"},{"text":"3．反对党的人事工资制度，诋毁党的干部政策","type":"paragraph"},{"text":"“团员、党员在一切方面待遇都不同，如评级当中，学校中干部部都是团员，真好象士族制度。”(历史科一年级一班)","type":"paragraph"},{"text":"“有重德不重才的问题，这是做成某些人积极性不高，原因之一我认识一个朋友就有这样情况，并且往往有唯唯诺诺的现象”“平常多批评的人是“情况”出来，有些人因为是党员就不凭才而很快的提升了。”(外文系××)","type":"paragraph"},{"text":"“工资改革就是不合理，评级也没有什么标准，说有标准是骗人的。”","type":"appellation"},{"text":"“这问题是永远不会合理的，就是到社会主义共产主义也不会合理的。”(图书馆职员俞寿潜)","type":"appellation"},{"text":"“党内分配干部不是一视同仁，党团员分配得好。”(刘松俊)","type":"paragraph"},{"text":"“只要是党员就能当教导主任，当校长。”(姚育民)","type":"paragraph"},{"text":"党员一升再升，非党群众一压再压，我见许准尉、胡秀珍没什么能力，只因是党员就当上学生会主席。(××)","type":"paragraph"},{"text":"“人事材料不应放在干部科，应放在系里。”(历史系教师程应镠)","type":"paragraph"},{"text":"“一般党员教师的待遇在相同条件比一般群众教师高。”","type":"paragraph"},{"text":"只有党员干部的家属找工作，政府才会照顾，即使在困难条件下也能得到解决。（历史科7班学生史禹杰）","type":"paragraph"},{"text":" 来源：《鸣放言论选集》（上海第一师范学院，1957）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8af2f2686d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
