art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一定在“用”字上狠下功夫","authors":["南京部队学习毛主席著作积极分子/战斗英雄杨道根"],"parts":[{"type":"paragraph","text":"林彪副主席号召全党全军全国活学活用毛主席著作，大立毛泽东思想，我坚决响应这一战斗号召。"},{"type":"paragraph","text":"林副主席主持中央军委工作以来，一再向我们指出，毛泽东思想是当代最高水平的马克思列宁主义。林副主席根据毛主席的教导，提出了坚持四个第一、突出政治、活学活用毛主席著作等一系列的重大措施，把我军的政治思想工作提高到一个崭新的阶段，使我军的政治思想面貌发生了根本变化。大量的事实证明：革命群众一旦掌握了毛泽东思想，就没有战胜不了的困难，没有打不败的敌人。我们部队所以政治空气浓厚，无产阶级觉悟很高，士气很旺，团结得很好，对敌仇恨很深，就是响应了林副主席的号召，高举毛泽东思想伟大红旗，突出政治，活学活用毛主席著作，在“用”字上狠下了功夫的结果。"},{"type":"paragraph","text":"今后，我一定更加努力活学活用毛主席著作，进一步在“用”字上狠下功夫。特别在当前无产阶级文化大革命中，更要狠学狠用，用毛泽东思想作武器，横扫一切牛鬼蛇神，把它们统统扔进垃圾堆，把文化大革命进行到底，把社会主义革命进行到底。"},{"type":"paragraph","text":"DW：南京部队"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5263b7802"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
