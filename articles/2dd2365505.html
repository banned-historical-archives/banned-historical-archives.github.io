art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中共代表团参观朝鲜黄海钢铁厂邓小平祝这个工厂涌现更多的千里马英雄","authors":[],"parts":[{"type":"paragraph","text":"新华社平壤18日电 参加朝鲜劳动党第四次代表大会的、由中共中央总书记邓小平率领的中国共产党代表团今天上午在朝鲜国家计划委员会副委员长崔万铉陪同下，参观访问了朝鲜最大的钢铁基地之一—黄海钢铁厂。代表团受到了工人和工人家属们的热烈欢迎。"},{"type":"paragraph","text":"当代表团通过松林市和工厂前的大道时，夹道欢迎的群众挥舞着朝中两国国旗和花束，不断欢呼“万岁”。"},{"type":"paragraph","text":"黄海钢铁厂总工程师高泰善介绍了这个工厂在金日成首相亲自指导下恢复和建设工作中所获得的巨大成就。"},{"type":"paragraph","text":"邓小平在讲话中感谢工人们的热烈欢迎。他说，“正如我们在朝鲜劳动党第四次代表大会的报告中所听到的，要建立自主的经济，就要优先发展重工业。你们厂的情况证明了朝鲜劳动党政策的正确性。我们为你们的成就感到高兴。祝你们超额完成新的计划，祝你们工厂涌现出更多的千里马英雄，千里马作业班，千里马车间。”"},{"type":"paragraph","text":"接着，代表团参观了炼铁、炼钢、轧钢和炼焦等车间。在参观过程中，许多工人要求代表团向毛泽东主席转达他们的问候，向中国钢铁工人转达朝鲜钢铁工人的问候。当代表团来到朝鲜钢铁工人为向党代表大会献礼而建成的二号高炉旁时，青年千里马作业班班长金太道取下了他胸前的千里马奖章，交给了邓小平同志，请代表团把它转赠给罗盛教烈士的母亲，并祝她老人家身体康泰。双重千里马作业班班长李万杰把他的一枚千里马奖章献给了邓小平同志。他激动地说：“1952年，我到中国鞍山钢铁厂实习时，中国工人象亲兄弟一样帮助我们。我谨向中国共产党和毛泽东主席表示感谢。”"},{"type":"paragraph","text":"参观访问后，宾主互赠了礼品。"},{"type":"paragraph","text":"由中共中央总书记邓小平率领的中国共产党代表团，在朝鲜劳动党中央委员会农业部长金万金陪同下，9月17日参观朝鲜著名的平安南道江西青山里农业社，受到社员热烈的欢迎。图为社员请邓小平同志签名留念。 朝鲜中央通讯社传真照片（新华社发）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dd2365505"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
