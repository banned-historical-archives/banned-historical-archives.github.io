ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"给续范亭的信","alias":"","parts":[{"type":"paragraph","text":"给续范亭的信"},{"type":"paragraph","text":"（1945年10月18日）范亭兄："},{"type":"paragraph","text":"示悉。大势所迫，使当局不能不签订双十协定，但其实现却尚是大问题。私利所囿，他们尚不愿承认解放区，并正向解放区进军，此问题之解决，麻烦尚多。看你写字，精神甚好，尚望研究休养办法，多活许多年，看见中国民主政治的实现。敬祝健康！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十八日百合果敬收，至谢！江青致侯。"},{"type":"paragraph","text":"[1]续范亭（1893一1947)，山西省醇县（今原平市）西社村人，著名爱国将领。早年参加孙中山领导的同盟会。后在国民党任职，曾经隐退一段时间，后与共产党人合作创建山西新军。1947年病逝后被追认为中国共产党"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":452,"page_end":452},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6ee765439"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
