ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于部队合编问题给八路军总部的信","alias":"","parts":[{"type":"paragraph","text":"关于部队合编问题给八路军总部的信!"},{"type":"paragraph","text":"（1940年6月27日）彭、刘，并告八路军总部，陈光、罗等："},{"type":"paragraph","text":"同意彭雪枫、黄克诚两部合编为八路军第四纵队，以彭雪枫为司令员，黄克诚为政治委员。活动于津浦路以西、陇海路以南，以对日寇作战、巩固豫皖根据地、扩大与整训部队为中心任务。彭雪枫部，对外仍旧保存新四军第六支队名义，黄克诚部不必改新四军。请陈光、罗荣桓令彭明治、朱涤新支队到徐州以东南下，活动于津浦路东地区。彭雪枫、黄克诚应设法抽调一部兵力过津浦路东，帮助苏北发展，俟彭朱支队到达后，苏北部队再行合编，成立一八路军纵队。华中确应成立统一的指挥部，现在华中部队统归刘少奇指挥，苏北、淮北之纵队可归彭雪枫、黄克诚指挥。"},{"type":"paragraph","text":"毛朱王"},{"type":"paragraph","text":"二十七日[1]这是毛泽东和朱德、王稼祥关于八路军各部队合编问题给彭雪枫、"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":6,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":70,"page_end":70},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6123e28a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
