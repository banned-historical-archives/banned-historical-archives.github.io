uthors":[],"dates":[{"year":1979,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见日本时事通讯社代表团"},{"type":"paragraph","text":"就我国实现四化和一些重大国际问题谈了看法"},{"type":"paragraph","text":"新华社北京五月十六日电  邓小平副总理今天上午会见由社长大畑忠义率领的日本时事通讯社代表团。"},{"type":"paragraph","text":"时事通讯社代表团是首次访问我国。会见时，邓副总理回答了日本朋友提出的问题，就中国实现四个现代化和一些重大国际问题谈了他的看法。在谈到当前国民经济调整时，邓副总理指出，所谓调整，是调整农业和工业、工业内部的比例关系。这将有助于经济有计划按比例地发展，有助于加速四个现代化的实现。"},{"type":"paragraph","text":"新华通讯社社长曾涛、副社长刘敬之参加了会见。"},{"type":"paragraph","text":"五月十四日，中国人民解放军副总参谋长伍修权会见了日本朋友。"},{"type":"paragraph","text":"邓小平副总理会见由大畑忠义社长率领的日本时事通讯社代表团。"},{"type":"paragraph","text":"新华社记者摄（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbd0b04abb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
