script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印共中央发表宣言痛斥奴役印度民族的“奴隶宪法”　号召全国劳动人民一致起来反对","authors":[],"dates":[{"year":1950,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十七日电】　电通社孟买二十六日讯:在印度共产党中央委员会的号召下，印度“奴隶宪法”的颁布，将遇到群众的示威和全国各地劳动人民罢工的反抗。共产党在分析该宪法性质的宣言中称，这是“体现印度民族受奴役”的宪法，并号召人民群众以一月二十六日为反对宪法日。共产党的宣言揭露该宪法是一个保证外国帝国主义的继续剥削，对印度国内的少数民族加以压迫，否认工人的一切权利，拒绝给农民以土地，支持封建的寄生虫、王公和贪婪无厌的资本家的宪法，共产党宣言称:“宪法保证英国和外国银行家、苎麻投机商、茶叶独占资本家以及煤炭囤集者，数百年来穷凶极恶的掠夺在印度所积累起来的利润、财产与经济上的权力。宪法更无耻地宣布给予英美帝国主义者在经济上奴役印度的完全自由，规定无论现在或将来，印度人民都将无权没收任何垄断资本家的工业和财产。宪法并保证付给印度与外国铁道债券持有人的债务和利息。这部资本家的宪法将使人民永远被迫通过纳税的方式，付给印度和外国既得利益集团以巨大的利润。”宣言指出:‘宪法’剥夺了工人、职员‘最基本的组织职工会的权利。但资本家却有无限制的权力，可以不要任何证据或证明，即可宣布任何一个工人组织为非法’。宪法并剥夺了工人的罢工与纠察的权利。同时，宪法厚颜无耻地宣告国家没有义务为它的人民保证工作权利与生活资料，它更否认国家有任何责任为人民提供可以维持生活的工资、失业救济、养老金或较好的生活标准。"},{"type":"paragraph","text":"宪法‘不承认耕者有其田，仍旧保护封建地主的土地，人民与政府不得将其没收’。此外，‘宪法否认各种文字的平等，并强行规定英文与印度文为各民族的国定文字，这预示着印度国内少数民族的压迫’。宣言说:宪法是用来压制民族自决、压制信奉各种宗教的民族在经济与政治上的自由发展以及各民族的语言与文字的自由发展等正义要求。这是一部民族压迫的宪法，在这宪法之下，印度各民族将越来越受歧视与压迫。宣言继称，居民的限制、候选人的大量保证金以及宣传工具之被资产阶级所垄断，剥夺了劳动群众一切的选举权。(绝大多数人民在中央或省的立法机关中都没有代表)，他们被剥夺了选举总统的权利。而骑在人民头上的每个省的省长，却由总统来任命。"},{"type":"paragraph","text":"宪法的目的是企图击碎工人、农民和中等阶层的反抗，其方法是赋予政府以无限的权力，可以不经审判就拘押人民，监禁人民，并赋予统治者有宣布停止宪法与恢复最可怖的专制权力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7423208cb8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
