script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"做批判资产阶级的革命闯将","authors":[],"dates":[{"year":1968,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"做批判资产阶级的革命闯将"},{"type":"paragraph","text":"在欢呼伟大领袖毛主席“五·七”指示发表两周年的时候，我们要更高地举起毛泽东思想伟大红旗，做批判资产阶级的革命闯将，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"做批判资产阶级的革命闯将，就是要努力提高阶级斗争和两条路线斗争的觉悟，时刻保持清醒的头脑，按照毛主席的教导，主动地、持久地向阶级敌人猛烈进攻。我们必须坚决贯彻执行以毛主席为首、林副主席为副的无产阶级司令部的各项指示，高度发扬无产阶级的彻底革命精神，坚决反对右倾机会主义、右倾分裂主义、右倾投降主义，狠狠打击右倾翻案妖风，彻底粉碎阶级敌人的一切复辟、变天的痴心妄想；把隐藏的叛徒、特务和一切反革命分子统统挖出来。"},{"type":"paragraph","text":"做批判资产阶级的革命闯将，就要自始至终掌握革命斗争的大方向，持久不懈地、深入地开展革命大批判。因此，必须认真学习、深刻领会毛主席关于各行各业都要批判资产阶级的伟大教导的深远意义。只有这样，才能方向明，集中火力把党内最大的一小撮走资派及其在我省的代理人批深批透，批倒批臭，使阶级敌人永无借尸还魂之日，永无翻案变天之时。"},{"type":"paragraph","text":"做批判资产阶级的革命闯将，就是要在无产阶级反对资产阶级和一切剥削阶级的政治大革命中，活学活用毛泽东思想，把自己锻炼成为忠于毛主席，忠于毛泽东思想，忠于毛主席革命路线的英勇战士。"},{"type":"paragraph","text":"《新安徽报》五月七日社论"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e46576d94"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
