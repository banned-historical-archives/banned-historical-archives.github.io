rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛主席著作先进事迹展览","authors":[],"parts":[{"type":"paragraph","text":"新华社广州七日电 最近在广州展出的“广州部队学习毛主席著作先进单位和积极分子事迹展览”，集中地反映了广大干部战士活学活用毛主席著作，不怕困难，不怕艰苦，敢于斗争，敢于胜利，在工作和训练中取得了显著的成绩。"},{"type":"paragraph","text":"展览通过大量图片和实物，说明广大指战员反复学习毛主席关于帝国主义和一切反动派的本性的论述，以及敢于斗争、敢于胜利的思想，认识到帝国主义总是要来捣乱的，一定要按照毛主席的指示，和敌人进行针锋相对的斗争，敌人磨刀，我们要把刀磨的更锋利。这里展出了全军学习毛主席著作积极分子黄祖示活学活用毛主席著作，顶着困难苦练杀敌本领的许多图片和实物。他从实战要求出发，从严从难苦练，练出了一身杀敌过硬本领。这里还有班长陈家猛时刻记住毛主席“敌人磨刀，我们也要磨刀”的教导，苦练杀敌硬功的动人事迹。他在机枪班当战士积极练武；当炊事员时，仍抓紧间隙时间练射击，练出了一手好枪法，获得了“特等射手”的称号。他在学习《丢掉幻想，准备斗争》一文后，写了这样的心得：“练武不是为了评上五好战士，而是为了随时准备反击帝国主义的侵略，准备解放台湾。”"},{"type":"paragraph","text":"这里还有大量展品，表现了广大干部战士活学活用毛主席著作，身在连队，胸怀全球，决心把革命进行到底的豪情壮志。某部侦察连发扬爱国主义、国际主义和革命英雄主义精神，在训练中苦练巧练，练得能逢山爬山，逢水泅水。某部高射炮一连每月结合敌情学习毛主席关于帝国主义和反动派本性不变的论述，时刻保持高度警惕，常备下懈。他们以阵地为家，风餐露宿，几年来几十次转移阵地，行军数万里，每次都按时到达指定地点，没有延误过一次战机，做到了一声令下，炮弹就能立即出膛。"},{"type":"paragraph","text":"展览给了广大观众很大的鼓舞和教育。广大指战员参观后表示，要象这些先进单位和积极分子那样，努力学习毛主席著作，用敢于斗争、敢于胜利的精神去对待工作和训练中的一切困难，练好保卫祖国的本领，当彻底的革命促进派。"}],"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a670638ef1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
