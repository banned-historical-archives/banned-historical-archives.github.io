" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2007","name":"中央十人小组关于普通反革命分子及其他反动分子的解释","author":"中央十人小组","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央十人小组关于普通反革命分子及其他反动分子的解释","dates":[{"year":1957,"month":11,"day":23}],"is_range_date":false,"authors":["中央十人小组"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共绵阳地委组织部，纪律检查工作文件选编，90-91","tags":[{"name":"反动","type":"主题/事件"},{"name":"反革命","type":"主题/事件"},{"name":"肃反","type":"主题/事件"},{"name":"中央十人小组","type":"主题/事件"}],"parts":[{"type":"title","text":"中央十人小组关于普通反革命分子及其他反动分子的解释[1]"},{"type":"paragraph","text":"各省、市、自治区党委五人小组，中直党委、中央国家机关党委五人小组，总政治部："},{"type":"paragraph","text":"最近辽宁、贵州、山东等地来电请示关于普通反革命分子及其他反动分子的解释问题，现答复如下："},{"type":"paragraph","text":"（一）所谓普通反革命分子，是指过去历次镇反、清理工作中在性质上当做反革命分子看待，但因为他们的罪恶情节比较轻微，根据形势的发展，在这次肃反运动中为了便于分化瓦解敌人，政策放宽，而不以反革命看待的分子。这主要是指：三青团的正副分队长；挂名的反动党团骨干分子，国民党军队中有一般罪恶的连长以下的军官；过去是反动会道门坛主，没有严重罪恶活动的分子，以及日伪政权的乡长、伪军的连长以下的军官、区以下的维持会长、新民会长等过去算汉奸，按照现在政策界限不以汉奸论处的分子。"},{"type":"paragraph","text":"所谓其他反动分子，主要是指一贯坚持反动阶级立场，心怀不满，或有反动言论，但还没有构成反革命罪行的人。肃反运动中对他们进行过批判和斗争，但没有把他们当做反革命分子看待。"},{"type":"paragraph","text":"对于这些分子，在肃反运动当中，把他们清查出来，是一个收获。我们说他是普通反革命分子或其他反动分子，这是从性质上来说的，即是应当把他们同仅有一般政治历史问题的人相区别。但这不是说要把这些人重新定案为反革命分子去处理。因此，对于这些人的结论，除在整风中划为右派分子的新老帐应当一起算，重加处理以外，一般就不要再去修改了。"},{"type":"paragraph","text":"（二）肃反运动中查岀来的有一般政治历史问题的人，主要是指历史上曾向敌人有轻微自首变节行为，或者参加过反动党派、反动组织为一般成员，或者参加敌伪军、政、警、宪组织的一般人员，他们与普通反革命分子是有区别的，不能混淆起来。但在这些分子中，如果有在整风中被划为右派分子的，则应当按照对待右派分子的政策处理。"},{"type":"subtitle","text":"中央十人小组"},{"type":"subtitle","text":"1957年11月23日"},{"type":"paragraph","text":"[1] Note: This document can also be found in 最高人民法院刑事审判第二庭, 刑事申诉工作手册, pp. 147-148."}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1bb55a663"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
