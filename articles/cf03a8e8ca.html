hors":[],"dates":[{"year":1979,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在举国上下热烈庆祝中华人民共和国成立三十周年的日子里，敬爱的叶剑英同志应本报编辑部之请，为本报国庆画与诗专刊《祖国颂》题字。"},{"type":"paragraph","text":"《祖国颂》刊画六幅，配诗六首。画系著名画家吴作人、叶浅予、亚明、程十发、黄胄、方增先为本报所作，著名诗人、作家、学者廖沫沙、臧克家、郭绍虞、李俊民、周汝昌、顾易生应邀配诗。他们以饱满的激情，酣畅的笔墨，歌颂伟大祖国三十年中发生的翻天覆地的变化，歌颂神州大地清除“四害”后的一新面貌，歌颂九亿人民实现“四化”的锦绣前程。"},{"type":"paragraph","text":"《祖国颂》画与诗专刊见今日本报第四版。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf03a8e8ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
