script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中日友好合作关系史上的创举","authors":["本报评论员"],"dates":[{"year":1980,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中日友好合作关系史上的创举"},{"type":"paragraph","text":"本报评论员"},{"type":"paragraph","text":"我国国务院成员和日本国内阁成员级会议首次会议，从12月3日至5日在北京举行。双方就目前国际形势、两国的经济和财政政策以及两国之间友好合作关系等问题，进行了富有成效的会谈，取得了圆满的结果，并发表了联合新闻公报。邓小平副主席和赵紫阳总理分别会见了前来参加会议的日本内阁大臣。举行这样的会议是中日友好合作关系史上的一个创举。它标志着中日两国友好关系的发展达到了一个新的高度，对于进一步加强两国在外交、经济贸易及其他各个领域的合作关系、维护亚洲及世界的和平与安全，具有重大的意义。"},{"type":"paragraph","text":"回顾中日两国实现邦交正常化8年来的历程，喜看今天两国友好合作的新气象，人们对两国关系的进一步发展充满信心。中日两国虽然社会制度不同，但在两国政府和人民的共同努力下，两国之间遵循平等互利、相互尊重的原则，彼此合作、互通有无、互相补充、共同发展的领域越来越广阔。特别是在这次就经济和贸易合作问题交换意见时，双方共同希望在贸易、能源、资源、农业、运输等方面进行广泛交流和合作。中国方面表示，由于中国的经济正处于调整阶段，在短期内某些对外经济合作项目可能不象有些朋友预期的那么多，某些合作内容也要相应地作些调整，同时指出，这是暂时的现象，在调整阶段结束以后，两国的合作关系必将呈现出更为宽广的美好前景。日本方面表示理解中国实现四个现代化的远大目标及目前所采取的调整方针，认为需要确立与此相适应的合作道路和政策，使两国友好合作关系扎扎实实地向前发展。中日两国在内阁成员一级的水平上坦率诚挚地交换意见，加深相互理解，对今后两国友好合作的进一步发展，无疑将产生积极的影响。"},{"type":"paragraph","text":"中日两国基于建设和发展自己国家的共同愿望，都希望有一个和平与安定的国际环境。但是，当前严峻的现实是，中日两国都受到苏联霸权主义的严重威胁。独立的主权国家阿富汗、柬埔寨等遭到苏联、越南大小霸权主义的武装入侵和军事占领。这是苏联加紧它的南下战略部署、竭力推行它的全球战略的重大步骤。维护国家的独立和安全，这也是本届会议上双方共同关心的问题。正如大平总理大臣生前谈及中日关系的前景时所说，应该使“日中关系发展成对亚洲以及世界的和平与安全作出贡献的关系”。中日两国努力发展友好合作关系，不仅符合两国人民的共同利益，而且有利于亚洲、太平洋地区以至世界的和平、安全、稳定与繁荣。"},{"type":"paragraph","text":"中日两国一衣带水，隔海相望。现在，一座雄伟的友好合作的大桥已经架设。中日两国政府成员级会议首次会议的举行，为在新的历史条件下加强和促进两国间的友好合作关系走出了坚实的一步。这是中日两国的喜事，也是亚洲和世界和平之福。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34c7884b4c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
