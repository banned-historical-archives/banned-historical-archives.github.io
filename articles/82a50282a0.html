ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"在转发邓子恢关于老根据地干部情况报告时加写的话","alias":"","parts":[{"type":"paragraph","text":"在转发邓子恢关于老根据地干部"},{"type":"paragraph","text":"情况报告时加写的话2"},{"type":"paragraph","text":"（1954年1月4日）"},{"type":"paragraph","text":"此外，不但老根据地应这样做，一切晚解放区也应大体上这样做，也应用极大的注意力去培养和提拔地方干部。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"所谓干部地方化，当然不是说地方高级和中级领导机关都要用本地人，不能用外地人，相反是必须要用必要的外地人的，现在如此，将来还会如此。在农业机械化实施的时候，农村技术人员也是要用一些外地人的。我在这里说的主要是指目前县区干部的情况。"},{"type":"paragraph","text":"[1]邓子恢，当时任中共中央农村工作部部长。"},{"type":"paragraph","text":"[2]本篇一是毛泽东审阅中共中央1954年1月4日转发邓子恢关于老根据地干部情况报告的批语稿时，加写在末尾的一段话。本篇二是毛泽东写的一个批注，加括号写在邓子恢报告中关于干部地方化的一段文字之后。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":1,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":506,"page_end":506},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82a50282a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
