rs":["孙永盛"],"dates":[{"year":1995,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国队准备派９男１１女参加世乒赛"},{"type":"paragraph","text":"初步名单中包括马文革王涛王浩邓亚萍等"},{"type":"paragraph","text":"新华社天津３月２２日电（记者孙永盛）记者从第４３届世界乒乓球锦标赛竞赛部获悉，截至２１日，已有１１０个国家和地区的乒乓球协会报名参加本届世乒赛。"},{"type":"paragraph","text":"从报名表看，欧洲、亚洲所有强队以及国际乒联最新排名列前２０名的选手全部报名参赛。国际乒联要求，参加第４３届世乒赛的任何一个国家和地区的男选手不得超过５名、女选手不得超过４名。同时规定，国际乒联最新排名表前１０名的男、女选手不在报名限额之内；加之国际乒联对东道主的“照顾”，中国男队可有９名选手、女队有１１名选手参赛。"},{"type":"paragraph","text":"参加本届世乒赛的中国队名单已初步确定，男选手有：马文革、王涛、王浩、刘国梁、孔令辉、丁松、冯喆；女选手包括：邓亚萍、乔红、刘伟、乔云萍、邬娜、李菊、杨影。除上述男、女选手外，中国队还将挑选几名选手参赛。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c59debf77"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
