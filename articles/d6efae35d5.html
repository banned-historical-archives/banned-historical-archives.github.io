script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"隆重纪念中共中央五月十六日《通知》十周年港澳同胞热烈庆祝文化大革命的伟大胜利","authors":[],"dates":[{"year":1976,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社香港一九七六年五月十八日电　香港、澳门各界爱国同胞和爱国机构职工这几天欢欣鼓舞地举行集会和革命文艺表演，隆重纪念伟大领袖毛主席亲自主持制定的中共中央一九六六年五月十六日《通知》十周年，热烈庆祝无产阶级文化大革命的伟大胜利。"},{"type":"paragraph","text":"香港工人在十六日举行了庆祝集会。港九工会联合会理事长杨光和各界代表在会上畅谈伟大社会主义祖国一片莺歌燕舞的大好形势，热烈欢呼文化大革命的伟大胜利。杨光在讲话中指出，无产阶级文化大革命使我国更加强大，我国的社会主义制度更加巩固，香港工人为有这样强大的社会主义祖国感到无比幸福和自豪。"},{"type":"paragraph","text":"他说，在无产阶级文化大革命的推动和影响下，香港广大工人进一步团结在爱国工会周围，爱国反霸力量不断发展壮大，香港的工人运动发生了深刻的变化。他说，在庆祝文化大革命十周年的时候，香港工人要进一步认真学习毛主席的一系列重要指示，深入批邓，反击右倾翻案风，广泛宣传无产阶级文化大革命和反击右倾翻案风斗争的伟大胜利，同时要提高警惕，决不容许一小撮阶级敌人利用香港进行破坏社会主义祖国的活动。"},{"type":"paragraph","text":"十七日，驻港各爱国机构的代表隆重举行庆祝集会，回顾无产阶级文化大革命十年来的光辉战斗历程，畅谈学习毛主席的一系列重要指示，重温中共中央《通知》，学习两报一刊纪念文章《文化大革命永放光芒》的体会。新华社香港分社社长梁威林主持大会。新华社香港分社副社长李菊生、各机构的负责人和职工代表在会上讲话，畅谈了文化大革命十年来我国各方面所取得的辉煌成就，驳斥了党内最大的不肯改悔的走资派邓小平散布的“今不如昔”的谬论。"},{"type":"paragraph","text":"香港教育工作者、学生、职员、工商业者等各阶层爱国人士也分别举行了集会等庆祝活动。"},{"type":"paragraph","text":"我驻澳门爱国机构、澳门工会联合会、澳门中华总商会以及各爱国社团这几天也举行了各种形式的庆祝活动。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6efae35d5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
