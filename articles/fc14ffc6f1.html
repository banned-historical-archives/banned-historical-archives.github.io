script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"韩义同志应赶快斩掉资产阶级的尾巴","authors":["周廷黻","王宝云","邱志政"],"dates":[{"year":1952,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"白枫,缪淼"},{"type":"paragraph","text":"甬剧编导:周廷黻　邱志政　王宝云　白枫　缪淼"},{"type":"paragraph","text":"戏曲工作者尤其是编导同志们，是负有教育人民之责的。在全国热烈展开三反、五反的运动时候，编导们都投入火热的斗争当中，编排三反、五反的戏剧。因为这是我们的责任，也是我们文艺工作者站稳立场的应有表现。绝不是“出风头”或是敷衍敷衍的一回事。"},{"type":"paragraph","text":"刘厚生处长告诉我们:“不要因惧怕批评而不写，接受批评是会使大家进步。”我们认为这话是绝对正确的。"},{"type":"paragraph","text":"韩义同志说:“应该重视三反、五反的演出，不能草率从事。”这原是对的，但韩义同志却首先不根据他自己的话编导新戏，而以“慎重”的态度搬演了恶俗的“鸳梦重温”、“水晶宫”，这不是一个很大的矛盾吗?"},{"type":"paragraph","text":"韩义同志的编导技巧应该结合到思想方面，希望赶快斩掉资产阶级的尾巴，为人民服务，这是我们诚恳的意见。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc14ffc6f1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
