分子的劳动保险待遇问题","dates":[{"year":1965}],"is_range_date":false,"authors":["中华全国总工会"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 260","tags":[{"name":"劳动保险","type":"主题/事件"},{"name":"四类分子","type":"主题/事件"}],"parts":[{"type":"title","text":"关于四类分子的劳动保险待遇问题"},{"type":"paragraph","text":"一、 在四清运动中，经群众审议，不能摘帽子，或经当地政法机关批准戴上帽子、重新戴上帽子的四类分子，不能享受与职工同样的劳动保险待遇。但他们因工负伤、因工残废或因工死亡时，除住院膳费由本人负担二分之一外，其他待遇可按劳保条例规定由企业行政支付。生育时产假工资照发。他们生病时，也应给予治疗，停工医疗期间由企业行政发给生活补助费。其标准一般可以参照劳动保险条例规定病假待遇最低标准。对其中生活确有困难，平时表现较好的，可酌情稍加提高。"},{"type":"paragraph","text":"二、 己摘掉四类分子帽子的，可以享受与职工同样的劳动保险待遇。"},{"type":"paragraph","text":"三、 职工供养直系亲属中戴帽子的四类分子，不得享受劳动保险条例规定的待遇，戴帽子的四类分子的供养直系亲属，除享受因工死亡抚恤待遇外，也不享受其他劳动保险待遇。"},{"type":"paragraph","text":"（全总（65）会字第210号）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55eeb45def"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
