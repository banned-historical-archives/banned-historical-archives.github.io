art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"胡志明主席途经北京","authors":["孟庆彪"],"parts":[{"type":"paragraph","text":"新华社20日讯 胡志明主席率领的越南劳动党代表团在去莫斯科参加苏联共产党第二十一次代表大会的途中，今天下午乘专机到达北京。代表团团员有：越南劳动党中央政治局委员黄文欢，中央候补委员、越南驻苏联大使阮文镜。"},{"type":"paragraph","text":"到机场欢迎的，有中共中央副主席周恩来，总书记邓小平，政治局委员陈毅，中央书记处候补书记杨尚昆，中央委员伍修权，中央候补委员罗贵波。"},{"type":"paragraph","text":"胡志明主席是由越南驻中国大使阮康陪同到达北京的。到机场欢迎的，还有阿尔巴尼亚驻中国大使巴利里，蒙古驻中国大使鲁布桑，苏联驻中国临时代办安东诺夫，匈牙利驻中国大使馆参赞西格蒂，以及越南驻中国大使馆人员。"},{"type":"paragraph","text":"中共中央副主席周恩来在机场欢迎胡志明主席。"},{"type":"paragraph","text":"新华社记者 孟庆彪摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83c1c5e94f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
