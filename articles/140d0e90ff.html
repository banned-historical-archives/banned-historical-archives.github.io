art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席","authors":["成都部队学习毛主席著作积极分子/彝族吉石尼呷"],"parts":[{"type":"paragraph","text":"八月十八日清晨，我正在学习毛主席著作，广播里传来了最幸福的喜讯：毛主席穿着军装来到天安门上，和百万群众会见。"},{"type":"paragraph","text":"去年十月一日，我在天安门前看见过毛主席。现在，我好象也站在伟大领袖的身边。我忍不住高声喊出：“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"毛主席啊，毛主席，奴隶出身的战士在向您问好！我和天安门前的百万群众，一个心眼，一个声音；我和全中国、全世界的革命人民，一个心眼，一个声音，振臂高呼“：”我们的伟大领袖、伟大统帅、伟大舵手——毛主席万寿无疆！“"},{"type":"paragraph","text":"毛主席，您亲手写的《中国社会各阶级的分析》，我读过一遍又一遍，您最了解我们奴隶过去的苦难。在您的英明领导下，我和我的父母，和千百万泡在苦海里的奴隶兄弟，砸断了身上的铁链，站起来了！在您的英明指引下，我们踢开了前进路上的绊脚石，走上了社会主义的阳关大道！在您的阳光的照耀下，我懂得了革命的道理，成长为光荣的共产党员。切身经历告诉我：海可枯，石可烂，永远跟着毛主席的红心不能变；头可断，血可流，伟大的毛泽东思想不能丢！"},{"type":"paragraph","text":"毛主席啊，毛主席，在无产阶级文化大革命中，只要有您的领导，岩鹰飞不过的高山，我们敢攀，黄羊走不过的险路，我们敢闯！我坚决响应林彪同志的号召，读您的书，听您的话，高高举起毛泽东思想伟大红旗，把无产阶级文化大革命进行到底，建设成无产阶级铁打的江山。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"140d0e90ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
