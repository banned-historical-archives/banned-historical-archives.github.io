tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要充分利用刘少奇这个反面教员","authors":["江西驻军某部炮连"],"parts":[{"type":"paragraph","text":"深入开展革命的大批判，是学习党内两条路线斗争史的好课堂，是提高广大革命群众两条路线斗争觉悟的强大武器。在支左工作中，我们协助江西分宜县杨桥镇的革命群众，大办各种类型的毛泽东思想学习班，组织大家回忆杨桥镇的阶级斗争历史，以毛泽东思想为武器，狠批刘少奇的反革命谬论，深入学习了党内两条路线斗争的历史。"},{"type":"paragraph","text":"在学习班里，我们组织广大革命群众学习伟大领袖毛主席在七届二中全会报告中的教导：“中国资本主义的存在和发展，不是如同资本主义国家那样不受限制任其泛滥的。”“限制和反限制，将是新民主主义国家内部阶级斗争的主要形式。”联系杨桥镇两条路线斗争历史，揭露大叛徒刘少奇公然反对毛主席的无产阶级革命路线，鼓吹反革命的“四大自由”，胡说什么“要让私商钻社会主义的空子，不只商业有自由市场，还有工业的地下工厂”，妄图复辟资本主义的滔天罪行。大家谈到，杨桥镇一小撮阶级敌人，就是在刘少奇反革命修正主义路线的庇护下，窃取了杨桥镇的各种大权。大叛徒刘少奇一叫嚷，他在杨桥镇的小爪牙就把一个社会主义的杨桥镇，变成了一个“四大自由”的黑试验场。他们在工厂里实行“金钱挂帅”、“包工到人”，大搞雇工剥削；在市场上公开搞粮、油、布匹自由交易；在农村里公开搞自留地自由转让出租。镇上合作商店的一小撮阶级敌人，大搞资本主义经营，把国家按价拨给的物资，公开拿到自由市场上高价出售。他们还私自瓜分公家的货物，采取种种手段，勒索群众，本来三、四元一双的胶鞋，竟卖到四十余元。大家联系实际狠批了刘少奇的“四大自由”，深深懂得了，没有毛主席的无产阶级革命路线，我们就要亡党、亡国、掉脑袋。通过在革命大批判中学习两条路线斗争史，全镇革命群众大大提高了两条路线斗争的觉悟，使过去刘少奇鼓吹的“四大自由”黑货泛滥的杨桥镇，出现了一派崭新的革命景象。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2695f1c79"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
