ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"毛泽东等祝贺越南民主共和国宣布独立二十三周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺越南民主共和国宣布独立二十三周年的电报"},{"type":"paragraph","text":"（1968年9月1日）河内越南劳动党中央委员会主席、越南民主共和国主席胡志明同志，越南民主共和国国会常务委员会主席长征同志，越南民主共和国政府总理范文同同志："},{"type":"paragraph","text":"在越南民主共和国宣布独立二十三周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府，向越南人民、越南劳动党和越南民主共和国政府致以最热烈的祝贺。"},{"type":"paragraph","text":"英雄的越南人民，在以胡志明主席为首的越南劳动党的领导下，在抗美救国战争中取得了伟大的胜利。这是越南人民不怕牺牲，艰苦奋斗，坚持人民战争，同侵略成性的美帝国主义进行针锋相对斗争的结果。越南人民抗美救国战争的胜利，为世界各国人民反对美帝国主义的斗争作出了贡献。"},{"type":"paragraph","text":"美帝国主义霸占越南南方、分割越南民族的野心是不会改变的。为了达到这个目的，它在进一步扩大侵越战争的同时，大搞和谈阴谋。苏联现代修正主义领导集团从中配合，力图使越南人民的抗美救国战争半途而废。苏联现代修正主义领导集团早已成为美帝侵略越南的头号帮凶。毛泽东全集第五十卷"},{"type":"paragraph","text":"但是，美帝、苏修加在一起，也挽救不了美国侵略者在越南必然失败的命运。它们互相勾结、重新瓜分世界的狂妄企图，正在遭到各国人民越来越强烈的反抗。美帝、苏修越是勾结在一起，世界人民就越看清楚他们是一丘之貉。"},{"type":"paragraph","text":"越南人民抗美救国战争的形势大好。在前进的道路上，尽管还会遇到各种各样的困难和曲折，但是，我们深信，久经战争考验的三千一百万越南人民，只要发扬彻底革命精神，坚持持久战争，必将取得抗美救国战争的最后胜利。"},{"type":"paragraph","text":"七亿中国人民将一如既往，坚决支持越南人民把抗美救国战争进行到底！"},{"type":"paragraph","text":"中越两国人民之间的战斗友谊万岁！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中国共产党中央委员会副主席林彪中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六八年九月一日于北京"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":290,"page_end":291},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a04c788b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
