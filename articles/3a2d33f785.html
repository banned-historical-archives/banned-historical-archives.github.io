ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"七绝·屈原","alias":"","parts":[{"type":"paragraph","text":"七绝·屈原（1961年秋）屈子川当年赋楚骚，手中握有杀人刀。2艾萧太盛椒兰少，3"},{"type":"paragraph","text":"一跃冲向万里涛。"},{"type":"paragraph","text":"[1]屈子，指屈原。屈原（前340一前278），名平，字原，战国楚人，是我国最早的大诗人。曾辅佐楚怀王，官至左徒、三间大夫，遭谗去职。楚顿襄王时被放逐。因无力挽救楚国的危亡，深感自已的政治理想无法实现，遂投汨罗江而死。"},{"type":"paragraph","text":"[2]手中握有杀人刀，喻指屈原作《离骚》所发挥的战斗作用。"},{"type":"paragraph","text":"[3]艾萧太盛椒兰少，艾萧，即艾蒿、臭草，这里比喻奸小人；椒兰，申椒和兰草，皆为芳香植物，这里比喻贤德之士。"},{"type":"paragraph","text":"[4]一跃冲向万里涛，指屈原在悲愤和绝望中投汨罗江而死。"}],"authors":["毛泽东"],"dates":[{"year":1961}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":475,"page_end":475},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a2d33f785"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
