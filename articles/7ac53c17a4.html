泽东"],"dates":[{"year":1966,"month":3,"day":28}],"is_range_date":false,"parts":[{"text":"与康生等谈话纪要","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"毛两次找康生谈话，又找康生、江青、张春桥等谈话，批判五人小组（彭真、陆定一、康生、吴冷西、周扬）的《关于学术讨论汇报提纲》，即所谓“二月提纲”。并说：“吴晗发表这么多文章，从不要打招呼，从不要经过批准。姚文元的文章为什么偏偏要打招呼？难道中央的决定不算数吗？扣压左派的稿件，包庇右派的大学阀，中宣部是阎王殿。要打倒阎王，解放小鬼。我历来主张，凡中央机关做坏事，就要号召地方造反，向中央进攻。地方要多出几个孙悟空，大闹天宫。”又批评彭真：“彭真、北京市委、中宣部要是再包庇坏人，中宣部要解散，北京市委要解散，五人小组要解散”。并要彭真对叫许立群打电话给杨永直的事，向上海市委道歉，毛最后说：“去年九月，我问一些同志，中央出了修正主义怎么办？这是很可能的，也是最危险的。要保护左派，在文化大革命中培养左派队伍。”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ac53c17a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
