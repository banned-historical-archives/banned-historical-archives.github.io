script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在纪念罗马尼亚资产阶级民主革命一百三十周年集会上   齐奥塞斯库总统谈国有化三十年巨大成就","authors":[],"dates":[{"year":1978,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在纪念罗马尼亚资产阶级民主革命一百三十周年集会上"},{"type":"paragraph","text":"齐奥塞斯库总统谈国有化三十年巨大成就"},{"type":"paragraph","text":"新华社布加勒斯特六月十日电　罗马尼亚首都布加勒斯特六月十日举行有十二万人参加的群众集会，纪念一八四八年资产阶级民主革命一百三十周年和庆祝主要生产资料国有化三十周年。"},{"type":"paragraph","text":"齐奥塞斯库总统、埃列娜·齐奥塞斯库、约·邦克等罗马尼亚党和国家领导人参加了大会。齐奥塞斯库总统在会上讲了话。"},{"type":"paragraph","text":"齐奥塞斯库总统在讲话中说，一八四八年资产阶级民主革命是当时在欧洲开展的伟大的社会运动的一个组成部分。人民群众起来争取实现民族统一，建立统一的民族和民族国家，这一革命理想反映出罗马尼亚人民希望成为自由的人民的客观要求。他说，一八四八年革命的失败，除国内因素外，也是沙皇俄国、奥斯曼和哈布斯堡三个专制帝国军事干涉的直接结果。"},{"type":"paragraph","text":"齐奥塞斯库总统在谈到国有化三十年来所取得的成就时指出，罗马尼亚已由一个落后的农业国变成了具有现代工业和现代农业的工农业国家。现在，她的工业产值比第二次世界大战前夕增长了三十七倍多，其农业产值则增加了近两倍。国民收入比一九五○年增长十一倍。从一九五○年至一九七七年，职工工资增长了十四倍多，商品销售额增长了约十三倍。"},{"type":"paragraph","text":"齐奥塞斯库总统在讲话中强调指出，鉴于当前的国际形势，罗马尼亚高度重视加强国防力量和军队的训练，并使人民时刻准备着捍卫革命成果、国家的自由、领土完整和独立。"},{"type":"paragraph","text":"据新华社布加勒斯特电　罗马尼亚今年开始成批生产一种新型飞机——动力滑翔机。这种飞机兼有滑翔机的滑翔和轻型飞机独立起飞的功能，可在很短的简易跑道上降落。"},{"type":"paragraph","text":"这种飞机全部由金属构成，有两个并排的座位，都可进行操纵。它配有一台六十八马力的发动机，时速二百公里。目前罗马尼亚已向一些国家出口这种飞机。（附图片）"},{"type":"paragraph","text":"罗马尼亚特尔古穆列什市的氮肥联合企业是本国最大的生产氮肥的企业。"},{"type":"paragraph","text":"罗马尼亚通讯社稿（新华社发）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15a9753aac"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
