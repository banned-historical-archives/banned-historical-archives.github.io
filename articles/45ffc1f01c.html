al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"婚姻问题敬告男女置年","alias":"","parts":[{"type":"paragraph","text":"婚姻问题敬告男女青年"},{"type":"paragraph","text":"（1919年11月19日）"},{"type":"paragraph","text":"兼公先生在大前天本报“随意录”内，登了一段《改革婚制的牺牲者》，对于赵女士的自杀，下一个警告于做父母的。他说："},{"type":"paragraph","text":"“....·中国人不都是些聋子瞎子，必定总有一丝半点儿的良心，就应该有一个澈底的觉悟，不再去干涉他的儿女婚姻。这个女子还死得值。...我们不要辜负他，不要使他白白的送了一条性命。”"},{"type":"paragraph","text":"兼公先生的话，说着一半了。但是，还有一半没有说着。我补着说："},{"type":"paragraph","text":"“全中国的青年男女诸君！你们都不是些聋子瞎子，眼见着这么一件‘血洒长沙城’的惨事，就应该惊心动魄，有一个澈底的觉悟。你们自己的婚姻，应由你们自己去办。父母代办政策，应该绝对否认。恋爱是神圣的，是绝对不能代办，不能威迫，不能利诱的！我们不要辜负了他，不要使他白白送了一条性命。”"},{"type":"paragraph","text":"读者诸君以为何如？"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":11,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":116,"page_end":116},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45ffc1f01c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
