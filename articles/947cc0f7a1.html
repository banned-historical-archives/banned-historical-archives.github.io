:[],"dates":[{"year":1969,"month":7,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"请进师傅传授　派出学徒取经"},{"type":"paragraph","text":"苏修用心学习美国垄断资本剥削手段"},{"type":"paragraph","text":"新华社二十二日讯　苏修叛徒集团为了加紧复辟资本主义，进一步加重对苏联广大劳动人民的压迫和剥削，竟公然学习美国垄断资产阶级的“经营管理技术”。"},{"type":"paragraph","text":"美国《明星晚报》不久前透露，“莫斯科很看重美国的高级经营管理技术”。因此，苏修叛徒集团请了在马萨诸塞理工学院学习的五十多名美国经营管理人员访问苏联，传授资本主义的经济管理技术；同时，还派了苏联年轻的管理人员去马萨诸塞理工学院学习经营管理。这家美国报纸还说，美国去莫斯科访问的人在同苏修的“共同讨论中发现”，苏修社会帝国主义和美国垄断资本主义“有着非常类似的经营管理方面的问题”，例如把工人作为可以自由买卖的劳动力的所谓“招工问题”等。"},{"type":"paragraph","text":"美国的所谓“经营管理技术”，是大腹便便的美国垄断资本家对美国广大劳动人民进行残酷剥削的手段。苏修叛徒集团向美帝国主义学习这套“技术”，这表明苏修叛徒集团是一伙对苏联广大劳动人民进行敲骨吸髓的剥削的工贼。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"947cc0f7a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
