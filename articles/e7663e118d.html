[{"year":1967,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《通知》是文化大革命的方向盘"},{"type":"paragraph","text":"班长　王宗武"},{"type":"paragraph","text":"中共中央《通知》的公开发表，是向党内最大的一小撮走资本主义道路当权派和他们伸进各个领域里的黑爪牙进行总清算、总反击的新的进军号。毛主席说：“在人类历史上，凡属将要灭亡的反动势力，总是要向革命势力进行最后挣扎的”。党内一小撮走资本主义道路当权派，有的虽然被罢了官，靠边站了，但他们人还在，心不死。我们万万不能忘记阶级斗争，万万不能松懈自己的警惕，我们要坚定地和无产阶级革命派站在一起，紧紧掌握斗争大方向，集中批判党内最大的走资本主义道路当权派和他所推行的资产阶级反动路线，保卫无产阶级文化大革命的伟大成果，发展无产阶级文化大革命的伟大胜利。我们要在支左、支工、支农、军管、军训工作中创新功立新劳，在斗争中把活学活用毛主席著作的群众运动推向新阶段，学出新水平，用出新水平。"},{"type":"paragraph","text":"有阶级斗争存在，就有夺权斗争存在。只承认阶级斗争长期存在，不承认夺权斗争长期存在，就不是一个真正的马克思列宁主义者。中共中央《通知》是巩固无产阶级专政的指路明灯，是我们的方向盘，传家宝。我们要努力学习它，忠实地贯彻它，热情地宣传它，勇敢地捍卫它。靠了它，我们才能把无产阶级文化大革命进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7663e118d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
