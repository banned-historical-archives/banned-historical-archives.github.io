<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"古典奴隶制是否奴隶制的典型形态","authors":[],"dates":[{"year":1962,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"原题:《论古典奴隶制是否奴隶制田典型形态?》"},{"type":"paragraph","text":"作者:毛昭晰"},{"type":"paragraph","text":"原载:《杭州大学学报》1962年第1期"},{"type":"paragraph","text":"在世界史方面的学术讨论中，对于在古典奴隶制和古代东方奴隶制这两个主要类型中是否存在典型的问题，学术界还有争论。有人曾提出“不能把某一地区的奴隶制的特点看成是典型”的论点，这就在实质上否定了各种不同奴隶制形式中的典型形态的存在，这种看法是值得商榷的。"},{"type":"paragraph","text":"古代各国普遍存在的奴隶社会，有其共同的基本规律，但在不同的国家和民族中间，又存在极不相同的发展形式。为了揭示奴隶社会的基本规律，并阐明这一基本规律所借以表现的特殊形式，就有必要在千差万别的发展形式中抓住其典型的形态来进行深刻的研究，这是历史科学本身的任务所要求的，也是符合于历史发展的客观存在的。搞清了典型的历史形态，就有助于普遍规律与特殊规律的阐明。"},{"type":"paragraph","text":"奴隶制的典型形态，不是由某一发展形式存在时间的长短或地区的广狭来决定的，而应该看被当作典型的那一地区的特点，是否最能体现出奴隶社会的“纯粹”形态。这里，“纯粹”是相对而言的，绝对“纯粹”的形态是没有的，但仍可以从旧的社会形态的残余保留的多少中比较出纯粹的典型的形态。"},{"type":"paragraph","text":"以古典(希腊罗马)类型和古代东方类型的奴隶制相比较，无论从财产形态、剥削形态和政治形态来看，古代东方都保留了更多的原始公社制的残余，而在希腊罗马，旧制度的残余破坏得比较彻底，所以作为奴隶占有制的社会经济形态来说，表现得更为纯粹，因而是典型。马克思主义经典作家也是把它作为典型形态的。"},{"type":"paragraph","text":"以希腊罗马为典型，并不会抹煞其他民族的历史特点，因为这并不等于以这一典型作为公式到处乱套；同时，典型与“中心”也有区别，典型是指社会经济形态的“纯粹”而言，“中心”则指某一国家或地区在政治经济文化上所处的地位而言。“中心”不一定是“典型”，“典型”不一定是“中心”。"},{"type":"paragraph","text":"马克思主义经典作家以希腊罗马作为奴隶制的典型形态，与反动的“欧洲中心论”更有其原则区别。“欧洲中心论”也以希腊罗马为“典型”，他们的目的是宣扬欧洲白色人种及其文化的“优越性”，抹煞其他民族的光辉历史，为侵略压迫作辩护；而不是为了探索人类历史发展的共同规律和各民族历史发展的特殊规律。　(成)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18a95ed328"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
