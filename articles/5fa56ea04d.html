,"dates":[{"year":1979,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卡特总统和邓副总理一致认为"},{"type":"paragraph","text":"两天会谈极其有益和有建设性"},{"type":"paragraph","text":"新华社华盛顿一月三十日电  卡特总统和邓小平副总理今天一致认为，他们过去两天举行的会谈“是极其有益和有建设性的”。"},{"type":"paragraph","text":"两国领导人今天上午在白宫举行第三次、也是最后一次会谈后，当着许多记者的面热烈握手。这次会谈历时两个多小时。"},{"type":"paragraph","text":"他们笑着从总统的办公楼出来，一起走进玫瑰园。在记者向他们询问会谈的结果时，卡特总统说：“副总理和我今天下午还要会面，来签署即将达成的一些协议。我们的讨论是深远、坦率、诚恳、亲切而和谐的，极其有益和有建设性的。”"},{"type":"paragraph","text":"他还说：“我们已经建立了今后进行经常磋商的关系。这对美国和中国人民有很大益处。这是美国最有历史意义的事件。”"},{"type":"paragraph","text":"卡特总统说，已经取得的进展使得将来有希望受益更大。"},{"type":"paragraph","text":"邓副总理对记者说：“我个人完全同意总统先生刚才说的每句话。我相信，通过这次讨论和访问，加强了相互了解和友谊。这次访问使我更加坚信中美两国和两国人民在各个领域——政治、经济、科技、文化——的合作有广阔发展前途。”"},{"type":"paragraph","text":"邓副总理表示：“我现在向美国总统、总统夫人、美国政府和人民对我们所表达的友谊，表示真诚地感谢。”"},{"type":"paragraph","text":"当两国领导人再次握手时，邓副总理说：“现在两国人民都在握手。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fa56ea04d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
