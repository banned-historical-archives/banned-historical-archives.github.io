ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对林彪同杨成武等两次谈话的纪要的批语","alias":"","parts":[{"type":"paragraph","text":"对林彪同杨成武等两次"},{"type":"paragraph","text":"谈话的纪要的批语"},{"type":"paragraph","text":"（1964年7月15日）罗瑞卿同志："},{"type":"paragraph","text":"此件已看过。准备十六日或十七日请总理、彭真、贺龙3、瑞卿、杨成武、叶剑英、聂荣臻、陈毅、伍修权九同志专谈一次军事问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十五日"},{"type":"paragraph","text":"[1]罗瑞卿，当时任中共中央书记处书记、中央军委秘书长、中国人民解放军总参谋长。"},{"type":"paragraph","text":"[2]指罗瑞卿1964年7月14日转报给毛泽东的林彪7月10日、12日两次同杨成武等人的谈话纪要。谈话中说，毛泽东6月16日在十三陵的指示等是经过慎重考虑、根据最新情况提出来的，我们应该据此修改我们的战略方针和作战计划，作应付各种情况的准备，各总部应该认真传达研究、贯彻执行，用它把我军的战略思想完全统一起来。"},{"type":"paragraph","text":"[3]贺龙，当时任中共中央军委副主席、国务院副总理。"},{"type":"paragraph","text":"[4]叶剑英，当时任国防委员会副主席、中国人民解放军军事科学院院长兼政治委员。聂荣臻、陈毅，当时均任国防委员会副主席、国务院副总理。伍修权，当时任中共中央对外联络部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":7,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":505,"page_end":505},"tags":[{"name":"杨成武","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4dd7804e42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
