art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平、胡耀邦会见久拉诺维奇"},{"type":"paragraph","text":"中共中央副主席邓小平、中共中央总书记胡耀邦11月7日上午在人民大会堂会见了南斯拉夫联邦执委会主席韦·久拉诺维奇。"},{"type":"paragraph","text":"久拉诺维奇说，我昨天同赵紫阳总理就南中两国的政治、经济形势和国际问题相当全面地交换了意见。南斯拉夫政府对两国关系的发展表示满意。"},{"type":"paragraph","text":"邓小平说，中南两党两国在许多问题上有广泛的一致。南斯拉夫有很多好经验，我们正在研究、学习。"},{"type":"paragraph","text":"久拉诺维奇说，南中关系有良好的基础；完全平等、互相尊重、互不干涉内政、尊重对方建设社会主义的独特道路。"},{"type":"paragraph","text":"会见时，双方还就国际问题诚挚友好地交换了意见。"},{"type":"paragraph","text":"会见以后，邓小平、胡耀邦设午宴招待南斯拉夫同志。"},{"type":"paragraph","text":"赵紫阳电贺里根当选美国总统"},{"type":"paragraph","text":"中华人民共和国国务院总理赵紫阳十一月六日打电报给罗纳德·里根，热烈祝贺他当选为美国总统。"},{"type":"paragraph","text":"赵紫阳总理在贺电中说：“我们衷心期望在你就职以后，中美两国之间已有的良好合作关系，将在中美建交公报原则的基础上继续向前发展。”"},{"type":"paragraph","text":"邓小平接受南电视台记者采访"},{"type":"paragraph","text":"中共中央副主席邓小平十一月七日上午接受贝尔格莱德电视台记者的采访，回答了他们提出的问题。"},{"type":"paragraph","text":"邓小平说，我们很高兴地看到，南斯拉夫共产主义者联盟和人民在铁托同志逝世后，坚持了铁托同志的事业，而且坚持得非常好。你们的国家和人民在国际上享有很高的威望。我们对南共联盟和人民表示热烈祝贺。"},{"type":"paragraph","text":"邓小平在回答记者提出的有关中国四化建设、加强民主和法制、经济政策等问题时说，中国将继续执行对外开放的政策。这样做，可以加强同各国的往来，吸取外国的经验，有利于加快中国四化建设的步伐。但我们这方面经验还不够，须不断加以总结。"},{"type":"paragraph","text":"邓小平说，我们要顺利地搞好四化建设，必须克服官僚主义，进行体制改革。我们提倡充分发扬社会主义民主，同时加强社会主义法制。"},{"type":"paragraph","text":"贝尔格莱德电视台记者是随同南斯拉夫联邦执委会主席韦·久拉诺维奇来中国访问的。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fbe1f0682"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
