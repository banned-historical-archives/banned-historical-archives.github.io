art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让天安门前的五星红旗永远飘扬","authors":["天安门前警卫连党支部"],"parts":[{"type":"paragraph","text":"我们热烈欢呼党中央的两项英明决议。伟大领袖毛主席、党中央的英明决策，充分反映了我国亿万军民的共同心愿，大长了无产阶级和革命人民的志气，大灭了资产阶级和一小撮阶级敌人的气焰。我们愤怒批判邓小平的翻案复辟罪行，愤怒声讨一小撮反革命分子在天安门广场制造反革命政治事件的罪恶活动。"},{"type":"paragraph","text":"天安门广场是我们伟大领袖毛主席升起第一面五星红旗、检阅广大革命群众的地方，一小撮阶级敌人垂死挣扎，胆敢在这里逞凶破坏。四月四日下午，一小撮阶级敌人几次来到守卫国旗的战士面前捣乱，我们的战士想着自己是守卫红旗的哨兵，有毛主席、党中央的英明领导，有全国人民的支持，充满了胜利的信心，和敌人进行了英勇的斗争。最后在首都广大人民群众、工人民兵、人民警察有力的支持下，彻底粉碎了阶级敌人的反革命阴谋，取得了斗争的胜利。"},{"type":"paragraph","text":"最近几天，我们在天安门前的警卫战士，耳闻一小撮阶级敌人的反革命叫嚣，目睹一小撮阶级敌人的反革命活动。天安门广场的反革命政治事件，从反面给我们上了极其深刻的阶级斗争课。它告诉我们：社会主义革命时期的阶级斗争是尖锐的、复杂的。这些反革命分子有预谋、有计划、有组织地制造政治谣言，张贴反动诗词，丧心病狂地把矛头直接指向伟大领袖毛主席，分裂以毛主席为首的党中央，妄图推出邓小平当匈牙利反革命事件的头子纳吉。其手段何等阴险恶毒！它还告诉我们：广大人民是要革命的。不管一小撮阶级敌人多么猖狂，在革命群众面前，在强大的无产阶级专政面前，他们只不过是几只秋后的蚂蚱、碰壁的苍蝇。首都工人民兵一出动，他们一个个就象过街老鼠一样，狼狈不堪，顷刻瓦解。"},{"type":"paragraph","text":"雄伟壮丽的天安门，是我们伟大社会主义祖国的象征。我们在天安门前执勤，一定要以阶级斗争为纲，提高革命警惕性，紧握手中钢枪，随时准备打击阶级敌人的破坏活动。我们要以实际行动保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线，保卫社会主义祖国的伟大首都，保卫雄伟壮丽的天安门。让天安门前的五星红旗高高飘扬，永远飘扬！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3eb2226687"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
