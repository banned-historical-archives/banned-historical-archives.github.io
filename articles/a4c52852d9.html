92,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"田昌五在1991年第六期《文史哲》上发表了《就秦汉奴隶制度谈古史分期问题》的文章，作者认为:秦汉时期存在着奴隶制度，但没有与之相应的古代自由人。秦汉的小自耕农是“编户齐民”，他们有了人身自由，但缺乏古代自由农民那样的政治自由。从历史的角度来考察秦汉的奴隶制，可分为三种类型:一是封君和豪强地主的奴隶制，这是从属于封建的形态；二是官府奴隶制，这是历史遗留形态，它在秦汉时经历了两起两落的曲线发展而走向萎缩；三是私人工商奴隶制，这是新出现的形态，它真正兴盛起来是在汉初七八十年间，在历史的长河中只是昙花一现。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4c52852d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
