ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"关于和国民党谈判原则的批复","alias":"","parts":[{"type":"paragraph","text":"关于和国民党谈判原则的批复！"},{"type":"paragraph","text":"（1937年2月12日）周："},{"type":"paragraph","text":"下列各事请注意："},{"type":"paragraph","text":"（甲）防地要包括金积、灵武在内。如东北军真调走，我们还应要求海原、固原、镇原及西峰镇，因为现有的防地实在不够。但我们不是促成东北军调走，而是东北军调走后无可避免时，至要求整个陕北与宁夏，前已向南京提出，此时亦宜提-一提。但为不增加蒋之困难，允候将来再商。"},{"type":"paragraph","text":"（乙）西路军防地虽指定，但让防未实行，且未停战，应要求停战让防。"},{"type":"paragraph","text":"（丙）陕甘以外各省的红军游击队，一律改民团或保卫团，千人以上者亦然，绝不宜调来陕甘集中。"},{"type":"paragraph","text":"（丁）政训联络员设法拒绝，至少拖延之。（戊）经费须从二月领起。"},{"type":"paragraph","text":"（已）致三中全会电中所述要求他们实行五条，则我们实行四条，你谈判时应同时提出，否则彼方将迫我方再让步，实际在我方者是最低条件，勿要再让。且实行尚需时间（说服干部与民众大不易），只有要求彼方实行五条，方能避免迫我再让与立即实行。"},{"type":"paragraph","text":"（庚）三中全会孙夫人等左派不可太突出，提议宜先问蒋，估计蒋不能采纳者则不提此点，请告汉年。"},{"type":"paragraph","text":"洛毛十二日三时"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":2,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":190,"page_end":191},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"697edb76d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
