庆仕","洪居敬","西北农学院","谭克川"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于匈牙利、波兰事件","type":"title"},{"text":"西北农学院谭克川洪居敬吕庆仕","type":"authors"},{"text":"“匈牙利的党内分化，军事分化，是全民性的暴动，匈牙利党已有十五年的历史了，暴乱这就是因为匈牙利党是脱离群众，匈牙利政府象唱戏一样，首先和谈，以后武装镇压，我认为这政府有问题，政府不好当然就应下台，不必和谈。另外苏联不应出兵干涉匈的内政，苏联也没有实现‘把自己的意志不应强加于别国的诺言。”(农60级学生　谭克川)","type":"paragraph"},{"text":"“匈、波事件中发生的暴动，说明专政的高压政策并不能解决问题。”(化57级学生　洪居敬)","type":"paragraph"},{"text":"铁托发表演说后，班上同学要讨论。他认为：“这有什么值得讨论，社会主义阵营太严格了，言论不自由。”(植60级学生　吕庆仕)","type":"paragraph"},{"text":"“苏联出兵匈牙利，是干涉匈牙利，一个国家的军队跑入另一个国家去，不是干涉是什么？”(无名)","type":"paragraph"},{"text":"“苏联对南斯拉夫的帮助不真诚，在很大程度上影响到南斯拉夫的建设。”(无名)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e8e5830ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
