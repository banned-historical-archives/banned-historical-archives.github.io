tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席语录歌一首顶一万首","authors":["杨天山"],"parts":[{"type":"paragraph","text":"林彪同志指示我们：为了把毛泽东思想真正学到手，要反复学习毛主席的许多基本观点，有些警句甚至要背熟，反复学习，反复运用。为毛主席语录谱写的歌曲真是太好了！它给我们学习毛主席著作提供了一个新的有效方法，是对我们更快地掌握毛泽东思想，促进自己思想革命化的一个有力的推动。我们真有说不出的高兴，我们最爱唱毛主席语录歌。每当我们高唱毛主席语录歌的时候，心情就非常激动，精神也特别振奋，更感到无限的幸福，就好像伟大的领袖毛主席在我们身边，真是唱在口上，暖在心上，越唱劲越足，越唱心越亮，越唱越热爱我们最伟大的领袖毛主席。每唱一遍都能使我们得到最大的鼓舞。"},{"type":"paragraph","text":"最近，我们部队在著名的抗日老根据地焦庄户进行政治野营，在行军中，不少同志的脚板上打起了血泡，但是我们一唱起“下定决心，不怕牺牲，排除万难，去争取胜利”的毛主席语录歌，浑身就有股用不完的力量。体弱的同志，说什么也不让别人帮助，硬夺回自己的枪，行军的劳累在歌声里忘得一干二净了。到了宿营地，同志们又精神百倍地参加了助民劳动，有的帮群众打扫场院，有的到地里和社员一起刨红薯，情绪特别高。同志们都说：这全靠毛泽东思想给了我们战胜困难的力量。"},{"type":"paragraph","text":"毛主席是我们心中的红太阳，毛主席著作是革命的无价宝。毛主席的话，一句顶一万句；毛主席语录歌，一首顶一万首。我要学习一辈子毛主席著作，干一辈子革命，唱一辈子毛主席语录歌，真正把毛泽东思想学到手。我们永远放声歌唱毛泽东思想，高声地唱，刻苦地学，认真地用，狠狠地改造思想，做毛主席的好战士。"},{"type":"paragraph","text":"DW：通信兵某部"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f33984a75e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
