hors":[],"dates":[{"year":1952,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京大学医学院医学系六年级全体学生"},{"type":"paragraph","text":"写信给毛主席要求到反细菌战的前线去"},{"type":"paragraph","text":"敬爱的毛主席：美国侵略者疯狂地继续使用细菌武器，侵犯我们祖国的东北。我们的愤怒再也不能抑止了。"},{"type":"paragraph","text":"我们更清楚地认识到美帝国主义是全人类最危险的死敌。正如人民日报所指出的：美国侵略者今天加到中朝人民头上的罪行，如果不予制止明天就要加到全世界爱好和平的人民头上。为了保卫中朝人民的幸福，为了维护全世界劳动人民的安全，我们誓以具体的行动，粉碎敌人万恶的阴谋。"},{"type":"paragraph","text":"敬爱的毛主席，我们是北京大学医学院医学系六年级——即将毕业的一班学生，是祖国人民辛苦培养的医务工作干部。请允许我们开赴反细菌战的最前线，到朝鲜或东北。那里有敌人抛下的罪恶的昆虫，我们就到那里去。我们有足够的信心和勇气来完成祖国和您所交给我们的任务。"},{"type":"paragraph","text":"北京大学医学院医学系六年级学生汪秀明等共三十人"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a53cf1e55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
