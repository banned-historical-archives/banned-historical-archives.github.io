ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对刘宁一在庆祝十月革命四十七周年大会上的讲话稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对刘宁一在庆祝十月革命四十七周年"},{"type":"paragraph","text":"大会上的讲话稿的批语和修改?"},{"type":"paragraph","text":"（1964年11月6日）可用。有一些小的修改。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月六日这一句，不宜在这个时候讲。"},{"type":"paragraph","text":"[1]中共中央对外联络部副部长、中苏友好协会副会长刘宁一1964年11月6日在北京庆祝十月革命四十七周年大会上的讲话，在1964年11月7日《人民日报》发表。"},{"type":"paragraph","text":"[2]本篇一是毛泽东对新华通讯社社长、《人民日报》总编辑吴冷西1964年11月5日送审的刘宁一的讲话草稿写的批语。本篇二是对讲话稿中“我们所处的时代是东风压倒西风的时代”一句写的批语，毛泽东将这一句删去了。本篇三是毛泽东对讲话稿的修改，其中用宋体字排印的是毛泽东加写的文字。对刘宁一在庆祝十月革命四十七周年大会上的讲话稿的批语和修改"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"美国刚刚举行了总统选举，约翰逊连任总统。在竞选期间，有一种说法，说什么民主党的约翰逊是和平的候选人，共和党的戈德华特是战争的候选人，他们两人实行两种根本不同的政策。我们不能同意这种说法。美国的两党制和总统选举，从来就是美国垄断资产阶级愚弄人民的把戏。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":11,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":250,"page_end":251},"tags":[{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b79eae1a78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
