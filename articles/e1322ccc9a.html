torical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"对俘虏官兵的处理办法","description":"根据毛泽东手稿刊印。","dates":[{"year":1945,"month":11,"day":3}],"parts":[{"text":"对俘虏官兵的处理办法","type":"title"},{"type":"appellation","text":"刘、邓、薄、张、李："},{"type":"paragraph","text":"戌江电悉。（一）对西北系军官加以优待是正确的，但不要放走。他们如愿意发表反对内战、主张和平的宣言及谈话，应鼓励之。（二）一切俘虏官兵照中央指示原则上均收留教育，反动者监视，均不放走，仅在必需时可考虑放走个别的人。（三）十分注意搜寻蒋介石的“剿匪”文件（如《剿匪手本》等）并公开发表之，尤其注意勾结美国打内战的材料。"},{"type":"paragraph","text":"军 委"},{"type":"paragraph","text":"戌江亥"}],"comment_pivots":[{"part_idx":1,"offset":9,"index":1},{"part_idx":2,"offset":133,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["刘、邓、薄、张、李，指刘伯承、邓小平、薄一波、张际春、李达，当时分别任晋冀鲁豫军区司令员、政治委员、第一副政治委员、第二副政治委员兼政治部主任和参谋长。","《剿匪手本》，是一九三三年蒋介石编的专门讲述进攻红军和革命根据地的方法的一本小册子。一九四五年抗日战争结束以后，蒋介石重印这个小册子发给国民党军官，并下达密令打内战。"],"page_start":75,"page_end":75,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1322ccc9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
