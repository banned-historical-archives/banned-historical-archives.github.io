cal-archives/banned-historical-archives9/main/books/机密档案中新发现的毛泽东讲话.epub"],"article":{"title":"毛泽东主席在《关于邀请荷兰共产主义统一运动（马列）派代表团访华的请示》上的批示","parts":[{"text":"\u003cspan class=\"c11\"\u003e批示\u003c/span\u003e","type":"paragraph"},{"text":"1970年12月6日","type":"paragraph"},{"text":"【在这个请示中提到“荷兰共产主义统一运动（马列）”自称拥护毛泽东思想，但受到无政府主义、卡斯特罗主义、马尔库斯主义等各种思潮的影响。】","type":"paragraph"},{"text":"对于一切外国人，不要求他们承认中国人的思想，只要求他们承认马、列主义的普遍真理与该国革命的具体实践相结合。这是一个基本原则。我已说了多遍了。至于他们除马、列主义外，还杂有一些别的不良思想，他们自己会觉悟，我们不必当作严重问题和外国同志交谈。只要看我们党的历史经过多少错误路线的教育才逐步走上正轨，并且至今还有问题，即对内对外都有大国沙文主义，必须加以克服，就可知道了。","type":"paragraph"},{"text":"毛泽东 12月6日\u003cbr style=\"clear:both;\"\u003e","type":"paragraph"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":12,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e6f882f5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
