rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入基层抓点带面三二三八三部队党委及时总结推广揭批“四人帮”的经验","authors":[],"parts":[{"type":"paragraph","text":"本报讯 三二三八三部队党委及时推广典型经验，把揭批“四人帮”的斗争不断引向深入。"},{"type":"paragraph","text":"揭批“四人帮”篡党夺权的战役打响后，党委八名成员带领二十三名机关干部，分七个工作组，深入连队与战士同学同批。他们在连队特别注意及时总结经验。机炮二连在揭批“四人帮”中，学习与批判结合得好，党委及时总结推广了这个连的经验，推动部队掀起了学习毛主席著作的新高潮。这个部队党委每搞完一个专题批判，就召开一次经验交流会。目前，他们已经召开三次经验交流会，有十个单位从不同侧面，介绍揭批“四人帮”的经验，都收到了比较好的效果。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0097c35a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
