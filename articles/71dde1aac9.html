art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"忠于毛主席支左不支派","authors":["政治学院学习毛主席著作积极分子常树理"],"parts":[{"type":"paragraph","text":"三月七日，我们受到了最最敬爱的伟大领袖毛主席的亲切接见。这是我一生中最最幸福、最最难忘的日子。"},{"type":"paragraph","text":"毛主席啊，毛主席！去年春天，我响应您的“人民解放军应该支持左派广大群众”的战斗号召，奔赴“三支”“两军”第一线。一年来，我和同志们一道，紧跟您的伟大战略部署，不断地用您的光辉思想支持左派，坚持支左不支派的原则，紧紧地和广大贫下中农团结在一起，战斗在一起，胜利在一起。当党内一小撮走资派施展各种阴谋诡计，压制左派的时候，我们遵照您“不是东风压倒西风，就是西风压倒东风，在路线问题上没有调和的余地”的教导，坚定地站在左派组织一边，旗帜鲜明地坚决支持他们的革命行动。当有些左派组织产生“唯我独左”“唯我独革”的错误思想的时候，我们便用您的指示：“无产阶级不但要解放自己，而且要解放全人类”，“只要两派都是革命的群众组织，就要在革命的原则下实现革命的大联合”，帮助他们正确对待犯过错误的群众组织和革命群众。您老人家发出大办学习班的伟大指示后，我们闻风而动，紧跟您的伟大战略部署，帮助公社大办毛泽东思想学习班，落实您的最新指示，促进了革命的大联合和革命的三结合。"},{"type":"paragraph","text":"毛主席啊，毛主席！我决心永远紧跟您的伟大战略部署，条条落实、层层落实、全面落实您的最新指示，为夺取无产阶级文化大革命的全面胜利而奋斗。"}],"alias":""},"tags":[{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71dde1aac9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
