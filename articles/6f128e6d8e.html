ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"在中央关于在农村建立人民公社问题的决议稿上加写的话","alias":"","parts":[{"type":"paragraph","text":"在中央关于在农村建立人民公社问题的决议稿上加写的话！！"},{"type":"paragraph","text":"（1958年8月）"},{"type":"paragraph","text":"人民公社建成以后，不要忙于改集体所有制为全民所有制，在目前还是以采用集体所有制为好，这可以避免在改变所有制的过程中发生不必要的麻烦。实际上，人民公社的集体所有制中，就已经包含有若干全民所有制的成分了。这种全民所有制，将在不断发展中继续增长，逐步地代替集体所有制。由集体所有制向全民所有制过渡，是一个过程，有些地方可能较快，三、四年内就可完成，有些地方，可能较慢，需要五、六年或者更长一些的时间。过渡到了全民所有制，如国营工业那样，它的性质还是社会主义的，各尽所能，按劳取酬。然后再经过多少年，社会产品极大地丰富了，全体"},{"type":"paragraph","text":"[1]中共中央关于在农村建立人民公社问题的决议，于1958年8月29日在北戴河中共中央政治局扩大会议上通过。1960年11月28日，毛泽东在为中共中央起草的转发甘肃省委关于贯彻中央紧急指示信的报告的批语中曾提到这段话。批语说：毛泽东“自已说，他是同一切愿意改正错误的同志同命运、共呼吸的。他说，他自己也曾犯了错误，一定改正，例如，错误之一，在北戴河决议中写上了公社所有制转变过程的时间设想得过快了。在那个文件中有一段是他写的，那一段在原则上是正确的，规定由社会主义过渡到共产主义的原则和条件，是马列主义的。但是在那一段的开头几句规定过程的时间是太快了。"},{"type":"paragraph","text":"在中央关于在农村建立人民公社问题的决议稿上加写的话人民的共产主义的思想觉悟和道德品质都极大地提高了，全民教育普及并且提高了，社会主义时期还不得不保存的旧社会遗留下来的工农差别、城乡差别、脑力劳动与体力劳动的差别，都逐步地消失了，反映这些差别的不平等的资产阶级法权的残余，也逐步地消失了，国家职能只是为了对付外部敌人的侵略，对内已经不起作用了，在这种时候，我国社会就将进入各尽所能，各取所需的共产主义时代。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":106,"page_end":107},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f128e6d8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
