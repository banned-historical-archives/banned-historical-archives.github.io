hors":["邓小平"],"dates":[{"year":1975,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"邓小平在研究××省委领导班子会议上的插话","type":"title"},{"text":"邓小平","type":"authors"},{"text":"邓小平在研究××省委领导班子会议上的插话，一九七五年十月十二日（摘录）","type":"paragraph"},{"text":"省委书记中的青年人下放去当县委副书记，对他们有好处，在上面架空是害了这些人。","type":"paragraph"},{"text":"这个新的班子是中上，不弱。","type":"paragraph"},{"text":"领导班子选准后要相对稳定，要使用适当，才能发挥作用。","type":"paragraph"},{"text":"群众运动这一关（指批派性）不搞不行。","type":"paragraph"},{"text":"首先要把组织部的干部选好，要公道，党性强，敢字当头。","type":"paragraph"},{"text":"对军队干部要管得很严，还搞派性的就调离、降职。要告诉他们继续搞派性那是犯罪。对于拿武器的人，不严格管理那还得了？军队干部有派性的，以调离省为宜，特别是军师级，不能留原地。","type":"paragraph"},{"text":"派头怕群众。","type":"paragraph"},{"text":"总之，××省要开展一个反派性的群众运动。地、市班子，你们还要好好研究调整。","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"清华大学、北京大学材料组编《邓小平言论摘录（续编）》，一九七六年四月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"573b84cf6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
