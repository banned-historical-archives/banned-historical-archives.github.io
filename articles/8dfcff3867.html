<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修“新体制”是剥削劳动人民的新手段","authors":["洪萱"],"dates":[{"year":1968,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修“新体制”是剥削劳动人民的新手段"},{"type":"paragraph","text":"北京轧钢三厂工人　洪萱"},{"type":"paragraph","text":"勃列日涅夫、柯西金叛徒集团，倒行逆施，在国内推行了全面复辟资本主义的“新经济体制”。这个“新体制”一出笼就遭到了广大苏联劳动人民的反对。这使苏修叛徒集团恐慌万分。于是，他们一面以苏共中央的名义，作出了什么“加强劳动纪律”的决议，强制推行“新体制”；一面大吹牛皮，胡说什么“新体制”“提高了苏联人民的物质福利”，“体现着全体苏联人民的共同根本利益”，实行了“新体制”使“苏联人吃的穿的更好了，他们的精神生活面貌更加丰富多彩”，如此等等，吹得天花乱坠，妄图愚弄苏联人民。"},{"type":"paragraph","text":"但是，谎言掩盖不了事实。“新体制”推行后的累累罪证，完全戳穿了苏修叛徒集团的骗人鬼话。"},{"type":"paragraph","text":"“新体制”完全是套在苏联广大劳动人民脖子上的新枷锁。"},{"type":"paragraph","text":"“新体制”把资本主义的物质刺激提到了首位。苏修集团却吹嘘说，奖金等物质刺激可以提高工人劳动报酬，"},{"type":"paragraph","text":"“使私人收入增加”。这纯粹是欺人之谈。到底是什么人“私人收入增加”？对苏修叛徒集团说来，那真是哑巴吃饺子——心中有数。“新体制”规定奖金是按工资比例发的，就是说，高工资的就可以得高奖金。结果，奖金的绝大部分落入厂长、工程师这些高薪阶层的腰包里。例如，戈米尔的一个玻璃厂，在一九六七年一个季度发给领导人员的奖金竟等于他们薪金的百分之一四七点二，而广大工人却分文未得。"},{"type":"paragraph","text":"根据“新体制”规定，企业负责人有权改变工人工资级别和奖金数目。这样，苏修企业负责人就滥用权力，把大量奖金据为己有。据苏修报纸自己招认：一个建筑业托拉斯经理一个月内吞占了七次奖金。"},{"type":"paragraph","text":"苏修的“新体制”还给了企业负责人自行招收、解雇、处罚工人的权力。一些企业负责人为了牟取高额利润，象资本家一样，借口“裁减多余人员”和“紧缩编制”，大量解雇工人，使得失业激增。"},{"type":"paragraph","text":"这些就是所谓“体现着全体苏联人民的共同根本利益”的“新体制”，给广大苏联工人增加的“福利”！"},{"type":"paragraph","text":"“一切为了利润”是“新体制”的核心。“新体制”给了苏修企业负责人大赚卢布的合法权利。"},{"type":"paragraph","text":"他们在所谓“使产品的价格符合社会生产支付的劳动消耗”的幌子下，决定全部“修改”商品的批发价格，工业品批发价格提高幅度达百分之十三到十五，其中煤提高了百分之七十八，大量的工业品批发价格几乎提高了一倍。批发价格的提高必然影响到零售价格提高。"},{"type":"paragraph","text":"此外“新体制”规定国家只管企业上交利润的数字，至于生产什么产品，质量如何，全都不管。为了牟取利润，企业负责人只追求产品数量而不顾质量，致使产品质量低劣，使用效率降低。"},{"type":"paragraph","text":"“新体制”给企业大开投机取巧的方便之门。例如，“新体制”规定企业有权规定新产品零售价格，于是利欲熏心的企业负责人，就任意提高“新产品”的售价，或将原有产品稍加装潢，冒充“新产品”高价出售。有的甚至弄虚作假，骗人赚钱，例如把四十米衣料硬拉成四十三米出售。这一切实际上增加了劳动人民的经济负担。"},{"type":"paragraph","text":"列宁指出，在社会主义社会中新产生的资本家，“他们往往比旧的地主和资本家更厉害地压迫工人”。"},{"type":"paragraph","text":"今天，在“新体制”加紧实施的苏联，这种情景出现了。苏修叛徒集团推行“新经济体制”的罪恶目的，是要在苏联全面复辟和巩固资本主义制度，运用国家机器对劳动人民进行敲骨吸髓的剥削。这就赤裸裸地暴露了这伙叛徒贪婪榨取人民血汗的资产阶级的狰狞面目，暴露了他们的反革命嘴脸。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8dfcff3867"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
