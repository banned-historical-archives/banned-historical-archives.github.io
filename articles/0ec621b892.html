art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决拥护党中央的两个决议愤怒声讨邓小平的罪行","authors":["董哲/成宣/毕强"],"parts":[{"type":"paragraph","text":"北京部队领导机关干部、战士、职工、家属，四月八日举行集会，坚决拥护中共中央关于华国锋同志任中共中央第一副主席、国务院总理的决议和中共中央关于撤销邓小平党内外一切职务的决议，愤怒声讨一小撮阶级敌人制造天安门广场的反革命政治事件，决心深入批判不肯改悔的走资派邓小平的反动罪行，把反击右倾翻案风的伟大斗争进行到底。 《战友报》记者摄"},{"type":"paragraph","text":"沈阳部队领导机关和直属单位广大指战员，四月八日举行集会，热烈欢呼中共中央两项英明决议，决心更加紧密地团结在以毛主席为首的党中央周围，誓把反击右倾翻案风的斗争进行到底。九日驻沈阳部队又和沈阳市人民群众一起举行示威游行。 董哲摄（传真照片）"},{"type":"paragraph","text":"广州部队陆、海、空三军指战员，举行盛大集会，坚决拥护中共中央两个英明决议，热烈欢呼毛主席革命路线的伟大胜利。 本报通讯员摄（传真照片）"},{"type":"paragraph","text":"福建前线陆、海、空三军指战员隆重集会，热烈拥护中共中央决议，愤怒声讨邓小平的罪行，决心用战斗来保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线，夺取反击右倾翻案风的更大胜利。 新华社记者摄（传真照片）"},{"type":"paragraph","text":"成都部队领导机关和成都驻军，四月九日举行集会，坚决拥护中共中央两项英明决议，决心以阶级斗争为纲，抓革命，促生产，促工作，促战备，夺取更大的胜利。 成宣摄（传真照片）"},{"type":"paragraph","text":"曾在珍宝岛自卫反击战中荣立二等功的某部特务连副指导员蔺庆春和战友们，坚决拥护党中央两项英明决议，愤怒声讨邓小平的罪行，决心提高警惕，加强战备，随时准备粉碎国内外一切阶级敌人的破坏和捣乱。 毕强摄"},{"type":"paragraph","text":"参加过西沙自卫反击战的海南军区某部炮艇指战员，怀着极大的无产阶级义愤，愤怒声讨邓小平搞修正主义，妄图复辟资本主义的罪行，声讨一小撮阶级敌人制造天安门广场反革命政治事件的罪行。 新华社记者摄（传真照片）"},{"type":"paragraph","text":"安徽省合肥市的民兵写大字报，坚决拥护中共中央的两项决议，坚决拥护对制造天安门广场反革命政治事件的一小撮阶级敌人实行无产阶级专政的革命行动。他们决心以实际行动保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线，保卫伟大的社会主义祖国。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ec621b892"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
