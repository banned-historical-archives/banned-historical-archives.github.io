革命将排除障碍继续前进","authors":[],"dates":[{"year":1964,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国黑人穆斯林组织领导人爱克斯发表谈话"},{"type":"paragraph","text":"毛主席声明正是美国黑人所需要的  美国黑人革命将排除障碍继续前进"},{"type":"paragraph","text":"新华社阿克拉十七日电　美国黑人穆斯林组织领导人马尔科姆·爱克斯十六日晚上在这里向新华社记者发表谈话说，美国黑人欢迎毛泽东主席在去年八月八日为支持美国黑人反对种族歧视斗争而发表的声明。"},{"type":"paragraph","text":"他说，“毛主席是世界上第一个发表正式声明支持我们的斗争的领袖。”"},{"type":"paragraph","text":"他说，“他的声明直截了当，文字简朴，不用解释，人人都懂。”"},{"type":"paragraph","text":"马尔科姆·爱克斯说：“毛主席在声明中指出：‘美国黑人斗争的迅速发展是美国国内阶级斗争和民族斗争日益尖锐化的表现，引起了美国统治集团日益严重的不安’，这是非常真实的。”他接着说，“美国政府企图用各种手段来控制黑人争取平等权利的斗争，但是，美国黑人的革命必将排除一切障碍而继续前进，这是任何力量都阻挡不了的。”"},{"type":"paragraph","text":"他在谈到毛主席在声明中呼吁全世界人民联合起来反对他们的共同敌人的一段话时说：“这是非常正确的。我们的斗争和全世界被压迫人民的斗争是一样的。我们必须联合起来，互相支持。”"},{"type":"paragraph","text":"他最后说：“毛主席的声明正是我们美国黑人所需要的。我们欢迎他的声明和他代表六亿五千万中国人民对我们斗争的支持。我们美国黑人还对中国人民在毛主席的英明领导下在他们的革命和国家建设事业中所取得的成就表示钦佩。”"},{"type":"paragraph","text":"马尔科姆·爱克斯目前正在加纳访问。他是为寻求对美国黑人争取人权的斗争的支持前来非洲的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a95d636d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
