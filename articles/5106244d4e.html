义，违法乱纪的总结报告（节录）","authors":[],"dates":[{"year":1953,"month":6,"day":20}],"is_range_date":false,"parts":[{"text":"德昌县县级机关反对官僚主义，命令主义，违法乱纪的总结报告（节录）","type":"title"},{"text":"公安局由于批审不严，错捕，错扣，错押等案件不少。三期镇反中把不应扣的当成一贯道典传师批准扣了3名，黄家坝放毒案将不应扣的扣了5人。 麻栗乡把地主，富农，反属都关起来，施用戴花帽，烫荷麻草， 并限制了受管者的生产。 ……巴洞菜油每年实产7斤, 税务局定为8斤，形成有的农民说：“明年不种菜子了。”农民杀猪，不问路远近，要背到税务局过秤。 纸烟由专卖公司上了一道营业税，税务局又按8%征了临商税，多征税约50多万元。 缝纫业的工商税应以5.5%计征, 而税局又按3.5%再计征。更有金西圣同志坐在，办公室内估计物价上报造成国家税源上的损失。 该征未征， 不该征的又征了。… 每次评税后, 总有一些商人申请歇业。 人民银行吴传恕同志乱砍树木，侵犯农民利益，去年在乐曜贷款的李开兴同志强迫命令收贷款，罚农民站板凳，公安局主要是刑讯逼供。 … 在禁烟肃毒中年领导上交待政策不明确, 李德益同志对存烟户打过5人，捆过1人。… 税务局设立的人民信箱钥匙掉过两次，箱内还装满甘蔗皮；县委会根本不了解52年人民来信有若干？公安局在53年 4，5两月接到人民来信20件才处理了2件。(pp. 86-7) ……","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5106244d4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
