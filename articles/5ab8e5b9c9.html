art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在革命大批判中活学活用毛泽东思想大破资产阶级思想，大立无产阶级思想，有力地促进了思想革命化","authors":[],"parts":[{"type":"paragraph","text":"在革命大批判中，支农人员发现，有些已经解决了的问题，过一段时间又“回潮”了，经过调查分析，一个重要原因是没有把斗私和批修紧密结合起来，用毛泽东思想肃清人们头脑里的“刘毒”，因此立得不牢固。针对这个问题，他们和革委会一起，组织贫下中农反复学习毛主席关于“要斗私，批修”、“世界观的转变是一个根本的转变”等伟大教导，和林副主席关于“我们要把自己当作革命的一份力量，同时又要不断地把自己当作革命的对象”等重要指示，引导大家以毛泽东思想为武器，狠批修，猛斗私，在改造世界观上狠下功夫。从此，广大贫下中农都自觉地把斗私和批修结合起来，做到每批判一次修正主义谬论，就用毛泽东思想狠斗一次私心。社员武占献，以前大队叫他放羊，他把羊赶到山里，自己去拾柴拾草。在批判叛徒刘少奇“公私溶化论”等修正主义黑货时，这位老贫农对照毛主席的光辉著作“老三篇”，从两条路线斗争的高度，狠斗了头脑中的资产阶级“私”字。打那以后，他更加自觉地活学活用毛主席著作，经常斗私批修，继续革命的觉悟不断提高，除了为队里放好羊以外，还积极参加集体生产劳动。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ab8e5b9c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
