学院","罗维城"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"谁有结社自由？","type":"title"},{"text":"四川师范学院罗维城","type":"authors"},{"text":"[文为川师学生罗维城(团员)写的大字报]","type":"subtitle"},{"text":"一些事实证明，宪法上的结社自由只不过是纸上谈兵、光耀门庭的空头口号。我院所谓的“非法组织”男人协会不正是一个淋漓的讽刺么？同学们要自己成立鸣放委员会，为什么党委不同意？全国有名的女歌手张权为了提高业务，邀约几人组织排演“王贵与李香香”，以达到练习的目的，却被指为“非法组织”，为什么？结社自由的影子在那里？","type":"appellation"},{"text":"谈自由思想","type":"subtitle"},{"text":"伟大的法国现实主义大师，巴尔扎克说过：“拿破伦，能够用剑杀死，而拿破伦思想，用剑不一定能杀死。”因此思想改造是自觉的，而从前关心青年修养的好心先生们，却忘记了这个真理，在各种运动中对青年施加“压力”，进行“教育”，“无穷的忧虑”，“数不清的清规戒律”，使青年人改变了个性，或成为唯唯诺诺的木偶，被人玩弄，被人摆弄，被人摆布。我们坚决要自由思想。","type":"appellation"},{"text":"出版自由不自由？","type":"subtitle"},{"text":"出版自由不自由？","type":"paragraph"},{"text":"审查员有自己的好味口。","type":"paragraph"},{"text":"他嗅嗅、嗜嗜、摇摇头，","type":"paragraph"},{"text":"“不许出版！书倒不坏，","type":"paragraph"},{"text":"可是作者思想太落后。”","type":"paragraph"},{"text":"出版自由不自由？","type":"paragraph"},{"text":"审查员有自己的好味口。","type":"paragraph"},{"text":"他嗅嗅，嗜嗜，摇摇头，","type":"paragraph"},{"text":"“不许印行！书中悲哀字眼太多，","type":"paragraph"},{"text":"小资产气味太浓厚。”","type":"paragraph"},{"text":"出版自由不自由？","type":"paragraph"},{"text":"审查员有自己的好味口。","type":"paragraph"},{"text":"他嗅嗅、嗜嗜、摇摇头，","type":"paragraph"},{"text":"“不出版，这是资本主义国家的作品，","type":"paragraph"},{"text":"它只会给人以毒素。”","type":"paragraph"},{"text":"谁说自由不自由？","type":"paragraph"},{"text":"宪法明文订得有。","type":"paragraph"},{"text":"可是你怎能干涉？","type":"paragraph"},{"text":"审查机关味口有自由。","type":"paragraph"},{"text":"人民“代表”","type":"subtitle"},{"text":"人民“代表”真正好，","type":"paragraph"},{"text":"选来选去我认不到。","type":"paragraph"},{"text":"民主虽然好，","type":"paragraph"},{"text":"集中更重要，","type":"paragraph"},{"text":"党委提名作介绍，","type":"paragraph"},{"text":"投票，投票选上了。","type":"paragraph"},{"text":"人民代表真正好，","type":"paragraph"},{"text":"选来选去我认不倒。(认不倒：方言，认不得)","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选集》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f0b829f32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
