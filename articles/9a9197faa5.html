script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"潮阳县五·七干校党委领导成员和学员认真学习理论不断提高觉悟  自觉限制资产阶级法权　坚持办好五·七干校","authors":[],"dates":[{"year":1975,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"潮阳县五·七干校党委领导成员和学员认真学习理论不断提高觉悟"},{"type":"paragraph","text":"自觉限制资产阶级法权　坚持办好五·七干校"},{"type":"paragraph","text":"新华社广州一九七五年五月五日电　广东省潮阳县五·七干校党委领导成员和学员认真学习毛主席关于理论问题的重要指示，决心积极为限制资产阶级法权而斗争，进一步办好五·七干校。"},{"type":"paragraph","text":"潮阳县五·七干校是一九六九年创办的，目前已经轮训了二千二百多名县、社干部。这些干部来到干校以后，一面努力攻读马列和毛主席的著作，批判资产阶级，批判修正主义，一面积极参加生产劳动。他们在海滩上开荒造田六百多亩，生产粮食四百八十多万斤，建起校舍和厂房四千六百多平方米。经过在五·七干校的锻炼，这些干部提高了无产阶级专政下继续革命的觉悟，他们回到工作岗位以后，继续保持干校的艰苦奋斗的作风，密切联系群众，工作认真负责，受到了群众的欢迎。"},{"type":"paragraph","text":"干校党委成员和学员们联系五·七干校发展的斗争历程，认真学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的部分论述，进一步认识到广大干部坚持走五·七道路，对于反修防修，巩固无产阶级专政，有着重要的意义。干校党委副书记张万荣说，在社会主义时期，无产阶级和资产阶级之间在意识形态方面的阶级斗争是长期的。林彪竭力维护和扩大资产阶级法权，恶毒攻击干部走五·七道路，其罪恶目的是妄图复辟资本主义。我们必须学好无产阶级专政的理论，弄清为了实现共产主义应该坚持什么，反对什么，自觉地抵制资产阶级思想的侵蚀，做限制资产阶级法权、逐步缩小三大差别的促进派，把五·七干校办成为巩固无产阶级专政服务的有力工具。大家在学习中说，我们是普通劳动者，是人民的勤务员，切不可脱离劳动，脱离群众。我们一定要保持和发扬我们党的光荣革命传统，同群众同甘共苦，永远保持劳动人民本色，当好人民的勤务员。"},{"type":"paragraph","text":"很多学员在学习时，回顾自己参加革命工作的经历和思想的变化过程，深深感到认真学习无产阶级专政理论，坚持参加集体生产劳动，自觉改造世界观的重要性。学员翁文卿谈到她在战争年代帮助群众砍柴割草，挑水做饭，生活虽然艰苦，但革命斗志很旺盛。到五·七干校后，她负责养猪工作，开始她怕脏怕累。她联系自己思想的变化，深刻感到如果不注意改造世界观，就会抵制不了资产阶级思想的侵蚀。现在她不怕脏，不怕苦，自觉锻炼自己，决心搞好学习，用劳动的汗水冲刷掉思想上的灰尘。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a9197faa5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
