s":[{"year":1951,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京卅日电】　“五一”劳动节前夕，全国各地的工人、农民及其他各阶层人民纷纷电毛主席致敬。浙江省吴兴县邮电工人在给毛主席的致敬电中说:“在这伟大的五一节日，我们一致表示以实际行动在您的光辉旗帜下，保证完成生产任务、协助政府肃清反革命分子、坚决抗美援朝、反对美帝武装日本，为伟大祖国的幸福、富强而奋斗。”西安协合制鞋厂全体职工在贺电中说:‘我们要以无比的热情来从事新中国的一切建设，并配合政府各种政策坚决用实际行动来推行抗美援朝运动，搞好自己的工作，支援人民志愿军，打败美帝野心狼。’福建省公路运输工会、福州陶瓷工会、福州百货工会、神州民天食品工厂、浙江硖食中丝三厂职工、济南华庆面粉厂工会等，也都在贺电中表示决心展开爱国生产竞赛，为抗美援朝建设新中国而努力。"},{"type":"paragraph","text":"浙江省德清县瓜山乡、洛舍乡及鄞县龙山乡的全体农民也都分别电毛主席致敬。瓜山乡农民的贺电说:“我乡土改顺利完成。今日好光景都是毛主席领导的结果。我们决心治水除虫，保证丰收，实现爱国公约，以此来抗美援朝，增强保卫世界和平的力量，和迎接五一劳动节。”龙山乡农民在贺电中表示决心以一切力量支援抗美援朝前线，并保证今年增产三成。"},{"type":"paragraph","text":"此外，中国教育工会福建省分会筹委会、福州医务工会筹委会、福州市汽车同业公会、福州工商联第六联合办事处、浙江鄞县古林镇工商联筹委会、浙江省德清县新市镇第一、二、三街居民委员会、鼓浪屿怀德幼稚园师生、福建青年会等也都电毛主席致敬。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ba64dde62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
