命令主义、反对违法乱纪的指示给华东局的批复","authors":[],"dates":[{"year":1953,"month":2,"day":3}],"is_range_date":false,"parts":[{"text":"中共中央关于贯彻反对官僚主义、反对命令主义、反对违法乱纪的指示给华东局的批复","type":"title"},{"text":"华东局并各中央局、分局并转各省（市）委：","type":"appellation"},{"text":"中央基本上同意华东局1月29日关于贯彻《中央关于反对官僚主义、反对命令主义、反对违法乱纪的指示》的指示及1月31日复山东分局电，反对官僚主义是一个长期的、经常的斗争，不能像“三反”一样，采取短期的突击。在做法上，必须遵照中央上次指示，结合整党、全国普选及其他工作，从处理人民来信入手，有重点地、自上而下地进行检查，与自下而上地展开批评，揭发坏人、坏事，抓住典型事件，大张旗鼓地处理。既要坚决地惩处品质恶劣与人民为敌的分子，肃清国民党作风，又应耐心地教育那些可以改正错误的人，普遍提高干部的思想政治水平。更要注意加强领导任务，改进领导方法。你们“从上到下、从内到外逐步展开”的提法，界限不够明确，可能为下面干部误解为再来一次全面铺开的大规模运动。望考虑。","type":"paragraph"},{"text":" 中央2月3日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e37ebe1d35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
