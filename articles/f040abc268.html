tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想空前大普及是最大最大的大好形势","authors":["第二炮兵直属机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。形势大好的重要标志，是人民群众充分发动起来了。从来的群众运动都没有象这次发动得这么广泛，这么深入。”通过认真学习和讨论，大家一致认为，毛主席的最新指示对当前无产阶级文化大革命形势作了最科学、最精辟的分析。这一伟大指示非常适时，非常重要，非常正确。我们一定要认真学习，坚决贯彻执行。"},{"type":"paragraph","text":"用毛泽东思想观察形势，用毛泽东思想统一群众对形势的认识，是部队进行形势教育的根本。广大指战员回顾过去的战斗历程，深深体会到：每当革命的紧要关头，在阶级斗争尖锐复杂的关键时刻，我们伟大领袖毛主席总是站在时代的最前头，最英明、最及时、最正确地作出伟大的战略部署，给我们拨开迷雾，指明方向，引导我们从胜利走向胜利。"},{"type":"paragraph","text":"毛主席最关心群众，最了解群众的心声，和群众心连心。毛主席的话一句顶一万句，句句说到我们的心坎上。只有牢牢掌握毛泽东思想这个政治上的望远镜和显微镜，才能心明不迷路，认清光明前途，眼亮看得深，分清现象和本质。"},{"type":"paragraph","text":"大家还联系个人的切身经历和感受，大讲特讲无产阶级文化大革命空前大好的形势。不少同志过去和家里通信大都是谈家常，现在全是谈论国家大事，有时还在信上开展辩论。文化大革命运动确实深入到了每家每户，各个角落。从来的群众运动都没有象这次运动发动得这样广泛和深入。现在，亿万群众都卷入了两条路线的斗争，毛主席的革命路线真正在群众中深深地扎了根。经过无产阶级文化大革命，毛泽东思想得到了大传播，大普及，这是最大最大的大好形势。在全国人民中大树特树伟大统帅毛主席和伟大的毛泽东思想的绝对权威，以“斗私，批修”为纲，促进思想革命化，这是我们社会主义江山千秋万代永不变色的最可靠的保证。我们一定要更加努力地学习和领会毛主席的最新指示，紧跟毛主席的伟大战略部署，夺取文化大革命的彻底胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f040abc268"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
