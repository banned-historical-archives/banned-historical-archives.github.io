script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b310162f-3f09-4798-b6f5-94cfbf9a0269","name":"陈毅副总理的讲话","internal":false,"type":"img","official":false,"author":"陈毅","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/b310162f-3f09-4798-b6f5-94cfbf9a0269/1.jpg"],"article":{"title":"陈毅副总理的讲话","alias":"","parts":[{"type":"paragraph","text":"陈毅副总理的耕话亲爱的红卫兵同志们："},{"type":"paragraph","text":"我完全同意周总理刷才提的讲话，愿和大家一起坚决执行。我今天和大家一样来开会，来听总理的报告，我为他的报告是活学活用毛主席指示的典范，对我来，我要加紧研究，其彻到自已的工作中去。同志们要我做国际形势报告，文化草命在世界的影响，因为时间很短，回去等开会，我向同志们提个要求，我们今年准备接待二千大百多外宾，爱国同胞一千多人，共四千多人，希红卫兵参加接待，外办，外交部向你们提出要求，一道把接待工作做好。总理已经耕了，国内国外间题我们也搞了个十条，待中央批准，发给大家，希大家按十条做。今年外宾多，为什么？当然要看毛主席，看中国的社会主义建设，最主要看我们的文化大革命，全体红卫兵同志要联合起来，联合群众，联合机关做好接待工作，使文化草命给他们一个很好的影响我们争取他们，使他们做文化革命的义务宜傅员·文化草命是毛主店领导下，中国人民最掌握理的表现。我们要照顾对方风俗习惯·最近日本自由民主党文化代表团到四中、二中、部队参观了，他们非常赞赏红卫兵的热情招待。他们提出很多问题、红卫兵答得不错，他们才是正掌握了毛泽东思想，给他们念了语录。他们内部透露，我们都是大资本家，在红卫兵眼里是牛鬼蛇神。不管他们是什么人，我们还是以礼相待，他们是我们请来的，不请不来，有很多人到中国来是好事，如果不来了倒是一个失败，我们要搞世界草命，这次接待也是对我们的锻炼，看我们是不是正掌握毛泽东思想。"},{"type":"paragraph","text":"一北航东方红红卫兵整理"}],"authors":["陈毅"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89c5f54f10"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
