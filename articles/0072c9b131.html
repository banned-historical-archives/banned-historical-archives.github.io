<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海第一医学院赴江西医教队贯彻毛主席“六·二六”指示教医又教药　函授又建厂","authors":[],"dates":[{"year":1976,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席的“六·二六”光辉指示指引下，上海第一医学院赴江西上饶、井冈山地区的一支医疗预防函授教育队，针对当地农村缺医少药情况，向函授学员教医又教药，帮助他们就地取材，建立小型中草药厂，为当地培养制药人材，解决少药问题，深受贫下中农和知识青年的欢迎。"},{"type":"paragraph","text":"去年九月至今年五月，这个医教队的三名药学系教师，先后为鄱阳、婺源、峡江等县知识青年、赤脚医生举办了四期中草药制剂短训班，培养了近百名制药人员。在批邓、反击右倾翻案风斗争的推动下，今年四月初，他们还为婺源县王村、金竹两个知识青年队各办了一个小型中草药厂。经过培训的学员已初步掌握了制作半边莲眼药水、黄连素眼药水、山腊梅冲剂等十六种常见病、多发病急用中草药品的技术。"},{"type":"paragraph","text":"江西是个多山地区，草药丛生。但在文化大革命前，山乡缺医少药情况很严重。文化大革命以来，许多地方办起了卫生所和合作医疗站，卫生面貌有了很大改善，但在一些边缘山村药物短缺的情况仍很突出。去年上半年，他们在鄱阳县候岗公社举办函授短训班时，当地正流行红眼睛病。由于少药，患者得不到及时治疗。贫下中农迫切要求改变少药现状。函授教师感到，函授教育不能只管教，不管贫下中农病痛。只有使农村既有医又有药，才能真正改变农村的卫生落后面貌。当时，药学系教师马上就冒雨同当地老药农上山采千里光，准备制眼药水，为贫下中农治眼病，但找了两天没有找到，却发现到处长着半边莲。他们根据半边莲具有清凉解热性能，采了一些半边莲制成眼药水，进行试验，效果很好。于是，他们就制了四千CC，带到生产队去巡回医疗，受到了贫下中农欢迎。"},{"type":"paragraph","text":"去年下半年，他们在当地党组织的领导和支持下，又组成了一个制药教学小组，遵照毛主席关于“中国医药学是一个伟大的宝库，应当努力发掘，加以提高”的教导，在婺源县为上海知识青年和部分当地赤脚医生办了中草药制剂短训班。他们带领学员结合巡回医教，翻山越岭跑了十六个公社、一个垦殖场，调查防止农村常见病、多发病的急需药物。他们同学员一起，因地制宜，因陋就简，土法上马，办起了制药厂。制药厂房要求无菌，无灰尘，他们就在农村普通房子里用育苗的塑料薄膜罩起来作厂房；缺少器材，他们就利用锅、桶、罐、瓶和脸盆制作了二十四种土设备、仪器。广大函授学员通过理论结合实际的学习，回到自己社、队，都能制药。"},{"type":"paragraph","text":"为了以实际行动批判邓小平，反击右倾翻案风，深入开展教育革命和卫生革命，上海第一医学院党委决定，今年下半年从药学系抽一批教师和学员，到江西上饶、井冈山等地区，在每县的知识青年点举办中草药制剂短训班，帮助他们建立小型药厂，让小药厂在山乡全面开花。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0072c9b131"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
