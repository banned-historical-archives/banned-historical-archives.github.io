hors":["兰州大学","曹觉民","田春如"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——美化资本主义，诬蔑社会主义","type":"title"},{"text":"兰州大学田春如曹觉民","type":"authors"},{"text":"“苏联科学技术不一定高于资本主义国家，有些是吹牛，美国产一亿吨钢，苏联五千万吨不到。美国科学生产发达超过苏联。”（兰州大学  田春如）","type":"paragraph"},{"text":"“资本主义不好，但百年来他培养出不少具有世界声誉的科学家。如伽里略、哥伯尼、居里夫妇、牛顿、达尔文、马克思、爱因斯坦、富兰克林、爱迪生，这些人都是以自己的努力，攀登科学成就的最高峰，因而获得全世界的声誉。苏联建国四十年来，培养出几个具有世界声誉的科学家来？而在文学方面，能与沙士比亚、列甫、巴尔萨克、曹雪芹比美者又有几人？巴甫洛夫、米丘林固然有世界声誉，但他们是帝俄时代的产物，并不是苏联培养出来的。”（兰州大学  曹觉民）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb039fb056"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
