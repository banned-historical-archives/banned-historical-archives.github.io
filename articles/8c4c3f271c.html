script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对腐朽的资产阶级教育制度　抗议反动当局的暴行  意大利各地学生继续举行大示威  一些城市的工人参加示威同学生并肩战斗","authors":[],"dates":[{"year":1968,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对腐朽的资产阶级教育制度　抗议反动当局的暴行"},{"type":"paragraph","text":"意大利各地学生继续举行大示威"},{"type":"paragraph","text":"一些城市的工人参加示威同学生并肩战斗"},{"type":"paragraph","text":"新华社二十四日讯  罗马消息：意大利大、中学校广大学生不顾反动当局的残暴镇压，连日来在意大利许多城市继续举行声势浩大的示威游行，反对腐朽的资产阶级教育制度，并对意大利当局镇压学生运动的暴行表示强烈的抗议。"},{"type":"paragraph","text":"在意大利北部的大工业中心——都灵，学生的斗争在进一步扩大。二十三日，三十七所中学的学生联合举行大罢课，学生们并接连第五天举行了声势浩大的示威游行，愤怒抗议反动当局殴打、逮捕等迫害学生的暴行。一万多名学生组成三公里长的队伍，在都灵市中心举行了十小时的示威，使这个城市的交通完全陷于瘫痪状态。大批大学生和工人参加了示威的行列，支持中学生的正义斗争。工人与学生沿途齐声高呼“权力归于工人阶级”等口号。"},{"type":"paragraph","text":"都灵附近的重要工业中心比埃拉和伊夫里亚的中学生二十三日也举行了罢课和示威游行。"},{"type":"paragraph","text":"在意大利首都罗马，几千名中学生同日也举行了示威游行。他们在游行中表示热烈声援都灵学生的斗争。与此同时，罗马大学的学生对这所大学教育系的占领已坚持了十五天。罗马的一所职业学校最近也被学生占领。"},{"type":"paragraph","text":"在那不勒斯，坚持罢课的两千多名学生二十二日同警察进行了英勇搏斗。有九名学生被无理逮捕。二十三日，他们又举行了示威游行，坚持斗争。"},{"type":"paragraph","text":"在佛罗伦萨，五千名学生和工人二十二日也举行示威游行，谴责反动当局镇压工人和学生运动，声援因举行示威而被审讯的学生和工人。"},{"type":"paragraph","text":"在意大利中部的佩斯卡拉和意大利南部的塔兰托，二十二日也有上万的学生举行示威。此外，彼萨、巴马、拉万纳、佛利、乌尔比诺等城市也爆发了学生的示威。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c4c3f271c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
