script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"海南岛驻军某团党委成员站在运动前列  带头学习理论带头批判修正主义","authors":[],"dates":[{"year":1976,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"海南岛驻军某团党委成员站在运动前列"},{"type":"paragraph","text":"带头学习理论带头批判修正主义"},{"type":"paragraph","text":"据新华社海口一九七六年三月二十五日电　在反击右倾翻案风的斗争中，人民解放军海南岛驻军某团党委成员，带头学习无产阶级专政理论，带头批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，用实际行动捍卫无产阶级文化大革命的胜利成果，促进部队各项工作蓬蓬勃勃地向前发展。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展以来，这个团党委一直把学习无产阶级专政的理论摆在首位。他们反复学习毛主席关于“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目”的教导，批判党内那个不肯改悔的走资派妄图篡改党的基本路线，取消阶级斗争，复辟资本主义所散布的奇谈怪论。他们还把文化大革命以来毛主席的一系列指示，以及中央报刊上的重要文章结合起来学习，提高对这场斗争的性质、目的和意义的认识。党委书记、团政委刘惠承带头学，带头批。党委副书记、团长张才延带领工作组到连队亲自抓试点，培训理论骨干。在家的十名常委人人动手写批判稿，在批判大会上带头发言。"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，团党委成员还注意深入基层，抓点带面，及时总结推广先进经验。他们发动群众，先后总结出三连用毛主席哲学思想批判“三项指示为纲”的修正主义纲领，七连用六年来执行生产任务的经验教训批判唯生产力论，指导员王惠停在反击右倾翻案风中既当指挥员、又当战斗员，新战士曾令兴联系切身经历批判教育界的奇谈怪论等经验。这些经验在全团推广以后，既推动了革命大批判的深入开展，又促进了部队的战备训练和其他各项工作。"},{"type":"paragraph","text":"反击右倾翻案风的斗争，激发了广大指战员的政治热情。今年，全团退伍老战士向全师退伍老战士发出倡议书，坚决同资产阶级法权思想和旧的传统观念决裂，退伍后不回城市下农村，做缩小三大差别的促进派，以实际行动回击右倾翻案风。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee2cd21ed9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
