织的指示","authors":[],"dates":[{"year":1950,"month":6,"day":7}],"is_range_date":false,"parts":[{"text":"中共中央西南局关于建立与发展群众组织的指示","type":"title"},{"text":"在城乡各种工作推行中，各地均无例外的证明只要我们事事依靠群众、遇事和群众商量，坚决贯彻群众路线，不仅任务易于完成，而且政策能以确实贯彻。在各种工作的推行中，各地亦无例外的证明工农基本群众和革命的青年知识分子对于党的政策是竭诚拥护的，只要党的政策和他们真正见面，他们的积极性就会充分表现出来。在将近半年的艰苦工作中，各地已都涌现了一部份积极分子，如何进一步的加以组织教育，使之成为有组织的力量，以遂行当前各种重大任务，准备减租，是需要各地很好考虑的。现提出以下几点意见，希参考：","type":"paragraph"},{"text":"（一）西南任务繁重，现在一方面公粮、税收、剿匪、生产等任务必需认真完成；另一方面减租运动的准备须很好解决。而我们干部既少，原有党的组织又必需加以整顿，才能形成更富有战斗力的组织，且在一个时期内，还不可能具备大量发展党员的条件，所以必需广泛的组织工会、农会、青年团等群众团体，并依靠这些团体去完成各项任务。","type":"paragraph"},{"text":"（二）中央指出：“为了使工会、农会、青年团成为新区社会改革可以依靠的组织，各级党委必需十分注意加强这些团体的工作”。在农村当前必需十分注意农会的工作，在已建立了农筹会的地方，应即积极准备建立正式的农会，凡尚未建立农筹会的地方，应于本月内一律建立。","type":"paragraph"},{"text":"（三）在各种群众团体的组织中，一方面要防止形式主义与命令主义，一方面要防止关门主义。","type":"paragraph"},{"text":"（四）各种组织的建立与发展，均必需要和当前的工作紧密结合，从各种工作的推行中去组织教育群众，建立组织，发展组织。","type":"paragraph"},{"text":"以上意见希研究，并望将你们群众组织的情况告知我们。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（上）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7444d6a5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
