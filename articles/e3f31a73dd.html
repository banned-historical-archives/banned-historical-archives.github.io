tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"千条万条；毛泽东思想教育是第一条","authors":["学习毛主席著作积极分子/工程兵某部副排长郝正宏"],"parts":[{"type":"paragraph","text":"毛泽东思想是我们革命人民的命根子，没有它，就没有前进的方向。作为排的干部，要想把一个排带好，千条万条，抓紧毛泽东思想教育是第一条。要不然，什么事情也办不好。这就象火车离开轨道不能行驶一样。"},{"type":"paragraph","text":"去年冬天，我们排在被复作业中，担负配料任务。这项工作比较艰巨，稍有疏忽，就不能满足需要，就要影响整个工程的进度。当时，有的同志有依赖思想，要连里派人来帮助。我左说右说，说服不了大家。由于同志们思想上有问题，工作起来劲头不足，任务完成得不够好。后来，我和同志们一道，带着这个问题，学习了毛主席的教导：“马克思主义者看问题，不但要看到部分，而且要看到全体。”“享受让给人家，担子拣重的挑，吃苦在别人前头，享受在别人后头。这样的同志就是好同志。”通过反复学习，认识逐渐提高了，同志们都说，我们为革命挑重担，肩膀虽累，但累得有价值，为世界人民吃苦，苦得有意义。大家发扬了吃大苦耐大劳、连续作战、敢挑重担的精神，精神面貌大大改变，全排人员虽然减少一半，仍然圆满完成了任务。"},{"type":"paragraph","text":"一年来的实践，使我深深体会到，我们干革命，必须有一个统一的思想，这个思想就是毛泽东思想。有了它，我们的集体就象钢筋混凝土那样，异常坚固。有了它，我们才会有统一的意志，统一的行动，什么困难都能克服，什么敌人都能战胜。"},{"type":"paragraph","text":"现在，林彪同志对我军又发出了新的号召。我一定坚决执行林彪同志的指示，用毛泽东思想武装自己的头脑，并且带领我们排的每个战士，真正把毛泽东思想学到手。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3f31a73dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
