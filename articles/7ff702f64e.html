ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对《工农业并举是我国社会主义经济的一个重要规律》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对《工农业并举是我国社会主义经济的"},{"type":"paragraph","text":"一个重要规律》一文的批语"},{"type":"paragraph","text":"（1960年11月11日）退陈伯达同志："},{"type":"paragraph","text":"此文看过，可用。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十一日廿四时"},{"type":"paragraph","text":"[1]指拟在《红旗》1960年第二十二期上发表的《工农业并举是我国社会主义经济的一个重要规律》的社论稿。社论稿说，毛泽东同志提出要把农业放在经济问题中的首要地位，同时又讲过发展工业必须和发展农业同时并举的观点，这是马克思主义者在社会主义建设问题上一个创造性的新概括。优先发展重工业和迅速发展农业，这两件事是互为条件、互相结合、互相促进的。发展工业必须和发展农业同时并举的方针，正是正确地表述了农业需要同工业密切地同时并进这一社会主义经济发展的重要规律。为更好地贯彻执行这一方针，党和国家采取了一系列有力措施，来进一步处理农业发展的两个关键问题：一个是关于农业生产力的问题，主要是在各个经济部门更合理地安排劳动力，使农业生产第一线保持足够的劳动力；一个是关于农村社会主义生产关系的问题，主要是坚持和巩固以生产队为基础的公社三级所有制。这将有可能在较短时间内改变目前农业发展落后于工业发展的状况。为此，我们要积极推行农业技术改造，但在目前只能在局部地方逐步实现农业"},{"type":"paragraph","text":"对《工农业并举是我国社会主义经济的一个重要规律》一文的批语机械化。因此，保证足够的农业劳动力是保证农业发展的头等要素，也是保证工业和其他各项事业发展的头等要素。农村中劳动力的合理安排，最重要的是解决农业和非农业两个方面的安排问题。不能任意地从农业生产方面抽调劳动力。党中央提出在各个经济部门合理安排劳动力，使农业生产第一线能够保持和配备足够劳动力这个方针，是一个掌握经济规律的问题。在社会生产中，劳动力的节约是最大的节约，我们要避免劳动力浪费。妥善地解决劳动力节约和合理分配，就农村来说，这是同坚持和巩固以生产队为基础的公社三级所有制分不开的。三级所有制，是现阶段人民公社最好的根本制度，是有利于发展农业生产的根本制度，必须在一个长时期内稳定下来。1960年11月16日出版的《红旗》杂志第二十二期发表了这个社论。"},{"type":"paragraph","text":"[2]陈伯达，当时任《红旗》杂志总编辑。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":67,"page_end":68},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ff702f64e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
