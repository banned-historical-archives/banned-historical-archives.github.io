tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢送柬国家元首西哈努克亲王西哈努克亲王讲话赞扬新疆各族人民在伟大领袖毛主席英明领导下取得的巨大成就","authors":[],"parts":[{"type":"paragraph","text":"新华社和田二十五日电 新疆维吾尔自治区革命委员会，今晚在和田举行宴会，热烈欢送柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人以及其他柬埔寨贵宾。"},{"type":"paragraph","text":"西哈努克亲王在宴会上说，他这次对新疆的访问，进一步加强了柬中两国人民在共同的反对美帝国主义的斗争中建立起来的牢不可破的战斗友谊。这种友谊所产生的巨大力量，是不可战胜的。"},{"type":"paragraph","text":"西哈努克亲王在讲话中，感谢紧密团结的新疆各族人民给予的热烈而真诚的接待，赞扬新疆各族人民在伟大领袖毛主席的英明领导下所取得的巨大成就。他指出，中国人民的成就，对正在从事抗美救国战争的柬埔寨人民是巨大的鼓舞和支持，有伟大的中国人民强有力的支持，印度支那三国人民一定能打败美国侵略者。"},{"type":"paragraph","text":"人大常委会副委员长、新疆维吾尔自治区革委会副主任赛福鼎，代表新疆八百万各族人民、新疆维吾尔自治区革委会、新疆军区，在晚宴上致词，表示热烈欢送柬埔寨贵宾。"},{"type":"paragraph","text":"西哈努克亲王和夫人以及其他柬埔寨贵宾，今天在新疆维吾尔自治区革委会、新疆军区负责人龙书金、赛福鼎等陪同下，乘专机前往我国西部边疆城市喀什市，进行参观访问后回到和田。"},{"type":"paragraph","text":"西哈努克亲王和夫人以及其他柬埔寨贵宾在到达喀什机场，经过市区，参观农具制造厂和市郊色满人民公社时，受到了维吾尔族、汉族等各族人民的热烈欢迎。喀什市革委会设午宴热情招待柬埔寨贵宾。"},{"type":"paragraph","text":"我国外交部副部长韩念龙、中国驻柬埔寨王国大使康矛召，以及王珍、杨玲同志，今天也陪同西哈努克亲王和夫人到喀什市参观访问，并出席了欢送晚宴。"}],"alias":""},"tags":[{"name":"新疆文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71a042bd88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
