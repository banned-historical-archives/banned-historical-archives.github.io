tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席巧设“空城计”","authors":["澄潭江"],"parts":[{"type":"paragraph","text":"1948年10月，担任国民党华北“剿总”司令的傅作义，准备派兵进犯已经解放了的石家庄。当时，我党中央已迁至离石家庄不远的西柏坡，我军主力部队都在远处作战，石家庄实际上是座空城。面对这一情况，毛主席在指示中央机关做好撤离准备的同时，亲自导演了一幕“空城计”。"},{"type":"paragraph","text":"毛主席的“空城计”一不用老军扫街，二不用城楼抚琴，只挥笔写了一条四百五十字的新闻，揭露敌人企图进攻石家庄的阴谋，说明我军和民兵已严阵以待，随时准备粉碎敌人的进攻。"},{"type":"paragraph","text":"新闻播出后，傅作义大吃一惊，他见自己的意图已经暴露，石家庄军民又做好了充分准备，取胜已无多大希望，只好放弃了进攻的打算。"},{"type":"paragraph","text":"（澄潭江）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"226130b40b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
