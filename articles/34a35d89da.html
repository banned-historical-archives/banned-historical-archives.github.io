art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决拥护党中央两项英明决议","authors":["成都部队某部“爱民模范团”党委"],"parts":[{"type":"paragraph","text":"我们全团干部战士怀着无比激动的心情，热烈欢呼党中央的两项英明决议！党中央的两项英明决议，表达了我们革命战士的心愿，代表了无产阶级和广大劳动人民的根本利益，是对国内外阶级敌人的沉重打击。邓小平是资产阶级的总代表。天安门广场发生的反革命政治事件，更加暴露了他是一小撮阶级敌人的总后台，是刮右倾翻案风的总根子。撤销邓小平党内外一切职务，真是大快人心，我们一千个拥护，一万个赞成！"},{"type":"paragraph","text":"学习党中央的两个英明决议，回顾党内两条路线斗争的历史，使我们深深懂得，在我国革命的每一个关键时刻，总是我们伟大领袖毛主席高瞻远瞩，洞察一切，为革命指明航向，排除艰难险阻，引导革命不断从胜利走向新的胜利。今天，在两个阶级、两条道路、两条路线的激烈搏斗中，又是伟大领袖毛主席作出了英明决策。我们纵情高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"我军是毛主席亲自缔造、领导和指挥的人民军队，是无产阶级专政的柱石。我们保证：一切行动听毛主席指挥，坚决执行毛主席革命路线。我们一定认认真真学习毛主席的重要指示，以阶级斗争为纲，牢牢掌握斗争大方向，把矛头对准不肯改悔的走资派邓小平，批判、声讨邓小平颠覆无产阶级专政、复辟资本主义的罪行，提高警惕，加强战备，密切注视阶级斗争的新动向，以实际行动保卫毛主席，保卫以毛主席为首的党中央，保卫毛主席的无产阶级革命路线，把反击右倾翻案风的斗争进行到底！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34a35d89da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
