" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-529","name":"八年沉冤 今日昭雪","author":"人民司法","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"八年沉冤 今日昭雪","dates":[{"year":1978}],"is_range_date":false,"authors":["人民司法"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"西南政法学院刑法教研室, 冤假错案选编, 96-97","tags":[{"name":"安徽","type":"主题/事件"},{"name":"案件","type":"主题/事件"},{"name":"强奸","type":"主题/事件"},{"name":"刑事","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中文"},{"type":"title","text":"八年沉冤 今日昭雪"},{"type":"paragraph","text":"周继贵，男，四十三岁，汉族，安徽省人，家庭出身贫农，原是铁道部四局六处工人。一九七〇年六月二十五日，以“持枪强奸罗玉淑”的罪名，在安徽被判处有期徒刑五年。投入云南省沾益农场劳动改造。为此，他的六十六岁的老母亲气病而死，妻子离婚改嫁，两个孩子随娘，弄得家破人亡。"},{"type":"paragraph","text":"周投入劳改后，一直向法院和原单位中诉，要求查清事实，惩办诬陷者。"},{"type":"paragraph","text":"沾益县法院收到申诉后，于一九七四年，派人携卷到铁道部四局六处，在该处保卫科的配合下，深入群众调查硏究，发现认定的案情矛盾很大，原案确有诬陷和伪造的情节，群众中议论很大。由于“四人帮”的帮派干扰，一直得不到正确解决。一九七七年二月法院又派人到铁道部四局六处，在中共安徽省委驻六处联络组领导同志的重视下，深入群众调查研究，坚持对罗玉淑做过细的政治思想教育，使罗终于讲清了全案的过程。其真实情况是：一九六八年，刘世淦和罗玉淑乱搞男女关系，被揭发后，当时周继贵等人负责查清他们的问题。后来，在站队划线中，周被划为所谓“站错队”的，刘世洤利用所谓“站合队”掌保了权力。就对周反咬一口，把他自己与罗玉淑乱搞两性关系、破坏军婚的罪行，强加在周继贵的头上，捏造了周在抓罗去审讯的过程中，持枪强奸罗的假情况。刘世淦还替罗写了一份控告书，由罗抄写后报给六处党委。此后，以周破坏军婚为名，对他施行非刑吊打，吊残了双手，打得死去活来。在这种法西斯毒刑拷打下，周被迫承认了持枪强奸罗玉淑。为了陷害得逞，刘世淦等人还把所谓“知情人员”也抓来用非刑吊打，逼着人家写所谓的旁证材料。这样就以持枪强奸的罪名定案，判处周继贵有期徒刑五年。"},{"type":"paragraph","text":"事实查清以后，云南省沾益县人民法院于一九七七年六月六日给周继贵平了反，恢复名誉，原单位给他恢复了工作，补发了工资。对于参与陷害周继贵的罗玉淑，因态度较好，免予刑事处分。对制造假案，陷害好人的主谋者刘世淦，已经由当地政法机关逮捕判刑。"},{"type":"paragraph","text":"选自《人民司法》一九七八年第一期"}],"alias":""},"tags":[{"name":"安徽文革","type":"人物"},{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bbc0c1c83"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
