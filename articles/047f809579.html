ates":[{"year":1959,"month":8,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　第16期解放杂志今日出版。这期解放杂志根据当前形势刊登了“克服右倾情绪，乘胜前进”“落实与干劲”两篇评论以及李家齐的“要善于总结经验”，石西民的“为了学术的发展”(全文见第三版)等重要文章。"},{"type":"paragraph","text":"在“克服右倾情绪，乘胜前进”的评论中指出:无论就全国说，或者全市说，1959年是继续大跃进的伟大的一年。现时是8月。1959年坯剩下4个多月。当前如何抓紧时机，彻底克服右倾思想，继续鼓足干劲，掀起轰轰烈烈的增产节约群众运动的新高潮，沿着党的总路线所指引的道路，乘胜前进，是我们的严重任务。评论指出:当广大干部和群众鼓足干劲力争上游，兴高彩烈向前跃进的同时，也必须看到在一小部分干部中，开始抬头和滋长起来的右倾思想和松劲情绪。因而克服各种右倾松劲的思想情绪就成为我们实现继续跃进的关键。接着评论对右倾思想和松劲情绪作了分析和批判，对如何进一步充分发动群众，全面掀起增产节约群众运动新高潮也作了阐明。"},{"type":"paragraph","text":"评论“落实与干劲”是从诚孚铁工厂大搞群众运动的经验谈起的。评论指出:我们所说的计划、措施的落实，是把计划、措施建立在先进而可靠的基础上，它是经过认真努力完全可能实现的。只有革命干劲和科学分析相结合，才能使计划、措施落实。而计划、措施落实，又不只是依靠少数干部，而应该依靠广大群众。只有把广大群众发动和组织起来，才能正确地、充分地估量主客观条件，才能把革命干劲极大地调动起来，做到普遍落实。评论还指出，为了不断地鼓干劲，不断地使计划、措施落实，就要全面地抓，抓紧抓深抓细。这样才能使增产节约运动轰轰烈烈而又踏踏实实地开展起来。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"047f809579"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
