<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工科大学要把学习毛主席著作放在首位　清华大学电机系电七二班同学要求改革工科学制","authors":[],"dates":[{"year":1966,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工科大学要把学习毛主席著作放在首位"},{"type":"paragraph","text":"清华大学电机系电七二班同学要求改革工科学制"},{"type":"paragraph","text":"中国人民大学七位同学给您的信，说出了我们要求坚决、彻底、迅速地砸烂旧教育制度的心愿。我们完全赞成他们的观点。另外，根据我们工科大学的特点，补充几点意见。"},{"type":"paragraph","text":"敬爱的党中央，敬爱的毛主席：我们认为中国人民大学七位同学列举文科大学的十条罪状，在工科大学同样存在。我们清华大学要念六年才能毕业，加上六年小学、六年中学，长达十八年。十八年寒窗，耽误了我们为党工作的大好青春。我们已经读了五年大学，但是到底学到了些什么本领呢？美其名曰电机系五年级学生，可是我们现在连一台电动机坏了也不会修理。在攻尖端、搞理论的幌子下，使我们的学习严重地脱离实际。我们再也不能容忍这种罪恶的学制及教育制度来继续毒害我们了，要坚决打倒它，彻底与旧的教育思想、旧的教育制度决裂。因此我们建议："},{"type":"paragraph","text":"一、所有的工科大学，完全实行半工半读的教育制度。学制应该根据毛主席的指示和国家的需要改为二年、三年、四年，并且每年拿出一定的时间参加社会上的阶级斗争和军事训练等。"},{"type":"paragraph","text":"二、工科大学也必须以阶级斗争为主课，把学习毛主席著作放在首位，各门功课都要以毛主席思想为指导。"},{"type":"paragraph","text":"三、这次文化大革命一结束，尽可能让我们提前毕业，分配到三大革命运动中去，长期地、无条件地与工农兵相结合，尤其要求立即参加到阶级斗争的第一线，参加城乡的社会主义教育运动。"},{"type":"paragraph","text":"四、今后工科大学的教学应以生产实践为主，向实践学习，向工人学习，教师适当辅导。"},{"type":"paragraph","text":"五、现在的教师必须到三大革命运动中去锻炼，彻底地改造思想。今后工科大学的教师应该同时是生产者、是工人。"},{"type":"paragraph","text":"六、彻底废除现行的研究生制度。今后要在三大革命运动中选拔优秀人物继续深造。"},{"type":"paragraph","text":"七、今后工科大学应选拔在三大革命运动中经过锻炼，政治思想进步，具有一定文化水平的青年入学，不一定非高中毕业不可，保证广大工人、贫下中农和复员军人中的优秀分子能够入学。"},{"type":"paragraph","text":"敬爱的党中央，敬爱的毛主席：我们要永远牢牢地记住您的教导，到群众运动中去，到革命的大风大浪中去锻炼成长，把自己造就成无产阶级革命事业的接班人。无产阶级的革命事业要我们这一代继往开来，我们一定要把毛泽东思想接过来，传下去，坚决革命，永远革命。我们要念念不忘阶级斗争，念念不忘无产阶级专政，念念不忘突出政治，念念不忘高举毛泽东思想伟大红旗，为中国革命和世界革命贡献我们的一切！"},{"type":"paragraph","text":"祝我们最最敬爱的领袖和导师毛主席万寿无疆！"},{"type":"paragraph","text":"清华大学电机系电七二班全体同学敬上"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dab42200d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
