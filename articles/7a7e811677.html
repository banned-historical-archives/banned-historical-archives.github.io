<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市仪表工业局党委召开科技工作会议狠批“四人帮”　科技要大上","authors":[],"dates":[{"year":1977,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了进一步贯彻落实华主席提出的抓纲治国的战略决策，尽快地把科技工作搞上去，加速实现四个现代化，上海市仪表工业局党委最近召开了全局科技工作会议。参加会议的有局、公司和各基层单位的领导干部、技术部门负责人、工人和工程技术人员代表一千五百多人。会议期间，代表们揭发、控诉、批判了“四人帮”及其余党在科技战线上的反革命罪行，交流了搞好科技工作的经验，讨论了局党委关于加强局系统科技工作的意见和到一九八○年本系统科学技术发展的设想，许多同志表示了大干快上搞好科技工作的决心。会议开得热气腾腾，大家决心在华主席提出的抓纲治国战略决策指引下，革命加拼命，跑步学大庆，努力攀登科学技术高峰，赶超世界先进水平，为把我国电子、仪表、医疗器械工业搞上去，贡献自己的全部力量。"},{"type":"paragraph","text":"会上，大家首先联系本系统的实际，揭发、控诉、批判了“四人帮”破坏科技工作的滔天罪行。局科技组的同志、上海元件五厂工人工程师陈锡章、上无二厂副总工程师严昀、微型轴承厂技术科负责人等专题揭发批判了“四人帮”及其余党破坏科技工作的罪行。大家在讨论中，还联系“四人帮”及其余党在仪表工业系统散布的种种反动谬论，加以批判。过去，“四人帮”及其余党在仪表工业系统以批判“一人一管制”为名，破坏党的知识分子政策，把技术人员统统靠边，下放劳动，弄得许多工厂技术无人负责，产品一度无人设计，图纸无人签名，工艺无人制订，操作没有规程，使技术领域极为混乱。粉碎“四人帮”，科技人员得解放，华主席带领我们抓纲治国，我们一定要狠批“四人帮”，大干快上，把科技工作搞上去。"},{"type":"paragraph","text":"会议期间，大家热烈讨论，互相勉励，决心大干一场，为普及大庆式企业作出贡献。许多工程技术人员在会上表示了决心。上海电讯器材厂工程师陈万复说:“今年我五十八岁了，能赶上这场在本世纪内把我国建设成为社会主义的现代化强国的伟大战斗，感到无比幸福。我要最大限度地把精力集中到自己的本职工作上来，为早日实现四个现代化的宏伟目标贡献一份力量。”上海电表厂副总工程师吴履梯说:为了改变我国仪表工业的落后面貌，我不怕人瘦头发白，要为把我国建设成一个社会主义的现代化强国作出应有的贡献。上海无线电十四厂革委会常委、技术员张松鹤说:从今年起，着手研究两种新型结构的半导体器件，决心象大庆人那样走出一条自己的路，总结出自己的一套理论，用我们自己的工艺，多快好省地生产大规模集成电路，为赶超世界先进水平而努力奋斗。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a7e811677"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
