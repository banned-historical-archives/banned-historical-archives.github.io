art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深揭“四人帮”反革命的真面目","authors":[],"parts":[{"type":"paragraph","text":"本报讯 济南部队空军通信团有线连党支部，引导干部战士以毛主席提出的三项基本原则为武器，在批判“四人帮”的斗争中，列罪状，剥画皮，深刻揭露“四人帮”反革命的修正主义路线的极右实质。"},{"type":"paragraph","text":"在批判中，党支部为了帮助大家认清“四人帮”修正主义路线的极右实质，组织大家认真学习毛主席提出的“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的三项基本原则，大家一边学习，一边摆“四人帮”的罪行，清楚地看到，“四人帮”的罪行集中到一点，就是背叛三项基本原则，搞修正主义，搞分裂，搞阴谋诡计，妄图篡党夺权，复辟资本主义。他们推行的是一条地地道道的反革命的修正主义路线。伟大领袖毛主席生前多次用三项基本原则批判“四人帮”，正是对他们这条修正主义路线的极右实质尖锐而深刻的揭露。"},{"type":"paragraph","text":"在揭露批判中，许多同志还把“四人帮”的口号、言论同他们的实际行动联系起来，把他们公开搞的一套同暗地里搞的一套联系起来，剥画皮，批实质。同志们说：“四人帮”自称是毛主席的“学生”、“战友”，实际上他们篡改毛主席的指示，采取种种卑鄙手段迫害毛主席；他们标榜自己是“正确路线的代表”，实际上他们在国际国内一系列问题上疯狂反对毛主席的无产阶级革命路线和政策；他们口头上高喊限制资产阶级法权，实际上他们挥金如土，大肆追求腐朽糜烂的资产阶级生活方式；他们把自己打扮成文化大革命的“功臣”，实际上他们是疯狂反对和破坏文化大革命的罪魁祸首。他们是一伙妄图篡夺党和国家最高领导权的阴谋家和野心家。大家通过剥伪装，撕画皮，更加认清了“四人帮”反革命的真面目。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ee0e768d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
