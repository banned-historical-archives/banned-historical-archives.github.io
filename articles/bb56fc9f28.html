ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"朝鲜停战后铁道兵须以大部修路一部进行技术训练","alias":"","parts":[{"type":"paragraph","text":"朝鲜停战后铁道兵须以大部修路"},{"type":"paragraph","text":"一部进行技术训练!"},{"type":"paragraph","text":"（1953年4月5日）"},{"type":"paragraph","text":"朝战停后，十一个师，须以大部修路，一部（骨干）可属参谋部管，进行技术训练，以备战时与主力合并，以应作战需要。恩来意见请注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月五日"},{"type":"paragraph","text":"[1]这是毛泽东在人民革命军事委员会副主席彭德怀1953年3月30日关于铁道兵部队建制问题给毛泽东、朱德、周恩来的报告上写的批语。彭的报告说，关于铁道兵部队直属军委归参谋部管，不属铁道部建制的建议，待朝鲜战争结束可予同意。平时人数少，保存骨干进行技术训练，以备战时按需要扩大。"},{"type":"paragraph","text":"[2]1953年4月3日周恩来在彭德怀的报告上批的意见是：“现在铁道兵团共有十一个师，建制属铁道部，但供给托后勤代管。即使朝战停止，铁道部队在国内修路仍有极大作用，特别是内蒙、西北、东北修路更需要他们，因此，此事似应从长计议。”"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":4,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":119,"page_end":119},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb56fc9f28"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
