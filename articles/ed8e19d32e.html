uthors":[],"dates":[{"year":1951,"month":5,"day":2}],"is_range_date":false,"parts":[{"text":"中央关于停止退租问题的意见","type":"title"},{"text":"中南局、华南分局并转各省委，并告西南局、西北局：","type":"appellation"},{"text":"关于退租问题，前已通知停止执行。关于退租问题，据中南方面反映有许多地主已无存粮，一时退不出。亦望你们注意。我们认为现在亦可通知各地暂时停止退租，凡地主确实无粮、老租未退或退不够数的，可由地主打借条保障在今年秋季收租时照退。并承认去年没有依法减租的错误。如此将退租运动暂告一段落，以便集中大部去进行春耕和准备土改。而不要长期坚持限于僵局，结果发生分配地主大量浮财及逼死人等混乱现象。据不少反映是已开始在一些地方发生了的。如不暂时将退租告一结束，这种混乱现象是必然要继续发展的。望你们即根据具体情况适时地在各地采用这样一个步骤为要。","type":"paragraph"},{"text":" 中央五月二日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed8e19d32e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
