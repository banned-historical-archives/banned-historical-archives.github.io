rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"久拉诺维奇主席致电华国锋总理表示祝贺","authors":[],"parts":[{"type":"paragraph","text":"新华社三月八日讯 南斯拉夫社会主义联邦共和国联邦执行委员会主席久拉诺维奇三月七日打电报给华国锋同志，衷心地祝贺他担任国务院总理。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国国务院总理华国锋同志："},{"type":"paragraph","text":"在你当选为中华人民共和国国务院总理的时候，我十分愉快地代表南斯拉夫社会主义联邦共和国联邦执行委员会，并以我个人的名义，向你表示衷心的祝贺和最良好的祝愿，祝你在履行你为友好的中国人民造福的重要职责中取得新的成就。我借此机会表示，我对南中两国友好合作关系的不断发展感到满意，我们两国政府间的接触正在为此作出特殊的贡献。"},{"type":"paragraph","text":"我相信，有益于我们两国和国际平等关系的成功的全面合作今后将继续发展。"},{"type":"paragraph","text":"南斯拉夫社会主义联邦共和国联邦执行委员会主席 韦塞林·久拉诺维奇"},{"type":"paragraph","text":"一九七八年三月七日于贝尔格莱德"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ae3c300c3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
