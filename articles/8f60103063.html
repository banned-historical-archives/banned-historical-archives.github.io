ar":1961,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金日成同志观看上海越剧团演出"},{"type":"paragraph","text":"新华社平壤18日电　金日成、崔庸健、金一、朴金喆等朝鲜党政领导人和出席朝鲜劳动党第四次代表大会的代表，以及参加朝鲜劳动党第四次代表大会的以科兹洛夫为首的苏共代表团和以邓小平为首的中共代表团，今晚在牡丹峰剧场观看了正在朝鲜进行访问演出的中国上海越剧团演出的中国大型古典剧《红楼梦》。"},{"type":"paragraph","text":"当金日成、崔庸健、金一、朴金喆和科兹洛夫、邓小平等出现在剧场时，全场响起了热烈的掌声。"},{"type":"paragraph","text":"演出受到了热烈的欢迎。演出结束后，金日成、崔庸健、金一走上舞台，同全体团员亲切地握手。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f60103063"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
