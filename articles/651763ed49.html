script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周荣鑫在北京钢铁学院第一次教育革命汇报会上的讲话","authors":["周荣鑫"],"dates":[{"year":1975,"month":8,"day":9}],"is_range_date":false,"parts":[{"text":"周荣鑫在北京钢铁学院第一次教育革命汇报会上的讲话","type":"title"},{"text":"周荣鑫","type":"authors"},{"text":"元帅升帐，你们的任务很重，钢铁工业搞好，主要靠广大钢铁工人，但钢铁学院也得起作用。你们的工作搞得不错，要解决的问题只提了一个教师问题，还有什么问题，再找时间谈一次。","type":"paragraph"},{"text":"你们到太钢的经验要好好总结一下，在斗争中学习毛主席三条指示，理解得一定会更深刻，更好地领会毛主席抓革命，促生产，促工作，促战备方针的正确。去包钢的经验也要总结，如何在斗争中进行政治思想工作。上半年教育革命中的二百项技术革新的经验要总结一下，如何搞三结合，如何实行鞍钢宪法。师生下工厂不单是战高温、劳动锻炼，要总结工人实践经验，提高到理论上来，再指导实践，还是要按毛主席的认识论，实践理论实践来办事。","type":"paragraph"},{"text":"教育革命，培养学生，一轮三年，搞出成果不容易，不象钢铁生产，一搞就上去了。教育革命总的方向、道路，毛主席给我们指明了，但具体作法上还要靠我们认真实践经验，如教材改革，教学机构体制改革等。教研组取消后，同样专业的教师如何研究、交流、提高？有些问题破了这一头，还得照顾那一头，对旧的东西要批判地继承，去其糟粕，取其精华。教师总有个提高问题，政治上要提高，业务上也要提高，不提高不适应。教师提高重点要向工人学习，向学员学习，但教师之间也有个互相交流问题，怎样搞得合理、正确，提高得快，要研究，但也不要恢复老一套。冶金方面化学问题很多，化学老师如何组织起来互相交流提高，不能搞单干户。参加三大革命，实践经验很丰富，如何吸收？不能搞很多单干户，还是集体所有制，全民所有制，但也不要恢复老一套。目的是达到提高，在新的形势下提高教师的政治、业务水平。政治和业务关系要搞好。毛主席说：“政治和经济的统一，政治和技术的统一，这是毫无疑义的，年年如此，永远如此。”教师既要提高政治，又要提高业务，业务提高要无产阶级政治挂帅，不能单纯业务观点。","type":"paragraph"},{"text":"学校的编制问题要研究一下，多少合适，每班五个教师行不行？分散办学看来不能太分散了，太分散教师需要量多。短训班各条战线要求很迫切，要有计划地办，也得有个安排，敞开口不行，要恰如其分，恰到好处。编制人员增加一点是必要的，但不能增加太多，无限制增加编制不行，不可能增得太多。","type":"paragraph"},{"text":"中学教师问题也很严重，初步调查几个学校，病号占百分之十五到十七。下去学农，二、三位教师带几百学生，来回跑很辛苦。根据教育革命形势，中学教师编制得增加一些，但不能太多，太多国家受不了。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周荣鑫","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"651763ed49"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
