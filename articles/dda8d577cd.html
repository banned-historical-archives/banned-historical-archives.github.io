thors":["任冰如","编"],"dates":[{"year":1956,"month":11,"day":8}],"is_range_date":false,"parts":[{"text":"波匈事件后长春有些学生思想混乱","type":"title"},{"text":"任冰如编","type":"authors"},{"text":"新华社长春８日讯　波匈事件引起了这里一些学生思想混乱并暴露出一些不满情绪。","type":"paragraph"},{"text":"据长春市公安局和东北师范大学等单位反映，有很多干部和学生听“美国之音”、“自由之声”和“联合国之音”的广播。师大有的学生因宿舍问题不满。有的技术学校学生因粮食不够吃，吃地瓜有意见，他们说：“怎么能饿着肚子上课呢？”","type":"paragraph"},{"text":"地质学院有一个班的学生对政治课老师说：“工资改革对高级知识分子和干部有好处，特别对高级知识分子有好处，但对农民生活关心不够，农民的生活还是苦的，现在工资改革后低工资的工人还有意见，是否对派工资工人照顾不够？”还有的说：“我国税收很重，是否合适？”有一个学生说：“过去汪院长工资最高，坐小汽车，工作不深入，官僚主义很严重，他的工资应捐给国家。”（任冰如编）","type":"paragraph"},{"text":"来源：１９５６年１１月９日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dda8d577cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
