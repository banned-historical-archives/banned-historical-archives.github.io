art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"宋庆龄感谢授予她国家名誉主席荣誉称号邓小平同志看望宋庆龄同志，祝贺她加入中国共产党 中共中央 人大常委会 国务院发表关于宋庆龄名誉主席病情第三号公告","authors":[],"parts":[{"type":"paragraph","text":"新华社5月17日讯 国家名誉主席宋庆龄今天早上七时，在病榻上听了中央人民广播电台关于全国人大常委会授予她中华人民共和国名誉主席荣誉称号的消息后，高兴地对守候在身边的同志们说：“听清楚了，谢谢同志们。”今天白天她的病情继续恶化。"},{"type":"paragraph","text":"16日上午，邓小平同志看望了宋庆龄同志，祝贺她加入中国共产党，实现了她的宿愿。她望着邓小平同志，微笑着，点点头。邓小平同志希望她安心养病。下午，全国人大常委会第十八次会议刚结束，彭真、廖承志同志就驱车前往宋庆龄的住宅，把人大常委会授予她荣誉称号的决定告诉她，并表示祝贺。他们还探问了宋庆龄名誉主席的病情。"},{"type":"paragraph","text":"新华社5月17日讯 中共中央 全国人大常委会 国务院"},{"type":"paragraph","text":"关于宋庆龄名誉主席病情的公告"},{"type":"paragraph","text":"（第三号）"},{"type":"paragraph","text":"宋庆龄名誉主席所患慢性淋巴性白血病及并发的败血症继续恶化。17日体温均在摄氏三十九度以上。血白细胞计数为十八万六千六百，淋巴细胞占98％。血压有下降趋势。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bed8f09c6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
