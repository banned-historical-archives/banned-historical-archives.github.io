year":1954,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十二日电】　我中央人民政府毛泽东主席致电罗马尼亚人民共和国国民议会主席团主席格罗查，祝贺罗马尼亚解放十周年。电文如下:"},{"type":"paragraph","text":"罗马尼亚人民共和国国民议会主席团主席"},{"type":"paragraph","text":"格罗查同志:"},{"type":"paragraph","text":"值此罗马尼亚解放十周年之际，我代表中华人民共和国政府和人民并以我个人名义向罗马尼亚人民和您致以衷心的祝贺。"},{"type":"paragraph","text":"十年来，罗马尼亚人民在罗马尼亚工人党的领导下，在巩固人民民主政权和建设社会主义方面已获得辉煌的成就。这些成就使罗马尼亚人民获得日益繁荣幸福的生活，并加强了以苏联为首的世界和平民主力量中国人民谨祝罗马尼亚人民在建设社会主义和维护世界和平的事业中获得更大的成就。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年八月二十一日北京"},{"type":"paragraph","text":"【新华社北京二十二日电】　我中央人民政府政务院总理兼外交部部长周恩来致电罗马尼亚人民共和国部长会议主席乔治乌——德治和外交部部长西米昂·布吉奇，祝贺罗马尼亚解放十周年。电文如下:"},{"type":"paragraph","text":"罗马尼亚人民共和国部长会议主席"},{"type":"paragraph","text":"乔治乌——德治同志:"},{"type":"paragraph","text":"罗马尼亚人民共和国外交部部长"},{"type":"paragraph","text":"西米昂·布吉奇同志:"},{"type":"paragraph","text":"值此罗马尼亚解放十周年之际，请接受我对罗马尼亚人民共和国政府和人民的热烈祝贺。祝罗马尼亚人民在社会主义的建设事业中获得更多的成就。并祝中罗两国牢不可破的友谊在共同争取国际紧张局势的进一步缓和和保卫世界和平的事业中更加发展和巩固。"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"一九五四年八月二十一日北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68c66a5eb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
