script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"普遍的重视  高度的评价","authors":["本报记者"],"dates":[{"year":1979,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"普遍的重视  高度的评价"},{"type":"paragraph","text":"本报记者综合报道"},{"type":"paragraph","text":"据合众国际社华盛顿二月七日电，美国总统卡特在六日晚上招待泰国总理江萨的国宴上祝酒时，再一次高度评价了邓小平副总理对美国的正式友好访问。他说，“我认为邓小平的访问是我担任总统以来最突出的活动之一，它对整个亚洲的稳定与和平将有深远的影响。”"},{"type":"paragraph","text":"美国和其他许多国家报纸纷纷发表评论，认为邓副总理访美是成功的，其影响是深远的。"},{"type":"paragraph","text":"美国《纽约时报》二月四日刊登的评论文章，以《邓先生的胜利》为题，指出邓副总理这次美国之行的重要成就和意义。"},{"type":"paragraph","text":"评论说，邓副总理这次在美国“很自然地成了一个风靡一时的新闻人物。”"},{"type":"paragraph","text":"评论认为，邓副总理“在台湾问题上表示的态度和正在形成的中美关系总的方面使议员们感到宽慰。”在双边问题上，“美国和中国似乎成功地按照一个事先准备好的计划行事，很容易地拟定并且签署了科学、技术、文化和领事协定。”"},{"type":"paragraph","text":"评论指出，“如果说过高估计正常化在短期内带来的好处是错误的，那么过低估计从长远来看可能带来的好处也是很容易犯的错误。”"},{"type":"paragraph","text":"评论最后谈到中美关系的远景时说，“好象卡特总统希望的那样，有一种日益成为正常现象的伙伴关系，这种伙伴关系讲求实际的程度超过感情色彩，对双方都非常有好处，因而能满足总统对这种关系也是‘不可逆转’所抱的希望，而不需要新的反复。”"},{"type":"paragraph","text":"英国《金融时报》六日发表一篇题为《邓先生的成功》的社论说，“中国副总理邓小平先生的美国之行差不多正象美国与中国当局可能希望的那样圆满地结束了”，"},{"type":"paragraph","text":"“普遍认为他的言论行动无懈可击。就这次访问打算作为一次与公众接触的活动来说，那是达到目的了。”"},{"type":"paragraph","text":"社论着重指出，莫斯科对中美关系正常化的长期影响感到忧虑，特别是邓副总理提出各国联合起来对付苏联霸权主义的呼吁，使“俄国人坐卧不安”。"},{"type":"paragraph","text":"冰岛《晨报》二月三日在《中国与美国》的一篇文章中说：“美中两国关系正常化有助于互利的贸易和改变世界的格局。”"},{"type":"paragraph","text":"文章说：“对于西方国家担心中国强大后将在军事上和经济上给西方国家造成威胁的问题，布热津斯基回答得最好，他认为同中国改善关系符合美国长远的战略利益。他认为中国变成一个强大的技术发达的国家很重要，它将有助于中国所在的地区和整个世界的稳定。”"},{"type":"paragraph","text":"马来西亚《星洲日报》五日发表题为《中美关系迈进一步》的社论说，邓副总理刚刚结束的对美国的访问，“不仅促进了两国关系，而且将对国际局势产生重大的影响。”"},{"type":"paragraph","text":"社论认为，“邓小平访美，不仅对中国有利，对美国也有利，符合两国人民的利益，甚至全世界人民的利益。”"},{"type":"paragraph","text":"马来西亚《南洋商报》二月三日也发表了题为《更增进的中美双边关系》的社评，认为“邓氏所展开的务实外交，所发挥出来的说服力及魅力，和卡特总统良好重点掌握中美新关系的历史性开端，对双方和整个世界具有重要的意义，并值得格外的珍视。”"},{"type":"paragraph","text":"社评指出，“邓氏此行将达到世界转变和使国际势力结构发生重大变化，而且会对亚太地区和整个世界的和平与稳定作出有意义的贡献”，“这不仅在双方领袖的公开言谈中，而且也从邓氏受到破格的热诚接待和进行的无拘束的交换意见中反映了出来；而意外发表的联合公报和公报的内容则是其具体的表现和见证。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10bfa3c9c5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
