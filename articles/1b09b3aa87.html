rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"尽快完成工作重心的战略转移马天水、王秀珍、陈阿大等一批“四人帮”余党已被逮捕法办","authors":[],"parts":[{"type":"paragraph","text":"据新华社上海一月三日电 一九七九年新年前夕，中共上海市委召开全市党员、干部会议，宣布上海市揭批“四人帮”的群众运动取得了伟大胜利。市委要求各级党组织要善始善终地结束好揭批“四人帮”的群众运动，抓紧在较短的时间内顺利地完成工作重心的战略转移，把大家的智慧和力量集中到社会主义现代化建设上来。"},{"type":"paragraph","text":"上海市委第三书记彭冲在会上讲话时强调指出：文化大革命前的十七年，上海市委的工作成绩很大，毛主席的革命路线一直在上海占主导地位。文化大革命初期，林彪、“四人帮”及其一小撮余党就紧紧勾结在一起，篡夺了上海市党政大权，干了大量坏事，造成了极其严重的恶果。这股反革命逆流，是他们搞乱全国，进行全面篡党夺权的一个严重步骤。"},{"type":"paragraph","text":"经过两年多的紧张工作，“四人帮”及其在上海的余党已被粉碎，同林彪、“四人帮”篡党夺权阴谋活动有牵连的人和事已经查清。一度篡夺了上海市党政领导权的“四人帮”余党、打砸抢首恶分子、现行反革命分子马天水、王秀珍、陈阿大、叶昌明、黄金海、戴立清、马振龙、王承龙、潘国平、胡永年已被依法逮捕。"},{"type":"paragraph","text":"去年以来，上海全市各系统分期分批，发动群众，对清查工作进行了检查验收。林彪、“四人帮”制造的一大批冤案、错案、假案得到了纠正、平反和昭雪。文化大革命中审干遗留的问题，绝大部分已经复查结案。公司以上各级领导班子和大多数基层单位的领导班子先后进行了调整和充实。全市各条战线生气勃勃。一九七八年上海市工业、农业、基本建设、财政贸易都超额完成了国家计划。工业总产值比前年增长百分之十二以上。郊区农业生产获得了全面丰收。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"王秀珍","type":"人物"},{"name":"马天水","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b09b3aa87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
