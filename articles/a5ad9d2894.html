"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们现在正面临着一个大联合、大夺权的大好形势。"},{"type":"paragraph","text":"但是，目前革命队伍中泛滥着浓厚的无政府主义、极端民主化，严重影响了左派队伍的大联合。"},{"type":"paragraph","text":"马列主义、毛泽东思想告诉我们:联合为了夺权，夺权必须联合。"},{"type":"paragraph","text":"有些人，借反对“运动群众”为名，来反对一切领导。他们说:“你管不着，我有我的自由!”当我们提出对于错误的主张要坚决抵制时，他们什么主张也不听了；当我们要打碎资产阶级保皇党的纪律时，他们什么纪律都不要了。这些资产阶级、小资产阶级的无政府主义和极端民主化，在学生中特别严重。"},{"type":"paragraph","text":"毛主席说:“要指出极端民主化的危险，在于损伤以至完全破坏党的组织，削弱以至完全毁灭党的战斗力，使党担负不起斗争的责任，由此造成革命的失败。”无政府主义和极端民主化把革命队伍风化成一盘散沙，使无产阶级革命派联合不起来。造成无政府主义和极端民主化的根源:一方面是小资产阶级的经济地位决定，一方面是对极其严重、残酷的阶级斗争认识不足。知识分子的这种错误倾向，只有在尖锐的阶级斗争中，只有在与工农群众相结合的过程中才能克服。"},{"type":"paragraph","text":"(摘自清华大学《井冈山》报第十三、十四期)"}],"comments":[],"origin":"《井冈山》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5ad9d2894"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
