杨亚军","王瑟","程小敏","西北农学院","陈光祖"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于整风运动的右派言论","type":"title"},{"text":"西北农学院杨亚军程小敏陈光祖王瑟","type":"authors"},{"text":"1．“哼！肃反整死，现在整到他们(指党团员)头上了，就要和风细雨。”他诬蔑和歪曲党的整风运动，写道：“没有受过组织的教育。因此对组织的方针不明，对他们的手法也是不明，因而一些‘聪明’的人谈出了许多话，可是那些受过组织教育的人，他们连一言都不发的，我现在才知道，他们抱的态度就是，让自由的放，自由的鸣，然后来一次整，这种手法是我从还次运动(反右)中才得到的……。”(水58级学生 杨亚军)","type":"paragraph"},{"text":"2．“党的整风运动是一阵风，过去之后，还不是这样，来一次整风会把我的头整落。”(农60级学生 程小敏)","type":"paragraph"},{"text":"3．他在大鸣大放时期说：“我专看缺点，不看成绩和优点，专寻找缺点和错误。”(水58级学生 陈光祖)","type":"paragraph"},{"text":"4．“整风是和风细雨，就是狂风暴雨也消不了人的恨。”(农60级学生 王瑟)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7d22e4ed2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
