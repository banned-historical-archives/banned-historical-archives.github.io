art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"尼泊尔国王和毛主席互致贺电","authors":[],"parts":[{"type":"paragraph","text":"尼泊尔国王来电"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"阁下："},{"type":"paragraph","text":"值此我们两国政府签订协定的愉快的时际，我以我个人的名义，并代表我的政府和人民向阁下、您的政府和人民致热烈的祝贺。我希望并且相信今天建立的这种新的关系将开创我们两国人民的幸福和繁荣的新纪元。"},{"type":"paragraph","text":"尼泊尔王国国王陛下"},{"type":"paragraph","text":"马亨德拉"},{"type":"paragraph","text":"1956年9月23日"},{"type":"paragraph","text":"毛泽东主席复电"},{"type":"paragraph","text":"加德满都"},{"type":"paragraph","text":"陛下："},{"type":"paragraph","text":"值此中尼协定签订之际，承致祝贺，我谨代表中华人民共和国和中国人民，并且以我个人的名义向陛下、尼泊尔王国政府和人民表示衷心的感谢。祝中尼两国人民的传统友谊，在这一根据和平共处五项原则签订的协定的基础上日益巩固和发展。祝国王陛下健康。"},{"type":"paragraph","text":"中华人民共和国主席 毛泽东"},{"type":"paragraph","text":"1956年9月25日（据新华社讯）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21a4028d1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
