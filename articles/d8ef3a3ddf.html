题给中南局的批复","authors":[],"dates":[{"year":1950,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"中共中央关于土改后秋田收获物分配问题给中南局的批复","type":"title"},{"text":"中南局：","type":"appellation"},{"text":"辰艳电悉。关于秋田收获物分配问题，我们认为：","type":"paragraph"},{"text":"（一）应确实执行谁种谁收的规定，不分青苗，土地分配后一般应仍由原耕者继续经营，加工施肥，而于收割后，由原耕者以收获物之三成给新分地户，作为使用土地之报酬。","type":"paragraph"},{"text":"（二）如土地分配给新分地户后，原耕者不愿或无力继续经营时，则由农会会同原耕者和新分地户共同商定，由新分地户经营，并视原耕者由耕犁下种直到分地时所有的经营耗费之多寡，商定于秋收后分给原耕者以收获物之三成到四成作为报酬。","type":"paragraph"},{"text":" 中  央巳  养","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8ef3a3ddf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
