<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批转华东局关于切实注意纠正农村工作中一些不良现象的通知","authors":[],"dates":[{"year":1966,"month":1,"day":18}],"is_range_date":false,"parts":[{"text":"中共中央批转华东局关于切实注意纠正农村工作中一些不良现象的通知","type":"title"},{"text":"各中央局，各省、市、自治区党委，中央各部委，国家机关和人民团体各党委、党组：","type":"appellation"},{"text":"现在将华东局《关于切实注意纠正农村工作中一些不良现象的通知》转发给你们参考。","type":"paragraph"},{"text":"去冬以来，类似华东农村工作中这些不良现象，其他地区也不时有所发生。现在，各中央局和省委已经注意，并且采取了积极的措施，进行纠正。但是，也有些县社没有引起足够的重视，因此，希望各地还要切实注意，对这些不良现象，一经发现，应该及时纠正，并且要切实安排人民生活，防止春荒。","type":"paragraph"},{"text":" 中  央一九六六年一月十八日","type":"paragraph"},{"text":" （发至县级党委）","type":"paragraph"},{"text":"华东局关于切实注意纠正农村工作中一些不良现象的通知","type":"subtitle"},{"text":"山东、安徽、江苏、浙江、江西、福建省委，上海市委，各地、县委，并报中央：","type":"appellation"},{"text":"现将华东局办公厅整理的一个材料转发给你们参考。这个材料所反映的问题，都是中央、华东局六五年以来一再强调要迅速加以纠正的，但是到目前为止，这方面的问题还不断发生。这就不能不引起我们的严重注意。","type":"paragraph"},{"text":"应当看到，当前华东地区的农村形势，和全国一样，是一派大好形势，农业生产在连续三年增产的基础上，六五年又获得了大丰收，广大群众和干部的集体生产积极性空前高涨。在这种情况下，我们应该鼓励广大干部和群众的革命干劲，勇往直前，畏难情绪和无所作为的思想是十分有害的。但是我们又必须保持清醒的头脑，坚决按照党的政策办事，防止和克服自满情绪和急躁情绪；必须十分注意遇事同群众商量，切忌主观片面和强迫命令；必须进一步发扬艰苦奋斗、自力更生的精神，严禁铺张浪费，坚决压缩非生产性开支。这样，才能够保护广大农民群众的积极性，保证农业生产高潮持续不断地、健康地向前发展。","type":"paragraph"},{"text":"为了切实纠正当前农村工作中的一些不良现象，特作如下通知：","type":"paragraph"},{"text":"（一）各级党委特别是县委和人民公社党委，必须认真重新学习中央的有关指示和华东局的通报，对当前农村工作中出现的违反六十条以及强迫命令、瞎指挥、铺张浪费等现象，认真检查，采取有力措施，迅速加以纠正。无论是社教运动的点或面上，都应当把这件事情作为一项重要的检查教育内容，抓紧抓好。在检查时，对具体问题要作具体分析，查明原因，多数问题可能是由于领导上的官僚主义造成的。这就需要首先从领导上加以检查纠正，不要单纯责怪下面。","type":"paragraph"},{"text":"（二）各级党委在今后要把这件事情当做党的一项经常工作来抓。在布置工作任务时，要反复交代政策，交代方法。在检查工作时，不仅要检查任务的完成情况，还要着重检查政策的执行情况，把执行政策作为衡量工作好坏的重要标准。对基层干部在工作中遇到的一些实际问题，要具体帮助解决。如果发现违背政策的错误，以及其他不良现象，要及时加以纠正。各级领导干部还要以身作则，坚持勤俭节约，以自己的模范行动教育干部。","type":"paragraph"},{"text":"（三）各级党委必须组织干部坚持不懈地学习毛主席著作，以毛泽东思想作为一切工作的指针。并且认真地学习党在农村中的各项方针政策，不断地总结实际工作中的经验教训，借以不断提高他们的思想水平和政策水平，力求从根本上防止这些不良现象的发生。","type":"paragraph"},{"text":" 华东局一九六五年十二月三十一日","type":"paragraph"}],"comments":[],"origin":"根据文件原件翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"914ddb7f1a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
