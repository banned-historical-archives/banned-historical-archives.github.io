es":[{"year":1949,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北平市人民政府成立"},{"type":"paragraph","text":"叶剑英徐冰正副市长就职视事"},{"type":"paragraph","text":"【新华社平郊十七日电】北平市人民民主政府已于一月一日在平郊成立。市长叶剑英、副市长徐冰于就职之日，顷发布郊字第一号布告如下：奉华北人民政府令：“北平四郊已告收复，城内亦将解放。为巩固郊区治安，保障人民生命财产之安全，并发动与组织各界人民协助人民解放军迅速粉碎蒋傅匪帮的反动统治，建设新民主主义的新北平，着即成立北平市人民政府，任命叶剑英为市长，徐冰为副市长，随令颁发“北平市人民政府”宋字印信一颗。”剑英等即日就职启印视事。当根据中国人民解放军平津前线司令部颁布之约法八章，为本市人民服务，为早日完全解放北平而奋斗。特此布告周知。"},{"type":"paragraph","text":"市长叶剑英"},{"type":"paragraph","text":"副市长徐冰"},{"type":"paragraph","text":"中华民国三十八年一月一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8ea1a1570"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
