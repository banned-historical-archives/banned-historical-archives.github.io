<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"阿坝藏区继续发生叛乱","authors":["于竞祁"],"dates":[{"year":1956,"month":6,"day":21}],"is_range_date":false,"parts":[{"text":"阿坝藏区继续发生叛乱","type":"title"},{"text":"于竞祁","type":"authors"},{"text":"新华社成都21日讯：四川省阿坝藏族自治州农业区土改后期，于5月中旬在绰斯甲地区发生叛乱，4月份草地上若尔盖的不少部落又发生叛乱，我军已前往镇压。但最近一个多月中，由于草地叛乱影响和敌方派人到处煽动，在已土改的农业区的藏族聚居区黑水、马尔康两县及松潘、茂县部分地区也相继发生叛乱。阿坝及所属的麦洼地区、壤塘地区（半农半牧区），敌人也在待机而动。","type":"paragraph"},{"text":"目前形势是：绰斯甲、若尔盖两县叛乱已基本平息。若尔盖地区在我军到达后共打死、打伤、俘获敌人二千多人，许多匪首、反动上层在我军到达后都纷纷投降，绰斯甲地区的叛乱在这以前就已平息。但在黑水、马尔康等县，叛乱正在蔓延。黑水县十五个乡只有个别几个乡未发生叛乱；马尔康十六个乡中在6月初就有五个乡发生叛乱。阿坝及所属麦洼、壤塘形势很紧张。松潘小黑水、毛儿盖等地的叛乱比黑水、马尔康等地发生更早。","type":"paragraph"},{"text":"现在，全州十三个县中只有六个靠汉区的杂居县没有发生问题。","type":"appellation"},{"text":"目前，自治州的工作中心是全力平息和防止叛乱。在未叛乱的工作基础稳固的六县，中心工作首先是支前，其次领导生产。现在这些县支前民工和参战民兵已有一万三千多人，农村中主要劳动力大部都已出动支前。","type":"paragraph"},{"text":"农业区（已土改区）的叛乱，主要是草地上的敌人派人勾结当地反动上层、地主、富农，胁迫群众参加。叛乱中敌人的策略主要如下：","type":"paragraph"},{"text":"（一）大肆造谣——如“现在全国从西藏开始，凡是藏族地区都反对人民政府”；“人民政府和人民解放军在外面都已被消灭了”“北京、刷经寺都已被打平了”等等。","type":"paragraph"},{"text":"（二）以民族利益为号召，目前已叛乱地区很少有地主倒算的情况，并且他们每打下一处据点就抢粮食、贸易公司，然后把东西分给群众，表示：我们都是少数民族，打到了人民政府过好日子。","type":"paragraph"},{"text":"（三）对不参加叛乱的，他们就以武力威胁，特别是对已加入人民兵的人更以杀其家属来威胁，因此发现每逢叛乱一发生，民兵就大部投降或向我表示回家不干，坚决回去。","type":"appellation"},{"text":"据反映，许多农民知道人民政府好，但是谣言之下弄得半信半疑，加上武力威胁，又不敢不参加叛乱。分抢到的东西时也有的地方群众不敢要，怕人民政府的干部回去，有的收下准备将来退还。","type":"paragraph"},{"text":"据地委宣传部长李兰珍同志谈，造成这一情况的原因是：长期的民族隔阂，文化知识的闭塞，地主、上层的历史影响，和群众组织程度形成的力量还不够稳定，群众的觉悟程度受到一定限制，容易被地主、富农拉拢。同时，藏族地区的枪支武装，也大部都掌握在中农以上的人手中，贫雇农很少。","type":"paragraph"},{"text":"来源：根据1956年6月21日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","au
