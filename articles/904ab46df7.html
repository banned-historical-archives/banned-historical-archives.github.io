ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"为张浩题揽词","alias":"","parts":[{"type":"paragraph","text":"为张浩题挽词！"},{"type":"paragraph","text":"（1942年3月9日）忠心为国，虽死犹荣。1942年3月9日，中共领导人集体为张浩抬棺送殡。"},{"type":"paragraph","text":"[1]张浩，即林育英，是林彪表兄。1942年3月6日林育英在延安中央医院逝世。次日，《解放日报》在头版发表《中共中央委员张浩同志积劳成疾病逝》的消息。毛泽东为林育英题写挽联：“忠心为国，虽死犹荣。”3月9日，在林育英下葬时，毛泽东、朱德、任弼时、徐特立等亲自把林育英的棺1942年3月9日，毛泽东和朱德、陈云等在延安参加张浩的安葬仪式。1942年3月9日，毛泽东为张浩葬礼执佛。1942年3月9日，毛泽东和陈云、李富春等参加延安各界公祭张浩大会。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":472,"page_end":474},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"904ab46df7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
