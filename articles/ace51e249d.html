r":1973,"month":11,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见惠特拉姆总理"},{"type":"paragraph","text":"毛主席同他进行了一个多小时的友好谈话。双方就广泛的问题交换了意见  澳大利亚驻中国大使费思棻，周恩来总理、王洪文副主席等参加会见"},{"type":"paragraph","text":"新华社一九七三年十一月二日讯　毛泽东主席今天下午在中南海会见澳大利亚总理爱德华·高夫·惠特拉姆，同他进行了一个多小时的友好谈话。双方就广泛的问题交换了意见。"},{"type":"paragraph","text":"会见结束时，惠特拉姆总理说，我们国家的人民将对我们的这次会见感到非常高兴。毛主席对他说，谢谢你，并且请他向他的夫人和其他澳大利亚贵宾转达问候。"},{"type":"paragraph","text":"澳大利亚驻中国大使费思棻参加了这次会见。"},{"type":"paragraph","text":"我方参加会见的有周恩来总理、王洪文副主席、王海容部长助理和唐闻生、沈若芸。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"左：毛泽东主席同爱德华·高夫·惠特拉姆总理进行友好谈话。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"上：毛泽东主席会见惠特拉姆总理时情形。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ace51e249d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
