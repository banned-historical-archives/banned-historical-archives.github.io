ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"望刘金轩部向汉中方面行动切断胡宗南逃路","alias":"","parts":[{"type":"paragraph","text":"望刘金轩部向汉中方面行动"},{"type":"paragraph","text":"切断胡宗南逃路!"},{"type":"paragraph","text":"（1949年5月8日）中原局，并告彭、张、赵，西北局："},{"type":"paragraph","text":"（一）我第一野战军（三十五万人）六月间开始举行夺取潼关、西安、宝鸡、汉中、天水及陇南地区之战役，希望我陕南刘金轩部沿汉水向汉中方面行动，最好能直取汉中区域，切断胡宗南向川北的逃路。（二）在上述战役期间及战役结束后一个时期内，刘金轩部受彭张赵指挥，请令刘金轩部与彭张赵联络并接受彭张赵命令。（三）在上述战役完毕之后，西安等处之敌已被歼灭或驱逐，陕南、陕北之联系已经打通，陕南区党政军领导关系应予改变为受西北局、西北政府及西北军区的领导，此种改变之时间大约在七月或八月。在歼灭胡宗南的战役中，陕南区应起配合作用。（四）刘金轩部的现状、位置及向汉中进取有何困难条件及顺利条件，请你们迅予查明，电告我们及彭张赵。（五）此电请转发刘金轩及陕南区党委。"},{"type":"paragraph","text":"中央军委"},{"type":"paragraph","text":"辰齐[1]这是毛泽东为中共中央军委起草的给中共中央中原局的电报。[2]刘金轩，当时任陕南军区司令员。/"},{"type":"paragraph","text":"等数化物"},{"type":"paragraph","text":"荣\u0026270"},{"type":"paragraph","text":"Ma-No.11附证义多植，奶"},{"type":"paragraph","text":"第(州万人）.月周需+"},{"type":"paragraph","text":"渡中天水及能"},{"type":"paragraph","text":"膳汁装三体毛泽东致彭德怀、张宗逊、赵寿山等电的手稿(部分)。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":388,"page_end":389},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"606e013e42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
