" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu2","name":"十年文革中首长讲话传信录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"陈毅的八点指示","parts":[{"type":"title","text":"606.陈毅的八点指示"},{"type":"paragraph","text":"(1967年3月17日)"},{"type":"paragraph","text":"1．二外红卫兵到对外文委夺权大方向是正确的。"},{"type":"paragraph","text":"2．按3月13日四单位会议纪要办事，立即成立个临时权力机构，这个机构有权领导文化大革命，并进行业务监督。"},{"type":"paragraph","text":"3．委、司干部暂不参加，待条件成熟时再搞三结合。"},{"type":"paragraph","text":"4．同意两大战斗组织不单独派代表参加临时权力机构。"},{"type":"paragraph","text":"5．临时权力机构成立后，即领导全委战斗组织整风，整风后再搞大联合、三结合，逐步完善、充实，成为真正的三结合的权力机构。"},{"type":"paragraph","text":"6．贵阳经验很好，但要经过长期工作。各战斗组织不要强制解散，到能够实行按部门联合时，再根据自愿原则取消战斗组。"},{"type":"paragraph","text":"7．二外同学可按规定离委，交权不开大会。"},{"type":"paragraph","text":"8．必须照顾大局，有关方面都要履行今晚的协议，在整风前单位不互相攻击。"}],"authors":["陈毅"],"dates":[{"year":1967,"month":3,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":424,"page_end":425,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a78e5c1868"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
