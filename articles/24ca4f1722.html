tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"编者的话纪念毛泽东诞辰110周年军事思想学术研讨会论文摘登","authors":[],"parts":[{"type":"paragraph","text":"在毛泽东同志诞辰110周年之际，肩负着推进中国特色军事变革历史使命的全军将士，缅怀这位伟人，研讨他的军事思想，开辟人民军队的未来。"},{"type":"paragraph","text":"风雷激荡的20世纪匆匆过去，波澜壮阔的21世纪新画卷徐徐展开。世纪更替、社会变迁，新军事变革的浪涛推动着军队转型，战争嬗变。变革，需要思想的利剑；变革，期盼精神的光芒。"},{"type":"paragraph","text":"伟人从来不希望自己的思想凝固，理论一旦失去发展就没有了活力。毛泽东军事思想，是在长期的中国革命战争和国防建设实践中形成和发展起来的。她是一个开放的系统，她在新的实践中不断丰富发展。与毛泽东军事思想一脉相承的邓小平新时期军队建设思想，江泽民国防和军队建设思想，是发展了的毛泽东军事思想。正是在这种代代承袭发展之中，实现了理论的接力，人民军队的旗帜才高高飘扬在时代的前列。"},{"type":"paragraph","text":"承前启后，继往开来。我们要不懈奋斗，以跨越式发展的新步伐，告慰人民军队的缔造者。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24ca4f1722"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
