script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"干部要当普通劳动者","authors":[],"dates":[{"year":1976,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"干部要当普通劳动者"},{"type":"paragraph","text":"越溪大队干部牢记毛主席的教导，坚持参加集体生产劳动，自觉限制资产阶级法权，不断增强反修防修能力"},{"type":"paragraph","text":"据新华社杭州电　在伟大领袖毛主席“五·九”光辉批示的指引下，浙江宁海县越溪公社越溪大队的干部长年不懈地坚持参加集体生产劳动，努力改造世界观，自觉限制资产阶级法权，不断增强反修防修能力，带领群众夺得了一个又一个新胜利。"},{"type":"paragraph","text":"越溪大队，是毛主席一九六三年五月九日批示的《浙江省七个关于干部参加劳动的好材料》这份文件中讲到的单位之一。毛主席在对这份文件所作的光辉批示中指出：“阶级斗争、生产斗争和科学实验，是建设社会主义强大国家的三项伟大革命运动，是使共产党人免除官僚主义、避免修正主义和教条主义，永远立于不败之地的确实保证，是使无产阶级能够和广大劳动群众联合起来，实行民主专政的可靠保证。”十多年来，越溪大队的干部牢记毛主席的这一伟大教导，坚持参加集体生产劳动，力同群众一起出，汗同群众一起流，做到同群众心贴心，同群众拧成一股绳。他们带领群众狠抓阶级斗争这个纲，大批修正主义，大批资本主义，大干社会主义，促进了生产的发展，彻底改变了过去“一年倒塘三年荒，收收只有一箩筐”的落后面貌。在无产阶级文化大革命、批林批孔和学习无产阶级专政理论的群众运动中，他们深入批判了“劳心者治人，劳力者治于人”的反动谬论，加强了对资产阶级法权的限制，平均每人每年劳动二百五十多天，进一步发展了革命和生产的大好形势，全大队粮食平均亩产连年超千斤，一九七五年达到一千三百二十一斤，集体经济不断巩固壮大。"},{"type":"paragraph","text":"反击右倾翻案风的伟大斗争展开以后，越溪大队的干部们通过举办学习班等形式，结合回顾十多年来的战斗历程，重温毛主席的“五·九”批示，认真学习毛主席关于文化大革命和反击右倾翻案风的一系列重要指示，更深刻地认识到，干部坚持参加集体生产劳动，对限制资产阶级法权，缩小三大差别，铲除旧社会遗留下来的“痕迹”，推动社会主义革命和建设，巩固无产阶级专政，具有十分重大的意义。在学习班上，他们以毛主席的光辉批示为武器，愤怒批判党内最大的不肯改悔的走资派邓小平恶毒攻击文化大革命和社会主义新生事物，极力强化和扩大资产阶级法权，妄图复辟资本主义的罪行。他们愤慨地说，邓小平妄想用扩大资产阶级法权作“诱饵”，腐蚀我们干部。如果顺着他这条修正主义路线走，三大差别不但永远也消灭不了，而且会越来越扩大；滋生修正主义的土壤不但不能逐步铲除，相反地会在这块土壤上滋生出越来越多的修正主义的苗子。照这样下去，就会出现“不用枪，不用炮，城楼上面换旗号”的“和平演变”，就会不可避免地出现全国性的反革命复辟，劳动人民又要吃二遍苦，受二茬罪。我们革命干部决不答应！我们一定要同邓小平的修正主义路线对着干，一定要坚持身不离劳动，心不离群众，誓做限制资产阶级法权、缩小三大差别的促进派，把无产阶级专政下的继续革命进行到底。"},{"type":"paragraph","text":"越溪大队干部通过回顾自己的斗争实践，进一步认识到，干部坚持参加集体生产劳动，是改造世界观，反修防修，限制资产阶级法权的重大革命措施；干部要不要限制资产阶级法权，是关系到为谁掌权，代表那个阶级利益的问题，是关系到能否坚持无产阶级专政下继续革命的重要问题。因此，他们坚持参加劳动的自觉性越来越高。毛主席批示的《浙江省七个关于干部参加劳动的好材料》这份文件中提到的“劳动好工作也好”的大队党支部书记应四官，经过无产阶级文化大革命的锻炼，担任了县委书记。五年来，他冲破资产阶级法权的束缚，不计较待遇，坚持参加集体生产劳动，和社员一样参加生产队劳动分配，一直保持着普通劳动者的本色。应四官这样做，得到了广大群众的赞扬。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abff35d815"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
