鸭问题的指示","authors":[],"dates":[{"year":1959,"month":5,"day":7}],"is_range_date":false,"parts":[{"text":"中共中央关于分配私人自留地以利发展猪鸡鹅鸭问题的指示","type":"title"},{"text":"1959.05.07","type":"subtitle"},{"text":"各省、市、自治区党委：","type":"appellation"},{"text":"最近几个月以来，养猪头数大 量减少，这对于积肥、猪肉的供应和私人零用钱的取得这样三件大事，都是非常不利的，要迅速改变这种局面，必须采取公社各级集体养猪和社员家庭私养并重的方针，两条腿走路。鸡、鸭、鹅也是如此。要社员私养猪、鸡、鹅、鸭，就要给社员一定数量的自留地。自留地的多少，应当按照原高级合作社章程的规定，按人口计算，不超过每人平均占有土地的百分之五，也可以按猪计算，每头猪拨给一分或者二分饲料地，由各省、市、自治区党委根据当地的具体情况，自行决定。此事要快，请你们早作决定，下达执行。","type":"paragraph"},{"text":" 中　央一九五九年五月七日","type":"paragraph"}],"comments":[],"origin":"根据中共中央文件刊印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c1647ea3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
