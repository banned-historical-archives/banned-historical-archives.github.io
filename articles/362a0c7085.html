["谢富治"],"dates":[{"year":1957,"month":5,"day":9}],"is_range_date":false,"parts":[{"text":"谢富治谈民族地区整风的重点","type":"title"},{"text":"谢富治","type":"authors"},{"text":"据新华社昆明9日电中共云南省委第一书记、政协云南省委员会主席谢富治，７日在政协云南省一届三次全体会议的一次座谈会上，就正确处理边疆民族地区内部矛盾和共产党的整风问题讲了话。","type":"paragraph"},{"text":"谢富治说，长期以来，云南省在边疆民族问题上存在着三种矛盾，这就是：各民族与帝国主义之间的矛盾；各民族之间、尤其是与汉族之间的矛盾；各民族内部的阶级矛盾。","type":"paragraph"},{"text":"谢富治说：“当前在民族问题上存在的主要矛盾，是各兄弟民族与汉族之间的矛盾。一方面要承认，经过了几年的工作，各民族之间已经取得了空前的团结和进步，现存的民族矛盾并非已经十分严重。另一方面也应当看到，在边疆民族地区工作的一些共产党员和汉族干部的官僚主义、主观主义和宗派主义作风已经发展得相当严重。这些错误反映在民族关系上，就是大汉族主义。因些，反对官僚主义、宗派主义作风，帮助各兄弟民族做到完全由自己当家作主，使民族干部切实做到有职有权有责，是当前的主要问题，也是即将在民族地区展开的整风运动所要解决的主要问题。”","type":"paragraph"},{"text":"谈到整风问题时，谢富治说，整风进行得好坏，不仅是关系到共产党员进步的问题，而且将对各族人民的社会主义建设事业产生很大的影响。因此，在整风运动中就迫切需要来自各族群众、各族干部和各族公众领袖人物的批评和帮助。他一再强调地指出：本着知无不言的精神开诚布公地批评党在各项工作中的缺点，就是对党的整风运动的最大的帮助。","type":"paragraph"},{"text":" ---- 原载1957年5月10日《人民日报》","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"362a0c7085"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
