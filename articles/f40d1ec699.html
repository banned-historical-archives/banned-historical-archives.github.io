ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"参战主力集结休整未使用之部队相机齐灭东明之敌一部","alias":"","parts":[{"type":"paragraph","text":"参战主力集结休整未使用之部队"},{"type":"paragraph","text":"相机歼灭东明之敌一部！"},{"type":"paragraph","text":"（1946年9月7日）刘、邓:"},{"type":"paragraph","text":"（一）鱼亥电悉，甚慰。庆祝你们歼灭第三师的大胜利，望传令全军嘉奖。（二）敌人尚有进攻力量，我军此次参战主力立即集结休整补充，准备再战，申齐起十天内休补完毕。（三）以尚未使用之部队相机歼灭东明方面敌之一部，并相机占领考城，收复东明；以地方部队深入敌后活动，扰击敌人。（四）你们现在兵力配备，人数，枪数，主官姓名，战力强弱，盼告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"申虞午[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":9,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":139,"page_end":139},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f40d1ec699"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
