动员进行了精彩的友谊表演","authors":[],"dates":[{"year":1971,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京八日电　国防部和国家体委今晚在北京工人体育馆举行隆重欢迎仪式，热烈欢迎前来我国进行友好访问的朝鲜人民军男女乒乓球队。首都一万三千多名观众观看了中朝两国运动员的精彩友谊表演。"},{"type":"paragraph","text":"今晚，北京工人体育馆充满中朝两国人民和军队之间的战斗友谊和亲密团结的气氛。体育馆主席台上，悬挂着中国人民的伟大领袖毛主席的巨幅画像和朝鲜人民的伟大领袖金日成首相的巨幅画像。画像两侧是中朝两国国旗。体育馆内外，悬挂着巨幅标语，上面写着:“热烈欢迎朝鲜人民军男女乒乓球队!”“中朝两国人民用鲜血凝成的伟大友谊和战斗团结万岁!”“全世界人民团结起来，打败美国侵略者及其一切走狗!”"},{"type":"paragraph","text":"出席欢迎仪式并观看表演的有:"},{"type":"paragraph","text":"中共中央政治局委员、中共中央军委副主席叶剑英，中共中央委员、中国人民解放军副总参谋长王新亭，中国人民解放军总政治部副主任田维新，国家体委主任王猛，有关方面负责人马文波、申健、于步血、王磊、柴成文、郭东俊；"},{"type":"paragraph","text":"朝鲜人民军男女乒乓球队团长、朝鲜民族保卫省战斗训练局副部长金钟汉上校和副团长、朝鲜民族保卫省群众体育部参谋黄凤钾少校，朝鲜驻中国大使玄峻极，大使馆公使衔参赞金在淑和武官张来宪大校，以及在北京的其他朝鲜同志。"},{"type":"paragraph","text":"欢迎仪式前，叶剑英、王新亭、田维新、王猛、马文波、申健等同志，会见了金钟汉团长和黄凤钾副团长，同他们进行了十分亲切友好的谈话。会见时，玄峻极大使和张来宪武官在座。"},{"type":"paragraph","text":"朝鲜人民军男女乒乓球队同中国人民解放军男女乒乓球队进行了男子单打、女子单打和少年男子单打共三个项目的表演。在整个表演过程中，两国运动员表现出的高尚体育运动风格和良好球艺，博得全场观众一阵阵热烈掌声。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王新亭","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21e1191318"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
