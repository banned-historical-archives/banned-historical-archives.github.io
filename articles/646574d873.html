script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议地主和资本家的残酷剥削意大利一百五十万农业工人大罢工美国五千群众向尼克松示威抗议美帝侵越","authors":[],"dates":[{"year":1969,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十一日电　罗马消息:意大利一百五十万农业工人十日在全国范围举行大罢工，抗议地主和资本家的残酷剥削，要求提高工资、缩短工时和充分就业。数以万计的农业劳动者在意大利的许多城市举行了声势浩大的示威游行。"},{"type":"paragraph","text":"意大利三十多万中学教职员工九日以来先后举行罢工，抗议腐朽的资产阶级教育制度。"},{"type":"paragraph","text":"意大利政府财政、国库和预算部门的职工，从十一月十九日以来，一直在坚持轮番罢工斗争。这些部门的四万名职工十日和十一日又一次举行四十八小时的罢工。来自全国各地的数千名罢工者十一日在罗马举行了示威游行。十一万银行职工也从十日起开始在全国范围举行轮番罢工。"},{"type":"paragraph","text":"一万五千名石油工人也从十日起举行四天的全国性罢工，抗议垄断资产阶级的残酷剥削。"},{"type":"paragraph","text":"据新华社北京十日电　纽约消息:美国人民群众约五千人九日在纽约向美帝头子尼克松示威，愤怒抗议美帝国主义侵略越南。"},{"type":"paragraph","text":"这天晚上，尼克松要到纽约华道夫。亚斯多里亚饭店参加宴会。在尼克松到达之前，大批示威群众就涌向这家豪华的饭店，美国反动当局急忙调集大批警察前往镇压。但是，示威群众毫不畏惧，他们斗志昂扬地高呼支持越南人民抗美救国斗争的口号，并且在美国金融垄断资本家的一座大楼的旗杆上升起了一面红旗。示威者用铅管、石头和标语牌作武器，奋起抗击警察。"},{"type":"paragraph","text":"尼克松被示威群众的正义行动吓得要死。堂堂一个美国总统居然不敢从正门进入这家饭店，而不得不偷偷地从一个地下停车场溜进去。"},{"type":"paragraph","text":"新华社北京十一日电　美俄亥俄州州立阿克伦大学的五十多名黑人学生，为抗议学校反动当局的种族歧视，十日晨武装占领了这个学校的行政大楼，并在进入大楼的时候鸣枪示威。"},{"type":"paragraph","text":"由于州立阿克伦大学的反动当局最近悍然拒绝了黑人学生提出的合理要求，引起了黑人学生的愤怒。他们奋起占领了学校的行政大楼。"},{"type":"paragraph","text":"黑人学生的正义行动把这个学校的反动校长吓得魂不附体，急忙躲进办公室里，不敢出来一步。惊慌失措的俄亥俄州的反动州长急忙下令州“国民警卫队”处于戒备状态，并派反动警察进入这个大学妄图镇压。但是，黑人学生坚持占领大楼达四小时之久。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"646574d873"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
