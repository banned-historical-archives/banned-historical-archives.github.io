art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席军事思想指导作战训练某支队结合实际研究海岛防御","authors":["徐健"],"parts":[{"type":"paragraph","text":"本报讯 海军驻岛某支队联系实际学习毛主席军事思想，于1月15日至27日，组织了一次海岛防御的战术学习，研究出一套适合该岛地形特点的作战训练方案，提高了官兵们的战术思想水平。"},{"type":"paragraph","text":"经过去年的反教条主义学习，这个支队破除了一些不符合实战需要的训练方法，例如生搬硬套别的地区岛屿防御的作战训练方案等等，但是，破了之后怎样立，立什么，还没有很好解决。为了使今年训练更加切合实战，取得更大的跃进，他们在“破是为了立，破了要快立”的思想指导下，组织部分军事干部参加了海岛防御的战术学习，研究适合 本岛屿地形特点的作战训练方案。学习中，首先阅读讨论了“中国革命战争的战略问题”、“十大军事原则”等文件，以毛主席的积极防御和全民皆兵的军事思想，作为这次战术研究的思想指导，发动群众，详细地研究了海岛防御的一般战术原则。接着又组织现地勘察地形，结合沙盘作业，重点讨论了以下几个问题：①根据岛屿地形地物，怎样部署兵力和火力，有效防御敌人来犯，使海岛成为“打不沉的军舰”；②根据上级给予的任务，结合本部队的兵器特点，本着有什么装备打什么仗的精神，研究本岛屿防御工事的修建以及后勤供应问题；③怎样加强与民兵合练。在讨论中，人人献计，个个献策，充分发挥了群众的智慧，提出很多切实可行的方法，并进行了一次实兵演习。支队司令部根据这次战术研究的结果，制订出一套适合所驻岛屿具体情况的作战训练方案，这对保证1959年战斗训练大跃进将有重大的意义。 （徐健）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e372c7c1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
