script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周恩来叶剑英江青李先念陈锡联纪登奎吴德会见卡翁达总统和夫人 周恩来总理举行盛大宴会热烈欢迎赞比亚贵宾周恩来总理和卡翁达总统在洋溢着中赞两国人民热烈友好气氛的宴会上讲话　叶剑英、李先念、陈锡联、纪登奎、吴德、姬鹏飞、方毅、李强、刘湘屏、李达、林佳楣等出席宴会作陪","authors":[],"dates":[{"year":1974,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年二月二十一日电　我国领导人周恩来、叶剑英、江青、李先念、陈锡联、纪登奎、吴德，今天晚上会见了赞比亚共和国总统肯尼思·戴维·卡翁达博士和夫人等赞比亚贵宾。宾主进行了亲切友好的谈话，并在一起照了像。"},{"type":"paragraph","text":"会见后，周恩来总理举行盛大宴会，热烈欢迎卡翁达总统和夫人以及其他赞比亚贵宾。"},{"type":"paragraph","text":"赞比亚驻中国大使契文加和夫人以及大使馆外交官员，应邀出席了宴会。"},{"type":"paragraph","text":"宴会在人民大会堂举行。宴会厅里悬挂着赞比亚国旗和中国国旗。当卡翁达总统和夫人由我国领导人陪同步入宴会厅时，全场响起热烈掌声。"},{"type":"paragraph","text":"在洋溢着中赞两国人民热烈友好气氛的宴会上，周恩来总理和卡翁达总统先后讲话。"},{"type":"paragraph","text":"周恩来总理在讲话中代表毛泽东主席、中国政府和中国人民热烈欢迎卡翁达总统和夫人以及全体赞比亚贵宾。周恩来总理赞扬赞比亚人民在卡翁达总统领导下，胜利地捍卫了民族独立和国家主权，并积极支持亚非人民反帝反殖、反对强权政治，争取和维护民族独立的正义斗争，为亚非人民团结反对帝国主义和霸权主义的事业作出了积极贡献。周恩来总理表示相信，卡翁达总统的这次访问，必将成为中、赞两国友好合作关系和两国人民友谊史上的一个新的重要里程碑。"},{"type":"paragraph","text":"卡翁达总统在讲话中说，他这次访问带来了赞比亚人民对中国人民热烈亲切的问候和最良好的祝愿。卡翁达总统赞扬中国党、政府和人民支持赞比亚的事业，支持非洲和全世界被压迫者的事业。卡翁达总统说，赞、中关系是很牢固、很友好的，他希望两国人民今后继续团结在一起。"},{"type":"paragraph","text":"周恩来总理和卡翁达总统讲话以后，乐队奏赞比亚国歌和中国国歌。"},{"type":"paragraph","text":"各国驻中国的外交使节应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会作陪的有叶剑英、李先念、陈锡联、纪登奎、吴德、姬鹏飞、方毅、李强、刘湘屏、李达、林佳楣等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"陈锡联","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"290a52ca3b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
