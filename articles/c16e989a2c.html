　夏希大使姬鹏飞外长先后祝酒","authors":[],"dates":[{"year":1973,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴基斯坦驻中国大使举行招待会"},{"type":"paragraph","text":"庆祝通过巴基斯坦伊斯兰共和国宪法"},{"type":"paragraph","text":"叶剑英等应邀出席　夏希大使姬鹏飞外长先后祝酒"},{"type":"paragraph","text":"新华社一九七三年四月二十三日讯　巴基斯坦驻中国大使夏希今天晚上举行招待会，庆祝通过巴基斯坦伊斯兰共和国宪法。"},{"type":"paragraph","text":"应邀出席招待会的有："},{"type":"paragraph","text":"军委副主席叶剑英，外交部部长姬鹏飞、副部长韩念龙，外经部部长方毅，第一机械工业部部长李水清，外贸部副部长陈洁，中国人民解放军副总参谋长向仲华，人大常委会委员罗叔章，有关方面负责人朱穆之、王海容、李青川、王磊、丁西林、周培源、薛少卿、杜义德、马仁辉、张杰、陆维钊等。"},{"type":"paragraph","text":"应邀出席招待会的还有柬埔寨王国民族团结政府外交大臣沙林察，亚非新闻工作者协会总书记查禾多，各国驻中国使节。"},{"type":"paragraph","text":"夏希大使首先在招待会上祝酒。他说，巴基斯坦人民的意志和愿望是永远作为一个完整的不可分割的国家而存在，根据这个愿望而直接选举产生的立宪议会，制定了巴基斯坦伊斯兰共和国宪法。这个宪法将解决多民族统一的迫切要求。夏希大使在祝酒时祝愿巴中两国人民的友谊日益发展。"},{"type":"paragraph","text":"姬鹏飞部长在祝酒时表示相信，在布托总统的领导下，巴基斯坦伊斯兰共和国宪法的通过和实施，必将进一步促进巴基斯坦人民的团结和国家的巩固。他祝愿巴基斯坦伊斯兰共和国繁荣富强，人民幸福。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c16e989a2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
