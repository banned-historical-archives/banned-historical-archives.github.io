script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一定要有轻微剥削才能算富裕中农","authors":[],"dates":[{"year":1948,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一定要有轻微剥削才能算富裕中农编辑同志："},{"type":"paragraph","text":"我们这里划阶级的方法在生产资料的土地的占有上，以全村每人平均产量为标准，往上超过该平均数十分之一者为富裕中农，往下少过十分之一者为贫农（另外也看使用状况），富裕中农不一定要有剥削。但人民日报五月三日第二版上却说：“一定要有轻微剥削，才能划为富裕中农，不能只看土地超过平均数或只看生活富裕。”中央文件上也说剥削收入不超过总收入四分之一者为富裕中农。另外中央文件上说：“各阶层占有生产资料的界限，则不可能也不需要作出一个统一的数字的规定。”故文件只概括的规定占有状况是：富农占有较多较好的土地，中农比富农少、比贫农多，贫农则没有或很少。我们上面的标准是否可以？不然，以什么较为具体的标准为生产资料占有的界限呢？另外，划阶级中不划富裕中农一项是否对（只划中农）？出榜时将全部土地财产并连地块也写上是否有这种必要？土地特别多，生活富裕也不能叫作富裕中农吗？（中央局指示中说：“富裕中农中有轻微剥削者，仍应算作富裕中农”，可见无剥削者也算富裕中农）。"},{"type":"paragraph","text":"上述我们划阶级的标准是根据太行一地委的决定。在上次整编时学习的，当时中央新文件未下来。后新文件下来了，上面也未说改正，不知此项指示与新文件精神是否符合？亦请来信告知。"},{"type":"paragraph","text":"邢台二区东羊村　冷仲明"},{"type":"paragraph","text":"冷仲明同志："},{"type":"paragraph","text":"划分阶级的标准，首先以人们生产资料的占有关系，以人们的生产关系为唯一的标准。而你们的划阶级标准，只是看生产资料的占有，而忽略了占有生产资料之使用关系，剥削与被剥削，这样只看占有不看剥削的划法，与中央划阶级标准之精神是不合的。"},{"type":"paragraph","text":"在中央划分阶级标准文件中，关于富裕中农说的很清楚。第九章第二节中说：“生活富裕，而剥削收入不超过其总收入四分之一的中农，叫做富裕中农。”所以说，富裕中农一定要有轻微剥削，不能只看土地超过平均数或只看生活富裕来划富裕中农的。如你所划之标准，以全村平均产量向上超过十分之一为富裕中农，向下少十分之一为贫农，这是错误的，应立即纠正。中央文件，并不是你所说的，只是概括规定。请将七章五、六、七节中旧式富农和富裕中农的区别，九章中农，十章贫农，详加研究，那里面说的很清楚明确。"},{"type":"paragraph","text":"至于出榜时怎样写，可和群众研究处理。　　　　　　——编者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94bb23c80d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
