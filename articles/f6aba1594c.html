979,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社东京五月二十一日电　日本首相大平正芳今天上午在首相官邸会见了“中日友好之船”访日，代表团团长廖承志和夫人经普椿，最高顾问粟裕和夫人楚青。"},{"type":"paragraph","text":"廖承志向大平首相转达了华国锋总理、叶剑英委员长、邓小平、李先念副总理、陈云、邓颖超副委员长的问候。"},{"type":"paragraph","text":"廖承志团长说，中华人民共和国要同日本加强友好的政策没有任何变化，中国同日本发展经济贸易往来的政策也没有变化。"},{"type":"paragraph","text":"廖团长在谈话时表示，华国锋总理希望能及早在北京见到大平首相。大平首相表示要尽快实现访华，并说日本国民也希望华国锋总理到日访问。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"廖承志","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6aba1594c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
