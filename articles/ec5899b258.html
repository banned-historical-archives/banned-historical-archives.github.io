thors":[],"dates":[{"year":1958,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社索非亚28日电】　保加利亚文艺界和电影界最近在批判了否定社会主义现实主义和否定党对文艺电影界的领导等修正主义观点以后，工作中出现了新的气象。"},{"type":"paragraph","text":"在文艺界，以社会主义建设为题材的作品正在日益增加。根据作家个人创作计划，1959年计划出版的诗集，全部是以保加利亚社会主义现实为主题的作品。这一年计划出版的文艺批评、小说和儿童文学等作品，以保加利亚社会主义现实为题材的将占全部计划出版的这些作品的三分之二，比过去增加了1倍以上。"},{"type":"paragraph","text":"现在保加利亚作家到农村、工厂去同劳动人民建立密切的联系成了新的风气。到目前为止，已经有5个作家到了工厂和农村。预计，今年还将有10个作家到工厂和农村去。不少作家已经同索非亚市附近的工厂和农业合作社建立了经常联系。密切作家同人民的联系，创作更多的以社会主义现实为题材的具有高度思想性政治性的作品，这是作家协会党和行政组织以及全体作家目前的中心任务。"},{"type":"paragraph","text":"为了加强党的领导，不断提高作家的思想、政治水平，作家协会党组织将根据作家的不同情况组成3个马克思列宁主义学习小组，结合国内社会主义建设实际和作家创作实际进行学习和研究。"},{"type":"paragraph","text":"保加利亚电影界的新气象也很显著。自从不久以前保共中央发表了关于电影艺术的现状和今后任务的决议以后，保加利亚故事片电影制片厂进行了改组，加强了党的领导。制片厂提出口号:拍摄更多的具有高度思想性政治性和艺术水平的影片。目前，有不少的著名作家都在为制片厂写电影剧本。这些剧本的主题，主要是描写保加利亚人民过去在保共领导下反对法西斯统治的英勇斗争，描写保加利亚解放后在社会主义建设事业中不断涌现的振奋人心的新人新事。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec5899b258"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
