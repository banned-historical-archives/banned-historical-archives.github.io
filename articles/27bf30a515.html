art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"破除资产阶级法权思想的有力措施","authors":[],"parts":[{"type":"paragraph","text":"干部下连当兵、代职，具体地体现了我军官兵一致的光荣传统。"},{"type":"paragraph","text":"下连当兵和走五·七道路，都是伟大领袖毛主席提倡的。干部下连当兵、代职、参加集体生产劳动，以普通一兵的身份，同战士保持广泛的、经常的、密切的联系，有利于密切上下关系，搞好官兵团结；有利于调查研究，搞好工作，加强连队建设；有利于扫除官气、暮气、骄气、娇气，发扬革命战争时期那么一股劲，对于反修防修、加强干部队伍建设有重要意义。"},{"type":"paragraph","text":"北京部队某团实行干部下连当兵、代职，使干部的精神面貌发生了深刻变化，连队建设出现了新的气象。这对于林彪宣扬孔孟之道的“上智下愚”、“官贵民贱”的反动思想及其扩大资产阶级法权的罪行，是一个有力的批判。对于那种高高在上，摆官架子，脱离群众，搞特殊化，不愿过艰苦生活，追求和欣赏资产阶级法权的人也是一个很好的教育。"},{"type":"paragraph","text":"当前，全军正掀起学习毛主席关于理论问题重要指示的热潮。广大干部在毛主席重要指示的指引下，必将更加自觉地坚持下连当兵、代职，参加集体生产劳动，促进思想革命化，加强部队的革命化建设，用实际行动限制资产阶级法权，使我军官兵一致的光荣传统发扬光大。"}],"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27bf30a515"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
