art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东等检阅部队军事训练成绩","authors":[],"parts":[{"type":"paragraph","text":"1964年年初，中央军委转发了叶剑英同志参观郭兴福教学方法的报告，号召全军开展学习郭兴福教学方法的活动，把我军的训练工作提高到一个新的水平。全军热烈响应中央军委的号召，迅即掀起了群众性的练兵热潮。为了进一步推动部队的军事训练，中央军委决定在全军举行一次全面的比武活动。6、7、8月间，全军分为十八个区举行了比武，参加比武表演的指战员达一万三千七百多人，参观的干部近十万人。6月15、16日，毛泽东、周恩来、刘少奇、董必武、朱德、邓小平等党和国家领导人，检阅了北京、济南军区军事训练成绩，对受阅分队的汇报表演给予了高度评价。"},{"type":"paragraph","text":"这次汇报表演显示了人民解放军广大指战员奋发的革命精神，高昂的战斗意志，顽强的战斗作风，精湛的军事技术。济南地区女民兵代表还汇报表演了对陆地和水上目标的射击。通过这次比武活动，检阅了成绩，交流了经验，发现了典型，树立了标兵，对部队训练起到了示范和推动作用。《解放军报》为此发表社论，指出了毛泽东等党和国家领导人检阅北京、济南军区和济南地区民兵代表的军事训练成绩对促进部队建设的重要意义。"},{"type":"paragraph","text":"但是不久，林彪以所谓“突出政治”为由，把这场群众性的练兵热潮压了下去，使我军的军事训练遭到严重破坏，削弱了我军的战斗力。在“文化大革命”中，罗瑞卿同志为此遭到了林彪和“四人帮”的残酷迫害。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c054f16cc2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
