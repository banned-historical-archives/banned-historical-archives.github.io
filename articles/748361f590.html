script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"原轻工业部党组书记、第一副部长  宋乃德同志追悼会在京举行","authors":[],"dates":[{"year":1980,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"原轻工业部党组书记、第一副部长"},{"type":"paragraph","text":"宋乃德同志追悼会在京举行"},{"type":"paragraph","text":"新华社北京二月九日电　原轻工业部党组书记、第一副部长、中共八大代表、第二届全国人大代表宋乃德同志追悼会，于二月九日下午在北京八宝山革命公墓礼堂举行。宋乃德同志在林彪、“四人帮”极左路线的摧残下，于一九六七年二月二十三日被迫害致死，终年六十二岁。"},{"type":"paragraph","text":"华国锋、邓小平、李先念、陈云、乌兰夫、方毅、余秋里、胡耀邦、彭真、陈慕华、谭震林、蔡畅、谷牧、王任重、康世恩、薄一波、姚依林、姬鹏飞、宋任穷、黄克诚、王鹤寿等同志，人大常委会、国务院、中央组织部、轻工业部、山西省、江苏省、湖南省和湖北省以及山西省沁源县党政机关等单位，送了花圈。"},{"type":"paragraph","text":"余秋里、陈慕华、王任重、薄一波、姚依林、宋任穷、王鹤寿等同志，轻工业部等单位的群众代表，以及宋乃德同志的生前友好和亲属共八百多人，参加了追悼会。"},{"type":"paragraph","text":"追悼会由轻工业部部长、党组书记梁灵光主持，党组副书记、副部长韩培信致悼词。"},{"type":"paragraph","text":"悼词说，宋乃德同志在一九五九年的反右倾运动中，被诬定为轻工业部“反党宗派集团首领”，蒙受不白之冤。文化大革命初期，又受到林彪、“四人帮”极左路线的摧残，含冤逝世。粉碎“四人帮”以后，轻工业部党组对宋乃德同志的旧案进行了复查，认为这是一起冤案、错案。经中央批准，对宋乃德同志彻底平反，恢复名誉。"},{"type":"paragraph","text":"悼词说，宋乃德同志是山西省沁源县人。一九二六年三月加入中国共产党，同年参加革命，在山西省沁源、安泽、屯留一带从事党的地下工作。山西军阀阎锡山实行反共后，他在沁源县组织农民暴动，捣毁了国民党县党部，建立了沁源县地下党组织。抗日战争期间，宋乃德同志任山西长治牺盟会特派员，组织爱国学生突击队，同托派张慕陶进行了坚决斗争，并组织了武装力量，培养了抗日骨干。一九三八年冬，阎锡山的一些反动县长断绝八路军口粮，宋乃德同志利用山西五专区巡视员的合法身份，机智勇敢地进行斗争，胜利完成了筹措军粮的任务。为此，八路军朱德总司令、彭德怀副总司令特派副参谋长左权同志专程前来对他进行表扬。一九四○年，他任八路军某纵队供给部长，南下开辟苏北抗日根据地，领导苏北阜宁群众，修筑了长达九十里的海堤，为巩固抗日根据地作出重要贡献。群众把这道堤誉为“宋公堤”。"},{"type":"paragraph","text":"悼词说，解放战争期间，宋乃德同志历任通辽区专员、嫩江省委财委书记兼财政厅长、黑龙江财政厅长、东北税务总局局长、冀察热辽分局财委副主任、天津市军管会财经接管部部长等职，参加了锦州战役和平津战役，为夺取抗日战争和解放战争的胜利做出了优异成绩。"},{"type":"paragraph","text":"悼词说，全国解放后，宋乃德同志先后任湖南省财委副主任兼财政厅长、中南军政委员会财委副主任兼财政部长、国家计划委员会地方工业局局长、地方工业部党组副书记、副部长等职务，为恢复国民经济，完成私营工业的社会主义改造，为建立和发展我国地方工业和公社工业，特别是发展轻工业做出了重要的贡献。"},{"type":"paragraph","text":"悼词说，宋乃德同志在党的历次路线斗争和政治运动中，立场坚定，旗帜鲜明，坚持原则，实事求是，光明磊落，襟怀坦白，作风正派。即使在他含冤受屈，受到错误处理的情况下，仍然以党的利益为重，积极工作。宋乃德同志的一生，是革命的一生，战斗的一生，是全心全意为人民服务的一生。（附图片）"},{"type":"paragraph","text":"宋乃德同志遗像"},{"type":"paragraph","text":"新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王任重","type":"人物"},{"name":"姚依林","type":"人物"},{"name":"林彪","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"宋任穷","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"山西文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"748361f590"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
