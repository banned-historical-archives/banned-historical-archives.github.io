art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓副总理会见阿拉伯也门一代表团"},{"type":"paragraph","text":"邓小平副总理五月二十七日上午会见由阿卜杜拉·侯赛因·哈拉里率领的阿拉伯也门共和国民间合作发展机构代表团。"},{"type":"paragraph","text":"邓副总理同远道来访的朋友们进行了亲切友好的谈话。他说：“中国和阿拉伯也门两国的关系历来是深厚的。我们在国际问题上的观点基本上是一致的。我们确实够得上是朋友。”"},{"type":"paragraph","text":"哈拉里团长说：“我们高度赞赏中国政府和人民支持阿拉伯人民和各国爱好和平人民斗争的正义立场。阿拉伯也门人民十分关注中国人民实现四个现代化的伟大进程和各方面取得的进步。”"},{"type":"paragraph","text":"邓副总理指出：“你们那个地区过去是，今后相当长的时期内仍将是国际局势动荡的中心之一。超级大国霸权主义的争夺，给阿拉伯人民带来了灾难。我们相信，你们的斗争尽管还有曲折，但最终将取得胜利。我们希望阿拉伯也门和整个阿拉伯世界好起来。”"},{"type":"paragraph","text":"徐副总理会见并宴请索军事友好代表团"},{"type":"paragraph","text":"国务院副总理兼国防部长徐向前五月二十七日会见并宴请索马里第一副总统兼国防部长萨马特尔中将率领的军事友好代表团。"},{"type":"paragraph","text":"王震副总理参加了会见和宴会。"},{"type":"paragraph","text":"会见时，徐向前副总理对索马里贵宾来访表示热烈欢迎。他说，中索两国人民有着反帝、反殖、反霸的共同任务，我们的友谊将不断加强和发展。"},{"type":"paragraph","text":"萨马特尔第一副总统代表索马里人民和军队向中国人民和军队致以战斗敬意。"},{"type":"paragraph","text":"国家民委召开第一次委员（扩大）会议"},{"type":"paragraph","text":"国家民族事务委员会第一次委员（扩大）会议，五月二十二日在天津召开。"},{"type":"paragraph","text":"这次会议是以党的三中全会为指针，研究社会主义现代化时期民族工作的任务；检查部署民族政策再教育工作；讨论解决民族杂居、散居地区的民族工作。会议正在继续进行。（据新华社）"}],"alias":""},"tags":[{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f803347412"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
