script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大的毛泽东","authors":["红南"],"dates":[{"year":1966,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大的毛泽东"},{"type":"paragraph","text":"越南　红南伟大的毛主席，您是革命人民心中的红太阳。伟大的毛主席，您是各国无产者敬爱的领袖，是世界革命的舵手。您是一位天才的战略家，百战百胜。您锻炼出百万雄兵，正战斗在五大洲四大洋。您建立了无产阶级专政，比铜墙铁壁还坚强。您亲自发动的文化大革命，像海潮般汹涌澎湃，第一轮炮火就震动了全世界。您正在培养革命事业的继承者，为人类争取解放开辟新航道。伟大的毛主席，您的思想是照亮人民前进的灯塔，您的思想比原子弹还强大千万倍。有了毛泽东思想，就能打倒帝国主义殖民主义豺狼。有了毛泽东思想，就可以把现代修正主义砸个稀烂。有了毛泽东思想，资本主义无法复辟，社会主义永不变色。毛泽东思想的光芒普照五洲四洋，祝伟大领袖毛主席万寿无疆！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e134d4fea2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
