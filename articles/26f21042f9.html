tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席","authors":[],"parts":[{"type":"paragraph","text":"“毛泽东思想放光芒，"},{"type":"paragraph","text":"照到哪里哪里亮，"},{"type":"paragraph","text":"世界人民掌握她，"},{"type":"paragraph","text":"彻底翻身谋解放。"},{"type":"paragraph","text":"永远跟着毛泽东，"},{"type":"paragraph","text":"整个世界红彤彤。”"},{"type":"paragraph","text":"这是远航来中国的一位马来亚的新加坡海员对伟大领袖毛主席的热情歌颂。这位海员出生在一个贫苦的农民家里，从小就到船上干活，当了将近三十年的海员，受尽剥削和欺凌。当他随船来到中国时，一见中国的港务人员，就像久别重逢亲人，热情地邀请中国同志到他歇宿的船舱里去作客。在他的铺位的正面挂着毛主席像，舱壁四周挂满了毛主席语录，桌上放着毛主席著作。他在同中国同志谈话中，表示了他对黑暗社会的仇恨和对新中国的向往。他在谈到学习毛主席的《中国社会各阶级的分析》这篇光辉著作的心得时说：“学了这篇文章，使我懂得了谁是我们的敌人，谁是我们的朋友这个极为重要的问题。毛主席说的话全是真理，跟着毛主席就是胜利，掌握毛泽东思想就会永远立于不败之地。我要努力学习毛主席的书，听毛主席的话，坚决反对帝国主义和反动派，为马来亚人民的解放而斗争！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26f21042f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
