],"dates":[{"year":1967,"month":4,"day":1}],"is_range_date":false,"parts":[{"text":"中共中央军委给东北局的五点指示","type":"title"},{"text":"1、不准把群众组织任意打成反革命组织，打成反革命组织必须由中央批准。","type":"paragraph"},{"text":"2、冲击过、反对过军区，提过意见的，被捕的一律释放，通令一律作废。","type":"paragraph"},{"text":"3、对违法乱纪犯罪个人依法惩办，要和群众严格区分开来。","type":"paragraph"},{"text":"4、群众组织犯严重错误的，要通过整风开展批评与自我批评的方式来解决，不能强迫请罪、挂牌字。","type":"paragraph"},{"text":"5、不准在左派队伍中支持一派打击一派。","type":"paragraph"},{"text":" 中共中央军委一九六七年四月一日","type":"paragraph"}],"comments":[],"origin":"根据北京玻璃总厂红卫兵联络站编 《中央首长讲话（4）》，北京：1967年5月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c25fa3595"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
