al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"中国国民党中央执行委员会严骏北京党员之违法会议","alias":"","parts":[{"type":"paragraph","text":"中国国民党中央执行委员会严驳北京党员之违法会议！"},{"type":"paragraph","text":"（1925年11月27日）中国国民党各级党部各同志均鉴："},{"type":"paragraph","text":"近接北京中央执行委员林森等铣?电，主张在北京西山开第四次中央执行委员会全体会议，已由中央执行委员会覆电严驳。盖就法理而言，既经第三次中央执行委员会全体会议议决，全国代表大会及中央执行委员会全体会议，须在广州开会，无论何人不得违反决议。就事势而言，中央执行委员会全体会议，属于公开性质，若在北京开会，外则受军阀之压迫，内则有反动分子利用军阀以从中作梗，今年四月间第三次中央执行委员会全体会议，在北京开会未半，即中缀南下，继续开会于广州，即基于此原因。前事不忘，后事之师。第四次中央执行委员会全体会议，岂可复蹈故辙，使军阀与反动分子得遂其破坏革命之阴谋。况第二次全国大会原定八月十五日在广州开会，嗣因省港罢工，交通梗塞，广州扫除反革命派，战事频仍，以致屡次展期。兹者广东全省统一，广州安如磐石，纵使交通颇感不便，亦无碍于开会。故已由中央执行委员会决定于十"},{"type":"paragraph","text":"[1]这是国民党中央执行委员汪精卫、谭延间等，候补中央执行委员毛泽东、瞿秋白等给国民党各级党部的通电。"},{"type":"paragraph","text":"[2]铣，即11月16日。二月十一日在广州开第四次中央执行委员会全体会议，于十五年元旦开第二次全国代表大会。已电嘱林森诸同志尊重决议，愿念事势，迅速来广州开会，匆持异端，致生纠纷。除胡汉民同志现在莫斯科，李烈钧柏文蔚两同志于役京外，已电征同意外，弟等一致尊重第三次中央执行委员会全体会议之决议，及中央执行委员会最近之主张，并竭其全力以拥护实行。谨此宣言，诸维鉴察。"},{"type":"paragraph","text":"中央执行委员汪兆铭谭延间谭平山"},{"type":"paragraph","text":"林祖涵李大钊于右任于树德王法勤丁惟汾"},{"type":"paragraph","text":"恩克巴图候补中央执行委员毛泽东瞿秋白韩鳞符"},{"type":"paragraph","text":"于方舟张国焘感川"}],"authors":["毛泽东"],"dates":[{"year":1925,"month":11,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":131,"page_end":132},"tags":[{"name":"毛泽东","type":"人物"},{"name":"瞿秋白","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fa8ec04f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
