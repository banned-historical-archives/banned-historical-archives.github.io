" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu2","name":"十年文革中首长讲话传信录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"王力谈北京学生运动(摘要)","parts":[{"type":"title","text":"427．王力谈北京学生运动(摘要)"},{"type":"paragraph","text":"(1967年1月20日晚)"},{"type":"paragraph","text":"一月二十日下午，北邮东方红、清华井冈山等单位部分同学要冲入北京人民广播电台，要求把××××千周频率改为红卫兵广播站。为此，王力同志晚上找他们谈话，摘要如下："},{"type":"paragraph","text":"......同学们今天采取的这个办法，不是一个适当的办法(指要冲人民广播电台)。同志们要求把电台办成革命电台，要求××频率开放，但不能冲进广播电台，用群众接管的办法。"},{"type":"paragraph","text":"......如果北京各个团体都采取这个办法。今天你来，明天他来，同志们看那将造成什么结果。不能这样作，我建议开一个团结的大会，因为各种各样的团体都用权占领广播电台，那么我们这个无产阶级专政还要不要？"},{"type":"paragraph","text":"最后理的办法，还要北京市各个无产阶级革命派联合起来，使北京电台变成为无产阶级的喉舌。"},{"type":"paragraph","text":"昨天我们中央文革小组和清华井冈山座谈了，谈了话，批评了一些同志。这次毛主席号召革命派联合起来，团结广大革命群众，向一小撮党内走资本主义道路当权派开火，北京的学生运动没有紧紧地跟上主席的指示，同时暴露了北京学生运动中的两个问题："},{"type":"paragraph","text":"1．在有一些领导人中间存在着分散主义、小集团主义、个人主义，各自为政，互相不服气，互相排斥。无产阶级革命派，就是联合不起来，各人打起一面旗子，打两枪就跑，战线不断延长，就象猴子吃桃子一样，咬一口就跑，追求新奇。已经打响的仗，要把它歼灭。"},{"type":"paragraph","text":"2．同工人运动结合不够。有些飘浮，象浮萍草一样，没有要根茎，当然你们有成绩，但毛主席号召无产阶级革命派大联合。特别是要以工人为主，工人为领导，各个要害部门都要掌握在工人手里，这方面得作艰苦的工作，夺权斗争也有这个问题，夺权首先要作群众的工作，要有大联合，要和工人相结合。今天搞一个告全国人民书，明天又搞一个告全国人民书，没有针对北京，这没有全国意义，不如写一个告北京市人民书。上海针对上海的问题，写了十条，我们要针对北京的问题来写，我们接管后要提出我们的政治纲领。总之，接管斗争是好的，向一小撮走资本主义道路的当权派夺权，但是关于接管问题要有各造反派的大联合，政治上的大联合，组织上的大联合，不一定是要建立一个统一的组织，而是有计划、有组织地进行。不是今天这个组织接管，明天那个组织接管，要有组织有计划地进行，这个经验需要总结，要通过实践加以总结。"}],"authors":["王力"],"dates":[{"year":1967,"month":1,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":92,"page_end":93,"alias":""},"tags":[{"name":"王力","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"882462a6f9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
