s":[{"year":1996,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昨天凌晨，德国北部吕北克市的一个外国难民营突然燃起熊熊大火。截至发稿时为止，已发现有10人葬身火海，其中有4名儿童，多人失踪。救护人员不排除继续发现死亡人员的可能性。这是迄今为止最大的一起在德外国人死难事件。"},{"type":"paragraph","text":"居住在这个难民营里的大多是来自非洲国家的难民申请者。目前尚无法断定这是一起自然事故，还是由极右分子纵火所为。但据专家分析，起火时火焰最早同时从楼内几个地方窜出，从迹象看似乎不像一般事故，而更像是有人纵火。最后的结论要到救援工作全部结束后才能得出。但警方昨天拘捕了三名火灾发生时在现场附近逗留的青年。其中一名是极右派光头士组织的成员。今天中午这三名青年虽已获释，但警方表示，极右分子所为的可能依然存在。　邱震海"},{"type":"paragraph","text":"(本报波恩1月19日电)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"773f6b044e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
