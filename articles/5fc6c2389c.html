script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中共中央办公厅、国务院办公室举行宴会招待在北京的各国专家和他们的夫人周恩来、姚文元、李先念、纪登奎、耿飚、姬鹏飞、李伯时等同志出席宴会，同各国朋友欢聚一堂，共同迎接新的战斗的一九七二年；汪东兴主任主持，李先念副总理讲了话；宴会在热烈友好的气氛中进行","authors":[],"dates":[{"year":1972,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京三十一日电　为迎接新年，中共中央办公厅、国务院办公室今天晚上举行宴会，招待来自五大洲的各国专家和他们的夫人。"},{"type":"paragraph","text":"应邀出席宴会并在主宾席就座的有:鲁道瓦兹和夫人、瓦西莉卡、尹范秀和夫人、何友杞、柯弗兰和夫人、艾德勒和夫人、德田多津、拉妮、哈西米、通苏文和夫人、穆罕默德、阿霞、柯鲁迪奥、阿德里亚娜、代妮丝、摩尔丁斯、安热林娜、阿桑特、阳早、寒春、舒子章、史密斯、克服斯特和夫人。"},{"type":"paragraph","text":"中共中央政治局常委、国务院总理周恩来，中共中央政治局委员姚文元，中共中央政治局委员、国务院副总理李先念，中共中央政治局候补委员纪登奎，中共中央委员、中共中央对外联络部部长耿飚，外交部代部长姬鹏飞，外国专家局负责人李伯时等出席宴会，同各国朋友欢聚一堂，共同迎接新的战斗的一九七二年。"},{"type":"paragraph","text":"宴会由中共中央政治局候补委员、中共中央办公厅主任汪东兴主持。"},{"type":"paragraph","text":"我国党政领导同志来到宴会大厅，同各国专家和他们的夫人热烈握手，感谢他们对我国社会主义革命和社会主义建设做出可贵的贡献。"},{"type":"paragraph","text":"李先念副总理在宴会上讲话。他在讲话中向各国专家和他们的夫人，致以热烈的节日祝贺和亲切问候。"},{"type":"paragraph","text":"他说:“各位专家不远万里来到中国，在我国的新闻、出版、教育、卫生等部门辛勤地劳动，用自己的智慧和力量，”对我国的社会主义革命和社会主义建设，对支援世界革命，都做出了可贵的贡献。你们崇高的国际主义精神，很值得我们学习。我代表中国共产党、中国政府和中国人民向你们表示衷心的感谢!”"},{"type":"paragraph","text":"李先念副总理说:“我国人民的伟大领袖毛主席在一九七○年五月二十日的庄严声明中指出:‘新的世界大战的危险依然存在，各国人民必须有所准备。但是，当前世界的主要倾向是革命。’一年多来，世界形势的发展充分证明了毛主席的英明论断的正确。印度支那三国人民抗美救国战争战果辉煌。巴勒斯坦人民和阿拉伯各国人民坚持反对美、以侵略的斗争。巴基斯坦人民为维护国家主权和领土完整进行着反对侵略和干涉的正义斗争。亚洲、非洲、拉丁美洲各国人民的民族解放运动继续高涨。欧洲、北美、大洋洲各国人民的革命群众运动深入发展。国家要独立、民族要解放、人民要革命，已成为不可抗拒的历史潮流。超级大国推行强权政治和霸权主义的横蛮做法，遭到了越来越多的巾小国家的强烈反抗，他们内外交困，日子越来越不好过。”"},{"type":"paragraph","text":"李副总理指出:“我国在对外工作中坚决贯彻执行了毛主席的无产阶级革命外交路线，取得了伟大胜利。我国人民同世界各国人民包括美国人民的友好往来不断扩大，我国同越来越多的国家建立了外交关系。超级大国妄图封锁、孤立中国的阴谋已经彻底破产了!”"},{"type":"paragraph","text":"他说:“我国国内形势也是一派大好。在我党‘九大’和九届二中全会以来，我们全党全军和全国人民遵照伟大领袖毛主席关于‘进行一次思想和政治路线方面的教育’的指示，深入开展批修整风运动，进一步提高了阶级斗争、路线斗争和在无产阶级专政下继续革命的觉悟，取得了伟大的胜利。无产阶级文化大革命斗、批、改运动正在继续深入进行。我国的农业连续十年获得丰收。工业生产出现新的高涨。物价稳定，市场繁荣。我国人民的革命精神越来越旺盛。我们的社会主义祖国，欣欣向荣，蒸蒸日上。”"},{"type":"paragraph","text":"李先念副总理祝愿各位专家在新的一年里工作顺利，身体健康，为更好地增进中国人民同各国人民的相互了解和战斗友谊，为支援世界革命，共同奋斗!"},{"type":"paragraph","text":"宴会在热烈友好的气氛中进行，宾主亲切交谈，频频举杯，共祝世界各国人民之间的革命友谊和战斗团结日益巩固和发展。"},{"type":"paragraph","text":"出席宴会的还有中共中央和政府部门、北京市革命委员会、对外友协等有关方面负责人王良恩、吴庆彤、马文波、杨德中、杜万荣、谢华、张纪之、刘建功、张士诚、鲁瑛、李梦夫、刘福、邱巍高、刘传新、吴印咸、丁西林、李青川、王磊、朱开印、屈志统、强守一等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"李先念","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fc6c2389c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
