":[{"year":1974,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年十一月二十六日电　国务院副总理邓小平、外交部长乔冠华今天同美国国务卿兼总统国家安全事务助理亨利·基辛格博士举行了会谈。"},{"type":"paragraph","text":"美国方面参加会谈的有:总统助理、白宫办公厅主任唐纳德·拉姆斯菲尔德，美国驻中国联络处主任乔治·布什，负责东亚事务的助理国务卿菲利普·哈比卜，政策计划司长温斯顿·洛德，新闻发言人罗伯特·安德森，负责东亚事务的助理国务卿帮办小威廉·格莱斯廷，中华人民共和国和蒙古事务处长安士德，国家安全事务委员会成员理查德·索洛蒙，基辛格国务卿的白宫工作人员罗伯特·麦克法兰，以及约·霍尔德里奇、彼得·罗德曼、卡·克奈普斯。"},{"type":"paragraph","text":"中国方面参加会谈的有:外交部副部长王海容，中国驻美国联络处主任黄镇，以及林平、朱传贤、唐闻生、章含之、钱大镛、丁原洪、赵稷华、马毓真、廉正保。"},{"type":"paragraph","text":"基辛格博士和夫人等美国客人今天还参观了故宫博物院，并观看了中国歌舞团演出的文艺节目。基辛格博士的夫人还到农村人民公社进行了参观。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42de97bdc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
