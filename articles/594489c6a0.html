ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于处理志愿军休养员打人事件的批语","alias":"","parts":[{"type":"paragraph","text":"关于处理志愿军休养员"},{"type":"paragraph","text":"打人事件的批语\"!"},{"type":"paragraph","text":"（1951年12月18日）罗荣桓、肖华同志："},{"type":"paragraph","text":"接到这样的信好几次了，应作必要的处理，请总政研究和决定办法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十八日"},{"type":"paragraph","text":"[1]毛泽东的这两个批语，其一批在苏南区无锡市皇后戏院鞠惠黎的来信上，信中反映苏南康复医院的志愿军休养员到该戏院看戏时无端寻事，殴打职工的情况；其二批在江西省南昌市第五预备医院王心的来信上，信中反映该院休养员段打护士、医生及无理关押院领导等情况。"},{"type":"paragraph","text":"[2]罗荣桓，当时任人民革命军事委员会总政治部主任。肖华，当时任人民革命军事委员会总政治部副主任。毛泽东全集第三十一卷"},{"type":"paragraph","text":"请总政查明酌处。这恐怕不只是南昌一处如此。"},{"type":"paragraph","text":"毛泽东十二月十八日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":160,"page_end":161},"tags":[{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"594489c6a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
