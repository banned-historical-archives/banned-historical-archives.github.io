" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于人民公社化运动中的旧账一般要算等问题的批注","alias":"","parts":[{"type":"paragraph","text":"关于人民公社化运动中的旧账"},{"type":"paragraph","text":"一般要算等问题的批注！"},{"type":"paragraph","text":"（1959年3月30日）此件很好，很容易看。如有头昏病，还可以愈头昏。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五九年三月三十日"},{"type":"paragraph","text":"[1]本篇一是对中共山西省委第一书记陶鲁1959年3月29日关于山西各县五级干部大会情况给毛泽东的报告及其附件的批语，毛泽东将这个批语拟题为《介绍山西经验》。本篇二至六是看陶鲁的报告时写的批注。本篇七是对陶鲁附送的中共晋南地委第一书记赵雨亭关于晋南各县五级千部会议情况报告的批注。"},{"type":"paragraph","text":"[2]陶鲁的报告说，山西省各县的五级干部大会具有如下特点：一、五级于部会议和全民大讨论结合进行。二、放手发动群众，形成大鸣大放的高潮，在此基础上，再采取领导干部进行自我批评与群众性的摆事实、讲道理的辩论相结合的方法，效果极好。三、解决思想问题和解决实际问题相结合。四、全民大讨论和当前的生产运动相结合。陶鲁在报告后面，还附送了中共山西省委1959年3月23日关于榆次市、太谷县五级干部会议开会方法的通报和中共晋南地委第一书记赵雨亭1959年3月28日关于晋南各县五级千部会议情况的电话汇报。毛泽东全集第四十一卷"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"毛注：有些地方不是这样，他们怕鬼，不敢将郑州要点立刻一竿子通到生产队、生产小组和全民中去。他们怀着无穷忧虑，怕天下大乱，不可收拾。\""},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"毛注：这三条办法好。群众一到，魔鬼全消。本来没有鬼，只在一些同志的大脑皮层里感觉有鬼，这个鬼的名字叫做“怕群众”。21"},{"type":"paragraph","text":"[1]陶鲁的报告讲到：“事实上，各县在五级干部会议举行以前，所有公社对于郑州会议所提出的所有制问题和“十四句话’的方针，已经展开了全民讨论。”在这后面，毛泽东加括号写了这条批注。"},{"type":"paragraph","text":"[2]陶鲁的报告讲到，五级干部会议和全民大讨论结合进行，一般有三种方法：“（1）开全县性的电话会议或者有线广播会议。（2）各个公社参加五级千部会议的人，一部分是固定的（每县平均四五千人），另一部分是不固定的。会内会外，人来人往，络绎不绝，利用大字报，内外交流，互通情报。大字报的内容，有批评、自我批评的，有建议或表示不同意见的，有报喜的…（3）县委临时派出工作组帮助领导较薄弱的公社。”在这后面，毛泽东加括号写了这条批注。关于人民公社化运动中的旧账一般要算等问题的批注"},{"type":"paragraph","text":"四毛注：很好，必须这样肯定。\""},{"type":"paragraph","text":"五"},{"type":"paragraph","text":"毛注：牢骚也罢，反动言论也罢，放出来就好。牢骚是一定要让人发的，当然发者无罪。反动言论，放出以后，他们立刻就会感觉孤立，他们自己会作批判。不批判也不要紧，群众的眼晴里已经照下了他们的尊容，跑不掉了，故也可以实行言者无罪这一条法律。现在是1959年，不是1957年了。2"},{"type":"paragraph","text":"六"},{"type":"paragraph","text":"毛注：开大会将要妨碍当前紧迫的春耕生产，这也是一项迷信，已被群众打破。看开什么会。开一平二调三收款的会呢，还是开现在这样的会。前者一定妨碍生产，毁环社会主义，毁环人民公"},{"type":"paragraph","text":"[1]陶鲁的报告讲到：“各县县委都按照省委的指示，在五级于部会议的头一天，向大家宣布了言者无罪”不戴帽子”“充许任何人保留自己的意见”。”在这后面，毛泽东加括号写了这条批注。"},{"type":"paragraph","text":"[2]陶鲁的报告讲到：“据榆次市、太谷县的材料，五级干部会议经过三天鸣放，有观潮派、算账派的言论甚至有反动言论的人，约占到会人数的10%左右。估计其中相当一部分人的言论是属于发牢骚的性质。”在这后面，毛泽东加括号写了这条批注。毛泽东全集第四十一卷社。后者则完全相反。"},{"type":"paragraph","text":"七毛注：讲得很好，正是这样。"},{"type":"paragraph","text":"[1]陶鲁的报告讲到：“各县的材料，都毫无例外地证明，五级干部会议和全民大讨论，对于当前的生产运动起到了巨大的促进作用。思想运动的高潮，已经带动起了一个新的令人鼓舞的生产运动的高潮。”在这后面，毛泽东加括号写了这条批注。"},{"type":"paragraph","text":"[2]赵雨亭的报告讲到：“从这几天的情况来看，开会不但不会影响生产，相反的，对生产还有很大的推动。开会的过程是贯彻执行党的方针政策的过程，也是纠正我们工作中的缺点、错误和发动群众的过程，同时又是组织生产高潮的过程。”在这后面，毛泽东加括号写了这条批注。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":395,"page_end":398},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c345e26d1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
