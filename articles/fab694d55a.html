主义改造","authors":[],"dates":[{"year":1954,"month":6,"day":25}],"is_range_date":false,"parts":[{"text":"哈尔滨有些资本家用各种方法抗拒社会主义改造","type":"title"},{"text":"【东北总分社六月二十五日讯】哈尔滨市有些资本家以各种手段抗拒社会主义改造。他们抗拒的方法是：(一)不接受国家的加工、订货任务。益兴和铁工厂资本家张云吉，不接受国家订货，把原料卖掉，并公开扬言：“现在不干，等共产党垮了再干。”东发铁工厂资本家曾两次拒绝接受器材公司的加工任务，自制辗滚出售。(二)资本家在抗拒加工、订货不成时，就对生产采取破坏手段或故意拖延交货日期。裕华玻璃工厂给信托公司加工一批货，这批货任务比较紧急，资本家解志华竟有意地用坏坩锅装原料，结果从坏的地方流失了二千多斤原料，损失四百万元。大炉也被流出的原料给冲坏，停工四天，影响了这批紧急订货任务的完成。东源制材厂资本家将原材料全部卖掉，把款盗走。前进印刷厂接到松江省运输公司印制表格等材料，资本家王大民故意不交给工人印刷，在运输公司需要此材料的前一天，才被工人发觉，采取了措施赶印出来。(三)拒用进步工人，并设法诬蔑进步工人。福兴隆工厂需用两名工人，工会介绍了两名中共党员，但资本家拒不采用，并公开说：“我们工厂不用党、团员”。前进印刷厂资本家王大民想拉拢新任工会主席鲍宦仲，拉拢不成，就诬告鲍宦仲是胡匪，非法停止鲍宦仲的工作，在停止鲍宦仲的工作时，由资本家的亲信把守前后门，不准工人出入，全厂停止生产半点钟。长兴铁工厂资本家对学习总路线的工人说：“你们学习总路线，学吧！早晚你们就明白了”。暗示他要搞垮工厂，使工人失业。另外，新昌电器行资本家王景良拒缴税款，大骂税务局干部，在工人督促其缴税时，竟殴打会计人员，把会计人员由二楼踢到楼下(这个资本家已被逮捕)。","type":"paragraph"},{"text":" (李英编自全国总工会东北工作委员会“工运简报”)","type":"paragraph"},{"text":"1954年7月1日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fab694d55a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
