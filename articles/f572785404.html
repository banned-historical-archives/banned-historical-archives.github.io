划为右派的改正决定","authors":[],"dates":[{"year":1999,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"北京轻工业品进出口公司关于赵文滔同志1957年被错划为右派的改正决定","type":"title"},{"text":"赵文滔同志1957年被原在单位第二机械工业部错划为右派。1971年赵文滔同志成为中国轻工业品进出口公司北京分公司职工。即现在的北京轻工业品进出口有限责任公司。1979年1月，按照中共中央（78）55号文件精神，赵文滔同志由当时的轻工公司党委平反落实政策。由于当时的经办人员对文件要求的具体政策理解肤浅，没有给赵文滔同志作出结论。现经本人要求，根据中共中央（78）55号文件精神，重新对赵文滔同志被划右派补行改正，恢复政治名誉，恢复干部和原工资待遇。","type":"paragraph"},{"text":" 北京轻工业品进出口责任有限公司（章）一九九九年五月二十七日","type":"paragraph"},{"text":"签发人：孙占华","type":"appellation"},{"text":"校对：张旗涛","type":"appellation"},{"text":"抄送：北京国际贸易公司","type":"appellation"}],"comments":[],"origin":"根据文件原件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f572785404"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
