,"dates":[{"year":1947,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报杭州十六日专电】　浙江大学全体学生自今日起实行无限期罢课，并推派代表七人于今日下午二时搭金陵号联运车赴京请愿，同学赴车站欢送者达千余人，情绪至为热烈，车上遍贴标语，学生除不断高呼口号外，并合唱“你这个坏东西”等歌曲。时适值白崇禧部长亦登车，欢送白部长之军乐，竟为学生之吼声所压倒，请愿代表于开车前，曾对欢送同学作临别赠言，略谓:“希望在校同学，坚持到底，我们在南京决不让步”。"},{"type":"paragraph","text":"又浙大学生罢课请愿执行委员会今日下午二时招待本市报界。主席雷学时声称:“饥饿我们再也不能忍耐了，所以要求当局增加副食费，每个同学的家长同样为国家完粮纳税，所以我们要求全部公费待遇。同时为挽救教育危机，要求提高教育经费，增加设备”。并表示:希望社会各界寄予同情，继该会主席答覆记者两项询问:一，为准备万一必须全体入京请愿刻食住等问题已在积极布置中。二，教部即将颁布紧急措施，倘此项措施为绝对硬性者，则浙大必将联合全国各大学采一致行动。"},{"type":"paragraph","text":"又悉:浙大附中学生今日下午也决定无限期罢课，并推派三代表于明晨赴京，参加大学部请愿团请愿。"},{"type":"paragraph","text":"【本报杭州十七日专电】　之江大学学生今日继续罢课，该校当局除宣布放假外，并在东南日报刊登广告一则，大意谓:本校已宣布放假，希望各学生家长速前来将学生领回家去。该校李校长离校后，即不知去向，刻全校已陷入无政府状态。"},{"type":"paragraph","text":"【本报杭州十六日专电】　国立艺术专科学校学生，为响应各大学增加副食费之要求，刻亦在酝酿罢课，今日发起签名运动，签名者已达百分之八十以上，惟今午发起人于饭堂中向同学征求行动意见时，为一部份反对者所扰，顿时陷于纷乱，致未获具体结果。闻大部学生仍在进行中。"},{"type":"paragraph","text":"【本报杭州十七日专电】　省立医专药科代办之英大医学院药学系学生，今日起实行无限期罢课所提示之要求有三点:(一)反对药科改制；(二)，要求增加本校经费；(三)响应中大同学增加副食费之要求。"},{"type":"paragraph","text":"【本报杭州十七日专电】　本市东阳同会会员三百余人为反对故乡之暴政要求查办东阳县长丁琮，于今日下午二时向省府请愿，由沈主席接见，闻沈氏对此颇表同情，并表示如查出东阳县长丁琮非法属实，决予从严惩处，请愿团一行满意而返。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2bd9e2488"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
