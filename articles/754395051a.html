<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"适应广大干部群众学习毛泽东思想的迫切需要毛选四卷第二版今起发行邓小平题写书名　这次修订出版具有重大现实意义","authors":[],"dates":[{"year":1991,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京6月30日电　根据中共中央的决定，中共中央文献编辑委员会修订的《毛泽东选集》第一至四卷第二版，在建党70周年前夕已由人民出版社出版，从7月1日起在全国新华书店发行。"},{"type":"paragraph","text":"出版《毛选》一至四卷第二版，是为适应广大干部和群众包括青年学生学习毛泽东思想的迫切需要。这是一件具有重大政治意义的事情。"},{"type":"paragraph","text":"《毛选》一至四卷第一版是毛泽东亲自主持编辑的，在五十年代初和六十年代初先后出版。毛泽东生前曾提出修订再版《毛选》一至四卷。此项修订工作从1962年开始进行，后因“文化大革命”而中断。"},{"type":"paragraph","text":"《毛选》一至四卷第二版保持了第一版原有的篇目，只增加了《反对本本主义》一篇。这篇著作曾一度散失，是《毛选》第一卷出版后收集到的，经毛泽东审定，编入了六十年代出版的《毛泽东著作选读》甲种本和乙种本。这篇为毛泽东所十分重视的文章，是表达毛泽东思想活的灵魂的三个基本方面即实事求是、群众路线、独立自主的最早的文献。"},{"type":"paragraph","text":"这次对《毛选》一至四卷的修订，包括正文、题解和注释。对正文，主要是改正了一些著作的写作时间或发表时间，校正了少量错讹的史实和错字、漏字，校订情况均列表附在各卷书末；对某些用字，包括少数地名用字，根据国务院关于文字规范化的要求作了更改。对题解，主要是订正了某些史实的错误，删改了少量不合事实的提法和评价；同时增写了几条简单的题解。遵照毛泽东生前的意见，修订《毛选》一至四卷工作的重点是校订注释。对注释中一些错讹的史实、不准确的提法和偏颇的评述，作了订正和修改；并且新写了一部分注释，其中有的是对人物、事件等作了诠释，有的是纠正了正文中个别有误而不能直接改动的史实，有的是提供了重要的解释和说明。"},{"type":"paragraph","text":"《毛选》一至四卷第二版的出版，为读者提供了一个更完善的版本。"},{"type":"paragraph","text":"《毛选》一至四卷收入了毛泽东在新民主主义革命时期的主要著作。这些著作体现了马克思列宁主义基本原理同中国革命实践相结合的科学成果，是毛泽东思想的集中概括。毛泽东在新民主主义革命时期的这些著作，尽管是几十年前写的，但仍然是我们必须经常学习的。这些著作中包含的许多基本原理、原则和科学方法，是具有普遍意义的，无论现在和今后对我们都有重要的指导作用。这些著作，是学习中国共产党的历史，学习党的丰富的经验教训，进行党的优良传统、作风教育的基本教材。在以经济建设为中心、坚持四项基本原则、坚持改革开放、建设有中国特色的社会主义的新的历史时期，学习这些著作，具有重大的现实意义。"},{"type":"paragraph","text":"邓小平为《毛泽东选集》一至四卷第二版题写了书名。"},{"type":"paragraph","text":"\u003cIMG alt=请插入9号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1991\\07\\9171010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e《毛泽东选集》第一至四卷第二版书影。"},{"type":"paragraph","text":"新华社发(传真照片)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入9号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1991\\07\\9171010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e1960年，毛泽东校订《毛泽东选集》第四卷。"},{"type":"paragraph","text":"新华社发(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"754395051a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
