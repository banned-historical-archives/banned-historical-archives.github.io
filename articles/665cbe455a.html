<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国人民解放军襄城县公安机关军事管制小组对右派分子陈克礼的刑事判决书","authors":[],"dates":[{"year":1970,"month":6,"day":23}],"is_range_date":false,"parts":[{"text":"中国人民解放军襄城县公安机关军事管制小组对右派分子陈克礼的刑事判决书","type":"title"},{"text":"最高指示","type":"subtitle"},{"text":"坚决将一切反革命分子镇压下去，而使我们的革命专政大大地巩固起来，以便将革命进行到底，达到建成伟大的社会主义国家的目的。","type":"paragraph"},{"text":"中国人民解放军襄城县公安机关军事管制小组刑事判决书","type":"subtitle"},{"text":"（70）军刑字第8号","type":"subtitle"},{"text":"现行反革命犯陈克礼，男，现年四十七岁，付农出身，襄城县城关西大街人。系右派分子。","type":"paragraph"},{"text":"陈犯思想极端反动，自一九六四年以来，书写反动文章110多篇，反动信件30余封，恶毒攻击马克思列宁主义，攻击我党和社会主义制度，穷凶极恶地诬蔑诽谤无产阶级司令部，妄图推翻无产阶级专政。反革命气焰极为嚣张。陈犯实属死心踏地的反革命分子，经上级批准，依法判处死刑，立即执行。","type":"paragraph"},{"text":" 一九七O年六月二十三日","type":"paragraph"},{"text":"[注]： 此《判决书》原件中所写的“付农”应为“富农”，“死心踏地”应为“死心塌地”。一张判人死刑的法律文告竟然如此露骨地草菅人命，对一个无辜的公民如此罗织罪名，随意诬陷。《布告》上的文字与《判决书》一样，写罪证的文字是：“陈犯自一九六四午以来书写反动文章110余篇，反革命信件30余封……”除这二十余字之外的文字都是些充满杀机的政治套话。一九六四年陈克礼已完全失去了自由。一九六三年就先给陈克礼补划为“富农出身”，继而又补戴上“右派分子”的帽子，交菜农生产队管制劳动。况且国内的穆斯林报刊早在一九五八年的“宗教改革”运动中就绝迹了，陈克礼在哪发表文章呢？事实是：红卫兵从陈克礼家中抄收了一些文章剪报，那些文章剪报是陈克礼在1948年至1951年之间发表在国内穆斯林报刊上的译作和著作。这些译作和著作除宗教内容之外，有抒情小诗、生活小品和悼念文章。所有文章都与政治无关，特别是与新中国的政治毫无关系，怎么能叫“反动文章”呢？《布告》上所说的30余封“反革命信件”，没有证据。把陈克礼给周总理写的两封信认定为“反革命信件”，中国人给中国政府总理写信，要求工作，反映情况、谈思想认识，竟然成为“反革命”罪行？！","type":"paragraph"},{"text":" 来源： 马纪堂：《陈克礼传》","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"665cbe455a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
