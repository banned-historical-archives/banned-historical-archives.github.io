ates":[{"year":1949,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席作风"},{"type":"paragraph","text":"感动平市各界代表"},{"type":"paragraph","text":"下定决心为人民服务"},{"type":"paragraph","text":"【平市讯】参加北平各界代表会议的代表，近日纷纷谈论此次会议的成就，把会议的精神传布到各界人民中去，他们特别一致赞扬中国人民领袖毛主席在大会上的讲话和大会的民主精神。工商界代表凌其峻（仁立地毯公司经理）说：毛主席到大会讲话，把一个老百姓给他的信拿出来念给大家听，叫大家商量解决信上提出的问题，象这样的一封信，毛主席居然亲自带来交给大会，态度又是那么真诚坦白，真太伟大了！若是别人，早就扔到字纸篓里了。医界代表余贻倜说：毛主席真是有事情和人民商量，叫我们代表们想办法，这只有人民的领袖才能这样。中国民主同盟北平市支部代表张曼筠说：一封老百姓的信也被毛主席重视！大家的事，大家来讨论是好的，经过这次讨论，使我们对于财政经济问题有了基本的认识。教育界代表梁思成、郑昕、费孝通，都认为毛主席很重视这个会，毛主席的态度非常诚恳，使人感到亲切。梁思成说：我第一次见到毛主席，群众对他的拥护这么热烈，真是前所未见的。医界代表余贻倜说：共产党不开支票，说做就做，不象国民党那样光开支票。银行界代表韩诵裳认为这次大会开得很圆满。对于毛主席的到会感到意外的兴奋，而且很佩服共产党的代表们在会场上说话诚恳坦白。孙孚凌说：他参加了这次大会，学习到了一些东西，例如对中共北平市委代表彭真作主席主持讨论提案时，问过赞成的和反对的以后，还问有没有怀疑的，这是过去没有听说过的。商业界代表刘一峰说：“中共自己刻苦，待人厚道”。医界代表杨葆俊说：“共产党对代表们很热诚，很重视我们的谈话，今后自己更确定下为人民服务的决心。”现在各界代表正普遍自动的采取各种方式继续宣传大会的成就并讨论大会的各项决议。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5311dc5dea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
