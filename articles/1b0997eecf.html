art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"最重要的战备是毛泽东思想的准备麦贤得在战场上过得硬；正是因为平时思想上有了“舵”；","authors":["邹金凤"],"parts":[{"type":"paragraph","text":"麦贤得同志的英雄行为生动地证明，战备工作虽然有思想上、行动上、物质上的准备，但是，根本的是精神上的准备，是毛泽东思想的准备。麦贤得在战场上过得硬，正是因为平时思想上有了“舵”。"},{"type":"paragraph","text":"当前国际形势紧张，美帝国主义把反革命全球战略的重点从欧洲转向亚洲，死心塌地要同我国人民来一次大较量。我恨不得很快抓好连队的战备工作，使战士们头脑里树立起常备不懈的战备观念，随时做好打仗的准备。可是，我过去抓战备，单纯地强调和检查战备物资工作的落实，看没什么问题，便认为战备工作做得不错了。没想到在一次长途野营行军时，问题就暴露了：当时专门强调了要带好东西，也有充裕的时间做准备工作，可是行军九十余里，停下来做第二顿饭的时候，米不够了。原因是炊事班认为是战斗演习，不会在外面吃两顿饭，便少带了米。我们带着这个问题，翻开了毛主席著作。毛主席在《抗日战争胜利后的时局和我们的方针》里说：“蒋介石要坚持独裁和内战的反动方针，我党曾经及时地指明了这一点。……使全国人民、我们的党员和军队，早有精神准备。这一点很重要，有这一点和没有这一点是大不相同的。”这话给了我们很深刻的教育。对照毛主席这一指示，检查出我们平时战备工作的大问题，就是在精神上准备得不够。这一次学习麦贤得，使我们进一步认识到，要做好战备工作，只有活学活用毛主席著作，做好精神上的准备，把人对帝国主义的仇恨提高，把人献身革命战争的决心增强，平时才能时刻保持高度的战斗警惕，战时就能象麦贤得一样，有最大的勇敢，最顽强的毅力，就是剩下一口气也要战斗下去，战胜任何敌人。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b0997eecf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
