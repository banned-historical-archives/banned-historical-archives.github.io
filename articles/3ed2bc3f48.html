灾情的通知","authors":[],"dates":[{"year":1962,"month":9,"day":11}],"is_range_date":false,"parts":[{"text":"中共中央、国务院关于派出工作组到各地调查灾情的通知","type":"title"},{"text":"江苏、浙江、山西、宁夏省（区）委、人委，并抄华东、华北、西北局：","type":"appellation"},{"text":"近来各地向中央、国务院报灾的较多。为了进一步了解各省（区）的灾情，除了前已派出的十七个工作组分赴十五个省（区）的灾区进行调查以外，现在决定再派出四个工作组分别前往江苏、浙江、山西、宁夏省（区）的灾区进行调查。工作组的任务是，了解各省（区）的受灾情况，并及时向中央和国务院汇报。工作组下去后，应当看哪些灾区，请各有关省（区）确定；同时，请省（区）派干部协同工作组进行工作。由于时间紧迫，工作组到省（区）后，应当立即前往灾区进行调查，不要停留。工作组调查的材料和意见，经过省（区）委、人委审阅后，电告中央、国务院。","type":"paragraph"},{"text":" 中共中央国务院一九六二年九月十一日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ed2bc3f48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
