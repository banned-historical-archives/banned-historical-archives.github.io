<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"孟子是代表奴隶主阶级还是代表新兴地主阶级?","authors":[],"dates":[{"year":1961,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国人民大学哲学系哲学史教研室中国哲学史组的教师们，今年上半年结合编写中国哲学史讲义，讨论了对孟子的评价问题。两种不同的意见展开了针锋相对的争论。"},{"type":"paragraph","text":"一部分同志认为，孟子代表没落奴隶主阶级的利益，政治上是反动的。理由是:(一)孟子所处的时代是奴隶制向封建制的革命变革时期，反映在土地关系上是奴隶制贵族土地国有制的破坏，土地私有制的出现。孟子反对“慢经界”，主张“正经界”，就是反对新兴封建地主阶级土地私有，维护奴隶制的“井田制”的土地关系。(二)孟子提倡“王道”，并把它和“霸道”对立起来，是在天子失势，诸侯兴起；诸侯失势，卿大夫兴起的历史潮流下提出的。这是维护西周奴隶制的等级制，而不是维护封建制的等级制。(三)孟子说:“民为贵，社稷次之，君为轻”。所谓民，不是指下层人民，也不是指中小地主，而是指没落的奴隶主阶级。不然，他为什么要反对代表下层人民思想的墨子呢?(四)孟子的性善说是为他的“王道”服务的。同时，他只认为“君子”性善，“小人”是不性善的。"},{"type":"paragraph","text":"另一部分同志主张孟子代表新兴地主阶级利益，政治上是进步的。理由是:(一)孟子的“正经界”是托古改制，不是真正恢复奴隶制下的井田制，而是主张“井九百亩，其中为公田，百家皆私百亩，同养公田”的封建制的井田制，(二)孟子是站在新兴地主阶级立场提出“民为贵，社稷次之，君为轻”的思想的，这种思想在当时是进步的。没落奴隶主阶级决不会提出这种否定自己统治的“重民轻君”思想。孟子所谓“民”，就是指的普通农民(包括士、中小地主)，而不是没落奴隶主，(三)他反对墨子是因为他们代表不同的阶级。孟子代表封建地主，而墨子代表小生产者。(四)孟子提倡“仁政”，给人民以休养生息的机会，对当时生产是起促进作用的。"},{"type":"paragraph","text":"在讨论过程中还牵涉到孟子思想与孔子思想的关系问题。主张孟子是没落奴隶主思想代表的同志认为，孔子的思想是消极保守多于积极进步，孟子是发挥了孔子的保守、消极的一面。主张孟子是新兴地主阶级思想的代表的同志认为，孔子思想是进步多于保守，积极多于消极，孟子发挥了孔子思想中积极进步的一面。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"624b85bcbe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
