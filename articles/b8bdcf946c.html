script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共广西僮族自治区委员会整风领导小组关于右派分子阮力定案与处理决定","authors":["(阮力)"],"dates":[{"year":1958,"month":10,"day":1}],"is_range_date":false,"parts":[{"text":"中共广西僮族自治区委员会整风领导小组关于右派分子阮力定案与处理决定","type":"title"},{"text":"(阮力)","type":"authors"},{"text":"阮力，女，三十七岁，江苏省松江县人，共产党员，原广西省妇联副主任。","type":"paragraph"},{"text":"阮力从小便全家参加天主教，又于一九三七年在上海高中时曾参加上海市第一届学生集中军训。一九四○年曾被批准参加共产党，尚未宣誓过组织生活因转移地点而失掉组织关系，一九四二年二月重新入党。平时个人英雄主义自高自大，打击别人，抬高自己，民主作风差，不虚心，对人严对己宽，工作不艰苦，不深入，有严重的资产阶级个人主义，闹地位、待遇。","type":"paragraph"},{"text":"一、 主要反动言行","type":"subtitle"},{"text":"1．攻击统购统销政策，她说：“在统购粮食问题上，不根据政策办事，欺骗群众乱宣传，强迫命令违法乱纪，侵犯群众利益十分严重。”污蔑统购是“区干用开除党籍、捆绑、抄楼等办法进行”，或用“拂晓包围，天亮解决”，攻击统购统销搞糟了，说“造成不少人妻离子散，家破人亡，很多妇女儿童饿死了，很多妇女儿童变成了孤儿寡妇，很多妇女儿童至今与亲人离散”。","type":"paragraph"},{"text":"2．攻击各级党委，丑化各级党委的负责干部和污蔑党的干部政策。他说：“中央省委对全省饿死人事件，笼统总结为因灾饿死人，值得进一步研究分析”。“死人事件的检查是民主人士反映到中央后，中央才派人检查处理的，这么多共产党员都在干什么呢？”又说“大干部下去排场太大，真正接近深入群众太少，在负责干部中打圈子较多，不如旧社会的清官还化装到民间私访”，说省委“执行干部政策没有原则”，攻击各级党委不重视妇女工作，挑拨妇女干部对党不满。还说妇女干部搞中心工作是不务正业。","type":"paragraph"},{"text":"3．丑化全国妇联领导，去年六月在全国省市妇联主任会议上发言说“大姐大事不会干，当然不会犯错误”，又说：“全国妇联有怕上现象，最敢讲话的还是新闻记者。”","type":"paragraph"},{"text":"4．企图把妇联组织放出党委之上。说“妇联要有代表性、斗争性，只有妇联才代表妇女的利益”。提出“妇联要监督帮助党政正确贯彻粮食政策”。","type":"paragraph"},{"text":"二、 斗争中的态度","type":"subtitle"},{"text":"初期态度极不老实，经多次批判斗争，最后已基本承认错误。","type":"paragraph"},{"text":"三、 区党委整风领导小组定案与处理决定","type":"subtitle"},{"text":"划她为右派分子，开除党籍，撤销原有职务，实行留用察看，并降低原有待遇(由十三级降为十六级)。","type":"paragraph"},{"text":"原载 《关于清除党内右派分子的决定汇编(五)》，中共中央监察委员会办公厅编，一九五九年十二月。","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8bdcf946c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
