rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华总理同杜尔总统继续会谈邓副总理会见杜尔总统时指出，苏联已不是社会主义国家而是社会帝国主义国家","authors":[],"parts":[{"type":"paragraph","text":"新华社五月五日讯 国务院总理华国锋同几内亚总统杜尔今天继续举行了会谈。"},{"type":"paragraph","text":"外交部发言人说，双方在昨天和今天的会谈中，满意地回顾了建交以来两国友好关系的发展，表示要进一步加强两国友好合作。双方就当前重大国际问题广泛诚挚地交换了意见，在很多方面的看法是一致的。"},{"type":"paragraph","text":"发言人还说，这次会谈是十分有益和富有成果的，对于加深相互了解，推进两国友好合作关系以及维护世界和平事业，都有着积极的意义。"},{"type":"paragraph","text":"据新华社五月五日讯 国务院副总理邓小平今天中午在人民大会堂会见杜尔总统谈到当前世界形势时指出，多年来的实践证明，苏联对外推行霸权主义，对别国进行侵略、欺侮、奴役和剥削，它本身已不是社会主义国家而是社会帝国主义国家。"},{"type":"paragraph","text":"他说，当前真正威胁世界和平的是苏联，战争策源地是苏联。八十年代究竟怎么过，很值得注意。"},{"type":"paragraph","text":"邓小平重申中国坚决反对霸权主义、维护世界和平的立场，表示中国永远不做超级大国，永远属于第三世界。"},{"type":"paragraph","text":"会见时，杜尔总统说，我同华国锋总理对各种问题进行了很重要的讨论。邓小平说，我们是老朋友了。中几两国的关系是友好的，没有矛盾。他还向杜尔介绍了中国社会主义建设成功的和不成功的经验。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e41fddd2c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
