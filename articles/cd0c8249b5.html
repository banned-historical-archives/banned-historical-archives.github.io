rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志制订的纪律","authors":["白世藻"],"parts":[{"type":"paragraph","text":"在中国人民革命军事博物馆第二次国内革命战争馆里，陈列着一块写着红军“三大纪律六项注意”的包袱皮。由于年月已久，白布已发黄了，但上面的字迹还隐约可辨。"},{"type":"paragraph","text":"1928年工农红军在井冈山的时候，毛泽东同志亲手制订了“三大纪律六项注意”。当时井冈山生活艰苦、纸张缺乏，战士们就把“三大纪律六项注意”写在包袱皮上，作为自己行动的准则。“三大纪律六项注意”以后又发展为“三大纪律八项注意”，并由中国人民解放军总部重行颁布。这些纪律，曾经是红军政治工作的重要内容，对于人民军队的建设，对于正确处理军队内部关系、团结人民群众和确立人民军队对待俘虏的政策，都起了伟大的作用。这是毛主席为人民军队制订的纪律，是人民军队的传家宝，它将永放光彩。 白世藻摄（新华社稿）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd0c8249b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
