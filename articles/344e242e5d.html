year":1969,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"落实毛主席的伟大指示努力办好广播"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“努力办好广播，为全中国人民和全世界人民服务。”我国城乡广大革命人民遵照毛主席的这一伟大教导，积极发展广播事业，做出了很大的成绩。特别是在无产阶级文化大革命中，广大贫下中农在各级革命委员会领导下，发扬自力更生、艰苦奋斗的革命精神，努力办广播。许多地区在很短的时间内，就建成了强大的农村有线广播网。这些广播网，大力宣传毛泽东思想，对于毛泽东思想的大普及，对于推动抓革命，促生产，促工作，促战备，都发挥了很大的作用。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"344e242e5d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
