tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"陈毅向毛泽东诵诗","authors":["史鉴"],"parts":[{"type":"paragraph","text":"1948年1月7日。午后的斜阳，映照着陕北米脂县杨家沟的山塬窑洞。警卫排长阎长林看到一个人走过来，急忙走进毛泽东的办公室报告：“主席，陈老总来了。”"},{"type":"paragraph","text":"已经进到院内的陈毅，见到毛泽东出来，急走几步，立正敬了一个军礼，大声说：“主席，陈毅前来报到！”"},{"type":"paragraph","text":"毛泽东握着陈毅的手，笑着说：“走了这么远的路，你辛苦了！”"},{"type":"paragraph","text":"陈毅上下打量着毛泽东，说：“主席，你瘦了！”"},{"type":"paragraph","text":"毛泽东挥动一下手臂，说：“我觉得身体比以前更好了！”"},{"type":"paragraph","text":"两个人的手始终握在一起，毛泽东说陕北，陈毅说山东。当陈毅说到孟良崮、莱芜战役时，毛泽东插话：“又写诗了吧？你打了胜仗总是写诗的。”"},{"type":"paragraph","text":"“写了。对孟良崮战役、莱芜战役都写了。”陈毅说着朗诵起来：“孟良崮上鬼神号，七十四师无地逃。信号飞飞星乱眼，照明处处火如潮。刀丛扑去争山顶，血雨飘来湿战袍。喜见贼师精锐尽，我军个个是英豪。”"},{"type":"paragraph","text":"“好诗！好诗！只有你这位老总才写得出来。”毛泽东说，“你那番骂郝鹏举的话也很痛快嘛！”"},{"type":"paragraph","text":"“当时也写了一首《示郝鹏举》的诗。”陈毅说着又诵读道，“教尔作人不作人，教尔不苟竟狗苟。而今俯首尔就擒，仍自教尔分人狗。”"},{"type":"paragraph","text":"“真是喜笑怒骂皆成诗呀！”毛泽东的话里透出感叹。"},{"type":"paragraph","text":"“让你见笑了！”陈毅笑着说，转而又问，“主席，你最近写诗了没有？”"},{"type":"paragraph","text":"毛泽东摇摇头，说：“没有，没有。从抗战以来我就写不出诗了。”"},{"type":"paragraph","text":"“你写了两首长诗。”陈毅说。"},{"type":"paragraph","text":"“两首长诗？”毛泽东一下子没明白。"},{"type":"paragraph","text":"“就是嘛！”陈毅说，“一首叫抗日战争，一首叫解放战争。”"},{"type":"paragraph","text":"毛泽东哈哈大笑起来：“你这个陈老总呀！”"},{"type":"paragraph","text":"陈毅也笑起来，笑得更响。"},{"type":"paragraph","text":"不知不觉，天色已晚。毛泽东站起身说：“走，吃饭去，吃了饭再继续听你诵诗。”（史鉴）RW：陈毅；事迹"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"870adc815c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
