ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"陕北某权威人士谈战犯名单问题","alias":"","parts":[{"type":"paragraph","text":"陕北某权威人士谈战犯名单问题"},{"type":"paragraph","text":"（1948年12月25日）"},{"type":"paragraph","text":"全部战争罪犯名单有待于全国各界根据实际情形提出。但举国闻名的头等战争罪犯，例如蒋介石、李宗仁、陈诚、白崇禧、何应钦、顾祝同、陈果夫、陈立夫、孔祥熙、宋子文、张群、翁文灏、孙科、吴铁城、王云五、戴传贤、吴鼎昌、熊式辉、张厉生、朱家骅、王世杰、顾维钧、宋美龄、吴国桢、刘峙、程潜、薛岳、卫立煌、余汉谋、胡宗南、傅作义、阎锡山、周至柔、王叔铭、桂永清、杜聿明、汤恩伯、孙立人、马鸿逵、马步芳、陶希圣、曾琦、张君励等人，则是罪大恶极，国人皆白可杀者。应当列入头等战犯名单的人，自然不止此数，这应由各地身受战祸的人民酌情提出。人民解放军为首先有权利提出此项名单者。例如国民党第十二兵团司令黄维在作战中施放毒气，即已充分构成了战犯资格。全国各民主党派、各人民团体皆有权讨论和提出战犯名单。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":455,"page_end":455},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72eefc4838"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
