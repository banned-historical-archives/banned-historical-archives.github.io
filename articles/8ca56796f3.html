[{"year":1952,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民建总会扩大会议“七一”向毛主席致敬电敬爱的毛主席："},{"type":"paragraph","text":"在“三反”“五反”运动已经取得伟大的胜利之后，民主建国会决定召开第二次总会扩大会议。开幕之日，适逢中国共产党建党三十一周年纪念，我们感到无比的兴奋。谨代表本会全体会员，向您致崇高的敬礼！"},{"type":"paragraph","text":"我们这次会议的主要任务是：以您对本会方针任务的指示为依据，进行研讨，把我们对于这些基本问题的认识一致起来，明确起来，以便更好地团结、教育、改造中国的民族资产阶级，为防止、消除“五毒”，认真执行共同纲领，加强祖国的伟大建设而斗争。在伟大的工人阶级及其代表者中国共产党的领导之下，在您的领导之下，我们确信能够把这样的任务担当起来。谨电致敬，并对您的指示，特别表示由衷的感谢。"},{"type":"paragraph","text":"民主建国会第二次总会扩大会议"},{"type":"paragraph","text":"一九五二年七月一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ca56796f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
