ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"陈谢纵队应立即发起吕梁战役","alias":"","parts":[{"type":"paragraph","text":"陈谢纵队应立即发起吕梁战役!"},{"type":"paragraph","text":"（1947年5月26日）陈、谢、韩，并告彭、习："},{"type":"paragraph","text":"辰敬电?谅达。为着执行西进任务，你们纵队全部协同十二旅应立即开始发起吕梁战役，歼灭乡、吉、蒲、大、襄、汾等县之敌，相机占领乡、吉、蒲、大诸城。得手后，看情形如有必要，再对介休、灵石、孝义举行一次作战，削弱该地区阎军。以上作战统限六月份完毕，七月上半月全军休整，下半月待命渡河。如何部署盼告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十六日"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军第四纵队司令员陈、政治委员谢富治和副司令员韩钧的电报。遵照中央军委指示，晋冀鲁豫野战军第四纵队、太岳军区主力及晋绥部队遂发起攻势作战，先后解放乡宁、大宁、蒲县、汾城、襄陵等县城。"},{"type":"paragraph","text":"[2]彭、习，指彭德怀、习仲勋，当时分别任西北野战兵团司令员兼政治委员和副政治委员。"},{"type":"paragraph","text":"[3]即《对陈谢纵队西进作战的部署》。"},{"type":"paragraph","text":"[4]乡、吉、蒲、大，指山西乡宁、吉县、蒲县和大宁。襄、汾，指襄陵、汾城，均旧县名，1954年两县合并为山西襄汾县。"},{"type":"paragraph","text":"[5]阎，指阎锡山，当时任国民党军太原绥靖公署主任。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":5,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":68,"page_end":68},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36cbb89cf8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
