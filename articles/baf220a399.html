ors":[],"dates":[{"year":1968,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“你组织我们办家庭毛泽东思想学习班，可是开学第一天你就迟到!”一天，刘亚芳一进家门就挨了批评。她没有因为车间有事而感到受委曲，却打心底里高兴:家里政治气氛浓了，家里的形势也越来越好了。"},{"type":"paragraph","text":"刘亚芳在车间办的“抗大”式毛泽东思想业余学习班学习结束后，收获很大。她想，现在全国都在大办毛泽东思想学习班，自己是个共产党员，应该热情宣传毛泽东思想，因此也想在家里办个毛泽东思想学习班，促使家庭革命化。她把这个想法和丈夫商量以后，在家庭会议上提了出来，得到了全家人的积极支持。车间“抗大”式毛泽东思想业余学习班的“种子”终于播到刘亚芳家里。"},{"type":"paragraph","text":"刘亚芳分析了家庭成员中对形势有不少模糊的看法，就组织大家着重学习毛主席的最新指示:“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。”"},{"type":"paragraph","text":"学习讨论时，婆婆提出一个问题:“既然形势大好，为啥有些地方还有武斗?”"},{"type":"paragraph","text":"小女儿一听婆婆说起武斗，就憋不住了，可又讲不出多少道理，就说:“那是乱了敌人嘛!人家都这样说。”"},{"type":"paragraph","text":"她女儿的姑姑觉得这样讲太简单化了，就接上去说:“上海柴油机厂就是乱了敌人，把‘联司’坏头头揪出来了，群众得到了锻炼。看问题要看主流，要看实质啊!”"},{"type":"paragraph","text":"刘亚芳见姑姑讲得具体，有道理，但还没有谈深谈透，于是又进一步讲了如何通过伟大的无产阶级文化大革命，使我们国家不变颜色的道理。"},{"type":"paragraph","text":"大家通过认真学习毛主席的这一最新指示，思想上都有较大的提高，学习劲头也越来越大了。连从外地到上海来看病的亲戚，也被吸引住了。这个家庭学习班又增加了一个新学员。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baf220a399"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
