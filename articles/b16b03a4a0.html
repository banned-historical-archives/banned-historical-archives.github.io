<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想支工是革命生产双胜利的根本保证","authors":[],"dates":[{"year":1967,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京部队召集华北地区煤炭工业战线支工人员交流经验"},{"type":"paragraph","text":"用毛泽东思想支工是革命生产双胜利的根本保证"},{"type":"paragraph","text":"支工人员斗志昂扬，信心百倍，决心在毛主席“斗私，批修”的伟大方针指引下，帮助革命职工加速提高煤炭生产的产量和质量，争取第四季度打个更大的漂亮仗"},{"type":"paragraph","text":"据新华社讯　中国人民解放军北京部队最近召开了战斗在华北地区煤炭工业战线上的支工人员抓革命促生产经验交流会。会上，支工人员认真学习了毛主席在视察华北、中南和华东地区时所作的极为重要的指示，总结了支持和帮助无产阶级革命派和广大革命群众抓革命促生产的经验。会议认为，华北地区煤炭工业战线的革命和生产形势越来越好，广大职工的革命干劲越来越大，抓革命促生产的经验越来越丰富。到会人员决心在大好形势下，更高地举起毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，在狠抓革命，猛促生产中，为人民建树新的功勋。"},{"type":"paragraph","text":"华北地区是我国煤炭生产的重要地区之一。毛主席发出人民解放军应该支持左派广大群众和支援工业的伟大号召后，北京部队闻风而动，派出大批支工人员进入煤矿。指战员们同各矿区的无产阶级革命派和广大革命群众一起狠抓革命，猛促生产，取得了显著成绩。井陉煤矿月月超额完成国家计划。今年一至九月份这个煤矿原煤产量超额百分之七点三完成了国家计划。京西、大同、开滦、峰峰等煤矿在毛主席“抓革命，促生产”伟大方针的鼓舞下，革命和生产也出现一派新气象。"},{"type":"paragraph","text":"来自煤炭工业第一线的支工负责人在交流经验时，以自己的切身体会强调指出：人民解放军必须坚决支持左派，积极帮助广大革命群众按照毛主席的教导，正确处理革命和生产的关系，用毛泽东思想挂帅，以革命统帅生产，这是办好社会主义企业，夺取革命、生产双胜利的根本保证。"},{"type":"paragraph","text":"京西长沟峪煤矿一度出现了生产下降的趋势，有人主张先把生产突上去，回头再搞革命的大批判。这时，解放军指战员们和矿里无产阶级革命派一起重温了毛主席“政治工作是一切经济工作的生命线”的教导，使大家认识到在处理生产问题时，必须首先着眼于政治。我们搞的是社会主义生产，如果离开了社会主义方向，再多的掘进米数和采煤吨数也只能把工矿企业引到资本主义道路上去。接着，指战员又帮助无产阶级革命派分析了生产下降的原因，正是不甘心失败的党内一小撮走资本主义道路当权派唆使一些受蒙蔽的群众外出串连、挑动武斗所造成的。尖锐的阶级斗争教育了广大革命群众，于是全矿革命职工立即动员起来，狠揭狠批党内一小撮走资本主义道路当权派。这样，不但使生产又出现了蓬勃上升的大好形势，超额完成了国家计划，而且使革命大批判更加深入了一步。"},{"type":"paragraph","text":"在经验交流会上，支工人员谈到，帮助无产阶级革命派实现按系统的革命大联合，建立起革命的新秩序，坚持就地闹革命、业余闹革命、节约闹革命，是抓好革命，促好生产的重要保证。京西矿务局木城涧煤矿在实现按系统的革命大联合以后，把革命大批判和本单位斗批改结合起来，使革命搞得更加扎实，生产不断上升。回采三段按系统实现了革命大联合以后，生产上更加同心协力，原煤日产量比以前提高了百分之五十以上。"},{"type":"paragraph","text":"毛主席教导我们：“政治路线确定之后，干部就是决定的因素。”到会的支工人员还介绍了他们帮助无产阶级革命派大胆解放干部，放手使用革命干部的经验。他们深有体会地说，能不能放手使用革命干部是衡量是否贯彻毛主席的干部政策，是否真正相信和依靠干部大多数的试金石。经过支工人员和无产阶级革命派对干部的帮助，以及干部本身通过两条路线斗争，活学活用毛主席著作，现在许多煤矿大批干部站了出来，参加了三结合的临时权力机构，和工人一起顶班劳动，一起解决生产中的关键问题，在抓革命促生产中发挥了应有的作用。"},{"type":"paragraph","text":"通过这次会议，在煤炭工业战线上执行支工任务的人员更加斗志昂扬，信心百倍，坚决表示一定要在毛主席“斗私，批修”伟大方针的指引下，帮助无产阶级革命派以“只争朝夕”的革命精神加速提高煤炭生产的产量和质量，争取在第四季度打个更大的漂亮仗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b16b03a4a0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
