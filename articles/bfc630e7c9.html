主席范文同总理并热烈祝贺孙德胜、长征、范文同分别荣任越南社会主义共和国主席、国会常务委员会主席和政府总理","authors":[],"dates":[{"year":1976,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年七月三日电　毛泽东主席、朱德委员长、华国锋总理七月三日打电报给孙德胜主席、黎笋第一书记、长征主席和范文同总理，最热烈地祝贺越南全国实现统一，并热烈祝贺他们分别荣任越南社会主义共和国主席、国会常务委员会主席和政府总理。电报全文如下:"},{"type":"paragraph","text":"河内"},{"type":"paragraph","text":"越南社会主义共和国主席　孙德胜同志，"},{"type":"paragraph","text":"越南劳动党中央委员会第一书记　黎笋同志，"},{"type":"paragraph","text":"越南社会主义共和国国会常务委员会主席　长征同志，"},{"type":"paragraph","text":"越南社会主义共和国政府总理　范文同同志:"},{"type":"paragraph","text":"越南社会主义共和国第六届国会庄严宣告，越南全国实现统一。这是越南南、北方人民长期英勇奋斗的光辉成果。我们代表中国共产党、中国政府和中国人民，向你们，向越南劳动党、越南社会主义共和国政府和兄弟的越南人民，表示最热烈的祝贺，并热烈祝贺你们分别荣任共和国主席、国会常务委员会主席和政府总理。"},{"type":"paragraph","text":"英雄的越南人民，在越南劳动党领导下，高举胡志明主席“决战决胜”的光辉旗帜，经过几十年艰苦卓绝的反帝斗争，终于赶走和推翻国内外反动势力，赢得了全民族的独立和解放，取得了抗美救国战争的彻底胜利，完成了统一祖国的大业。越南国家的统一，是当前越南人民政治生活中的一件大事，在越南民族解放斗争史上具有十分重大的意义。中国人民对兄弟的越南人民的每一个胜利和成就，无不感到由衷的高兴。我们深信，有着光荣革命斗争传统的越南人民，在建设一个和平、独立、统一和社会主义的越南的事业中，必将取得新的更大的胜利。"},{"type":"paragraph","text":"祝越南社会主义共和国繁荣昌盛。"},{"type":"paragraph","text":"祝中越两国人民的伟大友谊不断巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　朱德"},{"type":"paragraph","text":"中华人民共和国国务院总理　华国锋"},{"type":"paragraph","text":"一九七六年七月三日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfc630e7c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
