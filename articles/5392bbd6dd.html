盛赞中国红卫兵是全世界青年的榜样","authors":[],"dates":[{"year":1968,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典进步青年组织“火炬社”代表大会通过决议"},{"type":"paragraph","text":"用伟大的毛泽东思想指导工作教育青年"},{"type":"paragraph","text":"盛赞中国红卫兵是全世界青年的榜样"},{"type":"paragraph","text":"新华社斯德哥尔摩七日电　瑞典进步青年组织“火炬社”三月一日到三日在斯德哥尔摩举行代表大会，决定用伟大的毛泽东思想指导工作和教育自己的成员。"},{"type":"paragraph","text":"大会通过的决议说，“火炬社”将用“马克思列宁主义、毛泽东思想来教育它的成员”，“这种教育必须用联系实际的办法来进行”。"},{"type":"paragraph","text":"决议说，“火炬社”成员必须用毛泽东思想指导自己的工作，同一切资产阶级影响作斗争。"},{"type":"paragraph","text":"代表大会还通过了给中国红卫兵的电报。电报指出，毛泽东思想是普遍真理，“火炬社”将用毛泽东思想作为开展反帝反修斗争的思想基础。"},{"type":"paragraph","text":"电报说，中国红卫兵在无产阶级文化大革命中表现出高度的革命热情，他们是全世界青年的榜样。中国青年在毛泽东思想的指引下，将取得更大的胜利，中国一定会保持鲜红的颜色。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5392bbd6dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
