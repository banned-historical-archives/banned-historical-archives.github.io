script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"延安军民回忆解放战争历史，分析陕北战例  深入批判林彪资产阶级军事路线","authors":[],"dates":[{"year":1974,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"延安军民回忆解放战争历史，分析陕北战例"},{"type":"paragraph","text":"深入批判林彪资产阶级军事路线"},{"type":"paragraph","text":"在批林批孔斗争中，延安军分区指战员同当地老红军、老赤卫队员、广大民兵一起，认真学习毛主席军事著作，回忆和分析解放战争中陕北战例，狠批林彪资产阶级军事路线。"},{"type":"paragraph","text":"在炮火纷飞的战争年代，延安军民在毛主席、党中央的直接领导下，互相支援，英勇奋战，写下了一曲曲军民团结战斗的动人篇章。今天，他们又并肩战斗，以毛主席的军事思想为武器，对林彪的资产阶级军事路线进行深入批判。延安军分区机关和独立连的干部、战士，到毛主席旧居凤凰山麓、杨家岭、王家坪、枣园，学习毛主席指挥革命战争的伟大实践，邀请退休老红军和原陕甘宁边区特等劳动英雄、老民兵作报告，加深了对毛主席的人民战争光辉思想的理解。"},{"type":"paragraph","text":"延安军民把分析战例和学习毛主席军事思想、批判林彪的“六个战术原则”结合起来，使批判不断深入。宜川县人民武装部和县中队的干部、战士，到当年宜川战役的战场进行社会调查，同参加过战役的战斗英雄、贫下中农一起座谈，回忆战史，大家从宜川战役的胜利进一步体会到毛主席关于集中优势兵力打歼灭战思想的无比正确。延安县武装部同志与青化砭、羊马河、蟠龙等地的民兵和群众，认真学习毛主席的十大军事原则，回忆毛主席在陕北亲自指挥的三战三捷的光辉战例，批判林彪的所谓“六个战术原则”。大家说，解放战争时期，在西北战场上，我军主力只有两万多人，而敌人有二十三万多人。为了在运动中歼灭敌人有生力量，我军主动撤离延安。仅四十天，就取得了三战三捷的重大胜利。在毛主席亲自指挥下，经过一年多的作战，歼敌十万多，我军由两万多人发展到十万多人，延安又重新回到人民手中。历史事实雄辩地证明：只有在运动中集中绝对优势兵力，歼灭敌人有生力量，才能最终地保守或夺取城市和地方。而林彪却公开对抗毛主席的军事思想和战略战术，他的所谓"},{"type":"paragraph","text":"“六个战术原则”，反对歼灭战，鼓吹打消耗战、击溃战，这是他的右倾机会主义在军事上的表现。"},{"type":"paragraph","text":"延安军民决心用当年跟随毛主席闹革命的无产阶级革命精神激励自己，把批判林彪资产阶级军事路线这一仗打好。"},{"type":"paragraph","text":"本报通讯员（附图片）"},{"type":"paragraph","text":"新疆吐鲁番县五星公社共青团大队的社员群众，在葡萄园里摆开革命大批判的战场，批判林彪的资产阶级军事路线。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bb4802d14"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
