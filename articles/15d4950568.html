tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热情赞扬毛主席的好战士蔡永祥《新越华报》全文转载我总政号召学习蔡永祥的通知","authors":[],"parts":[{"type":"paragraph","text":"新华社河内二十一日电 越南《人民报》二十日刊载一篇通讯，报道了毛主席的好战士蔡永祥在无产阶级文化大革命中抢救运送红卫兵的专车而英勇献身的光辉事迹。"},{"type":"paragraph","text":"这篇通讯的题目是：《中国人民解放军战士蔡永祥的勇敢的榜样》。这篇通讯热情赞扬一心为公的伟大共产主义战士蔡永祥“是欧阳海式的英雄，是毛主席的好战士，是中国人民的好儿子。”通讯说，蔡永祥学习雷锋、王杰、欧阳海、刘英俊等英雄的榜样，把青春献给了中国人民，他的英雄事迹鼓舞着中国人民和中国人民解放军。通讯说，一个蔡永祥牺牲了，将会出现千万个蔡永祥式的英雄。"},{"type":"paragraph","text":"河内《新越华报》最近也报道了蔡永祥的英雄事迹，并且全文转载了中国人民解放军总政治部号召全军广泛宣传和学习蔡永祥同志的光荣事迹的通知以及《解放军报》和《人民日报》的有关文章。RW：蔡永祥；外电评论"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15d4950568"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
