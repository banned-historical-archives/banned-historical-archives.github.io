事件不断增加","authors":[],"dates":[{"year":1954,"month":11,"day":11}],"is_range_date":false,"parts":[{"text":"沧县专区阶级敌人破坏农业生产合作社事件不断增加","type":"title"},{"text":"【本刊讯】从一月至十月二十日的不完全统计：河北省沧县专区地主、富农和反革命分子破坏农业生产合作社事件共三十五起。其中偷盗十二起，杀害牲畜十起，纵火三起，毁坏生产资料七起，其它方面三起。并有逐渐增多的趋势，第一季度发生两起，第二季度发生九起，第三季度发生十八起，十月份在二十天内即发生了六起。有些县、区的领导干部和乡村基层组织尚存在着严重的麻痹轻敌思想，对过渡时期农村中的阶级斗争尖锐化、复杂化认识不足。吴桥县最近检查了一百一十四个农业生产合作社，就有六十四个社混进了地主、富农和反革命分子达一百七十八名。(摘自河北日报十一月十一日“参考资料”)","type":"paragraph"}],"comments":[],"origin":"1954年11月19日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c8f7dd5d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
