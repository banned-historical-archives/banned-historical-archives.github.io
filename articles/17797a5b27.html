开英勇搏斗  学生强调必须把斗争矛头指向资产阶级国家政权，把斗争进行到底","authors":[],"dates":[{"year":1968,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本学生奋起斗争反对反动教育制度"},{"type":"paragraph","text":"广大学生占领学校，游行示威，举行罢课同反动军警展开英勇搏斗"},{"type":"paragraph","text":"学生强调必须把斗争矛头指向资产阶级国家政权，把斗争进行到底"},{"type":"paragraph","text":"新华社十二日讯　据东方通讯社报道：日本大学生正在展开斗争，反对佐藤政府的反动教育制度。"},{"type":"paragraph","text":"东京日本大学的学生自五月底以来一直在进行斗争，反对腐朽的管理制度和对学生实行法西斯统治。六月十一日和十二日，法律系和经济系的学生先后占领了本系的大楼，举行不定期的罢课，要求教育制度民主化。"},{"type":"paragraph","text":"十一日，日本大学的五千名学生在经济系教学楼前集会。这时，学校反动当局调动一批暴徒野蛮地袭击学生。他们挥舞棍棒和刀剑殴打学生，并从经济系教学楼向下扔桌椅和各种钢制家具攻击学生，使一百多名学生受伤。英勇的学生用石块和旗竿作武器，坚决回击。不久，佐藤反动政府又派来一千多名警察镇压学生。学生继续坚持斗争，直到深夜。另一方面，法律系的学生占领了法律系教学楼，在楼门口设置了路障，并宣布罢课。"},{"type":"paragraph","text":"十二日下午，日本大学的三千多名学生再一次在校园里举行集会。在会上讲话的学生一致表示要把斗争进行到底。他们说，必须把斗争的矛头指向反动的资产阶级国家政权。会后，学生们举行了声势浩大的示威游行，并从经济系的教学楼赶走了暴徒，占领了这座楼。他们用桌椅设置了路障，固守在楼里举行罢课。"},{"type":"paragraph","text":"学生们在经济系和法律系的教学楼的墙壁上，贴满了无数传单和标语。这两座教学楼的窗户上飘扬着斗争的旗帜。"},{"type":"paragraph","text":"东京医科和牙科学院以及东京大学医疗系的学生也举行罢课，反对佐藤政府制订的反动的实习医生制度。这场斗争已经坚持了一百二十多天。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17797a5b27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
