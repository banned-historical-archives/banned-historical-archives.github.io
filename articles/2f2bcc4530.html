[],"dates":[{"year":1959,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东、刘少奇、周恩来同志致电祝贺"},{"type":"paragraph","text":"赫鲁晓夫同志六十五寿辰"},{"type":"paragraph","text":"新华社16日讯　4月17日是苏联共产党中央委员会第一书记、苏联部长会议主席赫鲁晓夫同志的六十五岁寿辰。我国家领导人毛泽东、刘少奇和周恩来今天联名向赫鲁晓夫同志发了一封贺电。电文如下：亲爱的尼·谢·赫鲁晓夫同志："},{"type":"paragraph","text":"当你六十五岁寿辰的时候，我们谨代表中国共产党、中华人民共和国政府和中国人民向你、苏联共产党和苏维埃国家的杰出的领导者和活动家、中国人民亲密的朋友表示最热烈的祝贺。"},{"type":"paragraph","text":"我们衷心地祝你健康长寿，并且在领导伟大的苏联人民进行宏伟的共产主义建设和捍卫世界和平的崇高事业中获得更辉煌的成就。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"刘少奇"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"1959年4月16日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f2bcc4530"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
