ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"在关于张国焘最近情况简报上的批语","alias":"","parts":[{"type":"paragraph","text":"在关于张国寿！最近情况简报?上的批语"},{"type":"paragraph","text":"（1959年1月）"},{"type":"paragraph","text":"应劝张国焘割断他同美国人的关系。如能做到这点，可考虑给以个人生活方面的补助。毛注。"},{"type":"paragraph","text":"[1]张国焘，1921年参加中国共产党第一次全国代表大会。以后曾被选为中央委员、政治局委员、政治局常委。1931年任鄂豫皖中央分局书记、中华苏维埃共和国临时中央政府副主席等职。1935年6月红军第一、第四方面军在四川懋功（今小金）地区会师后，任红军总政治委员。他反对中共中央关于红军北上的决定，进行分裂党和红军的活动，另立中央。1936年6月被迫取消第二中央，随后与红军第二、四方面军一起北上，12月到达陕北。1937年9月起，任陕甘宁边区政府副主席、代主席。1938年4月，逃出陕甘宁边区，投入国民党特务集团，随即被开除出党。1959年时正寓居香港。1979年死于加拿大。"},{"type":"paragraph","text":"[2]1959年1月5日印发的这份内部情况简报说，张国焘去年10月表示愿意为新中国政府做点事，并要求给他以生活补助。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":191,"page_end":191},"tags":[{"name":"毛泽东","type":"人物"},{"name":"张国焘","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4dc0075b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
