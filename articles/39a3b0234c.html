es":[{"year":1963,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社万象2日电】　老挝爱国战线党总书记、老挝民族团结政府新闻、宣传和游览大臣富米·冯维希今天向新华社记者发表谈话说，他完全同意毛泽东主席和胡志明主席所发表的支持越南南方人民反对美国-吴庭艳集团的斗争的声明。"},{"type":"paragraph","text":"他说，老挝人民和佛教徒支持越南南方人民的正义斗争。康开、桑怒和其它地方的人民和僧侣对美-吴集团迫害越南南方人民的暴行已经表示了强烈的抗议。"},{"type":"paragraph","text":"富米·冯维希强调指出，美-吴集团的残暴并不证明它们的强大，而只表明它们的没落和虚弱。得到全世界人民支持的越南南方人民的正义斗争必将取得最后胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39a3b0234c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
