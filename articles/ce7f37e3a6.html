明大道。","authors":[],"dates":[{"year":1948,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"边区人民真心拥护土地法"},{"type":"paragraph","text":"贫雇农积极打破别人对土地法的曲解，领上大家走毛主席指给的光明大道。"},{"type":"paragraph","text":"【本报消息】土地法大纲公布后，获得全区人民热烈拥护。大家都说：\"共产党毛主席的办法真是英明。\"愿意坚决把平分土地整编队伍认真做好。"},{"type":"paragraph","text":"左权路王沟等山庄的贫雇农，跑很远路到主村高家井听讲土地法，讨论时也很热心。马圈山庄贫农张福林说：\"过去恶霸地主剥削的俺吃不上穿不上，有事来高家井，大小孩谁看起咱？这时候来高家井，远远地就有人喊：'老张来啦！'今天听土地法叫咱穷人掌权，这真是娘生以来头一次。\"昔阳南榆村贫雇胡三荣、刘富恒说：\"这可好，土地要分得公平了。咱村地主少，斗争些地，把好地近地都叫干部分啦。咱不敢提意见，伢（人家）也不给咱分好东西。这次咱也能分到一份地；这才真能人人有饭吃，人人有地种。\"临漳三庞村安其成说：\"俺村村北村东都是好地，村南村西都是沙地。我有七、八亩西南地，分了二十亩还是西南地；打的粮食不够吃，这个新办法真救了我的命啦。\""},{"type":"paragraph","text":"还有些地方贫雇认为：\"土地法好是好，就是怕办不到。\"他们多是从过去的经验想的。如沙河东户村贫雇农说\"过去光说贫雇当骨干，那是个假名，贷款时贫雇一个钱也没使上。\"西户村贫雇也说：\"过去运动中干部光说贫雇带头，可是分果实就不让贫雇管了。干部分果实时想叫群众拥护，就提出：吃水不忘掏井人。结果拥护了十六棵柏树。群众落了个翻身空名。\"这些人经过宣传土地法，懂得了贫雇当家的大道理，认识到他们这次要真正起来好好干。"},{"type":"paragraph","text":"还有些贫雇农对于给地主和住在乡村的蒋军官兵家属分一份有些怀疑，有的是因为地主没斗透。如昔阳紫坪村李贵福说：\"就是分给地主一份也可以，咱村地主没斗垮，比咱翻身农民还吃得好穿得暖，我不同意农民分地他也分。\"也有些人想不通。如长治西故县村阎双庆说：\"给地主分地种，我不同意，这不等于倒果实吗？\"曹全太说：\"国民党军官和咱打，是咱仇人，咱再给他地种，我不同意。\"经过宣传土地法，大家想清楚了道理。西故县村原松山说：\"分给国民党官兵家庭地种，我同意这一意见。咱把地给他种，他知道了，可以放下武器回来，咱们的胜利可以早点。\"李三旺说：\"地主也要分一份才行；以现在说，地主啥也没有，吃穿都得咱给他。要是不分给他地种，咱再不叫他做活，就要饿死，坏了咱解放区的政策，对咱农民也没利。\"他们一致认为只要地主土地财产全部没收了，政治上低头了应该分他一份。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce7f37e3a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
