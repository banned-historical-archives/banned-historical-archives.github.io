ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"及时补充兵力连续作战","alias":"","parts":[{"type":"paragraph","text":"及时补充兵力连续作战川"},{"type":"paragraph","text":"（1950年11月21日）周："},{"type":"paragraph","text":"这是老报，今天再看，他们的意见是对的，不是换班休整，而是有缺即补，连续作战。请加注意。十二月份，宋兵团须补一批，估计五六千人，十三兵团也许还要补一点，估计四五千人，共约万人。明年一月起，大约每月须补一万一二千人。请按此筹划为要。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月二十一日[1]这是毛泽东在中国人民志愿军入朝10天战情报告上写的批语。[2]周，指周恩来。"},{"type":"paragraph","text":"[3]指1950年11月5日彭德怀和邓华关于中国人民志愿军入朝作战10天的情况给中共中央军委和东北军区司令部的电报。电报中提出，为使各军能连续作战，建议军委将预定补充之兵员分批拨来，每一战役后立即补充，这样比轮番换班休整有利。"},{"type":"paragraph","text":"[4]宋兵团，指中国人民志愿军第九兵团，兵团司令员兼政治委员宋时轮。毛泽东全集第二十九卷"},{"type":"paragraph","text":"请电话询高岗\"，对宋兵团所要求的棉帽、棉鞋、棉手套、棉大衣，是否已在前送，送到什么程度？"},{"type":"paragraph","text":"毛泽东[1]高岗，当时任东北军区司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":378,"page_end":379},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cba9cfab7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
