ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"致彭德怀电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀电！"},{"type":"paragraph","text":"（1947年9月14日）"},{"type":"paragraph","text":"陈、谢已克灵宝、阅乡、卢氏，现正以三个旅攻陕县，三个旅向西急进，直迫潼关。鲁崇义的整编三十师主力现被我王新亭部阻困于临汾，难于西撤。西安、潼关线空虚。拟令陈、谢攻克陕县后率五个旅向渭南、华阴攻进，以秦基伟三个旅及三十八军一部留豫西活动。"},{"type":"paragraph","text":"在此种情况下，我军似宜扭住刘、董于大小劳山以北、永坪以南地区，协助陈、谢得手，削弱刘、董，使其恐慌动摇，进退维谷，至时机成熟时，各个歼灭之，或与陈、谢直接会合于渭水以北根本解决之。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致彭德怀电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":279,"page_end":279},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25e1a0fd4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
