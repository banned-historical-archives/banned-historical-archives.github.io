{"year":1970,"month":8,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沿着毛主席的建军路线胜利前进"},{"type":"paragraph","text":"人民解放军广大指战员认真学习古田会议决议和一九六○年军委扩大会议决议，突出无产阶级政治，以一好带动三好，蓬勃开展四好连队运动，永远沿着毛主席的建军路线胜利前进！"},{"type":"paragraph","text":"一等功荣立者孙玉国向同志们介绍靠毛泽东思想打胜仗的经验时说：我们这些基层干部和战士都没有打过仗，但是有了毛泽东思想，我们就一不怕苦、二不怕死，就能战胜一切敌人，就能无敌于天下。"},{"type":"paragraph","text":"“人民解放军永远是一个战斗队。”被人们誉为“海上猎手”的海军某部六五五艇，乘风破浪，斗志昂扬地守卫着祖国神圣的海防。"},{"type":"paragraph","text":"黄海前哨解放军某守岛部队和民兵，牢记毛主席关于“提高警惕，保卫祖国”的伟大教导，紧密团结，并肩战斗，日日夜夜地守卫在海防线上。"},{"type":"paragraph","text":"昆明部队某部一连指战员，常年驻扎在云南省某地，和边疆各族人民结成了深厚的鱼水情谊。"},{"type":"paragraph","text":"解放军某部医务人员遵照毛主席的教导，来到牧民居住的地方，为哈萨克族牧民治病。"},{"type":"paragraph","text":"杜凤瑞生前所在中队的指战员，加强战备，随时准备消灭一切敢于来犯之敌！"},{"type":"paragraph","text":"（本报通讯员和新华社供稿）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a57eccc3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
