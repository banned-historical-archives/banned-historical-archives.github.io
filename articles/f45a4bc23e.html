art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见格兰特","authors":[],"parts":[{"type":"paragraph","text":"新华社六月二十八日讯 人大常委会委员长叶剑英今天上午在住所会见了联合国儿童基金会执行主任詹姆斯·格兰特。"},{"type":"paragraph","text":"叶剑英和格兰特一九四六年在北京相识，今天再次见面，十分高兴。叶剑英称赞格兰特在维护世界和平和提高儿童福利方面所作的努力。格兰特说，他通过这次访问看到了中国三十多年来在医疗卫生和其它方面取得的成就。"},{"type":"paragraph","text":"叶剑英和格兰特还回顾了过去相处时的情景。格兰特向叶剑英赠送了当时他们和黄华、马海德等人的合影。"},{"type":"paragraph","text":"国务委员兼对外经济贸易部部长陈慕华参加了今天的会见。"},{"type":"paragraph","text":"6月28日，人大常委会委员长叶剑英在他的住所会见了联合国儿童基金会执行主任詹姆斯·格兰特（右一为陈慕华国务委员）。 新华社记者摄RW：叶剑英；接见外宾"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f45a4bc23e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
