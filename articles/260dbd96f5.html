{"year":1967,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:上山下乡、支援外地、边疆建设的大方向必须坚持，不能以任何借口加以动摇。上海市静安区数百位支疆青年革命家长在这场大风大浪中，坚持正确的立场，教育自己的子女坚守生产岗位，安心参加边疆的社会主义建设。这种革命精神，十分可贵。"},{"type":"paragraph","text":"对于支疆工作中的错误、缺点，那是应该造反的。我们主张“打回老家去，就地闹革命”，不赞成把矛盾上交，或者集中到上海来，这样既无助于问题的解决，也不符合贯彻“抓革命，促生产”的方针。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"260dbd96f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
