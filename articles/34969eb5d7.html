<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发中南局关于协助民主党派发展党员的办法","authors":[],"dates":[{"year":1951,"month":11,"day":23}],"is_range_date":false,"parts":[{"text":"中共中央转发中南局关于协助民主党派发展党员的办法","type":"title"},{"text":"各中央局，华南分局：","type":"appellation"},{"text":"兹将中南局十月十一日电报发给你们，中央同意中南局对协助民主党派发展党员所采取的积极态度和办法。望其他中央局也注意此事，使几个主要民主党派于一九五一年发展一倍党员的计划能大体实现。","type":"paragraph"},{"text":"中南局来电中关于吸收民主党派人员和无党派人员参加协助小组一节，尚须考虑。因为各民主党派里面有些领导人员极怕妨碍他们的组织独立性，而有许多无党派人员则不愿参与民主党派的事情。因此，使协助小组只由一定的共产党员和青年团员参加，而与有关民主党派和无党派人士协商办事，则可免去可能因上述情现发生的某种消极影响。","type":"paragraph"},{"text":"此外，民主党派接受新党员和建立新组织的事情，必须由有关民主党派自己来处理，切不可由我们代替办理，过去有个别地方的统战部直接替民主党派（民建会）建立组织，已发生不好的影响，今后应注意防止。","type":"paragraph"},{"text":" 中央一九五一年十一月二十三日","type":"paragraph"},{"text":"中南局关于协助民主党派发展党员的办法","type":"subtitle"},{"text":"分局、各省（市）委并报中央：","type":"appellation"},{"text":"我区今年计划协助民主党派最低发展四千人左右，根据目前统计已发展六O九人，只占百分之十五弱。已派进去的党团员更为稀少，总的情况是不能令人满意的。除广西外，在镇压反革命高潮后，各地都拖了一步。民主党派发展虽已粗具条件，但今年所剩时间无几，倘错过良机明年势陷被动。兹建议数点，请督促统战部和有关部门注意，务必完成今年协助计划。","type":"paragraph"},{"text":"（一）加强对党团员的统战政策教育。向党内和团内讲清楚协助民主党派发展组织，建立骨干，是使民主党派随时代前进的重要步骤。各地亟应早日确定参加民主党派的党团员名单，切实配备到为其发展数字的十分之一、二的党团员进去，并向他们交代进去后的任务。","type":"paragraph"},{"text":"（二）凡已同意民主党派去发展的政府机关和学校中，皆应建立协助小组，吸收机关秘书长（或办公室主任）、党团支部负责人、机关中民主党派进步分子（如机关中无民主党派成员，可由该党派酌派适当人选）及无党派人士等参加，负责进行宣传教育研究和动员发展对象及提出推荐名单等工作。","type":"paragraph"},{"text":"在今年发展数目中，必须保证进步力量（党、团员进步分子、中左分子占优势）以便协助民主党派建立起进步骨干。","type":"paragraph"},{"text":"（三）今年主要协助民盟、民革在机关学校中发展一批（民建以中小工商业者及工商业从业人员为主要对象），政府机关内部统战工作亦应以此为重点，各该部门的党团组织和政府的秘书长及办公室主任要负起责任定期作报告。","type":"paragraph"},{"text":"（四）在安排机关工作人员下去参加土地改革时，要帮助布置民主党派发展问题。","type":"paragraph"},{"text":"（五）在协助工作中，要注意克服散慢消极的情绪，及包办代替的现象。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34969eb5d7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
