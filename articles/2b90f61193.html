art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"从翁森鹤看“四人帮”的黑三条","authors":["楼忠才〖HH/换行〗DW：三二四三七部队"],"parts":[{"type":"paragraph","text":"伟大领袖和导师毛主席指出的关于无产阶级革命事业接班人的五条标准，是无产阶级培养和造就革命事业接班人的唯一正确的标准。然而，狗头军师张春桥，却另立了选拔干部的所谓“领导熟悉，群众拥护，上上下下要精干”三条黑标准。这三条标准的实际内容是什么呢？看一看在“四人帮”卵翼下横行霸道的翁森鹤就一目了然。"},{"type":"paragraph","text":"翁森鹤是混进革命造反派队伍里的坏人，是新生的反革命分子。他投机钻营，搞打砸抢，分裂革命队伍，破坏革命团结，野心勃勃，妄图抢班夺权。一九七四年，他曾到我们地区作过黑报告，内容极为反动，语言十分恶毒，把矛头直接指向伟大的领袖毛主席和党中央，煽动群众要打倒执行毛主席革命路线的省委主要领导同志，许多同志听了气愤地离开会场。"},{"type":"paragraph","text":"对于这样一个坏人，毛主席洞察情况，曾批示，青年要好的，不要×××、×××、翁森鹤那样的。而“四人帮”却狗胆包天，竟背着毛主席把翁森鹤三字划掉了，并吹捧翁森鹤“干得很不错”，示意将要重用他。"},{"type":"paragraph","text":"从翁森鹤的丑恶行径，我们可以清楚地看到，“四人帮”的所谓“领导熟悉，群众拥护，上上下下要精干”的三条标准，完全是“任人唯亲”的修正主义组织路线，地地道道的结帮篡权的黑标准。"},{"type":"paragraph","text":"他们的所谓“领导熟悉”，就是要象翁森鹤那样，忠于他们反革命的修正主义路线，死心塌地为他们篡党夺权效劳，在这一根本点上被他们所熟悉，所放心。他们的所谓“群众拥护”，恰恰是为他们这帮坏蛋所信任，被广大人民群众所厌恶和唾弃。他们的所谓“上上下下要精干”，就是要象翁森鹤那样，具有上窜下跳，八方串连，煽风点火，制造混乱，在乱中篡权的反革命本领。"},{"type":"paragraph","text":"从“四人帮”对翁森鹤的问题上，我们清楚地看到，他们否定毛主席关于革命接班人五条标准，另立黑三条，就是为了培植反革命势力，以便他们篡党夺权。然而，这只能是他们的痴心妄想。伟大光荣正确的中国共产党是不允许他们这样胡作非为的。华主席为首的党中央一举粉碎了“四人帮”，正是代表了广大党员和革命群众的共同愿望。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b90f61193"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
