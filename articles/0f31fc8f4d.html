tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东军事思想学术讨论会闭幕会议强调党对军队绝对领导是建军之魂立军之本","authors":["陈生庚"],"parts":[{"type":"paragraph","text":"这次学术讨论会的主题是：中国共产党的领导与人民军队建设。来自全军和武警部队及军外有关单位的70多名专家学者、理论工作者、师以上领导干部，提交了80多篇论文，其内容涉及到了党与人民军队的许多方面，从不同领域、不同角度、不同层次深入探讨了党对军队绝对领导的地位和作用，以及在新的历史时期如何坚持党对我国武装力量的领导等问题。"},{"type":"paragraph","text":"“党对军队的绝对领导，是我军的建军之魂、立军之本”。这是与会同志的共识。许多同志认为，必须把坚持党对军队的绝对领导作为我军建设的根本任务来抓，深入进行坚持党对军队绝对领导和社会主义信念教育，打牢思想基础；坚持一系列制度，从组织上保证党对军队的绝对领导；要努力做好军事工作，切实履行党赋予我军的根本职能；要加强军队中党的自身建设，保证枪杆子永远掌握在党的手里。"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f31fc8f4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
