script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中共上海市委、市革委会领导同志举行宴会热烈欢迎阿尔巴尼亚农业代表团王洪文、多德比巴同志先后讲话共赞中阿人民伟大友谊和战斗团结","authors":[],"dates":[{"year":1971,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　中共上海市委书记、上海市革命委员会副主任王洪文昨天晚上举行宴会，热烈欢迎由阿尔巴尼亚农业部长皮罗·多德比巴同志率领的阿尔巴尼亚农业代表团。"},{"type":"paragraph","text":"宴会前，王洪文同志与多德比巴同志等亲切会见，中阿两国战友进行了十分友好的谈话。"},{"type":"paragraph","text":"在充满了中阿两国人民伟大友谊和战斗团结热烈气氛的宴会上，王洪文同志与多德比巴同志先后讲话。王洪文同志在讲话中，赞扬具有光荣革命传统的英雄的阿尔巴尼亚人民，在伟大的马克思列宁主义者恩维尔·霍查同志为首的阿尔巴尼亚劳动党领导下，高举马克思列宁主义伟大旗帜，坚持无产阶级国际主义，为世界革命作出了杰出的贡献，在社会主义革命和社会主义建设中取得了伟大的成就。他说，在你们参观访问期间，我们一定认真学习你们反帝、反修斗争的丰富经验，学习你们社会主义革命和社会主义建设的丰富经验。王洪文同志说，经过无产阶级文化大革命锻炼的上海人民和全国人民一道，永远同阿尔巴尼亚人民团结战斗在一起，永远同全世界革命人民团结战斗在一起，相互支持、相互鼓舞，坚决把反对帝、修、反的伟大斗争进行到彻底胜利。"},{"type":"paragraph","text":"皮罗·多德比巴同志在讲话中热情颂扬了阿中两国人民在共同斗争中建立起来的深厚的战斗友谊。他说，我们的友谊是建立在马克思列宁主义基础上的，是由我们两国人民的伟大领袖毛主席和恩维尔·霍查同志亲自缔造的。我们两党、两国人民将永远团结、战斗在一起。多德比巴同志祝贺上海人民在毛主席的无产阶级革命路线指引下，在无产阶级文化大革命中取得的伟大胜利和在工农业生产方面取得的巨大成就。他说，我们为你们的成就感到欢欣鼓舞，你们的胜利，也就是我们的胜利。"},{"type":"paragraph","text":"席间，两国战友不断举杯，共祝中国人民的伟大领袖毛主席万寿无疆!共祝阿尔巴尼亚人民的伟大领袖恩维尔·霍查同志万寿无疆!"},{"type":"paragraph","text":"陪同阿尔巴尼亚农业代表团来上海的我国农林部负责人李光勋出席了宴会。"},{"type":"paragraph","text":"出席宴会的还有上海市革命委员会副主任王少庸以及有关方面负责人张辑五、徐妙林、高宗智等。"},{"type":"paragraph","text":"阿尔巴尼亚农业代表团十九日由南京乘专机到达上海时，在机场上受到了上海市革命委员会副主任王少庸和有关方面负责人的热烈欢迎。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王洪文","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39f01c5d3f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
