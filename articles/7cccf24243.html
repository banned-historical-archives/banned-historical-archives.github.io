script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"保证市内电车畅通无阻电车二场革命造反派工人打退了资产阶级反动路线新反扑","authors":[],"dates":[{"year":1967,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市公共交通公司电车二场革命造反派的工人坚决执行“抓革命，促生产”的方针，使市内公共交通保持畅通，彻底粉碎了资产阶级反动路线的新反扑。"},{"type":"paragraph","text":"电车二场党内一小撮走资本主义道路的当权派和极少数顽固坚持资产阶级反动路线的人，在文化革命大军气壮山河的声威下，感到自己的命运岌岌可危的时候，对革命造反派实行恶毒的攻击。他们造谣说:“车子没有，是因为造反派去造反了!”以此煽动不明真相的乘客对革命造反派不满，挑动群众斗群众，破坏文化大革命。但是，场里的革命造反派工人，最懂得毛主席提出的“抓革命，促生产”的巨大意义，坚决执行“抓革命，促生产”的方针。他们一方面对那些党内走资本主义道路的当权派和顽固坚持资产阶级反动路线的人的造谣，给以无情的反击，一方面积极耐心向那些受蒙蔽的群众进行宣传解释，劝他们听毛主席的话，回到生产岗位上来。他们说:“交通是上海的血脉，我们决不能让它停下来。”二十二路电车沿线有好几十家大工厂，为了保证工人按时上下班，不影响生产，这个车队的革命造反派队员在人力缺少的情况下，仍保证早晚上下班时的出车率。由于场里革命造反派职工对资产阶级反动路线的新反扑的迎头痛击，向少数被蒙蔽的工人耐心的宣传教育，全场六条线路的无轨电车和三条线路的有轨电车畅通无阻。粉碎了资产阶级反动路线的新反扑。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cccf24243"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
