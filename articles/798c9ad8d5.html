:["宁文俞","李华峰","河南医学院","黄德元"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"反对马克思列宁主义的右派言论","type":"title"},{"text":"河南医学院宁文俞黄德元李华峰","type":"authors"},{"text":"马克思主义现在有好些不适用了，不是那么神圣。马克思是100多年前的人，咋能看到今天。(宁文俞，工会文化教员)","type":"paragraph"},{"text":"马克思主义既是放至四海而皆准的真理，为什么有许多人不能接受？例如杜勒斯还说他们是真理。我认为真理是在历史发展阶段中大家公认的就是真理。例如上帝创造人（真理），能解释人的起源就是真理；又如在封建社会里人们都信佛教，所以佛教就是真理。(黄德元，26期学生)","type":"paragraph"},{"text":"阶级已不存在，用阶级眼光去分析是错误的。","type":"paragraph"},{"text":"人是自私的动物，大脑皮层是自私的产物，人不为己、天诛地灭，官大官小挣钱就好。(李华峰，25期学生)","type":"paragraph"}],"comments":[],"origin":"《右派言论集》（河南医学院马列主义教研室编印，1958年4月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"798c9ad8d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
