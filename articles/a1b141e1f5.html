tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远做毛主席的好战士","authors":["岳臣"],"parts":[{"type":"paragraph","text":"29日早晨，听说毛主席要接见我们，乐得我早饭也没有心思吃。在朝鲜，真是日日夜夜盼着这一天啊！“在朝鲜战场上当英雄，到北京去见毛主席！”这句口号给了我们极大的力量，使我们不怕任何艰苦困难，充满胜利信心地投入紧张的战斗。今天，当毛主席走向我们这边来的时候。我不知道怎么才好，只是使劲地鼓掌。见了毛主席以后我一直不能平静下来。我想：党和毛主席的英明领导、使我们在朝鲜前线接连不断地取得巨大胜利，戳穿了美国纸老虎，把敌人打回三八线。抗美援朝头一功，应该是党和毛主席的！"},{"type":"paragraph","text":"我想：党和毛主席领导全国人民大跃进，从安东到首都，我们在火车上看到祖国人民大翻耕地，大炼钢铁，到处干劲冲天，遍地开出鲜花，我们亲眼看到祖国更加强大更加美丽了。我们怎能不从心里感谢党和毛主席！"},{"type":"paragraph","text":"我想得很多，我越来越感到为党为祖国做的事太少了。我要以实际行动学习祖国人民的干劲，到最艰苦的地方去，担负最艰苦的任务，永远做毛主席的好战士，永远做“最可爱的人”！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1b141e1f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
