示","authors":[],"dates":[{"year":1951,"month":2,"day":7}],"is_range_date":false,"parts":[{"text":"中央关于镇压反革命问题给西北局的指示","type":"title"},{"text":"西北局：","type":"appellation"},{"text":"二月五日电〔注〕悉。你们关于镇压反革命的报告，是正确的。望即付之实行。你们应即在军区、军分区及各城市军管会与剿匪司令部下组织军事法庭，在减租土改地区组织人民法庭。凡土匪、特务、反革命案犯，在军事管制时其，经军事法庭判决执行，在内部经省委或地委批准后，即可执行，不必经过省政府或专署批准。在土改中的恶霸及反动地主则经人民法庭判决，其判死刑者则经专署批准执行。又，在城市中的反革命亦应大杀几批，才能压下反革命气焰，鼓励群众的情绪。应告诉我们的干部，对反革命的坚决镇压，只要我们不杀错办错，是完全符合最大多数人民利益的，理直气壮的。","type":"paragraph"},{"text":" 中央二月七日","type":"paragraph"},{"text":"根据刘少奇手稿刊印。","type":"paragraph"},{"text":"[注: 中共中央西北局一九五一年二月五日致电毛泽东并中央，报告西北地区镇压反革命的情况。电报说，两个月来，西北在镇压反革命过程中，破获重要案件四十余起，捕押五百多犯人。这期间，各地杀了匪首、惯匪、恶霸地主及反革命首要分子，共计五百余人，严重打击了反革命的气焰，打开了土改、减租工作局面，得到群众的普遍称赞。但从全部情况看，还存在杀得不狠，处理缓慢，甚至“宽大无边”的问题，还须继续用力掀起镇压反革命运动，争取在短期内把应杀的和应捕押的尽快处理，以求更有力地开展减租与土改运动。电报说，执行镇反计划，一定求稳，批准杀人一律在省上。]","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac5d7e4811"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
