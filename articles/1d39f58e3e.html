uthors":["中央文革调查组"],"dates":[{"year":1967,"month":8,"day":21}],"is_range_date":false,"parts":[{"text":"中央文革调查组接见首都红代会在宁战士时的讲话","type":"title"},{"text":"中央文革调查组","type":"authors"},{"text":"八月廿一日下午，中央文革江苏调查组接见了首都红代会大专院校在宁战士。总理秘书宋皋同志讲话要点如下：","type":"paragraph"},{"text":"（一）南京文化大革命开展比较早，交大，南大都比较早，但形势较复杂；","type":"paragraph"},{"text":"（二）要研究解决五月十四日后南京争论的焦点是什么，要历史的唯物的研究；","type":"paragraph"},{"text":"（三）五月十四日张春桥同志讲话是中央肯定的；","type":"paragraph"},{"text":"（四）如果都是造反派，为什么会出现这样的局面，有没有前台？有没有后台？有没有后台的黑后台？","type":"paragraph"},{"text":"（五）你们要宣传毛泽东思想，制止武斗，建立革命新秩序。","type":"paragraph"},{"text":" （首都大专院校红代会华东联络站《华东通讯》第十期）","type":"paragraph"}],"comments":[],"origin":"首都大专院校红代会华东联络站《华东通讯》第十期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d39f58e3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
