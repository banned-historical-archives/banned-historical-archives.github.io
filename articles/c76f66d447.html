:[{"year":1990,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希中友协举行报告会"},{"type":"paragraph","text":"介绍毛泽东革命生涯"},{"type":"paragraph","text":"新华社雅典５月３０日电  希中友协今天在这里举行报告会，介绍毛泽东的革命生涯。"},{"type":"paragraph","text":"报告人是大学教授迪米特里斯·基茨基斯先生。他在长达２个多小时的报告中，介绍了毛泽东的生平、中国的革命道路及毛主席在晚年的一些错误。"},{"type":"paragraph","text":"从事希中友好活动的２００多名希腊朋友以极大的兴趣听取了报告，并提了许多有关中国革命和建设方面的问题。"},{"type":"paragraph","text":"基茨基斯教授１９３５年生于雅典，毕业于波恩大学历史系。曾在１９５８年随同其母亲、希中友协创始人基茨基斯夫人前往中国，从此对中国文化发生了极大兴趣，开始研读中国历史，并于１９６８年和１９７０年两次访问中国。目前在大学教授中国历史课。"},{"type":"paragraph","text":"据悉，这是希中友协开展的旨在介绍中国的活动之一。该协会还将于６月和７月举办“中国文化艺术展”，邀请中央民族歌舞团来希演出。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c76f66d447"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
