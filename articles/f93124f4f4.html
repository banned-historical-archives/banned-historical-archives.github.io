rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东是当代的列宁美帝及其合作者现代修正主义都将被革命风暴扫除净尽","authors":[],"parts":[{"type":"paragraph","text":"新华社四日讯 布鲁塞尔消息：比利时共产党书记格里巴在一月二十一日的《人民之声》周刊上发表文章，谴责赫鲁晓夫修正主义者以所谓“联合行动”作幌子来掩盖他们同世界人民头号敌人美帝国主义的合作。"},{"type":"paragraph","text":"格里巴的这篇文章是为纪念列宁逝世四十二周年而写的。格里巴说：“列宁的著作谴责了改良主义的社会民主党背叛的领导人，同时也无情地谴责赫鲁晓夫修正主义目前的背叛活动。"},{"type":"paragraph","text":"“当没有赫鲁晓夫的赫鲁晓夫分子试图在冠冕堂皇的‘联合行动’幌子下掩盖他们同世界反动派的主要堡垒——美帝国主义实行的合作时，他们只不过是抄袭了列宁所批判过的工人阶级叛徒使用的办法。"},{"type":"paragraph","text":"“列宁主义者揭露改良主义的社会民主党领导人的背叛活动，这就使世界无产阶级事业经历了新的跃进。马克思列宁主义者揭露现代修正主义的背叛活动，这就能加强自己的战斗力，教育千百万新的革命者。”"},{"type":"paragraph","text":"格里巴强调指出：“美帝国主义及其社会民主党走狗和修正主义合作者，都将被革命的风暴扫除净尽。”他说：“在马克思列宁主义指导下的各国人民对帝国主义取得了一个又一个的胜利。正如沙皇、法英帝国主义的反苏‘防疫带’、希特勒帝国主义和日本军国主义过去没有能阻止革命取得新的胜利一样，目前成为全世界人民头号敌人的美帝国主义，现在不能、并且以后也不能作到这一点。”"},{"type":"paragraph","text":"格里巴在文章中还指出：“目前，列宁主义鼓舞着千百万人的革命行动。马克思列宁主义的理论已经进一步得到了发展、而且继续被把理论和实际联系起来的革命后代所发展。斯大林是列宁的继承者。毛泽东通过他的著作而成了当代的列宁。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f93124f4f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
