国合作","authors":[],"dates":[{"year":1963,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京7日电】　东京消息:日本共产党机关报《赤旗报》7日揭露，春日庄次郎等被开除的反党修正主义分子积极参与社会党、日本工会总评议会的右翼领导人分裂日本禁止原子弹氢弹运动的活动。"},{"type":"paragraph","text":"《赤旗报》说，社会党、日本工会总评议会等十三个团体的右翼领导人3月1日破坏了烧津集会以后，第二天在静冈召开了所谓“禁止原子弹氢弹运动全国积极分子集会”。参加会议的“积极分子”当中有前年被共产党开除的春日庄次郎、西川彦义、山田六左卫门等反党修正主义分子。"},{"type":"paragraph","text":"据报道，这个会议决定，要使日本禁止原子弹氢弹协议会继续处于停顿状态。这样，不久它就自然而然地崩溃。会议还决定，要以“十三个团体”广岛集会的路线推进禁止原子弹氢弹运动。"},{"type":"paragraph","text":"据报道，在会议上，春日庄次郎主张:“不应该考虑日本禁止原子弹氢弹协议会的统一”，“与其加强(协议会)同亚非各国人民的运动的合作，不如加强同美国的合作”。他还说，应该考虑组织禁止原子弹氢弹运动的“新组织”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56805f279c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
