ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"望研究破坦克之术叶","alias":"","parts":[{"type":"paragraph","text":"望研究破坦克之术1]"},{"type":"paragraph","text":"（1946年5月18日）林："},{"type":"paragraph","text":"（一）十六军一个师攻我北平城南之庞各庄，使用战车攻击，遇我坚强工事，攻击无效，现我正反攻中。顽军在四平方面准备使用坦克，望研究破敌之术。（二）我热河破击战已进行四天，除吸引十三军全部不能动外，又吸引九十三军新到之一个师开至热河。在此形势下，九十三军只能对付热河及北宁路。（三）据息，新六军之十四师使用于西丰方面，望注意。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"辰巧[1]这是毛泽东为中共中央军委起草的给东北民主联军总司令林彪的报。[2]庞各庄，镇名，位于今北京市大兴县南部。[3]热河，旧省名，辖今河北省东北部、辽宁省西南部和内蒙古自治区部地区，1955年撤销。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":325,"page_end":325},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1667955f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
