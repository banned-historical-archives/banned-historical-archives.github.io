art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席接见昂季准将","authors":["候波/孟庆彪"],"parts":[{"type":"paragraph","text":"新华社23日讯 刘少奇主席今晚接见了中缅边界联合委员会缅甸首席代表、缅甸国防军副总参谋长昂季准将，并且进行了亲切友好的谈话。"},{"type":"paragraph","text":"同时被接见的，有中缅边界联合委员会缅甸代表：缅甸驻中国大使叫温，克钦邦事务部秘书吴山伦，边境地区管理局局长苏敏上校、北掸邦专员吴昆翁佳，和顾问、缅北军区司令山友准将等。"},{"type":"paragraph","text":"接见时在座的，有国务院副总理陈毅，外交部副部长章汉夫，中国人民解放军副总参谋长张爱萍上将，中缅边界联合委员会中国首席代表姚仲明，外交部第一亚洲司副司长沈平等。"},{"type":"paragraph","text":"侯波/孟庆彪"},{"type":"paragraph","text":"图为接见时合影。前排左起第六人是昂季准将。"},{"type":"paragraph","text":"新华社记者侯波、孟庆彪摄"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a472eba44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
