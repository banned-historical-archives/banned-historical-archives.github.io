script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要求乌拉圭同国际货币基金组织断绝关系  乌拉圭首都五十万工人总罢工  秘鲁和智利一些美资企业工人罢工抗议美国资本家剥削","authors":[],"dates":[{"year":1971,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"要求乌拉圭同国际货币基金组织断绝关系"},{"type":"paragraph","text":"乌拉圭首都五十万工人总罢工"},{"type":"paragraph","text":"秘鲁和智利一些美资企业工人罢工抗议美国资本家剥削"},{"type":"paragraph","text":"新华社二日讯　蒙得维的亚消息：乌拉圭首都蒙得维的亚五十万工人一日举行二十四小时总罢工，强烈要求乌拉圭同国际货币基金组织断绝关系，抗议政府冻结工资和采取镇压措施。"},{"type":"paragraph","text":"参加这次总罢工的有各行各业的工人。由于总罢工，蒙得维的亚的工厂停工，学校停课，商店关门，报纸没有出版，港口、飞机场和其他交通运输部门也停止工作，使蒙得维的亚城完全陷于瘫痪状态。这是乌拉圭最近两年来最大的一次罢工。"},{"type":"paragraph","text":"新华社讯　秘鲁和智利的一些美资企业的工人最近举行罢工，抗议美国资本家的压迫和剥削，要求改善生活条件。"},{"type":"paragraph","text":"美国垄断企业南秘鲁铜公司近一千名港口装卸工人，三月二十三日在伊洛港举行不定期罢工，抗议美国资本家无视工人的权利。同一天，这家美国公司的托格帕拉铜矿的五千名工人也举行罢工，声援伊洛港罢工工人，维护自己的经济权利。罢工已使这家美国企业的托格帕拉铜矿和它在伊洛港的装卸业务陷于瘫痪。"},{"type":"paragraph","text":"属于美国资本的智利电话公司的四千名职工三月十八日举行罢工，要求增加工资。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8c2a6efab"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
