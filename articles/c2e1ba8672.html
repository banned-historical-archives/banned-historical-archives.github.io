s":[{"year":1950,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十八日电】　毛主席最近复信嘉勉石家庄电业局所属各厂及天津电业局第三发电厂全体职工。两处职工曾于八月八日和九月五日先后给毛主席写信，报告工作，保证以消灭事故，安全发电供电的实际行动来抗议美帝国主义的侵略罪行。两信经中央燃料工业部陈郁部长转给毛主席以后，毛主席亲笔复信如下:"},{"type":"paragraph","text":"陈郁同志:"},{"type":"paragraph","text":"转来石家庄电业局全体职工给我的信及天津电业局第三发电厂全体职工给我的签名信，均已收到。请你转告两处电业职工同志们，感谢他们的好意，希望他们团结一致，努力工作，为完成国家的任务和改善自己的生活而奋斗。　毛泽东"},{"type":"paragraph","text":"一九五○年九月十一日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2e1ba8672"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
