ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"关于在西沙群岛建立海军据点问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于在西沙群岛建立海军据点问题的批语！"},{"type":"paragraph","text":"（1960年8月3日）退罗瑞卿同志照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月三日"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央军委1960年7月报告上写给中共中央军委秘书长、中国人民解放军总参谋长、国务院副总理罗瑞卿的批语。"},{"type":"paragraph","text":"[2]中共中央军委的报告说：关于在西沙群岛建立海军据点问题，1959年3月，中央和周恩来同志已有批示，即海军在北礁和宣德群岛定期巡逻成功后，可在永兴岛上建立海军据点。海军自1959年3月17日执行巡逻西沙任务以来，迄今已历时一年又四个多月，共巡逻20次。为加强海南岛和西沙群岛的防务，加速西沙地区的经济开发，我们认为目前在永兴岛进行海军据点的建设，是必要的和适当的。在建设步骤上拟分两步进行：第一步建设营房、仓库、码头、雷达站等工程；第二步，在有利时机视情况再正式成立海军巡防区。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":8,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":461,"page_end":461},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dca22c07fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
