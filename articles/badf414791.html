s":["吴振全"],"dates":[{"year":1958,"month":4,"day":1}],"is_range_date":false,"parts":[{"text":"贵州各地在兴修水利中不断发生火药爆炸事故","type":"title"},{"text":"吴振全","type":"authors"},{"text":"新华社贵阳3日讯　贵州省各地今春兴修水利中，由于对购置的炸药管理不善，不断发生爆炸事故，造成重大伤亡和财产损失。如遵义县上溪镇供销社，3月23日发生黑色炸药爆炸事故，死伤九十七人，供销社的财产全部烧光，损失折款一万多元。兴义县桔山乡，也因不慎发生火药爆炸事故，死伤二十多人。类似这样事件，在大方、均匀、毕节等县都有发生。","type":"paragraph"},{"text":"以上严重情况，已引起中共贵州省委的注意。","type":"paragraph"},{"text":"来源：1958年4月9日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"badf414791"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
