script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5992","name":"中共中央转发教育部党组关于工宣队问题的请示报告","author":"中共中央","internal":false,"official":false,"type":"pdf","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives11/main/data/5992/5992.pdf"],"article":{"title":"中共中央转发教育部党组关于工宣队问题的请示报告","alias":"","parts":[{"type":"paragraph","text":"ERC Projekt"},{"type":"paragraph","text":"Geschenk"},{"type":"paragraph","text":"M15-133Mao LegacyUni Freiburg"},{"type":"paragraph","text":"Prof.Dr.Michael SthoenhalsInv."},{"type":"paragraph","text":"第"},{"type":"paragraph","text":"顶"},{"type":"paragraph","text":"中共中央文体AO"},{"type":"paragraph","text":"中发\u003c877\u003e45号"},{"type":"paragraph","text":"中共中央转发教育部党组关于工宣改问的的请示事告各者市，自治区党委各大军区者军区野战军党委中央和国家机关各部委完委党组"},{"type":"paragraph","text":"中兰业业装"},{"type":"paragraph","text":"军委各总命各军天种完委三1同L75.11（1418）"},{"type":"paragraph","text":"观将款育部完组关于之空队问的的请乐报告发给你仿望冬的执行。"},{"type":"paragraph","text":"在元产珍汉文化大某合中，遂些伟大会领袖和矛师线婴"},{"type":"paragraph","text":"毛习写的格空以进我不标，完的持之情悦下的特殊任务，是完命你求的，广大宣谈员在毛主源某会终我格引下在各级党委领矛下做了大量的工作，为社会这表自业做出了贡献，楚着三次元产论级文化大苹命的胜利结束和克的十大的事形努的新发层，备须完委却很主祝叔革今和加终了对字校的领予现在从子校云工空队己不影响天第"},{"type":"paragraph","text":"页产沉风款自了业和发展。望各风党委做称工空认员和群众的双治思愁三作，讲清楚报出云空队的积极意汉，充小当气之空以的成溪，勉励他们回引祈的商位上再接再励为社会认命和花会汉站没做出祈的贡献。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"1877-11-6"},{"type":"paragraph","text":"关于工空认向颂的清示报告国务院前报党中央"},{"type":"paragraph","text":"近个月素，一些者，市，自治区教自门常亲询问关于学校工空队的存.极问你，放近里龙江省文教办公宣反映，该有大学的工空改己报回进行努免整风，中办学的工空认也准路报问我们有什么老虑，观将我们对这间从的意见，请示报告义下，"},{"type":"paragraph","text":"一.无产瑜风文化大苹命期间，遵吃伟大领袖毛的格示，狐工宣队进主手校方加斗、批改是完创心办的，常及"},{"type":"paragraph","text":"页"},{"type":"paragraph","text":"第"},{"type":"paragraph","text":"二.年素在毛之席苹命路线指下，广大工空以员，在扭转当时“秋势”佚间括虎、骑伯志造我的手校一不斗、二不北，三不改的混乱简面适乏荒命的表将序，开展无产论风教苹命学方面，在各及亮委领寻下，做了古量它之验，付出辛执的学动，大会改教自了业做了贡献，旧时，在斗争中，努力有马到毛主病善作文意自身思想苹命化，不新托交了政治完悟"},{"type":"paragraph","text":"三.化如”的于拔、破坏故盛、拟梭常数下"},{"type":"paragraph","text":"一度迷失了双治方向，但纶太散之完队极寂工空改员，对：以希“的倒行逆论早就看在眼里恨在心头，做了风种形式的抵制和斗争"},{"type":"paragraph","text":"四.莫的弟十一次代表大会标志着历叶十一年的希次元产现汉觉化大某今空告胜利结束，我国社会议鞋命和适及进入了祈的发展时期，各汉完委加绝对叔肩的会会寻，学校完组织反益讽因和促会，广大叔自个者，砸辞双节“经加在身文的精神如领，长期受压抑的苹命积极收并发出斗，亿万了生为苹命发愤努力，了双治，了文化第"},{"type":"paragraph","text":"页子科技厨为风气，结智，体全面发展的一代新人正民茁壮成益，各行各业，千家了户关心故自支接叔育，从白叔有。一户会境我宁剑国人民大水叔自的祈局面正在诞奇形成，面这掉的大的利努许风志(包括不外工空改员)指云之空以死"},{"type":"paragraph","text":"救了，我们走接这积极站这，我们认为工空队己经完装"},{"type":"paragraph","text":"成了在特它条许下完主给的持殊任务，观在报云宁校已经不会前弱寻校完组织的领乱，这是就叔育战清说犹之灵战浅说粉碎“以命”一年风来，更气万马李腾的骄世"},{"type":"paragraph","text":"那择，学校口空认员回去后将给工交战线增加一大批胜利军。戈"},{"type":"paragraph","text":"五.各地在摘批“节“的过程种，通过深入细酸的思愁工作讲请上述积极意义。可以尽早空布报云导校工空队报出休女组给欢送，记到激励技午的作用。"},{"type":"paragraph","text":"至检货管会，还保由，但应坚择不脱产"},{"type":"paragraph","text":"从上意见，好无不当.请批银各者、予，自治区方些执行"},{"type":"paragraph","text":"中共教育党组"},{"type":"paragraph","text":"877.10.14"}],"authors":["中共中央","中共教育部党组"],"dates":[{"year":1977,"month":10,"day":14},{"year":1977,"month":11,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":4},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b94cff053"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
