rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的好战士中国人民的好儿子越《人民报》发表文章介绍刘英俊同志英雄事迹","authors":[],"parts":[{"type":"paragraph","text":"新华社河内二日电 越南《人民报》二日发表题为《刘英俊忘我保卫人民》的文章，介绍中国人民的好儿子、毛主席的好战士刘英俊在毛泽东思想哺育下成长为一位“生为革命生，死为革命死”的伟大的共产主义战士的英雄事迹，并且刊登了他的照片。"},{"type":"paragraph","text":"文章说，刘英俊自觉地勤奋地学习毛主席著作，把毛主席思想应用到日常生活中去，树立了无产阶级世界观。"},{"type":"paragraph","text":"文章热烈赞扬刘英俊的崇高的无产阶级国际主义精神，和他对越南人民的深厚的战斗情谊。文章说，沸腾着革命热血的刘英俊，经常关怀着和支持着正站在反对美帝国主义的第一线上的越南人民。"},{"type":"paragraph","text":"文章最后指出，刘英俊象雷锋、王杰一样，并且继承了雷锋和王杰的英雄传统，是以毛泽东主席为首的伟大的中国共产党和七亿中国人民的优秀儿子，是中国人民解放军的杰出代表，他给今天中国青年一代增添了光彩。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"948c124a74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
