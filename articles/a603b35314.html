art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"工人阶级领导学校好","authors":["闻军"],"parts":[{"type":"paragraph","text":"一九六八年七月二十七日，我国工人阶级遵照伟大领袖毛主席的战斗号令，登上了上层建筑领域斗、批、改的政治舞台，打破了资产阶级知识分子独霸的一统天下，把教育大权夺回到了自己的手里。这一伟大的革命创举，揭开了我国无产阶级教育革命的新篇章。"},{"type":"paragraph","text":"伟大领袖毛主席对工人阶级占领上层建筑各个领域，一开始就给予热情的支持和巨大的关怀。毛主席指出：“工人阶级必须领导一切。”“工人宣传队要在学校中长期留下去，参加学校中全部斗、批、改任务，并且永远领导学校。”八年来，进驻学校的工宣队，在毛主席革命路线的指引下，以阶级斗争为纲，领导教育，改造学校，斗资产阶级，批修正主义，战胜了阵阵妖风恶浪，取得了一个又一个的胜利。现在，教育革命的鲜花竞放，新生事物茁壮成长，崭新的无产阶级教育制度进一步建立和巩固，学校正变为无产阶级专政的工具，教育战线上发生了天翻地覆的变化，到处是莺歌燕舞的大好形势。"},{"type":"paragraph","text":"但是，资产阶级并不甘心失去他们的“世袭领地”，时刻梦想复辟。工人阶级从进入学校的第一天起，就同他们展开了尖锐的斗争。党内最大的不肯改悔的走资派邓小平，对工人阶级更是充满仇恨，胡说什么“依靠工农兵是相对的”，散布要由“热心科学的外行来领导”的谬论，妄图取消工人阶级的领导。“不斗争就不能进步。”进驻学校的工人阶级以大无畏的革命精神，带领广大师生与邓小平反革命的修正主义路线对着干，在斗争中赢得了胜利，进一步巩固了工人阶级在教育阵地上的领导地位。"},{"type":"paragraph","text":"工人阶级占领和改造学校虽然已经取得了伟大的胜利，但“走资派还在走”，教育阵地上占领与反占领、改造与反改造的斗争将是长期的，激烈的。战斗在教育战线上的工人阶级，决心发扬“可上九天揽月，可下五洋捉鳖”的革命精神，与党内资产阶级斗到底，为进一步搞好教育革命、巩固无产阶级专政而努力奋斗。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a603b35314"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
