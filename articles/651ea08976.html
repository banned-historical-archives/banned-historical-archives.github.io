ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"关于选看一些材料给江青的批语","alias":"","parts":[{"type":"paragraph","text":"关于选看一些材料给江青的批语"},{"type":"paragraph","text":"（1961年11月19日）"},{"type":"paragraph","text":"一批材料\"，送给江青，从中选一些看，不必全看。我好，勿念。最近信已收到，待另复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1961年11月19日"},{"type":"paragraph","text":"[1]这批材料共有5种：一、中共中央对外联络部1961年4月29日编印的一份内部刊物上刊载的5篇材料。在其中的第四篇《美国军事家说西方国家无法对付毛主席的持久战战略》一文标题旁，毛泽东加了着重号，并批示“江青阅”；在其中的第五篇《美国认为赫鲁晓夫是马列主义“理论的革新者”》一文标题旁，毛泽东加了着重号，该文讲到赫鲁晓夫有三点令美国人难以置信，毛泽东在这三点旁写了一条批语，即本篇二。二、毛泽东1961年4月15日批示印发的几个重要文件。三、中共中央1961年5月17日印发的《中央书记处关于录音、记录问题的决定》。四、中共山东省委1961年4月4日关于宣读讲解人民公社条例草案试点情况给中央、华东局的报告。五、中共中央办公厅1961年4月9日编印的《情况简报》第一四二号刊载的河南省潢川县两个生产队干部和少数社员对人民公社工作条例草案的反映。在第二、三、五种材料上，毛泽东均批示“江青阅”；在第四种材料上，毛泽东批示“送江青阅”。"},{"type":"paragraph","text":"关于选看一些材料给江青的批语"},{"type":"paragraph","text":"二这三条都可以解释。"},{"type":"paragraph","text":"[1]指《美国认为赫鲁晓夫是马列主义“理论的革新者”》这一内部材料中所说赫鲁晓夫令美国人难以置信的三点。这三点分别是：（1）目前国际形势对世界共产主义运动空前有利，为什么作为共产党领导人的赫鲁晓夫却偏偏要在这个时候“放弃世界革命”，这是“一个无法解释的矛盾”。（2）西方仍有着“广泛的（军事）联盟体系”“核打击力量，和遍布全球的基地网以对付共产主义集团”，赫鲁晓夫有什么理由断言“猎获物已放进口袋”或“资本主义包围已不再存在”？（3）赫鲁晓夫真正相信资本主义可以和平地过渡到社会主义吗？“历史证明除非得到武装征服的支持或者共产党的军事力量就在附近，非暴力的革命策略从来没有能够使任何一个国家落入共产党的统治之下”“难道赫鲁晓夫根本没有从共产党人过去40年的经验中学到任何东西吗”？怎么能够设想他会相信“美国有可能在得不到苏联武装力量帮助的情况下实现一次共产主义革命”？"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":11,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":484,"page_end":485},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"651ea08976"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
