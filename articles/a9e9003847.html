复辟，苏联人民的民主权利已无影无踪","authors":[],"dates":[{"year":1976,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》发表评论"},{"type":"paragraph","text":"苏修同美帝一样压迫和剥削人民"},{"type":"paragraph","text":"随着资本主义全面复辟，苏联人民的民主权利已无影无踪"},{"type":"paragraph","text":"新华社地拉那电　阿尔巴尼亚《人民之声报》三月三日发表评论，揭露美帝国主义和苏联社会帝国主义对工人阶级和劳动人民进行压迫和剥削的罪行。"},{"type":"paragraph","text":"评论说，在资产阶级和修正主义民主的招牌后面，掩藏着剥削和压迫，掩藏着警察暴力直至法西斯主义。今天，美、苏两个帝国主义超级大国便是这种资产阶级民主的典型例子。"},{"type":"paragraph","text":"评论说，在美国，工人没有就业的自由，而只有资本家随意雇佣和解雇工人的自由。同样，在那里也没有平等可言。"},{"type":"paragraph","text":"评论接着指出，随着资本主义在苏联的全面复辟，苏联官僚垄断资产阶级“也采取同样的方式方法剥削和压迫工人阶级和劳动农民”。“苏联今天的现实说明，列宁、斯大林时代的社会主义民主已经无影无踪。”如今在苏联“丝毫不能保证工人阶级和其它劳动群众的自由，而是不断地对他们进行压迫和剥削，对资产阶级的反对者，即普通劳动人民进行迫害，把他们投入监狱。”"},{"type":"paragraph","text":"评论说，社会不平等现象和民族压迫的事例清楚地说明，苏联人民的每项民主权利都遭到了践踏。由于民族压迫和在一切生活领域里采取的种族歧视，各加盟共和国的非俄罗斯族工人的生活水平与俄罗斯族工人相比要低得多。"},{"type":"paragraph","text":"评论说，苏联修正主义者大肆吹嘘所谓选举自由。然而实际上，象去年进行的最高苏维埃选举，只不过是一场充满喧闹和蛊惑欺骗的滑稽剧而已。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9e9003847"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
