tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以最高的自觉 紧跟毛主席的伟大战略部署","authors":["安徽省军区机关无产阶级革命派赴京学习全体代表"],"parts":[{"type":"paragraph","text":"我们日日夜夜渴望见到全世界革命人民的伟大导师、我们心中最红最红的红太阳毛主席的愿望，今天终于实现了！"},{"type":"paragraph","text":"“毛主席万岁！万万岁！”我们的嗓子喊哑了，我们饱含着幸福的热泪，我们的心激动得几乎要跳了出来！我们见到伟大领袖毛主席满面红光，神采奕奕，身体非常非常健康。我们一千遍一万遍地衷心敬祝我们伟大领袖毛主席万寿无疆！万寿无疆！万寿无疆！万寿无疆！"},{"type":"paragraph","text":"毛主席呀，毛主席！您最了解群众，最关心群众，最信任群众，永远同群众心连心。当我们起来同资产阶级反动路线作斗争的时候，是您老人家的光辉思想，给了我们无穷的力量；当我们在斗争中遇到暂时困难的时候，又是以您老人家为首的无产阶级司令部给了我们最大的关怀，最大的支持；在无产阶级文化大革命取得了决定性胜利的大好形势下，您老人家发出了要斗私，批修的伟大号召，又给我们指明了前进的方向。"},{"type":"paragraph","text":"我们向您老人家宣誓：我们永远忠于您，永远忠于您的光辉思想，永远忠于您的革命路线。您指到那里，我们就坚决打到那里，刀山敢上，火海敢闯。谁胆敢反对您和您的伟大思想，胆敢动摇以您为首的无产阶级司令部，我们就坚决同他拚到底！我们坚定地大树特树您的绝对权威，大树特树您的伟大思想的绝对权威，大树特树您的革命路线的绝对权威！"},{"type":"paragraph","text":"我们向您老人家宣誓：我们一定按照您的指示，以“斗私，批修”为纲，办好毛泽东思想学习班。我们一定更刻苦、更勤奋地学习您的光辉著作，以您的伟大思想武装头脑，在灵魂深处爆发一场破私立公的革命，努力改造自己的世界观。同时，按照您的伟大思想，正确地对待犯错误的干部，和他们一起，活学活用您的光辉著作，满腔热情地帮助他们改正错误，为革命、为人民立新功。"},{"type":"paragraph","text":"我们向您老人家宣誓：我们一定以您的伟大思想为武器，以最高的自觉，紧跟您的伟大战略部署，开展更广泛、更深入的革命大批判，坚决把中国赫鲁晓夫及其代理人批深批透，斗倒斗臭，彻底肃清他们的流毒，誓把无产阶级文化大革命进行到底！"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84d6604e95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
