<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东和乘务员","authors":["刘学骞"],"dates":[{"year":1993,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东和乘务员"},{"type":"paragraph","text":"原毛主席专列副队长　刘学骞"},{"type":"paragraph","text":"１９５７年，我被分配到毛主席专列上工作。那年我２６岁，先是担任乘务员，以后又当过工长、专运车辆段副段长，一直干到１９７６年。在１９年的时间里，我们这些普通铁路工人跟着毛主席走遍了祖国大江南北，他老人家的音容笑貌至今历历在目。"},{"type":"paragraph","text":"一张珍贵的照片"},{"type":"paragraph","text":"在专列上工作，我们既感到光荣，也深感责任重大。因为专列可以说是党中央“流动的心脏”，不能有丝毫的马虎，必须做到万无一失才行。"},{"type":"paragraph","text":"１９６４年３月２８日，专列停在邯郸附近。我们几个乘务员抓紧时间下车检查空调设备。这时，只见正在站台上散步的毛主席朝我们走来。我们向主席问过好，主席微笑着点点头，停在我们跟前，边弯腰看我们调试设备，边问：“这是什么设备？”我紧张得不知怎样回答。主席以为我听不懂他的湖南话，放慢节奏又问了一遍：“这是什么设备呀？”旁边有位同事提醒我：“刘工长给主席介绍介绍吧。”我这才平静下来，赶紧回答：“主席，这是空调设备用的自动开关。”主席又问：“那怎么启动呢？”我说：“这种开关分三级启动，一级比一级快，能自动开动，自动关闭。”主席又详细询问了乘务员人数、如何分工、由谁带班等等。此时，随行的新华社记者孟庆彪同志按下了快门，留住了这珍贵的历史瞬间。"},{"type":"paragraph","text":"主席惦着我们的冷和暖"},{"type":"paragraph","text":"生活里的主席没有架子，对乘务员体贴关心。逢到夏季，有时列车停在南方某地，他想到车厢里温度高，就让人安排我们到当地招待所休息。１９６６年春节，列车停在武汉。大年三十那天，主席派人给我们送来水果和糖。正月初一，我们在列车上开了春节茶话会。"},{"type":"paragraph","text":"还有一次，我们被邀请参加当地组织的小型晚会。一进会场，我们发现主席已经坐在那里，便快步上前想向主席问好，没想到主席先站起来跟我们打招呼，我们一时竟不知如何是好。"},{"type":"paragraph","text":"主席让我们上井冈山"},{"type":"paragraph","text":"当时，专列上的乘务员大都是年轻人。主席在列车上处理国家大事的同时，还非常关心青年乘务员的成长。每到一地，他总是嘱咐有关人员组织我们参观学习。１９６５年３月，主席乘专列南下，５月到达湘赣边界，停在樟树支线。２３日这天，他对随行的汪东兴同志说：“安排工作人员和专列上的工作人员，还有湖南来的同志分批参观一下井冈山。最好请当地熟悉情况的同志帮忙介绍一下，让年轻人增加些历史知识。”（见《汪东兴日记》）。专列乘务员分两批上了井冈山，参观了井冈山博物馆、烈士纪念碑、五大哨口、黄洋界和毛主席在大井的故居。"},{"type":"paragraph","text":"在大井，我们见到当年的赤卫队队长邹文楷同志。他领我们来到房前一块大石头前，生动地描述说，毛主席当年经常独自一人坐在这块石头上思索。我们望着那块石头，感慨万端。    　（刘军整理）（附图片）"},{"type":"paragraph","text":"1964年3月，专列停在邯郸车站，毛主席向刘学骞同志问询空调机原理。"},{"type":"paragraph","text":"新华社记者孟庆彪摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00b2408bad"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
