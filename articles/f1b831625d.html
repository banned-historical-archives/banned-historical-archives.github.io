ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对周恩来关于召开四届人大等问题报告的批语","alias":"","parts":[{"type":"paragraph","text":"对周恩来关于召开四届人大等问题"},{"type":"paragraph","text":"报告的批语！"},{"type":"paragraph","text":"（1970年3月14日）同意中央的部署。"},{"type":"paragraph","text":"三月十四日下年"},{"type":"paragraph","text":"[1]这个批语写在周恩来1970年3月14日给毛泽东等的报告上。报告说，汪东兴回京后，传达主席关于筹备召开四届人大的指示，政治局在京同志一致拥护，立即着手进行。工作分几个方面：第一，关于四届人大代表名额和选举问题，由恩来等5人组成一个工作小组，现起草好了一个决定稿，并作了修改，13日晚已在政治局有关会议上讨论通过。现送上，请审阅批示。有些不便写入这一文件的，拟与各省来京同志面谈。周恩来送审的决定稿包括四届人大的指导思想，四届人大代表的条件、名额、比例、选举方法等5个部分。第二，关于修改宪法工作小组，已由康生等5人组成，拟在3天后将修改要点写出，待讨论、送审后再着手修改文学，准备一个月完成这项工作。第三，关于政府工作报告，拟在各地同志来京协商后，再组织人动手起草。第四，关于筹备工作，待汪东兴回程时再请他面报。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":3,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":521,"page_end":521},"tags":[{"name":"周恩来","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1b831625d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
