authors":["云南","安恩溥","王尊一","陕西"],"dates":[{"year":1957,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"右派言论——宣扬资本主义民主、反对民主集中制","type":"title"},{"text":"云南安恩溥陕西王尊一","type":"authors"},{"text":"安恩溥 (云南省民政厅长、省人民委员民革省委委员)","type":"paragraph"},{"text":"关于民主制的问题，他认为现在的民主是形式，他说：………民主和集中是分不开的，可是过去讨论问题流于形式，事前我们不知道或者知道得很晚，但党组知道得很早。非党人士临时来开会怎样发言呢？这是集中多，民主少。省人委会就是如此，民政厅也是这种情况。(云南日报7月1日)","type":"paragraph"},{"text":"王尊一(陕西师范学院讲师)","type":"paragraph"},{"text":"党的官僚主义主要表现在不够民主的选举制度上，这种选举制度还名曰“民主集中制”。比如一个人，只提一个候选人，这种选举完全成为形式。候选人是否集中了群众的意见？这种选举办法是否民主？只有天知道。","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0687f8a0c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
