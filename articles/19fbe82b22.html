" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji44","name":"毛泽东全集第44卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"在林彪关于总政选印《毛选》部分文章的请示报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在林彪关于总政选印《毛选》部分文章的请示报告！上的批语"},{"type":"paragraph","text":"（1961年8月29日）田家英同志："},{"type":"paragraph","text":"请你看一下。如大体可用，即退回林彪同志办理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十九日"},{"type":"paragraph","text":"[1]中共中央军委副主席林彪1961年8月29日给毛泽东写报告说：“军队广大士兵热爱和迫切要求读毛主席著作，但由于书籍缺乏，且不善于选择必需读的文章。为着解决这一问题，总政从《毛选》中抽选了一部分文章拟印发到连队，以适应现实需要。但所选文章和章节，不知是否恰当，盼主席交有关人员予以审查。如有意见，即请指示，如无指示，即由总政出版了。”同年，总政宣传部即编印了《毛泽东著作选读》一书，印发到班，每班两本，供士兵学习。"},{"type":"paragraph","text":"[2]田家英，当时任中共中央政治研究室副主任、毛泽东的秘书。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":8,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":350,"page_end":350},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19fbe82b22"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
