script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"鲜明的对比  有力的回击","authors":["梁祝芬"],"dates":[{"year":1976,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"鲜明的对比  有力的回击"},{"type":"paragraph","text":"广东电白县沙琅公社卫生院党支部副书记、副院长  梁祝芬"},{"type":"paragraph","text":"我是一个外科医生，文化大革命前，一心想个人成名成家，走的是“白专”道路。文化大革命中，我遵照毛主席关于“把医疗卫生工作的重点放到农村去”的伟大教导，来到农村接受贫下中农的再教育，收获很大。文化大革命前后两条路线，两种效果，对比十分鲜明。这里，谈一件我终生难忘的事情。"},{"type":"paragraph","text":"文化大革命前的一九六六年初，下洞公社贫农社员王洪谦，肝部长了一个小硬块，他来到电白县人民医院求医。当时，由于我受刘少奇修正主义卫生路线的毒害，对贫下中农缺乏无产阶级感情；另外又担心手术做不好，摔了所谓电白“第一把刀”的招牌，所以不敢给他做切除手术，敷衍几句就把他打发走了。以后，他去过不少城市医院，那些医生都说他的病是“不治之症”。"},{"type":"paragraph","text":"文化大革命的熊熊烈火，摧毁了刘少奇、林彪两个资产阶级司令部，批判了修正主义卫生路线。我在这场激烈的阶级大搏斗中，受到了深刻教育，狠斗了头脑里资产阶级成名成家思想，立志到三大革命运动中去锻炼和改造自己，全心全意为贫下中农服务。一九六八年，组织上批准我到电白县的边远山区沙琅公社卫生院安家落户。"},{"type":"paragraph","text":"我到沙琅公社卫生院后，王洪谦听说沙琅卫生院来了一个外科医生，便到卫生院来要求治疗。当我认出他就是三年前被我推出院门的那个贫农社员时，我回顾当时的情景，感慨万端。王洪谦问我：“医生，我的病能治吗？”我以非常内疚的心情，紧紧握住他的手，含着热泪说：“大伯，我一定想办法治好你的病。”我详细询问病史，反复检查，确诊为肝肿瘤，决心为他施行大手术。经过两个多小时的紧张战斗，终于把他身上的两斤重的肝肿瘤切除了，又经过二十多天的精心护理，病人恢复了健康。出院时，他无比激动地高呼：“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"同样一种病，同样一个医生，为什么文化大革命前不能治，而文化大革命后就能够治了呢？在修正主义卫生路线的毒害下，一些象我这样的医生，走“技术第一”、“业务挂帅”的“白专”道路，蹲在城市里为少数城市老爷服务，心目中根本没有贫下中农和广大劳动群众，当然治不好贫下中农的病。听毛主席的话，到农村去，全心全意为贫下中农服务，就不但能为贫下中农治病，而且能治好一些疑难病症。对我来说，医治王洪谦大伯的病，并不是什么技术过硬不过硬、业务水平高不高的问题，完全是一个为什么人的问题，世界观的问题。"},{"type":"paragraph","text":"文化大革命以来我思想上的变化，有力地说明了邓小平大肆鼓吹卫生战线的主要问题是什么“不学技术”、“不钻研业务”，就是妄图以资产阶级名利为钓饵，把我们引到修正主义邪路上去。我一定要吸取文化大革命前的教训，与邓小平的反革命的修正主义路线对着干，在毛主席革命路线的指引下，继续前进，永远前进！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84cf392701"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
