ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"在驻苏使馆关于赫鲁晓夫海参崴讲话情况报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在驻苏使馆关于赫鲁晓夫海参崴讲话"},{"type":"paragraph","text":"情况报告上的批语2]"},{"type":"paragraph","text":"（1959年10月）此三件请刘、周、朱、林、陈毅、彭真、稼祥、康生、定一、[1]赫鲁晓夫，当时任苏共中央第一书记、苏联部长会议主席。"},{"type":"paragraph","text":"[2]本篇一、二均写在中国驻苏联大使馆1959年10月8日给外交部的报告上。报告说，赫鲁晓夫本月6日在海参崴作了访华回去后的第一次公开讲话，其中有许多值得注意的地方：首先，他强调今年9月的访美之行并没有改变他对美国的看法和对社会主义的信念。其次，在谈到对战争的态度时他引证了美国总统艾森豪威尔关于害怕战争的话，然后又说：“当然，如果把战争强加在人民头上，使他们被迫保卫自己的自由和独立免受侵略者危害的时候，那就是另一回事了。在这种情况下是不能害怕战争的。·但是向往着战争，像一只公鸡一样准备打架，这是不明智的。”再次，关于中国之行，他说中国的情况很好，中苏友谊、社会主义阵营各国的友谊正日益发展和巩固。赫鲁晓夫在讲话中还再度赞扬了艾森豪威尔。"},{"type":"paragraph","text":"在驻苏使馆关于赫鲁晓夫海参崴讲话情况报告上的批语陈伯达、胡乔木同志一阅，阅后退毛。"},{"type":"paragraph","text":"二值得一看，想一想。两天内看完，以便在我处会谈一次。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。朱，指朱德。林，指林彪，当时任中共中央副主席、国务院副总理。陈毅，当时任中共中央政治局委员、国务院副总理兼外交部部长。彭真，当时任中共中央政治局委员、中央书记处书记。稼祥，即王稼祥，当时任中共中央书记处书记、中央对外联络部部长。康生，当时任中共中央政治局候补委员、中央文教小组副组长。定一，即陆定一，当时任中共中央政治局候补委员、中央文教小组组长、中央宣传部部长、国务院副总理。陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任。胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":469,"page_end":470},"tags":[{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7132f5d2de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
