ates":[{"year":1968,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十二日电　据东方通讯社报道:日本东京一万多名学生二十一日在神田学生区举行集会和声势浩大的示威游行，强烈要求废除日美“安全条约”，反对佐藤政府追随美帝向东南亚进行扩张和侵略。学生们同反动警察进行了英勇的搏斗，打退了警察的野蛮进攻。"},{"type":"paragraph","text":"这一天，一千五百名学生在中央大学校园内举行集会，强烈谴责美帝的战争政策和侵略政策，强烈谴责日本反动派同美帝进行的罪恶勾结，坚决支持法国以及欧洲、北美各国风起云涌的群众斗争，并且严厉谴责现代修正主义分子破坏这些国家的群众运动的叛卖行径。"},{"type":"paragraph","text":"会后，学生们在大街上示威，并用书桌筑起街垒，使交通断绝。佐藤反动政府出动了一千五百名武装警察，对学生进行法西斯镇压。学生们凭借街垒用木棍和玻璃瓶同警察展开了激烈的搏斗。这时，神田学生区各校的学生纷纷出来声援，不多时，示威学生就增加到一万多人。经过一个小时的激战，英勇的学生终于击退了全副武装的反动警察。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7d4fcf9fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
