script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"响应毛主席伟大号召，到农村安家落户","authors":[],"dates":[{"year":1968,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"响应毛主席伟大号召，到农村安家落户"},{"type":"paragraph","text":"东莞县常平镇知识青年和居民纷纷到农村去，参加集体生产劳动，受到贫下中农的热情欢迎"},{"type":"paragraph","text":"新华社广州二十五日电　广东省东莞县常平公社的城镇知识青年和居民，在毛主席一系列最新指示的指引下，提高了两条路线斗争觉悟，坚决按照毛主席的无产阶级革命路线办事，纷纷到农村安家落户。全镇第一批已有三百二十户居民于十二月一日分赴十四个大队，参加农业生产劳动。"},{"type":"paragraph","text":"常平镇靠近广深铁路，全镇脱离劳动的居民有五百七十七户，三千三百六十六人。党的八届扩大的十二中全会公报发表后，这里掀起斗、批、改的高潮时，常平公社革委会放手发动群众，提出了镇里脱离劳动的居民和知识青年到农村安家落户的方案。公社革委会遵照毛主席“办学习班，是个好办法，很多问题可以在学习班得到解决”的伟大教导，举办了有贫下中农、革命职工、知识青年和城镇居民参加的毛泽东思想学习班，组织他们学习毛主席的最新指示，对他们进行两条路线斗争史的教育。通过学习，常平镇的广大知识青年和革命居民的阶级斗争和两条路线斗争觉悟大大提高，他们认识到“农村是一个广阔的天地，在那里是可以大有作为的”，到农村安家落户，参加农业生产，是防修反修、逐渐缩小城乡差别的正确途径。一些居民说：过去中了叛徒、内奸、工贼刘少奇反革命修正主义路线的毒，住在城镇不劳动，对社会主义毫无贡献。现在，如果不愿意参加建设社会主义新农村，就是对毛主席不忠。贫农的女儿叶羡娇，出嫁前在农村很爱劳动，出嫁后到城镇靠丈夫的工资过活，对贫下中农的感情慢慢淡薄了。这次通过学习，她表示一定听毛主席的话，回到农村去，在农村扎根一辈子，努力改造思想，做贫下中农的好后代。"},{"type":"paragraph","text":"常平镇的知识青年和居民出发去农村那天，全公社红旗招展，鞭炮齐鸣。各生产队都派出人力和单车迎接他们，帮助他们运家具。各生产队的贫下中农遵照毛主席政治是统帅，是灵魂的伟大教导，在政治上十分关怀下乡的知识青年和城镇居民。新社员到队后，贫下中农首先对他们进行阶级教育，由老贫农给他们讲本村的阶级斗争史和两条路线斗争史，讲解放后的巨大变化，愤怒控诉、批判刘少奇在农村推行“三自一包”、“四大自由”的滔天罪行。下乡安家落户的知识青年和城镇居民，看到贫下中农对自己这样热情接待，从政治上关怀自己，很受感动，很多人下去的第二天就参加了生产队的集体劳动。"},{"type":"paragraph","text":"伟大领袖毛主席最近又一次指出：“知识青年到农村去，接受贫下中农的再教育，很有必要。要说服城里干部和其他人，把自己初中、高中、大学毕业的子女，送到乡下去，来一个动员。各地农村的同志应当欢迎他们去。”常平镇下乡安家落户的知识青年和城镇居民学习了毛主席的最新指示，受到了极大的教育和鼓舞。他们表示，要永远听毛主席的话，决心在农村干一辈子。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63253261d5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
