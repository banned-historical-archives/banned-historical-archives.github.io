rt":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"正确执行毛主席的干部政策","authors":["向东心"],"parts":[{"type":"paragraph","text":"在无产阶级文化大革命初期，鞍山市煤气公司党委政治处主任陈哲执行了资产阶级反动路线，和起来革命造反的工人侯增生产生了严重的对立情绪。他们俩一起进了毛泽东思想学习班以后，侯增生曾想利用这个机会，整陈哲一顿。"},{"type":"paragraph","text":"正在这个公司支左的某部毛泽东思想宣传队的同志发现这一情况，再一次认真地学习了伟大领袖毛主席的最新指示：“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好。”他们想，侯增生是革命造反派的负责人，要帮助他很好地执行毛主席的最新指示，提高他正确对待干部的认识。"},{"type":"paragraph","text":"宣传队的同志和侯增生在学习班里一起学习毛主席关于正确对待干部和斗私批修的最新指示。毛主席的伟大教导，打开了侯增生的心窍，他想，毛主席教导我们，看干部不要只看一时一事，要看全部历史，陈哲在旧社会也是受苦人，从小当工人，是党一手培养起来的干部，虽然在文化大革命初期犯有某些错误，但他毕竟是我们的阶级兄弟，我们应该热心帮助他改正错误，正确执行毛主席的干部政策。"},{"type":"paragraph","text":"一天晚上，侯增生主动找陈哲谈心，一方面检查了过去对陈哲帮助不够热情的缺点，一方面又严肃地指出了陈哲的错误，使陈哲受到了很大的启发和教育，当场作了检查。宣传队的同志因势利导，把他俩结成“一对红”，一起学习，一起斗私，经常谈心，互相帮助，就这样，毛主席的革命路线，把他俩团结在一起。学习快结束，侯增生把一枚金光闪闪的毛主席像章别在陈哲的胸前，说：“我们现在是‘一对红’，回去也要‘一对红’，紧跟毛主席的战略部署，永远前进。”陈哲回到单位以后，主动到群众中去，认真检查自己，广泛征求意见，严格进行自我批评，受到群众欢迎。（向东心）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63c4bfde24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
