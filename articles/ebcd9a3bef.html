art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"战士们说；“仙丹妙药灵芝草；都不如毛主席的著作好；”","authors":["梁喜贵"],"parts":[{"type":"paragraph","text":"本报讯 某连报话班长杨刚然组织战士学习毛主席著作，立竿见影，解决了班里存在的思想问题。"},{"type":"paragraph","text":"这个班有个战士闹思想问题。究竟有啥思想问题呢？指导员、班长都找他谈过话，但是他没有暴露。自从党支部提出“有问题就找毛主席著作”的号召后，班长杨刚然就抽每天晚自习时间，积极组织全班同志学习毛主席著作。在学习“为人民服务”时，大家都很积极，唯有那个战士却不吭声。但是当他听到“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的”和“因为我们是为人民服务的，所以，我们如果有缺点，就不怕别人批评指出”时，他惭愧地说了一声：“我谈不上为人民服务……”散会后，大家积极帮助那个战士，可是有个别人却说：“算了吧，谁没有点小毛病，何必伤和气呢！”针对这种错误思想，第二天班长又组织大家学习“反对自由主义”。大家说：“我们要真正的政治上的团结，决不能无原则的一团和气。”个别人也检查了自己的错误思想。一天，学了“纪念白求恩”后，班长看出那个战士思想斗争激烈，就主动找他谈话，那个战士拉着班长的手，眼泪直往下流，说：“我的个人主义思想太严重，因为没有当上班长，就整天想复员……”又说：“白求恩大夫是加拿大人，为了中国人民的解放事业献出了自己的宝贵生命，而我是共青团员，却闹个人问题，想退伍，多可耻！”从此，那个战士不但工作、学习积极了，还热心帮助新同志进步。比如，有个新同志工作有些拖拉，那个战士就善意地给他指出缺点，还鼓励他积极学习毛主席著作。"},{"type":"paragraph","text":"这个事实教育了全连同志，他们说：仙丹妙药灵芝草，都不如毛主席的著作好。 （梁嘉贵）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebcd9a3bef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
