ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"中央关于印发清理“中层”“内层”问题的指示的通知","alias":"","parts":[{"type":"paragraph","text":"中央关于印发清理“中层”“内层"},{"type":"paragraph","text":"问题的指示的通知"},{"type":"paragraph","text":"（1951年5月21日）各中央局，各大军区党委，志愿军党委，并转分局，省市区党委，地委及县委，省级军区，军分区，兵团及军师党委："},{"type":"paragraph","text":"兹将中央关于清理“中层”“内层”问题的指示\"发给你们，请你们照此执行为要。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"五月二十一日"},{"type":"paragraph","text":"[1]指中共中央1951年5月21日关于清理“中层”“内层”问题的指示。指示要求在1951年夏秋两季，采用整风方式，有计划、有步骤地对机关工作人员普遍地初步地加以清理，以便弄清情况，处理一些最突出的问题，提高我们组织的纯洁性。指示对清理的范围和重点，步骤和方法，对各类人员处理的政策，工作中注意防止的偏向，以及清理工作的领导问题，都作出了规定。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":321,"page_end":321},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"580aa8961b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
