script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于为“杨、余、傅事件”公开平反的通知","authors":[],"dates":[{"year":1979,"month":3,"day":28}],"is_range_date":false,"parts":[{"text":"中共中央关于为“杨、余、傅事件”公开平反的通知","type":"title"},{"text":"各省、市、自治区党委，各大军区、省军区、野战军党委，中央和国家机关各部委党委、党组，军委各总部、各军兵种、国防科委、国防工办、军事学院、军委自属各院校党委，各人民团体党组：","type":"appellation"},{"text":"林彪、“四人帮”为反军乱军，篡党夺权，推行反革命修正主义路线，于一九六八年三月，捏造罪名，突然袭击，制造了所谓“杨、余、傅事件”即“3·24事件”，诬陷杨成武、余立金、傅崇碧同志“为二月逆流翻案”，是“二月逆流新反扑”。捏造杨成武同志搞“山头主义、宗派主义”，“同余立金勾结要夺空军的领导权，要打倒吴法宪”，“同傅崇碧勾结要夺北京市的权，要打倒谢富治”，“整了江青的黑专案黑材料”，“杨成武三次下命令给傅崇碧冲钓鱼台到中央文革去抓人”，还“打了江青”。说杨成武等同志有“黑后台”，后台就是“叶(剑英)、聂(荣臻)、陈(毅)、谭(震林)”。诬陷余立金同志是“叛徒”。其后，诬蔑“杨成武、余立金、傅崇碧是‘5·16的黑后台’”等等，并发了一九六八年中发52号，一九七○年中发20号文件。林彪、“四人帮”还把所谓杨、余、傅问题作为“为二月逆流翻案的邪风”写入了党的八届十二中全会公报和九大政治报告。林彪、“四人帮”对杨成武、余立金、傅崇碧等同志进行了残酷的迫害，并在全国范围内株连了一大批同志，有的致残、致死，造成严重恶果和影响。","type":"paragraph"},{"text":"中央已经查明，所谓“杨、余、傅事件”纯系林彪、“四人帮”反党集团制造的冤案；他们强加的罪名，纯属捏造。毛主席、周总理对这一冤案的平反工作十分关心。一九七四年七月，毛主席亲自批准为杨成武、余立金、傅崇碧三同志平反恢复名誉，宣布：杨、余、傅问题是林彪搞的，搞错了，宣布平反。中央、中央军委重新安排了他们的工作。但由于“四人帮”的干扰破坏，致使中央为“杨、余、傅事件”平反的决定，长期未能向广大干部和群众公布，许多受株连和受迫害的同志没有得到平反昭雪和落实党的政策。","type":"paragraph"},{"text":"现在，中央决定，为“杨、余、傅事件”公开平反。对杨成武、余立金、傅崇碧同志的一切污蔑不实之词，都应予以推倒；凡有关“杨、余、傅事件”的文件、材料、讲话一律作废；撤销一九六八年中发52号，一九七○年中发20号文件。由于这个案件受到株连的同志，一律平反，恢复名誉；被迫害致死致残的同志，要公开平反昭雪。有关单位对因“杨、余、傅事件”受株连的同志，要认真落实党的政策。","type":"paragraph"},{"text":" 中共中央一九七九年三月二十八日","type":"paragraph"},{"text":"（此件发到县团级、传达到群众）","type":"appellation"},{"text":"(根据中央文件原件翻印)","type":"appellation"}],"comments":[],"origin":"根据中央文件原件翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"傅崇碧","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"二月逆流","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eedf8f17f7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
