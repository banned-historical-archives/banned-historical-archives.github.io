":1961,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见非洲和日本朋友"},{"type":"paragraph","text":"新华社24日讯　毛泽东主席今天下午接见了正在我国访问的非洲各地的朋友们，同他们进行了亲切的谈话。接见时在座的有廖承志、胡愈之、许广平、何英等。新华社24日讯　毛泽东主席今天晚上接见了正在我国访问的一批日本社会党的朋友，同他们进行了亲切的谈话。这些日本朋友是：社会党顾问黑田寿男，社会党国民运动委员会委员长田中稔男，社会党国会议员松本七郎、冈田春夫。接见时在座的有廖承志、胡愈之等。（附图片）"},{"type":"paragraph","text":"毛主席接见非洲朋友时，和喀麦隆妇女代表团团长玛丽·贾德握手　新华社记者　侯波摄"},{"type":"paragraph","text":"毛主席同日本朋友合影。左起：廖承志、冈田春夫、黑田寿男、毛主席、田中稔男、松本七郎、胡愈之"},{"type":"paragraph","text":"新华社记者　侯波、孟庆彪摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"廖承志","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8840a70b03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
