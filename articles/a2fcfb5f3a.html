ors":[],"dates":[{"year":1956,"month":12,"day":4}],"is_range_date":false,"parts":[{"text":"严肃处理侵犯人权事件","type":"title"},{"text":"10月28日我们发表两封读者来信，揭露湖南省耒阳县白鹭乡刘洪元与湘阴县樟树乡萧喜初等非法侵犯教师人权事件，读者曾纷纷来信要求严肃处理。现在刘洪元已由耒阳县人民法院判处徒刑六个月；萧喜初撤消了生产合作社出纳的职务，并开除团籍。","type":"paragraph"},{"text":"耒阳县人民委员会为此发出通报，要求各单位和乡级行政干部爱护教育事业、尊重小学教师，这样的做法是很正确的，这不但有益于尊师重道的社会风气的树立，也使人从实际的事例中明确是非，接受法纪教育。","type":"paragraph"},{"text":"但刘文敏老师对于湘阴县樟树乡其他一些肇事分子，特别是对于党支书萧绍良的处理上，还有意见。(我们今天将刘老师的意见同时发表。)我们根据刘老师来信反映，萧绍良所表现的态度是很恶劣的，他根本没有认识自己的错误。湘阴县监委会只是去信樟树乡党总支“进行教育指正”，未免过于轻描淡写了。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2fcfb5f3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
