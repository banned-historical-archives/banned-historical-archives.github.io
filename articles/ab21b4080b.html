art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"排除一切干扰落实毛主席最新指示","authors":["驻石景山中学军训团"],"parts":[{"type":"paragraph","text":"我们最英明的导师、最杰出的领袖、最伟大的统帅、最天才的舵手毛主席和他的亲密战友林副主席，二月十九日接见了我们在京的“三支”“两军”人员，这是对我们最大的关怀，最大的鼓舞，最大的鞭策。我们热血沸腾喜泪涌，千万遍纵情高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。"},{"type":"paragraph","text":"去年三月初，我们遵照毛主席的伟大战斗号令，来到石景山中学执行军训任务。一年来的斗争实践，使我们深刻地体会到：千难万难，按照毛主席的最新指示办事就不难；千条万条，紧跟毛主席的伟大战略部署是第一条。战无不胜的毛泽东思想，是指挥我们克敌制胜的法宝。"},{"type":"paragraph","text":"毛主席啊，毛主席！去年四月，正当我们紧跟您的伟大战略部署，引导革命师生刚刚迈出革命大联合和复课闹革命的第一步，就受到无政府主义和极“左”思潮的冲击。面临着这种局势，我们心不跳，眼不花，紧紧地和广大革命师生员工一起，勇敢地捍卫您的最新指示。我们不信天，不信地，一心只信毛主席。在冲击最严重的时刻，我们再次公开表明：革命大联合和复课闹革命，是毛主席的最新指示，我们坚决执行，贯彻到底。我们站在您老人家的像前庄严宣誓：头可断，血可流，您老人家的指示不能丢；天可塌，地可陷，无限忠于您老人家的红心永不变！我们和广大革命师生员工紧紧地团结在一起，在击退无政府主义和极“左”思潮的冲击以后，又以您老人家的最新指示为武器，打了一场围剿派性的“人民战争”，揪出了猖狂破坏复课闹革命的坏人。这一切，都是您老人家光辉思想的伟大胜利。"},{"type":"paragraph","text":"毛主席啊，毛主席！在空前迅猛发展的大好形势下，我们一定更高地举起您光辉思想的伟大红旗，把军训工作提高到新的水平，做到压力面前不动摇，赞扬声中不迷航。条条落实、全面落实您的最新指示，永远做无限忠于您老人家的革命战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab21b4080b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
