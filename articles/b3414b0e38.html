<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在叶剑英元帅和刘亚楼空军上将、萧华上将率领下我军事友好代表团到达河内武元甲大将等越南人民军首长和各团体代表到机场热烈欢迎","authors":[],"dates":[{"year":1961,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社河内15日电】　应越南民主共和国副总理兼国防部长武元甲大将邀请，在越南人民军建军十七周年(12月22日)的前夕前来访问的中华人民共和国军事友好代表团，在团长叶剑英元帅和副团长刘亚楼空军上将、萧华上将的率领下，今天上午乘专机抵达河内，受到越南人民军各总部首长、各兵种官兵和各团体代表的热烈欢迎。"},{"type":"paragraph","text":"今天，在嘉林机场上空，中越两国国旗迎风飘扬。机场建筑物上悬挂着红色巨幅标语，上面写着:“热烈欢迎中华人民共和国访越军事友好代表团!”“越中两国人民和军队之间的牢不可破的兄弟般的友谊万岁!”"},{"type":"paragraph","text":"十时，代表团乘坐的专机在欢迎人群的掌声中徐徐降落。越南民主共和国副总理兼国防部长武元甲大将、人民军总参谋长文进勇上将、人民军总政治局主任双豪中将、人民军副总参谋长黄文泰中将、人民军总后勤局主任陈贵海少将走到飞机梯口，同叶剑英元帅、刘亚楼空军上将、萧华上将和代表团全体人员热烈握手、拥抱。人民军文工团的一群女演员向代表团成员献花。"},{"type":"paragraph","text":"在乐队高奏中越两国国歌后，叶剑英元帅在武元甲大将陪同下检阅了仪仗队。随后，代表团成员走到欢迎人群面前，向他们频频挥手致意。这时，人群中响起了热烈的掌声，洋溢着越中两国人民和军队间的深厚情谊。"},{"type":"paragraph","text":"在机场上举行了隆重的欢迎仪式，武元甲大将和叶剑英元帅先后讲了话。(全文另发)"},{"type":"paragraph","text":"他们的讲话，激起了全场一阵阵的掌声。"},{"type":"paragraph","text":"欢迎仪式结束后，代表团在主人陪同下，乘车前往寓所。当代表团离开机场时，人群中再一次响起掌声。"},{"type":"paragraph","text":"今天到机场欢迎代表团的还有人民军副总参谋长陈文茶中将、人民军总政治局副主任黎光道少将、公安部队司令范杰少将，政府总理府部长阮康，对外文化联络委员会主任阮庆全，外交部副部长黄文进，河内市行政委员会主席陈维兴，越中友好协会副会长陈辉燎，以及越南人民军各单位高级军官等。"},{"type":"paragraph","text":"中国驻越南大使何伟、中国驻越南经济代表曹言行，以及使馆外交人员和在越南工作的许多中国专家也都到机场欢迎。"},{"type":"paragraph","text":"【据新华社南宁15日电】　中华人民共和国军事友好代表团在团长叶剑英元帅、副团长刘亚楼空军上将、萧华上将率领下，今天上午乘专机离开南宁前往越南。"},{"type":"paragraph","text":"中国军事友好代表团是应越南民主共和国副总理兼国防部长武元甲大将的邀请，前往越南进行友好访问的。"},{"type":"paragraph","text":"今天前往越南的代表团团员有杨成武上将、黄永胜上将、萧向荣中将、吴瑞林海军中将、雷英夫少将。代表团团员刘重桂大校已在河内。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3414b0e38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
