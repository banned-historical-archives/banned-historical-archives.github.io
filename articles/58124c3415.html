al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"西南事变及整个形势发展问题","alias":"","parts":[{"type":"paragraph","text":"西南事变及整个形势发展问题！"},{"type":"paragraph","text":"（1936年6月12日）"},{"type":"paragraph","text":"时局发展到一个新的阶段。日本派兵到华北，蒋介石的国民党中央的势力退出华北，中国内部整个起了很大变化。帝国主义世界也起了变化，英国原是支持日本侵略中国的，现在变为反对日本侵略中国。西北是抗日的大本营，西南事变的发动，对西北也起了作用。我们的口号，我们的重心是抗日，请蒋出兵，以扫除抗日阻碍。蒋介石在群众中还有欺骗作用。我们的办法是坚决驳斥胡适之?的亦即蒋介石的民族改良主义的言论，指出蒋介石的政策是卖国的政策。要广泛宣传抗日救国大会，以对抗蒋介石的国民大会。要使西南从不是武装民众抗日变为武装民众抗日。"},{"type":"paragraph","text":"[1]中共中央在瓦窑堡召开政治局会议，研究西南事变及整个形势发展问题。这是毛泽东讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":459,"page_end":459},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58124c3415"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
