script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"边区的货币政策","alias":"","parts":[{"type":"paragraph","text":"边区的货币政策"},{"type":"paragraph","text":"（1938年8月17日）聂、彭川，并告朱、彭："},{"type":"paragraph","text":"边区货币政策应根据以下原则：（一）边区应有比较稳定的货币，以备同日寇作持久的斗争。"},{"type":"paragraph","text":"（二）边区的纸币数目，不应超过边区市场上的需要数量。这里应该估计到边区之扩大和缩小之可能。"},{"type":"paragraph","text":"（三）边区的纸币应该有准备金：第一，货物，特别是工业品；第二，伪币；第三，法币。"},{"type":"paragraph","text":"（四）日寇占领城市及铁路线，我据有农村。边区工业品之来源是日寇占领地，边区农业产品之出卖地，亦在日寇占领区域。因此边区应该有适当的对外贸易政策，以作货币政策之后盾。"},{"type":"paragraph","text":"（五）边区军费浩大，财政货币政策应着眼于将来军费之来源。"},{"type":"paragraph","text":"（六）在抗战最后胜利之前，法币一定继续跌价，法币有逐渐在华北灭迹之可能。杂币更会跌落，伪币亦会有一定程度的跌落。边"},{"type":"paragraph","text":"[1]聂，指聂荣臻，当时任八路军晋察冀军区司令员兼政治委员。彭，指彭真，1902年生，山西曲沃人，当时任中共中央北方局组织部部长，以北方局代表名义常驻晋察冀边区，协同聂荣臻指导晋察冀、平汉路东及平津党的工作。"},{"type":"paragraph","text":"[2]朱，指朱德。彭，指彭德怀，当时任八路军副总司令。区纸币如数量过多，亦会跌落。问题中心在于边区纸币应维持不低于伪币之比价。"},{"type":"paragraph","text":"我们提议下列具体办法："},{"type":"paragraph","text":"甲、发行一定数量的边区纸币（此数量由你们考虑决定电告我们），收买法币，保留一部分法币，大部分购买工业品，用一部分法币兑换伪币。"},{"type":"paragraph","text":"乙、对于杂币应设各种方法使其流到边区以外去。"},{"type":"paragraph","text":"丙、有无可能送一部分杂币至总部及一二○师，带一部分法币来延安，请考虑电复。"},{"type":"paragraph","text":"丁、扩大边区纸币的印刷，因将来印刷一定比现在更困难。上述各项请考虑研究。待彭真来延时再详细讨论决定。"},{"type":"paragraph","text":"毛洛王胡"},{"type":"paragraph","text":"八月十七日"},{"type":"paragraph","text":"[1]洛，指洛甫，即张闻天，当时任中共中央书记处书记。王，指王稼祥，当时任中共中央军委副主席兼总政治部主任。胡，指胡服，即刘少奇。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":8,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":424,"page_end":425},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭真","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d940373a8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
