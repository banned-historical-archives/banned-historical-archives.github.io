art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席电贺加涅夫当选保国民议会主席团主席","authors":[],"parts":[{"type":"paragraph","text":"新华社一日讯 毛泽东主席今天致电吉·加涅夫同志，祝贺他当选保加利亚人民共和国国民议会主席团主席。电文如下：保加利亚人民共和国国民议会主席团主席吉·加涅夫同志："},{"type":"paragraph","text":"欣悉你光荣地获得保加利亚人民的重大信任，当选为保加利亚人民共和国国民议会主席团主席，我代表中国人民、中华人民共和国政府，并且以我个人的名义，向你表示衷心的祝贺。"},{"type":"paragraph","text":"中保两国人民的兄弟友谊和全面合作对巩固以苏联为首的社会主义阵营的伟大团结和维护世界和平的崇高事业将起着重大的作用。祝你在保加利亚的社会主义建设和捍卫人类和平的事业中取得卓越成就。"},{"type":"paragraph","text":"中华人民共和国主席  毛泽东"},{"type":"paragraph","text":"一九五八年十二月一日"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b45ac0a3e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
