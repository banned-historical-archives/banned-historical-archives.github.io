art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见索马里新闻代表团"},{"type":"paragraph","text":"邓小平副总理三月十三日上午会见了索马里新闻和国家指导部部长阿卜迪卡西姆·萨拉德·哈桑率领的索马里新闻代表团。邓小平副总理同索马里新闻界朋友们进行了亲切友好的谈话。他说：中索两国人民是好朋友，两国人民在任何时候都是友好的。他表示相信，在西亚德总统领导下，索马里人民团结一致，一定能够取得反霸斗争的胜利。"},{"type":"paragraph","text":"格夫里列斯库大使为罗马尼亚大国民议会代表团访华举行宴会"},{"type":"paragraph","text":"为由罗共中央政治执行委员会候补委员、大国民议会主席尼古拉·乔桑率领的罗马尼亚大国民议会代表团访问中国，罗马尼亚驻中国大使格夫里列斯库三月十三日晚上举行宴会。中共中央政治局委员、人大常委会副委员长乌兰夫，人大常委会副委员长谭震林等应邀出席宴会。乔桑主席和乌兰夫副委员长先后在宴会上祝酒。中罗两国同志频频举杯，祝愿齐奥塞斯库总书记和华国锋主席健康长寿。"},{"type":"paragraph","text":"谷牧副总理会见马耳他客人"},{"type":"paragraph","text":"国务院副总理谷牧三月十三日下午会见马耳他总工会助理总书记卡梅尔·孔西利奥和工会出版社经理、马耳他中国友好协会主席查尔斯·米齐，同他们进行了亲切友好的谈话。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"谷牧","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d778772b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
