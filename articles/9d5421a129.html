r":1977,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李愚"},{"type":"paragraph","text":"反动文痞姚文元，俨然以‘马克思主义的金棍子’自居，似乎普天之下，他才是‘革命’的‘守护神’，而且一贯如此，就是‘这么经历过来的’。"},{"type":"paragraph","text":"究竟是怎么‘过来的’呢?一九五八年二月，他就很‘革’了一下‘命’，即对丁玲的‘创作道路’作了一次‘批判’。而‘批判’的结果，居然发现丁玲身上还有着‘两条线’在交战:一是莎菲女士式的‘反动’道路贯穿始终，一是‘革命的倾向’不时冒头。于是乎，美与丑，善与恶，‘革命’与‘反动’，一并交集于叛徒、右派、反党分子丁玲一身了。世上竟有如此奇妙的逻辑、如此奇妙的角色吗?当然不会有。要不然，西方资产阶级所谓‘人是什么?半是天使，半是野兽’的格言，真该奉为至理箴言了。何况，对于丁玲一类，鲁迅早就作过精辟的论述。说他们忽几‘突变过来’，自封‘革命文学家’，忽儿‘转变’过去，叛变自首，‘写悔过书’(《上海文艺之一瞥》)；他们其实是为了‘将自己从没落救出’(《‘醉眼’中的朦胧》)的破落户飘零子弟；因此，即便在他们‘革命’时，‘也最容易将革命写歪；写歪了，反于革命有害’(《上海文艺之一瞥》)。话还要怎样说才明白呢?"},{"type":"paragraph","text":"姚文元曾‘研究’过鲁迅，还将‘成果’写了厚厚的一本。但对这些一针见血的话，他却似东风吹马耳，置若罔闻。这是偶而的疏忽、抑或单单是犯了理论上的二元论错误吗?然而事实并非如此。我们知道，当他上调中央工作时，一位中央领导同志曾亲自找他谈话，要他同反动家庭划清界限。但姚文元听后，非但不以为戒，反而以怨报德，耿耿于怀，记恨在心，从此之后，直到这位中央领导同志病重、逝世，再也没有去看望一次。姚文元对老一辈无产阶级革命家的仇恨，正是由于对其叛徒老子的眷恋，那是无须说得的。而理论、思想总是以一定的直接经验为基础，又为一定阶级的立场、感情所制约的。姚文元既对其叛徒父亲深情缱绻，怎么会对同是叛徒的丁玲漠漠无情呢?猩猩原本惜猩猩。这就难免要屎中觅道，大搞二元论，费心尽力地在丁玲身上找寻‘革命倾向’了。而且就象由‘癞’而讳‘光’，由“光”而讳“亮”，姚文元不仅为叛徒们贴金，大凡反动头子、民族败类、汉奸蟊贼，一有机会，他就禁不住落笔有情。比如，一九五六年，他说孔丘‘历史上起过进步作用’，一九六一年，又说秦桧是‘杰出人物’，汪精卫‘聪明’，‘有才能’，如此等等。"},{"type":"paragraph","text":"这也毋庸多怪。立场、感情既在‘没落’阶级一边，目的又是为了‘从没落救出’，因而，他们之间也就‘一荣俱荣，一损俱损’，有着共同的阶级的命运。我们还怎能期望姚文元写出别的什么来呢?须知，当他手提秃笔，大写‘革命’时，他就事实上代表着地主资产阶级的利益，伪装革命，‘写歪’革命，‘有害’革命，直至其‘革命’的必然发展——结帮篡党，疯狂的进行反革命。而这也就是文痞姚文元的全部‘革命’史的‘精髓’:假革命的反革命。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d5421a129"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
