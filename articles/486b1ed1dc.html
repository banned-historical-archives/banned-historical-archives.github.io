le":{"title":"中共中央、国务院批转教育部党组关于复查高等学校划为反动学生问题的请示报告","dates":[{"year":1979,"month":11,"day":12}],"is_range_date":false,"authors":["中共中央","国务院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编 (二), 380-381","tags":[{"name":"安置","type":"主题/事件"},{"name":"反动","type":"主题/事件"},{"name":"学生","type":"主题/事件"},{"name":"摘帽","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央、国务院批转教育部党组关于复查高等学校划为反动学生问题的请示报告"},{"type":"paragraph","text":"(一九七九年十一月十二日)"},{"type":"paragraph","text":"中央批示："},{"type":"paragraph","text":"中央和国务院同意教育部党组《关于复查高等学校划为反动学生问题的请示报告》。现发给你们请按照执行。(一) 关于复查。无论本人是否提出电诉，包括已经死亡的，均由原学校负责复查。复查结果，经校党委批准，凡是错定为反动学生的，应予改正，恢复名誉，消除影响，安排适当工作；对虽未定错，但经过多年的考察教育，只要不再坚持反动立场的，也应摘掉“反动学生”的帽子，安排适当工作。"},{"type":"paragraph","text":"(二) 关于工作安排和待遇问题。原为大专院校毕业生或在校生，因被定为反动学生而未分配工作的，一般均由原学校（包括已调正并入的学校）商同本人现在所在地区有关部门，就地分配适应工作。已分配工作的，如专业不对口，可作适当调正。但现在农村和小城镇的，除特殊情况外，一般地不调回大中城市。毕业生现在的工资待遇低于同届大专院校毕业生定级待遇的，应按同届毕业生定级待遇对待；原属在校生，按大学肄业生的工资级别对待。工资一律从文件下达之日起实行，过去的不再补发。个别因未分配工作而造成生活特别困难的，由原学校酌情给予适当补助。所需劳动指标，在国家下达各地的劳动计划内统筹安排。劳动教养或劳动考察期间，应连续计算工龄。"},{"type":"paragraph","text":"(三)关于党籍、团籍、学籍问题。凡因错划为反动学生而被开除党籍的，经校党委批准后，可恢复其党籍。原是预备党员，一直表现较好的，应承认其党员资格，转为正式党员，党龄从原定转正时间算起，被错划期间的党费不再补交。因错划为反动学生，而被开除团籍的，经改正后撤消其处分。凡属毕业生或基本学完专业课的，可补发毕业证书；其他的，可根据学习年限，补发肄业证书或学历证明。对虽未戴反动学生帽子和实行劳动教养、劳动考察，但因思想政治问题受到批判而被错误的开除学籍、党籍、团籍，未分配工作的，亦应参照上述精神办理。(摘自《组织工作文件选编》)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"486b1ed1dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
