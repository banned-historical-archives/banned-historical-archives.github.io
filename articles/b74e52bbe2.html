ar":1994,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席重视户外运动"},{"type":"paragraph","text":"毛主席生前十分喜爱运动。他主张通过积极参加体育锻炼达到防病健身的目的。原卫生部副部长兼中央保健局局长黄树则同志曾为毛主席保健达３０多个年头。他回忆说：“主席的身体那么好，是和他长期坚持锻炼分不开的。有一次游泳后他把我叫去，风趣地说：‘卫生部要讲卫生嘛’，我一时还不理解他的意思，以为要讲医疗卫生问题，然而他说：‘人必须要运动，没有重病的人都要到户外去运动，多做户外运动’。他的思想是运动强身，防病于未然，讲了一个防病与治病的辩证关系。”（附图片）"},{"type":"paragraph","text":"图为1959年12月，毛主席登上杭州玉皇山后黄树则为他诊脉。"},{"type":"paragraph","text":"李银桥摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"黄树则","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b74e52bbe2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
