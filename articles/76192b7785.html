文化大革命的决定》","authors":[],"dates":[{"year":1967,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"本报二月五日发表了《制止斗里弄干部这股歪风》一组文章和编者按，指出斗争里弄干部是一股歪风。今天，我们继续发表《里弄干部不是当权派》等三篇文章，坚决要把这股歪风打下去。"},{"type":"paragraph","text":"有人问，里弄干部算不算当权派?我们认为，里弄干部不是当权派。我们不能把他们当作党内走资本主义道路的当权派来斗。除掉混入里弄干部队伍中的地、富、反、坏、右分子以外，里弄居民和里弄干部的矛盾，一般都是人民内部的矛盾，是非对抗性的矛盾。对于他们的缺点、错误，需要加以批评、教育，但绝不能把人民内部矛盾搞成敌我矛盾，把非对抗性矛盾搞成对抗性矛盾。一小撮党内走资本主义道路的当权派，为了转移斗争大方向，挑动一批受他们蒙蔽的群众，斗争里弄干部。我们必须识破这个恶毒的阴谋。否则，就有可能被坏人所利用，糊里糊涂跟着别人去干坏事。"},{"type":"paragraph","text":"特别需要指出的是，目前有一小撮地、富、反、坏、右分子，煽动一些人斗争里弄干部。有些坏蛋甚至赤膊上阵，亲自指挥。他们猖狂地叫嚷:“昨天你们斗我，今天老子斗你!”这些坏蛋甚至狗胆包天斗争户籍警。这是公开的反攻倒算。这是明目张胆的反革命的阶级报复行为。是可忍，孰不可忍?!地、富、反、坏、右分子妄图复辟，就坚决砸烂他们的狗头!我们的公安部门、司法机关，一定要对这批现行反革命分子，毫不犹豫地毫不留情地实行最坚决的专政。"},{"type":"paragraph","text":"目前，上海地区斗争里弄干部的歪风尚未煞住。有极少数人反而变本加厉地去斗争里弄干部。这是一场严重的、尖锐复杂的阶级斗争。我们希望广大工人、学生、机关干部的革命造反派战友们，都应该挺身而出，关心和参加这场阶级斗争，击退资产阶级反动路线的新反扑，彻底粉碎阶级敌人的猖狂进攻!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76192b7785"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
