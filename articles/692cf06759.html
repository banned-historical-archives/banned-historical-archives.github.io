torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"攻占眠州战略上十分有利","alias":"","parts":[{"type":"paragraph","text":"攻占岷州战略上十分有利！"},{"type":"paragraph","text":"（1936年8月13日）朱、张、任同志："},{"type":"paragraph","text":"如能攻占岷州城，则打马打毛?打王均十分有利，战略上大占优胜。万一攻不开，则围城打援。毛炳文现正以一部从陇西增援，是消灭他的好机会。朱总司令宜速派人去见王均曾万钟，彼等孤危，不难收效。城内鲁大昌亦宜派人，允许放他向临潭跑。如何，望酌。"},{"type":"paragraph","text":"毛周彭"},{"type":"paragraph","text":"十三日"},{"type":"paragraph","text":"[1]这是毛泽东和周恩来，西北革命军事委员会副主席、红军第一方面军司令员彭德怀给朱德和红军总政治委员张国焘、红军第二方面军政治委员任弼时的电报。"},{"type":"paragraph","text":"[2]岷州，即甘肃岷县。"},{"type":"paragraph","text":"[3]马，指马步芳，当时任国民党青海省政府代主席、国民党军西北“剿匪”总司令部新编第二军军长。"},{"type":"paragraph","text":"[4]毛，指毛炳文，当时任国民党军西北“剿匪”总司令部第三十七军军长。"},{"type":"paragraph","text":"[5]王，指王均，当时任国民党军西北“剿匪”总司令部第三军军长。[6]】曾万钟，当时任国民党军西北“剿匪”总司令部第三军第七师师长。[7]鲁大昌，当时任国民党军西北“剿匪”总司令部新编第十四师师长。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":64,"page_end":64},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"692cf06759"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
