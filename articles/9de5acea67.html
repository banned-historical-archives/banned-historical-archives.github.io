"year":1991,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界乒乓球明星赛"},{"type":"paragraph","text":"马文革夺得冠军"},{"type":"paragraph","text":"新华社香港５月２６日电  中国的马文革今晚在香港世界乒乓球明星赛的决赛中，以３∶０击败中国的另一名队员陈龙灿，获得本次比赛的冠军，各局比分是：２１∶１３，２１∶１４，２１∶１５。陈龙灿获亚军。"},{"type":"paragraph","text":"世界明星男子乒乓球赛２５日开始，并通过循环赛决出了Ａ、Ｂ两个小组的名次。中国乒乓球选手马文革和陈龙灿分别获得Ａ、Ｂ组的第一名。另一名中国运动员于沈潼获得Ｂ组第二名。"},{"type":"paragraph","text":"参加这次明星赛的共有８名选手，除了三名中国球员外，还有第四十一届世界乒乓球锦标赛的冠、亚军瑞典的佩尔森和瓦尔德内尔。瑞典名将阿佩伊伦、日本和香港的头号选手涩谷浩和卢传淞也参加比赛。"},{"type":"paragraph","text":"马文革在半决赛与世界冠军佩尔森交锋时以２∶１获胜，比分是１５∶２１，２１∶１６，２１∶１４。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9de5acea67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
