ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于感谢苏联专家对鞍钢建设的援助复高岗电","alias":"","parts":[{"type":"paragraph","text":"对新疆党政军机关三反斗争"},{"type":"paragraph","text":"情况报告的批语"},{"type":"paragraph","text":"（1952年3月4日）刘、周阅后，转王震阅。"},{"type":"paragraph","text":"此报告中（二）条（2）（3）两项似太严，还要宽一点。究竟如何才恰当，请周研究后找王震一谈。其他各条办法都好。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日[1]刘，指刘少奇。周，指周恩来。"},{"type":"paragraph","text":"[2]王震，当时任中共中央新疆分局书记、中国人民解放军新疆军区代司令员兼代政治委员。"},{"type":"paragraph","text":"[3]王震1952年3月1日关于新疆党政军三反情况给毛泽东并军委总政的报告说，在新疆省级机关和军队中，三反已接近基本上解决问题的阶段。鉴于新疆有复杂的民族问题和起义军队等问题的特殊情况，对军委直属队及二、六两军，二十二兵团，第五军和本地民族干部三反斗争中的问题，拟分别不同情况在政策上区别对待。报告第二条是对二十二兵团三反斗争中的一些问题的处理意见。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":471,"page_end":471},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9243848581"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
