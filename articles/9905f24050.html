问好！”","authors":[],"dates":[{"year":1966,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来等中央负责同志接见"},{"type":"paragraph","text":"华侨小英雄华侨小将们跳跃高呼：“毛主席万岁！”“向毛主席问好！”"},{"type":"paragraph","text":"新华社二十九日讯　中央和各方面负责同志周恩来、陶铸、康生、陈毅、刘志坚、吴德、廖承志、姚仲明，今天在人民大会堂接见了毛泽东思想武装起来的战斗集体——四十一名华侨青少年和在印尼参加过抗暴斗争的两名难侨青年代表。"},{"type":"paragraph","text":"英雄的华侨小将们见到周恩来等同志的时候，挥动着红光闪闪的《毛主席语录》，跳跃着尽情高呼：“毛主席万岁！万岁！万万岁！”周恩来等同志和他们亲切地握手，表示慰问。华侨小英雄们热泪盈眶，连连高呼：“向毛主席问好！向毛主席问好！”这时，他们同周恩来等同志齐声高唱《大海航行靠舵手》，表达他们热爱我们伟大领袖毛主席的无限深情。（附图片）"},{"type":"paragraph","text":"下图：中央和各方面负责同志周恩来、陶铸、康生等，同四十一名华侨青少年和在印尼参加过抗暴斗争的两名难侨青年代表合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"陶铸","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9905f24050"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
