<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德阿两国党政代表团发表会谈公报  苏联所提对德和约草案有利欧洲和平  两党继续进行反对修正主义的坚决斗争","authors":[],"dates":[{"year":1959,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德阿两国党政代表团发表会谈公报"},{"type":"paragraph","text":"苏联所提对德和约草案有利欧洲和平"},{"type":"paragraph","text":"两党继续进行反对修正主义的坚决斗争"},{"type":"paragraph","text":"新华社柏林13日电　德意志通讯社播发了德意志民主共和国和阿尔巴尼亚人民共和国两国党政代表团会谈的联合公报。"},{"type":"paragraph","text":"公报说，双方支持苏联政府关于柏林问题的建议，欢迎并支持苏联关于缔结对德和约的新倡议。它们希望在第二次大战时曾派军队参加对德战争的所有国家的政府，特别是大国政府都会赞同苏联政府的建议。"},{"type":"paragraph","text":"双方认为，在西德复活的侵略成性的德国帝国主义已成为欧洲和平的主要危险，西方大国应对此负主要的责任。三个西方大国背弃了他们在波茨坦协定中所承担的义务，在西德复活军国主义，实行原子武装，使西德成为北大西洋公约组织的侵略基地，这个基地威胁着德国人民和全欧洲人民的和平生活。西方大国还使西柏林变为一个侵略基地和毒瘤，割去这个毒瘤对维护欧洲和平来说已成为必不可少的了。"},{"type":"paragraph","text":"公报说，苏联提出的对德和约草案既符合德国人民的自决权也符合包括德国人民在内的一切欧洲人民的安全和和平的合理利益。并且将在很大程度上缓和欧洲的紧张局势，同时也给予德国人民建立自己的民主的国家以巨大支援。双方认为，德国成为一个统一的、热爱和平的、民主的国家只是德国人民的事情。"},{"type":"paragraph","text":"公报强调说，两党代表团将以1957年11月在莫斯科召开的社会主义国家共产党和工人党代表会议宣言和六十四个共产党和工人党代表团通过的和平宣言视为他们工作的基础。他们将继续忠于无产阶级国际主义的原则，竭力加强社会主义阵营的一致和团结。"},{"type":"paragraph","text":"公报说，两党认为即将举行的苏联共产党第二十一次代表大会是具有极其重大国际意义的事件。它们向光荣的苏联共产党致兄弟的敬礼，并且认为，苏共第二十一次代表大会将标志着苏联向共产主义大踏步迈进和社会主义阵营胜利进军的一个新的重要阶段的开端。"},{"type":"paragraph","text":"公报接着说，维护马克思列宁主义理论的纯洁，保护马克思列宁主义理论不受任何歪曲，是社会主义取得胜利的必要前提。两党今后仍将进行坚决的斗争，以反对任何形式的修正主义——国际工人运动现阶段的主要危险。两党重申它们已经发表过的关于南斯拉夫共产主义者联盟纲领的声明，它们认为这个纲领是危害国际工人运动的修正主义纲领。"},{"type":"paragraph","text":"公报严厉斥责美国在台湾地区对中华人民共和国的侵略政策。德意志民主共和国和阿尔巴尼亚人民共和国无保留地支持中华人民共和国解放台湾和其他沿海岛屿的合法权利，这些地区是中华人民共和国领土的不可分割的组成部分。"},{"type":"paragraph","text":"双方欢迎1958年12月在阿克拉举行的全非人民大会的决议，并且向为民族自由而斗争的人民表示深刻的同情和支持。"},{"type":"paragraph","text":"公报接着说，以美国为首的帝国主义侵略势力，企图顽固地反抗这一理所当然的发展以及符合各国人民利益的和平政策。他们继续进行冷战，狂热地准备点燃起世界性的原子战火，在世界各地扶持敌视人民的反动力量。他们企图通过“心理战”和残酷的恐怖手段镇压日益壮大的和平运动。他们借助北大西洋公约组织所奉行的政策，使西欧成了危险的原子武器库。"},{"type":"paragraph","text":"公报着重说，德意志民主共和国和阿尔巴尼亚人民共和国在社会主义建设中取得的成绩证明，德国统一社会党和阿尔巴尼亚劳动党的政策是正确的，它们一贯根据本国具体条件运用苏联的经验。"},{"type":"paragraph","text":"公报最后一部分说，双方表示相信：阿尔巴尼亚党政代表团到德意志民主共和国的友好访问将进一步加强两国的兄弟友谊和紧密合作，加强社会主义阵营国家的团结，并促进世界和平和安全。"},{"type":"paragraph","text":"阿尔巴尼亚党政代表团邀请德国统一社会党中央委员会第一书记和德意志民主共和国总理率领党政代表团访问阿尔巴尼亚，这个邀请已被接受。"},{"type":"paragraph","text":"在联合公报上签字的是乌布利希，霍查和谢胡。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"509caacc1b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
