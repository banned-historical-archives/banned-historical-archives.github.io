ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在中共中央书记处会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央书记处会议上的讲话！]"},{"type":"paragraph","text":"（1939年5月17日）"},{"type":"paragraph","text":"中央专门讨论各部门的工作是重要的，今后要两三个月讨论一次。党的大政方针要由宣传部组织具体的宣传工作，宣传部要注意宣传工作的组织与领导，要有领导的艺术；要注意全国各地的刊物，经常收集材料；要注意组织地方党组织的对外宣传；要指示各地方党组织首先建立对外宣传机关，这甚至比建立党部还重要；还要注意国民教育的方针和方法，现在国民教育的方针是民主主义的。过去中央苏区国民教育方针是共产主义的，文艺政策是共产主义的，都不对。王稼祥在会上提出，现在国民党有许多怪论，我们应当答复。会议决定要注意回答国民党宣传中提出的问题，由毛泽东撰文答复坚持抗战三阶段问题、主流与逆流问题。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央书记处会议上听取和讨论洛甫（张闻天）关于中央宣传部工作的报告后讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":5,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":330,"page_end":330},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c07dcab5b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
