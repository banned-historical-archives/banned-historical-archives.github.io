统销中所犯错误的通报（节录）","authors":[],"dates":[{"year":1953,"month":12,"day":16}],"is_range_date":false,"parts":[{"text":"中央转山东分局关于新泰县在粮食统购统销中所犯错误的通报（节录）","type":"title"},{"text":"…… 据汇报，全县117个乡，除有10个尚根本未动，63个乡进展暂缓发生问题较少外，在工作较快的44个乡中，即有26个乡政策上发生混乱，群众情绪动荡不安。 这主要是由于干部的强迫命令，单纯扣粮挤粮所造成的。 如县委基点八区良村乡竟采用“打虎”方法斗余粮户，对出卖余粮不通的驱逐出会场，令其考虑。 名曰“去掉挡头”。有的区干说：“有余粮不卖就封门，对抗就给他穿上个眼”。三区苏庄乡小张庄张长振在小组会议上字报卖粮700斤，非逼卖1000斤不行。回家后告其妻，其妻不通即服了毒。九区沈村富裕中农张敏之子报卖5千斤，他在村民会上说只卖3500斤，村干不满，当场大加指责，其子害怕装疯，闹的会场大乱一阵而散，影响极坏。九区北堡党员朱九连因卖粮不通，在党员会议上受到严重批评，又未转变，第二天小组会都停止他参加，因此他苦闷怀疑而自杀。一区马庄乡乡长将余粮户叫去开会说：“你们有两条路，一是卖余粮，而是坐法院”。十一区放城乡乡长丁继温说：“富农的粮食不卖就要没收…” 由于这种强迫命令的结果，不仅造成群众恐慌，发生了藏粮现象。而且影响了冬季生产的开展。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df8efd6eb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
