ear":1949,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生:我在西历一九三四年三月进汉口颐中烟草公司印刷厂任事务员。当缴该公司保证金银圆六千元。规定年息六厘，有该公司收据为凭。在一九四七年三月，该公司汉口经理J.W.Palsons告诉我:“奉上海总公司之命，今将一万支装茄立克香烟四箱，作为清偿你所缴保证金之代价。”敝人听后，告彼谓该香烟四箱，其代价仅值所缴保证金的十分之一。如此巨大损失，为敝人所不能接受。但在该公司再三威胁之下，终于在是年五月接受其所提出之条件。当时敝人以为虽受巨大损失，但该公司能给我安心工作机会，则生活费用，自无问题。孰料同年十月该公司竟宣称汉口印刷厂开工无期，而将我解雇。并将敝人历年所存该公司之储蓄金银圆一千数百元，亦拒而不给。敝人曾一再向该公司提出交涉，但在该公司(帝国主义)与伪国民党，政府(媚外政策)互相勾结之下，终属无效。敝人么遭该公司之无理压迫欺骗剥削，而无从反抗。今沪汉解放了，敝人来沪，再向该公司交涉。谁知该公司仍以帝国主义态度对付，而遭拒绝。现在请上海各界主持正义。　叶忠道敬启"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77963cc645"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
