ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"在军委办事组关于成立解放军报社领导小组报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在军委办事组关于成立解放军报社"},{"type":"paragraph","text":"领导小组报告\"上的批语"},{"type":"paragraph","text":"（1969年7月21日）肖力已下放，不应任此职。"},{"type":"paragraph","text":"七月廿一日"},{"type":"paragraph","text":"[1]中共中央军委办事组1969年7月3日给毛泽东等写报告说：“根据当前解放军报社抓革命、促生产的情况，我们考虑，有必要成立一个领导小组，对报社革命和生产实施一元化的领导。为此，解放军报社经过反复酝酿，充分协商，提出十五名同志为领导小组成员。”“军委办事组讨论同意。关于领导小组的负责人，我们建议仍以肖力同志为好。”肖力，即李讷，毛泽东的女儿，原任解放军报社总编辑，当时已下放到基层锻炼。"}],"authors":["毛泽东"],"dates":[{"year":1969,"month":7,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":485,"page_end":485},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa61bf8218"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
