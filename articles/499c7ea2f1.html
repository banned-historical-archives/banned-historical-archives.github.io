ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"给邵华的信","alias":"","parts":[{"type":"paragraph","text":"给邵华的信"},{"type":"paragraph","text":"（1962年6月3日）"},{"type":"paragraph","text":"你好！有信，拿来，想看。要好生养病，立志奔前程，女儿气要少些，加一点男儿气，为社会做一番事业，企予望之。《上邪》3一篇，要多读。余不尽。"},{"type":"paragraph","text":"父亲"},{"type":"paragraph","text":"六月三日上午七时[1]邵华，原名张少华，毛泽东的儿媳。毛泽东写给她的这封信无上款。[2]指毛岸青、邵华各自写给毛泽东的信。"},{"type":"paragraph","text":"[3]《上邪》，乐府汉《饶歌》十八曲之一。上，指天；邪，通“耶”，语气词。上邪，指天为誓的意思。其词为：“上邪！我欲与君相知，长命无绝衰。山无陵，江水为竭，冬雷震震，夏雨雪，天地合，乃敢与君绝。”"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":6,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":147,"page_end":147},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"499c7ea2f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
