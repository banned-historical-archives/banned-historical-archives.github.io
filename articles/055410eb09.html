<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"吴奈温总统到达北京　华主席到机场热烈欢迎邓小平副总理、邓颖超副委员长等也到机场欢迎","authors":[],"dates":[{"year":1977,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年九月十六日电　缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温应我国政府邀请，在出国访问途中对我国进行顺道友好访问，今天下午乘专机到达北京。"},{"type":"paragraph","text":"中共中央主席、国务院总理华国锋到机场热烈欢迎吴奈温总统。在飞机舷梯旁，华国锋主席同吴奈温总统亲切握手，互致问候。"},{"type":"paragraph","text":"到机场欢迎吴奈温总统的还有国务院副总理邓小平，人大常委会副委员长邓颖超，外交部部长黄华、副部长韩念龙，中国人民解放军副总参谋长李达，外贸部副部长周化民，外经部副部长石林，轻工业部副部长杜子端，北京市革命委员会副主任郑天翔等。"},{"type":"paragraph","text":"随同吴奈温总统来访的有吴奈温总统的女儿钦珊达温，国务委员貌貌博士和夫人，外交部长吴拉蓬和夫人，第二工业部部长貌丘上校和夫人，国防部长觉，廷将军和夫人等。"},{"type":"paragraph","text":"缅甸驻中国大使吴敏貌和夫人，大使馆外交官员到机场迎接。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国驻中国大使全明洙也到机场迎接。"},{"type":"paragraph","text":"吴奈温总统一行路经桂林时，桂林市革委会主任郭鹏，副主任欧镇、潘树彬、曹明轩、钟秀琛到机场迎送。"},{"type":"paragraph","text":"新华社仰光一九七七年九月十六日电　缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温及其一行今天上午乘专机离开仰光，在前往朝鲜民主主义人民共和国的访问途中，对中国进行顺道友好访问。"},{"type":"paragraph","text":"陪同吴奈温总统访问的有:总统女儿钦珊达温、国务委员会委员貌貌博士及夫人杜钦敏、外交部长吴拉蓬及夫人杜丁丁、第二工业部长貌丘上校及夫人钦玛玛博士、国防部长觉廷将军及夫人杜钦温敏、总统办公室主任埃觉中校、国家情报局局长吴雷貌及夫人杜丁丁埃、外交部政治司司长吴苏莱和军事情报处长妙昂上校等。"},{"type":"paragraph","text":"前往机场举行的有:国务委员会秘书山友将军、总理吴貌貌卡以及其他高级军政官员。"},{"type":"paragraph","text":"中国驻缅甸大使叶成章和朝鲜驻缅甸大使馆临时代办宗球化也到机场送行。"},{"type":"paragraph","text":"九月十三日晚，叶成章大使设宴招待陪同吴奈温总统前往中国访问的随行人员。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\09\\779h010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温，应我国政府邀请，在出国访问途中，对我国进行顺道友好访问，九月十六日乘专机到达北京。图为华主席、邓小平副总理在机场热烈欢迎吴奈温总统。　新华社记者摄(传真照片)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\09\\779h010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温，由邓小平副总理陪同，九月十六日下午前往毛主席纪念堂，瞻仰毛泽东主席遗容。吴奈温总统在毛主席坐像前肃立默哀，并献了花圈。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"055410eb09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
