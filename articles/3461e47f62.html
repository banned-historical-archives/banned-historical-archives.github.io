script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席关于建立根据地思想的胜利","authors":["李洪文"],"dates":[{"year":1974,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席关于建立根据地思想的胜利"},{"type":"paragraph","text":"北京部队某部八连副班长　李洪文"},{"type":"paragraph","text":"毛主席在一九四五年十二月写的《建立巩固的东北根据地》中，指出：“我党现时在东北的任务，是建立根据地，是在东满、北满、西满建立巩固的军事政治的根据地。”在抗日战争即将结束时，我党派遣大批干部和部队进入东北，领导东北人民消灭日寇和伪满的残余，肃清汉奸，剿除土匪，建立各级地方民主政府。但是，在日本投降后，一直消极抗日，积极反共的国民党反动派，在美帝国主义援助下，向东北大举运兵，并侵占了山海关、锦州等战略要地。毛主席预见到东北的严重斗争已经不可避免。为了逐步积蓄力量，为将来的战略反攻作准备，毛主席及时地提出了把东北的工作重心放在距离国民党占领中心较远的城市和广大乡村方面，以便充分发动群众，建立巩固的根据地。"},{"type":"paragraph","text":"毛主席还明确指示："},{"type":"paragraph","text":"“我党在东北的工作重心是群众工作。”充分相信和依靠群众，放手发动群众，进行人民战争，这是毛主席的一贯思想。有了巩固的根据地，我军在人民群众的支援、参战和密切配合下，就能象鱼在水里游一样地机动自如，主动地作战。有了巩固的根据地，就使我军有了雄厚的人力、物力基础，就能克服一切困难，陷敌于人民战争的汪洋大海之中。"},{"type":"paragraph","text":"由于我东北广大干部和部队，认真执行了毛主席关于建立巩固的东北根据地的一系列指示，在不到一年的时间内基本上完成了土地改革，我军有了巩固的后方。经过土地改革和发展生产，改善了人民的生活，调动了广大群众的革命积极性，使我军进行战略决战获得了取之不尽、用之不竭的人力、物力的支援。通过整顿党的队伍，纯洁和发展了党的组织，发扬了党的优良作风，加强了党对各项工作的领导。在毛主席无产阶级革命路线的指引下，东北的革命形势迅速发生了有利于我而不利于敌的变化，形成了我军与国民党军队在东北进行决战的有利条件。"},{"type":"paragraph","text":"毛主席建立巩固的东北根据地的正确方针得以贯彻执行，是同右倾机会主义路线斗争的结果。林彪到东北后追随刘少奇，极力推行“和平民主新阶段”的右倾机会主义路线，破坏毛主席关于建立巩固的东北根据地的指示。他站在地主资产阶级立场上，不相信群众，不依靠群众，看不到人民群众的力量，甚至恶毒诬蔑东北群众对国民党反动派有“盲目的正统观念”，充分暴露出他敌视人民群众，反对毛主席的人民战争思想的丑恶嘴脸。东北军民坚决执行毛主席的指示，从而夺取了辽沈战役和解放全东北的伟大胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3461e47f62"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
