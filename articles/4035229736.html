thors":[],"dates":[{"year":1966,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社科伦坡电　锡兰共产党中央委员会政治局委员、书记处书记桑穆加塔桑发表文章赞扬中国无产阶级文化大革命“具有划时代的意义”。"},{"type":"paragraph","text":"桑穆加塔桑的文章刊登在九月二十八日的锡兰《劳工报》(僧伽罗文周刊)和九月二十七日的《工人报》(泰米尔文周刊)上。他在文章中指出:中国无产阶级文化大革命“是一场触及人们灵魂的革命，是为了根除几千年来在中国存在、甚至在社会主义革命已经取得胜利后还继续存在的封建的、资产阶级的旧意识形态而代之以无产阶级的即工人阶级的意识形态。”"},{"type":"paragraph","text":"他说，这是七亿人民都来批判旧世界、旧剥削制度以及帝国主义和剥削阶级用来毒害劳动人民心灵的旧风俗和旧习惯的群众运动。“这是具有划时代意义的。”"},{"type":"paragraph","text":"桑穆加塔桑说，西方资产阶级报刊和现代修正主义者企图利用这一时机来诽谤人民中国和在全世界掀起反华大合唱。他指出:“被敌人攻击就是最大的光荣。这表明中国走的路是正确的。如果帝国主义及其在工人阶级内部的代理人现代修正主义者攻击中国的文化革命，那么一切进步人士和革命者就应该更仔细地看一看中国所发生的事情，了解这些事情。”"},{"type":"paragraph","text":"他指出:“中国共产党人，在当代最伟大的马克思列宁主义者毛泽东同志的领导下，正确地认为，工人阶级夺取政权只不过是开始。如果不对改造人的思想以及彻底根除资产阶级的旧思想和坏思想残余，进行认真和卓有成效的努力，资产阶级复辟的企图就会得逞。没有一个被打败的阶级会欣然退出掌权的地位。它总是策划和图谋卷土重来。”"},{"type":"paragraph","text":"桑穆加塔桑说:“我们也应当记住某些外来的因素。美帝国主义以它的军事基地包围了中国，企图‘遏制’中国，以达到消灭中国的最终目的。苏联修正主义者和其它所有现代修正主义者，正在积极为这一阴谋帮忙”。"},{"type":"paragraph","text":"他说:“中国人民充分认识到，由于这一代中国人是在毛泽东直接领导下，反动派和帝国主义绝少成功的可能。他们知道，反动派寄希望于颠覆下一代。”"},{"type":"paragraph","text":"他说，中国人正在培养革命接班人。正在使青年人懂得，千万不能忘记革命传统，必须保卫革命成果，不仅在中国，而且在全世界必须把革命进行到底。中国人的目的是要使帝国主义的希望成为泡影。他们正在采取充分措施使中国不出赫鲁晓夫。"},{"type":"paragraph","text":"桑穆加塔桑指出:“毛主席决定在这个时候进行文化大革命是很合适的”。"},{"type":"paragraph","text":"他说，毛主席“不仅仅是中国的领袖。他是当代最伟大的马克思列宁主义者。他在过去四十年间创造性地发展了马克思列宁主义。”"},{"type":"paragraph","text":"他强调要学习毛主席著作，并且指出:“学习毛泽东著作的运动也就是学习适用于世界帝国主义走向最后失败和世界革命取得胜利时代的马克思列宁主义的运动。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4035229736"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
