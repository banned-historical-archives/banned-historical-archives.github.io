rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席的人民战争思想武装头脑是粉碎美帝国主义侵略的根本保证","authors":["周茂华"],"parts":[{"type":"paragraph","text":"我学习了毛主席有关人民战争的论述和林彪副主席的《人民战争胜利万岁》的文章，使我深深懂得了一条真理：要防止和打败美帝国主义的侵略，就要学习与贯彻毛主席的人民战争思想。"},{"type":"paragraph","text":"毛主席的人民战争思想，不仅指导我国人民取得了革命战争的胜利，而且是我国人民粉碎美帝国主义及其走狗可能发动的侵略战争的法宝。我们在做好反侵略战争准备的工作中，最重要的是用毛泽东思想武装全国人民。有了用毛泽东思想武装起来的人民，我们就能够打败一切敌人。"},{"type":"paragraph","text":"毛主席说，政治是统帅、是灵魂，政治工作是一切工作的生命线。我们一定要坚决突出政治，用毛主席的人民战争思想把全军干部战士和全国人民武装起来，充分做好对付敌人早打、大打、打核战争、打各种战争、在几条战线上打的思想准备。如果美帝国主义及其帮凶，硬要把战争强加在我们头上，我们就用人民战争，打断侵略者的脊骨，坚决、彻底、干净、全部地把它消灭掉。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd9abdc31e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
