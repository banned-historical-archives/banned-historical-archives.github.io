art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"现代修正主义者扮演极不光彩角色苏联提供的米格机被印用来侵巴铁托集团竭力效劳美帝偏袒印度","authors":[],"parts":[{"type":"paragraph","text":"新华社十一日讯 拉瓦尔品第消息：印度政府在最近向巴基斯坦发动的武装进攻中使用了苏联提供的米格式喷气飞机。"},{"type":"paragraph","text":"巴基斯坦政府发言人九月四日在拉瓦尔品第宣布，在克什米尔巴基斯坦控制区，四架苏制米格—21型飞机为攻击巴基斯坦据点的一批印度喷气式飞机护航。巴基斯坦的空军飞机在截击印度飞机后飞回基地时，在飞人巴基斯坦境内很远的地方，受到米格式飞机的攻击，一架巴基斯坦飞机被打坏。"},{"type":"paragraph","text":"新华社十一日讯 贝尔格莱德消息：南斯拉夫修正主义集团近日来竭力为美国效劳，大肆鼓吹由美国操纵的联合国干预印度和巴基斯坦之间的武装冲突，并且借机攻击中国和其他支持巴基斯坦反侵略的正义斗争的国家。"},{"type":"paragraph","text":"铁托集团的喉舌《战斗报》从七日到九日接连三天就印巴冲突发表歪曲事实真象、偏袒印度的评论。它在八日的评论中硬要巴基斯坦屈服于印度的武装侵略，“接受联合国的调解”。它鼓吹“吴丹的目标是要去影响两国政府停火”，并且强调不要分清是非曲直，为印度侵略者打掩护，说什么“如果联合国进行确定谁先惹起冲突的工作，不可能对平息激情和防止战争的危险产生有利的影响”。"},{"type":"paragraph","text":"这家报纸九日的评论还吹捧联合国安理会不公正的决议是“冷静的和现实的”，吴丹的插手是什么“和平的使命”。"},{"type":"paragraph","text":"这家报纸恶毒地攻击中国和其他国家对巴基斯坦的反侵略斗争的支持。它在七日的评论中混淆是非。诬蔑中国支持 巴基斯坦是“借他人来实现大汉族的国家利益”，“不符合万隆会议的精神”。它的九日的评论胡说什么，“象北京对巴基斯坦的支持（雅加达也提供一部分），或者到处所谈论的任何‘道义’支持，首先归结为煽动战争，而决不是什么真正的支持。”"},{"type":"paragraph","text":"《共产主义者》九日也发表评论，恶毒攻击中国支持巴基斯坦人民的正义斗争是“在亚洲煽起另一场冲突”。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"294b6584c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
