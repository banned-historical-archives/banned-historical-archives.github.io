" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海民革揪出赵继舜","authors":[],"dates":[{"year":1957,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"上海民革揪出赵继舜","type":"title"},{"text":"民革上海市委前天下午举行反右派斗争大会，揭露了民革上海市委副秘书长兼组织处长、右派分子赵继舜的反动言行。赵继舜是隐藏在民革组织内部一个凶狠阴险的右派分子。解放以来他一贯在民革市委内部搞宗派活动，破坏上下之间的团结。今年5月右派分子陈铭枢潜来上海进行阴谋活动时，赵继舜和他一拍即合，参加了陈铭枢阴谋集团。会上，有许多基层组织的同志发言，揭露了赵继舜煽动基层放火等罪行。赵继舜在众目睽睽之下不得不表示要进一步检查交代。","type":"paragraph"},{"text":" ——原载《文汇报》1957年9月18日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a57e1959a7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
