ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺德意志民主共和国成立十六周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国"},{"type":"paragraph","text":"成立十六周年的电报"},{"type":"paragraph","text":"（1965年10月6日）柏林德国统一社会党中央委员会第一书记、德意志民主共和国国务委员会主席瓦尔特·乌布利希同志，德意志民主共和国部长会议主席维利·斯多夫同志，德意志民主共和国人民议院主席约翰尼斯·狄克曼教授博士，民主德国全国阵线全国委员会主席埃里希·柯伦斯教授博士："},{"type":"paragraph","text":"在德意志民主共和国成立十六周年的时候，我们向德意志民主共和国人民、德国统一社会党和德意志民主共和国政府，致以热烈的祝贺。"},{"type":"paragraph","text":"中国人民一向关怀德意志民主共和国人民建设社会主义的事业，并为你们所取得的成就感到由衷的高兴。"},{"type":"paragraph","text":"在美帝国主义的扶植下，西德已经变成欧洲新战争的策源地。西德军国主义正在加紧扩军备战，千方百计地谋求核武装，妄图孤立和吞并德意志民主共和国，严重地威胁着欧洲和世界和平。中国人民一贯坚决支持德意志民主共和国人民反对美帝国主义和西德军国主义、争取缔结对德和约和维护国家主权的正义斗争。"},{"type":"paragraph","text":"祝德意志民主共和国人民在反对帝国主义和西德军国主义、维"},{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国成立十六周年的电报护欧洲和世界和平的斗争中，在建设社会主义的事业中，取得新的成就。祝中德两国人民的友好合作关系日益增进。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年十月六日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":220,"page_end":221},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97b9c11fb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
