ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"准备国民党不愿和平时能够进行有力作战","alias":"","parts":[{"type":"paragraph","text":"准备国民党不愿和平时"},{"type":"paragraph","text":"能够进行有力作战！]"},{"type":"paragraph","text":"（1946年6月12日）华东局，并告周："},{"type":"paragraph","text":"真电悉，甚慰。（一）此次恩来回延讨论时局，决定竭力争和平，哪怕短时期也好。（二）山东我军肃清大汶口伪军后，暂时告一结束，全军休整练兵，准备于国民党不愿和平时，能够进行有力作战；对济南、充州、海州进行侦察及兵运。（三）从政治上巩固郝部，该部情形如何，盼告。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"已文[1]这是毛泽东为中共中央起草的给中共中央华东局并告周恩来的电报。"},{"type":"paragraph","text":"[2]指1946年6月11日山东野战军关于攻克胶县、泰安等地后第二步作战行动问题给中共中央军委的电报。"},{"type":"paragraph","text":"[3]延，指陕西延安。[4]大汶口，镇名，位于山东泰安市南部。[5]海州，旧府名，今为江苏连云港市一个区。"},{"type":"paragraph","text":"[6]郝部，指郝鹏举部。郝鹏举原任汪伪淮海省保安司令，抗战结束后该部为国民党收编，为国民党军第六路军，郝任总司令，参与对鲁南解放区的进攻。1946年1月在我军强大军事压力下起义，改编为华中民主联盟军，"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":382,"page_end":382},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d929947ab9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
