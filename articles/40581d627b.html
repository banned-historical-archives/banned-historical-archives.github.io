rt":11,"page_end":11,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我酷爱毛泽东诗词记原石家庄机械化步兵学院研究员王高宣","authors":["赵书信/钟惠恩"],"parts":[{"type":"paragraph","text":"在纪念毛泽东同志诞辰114周年之际，笔者拜访了原石家庄机械化步兵学院研究员王高宣。王老离休后，认真学习和研究毛泽东诗词，成果颇丰。"},{"type":"paragraph","text":"王老酷爱书法和篆刻。与其他书法爱好者不同的是，王老将全部精力用在了学习、钻研、书写和篆刻毛泽东诗词上。"},{"type":"paragraph","text":"王老1927年出生，1949年参军，1986年离休。离休后，出于对毛泽东同志的深厚感情，他认真学习毛泽东诗词，先是朗诵，接着是背诵。随着领会的加深，他开始把毛泽东诗词书写、篆刻下来。经过10多年的努力，他已经用正楷、行书、篆书、草书等形式把毛泽东诗词书写了好几遍，并刻印石300余方。通过读、写、刻，王老经常处于诗词哲理的熏陶和艺术魅力的感染之中，从而潜移默化地净化了思想，陶冶了情操，促进了身体健康。用他自己的话说：我酷爱毛泽东诗词，它使我“受益无穷”！（赵书信 钟惠恩）"},{"type":"paragraph","text":"（右图为王高宣书法手迹）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40581d627b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
