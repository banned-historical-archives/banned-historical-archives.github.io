dates":[{"year":1961,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席周恩来总理陈毅外长"},{"type":"paragraph","text":"电贺也门王国国庆"},{"type":"paragraph","text":"新华社11日讯　中华人民共和国主席刘少奇今天打电报给也门王国国王伊马姆·艾哈迈德，祝贺也门王国国庆。电文如下：也门穆塔瓦基利亚王国国王伊马姆·艾哈"},{"type":"paragraph","text":"迈德·伊本·叶海亚·哈米德丁·纳赛"},{"type":"paragraph","text":"尔·里迪尼拉陛下："},{"type":"paragraph","text":"欣逢也门王国国庆，我谨代表中华人民共和国和中国人民，并且以我个人的名义，向陛下和也门人民表示诚挚的祝贺。祝中、也两国人民之间的友好关系日益巩固和发展。祝也门王国繁荣昌盛，人民幸福。祝陛下身体健康。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"1961年10月11日"},{"type":"paragraph","text":"新华社11日讯　中华人民共和国国务院总理周恩来今天打电报给也门王国副首相巴德尔王太子，祝贺也门王国国庆。电文如下：也门穆塔瓦基利亚王国副首相塞弗·伊斯兰·穆罕默德·巴德尔王太子"},{"type":"paragraph","text":"殿下："},{"type":"paragraph","text":"在也门王国国庆的时候，我谨代表中华人民共和国政府，并且以我个人的名义，向殿下和也门王国政府表示热烈的祝贺。"},{"type":"paragraph","text":"一年来，中也两国之间的友好合作关系，在和平共处五项原则和万隆精神的指导下，有了进一步的发展，这是完全符合我们两国人民的利益的。我热诚地希望这种友好合作关系将日益巩固和发展。"},{"type":"paragraph","text":"祝也门人民在反对帝国主义和殖民主义、保卫国家主权和民族独立、建设自己的国家和维护世界和平的崇高事业中，获得新的成就。祝中也两国人民间的传统友谊万世长青。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1961年10月11日"},{"type":"paragraph","text":"新华社11日讯　中华人民共和国国务院副总理兼外交部长陈毅今天打电报给也门王国副首相兼外交大臣巴德尔王太子，祝贺也门王国国庆。电文如下：也门穆塔瓦基利亚王国副首相兼外交大臣塞弗·伊斯兰·穆罕默德·巴德尔王太子殿下："},{"type":"paragraph","text":"在也门王国国庆的时候，我谨向殿下致以热烈的祝贺。祝殿下在加强中也两国之间的友好合作关系、促进各国人民友好团结和维护世界和平的事业中，取得新的成就。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼外交部长　陈毅"},{"type":"paragraph","text":"1961年10月11日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5856a0d3d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
