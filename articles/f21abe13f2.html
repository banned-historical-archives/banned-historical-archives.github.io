script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"表达了十五亿人民的文化复兴精神亚非作家会议胜利闭幕通过告世界作家书号召反对殖民主义和剥削　决议在锡兰建立常设委员会　下次会议后年在开罗举行","authors":[],"dates":[{"year":1958,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社塔什干13日电】　在苏联乌兹别克首都塔什干举行的亚非作家会议，今天下午胜利闭幕。"},{"type":"paragraph","text":"闭幕式由苏联作家拉希多失主持。会上宣读和通过了亚非作家会议告世界作家书。在通过告作家书时，全场起立，热烈鼓掌达10分钟之久，会场情绪非常热烈。"},{"type":"paragraph","text":"会议还通过了建立亚非作家常设委员会的决议。委员会由加纳、印度尼西亚、喀麦隆、中国、阿联、苏联、苏丹、锡兰、日本的代表组成。会议表示希望，印度文学学院能派出代表参加委员会。常设委员会会址将设在锡兰。会议还建议常设委员会在亚非两洲设立两个地区性中心。"},{"type":"paragraph","text":"会议建议亚非所有国家建立同亚非作家常设委员会联系的国家委员会。"},{"type":"paragraph","text":"会上还通过了阿联代表提出的、1960年在开罗召开下一次亚非作家会议的建议。会议建议常设委员会研究成立亚非出版社，出版刊物、出版亚非作家作品，设立亚非文学奖金和亚非作家援助基金等问题。"},{"type":"paragraph","text":"阿联、加纳、印度等国代表在大会上发了言。最后由拉希多夫致闭幕词。当他宣布大会闭幕的时候，代表们起立，热烈鼓掌。"},{"type":"paragraph","text":"【新华社塔什干13日电】　参加亚非作家会议的作家们在今天的闭幕式上通过了告世界作家书号召全世界作家反对针对人和民族所施行的一切罪恶行为，反对殖民主义和剥削，建立与人民生活相联系并且帮助人民从事争取理智和正义的胜利的斗争的文学。"},{"type":"paragraph","text":"参加会议的作家们表示，他们愿意同世界各国建立文化联系，反对把文化分成高等和低等、割裂成为东方和西方。"},{"type":"paragraph","text":"告作家书说，我们满怀着对我们人民和我们文学的前途的信心聚集在塔什干。文学事业同我们人民的命运有不可分割的联系，消除殖民主义和种族主义是文学创作充分发展的条件，这一信念把我们团结在一起。我们是15亿继承了古老文明和文化的人民的复兴精神的表达者。"},{"type":"paragraph","text":"告作家书指出，这些伟大文明的发展，曾经被残酷无情的剥削、奴役和殖民主义所阻止。然而一切的企图都未能消灭亚非人民的语言和文化，我们时代的优秀诗歌反映着这些人民的战斗精神及其抵抗外国统治的决心。"},{"type":"paragraph","text":"会议参加者表示支持那些还在继续成为经济和文化扩张对象的民族。"},{"type":"paragraph","text":"告作家书强调指出，塔什干会议表明了文学同人民斗争的深刻的相互联系。作家们认为，伟大的文学和文化创作事业只有在自由条件下才有可能。他们宣布，他们的目标、他们的斗争，同他们的人民的目标和斗争是一致的，这就是反对殖民统治，反对核战争威胁，保卫和平。"},{"type":"paragraph","text":"会议参加者号召欧洲、美洲和澳洲所有的文学艺术工作者，不论他们的肤色、民族或信仰如何，都起来大声疾呼，反对针对人和整个民族所施行的一切罪恶行为。他们号召西方同行们歌颂人的崇高品质，为反对毒害成年人和腐蚀儿童心灵的散布蒙昧和仇恨的文学而斗争。他们宣布，他们希望加强同世界一切国家的文化联系，号召西方作家一起站在探寻真理、美好和自由的事业的前列。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1958\\10\\58ae040301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e亚非作家会议会场外景\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f21abe13f2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
