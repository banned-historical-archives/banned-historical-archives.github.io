"dates":[{"year":1965,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"哈菲兹再度就任叙利亚总统会议主席"},{"type":"paragraph","text":"刘少奇主席致电祝贺"},{"type":"paragraph","text":"新华社十一日讯  刘少奇主席昨天打电报给叙利亚总统会议主席阿明·哈菲兹，祝贺他再度就任叙利亚总统会议主席。电文如下：大马士革阿拉伯叙利亚共和国总统会议主席阿明·哈菲"},{"type":"paragraph","text":"兹将军阁下："},{"type":"paragraph","text":"在阁下再度就任阿拉伯叙利亚共和国总统会议主席的时候，我向阁下致以热烈的祝贺。祝阁下和阿拉伯叙利亚人民在反对帝国主义、维护民族独立、发展民族经济和民族文化的事业中，不断获得新的成就。祝中叙两国人民的友好关系不断发展。"},{"type":"paragraph","text":"中华人民共和国主席  刘少奇"},{"type":"paragraph","text":"一九六五年九月十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea72d09004"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
