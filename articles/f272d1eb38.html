script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西欧一些国家人民和旅居丹麦的华侨深切悼念毛主席毛主席为国际工人阶级和世界人民建立了丰功伟绩","authors":[],"dates":[{"year":1976,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社维也纳一九七六年九月二十三日电　奥地利革命工人联合会(马克思列宁主义者)九月二十一日在维也纳隆重举行毛泽东主席追悼会。"},{"type":"paragraph","text":"追悼会在工会大厅举行。大厅正面悬挂着毛主席遗像。"},{"type":"paragraph","text":"奥地利革命工人联合会(马列)主席尤哈在会上致悼词。他回顾了毛泽东主席为中国革命和世界革命立下的丰功伟绩，并且强调指出，毛泽东主席的逝世不仅是中国人民，而且是全世界无产阶级和革命人民的无法弥补的损失。"},{"type":"paragraph","text":"他说:“毛泽东同志与世长辞了。但是，作为永放光芒的劳动人民的引路人，他的思想将与世长存。让我们学习和掌握这些思想，作为劳动人民为争取自身利益而斗争的不可战胜的武器!”"},{"type":"paragraph","text":"尤哈致悼词后，全体与会者起立为毛泽东主席默哀。追悼会在《国际歌》声中结束。"},{"type":"paragraph","text":"在此以前，奥地利革命工人联合会(马列)在布雷根茨和因斯布鲁克两地的组织也分别举行了毛泽东主席追悼会。"},{"type":"paragraph","text":"新华社北京一九七六年九月二十五日电　哥本哈根消息:九月十八日上午旅居丹麦的华侨和丹麦朋友二百多人在丹麦首都哥本哈根隆重举行追悼会，沉痛哀悼毛泽东主席逝世。"},{"type":"paragraph","text":"追悼会会场庄严肃穆，迎面的横幅上写着:“伟大的领袖和导师毛泽东主席永垂不朽”。主席台中央安放着毛主席的巨幅遗像，遗像四周环绕着黑纱。遗像左右两侧排列着丹中友协、旅居丹麦和西德华侨代表敬献的花圈。"},{"type":"paragraph","text":"追悼会在哀乐声中开始，全体与会者向毛主席遗像肃立默哀三分钟。"},{"type":"paragraph","text":"曾经当过海员的林苴福先生含着眼泪致悼词说:“我们这群流落在海外的侨胞大多数是从旧社会过来的。想想旧社会的苦，看看今天生活在祖国怀抱里的同胞是何等幸福。想想从前任人宰割的悲惨命运，看看今天昂首挺胸，当家作主的豪迈气概，怎么不叫我们怀念伟大的革命导师、伟大的领袖毛主席啊!”"},{"type":"paragraph","text":"丹中友协主席佩尔·芬伯在悼词中说:“毛泽东主席是中国革命的缔造者和领袖。我们作为中国人民的朋友，今天在这里集会，分担你们失去毛泽东主席的悲痛。我们坚信丹中两国人民之间的友谊将进一步发展巩固。”"},{"type":"paragraph","text":"特地远道从西德赶来参加追悼会的台湾省同胞廖文男先生在悼词中颂扬了毛主席伟大的一生，并表达了台湾人民渴望早日回到祖国怀抱的强烈愿望和决心。他说:“台湾一定要解放，祖国一定要统一，中国人民一定会在毛泽东思想的光辉照耀下对人类作出更大的贡献。”"},{"type":"paragraph","text":"最后全体与会者向毛主席遗像三鞠躬。大会在雄壮的《国际歌》声中结束。"},{"type":"paragraph","text":"新华社布鲁塞尔一九七六年九月二十五日电　比中协会九月二十五日在布鲁塞尔举行隆重的追悼会，悼念毛泽东主席。"},{"type":"paragraph","text":"大约一千人参加了这个追悼会。在大厅里，主席台的正中悬挂着毛主席的巨幅遗像，遗像下面的横幅上写道:“毛泽东思想是战无不胜的!”"},{"type":"paragraph","text":"比中协会名誉主席罗贝尔·阿梅德主持追悼会。追悼会在《东方红》乐曲声中开始，全体起立默哀。"},{"type":"paragraph","text":"罗贝尔·阿梅德致悼词。他说，毛主席是伟大的革命理论家和活动家。他说，毛主席“高瞻远瞩地驾驭着我们时代的一切变迁”。他的业绩是不可磨灭的。"},{"type":"paragraph","text":"洛伊斯·斯诺夫人在会上回忆了她和她的丈夫埃德加·斯诺会见毛主席的情景。她说，毛主席“使中国摆脱苦难的深渊，成为今天这样有生气的站起来了的国家”。"},{"type":"paragraph","text":"比中协会秘书长塞尔日·贝湖在讲话中介绍了毛主席革命的一生和事业。协会副主席让·尼翁介绍了中国人民在毛主席和中国共产党的英明和正确领导下，在社会主义革命和建设中所取得的巨大成就。"},{"type":"paragraph","text":"追悼会之后，比利时朋友们瞻仰了介绍毛主席革命生平的照片。许多朋友还购买毛主席著作，以便学习。"},{"type":"paragraph","text":"协会副主席格泽维埃·雷利康和其他领导人也出席了追悼会。"},{"type":"paragraph","text":"参加追悼会的还有比利时马克思列宁主义共产党中央委员会第一书记费尔南·勒菲弗尔。"},{"type":"paragraph","text":"中国驻比利时大使馆参赞王浩和大使馆其他外交官员应邀出席了追悼会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f272d1eb38"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
