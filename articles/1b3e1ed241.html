script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji14","name":"毛泽东全集第14卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"争取对内和平，巩固已得阵地","alias":"","parts":[{"type":"paragraph","text":"争取对内和平，巩固已得阵地"},{"type":"paragraph","text":"（1940年3月5日）德怀同志："},{"type":"paragraph","text":"甲、反磨擦的武装斗争，在西北、华北的主要的地区，有暂时告一段落之必要与可能。因蒋之军事攻势已基本上被我击溃，而蒋现时实无法大举“剿共”。我在山西、在河北、在边区均有极大胜利。我在华北占优势问题已基本上解决。蒋、程、阎、卫等不能不顾及此种事实，因而有使彼方之武装攻势暂时告一段落求得暂时协调之可能。最近两星期来，蒋、程、阎、卫四人及陕蒋、甘朱均或多或少都表露了这种意向。"},{"type":"paragraph","text":"乙、我们方面目前任务是在主要地区求得对内和平，以便在半[1]德怀，即彭德怀，当时任八路军副总司令。"},{"type":"paragraph","text":"[2]指国民党统治集团1939年年底开始在河北、山西发动的大规模军事磨擦，即第一次反共高潮。"},{"type":"paragraph","text":"[3]程，指程潜，当时任国民党政府军事委员会天水行营主任。阎，指阎锡山，当时任国民党军第二战区司令长官。卫，指卫立煌，当时任国民党军第一战区司令长官。"},{"type":"paragraph","text":"[4]陕蒋，指当时任国民党军第十战区（陕西）司令长官兼第三十四集团军总司令的蒋鼎文。"},{"type":"paragraph","text":"[5]甘朱，指当时任国民党军第八战区（甘肃、青海、宁夏及绥远的一年之内集中力量巩固已得阵地，这个任务的意义是伟大的。如果我们能在半年之内，在边区巩固二十三县使其全部边区化，在普绥地区巩固普西北和绥远\"东部，在晋东南地区、河北等区域巩固临汾、屯留、壶关、林县、漳河、大名之线以北及山东一部分，在直、鲁、豫、皖四省边境地区巩固津浦路以西、开封以东、老黄河以南、新黄河以北，那时统一战线就有某种好转的可能（当然顽固派也必然更加恨我）。再则如果我们军事反攻在主要地区没有一时期的停止，虽然我们军事行动的性质仍是自卫性质，但在中间派看来，会觉得我们过激过分，而有可能失去中间派的同情。所以不论对巩固自已力量说来，在对争取中间派同情说来，都有使双方军事斗争暂时告一段落之必要。"},{"type":"paragraph","text":"丙、既然双方军事斗争有使告一段落之可能与必要，我们具体的步骤就应该：（一）认真恢复我们与阎锡山的关系，寻找具体办法，建立新旧军的妥协，使新军、牺盟重归阎锡山指挥。（二）争取使蒋、阎、卫承认军渡、汾阳、临汾、屯留、壶关、林县、漳河、大名之线为双方作战地界，在此线以北之彼军如朱怀冰向南调，在此线以南之我军向北调。我们只保留垣曲通太行山及永和通灵石两条兵站线。在此两条兵站线上，驻少数护卫部队，此部队任"},{"type":"paragraph","text":"[1]绥远，指绥远省，1954年撤销，原辖区并入内蒙古自治区。[2]直，指直隶省，1928年改名河北省。"},{"type":"paragraph","text":"[3]新军，指抗日战争初期，由中国共产党人在与阎锡山建立统一战线的过程中组建和领导的、以山西青年抗敌决死队为主力的山西人民的抗日武装。牺盟，指山西牺牲救国同盟会，1936年9月18日成立。它名义上是阎锡山的官办组织，实际上是由中国共产党人直接领导的群众抗日团体，在山西抗日战争中发挥过重大的作用。务纯为护卫交通，不做地方工作。如果彼方能保证不向此线以北攻击，彼军即使石友三、高树勋、丁树本、朱怀冰、庞炳勋、范汶杰、王靖国\"在此线以南构筑防御堡垒线，我们也只得听之。仅在彼军越过此线向北进攻时，我则坚决反击之。（三）上述两条中目前的重心在第二条，其重心之重心又在朱怀冰退出磁、武、涉三县及承认壶关、林县为我驻军地区。请你考虑，如彼方只承认平顺、磁县之线为两军境界，要求我退出壶关、林县地区时，我是否可以承认退出此两县。再则，请你考虑把反攻朱怀冰之步骤推缓若于大，以看谈判之成功与否。袁晓轩应在洛阳继续谈判，暂不离升为宜。对大名以南之石、高、丁三部，我们不加攻击。兄意如何，请考虑见告为盼。"},{"type":"paragraph","text":"泽东稼蔷"},{"type":"paragraph","text":"三月五日"},{"type":"paragraph","text":"[1]石友三，当时任国民党军第六十九军军长、冀察战区察哈尔游击总司令。高树勋（1898一1972)，河北盐山人，当时任国民党军第三十九集团军新编第八军军长。丁树本，当时任国民党军冀察战区游击第一纵队司令。庞炳勋（1879—1963），河北新河人，当时任国民党军冀察战区副总司令、第二十四集团军总司令兼第四十军军长。范汉杰（1895—1976)，广东大埔人，当时任国民党军第二十七军军长。王靖国（1891—1952），山西五台人，当时任国民党军第十三集团军总司令。"},{"type":"paragraph","text":"[2]磁、武、涉，指河北磁县、武安和涉县。[3]袁晓轩，当时任八路军驻洛阳办事处处长。[4]稼蔷，即王稼祥，当时任中共中央军委副主席兼总政治部主任。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":451,"page_end":453},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b3e1ed241"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
