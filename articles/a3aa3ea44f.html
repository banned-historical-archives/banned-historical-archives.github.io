uthors":["黄任轲"],"dates":[{"year":1957,"month":6,"day":11}],"is_range_date":false,"parts":[{"text":"黄任轲等12人要求公开北大同学寄来的公开信","type":"title"},{"text":"黄任轲","type":"authors"},{"text":"同学们：","type":"appellation"},{"text":"在全国各大学大放大鸣的今天，我们复旦还是风平浪静，这是为什么呢？因为现在还有人在阻挠鸣放！这里我们向大家揭发一件令人愤慨的事：我们确实知道北大同学有一封公开信写给我们同学，呼吁中要我们和他们站在一起，支持毛主席大放大鸣的政策。","type":"paragraph"},{"text":"但是，这封信在学生会领导干部手里，这是我们不能容忍的，我们向学生会提出强烈抗议，作为复旦同学，我们反对学生会的扣压全体同学信件的行为，我们有权利要求学生会公开发表这封信，我们有权利要求学生会领导干部向我们作出交代。","type":"paragraph"},{"text":" 中二　黄任轲等12人　06.11","type":"paragraph"}],"comments":[],"origin":"共青团复旦大学委员会编：《右派思想言论专辑》第一期（校内刊物、仅供参考），1957年7月11日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3aa3ea44f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
