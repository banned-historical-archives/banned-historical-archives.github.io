争问题的指示","authors":[],"dates":[{"year":1950,"month":1}],"is_range_date":false,"parts":[{"text":"中央对于各界人民代表会议中团结与斗争问题的指示","type":"title"},{"text":"武汉市对第二次各界代表会议工作的检讨报告，提出了一些新的问题，最值得注意的是反映党内同志们及进步分子对统一战线、团结中的斗争缺乏思想准备。因此，在某些原则问题上表现模糊，而却在方式上表现生硬，应该了解争论与批评是需要的，但须注意达到团结。争论的方式，不应发展紧张的对抗，或组织当场争论，而应多多采取民主协商。当场争论有时是难免的，其内容必须注意于主要的原则问题，而不要凡事皆争。其方式必须是适合会议民主程序的发言，而不要采取集中打击的方式。原报告转发供各地考虑。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a4fe4d57a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
