script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平副总理同马科斯总统继续会谈马科斯总统参观北京部队某部受到热烈欢迎","authors":[],"dates":[{"year":1975,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年六月九日电　国务院副总理邓小平同菲律宾共和国总统费迪南德·埃·马科斯，今天下午继续举行会谈。"},{"type":"paragraph","text":"新华社北京一九七五年六月九日电　菲律宾共和国总统费迪南德·埃·马科斯今天上午由外交部长乔冠华、中国人民解放军副总参谋长何正文陪同，参观了中国人民解放军北京部队某部装甲部队，受到这个部队指战员的热烈欢迎。"},{"type":"paragraph","text":"当马科斯总统等来到装甲部队时，中国人民解放军北京部队副司令员王振祥和装甲部队的负责人叶振良、白雪天等热情接待了菲律宾贵宾。在这里，贵宾们观看了坦克兵的军事表演。表演结束后，马科斯总统同参加表演的指战员一一握手，表示祝贺，并在坦克面前同指战员们一起合影留念。"},{"type":"paragraph","text":"今天下午，马科斯总统等由外贸部长李强陪同参观了中央民族学院。"},{"type":"paragraph","text":"马科斯总统等菲律宾贵宾今天还游览了长城、定陵和故宫。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e0b9a68ec"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
