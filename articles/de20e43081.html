art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"工人阶级对毛主席最忠","authors":["刘成军","工人毛泽东思想宣传队成员/上海警备区某部副连长王定忠干事侯高先","战士"],"parts":[{"type":"paragraph","text":"姚文元同志的重要文章传达了我们伟大领袖毛主席的最新指示：“实现无产阶级教育革命，必须有工人阶级领导，必须有工人群众参加，配合解放军战士，同学校的学生、教员、工人中决心把无产阶级教育革命进行到底的积极分子实行革命的三结合。工人宣传队要在学校中长期留下去，参加学校中全部斗、批、改任务，并且永远领导学校。在农村，则应由工人阶级的最可靠的同盟者——贫下中农管理学校。”回顾我们参加工人毛泽东思想宣传队在上海六十四中学三个月的斗争实践，深刻地体会到，毛主席的这一光辉指示，为无产阶级教育革命指明了方向，是彻底摧毁资产阶级知识分子对我们学校统治的最锐利的武器。实践证明，工人阶级最有知识，工人阶级有阶级斗争、生产斗争、科学实验三大革命运动的丰富的实践经验，对学校的教育革命最有领导权。"},{"type":"paragraph","text":"工人宣传队一进学校，就狠抓阶级斗争。在斗争中，他们立场坚定，爱憎分明，处处用阶级斗争的观点观察一切，分析一切。文化大革命运动初期，这个学校的革命小将在一个教师的家里发现了一包美蒋邮票，当时没有当回事请。工人同志们进校后举办了对敌斗争专题学习班，了解到这一线索后立即进行分析研究。他们向师生们介绍了本厂在对敌斗争中，如何发现线索跟踪追击揪出坏人的经验。工人们的介绍，引起了小将们的警惕，经过深入调查，发现这个家伙原来是混进教师队伍里的伪县长。活生生的现实，使革命师生受到了一次深刻的阶级斗争教育，大大提高了大家的阶级斗争观念，学校很快掀起了大揭阶级斗争盖子的高潮。"},{"type":"paragraph","text":"清理阶级队伍工作轰轰烈烈开展以来，工人同志又发现有的师生对坏人光揪不斗，就及时引导革命师生把清理阶级队伍和革命大批判结合起来。在批斗中，工人们还领导革命师生狠挖黑根子，把对本校坏人的批判和批判中国赫鲁晓夫修正主义教育路线结合起来，使大家认识到，是修正主义教育路线把这批坏人包庇下来，从而加深了大家对修正主义教育路线的仇恨，增强了彻底搞好教育革命的决心。"},{"type":"paragraph","text":"通过这些实践，使革命师生认识到，工人阶级对学校的教育革命最有领导权。他们说：“工人同志跟毛主席最紧，对毛主席最忠，是无产阶级文化大革命和一切工作中的领导力量，也是我们学校教育革命的领导力量。”"},{"type":"paragraph","text":"我们在和工人宣传队并肩战斗中，也学到了工人阶级最宝贵的品质和丰富的阶级斗争经验。工人阶级是我们思想革命化的最好老师，我们决心虚心向工人阶级学习，不断提高自己的阶级斗争和两条路线斗争觉悟，永远和工人阶级站在一起，坚决支持工人阶级对学校的领导，为彻底搞好学校的无产阶级教育革命，夺取无产阶级文化大革命的全面胜利立新功。DW：上海警备区"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de20e43081"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
