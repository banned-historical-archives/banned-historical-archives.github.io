script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"否定修正主义是为了掩饰自己的修正主义","authors":["江苏省响水县嘉庆大队贫下中农理论组"],"dates":[{"year":1976,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"否定修正主义是为了掩饰自己的修正主义"},{"type":"paragraph","text":"江苏省响水县嘉庆大队贫下中农理论组"},{"type":"paragraph","text":"伟大领袖毛主席深入分析了社会主义时期的阶级、阶级矛盾和阶级斗争，为我党制定了社会主义历史时期基本路线，并且多次告诫全党：“要警惕出修正主义，特别是要警惕在中央出修正主义。”毛主席的谆谆教导，明确地为我们指出修正主义是社会主义时期的主要危险。反对修正主义，包括反对经验主义和教条主义。经验主义只承认局部的表面的感觉经验的可靠性，否认感性认识必须提高到理性认识；教条主义只承认过去的现成的理性认识的可靠性，否认理性认识来源于实践，否认认识必须经过感性阶段。经验主义和教条主义都是修正马列主义的，都是违反辩证唯物主义的认识论的。只是凭着自己一时的经验，或者只是照搬别人作出的结论，来处理现实阶级斗争中的问题，发展下去都会导致政治上的修正主义。因此，反对修正主义，在思想上，要反对教条主义，也要反对经验主义。不能只提一项，放过另一项。“四人帮”别有用心地只提反对经验主义，不提反对教条主义，这正好说明他们不懂马列，反对马列。他们以批判经验主义来代替批判修正主义，实际上就是不反对修正主义，使革命人民放松对于修正主义的警惕，让他们放手地搞修正主义。正如列宁指出的：“否定修正主义是为了掩饰自己的修正主义。”（《图快出丑》，《列宁全集》第20卷第324页）"},{"type":"paragraph","text":"特别需要提出的是：“四人帮”反党集团在毛主席号召学习无产阶级专政理论、反修防修时，把批判经验主义作为纲，是为他们篡党夺权制造理论根据，是他们玩弄的一个阴谋。其目的就是转移革命斗争大方向，把斗争矛头指向中央和地方的一大批有革命经验的党政军负责同志，以便他们篡夺党和国家的最高领导权。他们把经验主义作为当前主要危险，作为纲，正是为他们为所欲为地捏造罪名陷害革命干部制造舆论。事实上他们也确实是这样干的：他们自封为“无产阶级钢铁公司”，动不动就训人，给人戴大帽子；他们私设秘密联络点，大整中央和地方党政军领导同志的黑材料，搞顺我者昌，逆我者亡；他们以“无产阶级正确路线代表”自居，到处插手，把地方搞乱，把罪名加在中央和地方一大批负责干部身上。他们的所作所为，不是正好说明了他们反对经验主义的险恶用心吗？"},{"type":"paragraph","text":"“自称正人君子的必须防，得其反则是盗贼”，这是伟大的共产主义战士鲁迅从长期斗争中得出的一项宝贵经验。“四人帮”就是这样一伙自称“正人君子”的“盗贼”，他们马列主义词句喊得很响，而搞起修正主义来却最凶，最狡猾。但是一切搞修正主义、搞分裂、搞阴谋诡计的人，是注定没有好下场的。“一切魔鬼将统统回到地狱里去”，“四人帮”反党集团也决不例外。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d82da482a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
