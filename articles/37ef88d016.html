ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于同意争取在旧历年前进攻海南岛的方针的电报","alias":"","parts":[{"type":"paragraph","text":"关于同意争取在旧历年前进攻海南岛的方针的电报"},{"type":"paragraph","text":"（1949年12月31日）林彪同志（中央转）："},{"type":"paragraph","text":"转来邓赖洪廿七日电已悉。同意该电所取方针，即努力争取在旧历年前进攻海南岛，但以充分准备确有把握而后动作为原则，避免仓卒莽撞造成过失。为此，邓赖洪应速到雷州半岛前线亲自指挥一切准备工作，并且不要希望空军帮助。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月卅一日[1]林彪，当时任中国人民解放军第四野战军司令员、中南军区司令员。"},{"type":"paragraph","text":"[2]邓，指邓华，当时任中国人民解放军第十五兵团司令员。赖，指赖传珠，当时任中国人民解放军第十五兵团政治委员。洪，指洪学智，当时任中国人民解放军第十五兵团第一副司令员兼参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":110,"page_end":110},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37ef88d016"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
