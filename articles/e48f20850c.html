script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第二天大会上农民御恨诉苦叙述被反动派迫害情形，声泪俱下:讲到地主恶霸的剥削时，咬牙切齿。","authors":["洪羊"],"dates":[{"year":1949,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报苏州讯】　昨(十四日)为吴县临时代表大会第二天，八时正，全体农民代表和来宾均已到齐。会议开始，首由大会主席刘阿荣(黄埭区农民代表)向出席各代表说:请各区代表上台控诉在国民党反动统治及封建势力残酷迫害下，所受的苦处。当时全场掌声雷动历久不息。"},{"type":"paragraph","text":"第一个上台诉苦的是黄埭区代表包阿五，他诉说做了三十一年的长工，受尽地主种种的剥削，把他简直当作与牛马一样。第二个是木凟区的代表顾金林，他为陈租的纠纷，被地主告了一状，官司打到伪高等法院，在“衙门八字开，有理无钱莫进来”的压迫下输了，房屋也被封了。第三个是东山区的女代表赵三宝，她诉说，自幼没了爹娘，帮人做小娘姨，十五岁那年嫁给雇工王春年，家里很穷，还被土匪抢了好几次，丈夫被打伤，去年死了，一个儿子被国民党匪军几次三番要抽丁，吃尽了苦，在十三年前三宝在怀孕足月的时候，又被万恶无耻的国民党军队强奸，她诉说到这里啜泣得更厉害。全场代表听了，在不可遏止情况下，一致呼出了电力一般的口号:“澈底消灭国民党反动派”。其次阳澄区代表何阿三，徐根福相继诉苦。木凟区的代表徐炳钦，他诉说:被恶霸陷害，在反动派国民党的“保安队”受了毒刑拷打，死去活来，有三次，又被伪吴县政府判了七年徒刑，结果家里借债来过活，吃了十三个月官司。浒关区的女代表惠巧英，她诉说:男家利用地方上的“自卫队”恶霸势力和她的父亲捣蛋，结果她仍坚持和不良婚姻制度斗争到底。再有一个代表李宝生，他诉说:过去受到地主种种的剥削与痛苦，太仓县来苏列席的农民代表高必泉也在大会上诉说他同样受到封建剥削的苦处。此时已是十一时左右，台上仍然站满很多要求诉苦的代表，当时主席向大家解释，在这次大会上，我们的苦处是诉不完的，我们要向本乡本区的农民去诉，还要发动农民弟兄都来诉苦。旋由吴县县委方勣同志，综合报告各区代表所提关于农民翻身大事的五个主要提案:(一)怎样团结和组织起来，(二)怎样肃清匪特反恶霸，(三)怎样把社会搞好，(四)怎样保护秋收，(五)怎样发动秋收支前。上午的诉苦大会于十二时在热烈情绪中休会。下午各组代表进行分组讨论。"},{"type":"paragraph","text":"(洪羊)十五日"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e48f20850c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
