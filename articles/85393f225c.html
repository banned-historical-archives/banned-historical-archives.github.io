script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"深切怀念毛主席周总理　积极宣传日中友好日本新制作坐剧团在各地作访华汇报演出受到热烈欢迎","authors":[],"dates":[{"year":1978,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社东京一九七八年一月七日电　一九七七年四月初至五月初访问过中国的日本新制作坐剧团，自同年五月底至十二月中旬，先后到日本八十一个城市进行访华汇报演出，宣传日中友好，呼吁反对苏联的霸权主义。"},{"type":"paragraph","text":"新制作坐剧团的团员们每当谈到在中国访问演出期间，受到华国锋主席和叶剑英、李先念付主席等中国领导人的亲切接见以及受到中国人民热传欢迎的传景，都很激动。他们为了把中国人民的深情厚谊转达给日本人民，回国不久，就到日本各地作访华汇报演出，先后共演出一百零四场，观众达十二万人以上。这些演出，受到日本各界的热烈欢迎。"},{"type":"paragraph","text":"这个剧团的团长真山美保在向中国记者谈起这次演出的感受时，回忆起新制作坐剧团所走过的斗争路程，更加激起对中国人民的伟大领袖毛主席和敬爱的周恩来总理的深切怀念。"},{"type":"paragraph","text":"演员込山虔二郎说:每当我们演唱《东方红》和《歌唱周总理》歌曲时，就忍不住流下眼泪，观众们也一边听一边流泪，台上台下的感传溶为一体。通过演出，我们亲身体会到，广大的日本人民为中国人民失去伟大的领袖毛主席和敬爱的周总理而无限悲痛。"},{"type":"paragraph","text":"二十多年前，真山美保在北京受到周总理的亲切接见。那时，周总理十分关心地向她询问新制作坐剧团的情况。当真山对周总理说，新制作坐剧团的口号是“到群众中去，和群众在一起创作”时，得到周总理的热传赞扬。周总理说:你们选择的道路是正确的，希望你们今后不管迂到什么困难，都要努力坚持下去。真山深情地说，二十多年来，每当我们在遇到困难时，就想起敬爱的周总理的话，便感到顿时增添了无穷的力量和勇气。真山说:“周总理不仅受到全中国人民的爱戴和尊敬，而且也是我们和世界人民十分敬仰的人，他不仅是中国人民的卓越的领导人，也是本世纪罕见的伟大政治家。我们一定不忘敬爱的周总理的亲切关怀，在今后前进的道路上，不管遇到什么风浪，都要坚持‘到群众中去，和群众在一起创作’的方向。”"},{"type":"paragraph","text":"担任演唱《歌唱周总理》的宫野侑子说:“当我们用中文演唱怀念周总理的歌时，整个场内充满着肃穆的气氛，许多人都流下了热泪，人们对周总理深切怀念的真挚感情，远远超过语言的障碍，从心底里自然地表现出来。”她还说:“当我们演唱《歌唱华主席》的歌曲，舞台上出现中国人民紧密地团结在以华主席为首的党中央周围奋勇前进的巨幅标语时，全场顿时爆发出热烈的掌声，使我们感到广大日本人民为中国人民在华主席的领导下一举粉碎‘四人帮’所取得的伟大胜利表示由衷的祝贺和喜悦的心情。”她说:“日中两国人民真是心连心哪!”"},{"type":"paragraph","text":"新制作坐剧团在演出过程中接触到的日本各界人士，不管是工人、农民、渔民，还是学生、妇女，也不管是青少年，还是老年人，都热情地表示“要同中国人民永远友好”的真实感情，到处都听到“祝愿日中友好日益发展”的声音。"},{"type":"paragraph","text":"许多观众看完演出后不愿离开剧场，他们一遍又一遍地高呼:“还我北方领土!”“不收复北方领土决不罢休!”这正义的呼声象春雷般响彻北海道和日本列岛上空。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85393f225c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
