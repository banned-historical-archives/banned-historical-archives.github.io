dates":[{"year":1957,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社华沙5日电】　波兰通讯社在4日发表一项公报说，波兰统一工人党中央委员会书记处考虑了报业管理总局作出的勒令“直言”周刊停刊的决定，认为这个决定是正确的。"},{"type":"paragraph","text":"书记处已经知道了编辑部在这个问题上的态度，编辑部的人员大多数是党员。"},{"type":"paragraph","text":"书记处说，“直言”周刊的编辑部——包括一些党员在内——许多个月来一直在进行反对执行党的主要机构所通过的决议的活动，采取一种无益的、消极的态度，用错误的观点来叙述我国的实际的政治和经济情况，散布对于建设社会主义的现实的怀疑，并且在许多问题上宣扬资产阶级观点。"},{"type":"paragraph","text":"尽管党中央的代表费了许多口舌和作了许多警告，“直言”周刊编辑部和其中的党员的活动不仅没有什么改进，反而变本加厉起来。一个能够说明这一点的特别明显的证据是在9月份付印的一期“直言”周刊，这一期的内容以一种非常嚣张的和挑衅的方式攻击党和政府的政策，荒谬地和失实地叙述我国的经济和政治局势，鼓吹与社会主义十分不相容的观点。"},{"type":"paragraph","text":"党中央书记处考虑了这一切情况，认为报业管理总局作出的勒令“直言”周刊停刊的决定是正确的，已建议党中央检查委员会研究这个问题，并且对“直言”周刊编辑部的党员采取党的组织处分。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78e4a388e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
