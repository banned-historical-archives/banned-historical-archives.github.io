art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"许多部队掀起学习毛主席军事著作热潮","authors":["野雨/保柯"],"parts":[{"type":"paragraph","text":"本报讯 目前，许多部队掀起了学习毛主席军事著作的热潮。"},{"type":"paragraph","text":"0923部队领导机关在7月22日发出通知，号召全体官兵认真学习毛主席军事著作，并将有关的文件印成单行本下发部队。该部还指示支队以上干部，结合毛主席提出的作战原则向部属作学习启发报告，并为提高战术合练的质量打下坚实的理论基础和思想基础。0922部队阮贤榜参谋长还向所属各部队负责干部和直属机关排以上干部，作了题为“认真学习毛主席军事著作，反对教条主义”的动员启发报告。0060部队某战防炮连党支部，连续召开了两次支委扩大会，学习和讨论了国防战士报社论“掀起学习毛主席著作的高潮”，驳倒了“过时了”和“没有文化学不成”等荒谬论点，鼓舞了大家的学习情绪。全连干部都重新订了红专规划，把毛主席的著作列为重要学习内容。0058部队三支队的军官们，最近也都重新订了红专规划，把学习毛主席著作列为红专的重要内容。"},{"type":"paragraph","text":"在学习中，各单位都加强了组织领导工作。0055部队首长在今年4月间就组织了学习毛主席军事著作的中心小组，所属各支队都成立了学习小组。0058部队一支队党委对领导部队学习毛主席军事著作十分重视。支队以党委为核心，组成了学习指导小组，分队以分队党委为核心，组成了学习辅导小组。全支队共设有四个毛主席著作辅导室和专修室，各连俱乐部也新辟了学习毛主席著作辅导栏和介绍毛主席生活故事的专栏。各分队、支队直属机关还组织了一次小型的学习毛主席著作展览会，对广大官兵鼓舞很大。该部三支队四分队军官在自学毛主席军事著作的基础上，还举行了“十大军事原则”的讲座，由学习较好的同志轮流主讲，群众反映很好。他们决定今后每周举行一到二次。0060部队机关干部自7月份开始学习毛主席著作，并且座谈了学习心得。现在该部计划建立毛主席军事著作学习研究室，并把有关战例用图表展览出来，供大家学习参考。"},{"type":"paragraph","text":"在学习毛主席军事著作中，广大军官干劲十足。0055部队很多军官在各项工作大跃进的情况下，每天仍能坚持一小时的学习。该部副部队长于春圃从今年春天以来，已经挤出一百五十多小时自修毛主席军事著作。他在学完了矛盾论、实践论和中国革命战争的战略问题等文章以后，已经写出了两篇长达万字的学习心得，并写了有关群众路线和战争规律的论文。学习了毛主席著作以后，军官们普遍反映，思想大大解放，摆脱了教条主义的束缚，越学越有劲头，并认为毛主席的文章深入浅出，具体实际，通俗好懂。许多单位还结合实际，用毛主席的军事思想指导部队训练，从而收到了良好的效果。"},{"type":"paragraph","text":"0208部队二支队党委决定在全体干部中掀起一个学习毛主席军事著作和思想解放的热潮。不久前，支队首部们做了启发报告；富有战斗经验的营连干部，在一起座谈了教条主义对战斗训练的危害性和怎样运用我军成功的例训练部队；同时在训练中广泛发扬民主。"},{"type":"paragraph","text":"图为某连二排战术演习完毕，就地评指挥评动作。 野雨、保柯摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b7acb8629"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
