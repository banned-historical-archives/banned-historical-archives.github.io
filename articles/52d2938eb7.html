s":[{"year":1967,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“十六条”是文化大革命的行动指南"},{"type":"paragraph","text":"北京供电局无产阶级革命派大联合总部　郊电分部"},{"type":"paragraph","text":"去年八月八日，在毛主席亲自主持的八届十一中全会上，制定了《中国共产党中央委员会关于无产阶级文化大革命的决定》。无产阶级革命派一遍一遍地听着广播，直到深夜，都激动得睡不着觉。"},{"type":"paragraph","text":"无产阶级革命派以“十六条”为武器，在这一年来的运动中，取得了辉煌的胜利。在当前大批判的高潮中，回忆一年来在毛主席领导下，我们所走过的艰难而光荣的路程，无不高呼：“伟大领袖毛主席万岁！万岁！万万岁！”决心把大批判运动掀起一个新的高潮。"},{"type":"paragraph","text":"就在“十六条”公布后的第二天，在我局执行资产阶级反动路线的工作组准备溜走，他们匆匆忙忙地导演了一幕改选文革的丑剧。无产阶级革命派以“十六条”为武器，和他们展开了坚决的斗争，要求以“十六条”为标准，衡量总结前一段运动。工作组在我局执行了资产阶级反动路线，对无产阶级革命派施加了强大的压力，用大字报围攻，小组会批、斗，“扒手”、“右派”的帽子满天飞，把轰轰烈烈的文化革命运动压了下去。他们对无产阶级革命派的手段何其毒也！而对局里党内一小撮走资本主义道路的当权派，却是百般体贴，保护备至。为了使他们逃避群众的斗争，把这一小撮反革命修正主义分子送到远离我局的青龙桥等地“训练”、“修养”。有了“十六条”，无产阶级革命派心明眼亮，认清了工作组的重点不是整党内一小撮走资本主义道路的当权派，而是保护他们；他们不是发现、发展和壮大革命左派，坚决依靠革命的左派，而是打击压制革命左派。他们所执行的是地地道道的打击革命群众，保护党内走资本主义道路当权派的资产阶级反动路线。"},{"type":"paragraph","text":"在工作组撤走以后，无产阶级革命派以“十六条”为教育群众、团结群众、发动群众的有力武器，终于形成了浩浩荡荡的革命大军。在胜利前进的道路上，无产阶级革命派始终以“十六条”作为衡量自己行动的标准。"},{"type":"paragraph","text":"当前，正当全国亿万革命群众掀起了革命的大批判新高潮的时候，我们无产阶级革命派，坚决按照我们伟大领袖毛主席的伟大战略部署，拿起笔，作刀枪，彻底批判党内最大的一小撮走资本主义道路的当权派。"},{"type":"paragraph","text":"一年来的斗争实践，使我们深深体会到“十六条”是无产阶级文化大革命的纲领性指导文件。我们一定要时时学习“十六条”，宣传“十六条”，掌握“十六条”，运用“十六条”，把无产阶级文化大革命进行到底！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52d2938eb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
