","袁箴"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"讽刺诗——颂“压”","type":"title"},{"text":"四川袁箴","type":"authors"},{"text":"颂“压”    牢骚客(四川省人民出版社“农村俱乐部”主编袁箴)","type":"subtitle"},{"text":"压啊压，","type":"paragraph"},{"text":"你的本事比天大，","type":"paragraph"},{"text":"无理时你是我的救星，","type":"paragraph"},{"text":"你能使反对我的人儿不说话。","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"压啊压，","type":"paragraph"},{"text":"你比孙悟空更会变化，","type":"paragraph"},{"text":"你变出帽子无其数，","type":"paragraph"},{"text":"随便甩一顶，哪个不害怕？","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"压啊压，","type":"paragraph"},{"text":"你真是历史学家，又“精通”辩证法，","type":"paragraph"},{"text":"凡事会把人家历史上的小辫儿抓，","type":"paragraph"},{"text":"怕他不归依伏法！","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"压啊压，","type":"paragraph"},{"text":"你是开会的行家，","type":"paragraph"},{"text":"小会压，大会压，","type":"paragraph"},{"text":"团内还有“轮回批判法”","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"压啊压，","type":"paragraph"},{"text":"你是法宝我们可把你耍灵啦，","type":"paragraph"},{"text":"写稿的，他会承认是资产阶级名利思想，","type":"paragraph"},{"text":"发牢骚的，他会承认立场反动，该遭刀杀！","type":"paragraph"},{"text":"×　×　×","type":"paragraph"},{"text":"压啊压，","type":"paragraph"},{"text":"不服的就压，","type":"paragraph"},{"text":"“落后”的就压，","type":"paragraph"},{"text":"不当应声虫的就压，","type":"paragraph"},{"text":"再不认“错”，给你行政处罚！","type":"paragraph"},{"text":"注解：","type":"paragraph"},{"text":"压，压，压——","type":"paragraph"},{"text":"是出版社的传统法宝，","type":"paragraph"},{"text":"从老吉直到……","type":"paragraph"},{"text":"但愿这次连根拔！","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选辑4》(内部文件，只供领导同志参考，请勿外传和翻印)，中共四川省委宣传部办公室编，1957年7月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9844927c0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
