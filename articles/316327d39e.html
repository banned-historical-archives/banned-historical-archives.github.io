art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做毛泽东时代的新型农民","authors":["升元"],"parts":[{"type":"paragraph","text":"弟弟："},{"type":"paragraph","text":"今天收到了你的来信。我热烈地祝贺你积极响应毛主席的伟大号召，到农村去安家落户。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“农村是一个广阔的天地，在那里是可以大有作为的。”我们知识青年应当积极响应毛主席的号召，到广阔的天地里去经风雨，见世面。这是革命的需要，是阶级斗争的需要，是共产主义伟大事业的需要。农业是国民经济的基础，农业的发展关系到城乡人民物质生活，关系到社会主义建设的巩固和发展。你的任务是光荣而艰巨的。过去，中国赫鲁晓夫在农村推行“三自一包”、“四大自由”，妄图复辟资本主义，农村两个阶级、两条道路、两条路线的斗争是很激烈的。你要高举毛泽东思想伟大红旗，和贫下中农站在一起，搞好革命大批判，狠批中国赫鲁晓夫在农村推行的修正主义路线，彻底肃清他的流毒，为建设社会主义新农村贡献力量。"},{"type":"paragraph","text":"毛主席教导我们：“我们到了一个地方，就要同那里的人民结合起来，在人民中间生根、开花。”你要虚心向贫下中农学习，学习他们无限忠于毛主席、无限忠于毛泽东思想、无限忠于毛主席革命路线的崇高品质，学习他们在三大革命斗争中敢想、敢干、敢革命的大无畏精神，学习他们艰苦奋斗的优良作风，好好改造思想，把自己锻炼成为无产阶级革命事业可靠的接班人。"},{"type":"paragraph","text":"弟弟，你坚决执行毛主席的革命路线，走与工农相结合的道路，勇敢到农村安家落户，这很好。但是，这仅仅是一个开始，你还要做好克服种种困难的思想准备。因为你从小读书，脱离劳动，受修正主义教育路线影响很深，无论在生活上、还是在劳动中，都可能遇到这样或那样的困难。越是在这个时候，你越要牢记毛主席的教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”在困难面前要看到光明，提高勇气，坚持下去。"},{"type":"paragraph","text":"弟弟，我相信你一定会在农村这个广阔的天地里生根开花，做一个毛泽东时代的新型农民。"},{"type":"paragraph","text":"此致"},{"type":"paragraph","text":"革命敬礼"},{"type":"paragraph","text":"哥哥 升元"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"316327d39e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
