script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利工人奋起反压迫反剥削  许多城市工人纷纷举行罢工和抗议示威","authors":[],"dates":[{"year":1968,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利工人奋起反压迫反剥削"},{"type":"paragraph","text":"许多城市工人纷纷举行罢工和抗议示威"},{"type":"paragraph","text":"新华社三日讯　罗马消息：意大利许多城市的工人纷纷举行罢工和示威游行，抗议意大利反动政府和垄断资本家的残酷压迫和剥削，要求改善生活待遇。"},{"type":"paragraph","text":"一日，在西西里区的特拉巴尼省和阿格里琴托省的十多个城镇爆发了声势浩大的罢工，总共有十万工人和居民举行了示威游行，使这些城镇陷于瘫痪状态。这次示威游行，是为了抗议政府在这个地区遭到强烈地震后对居民的悲惨处境不闻不问。"},{"type":"paragraph","text":"在意大利南部那不勒斯的一个工业区，工人们一日也举行示威游行，抗议资本家关闭和拆除一个电气机械厂。这家工厂已经被工人占领了三个多星期。示威者断绝了那不勒斯—萨勒诺公路的交通，并且封锁了当地的火车站。数百名前来进行镇压的警察野蛮殴打工人、工人家属以及前来支援的学生。但是尽管如此，示威游行还是一直进行到深夜，这个厂的工人在二日上午还在那不勒斯再次举行了示威游行。"},{"type":"paragraph","text":"在那不勒斯郊区的另外一个工业区，意大利钢铁公司国营炼钢厂的两千名工人也举行了示威游行，抗议资方拒绝接受他们的合理要求。"},{"type":"paragraph","text":"那不勒斯的其他许多企业的工人和资本家展开的斗争也正在发展。特别是在意大利南部最大的纺织纤维厂——罗迪亚托切工厂，工人为增加工资和其他要求而举行的罢工，一日已经进入了第七天。"},{"type":"paragraph","text":"在意大利北部的里雅斯特，五千多名举行罢工的五金和机械制造工人，在市中心举行长时间的示威游行，抗议资本家拆除工厂的计划，要求充分就业和增加工资。铁路工人一日举行的二十四小时罢工，使米兰地区火车全部停驶，其中包括意大利全部国营铁路的四分之一。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5429dbc16"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
