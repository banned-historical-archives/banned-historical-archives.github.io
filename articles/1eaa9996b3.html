发生急躁情绪","authors":["于竞祁"],"dates":[{"year":1956,"month":2,"day":1}],"is_range_date":false,"parts":[{"text":"四川地区在资本主义工商业改造工作中发生急躁情绪","type":"title"},{"text":"于竞祁","type":"authors"},{"text":"【四川分社1日讯】四川地区在对资本主义工商业改造中有急躁情绪，成都、自贡、万县三市曾限期两、三天完成清产核资工作，达县、遂宁等地要求四天完成人事安排、经济改组和调整商业网的工作。有的地区在清产核资初期对政策界限划不清，将连家铺的房屋全部清点，并连生活资料也进行了登记。在估价问题上由于大户积极分子“带头”低估，影响小户也不得不低估，但他们又顾虑今后的生活问题，情绪不安。雅安市干部在工商户会上动员增资说：“不能空手进社会主义”，要小商贩也表示态度。乐山专区的部分干部存在着“想一下子拿过来”、“党的政策太右”等急躁冒进情绪。盐亭县的一些干部甚至以算账、不批准合营等办法来逼使资本家增资，造成一个资本家自杀。","type":"paragraph"},{"text":"上述问题各地正在进行纠正。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1956年2月1日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1eaa9996b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
