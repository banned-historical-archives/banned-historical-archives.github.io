script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"探亲","authors":["肖三洋"],"dates":[{"year":1976,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"探亲"},{"type":"paragraph","text":"人民解放军某部班长　肖三洋"},{"type":"paragraph","text":"离开家乡四年了，回家探亲，心情激动。在文化大革命中，又过了四个不平凡的年头，家乡该有多大的变化啊！"},{"type":"paragraph","text":"一进村，就听到猪仔叫声，周围站着许多社员。走近一看，原来是个年轻姑娘正在阉猪。动作干脆利落，比我见过的老阉手还来劲。不到一袋烟功夫，一窝小猪就阉好了。"},{"type":"paragraph","text":"这姑娘是大队党支部书记肖宏林的女儿，名字叫肖志红。她原来是共产主义大学的学生，学的是兽医。在学校立志做一个与山区贫下中农划等号的大学生，一毕业就回到家乡。我的家乡在井冈山脚下。解放前，这里的贫苦农民，政治上受压迫，经济上受剥削，根本不可能上学。劳动人民创造的文化，成为地主欺压农民的刀子。有个农民，叫郭承志，七岁给地主放牛，十二岁砍柴为生。有一次，伪保长买了他一担柴，写了一张纸条，叫他到伪乡公所去领钱。郭承志不识字，拿着纸条到了伪乡公所。一进门，就被抓了壮丁。原来那张纸条上写的是“送去壮丁一名”，根本不是什么领钱条。同敌人搏斗了一场，郭承志才逃出了虎口。"},{"type":"paragraph","text":"解放后，郭承志过上了幸福生活，可一直没有忘掉自己过去的痛苦遭遇。他为了让后代永远记住地主阶级压迫穷人的仇恨，特意给儿子起名郭记恨，送他到学校去念书。书是念了不少，可在刘少奇反革命的修正主义教育路线统治下，孩子却变了样。郭记恨在大学读书时，嫌记恨的名字不好听，改成了文斋。有一年，他有事回家来。贫下中农听说郭家大学生回来了，连忙去看他。只见这位文斋梳着光亮的分头，穿着一双皮鞋，两眼朝天，神气十足。他看到贫下中农满身泥土，竟用手帕捂起鼻子。一气之下，大家都走开了。"},{"type":"paragraph","text":"看现在，想过去，真是两个社会两重天，两条路线两个样。邓小平胡说什么现在的“大学生真正象大学生还差得很远”，妄图扭转教育革命的方向，让修正主义教育路线重新统治学校，为他们培养复辟资本主义的贵族老爷。今昔鲜明对比对我的教育，是我回乡探亲的一个重大收获。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69c4cb009e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
