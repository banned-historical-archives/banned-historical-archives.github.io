" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"杜秉锐的痛快和不满","authors":["中国人民解放军","杜秉锐"],"dates":[{"year":1957,"month":6,"day":20}],"is_range_date":false,"parts":[{"text":"杜秉锐的痛快和不满","type":"title"},{"text":"中国人民解放军杜秉锐","type":"authors"},{"text":"海军航空兵翻译室杜秉锐在看到报纸上登载的葛佩琦的言论后，拍着桌子说：“痛快”，“说的对”！还说：“此人一定有冤枉，人民日报记者应当去访问他一下。”有人对他说：“你有意见就‘鸣’嘛！”杜秉锐说：“应当喊‘杀’！坏党员应当杀！”","type":"paragraph"},{"text":"在这以后的一次座谈会上，杜秉锐又说：“现在看来，葛佩琦是孤立的了！没有人来支持他。现在是‘围剿’了！反党言论的大帽子太厉害了！”","type":"paragraph"},{"text":"看到储安平的“党天下”的言论后，杜秉锐说：“任何人不能讲共产党的坏话，说坏话的就是坏人，唯唯诺诺是好人。”又说：“只要有党员的单位，党员总是头头。”","type":"paragraph"},{"text":" 来源：1957年6月20日《解放军报》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f75d955ad"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
