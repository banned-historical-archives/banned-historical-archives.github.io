星星之火战斗队"],"dates":[{"year":1967,"month":9,"day":3}],"is_range_date":false,"parts":[{"text":"\"文攻武卫\"是反动口号！","type":"title"},{"text":"星星之火战斗队","type":"authors"},{"text":"“文攻武卫”口号的出现社会上起了极坏的影响！","type":"paragraph"},{"text":"“文攻武卫”这个口号以极左的面目出现，打着支持“造反派”的旗号，实际上起了保护党内走资派的作用。党内走资派为了保护自己总是挑动群众斗群众，这是文化革命的一个特点。例如：走资派挑动群众甲打群众乙，那末，中央文革某些入应该教育群众甲，揭穿走资派的阴谋，使这两派群众不打。然而“文攻武卫”的出现却正好迎合了走资派挑动群众斗群众的目的。从这可以看出，如果“文攻武卫”的提出者不蠢才的话，那么她就是党内走资本主义道路的当权派！！","type":"paragraph"},{"text":"打倒“文攻武卫”！","type":"paragraph"},{"text":"要文斗，不要武斗！","type":"paragraph"},{"text":"星星之火，可以燎原！","type":"paragraph"},{"text":"毛主席万岁！万岁！万万岁！！","type":"paragraph"},{"text":" 原转载于北京中学红代会作战部《北京红卫兵》，创刊号，1967年9月20日。","type":"paragraph"}],"comments":[],"origin":"原转载于北京中学红代会作战部《北京红卫兵》，创刊号，1967年9月20日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e89a437025"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
