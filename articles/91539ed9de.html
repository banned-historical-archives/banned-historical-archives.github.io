" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"周恩来接见外事口谈批陈","parts":[{"type":"title","text":"883.周恩来接见外事口谈批陈"},{"type":"paragraph","text":"(1967年8月6日)"},{"type":"paragraph","text":"外交部先开小会，以后开大会。(对谢副总理说)你也知道中央文革的意见是叫陈毅同志检讨。我的意思是先批判、后检讨的。现在外交部先开小会，其他组织以后开。"},{"type":"paragraph","text":"到外交部开会我不怕，我得陪着陈毅同志去，这是毛主席给我的任务。"},{"type":"paragraph","text":"你们拿开大会的协议来压我，这样压我，我很难过。我知道(陈毅)大会检讨是通不过的，所以先要批判。你们是批判陈毅，不是叫陈毅检讨。"},{"type":"paragraph","text":"你们最后给我的一个电报说，我们得不到解放，你也得不到解放。这是给我下通牒。我本想给伯达、江青看，算了。我吞下去算了。"},{"type":"paragraph","text":"我是根据毛主席的方针办事，我自己有什么方针？"},{"type":"paragraph","text":"你们(指学生)不要去干涉外交部开小会。外交部开小会没有妨碍。你们要开一次大会，各派都要参加，然后回本单位开中会。如果你们到外交部和大会堂闹，那么我就将十一日大会取消，那责任要由你们来负。现在看来地点仍在大会堂。"},{"type":"paragraph","text":"指示三点：(1)最好明天一点到五点半开小会；(2)关于开大会问题，你们要写一个安排报告，说明安排情况；(3)今晚你们回去做工作，将姬、乔放回来。口号可以喊，但不能打旗子、刷大标语。"},{"type":"paragraph","text":"周恩来对“北外造反团”、“六·一六”说：“现在你们在外交部的扎营示威，这是针对我的。”"}],"authors":["周恩来"],"dates":[{"year":1967,"month":8,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":334,"page_end":334,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91539ed9de"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
