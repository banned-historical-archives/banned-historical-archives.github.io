art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国无产阶级文化大革命的伟大胜利极大地鼓舞了战斗中的世界革命人民粉碎了中国赫鲁晓夫复辟资本主义的阴谋，给帝修反以沉重打击","authors":[],"parts":[{"type":"paragraph","text":"新华社十二日讯 亚非新闻工作者协会书记处、印度尼西亚亚非人民团结组织秘书长伊萨、日本中国友好协会（正统）总部、一些日本国际贸易促进协会地方组织以及友好商社和友好书店，最近纷纷发表声明、打电报、写信，对西藏自治区革命委员会和新疆维吾尔自治区革命委员会成立，中国（除台湾省外）各省、市、自治区全部成立了革命委员会，表示热烈祝贺。"},{"type":"paragraph","text":"亚非新闻工作者协会书记处在声明中指出：革命委员会在中国各省、市、自治区（除台湾省外）的成立，粉碎了帝国主义者和修正主义者妄图使中国“和平演变”的梦想，创造了一个有决定意义的条件，那就是保证中国永远不改变政治颜色，从而加强了中国作为世界反帝斗争最强大的堡垒的地位。声明说，中国人民在毛泽东主席的领导下，通过无产阶级文化大革命的实践，向全世界人民又一次证明了：用毛泽东思想作为指导的和武装起来的人民是不可战胜的；同时也向全世界人民证明了：毛泽东思想是反帝、反修和反对其他反动制度的斗争的指导方针。亚非记协书记处欢呼中国人民在无产阶级文化大革命中所取得的这一光辉的、决定性的成就和胜利。"},{"type":"paragraph","text":"印度尼西亚亚非人民团结组织秘书长伊萨在贺信中说：中国无产阶级文化大革命的全面胜利，是毛泽东思想的伟大胜利，是毛主席的无产阶级革命路线的伟大胜利，是全世界革命人民的伟大胜利。这个伟大的胜利粉碎了中国赫鲁晓夫、现代修正主义和美帝国主义及其走狗破坏强大的中国无产阶级专政、复辟资本主义的阴谋。在毛主席亲自、英明和正确领导下取得的这个划时代的胜利，大大地鼓舞了目前正在印度尼西亚共产党领导下，在毛泽东思想的光辉照耀下，为推翻苏哈托——纳苏蒂安法西斯政权而展开革命武装斗争的印度尼西亚人民，大大地推动了印度尼西亚革命人民更加努力学习战无不胜的毛泽东思想，把毛泽东思想运用到印度尼西亚的具体情况中去。"},{"type":"paragraph","text":"日中友协（正统）总部的贺电说：正当苏联现代修正主义统治集团侵略捷克斯洛伐克而在全世界人民面前宣告了现代修正主义的总破产的时候，得到中国无产阶级文化大革命取得伟大的胜利——全国（除台湾省外）各省、市、自治区全部成立革命委员会的喜讯，这是对美帝国主义、现代修正主义和各国反动派的沉重打击，是对战斗的全世界人民的极大鼓舞。我们怀着喜悦的心情，向伟大的毛泽东主席和七亿中国人民表示祝贺。"},{"type":"paragraph","text":"一些日本国际贸易促进协会地方组织以及友好商社和友好书店在他们的贺电中，热烈祝贺中国七亿人民所取得的无产阶级文化大革命的伟大胜利，衷心祝愿伟大领袖毛主席万寿无疆！祝愿日中两国人民的战斗友谊与日俱增！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b29773103c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
