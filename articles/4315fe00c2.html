art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"世界人民爱读毛主席的书希腊；意大利；缅甸陆续出版毛主席著作毛主席诗词阿拉伯文译本在叙利亚出版","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 雅典消息：毛泽东主席的许多著作，近年来已经陆续译成希腊文，在希腊出版发行，受到了希腊人民的热烈欢迎。"},{"type":"paragraph","text":"这些著作包括：《中国社会各阶级的分析》、《湖南农民运动考察报告》、《星星之火，可以燎原》、《关心群众生活，注意工作方法》、《中国共产党在民族战争中的地位》、《青年运动的方向》、《论政策》、《改造我们的学习》、《整顿党的作风》、《关于领导方法的若干问题》。"},{"type":"paragraph","text":"此外，《毛泽东同志论帝国主义和一切反动派都是纸老虎》和《毛泽东主席同亚洲、非洲、拉丁美洲人士的几次重要谈话》这两本书的希腊文译本，也已经出版。"},{"type":"paragraph","text":"新华社讯 米兰消息：意大利东方出版社已经用意大利文出版了毛主席的著作《中国社会各阶级的分析》。《毛泽东论文学与艺术》一书，也已经译成意大利文出版。"},{"type":"paragraph","text":"新华社仰光电 毛泽东主席的著作《关于正确处理人民内部矛盾的问题》缅文版最近在这里出版。"},{"type":"paragraph","text":"在这以前，《毛泽东选集》第四卷缅文版第一、二册已先后出版。"},{"type":"paragraph","text":"新华社大马士革电 毛泽东主席诗词十八首阿拉伯文译本最近在叙利亚出版。"},{"type":"paragraph","text":"译者马姆杜·哈基博士在前言中说：“诗集的作者是中国最高的政治领袖，他使中国摆脱封建主义、帝国主义的侵略和剥削。毛泽东是当代中国最伟大的诗人。”"},{"type":"paragraph","text":"译者指出：“毛主席诗词已经译成多种文字，左派报刊赞赏它，右派报刊以十分恐惧的心情对待它。”"},{"type":"paragraph","text":"译者说：“当我听到中国人亲口诵读这些诗词的时候，音韵铿锵，使我了解到它的音乐、艺术价值。”"},{"type":"paragraph","text":"他说：“叙利亚和中国的联系有很悠久的历史，毛主席诗词的出版给两国文化交流增加了一块基石。”"},{"type":"paragraph","text":"这个译本是根据毛主席诗词英文和法文译本转译的。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4315fe00c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
