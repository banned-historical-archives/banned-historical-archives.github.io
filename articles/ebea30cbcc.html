" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广州市私商改造工作开展得较慢","authors":["方力"],"dates":[{"year":1955,"month":11,"day":29}],"is_range_date":false,"parts":[{"text":"广州市私商改造工作开展得较慢","type":"title"},{"text":"方力","type":"authors"},{"text":"【广东分社十一月二十九日讯】最近，广州市私商的改造工作开展得比较缓慢。这几天虽已确定选择棉布业作为全业公社合营的试点，但除了初步订出改造方案外，其他具体工作还没有开始，大约要到明年二月，这个行业的改造工作才能告一段落。由于棉布业早已全业实行经销或代销，经营管理开始上轨道，营业情况经多方面安排后一般良好，因此，从这个行业作为试点条件虽然有利，但从创造经验和扩大影响方面来说，意义是不大的。目前除了百货公司也在拟订百货业全行业改造方案外，其他公司基本上没有行动起来。市的全面规划也没有定案。工会、妇联等有关社团力量如何配合，现在也还没有什么具体规划。总的来看，整个工作是远跟不上形势的。而在工商界方面，他们却在积极活动，争取政治地位，争取主动。百货业的资本家已自发地制订企业合营方案送给有关部门，棉布业也订出了初步方案。还有好些行业也在酝酿行动。出席全国工商联执委会的工商界代表回来后，因为市委副书记赵成武同志和市委统战部部长罗培元同志都没有返回，传达工作也没有能及时进行。陈祖沛、林志澄等代表回来后表面上是沉默，但据说暗中很活动。工商界现在陆续出现大吃大喝，安插私人入企业，借清理债务之名偷逃资金等现象。","type":"paragraph"},{"text":"广州对私营商业改造工作(对私营工业改造工作情况也差不多)在新形势下出现这种缓慢的情况并不是偶然的。广州商业集中，情况也特别复杂，的确给改造工作带来很多困难，但主要的还是过去对改造工作抓得不紧。今年上半年安排市场中，主要是着重解决当时的困难户问题，没有很好的从全行业来考虑，只顾安排而不注意改造。很多措施都是临时性的。今年下半年肃反运动一来，改造工作无形之中就放下了。因此，新形势到来后就表现出工作基础薄弱，跟不上新的形势。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年12月3日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebea30cbcc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
