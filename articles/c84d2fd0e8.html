980,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿拉伯埃及共和国副总统胡斯尼·穆巴拉克和夫人一行，五日下午乘专机到达北京，开始了他们对我国为期五天的访问。"},{"type":"paragraph","text":"国务院副总理邓小平和夫人卓琳，人大常委会副委员长乌兰夫等，前往机场迎接。在飞机舷梯旁，邓小平副总理握着穆巴拉克副总统的手说:“欢迎您!”穆巴拉克副总统说:“我很高兴再次访问你们这个伟大而又友好的国家。”邓小平副总理、乌兰夫副委员长还陪同穆巴拉克副总统检阅了中国人民解放军陆海空三军仪仗队。"},{"type":"paragraph","text":"这是穆巴拉克副总统继一九七六年访问我国后的第二次来访。穆巴拉克副总统在北京期间，华国锋总理将会见他，邓小平副总理将同他举行会谈。双方将讨论当前的国际形势和双边关系问题。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c84d2fd0e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
