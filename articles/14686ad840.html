script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海邮电医院和枫围公社在揭批“四人帮”的伟大斗争中搞好院社挂钩　深入开展城乡卫生革命有力地支援了农业学大寨的群众运动，促进了医务人员的思想革命化","authors":[],"dates":[{"year":1977,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海邮电医院和金山县枫围公社在揭批“四人帮”的伟大斗争中，认真搞好院社挂钩工作，不断把城乡卫生革命引向深入，有力地支援了农业学大寨的群众运动。"},{"type":"paragraph","text":"随着农业学大寨群众运动的深入开展，农村对卫生工作提出了更高的要求。公社党委把卫生工作纳入了农业学大寨、普及大寨县的规划，切实把它抓紧抓好。上海邮电医院党总支也认识到，医院作为社会主义上层建筑的一个部门，必须为社会主义经济基础服务，其中一项十分重要的任务，就是要把医疗卫生工作的重点放到农村去，为农业学大寨服务，为广大贫下中农服务。上海邮电医院和枫围公社党组织，为着这样一个共同的革命目标，建立了院社挂钩关系。"},{"type":"paragraph","text":"这两个单位的挂钩，采取了这样几种做法:第一，建立院社挂钩领导小组。领导小组由公社和医院双方组成，由枫围公社党委和邮电医院党总支负责人、一名赤脚医生代表任正副组长。领导小组负责制订院社挂钩规划，检查规划落实情况，总结、推广卫生革命的新鲜经验，协调院社双方工作。第二，根据公社农业学大寨规划要求，制订院社挂钩，开展城乡卫生革命的规划。第三，院社挂钩中的几种形式:医院派出卫生工作队，在公社党委领导下，负责院社挂钩中的抓点等工作；医院各科室和公社卫生院实行对口挂钩；公社派出贫下中农到医院对医务人员进行再教育，医院请赤脚医生交流卫生革命经验。"},{"type":"paragraph","text":"上海邮电医院和枫围公社党组织曾组织干部和群众认真学习毛主席关于把医疗卫生工作的重点放到农村去的指示，批判了“四人帮”对卫生革命的干扰和破坏，批判了“城市老爷卫生部”，使大家认识到，院社挂钩，是卫生战线上的社会主义新生事物，它有利于在卫生战线上进一步巩固无产阶级专政。上海邮电医院党总支先后两次组织各科室负责人，到枫围公社参观学习，调查研究，征求贫下中农对医院斗、批、改的意见；枫围公社党委也对院社挂钩问题，进行了多次认真讨论，他们同心协力，努力搞好院社挂钩工作。"},{"type":"paragraph","text":"实践证明，院社挂钩有不少好处:第一，有利于把医疗卫生工作的重点放到农村去，使城市医院更好地为贫下中农服务，为农业学大寨服务。目前，上海邮电医院除派出卫生工作队外，内科、外科、药剂科和放射科等都有人定期到枫围公社卫生院去，相互交流学习，共同提高业务水平。第二，有利于农村卫生革命的开展，可以更好地支持合作医疗、赤脚医生等社会主义新生事物。自院社挂钩以来，他们更加认真地总结和推广合作医疗的经验，大力培训赤脚医生，使农村的医疗卫生大权牢固地掌握在贫下中农手里。第三，有利于下乡卫生工作队克服临时观点，加强支持农村卫生革命的责任感。"},{"type":"paragraph","text":"为了明确奋斗目标，上海邮电医院和枫围公社联合制订了一个为期五年的院社挂钩规划。这个规划的要点是:要巩固和发展枫围公社的合作医疗，到一九八○年，各大队合作医疗卫生室对中草药的使用率达到百分之五十，并建立简易病床，还能开展小手术。同时大力培养赤脚医生，建立一文亦农亦医、又红又专的新型医疗卫生队伍。要认真贯彻预防为主的方针，重点搞好“两管”、“五改”，一、二年内做到家家有灶边井，队队实现粪便无害化；在二、三年内控制或消灭肠道传染病；同时进一步做好计划生育工作；他们决心争取在一九八○年前全部生产队实现卫生村。要运用各种形式，提高公社卫生院防治疾病的技术水平。要继续搞好邮电医院的斗、批、改。根据这个规划，上海邮电医院和枫围公社又制订了实施计划，使院社挂钩每年有目标，每季有检查，每月有打算。"},{"type":"paragraph","text":"上海邮电医院和枫围公社的院社挂钩，着眼于搞好农村基层的卫生工作。根据公社党委的布置，上海邮电医院下乡卫生工作队和赤脚医生一起，在新春、新农和新华大队，协助大队党支部，大搞卫生村建设，使许多生产队基本上做到家家吃用灶边井水，只只厕所无害化。公社党委两次召开现场会，介绍了这些大队的经验，推动了全公社卫生村的建设。上海邮电医院下乡卫生工作队还配合赤脚医生和卫生院医务人员，继续在各个大队办好由各生产队“一长六员”(妇女队长、卫生员、清洁员、饲养员、保育员、血防员、炊事员)参加的群众性业余卫生学校，普及卫生知识，为农村卫生革命培养骨干队伍。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14686ad840"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
