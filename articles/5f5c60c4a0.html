art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东的110个故事》光盘出版发行","authors":[],"parts":[{"type":"paragraph","text":"《毛泽东的110个故事》光盘出版发行"},{"type":"paragraph","text":"新华社北京12月4日电大型历史文献电视记录片《百幅手迹怀伟人——毛泽东的110个故事》VCD光盘日前出版发行。"},{"type":"paragraph","text":"这部电视片是国家档案局中央档案馆和广西尤特文化传播公司为纪念毛泽东诞辰110周年而制作的，全片共110集，每集讲述一个历史故事，并以电视形式披露了几百幅毛泽东的手迹和十几段原始讲话录音，是迄今为止运用毛泽东手迹和原始讲话录音最多、最集中的文献电视片。国家档案局中央档案馆用两年时间完成了这部全长990分钟的长片，创下了我国人物传记类文献电视片的长度之最。"},{"type":"paragraph","text":"据介绍，文献片运用的资料，不但有电影记录片、人物采访、毛泽东工作和生活过的地方的实景拍摄，还有毛泽东的手迹、录音、照片、藏书等。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f5c60c4a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
