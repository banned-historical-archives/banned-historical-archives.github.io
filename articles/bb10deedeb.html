rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"勒菲弗尔第一书记函贺我党三中全会胜利召开","authors":[],"parts":[{"type":"paragraph","text":"华国锋主席"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"亲爱的同志们："},{"type":"paragraph","text":"我谨代表比利时马克思列宁主义共产党中央委员会和全体党员祝贺中国共产党十届三中全会所通过的各项历史性的决议。"},{"type":"paragraph","text":"第一项决议是追认华国锋同志任中国共产党中央委员会主席、中国共产党中央军事委员会主席。这项决议非常好。因为华主席已表明他是一位好领袖。他果断地粉碎了“四人帮”；他以阶级斗争为纲，为使社会主义建设取得伟大胜利指出了明确的前景。他是毛主席的坚定的接班人。"},{"type":"paragraph","text":"第二项决议是恢复邓小平同志的职务。邓小平同志具有伟大的功绩。他是“四人帮”的诬蔑和阴谋的受害者。"},{"type":"paragraph","text":"第三项决议是把王洪文、张春桥、江青、姚文元罪恶的“四人帮”永远开除出党。这个帮在口头上极端革命，但是，在实际上是极右的。把他们清除出党，不仅对中国人民是一个伟大的胜利，而且对全世界的革命者来说也是一个伟大的胜利。"},{"type":"paragraph","text":"第四项决议是在今年召开中国共产党第十一次代表大会。这次大会对中国社会主义革命和社会主义建设将具有十分重大的意义。它将是使整个国际共产主义运动受到启示的巨大源泉。"},{"type":"paragraph","text":"中国共产党十届三中全会所做的各项决议是无产阶级文化大革命的辉煌胜利，是毛主席无产阶级路线的辉煌胜利，是马克思主义、列宁主义、毛泽东思想的辉煌胜利。"},{"type":"paragraph","text":"比利时马克思列宁主义共产党中央委员会第一书记 费尔南·勒菲弗尔"},{"type":"paragraph","text":"一九七七年七月"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb10deedeb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
