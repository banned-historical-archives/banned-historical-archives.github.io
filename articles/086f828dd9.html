<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举毛泽东思想红旗　学习和运用辩证唯物论努力实现我国体育工作革命化全国体育工作会议向体育工作者和运动员发出号召","authors":[],"dates":[{"year":1965,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京22日电　最近在北京结束的一九六五年全国体育工作会议，号召全国体育工作者和运动员高举毛泽东思想红旗，认真深入地学习徐寅生对中国女子乒乓球队的讲话《关于如何打乒乓球》和《人民日报》的编者按语，学习和运用辩证唯物论，密切联系实际，为实现我国体育工作的革命化而奋斗。"},{"type":"paragraph","text":"到会的代表一致认为，活学活用毛泽东思想，以阶级斗争为纲，坚持辩证唯物论，反对唯心主义和任何一种形而上学，是促进体育队伍和体育工作革命化的根本保证。思想政治工作是一切工作的生命线，它应当成为体育工作的基础。全国的体育工作者和运动员，都必须努力学习毛主席著作，参加社会主义教育运动，下乡劳动，下连当兵，兴无灭资。体育队伍必须大学解放军，坚持四个第一，大兴三八作风，开展“四好”、“五好”运动，真正做到政治统率业务，政治落实到业务中去，成为一支无产阶级化、战斗化的又红又专的队伍。"},{"type":"paragraph","text":"会议经过充分讨论和分析，一致认为，在整个社会主义历史时期，社会主义和资本主义两条道路的斗争贯穿在各个领域、各条战线中，体育战线也不例外。因此，必须以毛泽东思想为指针，抓住阶级斗争这个纲，提倡辩证唯物论，使体育工作者和运动员具有革命的思想，懂得革命的方法，树立革命的作风。"},{"type":"paragraph","text":"会议认为，目前体育战线上的形势很好，体育工作必须坚决贯彻普及和提高相结合的方针，大力开展群众性的体育运动，在体育运动广泛开展的基础上提高技术水平，不断地创造新纪录。同时，要在毛主席人民战争思想的指导下，从国防需要出发，大力开展群众性的国防体育活动。省、市、自治区以上的运动代表队，应当以攀登世界高峰为目标。所有运动队都要以我国乒乓球队为榜样，政治挂帅，思想领先，胸怀祖国，放眼世界，奋发图强，自力更生，敢于胜利，善于斗争，坚决走自己的道路，树立独特的风格，并注意指导群众体育运动。"},{"type":"paragraph","text":"会议认为，必须运用“一分为二”的观点看待工作，在充分估计成绩的同时，认真严肃地研究和克服工作中的缺点，解决工作中的问题，防止任何形式的骄傲自满、固步自封的情绪和锦标主义思想。在运动训练方面，应当深入反对保守思想、教条主义和骄娇二气，坚决贯彻从实战需要出发，从难、从严进行大运动量训练的原则，加速提高训练水平。各项体育工作都要坚决贯彻勤俭办事的精神，厉行节约，艰苦奋斗，自力更生，反对铺张浪费。各级体育领导机关也必须革命化，认真改进领导方法和工作作风。"},{"type":"paragraph","text":"会议还讨论了一九六五年的工作部署。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\02\\652n010601.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e陆永桢\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e尼雷尔总统、刘主席、曹副市长在宴会上"},{"type":"paragraph","text":"(陆永桢摄　新华社稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"086f828dd9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
