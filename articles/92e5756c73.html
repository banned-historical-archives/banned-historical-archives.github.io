script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对资本家野蛮剥削　美国工人到处罢工","authors":[],"dates":[{"year":1948,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资本家野蛮剥削"},{"type":"paragraph","text":"美国工人到处罢工"},{"type":"paragraph","text":"【新华社陕北九日电】纽约讯：美国工潮激荡不已，劳联所属之芝加哥印刷工会第十六分会的罢工，已坚持六周之久，这个一千六百人的罢工，现仍迫使芝加哥六大报馆不得不以油印维持出报。产联所属之交通工人工会的罢工，亦于二日在纽约、华盛顿、旧金山同时爆发，参加罢工工人达三千五百余人。内包括四大电报、电话公司的工人，从而“切断了美国与海外商业电讯交通的三分之二”（合众社）。罢工原因为资方拒绝工会提出的在物价高涨下增资百分之三十的要求，甚至反提出每周增加工作五小时而不增加工资的野蛮要求。据工会方面表示，罢工将彻底进行。同时，产联所属的政府职员食堂工会工人一千五百人，因要求增加工资未达目的，又于五日开始罢工。此举使在四十二家食堂吃饭的八万政府职员吃饭为难。另据华盛顿讯：美劳工部七月发表的四七年度全年罢工统计：美去年由于工人罢工而损失的工作日达三千五百万个，罢工次数为三千六百次。"},{"type":"paragraph","text":"【新华社陕北九日电】旧金山讯：产联的国际码头仓库工人工会主席布利治，上月二十七日在该工会机关报“快讯报”著文称：他的工会正考虑拒绝装货至某些国家，展开类似该工会于三八年发动的罢工及三九年的拒绝装运废铁至日本的运动。布氏又称：产联执行局考虑到一个问题，即在下个月内，海外工人将日渐要求我们码头工人“拒绝替美国船只或外国船只装运军火和物资，而这些军火和物资是用来反对其他各国工人，破坏工人罢工，瓦解工人为反对反动雇主、地主及政府的斗争的”。"},{"type":"paragraph","text":"【新华社陕北九日电】据塔斯社纽约讯：美国著名社会人士反对美国在远东反动政策的运动，正在增长。前麦克阿瑟顾问毕生、“全国有色人种协进会”领袖黑人杜波斯、纽约参议员伊萨克斯等人，发起于本月二十三日召开一全国会议，讨论对付美现行反动远东政策的计划，并拟制一个民主的远东政策大纲。该会发起人在声明中，谴责美国在中国、日本、菲律滨及南韩的反动政策。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92e5756c73"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
