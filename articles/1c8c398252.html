nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"陈伯达对天津革命派代表的讲话","parts":[{"type":"title","text":"918.陈伯达对天津革命派代表的讲话"},{"type":"paragraph","text":"(1967年8月15─17日)"},{"type":"paragraph","text":"八月十五日至十七日，陈伯达、谢富治、郑维山等同志在人大会堂三次接见了天津革命派代表。"},{"type":"paragraph","text":"伯达同志说：“毛主席很关心天津问题，因为天津跟北京有联系，你们知道为什么叫天津？天津就是通天的路。到北京要经过天津，是首都门户，你们有很大责任。”"},{"type":"paragraph","text":"接见主要解决三方面的问题："},{"type":"paragraph","text":"1、解决围绕609厂武斗的天津市武斗问题。2、五代会(工、农、红、中、干)的巩固、发展和扩大问题。3、成立天津市革命委员会的问题。"},{"type":"paragraph","text":"有人说天津驻军负责人是天津的陈再道。陈伯达同志说：“这是自己的理论吧？”有人谈到天津五代会改组的问题，陈伯达同志说不是改组的问题，而是发展、扩大、巩固的问题。"}],"authors":["陈伯达"],"dates":[{"year":1967,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":355,"page_end":356,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c8c398252"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
