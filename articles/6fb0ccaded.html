art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"发表毛泽东关于新闻工作的文献","authors":[],"parts":[{"type":"paragraph","text":"新华社12月8日讯 为纪念毛泽东同志诞辰九十周年，将在12月15日出版的《新闻业务》（月刊）1983年第十二期，首次发表毛泽东同志论述新闻工作的两篇文章：《讲真话，不偷、不装、不吹》（1945年4月）、《同新闻出版界代表的谈话》（1957年3月）。"},{"type":"paragraph","text":"这两篇文章选自由中共中央文献研究室和新华通讯社合编的《毛泽东新闻工作文选》。这期《新闻业务》还将发表《毛泽东新闻工作文选》全书目录以及介绍这本文选内容的文章。"},{"type":"paragraph","text":"在此以前，《新闻业务》第十期已经发表了毛泽东同志在解放战争时期修改过的四篇新华社新闻稿；第十一期在《毛泽东同志论新闻工作的党性原则》的专题下发表了毛泽东同志的五份电报和批语。这些电报、批语和改稿也都是选自《毛泽东新闻工作文选》，并且是首次发表的。"},{"type":"paragraph","text":"《新闻业务》月刊是由新华通讯社编辑出版的，明年1月起将在全国各地邮局公开发行。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fb0ccaded"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
