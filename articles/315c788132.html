art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"号召学生工人团结起来反对资本主义制度强烈谴责法修破坏学生运动为资产阶级效劳的叛卖行径","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十五日讯 法国马克思列宁主义共产党政治书记儒尔盖最近在《新人道报》上发表题为《支持学生的斗争》的文章，坚决支持和热烈赞扬法国学生的英勇斗争，号召学生同工人团结起来，建立起反对垄断资本、反对帝国主义和反对法西斯主义的阵线，并且强烈谴责法国修正主义集团破坏学生运动的叛徒行径。"},{"type":"paragraph","text":"文章说：“法国共产党支持并呼吁大家支持学生的斗争。”"},{"type":"paragraph","text":"文章指出，法国学生“掀起这场激烈和英勇的斗争，是针对垄断资本的政权的；这场斗争猛烈地反对法西斯卷土重来；这场斗争还揭露了修正主义头目为资产阶级效劳的角色。”这场斗争正在推动法国青年起来反对腐朽糜烂的资本主义社会，反对资产阶级专政的制度。"},{"type":"paragraph","text":"文章说：这场斗争“必将推动我国以工人阶级（因为工人阶级是彻底革命的阶级）为首的一切劳动阶层起来反对人剥削人的制度，反对掠夺成性、进行压迫和倒行逆施的资本主义。”"},{"type":"paragraph","text":"文章指出，法国政府关于大学的政策，只考虑到垄断资本的需要。生产率和最高利润的问题在其中占首要地位。学生们起来造反是理所当然的。"},{"type":"paragraph","text":"文章以许多事实揭露法国的法西斯势力正在重新兴风作浪，并热烈赞扬学生反对法西斯主义的英勇斗争。文章呼吁工人和一切劳动人民起来支持学生的斗争，并建立起一个强大的反法西斯阵线。因为这是“一项急需的任务。”"},{"type":"paragraph","text":"文章还赞扬法国学生在反对美帝国主义侵略越南的斗争中所作的努力。文章指出：“学生斗争的矛头也是针对美帝国主义的。”"},{"type":"paragraph","text":"文章严厉谴责法国修正主义集团破坏学生运动的叛卖行径。文章说：“修正主义领导人已变成资产阶级在工人阶级队伍中的代理人”，“成了资产阶级的看家狗，只要资产阶级秩序遭到威胁，他们就立即作出反应，毫不迟疑地采取反动立场（对学生）进行干涉。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"315c788132"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
