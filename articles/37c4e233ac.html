s":[{"year":1959,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社昆明20日电】　阿曼副教长哈尔塞亲王在离开我国的时候致电毛泽东主席，电文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国主席毛泽东阁下:"},{"type":"paragraph","text":"当我们即将离开伟大的中国时，我们对于贵国政府和人民给予阿曼人民斗争的大力支援以及阿曼代表团在中国停留和参观访问各个城市期间所受到的接待和照顾，我向您表示非常的感谢。希望光辉的未来属于友好的中国人民。"},{"type":"paragraph","text":"阿曼副教长萨拉赫·伊萨·哈尔塞"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37c4e233ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
