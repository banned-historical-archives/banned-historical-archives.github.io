hors":[],"dates":[{"year":1956,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京12日专电】　全国工商联代表大会今日仍进行分组讨论，讨论的中心仍是薄一波副总理的关于赎买政策的报告。"},{"type":"paragraph","text":"在分组讨论中，大中小工商业者发言均甚踊跃，代表们认为大中小工商业者各有各的作用，党的政策真是各得其所，今后一定要虚心诚恳地在工作和学习中向公方代表和工人群众学习，争取他们的帮助和支持。"},{"type":"paragraph","text":"有专门技术的资产阶级的知识分子代表们还表示，今后要积极钻研技术增加新品种，提高质量，使产品达到国际水平。"},{"type":"paragraph","text":"在谈到两面性时，大家认为现在的资产阶级是有两面性的，不承认两面性对自己的改造与进步都是不利的。至于拿不拿定息，摘不摘帽子，代表们说基本问题还是看自己是不是积极工作。不拿定息了，工作松劲了，还是没改造好。拿不拿定息不能代表进步与落后，问题在于是不是在工作中开足了马力。"},{"type":"paragraph","text":"今日的分组讨论会上还有外国记者参加。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de72124456"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
