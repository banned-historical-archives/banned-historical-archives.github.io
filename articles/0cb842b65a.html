art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认真学习毛主席“把军队变为工作队”的教导承德军分区干部进一步树立工作队思想","authors":["丁茂安"],"parts":[{"type":"paragraph","text":"本报讯 河北省承德军分区最近组织人民武装干部，认真学习和座谈了毛泽东选集第四卷“把军队变为工作队”的文章，使到会干部更加明确地树立起工作队思想。"},{"type":"paragraph","text":"座谈中，大家一致认为，毛主席的“把军队变为工作队”一文，虽然是1949年写的，但是现在看起来仍然十分亲切。它不仅过去和现在适用，将来也仍然适用。特别是在当前全党全民大办农业、大办粮食的时候，就更加需要做好工作队的工作。"},{"type":"paragraph","text":"座谈中，大家回忆了我军过去当工作队的情况，不少同志说：当好工作队，从来都是我军的一项重要任务。早在红军时期，就一面打仗，一面筹款，筹款就是做群众工作，担当工作队任务。在解放战争中，我军更是担当了这项任务，每解放一城一地，就要拿出一部分干部做地方工作，发动和组织群众。通过这次座谈回忆，许多同志表示：坚决贯彻执行军委指示，牢固地树立起工作队思想；并且要立即行动起来，深入到农业第一线，和公社广大干部、群众一起搞好粮食生产。 （丁茂安）"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cb842b65a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
