tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿人民军艺术团为首都工农兵演出阿尔巴尼亚艺术家们的精彩表演博得观众的高度赞扬演出结束时全场热烈欢呼：“恩维尔——毛主席”“毛主席——恩维尔”","authors":[],"parts":[{"type":"paragraph","text":"新华社二十三日讯 阿尔巴尼亚人民军艺术团今晚在首都体育馆为北京市工农兵群众一万六千多人作了演出，受到热烈的欢迎。"},{"type":"paragraph","text":"今晚，首都体育馆里，充满着中阿两国人民团结战斗的气氛。场内竖立着中国人民的伟大领袖毛主席的巨幅画像和阿尔巴尼亚人民的伟大领袖恩维尔·霍查同志的巨幅画像，悬挂着“热烈欢迎阿尔巴尼亚人民军艺术团”和“中阿两国人民的战斗友谊万岁”的巨幅标语。"},{"type":"paragraph","text":"阿尔巴尼亚革命文艺工作者今晚演出的节目，热情地歌颂了阿尔巴尼亚人民的伟大领袖恩维尔·霍查同志和中国人民的伟大领袖毛主席，歌颂了阿中两国人民牢不可破的战斗友谊，生动地反映了阿尔巴尼亚人民在社会主义革命和社会主义建设中，在反对帝国主义和现代修正主义的斗争中所取得的伟大成就。艺术家们充满革命激情和战斗气息的精彩表演，博得了工农兵观众的高度赞扬。"},{"type":"paragraph","text":"演出结束时，全场响起了暴风雨般的掌声，热烈祝贺阿尔巴尼亚人民军艺术团演出成功。演员和观众一起长时间热烈地欢呼：“恩维尔——毛主席”“毛主席——恩维尔”。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edd21cb4c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
