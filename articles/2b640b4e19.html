","authors":["陈云"],"dates":[{"year":1961,"month":8}],"is_range_date":false,"parts":[{"text":"陈云在上海青浦县小蒸公社调查纪要(摘录)","type":"title"},{"text":"陈云","type":"authors"},{"text":"我听见社员反映：“蒋介石来受难，吃饭；毛主席来享福，吃粥。”现在说这样话的人很多，因此不能说他们都是反革命，我们首先要看是否是事实，是否是实话，……","type":"paragraph"},{"text":"干部不敢向群众承认过去工作中有错误，对一些政策的转变解释的不明朗，因此，农民对“十二条”、“六十条”究竟能否兑现，能否长期不变，还有怀疑。过去三年我们有一些政策变化太多，如自留地、私养猪等都曾经几放几收，究竟是放得对还是收得对，一直没有交代。因此，农民说：“干部是嘴唇两张皮，说来说去都有理。”还有一些农民说：“共产党的政策条条好，十条有十一条办不到。”这些都是对党的政策能否兑现的不信任的表示。看来耍解除群众的怀疑，有必要大胆向群众承认过去一个时期工作中的缺点和错误。","type":"paragraph"},{"text":"在我们调查期间，绝大部分农民每天吃四餐稀饭，只能隔几天吃一餐干饭。因为吃不饱，体力不足，早晨六点上工，到下午两三点就只能下工了。在农村中流行着一句很不好听的话：“蒋介石手里受难，吃饭，毛主席手里享福，吃粥，。”这种话，他们对公社干部不敢说，怕扣上反革命帽子，大队、小队干部即使听到了也不敢向上反映。在我们到食堂去参观时，一个农民鼓起胆子向我们说：“解放前吃饭，—解放后吃粥。”一个老婆婆露出枯瘦的胸膛向我们大声说：“吃不饱！吃不饱！”对于这种情况，干部不敢问，不敢解释。但愈不解释，农民意见就愈多。","type":"paragraph"},{"text":"最近一段时期，农民分了自留地，养了猪，对个体经济的积极性是很高的，但对集体经济的积极性还不大高。据老农民说：“现在三天做的生活，只能抵过去一天。”……","type":"paragraph"},{"text":"听说安徽现在试行“包产到队，定产到田，责任到户”的制度，据我们了解，实际上就是“包产到户（一部分包到作业组）分配到队”，这个办法值得研究。","type":"paragraph"}],"comments":[],"origin":"《批判陈云专刊》第二期，“首都大专院校红代会彻底批判陈云联络站”，一九六七年五月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b640b4e19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
