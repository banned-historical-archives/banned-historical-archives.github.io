<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"cnd","name":"文革博物馆","internal":false,"type":"db","official":false,"author":"","article":{"title":"北京大学第八名被处决者——黄立众","authors":["肖蒙"],"dates":[],"comment_pivots":[],"comments":[],"is_range_date":false,"description":"","page_start":0,"page_end":0,"parts":[{"text":"在《观察》上看到王友琴女士的《第七个死刑：吴思慧》一文，想起从反右斗争到文革结束后，北大除了已知的黄宗奇、林昭、任大熊、顾文选、沈元、吴思慧、张锡琨等七人外，还有一名在１９７０年一打三反运动中被处决的北大学生、一位勇敢的反抗者——黄立众。","type":"paragraph"},{"text":"黄立众（又名黄美琦）于１９３６年生于安徽无为县，１９５６年考入北京大学哲学系，１９５７年在反右运动中，来自农村的黄立众因讲述农民生活困苦的真相，被开除团籍；１９６０年已上大四的黄立众因坚持个人观点、“思想反动”被开除学籍，遣送回乡。","type":"paragraph"},{"text":"黄立众回乡时正赶上三年大饥荒，眼看乡亲们一个个被活活饿死，做为青年知识分子的他，感到自己有责任为乡亲们做些什么，不能就这样束手待毙。他认真地进行实地调查，统计数据，撰写材料，组织社员上访反映情况，帮助他们突破当地干部和民兵的封锁，到外面寻找一条生路。","type":"paragraph"},{"text":"当这一切努力都无济于事时，黄立众感到深深的绝望和悲愤，于是他毅然决然地走上一条与党和政府对立之路：他秘密发起成立了中国劳动党，制定了明确的纲领和严密的组织，他积极进行宣传，以唤醒民众，并暗中搜集武器，准备通过暴动改变悲惨现状，为自己和他人的生存权而战。他还写下《致全国同胞书》，说明他们武装起义的原因。","type":"paragraph"},{"text":"“劳动党”事件被破获后，在当地引起了巨大轰动，其成员遭到了严厉处罚。芜湖中级人民法院判处黄立众死缓，从１９６１年至１９７０年关押在无为监狱。在坐牢期间，黄立众不改初衷，经常慷慨陈词，抨击黑暗现实。一打三反运动到来后，因其“顽固坚持反动思想和立场”，于１９７０年７月被军管会下令处决。","type":"paragraph"},{"text":"黄立众是至今发现的北大第八名被处决者，这八人中有五人死于一打三反运动，可见这场运动的血腥恐怖，其中顾文选和沈元仅仅因为想出国被以叛逃罪杀害，张锡琨的死因则是华国锋掌权后为树立新权威而祭刀的那１％中的一个冤魂。","type":"paragraph"},{"text":"由此我想到，只要司法不独立，野蛮专制的体制存在一天，那么无论谁当政，都会产生无数的冤案冤魂。许多人可能都在网上看到过那个青春妙龄的女孩儿陶静被公审处决的照片，她不过是替男友带毒，而且是平生第一次，就被专制机器残酷无情地剥夺了生命，这是活生生的不教而诛的例子，而且是公元２０００年后发生的惨祸。看着她那双无知无辜的眼睛，和被押赴刑场时茫然漠然的神态，我不禁问专制的屠刀怎么永远对着百姓妇孺这些社会的弱者，不但不保护他们，却要屠杀他们，之后还要展览这些愚昧和残忍。如果当局对各种社会问题还只知沿用“乱世用重典”这句封建古训，那么你永远也无法加入文明国度的行列。————————————————————————————————————本期编辑：      《华夏文摘》执行编辑：      《ＣＮＤ》总编：华新民（美国）    思语（美国）           陈天寒（美国）————————————————————————————————————\u003c/pre\u003e\u003c/html\u003e","type":"paragraph"}],"alias":""},"tags":[{"name":"一打三反","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1318e93dcd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
