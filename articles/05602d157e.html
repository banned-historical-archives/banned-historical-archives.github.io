产均有顾虑","authors":[],"dates":[{"year":1951,"month":4,"day":1}],"is_range_date":false,"parts":[{"text":"江西土改区和未经土改区各阶层对于生产均有顾虑","type":"title"},{"text":"【江西日报一日讯】江西农村有些已经土地改革和未经土地改革的地区，群众对生产还存在着一些顾虑。如已经过土地改革的余干县，各阶层在春耕生产中所持的态度是：富农又怕又干，中农中间站，贫雇农又干又盼，地主不干光要饭。尚未经过土地改革的新喻县群众的顾虑是：贫农怕生产多了提高成份，不愿多积肥；富农和富裕中农是消极、观望，不敢雇工，也不施肥送粪；地主企图降低产量，荒芜田地。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年4月27日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05602d157e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
