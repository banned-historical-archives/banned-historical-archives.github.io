art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"编者的话","authors":[],"parts":[{"type":"paragraph","text":"在全国亿万军民迅速掀起批判邓小平、反击右倾翻案风、追查反革命的新高潮中，在一片革命蓬勃发展的大好形势下，我们满怀战斗豪情，迎来了无产阶级文化大革命十周年。"},{"type":"paragraph","text":"十年来的斗争实践雄辩地证明：“这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的。”"},{"type":"paragraph","text":"逆历史潮流而动的党内最大的不肯改悔的走资派邓小平，对这场伟大的革命咬牙切齿，恨之入骨，又是要翻案，又是要算帐。对此，全国人民和我军指战员义愤填膺！我们举办《文化大革命万岁》的征文，正是为了用文化大革命取得伟大胜利的事实，深入批邓、回击右倾翻案风。希望广大干部战士怀着保卫文化大革命成果的坚强决心，拿起笔，作刀枪，用自己的亲身经历和感受，纵情歌颂文化大革命的胜利成果，痛斥邓小平否定文化大革命和社会主义新生事物的无耻谰言，使我们的征文象颗颗炮弹，一齐射向右倾翻案风的总后台邓小平。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41255a6307"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
