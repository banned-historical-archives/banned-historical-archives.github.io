头”统治。","authors":["凤兮"],"dates":[{"year":1949,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报安庆讯】　安庆码头杂乱陋规是长江沿线出名的，流氓帮会头目，霸占了码头，对码头工人进行着重重剥削，过去的码头工人在这种情形下是没有力量反抗的。解放以后，工人们觉醒了，经过几个月的整理，总工会已正式宣布废除这种封建式剥削的老板制度，取消过去码头一切旧有组织和陋规，曾经剥削过工人的工头老板，除罪恶重大的将依法处理外，其余仍准许他们在码头工作，但必须自己劳动，方可分得工资。"},{"type":"paragraph","text":"这一个剥削制度的废除，解脱了束缚着一千二百多码头工人的锁链，从此工人有了自己的工会了，据记者调查，过去码头陋规有十四种之多，如提成、办酒席、保证金、拿加一、登记费、照料费、出仓费等等，不一而足，这些陋规不但剥削了工人，也同时剥削了旅客和行商，间接使城乡交易受了阻碍。过去的工头老板手下都有徒弟和打手，工人们要绝对遵从他们的命令，他们甚至“有权”将工人处死，他们都经常与国民党政府和特务有勾结，而匪帮便藉这个组织来进行对工人的残酷统治。"},{"type":"paragraph","text":"现在码头工人们是第一次真正获得自由平等了，他们的收入，已逐渐增加，过去他们劳动所得并不等于应得的报偿，分账只能拿到七成或八成，其余都被老板抽去了，现在他们是可以享受自己劳动的果实了。　(凤兮)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5dfbcf3ff0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
