" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、国务院、中央军委、中央文革对全国各铁路局达成革命大联合协议的通知","authors":["对全国各铁路局达成革命大联合协议的通知"],"dates":[{"year":1968,"month":1,"day":11}],"is_range_date":false,"parts":[{"text":"中共中央、国务院　中央军委、中央文革","type":"title"},{"text":"对全国各铁路局达成革命大联合协议的通知","type":"authors"},{"text":"全国铁路广大革命职工和革命干部们、各军管会代表们：","type":"appellation"},{"text":"全国铁路系统无产阶级文化大革命，在毛主席最新指示下达以后，出现了一个新的局面。","type":"paragraph"},{"text":"在此之前，全国十八个铁路局中，只有上海、北京、济南、南昌四个铁路局实现了革命大联合。在此以后，哈尔滨、呼和浩特两个铁路局首先建立了革命三结合的革命委员会。去年十月、十一月，柳州、广州两个铁路局先后达成革命大联合协议；接着西安、郑州、成都三个铁路局也达成了革命大联合协议。去年十二月三十一日，我们伟大领袖毛主席和他的亲密战友林副主席接见了来京学习的各铁路局群众组织代表后，革命大联合形成了高潮。吉林、沈阳、锦州、兰州、乌鲁木齐、齐齐哈尔、昆明七个铁路局均先后达成了革命大联合的协议。至此，全国十八个铁路局都达成了革命大联合的协议，并且有两个铁路局还实现了革命的“三结合”。这是战无不胜的毛泽东思想的伟大胜利！是毛主席革命路线的伟大胜利！中央同意和支持这些协议。","type":"paragraph"},{"text":"铁路是国民经济的大动脉。铁路运输直接关系到社会主义建设和人民群众生活，关系到国防建设和备战、援外，关系到夺取无产阶级文化大革命的全面胜利。最迅速地把铁路运输促上去，是当前铁路系统广大无产阶级革命派的光荣的战斗任务。","type":"paragraph"},{"text":"中央希望，全国铁路广大革命职工和革命干部们，要更高地举起毛泽东思想伟大红旗，活学活用毛主席著作，紧跟毛主席的伟大战略部署，坚决执行毛主席的最新指示，坚决响应毛主席“抓革命、促生产、促工作、促战备”的伟大号召，以“斗私批修”为纲，打倒资产阶级、小资产阶级派性，增强无产阶级党性，严格遵守和坚决执行你们自己所达成的共同协议，来不断巩固和发展革命的大联合，促进革命的“三结合”，来继续进行革命的大批判和本单位的斗、批、改。","type":"paragraph"},{"text":"中央要求你们，坚决响应毛主席“拥军爱民”的伟大号召，服从铁路系统全面军管的决定，脱离与地方革命群众组织的串连和隶属关系，保持高度革命警惕性，严防党内走资本主义道路当权派和阶级敌人的破坏活动，以保证铁路运输的畅通，夺取一九六八年革命、生产的双胜利。","type":"paragraph"},{"text":"中央号召你们，铁路系统基层单位中尚未实现系统联合的革命群众组织，应参照各铁路局这些共同协议的精神，结合本地方、本单位的具体情况，通过协商，迅速达成革命大联合的协议。已经达成协议的，必须防止破坏份子从内部和外部来进行干扰，防止地方派性的冲击，保证对这些协议坚决贯彻执行。是否严格遵守和坚决执行自己所达成的协议，是对一个革命群众组织是否真正成为无产阶级革命派的重大考验。真正的无产阶级革命派应成为执行大联合协议的模范，把无产阶级文化大革命进行到底！","type":"paragraph"},{"text":" 中共中央国务院中央军委中央文革一九六八年一月十一日","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[二]》，武汉：1968年4月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"698cf1ecd2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
