script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伯恩施坦——修正主义代表人物之一","authors":[],"dates":[{"year":1957,"month":1,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伯恩施坦(18501932)修正主义、机会主义的代表，德国改良主义的社会民主党领袖之一。他以修改为名否定了并百般地歪曲了马克思主义的基本原理。他反对马克思的阶级斗争理论，反对马克思关于资本主义必然崩溃以及关于社会主义革命和无产阶级专政的学说。他背弃了无产阶级最终的、似乎是“不确定的”目的——社会主义，认为工人运动唯一的任务就是为“改善”资本主义制度下工人的经济状况而争取某些改革，并提出了一个机会主义的公式:“最终目的是微不足道的，运动就是一切。”列宁写道:伯恩施坦这句“风行一时的话”，再好不过地表明了修正主义的实质——“临时应付，迁就眼前事件”、忘记了无产阶级的根本利益，为谋暂时的实际利益或假设利益而牺牲无产阶级的根本利益。“工人贵族”是伯恩施坦主义的支柱，是资产阶级影响在工人阶级中的传播者。"},{"type":"paragraph","text":"在哲学上，他反对马克思主义的唯物主义辩证法，而且把马克思主义的唯物主义辩证法和黑格尔的唯心主义辩证法混为一谈。他的哲学观点就是马克思主义和唯心主义、康德主义的折衷的、无原则的结合。列宁在他的几部著作(“马克思主义和修正主义”、“做什么?”、“国家和革命”)中，完全揭穿了他的修正主义观点。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a77acf6a4d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
