archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"朱洪霞在武重俱乐部集会上的讲话（节录）","alias":"","parts":[{"type":"paragraph","text":"三月十四日朱洪霞在武重俱乐部集会上的讲话（节录）"},{"type":"paragraph","text":"朱洪霞说：“河南、云南和全国各地，运动都是高潮，这次运动中央是支持造反派的。我们向中央反映了湖北省、武汉市、武重党委对运动领导不力的情况，现在是夏邦银在领导我们，我们听又邦银的指挥，就是听党委的指挥，夏叫我们怎么千我们就怎么干。”·三月十五日朱洪霞在市房地局礼堂集会上的讲话（节录）"},{"type":"paragraph","text":"三月十五日下午二点一刻至四点半钟，由朱洪复、胡厚民等人在市房地局礼堂召开了全市区、局和一些单位的头头会议，会议由胡厚民主持，朱洪霞等人讲了话，"},{"type":"paragraph","text":"朱洪霞说：“我们是彻底的唯物主义，不怕说我们是串连，说我们串连就是串连。走资派抓住文件中的几句话压我们，不理他，同志们说：文件中说，要在党委领导下迷行这场运动，要看党委执行的是什么路线，你是执行的革命路线，我就听你的，象上海、清华大学那样我们就听，你是错误路线，我就坚决造你的反，跟你斗。我学了毛主席的指示后，觉得造反涨的担子更重了，在社会主义社会这个历史阶段，走资派和造反派的矛盾是主要矛盾，走资派还在走，造反涨就要坚决斗，这是历史赋予我们的使命。不但我们"},{"type":"paragraph","text":"三月十五日下午二点一刻至四点半钟，由朱洪复、胡厚民等人在市房地局礼堂召开了全市区、局和一些单位的头头会议，会议由胡厚民主持，朱洪霞等人讲了话，"},{"type":"paragraph","text":"朱洪霞说：“我们是彻底的唯物主义，不怕说我们是串连，说我们串连就是串连。走资派抓住文件中的几句话压我们，不理他，同志们说：文件中说，要在党委领导下迷行这场运动，要看党委执行的是什么路线，你是执行的革命路线，我就听你的，象上海、清华大学那样我们就听，你是错误路线，我就坚决造你的反，跟你斗。我学了毛主席的指示后，觉得造反涨的担子更重了，在社会主义社会这个历史阶段，走资派和造反派的矛盾是主要矛盾，走资派还在走，造反涨就要坚决斗，这是历史赋予我们的使命。不但我们"}],"authors":["朱洪霞"],"dates":[{"year":1976,"month":3,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":7,"page_end":7},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题
