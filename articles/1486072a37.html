ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于抗议敌方屠杀战俘问题的处理意见的电报","alias":"","parts":[{"type":"paragraph","text":"关于抗议敌方屠杀战俘问题的"},{"type":"paragraph","text":"处理意见的电报"},{"type":"paragraph","text":"（1953年1月13日）丁国钰同志："},{"type":"paragraph","text":"一月十二日廿三时来电悉。（一）同意来电所报抗议稿，应即于十四日送交对方。（二）今后此种性质的例行抗议可以按惯例办理，不必每次请示。但如案情较重大，情况较复杂，应有着重表示而不能按惯例办理者，则必须拟稿请示，待批准后，方可发出。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十三日廿四时[1]丁国钰，当时参与朝鲜停战谈判朝中代表团的领导工作。"},{"type":"paragraph","text":"[2]指丁国钰1953年1月13日请示处理抗议敌方屠杀战俘问题给毛泽东、金日成、彭德怀的电报。电报针对敌方公布我被俘人员1名在1月9日吊死于尚武台第五号战俘营一事，草拟了抗议书，请示批准。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":1,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":438,"page_end":438},"tags":[{"name":"毛泽东","type":"人物"},{"name":"丁国钰","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1486072a37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
