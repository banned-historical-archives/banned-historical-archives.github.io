<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"郑维山吴德在北京市革命委员会会议上的讲话","authors":["吴德","郑维山"],"dates":[{"year":1968,"month":3,"day":21}],"is_range_date":false,"parts":[{"text":"郑维山吴德在北京市革命委员会会议上的讲话","type":"title"},{"text":"郑维山吴德","type":"authors"},{"text":"郑维山同志：","type":"paragraph"},{"text":"第一，今天这样的重要的会议我应表个态，谈一点个人意见。我要作自我批评，谢副总理对我几次批评，我要接受批评，有主客观原因，客观原因是管华北局的问题，主观原因是努力不够，今天先作个自我批评。","type":"paragraph"},{"text":"第二，我想讲一下对二月逆流的态度。我认为是革委会每个同志都应有自己的态度。为二月逆流翻案是一个大是大非的问题。二月逆流是反对毛主席，反对林副主席，反对党中央、反对中央文革，这是大是大非问题。我们应该有我们的态度。在这样一个大是大非面前，我们究竟是反对还是不反对，我认为我们革委会中每个同志都要有自己的态度。我很同意今天上面几个同志的发言，为二月逆流翻案，事实上是自毁长城，反对毛主席、反对林副主席，反对党中央，反对无产阶级文化大革命，否定文化大革命的成果。我个人意见坚决反对为二月逆流翻案。在这个中间，相信绝大多数的同志是这个意见，但是，在这样一个大是大非面前，有人站队站错了，旗帜不鲜明，每个人在这个问题上要有立场，检查一下自己站队站对了没有？态度明确不明确？这是对毛主席、对林副主席、对以毛主席为首的党中央司令部、对党中央、对中央文革的态度问题，真正的无产阶级革命派，应有自己的鲜明的旗帜，应有自己鲜明的态度、立场。","type":"paragraph"},{"text":"究竟谁是主将，谁是干将，谁是二月逆流的干将，谁是保二月逆流的主将，谁是保二月逆流的干将，需要弄清楚，应该弄清楚，在这个问题上，我建议把这个问题弄清楚，这就是在这个大是大非问题面前态度的根本问题！","type":"paragraph"},{"text":"第三，以谢副总理为首的北京市革命委员会，是毛主席身边的红色政权，是高举毛泽东思想伟大旗帜的，是紧跟伟大领袖毛主席的。我认为谢副总理是紧跟毛主席、林副主席、中央文革的，应当相信。应支持革委会，维护她的革命权威。革委会有缺点有错误欢迎批评。但是某些人把矛头指向市革委会及某些负责人我不同意，并且反对。因这不符合毛主席伟大战略部署，不符合江青同志“九·五”讲话精神。凡是符合毛泽东思想、毛主席伟大战略部署的，我们就支持。反之，不管是什么人，我们坚决反对。我们坚决支持市革委会。北京军区有个支持市革委会的文件，是经过伟大领袖毛主席批准的。谁反对市革委会，我们就坚决和他斗争到底。","type":"paragraph"},{"text":"吴德同志：","type":"paragraph"},{"text":"我完全拥护郑司令员的讲话。关于为二月逆流翻案，应有个明确的态度。有人用学习班的缺点、错误反对谢副总理，讲什么要谢副总理上断头台，谢副总理是变色龙等等。这是反革命。他们正是要把高举毛泽东思想伟大红旗、坚决与二月逆流作斗争的谢副总理打倒，这不行。打倒谢副总理要让谁来当主任呢？让二月逆流的主将谭震林来？不行！让为二月逆流翻案的主将来？不行！谁是二月逆流的主将，谁是为二月逆流翻案的主将？大家心里都有数。有人态度对，有人旗帜不鲜明。给革委会提意见，我欢迎，有缺点我改正，把工作做好。","type":"paragraph"},{"text":"附：吴德同志在二十日的会议上的讲话：","type":"paragraph"},{"text":"一、北京目前刮起的这股风，说是右倾翻案风是不够的，而是一股反革命风。","type":"paragraph"},{"text":"二、这股反革命风其矛头不仅直接针对以毛主席为首的司令部，而且直接针对真正广大的革命造反派。","type":"paragraph"},{"text":"三、我们认为谢副总理是紧跟毛主席的，现在刷出的反对谢副总理的大标语、大字报所提出的问题，全是捏造，是不符合事实的，是颠倒是非的。谢副总理本人说，他自己有缺点有错误，欢迎给他贴大字报，给他以帮助，这是谢副总理的谦虚。对这个问题，我们是不能同意谢副总理的观点的。","type":"paragraph"},{"text":"来源：《二·七工人》报    1968年3月29日 第四版","type":"appellation"}],"comments":[],"origin":"《二·七工人》报　　1968年3月29日 第四版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"郑维山","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"二月逆流","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66fe73a62e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
