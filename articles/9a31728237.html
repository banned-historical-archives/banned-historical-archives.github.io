art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚持学习毛泽东思想就是胜利","authors":["“川藏线上的钢铁运输班”"],"parts":[{"type":"paragraph","text":"我们终年战斗在川藏高原的汽车兵，从广播里听到党的九届二中全会公报，无比欢欣鼓舞。公报对我们活学活用毛泽东思想提出的新的更高的要求，我们坚决照办！"},{"type":"paragraph","text":"我们班奋战风雪高原二十年，靠的是长期坚持活学活用毛泽东思想。全班同志对毛主席、毛泽东思想有最深厚的无产阶级感情。大家说：“千年苦根是毛主席领导拔掉，万年甜源是毛主席亲手开创；革命战士靠毛泽东思想武装，共产主义靠毛泽东思想实现。”因此，不管任务多重，时间多紧，困难多大，我们都自觉坚持活学活用毛泽东思想。“天天读”雷打不动，学习班经常举办，讲用会持续不断，批判会到处开展。就是一个人单独执勤也坚持学，露营在野外也点起小油灯来学，做到车行高原红一线，人走千里心不散。二十年来，我们班的人换了一茬又一茬，活学活用毛泽东思想的光荣传统代代相传。"},{"type":"paragraph","text":"我们坚决响应公报提出的伟大号召，今后一定要更加刻苦地活学活用毛泽东思想，为中国和世界革命做出更大的贡献。 “川藏线上的钢铁运输班”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a31728237"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
