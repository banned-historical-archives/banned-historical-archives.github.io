art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢迎朝鲜党政代表团姚文元李作鹏邱会作等同志和朝鲜战友一起观看革命现代京剧《红灯记》","authors":[],"parts":[{"type":"paragraph","text":"新华社十二日讯 中共中央对外联络部、中华人民共和国外交部今天晚上举行文艺晚会，热烈欢迎朝鲜民主主义人民共和国党政代表团。"},{"type":"paragraph","text":"朝鲜党政代表团团长金仲麟同志，副团长金万金同志，团员金铁万、李凤吉、韩永鹤、金吉铉、金载凤同志和代表团随行人员，朝鲜民主主义人民共和国驻中国大使馆参赞马壮玉同志和夫人，以及在北京的其他朝鲜同志，应邀出席了晚会。"},{"type":"paragraph","text":"中央领导同志姚文元、李作鹏、邱会作，以及有关方面负责人姬鹏飞、韩念龙、任允中、申健、吴德、李强、石少华、刘大煜、王希克、王珍、韩叙等，出席了晚会。"},{"type":"paragraph","text":"晚会上，中朝两国战友一起观看了中国京剧团演出的革命现代京剧《红灯记》。"},{"type":"paragraph","text":"演出结束后，中朝两国党政领导同志一起走上舞台，同演员们亲切握手，表示祝贺。朝鲜党政代表团向演员们赠送了花篮。这时，舞台帷幕上映出了“中朝人民友谊万岁！”全场响起了热烈掌声。"},{"type":"paragraph","text":"今天上午，朝鲜党政代表团同志由石少华、韩念龙等同志陪同，参观了在无产阶级文化大革命期间出土的文物。"},{"type":"paragraph","text":"中共中央对外联络部，中华人民共和国外交部，七月十二日举行文艺晚会，热烈欢迎朝鲜民主主义人民共和国党政代表团。"},{"type":"paragraph","text":"晚会上，宾主一起观看了中国京剧团演出的革命现代京剧《红灯记》。"},{"type":"paragraph","text":"演出结束后，金仲麟、金万金、金铁万、李凤吉、韩永鹤、金吉铉、金载凤等朝鲜同志由姚文元、李作鹏、邱会作等同志陪同，走上舞台和演员合影。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"李作鹏","type":"人物"},{"name":"邱会作","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4318bb0612"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
