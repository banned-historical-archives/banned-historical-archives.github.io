script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时《光明和被剥削者》发表文章指出安哥拉内战根源是苏联社会帝国主义罪恶政策美国《革命》月刊指出美苏争霸给安哥拉内战火上加油","authors":[],"dates":[{"year":1976,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社布鲁塞尔一九七六年一月十九日电　比利时马克思列宁主义共产党机关报《光明和被剥削者》最新一期发表的文章指出，安哥拉内战爆发的根源是苏联社会帝国主义的罪恶政策。"},{"type":"paragraph","text":"文章说:“事实是:俄国社会帝国主义分裂了抵抗运动，挑起了造成无数无辜牺牲者的内战，破坏了安哥拉的民族独立，而这种罪恶的侵略行径又引起了其他反动势力如美帝国主义、南非种族主义者和较次要的其他势力的干涉。”文章强调说，这一件坏事的发生，其根源“来自俄国社会帝国主义者的罪恶政策”。"},{"type":"paragraph","text":"文章指出，俄国社会帝国主义者迄今一直在破坏这一倡议的实现:安哥拉各民族解放组织之间实现停火和团结。但是，赞成这种解决办法的人已越来越多了。这一解决办法的实现，将是两个超级大国、南非种族主义者和仍然抱住殖民主义不放的那些人的巨大失败，将是安哥拉人民和全体非洲人民的伟大胜利。"},{"type":"paragraph","text":"新华社北京一九七六年一月二十日电　一九七五年十二月出版的美国《革命》月刊在一篇题为《美苏为进行控制的争斗给安哥拉战斗火上加油》的文章中指出，安哥拉是非洲最富饶的国家之一，对两个超级大国来说，控制安哥拉，不仅意味着财富和影响非洲的南部，它们还垂涎把安哥拉的港口当作海军基地，一旦发生战争时，就可以用于保护或切断海上航路。"},{"type":"paragraph","text":"文章指出，在安哥拉三派组织经过长期艰苦斗争终于赶走葡萄牙殖民主义者之后，“超级大国干涉安哥拉内部事务，很快就导致了内战”。"},{"type":"paragraph","text":"文章指出:“在六十年代，苏联社会帝国主义者并未给解放力量以多少支援”，“但是与葡萄牙的战斗刚一结束，苏联的军事‘援助’就源源流入安哥拉。正如一位非洲外交家指出的，苏联‘提供的有装甲车和萨姆导弹’，这种重武器‘在安哥拉人民反对葡萄牙殖民主义斗争的漫长的十五年之中是从未被提供过的’。”"},{"type":"paragraph","text":"文章说:“苏联对安哥拉的干涉典型地表明了他们在全世界所起的作用。因为苏联寻求改变大大有利于美国的旧的世界的划分法，以便使他们自己成为主要的、世界范围的剥削者。”"},{"type":"paragraph","text":"文章说:“从美帝国主义者方面来说，他们也同样拼命地需要抵挡住苏联的挑战，并保护和扩大他们对安哥拉和整个非洲的掠夺。多年来，他们从非洲榨取了成十亿的超额利润，这是他们不会不经过一场战斗就放弃的。”"},{"type":"paragraph","text":"文章强调指出:“正是超级大国对安哥拉内部事务的干涉，触发了目前的内战。”"},{"type":"paragraph","text":"文章还认为，苏联在急忙地承认安哥拉一派组成的政府之后，派遣了苏联军事顾问，并运用了对古巴的影响派去了数千名古巴军队。"},{"type":"paragraph","text":"文章最后指出:“两个超级大国必须让安哥拉自己解决自己的事。安哥拉人民自己能够解决他们目前的分歧，并为建设新生活而共同斗争，”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ccdca8c73"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
