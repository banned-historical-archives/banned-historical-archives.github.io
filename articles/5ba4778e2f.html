art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作是革命战士的理论武器叙利亚再版发行毛泽东选集第一卷阿拉伯文版 巴基斯坦报纸全文刊登毛主席的《抗日游击战争的战略问题》","authors":[],"parts":[{"type":"paragraph","text":"新华社大马士革二十九日电 毛泽东选集第一卷阿拉伯文版第二版在叙利亚首都大马士革开始发行。"},{"type":"paragraph","text":"大马士革出版社在第二版的后记中说：“毛泽东主席著作的重要意义不仅限于中国和亚洲，它已成为马克思主义财产的一个基本部分。它以它的正确道路照耀着非洲、拉丁美洲一切殖民地半殖民地和附属国反对帝国主义、争取民族解放、民主、和平和社会主义的人民。”"},{"type":"paragraph","text":"后记说，“毛泽东选集是一切反对帝国主义，为争取民族解放、民主和社会主义而斗争的国家中的军人和革命战士手中锐利的理论武器，是每一个知识分子应该掌握的宝贵财富”。"},{"type":"paragraph","text":"毛泽东选集第一卷阿拉伯文版第一版是在一九五八年在叙利亚发行的，共印五千册，很快就销售一空。第二版由译者作了仔细的校正，有精装和简装两种版本。"},{"type":"paragraph","text":"叙利亚工会联合会机关刊物《社会主义工人斗争》周刊（阿拉伯文）从今年五月到现在，陆续刊载了毛主席著作《实践论》、《关于正确处理人民内部矛盾的问题》、《中国社会各阶级的分析》等文章的详细摘要。这家刊物还特别摘译了《关于正确处理人民内部矛盾的问题》一文中区别香花与毒草的六条标准。"},{"type":"paragraph","text":"新华社卡拉奇三十日电 卡拉奇报纸《每日新闻》分八次刊登了毛泽东主席的著名论文《抗日游击战争的战略问题》的全文，十月二十九日刊登了文章的最后一部分。"},{"type":"paragraph","text":"这家报纸刊登这篇文章时所用的标题是《毛泽东论游击战争》。在九月五日发表文章的第一部分时，这家报纸在文章的前面用粗体字刊载了《红旗》杂志第九期重新刊印这篇文章时的编者按。"},{"type":"paragraph","text":"《每日新闻》的编辑也加了按语。按语说，报纸所以刊登这篇文章是因为印度占领的查谟和克什米尔的自由战士正在进行着类似的争取自由的战斗，因此巴基斯坦的报纸读者可能对这篇文章感到兴趣。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ba4778e2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
