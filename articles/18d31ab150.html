议","authors":[],"dates":[{"year":1950,"month":7,"day":19}],"is_range_date":false,"parts":[{"text":"中共中央有关各民主党派组织活动的决议","type":"title"},{"text":"各民主党派不在人民解放军包括公安部队在内的部队中及其军事机关、学校以及军事企业中发展党员，已经取得民主党派党籍者，继续工作或学习，并得与其所属党部发生个别联系，但须严格遵守人民解放军的纪律，不得在部队中及其机关、学校和军事企业中从事有关民主党派的活动（组织宣传等）。并须将本人所属党籍向所属的部队、学校机关及企业的政治部门报告。凡新参加人民解放军部队或新考入军事学校、机关或军事企业中工作或学习的民主党派的党员，均同此办理。各部队、学校机关及军事企业中的首长对于凡能遵守上述规定的民主党派的党员，无论在工作上、学习上、待遇上，必须一视同仁，不得加以歧视。以上已争取各民主党派总部同意，并请他们通知下级党部遵照，你们亦须依此告知所属部队、机关、学校或军事企业中的民主党派的党员，并向他们加以解释和教育。","type":"paragraph"},{"text":"上项决议已经全国委员会工作会议一致通过，并决定各民主党派在下列机关学校亦不进行组织的活动：\u003c1\u003e情报机关。\u003c2\u003e革命大学。\u003c3\u003e旧人员训练班。\u003c4\u003e使、领馆。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18d31ab150"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
