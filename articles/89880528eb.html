ates":[{"year":1993,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纪念毛泽东同志诞辰１００周年座谈会在京举行"},{"type":"paragraph","text":"本报北京１０月１６日讯　为纪念中国人民的伟大领袖毛泽东诞辰１００周年，毛泽东同志的亲属、身边部分工作人员于今天下午在毛主席纪念堂举行座谈会。与会者瞻仰了毛主席遗容，观看了文献纪录片《光辉永存》，回顾了在毛主席关怀下成长的经历。他们说，今天我们在这里纪念毛泽东同志诞辰１００周年，就是要按照邓小平同志建设有中国特色社会主义的理论，抓住机遇，坚持改革开放，把经济建设搞上去。"},{"type":"paragraph","text":"（傅旭）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89880528eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
