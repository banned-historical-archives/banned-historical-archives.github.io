art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"莫做电视的奴隶","authors":["郭遵毅"],"parts":[{"type":"paragraph","text":"近年来，基层连队的文化设施有了很大改善，更新或配发了彩电，安装了闭路电视天线，绝大多数基层连队都可以看到十几套电视节目。丰富多彩的文艺节目，各种题材的连续剧，令人眼花缭乱的周末版，使战士们获得了前所未有的视觉上的愉悦和满足，丰富了战士的业余文化生活。然而，电视带来的另一个问题也不容忽视，那就是不少战士在业余时间尤其是双休日里，一坐在电视机前就流连忘返，成了电视的“奴隶”，而懒得去看书学习，远离了书本。且不说看电视时间太长会影响健康，单单占用那么多宝贵的业余学习时间就够可惜的了。"},{"type":"paragraph","text":"电视不能不看，但要有选择、有节制地看；书不能少读，而且要更多地读。战士们都是十八九岁的青年，都处在长知识长身体的黄金阶段，理应多看一些健康向上的书籍，来丰富自己的头脑，指导自己的思想，规范自己的行为。倘若无节制地沉浸在电视里，而淡薄了书友，不思进取，岂不损失大矣！"},{"type":"paragraph","text":"作为连队干部，要心系战士，关心他们的成长进步，对看电视这类小事，要进行引导，不能放任自流。对战士的业余时间特别是双休日时间，给他们制定一个学习计划，教会他们要有选择地看电视，充分利用点滴时间，多看书，多学习。作为战士，更要明白，自己当前的首要任务还是学习，要多学一些革命理论书籍，多学一些科学文化知识，用知识来武装自己的头脑。一个成了电视奴隶的人，在一时的轻松自在和嘻嘻哈哈中浪费大量宝贵时间，到头来一无所获，两手空空，那是多么可悲啊！所以，千万别作电视的奴隶！"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d46d474a5d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
