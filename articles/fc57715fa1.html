","authors":[],"dates":[{"year":1971,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英副主席、粟裕副部长、彭绍辉副总参谋长会见基西马·杜卡拉部长率领的马里军事代表团"},{"type":"paragraph","text":"新华社三十一日讯　中共中央军委副主席叶剑英，国防部副部长粟裕，中国人民解放军副总参谋长彭绍辉，今天下午会见了马里全国解放军事委员会委员、国防、内政和安全部长基西马·杜卡拉上尉，和由他率领的马里共和国军事代表团全体团员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的马里军事代表团团员是：国家宪兵司令阿卜杜拉耶·迪亚洛少校，军需军官阿利乌·特拉奥雷上尉，通信军官奥斯曼·达奥中尉。"},{"type":"paragraph","text":"会见时，马里驻中国大使馆临时代办迪亚拉在座。"},{"type":"paragraph","text":"我国有关方面负责人和工作人员苑化冰、何英、梁璞、程飞、赵春正、张科、傅加平、舒玲阳等，会见时也在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"粟裕","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc57715fa1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
