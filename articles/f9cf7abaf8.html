{"title":"中共中央组织部关于正确对待被审查人员的家属和子女问题的通知","dates":[{"year":1978,"month":1,"day":6}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局，干审工作政策文件选编 （上），671-672\n","tags":[{"name":"邓小平","type":"主题/事件"},{"name":"家属","type":"主题/事件"},{"name":"历史问题","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部关于正确对待被审查人员的家属和子女问题的通知"},{"type":"paragraph","text":"1978年1月6日 · 〔78〕组通字1号"},{"type":"paragraph","text":"最近，邓副主席在一个同志的来信上，就如何正确对待被审查人员（包括已作结论和未作结论的）的家属和子女的问题，作了重要的批示。邓副主席指出：这些人的“历史问题不应影响子女和家属，建议组织部拿这件做个样子，体现毛主席多次指示过的党的政策。”如何正确对待这个问题，以及剥削阶级家庭出身的子女问题，涉及的面很广，政策性很强。正确解决好，是落实党的政策的一个重要方面，对于团结一切可以团结的力量，调动一切积极因素……加快社会主义事业的发展，具有十分重要的意义。关于这类问题，请你们遵照中央领导同志的批示精神，研究贯彻落实。你们在贯彻中有什么经验和意见，望告诉我们。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9cf7abaf8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
