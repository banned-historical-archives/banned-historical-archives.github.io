"dates":[{"year":1939,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"近宋内地运沪食米、大侵在工部局指定之苏州河天后宫桥昌泰交通码头卸货、向有工人包办卸运、此项工人总数不下千余人、组织有上海市米车肩运业职业工会、素称相安、不料近有地痞张立国、张九进等、觊觎利益、纠集羽党、专在昌泰交通及非指定之码头等码头、阻拦米船通行、至工部局挥定之码头、任意苛索、并剥削车工生计、致千百赖以生活之苦力均陷夫业困境、与之理论、反遭凶殴、闻张等胆敢如斯妄为、其中尚有一陶某者在幕后主使、前由各米业公会代表该工人等、呈请当局、设法禁止、亦未见效、果该工人以此种蛮横侵夺行为、非特有关治安、妨得商市、且为法律所不许、爰由工会委聘张恩灏律师为常年法律顾问、登报警告外、并向法院依法诉请严究云。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"526ee23e99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
