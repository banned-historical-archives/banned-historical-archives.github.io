r":1966,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席像章戴胸前"},{"type":"paragraph","text":"李世鸣日日想呀夜夜盼，有枚毛主席像章戴胸前。今天愿望实现了，幸福的泪花眼中转。低下头来瞧一瞧，转过头去看一看，好像是五彩红霞胸前挂，好像是金灿灿太阳升雪山。好像是万里长虹连北京，好像毛主席就在我身边，情不自禁喊出个“好”，欢乐的笑声飞过山！飞过山呀飞过山，一直飞到毛主席身边。我们向毛主席宣誓：“边防战士坚决跟着您永向前！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3cf8b5614"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
