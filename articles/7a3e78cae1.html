ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"给郭化若的信","alias":"","parts":[{"type":"paragraph","text":"给郭化若\"的信"},{"type":"paragraph","text":"（1937年6月4日）郭化若同志，并告彭、任、袁："},{"type":"paragraph","text":"在保安接到你的信，又看到你给罗瑞卿同志的信，今日又接到来信，你的工作要求与身体情形已经知道了。你在长期苏维埃战争中，为革命奋斗到底的忠诚与劳绩，我们都是完全承认与一致赞扬的。你的身体情形如此，除同意你下期来延安外，正在替你买药，不久当可买来寄你。学习、工作应在不损伤身体的原则下，减少到适当程度。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]郭化若，（1904—1995），福建闽侯人。当时任庆阳步兵学校教育长。"},{"type":"paragraph","text":"[2]彭，指彭德怀，当时任中国人民抗日红军前敌总指挥。任，指任弼时，当时任中国人民抗日红军前敌总政委。袁，指袁国平，当时任庆阳步兵学校政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":6,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":354,"page_end":354},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a3e78cae1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
