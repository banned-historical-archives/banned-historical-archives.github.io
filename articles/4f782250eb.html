ates":[{"year":1970,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北加里曼丹革命战士写诗"},{"type":"paragraph","text":"热情歌颂伟大的毛泽东思想"},{"type":"paragraph","text":"新华社讯　北加里曼丹《解放报》刊登一位署名砮民的革命战士写的一首诗，热情歌颂伟大的毛泽东思想。砮民的诗中写道："},{"type":"paragraph","text":"南中国海在翻腾，"},{"type":"paragraph","text":"拉让江口掀起巨浪，"},{"type":"paragraph","text":"毛泽东思想象初升的朝阳，"},{"type":"paragraph","text":"普照北加里曼丹。"},{"type":"paragraph","text":"毛泽东思想，给北加里曼丹革命指明了正确的航向；毛泽东思想，使我们心明眼亮，看清阶级斗争的大方向；毛泽东思想，指引我们走向武装斗争的康庄大道，跳出议会斗争的死框框。我们要大学毛泽东思想，大办毛泽东思想学习班，培育真正的无产阶级革命者，把北加里曼丹独立解放的事业来担当；将革命的烈火燃遍全国土，开辟无数武装斗争的新战场。让毛泽东思想的伟大红旗，在北加里曼丹的国土上迎风飘扬。让每个战士的头脑，闪耀着毛泽东思想的光芒，把北加里曼丹引向共产主义的方向。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f782250eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
