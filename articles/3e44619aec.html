art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛主席关于反对经济主义的论述坚定地站在毛主席的革命路线一边，誓作无产阶级革命派的坚强后盾，保卫无产阶级文化大革命","authors":["杨尧深"],"parts":[{"type":"paragraph","text":"九连的干部战士，亲眼看到了上海市委一小撮反革命修正主义分子以金钱为诱饵，滥发所谓“福利费”、“补助费”，腐蚀蒙蔽了部分群众，挑动部分工人脱离生产岗位，造成破坏生产，破坏金融，中断交通的种种罪行。同志们运用毛主席关于阶级和阶级斗争的论述，以及政治是统帅，是灵魂，政治工作是一切经济工作的生命线的教导，分析了资产阶级反动路线新反扑的罪恶目的，就是企图分化革命队伍，制造混乱，破坏生产，转移斗争大方向，保护他们自己，破坏无产阶级文化大革命。战士们说：阶级敌人抛出反革命经济主义，是从修正主义那里拣来的破烂，是向革命群众射来的毒箭。上海工人阶级、其他革命群众和革命干部，及时识破和粉碎了阶级敌人的这个阴谋，这是由于他们在两条路线斗争中活学活用毛主席著作的结果，是他们高举以毛主席为代表的无产阶级革命路线的伟大红旗所取得的胜利。大家说：毛泽东思想武装起来的革命群众是强大无比的，不管资产阶级老爷们玩弄任何阴谋诡计，他们都能看穿，都能粉碎。以毛主席为代表的无产阶级革命路线必将取得彻底的胜利！"},{"type":"paragraph","text":"九连的干部战士通过学习，更加具体地认识到，毛主席相信群众，依靠群众，放手发动群众进行无产阶级文化大革命的革命路线，是无比英明、无比正确的。大家表示，一定要结合两条路线斗争，更加自觉地活学活用毛主席著作，坚定地站在以毛主席为代表的无产阶级革命路线一边，提高警惕，坚守岗位，誓作无产阶级革命派的坚强后盾，保卫无产阶级专政，保卫文化大革命。"},{"type":"paragraph","text":"（杨尧深）"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e44619aec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
