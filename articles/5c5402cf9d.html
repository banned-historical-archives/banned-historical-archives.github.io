<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"农民出售余粮的高潮即将到来","authors":["新华社"],"dates":[{"year":1953,"month":12,"day":9}],"is_range_date":false,"parts":[{"text":"农民出售余粮的高潮即将到来","type":"title"},{"text":"新华社","type":"authors"},{"text":"【据新华社北京电】 十月底和十一月初，全国大规模地向农民宣传总路线总任务和教育农民出售余粮的运动，还是处在重点试行阶段，但运动一开始，就使国家十一月上半月粮食收购的情况发生了显著变化。十五大内，各地收购粮食的数量比十月同期增加了百分之三十七点九一，其中小麦和杂粮增加了百分之五十五以上，大米增加了百分之十三。宣传总路线和教育农民售粮工作开始较早的东北区，国家购粮数量增加了百分之一百四十三。十二月份是全国各地大规模在农村宣传国家过渡时期总路线和总任务、教育农民向国家出售余粮工作广泛展开的时期，农民出售余粮的高潮即将到来。","type":"paragraph"},{"text":"今年全国农作物在去年丰收的基础上，产量未减。目前各试点地区的情况表明，经过深入地宣传国家过渡时期总路线和总任务，使农民认识国家前途和个人前途的关系，农民有大批余粮出售。东北榆树县有百分之十一的农户今秋还存有去年余粮。该县中和村和光龙村有百分之二十六到百分之四十的农户，除今年新粮外，去年陈粮可吃到明年五月节。该县共有余粮三万万多斤，农民初步受到总路线的教育后，已出售一万万多斤。浙江省黄岩县枫江乡郑仙渠互助组在早稻收获后仅卖出了五千斤粮，现在重新售出一万二千斤。东北宽甸县三台子村农民穆长礼在总路线的教育下，售出了四年来积存的一万多斤余粮。各地农村典型调查的材料，也说明了，由于连年丰收，一部分富裕农民大量储存粮食，特别是经济作物区农民购粮储存的现象相当普遍。河南省南乐县五花营村、小屯村有百分之八十的农户储有占产量百分之十五到三十八的余粮。由于国家购棉时充分供应了粮食，河南棉产区安阳县众乐村有百分之三十五的农户存有余粮，余粮少者可吃到明年年底，多者可吃到一九五六年。四川省温江县花园村是都江堰流域土地肥沃、产量最高的村子。这个村子今年有余粮九万七千多斤。截至十月十五日止，农民仅卖出了两万四千多斤。陕西省兴平县窦马乡有一百多户农民因缺乏牲畜，历年不如其他农民增产的多，但他们家中都存有四、五千斤余粮，没有卖出购买牲畜。这种情况不但影响农民扩大生产投资，而且影响国家按期完成购粮计划，以供应城乡人民对粮食日益增长的需要。","type":"paragraph"},{"text":"十一月份以来，中共各地党委和政府部门已先后召开了省一级的和县、区、乡三级干部的联合会议。在各地所召开的会议上，各级领导干部把国家在过渡时期的总路线和国家购粮计划合并起来，作了传达。参加会议的干部经过深入学习讨论后，都进一步认识了农民应该出售余粮给国家支援工业建设；只有国家工业化了，农民的生产和生活才会更好的道理。因此，对完成向农民宣传总路线和动员农民把余粮卖给国家的任务也有了充分信心。","type":"paragraph"}],"comments":[],"origin":"《文汇报》1953年12月9日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c5402cf9d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
