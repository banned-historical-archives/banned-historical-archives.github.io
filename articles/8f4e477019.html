ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对新华社关于目前急需做好煤炭生产准备工作的报道的批语","alias":"","parts":[{"type":"paragraph","text":"对新华社关于目前急需做好煤炭生产"},{"type":"paragraph","text":"准备工作的报道的批语"},{"type":"paragraph","text":"（1959年6月）退江青。此期我已全部看过。第一条新闻，你可以看一看。"},{"type":"paragraph","text":"[1]指新华通讯社1959年6月3日编印的《内部参考》第二七八八期上登载的第一条新闻报道，题为《目前急需做好煤炭生产的准备工作》。报道说，据记者从煤炭工业部在抚顺召开的现场会议上了解，生产准备不足，是当前煤炭工作中一个突出的问题。生产准备落后的原因，除生产成倍地增长，给掘进工作带来一定的困难外，主要是领导思想上有重产量轻掘进的片面观点，致使采掘不平衡的情况越来越严重。其次，违反技术政策，乱采乱掘，工程质量降低，巷道失修，对生产准备工作影响也很大。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":147,"page_end":147},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f4e477019"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
