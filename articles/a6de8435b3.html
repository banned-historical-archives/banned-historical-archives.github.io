毛泽东"],"dates":[{"year":1952,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"庆祝十月社会主义革命三十五周年"},{"type":"paragraph","text":"毛主席致斯大林大元帅电苏维埃社会主义共和国联盟部长会议主席斯大林同志："},{"type":"paragraph","text":"值此伟大的十月社会主义革命三十五周年之际，我代表中国人民、中华人民共和国政府并以我个人名义谨向光荣的苏联人民、苏联政府及您致衷心的祝贺。"},{"type":"paragraph","text":"中国人民以极大的欢欣祝贺伟大的苏联人民在从事共产主义建设中所获得的无比辉煌的成就，这些成就给即将进行大规模经济建设的中国人民以及全世界劳动人民以新的、强有力的鼓舞。"},{"type":"paragraph","text":"我们祝贺苏联人民在维护与巩固国际和平不懈斗争中所获得的巨大成就，这些成就使战争挑拨者的阴谋一再遭受失败，千百倍地增强了全世界爱好和平的人民保卫和平制止战争的信心。"},{"type":"paragraph","text":"祝保卫远东与世界的和平事业的胜利，并祝中苏两国牢不可破的伟大的友谊更加巩固与发展。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席  毛泽东"},{"type":"paragraph","text":"一九五二年十一月三日北京（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6de8435b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
