art":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"意大利万余群众游行沉痛悼念毛主席","authors":[],"parts":[{"type":"paragraph","text":"新华社罗马一九七六年九月十六日电 意大利群众一万多人九月十六日晚间抬着毛主席像，高举火炬在罗马庄严地举行游行，沉痛悼念毛泽东主席逝世。"},{"type":"paragraph","text":"参加游行的有职工、青年学生和市民。有的人还怀抱或肩负着孩子参加了游行的行列。"},{"type":"paragraph","text":"晚上七点多钟，游行队伍从共和国广场出发。队伍以一面中国的五星红旗为前导，接着是一排挂有黑纱的红旗，然后是毛主席巨幅画像。游行者高举无数火炬和数百面挂有黑纱的红旗。有的人还举着写有毛主席语录的大型横幅。他们不时高呼：“马克思主义万岁！列宁主义万岁！毛泽东思想万岁！”“马克思、恩格斯、列宁、毛泽东万岁！”“毛泽东，毛泽东，毛泽东！”口号声和国际歌声响彻街道上空。"},{"type":"paragraph","text":"游行队伍走到中国驻意大利大使馆门前时，旗手把红旗向前倾斜致敬，其他的人都举拳致意。接着，游行群众的代表进入中国大使馆，沉痛哀悼毛泽东主席逝世。"},{"type":"paragraph","text":"游行到晚上九点多钟才结束。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16a3317340"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
