,"dates":[{"year":1969,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京三十一日电　罗马消息:意大利人民为争取改善生活和工作条件，反对垄断资本的反动统治和残酷剥削，继续掀起大规模的斗争浪潮。"},{"type":"paragraph","text":"意大利第二大城市米兰的三十多万冶金和机器制造工人，三十日举行总罢工，抗议资本家非法解雇工人。罢工工人在大街上举行了声势浩大的示威游行，并且在中央杜莫广场举行了群众集会。米兰的学生也参加了工人的行列，同工人一起游行。"},{"type":"paragraph","text":"二十九日，西西里首府巴勒莫由于总罢工而陷于瘫痪状态。这次总罢工是为声援已经罢工两个月的三千名造船工人，并抗议失业人数不断增加和这个城市的经济情况严重恶化。罢工使全城交通停顿，商店关门。八千多人上街进行了示威游行。数百名青年举着伟大领袖毛主席的画像，挥动着红宝书《毛主席语录》参加了游行队伍。"},{"type":"paragraph","text":"那不勒斯附近沃尔土诺山谷的十一个城镇居民，三十日举行了大规模示威，抗议失业和贫困。在卡萨尔迪普林西普，示威者放火烧了当地的邮政局和市政厅，并且袭击了税务局、银行和一个加油站。"},{"type":"paragraph","text":"在特伦托拉，工人和农民封锁了这个城镇附近的公路，并且堵住了罗马—那不勒斯铁路线，使所有的火车停驶。"},{"type":"paragraph","text":"意大利统治当局调来大队警察，镇压沃尔土诺山谷居民的示威。示威者用石块和自制燃烧瓶作武器同警察进行了激烈搏斗。"},{"type":"paragraph","text":"与此同时，意大利报纸印刷工人在三十一日举行二十四小时的全国性罢工，使得意大利一百家报纸无法出版。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f2ea81f55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
