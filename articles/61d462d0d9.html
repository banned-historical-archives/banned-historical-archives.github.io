<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央内蒙古分局关于“五反”运动的指示","authors":[],"dates":[{"year":1952,"month":3,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央内蒙古分局关于“五反”运动的指示","type":"title"},{"text":"根据内蒙各个城市发动“五反”运动的不同情况，应如何收束或暂停及对今后在各城镇准备好进行“五反”的条件，特指示如下：","type":"paragraph"},{"text":"一、乌兰浩特市的“五反。运动，发动较早，现已进入收束阶段，可继续进行到底。但在处理工商户问题上，要严格遵守中共中央关于在“五反”运动中对工商户处理的标准和办法，特别注意掌握过去从宽，将来从严；多数从宽，少数从严；坦白从宽，抗拒从严；工业从宽，商业从严；普通商业从宽，投机商业从严的原则，并须注意在完全违法户中，分析那些是对国计民生有害无利而且国家又有办法可以代替者，可采取没收或用补、退、罚等办法使其不能继续经营。这种户数，乌市已初步确定为13户，占工商户总数1％。希再调查分析，按户写好材料，提出处理意见报送分局转报华北局批准，再作最后宣布。对守法户，基本守法户的通知书和处理办法，由乌市市委掌握；半守法、半违法户的处理，由市委研究拟具意见经兴安盟地委审查批准执行；对严重违法户的处理，必须经兴安盟委直接掌握材料详细讨论提出处理意见，送区党委批准执行。乌市经过“五反”，必须把阶级划清楚，整理好工会组织，改组工商联，群众真正发动起来，打垮资产阶级威风。乌市“五反”运动，至迟须于4月10日前全部结束，写成总结于4月10日寄送分局。","type":"paragraph"},{"text":"二、海拉尔、满洲里、通辽等市及其他曾经一度发动“五反”的城镇，现在一律停止进行“五反”。已扣押之户，除情节极严重者作专案处理呈报分局核批外，其余应令其讨保释放。为了准备好将来进行“五反”条件，各该盟地委应责成各市委县委城镇区委，把该管城市城镇工商业户，一户一户作详细之调查分析，准备好足够的材料，将来何时进行及如何进行，分局另有通知。呼纳盟城市和城镇凡住有苏侨或其他国籍之外侨经营工商业者，亦必须在此期内进行详细的调查分析。此外，不论农业区、牧业区所有旗县、集镇现在还没有发动“五反”者，一律严格禁止发动，但必须对该管城镇的工商业户，进行详细的调查分析。综合各该盟城市城镇工商业户调查材料，由盟委加以整理，统限于6月10日前报送分局。","type":"paragraph"},{"text":"三、从4月份起，全区必须转入生产建设，加强经济活动，各盟地委要严格遵照本指示，对“五反”运动该依期结束的结束，该立即停止的停止，该禁止发动的禁止。绝不允有任何拖延、姑息、犹豫，致犯错误。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61d462d0d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
