tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"出席联合国大会第二十九届会议的我国代表团团长乔冠华等回到北京邓小平副总理；姬鹏飞外长等到机场迎接","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年十月十三日讯 出席联合国大会第二十九届会议的中华人民共和国代表团团长、外交部副部长乔冠华，在参加了会议和访问了德意志联邦共和国之后，今天下午乘专机回到北京。"},{"type":"paragraph","text":"同机回到北京的有代表团副代表齐宗华、章含之，顾问徐宗熙，工作人员王守元。"},{"type":"paragraph","text":"到机场迎接的有国务院副总理邓小平，外交部部长姬鹏飞，副部长韩念龙、仲曦东、王海容、何英、余湛，有关方面负责人唐闻生、杨琪良、王明修、张世杰、林平、王本祚、程瑞声、凌青、张占武、刘德培、张立垣、王珍、朱传贤、程远行、高粱、唐叶文等。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察，德意志联邦共和国驻中国大使保尔斯，也到机场迎接。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3d086eb38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
