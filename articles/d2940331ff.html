art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"军事科学院举行报告会纪念叶剑英诞辰100周年","authors":["姜文明/包国俊〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"本报北京4月26日讯 特约记者姜文明、包国俊报道：昨天，军事科学院召开报告会，纪念叶剑英诞辰100周年。报告会深情缅怀叶帅领导军事科研的业绩，提出系统学习他关于军事科研的理论和实践，进一步做好新时期的军事科研工作。"},{"type":"paragraph","text":"军事科学院院长徐惠滋在讲话中指出，叶剑英元帅领导了军事科学院的筹建和建院后的全面工作，为我军军事科学的发展奠定了基础。他在长期领导军事科学研究工作的实践中，科学运用马克思列宁主义、毛泽东思想的立场、观点和方法，不断总结实践经验，深入探索军事科研工作的特点和规律，创造性地回答和解决了军事科研工作中遇到的一系列理论和实践问题。"},{"type":"paragraph","text":"军事科学院政委张工在讲话中指出，叶帅提出的军事科研工作方针，揭示了军事科研工作的客观规律，保证了军事科研工作的正确方向。今天重新学习叶剑英关于军事科研工作方针的重要论述，深刻领会其精神实质，对于我们更好地贯彻新时期军事战略方针和军事科研工作的指导思想，落实军委江泽民主席关于军事科研工作的一系列重要指示，进一步繁荣发展军事科学事业，具有重要的现实意义。"},{"type":"paragraph","text":"会议还介绍了最新出版的《叶剑英军事文选》所包含的军事理论内容。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2940331ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
