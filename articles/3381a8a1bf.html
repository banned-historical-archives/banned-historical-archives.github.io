[{"year":1966,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海昆明初级中学初二学生　丁丽珍"},{"type":"paragraph","text":"今天，我终于得到了日夜想念的《毛主席语录》，心里充满了温暖，充满了幸福，怎么也不能表达我内心的激动!"},{"type":"paragraph","text":"毛泽东思想是我们革命人民观察一切问题的望远镜和显微镜，是最强大的思想武器，是克敌制胜的法宝。革命人民只有活学活用了毛泽东思想，掌握了毛泽东思想，才能把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"黑帮头目周扬之流十分仇视毛泽东思想，十分害怕工农兵群众和革命青年掌握毛泽东思想。他们疯狂地阻挠出版我们最最伟大领袖毛主席的著作。但是，螳臂是挡不住历史车轮的前进。这批资产阶级老爷们终于被革命的洪流淹没了。《毛泽东选集》和《毛主席语录》的大量出版，是我们最敬爱的领袖毛主席亲自领导的无产阶级文化大革命的伟大胜利，也是党中央对我们青少年一代最大的关怀。"},{"type":"paragraph","text":"我是在毛泽东思想哺育下成长起来的青年。毛主席的书使我逐步懂得革命的道理，增强了我在革命大道上向前猛进的力量。有了毛泽东思想，就不怕任何天险和恶浪。我决心要象雷锋、王杰、刘英俊那样，毕生学习毛泽东思想，忠实贯彻毛泽东思想，热情宣传毛泽东思想，勇敢捍卫毛泽东思想。在毛泽东思想光辉照耀下，锻炼自己，做一个坚强的无产阶级革命事业的接班人。在斗争中，我一定要活学活用毛主席著作，不折不扣地贯彻执行十六条，坚决把无产阶级文化大革命进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3381a8a1bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
