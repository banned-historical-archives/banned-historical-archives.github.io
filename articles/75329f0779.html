script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"荷共第二十次代表大会开幕  格鲁特谴责政府的反共外交和殖民政策  强调应该注意进行反对“左”右倾的斗争","authors":[],"dates":[{"year":1961,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"荷共第二十次代表大会开幕"},{"type":"paragraph","text":"格鲁特谴责政府的反共外交和殖民政策"},{"type":"paragraph","text":"强调应该注意进行反对“左”右倾的斗争"},{"type":"paragraph","text":"据新华社21日讯　据塔斯社阿姆斯特丹20日讯：荷兰共产党第二十次代表大会20日在阿姆斯特丹开幕。大会有两项议程：中央委员会的报告；选举荷兰共产党中央委员会和党的其他领导机构。"},{"type":"paragraph","text":"荷兰共产党中央委员会政治局委员哈里·弗格伊主持会议开幕，他在开幕词中谴责荷兰当局的不民主的行动——拒绝发给苏联、中华人民共和国、捷克斯洛伐克、罗马尼亚、匈牙利以及其他一系列国家的共产党和工人党代表团以入境签证。他说，这是一种阻止阶级团结增长的徒劳无功的企图。"},{"type":"paragraph","text":"荷兰共产党中央委员会总书记保罗·德·格鲁特同志就第一项议程作了总结报告。"},{"type":"paragraph","text":"保罗·德·格鲁特着重指出，为争取改善劳动人民生活条件而进行进一步的不懈斗争，是今后几年内党所面临的主要任务之一。"},{"type":"paragraph","text":"格鲁特接着分析了总的国际局势和荷兰的态度。他谴责荷兰政府的反共外交政策。他说，这种政策把荷兰变成了支持和复活西德军国主义反对社会主义东方的美国反动派的前哨。"},{"type":"paragraph","text":"谈到西伊里安问题时，格鲁特抨击了荷兰政府的殖民主义政策，并敦促立即和无条件地把西伊里安的主权移交印度尼西亚，撤退在那里的荷兰军队。"},{"type":"paragraph","text":"报告人随后转到荷兰国内政治局势。他说，目前荷兰国内发展的最值得注意的因素之一，就是劳动群众的向左转。在这个时候，共产党应当同修正主义进行不调和的斗争，经常批评劳工党的右倾政策，并揭露自封为“左倾”的集团，因为他们包藏着对荷兰工人运动的威胁。"},{"type":"paragraph","text":"格鲁特还谈到莫斯科八十一个共产党和工人党代表会议对荷兰共产党的意义。保罗·德·格鲁特说，我们的党应当在自己的工作中运用莫斯科会议作出的结论。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75329f0779"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
