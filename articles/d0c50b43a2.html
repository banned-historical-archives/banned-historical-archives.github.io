ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"不被故牵制找敌弱点打","alias":"","parts":[{"type":"paragraph","text":"不被敌牵制找敌弱点打"},{"type":"paragraph","text":"（1947年1月22日）刘、邓、张，并告陈、饶，粟、谭凹："},{"type":"paragraph","text":"养电悉。完全同意你们意见，小平带两纵南下，其余在路北不被邱军牵制，完全主动地找弱点打，准备以一个半月至两个月时间达到削弱敌人创造战场之目的。对张岚峰部之处置，可照来电所述办法相机处理，以有利于解决问题为原则。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"养亥"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承、政治委员邓小平和副政治委员张际春的电报。"},{"type":"paragraph","text":"[2]陈、饶，指陈毅、饶漱石，当时分别任华东军区司令员和政治委员。粟、谭，指粟裕、谭震林，当时分别任华东野战军副司令员和副政治委员。"},{"type":"paragraph","text":"[3]邱军，指国民党军第五军，军长邱清泉。[4]张岚峰，原任国民党军第四绥靖区暂编第四纵队司令，1947年1月"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":379,"page_end":379},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0c50b43a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
