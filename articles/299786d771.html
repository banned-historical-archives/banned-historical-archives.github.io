" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji39","name":"毛泽东全集第39卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"关于做好第二个五年计划布局和开好军委会议问题给邓小平的信","alias":"","parts":[{"type":"paragraph","text":"关于做好第二个五年计划布局和开好军委会议问题给邓小平的信"},{"type":"paragraph","text":"（1958年6月7日）小平同志："},{"type":"paragraph","text":"六、七两月份，你应做两件事：（一）第二个五年计划的布局，如你自己所提的；（二）帮助德怀同志将军事会议开好，关键是本月一个月，宜与彭等少数同志每三天商量一次。大事抓起来干多快好省。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月七日上午四时军事会上，你应准备去讲一次话，时机可在结尾的时候。"},{"type":"paragraph","text":"[1]邓小平，当时任中共中央总书记、国务院副总理、中共中央军委委员。"},{"type":"paragraph","text":"[2]德怀，即彭德怀，当时任中共中央军委委员、国务院副总理兼国防部部长。"},{"type":"paragraph","text":"[3]指正在召开的军委扩大会议。这次会议于1958年5月27日至7月22日在北京举行。会议讨论了当前局势、国防工作和今后的建军方针。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":395,"page_end":395},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"299786d771"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
