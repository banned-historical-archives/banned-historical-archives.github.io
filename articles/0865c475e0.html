<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第五届全国人民代表大会第三次会议胜利闭幕","authors":[],"dates":[{"year":1980,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"相信人民  依靠人民  把四化建设推向前进"},{"type":"paragraph","text":"第五届全国人民代表大会第三次会议胜利闭幕"},{"type":"paragraph","text":"上午全体会议决定赵紫阳为国务院总理，补选彭冲、习仲勋、粟裕、杨尚昆、班禅额尔德尼·却吉坚赞为人大常委会副委员长，增补杨静仁、张爱萍、黄华为国务院副总理"},{"type":"paragraph","text":"在闭幕大会上，依次通过各项决议、四个法律和本次会议提案审查委员会关于提案的审查报告"},{"type":"paragraph","text":"新华社北京9月10日电  五届人大第三次会议今天上午在人民大会堂举行全体会议，决定和增选国务院、人大常委会的领导成员。"},{"type":"paragraph","text":"大会接受了华国锋辞去国务院总理的请求，并决定赵紫阳为国务院总理。"},{"type":"paragraph","text":"大会补选彭冲、习仲勋、粟裕、杨尚昆、班禅额尔德尼·却吉坚赞为人大常委会副委员长。"},{"type":"paragraph","text":"大会还根据国务院总理赵紫阳提名，增补杨静仁、张爱萍、黄华为国务院副总理。"},{"type":"paragraph","text":"大会执行主席叶剑英宣布开会。出席今天上午大会的代表有3，251人。本届人大代表共3，478人。"},{"type":"paragraph","text":"大会执行主席彭真主持进行今天上午大会的各项议程。"},{"type":"paragraph","text":"大会通过决议，同意中共中央提出的对国务院部分组成人员进行调整的建议，接受华国锋辞去国务院总理职务，邓小平、李先念、陈云、徐向前、王震、王任重辞去国务院副总理职务的请求。"},{"type":"paragraph","text":"大会决定接受聂荣臻、刘伯承、张鼎丞、蔡畅、周建人辞去人大常委会副委员长职务的请求。"},{"type":"paragraph","text":"大会还接受了陈永贵要求解除他国务院副总理职务的请求。"},{"type":"paragraph","text":"接着，大会进行了各项投票表决。当大会宣布决定赵紫阳为国务院总理时，全场热烈鼓掌。"},{"type":"paragraph","text":"随后，大会补选了彭冲、习仲勋、粟裕、杨尚昆、班禅额尔德尼·却吉坚赞为五届全国人大常委会副委员长，杨尚昆兼五届全国人大常委会秘书长；选举马寅初、王观澜、邓兆祥、平错汪阶、司马义·艾买提、费彝民、郭增恺、缪云台为五届全国人大常委会委员。"},{"type":"paragraph","text":"大会根据国务院总理赵紫阳的提名，投票决定增补杨静仁、张爱萍、黄华为国务院副总理。"},{"type":"paragraph","text":"根据全国人民代表大会组织法的规定，今天的选举、表决采用无记名投票方式进行，选票和表决票用汉、蒙古、藏、维吾尔、哈萨克、朝鲜六种文字印制。"},{"type":"paragraph","text":"今天上午大会执行主席还有李德生、倪志福、胡乔木、杨得志、阿沛·阿旺晋美、胡厥文、胡立教、赵林、栗又文、杜心源、徐健生、安平生、毛致用、林丽韫。出席五届全国政协第三次会议的全体委员列席了今天上午的大会。"},{"type":"paragraph","text":"据新华社北京9月10日电  历时12天的第五届全国人民代表大会第三次会议今天下午在北京闭幕。"},{"type":"paragraph","text":"大会主席团常务主席叶剑英在闭幕词中指出，这次会议是一次非常重要的会议，全国人民代表大会的职能进一步得到发挥。这次会议对国家的许多重大问题作了决定。各项决定的贯彻落实，必将对四化建设起巨大的推动作用。叶剑英宣布大会开始后，会议由执行主席彭真主持，依次通过了各项决议："},{"type":"paragraph","text":"关于1980、1981年国民经济计划安排，1979年国家决算、1980年国家预算和1981年国家概算的决议；"},{"type":"paragraph","text":"关于修改《中华人民共和国宪法》第45条的决议；"},{"type":"paragraph","text":"关于修改宪法和成立宪法修改委员会的决议；"},{"type":"paragraph","text":"关于全国人民代表大会常务委员会工作报告的决议；"},{"type":"paragraph","text":"关于最高人民法院工作报告和最高人民检察院工作报告的决议。"},{"type":"paragraph","text":"大会通过了四个法律：《中华人民共和国国籍法》、《中华人民共和国婚姻法》、《中华人民共和国中外合资经营企业所得税法》和《中华人民共和国个人所得税法》。大会还通过了五届人大第三次会议提案审查委员会关于提案的审查报告。"},{"type":"paragraph","text":"在热烈的掌声中，叶剑英致闭幕词（全文另发）。"},{"type":"paragraph","text":"今天大会的执行主席还有宋庆龄、聂荣臻、乌兰夫、韦国清、谭震林、邓颖超、赛福鼎、廖承志、阿沛·阿旺晋美、周建人、许德珩、胡厥文、肖劲光、朱蕴山、史良。参加五届政协第三次会议的全体政协委员列席了会议。列席会议的还有：国务院组成人员，人大常委会各委员会、中共中央和国务院各部门的负责人，中国人民解放军各总部、各军兵种、各军事院校的负责人，我国部分驻外使节。"},{"type":"paragraph","text":"各国驻华使节和外国记者旁听了今天的大会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭真","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0865c475e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
