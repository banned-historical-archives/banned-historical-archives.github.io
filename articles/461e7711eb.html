thors":[],"dates":[{"year":1949,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿一日电】　人民解放军一部于二十日下午到达迪化，受到迪化军政机关及市民群众的热烈欢迎。人民解放军另一部于同日到达焉耆、库尔勒。新疆临时省政府鲍尔汉主席于二十日致毛主席朱总司令电称:"},{"type":"paragraph","text":"“中央人民政府毛主席、朱总司令:新疆人民欢迎人民解放军入新筹委会，早就组成，昼夜赶办一切欢迎供应等事宜，二十日午后三时左右，人民解放军装甲兵团首先抵迪。是日，热烈欢迎的迪化各族各界男女老少，充满市郊，呼声雷动，盛况空前。谨闻。新疆省临时人民政府主席鲍尔汉十月二十日”"},{"type":"paragraph","text":"【新华社华南前线二十日电】　华南前线人民解放军各路大军继续猛追残匪，获得重大战果。沿广九铁路前进的人民解放军于十九日在石龙车站东北三十里的龙菠村，将国民党残匪一零九军所属一五四师包围。该师随即由副师长郑荫桐率领全部向解放军投降。向广州西南地区猛烈扩张战果的人民解放军于十八日解放高明县城后，复于十九日解放新兴县城；在此以前，并解放了高要(即肇庆)县城。粤北方面，人民解放军则于十八日夜解放曲江西北粤汉铁路上的乐昌县城。歼残匪一部。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"461e7711eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
