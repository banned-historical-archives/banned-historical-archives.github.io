art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“学习毛泽东著作”一书即将出版","authors":["竺才三"],"parts":[{"type":"paragraph","text":"为了纪念毛主席的“关于正确处理人民内部矛盾的问题”这一划时代的名著发表一周年，配合全国各地进行社会主义教育，帮助广大干部更好地钻研毛泽东同志的著作，中国青年出版社最近特地约请熊复、孙晓村、张执一等同志，撰写了二十多篇专论，编辑了一本“学习毛泽东著作”的新书。这本书介绍和阐述了毛泽东同志的“关于正确处理人民内部矛盾的问题”、“论人民民主专政”、“关于农业合作化问题”以及“矛盾论”、“实践论”、“整顿党的作风”、“改造我们的学习”、艺座谈会上的讲话”、“关于领导方法的若干问题”等许多经典著作。全书共有二十二万字，将在本月份出版。"},{"type":"paragraph","text":"这本书比较通俗地介绍和阐述了毛主席关于人民内部矛盾问题的学说；阐述了毛泽东同志在实际工作中创造性地运用辩证唯物主义，坚持马克思列宁主义与中国革命的具体实践相结合，严肃的原则精神与生动的独创精神相结合，紧密地与群众在一起，为真理而奋斗的思想和实践的原则；阐述了毛泽东同志这些著作的基本精神以及对于我们当前的实际斗争和现实生活的重要意义。这本书还告诉读者如何把毛泽东同志的教导运用到实际斗争和实际生活中去，改进工作，改造思想，树立共产主义风格。"},{"type":"paragraph","text":"这本书的出版，对于具有别是广大知识青年掌握毛泽东同志的思想和实践的原则，深入地钻研毛泽东同志著作的精神实质，更好地学习社会主义教育课程，将会有很大的帮助。 （竺才三）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27d6a97c1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
