art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习毛主席著作一年来坚持不懈","authors":["薛毅"],"parts":[{"type":"paragraph","text":"本报讯 西藏军区政治部干部部学习小组，一年来坚持不懈学习毛主席著作，受到表扬。"},{"type":"paragraph","text":"在今年布置年度工作计划的时候，他们辑录和学习了毛主席、刘主席有关干部工作的指示，提高了政策思想水平，直接指导了工作。6月份，在学习毛主席关于调查研究的指示的时候，副部长洪凯同志先学一步，并且在本部干部中介绍了学习心得，启发干部掌握调查研究的武器。"},{"type":"paragraph","text":"机关党支部在领导和组织学习中，经常调查干部的思想动态，发现问题后，就诱导党员带着问题读书，先掌握“钥匙”，及时解决了一些思想问题。如有的同志通过《毛泽东选集》第四卷有关文章的学习，进一步明确了必须用阶级观点来看待战争与和平的问题，了解了敌我斗争的规律，从而提高了革命警惕性，增强了斗志。"},{"type":"paragraph","text":"由于学习得到明显的效果，大家越学越觉得毛泽东著作是一个无穷的宝库，学习的热情也越来越高。很多同志都能做到带着问题读书，走到哪里学到哪里。到部队检查工作的时候，就在部队里学，下连当兵的时候，就和战士们一起学，在机关就利用工余时间学，不少同志做到了“见缝插针，抓紧晨昏”。助理员黄可成就是这样将《毛泽东选集》第四卷认真地读了两遍。"},{"type":"paragraph","text":"在今年“七一”举行的讲演会上，这个学习小组受到了军区谭冠三政委的表扬。（薛毅）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09690a1dde"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
