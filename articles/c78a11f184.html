盾？还是敌我矛盾?”","authors":["廖由滨","新华社记者毛纯礼"],"dates":[{"year":1957,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"呼和浩特部分人士提出这样的问题：“反党是人民内部矛盾？还是敌我矛盾?”","type":"title"},{"text":"新华社记者毛纯礼廖由滨","type":"authors"},{"text":"新华社呼和浩特5日电　内蒙古呼和浩特各界非党人士对苏共决议表现了极大的关心和惊奇。内蒙古师范学院的学生们说，苏联是老大哥，怎么党内经常出现这些不光荣的事。","type":"paragraph"},{"text":"内蒙古人民委员会参事室参事张胜武说：莫洛托夫是老将，现在还闹反党活动，很奇怪。师范学院有的学生和教师说，莫洛托夫是苏共领袖之一，怎能做出反党的事来？","type":"paragraph"},{"text":"还有人提出：反党是不是反革命？这是人民内部问题，还是敌我矛盾？是不是可以称为阶级斗争?反党是与党员称号不相称的，为何只撤销了他们的职务？","type":"paragraph"}],"comments":[],"origin":"1957年7月8日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c78a11f184"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
