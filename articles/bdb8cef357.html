art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席群众路线的新发展","authors":[],"parts":[{"type":"paragraph","text":"世界革命者高度称赞，中国亿万革命群众在这一场伟大的运动中，使用了“最新式的武器”——大鸣、大放、大字报、大辩论、大串连。他们指出，这些大民主形式，是人类历史上从来没有过的高度的真正的无产阶级民主，是毛主席的群众路线在社会主义革命中的新发展，是毛主席制订的群众路线在新的水平上的运用。它创造了无产阶级专政缺席下的大民主的新经验，创造了实行民主集中制的新经验。许多国家的革命者还指出，“这是毛主席交给中国人民手中的一件强大的武器”，世界各国革命人民在建立无产阶级专政之后，“也应拿起这个武器来荡涤旧世界”。"},{"type":"paragraph","text":"他们万分感动地欢呼，“最热爱群众，最代表革命群众的最大利益的毛主席”在仅仅三个多月中，就八次接见了一千一百多万文化大革命的闯将——革命师生和红卫兵。他们说，这是国际共产主义运动史上的一件伟大创举。毛主席同群众如此心连心，“为全世界马克思列宁主义者树立了最光辉的榜样”。非洲的科摩罗群岛一位青年说：“毛主席完全信赖群众，群众完全信赖毛主席。像中国人民一样，我们被压迫人民也十分热爱和尊敬毛主席。”"},{"type":"paragraph","text":"数不尽的新鲜事物震撼了全世界。数不尽的胜利消息鼓舞了各国革命人民。许多革命者激动地说，中国革命群众在不断“创造人类奇迹”。在一九六六年，他们“整个的心都被中国大革命吸引了”。"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdb8cef357"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
