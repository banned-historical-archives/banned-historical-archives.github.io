tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"死背答案 某团否定“文革”教育走过场 责令补课 机关干部下连帮助搞教育","authors":["尚卿/韦斌"],"parts":[{"type":"paragraph","text":"本报广州10月10日电 广州军区某师今天责令彻底否定“文革”教育走了过场的某团补课。"},{"type":"paragraph","text":"这个团在彻底否定“文革”教育结束后，向师里报告说取得了好效果。师政委和政治部主任到这个团检查验收，发现有些连队不少同志对许多问题认识不清。原来，这个团在教育结束前搞了一次考核，事先就明确了考题范围和答案，让大家死记硬背，致使这次教育流于形式，走了过场。师党委决定，师、团领导和机关干部到该团连队帮助搞补课教育，不澄清模糊认识不离开连队。（尚卿、韦斌）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"563f97d11b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
