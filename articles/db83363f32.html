ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"关于国共关系的估计","alias":"","parts":[{"type":"paragraph","text":"关于国共关系的估计!]"},{"type":"paragraph","text":"（1942年7月31日）胡服同志："},{"type":"paragraph","text":"已有电午养收到？，兹复于下："},{"type":"paragraph","text":"（一）目前英、美不愿中国内战。美国表示援华军火不得用于反共，丘吉尔七七致蒋贺电称有抗战五年由于坚持统一战线的话。国民党近日态度好转，这是一原因。此种好转还会发展，我正极力争取。但国共关系是中国内政问题，英、美、苏均不会公开出面调解，只会暗中劝告及在公开舆论上表示希望中国团结。这些将来还会有的，我亦正在争取（二）我们现向国民党表示，在战后或在反攻阶段具备了北上可能条件时，我黄河以南部队可以开赴黄河以北。待国民党好转更确定时，我再要求他通令山东华中部队，停止向我摩擦，这种可能也是有的。（三）国共关系，国民党内部过去有一部分人倾向武力解决，但始终未下决心，现因国内外情势变化及我们坚持合作政策，他们已有改取政治解决的表示。最近恩来见蒋谈的还好，蒋已重新指定张治中、刘为章和我们谈判，另指定卜士奇任日常联络，蒋之联络参谋继续来延安，都是好转征兆，但不能求之过急。（四）我党七七宣言及整顿三风运动，在各方有很大好"},{"type":"paragraph","text":"[]这是毛泽东给胡服（刘少奇）的电报。感。（五）七月六日复你一电收到否。"},{"type":"paragraph","text":"毛泽东七月三十一日"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":7,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":113,"page_end":114},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db83363f32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
