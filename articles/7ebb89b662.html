art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"发展中国家部长级会议在阿尔及尔开幕布迈丁主席致开幕词，强调第三世界国家加强团结，为建立一个没有剥削的经济秩序而继续斗争","authors":[],"parts":[{"type":"paragraph","text":"据新华社阿尔及尔一九七五年二月十五日电 发展中国家“七十七国集团”部长级会议于二月十五日上午在阿尔及利亚首都阿尔及尔开幕。这次会议是为将向三月十二日至二十六日在秘鲁首都利马举行的联合国工业发展组织第二次大会提交的文件作准备。"},{"type":"paragraph","text":"会议选举阿尔及利亚工业和动力部长阿卜杜萨拉姆·贝莱德为主席。会议邀请阿尔及利亚革命委员会主席、政府总理胡阿里·布迈丁致开幕词。"},{"type":"paragraph","text":"布迈丁主席在开幕词中指出，这次会议具有十分重大的意义，“它是非洲、亚洲和拉丁美洲人民决心捍卫他们促进真正的工业发展的权利的一个生动例证”。"},{"type":"paragraph","text":"布迈丁主席强调第三世界国家团结的重要性。他说，有人想把这场经济危机的责任归咎于第三世界国家，而这些第三世界国家过去正是遭受剥削的对象。他说：“某些发达国家正在竭力挑动第三世界国家之间的不和，破坏它们的团结。”他赞扬所有第三世界国家不顾一切困难，一致坚持它们之间的团结，并且抵制了挑拨离间的阴谋诡计。"},{"type":"paragraph","text":"布迈丁主席说：“我们必须共同为建立一个没有剥削的经济秩序而继续斗争，同时必须为加强我们各国之间的合作而努力。”"},{"type":"paragraph","text":"布迈丁主席强调第三世界国家必须实行工业化。他说：发展中国家应该而且能够依靠利用它们的一切潜力，来执行一项工业化计划。"},{"type":"paragraph","text":"他说：“应当排除这么一种倾向，这种倾向最终导致的一种看法认为，有某些适合不发达国家的工业，而某些是富国所特有的工业，因而这些富国就成为工业世界中的一种居于统治地位的贵族。”"},{"type":"paragraph","text":"布迈丁主席批判了国际经济关系中的一种有害的论点。他强调说，国际分工的这种概念必须抛弃。发展中国家能够根据自己的潜力投身于各种形式的工业建设中去。"},{"type":"paragraph","text":"布迈丁主席在谈到发展中国家同发达国家之间在经济方面的不平等关系及其原因时说：造成这种不平等的状况是不公正的。这是由于发达国家的法律制度所造成的。“为了建立一个新的更加公正的经济秩序，必须谴责这个殖民时期遗留下来的法律制度，这种法律制度带有损害我们人民基本权利的概念，而且是当前损害我们人民利益的不平等的根源。”"},{"type":"paragraph","text":"布迈丁主席在讲话中要求对联合国工业发展组织进行改革和建立一个真正的国际工业发展机构。他说：“显然，建立一个拥有充分的必要手段来履行自己职责的有效的国际合作，是使发展中国家能够有效地抵抗垄断资本的操纵和霸权利益的压力的道路之一。”"},{"type":"paragraph","text":"在会上发言的有扎伊尔、秘鲁、加纳、塞内加尔、菲律宾代表。有的代表在发言中指出，发展中国家应该控制自己的政治、经济和社会结构，要求就联合国工业发展组织的改造问题进行深入的讨论，指出，这个组织的活动制度不符合新的国际机构的自主原则。"},{"type":"paragraph","text":"大会在开幕后随即转入了委员会的秘密会议。"}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ebb89b662"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
