script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国女工起来罢工反抗剥削","authors":[],"dates":[{"year":1968,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国女工起来罢工反抗剥削"},{"type":"paragraph","text":"据新华社讯　英国国营海外航空公司的一千名飞机驾驶员，从十六日凌晨开始罢工，抗议当局拒绝他们关于增加工资的合理要求。"},{"type":"paragraph","text":"这次罢工使英国垄断资本受到沉重打击。英国海外航空公司董事长贾尔斯·格思里不安地承认，罢工将使这家公司的收入每天损失三十五万镑。由于这笔损失中有很大一部分是外汇，这就不可避免地使危机深重的英国国际收支状况受到直接影响。"},{"type":"paragraph","text":"在英国的美资福特汽车公司戴根纳姆工厂的一百八十七个缝纫女工一直坚持从上周开始的罢工，要求同男工同工同酬。她们表示，不达目的，绝不复工。利物浦工厂的大约二百名女工为支持戴根纳姆工厂的缝纫女工的罢工斗争，最近也罢工半天。戴根纳姆工厂的缝纫女工的工作是为汽车缝制座垫及车内装饰品。她们的罢工，使得数以千计缺乏座垫等物的汽车堆积在工厂的停车场里，而不能出厂。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c07733167"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
