ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给毛泽荣的信","alias":"","parts":[{"type":"paragraph","text":"给毛泽荣?的信"},{"type":"paragraph","text":"（1949年11月28日）宋五弟："},{"type":"paragraph","text":"接到你的信，极为高兴。我这里的情形，可问李祝华？、毛泽连二位便知。托毛、李带上皮衣料一件，为弟御寒之用。顺祝健康！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四九年十一月二十八日"},{"type":"paragraph","text":"[1]毛泽荣（1897—1986），乳名宋五，又称逊五、胜五，湖南省韶山市杨林乡凤形村人，农民。毛泽东的堂弟。"},{"type":"paragraph","text":"[2]李祝华（1909—1992），湖南省韶山市如意乡杨荣村人，毛泽东的堂表弟。解放战争时期，曾任中共湖南湘潭清溪区第十支部书记。新中国成立后，曾在湘潭县供销合作社等单位工作。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":58,"page_end":58},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2315356a88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
