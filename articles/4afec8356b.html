[{"year":1967,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的光辉著作在巴基斯坦和尼泊尔出版"},{"type":"paragraph","text":"新华社拉瓦尔品第电　毛主席的三篇光辉著作《中国革命和中国共产党》、《论政策》和《关于农业合作化问题》已经译成乌尔都文，最近在西巴基斯坦拉合尔分别以三本小册子的形式出版。这些著作受到公众的热烈欢迎。"},{"type":"paragraph","text":"每一本小册子的书面上都有一幅毛泽东主席的侧面像。出版者在前言中写道：毛主席是中国人民的伟大导师、伟大领袖、伟大统帅、伟大舵手。这些小册子包括了宝贵的和重要的作品，它们将大大有助于巴基斯坦人民。"},{"type":"paragraph","text":"这个出版者早些时候还出版了《毛主席语录》乌尔都文版。"},{"type":"paragraph","text":"新华社加德满都二十一日电　毛主席的光辉著作《新民主主义论》已译成尼泊尔文，由尼中友好协会最近在加德满都出版。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4afec8356b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
