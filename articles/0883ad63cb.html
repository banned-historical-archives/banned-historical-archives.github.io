art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《论叶剑英的革命理论与实践》出版发行","authors":["〖ZQ/总期〗12985〖-ZQ/总期〗\r\n〖RQ/日期〗19930730〖-RQ/日期〗\r\n〖BH/版号〗01〖-BH/版号〗\r\n〖TH/条号〗4〖-TH/条号〗\r\n〖BT/标题〗《论叶剑英的革命理论与实践》出版发行〖-BT/标题〗\r\n〖ZZ/作者〗"],"parts":[{"type":"paragraph","text":"本报北京7月29日讯 特约记者姜文明报道：“八一”节前夕，由中国军事科学学会和广东省中共党史学会联合编辑的《论叶剑英的革命理论与实践》一书，由军事科学出版社出版发行。"},{"type":"paragraph","text":"该书是国内第一部全面、系统研究叶剑英革命理论的学术理论著作。书中全文发表了聂荣臻元帅、王震副主席生前写的贺词、贺信，同时发表了薄一波、张震、耿飚、刘复之等领导同志的贺信和伍修权同志在学术讨论会上的讲话。中央军委副主席张震在贺信中写道：“学习、研究和宣传叶帅的理论与实践，是件很有意义的工作，对于我们建设有中国特色的社会主义和加速我军革命化、现代化、正规化建设，都会起到积极的作用。”"},{"type":"paragraph","text":"该书汇编了全国首次叶剑英学术研讨会的70篇论文，约55万字，其中包括叶剑英的军事理论和政治、经济、科学、文化、教育理论及其革命风范等内容，覆盖了叶剑英革命理论与实践的各个主要方面，展示了近年来对叶剑英元帅理论研究的新成果。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0883ad63cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
