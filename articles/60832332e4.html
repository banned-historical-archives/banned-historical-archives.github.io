art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席是我们时代最伟大的思想家毛泽东思想使中国赢得世界钦佩而使敌人一片惊慌","authors":[],"parts":[{"type":"paragraph","text":"据新华社广州二十八日电 柬埔寨中国友好协会代表团团长兰·涅特昨天在这里说：“毛泽东主席是我们时代最伟大的思想家，他是中国六亿五千万人民爱戴的英明的导师，是崇高的思想的启发者。”"},{"type":"paragraph","text":"他说：“由于毛主席的思想，中国人民才能够达到目前完善的、非常强盛的阶段，赢得了世界的钦佩，而使我们的敌人一片惊慌。”"},{"type":"paragraph","text":"曾经担任过柬埔寨驻中国大使的兰·涅特向本社记者畅谈了他的访华观感。他说，在他离开中国将近四年之后重新来这里作为时一个月的访问的时候，他得到了非常多的感受。他说：“我有机会亲眼看到了最近四年当中中国朋友所实现的巨大的进步。”"},{"type":"paragraph","text":"他强调说：“我非常钦佩你们在毛泽东思想鼓舞下所取得的一切成就。给我印象最深的是你们第三次核试验的伟大成功。这是亚洲人民和世界上为反对帝国主义大国、为争取和捍卫独立和自由而斗争的各国人民的骄傲。这是对企图垄断核武器的原子俱乐部大国的严重警告。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60832332e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
