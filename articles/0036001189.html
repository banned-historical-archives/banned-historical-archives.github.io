art":10,"page_end":10,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"举行悼念毛主席逝世的仪式","authors":[],"parts":[{"type":"paragraph","text":"新华社维也纳一九七六年九月十四日电 联合国工业发展组织工业发展理事会第十届会议的后续会议于九月六日到十一日在维也纳举行。"},{"type":"paragraph","text":"当会议获悉毛泽东主席逝世消息时，代表们起立默哀一分钟。九月十二日，与会代表在维也纳的霍夫堡宫举行了悼念毛主席逝世的仪式。理事会主席、突尼斯代表努尔丁·迈杰杜代表各国代表、联合国工业发展组织执行主任和秘书处致悼词，对毛泽东主席逝世表示深切的哀悼。中国副代表在致词中表示答谢。"},{"type":"paragraph","text":"今年四月，工业发展理事会在维也纳举行了第十届会议。这次后续会议主要是研究第二次联合国工业发展组织大会和第七届联大特别会议的决定和建议的有关问题，如在建立新的国际经济秩序中根据利马宣言和行动计划帮助发展中国家促进工业发展等问题，会议还讨论了召开第三次联合国工业发展组织大会的准备工作问题。"},{"type":"paragraph","text":"中国代表在发言中支持会议在一九七九年召开。他说，联合国工业发展组织大会的制度化有助于推动反对殖民主义、帝国主义和霸权主义的斗争，以及促进发展中国家的工业发展。他指出，为了保证会议有成果，在召开大会前，首先需要依靠发展中国家的细致准备。他希望第二世界国家在尊重主权、平等和互利的基础上加强同第三世界国家的合作和联系。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0036001189"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
