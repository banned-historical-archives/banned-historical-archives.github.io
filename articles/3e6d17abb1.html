" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"中央转发薄一波关于上海五反第二期经验报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发薄一波关于上海五反"},{"type":"paragraph","text":"第二期经验报告的批语"},{"type":"paragraph","text":"（1952年4月8日）薄一波同志，华东局，各中央局、分局，并转各省市区党委："},{"type":"paragraph","text":"薄一波同志四月六日关于上海五反第二战役经验的报告?是正"},{"type":"paragraph","text":"[1]薄一波，当时任中央人民政府节约检查委员会主任，受中央委派在上海帮助三反五反工作。"},{"type":"paragraph","text":"[2]指薄一波1952年4月6日关于上海五反第二战役策略及经验给毛泽东并中央的报告。报告说，上海五反第二战役从4月1日开始，6天以来，乘先行突破74个重点户的威力，进展极为顺利，有急转直下之势。鉴于面对面斗争的火力太强，斗争后太伤感情，对今后继续团结资本家不利，因而规定第二战役的策略是：“检查少数，俘虏多数，严阵以待，不战而胜。”第二战役的一个重要特征，就是普遍运用了不战而胜的策略。其办法是：首先将资本家情况材料搞清楚，并把检查队掌握在手，陈兵不动，而分一部分力量到各厂店依靠工会进行诉苦控诉，充分发动群众并争取高级职员，准备好随时都可以投入战斗的一切条件。另外则分行业分区召开老板会议，交代政策，实行分组评议，互评互挤。然后选择适当时机，表扬坦白较好的工商户，免予检查；对态度极不老实不肯交代的才派检查队进入厂店检查。这样先礼后兵，效果很大。第二战役要解决的2000个重点户，将有1700百户或者更多一些用不着检查即可以解决问题。报告还说，第二战役的另一个特征，是放手使用已经彻底坦白而又愿意立功的违法资本家。由他们包打全市或本区同业，由于他们是内行，能找到要害，作用甚大。"},{"type":"paragraph","text":"中央转发薄一波关于上海五反第二期经验报告的批语确的，发给各地仿行，请各城市在五反中都注意这些新策略。"},{"type":"paragraph","text":"中央四月八日"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":4,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":46,"page_end":47},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发薄一波关于上海五反第二期经验报告的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":4,"day":8}],"is_range_date":false,"parts":[{"text":"中央转发薄一波关于上海五反第二期经验报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"薄一波同志，华东局，各中央局、分局，并转各省市区党委：","type":"appellation"},{"text":"薄一波同志四月六日关于上海五反第二战役经验的报告是正确的，发给各地仿行，请各城市在五反中都注意这些新策略。","type":"paragraph"},{"text":" 中央四月八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e6d17abb1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
