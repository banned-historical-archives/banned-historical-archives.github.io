thors":["宋庆龄"],"dates":[{"year":1957,"month":9,"day":9}],"is_range_date":false,"parts":[{"text":"宋庆龄在中国妇女第三次全国代表大会上发言","type":"title"},{"text":"宋庆龄","type":"authors"},{"text":"（中华全国民主妇女联合会名誉主席宋庆龄）","type":"subtitle"},{"text":"中国妇女第三次全国代表大会主席团转全体代表们：","type":"appellation"},{"text":"当中国妇女第三次全国代表大会开幕之际，请接受我的衷心的祝贺！","type":"paragraph"},{"text":"这次全国妇女代表大会开会的时候，正值我国展开政治战线和思想战线上的社会主义革命。这一场革命涉及到全国每一个人，每一个人都要过社会主义这一关。过社会主义这一关，首先要求我们要有鲜明的立场。我们妇女对旧社会的仇恨最深，对共产党和社会主义制度的热爱也最深。妇女们由于切身的体验，在社会主义和资本主义这两条道路的斗争中爱谁、恨谁，拥护什么、反对什么，应该是立场鲜明的。资产阶级右派分子向党、向人民、向社会主义猖狂进攻，他们企图推翻党的领导，企图让资本主义复辟，也就是企图把不久之前才摆脱掉的、带了几千年的枷锁重新加在妇女们的身上。因此，我们必须克服温情主义，彻底粉碎资产阶级右派；必须坚决跟着共产党走社会主义道路。这里中间路线是没有的！","type":"paragraph"},{"text":"过社会主义这一关，也就是要求我们不断提高社会主义觉悟，克服旧社会遗留在我们身上的缺点和弱点，积极参加劳动生产，在祖国社会主义建设事业中作出更大的贡献。在我们广阔的国土上建设社会主义社会，需要千百万人民长期的辛勤劳动。无论在工农业生产方面，在行政和文教事业方面，妇女都是不可缺少的劳动大军，而在持家和教养子女方面，妇女的劳动尤其可敬可贵。因此，就要求我们本着勤俭建国、勤俭持家的精神，为国家的社会主义建设，为家庭的和睦生活，为儿孙辈的幸福忘我地劳动！","type":"paragraph"},{"text":"中国妇女在过去的革命斗争中和在劳动生产中，一向是和男子并肩前进的。我相信在当前的政治战线和思想战线的社会主义革命中，在过社会主义这一关的严重考验中，也一定会坚强地、信心百倍地投入这个伟大的斗争，并取得胜利！","type":"paragraph"},{"text":"祝大会成功，祝姐妹们身体健康！","type":"paragraph"},{"text":" --原载《人民日报》1957年9月10日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"584b28d608"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
