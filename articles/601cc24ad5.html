art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席革命事迹图片展览在马里首都隆重开幕委内瑞拉社会主义联盟就毛主席逝世一周年发表声明","authors":[],"parts":[{"type":"paragraph","text":"据新华社巴马科一九七七年九月七日电 为纪念伟大的领袖和导师毛泽东主席逝世一周年，中国驻马里大使馆举办的毛泽东主席革命事迹图片展览九月六日在马里首都巴马科隆重开幕。"},{"type":"paragraph","text":"马里全国解放军事委员会负责解决冲突的专员优素福·特拉奥雷等高级官员出席开幕式。"},{"type":"paragraph","text":"中国驻马里大使樊作楷和马里青年、体育、艺术和文化部长马哈曼·杜尔在开幕式上发表了讲话。"},{"type":"paragraph","text":"杜尔部长在讲话中说：“中国人民伟大的领袖和导师毛泽东主席逝世一周年，无论对中国人民还是全世界热爱正义、进步与和平的人民来说，都是一件大事。”"},{"type":"paragraph","text":"他说：“如果用第三世界人民的眼光来看待这件事，它还具有更重要的意义。毛主席一生的功绩和思想的影响对他们来说具有令人鼓舞的教益，因为中华人民共和国的历史已成为丰富的思想的取之不尽的源泉，并为我们各国人民在觉醒和解放斗争方面的壮举指明了道路。”"},{"type":"paragraph","text":"他接着说，毛泽东是一位正直的人、无畏的战士、天才的战略家、孜孜不倦的缔造者和诗人，他毋庸置疑地是一位以他各方面的智慧的威力给二十世纪打上不可磨灭的印记的人物，如同最大的一些明星照耀着人类历史的苍穹一样。"},{"type":"paragraph","text":"据新华社加拉加斯一九七七年九月八日电 为纪念毛泽东主席逝世一周年，委内瑞拉社会主义联盟在九月八日发表一项声明，重申同中国人民和中国共产党团结在一起。"},{"type":"paragraph","text":"声明说：“毛泽东同志逝世这一不可弥补的损失，给正在为反对美帝国主义和苏联社会帝国主义而英勇斗争的世界各国人民、地球上所有被压迫的人民以及金世界所有的马列主义者带来了巨大的悲痛”。声明指出：“幸运的是，他的教导、他的著作、以及以他的广泛和深刻的思想所代表的伟大的理论和政治遗训，留存下来了，这些都是鼓舞所有革命者的取之不竭的源泉”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"601cc24ad5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
