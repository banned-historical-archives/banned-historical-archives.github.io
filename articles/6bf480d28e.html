晓夫方针必遭同样命运","authors":[],"dates":[{"year":1965,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社墨尔本12日电　十日出版的澳大利亚《先锋报》谴责苏联领导人在美帝国主义越来越孤立的时候继续执行赫鲁晓夫的修正主义的分裂方针。"},{"type":"paragraph","text":"《先锋报》说，“正当美帝国主义在南越遭到惨败，正当它由于试图通过轰炸越南北方——一个社会主义国家——的目标来扩大越南战争而变得越来越孤立的时候，苏联的领导人对中国共产党领导展开了卑鄙的攻击。再也没有比这种做法更会为处于绝境的美帝国主义帮忙的了。”"},{"type":"paragraph","text":"《先锋报》说，“苏联领导人的行动是无法辩解的。这种行动清楚地表明，他们打算继续执行赫鲁晓夫的方针。但是，他们的命运将是一样的。越来越多的人能够清楚地认识到，现代修正主义的作用是给美帝国主义帮忙。关于粗暴袭击在莫斯科美国大使馆外面的示威者一事，已经有许多评论。不仅如此，据报道苏联领导人为这次示威向美国政府道歉了。请看，居然对那些下令对和平的人民投掷凝固汽油弹、撒放毒剂和进行大规模空袭的人道歉。事实是，澳大利亚劳动人民对于苏联领导人对美国轰炸北越的态度缺乏斗争性，感到非常失望。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bf480d28e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
