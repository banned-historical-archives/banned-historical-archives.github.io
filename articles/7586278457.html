unknown","files":[],"article":{"title":"中华人民共和国最高人民法院、最高人民检查院对安徽、广东省高级人民法院有关没收反革命分子财产问题的联合批复","dates":[{"year":1957,"month":3},{"year":1957,"month":4,"day":15}],"is_range_date":false,"authors":["中华人民共和国最高人民检查院","中华人民共和国最高人民法院","安徽省高级人民法院","广东省高级人民法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中华人民共和国公安部公安建设编委会, 公安建设, 第6期(总号第188期), 1957: 21","tags":[{"name":"财产","type":"主题/事件"},{"name":"反革命","type":"主题/事件"},{"name":"没收","type":"主题/事件"}],"parts":[{"type":"title","text":"中华人民共和国最高人民法院、最高人民检察院对安徽、广东省高级人民法院有关没收反革命分子财产问题的联合批复"},{"type":"subtitle","text":"1957年3月"},{"type":"paragraph","text":"你院有关没收反革命分子财产问题的请示已收悉。经我们硏究后，兹联合批复如下："},{"type":"paragraph","text":"（一）反革命罪犯已被判刑幷交付执行，人民法院在判决时将其财产遗漏未作处理，根据当前政策对其财产仍应予以处理时，无须再由人民检察院提起公诉。"},{"type":"paragraph","text":"（二）对于在逃的反革命分子的财产，在反革命分子尙未被捕获法办以前，以采用行政手绩宣布代管为宜，暂时不必单独宣吿没收。"},{"type":"paragraph","text":"（三）反革命分子在人民法院审判以前已经死亡，遗留有财产，根据当前政策对其财产应予没收时，应由人民检察院提出，由人民法院依法裁定。对于不需要判处其他刑罚而仅应单独没收其财产的反革命分子，应由人民检察院提起公诉，由人民法院依法判决。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7586278457"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
