ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给刘一的信","alias":"","parts":[{"type":"paragraph","text":"给刘一\"的信"},{"type":"paragraph","text":"（1950年3月14日）霖生先生有道："},{"type":"paragraph","text":"去年十二月廿七日大示奉悉，极为欣慰，迟复为歉。征粮流弊，政府已发令纠正，不知近日有所缓和否？匪祸必剿，首恶必办，是为定则；惟剿办须有策略步骤，以期迅速解决，安定全境。湖南匪患闻已大体解决，是否如此，先生所知如何，尚祈便中见告。敬颂大安不具！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五〇年三月十四日"},{"type":"paragraph","text":"[1]刘一，字霖生，清末资产阶级革命团体华兴会创始人之一。当时任湖南人民军政委员会顾问。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":3,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":238},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db5246ccf7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
