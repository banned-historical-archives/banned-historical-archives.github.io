ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"关于和平逐步实现，请将坚持对东北军十七路军抚惠政策不变致潘汉年电","alias":"","parts":[{"type":"paragraph","text":"关于和平逐步实现，请蒋坚持对东北军十七路军抚慰政策不变"},{"type":"paragraph","text":"致潘汉年电"},{"type":"paragraph","text":"（1937年2月4日）汉年："},{"type":"paragraph","text":"甲、接恩来电，前线已开始撤退，和平前途可逐步实现。杀王事件东北军各将领均欲追究祸首，激烈派已悔过认罪，离队远避。"},{"type":"paragraph","text":"乙、红军在商县以东者早已开始撤退，主力亦昨日起开始撤退，约七天可通过咸阳。在三原者本日开始向指定地点移动。"},{"type":"paragraph","text":"丙、但蒋对东北军、十七路军抚慰政策必须坚持不变。我们诚意为国为蒋，要蒋不要认【为】我们所提建议含有外交性，我们对蒋无任何外交用意。"},{"type":"paragraph","text":"丁、望你同张冲兄在五天至七天内飞来延『来』一行，商决各种合作问题。"},{"type":"paragraph","text":"戊、如何望复。"},{"type":"paragraph","text":"毛泽东支午"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":2,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":179,"page_end":179},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c00f2ac78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
