受到群众赞扬","authors":[],"dates":[{"year":1974,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"内蒙古乌兰牧骑在文化大革命中发展壮大"},{"type":"paragraph","text":"深入农村和牧区，向工农兵学习，为工农兵服务，受到群众赞扬"},{"type":"paragraph","text":"据新华社呼和浩特一九七四年十一月七日电　在毛主席的革命路线指引下，经过无产阶级文化大革命的锻炼，内蒙古自治区乌兰牧骑发展壮大。他们活跃在广大农村、牧区，促进了批林批孔运动的深入发展，为用毛泽东思想占领思想文化阵地，作出了贡献。"},{"type":"paragraph","text":"“乌兰牧骑”是蒙古语，即红色文化工作队，它是在一九五七年开始出现的在农村、牧区进行巡回活动的综合性文化工作队。经过无产阶级文化大革命，乌兰牧骑已增加了一倍。目前，自治区各主要城镇和各旗、县都建立了乌兰牧骑，许多公社、生产队、厂矿和学校还出现了业余乌兰牧骑。"},{"type":"paragraph","text":"广大乌兰牧骑队员，牢记毛主席关于“我们的文学艺术都是为人民大众的，首先是为工农兵的，为工农兵而创作，为工农兵所利用的”教导，坚持正确的政治方向，深入基层，向工农兵学习，为工农兵服务。他们长年冒着酷暑严寒，跋山涉水，深入农村、牧区，为广大贫下中农和贫下中牧演出。农牧区的村庄、居民点、蒙古包、地头都是他们演出的场所。他们还主动地把文艺节目送到老弱病残、行动不便的贫下中农或贫下中牧家里。"},{"type":"paragraph","text":"在巡回演出活动中，各乌兰牧骑紧紧围绕各个时期党的中心工作，坚持把宣传、演出、辅导各项工作结合起来，充分发挥文化工作队的战斗作用。广大群众称赞说：“乌兰牧骑既是一支毛泽东思想宣传队，又是一支工作队，战斗队。”在批林批孔运动中，他们一面为群众演出，一面和群众一起，批判林彪反革命的修正主义路线，批判孔孟之道。他们配合批林批孔运动创作、演出的节目，热情歌颂伟大领袖毛主席，歌颂无产阶级文化大革命，歌颂社会主义新生事物。节目短小精悍，具有饱满的政治热情和战斗精神。他们认真学习革命样板戏，大力宣传和普及革命样板戏，向群众演出了《红灯记》、《智取威虎山》、《沙家浜》、《白毛女》、《红色娘子军》、《海港》、《龙江颂》、《平原作战》、《杜鹃山》等革命样板戏的选场或选段。"},{"type":"paragraph","text":"十多年来，乌兰牧骑不断发扬一队多用的传统。他们每到一地，除向群众演出外，还兼作别样。他们向群众售书、读报、展览图片、放映幻灯和电影、辅导业余文艺活动。还为贫下中农和贫下中牧治病、接生、理发、修理钟表和缝纫机，甚至还代卖一些群众急需的小型生产工具等。广大的蒙古族、汉族贫下中农和贫下中牧感动地说：“你们真是毛主席教育出来的好孩子！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"内蒙古文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"963348e52e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
