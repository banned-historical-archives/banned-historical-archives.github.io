<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刘善长在国际工会咨询会议上发言揭露麻痹工人斗志鼓吹阶级合作的阴谋指出:主张社会主义国家同帝国主义国家进行“真正”的“合作”来“援助”“不发达”国家，而不去揭露帝国主义所谓“援助”的控制和剥削的实质和危害性，显然是错误的","authors":[],"dates":[{"year":1962,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社柏林18日电】　由世界工会联合会召开的国际工会咨询会议从12月14日到17日在莱比锡举行。这次会议讨论了关于欧洲经济共同体和垄断资本政策所造成的经济与社会后果问题。"},{"type":"paragraph","text":"参加会议的有来自四十四个国家和地区的一百三十一名代表和观察员。由中华全国总工会代表、中国财经贸易工会副主席刘善长率领的中国工会代表团参加了会议。"},{"type":"paragraph","text":"世界工会联合会总书记路易·赛扬在会上作了“关于欧洲经济共同体及垄断资本政策的经济与社会后果”的报告。赛扬在报告中指出，欧洲经济共同体是最强大的国家垄断资本主义集团之间的一种新的协议的形式，这里包含着重新分割世界资本主义市场的尖锐争夺；是国家垄断资本主义进一步加强对工人的剥削、压制和扼杀他们的组织的一种企图。他说，世界工联在组织这个广泛的世界工会的意见咨询的同时，殷切希望加强工人阶级和工会运动的斗争联系和国际支援，来对付这个大垄断资本的联盟和日益严重的进攻。"},{"type":"paragraph","text":"各国代表就赛扬的报告进行了讨论。共有四十二名代表在会上发言。"},{"type":"paragraph","text":"中国代表刘善长17日在会上发言指出，欧洲“共同市场”是美、英、法、西德等帝国主义国家间各种矛盾斗争进一步发展的产物。它是法国、西德等帝国主义国家垄断资本之间的联盟，其目的首先是同美、英帝国主义重新瓜分资本主义世界市场和争夺资本主义世界霸权，同时也是为了进攻六国工人阶级的利益，反对社会主义国家和推行新殖民主义。它的出现，使帝国主义阵营内部矛盾更加尖锐、复杂化了。"},{"type":"paragraph","text":"刘善长说，今天，美帝国主义仍然是最大的国际剥削者和一切反动势力的主要堡垒。国际工人阶级反对“共同市场”的斗争，是同他们反对以美国为首的帝国主义集团的总斗争分不开的。"},{"type":"paragraph","text":"刘善长强调指出，为了进行更加有力的斗争，我们认为，当前必须警惕和揭露各种麻痹工人阶级思想的阴谋和“阶级合作”的政策。现在，国际垄断资本集团吹嘘“共同市场”带来的经济“奇迹”，提倡什么“人民资本主义”，还提出什么“共同管理”等等，企图使工人和工会接受改良主义；同时，国际工人运动中也出现了一些论调，说什么在帝国主义国家内，不用从根本上改变政权的性质，只要实行国有化就可以消灭垄断资本的统治，说什么工会参与制订垄断资本的所谓“经济计划”就有可能改变这种“计划”的发展方向，还说什么“反对垄断资本独吞由于生产率提高而带来的全部利益”，满足于从垄断资本口中分得一些残羹剩饭等等。他说，这些论调显然是错误的，有害的。它在客观上正适合垄断资本的要求，在工人群众中鼓吹阶级合作，散布幻想，麻痹工人斗争意志。"},{"type":"paragraph","text":"刘善长说，支持殖民地和新独立国家工人和人民反对“共同市场”和美国新殖民主义的斗争，是各国工人和工会的共同义务。民族独立运动的不断高涨，将大大削弱垄断组织的力量，动摇帝国主义的基础。这对各国工人阶级也是一种有力的支持。他指出，现在，有些人鼓吹所谓落后国家同帝国主义国家进行“合作”。还有一些人主张社会主义国家同帝国主义国家进行“真正”的“合作”来“援助”“不发达”国家，而不去揭露帝国主义所谓“援助”的控制和剥削的实质和危害性。这些主张显然都是错误的。"},{"type":"paragraph","text":"刘善长说，中国工会一贯坚决反对帝国主义在国际贸易中对社会主义国家实行封锁、禁运和一切歧视以及对新独立国家采取压低原料和农产品价格和实行贸易歧视政策。当前的迫切任务应该是在互相尊重独立和主权、互不干涉内政、平等互利基础上发展正常的国际贸易。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97df7ca96b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
