ors":[],"dates":[{"year":1967,"month":7,"day":31}],"is_range_date":false,"parts":[{"text":"中央军委关于新疆奎屯农校武斗事件的电报","type":"title"},{"text":"新疆军区、新疆生产建设兵团并转奎屯驻军：","type":"appellation"},{"text":"据报告，农七师农校发生严重武斗，红战团于今日攻占了红旗兵团三百余人所固守的大楼，人员下落、伤亡情况不明，请你立即指定专人，对此事进行妥善处理。","type":"paragraph"},{"text":"1、绝对保证红旗兵团三百多人的人身安全，不准以任何借口对他们进行迫害，不准逮捕同情和支持他们的群众。","type":"paragraph"},{"text":"2、对伤员要妥善治疗。","type":"paragraph"},{"text":"3、对双方要做好政治工作，坚决执行中央《六·六》通令。各群众组织之间，如有不同意见通过协商解决，要坚决制止武斗。","type":"paragraph"},{"text":"4、上述处理结果和双方伤亡的数字迅速上报。","type":"paragraph"}],"comments":[],"origin":"原载新疆红二司《新疆红卫兵报》编辑部编印《红日照天山：关于新疆问题中共中央文件及中央首长的讲话》， 1968年10月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"新疆文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cba45cc0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
