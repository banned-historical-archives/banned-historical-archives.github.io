》特种邮票的题词的两种珍贵邮票昨在本市发行，受到全市人民的热烈欢迎","authors":[],"dates":[{"year":1968,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天，上海邮电局发行印有革命油画《毛主席去安源》和林彪副主席为邮电部发行的《中国人民解放军》特种邮票的题词的两种珍贵邮票，受到上海人民的热烈欢迎。"},{"type":"paragraph","text":"下午，发行邮票的消息一传开，邮局门口就排列了长长的队伍。邮票从首都由飞机运来上海时，广大革命群众热情高呼“毛主席万岁!万万岁!”争先恐后地希望及早得到这两种具有伟大政治意义的珍贵邮票。"},{"type":"paragraph","text":"邮电局的革命职工，在发行邮票前，张贴了喜报，集会学习了毛主席最新指示，批判了中国赫鲁晓夫及其在邮电部门的代理人疯狂反对毛泽东思想的滔天罪行。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ca065e232"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
