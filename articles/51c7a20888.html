],"dates":[{"year":1979,"month":7,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平同志会见缪云台先生和夫人"},{"type":"paragraph","text":"对他们回来表示热烈欢迎"},{"type":"paragraph","text":"新华社北京七月二日电  中共中央副主席、政协全国委员会主席邓小平，今天上午亲切地会见了缪云台先生和夫人赵佩玱。"},{"type":"paragraph","text":"缪云台先生是五届政协第二次会议上新增选的常务委员。"},{"type":"paragraph","text":"会见时，邓小平同志对缪云台先生和夫人回来表示热烈欢迎。缪云台说，五届人大和五届政协两个大会的精神很好，参加会议的人都很认真严肃，有大团结的气氛。有了团结，四化建设就有力量。"},{"type":"paragraph","text":"中共中央政治局委员、中共中央统战部部长、政协全国委员会副主席乌兰夫，政协全国委员会副主席、中共中央统战部第一副部长刘澜涛，中共中央统战部副部长童小鹏参加了会见。（附图片）"},{"type":"paragraph","text":"中共中央副主席、政协主席邓小平七月二日会见了缪云台先生。 新华社记者  摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51c7a20888"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
