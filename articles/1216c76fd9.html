","authors":[],"dates":[{"year":1957,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"中央对湖北省委“关于是否船员中划分右派问题”的批示","type":"title"},{"text":"湖北省委并各省、市、自治区党委：","type":"appellation"},{"text":"关于整风中是否在船员中划分右派的问题，中央基本同意湖北省委的意见。在普通船员中，同工矿企业工人一样，不划右派，不用右派名称，高级船员中的许多人，他们的社会出身和意识形态属于资产阶级知识分子，但他们直接参加生产，同工矿企业的技术人员和职员有所不同，因此一般的也不划右派，对其中有反党反社会主义言行者，可按各个人的具体错误言行进行批判，但个别情节严重者，可戴右派帽子，对此种人应于查清事实以后，调到岸上进行批评和处理，以保证船舶航行的安全。","type":"paragraph"},{"text":" 中央1957年10月12日","type":"paragraph"},{"text":"关于是否在船员中划分右派问题的请示中央：","type":"subtitle"},{"text":"现将中共长航局党委的请示转报中央。","type":"paragraph"},{"text":"考虑到船舶本身和水上航行的特点，省委认为在肃反运动中，大小船只上的船员概不扣右派帽子为好。因为：（1）船员也是直接生产人员，和工矿企业中的技术人员不完全相同；（2）这样更有利于航行安全。","type":"paragraph"},{"text":"但鉴于在大型船只上的管理人员，确有一批反党反社会主义的右派分子，对于这些人，可以在大辩论中，实事求是地进行揭发批判，一般不扣右派帽子。对于其中个别情节严重必须抠右派帽子的人，在批判之后调离船只另行处理。担任船上重要工作的，批判时即应暂停工作。以上意见当否，请速批示。","type":"paragraph"},{"text":" 中共湖北省委1957年9月30日","type":"paragraph"}],"comments":[],"origin":"原载《干审工作政策文件选编》北京：党建读物出版社，1993年","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1216c76fd9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
