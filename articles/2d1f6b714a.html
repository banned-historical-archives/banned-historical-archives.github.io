script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"联合国贸发会议讨论最不发达国家的发展问题我代表指出，最不发达国家的问题，实质上也是反对帝国主义、殖民主义，特别是反对超级大国的剥削、掠夺和控制的问题","authors":[],"dates":[{"year":1975,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社日内瓦一九七五年七月二十日电　联合国贸发会议从七月七日至十八日在日内瓦举行了最不发达国家问题政府间小组会议。"},{"type":"paragraph","text":"会议的任务主要是审查执行有利于最不发达国家的特别措施的进展情况和在这方面采取新的行动。"},{"type":"paragraph","text":"几年来，联合国有关机构就拟订和执行有利于最不发达国家的特别措施通过了不少决议和决定，并规定了一系列发展指标。然而，事实上这些国家的经济发展却处于停滞状态，按人口平均计算的收入不断下降。近年来，在发达国家通货膨胀和经济危机的影响下，特别是在超级大国的剥削和掠夺下，这些国家处境越来越坏。"},{"type":"paragraph","text":"出席会议的中国代表在发言中对最不发达国家的处境表示深切同情，并且指出，最不发达国家经济困难的根本原因并不是这些国家缺乏自然资源，也不是这些国家人民不够勤劳，而是新老殖民主义、帝国主义特别是超级大国的掠夺、剥削，使得贫国愈贫，富国愈富，贫富差距愈来愈大。所以说，最不发达国家的问题，实质上也是反对帝国主义、反对殖民主义、特别是反对超级大国的剥削、掠夺和控制的问题。"},{"type":"paragraph","text":"在会议过程中，两个超级大国的代表，口头空谈“同情”最不发达国家，但是，一涉及具体措施，就拒绝承担义务。他们的行径引起了广大发展中国家代表的不满，使他们进一步认清了两个超级大国的伪善面貌。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d1f6b714a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
