rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"优秀献礼片银幕放光彩文献电视片《毛泽东与湖南》获好评","authors":["王黎"],"parts":[{"type":"paragraph","text":"《毛泽东在一九二五》、《毛泽东与斯诺》、《英雄无语》等一批重大革命历史题材的影片仍是献礼片中的扛鼎之作。"},{"type":"paragraph","text":"除了革命历史题材，此次献礼片还包括歌颂当代精神典范的《真心》、《家在远方》、《月圆今宵》、《公正的心》、《年画》等影片。这些影片所描绘的感人故事都是我们生活中有原型可寻的真人真事，这使今年的献礼片更加鲜活，更加亲切。此外，还有表现当代人情感问题的影片《蓝色爱情》；有儿童片《会飞的花花》、《足球大侠》、《小虎斑斑》；动画片《龙腾虎跃》；悬念片《葵花劫》；农村题材片《春打六九头》、《一网不捞鱼》；部队题材片《高原如梦》、纪录片《国庆纪事》等等。"},{"type":"paragraph","text":"据了解，此次献礼片中有近10部影片荣获了2000年度的“中国电影华表奖”，其中《真心》、《月圆今宵》、《毛泽东与斯诺》等获得“优秀故事片”奖的殊荣。"},{"type":"paragraph","text":"据新华社北京6月4日电为纪念建党80周年，由中共中央文献研究室和中共湖南省委联合拍摄的文献电视片《毛泽东与湖南》陆续在各电视台播映，其独特的视角和真挚的情怀，受到各界观众的好评。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80e5de813b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
