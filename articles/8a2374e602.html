],"dates":[{"year":1955,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中华人民共和国主席毛泽东，全国人民代表大会常务委员会委员长刘少奇，国务院总理周恩来致电南斯拉夫联邦人民共和国总统铁托，联邦国民议会主席皮雅杰，外交秘书长波波维奇，祝贺南斯拉夫联邦人民共和国成立十周年。电文如下:"},{"type":"paragraph","text":"南斯拉夫联邦人民共和国总统兼联邦执行委员会主席约·布·铁托同志:"},{"type":"paragraph","text":"南斯拉夫联邦人民共和国联邦国民议会主席莫萨·皮雅杰同志:"},{"type":"paragraph","text":"南斯拉夫联邦人民共和国外交秘书长科查·波波维奇同志:"},{"type":"paragraph","text":"值此南斯拉夫联邦人民共和国成立十周年之际，我们谨代表中华人民共和国政府和人民向你们，并且通过你们向英雄的南斯拉夫人民致热烈的祝贺。"},{"type":"paragraph","text":"中、南两国人民过去在争取自己祖国独立和解放的斗争中就存在着深厚的友谊。中、南两国的友好合作自从两国外交关系建立以来，已经有了很大的进展。我们相信，这种友好合作还会不断地得到加强和发展。祝南斯拉夫人民在建设社会主义和维护世界和平的事业中获得进一步的成就。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会　常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理兼外交部长　周恩来"},{"type":"paragraph","text":"1955年11月26日于北京"},{"type":"paragraph","text":"——新华社讯"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a2374e602"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
