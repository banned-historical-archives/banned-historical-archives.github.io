ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"将创造战场当作战略任务","alias":"","parts":[{"type":"paragraph","text":"将创造战场当作战略任务！"},{"type":"paragraph","text":"（1945年11月11日）陈、黎："},{"type":"paragraph","text":"（一）庆祝你们歼灭吴化文的胜利²。（二）为准备战胜必然要来的大举进攻，除集中与整训部队外，必须创造更广阔的战场，向南北扩展铁路线的占领区，拔除临、滕、邹、充地区的据点，广泛发动民众，给民众以经济利益。国民党正在重庆开将领会议，实行全国反共，惟调集大军于邹滕地区尚须时日，你们应利用此间隙创造战场，将创造战场的任务当作战略任务。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"戌真"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给新四军军长、山东军区司令员陈毅和山东军区副政治委员黎玉的电报。"},{"type":"paragraph","text":"[2]指1945年11月上旬新四军第二纵队和山东军区第八师在鲁南滕县界河地区，歼灭由伪军改编的国民党军第五路军吴化文部3个师的胜利。"},{"type":"paragraph","text":"[3]临，指临城，即今山东枣庄市薛城。滕、邹、兖，指山东滕县、邹"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":83,"page_end":83},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2be5e9addb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
