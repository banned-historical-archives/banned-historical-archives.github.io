:1950,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　七月七日虹口中学全体同学写了封信给毛主席，保证搞好学习，保卫世界和平。七月十四日中共中央办公厅的回信来了!号召同学为“搞好学习、工作、保卫世界和平”而努力。学生会把它作为暑期工作的中心任务，启导同学为执行毛主席的指示而加紧工作。现在，暑期工作已告结束，除了做好总结外，学生会代表全体同学，再度上书毛主席，报告暑期工作情况。并在九月十二日的“迎新庆功”大会上，热烈鼓掌通过。"},{"type":"paragraph","text":"(虹口中学通讯组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4adcd6437e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
