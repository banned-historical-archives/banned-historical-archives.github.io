<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想扫除共同对敌的各种思想障碍先锋电机厂革命派誓做大联合模范各革命组织互相帮助消除隔阂组成统一组织有力推动大批判","authors":[],"dates":[{"year":1967,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海先锋电机厂无产阶级革命派，在革命的大批判中活学活用毛主席著作，紧紧掌握斗争大方向，矛头对准党内头号走资本主义道路的当权派，同时，用毛泽东思想克服了小团体主义、无政府主义等等非无产阶级思想，实现了按部门、按单位自下而上的革命的大联合。"},{"type":"paragraph","text":"这个厂原来有五个较大的革命群众组织。三月十八日，《中共中央给全国厂矿企业革命职工、革命干部的信》发表后，有些部门的革命派职工经过反复学习，在开门整风的基础上联合起来了。在全国开展的革命的大批判高潮中，全厂革命派职工活学活用毛主席著作，把斗争的矛头对准了党内头号走资本主义道路的当权派，大大地推动了无产阶级革命派的大联合。四月二十二日，在毛泽东思想的原则基础上成立了全厂统一的革命组织——上海先锋电机厂“革命先锋造反总部”。"},{"type":"paragraph","text":"这个厂的无产阶级革命派在大联合的过程中，始终高举革命的批判大旗，活学活用毛主席著作，各车间、各科室坚持把“老三篇”和《关于纠正党内的错误思想》当作座右铭来学习，彻底清除资产阶级反动路线的流毒。运动初期，资产阶级反动路线，蒙蔽了一批人，打击了一批人，挑动群众斗群众，给革命的大联合带来了极大的障碍。一车间原来的“造反纵队”、“造反中队”两个革命群众组织，隔阂很深，迟迟联合不起来。在这次大批判运动中，他们活学活用毛主席著作，开了数十次大大小小的座谈会和毛主席著作讲用会，彻底批判了党内头号走资本主义道路当权派及厂里的党内一小撤走资本主义道路的当权派的罪行，统一认识，实现了革命的大联合。"},{"type":"paragraph","text":"革命派在大批判中推进革命的大联合。一车间的无产阶级革命派和革命群众在批判党内头号走资本主义道路当权派一手制造的资产阶级反动路线时，学习了毛主席的《中国社会各阶级的分析》和《关于正确处理人民内部矛盾的问题》等光辉著作，经过回忆对比的自我教育，认识到必须分清敌友，以前互相将对方视如仇敌是错误的，大家都是阶级兄弟，一方是受资产阶级反动路线打击的，一方是受资产阶级反动路线蒙蔽和毒害的，真正的大敌是党内一小撮走资本主义道路当权派。“造反中队”的有些同志在大批判中认识了资产阶级反动路线的丑恶面目，沉痛地认识到自己过去中了《修养》的毒，当了资产阶级反动路线的工具，在运动初期写了把矛头指向革命群众的大字报，造成了对立。现在认识到两个群众组织之间的隔阂是党内头号走资本主义道路当权派造成的，应该彻底肃清他的流毒。革命群众之间的矛盾应该按照毛主席“凡属于思想性质的问题，凡属于人民内部的争论问题，只能用民主的方法去解决，只能用讨论的方法、批评的方法、说服教育的方法去解决，而不能用强制的、压服的方法去解决”的教导办事，不能相互砸来砸去，而要在大批判中联合起来共同对敌。他们说:"},{"type":"paragraph","text":"“我们有一千条理由、一万条理由联合起来，打倒党内头号走资本主义道路的当权派，而没有半点理由闹分裂。”"},{"type":"paragraph","text":"究竟怎样看待兄弟队的缺点和错误呢?他们又反复学习了“老三篇”。“造反纵队”的同志检查了自己没有学好毛主席关于“谁是我们的敌人?谁是我们的朋友?这个问题是革命的首要问题”的教导，以致对“造反中队”的同志采取了错误的态度，没有做到毛主席的教导:“一切革命队伍的人都要互相关心，互相爱护，互相帮助。”“造反中队”的同志也进行自我检查，说他们错误的理解了“以斗争求团结”，没有集中力量把矛头对准党内一小撮走资本主义道路的当权派。当时看到“造反纵队”的同志在某些问题上因没经验犯错误，抱着“搞好了，是你们的功劳，搞糟了，由你们自己负责，大家走着瞧”的态度，没有及时指出。他们就是这样带着问题学习毛主席著作，坐在一起畅谈体会，越谈相互之间越了解，更清楚地认识到自己有那些不够的方面。越谈，感情越融洽；越谈，对资产阶级反动路线认识越清楚；越谈，对党内头号走资本主义道路当权派越仇恨，斗志越昂扬，在毛泽东思想原则基础上联合起来了。"},{"type":"paragraph","text":"上海先锋电机厂的无产阶级革命派，决心更好地活学活用毛主席著作，彻底地夺党内头号走资本主义道路当权派的权，彻底夺自己头脑中“私”字的权，誓把无产阶级文化大革命进行到底!"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\05\\6759030101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海先锋电机厂在大批判运动中促进了革命的大联合和革命的“三结合”，全厂出现了活学活用毛主席著作的新高潮，进一步推进了革命和生产。图为四车间大修组认真学习毛主席著作。　(本报记者　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13efa72ad9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
