tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在上层建筑各个领域对资产阶级全面专政","authors":["驻四川省峨眉县某部红峨梅"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“我国有七亿人口，工人阶级是领导阶级。”几十年来，我国人民正是在工人阶级和广大劳动人民的伟大领袖毛主席的领导下，在工人阶级的先锋队中国共产党的领导下，在工人阶级的革命理论——毛泽东思想的指导下，取得了中国革命的一系列伟大胜利。"},{"type":"paragraph","text":"今天，在毛主席发出的“工人阶级必须领导一切”的伟大号召下，全国成千成万的产业工人组成工人毛泽东思想宣传队，开进学校和一切知识分子成堆的地方，领导上层建筑各个领域的斗、批、改。这是二十世纪六十年代的伟大事件，是无产阶级革命史上的伟大创举，具有无比深远的伟大意义。"},{"type":"paragraph","text":"无产阶级夺取政权，要经过长期的艰巨的斗争。但是，夺取政权只是万里长征走完了第一步，巩固政权则要进行更长期、更艰巨的斗争。无产阶级要巩固政权，就必须在上层建筑其中包括各个文化领域中对资产阶级实行全面的专政。只有这样，才能彻底粉碎资产阶级的顽抗，堵死产生修正主义的渠道，防止资本主义复辟，保证我们的党和国家千秋万代永不变色。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e6061ea29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
