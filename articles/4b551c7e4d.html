"王俊璞"],"dates":[{"year":1989,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第七届亚洲杯乒乓球赛今天产生冠军"},{"type":"paragraph","text":"马文革乔红获单打决赛权"},{"type":"paragraph","text":"新华社北京５月１５日电（记者王俊璞）由主力出场的中国乒乓球队，今天在第七届云丝顿亚洲杯赛的半决赛中遇到了强硬挑战。"},{"type":"paragraph","text":"中国男选手马文革战胜日本的松下浩二后，险胜亚欧对抗赛冠军、南朝鲜的金泽洙，半决赛又淘汰了南朝鲜队的后起之秀姜熙璨进入决赛。与金泽洙交锋的第四局，马文革曾以１８∶２０落后。他奋力追到２０平，最后以２３∶２１获胜。"},{"type":"paragraph","text":"老将陈龙灿在半决赛中以２∶３负于日本老将斋藤清。斋藤清获得男子单打决赛权。"},{"type":"paragraph","text":"另两名中国男选手陈志斌和于沈潼分别负于日本的斋藤清和削球手涩谷浩，未进前八名。"},{"type":"paragraph","text":"中国女队的世界单打冠军乔红以３∶０和３∶１连过日本佐藤利香和香港陈丹蕾两关，冲入决赛。她的队友、削球手丁亚萍以１∶３输给了朝鲜的余顺福，未进前四名。"},{"type":"paragraph","text":"余顺福右手横握拍，进攻积极，防守能力强，淘汰丁亚萍后又以３∶１挫败了香港名将齐宝华，也获得了决赛权。"},{"type":"paragraph","text":"朝鲜的三名男选手和中国台北的两名男选手都很年轻，有朝气，斗志旺盛，根底扎实，受到了一些专家的称赞。"},{"type":"paragraph","text":"这届杯赛的全部名次将于明晚决出。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b551c7e4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
