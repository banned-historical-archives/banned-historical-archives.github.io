tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席哲学思想武装头脑","authors":["排长张效明〖HH/换行〗DW：三○三二部队"],"parts":[{"type":"paragraph","text":"反革命修正主义分子罗瑞卿胡说什么：学习《矛盾论》是“越学矛盾越多，越学越糊涂”。这是地地道道的反动谬论。"},{"type":"paragraph","text":"毛主席的光辉哲学思想是无产阶级干革命的法宝，我们越学头脑越清楚，工作越有办法。我们排有个战士，原来缺点较多，我看他身上存在这么多问题，不知从那里入手帮助他，只好出了什么问题就去抓什么问题。结果是东抓一把，西抓一把，费了很大的劲，他的进步还是不大。我带着这个问题学习《矛盾论》。毛主席教导我们：“任何过程如果有多数矛盾存在的话，其中必定有一种是主要的，起着领导的、决定的作用，其他则处于次要和服从的地位。因此，研究任何过程，如果是存在着两个以上矛盾的复杂过程的话，就要用全力找出它的主要矛盾。捉住了这个主要矛盾，一切问题就迎刃而解了。”我遵照毛主席的教导，对这个战士进行了全面分析，认识到这个战士的主要矛盾是活学活用毛泽东思想不够，为革命而当兵的思想不明确。于是，我就抓住这个主要问题下功夫帮助他。果然，这个战士进步快了，年终被评为五好战士和连队活学活用毛泽东思想积极分子。"},{"type":"paragraph","text":"罗瑞卿越是反对我们学习毛主席的哲学著作，我们就越是要学，用毛主席哲学思想武装头脑，增长才干，正确地认识世界和改造世界。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"094cf456f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
