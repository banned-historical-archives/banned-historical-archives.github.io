<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1984,"month":8,"day":4}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"剖析“文革”派头头清理“三支两军”错误","authors":[],"parts":[{"type":"paragraph","text":"本报讯 湖南省邵阳军分区党委常委以六中全会《决议》和整党决定为思想武器，认真剖析邵阳“文革”派头头王安义这个反面典型，进一步认清彻底否定“文化大革命”的极端重要性，认清“三支两军”的错误，清除“左”的思想和派性影响。7月上旬，广州军区政治部转发了他们的经验。"},{"type":"paragraph","text":"中共湖南省委关于全面审查王安义等人问题的决定下发后，邵阳军分区党委常委认真进行学习讨论，回顾邵阳地区“文化大革命”以来的情况。“文化大革命”初期，邵阳地区出现了两大派造反组织。原市航管站一般干部王安义，是邵阳地、市的一个派头头。1967年初，部队奉命“支左”，首先支持的就是这一派。这一派打着“拥军”的旗号，从事帮派活动。王安义在“文化大革命”中干了大量打、砸、抢的坏事。粉碎“四人帮”后，王安义等人竭力把自己同另一造反组织的派性斗争说成是“抵制‘四人帮’的斗争”，自恃“一贯正确”，继续拉帮结派，在邵阳横行无忌，制造事端，并到党政机关无理取闹。党委成员反复阅读了《人民日报》关于邵阳“文革”派头头王安义等本性不改、寻衅闹事的报道和评论员文章，把王安义的“起家”和派性活动，与“文化大革命”和“三支两军”存在的问题联系起来分析，认清了“文革”中的两派，都是以“左”的错误理论为指导，以打砸抢为手段，以争权为目的，从总体上讲，不存在正确与错误之分。一名党委常委说：我们看问题只能从党和人民的利益出发。全国的“文革”搞了十年，王安义等人在邵阳兴风作浪十七年，严重地干扰了当地的安定团结和经济建设。王安义之所以能由一个一般干部变成县团级单位的党委书记，而且具有这么大的活动能量，与过去军队对他的支持是分不开的。这就正好说明，过去部队“支左”是支派。我们决不能认为自己在“支左”中挨了打，吃了苦，受了委屈，就不承认“支左”的错误。"},{"type":"paragraph","text":"开始，有些同志对于清理“三支两军”的错误，思想上有些顾虑，担心会影响军队的威信。军分区党委组织大家认真学习中指委和湖南省委关于全面审查王安义等人的决定，统一了认识：（一）我们主动清理“三支两军”的错误，不仅对地方全面审查王安义等人是有力的支持，而且也是加强部队内部思想的需要。清理“支左”错误的根本目的，在于总结经验教训，提高思想觉悟；（二）军队的威信在“文革”中受到损害，这是“支左”带来的消极后果。检查“支左”中的错误，消除派性的影响，就能恢复军队在群众中的威信，增进军民团结。（三）地方审查王安义等人的问题，不可避免地要涉及到部队“支左”的问题，我们应该主动配合，不能持回避的态度。凡是知道王安义等人近几年的非组织活动的，都要主动向组织讲清楚，并在思想上同他们划清界限；另一方面，要自觉清理“三支两军”中的错误，进一步肃清派性和“左”的思想影响，增强党性观念，为巩固和发展安定团结局面作出贡献。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31f77b5ab2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
