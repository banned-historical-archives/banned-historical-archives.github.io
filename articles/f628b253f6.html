r":1967,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《人民日报》、《文汇报》编者按:这里发表的，是我们两个报社的记者在上海联合召开的革命领导干部座谈会上一部分干部的发言。"},{"type":"paragraph","text":"毛主席教导我们:“老干部过去有功劳，但是不能靠吃老本，要很好地在无产阶级文化大革命中锻炼改造自己，要立新功，立新劳。”"},{"type":"paragraph","text":"无产阶级文化大革命，是一个共产主义的革命熔炉。它教育和锻炼了我们的干部，也挽救了一些犯了错误的干部。"},{"type":"paragraph","text":"事实证明，我们绝大多数干部是好的，是愿意同无产阶级革命派和红卫兵小将并肩战斗的。有些人在工作中犯了错误，只要改了就好，就能够继续为党和人民立新功。"},{"type":"paragraph","text":"参加座谈会的同志从切身体会中深深感到，一定要努力活学活用毛主席著作，要斗私，批修，把“私”字换成“公”字，把“怕”字换成“敢”宇，把“相信自己”换成“相信群众”，到群众中去，到阶级斗争最尖锐的地方去，同广大群众一起抓革命，促生产，促工作，促战备，敢为革命挑重担。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f628b253f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
