rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全面落实毛主席最新指示办好毛泽东思想大学校热烈祝贺总后勤部第二届学习毛主席著作积极分子代表大会胜利召开","authors":[],"parts":[{"type":"paragraph","text":"“海可枯，石可烂，无限忠于毛主席的红心永不变。”舍身抢救旅客列车的毛主席的好战士四旺同志，活学活用毛主席著作，学了就用，立竿见影。他决心做学习、执行、宣传、捍卫毛主席最新指示的模范。这是年四旺同志（左二）在和二炮学习毛主席著作积极分子曲俊臣等同志一起交流活学活用毛主席著作的经验。"},{"type":"paragraph","text":"本报记者摄"},{"type":"paragraph","text":"3516工厂的无产阶级革命派，紧跟毛主席的伟大战略部署，坚决贯彻、落实毛主席的最新指示，克服了资产阶级、小资产阶级派性，实现了革命的大联合和革命的三结合，夺得了革命、生产双胜利，成为总后勤部所属工厂落实毛主席最新指示的一面红旗。"},{"type":"paragraph","text":"“毛泽东思想是我的生命，毛主席怎么说，我就怎么做。”总后勤部某部六连班长侯朝文，在支左中热情宣传毛泽东思想，用毛主席的最新指示武装群众，为无产阶级文化大革命作出了贡献。"},{"type":"paragraph","text":"“飞轮碾碎千里雪，红旗插遍万重山。”长年奔驰在青藏高原的某团汽车六连，活学活用毛主席著作，突出无产阶级政治，坚持四个第一，大破反革命修正主义分子彭德怀、罗瑞卿的资产阶级军事路线，用毛泽东思想建设连队，使连队面貌焕然一新，连续六年被评为四好连队。这是他们在行车休息时学习毛主席最新指示。"},{"type":"paragraph","text":"某汽车团副教导员李显文等十位同志，坚决执行伟大领袖毛主席“抓革命促生产，促工作，促战备”的指示，在一次执行战备运输任务中，冒着生命危险，为后续车队探路，不幸遭遇特大山崩，壮烈牺牲，实现了他们的“心中只有红太阳，山崩地裂也敢上”的钢铁誓言。"},{"type":"paragraph","text":"本报记者作（图片）"},{"type":"paragraph","text":"怀揣宝书天天学，斗私批修永向前。飘扬在祁连山下后勤军马战线上的一面红旗——某军马场马三队，努力活学活用毛主席著作，用毛泽东思想武装头脑，坚决抵制反革命修正主义分子彭德怀、罗瑞卿的资产阶级军事路线，一心为革命养军马。"},{"type":"paragraph","text":"本版图片除署名外均为总后勤部供稿（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce63f5a34e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
