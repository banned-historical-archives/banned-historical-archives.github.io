<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"内务部、公安部关于当前处理自由流动人口的通知","authors":[],"dates":[{"year":1962,"month":4,"day":19}],"is_range_date":false,"parts":[{"text":"内务部、公安部关于当前处理自由流动人口的通知","type":"title"},{"text":"去年十月制止人口自由流动工作座谈会之后，各地做了很多工作，许多地方制止了人口大量的盲目流动。但是，今春以来，少数灾区人口大量外流的现象，又突出起来，大部分流往邻省和邻近生活较好的农村，少数流入城市，绝大部分是短期外出，投靠亲友就食渡荒，盲目外流的只是少数。近来，在收容工作中发现有的收容面不当或长期不作处理，强制生产劳动的也搞多了一些，有的用武装看押、有的收容所出现了乱检查、乱没收，打骂、虐待自流人口等违法乱纪行为。","type":"paragraph"},{"text":"请你们务必注意，当前正值春荒季节，人口外流的情况与去年有所不同，制止外流人口的某些措施，应当根据新的情况作相应的改变。对灾区的外流人口，既不能不理，也不能管得过死，必须严肃对待，谨慎处理。处理得好，有利于灾民克服困难渡过春荒；处理不当，反会增加困难，甚至引出乱子。现在我们考虑了一些意见，请你们依据具体情况和这样精神，提出意见，报告党委，研究办理。","type":"paragraph"},{"text":"（一）灾民外出以物换粮、换菜，是群众之间互相调剂，克服困难的迫不得已的办法，不能禁止，不能收容，不要将他们换得的粮食收购或没收。在流出地区，应当对外流人员的教育管理，最好是有领导、有组织、有控制地进行，事先与流入地区协商解决，能有大队、小队干部带领，避免盲目冲击一个地区，妨碍流入地区人民生活，搞乱秩序，流入地也要教育群众，发扬互助互济精神，按照等价交换的原则，把多余的粮菜换给，帮助渡荒。","type":"paragraph"},{"text":"（二）投靠亲友渡荒，是群众的传统习惯，应当允许，给予方便。但要告诉他们先要取得亲友的同意，不要盲目投奔，也不要流向其它灾区。并尽可能事先了解他们的数量，给有关地区的县、社组织打个招呼，在可能范围内尽量给予照顾。","type":"paragraph"},{"text":"（三）对流往大中城市、交通要道和边防地区的灾民要及时劝阻，已经流去的要劝回来，及时遣返，建议当地切实安排好他们的生活。如果当地确实无粮，安排不下去，就把他们输送到丰收或生活较好的农村地区，暂时安置，劳动就食，等春荒过后，遣返回乡。","type":"paragraph"},{"text":"（四）积极做好灾区工作，减少灾区人口外流。最根本的办法，是积极安排好生产，增强克服困难的信心。灾区的民政、公安机关，要在党委领导下，协助大队逐队、逐户、逐人地检查生活安排的落实情况，发现问题，妥善解决。生活安排得越细越好，切不可粗心大意。公安部门还要积极掌握灾区治安情况。","type":"paragraph"},{"text":"对于长期在外流浪和有违法犯罪的人，仍应收容，分别处理，不让他们继续流浪。收容范围必须加以控制，不能滥收。收容后，要迅速处理。集中强制生产劳动的要强制使用。现在已经举办的，要认真检查一次，及时解决存在的问题。收容、■不要使用武装民警看押。对收容站和劳动场所要加强管理，改善生活条件，有病要治疗，避免非正常死亡。对违法乱纪行为，要切实检查纠正，情节严重的必须■。","type":"paragraph"},{"text":" （一九六二年四月十九日）","type":"paragraph"}],"comments":[],"origin":"《人民公安》1962年第8期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de8fa1ba45"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
