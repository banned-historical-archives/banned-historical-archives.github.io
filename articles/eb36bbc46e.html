<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华东高教界学习会议胜利结束积极开展思想改造运动结合三反斗争批判资产阶级丑恶腐朽思想","authors":[],"dates":[{"year":1952,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　华东文化教育委员会召开的华东高等教育界学习会议于二月十日圆满结束。此次会议密切结合当前反贪污反浪费反官僚主义的伟大群众运动，以马克思列宁主义与中国革命相结合的毛泽东思想为武器，严肃地批判资产阶级的丑恶腐朽的思想，取得了很大收获，为华东高等教育界开展以三反为中心的思想改造的学习运动创造了良好的条件。"},{"type":"paragraph","text":"会议期间，与会代表在听取了华东教育部孟宪承部长的开幕词、华东军政委员会马寅初副主席和华东文化教育委员会舒同主任的报告后，即结合报告精神，分组学习了三反文件，互相结合地运用了个别交谈、互助组漫谈、小组讨论、以学校为单位的联组讨论及召开全体大会作示范检讨等生动活泼的学习方式，紧密结合思想实际，展开批评与自我批评，揭露与批判资产阶级丑恶腐朽的思想言行。会议并及时出版了大会会报与黑板报，反映会议情况，交流学习经验。会议始终贯彻了批评与自我批评的精神，并有重点地作了检讨报告，如:交通大学陈大燮教务长、复旦大学周谷城教务长、上海红十字会医院崔之义院长、复旦大学理学院虚于道院长、华东师范大学欧元怀教授(原大夏大学校长)、同济大学夏坚白主任委员、南京大学张江树教务长、上海医学院黄家驷副院长、苏南文教学院艺术教育系刘雪盦主任等，在各小组组员的诚恳帮助下，均在大会上作了以批判资产阶级思想为主要内容的检讨报告，并虚心听取了别人的批评；与会教师得到了很大启发。继在小组中再作检讨，并座谈了回校后如何密切结合三反学习、开展思想改造运动问题。"},{"type":"paragraph","text":"在闭幕大会上，马寅初副主席指出此次会议的收税后，勉励与会教师不要自满于已有的收税，应继续前进，脱胎换骨地进行改造，把高等教育事业搞好。"},{"type":"paragraph","text":"舒同主任在闭幕大会上作了重要发言。他对十天以来的学习会议，做了一个总结，并提出今后在学校中开展三反学习的任务方针和步骤。"},{"type":"paragraph","text":"经过十天会议，与会教师均感对自己帮朋很大，对今后开展学习运动、改造自己、改革学校充满着信心。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb36bbc46e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
