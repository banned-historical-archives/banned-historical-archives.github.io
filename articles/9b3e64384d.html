ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"关于在敌后抓紧实行六大政策的指示","alias":"","parts":[{"type":"paragraph","text":"关于在敌后抓紧实行六大政策的指示！"},{"type":"paragraph","text":"（1943年7月12日）"},{"type":"paragraph","text":"蒋介石估计欧洲第二战场不易开辟，德再攻莫斯科，日必攻苏，因此调兵遣将准备向我进攻，迫我作城下之盟，又见我两年默，以为可以压服。殊不知自我党实行整顿三风、精兵简政、统一领导、拥政爱民、发展生产、审查干部六项政策后，党内党外，精神物质，焕然一新，大进一步，空前团结，无隙可乘。敌后亦请你们抓紧此六大政策，求于今明两年完成任务。在群众中所提经常任务，则是战争、生产、教育三项。这个电报还发给一些中央局和中央分局。"},{"type":"paragraph","text":"[1]这是毛泽东关于在敌后抓紧实行六大政策给彭德怀及各中央分局发"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":7,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":108,"page_end":108},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b3e64384d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
