art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见通信兵竞赛大会的代表叶剑英元帅在闭幕式上作了指示","authors":[],"parts":[{"type":"paragraph","text":"本报讯 21日下午五时，毛泽东主席在怀仁堂接见了参加通信兵竞赛大会的部分代表和大会工作人员一千二百多人，并和他们在一起合影留念。"},{"type":"paragraph","text":"本报22日讯 通信兵竞赛大会于今日下午闭幕。叶剑英元帅和陈赓大将都出席了大会的闭幕式。叶元帅在闭幕式上讲了话。他说：通信兵是具有高度技术性的兵种，近几年来，我们已经拥有了相当数量的现代化技术装备和技术干部。他指示通信兵在今后的训练中要注意五个问题：一、大家必须重视训练的质量；二、不仅要注意通信兵的专业训练，而且要注意合练，注意在战术中的实际运用；三、大力展开群众性的发明、创造和合理化建议运动。他号召各级领导要特别重视群众的每一项创造和建议。他说：发明创造的最初的来源是在群众的实践当中，然后经过科学家把一点一滴的经验集中起来才成功的；四、要求各部队在训练中注意解决适应各地区特点的各种特殊问题；五、各部队在提高技术水平的同时，还要注意提高全体人员的政治觉悟。"},{"type":"paragraph","text":"随后，王诤中将和朱明中将代表竞赛委员会授奖。竞赛中获得优胜的十二个单位和八十六名选手以及七个合理化建议成绩良好的单位分别领到了奖旗、奖状和奖品。"},{"type":"paragraph","text":"朱明中将在闭幕词中提到了这次大会的特点之一是广泛地开展了交流经验的活动。他鼓励大家要保持和发扬这种虚心学习和团结友爱的精神。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a161b1f6f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
