art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国涌现大批毛泽东思想武装的新人","authors":[],"parts":[{"type":"paragraph","text":"亚非作家会议日本联络委员会主席白石凡在东京向中国记者发表谈话，热情歌颂毛泽东思想，赞扬中国无产阶级文化大革命。"},{"type":"paragraph","text":"白石曾率领日本作家代表团出席在北京举行的亚非作家紧急会议。"},{"type":"paragraph","text":"白石认为今天中国人民在毛泽东思想指引下所进行的无产阶级文化大革命，对于建设社会主义国家是绝对需要的。他说：“要建设社会主义就必须改造人的旧思想，必需涤荡一切旧时代留下来的遗物。否则就不能建设社会主义，就有可能使社会倒退。”他说：“正因为如此，从旧社会走过来的知识分子，不仅要为工农兵服务，还必须向工农兵学习和同工农兵结合。”"},{"type":"paragraph","text":"白石说，中国为了不重蹈苏联现代修正主义的复辙，正在向年青的一代进行革命教育，这一点是非常重要的。他说，目前在中国，从工农兵群众中涌现了大批用毛泽东思想武装起来的、具有共产主义风格的年青人。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d66403ec0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
