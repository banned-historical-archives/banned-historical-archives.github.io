script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"民德领导人昂纳克发表讲话说  社会主义不可阻挡  朝报强调抵制资产阶级自由化","authors":[],"dates":[{"year":1989,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民德领导人昂纳克发表讲话说"},{"type":"paragraph","text":"社会主义不可阻挡"},{"type":"paragraph","text":"朝报强调抵制资产阶级自由化"},{"type":"paragraph","text":"新华社柏林8月15日电  民主德国领导人昂纳克说，任何人都阻挡不了社会主义的发展。社会主义是保证人人平等、人人可以从事符合人类尊严的工作和一切为了造福于人民的唯一社会制度。"},{"type":"paragraph","text":"据《新德意志报》15日报道，这是昂纳克14日在接受埃尔富特专区“卡尔·马克思”微电子联合企业研制成功的32位微处理机样机之后，对参加样机试制工作的代表发表的讲话。"},{"type":"paragraph","text":"他指出，在民主德国，科学技术革命同社会主义制度优越性相结合所取得的成就表明，西方媒介关于“社会主义的社会设想失败了”的宣传是不值一驳的。"},{"type":"paragraph","text":"昂纳克还对民主德国微电子技术发展及其对国民经济发展起到的重要推动作用做了积极评价。他勉励微电子技术部门的工作人员，进一步加强关键技术在生产中的应用，以生产出更多的优质产品，满足国内外市场的需要。"},{"type":"paragraph","text":"新华社平壤8月16日电  朝鲜《劳动青年》报今天发表社论，强调要加强对大学生的教育，使他们能够自觉抵制资产阶级思想文化、生活方式和自由化的侵袭，成为为国家献身奋斗的爱国者和革命者。"},{"type":"paragraph","text":"社论说，大学生是革命事业的接班人，是未来事业的主人公。如何对大学生进行教育是关系到国家与民族兴旺的十分重要的问题。"},{"type":"paragraph","text":"社论说，帝国主义总想从内部瓦解社会主义国家，他们千方百计地散布腐朽的资产阶级思想、文化和生活方式，鼓吹自由化。在这种情况下，不很好地对大学生进行教育，他们就会忘却肩负的时代使命，受个人主义和自由主义的侵袭，陷入追求安逸和腐化堕落的泥潭。"},{"type":"paragraph","text":"社论认为，大学生在成为科学技术工作者和专家以前必须首先成为为国家献身奋斗的爱国者和革命者。"},{"type":"paragraph","text":"社论指出，在对大学生进行的思想教育中，加强阶级教育、社会主义爱国主义教育和社会主义制度优越性的教育占据十分重要的地位。要使大学生任何时候都能为维护社会主义旗帜，抵制资产阶级自由化和颓废风气而进行坚决的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f498cee7a6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
