":[],"dates":[{"year":1978,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"戴济民同志追悼会在京举行"},{"type":"paragraph","text":"党和国家领导人邓小平、汪东兴等送花圈"},{"type":"paragraph","text":"新华社北京十一月一日电　政协第五届全国委员会委员、卫生部原计划监察局局长戴济民同志因病医治无效，于一九七八年十月一日在北京逝世，终年九十岁。"},{"type":"paragraph","text":"戴济民同志追悼会最近在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"党和国家领导人邓小平、汪东兴、聂荣臻、谭震林、张鼎丞、姬鹏飞，以及中央军委负责人粟裕等送了花圈。政协全国委员会、卫生部、中国人民解放军总后勤部等，也送了花圈。"},{"type":"paragraph","text":"谭震林、邓颖超、姬鹏飞、康克清、江华等同志参加了追悼会，并向戴济民同志的子女表示亲切慰问。"},{"type":"paragraph","text":"追悼会由中国人民解放军总后勤部副部长贺诚主持，总后勤部部长张震致悼词。悼词中说，戴济民同志一九三○年九月参加中国工农红军，一九三一年三月加入中国共产党。他曾把自己私营医院的全部器械、药品无条件地献给红军，并且积极培养医护人员，为红军医伤治病。在长期的革命斗争中，他忠于党，忠于人民，热爱伟大领袖毛主席和敬爱的周总理、朱委员长，努力学习马列主义、毛泽东思想，刻苦钻研医疗技术，坚持又红又专，为无产阶级革命和社会主义建设事业贡献了自己的一生。粉碎林彪、“四人帮”反党集团，他感到由衷的高兴。他坚决拥护以华主席为首的党中央抓纲治国的战略决策。"},{"type":"paragraph","text":"参加追悼会的还有戴济民同志的生前友好，卫生部、中国人民解放军总后勤部驻京机关和单位的干部共六百多名。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2153721a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
