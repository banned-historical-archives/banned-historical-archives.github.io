兴建房屋","authors":["柏生"],"dates":[{"year":1949,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北平房屋问题条文公布后"},{"type":"paragraph","text":"叶剑英市长发表谈话"},{"type":"paragraph","text":"应按双方协议建立租赁关系鼓励资本家投资兴建房屋"},{"type":"paragraph","text":"【本报讯】关于北平房屋问题公布后，平市各界均认为他们盼望多时的问题，已获得合理的解决。大都用一种愉快的心情，表示同意人民政府此项规定。同时也提出一些有关问题，希望人民政府有明确的规定。记者于昨（十六）日特访叶剑英市长，承叶市长发表谈话如次：关于合理解决北平房屋问题，这是平市二百万人民生活上一个重要问题。我们公布的关于房屋政策的条文是经过各方人士慎重的研讨的，在目前情况下，对于城市房屋我们认为是应该合理保护的，这样不仅可以繁荣新北平的建设，更可建立起房屋租赁的正常关系。从布告发布之日起，所有本市人民应一律按照双方议定租赁，房客与房主应互相遵守，正视这个问题。在房价方面虽然我们没有具体数目字的规定，据我的意见，让房主房客自行协议，是比较好的，同时政府在布告中也已经有了原则上合理的限制。在双方合理协议后，还应该到政府去报告或登记。此外关于二房东问题，在全国各大城市中已经形成了一个惯例，我们目前要反对的是他们过度的剥削。至于对于有些资本家愿意投资兴建出赁房屋，我们仍是鼓励赞同的。最后叶市长说，任何法律公布后，都要在实施中随时加以修正的，我们还需要各方多提供意见，以能达到更完善的处理这个问题。  　（柏生）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47d7788671"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
