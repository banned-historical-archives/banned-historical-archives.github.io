ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给楚荣臻“的信","alias":"","parts":[{"type":"paragraph","text":"给聂荣臻\"的信"},{"type":"paragraph","text":"（1939年3月18日）荣臻同志："},{"type":"paragraph","text":"你著的书?及送我的一本照片，还有你的信，均收到。这些都是十分宝贵的东西。书准备在延安重庆两处出版（我与王主任?各作一序），照片正传观各同志。望努力奋斗，加深研究，写出更多的新作品。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]聂荣臻（1899—1992），四川江津人。当时任中共中央晋察冀分局书记、晋察冀军区司令员兼政治委员。"},{"type":"paragraph","text":"[2]指聂荣臻写的介绍晋察冀根据地抗日斗争情况的一本书。毛泽东题写的书名是《抗日模范根据地晋察冀边区》，1939年12月由延安八路军军政杂志社出版。毛泽东、朱德、王稼祥分别为这本书写了序言。"},{"type":"paragraph","text":"[3]指王稼祥。当时任中央军委副主席兼总政治部主任。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":3,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":267,"page_end":267},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ba3fe05c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
