art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们靠毛泽东思想建成水下桥","authors":["永跟东/张慧生"],"parts":[{"type":"paragraph","text":"不久前，在某地施工的三连建成了一座水下桥。竣工这天，同志们站在桥上，挥动红彤彤的《毛主席语录》，激动地一遍又一遍高呼：“战无不胜的毛泽东思想万岁！”“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"这座水下桥，工程复杂，质量要求也很高。三连接受这项工程时，没有图纸，也没有技术员，完全由自己和几个普通工人负责设计施工。有的同志看到没有一个“内行”的，就说：“我们过去连地面上的桥也没搞过，现在要建水下桥，又没有一个专家，能行吗？”党支部抓住这个活思想，及时组织全连干部战士狠批大叛徒、大内奸、大工贼刘少奇的“技术挂帅”、“专家第一”的反革命修正主义黑货，用毛泽东思想统一了认识。短短的一个月，就成功地建成了一座完全合乎国家要求的水下桥。"},{"type":"paragraph","text":"水下桥建成后，党支部为了进一步提高大家的两条路线斗争觉悟，便以“我们靠什么建成了水下桥？”为题，组织大家在大桥旁进行了“一事一议”活动。"},{"type":"paragraph","text":"议论开始，同志们首先学习了毛主席关于政治是统帅，是灵魂的伟大教导，和林副主席的指示：“大海航行靠舵手，干革命靠毛泽东思想。”接着，大家畅谈起用毛泽东思想统帅施工，闯过一道道难关，建成水下桥的深刻体会。排长窦荣清说：“修建这座水下桥，论技术，我们不行。可是我们有战无不胜的毛泽东思想，所以什么人间奇迹都能创造出来。”战士崔国江说：“靠毛泽东思想，还是靠单纯技术完成任务，这是毛主席无产阶级革命路线同刘少奇反革命修正主义路线斗争的大问题。我开始对完成任务有点担心，正是中了大叛徒刘少奇的‘业务挂帅’、‘专家第一’的毒。通过这次修建水下桥，我深深感到，用毛泽东思想武装起来的人最聪明、最有智慧。有一次，我们冒着大雨平整水泥管基地，需要把一根十几吨重的水泥管吊起来才能平整。但是，当时没有吊车，怎么办？我们坚决响应毛主席‘抓革命，促生产’的伟大号召，就用双手把水泥管撬起来，用双手把基地平整好。这是资产阶级技术‘权威’连想也不敢想的事，只有用毛泽东思想武装起来的革命战士，才敢这样做，才能这样做。”同志们还从水下桥的建成，联系到我们靠战无不胜的毛泽东思想，成功地爆炸了原子弹和氢弹、以最快的速度建成世界上第一流的南京长江大桥等奇迹，狠批刘少奇的反革命修正主义黑货，大大提高了两条路线斗争觉悟。大家越议，越深深体会到，战无不胜的毛泽东思想是我们的命根子，是战天斗地的力量源泉。同志们一致表示，要永远用战无不胜的毛泽东思想统帅一切，永远沿着毛主席的革命路线奋勇前进！"},{"type":"paragraph","text":"（永跟东、张慧生）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f466dde31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
