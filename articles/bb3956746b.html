art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"贺龙副总理电贺我国乒乓球队的巨大胜利指出这是毛泽东思想的胜利，是坚持辩证唯物论的胜利，是自力更生奋发图强的胜利；","authors":["贺龙"],"parts":[{"type":"paragraph","text":"卢布尔雅那"},{"type":"paragraph","text":"参加第二十八届世界乒乓球锦标赛的中国乒乓球代表团"},{"type":"paragraph","text":"荣高棠同志并中国乒乓球队全体同志："},{"type":"paragraph","text":"你们在获得男女团体冠军后，又连续获得巨大的胜利，捷报传来，全国人民都表示热烈的祝贺，并为你们在政治上、思想上、技术上的全面丰收而欢欣鼓舞。"},{"type":"paragraph","text":"你们的胜利是毛泽东思想的胜利！是坚持辩证唯物论的胜利！是自力更生，奋发图强的胜利！它体现了中国人民在中国共产党和毛主席的领导下，无坚不可摧，无高不可攀的革命气概。"},{"type":"paragraph","text":"希望你们牢牢记住毛主席：“虚心使人进步，骄傲使人落后”的教导，荣誊愈大，愈要谦虚谨慎，永保革命者的高贵品质。认真总结经验，虚心学习各国运动员的长处，同他们一道，为发展世界乒乓球运动，为加强各国人民的友谊而努力。"},{"type":"paragraph","text":"贺龙"},{"type":"paragraph","text":"一九六五年四月二十六日"},{"type":"paragraph","text":"林慧卿"},{"type":"paragraph","text":"梁丽珍"},{"type":"paragraph","text":"庄则栋"},{"type":"paragraph","text":"张燮林"},{"type":"paragraph","text":"周兰荪"},{"type":"paragraph","text":"郑敏之"},{"type":"paragraph","text":"李赫男"},{"type":"paragraph","text":"李富荣"},{"type":"paragraph","text":"徐寅生"},{"type":"paragraph","text":"王志良RW：贺龙；国家体委主任；社会活动"}],"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb3956746b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
