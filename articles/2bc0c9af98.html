{"year":1966,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想放光芒（对口词）"},{"type":"paragraph","text":"解放军某部战士  姜宗扬甲：世界上什么最宝贵？乙：是光辉的毛主席著作。甲：世界上什么最闪光？乙：是伟大的毛泽东思想。甲：毛泽东思想，真理的太阳。乙：照耀五大洲，四海放光芒。甲：我们人民解放军，乙：靠毛泽东思想来武装。甲：由小到大，从弱到强，乙：战无不胜，百炼成钢，甲：打败了穷凶极恶的日本鬼，乙：消灭了美帝走狗蒋匪帮。甲：我们伟大的七亿人民，乙：靠毛泽东思想来武装。甲：自力更生，乙：奋发图强，甲：战胜了重重困难，乙：顶住了惊涛骇浪，甲：创造了人间奇迹，乙：万里江山换新装！甲：看！大庆的红旗到处飘扬，乙：看！大寨的红花遍地开放。甲：看！革命英雄高歌迈阔步，乙：浩浩荡荡！合：奔向前方！甲：全世界的革命人民，乙：用毛泽东思想武装。甲：群众在觉醒，乙：齐心求解放。甲：亚非拉烽火遍地燃烧，乙：全世界掀起反美巨浪，合：东风浩荡西风衰，"},{"type":"paragraph","text":"被压迫人民要得到彻底解放！甲：毛泽东思想，乙：真理的太阳，甲：吓得牛鬼蛇神，乙：无处去躲藏。甲：国内外的阶级敌人，乙：手放毒箭梦想射太阳。甲：呸！白日做梦！乙：呸！痴心妄想！甲：真理的光辉遮不住，乙：太阳的光芒谁能挡！甲：我们革命的战士，乙：誓死捍卫毛泽东思想！甲：刀来刀迎，乙：笔来笔挡，甲：消灭一切拿枪的敌人，乙：也把不拿枪的敌人消灭光！合：让毛泽东思想的伟大红旗，"},{"type":"paragraph","text":"千秋万代，永远飘扬！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bc0c9af98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
