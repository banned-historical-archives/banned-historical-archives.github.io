script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“技术第一”就是突出资产阶级政治","authors":["瞿国刚　朱达忠　杨望远　穆桂安　王继武"],"dates":[{"year":1969,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“技术第一”就是突出资产阶级政治"},{"type":"paragraph","text":"西宁供电所工人　瞿国刚　朱达忠　杨望远　穆桂安　王继武"},{"type":"paragraph","text":"叛徒、内奸、工贼刘少奇极力鼓吹“技术第一”。他胡说什么无产阶级在夺取政权以后，“要以技术工作为中心”，“技术工作就要决定一切”。这是一个大阴谋。"},{"type":"paragraph","text":"政治和技术的关系，任何时候都是统帅和被统帅的关系。不是无产阶级政治统帅技术，就是资产阶级政治统帅技术。所谓“技术第一”，是一个虚伪的口号。伟大领袖毛主席教导我们：“在社会主义这个历史阶段中，还存在着阶级、阶级矛盾和阶级斗争，存在着社会主义同资本主义两条道路的斗争，存在着资本主义复辟的危险性。”无产阶级要巩固无产阶级专政，而资产阶级则要颠覆无产阶级专政。大叛徒刘少奇鼓吹“技术第一”，就是要突出资产阶级的政治，复辟资本主义。"},{"type":"paragraph","text":"让我们来看看，大叛徒刘少奇是怎样利用“技术第一”来大搞反革命活动的。"},{"type":"paragraph","text":"大叛徒刘少奇打着“技术第一”的幌子，大搞“专家治厂”。他拚命吹捧资产阶级技术“权威”，污蔑我们工人没有技术，“只会操作，不懂得理论”，让资产阶级技术“权威”掌握企业的大权。拿我们所来说吧，在无产阶级文化大革命以前，走资派把资产阶级技术“权威”捧上了天，而对我们工人群众却百般刁难，无情打击。那时，我们工人有力无处用，有劲使不上，有创造和智慧不能发挥。我们要大搞技术革新和技术革命，制造变压器。但是，资产阶级技术“权威”千方百计压制我们，污蔑我们没有技术，“只能修修补补”，制造不了。在无产阶级文化大革命中，我们工人阶级在毛主席无产阶级革命路线指引下，坚持了政治挂帅，用毛泽东思想统帅自己的行动，在短短时间里，就自己设计、自己制造出了变压器。事实证明，我们工人是技术的主人。大叛徒刘少奇鼓吹“技术第一”，就是要让资产阶级技术“权威”统治我们的工厂，对我们工人实行资产阶级专政。"},{"type":"paragraph","text":"大叛徒刘少奇还以“技术第一”为幌子，反对我们用毛泽东思想武装头脑，妄图用资产阶级名利思想来腐蚀我们的灵魂。如果中了它的毒，就会“两耳不闻窗外事，一心只把技术钻”，忘记活学活用毛主席著作，忘记阶级斗争，忘记在无产阶级专政条件下继续革命，走上不问政治、为名图利的邪路，成为刘少奇复辟资本主义的驯服工具。要是刘少奇的阴谋得逞，我们掉了脑袋，还不知道是怎么掉的。这是多么危险呀！"},{"type":"paragraph","text":"林副主席教导我们：“大海航行靠舵手，干革命靠毛泽东思想。”我们一定要摆正政治和技术的位置，把活学活用毛泽东思想放在首位，用无产阶级政治来统帅技术。让“技术第一”的反革命谬论见鬼去吧！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45c0a9bc86"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
