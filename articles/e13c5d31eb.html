script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伊朗《世界报》连续发表文章和社论揭露苏修对伊朗和第三世界国家的剥削","authors":[],"dates":[{"year":1974,"month":7,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社德黑兰一九七四年七月一日电　伊朗《世界报》(国际版)连续发表文章和社论，进一步揭露苏联修正主义领导集团对伊朗和其他第三世界国家的剥削。"},{"type":"paragraph","text":"这家报纸六月三十日发表的文章说，同俄国人就正在通过阿斯塔拉的管道输往俄国的天然气的价格举行谈判是十分困难的。"},{"type":"paragraph","text":"文章回顾说:“一九六六年伊朗同俄国达成了一项协定，根据这项协定，(俄国向)伊朗提供修建伊斯法罕钢厂的贷款，由伊朗通过阿斯塔拉向俄国南部供应天然气来偿还。一千二百公里长的管道是由伊朗提供资金的。钢厂修建完毕时，其成本比计划的增加了一倍多。这个协定中的其他项目也没有达到原来所预计的目标。”"},{"type":"paragraph","text":"文章在谈到苏联以低价从伊朗购买天然气时说:“现在伊朗人要求每一千立方英尺的价格(从三十美分)增加到六十二美分。这个要求怎么说也是克制的，特别是人们记得俄国人刚刚警告奥地利人，从明年起，他们必须付将近七十美元而不是目前的十四美元来购买一千立方米的俄国天然气，价格增加四倍。”"},{"type":"paragraph","text":"文章在谈到苏联对其他国家的剥削时揭露说:“多年来，埃及不得不以棉花偿还俄国的贷款，而俄国人以比他们付的高三倍的价格把棉花转卖出去。”"},{"type":"paragraph","text":"这家报纸七月一日又为此事发表社论说:“由伊朗国家瓦斯公司经理穆萨德吉上周在莫斯科进行的关于调整莫斯科付给伊朗天然气价格的谈判终于被发现是毫无结果的。俄国人拒绝了伊朗的建议，而且表明他们不愿接受合理提高伊朗天然气的价格。”社论指出:“俄国人采取这种态度，是在违背他们同伊朗的协议的条款。他们拒绝一个不高的要价。他们在使伊朗人民乃至所有第三世界国家再一次仔细地观察这个自命的第三世界国家的‘朋友’。”"},{"type":"paragraph","text":"社论揭露说:“俄国人自己对于从国际市场价格上涨牟取利润是毫不踌躇的。他们最近已经把他们出售给奥地利的天然气的价格提高了三倍以上，提高到每一千立方英尺一美元以上。”"},{"type":"paragraph","text":"社论说，俄国人以贱价得到伊朗的天然气，并在欧洲牟取暴利，“这真象俄国人喜欢把有的事说成是资本主义剥削的那种味道。”"},{"type":"paragraph","text":"社论还指责苏联不履行双方协议所载明的条款，并且说:“整个第三世界对这一教训肯定是不会忘记的。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e13c5d31eb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
