ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"毛泽东等祝贺德意志民主共和国成立八周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国"},{"type":"paragraph","text":"成立八周年的电报！"},{"type":"paragraph","text":"（1957年10月6日）德意志民主共和国总统威廉·皮克同志，德意志民主共和国人民议院主席团主席约翰奈斯·狄克曼同志，德意志民主共和国总理奥托·格罗提渥同志，德国统一社会党中央委员会第一书记瓦尔特·乌布利希同志："},{"type":"paragraph","text":"当德意志民主共和国成立八周年之际，我们谨向你们和全体德国人民致衷心的、热烈的祝贺。"},{"type":"paragraph","text":"中国人民一向深切地关怀着德国人民在德意志民主共和国政府和德国统一社会党的领导下，为建立统一、和平和民主的德国，为完成国内各项社会主义建设，为巩固社会主义阵营的团结，为维护欧洲和世界和平所进行的艰巨的斗争，并且为德国人民所取得的每一成就感到欢欣鼓舞。"},{"type":"paragraph","text":"中华人民共和国和德意志民主共和国之间的友好合作关系一年"},{"type":"paragraph","text":"[1]这是毛泽东以中华人民共和国主席的名义和全国人民代表大会常务委员会委员长刘少奇、国务院总理兼外交部长周恩来联名给德意志民主共和国总统威廉·皮克、德意志民主共和国人民议院主席团主席约翰奈斯·狄克曼、德意志民主共和国总理奥托·格罗提渥、德国统一社会党中央委员会第一书记瓦尔特·乌布利希的电报。祝贺德意志民主共和国成立八周年。"},{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国成立八周年的电报来有了新的发展。我们相信：我们两国友好合作关系的进一步发展，不仅有利于中、德两国人民，而且必将对巩固以苏联为首的社会主义阵营的大团结和维护世界和平的事业作出有力的贡献。"},{"type":"paragraph","text":"中、德两国人民之间牢不可破的友谊万岁！"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来"},{"type":"paragraph","text":"一九五七年十月六日"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":244,"page_end":245},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"834a8a0383"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
