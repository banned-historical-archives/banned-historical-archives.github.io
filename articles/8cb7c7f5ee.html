tes":[{"year":1966,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　无锡市曲艺团，最近来沪演出，在西藏书场举行毛主席诗词弹词谱曲演唱会。"},{"type":"paragraph","text":"这个团从去年八月开始，带着热爱毛主席的感情，为毛主席的诗词谱曲。他们积极学习毛主席著作，以及有关诗词创作时期的革命历史和革命回忆录，对节目进行了反复修改，于去年十二月参加了江苏省苏州评弹会演，得到了好评。在会演以后，他们又经过反复修改，并到基层单位为工人群众演唱，征求工人意见，使节目质量不断提高。在毛主席诗词弹词谱曲演唱会中，这个团还用开篇、说唱、韵白、对口词等评弹形式，介绍诗词的历史背景。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cb7c7f5ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
