":[{"year":1985,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昆明“文革”时期被占侨房退还完毕"},{"type":"paragraph","text":"本报讯  昆明市房管局和有关部门已将“文革”时期接管代管的私房退还完毕。"},{"type":"paragraph","text":"这些房产共一千零四十七间、一万八千零五十平方米，涉及二百一十一户人家。到去年11月底，除十六户房主下落不明或无法找到继承人外，其余的户主均领到了产权证明书，有一百多户已返回原屋居住，剩下的几十户亦可在近期内陆续搬回原房。　（彭书贵）"},{"type":"paragraph","text":"华侨在国内的私房（以下简称侨房，港澳同胞、外籍华人的私房同此例）有一定的数量，它们被侨胞视为自己的“根”，极为关切。正象有的侨胞所说，房子绝不仅仅是私人财产的问题，如果没有房子，便感到“有国无家，有乡无舍”，没有“根”。因此，侨房政策，是关系到侨胞爱国、爱家、爱乡的大问题，一定要落实好。党中央最近指出要进一步落实侨房政策，正是从这里出发的。"},{"type":"paragraph","text":"当然，由于这些问题是历史遗留的，加之国家财政一时拿不出许多钱来，所以，这些问题的解决既要实事求是，又要有一个过程。对于一时还不能解决的，要解释清楚，取得体谅。对于能够解决或者通过克服困难能解决的，则要积极认真地去解决。对于中央已提出具体解决期限的，要按期完成。"},{"type":"paragraph","text":"——编者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbcc6970d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
