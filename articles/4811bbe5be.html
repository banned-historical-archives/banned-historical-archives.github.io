tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"鼓足干劲 力争上游 沿着毛主席革命路线胜利前进","authors":["柳穗/卢振海/付培敏"],"parts":[{"type":"paragraph","text":"某部“临汾旅”党委遵照毛主席关于“认真看书学习，弄通马克思主义”的教导，在批修整风中刻苦读马、列的书和毛主席的书，不断提高路线斗争觉悟，增强识别真假马克思主义的能力。这是党委成员在行军宿营地交流学习体会。 卢振海摄"},{"type":"paragraph","text":"广州部队某团，遵照毛主席有关严格训练，严格要求的教导，坚持从实战需要出发，认真组织部队进行训练。这是在进行“敌”火下强渡江河演习。 柳穗摄"},{"type":"paragraph","text":"铁道兵某部指战员贯彻执行“鼓足干劲，力争上游，多快好省地建设社会主义”的总路线，不怕条件艰苦，不畏环境恶劣，为建设社会主义和保卫祖国做出新成绩。这是在新干线上铺轨。 付培敏摄"},{"type":"paragraph","text":"海军南海舰队某部，坚持以政治统帅专业技术训练。通过学先进，赶先进，不断提高训练质量。这是某猎潜艇组织枪炮部门进行装弹对手赛。 袁坤摄"},{"type":"paragraph","text":"成都部队某部医务工作者，执行毛主席的医疗卫生路线，经常深入彝家村寨，热情地为社员群众防病治病。这是医务人员上门为群众治病。 李健民摄"},{"type":"paragraph","text":"空军部队某部机械人员，在批修整风中，批判了刘少奇一类骗子鼓吹的精神代替物质的反动谬论，决心做又红又专的革命战士。这是他们在积极钻研专业技术。 程瑛摄"},{"type":"paragraph","text":"西北高原某地军民牢记毛主席关于“提高警惕，保卫祖国”的伟大教导，常备不懈，守卫着祖国边疆。这是军民在一起执行巡逻任务。 蔚贺摄"},{"type":"paragraph","text":"北京部队某部柏各庄农场的指战员，发扬艰苦奋斗革命精神，在大旱之年夺得了万亩水稻平均亩产八百九十斤的好收成，跨过了《纲要》。这是他们在挑灯夜战，抢打丰收粮。 本报记者摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4811bbe5be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
