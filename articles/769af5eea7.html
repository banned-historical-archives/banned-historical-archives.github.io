script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"非洲人民欢呼毛主席伟大声明将把美国黑人斗争引向胜利  毛主席总是和被压迫人民站在一起  指引被压迫人民团结战斗解放自己","authors":[],"dates":[{"year":1968,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"非洲人民欢呼毛主席伟大声明将把美国黑人斗争引向胜利"},{"type":"paragraph","text":"毛主席总是和被压迫人民站在一起"},{"type":"paragraph","text":"指引被压迫人民团结战斗解放自己"},{"type":"paragraph","text":"新华社十九日讯　刚果（布）、桑给巴尔和毛里塔尼亚等非洲工人、学生和青年十八日对新华社记者发表谈话，热烈欢呼毛主席支持美国黑人抗暴斗争的声明，并指出：“世界革命人民的伟大领袖毛主席总是和世界被压迫人民和被压迫民族在一起，总是坚决支持和鼓舞斗争中的人民。”"},{"type":"paragraph","text":"刚果（布）工人乌埃纳比奥在布拉柴维尔对新华社记者说：“世界革命的伟大领袖毛主席，总是在关键性的时刻，向正在为争取解放而斗争的各国人民指明了走向胜利的正确道路”。"},{"type":"paragraph","text":"乌埃纳比奥指出：资产阶级和平主义者的叫嚷，修正主义者的胡言乱语，实际上都只是为帝国主义侵略者的政治目的服务的。"},{"type":"paragraph","text":"他说，美国黑人的斗争同美国工人运动相结合，将加速全世界革命人民的头号敌人、旧世界的堡垒美帝国主义的崩溃。"},{"type":"paragraph","text":"一位名叫阿里的桑给巴尔朋友对新华社记者说，毛主席的声明不仅是对美国黑人斗争的有力支持，也是对正在进行反对以美帝国主义为首的帝国主义和殖民主义的斗争的亚非拉革命人民的巨大鼓舞。"},{"type":"paragraph","text":"阿里说：“美国黑人的解放斗争是全世界人民反对美帝国主义的总斗争的一个组成部分。毛主席指出了这个斗争的伟大意义，看到了美国黑人抗暴斗争所蕴藏的力量。”"},{"type":"paragraph","text":"阿里说，毛主席指出：“美国黑人斗争必将同美国工人运动相结合，最终结束美国垄断资产阶级的罪恶统治。”毛主席这一透彻的马克思列宁主义的分析和毛主席指出的这一正确的革命路线，必将把美国黑人的斗争引向更高的阶段并使它取得最后的胜利。"},{"type":"paragraph","text":"另一位桑给巴尔朋友对新华社记者说，毛主席的声明将推动世界民族解放运动蓬勃开展。"},{"type":"paragraph","text":"他说：美国黑人斗争的发展证明，毛主席关于“民族斗争，说到底，是一个阶级斗争问题。在美国压迫黑人的，只是白色人种中的反动统治集团”的论断，是十分正确的。"},{"type":"paragraph","text":"他强调指出，美国黑人和世界革命人民应该从非暴力主义者马丁·路德·金被美帝杀害的事件中吸取很大的教训。他们必须拿起武器对付反革命暴力以解放自己。"},{"type":"paragraph","text":"一位在阿尔及尔的毛里塔尼亚学生说：“在资产阶级的暴力面前，主张非暴力，这是自杀的行为。美国的黑人和世界上一切被压迫的人民要响应毛主席的号召，以革命的暴力还击反革命的暴力。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"769af5eea7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
