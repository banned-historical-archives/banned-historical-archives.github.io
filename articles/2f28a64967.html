["雷朋"],"dates":[{"year":1957,"month":5,"day":5}],"is_range_date":false,"parts":[{"text":"马寅初对揭露内部矛盾有顾虑","type":"title"},{"text":"雷朋","type":"authors"},{"text":"新华社北京18日讯:　5日晚，记者按照约定的时间到马寅初家里去访问他，请他谈工作上的意见。他在接见记者时说：“我约你来，只谈大矛盾，不谈小矛盾”。他接着解释：所谓大矛盾就是我国的人口问题，小矛盾即他在北京大学工作上的意见。谈了一会关于人口问题，我即把话题转到他在北大工作职务上的意见。","type":"paragraph"},{"text":"他说：“我对党没有啥，我与江校长的关系，我不能说，说了不但不能解决矛盾还要增加矛盾。中国人的传统美德是要有厚道。今后我还要与他共事，要为北大着想”。","type":"paragraph"},{"text":"我当时问他：“听说北大试行党委制，那么过去与你如何来决定学校行政？其中有否矛盾？如何解决”？他说：“如何解决我拿不出办法，但是我觉得在高等学校中不要民主人士不行，抽调党员副校长也不行”。接着他给我讲了他曾三次要求辞职，毛主席和总理没答应的事。并说在大学里要有党委会才能工工作。他说：“要掌握教师和学生的思想材料非党不行，三反五反要我搞我搞不了，高等学校的院系调整，不是党的力量根本办不到”。他接着说：“北大这几年全靠江校长，好的方面是主要的”。我当时就问：“那么你对江校长在与你共事中有些甚么意见没有”？他说：“有，我不能谈”。我说，“毛主席提出的解决内部矛盾，就是要把这些在工作上的意见谈出来”。他说：“人并不是那么单纯，谈了好象就没事了，其实只有增加矛盾。如果毛主席要找我个人谈，我可以说，但也只能适可而止。总之，我不给你谈，还不能发表”。我当时即表示说：“我尊重马老的意见”。","type":"paragraph"},{"text":"5月8日，我到北大参加座谈会后的休息时间，又碰到马寅初。他把我拉到墙角边对我说：“意见这么多，再搞下去，他们(意即江校长和党委员)怎么下台，应该适可而止，你可以反映一下”。接着他又对我说：“我同江校长的关系如果由我来讲了，将来保险会有人从我们俩人中间来挑是非”。","type":"paragraph"},{"text":" 来源： 1957年5月18日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f28a64967"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
