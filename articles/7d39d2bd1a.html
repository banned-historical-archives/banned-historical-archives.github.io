uthors":[],"dates":[{"year":1962,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"台湾工人不断罢工抗议美蒋残酷剥削"},{"type":"paragraph","text":"有些工人举行请愿和怠工反对降低或积欠工资"},{"type":"paragraph","text":"新华社29日讯　台北消息：台湾工人为抗议美蒋的残酷剥削，最近几个月来不断进行罢工、怠工和请愿斗争。"},{"type":"paragraph","text":"据台湾报纸透露，被美国“英加尔斯造船公司”吞并的基隆“台湾造船公司”一千多名中国工人，从1月26日起连续举行了三天罢工，抗议美国资本家破坏惯例不发给工人春节酬劳金。台湾《联合报》说，这家造船公司的工人为反对公司方面无理解雇大量职工，在去年12月中、下旬，曾经多次采取怠工方式，使正在建造货轮的工作陷于“停顿状态”。"},{"type":"paragraph","text":"台湾各地煤矿工人的罢工斗争最近也不断发生。《联合报》2月20日消息说，在台北县，景美煤矿七十多个工人因“自己辛辛苦苦的血汗钱（工资）拿不到而气愤”，在19日“封锁了矿场大门”，并和矿场经理雇用的流氓打手“展开一场激烈的殴斗”。"},{"type":"paragraph","text":"基隆市《东方日报》说，基隆煤矿工人近六百人，为抗议矿方“积欠工资”，自1月中旬便宣布罢工。31日，矿工们派出代表十多人前往蒋介石集团“基隆市政府”请愿，在“市府”门前包围了准备外出的“市长”林番王，并打伤企图镇压工人请愿的蒋军上尉军官。"},{"type":"paragraph","text":"据《东方日报》4月6日报道，在台中县大甲林区的林业工人们正在以怠工方式反对“林区管理处”降低工人工资。消息说，5日，工人代表沈祥春在“记者公会”向报界控诉：他们许多勤劳工作近二十年工龄的“甲种技工，现在突接处方通知，一律降调为以件论工资的乙等工人”。在大甲林区的甲种技工，每月工资本来已经是难以糊口，现在又降为乙等工人，每月工资维持“一个人的生活尚不够，何能顾及嗷嗷待哺的妻儿”。他呼吁，希望台湾舆论“惠予正义支持”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d39d2bd1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
