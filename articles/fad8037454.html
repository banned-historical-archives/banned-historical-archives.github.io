" crossorigin="">{"props":{"pageProps":{"books":[{"id":"becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa","name":"毛远新紧跟“四人帮”大反经验主义的部分罪行材料","internal":true,"official":true,"type":"img","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/becd9f73-f6d4-4f1a-88ac-2fb3b1dfbffa/15.png"],"article":{"title":"四、毛远新授意发表的第二次理论讨论会的消息报道","alias":"","parts":[{"type":"paragraph","text":"四、毛远新授意发表的第二次理论"},{"type":"paragraph","text":"讨论会的消息报道（载于《辽宁日报》一九七五年四月二十二日)破除经验主义力求学好弄懂"},{"type":"paragraph","text":"省革委会宣传组召开理论问题讨论会"},{"type":"paragraph","text":"【本报讯】最近，省革委会宣传组召开了以破除经验主义为中心内容的理论问题讨论会。会议通过学习毛主席的有关教导，批判修正主义，分析经验主义的危害性，扫除当前学习元产阶级专政理论的思想障碍，并且讨论了领导干部怎样带头学习理论，带头限制资产阶级法权和坚持继续革命的问题。"},{"type":"paragraph","text":"这个讨论会别开生面，开得十分活跃。参加会议的既有参加革命几十年的老干部，又有年仅十五岁的红卫兵小将；既有市(地)、县委和厂矿企业党委书记，又有普通的工人群众；既有专业理论工作者，又有工农理论队伍的骨干。他们坐到一起，认真学习，热烈讨论。业余理论骨干讲得不完全的，专业理论工作者加以补充；领导干部的意见欠妥当，工人起来帮助纠正；大家畅所欲言，互相学习，共同提高。会上，沈阳纺织机械厂工人吴振武和盖县四中红卫兵韩东太分别谈了他们刻苦学习无产阶级专政理论的体会，大家都认为他们讲得很深刻，是向领导干部和老将的挑战；并认为，桓仁"},{"type":"paragraph","text":"123—县县委书记王连生同志带头破除资产阶级法权思想，带头限制资产阶级法权的模范事迹，为大家树立了理论联系实际的好榜样。"},{"type":"paragraph","text":"讨论会开始，不少同志对经验主义的危害认识不足，对反对经验主义的重要性理解不深。通过学习讨论，认识到反对经验主义并不是个新问题，面是伟大领袖毛主席早已向全党提出的战斗任务。毛主席一贯重视反对经验主义，在民主革命时期，对那种“尊重经验而看轻理论”的庸俗事务主义家进行过严肃的批判，提出经验主义是一种机会主义的思想，是违背马克思主义的；在社会主义革命时期，尤其是在反对彭德怀反党集团的时侯，又尖锐地指出：“现在，主要危险是经验主义”。可是，对毛主席反复强调过的这个问题，我们有些同志到现在还缺乏足够理解，还没有在脑袋里挂上号，对批判和纠正经验主义不以为然。你批评他有经验主义，他却感到不痛不痒，有的甚至把经验主义当成一个“光荣”的缺点抱在怀里不放。经过讨论，许多同志深切地感到：现在很有必要重温毛主席关于反对经验主义的教导，进一步破除经验主义，为学习无产阶级专玫的理论扫清障碍。"},{"type":"paragraph","text":"要破除经验主义，就得搞清楚经验主义的基本特征，看清它的表现。同志们认为，经验主义和经验根本不同。经验，是人们在实践中积累起来的对客观事物偏于感性的或局部的认识，它是人们认识客观事物的基础，是很可宝贵的，革命理论就是从革命实践中总结出来的。而经验主义，则把感性认识绝对化，“把局部经验误认为即是普遍真理”，“以为只有感性认识可靠，而理性认识是靠不住的”，否认革命理论对革命实践的能动的指导作用。犯有经验主义的人常常表现为：一、对理论学习，说起来重要，干起来次要，"},{"type":"paragraph","text":"一2一忙起来不要，认为生产是硬任务，学习是软任务，检讨时埋怨自己学习不好，检讨过后，又不好好学习。二、沾沾自喜于一得之功和一孔之见，缺乏明确方针，没有远大理想，在工作中忙忙碌碌。事务主义，在路线斗争中，模棱两可，稀里糊涂。三、留恋归事物，满足于“老爷爷的方法，老奶奶的步伐”，不想创新，总是用过了时的老眼光看待新事物，凭着过了时的老经验解决新河题，四、自恃高明，唯我正确，不学先进，固步自封，把老经当或包百病的灵丹妙药，到处套用。干对了，不去总结提高，？斗，付出了学费也不能买个明白，过后，又重犯同类性质约错误。"},{"type":"paragraph","text":"在学习和讨论过程中，一些同志联系阶级斗争、终线斗争的实际和自己的亲身感受，谈了经验主义的危害。他们认为，把经验主义的严重危害性集中到一点，就在于它是修正主义弱手：从历史上看，教条主义如果缺乏经验主义的合作就不易流喜全堂，在今天，也是同样，修正主义如果缺乏经验主义的合作就不易流毒全党。同志们说，在社会主义条件下，修正主义路线的头子搞复辟倒退的反革命勾当，就是披着马列主义外衣，打红旗反红旗的。经验主义者不读马列，不懂马列，是理论上的盲人。当然就识别不了政治骗子。修正主义善于“骗”，经验主义不能“辨”。党内重大路线斗争特别是建国以来几次路线斗争的历史经验告诉我们、修正主义路线的头子，总是利用经验主义者理论上的无知。 来制造混乱，以售其奸的。经验主义者由于他们的实践带有很大的盲目性,所以在复杂的路线斗争中，很容易被修正主义在理论上制造的混乱搞得晕头转向，甚至被利用为他们摇旗呐喊。"},{"type":"paragraph","text":"经验主义又是我们贯彻执行党的基本路线的一大障碍。同志们"},{"type":"paragraph","text":"一 26 —说，社会主叉社会是衰亡誉的资本主义与生长着的共产主义此斗争的历史时期，我们的任务，是促使衰亡著的资本主义更快地衰亡，促进生长著的共产主义更快地生长，逐步造成使资产阶级既不能存在，也不能再产生的条件。这欢必须坚持党的基本路线，整持无产阶级专欢下的维续革命，坚持对资产阶须实行全专政。修正主义要复辟资本主义，必然要反对党的基本路线，反对地续革命，反对无产阶级专政。而经验主义者不学习革命理论，不认识社会主又社会的特点，不懂费无产阶级专政的历史任务，他们往往只看到在社会主义这个历史阶段存在资产阶硬法权的必然性，看不到对资产阶级法权在无产阶级专改下加以限制的必要性和重要性。因此，在执行党的各项具体政策时，就会把党的基本路线抛在一边，营常是“言不及义，好行小惠”，批判了“三自一包”，又楼“五定一奖”，批判了物质刺激，又携“物资鼓”。对无产阶级文化大革奇以来出现的有利于消灭三大差别，限制资产阶级法权的社会主义新生事物，这也不顺眼，那也看不惯，评头品足，百般抗副。这些都说明有了经验主义，不掌理马克思主义，不能贯彻执行觉的蒸本路线，就不能真正落实无产阶级专政的各项任务。大家强调指出，经验主义是当前深入学习无产阶级专政理论的大微。同志们说，毛主席淳诗告诚我们，一定要把无产阶级专政的理论学懂弄通，“这个同题不搞清楚，就会变修正主义。”这就常明确地指出了这次学习无产阶级专政理论的运动，是具有重大现实意义和深远历史意义的。而有经验主义的人，否认“思想上政治上的路线正确与否是决定一切的”这个真理，不懂得“没有革命的理论，就不会有革命的运动。”你说学习重要，他说“凭现有的经-25-验也可以对付一阵子”，你说要认真读点马到的书。他说“选水不解近满”。大家说，经稳主义不破除，马列主义就学不进，停正主义就斗不例，就不能实现对资产除级的全留的专致。我但一定要充分认识经验主义的严重危害性，坚决规经验主义及掉。通过讨论，到会的同志清楚地认识到，要被除经验主义，就要福做到毛主席教导的部林，“有工作经验的人，要向理论方面学习。福要认真读书，然后才可以使经验告上条理性、综合性，上升成为理论，然后才可以不把局都经驶误认为即是普追真理，才可不犯经检主义的错误。”网也们说，只要认其看书，扎扎实实地等起来，就会知道自己过去懂得大少，看清自己那一点点经验是多么淡薄，就越发患列学习无产阶级专政理论的极增重要和破险经稳主义的要。参加讨论会的许多领导同志还说，毛主房历未重栈与克愚主义理论的学习，特别是在党的第十次路线乎争中，毛主客对看书学习作这多次指示，我们应该间问自己：九层二中全会至今快五年了，毛主席提出的、党中央规定的马列落作，真正学懂的有多少？面对这个间题，客要我们深思、猛醒。大家一致表示：在当前学习无产阶级专歌理论的运动中，我们一定要刻著学习，加紧工作，不但对农业学大寨“五年行不行”的卷要答好，对九届二中全会以后五年来学习理论的卷更要答好。一定要带头学好无产阶级专改理论，带头限制资产阶级法权，带头做无产阶级专政下继续革命的先锋找士。"}],"authors":["中共辽宁省委","辽宁日报","辽宁省革命委员会宣传组"],"dates":[{"year":1975,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":13,"page_end":15},"tags":[{"name":"毛远新","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fad8037454"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
