art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"德各界人士强烈反对极右势力","authors":["刘钢"],"parts":[{"type":"paragraph","text":"德国北威州政府在15日举行的会议上通过了打击极右势力的一揽子措施，其中包括将警察、司法、学校、宪法保卫局和青年工作团体等各方的力量联合起来，共同制止极右思潮的蔓延。该州内政部长弗里茨·贝伦斯说：“我们要清楚地表明，在北威州绝不允许极右分子胡作非为。"},{"type":"paragraph","text":"据将于16日出版的《南德意志报》报道，德国联邦国防军陆军总监赫尔穆特·维尔曼已致信各部队的指挥官，要求他们采取有力措施以制止军队中极右势力制造事端。他强调说，“极右势力在部队中不能有市场”，对他们的打击必须“迅速而果断”。德国文化和宗教界也对极右势力表示憎恶。德国福音教会主席团主席曼弗雷德·科克在接受媒体采访时说，要对青少年进行反极右的教育，而且应从小学开始。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec37f7e52f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
