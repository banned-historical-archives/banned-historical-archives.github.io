<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"chuanxinlu1","name":"十年文革中首长讲话传信录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"陈伯达给上海工人电——直送上海安亭车站","parts":[{"type":"title","text":"248.陈伯达给上海工人电——直送上海安亭车站"},{"type":"paragraph","text":"(1966年11月12日)"},{"type":"paragraph","text":"工人同志们：十日夜我们听说你们有几千人要求来北京，在安亭同铁路管理局争执不下，我们打了个电报给华东局韩哲一同志，请他们劝你们回上海，就地解决问题，以免影响本单位的生产任务和京沪铁路运输。刚听到消息有部分工人已经回去，这样做就是很好的，很对，很对。但据说还有些工人同志还是留在车站，不愿意回去。我们认为工人闹文化革命是需要的，但是必须紧紧牢记毛主席和党中央再三强调的“抓革命，促生产”的指示，坚守生产岗位，把生产搞好，完成国家计划。"},{"type":"paragraph","text":"毛主席经常告诉我们大道理管小道理，小道理服从大道理，搞好生产这是大道理。我们的国家是伟大的社会主义国家，是无产阶级专政的伟大国家，全世界的一切人在注视我们，注视我们的活动，注视我们国家经济发展动态。工人同志是为我们国家争光的先锋队，时时刻刻都不能忘记搞好生产这个大道理。如果你们不是在业余时间搞革命，中断生产，停止生产，那么你们的文化大革命也不会搞好的。并且在停止生产的情况下，即使有多少道理，有这样那样的道理，也都站不住脚了，因为你们忘记了最重要的道理。"},{"type":"paragraph","text":"工人同志们，我们的行动时时刻刻都要注意对社会、对国际的影响。时时刻刻都要顾全大局，时时刻刻都要顾全整个工人阶级的大局。我们绝对绝对不能因为一部分的利益，因为一部人意气用事而损害全国全局的利益，损害我们伟大祖国的威望，即使是小小的损害也是不好的。事实上，你们这次的行动，不但影响本单位的生产，而且大大影响全国的交通，这是一个非常大的事件，希望你们现在立即改正，立即回到上海去，有问题就地解决，中央文化革命小组派张春桥同志立即会见你们，你们有意见可以和他当面商量。"},{"type":"paragraph","text":"这是我们再三再三考虑才发出的电报，我们热烈希望你们接受我们的意见。向你们致以无产阶级的最高敬礼。"},{"type":"paragraph","text":"陈伯达"},{"type":"paragraph","text":"一九六六年十一月十二日(十二时)"}],"authors":["陈伯达"],"dates":[{"year":1966,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":404,"page_end":405,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bb9ac5b04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
