" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji1","name":"毛泽东全集第1卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"五古·咏指甲花","alias":"","parts":[{"type":"paragraph","text":"五古·咏指甲花"},{"type":"paragraph","text":"（1907年）百花皆竞春，指甲独静眠。春季叶始生，炎夏花正鲜。叶小枝又弱，种类多且妍。万草被日出，惟婢傲火天。"},{"type":"paragraph","text":"渊明爱逸菊2，"},{"type":"paragraph","text":"[1]毛泽东少年时在外婆家唐家，到附近的保安寺游玩、赏花时，吟得此诗。这首诗咏花言志，显露出毛泽东坚韧非凡的志趣和精神境界。这首诗在写作技巧上相当纯熟，表明少年毛泽东的诗词创作已有较厚的文字功底。指甲花，学名凤仙花。一年生草本植物，夏季开花，品种颇多，可供观赏，花与种子均可入药，花捣碎可染指甲，故名指甲花。"},{"type":"paragraph","text":"[2]渊明，即陶渊明。渊明爱逸菊，陶渊明诗中一再写到菊，《饮酒》（其五）“采菊东篱下，悠然见南山”，即为其名句。逸，隐逸。隐逸者，隐居之士。菊花在许多花草枯萎之时独吐幽芳，如同隐逸之士不愿与统治者同流合污，隐居避世。敦颐爱青莲川。我独爱指甲，"},{"type":"paragraph","text":"取其志更坚。"},{"type":"paragraph","text":"[1]敦颐，即周敦颐（1017一1073)，北宋哲学家。字茂叔，道州营道（今湖南道县）人。曾官大理寺丞、国子博士。因筑室庐山莲花峰下的小溪上，取营道故居濂溪以名之，后人遂称濂溪先生。周敦颐爱青莲，著有《爱莲说》一文，文中赞美莲：“予独爱莲之出淤泥而不染，濯清涟而不妖，中通外直，不蔓不枝，香远益清，亭亭净植，可远观而不可亵玩焉。”又说：“莲，花之君子者也。”"}],"authors":["毛泽东"],"dates":[{"year":1907}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":79,"page_end":80},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df6debad22"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
