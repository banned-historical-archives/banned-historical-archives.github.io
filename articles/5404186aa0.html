<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖北省委关于“五反”中对工商户的处理等几个问题的指示","authors":[],"dates":[{"year":1952,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"湖北省委关于“五反”中对工商户的处理等几个问题的指示","type":"title"},{"text":"各地“五反”除个别城市外大体皆已结束，多数总结报告已送省委，少数还未送来，我们从已有之报告中看到有以下几个问题，请各地、市委注意。","type":"paragraph"},{"text":"一、关于严重违法户和完全违法户之规定，各地在报告中均未详加说明，很难看出是否处理恰当。中央在争取“五反”斗争胜利结束的指示中，对于工商户分类标准规定：“应以其违法所得数目和违法情节作为同等重要的条件，二者应结合起来加以评定。”对于大户的处理规定：“一般是根据其违法数目和情节，更重要的是根据其政治条件。”这个规定是很重要的，各地是否认真依照此一规定进行处理，或有否偏向，应进行检查，力求作得正确。","type":"paragraph"},{"text":"二、关于补税退财问题，也看不出是否依照中央指示的“退现款、折公股、打欠条”三种办法处理。如果有未依此原则处理者，有因全部退现款而影响到该工商业者不能经营，于人民不利者，应即设法用贷款或其他办法予以补救。如正在追退现款，违法的工商业者困难不能全部交纳者，即应依照中央指示，按五、三、二比例处理。","type":"paragraph"},{"text":"三、各地通过“五反”运动是很好发展工会会员、党团员及提拔培养干部的机会，这一机会不应错过，应该认真地通过建设阶段，整顿与扩大工会组织，在工人店员中发展一批经过考验，联系群众，真正的积极分子入党入团。对于这一问题有些地方似作得不够，应该注意解决。","type":"paragraph"},{"text":"四、“五反”后正当经营的工商业者，得到保护鼓励，已开始积极经营，使各城市出现了工商业的上升气象，但遭到打击的一部分工商业者，目前仍有不少不敢大胆经营，应对这些工商业者进行宣传，说明今后只要守法，在工人监督下进行合法正当的经营，政府即将坚决保护，即会有发展前途，以解除其顾虑，鼓励其大胆地进行正当的工商业活动。这样对恢复与繁荣市场、加强城乡交流有利。","type":"paragraph"},{"text":"（本文源自：中共湖北省委党史研究室、中共湖北省委统战部编 《中国资本主义工商业的社会主义改造 湖北卷》  出版社：中共党史出版社  出版日期：1993年）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5404186aa0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
