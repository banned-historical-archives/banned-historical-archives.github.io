"万聪智","杜心莲","河南农学院","王国瑞","石靖华","谭汉坤","贺钟麟"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“肃反是严重的违法乱纪”","type":"title"},{"text":"河南农学院贺钟麟杜心莲谭汉坤王国瑞石靖华万聪智","type":"authors"},{"text":"贺钟麟（植保教研组副教授）：肃反是严重的违法乱纪。","type":"paragraph"},{"text":"杜心莲（植物教研组讲师）：在肃反中打人是有领导、有计划进行的，是严重的违法乱纪。","type":"paragraph"},{"text":"谭汉坤（理化教研组助教）：我亲身体会到，肃反、镇反与日本屠杀中国人民和国民党对待进步人士的迫害都是一样的。","type":"paragraph"},{"text":"王国瑞（职员）：肃反打人是违法乱纪。为啥打人的都是党员？为什么在整风运动中不叫别人说话，为啥不该整死的人给整死了？大家想想，不该打你，而打你一顿你感到如何？","type":"paragraph"},{"text":"肃反是党领导的，违法乱纪的行为院党委应负责任。属于组织的，要求中共中央处理，属于个人的要依法惩办；否则，本人决不答应，闹到中央，本人也不怕。","type":"paragraph"},{"text":"肃反是违法乱纪。共产党是惨无人道。农学院是人间地狱。要召开肃反争鸣大会，把大苦主排在前边，小苦主排在后边，让他们（注：指肃反对象）将苦水都倒出来。大家要明确：肃反中的坏根是院党委书记。他们一点人性也没有。","type":"paragraph"},{"text":"石靖华（林57级学生）：肃反是违法乱纪，党委都是违法乱纪分子。肃反打人是领导布置的，不打人者要被斗争。河南肃反搞得最糟。肃反中受迫害者！自己不鸣，叫谁给你们鸣？","type":"paragraph"},{"text":"受过委屈的人，为什么还那样软弱？应该坚强起来斗争！","type":"paragraph"},{"text":"咱们学校的事情不要向上控告，因为告也不解决问题，只有先下手干，等事闹出来，问题就好解决了。","type":"paragraph"},{"text":"万聪智（林59级学生）：肃反是违法乱纪，我不能再接近党员干部了。不然，再来个运动，他还要用棍※我。河南农学院不象话，人的生命没保障。今后只要看到第二次肃反就跑。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfa7a2e3f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
