art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国人民将更高举起毛泽东思想红旗","authors":[],"parts":[{"type":"paragraph","text":"新华社二十一日讯 中国共产党第九次全国代表大会收到了圭亚那马克思列宁主义小组的贺电，全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"我们无比欢欣地得悉中国共产党第九次全国代表大会的召开。这次代表大会是在毛主席亲自发动和领导的文化大革命取得辉煌胜利的时候召开的，它具有重大的历史意义。同时，中国共产党第九次全国代表大会确凿表明刘少奇修正主义叛徒集团的彻底垮台，有力地增强了革命者反对修正主义、帝国主义和新老殖民主义斗争的决心。"},{"type":"paragraph","text":"在毛泽东主席“既要革命，就要有一个革命党”这一教导的鼓舞下，圭亚那的马克思列宁主义者已经组织起来，要在祖国的神圣土地上将革命斗争进行到底。我们坚信毛主席的教导：“社会主义制度终究要代替资本主义制度，这是一个不以人们自己的意志为转移的客观规律。不管反动派怎样企图阻止历史车轮的前进，革命或迟或早总会发生，并且将必然取得胜利。”"},{"type":"paragraph","text":"我们深信，世界各国人民的榜样——中国人民将更高地举起毛泽东思想红旗，在各个方面取得新的成就。"},{"type":"paragraph","text":"中国共产党第九次全国代表大会万岁！"},{"type":"paragraph","text":"中国共产党万岁！"},{"type":"paragraph","text":"圭亚那人民和中国人民之间的友谊万岁！"},{"type":"paragraph","text":"敬祝毛主席万寿无疆！"},{"type":"paragraph","text":"圭亚那马克思列宁主义小组"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45a482846b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
