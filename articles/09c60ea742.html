":[],"dates":[{"year":1967,"month":12,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在郊区农村无产阶级文化大革命胜利发展的大好形势下，嘉定县无产阶级革命派、贫下中农、红卫兵和革命干部，二十三日举行了“高举毛泽东思想伟大红旗，掀起今冬明春农村无产阶级文化大革命的新高潮誓师大会”。到会同志共表决心:一定要认真贯彻执行中共中央关于今冬明春农村文化大革命的指示，进一步搞好革命的大联合和革命的“三结合”，深入开展革命的大批判，搞好本单位的斗批改，把农村无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"在誓师大会上，到会同志共同回顾了一年多来农村无产阶级文化大革命的伟大历程，歌颂了毛主席革命路线的伟大胜利。"},{"type":"paragraph","text":"到会的广大贫下中农一致认为，中共中央发出的今冬明春农村文化大革命的指示，为我们指明了前进的方向，增添了无穷无尽的力量，这是对我们广大贫下中农最大的关怀，最大的信任，最大的鼓舞，最大的鞭策，最大的期望。我们保证坚决贯彻，做到条条落实，句句照办，字字照办。大家认为，为了贯彻执行党中央的指示，把农村无产阶级文化大革命进行到底，彻底肃清中国赫鲁晓夫和陈丕显、曹荻秋之流在农村散布的修正主义流毒，必须以“斗私，批修”为纲，以“老三篇”和毛主席的最新指示为武器，更深入更广泛地开展群众性的大学习、大批判，进一步大力办好毛泽东思想学习班。在举办学习班的同时，还应当大力提倡建立家庭学习小组，开展家庭斗私批修，让毛泽东思想占领一切阵地。"},{"type":"paragraph","text":"到会的同志认为，要坚决贯彻中共中央今冬明春农村文化大革命的指示，必须紧紧地掌握斗争大方向，把斗争矛头始终对准党内最大的一小撮走资派以及他们在本地区的代理人，对准叛徒、特务和没有改造好的地富反坏右分子，加强无产阶级专政，进一步搞好革命的大联合和革命的“三结合”，加强工农团结，提高革命警惕，严防一小撮阶级敌人的破坏和捣乱，确保革命的新秩序，确保文化大革命的顺利进行。"},{"type":"paragraph","text":"为了把农村无产阶级文化大革命进行到底，到会的同志认为，必须坚决听毛主席的话，贯彻“抓革命，促生产”的伟大方针，执行就地闹革命、业余闹革命、节约闹革命的原则，并以革命统帅生产，掀起冬修水利、田间管理、积肥的生产高潮，夺取革命、生产双胜利。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09c60ea742"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
