ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"先歼伪第一第六第八师后打美英军","alias":"","parts":[{"type":"paragraph","text":"先歼伪第一第六第八师后打美英军"},{"type":"paragraph","text":"（1950年10月26日）彭、邓，并告高："},{"type":"paragraph","text":"美二十四师、英二十七旅已在新安州一带渡过清川江，请令三十九军勿去龙山、宁边，暂时避开（如果可能的话）美英军，以免被其胶着，而应由泰川向云山及其以北方向前进寻伪一师作战，与四千军、三十八军配合，首先歼灭伪一、伪六、伪八等师，然后再打美英军。如伪一师与英美军在一起则暂时也不要打伪一师，待伪六、伪八歼灭后寻机再打该敌。如何，请按情况酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十六日五时"},{"type":"paragraph","text":"[1]彭、邓，指彭德怀、邓华，当时分别任中国人民志愿军司令员兼政治委员和副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]·高，指高岗，当时任东北军区司令员兼政治委员。[3]龙山，即龙山洞，位于平安北道宁边郡西南。[4]宁边，位于平安北道东南。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":298,"page_end":298},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15c130aa35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
