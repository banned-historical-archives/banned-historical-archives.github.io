tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"锦言集","authors":["北京部队学习毛主席著作积极分子代表大会宣传组"],"parts":[{"type":"paragraph","text":"有了毛泽东思想无往不胜，离开了毛泽东思想寸步难行。"},{"type":"paragraph","text":"心中升起红太阳，大风浪里不迷向，赤胆忠心永向党，斗私批修当闯将。"},{"type":"paragraph","text":"造“私”字的反，专“私”字的政，要从两条路线斗争中找问题，从灵魂深处找原因，从毛主席著作中找答案，到斗争实践中去检验。"},{"type":"paragraph","text":"思想上有私不亮，越盖越丑；思想上有私敢亮，越斗越红。"},{"type":"paragraph","text":"学习宝书斗私心，越斗越觉毛主席亲；对准私心斗得狠，跟随毛主席跟得紧。"},{"type":"paragraph","text":"一心为公，重于泰山，一心为私，轻于鸿毛。"},{"type":"paragraph","text":"以私斗私，越斗越私；以公斗私，才能立公。以修批修，越批越修；以公批修，才能批透。（北京部队学习毛主席著作积极分子代表大会宣传组供稿）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0bc8ddd70"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
