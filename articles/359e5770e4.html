art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"认真研究 搞好训练改革","authors":[],"parts":[{"type":"paragraph","text":"基础训练怎样才能做到多快好省？这几篇报道给我们提供了一个答案：要认真地研究和试验进行改革。从训练指导思想，到训练内容、训练编组、训练方法，凡是证明不符合实战要求的，都需要采取积极而稳妥的办法加以改革。"},{"type":"paragraph","text":"改革，就是破旧立新，除旧布新，这是客观的需要，但又不是件容易的事。多少年的轻车熟路走惯了，要踩出个新道道，不仅要作艰辛的探索，而且首先要冲破思想上的束缚。不克服因循守旧的思想，就不会有支持变革的胸怀，不打破本本主义的框子，就很难有带头创新的勇气。只有真正敞开了思想解放的大门，才会有深入实际，研究新课题的自觉性和扶植新事物的主动性。基础训练的各种改革之花，才能在众多的辛勤园丁的培育下得以遍地开放。"},{"type":"paragraph","text":"军事科学总是在改革中发展提高，我们的训练也要在改革中前进。邓小平同志最近指出：“现在军队沿用过去的经验是不行的，而这正是我们要努力解决的问题。”只要我们认真研究改革，把训练中的各种问题解决好，一个多快好省的训练新局面一定会出现。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"359e5770e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
