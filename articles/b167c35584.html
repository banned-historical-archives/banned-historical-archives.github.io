ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"在关于台湾情况的一份内部材料上的批语","alias":"","parts":[{"type":"paragraph","text":"在关于台湾情况的一份内部材料上的批语\""},{"type":"paragraph","text":"（1960年1月）各同志阅，退毛。"},{"type":"paragraph","text":"二很可看。"},{"type":"paragraph","text":"[1]本篇一写在1960年1月12日编印的这份内部材料的目录页上。在其中《蒋集团焦虑一九六O年日子难过》《元旦前后美又连续提出各种推行“两个中国”建议》《美特唐盛镐拉拢陈诚失败》3篇的篇名前，毛泽东加了着重号，并写了一个批语，即本篇二；本篇三、四均写在《蒋集团焦虑一九六年日子难过》一文中。"},{"type":"paragraph","text":"在关于台湾情况的一份内部材料上的批语"},{"type":"paragraph","text":"三这几句话，值得注意。"},{"type":"paragraph","text":"四极值注意。2"},{"type":"paragraph","text":"[1]《蒋集团焦虑一九六○年日子难过》一文中说，元旦前后，蒋集团上层分子和官方报纸纷纷评述1960年国际局势的趋向，语调十分低沉。其中属蒋经国系的台北《大华晚报》写道：“东西对立愈尖锐，情势愈紧张，对我们愈为有利；相反的，在和风荡漾、谈判频频的情况下，我们的处境便不免局促。”“在一连串的国际谈判中，我们的地位和权益可能被涉及”，这将“对我们构成心理上的困扰”。在这几句话旁，毛泽东加了着重号，并写了这一批语。"},{"type":"paragraph","text":"[2]《蒋集团焦虑一九六○年日子难过》一文中说，蒋集团恐惧难以继续窃据联合国席位。台湾有关国民党报纸认为，“在未来五年至十年内，非洲大陆可能出现三十个左右的独立国家”，非洲在联合国的席位可能超过拉丁美洲，而目前非洲国家中同蒋集团维持外交关系的只有3个，同大陆有外交关系的却占多数。因此，蒋集团对非洲的外交，“包含有极大的危险性”。在这段话旁，毛泽东加了着重号，并写了这一批语。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":125,"page_end":126},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b167c35584"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
