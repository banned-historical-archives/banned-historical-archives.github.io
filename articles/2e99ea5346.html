级掌好权用好权《人民日报》在刊登本报和《解放日报》“六·二四”社论时加了编者按","authors":[],"dates":[{"year":1967,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十五日电　《人民日报》二十六日在刊登《文汇报》、《解放日报》社论时加的按语，全文如下:"},{"type":"paragraph","text":"《山东省革命委员会关于认真转变作风的若干规定》和《红旗》杂志评论员文章《防止资产阶级思想侵蚀》发表之后，上海市革命委员会立即召开扩大会议，认真讨论，并作了决定；《文汇报》和《解放日报》为此发表了社论。这种雷厉风行的革命精神，值得提倡。"},{"type":"paragraph","text":"《文汇报》社论指出:“无产阶级革命派掌了权以后，资产阶级复辟和无产阶级反复辟的斗争依然存在。这场斗争的主要特点就是资产阶级对无产阶级革命派，特别是对领导核心，进行腐蚀侵袭，搞‘和平演变’。”在这种形势下，各级革命委员会，各个革命群众组织的负责人，都面临着新的严峻考验。"},{"type":"paragraph","text":"必须懂得，无产阶级革命派当权以后，地位发生了变化，有些同志头脑里的资产阶级思想、小资产阶级思想很容易滋长和发作，而社会上的资产阶级、小资产阶级的灰尘也迎面扑来。我们必须高度自觉，不断地用毛主席交给我们的武器，改造自己的思想，坚决抵制一切剥削阶级的思想作风。在一九四九年，全国胜利的前夕，毛主席就教导我们，必须高度警惕资产阶级糖衣炮弹的攻击。无产阶级革命派同志们要牢记毛主席的这个教导。争权夺利，铺张浪费，腐化堕落，大少爷作风，就是资产阶级的糖衣炮弹。我们只有在自己头脑中牢牢树立毛泽东思想的绝对权威，才能不仅在党内一小撮走资本主义道路当权派的镇压下打胜仗，而且能在资产阶级糖衣炮弹面前打胜仗。"},{"type":"paragraph","text":"正如《解放日报》社论所指出的，当权的同志要密切联系群众，“必须发动群众对各级革命委员会成员和各级革命群众组织负责人进行监督。”用伟大的毛泽东思想武装起来的亿万群众的自下而上的革命监督，这是我们防止出修正主义的最可靠的保证。凡是符合毛泽东思想的，就拥护，就照办，凡是不符合毛泽东思想的，就反对，就抵制。这个极其重要的原则，在无产阶级革命派掌权以后，也必须坚决执行，而绝不能违反。当权的同志自己的一切不符合毛泽东思想的言论和行动，都应当作自我批评，应当切实改正，并且应当允许和欢迎别人批评、别人抵制、别人反对，允许和欢迎别人监督。只有这样，才能及时改正错误，不犯大错误，不犯方向路线错误，才能不蜕化变质，真正为无产阶级掌好权，用好权。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e99ea5346"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
