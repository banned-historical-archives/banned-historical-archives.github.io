意见给华东公安部的指示","authors":[],"dates":[{"year":1950,"month":7}],"is_range_date":false,"parts":[{"text":"公安部对江苏常熟练塘区一贯道案处理意见给华东公安部的指示","type":"title"},{"text":"关于常熟县练塘区一贯道惨害小孩及被群众击毙该道7人案的调查报告阅悉，我们有以下几点意见：","type":"paragraph"},{"text":"（一）此事件极其严重，但该地领导上表现处于被动，事前对情况不够了解，事后对政策掌握上也不够，有些单纯迁就群众现象。","type":"appellation"},{"text":"（二）该地群众反会道门热情很高，应即乘热广泛宣传与揭露一贯道罪行，并应枪决几个首要分子，以打击其凶焰，宣布其非法，号召登记，进行取缔。","type":"paragraph"},{"text":"（三）群众既已自发行动，我们应很好掌握领导，处理善后，稳定和争取瓦解广大道徒，孤立和打击首要，同时对干部群众应进行政策宣传和教育，以便有领导有把握的予以取缔。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76707292f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
