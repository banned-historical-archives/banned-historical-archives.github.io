art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掀起学习毛泽东著作热潮全国学代会胜利闭幕","authors":[],"parts":[{"type":"paragraph","text":"据新华社10日讯 中华全国学生第十七届代表大会，历时七天，今天下午胜利闭幕。大会号召：全国学生要认清共产主义远大前途，以毛泽东思想武装自己，树立无产阶级世界观，培养共产主义的劳动态度、学习态度和共产主义的道德品质。要坚持参加体力劳动，刻苦读书，开展科学研究。为社会主义、共产主义事业作出有益的贡献。"},{"type":"paragraph","text":"共青团中央第一书记胡耀邦今天在会上作了题为“用毛泽东思想武装起来”的报告。胡耀邦要求广大青年学生积极学习毛泽东思想。他说，我们之所以突出地提出要学习毛泽东思想，因为它是我国胜利地进行社会主义革命和社会主义建设的指针，它是马克思列宁主义在新的历史条件下的重大发展。他说，学习毛泽东思想，是关系到培养青年成为共产主义事业接班人的最根本的问题，它对于提高青年的政治思想觉悟，树立无产阶级世界观和一生的健全发展都将起着伟大的决定性的作用。因此，广大学生应当把学习毛泽东思想作为自己的重大的政治任务，掀起一个学习毛泽东著作的热潮，下决心用毛泽东思想武装自己。"},{"type":"paragraph","text":"胡耀邦还指出：广大青年必须要以毛泽东思想为武器，来认识和分析当前国际国内的一些重大问题。他说，用毛泽东思想来认识和分析当前的国际局势、我国的社会主义建设问题、党的教育方针的问题，以及用来认识分析自己，是有重大的意义的。"},{"type":"paragraph","text":"胡耀邦勉励同学们不要辜负党和祖国的期望，努力攀登科学文化的高峰，做又红又专的毛泽东的好学生。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdada15ed7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
