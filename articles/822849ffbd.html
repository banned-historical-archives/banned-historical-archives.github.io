tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"宫本修正主义集团帮凶嘴脸大暴露","authors":[],"parts":[{"type":"paragraph","text":"据新华社东京十日电 日共宫本修正主义集团公然为日本佐藤反动政府残酷镇压青年学生的反美爱国正义斗争喝采，赤裸裸地暴露了它充当美日反动派镇压革命人民的帮凶嘴脸。"},{"type":"paragraph","text":"日本佐藤政府杀害了山崎博昭以后，由于十分害怕国内外舆论的谴责，极力进行抵赖。它们竟然颠倒是非，栽赃诬陷，无耻地把日本警察亲手干的罪恶勾当，说成是参加抗议斗争的青年学生自己引起的“车祸”。"},{"type":"paragraph","text":"八日晚间，日共宫本修正主义集团也跳了出来，恶毒谩骂日本学生的反美爱国正义斗争。宫本集团的“统一战线部部长”发表声明，卑鄙无耻地把这一事件说成是武装警察同“托洛茨基分子”、同“反革命分子”之间的“冲突”。这就再一次暴露了宫本集团同美帝和日本佐藤政府穿的是一条连裆裤，充当了为美日反动派效劳的叛徒角色。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"822849ffbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
