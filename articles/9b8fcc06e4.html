s":[{"year":1972,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英同志、李德生同志会见罗马尼亚军官休假组"},{"type":"paragraph","text":"新华社一九七二年十月二日讯　中共中央政治局委员、中共中央军委副主席叶剑英，中共中央政治局候补委员、中国人民解放军总政治部主任李德生，今天晚上会见了由罗马尼亚武装部队总后勤部部长康斯坦丁内斯库·彼得—科尔内利乌中将率领的罗马尼亚军官休假组全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，罗马尼亚驻中国大使格夫里列斯库和夫人，大使馆武官扬·杜贝什迪亚努上校和夫人在座。"},{"type":"paragraph","text":"中国人民解放军副总参谋长王新亭，总后勤部副部长张令彬，有关方面负责人和工作人员柴成文、甘迈、王明修、于志超、周明德、丁少云，中国驻罗马尼亚大使馆武官林千，会见时也在座。"},{"type":"paragraph","text":"会见后，李德生主任设宴招待了罗马尼亚同志。（附图片）"},{"type":"paragraph","text":"图为会见时合影。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b8fcc06e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
