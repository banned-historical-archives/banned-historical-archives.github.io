ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"印发王青林关于山东日照县农村情况的来信的批语","alias":"","parts":[{"type":"paragraph","text":"印发王青林关于山东日照县农村情况的"},{"type":"paragraph","text":"来信的批语"},{"type":"paragraph","text":"（1959年7月13日）印发各同志参考。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十三日"},{"type":"paragraph","text":"[1]中共中央办公厅干部王青林1959年7月4日的这一来信说，山东省日照县去年的“共产风”刮得不大，大跃进使这个县的面貌焕然一新。去年农业大丰收，家禽家畜也大量增加。目前群众的生产劲头很足，已掀起了夏季生产的高潮。这里有一个特点，就是每个生产小队都经营了不少菜园地，充分供应社员的需要。夏收后，绝大部分生产小队实行伙食供给制，食堂没有垮台，但也有个别的办得不够好。根据县、社、队的干部反映，这里还存在以下几个问题：（一）没有认真执行中央关于自留地的指示，直到现在还没有分给社员自留地。（二）夏季口粮还未全部分配到户。（三）群众养猪的积极性很高，但对长期吃不上肉不满意。（四）县、社干部认为现在的文件、会议太多，没有时间下基层，学习时间很少，无法提高。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":186,"page_end":186},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7c8450b6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
