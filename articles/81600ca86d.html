ear":1974,"month":2,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:在各条战线上，到处都有一大批经过无产阶级文化大革命战斗洗礼的新干部和革命青年，他们为了继承老一辈革命家开创的马克思列宁主义的革命事业，朝气蓬勃、生龙活虎地战斗在自己的岗位上，看了叫人打心眼里高兴。但是，我们队伍中总有那么一些同志，他们瞧不起“儿童团”，对青年、对新干部这也看不惯，那也信不过，这是十分错误的。我们应当以深厚的无产阶级感情，看到他们的本质和主流，发扬他们“初生之犊不怕虎”、敢想敢说敢干的革命精神，发挥他们好学上进、敏锐热情的特长，并为他们创造春风化雨的有利条件。这样，我们的无产阶级革命事业就会更加兴旺发达，共产主义的一代新人就会更加茁壮地成长!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81600ca86d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
