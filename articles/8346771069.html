<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工农兵挥起红画笔　纵情歌颂毛主席“红太阳画展”元旦在沪正式揭幕伟大领袖毛主席领导下所取得的光辉业绩　通过评选展出的三百多幅作品，集中反映了中国人民在","authors":[],"dates":[{"year":1967,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　锣鼓阵阵迎新岁，万方高歌东方红。在无产阶级文化大革命取得决定性胜利，形势空前大好的时刻，一个以工农兵作者为主的、歌颂我们心中最红最红的红太阳毛主席的大型美术展览——“红太阳画展”，将于一九六八年元旦正式在上海美术展览馆展出。这是毛主席革命文艺路线的又一辉煌硕果。"},{"type":"paragraph","text":"“红太阳画展”是由全市工厂、农村、部队和学校等三十四个基层单位的革命群众组织倡议筹办的。画展从六月底开始筹备，半年来，得到全市广大无产阶级革命派及红卫兵小将的热情支持。他们怀着对最最敬爱的伟大领袖毛主席和光焰无际的毛泽东思想的无限热爱、无限信仰、无限崇拜、无限忠诚的心情，挥起红画笔，用各种艺术形式描绘了伟大领袖毛主席的光辉形象，表达了无产阶级革命派对我们心中最红最红的红太阳毛主席的一片丹心。有个钢铁厂的工人们听到要举办“红太阳画展”，兴奋极了，他们说:爹亲娘亲不如毛主席亲，我们一定要把毛主席和我们炼钢工人心贴心的激动人心的场面画出来。大家选定了当年毛主席视察上钢一厂作为主题，为了逼真地重现这一无比幸福的时刻，他们多次到一厂去访问。画成以后，他们兴高采烈地敲锣打鼓，把画送到“红太阳画展”。毛主席一九五七年视察国棉一厂时观看大字报的情景，也形象地再现在画面上。同反革命修正主义文艺黑线斗争中杀出来的广大工农兵业余美术作者，显示无比智慧和艺术创作才能，利用业余时间，一笔一笔，把对毛主席的深厚感情全部倾注在画面上。"},{"type":"paragraph","text":"画展展出的三百多幅作品是从二百九十多个单位送来的九百多幅作品中评选出来的，其中绝大部分是工农兵的作品。这些画以澎湃的激情，宏伟的场面，反映了中国人民在伟大领袖毛主席的领导下所取得的光辉业绩。《红色政权扎下万年根》、《长征组画》、《自己动手，丰衣足食》等画，描述了毛主席领导全国人民战胜国内外反动派的革命斗争史实；《我们的心是连在一起的》、《毛泽东——当代的列宁》、《红太阳照亮了黑非洲》等画，突出地表现了世界人民热爱毛主席的真挚感情。反映由毛主席亲自发动和亲自领导的无产阶级文化大革命的作品在展览会中占绝大比重，其中有歌颂毛主席张大字报的《炮打司令部》，有反映毛主席支持红卫兵的《毛主席和红卫兵在一起》、《跟着毛主席在大风大浪中前进》，还有赞扬在战无不胜的毛泽东思想指引下取得伟大胜利的一月革命的，如《安亭风暴》、《革命委员会好》，等等。这些作品生动地说明了毛主席是当代最伟大的导师；生动地说明了七亿人民，紧跟毛主席的伟大战略部署，从胜利走向胜利的战斗历程。"},{"type":"paragraph","text":"“红太阳画展”除了集中在上海美术展览馆展出外，还有部分作品分别在奉贤、崇明等地展出。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\12\\67cv010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(上图为“红太阳画展”作品之一)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8346771069"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
