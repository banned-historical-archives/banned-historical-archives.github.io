script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习毛主席关于批孔的论述批判复辟倒退的谬论","authors":[],"dates":[{"year":1976,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"市财政局四分局青年学习小组认真学习毛主席关于批孔的有关论述，运用马克思主义的观点，把古代投降派宋江与现代投降派，批孔与批判党内不肯改悔的走资派的修正主义谬论结合起来。追根寻源，弄清孔孟之道是修正主义的一个重要思想根源。"},{"type":"paragraph","text":"他们批判孔老二的“克己复礼”的反动政治纲领，批判党内不肯改悔的走资派鼓吹的“三项指示为纲”的修正主义纲领，看到古今投降派在政治上搞复辟，搞反攻倒算是一致的；批判孔老二的“正名论”，批判党内不肯改悔的走资派否定社会主义新生事物，打击社会主义新生力量的谬论，看到古今投降派在扼杀新生事物，打击新生力量，扶植反动势力上也是一样的；批判孔老二的“中庸之道”的反动哲学，批判党内不肯改悔的走资派大搞折中主义、诡辩论和他们宣扬的唯心主义和形而上学，看到古今投降派在思想路线上也是一脉相承的；批判孔老二的“学而优则仕”的反动教育观，批判党内不肯改悔的走资派否定无产阶级教育革命，鼓吹读书做官，反对教育、科研为无产阶级政治服务，反对教育、科研同三大革命运动实践相结合的奇谈怪论，看到古今投降派在教育思想方面也是一模一样的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0aafbc963"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
