<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一块牌子涂得金光闪闪，还是要褪色；毛主席的话记在心里，　永远放金光。长征农场的同志们认识到:应该——为革命节约每一分钱","authors":["朱扬清"],"dates":[{"year":1969,"month":1,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们长征农场革命委员会正式批准成立了。喜讯传来，我们政宣组的几个人乐得蹦了起来。我们想，这是一件大事情呀，一定要把场革委会这块牌子搞得漂亮一些。于是，你一语我一言地议论开了，最后决定:“上海市长征农场革命委员会”这几个字边框要雕刻出来，涂上金粉，做成立体，中间涂上红漆，这样，金光闪闪，红彤彤的，一定很漂亮。"},{"type":"paragraph","text":"我们请人写好了字，雕刻了边框，又去请来漆工老师傅涂漆涂金粉。正在七手八脚忙碌的时候，场革委会第一召集人多书平同志走了进来，看了看场革委会的牌子，说:“呵，这么大!”又听到漆工老师傅说要金粉，立即问明了情况，收敛了笑容，严肃地说:“这是那一家的革委会牌子?我们无产阶级革命派是‘要节约闹革命’的，是以勤俭节约为荣的，怎么能搞铺张浪费!”"},{"type":"paragraph","text":"我们心里不安起来，一个人也没有讲话。老多看了看，沉思了一会，拿出红彤彤的《毛主席语录》，翻到“勤俭建国”一节，说:“来，我们一同请教毛主席吧!毛主席是这样说的:‘任何地方必须十分爱惜人力物力，决不可只顾一时，滥用浪费。’‘财政的支出，应该根据节省的方针。’同志们，我们天天说要按照毛主席的指示办事，可是，一碰到具体问题怎么就忘了呢?”"},{"type":"paragraph","text":"老多这么一说，大家都认为，我们这样做，不符合毛主席的教导，并批判了讲排场、摆阔气的资产阶级思想，决定把涂金粉改为涂黄漆。这时，老多笑了笑，语重心长地说:“我们一定要永远牢记毛主席的教导:‘我们作计划、办事、想问题，都要从我国有六亿人口这一点出发，千万不要忘记这一点。’我们应该在任何时候都要为革命节省一寸布、一两粮、一分钱啊!”"},{"type":"paragraph","text":"上海市长征农场革委会政宣组　朱扬清"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54d56a3364"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
