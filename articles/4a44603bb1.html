art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席缔造了伟大光荣正确的党","authors":["南京部队“济南第一团”党委〖HH/换行〗DW：南京部队"],"parts":[{"type":"paragraph","text":"我们在党的诞生地上海执行支左任务的“济南第一团”全体指战员，听到党的“九大”第二个新闻公报发表以后，欢喜若狂，热血沸腾，千遍万遍地高呼：“中国共产党万岁！”“战无不胜的毛泽东思想万岁！”"},{"type":"paragraph","text":"“伟大领袖毛主席万岁！万万岁！”"},{"type":"paragraph","text":"公报中说：“只有懂得党的历史，才能懂得毛主席是怎样继承、捍卫和发展了马克思列宁主义的，才能懂得毛主席的伟大，才能懂得毛泽东思想的伟大，才能懂得毛主席的无产阶级革命路线的正确。”在狂欢之夜，我们党委的同志带领大家，高举伟大领袖毛主席的画像和《毛主席语录》，来到了中国共产党第一次全国代表大会的会址，认真学习党的历史。是毛主席以伟大的马克思主义天才，缔造了中国共产党；是毛泽东思想的哺育，使我们党发展壮大，领导全国人民推翻了三座大山，使党成为强大的中华人民共和国的领导者；是毛主席的无产阶级专政条件下继续革命的光辉学说，照亮了我们将社会主义革命进行到底，并通向共产主义的道路。回顾党的历史，我们更深刻地懂得了毛主席的英明伟大，懂得了毛泽东思想威力无比，懂得了毛主席革命路线英明正确。"},{"type":"paragraph","text":"在会址前，我们还回顾了“济南第一团”在毛泽东思想哺育下不断前进的光辉历程。在毛主席的革命路线指引下，我们从胜利走向胜利。一九四八年，我们同兄弟部队一道，攻克国民党反动派十万重兵防守的济南城，活捉了匪首王耀武，获得中央军委授予的“济南第一团”的荣誉称号。在全国解放后，我们遵照毛主席无产阶级专政条件下继续革命的伟大学说，紧跟毛主席不断革命，彻底革命，取得了一个又一个的胜利。通过回顾我团的成长史，我们深切感到：千胜利，万胜利，归根到底是战无不胜的毛泽东思想的伟大胜利，是毛主席革命路线的伟大胜利。紧跟毛主席就是方向，就是胜利。"},{"type":"paragraph","text":"我们在党的第一次全国代表大会会址前，一遍又一遍地朗读毛主席的最新指示：“我们希望这一次代表大会，能够开成一个团结的大会，胜利的大会，大会以后，在全国取得更大的胜利。”我们向伟大领袖毛主席庄严宣誓：毛主席啊，毛主席！我们一定要把您的无产阶级专政条件下继续革命的教导化为灵魂，落实您制定的各项无产阶级政策，坚决完成无产阶级司令部提出的各项战斗任务，“抓革命，促生产，促工作，促战备”，随时准备反击帝、修、反的挑衅，夺取更大的胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a44603bb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
