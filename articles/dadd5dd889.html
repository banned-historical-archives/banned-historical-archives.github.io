<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"河北省部分回乡工农兵大学生和中专毕业生  用铁的事实回击右倾翻案风","authors":[],"dates":[{"year":1976,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河北省部分回乡工农兵大学生和中专毕业生"},{"type":"paragraph","text":"用铁的事实回击右倾翻案风"},{"type":"paragraph","text":"据新华社石家庄电　在最近召开的河北省上山下乡知识青年先进集体、先进个人代表会上，许多回乡务农的工农兵大学生和中专毕业生，用自己的切身体会和在实践中取得的成绩，热情歌颂毛主席的无产阶级教育路线，畅谈教育革命的大好形势，批判了教育界的种种奇谈怪论。他们决心以阶级斗争为纲，保卫和发展文化大革命的胜利成果，在与工农相结合的光明大道上坚定地走下去。"},{"type":"paragraph","text":"围场县兰旗卡伦公社锦善堂大队党支部副书记邓琳，是一九六八年从天津到锦善堂大队插队落户的知识青年。一九七二年，当地贫下中农推荐她到河北师范大学学习。临行时，老支书和贫下中农一遍又一遍地嘱咐她：“进了城市不要忘了咱锦善堂，上了大学不要忘了咱贫下中农。”阶级的委托，贫下中农的期望，她一直牢记在心中。大学毕业后，她又回到原来插队的锦善堂大队当社员，贫下中农高兴地说：“毛主席从工农兵中选拔学生的招生制度就是好，邓琳上了大学没有变。”"},{"type":"paragraph","text":"邓琳联系这段经历，体会到毛主席关于“要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去”的指示，是教育革命的正确方向，是逐步缩小三大差别，限制资产阶级法权，反修防修的重大措施。她无比气愤地说，教育界有人胡说什么文化大革命以来，教育革命的方向“总没有解决好”，叫嚷要中学生“直接上大学”，这是对毛主席《七·二一指示》的否定，为修正主义教育路线翻案，要把为工农兵打开的大学校门再关起来，这是绝对不能允许的。"},{"type":"paragraph","text":"在教育界刮起右倾翻案风的人，说“社来社去”“不周到”，“不全面”，“国家大，行不通”，对这个新生事物横加指责。到底农大毕业学生当农民好不好，贫下中农对此感受最深。大夫庄公社位于昌黎县西南部，自然条件很好，但粮食产量长期在三、四百斤徘徊。一个重要原因就是耕作种植老一套。过去，公社有不少人上了中专、大学，但没有一个回村的。有一年，这个公社的负责人到朝阳农学院去换种子，见到这个学校实行“社来社去”培养农民大学生的办法，非常高兴，当即找到学院党委负责人，要求给他们培养几个大学生。院党委看到要求如此迫切，就答应了。贫下中农高兴地说：“这回可有咱自己的大学生了。”实践证明，实行“社来社去”，反映了贫下中农的强烈愿望和要求，代表了历史发展的潮流，造就了宏大的无产阶级知识分子队伍，促进了教育事业的发展，这有什么“不全面”、“不周到”呢？"},{"type":"paragraph","text":"教育界的奇谈怪论还大肆诬蔑“工农兵学员水平低了”、“现在教育质量差了”。现在大学的教育质量究竟是高，还是低？工农兵学员毕业后在三大革命运动中的表现，是最好的鉴定。"},{"type":"paragraph","text":"昌黎县大夫庄公社小林口大队党支部书记杨晓民，是从朝阳农学院毕业回乡务农的。这个大队原来是个有名的后进队，沙地多，产量低而不稳。杨晓民运用在校学到的知识，在教师和贫下中农的支持与帮助下，在沙地里搞一年两熟试验。经过实践——认识——再实践，不断总结经验，去年扩大了试验田，使小麦和杂交高粱两茬双双过“长江”，从理论与实践上解决了一茬变两茬的问题。这一铁的事实，是对奇谈怪论的有力批判。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dadd5dd889"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
