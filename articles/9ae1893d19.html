script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度尼西亚《人民日报》载文纪念创刊十二周年  始终站在反帝反殖民主义斗争最前哨  必须坚决反对现代修正主义，保卫马列主义纯洁性","authors":[],"dates":[{"year":1963,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度尼西亚《人民日报》载文纪念创刊十二周年"},{"type":"paragraph","text":"始终站在反帝反殖民主义斗争最前哨"},{"type":"paragraph","text":"必须坚决反对现代修正主义，保卫马列主义纯洁性"},{"type":"paragraph","text":"新华社雅加达三十一日电印度尼西亚《人民日报》编辑委员会委员达霍诺今天在一篇庆祝《人民日报》创刊十二周年的文章中指出，必须坚决同帝国主义者作斗争，同现代修正主义者和现代教条主义者作斗争，以巩固世界工人阶级和劳动人民的队伍。"},{"type":"paragraph","text":"文章说，《人民日报》是依靠人民的力量诞生和发展的。《人民日报》自从诞生以来，从来没有停止反映和指导印度尼西亚工人阶级和劳动人民在思想、政治、组织工作、社会和经济方面的斗争。"},{"type":"paragraph","text":"文章举例说明《人民日报》十二年来一贯对亚洲、非洲、拉丁美洲人民争取和维护民族独立、反对帝国主义的斗争提供国际支援。文章说，印度尼西亚人民的经验是，我们甚至用竹矛也能把荷兰人赶出印度尼西亚领土。"},{"type":"paragraph","text":"文章说，《人民日报》一贯无条件地，忠诚地高举无产阶级国际主义的旗帜。文章说：“在反对共同敌人——以美帝国主义为首的帝国主义和殖民主义——的斗争中，《人民日报》作出了自己的贡献，始终站在最前哨，积极揭露帝国主义和殖民主义。”"},{"type":"paragraph","text":"文章接着说：“同样，在国际共产主义运动中争取进一步加强工人阶级和劳动人民的队伍的团结方面，《人民日报》也起了很大的作用。我们相信，如果工人阶级和劳动人民的队伍的力量的团结和国际共产主义运动的团结是针对我们的共同敌人——帝国主义和新老殖民主义——的，那末这对它们（帝国主义和新老殖民主义）将是致命的打击。”文章说：“为了保卫工人阶级和劳动人民的思想，即保卫马克思列宁主义的纯洁性，《人民日报》片刻也没有停止反对以南斯拉夫共产主义者联盟为首的现代修正主义，没有停止反对现代教条主义。现代修正主义者和现代教条主义者破坏马克思列宁主义纯洁性，是不能容忍的。他们的恶毒活动必须揭露。必须扯掉现代修正主义者和现代教条主义者所披着的马克思列宁主义的外衣，让人民看到他们脑袋里的东西实际上是为帝国主义的利益服务的。只有同帝国主义进行坚决的斗争，同现代修正主义者和现代教条主义者进行无情的斗争，全世界工人阶级和劳动人民的队伍才能巩固。”"},{"type":"paragraph","text":"《人民日报》今天出版了四版专刊，庆祝该报创刊十二周年。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ae1893d19"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
