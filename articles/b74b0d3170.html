thors":[],"dates":[{"year":1958,"month":4,"day":26}],"is_range_date":false,"parts":[{"text":"南阳市市长关于对右派分子万从斌的处分决定","type":"title"},{"text":"市第六小学校：","type":"paragraph"},{"text":"你校教员万从斌乘整风之机说党对“知识分子看法不一样，只使用不当自己人看待。胡说党对高级知识分子看的重，没把小学教员看在眼里。煽动别人不要和党团员说话，说错了人家说你是捣的，吃罪不起。还诬蔑合作化搞糟了’；‘乡下的地里都荒着，农民没啥吃，谁还干活？农民吃的不如过去的猪食’；‘农民一入社，这也是社里的，那也是社里的，一点自由也没有了’；‘合作化搞糟了，搞合作化不是农民群众的要求，而是党强迫着搞的’；‘农民有四怕：一怕卖余粮，二怕交公粮，三怕说落后，四怕说有资本主义思想；胡说‘新社会不如旧社会’，并反对男女平等等”。","type":"paragraph"},{"text":"根据以上事实，万从斌已成为资产阶级右派分子，决定撤销原职务，开除公职，送农村监督劳动。","type":"paragraph"},{"text":" 市长 刘文祥1958年4月26日。","type":"paragraph"}],"comments":[],"origin":"赵宗礼《1956—1961：南阳反右志逸》未刊稿，2023年2月6日。赵宗礼，《南阳日报》社退休记者。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b74b0d3170"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
