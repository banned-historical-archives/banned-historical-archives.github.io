ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对林业部关于一九五一年全国森林火灾情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"在肖华?关于军委直属部队开展打虎运动的报告上的批语"},{"type":"paragraph","text":"（1952年3月4日）各同志："},{"type":"paragraph","text":"军委直属【部】队打虎经验很好，各部可以仿行。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日[1]肖华，当时任人民革命军事委员会总政治部副主任。"},{"type":"paragraph","text":"[2]指肖华1952年3月2日给毛泽东的报告中谈到的军委直属部队打虎的经验。报告说，整个军委直属部队的打虎运动一般是健康的，但个别已发现“左”的逼供信偏向。为了继续扩大战果，并防止偏差，以保证运动的正常发展，军委直属总党委于3月1日召开扩大会议，决定了以下事项：一、要求各单位一般争取在3月15日以前圆满完成任务，彻底肃清残虎，并防止与纠正“左”的偏向。二、向所有打虎队详细交代打虎政策，尤其对老干部中的贪污分子，必须靠党的政策去征服他们。提高打虎战术，着重靠调查、算细账。领导上不要急躁，不要冲动。我们还规定了两条打虎纪律：1.禁止打、骂、捆等人格侮辱和变相肉刑；2.不得采用“疲劳战术”和“车轮战术”。三、对已经打出来的老虎，要进行复查定案、追缴赃物。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":475,"page_end":475},"tags":[{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bbd974cfe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
