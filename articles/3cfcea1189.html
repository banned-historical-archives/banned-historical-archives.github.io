1957,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“学术月刊”第十期发表了王亚南“论所谓资产阶级社会科学”一文。作者指出，在右派猖狂进攻中，资产阶级右派学者所抨击马克思主义和强调资产阶级社会科学是一个问题或一个政治策略的两面。而作为资产阶级学者，由于阶级成见的限制，使他们不肯也不能用探求真理的态度，去接近或对待马克思主义，因而根本不能学懂马克思主义。也正是由于狭隘的阶级观点的限制，使他们不能从历史发展的全部过程，去看待一切“社会科学”，因而这类学者们也决难明确认识资产阶级社会科学是怎么一回事。社会科学中的几门基本科学，都由马克思主义的导师们总结批判人类的思想遗产加以继承了。资产阶级右派学者，对马克思主义抱着强烈反感；而作为他们言论和行动的指导思想的，就只能是形而上学的唯心主义世界观，就只能依据这种世界观所编造出来的社会科学了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cfcea1189"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
