year":1976,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海第二纺织机械厂　许仁德"},{"type":"paragraph","text":"中央两报一刊编辑部重要文章《文化大革命永放光芒》指出:“要在批判邓小平的总目标下把百分之九十五以上的干部和群众团结起来，继续搞好上层建筑和经济基础两个方面的革命。”这就说明，我们讲斗争，从来是有着鲜明的阶级内容的，是为无产阶级政治服务的。"},{"type":"paragraph","text":"社会主义社会的主要矛盾，始终是无产阶级同资产阶级之间的矛盾，革命的对象是资产阶级，重点是党内走资本主义道路的当权派。因为，在无产阶级专政日益巩固，社会上的资产阶级名声很臭的情况下，资产阶级和一切阶级敌人都把复辟的希望寄托在党内走资派身上。这样，象邓小平这样的人，就成了资产阶级的头面人物，成了颠覆无产阶级专政、复辟资本主义的主要力量。这就决定了我们今天在同资产阶级作斗争时，必须把斗争的矛头牢牢地对准邓小平这个总目标。"},{"type":"paragraph","text":"由于我们与资产阶级的总代表邓小平这一主要矛盾的存在，规定或影响着其他矛盾的存在和发展。“捉住了这人主要矛盾，一切问题就迎刃而解了。”(《矛盾论》)我们已经取得了伟大的胜利，但是，斗争并没有结束。只有深入批判邓小平反革命的修正主义路线，才能使广大群众进一步提高阶级斗争和路线斗争的觉悟，从而更紧密地团结起来，同党内外资产阶级和一切阶级敌人作斗争。同时，也只有深入批判邓小平反革命的修正主义路线，才能使那些暂时受蒙蔽和一部分不明真相、觉悟不高的人在斗争中分清什么是正确路线，什么是错误路线，从而吸取教训，转变立场，改正错误，跟上广大工人、贫下中农继续革命的步伐。总之，只有抓住主要矛盾，把斗争的锋芒对准邓小平这个总目标，才能团结同志，打击敌人；才能分清那措施是有利于巩固、完善社会主义的上层建筑和经济基础的，那些东西正是邓小平所拼命加以维护和扩大的旧痕迹，从而进一步提高执行毛主席革命路线的自觉性，搞好这两方面的革命，反修防修，巩固无产阶级专政。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2f86c1c99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
