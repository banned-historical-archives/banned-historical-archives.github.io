script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji14","name":"毛泽东全集第14卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"集中力量发展武装，建立抗日根据地","alias":"","parts":[{"type":"paragraph","text":"集中力量发展武装，建立抗日根据地"},{"type":"paragraph","text":"（1940年1月28日）北方局，山东分局，一一五师，并告中原局，彭雪枫、项英、陈毅川："},{"type":"paragraph","text":"甲、十二月九日中央曾有长电，要你们在山东全境及华中发展数十万军队，组织数百万自卫军。中原局方面已经了解正在进行，山东及一一五师方面尚无复电，不知你们同意否？能够办到否？"},{"type":"paragraph","text":"乙、时局的发展充分证明，只有广大发展革命武装力量，以与全国工作相配合，才能制止投降与反共，才能巩固统一战线，才能争取时局好转。而现时能够发展武装的地区，主要的只有山东与华中。"},{"type":"paragraph","text":"丙、因此请你们严重注意此事，把发展武装力量作为一切工作的中心。在今年一年内，山东分局与一一五师至少应发展武装军队（包括游击队）到十五万人枪（一一五师应分配干部与兵力到山东全境去)，中原局至少发展到十万人枪，按此大概目标，具体分期实现。据山东来人说山东民枪甚多，应能实现此数，据胡服电告，中原方面半年可发展到十万，但具体计划，由你们决定之。"},{"type":"paragraph","text":"丁、没有自卫军的广大发展，即无法广大发展军队，无法建立"},{"type":"paragraph","text":"[1]彭雪枫，当时任新四军第六支队司令员兼政治委员。项英，当时任中共中央军委新四军分会书记、新四军副军长。陈毅（1901—1972），四川乐至人，当时任新四军江南指挥部指挥。巩固根据地。因此有组织有训练的抗日自卫军，至少须十倍于正规军与游击队。例如，山东有十五万军队，至少须有一百五十万至二百万有组织有训练的自卫军；华中有十万军队，至少须有一百万至一百五十万自卫军。现在你们的自卫军还太少。"},{"type":"paragraph","text":"戊、要建立这样大的武装力量，没有政权是不行的。因此必须以坚决与遂步的计划，极力争取山东、豫东、皖北、苏北的大部政权归入我们与进步人士的手中。"},{"type":"paragraph","text":"己、争取这样的军队、自卫军与政权，是一个严重斗争过程，因此不能避免有理又有利的磨擦。凡阻碍抗日进步势力发展并向我攻击之反动势力与顽固派，我必须坚决反击之，对于这种人，原则上决不能丝毫让步。而我应极力争取并与之共同建立抗日根据地的乃是一切进步的与比较进步的势力。对于中间势力如于学忠、李明扬等，我应采取中立他们的政策。"},{"type":"paragraph","text":"庚、国民党有加派军队进入鲁苏战区的计划，因此你们应加速自己的布置，要在他们未到以前，你们的阵地已经大体上巩固了。"},{"type":"paragraph","text":"辛、要使全党干部明白这个正确的发展路线，才能造成猛力向前的作风，才能实现这个计划。集中一切力量为发展武装建立根据地而斗争，乃是你们最主要最主要的任务。要使干部明白，没有伟大革命武装与伟大革命根据地，抗日胜利是不可能的。"},{"type":"paragraph","text":"中央书记处"},{"type":"paragraph","text":"一月二十八日"},{"type":"paragraph","text":"[1]于学忠（1890—1964)，山东蓬莱人，当时任国民党军鲁苏战区总司令。李明扬（1890—1978)，江苏萧县（今属安徽省）人，当时任国民党"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":364},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e172ccd2f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
