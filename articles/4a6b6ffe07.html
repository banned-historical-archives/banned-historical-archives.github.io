ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"致周恩来电","alias":"","parts":[{"type":"paragraph","text":"致周恩来电！"},{"type":"paragraph","text":"（1946年4月28日）"},{"type":"paragraph","text":"马歇尔说为蒋设想，总要接收一些地方才行。你应告马，蒋除占沈阳及北宁线外，近一个半月又占我抚顺、鞍山、辽阳、海城、营口、铁岭、昌图、开原直至四平附近。这一带是满洲主要工业区，我占地面积虽较宽，但工业甚微，故我决难再让。东北军民对蒋军屠杀政策甚愤慨，要求设立民主机构。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致重庆中共代表团周恩来电的主要容。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":283,"page_end":283},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a6b6ffe07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
