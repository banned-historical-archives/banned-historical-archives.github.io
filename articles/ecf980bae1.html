script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿拉伯舆论强调武装斗争是解放巴勒斯坦的唯一道路  苏美狼狈为奸炮制“中东慕尼黑”阴谋  一老游击队员指出帝国主义和修正主义的阴谋决不能实现","authors":[],"dates":[{"year":1969,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿拉伯舆论强调武装斗争是解放巴勒斯坦的唯一道路"},{"type":"paragraph","text":"苏美狼狈为奸炮制“中东慕尼黑”阴谋"},{"type":"paragraph","text":"一老游击队员指出帝国主义和修正主义的阴谋决不能实现"},{"type":"paragraph","text":"新华社二十五日讯　阿拉伯报刊舆论和群众团体强烈谴责美、苏勾结炮制的所谓“和平解决”中东问题的办法，并强调指出武装斗争是解放巴勒斯坦的唯一道路。约旦教师联合会代表团二十四日在结束对叙利亚的访问时和叙利亚教师联合会发表的一项联合公报说：“只有人民解放战争和武装斗争才能消灭殖民主义在阿拉伯祖国的利益和它的支柱。”"},{"type":"paragraph","text":"公报说：双方谴责企图损害阿拉伯人民和巴勒斯坦人民的自决权和自主权的任何阴谋；谴责联合国安全理事会的决议和美、苏、法、英的所谓“四大国会议”以及美、苏的“双边会谈”所炮制的屈辱性的解决办法。"},{"type":"paragraph","text":"伊拉克《巴格达观察家报》最近发表评论说：阿拉伯人民决心击退犹太复国主义的侵略。阿拉伯人民的武装力量一定能够解放被以色列霸占的土地。"},{"type":"paragraph","text":"评论指出，阿拉伯人民拒绝任何解决中东问题的所谓“和平方案”，因为阿拉伯人民深信，人民的正义斗争一定要胜利。"},{"type":"paragraph","text":"《光明报》的评论说：任何企图强加于阿拉伯人民的有利于犹太复国主义的所谓解决中东问题的办法，都是注定要失败的。得到阿拉伯人民支持的巴勒斯坦人民已经懂得，他们目前正在进行的武装斗争是取得胜利的唯一道路。"},{"type":"paragraph","text":"评论最后呼吁阿拉伯各国政府要坚决拒绝一切投降性的“解决办法”，并应给予巴勒斯坦游击队以更大的支持。"},{"type":"paragraph","text":"新华社讯　阿拉伯人民强烈谴责美帝、苏修在中东策划新的慕尼黑阴谋，妄图扼杀巴勒斯坦人民的武装斗争，实现它们瓜分中东的侵略野心。"},{"type":"paragraph","text":"一位名叫阿布·穆罕默德的老游击队员在开罗对新华社记者说：“美帝、苏修被巴勒斯坦人民汹涌澎湃的武装斗争吓得发抖，它们炮制了一个又一个阴谋，企图使巴勒斯坦事业化为乌有，并通过所谓‘和平解决’，迫使阿拉伯民族投降。正在纽约举行的‘四大国会议’和在华盛顿举行的苏美双边会谈，都是为了巩固它们在中东地区的帝国主义利益。”穆罕默德指出：“然而，他们的阴谋决不能实现。”"},{"type":"paragraph","text":"叙利亚学生阿里在大马士革对新华社记者说：美、苏、法、英正在举行的关于中东问题的“四大国会议”，毫无疑义地是另一次“慕尼黑会议”。苏修社会帝国主义正在通过这个阴谋，和美帝勾结起来企图瓜分中东。"},{"type":"paragraph","text":"一位在开罗的巴勒斯坦青年游击队员奥马尔说：“没有一个爱国的阿拉伯人会接受所谓的‘和平解决’，不论它是以安理会决议、苏联的建议、美国的工作文件、侯赛因的六点计划、四国会谈为基础，还是以别的什么为基础。我们知道，这种解决决不会给这个地区带来真正的和平，而只能使犹太复国主义对我们土地的占领合法化，并鼓励它进一步扩张。”奥马尔指出：“我们唯一的出路是武装解决。我们人民已经拿起了武器，发誓要继续战斗到胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ecf980bae1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
