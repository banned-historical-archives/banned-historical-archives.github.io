"],"dates":[{"year":1992,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国乒乓球锦标赛决出单项冠军"},{"type":"paragraph","text":"马文革乔云萍男女单打捧杯"},{"type":"paragraph","text":"本报广东中山10月28日电　1992年全国中山杯乒乓球锦标赛今晚进行4个单项决赛，天津的马文革和山东的乔云萍分获男女单打金牌。"},{"type":"paragraph","text":"今晚首先进行女双决赛，邓亚萍和乔红以3∶1胜刘伟和乔云萍，夺得冠军。"},{"type":"paragraph","text":"男双决赛是在奥运会冠军王涛和吕林与林志刚和刘俊辉之间进行。王涛和吕林经过5局苦战，以3∶2获胜捧杯。"},{"type":"paragraph","text":"女单决赛，乔云萍3∶0轻取江苏的邬娜，夺走全国冠军。奥运会冠军邓亚萍今天上午以2∶3负于江苏新秀李菊，未能进入复赛。"},{"type":"paragraph","text":"男单冠军由马文革与广东的李静来争夺，结果，马文革轻松地以3∶0取胜。前两天决出的混双冠军被邓亚萍和林志刚夺走。至此，本届全国乒乓球锦标赛比赛已全部结束，马文革、邓亚萍分获本届全国乒乓球赛最佳男女运动员称号。八一队的刘国梁和江苏的杨影分获男女“希望之星”称号。（南　方）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fb51686d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
