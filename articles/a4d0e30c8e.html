" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"给傅种孙的信","alias":"","parts":[{"type":"paragraph","text":"给傅种孙的信"},{"type":"paragraph","text":"（1951年10月23日）傅先生："},{"type":"paragraph","text":"汤先生追悼会需表示悼信。遵嘱为数学杂志3写了题名，不知可用否？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五一年十月廿三日"},{"type":"paragraph","text":"[1]傅种孙，当时任北京师范大学数学系教授、《中国数学杂志》总编辑。"},{"type":"paragraph","text":"[2]指汤孟林，生前是北京师范大学数学系教授。他逝世后，毛泽东曾派秘书田家英到北京师范大学表示悼念。"},{"type":"paragraph","text":"[3]《数学杂志》，1936年8月1日在上海正式出版，是我国第一份全国性的数学普及刊物。因抗日战争和解放战争，1939年至1950年被迫停刊。1951年11月复刊，改名为《中国数学杂志》，毛泽东亲自题写了刊名，1953年更名为《数学通报》，请郭沫若题写了刊名。1966年因“文化大革命”停刊，1979年7月复刊至今。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":10,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":40,"page_end":40},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4d0e30c8e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
