art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"李先念副总理会见港澳各界人士代表团同他们畅谈了国内国际大好形势；特别是我国文化大革命和批林批孔运动的意义和伟大胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年十月四日讯 中共中央政治局委员、国务院副总理李先念，今天下午会见了以香港中华总商会副会长王宽诚为团长，朱毅、何厚铿为副团长的港澳各界人士来京参加国庆活动代表团，同他们进行了亲切的谈话。"},{"type":"paragraph","text":"李先念副总理热烈欢迎他们来北京参加中华人民共和国成立二十五周年庆祝活动和进行参观访问。李先念副总理同他们畅谈了国内、国际的大好形势，特别是我国无产阶级文化大革命和批林批孔运动的深远意义和取得的伟大胜利。"},{"type":"paragraph","text":"中共中央委员廖承志，中共中央委员、国务院副秘书长罗青长，外交部副部长马文波，中共中央统一战线工作部负责人李金德，以及有关方面负责人梁上苑、崔明堂、张先成、王有成、万景光、经普椿、凃光达、陈龙等，参加了会见。"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2d59580bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
