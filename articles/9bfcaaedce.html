<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在整个新社会的关怀下走上更广阔的生活道路“红孩子”连金法昨日装上“新手”八年以前失去双手而始终顽强生活、坚持学习的连金法　第一次用新的手写出了“毛主席万岁”“共产党万岁”","authors":[],"dates":[{"year":1963,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　失去双手而顽强地生活着的“红孩子”——连金法，昨天在上海市第一人民医院装上了灵巧轻便的假手。这个被国民党反动派的炮弹炸去双手的孩子，从此获得了一双新的手，八年来他第一次用新装上去的手和医生、工人、老师握手，举杯请人喝茶，提东西，敲鎯头，挥笔写出“毛主席万岁!”“共产党万岁!”"},{"type":"paragraph","text":"昨天，在上海市第一人民医院宽敞明亮的假肢科研究室里，骨科医生刘广杰和上海市社会福利工厂的工人，把一双呈现肉色和脉络纹路的假手装在连金法断肢的残端上，并帮助他系好背带和牵引带，调准假手上的机器开关。曾经在这个医院装上假手的上海大中华橡胶厂工人单如发和参加过孟良崮战役、在解放一江山岛战斗中失去手的转业军人刘子玉，都热情地向连金法作使用假手的示范动作，教他练习使用这双新装上去的手。第一人民医院负责同志也到场殷切地鼓励连金法更加顽强、勇敢地进行锻炼，熟练地用双手生活、学习。"},{"type":"paragraph","text":"连金法是浙江省玉环县坎门小学五年级的“三好”学生，少年先锋队队员。一九五五年，他在帮助同村的老人拆卸从海边拣回的国民党反动派遗留的炮弹时，被炸去了双手。在当地党政领导和人民的关心、教育下，他以惊人的毅力，克服了难以想象的困难，学会写字和劳动、生活的本领。他的勇敢、顽强克服困难的事迹，从今年三、四月间，先后在《浙江日报》、《人民日报》、《解放日报》、《中国青年报》报道以后，受到了全国人民的关怀。到目前为止，他已收到了从全国各地寄来的信件六千多封。宋庆龄副主席还题了词:“学习连金法顽强克服困难的好榜样”；中共玉环县委负责同志也题词勉励，玉环县还举办了连金法优秀事迹展览会。"},{"type":"paragraph","text":"上海人民和全国人民一样，给予这个勇敢的孩子以极大的关怀，上海第二医学院附属广慈医院整形外科主任张涤生写信给《解放日报》社，表示愿意给连金法治治这双残废的手。《解放日报》社又和生产假肢的上海市社会福利工厂联系，了解了安装假肢的情况，并给中共玉环县委写信，请他们把连金法送到上海来安装假手。许多里弄居民也都打电话或者写信给上海市社会福利工厂，询问能不能帮助孩子安装假手。这时上海市社会福利工厂也已经给坎门人民公社写了信，请他们把连金法送到上海来安装假手。"},{"type":"paragraph","text":"连金法由坎门小学教师陪同来上海后，广慈医院和上海市第一人民医院对他的身体进行了全面的检查，证明他发育正常，健康良好。由于他过去用断手残端执笔、翻书，眼睛离书本、台子太近，造成眼睛的近视，有名的吴良材眼镜商店又给他配了近视眼镜。上海市第一人民医院骨科主治医生刘广杰与社会福利工厂的技术人员、工人为他设计了假手的图样，做模型，选择了塑料和钢片，给他制造假手。他们还考虑连金法正处于发育成长期间、求知欲强烈、欢喜活动和劳作的特点，在技术上进行了革新，把肘关节面的单绞链改成双绞链，加大了腕关节的旋转角度，手掌内的机器用齿轮和杠杆原理使食指和拇指掐合得更紧，为了防止手掌上的机件损坏，用硬性塑料做了手壳，并复以铝制的外壳保护。该厂还为连金法特制了汤匙和牙刷，适应新装上去的手使用。"},{"type":"paragraph","text":"在上海，各方面还特别关心连金法的思想教育。他住在《解放日报》招待所时，《解放日报》社专门派了记者陪着他游览少年宫、人民广场、南京路、外滩公园，向他讲述这些地方的丑恶的过去和革命的历史，并嘱咐他虚心学习，不要骄傲。在医院里，陪同他前来的老师还按照学校的日程给他上课，布置作业，他都能按时完成。日前，老师对他进行一次语文测验，取得了九十二分的优良成绩。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\10\\63ap010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e左:连金法装上假手后，在医生指导下练习写字；\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\10\\63ap010302.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e徐秀梅\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上:连金法在接手前，用断了的手写着“做坚强的革命后代”。"},{"type":"paragraph","text":"(本报记者　徐秀梅　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bfcaaedce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
