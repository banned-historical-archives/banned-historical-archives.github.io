ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"应基本谢绝黑水地区群众对军队的慰劳品","alias":"","parts":[{"type":"paragraph","text":"应基本谢绝黑水地区群众"},{"type":"paragraph","text":"对军队的慰劳品!"},{"type":"paragraph","text":"（1952年8月11日）"},{"type":"paragraph","text":"二、黑水群众在土司头人剥削下生活甚苦，加以一九三四年我军经过所给予损失甚大，为减轻其负担，对以前损失除考虑酌量救济以扩大我影响外，此时应基本上谢绝慰劳，只可对其慰劳品中约十分之一左右，当作人民的好意收受下来，并于数日后即向【送】群众还礼，以此种办法增进军民间的友谊。"},{"type":"paragraph","text":"[1]这是毛泽东1952年8月11日审阅军委总参谋部一个电报稿时修改的一段文字，文中用宋体字排印的是毛泽东加写和改写的文字。黑水，位于今四川省阿坝藏族自治州内，红军长征时曾经过这里。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":194,"page_end":194},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"029985e537"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
