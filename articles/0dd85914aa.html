art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛泽东百年诞辰学术讨论会闭幕","authors":[],"parts":[{"type":"paragraph","text":"据新华社南京9月30日电 中国中共党史学会和中华人民共和国国史学会联合举办的纪念毛泽东同志诞辰一百周年学术讨论会，9月29日在无锡闭幕。"},{"type":"paragraph","text":"在为期五天的学术讨论中，百名学者结合历史实际，具体论述了毛泽东为开创有中国特色的新民主主义革命道路和社会主义改造道路，以及倡导探索中国自己的社会主义建设道路的历史功绩，强调了认真学习毛泽东思想，坚持毛泽东思想指导作用的重大意义。"},{"type":"paragraph","text":"与会学者高度评价邓小平同志在历史的转折关头，引导全党确立毛泽东和毛泽东思想历史地位，继承和发展毛泽东思想，创立建设有中国特色社会主义理论的历史性贡献。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0dd85914aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
