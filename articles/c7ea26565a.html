rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席是光芒万丈的红太阳缅甸作家赞颂毛泽东思想是世界人民革命的指路明灯","authors":[],"parts":[{"type":"paragraph","text":"缅甸作家德钦妙丹最近对新华社记者说：毛主席是“当代的列宁”，是“当代最伟大的革命家”，是“光芒万丈的红太阳”；毛泽东思想是世界人民革命的指路明灯。"},{"type":"paragraph","text":"他还说，“毛主席是伟大的革命家、伟大的哲学家和伟大的社会科学家。他也是一位伟大的政治、经济和军事科学家。他的著作有力地证明了这一点。所以，全世界的革命人民和革命者都要学习他的著作。”"},{"type":"paragraph","text":"德钦妙丹说，毛主席的“思想和学说不仅是中国革命的指路明灯，而且是世界人民革命的指路明灯。”毛泽东思想是“全世界革命人民和革命者的非常宝贵的革命的思想武器。这一思想武器是战无不胜的。”"},{"type":"paragraph","text":"德钦妙丹指出，不管走上了反革命道路的苏修领导集团怎样恶毒攻击世界革命人民的伟大领袖毛主席，他们都无法改变世界人民发自内心的对毛主席的热爱和崇敬。"},{"type":"paragraph","text":"他最后强调指出：“伟大领袖列宁曾对第二国际反马克思主义的叛徒攻击马克思主义和革命进行了反击。毛主席和毛泽东思想正在给予破坏马克思列宁主义的基础和革命运动的修正主义者以粉碎性的打击。”“毛主席是国际共产主义运动的伟大领袖。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7ea26565a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
