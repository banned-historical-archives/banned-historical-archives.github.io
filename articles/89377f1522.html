" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于美国邀请印尼等五国视察美军巨济岛战俘营问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于美国邀请印尼等五国视察美军巨济岛战俘营问题的批语"},{"type":"paragraph","text":"（1952年6月21日）周总理："},{"type":"paragraph","text":"除向驻京各使馆有所表示外，对我驻五国大公使似亦应有所指示。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月廿一日"},{"type":"paragraph","text":"[1]这个批语写在中国驻印尼代办钟庆发1952年6月18日给外交部的报告上。钟庆发的报告说，美国邀请印尼视察美军巨济岛战俘营的正式要求于6月14日送达印尼政府，18日印尼外交部长在同他谈贸易问题时，询问中国政府对美国邀请印尼等五国视察美军巨济岛战俘营一事有何反应。因此，他建议我国政府对此事发布一个严正声明。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":6,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":145,"page_end":145},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89377f1522"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
