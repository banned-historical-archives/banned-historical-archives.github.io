ar":1967,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席指示上海工人阶级:在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。"},{"type":"paragraph","text":"毛主席又指示革命的红卫兵和革命的学生组织要实现革命的大联合，两派是革命群众组织，要无条件实现革命大联合。"},{"type":"paragraph","text":"本报讯　我们伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛主席视察上海时作了极其重要的指示。"},{"type":"paragraph","text":"毛主席在上海，对上海工人阶级作了极其重要的指示:在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。"},{"type":"paragraph","text":"毛主席视察上海时，除了对上海工人阶级作了重要指示外，又指示革命的红卫兵和革命的学生组织要实现革命的大联合，两派是革命群众组织，要无条件实现革命大联合。"},{"type":"paragraph","text":"毛主席视察上海时作的极其重要的指示，是革命大联合的最最巨大的动力。上海工人阶级听了毛主席的最新指示，立即照办，一马当先，实行革命大联合，掀起了革命大联合的新高潮。上海红卫兵革命小将也紧紧跟上，出现了革命大联合的新飞跃。在短短的几天内，上海主要的产业系统和十个区的工人组织实现了革命大联合，上海十七所高等院校和二百多所中等学校实现了革命大联合，其他各条战线和各个单位的革命群众组织也急起直追，纷纷实现革命大联合。这是毛主席最新指示的辉煌胜利。"},{"type":"paragraph","text":"目前，上海广大无产阶级革命派和革命群众，正在大学毛主席著作，狠抓革命大批判和本单位的斗批改，从思想上巩固革命大联合，加强革命的“三结合”，用“抓革命，促生产”的实际行动，来回答毛主席对上海革命人民的巨大关怀，迎接伟大的中华人民共和国成立十八周年。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\09\\679p020101.JPG\"\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0262c0d4d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
