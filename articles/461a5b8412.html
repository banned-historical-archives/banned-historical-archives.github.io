art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”同巴枯宁如出一辙","authors":["何文章"],"parts":[{"type":"paragraph","text":"第一国际时期的机会主义头子巴枯宁，是一个无政府主义的典型代表。他从资产阶级的人性论出发，反对任何权威和国家，狂妄地叫嚣在二十四小时内一举消灭国家，国家将由“无政府状态”所代替。在这种社会中，每个人都有“最充分的自由”，不受任何限制；每个人、每个乡镇都是自治的，不再有任何权威。"},{"type":"paragraph","text":"这些娓娓动听的词句，给工人运动带来了极大的危害。马克思、恩格斯从理论上、组织上对巴枯宁进行了坚决的斗争。恩格斯指出：“把权威原则说成是绝对坏的东西，而把自治原则说成是绝对好的东西，这是荒谬的。”（《马克思恩格斯选集》第二卷第五五三页）无产阶级要取得彻底解放，就要反对资产阶级权威和国家机器，但这样做的目的，正是为了建立无产阶级权威和国家。如若没有这种国家和权威，不但根本谈不上消灭阶级，而且连机器也无法开动，铁路也无法管理，轮船也无法驾驶。正象恩格斯指出的，一个那怕只有两人组成的社会，如果每个人都不放弃一些自治权，它也不可能存在下去。巴枯宁反对一切国家和权威，其要害是反对无产阶级专政。因为权威是以服从为前提的，没有权威和服从，专政也就建立不起来，而离开了无产阶级专政，就只能是帮助资产阶级建立和巩固它们的国家和权威。"},{"type":"paragraph","text":"“四人帮”把无组织无纪律，反对革命领导干部，矛头向上，美其名曰“反潮流”，还说什么就是要这样的“刺头”。“四人帮”颠倒敌我关系，混淆阶级阵线，接过“反潮流”的口号，以售其奸，其险恶用心和当年的巴枯宁一样，是妄图煽动无政府主义，反对无产阶级专政。"},{"type":"paragraph","text":"巴枯宁自称他的理论是被他“扩大了的，发展了的……蒲鲁东的无政府主义体系”。二者都反映了当时在资本主义生产打击下和在资产阶级政府压迫下陷于破产的小资产阶级的政治观点。如果说蒲鲁东主义是代表了这个阶级中一部分人幻想挽救小私有制的复辟心理，巴枯宁主义则反映了他们中间一部分人无法自救的绝望心情。“四人帮”借“反潮流”之名搞无政府主义，搞“打倒一切”，是资产阶级垂死挣扎的表现。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"反潮流","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"461a5b8412"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
