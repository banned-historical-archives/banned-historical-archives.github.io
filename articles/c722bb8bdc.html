<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"民族资产阶级和私人经济事业在新中国的地位——学习一月五日周恩来副主席报告笔记之三","authors":["陈洪"],"dates":[{"year":1952,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陈洪"},{"type":"paragraph","text":"民柞资产阶级是新中国人民民主政权的一个组成部分，私人资本主义经济事业也是国家五种经济成分之一；他们在新中国的合法地位是肯定的。"},{"type":"paragraph","text":"“合法是一国事，正确又是一回事。”中国民族资产阶级参加人民民主政权，是承认了这个政权是以工农联盟为基础，以工人阶级及其政党中国共产党为领导的；因此他们就必须放弃一切错误的资产阶级民主主义思想，而接受正确的由马克思列宁主义与中国革命实践相结合的毛泽东思想。共同纲领又明白规定，私人资本主义经济要受国家经济的领导，因此他们不是可以自由发展的，而是应受领导和限制的。什么是容许私人经济发展的方面，什么是禁止私人经济发展的方面，这在共同纲倾中也有规定；除有关国家经济命脉和足以操纵国民生计的事业都应由国家总一经营外，其他有利国计民生的私人经济事业就容许发展，不利或有害于国计民生的私人经济事业就禁止发展；因为只有这权，中同经济发展的道践才能由新民主主义走向社会主义。不然的话，如果私人经济事业不受领导、不受限制，而任其自由发展，那么中国经济发展的道践将不是新民主主义而是资本主义，将不是走向社会主义而是回复到帝国主义的附属国或殖民地的经济。"},{"type":"paragraph","text":"解放以来，一般工商业家对于中国私人经济事业应受领导和限制的周题认识不钩，因而曲解共同纲领中的经济政策，发生许多思想上和行为上的重大错误，据分析至少有下列几点:"},{"type":"paragraph","text":"(一)孤立地讲公私兼顾，而不是在服从国家经济领导的条件下讲公私兼顾。有人还在公私因系上存在着“平分秋色”和“分庭抗礼”的思想，认为公私兼顾就是公私一样，无所谓领导不领导。甚至还有人公然拒绝国家委托加工定货，竟说:“前年我们在困难中，政府委托加工、定货是叫雪里送炭”，我们是欢迎的；现在我们不需要叫“锦上添花”了。又说:“前年加工、定货是政府照顾我们，现在加工、定货是我们照顾政府；前年是我们有求于人，现在是人求于我。”"},{"type":"paragraph","text":"(二)抽象地讲劳资两利，而不是在承认工人阶级领导并供靠工人阶级搞好生产的前提下讲劳资两利。有人甚至认为劳资既然两利，就谈不到谁依靠谁，更谈不到雕领导谁了。由于这种错误的“老因思想”的发展，不仅企业民主管理、安全卫生、改进工作法、提合理化建议……等一连串措施都无从办到，甚至资本家还用延长工作时间、克扣及减低工资、打骂及虐待工人……等方法，对工人实行压迫和过分的剥削。"},{"type":"paragraph","text":"(三)盲日生产，而不是在国家生产总计划领导之下进行生产。只要某一生产部门有厚利可国，资本家就趋之若惊，因而形成某些部门生产过剩而另一些部门生产不足的无政府状态，这样就使社会生产力和生产资金都受到浪费的损失。商业盲目经营，更可以扰乱市场、波动物领。"},{"type":"paragraph","text":"(四)谋取暴利，而不是在国家规定的限度内或议定的价格内取褐合法利润。为了达到追求暴利的目的，许多卑鄙无耻的工商业家，除了从事投机活动之外，竟不悄使用一切手段，用行贿、欺诈、偷漏、引诱等犯法行为，以盗窃国家财产和经济情报，危害人民利益腐蚀政府机因工作人员。"},{"type":"paragraph","text":"应该说，所有这些思想上行为上的重大错误，都是由旧社会遗留下来的污毒；一切工商业家必须在思想改造运动中，特别是在目前正在因展的反贪污、反浪费、反官僚主义的伟大斗争中，坚决彻底的清洗这些污毒，首先是忠诚老实的坦白和检举自己所作过的、所知道的大大小小的犯法行为，听凭人民政府处理。"},{"type":"paragraph","text":"一切工商业家都必须明了:人民政府所保护和欢迎的是那些拥践共同纲倾、遵守政府法令、服从国家经济和国家生产总计划领导的工商业家；而不是那些不受领导和限制而想自由发展、盲目生产、贪图暴利的工商业家。工商业家如果走前面一条正确的践，那么他们的出践是光明的，他们不但在目前可以充分发展他们的有利于国计民生的事业，而且在将来全国转入社会主义的时期，他们也一定可以得到工作的机会会，并且可以保留他们的消费财产；而如果走后面一条错误的践，就必将遭受全国根大多数人民的反对面归于失败无疑。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c722bb8bdc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
