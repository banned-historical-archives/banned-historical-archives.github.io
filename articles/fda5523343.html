rt":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东为罗章题词","authors":["杨海峰〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"●杨海峰"},{"type":"paragraph","text":"抗日战争时期，为了战胜敌人对根据地的封锁所造成的经济困难，从1938年，陕甘宁边区部队开始了轰轰烈烈的开荒生产运动。他们开荒垦田，发展工业、运输业和商业，达到了完全自给的经济基础。至1943年，我军坚持敌后抗日已进入第6个年头，不论在作战、学习、生产中，都涌现了许多英雄模范人物。全边区部队开垦荒田20多万亩，陕甘宁边区为此大力宣传生产战线上的劳动英雄。罗章当时任八路军三五九旅七一八团政治委员，他和干部战士一样投身大生产运动并做出了成绩。为表彰他在大生产中的功绩，党中央为他颁发了奖状和奖品，毛泽东主席亲笔为他题词：以身作则。"},{"type":"paragraph","text":"这个题词影响了一代又一代的共产党人，在发扬艰苦奋斗优良传统的今天，“以身作则”应当成为每个党员、干部的行动准则。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fda5523343"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
