es":[{"year":1989,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京4月3日电　新闻出版署负责人最近就有关“文革”题材的作品出版回答了记者的提问。"},{"type":"paragraph","text":"问:去年12月23日，上海《联合时报》发表了由叶永烈撰写的《越是多磨情越长——王力病中答客问》一文，引起强烈反应，你对此事怎么看?"},{"type":"paragraph","text":"答:“文革”带来的灾难，人们记忆犹新。王力在答客问中美化自己，是错误的，读者表示义愤是可以理解的。《联合时报》发表此文，是很不妥当的。"},{"type":"paragraph","text":"问:有的文章在批评《王力病中答客问》一文时，曾提出“文革”这段历史能不能研究你是怎么看的?"},{"type":"paragraph","text":"答:“文革”对我国人民来说是一场大灾难。这段历史应该研究，科学地总结教训，不忘前车之鉴。事实上十多年来对这段历史的研究从来没有中断过。现在的问题是，有些涉及“文革”的作品热衷于写林彪、江青等人的“轶事”、“秘闻”、“内幕”，将一场严肃的政治斗争庸俗化；有的则缺乏充分、准确的事实根据。这种做法，社会效果是不好的。"},{"type":"paragraph","text":"问:你认为对有关“文革”的著作的发表、出版，应持什么态度?"},{"type":"paragraph","text":"答:写这段历史的作品，要以《关于建国以来党的若干历史问题的决议》为依据，要尊重事实，持严肃慎重的态度。这类著作的发表要遵守有关规定。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王力","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2a975ce4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
