:[{"year":1949,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生:"},{"type":"paragraph","text":"我们所住的新康里的产业，是英帝，业广地产公司的。每次“自来水费”及“房屋租金”由他们公司“通告”发表数目后，由二房东向三房客收取，按期付给。这次八月份上期的自来水费，每一幢房屋要付五千五百八十元。(亦由他们通告)因上月(七月下期)只有三千三百六十元，而且最近米价及各种物价及折实单位等都在下跌，为何自来水费反而要上涨呢!住户们在怀疑之下，要他们公布账目。结果他们公布不出账单来。再三追查后，他们说这次(八月份上期)的账完全错了。再补贴一张通告来说，每一幢房屋只要付二千九百六十元够了。因此我们才明白他们每次都在剥削我们。现在我们为要清查他们过去账目，及以免以后再被剥削，正在联合组织起来，预备集体的行动，去对付帝国主义的剥削者。　汤荣升"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85ae29e4a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
