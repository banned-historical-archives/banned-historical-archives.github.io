art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"张春桥副总理同邦戈总统继续会谈邦戈总统和夫人等贵宾应邀出席文艺晚会","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年六月二十八日讯 国务院副总理张春桥同加蓬共和国总统、政府首脑哈吉·奥马尔·邦戈，今天下午继续举行了会谈。"},{"type":"paragraph","text":"据新华社一九七五年六月二十八日讯 加蓬共和国总统、政府首脑哈吉·奥马尔·邦戈和夫人及随同来访的加蓬贵宾今晚应邀出席文艺晚会，观看我国文艺工作者演出的音乐、舞蹈节目。"},{"type":"paragraph","text":"加蓬驻中国大使克里斯托夫·布巴纳，大使馆外交官员也应邀观看演出。"},{"type":"paragraph","text":"陪同贵宾观看演出的有人大常委会副委员长徐向前，外交部副部长何英，文化部负责人浩亮，北京市革命委员会副主任扬寿山等。"},{"type":"paragraph","text":"文艺晚会由北京市革命委员会举办。演出结束后，邦戈总统和夫人等加蓬贵宾由徐向前副委员长等陪同走上舞台，同演员们热烈握手，并向他们赠送了花篮。"},{"type":"paragraph","text":"今天上午，邦戈总统及部分随行人员由中国人民解放军副总参谋长彭绍辉陪同，参观北京卫戍区某部，受到了部队负责人张良友、陈先达和战士们的热烈欢迎。加蓬贵宾在这里观看部队的军事项目表演。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9e32e3cd1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
