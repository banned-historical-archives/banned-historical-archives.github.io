{"year":1993,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东思想体系》丛书出版"},{"type":"paragraph","text":"新华社西安１０月２５日电（记者王世焕）为纪念毛泽东同志诞辰１００周年，陕西人民教育出版社近日出版发行了《毛泽东思想体系》丛书。"},{"type":"paragraph","text":"《毛泽东思想体系》丛书旨在全面系统地研究和论述毛泽东思想体系的产生、形成和发展的历史，阐明毛泽东思想体系的构架和基本特点，使人们能够从理论高度认识和掌握毛泽东思想的科学体系。"},{"type":"paragraph","text":"这套丛书是国家教委“八五”人文社会科学规划项目，共分为《毛泽东思想体系概论》、《毛泽东政治思想研究》、《毛泽东经济思想论纲》、《毛泽东军事思想简论》、《毛泽东文化思想研究》、《毛泽东党建思想概述》、《毛泽东哲学思想体系新论》和《国外毛泽东思想研究评析》等８种。"},{"type":"paragraph","text":"这套丛书由陕西师范大学张广信教授主编。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aaafa34c5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
