script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"科学事业是群众共同的事业","authors":["《云南日报》评论员"],"dates":[{"year":1958,"month":12}],"is_range_date":false,"parts":[{"text":"科学事业是群众共同的事业","type":"title"},{"text":"《云南日报》评论员","type":"authors"},{"text":"玉溪县春和农业社已经建立了科学研究所。陆良县农业技术研究所也正式成立了。为了让读者们更多了解这些研究机构的活动情况，我们又约请了一些同志撰写文章、拍摄照片，较为详细的介绍了春和农业科学研究所。","type":"paragraph"},{"text":"由一个县、甚至一个农业社办起科学研究机构的事实说明只要我们解放思想、破除迷信以后，会做出多少前人所不敢想象的事情！","type":"paragraph"},{"text":"陆良、春和办科学研究机构，这个要求是生产大跃进提出的。生产大跃进提出了许多重要问题（比如合理施肥）需要从科学道理上加以阐明，仅仅依靠现有的少数几个科学研究机构，很难及时地——加以解决，必须大力发展科学事业。陆良县农业技术研究所、春和科学研究所也就应运而生。许多省级科学研究机关在大跃进以来，同样有了巨大的发展。","type":"paragraph"},{"text":"但是在发展科学事业上，我们不难看到有两种不同的作法：一种是强调规格、强调特殊，仅仅依靠少数科学技术人员慢慢地发展，另一种是把科学事业看作群众共同的事业，专家和群众结合起来，在发展科学事业中走群众路线。陆良和玉溪春和所走的道路，是后一条道路，这是一条促使科学事业日益繁荣兴旺的正确的道路。","type":"paragraph"},{"text":"与其他事业比较起来，在科学事业中走群众路线，困难更大，陈规更多，迷信更深。这些迷信来自三个方面：劳动人民对科学有迷信；干部对领导科学工作有迷信；科学技术工作者迷信自己，多方喧染，把科学工作弄得莫测高深。大跃进以来层出不穷的许多例事已一再向我们说明，科学并不神秘，泸西县的木工不是被聘请担任中国农业科学院农业机械研究所的研究员了吗？一字不识的翻身贫农曹大妈不是被公认为扑鼠专家了吗？具有丰富阶级斗争知识和生产斗争知识的劳动人民是可以成为专家的；不仅如此劳动人民也可以办科学事业。陆良和春和便是最好的例子。领导陆良、玉溪科学研究所的是什么人呢？是县、区、乡、社各级干部，按照党的政策办事，我们能够领导各项事业，为什么不能领导科学工作呢？当然我们在工作中会碰到不少的困难，在困难面前更需要我们根据“虚实并举，边干边学”的精神，使自己又红又专，很快由外行变为内行。破除科学技术工作者头脑里面的迷信观念，这是发展科学事业的一个重要问题。科学事业走群众路线，就是需要专家与群众结合，依靠群众共同发展科学事业；如果事先便不相信群众能够办科学事业，把科学弄得玄妙异常，即使与群众朝夕相处，也不会和群众结合起来，更谈不上什么发展科学事业了。","type":"paragraph"},{"text":"我们充满喜悦的心情来报道陆良和春和科学研究所的诞生，我们祝贺这两个研究所继续前进，不断巩固提高自己，我们也盼望现有各科学研究机关大力支援他们。陆良和春和科学研究所向我们展示了在发展科学事业上的多快好省的道路，展示了一幅在党的领导下、科学事业走群众路线的光辉前景。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2ca6a1c79"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
