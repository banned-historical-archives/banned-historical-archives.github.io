art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让“剥削有功”的谬论见鬼去吧","authors":["海军某部战士董得星"],"parts":[{"type":"paragraph","text":"党内头号走资本主义道路当权派刘少奇，是一个十足的资产阶级的走狗、地地道道的大工贼。他处处替资本家打算，为资本家帮腔。“剥削有功”，就是刘少奇献给资本家的一个最突出的反动谬论。他胡说什么：“对资本家应该承认他们的剥削，赞成他们扩大工厂，剥削有功。”工人“不是赞成剥削，而是怕无人剥削”。在这些话里，刘少奇这个大工贼的丑恶嘴脸，真是暴露无遗！"},{"type":"paragraph","text":"剥削，就是公开的抢劫，就是惨无人道的奴役，就是血淋淋的压榨。刘少奇公然鼓吹“剥削有功”，这是最无耻地为资本家涂脂抹粉，歌功颂德。刘少奇说工人“怕无人剥削”，这是对工人阶级的最恶毒的污蔑！"},{"type":"paragraph","text":"我的父亲是一个老工人，他只要一听到“资本家”这几个字，就恨得咬牙切齿。他从小在纱厂做工。有一天，他身无分文，没吃没喝地干了一整天，资本家还叫他加班加点。我父亲饿得眼冒金星，在扛纱锭时，昏倒在地。资本家看见了，硬说他故意捣乱，操起皮鞭一顿毒打，打得他遍体鳞伤，倒在血泊中。请看，这剥削到底有什么“功”？究竟是工人还是资本家“赞成剥削”？"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“什么人站在革命人民方面，他就是革命派，什么人站在帝国主义封建主义官僚资本主义方面，他就是反革命派。”刘少奇一贯站在资产阶级的反动立场上，他是一个最无耻、最凶恶的反革命派。我们一定要把这个大工贼批倒批臭！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e4028f499"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
