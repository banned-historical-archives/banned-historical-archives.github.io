ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致彭雪枫等电","alias":"","parts":[{"type":"paragraph","text":"致彭雪枫等电"},{"type":"paragraph","text":"（1941年1月10日）"},{"type":"paragraph","text":"你们应根据中央十二月二十五日指示之十大理由，公开宣传，并发反共军。你们应公开写信给反共军首长如汤恩伯、李仙洲、李品仙等，将此类信件公开印刷分寄反共各军，争取他们共同抗日，劝告他们停止反共。如你们宣传工作做得好，可以动摇反共军官心军心，迟延其进攻速度。你们的宣传对任何部队都取争取政策，不要伤其官长，对他们过去抗日成绩应加赞语。宣传工作弱的部队，各首长应亲自动手，亲自检查，务使措词恰当，宣传有力。击破反共军十分之七靠宣传。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、王稼祥关于加强对反共军的宣传工作致彭雪和巴苏华的谈话"},{"type":"paragraph","text":"（1941年1月上旬）"},{"type":"paragraph","text":"中国共产党仍坚持把日本侵略者作为打击的主要敌人。如果国民党企图破坏这一全国的主要政治方向，它必将遭到反击，它的计划必将失败，但中国共产党绝不鼓励内战。"},{"type":"paragraph","text":"[1]1941年1月上旬，毛泽东会见印度援华医疗队的巴苏华。毛泽东用炭在地上画出日军、国民党军和新四军的位置，说明蒋介石制造皖南事变"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":328,"page_end":329},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5a1fe7286"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
