:[{"year":1955,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜民主主义人民共和国最高人民会议常任委员会委员长金枓奉同志:"},{"type":"paragraph","text":"朝鲜民主主义人民共和国内阁首相金日成同志:"},{"type":"paragraph","text":"朝鲜民主主义人民共和国外务相南日同志:"},{"type":"paragraph","text":"值此朝鲜人民获得解放十周年之际，我们谨代表中华人民共和国政府和人民向你们，并通过你们向朝鲜民主主义人民共和国政府和人民致衷心的、热烈的祝贺。"},{"type":"paragraph","text":"在伟大的苏联军队击败日本军国主义者以后，十年来，朝鲜人民在朝鲜劳动党和朝鲜民主主义人民共和国政府的领导下，为争取自己祖国的和平、统一和独立进行了不懈的斗争。在一九五三年朝鲜停战以后，朝鲜人民又进行了艰巨的恢复和发展国民经济的工作，并获得了巨大的成就。朝鲜人民的这些成就给了正在建设社会主义的中国人民以极大的鼓舞和支持。"},{"type":"paragraph","text":"朝鲜停战以来，朝鲜人民军和中国人民志愿军严格遵守朝鲜停战协定，朝中两国政府始终本着协商精神谋求朝鲜问题的和平解决。但是和平的敌人却多方图谋破坏停战协定，致使朝鲜停战至今仍处于不稳定的状态。但是，朝鲜停战协定决不容许破坏，和平解决朝鲜问题必须实现。"},{"type":"paragraph","text":"祝朝鲜人民在为祖国的和平、统一和独立的斗争中获得更大的胜利。朝鲜人民在这一斗争中将永远得到中国人民和中国政府深厚的同情和全力的支持。"},{"type":"paragraph","text":"祝你们在加强民主基地、恢复和发展国民经济的事业中获得更大的成就!"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会"},{"type":"paragraph","text":"常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理兼外交部长"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"一九五五年八月十二日于北京"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89a244f456"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
