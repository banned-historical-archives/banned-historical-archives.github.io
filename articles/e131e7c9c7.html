,"dates":[{"year":1964,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南劳动党代表团访苏回国途中到京"},{"type":"paragraph","text":"邓小平同志到机场迎接"},{"type":"paragraph","text":"新华社十一日讯　应邀访问苏联的越南劳动党代表团，由团长、越南劳动党中央委员会第一书记黎笋率领，在回国途中今天到达北京。到机场迎接的有中共中央总书记邓小平，中共中央政治局候补委员、书记处书记康生，中共中央委员伍修权等。"},{"type":"paragraph","text":"到机场迎接的还有越南驻华大使馆临时代办黄北、苏联驻华大使馆临时代办契尔巴柯夫。（附图片）"},{"type":"paragraph","text":"邓小平同志同越南劳动党代表团的同志们在机场合影。左起第六人是黎笋同志。      新华社记者　邹健东摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e131e7c9c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
