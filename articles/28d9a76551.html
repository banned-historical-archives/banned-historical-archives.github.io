ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"悼念布曼增迪的电报","alias":"","parts":[{"type":"paragraph","text":"悼念布曼增迪的电报"},{"type":"paragraph","text":"（1953年9月24日）蒙古人民共和国大人民呼拉尔主席团："},{"type":"paragraph","text":"我以悲痛的心情获悉冈奇金·布曼增迪同志逝世的消息。冈奇金·布曼增迪同志是蒙古人民革命运动杰出的战士、乔巴山元师的亲密战友，他为蒙古人民的革命事业贡献了自己的全部生命。"},{"type":"paragraph","text":"冈奇金·布曼增迪同志的逝世是蒙古人民的重大损失。我谨代表中国人民、中国政府并以我自己的名义，谨向您们，并通过您们向蒙古人民致最深切的哀悼。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东"},{"type":"paragraph","text":"一九五三年九月二十四日于北京"},{"type":"paragraph","text":"[1]布曼增迪，即冈奇金·布曼增迪，逝世前任蒙古人民革命党政治局委员、蒙古人民共和国大人民呼拉尔主席团主席。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":9,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":354,"page_end":354},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28d9a76551"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
