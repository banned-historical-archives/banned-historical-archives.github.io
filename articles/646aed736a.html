ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于我军应坚持以游击战配合友军作战方针的指示","alias":"","parts":[{"type":"paragraph","text":"关于我军应坚持以游击战配合友军作战方针的指示"},{"type":"paragraph","text":"（1937年9月16日）林彪同志，并告朱、任、贺、关、聂、雪枫\"："},{"type":"paragraph","text":"（甲）据彭雪枫称，日寇某军自天镇向广灵，关东军自蔚县急进，晋阎拟集中十四个团与敌决战，希望我百十五师参加作战等语。"},{"type":"paragraph","text":"（乙）我军应坚持既定方针用游击战斗配合友军作战，此方针在京与蒋何决定，周彭又在晋与阎当面决定，基本不应动摇此方针。"},{"type":"paragraph","text":"（丙）请你将当前情况及如何配合友军作战之意见即电告，尔后即时电告。"},{"type":"paragraph","text":"（丁）一一五师现到何处？"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十六日[1]指朱德、任弼时、贺龙、关向应、聂荣臻、彭雪枫。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":9,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":151,"page_end":151},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"646aed736a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
