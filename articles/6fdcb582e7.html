script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级残酷剥削  意大利十万电力工人举行罢工","authors":[],"dates":[{"year":1970,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级残酷剥削"},{"type":"paragraph","text":"意大利十万电力工人举行罢工"},{"type":"paragraph","text":"新华社二十三日讯　罗马消息：意大利人民反对垄断资产阶级残酷剥削和压迫的斗争正在一浪接一浪地日益高涨。"},{"type":"paragraph","text":"二十三日，意大利当局控制的电力托拉斯“国家电力局”的十万名工人开始举行全国规模的七十二小时罢工，要求增加工资、缩短工时和改善劳动条件。这次罢工使全国电力供应中断，严重影响工业生产，沉重地打击了意大利垄断资产阶级。"},{"type":"paragraph","text":"与此同时，由于艾米利亚—罗马涅区、特兰提诺—阿尔托—阿迪杰区、弗留利—威尼斯朱利亚区和罗马公共运输工人举行罢工，已使罗马、佛罗伦萨、特兰托、的里雅斯特和其它一些大城市的公共运输车辆停止行驶。"},{"type":"paragraph","text":"意大利当局控制的广播电台和电视台的工人、职员、技术人员、记者和演员二十三日也举行全国规模的二十四小时罢工，抗议反动当局对他们进行政治迫害和剥夺他们的自由权利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fdcb582e7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
