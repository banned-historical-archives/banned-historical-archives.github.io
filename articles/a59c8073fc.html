art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席讲话给了美帝当头棒官兵们警告侵略者；小心脖子！","authors":[],"parts":[{"type":"paragraph","text":"本报讯 毛主席在最高国务会议上的讲话给广大指战员极大的鼓舞。"},{"type":"paragraph","text":"福建前线海军某炮艇部队的官兵，在谈到美舰的挑衅时说：“美国军舰为了给金门的蒋贼军撑腰壮胆，一次再次地侵入我国领海，这是严重的挑衅行为，假如美国不顾中国人民的警告，继续侵犯我国领海，我们将会像对待江字号和永字号一样地对付他们。”施汉贤大尉读了毛主席在最高国务会议上的讲话后说：“主席对时局的分析，是六亿人民对美帝的一个当头棒喝，如果美国要继续疯狂下去，套在它脖子上的绞索一定会越拉越紧。”"},{"type":"paragraph","text":"本报讯 毛主席在最高国务会议上对国内外形势的讲话，大大鼓舞了驻京部队官兵。"},{"type":"paragraph","text":"刊登着主席讲话的报纸到了6006部队十四支队后，在朝鲜集体荣立二等功的三排，个个争先阅读，热烈开展讨论。排长于仲秋看了毛主席的讲话以后说，毛主席的讲话，给了我们很大鼓舞，美国这个纸老虎在朝鲜就被我们戳穿了。如果美帝国主义坚持它的侵略政策，阻挠我们解放自己的领土——台湾，我们就给它比在朝鲜更为沉重的打击。正在紧张进行训练的炮兵某部队，阅读和座谈了毛主席的讲话。曾立一等战功的某连炮四班战士举着拳头说，我们一定记住毛主席的教导，提高警惕性，敌人不肯放弃侵略政策，我们就用武力来保卫和平。"},{"type":"paragraph","text":"北京公安总队某部七连在讨论毛主席讲话的座谈会上，战士张治安说：如果美帝国主义敢于在台湾地区发动战争，我们就拉紧手里的绳子，狠狠地勒死这些美国战争贩子。"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a59c8073fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
