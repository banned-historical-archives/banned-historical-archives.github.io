"北京地质勘探学院","袁铁铮"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"我们完全支持马万钧老师！","type":"title"},{"text":"北京地质勘探学院袁铁铮","type":"authors"},{"text":"在帮助党整风的同时，我们不难看到有些个别的人，在向帮助党整风的马万钧老师进行人身的攻击和粗暴的谩骂，根本不是同志式的态度，我们说这是不应该的，是不对的，是混淆当前整个运动发展的，谁都清楚，目前是整党风，可是你们呢？!!!","type":"paragraph"},{"text":"应该指出，你们的矛头对错了方向，作为马万钧老师来说，我们是应该欢迎的，他揭发了许多事实，同时，我们衷心希望今后马老师揭发更多的事实证据来帮助党整好风，另外，你们断章取义去理解马老师的讲话，这也是大错而特错的，「共产党根本不同于国民党」。这是人所周知的，不应从一句话两句话就自己臆断人家是立场原则问题。「言者无罪」这句话让我们共同再体会一下，是很有必要的。","type":"paragraph"},{"text":"我们完全支持马万钧老师的「大鸣大放」希望马老师继续揭发事实。我们坚决反对在此整风同时把矛头指向马万钧老师！","type":"paragraph"},{"text":" 304．5袁铁铮等十六人","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9541da675e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
