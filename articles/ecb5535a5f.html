ors":[],"dates":[{"year":1957,"month":11,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席、刘少奇委员长、周恩来总理"},{"type":"paragraph","text":"电贺阿尔巴尼亚独立和解放纪念日"},{"type":"paragraph","text":"新华社27日讯　我国国家领导人26日致电阿尔巴尼亚人民共和国国家领导人，祝贺阿尔巴尼亚民族独立四十五周年和阿尔巴尼亚解放十三周年。电文如下：阿尔巴尼亚人民共和国人民议会主席团主席哈·列希同志，阿尔巴尼亚人民共和国部长会议主席穆·谢胡同志，阿尔巴尼亚劳动党中央委员会第一书记恩·霍查同志："},{"type":"paragraph","text":"当阿尔巴尼亚民族独立四十五周年和阿尔巴尼亚解放十三周年纪念日的时候，我们谨代表中国人民和中华人民共和国政府向你们，并且通过你们，向兄弟的阿尔巴尼亚人民和阿尔巴尼亚人民共和国政府致衷心的、热烈的祝贺。"},{"type":"paragraph","text":"四十五年前，英勇的阿尔巴尼亚人民，为了反对土耳其的黑暗统治、争取民族解放而进行的不屈不挠的斗争，大大地鼓舞了被压迫人民争取民族解放的胜利信心。后来，在反法西斯的解放斗争中，阿尔巴尼亚人民在阿尔巴尼亚劳动党的领导下所表现出的英勇、刚毅、坚忍不拔、克服困难的精神，受到了反法西斯各国人民的普遍赞扬。"},{"type":"paragraph","text":"十三年来，阿尔巴尼亚人民在阿尔巴尼亚劳动党的领导下，在建设社会主义，提高人民生活，加强以苏联为首的社会主义阵营各国间的团结和维护世界和平的事业中，获得了巨大的成就。中国人民对于这些成就感到极大的欢欣鼓舞。"},{"type":"paragraph","text":"近年来，中阿两国人民间的友好合作关系获得了很大的发展。以彭真同志为首的中华人民共和国全国人民代表大会代表团和以里塔·马尔科同志为首的阿尔巴尼亚人民共和国人民议会代表团的相互访问，进一步加强了这种友好合作关系。"},{"type":"paragraph","text":"祝兄弟的阿尔巴尼亚人民在建设幸福生活和维护世界和平和人类进步的事业中获得更大的成就。祝中、阿两国人民间的兄弟友谊和合作日益巩固和发展。\t中华人民共和国主席、中国共产党中央委员会主席　　毛泽东\t中华人民共和国全国人民代表大会常务委员会委员长　刘少奇\t中华人民共和国国务院总理兼外交部长    　　　　　周恩来\t\t    一九五七年十一月二十六日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ecb5535a5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
