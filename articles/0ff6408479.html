art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓副总理会见西班牙国王的父母"},{"type":"paragraph","text":"国务院副总理邓小平五月十四日上午会见西班牙国王胡安·卡洛斯一世的父母巴赛罗那伯爵夫妇及其一行。"},{"type":"paragraph","text":"会见时，邓小平副总理同巴赛罗那伯爵殿下进行了友好的谈话，并请巴赛罗那伯爵殿下回国后转达他本人对胡安·卡洛斯国王的问候。邓副总理还表示，希望今后更多的西班牙朋友来访，以增进彼此的了解和友谊。"},{"type":"paragraph","text":"巴赛罗那伯爵说，在中国实现四个现代化进程中，我们希望扩大西中两国间的合作。"},{"type":"paragraph","text":"罗马尼亚政府副总理率政府代表团抵京"},{"type":"paragraph","text":"由罗马尼亚社会主义共和国政府副总理保罗·尼古列斯库率领的罗马尼亚政府代表团，五月十四日下午乘飞机到达北京。"},{"type":"paragraph","text":"代表团是前来参加即将在北京举行的中罗经济技术合作委员会首次会议的。国务院副总理陈慕华，外经部副部长汪道涵，煤炭部副部长许在廉，石油部副部长秦文彩等到机场欢迎。"},{"type":"paragraph","text":"罗马尼亚驻中国大使馆临时代办道洛班楚也到机场迎接。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ff6408479"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
