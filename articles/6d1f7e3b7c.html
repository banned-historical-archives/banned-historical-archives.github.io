"authors":[],"dates":[{"year":1966,"month":1,"day":17}],"is_range_date":false,"parts":[{"text":"中共中央、国务院关于中央各部门档案备战工作的批示","type":"title"},{"text":"中央各部委，国家机关各党组、党委，中央军委，各中央局，各省、市、自治区党委：","type":"appellation"},{"text":"中央和国务院同意国家档案局《关于中央各部门档案备战意见的报告》，现发给你们，请即研究执行。","type":"paragraph"},{"text":"档案的备战工作，是整个备战工作的一部分。必须突出政治，克服和平麻痹思想，加强领导，全面规划，抓住重点，抓紧时间，进一步切实做好清理、鉴定和保密工作。既要保证切实做好一切必要的准备工作，确保党和国家的机密，保证平时和战时以至战后的需要，又必须坚持节约原则，反对浪费。除中央档案的后库已有安排外，中央各部委的档案后库由中央办公厅统一计划，政府各部门的档案后库由国务院秘书厅统一计划，要尽量利用现有大小三线建设中的企业事业单位，作为各部门各省市的档案后库。","type":"paragraph"},{"text":" 中共中央国 务 院一九六六年一月十七日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d1f7e3b7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
