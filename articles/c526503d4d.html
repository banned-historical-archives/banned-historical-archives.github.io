,"authors":["杨义"],"dates":[{"year":1964,"month":3,"day":13}],"is_range_date":false,"parts":[{"text":"山西省很多“四清”试点时间长达五六个月","type":"title"},{"text":"杨义","type":"authors"},{"text":"据山西省四清办公室最近统计，在一百五十个“四清”试点中，三四个月完成的有十九个大队，五个月完成的有九十四个大队，六个月以上完成的有三十七个大队，有的时间长达七个月，有的现在还没完全结束。","type":"paragraph"},{"text":"这些时间搞得比较长的试点，有的是高得很仔细，有的是大队本身问题大，有的赶上农忙，有的则是工作组发动群众不够，扎根不正，对形势估计有问题，走了一段弯路。另外，不少试点工作组存在着以搞好为原则不计时间的倾向。","type":"paragraph"},{"text":"最近山西省委要求各地在坚持下硬功夫把“四清”搞深搞透的基础上，要注意研究工作方法，总结经验，争取快一些。（新华社山西分社杨义）","type":"paragraph"},{"text":"来源：１９６４年３月１３日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c526503d4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
