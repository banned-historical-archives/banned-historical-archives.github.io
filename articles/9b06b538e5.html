rs":[],"dates":[{"year":1969,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十日电　莫斯科消息:苏修社会帝国主义在对外加紧侵略和扩张的同时，在国内竭力强化资产阶级专政。目前，苏修叛徒集团正在苏联全国的所有市和区的基层组织中加强“内务”机构，以维护“法制”和“社会治安”为名，肆意对苏联人民进行特务监督、审讯和迫害，苏修叛徒集团的所谓“内务”机构就是对苏联人民实行法西斯统治的一个重要工具。苏修内务部副部长舒米林五月十五日在苏修《消息报》上发表文章露骨地叫嚷，“内务机构的活动必须符合我们面临的任务”。这就是说，苏修叛徒集团要变本加厉地对苏联革命人民进行残暴的法西斯镇压。"},{"type":"paragraph","text":"据透露，今年以来，苏修叛徒集团在苏联全国要地、特别是在那些阶级矛盾最尖锐、人民反抗日益高涨的地区，猖狂地实行法西斯统治。在乌克兰、乌兹别克、格鲁吉亚、拉脱维亚等加盟共和国，在俄罗斯联邦的伏尔加格勒州一原斯大林格勒州)、列宁格勒州和斯维尔德洛夫斯克州，以及靠近中苏边境的阿尔泰边疆区等地，大大扩充了“内务”机构，并且肆无忌惮地加强了特务镇压活动。苏修叛徒集团不惜拨出巨款为这些地区的，“内务”机构建造“行政楼”、“汽车库”、“训练所”，并为值勤部队配备了现代化设备。为了强化法西斯特务活动，苏修叛徒集团把大批死心塌地为他们卖命的人补充到“内务”机构中去，撤换那些执行镇压政策不力的人。"},{"type":"paragraph","text":"据苏修报刊供认，苏修各级“内务”机构的活动，目前已经遍及工厂、农庄以及居民点。他们丧心病狂地叫嚷什么对任何一件所谓“违反制度的事情都会有人过问”。在“内务”机构工作的人“被授予很大的权力”，要他们坚决消除所谓“破坏纪律”的情况，监督“每一个”反抗苏修叛徒集团的苏联人民。苏修叛徒集团甚至让“内务”机构人员随意到基层单位把所谓“不可救药的闹事者”找去，进行特务审讯和迫害。法西斯统治的白色恐怖笼罩着苏联国土。"},{"type":"paragraph","text":"苏修叛徒集团通过“内务”机构干的明明是法西斯特务勾当，却还无耻地说什么“完成这些任务就是对劳动人民进行共产主义教育事业”作出了“重大贡献”。这种法西斯强盗逻辑不仅是对共产主义的莫大污辱，而且也是他们社会帝国主义、社会法西斯主义反动嘴脸的大暴露。"},{"type":"paragraph","text":"苏修叛徒集团对于苏联人民所作的种种迫害，归根结底只能促进苏联人民对他们的反动统治更广泛、更剧烈的革命。苏修叛徒集团被彻底埋葬的日子不会太远了。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b06b538e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
