ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"卜算子·咏梅","alias":"","parts":[{"type":"paragraph","text":"卜算子·咏梅"},{"type":"paragraph","text":"（1961年12月）读陆游咏梅词，反其意而用之。"},{"type":"paragraph","text":"风雨送春归，飞雪迎春到。已是悬崖百丈冰，犹有花枝俏。俏也不争春，只把春来报。待到山花烂漫时，"},{"type":"paragraph","text":"她在丛中笑。"},{"type":"paragraph","text":"[1]陆游（1125—1210），字务观，号放翁，山阴（今浙江绍兴）人，南宋爱国诗人。他生在封建统治阶级向外来侵略势力委曲求和的时代，爱国抱负不为时用，晚年退居家乡。他在《咏梅》词中表现出孤芳自赏、凄凉抑郁的调子。本词用陆游原调原题，但情调完全相反，所以说“反其意而用之”。"},{"type":"paragraph","text":"卜算子·咏梅附：陆游原词"},{"type":"paragraph","text":"卜算子·咏梅"},{"type":"paragraph","text":"驿外川断桥边，寂寞开无主。已是黄昏独自愁，更著风和雨。无意苦争春，一任群芳妒。零落成泥碾作尘，"},{"type":"paragraph","text":"只有香如故。"},{"type":"paragraph","text":"[1]驿外，指驿站附近。古代官办的供传递公文的人中途住宿和换马的处所，称驿站。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":508,"page_end":509},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"110c588388"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
