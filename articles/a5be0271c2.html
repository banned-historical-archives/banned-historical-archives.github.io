民坚决同帝国主义和修正主义展开斗争","authors":[],"dates":[{"year":1968,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏丹朋友欢呼中共八届十二中全会公报发表"},{"type":"paragraph","text":"文化大革命对亚非拉革命人民有深远意义"},{"type":"paragraph","text":"苏丹人民坚决同帝国主义和修正主义展开斗争"},{"type":"paragraph","text":"新华社喀土穆十二日电　苏丹朋友热烈欢呼中国共产党第八届扩大的第十二次中央委员会全会的伟大历史意义。"},{"type":"paragraph","text":"一位苏丹朋友说：“中国无产阶级文化大革命的光辉照亮了全世界，它不仅对革命的中国人民，而且对世界各地斗争中的人民，特别是对非洲、亚洲和拉丁美洲的斗争中的人民，都具有深远的意义。”"},{"type":"paragraph","text":"这位朋友热情地说：“当我们欢呼在伟大的马克思列宁主义者毛泽东同志领导下所取得的无产阶级文化大革命的胜利时，我们斗争中的非洲人民和阿拉伯人民表示一定要高举毛泽东思想的革命红旗。”"},{"type":"paragraph","text":"这位朋友最后高呼：“光辉的毛泽东思想万岁！中国人民的伟大成就万岁！各国人民反对帝国主义和现代修正主义的斗争万岁！”"},{"type":"paragraph","text":"另一位苏丹朋友说：“毛主席在中国共产党八届十一中全会上发出了摧毁资产阶级司令部的号召。这个号召照亮了无产阶级文化大革命的道路，这是毛泽东思想的一个伟大胜利。”"},{"type":"paragraph","text":"这位朋友还谈到在毛泽东思想伟大红旗指引下，中国无产阶级文化大革命在各个战线上所取得的巨大成就。他说：“这一切都清楚地证明了，由毛泽东同志领导的中国共产党，是马克思列宁主义的、革命的无产阶级的党。”"},{"type":"paragraph","text":"这位朋友热情高呼：祝愿毛泽东主席万寿无疆！中国人民的革命胜利万岁！革命人民反对帝国主义和修正主义的斗争万岁！"},{"type":"paragraph","text":"还有一位苏丹朋友说，毛泽东主席的指示对中国无产阶级文化大革命的胜利，对摧毁以刘少奇为代表的资产阶级司令部，起了巨大的作用。中国各省、市、自治区（除台湾省外）成立了革命委员会，这标志着刘少奇及其在各地的代理人妄图把无产阶级专政变为资产阶级专政的反革命阴谋的破产。"},{"type":"paragraph","text":"在谈到全会公报中指出的美帝和苏修妄图重新瓜分世界，互相勾结，又互相争夺时，这位苏丹朋友说，我们不会忘记，苏修领导集团在中东危机中扮演了美帝国主义帮凶的角色。"},{"type":"paragraph","text":"这位朋友表示，苏丹人民将坚决同殖民主义、帝国主义和修正主义展开斗争。他说：“我们将永远依靠毛泽东思想，因为这是真正马克思列宁主义的思想，能够击败和赶走以美国为首的国际帝国主义和以苏联现代修正主义统治集团为首的修正主义。”"},{"type":"paragraph","text":"他说：“我们苏丹人民不会忘记中国人民和中国共产党在国际上支援亚洲、非洲和拉丁美洲一切解放运动的作用。”"},{"type":"paragraph","text":"他最后高呼：“伟大的毛泽东思想万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5be0271c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
