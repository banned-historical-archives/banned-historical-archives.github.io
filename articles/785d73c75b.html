art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《跟随毛主席长征》出版等二则","authors":["张进平/卞克/张振海"],"parts":[{"type":"paragraph","text":"《跟随毛主席长征》出版"},{"type":"paragraph","text":"军旅作家李文庆创作的《跟随毛主席长征》，近日由青岛出版社出版。作者把创作思路定位在“以孩子的视角，写孩子的情感，讲孩子的故事”上，以长征中重大事件为背景，以小红军们在长征中的衣食住行、喜怒哀乐、生死离别的曲折经历为主线，从一个独特的视角展现了红军长征的艰苦历程和伟大壮举。作者翻阅了大量史料，并沿当年中央红军长征的路线进行了实地采风，采访了多个当年的小红军，因之故事鲜活，人物生动，非常适合少年儿童的阅读口味。（张进平、卞克）"},{"type":"paragraph","text":"《历史上的那些人和事儿》出版"},{"type":"paragraph","text":"徐怀谦的《历史上的那些人和事儿》，近日由昆仑出版社出版。作者是写杂文的，力图通过讲述历史上的那些人和事儿，借鉴历史的经验教训，使我们的生活更有滋味，使我们的世界更加纯洁。（张振海）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"785d73c75b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
