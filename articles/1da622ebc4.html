　李牧平"],"dates":[{"year":1989,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"污损天安门城楼毛泽东画像"},{"type":"paragraph","text":"余志坚等三名罪犯被判刑"},{"type":"paragraph","text":"本报北京8月11日讯　轰动一时的污损天安门城楼毛泽东画像案，今天在此间公开宣判。三名湖南案犯因犯有反革命破坏罪、反革命煽动罪，分别被北京市中级人民法院判处徒刑。"},{"type":"paragraph","text":"湖南浏阳县达浒乡滩头小学教师余志坚被判处无期徒刑，剥夺政治权利终身；湖南浏阳报社美术编辑喻冬岳被判处有期徒刑20年，剥夺政治权利5年；湖南省汽车运输公司浏阳分公司工人鲁德成被判处有期徒刑16年，剥夺政治权利4年。"},{"type":"paragraph","text":"司法机关通过调查核实，现已认定，1989年5月18日在湖南长沙火车站邮局附近，由余志坚授意、喻冬岳执笔书写了反动的大型横幅，以及数条反动标语，张挂在长沙火车站前广场，并当众发表反动讲演，进行反革命宣传煽动。当日晚，余志坚、喻冬岳、鲁德成在来北京的火车上，合谋撰写了诬蔑我国社会主义制度、取消四项基本原则、主张全盘西化的反动讲演稿。"},{"type":"paragraph","text":"这三名案犯5月19日到达北京后，混入人群，参加非法游行。为煽动推翻人民民主专政的政权和社会主义制度，制造事端，三人于5月23日将悬挂在天安门城楼上的毛主席画像及天安门城墙污损。"},{"type":"paragraph","text":"（卢云华　李牧平）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1da622ebc4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
