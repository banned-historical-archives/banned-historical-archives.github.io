78,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"五爱中学学生陈伐的文章值得一读。这是一个青年学生用自己的切身体会批判“四人帮”的檄文；又是他从“四人帮”的毒害下解放出来，准备高歌猛进的决心书!"},{"type":"paragraph","text":"万恶的“四人帮”疯狂推行“两个估计”，抡起“九斤老太”之类的棍子，既残暴地打击了广大革命教师，又搞乱教育，严重地残害了我们的青少年一代。在“四人帮”控制的地方，流氓行为被誉为“勇敢顽强”，捣乱破坏被捧为“造反有理”，逃学旷课被说成“不当小绵羊”，如此等等，不一而足。“四人帮”在上海的一个余党，挂着文教书记的头衔，竟跑到学校里去同小流氓握手言欢，结成朋友。你说怪，也不怪，这就是“四人帮”嘛!在万恶的旧社会，反动统治阶级曾经迫使象陈伐这样的同学的父辈或祖辈当文盲，活受罪；今天，万恶的“四人帮”又蓄意搞乱教育，要让陈伐和千万个象陈伐那样的青少年走上歪路，成为七十年代的文盲，成为他们复辟资本主义的社会基础。“四人帮”真象日本鬼子和蒋匪帮那样凶残。今天，我们一定要怀着过去打日本鬼子和打蒋匪帮那样的仇恨，去同“四人帮”作殊死的斗争。我们要坚决支持陈伐同学，向“四人帮”及其余党讨还青春!"},{"type":"paragraph","text":"向“四人帮”讨还青春，我们广大青少年要以揭批“四人帮”为纲，振奋起革命精神，把被“四人帮”糟踏的时间追回来。肃清了“四人帮”的流毒，人的精神面貌就会有很大的改变。陈伐同学就是一个例证。他在老师的帮助下，分清了是非，砸烂了“四人帮”及其余党套在他身上的精神枷锁，思想面貌焕然一新，学习上也迅速长进，成了一个很有希望的好青年。希望我们的学校，我们的教师，我们的青少年学生，都来积极参加揭批“四人帮”的第三战役，肃清“四人帮”的流毒，加强人的思想革命化，紧跟英明领袖华主席干革命。"},{"type":"paragraph","text":"伟大的领袖和导师毛主席曾经语重心长地对青年人说:“世界是你们的，也是我们的，但是归根结底是你们的。你们青年人朝气蓬勃，正在兴旺时期，好象早晨八、九点钟的太阳。希望寄托在你们身上。”青少年们，任重而道远，加倍努力啊!为了实现四个现代化，让我们的青春焕发出灿烂的光芒吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b81d4d9c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
