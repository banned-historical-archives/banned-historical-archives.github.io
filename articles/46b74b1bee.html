s":[{"year":1966,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二日电　由两千多名首都红卫兵组成的合唱队，同广州部队海上文化工作队和一九六六年“哈尔滨之夏”音乐会工农兵业余演出队，今晚在首都工人体育馆举行盛大文艺晚会，招待来自全国各地的工农代表、少数民族代表，回国观光华侨和港澳同胞，以及来自五大洲的反帝革命战士和其他国际友人，热烈庆祝中华人民共和国成立十七周年。"},{"type":"paragraph","text":"今晚，宏伟的北京工人体育馆呈现一派热烈欢腾的景象。红卫兵和工农兵演员，高举毛泽东文艺思想红旗，大唱革命歌，大跳革命舞，歌颂我们伟大领袖毛主席，歌唱战无不胜的毛泽东思想。这些演出充分表现了正在胜利进行无产阶级文化大革命的我国革命人民的精神面貌。"},{"type":"paragraph","text":"各方面的负责人陶铸、康生、朱德、陈毅、刘宁一、杨成武、江青、杨明轩、赛福鼎、高崇民、蔡廷锴、李四光、傅作义、谢觉哉、沈雁冰、李德全、杨秀峰、张鼎丞等，出席晚会观看了演出。"},{"type":"paragraph","text":"应邀出席晚会的外宾中，有澳大利亚共产党(马克思列宁主义者)主席爱·弗·希尔和夫人，索马里国民议会友好代表团团长、国民议会议长谢赫·穆克塔尔·穆罕默德·侯赛因，巴基斯坦友好代表团团长阿卜杜勒·穆奈姆·汗，坦桑尼亚友好代表团团长基顿杜，锡兰共产党中央政治局委员、书记处书记纳·桑穆加塔桑，越南南方民族解放阵线常驻中国代表团代理团长阮明芳，亚非作家常设局秘书长森纳那亚克和夫人，安哥拉民族解放运动战士达克鲁斯和夫人，亚非新闻工作者协会总书记查禾多和夫人，日中友协副会长黑田寿男，著名美国黑人领袖罗伯特·威廉和夫人，柬中友协代表团团长兰·涅特，刚果(布)政府经济代表团团长达·科斯塔·克劳德·安托万，阿尔巴尼亚石油代表团团长泽内尔·哈米蒂，还有在北京的其他外国朋友，帮助我国建设的各国专家，以及各国驻中国的使节。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46b74b1bee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
