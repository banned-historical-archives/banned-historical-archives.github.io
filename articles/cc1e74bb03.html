东师范学院","曹亮清","牟光信","田仲济"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"山东师范学院右派言论","type":"title"},{"text":"山东师范学院牟光信曹亮清田仲济","type":"authors"},{"text":"“听了毛主席在最高国务会议上和全国宣传工作会议上的报告后，我非常高兴，很感动，甚至感动得有些怀疑。就好像一连生了五个女孩子，等生第六个孩子时：是男孩子，也不大信，毛主席的这些话能实现吗？毛主席讲话随随便便，说什么要出蒋介石全集？要叫别人说这话又要给扣上个反革命分子的帽子了。我看他没有经过思想改造，没尝受让学生骑在脖子上的滋味。”（山东师范学院  牟光信）","type":"paragraph"},{"text":"“现在精神上压抑的痛苦，比受地主资本家的剥削还厉害。”（山东师范学院  曹亮清）","type":"paragraph"},{"text":"“一个运动接着一个运动，那必然影响经常工作，运动不能没有也不可太多，多了就使人人有一种等待运动解决问题的思想。我对在运动中算总账非常反感，现在在政治上养成了算总账的习惯，所以有‘过关’的说法。”（山东师范学院  田仲济）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc1e74bb03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
