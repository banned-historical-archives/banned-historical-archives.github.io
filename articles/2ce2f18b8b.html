"authors":[],"dates":[{"year":1967,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国文化大革命开辟人类历史新纪元"},{"type":"paragraph","text":"叙利亚出版《中国无产阶级文化大革命》文件汇编"},{"type":"paragraph","text":"新华社大马士革三十一日电　大马士革出版社最近出版《中国无产阶级文化大革命》一书。这本书是根据中国文化大革命以来中国发表的许多重要文件编译的。"},{"type":"paragraph","text":"编译者在这本书的前言中说：中国无产阶级文化大革命，是世界上最深刻的阶级斗争，它开辟了社会主义历史和人类历史的新纪元。这场革命的伟大意义已超出了中国的范围。"},{"type":"paragraph","text":"前言说：毛泽东思想是这场文化大革命的旗帜和强大的理论基础。毛泽东思想是现阶段活的马克思列宁主义，是当代无产阶级革命思想的顶峰。前言说：一条正确的路线始终贯穿在中国的无产阶级文化大革命中，它指导着这场革命向前进。这就是以毛泽东主席为代表的无产阶级革命路线。伟大的导师和思想家毛主席，早在二十年前就已论述了这场文化革命的概貌。"},{"type":"paragraph","text":"前言还赞扬说：中国的革命文化在思想性和艺术性方面都是与西方资产阶级文化对立的，它是世界上无可比拟的新文化，它是目前随着社会主义制度走向全面胜利而即将普及全世界的社会主义新文化的最大的火炬和最亮的明星。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ce2f18b8b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
