tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"培训学习毛主席著作辅导员迎接学习毛主席著作新高潮","authors":["陈石党"],"parts":[{"type":"paragraph","text":"本报讯 七○八七部队党委为了贯彻执行林彪同志的指示，最近培训了一批班、排学习毛主席著作辅导员。"},{"type":"paragraph","text":"过去，各连的学习毛主席著作活动，主要依靠政治指导员和班、排长组织。为了把学习毛主席著作抓得更紧，落实得更好，部队党委决定培训一批学习辅导员，作为领导组织学习的助手。集训的主要内容是学习“老三篇”。他们启发大家运用“老三篇”的基本观点，以英雄人物为榜样，联系思想，狠抓世界观的改造，使辅导员既学到了文章的基本观点，又改造了思想。经过集训，许多同志都能熟记“老三篇”的主要内容和几十条毛主席语录，思想改造有收获，好人好事大大增多，对毛主席著作更加热爱。他们表示，回去后一定要按照林彪同志的要求，最热情地宣传毛泽东思想，最忠实地执行毛主席的指示。（陈石党）"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"234580cf3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
