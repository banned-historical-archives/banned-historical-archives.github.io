["杨成武"],"dates":[{"year":1967,"month":10,"day":10}],"is_range_date":false,"parts":[{"text":"杨成武对解放军测绘学院的指示","type":"title"},{"text":"杨成武","type":"authors"},{"text":"〖时间：18时〗","type":"appellation"},{"text":"学校大联合问题请李、王付总长抓一下，找测绘学院两派共同商量一下，让他们先行一步，做出个榜样来。","type":"paragraph"},{"text":"总参首长指示：","type":"paragraph"},{"text":"1、按班、队、系实行革命大联合和组成三结合领导班子。","type":"paragraph"},{"text":"2、关于复课闹革命问题，首先要复毛泽东思想的课。学习最新指示。","type":"paragraph"},{"text":"商谈代表：两派派出相等数量的代表，各五人，主要勤务员要参加，包括参加组织的革命领导干部在内。","type":"paragraph"},{"text":"院、部、系的领导干部，双方马上协商，只要双方能够同意的都可参加（数量不限）。如果部里找不出适当人时，处的干部也可以，部的最好有人参加，特别是院务部和政治部要有领导干部参加。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"杨成武","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aad013252d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
