script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命委员会成立后首先抓什么？  武汉市革委会召开首次会议，决定进一步办好毛泽东思想学习班，狠抓领导班子思想革命化，全面落实毛主席最新指示","authors":[],"dates":[{"year":1968,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命委员会成立后首先抓什么？"},{"type":"paragraph","text":"武汉市革委会召开首次会议，决定进一步办好毛泽东思想学习班，狠抓领导班子思想革命化，全面落实毛主席最新指示"},{"type":"paragraph","text":"据新华社武汉十五日电　不久前成立的武汉市革命委员会最近召开第一次会议，决定进一步在全市更加广泛深入地开展活学活用毛泽东思想，全面落实毛主席最新指示的群众运动。"},{"type":"paragraph","text":"会议号召武汉市各级革命委员会和全市革命人民，把全面落实毛主席的最新指示，作为当前最重要、最根本的战斗任务。要以更大的热情，更高的自觉，更新的战斗姿态，更快的速度，认真学习，坚决执行，热情宣传，勇敢捍卫毛主席的最新指示，紧跟毛主席的伟大战略部署，去夺取无产阶级文化大革命的全面胜利。"},{"type":"paragraph","text":"会议指出，进一步大办、办好毛泽东思想学习班，是开展活学活用毛泽东思想群众运动的好方法，是条条落实、全面落实毛主席最新指示的关键。抓住这个关键，让毛主席最新指示为广大群众所掌握，变成群众自觉的革命行动，形势就会发生突飞猛进的变化。会议要求各级革命委员会、各革命群众组织以及一切工矿企业、郊区人民公社、学校、机关、街道，都要继续大办、办好各种类型的毛泽东思想学习班，让毛泽东思想学习班遍及武汉全市，让毛主席的最新指示更加深入人心，加强人的思想革命化，从而进一步巩固和发展革命的大联合和革命的三结合，促进革命的大批判和各单位斗、批、改的深入发展。"},{"type":"paragraph","text":"会议认为，必须大力发扬毛主席亲自倡导的革命学风。对待毛泽东思想，对待毛主席的最新指示，一定要在行动上落实。要真正做到学用结合，言行一致，立竿见影；要在灵魂深处爆发革命，大破资产阶级的“私”字，大立无产阶级的“公”字。以毛主席的最新指示为武器，坚决打倒资产阶级、小资产阶级派性，发动一场围剿派性的“人民战争”。"},{"type":"paragraph","text":"会议要求各级革命委员会都要以林副主席为榜样，无限忠于毛主席，把毛泽东思想伟大红旗举得高高的，把学习毛泽东思想的阶级感情搞得深深的，把活学活用毛泽东思想作为生命的第一需要。要用毛泽东思想统帅一切，改造一切。要突出无产阶级政治，坚持四个第一，大兴三八作风。"},{"type":"paragraph","text":"会议特别强调，领导班子的思想革命化，是掌好权，用好权，全面落实毛主席最新指示的关键。各级革命委员会领导成员必须带头活学活用毛泽东思想，彻底改造世界观，要政治挂帅，到群众里面去，在火热的群众革命斗争中经风雨，见世面，和群众在一起，斗私批修，破私立公，做群众的小学生。各级领导班子都要把领导好活学活用毛泽东思想，全面落实毛主席最新指示的群众运动，当成自己首要的职责，根本的任务。要认真贯彻执行毛主席“抓革命促生产，促工作，促战备”的伟大方针。"},{"type":"paragraph","text":"武汉市革命委员会的这次会议，是采用会内会外结合的方法进行的。会议期间，他们把会场搬到正在汉阳轧钢厂交流基层革委会工作经验的现场会上去，就地举行了进一步广泛深入开展活学活用毛泽东思想群众运动，全面落实毛主席最新指示的誓师大会，使这次市革委会的决议和决定很快地同参加现场会的武汉各工厂、企业、学校、机关革委会的两千多名代表见面，迅速传达到全市广大革命群众中去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb5256a5b3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
