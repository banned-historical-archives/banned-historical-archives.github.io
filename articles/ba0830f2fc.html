tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东军事思想研究软件系统通过鉴定","authors":["包国俊/姜文明"],"parts":[{"type":"paragraph","text":"本报北京11月22日讯 包国俊、特约记者姜文明报道：由军事科学院组织研制的“毛泽东军事思想研究软件系统”，今天在北京通过专家技术鉴定。"},{"type":"paragraph","text":"这个系统是毛泽东军事理论研究与计算机技术相结合的最新成果，具有先进而实用的专题检索功能。该系统对《毛泽东军事文集》一至六卷进行了全部标引，依据毛泽东军事思想科学体系理论结构，建立了三级专题框架，确定了人民战争、人民军队、战略战术、国防建设和军事辩证法等5个一级专题、24个二级专题、148个三级专题，基本覆盖了毛泽东军事思想的各个方面，反映了军事理论界权威性的最新研究成果。按照该系统设定的专题框架可以根据需要，方便地查找各个层次、各个历史时期和各个专题的资料。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba0830f2fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
