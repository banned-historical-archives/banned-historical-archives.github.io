ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"开敌后考虑主力北上","alias":"","parts":[{"type":"paragraph","text":"歼敌后考虑主力北上]"},{"type":"paragraph","text":"（1948年7月14日）许、谭，并告粟："},{"type":"paragraph","text":"攻克充州甚慰。"},{"type":"paragraph","text":"（一）你们将九纵插入大汶口以北，切断八十四师退路，准备歼灭八十四师甚为正确。我们要你们以九纵打济宁之提议取消。（二）八十四师歼灭后，请考虑以主力立即北上，占领济南飞机场，筑工固守，使敌不能向济南增兵，以利尔后夺取济南，另以一部攻歼济宁、汶上之敌。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"寒寅"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军山东兵团司令员许世友和政治委员谭震林的电报。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":347,"page_end":347},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdc9602155"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
