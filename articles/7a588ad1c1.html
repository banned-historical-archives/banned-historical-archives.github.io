script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真总结群众批邓的经验——山西平顺县委向群众学习，掌握领导批邓斗争的主动权","authors":[],"dates":[{"year":1976,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"认真总结群众批邓的经验"},{"type":"paragraph","text":"——山西平顺县委向群众学习，掌握领导批邓斗争的主动权"},{"type":"paragraph","text":"在深入批判邓小平反革命的修正主义路线，反击右倾翻案风的伟大斗争中，中共平顺县委遵照毛主席关于“群众是真正的英雄”，“往往是下级水平高于上级，群众高于领导，领导不及普通劳动者，因为他们脱离群众，没有实践经验”的教导，认真改进领导作风，深入群众，调查研究。他们在同群众一起战斗的过程中，认真总结群众的斗争经验，运用典型引路的办法，进一步发展了全县革命和生产的大好形势。"},{"type":"paragraph","text":"今年初，当反击右倾翻案风的斗争全面展开的时候，中共平顺县委决定召开一次骨干会议，进行一次全面发动。但是，怎样才能引导广大群众开展这场伟大的斗争呢？怎样才能使大批判有声有色，成效显著呢？在筹备会议的过程中，县委几次开会研究，都没拿出一个比较好的方案来。为了取得第一手材料，县委领导成员迈开双脚，深入基层，先后在七个公社三十多个大队作了比较详细的调查。广大群众在斗争中的革命精神使县委大开脑筋。尤其是西沟大队采取的抓住重点反复批，联系实际深入批，回忆历史对比批，列成专题逐个批的经验，使县委受到了很大启发。县委同西沟的贫下中农一起，对已经取得的经验作了进一步的总结，并结合全县的实际情况，写成了动员报告。与会人员听了，都感到这个报告明确有力，布置得当。全县反击右倾翻案风的斗争很快形成了高潮。"},{"type":"paragraph","text":"会后，县委联系这件事，重温毛主席关于相信群众，依靠群众，发扬群众的创造性、积极性的有关论述，比较清楚地认识到：广大人民群众是要革命的，是要前进的。他们对毛主席的无产阶级革命路线无比热爱，对邓小平大刮右倾翻案风的罪行无比仇恨。他们那种高度的革命精神，是我们国家的希望所在。他们的斗争经验，是县委指导全县运动的可靠借鉴。带领全县人民战斗的县委，要想站在运动的前列，取得领导运动的主动权，就必须深入群众，认真总结群众的经验。"},{"type":"paragraph","text":"中共平顺县委在斗争实践中认识到，领导干部只有同群众一起战斗，才能发现群众的创造性、积极性，总结出有用的经验。前一段，一些干部认为，现在已经撤销了邓小平党内外一切职务，批判了他推行的那条修正主义路线，况且三夏大忙已经来临，该集中主要精力抓生产了。主持县委工作的副书记王世英到了北头大队，和大队党支部一起访问群众，对这个问题作了分析研究。他们了解到，这种“差不多”思想的来源，在于对资产阶级就在共产党内这一科学论断的重要性认识不足，对斗争的长期性、艰巨性缺乏思想准备。他们就同群众一起探讨：为什么开展了文化大革命和批林批孔运动，邓小平重新工作不久，就又施展全部反革命伎俩，向无产阶级发起猖狂进攻，以至煽动起来天安门广场的反革命政治事件？他们同群众一起回顾党内两条路线斗争的历史和合作化以来本大队的战斗历程，分析修正主义路线的阶级基础和资产阶级赖以生存的土壤和条件，认识到同党内走资派斗争的长期性、复杂性。他们还发动群众总结本大队过去在处理纲目关系上的正反两方面的经验，联系实际，深入批判反动的唯生产力论。大家认识到：批判邓小平反革命的修正主义路线，反击右倾翻案风，是关系到党和国家命运的大事。只有抓好大事，才能推动生产，促进生产。接着，党支部进一步加强了具体领导，集中群众意见，抓重点，列专题，剥画皮，批实质，深入开展对邓小平反革命的修正主义路线的大批判，使这个比较后进的大队出现了崭新的风貌。王世英同志同北头大队的干部和群众一起战斗，然后认真总结了他们的新鲜经验，在全县召开的批判邓小平、反击右倾翻案风，深入开展农业学大寨运动的骨干会议上，作了介绍，对全县批邓运动的深入发展，起了很大的推动作用。"},{"type":"paragraph","text":"中共平顺县委成员，在学习理论方面也认真地向群众学习。在文化大革命中成长起来的县委副书记常福江在一个大队蹲点，贫下中农刻苦攻读革命理论的精神，使他很感动，并且受到群众学习理论紧密联系实际的学风的启发，从理论与实际的结合上搞清楚革命理论的自觉性大为提高。他同大队的理论队伍成员一起学习、一起讨论，吸取群众的智慧，作了关于资产阶级就在共产党内这个问题的辅导报告，很受群众欢迎。"},{"type":"paragraph","text":"领导向群众学习，同群众在一起战斗，及时总结群众的经验，使县委进一步掌握了领导运动的主动权。全县批判邓小平反革命的修正主义路线，反击右倾翻案风的斗争不断深入，农业学大寨、建设大寨县的群众运动开展得有声有色。大家决心以大寨、昔阳为榜样，同修正主义路线对着干，以实际行动批判邓小平，痛击右倾翻案风，夺取各项工作的新胜利。　　　本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"山西文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a588ad1c1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
