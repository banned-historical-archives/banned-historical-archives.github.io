修正草案的指示","authors":[],"dates":[{"year":1957,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"毛泽东撰中央关于组织讨论全国农业发展纲要修正草案的指示","type":"title"},{"text":"各级党委：","type":"appellation"},{"text":"修正的农业纲要四十条今天已经发表，你们应当注意：(一)在全民中展开一次讨论，即在农村、工厂、机关、学校、部队和街道居民中展开一次大辩论，目的在认清方向，坚定信心，人人努力，改造中国。(二)农村讨论应在冬季，以便掀起一个生产高潮，争取一九五八年丰收。讨论时间大约有七个至十个晚上就够了，每一个晚上讨论几条，征求意见。讨论时应以一人逐条宣读，宣读一条，讨论一条。(三)工厂、街道、机关、学校、部队讨论办法大体仿照农村。(四)地方性的问题，应在各级地方规划列入，不可能都列入全国纲要，此点应在讨论结束时加以说明。(五)群众所提修改意见，由省、直属市、自治区党委加以分析，汇报中央。(六)此项辩论与整风的鸣放辩论相辅而行，但时间应分开，应以一段时间专门讨论纲要。(七)群众最有兴趣的问题多作讨论，兴趣不大的问题讨论的时间应当少些。(八)民主党派，知识分子，工商业者应注意组织他们加以讨论。","type":"paragraph"},{"text":" 中央一九五七年十月廿六日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da96c69164"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
