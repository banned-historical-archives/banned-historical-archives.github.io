ar":1946,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"衢州绥靖公署金兰运输站站长王某，最近来本县运输军粮赴金华，彼原拟征用民般载运，嗣因此间溪港水浅，不能行舟，乃改用竹筏，讵该站长竟借词向各民般强收“运输费”共达三万余元，作为竹筏工茁，各船户被剥削之余，心有不甘，已向县方伸诉。(十三日，村)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68ee5acfaf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
