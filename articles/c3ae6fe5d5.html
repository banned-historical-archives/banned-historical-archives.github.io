art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"关于毛主席像章、毛主席语录章及其佩戴方法的说明","authors":[],"parts":[{"type":"paragraph","text":"一、毛主席像章：铝制品，金黄色，五角星形，周围放射光芒。中间为毛主席像。毛主席衣领上戴红领章。毛主席像周围内衬密集小星点，涂紫红色透明烤漆。背面有“做毛主席的好战士”和“中国人民解放军总政治部制”字样。"},{"type":"paragraph","text":"二、“为人民服务”语录章：铝制品，长方形，金边，中间为毛主席亲笔体“为人民服务”五个金字。底涂紫红色清烘漆。背面有“中国人民解放军总政治部制”字样。"},{"type":"paragraph","text":"三、佩戴方法：“为人民服务”语录章，佩戴在上衣左上口袋盖的紧上方；毛主席像章，佩戴在语录章的紧上方。像章和语录章可以单独佩戴，也可以和其他式样的毛主席像章或语录章混合佩戴。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3ae6fe5d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
