art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"是不是毛主席的每句话都属于毛泽东思想？","authors":["钟习"],"parts":[{"type":"paragraph","text":"答："},{"type":"paragraph","text":"有的同志由于受林彪、“四人帮”喧嚣的“句句是真理”的影响，看到今天党中央纠正某些冤、假、错案和过去的一些不适当的说法、做法，就觉得难以理想。其实，只要我们树立了对毛泽东思想体系的正确认识，就可以懂得，我们纠正过去某些错了的东西，恰恰是维护了毛泽东思想这个科学体系的真理性。毛泽东同志生前在领导我国革命的过程中，也是经常纠正自己的某些不符合实际的指示、设想的。譬如，一九五八年，毛泽东同志曾提出过人民公社“一大二公”的论断，但后来，当他发现这不适合我国农村现阶段的生产力水平和群众的觉悟程度时，就主持中央全会纠正了它，作出了“三级所有，队为基础，以生产队为基本核算单位”的新决定。"},{"type":"paragraph","text":"总之，毛泽东思想是经过实践检验的科学真理，是毛主席和老一辈无产阶级革命家共同创造的思想理论财富。随着实践的发展，毛泽东同志著作里某些个别论断可能过时，但毛泽东思想的普遍原理是万古长青的。它过去指引我们取得了革命事业的伟大胜利，今后同样会指导我们夺取四个现代化的胜利。我们应该完整、准确地学习、掌握毛泽东思想的体系，从中汲取力量、智慧，把我们的事业推向前进。（钟习）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a5d1d805b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
