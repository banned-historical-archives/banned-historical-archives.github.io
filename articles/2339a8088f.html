art":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"索引治学与人生的钥匙读徐中远《毛泽东晚年读书纪实》","authors":["刘济西"],"parts":[{"type":"paragraph","text":"徐中远撰写的《毛泽东晚年读书纪实》近日由中央文献出版社出版了。这是一部广受好评的研究毛泽东晚年读书生活的专著，作者却谦虚地说，“我的老本行是图书管理员，不善激扬文字，这本书就权当是为历史记忆编写的一点索引。”"},{"type":"paragraph","text":"索引，是供检索使用的工具书，人们获取知识，索引至关重要。推而广之，我们要想少走弯路、充实阅历、加强思想修养乃至探寻人生意义，一部人生索引何尝不千金难求？此书的独特价值即在于此。“读过一遍，还要读一遍”——读《柳文旨要》；把《红楼梦》当作历史读；读《西游记》，要看他们有个坚定信仰……仅从一条条目录中，就让人感到烛照人生的智慧之光。"},{"type":"paragraph","text":"晚年的毛泽东都读过哪些书，最爱哪些书？作者徐中远很有发言权。1966至1976年间，他一直在毛泽东身边从事图书服务工作，陪伴伟人走过最后10年光阴。他十分珍惜这样的人生记忆，并以自己所见所闻为第一手资料，悉心整理、研究毛泽东批阅过的图书，最后撰成此书。书中详细记录了晚年毛泽东的阅读内容，如马列著作、古典小说、诗词歌赋以及碑帖字画等。图书管理员的职业特长使得作者在叙述时格外深入细致。200多种书籍报刊、百余种书帖墨迹，为我们了解毛泽东晚年读书生活建立了全景图谱。"},{"type":"paragraph","text":"作者还参考大量历史文献，在书中列举了许多毛泽东的谈话、批注、信件等，勾勒出晚年毛泽东的思想脉络。在作者看来，毛泽东具有批判继承和创新发展的文化观，因此他的阅读总能产生独特的思想火花。如读《明史》得出“深挖洞、广积粮、不称霸”的战略方针，等等。这本书就像一把钥匙，将晚年毛泽东的思想之门缓缓打开，让读者洞悉共和国领袖对国家经济和社会发展的独特思考。"},{"type":"paragraph","text":"这本书还是一部关于伟人治学精神、求学方法的索引。毛泽东主张学术争论自由，认为“笔墨官司，有比无好”；他读书坚持 “不动笔墨不读书”，圈阅批注一丝不苟；他对待书友平等谦逊，借阅黄炎培书帖遵守限期约定；他主张“人的知识面要宽些”，学习自然科学垂老不倦……作者认为，毛泽东善于将独到的治学思想和独特的求学方法融为一体，创造性地提出了读书要立志、潜心、杂学、择书、积累、贵问、自学、游学，并以此获取人生智慧和心灵享受。这些无疑为后人读书治学提供了宝贵的经验。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2339a8088f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
