改轻生产”的思想","authors":[],"dates":[{"year":1951,"month":3,"day":24}],"is_range_date":false,"parts":[{"text":"衡阳干部在春耕生产中普遍存在“重土改轻生产”的思想","type":"title"},{"text":"【新湖南报12日讯】“重土改轻生产”的思想已在湖南省土改区的干部中出现。衡阳在开展春耕生产中，不少干部对于中南区邓子恢副主席所说“只要把土改搞好，生产上受点损失亦在所不惜”的话体会有偏差，以为只要搞土改，生产就可以不管了。比如有的干部说：“我们搞土改，你们搞生产是破坏土改。”在尚未进行土改的地区，群众普遍存在着观望等待的思想，很多人怕地权变化，耕种后白费气力，想等土改以后再生产。目前已发现地主雇人耕种的田无人耕种的现象。另外，春耕生产中也有些其他的问题。如缺乏耕牛、肥料、种籽等。有些群众怕发财被斗，错误的认为：“人民政府爱穷人”，存在着单纯依赖政府救济的思想。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1951年3月24日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a0695974a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
