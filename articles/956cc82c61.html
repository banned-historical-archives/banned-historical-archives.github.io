art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"团结就是胜利","authors":["某部驻沈阳市人民造纸厂毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"两报一刊的重要社论《高举“九大”的团结旗帜，争取更大的胜利》传达了伟大领袖毛主席的最新指示：“团结起来，争取更大的胜利。”“我们讲胜利，就要保证在无产阶级领导之下，团结全国广大人民群众，去争取胜利。”“团结起来，为了一个目标，就是巩固无产阶级专政，要落实到每个工厂、农村、机关、学校。”我们结合斗争实践反复地学习了毛主席的最新指示，深受鼓舞，倍感亲切。"},{"type":"paragraph","text":"我们来到人民造纸厂时，厂内有四个革命群众组织，思想上存在着严重的对立情绪，阻碍了毛主席一系列最新指示的落实。在对待各个革命群众组织的态度上，我们采取了团结教育的方针，“一碗水端平”，不亲一派，不疏一派，不支一派，不压一派。凡是符合毛泽东思想、利于团结的言行，就坚决支持；凡是不符合毛泽东思想、不利于团结的言行，就热情帮助，引导他们在毛泽东思想基础上团结起来。由于提高了广大革命群众搞好团结的自觉性，人民造纸厂在全市较早地实现了革命大联合和革命三结合。"},{"type":"paragraph","text":"在斗、批、改中，我们认真落实毛主席的各项无产阶级政策，团结了一切可以团结的人，组成了浩浩荡荡的革命大军，最大限度地孤立和打击了一小撮阶级敌人，夺取了一个又一个胜利。实践使我们深深体会到：团结就是力量，团结就是胜利。团结是关系到革命成败的大事。要继续革命，就要继续搞好团结；不搞好团结，就不能继续革命。"},{"type":"paragraph","text":"在“九大”精神的鼓舞下，我们和全厂革命职工一起，大学毛主席在“九大”期间所作的极其重要的讲话和林副主席的政治报告，大讲加强团结的伟大意义，大大增强了搞好革命团结的自觉性。我们决心响应伟大领袖毛主席的伟大号召，坚决紧跟毛主席的伟大战略部署，为巩固无产阶级专政，进一步加强革命团结，把绝大多数的人团结起来，完成“九大”提出的各项战斗任务，争取更大的胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"956cc82c61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
