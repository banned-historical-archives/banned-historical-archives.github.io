"dates":[{"year":1969,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削"},{"type":"paragraph","text":"法国各港口码头工人举行大罢工"},{"type":"paragraph","text":"新华社巴黎九日电　法国港口的码头工人为反对垄断资本的残酷剥削，八日举行了二十四小时的罢工。"},{"type":"paragraph","text":"这是法国码头工人最近六个星期来的第四次罢工。这次新的罢工使法国各大港口陷于瘫痪。在马赛约有四十艘船只被迫停在港内。在敦刻尔克、波尔多、拉罗歇尔、罗昂、勒阿弗尔和迪埃普，都举行了全面的罢工，迫使所有这些港口的全部活动陷于停顿。而最近，法国码头工人为反对加班加点不断举行罢工，并且拒绝在星期日工作。勒阿弗尔是巴黎附近的法国第二大港口，由于瘫痪，仓库里堆满了货物。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bcfa46e7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
