script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中共中央电贺锡共召开八大相信锡兰共产党必将在彻底完成民族民主革命的斗争中取得更大成就，在反对现代修正主义的斗争中为国际共产主义运动作出新贡献","authors":[],"dates":[{"year":1965,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京1日电　中国共产党中央委员会在六月二十九日打电报给锡兰共产党中央委员会，热烈祝贺锡兰共产党召开第八次全国代表大会。电报全文如下:锡兰共产党中央委员会亲爱的同志们:"},{"type":"paragraph","text":"在锡兰共产党召开第八次全国代表大会的时候，中国共产党中央委员会代表中国共产党全体党员和中国人民向你们，并通过你们向锡兰共产党全体党员和锡兰人民致以热烈的祝贺。"},{"type":"paragraph","text":"锡兰共产党领导锡兰人民，为反对英帝国主义的殖民统治，反对美帝国主义对锡兰的渗透和干涉，争取和维护民族独立，保障人民权益，进行了英勇的斗争。"},{"type":"paragraph","text":"锡兰共产党在反对美帝国主义的战争政策和侵略政策、保卫世界和平的斗争中，在坚决反对现代修正主义，捍卫马克思列宁主义的纯洁性的斗争中进行了不懈的努力。"},{"type":"paragraph","text":"目前国际形势好得很。以美国为首的帝国主义势力更加削弱，亚洲、非洲、拉丁美洲和世界其他地区的人民革命斗争进一步发展，现代修正主义不断地遭到破产，马克思列宁主义不断地取得胜利。这一切，对锡兰人民的斗争是十分有利的。"},{"type":"paragraph","text":"我们相信，锡兰共产党必将更高地举起反对帝国主义、封建势力、买办资产阶级的革命旗帜，巩固和加强党的队伍，建立工农联盟，团结一切可以团结的爱国民主力量，结成广泛的统一战线，在彻底完成民族民主革命的斗争中，取得更大的成就。"},{"type":"paragraph","text":"我们相信，锡兰共产党必将继续高举马克思列宁主义的旗帜，在反对现代修正主义的斗争中，为国际共产主义运动作出新的贡献。"},{"type":"paragraph","text":"祝锡兰共产党第八次代表大会成功!"},{"type":"paragraph","text":"祝锡兰和中国两党两国人民的战斗友谊不断发展和巩固!"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"一九六五年六月二十九日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edde851e00"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
