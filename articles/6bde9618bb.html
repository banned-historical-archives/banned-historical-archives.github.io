script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"c02feeb6-58b4-44b9-9965-47de5504e4b7","name":"毛远新在批邓、反击右倾翻案风斗争中的一些言论（摘编）（1976.11）","internal":true,"official":true,"type":"img","author":"毛远新，1976.11，反攻倒算材料","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c02feeb6-58b4-44b9-9965-47de5504e4b7/10.png"],"article":{"title":"毛远新关于四五天安门事件的谈话","alias":"（五）毛远新一九七六年四月二十二日的谈话（摘录）","parts":[{"type":"paragraph","text":"对于追查谣言，我有一个感觉，群众普遗发动的不够：不发敢群众是不行的，要依靠群众检举揭发，追查谣言的本身也是个教育群众的过程，让广大干部、群众都认识到，直到现在党内资产阶级还在利用谣言挑拨离间，分裂中央的办法，干扰批邓。我觉得有整地方热闹一点，但是人家把脓包挤出来了，我们表面上很光滑，兼不是没有问题，要通过这次事件搞清楚，为什么人家传播反革命谣言就信呢？从去年以来的谣言都要追查，去年十月省公安局给我拿来的追查谣言的报告，到现在都查清楚了没有？恐怕也没有查清楚。我们省委要定期把追查的情况向中夹报告，涉及高级干部的要专题报告。现在有的省委五天一报，要注意须英型，抓一个厂子或一个机关。···天安门广场反革命政治事件以后，北京有很多生动的事例，在展开群众性的大检举大揭发中，有的父亲检举儿子，哥哥把弟弟送到派出所，还有的发现弟弟拿回警察的大沿福子，也领到公安机关去了。有的红卫兵在坏人闹事当时，即住了坏家伙，连自行车牌号都记录下来，这次清查一下子就报出来了。北京的照像馆凡是遇到有冲洗有关天安门广场事件的胶卷，都及时报告，发现了不少问题，有的还把反革命演说的录音也清查出来了。学习主席指示，深入批邓，打击阶级敌人的玻坏活动是一致的，并不矛盾。你不打击一下反革命，他就干扰大方向，批邓就批不起来。批邓批不起来，和大量的谣言是有关系的，遥言在一些人的脑子里还起作用。三省清查是必要的，但更主要的是对反革命谣言要追查，对谣言要进行批判，对群众要进行教育，通过对谣言的追查和批判，回过头来再学习主席的重要指示，就更清楚了，资产阶级就在共产党内，谣言就是从我们内部传播出去的。过去由于涉及领导干部就不追了，这次重大线索一追到底。转给大军区的线索要一追到底。转"},{"type":"paragraph","text":"- 13 -"},{"type":"paragraph","text":".给大军区的线索，要催办他们追查的情况，不然一压就是几个月，或者根本不理。"},{"type":"paragraph","text":"现在就有人专门挑拨上海同兄弟省的关系。对别的省的困难，要积极支援，这次天安门广场事件，除了把矛头对准毛主席，还特别攻击辽宁和上海。"},{"type":"paragraph","text":"另外，捐个口信，请曾政委多抓军区的工作，伯秋政委多抓省委工作。"},{"type":"paragraph","text":"（六）三"},{"type":"paragraph","text":"毛远新一九七六年六月二日、"},{"type":"paragraph","text":"五日的两次谈话 （摘录）"},{"type":"paragraph","text":"追查谣言发现个倾向，就是光追查下边，对高级领导千部就不大敢碰。对一般党员，干部和群众查的很严，对市地委书记和国务院各部司局长以上的干部，谁去查他？政治谣言很多是上边传下去的，有些谣言就是邓小平自己讲的，有些是他周围的人散布的，何苦在群众中搞得那么紧张。····谣言有两种：一种是吹捧邓小平的；另一种是传播“中央三首长的讲话”，这一种是以“左”的面目出现，反击右倾翻案风的积极分子往往信以为真。有的地方对追吹捧邓小平的谣言抓得不紧，对追后一类的谣言抓得很紧。"},{"type":"paragraph","text":"事情是不是就完了呢？把纳吉再抬出来，有没有可能呢？有可能，别低估了。纳吉上来，下去，又上来。·有些人寄托在纳吉还重新上来。"},{"type":"paragraph","text":"国务院有的部在涉及到生产关系问题时，往往一说话就错，一--14 -"},{"type":"paragraph","text":"（六）三"},{"type":"paragraph","text":"毛远新一九七六年六月二日、"},{"type":"paragraph","text":"五日的两次谈话 （摘录）"},{"type":"paragraph","text":"追查谣言发现个倾向，就是光追查下边，对高级领导千部就不大敢碰。对一般党员，干部和群众查的很严，对市地委书记和国务院各部司局长以上的干部，谁去查他？政治谣言很多是上边传下去的，有些谣言就是邓小平自己讲的，有些是他周围的人散布的，何苦在群众中搞得那么紧张。····谣言有两种：一种是吹捧邓小平的；另一种是传播“中央三首长的讲话”，这一种是以“左”的面目出现，反击右倾翻案风的积极分子往往信以为真。有的地方对追吹捧邓小平的谣言抓得不紧，对追后一类的谣言抓得很紧。"},{"type":"paragraph","text":"事情是不是就完了呢？把纳吉再抬出来，有没有可能呢？有可能，别低估了。纳吉上来，下去，又上来。·有些人寄托在纳吉还重新上来。"},{"type":"paragraph","text":"国务院有的部在涉及到生产关系问题时，往往一说话就错，一--14 -"}],"authors":["毛远新"],"dates":[{"year":1976,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":8,"page_end":9},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]},{"id":"febb7416-870c-4ca2-85c1-00de96d8a9d0","name":"毛远新谈话记录（1976.11）","internal":false,"official":true,"type":"img","author":"毛远新，1976.11，反攻倒算材料","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/febb7416-870c-4ca2-85c1-00de96d8a9d0/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/febb7416-870c-4ca2-85c1-00de96d8a9d0/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/febb7416-870c-4ca2-85c1-00de96d8a9d0/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/febb7416-870c-4ca2-85c1-00de96d8a9d0/4.png"],"article":{"title":"毛远新关于四五天安门事件的谈话","alias":"毛远新谈话记录","parts":[{"type":"paragraph","text":"毛远新谈话记录"},{"type":"paragraph","text":"（一九七六年四月二十二日）"},{"type":"paragraph","text":"我们省的批邓，走得稍微早一点。去年邓搞的一套，对辽宁也是有影响的，但是相对的来讲，影响少一点，我们不要低估了这件事情。把我们自己的事情看过了不对，完全是顶着的，对着干的，这话不对，才不是那么回事呢。是人家骂我们难听一点，我们才注意了这个问题。所以，这个右倾翻案，我们没有象有些地方搞得那么凶，不能说对我们没有影响，更不能说都搞清楚了。我们省当前的形势是好的，但也有不满意的地方，我们批邓的深度和广度比别的省应该做得更好一些。学习主席的重要指示，批邓，上海有些工厂批的水平相当高啊。我总有这样的担心，觉得自己有点了不起，一翘尾巴就坏了，我们可以想一想，如果不是主席发动反击右倾翻案风的伟大斗争，我们能顶下来？鬼才知道呢！我们自己的水平就那么高？去年感到天时、地利、·人和都不利，地震、发大水，加上邓小平搞复辟，在路线上我们受到了邓的影响，在某些方面也不要低估了。"},{"type":"paragraph","text":"再就是当前的事情。三月底以前是一段，从南京事件到天安门广场事件，都是有联系的。我们要抓住大好形势，利用天安门广场反革命政治事件的事实，集中力量、集中时间狠狠打击一下反革命。对反革命，对打砸抢者，要坚决镇压。这是毛主席的话。天安门广场反革命政治事件，说穿了就是死人压活人。毛主席每天都在"},{"type":"paragraph","text":"一1一看事态的发展，高瞻远瞩，站的高，看的远，气魄大，坚决地打乱了敌人的部署。天安门广场事件，在前台表演的都是些小喽喽，后台和主要危险在党内。当然事情并没有完，整个运动的时间还长着呢。"},{"type":"paragraph","text":"对于追查谣言，我有一个感觉，群众普遍发动的不够。不发动群众是不行的，要依靠群众检举揭发，追查谣言的本身也是个教育群众的过程，让广大千部、群众都认识到，直到现在党内资产阶级还在利用谣言挑拨离间，分裂中央的办法，干扰批邓。我觉得有些地方热闹一点，但是人家把浓包挤出来了，我们表面上很光滑，并不是没有问题，要遗过这次事件搞清楚，为什么人家传播反革命谣言就信呢？从去年以来的谣言都要追查。去年十月省公安局给我拿来的追查谣言的报告，到现在都查清楚了没有？恐怕也没有查清楚。我们省委要定期把追查的情况向中央报告，涉及高级干部的要专题报告。现在有的省委五天一报。要注意抓典型，抓一个厂子或一个机关。要注意反映各阶层的动态，象民主党派、大学教授等。天安门广场反革命政治事件以后，北京有很多生动的事例，在展开群众性的大检举大褐发中，有的父亲检举儿子，哥哥把弟弟送到派出所，还有的发现弟弟拿回警察的大沿帽子，也领到公安机关去了。有的红卫兵在坏人闹事当时，盯住了坏家伙，连自行车牌号都记录下来，这次清查一下子就揪出来了。北京的照像馆凡是遇到有冲洗有关天安门广场事件的胶卷，都及时报告，发现了不少问题，有的还把反革命演说的录音也清查出来了。学习主席指示，深入批邓，打击阶级敌人的破坏活动是一致的，并不矛盾。你不打击一下反革命，他就干扰大方向，批邓就批不起来。批邓批不起来，和"},{"type":"paragraph","text":"12-大量的谣言是有关系的，谣言在一些人的脑子里还起作用。三省清查是必要的，但更主要的是对反革命谣言要追查，对谣言要进行批判，对群众要进行教育。通过对谣言的追查和批判，回过头来再学习主席的重要指示，就更清楚了，资产阶级就在共产党内，谣言就是从我们内部传播出去的。过去由于涉及领导千部就不追了，这次重大线索一追到底。转给大军区的线索要一追到底。转给大军区的线索，要催办他们追查的情况，不然一压就是几个月，或者根本不理。"},{"type":"paragraph","text":"不要把批邓和学习主席指示分割开，天安门广场的事件已经说明了这个问题。能说天安门广场事件和批邓没有关系，是两回事？现在台湾编造了一个总理逝世的问题解答，敌人电台也冒充我们电台进行煽动，我们要注意敌人的动向。"},{"type":"paragraph","text":"另外，还谈了以下几个问题："},{"type":"paragraph","text":"一、关于干部安排问题。前几次组织组送来的材料，我看可以。要注意一个问题，就是坚持老中青三结合，姜五湖四海，对老同志不要看不起，还要能和一些意见不同的同志一道工作。我们在千部问题上，不能来回摆动。有些地方批林批孔安排一大批新干部，把一些不适合的也拿上来了，邓小平修正主义路线一来，又都不要了。主席的干部路线是很清楚的，关键是我们执行的问题。我们省批林批孔时，对老干部也没有一棍子打死，右倾翻案风刮来时，我们对新干部也没有调走。老同志该照顾的还要照顾，新干部要考验，要锻炼，这和邓的挂职下放是两回事，我们是给新干部这样一个学习和锻炼的机会，而邓小平是整新干部，不只整新干部，老中青不同意他的路线的都整。主席说，我是最老的，为什么不"},{"type":"paragraph","text":"一3-听我的。我们在干部政策上，可不要偏到一边去。特别是涉及人的处理问题，要持慎重态度。有的省一个很重要的问题，就是处理人的问题上太多了，大批的干部被刷掉，执行邓的一套，吃了不少苦头。"},{"type":"paragraph","text":"二、关于处理派性问题。派性还是有的，不能因为邓小平反派性，就不存在什么派性了。鞍山有，本溪有，抚顺有，旅大有，沈阳也有。我们所要解决的派性问题，这和邓小平的反派性是两回事，要作分析。邓小平打着落实政策，反派性的幌子，来反对毛主席的革命路线，但是我们不能把派性很强的人当成反邓的英雄。"},{"type":"paragraph","text":"三、关于工农业生产和群众生活的安排问题。我们要把工业搞得更好，一季度财政收入和去年同期比，还是相当不错的，农业要比去年发展的远度更快一些。在发展工农业生产中，我们要承认客观困难，当前然料、电力，运输这三项比较紧张，我们要克服困难，不要过分强调这些困难，争取把我们的工作搞好。"},{"type":"paragraph","text":"四，关于长影拍摄三个典型人物的电影问题。对王连生、张九祥、赵生民三个同志我都同意拍，一个同志不可能十全十美，去年宣传时，有的人有不同看法，但在省委决定以后，就应该按照省委统一的意见办。"},{"type":"paragraph","text":"五，关于宣传报道问题。今年在报纸上对辽宁的消息报道的多，我们不能昏昏然。原来新华分社写的那篇关于省委的文章，我的意思不发了，全国没有发一个省委的报道，唯独发辽宁的值得考虑。吹自己吹的太多了不好。去年新闻单位谁也不去辽宁，今年是蜂蛹而至，现在就看我们自己能不能经得起考验了。我倾向少发一点好，对基层单位的可以发。"},{"type":"paragraph","text":"1一一"},{"type":"paragraph","text":"六、关于作风问题。对兄弟省的态度都要注意。现在到辽宁来的比较多，要谦虚谨慎，多向别人学习。还是毛主席的话，吹得越高，摔得越重。不注意这一条，敌人就要钻空子。现在就有人专门挑拨上海同兄弟省的关系。对别的省的困难，要积极支援，这次天安门广场事件，除了把矛头对准毛主席，还特别攻击辽宁和上海。我们的问题，是一就是一，是二就是二，不要吹。"},{"type":"paragraph","text":"另外，捎个口信，请曾政委多抓军区的工作，伯秋政委多抓省委工作。"},{"type":"paragraph","text":"151"},{"type":"paragraph","text":"六、关于作风问题。对兄弟省的态度都要注意。现在到辽宁来的比较多，要谦虚谨慎，多向别人学习。还是毛主席的话，吹得越高，摔得越重。不注意这一条，敌人就要钻空子。现在就有人专门挑拨上海同兄弟省的关系。对别的省的困难，要积极支援，这次天安门广场事件，除了把矛头对准毛主席，还特别攻击辽宁和上海。我们的问题，是一就是一，是二就是二，不要吹。"},{"type":"paragraph","text":"另外，捎个口信，请曾政委多抓军区的工作，伯秋政委多抓省委工作。"},{"type":"paragraph","text":"151"}],"authors":["毛远新"],"dates":[{"year":1976,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":2,"page_end":4},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bde9618bb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
