art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周总理赞扬舰艇部队打得好勉励他们继续高举毛泽东思想伟大红旗，突出政治，认真总结这次战斗经验，戒骄戒躁，争取更大胜利；","authors":["牛嵩林"],"parts":[{"type":"paragraph","text":"新华社十七日讯 中共中央副主席、国务院总理周恩来，中共中央政治局委员、国务院副总理贺龙，中共中央书记处书记、国务院副总理罗瑞卿，今天中午接见了击沉两艘美制蒋帮军舰的海军舰艇部队的代表。"},{"type":"paragraph","text":"接见时，代表们向党和国家领导人汇报了他们击沉敌舰的战斗情况。"},{"type":"paragraph","text":"周总理向他们表示亲切慰问，赞扬他们这次战斗打得好，打得坚决，发挥了英勇顽强的革命精神，运用了灵活机动的战略战术。"},{"type":"paragraph","text":"周总理勉励他们继续高举毛泽东思想伟大红旗，突出政治，认真总结这次战斗的经验，戒骄戒躁，争取更大胜利。"},{"type":"paragraph","text":"代表们表示今后要更加努力学习毛主席著作，把毛泽东思想学到手，苦练杀敌本领，保持高度革命警惕，随时准备消灭一切敢于来犯的敌人。"},{"type":"paragraph","text":"参加接见的还有张爱萍、徐立清、萧向荣、王宏坤、张学思、张秀川等同志。"},{"type":"paragraph","text":"下图 中共中央副主席、国务院总理周恩来，中共中央政治局委员、国务院副总理贺龙，中共中央书记处书记、国务院副总理罗瑞卿，接见了击沉两艘美制蒋帮军舰的海军舰艇部队的代表。图为接见时合影。   本报记者 牛嵩林摄RW：周恩来；社会活动"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bd6b5b7ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
