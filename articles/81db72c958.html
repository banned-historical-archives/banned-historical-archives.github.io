script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一提起剥削我就恨得直咬牙","authors":["刘堂明"],"dates":[{"year":1968,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一提起剥削我就恨得直咬牙"},{"type":"paragraph","text":"西右营大队老贫农　刘堂明"},{"type":"paragraph","text":"中国赫鲁晓夫是地主、资产阶级的孝子贤孙，他和地主、富农一个鼻孔出气，胡说什么剥削“不但没有罪恶，而且有功劳。”“剥削得越多，功劳越大。”真是反动透顶！俺贫下中农要跟中国赫鲁晓夫评评理，看剥削到底是有罪还是“有功”。"},{"type":"paragraph","text":"我打十四岁，就给狗地主扛活，一直干了三十多年，罪受够、苦吃尽，穷人的血泪，点点滴滴记心头呵！那年头扛活，起五更睡半夜，累断了腰，折断了骨，还是两手空空，大人叹气小孩哭，只好找野稗子和黄蓿菜充饥，全家吃了浑身浮肿，肚子发胀，都病倒了。那一年我一家就死了两口，棺材都买不起，拿破席裹着埋了。而地主整天是花天酒地。在人吃人的旧社会里，地主、富农是在咱们穷人的白骨堆上过日子呀！穷人哪有半点活路！而中国赫鲁晓夫却说“剥削有功”，到底功在哪里？"},{"type":"paragraph","text":"要不是毛主席领导我们贫下中农翻身解放，我们哪能活到今天！解放后，伟大领袖毛主席又把我们组织起来，走合作化的道路。可是中国赫鲁晓夫对我们恨得要命，他不甘心地主、资产阶级的失败，又急忙跳了出来，使资本主义在农村泛滥。他鼓吹“剥削有功”，为地主、富农的剥削罪行大唱赞歌，就是妄想颠覆无产阶级专政，使我们再吃二遍苦！我们西右营的贫下中农哪家没有苦难史，哪户没有血泪仇？一提到剥削，咱们贫下中农后脑勺都冒凉气，恨得直咬牙。中国赫鲁晓夫妄想再让地主、富农重新骑在我们头上，这一万万个办不到！"},{"type":"paragraph","text":"告诉你，中国赫鲁晓夫，今天我们贫下中农都是国家的主人，家家户户都办起了毛泽东思想学习班，男女老幼都参加了学习。我们用毛泽东思想武装起来的贫下中农，最听毛主席的话，我们的心最红、眼最亮，你是欺骗不了我们的，无产阶级专政是颠覆不了的，铁打的社会主义江山是攻不破的。我们要奋起毛泽东思想的千钧棒，把你的“剥削有功”谬论砸个稀巴烂。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81db72c958"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
