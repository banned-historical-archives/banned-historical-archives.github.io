示，使学校面貌焕然一新","authors":[],"dates":[{"year":1968,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　进驻曹杨二中工人宣传队，遵循伟大领袖毛主席“工人阶级必须领导一切”的教导，进校一个多月来，克服种种困难，坚定不移地宣传毛泽东思想，落实毛主席关于无产阶级文化大革命的一系列最新指示，使学校面貌焕然一新。"},{"type":"paragraph","text":"工人宣传队进校后，首先大力宣传毛泽东思想，深入班组作广泛、细致的调查研究。他们通过各种方式同党员、团员、班干部、红卫兵小将、教职员工接触，同他们一起学习毛主席最新指示，共同回忆战斗历程，提高了他们的积极性。红卫兵小将越谈越有劲，越回忆越感到热血沸腾，越发对红司令毛主席热爱，这样不仅很快地密切了工人和学生的思想感情，而且使工人宣传队很快地掌握了学校各方面的情况，可以有“的”放“矢”地开展工作。"},{"type":"paragraph","text":"这个学校原是普陀区“老大难”单位之一，在一小撮阶级敌人的挑动下，分成二大派，“内战”不休，对走资派一不斗、二不批，有不少同学长期流荡在校外。工人宣传队发动群众，大办特办毛泽东思想学习班，促进两大派在革命的原则下联合起来，共同对敌。学习班里头头带头斗私批修，狠批反动的资产阶级“多中心论”，以及个人主义、宗派主义、无政府主义。通过学习班斗私批修，两派对立情绪逐渐消除。如高一(1)班三个战斗队之间，情绪严重对立，碰在一起没谈上几句就要打起来，而通过学习班的学习，各战斗队的头头都带头斗私，一致认识到，我们之间没有根本利害冲突，过去受了一小撮阶级敌人的挑动，上了阶级敌人的当。此后，大家握手言和，促进了大联合，把他们引导到无产阶级轨道上来。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b44fb83ec3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
