script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美国和本国大资本家残酷剥削  智利等国工人不断举行罢工","authors":[],"dates":[{"year":1969,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国和本国大资本家残酷剥削"},{"type":"paragraph","text":"智利等国工人不断举行罢工"},{"type":"paragraph","text":"新华社十四日讯智利、乌拉圭和委内瑞拉的工人、技术人员和医务人员最近不断举行罢工，反对美国和本国大资本家剥削，要求增加工资。"},{"type":"paragraph","text":"智利全国糖业股份公司的两千名工人十三日举行二十四小时罢工，抗议当局无理解雇一名工人。工人们警告当局，如果不恢复被解雇工人的工作，他们将宣布不定期罢工。在智利首都圣地亚哥的美国国际电话和电报公司以及全美电报公司的两百名职员，为了抗议美国资本家对他们的剥削，十二日举行了罢工。智利首都北部地区的四千名医务工作人员十一日举行罢工，要求增加工资，抗议生活必需品涨价。全国电力公司的两百多名电机技术人员，为了抗议当局无理解雇一名工作人员，于十一日举行了罢工。"},{"type":"paragraph","text":"乌拉圭的城市运输工人、医务工作人员、电讯和畜牧业部门的公务员最近纷纷举行罢工，抗议当局拖欠工资。"},{"type":"paragraph","text":"委内瑞拉社会保险局的医务人员六日举行罢工，声援卫生部所属医院的四千名医生在四日举行的罢工。罢工使八十所医院和疗养院陷于瘫痪。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a5b69277e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
