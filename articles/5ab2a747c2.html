rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席访问南斯拉夫","authors":[],"parts":[{"type":"paragraph","text":"八月二十二日，华国锋主席在铁托总统陪同下，接受贝尔格莱德市几十万群众隆重热烈的欢迎。"},{"type":"paragraph","text":"八月二十一日，华国锋主席和铁托总统在白宫亲切交谈。"},{"type":"paragraph","text":"华国锋主席应铁托总统的邀请于八月二十一日乘专机到达贝尔格莱德，对南斯拉夫进行正式友好访问。图为华主席由铁托总统陪同检阅仪仗队。"},{"type":"paragraph","text":"八月二十二日，华国锋主席参观贝尔格莱德军事博物馆。"},{"type":"paragraph","text":"八月二十三日，华国锋主席参观贝尔格莱德“兹马伊”农业机械厂。"},{"type":"paragraph","text":"八月二十八日，华国锋主席和铁托总统在布里俄尼岛亲切握手。"},{"type":"paragraph","text":"八月二十四日，华国锋主席在斯科普里参观中央市场。"},{"type":"paragraph","text":"华主席在贝尔格莱德参观访问时，沿途受到群众的热烈欢迎。"},{"type":"paragraph","text":"八月二十三日，华国锋主席参观“贝尔格莱德”农业联合企业时，接受该厂职工赠送的纪念品。"},{"type":"paragraph","text":"八月二十四日，华主席向热情接待他的斯科普里市服务人员握手致谢。"},{"type":"paragraph","text":"（本版照片均为新华社记者摄）（照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ab2a747c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
