ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"为马毛姐题词","alias":"","parts":[{"type":"paragraph","text":"为马毛姐题词\""},{"type":"paragraph","text":"（1951年10月4日）毛姐："},{"type":"paragraph","text":"好好学习，天天向上。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五一年十月四日"},{"type":"paragraph","text":"[1]这是毛泽东为马毛姐写的题词。1949年4月20日夜，毛泽东、朱德命令中国人民解放军百万雄师强渡长江。年仅16岁的马毛姐在家乡安徽省无为县参加了渡江第一支船队，因战绩突出，被授予“渡江英雄”称号。1951年10月4日，毛泽东派人接马毛姐到家中做客，还特意为没有正式名字的小英雄“马四姐”起名为“马毛姐”。毛泽东说：“‘马”是你家的姓，名字第一字就跟我姓了。”当毛泽东知道马毛姐上学了，便高兴地在一本笔记本上写道：“毛姐：好好学习，天天向上。毛泽东一九五一年十月四日。”"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":10,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":518,"page_end":518},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"247c06ebe7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
