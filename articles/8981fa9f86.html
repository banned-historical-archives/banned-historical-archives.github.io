uthors":[],"dates":[{"year":1975,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京部队某团党委成员带头学习无产阶级专政理论"},{"type":"paragraph","text":"努力搞清楚对资产阶级专政问题"},{"type":"paragraph","text":"新华社一九七五年三月十一日讯　毛主席关于理论问题的重要指示和马克思、恩格斯、列宁论无产阶级专政的语录发表以后，人民解放军北京部队某团党委成员迅速带头掀起了学习热潮。"},{"type":"paragraph","text":"团党委“一班人”学在先，走在前。他们围绕毛主席关于理论问题的指示，联系国际共产主义运动的历史经验和我国无产阶级专政的历史经验，反复学习革命导师关于无产阶级专政的论述，努力从理论上搞清楚对资产阶级专政的必要性和重要性，进一步提高贯彻执行毛主席革命路线的自觉性。在学习和讨论的过程中，许多同志指出，在社会主义这个历史阶段，还存在着阶级和阶级斗争，还存在着产生资本主义的土壤和条件，如果不大力加强无产阶级对资产阶级的专政，不积极同资本主义自发势力进行斗争，就会导致资本主义复辟。他们说，作为领导干部，带头学好无产阶级专政的理论，从理论和实践的结合上弄清楚对资产阶级专政的重要性和必要性，这对于加强部队建设，巩固无产阶级专政，有着极其重要的意义。因此，他们在狠抓自身学习的同时，还积极组织营、连干部和部分战士认真学习，以便培养理论骨干，带领全团指战员更好地学习。"},{"type":"paragraph","text":"团党委领导成员通过学习，进一步认识了改造世界观的重要性。他们说，领导干部只有认真学习，自觉改造世界观，清除头脑中的资产阶级法权思想，才能真正和群众同甘共苦，并肩前进，为实现党的基本路线而英勇战斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8981fa9f86"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
