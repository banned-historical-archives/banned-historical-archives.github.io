["周恩来"],"dates":[{"year":1967,"month":9,"day":20}],"is_range_date":false,"parts":[{"text":"周总理论二月逆流和右倾翻案风","type":"title"},{"text":"周恩来","type":"authors"},{"text":"今年一月由上海工人阶级为首，联合了革命群众组织展开向上海一小撮走资派的夺权斗争，这个斗争经伟大领袖批准，传播到全国，这样就风起云涌，席卷全国，更进一步唤起了全国各地革命群众的觉悟，认识到要站在毛主席革命路线上展开和一小撮走资派的夺权斗争，这就形成了全国一月革命的高潮。当然，革命发展高涨了，那么，阻碍革命不甘心失败的分子就要出来了。走资派不甘心失败，暗中操纵，就出现了二月逆流。又经过伟大领袖指出，经中央文革努力击退了二月逆流。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"二月逆流","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e40e717700"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
