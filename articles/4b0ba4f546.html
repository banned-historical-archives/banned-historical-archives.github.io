art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"支持新生力量回击右倾翻案风","authors":[],"parts":[{"type":"paragraph","text":"经过无产阶级文化大革命和批林批孔运动，大批青年干部茁壮成长，老中青三结合的各级领导班子显示出强大的生命力。文化大革命的这一重大成果，我国无产阶级革命事业后继有人的兴旺景象，怎能不使每个革命战士感到无比的高兴，巨大的鼓舞！"},{"type":"paragraph","text":"毛主席指出：“青年是整个社会力量中的一部分最积极最有生气的力量。他们最肯学习，最少保守思想，在社会主义时代尤其是这样。”在文化大革命急风骤雨中锻炼成长起来的青年干部，有高度的阶级斗争和路线斗争觉悟。他们为贯彻执行毛主席的革命路线，保卫和发展文化大革命的成果，反修防修，巩固无产阶级专政，努力学习，朝气蓬勃，勇于实践，敢于斗争。无数事实有力地证明，在党的关怀和培育下，青年一代完全能够接好革命事业的班，挑起巩固无产阶级专政、建设社会主义的重担。那种看不起“儿童团”的思想是完全错误的。对于党内不肯改悔的走资派否定革命新生力量、否定社会主义新生事物、否定文化大革命的右倾翻案风，必须给以坚决的回击！"}],"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b0ba4f546"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
