":[],"dates":[{"year":1973,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e共产党员、八路军排长赵勇刚。在毛主席的无产阶级军事路线指引下，他和抗日群众一起英勇机智地开展游击战，牢牢掌握着战胜敌人的主动权。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e赵勇刚(左三)和李胜(左二)用党的政策教育伪军。要他们改邪归正，争取立功受奖。(第一场:《星夜下山》)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“持久战，三阶段:防御、相持、大反攻。”张庄的老贫农在回忆赵勇刚带领群众学习毛主席的光辉著作《论持久战》的情景。"},{"type":"paragraph","text":"(第八场:《青纱帐里》)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“逃脱惩罚是妄想，血债冤仇要你偿。把你们旧世界彻底埋葬……。”赵勇刚代表人民处决汉奸、特务孙守财。"},{"type":"paragraph","text":"(第六场:《袭扰县城》)"},{"type":"paragraph","text":"(本版照片均为新华社稿)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“乡亲们修地道连夜苦干，抗日的堡垒村稳如山。”张大娘、小英和张庄的群众一起深挖地道，准备和日寇展开地道战。"},{"type":"paragraph","text":"(第三场:《鱼水情深》)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040106.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在乡亲们蒙难的紧急关头，张庄村支部书记李胜挺身而出，闯敌阵，斗群魔，救乡亲，保公粮，耿耿正气满胸膛。"},{"type":"paragraph","text":"(第五场:《不屈不挠》)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040107.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e赵勇刚刀劈日寇曹长。最后，赵勇刚和战士们放火烧掉日寇中心炮楼，把粮食运往山区，支援主力作战。"},{"type":"paragraph","text":"(第四场:《智取炮楼》)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\07\\7377040108.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e“用胜利迎接主力到来!”我八路军主力部队与赵勇刚、众战士胜利会师，我军在山上山下皆获全胜。"},{"type":"paragraph","text":"(第十场:《平原歼敌》)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bb8c384fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
