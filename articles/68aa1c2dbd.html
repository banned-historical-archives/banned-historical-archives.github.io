,"authors":[],"dates":[{"year":1961,"month":4,"day":28}],"is_range_date":false,"parts":[{"text":"中共沿河县委对黄修态所犯错误的调查报告","type":"title"},{"text":"黄修态，男，四十岁，家庭成份中农，个人务农，任沿河县城关公社高穴管理区劳联大队人，一九五八年入党，现任劳联大队长。","type":"paragraph"},{"text":"主要错误事实：","type":"paragraph"},{"text":"（一）逼死人命：","type":"paragraph"},{"text":"（1）一九五九年腊月十五日，崔照夫、崔照玉两人因病由大山挖根根回来时，黄修态说：崔照夫二人是私逃回家，不给饭吃，硬逼着崔照夫二人上大山挖根根，不去就不给饭吃，由于崔照夫两有病不能到大山，因此被黄修态连续扣饭七天和九天，崔照夫腊月二十二号饿死，崔照玉于腊月二十四号饿死。","type":"paragraph"},{"text":"（2）崔洪基原由管理区介绍到福利厂当炊事员，一九六○年元月，由管理区介绍回本队生产，而黄修态认为崔洪基去时没有经本人同意，因此不给崔洪基的饭吃，被连续扣饭七天，崔洪基饿死于一九六○年元月十八日。","type":"paragraph"},{"text":"（二）违法乱纪翻箱倒柜：","type":"paragraph"},{"text":"（1）一九五八年和一九六○年因粮食供应少的情况下，有的社员搞菜吃，被黄修态亲自和支持吊人、打人，黄亲自吊打有十三岁小孩崔照美、王荣香二人，他支持吊打的有五人。","type":"paragraph"},{"text":"（2）一九五九年冬月黄修态亲自带领承包队长崔光华到庄冬小队将崔光林等三十户进行挨家挨户的收查，共收查各种粮食一千多斤。将收来的粮食放在干部食堂吃和干部私分，大队干部每人分粮食二十斤，现金十元，小队干部每人十五斤，现金五元。","type":"paragraph"},{"text":"开除党籍管制。","type":"paragraph"},{"text":" 六一年四月二十八号","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68aa1c2dbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
