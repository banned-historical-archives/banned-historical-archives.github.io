["山东师范学院","黄绍鸣"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“民主党派还是陪衬摆样子”","type":"title"},{"text":"山东师范学院黄绍鸣","type":"authors"},{"text":"统战部对民主党派的重视与帮助不够，党领导一切决定一切的今天，只有民主党派这些事务问题不能解决，这不是不重视民主党派是什么呢？在机关学校里，民主党派依旧还是处在陪衬摆样子的地位，不让它尽到真正的助手作用，只要求他们对政策、措施起带头、推动和保证作用，而不让参加方针政策的制定筹划工作。只是在买公债、搞学习、参加庆祝游行时想到他们，而在商讨大政方针、人事调配、评薪定级、分配福利……时就没有他们的份了。须要知道，民主党派助手作用发挥的如何，除民主党派本身主观努力外，主要还是在主手——领导党把它按在什么地位上，不得其位，就不能发挥作用。许多机关部门的党领导不认识、也可能有意这样。（山东师范学院  黄绍鸣）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6418bcd0a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
