,"dates":[{"year":1949,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资本家为工业前途欢欣"},{"type":"paragraph","text":"决遵循毛主席指示"},{"type":"paragraph","text":"提高技术扩大生产"},{"type":"paragraph","text":"北平市工业公会常务理事王向辰说：北平市各阶层人民对人民政协的开幕，都表现着空前未有的兴奋，都在一致的庆贺这个伟大的划时代的盛典。现在国民党反动派已被基本上打垮了，我们中华人民民主共和国诞生了，今后要遵从毛主席的指示，恢复和发展生产，只有工业发展，才能把落后的农业国变为进步的工业国，才能建立一个独立、自由、民主与统一的新中国。"},{"type":"paragraph","text":"大华窑业公司经理陈英堂说：“这次人民政协的召开，是全国人民努力奋斗的大成绩，是五千年以来没有过的，过去从来没有一个为人民服务的政府，今天却真真的有了。我听到人民政协的开幕，心里真是非常高兴。北平解放前，我们受官僚资本、反动派与帝国主义的压迫，生产搞不好，共产党来了，实行劳资两利，发展生产，我本人是搞生产的，在共产党的领导下，我相信工业前途一定是很远大的。”"},{"type":"paragraph","text":"私营华兴工厂经理张俭堂兴奋的说：“人民政协开幕了，不久中央人民政府就要出现，在中央人民政府、共产党的领导下，我们工商业得到了可靠的保障。这去在国民党反动派统治时，我们华兴厂两次被国民党匪军驻扎，破坏机器，又由于官僚资本，帝国主义外货的排斥曾垮台三次。解放后，在共产党的领导下，华兴厂逐日扩大，现在厂里已增设一印花布厂，工人由七十多人增加到一百四十多人，扩大一倍多。今后一定响应毛主席的号召，继续提高技术扩大生产，预计在一年左右，增设纺纱厂，工人增加到二百五十人。仁立地毯公司经理凌其峻被这次人民政协邀请旁听，他以此感到特别荣幸。他说：“大会会场布置庄严朴素，会议充满了民主精神。北平解放七月余，各种事实让我清楚地认识了共产党吃苦耐劳，全心全意为人民服务的精神，我个人对这个会议，寄以无限希望。在这个扭转历史的新中国中央人民政府出现的当儿，在毛主席的英明领导下，展开新中国的伟大的全面建设工作，我愿和本厂里的工人，共同努力把生产搞好。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f974d2d3b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
