rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟毛主席永远干革命","authors":["“无限忠于毛主席的风雪高原工程兵十连”连长房立民"],"parts":[{"type":"paragraph","text":"回顾我们党走过的四十八年的光辉战斗历程，我们更加清楚地认识到，伟大领袖毛主席亲自缔造和培育的中国共产党，是伟大的、光荣的、正确的党。没有用毛泽东思想武装起来的中国共产党，就没有新中国，就没有劳动人民的解放。"},{"type":"paragraph","text":"毛主席关于无产阶级专政下继续革命的伟大学说，是社会主义革命的伟大纲领。我们连全体指战员牢记毛主席关于“夺取全国胜利，这只是万里长征走完了第一步”，“中国的革命是伟大的，但革命以后的路程更长，工作更伟大，更艰苦”的教导，保持和发扬我军艰苦奋斗的光荣传统，从而征服了险山恶水，完成了党交给我们的历次战斗任务。从实践经验中，我们深深体会到：有了继续革命的思想，再大的困难能克服，再艰巨的任务也能完成。"},{"type":"paragraph","text":"中央两报一刊的重要社论，号召我们要充分认识社会主义革命的长期性和艰巨性。我们决心更加紧密地团结在以毛主席为首、林副主席为副的党中央委员会周围，抓革命，促生产，促工作，促战备，为保卫祖国筑起一道道钢铁长城。如果帝、修、反胆敢侵犯我们伟大的祖国，我们就坚决彻底把它消灭掉。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae4ad5ab8b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
