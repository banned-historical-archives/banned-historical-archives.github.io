art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿拉伯世界一片怒吼痛斥苏修叛卖行径示威群众高呼“毛主席万岁！”“中国是阿拉伯人民的真诚兄弟！”","authors":[],"parts":[{"type":"paragraph","text":"综合新华社讯 伊拉克首都巴格达人民十日举行盛大示威游行，激昂地高呼“我们要武器！”“我们不怕（美国）第六舰队！”等口号，表示要同美英帝国主义及其侵略工具以色列斗争到底的决心。数千名愤怒的群众还游行到苏联大使馆门前示威，对苏修领导集团对阿拉伯人民的假支持、真出卖的罪行表示愤慨。他们指着苏联大使馆喊道：“苏修是胆小鬼！”"},{"type":"paragraph","text":"接着，这些示威者又列队来到中国大使馆门前，向中国工作人员招手欢呼，感谢中国对阿拉伯人民反侵略战争的真诚支持。示威者在欢呼声中把中国大使馆的一个工作人员抬到他们的肩膀上，并且不断高呼：“毛泽东万岁！”“人民中国万岁！”“中国人民和阿拉伯人民为解放巴勒斯坦而并肩战斗！”“中国人民和阿拉伯人民万岁！”有些伊拉克人热烈地拥抱了其他中国人员，激动地说：“人民中国是我们真诚的弟兄。人民中国坚决支持我们，而苏联是修正主义和叛徒。它出卖了我们。他们将受到惩罚！”"},{"type":"paragraph","text":"反对苏修领导集团出卖阿拉伯人民的浪潮，在阿联首都开罗也空前地高涨。大批大批的示威群众到苏联大使馆前示威。仅九日晚，就有三批示威者想要突破苏联大使馆的围墙，冲进使馆。"},{"type":"paragraph","text":"阿联各界人士纷纷痛斥苏修领导集团出卖阿拉伯人民利益，充当美帝头号帮凶。一个保安人员说：“在我们的国防部长访问莫斯科时，苏联答应给我们武器来同以色列战斗，但是一旦我们开始抗击美英以侵略的时候，他们什么也不干，只是说，他们要和平。什么样的和平！他们太坏了。”"},{"type":"paragraph","text":"阿联人民在痛斥苏修叛卖行径的同时，热烈赞扬在伟大领袖毛主席领导下的中国人民对阿联和其他阿拉伯国家人民反抗美英以侵略的坚决支持。"},{"type":"paragraph","text":"在阿尔及利亚首都阿尔及尔，九日有好几千名示威者，自发地集合在一起，游行到苏联设在阿尔及尔的文化中心愤怒地和有节奏地高呼口号：“打倒美帝国主义！”“约翰逊是杀人犯！”“苏联是叛徒！”“柯西金滚进垃圾堆里去！”有一批游行示威的队伍在走过中国驻阿尔及利亚大使馆旁门的时候，争先恐后地向大使馆工作人员要《毛主席语录》、毛主席像章和毛主席照片。他们不断高呼：“毛主席万岁！”“中国人民万岁！”“中国同我们在一起！”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d99468621"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
