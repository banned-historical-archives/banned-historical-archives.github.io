year":1975,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见福特总统等美国客人"},{"type":"paragraph","text":"毛主席同福特总统在友好的气氛中，就广泛的问题进行了认真的、有意义的交谈参加谈话的美方人员有亨利·基辛格等，我方参加会见和谈话的有邓小平、李先念副总理等"},{"type":"paragraph","text":"新华社一九七五年十二月二日讯　毛泽东主席今天下午会见了美利坚合众国总统杰拉尔德·福特和夫人贝蒂·福特，以及随同福特总统访问的其他人员。"},{"type":"paragraph","text":"参加会见的福特总统的随行人员是：福特总统的女儿苏珊·福特，国务卿亨利·基辛格博士，美国驻中国联络处主任乔治·布什，总统国家安全事务助理布伦特·斯考克罗夫特，副国务卿约瑟夫·杰克·西斯科，负责东亚和太平洋事务助理国务卿菲利普·哈比卜，国务院政策计划司司长温斯顿·洛德，国家安全委员会高级工作人员理查德·索洛蒙。"},{"type":"paragraph","text":"毛主席同全体美国客人一一握手后，同福特总统在友好的气氛中，就广泛的问题进行了认真的、有意义的交谈。参加谈话的美方人员有亨利·基辛格、乔治·布什、布伦特·斯考克罗夫特、温斯顿·洛德。"},{"type":"paragraph","text":"我方参加会见和谈话的有邓小平副总理，李先念副总理，乔冠华外长，黄镇主任，王海容副外长，唐闻生和章含之副司长。（附图片）"},{"type":"paragraph","text":"毛主席同福特总统在友好的气氛中，就广泛的问题进行了认真的、有意义的交谈。新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"650588f986"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
