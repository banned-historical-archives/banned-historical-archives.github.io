ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"对周扬在中国作协党组扩大会上的讲话的批语","alias":"","parts":[{"type":"paragraph","text":"对周扬在中国作协党组扩大会上的讲话的批语"},{"type":"paragraph","text":"（1957年11月24日）周扬同志阅后，即送胡乔木同志转小平同志："},{"type":"paragraph","text":"此事前日和你顺便谈过：应印发给以小平为首的会议各同志，作一二次认真的讨论（事前细看周文），加以精密的修改，然后发表。发表前可送我看一次。会议讨论时要有周扬和其他几位文艺领导同志参加。此事请你告小平办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月廿四日这是一件大事，不应等闲视之。我现在不看。待小平会议讨论再加修改后，我再看。"},{"type":"paragraph","text":"[1]指中共中央宣传部副部长、中国作家协会党组书记周扬1957年9月16日在中国作家协会党组扩大会上所作的题为《不同的世界观，不同的道路》的讲话。这个讲话稿，根据毛泽东等的意见作了修改，于11月20日再送毛泽东审阅。这篇讲话后来发表在1958年2月28日《人民日报》，题目改为《文艺战线上的一场大辩论》。"},{"type":"paragraph","text":"[2]指胡乔木。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":11,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":357,"page_end":357},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edeae831d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
