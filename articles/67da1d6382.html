rticle":{"title":"财政部复湖南省财政厅‘关于如何执行中办发〔1984〕24号文件有关规定的请示’的函","dates":[{"year":1985,"month":2,"day":12}],"is_range_date":false,"authors":["财政部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局, 干审工作政策文件选编 (上), 789-790","tags":[{"name":"查抄财物","type":"主题/事件"},{"name":"退还退赔","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"财政部复湖南省财政厅“关于如何执行中办发〔1984〕24号文件有关规定的请示”的函"},{"type":"paragraph","text":"1985年2月12日·〔85〕"},{"type":"paragraph","text":"财预字第22号 你厅湘财〔85〕农字第18号请示收悉。关干如何执行中央有关退还“文革”查抄金银作价文件规定的问题。经研究，我们的理解是：中办发〔1984〕24号和中组部组通字〔82〕23号文件下达后，尚未落实政策发还的，应照文件规定按退还时的牌价发还。至于中组部组通字〔82〕23号文件下达前，已发还本人结案，但未按当时牌价折算，本人现在要按文件规定找帐如何处理的问题，经与有关发文单位联系，他们意见，此类问题情况比较复杂，请各地根据具体情况酌情处理。你省省委组织部文件，就是根据这个精神，确定“一律不再按新牌价补付差价”的原则，对此,我们没有意见。"},{"type":"paragraph","text":"以上意见仅供参考。必要时,请你们报告省委直接请示中央有关部门。"}],"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67da1d6382"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
