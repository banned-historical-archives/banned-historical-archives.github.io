示的批语","authors":[],"dates":[{"year":1953,"month":6}],"is_range_date":false,"parts":[{"text":"中央对西北局解决区乡“五多”问题指示的批语","type":"title"},{"text":"兹将西北局关于执行“中央关于解决区、乡工作中‘五多’问题的指示”的指示，转发各地参考。克服区、乡工作的“五多”问题，不是中央一道命令即能办到的，各种任务、会议、训练、文件、表格，何者宜存，何者宜废，何者宜改，也需要很好分析研究予以区别对待。一切皆废的态度，恐在不久之后又出现了一切还原的情形。同时，一次安排好一切，也是不可能的。因此需要各级党委将它当作一种经常注意事项，不断检查，不断改进，认真克服官僚主义与分散主义，反掉错误的制度和领导方法，随时建立起正确的领导制度和方法，并使之巩固下去。省以上的领导机关和中央各部门，尤须切实注意检查自己所布置的工作所下达的决议、命令、指示、通知等，凡足以促成下面“五多”现象者，必须切实认真地加以改正。主席和中央已通知中央各部门，各就自己三年来所发出的文件加以检查清理，务望如期完成。只有从上面下如此处理，才能真正有效地解决这一问题。最近华北局（来报已转发）、西北局均在这方面进行了必要的工作。各地均应仿办。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c396639336"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
