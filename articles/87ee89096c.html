art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的伟大号召是取得更大胜利的根本保证","authors":["郎富贵刘兆群〖HH/换行〗DW：武汉中南木材一级转运站"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席在党的“九大”发出了具有伟大历史意义的号召：“团结起来，争取更大的胜利。”毛主席的伟大号召是伟大的战略部署，是指引我们胜利前进的灯塔，是我们取得更大胜利的根本保证。"},{"type":"paragraph","text":"在伟大的斗、批、改运动中，我们遵照伟大领袖毛主席的教导，正确区分了两类不同性质的矛盾。对人民内部矛盾，运用“团结——批评和自我批评——团结”的公式来解决。革委会对于来自群众的各种不同的意见，采取民主的方法，主动开门整风，让大家把话充分说出来。这样，就进一步调动了广大群众的积极性，增强了革委会和群众之间的团结。我们一定响应毛主席的伟大号召，坚决搞好各方面的团结，为完成党的“九大”所提出的各项战斗任务而共同奋斗。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87ee89096c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
