ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"接受保加利亚大使涅加尔科夫呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受保加利亚大使涅加尔科夫"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1957年4月25日）"},{"type":"paragraph","text":"我很高兴地接受您所递交的保加利亚人民共和国国民议会主席团任命您为驻中华人民共和国特命全权大使的国书，并且对您的祝贺表示衷心的感谢。"},{"type":"paragraph","text":"保加利亚人民是勤劳勇敢、热爱和平和自由并且忠于无产阶级国际主义原则的人民，保加利亚人民是经过长期的反对外国压迫的英勇斗争而获得解放的。在人民政权建立后的十二年中，保加利亚人民在光荣的保加利亚共产党和保加利亚人民共和国政府的领导下，在社会主义建设中取得了辉煌的成就，将保加利亚从一个落后的农业国变成了一个拥有现代化工业和合作化农业的工业一农业国。保加利亚在巩固以苏联为首的社会主义大家庭的团结和维护世界和平的事业中也作出了重要的贡献。中国人民对兄弟般的保加利亚人民的这些成就和贡献深为钦佩，并且感到欢欣鼓舞。"},{"type":"paragraph","text":"近年来，中保两国人民的友谊和在政治、经济、文化各方面的互助合作，已经获得了很大的发展。我深信，在我们建设社会主义的共同道路上，这种友谊和合作必将日益巩固和发展。这不仅有利于我们两国人民的繁荣和幸福，而且也有利于以苏联为首的社会主义大家庭的团结和世界和平民主力量的加强。"},{"type":"paragraph","text":"接受保加利亚大使涅加尔科夫呈递国书时的答词"},{"type":"paragraph","text":"大使同志，我热烈地欢迎您出任保加利亚人民共和国驻中华人民共和国的特命全权大使。在您为巩固和加强中保两国友好合作的工作中，您将得到我和中华人民共和国政府的全力支持。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":4,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":39,"page_end":40},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"218238e49b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
