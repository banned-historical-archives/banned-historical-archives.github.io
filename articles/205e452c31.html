,"authors":[],"dates":[{"year":1950,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"榕市失业工人与无业市民达10万余","type":"title"},{"text":"（福建分社5月30日讯）榕市目前财经主要的困难是：海口被封锁，内陆交通不便，运费贵，农村购买力低，特产不得出口。故靠外销的工业、手工业工厂大部停顿。其他不少行业亦陷于半歇业状态，失业工人与无业市民达10万人左右。加之匪机不断滥炸，对市场破坏很大，增加了继续维持生产的困难。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年6月6日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"205e452c31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
