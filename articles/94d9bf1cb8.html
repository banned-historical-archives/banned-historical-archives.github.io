":1998,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东信息日报报道(鲁文)　山东淄博一家酒店为了吸引顾客，竟在店内恢复“文革”遗风，上演了一场闹剧，结果“新鲜”了一阵生意便凉了。"},{"type":"paragraph","text":"位于淄博市博山区的“××快餐店”，店门上贴了一溜“忠”煞是醒目，餐厅墙上则贴着文革时期的一些口号和“红卫兵袖章”。令人惊诧的是，能容纳100多人的餐厅里竟空荡荡地没有一个客人。见有人光顾，一男服务生急忙殷勤地介绍本店的“大革命”系列套菜:“斗私批修”“忆苦思甜”、“一棍子打死”、“打斗会”、“红彤彤”……谁曾想，所谓“斗私批修”，就是普通的炒土豆丝；“牛鬼蛇神”是一盆汤味很淡的甲鱼汤。"},{"type":"paragraph","text":"据说，6月份刚开业的时候，该店的一些做法引起不少人的反感，服务员一律文革“红卫兵”打扮，客人背一句文革用语，奖励一杯啤酒，等等。"},{"type":"paragraph","text":"对此，餐饮界的一些人士认为，餐饮业竞争激烈，商家应该把功夫放在提高饭菜质量上，仅靠出怪招来招徕顾客，是无法站稳脚跟的。"}],"comments":[],"origin":"华东信息日报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94d9bf1cb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
