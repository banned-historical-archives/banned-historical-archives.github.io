art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"吉安发现斯诺录《毛泽东自传》中译首版本","authors":["邹晓明/肖澄健〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"●邹晓明 肖澄健"},{"type":"paragraph","text":"一本保存完好的，美国著名记者埃德加·斯诺记录的《毛泽东自传》中译首版本，最近在江西省吉安市被发现。"},{"type":"paragraph","text":"由吉安市面粉厂职工徐永忠珍藏的这本《毛泽东自传》，系32开竖排本，张宗汉翻译，延安文明书局于1937年秋发行。石印封面上，印有毛泽东立于陕北高山之前的全身正面画像。该书共分四章，附有贺子珍小传及朱德、周恩来、彭德怀、刘伯承、张闻天、丁玲等17位中共著名人士的剪影小记，以及译者张宗汉所写“译后记——毛泽东到底是个怎样的人”，共计70页。书中扉页上，有徐永忠之父徐忠谋“于一九三九年购于南昌市”的题记，以及徐忠谋之前多位藏书者的印鉴，从而证实了该书当时已在国民党统治区域辗转发行。"},{"type":"paragraph","text":"有关学者对该书进行考证后认为，这部在《西行漫记》出版前，抗日战争之初由延安发行的《毛泽东自传》，比较全面、准确地反映了毛泽东及中国共产党人的一段革命斗争历程，成为当时引导全国人民理解共产党的主张，反抗日本帝国主义侵略的精神食粮，在中国革命史上具有重要的意义。时至今日，仍然是对青少年进行革命传统教育的好教材。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4554907e69"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
