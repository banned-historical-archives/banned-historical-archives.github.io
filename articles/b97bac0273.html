":["天津市","杨济时"],"dates":[{"year":1957,"month":5,"day":29}],"is_range_date":false,"parts":[{"text":"剥削阶级取消了，又出现了新阶级","type":"title"},{"text":"天津市杨济时","type":"authors"},{"text":"天津市第一中心医院院长、农工民主党天津市委员会筹备委员会委员杨济时对天津日报记者发表谈话。他说：共产党员一入了党，就觉得比人高一等，成了特殊阶级。这好象信教的教徒，一念圣经就成了教徒一样。现在，剥削阶级取消了，没有资产阶级与无产阶级的区别了。但，又出现了新的阶级：共产党是第一阶级，民主党派是第二阶级，群众是第三阶级。因而共产党员有种种特权可享，不懂业务，可属领导地位；只要当了党员就不会失业，只要成了共产党员，好象就变成了马列主义了，并把马列主义当成了官衔。这个口号万万提不得：有了马列主义天下万事都能干。说我的马列主义比你高，所以一切都比你强。杨济时认为这是共产党的宗派主义。他说：我很不客气地要问：天津这么多共产党员真正懂马列主义的有几个？揭穿开来看，没有几个，那些共产党员只不过是“空城计”罢了。","type":"paragraph"},{"text":" (原载1957年5月29日“天津日报”)","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b97bac0273"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
