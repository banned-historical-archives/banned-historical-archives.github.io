[],"dates":[{"year":1977,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"打倒“四人帮”　农业能大上"},{"type":"paragraph","text":"四川五千多万亩夏熟作物全面丰收"},{"type":"paragraph","text":"据新华社成都一九七七年六月十一日电　打倒“四人帮”，农业能大上。受“四人帮”严重干扰破坏的四川省，在大治之年，农业生产旗开得胜，首战告捷。全省五千多万亩夏熟作物全面丰收，小麦、马铃薯、蚕豆、豌豆等粮食作物总产量，突破了历史最高水平；油菜籽的收成也超出原来的预料，比去年增产。这是全省各级党组织高举毛主席的伟大旗帜，紧跟华主席抓纲治国的战略决策，带领广大干部和社员深揭狠批“四人帮”，大干社会主义的丰硕成果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7a15c9bf9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
