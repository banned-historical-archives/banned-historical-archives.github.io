必经之路","authors":[],"dates":[{"year":1966,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"多米尼加六月十四日革命运动驳斥修正主义分子鼓吹的投降路线"},{"type":"paragraph","text":"革命武装斗争是解放祖国的必经之路"},{"type":"paragraph","text":"新华社十三日讯　圣多明各消息：多米尼加六月十四日革命运动机关报《六月十四日报》在去年十一月二十五日一期发表社论说，多米尼加人民的经验是：为了进行革命和取得解放，人民“不仅必须抵抗反动统治阶级的暴力镇压，而且也应当准备好对付美帝国主义者的武装干涉。”"},{"type":"paragraph","text":"社论驳斥了多米尼加修正主义分子鼓吹的对帝国主义妥协投降的路线。社论说，“他们走得很远，居然敢说，在我们这样受侵略成性的美帝国主义控制和侵略的国家里，能够出现‘不经过内战实现社会经济结构深刻变革的可能性’。”社论说，多米尼加的现实驳斥了机会主义者和修正主义者的上述谬论。"},{"type":"paragraph","text":"社论说：“反动阶级决不会自动交出政权，并且总是它首先使用暴力来镇压群众的革命运动和挑起内战。因此，武装斗争就提到议事日程上来。”"},{"type":"paragraph","text":"社论引用多米尼加人民的经历说：多米尼加人民经过一浪高于一浪的革命斗争，去年四月在民主军人的参加下，推翻了卡夫拉尔的三人委员会。但是这时“美帝国主义进行了强盗般的武装干涉”，又在多米尼加强行建立了“复兴”傀儡政府。"},{"type":"paragraph","text":"社论表示：六月十四日革命运动过去和现在都坚持武装斗争，并且号召“全党和战士们做好准备，把武装斗争作为取得我们祖国的解放必经之路来训练和教育群众。”"},{"type":"paragraph","text":"《六月十四日报》在同期一篇题为《十一月起义》的文章中说，多米尼加一九六三年十一月起义“向人民指出了战胜帝国主义和寡头势力的最有保障的道路：革命武装斗争。”它说，六月十四日革命运动重申它的坚定决心：不惜牺牲坚持斗争，直到把帝国主义彻底驱逐出去，建立一个新社会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7cdc4e253"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
