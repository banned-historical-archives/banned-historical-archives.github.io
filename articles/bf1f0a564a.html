”","铁道部"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"杂文——党团猜疑","type":"title"},{"text":"铁道部“鸣者”","type":"authors"},{"text":"党团猜疑    　鸣者(成都铁道部第二设计院)","type":"subtitle"},{"text":"捕风捉影，君不见肃反：杀气森森，人人自危；献媚取宠，积极自脱。构成天罗地网，斗争会上解释无权。国家政策不给以“反革命”自由，堪笑责难皆莫须有。君曾见否，十五贯中县官明镜，恨况钟何其少哉！斗争会上，瞪眼拍桌辱百般，受辱何辜？人权何在？不堪受辱，负气自杀，自杀不足惜！公式——自杀者——反革命。肃反不可少，肃反知多少。但愿公告书，斗几是几，百分比，检查工作，今后改进。","type":"paragraph"}],"comments":[],"origin":"《四川省右派言论选辑3》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf1f0a564a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
