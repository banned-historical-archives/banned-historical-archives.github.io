ear":1958,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席和周总理"},{"type":"paragraph","text":"电贺巴基斯坦国庆"},{"type":"paragraph","text":"新华社22日讯　毛泽东主席21日致电巴基斯坦伊斯兰共和国总统伊斯坎德尔·米尔扎，祝贺巴基斯坦国庆。电文如下：巴基斯坦伊斯兰共和国总统伊斯坎德尔·米尔扎阁下总统先生："},{"type":"paragraph","text":"值此巴基斯坦伊斯兰共和国国庆之际，我谨代表中国人民，并以我个人的名义向阁下和贵国人民致以热忱的祝贺。祝贵国繁荣、人民幸福、阁下身体健康。"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"一九五八年三月二十一日"},{"type":"paragraph","text":"新华社22日讯　周恩来总理21日致电巴基斯坦伊斯兰共和国总理马利克·菲罗兹·汗·努恩，祝贺巴基斯坦国庆。电文如下：巴基斯坦伊斯兰共和国总理马利克·菲罗兹·汗·努恩阁下阁下："},{"type":"paragraph","text":"值此巴基斯坦伊斯兰共和国国庆之际，我谨代表中华人民共和国政府，并以我个人的名义向巴基斯坦伊斯兰共和国政府和阁下表示热烈的祝贺。祝我们两国之间的友好关系获得进一步的发展。祝贵国人民在建设自己国家的事业中取得新的成就。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九五八年三月二十一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c02528f4f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
