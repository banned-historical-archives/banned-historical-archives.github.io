script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抬头仰望北斗星，日夜想念毛主席","authors":["林瑞"],"dates":[{"year":1967,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抬头仰望北斗星，日夜想念毛主席"},{"type":"paragraph","text":"北京地质学院东方红公社　林瑞"},{"type":"paragraph","text":"我们地质学院“东方红”战士，满怀革命的壮志豪情，观看了动人心弦的影片《毛主席第五、第六次检阅文化革命大军》。"},{"type":"paragraph","text":"去年十月，我们最最敬爱的领袖毛主席，在群众性批判资产阶级反动路线的高潮中，身穿绿军装，又一次检阅了来自五湖四海的红卫兵小将和革命师生。这是我们最大的幸福，是对我们最大的鼓舞！我们怎么能忘记那激动人心的场面，我们怎么能忘记那幸福的时刻！毛主席出现在那儿，那儿就是一片沸腾的欢呼，那儿就是一片红浪翻滚的海洋。我们千遍万遍地呼喊，千声万声地歌唱，凝为一句最响亮的语言：祝我们心中最红最红的红太阳毛主席万寿无疆！"},{"type":"paragraph","text":"看了影片，一幕幕艰苦斗争的经历，又浮现在我们的眼前。"},{"type":"paragraph","text":"去年六月初，我们响应伟大领袖毛主席的号召，高举“造反有理”的大旗，千万张排炮般的大字报，射向学校党内一小撮走资本主义道路的当权派。"},{"type":"paragraph","text":"但是，阶级敌人是不甘心灭亡的。他们越是濒于灭亡，就越要进行垂死挣扎。就在这无产阶级文化大革命蓬勃开展的时候，党内头号走资本主义道路的当权派制定了一条抗拒毛主席的无产阶级革命路线的资产阶级反动路线，向我们无产阶级革命派发动了一次又一次猖狂的反扑。由于有党内头号走资本主义道路当权派支持，我校党内一小撮走资本主义道路的当权派把贴第一张大字报的革命同学打成“右派”“反革命”，并且破口大骂我们是“遮不住太阳的乌云”；接着，他们又掀起了一股“反干扰”的妖风。他们站在资产阶级反动立场上，疯狂地围剿革命派，妄图扼杀新生的革命力量。"},{"type":"paragraph","text":"“抬头仰望北斗星，心中想念毛主席”。在资产阶级反动路线的毒焰妖雾中，在党内头号走资本主义道路当权派所制造的白色恐怖的日子里，我们地质学院“东方红”战士和全国各地无产阶级革命派战士一样，是多么想念毛主席他老人家啊！毛主席啊，毛主席！迷路时想起您有方向，困难时想起您添力量！在对资产阶级反动路线进行群众性大批判的高潮中，您又一次检阅我们，对我们是鼓舞，是鞭策，是号召，是命令。在毛主席的鼓励下，我们把对资产阶级反动路线的批判推向了一个更新的高潮。"},{"type":"paragraph","text":"敬爱的毛主席，您给我们撑腰，我们给您争气！我们一定要在批判党内头号走资本主义道路当权派的斗争中，创新功，建新劳；我们一定要彻底批判干部问题上“打击一大片，保护一小撮”的资产阶级反动路线；批臭《修养》，坚决铲除资产阶级反动路线的思想基础和理论基础。我们还要在改造客观世界的同时改造主观世界，夺头脑里“私”字的权，不断地加强我们队伍的革命性、科学性和组织纪律性，在阶级斗争的风雨中，把自己培养成无产阶级革命事业可靠的接班人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b767e9f46d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
