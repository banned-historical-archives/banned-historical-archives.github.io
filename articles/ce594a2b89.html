ear":1963,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见索马里总理舍马克"},{"type":"paragraph","text":"新华社九日讯　毛泽东主席今天下午接见索马里共和国总理阿卜迪拉希德·阿里·舍马克博士及其随行人员：新闻部长阿里·穆罕默德·希拉维，公共工程和交通部司长阿里·谢赫，农业部司长穆罕默德·伊萨，工农业全国协会主席艾哈迈德·达希尔·哈桑，全国对外贸易机构主席伊斯梅尔·纳哈尔，总理私人秘书阿卜杜拉赫曼·法拉赫·伊斯梅尔。"},{"type":"paragraph","text":"毛主席同索马里贵宾进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有：周恩来总理，陈毅、李先念副总理，外交部副部长黄镇，对外经济联络总局局长方毅，对外文化联络委员会副主任张致祥，中国驻索马里大使张越，外交部西亚非洲司司长王雨田、礼宾司副司长葛步海。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"八月九日，毛泽东主席接见了索马里共和国总理阿卜迪拉希德·阿里·舍马克博士及其随行人员。毛泽东主席同索马里贵宾进行了亲切友好的谈话。图为毛泽东主席和舍马克总理等索马里贵宾合影。前排左起第五人是舍马克总理。　　　　　新华社记者　吕厚民摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce594a2b89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
