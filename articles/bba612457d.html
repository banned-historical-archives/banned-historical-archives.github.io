"],"dates":[{"year":1952,"month":2,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"四平市棉花公司领导方面"},{"type":"paragraph","text":"应立即纠正严重的右倾思想"},{"type":"paragraph","text":"辽西四平市棉花公司领导方面，在反贪污、反浪费、反官僚主义运动中表现的严重的右倾思想，须立即纠正。"},{"type":"paragraph","text":"自二月四日中共四平市委员会书记周健同志作了关于“打虎”的报告后，二十多天以来，四平市棉花公司领导方面一直都没有行动起来。二月十四日翟泽经理曾说：“如果让签字盖章，我就敢保证没有大贪污分子！”这可以说明领导方面的右倾思想是多么严重。该公司所属某工厂厂长郝彦荣，在义县百货公司经理任内有一些贪污线索，当群众在会上提出时，领导方面竟阻挠说：“不能在会上提。如果提了，不是丧失了领导上的威信吗？……”当石显章同志请求节约检查委员会批准他去调查关于于风桐的材料时，郝彦荣竟不让去调查。群众怕“穿小鞋”，把意见直接反映给市委。人事股股长李彦荣知道后，便威胁赵世钱同志说：“你们竟给领导上扣帽子，一切后果由你们负责。”又说：“你们这样整，运动就由你们领导吧！”郝彦荣也找赵世钱说："},{"type":"paragraph","text":"“你们的主谋是谁呀！……”由于领导思想的麻痹、软弱，贪污分子故意耍花招，斗争没有什么结果。节约检查委员会的成份也有问题，连手脚不干净的于风桐也参加了委员会。当群众把于风桐的问题一一揭发后，领导方面虽然感到了“惊讶”，但因为于风桐“工作积极”，仍然让于风桐去沈阳作"},{"type":"paragraph","text":"“调查工作”。这也可以说明领导思想右倾的严重。"},{"type":"paragraph","text":"我希望有关领导方面，来检查一次四平市棉花公司的运动情况。"},{"type":"paragraph","text":"青问松"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bba612457d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
