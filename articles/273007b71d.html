script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文化大革命是我们的根本利益  沙石峪贫下中农决心把反击右倾翻案风的斗争进行到底","authors":[],"dates":[{"year":1976,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命是我们的根本利益"},{"type":"paragraph","text":"沙石峪贫下中农决心把反击右倾翻案风的斗争进行到底"},{"type":"paragraph","text":"河北省遵化县沙石峪大队的社员和全国广大贫下中农一样，正在抓阶级斗争，促春耕生产，积极开展回击右倾翻案风的斗争。前天，红色电波传来毛主席的重要指示，整个山村立即沸腾起来。广大贫下中农在学习讨论会上，激动地说：毛主席说出了我们的心里话！党内那个不肯改悔的走资派闹翻案，我们要同他斗到底！"},{"type":"paragraph","text":"党内那个不肯改悔的走资派极力攻击无产阶级文化大革命，妄图翻文化大革命的案，这究竟意味着什么？沙石峪大队的贫下中农认真进行了分析。他们回顾了文化大革命以来大队发生的深刻变化。首先是人的精神面貌的改变。广大贫下中农和社员群众在文化大革命中，通过学习马列著作和毛主席著作，批判刘少奇、林彪反革命的修正主义路线，阶级斗争和路线斗争的觉悟大大提高。领导班子实行老、中、青三结合，老支书张贵顺更加焕发了革命青春，新生力量正在茁壮成长。政治夜校培养了贫下中农理论队伍，推动了全大队学习无产阶级专政理论的群众运动。九年一贯制的新型学校办起来了，还附设了幼儿班。全大队广大贫下中农和社员群众进一步发扬“愚公移山，改造中国”的革命精神，打井修渠，平整梯田，还开始搞“人造平原”，为农业机械化创造条件。过去是“土如珍珠，水如油，漫山遍野大石头”的穷山沟，现在变成了“层层梯田布满山，松柏成林果树园，井水高扬上百米，半山腰里水浇田”的社会主义新农村。一九七三年，大队粮食总产量就比文化大革命前翻了一番，现在亩产已经过了“长江”。他们指出，党内那个不肯改悔的走资派妄图算文化大革命的账，否定文化大革命的胜利成果，想把我们拉回到旧社会去，让我们吃二遍苦，受二茬罪，我们贫下中农坚决不答应！在学习毛主席重要指示的时候，广大党员、团员、民兵，以及下乡知识青年说，毛主席指出：“翻案不得人心。”党内那个不肯改悔的走资派，想继续推行刘少奇、林彪的修正主义路线，复辟资本主义，我们就要批判他，坚决同他斗！"},{"type":"paragraph","text":"在革命大批判中，沙石峪大队的干部、群众反复学习毛主席的重要指示：“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目。”回顾了二十多年来阶级斗争、路线斗争的历史。一九五五年，有办社和砍社的斗争；一九五九年，有坚持总路线、大跃进、人民公社三面红旗和右倾机会主义路线的斗争；国民经济暂时困难时期，有同“三自一包”、单干风的斗争；无产阶级文化大革命中，开展了对刘少奇、林彪修正主义路线的斗争。社员们说：二十多年的历史证明，阶级斗争从来没有停止过。今天的沙石峪，就是在不断的斗争中发展起来的。党内那个不肯改悔的走资派抛出“三项指示为纲”，否定以阶级斗争为纲，是要我们放松革命警惕性，好让他放手复辟资本主义。他这是痴心妄想！我们一定要认真学好毛主席的重要指示，掌握反击右倾翻案风的强大思想武器，把这场斗争进行到底。"},{"type":"paragraph","text":"本报记者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"273007b71d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
