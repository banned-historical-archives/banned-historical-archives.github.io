<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"摆正全局与局部的关系  上海第一化工机械厂学习无产阶级专政理论，批判“利润挂帅”的修正主义路线","authors":[],"dates":[{"year":1975,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"摆正全局与局部的关系"},{"type":"paragraph","text":"上海第一化工机械厂学习无产阶级专政理论，批判“利润挂帅”的修正主义路线"},{"type":"paragraph","text":"上海第一化工机械厂党支部，在组织工人和干部学习无产阶级专政理论的过程中，联系实际，调查研究，批判“利润挂帅”的修正主义路线，克服片面追求产值的错误倾向，摆正全局和局部的关系。"},{"type":"paragraph","text":"上海第一化工机械厂，是一个只有一百七十人的小厂，主要生产牙膏设备和三辊研磨机。随着城乡市场牙膏销售量的增加，有关工厂和部门要求他们多生产牙膏设备，以适应增产牙膏的急需。但是，在厂里安排生产的时候，由于牙膏机是一种“料轻、工重、产值低”的产品，常常被“料重、工轻、产值高”的研磨机挤掉。至于牙膏厂急需的高精度的牙膏自动灌装机等新品种，更是一直上不去。"},{"type":"paragraph","text":"毛主席关于理论问题的重要指示发表以后，这个厂的党支部决心以无产阶级专政的理论为指导，认真解决这个问题。工厂理论小组的同志带着这个问题走访用户，调查研究。他们在上海牙膏厂访问时，看到那里有十条生产线，就因为缺少牙膏自动灌装机，不得不在灌装这道工序上投入大量的人力。如果能增加十台牙膏自动灌装机，就能使这十条生产线都实现自动化生产，牙膏的年产量就可增加三分之一，劳动力可以节省一百二十个，产值可以从七千万元增加到一亿元，还能腾出场地一千八百平方米，用以扩大生产的规模。上海牙膏厂的干部、工人，迫切希望第一化工机械厂能在今年为他们提供十台牙膏自动灌装机。理论小组的同志回厂后，写出了调查报告，在全厂范围内提出了这个问题。党支部组织全厂干部、群众认真学习无产阶级专政的理论，结合理论小组的调查报告，发动群众充分讨论。在讨论中，许多同志说，牙膏机械上不去，主要是厂领导片面追求产值的思想在作怪：他们担心牙膏自动灌装机产值低，会影响完成全厂年产值计划，因而不愿生产牙膏自动灌装机。这是没有摆正全局和局部的关系，实质上反映了社会主义工厂是坚持无产阶级政治挂帅，还是搞“利润挂帅”的原则问题。"},{"type":"paragraph","text":"这个厂的干部和群众分析了产生片面追求产值的思想根源，并对它的危害性作了深刻批判。大家谈到，片面追求产值的错误思想所以会在一部分同志的头脑中起作用，这是因为：第一，“我国现在实行的是商品制度”，价值规律在生产和交换中还起一定的作用。在执行生产计划中，当发展新品种与提高产值发生矛盾的时候，价值规律的消极作用就会影响一部分人，他们只图完成产值计划，忽视国家和人民的需要。第二，有些同志由于受私有观念的影响，滋长了本位主义，只顾自己单位产值上得去，不管别厂和国家对于某种产品的急需。马克思说：“资本的目的不是满足需要，而是生产利润”。大利大干，小利小干，无利不干，这是资本主义生产所遵循的唯一原则。而我们社会主义经济是有计划、按比例的发展，是为了不断满足社会主义建设和人民生活日益增长的需要，这是区别于资本主义生产最本质的东西。如果不从理论上搞清楚社会主义企业发展生产的根本目的，不坚持无产阶级政治挂帅，不坚持社会主义方向，而是片面地追求产值的增长，就会使社会主义的计划经济变成资本主义的自由经济，就会使企业与企业之间的相互协作、互相配合关系变成互相对立、尔虞我诈的竞争关系，最后导致社会主义所有制演变成资本主义所有制。通过理论联系实际的学习和批判，这个厂的干部和群众看清了片面追求产值的危害性，提高了抵制这种错误倾向的自觉性。他们一致表示：只要国家急需，我们就坚决干。他们决心在今年内拿下十台牙膏自动灌装机，积极支援兄弟厂发展牙膏生产。"},{"type":"paragraph","text":"为了早日生产出牙膏自动灌装机，党支部成员同工人群众一起劳动，一起钻研，一起攻关。科室人员也走出办公室，深入现场，和工人一起战斗，一起解决问题。干部的实际行动，激励了群众的斗志，许多工人睡在厂里，日夜奋战。他们还提出“在一专上下功夫，多能上挖潜力”的战斗口号，积极搞好协作，充分发挥了工人阶级的主人翁精神和社会主义积极性。经过全厂职工的努力，已制造成功第一台牙膏自动灌装机。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76fbb4cbe0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
