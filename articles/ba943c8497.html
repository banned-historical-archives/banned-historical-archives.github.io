:[{"year":1962,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席　周恩来总理电贺摩洛哥王国国庆"},{"type":"paragraph","text":"新华社2日讯　中华人民共和国主席刘少奇和国务院总理周恩来今天打电报给摩洛哥国王哈桑二世，热烈祝贺摩洛哥王国国庆。电文如下：拉巴特摩洛哥国王哈桑二世陛下："},{"type":"paragraph","text":"在摩洛哥王国国庆的时候，我们谨代表中国人民和中华人民共和国政府，并且以我们个人的名义，向陛下，向摩洛哥人民和摩洛哥王国政府表示热烈的祝贺。"},{"type":"paragraph","text":"中摩两国间的友好关系，在和平共处五项原则和万隆会议十项原则的指导下，正在不断发展和加强。这不仅符合我们两国人民的共同愿望，而且有助于增进亚非各国的友好团结和维护世界和平。"},{"type":"paragraph","text":"祝陛下和摩洛哥人民在反对殖民主义、维护民族独立和建设自己国家的事业中取得更大的成就。祝中摩两国人民的友谊与日俱增。"},{"type":"paragraph","text":"中华人民共和国主席刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1962年3月2日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba943c8497"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
