art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"凯莱齐副主席从杭州回到北京","authors":[],"parts":[{"type":"paragraph","text":"据新华社杭州25日电 浙江省省长周建人和中共浙江省委书记处书记、浙江省副省长霍士廉今天中午举行宴会，热烈欢迎阿尔巴尼亚政府经济代表团团长、阿尔巴尼亚部长会议副主席凯莱齐。"},{"type":"paragraph","text":"国务院总理周恩来，中共中央总书记邓小平，国务院副总理陈毅出席了宴会。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使米·帕里夫蒂应邀出席了宴会。"},{"type":"paragraph","text":"周建人省长在宴会上致词，表示热烈欢迎凯莱齐副主席光临杭州。"},{"type":"paragraph","text":"凯莱齐副主席在宴会上讲了话。他说，这次来中国访问，到处都感觉到中国人民、中国政府和中国共产党对阿尔巴尼亚人民、阿尔巴尼亚政府和阿尔巴尼亚劳动党的真诚友谊。他说，我们两国之间的友谊是建立在不朽的马克思列宁主义的基础上的。"},{"type":"paragraph","text":"凯莱齐说，我们两国最近签订了许多重要协定，这些协定将对阿尔巴尼亚的国民经济建设起重要的作用。他对中国的国际主义援助表示感谢。"},{"type":"paragraph","text":"他说，我们在反对美帝国主义和南斯拉夫现代修正主义的斗争中，都证明了马克思列宁主义象日光一样的明亮、正确。"},{"type":"paragraph","text":"凯莱齐副主席是由中共中央总书记邓小平、中共中央委员伍修权陪同，在24日下午由北京乘飞机到达杭州进行访问的。"},{"type":"paragraph","text":"据新华社25日讯 阿尔巴尼亚政府经济代表团团长、阿尔巴尼亚部长会议副主席凯莱齐，由中共中央委员伍修权陪同今天下午乘专机从杭州回到北京。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使米·帕里夫蒂也同机从杭州到达北京。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc4d5aad04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
