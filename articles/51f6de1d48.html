<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批转河南省委关于在乡干部中不用右派分子名称的请示","authors":[],"dates":[{"year":1958,"month":1,"day":15}],"is_range_date":false,"parts":[{"text":"中共中央批转河南省委关于在乡干部中不用右派分子名称的请示","type":"title"},{"text":"上海局，各省、市、自治区党委：","type":"appellation"},{"text":"中央基本同意河南省委关于在乡干部中不用右派分子名称的意见。乡（区）级整风，不进行反右派斗争。部分家庭出身复杂和知识分子成分的乡（区）干部，需要进行反右派斗争的，可以有计划地吸收到县级机关参加整风；下放的，可以调回原机关整风。采取三级干部会议形式进行县、乡（区）、社干部整风的，对于家庭出身复杂和知识分子成分的反党反社会主义分子，应当划右派；对于劳动农民出身的、脱产不久的乡（区）、社干部，不划右派，只按错误性质进行批判或处分。","type":"paragraph"},{"text":"兹将河南省委意见转发你们参考。","type":"paragraph"},{"text":" 中共中央1958年1月15日","type":"paragraph"},{"text":"关于在乡干部中不用右派分子的名称的请示","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"目前，我省正在进行的县级整风运动，吸收了一批乡级干部参加。在县级整风之后，将要进行乡级整风。","type":"paragraph"},{"text":"乡级干部经过阶级斗争和长期劳动锻炼，经过多次的整顿和调整，绝大多数是可以信任、可以依靠的。","type":"paragraph"},{"text":"我省有大乡2748个（已取消区），小乡2859个（未取消区），乡级干部共有62000人。其中2万人是农业合作化之后由区以上各级领导机关下放的，这一批干部，家庭出身比较复杂，有一部分是知识分子，在整风运动中，同其他的国家机关工作人员一样，有右派，就应该划出右派分子。其余42000人是土生土长的，他们脱离生产一般只有2、3年的时间，在未划大乡之前，他们实际上是处于半脱产的地位。这些干部一般出身于劳动农民家庭，大都是土改以来的积极分子，经过阶级斗争和劳动的锻炼，与群众有密切联系，坚决执行党的任务。同时，他们也程度不同地带有农民的思想，往往盲目地反映农民个人主义的情绪。在大放大鸣中，他们当中有一部分人发表了一些类似右派言论的意见或附和某些右派的言论，但是只要从阶级立场上提醒他们，经过摆事实，讲道理，新旧社会回忆对比，大辩大争，他们是容易明白大是大非的，在纠正了错误思想之后，仍然能够积极为社会主义奋斗的。","type":"paragraph"},{"text":"经过整风，必须从政治上、思想上、组织上纯洁乡级干部的队伍，对于乡干中极少数阶级异己分子、严重的违法乱纪分子和具有资本主义倾向的分子，必须开展严肃的斗争，这是丝毫不能动摇的。但是，鉴于上述乡干的特点，考虑到乡干与农民的密切关系，我们认为在整风运动中，对原来的乡干（不包括由区县以上机关下放到乡的干部）当中存在的资本主义思想、忘本思想，应当认真批判，但是不戴右派分子的帽子为宜。如果是反革命分子、阶级异己分子、流氓分子、坏分子的，可按各人具体情况加以确定，严肃处理，但一律不用右派分子的名称。","type":"paragraph"},{"text":"以上意见是否妥当，请中央指示。","type":"paragraph"},{"text":" 中共河南省委1958年1月4日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51f6de1d48"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
