art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"宁武县以维权激励官兵建功军营","authors":["原文革/聂国寿"],"parts":[{"type":"paragraph","text":"本报讯 原文革、聂国寿报道：山西省宁武县人武部积极开展维护国防利益和军人军属合法权益活动，近2年来，共帮助军人军属解决涉法问题26起，受到驻地政府和军人军属的称赞。"},{"type":"paragraph","text":"该县石家庄镇村民田二仁是1948年入伍的退伍军人，在一次赶庙会时无故受到伤害。在奔走多时索赔都没有结果的情况下，老人来到设立在该县人武部的维权办公室请求帮助。人武部调查了解后找有关部门协商处理，很快帮老人讨回了公道。该县籍战士小田的父亲反映，其所在乡政府克扣他家的优待金。维权办公室核实后给该乡政府领导宣传优待的法规政策，乡政府领导认识到自己的错误，很快补发了战士的优待金。该县维权活动的大力开展，激发了官兵在军营建功立业的积极性，近年来，该县人武部共收到该县籍官兵立功受奖的喜报63份。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ca6f1c26a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
