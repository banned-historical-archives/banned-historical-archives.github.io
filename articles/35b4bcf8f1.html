script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海学术文化界开始批判胡适资产阶级思想","authors":[],"dates":[{"year":1955,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海学术文化界胡适思想批判讨论会哲学、文学、教育、历史、政治五个组，在一月下旬分别举行了第一次讨论会。"},{"type":"paragraph","text":"哲学组着重批判了胡适的实用主义。复旦大学教授胡曲园在会上详尽地说明了实用主义产生的时代背景，并揭露了胡适派实用主义唯心论哲学的危害。"},{"type":"paragraph","text":"文学组根据作家王元化所作‘胡适派文艺思想批判’的报告，展开了讨论。"},{"type":"paragraph","text":"在教育组的讨论会上，刘季平从实用主义教育思想的社会历史背景等方面，批判地分析了实用主义教育思想的危害性。"},{"type":"paragraph","text":"历史组的讨论题目是‘胡适的反动历史观批判’。会上，华东师范大学历史系主任吴泽批判了胡适的庸俗进化论历史观。会议根据他的发言进行了讨论，并对今后如何更好地批判胡适的反动历史观，提出了意见。"},{"type":"paragraph","text":"中共上海市委员会宣传部长彭柏山在政治组讨论会上的发言揭发了胡适政治思想的反动本质，阐述了彻底批判与揭穿胡适政治思想的反动面目，清除其在学术界与社会上的恶劣影响对推进我国社会主义建设和社会主义改造事业的意义。"},{"type":"paragraph","text":"【新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35b4bcf8f1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
