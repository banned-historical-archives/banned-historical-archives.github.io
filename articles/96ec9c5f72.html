ear":1954,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十五日电】　中国共产党的领导者毛泽东、刘少奇、周恩来、朱德、陈云、林伯渠、董必武、彭德怀、彭真、邓小平等同志在二十五日下午七时二十五分，前往北京西郊苏联展览馆参观“苏联经济及文化建设成就展览会”。"},{"type":"paragraph","text":"苏联驻我国大使尤金院士、苏联商务代表米古诺夫和苏联经济及文化建设成就展览会主任鲍里辛科陪同毛泽东主席等参观。"},{"type":"paragraph","text":"毛泽东主席等在展览会参观历时共四小时。他们仔细地参观了展览会的工业馆、农业馆、食品馆、文化馆、高等教育馆和美术作品馆等各个部分，并在莫斯科餐厅进餐。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96ec9c5f72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
