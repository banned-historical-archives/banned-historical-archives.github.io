rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中共“九大”文件是对马克思主义、列宁主义、毛泽东思想的极重要贡献","authors":[],"parts":[{"type":"paragraph","text":"新华社墨尔本三十日电 澳大利亚共产党（马克思列宁主义）机关报《先锋报》最近发表社论，号召澳大利亚全体革命者深入学习中国共产党第九次全国代表大会的文件。"},{"type":"paragraph","text":"社论说：“中国共产党的第九次全国代表大会确实是一个具有历史意义的事件。这次大会的文件是对马克思主义、列宁主义、毛泽东思想的极为重要的贡献。”"},{"type":"paragraph","text":"社论说：“澳大利亚共产党人的任务，正如我们所指出过的，是把马克思主义、列宁主义、毛泽东思想的普遍真理同澳大利亚的实际情况结合起来。这就是说，要把马克思所提出的、由列宁和毛泽东所发展了的理论交给澳大利亚人民，并且应用到澳大利亚的斗争中去。这个理论揭示了社会的本质、阶级斗争以及怎样进行阶级斗争来推翻资本主义，建立无产阶级专政。”"},{"type":"paragraph","text":"社论指出，马克思主义、列宁主义、毛泽东思想提供了唯物辩证法的世界观。对澳大利亚革命者来说，就是要把它运用到澳大利亚的革命斗争中去。中国共产党第九次全国代表大会的文件贯穿着唯物辩证法，因为这些文件是从中国和世界的斗争中总结出来的。"},{"type":"paragraph","text":"社论强调说，这些文件是大家学习的典范，是澳大利亚革命者努力把马克思主义、列宁主义、毛泽东思想的普遍真理同澳大利亚的实际相结合以及如何带着问题进行学习的典范。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2580909f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
