良","卢犹崇","吴明俊","熊武才","西北农学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于学习苏联等政策","type":"title"},{"text":"西北农学院卢犹崇吴明俊熊武才刘安良","type":"authors"},{"text":"1．“连五级分制也学苏联”,“党不信任中国专家”。“我认为党是力量不足，方法不多，只是教条主义的学习苏联。”(农60级学生　卢犹崇)","type":"paragraph"},{"text":"2．“我们应该向资产阶级的教官方面学习。”(植59级学生　吴明俊)","type":"paragraph"},{"text":"3．“咱们民族政策执行有问题，现在西藏不少民族暴动了，杀了很多干部，情况很复杂。”“我国咋还在裁军，我回家时，一路上军官很多，到西藏去镇压暴乱去了。”(植59级学生  吴明俊)","type":"paragraph"},{"text":"4．“基督教是好的，不过现在解放了，没有人信它了。”(无名)","type":"paragraph"},{"text":"5．“中国人口太多，最好不发展医学，让害病的人死一些，人口就少了，用不着节育了。”(农60级学生　熊武才)","type":"paragraph"},{"text":"6．“我国现在提人口节育问题，马尔萨斯人口论，也是好的，它也是节育问题。”(无名)","type":"paragraph"},{"text":"7．“现在对劳改队在政治上是剥夺，而经济上是剥夺，因为他们劳动出来的，未全归己有。”(经60级学生　刘安良)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7a596b888"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
