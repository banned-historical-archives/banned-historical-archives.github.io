tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理途经缅甸时同吴奈温总统会谈","authors":[],"parts":[{"type":"paragraph","text":"据新华社仰光十一月十四日电 邓小平副总理今天于回国途中在仰光机场停留时，同缅甸总统吴奈温举行了会谈。他们就共同关心的国际问题特别是就亚洲形势交换了意见。"},{"type":"paragraph","text":"当邓副总理和吴奈温总统并排坐在仰光明加拉顿机场贵宾室时，邓副总理说：“很高兴又见到了你。我是路过这里来看一看老朋友，顺便同吴奈温总统交换意见。欢迎总统阁下和总理阁下在方便的时候随时去中国访问。”吴奈温总统对邓副总理出访东南亚取得的成功表示祝贺，并要求邓副总理转达他对华国锋主席、叶剑英委员长、李先念副总理和邓颖超副委员长的问候。"},{"type":"paragraph","text":"为时一小时半的会谈是在十分亲切友好的气氛中进行的。会谈结束后，吴奈温总统设午宴招待邓副总理。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64e7b0c3c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
