日报》把反动影片《清宫秘史》剧本拿出来示众并发表编者按","authors":[],"dates":[{"year":1967,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卖国主义影片《清宫秘史》定要彻底批判"},{"type":"paragraph","text":"资产阶级反动路线的流毒定要彻底肃清"},{"type":"paragraph","text":"《光明日报》把反动影片《清宫秘史》剧本拿出来示众并发表编者按"},{"type":"paragraph","text":"新华社二日讯　为供革命群众进行分析批判，《光明日报》今天刊登了反动影片《清宫秘史》的电影剧本，同时发表了编者按语。"},{"type":"paragraph","text":"《光明日报》编者按全文如下："},{"type":"paragraph","text":"《红旗》杂志第五期发表了戚本禹同志的重要文章《爱国主义还是卖国主义？》，对反动影片《清宫秘史》及其吹捧者进行了深刻的批判。"},{"type":"paragraph","text":"《清宫秘史》是一部所谓历史题材的影片，曾于一九五○年在北京、上海等地放映。影片公开站在帝国主义、封建主义和反动资产阶级立场上，任意歪曲历史事实，美化帝国主义，美化封建主义和资产阶级改良主义，歌颂保皇党，污蔑群众运动和人民反帝反封建的英勇斗争，宣扬民族投降主义和阶级投降主义。"},{"type":"paragraph","text":"毛主席早就严正指出：《清宫秘史》是一部卖国主义的影片，应该进行批判。可是，这样一部卖国主义影片，却被党内最大的走资本主义道路当权派吹捧为“爱国主义”的影片，而反革命修正主义分子陆定一、周扬和胡××等，秉承他的意旨，顽固地坚持资产阶级反动立场，公然和毛主席唱对台戏，一直拒绝对这株毒草进行批判。"},{"type":"paragraph","text":"对《清宫秘史》的截然相反的评价和态度，决不仅仅是对一部具体影片的看法的不同。它是以毛主席为首的无产阶级革命派和党内一小撮走资本主义道路当权派在文化思想战线上第一次短兵相接的交锋。围绕《清宫秘史》这部反动影片的斗争，是资产阶级同无产阶级两个阶级的斗争，是马克思列宁主义、毛泽东思想同资产阶级改良主义、修正主义思想的斗争，是资本主义复辟同无产阶级反复辟的斗争。归根结底，是资本主义同社会主义谁战胜谁的斗争。"},{"type":"paragraph","text":"毛主席教导我们：有错误就得批判，有毒草就得进行斗争。现在，我们把《清宫秘史》的电影剧本刊登出来，供革命群众进行分析批判。"},{"type":"paragraph","text":"反动的、彻底的卖国主义影片《清宫秘史》，一定要在这次无产阶级文化大革命运动中受到革命群众的彻底批判。对抗毛主席指示的一小撮反革命修正主义分子，以及背后支持他们的党内最大的走资本主义道路的当权派，也一定要在运动中受到革命群众的彻底批判。我们希望广大革命群众，高举革命的批判旗帜，勇敢地投入战斗，彻底批判和肃清以党内最大的走资本主义道路的当权派为代表的资产阶级反动路线在各方面的流毒；大破剥削阶级的旧思想，大立毛泽东思想，把无产阶级文化大革命进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcb687a6bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
