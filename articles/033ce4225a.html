ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对谢富治关于公安部机关精简设想的批语","alias":"","parts":[{"type":"paragraph","text":"对谢富治关于公安部机关精简设想的批语"},{"type":"paragraph","text":"（1966年8月26日）"},{"type":"paragraph","text":"印发政治局各同志研究。我看这个设想是好的，应在下一次会议上谈一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十六日"},{"type":"paragraph","text":"[1]国务院副总理兼公安部部长谢富治1966年8月25日关于公安部机关的精简问题给毛泽东写报告说，根据今年4月主席在杭州关于公安部应砍掉2/3的指示精神，我们在5月间发动处以上干部就精简问题进行了鸣放辩论。经过几个月的配酿，特别是经过文化大革命，解决精简问题已完全成熟了。目前公安部有行政编制1400多人，机构庞大。根据公安工作主要是依靠党、依靠群众的根本路线和上虚下实的原则，我们设想，把现在的12个局合并为6个，90个处合并为30多个，行政编制由1400多人减到400多人。企、事业单位现有7000多人，分别交给有关单位。我们还设想，在文化大革命运动后期，发动群众大鸣大放，彻底革命，力争把行政编制减到二三百人。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":522,"page_end":522},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"033ce4225a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
