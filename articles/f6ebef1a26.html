ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"复潘汉年电","alias":"","parts":[{"type":"paragraph","text":"复潘汉年电！"},{"type":"paragraph","text":"（1949年1月20日）"},{"type":"paragraph","text":"（一）中共对时局的态度已见毛主席十四日声明，任何方面均可照此声明去做。（二）南京集团是主要内战罪魁。李、白对内战亦负有责任，如欲减免内战罪责，必须对人民解放事业有具体而确实的贡献。如李宗仁尚欲取蒋而代，白崇禧尚欲获得美援反对我军，则将不能取得人民谅解，可以断定无好结果。（三）如白欲派代表与刘、邓联络，可到郑州市政府接洽。"},{"type":"paragraph","text":"[1]这是毛泽东为周恩来、李克农起草的关于答复黄绍复潘汉年电的主要内容。李克农，当时任中共中央社会部部长。黄绍，当时是国民党中央委员，国民党政府监察院副院长、立法委员。"},{"type":"paragraph","text":"[2]李，指李宗仁。白，指白崇禧，当时任国民党军华中军政长官公署长官。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":1,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":43,"page_end":43},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6ebef1a26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
