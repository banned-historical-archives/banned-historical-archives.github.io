,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在我们党内，究竟怎样运用新陈代谢规律，解决好新老交替问题呢?叶剑英同志认为，主要是解决好两个方面的问题。"},{"type":"paragraph","text":"首先，年大体弱的老同志要敢于承认后来居上，充分认识新陈代谢规律是客观的，新老交替是必然的，不以人的意志为转移的，从而认清大势，服从规律，主动退位让贤。当然，对于老同志的“退”，叶剑英同志并不是主张“一刀切”，而是强调具体情况具体分析。早在六十年代前期，他经过调查研究，就分析了老干部的四种情况:第一种，虽然年大体弱，但是还能坚持工作，党的事业也需要他们继续留在领导岗位上，这也是党和人民的根本利益所要求的。第二种，主观上想多做工作，可是心有余而力不足，主动让位让贤。这种以革命事业为重，不以个人得失为重的态度，是应该尊敬和学习的。第三种，年老多病，自知不能担负现职工作，但还留在岗位上，不愿意让位、让贤。这对革命工作不利，对自己恢复健康也不利，是不能学习的。第四种，身体有些病，还能够做些工作，但却小病大养，游山玩水。玩劲很大，一工作就没劲了。这种人占着工作岗位不是干工作，而是混日子。对这种“混”的态度，不仅不能学习，而且要坚决反对。他希望退下来的老同志思想不能退，可以搞些调查研究，总结经验，继续做些力所能及的工作。同时，他要求全党、全社会要尊敬和照顾老干部，对他们妥善安置，使之“各得其所，以终天年”。(摘自《红旗》今年第一期)"}],"comments":[],"origin":"《红旗》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36f988cf0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
