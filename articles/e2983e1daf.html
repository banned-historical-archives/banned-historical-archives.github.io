ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"接见八路军新四军干部时的谈话","alias":"","parts":[{"type":"paragraph","text":"接见八路军新四军干部时的谈话！"},{"type":"paragraph","text":"（1942年12月）"},{"type":"paragraph","text":"你们当旅长、团长的同志，在整风中不要怕丢脸。下级对你们有意见，让他们统统讲出来，他们窝在心里的怨气吐完了，心情就舒畅了。你们把架子放下来，从实地向群众检讨反省一番，上下级之间的关系就改善了，内部就更加团结了。"},{"type":"paragraph","text":"（当毛泽东听他们说陕甘宁边区一家老百姓给-个分区司令员提了意见时）这是天大的好事！那个老百姓很有觉悟。中国几千年的历史，都是老百姓受官府的气，受当兵的欺负，他们敢怒而不敢言。现在他敢向我们一个分区司令员提意见，敢批评这位“长官”，你们看这有多么好！这是多么了不起的变化！"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":467,"page_end":467},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2983e1daf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
