art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为什么民族资产阶级不是我国新民主主义革命的对象？","authors":["唐均"],"parts":[{"type":"paragraph","text":"〗 答："},{"type":"paragraph","text":"我国过去是一个半殖民地、半封建的社会，无产阶级革命必须分成新民主主义革命和社会主义革命两个历史阶段。新民主主义革命的任务，是反对帝国主义、反对封建主义和反对官僚资本主义，而不是反对一般的资本主义；革命的锋芒是指向帝国主义、封建地主阶级和官僚买办资产阶级，而不是指向民族资产阶级。我国民族资产阶级不同程度地受着帝国主义的压迫和封建主义的束缚，因而在一定时期和一定程度上，能够参加反帝反封建反对官僚资本主义的革命，成为这一革命统一战线中的一支力量。但是，由于他们同帝国主义、封建主义仍然保持着一定的政治、经济的联系，因而又具有动摇性与妥协性的一面。我们党正是根据民族资产阶级两重性的特点，在整个民主革命时期，对民族资产阶级采取了又联合又斗争的政策，巩固了人民民主统一战线，最后终于取得了新民主主义革命的伟大胜利。"},{"type":"paragraph","text":"在社会主义革命时期，民族资产阶级既有剥削工人阶级，取得利润的一面，又有拥护宪法，愿意接受社会主义改造的一面。因此，我们党对待民族资产阶级，并不是把它当作敌我矛盾而是当作人民内部矛盾来处理，采取和平改造的方针，采用赎买的办法，消灭资本主义经济，把他们中的极大多数人改造为自食其力的新人。经过社会主义改造，我国的资本主义生产资料所有制早已转变为社会主义的生产资料所有制，民族资产阶级作为一个阶级已归于消灭。实践证明，我们党在中国革命的整个过程中，提出的对待民族资产阶级的一系列理论、方针、政策是完全正确的，是对马克思主义理论宝库的一个重要贡献。（唐均）"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12aa6da5fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
