script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"原上海市副市长、上海市政协副主席  金仲华同志骨灰安放仪式在上海举行  邓小平副主席，宋庆龄、谭震林、邓颖超、廖承志、胡厥文副委员长，方毅、谷牧副总理等送了花圈；彭冲同志主持追悼会","authors":[],"dates":[{"year":1978,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"原上海市副市长、上海市政协副主席"},{"type":"paragraph","text":"金仲华同志骨灰安放仪式在上海举行"},{"type":"paragraph","text":"邓小平副主席，宋庆龄、谭震林、邓颖超、廖承志、胡厥文副委员长，方毅、谷牧副总理等送了花圈；彭冲同志主持追悼会"},{"type":"paragraph","text":"新华社上海八月十五日电　八月十二日，上海市革命委员会在上海市革命公墓举行了隆重的金仲华同志骨灰安放仪式，为金仲华同志平反昭雪，恢复名誉。"},{"type":"paragraph","text":"金仲华同志是原上海市副市长、上海市政协第四届委员会副主席、上海社会科学院国际问题研究所所长、第三届全国人民代表大会代表，在林彪、“四人帮”反革命修正主义路线迫害下，于一九六八年四月三日在上海不幸逝世，终年六十一岁。"},{"type":"paragraph","text":"中共中央副主席、政协全国委员会主席邓小平，全国人民代表大会常务委员会副委员长宋庆龄、谭震林、邓颖超、廖承志、胡厥文，国务院副总理方毅、谷牧，政协全国委员会副主席沈雁冰、许德珩、史良、季方、胡子昂、荣毅仁，上海市革命委员会主任苏振华、第一副主任倪志福、第二副主任彭冲，送了花圈。"},{"type":"paragraph","text":"送花圈的还有人大常委会、国务院、政协全国委员会、中共中央统战部、国务院侨务办公室。中共上海市委、上海市革命委员会、政协上海市委和浙江省革命委员会、浙江省桐乡县革命委员会也送了花圈。"},{"type":"paragraph","text":"参加金仲华同志骨灰安放仪式的有上海市革命委员会第二副主任彭冲，市革命委员会副主任王一平、韩哲一、赵行志、杨富珍、杨心培、裴先白，市政协副主席张承宗、梁国斌、巴金、李干成、赵祖康、冯德培、刘靖基、吴若安、王致中、周谷城、卢于道，上海市高级人民法院院长关子展，以及在上海的人大常委会委员、全国政协常务委员，市革命委员会各部、委、办的负责同志和各民主党派的代表。"},{"type":"paragraph","text":"金仲华同志骨灰安放仪式由彭冲同志主持，王一平同志致悼词。"},{"type":"paragraph","text":"悼词中说：金仲华同志是浙江桐乡人，是我国新闻出版界的知名人士，著名的国际问题专家，在国内外享有声誉的社会活动家。在三十年代，他曾经主编过进步国际时事刊物《世界知识》，协助邹韬奋同志编辑进步报刊《大众生活》和《生活日报》，并创办《永生》杂志。抗日战争时期，他加入上海文化界救国会和宋庆龄副委员长主持的保卫中国同盟，积极从事抗日救亡的对外宣传工作，并向海外华侨、国际友好团体和个人筹募捐助财物，支援解放区和八路军、新四军。在上海和武汉，他与邹韬奋同志编辑《抗战》与《全民抗战》三日刊。在香港，他参与进步新闻机构国际新闻社的领导工作，并在他主编的《星岛日报》上传播进步舆论。"},{"type":"paragraph","text":"全国解放后，金仲华同志历任第一、二、三届全国人大代表，第一届全国政协委员，第一、二、三、四届上海市政协副主席，《新闻日报》社社长，《文汇报》社社长，《中国新闻》社社长，《中国建设》杂志社社长，华东军政委员会文化部副部长，上海市副市长，中华全国新闻工作者协会副主席，上海社会科学院国际问题研究所所长等职务。"},{"type":"paragraph","text":"金仲华同志的一生，追求真理，追求进步。他坚定不移地拥护中国共产党，热爱伟大领袖毛主席，与党长期合作，为人正派，待人诚恳，平易近人，工作认真踏实，孜孜不倦，兢兢业业，为中国人民的革命事业贡献了毕生的精力。"},{"type":"paragraph","text":"王一平同志代表上海市革命委员会郑重宣布，金仲华同志的政治历史是清楚的，党对他是了解的，信任的。他是值得我们尊敬和永远怀念的，应给予彻底平反昭雪，恢复名誉。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"谷牧","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7dfb56f57"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
