<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打倒剥削阶级的大奴才","authors":["贾进才"],"dates":[{"year":1967,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"打倒剥削阶级的大奴才"},{"type":"paragraph","text":"贾进才"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派是剥削阶级的大奴才。他站在地主、富农的立场上，宣扬“剥削无罪”、“剥削有功”的谬论，胡说什么“剥削是救人”，“剥削得越多功劳越大”。这完全是颠倒黑白的鬼话，无耻透顶！"},{"type":"paragraph","text":"剥削真的无罪吗？我说剥削有罪，罪恶滔天！"},{"type":"paragraph","text":"旧社会，我们大寨共有六十七户，耕种着八百亩土地。其中四户地主、富农就占有土地四百八十亩，而五十一户贫下中农只占有土地一百四十四亩。我们贫下中农无法生活，主要靠扛长工、打短工、出卖劳动力，来养家糊口。但是，我们顶着星星，披着月亮，累死累活劳动一年，到头来还是吃不饱，穿不暖，过着讨吃要喝、衣不遮体的穷苦生活。就拿我家来说吧，旧社会我给富农整整扛了二十五年长工，结果是房无一间，地无一垄。我的老伴宋立英，十一岁就给富农贾登元家当了丫头。在贾家，她挨打受骂、忍饥挨饿。她滚碾，推磨，洗锅，刷碗。她个子小，洗碗够不着锅台，要踩上小凳子洗，锅台把她本来就破烂不堪的衣服磨得露出了肚皮，实在不能穿了，她去找贾登元的老婆要一块补钉，谁知这个母老虎却说：“肚皮还怕磨破？磨破了还能长出来，怕什么！”党内最大的走资本主义道路当权派，你说说，这是剥削救人吗？这是剥削的功劳吗？不，这是剥削制度的滔天罪恶！"},{"type":"paragraph","text":"毛主席教导我们：“世上决没有无缘无故的爱，也没有无缘无故的恨。”党内最大的走资本主义道路当权派爱的是资本主义，恨的是社会主义。他贩卖这一套吃人的哲学，完全是为发展资本主义、维护血腥的剥削制度服务的。他这种声音是吸血鬼和寄生虫的声音，这是他自己那种肮脏丑恶的资产阶级灵魂的大暴露。我们必须戳穿他的剥削阶级大奴才的丑恶嘴脸，让他遗臭万年，永世不得翻身！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67a88fa276"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
