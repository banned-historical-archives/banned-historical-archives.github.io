year":1946,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太岳小学生争作"},{"type":"paragraph","text":"毛主席的好子弟"},{"type":"paragraph","text":"读了《毛主席送子住劳动大学》一文后，此间许多人加强了劳动观念，尤其是尚在学校读书的学生，不少人订出自己的劳动计划。沁水高小，要从劳动生产中解决自己全年的日用费。洪洞不少学校学生，纷纷从事劳动，学习毛主席的儿子。阳城董封镇民办小学，全校学生在讨论这篇文章后，同样要在劳动生产中解决一部分花费，决定先给学校运炭，力气小的在街上担水卖，第一次已担炭一千二百八十四斤，赚钱一千一百五十五元，担水的也赚洋一千五百二十五元。（太岳分社电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a923c12159"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
