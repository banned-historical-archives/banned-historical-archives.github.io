tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想凯歌传四方","authors":["李苏","班长"],"parts":[{"type":"paragraph","text":"毛主席最近教导我们：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。形势大好的重要标志，是人民群众充分发动起来了。从来的群众运动都没有象这次发动得这么广泛，这么深入。”毛主席的教导，使我对文化大革命的形势有了更深的理解。我在支左实践中亲身体会到，文化大革命的形势千好万好，就是好在人民群众在毛泽东思想的指引下，充分地发动起来了。就拿我们支左的那个偏僻山村来说，革命群众，都在辩论文化大革命的问题，都在关心国家大事，以毛泽东思想为武器，向资产阶级反动路线猛烈开火，坚决捍卫毛主席的革命路线。一个七十多岁的王老大娘，在文化大革命中，勇敢地同党内一小撮走资派作顽强的斗争。就是十几岁的儿童也投身到文化大革命中去，作出自己的贡献。他们组成了儿童团，每个人手里拿着纸糊的广播筒，满街朗读毛主席语录，进行政治宣传。地头、街头、炕头，都成了学习毛主席著作的课堂。现在村里到处是一片热气腾腾的革命景象。形势真是最好最好最好。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5696ce606b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
