script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈伯达姚文元对广播事业局军管小组同志的谈话","authors":["姚文元","陈伯达"],"dates":[{"year":1968,"month":3,"day":27}],"is_range_date":false,"parts":[{"text":"陈伯达姚文元对广播事业局军管小组同志的谈话","type":"title"},{"text":"陈伯达姚文元","type":"authors"},{"text":"伯达、文元同志指示说：不要出事故，你们这里不要出事，一个字也不能错。","type":"paragraph"},{"text":"伯达同志对军管小组同志说：人民解放军是毛主席亲自缔造和领导的，林副主席亲自指挥的无产阶级军队。人民的军队，不是那个山头的军队，那个人的军队，你们要安心工作，你们的工作是有成绩的。","type":"paragraph"},{"text":"伯达同志强调指出：要提高警惕，要抓坏人，防止出事。","type":"paragraph"},{"text":"当刘路明同志汇报关于工作问题时，伯达同志说这里干部很多，有人才，绝大多数是好干部。伯达同志再次强调：人民解放军是毛主席亲自指挥的，无产阶级军队。","type":"paragraph"},{"text":"伯达同志见《广联总》的革命群众向伯达同志鼓掌，伯达同志说：“这我不赞成。”当群众高呼：毛主席万岁！祝毛主席万寿无疆！伯达同志说：“好、好、好！”","type":"paragraph"},{"text":"伯达同志再三强调，你们不要出事，一个字也不能错。","type":"paragraph"},{"text":"越语组一位同志代表广大革命群众向毛主席保证，坚决做好工作，保证准确、及时向全中国全世界传播毛泽东思想。伯达同志说：很好。","type":"paragraph"},{"text":"当伯达、文元同志离开我局时，革命群众高呼毛主席万岁！毛主席万万岁！","type":"paragraph"}],"comments":[],"origin":"《毛泽东思想的光辉照耀着中央广播事业局――毛主席以及中央首长对中央广播事业局无产阶级文化大革命的历次指示汇编（1966年7月－1968年6月）》（中央广播事业局《无产阶级革命派联合总部》，一九六八年七月）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f04ef662e0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
