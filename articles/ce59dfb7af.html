script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印尼人民文化协会举行第五次全体会议号召消除帝国主义的文化影响指出修正主义是尝不得和必须断然拒绝的毒药","authors":[],"dates":[{"year":1964,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社雅加达1日电】　今天在这里发表的印度尼西亚人民文化协会第五次全体会议的新闻公报说，印度尼西亚人民文化协会中央委员会号召所有印度尼西亚革命的文化工作者努力消除帝国主义的文化影响，特别是消除美帝国主义者的文化影响。"},{"type":"paragraph","text":"这次会议是从二月二十三日到二十六日在南苏门答腊的巨港举行的。协会的主要成员，包括印度尼西亚共产党第二副主席、印度尼西亚人民文化协会书记处书记约多出席了会议。印度尼西亚人民文化协会书记处总书记尤巴尔·阿尤布作了题为《消除帝国主义的文化影响和建立民族文化》的总报告。"},{"type":"paragraph","text":"代表们在会上指出，帝国主义的文化渗透是对印度尼西亚文化、对印度尼西亚人民和青年的威胁。会议呼吁印度尼西亚所有进步的文化工作者和民主文化团体和一切政府机构保护印度尼西亚民族文化，使它免受美国及其他帝国主义文化的袭击。"},{"type":"paragraph","text":"会议表示支持印度尼西亚正在进行的反对美国文化的渗透和抵制美国纪录影片的斗争。会议还表示支持反对修正主义的斗争。它指出，“修正主义是一种尝不得的和应该断然拒绝的毒药”。"},{"type":"paragraph","text":"会议强调有必要举行第二次万隆会议，以发扬万隆精神和加强亚非人民反对殖民主义和新殖民主义的斗争。"},{"type":"paragraph","text":"会议号召所有进步的作家和艺术家及所有革命的文化工作者都下乡同农民取得密切联系。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce59dfb7af"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
