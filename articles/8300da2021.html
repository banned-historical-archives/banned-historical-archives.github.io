s":[],"dates":[{"year":1977,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一九七七年九月十三日电　旅居美国东部地区的爱国华侨、台湾同胞和中国血统的美籍人士九月十一日在纽约隆重集会，纪念伟大领袖和导师毛主席逝世一周年。一千多人出席了这次纪念会。"},{"type":"paragraph","text":"大会通过的致华主席和中共中央的电报说:“中国人民的胜利都是在毛主席领导下，在毛主席的革命路线指引下取得的。毛主席的旗帜是中国人民革命胜利的旗帜。毛泽东思想的旗帜也是世界革命人民的胜利旗帜。”我们热烈拥护以华主席为首的党中央。响应党的十一大号召，为解放台湾、统一祖国作出应有的贡献。"},{"type":"paragraph","text":"在会上发言的旅美台湾同胞代表黄于燕表达了正在坚持反帝、反蒋斗争的台湾人民热爱祖国、热爱毛主席的心情。黄于燕强调指出，有了华主席这样的接班人，“我们一定能完成毛主席的遗志，解放台湾，统一祖国”。"},{"type":"paragraph","text":"华侨工人代表何端在讲话中说，在毛主席的领导下，新中国日益强大，华侨地位也得到改善。他们感到骄傲和幸福。"},{"type":"paragraph","text":"中国血统的美籍学者王浩教授和牛满江教授也在纪念会上讲了话。"},{"type":"paragraph","text":"旅居美国首都华盛顿和西海岸旧金山等地的爱国华侨、台湾同胞以及美国朋友也分别于九月九日和十日举行了纪念会。"},{"type":"paragraph","text":"旅荷华侨总会九月九日在荷兰首都阿姆斯特丹集会，纪念毛主席逝世一周年。三百多人参加了纪念会。"},{"type":"paragraph","text":"旅荷华侨总会主席马文山在讲话中，缅怀毛主席的丰功伟绩。他说，我们世世代代不忘毛主席的恩情。他号召全体侨胞要努力作好爱国团结工作，为解放台湾，为把我国建成社会主义强国而贡献力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8300da2021"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
