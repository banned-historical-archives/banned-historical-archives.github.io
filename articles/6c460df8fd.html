":[{"year":1962,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京28日电】　东京消息:日本社会党昨天召开为期三天的第二十二次代表大会。出席大会的四百多名代表听取了书记长江田三郎的报告后，围绕江田三郎的所谓“社会主义新理论”展开了激烈的争论。由于代表们纷纷抨击江田三郎推行右倾路线，江田被迫于昨天夜里向委员长河上丈太郎提出辞呈，并且表示他不参加下任书记长的选举。"},{"type":"paragraph","text":"据报道，在昨天大会上，铃木茂三郎——佐佐木更三派、和平同志会派的代表批判江田的路线，并指出江田关于“社会主义新理论”的讲话违背社会党的纲领。在发售的二十二位代表中，有十六人明确反对江田的方针，只有二人支持江田。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c460df8fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
