art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大型彩色传记纪录片《叶剑英》摄制完成将在庆祝建军五十六周年期间公映","authors":["程必荣"],"parts":[{"type":"paragraph","text":"本报讯 反映叶剑英同志半个多世纪以来的丰功伟绩的大型彩色传记纪录片《叶剑英》最近已由八一电影制片厂摄制完成。"},{"type":"paragraph","text":"这部影片依照历史顺序，生动形象地叙述了叶剑英同志六十多年的戎马生涯与伟大革命斗争经历。影片通过丰富的历史文物与珍贵的电影资料，向人们展示了在充满艰难险阻的革命斗争和建设中，叶帅为中国人民的解放、为祖国的富强、为伟大的共产主义事业建立的丰功伟绩。影片中有不少电影资料，是首次同观众见面的。如1944年在延安，由外国记者拍摄的，叶帅作为第十八集团军参谋长，陪同毛泽东同志、朱德同志接见美军观察组和中外记者参观团活动的一组镜头；1955年底，在我军首次组织的大规模合成兵种联合演习中，叶帅担任演习总导演，亲自指挥演习的一组镜头等。这些都将给广大观众留下深刻的印象。"},{"type":"paragraph","text":"这部影片将在庆祝中国人民解放军建军五十六周年期间公映。 （程必荣）RW：叶剑英"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0a1b0c272"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
