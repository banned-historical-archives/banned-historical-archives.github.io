art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想做好三支两军工作","authors":["东海舰队驻上海锅炉厂军队代表徐耀洲"],"parts":[{"type":"paragraph","text":"党的九届二中全会公报的发表，是我国人民政治生活中的又一特大喜讯。公报是我们前进道路上的指路明灯。"},{"type":"paragraph","text":"战无不胜的毛泽东思想，是我们做好三支两军工作最强大的思想武器。我们在上海锅炉厂执行支左任务两年多来，在三大革命运动的实践中活学活用毛泽东思想，收到了立竿见影的效果。我们和广大工人群众一起，用毛泽东思想这一强大思想武器，主动地向阶级敌人进攻，夺取了一个又一个胜利。在生产上也是这样。今年八月，有一个车间接受了加工一项四百吨锅炉预热器中的一个部件，这个部件，车间里从未生产过。我们和工人群众一起活学活用毛泽东思想，揭露矛盾，解决矛盾，突破道道难关，终于取得胜利。工人群众对毛主席最忠，我们同他们在三大革命实践中一起活学活用毛泽东思想，虚心地向他们学习，不断从他们身上吸取政治营养，有力地促进了自身的思想革命化。"},{"type":"paragraph","text":"我们坚决响应公报号召，决心进一步在三大革命运动实践中活学活用毛泽东思想，夺取更大胜利，迎接四届人大的胜利召开！ 东海舰队驻上海锅炉厂军队代表 徐耀洲"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"三支两军","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7444051ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
