art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中朝人民永远并肩反帝反现代修正主义","authors":[],"parts":[{"type":"paragraph","text":"据新华社26日讯 我国各人民团体这两天纷纷打电报给朝鲜有关人民团体，热烈祝贺朝鲜祖国解放战争胜利十周年。"},{"type":"paragraph","text":"中国人民保卫世界和平委员会在给朝鲜拥护和平全国民族委员会的电报中，热烈赞扬英雄的朝鲜人民在朝鲜劳动党和金日成同志的领导下，为反对美帝国主义侵略、为争取祖国的和平统一所进行的不屈不挠的斗争，对保卫亚洲与世界和平作出了卓越的贡献。电报指出，目前，现代修正主义者正在迎合美帝国主义的需要，千方百计妄图阻止世界人民的反帝斗争。在这种形势下，朝鲜人民在反对帝国主义、特别是美帝国主义的斗争中表现的大无畏精神和革命气概，在全世界争取独立和解放的人们心目中，越加光辉而崇高。"},{"type":"paragraph","text":"电报说，中国人民坚决支持朝鲜人民反对美国霸占南朝鲜、争取和平统一祖国的正义事业。坚决支持南朝鲜人民的反美爱国正义斗争。中国人民将永远同朝鲜人民在一起，高举马克思列宁主义和无产阶级国际主义的旗帜。坚决反对帝国主义和现代修正主义，全力支持民族解放运动和全国人民的革命事业，并肩保卫亚洲与世界和平。"},{"type":"paragraph","text":"中国亚非团结委员会给朝鲜亚非团体、委员会的电报说，朝鲜人民的斗争为一切被压迫民族和被压迫人民树立了光辉的榜样。特别是为正在进行反对帝国主义和新老殖民主义、争取与维护民族独立斗争的亚洲、非洲和拉丁美洲人民指出了胜利的道路。中国人民坚决支持朝鲜人民反对美帝国主义侵略、争取祖国和平统一的正义斗争。坚决支持南朝鲜人民反美爱国的正义斗争。我们深信，朝鲜人民统一祖国的事业一定会取得彻底的胜利。"},{"type":"paragraph","text":"中朝友好协会，中华全国总工会、中华人民共和国全国妇女联合会、中国共产主义青年团中央委员会、中华全国青年联合会、中华全国学生联合会、中国政治法律学会、中华人民共和国科学技术协会、中国文学艺术界联合会、中华全国新闻工作者协会，分别或联合致电朝鲜有关团体表示祝贺。"}],"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96b65a3883"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
