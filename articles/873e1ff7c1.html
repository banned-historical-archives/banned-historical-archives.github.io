ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"注意多打开灭战少打击潢战","alias":"","parts":[{"type":"paragraph","text":"注意多打歼灭战少打击溃战"},{"type":"paragraph","text":"（1947年1月23日）文、汪!:"},{"type":"paragraph","text":"你们集中主力行动并已打了一个胜仗，甚慰。关于作战方法，请你们严重注意多打歼灭战，少打击溃战。打歼灭战的条件有二（一）集中优势兵力包围敌军一部，每一仗只打一部分敌人，切不可同时打几部分敌人；（二）以主力打迁回，以一部打正面，切不可以一部打迁回，以主力打正面。你们如能实行上述两个条件，多打歼火战，形势就会好转。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"子漾[1]文，指文建武，当时任鄂豫陕军区司令员。汪，指汪锋（1910一"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":1,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":380,"page_end":380},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"873e1ff7c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
