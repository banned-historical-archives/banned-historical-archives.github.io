"authors":["于延年","周传儒","张百生","沈阳师范学院","黄振旅"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——攻击人事、汇报、保密等制度 (3)","type":"title"},{"text":"沈阳师范学院周传儒于延年张百生黄振旅","type":"authors"},{"text":"周传儒　(历史系教授)说：“科员一年可以升三级，而教授六年不升一级但是物价不等人，王老师家就买不起鞋子穿。”","type":"paragraph"},{"text":"于延年  (物理科教员)说：“女人的上升路线是只要长的漂亮，嫁一个老干部，则不久入党，然后是科长，最后一跃即成处长。”","type":"paragraph"},{"text":"张百生  (团委会宣传部副部长)说：“为了适才适用，选贤任能，使用干部应当唯德唯才，能当什么就当什么，不要用职位去‘照顾’老同志……即使一个二万五千里长征的同志，如果他只能当马夫，就让他当马夫…如果高级干部犯了严重错误，也可以把他流放出国，以示赏罚严明。”又说：“现在人事部门成宗派机构，变成了干部收发室和档案保管科。我看唯唯诺诺，点头哈腰今天满可以爬上去。应设立对干部考试，考查制度，不要迷信那些资历，不见得大学生比经过努力的高中毕业生好，我们毛主席还是师范毕业，列宁大学也没毕业，有能力可以破格升级，不要在资历上打圈子，这样便能做到赏罚分明。”","type":"paragraph"},{"text":"黄振旅　(职员)：“我国政府不是选贤任能，而是政治分职。”","type":"paragraph"}],"comments":[],"origin":"《右派言论选辑》（社会主义教育参考资料之一，内部材料　仅供参考，沈阳师范学院社会主义教育办公室 1958．3）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26c175824b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
