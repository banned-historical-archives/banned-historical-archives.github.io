<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东号（中篇连载）","authors":["丁克辛　轻影","庄言"],"dates":[{"year":1950,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东号（中篇连载）"},{"type":"paragraph","text":"丁克辛  轻影作  庄言插图"},{"type":"paragraph","text":"三、上车以前"},{"type":"paragraph","text":"机务段的军事代表宋同志找李永谈，要他到“毛泽东号”去。"},{"type":"paragraph","text":"李永不敢马上答应，说："},{"type":"paragraph","text":"“这台车不单简，又叫着领袖的名子，又是包乘负责制，万一出了事故，我可担不起啊！”"},{"type":"paragraph","text":"“谁都知道你，从来不出事故。”"},{"type":"paragraph","text":"“再说，我是外来的，当司机长怕他们不服。”"},{"type":"paragraph","text":"宋代表又向他解释：“只要遇事多和大家商量，团结大家，让大家出主意想办法，事情就好办，大家也不会不服。"},{"type":"paragraph","text":"“我当司机，司机长找别人好。”"},{"type":"paragraph","text":"宋代表又给他讲了不少道理：蒋匪帮疯狂进攻，军事运输任务非常紧急。现在工人做了国家的主人，应该克服一切困难来工作。末了说："},{"type":"paragraph","text":"“这一切，为的是不让反动派再来压迫奴役我们，过那牛马不如的生活。”"},{"type":"paragraph","text":"李永一想起过去几十年的辛酸日子，面色变了，说道："},{"type":"paragraph","text":"“宋代表，这么说，我服从分配。……”他似乎还有话要说，可是哽住了。"},{"type":"paragraph","text":"一九四七年六月九号，李永到了“毛泽东号”。"},{"type":"paragraph","text":"四、初献身手"},{"type":"paragraph","text":"可是一上车，李永又担心："},{"type":"paragraph","text":"对机车不熟悉！对工友们摸不清脾气！"},{"type":"paragraph","text":"可巧，当天晚上就有任务，要开车到一面坡。"},{"type":"paragraph","text":"大伙儿都说："},{"type":"paragraph","text":"“郑笃恭和张传忠跟司机长一班吧。”（注一）"},{"type":"paragraph","text":"老英雄反正跟谁也不熟，就说："},{"type":"paragraph","text":"“行！行！”"},{"type":"paragraph","text":"绿色信号灯（注二）亮了，调车员手中的绿手灯，也一起一落摇晃着，车就要开了。"},{"type":"paragraph","text":"“哇！”机车叫了一声。“嘶！……”乏气拉着长声放出来。"},{"type":"paragraph","text":"糟糕！忽然水泵（注三）不来水了。"},{"type":"paragraph","text":"司炉郑笃恭，舌头“得儿”响了一下，同时用眼瞟一瞟学习司炉张传忠。"},{"type":"paragraph","text":"张传忠就说："},{"type":"paragraph","text":"“老英雄，咱们是包车制，全靠你啦！”"},{"type":"paragraph","text":"李永的额角上鼻尖上，立刻冒出一颗颗大汗珠，在炉门映出的火光中发亮。他紧接着说："},{"type":"paragraph","text":"“伙计们多帮忙！我刚来，一门不摸。别看我年纪大，论技术还差得远。”说着，就拿起手锤和活螺丝搬子来。"},{"type":"paragraph","text":"他踏上走板，走到水泵旁边，这么一看，那么一看；又爬上锅炉，把水管和罐逆止弁（注四）检查一遍，他揭开罐逆止弁，动动这拧拧那，说也怪，经他三?捣两?捣，可就把水泵修好了。"},{"type":"paragraph","text":"一点也没有耽误发车时间。"},{"type":"paragraph","text":"拍！郑笃恭照着张传忠的后脑上“码”了一家伙，又瞟了老英雄一眼，说道："},{"type":"paragraph","text":"“哎，姜还是老的辣！”"},{"type":"paragraph","text":"张传忠正弯着腰往炉门里添煤，扭转身就给了郑笃恭一拳："},{"type":"paragraph","text":"“他妈的老圣人，工作时间少动手动脚！”"},{"type":"paragraph","text":"“我叫你看看人家真有两下。”"},{"type":"paragraph","text":"“人家有两下，用着你打人？”"},{"type":"paragraph","text":"老英雄回头一看，郑笃恭长着两条又粗又黑的好眼眉，是个二十出头的小伙子。“这样一个青年怎么就成了老圣人了？”他想。"},{"type":"paragraph","text":"可是车越跑越快，他也顾不得细想，就把全副精神集中到手把（注五），汽门和风闸（注六）上面去了。"},{"type":"paragraph","text":"注一：机车包乘负责制共九个人，分三班。每班三个人。"},{"type":"paragraph","text":"注二：绿灯开车，红灯停车。"},{"type":"paragraph","text":"注三：上水的注水器。"},{"type":"paragraph","text":"注四：因锅炉有汽，用它压住汽，水才能注入锅炉。"},{"type":"paragraph","text":"注五：管机车前后走的。"},{"type":"paragraph","text":"注六：停车用的。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97065e2ae0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
