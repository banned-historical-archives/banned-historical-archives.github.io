ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"给毛宇居的信","alias":"","parts":[{"type":"paragraph","text":"给毛宇居的信"},{"type":"paragraph","text":"（1938年5月26日）宇居兄左右："},{"type":"paragraph","text":"五月十日信收读。谭季余以不来为上。楚雄等已寄微款，尔后可略接济一点，请督其刻苦节省。周先生留居韶山甚好，应看成一家人，不分彼此。此复。即颂时绥！"},{"type":"paragraph","text":"弟毛泽东"},{"type":"paragraph","text":"五月二十六日远耀等在此甚好。[1]毛宇居，毛泽东的堂兄和少年时的私埝老师。[2]谭季余，毛泽东的亲戚。1938年曾写信给毛泽东，要求去延安。"},{"type":"paragraph","text":"[3]楚雄，即毛楚雄，毛泽覃之子。当时他随外祖母在韶山冲居住。1945年去延安。1946年牺牲。"},{"type":"paragraph","text":"[4]指毛楚雄的舅父周祖余。当时住在韶山冲毛泽东旧居。[5]远耀，即毛远耀，毛宇居之侄。当时在延安中央军委秘书处工作。宇结先左在："},{"type":"paragraph","text":"无期作收食。停多食第川"},{"type":"paragraph","text":"我上。楚都争已妄微新，笑福离一点，结背共刻惜却有。居此留后知山志风，社方成一家心，不分彼此。此后。斤项特后"},{"type":"paragraph","text":"绑年民见起的"},{"type":"paragraph","text":"4+yn毛泽东致毛宇居信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":5,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":212,"page_end":213},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d61f20ee68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
