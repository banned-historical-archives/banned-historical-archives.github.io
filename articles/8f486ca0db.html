script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳《先锋报》谴责澳共修正主义领导的错误立场　美国对越南的战争讹诈决不能得逞　挪共声明强烈抗议美国扩大侵越战争","authors":[],"dates":[{"year":1965,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳《先锋报》谴责澳共修正主义领导的错误立场"},{"type":"paragraph","text":"美国对越南的战争讹诈决不能得逞"},{"type":"paragraph","text":"挪共声明强烈抗议美国扩大侵越战争"},{"type":"paragraph","text":"新华社墨尔本十日电　澳大利亚《先锋报》今天在头版刊载一篇文章说，美国在越南进行战争讹诈是达不到它的目的的。"},{"type":"paragraph","text":"这家报纸说：“美帝国主义者已经表明，他们打算扩大在越南的战争，是妄图加强他们讨价还价的地位。他们以为，轰炸北越和派海军陆战队在南越登陆，他们就能获得他们多年来在印度支那进行的侵略战争中所没有获得的东西。这就是说，他们希望，采取逐步扩大战争的行动和通过增派部队的威胁，会使南越人民同意根据美帝国主义的条件签订和约。但是越南人民和东南亚各国人民是不会向侵略者屈膝的。这是梦想。美帝国主义进一步加紧越南战争只会引起抵抗的进一步加强。”"},{"type":"paragraph","text":"《先锋报》谴责澳大利亚“孟席斯政府在工党的支持下正在使澳大利亚越来越卷入美国在东南亚的侵略行动”，并谴责“澳大利亚工党不顾党员群众的意见，正式支持美国对东南亚的侵略和英帝国主义对构成所谓‘马来西亚’的各邦人民的侵略战争。”"},{"type":"paragraph","text":"文章还揭露“澳大利亚共产党的修正主义领导人支持（工党领袖）卡尔韦尔的立场。”"},{"type":"paragraph","text":"新华社九日讯　奥斯陆消息：挪威共产党抗议美国在越南进行侵略战争。"},{"type":"paragraph","text":"挪威共产党中央委员会六日和七日在奥斯陆举行会议。会议一致通过一个声明，“强烈抗议美国在越南的恐怖行动。”"},{"type":"paragraph","text":"声明说，“美国入侵南越的目的在于不让越南人民在他们自己的国家里决定自己的事情。"},{"type":"paragraph","text":"“美国及其傀儡对南越人民进行的镇压战争现在已经由于对越南北方的残暴轰炸而扩大了，更加深入而且更加危险的步骤也已经准备好了。这种行动在加剧着全世界的紧张局势，可能在东方引起一场真正的大战。果真如此，美帝国主义就要负全部的责任。”"},{"type":"paragraph","text":"声明说，“美国对南越的干涉和对越南北方的袭击必须立即停止。美国军队必须撤出南越。”"},{"type":"paragraph","text":"声明号召一切民主和爱好和平的人民团结起来，抗议美帝国主义在越南的行动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f486ca0db"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
