art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想打败帝修反","authors":["3168部队全体指战员"],"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席的亲密战友林副统帅在首都人民纪念十月革命五十周年大会上的讲话，对世界革命形势作了最深刻的分析，对战无不胜的毛泽东思想作了最精辟的论述，对现代修正主义作了最尖锐的批判。"},{"type":"paragraph","text":"伟大列宁领导的十月革命，永远是世界革命人民心目中不可磨灭的光明和希望。它开创了无产阶级世界革命的新纪元，给全世界无产阶级指出了一条用武装夺取政权的道路。正是在十月革命的光芒照耀下，世界上才发生了翻天覆地的变化。我们的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席高举十月革命的旗帜，全面地继承和发展了马克思列宁主义，把马克思列宁主义发展到一个崭新的高峰。"},{"type":"paragraph","text":"在苏联，以赫鲁晓夫及其继承者勃列日涅夫、柯西金之流为代表的现代修正主义，背叛了列宁主义的事业，葬送了十月革命的成果。他们背叛了列宁关于阶级斗争和无产阶级专政的学说，打着“全民党”、“全民国家”的幌子，在苏联全面复辟了资本主义。列宁亲手缔造的苏联共产党和苏维埃共和国，已经改变了颜色，成千成万的先烈，用鲜血和生命赢得的第一个社会主义国家，又重新变成了资产阶级专政的国家。苏共党内最大的一小撮走资本主义道路的当权派，背叛了国际共产主义运动，用“和平共处”，“和平竞赛”，“和平过渡”来代替武装夺取政权，并且勾结帝国主义，镇压世界各国人民的革命运动，把原来是革命人民的强大红色堡垒，变成资产阶级反动势力的又一中心。所有这一切，都充分说明了苏联现代修正主义者是列宁主义的叛徒，是全世界革命人民的最狡猾最危险的敌人。但是，我们坚信，有伟大列宁、斯大林所教养的广大苏联共产党员和苏联人民，一定会高举马克思列宁主义、毛泽东思想伟大红旗，起来造修正主义的反，推翻勃列日涅夫、柯西金的反动统治，恢复十月革命的光辉。"},{"type":"paragraph","text":"毛主席教导我们：“世界上一切革命斗争都是为着夺取政权，巩固政权。”伟大领袖毛主席亲自发动和领导的史无前例的无产阶级文化大革命，就是解决在无产阶级专政条件下，要不要继续进行革命，和怎样进行革命这个共产主义运动中的重大问题；就是在国际共产主义运动暂时出现一片迷雾的情况下，拨开乌云，给各国人民指出了一条通向共产主义的光明大道；就是在巩固和加强我国这个世界革命的根据地，以支援世界革命人民的革命斗争。我国无产阶级文化大革命，必将给全世界的革命人民带来无限广阔的前景。"},{"type":"paragraph","text":"要革命，靠的是毛泽东思想。有了战无不胜的毛泽东思想，被压迫民族和被压迫人民就能得到解放；已经建立了无产阶级专政的国家，就能防止资本主义复辟；被修正主义篡夺了领导权的国家的人民，就能够重建无产阶级专政。我们就是要大树特树毛泽东思想的绝对权威，在全世界广泛传播伟大的毛泽东思想，让全世界无产阶级和革命人民都来学习和掌握毛泽东思想这个最锐利的武器，把世界革命进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fcf26751a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
