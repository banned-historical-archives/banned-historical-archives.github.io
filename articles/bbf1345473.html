rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"华国锋总理会见联合国秘书长瓦尔德海姆"},{"type":"paragraph","text":"华国锋总理五月一日下午在会见联合国秘书长库尔特·瓦尔德海姆时指出：中国愿意同联合国合作，为促进东南亚和太平洋地区的和平而努力。"},{"type":"paragraph","text":"华总理说：从今年起，我们的工作重点已经转移到社会主义四个现代化建设上来。我们需要一个和平的国际环境，来建设自己的国家。"},{"type":"paragraph","text":"华国锋总理同瓦尔德海姆秘书长就人们普遍关心的国际问题交换了看法。华总理希望联合国在维护世界和平和反对霸权主义的斗争中作出贡献。"},{"type":"paragraph","text":"谈话前，华国锋总理会见了瓦尔德海姆秘书长和夫人一行，同他们一起合影留念。"},{"type":"paragraph","text":"邓小平副总理会见瓦尔德海姆秘书长"},{"type":"paragraph","text":"邓小平副总理五月一日晚上会见联合国秘书长库尔特·瓦尔德海姆和夫人一行，同他们进行了友好的谈话。"},{"type":"paragraph","text":"瓦尔德海姆秘书长和夫人一行将于明天离开北京前往平壤，对朝鲜民主主义人民共和国进行访问。"},{"type":"paragraph","text":"中埃文化合作执行计划签字"},{"type":"paragraph","text":"中华人民共和国政府和阿拉伯埃及共和国政府一九七九年至一九八一年文化合作执行计划五月一日晚在北京签订。"},{"type":"paragraph","text":"我国文化部长黄镇和埃及教育、文化和科研部长哈桑·穆罕默德·伊斯梅尔分别代表本国政府签字。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbf1345473"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
