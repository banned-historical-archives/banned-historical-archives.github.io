itle":"中共山西省委组织部关于填报老干部离休审批表的通知","dates":[{"year":1982,"month":12,"day":25}],"is_range_date":false,"authors":["中共山西省委组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 388","tags":[{"name":"干部","type":"主题/事件"},{"name":"老干部","type":"主题/事件"},{"name":"离休","type":"主题/事件"},{"name":"山西","type":"主题/事件"}],"parts":[{"type":"title","text":"中共山西省委组织部关于填报老干部离休审批表的通知"},{"type":"subtitle","text":"晋组字〔1982〕84号"},{"type":"paragraph","text":"按照国务院国发（1982）62号文件规定，老干部离休，由所在单位按照干部管理权限，报任免机关批准。（一）今后老干部离休，应由所在单位党组（党委）填写《干部离休审批表》（式样附后）一式五份，报任免机关审批。已经批准离休的老干部（含退休改离休），未填此表的，应按上述精神补办，送任免机关备查。（二）各地、市、县（区）委，省直各部门，及各企业、事业单位批准的离休干部（含退休改离休）一律填写一份《干部离休审批表》，报省委组织部老干部处备查。过去已批准离休的（含退休改离休）要补报。"},{"type":"paragraph","text":"一九八二年十二月二十五日"}],"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"11ebcdf9db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
