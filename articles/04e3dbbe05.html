art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"贫下中农最爱读毛主席的书","authors":["卫生员田光明"],"parts":[{"type":"paragraph","text":"正当党中央和毛主席给贫下中农写来信，号召抓革命、促生产搞好春耕的时候，贫协组长杨大爷病了，不能倒粪了，青年社员们让他休息，他怎么能闲得住？他说：“抓革命，促生产，咱贫下中农责任重大，一定要抓紧农时，搞好春耕，争取农业大丰收。”他不能下地就在家拣黄豆种。"},{"type":"paragraph","text":"一天，我去给杨大爷看病。杨大爷家墙上贴着一张彩色的毛主席像和几幅毛主席语录。杨大爷正在拣豆种，身旁放着“老三篇”。他招呼我坐下。我劝他病了要好好歇着。杨大爷说：“毛主席叫咱向张思德、白求恩学习，全心全意为人民服务，现在毛主席号召咱抓革命，促生产，咱贫下中农应该带头响应。”杨大爷识字不多，毛主席的话，他学一点，记一点，记一点，用一点。解放前，杨大爷给地主扛了大半辈子活，听的是骂，挨的是打。解放后杨大爷才真正翻身做了主人。他经常对贫下中农讲：“毛主席他老人家最伟大。没有毛主席就没有咱贫下中农。我们贫下中农要永远听毛主席的话，一定要抓革命、促生产，把无产阶级文化大革命进行到底。”"},{"type":"paragraph","text":"我们年轻一代，要当好无产阶级革命事业的接班人，就要像贫下中农那样，怀着深厚的阶级感情活学活用毛主席著作，一辈子忠于毛主席。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04e3dbbe05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
