ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺中蒙经济及文化合作协定签订十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺中蒙经济及文化合作"},{"type":"paragraph","text":"协定签订十周年的电报！"},{"type":"paragraph","text":"（1962年10月3日）乌兰巴托蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤?泽登巴尔同志，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志："},{"type":"paragraph","text":"值此中蒙经济及文化合作协定签订士周年之际，我们谨代表中国共产党、中华人民共和国政府和中国人民，向你们，并通过你们，向蒙古人民革命党、蒙古人民共和国政府和蒙古人民致热烈的祝贺。"},{"type":"paragraph","text":"中蒙经济及文化合作协定的签订，对促进我们两国友好合作关系的发展和两国经济与文化建设的共同高涨起了重要的作用。它完全符合我们两国人民的根本利益，同时也有助于加强社会主义阵营的团结和维护世界和平。我们相信，随着中蒙两国社会主义建设事业的不断发展，我们两国的这种平等、互利和友好合作关系，必将"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国主席刘少奇、国务院总理周恩来联名给蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布的电报。祝贺中蒙经济及文化合作协定签订十周年。"},{"type":"paragraph","text":"毛泽东等祝贺中蒙经济及文化合作协定签订十周年的电报日益巩固和加强。"},{"type":"paragraph","text":"祝蒙古人民在建设社会主义事业中取得新的成就。祝中蒙两国人民的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六二年十月三日"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":10,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":282,"page_end":283},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c884f8b0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
