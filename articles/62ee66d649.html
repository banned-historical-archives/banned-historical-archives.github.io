script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"隆重纪念罗马尼亚资产阶级民主革命一百二十五周年罗马尼亚雅西市举行盛大集会齐奥塞斯库同志在会上发表了重要讲话","authors":[],"dates":[{"year":1973,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社布加勒斯特一九七三年五月七日电　据罗马尼亚通讯社报道:罗马尼亚东北部重要城市雅西市五月四日举行盛大集会，隆重纪念一八四八年罗马尼亚资产阶级民主革命一百二十五周年。"},{"type":"paragraph","text":"罗马尼亚国务委员会主席尼·齐奥塞斯库同志在会上发表了重要讲话。他在谈到一八四八年罗马尼亚资产阶级民主革命的历史背景时说，十八世纪，“在罗马尼亚由于特殊历史条件——首先是由于外国统治——社会的资本主义发展长期受到阻碍。奥斯曼帝国、沙皇俄国和哈布斯堡帝国热衷于在罗马尼亚维持封建统治，热衷于阻挠任何具有进步性质的变化，特别热衷于扼杀罗马尼亚人民要求统一和独立发展、要求摆脱外国统治的愿望。”“在一八四八年前夕的罗马尼亚社会中，积累了尖锐的阶级矛盾，为此在经济——社会生活的组织方面迫切需要进行根本改革，这就是罗马尼亚一八四八年革命发生的客观原因。”"},{"type":"paragraph","text":"齐奥塞斯库同志接着说:“一八四八年革命在所有三个罗马尼亚公国中具有统一的性质。在所有这些省的革命旗帜上都写着相同的最高理想:废止封建奴役和解放农奴，争取民主自由，摆脱外国统治以及实现民族团结和独立。”"},{"type":"paragraph","text":"他说:“一八四八年革命者的愿望以及社会和民族要求引起了各专制国家的憎恨和反对，它们担心会危害到它们的势力范围，担心会危害它们对罗马尼亚人民作威作福的‘权利’。摩尔多瓦革命刚一爆发，俄国沙皇尼古拉一世就在一项命令中指责‘罗马尼亚革命是少数骚乱分子们干的，其主导思想是从欧洲民主和社会主义宣传中拣来的’，而沙皇帝国外交部通知俄国驻罗马尼亚总领事说，‘皇上决不允许无政府主义进入受他保护的奥斯曼各国’。”"},{"type":"paragraph","text":"齐奥塞斯库同志说，罗马尼亚反动派在外国反动派和军队的帮助下镇压了当时的革命运动。但是，一八四八年开始了的革命以各种不同的方式又进行了下去，直到实现社会主义革命为止。"},{"type":"paragraph","text":"他说:“在社会主义制度年代里，罗马尼亚消除了过去遗留下来的落后状况，变成了一个拥有现代化工业和发达农业、先进文化和生活水平不断提高的繁荣昌盛的国家，它在世界民族之林中占有应有的地位。”"},{"type":"paragraph","text":"齐奥塞斯库同志在谈到罗马尼亚的对外政策时说:“我们坚决把尊重国家独立和主权、平等、不干涉内政和互利、每个国家人民有权独自决定自己的命运、放弃武力和武力威胁、放弃对别国的任何形式的恐吓和施加压力等作为我们国际关系的基础。这些原则今天在国际上日益深入人心，成了各国人民之间良好谅解与和平的唯一牢固基础”。“我们认为，为了确保世界上的新关系，就必须让每个国家，无论是大国或小国，都能积极参与解决所有国际问题。我们坚信，有关安排未来关系、建立一个更美好和更公正的世界的重大问题只有在各国人民参加的情况下才能得到解决。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62ee66d649"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
