es":[{"year":1965,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京3日电　由古巴社会主义革命统一党全国领导委员会委员、书记处书记埃内斯托·切·格瓦拉，全国领导委员会委员、书记处书记埃米略·阿拉贡内斯·纳瓦罗和全国领导委员会委员奥斯马尼·西恩富戈斯·戈里亚兰组成的古巴社会主义革命统一党代表团，应中共中央的邀请，今天中午乘寺机到达北京。"},{"type":"paragraph","text":"中共中央总书记邓小平，中共中央政治局委员、书记处书记彭真，中共中央政治局候补委员、书记处书记康生，中共中央委员刘宁一，以及首都各界群众两千多人，到机场热烈欢迎古巴同志。"},{"type":"paragraph","text":"中共中央机关负责工作人员申健，陪同代表团由广州来京。"},{"type":"paragraph","text":"格瓦拉等同志走下飞机时，邓小平等同志迎到飞机前面，向他们致以亲切的问候。少年儿童向全体古巴同志献花。两千多群众敲锣打鼓，热情地掌欢迎。"},{"type":"paragraph","text":"古巴驻中国大使馆收时代办费尔南德斯，也到机场迎接。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\02\\6524010401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张彬\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e格瓦拉(前右二)等同志在邓小平(前右一)等同志陪同下步出机场时，向首都欢迎的群众招手致意　(新华社传真　张彬摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21dec249ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
