<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服无政府无纪律状态法院当局自我检讨处理讼棍事件有失法治精神　决加强政策学习及纪律教育","authors":[],"dates":[{"year":1949,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本月一日，上海人民法院个别公务人员在该院附近，召开群众大会，命讼棍赵幼青、李鸿福、杨振里在群众面前坦白悔过，并令赵等“头戴高帽，手敲铜锣”一事，次日本市各报均有记载。对该案处理程序及方式，经该院领导上加以检讨，认为此种做法，与人民政府法治精神不合，亟须纠正。"},{"type":"paragraph","text":"兹将该院检讨全文公布于后:"},{"type":"paragraph","text":"上海市人民法院院长汤镛关于处理三讼棍案件的自我检讨"},{"type":"paragraph","text":"十一月二日，本市各报披露了人民法院处理赵幼青等三讼棍的消息，引起我们的严重注意，当即详细研究本案经过，进行了检讨。"},{"type":"paragraph","text":"本院根据密报，于十月廿六、七两日，先后在本院对面茶馆内，查得赵幼青、李鸿福等三人，经常在法院附近向诉讼当事人兜写诉状，从中渔利；并在其身上搜得空白和已写成之诉状及供撰状所用之各种资料，认为确有包揽词讼行为，显与人民政府法令不合，故将其扣押，本应依法拘禁训诫，而本院个别公务人员在处理本案时，决定召开群众大会，命赵幼青等三人在大会上坦白悔过，负责执行人洪流，又令赵等在坦白悔过时“头戴高帽，手敲铜锣”，我们认为这种处理办法，与人民政府的法治精神是不相符合的。"},{"type":"paragraph","text":"在已经解放并且已经建立了正常秩序的上海，对赵幼青等案件，单凭个别司法人员的愿望与兴趣，不采取一定的司法程序，影响所及，容易模糊社会人士对人民司法工作的正确认识。"},{"type":"paragraph","text":"特别是负责处理本案的洪流等，身为人民法院的公务人员，事先既未向领导负责同志请示，事后亦未作任何报告，不仅充分暴露了人民司法机关中无政府无纪律状态的严重存在，也会影响人民司法机关在人民群众中的威信，这在人民法院本身是完全不能容许的。"},{"type":"paragraph","text":"除责成办理本案有关人员澈底检讨并请求上级予以处分外，我们也应担负疏于教育检查的责任，一拼请求上级处分。"},{"type":"paragraph","text":"为避免类此事件的重演，我们全体人民法院人员，决定进一步加强政策学习，提高业务水平，严格纪律教育，贯彻请示报告制度，坚决克服无政府无纪律状态。务使人民法院能够更好的镇压反动敌人和保护人民的合法权益，以回答上海人民及人民政府对本院的委托。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"736a5c3b9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
