art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋总理致电德米雷尔总理对土耳其地震灾区人民表示深切慰问","authors":[],"parts":[{"type":"paragraph","text":"安卡拉"},{"type":"paragraph","text":"土耳其共和国总理苏莱曼·德米雷尔阁下："},{"type":"paragraph","text":"惊悉贵国东部发生强烈地震，致使灾区人民遭受重大的损失。我代表中国政府和人民向你，并通过你向贵国灾区人民表示深切的同情和慰问。"},{"type":"paragraph","text":"中华人民共和国国务院总理 华国锋"},{"type":"paragraph","text":"一九七六年十一月三十日于北京"},{"type":"paragraph","text":"新华社一九七六年十一月三十日讯 中国红十字会十一月三十日打电报给土耳其红新月会，捐赠现款人民币十万元，帮助土耳其地震灾区人民克服暂时困难。电报全文如下："},{"type":"paragraph","text":"安卡拉"},{"type":"paragraph","text":"土耳其红新月会："},{"type":"paragraph","text":"获悉贵国东部发生强烈地震，灾区人民遭到了严重损失，我们极为关切。为帮助灾区人民克服暂时困难，中国红十字会决定捐赠现款人民币十万元给贵会，请查收，并转达我们对灾区人民的亲切慰问。"},{"type":"paragraph","text":"中国红十字会"},{"type":"paragraph","text":"一九七六年十一月三十日于北京"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9965879ce8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
