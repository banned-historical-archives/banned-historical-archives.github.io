"陶铸"],"dates":[{"year":1966,"month":9,"day":11}],"is_range_date":false,"parts":[{"text":"陶铸给广西自治区党委的电报","type":"title"},{"text":"陶铸","type":"authors"},{"text":"广西自治区党委并告南宁、桂林地区革命师生同志们！","type":"paragraph"},{"text":"现在向大家申明一下，我对绝食问题的看法：我在接见来京学生时，没有谈到绝食问题。说我讲过“静座、绝食不仅是革命行动，而且是伟大的创举，”这纯属谣传。绝食我是不赞成的，为什么要绝食、把身体弄坏呢？应当爱护身体，吃饱饭，按十六条更好地进行斗争。","type":"paragraph"},{"text":"（加急分送两份：桂林地委、桂林市委。）","type":"paragraph"},{"text":" 陶铸一九六六年九月十一日","type":"paragraph"}],"comments":[],"origin":"一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（2）》：《无产阶级文化大革命参考资料（内部资料，仅供参考）》（北京汽车分公司文革大字报办公室、北京汽车分公司行政保卫文革、北京国棉三厂文革筹委会宣传组，一九六六年十一月十二日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ba8deabc5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
