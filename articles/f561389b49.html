script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"石家庄地区认真落实毛主席关于培养革命接班人的指示  积极培养大胆使用青年干部  全地区各级领导班子基本实现老、中、青三结合，促进了工农业迅速发展","authors":[],"dates":[{"year":1975,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石家庄地区认真落实毛主席关于培养革命接班人的指示"},{"type":"paragraph","text":"积极培养大胆使用青年干部"},{"type":"paragraph","text":"全地区各级领导班子基本实现老、中、青三结合，促进了工农业迅速发展"},{"type":"paragraph","text":"据新华社石家庄一九七五年十二月十七日电　河北省石家庄地区各级党组织认真贯彻落实毛主席关于培养无产阶级革命事业接班人的指示，积极培养，大胆使用青年干部，使全地区各级领导班子基本上实现了老、中、青三结合，发展了革命和生产的大好形势。"},{"type":"paragraph","text":"无产阶级文化大革命以来，全地区从基层中培养选拔担任公社党委副书记和公社革委会副主任职务以上的年轻干部达一千九百多名，其中在地委、县委担任领导职务的有六十六名。这批青年干部走上领导岗位以后，和老干部一起，以阶级斗争为纲，坚持党的基本路线，互相学习，团结战斗，使各级领导班子更加朝气蓬勃、坚强有力，带领广大群众，抓革命，促生产，不断巩固发展无产阶级文化大革命的伟大成果，推动了工农业生产的迅速发展。今年，全地区粮食平均亩产在去年过“黄河”的基础上，又获丰收，工业生产提前三十天超额完成国家计划，一至十一月总产值比去年同期增长百分之十九点三。"},{"type":"paragraph","text":"石家庄地区各级党组织做好培养、提拔、使用青年干部工作时，注意不断端正各级领导特别是第一、二把手的思想政治路线，使他们深刻领会毛主席关于培养无产阶级革命事业接班人这一指示的重要意义。开始，有些老年或中年的领导同志对培养选拔年轻人充实领导班子的意义理解不深，抓得不够自觉，存在着“论资排辈”、“慢慢来”等思想，针对这些思想，地委和各县（市）委多次组织各级领导干部反复学习马列和毛主席关于重视培养青年干部的教导，学习党的十大文件中有关培养接班人的论述，批判刘少奇、林彪的修正主义干部路线和扼杀社会主义新生事物的罪行。从路线上和党的最终目标的高度认识到培养选拔青年干部是无产阶级革命事业发展的迫切需要，是干部工作中新陈代谢的必然规律。经过学习、批判，大家解放了思想，提高了培养无产阶级革命事业接班人的自觉性，各级党组织都把培养青年干部的工作，当成党的一项战略任务来抓，列入议事日程，做出规划，提出要求。各级领导亲自动手，不断检查、落实，有力地推动了这项工作的开展。"},{"type":"paragraph","text":"这个地区各级党组织在培养、选拔青年干部工作中，重视从工人农民中大量选拔干部。他们认为，经过无产阶级文化大革命的锻炼，广大工人、农民群众中涌现出了千千万万路线斗争觉悟高的优秀干部，这是选拔干部的一条广阔道路。他们遵照毛主席关于“党的各级领导机关也应增加工人和贫农的成份”的教导，以无产阶级革命事业接班人的五项条件为标准，从工人、贫下中农中选拔那些担任过一定基层领导工作，有实践经验，并做出显著成绩的青年，充实到各级领导班子。目前全区从工人、贫下中农中选拔的优秀分子担任领导职务的占青年干部总数的百分之七十四。这些青年干部担任各级领导工作以后，在党的培养教育下，密切联系群众，注意抓大事，抓路线，抓政治思想工作。他们职务变了，劳动人民的本色不变，工作多了，参加集体生产劳动不能少，哪里有困难，他们就到哪里去蹲点解决问题。获鹿县梁庄公社党委书记王秀芝，在担任了县委副书记之后，注意抓阶级斗争，在批林批孔运动中站在运动的前列，大胆领导运动，她带头学、带头批，写了批判文章三十多篇，带领群众打击阶级敌人的破坏活动，教育了群众。李增增担任平山县大吾公社党委书记时一直保持着劳动人民的本色，拒腐蚀，永不沾，坚持参加集体生产劳动，每年参加劳动二百多天，当了县委副书记以后，仍然坚持参加劳动，贫下中农称赞他是“泥腿子书记”。"},{"type":"paragraph","text":"当青年干部走上领导岗位以后，各级党组织注意对他们继续培养提高，使他们不断丰富斗争经验，增长才干。各级党委帮助青年干部举办学习班，认真读马列著作和毛主席著作，在工作中让他们挑重担，让他们到环境比较复杂、条件比较艰苦的地方去经风雨，见世面。"},{"type":"paragraph","text":"在积极培养、提拔、使用青年干部的同时，石家庄地区各级党组织注意发挥老干部在各级领导班子中的作用。在工作中，各级党委注意教育他们坚持无产阶级专政下继续革命，发扬党的革命传统，不断为革命做出新贡献。各级老干部既学习青年干部的长处，又把培养青年干部当作自己义不容辞的责任，满腔热情地关怀青年干部的成长进步。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f561389b49"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
