tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"引导青年读好马列和毛主席的书","authors":[],"parts":[{"type":"paragraph","text":"用雷锋事迹教育青年，启发青年走雷锋成长的道路。一连团支部认真组织团员和青年学习毛主席的“向雷锋同志学习”的题词，理解学习雷锋的伟大意义，把雷锋同志的生平事迹绘成幻灯放映，把雷锋同志的日记编成夜校的教材，组织青年学习，使大家认识到：雷锋同志所以能成为共产主义战士，是因为他坚定地把马列主义、毛泽东思想当作“粮食、武器和方向盘”，用“钉子”精神刻苦学习马列主义、毛泽东思想的结果。雷锋成长的道路，是每个青年成长的必由之路。通过学习，激发了团员、青年为改造世界观，为巩固无产阶级专政而刻苦读书的自觉性。"},{"type":"paragraph","text":"用本连的事例教育青年，引导他们把读马列的书和毛主席的书放在首位。五班战士魏发祥，刚入伍时存在“自来红”思想，不注意学习，一度成为连队的后进战士。后来，在团支部的帮助下，他努力学习马列著作和毛主席著作，认真改造世界观，克服了“自来红”思想，光荣地加入了共青团。一九七一年十二月在施工中，不幸被塌方砸成重伤，生命处在垂危之中，他还坚持学习毛主席著作，并在同志们的帮助下写完了最后一篇日记。牺牲后，上级追认他为中国共产党党员。团支部用魏发祥同志的事迹教育团员和青年，大家表示要象魏发祥同志那样，把读马列的书和毛主席的书始终放在重要位置。"},{"type":"paragraph","text":"引导团员、青年紧紧围绕批林整风学习马列著作和毛主席著作。在批林整风中，很多同志对资产阶级野心家、阴谋家林彪鼓吹的“天才论”、“英雄和奴隶共同创造历史”、“民富国强”等反动谬论，错在什么地方、要害问题是什么认识不清。他们就组织团员和青年学习《实践论》、《共产党宣言》、《哥达纲领批判》等著作的有关章节，使大家掌握了批判武器，攻破了难点。在批判林彪攻击无产阶级专政的谬论时，一些同志批不到实质上。他们便组织大家学习《国家与革命》、《论人民民主专政》等著作的有关章节，使大家从专政的阶级性，实行无产阶级专政是无产阶级革命的根本内容，只要存在阶级和阶级斗争就要实行无产阶级专政等几个方面，加深对革命导师关于国家学说的基本原理的题解，使大家进一步看清了林彪反党集团攻击无产阶级专政的实质是替被打倒的地、富、反、坏、右鸣冤叫屈，是妄图变无产阶级专政为资产阶级专政。（本报通讯员）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68c39cc377"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
