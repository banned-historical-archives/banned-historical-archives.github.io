ear":1966,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席万岁！人民万岁！"},{"type":"paragraph","text":"林彪同志在接见全国各地来京革命师生大会上讲话。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"毛主席和他的亲密战友林彪同志来到天安门城楼。毛主席啊，毛主席！您是我们心中不落的红太阳，我们永远跟着您，刀山火海都敢闯！"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"毛主席登上天安门城楼，亿万人民心中升起了红太阳。千言万语表达不尽我们对您的热爱。毛主席啊，毛主席！我们永远忠于您，永远忠于毛泽东思想。高举红旗向前进，海枯石烂不变心。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"最敬爱的领袖毛主席，请您老人家放心，我们坚决贯彻您所代表的无产阶级革命路线，彻底批判资产阶级反动路线，坚决遵照您的指示：关心国家大事，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"本报记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4c30f5f46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
