script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"芮杏文号召全市党政干部、人武干部和广大民兵拥护中共中央政治局扩大会议决定 坚持四项基本原则和改革开放搞活各级党组织要进一步加强思想政治工作，旗帜鲜明地反对资产阶级自由化","authors":["徐龙虎","韩胜宝"],"dates":[{"year":1987,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(通讯员韩胜宝、徐龙虎)中共上海市委书记、上海警备区党委第一书记芮杏文，昨天在市政府和警备区联合召开的人武部工作会议上号召全市党政干部、人武干部和广大民兵，坚决拥护中共中央政治局扩大会议决定，加强思想政治工作，旗帜鲜明地反对资产阶级自由化，坚持四项基本原则，坚持改革、开放、搞活的方针，进一步发展上海的大好形势。"},{"type":"paragraph","text":"芮杏文指出，对党中央的人事变动，绝大多数同志能够正确理解，拥护中央的决定，有一个正确的态度。但也有人担心党的路线、方针、政策会不会变动，会不会搞运动。最近邓小平、赵紫阳同志的讲话都回答了这些问题。党中央的人事变动，决不会影响而恰恰是为了更好地、更正确地执行十一届三中全会以来党的路线、方针和内外政策，我们进行全面改革的方针不变，对外开放的政策不变，以现代化建设为中心的总部署不变，尊重知识，重视人才的方针不变。党中央这次人事变动很顺利，这表明我们党的成熟、强大、有信心。"},{"type":"paragraph","text":"芮杏文在讲述了上海的大好形势后说，在这样的大好形势下出现学生闹事，正如小平同志所指出的，大事出不了，但问题性质是严重的，这是资产阶级自由化思潮泛滥的结果。方励之、王若望等人钻我们的空子，到处贩卖资产阶级自由化的货色，煽动学生闹事，带来的危害不可低估。现在，虽然上海学生闹事已经平息，但思想问题还远没有解决，各级党组织要进一步加强思想政治工作。我们反对资产阶级自由化，不搞政治运动，也不会搞扩大化，但要认真对待，在思想领域内，坚持正确的方向。"},{"type":"paragraph","text":"芮杏文同志在会上还充分肯定了区、县人武部改归地方建制近一年来所取得的成绩。会议部署了今年的民兵、预备役工作，着重强调要抓好学生军训工作，配合教育部门做好学生思想政治工作。会上表彰了九个区、县、局人武部和一百四十名先进民兵工作者。警备区司令员巴忠倓、政委平昌喜、市委常委石祝三、副市长钱学中和各区、县及部分局的党、政领导参加了会议。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"696dc33159"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
