[],"dates":[{"year":1967,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中央文革小组并转谢富治、王力同志:"},{"type":"paragraph","text":"目前，武汉地区党内一小撮走资本主义道路当权派在灭亡的前夕，竟然丧心病狂地指使保守组织，非法围攻谢富治、王力等同志，把矛头直接指向毛主席、林副主席和中央文革小组。消息传来，我们上海无产阶级革命派义愤填膺，怒火燃烧。今天，我们举行了二十万人的集会，表达了我们誓死保卫毛主席、誓死保卫中央文革的钢铁意志。我们谨向在这次武汉反革命事件中遭受迫害的谢富治、王力等同志表示最最亲切的慰问，并致以无产阶级文化大革命的最崇高的敬礼!"},{"type":"paragraph","text":"中央文革小组是毛主席直接领导的无产阶级司令部。谢富治、王力同志是无产阶级司令部的好同志，一小撮阶级敌人胆敢炮打无产阶级司令部，这是我们绝对不能容忍的!"},{"type":"paragraph","text":"上海无产阶级革命派向毛主席宣誓:为了保卫您和您的革命路线，为了保卫中央文革小组，我们永远不惜献出自己的鲜血和生命!"},{"type":"paragraph","text":"喜闻谢富治、王力等同志已光荣回到北京，我们纵情欢呼毛主席的无产阶级革命路线的胜利。"},{"type":"paragraph","text":"“暮色苍茫看劲松，乱云飞渡仍从容。天生一个仙人洞，无限风光在险峰。”"},{"type":"paragraph","text":"毛主席的革命路线胜利万岁!"},{"type":"paragraph","text":"我们心中最红最红的红太阳毛主席万岁!万万岁!"},{"type":"paragraph","text":"高举毛泽东思想伟大红旗，上海无产阶级革命派誓死保卫中央文革大会一九六七年七月二十三日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"王力","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f597d4c395"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
