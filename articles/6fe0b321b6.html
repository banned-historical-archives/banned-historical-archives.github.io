" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"关于革命委员会等的指示","alias":"","parts":[{"type":"paragraph","text":"关于革命委员会等的指示"},{"type":"paragraph","text":"（1968年2月）"},{"type":"paragraph","text":"大办学习班。用学习班的方法斗私批修，提高认识，解决问题，狠抓思想革命化，组织革命化。已经成立革命委员会的应该巩固和发展，革命委员会就是好。应该总结经验，应该解放大批革命千部，十部只要不是三反分子、走资派、投敌叛变分子、特务分子，而是在运动中犯了路线错误认真检查，认识错误就可以三结合。在三结合中应该注意成分，但不能唯成分论，不要把坏人也结合进来。三结合要体现老、中、少，光小娃娃不行。"},{"type":"paragraph","text":"一般大学的革命委员会，解放军不结合进去，特殊情况下要结合，须经过币革命委员会批准。要警惕环人，防正破环。已经成立了革命委员会的应该爱护她、尊重她、帮助她、保卫她、维护她的无产阶级权威，严防阶级敌人破坏。革命委员会的成立，不是三支两军“工作的完成而是进入一个新的阶段，巩固和发展革命委员会的无产阶级权威。"},{"type":"paragraph","text":"[1]1967年1月23日，中共中央、国务院、中央军委、中央文革小组联合发布《关于中国人民解放军坚决支持革命左派群众的决定》，中国人民解放军介入地方“文化大革命”，进行“支左”。1967年3月19日，中央军委做出《关于集中力量执行支左、支农、支工、军管、军训任务的决定》，即“三支两军”。首次将“三支两军”作为一个整体，向全军各部队提出。三支两军，即军队支左、支工、支农、军管、军训。此后，以1月23日发布“支左”决议为起点，解放军“三支两军”便逐步在全国各地展开。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":184,"page_end":184},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fe0b321b6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
