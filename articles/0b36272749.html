script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"史学界专家学者在沪进行学术讨论研究近代中国资产阶级问题","authors":["施宣圆"],"dates":[{"year":1983,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天，“近代中国资产阶级研究”学术讨论会在复旦大学举行，著名史学家周谷城教授主持会议。"},{"type":"paragraph","text":"近代中国资产阶级问题，过去未能引起应有的重视，有的问题的研究甚至被视为“禁区”。十一届三中全会以来，史学工作者积极开展对近代中国资产阶级的研究，但对许多重要问题仍存在着不同看法。《历史研究》杂志社和复旦大学历史系联合举办的这次讨论会，将围绕中国资本主义的产生，中国资产阶级的形成，中国资产阶级的构成及其派别，旧民主主义革命时期资产阶级的历史地位和作用及其与近代史基本线索的关系等问题进行讨论。"},{"type":"paragraph","text":"会议收到论文十八篇。黎澍、林增平、吴承明、金冲及、章开沅、陈旭麓、丁日初、钱宏和京、津、穗、沪等地一百余名专家、学者参加会议。"},{"type":"paragraph","text":"上海市委宣传部部长王元化向大会表示热烈祝贺，并对历史研究的若干问题发表了意见。他说，学术研究应该在坚持四项基本原则的前提下，坚决贯彻党的“双百”方针，解放思想，畅所欲言，取长补短，促进学术的繁荣和发展。在研究者的相互关系上，应该求同存异，反对把学派变成宗派的门户之见，不搞文人相轻，要搞文人相亲。在学术的研究上，应该提倡求异存同，反对人云亦云，力求有独到的见解，勇于创新，为理论长河不断增添新的颗粒。"},{"type":"paragraph","text":"(本报记者　施宣圆)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b36272749"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
