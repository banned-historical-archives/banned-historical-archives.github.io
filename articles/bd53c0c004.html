art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英李德生张才千同以巴卢库为团长的阿军事友好代表团会谈会谈是在充满兄弟情谊的热烈气氛中进行的","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年十一月七日讯 中共中央政治局委员、中共中央军委副主席叶剑英，中共中央政治局候补委员、中国人民解放军总政治部主任李德生，中共中央委员、中国人民解放军副总参谋长张才千，今天同以阿尔巴尼亚劳动党中央政治局委员、部长会议副主席兼国防部长贝·巴卢库为团长，阿尔巴尼亚人民军政治部主任希·恰科和阿尔巴尼亚人民军副总参谋长拉·佩尔拉库为副团长的阿尔巴尼亚人民共和国军事友好代表团举行了会谈。"},{"type":"paragraph","text":"会谈是在充满兄弟情谊的热烈气氛中进行的。"},{"type":"paragraph","text":"阿尔巴尼亚方面参加会谈的，有代表团团员：阿尔巴尼亚人民军副总参谋长门·巴茨卡、炮兵司令苏·多米、海军司令阿·马蒂、防空军司令基·扬科、装甲兵司令阿·费伊佐等，和阿尔巴尼亚驻中国大使罗博。"},{"type":"paragraph","text":"中国方面参加会谈的，有中国人民解放军副总参谋长彭绍辉、总后勤部政委张池明，外交部副部长余湛，外贸部副部长李强，外经部副部长韩宗正等，以及翻译范承祚。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd53c0c004"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
