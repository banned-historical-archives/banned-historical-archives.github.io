ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"准备夺取充州及聊城博平","alias":"","parts":[{"type":"paragraph","text":"准备夺取充州及聊城博平川"},{"type":"paragraph","text":"（1946年6月18日）陈、舒，刘、邓、薄："},{"type":"paragraph","text":"（一）对夺取充州及聊博两战役，望在本月内准备完毕，但在未得中央最后电令前，不要实行攻击。（二）最近我已得了许多地方，目前短时期内需要平静一下。（三）如蒋方于十五日期满后重新发动向东北进攻，或大举攻我苏北，你们便可夺取充州、聊、博。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"已巧"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给新四军军长兼山东军区司令员陈毅、政治部主任舒同和晋冀鲁豫军区司令员刘伯承、政治委员邓小平、第一副政治委员薄一波的电报。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":392,"page_end":392},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5be09e4604"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
