script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"停攻榆林城集中兵力打钟松部","alias":"","parts":[{"type":"paragraph","text":"停攻榆林城集中兵力打钟松部川"},{"type":"paragraph","text":"（1947年8月11日）彭："},{"type":"paragraph","text":"真卯电?悉。榆林非急攻可下，而钟松3仍有可能迅速增援，似宜决心暂停攻城，集结部队，准备于十二日夜或十三日打钟松。胡宗南虽因畏我伏击令钟松停进，而钟松本日似仍行动，仍有此种可能，即胡宗南见钟松绕道横山西北，向榆林西南六十里之白家涧、古城见前进，可以出我不意，仍令钟松前进。因此，你们宜准备于钟松到达白家涧、古城见之当夜，乘其立足未稳，立即攻击之。若当夜不攻，钟松可能在该地建立立足点，与榆林、石湾（刘）成椅角之势，追我离开榆林。打钟松时宜集中七个旅。望今晚部署完毕，明晨看好地形，并先以一部适时占领自家涧、古城见。又横山我军于钟松通过横山西北以后，击其后路为宜。如钟松"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给西北野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]指1947年8月11日5时彭德怀给中共中央军委的电报。电报说：西北野战军第二纵队攻击榆林，因坑道破坏，爆炸未成，停止攻击。决定如刘、董钊两军徘徊不进，本晚继续攻城，如援军到达，则围城打援。"},{"type":"paragraph","text":"[3]钟松，当时任国民党军整编第二十九军第三十六师师长。[4]胡宗南，当时任国民党军西安绥靖公署主任。[5]刘，当时任国民党军整编第二十九军军长。改变计划攻横山，则仍在横山抗击之。以上望酌办。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"真午《高原颂》（油画）"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":200,"page_end":201},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05bfa67dce"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
