<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1976,"month":5,"day":7}],"page_start":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"明媚的春天","authors":["邹志美〖HH/换行〗DW：三九九五六部队"],"parts":[{"type":"paragraph","text":"我驾着雄鹰翱翔在万里蓝天，"},{"type":"paragraph","text":"机翼下掠过座座城乡、条条山川……"},{"type":"paragraph","text":"锦绣山河的无限风光啊，"},{"type":"paragraph","text":"一幕幕收进我的眼帘——"},{"type":"paragraph","text":"拔地而起的高高井架，"},{"type":"paragraph","text":"巍巍耸立，直指青天；"},{"type":"paragraph","text":"喷云吐雾的雄伟高炉，"},{"type":"paragraph","text":"铁水奔流，钢花飞溅。"},{"type":"paragraph","text":"星罗棋布的大小水库，"},{"type":"paragraph","text":"微风挑动起碧波漪涟；"},{"type":"paragraph","text":"镶进云端的层层梯田，"},{"type":"paragraph","text":"千重金稻银棉舞翩跹。"},{"type":"paragraph","text":"呀！昨天，这里荒山秃岭石满坡，"},{"type":"paragraph","text":"今天已是百里新绿、红花烂漫；"},{"type":"paragraph","text":"哟！那牛羊欢腾的地方，"},{"type":"paragraph","text":"不就是往日缺水干枯的草原！"},{"type":"paragraph","text":"山道上，赤脚医生采药云雾里归，"},{"type":"paragraph","text":"田野里，农大学员正挥镐舞锨，"},{"type":"paragraph","text":"矿山顶，文艺战士与工人合唱样板戏，"},{"type":"paragraph","text":"树荫下，理论骨干宣讲党的基本路线。"},{"type":"paragraph","text":"看哪，大寨红花在江南北国盛开，"},{"type":"paragraph","text":"看哪，大庆红旗在神州大地飘展，"},{"type":"paragraph","text":"一日千里向前飞跃的祖国啊，"},{"type":"paragraph","text":"胜利捷报编织成五彩的花环。"},{"type":"paragraph","text":"又一座新电站剪彩落成，"},{"type":"paragraph","text":"又一片新厂房马达轰转，"},{"type":"paragraph","text":"又一艘万吨轮下水远航，"},{"type":"paragraph","text":"又一条新铁路飞速伸延……"},{"type":"paragraph","text":"呵，如花似锦的伟大祖国，"},{"type":"paragraph","text":"处处是风光明媚的春天！"},{"type":"paragraph","text":"这一切，都是文化大革命结出的硕果，"},{"type":"paragraph","text":"这一切，都是阶级斗争带来的新潮！"},{"type":"paragraph","text":"于是，我拨动心灵相机的快门，"},{"type":"paragraph","text":"摄下这绚丽浓纷的画卷，"},{"type":"paragraph","text":"我将把它铸成大批判的炮弹，"},{"type":"paragraph","text":"痛击邓小平“今不如昔”的谰言！"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"885a641161"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
