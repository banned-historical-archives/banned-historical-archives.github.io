rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"著名妇产科专家林巧稚追悼会在京举行党和国家领导人叶剑英李先念等送了花圈","authors":[],"parts":[{"type":"paragraph","text":"据新华社5月7日讯 今天下午，近千人怀着崇敬和悲痛的心情来到八宝山革命公墓，向著名妇产科专家林巧稚的遗体告别，追悼这位把毕生的精力无私地奉献给人民的伟大医学家。"},{"type":"paragraph","text":"公墓礼堂里陈列着党和国家领导人叶剑英、李先念、彭真、邓颖超、习仲勋、杨尚昆、宋任穷、胡乔木、廖承志、史良送的花圈。送花圈的还有：蔡畅、康克清、李贞、崔月犁、钱信忠等，以及全国人大常委会、全国政协、全国妇联等。"},{"type":"paragraph","text":"下午三时，政协全国委员会副主席、全国妇联主席康克清宣布追悼会开始，卫生部副部长王伟致悼词。悼词回顾了林巧稚光辉的一生。"},{"type":"paragraph","text":"邓颖超、康克清等同志都是林巧稚生前的老朋友，她们肃立在林巧稚的遗体旁，凝视着她的遗容，向这位杰出的女医生鞠躬致敬。RW：林巧稚"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"康克清","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89739f25a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
