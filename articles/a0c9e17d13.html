rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"进一步认清林彪路线的极右实质","authors":[],"parts":[{"type":"paragraph","text":"本报讯 新疆军区某团干部战士抓住林彪、孔老二开历史倒车、搞复辟这个要害进行批判，进一步看清了林彪路线的极右实质。"},{"type":"paragraph","text":"这个团党委认真组织全团干部战士学习批林批孔文件，使大家认识到，历代反动派尊孔的目的都是要用孔孟之道当作“敲门砖”，打开复辟之门；林彪这个不读书、不看报、不看文件、什么学问也没有的大党阀、大军阀，竭力宣扬孔孟之道，效法孔老二“克己复礼”，叫喊要“当董仲舒”，也是要借助孔老二这个亡灵，妄图达到他改变党的基本路线，开历史倒车，复辟资本主义的罪恶目的。"},{"type":"paragraph","text":"十一连在批判林彪“悠悠万事，唯此为大，克己复礼”的反动谬论时，大家指出，孔老二生活在奴隶制崩溃、封建制兴起的社会大变革时代，他顽固地站在奴隶主贵族的反动立场上，四出奔走卖命的目的，是要恢复“周礼”，即西周奴隶制；林彪在我国无产阶级文化大革命胜利发展的大好形势下，也叫嚷“复礼”，可见他和孔老二是一丘之貉，他日思夜想的是搞反革命复辟。副指导员张玉中说：“林彪把复辟资本主义作为万事中最大的事，我们革命战士就要针锋相对，一定要牢记党的基本路线，抓好反修防修、反对资本主义复辟这件大事。”"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0c9e17d13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
