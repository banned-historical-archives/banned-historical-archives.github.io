script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝临时　民族联合政府作出决定不同意万象极右派召开“国民议会”会议","authors":[],"dates":[{"year":1974,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月十日电　据巴特寮通讯社报道:老挝临时民族联合政府决定不同意万象极右派在五月十一日召开“国民议会”会议，认为在目前形势下，召开“国民议会”会议会有损于民族和睦事业。这项决定是在五月二日的内阁会议上作出的。"},{"type":"paragraph","text":"另据万象消息:老挝临时民族联合政府发言人乌代·苏万那冯十日在记者招待会上宣布，在十日梭发那·富马首相主持的内阁会议上研究了国王关于召开“国民议会”会议的信件。国王在信中说，他同意政府的意见，即不同意“国民议会”十一日开会。"},{"type":"paragraph","text":"据新华社北京五月十日电　巴特寮电台五月九日广播一篇评论，揭露老挝极右派妄图召开“国民议会”会议，破坏老挝临时民族联合政府和民族政治联合委员会的工作和活动的阴谋。"},{"type":"paragraph","text":"评论说，临时民族联合政府在一九七四年五月二日的例会上已作出决定，不同意万象极右派在五月十一日召开所谓“国民议会会议”。这是万象极右派的破坏阴谋所遭到的又一次可耻的失败。"},{"type":"paragraph","text":"评论指出，自从万象协定签订以来，万象极右派就反对这一协定。它利用“议会”这个美国新殖民主义的工具，大演丑剧，妄图欺骗国内外舆论。但是，它的每次丑恶表演，都遭到了舆论的反对和谴责。"},{"type":"paragraph","text":"评论说，万象极右派在临时民族联合政府和民族政治联合委员会成立后，想方设法地妄图破坏这两个机构的工作和活动。它的这个阴谋已经被全国人民、特别是被万象市和琅勃拉邦市的各阶层人民所识破。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"385a1d5a05"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
