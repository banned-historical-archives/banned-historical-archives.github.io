" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央西南局关于接收之公田学田退押问题的处理办法","authors":[],"dates":[{"year":1951,"month":3,"day":4}],"is_range_date":false,"parts":[{"text":"中共中央西南局关于接收之公田学田退押问题的处理办法","type":"title"},{"text":"近据反映关于接收之公田学田所收押金，已发生各地佃户开始向公家要求退押，我们认为应按下列原则处理：","type":"paragraph"},{"text":"（一）接管伪政府出租之公田学田等，其所收押金一般应根据佃户具体情况按分期退、少退、不退三种办法。由政府、农协与其本人协商，分别处理之，即对佃贫农的押金可分期退还；佃中农押金可退一部或少退；带垄断性的二地主及佃富农的则可不退。","type":"paragraph"},{"text":"（二）其过去所收押金如确系用于教育事业及其它社会事业者，亦可说服农民少退或不退。","type":"paragraph"},{"text":"（三）此项押金由各省区于中央粮及地方粮以外之收入中自行筹措解决之，并可由各省区政府（行署）根据此项押金所需退还数字之大小，指导专署或县人民政府与各佃户约定一期或几期退清。","type":"paragraph"},{"text":"（四）此种措施当然不是说我人民政府对过去反动政府之押金要负什么责任；但此项公产既已属于人民政府，对曾经遭受反动政府之贫苦农民确有困难，在此减退运动普遍展开情况下不能不适当处理。因此，对这一部份农民押金应引起适当注意，如果农民所有因租用公田的劳动农民未得到或得到较少退押果实时，还应从调整或在土改中予以适当照顾。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（上）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e5be59b70"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
