ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中央关于加强安全生产的通知稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于加强安全生产的"},{"type":"paragraph","text":"通知稿的批语！!"},{"type":"paragraph","text":"（1970年12月）照发。"},{"type":"paragraph","text":"[1]周恩来1970年12月7日送审的这个通知稿说，今年以来，特别是下半年以来，有些地方不断发生重大事故，给人民的生命财产造成严重损失，在政治上带来不良影响。为此，通知提出了加强安全生产的5条具体要求。周恩来送审时写道，这一文件是11月份政治局会议上讨论和修改通过的，现在各地对安全生产仍注意不够，事故仍继续发生，发这个通知，仍有必要。毛泽东阅后，写了这个批语。12月11日，中共中央将这个通知发到县团级和企事业单位。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":134,"page_end":134},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9e3cf50bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
