tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席派来的好“门巴”","authors":[],"parts":[{"type":"paragraph","text":"在一个风雪的冬天，藏族工人罗布桑得了肺水肿病，需要立即送医院治疗。领导上把护送任务交给了助理军医何大元。"},{"type":"paragraph","text":"救护车在风雪的高原上急速的奔驰着，不巧，在半途中车子陷到了一个冰河中，驾驶员费了好多力气还是开不动。天也渐渐黑了。这样耽误下去，罗布桑就不能及时得到治疗，后果很难想象。何大元这时想起了白求恩精神，他带头跳下了刺骨的冰河，卫生员们也跟着跳下去了，搬大石头砸冰，拣小石头垫路，苦战半夜，才把车子开上河岸。谁知，刚刚上路不久，又碰上一段结冰的坡路，汽车开不上去。何大元和卫生员们，又不顾疲劳，跳下车去挖沙子，拣石头，给汽车铺出一条路。但他还不放心，怕万一再出危险摔坏病人，就把病人抬下车，自己背着他，一步步地爬上了冰坡。经过六天六夜的艰苦奋斗，终于把罗布桑安全地送到了医院。这时罗布桑紧紧拉着他的双手不放，满眶热泪地说：“你真是毛主席派来的好门巴（医生）！”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"952beab8f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
