art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"咱乡来了毛泽东","authors":["庄家焕洪仁富"],"parts":[{"type":"paragraph","text":"到福建省上杭县苏家坡村参观的同志，总要怀着崇敬的心情，去瞻仰毛泽东同志曾经住过的圳背岩洞。"},{"type":"paragraph","text":"那是一九二九年秋。一天，毛泽东同志身着灰色布长衫，脚穿布鞋，风尘仆仆地来到福建上杭县苏家坡村。"},{"type":"paragraph","text":"毛泽东同志到这里后，起初居住在“槐树堂”的一间小房里，一边养病，一边坚持指导闽西特委工作。当时闽西特委机关也设在这里，几部印刷机昼夜不停地“吵闹”。为了找个安静的地方工作，毛泽东同志顺着岩石峭壁间的崎岖小道，登上“槐树堂”右侧的一座山，发现半山腰有一个山洞。这个山洞名叫圳背岩洞，岩洞上面是苍松翠柏，下面是碧流清溪，周围绿草丛生，环境隐蔽幽静。毛泽东同志十分高兴，决定搬到这里办公。"},{"type":"paragraph","text":"特委的同志们知道后，都劝阻毛泽东同志说：“您的病未好，身体弱，而且去圳背岩洞山路崎岖，一不小心就会出危险，还是在村里另找一间房子好”。毛泽东同志爽朗地笑着说，圳背岩洞很好，那里安静，空气新鲜，可以办公；登山又是一种锻炼，能使我的病好得更快。"},{"type":"paragraph","text":"就这样，毛泽东同志向炊事员借了把柴刀，披荆斩棘，开辟了一条通圳背岩洞的路。在洞里，搬来两块石头，用一块木板一架，成了桌子，再把一块青石板一摆，成了凳子。毛委员就在这个天然的“办公室”里坚持工作，经常废寝忘食，看材料，批阅文件，指导闽西特委工作，艰苦地度过了近四十天。"},{"type":"paragraph","text":"一九二九年十一月，毛泽东同志回到红四军主持工作。多少年来，这里的干部群众一直深深地怀念他.传颂着这样一首山歌："},{"type":"paragraph","text":"太阳一出满天红，"},{"type":"paragraph","text":"咱乡来了毛泽东。"},{"type":"paragraph","text":"专为穷人做大事，"},{"type":"paragraph","text":"办公却在圳背洞。"},{"type":"paragraph","text":"（庄家焕 洪仁富）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afc1a851d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
