{"year":1958,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京28日专电】　我们敬爱的领袖毛主席和刘少奇、周恩来、朱德、邓小平同志，中共中央政治局委员、候补委员，中共中央书记处书记、候补书记，以及全体中央委员和候补委员，25日到十三陵水库工地，参加义务劳动的情况，已由中央新闻纪录电影制片厂拍成了短纪录片。这部“领袖和我们同劳动”的纪录片今日晚上已在首都影院与观众见面。"},{"type":"paragraph","text":"影片纪录了毛主席和中央领导人在工地精神焕发、热情参加劳动的情形。他们和普通劳动者一样，头戴草帽，身穿粗布衣裳，挑土、铲土，虽然他们汗流浃背，但丝毫没有疲劳的样子。影片还纪录了群众对领袖的热烈欢迎，以及在领袖的鼓舞下所发挥更大干劲的情形。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2d043e3d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
