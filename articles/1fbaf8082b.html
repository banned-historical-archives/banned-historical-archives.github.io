ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"致朱德、任时电","alias":"","parts":[{"type":"paragraph","text":"致朱德、任弼时电!"},{"type":"paragraph","text":"（1937年12月19日）"},{"type":"paragraph","text":"卡尔逊²既坚欲去五台，不便拦阻，但须：（一）除写信给美使馆外，需写一信交总统府说明：如遇危险，中国中央政府及八路军无责任。（二）派可靠队伍送他，严密保护。"},{"type":"paragraph","text":"[1]这是毛泽东致朱德、任弼时电的主要内容。"},{"type":"paragraph","text":"[2]卡尔逊，当时是美国海军陆战队的情报观察员。卡尔逊在去前线以前，给美国驻华大使詹森写了一封信，信中说：“我很快要到前方去。”“这是我自已要求并且是在朱德总司令劝我不要去的情况下前往的，如果我阵亡或者受伤，我希望明确说明，八路军或中国政府方面没有任何责任。”"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":419,"page_end":419},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fbaf8082b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
