<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共川东区党委关于组织民主人士参加土地改革工作的指示","authors":[],"dates":[{"year":1951,"month":5,"day":25}],"is_range_date":false,"parts":[{"text":"中共川东区党委关于组织民主人士参加土地改革工作的指示","type":"title"},{"text":"组织民主党派、民主人士下乡参加工作问题，在减租退押运动时区党委曾专发指示，并要各地随时报告组织这一工作的情况与经验。但迄运动结束，没有一个地委、县委执行过这个规定。是根本没有作还是习惯性的作了不报告？估计两种情况都有，前者的可能性更大。仅从这个事实看，我们可以说各地党的领导还确实没有能从思想上很好地解决统一战线的问题，至少还没有把组织民主人士参加农村改革工作，让他们与闻其事，藉以扩大反封建统一战线和帮助他们进步这个问题重视起来。最近中央与西南局的迭次指示及各地不少好的经验均先后转发你们，今再提出以下几项具体意见希一并结合研究执行：","type":"paragraph"},{"text":"一、凡进行土改的县均须认真的组织土改委员会及处理土改中城乡有关问题的城乡联络委员会。吸收进步的民主人士参加，使其与闻土改工作的领导。","type":"paragraph"},{"text":"二、各地在训练土改干部与农民积极分子的同时，应即动员与组织工商、文教、宗教、妇女、专家、教授、民主党派人士等在他们自愿的原则下参加土改训练班学习，尔后随同我们干部一起下乡参加工作，人数越多越好。","type":"paragraph"},{"text":"三、中央及重庆来川东参加土改的人士，分到各县时，可组织当地民主人士及我们干部举行座谈会、联欢会一类形式的会议以示欢迎（不可组织群众欢迎），并随时招待。下乡之前应向他们介绍情况，土改训练未结束的同样应组织他们参加学习，到农村后一般应和我们干部一样生活，但对年老体衰者可予适当照顾，对他们的安全需很好注意。","type":"paragraph"},{"text":"四、对于参加工作的民主人士的态度最主要的是热情、诚恳、坦白、严肃。因此，凡是有关土改的会议：如布置工作、汇报工作、干部检讨等均应让他们参加，尊重和采纳他们正确的意见，帮助他们了解情况，适当的分配与放手的让他们工作。工作之后要帮助他们总结经验，好的予以鼓励，有缺点的启发他们自己检讨和互相批评。总之，在工作过程中应把他们和我们干部一样看待，不要当客人，不要过份客气和迁就；同时也不要有任何冷漠和傲慢的表现。","type":"paragraph"},{"text":"五、为使这个力量有助于工作，又能在轰轰烈烈的运动中使他们得到改造，扩大我们的影响，各地在分配他们工作时，一般应放到领导较强，工作较好，交通较便利的地方，并须配备得力干部带领；在工作中还应及时和他们联络，负责同志多找他们谈话均是必须的。对于这一工作在我们说来还是生疏的、缺少经验的。因之，要求各地要随时将这一方面的情况及经验经常加以检查总结，逐级上报，以便交流。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（下）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a36dea6ca"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
