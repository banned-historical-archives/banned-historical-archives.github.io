script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏加诺国宴招待各国代表团长 亚非会议筹备会全体会议上世二个代表团作了发言 我代表团团长陈毅副总理的发言博得了热烈掌声 约多说敢于革命定能得到胜利 筹备会议是对帝国主义和修正主义的打击","authors":[],"dates":[{"year":1964,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达12日电】　印度尼西亚总统苏加诺十一日晚上举行国宴，招待出席正在这里举行的第二次亚非会议筹备会议的二十二个亚非国家的代表团团长。"},{"type":"paragraph","text":"在出席的各国代表团团长中有中国副总理兼外交部长陈毅。"},{"type":"paragraph","text":"在宴会后举行了文娱晚会。苏加诺总统的两位女儿和印度尼西亚的艺术家们表演了精彩的印度尼西亚传统舞蹈和音乐节目。歌唱家们演唱了《亚非人民团结起来，战斗到底!》的歌曲，博得了雷鸣般的掌声。"},{"type":"paragraph","text":"【新华社雅加达11日电】　第二次亚非会议筹备会议十一日下午在这里继续举行全体会议。"},{"type":"paragraph","text":"会议秘书处新闻、宣传和通讯组长加尼斯·哈索诺对新闻记者说，在十一日下午的会上，中国、印度尼西亚、巴基斯坦、利比里亚、伊拉克、阿联坦噶尼喀、埃塞俄比亚、伊朗、阿尔及利亚和喀麦隆这十一个国家的代表团团长发了言。他说，下午会议的气氛同上午会议一样良好。"},{"type":"paragraph","text":"到目前为止，所有二十二个代表团都在十一日的全体会议上作了一般性发言。坦噶尼喀代表团是在会议开幕后到达的，使出席会议的国家增加到二十二个。"},{"type":"paragraph","text":"加尼斯，哈索诺说，巴基斯坦代表团建议在十二日下午举行非正式会议。这项建议得到一致同意。"},{"type":"paragraph","text":"中国代表团团长、中国副总理兼外交部长陈毅在会上的发言博得了热烈的掌声。"},{"type":"paragraph","text":"【新华社雅加达12日电】　第二次亚非会议筹备会议今天下午举行了非正式会议。"},{"type":"paragraph","text":"【新华社雅加达12日电】　雅加达《人民日报》今天报道:印度尼西亚共产党中央委员会第二副主席约多最近在泗水举行的两万人的群众大会上发表讲话，表示欢迎第二次亚非会议筹备会议的召开。他说，筹备会议是对帝国主义、新殖民主义和修正主义的打击。"},{"type":"paragraph","text":"约多说，任何国家，不论大小，只要敢于进行革命和敢于胜利，就一定能够得到胜利。"},{"type":"paragraph","text":"他指出，当前的国际形势很好。在非洲、拉丁美洲，特别是在亚洲各地，美国正在遭受一个接着一个的打击。他说，北加里曼丹革命正在取得重大胜利，这个革命得到印度尼西亚人民的支持，它将粉碎美国支持的“马来西亚”。"},{"type":"paragraph","text":"约多还指出，修正主义在本质上是拒绝革命和害怕革命的。他说，因此，反对修正主义的斗争是一个必须始终不渝地进行的原则性的斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1101ca2e47"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
