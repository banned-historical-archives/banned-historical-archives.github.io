tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见泰王国国会代表团","authors":[],"parts":[{"type":"paragraph","text":"据新华社北京十月二十六日讯 人大常委会委员长叶剑英今天晚上在这里亲切地会见了泰王国国会议长哈林·宏沙军空军上将和夫人，以及由哈林议长率领的泰王国国会代表团。"},{"type":"paragraph","text":"会见时，叶委员长说，我很高兴见到你们。你们代表团的这次访问，必将使中泰友好关系得到进一步发展。他请泰国朋友把中国人民对泰国人民的友情带回去。他祝代表团访华获得圆满成功。"},{"type":"paragraph","text":"哈林议长说，我们很感谢叶委员长会见我们。泰中两国人民的友好关系从很早就开始了。只要我们经常来往和接触，加强彼此了解，我们之间就会成为很亲密的朋友。"},{"type":"paragraph","text":"人大常委会副委员长邓颖超、阿沛·阿旺晋美等参加了会见。"},{"type":"paragraph","text":"图为叶委员长同哈林议长亲切握手。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3176d7aa6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
