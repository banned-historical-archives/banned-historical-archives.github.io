dates":[{"year":1952,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:华东大行政区的打虎斗争亦正以巨大的规模、迅速向纵深发展中。人民日报社论曾经指出:这一场斗争“按其实质讲来，也是保持和巩固工人阶级领导权的斗争。和历次伟大的革命斗争一样，这个斗争也是只许胜利，不许失败，只许进行到底，不许中途妥协的。”但是某些单位领导上存在着对资产阶级的侵蚀仍估计不足，因而产生嗅觉不灵、斗志不坚、优柔寡断的右倾思想，这种“思想老虎”直接或间接的阻碍了打虎斗争的进行。像中国人民银行湖州市分行领导上在三反运动开始时，就认定本单位“制度严格、没有漏洞、不可能有老虎”；在检查出八百余万的贪污数字后，就认为“我们这里没有什么了”，要想结束三反运动。等到接受上级分析、指示、充分放手发动群众后，又捕获盗窃国家财产达七亿九千多万的大老虎一只，盗卖大米一万五千多斤、黄金八两的老虎一只。"},{"type":"paragraph","text":"从上面这一事实看出，克服右倾思想是在三反斗争中取得彻底胜利的重要前提，希望各单位领导上迅速引起注意。"},{"type":"paragraph","text":"湖州市省立湖师　郑爕芳　张翔声"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"903c3418f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
