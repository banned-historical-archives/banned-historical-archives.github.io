帮","authors":[],"dates":[{"year":1952,"month":4,"day":18}],"is_range_date":false,"parts":[{"text":"美方续阴谋将我方被俘人员送交蒋李匪帮","type":"title"},{"text":"【美联社釜山十八日电】据今日宣布，被拘留在巨济岛战俘营的平民已有九千○三十一名昨日向国民议会提出了愿书，誓愿与共产主义博斗，并要求给他们一个机会去打击“共产帝国主义者及其傀儡”。","type":"paragraph"},{"text":"这些愿书中有一千一百零九份是用血写成的。里面说：“我们将效忠祖国(大韩民国)，尽我们一分力量与共产主义博斗，至死不渝。”“打倒共产主义，挽救祖国。”","type":"paragraph"},{"text":"另外七千九百二十二人签名的请愿书说：“无数爱国者在共产党的监牢里受到所谓人民的审讯之后，便被杀害，就埋在牢中的地下。可是，即使在这种非常的恐怖环境中，我们仍然决心反抗共产主义，以达到祖国消灭共产主义的最终目的。我们要求给我们一个机会去参加对凶恶的共产主义的斗争，以争取自由、正义及和平。”","type":"paragraph"},{"text":"国民议会外交委员会是从议会议长申翼熙的手中收到这些愿书的。该委员会说，这些愿书将经由国防部送达在板门店与共产党进行停战谈判的联军代表手里。","type":"paragraph"},{"text":"【美联社台北十六日电】因为据报英国与法国竭力压使美国交出全部共产党战俘，使此间反对违反自愿遣返俘虏的运动重新勃起。国民党中国不仅反对强迫交换俘虏，并准备接受为联军甄别过，愿意参加反对共产主义斗争的所有中共俘虏到来台湾。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年4月19日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16244c940e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
