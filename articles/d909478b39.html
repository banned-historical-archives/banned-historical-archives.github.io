],"dates":[{"year":1993,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报杭州11月23日电　(特约记者　翟文)我国第一枚珍钞纪念票——“毛泽东诞辰100周年纪念票”已由上海印钞厂印制成功，并在今天下午由杭州浙江天马造型艺术有限公司总经理屠燕治专程赴京把编号为“001”的样票赠给毛主席纪念堂。纪念票采用抗战时期新四军主办的江淮银行于1944年发行的伍圆抗币为主图，这张抗币和该行同时发行的贰拾圆抗币是两张钱币史上最早印上毛泽东像的纸币。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d909478b39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
