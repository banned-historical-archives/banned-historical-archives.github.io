"dates":[{"year":1992,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　著名作家叶永烈新著《历史选择了毛泽东》(上海人民出版社出版)定于今日下午在静安寺新华书店(华山路42号)签名售书。此书为作者“红色三部曲”——《红色的起点》、《历史选择了毛泽东》、《毛泽东和蒋介石》中的第二部。全书以流畅而富有逻辑性的文字表达与构思，如实写出了毛泽东当年的沉浮——几度遭批判，几次被撤职，一次被捕，几番病重……但正是在这历史的角逐与选择之中，毛泽东以其当年正确的方针与策略，路线与战略赢得了全党的拥戴，雄踞中共领袖地位达41年之久。　(季永桂)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0585939b6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
