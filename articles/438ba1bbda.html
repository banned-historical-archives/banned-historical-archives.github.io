学","蒋兴仁"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"论考勤制度的缺点","type":"title"},{"text":"北京大学蒋兴仁","type":"authors"},{"text":"考勤制度是从工厂硬扯过来的，硬套于智力劳动的形式主义的产物。它不但没有鼓舞同学学习积极性，反而限制了同学们的学习的发展。","type":"paragraph"},{"text":"请看—下，它的缺点：","type":"paragraph"},{"text":"1．只讲究形式上的出勤，不能保证学好与听好。","type":"paragraph"},{"text":"2．由行政指命而作点名汇报的班长，陷于忙乱。并且把同学当作职员，是对同学不尊重。","type":"paragraph"},{"text":"3．强迫同学出勤听课，是对教学质量不高的教师的偏袒与怂恿不能刺激教员提高教学质量，而反使他洋洋自喜，“好不好，反正总有人来听”。","type":"paragraph"},{"text":" 来源：北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"438ba1bbda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
