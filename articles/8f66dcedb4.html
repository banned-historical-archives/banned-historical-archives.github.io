script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山帅——毛泽东在井冈山　18　镇压叛乱","authors":["吴振录","邱恒聪"],"dates":[{"year":1992,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吴振录　邱恒聪"},{"type":"paragraph","text":"天将破晓，谢虎才回来。也不知道是掉到河里，还是泅水过河，只见他一身水湿象个落汤鸡，被一个队员扶着，跌跌撞撞进来。一进门便说:“东关的桥被拆了，是城西和城北在打。工农革命军半夜从城里撤了，吴尚的第八军一个团占了城。”"},{"type":"paragraph","text":"“撤了?撤往哪里了?”毛泽东忽地站起来问。"},{"type":"paragraph","text":"“可能往南……”"},{"type":"paragraph","text":"“同志们，”毛泽东神态严肃地说，“我们一刻也耽搁不得罗，设法找条渡船，立即过河。大家快抓些米饭，只好一路走，一路填填肚子。再耽搁，我们会有全军覆没的危险呐!”"},{"type":"paragraph","text":"大家从来没有见过毛泽东这样着急、焦躁。毛泽东的预感，使他们都晓得工农革命军已到了最危急的时刻……"},{"type":"paragraph","text":"果然不出毛泽东所料，中国工农革命军第一师第一团，正处于一场严重的危机中。这一危机不是来自敌人，也不是来自外部的困境，而是来自这支部队的内部。"},{"type":"paragraph","text":"一个欲将整个部队从毛泽东身边拉走的企图，正在团部的几个军事首脑中密谋……"},{"type":"paragraph","text":"“良机不可失，现在老毛还不晓得，宛麻子一伙还没醒悟过来。”徐恕骨碌着两只大眼，刀削样的瘦长脸上洋溢着得意之色，他弹了弹烟灰，带着一种决断的口吻说，“不管方军长接没接到从茶陵发出的信，我们都要先把队伍拉过去。朱德能到十六军隐蔽下来，不过靠的是他同范石生在云南时老相识的关系。陈团长同方军长既有师生之谊，又有甥舅之亲。这是双重关系，他不会不接收的。你说呢，陈大哥?”"},{"type":"paragraph","text":"陈浩黑沉着脸，一口接一口抽烟，没有吭声。黄子吉却抢先嚷道:“要得，就他娘的这么办，反正不能再跟老毛去钻山沟罗。我们是堂堂正正的黄埔军校出来的军官，叫他弄得我们军不象军，匪不象匪的，连裤子快没得穿罗。你看张子清、伍中豪这次回来，土地爷放屁，神气的，跟朱德到十六军没几天嘛，发了军饷，又充了弹药，嘿，每人还捞了套里外全新的军装来。”"},{"type":"paragraph","text":"陈浩拧着眉头，又不紧不慢地吸了几口烟，说:“我同意诸位见解，这是一个机会。但也匆忙不得。方鼎英是我的舅父，在黄埔军校也是我们的教务长，但他是国民党，我是共产党。国共现在水火不容。北伐以后，我同他早就断了来往，要到他的部队里去，必须接通关系，谈妥条件……”"},{"type":"paragraph","text":"他这一讲，三个人都不作声了。最后商量决定派黄子吉带领部分一营的士兵打前战并与方军长取得联系。"},{"type":"paragraph","text":"黄子吉从陈浩手里接过一封密信，揣进怀里，转身而去。"},{"type":"paragraph","text":"徐恕暗自庆幸计划快要实现，他让黄子吉一营先撤；令张子清三营刚到就投入战斗，他们不了解情况，团长让他们到哪里顶，他们就到哪里顶，叫何时撤，就何时撤。夜黑如墨，墨黑的暗夜中，部队被他们拉向南去……"},{"type":"paragraph","text":"徐恕刚想起身，“嘭”地门被推开，一个护兵闯进来:“报告团长，毛委员来了!”"},{"type":"paragraph","text":"“啊?!”三个人惊得脚底板象上了弹簧似的蹦起。"},{"type":"paragraph","text":"护兵还来不及说明，一盏马灯出现在门口，灯光里映出毛泽东瘦高的身影，他身后站着宛希先、罗荣桓、张子清等人。"},{"type":"paragraph","text":"毛泽东一行人是在黄昏时赶到的，他已听到了许多士兵的反映……"},{"type":"paragraph","text":"他严肃地走进屋里，说:“你们都不会想到我会来吧?为什么要南撤?为什么要拆东桥?”"},{"type":"paragraph","text":"一连几个为什么，三个人一时目瞪口呆，但他们知道毛泽东手里没有证据，死也不肯承认背叛革命，反而都提出了要辞职。"},{"type":"paragraph","text":"毛泽东用目光扫了这几个声明要走的人，说:“要溜吗?没有那么简单罗。在你们的情况没有查清之前，你们必须听候工农革命军的审查!”"},{"type":"paragraph","text":"没过多时，护兵回来报告追回了黄子吉且收到一封密信。"},{"type":"paragraph","text":"在铁的事实面前，毛泽东连夜召开了前委紧急扩大会议。公布陈浩、徐恕、韩昌剑、黄子吉反革命集团阴谋叛变的罪行。"},{"type":"paragraph","text":"两天以后，经工农革命军临时特别法庭审判，以反革命叛变罪判处了陈浩等四人死刑，并于当天执行枪决。"},{"type":"paragraph","text":"公历1928年的元旦，在中国的南方山区没有任何人的关注，就悄没声儿地过去了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f66dcedb4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
