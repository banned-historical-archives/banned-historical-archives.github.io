art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"不能用“文革”那一套评价历史事件和人物","authors":["李亚丹"],"parts":[{"type":"paragraph","text":"本报北京3月13日讯 中央军委常务副主席杨尚昆说，不能用“文革”那一套来评价历史事件和历史人物。"},{"type":"paragraph","text":"杨尚昆今天在全军党史资料征集委员会召开的《长征》、《八路军》、《新四军》史料丛书编纂工作会议上说，写历史是为了总结经验教训，促使人民向前看。这三部丛书编出来要达到教育、鼓舞、团结全国人民和军队，推动我们的事业向前进的目的。他说，写历史事件和事件中的人，要掌握它的历史背景、历史意义、分析和评价其积极面和消极面。人物在长期斗争中有主要面和次要面，要作历史的、全面的、正确的评价，采取实事求是的态度，不能凭主观臆断。"},{"type":"paragraph","text":"今年是第二次世界大战结束四十周年，明年是红军三大主力会师陕北五十周年，这三部丛书是为向国内外提供我党我军系统、准确的史料而征集、编纂的。预计今年9月将出版《八路军》、《新四军》，明年出版《长征》。"},{"type":"paragraph","text":"军委领导同志杨得志、余秋里、洪学智等出席了今天的会议。中央党史资料征集委员会主任冯文彬在会议期间讲了话，（本报记者李亚丹）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"986cf76ee7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
