于全国各界人士进行反贪污、反浪费、反官僚主义的思想改造学习的通知","authors":[],"dates":[{"year":1951,"month":12,"day":29}],"is_range_date":false,"parts":[{"text":"人民政协全国委员会常务委员会发出关于全国各界人士进行反贪污、反浪费、反官僚主义的思想改造学习的通知","type":"title"},{"text":"根据本会一九五一年十二月二十九日的指示，兹决定目前全国各界社会人士的思想改造学习，即以反贪污、反浪费、反官僚主义为内容，以配合实际斗争，清除旧时代的遗毒，树立新社会的道德，并为今后的经常学习奠定基础。此项学习的时间定为两个月。学习方法为学习文件、组织报告、展开批评和自我批评（包括检举和坦白）。学习文件定为“毛泽东同志论反对贪污浪费”，人民日报一月四日社论“在反贪污、反浪费、反官僚主义的伟大斗争中，发动群众的关键何在？”和各大行政区各省市首长关于反贪污、反浪费、反官僚主义的报告。参加学习的人数愈多愈好，尤其要努力吸引工商界的广大人士参加。务望各地协商机关迅速成立学习委员会，领导这个伟大的学习运动。","type":"appellation"}],"comments":[],"origin":"一九五二年一月八日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3ef537e44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
