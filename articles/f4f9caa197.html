" crossorigin="">{"props":{"pageProps":{"books":[{"id":"cb043827-1a6a-46f3-863d-a430958e5a0d","name":"无产阶级文化大革命参考资料（1966年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"全国在京革命师生向资产阶级反动路线猛烈开火誓师大会上江青同志的讲话","alias":"","parts":[{"type":"paragraph","text":"静坐食不能他对不对，别再给他们火上加油了，我们反对这样对待他们。"},{"type":"paragraph","text":"我们要吃饭干革命，不要糟塌自己的身体，我们是毛主席领导的时代，是无产阶级专政的时代，有什么问题不可以解决呢？不必这样做，这不是好办法，不宜朵取，这是一般地讲，要吃饭斗争下去，要按毛主席的指示办事，不要怕麻，共产党具生出来就是要解决复杂的事情。"},{"type":"paragraph","text":"在斗争中不要到处收财物，要没收由公安局统一没收，财务交贸易系统，现款交银行，要办手续，有证件，要一清二楚，不能含糊，不要一，两个人坏了整个队伍的声誉。要遵守三大纪律，八填注意，要克已奉公，点滴归公，青年人要从小养成这种优良的品质。"},{"type":"paragraph","text":"六、民主集中制"},{"type":"paragraph","text":"这次文化大革命是最大的民主，四大就是宪法上的六大自由，你们通通得到，还多了一填：放假闹革命。只有在中国才敢这样做。在这种大民主下就要有高度的集中，集中到毛泽东思想的基础上来，有些政权不能下放；"},{"type":"paragraph","text":"1.保卫权、武器、军装不能往下发，保卫权只能在解放军和民兵手里。因为红卫兵不是解放军的真正后备军。"},{"type":"paragraph","text":"2.法律逮捕掌握在法庭手里。3.宣传权利、党报、新华通讯社、广播电台等，不能由那个红卫兵使用。你们学校可以。没有一个统一的导，你们就会出偏差。七、组织问题"},{"type":"paragraph","text":"无是儿个红卫兵，但毕竟不能包括你们学校的全部师生，总还有剥削阶级家庭出身的子女吧：如何去团结改造他们呢？必须要有一个统一的文革组织。但现在又有一个多数和少数问题，如何能做到平等，关于领导权问题，你们可以协商解决，有个前提，你们也不能领导，多数更不能压少数，要保护少数，少数受压也不要气。"},{"type":"paragraph","text":"要真正按照十六条精神成立一个统一的文革组织，必须要有一个过程。"},{"type":"paragraph","text":"全国在京革命师生向资产阶级反动路线"},{"type":"paragraph","text":"猛烈开火誓师大会上江青同志的讲话"},{"type":"paragraph","text":"(十月七日)同志们、同学们：你们好！"},{"type":"paragraph","text":"我受党中央和毛主席的委托向你们问好！我代表中央文化革命小组全体同志问你们好：向你们致崇高的无产阶级革命的敬礼！"},{"type":"paragraph","text":"我们支持你们这种大无畏的无产阶级的革命的英雄行为！我们学习你们这种不怕困难，不怕牺牲的革命精神！我们坚决和你们站在一起！捍卫和执行党中央十一中全会关于无产阶级文化大革命的决定，即十六条。"},{"type":"paragraph","text":"一个真正的无产阶级革命者，一定要掌握原期，掌握政策，懂得策略。我希望同志们在大风大浪的炼中掌握方向政策，学会善于运用斗争的策略。最重要的是在马列主义和毛泽东思想原的基础上，在斗争的考验过程中，发展和壮大左派队伍，团结大多数愿意革命的人，团秸那些受蒙蔽的人，孤立和打击那一小撮党内走资本主义道路的人，走资本主义的当权派！"},{"type":"paragraph","text":"党中央在十月五日批准了军队关于无产阶级文化大革命的紧急通知。现在请张春桥同志向同志们宣读，好不好？（众：好)"},{"type":"paragraph","text":"·223·"}],"authors":["江青"],"dates":[{"year":1966,"month":10,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":233,"page_end":233},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4f9caa197"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
