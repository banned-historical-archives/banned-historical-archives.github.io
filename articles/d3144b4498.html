[],"dates":[{"year":1963}],"is_range_date":false,"parts":[{"text":"林彪同志对管理教育的五条指示","type":"title"},{"text":"林彪同志根据毛主席正确处理人民内部矛盾的理论，根据毛主席的建军思想和带兵原则，根据我军当前的情况和管理教育工作的历史经验，曾经对管理教育工作作了许多重要指示，这些指示可以归纳成为下列五条原则：(1)既要负责管理，严格要求，防止把部队搞得松松垮垮，又要耐心说服教育，讲究方式方法，防止简单粗暴。(2)既要以表扬好人好事和进行正面教育为主，又要对一般性的缺点和错误，进行个别谈话或班、小组的批评。(3)既要官管兵，又要动员兵管兵。(4)既要进行深入细致的思想工作，又要热情关怀和帮助解决实际困难，干部并应事事以身作则。(5)既要有严格的军容风纪和正规的生活秩序，又要使部队活泼愉快，官兵融洽无间。","type":"paragraph"}],"comments":[],"origin":"《文件选读》(军内文件　注意保存)，中共中央国防工业政治部翻印，一九六六年七月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3144b4498"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
