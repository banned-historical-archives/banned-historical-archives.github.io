s":[],"dates":[{"year":1950,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保国民议会主席"},{"type":"paragraph","text":"达米扬诺夫电毛主席"},{"type":"paragraph","text":"感谢对保国解放六周年的祝贺"},{"type":"paragraph","text":"【新华社十六日讯】保加利亚国民议会主席团主席乔吉·达米扬诺夫，电谢我中央人民政府毛泽东主席对保加利亚解放六周年的祝贺。电文如下：中华人民共和国中央人民政府主席毛泽东先生："},{"type":"paragraph","text":"谨以保加利亚人民共和国国民议会主席团及我个人名义，对您在保加利亚解放六周年之际致保加利亚人民的贺电表示感谢之忱。为了国家的建设，保加利亚人民需要和平，所以它和伟大的中国人民及其他各民主人民，将坚决地站在以不可战胜的苏联和伟大的斯大林为首的和平阵营方面，用一切的力量去进行反对英美帝国主义新战争挑拨者的斗争。"},{"type":"paragraph","text":"保加利亚国民议会主席团"},{"type":"paragraph","text":"主席  乔吉·达米扬诺夫  九月十三日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fcd0f89db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
