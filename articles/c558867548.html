art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理说：面对越南侵柬中泰两国更需要密切合作","authors":[],"parts":[{"type":"paragraph","text":"新华社一月十三日讯 邓小平副总理今天上午对泰国朋友说：“我们中泰两国现在关系很好。面对越南侵略柬埔寨这一局势，我们两国更需要密切合作。”"},{"type":"paragraph","text":"这番话是他在会见泰国副总理顺通·宏拉达隆一行谈到柬埔寨局势时说的。"},{"type":"paragraph","text":"顺通副总理向邓小平副总理介绍了他们最近几天同中国方面就泰国进口中国石油问题所举行的会谈的情况。邓小平副总理说：“中泰两国是友好邻邦，我们愿意在合情合理的价格下积极发展同泰国的贸易关系。我们今后不光在石油方面开展贸易，还将在其它领域里全面发展中泰贸易关系。”"},{"type":"paragraph","text":"泰国驻中国大使格森·格森西参加了会见。"},{"type":"paragraph","text":"会见时，外贸部长李强等在座。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c558867548"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
