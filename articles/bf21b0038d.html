ar":1981,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意共同中共代表团举行首次会谈"},{"type":"paragraph","text":"新华社罗马7月3日电  意共中央领导机构成员、书记处书记基亚罗蒙特今天下午同前来访问的、由中共中央政治局委员、书记处书记彭冲率领的中共代表团在诚挚友好的气氛中进行了首次会谈。"},{"type":"paragraph","text":"会谈开始的时候，基亚罗蒙特首先转达了贝林格同志对中共代表团的热烈欢迎，并表示相信中共代表团这次访问将有利于两党和两国人民之间友好关系的进一步发展。"},{"type":"paragraph","text":"彭冲在谈话中首先转达了胡耀邦、邓小平和李先念对意共中央领导同志们的热烈问候，并对意共中央电贺中国共产党建党六十周年表示衷心的感谢。"},{"type":"paragraph","text":"他说，这次访问给我们提供了一个学习意共斗争经验的好机会。"},{"type":"paragraph","text":"意大利方面参加会谈的有，意共中央代表团团员：意共领导机构成员托尔托雷拉，意共中委、中央对外联络部长鲁比，意共中委、米兰省委书记维塔利，中央委员贝拉尔迪等。"},{"type":"paragraph","text":"中国方面参加会谈的有代表团团员：中央委员、中共中央对外联络部副部长冯铉，中联部局长朱达成。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf21b0038d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
