uthors":["张闻天"],"dates":[{"year":1967,"month":2,"day":18}],"is_range_date":false,"parts":[{"text":"张闻天写给南开大学抓叛徒战斗队的“交待材料”","type":"title"},{"text":"张闻天","type":"authors"},{"text":"张闻天交待材料──关于1936年“自首案”真相（摘录）","type":"subtitle"},{"text":"南开大学抓叛徒战斗队：","type":"appellation"},{"text":"我现在交待以下三个问题：","type":"paragraph"},{"text":"1、立场问题……","type":"paragraph"},{"text":"2、事实真相：……刘少奇初去北方局（1936年春）不久，就给我一封关于如何解决白区工作干部问题的信……。他说，现在北平监狱中有一批干部，过去表现好，据监狱内部传出消息，管理监狱的人自知日子不长，准备逃走，也想及早处理这批犯人，所以只要履行一个反共不发表的简单手续（按：这是胡说八道）犯人即可出狱……。此外他还附带着寄来狱中干部提出有三个条件的请求书，要我签字，好使狱中干部相信，中央是同意那样办的。我当时很相信刘少奇的意见，并也在请求书上签了字，退回去了……。我现在记得，我当时没有把此事报告毛主席，或提到中央特别讨论。","type":"paragraph"},{"text":"3、责任问题：根据以上的立场和具体情况，即可看出，关于此案的直接主谋者，组织者和执行者是刘少奇。他利用他的资产阶级的招降纳叛的干部政策，以实现他篡党，篡军，篡政的政治野心。但是我在这方面，也负有严重的政治责任……。没有请示我们的伟大领袖毛主席，没有提到中央会议上正式讨论，而轻率地以我个人的名义，同意了刘少奇的建议，并在请求书上签了字。这样，我不但违反了党章，党纪的规定，损害了党的组织的纯洁性，玷污了我们共产党人永不变节，忠贞不屈的光荣传统，而且也给刘少奇招降纳叛的干部政策打开了方便之门。我在这个问题上犯了严重的反党罪行，而且也成了刘少奇的帮凶。","type":"paragraph"},{"text":" 张闻天一九六七年二月十八日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"张闻天","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8f2aa82f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
