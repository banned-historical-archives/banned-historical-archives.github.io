script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"电毛主席、朱总司令致敬","authors":[],"dates":[{"year":1949,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社西北前线三日电】　兰州市回族人民于八月卅一日庆祝解放暨欢迎人民解放军大会上，电毛主席、朱总司令致敬。电文如下:"},{"type":"paragraph","text":"亲爱的毛主席、朱总司令:"},{"type":"paragraph","text":"八月二十六日兰州胜利解放，数千年受压迫的我们，从此获得了自由与幸福。今天我们在盛况空前的欢呼声中庆祝我们的解放，这是我们有生以来第一次的欢乐与愉快，这是伟大人民解放军带给我们的。今后我们兰州市的全体回民愿在毛主席，朱总司令的领导下，积极支援前线，为全歼残余马匪军，为解放全西北全中国而奋斗到底。特电致敬。"},{"type":"paragraph","text":"兰州市回民庆祝解放暨欢迎人民解放军大会三十一日。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e754426510"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
