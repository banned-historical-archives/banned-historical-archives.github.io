ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对召开中共八届扩大的十二中全会报告的批语","alias":"","parts":[{"type":"paragraph","text":"对召开中共八届扩大的十二中全会"},{"type":"paragraph","text":"报告的批语"},{"type":"paragraph","text":"（1968年9月20日）"},{"type":"paragraph","text":"请林彪同志先看，我再看，然后在一次至二次会上讨论才能作出决定。我认为暂时不宜成立中央革委会，中央全会也不要扩大很多人，有100多人就够了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月二十日"},{"type":"paragraph","text":"[1]指周恩来和陈伯达（当时任中共中央政治局常委、中央文革小组组长）、康生（当时任中共中央政治局常委、中央文革小组顾问）、江青（当时任中共中央文革小组副组长）1968年9月19日给毛泽东等的报告。报告中汇报了9月15日晚中央文革碰头会讨论召开中共八届扩大的十二中全会的情况。其中讲到，这次全会的议程之一是推选中央革命委员会，在“九大”前作为党和国家的临时最高权力机关；参加扩大的十二中全会的人数，连同能出席全会的中委和候补中委在内300人左右。中共八届扩大的十二中全会1968年10月13日至31日在北京举行。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":9,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":307,"page_end":307},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37b773dde1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
