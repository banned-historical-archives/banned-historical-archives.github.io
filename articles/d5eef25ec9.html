":[{"year":1951,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社广州十七日电】　苏联体育代表团已于十六日晚离广州前赴武汉。广州市市长叶剑英，副市长梁广，文教厅副厅长秦元邦，中华全国体育工作者协会广州分会全体工作人员等七百多人赴车站欢送。该代表团留广州三天，曾与广州市工联、学联、军联、市联等四个篮球队作了友谊比赛，与全市体育工作者举行了座谈会和篮球临场教练，并参观了广州市革命先烈史迹。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5eef25ec9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
