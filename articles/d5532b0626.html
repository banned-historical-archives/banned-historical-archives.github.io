uthors":["王建平"],"dates":[{"year":1951,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　长宁区延安西路人民新村二千余居民，自本市解放二周年以来，生活大大改善，政治觉悟文化水平普遍提高，里弄组织也渐趋健全，居民们都认识到今朝这样幸福的生活，是我们英明的领袖毛主席带来的。因此，在本市解放二周年纪念的节日，特上书毛主席，表示他们对人民领袖的衷心感激，信上这样写着:"},{"type":"paragraph","text":"敬爱的毛主席:我们是上海长宁区人民新村的居民，白天我们都是做工，踏三轮车的，做厂的。我们棚户区的居民，在以前反动派统治时期，是给人家看不起的，受尽了美蒋特务、流氓、恶霸的欺压、剥削。终年不停的苛捐杂税；再加物价一天三涨四跳，一年到头吃不饱，穿不暖，牛马不如的生活着。一间矮小简陋的草棚棚，以稻草为被，叠砖为凳，逢到台风暴雨，草棚棚经常吹塌压倒，甚为危险。我们弄堂隔壁的花旗总会，是美帝国主义榨取了中国劳苦人民的血脂血膏作为享乐的地方；那些下流的家伙，常常调笑我们的妇女，用肉骨头诱引我们的小孩，用尽种种野蛮的行为来侮蔑我们，千冤万仇无处申诉，大家敢怒不敢言。"},{"type":"paragraph","text":"解放后，在您的英明领导下，我们劳动人民站起来了，当了主人翁，人民政府处处地方为我们工人住宅区打算，解放前是泥泞崎岖的羊肠小道，现在修筑的广阔平滑；解放前我们只吃些臭浜水，现在有自来水吃了；解放前我们没有电灯，现在家家大放光明，这一切事实，教育着每个人民，激发了爱国热忱；在买公债、反轰炸、和平签名捐献寒衣……等等爱国运动中，都起了不少作用有着一定的成绩。"},{"type":"paragraph","text":"我们自动地要求政府征收我们的房捐和地产税，在大张旗鼓镇压反革命的高潮下，本弄居民先后检举五个反革命分子，举行了十六次的小型控诉会，激发群众对匪特的仇恨，誓以实际行动进一步协助人民政府肃清一切反革命分子，保卫我们幸福美好的生活。值此上海解放二周年，我们向您表示衷心的感谢。(通讯员王建平)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5532b0626"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
