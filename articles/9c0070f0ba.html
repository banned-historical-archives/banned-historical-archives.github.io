<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央文革中南组对武汉干部问题报告的批示","authors":[],"dates":[{"year":1967,"month":8}],"is_range_date":false,"parts":[{"text":"中央文革中南组对武汉干部问题报告的批示","type":"title"},{"text":"一、过去有三反言行，且性质比较严重，不算革命领导干部，但文化大革命中，站在毛主席革命路线一边，支持造反派，立场比较坚定，旗帜比较鲜明，积极揭发斗争走资派，造反派对他要进行帮助，主动结合。","type":"paragraph"},{"text":"二、有些干部在文化大革命初期，没有执行资产阶级反动路线，但在文化大革命逆流中干了不少坏事，只要他承认错误，敢于揭发，取得群众组织谅解，可以结合，但如果在七·二0后，仍然坚持反动立场，坚持打倒。","type":"paragraph"},{"text":"三、生活小节十分严重（生活、两性、其它），不属大节问题，不是文化大革命处理对象，文化大革命主要是政治路线，认大节。","type":"paragraph"},{"text":"四、反革命修正主义分子，经过群众斗争，交代彻底，态度诚恳，造反派要给出路。","type":"paragraph"},{"text":"五、动摇不定，看风使舵，那边势力大就靠那一边，不坚持原则，立场不坚定，要进行阶级立场教育，使之改正错误。","type":"paragraph"},{"text":"六、走资派和顽固家伙特别是反革命两面派，要坚持斗争，坚决打倒。","type":"paragraph"},{"text":"七、受蒙蔽群众，在中央表态后，采取积极态度，起来造反者，按“受蒙蔽无罪，反戈一击有功”办事，按十六条办事。","type":"paragraph"},{"text":"八、基层组织中受蒙蔽的群众起来造反者，只要不是杀人凶手，应允许自己教育自己。","type":"paragraph"},{"text":"九、杀人凶手、现行反革命分子要严办，要正确处理两类不同性质的矛盾。","type":"paragraph"},{"text":"十、基层干部中，一般头头，除极坏和顽固不化者外，应热情帮助，使他迅速回到毛主席革命路线上来。","type":"paragraph"},{"text":"十一、原文革成员，过去执行资产阶级反动路线，未受到批判，在文化大革命逆流中，是镇压群众运动的急先锋、打手，虽不是坏头头，也要按坏头头处理。","type":"paragraph"},{"text":"十二、人事保卫部门，被“百万雄师”操纵的，应该派人暂时接管，弄清后再作处理。","type":"paragraph"},{"text":"十三、对坏头头严惩的规定（不准公开，略）。","type":"paragraph"},{"text":"十四、对受蒙蔽参加武斗，围攻别人，死亡的家属，按中央规定处理，双方一样。","type":"paragraph"},{"text":"十五、基层组织坏头头，民愤不大，改邪归正，应给予出路，不按坏分子处理。","type":"paragraph"}],"comments":[],"origin":"根据台湾《中共研究》编辑部编《中共文化大革命重要文件汇编》，台北：1973年4月出版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c0070f0ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
