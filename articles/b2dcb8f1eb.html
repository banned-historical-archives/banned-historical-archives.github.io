"胡长林"],"dates":[{"year":1968,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"一天傍晚，我们新港路派出所来了一群小学生。一个飞虹路小学三年级学生陆伟荣手里拿着一只“菊花牌”手表，郑重其事地要求派出所协助找寻失主。"},{"type":"paragraph","text":"原来就在事情发生的十多分钟前，陆伟荣和其他同学到飞虹路去买东西，他的同学在地上发现了手表，十岁的陆伟荣说:“来!我们去交给派出所。”并对管理公用电话的阿姨说:“如果有人来找，就请他到派出所去领。”"},{"type":"paragraph","text":"大约隔了两小时，从杨浦区打来一只电话说:有个上运九场的工人经过飞虹路一带，不当心丢失了一只手表，要求查找。我们要失主到派出所来核对，果然就是他失落的那只手表。物归原主，这个运输工人十分高兴，连连地说:这真是毛泽东时代的好孩子。　新港路派出所　胡长林"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2dcb8f1eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
