tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席率领代表团回京","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 毛泽东主席率领中国代表团到苏联参加伟大的十月社会主义革命四十周年的庆祝典礼以后，从莫斯科乘喷气式专机在21日下午回到北京。"},{"type":"paragraph","text":"中国代表团团员宋庆龄、邓小平、李先念、乌兰夫、陆定一、陈伯达、杨尚昆、胡乔木等同机回到北京。代表团团员彭德怀、郭沫若和沈雁冰，分别率领中国军事友好防苏代表团、中国访苏科学技术代表团、中国文化代表团留在苏联继续进行访问。代表团团员赛福鼎将在日内从莫斯科回国。"},{"type":"paragraph","text":"苏联驻华大使尤金也同机回到北京。苏联谢巴科夫少将陪送中国代表团到北京。"},{"type":"paragraph","text":"到机场欢迎的有：朱德副主席、刘少奇委员长、周恩来总理和国家机关各部门、中共中央各部门、各民主党派、各人民团体的负责人和中国人民解放军的高级将领，以及机关、团体、工矿企业、学校和部队的代表数千人。苏联驻华大使馆官员和各国驻中国的使节也到机场欢迎。"},{"type":"paragraph","text":"毛主席和中国代表团团员在离开莫斯科时，苏联共产党中央委员会主席团曾在克里姆林宫举行了送别宴会；苏联党政领导人别利亚耶夫、勃列日涅夫、布尔加宁、米高扬、苏斯洛夫、福尔采娃、赫鲁晓夫、什维尔尼克、柯西金、别尔乌辛和目前在莫斯科的越南民主共和国主席、越南劳动党主席胡志明，蒙古人民革命党中央委员会第一书记达姆巴，蒙古人民共和国部长会议主席泽登巴尔，都到机场欢送。苏联党和政府还派了苏共中央主席团候补委员、苏共中央书记波斯伯洛夫，苏联外交部副部长扎哈罗夫，马里宁大将等陪送代表团去伊尔库次克。"},{"type":"paragraph","text":"毛主席在离开苏联国境的时候，曾打电报给赫鲁晓夫、伏罗希洛夫和布尔加宁同志表示感谢。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ad4f3c288"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
