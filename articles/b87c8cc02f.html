<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于向民盟人士说明我党土地政策给周恩来、董必武的指示","authors":[],"dates":[{"year":1946,"month":7,"day":19}],"is_range_date":false,"parts":[{"text":"中共中央关于向民盟人士说明我党土地政策给周恩来、董必武的指示","type":"title"},{"text":"中央正在研究和制定土地政策，关于征询各地意见的文件已发你处，对民盟人士，你们是否可向其作如下表示，请你们考虑。","type":"paragraph"},{"text":"（一）使他们了解解放区群众运动的历史过程，说明各地农民在抗战八年中，曾三次起来要求土地，我党均用了极大的说服解释工作，推延下去。自日本投降后，各解放区广大农民起来清算汉奸恶霸，自己动手解决土地问题，我党无法和不应阻止这种群众的正当要求。因此，只有实行孙中山先生的耕者有其田的主张和政治协商会议耕者有其田的决议，满足农民的土地要求，才能领导农民运动走入正轨，才能为国家民主化、工业化，造成巩固基础。","type":"paragraph"},{"text":"（二）向他们说明我党中央正在研究和制定土地政策，除敌伪大汉奸的土地及霸占土地与黑地外，对一般地主土地不采取没收办法，拟根据孙中山照价收买的精神，采取适当办法解决之，而且允许地主保留一定数额的土地。对抗战民主运动有功者，给以优待，保留比一般地主更多的土地。","type":"paragraph"},{"text":"（三）向他们解释几千年被压迫剥削的农民起来之后，在个别地区或有过火之处，仅仅是个别地区的个别现象，这是难免的。但根据最近苏北的统计，淮海区在减租反奸清算之后，全区现有地主一万一千零五十二户，共有土地一百三十四万二千九百五十亩，如平均计算，每户地主尚有一百二十一亩，如以每户八口人计算，地主每人平均有十五亩，等于中农每人土地的五倍。太行区最近反奸清算后的统计，地主每人平均有地十三亩七分，中农每人只三亩一分地，贫农每人只二亩一分地，地主每人平均所有的土地，等于中农四倍半，等于贫农六倍半，其他各区地主保留的土地等于中农的两倍至五倍。这些材料，证明解放区农民忍受了很大的损失，来照顾地主在土地改革后必须的生活，希望民盟人士对解放区农民土地改革运动，加以全面的具体的调查研究。","type":"paragraph"},{"text":"（四）我们很愿意和他们共同研究这一有关一万万几千万人民生活的重大问题，欢迎他们提供意见，必要时可以与他们开座谈会来研究这个问题。他们认为对抗战民主有功须特别照顾的具体人物，他们也可提出。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b87c8cc02f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
