s":[],"dates":[{"year":1981,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平向南共联盟代表团介绍我国形势"},{"type":"paragraph","text":"三中全会的路线方针政策见效了"},{"type":"paragraph","text":"强调一定要克服官僚主义，改革上层建筑；继续对青年人加强教育；反对资产阶级自由化倾向；进一步肃清左的影响"},{"type":"paragraph","text":"新华社北京11月11日电　中共中央副主席邓小平今天上午在这里会见了南斯拉夫共产主义者联盟中央主席团书记丘拉菲奇和由他率领的南共联盟代表团。"},{"type":"paragraph","text":"邓小平向南斯拉夫同志介绍了我国当前的政治经济形势。他说，目前，我国总的形势是好的。三年来，党的三中全会的路线、方针、政策见效了，特别是在农村更为明显，工业方面慢一点，但相信一两年内也会好起来。邓小平在谈到我们工作中存在的问题时，强调一定要克服官僚主义，改革上层建筑；继续对青年人加强教育；反对资产阶级自由化倾向；进一步肃清左的影响。他说，我们相信，只要这些问题解决了，我国就会更快地向前发展。"},{"type":"paragraph","text":"邓小平希望中南两党的关系进一步得到发展。"},{"type":"paragraph","text":"丘拉菲奇说，在这次访问中，我们同胡耀邦主席的会见和同李先念副主席的会谈，是很有意义的。我们南共联盟一直密切地注视着中国社会主义革命和建设的每一个发展进程。他还介绍了南斯拉夫的国内情况，并且希望南中友谊不断得到加强。"},{"type":"paragraph","text":"国务院副总理、中联部部长姬鹏飞，中联部副部长吴学谦、刘新权，参加了会见。"},{"type":"paragraph","text":"参加会见的还有南斯拉夫驻中国大使奥斯托依奇。"},{"type":"paragraph","text":"代表团是在访问上海和杭州以后，于昨天晚上乘专机返回北京的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"130b4750d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
