卢库同志说：“你们是毛泽东思想光辉照耀下的红卫兵”","authors":[],"dates":[{"year":1967,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚军事代表团参观大型泥塑《收租院》"},{"type":"paragraph","text":"首都红卫兵热烈欢迎阿尔巴尼亚战友"},{"type":"paragraph","text":"巴卢库同志说：“你们是毛泽东思想光辉照耀下的红卫兵”"},{"type":"paragraph","text":"新华社十八日讯　阿尔巴尼亚劳动党中央政治局委员、部长会议副主席兼国防部长贝基尔·巴卢库，阿尔巴尼亚劳动党中央委员、阿尔巴尼亚人民军政治部主任希托·恰科，以及由他们率领的阿尔巴尼亚军事代表团，今天上午参观了大型泥塑《收租院》，受到了前来参观的近万名红卫兵和革命群众的热烈欢迎。"},{"type":"paragraph","text":"参观以后，巴卢库同志在留言簿上写道：“今天我们参观的这个展览具有十分重大的阶级教育意义。”“中国贫苦农民，同工人阶级结成了同盟，在以毛泽东同志为首的中国共产党领导下，进行了伟大的人民革命。”“曾经领导农民进行革命，而今天英明地领导农民沿着争取巨大进步和伟大成就的道路前进的中国共产党和毛主席万岁！”"},{"type":"paragraph","text":"阿尔巴尼亚同志结束参观从展览室出来时，前来参观的近万名红卫兵和革命群众自动夹道热烈鼓掌，欢迎客人。一位女红卫兵对巴卢库同志说：“我们红卫兵和革命群众热烈欢迎阿尔巴尼亚同志来我国参观访问！”巴卢库同志回答说：“你们是毛泽东思想光辉照耀下的红卫兵，你们是真正的革命者，你们是毛泽东同志亲密战友林彪同志领导下的解放军的强大的后备军。红卫兵万岁！毛主席万岁！”红卫兵小将们和革命群众报以热烈的掌声，并高呼：“恩维尔·霍查同志万岁！”“中阿两国人民友好万岁！”红卫兵小将们为阿尔巴尼亚同志佩戴上了红卫兵袖章，并向客人赠送了我们伟大领袖毛主席的照片和像章。"},{"type":"paragraph","text":"大家不断地欢呼：“毛泽东—恩维尔！”“恩维尔—毛泽东！”"},{"type":"paragraph","text":"今天，中共中央委员、国防部副部长王树声等陪同阿尔巴尼亚同志参观。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00ad0046ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
