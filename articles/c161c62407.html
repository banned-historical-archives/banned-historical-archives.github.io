authors":["宋丽珍"],"dates":[{"year":1994,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者宋丽珍)第一届“海上世界杯”全国乒乓球精英赛经过8个多小时的激战，昨晚在黄浦体育馆降下帷幕。由邓亚萍、乔红组成的国家一队以3比0击败由刘伟、乔云萍组成的国家二队荣获女子团体冠军；马文革以3比2力克刘国梁夺得男子单打冠军。"},{"type":"paragraph","text":"昨晚，争夺本届女子团体冠军战引人注目，双方势均力敌，旗鼓相当，在两盘单打中，邓亚萍和乔红分别以2比0战胜乔云萍和刘伟，在关键的双打中，邓亚萍和乔红以2比1险胜。男子单打冠亚军决战，前四局，刘国梁力求在前三板中取得主动，在第二、四局中占了上风；而马文革在前四局中打法凶狠，以前三板为主结合中近台的相持转换，在决胜局中，马文革坚持自己的打法，又连续打出反手弹打变线的好球，把比分拉开，以21比13告胜。"},{"type":"paragraph","text":"本届比赛获得女子团体第三名的是张琴、龚跃春组成的国家四队，第四名是唐薇依、何琳组成的“海上世界”一队。获得男子单打第三名的是孔令辉。"},{"type":"paragraph","text":"赛后，主办单位海上世界上海分公司总经理王根清对记者说，从比赛看，运动员劲头比较足，水平有上升的趋势，作为一个企业家，应给予扶持，但愿上海的乒乓球运动经过各方努力，能在第八届全运会上为上海人民争光。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c161c62407"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
