art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纳萨尔巴里重新燃起武装斗争火焰农民游击队的活动使地主和修正主义者一片恐慌","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 印度《解放》月刊一月号的一篇报道说，在毛泽东思想指引下，一九六七年首先在印度点燃起武装斗争星星之火的纳萨尔巴里地区革命农民，一九六九年又坚持了英勇的斗争。"},{"type":"paragraph","text":"报道说，英勇的农民游击队消灭一些恶霸地主和敌人的走狗，重新燃起了纳萨尔巴里地区农民斗争的火焰。去年六月，农民游击队消灭了潘西德瓦区的一名恶霸地主。十二月初又消灭了另外一名恶霸地主。农民游击队还消灭了一个在一九六七年纳萨尔巴里斗争中投敌的叛徒。他在投降后，为敌人干尽了种种反革命勾当。十二月五日，农民游击队又消灭了一名警察的走狗。自从纳萨尔巴里斗争开始以来，这个走狗和反动警察一起镇压农民，不断向警察告密，使许多革命者被逮捕。报道说，最近接连发生的两次游击行动已使地主和他们的走狗修正主义分子陷入一片恐慌之中。纳萨尔巴里农民武装斗争的火焰不仅燃烧在平原地区，而且已经扩展到大吉岭县的山区。去年十二月一日，一个游击小队袭击了一个残酷剥削茶园工人的茶园经理，大大鼓舞了茶园工人的斗志。"},{"type":"paragraph","text":"报道说，纳萨尔巴里在一九六七年点燃的农民武装斗争的星星之火在过去两年中已经迅速蔓延到印度各地。今天，越来越多的印度工人、农民和其他受压迫人民正在起来为粉碎千百年来剥削和压迫他们的枷锁而斗争。他们在印共（马列）的领导下，西到旁遮普，东到西孟加拉、阿萨姆和特里普拉，北到北方邦，南到马德拉斯的海滨和喀拉拉邦的一个又一个地区组织游击斗争。"},{"type":"paragraph","text":"报道最后说，战无不胜的毛泽东思想象永放光芒的红太阳，照亮了整个印度，照亮了印度人民解放的道路。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12df12a94e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
