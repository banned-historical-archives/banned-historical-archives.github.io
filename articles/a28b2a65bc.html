ors":["周恩来","毛泽东"],"dates":[{"year":1967,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"周恩来传达毛主席在军委扩大会议上的讲话","type":"title"},{"text":"周恩来毛泽东","type":"authors"},{"text":"（一）军队对文化大革命的态度，在运动开始时，是不介入的，但实际上已介入了。（如材料送到军队去保管，有的干部去军队。）在现在的形势下，两条路线的斗争非常尖锐的情况下，不能不介入，介入就必须支持左派。","type":"paragraph"},{"text":"（二）老干部到现在多数对文化大革命还不理解，多数靠吃老本。过去有功劳，要很好的在这次运动中锻炼改造自己。要立新功，立新劳。（这是毛主席引用了《战国策》上的“触碧说赵太君”），要坚定站在左派方面，不能合稀泥，坚决支持左派，然后在左派的接管和监督之下搞好工作。","type":"paragraph"},{"text":"（三）关于夺权。报纸上夺走资本主义道路当权派和坚持资产阶级反动路线顽固分子的权，不是这样的能不能夺？现在看来不能仔细分，应夺来再说，不能形而上学。否则受限制，夺来后是什么性质的当权派，在运动后期再判断。夺权后报国务院同意。","type":"paragraph"},{"text":"（四）夺权后的老干部和新夺权的干部，共同搞好业务，保守国家机密。","type":"paragraph"},{"text":" 摘自《新北内红色造反联络总部》稿","type":"paragraph"}],"comments":[],"origin":"1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（1）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a28b2a65bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
