al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"和邹春培先生应对联（之一）","alias":"","parts":[{"type":"paragraph","text":"和邹春培先生应对联（之一）[1]"},{"type":"paragraph","text":"（1902年）濯足；（邹春培）"},{"type":"paragraph","text":"修身。（毛泽东)"},{"type":"paragraph","text":"[1]这是毛泽东和私塾先生的应对联。1902年春，毛泽东从唐家外祖父家回韶山，入南岸私塾读书，启蒙老师是邹春培。一天，邹春培先生因事外出，嘱学生背书。但是，先生回馆一看，却见毛泽东和几个孩子在塘中戏水。先生好生气恼，把毛泽东和几个孩子叫到跟前，指着他们的泥巴脚丫子，念出上联要他们对，对得好，可免于打板子，毛泽东灵机一动，脱口对出了下联。先生听了，不禁暗暗点头赞叹。邹春培，1902年春至1904年秋，毛泽东在韶山南岸私塾读书时的老师。"},{"type":"paragraph","text":"少年毛泽东的卧室。毛泽东常在晚上把门窗遮起来念书，不让父亲看到灯光。1903"},{"type":"paragraph","text":"树宗氏毛韶山毛氏宗祠。"}],"authors":["毛泽东"],"dates":[{"year":1902}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":67,"page_end":70},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbed9af59e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
