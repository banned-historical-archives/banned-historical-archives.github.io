:["谢富治"],"dates":[{"year":1967,"month":2,"day":6}],"is_range_date":false,"parts":[{"text":"谢富治接见北京红卫兵代表的谈话","type":"title"},{"text":"谢富治","type":"authors"},{"text":"〖被接见者：北京红卫兵三个司令部代表及其他人员〗","type":"appellation"},{"text":"一、支持成立首都革命造反红卫兵代表大会，但这个名词不太好，建议换一下。","type":"paragraph"},{"text":"二、赞成一个学校派一个组织。暂时不收中学生。在中学生中，目前左派队伍还比较混乱。","type":"paragraph"},{"text":"三、建议学生帮助首都三个工人造反组织进行整顿，并联合起来。","type":"paragraph"},{"text":"四、目前学生组织中你吞并我，我吞并你是不对的，应该联合，左派之间发生了很多矛盾，出现了武斗现象，这是不符合主席的坚持文斗，不要武斗。如发生了类似现象，应遵守以下三条：","type":"paragraph"},{"text":"第一，不能打架，","type":"paragraph"},{"text":"第二，不能撒传单，贴大字报，","type":"paragraph"},{"text":"第三，不要开动宣传车互相攻击，有缺点和错误应在内部讨论。","type":"paragraph"}],"comments":[],"origin":"1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（2）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fc9c82cbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
