script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决支持朝鲜人民反对美国侵略的正义斗争  我各地庆祝朝鲜祖国解放战争胜利十周年  谴责现代修正主义者屈从美帝国主义意志拿革命原则作交易","authors":[],"dates":[{"year":1963,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决支持朝鲜人民反对美国侵略的正义斗争"},{"type":"paragraph","text":"我各地庆祝朝鲜祖国解放战争胜利十周年"},{"type":"paragraph","text":"谴责现代修正主义者屈从美帝国主义意志拿革命原则作交易"},{"type":"paragraph","text":"据新华社沈阳二十七日电  沈阳市各界两千多人今天集会，热烈庆祝朝鲜祖国解放战争胜利十周年。"},{"type":"paragraph","text":"辽宁省和沈阳市党、政府和军队负责人黄火青、宁武、车向忱、陈先舟、张正德、焦若愚、宋光、曾思玉中将和中朝友好协会辽宁省分会副会长金直夫等出席了大会。"},{"type":"paragraph","text":"中共沈阳市委书记处书记、中国人民保卫世界和平委员会沈阳市分会主席朱维仁在会上讲话。"},{"type":"paragraph","text":"朱维仁说，朝鲜解放战争的胜利雄辩地证明了，真正强大的是各国革命人民的新生力量，而不是帝国主义和各国反动派的腐朽力量，只要人民团结起来，敢于进行针锋相对的斗争，一切帝国主义都是可以打败的。"},{"type":"paragraph","text":"朱维仁热情赞颂了中朝两国人民用鲜血凝成的伟大的战斗友谊后说，我们沈阳市人民和全国人民一样，坚决支持朝鲜人民统一祖国的正义斗争，坚决支持南朝鲜人民反对美帝国主义及其走狗的斗争，坚决主张美国侵略者撤出南朝鲜。"},{"type":"paragraph","text":"朱维仁讲话后，全场一致通过了给朝鲜人民的支持电。"},{"type":"paragraph","text":"出席今天大会的还有各民主党派辽宁省和沈阳市地方组织和各人民团体的负责人。在沈阳的朝鲜客人也出席了大会。"},{"type":"paragraph","text":"据新华社安东二十七日电  同朝鲜隔江相望的安东市各界一千五百多人今晚集会，热烈庆祝朝鲜祖国解放战争胜利十周年。"},{"type":"paragraph","text":"中朝友好协会安东分会副会长、安东市副市长吴斌在会上讲了话。"},{"type":"paragraph","text":"大会最后通过了给朝鲜人民的支持电。"},{"type":"paragraph","text":"中共安东市委书记王鹤等参加了大会。在安东的朝鲜友人也参加了大会。"},{"type":"paragraph","text":"据新华社广州二十九日电  广东省和广州市各界五千人二十八日晚上集会，热烈庆祝朝鲜祖国解放战争胜利十周年。"},{"type":"paragraph","text":"广东省和广州市党、政府和军队负责人陈郁、赵紫阳、王德、温玉成中将、林锵云、李嘉人、曾生、郭棣活、许崇清、杜祯祥、杨辉图少将，省、市政协负责人张?村、陈秋安和各民主党派地方组织、各人民团体的负责人，前中国人民志愿军战斗英雄等出席了大会。朝鲜友人韩荣日和越南、波兰驻广州领事人员以及在广州的其他国家朋友也应邀出席了大会。"},{"type":"paragraph","text":"广东省副省长、中国人民保卫世界和平委员会广东省分会副主席李嘉人在会上讲话说，美帝国主义侵略者的凶狠面目，全世界革命人民现在都看得十分清楚。但是现代修正主义者屈从美帝国主义的意志，拿革命的原则同敌人作交易，坚持贯彻反对反帝、保护美帝国主义的路线，反对革命、向帝国主义投降的路线。"},{"type":"paragraph","text":"大会最后通过了给朝鲜人民的支持电。"},{"type":"paragraph","text":"据新华社西安二十七日电  西安各界两千人今天下午集会，庆祝朝鲜解放战争胜利十周年。"},{"type":"paragraph","text":"出席大会的有陕西省和西安市党、政府和军队负责人李启明、章泽、刘庚、方升普少将、江波少将以及省市政协、各民主党派地方组织和各人民团体负责人。"},{"type":"paragraph","text":"中共陕西省委书记处书记、中国人民保卫世界和平委员会陕西分会主席章泽在会上讲话。他说，美帝国主义的侵略本性是不会改变的，它至今还赖在南朝鲜不走，顽固地阻挠朝鲜的和平统一，而且公然违反停战协定，把大量的新式武器运进南朝鲜，准备发动新的战争。现代修正主义者却颠倒黑白，混淆敌友，硬说肯尼迪之流是“明智”的和为和平“操心”，拿革命原则同敌人交易，为帝国主义的核讹诈政策效劳。现代修正主义者的无耻行径是我们所坚决反对的。"},{"type":"paragraph","text":"大会最后一致通过了致朝鲜人民的支持电。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f74c14a1bc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
