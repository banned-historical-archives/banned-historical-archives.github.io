script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本各地进步学生展开猛烈斗争  东京大学进步学生再度冲进校园示威决心把斗争进行到底京都大学等校进步学生坚决反击日共修正主义分子的挑衅","authors":[],"dates":[{"year":1969,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本各地进步学生展开猛烈斗争"},{"type":"paragraph","text":"东京大学进步学生再度冲进校园示威决心把斗争进行到底京都大学等校进步学生坚决反击日共修正主义分子的挑衅"},{"type":"paragraph","text":"据新华社二十三日讯　据东方通讯社报道：日本东京大学进步学生不顾佐藤反动政府的残暴镇压，仍然继续坚持斗争。在东京大学进步学生英勇斗争的鼓舞下，日本各地大学生也向佐藤反动政府展开了猛烈的斗争。"},{"type":"paragraph","text":"东京大学进步学生五百多人，二十二日上午在校园内示威游行，继续坚持斗争。"},{"type":"paragraph","text":"东京大学进步学生的英勇斗争极大地鼓舞了日本各地大学生的斗志，他们同东京大学进步学生团结起来，正在向佐藤政府发动更加猛烈的进攻。"},{"type":"paragraph","text":"京都、大坂、神户的许多大学的进步学生四百多人，二十一日下午在京都大学大门前举行大会，支援京都大学学生反对反动的资本主义教育制度的斗争。从东京赶来的东京大学和日本大学的进步学生代表和京都、大坂的工人代表也参加了大会。"},{"type":"paragraph","text":"京都大学反动当局对学生的斗争怕得要死，预先关闭了学校大门，阻止进步学生进入大学校园。这时，日共修正主义分子同大学反动当局勾结起来，用石头和木棍袭击了进步学生。进步学生也用石头和棍子进行还击，同他们进行了激烈的搏斗。二十一日，京都大学学生们坚持着斗争。一部分进步学生在大楼的窗口上悬挂伟大领袖毛主席的画像。"},{"type":"paragraph","text":"大坂外国语大学的进步学生，二十日奋起斗争，占领了一座大楼，并在大楼屋顶上升起了巨幅红旗，上面写着“毛泽东思想万岁”。二十一日上午，学校当局同日修分子勾结，对进步学生占领的大楼发动突然袭击，但是被进步学生击退了。"},{"type":"paragraph","text":"大坂的关西大学的进步学生二十一日下午奋起斗争，占领了社会学系大楼，参加了全国进步学生的斗争行列。另外，北海道大学和静冈大学的进步学生二十一日也展开了斗争。"},{"type":"paragraph","text":"目前日本全国各地有六十七所大学的进步学生同反动当局进行着英勇的斗争。"},{"type":"paragraph","text":"据新华社二十三日讯　东京消息：日本东京大学几百名进步学生二十二日下午冲进东京大学校园，举行誓师大会，强烈抗议佐藤反动政府疯狂镇压学生，并且表示决心要把他们的正义斗争进行到底。"},{"type":"paragraph","text":"佐藤政府的反动警察最近撤出东京大学以后，反动学校当局派人把守着校门。但是进步学生胜利突破了入门的障碍，在安田讲堂前面的广场上举行誓师大会。同时，一些进步学生冲进了安田讲堂，在屋顶上升起了一面红旗。进步学生在校园内还举行了示威游行。他们高呼战斗的口号。当示威游行快要结束时，日共宫本修正主义集团指使它的娄罗向游行队伍挑衅，遭到进步学生的迎头痛击。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acc1490629"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
