<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5392","name":"中央人民政府最高人民检察署关于处理战犯、汉奸、官僚资本家及反革命分子财产的初步意见","author":"中央人民政府最高人民检察署","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央人民政府最高人民检察署关于处理战犯、汉奸、官僚资本家及反革命分子财产的初步意见","dates":[{"year":1952,"month":10,"day":18}],"is_range_date":false,"authors":["中央人民政府最高人民检察署"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 181-182","tags":[{"name":"财产","type":"主题/事件"},{"name":"反革命","type":"主题/事件"},{"name":"汉奸","type":"主题/事件"},{"name":"没收","type":"主题/事件"},{"name":"战犯","type":"主题/事件"},{"name":"资本家","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"中央人民政府最高人民检察署"},{"type":"title","text":"关于处理战犯、汉奸、官僚资本家及反革命分子财产的初步意见"},{"type":"subtitle","text":"（一九五二年十月十八日）"},{"type":"paragraph","text":"根据政务院“关于没收战犯、汉奸、官僚资本家及反革命分子财产的指示”，拟订“关于处理战犯、汉奸、官僚资本家及反革命分子财产的初步意见”如下，作为政府内部处理案件之参考。"},{"type":"paragraph","text":"一、由于台湾尚未解放，战犯处理尚未确定，对战犯（指一九四八年新华社公布的名单，但其中以后起义反正者除外）财产的处理，一般以采取代管形式为原则。但对于始终坚决与人民为敌的少数首要战犯的财产，报经政务院认定者，则应予以没收。"},{"type":"paragraph","text":"二、对于以蒋、宋、孔、陈四大家族为首的官僚资本，应依照共同纲领第三条内“没收官僚资本归人民的国家所有”之规定一律予以没收。但对于过去虽属官僚资本系统，而其目前情况尚未查明或未确定者，可暂予代管。官僚资本没收的审核批准程序，应依照一九五一年二月四日政务院关于没收战犯、汉奸、官僚资本家及反革命分子财产的指示办理。"},{"type":"paragraph","text":"三、对于业经人民政府处理之战犯财产或官僚资本案件，如有与上述处理意见不同者，一般不予变更，但过去如误将民族资本当成战犯或官僚资本处理者，则应重新处理。"},{"type":"paragraph","text":"四、对于曾任国民党反动政府高级伪职人员的财产，除其中过去有重大反革命罪恶或目前仍继续反动活动者，其财产应依照一九五一年六月二十二日政务院关于没收反革命罪犯财产的规定办理外，一般不宜处理。"},{"type":"paragraph","text":"五、对于反革命分子财产的处理，依一九五一年六月二十二日政务院关于没收反革命罪犯财产的规定办理。"},{"type":"paragraph","text":"六、对于汉奸财产的处理，依一九五一年六月十四日政务院对中南军政委员会批复办理。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02f31360b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
