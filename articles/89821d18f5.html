rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈响应伟大领袖毛主席的伟大号召 最坚决地支持和援助无产阶级革命派","authors":[],"parts":[{"type":"paragraph","text":"在无产阶级文化大革命进入夺权斗争的关键时刻，我们的伟大统帅毛主席发出战斗号召：人民解放军应该积极支持左派广大群众。全军指战员最坚决地拥护，最热烈地响应。山西省军区部队和驻山西部队，在山西省无产阶级革命派夺权以后，隆重举行武装游行示威，坚决支持无产阶级革命派。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"一月二十五日，贵州省无产阶级革命派大联合，从省、市委内一小撮走资本主义道路的当权派手中，胜利地夺取了党、政、财、文大权。贵州省军区部队，遵照毛主席的指示，最坚决地支持和援助了贵州省无产阶级革命派的夺权斗争。看！这是贵州省军区部队举行支持无产阶级革命派誓师大会的雄伟场面。"},{"type":"paragraph","text":"《新贵州报》、贵州省军区政治部供稿"},{"type":"paragraph","text":"在贵州省军区部队举行的支持无产阶级革命派誓师大会上，战士们举着红彤彤的《毛主席语录》振臂高呼：“保卫以毛主席为代表的无产阶级革命路线！”“坚决支持无产阶级革命派的夺权斗争！”"},{"type":"paragraph","text":"《新贵州报》、贵州省军区政治部供稿"},{"type":"paragraph","text":"青岛市无产阶级革命造反派夺回青岛市委、市人委的一切权力以后，那些被夺了权的家伙，联合社会上的牛鬼蛇神，千方百计地破坏革命造反派的喉舌——《青岛日报》。驻军某部响应毛主席的伟大号召，坚决站在无产阶级革命派一边，对遭受围攻的《青岛日报》加以保护。"},{"type":"paragraph","text":"范梦绵摄"},{"type":"paragraph","text":"驻上海某部机关工作人员，坚决支持革命农民运动。他们满怀着无产阶级的革命情谊，把革命宝书《毛主席语录》赠送给郊区革命农民。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"海军东海舰队某部响应毛主席的伟大号召，以实际行动支援无产阶级革命派。他们派出一百多名战士来到上海第五装卸区的码头上，帮助革命工人搬运物资。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"《解放军报》发表《人民解放军坚决支持无产阶级革命派》的社论以后，空军某部飞行员立即认真学习讨论。他们一致表示最热烈地响应毛主席的伟大号召，最坚决地支持和援助无产阶级革命派，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"name":"贵州文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89821d18f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
