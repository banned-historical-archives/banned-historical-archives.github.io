ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"关于西安事变和平解决后在中央政治局会议上的发言","alias":"","parts":[{"type":"paragraph","text":"关于西安事变和平解决后在中央政治局会议上的发言"},{"type":"paragraph","text":"（1937年2月11日）"},{"type":"paragraph","text":"对西安事变我们过去估计前途有两方面是对的。对国民党的估计也是对的，我们这种估计是从去年九月开始的，西安事变后能采取和平解决的方针，是因为我们的总方针正确。我们过去最大部分的工作是用在西北，现在西安事变和平解决，对全国工作的布置更为需要，全国工作摆在我们面前。关于和平是否确实的问题，我们应当认识，和平的可能性大，但也有打起来的可能，我们要准备自卫战。不过主要应采取巩固和平的政策，应向着联合全国抗日的方向努力。我们的通电是大的让步，是带原则性的让步，是对工人农民以外的小资产阶级等的让步。这是为着一个大的问题，就是为着现阶段的革命，为着抗日。对于土地问题，在大阶段来说是不放松的，但在目前阶段上是应停止没收土地的。苏维埃过去十年斗争是对的，现在改变也是对的，应从理论上说清楚这个问题。形式上虽然改变，然在实质上没有多大的改变。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":2,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27a3bd4c06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
