script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"亚非拉乒乓球友好邀请赛男女团体赛第三阶段比赛开始","authors":[],"dates":[{"year":1973,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亚非拉乒乓球友好邀请赛男女团体赛第三阶段比赛开始"},{"type":"paragraph","text":"越南民主共和国国会常务委员会副主席黄文欢观看比赛"},{"type":"paragraph","text":"李富春、邓小平、徐向前、聂荣臻、李井泉、阿沛·阿旺晋美、陶鲁笳、江华、江渭清、王猛、于步血、庄则栋、林慧卿等观看比赛"},{"type":"paragraph","text":"新华社一九七三年八月二十九日讯　亚非拉乒乓球友好邀请赛男、女团体第二阶段的比赛，今天上午结束。从下午开始第三阶段的比赛，以决定男、女团体第一到第十六名的名次。"},{"type":"paragraph","text":"越南民主共和国国会常务委员会副主席黄文欢，观看了今晚的比赛。"},{"type":"paragraph","text":"李富春、邓小平、徐向前、聂荣臻、李井泉、阿沛·阿旺晋美、陶鲁笳、江华、江渭清、王猛、于步血、庄则栋、林慧卿等，同首都群众一万八千多人一起，观看了今晚的比赛。"},{"type":"paragraph","text":"经过第二阶段的比赛，日本、朝鲜民主主义人民共和国、中国、越南民主共和国的男子队和中国、日本、朝鲜民主主义人民共和国、印度的女子队，分别进入了前四名。"},{"type":"paragraph","text":"在今天下午决定男、女团体一至四名名次的比赛中，引人注目的是朝鲜民主主义人民共和国女队以三比二战胜了日本女队。今天，朝鲜女队出场的是三名直拍快攻型选手：朴英顺、朴英玉和金昌爱。日本女子队应战的是两名横拍防守型选手滨田美穗和横田幸子。朝鲜女队采用了拉弧圈球结合大力扣杀的打法，日本女队以韧性的削球为主，守中有攻。观众们对双方的精彩球艺不断报以热烈掌声。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国男子队和越南民主共和国男子队今晚进行了一场精彩激烈的比赛。双方运动员都积极主动，生气勃勃，打出了水平，受到观众的热烈赞扬。最后，朝鲜队以五比二获胜。"},{"type":"paragraph","text":"中国男、女乒乓球队今天晚上同日本男队和朝鲜女队的对阵，是两场比速度、比力量的对攻战，双方短兵相接的快速抽杀和推挡，使场上不断出现精彩的激战场面。最后，中国男、女队分别以五比○和三比一获胜。"},{"type":"paragraph","text":"在第三阶段比赛中，男子组第五到第八名将由香港、菲律宾、印度、尼日利亚四队决出；第九到第十二名将由柬埔寨、泰国、越南南方共和、埃及四队决出；第十三到第十六名将由伊朗、智利、加纳和秘鲁四队决出；女子组第五到第八名将由缅甸、特立尼达和多巴哥、马来西亚、越南民主共和国四队决出；第九到第十二名将由菲律宾、埃及、尼日利亚、智利四队决出；第十三到第十六名将由塞浦路斯、哥伦比亚、秘鲁和越南南方共和四队决出。"},{"type":"paragraph","text":"今天上午，许多未进入前十六名的队，也在友好热烈的气氛中，继续进行了比赛。阿尔及利亚男队在第一阶段比赛中虽然只胜一场，但是他们在第二阶段比赛中仍然精神饱满，打得很认真，虚心向各国朋友学习，受到了观众的称赞。库拉索男队同新加坡男队的比赛结束后，库拉索选手罗伯特·霍塞热情地把新加坡小选手叶进文举起来，叶进文也把一枚纪念章戴在霍塞的胸前。霍塞高兴地说：通过比赛，我们增进了友谊。"},{"type":"paragraph","text":"男、女团体第三阶段比赛将于三十日晚间结束，届时将排出男、女团体一至十六名的名次。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李富春","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"陶鲁笳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2fc38ca80"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
