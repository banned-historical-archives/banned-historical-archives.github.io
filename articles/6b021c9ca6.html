训传》","authors":["人民日报讯"],"dates":[{"year":1951,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"中共上海市委会指示认真讨论电影《武训传》","type":"title"},{"text":"人民日报讯","type":"authors"},{"text":"【人民日报上海二十三日专电】中国共产党上海市委员会，于二十三日发布指示，要求各级党的组织，特别是文化教育部门内党的组织，展开对电影《武训传》的讨论，认真学习人民日报二十日《应当重视电影〈武训传〉的讨论》的社论，及《共产党员应当参加关于〈武训传〉的批判》的文章。","type":"paragraph"},{"text":"上海市文化界对于电影《武训传》的讨论与批评已经开始，解放日报发表了电影《武训传》的编者孙瑜的检讨，题为《我对〈武训传〉所犯错误的初步认识》。作者认为犯错误的主要原因，在于为武训表面、局部的一些“感动”人的行为所迷惑，忽略了他反动的本质。上海大公报于二十二日以“展开〈武训传〉的讨论》为题，发表社论，检讨了该报发表的有关《武训传》的一些影评中，盲目颂扬武训的错误，上海大众电影杂志编委会也发表了自我批评的文字。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1951年5月23日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b021c9ca6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
