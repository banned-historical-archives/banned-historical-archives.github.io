","authors":[],"dates":[{"year":1950,"month":12,"day":8}],"is_range_date":false,"parts":[{"text":"中共中央关于南京人民反美运动的指示","type":"title"},{"text":"南京市委并华东局及各中央局、分局转各大市委：","type":"appellation"},{"text":"南京人民反美运动继续深入发展，是好的和必要的。但须切实注意阻止特务分子故意提出“左”的口号去制造事件，以致陷我于被动。对于提出过左口号及要求枪毙美国人的人，须在群众中批评其错误并对其提出警告，要群众不要上特务的当。但你们在运动中不要怕美帝停发学校经费，也不要怕外籍教师全部辞职，如有外籍教师因此辞职者应一律批准，并令其迅速离开中国。如有停发经费者，应即由政府接收学校，继续办理。","type":"paragraph"},{"text":" 中 央十二月八日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef98bb3743"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
