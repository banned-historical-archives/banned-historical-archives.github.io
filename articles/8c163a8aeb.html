58,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"5月号“江海学刊”刊载了李仲融的“现代修正主义及其根源”一文，揭发现代修正主义者“伪装着马克思主义者的姿态，恶毒地对马克思列宁主义的伟大学说进行‘批评’和诽谤，来麻痹无产阶级的革命斗志，使无产阶级迷失革命的方向，企图这样地从内部破坏社会主义运动，瓦解社会主义国家和政党”。"},{"type":"paragraph","text":"文章分析了现代修正主义思想主要有这几方面:①他们把国家垄断资本主义的形成，描绘成为社会主义，来否定马克思列宁主义关于资本主义必然崩溃的理论，来否定无产阶级革命的理论。②他们高谈所谓“纯粹的民主”、“超阶级的民主”，实际上只是一种欺骗，借此反对无产阶级专政，反对社会主义的民主集中。③他们反对党的铁的纪律，主张在党内有组织宗派和集团的权利，要求知识分子在党内占有特殊的地位。④他们把苏共第二十次代表大会所提出的各个国家按各自的具体历史、社会和经济条件及其特点向社会主义过渡这一论点曲解为放弃阶级斗争和放弃无产阶级专政，极力鼓吹资产阶级民族主义的反动思想，反对无产阶级的国际主义。"},{"type":"paragraph","text":"现代修正主义者产生的根源，除了在于他们本身出身于剥削阶级或小资产阶级以外，还有他们思想认识的根源，在于他们“否认马克思辩证法或不善于把这种辩证法用来解释现阶段历史发展、工人运动和共产主义运动发展的复杂过程”(康斯坦丁诺夫同志语)。换句话说，现代修正主义是资产阶级意识形态的表现，它的世界观的基础是个人主义。因此，我们在反对现代修正主义的时候，应该进行自我检查，看看自己的思想深处的资产阶级个人主义思想是否已经肃清。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c163a8aeb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
