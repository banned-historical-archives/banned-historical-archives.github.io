rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在机场上天天学毛主席语录","authors":["试航"],"parts":[{"type":"paragraph","text":"本报讯 空军某航校机务二中队，坚持天天学习毛主席语录，用毛泽东思想指导工作。"},{"type":"paragraph","text":"机场上工作比较紧张，学习时间较少。他们根据每天任务情况和可能产生的问题，事先选择一些毛主席著作中的有关语录，让大家抄在本子上带到机场上去学。大家利用休息时间，读毛主席的语录，看看毛主席是怎样讲的，自己是不是按照毛主席的指示做的。大家反映：这样既提高了思想，又解决了工作中的问题。如三九二号机组有个时期工作多，产生了急躁情绪，机械师顾天泰学习了毛主席语录这样一段话：“打仗只能一仗一仗地打，敌人只能一部分一部分地消灭。……就是吃饭也是如此。……是一口口地吃的，你不可能把一桌酒席一口吞下去。”认识到越急躁越干不好，于是把要做的工作列出一个清单，分工去干，有条不紊，干得又快又好。 （试航）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4347d112ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
