ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"华野五个纵队渡运河后的作战任务","alias":"","parts":[{"type":"paragraph","text":"华野五个纵队渡运河后的作战任务！"},{"type":"paragraph","text":"（1947年8月5日）刘、邓，并告陈、粟、谭："},{"type":"paragraph","text":"待陈唐、叶陶?五个纵队渡过运河后，请令该五纵以有力部队沿运河西岸择要筑工固守，制止敌邱欧西渡；主力集结城地区休整，并在郓城地区构筑防御工事，保证北岸接济。该五纵至少须有两星期安全休整，并待粟裕到来方能举行机动作战。在局面没有大开展时期内，该五纵主要任务是直接钳制邱欧，即借以间接钳制陇海线上及其以北之敌，而不是直接钳制陇海及其以北之敌。只要该五纵能于你们出动以前，制止邱欧西渡，又于你们出动后，能在鄄地区立住脚跟，不被邱欧切断后路，则不但邱欧不敢使用于"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]陈、粟、谭，指陈毅、粟裕、谭震林，当时分别任华东野战军司令员兼政治委员、副司令员和副政治委员。"},{"type":"paragraph","text":"[3]陈唐，指陈士、唐亮，当时分别任华东野战军参谋长和政治部主任。叶陶，指叶飞、陶勇，当时分别任华东野战军第一纵队司令员和第四纵队司令员。"},{"type":"paragraph","text":"[4]邱，指邱清泉，当时任国民党军整编第五师（原第五军）师长。欧，指欧震，当时任国民党军陆军总司令部徐州司令部第三兵团司令官。"},{"type":"paragraph","text":"[5]鄄，指山东鄄城和郓城。进攻你们方面，即金乡、菏泽等地之敌亦将不敢轻动。你们意见如何，盼告。"},{"type":"paragraph","text":"军委微午"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":178,"page_end":179},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"773cdb711d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
