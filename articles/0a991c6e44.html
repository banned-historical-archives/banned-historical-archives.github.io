<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持以阶级斗争为纲战天斗地  北京郊区广大干部和社员加强大秋作物田间管理","authors":[],"dates":[{"year":1976,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持以阶级斗争为纲战天斗地"},{"type":"paragraph","text":"北京郊区广大干部和社员加强大秋作物田间管理"},{"type":"paragraph","text":"新华社一九七六年八月十八日讯　北京郊区广大干部、群众在抗震救灾斗争中，坚持以阶级斗争为纲，以批邓为动力，抓革命、促生产，积极加强秋收作物的后期田间管理，努力夺取全年农业丰收，生产更多的粮食和农副产品，支援社会主义建设。现在，郊区批邓、反击右倾翻案风的斗争轰轰烈烈，战天斗地的场面热气腾腾，秋田作物普遍长势喜人。"},{"type":"paragraph","text":"唐山、丰南地区强烈地震波及北京，也给京郊一些社队带来了不同程度的灾害。郊区各级党组织总结两个阶级、两条路线斗争的历史经验，清楚地看到，阶级敌人和党内资产阶级往往利用自然灾害进行破坏活动和复辟活动。大家认为，要夺取抗震斗争的胜利，必须坚持以阶级斗争为纲，深入批判邓小平反革命的修正主义路线。不少社队在抗震斗争的紧张时刻，坚持学习，深入批邓，把批邓同抗震救灾、开展农业学大寨运动紧密结合起来。通县县委最近先后三次召开公社党委书记会议，集中研究在抗震斗争中如何坚持认真学习、深入批邓的问题，并在全县开展了学习毛主席一系列重要指示、学习中共中央慰问电、学习大寨的根本经验，批判邓小平“三项指示为纲”的修正主义路线，批判反动的天命观，批判阶级敌人的破坏活动，使全县人民进一步树立了人定胜天的思想，大大推动了全县抗震和各项工作的开展。这个县西集公社党委在抗震救灾中，组织群众学习毛主席关于“只有社会主义能够救中国”的教导，发动老贫农回忆旧社会遭灾家破人亡，妻离子散，背井离乡的悲惨情景，看今日受灾，毛主席、党中央的亲切关怀，一方受灾，八方支援的动人情景。广大社员群众激动地说，千好万好不如社会主义好，河深海深不如毛主席的恩情深。公社党委还召开群英大会，总结表彰广大群众和干部抗震救灾的英雄事迹，并用广大群众公而忘私，舍己救人的大量事实批判邓小平的修正主义路线，批判他散布什么调动人民群众的革命积极性要靠“物质刺激”等反动谬论，进一步激发了广大干部和群众的革命精神。"},{"type":"paragraph","text":"在抗震救灾过程中，郊区各级党组织带领广大干部和群众学习毛主席关于自力更生、艰苦奋斗的教导，发扬大寨贫下中农人定胜天的英雄气概，坚定不移地依靠集体经济的力量，自力更生，奋发图强，发展生产，重建家园，一些受灾较重的社队主动提出，个人能解决的问题不向集体伸手，生产队能解决的问题不向大队伸手，大队能解决的问题不向国家伸手。平谷县门楼庄公社普贤屯大队灾情比较严重。地震后，大队党支部针对少数人向上伸手的思想苗头，组织干部学习大寨贫下中农自力更生、艰苦奋斗战胜自然灾害的英雄事迹，批判邓小平歪曲大寨根本经验的罪行，并以“是伸手向上无所作为，还是自力更生，人定胜天”为题，开展大讨论，进一步坚定了干部、群众自力更生、重建家园的信心。在余震未停的情况下，他们就组织大批劳力，加强秋田后期管理，努力夺取全年农业丰收。房山县岳各庄公社五侯大队广大贫下中农在遭灾以后，仍然响亮地提出秋田管理的措施不变；全年粮食亩产过“长江”的计划不变；改变面貌，早日建成大寨式的社会主义新农村的决心不变的战斗口号。社员们正在为了实现这个目标战斗不息。"},{"type":"paragraph","text":"目前，正值加强秋田后期管理、夺取全年农业丰收的关键时候，郊区广大贫下中农和社员发扬地大震，人大干，夺取丰收不靠天的革命精神，全力以赴投入夺取全年农业丰收的战斗。大兴县采育公社虽然这次受灾较重，但是他们坚信人定胜天，不向困难屈服。地震发生以来，干部和社员早出工，晚收工，大搞秋田管理，对棉花普遍整枝打杈一遍，对三茬作物进行培土、施肥，力争三茬赶二茬。目前，全公社两万多亩秋田作物长势普遍好于往年。平谷县镇罗营公社上镇大队震前造了千亩桑坡，震后大队党支部一面组织群众抗震，一面发动群众继续上山造林，几天时间又造林五百亩，这个公社党委及时推广了上镇大队的经验，全公社有造林任务的十一个大队，八千多人上山，造林一千多亩，超额完成了全年造林任务。通县觅子店公社大庄大队遭灾以后，贫下中农的斗志更旺，干劲更足，这几天不仅中耕松土一千六百多亩，秋田管理一千二百多亩，还积肥二千八百多方，不仅为夺取今年农业丰收创造了条件，还为秋季种麦夺取明年夏粮丰收作了准备。（附图片）"},{"type":"paragraph","text":"北京市平谷县王辛庄公社社员，加强棉田管理，确保秋季棉花丰收。　本报记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a991c6e44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
