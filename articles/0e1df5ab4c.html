art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是世界人民的共同财富","authors":[],"parts":[{"type":"paragraph","text":"老挝《火炬报》二十日发表题为《中国核试验的成功是全世界被压迫人民的成功和胜利》的评论，热烈祝贺中国第三次核试验成功。"},{"type":"paragraph","text":"评论说，中国第三次核试验成功，“再一次证明毛泽东思想是真理”。六亿五千万中国人民在毛泽东思想指引下，团结一致，自力更生建设自己的国家，获得了全面的成就，成为世界的典范。"},{"type":"paragraph","text":"评论说，“毛泽东思想是世界人民共同的财富”，“中国核试验的成功是全世界被压迫人民的成功和胜利”。"},{"type":"paragraph","text":"评论说，“强大的中国，是世界爱好自由人民的最可靠的靠山。我们深深认识到，在拥有核武器的国家中，只有中华人民共和国是真正保卫世界和平的。”因此，中国第三次核试验成功，“给正在反对美帝国主义侵略的世界各国人民以巨大鼓舞”。"},{"type":"paragraph","text":"老挝《青年报》十四日发表社论说：“中国成功地进行含有热核材料的核爆炸，使全世界爱好和平的人民特别是三百万老挝人民感到无比欢欣鼓舞，使美帝国主义及其仆从害怕得发抖，因为这是保卫世界和平的核武器，它彻底粉碎了美帝国主义的核垄断。”"},{"type":"paragraph","text":"社论说，这一成就“证明了以毛泽东为首的中国共产党的路线是非常正确的和英明的，并反映了中国人民获得解放以后，中国在各方面都非常强大。”"},{"type":"paragraph","text":"《青年报》的社论说，“这次中国核试验的成功，更加增强了亚非拉各国人民特别是印度支那人民反对美帝国主义和新老殖民主义斗争的决心。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e1df5ab4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
