策纪律教育的报告（概要）","authors":[],"dates":[{"year":1972,"month":7,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央、中央军委批转北京军区等单位关于对部队进行政策纪律教育的报告（概要）","type":"title"},{"text":"1972年7月27日，中共中央、中央军委批转北京军区、陆军六十六军、天津警备区3个单位党委的报告。同意北京军区提出的对部队进行政策纪律教育，坚决退还占用地方的房屋、土地、生产资料和纠正不正之风所采取的措施。中央在批示中指出：占用学校、医院和工矿企业的房屋、无偿占有地方的车辆和物资等情况，“不仅天津一地有，全国许多地方也有；不仅军队有，党政机关也有；这种不正之风，必须引起各级地方和部队党委的严重注意，并且采取坚决的措施予以克服”。截止1973年底，人民解放军坚决贯彻中央文件精神，认真清退“文化大革命”初期占有地方的房舍、土地和财物，已清退房舍705万多平方米、土地77万亩，退还机械车辆1.7万台及其物资16.9万多件。对损害的作了赔偿。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccc96faa5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
