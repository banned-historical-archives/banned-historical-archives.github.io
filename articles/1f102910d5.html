ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"粟裕休养暂缓来京","alias":"","parts":[{"type":"paragraph","text":"粟裕休养暂缓来京！！"},{"type":"paragraph","text":"（1950年7月10日、17日）粟裕同志，并告陈、饶："},{"type":"paragraph","text":"来电悉。有病应当休养可以缓来，但仍希望你于八月上旬能来京，那时如身体已好，则担任工作，如身体不好则继续休养。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十日"},{"type":"paragraph","text":"[1]本篇一是毛泽东给中国人民解放军华东军区副司令员栗裕的电报。本篇二是毛泽东为中央人民政府人民革命军事委员会起草的给中共中央华东局，中国人民解放军华东军区政治部副主任唐亮、参谋长张震和副参谋长周骏鸣的电报。"},{"type":"paragraph","text":"[2]陈，指陈毅，当时任中共中央华东局第二书记、中国人民解放军华东军区司令员。饶，指饶漱石，当时任中共中央华东局第一书记、中国人民解放军华东军区政治委员。毛泽东全集第二十八卷"},{"type":"paragraph","text":"二华东局，唐、张、周转粟裕同志："},{"type":"paragraph","text":"毛主席前电粟要他于八月上旬来京，依情况或留京休养或担任工作。现粟已去青岛休养，甚好。请粟于八月上旬来电报告身体情况。如病重则继续在青岛休养，不要来京，如病已愈则盼来京。"},{"type":"paragraph","text":"军委七月十七日"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":7,"day":10},{"year":1950,"month":7,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":527,"page_end":528},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f102910d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
