":1976,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陕西建成一座现代化洗煤厂"},{"type":"paragraph","text":"在无产阶级文化大革命和批林批孔运动的推动下，在反击右倾翻案风的斗争中，陕西省胜利建成一座年产六十万吨炼焦用煤的现代化洗煤厂。经有关部门鉴定，土建工程和设备安装质量，都达到了设计要求，现已正式投入生产。"},{"type":"paragraph","text":"这个洗煤厂的三十四个工程项目以及全部机械设备，都是我国自己设计、自己制造、自己安装的。其中原煤破碎、入洗、给煤、水洗、浮选、过滤、脱水、装车等主要工艺都采用了机械化作业。它的建成，将为陕西省冶金、机械、化工、化肥等工业部门提供大量的炼焦用煤，对促进陕西省工农业生产的发展，具有重要的意义。"},{"type":"paragraph","text":"这座洗煤厂是在一九七三年开始兴建的。承担这项工程任务的基建工程兵某部是第一次担负这样的大型复杂工程。部队的广大指战员在党委的带领下，认真学习马列著作和毛主席著作，以阶级斗争为纲，深入批判刘少奇、林彪及党内不肯改悔的走资派邓小平推行的反革命的修正主义路线；批判他们散布的“阶级斗争熄灭论”和“唯生产力论”，进一步提高了阶级斗争和路线斗争觉悟，激发了社会主义积极性。在整个工程施工过程中，广大指战员坚持独立自主、自力更生的方针，反对洋奴哲学、爬行主义，大搞科学研究和技术革新，大大加快了工程建设的步伐。（新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0df5da59ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
