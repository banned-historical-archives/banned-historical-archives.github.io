" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"我们永远忠于伟大统帅毛主席","authors":["《解放军报》编辑部社论"],"dates":[{"year":1966,"month":8,"day":19}],"is_range_date":false,"parts":[{"text":"我们永远忠于伟大统帅毛主席","type":"title"},{"text":"《解放军报》编辑部社论","type":"authors"},{"text":"我们的伟大领袖毛主席，穿着一身草绿色的人民解放军军装，军帽上的红星闪闪发光，衣领上的领章鲜红夺目，巍然站在天安门上，检阅无产阶级文化大革命的百万大军。","type":"paragraph"},{"text":"毛主席最亲密的战友林彪同志，站在他的身旁。","type":"paragraph"},{"text":"毛主席和林彪同志，在欢腾的人群中，同大家亲切地会见，亲切地握手，亲切地谈话。","type":"paragraph"},{"text":"消息传来，全军指战员万分激动，欢欣若狂。","type":"paragraph"},{"text":"毛主席穿上军装，这是我军最大的光荣，是对我们最大的信任，最大的鼓舞，最大的期望。我们感到无限幸福，无限骄傲。","type":"paragraph"},{"text":"毛主席穿上军装，意义极其重大，极其深刻。这是振奋全军的大事，振奋全国的大事。","type":"paragraph"},{"text":"毛主席说：“在我们为中国人民解放的斗争中，有各种的战线，就中也可以说有文武两个战线，这就是文化战线和军事战线。”","type":"paragraph"},{"text":"无产阶级夺取政权，靠这两个战线，巩固政权，也靠这两个战线。","type":"paragraph"},{"text":"中国人民的伟大领袖，中国革命的伟大舵手毛主席，是这两个战线听最高司令，伟大统帅。","type":"paragraph"},{"text":"过去，毛主席穿上军装，领导我们闹革命，打出了一个无产阶级的天下。","type":"paragraph"},{"text":"今天，毛主席穿上军装，领导我们继续闹革命，誓把我们伟大的祖国，建设成为一个无产阶级的铁打江山。","type":"paragraph"},{"text":"毛主席穿上军装，鼓舞我们千万不要忘记阶级斗争，把无产阶级文化大革命进行到底，把社会主义革命进行到底。只要资产阶级思想存在一天，我们就战斗一天。","type":"paragraph"},{"text":"毛主席穿上军装，鼓舞我们千万不要忘记帝国主义的存在。美帝国主义及其帮凶胆敢向我国发动进攻，就把它们消灭光。","type":"paragraph"},{"text":"毛主席穿上军装，鼓舞我们永远保持我党我军艰苦奋斗的光荣传统，永远保持劳动人民的本色。","type":"paragraph"},{"text":"伟大的统帅毛主席，我们永远忠于您，忠于党，忠于人民，忠于毛泽东思想。","type":"paragraph"},{"text":"我们永远读您的书，听您的话，照您的指示办事，做您的好战士。","type":"paragraph"},{"text":"我们永远跟着您在大风大浪中前进，您指向哪里，我们就打到哪里。","type":"paragraph"},{"text":"（原载《解放军报》1966年8月19日）","type":"appellation"}],"comments":[],"origin":"原载《解放军报》1966年8月19日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cd2dd5860"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
