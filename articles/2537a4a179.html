ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"给李介侯的信","alias":"","parts":[{"type":"paragraph","text":"给李介侯的信"},{"type":"paragraph","text":"（1949年11月17日）介侯先生："},{"type":"paragraph","text":"惠书敬悉，深感厚意。"},{"type":"paragraph","text":"耿侯?兄自一九二八年在湘赣边界之宁冈县见过一面，随即率队返湘南以后，未再见过。传闻殉难，似属可信，时地则无从查问了。"},{"type":"paragraph","text":"尊翁健存，可为庆贺，尚祈转致问候之意。率复，顺祝健进！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四九年十一月十七日"},{"type":"paragraph","text":"[1]李介侯（1899—1971），湖南省韶山市韶山乡韶北村人。早年毕业于湖南机械专门学校。当时在长沙经商。后在北京中国进口公司机械科、外贸部进出口机械总公司工作。"},{"type":"paragraph","text":"[2]耿侯，即李耿侯（1889—1928），李介侯的胞兄。1925年加入中国共产党，曾任湖南湘潭（韶山）特别区农民协会执行委员、中共湘潭（韶山）特别区委组织委员、韶山农民自卫军负责人。1928年在湘南牺牲。"},{"type":"paragraph","text":"[3]指李介侯的父亲李漱清（1874—1957），乡村教师。新中国成立后，曾任湖南省文物管理委员会委员、湖南省文史研究馆馆员。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":521,"page_end":521},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2537a4a179"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
