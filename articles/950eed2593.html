ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对《关于赫鲁晓夫的假共产主义及其在世界历史上的教训》稿的修改","alias":"","parts":[{"type":"paragraph","text":"对《关于赫鲁晓夫的假共产主义及其在世界历史上的教训》稿的修改\""},{"type":"paragraph","text":"（1964年7月）"},{"type":"paragraph","text":"在政治思想领域内，社会主义同资本主义之间谁胜谁负的斗争，需要一个很长的时间才能解决。几十年内是不行的，需要一百年到几百年的时间才能成功。在时间问题上，与其准备短些，宁可准备长些；在工作问题上，与其看得容易些，宁可看得困难些。这样想，这样做，较为有益，而较少受害。"},{"type":"paragraph","text":"[1]这篇文章送审时的题目为《无产阶级专政和赫鲁晓夫的假共产主义》，毛泽东改为现在的题目。赫鲁晓夫，当时任苏共中央第一书记、苏联部长会议主席。本篇中用宋体学排印的是毛泽东加写的文字。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":499,"page_end":499},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"950eed2593"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
