并通过了代表资格审查委员会等四个委员会成员名单　叶剑英委员长主持主席团首次会议","authors":[],"dates":[{"year":1979,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京六月十七日电　第五届全国人民代表大会第二次会议今天下午在人民大会堂举行预备会议，通过了这次会议的议程。"},{"type":"paragraph","text":"根据预备会议一致通过的议程，华国锋总理将向第二次会议作政府工作报告，国务院副总理兼国家计委主任余秋里作关于一九七九年国民经济计划草案的报告，财政部长张劲夫作关于一九七八年国家决算和一九七九年国家预算草案的报告。人大常委会法制委员会主任彭真作关于法律草案的说明。这次提请会议审议的法律草案有:地方各级人民代表大会和地方各级人民政府组织法、全国人民代表大会和地方各级人民代表大会选举法、人民法院组织法、人民检察院组织法、刑法、刑事诉讼法和中外合资经营企业法。会议还将审议人大常委会、最高人民法院和最高人民检察院的工作报告。会议将增选人大常委会副委员长，决定增补国务院副总理人选，决定中国科学院院长人选和通过五届人大民族委员会人选。"},{"type":"paragraph","text":"叶剑英委员长主持了预备会议。"},{"type":"paragraph","text":"预备会议选举了第五届全国人民代表大会第二次会议主席团和秘书长。主席团由二百三十五名代表组成，乌兰夫为秘书长。"},{"type":"paragraph","text":"会议通过了增补的五届人大代表资格审查委员会主任委员、副主任委员和委员名单，胡耀邦担任主任委员。会议还通过了五届人大预算委员会、法案委员会和五届人大第二次会议提案审查委员会主任委员、副主任委员和委员名单，薄一波、彭真、张启龙分别担任这三个委员会的主任委员。"},{"type":"paragraph","text":"预备会议结束后，五届人大第二次会议主席团由叶委员长主持，举行了第一次会议，推选了主席团常务主席。被推选为常务主席的是:叶剑英、宋庆龄、聂荣臻、刘伯承、乌兰夫、吴德、韦国清、陈云、谭震林、李井泉、张鼎丞、蔡畅、邓颖超、赛福鼎、廖承志、姬鹏飞、阿沛·阿旺晋美、周建人、许德珩、胡厥文。"},{"type":"paragraph","text":"主席团第一次会议还通过了五届人大第二次会议日程、执行主席分组名单和代表资格审查委员会关于代表情况和补选的代表资格的审查报告；决定了五届"},{"type":"paragraph","text":"五届人大代表资格审查委员会主任委员、副主任委员、委员名单"},{"type":"paragraph","text":"新华社北京六月十七日电　第五届全国人民代表大会代表资格审查委员会主任委员、副主任委员、委员名单"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9f84340ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
