<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市大专院校红卫兵代表大会胜利闭幕牢牢掌握斗争大方向　掀起教育革命新高潮号召全市红卫兵以“斗私，批修”为纲，深入开展革命大批判和斗批改，巩固和发展革命　大联合和革命三结合，在斗争中把自己锻炼成为决心把文化大革命进行到底的无产阶级革命派","authors":[],"dates":[{"year":1967,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市大专院校红卫兵代表大会昨天胜利闭幕。与会代表通过学习和讨论，表示决心要牢牢地掌握斗争大方向，更好地贯彻毛主席关于进行无产阶级教育革命的最新指示，坚持以“斗私，批修”为纲，巩固和发展革命大联合和革命三结合，以毛主席“五·七”指示为无产阶级教育革命的最高纲领，掀起教育革命新高潮，争当“决心把无产阶级文化大革命进行到底的无产阶级革命派”。"},{"type":"paragraph","text":"上海市革命委员会负责人张春桥同志和市革命委员会其他领导成员，出席了昨天的大会。张春桥同志在会上作了重要讲话。他热烈地祝贺上海市大专院校红卫兵代表大会的成立。"},{"type":"paragraph","text":"会议指出，我们革命的红卫兵和无产阶级革命派在当前的大好形势下，一定要继续紧紧地掌握革命斗争的大方向，把矛头对准党内最大的一小撮走资本主义道路当权派及其在上海的代理人陈丕显、曹荻秋、杨西光之流，千万不要忘记阶级斗争，要时刻警惕并坚决粉碎阶级敌人的反扑和破坏，深入地开展革命大批判和斗批改。为了更好地把握革命斗争的大方向，更有力地开展大批判和斗批改，当前必须进一步巩固和发展革命大联合，建立革命三结合的领导班子。"},{"type":"paragraph","text":"会议认为，无产阶级教育革命是当前学校中最重要的政治斗争。无产阶级教育革命是无产阶级文化大革命重要组成部分，它在很大程度上决定无产阶级文化大革命的成败。这一场无产阶级教育革命，要大破大立，彻底摧毁修正主义教育路线和旧的教育制度、教学内容和方法，创建闪耀毛泽东思想光辉的崭新的无产阶级教育制度。这场革命的任务是非常艰巨的，需要进行十分细致的工作。要搞好这场革命斗争，就必须坚持“斗私，批修”，要有把无产阶级文化大革命进行到底的决心，树立和发扬无产阶级的革命坚定性，以坚韧不拔的无产阶级革命精神，战胜困难，夺取胜利。这场史无前例的无产阶级教育革命，正在触及每一个人的灵魂，我们每一个战士都要毫无例外地在斗争的进程中不断经受新的考验，把自己锻炼成为“决心把无产阶级文化大革命进行到底的无产阶级革命派”。"},{"type":"paragraph","text":"昨天下午，在红代会全体代表会议上，宣读了《上海市大专院校红卫兵代表大会关于掀起无产阶级教育革命新高潮的号召书》(草案)和《上海市大专院校红卫兵组织条例》(试行草案)。"},{"type":"paragraph","text":"十八日上午，上海市大专院校红代会，分别在同济大学和华东师范大学举行无产阶级教育革命经验的现场交流会，讨论了进一步开展无产阶级教育革命的问题。十八日晚上，又在市革委会礼堂举行无产阶级教育革命经验心得交流会。上海戏剧学院、同济大学、华东师范大学和复旦大学的革命小将，分别介绍了他们开展无产阶级教育革命的体会和设想，表示了把无产阶级文化大革命进行到底的决心。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"134e34c380"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
