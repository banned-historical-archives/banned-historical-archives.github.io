ates":[{"year":1957,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比捷两党联合声明"},{"type":"paragraph","text":"强调必须反对修正主义和民族主义"},{"type":"paragraph","text":"据新华社布拉格1日电　比利时共产党代表团和捷克斯洛伐克共产党代表团最近在布拉格举行会谈之后，签署了一项联合声明。"},{"type":"paragraph","text":"联合声明说，世界社会主义体系的存在，和平地区的建立，日益壮大的国际工人运动和争取和平的广泛的民主运动的存在，使得力量的对比发生了根本变化，并且形成了一个新的局面。防止新战争、结束可耻的殖民制度和争取不同社会制度国家和平共处和竞赛的现实可能性出现了。"},{"type":"paragraph","text":"声明谴责美国旨在复活西德军国主义和为了明显的侵略目的用原子武器装备西德军队的政策。声明接着指出，全世界都支持德意志民主共和国对建立统一的爱好和平的德国的愿望。"},{"type":"paragraph","text":"声明说，双方无条件地支持要求取消军事基地、从别国领土上撤出一切外国军队、停止试验大规模毁灭性武器以及禁止这些武器的建议。"},{"type":"paragraph","text":"声明指出，国际事件证明了苏共第二十次代表大会决议的正确性，这些决议在很大程度上促使了马克思列宁主义的创造性的发展。"},{"type":"paragraph","text":"声明强调，必须坚决反对修正主义和民族主义的一切表现。"},{"type":"paragraph","text":"声明最后说，双方代表团欢迎加强各国共产党和工人党之间的联系，这种加强联系对交换情报、观点和互相交流经验都是必要的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c508717d20"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
