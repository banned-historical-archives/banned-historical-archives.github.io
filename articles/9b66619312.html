script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关于华侨中的资产阶级","authors":[],"dates":[{"year":1949,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"(问)"},{"type":"paragraph","text":"编辑先生:"},{"type":"paragraph","text":"我们集了几个同事成立了一个学习小组，已经有五星期之久，我们学习的材料是“中国革命与中国共产党”和“新民主主义论”。从前书“中国革命的动力”一节里，遇到疑问，即华侨中的资产阶级是革命的动力?还是革命的对象?请先生给我们详细解答。"},{"type":"paragraph","text":"吴江县严墓镇中心国民学校辅导区学习小组启"},{"type":"paragraph","text":"(答)"},{"type":"paragraph","text":"华侨中的资产阶级，除了少数倒向帝国主义，和外国帝国主义、本国官僚资本主义勾结，作为帝国主义的走狗外，他们大多数是受着帝国主义压迫的，他们和民族资产阶级一样，有着在一定时期中与一定程度上的革命性，他们当然不是革命的对象，可以同无产阶级小资产阶级联合起来，团结在反帝反封建反官僚资本主义的统一战线之内，作为无产阶级的同盟军之一。　(宜)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b66619312"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
