script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji11","name":"毛泽东全集第11卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"中日战争爆发后的形势与任务","alias":"","parts":[{"type":"paragraph","text":"中日战争爆发后的形势与任务！！"},{"type":"paragraph","text":"（1937年9月1日）"},{"type":"paragraph","text":"甲形势（一）日本大规模进攻开始"},{"type":"paragraph","text":"是大规模的是继续的一个强大的帝国主义并有外援"},{"type":"paragraph","text":"但又是一个冒险的进攻（二）中国全国性抗战开始"},{"type":"paragraph","text":"是全国性的不是局部的进入了实行抗战的阶段"},{"type":"paragraph","text":"但还是单纯的政府抗战、压制人民的积极性，包含着严重的危险性"},{"type":"paragraph","text":"抗日战线中的左派、中派、右派，阶级关系在重新变化，估计到阶级结合之新的情况"},{"type":"paragraph","text":"全民抗战还没有到来，但非此不能战胜日本"},{"type":"paragraph","text":"抗日民族统一战线已在全国开始组织成功，但还是不充实"},{"type":"paragraph","text":"[1]这是毛泽东1937年9月1日在中央一级积极分子会议上的报告提纲。的，不坚固的"},{"type":"paragraph","text":"（三）结论"},{"type":"paragraph","text":"是持久战"},{"type":"paragraph","text":"为动员一切力量争取抗战胜利而斗争，为充实的坚固的抗日民族统一战线而斗争"},{"type":"paragraph","text":"乙任务"},{"type":"paragraph","text":"（一）动员一切力量争取抗战胜利，十大纲领，全面的全民族的战争"},{"type":"paragraph","text":"（二）红军之团结核心的任务"},{"type":"paragraph","text":"独立自主的山地游击战争由“壮气军”地位到实力领导地位"},{"type":"paragraph","text":"抗日根据地问题与义勇军问题（三）友党友军区域的任务"},{"type":"paragraph","text":"党从现在地位到实力领导地位（四）边区的任务"},{"type":"paragraph","text":"政治、军事与干部的策源地"},{"type":"paragraph","text":"（五）战争中建立工农资产阶级民主共和国，并准备过渡到社会主义"},{"type":"paragraph","text":"两个特点"},{"type":"paragraph","text":"两个前途"},{"type":"paragraph","text":"（六）资产阶级追随无产阶级，还是无产阶级追随资产阶级（国民党吸引共产党，还是共产党吸引国民党）"},{"type":"paragraph","text":"自觉与不自觉反对急性病"},{"type":"paragraph","text":"反对右倾机会主义即投降主义一即将成为全党的主要危险（混同不同的阶级、党与政策）"},{"type":"paragraph","text":"民族失败主义有两种：一种是“左”的一-托洛茨基主义；一种是右的—民族悲观主义"},{"type":"paragraph","text":"(存在于抗日战线的右翼中）（七）团结干部在党的路线周围"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":132,"page_end":134},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bcb8f7113"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
