反应","authors":[],"dates":[{"year":1952,"month":4,"day":2}],"is_range_date":false,"parts":[{"text":"天津召开市协商委员会后上层资本家的反应","type":"title"},{"text":"【天津分社二日讯】天津最近召开市府委员和协商委员联席会后，上层资本家有口皆碑，一致说黄市长讲得好。李钟楚说：“黄市长谈得真好，道地是掌握了政策。”光明植物油厂经理谭志清说：“讲得太好了，真令人心服。要看杨耳、艾思奇的文章，咱们就完了。听了报告，心里松多了。”北洋纱厂经理朱梦苏会后怕听错了，特别打电话给工商联秘书长王光英，证明黄市长是否说“杨耳的文章左”了。并说：“会上劳方代表没说话，这是相当客气喽!看样子是很慎重的。”朱最近对工会特别感激，因棉纺五厂贪污分子童某栽赃说放在朱处九十件布，并咬定和朱定了“攻守同盟”。经工会证明是栽赃后，朱大为感动。资本家们对毕鸣岐在会上不检查罪恶，一致不满。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年4月3日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02e42da9fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
