script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来对外交部指示要点","authors":["周恩来"],"dates":[{"year":1968,"month":4,"day":1}],"is_range_date":false,"parts":[{"text":"周恩来对外交部指示要点","type":"title"},{"text":"周恩来","type":"authors"},{"text":"九十一人大字报，为二月逆流翻案，要恢复旧秩序，首先为陈老总评功摆好。在这以前，阿尔及利亚使馆领先贴出大字报，欢迎陈老总不检讨就回部工作。第二，九十一人大字报是保自己，有二十多个武官当时没有签上名，感到很遗憾，现在又可能感到很“庆幸”。当然，后头是否还有人，值得研究，但要实事求是。现在大联筹已经认识了，要尖锐批评九十一人大字报，党委研究怎样认识这一问题，要检讨，九十一人也要检讨。还有同情者，未签名的签名者，这说明外交部保守势力相当大，当然不是说过半数了。但是不少，必须尖锐、彻底地批判。","type":"paragraph"},{"text":"九十一人大字报是外交部为二月逆流翻案的代表作，要彻底批判。用什么标准呢？要高举毛泽东思想伟大红旗，坚定地站在毛主席革命路线上，坚持两条路线斗争，斗私批修。右倾机会主义就是修正主义的根苗，保自己就是私，要尖锐地、严肃而又实事求是地批判九十一人大字报。九十一人绝大多数是认识上的错误，我们要惩前毖后、治病救人，批判从严，处理从宽，绝大多数是认识上的错误，极少极少是死不悔改的，认识和立场是不能分离的，坚持错误就是立场问题了。九十一人立场是错误的。极少极少人是坚持资产阶级反动路线死不悔改，但绝大多数经过这次批判会提高觉悟，前进一步。但是，要防止又来一个极“左”抬头。","type":"paragraph"},{"text":"去年我讲过批极“左”要防右。我这话是毛主席的话，是主席在总结党内路线时讲的。有人理解为反“左”时不要手软，这是不对的，从来没有这个意思。","type":"paragraph"},{"text":"现在，反右倾保守主义，反右倾分裂正义，反右倾投降主义，必须防止极“左”翻案，它要翻案是不允许的。但当前主攻方向是反右。","type":"paragraph"},{"text":"犯极“左”错误要翻案是不允许的，有人翻也不怕。什么叫右倾保守主义？就是恢复旧秩序、旧官，这是办不到的。","type":"paragraph"},{"text":"文化大革命已经进行两年了，今天报上登了主席的最新指示：“国家机关的改革，最根本的一条，就是联系群众。”要接受群众的教育，右倾保守就是脱离群众，站在官僚主义立场上，不做群众的小学生。","type":"paragraph"},{"text":"要反对右倾分裂主义。我们要坚持毛泽东思想，坚持毛主席革命路线，要联合起来，开展革命的大批判。观点不同，两派都是人民内部矛盾嘛。可以在一起嘛！为什么把国家财产变成小集团个人所有制，这首先就是违反毛泽东思想的。","type":"paragraph"},{"text":"要反对右倾投降主义。它是向走资派投降，让走资派复辟，不进行两条道路、两个阶级、两条路线的斗争，无原则地联合，不批就保，只保不批，取消阶级斗争和原则斗争，取消在毛泽东思想基础上的争论，所以要好好地批右倾主义，右倾投降主义，但矛头要对准部党委、对准九十一人。因为他们都是犯了错误的大小当权派，不要把矛头对着群众。希望这次二月份开始的已经进行了一个半月的斗争，不要再出现摇摆了，要能够照毛主席革命路线向前发展，要按毛主席教导，抓革命，促生产，要不断提高毛泽东思想和业务水平，否则就不符合毛主席的教导。","type":"paragraph"},{"text":"（根据口头传达整理供参考）","type":"appellation"},{"text":"","type":"appellation"}],"comments":[],"origin":"《战地黄花》  增刊  第30期(总第62期)  一九六八年四月二十四日  河南二七公社安阳分社  揪崔联络站、机床厂革联  主办","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"二月逆流","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e04231505"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
