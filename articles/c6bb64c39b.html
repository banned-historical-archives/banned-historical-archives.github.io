ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"给黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给黄炎培的信"},{"type":"paragraph","text":"（1955年4月29日）任之先生："},{"type":"paragraph","text":"四月二十五、六日惠书收读，甚谢！粮食问题，下一个月还会是紧的，六月以后将会好些了。顺祝健康！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿九日"},{"type":"paragraph","text":"[1]黄炎培，字任之，当时任中国民主建国会主任委员、全国人大常委会副委员长。"},{"type":"paragraph","text":"[2]指黄炎培1955年4月25日和4月26日给毛泽东的两封信。4月25日的信汇报了中国民主建国会全国代表大会的情况。4月26日的信再次向毛泽东反映农村粮食问题，信中说：根据最近收到的各地人民来信，最严重的还是农村粮食问题，我曾选取可靠性较高的5封信送给陈云同志，并与其长谈达4小时。这个问题的严重性还在于此时正临“农忙”，人为的丰和歉将取决于这一关头，似须经过正确了解后及时处理。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":4,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":50,"page_end":50},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6bb64c39b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
