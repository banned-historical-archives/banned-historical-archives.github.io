dates":[{"year":1957,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判右倾思想　克服温情主义"},{"type":"paragraph","text":"鞍山反右派斗争扩展到基层"},{"type":"paragraph","text":"新华社鞍山24日电　鞍山市反右派斗争已由市级机关、鞍钢、鞍建两公司开始扩展到基层单位和各行各业。经过批判右倾思想和温情主义后，最近揭露出来的右派分子已比半个月前增加一倍半以上。"},{"type":"paragraph","text":"目前，在鞍山市已展开反右派斗争的近百个机关和企业单位中，每天都有许多单位召开辩论会，同右派分子进行说理斗争。在工程技术界，已揭露和批判了自称为“鸣放英雄”，发表反党反社会主义的“万言书”企图取消党的领导，并攻击肃反政策的李立德；宁愿做英美的仆役，不愿做中国的主人的朱新；污蔑苏联，攻击党的领导和肃反政策的祁宝宗；妄图组织反动党派来推翻共产党的领导的伍俊卿等一批右派分子。在教育界中，揭露和批判了恶毒地攻击党的教育、人事制度，诬称现在是假洋鬼子不准阿Q革命时代的姜健群；提出取消党委制实行“民主办校”的杨国范；系统地攻击肃反政策的白志扬等。此外，积极推行章罗联盟反共反社会主义纲领的民盟鞍山市负责人张裕元；污蔑党不能领导科学技术的医药卫生界的樊国栋；披着共产党员的外衣向党发出十六支毒箭的党课教员许广镇等右派分子的反动面目，也已经进一步暴露出来。"},{"type":"paragraph","text":"经过群众展开面对面的斗争，一些十分狡猾顽固的右派分子在大量的事实面前已被批驳得理屈词穷，哑口无言。有些右派分子已低头向人民请罪。拥护“定息二十年”的李树藩，已经承认他是一个反动的资本家。扬言“希望中国也能掀起一个‘匈牙利事件’”的阴谋家沈乃敏，也承认他是有目的、有计划、有策略地向党进攻，企图搞垮社会主义企业的右派分子。以“鞍山日报”副总编辑李惠众为首的反党集团已经开始瓦解，除了李惠众、侯韵、薛麦还在躲躲闪闪外，其他参与反党活动的分子，如刘穆、高伟、张实、游庆新、于成吉等，都已开始起义或投降，初步交代反党事实。"},{"type":"paragraph","text":"批判了右倾思想和温情主义以后，一些过去认为没有右派分子的单位也揭露出了右派分子。过去认为右派分子很少的鞍山市人民委员会系统，最近已在十七个单位中发现了一批右派分子。黑色冶金设计院鞍山分院通过大辩论，也发现了右派分子，并发现了右派小集团。在鞍钢的无缝钢管厂、大石桥镁矿和鞍建的机械安装工程公司、管道工程公司等基层厂矿企业的技术人员和职员中，反右派斗争也已经开始展开。这些厂矿一边进行反右派斗争，一边改进工作、坚持生产建设，并且取得了发动群众斗争右派分子推动增产节约运动的一些经验。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"857428b43b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
