ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"抚钟太夫人联","alias":"","parts":[{"type":"paragraph","text":"挽钟太夫人联!!（1944年4月10日）八路功勋，大孝为国；一生劳动，吾党光荣。"},{"type":"paragraph","text":"二为母当学民族英雄贤母；"},{"type":"paragraph","text":"斯人无愧劳动阶级完人。"},{"type":"paragraph","text":"[1]1944年2月15日，朱德的母亲钟太夫人逝世，享年86岁。在延安纪念“三八”节的大会上，蔡畅宣布了这一消息，号召妇女学习钟太夫人劳动终身和勤俭持家的精神。1944年4月10日，延安各界1000多人在杨家岭中央大礼堂举行了追悼大会，毛泽东、周恩来、刘少奇等中央领导人参加了追悼大会。本文一为毛泽东代表中央题写的挽联；本文二是毛泽东以个人名"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":373,"page_end":373},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffeed82302"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
