script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"索马里艺术代表团在沪举行演出热情歌颂伟大领袖毛主席","authors":[],"dates":[{"year":1967,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　来自东非的索马里艺术代表团，七、八两日在上海举行演出，受到观众的热烈欢迎。"},{"type":"paragraph","text":"索马里艺术家们带着索马里人民对中国人民的深厚友谊，在上海的舞台上，热情地歌颂了全世界人民的伟大领袖毛主席。演出中，舞台天幕上映出了毛主席的伟大形象，他象一轮照耀全球的红太阳，红光四射，把索马里艺术家和中国观众的心照得通亮。人们一遍遍地热烈鼓掌，用不同的语言高呼出共同的心声:“毛主席万岁!万万岁!”索马里艺术家们手捧红彤彤的《毛主席语录》，满怀激情地在毛主席像前，用中文纵情高唱《东方红》、《大海航行靠舵手》、《万岁!毛主席》。他们还演唱了索马里歌曲《歌颂毛主席》和毛主席语录歌《领导我们事业的核心力量》，演出了《在北京的金山上》。在他们演唱时，全场观众发出了一阵又一阵的热烈掌声。"},{"type":"paragraph","text":"索马里艺术家还演出了歌颂中索两国人民友谊的短剧《中索友谊》，和反映索马里人民反抗殖民主义统治和争取民族独立的民间歌舞等。"},{"type":"paragraph","text":"上海市革命委员会领导成员马天水和革命群众组织负责人观看了演出。演出休息时，他们会见了索马里艺术代表团团长贾马·哈拉夫、副团长优素福·阿里·哈伦，进行了亲切交谈；并在演出结束时步上舞台和索马里艺术家一一握手，这时，全场掌声雷动，台上台下同声高唱《大海航行靠舵手》。"},{"type":"paragraph","text":"索马里艺术代表团是在北京、济南访问演出后来到上海的。他们到沪后，游览了市容，参观了上海工业展览会，对工业展览会所显示的中国工业在战无不胜的毛泽东思想指引下所取得的辉煌成就表示赞扬。目前，他们继续在上海进行参观访问。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5de10f600e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
