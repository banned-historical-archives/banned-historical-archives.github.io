["北京大学学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"小字报——请用法制代替运动","type":"title"},{"text":"北京大学学生","type":"authors"},{"text":"（小字报，摘要）","type":"subtitle"},{"text":"共产党发起了整风运动，要求人民对党和政府提出监督意见，这样做，当然是好的。当今世界文明国家都建立了人民对政府的监督机制，使民意能上达执政者，形成一种对权力的制约。我想，文明国家之所以能长治久安，这是一个根本原因。共产党喜欢搞运动。这是在革命战争时期形成的传统，无可厚非。但时至如今社会主义建设时期，应将法制建设置于工农业建设同等重要地位……我们批判官僚主义，不仅要揭其现象，更应究其本质。官僚主义产生的根源，正是无视法制的人治陋规。许多领导干部喜欢一句口头禅：“这事是我说了算。”这不对！我们应该有一个不是由谁说了算,而是法律说了算的制度……。","type":"paragraph"},{"text":" 来源：陈斯骏〈从北大一角看反右〉。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4090b4a8f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
