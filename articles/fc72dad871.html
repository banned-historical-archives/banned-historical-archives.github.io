" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"李富春在接见地质、师大、北石“北京公社”、“大庆公社”“革总”等组织代表时谈批判余秋里","parts":[{"type":"title","text":"943.李富春在接见地质、师大、北石“北京公社”、“大庆公社”"},{"type":"paragraph","text":"“革总”等组织代表时谈批判余秋里"},{"type":"paragraph","text":"(1967年8月23日)"},{"type":"paragraph","text":"李：八月十五日我和戚本禹同志接见矿院“东方红”时，关于余秋里，我们讲过革命群众可以批判，至于保不保，是中央的问题。戚本禹同志已经批评了矿院“东方红”。(×××：余秋里态度很不好)。这个问题我和余秋里讲过，你的态度很不好，不是甘当孺子牛的态度，革命群众批判你，喊打倒你，你应该举手，余秋里应该接受群众的批判，应该相信群众，依靠群众，信任群众，应该有甘当孺子牛的态度，到群众中去接受群众批判。(×××：要求随叫随到)李：关于随叫随到，约个时间，每个星期几次按时去，留一些时间让他安排一些工作，我是支持革命造反派批判余秋里的。我是坚决支持你们的革命行动的。(×××：谈大庆情况)"},{"type":"paragraph","text":"李：你们把大庆调查情况给我一份，最近要有中央文革解决黑龙江问题，黑龙江不是有山上山下派吗？"},{"type":"paragraph","text":"余秋里应该批判，你们把材料找一份给我，对余秋里你们的态度是对的，要实事求是，批深批透，至于本人是什么问题由中央决定，希望他回到毛主席革命路线上来。大庆是毛主席的，刘少奇搞了些东西，那个半工半读就是刘少奇的。王鹤寿、吕东有没有区别？你们帮助一个煤炭部，冶金部、石油部、地质部，把业务班子建立一下，煤炭部已经建立起来了。"}],"authors":["李富春"],"dates":[{"year":1967,"month":8,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":369,"page_end":370,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"李富春","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc72dad871"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
