art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"北航师生冒险抢救军用物资","authors":["张水平刘文革"],"parts":[{"type":"paragraph","text":"本报讯 张水平、刘文革报道：6月8日上午，一辆满载价值6万余元军用物资的解放牌汽车驶进了戒严部队某部宿营地。这是北京航空航天大学广大师生于4日凌晨冒着生命危险抢救出来的。"},{"type":"paragraph","text":"4日凌晨1时，这个部队进京执行戒严任务。当部队行进到北京航空航天大学附近时，遭到一些不明真相的人阻拦和围攻，部队的一辆满载军用物资的车被迫停止前进，暴徒们把车上的战士和司机拽下来殴打，一些人放火烧军车，疯抢车上的物资。这时，从人群中冲出由北京航空航天大学老师和学生组成的队伍，领头的一位老教授迅速组织学生筑起一道人墙。接着又带领一部分学生把被暴徒冲散打伤的战士抢救出来。一些不明身份的人用石块和砖头朝救护军人的学生砸来。有些老师和学生当场被砸伤。师生们看到这种状况，一边派人到学校叫人，一边将5名战士护送到院内。但一些暴徒仍不甘心，又扔出汽油瓶将车上的军用物资点燃。一名老师和两名学生冒着被石头砸伤的危险，爬上汽车脱下自己的衣服打火，由于汽油瓶炸开，火势、烟雾很大，一名学生被烟气熏倒，但其他的人仍奋力扑火，大家齐心协力，终于把火扑灭，援助的老师和学生越来越多，一些暴徒停止了围攻。师生们见物资扔在马路上不安全，便一件件地搬到学校院内。"},{"type":"paragraph","text":"随后，他们四处联系打听部队的住址，及时派车将物资如数送还了部队。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af374ffcd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
