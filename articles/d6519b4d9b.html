,"dates":[{"year":1962,"month":10,"day":20}],"is_range_date":false,"parts":[{"text":"林彪对入藏参战部队的指示","type":"title"},{"text":"[从1961年开始，继续蚕食中国领土，挑起多次武装冲突。1962年9月，印度军队向“麦克马洪线”以北推进，开枪打死、打伤中国边防人员。10月20日，印军在中印边境东、西两段发动大规模进攻。中国边防部队进行自卫反击战。]","type":"paragraph"},{"text":"从最困难处着想，准备打大仗、打硬仗、打恶仗，准备吃大苦，耐大劳。强调独立作战，孤胆作战，连续作战。在最困难、最疲劳的情况下，熬过困难，坚持到最后胜利。特别要求部队坚决执行宽待俘虏的政策：不打不骂、不侮辱俘虏人格，当地物质条件困难，也要让俘虏吃好、住好、睡好、穿暖。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6519b4d9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
