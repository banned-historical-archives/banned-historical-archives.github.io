ates":[{"year":1951,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本市讯】本市自解放以来，已有不少行业随着整个社会进步而改进其自身业务，一般商人都已认识到不合理的中间剥削不容存在，继蔬菜地货水果地货等业取消外佣之后，本市树柴商业在全体同业一致拥护之下，已于本月一日起取消外佣及出行费；木材商业亦将有史以来即有的业规出行费于本月一日取消，此种自动自觉革除陋规的精神，值得表扬。"}],"comments":[],"origin":"本市","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f1fbfd1d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
