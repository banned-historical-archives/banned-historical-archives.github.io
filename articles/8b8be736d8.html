es":[{"year":1977,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在具有伟大历史意义的秋收起义五十周年快要来临的日子里，我来到了当年毛主席发动和领导秋收起义的一些地方，怀着崇敬、幸福的感情，在这块满载着革命荣誉的土地上，寻找当年中国工农革命军战斗的宣言，进军的呐喊；回味当年工农起来暴动的怒吼，开怀的笑浪；敬觅当年毛主席伟岸的身形，闪光的足迹。一件件革命文物，一处处革命旧址，就是革命历史的见证，它象磁石一般吸引着人们的心灵。"},{"type":"paragraph","text":"(一)"},{"type":"paragraph","text":"安源山下，有一幢革命小楼，讲解员同志告诉我:这里就是当年毛主席召开秋收起义军事会议的地方，在这里，毛主席具体部署了秋收起义……"},{"type":"paragraph","text":"安源，这座在革命史册上闪耀光华的煤城，五十多年前，它同整个苦难深重的中华民族一样，正处在存亡危急之中。“国家坏到了极处!人类苦到了极处!社会黑暗到了极处!”多少个风雨夜，多少个黎明前，饥寒交迫的安源路矿工人，在腥风血雨中，望北斗，盼救星，渴望日出东方红。一九二一年秋，毛主席跋山涉水来到了安源，给工人运动指明了航向，给人民革命播下了火种。从此，在路矿工人的心底里，常唱起了这样一首火热的颂歌:"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b8be736d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
