ear":1952,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本学生研究马克思——列宁主义与中国革命实践相结合的毛泽东思想的兴趣日益增长。"},{"type":"paragraph","text":"东京大学的学生最近举办了一个“毛泽东思想讲座”，计划从五月三十一日起到六月二十一日止开讲七次。第一讲已按期于五月三十一日举行，由中国研究所所长平野义太郎主讲“毛泽东的国家理论”，听讲的人十分踊跃，会场拥挤不堪。"},{"type":"paragraph","text":"第二讲的情况也极热烈。这一讲的题目是“毛泽东的民族解放理论”，日中友好协会理事岩村三千夫担任讲师。听众踊跃地提出各项问题要求解答，表现了他们对毛泽东思想的浓重兴趣。"},{"type":"paragraph","text":"据悉，日本各学校也准备分别举办关于毛泽东思想的演讲会或研究会。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c2d4438ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
