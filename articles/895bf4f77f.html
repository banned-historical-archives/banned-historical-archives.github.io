script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"牢记毛主席教导　努力为人民服务","authors":[],"dates":[{"year":1976,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"星火日夜商店党支部"},{"type":"paragraph","text":"这几天来，我们怀着对伟大领袖毛主席无限崇敬的心情，一遍又一遍地学习中央的两项重要决定，深深地感到这两项决定完全说出了我们的心里话，充分表明以华国锋同志为首的党中央和全国人民心连心。我们深切地体会到，毛主席是我们的带路人，毛泽东思想是指引革命前进的灯塔。我们商店就是靠了战无不胜的毛泽东思想，才做到了人换思想店换貌，坚持日夜服务，方便工农群众。"},{"type":"paragraph","text":"无产阶级文化大革命中，我们批判了刘少奇、邓小平的利润挂帅等黑货，实行了日夜服务；在批林批孔运动中，我们顶住了倒退的逆流，先后五次批判林彪“克己复礼”的反动纲领，巩固和发展了日夜服务这一新事物，迈出了上门服务的新步伐；在批邓、反击右倾翻案风的伟大斗争中，又是在毛主席的一系列重要指示指引下，我们深入批判了邓小平的利润挂帅等谬论，进一步发展了日夜服务这一新事物，坚持了为工农兵服务，为工农业生产服务，为巩固无产阶级专政服务的方向。历史的经验雄辩地证明，跟着毛主席走，按照毛主席的指示办，我们就前进，就胜利。今天，毛主席虽然与世长辞了，但毛泽东思想永放光芒，毛主席开创的革命事业后继有人。我们一定要紧密地团结在以华国锋同志为首的党中央周围，坚持毛主席制定的党的基本路线，同一切违背“三要三不要”原则的言论和行动作坚决斗争，同任何背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席指示的人，任何搞修正主义、搞分裂、搞阴谋诡计的人作殊死的斗争。"},{"type":"paragraph","text":"认真学习毛主席著作，按照毛主席的教导去做，是继承毛主席遗志的最好的实际行动。为了坚决响应党中央关于掀起一个学习马列著作和毛主席著作新高潮的号召，我们同“三八旅社”等十个单位一起，向全区财贸职工发出了倡议，决心在通读《毛泽东选集》四卷的基础上，联系阶级斗争和路线斗争的实际，联系为人民服务的实际，重新学习毛主席《在中国共产党第七届中央委员会第二次全体会议上的报告》以及《在延安文艺座谈会上的讲话》和《为人民服务》等著作，特别是在文化大革命和批邓、反击右倾翻案风斗争中的一系列重要指示，继续狠批邓小平授意炮制的《论总纲》等三株大毒草，进一步弄清资产阶级就在共产党内的问题，提高识别能力，始终坚持以阶级斗争为纲，坚持党的基本路线，全心全意为人民服务，把服务工作搞得更好，用实际行动继承毛主席的遗志，将无产阶级革命事业进行到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"895bf4f77f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
