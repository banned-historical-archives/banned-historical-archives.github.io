"https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/34799034-2c67-4e1f-ae74-793ab6bd754b.pdf"],"article":{"title":"北京市革命委员会转发新华印刷厂在对敌斗争中坚决执行党的“给出路”政策的经验的报告","alias":"","parts":[{"type":"paragraph","text":"8林、周及文革各同志：建议将此件转发各地参考。对反革命分子和犯错误的人、必须注意政策，打击面要小，教育面要宽，要重证据，置调查研究，严禁逼、供、信。对犯错误的好人，要多做教离工作，在他们有了觉悟的时候，及时解放他们。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月一"},{"type":"paragraph","text":"中共中央、中央文革转发《北京市革命委员会转发新华印刷"},{"type":"paragraph","text":"厂在对敌斗争中坚决执行党的“给出路”政策的经验的报告》"},{"type":"paragraph","text":"（一九六八年十二月三日）遵照毛主席指示，现将《北京市革命委员会转发新华印刷厂在对敌斗争中坚决执行党的“给出路”政策的经验的报告》，发给各地参考。请你们认真学习毛主席的批示和注语，认真研究这一经验总结，并且联系到当地的实际情况，区别两类矛盾，依靠群众，坚决执行毛主席“给出路”的政策。"},{"type":"paragraph","text":"北京市革命委员会转发新华印刷厂在对敌斗争中坚决执行党的"},{"type":"paragraph","text":"“给出路”政策的经验的报告毛主席、林副主席，恩来、伯达、康生、江青同志，中央、中央文革："},{"type":"paragraph","text":"送上北京新华印刷厂在对敌斗争中贯彻执行“给出路”政策的经验，请阅示。"},{"type":"paragraph","text":"北京市革命委员会"},{"type":"paragraph","text":"-九六八年十一月二十九日北京新华印刷厂革委会在对敌斗争中"},{"type":"paragraph","text":"坚决执行党的“给出路”政策的经验北京新华印刷厂革委会（这个厂有三千工人，连家属共一方人），在伟大领袖毛主席“五·一九\"批示的鼓舞下，在驻厂八三四一部队毛泽东思想宣传队的帮助下，一鼓作气，决"}],"authors":["北京市革命委员会"],"dates":[{"year":1968,"month":11,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":279,"page_end":279},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2cc2322367"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
