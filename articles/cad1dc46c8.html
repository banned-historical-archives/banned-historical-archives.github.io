script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"投靠印度大资产阶级　暴露一副反革命凶相  印度修正主义分子残酷镇压革命人民","authors":[],"dates":[{"year":1969,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"投靠印度大资产阶级　暴露一副反革命凶相"},{"type":"paragraph","text":"印度修正主义分子残酷镇压革命人民"},{"type":"paragraph","text":"据新华社讯　新德里消息：印度修正主义分子搞的“和平过渡”的黑样板——喀拉拉邦政府和西孟加拉邦政府，最近几个月来一再犯下了血腥镇压革命人民的新罪行。"},{"type":"paragraph","text":"由南布迪里巴德等印度修正主义分子把持的喀拉拉邦政府，残酷镇压去年十一月下旬武装袭击特利切里和普尔帕里警察局和发动农民反抗地主的革命者，将一百四十九名参加这些行动的革命者无理逮捕，关入隔离牢房，并对他们进行毒刑拷打和人身侮辱。这个邦政府还公然以“宣传暴力思想”，“以暴力夺取政权为目标”等作为所谓“罪名”，写入诬告这些革命者的“起诉书”中。"},{"type":"paragraph","text":"喀拉拉邦反动政府在二月下旬还曾经出动武装警察血腥屠杀伊迪基水力发电工程工地的工人，打死打伤工人二十多名。"},{"type":"paragraph","text":"喀拉拉邦反动政府的残酷镇压，不但没有使革命者屈服，反而激起了他们更加强烈的反抗。今年三月十二日，这个邦政府的反动法庭在判决延长被无理逮捕的革命者的拘留期限时，这些革命者毫不畏惧地同反动当局展开针锋相对的斗争。他们在法庭上不断高呼：“毛泽东万岁！”“武装革命万岁！”和“革命万岁！”等口号，抗议这项无理判决。他们还在监狱中英勇地举行绝食斗争，并且坚持阅读毛主席著作。"},{"type":"paragraph","text":"在印度修正主义分子参与执政的西孟加拉邦，邦政府正在对革命人民疯狂地实施法西斯统治。西孟加拉邦副首席部长、警察头子乔蒂·巴苏等印修分子，自从今年二月中旬在西孟加拉邦重新上台执政以来，已多次出动警察，血腥镇压邦内人民的革命斗争。他们上台后才两天，就出动警察用包铁皮警棍毒打基达普尔港一些正在进行斗争的雇员。在这个邦内，杜尔加柏炼钢厂工人的示威，科西普尔军火工厂工人的集会，特莱尼帕拉县和恰莫达尼县人民的示威，都遭到了反动警察的血腥镇压，许多人被警察打死打伤或被无理逮捕入狱。乔蒂·巴苏最近还发表声明，恶狠狠地叫嚷要“彻底摧毁”印度共产党革命派，他表示要武装一些暴徒来对付印共革命派。"},{"type":"paragraph","text":"乔蒂·巴苏等印修分子对反动的中央政府的官僚和大资本家等却是极为恭顺。西孟加拉邦的所谓“联合阵线政府”刚组成，乔蒂·巴苏就急忙到新德里去同中央政府的部长们“在融洽的气氛中”举行会谈。三月下旬，印度反动政府总理英迪拉·甘地到缅甸去活动，来回经过加尔各答时，乔蒂·巴苏两次去机场会见她，并恭恭敬敬地献上一束红玫瑰。西孟加拉邦政府还派代表同大财阀比拉和其他垄断资本集团进行勾搭。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“对广大人民群众是保护还是镇压，是共产党同国民党的根本区别，是无产阶级同资产阶级的根本区别，是无产阶级专政同资产阶级专政的根本区别。”"},{"type":"paragraph","text":"披着“共产党人”外衣的印度修正主义分子使用警察、法庭等专政工具镇压革命人民，而卖身投靠印度大资产阶级的事实充分暴露了他们背叛无产阶级的反革命真面目。这些事实向印度人民和全世界人民表明，“议会道路”的黑样板——印修分子控制的喀拉拉邦政府和西孟加拉邦政府，只不过是印度官僚买办资产阶级和封建地主向工农群众和广大人民实行反革命专政的工具。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cad1dc46c8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
