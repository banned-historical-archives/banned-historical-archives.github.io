s":["北京航空学院师生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——反对知识分子思想改造","type":"title"},{"text":"北京航空学院师生","type":"authors"},{"text":"“解放以来都没有春天，现在提出鸣放，大家说了些不敢说的话，正好说明了解放以来把人的思想压的过死。费孝通的‘知识分子的早春天气’我很同意。（在人大李景汉是被压得最厉害的典型，李景汉一直给青年教师做助教）。思想工作限制过多。搞思想工作也是专政，在学生中不要作思想工作。我们学校中没那么多思想工作工作，让学生好好念书就行了。”（北京航空学院一个职员）","type":"paragraph"},{"text":"“对于政治教育很反感，党对青年的教育是皮鞭，束缚压力。思想改造整死了人，整得人直说假话。”（北京航空学院一个学生）","type":"paragraph"},{"text":"“思想改造运动不仅老教授身受其苦，我们也不能幸免。”“思想改造太暴粗，老教授并非真正感动，而是受了委屈。”（北京航空学院一个助教）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7acc6708d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
