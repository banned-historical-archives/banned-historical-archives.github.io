art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"马来半岛工人和职员反对资本家剥削的斗争继续发展","authors":[],"parts":[{"type":"paragraph","text":"据新华社一九七四年三月二十二日讯 据“马来亚革命之声”电台报道，马来半岛各族工人和低薪职员反对资本家压迫和剥削的斗争在继续发展。"},{"type":"paragraph","text":"继二月初马六甲和槟城的半导体电子元件厂数千名女工要求增加工资的斗争取得胜利后，北赖一家纺织厂的四百名工人，为维护他们的利益在二月间也举行了罢工。二月二十日，槟城一家制衣厂的工人举行罢工，要求资方发给生活津贴。参加罢工的各族工人表示要团结一致，坚持斗争到底。工人们的斗争得到了槟城和威利斯省广大工人和劳动群众的同情和支持，最后迫使资方接受了他们的合理要求。"},{"type":"paragraph","text":"报道说，二月间在槟城和吡叻等地还有一家酿酒厂、一家烟草和塑胶公司、一家耐火砖公司和一家保险公司的工人和低薪职员先后展开了反对资本家剥削的斗争。据不完全统计，二月份参加斗争的工人超过了八千人，其中女工占多数。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff69caacff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
