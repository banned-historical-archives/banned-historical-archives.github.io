tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"陈毅副总理拜会肯雅塔总理转达毛主席、刘主席、周总理的热烈祝贺肯雅塔总理接受访问中国的邀请","authors":[],"parts":[{"type":"paragraph","text":"新华社内罗毕10日电 中华人民共和国国务院副总理兼外交部长陈毅元帅今天到总理办公厅拜会了肯尼亚总理乔莫·肯雅塔。"},{"type":"paragraph","text":"陈毅元帅向肯雅塔总理热烈祝贺肯尼亚在他领导下取得了光荣的独立。陈毅元帅还转达了毛泽东主席、刘少奇主席和周恩来总理对肯雅塔总理的热烈祝贺和最好的祝愿。他对肯雅塔总理说，刘少奇主席和周恩来总理委托他邀请肯雅塔总理访问中国。他说：“中国人民能同肯尼亚人民共享他们获得独立的欢乐，感到非常高兴。”"},{"type":"paragraph","text":"肯雅塔总理对陈毅元帅转达的祝贺和最好的祝愿表示感谢，并热烈欢迎陈毅元帅代表中国政府来到这里同他和肯尼亚人民一起欢庆肯尼亚的独立。他指出，肯尼亚同中国的关系有着悠久的历史。他接受了访问中国的邀请，并说：“我一有机会就将访问中国。”"},{"type":"paragraph","text":"陈毅元帅向肯雅塔总理赠送了礼品。他们进行了非常友好亲切的谈话。"},{"type":"paragraph","text":"拜会时在座的，肯尼亚方面有国务部长约瑟夫·穆隆比；中国方面有随同陈毅元帅的外交部西亚非洲司司长王雨田和随员吴学谦。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"073e406f5d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
