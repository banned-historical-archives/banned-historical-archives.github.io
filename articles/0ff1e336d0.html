界范围打败修正主义作出决定性贡献","authors":[],"dates":[{"year":1966,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利马列主义共产主义者联盟发表公报"},{"type":"paragraph","text":"中国文化大革命可以同巴黎公社相媲美"},{"type":"paragraph","text":"对在世界范围打败修正主义作出决定性贡献"},{"type":"paragraph","text":"新华社八日讯　罗马消息：意大利马列主义共产主义者联盟全国委员会最近发表公报，热烈赞扬中国无产阶级文化大革命，并且决定在意大利工人中间广泛介绍中国无产阶级文化大革命的成就和经验。"},{"type":"paragraph","text":"这个联盟的机关刊物《共产主义者》最新一期发表了这份公报，还登载了中国共产党中央委员会关于无产阶级文化大革命的决定和一篇题为《中国的文化革命：对无产阶级专政胜利的新的有力贡献》的文章。"},{"type":"paragraph","text":"公报说，“无产阶级文化大革命是世界无产阶级一百多年来为争取自身解放的斗争中一个有决定性重要意义的历史事件”，“它可以同巴黎公社、伟大的十月社会主义革命和中国人民的伟大解放战争相媲美。”"},{"type":"paragraph","text":"公报强调指出，当这场文化大革命“在人民中国内部挖掉可能产生修正主义的根子的时候，它就是对在世界范围内打败修正主义作出了决定性的贡献”。"},{"type":"paragraph","text":"公报接着说，全世界的马克思列宁主义者和意大利马列主义共产主义者联盟的成员，坚决支持以毛泽东同志为首的中国共产党中央委员会为击败反党反社会主义分子而采取的行动。"},{"type":"paragraph","text":"公报还宣布，意大利马列主义共产主义者联盟全国委员会决定采取以下三项紧急措施，以便在意大利工人中间广泛介绍中国无产阶级文化大革命的成就和经验："},{"type":"paragraph","text":"一、在机关刊物《共产主义者》上面系统刊载有关中国文化大革命的文件；二、组织讨论会，学习毛泽东的著作；三、出版一本广泛发行的书籍，其中刊载中国共产党《关于国际共产主义运动总路线的建议》、中国《人民日报》编辑部和《红旗》杂志编辑部发表的九篇评苏共中央的公开信的文章、有关中国无产阶级文化大革命的主要文件以及林彪同志的文章：《人民战争胜利万岁》。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ff1e336d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
