script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"6217a650-402c-431d-bc67-8fb48f4f35d2","name":"邓小平言论摘录（续编）（1976.4）","internal":false,"official":false,"type":"img","author":"北京大学、清华大学材料组编，1976.4","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/9.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/10.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/11.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/12.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/13.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/14.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/15.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/16.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/17.jpg"],"article":{"title":"×××同志揭发的邓小平的言论","alias":"","parts":[{"type":"paragraph","text":"其它问题"},{"type":"paragraph","text":"凡是资本主义泛滥严瓜的地方，都要象××省一样摘几个战役（按：指所谓反派性），把资本主义整下去。"},{"type":"paragraph","text":"关键还是班子问题，只要领导班子搞好了，文件上讲的七个“自由”（作物自由种植、手工业副业自由经营、自留地自由扩大、山林自山砍伐、统购统销产品自由买卖、劳力自由流动、集体收入自由分配）不难解决。"},{"type":"paragraph","text":"关于核算单位过渡问题"},{"type":"paragraph","text":"过渡要因地制宜，各省根据自己的特点搞规划。搞几个战役，头一两年刹风，整派性、贪污盗窃、投机倒把、铺张浪费。"},{"type":"paragraph","text":"（八）×××同志揭发的邓小平的言论（摘录）"},{"type":"paragraph","text":"（一九七六年三月十一日揭发）"},{"type":"paragraph","text":"去年夏季以来，邓小平把右倾翻案风刮到了××省。他在会议和个别谈话中，一再强调以“三项指示为纲”，妄图按照这条修正主义路线扭转××省的工作。"},{"type":"paragraph","text":"一、邓小平亲自出马，大讲××省形势“今不如昔”。说什么“农业拉了工业的后腿”，“副食品供应紧张”，捏造说工人“没有肉吃”，等等。××省这也落后，那也不行，"},{"type":"paragraph","text":"16总之文化大革命搞糟了。"},{"type":"paragraph","text":"二、去年七月，邓小平专门向XX省委鼓吹唯生产力论。他讲：“XX省委的工作，第一是农业”。还说：“文化大苹命以前，省委四个书记管农业，现在谁管”，要下决心"},{"type":"paragraph","text":"“改变这种局面”。实质上是要重新按照文化大革命以前划少奇的修正主义路线办事。"},{"type":"paragraph","text":"三、邓小平一再强调“反派性”，要××省过反派性这一关。在全省基本上形成了安定团结的情况下，邓小平大讲反派性，在省级机关和×、X两市开展反派性运动，势必纠缠历史旧账，破坏安定团结，转移斗争大方向。邓小平主张采取批斗，调离、抓人的办法来反派性，更是混清两类不同性质的矛盾，打击革命群众和革命干部。"},{"type":"paragraph","text":"四、在××省端动翻案。××省有一个地委书记，攻击文化大革命“搞糟了”。批林批孔运动中，揭露了这个地委书记的严重错误，经过批评教育，省委给了他停职反省的处分，并发了一个文件。全国农业学大赛会议期间，XX×同志跑到××组，召集地、县委书记讲话，赞扬这个地委书记"},{"type":"paragraph","text":"“敢讲”，说省委那个文件是错误的，要翻案，并说他自己没有承认过是走资派。这股风一下子刮到了全省。当时，弄不清风源在哪里。现在明白了，总后台是邓小平。早在去年七月十一日，邓就指示省委向××同志“请教”。全国农业学大案会议的讲话中，邓小平搬出已经批判过的、实践证明行不通的水利方针。…这个错误方针是××同志提的，实质上是支持他翻案。x×省本来贯彻老中青三结合的方针很不够。青年干部提拔使用得差，反而指责××省没有调动老干部的积极性，去年九、十月调整省委班子也要"},{"type":"paragraph","text":"17听×××的。很明显，邓小平不仅仅是答某人翻案的问题，而是要从政治上、思想上，组织上全面否定文化大革命。"},{"type":"paragraph","text":"（九）邓小平在接见全国工业书记"},{"type":"paragraph","text":"会议代表时的讲话（补充）"},{"type":"paragraph","text":"（一九七五年三月五日）"},{"type":"paragraph","text":"△不拉手了，现在工业情况还不好，等你们工业搞上去了再拉手。"},{"type":"paragraph","text":"△工业方面，确实值得引起严重注意。现在生产能力都没有发挥出来。去年一年，工业生产情况是不好的。当然，不平衡，有些行业好一些，石油是好的，电是好的。地区上有三分之一还可以，但有的地方受牵制。"},{"type":"paragraph","text":"第二个问题讲铁路。铁路不解决，计划统统打乱，什么计划都要落空。解决办法，还是集中。….·中央决定，是重申，根据铁路的特性，重申集中统一。"},{"type":"paragraph","text":"△这次确定，铁路的人事调动，还是由铁道部统一管理。铁路与地方闹派性的人是相联系的，他们懂得抓薄弱环节，把铁路一堵就到北京了。你那个××市，铁路的问题，省里就有人支持。要把铁路这条线同地方切断，把铁路上里通外线的割断。根据中央决定，铁道部有这个权。地方解决不了的，铁道部解决，调开那里，同样还在铁路，到哪里都"},{"type":"paragraph","text":"18工作嘛。这个话要讲济楚，以后就这么办。向全体职工动员时，也这样讲。当然是调头头。调动后，他又钻出个头头怎么办钻出来再调。"},{"type":"paragraph","text":"△闹得厉害的人，两派的头头都要调离。八个书记，有的不干事，有的可调省冶金局当顾问，当顾问去嘛，何必占着茅坑不拉屎。×快到二十年了，就没有人？没有从别的地方调。总之不能拖，拖到哪一年呢？社会主义等他怎么行呢？"},{"type":"paragraph","text":"（十）邓小平在国务院办公会议上"},{"type":"paragraph","text":"的讲话（补充）"},{"type":"paragraph","text":"（一九七五年五月二十一日）"},{"type":"paragraph","text":"（当××同志汇报到整个国民经济产值一至四月份比去年同期增长百分之八时）"},{"type":"paragraph","text":"和去年同期相比这个语言要取消。"},{"type":"paragraph","text":"电网有个体制问题，大电网有的跨省，有的超过了过去的大区，该集中的必须集中，大电网集中到中央，委托水电部来管。集中了，在电力不够时，才能牺性某些方面保重点。要写个报告，首先解决这个问题。"},{"type":"paragraph","text":"△（当××同志汇报到钢铁工业上得不理想时）不能说是上，象鞍钢这样大企业要稳定正常生产，不拼"},{"type":"paragraph","text":"19"}],"authors":[],"dates":[{"year":1976,"month":3,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":11,"page_end":12},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1008d143a2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
