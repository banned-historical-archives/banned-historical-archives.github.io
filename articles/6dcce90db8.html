art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"真正择优招生","authors":[],"parts":[{"type":"paragraph","text":"邓小平同志曾经要求军队的院校发挥“集体干部部”的作用。要完成这个艰巨而光荣的任务，头一个问题就是一定要选送合格的优秀学员；学员质量太差，不具备深造的条件，怎么能培养出符合现代化建设需要的人才呢？因此，招收学员质量的高低对于能不能培养出优秀人才至关重要。农民都知道，要获得农作物的好收成，必须选育良种，“选好一粒种，增产千粒粮”；育林工作者也懂得，要培育栋梁之材，应该先选好树苗，苗壮方能根深，根深才能叶茂。这个道理，也适用于院校招生。选拔优秀的干部战士进院校学习，是培养人才的第一步工作。"},{"type":"paragraph","text":"把好招生质量关，院校和部队都负有重要责任。这里一个重要问题在于真正“择优”。这就要出以公心，坚持原则，防止和克服本位主义、“照顾关系”、走后门等不正之风，就要强调“坚持条件，宁缺勿滥”。党和国家花了那么大的力量、那么多的钱兴办各类军事院校，目的是要培养出大批适应现代化建设的人才。如果招生质量不高，甚至有的毕业即转业，那怎么能够达到培养优秀人才的目的呢？这对国家的人力和物力，都是一种极大的浪费。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dcce90db8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
