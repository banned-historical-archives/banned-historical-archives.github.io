" crossorigin="">{"props":{"pageProps":{"books":[{"id":"6217a650-402c-431d-bc67-8fb48f4f35d2","name":"邓小平言论摘录（续编）（1976.4）","internal":false,"official":false,"type":"img","author":"北京大学、清华大学材料组编，1976.4","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/9.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/10.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/11.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/12.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/13.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/14.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/15.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/16.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/17.jpg"],"article":{"title":"邓小平通知×××同志到××省委工作时的谈话","alias":"","parts":[{"type":"paragraph","text":"办，难道新的指示不算数吗？就可以不执行！？"},{"type":"paragraph","text":"（三）邓小平通知×xx同志到xx省"},{"type":"paragraph","text":"委工作时的谈话（摘录）"},{"type":"paragraph","text":"（一九七五年九月二十一日）"},{"type":"paragraph","text":"（你）去了，还是搞班子，反资产阶级派性，要放手发动群众，坚决摘。相信你去会把工作搞好，我不怕你在工作上出什么问题，就怕你勇气不够，不大胆。靠边站了这样多年，对过去的经验教训不能正确吸取，不敢大胆负责，要怕就怕你这一点。×××到××省，X××到××省也不过是几个月时间，局面就改变了，主要是大胆，不怕。现在有些干部就是怕被打倒，不要怕被打倒，不怕犯错误。打倒一次还怕打倒第二次！？如果把工作搞好了再打倒也没关系。文化大革命中的那些问题一概把它忘记，根本不要去想它，也不要去提了。我记性不好，都忘记了。不要顾虑多得很，怕这怕那就办不好事情，毛主席的路线就贯彻执行不了。"},{"type":"paragraph","text":"你去了，班子问题你考虑，关键是团结、使用老干部，解放老干部。有的人无非要说你是“还乡团”、搞“复辟倒退”等等。（X：我一按排老干部，有人就说“蛾冒山幽灵和乌山幽灵结合起来了”，搞“右倾复辟了”）他说他的，搞事情总是有人要反对，不要怕。反正领导班子同题要解"},{"type":"paragraph","text":"6决，要调收，老干部婴依作。"},{"type":"paragraph","text":"几个文件（指核算单位过渡问题的几个文件）你们看后有些什么想法？当然，有一些现在还不行，但是每个县总有一些比较好的大队可以试行，可以分批地。这条路肯定要走，大家要作点调查研究，然后按照实际情况逐步地走。…×××同志讲的儿条理由中还差一条，就是一定要同八O年基本实现农业机械化这个问题结合起来考。要实现机械化，核算单位不大一点怎么行？"},{"type":"paragraph","text":"（XX同志讲到最近下边有许多政治谣言）主要是报上发表了评《水浒》的文章引起的。"},{"type":"paragraph","text":"（四）邓小平在中央农村工作座谈会"},{"type":"paragraph","text":"预备会上的讲话（摘录）"},{"type":"paragraph","text":"（一九七五年九月二十二日）"},{"type":"paragraph","text":"有部分地区约有三分之一的党员不纯，主要是“双突”的问题，影响很大。这就涉及到新发展的党员、新提拔的干部，符不符合主席指示的五条标准。请示主席后，政治局也曾谈到要整顿，主席在七一年就谈过，军队要整顿，地方也要整顿。军委扩大会议主要是整军。最近请示主席，还有工业方面、农业方面，以及其它方面，比如科学研究，文艺双百方针等，也要整顿。主席曾说文艺政策要调整，我们理解"},{"type":"paragraph","text":"6决，要调收，老干部婴依作。"},{"type":"paragraph","text":"几个文件（指核算单位过渡问题的几个文件）你们看后有些什么想法？当然，有一些现在还不行，但是每个县总有一些比较好的大队可以试行，可以分批地。这条路肯定要走，大家要作点调查研究，然后按照实际情况逐步地走。…×××同志讲的儿条理由中还差一条，就是一定要同八O年基本实现农业机械化这个问题结合起来考。要实现机械化，核算单位不大一点怎么行？"},{"type":"paragraph","text":"（XX同志讲到最近下边有许多政治谣言）主要是报上发表了评《水浒》的文章引起的。"},{"type":"paragraph","text":"（四）邓小平在中央农村工作座谈会"},{"type":"paragraph","text":"预备会上的讲话（摘录）"},{"type":"paragraph","text":"（一九七五年九月二十二日）"},{"type":"paragraph","text":"有部分地区约有三分之一的党员不纯，主要是“双突”的问题，影响很大。这就涉及到新发展的党员、新提拔的干部，符不符合主席指示的五条标准。请示主席后，政治局也曾谈到要整顿，主席在七一年就谈过，军队要整顿，地方也要整顿。军委扩大会议主要是整军。最近请示主席，还有工业方面、农业方面，以及其它方面，比如科学研究，文艺双百方针等，也要整顿。主席曾说文艺政策要调整，我们理解"}],"authors":["邓小平"],"dates":[{"year":1975,"month":9,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":6,"page_end":6},"tags":[{"name":"邓小平","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d476cf42f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
