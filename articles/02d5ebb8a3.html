ates":[{"year":1951,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十四日电】　八月十四日为巴基斯坦国庆日。我中央人民政府毛泽东主席和政务院周恩来总理分别致电巴基斯坦总督纳齐穆丁和总理阿里汗祝贺。两电电文如下:"},{"type":"paragraph","text":"(一)毛主席贺电:"},{"type":"paragraph","text":"巴基斯坦总督纳齐穆丁先生:"},{"type":"paragraph","text":"值此贵国国庆纪念之际，我代表中华人民共和国政府及人民护向阁下及巴基斯坦人民致庆贺之忱，并祝中巴两国人民的友谊与日俱增。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东一九五一年八月十四日于北京(二)周总理贺电:"},{"type":"paragraph","text":"巴基斯坦总理阿里汗先生:"},{"type":"paragraph","text":"欣逢贵国国庆，特此庆贺，并祝巴基斯坦人民幸福和进步。中华人民共和国中央人民政府政务院总理周恩来一九五一年八月十四日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02d5ebb8a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
