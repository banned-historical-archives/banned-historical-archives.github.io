ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"复林伯渠、董必武电","alias":"","parts":[{"type":"paragraph","text":"复林伯渠、董必武电"},{"type":"paragraph","text":"（1944年9月18日）"},{"type":"paragraph","text":"严肃批评，并指蒋名，甚为必要。如五参政员决定来延安最尖锐的批评可以暂停，但决不可作为条件，只可说如五参政员去延安及国民党态度改善，延安批评自然会和缓。"},{"type":"paragraph","text":"[1]这是毛泽东对林伯渠、董必武16日关于国民参政会开会情况的来电的复电的主要内容。"},{"type":"paragraph","text":"[2]1944年9月15日，国民参政会决议，由参政员冷通、胡政之、王云五、傅斯年、陶孟和5人组成延安视察团，赴延安视察，并于返渝后向政府提出关于加强全国统一团结之建议。后来，1945年7月到延安与中共会谈的参政员是6位，即褚辅成、黄炎培、冷通、傅斯年、左舜生、章伯钧。"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":130,"page_end":130},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f78052eeb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
