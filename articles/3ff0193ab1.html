script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广东省和湛江市各界盛会欢迎印尼受害华侨胜利归来华侨感谢领袖关怀祝愿毛主席万寿无疆侨务委员会代表最强烈抗议印尼政府最近变本加厉地进行反华排华活动","authors":[],"dates":[{"year":1966,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社湛江29日电　广东省和湛江市各界人民今天上午举行盛大集会，热烈欢迎第二批乘光华轮回国的印度尼西亚受害华侨。"},{"type":"paragraph","text":"欢迎大会在湛江市人民礼堂举行。会场内外，高悬着“毛主席领导的社会主义祖国是华侨最有力的靠山”、“向坚持民族气节英勇斗争的爱国华侨致敬”等巨幅标语。主席台旁，两幅大型的毛主席语录牌上，闪烁着毛主席向全世界的庄严宣告:“我们的民族将再也不是一个被人侮辱的民族了，我们已经站起来了。”“帝国主义的寿命不会很长了，他们做尽了坏事，全世界一切受压迫的人民决不会饶恕他们。”"},{"type":"paragraph","text":"在毛泽东思想的感召下，冲破印尼反动派设下的重重障碍胜利回到祖国的侨胞们，胸前挂着金光闪闪的毛主席像章，手里拿着红彤彤的《毛主席语录》，兴高采烈地参加了欢迎大会。当在印尼监狱中进行过四十天英勇斗争的四十一名华侨青少年走上主席台时，全场不断高呼:“打倒印尼反动派!”“向坚持民族气节英勇斗争的爱国华侨致敬!”“战无不胜的毛泽东思想万岁!”"},{"type":"paragraph","text":"大会在庄严的《东方红》乐曲声中开始。湛江专区接待和安置归国华侨委员会主任委员冯志仁致欢迎词以后，大会首先宣读了中华人民共和国华侨事务委员会主任、接待和安置归国华侨委员会主任委员廖承志给第二批回国印尼受害华侨的慰问电。"},{"type":"paragraph","text":"接着，华侨事务委员会代表朱毅在会上讲话，向第二批回国的印尼受害华侨表示最亲切的慰问和最热烈的欢迎。他说，尽管印尼反动派用野蛮的暴力行为对付手无寸铁的华侨，但是暴力是吓不倒爱国华侨的。特别是被棉兰陆军当局无理扣押了四十天的四十一名难侨青少年，威武不屈，坚持斗争，顶住了印尼反动派的野蛮迫害。他们的英雄气概大大地长了人民的志气，灭了敌人的威风。他们以自己的英勇斗争，谱写了又一首毛泽东思想的凯歌。他们不愧为有着光荣爱国传统的优秀华侨青年，不愧是伟大祖国的好儿女，不愧是毛泽东时代的好华侨。他们的英雄业绩是国外华侨斗争的光辉榜样。"},{"type":"paragraph","text":"朱毅在讲话中对印尼政府最近变本加厉地进行反华排华活动，表示极大的愤慨和最强烈的抗议。他说，我们严正警告印尼政府:你们这样做是绝对行不通的。你们只能是搬起石头打自己的脚，绝不会有什么好下场。"},{"type":"paragraph","text":"广东省副省长曾生和专程来湛江迎接受害华侨的福建省华侨事务委员会副主任、福建省接待和安置归国华侨委员会副主任委员祝增华，以及湛江市的工人代表和红卫兵代表，也在会上讲了话。"},{"type":"paragraph","text":"在暴风雨般的掌声中，四十一名难侨青少年代表吴招安和归国华侨代表刘瑞霞，先后讲了话。吴招安说:在我们被非法拘留的四十天里，敌人使尽了各种卑鄙无耻的手段，但是丝毫也不能动摇我们捍卫祖国尊严和荣誉的决心。这是因为我们心中有一颗最红最红的红太阳，斗争越艰巨，我们就越想念最最敬爱的伟大领袖毛主席，一想到他老人家，我们就增添了无限的信心和力量。我们斗争的胜利，就是伟大的战无不胜的毛泽东思想的胜利。吴招安讲到这里时，全场响起了“战无不胜的毛泽东思想万岁”的欢呼声。"},{"type":"paragraph","text":"吴招安说:我们向最敬爱的党，最亲爱的祖国人民，最最敬爱的伟大领袖毛主席保证:我们一定要永远读毛主席的书，听毛主席的话，照毛主席的指示办事，做一个真正的无产阶级革命事业的接班人。"},{"type":"paragraph","text":"刘瑞霞在讲话中向最了解华侨疾苦的、最关怀华侨处境的、最支持华侨正义斗争的伟大领袖毛主席致以深切的感谢，衷心祝愿毛主席万寿无疆。他向祖国亲人汇报了在印尼棉兰华侨中学难侨“收容所”的难侨，英勇反击印尼右派暴徒袭击的事迹。他表示，今后一定要更高地举起毛泽东思想伟大红旗，活学活用毛主席著作，好好向祖国人民学习，跟上祖国的革命形势，和祖国人民一起把社会主义祖国建设得更强大，更美好。"},{"type":"paragraph","text":"不辜负祖国人民的重托，胜利完成了接运第二批回国印尼受害华侨的光华轮全体海员，今天也参加了大会。当他们列队进入会场时，全场报以极其热烈的掌声。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ff0193ab1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
