script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜内阁举行盛大国庆宴会  金日成首相崔庸健委员长等党政领导人出席","authors":[],"dates":[{"year":1965,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜内阁举行盛大国庆宴会"},{"type":"paragraph","text":"金日成首相崔庸健委员长等党政领导人出席"},{"type":"paragraph","text":"新华社平壤九日电  朝鲜民主主义人民共和国内阁今晚举行盛大宴会，庆祝共和国成立十七周年。"},{"type":"paragraph","text":"金日成首相、崔庸健委员长和朝鲜其他党政领导人朴金喆、金昌满、金光侠、洪命熹出席了宴会。"},{"type":"paragraph","text":"各国驻朝鲜外交使节和外国客人应邀出席了宴会。"},{"type":"paragraph","text":"朝鲜最高人民会议常任委员会委员长崔庸健在宴会上致词说，“共和国成立十七年来，我国人民在朝鲜劳动党和金日成同志的领导下，战胜了重重艰难困苦和经受了各种考验，在革命斗争和建设事业中取得了伟大的胜利。”"},{"type":"paragraph","text":"崔庸健说，“我国人民加强了共和国的政治、经济和军事力量，从而铜墙铁壁般地巩固了我们的革命基地。今天，我们共和国作为一个强有力的社会主义国家，正在日益昌盛发展，它的国际威望正在不断提高。”"},{"type":"paragraph","text":"崔庸健指出，朝鲜北半部人民在社会主义革命和社会主义建设中所取得的伟大胜利，强有力地推动着南半部人民的反美救国斗争。他说，“南朝鲜人民必将加强团结，更加英勇地进行斗争，粉碎卖国的‘韩日条约’，推翻美帝国主义的殖民统治。美帝国主义在南朝鲜的失败是不可避免的，我国的统一必将由南北朝鲜全体人民团结一致的力量来实现。”"},{"type":"paragraph","text":"崔庸健谴责美帝国主义野蛮地镇压亚洲、非洲、拉丁美洲人民的民族解放斗争。他说，今天，越南人民反对美帝国主义武装侵略进行的斗争，是全世界人民反美斗争的焦点。朝鲜人民将尽自己的一切力量来支持越南人民的抗战，并为了反对共同的敌人——美帝国主义，将同越南人民一道斗争到底。"},{"type":"paragraph","text":"崔庸健表示，朝鲜人民将同全世界进步人类一起，为反对以美国为首的帝国主义侵略势力，为全世界人民争取和平、独立、民主和社会主义的共同事业进行坚决的斗争。（附图片）"},{"type":"paragraph","text":"九月九日，朝鲜驻华大使馆临时代办郑凤珪举行招待会，庆祝朝鲜民主主义人民共和国成立十七周年。刘少奇主席、周恩来总理等出席了招待会。左起：林枫、郭明秋、郑凤珪夫人、邓小平、刘少奇、郑凤珪、周恩来、彭真、贺龙、罗瑞卿。新华社记者  刘庆瑞摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d4148006f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
