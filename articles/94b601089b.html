rs":[],"dates":[{"year":1969,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河南革命工人满怀深厚的无产阶级感情"},{"type":"paragraph","text":"高质量高速度印制发行毛主席著作"},{"type":"paragraph","text":"据新华社郑州电　在党的第九次全国代表大会隆重开幕的特大喜讯鼓舞下，河南省出版、印刷、发行等部门的广大革命工人和革命干部，在解放军的帮助下，怀着对伟大领袖毛主席无限热爱的深厚无产阶级感情，以最好的质量、最快的速度，大量印制、发行毛主席的光辉著作，为传播伟大的毛泽东思想作出了新的贡献。"},{"type":"paragraph","text":"河南省出版、印刷、发行等部门的广大革命工人、革命干部和解放军支左人员，都把高质量、高速度地印制和发行毛主席著作，作为自己最光荣的政治任务。“九大”隆重开幕以来，全省印制、发行《毛泽东选集》精装袖珍合订本十六万册，《毛主席语录》袖珍本六百万册，毛主席语录、毛主席的五篇著作、毛主席诗词精装合订本六十五万七千册，并陆续运往城乡各地。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94b601089b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
