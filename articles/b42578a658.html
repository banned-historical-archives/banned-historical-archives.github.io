s":[{"year":1963,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达二十一日电】　中华人民共和国国务院副总理、体育运动委员会主任贺龙元帅今天下午在这里的中国大使馆接见旅居印度尼西亚的华侨代表。"},{"type":"paragraph","text":"贺龙元帅在同华侨代表谈话时，转达了毛泽东主席对华侨的关怀。他要求华侨遵守印度尼西亚政府的法律，尊重印度尼西亚人民的风俗习惯和进一步加强同他们的友好关系。"},{"type":"paragraph","text":"受接见的，有雅加达的华侨代表和前来观看第一届新兴力量运动会的印度尼西亚其他城市的华侨代表，共一百二十人。"},{"type":"paragraph","text":"接见时在座的，有中国驻印度尼西亚大使姚仲明和中国驻雅加达总领事徐仁。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b42578a658"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
