"authors":[],"dates":[{"year":1975,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市公安机关广大干部、民警，认真学习毛主席关于理论问题的重要指示和马克思主义关于无产阶级专政的论述，联系社会上阶级斗争和两条路线斗争的实际，进一步明确了社会主义社会还存在着产生修正主义的社会基础和复辟资本主义的危险性，加深理解“无产阶级专政是群众专政”的重要意义，自觉地依靠上海民兵和广大革命群众，加强对资产阶级实行全面专政。"},{"type":"paragraph","text":"公安机关的广大干部、民警，在各级党组织的领导下，反复学习了毛主席关于理论问题的重要指示，认真学习了马克思、恩格斯、列宁论无产阶级专政的语录，还选学了《国家与革命》、《哥达纲领批判》、《论人民民主专政》等马列著作和毛主席著作的有关章节，联系当前社会上阶级斗争和两条路线斗争的实际，总结公安工作贯彻群众路线，实行群众专政的新鲜经验，进一步弄清楚了群众专政是由无产阶级专政的性质、任务所决定的。列宁指出:“我们的目的是要吸收全体贫民实际参加管理工作”“要造成使资产阶级既不能存在，也不能再产生的条件”。只有坚持群众专政，才能对地、富、反、坏分子实行有效的专政，才能在上层建筑其中包括各个文化领域中对资产阶级实行全面专政，才能铲除产生新的资产阶级分子的土壤。许多区、县公安局的干部、民警也进一步加深了对上海民兵参加社会阶级斗争这一社会主义新生事物的认识。"},{"type":"paragraph","text":"公安机关的干部、民警从理论与实践的结合上，进一步明确了无产阶级专政是群众专政的重要意义，提高了依靠群众专政的自觉性。他们深有体会地说:凡是坚持贯彻执行毛主席关于在党委领导下通过群众肃反的路线，斗争就胜利，工作就有成绩。公安机关与上海民兵团结战斗，开展对敌斗争，维护社会治安，保卫社会主义革命和建设；公安机关依靠工人阶级共同办案、审案，监督改造犯罪分子等等，使无产阶级专政机关的职能、作用得到了进一步发挥，巩固和加强了无产阶级专政。卢湾公安分局遵照毛主席关于“巩固无产阶级专政，要落实到每个工厂、农村、机关、学校”的教导，通过宣传群众，组织了一支以退休工人、职工家属为主体的有一万多名治安积极分子参加的群众专政队伍，他们在党委领导下，落实了对四类分子监督、改造的措施，加强了对少数违法的青少年的教育工作，打击了幕后教唆犯，进一步加强了对资产阶级实行全面专政。上海县公安局的广大干部、民警，在学习毛主席关于理论问题重要指示的过程中，回顾与民兵一起加强社会治安管理，抵制农村自发资本主义倾向，打击帝修反的特务破坏活动的实际，深有体会地说:“过去我们吃了不依靠群众的苦头，现在尝到了依靠群众专政的甜头”，“千难万难，依靠了广大群众和民兵就不难”。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46e5e17ef8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
