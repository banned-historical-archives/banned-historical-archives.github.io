ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于同意中、苏、蒙对修中蒙铁路的意见的电报","alias":"","parts":[{"type":"paragraph","text":"关于同意中、苏、蒙对修中蒙铁路的意见的电报"},{"type":"paragraph","text":"（1952年9月6日）恩来同志："},{"type":"paragraph","text":"九月四日电收到。同意你们关于中苏蒙铁路的意见，并同意待铁路修成后再行公布协定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月六日"},{"type":"paragraph","text":"[1]指周恩来1952年9月4日关于同意苏蒙两国提出的中苏蒙三国对修中蒙间铁路协定的报告。报告说，协定草案的中心问题有四：（一）双方（中国为一方，苏、蒙为一方）对修铁路至中蒙边境；（二）双方均按一五二四公厘宽轨修筑；（三）今年开始勘察设计，1953年动工，1955年内完成；（四）该路由内燃机车牵引，具备每昼夜对开十二次列车的能力，将来经协议提高到每昼夜对开二十四次列车。关于协定公布时间，我们表示同意斯大林的意见，待铁路修成后再行公布。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":232,"page_end":232},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb2ab8cd3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
