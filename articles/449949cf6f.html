art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永做毛主席的红哨兵","authors":["曹王松/晏全根"],"parts":[{"type":"paragraph","text":"战士们说：“为了以实际行动落实毛主席的‘抓革命，促生产，促工作，促战备’的指示，当好毛主席的红哨兵，执勤中就一分一秒不能马虎。错过一分一秒，就是对毛主席的最大不忠。”入伍不到四个月的新战士钟以模，时刻用“完全”“彻底”两把尺子衡量自己，用两个“极端”对照自己。在一个阴霾的天气里，他用观察兵特有的锐利眼睛，穿过茫茫大海，发现一个小黑点，他死死盯住不放。可是由于海面气候变化无常，一会儿晴空万里，一会儿又大雾迷漫。他监视的小黑点时隐时现，盯着盯着突然不见了，搜索许久也未找到。钟以模正要怀疑：大白天敌人会出来吗？毛主席关于“绝对不可以稍微松懈自己的战斗意志，任何松懈战斗意志的思想和轻敌的思想，都是错误的”的教导，顿时回响在他的耳边，他立即擦亮镜头，继续搜索，终于在一个“死角”上又抓住了这个目标。他立即报告上级，为惩罚这一小股敌人起了耳目作用。"},{"type":"paragraph","text":"这个哨所的同志为保卫毛主席、保卫文化大革命，日夜战斗在海防前哨，为人民立了新功。（曹王松、晏全根）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"449949cf6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
