ear":1978,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理同福田首相再次举行会谈"},{"type":"paragraph","text":"新华社东京十月二十五日电　邓小平副总理同福田赳夫首相今天上午在日本首相官邸举行了第二次会谈。"},{"type":"paragraph","text":"福田首相代表日本政府邀请华国锋总理在适当的时候访问日本。邓副总理表示一定转达日本政府的好意，并代表华总理和中国政府愉快地接受了这一邀请。"},{"type":"paragraph","text":"会谈中，双方就朝鲜局势问题各自阐述了自己的立场，希望朝鲜问题根据自主和平统一的原则得到解决。"},{"type":"paragraph","text":"双方强调，在中日和平友好条约的基础上，进一步加强往来，发展经济、文化、贸易等方面的合作。"},{"type":"paragraph","text":"双方对会谈表示满意。（附图片）"},{"type":"paragraph","text":"十月二十五日上午，邓小平副总理和福田赳夫首相在日本首相官邸举行了第二次会谈。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"},{"type":"paragraph","text":"十月二十五日晚，邓小平副总理在东京举行盛大答谢宴会。福田首相出席宴会。      新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4a989000f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
