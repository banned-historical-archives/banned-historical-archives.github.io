art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席会见杜梅副总理等越南同志华主席同杜梅副总理等越南同志进行了亲切友好的谈话 谷牧副总理等参加会见","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年十二月六日讯 中国共产党中央委员会主席、国务院总理华国锋，今天下午会见了越南社会主义共和国政府副总理杜梅及其随行人员。"},{"type":"paragraph","text":"会见时，华国锋主席同杜梅副总理等越南同志进行了亲切友好的谈话。杜梅副总理首先向华主席转达孙德胜主席、越南劳动党中央委员会第一书记黎笋、国会常务委员会主席长征和政府总理范文同的问候。华国锋主席请杜梅副总理回国以后，转达他对孙德胜、黎笋、长征和范文同同志的问候。"},{"type":"paragraph","text":"参加会见的有："},{"type":"paragraph","text":"国务院副总理谷牧、外交部副部长韩念龙；"},{"type":"paragraph","text":"越南驻中国大使馆临时代办陈中。（附照片）"},{"type":"paragraph","text":"中国共产党中央委员会主席、国务院总理华国锋，十二月六日会见越南社会主义共和国政府副总理杜梅及其随行人员。"},{"type":"paragraph","text":"华国锋主席同杜梅副总理亲切握手。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"谷牧","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0db1fdf7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
