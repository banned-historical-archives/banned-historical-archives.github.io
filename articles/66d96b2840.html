script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在批林批孔运动中，求新造船厂铜工弯管小组的同志发扬在斗争　中坚持学习和应用马克思主义哲学的好学风，批判修正主义、批判　“中庸之道”。在新的一年中，他们决心——继续在斗争中学哲学、用哲学","authors":[],"dates":[{"year":1975,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在普及、深入、持久开展的批林批孔运动中，求新造船厂铜工弯管小组的同志发扬在斗争中坚持学习、应用马克思主义哲学的好学风，理论联系实际。他们认真学习了毛主席的光辉著作《矛盾论》，反复批判了林彪、孔老二鼓吹的反动哲学“中庸之道”。工人们说:我们要坚持马克思主义的斗争哲学，就要不断地同“中庸之道”进行斗争，在斗争中促使事物的转化，达到革命的目的。"},{"type":"paragraph","text":"前一时期，这个小组接到一批弯管任务，加工时发现管子质量不好。大家提出不能加工，并立即向厂、车间等有关领导反映这一情况。但是有关领导既不点头又不摇头，坚持要他们把这批任务提前完成，向厂领导报喜，结果“报喜”成了“报废”，浪费了人力、物力。在学习和批判中，小组的同志重温了毛主席关于“我们必须坚持真理，而真理必须旗帜鲜明”的教导，狠批了貌似“不偏不倚”的“中庸之道”，认识到在报废管子问题上，某些领导那种既不点头又不摇头、模棱两可的态度，正是“中庸之道”的反映。同时，回顾了本小组在这个问题上没有坚持斗争哲学的教训。工人们说:“共产党的哲学就是斗争哲学”。学哲学不讲斗争就是阉割了马克思主义的灵魂。于是，他们立即写了一份题为《从弯制一批大管子的报废，看我厂企业管理上存在的两条路线斗争》的大字报，尖锐地批评了某些领导不相信群众，不走群众路线的错误思想。"},{"type":"paragraph","text":"这个小组的同志在理论联系实际，深入批判“中庸之道”的斗争中，充分发挥工人的工厂主人翁作用。按照他们的说法是:在一个企业内部，作为领导干部，肩负着带领群众前进的责任；工人群众也有帮助领导的义务。这种“带”与“促”的关系，正是一种社会主义的新型生产关系，而我们社会主义企业，也正是通过领导的“带”与群众的“促”这样无穷的往复而不断发展和前进的。"},{"type":"paragraph","text":"这个小组的同志们说得好:我们在斗争中坚持马克思主义斗争哲学的目的，正是为了在各个领域里不断打破旧的矛盾的统一体，推动革命和生产的发展。去年一年，这个小组的生产任务是十分艰巨的，在任务重、人手少的情况下，他们以大学大批带动大干大变，坚持向技术革新要人力、要设备、要时间，使生产任务月月超额完成。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66d96b2840"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
