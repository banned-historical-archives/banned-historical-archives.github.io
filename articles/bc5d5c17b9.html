tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"重庆红岩革命纪念馆展出毛泽东同志的珍贵照片和手迹","authors":[],"parts":[{"type":"paragraph","text":"新华社重庆12月21日电 在毛泽东同志诞辰九十周年前夕，重庆红岩革命纪念馆展出了以前从未发表和展出过的毛泽东同志的十四幅珍贵历史照片和一件手迹。"},{"type":"paragraph","text":"作为红岩革命纪念馆一部分的桂园，是毛泽东同志当年在重庆与国民党谈判时办公、会客的地方。这里新增加了五幅照片，其中有：毛泽东同志1945年8月到重庆时，与周恩来、王炳南同志和美国大使赫尔利在九龙坡机场的合影；重庆谈判前，毛泽东、朱德、周恩来、王若飞等同志在延安与前去接中共代表团的张治中先生的合影；毛泽东同志离渝时在机场拍的半身照片等。"},{"type":"paragraph","text":"红岩村陈列室新增加了四幅照片，其中有：毛泽东、周恩来同志当年抵达重庆时，受到中外人士、记者和八路军办事处、新华日报社同志欢迎的照片；毛泽东同志在重庆时应邀到蒋介石官邸与蒋介石、蒋经国、王世杰、张群、赫尔利的合影；毛泽东同志离渝时，陈诚代表蒋介石到机场送行的照片等。"},{"type":"paragraph","text":"展出的手迹是毛泽东同志在重庆时为柳亚子先生的邻居、当时的一位中学生卢国琦题的词：“为和平民主团结而奋斗”。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"重庆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc5d5c17b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
