script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国在朝鲜停战谈判中屡次提出无理要求  引起英国若干资产阶级舆论公开不满  泰晤士报主张接受三八线为军事分界线停止侵朝战争","authors":[],"dates":[{"year":1951,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国在朝鲜停战谈判中屡次提出无理要求"},{"type":"paragraph","text":"引起英国若干资产阶级舆论公开不满"},{"type":"paragraph","text":"泰晤士报主张接受三八线为军事分界线停止侵朝战争"},{"type":"paragraph","text":"【新华社五日讯】美国方面在朝鲜停战谈判中屡次提出无理要求的事实，已引起了侵朝主要帮凶国家英国的资产阶级舆论的公开不满。伦敦泰晤士报于十月一日发表社论，主张接受三八线为军事分界线，停止侵朝战争。该报称：“接受三八线为分界线是很合理的。”该报又称：美国方面“继续在战场上和会议桌上，为了实际上以后并不打算保持的几哩土地而争斗，是有一些说不通的。”该报主张“立即宣布愿意承认三八线为南北分界线而谋求政治解决”。泰晤士报结语表示：美英目前只有两条道路，或者是为了占领整个朝鲜而继续战争，或者是在三八线上和平，而第一种办法已为美国人民与联合国其他会员国所拒绝了。"},{"type":"paragraph","text":"在此以前，英国若干资产阶级报刊曾一再对美国破坏停战谈判的危险政策表示不满和担忧。英国“经济学家”周刊针对美方所散布的所谓中朝方面没有和平诚意的谰言说：“在最近几周中，有一个确定的事实，即主张停战的第一个行动确乎来自共产党。”伦敦泰晤士报九月二十一日的香港专电称：“从来没有任何迹象暗示共产党人曾经放弃他们要求停火的明显意图。”英国“曼彻斯特卫报”在九月二十四日发表社论反驳美国所散布的朝中方面不愿谈判停战的谣言说：“如果他们的目的起初就是以获得时间重整并养息他们的军队为主，那末他们就不会再对谈判感到兴趣了。”该报劝告李奇微不要“放弃谈判”，以免“付出死伤”。该报说："},{"type":"paragraph","text":"“随着另一个朝鲜冬季的到来，那是一个可怕的远景，虽然李奇微将军和范佛里特将军很乐观地瞻望这个远景。毫无疑问，每一个谈判的机会必须加以利用。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e062f6e67e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
