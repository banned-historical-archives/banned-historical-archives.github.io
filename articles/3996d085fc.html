促生产的实际行动支援世界人民革命斗争","authors":[],"dates":[{"year":1971,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海搪瓷六厂党委组织全厂群众认真学习毛主席的“五·二○”庄严声明和《抗日战争胜利后的时局和我们的方针》等光辉著作，使大家进一步认清帝国主义、社会帝国主义的反动本质，不断增强战备观点，推动了革命和生产的发展。"},{"type":"paragraph","text":"前一时期，这个厂部分群众在国际、国内一派大好形势下，产生了和平麻痹思想。有的认为，世界各国人民的革命斗争不断高涨，我国的国际威望日益提高，美帝国主义和社会帝国主义不敢那么轻举妄动了，从而放松了革命的警惕性。厂党委针对这种思想，及时组织大家认真学习毛主席《抗日战争胜利后的时局和我们的方针》一文中关于“国民党怎么样?看它的过去，就可以知道它的现在；看它的过去和现在，就可以知道它的将来”的伟大教导，引导大家认清帝国主义和社会帝国主义的侵略本性是不会改变的。大家说，美帝国主义长期以来在世界各地到处侵略，霸占了我国领土台湾，而且至今还在搞“两个中国”的反革命阴谋；我们从美帝的过去和现在，就可以看到它的侵略本性是永远不会改变的。厂党委还把社会帝国主义反华罪行编印出来给大家看，发动全厂群众声讨这一滔天罪行。通过这些活动，大家进一步认清了美帝国主义和社会帝国主义的侵略本性是永远不会改变的，新的世界大战的危险依然存在，我们必须时刻保持高度的警惕性。"},{"type":"paragraph","text":"毛主席在《抗日战争胜利后的时局和我们的方针》一文中还教导我们:“总而言之，我们要有准备。有了准备，就能恰当地应付各种复杂的局面。”搪瓷六厂党委在引导群众认清帝国主义反动本性的同时，进一步组织大家回顾历史，认识到帝国主义和社会帝国主义从事侵略活动的惯用手法是搞突然袭击。他们往往表面上装出一副谈判的姿态，而暗地里却在加紧搞侵略活动。如果我们对此缺乏充分的认识和准备，就会上大当，吃大亏。很多同志联系到一九三九年秋，法西斯德国用突然袭击的手段侵略波兰和一九四一年冬日本突然袭击珍珠港等历史事实，进一步认识到，我们必须从思想上、行动上做到常备不懈，时刻准备粉碎帝、修、反的突然袭击。这个厂的领导和群众认真检查了战备措施的落实情况。广大工人群众还以抓革命、促生产的实际行动，努力提高产品质量和产量，支援世界各国人民的革命斗争。九月份，这个厂的人力比较紧张，完成任务困难较大。但工人同志发扬了一不怕苦、二不怕死的革命精神，使九、十两个月的生产计划连续超额完成。"},{"type":"paragraph","text":"这个厂的党委在组织大家学习《抗日战争胜利后的时局和我们的方针》一文时，还针对美帝国主义和社会帝国主义大肆宣扬核恐怖，大搞核垄断的情况，引导大家认真学习了毛主席关于“只有原子弹而没有人民的斗争，原子弹是空的”教导，使大家认识到，核武器和任何帝国主义一样，也是纸老虎。只要我们用马列主义、毛泽东思想武装起来，作好思想上、物质上、组织上的充分准备，我们就能战胜一切胆敢来犯的敌人。通过一系列的战备教育活动，干部和群众的战备观念大大加强，大家一致表示，如果帝国主义胆敢发动新的世界大战，胆敢侵犯我们伟大祖国，我们就坚决、彻底、干净地把他们全部歼灭。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3996d085fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
