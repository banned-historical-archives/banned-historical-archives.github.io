ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"对《关于人民解放军坚决支持革命左派群众的决定》稿的批语","alias":"","parts":[{"type":"paragraph","text":"对《关于人民解放军坚决支持革命左派群众的决定》稿的批语\"!"},{"type":"paragraph","text":"（1967年1月）照发。"},{"type":"paragraph","text":"[1]这个批语写在1967年1月21日送审的中共中央、国务院、中央军委、中央文革小组关于人民解放军坚决支持革命左派群众的决定稿上。决定稿根据毛泽东关于人民解放军应该支持左派广大群众的指示精神，作出了五条指示：（一）以前关于军队不介入地方文化大革命以及其他违反上述精神的指示，一律作废。（二）积极支持广大左派群众的夺权斗争。凡是真正的左派要求军队去援助他们，军队都应当派出部队积极支持他们。（三）坚决镇压反对革命左派的反革命分子、反革命组织，如果他们动武，军队应当坚决还击。（四）重申军队不得做一小党内走资本主义道路当权派和坚持资产阶级反动路线顽固分子防空洞的指示。（五）在全军深入进行无产阶级革命路线和资产阶级反动路线斗争的教育。1月23日，中共中央、国务院、中央军委、中央文革小组下发了这个决定。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":280,"page_end":280},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d52ee24174"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
