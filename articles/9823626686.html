<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印刷业存在的工时与学徒问题部份资方对职工的过份苛刻、对学徒的不合理剥削，都违反工会法的规定；这种现象亟待纠正。","authors":[],"dates":[{"year":1951,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本市印刷业包括铅印、彩印、装订三个组，一般厂、所除少数规模较大的以外，普遍都是十余人，甚至仅一、二人的小印刷所。由此，一般小厂小所的劳资关系就产生了很多不合理的现象。最近我们访问了十一个厂、所，收集如下的材料，愿供有关机关参考，并引起注意:"},{"type":"paragraph","text":"因为规模小，所以封建性的剥削也重。尤其在普遍独资经营的情况下，资方对工人学徒的迫害与剥削，更变本加厉。资万对“节省”自己的支出设想是颇为周到的。因为学徒不必付工资，所以职工的比例上学徒人数占了最大多数。而学徒中又大部是应届快满师的期限。如明星印刷所九个职工中有七个学徒，美星凹凸彩印厂八个职工中，有三个刚满师的学徒，其他五个全是学徒。象成印刷所两个职工全是学徒，震丰印刷所七个工人中学徒占了四人，另三人是刚满师的学徒；兴华橡皮印刷所十三个职工中有五个学徒，甚至已在旁的厂里做过一、二年，但资方不承认，硬要他们再学三年。"},{"type":"paragraph","text":"对学徒不合理的待遇　吃饭无工钱　沐浴成问题"},{"type":"paragraph","text":"在待遇上说，学徒津贴都很少，最低的每月只有二万五千元，最高的也不过十六个单位。如美星凹凸彩印厂，学徒一般是三万元至五万元，可是今年从未发过津贴，以致学徒的沐浴都成问题。平常加夜工时，也仅付少数点心钱和半工资(件工则按件计算)，但也有如美星、明记、象成等资方，学徒做了夜工，不但工资不付，连点心钱都没有。有的资方虽说付夜工工资，可是仍存在有剥削的现象。新新橡皮厂的满师学徒与老年工人，做半夜工时的工资仅得日工工资之一半，做全夜工才算一工，点心费是每一小时得五百元。装订组除了少数，一般以件工计算的，学徒的夜工工资是根本没有的。"},{"type":"paragraph","text":"不遵重学徒人格甚至有打骂现象发生"},{"type":"paragraph","text":"印刷业中小规模的厂所，大都是家庭式的生产组织，不但不遵重学徒人格，而且还有打骂学徒现象发生。这情况是与店的规模成反比；规模愈小，打骂现象愈严重。而最不合人情的尤其是工人出身的资方，很多对待学徒反更为苛刻。如明记印刷所的资方，老板自己就承认曾经二次打过学徒(学徒说是三次)，老板的女儿名义上也参加生产，而实际是监督生产。震中厂与新新橡皮厂资方过去都打骂过学徒，以致使学徒到现在都对老板怕得很。劳资之间的感情是很有问题的。"},{"type":"paragraph","text":"过长的工作时间损害健康妨碍学习"},{"type":"paragraph","text":"印刷业一般工作时间都过长，这更存在着严重的问题。一般厂、所的工作时间是上午八至十二时，下午一至六时，少数厂上午七时三十分开始，至下午六时半结束，大约是九小时最多，也有工作时间在九小时半至十小时的。可是，印刷业普遍都加夜班，因此很多工人的健康由于少睡眠而损害很大。工会活动与文化学习，更因而受到了极大阻碍。"},{"type":"paragraph","text":"多数厂的半夜工是下午六至九时，全夜工是六至十二时。因此像新新橡皮印刷一厂的工人，每天最少要做十三小时，夜工非做不可，如做全夜工则为十五小时。平均每日做十四小时，工人每天的睡眠只剩下六小时了。而惊人的现象是，有时还有“夜班”，这意思是做了十二小时之后，再做八小时(虽然是工人中自相代替，并不强迫)；那末，一个工人每天生活的时间中竟有二十小时在从事劳动，这现象是太不合理了!晋益装订厂工人的工作时间在十二小时至十五小时之间，由于装订教科书，所以春、秋二季时常开夜工。包永记装订公司的工人，工作忙时每天做十六小时，甚至通夜不睡，今年四月份全月均开夜工。而美星凹凸彩印厂的工作时间，在十三小时半至十五小时半之间，资方说每月经常做二十天夜工，工人反映说是全月均做夜工。"},{"type":"paragraph","text":"根据以上情况，正明显的看到了今天印刷业中有一部份的劳资关系，是存在着严重的问题。资方对职工的过份苛刻，对学徒不合理的剥削等等，都违反了工会法的规定。在这个情况下面，资方那里还谈得到对工人兄弟们的劳保福利呢?"},{"type":"paragraph","text":"我们报导这些情况，愿供有关机关单位作为参考，并积极指正偏向，改变这种不合理的现象。　(本报记者)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9823626686"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
