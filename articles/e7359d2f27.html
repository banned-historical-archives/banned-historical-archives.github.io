art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见防空军积极分子代表","authors":[],"parts":[{"type":"paragraph","text":"本报15日讯 今天下午，毛泽东主席和彭德怀元帅、贺龙元帅、聂荣臻元帅，在中南海草坪上接见了出席防空军积极分子代表大会的全体代表，并和代表们在一起照了像。"},{"type":"paragraph","text":"接见时在场的有粟裕大将、陈赓大将、黄克诚大将、甘泗淇上将和防空军司令员杨成武上将等。"},{"type":"paragraph","text":"五点十分，毛主席等在怀仁堂北门出现时，全场响起了暴风雨般的掌声。毛主席向代表们频频招手致意。杨成武上将把在技术改进方面卓有贡献的代表吴翔介绍给毛主席，毛主席亲切地和吴翔握了手，并赞扬他说：“很好！”"}],"alias":""},"tags":[{"name":"杨成武","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7359d2f27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
