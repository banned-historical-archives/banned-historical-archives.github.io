政策不因中央人事变更而改变","authors":["许青"],"dates":[{"year":1987,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阎明复在招待出席佛协五届代表会议代表茶话会上说"},{"type":"paragraph","text":"宗教界不搞反资产阶级自由化斗争"},{"type":"paragraph","text":"宗教政策不因中央人事变更而改变"},{"type":"paragraph","text":"本报讯　记者许青报道：党的宗教政策不会因为中央的人事变更而改变。反对资产阶级自由化，仅仅限制在共产党内，宗教界不搞反对资产阶级自由化斗争。不要把宗教界的内部之争说成是资产阶级自由化。——当中共中央统战部部长阎明复讲完上述这段话时，为招待出席中国佛教协会第五届全国代表会议代表而举行的茶话会会场上爆发出热烈的掌声。中国佛教协会名誉会长班禅额尔德尼·确吉坚赞、中央统战部负责人、国务院宗教事务局负责人和300多名佛教界代表一起出席了2月27日的茶话会。"},{"type":"paragraph","text":"阎明复同志在肯定第四届全国佛教代表大会以来六年间佛教界所取得的成绩时特别指出：我国广大佛教信徒在推动“一国两制”实现统一祖国和维护世界和平方面起了积极作用。"},{"type":"paragraph","text":"阎明复说，我们希望佛教界人士和广大信徒，充分利用自己同海外的广泛联系，进一步积极开展对港澳台同胞和海外侨胞的联谊工作，积极开展同国外宗教界的友好往来，为推动“一国两制”的实施，维护世界和平做出更大贡献。"},{"type":"paragraph","text":"中国佛教协会会长赵朴初在会上讲了话。他说：我们所取得的每一个成绩都应该归功于党和政府的领导。佛教界有句名言：“报国土恩，报众生恩。”我们要报国家的恩，报人民的恩。今后，我们要在党和政府的领导之下，为两个文明建设，为祖国统一和世界和平事业，做出新的成绩。"},{"type":"paragraph","text":"这个茶话会是由中央统战部和国务院宗教事务局举办的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"927d0eea2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
