","authors":[],"dates":[{"year":1967,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿根廷《不妥协报》痛斥帝修对我国文化大革命的诬蔑"},{"type":"paragraph","text":"苏修美帝一个鼻孔出气一个腔调反华"},{"type":"paragraph","text":"据新华社讯　布宜诺斯艾利斯消息：阿根廷共产主义先锋组织机关报《不妥协报》最近发表文章，热情赞扬我国无产阶级文化大革命是毛泽东思想的新胜利。"},{"type":"paragraph","text":"文章说：毛泽东思想给中国共产党和世界上所有的共产党人指出，社会主义社会存在着阶级和阶级斗争；无产阶级一旦夺取政权并且建立了社会主义的物质基础以后，如果不开展文化革命来巩固自己的政治和经济权力，资产阶级就要进行反革命活动来推翻社会主义的政治和经济权力，为修正主义的得逞作好准备和实现资本主义复辟。因此，文化革命是毛泽东思想的新胜利。"},{"type":"paragraph","text":"文章说，在毛泽东同志亲自主持下制定的《中国共产党中央委员会关于无产阶级文化大革命的决定》，是“一个非常杰出的文件，一切共产党人要想了解文化革命的来历和发展情况必须学习这个文件。这个文件概括了社会主义革命一个阶段的内容。”“中国共产党人开创的这个伟大的事业在人类历史上还是第一次。”"},{"type":"paragraph","text":"文章接着痛斥帝国主义者和正在充当美帝国主义别动队这个可耻角色的苏联修正主义领导集团对中国文化大革命的恶毒诬蔑。文章说：“过去社会民主党人是帝国主义攻击列宁和斯大林的苏联的老帮凶，同样，今天苏联修正主义者成了美帝国主义攻击中国革命的新帮凶。”“苏联修正主义者在维护资产阶级文化和诋毁无产阶级文化方面走得比美帝国主义还远。”"},{"type":"paragraph","text":"文章指出：“反动派对无产阶级的仇恨是同对它的领袖的仇恨分不开的，革命者对无产阶级的热爱是同对它的领袖的热爱也是分不开的。”“列宁研究了巴黎公社失败的经验，指出工人阶级怎样才能夺取政权和建立无产阶级专政。因此，帝国主义和社会民主党人都仇恨他。毛泽东研究苏联无产阶级专政失败的教训，指出无产阶级怎样才能巩固自己的专政、防止修正主义得逞和资本主义复辟，因此帝国主义和修正主义都仇视他。”文章强调指出，但是，人民热爱最伟大的无产阶级革命家毛泽东。"},{"type":"paragraph","text":"文章最后说，所有敌视无产阶级文化革命的人，永远也不敢象中华人民共和国那样在自己国内放手发动群众。“七亿中国人民在毛泽东思想教育下正在改造成为真正的共产主义者，成为世界革命的不可战胜的堡垒。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3f33ca711"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
