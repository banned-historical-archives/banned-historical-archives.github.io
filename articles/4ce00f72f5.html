script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席接见参加北京物理讨论会各国科学家各国科学家长时间热烈鼓掌，激动地高呼“毛主席万岁!”“毛主席万岁!”　刘主席等领导人接见参加北京物理讨论会各国科学家","authors":[],"dates":[{"year":1966,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京31日电　毛泽东主席今晚接见了参加北京科学讨论会一九六六年暑期物理讨论会的三十三个国家及一个地区性学术组织的科学家代表团和科学家，以及其他外国朋友。"},{"type":"paragraph","text":"毛主席同各国科学家见面的时候，各国科学家长时间地热烈鼓掌，激动地高呼:“毛主席万岁!”“毛主席万岁!”"},{"type":"paragraph","text":"毛主席在热烈的掌声中，同各国科学家亲切握手，并且同他们合影。"},{"type":"paragraph","text":"毛主席同科学家们合影后离开大厅的时候，各国科学家拥向毛主席，不断高呼:“毛主席万岁!万万岁!”"},{"type":"paragraph","text":"参加接见的党和国家领导人有:周恩来、陈毅、李富春、贺龙、陈伯达、康生、薄一波、陶铸、聂荣臻、叶剑英、谢富治、林枫、刘宁一、郭沫若、杨明轩和程潜等。"},{"type":"paragraph","text":"新华社北京31日电　中共中央副主席、中华人民共和国主席刘少奇，中共中央政治局委员、中华人民共和国副主席董必武，中共中央副主席、国务院总理周恩来，中共中央副主席、全国人民代表大会常务委员会委员长朱德，中共中央总书记邓小平，中共中央政治局委员、国务院副总理陈毅、李富春、贺龙，中共中央政治局候补委员、中央文化革命小组组长陈伯达，中共中央政治局候补委员、中共中央书记处书记、人大常委会副委员长康生，中共中央政治局候补委员、国务院副总理薄一波，中共中央书记处书记、中央宣传部部长、国务院副总理陶铸，中共中央书记处书记、人大常委会副委员长李雪峰，中共中央委员、国务院副总理、国防委员会副主席聂荣臻，中共中央书记处书记、国防委员会副主席叶剑英，中共中央委员、国务院副总理谢富治，中共中央委员、人大常委会副委员长林枫、刘宁一，人大常委会副委员长郭沫若、杨明轩和程潜，今天下午接见了参加北京科学讨论会一九六六年暑期物理讨论会的三十三个国家及一个地区性学术组织的科学家代表团和科学家，以及其他外国朋友。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\08\\6681010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e七月三十一日，毛泽东主席接见参加北京科学讨论会一九六六年暑期物理讨论会的三十三个国家和一个地区性学术组织的科学家代表团和科学家，以及其他外国朋友。　新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李富春","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ce00f72f5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
