tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席观看《民兵生活》专栏","authors":["陆漱石"],"parts":[{"type":"paragraph","text":"1958年9月20日，艳阳普照，秋风送爽。下午三点多钟，毛泽东同志来到安徽马鞍山钢铁公司一铁厂视察。当他走到这个厂民兵“八一”突击排举办的《民兵生活》专栏前时，停住了脚步，抬头注视着专栏上张贴的民兵《决心书》和《爱国公约》。因张贴多天，经风吹日晒，专栏里有几张纸已破损残缺，观看起来比较费劲。可是毛泽东同志却是兴致勃勃，看得十分仔细。当他看到《爱国公约》中有一条民兵要做到“组织军事化，行动战斗化”时，用手指着《民兵生活》专栏，对陪同视察的省、市委负责同志说：好啊！好啊！我看还得加一条，叫管理民主化。接着，毛泽东同志还对民兵活动要坚持劳武结合的问题作了重要指示。"},{"type":"paragraph","text":"二十五年过去了，毛泽东同志关心民兵建设的这一故事，一直铭记在马鞍山市人武干部和民兵的心间。       （陆漱石）RW：毛泽东；生平事迹；关心民兵建设"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dd0a48cc5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
