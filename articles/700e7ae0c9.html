script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海第六制药厂工人说，资产阶级的“专家”、“权威”，想的是个人利益，要的是个人名利，当然什么也搞不出来。我们工人想的是革命，干的也是革命，有什么干不出来?这个厂的——工人们集体创造出糖精生产新工艺","authors":["朱英杰"],"dates":[{"year":1968,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"过去几年，我厂工人实现了大大小小二百多项技术革新，使我厂的糖精产量成倍增长，成本大幅度下降，质量显著提高。随着全国工农业生产发展的需要，工人又提出“改革生产工艺，赶超国际先进水平”的建议。可是我厂走资派却千方百计地压制、破坏工人搞革新。他诬蔑工人搞革新是“开玩笑!”下令把试验台拆掉。后来看看不行，就来个“和平演变”，把一些不学无术的所谓“专家”、“权威”安插进试验组，让他们掌握技术革新大权。这些家伙在走资派包庇下，各人自搞一套，勾心斗角，互不服气，对工人指手划脚，百般挑剔。结果，耗费了国家大量资财，花了半年多时间却一事无成。"},{"type":"paragraph","text":"生产工人眼看着这些人胡作非为，非常气愤。他们说:“这些人吃人民的饭，穿人民的衣，想的是个人利益，要的是个人名利。当然什么也搞不出来。这样的人对国家有什么用处呢?”“我们工人想的是革命，干的也是革命，有什么干不出来?”于是他们就自己动手，制作试验台，夜以继日地战斗。他们克服了文化水平低，没有技术参考资料等等困难，发挥了集体的聪明才智，终于用三个月的时间，搞成功了糖精生产新工艺，生产场地缩小到原来的十分之一，工序减少七道，机器设备减少了八十五台，为国家节约了大量的人力、物力、财力，创造出了超过国际先进水平的中国式的糖精生产新工艺。"},{"type":"paragraph","text":"上海第六制药厂　朱英杰"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"700e7ae0c9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
