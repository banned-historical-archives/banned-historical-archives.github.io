al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"大略不是人","alias":"","parts":[{"type":"paragraph","text":"大略不是人"},{"type":"paragraph","text":"（1919年7月14日）"},{"type":"paragraph","text":"邓豁\"在新国会云：“尊孔不必设专官，节者（省）经费。”张元奇3云：“内务部祀孔，由茶房录事办理，次长司长不理，要设专官。”内务部的茶房录事，大略不是人。要说是人，怎样连祀孔都不行呢？我想孔老爹的官气到了这么久的年载，量也减少了一点。"},{"type":"paragraph","text":"[1]邓，字守瑕，四川成都人，光绪丁酉科优贡，日本明治大学法科毕业。历任临时参议院议员、政治会议议员、约法会议议员、参议院参议员、参政院参政员等职。"},{"type":"paragraph","text":"[2]1918年8月，北京政府皖系军阀段祺瑞等为抵制孙中山等在广州组成的非常国会，废除旧国会而另行成立的国会，被称为新国会。因在国会中皖系军阀控制的安福系（由安福俱乐部得名）占绝大多数，故又称安福国会。"},{"type":"paragraph","text":"[3]张元奇，字珍午（1858一1922)，福建闽侯人，光绪丙戌科进士，辛亥革命后首任福建省省长。历任湖南岳州府知府、奉天巡按使、内务次"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":25,"page_end":25},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4abe8a29a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
