ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对周恩来关于苏联要求与我通话的处置意见的批语","alias":"","parts":[{"type":"paragraph","text":"对周恩来关于苏联要求与我通话的处置意见的批语！"},{"type":"paragraph","text":"（1969年3月）同意备忘录的立场，即准备举行外交谈判。"},{"type":"paragraph","text":"[1]周恩来1969年3月22日给毛泽东等写报告说，从21日晚开始，苏联方面几次向我方打听主席的电话号码，苏驻华使馆也几次找我外交部，说是“奉苏联部长会议主席命，有话要转达”。同时，我方在珍宝岛方面发现苏军在移动，并侦知苏后方在催他们前沿行动，“估计敌今日有可能强占珍宝岛，昨夜外交活动为故作姿态”。经与有关同志商定，着即“加强我岸兵力、火力部署，以逸待劳，准备后发制人”。同时商定以备忘录形式面复苏联临时代办，争取主动。外交部的备忘录为：“从当前中苏两国关系来说，通过电话的方式进行联系已不适用。如果苏联政府有什么话要说，请你们通过外交途径正式向中国政府提出。”毛泽东的批语，写在周恩来的报告上。"}],"authors":["毛泽东"],"dates":[{"year":1969,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":411,"page_end":411},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5af96270a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
