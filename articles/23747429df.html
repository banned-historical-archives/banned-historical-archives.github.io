script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国科学院上海光机所干部和群众狠批“三项指示为纲”把反击右倾翻案风的斗争引向深入","authors":[],"dates":[{"year":1976,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　中国科学院上海光学精密机械研究所的广大工人、干部和科研人员，在党委领导下，反复学习、深刻领会毛主席关于“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目”的重要指示，运用马克思主义、列宁主义、毛泽东思想这个锐利武器，集中批判党内不肯改悔的走资派兜售的“三项指示为纲”的修正主义纲领，把反击右倾翻案风的斗争逐步引向深入。"},{"type":"paragraph","text":"批判内容要深入，要害实质要抓准。这个研究所党委采用举办领导干部学习班、召开批判会和贴大字报等多种形式，进一步发动干部和群众，把斗争的锋芒对准党内不肯改悔的走资派，集中批判他们妄图复辟资本主义这个要害问题。党委“一班人”带头挥戈上阵，旗帜鲜明地指挥战斗。有个党委委员连夜贴出了《“三项指示为纲”是复辟资本主义的总纲领》的大字报，揭露了党内不肯改悔的走资派反对以阶级斗争为纲，篡改党的基本路线，从政治上、思想上、组织上猖狂地向无产阶级进攻，妄图复辟资本主义的险恶用心。许多同志满怀无产阶级的革命义愤，如饥似渴地学习《马克思致约·魏德迈》、《\u0026lt;法兰西内战\u0026gt;导言》、《再论工会、目前局势及托洛茨基和布哈林的错误》、《矛盾论》、《关于正确处理人民内部矛盾的问题》等马列和毛主席著作，运用马克思主义的立场、观点和方法，批判“三项指示为纲”的理论基础、折中主义手法和社会根源，提高了识别真假马克思主义的能力。"},{"type":"paragraph","text":"这个研究所的同志们一针见血地指出，“三项指示为纲”阉割了马克思主义关于阶级斗争的学说，扯起阶级斗争熄灭论和唯生产力论的破旗，向马克思主义猖狂进攻。这充分暴露了党内不肯改悔的走资派搞修正主义的面目。第六研究室一张题为《“三项指示为纲”是对马克思主义理论的篡改》的大字报中说:阶级斗争学说是马克思主义的基础，无产阶级专政理论是马克思主义的精髓。坚持以阶级斗争为纲，还是否定以阶级斗争为纲，这是检验真假马克思主义的试金石。以阶级斗争为纲，是毛主席二十多年来领导我们党进行社会主义革命的基本理论和基本实践。毛主席一再教导我们:“千万不要忘记阶级斗争”，对阶级斗争“必须年年讲，月月讲，天天讲，使我们对这个问题，有比较清醒的认识，有一条马克思列宁主义的路线”。只有坚持党的基本路线，以阶级斗争为纲，实行对资产阶级的全面专政，才能胜利地完成社会主义革命，逐步地实现向共产主义的过渡。党内不肯改悔的走资派抛出蛊惑人心的“三项指示为纲”，其目的就是否定党的基本路线，麻痹人们的思想，让他们顺顺当当地复辟资本主义。这是对马克思主义的蓄意篡改和无耻背叛。"},{"type":"paragraph","text":"在批判“三项指示为纲”的过程中，这个所的同志们揭露了党内不肯改悔的走资派炮制这个反动纲领的卑劣手法。同志们说，古今中外，凡是搞复辟倒退的反动派，必然乞灵于谣言和诡辩。党内不肯改悔的走资派就是沿袭了布哈林用折衷主义和诡辩论来偷换唯物辩证法的故伎，以目乱纲，以目代纲，其用心极为险恶。"},{"type":"paragraph","text":"“机会主义不是偶然的现象，不是个别人物的罪孽、过错和叛变，而是整个历史时代的社会产物。”这个所的同志们认真学习列宁的这一教导，剖析了“三项指示为纲”这个修正主义纲领产生的社会根源。他们说:它的阶级基础就是早已被革命人民打倒的地主、资产阶级；它的经济基础就是商品制度、货币交换、按劳分配等资产阶级法权的存在；它的思想基础就是国内外资产阶级和修正主义的思想影响，以及几千年遗留下来的孔孟之道等旧传统观念。有个科研人员说:党内不肯改悔的走资派提出“三项指示为纲”这个修正主义纲领不是偶然的，这是两个阶级、两条道路、两条路线斗争的必然反映。我们的任务就是要坚持无产阶级对资产阶级的全面专政，限制资产阶级法权，不断铲除滋生修正主义的土壤，造成使资产阶级既不能存在，也不能再产生的条件，把社会主义革命进行到底，最终实现共产主义。"},{"type":"paragraph","text":"上海光机所的同志通过批判“三项指示为纲”这个修正主义纲领，加深了对两个阶级、两条路线、两种思想斗争的长期性和复杂性的认识。大家表示要时刻保持革命警惕，坚持以阶级斗争为纲，深入开展科技领域里的社会主义革命，不断向资产阶级和修正主义打进攻战，把无产阶级专政下的继续革命进行到底。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23747429df"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
