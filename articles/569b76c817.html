"],"dates":[{"year":2002,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命历史儿童剧《寻找爸爸毛泽东》公演"},{"type":"paragraph","text":"布赫观看演出"},{"type":"paragraph","text":"新华社北京6月1日电（王经国）为庆祝“六一”国际儿童节，大型革命历史儿童剧《寻找爸爸毛泽东》，今天在北京中国儿童艺术剧院公演。全国人大常委会副委员长布赫观看演出。"},{"type":"paragraph","text":"这部由青岛话剧院海尔儿童艺术剧团创作演出的儿童剧描写的是，1935年毛泽东之子毛岸英、毛岸青两兄弟在母亲杨开慧被反动派杀害后，在上海寻找父亲期间的感人故事。全剧悬念丛生，扣人心弦，淋漓尽致地表现了毛岸英两兄弟历经磨难、追求光明的坚定信念和百折不挠、顽强独立的人生品格，颂扬了伟大的无产阶级革命家毛泽东以国为怀、胸怀天下、舍小家为国家的革命精神。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"569b76c817"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
