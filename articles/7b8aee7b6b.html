<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学大庆经验不动摇　走大庆道路不转向大庆十六轮船员顶着“四人帮”的妖风，始终坚持岗位责任制等各项合理的规章制度，连续十一年超额完成国家运输计划","authors":[],"dates":[{"year":1977,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海海运局油轮船队大庆十六轮党支部，在“四人帮”破坏“工业学大庆”甚嚣尘上的时候，坚决带领广大船员顶着妖风，坚持学大庆精神不动摇，走大庆道路不转向，与“四人帮”破坏合理的规章制度进行针锋相对的斗争，使油轮连续十一年超额完成国家运输计划。"},{"type":"paragraph","text":"大庆十六轮是本市工业学大庆的先进集体。在毛主席的革命路线指引下，这艘船的党支部带领广大船员以阶级斗争为纲，深入开展“工业学大庆”的群众运动。从一九六五年起，连续十一年超额完成国家运输计划，年运量由文化大革命前的二十几万吨逐渐增长到八十三万五千吨；安全航行五十五万多浬，主副机安全运转十三万多小时。他们还坚持一边开船，一边修船，从一九六七年四月开始，做到连续六年不进厂，四年不进坞，节约燃料油六千七百多吨，并以重柴油代替轻柴油，以渣油代替重柴油，为国家节约了三百九十六万元；单位成本也不断下降，一九七六年比全船队的平均水平降低了百分之五十二。十一年共上缴利润六千一百零九万元，相等于十一艘大庆十六轮的船价，平均每人每年为国家创造财富七万九千元。"},{"type":"paragraph","text":"几年来，大庆十六轮的船员同“四人帮”破坏合理的规章制度的反动谬论展开了针锋相对的斗争。他们在长期航海的实践中深深体会到，必要的合理的规章制度，是工人群众多年生产实践经验的总结，代表了工人群众的利益，有利于多快好省地发展运输生产，必须坚持下去。十一年来，这艘船始终如一地坚持了岗位责任制、交接班制、巡回检查制、值班制、设备维修保养制以及驾驶台规则等各项规章制度，从未发生过责任性的海损、机损、货损事故，保证了油运生产的顺利进行。在执行这些合理的规章制度的过程中，党支部做到“三个坚持”:一是坚持用典型事例对群众进行教育；二是坚持表扬先进；三是坚持检查和总结。在每月一次的安全活动日会议上，拿出一定的时间，发动群众检查一月来执行各项规章制度的情况，总结经验，吸取教训，继续前进。这样做的结果，逐渐提高了广大船员严格遵守各项规章制度的自觉性，保证了油运生产的安全。今年一月，这艘船的党支部又组织广大船员重新学习了党中央的有关指示和大庆的基本经验，在全船开展了以岗位责任制为主要内容的大检查。通过大检查，大家进一步认识到，在船舶运输生产中，不建立岗位责任制，就无法开船；有了岗位责任制，而没有高度的政治责任心，岗位责任制就不可能发挥作用。现在，大庆十六轮以大庆为榜样，把每个岗位的值班制度和操作规程都抄写在木板上，挂在每个岗位的现场，使新老船员一看就明白应该做哪些工作。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b8aee7b6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
