[],"dates":[{"year":1967,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"缅甸作家德钦妙丹说："},{"type":"paragraph","text":"中国文化大革命沉重打击了帝国主义修正主义"},{"type":"paragraph","text":"缅甸著名作家德钦妙丹最近在这里对新华社记者说：“高举毛泽东思想伟大红旗的中国人民，在光荣的中国共产党的领导下掀起的无产阶级文化大革命是马克思列宁主义的一个十分重要的发展。无产阶级文化大革命的蓬勃发展严重地打击了国际帝国主义和修正主义，因此，他们胆战心惊。”"},{"type":"paragraph","text":"他说：背叛了马克思列宁主义的修正主义者“害怕毛泽东思想——坚持马克思列宁主义真理的光芒万丈的灯塔。”"},{"type":"paragraph","text":"他说，毛泽东思想——今天的马克思列宁主义——定将胜利，因为它不仅是中国的解放的指南，而且是世界各国被压迫、被剥削人民的解放和社会主义建设的指南。"},{"type":"paragraph","text":"（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88ece225ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
