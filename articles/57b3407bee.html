ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"关于三大作风提法的批语","alias":"","parts":[{"type":"paragraph","text":"关于三大作风提法的批语"},{"type":"paragraph","text":"（1960年5月8日）退谭政同志。以1939年的三句为好，奋斗二字改朴素为宜。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月八日"},{"type":"paragraph","text":"[1]这个批语写在中共中央军委常委、中国人民解放军总政治部主任谭政1960年5月6日给中央军委副主席林彪并报毛泽东的报告上。谭政的报告说，对抗大时有关作风的三句话，我们计划好好宣传一下，但目前流行的提法不尽一致，一是1938年抗大同学会成立时毛主席的题词：“坚定不移的政治方向，艰苦奋斗的工作作风，机动灵活的战略战术。”一是1939年抗大三周年时毛主席文章中的提法：“坚定正确的政治方向，艰苦奋斗的工作作风，灵活机动的战略战术。”两个提法用词不同，究竟以哪个为好，请予指示，以求统一。毛泽东批示用1939年的提法，并将其中的“艰苦奋斗的工作作风”一句，改为“艰苦朴素的工作作风”。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":5,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":325,"page_end":325},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57b3407bee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
