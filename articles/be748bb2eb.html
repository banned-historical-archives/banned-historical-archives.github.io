上的报告","authors":["四川","阎红彦"],"dates":[{"year":1958,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"阎红彦在四川省委组织的下乡工作团干部会议上的报告","type":"title"},{"text":"四川阎红彦","type":"authors"},{"text":"(阎红彦：中共四川省委书记)","type":"subtitle"},{"text":"[前缺]为实际上，在工作中间的缺点是有的，今天有，明天有，明年还有，但是怎么解决都应找新方法。比如最近这月5号，金堂一个区委组织了50多个干部检查石龙乡大春生产工作，也是检查农业生产，这个办法很好，发动那样多的干部来检查工作，很好，应当提倡这种办法，而是动员其他乡的干部去，这个办法对，但是我们这些人去主观主义，据说这个村是落后村，对他们计划执行干部有抵触，没有按我们的办法执行，这次想去解决问题，去的时候就带了绳子去的（不知是否确实），到了那个地方就捆了几个干部，没有通过群众就把拔了在棉花地内间种的包谷，结果群众就叫打棒老二来了，打棒老二，结果一个支书被打得很厉害，捆的几个群众又把他放了。检查工作虽是件好事情，帮助别人解决问题是好事情，结果变成坏事情，打了一架。所以主观主义可以把好事办成坏事，即使群众落后，没有按计划执行，也应该动员、说服群众，怎么能自己去拔呢，拔人家的包谷，包谷长了那样高也很可惜，而且棉花地间种包谷对不对，还应该考虑。这是一个很大的教训，虽然我们出发点是为了帮助人家解决生产中的问题，检查工作评比，把群众的积极性鼓励起来，结果这样的作风，对生产是一个打击，这种作风我们要千万记得，检查工作的人不能够随便下去不走群众路线，不全面，饮差大臣，不按我们办法办就要振群众，这个东西群众会打人的。金堂的事情是最近的事，给我们一个教训，你们这些干部也不会去那样作，也没有那样大的权利随便去捆人打人。但是也应注意这事情，即使不打人捆人，发生一些问题，发现一些没有按照我们的办法办就来一个批评乱说乱道，都会造成群众的不满，这点应引起特别注意。这次下去检查工作主要是抓农业，特别是粮食作物这个指标，抓这里面的措施。现在提出来的这个要求很具体，大[下缺]","type":"paragraph"},{"text":"来源：四川省委办公厅“关于组织工农业生产检查团的通知，及大章、志高、红彦、陈冈……在检查团干部大会上的报告”","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be748bb2eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
