,"dates":[{"year":1976,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　敬业中学红卫兵团听到郑霞萍英雄事迹的广播后，马上做好录音工作，并在全校播放，号召全校红卫兵、学生认真学习。红卫兵团还组织了由全校三十三个红卫兵排参加的大型座谈会，各红卫兵排也举行了题为“向英雄郑霞萍学习”的红卫兵组织生活。很快，全校的三百五十余名红卫兵战士全都发动起来了，向郑霞萍学习的决心书、诗歌贴满了校园。大家决心以实际行动向郑霞萍学习，向着共产主义大目标努力攀登，誓做党内资产阶级的掘墓人。"},{"type":"paragraph","text":"(南矢文)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8429418b5d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
