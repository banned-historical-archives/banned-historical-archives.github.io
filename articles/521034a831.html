art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见尼克松先生","authors":[],"parts":[{"type":"paragraph","text":"新华社九月二十一日讯 叶剑英委员长今天晚上在人民大会堂会见了美国前总统理查德·尼克松先生和他的随行人员。"},{"type":"paragraph","text":"叶委员长很高兴地同尼克松先生见面。一九七二年，尼克松先生作为美国总统第一次访问中国时，叶委员长曾接待过他，还陪他游览了长城。"},{"type":"paragraph","text":"今天，叶委员长见到尼克松先生时，久久地握着他的手用英语说：“很高兴见到你。”叶委员长还对尼克松先生说：“热烈欢迎打开中美关系的、中国人民的老朋友和好朋友——尼克松先生。”随后，叶委员长同尼克松先生进行了友好的谈话，双方对中美关系日益发展表示高兴。"},{"type":"paragraph","text":"接着，叶委员长设晚宴招待尼克松先生等美国朋友。"},{"type":"paragraph","text":"我国外交部长黄华，文化部长黄镇，外交部部长助理宫达非参加了会见和宴会。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"521034a831"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
