" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"亿万人民的共同心愿","alias":"","parts":[{"type":"paragraph","text":"具体实践相结合的原则，在领导我国完成新民主主义革命和进行社会主义革命、社会主义建设的伟大斗争中，在反对党内右的和“左”的机会主义路线的伟大斗争中，在反对帝国主义、以苏修叛徒集团为中心的现代修正主义和各国反动派的伟大斗争中，在各个方面继承，捍卫和发展了马克思列宁主义，丰富了马克思主义的理论宝库。毛主席的著作，是马克思列宁主义的不朽文献。出版毛主席的著作，对于我国各族人民继承毛主席的遗志，把无产阶级革命事业进行到底，对于全世界无产阶级和被压迫民族被压迫人民的解放事业、都具有伟大的现实意义和深远的历史意义。这是马克思主义发展史上的一件大事，一定要严肃认真地抓紧做好。中共中央决定："},{"type":"paragraph","text":"（一）尽快出版《毛泽东选集》第五卷，并陆续出版以后各卷。在出版选集的同时，积极地筹备出版《毛泽东全集》。"},{"type":"paragraph","text":"（二）出版《毛泽东选集》和《毛泽东全集》的工作，由以华国锋同志为首的中共中央政治局直接领导，下设一个毛泽东主席著作编辑出版委员会，负责整理、编辑和出版的具体工作。"},{"type":"paragraph","text":"（三）毛主席著作的所有原件，由中共中央办公厅负责收集，保存。"},{"type":"paragraph","text":"中央责成各级党委将本地区、本单位保存的毛主席的一切手稿，包括文章、文件、电报、批示、书信、诗词、题词的原件，以及讲话的原始记录稿，尽快送交中央办公厅、中央办公厅应作出复制件，交提供原件的单位或个人保存。"},{"type":"paragraph","text":"中共中央号召全党、全军和全国各族人民，掀起一个学习马列著作和毛主席著作的新高潮，并且大力帮助收集毛主席的著作原件。中共中央希望各国马列主义政党、组织和进步团体、友好人士协助做好毛主席著作原件的收集工作。"},{"type":"paragraph","text":"（新华社1976年10月8日讯，载10月9月《人民日报》）亿万人民的共同心愿"},{"type":"paragraph","text":"（一九七六年十月十日）"},{"type":"paragraph","text":"《人民日报》《红旗》杂志、《解放军报》社论"},{"type":"paragraph","text":"在我们全党全军全国人民沉痛悼念毛主席、决心继承毛主席遗志，沿着毛主席的革命路线继续胜利前进的时候，中共中央、人大常委会、国务院、中央军委公布了关于建立伟大的领抽和导师毛泽东主席纪念堂的决定；中共中央公布了关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定。这两项重要决定，是中国人民政治生活中的大事，是马克思主义发展史和国际共产主义运动史上的大事，具有极其重大的政治意义和深远的历史意义。"},{"type":"paragraph","text":"毛主席是我党我军和我国各族人民的伟大领袖，是国际无产阶级和被压迫民族被压迫人民的伟大导师。毛主席是我们心中永远不落的红太阳。毛主席的光辉形象永远是鼓舞我们前进的巨大力量。中央决定在我国首都北京建立伟大的领袖和导师毛泽东主席纪念堂，让世世代代人民群众能够亲眼瞻仰毛主席的遗容，缅怀毛主席的丰功伟绩，重温毛主席的教导，激"},{"type":"paragraph","text":"毛主席是当代最伟大的马克思主义者。毛主席在领导我国完成新民主主义革命和进行社会主义革命、社会主义建设的伟大斗争中，在反对党内右的和“左”的机会主义路线的伟人斗争中，在反对帝国主义、以苏修叛徒集团为中心的现代修正主义和各国反动派的伟大斗争中，在各个方面继承、捍卫和发展了马克思列宁主义。毛主席的著作，是无产阶级和被压迫民族被压迫人民革命斗争经验的科学总结，是我们取之不尽、用之不竭的思想宝库。中其中央决定出版《毛泽东选集》和筹备出版《毛泽东全集》、这对于我们全党全军全国各族人民继承毛主席遗志，把无产阶级革命事业进行到底，是极大的教育和鼓舞。我们一定要积极响应党中央的号召、撤起一个学习马列著作和毛主席著作的新高潮，努力提高马克思主义的理论水平，提高执行毛主席的革命路线和政策的自觉性，坚持反修防修，把各项社会主义事业做得更好。"},{"type":"paragraph","text":"毛泽东思想是在同国内外阶级敌人的斗争中，同党内右的和“左”的机会主义路线的斗争中发展起来的。要深刻理解和掌握毛泽东思想，就必须在斗争中学，在斗争中用。当前、我们要认真学习毛主席关于无产阶级专政下继续革命的理论，学习毛主席在批邓、反击有倾翻案风斗争中的一系列重要指示，深入批邓，继续反击有倾翻案风。要学习毛主席“要搞马克思主义，不要搞修正主义：要团结、不要分裂：要光明正大，不要搞阴谋诡计”的教导，同一切违背这三项基本原则的言论和行动作坚决的斗争。我们的党是毛主席亲手缔造的、久经阶级斗争和两条路线斗争烈火锻炼的党，是伟大的、光荣的、正确的党。历史的经验证明、要搞垮我们的党是不容易的。任何背叛马克思主义、列宁主义、毛泽东思想，算改毛主席指示的人，任何搞修正主义、搞分裂、搞阴谋诡计的人，是注定要失败的。"},{"type":"paragraph","text":"领导我们事业的核心力量是中国共产党。我们要最紧密地团结在以华国锋同志为首的党中央周围，维护党的团结和统一，加强组织性和纪律性，一切听从党中央的指挥、坚持以阶级斗争为纲，坚持党的基本路线，坚持无产阶级专政下的继续革命，巩固和发展无产阶级文化大革命的胜利成果，抓革命、促生产、促工作、促战备，夺取社会主义革命和社会主义建设的更大胜利，进一步巩固我国的无产阶级专政。"},{"type":"paragraph","text":"中共中央关于王洪文、张春桥、江青、"},{"type":"paragraph","text":"姚文元反党集团事件的通知"},{"type":"paragraph","text":"（一九七六年十月十八日）现将王洪文、张春桥、江青、姚文元反党集团事件通知你们。一、王洪文、张春桥、江青、姚文元进行反党篡权的阴谋活动，罪行极为严重。"},{"type":"paragraph","text":"他们不听毛主席的话，肆意篡改马克思主义、列宁主义、毛泽东思想，在国内国际一系列问题上反对毛主席的无产阶级革命路线，打着马克思主义的旗号，搞修正主义。"},{"type":"paragraph","text":"他们结成“四人帮”，进行分裂党、纂党夺权的宗派活动。一九七四年十月，“四人帮”背着中央政治局，私自派王洪文去见毛主席、告周恩来总理的状，妄图利用十届二中全会和四届人大组织他们的“内阁”，遭到毛主席的病斥。一九七六年二月三日，在中央发出一号文件"}],"authors":["《人民日报》编辑部","《红旗》杂志编辑部","《解放军报》编辑部"],"dates":[{"year":1976,"month":10,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":600,"page_end":601},"tags":[{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"676659ff33"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
