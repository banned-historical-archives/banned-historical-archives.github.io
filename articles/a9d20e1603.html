批复","authors":[],"dates":[{"year":1951,"month":12,"day":29}],"is_range_date":false,"parts":[{"text":"中共中央关于镇反有关问题给中南局的批复","type":"title"},{"text":"中南局并告各中央局及分局：","type":"appellation"},{"text":"十二月二十三日电悉。答复如下；","type":"paragraph"},{"text":"（一）原则上批准你们所提各项意见，惟捕人手续放宽一项，还须有以下限制：即除地主、恶霸、匪首、惯匪的逮捕，应照你们所提“经区批准即可行动”的意见办理外，其他劳动成分出身的人或农村中的知识分子，如因反革命案件牵涉必须加以逮捕者，其捕人批准权只可交给县，不要交给区。","type":"paragraph"},{"text":"（二）鉴于现时多数下级干部水平不高，必须于行动时严格实行已经规定了的报告制度，以便上级领导机关适时发现并纠正偏差或错误。","type":"paragraph"},{"text":"（三）编出一个镇反小册子，已着中央公安部照办。","type":"paragraph"},{"text":"（四）中南局来电随此电转发各中央局、分局，凡正在实行土改或复查工作的地区，情况与中南局所述相类似者，可在本电（一）（二）两条限制下参照实施。","type":"paragraph"},{"text":" 中  央十二月二十九日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9d20e1603"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
