南农学院"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"风雨杂感","type":"title"},{"text":"河南农学院万金精","type":"authors"},{"text":"[万金精：土壤农化教研组助教]","type":"subtitle"},{"text":"某日气象报告说：“今天有中雨和五级左右的大风”。敏感的人，都在准备应变，可是那天的实际情况，却依然是风和日丽，阳光普照。有人说：“这和我院的情况近似。”在这百花齐放百家争鸣的季节里，不少人时常担心风雨的袭击，怕的是“夜来风雨声，花落知多少。”我想气象站的预报可尽量要求它准确；而人们脑子中的这种预报，还是不准确为妙。又有人说：我们并不完全希望“无风无雨”，如果百花没有“雨露”，也还是开不起来的。似乎这又是矛盾，不过矛盾也不算坏，只要善于掌握和运用这些矛盾，就会出现一个更加美丽的“艳阳天气”。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b598b31ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
