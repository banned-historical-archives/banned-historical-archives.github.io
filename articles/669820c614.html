ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"乘胜展开政势收复失地创造机动战场","alias":"","parts":[{"type":"paragraph","text":"乘胜展开攻势收复失地创造机动战场"},{"type":"paragraph","text":"（1947年1月18日）刘、邓，并告陈、粟凹:"},{"type":"paragraph","text":"你们已击破方先觉刘汝珍两部3，形势极为有利。望乘胜展开攻势，向你们附近广大地区敌占据点中一切较薄弱可攻取者广为攻取，不论敌正规军、伪军、民团广为歼灭，收复大批失地，并不被铁路所限制。路北扫荡一时期，即可越过路南攻占大批县城市镇，北面有隙可乘又过路北行动，根本不被邱军所牵制。如邱军南下向你们求战而又好打，则集结全力歼灭邱军，仍继续执行上述任务；如不好打，则以一部钳制之，主力仍找好打之敌去打。如此大约有两个月时间即可将路北、路南广大地区创造为机动战场，以便吸引邱军及其他薛顾主力来此而歼灭之。大约在今年五月间主"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]陈，指陈毅，当时任山东野战军司令员兼政治委员。粟，指粟裕，当时任华中野战军司令员。"},{"type":"paragraph","text":"[3]方先觉，当时任国民党军整编第八十八师师长。刘汝珍，当时任国民党军整编第六十八师师长。"},{"type":"paragraph","text":"[4]路北，指陇海路徐州至开封段以北。[5]邱，指邱清泉，当时任国民党军第五军军长。[6]薛，指薛岳，当时任国民党军徐州绥靖公署主任。顾，指顾祝同，力即可向中原出动，我五师在陕南、豫西、鄂西非常困难，如你们出动过迟即有失败之危险"},{"type":"paragraph","text":"军委子巧亥"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":1,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":373,"page_end":374},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"669820c614"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
