r":1988,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人们通常认为，资产阶级的道德原则是利己主义。余涌在《探索》第二期撰文说，资产阶级的道德原则是合理利己主义而非极端利己主义。所谓合理利己主义就是它一方面强调个人谋取私利的道德意义，无私利则无道德可言；另一方面，它要求在谋取私利的过程中，应以不损害他人和社会的利益为限。"},{"type":"paragraph","text":"如果一种道德一味强调个人的一己利益，不讲牺牲，不讲责任，它的调节作用就会荡然无存。极端利己主义是不可能作为一种调节人与人之间关系的道德原则的。资产阶级道德作为资产阶级社会意识，它同奴隶主阶级和封建地主阶级的道德一样，是要维护整个阶级的利益。为了达到这个目的，它必须对资产者本身的行为进行调节，换言之，它必须对资产者所表现出来的极端的利己行为有所限制。这就是要求人们应该采取一种合理利己主义的态度来对待他人和社会。　(名俊摘)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"827058492d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
