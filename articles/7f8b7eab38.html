67,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚信毛主席的教导"},{"type":"paragraph","text":"一位二十多岁的古巴青年在一个展览会上碰见一位中国同志，中国同志请他吸一支中国香烟。他抽着中国香烟，热情地说：“我访问过中国，我在天安门广场上见过毛主席。”他叙述了访问中国的观感，感慨地说：“抽一支中国香烟，使我回忆起在中国经历的许多难忘的动人的往事。”当他向中国同志告别的时候，他放低声音在中国同志的耳边说：“毛主席说得好：帝国主义和一切反动派都是纸老虎。请你相信，我对这句名言坚信不移。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f8b7eab38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
