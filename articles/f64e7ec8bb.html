tes":[{"year":1952,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海青年文工团从去年十月开始，进行了三个月的整训学习。学习的目的是进一步提高团员的政治水平，树立为工农兵服务的文艺思想，并明确青年文工团的方针任务。"},{"type":"paragraph","text":"学习的进行分为三阶段。在第一阶段中，学习了毛主席“在延安文艺座谈会上的讲话”、周扬同志的“坚决贯彻毛泽东文艺路线”和夏衍同志的“从武训传的批判检讨我在上海文化艺术界的工作”等文件，同时联系了当前上海的文艺运动及文工团过去的工作，进行了初步的文艺思想检查。在第二阶段中，学习了全国文工团工作会议的精神及“团中央关于各大行政区及重要省市青年文工团的决定”，进一步明确了今后的方针任务。在第三阶段中，团员普遍进行了较深刻的文艺思想检查并作了思想总结。"},{"type":"paragraph","text":"在学习中，不少同志暴露了过去的小资产阶级及资产阶级文艺思想，以及脱离政治、脱离生活，单纯要求提高技术的错误观点。有的同志在思想总结时说:过去他苦闷的只是如何提高技术，他以为自己下过工厂、参加过土地改革，又曾到朝鲜作过慰问工作。脑中灵感不少，但因没有技术，有了材料还是表现不出来。通过这次学习后，他才认识到过去所谓灵感，实质上是小资产阶级主观的冲动。认识到提高技术和提高政治水平及对现实生活的观察能力是分不开的。"},{"type":"paragraph","text":"许多同志检讨了过去他们在“提高艺术”的幌子下，滋长着的个人主义思想。他们之中有的只想关门提高技术，“十年寒窗，一鸣惊人”。对配合任务和下工厂搞辅导工作都认为是“牺牲”。有的甚至错误地说:“我现在努力提高，你们搞普及，我学到了社会主义时期，可以为社会主义服务。这也是一种分工。”"},{"type":"paragraph","text":"有的同志暴露了盲目崇拜西洋，轻视中国民族遗产的错误思想。如学了小提琴回来就不愿拉二胡；向专家们学习了西洋发声法，就不再情愿用“土嗓子”来唱翻身道情。又如一个同志在台上唱快板演杂耍时，想起自己的爱人看到自己搞这样的玩意儿，一定认为可耻，回到宿舍中就大哭了一场。这些同志经过学习后，都认识到这是受了资产阶级艺术思想的影响，并严格地批判了这种思想。"},{"type":"paragraph","text":"在学习中，许多同志检讨了自己过去用小资产阶级思想感情对待现实生活的错误态度。他们参加群众运动，常抱旁观者的态度，隔岸观火。或者满足于轰轰烈烈的场面，对事物走马看花。"},{"type":"paragraph","text":"通过这次整训，同志们都明确了作为一个青年文艺工作者，必须坚持工人阶级思想领导，全身心地投入群众斗争，并努力改造自己。只有这样才能担负起党的文艺事业，迎接文化建设高潮的到来。"},{"type":"paragraph","text":"目前青年文工团正在深入地开展反贪污、反浪费、反官僚主义运动，为进一步肃清资产阶级思想对文艺战线的猖狂进攻而斗争。"},{"type":"paragraph","text":"(庄增明)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f64e7ec8bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
