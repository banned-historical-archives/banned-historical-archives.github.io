议草案的说明》的意见的信和批语","authors":[],"dates":[{"year":1955,"month":10,"day":19}],"is_range_date":false,"parts":[{"text":"毛泽东关于征求对《关于农业合作化问题的决议草案的说明》的意见的信和批语","type":"title"},{"text":"一","type":"subtitle"},{"text":"政治局各同志：","type":"appellation"},{"text":"送上陈伯达同志准备在六中全会上讲的《关于农业合作化问题的决议草案的说明》一件，请即予审阅。如有修改的意见，请在文件上注明，于十月二日上午十二时以前送交陈伯达同志。","type":"paragraph"},{"text":" 毛泽东九月三十日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"尚昆同志：","type":"appellation"},{"text":"此件请于今夜印十几份，明日上午即送交各政治局委员，外加邓子恢、陈伯达、廖鲁言等人各一份。并请你用电话催他们于十月二日上午十二时以前看完，批注意见直交陈伯达同志，二日下午或晚上必须印发到六中全会各同志。","type":"paragraph"},{"text":"我的短信，请附印在封面上，或另印一纸条。","type":"paragraph"},{"text":" 毛泽东九月三十日廿二时","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"尚昆同志：","type":"appellation"},{"text":"此件请即付印，发给参加六中全会的各同志，每人一份，于明（三）日发到各人手里。","type":"paragraph"},{"text":" 毛泽东十月二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e85ae56f82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
