script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本人民反对佐藤勾结美国的政策  冈正芳谴责日美串通一气加紧侵略亚洲  一些政党和资产阶级舆论不满日美经济会议结果","authors":[],"dates":[{"year":1965,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本人民反对佐藤勾结美国的政策"},{"type":"paragraph","text":"冈正芳谴责日美串通一气加紧侵略亚洲"},{"type":"paragraph","text":"一些政党和资产阶级舆论不满日美经济会议结果"},{"type":"paragraph","text":"新华社讯　东京消息：日本共产党中央委员会政治局委员冈正芳十六日在《赤旗报》上就日美贸易经济联合委员会第四次会议的结果发表谈话，谴责日美两国政府串通一气加紧侵略亚洲。"},{"type":"paragraph","text":"冈正芳指出，联合委员会的这次会议是在美国利用日本做它的最大的根据地在越南加紧侵略的时候举行的。他揭露说：在联合委员会会议上，美国一直要求日本协助它执行帝国主义的世界政策，特别是它对亚洲的侵略政策。腊斯克还公开要求日本加强军事准备。而日本方面公开表示“日本政府赞赏美国的各项政策，日美两国在越南问题上基本上没有分歧。”"},{"type":"paragraph","text":"冈正芳说，“这意味着佐藤内阁将进一步协同美国推行以越南为中心的侵略亚洲政策，加速步伐走复活军国主义和加强施行反动政策的道路。”"},{"type":"paragraph","text":"冈正芳说：“日本参加亚洲开发银行正是意味着日本加入一个美国在其中充当头目的殖民主义集体统治制度，履行它作为美国侵略亚洲政策的顺从盟国的责任。”他还指出，不久前签订的“日韩基本条约”显然是美国侵略亚洲计划中的一个环节。"},{"type":"paragraph","text":"冈正芳最后强调指出：“日本的广大人民反对美国在亚洲的侵略政策，反对佐藤内阁勾结美国的政策。日美贸易经济联合委员会第四次会议完全不顾日本人民的意愿，我们将为反对美国侵略亚洲，为推翻同美国勾结并使日本人民陷入重重困难的佐藤反动内阁而继续斗争。”"},{"type":"paragraph","text":"据新华社十八日讯　东京消息：日本一些政党和资产阶级舆论对日美贸易经济联合委员会第四次会议的结果表示不满。"},{"type":"paragraph","text":"日本社会党书记长成田知巳十五日发表谈话说：“日美贸易经济委员会会议是完全片面地按照美国的意图举行的，对日本来说，只是背上了一个沉重的负担”。会议的过程表明，“自由民主党没有能力维护日本国民的利益。它在日美安全条约体系的范围以内从开头就采取了没有出息的从属于美国的外交姿态。”"},{"type":"paragraph","text":"他指出，美国要求日本对美国的亚洲战略实行合作，日本方面全盘接受了这个要求。这是走向美国、日本、南朝鲜和台湾结成亚洲反共军事同盟的一步。"},{"type":"paragraph","text":"日本民主社会党书记长西村荣一在十五日也表示不满。他说：这次会议“从头到尾都是按照美国的意图举行的”。"},{"type":"paragraph","text":"日本方面的主张一概没有得到贯彻，只是听取了美国方面的说明。这暴露了追随美国的实际情况。"},{"type":"paragraph","text":"《朝日新闻》的社论委员向井发表广播谈话说：约翰逊提出的十亿美元“援助”东南亚计划，“各国认为是‘鞭子和胡萝卜政策’，特别是当事者东南亚各国也并没有愉快地接受”，“而日本原封不动地表示赞同，结果当了美国的走卒”。"},{"type":"paragraph","text":"《每日新闻》和《读卖新闻》也都发表社论，对这次日美会谈表示失望。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"404e769a66"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
