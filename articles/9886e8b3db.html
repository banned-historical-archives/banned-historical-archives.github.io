ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"拟创造大青山根据地","alias":"","parts":[{"type":"paragraph","text":"拟创造大青山根据地！"},{"type":"paragraph","text":"（1938年6月11日）朱、彭，贺、萧、关："},{"type":"paragraph","text":"大青山脉?的重要性如来电所述，该地应派何种部队、何人指挥及如何作法，由你们依据情况处理之。惟开始建立根据地时，敌人知其重要意义，必多方破坏，故部队须选精干者，领导人须政治军事皆能对付，且能机警耐苦，而有决心在该地创立根据地者。陕北骑团现控制河套蒙古广大区域，在定盐?以北五百里之杭锦旗4-带配合蒙民抗御敌军南下，故不能调动。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"六月十一日"},{"type":"paragraph","text":"[1]这是毛泽东给朱德、彭德怀和八路军第一二○师师长贺龙、副师长萧克、政治委员关向应的电报。"},{"type":"paragraph","text":"[2]大青山脉，在内蒙古自治区土默川平原以北，属阴山山脉中段。"},{"type":"paragraph","text":"[3]定，指定边，县名，位于陕西西北部，洛河上游，邻接甘肃、内蒙古、宁夏等省区。盐，指盐池，县名，位于宁夏回族自治区东部。"},{"type":"paragraph","text":"[4]杭锦旗，位于内蒙古自治区伊克昭盟西北。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":6,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":353,"page_end":353},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9886e8b3db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
