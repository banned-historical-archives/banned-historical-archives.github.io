art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一辈子大树特树毛主席的绝对权威","authors":["丰福生","学习毛主席著作积极分子"],"parts":[{"type":"paragraph","text":"杨成武同志的重要文章，狠狠地批判了中国赫鲁晓夫及其代理人反革命修正主义分子罗瑞卿，大树特树了毛主席和毛泽东思想的绝对权威。好得很！真是好得很！"},{"type":"paragraph","text":"我这个在旧社会不懂事的放牛娃成了无产阶级革命战士，靠的是毛泽东思想。在无产阶级文化大革命的大风大浪中，我们所以能够心明眼亮，立场坚定，不迷失方向，靠的还是毛泽东思想。毛泽东思想是统帅，是灵魂，是无产阶级革命战士的命根子。毛泽东思想用到哪里哪里灵，用到哪里哪里就改天换地，面貌全新。有了毛泽东思想，就没有做不好的工作，没有解决不了的问题，没有克服不了的困难，没有战胜不了的敌人。有了毛泽东思想，我们就天不怕，地不怕，不怕帝国主义、修正主义和一切反动派。我们就能无往而不胜，无敌于天下。"},{"type":"paragraph","text":"我们的一生，就是革命到底的一生，斗私批修的一生，无限忠于毛主席的一生，大树特树毛泽东思想绝对权威的一生。我们要更高地举起毛泽东思想伟大红旗，以林副主席为榜样，在阶级斗争的大风大浪中，活学活用毛主席著作，把毛泽东思想真正学到手，百分之百地听毛主席的话，百分之百地照毛主席的指示办事，永远做毛主席的好战士。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b9d83eba2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
