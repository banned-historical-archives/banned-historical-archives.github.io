ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对李达来信的批语","alias":"","parts":[{"type":"paragraph","text":"对李达来信的批语!"},{"type":"paragraph","text":"（1966年8月10日）陶铸同志阅后，转任重同志酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十日"},{"type":"paragraph","text":"[1]李达，原任全国人大常委会委员、武汉大学校长。当时被错误地打成所谓武汉大学“三家村黑头目”，戴上“叛徒”“地主分子”的帽子，并被开除党籍。1966年7月19日，他给毛泽东写信，请求解救他。毛泽东见信后即写了这个批语。8月10日，中共中央书记处常务书记陶铸接到毛泽东的批语后，立即批示：“即送任重同志。”任重，即王任重，当时任中共湖北省委第一书记。8月24日，李达受迫害致死。1980年，中共中央书记处批准湖北省委的决定，为李达平反昭雪，恢复名誉，恢复党籍。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":467,"page_end":467},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"湖北文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20dcb17262"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
