art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席开辟的革命航道奋勇前进庆祝中华人民共和国成立十七周年","authors":[],"parts":[{"type":"paragraph","text":"朵朵葵花向阳开 永远跟着毛主席"},{"type":"paragraph","text":"伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛主席和我们在一起。毛主席呀毛主席，是您领导我们从一个胜利走向另一个胜利。我们要紧紧跟着您，踏平万重山，劈开千层浪，让毛泽东思想伟大红旗永远高高飘扬。上图是毛主席和他的亲密战友林彪同志以及周恩来同志在天安门城楼接见红卫兵代表。"},{"type":"paragraph","text":"千条万条 活学活用毛主席著作是第一条"},{"type":"paragraph","text":"在无产阶级文化大革命中，我国人民掀起了活学活用毛主席著作的新高潮，决心用毛泽东思想武装头脑，做旧世界的批判者，新世界的建设者和保卫者。这是广西壮族自治区兴安县漠川公社社员在举行活学活用毛主席著作讲用会。"},{"type":"paragraph","text":"把我军办成一个毛泽东思想的大学校"},{"type":"paragraph","text":"广大指战员决心把我军办成一个毛泽东思想的大学校，使我军在非常无产阶级化、非常战斗化的道路上向更高阶段前进。这是英勇无敌的“海上先锋艇”的指导员徐寿祺正给战士们讲解毛主席著作。"},{"type":"paragraph","text":"抓革命促生产 革命生产双胜利"},{"type":"paragraph","text":"我国工人阶级以无比高昂的革命热情，决心在无产阶级文化大革命中，更高地举起毛泽东思想伟大红旗，为建设和保卫祖国，为支援世界人民的革命斗争，作出更大的贡献。这是火车车轮轮箍厂的职工在写决心书，他们保证要在文化大革命中，优质高产地完成生产任务。"},{"type":"paragraph","text":"七亿人民七亿兵 万里江山万里营"},{"type":"paragraph","text":"我国广大民兵努力学习毛主席关于人民战争的思想，正以百倍信心，百倍警惕，随时准备配合人民解放军，把胆敢侵犯我国的美帝国主义及其帮凶消灭在人民战争的汪洋大海里。这是广东省宝安县沙头角公社盐田大队民兵在训练前学习毛主席著作。"},{"type":"paragraph","text":"毛泽东思想闪金光 秋收一片好景象"},{"type":"paragraph","text":"学习毛主席著作的先进单位——江苏省邗江县方巷大队，以毛泽东思想为武器，战胜了严重的干旱，获得秋季较大丰收。社员们怀着无限热爱毛主席、无限热爱毛泽东思想的革命激情，在场头上表演自己编写的歌舞《毛主席著作象太阳》。（本版照片都是新华社供稿）（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2568b3041"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
