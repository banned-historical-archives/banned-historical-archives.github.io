"],"dates":[{"year":1969,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想伟大红旗在遵义高高飘扬"},{"type":"paragraph","text":"贵州省遵义地区革命委员会"},{"type":"paragraph","text":"伟大的、光荣的、正确的中国共产党第九次全国代表大会隆重开幕了！永远忠于伟大领袖毛主席的遵义地区三百八十万英雄儿女，又一次浸沉在无比幸福和欢乐之中。我们满怀激情歌唱毛主席亲自发动和领导的无产阶级文化大革命的伟大胜利，歌唱毛主席无产阶级革命路线的伟大胜利，衷心祝愿毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"英雄的遵义儿女从革命实践中，深深懂得了一个真理：跟着毛主席就是方向，就是胜利。"},{"type":"paragraph","text":"遵义人民永远不会忘记，三十四年前，我们迎来了劳动人民的大救星毛主席。在一九三五年一月的永载史册的遵义会议上，确立了伟大领袖毛主席在全党全军的领导地位。从此，中国革命一直沿着伟大舵手毛主席指引的航向，从胜利走向更大的胜利。"},{"type":"paragraph","text":"遵义人民永远没有忘记，在具有伟大历史意义的遵义会议期间，在遵义广场上的万人大会上，亲眼看见了伟大领袖毛主席的光辉形象，亲耳聆听了伟大导师毛主席的伟大教导。毛主席亲自哺育的遵义儿女，朝朝夕夕，日日夜夜，无时不想念那最幸福的时刻，无时不想念伟大领袖毛主席。是毛主席的伟大教导，指引着我们战胜了一个又一个的困难，夺取了一个又一个的胜利。遵义儿女永远跟着毛主席，海枯石烂不变心，山崩地塌志不移。"},{"type":"paragraph","text":"在伟大的无产阶级文化大革命中，遵义儿女继承和发扬了遵义会议的光荣革命传统，紧跟毛主席的伟大战略部署，同以叛徒、内奸、工贼刘少奇为首的资产阶级司令部及其在贵州和遵义地区的代理人进行了英勇斗争，取得了伟大的胜利。毛泽东思想伟大红旗在遵义名城高高飘扬。"},{"type":"paragraph","text":"经过无产阶级文化大革命锻炼的遵义人民，阶级斗争和两条路线斗争的觉悟极大提高，全区斗、批、改运动深入开展。广大革命人民响应林副主席的伟大号召，读毛主席的书，听毛主席的话，照毛主席的指示办事，活学活用毛泽东思想的群众运动日益深入开展，伟大的毛泽东思想已在广大人民头脑中深深扎根。毛主席的光辉著作，已成为广大革命群众的“革命宝，传家宝，一时一刻也离不了”了。"},{"type":"paragraph","text":"革命实践使遵义儿女深深体会到，毛主席的无产阶级革命路线是我们党和广大劳动人民的生存线、生命线。全区革命人民正在毛主席关于“抓革命，促生产，促工作，促战备”的伟大方针指引下，奋勇前进。革命和生产形势一片大好。"},{"type":"paragraph","text":"“雄关漫道真如铁，而今迈步从头越。”英雄的遵义儿女，决心更高地举起毛泽东思想伟大红旗，继承和发扬革命传统，紧跟伟大领袖毛主席乘胜前进！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"贵州文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a0caec811"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
