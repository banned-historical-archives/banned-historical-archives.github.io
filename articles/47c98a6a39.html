art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中宣部通知各级党组织认真组织学习叶剑英同志在国庆三十周年大会上讲话","authors":[],"parts":[{"type":"paragraph","text":"据新华社十月三日讯 中共中央宣传部最近通知各级党委宣传部门，根据党的十一届四中全会公报精神，认真组织学习叶剑英同志《在庆祝中华人民共和国成立三十周年大会上的讲话》。"},{"type":"paragraph","text":"通知指出，这个讲话对国内外普遍关心的有关我国革命和建设的许多重大问题作了明确的马克思主义的回答，是在全党和全国人民群众中深入进行思想政治路线教育的重要教材和进一步动员人民同心同德、聚精会神搞四化的有力武器，对全党全军全国的工作具有长期的指导意义。各级党组织要根据四中全会公报的精神，组织好对这个讲话和其他文件的学习。"},{"type":"paragraph","text":"通知说，各级领导干部要首先带头学好这个讲话，并亲自对干部和群众进行必要的辅导。通过学习，要能加深对毛泽东思想科学体系的完整的、准确的认识，进一步批判林彪、“四人帮”的极左路线，恢复和确立一切从实际出发、实事求是、理论联系实际的辩证唯物主义的思想路线，把大家的思想和行动统一到四个现代化建设这一中心任务上来。"},{"type":"paragraph","text":"通知指出，这一学习要贯彻解放思想、开动机器、密切联系实际的精神。提倡坚持真理，修正错误，以理服人。坚持“三不”主义，允许保留不同意见，要团结起来向前看。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47c98a6a39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
