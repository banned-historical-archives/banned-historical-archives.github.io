script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西德工人学生反剥削反法西斯斗争遍及全国  一万学徒工聚集科隆举行大规模示威抗议资本家和政府压榨  法兰克福大学生高呼反美口号怒冲为美帝侵略效劳的研究所","authors":[],"dates":[{"year":1969,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西德工人学生反剥削反法西斯斗争遍及全国"},{"type":"paragraph","text":"一万学徒工聚集科隆举行大规模示威抗议资本家和政府压榨"},{"type":"paragraph","text":"法兰克福大学生高呼反美口号怒冲为美帝侵略效劳的研究所"},{"type":"paragraph","text":"新华社波恩九日电  西德青年工人和学生连日来举行各种示威和集会，反对垄断资本统治，反对军国主义和新法西斯政党的罪恶活动。"},{"type":"paragraph","text":"西德学徒工一万人，七日从全国各地集中到科隆市，举行了声势浩大的集会和示威游行，抗议资本家对学徒进行残酷剥削，反对西德议会将要通过的维护这种剥削的所谓“职业培训法”。示威者高举着要求改善学习条件，反对剥削等标语牌通过市中心，接着在市体育馆举行抗议大会。在会上，示威者高呼口号，向毛主席致敬。他们指出必须坚持阶级斗争，并谴责在会上讲话的黄色工会头子是叛徒。"},{"type":"paragraph","text":"同一天，二百五十名大、中、小学生在汉诺威市举行示威游行，反对市内公共车辆车票涨价。示威者举行了抗议集会，并散发传单，指出近几年来车票不断涨价，受害者主要是收入低微的工人家庭。学生们还到各电车站举行静坐示威，使得电车停驶，交通混乱。"},{"type":"paragraph","text":"法兰克福大学六百名学生二日举行集会，抗议法兰克福巴特勒研究所为美帝国主义进行侵略战争效劳。会后，二百五十名学生高呼反对为美帝侵略战争服务的口号，冲向巴特勒研究所。反动当局出动了上百名警察，使用高压水龙进行镇压。学生们用石块进行了英勇的还击。学生们接着还公布了巴特勒研究所接受美国和西德国防部的委托从事侵略战争研究的材料，使得企图抵赖的该研究所领导人无法狡辩。"},{"type":"paragraph","text":"法兰克福大学的约五十名学生，三日还占领了这所大学的经济与社会学系，反对腐朽的教育制度。学校反动当局叫来了数十名警察无理逮捕了许多学生。"},{"type":"paragraph","text":"与此同时，西德青年为了反对西德新法西斯党国家民主党的罪恶活动，进行了英勇的斗争。"},{"type":"paragraph","text":"不来梅青年五月三十一日砸烂了这个新法西斯党驻不来梅的办公处，并在大街上焚烧了这个法西斯党的文件。"},{"type":"paragraph","text":"同一天，一百五十名青年在汉堡市举行示威，反对国家民主党在汉堡召开州党代表会议。汉堡市当局出动了大批警察，对新法西斯党的会议进行了严密的保护，并逮捕了一些要进入会场的示威者。"},{"type":"paragraph","text":"基尔市的数百名青年，一日举行示威，反对有新法西斯党头目阿道夫·冯·塔登参加的一次集会。反动当局悍然指使警察镇压示威者，保护新法西斯党。示威者用石头同前去镇压的警察进行了英勇的搏斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41f52af4e9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
