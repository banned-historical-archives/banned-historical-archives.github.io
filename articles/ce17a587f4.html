script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"极“左”是极右的影子","authors":["沈春华"],"dates":[{"year":1968,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海硅钢片厂　沈春华"},{"type":"paragraph","text":"在伟大统帅毛主席的直接指挥下，全国亿万军民斗志昂扬，正在夺取无产阶级文化大革命的全面胜利。"},{"type":"paragraph","text":"无产阶级文化大革命全面胜利之时，就是一切阶级敌人彻底完蛋之日。因此，那些临近灭亡的没落阶级必然进行垂死挣扎，发出各种绝望的嚎叫。“怀疑一切，打倒一切”，就是他们在当前新形势下常常使用的一个极其阴险毒辣的斗争手法。"},{"type":"paragraph","text":"反革命两面派陶铸，在无产阶级文化大革命初期，顽固地站在资产阶级右派立场上，忠实执行中国赫鲁晓夫“打击一大片，保护一小撮”的资产阶级反动路线，疯狂围剿革命左派，妄图把轰轰烈烈的无产阶级文化大革命打下去。后来，无产阶级革命派冲破了资产阶级反动路线的罗网，向资产阶级司令部猛烈开炮。陶铸这个资产阶级司令部的黑干将，眼看资产阶级司令部摇摇欲坠，就从极右跳到极“左”，打出“怀疑一切，打倒一切”的极“左”旗号，说什么“每个司令部都不知道是什么司令部，……我主张普遍轰”，“任何人都可以反对”等等，妄图混淆无产阶级司令部和资产阶级司令部的界限，搅乱革命阵线，转移斗争目标。不管是前阶段的极右，还是后阶段的极“左”，其目的都是一致的，就是把矛头指向以毛主席为首的无产阶级司令部，妄想动摇以毛主席为首的无产阶级司令部。极“左”和极右，是陶铸向无产阶级司令部进攻的反革命两手。阶级敌人知道，光凭右的一手，公开散布反党、反社会主义、反毛泽东思想的反动言行，很容易被人所觉察；因此，他们常常打着极“左”的旗号来同我们较量。"},{"type":"paragraph","text":"极“左”的实质是极右。斯大林早在一九二八年，在同当时以极“左”面目出现的托洛茨基反革命集团作斗争的时候，就一针见血的指出:“我们说:哪里有右倾，那里就必定有‘左’倾。‘左’倾是右倾的影子。……倾向于托洛茨基主义的人实质上就是右派，只不过是他们的另一面，是用‘左的’词句掩饰起来的右派。”“因此要进行两条战线的斗争:既反对右倾，又反对‘左’倾。”可见，极“左”和极右都属于反动的资产阶级思想体系。它们的表现形式虽然不同，但最终目的都是复辟资本主义。"},{"type":"paragraph","text":"散布极“左”思潮的人，他们对于坚持毛主席的无产阶级革命路线，在两条路线斗争中排除右的和极“左”方面干扰的无产阶级司令部的人，怀有刻骨仇恨，诬蔑为只对反“左”有兴趣，对反右不起劲。这完全是恶毒的诽谤。他们的罪恶企图，就是要把真正的革命左派打成右派，而把自己打扮成“反右”的“英雄”，妄图分裂无产阶级司令部。"},{"type":"paragraph","text":"在夺取无产阶级文化大革命全面胜利的伟大战役中，我们必须时刻注意阶级斗争的新动向，不断排除来自右的和极“左”方面的干扰，牢牢掌握革命斗争的大方向，紧跟毛主席的伟大战略部署，坚持将无产阶级文化大革命进行到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce17a587f4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
