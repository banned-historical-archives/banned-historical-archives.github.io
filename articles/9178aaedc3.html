  周恩来总理、王洪文副主席参加了会见","authors":[],"dates":[{"year":1974,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见日本外务大臣大平正芳"},{"type":"paragraph","text":"毛主席同大平正芳外务大臣进行了友好、广泛的谈话"},{"type":"paragraph","text":"周恩来总理、王洪文副主席参加了会见"},{"type":"paragraph","text":"新华社一九七四年一月五日讯　毛泽东主席今天上午八时半会见日本外务大臣大平正芳，同他进行了友好、广泛的谈话。"},{"type":"paragraph","text":"谈话时，大平正芳外务大臣向毛主席转达了田中内阁总理大臣的问候，并且祝毛主席身体健康。毛主席请大平外务大臣代他问候田中内阁总理大臣，也问候二阶堂内阁官房长官。毛主席还赠送给大平外务大臣一本《怀素自叙帖真迹》影印本。"},{"type":"paragraph","text":"周恩来总理、王洪文副主席参加了这次会见，并且在会见厅门口迎接贵宾。周恩来总理向大平外务大臣介绍王洪文副主席后，他们长时间地握手。"},{"type":"paragraph","text":"参加会见的还有外交部部长助理王海容，以及林丽韫、王效贤、唐闻生。（附图片）"},{"type":"paragraph","text":"毛泽东主席同大平正芳外务大臣握手。新华社记者摄"},{"type":"paragraph","text":"毛泽东主席会见大平正芳外务大臣时的情形。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9178aaedc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
