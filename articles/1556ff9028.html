ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于注意逃缅蒋军配合西藏叛乱在我边境扩大骚扰的批语","alias":"","parts":[{"type":"paragraph","text":"关于注意逃缅将军配合西藏叛乱"},{"type":"paragraph","text":"在我边境扩大骚扰的批语"},{"type":"paragraph","text":"（1959年5月4日）克诚同志："},{"type":"paragraph","text":"（一）第三件情报?应发给云南省委、军区并转有关地区各级党政军直至基层干部，引起警惕，准备应付可能的变乱；（二）指示云南省委、军区立即加强有关地区的工作，派得力人去各地调查情况，研究对策，千万不可马糊大意，轻易相信下面太平无事的书面报告。军委亦应派员去云南布置对策。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月四日上午五时"},{"type":"paragraph","text":"[1]克诚，即黄克诚，当时任中共中央书记处书记、中央军委秘书长、中国人民解放军总参谋长。"},{"type":"paragraph","text":"[2]这份情报说，逃缅蒋军总指挥柳元麟今年2月中旬奉命赴台湾，蒋介石等亲自接见，指示他设法策应云南、西藏等地匪特暴乱，并答应增加对所部的经费和补给，以巩固和扩充实力。柳元麟返缅后积极部署，拟以云南西盟地区为重点，纠集匪徒，发动暴乱。在这份情报的题目旁边，毛泽东还批有“注意”二字。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":5,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":497,"page_end":497},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1556ff9028"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
