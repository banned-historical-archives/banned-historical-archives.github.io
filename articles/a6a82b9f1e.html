ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"准备在邹、滕地区打大齐灭战","alias":"","parts":[{"type":"paragraph","text":"准备在邹、滕地区打大歼灭战"},{"type":"paragraph","text":"（1945年10月31日）陈、黎2:"},{"type":"paragraph","text":"据息，临城?陈大庆?九十七军以护路为任务，若干天内似无强大后续力量。惟邹、滕地区蒋介石在所必争，必将增兵北进，我以主力位于该区，准备打大歼灭战是完全必要的。渤海军区在德州南北占领两段铁路，占领黄河涯、恩县，歼灭一部敌伪，具有很大意义。望令该军区扩大铁路占领区，发动民众公私兼顾，掘毁路基，并集中注意于歼灭霍守义?十二军。该军似急于赴东北，决不应让其过去。为此目的，请考虑增加该方面兵力，并加强作战指导。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"酉世[1]邹、滕，指山东邹县和滕县。"},{"type":"paragraph","text":"[2]陈，指陈毅，当时任新四军军长兼山东军区司令员。黎，指黎玉，当时任山东军区副政治委员。"},{"type":"paragraph","text":"[3]临城，今山东枣庄市薛城。"},{"type":"paragraph","text":"[4]陈大庆（1905—1973)，江西崇义人。当时任国民党军第十九集团军总司令。"},{"type":"paragraph","text":"[5]恩县，1956年撤销，辖区分别划归山东平原、夏津和武城三县。1945年，毛泽东和周恩来在延安。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":495,"page_end":496},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6a82b9f1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
