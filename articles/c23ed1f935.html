],"dates":[{"year":1965,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京20日电　刘少奇主席和夫人王光美今天下午接见了以坦桑尼亚第一副总统卡鲁姆的夫人为首的坦桑尼亚桑给巴尔妇女代表团全体成员，同她们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有康克清、黄甘英、朱红。"},{"type":"paragraph","text":"新华社北京20日电　周恩来总理今天中午接见由坦桑尼亚第一副总统卡鲁姆的夫人率领的坦桑尼亚桑给巴尔妇女代表团，同她们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有全国妇联副主席康克清，陈毅副总理的夫人张茜，全国妇联书记处书记黄甘英，外交部礼宾司副司长韩叙。"},{"type":"paragraph","text":"坦桑尼亚驻中国大使馆临时代办罗金巴纳也在座。"},{"type":"paragraph","text":"接见后，周恩来总理举行午宴，欢迎卡鲁姆夫人和她率领的坦桑尼亚桑给巴尔妇女代表团。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"康克清","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c23ed1f935"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
