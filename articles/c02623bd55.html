,"authors":[],"dates":[{"year":1958,"month":6,"day":7}],"is_range_date":false,"parts":[{"text":"中共麻城县委批发龟山区大字报运动的经验","type":"title"},{"text":"各区委、指导组、乡总支：","type":"appellation"},{"text":"龟山区委在大农忙中开展大字报运动，继续贯彻整风，以大字报的熊熊火焰，不断地鼓足干部群众的革命干劲，烧掉五气；这个经验十分宝贵，值得在全县范围内推广。","type":"paragraph"},{"text":"应当指出，该区的大字报所以能发挥那样大的威力，是由于大字报真正被广大群众所掌握，群众敢于通过大字报大量地批评作风不好干部，表扬好干部，也敢大胆地开 展自我批评，诚恳地帮助后进，烧掉自己的保守思想。事实证明，那里真正把大字报形成了群众性的运动，那里的整风就整得彻底，生产就出现了更大的高潮。相 反，有些地方虽然也贴出了不少大字报，但不是群众性的，只是少数干部写的，甚至于光是干部批评群众，并不是群众适用这个武器来帮助干部整风，所以干部作风改进的不够，生产运动声势还不大。因此，开展大字报运动必须充分发动群众，真正形成群众性的运动。希望各地特别注意这一点。","type":"paragraph"},{"text":" 县委 6.3","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c02623bd55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
