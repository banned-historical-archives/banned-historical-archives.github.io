art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"哈比亚利马纳总统离京去长沙参观访问邓副总理等到机场欢送 阿沛·阿旺晋美副委员长等陪同前往","authors":[],"parts":[{"type":"paragraph","text":"据新华社六月十一日讯 卢旺达共和国总统、全国发展革命运动主席和创始人朱韦纳尔·哈比亚利马纳少将和夫人及其随行人员结束了在北京的访问，今天下午由人大常委会副委员长阿沛·阿旺晋美、外交部副部长何英和夫人王浩陪同，乘专机离开北京前往长沙参观访问。"},{"type":"paragraph","text":"国务院副总理邓小平，中国人民解放军副总参谋长何正文，外经部副部长程飞，农林部副部长何康，交通部副部长曾直，民航总局副政委王文，全国妇联负责人黄甘英以及数千名群众，到机场热烈欢送卢旺达贵宾。"},{"type":"paragraph","text":"在飘扬着中、卢两国国旗的首都机场上举行了隆重欢送仪式。军乐团奏卢旺达国歌和中国国歌。哈比亚利马纳总统由邓小平副总理陪同检阅了中国人民解放军陆海空三军仪仗队。英姿勃勃的持枪民兵向哈比亚利马纳总统行注目礼。当卢旺达贵宾挥手向欢送群众告别时，人们载歌载舞，热情表达中国人民对卢旺达人民的深厚友谊，祝愿中卢两国友好合作关系和两国人民的友谊不断发展。"},{"type":"paragraph","text":"哈比亚利马纳总统和夫人等卢旺达贵宾由北京市革命委员会副主任王宪陪同，今天上午参观了十三陵水库，游览了长城和定陵。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d889f866d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
