<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1969,"month":4,"day":9}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“‘左’比右好”的思想是落实政策的大敌","authors":["驻中国科学院工人/解放军毛泽东思想宣传队樊宗生"],"parts":[{"type":"paragraph","text":"伟大的领袖毛主席教导我们：“只有党的政策和策略全部走上正轨，中国革命才有胜利的可能。”历史充分证明了这是伟大真理。在当前斗、批、改阶段，我们只有认真贯彻执行毛主席的各项无产阶级政策，才能取得文化大革命的全面胜利。"},{"type":"paragraph","text":"有一种说法：“执行政策‘左’一点比右了好，‘左’一点只是方法问题，右了是立场问题。”这种“宁‘左’勿右”的错误思想，对于落实党的政策危害极大，必须坚决克服。"},{"type":"paragraph","text":"“‘左’一点比右了好”吗？不对。毛主席的各项无产阶级政策，科学地反映了阶级斗争的规律，是我们一切行动的最高准则。我们只有坚定地、彻底地贯彻执行毛主席的各项无产阶级政策，才能使革命斗争沿着正确的轨道向前发展。“左”和右一样，都是离开无产阶级政策的轨道，都会对革命带来损失。在我们党的历史上，“左”倾机会主义同右倾机会主义，都曾经给党的革命事业造成严重的危害，它们都是我们的大敌。"},{"type":"paragraph","text":"在当前阶级斗争的新形势下，阶级敌人最希望我们在执行政策中犯错误。他们竭力混淆两类不同性质的矛盾，制造混乱，企图破坏无产阶级文化大革命。如果我们抱着那种“‘左’一点比右了好”的观点去执行政策，把人民内部矛盾当作敌我矛盾；对阶级敌人不去做分化、瓦解、争取的工作，而是“一锅煮”，势必搅乱阶级阵线，削弱革命力量，保护了阶级敌人，阻碍了运动的发展。这同右的做法的后果有什么两样？"},{"type":"paragraph","text":"“‘左’一点只是方法问题”吗？不对。毛主席教导说：“我们是站在无产阶级的和人民大众的立场。对于共产党员来说，也就是要站在党的立场，站在党性和党的政策的立场。”党的各项无产阶级政策是毛主席革命路线的具体体现，代表了无产阶级和广大革命群众的根本利益。党的政策的立场，就是无产阶级的立场。坚决地不走样地执行党的政策，就是坚定地站在无产阶级的立场。在执行政策上，那种以为只有“左”一点，才算坚定站在无产阶级立场的人，其实，同右的做法一样，恰好离开了党的政策的正确轨道，违背了无产阶级的根本利益，离开了无产阶级的立场。"},{"type":"paragraph","text":"斯大林说过：“‘左’倾是右倾的影子。”“左”和右都是资产阶级世界观的反映，都是背离毛主席的无产阶级革命路线的，都是干扰和破坏毛主席无产阶级政策落实的。它们之间没有什么好坏之分，都是坏的，也没有什么“方法”“立场”之别，都是立场的错误。"},{"type":"paragraph","text":"这种“‘左’一点比右了好”的错误思想，实质上是大叛徒刘少奇形“左”实右的资产阶级反动路线的流毒。中了这种流毒的人，头脑里都有个“私”字在作怪。他们怕别人说自己右倾，就不顾毛主席的无产阶级政策，来个“宁‘左’勿右”。表面看去，好象是要狠狠打击敌人，其实，按他们的想法去做，不仅不能真正地打击敌人，反而保护了敌人。我们一定要彻底批判刘少奇的反革命修正主义路线，斗倒“私”字，排除一切来自“左”的和右的干扰，坚定不移地落实毛主席的各项无产阶级政策。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbac3b694b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
