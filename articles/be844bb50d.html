script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji16","name":"毛泽东全集第16卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"日苏缔约后英美及中国各派政治力量态度的分析","alias":"","parts":[{"type":"paragraph","text":"日苏缔约后英美及中国各派政治力量态度的分析"},{"type":"paragraph","text":"（1941年4月20日）周："},{"type":"paragraph","text":"（一）皓亥电?悉，分析很对。在德国打击下，英国对苏邦交即将好转，美国亦将大体上取英国步骤，决不能得罪苏联。中国英美派，顽固派，中间派及进步派中之动摇分子，均将在英、美影响下对苏献媚。惟顽固派中之死硬分子有被亲日派拉向投降的危险，这是很可注意的，不过目前还不会。（二）英、美总方针是先对德后对日，决不敢对日本取强硬态度，将荷印让给日本，甚至停止援华，都是可能的。只要德国占领苏伊士和轰炸伦敦袭击大西洋进一步加紧，真正威胁英国生存时，只要日本同意不向英国开战，就有这种可能。在这一情状出现时，你所指的英美派，顽固派，中间"},{"type":"paragraph","text":"[1]周，指周恩来。"},{"type":"paragraph","text":"[2]周恩来1941年4月19日致电毛泽东并中共中央书记处，对日苏缔约后重庆方面各派政治力量的态度作了分析，指出中间派悲观，进步派中一部分人发生动摇，“看起来他们是在狭隘的民族情绪之下的一时的冲动表现，而顽固派则利用之以反苏，亲日派利用之以悲观，英美派利用之以亲美，虽然这都是一时现象”。派，及进步派中之动摇分子，就将发生大混乱，大分化，大动摇，他们将成为亲日派与共产派二者猛力争夺的对象，其时间或者在今年秋冬之间。我们方针是要争得蒋及国民党主体转变到亲苏、和共、改良的方向，而以维持他们的政权、承认我们的地位为条件。那时英苏、美苏之间可能成立互不侵犯协定（也许英苏协定不久就可签订）。（三）准备在日内发一次政治情报，当将你所说的解释狭隘民族观点说进去。（四）陈锐霆团\"决于日内起义，仍打九十二军旗子（称为九十二军独立旅），开到张爱萍区域整训。请准备对付国民党的可能询问，答以这是九十二军自己的事，凡对我攻击者我反击之，凡对我取友好态度者我以友好态度对待之，陈团对我友好，故我理应加以协助，但仍是九十二军，并非八路军。（五）请问国民党，对八路是否还准备发饷，如发则已，否则我们将向全国全世界（包括苏联在内）募捐，发起普遍的募捐运动（我们真正准备这样做），学叫化子讨饭吃的办法，因为国民党迫得我们没有路走，我们将要饿死了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"号亥"},{"type":"paragraph","text":"[1]陈锐霆团，指陈锐霆任团长的国民党军第九十二军第一四二师第四二五团。"},{"type":"paragraph","text":"[2]张爱萍（1910一2003），四川达县人。当时任八路军第五纵队第三支队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":40,"page_end":41},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be844bb50d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
