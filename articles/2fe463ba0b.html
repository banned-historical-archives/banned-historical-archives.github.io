art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"打在要害处 批在点子上红九连针对刘少奇一类骗子妄图改变党的基本路线的罪行深入开展革命大批判","authors":[],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队“学习毛主席著作的模范红九连”，围绕坚持还是改变党的基本路线这个根本问题深入批修，提高革命大批判的质量。"},{"type":"paragraph","text":"红九连在大批判中，有的同志只是围绕着一些具体工作路线搞批判。比如在一次施工中，有的班只是围绕着怎样处理思想和技术的关系进行批判，虽然也解决了一些问题，但解决得不深。后来，党支部组织大家从坚持还是改变党的基本路线这个斗争的高度，分析批判唯生产力论的反动实质，使大家清楚地看到：刘少奇一类骗子鼓吹我国国内的主要矛盾是“先进的社会制度和落后的生产力之间的矛盾”的谬论，是妄图抹煞两个阶级、两条道路斗争这个主要矛盾，从而改变党的基本路线，复辟资本主义。通过批判，增强了同志们执行党的基本路线的自觉性。大家怀着为巩固无产阶级专政的高度责任感，努力搞好战备施工，提前两个月完成了任务。"},{"type":"paragraph","text":"干部战士经过这次大批判得出经验：从坚持还是改变党的基本路线的斗争高度批判刘少奇一类骗子破坏各项具体工作路线的罪行，就能抓住实质，打中要害。在这以后，全连同志自觉地以党的基本路线为武器，紧密围绕坚持还是改变党的基本路线这个根本问题开展大批判，先后集中地批判了刘少奇一类骗子散布的阶级斗争熄灭论、唯心论的先验论、马列主义“过时”论，都取得了好的效果。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fe463ba0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
