art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英元帅视察高炮某团二连赞扬刘德信、马义法用望远镜搜索目标的硬功夫，指出这套硬功夫对高射炮兵很重要，所有使用望远镜的同志都要向他们学习","authors":["杨比沪赖克里"],"parts":[{"type":"paragraph","text":"本报讯 五月八日，叶剑英元帅在驻上海空军部队首长陪同下，到高炮某团二连视察，并观看了侦察班长刘德信和侦察员马义法用望远镜搜索目标的表演。"},{"type":"paragraph","text":"叶元帅到达二连阵地后，详细询问了刘德信、马义法苦练过硬功夫的情况，还亲自指示目标让他俩观测。他指着东北方向的一个烟囱对刘德信说：你把它的顶端座标测量一下。刘德信一转身，举起望远镜，立即报出：方位角四千一，高低角三十度。接着又让马义法接连测报了几个点，误差都没有超过十密位。叶元帅对他俩把普通望远镜变成重要的观测工具，提前为其它观测器材指示目标，表示很满意。称赞他俩说：你们这一套硬功夫，对高射炮兵很重要。要推广你们的经验，使所有使用望远镜的人都向你们学习。"},{"type":"paragraph","text":"叶元帅和二连的全体官兵一起照了相。接着向大家指示说，军委现在提出天天读、天天练。读是读毛主席的书，练是练基本功。首先要政治上过硬，要天天学习毛主席著作，要学习毛主席伟大的战斗和革命精神，学毛主席的立场、观点、方法。其次是要技术上过硬。思想过硬了，技术过硬了，我军的战斗力就会大大增强。他最后勉励全体同志要象刘德信、马义法那样勤学苦练，在推广的基础上再提高。 （政宣）"},{"type":"paragraph","text":"叶剑英元帅向高炮某团二连战士们讲话 杨比沪、赖克里摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e8447e932"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
