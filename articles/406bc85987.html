经营文化教育救济机关及宗教团体登记处通告","authors":[],"dates":[{"year":1951,"month":2,"day":13}],"is_range_date":false,"parts":[{"text":"上海市军事管制委员会外国津贴及外资经营文化教育救济机关及宗教团体登记处通告","type":"title"},{"text":"本处自开始办理登记以来，本市各接受外国津贴及外资经营的文化教育救济机关及宗教团体多已遵照上海市军事管制委员会一九五一年一月十九日布告及本处国日通告前往本处指定各组领取登记表格，进行办理登记手续。兹为便于早日开始审查与如期完成登记工作起见，特将各接受外国津贴及由外资经营的机关团体缴入表报日期及应行注意事项公布于后:","type":"paragraph"},{"text":"(一)凡接受外国津贴及由外资经营的文化教育救济机关及宗教团体，其已向本处指定组别领得登记表格者，应尽速详实填报，于二月二十八日前缴回，不得拖延。","type":"paragraph"},{"text":"(二)凡尚未向本处指定组别领取登记表格者，应尽速领取登记表格，详实填报后，于二月二十八日前缴回，不得拖延。","type":"paragraph"},{"text":"(三)凡解放前曾据受外国津贴或由外资所经营者，应于二月二十八日前按照一九五一年一月九日华东军政委员会第四十三次行政会议通过之“关于执行‘中央人民政府政务院关于处理接受美国津贴的文化教育救济机关及宗教团体的方针的决定’的指示”第二条规定，前往本处指定组别领取登记表格，办理登记手续，不得拖延。各该机关团体如有疑问，可向本处秘书室询间。","type":"paragraph"},{"text":"(四)在登记期间，所有接受外国津贴及由外资经营的文化教育救济机关及宗教团体的原负责人应切实负责保护各该机关团体之资财，不得转移，隐匿或破坏，所有各该机关团体内之员工应一体协助，并随时与本处联系，防止有非法转移，隐匿或破坏等情事发生。","type":"paragraph"},{"text":"(五)如有拒绝登记，报告不实，转移隐匿或破坏资财行为，经本处查明属实后，报请军管会严加处分。","type":"paragraph"},{"text":" 处长  夏衍","type":"paragraph"},{"text":" 副处 长  黄华 沈体兰  曹漫之一九五一年二月十三日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"406bc85987"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
