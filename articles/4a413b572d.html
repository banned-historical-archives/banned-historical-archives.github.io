art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想成了世界革命指导思想日共（左派）刊物《革命战士》发表文章说，日本革命人民决心高举毛泽东思想伟大红旗，坚决同敌人斗争到底","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 日共山口县委员会（左派）理论刊物《革命战士》最近发表文章指出，“世界革命的根据地，已经从苏联转移到了伟大的毛泽东同志领导的中国。毛泽东思想成了世界革命的指导思想；现在世界已经是以毛泽东思想为伟大旗帜的时代。”"},{"type":"paragraph","text":"文章说，伟大的毛泽东同志系统地总结了无产阶级专政的历史经验和深刻教训，作了科学的分析，阐明了社会主义社会的矛盾问题、阶级和阶级斗争的规律，创立了在无产阶级专政条件下进行革命的理论，并且亲自发动和领导了前人从未进行过的无产阶级文化大革命，更加巩固了无产阶级专政，防止社会主义中国改变颜色，开辟了向共产主义前进的大道。"},{"type":"paragraph","text":"如同十月革命把马克思主义发展到了列宁主义的阶段一样，中国革命和无产阶级文化大革命把列宁主义发展到了毛泽东思想的崭新阶段。毛泽东思想是当代最高水平的马克思列宁主义。"},{"type":"paragraph","text":"文章指出，今天，全世界的革命人民都把毛泽东思想和无产阶级文化大革命的胜利看作是自己解放的最大保正。"},{"type":"paragraph","text":"文章最后说，日本的马克思列宁主义者和广大革命人民，一定要高举伟大的毛泽东思想红旗，粉碎美日反动派、苏联修正主义领导集团和堕落成它的走狗的宫本修正主义集团，同中国人民和全世界革命人民团结起来，就一定能够取得日本革命的胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a413b572d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
