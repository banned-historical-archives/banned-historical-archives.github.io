:[{"year":1961,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报扬州讯】　扬州师范学院中文系在高年级学生中开设了《毛主席诗词研究》选修课，研究毛主席已经发表的诗词和关于诗词的一封信。这门课程自1960年下半年开设以来，深受同学欢迎。学生们在学习《毛泽东选集》四卷的基础上，又学习了党史和近代史，还阅读了有关的革命回忆录，以深入理解毛主席诗词的原意。还有不少同学把毛主席的诗词与古典文学课程联系起来研究，从中学习毛主席如何继承和发扬我国诗词的优良传统。　(秦子卿)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7db1a9fa8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
