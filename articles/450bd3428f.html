tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"某军集中三百多名指导员总结交流经验","authors":["袁祥/李坤"],"parts":[{"type":"paragraph","text":"本报讯 某军召开基层思想政治工作经验交流会，着重研究如何克服涣散软弱状态，进一步提高基层政治工作的战斗性和原则性。"},{"type":"paragraph","text":"到会的三百多名指导员，学习邓小平、胡耀邦同志关于思想战线问题的谈话和讲话，分析基层思想政治工作的现状，交流了经验。大家认为，要使基层政治工作坚强起来，就要坚持原则性。某团七连有个战士，觉得部队生活苦，产生离队思想，三次私自跑回家。有的同志不敢进行必要的批评，主张哄着干两年算了。指导员刘观方坚持用革命道理说服教育他。这个战士的父亲是从部队转业的老干部，指导员便把他父亲请到连队一起做工作，给他讲新旧社会的对比和战争年代的艰苦奋斗精神。这个战士增强了保卫祖国的责任感，思想有了明显转变，在同期入伍的同志中第一个入了团，两次受到连嘉奖。"},{"type":"paragraph","text":"会上，大家着重分析了这样的情况：同样的兵员，同样的条件，有些问题在有的连队感到很“棘手”，而有些连队却得到了较好的解决。这是为什么？某团四连做战士思想工作的经验有四条：一是动之以情，处处体现连队大家庭的温暖；二是努力用积极因素克服消极因素；三是因人而异，在提高思想觉悟上下功夫；四是抓住反复出现的问题，坚持一帮到底。连队出现了无私自离队，无超假误假，无小拿小摸，无打架斗殴，无顶撞领导，无贪污腐化，无打骂战士，无等级事故的可喜局面。"},{"type":"paragraph","text":"大家说：对于连队建设遇到的新情况、新问题，只要认真摸索，工作到家，方法对路，是可以解决的。（袁祥、李坤）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"450bd3428f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
