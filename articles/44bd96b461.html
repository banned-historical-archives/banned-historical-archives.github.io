" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"中央关于各省市区党委向中央汇报工作的具体安排的通知","alias":"","parts":[{"type":"paragraph","text":"中央关于各省市区党委向中央汇报工作的具体安排的通知"},{"type":"paragraph","text":"（1956年5月14日）各省委、市委、自治区党委："},{"type":"paragraph","text":"关于你们向中央汇报工作的问题，现在已由中南几个省市开始，接着将请华东几个省市汇报（时间可能在五月二十五日至六月十日之间），然后再请西南、西北、华北、东北各省市区汇报（时间将在六月十日至七月底）。汇报的问题，可分为：（一）工业（重工业、轻工业、手工业，中央各部管的、地方管的和私人工业的社会主义改造）；（二）交通运输业（陆、水、空，近代的和落后的）；（三）商业（内贸、外贸、供销合作和私人商业的社会主义改造）；（四）农、林、水；（五）财政和金融；（六）干部（即教育工作）。以上各项都应作一些历史的和现状的叙述，并且应当有七年的或者十二年的远景规划，以地方管的或者希望由地方管的为主，中央各部管的为辅。写成书面文件，字数不拘，依内容决定，长的可以有一万字，或者两万字，甚至更长些，短的可以只有几千字。此外还有：（七）统一战线安排问题；（八）反革命分子安排问题（主要是就业安排）；（九）失业安排问题；（十）少数民族问题（无此问题的地方则略）；（十一）其他特殊问题（例如广东的华侨和侨眷问题，渔民问题，盐民问题，港澳问题）。以上各项，每一个问题写几千字毛泽东全集第三十六卷即可，均要分开写，各成篇幅，不要连在一起。以上共有十几个题目，不可能在一次准备好和汇报完，可以分为两次或者三次准备好和汇报完。希望都经过你们的委员会加以讨论和斟酌，但不必十全十美，不大完善也不要紧。汇报的时候除第一书记应来之外，可以带几个与工作有关的助手来。以上各问题，重点放在第一至第六各项，而以第一项为主要的重点，第一项准备好了，即可汇报一次。汇报文件中要有材料，有议论，要突出地批评中央工作和地方工作中的缺点错误，揭露矛盾（包括中央和地方的矛盾），并提出解决意见。不成熟的意见也可以提出。具体汇报时间，将用电话和你们商量。"},{"type":"paragraph","text":"中央一九五六年五月十四日"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":5,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":358,"page_end":359},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于各省市区党委向中央汇报工作的具体安排的通知","authors":["毛泽东"],"dates":[{"year":1956,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"中央关于各省市区党委向中央汇报工作的具体安排的通知","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各省委、市委、自治区党委：","type":"appellation"},{"text":"关于你们向中央汇报工作的问题，现在已由中南几个省市开始，按着将请华东几个省市汇报(时间可能在五月二十五日至六月十日之间)，然后再请西
