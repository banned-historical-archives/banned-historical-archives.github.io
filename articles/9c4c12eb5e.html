发生偏向","authors":[],"dates":[{"year":1951,"month":7,"day":7}],"is_range_date":false,"parts":[{"text":"西安市各小学校在进行爱国主义教育中发生偏向","type":"title"},{"text":"【西北总分社七日讯】西安市各小学校在进行正课中盲目进行爱国主义教育，已影响了正课的学习。如一区第一完小在“国语”“历史”“算术”三项不同课程中，都以朝鲜通讯：“谁是最可爱的人”作为教材。因此，历史教师讲解“淝水之战”和算术教师解释计算朝鲜战场敌人死伤统计题的题意时，都生硬的以这一材料作为“爱国教育”的内容。西安师范附小在反一贯道运动中，门门课程都以一贯道为中心，老实在课堂上几乎都成了反一贯道的宣传员。一区一小历史教师曾用“墨子步行七昼夜，向楚王劝谏停止侵略”的故事，毫无批判地要儿童学习墨子这种“奔走和平”的精神。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1951年7月9日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c4c12eb5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
