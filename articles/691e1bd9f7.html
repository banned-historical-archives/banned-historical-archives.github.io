al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"给肃子升的信","alias":"","parts":[{"type":"paragraph","text":"给萧子升的信\""},{"type":"paragraph","text":"（1921年9月28日）"},{"type":"paragraph","text":"我回湘即寓船山，专以疗病为主，病即大有起色。现在心里非常快活，因病既日好，又没有事务责任上重大负担；每天因操劳炊，口腹既饱，身体更快；还可随意看所要看的书，故大有“此间乐”的气概。现在读书虽甚少，然把英文作为主课，每天多少必读几句，诚己（已》晓得非读不可了。"},{"type":"paragraph","text":"此款事势？急迫，非筹不可，只有不管偿还如何困难，姑且借来付去。"},{"type":"paragraph","text":"男女共学，亦一新生面也。[1]这是毛泽东致萧子升信的主要内容。"},{"type":"paragraph","text":"[2]指为新民学会旅法会友陈赞周筹款医病问题。陈赞周，1920年5月赴法勤工俭学，1921年在巴黎病逝。"}],"authors":["毛泽东"],"dates":[{"year":1921,"month":9,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":447,"page_end":447},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"691e1bd9f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
