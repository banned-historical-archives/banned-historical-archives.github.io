s":[{"year":1996,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　据新华社报道，我国建国以来出版的规模最大的线装书——《毛泽东评点二十四史》影印线装本，即将由线装书局出版，向海内外编号限量发行。"},{"type":"paragraph","text":"《毛泽东评点二十四史》影印线装本，根据中央档案馆提供的毛泽东生前阅读并作评点的乾隆武英殿本《二十四史》原本影印。影印出版前，中央文献研究室和中央档案馆组织专家学者对原书进行了整理、校勘，纠正了原书印装中的一些差错，最大限度地展示了毛泽东阅读《二十四史》所作的评注、圈点的原貌。"},{"type":"paragraph","text":"据介绍，《毛泽东评点二十四史》影印线装本共850册，大16开本，封面为蓝色真丝绫面精制，正文为玉版宣纸精印。全书分80函，由富有民族工艺特色的蓝色真丝绢面平函套装。这套书共影印500套，每套书配有特制镜面编号藏书证。首批印制的200套将于今年9月起分史陆续面市。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee115cf08a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
