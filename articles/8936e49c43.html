art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无限忠于毛主席，一辈子与工农兵相结合","authors":["济南部队装甲兵活学活用毛泽东思想积极分子/给养员陈海昌"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席亲切地教导我们：“从旧学校培养的学生，多数或大多数是能够同工农兵结合的，有些人并有所发明、创造，不过要在正确路线领导之下，由工农兵给他们以再教育，彻底改变旧思想。这样的知识分子，工农兵是欢迎的。”这是毛主席对一切要革命和愿意革命的知识分子的最大关怀、最大鞭策。"},{"type":"paragraph","text":"我也是一个从旧学校出来的学生，入伍七年来，一直在炊事班工作。我能够做到这点，靠的就是工农兵用战无不胜的毛泽东思想对自己进行再教育。"},{"type":"paragraph","text":"在旧的学校里，我读了十几年书，头脑里装满了中国赫鲁晓夫宣扬的“读书做官”的资产阶级思想。一到炊事班，就凉了半截，十分苦恼。贫农出身的老班长及时和我谈心，他说：“咱们都是穷人的孩子，要永远忠于毛主席，全心全意为人民服务。你不要有了点文化，就忘了劳动人民。”他还要我好好学习毛主席的教导。老班长的话虽短，却一针见血地触动了我的灵魂。我就带着这个问题，反复学习光辉的“老三篇”，决心放下臭架子，虚心向工农出身的战友学习，学习他们无限忠于毛主席的阶级感情，学习他们活学活用毛主席著作，理论联系实际、言行一致的好学风，学习他们不怕苦、不怕累的革命精神。我的思想感情起了变化，脏活累活抢着干，时时刻刻注意思想改造。在同志们的帮助下，我年年被评为五好战士，多次被选为学习毛主席著作积极分子。我深深体会到，从旧学校出来的知识分子，只有用毛泽东思想改造自己，不断接受再教育，才能逐步改造世界观。我的决心是：一颗红心永向毛主席，走一辈子与工农兵相结合的道路。DW：济南部队"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8936e49c43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
