art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"亚当斯总理到京 华总理设宴欢迎","authors":[],"parts":[{"type":"paragraph","text":"据新华社六月十一日讯 巴巴多斯总理约翰·迈克尔·杰弗里·曼宁厄姆·亚当斯和由他率领的政府代表团，应中国政对的邀请前来进行正式访问，今天下午乘飞机到达北京。"},{"type":"paragraph","text":"国务院总理华国锋、副总理陈慕华等，到机场热烈欢迎巴巴多斯贵宾。"},{"type":"paragraph","text":"在这次访问中，亚当斯总理将同华国锋总理举行会谈，同邓小平副总理会晤。双方将就当前国际形势和发展双边关系等问题交换意见。"},{"type":"paragraph","text":"据新华社六月十一日讯 国务院总理华国锋今天晚上在人民大会堂举行宴会。热烈欢迎巴巴多斯总理约翰·迈克尔·杰弗里·曼宁厄姆·亚当斯和由他率领的政府代表团全体成员。"},{"type":"paragraph","text":"华国锋总理和亚当斯总理先后发表了热情的讲话。华国锋在讲话时热情赞扬巴巴多斯政府和人民在亚当斯总理领导下，在捍卫民族独立和国家主权、发展国民经济和民族文化方面所取得的可喜成就。华国锋在谈到当前国际形势时指出，霸权主义者在世界各地进行渗透、颠覆、侵略和扩张，使各国人民不得安宁。面临这种局势，受到霸权主义侵略、压迫、威胁和欺侮的国家，特别是第三世界发展中的国家，迫切需要加强团结，相互支持，共同来揭露、反对、阻止霸权主义的侵略行径，以维护世界和平。"},{"type":"paragraph","text":"亚当斯总理致答辞时盛赞巴中友谊。他说：“尽管我们在地理、自然环境、历史和文化上有着很大的不同，但我们两国人民都有着共同的经历。在近代，我们都曾身受殖民主义之害。我们两国都为使第三世界有更好的处境而共同斗争。在国际上，我们两国都坚定地保卫着维护国际和平和安全并反对殖民主义、种族主义和霸权主义的原则。”他说：“我们不能再忍受新殖民主义和支配主义。新殖民主义或霸权主义对我们正当的成就和愿望具有最大的破坏性。新殖民主义或霸权主义比我们憎恶的早期殖民主义更凶恶。我们两国必须继续反对扩张主义和战争以及好战的行为。我们决不能放弃寻求和平的努力。”"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"396fca5586"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
