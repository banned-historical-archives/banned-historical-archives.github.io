art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大家都要沿着毛主席革命路线前进阿尔巴尼亚军事代表团到达广州参观访问","authors":[],"parts":[{"type":"paragraph","text":"巴卢库同志强调指出，只有以卓越的马克思列宁主义者毛泽东同志为首的中国共产党才代表了全中国劳动人民的利益。而一小撮破坏革命、破坏中国社会主义建设的右派分子，策划新的阴谋——修正主义经济主义，遭到了英勇的中国工人阶级，以及在工人阶级鼓舞下的劳动人民毁灭性的打击，并正在土崩瓦解。中国工人阶级、劳动农民、战士、青年始终跟着中国共产党，跟着毛主席，任何力量都丝毫动摇不了他们在党和毛主席领导下胜利前进的决心。巴卢库同志最后用中国话高呼：“毛主席万岁！万岁！万万岁！”巴卢库同志的讲话，给了被服厂革命职工代表巨大的鼓舞。他们齐声高呼：“毛主席万岁！”“恩维尔·霍查同志万岁！”"},{"type":"paragraph","text":"二十三日，阿尔巴尼亚军事代表团到达广州，受到中国人民解放军广州部队负责人以及广州陆海空三军指战员和民兵、红卫兵小将数千人的热烈欢迎。下午，贵宾们参观了当年毛主席主办的农民运动讲习所旧址。还观看了民兵们的文艺演出和军事表演。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5940ad8e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
