art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"任意压迫剥削工人数例","authors":[],"parts":[{"type":"paragraph","text":"解雇"},{"type":"paragraph","text":"波多尔斯克机械化工程管理处主任苏尔加没有一天不辱骂工人，在他眼里工人都是寄生虫、懒家伙、流氓、醉鬼。凡是想反驳他，或者想表示自己看法的人，总是被他说一顿：“不想干，我就把你解雇。”在他任职期间，总共有三百一十八人离职，而编制是三百五十人。"},{"type":"paragraph","text":"亚美尼亚共和国第二有色金属管理局局长克罗波扬以“多种多样的原因”解雇工人：有的是因为“目光不怀好意”，有的因为不是他的亲属，有的则是因为外孙需要这个职务。他当局长十五个月，就招收和解雇了七十九人。"},{"type":"paragraph","text":"沃罗涅日汽车联合企业的经理自一九七○年到一九七二年就解雇了五百三十人，实际上更换了全部工人。"},{"type":"paragraph","text":"罚款"},{"type":"paragraph","text":"基米罗伏州胜利者国营农场场长奇茹夫，一年发布了二百二十三项关于处罚工人和“追究物质责任”的命令，处罚了一百二十五个工人，被“追究物质责任”者有三百五十人，而这个农场总共只有六百五十二名职工。"},{"type":"paragraph","text":"迫害"},{"type":"paragraph","text":"车里雅宾斯克汽车修理厂电焊工波罗热茨在会上批评了厂长的缺点，厂长就对他说，你送份申请来吧，咱俩干不到一块儿。就这样，扎波罗热茨被解雇了。"},{"type":"paragraph","text":"杜尚别纺织联合企业的头头契特维里科娃，迫使少年女工上夜班，遭到拒绝后，竟把她认为是带头抗拒上夜班的细纱女工加丽娅·奥佐尔妮娜开除出厂，并夺去被褥、公民证，不给离职证（注：在苏联，没有公民证和离职证是找不到工作的），迫使这个女工在另一个城市里漂泊了两个月，最后自杀身死。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3be9d5ada6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
