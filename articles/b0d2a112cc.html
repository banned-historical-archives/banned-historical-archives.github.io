[{"year":1949,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社沈阳十四日电】　东北人民政府工业部煤矿管理局所属鹤岗、鸡西、蛟河、西安、阜新、迪化、北票七大国营煤矿，已提前于上月廿七日全部完成今年生产任务。煤矿管理局和东北煤矿总工会为此特电呈毛主席报告生产成绩。电文如下:"},{"type":"paragraph","text":"东北人民政府工业部王、吕、安部长转呈中央人民政府毛主席:"},{"type":"paragraph","text":"东北工业部煤矿管理局全体员工在你的领导下，已于一九四九年十一月廿七日“提前一个月”完成本年计划产量，全员生产能率亦从年初的零。三六吨到达最近的零。五一吨。预计到年底为止，可超过计划产量百分之十二，特此报告。此致敬礼!"},{"type":"paragraph","text":"东北人民政府工业部煤矿"},{"type":"paragraph","text":"管理局、东北煤矿总工会"},{"type":"paragraph","text":"十二月九日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0d2a112cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
