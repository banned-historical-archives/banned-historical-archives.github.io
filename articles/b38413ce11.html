ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"复吴奇伟将军等电","alias":"","parts":[{"type":"paragraph","text":"复吴奇伟将军等电!"},{"type":"paragraph","text":"（1949年6月22日）"},{"type":"paragraph","text":"【新华社北平二十二日电】毛主席、朱总司令本日复吴奇伟将军一电。该电称：吴奇伟、李洁之、曾天洁、萧文、魏鉴贤、董举初、魏汉新、张苏奎诸先生："},{"type":"paragraph","text":"接读诸先生五月十四日宣言，决心脱离国民党反动派，加入人民解放军行列，极为欣慰。希望你们遵守人民解放军制度，改造部队，与人民解放军整个力量协同一致，为解放广东全省而奋斗。同时，告诉广东的一切国民党军，凡愿脱离反动派，加入人民解放军方面者，我们将一律不究既往，表示欢迎。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"朱德"},{"type":"paragraph","text":"一九四九年六月二十二日"},{"type":"paragraph","text":"[1]1949年5月原国民党将领吴奇伟、曾天洁等在粤东闽西率部起义，并于5月14日发表宣言，接受中国共产党领导，拥护向华南进军。毛泽东、"},{"type":"paragraph","text":"生帝您珍本毛泽东为新华社撰写的《毛主席、朱总司令复吴奇伟将军等电》的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":6,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":495,"page_end":496},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b38413ce11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
