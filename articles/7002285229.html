ates":[{"year":1984,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十一月二十日电　经中央军委批准，人民解放军党史资料征集委员会编辑的《军史资料》将于近日创刊出版。"},{"type":"paragraph","text":"《军史资料》创刊号发表了邓小平同志一九六三年三月为《广西革命回忆录》续集的题词:“用革命的事迹来教育我们的子孙万代:象我们前辈那样，象我们的先烈那样，永远当一个革命者，永远当一个为人民大众的集体事业服务的社会主义者，永远当一个共产主义者。”因为政治运动的影响，《广西革命回忆录》续集未能出版，邓小平同志的题词也一直未发表。"},{"type":"paragraph","text":"创刊号还刊登了叶剑英、刘伯承同志分别在一九四六年一月二十二日和一九四九年七月二十一日写的书信等珍贵历史文献资料。"},{"type":"paragraph","text":"中央军委副主席徐向前、聂荣臻分别为《军史资料》题词或写了信。军委副主席杨尚昆题写了刊名。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7002285229"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
