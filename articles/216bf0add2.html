河南农学院","范正祜"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"给全校教师学生工人的信","type":"title"},{"text":"河南农学院范正祜","type":"authors"},{"text":"（范正祜：河南农学院林58级学生）","type":"subtitle"},{"text":"亲爱的全体老师们、同学们、工人同志们！","type":"appellation"},{"text":"我们怀着万分悲痛的心情向你们求援，希望得到你们的支持。在全国已经展开大鸣大放的时候，我院、特别我班还是在冰封的严冬，强大的压力控制着我们，束缚着我们使我喘不过气来。我们要从事消除三害、揭发矛盾、拆墙填沟的斗争。","type":"paragraph"},{"text":"入院以来，我们一直过着非人的生活，呼吸不到民主的空气，他们（注：指党委）剥夺了我们的自由与权利，我们的行动受到监视，社会主义法制遭到破坏，在我们的生活中充满了血和泪，我们不能再忍受下去了。我们要求得到公民权利，要求对违法乱纪者给予处分。恳切的盼望大家踊跃参加我们的争鸣会。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"216bf0add2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
