周恩来","康生","陈伯达"],"dates":[{"year":1967,"month":6,"day":30}],"is_range_date":false,"parts":[{"text":"中央首长对江西两派的指示","type":"title"},{"text":"周恩来陈伯达康生","type":"authors"},{"text":"六月卅日晚12点10分，空军司令员吴法宪同志传达周总理、陈伯达、康生同志指示，谢富治，××、杨成武共同研究批准，为了贯彻执行“六二九”中央指示，保证停火，防止冲突提出以下六条措施：","type":"paragraph"},{"text":"1．停止冲突，双方武装人员，限制在限定地点划线，双方不过界。","type":"paragraph"},{"text":"2．双方立即撤除沿途岗哨，保证交通畅通。","type":"paragraph"},{"text":"3．双方所抓对方人员立即放，并负责保证人身安全，受伤人员，地方军队医院、空军××师卫生队收容治疗。","type":"paragraph"},{"text":"4．进入莲塘的农民应立即撤回各公社，以便保证农学院的供应，在农学院的外单位工人和学生应立即撤回原单位。","type":"paragraph"},{"text":"5．其余的问题在中央调查团，进行调查研究以后处理。","type":"paragraph"},{"text":"6．如双方同意以上五条各派同等数量代表由空军××师党委主持谈判，进行调解。","type":"paragraph"}],"comments":[],"origin":"《毛主席无限关怀江西：中央首长对江西问题的指示》(江西省直机关保卫毛泽东思想联合战斗团宣传组、江西省无产阶级革命派大联合筹委会新闻界联络站编印，1967年10月)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c028af29d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
