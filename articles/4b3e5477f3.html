<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对中央关于正确处理工交企业中班组长同工人关系问题的通知稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对中央关于正确处理工交企业中"},{"type":"paragraph","text":"班组长同工人关系问题的通知稿的批语和修改2]"},{"type":"paragraph","text":"（1965年2月13日）同意，照发。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十三日"},{"type":"paragraph","text":"在这次运动中，应当放手发动群众，发扬批评和自我批评，团结大多数（包括车间级、工厂级及其以上）干部，只整那些顽固不化的坚决走资本主义道路的极少数人。"},{"type":"paragraph","text":"[1]中共中央关于正确地处理工业、交通企业中班组长同工人群众关系问题的通知稿说，目前，在工业、交通企业发现有些单位在社会主义教育运动的试点过程中，班组长（包括一小部分小的工段长）同工人群众的关系很紧张。这个问题，在运动中必须及时地正确解决。为了在社会主义教育运动"},{"type":"paragraph","text":"对中央关于正确处理工交企业中班组长同工人关系问题的通知稿的批语和修改中正确地处理企业中班组长同工人群众的关系问题，必须注意以下几点：一、在运动中应当满腔热情、循循善诱地帮助班组长提高觉悟，提高工作能力，自觉地克服缺点、错误，改进作风和工作方法。对于那些群众意见较多的班组长，可以在运动中的适当时期，采取同工人群众开小型交心会、民主会的方式，进行批评和自我批评，达到消除隔阁、加强团结的目的。二、班组长必须认真地参加劳动，一律不要脱离生产。应当明确适当的生产岗位，规定合理的劳动时间和定额。三、今后，对于班组长，要结合改进领导方法和管理制度，逐步实行定期的民主选举，选出后由行政领导加以任命，连选可以连任。要在班组实行四大民主（政治民主、生产民主、财务民主、军事民主）。同时，要教育工人群众遵守劳动纪律，服从生产指挥。但不允许用任何借口去整工人群众。四、对于班组长中极少数坏人、没有改造好的封建把头和蜕化变质分子，应当进行适当的批评和斗争，根据不同情况，有区别地加以处理。五、在这次运动中，各级领导必须引导群众集中精力解决两条道路等大是大非问题，不要乱追男女关系，更不要拿到群众会上去斗争。至于极少数恶霸、流氓和其他坏分子奸污妇女和军属的罪行，应当个别处理，或者由司法机关依法惩处。1965年2月16日，中共中央以中发[65]95号文件将这个通知发至企业党委和工作队。"},{"type":"paragraph","text":"[2]本篇二是毛泽东对中央通知稿的修改，其中用宋体字排印的是他加写的文字。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":2,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":489,"page_end":490},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b3e5477f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
