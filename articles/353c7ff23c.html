","authors":[],"dates":[{"year":1976,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"红兴隆国营农场管理局二十一团职工把学习和批修结合起来"},{"type":"paragraph","text":"誓同篡改毛主席指示的人斗到底"},{"type":"paragraph","text":"黑龙江省红兴隆国营农场管理局二十一团广大职工热烈欢呼中共中央、人大常委会、国务院、中央军委关于建立伟大的领袖和导师毛泽东主席纪念堂的决定，热烈欢呼中共中央关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定。他们坚决响应党中央的号召，掀起学习马列著作和毛主席著作的新高潮，永远沿着毛主席的革命路线胜利前进。他们一致表示要最紧密地团结在以华国锋同志为首的党中央周围，一切行动听从党中央指挥。他们牢记毛主席关于“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，坚决同一切违背三项基本原则的言论和行动作斗争，誓把毛主席开创的无产阶级革命事业进行到底。"},{"type":"paragraph","text":"红兴隆国营农场管理局二十一团的广大职工，怀着对伟大领袖毛主席无限热爱和无限崇敬的心情，一遍又一遍地学习中央的两项重要决定。他们说，毛主席是我们心中永远不落的红太阳，毛主席的光辉著作是马克思列宁主义的不朽文献，是我们取之不尽、用之不竭的思想宝库。我们一定要更加刻苦地学习毛主席著作，真正把毛泽东思想学到手，用实际行动悼念毛主席。现在，全团各级党组织都作出了进一步学好毛泽东思想的决定，各基层单位的政治夜校和理论小组也都重新制订了集体或个人的学习计划，一个群众性的学习马列著作和毛主席著作的新高潮正在蓬勃兴起。"},{"type":"paragraph","text":"这个团的党委和广大革命群众坚持把学习同批判修正主义结合起来，做到学用一致。他们刻苦学习毛主席著作，进一步提高阶级斗争和路线斗争觉悟，积极增强识别真假马列主义的能力，坚持同那些背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席指示，搞修正主义，搞分裂，搞阴谋诡计，篡党夺权的人，作坚决的斗争。"},{"type":"paragraph","text":"在学习新高潮中，这个团的各级党组织运用战无不胜的毛泽东思想进一步加强各级领导班子的建设，并且制订出了三项具体措施：要保持和发扬毛主席亲自倡导和培育的我们党的理论联系实际、密切联系群众、批评与自我批评的作风，坚决同那些搞修正主义，搞分裂，搞阴谋诡计的人作斗争；坚持以阶级斗争为纲，坚持党的基本路线，坚持无产阶级专政下的继续革命，自觉限制资产阶级法权，认真和工农群众实行三同，虚心向群众学习；要保持谦虚谨慎、戒骄戒躁的优良作风，模范地遵守党的纪律，坚决执行党的决议，发挥共产党员的先锋带头作用，做坚强的反修防修战士。　（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"353c7ff23c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
