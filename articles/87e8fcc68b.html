欢送　孔石泉等广东省革委会及有关方面负责人在广州机场欢迎","authors":[],"dates":[{"year":1971,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十日电　苏丹民主共和国副总统兼国防部长和人民武装部队总司令阿巴斯少将和由他率领的苏丹政府高级代表团，圆满地结束了在北京的访问，今天下午乘专机离开北京前往广州。"},{"type":"paragraph","text":"军委副主席叶剑英，国务院副总理李先念，中国人民解放军总政治部主任李德生，外交部代部长姬鹏飞，国防部副部长肖劲光，中国人民解放军副总参谋长彭绍辉等，以及首都群众五千人前往机场热烈欢送。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府军需、军备大臣杨森安将军也到机场欢送。"},{"type":"paragraph","text":"在飘扬着苏丹国旗和中国国旗的首都机场上，为苏丹贵宾举行了隆重的欢送仪式。乐队奏苏丹国歌和中国国歌。阿巴斯副总统等贵宾由我国领导人陪同，检阅了陆、海、空三军和民兵、红卫兵组成的仪仗队。当贵宾们来到群众队伍面前时，欢送群众发出一片“中国、苏丹两国人民友谊万岁”的欢呼声。人们挥舞着花束和彩带向阿巴斯副总统等苏丹贵宾致意，祝贺他们访问成功，表示坚决支持苏丹人民反帝反殖、维护民族独立和国家主权的正义斗争。"},{"type":"paragraph","text":"我国外交部西亚非洲司司长何英，苏丹驻中国大使馆临时代办奥莫拉比和夫人，陪同代表团前往广州。"},{"type":"paragraph","text":"据新华社广州二十日电　苏丹民主共和国副总统兼国防部长和人民武装部队总司令阿巴斯少将和由他率领的苏丹政府高级代表团，在外交部西亚非洲司司长何英陪同下，今天下午乘专机到达广州进行友好访问。同机到达广州的还有苏丹驻中国大使馆临时代办奥莫拉比和夫人。"},{"type":"paragraph","text":"前往机场热烈欢迎苏丹贵宾的有:广东省革命委员会、中国人民解放军广州部队、广东省军区、广州市革命委员会的负责人孔石泉、黄荣海、单印章、林李明、苏克之、焦林义、白平、钟明、黄业，以及有关方面负责人雍文涛、邵云升、朱泽、张振海等。"},{"type":"paragraph","text":"今晚，广东省革命委员会第一副主任孔石泉设宴热烈欢迎阿巴斯副总统和由他率领的苏丹政府高级代表团全体成员。苏丹驻中国大使馆临时代办奥莫拉比和夫人应邀出席了宴会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"name":"李先念","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87e8fcc68b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
