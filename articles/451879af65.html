[],"dates":[{"year":1958,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社地拉那16日电】　阿尔巴尼亚“战士”杂志和“青年之声报”16日发表社论，纪念各国共产党和工人党代表莫斯科会议一周年。"},{"type":"paragraph","text":"“战士”杂志的社论说，生活已经证明，莫斯科会议的决定具有深刻的科学性。尽管在苏联共产党第二十次代表大会以后，帝国主义为了分裂社会主义阵营和共产主义运动的团结，曾经要弄了不少阴谋，但是，他们和他们的奴仆——修正主义者都失败了。"},{"type":"paragraph","text":"社论说:“莫斯科宣言更加锻炼了各国共产党和工人党，他们已经成为一个整体，并且完全揭露了以帝国主义的奴仆南斯拉夫领导集团为代表的现代修正主义者。莫斯科宣言的原则到处都获得了胜利。历史正在前进，帝国主义和形形色色的修正主义过去和现在永远不能使它后退”。"},{"type":"paragraph","text":"“青年之声报”的社论说，从莫斯科会议发表两个宣言到现在，仅仅经过了一年。但是，在这一年内，国际形势已证实了这些文件的正确性。"},{"type":"paragraph","text":"社论揭露了一年来帝国主义在中近东和台湾海峡等地区的侵略活动，揭露了南斯拉夫修正主义者一年来无耻地反对马克思列宁主义的卑鄙行为。社论说，阿尔巴尼亚劳动党永远站在不可动摇的、忠于马克思列宁主义的立场上，和苏联在一起，坚决跟马克思列宁主义的敌人进行斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"451879af65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
