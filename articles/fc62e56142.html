<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"粉碎美帝利用教会进行间谍活动阴谋","authors":["《天津日报》社论"],"dates":[{"year":1951,"month":4,"day":5}],"is_range_date":false,"parts":[{"text":"粉碎美帝利用教会进行间谍活动阴谋","type":"title"},{"text":"《天津日报》社论","type":"authors"},{"text":"天津市人民政府公安局接受群众的要求，根据中华人民共和国惩治反革命条例，逮捕了美帝国主义间谍分子卜相贤、鲍翊华和房如晦，这三个罪犯都是披着宗教外衣，在中国长时期进行反革命活动的间谍分子。一九四七年，我冀中公安机关破获了献县天主教国际间谍案，卜等都是其中的要犯。他们在天津以工商学院（即现津沽大学）为掩护，私设电台与献县间谍犯尚建勋等联系，为其收发转送情报，供给美帝间谍机关“美国陆军战略情报处”（S·S·U）的情报人员毛德以及国际间谍头子雷振远等。解放以后。卜相贤等继续进行反人民活动，在天主教内，利用反动组织“圣母御侍团”作为进行反革命活动的工具，专门调查津沽大学中我中共党员及青年团员的情况，阻挠并破坏同学们的抗美援朝、参加军干校等爱国行动，并不断地制造谣言，诬蔑我国人民领袖和人民政府的各项政策。当美帝在朝鲜仁川暂时登陆时，他们并公开制造什么“圣母在英美上空显圣”之类的谣言。今年一月，我中央人民政府教育部接受了该校师生的正义要求，以卜相贤（当时任该校副校长）一贯抗拒人民政府的教育政策，将其撤职后，该犯更为变本加厉进行反革命活动。津市天主教中的广大爱国教徒展开自立革新运动时，该等更滥用“神权”，诬蔑该校之爱国教徒为“叛教”，“犯罪”，进行阻挠破坏。此外，卜犯等并编造所谓“原子弹与宇宙精神”等反动小册，为美帝进行反动宣传。卜相贤是天主教耶稣会天津院的“院长”，鲍、房两犯也都是天主教中的“神甫”，他们在中国不是从事什么宗教活动，而是进行破坏我伟大祖国建设的间谍活动。津沽大学广大师生和津市天主教中的爱国教徒，对卜等假藉“传教”之名进行间谍破坏的滔天罪恶，莫不万分愤慨。并早已纷纷要求人民政府将该等逮捕法办，以保卫我伟大祖国的安全。人民政府接受了群众的正义要求，将卜等一举逮捕归案，这就有力地打击了美帝国主义利用宗教进行间谍破坏的恶毒阴谋。","type":"paragraph"},{"text":"在中国，天主教和基督教一样，一方面是宗教信仰的对象，另一方面又曾在长时期中被帝国主义用为帮助进行侵略的手段。教会人员与美蒋勾结进行反共反人民活动的事例是很多的，而最近美国间谍卜相贤等的就捕，就更加证明了帝国主义利用宗教作为进行间谍活动工具的阴谋。事实是如此地清楚：如果宗教团体不斩钉截铁地与帝国主义割断联系，如果不把隐藏在教会中的间谍暗害分子彻底清除；那么势必要严重地危害到教会自身。每一个虔诚的宗教信仰者，是绝不应听任自己的教会被帝国主义用来作为侵略自己国家的工具的。","type":"paragraph"},{"text":"在新中国，信仰是自由的，是受共同纲领保护的。但是，如果反革命罪犯利用宗教，为帝国主义服务，进行破坏活动，那就一定要受到人民政府的取缔和制裁的。不论他们标榜哪一种宗教，也不论他们是中国人或外国人，都应当按照中华人民共和国惩治反革命条例的规定，受到应有的惩处。人民政府既不因为取缔那些反革命活动而干涉宗教信仰自由，也不因为保护宗教信仰自由而容忍帝国主义及其走狗对我国进行破坏的反革命罪恶活动。","type":"paragraph"},{"text":"有些教会组织虽然混有一些帝国主义分子和少数的民族败类，利用教会作为帝国主义侵略中国的工具；但是，一般的中国教徒是爱国的，他们希望国家独立富强，其中有识之士并已开始认识到帝国主义的血腥阴谋，反对帝国主义及其走狗利用教会做为侵略自己国家的工具；因此，他们已坚决地站在爱国主义的立场，积极地展开了自立革新运动。目前，津市天主教徒在拥护自立革新运动的宣言上签名者，已有一万五千余人，这是很好的现象。这个运动的深入与普及，将使天主教获得新的生命，改变人民对于天主教的观感，并使中国的天主教走上宗教正轨之路。","type":"paragraph"},{"text":"美国间谍卜相贤等的就捕，是继破获“公教青年报国团”和美帝“陆军战略情报处”潜伏在津市的间谍组织之后，又一巨大胜利；也是正在革新中的天主教的一个大胜利。我们希望爱国的宗教界人士和全市广大人民在一起，提高政治警觉性，划清敌我界线，深入开展自立革新运动，坚决地彻底地与帝国主义割断联系，不受他们的欺骗，不怕他们的任何恐吓，揭露与控诉他们的一切反动阴谋，把美帝国主义在中国教会中的特务分子，完全肃清，为中国的天主教的光明前途而奋斗！为保卫我们伟大的祖国的安全而奋斗！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc62e56142"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
