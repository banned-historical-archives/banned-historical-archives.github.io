tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阮氏萍外长举行盛大告别宴会周恩来、叶剑英、李先念、姬鹏飞等同志和沙林察外交大臣等应邀出席 阮氏萍外长和姬鹏飞外长在宴会上讲话","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七二年十二月三十日讯 越南南方共和临时革命政府外交部长阮氏萍，今天晚上在人民大会堂宴会厅举行盛大告别宴会。"},{"type":"paragraph","text":"我国国务院总理周恩来，中共中央军委副主席叶剑英，国务院副总理李先念，外交部部长姬鹏飞、副部长乔冠华、韩念龙，中联部部长耿飚，外经部部长方毅，外贸部副部长李强，国防部副部长肖劲光，北京市革命委员会主任吴德，国务院各部的女副部长陈慕华、钱正英、夏之栩等，应邀出席宴会。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察和夫人也应邀出席宴会。"},{"type":"paragraph","text":"越南民主共和国驻中国大使吴船，越南南方共和驻中国大使阮文广，以阮文贝为团长的越南南方青年解放联合会代表团，阮氏萍外长的随行人员，以及在北京的其他越南同志，出席宴会。"},{"type":"paragraph","text":"宴会厅里并排悬挂着中国国旗和越南南方共和正式旗帜。阮氏萍外长和姬鹏飞外长在宴会上先后讲话。他们讲话以后，乐队分别奏中国国歌和越南南方共和正式歌曲。"},{"type":"paragraph","text":"宴会上，越中两国战友欢聚一堂，畅叙革命情谊。乐队演奏了中、越两国乐曲。"},{"type":"paragraph","text":"应邀出席宴会的还有中共中央和政府有关部门、中国人民解放军各总部和军种、北京卫戍区、对外友协的负责人彭绍辉、张池明、田维新、刘道生、曹里怀、吴忠、范子瑜、王猛、韩宗正、申健、张香山、徐今强、郭鲁、于眉、孙友余、李玉堂、张国传、王世延、谢华、王海容、许寒冰、谢静宜、狄福才、张纪之、刘建功、陈浚、丁雪松、乔培新、朱春和、陆维钊、韩叙、路奎、王守湘、马克绍、梁枫、高建中以及中越友好人民公社的代表李九玲、郭守恒。"},{"type":"paragraph","text":"各国驻中国使节也应邀出席宴会。"},{"type":"paragraph","text":"阮氏萍外长举行盛大告别宴会。图为阮氏萍外长在宴会上讲话。 新华社记者摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"093304a58b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
