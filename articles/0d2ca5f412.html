<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级古典政治经济学主要著作翻译出版的一些情况","authors":["张伯健"],"dates":[{"year":1962,"month":6,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在政治经济学说史中，首先探讨经济现象内在联系，从而为经济理论奠定初步科学基础的是资产阶级政治经济学古典学派。英国的古典政治经济学，乃是马克思主义的三大来源之一。直到现在，研究这一学派的经济学说，无论对于学习马克思主义来说，或是对于批判资产阶级庸俗政治经济学各流派来说，都具有重要意义。"},{"type":"paragraph","text":"为了给学术界研究这一学派提供参考资料，商务印书馆对这一学派代表人物主要著作的翻译和出版作了安排，其中有的已出版，有的在印刷或翻译中。"},{"type":"paragraph","text":"威廉·配第(1623-1687年)是英国古典政治经济学的奠基人，马克思称之为最有天才和最有创见的经济学研究者。他的主要著作《政治算术》已于1960年翻译出版；《赋税论》、《献给英明者》、《货币杂论》亦已译出，现在校订中，年内可望出版；《爱尔兰的政治解剖》计划明年出版。"},{"type":"paragraph","text":"在法国古典政治经济学的奠基人是布瓦基尔柏(1646-1691年)，不过对许多问题的看法，他与配第却有很大的不同。马克思说:“把配第和布瓦基尔柏的著作和性格作一比较研究，……可以从根源上说明英国古典政治经济学和法国政治经济学之间的民族对立。”他的两部主要著作:《法国详论》和《论谷物的性质及其贸易》，现在翻译中。"},{"type":"paragraph","text":"英国哲学家洛克(1632-1704年)，对于劳动价值概念曾有所发挥。他的《论降低利息和提高货币价值的后果》和与经济问题有关的《政府论》均已译出，现在印刷中，不久即可出版。"},{"type":"paragraph","text":"法国重农学派对于资产阶级政治经济学的创立也起了很大的作用。这一学派的主要代表人物是魁奈(1694-1774年)和杜阁(1727-1781年)。魁奈的名著《经济表》，已据日译本译出，打算明年合并出版一部《魁奈选集》。杜阁的《关于财富的形成和分配的考察》已于1961年出版。"},{"type":"paragraph","text":"资产阶级古典政治经济学在亚当·斯密和李嘉图的著作中达到了最高的发展，亚当·斯密(1723-1790年)在资本主义生产方式的科学分析上比重农学派前进了一大步。重农学派认为只有农业劳动才创造“纯产品”，而斯密第一次宣称任何劳动，不管用于哪一生产部门，都是价值的源泉。他的巨著《国民财富的性质和原因的研究》，早在辛亥革命以前已有严复的译本，书名《原富》；解放前又有王亚南、郭大力的译本，书名《国富论》。现在正根据王、郭旧译进行校订工作。第一卷定于年内出版，第二卷明年上半年出版。斯密的另一本著作《关于司法、警察、岁入及军备的讲演》，原是他在格拉斯哥大学讲课时一个学生所作的记录，后来由英国经济学家坎南整理出版，现已译出，在印刷中。"},{"type":"paragraph","text":"李嘉图(1772-1823年)制定了在资产阶级眼界内所能看到的最彻底的劳动价值论。马克思说他“作为古典政治经济学的完成者，把交换价值的决定于劳动时间作了最透彻的表述和发展”。他的代表著作《政治经济学及赋税原理》在解放前也有王亚南、郭大力的译本，现已根据原文重新校订了一过，最近可以出版。"},{"type":"paragraph","text":"古典政治经济学在法国是以西斯蒙第(1773-1842年)告终的。他指出资本主义的许多重大矛盾，批评了资本主义。但是他不理解这些矛盾的实质，并且是从小生产者的立场来进行这种批评的。因此，他在完成法国古典政治经济学的同时，又创始了小资产阶级的政治经济学。他的主要著作《政治经济学新原理》现已译出初稿。　张伯健"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d2ca5f412"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
