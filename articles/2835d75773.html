ates":[{"year":1994,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"惊心动魄演绎革命历史《叱咤香洲叶剑英》拍成"},{"type":"paragraph","text":"现代化沿海城市珠海，年逾古稀的叶剑英元帅肃穆地伫立在香洲烈士陵园。他将一束束鲜花安放在烈士的碑位前，默默地抚摸着无言的墓碑，回首看看身后鳞次栉比的高楼，陷入往事的回忆中——"},{"type":"paragraph","text":"１９２５年，年仅２７岁的叶剑英遵照孙中山先生的指示，来到珠海香洲组建起革命军队——香洲新编团，香洲大地一片红火，各界群众发动起来，成立农会，建立武装。新编团也成了反动势力和军阀残余的眼中钉，他们串通一气，数次行刺年轻的团长叶剑英。罪行败露后他们又勾结新编团中的叛徒，策动土匪协同地主武装，偷袭新编团。率团东征的叶剑英愤而回师，强忍悲痛安殓烈士，怒火难遏一举摧毁了反动武装营垒，同时一面派出小分队奔赴澳门缉拿潜逃的元凶，一面陈兵拱北运用外交和军事手段，终于严惩了叛徒，为死难烈士报了仇。"},{"type":"paragraph","text":"由广西电影厂和中影公司新近拍成的这部影片，在惊心动魄的传奇性故事中，生动真实地再现了老一辈革命家革命历程中的一页。电影界人士认为，该片注重观赏性的表现手法，为拍好革命历史题材影片作了一些新的尝试。该片由张冀平编剧，肖朗、邱丽莉联合执导，青年叶剑英由前不久在《情满珠江》中出演男主角的陈锐饰演。（向文）"},{"type":"paragraph","text":"（附图片）《叱咤香洲叶剑英》剧照"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2835d75773"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
