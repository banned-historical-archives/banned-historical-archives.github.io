ear":1966,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席是人类的希望"},{"type":"paragraph","text":"我是一个农业工人，今年四十四岁，曾经被佛朗哥监禁过，我的兄弟也遭过长枪党的毒手。"},{"type":"paragraph","text":"我要告诉你们，我读过伟大的毛泽东同志的许多书。在我的家里，有毛泽东同志的照片。早在你们解放战争期间，我就非常同情你们。当我读到有关林彪将军的报道和看到他的像片的时候，心情是非常激动的。同志们，我非常想访问人民中国，去看看伟大的毛泽东同志所建设的一切。所有谈及中国的书籍，我都要购买。我们信赖你们。毛泽东在全世界有很多战士。在西班牙也是如此。我向全体中国人民衷心地致意。祝毛泽东同志万寿无疆。"},{"type":"paragraph","text":"同志，我是以许多同志的名义给你们写信的。"},{"type":"paragraph","text":"随信寄上一张印有红玫瑰的彩色画片。伟大的毛泽东同志，请接受为您采摘的这朵红玫瑰。毛泽东是人类的希望。当我们提到毛泽东的时候就指的是当代的列宁。"},{"type":"paragraph","text":"西班牙农业工人　克鲁努多"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d09a06f062"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
