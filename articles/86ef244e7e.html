:1967,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"举起双手拥护文化大革命"},{"type":"paragraph","text":"尽管保加利亚的修正主义者竭力想用反华谣言来欺骗人民，保加利亚广大革命群众不顾受政治迫害的危险，用各种方法表达他们对中国人民的伟大领袖毛主席的无限热爱、无限崇敬，热烈欢呼中国无产阶级文化大革命所取得的伟大胜利。"},{"type":"paragraph","text":"一位普通公民从广播中听到了毛主席接见红卫兵的消息后，马上打电话给中国同志，热烈欢呼：“中国无产阶级文化大革命好得很！”他还高呼：“向毛泽东同志致敬！”“红卫兵万岁！”"},{"type":"paragraph","text":"一位老革命者说：“毛泽东同志亲自发动和领导的中国无产阶级文化大革命与列宁领导的十月社会主义革命具有同等重要的意义。”"},{"type":"paragraph","text":"一位军官说：“毛主席领导的中国无产阶级文化大革命正在推动着世界革命向前发展，这是任何人也阻挡不了的。”"},{"type":"paragraph","text":"一位工人说，毛泽东思想永远照耀着保加利亚人民的心。他还说，我们保加利亚工人举起双手赞成中国无产阶级文化大革命。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86ef244e7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
