script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜农民积极分子大会给毛主席的感谢信","authors":[],"dates":[{"year":1953,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜农民积极分子大会给毛主席的感谢信"},{"type":"paragraph","text":"【新华社平壤十五日电】朝鲜全国农民积极分子大会写信给毛泽东主席表示感谢。信中说："},{"type":"paragraph","text":"敬爱的毛泽东主席！在保卫我们祖国的自由独立和荣誉、反对美国侵略者及其走狗的正义的祖国解放战争的火焰中，出席朝鲜民主主义人民共和国全国农民积极分子大会的我们，谨向敬爱的您、并通过您向兄弟般的中国人民致深深的感谢和热烈的祝贺。"},{"type":"paragraph","text":"美英帝国主义武装侵略者为了企图把我们祖国变为它的殖民地和军事基地并在亚洲挑拨新战争，发动了对我们祖国的野兽般的侵略战争，这个战争现在已进入第四年了。敌人在去年曾对我们的和平城市和农村肆行毁灭性的轰炸，大量地屠杀我们无辜的父母兄弟和妻子，甚至于使用了细菌武器，轰炸了我们的发电厂，中断灌溉设备的用水，企图把我们后方造成饥饿疾病和死亡的深渊。"},{"type":"paragraph","text":"我们朝鲜农民没有在敌人任何暴行面前屈服。我们克服了一切困难，一致奋起进行农业增产，结果，我们获得了数十年来少有的大丰收。"},{"type":"paragraph","text":"在我们反对朝中两国人民的共同敌人——美国武装侵略者的正义斗争中，您所领导的伟大的中国人民，高举着“抗美援朝保家卫国”的旗帜，把自己的亲爱的儿女派到朝鲜战场，并在我们粮食情况困难的时期，给我们送来了数万吨粮食和食物。"},{"type":"paragraph","text":"英勇无比的中国人民志愿军，在和我们朝鲜人民军一道消灭和扫荡美国武装侵略者的激烈战斗环境中，不但发挥了无比的英雄主义和不屈不挠的顽强性，建立了巨大的卓著的功勋，而且，节省出粮食，分给我们朝鲜农民，利用完成战斗任务后的空隙，帮助我们劳动，帮助我们增产粮食。这是伟大的中国人民的无产阶级国际主义的真正表现，是朝中两国人民在历史上结成的兄弟般的友谊团结的示威。"},{"type":"paragraph","text":"今天，美国武装侵略者无视朝中两国人民和全世界爱好和平人民对和平的热烈愿望，在千方百计地疯狂地破坏停战谈判，进一步延长和扩大朝鲜战争。"},{"type":"paragraph","text":"但是，在捍卫自己祖国的独立自由的正义斗争中锻炼出来的朝鲜人民，能够对付敌人任何长期战争的阴谋，能够战斗到底，并一定要彻底击破和粉碎敌人的任何侵略企图。"},{"type":"paragraph","text":"尊敬的毛泽东主席：我们朝鲜农民遵循着我们敬爱的领袖金日成将军的指示：“为食粮的斗争，就是为祖国的斗争”，将为不荒一寸土地，增产更多的粮食而尽一切努力。我们将广泛地运用先进的农作方法，保证在今年获得更高的产量。我们要尽一切热情和力量，进一步爱护和支援英雄的人民军和兄弟般的中国人民志愿军。"},{"type":"paragraph","text":"为了朝中两国人民的光辉胜利和中华人民共和国的隆盛发展及亚洲的持久和平，谨祝敬爱的您万寿无疆。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朝鲜战争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc3b371f54"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
