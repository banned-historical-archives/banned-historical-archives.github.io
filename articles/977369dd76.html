<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第二次阿拉伯国家首脑会议开幕  会上宣读了刘少奇主席和周恩来总理的贺电","authors":[],"dates":[{"year":1964,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第二次阿拉伯国家首脑会议开幕"},{"type":"paragraph","text":"会上宣读了刘少奇主席和周恩来总理的贺电"},{"type":"paragraph","text":"据新华社亚历山大港五日电　第二次阿拉伯国家首脑会议今晚在阿拉伯联合共和国的亚历山大港开幕。十三个阿拉伯国家的国家首脑或他们的代表和巴勒斯坦解放组织的领导人参加了开幕式。"},{"type":"paragraph","text":"会议通过了由最近举行的阿拉伯国家外长会议提出的议程草案。议程的主要项目是：约旦河水的利用；阿拉伯联合军事司令部；巴勒斯坦实体；阿拉伯国家外长访问世界各国以解释巴勒斯坦问题；南阿拉伯问题；阿拉伯经济、文化和情报协议。"},{"type":"paragraph","text":"阿联总统纳赛尔在致开幕词时首先回顾了第一次阿拉伯国家首脑会议。他说，那次会议的目的是：在面临被占领的巴勒斯坦土地上日益增长的危险时，讨论巩固阿拉伯的防务的问题。他接着说，在目前举行的第二次会议上，“我们将讨论第一次会议以来发生的事件，同时在面临着我们当前的重大任务的时候，提出我们的看法。”"},{"type":"paragraph","text":"沙特阿拉伯摄政者费萨尔以阿拉伯联盟国家首脑理事会本届会议主席的身份讲话。他说，巴勒斯坦人民和全体阿拉伯人民盼望这次会议为把所有阿拉伯的土地从帝国主义枷锁和外国统治下解放出来以及为阿拉伯人的利益而作出努力。他说，沙特阿拉伯保证支持阿拉伯事业，支持团结、合作和兄弟关系。"},{"type":"paragraph","text":"阿拉伯联盟秘书长哈苏纳在讲话中指出：“帝国主义还留在阿拉伯土地上，它继续漠视阿拉伯人和各国人民的意愿。它在这个消灭帝国主义和种族主义的时代继续嘲弄法律和道德准则。它公然正在进行一场公开的战争，反对为自由而斗争的阿拉伯人。”"},{"type":"paragraph","text":"他说，阿拉伯民族要求采取更迅速的行动来解放巴勒斯坦、南阿拉伯、阿曼、布赖米，以加强阿拉伯人民在政治、防务、经济和社会方面的联合行动，并朝着完全独立的方向前进。"},{"type":"paragraph","text":"约旦国王侯赛因在讲话中表示相信，阿拉伯民族恢复他们在巴勒斯坦的权利这个最深切的愿望将会实现。"},{"type":"paragraph","text":"摩洛哥国王哈桑二世给大会的贺信由他的代表阿卜杜拉在会上宣读。他在贺信中保证摩洛哥完全支持维护阿拉伯民族权利的斗争，随时准备为解放巴勒斯坦和其它在帝国主义统治下的阿拉伯土地而作出一切牺牲。"},{"type":"paragraph","text":"黎巴嫩总统谢哈卜在他的贺电中表示声援其它阿拉伯国家反对犹太复国主义的斗争。"},{"type":"paragraph","text":"会上还宣读了中华人民共和国主席刘少奇和国务院总理周恩来的贺电以及其他国家领导人的贺电。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"977369dd76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
