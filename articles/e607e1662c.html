rs":[],"dates":[{"year":1982,"month":7,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京七月十四日电　中共中央军委主席邓小平，副主席叶剑英、徐向前、聂荣臻为纪念中国人民解放军建军五十五周年，最近分别为《星火燎原》题词，勉励全军指战员继承和发扬革命传统，加速现代化、正规化革命军队的建设。"},{"type":"paragraph","text":"邓小平同志的题词是:“继承和发扬人民军队的光荣传统。”"},{"type":"paragraph","text":"叶剑英同志的题词是:“革命精神代代传”。"},{"type":"paragraph","text":"徐向前同志的题词是:“发扬革命精神为建设现代化的人民军队而奋斗!”"},{"type":"paragraph","text":"聂荣臻同志的题词是:“用我军的光辉历程和革命传统教育全军指战员”。"},{"type":"paragraph","text":"大型革命回忆录《星火燎原》是我军战斗历程和革命传统的教科书。它从一九五六年发起征文以来，陆续收到我党我军的革命老战士撰写的记述人民军队各个历史时期重大事件和战斗生活的文章一万多篇，其中不少已经编入《星火燎原》选集。这些文章描述的大量生动事例，充分体现了我军全心全意为人民服务的建军宗旨和人民军队官兵一致、军民一致、艰苦奋斗、不怕牺牲的光荣传统。"},{"type":"paragraph","text":"这部大型革命回忆录是由人民解放军战士出版社《星火燎原》编辑部编辑出版的。“八一”前夕，《星火燎原》选集一至十集全部出齐。《星火燎原》杂志还将出版纪念建军五十五周年专刊。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1982\\07\\827F010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1982\\07\\827F010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1982\\07\\827F010103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1982\\07\\827F010104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e均新华社稿(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e607e1662c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
