script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"摒弃极左思潮的影响","authors":["何玉麟"],"dates":[{"year":1979,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"何玉麟"},{"type":"paragraph","text":"当前社会上青少年中犯罪的和沾染不良习气者有所增加，除了这些青年放松自己世界观改造应负一定责任之外，某些社会因素，包括某些领导的错误工作方法，也有意无意地起到推波助澜的作用。有些单位领导，一听某些青年稍有越轨之行便大加挞伐——训斥、扣奖、办学习班，惩一儆百，并把这些犯错误青年“丑事”大加渲染，作为什么“意识形态领域阶级斗争新动向”而上广播，贴黑板报……在这些领导同志的眼里唯有“惩办主义”可以包治百病，而且还自鸣得意地认为这是阶级立场坚定，同错误思潮斗争有力。"},{"type":"paragraph","text":"其实，有些犯错误的青年，本有“回头”之意，被你这样一“推”，一“惩”，认为反正出了丑，丢了脸，索性破碗破摔，使原是疥癣之患，终成痼瘫之症，而至不可救药。这不仅是葬送了一个青年的青春，对整个社会来讲，也是莫大的损失。在某些领导者眼中，阶级斗争抓的很灵，但这种“阶级斗争”，是混淆两类不同性质矛盾，是受“四人帮”极左思潮的影响。“四人帮”打着“阶级斗争”的幌子，凡事左三分，一有错误，就一棍子打死，谁要是讲帮助挽救，就是右倾，立场不稳，就是与犯错误者同流合污，这种现象再不破除，“孤独者”将会越来越多。因此，我们要摒弃极左思潮的影响，克服宁“左”勿右的思想，化冷淡为热情，变鄙视为关怀，共同来做好青年的思想工作。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4515eadc65"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
