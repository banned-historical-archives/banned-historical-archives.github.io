script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比共（马列）（《被剥削者》）代表团回国","authors":[],"dates":[{"year":1971,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比共（马列）（《被剥削者》）代表团回国"},{"type":"paragraph","text":"新华社四日讯　比利时共产党（马克思列宁主义）（《被剥削者》）代表团团长、中央委员会书记德西雷·特里福同志，团员、中央委员、布鲁塞尔地委书记伊夫·佩雄同志，今天乘飞机离开北京回国。"},{"type":"paragraph","text":"代表团团员阿诺尔德·奥瓦尔特同志和西尔瓦诺·达维蒂同志已先期离开北京回国。"},{"type":"paragraph","text":"今天到机场欢送的有：中共中央委员、中共中央对外联络部部长耿飚同志，有关方面负责人任允中、唐明照、邢竹芳、赵学礼、张振海、王金圣。"},{"type":"paragraph","text":"德西雷·特里福等同志在我国期间，先后访问了北京、上海、南京和革命圣地延安，参观了工厂和人民公社；在上海还参观了中国共产党第一次全国代表大会会址。他们所到之处，受到了热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3eff8dc14e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
