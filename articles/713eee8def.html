torical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"采取围城打援办法歼敌有生力量","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":10,"day":24}],"parts":[{"text":"采取围城打援办法歼敌有生力量","type":"title"},{"type":"appellation","text":"詹李王并告程李："},{"type":"paragraph","text":"你们作战方针应着重歼灭敌有生力量，然后敌占各据点自然容易为我收复。为实行此方针，应采取围城打援办法。围城之目的不在得城，而在打援。集中七八倍于敌之兵力（例如集中四五个团打敌援兵一个至二个营），每次事前均应有充分准备，不浪打，打则必胜。打时须用包围迂回，以期尽歼。此点对干部应作深刻教育。"},{"type":"paragraph","text":"军 委"},{"type":"paragraph","text":"酉敬"}],"comment_pivots":[{"part_idx":1,"offset":3,"index":1},{"part_idx":1,"offset":7,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["詹，指詹才芳，当时任冀东军区司令员。李，指李楚离，一九○六年生，河北元氏人，当时任冀东军区政治委员。王，指王智涛，一九○六年生，河北沧县人，当时任冀东军区参谋长。","程李，指程子华、李运昌，当时分别任冀热辽军区司令员兼政治委员和副司令员。"],"page_start":205,"page_end":205,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"713eee8def"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
