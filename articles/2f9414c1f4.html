<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不能让帝国主义再剥削我们拥护政府征用亚细亚　火油公司的贤明措施","authors":["闵思启"],"dates":[{"year":1951,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:正在我们严厉镇压反革命分子，人民正气高涨的时候，我先后看到四月三十日报载政务院命令征用英国在我国境内各地的亚细亚火油公司及五月一日报载上海市军事管制委员会已执行这一命令的新闻，我兴奋的感到政府这一贤明措施是完全适当其时而且符合人民要求的。"},{"type":"paragraph","text":"德士古和美孚本为美国所有，单美孚的储油所就有五百亩地大，铁码头有二里长，油池有十几万吨。他们的美籍经理们的生活是非常奢侈的；每人每月总要支取公司四、五千个单位，还有额外的收入和一、二亿的特别费；他们还有公司配给他们的房屋、家具、车辆……，单就美孚总经理的住宅来说，就有十多亩地大；他们每天还要消耗公司的白煤二、三吨；他们腐化、奢侈，玩弄中国女性；他们不看重中国技术人员；他们埋没中国的技术人才；他们挑拨离间……。所有这一切都说明着帝国主义侵略规模的庞大和帝国主义分子吮吸我国人民的血汗而任意消耗的荒淫无耻。但是，德士古和美孚的工人兄弟们，现在他们在新中国的光明道路上前进了；他们为摆脱帝国主义的压迫而喜悦；他们在抗美援朝运动中，有着惊人的成绩；他们拿出主人翁的态度轰轰烈烈地为建设而努力工作着；他们有许多同志，不顾疲倦、不顾年老、不顾肮脏、不顾擦伤、不顾家中妻子的生育，牺牲了私人的时间，为庆幸翻身而努力工作着。"},{"type":"paragraph","text":"难道我们现在还允许亚细亚火油公司像管制前的德士古、美孚一样地存在下去吗?难道我们还让亚细亚火油公司的工人兄弟们受到帝国主义的压迫吗?难道我们还不顾国家的安全及公众利益而让亚细亚火油公司来吸取我们劳动人民的血汗并奢侈腐化地消耗吗?难道我们现在还允许帝国主义的企业在我们美丽的国土上留下一个侵蚀的据点吗?难道我们现在还允许帝国主义来破坏我们新民主主义的经济建设吗?难道我们强大了的中国还像过去一样地忍受帝国主义的任何挑衅行动和刧夺侵略吗?不，不能了，我们必须要征用亚细亚火油公司来为我们的建设服务，我们要拥护政府的这一正确贤明的措施。　闵思启"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f9414c1f4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
