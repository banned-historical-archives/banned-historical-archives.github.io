"authors":[],"dates":[{"year":1965,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席刘主席接见越国会代表团"},{"type":"paragraph","text":"黄文欢团长向毛主席赠送越南军民打下的美机残骸一片"},{"type":"paragraph","text":"新华社十六日讯　毛泽东主席和刘少奇主席今天下午接见了越南民主共和国国会常务委员会副主席、越南劳动党中央政治局委员黄文欢和由他率领的越南民主共和国国会访华友好代表团成员：陈登科、朱文晋、阮氏十、范文白、杜春爽、陈廷知等。"},{"type":"paragraph","text":"毛泽东主席、刘少奇主席同他们进行了亲切友好的谈话。黄文欢团长向毛泽东主席赠送了一九六五年四月四日越南军民在清化省绍化县绍州村打下的F—105D美机残骸一片。驾驶这架飞机的美国飞行员被越南军民活捉。"},{"type":"paragraph","text":"接见时在座的，有彭真、郭沫若、武新宇、连贯、韩念龙。"},{"type":"paragraph","text":"越南民主共和国驻我国大使陈子平也在座。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"上图：毛泽东主席、刘少奇主席和越南民主共和国国会访华友好代表团全体同志合影。前左第五人是黄文欢团长。"},{"type":"paragraph","text":"新华社记者　杜修贤摄"},{"type":"paragraph","text":"右图：黄文欢团长向毛主席赠送越南军民打下的美机残骸一片。"},{"type":"paragraph","text":"新华社记者　吴元柳摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2a9cb1ff9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
