ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"第一批反映","alias":"","parts":[{"type":"paragraph","text":"第一批反映\""},{"type":"paragraph","text":"（1959年3月）印度处于被动，它的反映对我们最有利。"},{"type":"paragraph","text":"二美国限于所谓“深切的同情”，大说其空话。B"},{"type":"paragraph","text":"[1]这是毛泽东关于印度和美国对西藏叛乱事件的态度的一组批语和批注，题目是毛泽东拟的。"},{"type":"paragraph","text":"[2]印度报业托拉斯1959年3月29日发表一则消息，报道了印度外交部发言人对新华社关于西藏叛乱事件公报说叛乱指挥中心在印度噶伦堡一事进行的辩解。这是毛泽东对这一报道的批语。"},{"type":"paragraph","text":"[3]美联社1959年3月28日发表的一则电讯稿说：“美国星期六宣布，它对西藏人民遭到共产党中国的“野蛮干涉’寄予“深切的同情”。”这是毛泽东对这一电讯稿的批语。毛泽东全集第四十一卷"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"注：为什么不公开？谁也不知道印度政府有这样“友好”的措施，直到一九五九年三月二十九日人们才知道。"},{"type":"paragraph","text":"四注：可见六个月以前是有举动的。2"},{"type":"paragraph","text":"五"},{"type":"paragraph","text":"注：亲爱的印度朋友们，不要轻信那些西藏人，他们指挥西藏叛乱活动是秘密的，你们不知道，我们可知道呢！3"},{"type":"paragraph","text":"[1]印度报业托拉斯报道印度外交部发言人发言说：“来自西藏的许多人多年来一直住在噶伦堡，其中有些人是在过去三四年到达的。印度政府一再向他们表明，他们不应该在印度领土上搞任何反对一个友好国家的政府的宣传活动。”毛泽东在报道中这句话的后面，加括号写了这条批注。"},{"type":"paragraph","text":"[2]印度外交部发言人接着说：“最近一次警告大约是在六个月以前提出的。从那时起，这些人一直没有任何举动。”毛泽东在报道中这句话的后面，加括号写了这条批注。"},{"type":"paragraph","text":"[3]印度外交部发言人接着说：“在噶伦堡或其他地方，这些人和其他一些人都没有进行非法活动。”毛泽东在报道中这句话的后面，加括号写了这条批注。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":407,"page_end":408},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd9faa0591"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
