"dates":[{"year":1949,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【北京新华电台十一日广播】前新疆警备副总司令兼南疆警备司令赵锡光，在一日打电报给毛主席致敬。电报中说:‘新疆全省军民在伟大的友邦苏联的鼓励下，已经从九月廿五日起，和广州国民党政府断绝关系，竭诚接受先生的领导，从此新疆走上了光明灿烂和平建设的大道，本人代表南疆三百万军民，谨向先生和伟大的人民解放军全体同志，致最诚恳崇高的民族解放敬礼。’"},{"type":"paragraph","text":"【北京新华电台十一日广播】毛泽东主席十日打电报答复前新疆警备副总司令兼南疆警备司令赵锡光，电报的原文说:"},{"type":"paragraph","text":"‘赵锡光将军:一日电悉。新疆和平解放，全国欣慰。望南疆驻军全体官兵，团结一致，为改造自己成为人民军队而努力。"},{"type":"paragraph","text":"毛泽东　十月十日’"}],"comments":[],"origin":"北京新华电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c83f7451d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
