ear":1966,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席万岁！人民万岁！"},{"type":"paragraph","text":"伟大的导师毛主席，全世界革命者都仰望您，五洲四海都看到您的光芒。您开辟了亿万人民战斗的道路，您指出了亿万人民前进的方向。"},{"type":"paragraph","text":"穿着草绿色的军装，伟大的统帅接见我们革命小将。毛主席啊毛主席，您亲切的微笑，包含着对我们的无限信任和期望；您的谆谆教导，给了我们极大的鼓舞和力量。毛主席啊毛主席，我们一定永远听您的话，到大风大浪里去当革命闯将！"},{"type":"paragraph","text":"五十万红卫兵和革命师生纵情欢呼，五十万颗红心一齐跳跃。“毛主席万岁！万岁！万万岁！”革命的毫情在激荡，革命的烈火在燃烧。我们永远记住毛主席的教导：敢于斗争，敢于革命，善于斗争，善于革命。在毛泽东思想伟大红旗指引下，把无产阶级文化大革命更加轰轰烈烈地开展起来。　（本版照片系本报记者摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4691b95ea5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
