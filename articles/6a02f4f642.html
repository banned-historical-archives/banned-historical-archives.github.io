ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"在阿尔巴尼亚驻罗大使谈话摘要报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在阿尔巴尼亚驻罗大使谈话摘要"},{"type":"paragraph","text":"报告上的批语"},{"type":"paragraph","text":"（1960年7月）"},{"type":"paragraph","text":"好朋友，一个也就够了，何况还有十个，或者几十个！全世界百分之九十的人民群众，是同情和支持我们的，或者可能同情和支持我们的，是不是呢？"},{"type":"paragraph","text":"[1]指中国驻罗马尼亚大使馆1960年7月15日给外交部的电报。电报中说，阿尔巴尼亚驻罗马尼亚大使最近说，阿几百年来受外国侵略，从未屈服过，解放以后更加勇气百倍，因为有伟大的中国人民、苏联人民和其他社会主义国家携手斗争。阿尔巴尼亚坚决反对帝国主义、修正主义，因为阿尔巴尼亚人民很清楚地认识帝国主义和修正主义，帝国主义的时代已经过去了，社会主义阵营有足够的力量来反对帝国主义。他说：“帝国主义还是强大的，它还是有可能制造灾难，冒险发动战争，危险还是存在，而且是很大的。”他引用毛泽东的话说，美帝向四处伸手，结果是把绞索套在脖子上，最后一定被勒死。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":446,"page_end":446},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a02f4f642"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
