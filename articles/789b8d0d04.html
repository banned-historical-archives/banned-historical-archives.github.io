rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"干革命靠毛泽东思想","authors":["战士齐向阳〖HH/换行〗DW：八一六四部队"],"parts":[{"type":"paragraph","text":"我们要质问刘少奇及其同伙：红军两万五千里长征，经历了千辛万苦，战胜了千难万险，创造了人间奇迹，靠的是“物质刺激”吗？黄继光为了祖国、为了人民，用自己的胸膛堵住了敌人的枪眼；李文忠为了抢救红卫兵小将，英勇献身在激流滚滚的赣江之中，靠的是“物质刺激”吗？门合成同志为保护二十七名阶级兄弟的生命安全，英勇扑向炸点，靠的是“物质刺激”吗？不是，绝对不是！他们靠的是战无不胜的毛泽东思想，靠的是永远忠于伟大领袖毛主席的红心。"},{"type":"paragraph","text":"什么藤结什么瓜，什么阶级说什么话。大叛徒刘少奇这个资产阶级和一切剥削阶级的总代表，大肆鼓吹“物质刺激”，妄想使人们只要金钱，不要无产阶级政治，不要无产阶级专政，以达到他复辟资本主义的罪恶目的。告诉你大叛徒刘少奇，你这是痴心妄想！用毛泽东思想武装起来的我国亿万革命人民，决不上你的当！我们一定要用毛泽东思想的千钧棒，把你的“物质刺激”等一切反革命修正主义破烂砸个粉碎！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"789b8d0d04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
