art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想永远传下去","authors":["战士孙仲观"],"parts":[{"type":"paragraph","text":"周扬恶毒攻击毛泽东思想，疯狂反对宣传毛泽东思想，我心中不禁升起万丈怒火。头可断，血可流，毛泽东思想不可丢！"},{"type":"paragraph","text":"我是个贫农子弟，解放前家中上无片瓦，下无寸土，爸爸给地主当长工，哥哥给资本家做苦工，妈妈带着我们兄弟几个讨饭，受尽地主、资本家的欺凌、压迫和污辱。解放了，在党和毛主席的领导下，我们穷人才翻了身。我在旧社会是成天要饭的乞丐，今天成了光荣的人民解放军战士。毛泽东思想改天换地，使千百万劳动人民成了国家的主人。我们对毛主席无限热爱，无限忠诚，无限信仰，无限崇拜。"},{"type":"paragraph","text":"有了毛泽东思想，才有我们劳动人民的一切。毛主席的书是全世界劳动人民革命造反的宝书。我们要天天读毛主席的书，天天宣传毛泽东思想，把毛泽东思想世世代代传下去！"},{"type":"paragraph","text":"周扬反对毛泽东思想，我们就要同他斗，不把周扬这帮牛鬼蛇神斗倒、斗垮、斗臭，誓不罢休！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfe8937e42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
