ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"给符定-的信","alias":"","parts":[{"type":"paragraph","text":"给符定一\"的信"},{"type":"paragraph","text":"（1946年9月30日）宇澄先生夫子道席："},{"type":"paragraph","text":"既接光仪，又获手示，诲谕勤勤，感且不尽。德芳²返平，托致微物，尚祈晒纳。世局多故，至希为国自珍。肃此。敬颂教安不具受业"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月三十日"},{"type":"paragraph","text":"[1]符定一（1877一1958），字宇澄，湖南衡山人，文字学家。辛亥革命后，他在湖南全省高等中学任校长时，毛泽东在那里读过书。1946年夏他应毛泽东的邀请到过延安。建国后，任中央文史研究馆馆长。"},{"type":"paragraph","text":"[2]德芳，符定一之女。1946年夏随符定一去延安。不久，符定一先回"},{"type":"paragraph","text":"时宇满先生剑美国科陈孩"},{"type":"paragraph","text":"我又藏中不询诵"},{"type":"paragraph","text":"高万反毛泽东致符定一信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":9,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":197,"page_end":198},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c438036c91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
