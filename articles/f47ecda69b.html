<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"枚乘“七发”与右倾顽症","authors":["余文茂"],"dates":[{"year":1959,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"枚乘“七发”与右倾顽症"},{"type":"paragraph","text":"余文茂"},{"type":"paragraph","text":"两千多年前，西汉文学家枚乘写了一篇形式独创的辞赋——“七发”。“七发”的影响很大，刘勰说它是杂文的三祖之一，洪迈认为后来出现的七激、七辩、七依、七广、七启、七释、七命等文章，都是辞赋家“规仿”七发写成的，七发成了辞赋中“七”体的老祖宗。这些文学史上的问题，我不想去研究它，只觉得这篇文章对今天的右倾机会主义者，很能发挥“发蒙解惑”的作用。"},{"type":"paragraph","text":"“七发”的基本情节是说一位吴国客人（吴客），用七件事情来启发楚国太子的思想，并用陈说“要言妙道”的方法，治好了楚太子的痼疾。楚太子的“安乐病”，据吴客分析，病源“至深远”，来自贵族的糜烂生活，再进一步，来自贵族阶级的没落思想。今天有些人在政治上害了“右倾顽症”，病源也是“至深远”的，要从阶级斗争的规律中去找。只要我们的社会里还存在资产阶级，存在着这个阶级的世界观、政治观点以及习惯势力，我们革命队伍中一些思想改造不好的人，就会在思想上沾上毒菌，有的甚至要害上“右倾顽症”。"},{"type":"paragraph","text":"“顽症”之所以为“顽”，在于患者像楚太子固执地呆在深宫里一样，他们的屁股顽固地坐在资产阶级的狗皮椅上，资产阶级思想的疟疾原虫，钻进了他们的血管，遍布于全身，一旦温度适宜，便要发作一阵。单看建国十年来，我们已经看见过不少右倾顽症。特别在今年，有些人的右倾顽症的发作达到了疯狂地步，攻击大跃进是“小资产阶级的狂热”，人民公社“办早了、办糟了”，大办钢铁运动“得不偿失”。有人甚至以雷公自任，要“打散公共食堂”；要修改照耀祖国飞跃前进的总路线。真是胡言不断，昏话连篇，这种右倾病症，既顽且重，有必要用七发来狠狠地发一发，让他们清醒清醒。"},{"type":"paragraph","text":"当年吴客认为楚太子的病，非药石、针灸、求上帝所能奏效，并且警告说，如果对贵族的腐朽思想“久执不废”，病就永远好不了，最后的下场是“大命乃倾”，要鸣呼哀哉的。这些话从政治上来看，对今天的“右倾顽症”患者同样适用，值得他们三味斯言，并能有所憬悟。我们祖国的瑰丽建设图景，全国人民在大跃进中的冲天干劲，这是人类历史上最为壮丽的景象。右倾机会主义者对这种景象不愿正视，不能理解，如楚太子对吴客启发思想的六项建议一样，无动于衷，不肯从资产阶级思想的深宫中挪动一步。所以，我们就有必要用“要言妙道”来治一治，除此以外，别无验方。"},{"type":"paragraph","text":"我们所说的“要言妙道”，跟枚乘所说的不一样，据余冠英先生解释：“枚乘心目中的要言妙道，是参考诸子百家然后折衷于孔、孟”的。我们的“要言妙道”是马克思列宁主义，是真理。全国都在宣传马列主义，宣传马列主义与我国实际相结合的“要言妙道”，不管是关于总路线的，大跃进的，人民公社化的，反右倾鼓干劲的，都能听之于报告，见之于报刊，右倾机会主义者只要真心求治，随时能拿到药方。条件优越，岂可坐失！"},{"type":"paragraph","text":"据枚乘说，治发源于思想病的各种病症，“要言妙道”是立奏功效的妙方。证之我们的思想改造经验，是不错的。兴无灭资，思想上多栽培一株香花，就能锄掉一棵毒草；多学一份真理，就能增强一份抗毒力量，这是“要言妙道”所以能治病的道理。对付右倾机会主义者，最有效的办法就是以马列主义为武器，通过摆事实、讲道理、进行辩论的方法，向他们展开彻底揭发和批判，论一论革命的群众运动的精微，理一理正确路线与错误思想的是非，让他们出一身冷汗“霍然病已”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f47ecda69b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
