authors":["解学恭","陈伯达"],"dates":[{"year":1967,"month":11}],"is_range_date":false,"parts":[{"text":"解学恭和南开大学卫东总部座谈时传达陈伯达的指示","type":"title"},{"text":"解学恭陈伯达","type":"authors"},{"text":"这次见了伯达同志，伯达同志指定三个人抓一抓，要让他们调查一下，要得很急，一个月交卷。伯达同志说：要很快抓，火烧眉毛了。要先作调查，大致有五个方面：","type":"paragraph"},{"text":"1、资产阶级如何在学校统治，如何腐蚀青年。","type":"paragraph"},{"text":"2、调查学制，从小学到大学多少年好。","type":"paragraph"},{"text":"3、教学内容如何编，那些去掉，那些保留，那些要精减，那些充实新内容。","type":"paragraph"},{"text":"4、教学方法如何搞，可不可以自学为主，大家进行辩论。最多别人辅导一下。","type":"paragraph"},{"text":"5、学校管理问题","type":"paragraph"},{"text":"根据这个调查三个大学，三个中学、三个小学，在城市，在农村。调查研究的方法照毛主席调查研究方法，五六个人，七、八个人开调查会，有问有答。有原始记录，再整理，调查范围：教师、家长、高年级学生，要第一把手。这个调查任务希望你们很好地承担起来。","type":"paragraph"},{"text":"","type":"appellation"}],"comments":[],"origin":"1967年11月13日清华大学井冈山斗批改战团编印《学习资料》第41期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"解学恭","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a18811caf9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
