":[],"dates":[{"year":1980,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平同志题词希望全国小朋友立志："},{"type":"paragraph","text":"做有理想有道德有知识有体力的人"},{"type":"paragraph","text":"新华社北京五月二十七日电  将于五月二十八日出版的《中国少年报》，在头版显著地位刊登了中共中央副主席邓小平五月二十六日给《中国少年报》和《辅导员》杂志的题词：“希望全国的小朋友，立志做有理想、有道德、有知识、有体力的人，立志为人民作贡献，为祖国作贡献，为人类作贡献。”"},{"type":"paragraph","text":"《中国少年报》就邓小平题词发表了题为《做一个有理想、有道德、有知识、有体力的人》的文章。文章指出，新中国的少年儿童要为人民、为祖国、为人类作贡献，没有远大的理想不行，没有高尚的道德不行，没有丰富的知识不行，没有强壮的身体也不行。要做未来的主人，就要从现在做起。文章号召全国少年朋友要立下志向，从现在做起，用实际行动来回答老一辈革命家的期望。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc3b24ead1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
