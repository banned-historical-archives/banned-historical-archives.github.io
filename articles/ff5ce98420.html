命和生产中发挥积极作用","authors":[],"dates":[{"year":1973,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"积极吸收文化大革命和批林整风中涌现的优秀分子入党"},{"type":"paragraph","text":"延边朝鲜族自治州发展的新党员在革命和生产中发挥积极作用"},{"type":"paragraph","text":"新华社长春一九七三年十月九日电　吉林省延边朝鲜族自治州一批在无产阶级文化大革命和批林整风运动中涌现出来的优秀分子，加入了中国共产党。据统计，自治州所属八个县、市和厂矿企业事业单位从党的九大以来，已发展新党员一万四千多名，其中朝鲜族占百分之四十七点三。这些新党员大多数年龄在三十五岁以下，女党员有二千五百多名。随着党的队伍的壮大，基层党组织也不断发展，现在所有农村生产大队都建立了党支部或党总支，百分之七十二的生产队建立了党支部或党小组。这些基层党组织在阶级斗争、生产斗争、科学实验三大革命运动中较好地发挥了战斗堡垒作用，有力地加强了党对各项工作的领导。"},{"type":"paragraph","text":"延边朝鲜族自治州的许多新党员，在社会主义革命和社会主义建设中朝气蓬勃，受到群众的信任和拥护。有不少新党员已被选拔到各级领导岗位上。这些新党员担任领导工作后，绝大多数更加谦虚谨慎，注意向群众和老干部、老党员学习，坚持参加集体生产劳动，密切联系群众，继承和发扬了党的艰苦奋斗的优良传统。"},{"type":"paragraph","text":"自治州各级党组织很重视加强对新党员的思想和政治路线教育。许多公社党委举办学习班、轮训班，组织新党员认真学习毛主席关于批林整风的一系列重要指示，深入批判林彪反党集团的罪行，进行“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”三项基本原则和党的基本路线的教育，以及党的性质、纲领、任务和组织纪律的教育。延吉县光新公社党委针对新党员多数是青年的特点，除了注意把他们放到斗争第一线去经受锻炼以外，还请参加过土地改革、抗美援朝等革命运动的老党员给他们讲党的光荣传统，请在旧社会苦大仇深的老贫农给他们忆苦思甜，帮助新党员不断提高阶级斗争、路线斗争和无产阶级专政下继续革命的觉悟。现在，这个公社的九十多名新党员和老党员一起，已经成为全公社批林整风和农业学大寨运动中的一支骨干力量。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff5ce98420"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
