与毛泽东》等文章","authors":[],"dates":[{"year":1988,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　即将出版的今年第一期《文汇月刊》以一组《龙年谈龙·龙年画龙》专栏迎接“龙”年的到来。在这个专栏里刊登了著名老作家柯员的《龙年谈龙》，文章笔力纵横，谈古论今，旁征博引，发人深省。著名漫画家华君武、韩羽、丁聪、江帆等的漫画则各具匠心，耐人寻味。"},{"type":"paragraph","text":"戴晴和郑直淑的文章《梁漱溟与毛泽东》是我国解放以来首次客观而详尽地介绍梁漱溟1918年至1958年这35年间与毛泽东鲜为人知的交往，首次披露了1958年9月间梁漱溟受到毛泽东严厉批评而直言相争这一震惊全国的“公案”的始末。"},{"type":"paragraph","text":"受读者注目的《胡风传》在今年将继续连载。"},{"type":"paragraph","text":"这期《文汇月刊》的封面刊登了台湾作家白先勇的大幅彩色照片，并发表了他的作品专辑，读来饶有兴味。他的散文《惊变》记叙了回国讲学在沪活动的感受。"},{"type":"paragraph","text":"祖国的《“拷贝”李秀森》，赵抗援、崔龙弟的《疯狂的盗墓者》，叶文玲的中篇小说《插曲》，均各具特色。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28a7d65c97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
