script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《团结报》发表文章  揭露苏联贪得无厌地掠夺剥削波兰","authors":[],"dates":[{"year":1976,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《团结报》发表文章"},{"type":"paragraph","text":"揭露苏联贪得无厌地掠夺剥削波兰"},{"type":"paragraph","text":"新华社地拉那一九七六年九月四日电　阿尔巴尼亚《团结报》九月四日发表文章指出，在苏联社会帝国主义的掠夺和剥削下，波兰的经济面临重重困难。"},{"type":"paragraph","text":"文章说，苏联社会帝国主义者贪得无厌地对波兰进行掠夺，并且早已把它变成了自己经济的附庸。"},{"type":"paragraph","text":"据波兰报纸报道，这个五年计划期间，波兰所需要的天然气、石油、铁矿石和铝等，都得全部或主要依靠苏联供应。另一方面，波兰则要向苏联宗主国提供自己生产的客车和货车车厢、煤、硫磺、铜、焦炭，以及各种吨位的船只等。与此同时，波兰为苏联修建的工业项目也在增加，现在已经达到了一百五十项。"},{"type":"paragraph","text":"文章在揭露苏联通过提高价格剥削波兰时指出，苏联去年仅靠提高石油价格一项就从波兰攫取了五亿美元的利润。"},{"type":"paragraph","text":"文章说，苏联的掠夺，使得波兰陷入严重的经济困境。今天波兰的工农业生产恶化，劳动人民的生活日益困难。今天波兰所欠的外债已达一百亿美元。通货膨胀，货物奇缺，生活必需品特别是食糖、土豆、蔬菜和水果等价格大幅度上涨。波兰当局关于改善人民生活和稳定物价的许多诺言只不过是一纸空文。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2969c31319"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
