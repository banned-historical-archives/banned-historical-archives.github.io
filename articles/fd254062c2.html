ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"江南部队分批走苏南为好叫","alias":"","parts":[{"type":"paragraph","text":"江南部队分批走苏南为好"},{"type":"paragraph","text":"（1940年12月30日）叶、项："},{"type":"paragraph","text":"据恩来电称：江南部队分地渡江有危险，皖北让路，蒋?虽口头答应，但让出巢、无、和、含四县恐不易，李品仙已在布置袭击我的阴谋，仍以分批走苏南为好等语。我们同意恩来意见，分批走苏南为好。"},{"type":"paragraph","text":"毛朱"},{"type":"paragraph","text":"三十[1]这是毛泽东和朱德给新四军军长叶挺和副军长项英的电报。[2]恩来，即周恩来。[3]蒋，指蒋介石。[4]巢、无、和、含，指安徽的巢县、无为、和县、含山四县。[5]李品仙，当时任国民党安徽省政府主席、国民党军第五战区副司"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":310,"page_end":310},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd254062c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
