ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"复华南分局等电","alias":"","parts":[{"type":"paragraph","text":"复华南分局等电"},{"type":"paragraph","text":"（1949年6月24日）"},{"type":"paragraph","text":"庆祝你们的伟大胜利。请你们争取时间迅速地巩固这些胜利，扩大军队及地区，以迎接第四野战军的到来，并准备于十一月、十二月或明年-月简占领广州。你们应在东江、韩江及闽西三区放手招收大量青年学生，开办数千人的学校训练干部。同时按照可能性，抽调一千至二三千老的和较老的工作干部加以训练，为准备接管广州及其他大城市之用。同时应令香港训练干部，亦可招收一批广州学生来东江训练。总之，接管全省的工作干部主要地应由你们负责准备。加强广州地下市委工作的领导，积极发展党员，准备里应外合的条件。对桂林、昆明两城的地下党组织，亦应令当地加强注意力。"},{"type":"paragraph","text":"[1]这是毛泽东在收到中共中央华南分局12日关于广东东江、韩江两边区战绩情况报告后，为中共中央起草的复华南分局并告华中局、香港工委电"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":6,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":501,"page_end":501},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7fad47e94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
