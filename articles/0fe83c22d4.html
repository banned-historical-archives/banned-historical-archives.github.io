" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"四平防御战不能成为一般作战方针","alias":"","parts":[{"type":"paragraph","text":"四平防御战不能成为一般作战方针！"},{"type":"paragraph","text":"（1946年5月27日）"},{"type":"paragraph","text":"东北四平街?之所以能久守，主要是因敌未料我军有防线，故逐次增兵，便于为我各个击破，使敌遭受我军重大打击。故四平防御战为一时特殊条件所致，不能成为我一般的作战方针。目前，我力守大城市则许多中、小城市将被丢掉，许多运动战各个击破敌人的机会不能利用，敌如继续增兵对我守军进行包围攻击，则我必然仍要放弃大城市。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致各战略区电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":350,"page_end":350},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fe83c22d4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
