rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总结反对资产阶级思想腐蚀的斗争经验进一步提高执行党的基本路线的自觉","authors":[],"parts":[{"type":"paragraph","text":"这个团在一个海防城镇担任执勤任务，这里的阶级斗争比较尖锐。多年来，由于他们注意以党的基本路线作指导，狠抓意识形态领域里的阶级斗争，指战员们自觉抵制资产阶级思想的腐蚀和影响，受到了上级的表扬和人民群众的称赞。二月九日《人民日报》发表社论传达了毛主席关于理论问题的重要指示以后，这个团的党委立即组织各级领导干部认真学习，引导大家紧紧围绕着无产阶级为什么必须对资产阶级实行专政这个问题，认真学习《哥达纲领批判》、《国家与革命》、《关于正确处理人民内部矛盾的问题》等著作中的有关章节，联系实际，热烈展开讨论。大家体会到，毛主席这一指示对于进一步理解和贯彻执行党的基本路线，搞好反修防修斗争，具有重大的现实意义和深远的历史意义。团党委成员在学习以后，分头深入到分散执勤的连队宣讲毛主席的重要指示，和干部战士一起学习无产阶级专政理论。"},{"type":"paragraph","text":"团党委成员和干部战士在讨论无产阶级专政的历史任务时，总结了几年来同资产阶级腐蚀和影响作斗争的经验。他们回顾了在复杂的阶级斗争中抵制资产阶级腐蚀和影响的战斗经历，深深感到努力学好无产阶级专政理论，坚持党的基本路线教育，是一条最重要的经验。许多连队干部说，马克思主义、列宁主义、毛泽东思想关于无产阶级专政的理论，是我们战胜资产阶级腐蚀和影响的最强大的思想武器，也是改造我们自己世界观最有力的武器。这个团的一连，为了抵制资产阶级思想的腐蚀，党支部带领干部战士认真看书学习，坚持党的基本路线教育，开展向“南京路上好八连”学习的活动，使干部战士心明眼亮，一次又一次打退了资产阶级“糖衣炮弹”的进攻。指战员们从自己的斗争经历中体会到，只有用无产阶级专政的理论武装自己的头脑，牢记党的基本路线，才能看清阶级斗争的动向，保持高度的阶级警惕。"},{"type":"paragraph","text":"目前，这个团党委为了更好地带领部队学好毛主席的重要指示，学好无产阶级专政理论，正在举办理论骨干学习班；党委成员还深入部队进行调查研究，帮助连队总结和推广同资产阶级腐蚀和影响作斗争的经验，推动全团的学习活动深入开展。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b52886648f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
