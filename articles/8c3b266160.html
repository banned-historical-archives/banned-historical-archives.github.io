战斗友谊的讲话　黄永胜、李先念、叶剑英、李作鹏、郭沫若同志等出席了宴会","authors":[],"dates":[{"year":1969,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京八日电　中共中央政治周常委、国务院总理周恩来，今天晚上在人民大会堂宴会厅举行宴会，热烈欢迎越南南方民族解放阵线中央委员会主席团主席、越南南方共和临时革命政府顾问委员会主席阮友寿，以及由他率领的越南南方民族解放阵线和越南南方共和临时革命政府代表团，对我国进行友好访问。"},{"type":"paragraph","text":"中共中央政治局委员、中国人民解放军总参谋长黄永胜，中共中央政治局委员、国务院副总理李先念，中共中央政治局委员、中央军委副主席叶剑英，中共中央政治局委员、中国人民解放军副总参谋长李作鹏，中共中央委员、人大常委会副委员长郭沫若等，出席了宴会。"},{"type":"paragraph","text":"宴会上洋溢着中越两国人民的战斗友谊和革命团结的气氛。宴会大厅正中，并排挂着中国国旗和越南南方共和正式旗帜。晚七时许，阮友寿主席，和代表团团员、越南南方民族解放阵线中央委员会主席团副主席、西原民族自治运动主席、越南南方共和临时革命政府顾问委员会委员伊比·阿列奥，以及代表团其他成员，由周恩来总理等陪同，来到宴会大厅。这时，乐队奏欢迎曲。"},{"type":"paragraph","text":"周恩来总理和阮友寿主席在宴会上发表了热情的充满战斗友谊的讲话(讲话全文另发)。"},{"type":"paragraph","text":"周恩来总理在讲话中热烈祝贺越南南方军民抗美救国战争的伟大胜利。他说，中国政府一贯认为，美帝国主义派兵侵略越南，是越南问题的症结所在。只有美国侵略军和它的仆从军全部无条件地撤出越南南方，由越南南方人民在没有任何外来干涉的情况下处理自己的问题，才是真正解决越南问题的唯一正确道路。"},{"type":"paragraph","text":"周总理强调说，中国人民遵循毛主席的教导，一贯把支援越南人民的抗美救国战争当作自己应尽的国际主义义务。在越南人民进行的这场伟大的抗美救国战争中，中国人民有责任、有义务给予全力的支援，同越南人民团结在一起，战斗在一起，胜利在一起。"},{"type":"paragraph","text":"阮友寿主席在讲话中介绍了越南南方军民抗美救国战争的辉煌胜利，强烈谴责美国尼克松政府仍然极力拖延和强化战争，继续对越南南方人民犯下更多的野蛮罪行。他说，我们越南南方人民和全体越南人民一样十分热爱和平，但必须是真正独立、自由的和平。只要美帝国主义还顽固地拖延和强化侵略越南南方的战争，越南南方人民就决心坚持加强抗战，决战决胜，坚决把美军打得全部撤走，把伪军和伪政权打得彻底垮台，解放南方、保卫北方、进而和平统一祖国。阮友寿主席结束讲话时，把一面写着“热烈庆祝伟大的中华人民共和国建国二十周年”的锦旗赠给中华人民共和国政府，由周恩来总理代表接受。"},{"type":"paragraph","text":"周恩来总理和阮友寿主席讲话以后，乐队高奏越南南方共和正式歌曲和中国国歌。"},{"type":"paragraph","text":"应邀出席的有:越南南方民族解放阵线和越南南方共和临时革命政府代表团团员、越南南方共和临时革命政府驻中国大使阮文广和大使馆成员。"},{"type":"paragraph","text":"越南民主共和国驻中国大使吴明鸾和大使馆成员，正在北京的越南民主共和国政府交通运输部长潘仲慧，对外贸易部副部长李班，以及在京的其他越南同志，也应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会的，还有政府部门、中国人民解放军、北京市革命委员会和其他各方面的负责同志温玉成、王宏坤、李强、吴德、张天云、曹里怀、方毅、韩念龙、韩立业、陈德和、郭超、陈宏、胡奇才、彭海贵、黎东汉、裴宗澄、肖文玖、曾绍东、苑化冰、王霄汉、王波、钟羽一、张文敏、申健、杨玉衡、柳春发、丁国钰、丁西林等。"},{"type":"paragraph","text":"各国驻中国使节应邀出席宴会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李作鹏","type":"人物"},{"name":"李先念","type":"人物"},{"name":"黄永胜","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c3b266160"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
