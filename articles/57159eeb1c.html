ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"东北目前仍应将乡村及中小城市工作放在首位","alias":"","parts":[{"type":"paragraph","text":"东北目前仍应将乡村及中小城市工作放在首位"},{"type":"paragraph","text":"（1946年5月19日）东北局，北满分局："},{"type":"paragraph","text":"我们虽已得了长、哈两个大城市，但乡村及中小城市工作仍是第一位，切不可将大批干部堆积在长、哈两市。应令各县加紧练兵、剿匪及解决土地问题，今年务必将土地问题全部或大部解决完毕。土地问题解决，兵也有了，匪也容易剿了，大城市也巩固了。为此目的，应从南满、东满群众工作比较深入各县抽出一批干部，调到北满各县做群众工作。长哈路两侧十余县的群众工作，十分重要。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"辰皓[1]北满，指哈尔滨、牡丹江、北安、佳木斯、齐齐哈尔等地区。[2]长，指吉林长春。哈，指黑龙江哈尔滨。[3]东满，指中长路沈阳至长春路以东的吉林、西安（今东辽)、安图、1946年，毛泽东在延安。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":332,"page_end":333},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"东北目前仍应将乡村及中小城市工作放在首位","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":5,"day":19}],"parts":[{"text":"东北目前仍应将乡村及中小城市工作放在首位","type":"title"},{"type":"appellation","text":"东北局，北满分局："},{"type":"paragraph","text":"我们虽已得了长、哈两个大城市，但乡村及中小城市工作仍是第一位，切不可将大批干部堆积在长、哈两市。应令各县加紧练兵、剿匪及解决土地问题，今年务必将土地问题全部或大部解决完毕。土地问题解决，兵也有了，匪也容易剿了，大城市也巩固了。为此目的，应从南满、东满群众工作比较深入各县抽出一批干部，调到北满各县做群众工作。长哈路两侧十余县的群众工作，十分重要。"},{"type":"paragraph","text":"中 央"},{"type":"paragraph","text":"辰皓"}],"comment_pivots":[{"part_idx":1,"offset":6,"index":1},{"part_idx":2,"offset":9,"index":2},{"part_idx":2,"offset":125,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["北满，指哈尔滨、牡丹江、北安、佳木斯、齐齐哈尔等地区。","长，指吉林长春。哈，指黑龙江哈尔滨。","南满，见本卷第111页注〔4〕。东满，指中长路沈阳至长春路以东的吉林、西安（今东辽）、安图、延吉、敦化等地区。"],"page_start":133,"page_end":133,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5715
