art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决同走资派斗到底","authors":["海军某部线路维护站"],"parts":[{"type":"paragraph","text":"《文化大革命永放光芒》一文传达了毛主席的重要指示：“不斗争就不能进步。”“八亿人口，不斗行吗？！”毛主席的话，是千真万确的真理，它将永远鼓舞着我们在批判走资派的斗争中战斗前进。"},{"type":"paragraph","text":"我们这个线路维护站，只有三名战士。几年来，战士换了四茬，班长换了三任。可是，我们发扬了红卫兵的革命造反精神，在阶级斗争的风浪中，批判资产阶级的劲头越来越大。我们的代表出席了四届人大，我们站荣立了两次集体三等功。革命斗争的实践，使我们深切体会到，不斗争就不能进步，不斗争就没有胜利。"},{"type":"paragraph","text":"几年来，我们在《通知》的指引下，和党内走资派进行了坚决斗争。去年夏季，党内最大的不肯改悔的走资派邓小平大刮右倾翻案风，制造了五花八门的奇谈怪论，向无产阶级进攻。这时，我们三个战友认真学习了毛主席关于无产阶级文化大革命的一系列指示，决心以热情支持社会主义新生事物的实际行动，回击这股妖风。走资派说“今不如昔”，我们就热情歌颂文化大革命带来的大好形势；走资派说教育革命“搞糟了”，我们就主动当一所学校的辅导员，热情支持，学校的教育革命；走资派说，革命样板戏是“一花独放”，我们三个人就在偏僻的山村学唱样板戏，普及样板戏。"},{"type":"paragraph","text":"我们还联系社会上活生生的阶级斗争现实，批判邓小平搞翻案复辟的反动罪行，更清楚地认识到邓小平就是党内外新老资产阶级的总代表、总后台。我们决心认真学习毛主席的一系列重要指示，牢牢掌握斗争大方向，深入批判邓小平，狠狠反击右倾翻案风，坚决同党内的走资派斗争到底！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df9de746fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
