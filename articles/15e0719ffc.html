art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"迎接“五四”","authors":["伍一齐薛国梁张义贤沈坚浩陈奋邱振国欧阳明"],"parts":[{"type":"paragraph","text":"优秀团员报告先进事迹"},{"type":"paragraph","text":"吉林驻军某部最近召开共青团员大会，由优秀团员报告先进事迹。在会上作报告的有：活学活用毛主席著作的五好战士邓小平，艰苦奋斗、以连为家、被军区立为五好战士标兵的炊事员贾继侃，刻苦钻研军事技术、大胆革新训练器材的计算兵胡志纯，带领全班由一对红到对对红的班长武玉山，使各行各业都有好样板。大家反映报告具体生动，好榜样看得见，学得到，决心赶上并超过他们。 （伍一齐、薛国梁）"},{"type":"paragraph","text":"树立标兵推动帮学活动"},{"type":"paragraph","text":"空军某部二连团支部，最近树立了团员、五好战士乔维山和非团员、新战士易恩强为一对红标兵。他俩结成“一对红”以来，一起读毛主席著作，一起练技术，思想上互相关怀，行动上彼此促进，月月记了五好。大家以乔维山和易恩强为榜样，自愿结对，热情互帮，用积极开展“一对红”的实际行动迎接“五四”青年节。 （张义贤）"},{"type":"paragraph","text":"老红军讲传统"},{"type":"paragraph","text":"最近，江苏省江宁县公安队团支部举行了两次报告会，邀请正在队里蹲点的老红军干部、总队长曾万林讲传统故事。曾万林同志一次讲的是二万五千里长征中的战斗生活，另一次讲的是抗日战争时期日寇扫荡和八路军反扫荡的情况。他用亲身经历和感人的事实，描述了革命前辈的战斗精神和革命风格，使大家受到了深刻的传统教育。 （沈坚浩）"},{"type":"paragraph","text":"人人练硬功"},{"type":"paragraph","text":"山东驻军某部通信连全体团员和青年，在团支部“迎接红五月，干劲加钻劲，人人练硬功，看谁功夫硬”的号召下，个个行动起来。有线排同志苦练万米收放线，单手接线头；通信排同志苦练夜间按方位角找寻指挥所，誓做“夜明眼”、“铁脚板”的通信员。在练功中，团员主动与非团员同志结对，互相学习，共同提高。青年战士赵培功在团员周道临的帮助下，收放线的基本功已有明显进步。（陈奋）"},{"type":"paragraph","text":"唱革命歌 演革命戏"},{"type":"paragraph","text":"福建前线某部三炮连团支部，最近组织团员和青年大唱革命歌曲。他们已学会了《共青团员之歌》、《我们是革命青年》等歌曲，并排演了小演唱《五好战士真荣光》、快板群《毛主席著作闪金光》、朗诵《红岩》片断、相声《练兵迷》等节目。还组织了拔河和球类、棋类的对抗赛。 （邱振国、欧阳明）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15e0719ffc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
