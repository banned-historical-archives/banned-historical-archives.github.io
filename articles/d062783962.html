ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"关于胡志明去莫斯科和致苏共十九大贺电致刘少奇电","alias":"","parts":[{"type":"paragraph","text":"关于胡志明“去莫斯科和致苏共十九大贺电?致刘少奇电"},{"type":"paragraph","text":"（1952年10月4日）刘少奇同志："},{"type":"paragraph","text":"十月三日来电收到。（一）联共同意胡志明同志秘密去莫斯科，现已定六日乘专机起飞，八日可到莫；（二）同意对贺电的修改文字，惟“个别国家”宜改为“各个国家”。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十月四日[1]胡志明，当时任越南劳动党中央委员会主席。"},{"type":"paragraph","text":"[2]原拟的毛泽东致苏共第十九次代表大会的贺电，后来改为中共中央致苏共第十九次代表大会的祝词，由刘少奇在大会上宣读。"},{"type":"paragraph","text":"[3]刘少奇在1952年10月3日给中共中央的电报中，建议对毛泽东致苏共第十九次代表大会的贺电稿作几处文字修改，其中一处是在“正确地运用马克思、恩格斯、列宁、斯大林的学说”前面，加上“根据个别国家的具体情况”几个字。毛泽东在刘少奇给中共中央的电报上写了以下批语：“请陆定一同志照此修改，于塔斯社发表大会开幕消息的同时，发表这个贺电。此外，人民日报宜写社论一篇。”"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":10,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":280,"page_end":280},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d062783962"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
