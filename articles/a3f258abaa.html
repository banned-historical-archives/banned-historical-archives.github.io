art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用新的战斗保卫文化大革命的胜利成果福州部队某团一大批红卫兵入伍的指战员发扬当年的革命造反精神，深入批判邓小平的反动罪行","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 人民解放军福州部队某团一大批红卫兵入伍的干部和战士，在反击右倾翻案风的斗争中，发扬当年红卫兵小将的革命造反精神，一手握枪，一手拿笔，深揭猛批邓小平的反动罪行，用新的战斗保卫无产阶级文化大革命的胜利成果。"},{"type":"paragraph","text":"这些在文化大革命中大造走资派的反的勇敢的红卫兵小将，是近几年陆续应征入伍的。他们在部队各级党组织的领导下，刻苦攻读马列著作和毛主席著作，时刻不忘阶级斗争，朝气蓬勃地为保卫无产阶级文化大革命的胜利成果勇敢战斗，在批林批孔、评论《水浒》和学习无产阶级专政理论运动中，充分发挥了骨干作用。全团三百多名理论骨干中，他们就占二百一十多名。反击右倾翻案风的斗争开始后，他们一直斗志昂扬地站在斗争的前列。他们热烈欢呼党中央的两项英明决议，回顾当年在天安门广场接受伟大领袖毛主席检阅的幸福情景，激动得热泪盈眶。许多人遥望天安门，心想毛主席，写下誓把批邓和反击右倾翻案风的斗争进行到底的战斗诗篇。"},{"type":"paragraph","text":"为了把批邓和反击右倾翻案风的斗争不断引向深入，许多红卫兵入伍的战士都把学习毛主席的重要指示放在首位，用学习带动批判，用批判促进学习。四连指导员鲍泽甫，当红卫兵时就是一个努力学习，勇于同修正主义对着干的小闯将。今天，在批邓的战斗中，他更加努力学习，努力作战。中共中央的两项决议发表后，他连续用了五个晚上的时间，反复学习毛主席的重要指示，联系现实阶级斗争和天安门广场的反革命政治事件，进行专题研究。同时，他还和理论骨干一起，列举邓小平重新工作以后，旧病复发，翻案复辟，向党向社会主义猖狂进攻的大量事例进行剖析，进一步看清了邓小平是党内外资产阶级的总代表，是这次反革命政治事件的罪魁祸首。他们写出了揭露邓小平反动本质的批判文章，给大家启发很大。在“三支”“两军”工作中荣立集体三等功的一连八班，有三名战士是当年的红卫兵。这些天来，他们认真学习毛主席重要指示，联系邓小平的反动罪行和一小撮阶级敌人制造反革命的政治谣言的罪行，认识到资产阶级，特别是党内走资本主义道路的当权派，为了颠覆无产阶级专政，总是要拚命制造反革命舆论，决心用革命舆论压倒和战胜反革命舆论，带头掀起了大揭大批的新高潮。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3f258abaa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
