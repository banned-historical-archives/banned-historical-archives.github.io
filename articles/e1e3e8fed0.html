"群桑"],"dates":[{"year":1985,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西藏山南地区藏族群众把“文革”中散失的大批珍贵文物归还国家"},{"type":"paragraph","text":"新华社拉萨六月十三日电　（记者群桑）西藏山南地区藏族群众把“文革”中失散的四千多件经书、唐嘎（藏画）、各类佛像和古瓷器等珍贵文物归还给国家和寺庙。"},{"type":"paragraph","text":"位于雅鲁藏布江中游的山南地区是藏族文化的发祥地，过去这里的寺庙保存着大量文物。十年动乱期间，一些寺庙遭到破坏，庙里的文物也流散到社会上去了。一九八○年党中央对西藏工作作出重要指示后，山南地委和行署认真贯彻落实党的宗教政策，先后修复了四十三座寺庙，还有四十多座寺庙恢复了正常宗教活动。群众相信了党的宗教政策，纷纷献出了保存下来的流失文物。经文物管理部门初步鉴定，这些归还的文物中，有七件属于国家一级文物，三十件属于国家二级文物。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1e3e8fed0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
