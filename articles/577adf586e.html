script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伊朗首相胡韦达发表讲话  谴责西方工业国剥削压榨原料生产国  驳斥西方国家把经济困难的责任推到石油涨价上的谬论","authors":[],"dates":[{"year":1974,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伊朗首相胡韦达发表讲话"},{"type":"paragraph","text":"谴责西方工业国剥削压榨原料生产国"},{"type":"paragraph","text":"驳斥西方国家把经济困难的责任推到石油涨价上的谬论"},{"type":"paragraph","text":"新华社波恩一九七四年三月八日电　正在这里访问的伊朗王国首相胡韦达六日发表讲话，谴责西方工业国长期以来一直通过不平等贸易剥削和压榨原料生产国。胡韦达首相是在三月六日到达波恩进行访问的。他在西德总理勃兰特为他举行的一次宴会上指出，自第二次世界大战结束以来，世界贸易“在将近三十年中，主要是以一种有利于工业国、而不利于原料生产国的经常不平衡”为标志的。他接着举例说，“一九四七年伊朗石油的价格是每桶二点一七美元。一九六○年——即在十三年之后——跌到每桶一点七九美元，并且在整个六十年代一直保持着同样的低价；而在此期间，伊朗同其他发展中国家一样不得不按不断上涨的价格进口它所需要的制成品”。他说：“一小撮工业国家在将近四分之一世纪的长时间里得以把廉价石油作为推动其经济的日益迅速增长的主要动力，而发展中国家却不得不为其进口付出越来越昂贵的代价”。"},{"type":"paragraph","text":"胡韦达在讲话中对有人指责石油生产国“抬高”石油价格的说法进行了驳斥。他说，“事实上，廉价石油只不过使工业国同发展中国家之间、富国同穷国之间的鸿沟更为加深了”。他指出，最近石油输出国组织会议上一致决定的石油新价格是“更现实和更合理的”。"},{"type":"paragraph","text":"新华社巴黎一九七四年三月九日电　据法国《十字架报》三月九日报道，伊朗首相胡韦达在接见这家报纸的特派记者时说，西方国家“把经济上遇到困难的责任推到石油价格上是不合理的”。"},{"type":"paragraph","text":"他指出，美国、欧洲和日本早就存在着通货膨胀。他说：“在石油价格上涨之前，你们已遇到了困难，而这些困难是同你们的经济连结在一起的。”他在谈到伊朗的石油政策时强调说，“伊朗的整个石油生产从今以后置于伊朗的控制之下”；“现在伊朗的政策规定自己在国际市场上销售原油或经过提炼的石油”。"},{"type":"paragraph","text":"胡韦达首相在列举了世界上钢铁、小麦等产品的价格大幅度上涨后重申，石油价格不会下降。他说：“如果你们希望石油价格下降，那么你们的产品价格也要下降……我不认为物价立即会自然下降。对你们经济作出的分析事实上表明，你们没有能够刹住通货膨胀。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"577adf586e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
