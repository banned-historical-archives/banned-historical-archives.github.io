民在文化大革命期间在文艺方面取得的伟大成就","authors":[],"dates":[{"year":1969,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国现代陶瓷器展览会在奥斯陆闭幕"},{"type":"paragraph","text":"挪威观众热情赞扬和高度评价我展览会"},{"type":"paragraph","text":"盛赞中国人民在文化大革命期间在文艺方面取得的伟大成就"},{"type":"paragraph","text":"新华社十一日讯　奥斯陆消息：中国驻挪威大使馆和挪中友好协会联合举办的中国现代陶瓷器展览会，已于九日在奥斯陆闭幕。展览会在两个星期的展出中，获得了挪威观众的热情赞扬。"},{"type":"paragraph","text":"这个展览会展出了一百六十多组和单项的陶瓷艺术品。这些展品体现了中国人民对伟大领袖毛主席的无限热爱和对中国无产阶级文化大革命的热情歌颂。许多挪威观众高度评价这次展出，特别是“收租院”这一组展品，给观众留下了深刻的印象。一些进步青年说：“这组艺术创作给人民上了一堂十分好的阶级斗争教育课。”"},{"type":"paragraph","text":"观众们在参观展览会后纷纷指出：这是一个以毛泽东思想为指导思想而举办的革命艺术展览会。这次展览通过精彩的艺术品，充分表明中国人民在无产阶级文化大革命期间在文艺方面所取得的伟大成就。他们说：展览会很有教育意义，因为它指出了文化艺术为工农兵服务的方向。一位观众在留言簿中写道：“艺术应为劳动人民服务。毛主席的革命文艺路线万岁！”有的赞扬说：“这是革命的好艺术，是战无不胜的毛泽东思想的一个新的伟大胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"438d20b34f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
