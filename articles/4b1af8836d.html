ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"祝加香八十寿辰的贺电","alias":"","parts":[{"type":"paragraph","text":"祝加香八十寿辰的贺电\""},{"type":"paragraph","text":"（1949年9月15日）亲爱的马赛·加香同志和法国共产党中央委员会亲爱的同志们："},{"type":"paragraph","text":"我们中国共产党中央委员会热烈地庆祝加香同志的八十大寿。"},{"type":"paragraph","text":"加香同志是十九世纪末叶以来的法国革命工人运动和法国人民爱国民主运动的活的象征。加香同志对于无产阶级国际主义的忠诚，对于法苏人民的友谊的忠诚，对于中国人民和其他被压迫民族解放运动的热烈同情，不但是法国工人阶级的骄傲，而且是国际工人阶级的共同的骄傲。"},{"type":"paragraph","text":"祝加香同志健康！向加香同志和以多列士同志为首的法国共产党中央致兄弟的敬意！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"一九四九年九月十五日"},{"type":"paragraph","text":"[1]中国共产党中央委员会主席毛泽东9月15日致电祝贺法国共产党中央政治局委员、《人道报》总编辑加香80岁寿辰。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":241,"page_end":241},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b1af8836d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
