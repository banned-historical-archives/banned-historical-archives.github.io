ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对《一个美国农场主对苏联农业问题的看法》的批语","alias":"","parts":[{"type":"paragraph","text":"对《一个美国农场主对苏联农业"},{"type":"paragraph","text":"问题的看法》的批语"},{"type":"paragraph","text":"（1962年8月2日）尚昆同志："},{"type":"paragraph","text":"此件请印发各同志"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二日[1]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"},{"type":"paragraph","text":"[2]指《一个美国农场主对苏联农业问题的看法》一文。该文介绍了《美国新闻与世界报道》杂志1962年4月2日这一期刊载的该杂志记者对衣阿华州农场主加斯特的访问记。加斯特曾访问苏联3次。1959年赫鲁晓夫在美国访问过他的农场。访问记说，据加斯特看来，苏联农业方面最根本的问题是，他们直到1955年才开始对农业进行大量投资。1955年的苏联农业大致相当于美国农业1930年达到的水平。赫鲁晓夫的真正问题是对现代农业所需要的资金数量估计得过低。另一个根本问题是，苏联没有美国这样的运输网。苏联有了适当的投资，就能够以与美国同样的百分比提高农业产量，并且在1970年能够把农业需要的劳动力从自前的40%或50%降低到25%甚至20%。但在大面积单位面积产量上，苏联总也赶不上美国，因为苏联的耕作季节太短，气候太干燥。赫鲁晓夫应该冷却军备竞赛，把更多的资金投入农业。"},{"type":"paragraph","text":"[3]指当时正在北戴河参加中共中央工作会议的同志。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":8,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":188,"page_end":188},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4f8f042fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
