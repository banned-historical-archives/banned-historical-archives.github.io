dates":[{"year":1979,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一月九日电　我国一九七八年度共录取了一万零五百多名研究生。这个数字已接近文化大革命前十七年培养研究生的总和。"},{"type":"paragraph","text":"去年全国有六万五千多人报考研究生。经过初试和复试，二百一十所高等院校录取了八千零六名研究生；另有一百六十二个研究机构录取了二千五百多名。被录取的研究生绝大部分是在职人员，还有三名港澳青年。"},{"type":"paragraph","text":"去年录取的研究生考试成绩比较好。复试平均成绩七十分以上的，在中国科学院录取的一千三百多名研究生中占百分之六十五，在中国社会科学院录取的四百多名研究生中占百分之八十八多，在教育部直属高等院校录取的三千二百多名研究生中占百分之七十以上。去年还破格录取了一些经过自学达到较高水平的考生。"},{"type":"paragraph","text":"北京、上海、湖北等省、市的招生部门以及不少高等院校的负责干部，对招收研究生工作都抓得认真、细致。一些著名的科学家、教授，如童第周、华罗庚、吕叔湘、尹达、吴作人、周培源、苏步青、唐敖庆、高景德等，都招收了研究生。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57fd09e0ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
