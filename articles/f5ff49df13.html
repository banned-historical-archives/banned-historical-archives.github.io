<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“和平和社会主义问题”杂志载文  批判鲁卡奇修正主义的哲学观点","authors":[],"dates":[{"year":1959,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“和平和社会主义问题”杂志载文"},{"type":"paragraph","text":"批判鲁卡奇修正主义的哲学观点"},{"type":"paragraph","text":"在“和平和社会主义问题”杂志第六期上，载有贝拉·佛加腊施写的一篇批判鲁卡奇哲学观点的文章，文章说：鲁卡奇在社会和文学方面的活动范围很广，包括政治学、哲学、美学和文艺学。鲁卡奇的政治思想和哲学观点紧密地交织在一起。"},{"type":"paragraph","text":"二十年来鲁卡奇发表过以下的一些重要著作：（一）“青年黑格尔和资本主义社会问题”；（二）“资产阶级哲学的危机”；（三）“理性的毁灭”。"},{"type":"paragraph","text":"关于“青年黑格尔”这篇历史专题论文，我们不否认它有若干积极方面，但是它有许多严重的错误。这些错误的实质就是，鲁卡奇把黑格尔的哲学观点过分理想化了。虽然在青年黑格尔的著作中保守的成份没有像他在后期那样明显，但保守的倾向在黑格尔的哲学中始终都是存在的。"},{"type":"paragraph","text":"鲁卡奇认为，按照黑格尔的说法，“人只有在自己劳动的基础上才成为人”，但同时他却忽视了黑格尔把各种劳动都归结为抽象的精神劳动。鲁卡奇硬说，根据黑格尔的说法，在劳动的过程中“人对自然规律的认识越来越深刻，人迫使自然为自己服务”，但这里他又疏忽了黑格尔对认识过程所作的纯粹唯心主义的解释。"},{"type":"paragraph","text":"在1948年发表的演说论文集“资产阶级哲学的危机”里，鲁卡奇认为，这种危机在于帝国主义哲学力图贬低和诋毁理性。文集作者的主要思想就是资产阶级哲学愈来愈变成了非理性主义的哲学，而非理性主义就是法西斯主义思想最典型的表现。"},{"type":"paragraph","text":"但是，非理性主义如果不同唯心主义问题联系起来考察，那它就决不会是哲学上的主要问题。鲁卡奇一般地用关于认识方法的问题（不论它们的基础是唯物主义的或是唯心主义的）去代替关于物质是第一性或意识是第一性的哲学问题。"},{"type":"paragraph","text":"在“理性的毁灭”里作者说：“拥护理性或是反对理性同时决定着哲学的哲学本质和它在社会发展中的作用。”但是哲学的阶级内容绝不仅仅以拥护理性或反对理性为限。冲突本身——拥护理性或反对理性——只有在正确地提出关于唯物主义和唯心主义之间的斗争问题的基础上，才可能得到正确的认识；鲁卡奇有时也承认这种从属关系，但认为这没有决定性的意义。"},{"type":"paragraph","text":"鲁卡奇认为和平运动的主要任务是动员知识界为了理性起来反对非理性主义的哲学，他认为这种哲学是法西斯主义世界观和帝国主义侵略的基础。这样提问题、这样的纲领是颠倒了社会存在和社会意识的关系，颠倒了基础和上层建筑的关系。"},{"type":"paragraph","text":"马克思有一句名言：理论一旦掌握群众就变成物质力量。但是，马克思指的是科学社会主义的理论，而不是鲁卡奇所说的含糊不清的理性。鲁卡奇运用“理性”范畴不仅在形式上而且在精神实质上都酷似黑格尔唯心主义。列宁曾经评论鲁卡奇文章的主要错误在于：“这篇文章中的马克思主义纯粹是口头上的”。"},{"type":"paragraph","text":"十分明显，鲁卡奇在“理性的毁灭”一书里实际上是在维护理性的借口下，详尽地发挥了他过去在“资产阶级哲学危机”一书中所阐述的那种"},{"type":"paragraph","text":"“思想共存”的观点。正是从这种观点出发，鲁卡奇才在1956年10月发表了反社会主义的实际政治行动纲领，这种行动使他同修正主义叛徒结成了联盟。1958年鲁卡奇在西德出版的"},{"type":"paragraph","text":"“反对误解现实主义”这本书证明，鲁卡奇在美学、文学以及国际政治问题方面仍然完全保留着自己的修正主义观点。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5ff49df13"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
