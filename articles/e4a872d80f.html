art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"当一辈子毛泽东思想的“红卫兵”","authors":["副指导员王道明"],"parts":[{"type":"paragraph","text":"听到我们伟大的领袖、伟大的统帅、伟大的舵手毛主席同百万革命群众一起，参加首都庆祝无产阶级文化大革命大会的消息，我高兴得心都要跳出来了。我感到身穿军装的毛主席就在我的眼前，我恨不得一下飞到毛主席身边，千呼万呼“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"敬爱的毛主席检阅浩浩荡荡的庆祝无产阶级文化大革命的游行队伍时说：“这个运动规模很大，确实把群众发动起来了，对全国人民的思想革命化有很大的意义。”这是我们伟大领袖对无产阶级文化大革命的高度评价，是对我们的最新指示。毛主席提出的无产阶级文化大革命，是共产主义运动中的伟大创举，是社会主义革命的伟大创举。这个伟大创举是对帝国主义、现代修正主义和一切反动派的沉重打击，是对中国人民和世界革命人民的巨大鼓舞。我们最高统帅的话就是最高指示。我们革命群众，有了毛主席指示，就方向最明，脑子最灵，眼睛最亮，胆子最壮，我们就敢闯，敢干，敢革命。我们一定按照毛主席的指示，坚决把无产阶级文化大革命进行到底，把一切资产阶级堡垒统统炸毁，把一切牛鬼蛇神统统扫净。"},{"type":"paragraph","text":"林彪同志几年来不断号召我们，要把毛泽东思想真正学到手，在一切革命工作中都要突出毛泽东思想，坚决走非常无产阶级化、非常战斗化的道路。今天，又号召全党全国都要活学活用毛主席著作。我坚决响应林彪同志的号召，在无产阶级文化大革命中，大立毛泽东思想，用毛泽东思想占领一切思想阵地，打碎旧世界，建立新世界。不论遇到什么样的风浪险阻，都要高举毛泽东思想伟大红旗，都要活学活用毛主席著作，敢闯前人没有经过的风浪，敢斗前人没有斗过的敌人，敢走前人没有走过的道路，敢攀前人没有攀过的高峰，敢当前所未有的闯将，干一辈子革命，当一辈子毛泽东思想的“红卫兵”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4a872d80f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
