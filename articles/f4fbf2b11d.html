<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉车向前　革命到底——读鲁迅杂文《趋时和复古》","authors":["黄生和"],"dates":[{"year":1976,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拉车向前　革命到底"},{"type":"paragraph","text":"——读鲁迅杂文《趋时和复古》"},{"type":"paragraph","text":"解放军某部　黄生和"},{"type":"paragraph","text":"鲁迅在《趋时和复古》一文中指出：章太炎、刘半农这些人“原是拉车前进的”，但到后来，却“拉车屁股向后”，开历史倒车。其原因就是，当革命已经爆发、闹得热火朝天的时候，什么人都来参加革命，有的是由于单纯的狂热，有的是为了赶时髦，有的甚至是为了贪图禄位，在这个时候做一个革命家是不难的。党内最大的不肯改悔的走资派邓小平就是这样一个为了“赶时髦”而跑到革命队伍里来的资产阶级民主派。他参加革命队伍的“终极目的”，与无产阶级的革命目标“是极为歧异的”。因此，民主革命胜利后，工人、贫下中农要继续前进，而邓小平为了保护资产阶级的利益，每当革命向前推进一步，他都如丧考妣，千方百计地妄图使历史车轮倒退回来。在拉车向前还是拉车屁股向后的斗争中，充当了社会主义时期党内资产阶级的头面人物。"},{"type":"paragraph","text":"邓小平垮台了，但他所代表的那个阶级还存在，还会有开倒车的人同无产阶级进行较量。我们要牢记毛主席的教导，将革命进行到底，把社会主义革命的车一直拉到共产主义。"},{"type":"paragraph","text":"要拉车向前，首先要认清社会主义革命的性质、对象、任务和前途。要始终坚持阶级斗争这个纲。民主主义革命时期有章太炎、刘半农一类落荒退伍，社会主义革命时期又有邓小平一类资产阶级民主派变成党内走资派，这都不是孤立的现象，而是阶级斗争的产物。社会主义革命是一场同私有制彻底决裂的大革命。它不仅要推翻资本家阶级，而且要逐步铲除资产阶级赖以存在和产生的土壤和条件，彻底消灭资产阶级、消灭阶级和阶级差别。随着社会主义革命的深入，社会上的资产阶级名声已经很臭。作为反动没落的资产阶级政治代表的党内走资派，就成了资产阶级同无产阶级进行较量的主要力量。拉社会主义的车，必须以阶级斗争为纲，同走资派作斗争。这种斗争是长期的，它将贯串于整个社会主义历史时期。但我们坚信，“资产阶级的灭亡和无产阶级的胜利是同样不可避免的。”（马克思恩格斯：《共产党宣言》，《马克思恩格斯选集》第1卷第263页）刘少奇跳出来，没有推倒昆仑山。林彪搞政变，没有把庐山炸平。邓小平翻案复辟，也无法“扭”转革命的车轮。我们正是在同资产阶级和修正主义的斗争中，推动了历史的车轮飞速向前，迎来了共产主义的辉煌曙光！"},{"type":"paragraph","text":"拉车向前，必须紧紧依靠人民群众。鲁迅曾深刻指出：“太炎先生虽先前也以革命家现身，后来却退居于宁静的学者，用自己所手造的和别人所帮造的墙，和时代隔绝了。”章太炎在反对封建君主制的斗争中，曾“七被追捕，三入牢狱，而革命之志，终不屈挠”；在反对袁世凯复辟帝制的战斗中，也不甘落后，冲锋在前。但资产阶级的唯心史观决定他不愿意也不可能依靠人民大众，而是把革命当作少数人的活动，因此，当无产阶级和人民大众起来革命时，他就退居书斋，直至尊孔复古，反对革命了。“既离民众，渐入颓唐”，变成了拉车屁股向后的倒退派。"},{"type":"paragraph","text":"马克思主义认为，社会主义革命是群众的事业。只有发动群众才能将革命进行到底，只有象鲁迅先生谆谆教导的那样，做大众中的一个人，永远和革命共同着命运，才能拉车向前不止步。"},{"type":"paragraph","text":"我们要学习鲁迅先生“韧性”战斗的精神，“不克厥敌，战则不止。”这样才能够拉车向前，把无产阶级专政下的继续革命进行到底！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4fbf2b11d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
