script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"解放军驻藏部队和藏族人民奋战风雪高原  “世界屋脊”遍布四通八达的公路网  藏族同胞坐上汽车唱道：“毛主席的光芒比大雪山照的更远更亮。”","authors":[],"dates":[{"year":1965,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"解放军驻藏部队和藏族人民奋战风雪高原"},{"type":"paragraph","text":"“世界屋脊”遍布四通八达的公路网"},{"type":"paragraph","text":"藏族同胞坐上汽车唱道：“毛主席的光芒比大雪山照的更远更亮。”"},{"type":"paragraph","text":"新华社拉萨十二日电　人民解放军驻西藏部队广大指战员，十五年来，和西藏人民一起在风雪高原上筑路，取得了巨大的成果。现在，西藏不但有了同祖国内地联系的三大动脉——川藏公路、青藏公路、新藏公路，而且还修起了大量公路支线，形成了以拉萨为中心的公路交通网，全区百分之九十以上的县通了汽车。"},{"type":"paragraph","text":"西藏是有名的“世界屋脊”，雪山叠叠，河水湍急，解放前，没有一条公路，藏族人民世代过着徒步、肩背的苦难生活，买点盐巴、茶叶，都得翻山越岭长途跋涉。千百年来西藏人民一直盼望道路通畅，以便交流物资，发展生产。人民解放军进藏不久，藏族人民就和解放军并肩筑路，自动地用人力、物力支援筑路部队。仅川藏公路修筑过程中，藏族人民就运送了六十多万驮东西。不少藏族人民在下雨下雪天，把自己的雨具或衣服脱下来，盖在筑路物资上，宁愿自己挨淋受冻。"},{"type":"paragraph","text":"藏族人民这种顽强筑路的精神，大大鼓舞了筑路的解放军战士。为了帮助藏族人民早日开辟幸福之路，战士们更是英勇顽强、斗志昂扬。修筑青藏、川藏公路时的部队，在“我们多吃一分苦，就给藏胞多添一分福”的革命豪情和“让高山低头，叫河水让路”的战斗口号下，常年在海拔三四千米的高山雪原上，使用铁锤、铁镐等简单的工具，以高度的劳动热情和智慧，战胜了重重困难，成倍地提高工效，使公路很快向前推进。在打通雀儿山的筑路工程中，优秀的筑路英雄、共产党员张福林，坚持在“雪线”上施工，献出了年青的生命。他领导的班被命名为“张福林班”后，也一直发扬了“山再高，没有我们的意志高；石再硬，没有我们的意志硬”的昂扬斗志，始终保持着施工先进模范班的荣誉，立了集体一等功。在征服怒江天险架桥的艰巨工程中，李文炎、崔锡明等许多“开路先锋”，在从来没有人敢走的悬崖峭壁上，探明了线路，筑路部队又踏着他们的足迹，用绳索吊在半空奋勇施工。光修筑川藏公路，部队里就有近两万人立了功，出现的施工模范单位也有几百个。"},{"type":"paragraph","text":"十五年来，人民解放军驻藏部队和西藏人民一起，就以这样的英雄气概，劈开了一座又一座奇峰峭壁的大山，战胜了一条又一条奔腾咆哮的激流，挡住了流砂，越过了冰川，填实了举步难行的泥沼，征服了茫无人烟的千里草原，在“世界屋脊”上修起了四通八达的公路网。现在，西藏不但有了同祖国内地联系的川藏、青藏、新藏三大公路干线，而且东起金沙江畔，西到阿里地区；北起藏北草原，南到喜马拉雅山麓，藏族人民可以坐上祖国的汽车了。这些公路的建成，对于发展西藏的经济、文化事业，都起到了极大的作用。藏胞坐在汽车上常爱唱这样的歌：“毛主席派来的汽车是最好的，毛主席的光芒比大雪山照的更远更亮。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7369d3dbf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
