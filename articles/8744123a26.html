art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《战地新歌》第三集出版这是在毛主席文艺路线指引下，在革命样板戏带动下，歌曲创作的又一可喜","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年四月二十九日讯 国务院文化组文艺创作领导小组选编的《战地新歌》第三集，已由人民文学出版社出版，并在全国各地新华书店陆续发行。"},{"type":"paragraph","text":"收入这本歌集的一百二十四首作品，除再次发表的红军歌曲《三大纪律八项注意》和湖南、江西革命民歌各五首外，都是近年来的新创作。这些新创作的歌曲，热情歌颂伟大领袖毛主席，歌颂伟大、光荣、正确的中国共产党，歌颂伟大的社会主义祖国；紧密配合当前的批林批孔运动，歌颂无产阶级文化大革命和社会主义新生事物，反映广大工农兵火热的斗争生活，展现社会主义到处都在胜利地前进的大好形势。这是在毛主席革命文艺路线指引下，在革命样板戏的带动下，歌曲创作的又一可喜成果。"},{"type":"paragraph","text":"《战地新歌》第三集的出版，对修正主义文艺黑线回潮是有力的回击；对繁荣歌曲创作和促进群众性歌咏运动，牢固占领歌曲阵地，将起到积极作用。"}],"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8744123a26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
