tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"识别和战胜走资派的锐利武器","authors":["王振荣"],"parts":[{"type":"paragraph","text":"八四六六四部队二连在学习新党章时，党员、战士乔双锁问道：“对于毛主席提出的‘要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计’三项基本原则，为什么给了比在十大党章中更加突出的位置呢？”党支部组织党员对这个问题进行了讨论，下面刊登的是三个同志的发言。 ——编者"},{"type":"paragraph","text":"在无产阶级专政条件下，在马列主义、毛泽东思想日益深入人心的情况下，党内走资派复辟资本主义，总是靠搞修正主义，搞分裂，搞阴谋诡计。毛主席提出的三项基本原则，科学地总结了我们党五十年来历次大的路线斗争的经验，高度概括了党内两条路线斗争的基本内容，也进一步指明了识别党内走资本主义道路当权派的根本标准。“四人帮”是党内走资派的典型代表，他们肆意反对三项基本原则，“三要”，他们半点也不要，“三不要”，他们样样都疯狂地要。全党全军全国人民，由于学习和掌握了三项基本原则，对“四人帮”搞的一套，看在眼里，恨在心头。毛主席提出的三项基本原则发表后，我们连队党支部组织党员反复进行学习，不断提高了党员的阶级斗争和路线斗争觉悟。“四人帮”搞什么党内的法家、儒家，胡说党内“有一个资产阶级”，许多党员提出了疑问。这个事实充分说明，三项基本原则，是我们识别和战胜党内走资派的锐利武器，把它突出地写进新党章，充分反映了党内两条路线斗争的基本经验。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd77a24780"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
