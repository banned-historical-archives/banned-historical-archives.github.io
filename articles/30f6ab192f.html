thors":[],"dates":[{"year":1979,"month":2,"day":12}],"is_range_date":false,"parts":[{"text":"中央宣传部关于停止发行《毛主席语录》的通知","type":"title"},{"text":"最近国家出版局请示，长期大量积压的《毛主席语录》本、单张毛主席语录和印有“万岁”“万寿无疆”字样的毛主席像如何处理。经研究，通知如下：","type":"paragraph"},{"text":"一、林彪为捞取政治资本而搞的《毛主席语录》本，断章取义，割裂毛泽东思想，自发行以来，危害很大，流毒甚广。为了肃清林彪、“四人帮”的流毒，自即日起，新华书店、国际书店现存的中文版、民族文版和外文版的《毛主席语录》本一律停止发行。除由各省级新华书店选留一些以备有关部门索要外，其余均作化浆处理。","type":"paragraph"},{"text":"单张的毛主席语录，问题类似，也作化浆处理。","type":"paragraph"},{"text":"二、我驻外使馆、其他驻外人员、出国团体和国内涉外单位，一律停止对外散发和供应各种文本的《毛主席语录》。如外国人索要，可提供《毛泽东选集》或毛主席著作单行本。","type":"paragraph"},{"text":"外国友人经营的书店，经商业途径购进的《毛主席语录》，可听其售完，今后我不再供应。","type":"paragraph"},{"text":"三、印有“万岁”“万寿无疆”等失时题字和风黄污损的毛主席像，停止发行，作化浆处理。","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部办公厅编：《党的宣传工作文件选编》，中共中央党校出版社，1994。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30f6ab192f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
