<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"贫下中农管理学校推动农村教育革命  新田公社贫管组抓阶级斗争，抓路线教育，同教师一起批判修正主义，用无产阶级政治统帅教学工作","authors":[],"dates":[{"year":1974,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"贫下中农管理学校推动农村教育革命"},{"type":"paragraph","text":"新田公社贫管组抓阶级斗争，抓路线教育，同教师一起批判修正主义，用无产阶级政治统帅教学工作"},{"type":"paragraph","text":"新华社合肥一九七四年三月十五日电　安徽省宣城县新田公社党委认真组织贫下中农管理学校。全公社五十六所小学和一所中学，都成立了贫下中农管理学校小组。他们在学校里认真贯彻执行毛主席的无产阶级教育路线，推动了农村教育革命的发展。目前，这个公社学龄儿童的入学率已由一九六八年的百分之六十六，增加到百分之九十六。学生上学进得来，留得住，学得好。社员群众说：“贫下中农管理学校就是好！”"},{"type":"paragraph","text":"贫下中农管理学校这一新生事物出现后，一小撮阶级敌人造谣破坏，说什么“大老粗，泥巴腿，怎么能管理学校。”广大贫下中农针对阶级敌人的破坏，开展了革命大批判，更加增强了阶级斗争观念，坚决支持贫下中农管理学校小组搞好农村教育革命。贫管组为了方便贫下中农子女就近上学，积极采取多种办学形式，大力宣传它的好处。由于抓了阶级斗争，实行了多种形式办学，适龄儿童入学率越来越高。"},{"type":"paragraph","text":"遵照毛主席关于“路线是个纲，纲举目张”的教导，新田公社各贫管组管理学校首先抓路线。贫管组成员每星期六下午坚持和教师一起看书学习，一起批判修正主义，联系教育革命的实际，进行路线教育。蒲田大队石湾小学一度只注意抓文化课教学，忽视阶级教育和生产劳动。贫管组发现后，就和教师一起看书学习，批判修正主义教育路线，肃清“智育第一”的流毒，及时端正了教学方向。各校贫管组认真贯彻执行毛主席的《五·七指示》，定期组织学生参加队里的集体生产劳动，开荒种粮，种棉，种菜，植树，把教育与生产劳动结合起来。贫管组的成员还经常深入教学第一线，帮助教师用无产阶级政治统帅教学工作。"},{"type":"paragraph","text":"各校贫管组都认真地执行党的知识分子政策，做好教师的工作。他们定期组织教师参加劳动锻炼，同贫下中农相结合，还组织教师认真看书学习，提高执行毛主席革命路线的自觉性。几年来，全公社一百三十多名小学教师，多数都学习了《共产党宣言》、《国家与革命》、《哥达纲领批判》和毛主席的五篇哲学著作，不少教师还通读了《毛泽东选集》一至四卷。许多教师在贫管组的帮助下，逐步树立起忠诚党的教育事业的思想。五年来，全公社教师队伍不断成长，有五名教师光荣地加入了中国共产党，九名加入了共青团，有四十二人被评选为先进工作者。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36dcb9df7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
