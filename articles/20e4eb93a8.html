al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"在第一区农协干部和会员大会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在第一区农协干部和会员"},{"type":"paragraph","text":"大会上的讲话!]"},{"type":"paragraph","text":"（1927年1月4日）"},{"type":"paragraph","text":"过去妇女受压迫，封建思想作怪，妇女进不得祠堂，现在打倒了族权，能进祠堂了，今天要请她们坐头席。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"我搞革命是为了无产阶级事业，我所爱、所交的朋友是穿草鞋的没有钱的穷人。我们的革命还才开始，要彻底消灭封建地主劣绅，打倒军阀，赶走帝国主义，还得三四十年。革命不成功，我毛润之也不回韶山来了。"},{"type":"paragraph","text":"[1]本篇一是毛泽东在看到很多妇女参加第一区农协干部会时讲话的一部分；本篇二是关于农民的革命精神讲话的一部分，要他们进一步组织起来，建立自己的政权。"},{"type":"paragraph","text":"湘潭县第一区农协会所在地银田寺白庙。毛泽东在这里召开农协干部和群众大会，并作讲演。毛鉴公祠。毛泽东曾在这里参加特别区第三、第四乡农协召开的大会。"}],"authors":["毛泽东"],"dates":[{"year":1927,"month":1,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":371,"page_end":373},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20e4eb93a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
