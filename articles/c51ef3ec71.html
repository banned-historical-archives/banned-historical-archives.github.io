tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"新疆各族人民政治生活中的大喜事《毛泽东著作选读》甲种本维、哈文版开始发行","authors":[],"parts":[{"type":"paragraph","text":"据新华社乌鲁木齐二十九日电 《毛泽东著作选集》甲种本的维吾尔、哈萨克文版，二十八日在新疆维吾尔自治区首府乌鲁木齐市开始发行。"},{"type":"paragraph","text":"《毛泽东著作选读》几种民族文字版的出版发行，是新疆各族人民政治生活中的一件大喜事。昨天，天刚蒙蒙亮，在南梁门市部的门前，许多维吾尔族、哈萨克族的工人、干部、部队指战员、学生，就排队站在雪地上等候购买毛主席著作。新疆军区某部排长铁木尔（维族），在清晨五时就从营地冒雪赶到书店门市部。他出身于南疆阿克苏县的一个贫农家庭，在部队服役已七年。他说，毛主席的书象方向盘，学好了才能做好工作。维族女工人阿米娜说，我们工人首先要学好毛泽东思想，只有掌握了思想武器，才能当好国家的主人。"},{"type":"paragraph","text":"在全疆的各专署所在地、各自治州首府以及部分县城和城镇，二十八日也开始发行维文版的《毛泽东著作选读》甲种本；其余各地将陆续开始发行。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c51ef3ec71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
