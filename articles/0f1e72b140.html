68,"month":2,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"目前，无政府主义的泛滥，仍是一个值得严重注意的问题。所不同的是，现在多抹上了几层保护色，打出了种种蛊惑人心的旗号。请看:"},{"type":"paragraph","text":"把无产阶级的组织纪律一概视之为束缚自由的“框框”；把维护和巩固革命新秩序的规章制度斥之为“老一套”；不执行和不遵守革命的组织性和纪律性。美其名曰:“打破旧框框”。"},{"type":"paragraph","text":"对工作稍不称心，不合“兴趣”，就不干，或干了一半跑掉。不服调配，不听指挥。美其名曰:“我不当阿斗”。"},{"type":"paragraph","text":"处理问题，随心所欲，事前不请示，事后不报告；对无产阶级司令部的指示，顺我者执行，逆我者违抗。美其名曰:“独立思考”。"},{"type":"paragraph","text":"复课闹革命，高兴时到学校转一转，不高兴就在家里打打毛线，结结袜子，下下象棋，装装半导体收音机。有的人春节自动放假，至今还在家里逍遥自在。美其名曰:“逍遥无罪”。"},{"type":"paragraph","text":"极端民主化，“群众说啥就啥”，芝麻绿豆大的细事，也要开大会讨论半天，连发一张戏票也要吵嚷几个钟头。美其名曰:“走群众路线”。"},{"type":"paragraph","text":"以“老造反”自居，“功臣”自命，固执己见，独行其是。当自己的提议被多数否决时，就叫嚷“压制民主”，大声疾呼“还我四大”。美其名曰:“不要奴隶主义”。"},{"type":"paragraph","text":"劳动纪律松弛，干活马马虎虎，甚至随便借口离开生产岗位，到外地游山玩水。美其名曰:“劳逸结合”。"},{"type":"paragraph","text":"老子天下第一，谁也碰不得，谁也管不着。你批评他，他反唇相讥道:“你算老几?”美其名曰:“自己教育自己”。"},{"type":"paragraph","text":"凡此种种，不一而足。"},{"type":"paragraph","text":"看来，闹无政府主义的人是十足的不要政府的了。其实不然。闹无政府主义的人不是不要政府，他是不要无产阶级的政府，只要自己一个人的“政府”，自己这一派的“政府”。因此，不论他们打着多么漂亮的旗号，不论他们有着多么好听的借口，也掩盖不住无政府主义的反动性。"},{"type":"paragraph","text":"在革命委员会成立以后，无政府主义的反动性更显然了。无产阶级需要加强革命的权威，需要强调统一和集中，以便组织群众去向阶级敌人进行战斗，而无政府主义却妄图削弱以至完全毁灭革命委员会的战斗力，分裂我们的革命队伍，涣散我们的革命组织，松懈我们的革命纪律，损害无产阶级革命权威，削弱无产阶级专政。无政府主义的破坏性极大极大，无政府主义坏透坏透了!"},{"type":"paragraph","text":"无政府主义和资产阶级、小资产阶级派性一样，都是一种反动的社会思潮。它们从不同的方面，来配合资产阶级向无产阶级的进攻。闹无政府主义的人，自觉不自觉地帮助了敌人。我们和无政府主义的斗争，是在新形势下两个阶级、两条道路、两条路线斗争的反映。因此，我们同无政府主义者的分歧，实际上就是要不要把无产阶级文化大革命进行到底的分歧，就是要不要坚持无产阶级专政的分歧。我们同无政府主义者的斗争，是一场严肃的阶级斗争。"},{"type":"paragraph","text":"我们要责问那些严重闹无政府主义的人:你们到底承认不承认“一月革命”?承认不承认在上海发生过一场夺权斗争?承认不承认新生的革命委员会?承认不承认无产阶级的革命权威?承认不承认无产阶级专政?请回答!"},{"type":"paragraph","text":"中国赫鲁晓夫拼命搞奴隶主义，结果走向反面，弄出个无政府主义。无政府主义是对工人运动中机会主义罪过的一种惩罚。无政府主义也一定要走向反面的。不要看它现在猖狂一时，经过充分发动群众，痛加围剿，无政府也一定会转化为有政府，自由散漫一定会转化为统一和集中。"},{"type":"paragraph","text":"毛主席教导我们:“必须坚决地克服许多地方存在着的某些无纪律状态或无政府状态”。无政府主义是无产阶级文化大革命的大敌，是无产阶级专政的大敌，是新生的革命委员会的大敌。我们必须鸣鼓而攻之，群起而歼之。我们要象打倒资产阶级、小资产阶级派性那样打倒反动的无政府主义，宣判它的死刑。我们要使反动的无政府主义思潮在我们革命队伍中，没有它的藏身之地。"},{"type":"paragraph","text":"打倒无政府主义!"},{"type":"paragraph","text":"巩固无产阶级专政!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f1e72b140"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
