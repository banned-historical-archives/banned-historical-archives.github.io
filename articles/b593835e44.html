:["李富春"],"dates":[{"year":1967,"month":3,"day":3}],"is_range_date":false,"parts":[{"text":"李富春给全国总工会四个组织的信","type":"title"},{"text":"李富春","type":"authors"},{"text":"中华全国总工会工人文工团、毛泽东思想红卫兵、毛泽东思想宣传队、红旗公社、中华全国总工会机关《国际红旗》公社、革命的同志们：","type":"appellation"},{"text":"看了你们二月二十八日的信和“红旗”第一期，我和康生同志有下列意见向你们建议：","type":"paragraph"},{"text":"（一）刘宁一同志，中央认为不是“三反分子”。因此，你们的“红旗”第一期材料不能公开散发。","type":"paragraph"},{"text":"（二）你们不能把马纯古等人所谓揭露刘宁一同志的材料，作为你们的材料，来揭露刘宁一。","type":"paragraph"},{"text":"（三）希望你们好好学习《红旗》杂志四期社论，和人民日报发表的《我们鲁迅兵团向何处去？》等重要文章，来提高政策水平。","type":"paragraph"},{"text":"（四）你们的报刊不要用”红旗”的名义，以免与中央的红旗杂志混淆起来。等待你们把文件学完后再找你们。","type":"paragraph"},{"text":"无产阶级文化革命敬礼！","type":"appellation"},{"text":" 富春三月三日","type":"paragraph"}],"comments":[],"origin":"1967年4月北京玻璃总厂红卫兵联络站编《中央首长讲话（3）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b593835e44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
