"dates":[{"year":1959,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海新华书店截至本月13日止，已提前18天完成全年销售计划.这是图书发行工作者在总路线的光辉照耀下，在反右倾、鼓干劲和深入开展“比、学、赶、帮”群众性的竞赛运动推动下，经过一年来辛勤劳动所取得的胜利果实。"},{"type":"paragraph","text":"一年来，图书发行事业各个方面都有了很大发展。贯彻为政治、为生产、为工农兵、为社会主义建设服务的方针，经常向读者介绍好书，已成为每一个图书发行工作者的责任和义务。从组织读书报告会、节日宣传周，到上工厂、机关、公社、学校主动供应，通过各种方式，发行了大量图书。配合党的八届八中全会文件的学习，他们及时供应有关书籍20多种，400多万册，庆祝建国十周年的宣传画共发行了50多万张，比过去最高一年的节日宣传画销售数量增长三倍以上，上海县平均每个人民公社购买宣传画500张。目前，配合各区县扫盲工作和“一亩田一头猪”运动，有关这些方面的书籍发行了十多万册。"},{"type":"paragraph","text":"图书发行队伍日渐壮大，涌现出许许多多的先进人物，如全国先进生产者谢翠凤，上海市先进生产者沈光炎、吴训亨、冯德胜等，已成为全市图书发行工作者学习的标兵.最近，新华书店长宁区店郑国梁为读者解决汉语拼音课本的困难，受到了16所学校的表扬。另外，新华书店区县店体制下放后，加强了党对图书发行的领导，今年仅市和郊区就新建门市九处，扩建门市八处。"},{"type":"paragraph","text":"目前，全市图书发行工作者不断争上游、鼓干劲，在胜利完成1959年计划的基础上，进一步掀起“比、学、赶、帮”的群众性竞赛热潮，迎接更大跃进的1960年。"},{"type":"paragraph","text":"(严志恒)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f648fb04ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
