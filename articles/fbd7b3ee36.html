" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"介绍安徽的经验","alias":"","parts":[{"type":"paragraph","text":"介绍安徽的经验!"},{"type":"paragraph","text":"（1959年3月9日）"},{"type":"paragraph","text":"曾希圣同志三月八日二十四时报告九日上午收到。安徽六级干部大会定三月九日开始，十八日完毕，比湖北还早两天，非常之好。安徽大会人数竟达一万多人，内观潮派有一千多人，手面很大，没有怕鬼思想。共产党人如果怕鬼，那就不像样子了。此件发给各省、市、区党委，以为参考，西藏除外。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1959年3月9日上午十二时"},{"type":"paragraph","text":"[1]这是为转发中共安徽省委第一书记曾希圣1959年3月8日24时给毛泽东并中央的报告写的批语。报告主要谈了安徽省委召开六级于部大会的计划和县以上三级于部讨论毛泽东在郑州会议上的讲话的情况。本篇题目是毛泽东拟的。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":324,"page_end":324},"tags":[{"name":"毛泽东","type":"人物"},{"name":"曾希圣","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbd7b3ee36"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
