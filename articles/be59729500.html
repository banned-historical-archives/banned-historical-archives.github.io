rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"威廉斯总理离京去上海访问我国领导人邓小平、倪志福、阿沛·阿旺晋美等到机场热烈欢送特立尼达和多巴哥贵宾","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年二月四日讯 特立尼达和多巴哥总理威廉斯博士及随同来访全体特立尼达和多巴哥贵宾，由人大常委会秘书长姬鹏飞联同，今天上午乘专机离开北京，前往上海进行参观访问。"},{"type":"paragraph","text":"我国领导人邓小平、倪志福、阿沛·阿旺晋美，外交部副部长王海容，石油化学工业部副部长唐克，财政部副部长江东平，外交部副司星期高建中，到机场热烈欢送特立尼达和多巴哥贵宾。"},{"type":"paragraph","text":"机场上悬挂着特立尼达和多巴哥国旗和中国国旗。威廉斯总理走上飞机前，同邓小平副总理等我国领导人亲切握手告别。"},{"type":"paragraph","text":"陪同贵宾前往的还有外交部礼宾司司长朱传贤、美大司副司长陈德和。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be59729500"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
