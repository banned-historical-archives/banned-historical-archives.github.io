year":1956,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乌兰夫代表毛主席向尼泊尔国王赠礼"},{"type":"paragraph","text":"新华社加德满都6日电　中国特使、国务院副总理乌兰夫代表中华人民共和国主席毛泽东，在五月五日下午把礼品赠送给尼泊尔国王马亨德拉陛下。礼品中包括乾隆瓷瓶、翡翠炉、漆屏风、中国绘画和绸缎。"},{"type":"paragraph","text":"这些礼品和其他国家政府代表团所赠送的礼品都陈列在皇宫中。"},{"type":"paragraph","text":"尼泊尔国王和王后五月五日下午在皇宫的花园里举行了招待会，由乌兰夫率领的中国政府代表团出席了这个招待会。"},{"type":"paragraph","text":"中国政府代表团还出席了尼泊尔外交大臣夏尔马在五日晚上举行的招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a07ecc01f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
