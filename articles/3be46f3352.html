script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宫本总书记号召在东京都议会选举中争取更大胜利  日共在同修正主义斗争中加强了党的队伍","authors":[],"dates":[{"year":1965,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宫本总书记号召在东京都议会选举中争取更大胜利"},{"type":"paragraph","text":"日共在同修正主义斗争中加强了党的队伍"},{"type":"paragraph","text":"新华社十二日讯　东京消息：日本共产党总书记宫本显治七月十日在东京纪念日本共产党成立四十三周年的集会上发表讲话，分析了日共最近在参议院选举中取得重大进展的原因，并号召在东京都议会选举中争取更大胜利。"},{"type":"paragraph","text":"宫本说，在最近的参议院选举中，日共在所有的政党中取得了重大的进展，执政党自由民主党在全国衰退。"},{"type":"paragraph","text":"谈到背叛日共的修正主义分子竞选失败时，宫本说，在第八次党代表大会时背叛我们党的春日庄次郎—内藤和周集团和在第九次党代表大会开除出党的志贺义雄—神山茂夫集团曾叫嚣说，日共将陷于混乱，走下坡路，但是我们党决心同这些反党修正主义者斗争，来加强我们的队伍。我认为，我们党实现了这个决心，正如选举结果所表明的，我们党的队伍加强了。"},{"type":"paragraph","text":"宫本就这次的选举结果受到工人阶级和民主力量的衷心欢迎，分析了选举胜利的五点基本原因："},{"type":"paragraph","text":"第一、日本共产党在统一的基础上深刻地分析了政治和经济问题，提出了最彻底的和最具体的政策，以加强同广大人民群众的联系。"},{"type":"paragraph","text":"第二、日本共产党在原则问题上同国内外的修正主义分子进行了斗争，对苏共领导的非法攻击给予了严正的反击，对神山茂夫集团进行了坚决斗争；结果就使得许多人了解了日共的真正政策。"},{"type":"paragraph","text":"第三、日本共产党扩大了它的组织和在它影响下的群众组织。党员比过去三年增加了百分之五十以上，在同一时期，党的中央机关报《赤旗报》的读者增加了百分之六十四，《赤旗报》星期日版的读者增加到了大约七十三万人。"},{"type":"paragraph","text":"第四、日本共产党作为一个独立自主的政党保卫了马克思列宁主义的纯洁性，为日本工人阶级的解放和为日本民族的独立进行了坚持不懈的斗争，采取了把真正的爱国主义和无产阶级国际主义正确地结合起来的立场。"},{"type":"paragraph","text":"第五、全党紧密地团结在中央委员会的周围，克服了各种困难。"},{"type":"paragraph","text":"宫本最后指出现在正在东京都进行的东京都议会竞选运动具有全国性的重要意义。"},{"type":"paragraph","text":"他号召与会者开展比在参议院选举中更加坚决的斗争，从日共四十三年的历史中吸取正确的经验，使日共在东京都议会选举中取得显著的进展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3be46f3352"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
