art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想哺育我们成长","authors":["王杰生前所在班全体同志"],"parts":[{"type":"paragraph","text":"正当全国军民乘“九大”隆重开幕的东风，掀起一浪高过一浪的活学活用毛泽东思想新高潮的时候，“九大”公报传达了伟大领袖毛主席的伟大战斗号召，传达了大会一致通过了林副主席的政治报告和中国共产党章程的消息。我们听了这特大喜讯，全班同志手捧宝书，仰望北京，纵情歌唱，热烈欢呼：毛主席万岁！万万岁！"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想。”回顾中国共产党四十八年的光辉战斗历程，每一步都是伟大领袖毛主席指引了正确的方向。红日照安源，烈火燃井冈，风卷红旗过雪山，延安窑洞灯光亮，天安门上升起第一面五星红旗，《炮打司令部》的大字报震撼世界，倾尽东海水，写满蓝天云，也写不尽毛主席的丰功伟绩！毛主席啊，毛主席！您老人家领导我们党越过一个又一个急流险滩，取得一个又一个伟大胜利。"},{"type":"paragraph","text":"我党我军的光辉历程是这样，我们连队、我们班的革命化建设也是这样。在您老人家的光辉思想指引下，我们连队沿着您老人家的建军路线，培育了一批又一批象王杰同志那样无限忠于您老人家的好战士。在无产阶级文化大革命中经受了锻炼和考验，胜利地完成了战备、施工等光荣任务。我们深深体会到，战无不胜的毛泽东思想，是我们战胜一切敌人的力量源泉，是我们部队实现思想革命化的根本，是我们班永远前进的根本，是我们每个革命战士成长的命根子。"},{"type":"paragraph","text":"“为有牺牲多壮志”。王杰同志英勇牺牲以后，林副主席指示我们：“向王杰同志学习，活学活用毛主席著作，一心一意为革命。”王杰同志是我们活学活用毛泽东思想的好榜样，我们要象他那样，“毛主席怎样说的，我就怎样做”，活学活用毛泽东思想，在“用”字上狠下功夫，学一句，用一句，掀起活学活用毛泽东思想的新高潮。我们要把斗私批修改造世界观，推向新的境界，把阶级斗争觉悟、路线斗争觉悟、毛泽东思想的觉悟提到新高度，把各项工作搞出新水平，为坚决实现伟大领袖毛主席关于“在全国取得更大的胜利”的伟大号召而奋斗！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bc3a3dcc8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
