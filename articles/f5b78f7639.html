art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席到茂物访问苏加诺总统陪同前往 市民们倾城出动热烈欢迎中国贵宾","authors":[],"parts":[{"type":"paragraph","text":"新华社茂物14日电 印度尼西亚的美丽城市茂物市市民今天下午几乎倾城而出，来欢迎中华人民共和国主席刘少奇和夫人王光美。"},{"type":"paragraph","text":"刘少奇主席是在苏加诺总统陪同下，今天下午从雅加达到达茂物的。他们在茂物宫前受到哈蒂妮·苏加诺夫人的热烈欢迎。刘少奇主席的夫人王光美和哈蒂妮·苏加诺夫人互相热烈拥抱并互致问候。"},{"type":"paragraph","text":"在从雅加达到茂物的六十公里的公路上，成千上万的欢迎人群向中国贵宾们热烈欢呼。这条公路今天披上了节日盛装，悬挂着许多横幅标语和五彩缤纷的旗帜。一支印度尼西亚军乐队在茂物市入境处等待中国贵宾们。当刘少奇主席和夫人在苏加诺总统陪同下一进茂物市，就走下他们的汽车，换乘一辆敞篷车。人群不断向他们欢呼致意，并且高呼“独立”，“中国—印度尼西亚友谊万岁”等口号。刘少奇主席和夫人频频向热情的欢迎者招手。"},{"type":"paragraph","text":"刘少奇主席和夫人、陈毅副总理和夫人以及其他随行人员，通过排成双行的穿着印度尼西亚各地区民族服装的姑娘们的行列步入茂物宫。在茂物宫里，苏加诺总统向中国贵宾们介绍代表印度尼西亚的各个地区的姑娘们。代表西伊里安的那位姑娘手里拿着一只极乐鸟（西伊里安的一种鸟类），引起中国贵宾们的浓厚的兴趣。"},{"type":"paragraph","text":"中国贵宾们今晚在茂物宫观看文艺演出后，将在茂物过夜。"}],"alias":""},"tags":[{"name":"王光美","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5b78f7639"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
