" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji40","name":"毛泽东全集第40卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"关于金门炮击办法等问题的信","alias":"","parts":[{"type":"paragraph","text":"关于金门炮击办法等问题的信"},{"type":"paragraph","text":"（1958年9月13日）周总理、黄克诚同志："},{"type":"paragraph","text":"送来连日金门情况二件及我军命令一件，收到。除照你们命令规定路线执行以外，百天黑夜打零炮，每天二十四小时，特别是黑夜，特别是对『对』料罗湾三厘以内，打零炮（每天二三百发），使敌昼夜惊慌，不得安宁，似有大利，至少有中利小利。你们"},{"type":"paragraph","text":"[1]周总理，即周恩来。黄克诚，当时任中共中央军委秘书长和国防部副部长。"},{"type":"paragraph","text":"[2]指1958年9月11日十一时十五分中共中央军委关于炮击金门的命令。命令规定：一、若今日美舰继续掩护并停泊在距料罗湾3海里外时，我即炮击进入料罗湾码头卸载的蒋军运输舰和码头上的人员。不靠岸的军舰不论是美舰或蒋舰一律不打。炮击弹药消耗标准，以打沉、打跑蒋军运输舰并适当地打击敌人地面目标为原则。二、我空军高炮部队必须切实准备对付蒋机的轰炸。空军高炮应好好组织协同；若敌机向我轰炸，我歼击机为了便于掌握战机，可以进入金门上空作战，但轰炸机今日仍不出动。三、在上述原则下，炮击时机和具体问题，请你们自行掌握，若有新情况，则应即时报告，以便请示中央作新的决定。"},{"type":"paragraph","text":"[3]料罗湾，位于大金门岛南部，是当时国民党军舰艇停泊的码头。毛泽东全集第四十卷意见如何？大打之日，不打零炮。小打之日，即是打零炮。特别黑夜对料罗湾打，白天精确地较准炮位，黑夜如法炮制，似较有利。请征询前线研究，看可行否？"},{"type":"paragraph","text":"华沙谈判，三四天或者一周以内，实行侦察战，不要和盘托出。彼方亦似不会和盘托出，先要对我们进行侦察。周、彭、张、乔（冠华）诸位意见如何？顺祝旗开得胜！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十三日于武昌"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"如同意，内信请寄叶飞、刘亚楼、厦门前指付讨论。不要勉强同意。是则是，非则非，以实际可行者见告。"},{"type":"paragraph","text":"[1]指中美大使级会谈。1955年4月23日，周恩来总理在亚非会议八国代表团团长会议上声明：中国政府愿意同美国政府坐下来谈判，讨论和缓远东紧张局势的问题，特别是和缓台湾地区的紧张局势问题。同年7月25日，中美双方就大使级会谈达成协议，并于8月1日在日内瓦举行第一次会议。此后由于美方进行阻挠，会谈经常遭到破坏和中断，金门炮击开始后，又继续进行。1958年9月，会谈改在华沙举行。"},{"type":"paragraph","text":"[2]周，指周恩来。彭，指彭德怀，当时任国务院副总理兼国防部部长。张，指张闻天，当时任外交部副部长。乔冠华，当时任外交部部长助理。"},{"type":"paragraph","text":"[3]叶飞，当时任中国人民解放军福州军区政治委员。刘亚楼，当时任中国人民解放军空军司令员。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":179,"page_end":180},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"叶飞","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06ecb23a3a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
