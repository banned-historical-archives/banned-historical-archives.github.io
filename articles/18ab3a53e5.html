1,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向毛主席致敬电敬爱的毛主席："},{"type":"paragraph","text":"我们现在向您报告，北京市天主教革新委员会在今天已经正式成立了。我们经过了四个来月的艰苦斗争，取得了今天的胜利。我们教友普遍提高了政治觉悟，分清了敌我，坚决与帝国主义斩断关系，实行自治、自养、自传；并在八月三十日签名发表了宣言，要求政府驱逐帝国主义分子黎培里出境。签名的教友占全市教友的绝大多数。这表现了北京市天主教教友反帝爱国爱教的决心与热忱。这个运动博得了全体教友的拥护与支持。我们现在向您保证：我们有信心做好反帝爱国爱教的工作，并且决心斩断与帝国主义的一切联系，肃清帝国主义的影响；随时响应人民政府的一切号召，与全国人民站在一起，以实际行动来完成抗美援朝保家卫国的伟大任务。现在我们谨代表北京市全体教友向您报告，谨祝您的身体健康。"},{"type":"paragraph","text":"并致最崇高的敬礼！"},{"type":"paragraph","text":"中国天主教北京市革新委员会成立大会"},{"type":"paragraph","text":"一九五一年九月十七日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18ab3a53e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
