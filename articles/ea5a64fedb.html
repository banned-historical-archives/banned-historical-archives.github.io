script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利劳动人民斗争怒潮汹涌澎湃  数十万农业工人纷纷举行罢工示威反对剥削和压迫  一些地区罢工工人封锁交通要道、同反动警察展开搏斗","authors":[],"dates":[{"year":1969,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利劳动人民斗争怒潮汹涌澎湃"},{"type":"paragraph","text":"数十万农业工人纷纷举行罢工示威反对剥削和压迫"},{"type":"paragraph","text":"一些地区罢工工人封锁交通要道、同反动警察展开搏斗"},{"type":"paragraph","text":"新华社二十七日讯　罗马消息：在意大利政治经济危机日益加深的情况下，意大利广大劳动人民反对垄断资产阶级残酷剥削和压迫的斗争势如怒潮，此伏彼起，席卷了整个阿平宁半岛。"},{"type":"paragraph","text":"意大利农业工人，几个星期来掀起了一浪高于一浪的斗争。在意大利南部的三十个省和意大利北部的艾米利亚区和伦巴第区，数十万农业工人连日来纷纷举行罢工和示威游行，要求提高工资和改善劳动条件。在艾米利亚区的莫德纳，农业工人在举行了四十八小时的总罢工以后，又举行了一次持续七十二小时的罢工，抗议资本家无理解雇四名罢工工人。在意大利南部的阿浦利亚区，二十五个城市的各行各业的工人在二十一日举行了一次总罢工，声援农业工人的正义斗争。"},{"type":"paragraph","text":"意大利各省的佃农最近也纷纷举行示威。在雷焦—艾米利亚，数千名佃农二十五日用拖拉机封锁了交通要道。在意大利中部的皮斯托亚佃农们二十三日举行了一次总罢工和示威游行。"},{"type":"paragraph","text":"意大利数十万名建筑工人正在掀起一场全国性的罢工浪潮。米兰的五万名建筑工人二十四日举行了二十四小时罢工，使所有的建筑工地陷于瘫痪。在罗马、佛罗伦萨、热那亚和曼图亚，建筑工人也举行了总罢工。此外，还有十七个省的建筑工人决定在七月底前举行罢工。"},{"type":"paragraph","text":"意大利十万名酒店、饭店和食品店的工人，为了提高工资和改善劳动条件，从二十六日起举行四十八小时罢工，使得全国的许多酒馆、饭店和食品店被迫关门。"},{"type":"paragraph","text":"意大利北部贝加摩市的六千名冶金和机器制造工人，在坚持罢工一个多星期后，二十三日封锁了通往米兰的公路，并在二十四日在贝加摩市区举行了示威游行。都灵的菲亚特汽车工厂一些车间的工人二十三日也举行了罢工。在特兰托省的罗韦雷托，罢工工人还同前来镇压的警察进行了英勇的战斗。"},{"type":"paragraph","text":"二十五日，意大利中部佩扎罗市的劳动人民举行了总罢工和示威游行，反对物价高涨和房租高昂。这个城市的工人愤怒抗议要拿出他们工资的百分之四十去付房租。在意大利中部的其他省份，最近也爆发了类似的罢工和示威游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea5a64fedb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
