art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"南京部队学习毛主席军事著作集训班开学","authors":["韦顺"],"parts":[{"type":"paragraph","text":"本报讯 南京部队举办的学习毛主席军事著作集训班，最近开学。这个集训班由部队首长直接主持，亲自讲课。通过集训，使干部正确领会毛主席研究战争、指导战争的立场、观点和方法，领会我军的建军原则和战略、战术指导思想，并以此为指针，指导部队的各项工作。学习的内容有：人民战争，人民军队，战略问题，战略方针、战役指导、战斗作风，立场、观点、方法等五个部分。预计学习七个星期。"},{"type":"paragraph","text":"参加集训班的学员，都是各部队的军政负责干部，大都有较长的斗争历史和丰富的战斗经验，对学习毛主席军事著作的意义，都有深切的体会，对学习有迫切的要求。大家体会到：只有学好毛主席的军事著作，才能打胜仗，做好工作，沿着毛主席的军事路线不断前进。 （韦 顺）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8b70abd88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
