art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志讲党课","authors":["曹枫"],"parts":[{"type":"paragraph","text":"一九四九年，我在毛泽东同志身边担负警卫任务。一天晚上，我们正在上党课，学习《为人民服务》。忽然，毛泽东同志健步走进屋来了。大家看到毛泽东同志来了，心里不知道说啥是好。毛泽东同志亲切地和我们握手，询问：“你们在干什么？”我们回答：“在上党课。”毛泽东同志接着又问：“上党课学习什么内容啊？”我们说：“学习《为人民服务》。”毛泽东同志说：“很好嘛！”说完，就和我们坐在一起，给我们讲解《为人民服务》这篇文章。他老人家从张思德同志烧炭讲起，一直讲到张思德同志为革命牺牲。然后亲切地说：我们是共产党，革命同志，要全心全意地为人民服务，为人民多做好事，把革命进行到底。又说：一个人做点好事并不难，难的是一辈子做好事，不做坏事……。他老人家还从我党的优良作风谈到我军的宗旨，要求我们发扬党的优良传统，象张思德同志那样，党叫干啥就干啥。课后，同志们都热烈地议论着毛泽东同志讲述的深刻道理，立志要做一个名副其实的、全心全意为人民服务的共产党员。"},{"type":"paragraph","text":"后来，因为工作需要，我从毛泽东同志身边调到偏僻的山区工作。虽然环境和条件变了，但我始终抱着一个目的，就是党叫干啥就干啥，在自己的岗位上为党工作，为人民服务。我现在是五十多岁的人了，但身体很好，我要遵照毛泽东同志的教导，以加速部队建设和大干四化的实际行动，来履行共产党员全心全意为人民服务的光荣义务。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77ee9bdd83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
