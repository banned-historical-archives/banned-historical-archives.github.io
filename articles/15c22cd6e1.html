ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"致彭德怀电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀电"},{"type":"paragraph","text":"（1940年4月2日）"},{"type":"paragraph","text":"目前局势相当严重，蒋介石已下了决心，即是挂抗日的招牌，做剿共的实际。对我威胁最大的是绥德、皖东两点。蒋九十军的目的在强渡黄河攻取绥德。如河防不守，则前后方联络隔断，延安在危险中。如皖东不守，则皖南部队被隔断，八路军出鄂豫皖边及豫鄂西的道路也被隔断。所以，对李文第九十军的行动和李品仙部的进攻，值得严重注意。贺、关须准备以主力对付李文军，同时钳制高双成可能之南下，并抗御同蒲、汾离两线日军乘虚袭击。现颇感兵力不足，陈士支队恐不能东调。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":4,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":516,"page_end":516},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15c22cd6e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
