script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度《人民战争》周刊发表社论强烈谴责苏修侵捷必须对修正主义进行斗争 开辟自己解放自己的道路","authors":[],"dates":[{"year":1968,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十三日电　八月二十九日出版的印度《人民战争》周刊发表社论，强烈谴责苏修叛徒集团野蛮侵略捷克斯洛伐克的罪行。"},{"type":"paragraph","text":"社论说，苏修叛徒集团对捷克斯洛伐克的侵略同美帝国主义对越南的野蛮侵略是一模一样的。修正主义叛徒们说侵略捷克斯洛伐克的原因是“捷克斯洛伐克的社会主义成果”处于危险之中，他们是为了“保卫”这些“成果”而这样做的。不仅如此，他们甚至还说，他们是应捷克斯洛伐克的“邀请”才去那里的。美帝国主义对侵略越南是怎么说的呢?他们也说是为了人民的“安全”，是应越南人民的“请求”才带领军队去那里的。"},{"type":"paragraph","text":"社论指出，苏修叛徒集团在国内复辟资本主义，并向其它国家插足，掠夺那些国家的财富，控制那些国家的政治。这就是帝国主义。"},{"type":"paragraph","text":"社论接着说，苏修叛徒集团过去一直从捷克斯洛伐克取得大量的原料，吞没捷克斯洛伐克人民的血汗所得。捷克斯洛伐克的危机深化了，使得当权者发生更迭，杜布切克集团执政就是这方面的明显例证。杜布切克也并非什么好东西，他想摆脱苏联修正主义叛徒，建立自己修正主义集团的控制，从而随心所欲地进行统治。修正主义叛徒们对杜布切克用尽了利诱、讨好、威胁、邀请参加会议等一切阴谋手段，但当威胁和诱惑都无济于事的时候，苏修叛徒集团率领自己的娄罗们侵入捷克斯洛伐克，蹂躏了捷克斯洛伐克。"},{"type":"paragraph","text":"社论说，捷克斯洛伐克人民没有容忍这种野蛮的侵略，他们在各地与修正主义叛徒们开展斗争。"},{"type":"paragraph","text":"社论指出，一些反动派也反对这一侵略，但是他们的反对不是为了人民，而是为了捷克斯洛伐克的修正主义头目、苏修叛徒集团和世界一切反动派的利益。因此，必须对修正主义叛徒集团作无情的斗争，开辟自己解放自己的道路。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad5f259641"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
