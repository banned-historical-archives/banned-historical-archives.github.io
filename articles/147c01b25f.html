,"authors":[],"dates":[{"year":1957,"month":11,"day":25}],"is_range_date":false,"parts":[{"text":"党内右派分子石敬博　只要“独立审判”不要党的领导","type":"title"},{"text":"《人民日报》讯：黑龙江司法厅科级秘书、共产党员、右派分子石敬博集中攻击了党对司法工作的领导。他认为党委过问案件就是破坏了法制，使法院不能进行“独立审判”。","type":"paragraph"},{"text":"他还说什么省司法厅没有“三权”。他认为第一，没有人权（没有干部管理权）；第二，没有财权（没有管理司法事业费）；第三，没有工作决定权（发现错案不能改判）。他还主张：“公安、检察部门都应归司法行政领导。中央司法部起码应与国务院平列，并且也应当在人大常委会设一个组织，这样才有权力，只有这样才能把省的公安、检察权限概括了。”","type":"paragraph"},{"text":" ——原载《人民日报》1957年11月25日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"147c01b25f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
