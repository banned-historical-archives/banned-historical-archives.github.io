<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"农忙坚持学习毛主席著作港东港北大队社员在驻沪空军某部九连协助下，掀起学习热潮，有力地推动了“三夏”生产","authors":["黄知义"],"dates":[{"year":1967,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:目前郊区已进入“三夏”大忙季节。今年夏收作物长势很好。夏收是夺取全年丰收的一个重要环节。抓好夏收是一项重要的政治任务。机关干部、革命师生、各行各业，都应该遵照我们伟大领袖毛主席“抓革命，促生产”的指示，以解放军为榜样，积极行动起来，以劳力、畜力、技术力量，大力支援“三夏”。在参加“三夏”战斗中，要高举毛泽东思想伟大红旗，大力突出无产阶级政治，更好地活学活用毛主席著作，广泛深入地宣传以毛主席为代表的无产阶级革命路线，同农村广大贫下中农、革命群众、革命干部一起并肩战斗，狠抓革命，猛促生产，夺取“三夏”的全面胜利。"},{"type":"paragraph","text":"本报讯　驻沪空军某部九连大力支援“三夏”，积极向驻地附近的南汇县老港公社港东、港北两大队宣传毛泽东思想，协助开展活学活用毛主席著作活动，把解放军坚持“四个第一”和三八作风的优良传统带给社员，大大提高了社员的觉悟，推动了“三夏”生产。"},{"type":"paragraph","text":"早在“三夏”开始前，九连就对这两个生产大队进行调查研究，掌握了他们今年“三夏”面积大、收成好、时间短、任务重等特点，有针对性地给社员讲了毛主席著作《愚公移山》，鼓励社员下定决心，排除万难，夺取“三夏”的胜利。同时，又专门集训了各生产队的毛主席著作学习辅导员，培养一批“三夏”工作骨干，通过他们发动广大群众，投入“三夏”战斗。"},{"type":"paragraph","text":"在九连指战员的协助下，港东、港北两个大队在“三夏”中掀起了活学活用毛主席著作群众运动的热潮。社员们出工、休息、收工时都不忘学习《毛主席语录》。同时，九连指战员还协助各生产队毛主席著作学习辅导员，组织社员学习《人民日报》有关大批判和“三夏”的社论，教唱毛主席语录歌，及时表扬好人好事，演出小型文娱节目。"},{"type":"paragraph","text":"在九连指战员的宣传辅导下，港东、港北两个大队社员，深刻地认识到搞好今年“三夏”，有着极其重大的政治意义，人人精神振奋，斗志昂扬。港东生产大队第十队饲养员陈毛狗，除自己养四条牛外，还主动把队里十四头猪的饲养任务担当起来。港东九队、二队顾玉仙、施林妹等十多个青年，总是早出工，晚收工，成为队里的突击力量。港北三队曹金妹，干什么活都抢在前面，不辞劳苦，一连五个晚上参加脱粒。这两个大队的社员都说:“解放军同志真正好，毛泽东思想红旗举得高，抓革命来促生产，全国办成毛泽东思想大学校。”"},{"type":"paragraph","text":"(黄知义)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"544c8b4570"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
