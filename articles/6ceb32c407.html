tle":"中央关于限期开展反对无纪律无政府状态的斗争给中原局的电报","dates":[{"year":1948,"month":11,"day":13}],"is_range_date":false,"authors":["中共中央"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 17","tags":[{"name":"纪律","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"中央关于限期开展反对无纪律无政府 状态的斗争给中原局的电报"},{"type":"subtitle","text":"（一九四八年十一月十三日）"},{"type":"paragraph","text":"十一月五日关于各地检查请示报告制度、反对无纪律无政府状态的情况的综合报告，已收阅，甚好，此类检讨应转发至地委一级及师（旅）一级，引起他们注意。一切区党委，地委，纵委旅委军区军分区，中原局、区党委、地委三级政府的党组，三级党报的委员会，五万人口以上的大城市的市委市政府及市军事机构的党组，均应于今年十一月至明年三月，五个月内开会检讨，并开展反无纪律无政府状态的斗争，并作出简明扼要的决议，交上级审阅修改遵照实行，并将这一切决议原文送来中央备审不得违误，如果某一单位不开会检讨，不作出决议者，即应认为违反纪律，给以批评，补开会议，补作决议，望你们坚决不放松地抓紧这一斗争，是为至盼。"},{"type":"paragraph","text":"此电望转发至地委旅委。"},{"type":"paragraph","text":"（摘自《组织工作文件选编》）"}],"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ceb32c407"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
