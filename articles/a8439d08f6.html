{"year":1978,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"引导青年向“四人帮”讨还青春编辑同志："},{"type":"paragraph","text":"上个学期，我校根据学生的学习成绩重新分班，我被分配到初二年级“慢班”做班主任。"},{"type":"paragraph","text":"这个班有四十名同学，由于受“四人帮”散布的“闹而优则仕”和“干不干都吃饭，学不学都上学”等谬论的毒害，在分班前进行的七门学科的考试中，有二百零三人次不及格，每人平均五门多不及格，成绩实在太差了。"},{"type":"paragraph","text":"摸底考试后，不少同学耷拉下脑袋，觉得这一下完了，跟着混吧！班里仍然是麻绳拴豆腐，一点也提不起来。"},{"type":"paragraph","text":"后来，我们开展了“面对现实，改造现实”的教育，发动广大学生和家长结合自己的亲身经历，揭发控诉“四人帮”毒害青年的罪行，激发起广大同学向“四人帮”讨还青春的强烈愿望。同时，我们还进行了纪律教育、革命传统教育、为革命而学的教育。半年来，不少同学的精神面貌和学习成绩都有了变化，在第二学期末的七门学科考试中，不及格的从二百零三人次减少到九十九人次；参加西城区语文学科的统考中，有二十六名同学达到了初二年级的水平。其中一个班干部，原来是四门不及格的学生，现在各科成绩都达到了优良，成为“三好”学生。"},{"type":"paragraph","text":"半年来的工作使我体会到，青年人处于成长时期，可塑性很大，只要我们善于引导他们彻底砸烂“四人帮”强加在他们身上的种种精神枷锁，善于引导他们把自己的学习同实现祖国四个现代化的伟大目标联系起来，他们是会奋发努力，迅速夺回“四人帮”给他们造成的损失的。"},{"type":"paragraph","text":"北京新街口中学教师"},{"type":"paragraph","text":"赵　铮"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8439d08f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
