script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"肃清极左流毒  认真改正错误　沧州地委为贾春明彻底平反","authors":[],"dates":[{"year":1980,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"肃清极左流毒  认真改正错误"},{"type":"paragraph","text":"沧州地委为贾春明彻底平反"},{"type":"paragraph","text":"本报讯 据《河北日报》报道：《人民日报》于7月3日发表了《沧州地区广大群众强烈要求地委彻底平反严重迫害科技人员的冤案》的报道以后，沧州地委组织人员，对这一冤案和原复查情况作了审查，认为前次复查留有尾巴是错误的。7月8日，地委在县委书记和地直机关党员干部参加的落实政策会议上，宣布了彻底平反这一冤案，明确贾春明为地区水利局试验站副站长、助理工程师；对因此受株连的同志和亲属也予以平反，恢复名誉。"},{"type":"paragraph","text":"贾春明同志参加工作后，先后在河北省水利厅，沧州、天津专区农林局和原沧州地区水利局孙庄子试验站，从事治水改碱的生产实践和科学研究，他的科研成果曾引起有关部门和专家们的重视。1975年，他认为河北省搞农田基本建设片面强调打深井，布局不合理，取水不分层，只开采不补给，已造成地下水位下降和漏斗增多，担心发展下去会出现地下淡水资源枯竭、地面沉降、海水倒灌等严重后果，呼吁省、地领导引起重视。他的建议却被错误地认为是“反对农业学大寨”，“攻击省委、地委领导同志，反对党的领导”，“恶毒攻击党的治水路线，破坏水利建设”，并遭到拘捕。粉碎“四人帮”以后的1977年8月，又加以“坚持反动立场”、“对抗地委领导”、“破坏机井建设”、"},{"type":"paragraph","text":"“破坏农业科研”等罪名，将其开除公职，戴上“坏分子”帽子，监督劳动。1979年复查，证明原来所谓的“四条罪状”均属不实之词，可是又以“同地委的指导思想在认识上有差距”、“骄傲自满”、“不尊重领导”为理由，给他留下“犯有错误”的尾巴。"},{"type":"paragraph","text":"沧州地委领导同志认为，这一冤案是“四人帮”极左路线影响下造成的，粉碎“四人帮”三年后复查仍给留尾巴，说明地委受极左路线的流毒是很深的。贾春明同志在治水问题上提出不同意见，本应欢迎鼓励，地委却看成这是“反对省、地领导”，是"},{"type":"paragraph","text":"“阶级斗争、路线斗争”，这说明在地委领导同志的头脑中，家长制、一言堂等封建主义思想的遗毒也是严重的，甚至凭一些未核实的材料就定案处理，是很错误的。地委认为，这一冤案的教训是深刻的，表示要进一步学习和贯彻三中、四中、五中全会精神，加快落实政策的步伐，平反纠正一切冤假错案。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cfe0d0aa9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
