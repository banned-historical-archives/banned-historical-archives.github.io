"dates":[{"year":1966,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"光芒普照的红书"},{"type":"paragraph","text":"——歌颂《毛主席语录》"},{"type":"paragraph","text":"刚果（布）小学教师  朗贝尔·奥拉伊毛泽东的这本红书呵，它是认识真理的书，光芒普照的书。全世界无产者，全世界被压迫的人们，从毛泽东的红书中，采集、汲取他们必需的有益的滋养料。这红书呵，是寻求光明的夜行者的指路明灯。它照亮着世界人民的路程，它教育着世界一切被压迫的人民。全世界的无产者呵，毛泽东的红书就是你们战斗的指南。学习吧，天天学，用心学。它是为人类解放事业而服务的思想家的著作。学习吧，学习毛泽东的红书吧！是毛泽东给我们这盏明灯，愿毛泽东的名字万代称颂。毛泽东的红书呵，它是二十世纪马克思列宁主义战士的珍贵的书，必读的书。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"398e25634c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
