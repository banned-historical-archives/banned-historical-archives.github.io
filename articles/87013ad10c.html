dates":[{"year":1969,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议资本家的残酷剥削"},{"type":"paragraph","text":"西德各地冶金工人纷纷举行罢工"},{"type":"paragraph","text":"新华社波恩五日电　继西德多特蒙德的冶金工人举行罢工斗争之后，西德其他城市的冶金工人也相继举行罢工抗议资本家的残酷剥削。"},{"type":"paragraph","text":"在杜伊斯堡，来因冶金厂的一千二百名工人四日举行罢工，要求增加工资。同一天，在萨尔州的第二大冶金工厂诺伊基尔歇炼铁厂的工人，也举行了罢工。"},{"type":"paragraph","text":"在多特蒙德市赫施公司的冶金工厂，参加罢工斗争的工人到三日扩展到了二万人。工人们举行了强大的示威，迫使资本家接受了他们的要求。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87013ad10c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
