<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一抓阶级斗争　鱼产量就上升市海洋渔业公司发动群众向阶级敌人打进攻战　肃清经济主义无政府主义流毒，调动了广大职工生产积极性","authors":[],"dates":[{"year":1968,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市海洋渔业公司无产阶级革命派，发动群众，大抓阶级斗争。向混进革命队伍中的阶级敌人打进攻战，揪出了一小撮破坏革命和生产的坏人，擦亮了广大革命职工的眼睛，掀起了抓革命促生产的热潮。"},{"type":"paragraph","text":"市渔业公司广大无产阶级革命派没有辜负上海市一千万人民的期望，他们牢记毛主席“千万不要忘记阶级斗争”的教导，狠抓阶级斗争这个纲，揪出了长期以来破坏革命和生产、大刮反革命经济主义、无政府主义和资产阶级派性妖风的公司走资派和一小撮坏人，展开了轰轰烈烈的革命大批判。为了进一步打好这场硬仗，继续揭开公司阶级斗争盖子，公司革委会在解放军同志帮助下，办了有老、中、少不同观点的干部和部分群众参加的三结合的学习班。学习班通过狠批狠揭走资派的罪行，肃清反革命经济主义、无政府主义、资产阶级派性妖风的流毒，统一了思想，使新老干部之间存在的隔阂有所解决。进一步分析研究了公司的阶级斗争形势和阶级敌人的动向，带领群众，继续向阶级敌人进攻。"},{"type":"paragraph","text":"“阶级斗争，一抓就灵。”十四个渔轮大队差不多都办起了毛泽东思想学习班，许多渔轮最近在海上坚持早请示、晚汇报的制度。大家以毛泽东思想为武器，狠批走资派散布的“不能只要鱼，不要命”的资产阶级活命哲学。有个老船员说:“在旧社会，我们为了活命，被迫在海上挣扎。解放了，毛主席把我们从苦海里救出来，我们一定要抓好革命，猛促生产。”许多老工人怀着对走资派的满腔仇恨，痛斥反革命经济主义、无政府主义、资产阶级派性造成的恶果。公司的各级革命干部还经常深入到车间、码头、渔轮，和革命群众一起结合本人和单位的实际，控诉反革命经济主义、无政府主义、资产阶级派性的罪行，从而大大提高了群众的革命和生产热情。"},{"type":"paragraph","text":"目前，广大职工的生产积极性大大提高。前一时期出海渔轮不下夜网，一天只下二、三网，生产不听指挥，有的遇到六、七级风就进港避风。最近，出海渔轮一般都下夜网，每天平均下五、六网；遇到七、八级风仍坚持生产；航次间隔也由前一时期的六、七天，缩短到三、四天，有的返港只两天就又出海了。产量显著上升，三月份在一个航次中四十四对渔轮产鱼九百十七吨，四月份在一个航次中三十八对渔轮产鱼达二千吨左右。渔轮厂的工人在修船任务繁忙的情况下，放弃休息时间，奋战一天，修好了十四对渔轮，保证了渔轮按时出航生产。"},{"type":"paragraph","text":"这个公司的无产阶级革命派决心乘胜追击，把阶级斗争的盖子进一步揭深揭透，狠抓革命，猛促生产，为人民立新功。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f92ab58fcb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
