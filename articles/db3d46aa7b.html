script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向资产阶级习惯势力开火","authors":[],"dates":[{"year":1974,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“无产阶级要占领上层建筑，就要向资产阶级开展不停顿的进攻。我虽然就要离开学校了，但到了新的岗位，仍然要关心上层建筑领域的革命。”这是复旦大学物理系毕业生韩淑珍，在离校前夕表示的决心。"},{"type":"paragraph","text":"韩淑珍进校三年来，努力学习马列和毛主席著作，敢于同各种错误的东西作斗争。"},{"type":"paragraph","text":"有一个时期，社会上刮起了一股否定无产阶级教育革命，反对工人阶级占领上层建筑领域的妖风。这股妖风也刮到了复旦校园。当时，有人公开叫嚷:“工宣队领导不了教育革命。”小韩看到这股歪风，气愤极了。她和班上的几个同学一起讨论，写了一份大字报，驳斥了那种妄图否定无产阶级教育革命，反对工人阶级占领上层建筑的谬论。"},{"type":"paragraph","text":"批林批孔运动开展以来，小韩又积极投入战斗。有一次，小韩和班上同学在校办工厂上课时，有人说:“结合典型产品进行教学，这样就不象工厂了，干脆把工厂办成实验室好了。”她一听，觉得这话不是味儿。“这不是想否定校办工厂成为教学的基地吗?”她马上站出来说:“结合典型产品组织教学，是理论联系实际的一个有效途径，是无产阶级教育革命中的一个新生事物。我们就是应该支持它。”她用很多事实来说明结合典型产品组织教学的好处。大家都认为她讲得有道理。"},{"type":"paragraph","text":"就是这样，小韩敢于斗争，乐于开顶风船。在斗争中，她也把自己锻炼得更加坚强。"},{"type":"paragraph","text":"本报通讯　员"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db3d46aa7b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
