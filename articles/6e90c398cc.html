<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1976,"month":6,"day":8}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"鲜明的对照","authors":["战士李志峰〖HH/换行〗DW：八四七○三部队"],"parts":[{"type":"paragraph","text":"那是一九六四年初春的一个早晨，爸爸送我到四里外的县城去读书。一路上爸爸千叮咛、万嘱咐地对我说：“孩子，到了学校可要好好读书啊，可别忘了党和贫下中农对你的希望。在旧社会，咱们穷人想读书也读不上啊……”说到这，爸爸的脸色低沉了下来，追忆起了他在旧社会的一段经历：“那时候我十一岁，一天早晨，我赶着羊群从狗地主活阎王张仁善门前走过，忽听屋里传出了读书声，我好奇地停下来听。冷不防活阎王蹦出来，拧着我的耳朵破口大骂：‘穷小子，生就的贱皮还想偷听书？我让你听！’只觉得一阵钻心的疼痛，我昏了过去……赶到我醒来时，你爷爷奶奶哭着叫我。才知道狠毒的活阎王竟用刀子割掉了我的一只耳朵……。”我含着泪水，听着爸爸的追叙，我攥紧拳头想：新社会有了读书的权利，我一定要好好学习，为贫下中农争口气！"},{"type":"paragraph","text":"谁能料到，两年后的一天早晨，我背着书包含着泪水回到家。爸爸问我哭什么？我说：“早晨送王大爷去医院看病，到学校已经上课了，老师也不问个明白就批评我，我跟他争了几句，就说我违犯了校规，给赶出来了……”爸爸望着我气愤地说：“真不讲理，这样的学校咱不上了！”"},{"type":"paragraph","text":"春雷一声震天响，毛主席亲自发动和领导的无产阶级文化大革命，摧毁了刘少奇修正主义教育路线的统治，工农兵掌握了教育大权，我们大队也办起了小学和初中班。又是一个初春的早晨，贫宣队王大爷来到了我家，亲自给我挂上了书包，他和我爸爸一起说着笑着把我送进了学校……。"},{"type":"paragraph","text":"每当我想起这段不寻常的经历时，心里就久久不能平静。刘少奇的修正主义的教育路线，把我从旧学校里撵了出来，毛主席的无产阶级教育路线又使我重新上了学，这是多么鲜明的对照啊。铁的事实，生动地证明了“无产阶级文化大革命不搞是不行的”。邓小平散布种种奇谈怪论，妄想一笔勾销文化大革命的丰功伟绩，抹煞教育革命的丰硕成果，那只能是搬起石头砸自己的脚！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e90c398cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
