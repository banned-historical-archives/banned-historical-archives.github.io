art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"上一堂军事课 讲一条毛主席语录炮二连训练中提高教学思想性","authors":[],"parts":[{"type":"paragraph","text":"本报讯 3228部队炮二连今年开训以来，每上一堂军事课，先讲一条毛主席语录，效果很好。"},{"type":"paragraph","text":"这个连今年的训练任务较重，军事课的时数较多。为了提高训练质量，党支部要求教练员，针对战士们的思想动态和每堂课的内容与要求，选好有关的毛主席语录，在上课时，先讲一条。如针对有些战士的和平麻痹思想，讲述毛主席揭露敌人本性、加强战斗队思想的语录；针对课题的难易，讲述不怕困难和戒骄戒躁的语录，等等。这样做的效果很好：一是战士们听课更认真了，练习的劲头更大了。瞄准手胡长江，认为“分划装定和改装”这一课是“老一套”，学习没有劲头。当教练员讲述了毛主席关于“学习的敌人是自己的满足，要认真学习一点东西，必须从不自满开始”这段话以后，他觉得就象说自己一样，很快改变了态度。不仅上课时注意听，而且更注意课后苦练。他的装定和改装技术不断提高。二是增强了教学的思想性，使战士们演练得更活了。在一次班进攻演练之前，教练员先讲述了毛主席关于“保存自己，消灭敌人”的语录。演练开始后，三班正在开阔地上运动，突然接到了用炮的口令。班长由于记着毛主席的话，便没有用立姿架炮的老做法，而是采用了荫蔽姿势架炮的新做法。既符合实战要求，又体现了消灭敌人、保存自己的原则。三是更加促进了干部、战士学习毛主席著作的积极性。干部为了选好、讲好、用好语录，就需要事前下一番钻研的苦功夫；战士们真正体验到学习毛主席语录的好处，就越加重视学习毛主席的著作了。许多人说：上军事课听毛主席的话，越听越想学，越学劲头越足。"},{"type":"paragraph","text":"（二连报道组）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d9f963e19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
