ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"请刘邓考虑以主力袭击敌后空虚地带","alias":"","parts":[{"type":"paragraph","text":"请刘邓考虑以主力袭击敌后空虚地带！"},{"type":"paragraph","text":"（1946年10月9日）刘、邓:"},{"type":"paragraph","text":"齐酉电?悉。休息数日后，请考虑以主力出至敌后空虚地带，收复各薄弱据点，占领敌交通线，以调动邱胡3，各个击破。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"酉佳"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]指1946年10月8日酉时刘伯承、邓小平给中共中央军委及陈毅、张云逸、黎玉、薄-波、王宏坤的电报。电报说：（-）张凤集战斗将敌第十一旅第四十二团大部消灭，其团长率数百人，在两营援兵和飞机掩护下突围。（二）由于敌已缩为一团，全师仅据守少数村庄，构成坚强工事，不好下手，故决停止进攻，寻求有利条件另行机动。"},{"type":"paragraph","text":"[3]邱，指邱清泉，当时任国民党军第五军军长。胡，指胡琏，当时任国民党军整编第十一师师长。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":10,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":217},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2b5150df6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
