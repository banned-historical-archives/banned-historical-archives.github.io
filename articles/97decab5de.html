人民大学","傅铁城","吴祥瑞","唐廉","李维左","濮仲文","王宪文","荣斌","赵作炜","陆戈"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"诬蔑党员和积极分子","type":"title"},{"text":"中国人民大学陆戈傅铁城唐廉赵作炜濮仲文王宪文吴祥瑞李维左荣斌","type":"authors"},{"text":"“与某同志谈到东北工学院情况，有人说：‘入党的人是拿我们的血染红的’对这种说法也无可无不可。”（中国人民大学统计系讲师陆戈）","type":"paragraph"},{"text":"污蔑党员干部为“权威人士”“老爷”“幕后指挥”“垄断一切”。谩骂党员为“死气沉沉，干面包，没有水，没有感情”“不讲政治，不能生活”。骂党的积极分子是“阿谀奉迎”“靠汇报别人思想起家”。","type":"paragraph"},{"text":"谩骂揭发他，批判他的同学是“借我的肉体，作为你们向上爬的阶梯”。（中国人民大学历史系学生傅铁城的材料）","type":"paragraph"},{"text":"“党团员缺点是主要的，是主观主义者，是教条主义者，是饱食终日无所用心的传声筒，是很事故，品质恶劣的人，是只对别人唱正气歌而肚子里另有一套的人，因此要象牛虻一样来‘刺’他们。”（中国人民大学工业经济系学生唐廉）","type":"paragraph"},{"text":"“现在有些人提意见，都把党团员提在一块儿是不恰当的，其实党员对团员也有宗派主义，团员并不象党员那样被重视、信任。在党外人士对党提意见时，最好把党团员分开，不要并提。和党员相处没有共同的语言。”（中国人民大学马列主义研究班研究生赵作炜）","type":"paragraph"},{"text":"“唯唯诺诺的盲目是为了取得一个‘共产党员’的称号。”","type":"paragraph"},{"text":"“我们绝不能再以党团员做为衡量一个人政治水平高低，我们应该（唯一的标准）造成一种社会风气要对非党人士的尊重，号召人民做一个真正的正直的人，而不是做一个共产党员，有各种各样的共产党员。”（中国人民大学计划系学生濮仲文）","type":"paragraph"},{"text":"他把积极争取入党入团的人都看成是“找政治资本”“向上爬”。他还说：“自己要求入团是为了考大学方便。”同学们在批判他的反动思想时，他骂积极分子是拿他作为入党入团的垫脚石。（中国人民大学哲学系学生王宪文的材料）","type":"paragraph"},{"text":"“积极分子就是两面派，就是昧良心办事的人。”“我打过人，捆过人，在法庭上审过人，开除过团员，当过积极分子”。他所以“落后”“言多必失，祸从口出”是领导思想上对他有了坏印象。（中国人民大学档案系学生吴祥瑞的材料）","type":"paragraph"},{"text":"“在机关、工厂……中有一批混蛋，不敢发挥自己的个性，没有思想，唯命是听，还有部分人拍马，他们可能入党入团，有些思想真正没有问题，然而不会表现，这些人不被重视，不能入党入团得不到大伙的尊重，有些人入团入党的动机不纯，党团客观上就起了钓鱼勾和蚯蚓的作用，党团员就是吃香，积极分子有些是假积极，应给与无情的打击，我校分配学生中的干部就是档案袋对相片。”（意思就是不认人，履历表和相片对起来——原编者注）……”","type":"paragraph"},{"text":"“人是个自私自利的动物，因为人也是动物的一种，黄继光只不过是个别的现象，很大一部分人把入党入团当作目的，达到到个目的进步就慢了。”（中国人民大学统计系学生李维左）","type":"paragraph"},{"text":"“拥护党的积极分子是‘唯唯诺诺’的卫道者，党团干部是‘唯命是从’的绊脚石。”（中国人民大学计划系学生荣斌）","type":"paragraph"},{"text":"“吹：吹牛腿，报成绩。提：提关系，排异己。装：装洋蒜，古来稀。骂拍：骂团员，对上级拍马屁。”（中国人民大学大字报）","type":"paragraph"},{"text":"“待月西厢下，迎风户半开，察颜观色动，随风慢慢来。”（中国人民大学历史系学生杨子伟）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97decab5de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
