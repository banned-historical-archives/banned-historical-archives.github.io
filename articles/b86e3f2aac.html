script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海东升金属厂广大革命职工狠批走资派，　打掉了修正主义企业路线　的束缚，　大胆革新，　经过反复试验，　使冶金用二氧化钛产量大增——冲破旧框框　生产大提高","authors":[],"dates":[{"year":1968,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最近，上海东升金属厂的主要产品冶金用二氧化钛的日产量比原来提高了二倍，这是该厂历年来从未出现过的最高水平。"},{"type":"paragraph","text":"这种品种是国家很需要的重要产品，直接关系到国防建设和支援世界革命人民的斗争。但是，在过去，这种产品的产量一直是上不去，质量没过关，给国家造成了很大的损失。为什么?因为厂内走资派推行一整套专家治厂的修正主义企业路线，束缚了工人和技术员的手脚。"},{"type":"paragraph","text":"无产阶级革命派掌权后，狠批了厂内走资派推行的修正主义企业路线，冲破了束缚工人手脚的旧教条、洋框框，动手搞技术革新，决心要将产量提上去，试行了一种新的工艺规程。"},{"type":"paragraph","text":"这种新工艺的试验过程，不是一帆风顺的。开始时，工人同志对这种新工艺摸不着头脑，找不到窍门，碰到了各种各样的困难。在这关键时刻，毛主席支持美国黑人抗暴斗争的声明发表了，给了广大工人和技术员巨大的鼓舞和无穷的力量。他们认真学习，越学越有劲，决心要以实际行动来支持世界革命人民的斗争。困难再大也难不倒用毛泽东思想武装起来的工人阶级。于是，他们又反复学习毛主席的教导:“任何新生事物的成长都是要经过艰难曲折的。”进一步增强了克服困难的信心，他们夜以继日地苦干、巧干，经过一个多月的反复试验，解决了影响生产的技术关键问题。同时，各车间的同志都相互密切配合，终于摸索出适合新工艺的操作规程，这是战无不胜的毛泽东思想又一新胜利。"},{"type":"paragraph","text":"按照新的工艺规程进行生产，使该厂能按照国家需要任意安排各品种产品间的相对产量，掌握了生产的主动权，既不增加一分钱的设备，又节约了劳动力，缩短了生产周期，减少了生产成本等，冶金用二氧化钛的产量大大提高了。"},{"type":"paragraph","text":"以上均为本报通讯　员、本报记者采写"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b86e3f2aac"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
