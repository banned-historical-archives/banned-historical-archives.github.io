郭沫若"],"dates":[{"year":1960,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举起毛泽东思想的红旗前进！"},{"type":"paragraph","text":"——献给全国文教群英大会——"},{"type":"paragraph","text":"郭沫若"},{"type":"paragraph","text":"高举起毛泽东思想的红旗前进，"},{"type":"paragraph","text":"为了多快好省把社会主义建成，"},{"type":"paragraph","text":"不论是教育、文化、卫生、体育、新闻，"},{"type":"paragraph","text":"我们在每一个方面要树立标兵！"},{"type":"paragraph","text":"要学先进，比先进，赶先进，帮后进——"},{"type":"paragraph","text":"把困难加紧克服，努力找寻窍门！"},{"type":"paragraph","text":"在全国正大闹文化和技术革命，"},{"type":"paragraph","text":"到处都看到百花齐放、推陈出新。"},{"type":"paragraph","text":"昨天还是文盲，今天已成为先生！"},{"type":"paragraph","text":"昨天还是保姆，今天已有了发明！"},{"type":"paragraph","text":"为什么出现了奇迹如此地惊人？"},{"type":"paragraph","text":"关键在党的领导，有了政治灵魂！"},{"type":"paragraph","text":"为社会主义服务是文教的根本，"},{"type":"paragraph","text":"和生产劳动结合是教学的方针。"},{"type":"paragraph","text":"在科学的基础上发扬三敢精神，"},{"type":"paragraph","text":"树立下大志，解放思想，破除迷信。"},{"type":"paragraph","text":"人所未曾做到的，我们不能坐等；"},{"type":"paragraph","text":"人所已曾做到的，我们决不后人。"},{"type":"paragraph","text":"石榴花正鲜红如火地欢迎我们，"},{"type":"paragraph","text":"让我们像初夏的太阳不断上升。"},{"type":"paragraph","text":"干劲没有止境，上游也没有止境，"},{"type":"paragraph","text":"一定要赶上和超过世界的水平。"},{"type":"paragraph","text":"为了多快好省把社会主义建成，"},{"type":"paragraph","text":"高举起毛泽东思想的红旗前进。"},{"type":"paragraph","text":"一九六○年五月二十四日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63d6f2dcb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
