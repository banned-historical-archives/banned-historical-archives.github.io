r":1976,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席叫我上讲台"},{"type":"paragraph","text":"工人技术员　马金荣当我第一次登上讲台，激情象黄浦江潮滚滚"},{"type":"paragraph","text":"来：旧社会老板骂我“穷瘪"},{"type":"paragraph","text":"三”，庆解放，扬眉吐气喜满"},{"type":"paragraph","text":"怀。哪想到，教育路线被篡"},{"type":"paragraph","text":"改，工人仍旧被关在校门外。文化大革命红旗展，毛主席叫我上讲台……几十双眼睛对我瞧，几十双眼神放异彩——坐在前排那姑娘，是我徒弟张晓莱，两眼含笑在期待："},{"type":"paragraph","text":"“师傅啊，你快讲起"},{"type":"paragraph","text":"来！”后面的那位老工人，是我的师傅李洪泰，目光炯炯象在说：“怕个啥？有咱工人作后"},{"type":"paragraph","text":"台！”党委书记对我把头点，满眼深情有光彩：“毛主席叫咱上讲台，阶级重任挑起来，反修防修万年计，培养革命新一代。”一双双眼神满腔情啊，使我心潮澎湃如东海。拿起工人编的新教材，千言万语讲开了怀……"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63ead56d0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
