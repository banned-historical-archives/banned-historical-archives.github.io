ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给毛爱桂的信","alias":"","parts":[{"type":"paragraph","text":"给毛爱桂?的信"},{"type":"paragraph","text":"（1950年5月12日）爱桂先生："},{"type":"paragraph","text":"来信收到。令兄爱棠于一九二六年参加北伐军，在广东曾见过一面，以后即未见过。有人说已牺牲了，极为可惜。这是为国牺牲，是光荣的。此复，并候合家清吉！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五0年五月十二日李远明先生同此不另。"},{"type":"paragraph","text":"[1]毛爱桂，1914年生，湖南省韶山市韶山乡韶山村人，农民。毛泽东的族叔。"},{"type":"paragraph","text":"[2]爱棠，即毛爱堂（1895—1927）。1925年赴广州参加革命，曾为广东省中共党组织工作人员。1927年在湖北武昌牺牲。"},{"type":"paragraph","text":"[3]李远明（1895—1951），湖南省韶山市永义乡狮山村人，毛爱桂的姐夫。毛泽东在长沙读书和在韶山开展农民运动时，李家曾给予资助。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":381,"page_end":381},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db31ab78b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
