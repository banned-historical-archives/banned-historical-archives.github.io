社同西方通讯社是一路货","authors":[],"dates":[{"year":1966,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"玻共《解放报》痛斥塔斯社对中国文化大革命的攻击"},{"type":"paragraph","text":"苏共领导奴颜婢膝为美帝效劳  塔斯社同西方通讯社是一路货"},{"type":"paragraph","text":"新华社讯　拉巴斯消息：玻利维亚共产党中央委员会机关报《解放报》最近发表文章，强烈谴责苏联塔斯社同美帝国主义一唱一和，疯狂攻击中国共产党、中国人民的伟大领袖毛主席，和正在中国开展的无产阶级文化大革命。"},{"type":"paragraph","text":"文章说：自从现代修正主义篡夺苏共领导权以来，塔斯社一个劲儿地诬蔑全世界的马克思列宁主义者，为美帝国主义的利益效劳。塔斯社这种勾当近日来更加露骨，因为它大量诬蔑攻击中华人民共和国，攻击中国共产党领导人，特别是攻击毛泽东主席和正在中国胜利开展的文化革命。"},{"type":"paragraph","text":"文章说，塔斯社的诬蔑同美联社、合众国际社和其他西方通讯社的目的是一致的，就是诋毁中华人民共和国，为美国统治集团服务，企图分裂和瓦解各国人民，特别是那些为民族解放而斗争的人民。文章指出，塔斯社之所以播发这样的消息，根源在于奴颜婢膝地为美帝国主义利益效劳的现代修正主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ccd009d6a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
