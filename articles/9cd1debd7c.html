<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"让毛泽东思想永放光芒","authors":["广东省博罗县黄山洞大队党支部"],"dates":[{"year":1976,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"让毛泽东思想永放光芒"},{"type":"paragraph","text":"广东省博罗县黄山洞大队党支部"},{"type":"paragraph","text":"我们黄山洞大队广大共产党员、干部和社员群众，听到了中共中央、人大常委会、国务院、中央军委关于建立伟大的领袖和导师毛泽东主席纪念堂的决定，中共中央关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定，心情无比激动。这两项重要决定，充分表达了我们贫下中农和亿万人民群众的心愿。以华国锋同志为首的党中央同我们心连心。我们一定要继承毛主席的遗志，坚决响应以华国锋同志为首的党中央的号召，掀起一个学习马列著作和毛主席著作的新高潮，把无产阶级革命事业进行到底。"},{"type":"paragraph","text":"我们黄山洞大队地处偏僻的桂山山区，过去是个有名的穷山村，山秃、水恶、地瘦、人穷。在万恶的旧社会，由于帝国主义、封建主义、官僚资本主义三座大山的压迫，我们贫下中农过着牛马般的生活。是伟大领袖毛主席把我们从苦难的深渊中救了出来，指引我们走上了社会主义的金光大道。一九六四年，全大队贫下中农在党支部领导下，以青年民兵为骨干，掀起了波澜壮阔的学习毛主席著作群众运动。但是，由于刘少奇反革命的修正主义路线的干扰和破坏，我们很难买到毛主席著作。大家怀着无限热爱伟大领袖毛主席的深厚无产阶级感情，点着小油灯，通宵达旦，把毛主席著作的单行本一句一句地抄下来，广泛传读，如饥似渴地学习。在文化大革命、批林批孔、批邓、反击右倾翻案风的斗争中，我们进一步发展了学习毛主席著作的群众运动。"},{"type":"paragraph","text":"毛泽东思想一旦武装了群众，就变成巨大的物质力量。一九六三年，全大队的水稻总产量只有二十三万多斤，一九七五年增加到八十八万多斤。集体经济不断壮大，社员生活水平不断提高。昔日的穷山沟，变成了山青、水秀、地沃、人红的“红山洞”。"},{"type":"paragraph","text":"回忆过去的战斗历程，我们更加认识到学习毛泽东思想的重要意义，更加感到中央两项决定十分正确，十分及时。我们要坚决响应以华国锋同志为首的党中央的号召，迅速掀起一个学习马列著作和毛主席著作的新高潮。当前，我们要认真学习毛主席关于无产阶级专政下继续革命的理论，学习毛主席在批邓、反击右倾翻案风斗争中的一系列重要指示，坚持以阶级斗争为纲，坚持党的基本路线，坚持无产阶级专政下的继续革命，深入批邓，继续反击右倾翻案风。我们一定要认真学习毛主席关于“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，同一切违背这三项基本原则的言论和行动作坚决的斗争。任何背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席指示的人，任何搞修正主义、搞分裂、搞阴谋诡计的人，是注定要失败的。我们誓同这些人作坚决的斗争。"},{"type":"paragraph","text":"我们一定在斗争中学好毛泽东思想，让毛泽东思想的光辉永远照亮黄山洞，照亮祖国的山山水水。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cd1debd7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
