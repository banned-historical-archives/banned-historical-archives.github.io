dates":[{"year":1980,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社长沙三月三十一日电　三月三十日是我党早期卓越的无产阶级革命家和领导人之一蔡和森同志诞辰八十五周年。中共湖南省双峰县委举办的蔡和森同志纪念展览，于三月二十九日在双峰县城展出。"},{"type":"paragraph","text":"蔡和森的童年和少年时代是在家乡双峰县度过的。这个展览除着重反映他青少年时期勤奋学习、追求真理的优秀品质外，还简要地介绍了他为革命奋斗终身的功绩。"},{"type":"paragraph","text":"这个纪念展览还展出了邓小平、陈云、聂荣臻同志为纪念蔡和森诞辰八十五周年的题词。邓小平的题词是:“蔡和森同志是我党早期的卓越领导人之一，他对中国革命作出了重大的贡献，中国人民永远记着他。”陈云的题词是:“向为革命而牺牲的蔡和森同志致敬!”聂荣臻的题词是:“我党早期卓越的无产阶级革命家蔡和森同志永远活在我们心中。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"481ead2e5b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
