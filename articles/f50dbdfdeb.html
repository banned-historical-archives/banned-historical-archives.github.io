ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"新四军能否应付国民党的袭部","alias":"","parts":[{"type":"paragraph","text":"新四军能否应付国民党的袭击！"},{"type":"paragraph","text":"（1940年4月3日）项英同志："},{"type":"paragraph","text":"请以你对下列各项的意见电告：（一）军部及皖南部队被某方袭击时是否有冲出包围避免重大损失的办法，其办法以向南打游击为有利还是以向东会合陈毅为有利，渡江向北是否已绝对不可能？（二）党内十部是否已有应付某方可能袭击的精神上充分准备？（三）皖南、江南地区各友军中是否有坚持抗日同情我党的高级中级进步军官与进步部队，在突然事变时是否有掩护我军或与我军一致行动的可能，我在附近友军中统一战线工作如何？（四）某方在第三战区的意向如何，顾祝同?等中央军态度如何，黄绍雄态度如何，东南局领导下的地方党是否有保存干部、积蓄力量、应付突然事变的精神上和实际上的准备？"},{"type":"paragraph","text":"泽东"},{"type":"paragraph","text":"三日[1]这是毛泽东给中共中央军委新四军分会书记、新四军副军长项英的电报。[2]陈毅，当时任新四军江南指挥部指挥。[3]顾祝同，当时任国民党军第三战区司令长官。"},{"type":"paragraph","text":"[4]黄绍雄，即黄绍，当时任国民党浙江省政府主席、国民党军第三战区游击总司令部总司令。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":517,"page_end":517},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f50dbdfdeb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
