<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji5","name":"毛泽东全集第5卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"红军第一方面军总前委第一次扩大会议记录我","alias":"","parts":[{"type":"paragraph","text":"红军第一方面军总前委第一次扩大会议记录川"},{"type":"paragraph","text":"（1931年6月22日）（上略）二十二日午后二时到会人数同前主席——王稼祥宣布继续开会（一）予期第三期战争地区的选定问题"},{"type":"paragraph","text":"毛：头一次已经说过了，第三期作战大概会在由南丰来打我们，那么我们就好办，可以引敌深入宁都、黄陂、小布甚至石城才打。如果敌人由兴国、白沙、水南、南丰四处来时，甚至乐安也来一路，富田、东固来一路，那就不好，等他到东固、龙岗，敌人只集合一路的，是很少的。如果估量敌人两路来时，我们应该努力多做赣南一带深入工作，如果蒋蔡也来打我们时，这回我们是可以不等他做好工事就要打他们，这回是可以打他的。那么，就应布置于都的战场，并且一定要打开七坊，三军要全部去打垮蒋、蔡，是可以使南京政府与广东政府的力量平衡起来了，所以蒋、蔡的行动直"},{"type":"paragraph","text":"[1]本会议的参加者为毛泽东、王稼祥、周以栗、朱德、彭德怀、林接关系于我们的战区选择，这是要讨论的。"},{"type":"paragraph","text":"彭：白军在两次失败中深知不能围攻，所以这回是会更集中力量夹道并进。如果敌人加强力量更会合拢来，那就不好。放弃东固、龙岗，如蒋、蔡仍由兴国侧进，以兴国宁都为目标，我们就在于都布置战场，蒋介石要树立他的声威的企图之下，应是能求达到击破我们的目的，而不再梦想“消灭”红军了。因此，敌人一路合拢前进时，可由他深入，分几路合围时，就不等他逼近时就打。"},{"type":"paragraph","text":"毛：敌人如由南丰前进，只能在广昌以北有船运输，所以敌人八月十五号以前只能进到广昌，以后有新谷了，才能再进，七月以前我们可以努力筹款，八月也可以不管他，主要在于、瑞、石、汀四县布置巩固的苏区做战场。"},{"type":"paragraph","text":"林：以上所说大部同意。敌人下次分三路前进，仍不过以前路线。中路会增多加强兵力，敌人利在速战，我们要延迟。蒋、蔡为了对付蒋方，和部队去接防，因此不好离开赣州由吉安来。我们现在就应加紧布置这一带工作，自然将来作战，只要有利条件时就可打。"},{"type":"paragraph","text":"欧阳：蒋、蔡在二期作战中进得非常之慢，而赣州报纸满布反蒋空气（二十九号以前），蒋、蔡有点不听蒋介石命令的样子。"},{"type":"paragraph","text":"朱：将来打还是打朱绍良为有利，战场应以、龙岗为中心，广大群众配合，在目前他不能来快。"},{"type":"paragraph","text":"蔡：大致我是同意的，并且敌人也必然把主力放在南丰至广昌这一路，蒋、蔡反蒋的成分会多些，作战地区无论在哪里，争取于北是必要的，是为了巩固赤区与打通兴、于、宁联系。前回许多部队去打，赖村还有些打不下，现在三军只以两师去攻打，布置不开。"},{"type":"paragraph","text":"周：敌人三次进攻至少有三路；战场应在兴、于、宁、瑞一带布置。"},{"type":"paragraph","text":"欧阳：第三次进攻蒋，决不围攻，最多一两路，南丰一路，吉或永一路，蒋、蔡反蒋成分多些，是不易来的。不反蒋就有后方，这回如不反蒋，就不应退赣州，他只有两师敢向广东移动，必是打广东，战场应在宁都、瑞金间。"},{"type":"paragraph","text":"主席我们只能大略分析，以便准备工作，现在永丰工作须即刻整顿，赣南于北一带，土围要即消灭，争取到我们手上。在赤区中要防AB团及敌探侵入，医院原则要搬，暂时不动。"},{"type":"paragraph","text":"毛：南丰之敌现有退走模样。如敌退出南丰，三军之一师，应进到南丰以北里塔一带工作。十二师应移到新丰市工作，三军对赣南工作不但不要增加部队，并且要减少，因为战期必会比较延长。"},{"type":"paragraph","text":"（二）红军学校问题。（略）（三）二期战争教训待汀州会议讨论。"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":6,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":351,"page_end":353},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42843c74e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
