hors":[],"dates":[{"year":1980,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人大常委会欢宴泰国众议院议会代表团"},{"type":"paragraph","text":"叶剑英、邓颖超、廖承志会见泰国贵宾"},{"type":"paragraph","text":"据新华社北京11月11日电  人大常委会今晚举行宴会欢迎由泰国众议院议长汶廷·通沙瓦率领的泰国众议院议会代表团。"},{"type":"paragraph","text":"人大常委会副委员长廖承志在宴会上讲话指出，中泰两国友好合作关系的不断加强，不仅是两国人民的共同愿望，也是维护东南亚地区的和平和稳定的一个重要因素。他说，中泰两国人民都热爱和平，反对霸权主义的侵略和扩张。中国人民对泰国政府和人民维护国家主权和领土完整，反对外来侵略的正义斗争表示赞赏，并坚决支持泰国政府和人民的这一正义立场。"},{"type":"paragraph","text":"汶廷·通沙瓦在宴会上讲话时指出，在目前的形势下，为维护正在遭受严重威胁的东南亚地区和平，泰中两国应该紧密地合作。他说，两国人民代表之间的互访，使我们有机会交换看法和意见，加深了解，这是加深两国人民相互了解的一种途径。"},{"type":"paragraph","text":"据新华社北京11月11日电  人大常委会委员长叶剑英、副委员长邓颖超、廖承志，今天下午在人民大会堂会见泰国众议院议长汶廷·通沙瓦和由他率领的泰国众议院议会代表团。叶剑英对泰国朋友来访表示热烈欢迎。他说，中泰两国历史上有着共同的遭遇，都具有反对帝国主义侵略的传统。他对泰国政府谴责越南侵略柬埔寨的正义立场表示赞赏。"},{"type":"paragraph","text":"叶剑英请汶廷·通沙瓦转达他对泰国国会议长哈林·宏沙军的亲切问候。邓颖超说，这么多朋友来我国访问是值得高兴的事。"},{"type":"paragraph","text":"汶廷·通沙瓦说，我们这次访问中国的主要任务是，加强泰中间业已存在的友好关系，使这一关系进一步密切和发展起来。泰中友谊将万古长青。"},{"type":"paragraph","text":"今天上午，廖承志还到宾馆看望汶廷·通沙瓦等泰国贵宾。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26fcea6e85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
