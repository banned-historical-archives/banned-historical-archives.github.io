"authors":[],"dates":[{"year":1957,"month":12,"day":4}],"is_range_date":false,"parts":[{"text":"集中攻击党对科学的领导　老右派分子叶笃庄被揪出","type":"title"},{"text":"《人民日报》讯：中国农业科学院又揪出了一个老牌右派分子——叶笃庄。叶笃庄是民盟中国农业科学院支部主任委员，一个混在科学界的政治骗子。","type":"paragraph"},{"text":"叶笃庄长期把民盟组织作为他反对共产党、同共产党争夺领导权的工具。他埋怨“盟只是参加施工，而不能参加设计”。他集中攻击党对科学的领导，污蔑党的领导是“永远说那套不着边际的空话的教条主义者”。他破坏党与知识分子的关系，诋毁共产党对知识分子的看法是“非我族类，其心必异”。肃反运动中，他长期隐瞒的反动历史受到了审查，肃反后他到处叫嚷说他原来是香的，共产党把他搞臭了，到处奔走翻案。","type":"paragraph"},{"text":" ——原载《人民日报》1957年12月4日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd2a31b735"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
