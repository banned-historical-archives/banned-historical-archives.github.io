art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为什么修正主义是目前的主要危险","authors":[],"parts":[{"type":"paragraph","text":"为什么修正主义是主要危险呢？现在有许多社会主义国家，例如我们中国，虽然已经完成了经济上的社会主义革命，但是远没有完成政治上和思想上的社会主义革命。资产阶级、小资产阶级和它们的知识分子，在社会上的影响还大，不稳定的共产主义者不仅会受到他们的影响，而且容易同他们合流；同时资产阶级、小资产阶级和它们的知识分子，在革命狂潮下，也拥进革命阵营里来了，他们中间的一些人，思想没有得到根本改造，就常常变成各种变种的修正主义者，表面上披着马克思主义外衣，骨子里干着阉割马克思主义革命精髓的勾当，来破坏社会主义的建设事业。因此，社会主义国家如果不克服修正主义，那么社会主义的建设事业是没有保障的。至于在资本主义国家，资产阶级的思想是统治的思想，修正主义就更有深厚的社会根源，如果不战胜修正主义，就不能使广大工人走上革命化的道路。特别是在去年，帝国主义发动了新的反共高潮，国际共产主义运动中的一部分不稳定分子，对共产主义事业缺乏信心，看不到社会主义的力量，被外强中干的帝国主义者张牙舞爪的假威势吓怕了，于是就走上了背离革命的修正主义的道路。去年一年中，共产主义运动的大合唱中，发出了一些不合拍的修正主义调子，原因就在这里。因此，在目前如果不克服这种长敌人威风、灭自己志气的修正主义，我们的事业就不能继续向前发展。"},{"type":"paragraph","text":"（摘自1957年政治学习第十二期张香山：“历史性的会议和伟大的宣言”）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cef45231ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
