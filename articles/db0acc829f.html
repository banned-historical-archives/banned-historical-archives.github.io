ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央转发西南局关于逮捕和判处反革命分子批准权的六项规定的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发西南局关于逮捕和判处反革命分子批准权的六项规定的批语"},{"type":"paragraph","text":"（1951年12月18日）"},{"type":"paragraph","text":"[1]中共中央西南局关于逮捕和判处八方面及工矿交通企业中反革命分子的批准权的六项规定是：（一）八方面是指党、政、军、民和各民主党派5个方面的干部；宗教界中的骨干分子及社会知名人士；文教界的文教工作者，包括小学教职员以上，文艺、曲艺工作者中有影响的人士在内；工商界中的主要资本家及在工商界中有影响的知名人士。工矿交通企业，是指厂矿交通企业中的职员、干部。（二）凡逮捕上述人员中的反革命分子，共产党内区委书记以上，人民政府和人民团体内相当于县长和省专处、局长以上干部，民主党派、文教界、宗教界、工商界中县以上有影响的知名人士，及500人以上的厂矿中所长、科长以上职员干部等人员中的反革命分子，重庆、川东、川西、川南、川北5地归大行政区批准，云南、贵州、西康3省，委托各该省区党委代大行政区审批。除以上所列人员外的反革命分子，全区均委托各省区（市）党委代大行政区审批。（三）工矿交通企业部门一般工人中反革命分子的逮捕权，由相当于地委级以上的市委批准。其中，专案和牵连人数众多的大案件，应由省区（市）党委亲自掌握逮捕权。（四）凡判处八方面和工矿交通企业职员干部中的反革命分子死刑，死刑缓期执行，一律报经大行政区审批。无期徒刑和有期徒刑，一律由省区（市）党委批准。（五）工矿交通企业中控诉对象，斗争对象，事先亦应一律经过当地市委或人民政府相当党委批准。（六）在逮捕前，必须充分掌握材料，各级党委要逐级详细审查。坚持可捕可不捕坚决不捕的原则，和只杀罪该处决中的十分之一二，以防止打击面过宽，波动过大，便于争取群众，孤立和打击其中少数坚决的反革命分子。"},{"type":"paragraph","text":"中央转发西南局关于逮捕和判处反革命分子批准权的六项规定的批语各中央局，并转分局、省市区党委："},{"type":"paragraph","text":"兹将西南局十二月十三日关于逮捕和判处八方面及工矿交通企业中反革命分子的批准权问题的六项规定转发给你们。中央认为这些规定是正确的和必要的，各地均应照此办理。"},{"type":"paragraph","text":"中央十二月十八日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":155,"page_end":156},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发西南局关于逮捕和判处反革命分子批准权的六项规定的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":18}],"is_range_date":false,"parts":[{"text":"中央转发西南局关于逮捕和判处反革命分子批准权的六项规定的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局，并转分局、省市区党委：","type":"appellation"},{"text":"兹将西南局十二月十三日关于逮捕和判处八方面及工矿交通企业中反革命分子的批准权问题的六项规定转发给你们。中央认为这些规定是正确的和必要的，各地均应照此办理。","type":"paragraph"},{"text":" 中央十二月十八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db0acc829f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
