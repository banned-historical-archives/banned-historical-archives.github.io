art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见瑞典国王和王后","authors":[],"parts":[{"type":"paragraph","text":"新华社9月14日讯 人大常委会委员长叶剑英今天晚上在人民大会堂上海厅会见瑞典国王卡尔十六世·古斯塔夫和王后西尔维娅陛下。"},{"type":"paragraph","text":"叶剑英对国王和王后前来我国进行国事访问表示热烈欢迎。他说，瑞典人民是同中国人民友好的。"},{"type":"paragraph","text":"卡尔十六世·古斯塔夫说，瑞中两国三十多年前就建立了正式外交关系，瑞典的广大人民对中国发生的一切事情都很感兴趣。他还谈到这次对中国的访问，是他期待已久的。"},{"type":"paragraph","text":"瑞典司法大臣卡尔·阿克塞尔·佩特里，劳工、能源大臣英厄马尔·埃利亚松，国王军事参谋长斯蒂格·辛内格伦将军，瑞典驻中国大使斯滕·松德费尔特，参加了会见。"},{"type":"paragraph","text":"会见时在座的有人大常委会副委员长习仲勋，国务院副总理兼外交部长黄华和夫人，中国驻瑞典大使曹克强。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d63b68b75"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
