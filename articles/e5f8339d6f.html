语","authors":["刘少奇"],"dates":[{"year":1950,"month":4}],"is_range_date":false,"parts":[{"text":"关于小土地所有者标准问题的批语","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"大多数中农，一部分贫农，也是小土地所有者。华东局这个规定[1]不完全对。交政研室研究后答复[2]。","type":"paragraph"},{"text":" 刘少奇","type":"paragraph"},{"text":"根据手稿刊印。","type":"paragraph"},{"text":"注释：","type":"appellation"},{"text":"[1]中共福建省委一九五〇年四月十二日致电华东局，请示小土地所有者的标准问题。四月二十六日，华东局就此问题复电福建省委并报中央。该电说：我们意见凡从事其他职业或因缺乏劳动力而出租少量土地、或因劳动积蓄而购买少量土地者，谓之小土地所有者。至于所谓少量土地数额标准的规定及将来在土改中对小土地所有者超过定额土地的处理办法，尚在研究中，俟中央有了统一规定后再告。上述 意见如有不妥之处，请中央指示。","type":"paragraph"},{"text":"[2]中共中央政策研究室秘书长廖鲁言在写有刘少奇批语的华东局四月二十六日电报上批注：此问题已当面答复刘瑞龙(当时任中共中央华东局农村工作委员会书记)同志，不必再复。","type":"paragraph"}],"comments":[],"origin":"《建国以来刘少奇文稿第二册(一九五〇年四月——一九五〇年十二月)》，中共中央文献研究室，中共档案馆，2005年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5f8339d6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
