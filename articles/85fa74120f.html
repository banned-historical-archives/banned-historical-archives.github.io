rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"干革命靠的就是毛泽东思想","authors":["武汉部队学习毛主席著作积极分子宋乐山"],"parts":[{"type":"paragraph","text":"听说我们最最敬爱的领袖毛主席又一次接见首都和外地来京的革命师生，真是振奋人心。我们伟大的领袖毛主席，最相信群众，最支持群众的革命运动，永远和革命群众心连着心。"},{"type":"paragraph","text":"这几天，我怀着无限崇敬的心情，再一次读了《湖南农民运动考察报告》，越读心越亮，越觉得毛主席英明伟大。从中国共产党领导中国人民闹革命那天起，毛主席就紧紧地和广大革命群众站在一起，时时处处都最关心和最支持人民群众的革命行动，指导中国革命取得一个又一个的巨大胜利，建立了无产阶级专政的新中国。这些天来，我也亲眼看到了武汉红卫兵和广大革命群众大破“四旧”，大立“四新”，建立了光辉的功勋。这一切都是我们伟大的统帅毛主席领导得好，干革命就得靠毛泽东思想！"},{"type":"paragraph","text":"我是一名解放军，是毛主席的战士。我坚决响应林彪副主席的号召，高举毛泽东思想伟大红旗，活学活用毛主席著作，用毛泽东思想武装头脑。在阶级斗争的大风浪中，坚决支持广大红卫兵和革命群众，奋勇前进，把一切牛鬼蛇神统统打倒，彻底挖掉修正主义和资本主义的根子，使它们永世不得翻身！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85fa74120f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
