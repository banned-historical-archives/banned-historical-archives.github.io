authors":[],"dates":[{"year":1958,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"西安交通大学通过对105名右派分子的处分决定","type":"title"},{"text":"（中共西安交通大学）常委在昨天上午举行第15次扩大会议。会议首先讨论了对右派分子的处理问题。经过会议讨论，通过了对学生中的105名右派分子的处分决定，其中开除学籍、劳动教养者1人，开除学籍、留校监督劳动者1人，保留学籍、劳动察看者26人，留校察看、继续学习者65人，免于处分者11人，免予右派处分者1人。","type":"paragraph"},{"text":"学校决定处理学生中105名右派分子","type":"subtitle"},{"text":"开除学籍，劳动教养：陆友全","type":"paragraph"},{"text":"开除学籍，留校监督劳动：吴自谋","type":"paragraph"},{"text":"保留学籍，劳动察看：","type":"paragraph"},{"text":"杨永清、李高标、卢绍箕、李昶、宗慕渝、钱文兰、祁少平、侯守忠、张富仁、孟镜平、斐迪生、王炳根、王瑛、王庆华、王文烈、程杏林、周郊如、姚国梁、吴遇、肖子愈、沈慧良、张箕翊、吴成琏、郑剑平、马士楷、张川翰","type":"paragraph"},{"text":"留校察看，继续学习：","type":"appellation"},{"text":"王产根、林桂良、程广明、钱康仁、王维琦、辛金山、葛世昌、冷雪明、蒋鸿荣、曾广燕、杨世鸿、张幼龙、董立照、陈钤、李继忠、朱肖琦、张大年、陆维城、吴绍基、詹格东、解鸿志、黄镜清、李大全、李真理、任天麟、高学荃、张冠如、邵林烐、施康元、李杏林、李居正、施槐遂、林循常、张问骅、封元信、周元旦、章仲华、彭元化、曾庆刚、李世昌、孙鹤鸣、余登科、王天栋、洪育贤、吴斌、白廉生、黄宗逸、徐步淦、吴盈森、唐祖恭、陈畯、徐明昌、伊善兴、舒立民、何德梁、胡隶煌、李则纯、金寿森、吴健、方广、张定、李嘉民、赵文星、方季秋、何少华","type":"paragraph"},{"text":"免予处分：","type":"paragraph"},{"text":"陈友陶、杜国华、颜新民、钱增华、秦一明、何家曾、陈镛、庄智金、尚世任、李灿射、邓桢强","type":"paragraph"},{"text":"免予右派处分：张瑞彬","type":"paragraph"},{"text":"会议接着讨论了学校组织机构问题。人事处林星处长在会上将群众讨论情况作了汇报。经过讨论修正，会议一致通过了本校西安部份组织机构方案。","type":"paragraph"},{"text":"会议最后讨论了勤俭办学问题，会议决定成立教学生产、勤俭办学、勤工俭学三个小组，并指定了各小组的负责人或负责单位。　（陈钦德）","type":"paragraph"}],"comments":[],"origin":"《交大》（西安部分）校刊，1958年2月16日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37dda45da6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
