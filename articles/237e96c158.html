","authors":[],"dates":[{"year":1950,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国保卫世界和平委员会上海分会通知"},{"type":"paragraph","text":"一、本市和平签名运动宣传周，订于今日开始，预定至七日结束。各区各单位，希即根据前发“宣传要点”，结合毛主席最近在中央人民政府委员会上的讲话、周外长驳斥杜鲁门侵略阴谋的声明、人民日报有关社论等展开广泛深入之宣传活动。号召全市各界人民拥护毛主席指示及周外长声明，反对美帝国主义侵略中国及亚洲人民的阴谋，并以实际行动加强保卫世界持久和平的力量，打败美帝国主义的挑衅。"},{"type":"paragraph","text":"二、和平签名运动宣传周临时办事处设于河南中路三○八号底层，电话一五一四三转接。各界有事接洽及反映情况，均向上述地址联系。"},{"type":"paragraph","text":"【本报讯】　一个签名，一分力量；保卫世界和平的签名运动，正在本市蓬勃展开，各界纷纷动员，深入群众，准备在今天开始的和平宣言签名周内，光荣完成全市签名二百万人的目标。"},{"type":"paragraph","text":"青年学生界已印就三十六开的和平宣言，将在青年学生中大力掀起签名热潮。学校方面因学期总结关系，决定采取分散活动方式，每人深入家庭，发动家长在和平宣言上签名。科技界除印制三十二开和平宣言发给各科技团体外，并准备抓紧机会，通过会议配合下乡除虫工作，号召大家参加签名。工会方面已印发活页和平宣言十万份，分发各产业工会转发各会员参加签名，昨晨并举行动员大会。沪西区工人俱乐部和沪东区劳动公园等在这一周中也都有活动。妇女界定七月一日(今日)和七月四日两天作为宣传重点，她们将组织工作人员深入里弄棚户，广泛开展签名运动，到目前为止，她们已获得初步成绩，仅静常区就有一两万市民在和平宣言上签了名。宗教界今天下午三时在八仙桥青年会交谊厅学行基督教、佛教、回教座谈会，座谈保卫世界和平的重大意义。"},{"type":"paragraph","text":"【又讯】为响应本市和平宣传周的举行，剧影协明天(星期日)早晨九时在兰心戏院，请陈处孙报告保卫世界和平的意义，通过这个报告，将动员会员分头发动和平签名，总目标至少一万人。"},{"type":"paragraph","text":"【又讯】上海路局车务段的青年列车员，于本月廿九日，在廿六次的沪锡车上，发动了请旅客签名保卫世界和平运动。"},{"type":"paragraph","text":"【又讯】七月一日至七月七日为保卫世界和平宣传周，路局将在各次列车上，发动旅客们在保卫世界和平签名书上签名。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"237e96c158"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
