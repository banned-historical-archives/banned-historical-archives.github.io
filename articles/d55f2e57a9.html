art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东不为亲友谋私利","authors":[],"parts":[{"type":"paragraph","text":"新中国成立之后，毛泽东收到了杨开慧的哥哥杨开智寄来的一封信。信中，杨开智希望毛泽东能为自己在北京安排一份工作。对于杨开智，毛泽东是心存感激的：杨开慧牺牲以后，杨开智料理了杨开慧的后事，后来还把毛泽东与杨开慧的儿子毛岸英护送到上海，把他交给党组织照顾。但收到信后，毛泽东还是拒绝了杨开智的请求，告诉他不要抱有任何想法，希望他“安心留在湖南，通过正规渠道从事能力所及的工作”。"},{"type":"paragraph","text":"收到回信，杨开智仍不甘心，又给毛岸英写了一封信，表达出想在长沙谋一个“厅长方面职位”的想法。在毛泽东的授意下，毛岸英回了一封3000字的长信，委婉拒绝了杨开智的请求。"},{"type":"paragraph","text":"作为党和国家领导人，毛泽东深刻认识到，权力是人民给的，只能为人民服务，绝不允许为亲友谋取任何私利，他为党员干部如何在人情面前正确行使权力树起一面旗帜。"},{"type":"paragraph","text":"（卞良锋辑）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d55f2e57a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
