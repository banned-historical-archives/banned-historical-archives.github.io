":[],"dates":[{"year":1950,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社广州十三日电】　由苏联列宁共产主义青年团中央委员、苏联青年反法西斯委员会副主席裴斯良克领队的苏联青年表代团一队十人，于十二日下午八时二十分乘火车由汉口抵达广州。前往车站欢迎的有中共中央华南分局书记、广东省人民政府主席叶剑英，副主席方方、古大存、李章达，广州市人民政府副市长朱光，新民主主义青年团华南工作委员会书记黄焕秋，青年团广州市工作委员会书记陈恩，广东军区副司令员洪学智，军区副政委赖传珠，人民解放军十五兵团政治部主任着向荣，中苏友好协会广州分会副理事长杜国庠、总干事欧阳山，广东省总工会筹备处主任林锵云，各民主党派代表郭翘然、李伯球，陈其尤、张文、丘哲，以及各工厂、学校、驻军、机关团体等青年代表五千余人。代表团下车后，欢迎群众即于车站举行欢迎会。代表团人员在历久不息的掌声中一一被介绍与欢迎群众见面，新民主主义青年团华南工委会及市工委会、学校、机关青年团代表等二十余人纷纷上前献花。接着由青年团华南工作委员会书记黄焕秋致欢迎辞，代表团方面则由体队裴斯良克致答辞，对中苏两国劳动人民和青年的斗争和胜利五致敬意和祝贺。"},{"type":"paragraph","text":"【本报南京十四日专电】　苏联青年代表团于今(十四日)晨七时五十分到达南京，各界青年代表六百余人和党政军首长在下关车站举行欢迎大会，南京市副市长柯庆施代表南京人民致欢迎词，冯文彬同志接着介绍了米哈依洛夫致答词:“南京过去是国民党反动派的首都，由于中国人民的胜利，南京已变成人民的了，并预祝南京青年在改造和建设新南京中获得光辉成绩。”代着团进城在市政府交际处稍事休息后，即开始游览参观伪总统府，访问中山陵和瞻仰孙中山先生灵榇。华东射击英雄魏来国和人民护士李南丁陪同参观，魏来国和依万·阔日杜布二人在游览中挽臂而行，沿途青年们欢呼不绝。中午代表团出席了五万人的部队青年讲演会和南京大中小学校及各机关青年的欢迎会。晚上南京各界青年又举行了盛大的欢迎晚会，南京团工委、冯文彬同志、米哈依洛夫等都先后讲话，苏联文工团并在会上表演。代表团并于今晚继续搭车北上。"}],"comments":[],"origin":"新华社,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d62b3853f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
