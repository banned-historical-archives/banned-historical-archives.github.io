ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"迅速包围塘活以防平津等故从海上逃跑","alias":"","parts":[{"type":"paragraph","text":"迅速包围塘沽以防平津等敌从海上逃跑！"},{"type":"paragraph","text":"（1948年12月13日）林、罗、刘："},{"type":"paragraph","text":"除三、四、五及十一等四个纵队使用于平通东南，切断平津、通津联系（另以一个师控制南口、八达岭）已见前电外，请令后到的三个纵队，全部包围塘沽一点，隔断天津、塘沽间及芦台、塘沽间联系，向天津、芦台两面构筑坚固阻击阵地，不要分兵去围唐山，也不要分兵去围芦台。如塘沽之敌很多则监视之，不多则相机歼灭之。此举务望迅速，以防平、通、津、唐诸敌向塘沽集中，从海上逃跑。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十三日二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]平通，指北平（今北京）和通县。"},{"type":"paragraph","text":"[3]南口，镇名，位于北京市昌平县西部。八达岭，长城关隘，位于北京市延庆县南部。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":389,"page_end":389},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22ef859a1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
