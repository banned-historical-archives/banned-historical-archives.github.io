979,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"成功的访问"},{"type":"paragraph","text":"十月十五日，华国锋总理在德斯坦总统举行的宴会上。"},{"type":"paragraph","text":"华国锋总理十月十八日在雷恩市参观拉塞舍合作农场。"},{"type":"paragraph","text":"十月十六日，华国锋总理为周恩来纪念牌揭幕。大理石的纪念牌上端镶嵌着周恩来总理的半身铜像，在铜像下面，镌刻着六行金字：“周恩来，一八九八——一九七六，他于一九二二——一九二四年在法国期间住在这所房子里。”“周恩来”三个中文字，是邓小平副总理亲笔写的。"},{"type":"paragraph","text":"十月十八日，法国雷恩市民聚集在市区街道旁，热情欢迎中国贵宾。"},{"type":"paragraph","text":"本专栏照片均为  新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0759110a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
