rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想武装农民的头脑——方巷大队在社教运动中大讲毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"“毛主席的书就是为我们闹翻身求解放写的，我们不学，谁来学。”“毛主席的话句句是真理，学了才能真翻身。”这是江苏省邗江县方巷公社方巷大队的干部和社员学习毛主席著作的深刻体会。"},{"type":"paragraph","text":"两个“雷打不散”"},{"type":"paragraph","text":"在社会主义教育运动中，方巷大队工作组和党支部认识到：国家要兴旺起来，就要用毛泽东思想去武装群众。社会主义教育运动就是用毛泽东思想武装人民群众的运动。他们大讲毛主席著作，发动贫、下中农和其他社员大学毛主席著作。他们坚持了两个“雷打不散”的制度：一是无论向下面布置什么工作都首先交代运用毛主席的哪个思想去解决问题，并指出阅读哪篇文章中的某一段，某几句，然后再交代运用哪一种方法去解决问题。二是无论开会、办事、个别谈话等，都要先学毛主席有关著作。两个月来，在这个大队的俱乐部里，在社员家里，在田头，在场边，处处都可以看到社员们三三两两聚在一起，利用劳动间隙，学习毛主席著作。有些老人不识字，就念给他们听，他们说：“毛主席的话是给我们贫下中农说的，一听就懂。”广大社员学习毛主席著作已形成风气。"},{"type":"paragraph","text":"学用结合，言行一致"},{"type":"paragraph","text":"方巷大队的广大社员“做什么，学什么；学什么，用什么；反复用，反复学，落脚在用”。贫下中农说：“毛主席话一用就灵。”这个大队有一个由十二名妇女组成的作业小组，过去干活一天的工效从不超过三亩，大家叫她们“老三亩”。自从她们学习了毛主席著作，懂了种田为革命以后，干劲猛涨，去年秋收时，用一天多一点的时间，割完了十五亩稻子，社员们高兴地说：“我们的‘老三亩’变成十五亩了！”许多社员通过学习毛主席著作，站得高，看得远了，更加阶级立场明确，更加热爱集体。"},{"type":"paragraph","text":"读、讲、听、议、比、记、用"},{"type":"paragraph","text":"方巷大队广大社员在学习毛主席著作活动中，非常注意理论联系实际。他们创造了“读、讲、听、议、比、记、用”七个字的学习方法。一些不识字或识字不多的社员，他们除了听人读、讲和参加议、比以外，主要靠记、靠想、靠用，收到了立竿见影之效。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c42d5251c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
