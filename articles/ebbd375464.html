[],"dates":[{"year":1947,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【路透社巴黎一日电】最近消息称:西班牙流亡共和政府总统巴里奥请前任总理季拉尔组织新内阁后，季拉尔以无力组织广基础之政府为辞已予恳辞，巴里奥乃命前西班牙总理，前季拉尔内阁之财政部长巴西亚组织新阁，巴氏已表示接受。"},{"type":"paragraph","text":"【法国新闻社巴黎一日电】西班牙共和政府总统巴里奥本日本任命前任内阁总理，即左派共和党领袖巴西亚，负责组织新内阁。按巴里奥总统起初曾要求辞职之内阁总理季拉尔负责组阁，但遭拒绝，巴里奥在其致季拉尔之函中，曾强调下列二点:即(一)新政府应代表最大部份之西班牙人民，特别应计及西班牙国内之反弗朗哥份子。(二)新政府必须实施一项纲领，旨在推翻佛朗哥，以维持西班牙国内秩序，并恢复西班牙共和国。"},{"type":"paragraph","text":"【路透社马德里一日电】萨拉古莎城警局今日宣布，已在城内之某一秘密总部逮捕全国银行家执行委员会之委员及无政府主义派，全国同盟大会及其附属机构之人员多名。此外并捕获无政府主义派与法国境内该派人士之连络员数名，并发现彼等传递情报之方法及西班牙无政府主义派组织之内幕情形。按去年八月亦曾在巴塞隆纳捕获无政府主义派二十名。"},{"type":"paragraph","text":"【法国新闻社马德里一日电】西班牙司法部顷发表命令，规定西班牙国外难民之合法地位，以便彼等回国，各难民可就近向各地西班牙领事或外交当局，具文呈报一九三六年七月十八日后之行踪及活动情形由其转呈司法军事最高会议审核，然后通知其合法地位。"}],"comments":[],"origin":"路透社,法国新闻社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebbd375464"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
