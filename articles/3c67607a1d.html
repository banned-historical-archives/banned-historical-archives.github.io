ear":1950,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】北京二十一日消息:"},{"type":"paragraph","text":"留日华侨民主促进会中央委员会从日本写信给毛主席和朱总司令，庆贺解放海南岛。信里边说:这次解放海南岛的胜利，不但对买办反动的日本当局是一个无上的打击，对他们背后的老板——国际独占资本家们也是一个晴天霹雳，但是这对日本进步人士来说，是更加添增了建设和平民主独立的日本的信念，更鼓舞了我们侨胞，今后我们更要誓忠祖国，我们并且相信不久会解放台湾。"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c67607a1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
