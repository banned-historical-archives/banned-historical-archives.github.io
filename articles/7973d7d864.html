我国人民热烈庆祝南越民族解放阵线成立七周年","authors":[],"dates":[{"year":1968,"month":1,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一日电　我们敬爱的伟大领袖毛泽东主席，收到了越南南方民族解放阵线中央委员会主席团主席阮友寿为感谢毛主席电贺越南南方民族解放阵线成立七周年发来的电报。阮友寿主席电报的全文如下:北京中国共产党中央委员会毛泽东主席敬爱的主席:"},{"type":"paragraph","text":"主席祝贺越南南方民族解放阵线成立七周年的贺电，已经和正在极大地鼓舞着越南南方人民和人民解放武装力量乘胜前进，去建立新的更加巨大的战功。"},{"type":"paragraph","text":"越南南方军民在民族解放阵线的领导下，深刻地认识到:“七亿中国人民是越南人民的坚强后盾，辽阔的中国领土是越南人民的可靠后方。”深刻地认识到我们的胜利是同兄弟的中华人民共和国的巨大而有效的真诚支持和援助分不开的。"},{"type":"paragraph","text":"我谨代表越南南方人民、人民解放武装力量、民族解放阵线中央委员会和我本人，衷心地和深切地感谢主席、中国共产党、中国政府和兄弟的中国人民，对我们的正义战争所给予的特别关怀和宝贵支援。"},{"type":"paragraph","text":"祝阁下身体永远永远健康。"},{"type":"paragraph","text":"越南南方民族解放阵线中央委员会主席团主席"},{"type":"paragraph","text":"阮友寿律师"},{"type":"paragraph","text":"一九六七年十二月二十六日"},{"type":"paragraph","text":"于越南南方"},{"type":"paragraph","text":"新华社北京一日电　周恩来总理收到了越南南方民族解放阵线中央委员会主席团主席阮友寿为感谢中国人民热烈庆祝越南南方民族解放阵线成立七周年发来的电报。"},{"type":"paragraph","text":"电报说:“我们民族解放阵线中央委员会主席团当获悉中国各地隆重和广泛地组织越南南方民族解放阵线成立七周年庆祝活动，以及以阮春龙为首的越南南方人民代表团光荣地得到毛主席接见等消息，感到非常振奋。”“这些珍贵的支持，再次雄辩地表明了兄弟的七亿中国人民坚决大力支援越南南方人民彻底打败美国侵略军及其走狗的始终如一的立场。”"},{"type":"paragraph","text":"电报说:“我谨代表越南南方人民、民族解放阵线中央委员会主席团和我本人对总理阁下表示真诚的感谢，并通过阁下感谢以敬爱的毛主席为首的伟大的中国共产党、中国政府和中国人民，对正在进行抗美救国神圣抗战的越南南方民族解放阵线和越南南方人民所给予的珍贵的援助。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7973d7d864"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
