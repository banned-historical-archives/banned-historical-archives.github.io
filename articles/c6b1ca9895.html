tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"按叶剑英同志讲话精神来开会武汉市两个会议为国家节省约一万元","authors":[],"parts":[{"type":"paragraph","text":"新华社武汉十月二十一日电 新华社记者叶子健报道：出席中共武汉市委在十月五日到八日召开的区、局级以上干部会议的同志，吃住从简，文娱费自理，只花了公家的一百多元水电费和医药费，同往常类似会议的费用比较，节省了将近六千元。"},{"type":"paragraph","text":"这次会议是为传达贯彻党的十一届四中全会精神和学习叶剑英同志在庆祝中华人民共和国成立三十周年大会上的讲话而举行的。武汉市委认为，学《讲话》，见行动，这个会就要按叶剑英同志讲话的精神来开，改变过去每逢开会就大手大脚花钱的坏毛病。他们决定把会址由条件较好的汉口饭店改在条件较差的市委党校；与会人员与党校学员一样在食堂买票吃饭，不给伙食补助；在党校礼堂看电影也一律买票，家在市区的同志回家住宿。"},{"type":"paragraph","text":"上行下效。十月八日到十三日召开的武汉市城区工作会议，也发扬了勤俭开会的精神，为国家省下四千多元。"},{"type":"paragraph","text":"许多干部和群众都称赞武汉市委这个头带得好。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6b1ca9895"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
