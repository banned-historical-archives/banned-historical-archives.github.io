al-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"开展拥护国币的群众运动","alias":"","parts":[{"type":"paragraph","text":"开展拥护国币的群众运动！"},{"type":"paragraph","text":"（1933年8月28日）"},{"type":"paragraph","text":"国币是发展国民经济、便利群众交易的工具。政府对于国币流通数量及其信用，是有一定计划与充分保证的。近来有一部分地方，发生不信用国家纸票、银毫或者降低纸票价格的现象。中央政府已命令各地政府，立即实行下列方法：（一）向群众作广大的宣传解释，鼓励群众普遍使用国币，严办故意破坏纸票的分子。（二）召集商人小贩开会，说明苏维埃纸票是有全部国家收入作抵押的。（三）各机关各部队必须一律使用纸票、银毫。"},{"type":"paragraph","text":"[1]这是毛泽东以“东”署名在《红色中华》上发表关于开展拥护国币"}],"authors":["毛泽东"],"dates":[{"year":1933,"month":8,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":402,"page_end":402},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf39f8c31a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
