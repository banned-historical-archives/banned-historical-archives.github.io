ors":["超祺"],"dates":[{"year":1949,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沧市忽视私营工厂工运"},{"type":"paragraph","text":"工人仍受非法剥削"},{"type":"paragraph","text":"市委与职工会应立即检查纠正"},{"type":"paragraph","text":"【冀中讯】沧市职工会忽视私营工厂、作坊、手工业的工运工作。根据工商局的统计，该市私营工厂、作坊、手工业共有六百五十八个工人。他们迄今仍普遍地被资本家以各式各样的手段进行非法的剥削。记者于四月二十八、二十九两日访问十个私营工厂、作坊，发现普遍地存在着下列问题：一、工资不规定和不按月发清，如利华铸锅厂的工资就未规定，工人用钱的时候，几十、几百的借支，用不完，仍得交回柜上。同兴酱园的工资是规定了。而且还是以实物计划，但是却不按月发清，平时零星借支，月终结帐后，将实物折成货币存于柜上。利用物价上升，货币贬值而非法剥削工人。二、不合理的包工制和货币工资，这是普遍的对于女工、童工，学徒等过分剥削的方式。如东兴卷烟工厂雇用的两个女工，每天只给工资三十元，当记者问是否能维持个人的最低生活时，该厂经理却轻蔑地说：“那是小孩，在家里呆着反正没事。”好象吃不饱是理所当然似的。她（他）们的工作时间，至少在十三小时以上。三、劳资双方没有一定的契约。资本家有钱赚的时候就雇，赚钱少（或者不赚）的时候就退回家。工人生活无保障。如福康油坊（机关生产），因为有一万多个豆饼卖不出去，就将全部工人解雇回家了。经理姜一如说：“什么时候豆饼卖出，就什么时候叫他们回来！”四、是工人的组织和教育问题。绝大部分工人没有参加工会，有些名义上是参加了，但实际上等于没有参加。如东生油坊的工人，自去年“五一”到现在未开过一次会。有些还不知道职工会是什么东西，仍以中世纪的行会观点来看职工会。由于工人缺乏教育和工会领导，所以思想上普遍地存在着怕资本家解雇的顾虑，不敢说实话。针对上述情形：（一）沧市市委会、职工会必须迅速召开私营工厂、作坊和手工业工人代表、经理座谈会。根据劳资两利的方针和劳大决议精神，解决工资标准、工时原则、职工福利、劳动纪律等问题，督促各厂坊劳资双方订定契约，并随时检查执行情况。（二）职工会必须深入工人了解情况，组织工会加强工人教育，提高工人的阶级觉悟。"},{"type":"paragraph","text":"（超祺）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f99e5fabd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
