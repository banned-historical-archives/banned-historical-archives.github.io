tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是王稼祥同志首先提出的","authors":["石肖岩"],"parts":[{"type":"paragraph","text":"“毛泽东思想”这一概念，是1943年7月5日，当时的中央军委副主席、八路军总政治部主任王稼祥同志，为纪念党成立二十二周年和抗战六周年，在延安《解放日报》撰写的《中国共产党与中国民族解放的道路》一文中篇一次明确提出和论述的。"},{"type":"paragraph","text":"文章说：“中国民族解放整个过程中——过去现在与未来——的正确道路就是毛泽东同志的思想，就是毛泽东同志在其著作中与实践中所指出的道路。毛泽东思想就是中国的马克思列宁主义，中国的布尔塞维主义，中国的共产主义。”“毛泽东思想与中国共产党的民族解放的正确道路是在与国外国内敌人的斗争中，同时又与共产党内部错误思想的斗争中生长、发展与成熟起来的。”王稼祥同志对毛泽东思想的最初认识，是来自他与毛泽东同志的亲身接触和革命斗争的实践。"},{"type":"paragraph","text":"1945年5月，党的“七大”正式把毛泽东思想作为我党的指导思想。"},{"type":"paragraph","text":"（摘自《百科知识》1981年第七期，作者石肖岩）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c85908fa7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
