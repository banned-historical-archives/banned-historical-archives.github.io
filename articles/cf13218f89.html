本禹","谢富治"],"dates":[{"year":1967,"month":8,"day":4}],"is_range_date":false,"parts":[{"text":"谢富治戚本禹谈陈毅问题","type":"title"},{"text":"谢富治戚本禹","type":"authors"},{"text":"谢富治接见北京外国语学院“红旗”造反团时的讲话：","type":"subtitle"},{"text":"我的意见是陈毅可以出去，去你们学院作检查，你们批判他，最好你们联合，由小到大好不好？(众：先大的后小的)，几千人的会你们能控制的了吗？几千人，上万人你们控制得了吗？究竟是开小中大的呢？还是大会的？大会怎么开？(众：展览馆)，怎么发言？各派代表发言？别的单位不听怎么办？(×××讲：我们可以做工作)，那好！","type":"paragraph"},{"text":"先开个大会，几千人，带个头，然后再开小会，然后再检讨，开小会，外单位就不要去了。","type":"paragraph"},{"text":"戚本禹谈陈毅问题：","type":"subtitle"},{"text":"对陈毅一直不下到群众中来，戚本禹同志很有意见。他说，本来二月份就应该下来嘛，为什么二月、三月、四月一直到现在还老不下来，我们是保过他的。但是，这是二月份的事情。如果他当时不翻案早就过关了。但是他翻案了，我们对他的保就收回了嘛！因此，革命小将揪陈毅的行动是革命的，大方向是对的，冲外交部是方式问题，是次要的。","type":"paragraph"},{"text":"关于陈毅问题，看到一些材料是很严重的，应该到群众中来好好检查，我们外交战线上今后的希望看来就寄托在这些革命小将的身上了。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf13218f89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
