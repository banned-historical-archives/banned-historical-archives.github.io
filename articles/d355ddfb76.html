ear":1957,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见索康夫人和两个参观团"},{"type":"paragraph","text":"新华社14日讯　毛泽东主席在今天上午接见了出席第三次全国妇女儿童福利工作会议的西藏爱国妇女联谊会筹备委员会委员索康夫人德几拉孜。同时，接见了内蒙古自治区参观团和辽宁省各民族参观团的全体人员。"},{"type":"paragraph","text":"接见时在座的，有国务院代总理陈云、副总理邓小平，全国人民代表大会常务委员会副委员长陈叔通，中华全国民主妇女联合会副主席许广平，民族事务委员会副主任汪锋、刘春、萨空了。"},{"type":"paragraph","text":"在接见的时候，索康夫人向毛泽东主席、陈云代总理、邓小平副总理和陈叔通副委员长献了哈达。"},{"type":"paragraph","text":"毛泽东主席等还同索康夫人进行了谈话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d355ddfb76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
