"dates":[{"year":1952,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见志愿军归国代表团与朝鲜人民访华代表团全体代表"},{"type":"paragraph","text":"【新华社二十三日讯】中央人民政府毛泽东主席，朱德、刘少奇副主席，周恩来总理二十三日接见中国人民志愿军归国代表团与朝鲜人民访华代表团全体代表。两代表团由中国人民保卫世界和平反对美国侵略委员会副主席彭真、中央人民政府人民革命军事委员会总政治部副主任萧华陪同进见。"},{"type":"paragraph","text":"毛主席出见时全体代表起立欢呼，掌声雷动，充溢着对于人民领袖的崇敬与热爱。中国人民志愿军归国代表团团长李雪三与朝鲜人民访华代表团团长洪淳哲向毛主席献词。两代表团的代表分向毛主席、朱副主席、刘副主席、周总理献花。"},{"type":"paragraph","text":"毛主席频向全体代表答礼致意，并勉励中国与朝鲜两国人民在以苏联为首的世界和平民主大家庭中紧紧地团结起来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5a4f56c53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
