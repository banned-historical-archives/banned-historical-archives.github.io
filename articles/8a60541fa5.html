ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"报纸一个时期要有一定的方向","alias":"","parts":[{"type":"paragraph","text":"报纸一个时期要有一定的方向\""},{"type":"paragraph","text":"（1958年9月）"},{"type":"paragraph","text":"对国际问题应该有研究，有一定的看法，不要临时抱佛脚，发表感想式的意见。对许多国际问题都要有基本的看法，应该有比较深刻的议论。现在对国际问题的意见，有些是感想式的。"},{"type":"paragraph","text":"搞新闻工作，光务实，不务虚，不好。有了看法，有了意见，就要找机会、找题自发挥。"},{"type":"paragraph","text":"报纸宣传，报纸编辑工作，最近一两个月比较杂，看不出方向，究竟搞什么？今年春天，发表《从梅林看全国》的社论时是有方向的。最近一两个月，东西很多，方向不天明了。报纸应该有方向，在最近就要转变过来。省报也应当如此。"},{"type":"paragraph","text":"报纸一个时期要有一定的方向，把大家的注意力集中过来。[1]本篇是毛泽东和吴冷西谈话的一部分。[2]刊于1958年1月8日《人民日报》。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":276},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a60541fa5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
