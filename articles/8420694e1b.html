<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"开好活学活用毛泽东思想讲用会  沈阳化工厂革委会经常组织群众开展讲用活动，解决活思想，推动斗批改","authors":[],"dates":[{"year":1969,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"开好活学活用毛泽东思想讲用会"},{"type":"paragraph","text":"沈阳化工厂革委会经常组织群众开展讲用活动，解决活思想，推动斗批改"},{"type":"paragraph","text":"据新华社沈阳十日电　在人民解放军支左人员的帮助下，沈阳化工厂革委会经常组织工人结合斗、批、改举行生动活泼的活学活用毛泽东思想讲用会。用群众中活学活用毛泽东思想，紧跟毛主席伟大战略部署的好经验，推动全厂活学活用毛泽东思想的群众运动不断出现新高潮。"},{"type":"paragraph","text":"沈阳化工厂革委会一成立，就作出了狠抓群众性活学活用毛泽东思想的决议。为了推动活学活用毛泽东思想的群众运动广泛深入地开展起来，他们遵照毛主席关于“我们应该走到群众中间去，向群众学习，把他们的经验综合起来，成为更好的有条理的道理和办法，然后再告诉群众（宣传），并号召群众实行起来，解决群众的问题”的教导，下到车间，深入群众，去调查、总结群众活学活用毛泽东思想的经验。他们在调查研究中发现，开讲用会，是推动群众自觉地活学活用毛泽东思想的一个好办法。"},{"type":"paragraph","text":"五一五车间过去是个落后单位。车间革委会成立后，狠抓群众性的活学活用毛泽东思想的讲用活动，靠讲用解决活思想，靠讲用推动斗、批、改，靠讲用打生产硬仗，推动了革命和生产，整个车间的面貌迅速发生变化，一跃成为全厂的先进单位。厂革委会发现了这个典型，召开了全厂性的现场会，推广了他们的经验。五一四车间原来也是一个比较后进的单位，这个车间的革委会听了五一五车间的经验介绍后，几次召开会议，对照五一五车间反复找差距。车间革委会成员深入群众，扎扎实实地发动群众开展讲用活动，用毛泽东思想统帅一切，很快改变了车间的落后面貌，革命和生产都跨入了先进单位的行列。"},{"type":"paragraph","text":"五一五车间由落后变先进，五一四车间学了五一五车间后的深刻变化，使厂革委会深深体会到，结合斗争实际，开展群众性的活学活用毛泽东思想的讲用活动，之所以能够起到教育群众、发动群众的作用，就是因为讲的人是群众熟悉的人，讲的事是群众心坎里的事，他们的经验最容易提高群众活学活用毛泽东思想的自觉性。从此，厂革委会积极组织群众开展讲用活动，使活学活用毛泽东思想真正形成了扎扎实实的群众运动。"},{"type":"paragraph","text":"这个厂的革委会是在紧跟毛主席的伟大战略部署中，不断组织干部、工人开展活学活用毛泽东思想讲用活动的。"},{"type":"paragraph","text":"他们的主要做法有三条：第一，毛主席的最新指示每发表一条，就紧跟一条，组织群众学用一条；第二，抓住落实毛主席最新指示中的活思想，大搞讲用，解决思想问题；第三，在落实毛主席每一条最新指示的全过程中，经常组织群众讲用，保证毛主席的最新指示贯彻、落实。机修车间知识分子比较多。伟大领袖毛主席关于对知识分子“由工农兵给他们以再教育，彻底改变旧思想”的最新指示发表后，这个车间的工人和知识分子感到十分亲切，受到很大鼓舞。但也有少数工人对知识分子的看法还有些片面。车间革委会针对这些活思想，及时举办了落实毛主席最新指示的学习班，开展讲用活动。在讲用中，老工人用毛主席历来对知识分子问题的论述，分析知识分子，既肯定了绝大多数知识分子革命性的一面，又指出了他们需要改造的一面。不少知识分子听了工人的讲用很受感动，主动结合自己的思想，控诉叛徒、内奸、工贼刘少奇反革命修正主义教育路线对自己的毒害。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8420694e1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
