<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛泽东文艺思想的指引下复旦中文系又编出一批新著","authors":[],"dates":[{"year":1960,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　复旦大学中文系同学继“中国文学史”后，最近又编写了“毛泽东文艺思想研究论文集”“毛泽东语言研究论文集”“文学如何反映人民内部矛盾问题论文集”“中国近代文学史”“中华人民共和国文学史”“建国十年文艺思想斗争史”“中国现代文学论文集”“中国古典作家作品论文集”“语言学论文集”“李白研究”“关汉卿研究”等十多部著作，共计约一千万字。"},{"type":"paragraph","text":"在编写过程中，同学们都认真阅读了毛主席的“中国革命和中国共产党”“新民主主义论”“论人民民主专政”“改造我们的学习”“中国社会各阶级的分析”“湖南农民运动考察报告”“在延安文艺座谈会上的讲话”等著作，并进行了反复的研究和讨论，以提高理论水平和分析能力，用毛泽东思想来武装自己，作为编写时的指导思想。许多同学深深体会到，学习了毛主席著作后，就有了武器去分析文学现象，能正确地判断和解决有关的问题。如中文系四年级在编写中国近代文学史中晚清白话文运动这一节时，觉得过去有的人对这一运动的作用评价不大适当，但提不出充分的论据。学习了“新民主主义论”后，明确了晚清白话文运动和五四白话文运动是两个不同的历史范畴，前者属于旧民主主义范畴，后者是新民主主义范畴，从而很好地解决了晚清白话文运动的正确估价问题。三年级同学在修改文艺思想斗争史时，学习了毛主席的有关著作和党史后，对文学的民族形式问题，就阐述得更深刻了。"},{"type":"paragraph","text":"党的领导保证了大搞创作取得胜利。中文系党总支根据群众要求，结合科学研究，制定了长远的选题规划，对一些重点项目，都亲自抓，发现问题，随时解决。年级党支部也充分发挥了思想领导和组织作用，如三年级同学在修改“中国现代文艺思想斗争史”下册时，学习和写作发生了矛盾，党支部抓住这个问题，一方面针对有些同学存在的“不愿搞下去”的思想，组织了讨论，另一方面又妥善安排了时间，使思想问题和具体问题一起解决，使写作能顺利地进行。"},{"type":"paragraph","text":"同学们在编写中发挥了冲天干劲，不断克服困难。编写“中国近代文学史”时，由于没有现成专著可依据，这一时期的文学资料也未经系统整理，大多散见于清末民初的报刊杂志上，至于什么文章在什么报刊上，也无目录可查。但是同学们意识到，编写近代文学史不但可以弥补文学史上的空白，而且还能由此看出从中国古典文学到现代文学的演变、发展过程，因此，他们就从大量的原始资料中搜集点虎滴滴的材料，边学边干。有的同学在学校里找不到需要的资料，就到上海图书馆去翻，有时发现了许多好材料，就埋头摘录，紧张得连吃饭都忘了。经过一个月的努力，二十二个同学一共阅读了四七三部著作，三五二篇论文，写出了三十多万字的初稿。"},{"type":"paragraph","text":"教师对同学编写工作采取了热情指导和支持的态度。鲍正鹄先生与同学们一起讨论了编写体例、大纲，介绍了许多参考书，并且专门为同学上课。对一些具体问题，他也加以具体指导。赵景深、章培恒、陆树仑等教师也有的提供资料，有的拿出自己过去写的有关这方面的文章给同学参考。"},{"type":"paragraph","text":"目前，同学们正在原有的基础上进行修改加工，准备进一步补充材料，并通过集体讨论、请老师审阅，把这些著作的质量提高一步。"},{"type":"paragraph","text":"(校)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d9568790e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
