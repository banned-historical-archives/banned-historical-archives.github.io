s":[{"year":1973,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命促进生产大发展。今年，安徽省千里港北平原的农业，获得历史上空前的丰收，粮食总产量预计可比去年增加二十一亿斤，增长两成多。二十个县，有十九个县比去年增产，平均每个县增产在一亿斤以上。棉花总产量可比去年增加五十九万担，增长六成多。"},{"type":"paragraph","text":"“不以完成征购任务为标准，要以多作贡献为目标”，这是在党的十大精神鼓舞下淮北人民共同的愿望。临泉县是棉花生产的先进县，今年又获得了粮、棉双丰收，对国家的贡献也更大。到十一月上旬，全县就出售棉花十四万担。"},{"type":"paragraph","text":"由于农业生产的迅速发展，现在淮北不仅不需要从外地调进粮食，而且调出了大量粮食支援国家社会主义建设。近几年来，这个地区每年都向国家交售十几亿斤征购粮和大量的棉花。今年，在十大精神鼓舞下，到十一月中旬止，阜阳、宿县两个地区已经交售粮食十六亿多斤，棉花一百万担，进度大大快于往年。如今，淮北人民生活有了提高，许多社队有储备粮，许多社员家庭有余粮。"},{"type":"paragraph","text":"去年，淮北遭到暴雨声袭击，造成严重的洪涝灾害；今年入春以来，又多次遇到洪涝、干旱等灾害。淮北人民发扬昔阳县人民“天大旱，人大干”的精神，同各种自然灾害进行了顽强的斗争，夺得了丰收。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"861688c538"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
