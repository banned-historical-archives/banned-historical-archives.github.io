<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对“奴隶社会是人类社会必经的历史阶段”的质疑","authors":[],"dates":[{"year":1981,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奴隶社会是原始社会解体后必经的第一个阶级社会，是人类社会发展中必经的一个历史阶段，这已经成了学术界的定论。近年来，有些同志对此提出异议，认为这既不符合世界上大多数国家和民族的历史发展的实际，也不符合马克思和恩格斯的本意。第一，原始公社末期形成的农业公社，具有公有制和私有制兼而有之的特点。马克思指出，农村公社是原始社会向阶级社会过渡的关键时期。如果其内部的土地私有制取代了集体公有制，则进入奴隶社会，如雅典和罗马；如果被军事征服，其人民和土地成了征服者的公社财产，则导致农奴制社会，如斯巴达和日耳曼蛮族:如果其内部的土地公有制战胜了私有制，则导致封建的贡赋制社会。第二，从历史实际来看，世界上绝大多数文明民族都是由原始社会过渡到封建社会，而不是象希腊、罗马那样由原始社会到奴隶社会。第三，从中国来看，古代农业公社形成约在尧、舜部落联盟时代，中经夏、商、西周，至东周春秋时期瓦解崩溃。其间经历了原始社会末期，事实上的农奴制时期和正规意义上的农奴社会三个历史发展阶段。商之代夏是统治权力的转移。土地仍为农业公社所有，剥削的主要形式是公社农民助耕“藉田”或耕“公田”的徭役制。殷商虽有奴隶，但为数不多，且非生产奴隶；而社会生产的基本力量，是负有助耕“公田”劳动义务的自由民，他们是剥削者进行剥削和统治的主要对象。所以，中国在原始社会崩溃后，直接进入农奴制社会。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe53611b9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
