art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"心心向往毛泽东","authors":[],"parts":[{"type":"paragraph","text":"非洲人民迫切希望 读到毛主席著作"},{"type":"paragraph","text":"在上海海员俱乐部的中央大厅里，一位索马里的海员告诉中国朋友，“在我们非洲，大家都迫切希望能读到毛泽东的著作。”这位海员居住的船舱里悬挂着一幅毛泽东的画象。"},{"type":"paragraph","text":"祝毛泽东万寿无疆！"},{"type":"paragraph","text":"在马里举行的中国经济建设展览会："},{"type":"paragraph","text":"在展览会上，经常有成群的观众围着中国人员要毛泽东纪念章，得到的人骄傲地戴在胸前。在展览会的留言簿上，许多马里观众热情地写着：“万岁！毛泽东！”“祝毛泽东万寿无疆！”展览会的露天影院放电影时，每当有毛泽东主席的镜头出现时，全场就立即响起雷鸣般的掌声。"},{"type":"paragraph","text":"一位农民参观了展览会后，立刻到售书处买了一本《毛泽东选集》第四卷。他说：你们取得的成就太伟大了，我要好好看看毛泽东著作，了解一下这一切是怎样取得成功的。"},{"type":"paragraph","text":"“毛泽东，中国，果依斯！”"},{"type":"paragraph","text":"在第十一届大马士革国际博览会的中国馆："},{"type":"paragraph","text":"一位约旦观众仔细观看了中国馆后，紧紧握住在场的中国人员的手说：“感谢你们精彩的展出，它使我了解到，中国是一个伟大的国家，它有伟大的人民和伟大的领袖。”一个叫穆罕默德·泽恩的叙利亚老工人，在博览会的另一个展览馆工作，他几乎每天晚上都要到中国馆来。当他第一次来到中国馆的时候，就指着毛主席的象说：“毛泽东，中国，果依斯（顶好）！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7e98d6c57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
