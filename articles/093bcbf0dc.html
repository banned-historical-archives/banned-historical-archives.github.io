<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川南区党委关於土改後地主参加劳动的几项规定","authors":[],"dates":[{"year":1951,"month":3,"day":27}],"is_range_date":false,"parts":[{"text":"川南区党委关于土改后地主参加劳动的几项规定","type":"title"},{"text":"（一）在实行土地改革后由于地主过去没有劳动习惯和生产知识或者也可能缺乏生产资料，有的真搞净了，有的即是有，也暂时不敢拿出来，我们若不预先作适当处理，将会发生怠耕田现象。因此：","type":"paragraph"},{"text":"（1）凡有劳动力的地主，必须强迫他们劳动生产，倘有怠耕荒田现象，要严厉处分；同时应从思想上进行动员，要他们认识，必须向农民学习劳力生产，从劳动中改造自己，生活才有出路，将来才能改变成份，作新中国的人民。如他们能认真守法，好好劳动，不再斗争。","type":"paragraph"},{"text":"（2）有些地主真正缺乏劳动力（限于鳏、寡、孤、独、老、小）或生产资料（如农具耕牛）者，允许雇工或与农民实行互助，按农协规定，照给农民工资，当时无钱，可在秋后补还农民。","type":"paragraph"},{"text":"（二）土改后必须继续严格管制地主，防止地主造谣破坏，及一切非法活动。在土改中，虽然在政治上经济上已打垮了地主阶级在农村中的封建统治势力，但他们绝不就此甘心屈服，而且对农民会更加仇恨造谣破坏，甚至企图复辟。因此，对地主必须规定几条管制办法，如必须服从农协领导，遵守人民政府法令，保证不造谣破坏，及其他破坏事情，积极劳动生产，不怠耕荒田等。要他们在群众大会上表明态度，并在保证书上签字或打手印，保证今后严格遵守，倘若发现有违犯管制规定的，应交群众斗争，或送人民法庭制裁。","type":"paragraph"}],"comments":[],"origin":"《川北工作》第四十期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"093bcbf0dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
