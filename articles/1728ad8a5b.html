ors":["姚文元","张春桥"],"dates":[{"year":1967,"month":10,"day":4}],"is_range_date":false,"parts":[{"text":"张春桥姚文元视察上海第八印染厂时的讲话","type":"title"},{"text":"张春桥姚文元","type":"authors"},{"text":"姚：大家节日过得好吗？（答：过得好。）","type":"paragraph"},{"text":"张：听说你们厂里毛著学习班办得很好，你们是不是找几个人来谈谈，开个座谈会好吗？（好啊）","type":"paragraph"},{"text":"张：你们现在分几派？（答：一派。）","type":"paragraph"},{"text":"张：武斗过没有？（没有，我们黄浦区都比较好，没发生武斗。）","type":"paragraph"},{"text":"张：黄浦区没发生过武斗？铁道学院可发生武斗吗？（他们是学校，我们是工厂。）","type":"paragraph"},{"text":"张：武斗也没什么，斗一斗也好嘛！（在谈到北上返沪兵团时。）","type":"paragraph"},{"text":"姚文元笑着说：噢！对，是那个××司令，对吧？","type":"paragraph"},{"text":"张：后来我找王洪文，和他谈了许多，当时他们两人都有小山头，我说你们两个党员都不能团结起来，怎么能行呢？都是工总司的嘛。你们化工厂武斗起来很厉害，（是的，在文攻武卫的时候，我们想造燃烧弹，催泪弹，什么都想搞。）（汇报略）","type":"paragraph"},{"text":"张：学习毛主席著作要靠积极分子，发动群众来学习，现在要抓紧这两天的学习，你们这样轻视劳动，还想当干部，高人一等，你们想想，吃的、穿的还不都是工人农民劳动创造的，工人农民最光荣，劳动最光荣。","type":"paragraph"},{"text":"姚：这个问题要放在文化革命运动中解决，干部应该能上能下。","type":"paragraph"},{"text":"张：你们也是革委会干部，你们也要能上能下，劳动，要多接近群众，这个问题很重要，不然再隔几年，你们也会要犯错误，当然不一定是走资派，这不是小节问题，是立场问题，希望你们不要把矛盾上交，这种人踢出去人家也不要的，就放在车间里劳动吧，等以后再处理么（众：我们在斗这个走资派时，他还拿刘少奇的话跟我们辩论。）这样很好么，这样隔一段时期，就拿几个问题跟他辩一辩，他们就会有事做了，就不会只管生产了。","type":"paragraph"},{"text":"姚：资产阶级思想核心，修正主义核心就是私。","type":"paragraph"},{"text":"张：你们厂造反造得早，你们是否可以探索斗、批、改，我也没有经验，你们自己揭，总结一套经验。","type":"paragraph"}],"comments":[],"origin":"1967年10月19日清华大学井冈山斗批改战团编印《学习资料》第19期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"yaowenyuan","name":"姚文元文录","internal":false,"type":"pdf","official":false,"author":"姚文元","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/姚文元文录.pdf"],"article":{"title":"张春桥姚文元视察上海第八印染厂时的讲话","parts":[{"type":"title","text":"张春桥姚文元视察上海第八印染厂时的讲话"},{"type":"paragraph","text":"姚：大家节日过得好吗？（答：过得好。）"},{"type":
