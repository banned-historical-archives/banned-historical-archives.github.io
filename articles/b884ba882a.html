rs":["周恩来"],"dates":[{"year":1966,"month":9,"day":9}],"is_range_date":false,"parts":[{"text":"周恩来关于国务院各部机关运动的一段话","type":"title"},{"text":"周恩来","type":"authors"},{"text":"学生不要到部里去闹，困为他们跟你们不一样。你们整天搞运动他们还有工作，你们去了他们就不好工作。部就是专政机关，你们有意见可以贴大字报，可以写信嘛！还可以派人听取你们的意见嘛。你们不要干涉人家的运动。你们要相信人家自己会把运动搞好的。……","type":"paragraph"},{"text":"地质学院学生到地质部静坐示威好几天。我们是社会主义国家，没有必要这样搞，后来他们闹到国务院去。他们撤了，但是学校里的多数派学生又刺激他们，说他们失败了，念“捣乱、失败、再捣乱、再失败”的语录。这些学生就反而坚持，错了就错了、不走了，这样也不好……。","type":"paragraph"}],"comments":[],"origin":"《无产阶级文化大革命参考资料（内部资料，仅供参考）》（北京汽车分公司文革大字报办公室、北京汽车分公司行政保卫文革、北京国棉三厂文革筹委会宣传组，一九六六年十一月十二日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b884ba882a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
