ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"阻止可能从张家口西逃之敌","alias":"","parts":[{"type":"paragraph","text":"阻止可能从张家口西逃之敌！"},{"type":"paragraph","text":"（1948年12月5日）杨、李，李井泉凹，并告杨、罗、耿："},{"type":"paragraph","text":"（一）大同之敌是阎锡山的，阎近拟空运太原，可让其运去。我北岳集团?可移兴和、张北地区，参加阻止张垣?敌可能向兴集?逃跑之任务。（二）兴集一带尚有些什么部队，姚喆八纵在什么地方，请井泉查告。（三）请井泉在绥?东一带布置阻止张垣敌可能西逃，万一发生此种情况，协同杨罗耿、杨李歼灭逃敌。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"五日二十时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第三兵团司令员杨成武和副政治委员兼政治部主任李天焕等的电报。"},{"type":"paragraph","text":"[2]李井泉，当时任华北军区第三兵团政治委员。根据中共中央军委指示，率姚喆第八纵队留在绥远。"},{"type":"paragraph","text":"[3]杨、罗、耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[4]北岳集团，指北岳军区，司令员王平、政治委员赵振声。[5]张垣，即河北张家口。[6]兴集，指内蒙古兴和和集宁。[7]姚喆，当时任绥蒙军区司令员兼第八纵队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":336,"page_end":336},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a0f1129a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
