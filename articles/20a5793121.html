<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"孙瑜先生编导《武训传》的主观愿望是好的吗？","authors":["胡复中"],"dates":[{"year":1951,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"孙瑜先生编导《武训传》的主观愿望是好的吗？","type":"title"},{"text":"胡复中","type":"authors"},{"text":"编辑同志：","type":"paragraph"},{"text":"读了电影《武训传》编导者孙瑜先生《我对〈武训传〉所犯错误的初步认识》一文，我觉得这个检讨是极不深刻的。孙瑜先生在检讨中提到了“主观愿望”问题，似乎说他的“主观愿望”是好的。对这一点，袁水拍和丁曼公两位同志提出的意见，我完全同意。","type":"paragraph"},{"text":"电影《武训传》是一部装着革命人民的面孔来宣传反动思想的文艺作品。在电影中，编导者的“主观愿望”是表现得非常清楚的。","type":"paragraph"},{"text":"首先，电影《武训传》以“武训是一个劳动人民”来作为其宣传反动思想的出发点。这对欺骗观众起了很大的作用。许多人看了这部电影以后，首先赞扬的就是：“啊！伟大的劳动人民！”端木蕻良同志在《论武训传》这篇颂扬武训的文章（刊北京文艺二卷一期）里劈头就说：“武训是一个劳动人民。”电影中又着重歌颂了武训的奴才相，甚至不惜打起“中华民族的勤劳、勇敢、智慧的崇高品质”的旗号来歌颂，以达到欺骗观众的目的。例如电影中小桃责备武训为什尽干“顶脏顶苦的活”时，武训回答：“我不干谁干。”很明显，编导者是企图把武训这种甘心为反动统治阶级做奴才的无耻行动来歌颂成劳动人民的“崇高品质”的。","type":"paragraph"},{"text":"电影《武训传》又恶毒地歪曲和污蔑农民革命运动。它把武训以“兴义学”来训练封建统治者的走狗这一反动行动歌颂为“为人民服务的伟大理想”，甚至还用歪曲太平天国革命战士的革命行动来作反衬，这是令人不能容忍的。","type":"paragraph"},{"text":"最后，电影片的结尾又用“描写武训行乞兴学的失败和他发现了他自己失败后的痛苦”，作为对武训的“批评”。这个“批评”，正如袁水拍同志在“读孙瑜先生检讨后的一点意见”中所说：“只有更加对观众起了迷惑的作用，不管作者的根据如何。” 作者描写武训后来发现了他自己的失败，并因此而痛苦，无非要给观众一个印象，即以为武训始终是站在劳动人民的立场上的，他始终是劳动人民的一分子。","type":"paragraph"},{"text":"电影《武训传》是宣传反动思想的，这说明：孙瑜先生的思想是极其混乱糊涂的。希望孙瑜先生认真地作深刻的自我检讨，这对观众，对孙瑜先生本人，都是有益处的。","type":"paragraph"},{"text":"北京大学三院","type":"paragraph"},{"text":"胡复中","type":"paragraph"},{"text":"1951年5月31日人民日报电子版","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20a5793121"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
