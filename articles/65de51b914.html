rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"严格区分两类不同性质的矛盾","authors":["某部驻张家口市宣化区第二轻工业局毛泽东思想宣传队曹允森"],"parts":[{"type":"paragraph","text":"我们担任支左的宣化区第二轻工业局，下属二十多个企业，三千多职工，斗、批、改的任务很艰巨。我们遵照毛主席的教导，坚持过细地做工作，严格区分和正确处理两类不同性质的矛盾，使局里斗、批、改不断深入发展。在清理阶级队伍的工作中，有人揭发磅秤社的一位老工人解放前当过工头，是个“叛徒”。社革委会马上组织了专门班子进行内查外调，并要他作出交代。可是他不但没有什么交代，反而对立情绪越来越大。"},{"type":"paragraph","text":"我们带着这个问题学习了毛主席的教导：“世界上的事情是复杂的，是由各方面的因素决定的。”对照毛主席的教导，深入细致地分析这个老工人的全面情况，我们认为他所以不服有两种可能性：一是不服罪，顽固到底；二是情况有出入。我们遵照毛主席关于“对于人的处理问题取慎重态度”的教导，和革委会成员一起，重新对这个人的每一个问题进行了认真的调查，找遍了和他有联系的单位和个人进行座谈，随后对所有材料进行了全面的分析。最后弄清楚他是我们的阶级兄弟，而不是阶级敌人。"},{"type":"paragraph","text":"毛主席最近教导我们：“要过细地做工作。要过细，粗枝大叶不行，粗枝大叶往往搞错。”联系斗、批、改的实际，认真学习毛主席的最新指示，使我们更加深刻地认识到，“过细地做工作”，是严格区分两类不同性质的矛盾的法宝。在斗、批、改的新形势下，只有掌握毛泽东思想这个强大的思想武器，认真负责地、扎扎实实地落实毛主席的一系列最新指示，“过细地做工作”，才能在复杂的阶级斗争和两条路线斗争中识别敌友，搞好斗、批、改，完成“九大”提出的各项战斗任务。"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65de51b914"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
