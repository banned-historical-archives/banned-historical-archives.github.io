art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"党员要做揭批“四人帮”的模范","authors":[],"parts":[{"type":"paragraph","text":"在揭批“四人帮”的斗争中，许多共产党员站在运动的前列，带领群众奋勇战斗，毫不松懈，这种精神很可贵。"},{"type":"paragraph","text":"共产党员“应该成为英勇作战的模范”。在战场上同敌人打仗是作战，当前揭批“四人帮”也是作战。共产党员一定要做揭批“四人帮”的模范。"},{"type":"paragraph","text":"我们同“四人帮”的斗争已经取得了伟大的胜利，但要彻底砸烂他们的资产阶级帮派体系，肃清其反革命的修正主义路线的流毒和影响，还要努力作战。"},{"type":"paragraph","text":"在各个党组织中生活的共产党员，都要保持清醒的头脑，决不能掉以轻心，心慈手软。一定要带领广大群众，乘胜前进，痛打落水狗，夺取这场斗争的彻底胜利。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c37eb6225"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
