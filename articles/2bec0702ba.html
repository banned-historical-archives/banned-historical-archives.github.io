rs":[],"dates":[{"year":1954,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　对“红楼梦”研究中的资产阶级唯心论观点的思想批判，已引起了上海文化学术界的极大重视。华东作家协会、解放日报编辑部和复旦大学先后举行了关于“红楼梦”研究中的资产阶级观点的讨论会和座谈会后，华东师范大学中文系在本月二十日召开了“红楼梦”研究座谈会。"},{"type":"paragraph","text":"出席这次座谈会的除该校中文系全体师生外，还有该校校长孟宪承、副校长常溪萍、孙陶林、廖世承，教务长刘佛年和该校政治教育系、教育系、历史系、俄语系等系师生以及华东作家协会、复旦大学、上海师范专科学校的代表共九百余人。座谈会由该校中文系主任许杰主持，会上进行了热烈的批评和讨论，自下午一时半开始到六时许才结束。"},{"type":"paragraph","text":"会上，许杰、施蛰存、徐震堮、程俊英、罗玉君、徐中玉、周煦良、张耀翔、梅公毅等相继发言。在发言中，他们认为批判俞平伯研究“红楼梦”中的资产阶级观点是有着重大意义的，胡适派的资产阶级唯心论观点不但在文学界需要肃清，而且应该在历史、教育、哲学等各个方面进行批判，使马克思列宁主义的立场、观点、方法在各个文化学术部门中树立起来。参加座谈会的人都感到过去对学术思想上开展批评讨论认识不足，有的人还检查了自己在教学中和学术研究中所犯的资产阶级唯心论观点的错误，希望通过这次学术思想的斗争，加强学习马克思列宁主义和毛主席的著作，改进自己的教学工作和研究工作。"},{"type":"paragraph","text":"在发言中，也有人提出了对某些问题的不同看法。"},{"type":"paragraph","text":"在发言中，该校中文系同学徐聪彝对一些报刊编辑部不重视培养新生力量和草率处理青年作者来稿的资产阶级老爷态度提出了尖锐的批评。"},{"type":"paragraph","text":"孙陶林副校长在发言中指出:这次关于“红楼梦”研究的讨论，不仅是古典文学研究部门的事，这是文化学术领域中，马克思列宁主义思想与资产阶级唯心论思想的一场严重斗争，我们应该从各方面来展开学术批评和讨论，反对“权威”思想，提倡自由争辩，这样才能肃清资产阶级唯心论思想，推进国家的文化学术事业。"},{"type":"paragraph","text":"华东师范大学并准备对“红楼梦”问题作进一步的研究和讨论。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bec0702ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
