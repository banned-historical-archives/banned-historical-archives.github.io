art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想化为自己的灵魂","authors":["李文忠生前所在部队党委"],"parts":[{"type":"paragraph","text":"党的九届二中全会公报要求我们“用马克思主义、列宁主义、毛泽东思想，自觉地改造世界观”，我们一定不折不扣地贯彻执行。"},{"type":"paragraph","text":"大海航行靠舵手，干革命靠毛泽东思想。我们党委成员经常带着自己在思想革命化方面存在的问题，深入连队，和干部战士在一起学习毛主席的光辉著作“老三篇”，一起开讲用会，请他们评论党委成员的学习情况。这样，不仅加速了党委成员的世界观改造，也促进了部队的思想革命化。"},{"type":"paragraph","text":"我们一定在公报的指引下，继续深入开展活学活用毛泽东思想的群众运动，用改造世界观的新成绩，迎接四届人大的召开。 李文忠生前所在部队党委"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"799382364c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
