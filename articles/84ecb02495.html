吴开斌","武汉大学"],"dates":[{"year":1957,"month":6,"day":3}],"is_range_date":false,"parts":[{"text":"评党委对这次鸣放的领导","type":"title"},{"text":"武汉大学吴开斌","type":"authors"},{"text":"[吴开斌：武汉大学中文系学生]","type":"subtitle"},{"text":"党委在三十日下午决定支持同学们大鸣大放后，一直陷入事务主义的圈子，刘真同志及其他党委成员忙于开会、听取汇报、招待记者。终日碌碌、辛辛苦苦，但对整个鸣放运动发展的方向、具体行动的安排、鸣放步骤等带根本性的问题却缺乏明确的态度，人们不禁要问，党委究竟打算怎样领导这次运动？","type":"paragraph"},{"text":"目前运动已进入高潮，大部份师生员工都已行动起来，这是好的；但另一方面也不可否认反三害的炮火还不够集中，步调还不够一致，还有些乱。形势要求人们必须在统一的口号，明确的方针下来共同行动，要求有大体的计划，党委如不能在这方面慎重研究，提出具体可行的意见，引导群众运动健康前进，那么党的领导就只能是一句空话。","type":"paragraph"},{"text":"党过去在历次的运动中，都有着坚强的领导，唯独对这次运动的领导表现的软弱无力，缺乏办法，放任自流，落后于群众，这对运动不利，也使群众失望。","type":"paragraph"},{"text":"当然某些具体事务也应该分一部分精力来做，但毕竟应该把领导运动工作放在首位，希望党委认真研究如同促使运动深入发展，听取群众意见，具体提出下一步的做法，订立计划，真正踏实、坚强地领导这次运动！","type":"paragraph"},{"text":"人们在等待和注视着党委！","type":"paragraph"}],"comments":[],"origin":"《武汉大学右派言论汇编》（中共武汉大学社会主义思想教育办公室，1957.12）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84ecb02495"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
