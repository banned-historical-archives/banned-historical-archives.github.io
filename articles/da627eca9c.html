art":10,"page_end":10,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"打开心灵百叶窗","authors":["王维俊/张文革"],"parts":[{"type":"paragraph","text":"■王维俊张文革"},{"type":"paragraph","text":"电影《购物狂》中有一句经典台词：“都市生活有压力，有点不正常是很正常的事。”毋庸讳言，现代社会生活节奏越来越快，竞争性越来越强，由此带来个体心理压力也同比加重。身处军营的官兵，也概莫能外。"},{"type":"paragraph","text":"有压力并不可怕，压力得不到释放才是最可怕的。然而，军营中一些官兵遇到心理压力、烦恼时，往往选择有气憋在心里，把所有问题都留给自己扛，不善于通过有效的管道予以释放。这种盲目自我封闭的做法，使得心中的不良情绪就像发酵的面粉一样膨胀。久而久之，就会造成心理甚至身体疾患。"},{"type":"paragraph","text":"2006年，首次由国内100余位专门从事精神心理卫生工作的专家学者参与，历时3个多月，在上海进行的一项内容为“适合中国人的减压方法”的社会调查活动鸣金收兵。专家们最终筛选并公布了“适合中国人的10大减压方法”。这些减压方法依次是：找家人或朋友倾诉；分散注意力；顺其自然；与大自然亲近；投入到一件事中；独自内省；做最喜欢做的事；把烦恼写出来；运动锻炼；睡觉等。"},{"type":"paragraph","text":"古人云：“流水不腐，户枢不蠹。”国人首选的减压方法——“找家人或朋友倾诉”，其实质就是一种心理开放互动的沟通和交流过程。对每一位官兵而言，要拥有“太阳每天都是新的”的良好心境，有效释放心理压力，就需要经常打开心灵的百叶窗，善于倾诉自己的苦闷，善于接受他人的劝告，从而实现心理系统的新陈代谢、吐故纳新。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da627eca9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
