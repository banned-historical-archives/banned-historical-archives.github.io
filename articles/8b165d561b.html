ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"印发人民来信对中央紧急指示信的反映的批语","alias":"","parts":[{"type":"paragraph","text":"印发人民来信对中央紧急"},{"type":"paragraph","text":"指示信的反映的批语"},{"type":"paragraph","text":"（1960年12月28日）此件\"印发各同志。信内所提问题，请各组予以讨论。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十八日"},{"type":"paragraph","text":"[1]指中共中央办公厅秘书室1960年12月17日整理的材料。材料中说，自中央关于农村人民公社当前政策问题的紧急指示信下发后，我们陆续收到各地的有关来信40多件。这些来信一致对中央指示信表示了极大的拥护，认为完全反映了农民当前的希望和要求。由于政策深入人心，社员生产积极性大大提高。来信还提出以下问题：一、对政策能否兑现尚有怀疑。二、对指示信中规定超产主要奖现金不感兴趣，要求奖实物。三、对增产增购有意见，要求定产定购。此外，个别来信还提到以生产大队为基本核算单位太大，不利于发挥群众的积极性，私养猪没有时间，农村干部要求实行休假制度等问题。"},{"type":"paragraph","text":"[2]指当时正在北京参加中共中央工作会议的同志。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":126,"page_end":126},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b165d561b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
