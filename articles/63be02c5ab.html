","authors":["师银签"],"dates":[{"year":1997,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报延安1月13日专电　今天下午，毛泽东铜像揭幕仪式在延安隆重举行。当陕西省委书记安启元，省长程安东等领导同志揭开红绸时，双手叉腰的毛泽东铜像屹立在王家坪广场，引起了数万延安儿女的热烈掌声。高达5米的毛泽东铜像坐落在3.15米高的印度红大理石基座上，上面镌刻着江泽民同志手书的“毛泽东在延安”六个大字。"},{"type":"paragraph","text":"今天上午，陕西省委、省政府在延安还隆重举行了党中央毛主席进驻延安60周年纪念大会。　(师银签)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63be02c5ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
