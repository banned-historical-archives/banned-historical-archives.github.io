script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议政府削减耕地面积、兼并中小农户、转嫁财政危机的计划法国农民反剥削反压迫斗争风起云涌","authors":[],"dates":[{"year":1969,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社巴黎二十日电　在法国工人阶级不断掀起罢工斗争浪潮的同时，法国农民反剥削、反压迫的斗争也风起云涌。从上周以来，全国各地的农民、特别是青年农民，纷纷举行示威，抗议垄断资本统治集团为了转嫁财政经济危机对劳动农民进行敲骨吸髓的压榨。"},{"type":"paragraph","text":"近几天来，在法国南部的图卢兹以及东北部的蒙特勒伊、贝顿和圣奥梅尔等城镇，农民不断举行示威，反对政府的农业政策，要求提高农产品价格。示威者把许多卖不出去的烂水果、烂蔬菜，坏了的牛奶和一车一车的粪便倾倒在行政当局和警察局门口，弄得那些地方臭气熏天。图卢兹的示威农民还在全城散发抗议传单。西北部圣洛地方的七百多名农民包围了市政当局和警察局。"},{"type":"paragraph","text":"在法国东部有些地方的示威农民揪住政府部长进行责问，有的甚至揪着农业部官员和他们一道在街上游行。"},{"type":"paragraph","text":"在首都巴黎，当十八日国民议会开始农业预算辩论的时候，许多农民从全国各地赶到这里来请愿，要求提高农产品价格，抗议政府的削减耕地面积、兼并中小农户的计划。法国当局害怕农民群众的斗争会进一步高涨，出动了大批“防暴”警察和警车在国民议会周围巡逻，准备对示威者进行镇压。"},{"type":"paragraph","text":"十八日，在法国西部布列塔尼的南特市，一千五百名农民在市中心举行游行示威，抗议反动当局无理判处三名青年农民徒刑，对他们进行政治迫害。示威队伍使市中心的交通断绝。示威者表示，如果政府不释放他们的阶级弟兄，他们还要采取进一步的行动。"},{"type":"paragraph","text":"法国农民斗争的蓬勃高涨，是法国垄断资本集团残酷压榨劳动农民、向他们转嫁财政经济危机的结果。最近，法国政府为了暂时缓和财政经济困难，接连采取增加税收、紧缩信贷等措施，进一步压榨农民，要他们把裤带勒得更紧。并且为了垄断资本集团的利益，不顾农民死活，制订了一项大鱼吃小鱼，促使大批小农破产的计划，要在一九八五年以前把耕地面积削减三分之一，把农业生产单位从现在的一百六十万个减少到二十五万个。这就使得法国国内农村的阶级矛盾不断尖锐化，农民的不满情绪越来越强烈。现在，一个更大的农民斗争高潮正在酝酿中。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e14275b240"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
