<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"林彪副总理电贺越南人民军建军二十二周年用毛泽东思想武装的中国人民和解放军 随时准备和越南兄弟一道打败美国强盗越南人民的斗争已经进入了关键时刻，跨过这段艰难路程，最后的胜利就将到来","authors":[],"dates":[{"year":1966,"month":12,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京21日电　国务院副总理兼国防部长林彪，今天打电报给越南民主共和国副总理兼国防部长武元甲大将，热烈祝贺越南人民军建军二十二周年。林彪副总理在电报中重申:用毛泽东思想武装起来的中国人民和中国人民解放军，一贯坚决支持越南人民的抗美救国斗争，并且早已下定决心，不怕任何牺牲，随时准备同兄弟的越南人民和军队一道，共同打败美国侵略者，直到美国强盗干净全部地从越南滚出去。电报全文如下:"},{"type":"paragraph","text":"越南民主共和国副总理兼国防部长武元甲　大将亲爱的部长同志:"},{"type":"paragraph","text":"在兄弟的越南人民军建军二十二周年的时候，我谨代表中国人民和中国人民解放军全体指战员，并以我个人的名义，向你，并通过你向兄弟的越南人民和越南人民军全体战友，致以最亲切的问候和最热烈的节日祝贺。"},{"type":"paragraph","text":"英雄的越南人民及其军队，在以胡志明主席为首的越南劳动党的英明领导下，在抗美救国的伟大斗争中，不断给美国侵略者以沉重的打击，接连取得辉煌的胜利。越南人民的斗争已经进入了一个关键的时刻，跨过这段艰难路程，最后的胜利就将到来。中国人民和中国人民解放军，对兄弟的越南军民所取得的光辉胜利，感到无比欢欣鼓舞。"},{"type":"paragraph","text":"中国人民和中国人民解放军，对于美帝国主义最近轰炸越南民主共和国首都河内的滔天罪行，表示极大的愤慨和强烈的谴责。美帝国主义的这一野蛮行径，是它伙同其帮凶推行“和谈”阴谋的重要组成部分，也是它侵略越南最后失败的日子快要到来的表现。不管它怎样“升级”，不管它怎样玩弄“和谈”骗局，也不管它的走狗、帮凶们如何起劲地替它卖力，英雄的越南军民是骗不了、吓不倒的。美帝国主义在越南的失败命运必定是无可挽回的。我们坚信，英雄的越南人民，一定能够冲破一切困难和障碍，发挥人民战争的无穷威力，最后打败美国侵略者，实现统一自己祖国的伟大正义事业。"},{"type":"paragraph","text":"用毛泽东思想武装起来的中国人民和中国人民解放军，一贯坚决支持越南人民的抗美救国斗争，并且早已下定决心，不怕任何牺牲，随时准备同兄弟的越南人民和军队一道，共同打败美国侵略者，直到美国强盗干净全部地从越南滚出去。"},{"type":"paragraph","text":"祝越南人民及其军队不断取得新的更大的胜利。"},{"type":"paragraph","text":"祝中越两国人民和军队之间的战斗友谊万古长青。"},{"type":"paragraph","text":"中华人民共和国"},{"type":"paragraph","text":"国务院副总理兼国防部长"},{"type":"paragraph","text":"林彪"},{"type":"paragraph","text":"一九六六年十二月二十一日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d56e40a97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
