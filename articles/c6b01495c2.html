幕词","authors":["沈钧儒"],"dates":[{"year":1958,"month":3,"day":16}],"is_range_date":false,"parts":[{"text":"我们的决心：沈钧儒在社会主义自我改造促进大会上的开幕词","type":"title"},{"text":"沈钧儒","type":"authors"},{"text":"同志们！","type":"paragraph"},{"text":"社会主义自我改造促进大会开会了。","type":"paragraph"},{"text":"参加今天大会的有各民主党派人士，无党派民主人士；有知识分子和工商界。我们万众一心，在首都天安门前，向毛主席、向共产党、向全国人民表示我们最大的决心。","type":"paragraph"},{"text":"我们决心跟共产党走。","type":"paragraph"},{"text":"我们决心走社会主义道路。","type":"paragraph"},{"text":"我们决心向工农学习。","type":"paragraph"},{"text":"我们决心改造自己——改造我们的政治立场和思想意识。","type":"paragraph"},{"text":"我们决心把知识拿出来，把力量使出来，把心交出来，把一切都交出来，贡献给我们可爱的祖国，贡献给人民，贡献给党！","type":"paragraph"},{"text":"同志们！在祖国大跃进的新形势之下，我们的心在跳跃，我们的血在沸腾！","type":"paragraph"},{"text":"首先让我们欢呼：","type":"paragraph"},{"text":"祖国万岁！","type":"paragraph"},{"text":"社会主义万岁！","type":"paragraph"},{"text":"共产党万岁！","type":"paragraph"},{"text":"毛主席万岁！","type":"paragraph"},{"text":" 来源：《人民日报》1958年3月17日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6b01495c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
