script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji37","name":"毛泽东全集第37卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"和周恩来应对联","alias":"","parts":[{"type":"paragraph","text":"和周恩来应对联"},{"type":"paragraph","text":"（1956年）橘子洲，洲旁舟，舟行洲不行；（毛泽东）"},{"type":"paragraph","text":"天心阁，阁中鸽，鸽飞阁不飞。（周恩来）"},{"type":"paragraph","text":"[1]1956年，毛泽东和周恩来一起到湖南视察。一天他们同乘一辆轿车，行至湘江橘子洲头岸边，毛泽东追忆青年时代在这里读书和从事革命活动的情景，不由豪兴勃发，提出和周恩来对对子助兴。毛泽东即景咏出上联。周恩来正在思索时，小车驶到当年毛泽东常和同学们谈论天下大事的天心阁。这时，一群鸽子从阁内飞出。周恩来灵机一动，忙说：“主席，对子的下联我对出来了。”接着念出了下联，毛泽东会心地微笑着。"}],"authors":["毛泽东"],"dates":[{"year":1956}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":209,"page_end":209},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6671eba81b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
