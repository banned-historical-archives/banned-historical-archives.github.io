ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"对英雄模范须勤加教育","alias":"","parts":[{"type":"paragraph","text":"对英雄模范须勤加教育"},{"type":"paragraph","text":"（1944年12月24日）子华同志："},{"type":"paragraph","text":"关于李勇的落选？，你们的处理是对的。值得注意者，是李勇的骄傲，主要的由于我们未能向他多作教育，使他不要骄傲。李勇这类现象，陕甘宁边区也发生了，各地还会发生，其责任主要地不是在他们本人，而是在于领导他们的人。嗣后凡当选的英雄模范，须勤加教育，力戒骄傲，方能培养成为永久模范人物。如果只有赞扬，没有教育，骄傲落选，将是必然现象，此点请加注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"亥敬"},{"type":"paragraph","text":"[1]子华，即程子华，当时任中共中央晋察冀分局代理书记、八路军晋察冀军区代理政治委员。"},{"type":"paragraph","text":"[2]指各抗日根据地准备出席在陕甘宁边区召开的英模大会的代表选举"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":12,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":251,"page_end":251},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"对英雄模范须勤加教育","description":"根据手稿刊印。","dates":[{"year":1944,"month":12,"day":24}],"parts":[{"text":"对英雄模范须勤加教育","type":"title"},{"type":"appellation","text":"子华同志："},{"type":"paragraph","text":"关于李勇的落选，你们的处理是对的。值得注意者，是李勇的骄傲，主要的由于我们未能向他多作教育，使他不要骄傲。李勇这类现象，陕甘宁边区也发生了，各地还会发生，其责任主要地不是在他们本人，而是在于领导他们的人。嗣后凡当选的英雄模范，须勤加教育，力戒骄傲，方能培养成为永久模范人物。如果只有赞扬，没有教育，骄傲落选，将是必然现象，此点请加注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"亥敬"}],"comment_pivots":[{"part_idx":1,"offset":2,"index":1},{"part_idx":2,"offset":7,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["子华，即程子华，当时任中共中央晋察冀分局代理书记、八路军晋察冀军区代理政治委员。","指各抗日根据地准备出席在陕甘宁边区召开的英模大会的代表选举中，晋察冀根据地一级英雄李勇因骄傲而落选一事。"],"page_start":257,"page_end":257,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"889926df9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gs
