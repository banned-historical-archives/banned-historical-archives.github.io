灭  苏修企图遮盖中国文化大革命给世界各国人民作出的革命榜样是徒劳的","authors":[],"dates":[{"year":1969,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"智利革命共产党发表声明强烈谴责苏修对中国的武装挑衅"},{"type":"paragraph","text":"中国人民将使苏修罪恶阴谋完全破灭"},{"type":"paragraph","text":"苏修企图遮盖中国文化大革命给世界各国人民作出的革命榜样是徒劳的"},{"type":"paragraph","text":"新华社二十五日讯　圣地亚哥消息：智利革命共产党最近发表声明，强烈谴责苏修叛徒集团对中国的武装挑衅，坚决支持中国人民反击苏修武装挑衅的正义斗争。"},{"type":"paragraph","text":"声明指出，苏修叛徒集团对中国的武装挑衅，是苏联修正主义者陷入绝望境地的一种表现。苏修在中国的主要帮凶刘少奇及其一伙的阴谋，已经被无产阶级文化大革命彻底粉碎了。"},{"type":"paragraph","text":"声明谴责苏修叛徒集团对中国进行无耻的诬蔑和攻击。声明指出，苏修叛徒集团“企图以此来徒劳地遮盖住中国在社会主义建设中所取得的巨大胜利，以及无产阶级文化大革命给世界各国人民作出的革命榜样。”"},{"type":"paragraph","text":"声明说，苏修叛徒集团对中国的武装挑衅，是它屈从于美帝国主义的一种可耻行径，是它向尼克松政府的一个懦怯的献媚，是为了苏美在瓜分世界势力范围方面进行更密切的合作。"},{"type":"paragraph","text":"声明还指出，勃列日?夫和柯西金的卑鄙挑衅的目的，一方面是为了转移苏联人民对他们在苏联复辟资本主义所造成的经济恶化的注意力；另一方面，是企图纠集娄罗反华。"},{"type":"paragraph","text":"声明表示坚决支持中国人民反击苏修武装挑衅的正义斗争，并表示深信：“当代最伟大的无产阶级领袖毛泽东领导下的光荣的中国人民将会给侵略者以应有的惩罚，并使他们肮脏的罪恶阴谋完全破灭。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a46334d6b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
