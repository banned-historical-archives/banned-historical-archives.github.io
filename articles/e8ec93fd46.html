art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席的革命路线前进","authors":["跳水运动教练员肖爱山"],"parts":[{"type":"paragraph","text":"今年六月十日是我们伟大领袖毛主席为体育工作题词发表十九周年。“发展体育运动，增强人民体质”，十二个金光闪闪的大字，是毛主席无产阶级体育路线的集中体现，是我们体育工作唯一正确的方针。学习毛主席的光辉题词，回想起见到我们伟大领袖毛主席的幸福情景，我不禁心潮澎湃，热泪盈眶，最使我难忘的是我十五岁那年，跟随伟大领袖毛主席畅游长江的幸福情景。那天，毛主席带领着我们，在浩瀚的长江里穿激流，劈巨浪，勇往直前。毛主席亲切的教导，伟大的实践，给了我无穷无尽的力量。以后我在工作中，每当想起毛主席的光辉教导和伟大实践，就有了战胜困难的勇气和使不完的劲。有一次，在学习一个高难度动作时，我的腿受伤了。在困难的时候，我的脑海里又出现了毛主席畅游长江的光辉形象，好象听到了毛主席的亲切教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”我坚定了信心，鼓足了勇气，经过一个多星期的努力，在同志们的帮助下，终于圆满地完成了任务。"},{"type":"paragraph","text":"今后我一定要认真读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士，为落实毛主席关于“发展体育运动，增强人民体质”的指示，贡献自己毕生的精力，永远沿着毛主席的革命路线奋勇前进！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8ec93fd46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
