ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"敌人很可能是中间突破","alias":"","parts":[{"type":"paragraph","text":"敌人很可能是中间突破！"},{"type":"paragraph","text":"（1964年9月14日）"},{"type":"paragraph","text":"敌人很可能是中间突破，不会走日本人的老路。日本人吃亏，就是吃亏在先搞东北。那时全国来了一个抗日救亡运动，“七君子”等等，轰轰烈烈，使得我们有了一个政治上的准备。它以后才逐渐增兵华北，才搞山东，慢得很！一直到一九四二年，才进攻汤恩伯。武汉不是早就占领了！但它也是到一九四二年以后，才向湖南长沙一带进攻。一直到这时，它才懂得中间突破。"},{"type":"paragraph","text":"[1]这是毛泽东在听取国家计划委员会领导小组汇报计划工作时讲话纪要的一部分。"},{"type":"paragraph","text":"[2]汤恩伯，1942年时任国民党军第一战区副司令长官兼鲁苏皖豫边区总司令。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":9,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":149,"page_end":149},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58dd11b50a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
