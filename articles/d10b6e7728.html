":[],"dates":[{"year":1971,"month":10,"day":3}],"is_range_date":false,"parts":[{"text":"中共中央关于成立中央专案组的通知","type":"title"},{"text":"毛主席批示：同意。","type":"paragraph"},{"text":"各大军区党委常委，各省、市、自治区党委常委，中央军委各总部、各军兵种党委常委，中央和国务院各部委领导小组和党的核心小组：","type":"paragraph"},{"text":"为彻底审查、弄清林──陈反党集团的问题，中央决定成立中央专案组，集中处理有关问题。中央专案组由周恩来、康生、江青、张春桥、姚文元、纪登奎、李德生、汪东兴、吴德、吴忠十人组成。在专案组领导下，设立工作机构，由纪登奎、汪东兴两同志负责进行日常工作。各地、各单位今后凡向中央上报有关林──陈反党集团的揭发材料，统请以绝密亲启件送交中央专案组统一处理。","type":"paragraph"},{"text":" 中共中央一九七一年十月三日","type":"paragraph"}],"comments":[],"origin":"根据中央文件原件打印，原题为：中共中央通知","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"汪东兴","type":"人物"},{"name":"纪登奎","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d10b6e7728"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
