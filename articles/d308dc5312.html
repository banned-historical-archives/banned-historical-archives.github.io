ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"中央转发辽宁省委关于农业生产合作社问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发辽宁省委关于农业生产合作社问题的报告的批语"},{"type":"paragraph","text":"（1955年8月16日）上海局、各省市委、自治区党委："},{"type":"paragraph","text":"现将辽宁省委一九五五年八月十二日关于农业生产合作社问题的报告发给你们参考。中央认为辽宁省委的方针是正确的。关于社会主义工业化和农业社会主义改造的相互关系问题，必须强调二者的紧密联系，而不可只强调前者，减弱后者。因为如果不使农业社会主义改造的速度和社会主义工业化的速度相适应，则社会主义工业化不可能孤立地完成，势必遇到极大的困难。而自前党内正有许多人还不了解这一点。关于整社建社扩社的各项准备工作，辽宁省委指出，应包括“逐级做好思想发动，批判克服右倾思想，积极发挥广大干部和群众的热情和积极性；逐级做好发展社的全面规划，特别是着重解决村一级（按即乡一级，东北各省还未改称乡）合作化的阶级规划；继续做好现有社整顿巩固工作，进一步贯彻合作化的具体政策，审查、清理和纯洁合作社的组织；加强对互助组的领导，打好建社的基础；把整社建社和加强党的基层组织建设，密切毛泽东全集第三十五卷结合起来”，这些都是适当的。辽宁省委决定于九月上旬召开全省县委书记和区委书记的联席会议讨论合作化同题，各省可以酌量仿行。辽宁没有地委一级，为了加强对合作化的领导，立即建立这一级机构，我们认为是必要的。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九五五年八月十六日"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"刘、陈、彭真、小平、陈毅、恩来\"阅，尚昆用电报发去，另印发如前示。"},{"type":"paragraph","text":"[1]刘，指刘少奇。陈，指陈云，当时任中共中央书记处书记、国务院副总理。彭真，当时任中共中央书记处候补书记、全国人大常委会副委员长。小平，即邓小平，当时任中共中央秘书长、国务院副总理。陈毅，当时任国务院副总理。恩来，即周恩来。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央副秘书长、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":8,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":296,"page_end":297},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发辽宁省委关于农业生产合作社问题的报告的批语","authors":["毛泽东"],"dates":[{"year":1955,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"中央转发辽宁省委关于农业生产合作社问题的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"上海局、各省市委、自治区党委：","type":"appellation"},{"text":"现将辽宁省委一九五五年八月十二日关于农业生产合作社问题的报告发给你们参考。中央认为辽宁省委的方针是正确的。关于社会主义工业化和农业社会主义改造的相互关系问题，必须强调二者的紧密联系，而不可只强调前者，减弱后者。因为如果不使农业
