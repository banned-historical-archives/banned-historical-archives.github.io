art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"假“革命”真复辟","authors":["班长耿德胜战士李登宾"],"parts":[{"type":"paragraph","text":"邓小平和一切机会主义路线头子一样，总是惯用“革命”的外衣掩盖他的反革命罪恶活动。他自称所谓“老革命”，实际情况怎样呢？他从来不是无产阶级革命家，只不过是跑到无产阶级队伍里来的资产阶级民主派。他从来不是马克思列宁主义者，只不过是挂着共产党员招牌的修正主义者。他从来不代表工人阶级，而是代表资产阶级。特别是，社会主义革命革到他自己的头上，触犯了他所代表的党内外资产阶级的利益，他就抵触，就反对。文化大革命中，他受到群众批判，说了一大堆“悔过自新”、“永不翻案”的话，但是，一旦重新工作，就扯下伪装的面纱，向无产阶级反攻倒算。哪里有半点老革命的影子呢？"},{"type":"paragraph","text":"是真革命还是假革命，并不是看你职务多高，资格多老，更不是凭自我吹嘘来确定的。我们的老的革命干部从来最坚定地执行毛主席的革命路线，全心全意为人民服务，从不以老自居、以功自居。而修正主义者则不然，总是千方百计地往脸上贴金，借用革命的词句装饰自己，掩盖他们的反革命真象。陈独秀、王明是这样，刘少奇、林彪也是这样，邓小平更是有过之而无不及。但是，不管修正主义者怎样自我吹嘘，狐狸的尾巴总是要露出来的，他们自我吹嘘得越凶，暴露得就越彻底。邓小平不就是在自我吹嘘的最得意的时候，暴露了自己复辟狂的本来面目吗？"},{"type":"paragraph","text":"在反击右倾翻案风的斗争胜利开展中，邓小平已成为过街老鼠，人人喊打。我们一定要乘胜前进，彻底撕掉他那“老革命”的画皮，把批判邓小平修正主义路线的斗争进行到底。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dfcfaf179"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
