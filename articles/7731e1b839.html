tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"卡拉曼利斯总理离开北京邓小平副总理等到机场欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社十一月十六日讯 希腊共和国总理康斯坦丁·卡拉曼利斯结束了对中国为期五天的正式访问，带着中国人民对希腊人民的深厚友谊，今天下午乘专机离开北京。"},{"type":"paragraph","text":"随同卡拉曼利斯总理访问的希腊外交部长拉利斯和夫人等贵宾也同机离京。"},{"type":"paragraph","text":"国务院副总理邓小平，外交部长黄华和夫人何理良，陪卡拉曼利斯等希腊贵宾从宾馆到机场。人大常委会副委员长阿沛·阿旺晋美，政府其他有关部门的负责人，以及中国驻希腊大使何扬，也到机场欢送。"},{"type":"paragraph","text":"欢送仪式在悬挂着希中两国国旗的机场上举行。军乐团奏希中两国国歌。卡拉曼利斯总理在邓小平副总理的陪同下，检阅了中国人民解放军陆海空三军仪仗队。"},{"type":"paragraph","text":"卡拉曼利斯总理临上飞机前，同邓小平副总理、阿沛·阿旺晋美副委员长热情握手话别。"},{"type":"paragraph","text":"希腊驻中国大使赫里桑索普洛斯以及欧洲经济共同体成员国驻中国的外交使节也到机场送行。"},{"type":"paragraph","text":"今天上午，卡拉曼利斯总理等希腊贵宾游览了长城。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7731e1b839"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
