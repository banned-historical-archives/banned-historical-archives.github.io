用毛主席的军事理论","authors":[],"dates":[{"year":1968,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伊朗革命者发表文章"},{"type":"paragraph","text":"热烈欢呼我国出版波斯文《毛泽东军事文选》"},{"type":"paragraph","text":"号召结合实际活学活用毛主席的军事理论"},{"type":"paragraph","text":"新华社二十四日讯　伊朗革命者最近写文章热烈欢呼我国出版波斯文《毛泽东军事文选》。文章指出：“现在，毛泽东同志的军事理论，在全世界，特别是在亚洲、非洲和拉丁美洲给人民开辟了人民战争胜利的道路，指导我们去战胜各国反动派、帝国主义和修正主义。”"},{"type":"paragraph","text":"这篇题为《〈毛泽东军事文选〉——各国人民解放的最锐利的思想武器》的文章说，毛泽东同志的著作以波斯文出版，是“对我国人民的国际主义援助的具体表现。”"},{"type":"paragraph","text":"文章指出，毛泽东同志的军事理论就是无产阶级的军事科学，“人民战争的理论是当代的马克思列宁主义——毛泽东思想的重要组成部分。”文章最后表示，伊朗革命人民“要结合实际活学活用这些理论”。"},{"type":"paragraph","text":"波斯文《毛泽东军事文选》是最近由北京外文出版社出版的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96ec9ad919"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
