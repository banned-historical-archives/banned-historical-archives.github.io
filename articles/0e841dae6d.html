" crossorigin="">{"props":{"pageProps":{"books":[{"id":"d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d","name":"斯大林选集（诸夏怀斯社2017年5月）","internal":false,"official":false,"type":"pdf","author":"斯大林，诸夏怀斯社2017年5月","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d.pdf"],"article":{"title":"论“红色青年”杂志的任务","alias":"","parts":[{"type":"paragraph","text":"论“红色青年”杂志的任务"},{"type":"paragraph","text":"（一九二五年一月）"},{"type":"paragraph","text":"斯大林同志和编辑部委员们谈话，在谈到杂志的任务时，他说："},{"type":"paragraph","text":"杂志应当把吸引无产阶级出身的非党大学生参加苏维埃政权和共产党的工作作为自己的基本任务。只有杂志在实际上成为真正苏维埃大学生的杂志时，才能做到这一点。高等学校、教育人民委员部各个机关以及其他机关的工作当然还有许多缺点。大学生对这些缺点比其他任何人都知道得清楚，他们应当经常地揭露、批评这些缺点，指出这些缺点，使我们能够依靠共同的力量来改进我们的工作。因此，必须广泛地吸引无产阶级出身的非党大学生中的优秀人物来为杂志写稿。大学生应当意识到这是他们自己的杂志，这个杂志能够帮助他们工作，帮助他们进步。"},{"type":"paragraph","text":"在谈到杂志的某些栏的任务时，斯大林同志指出："},{"type":"paragraph","text":"杂志的政治栏只须阐明党和苏维埃政权的工作的基本问题。这里不必重复别种杂志已经说过的话。我们联盟内的每一种刊物在整个工作中都应当有它的一定地位。“大学生生活”、“文学”、“科学和技术”等栏必须大大扩充。这些栏正是大学生能够积极投稿和发挥自己才能的地方。“高等学校的改革”栏内的一些问题，除了吸收教员和教授以外，还要吸收大学生来研究。"},{"type":"paragraph","text":"只有实现“接近大学生”这个口号，杂志才能更好地完成自己的任务，才能真止成为苏维埃大学生自己的刊物。载于一九二五年一月"},{"type":"paragraph","text":"选自新编《斯大林全集》“红色青年”杂志第一期"},{"type":"paragraph","text":"第7卷第5页（总第五期）"}],"authors":["斯大林"],"dates":[{"year":1925,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":786,"page_end":786},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e841dae6d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
