tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"柏林占领状态必须结束几内亚总理致电毛主席感谢我国承认","authors":[],"parts":[{"type":"paragraph","text":"新华社15日讯 国务院副总理聂荣臻于11月15日接见了德意志通讯社驻北京记者汉希克。接见时在座的有外交部新闻司副司长徐晃。"},{"type":"paragraph","text":"聂荣臻副总理在谈话中表示，中国政府和中国人民对德意志民主共和国政府为了和平解决德国问题和缓和欧洲紧张局势而提出的主张，表示完全同意，同时，积极支持苏联部长会议主席赫鲁晓夫同志关于结束柏林的占领状态并从柏林撤退外国军队的建议。"},{"type":"paragraph","text":"新华社15日讯 几内亚共和国塞古·杜尔总理致电毛泽东主席，感到我国政府承认几内亚共和国，并希望在两国间建立外交关系。电文如下：中华人民共和国主席先生："},{"type":"paragraph","text":"我荣幸地收到了你10月8日的来电，其中贵国政府表示正式承认几内亚共和国为独立自主的国家。我以个人的名义，并代表几内亚政府和人民，感谢你所表示的愿望和对我们的年轻的国家所寄予的信任。我同你一样抱有诚挚的愿望，希望在我们两国之间建立正常的外交关系。致最崇高的敬意。"},{"type":"paragraph","text":"几内亚共和国总理"},{"type":"paragraph","text":"塞古·杜尔"},{"type":"paragraph","text":"1958年11月13日 科纳克里"}],"alias":""},"tags":[{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a97ed00d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
