" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"谢富治给大专院校红代会电话指示","parts":[{"type":"title","text":"729．谢富治给大专院校红代会电话指示"},{"type":"paragraph","text":"(1967年4月26日)"},{"type":"paragraph","text":"一、北大、师大、清华去中学红代会分成两派，一派支持“四．三”派，一派支持另一派。全都撤回。"},{"type":"paragraph","text":"二、在外地的同志全部撤回。"},{"type":"paragraph","text":"三、红代会要团结。现在矛盾很多(指全国)，全国的革命委员会受到很大的冲击。要顾全大局，从大方向考虑。"},{"type":"paragraph","text":"四、解决问题要自我批评，地院和北大的问题，有些是原则问题，现在放一放，以后解决。"},{"type":"paragraph","text":"五、红代会是中央的拳头，不要自己破坏，主要自我批评，学校内部(清华、北大、师大、矿院)争吵，不要提得那么高。"},{"type":"paragraph","text":"六、当前的大方向是三个方面：(1)批刘邓就是为了本单位的斗、批、改；(2)批旧市委；(3)整风，主要是整无政府主义，搞思想革命化。"}],"authors":["谢富治"],"dates":[{"year":1967,"month":4,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":88,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e63d89b27"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
