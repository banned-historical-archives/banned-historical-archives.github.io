rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席在革命战争的年月里","authors":[],"parts":[{"type":"paragraph","text":"这里选载的四幅照片，全部陈列在中国人民革命军事博物馆里，是中国人民宝贵的革命文物。它记录了我们伟大领袖在抗日战争和第三次国内革命战争时期的工作和生活片断。从照片上，人们形象地看到，在战争年月里，我们的伟大领袖毛主席怎样和全国人民同甘共苦，怎样领导我们战胜重重困难，从胜利走向胜利。"},{"type":"paragraph","text":"目前，轰轰烈烈的增产节约运动正在全国开展着。全国人民正在党和毛主席的领导下，为加速改变我国一穷二白的面貌，促进社会主义大跃进而奋斗。毛主席在革命战争年月里的伟大形象，使每个革命者都受到极大的感动和鼓舞。"},{"type":"paragraph","text":"上面的这两张照片拍摄于1947年保卫廷安战役。当时国民党反动派命令胡宗南倾巢出动，用十倍于我的兵力，向我党中央所在地延安进犯。在毛主席的亲自指挥下，胡宗南的部队被我军牵着鼻子在陕北作武装游行。党中央和毛主席在主动退出延安之后，仍然留在陕北指挥着全国的战争。右上的一张照片是毛主席在一个农民家里研究战局。右下的一张照片就是毛主席从陕北朱官寨转移时的情形。当年陕北的军民，听说毛主席还留在当地与他们一起作战，受到了极大的鼓舞，在保卫党中央、保卫毛主席的口号下，坚决勇敢地打败了敌人。从照片上我们可以看到毛主席在当时工作和生活的情况。他与广大军民群众穿着一样的衣服，过着一样的艰苦的战斗生活。"},{"type":"paragraph","text":"这张毛主席和延安杨家岭农民亲切交谈的照片，是一九三七年拍摄的。毛主席身上穿的是长征时的红军服装，头上戴着红军八角帽。当时毛主席正忙着为抗日战争作政治上、军事上、组织上的准备，工作十分繁忙。可是他还经常和农民们在一起交谈，了解情况。这张照片里农民们与毛主席在一起谈笑自若，亲如一家人，生动地反映了我们的伟大领袖与人民群众亲密无间的关系。"},{"type":"paragraph","text":"这一张照片摄于一九三八年的春天，毛主席正在给抗日军政大学学员作政治报告。他扳着指头，给大家谈论着抗战必胜的条件。后面的土窑洞是抗日军政大学的校舍。从当时那种因陋就简的会场环境，从主席穿的那一身补了又补的旧棉衣上，我们清楚地看到了毛主席艰苦朴素的作风。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8feb0d3dbf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
