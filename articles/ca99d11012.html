rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"雨露滋润禾苗壮","authors":[],"parts":[{"type":"paragraph","text":"用马列主义、毛泽东思想占领校外阵地。空军某部党委认真抓好干部子女教育。他们配备了专职辅导员，组织青少年学习毛主席重要指示，批判邓小平反革命的修正主义路线。"},{"type":"paragraph","text":"甘柳摄"},{"type":"paragraph","text":"要让红旗飘万代，重在教育下一代。基建工程兵某部二十连校外辅导员，给红小兵讲雷锋的故事，鼓励他们好好学习，天天向上，长大成为无产阶级革命事业接班人。"},{"type":"paragraph","text":"张福根摄"},{"type":"paragraph","text":"热情歌颂无产阶级文化大革命。某部红小兵编演各种文艺节目，批判邓小平翻文化大革命的案，算文化大革命的帐，否定社会主义新生事物的罪行。"},{"type":"paragraph","text":"张希江摄"},{"type":"paragraph","text":"培养孩子们从小粗知马克思主义，从小和修正主义路线斗争。某部幼儿园组织儿童积极参加反击右倾翻案风的斗争。这是孩子们拿笔作刀枪，狠批邓小平。"},{"type":"paragraph","text":"李虎摄"},{"type":"paragraph","text":"为保卫无产阶级专政贡献力量。黄海前哨某岛上的红小兵，从小树立起阶级斗争观念。他们协助解放军战士站岗放哨，积极参加保卫无产阶级专政的斗争。"},{"type":"paragraph","text":"周惠民摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca99d11012"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
