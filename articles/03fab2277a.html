<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"识破资产阶级的新花招","authors":[],"dates":[{"year":1968,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"八一织布厂革命委员会"},{"type":"paragraph","text":"反革命修正主义分子陈丕显鼓吹什么:“资产阶级已经投降”，“现在，实际情况是阶级斗争一天天接近消灭”。这是陈丕显之流为复辟资本主义制造舆论，是彻头彻尾的反革命谬论。"},{"type":"paragraph","text":"资产阶级是不是已经投降了?完全不是那么回事。资产阶级过去没有睡觉，现在仍然没有睡觉。在这次伟大的无产阶级文化大革命运动中，资产阶级感到自己的末日即将来临，就耍出新的花招，其中之一就是用糖衣炮弹向我们进攻。他们采用吹吹拍拍、奉承捧场的手段，用金钱来腐蚀革命队伍中一些意志薄弱的人，拉出去变为新的资产阶级代理人。"},{"type":"paragraph","text":"我们厂里有些“老造反”被资产阶级糖衣炮弹击中的严酷事实，就有力地驳斥了反革命修正主义分子陈丕显“阶级斗争熄灭论”的反革命谬论。"},{"type":"paragraph","text":"曾经一度掌握我厂大权的个别造反队头头，在一月革命风暴中“杀”出来后，背上了“老造反”的沉重包袱，自认为“杀”出来早，为革命出过力，就沾沾自喜，放松了思想改造。他们被资产阶级思想迷了心窍，互相吹捧，自封“厂长”、“书记”，把阶级斗争忘得精光。就在他们洋洋得意的时候，资产阶级出来捧场了，对他们说:“你们年青有为，造反精神足，斗争大方向正确。”千方百计地在这些“老造反”面前献殷勤，灌迷魂汤，使这些“老造反”心花怒放。资产阶级看到第一步已经得手，于是又来了第二手:招待夜点心，送手表，借给照相机、自行车等等，资产阶级的糖弹一颗颗打来。这些“老造反”没有经受住考验，逐渐动摇了，从仇恨资本家到羡慕资本家，终于沦为资产阶级的俘虏。"},{"type":"paragraph","text":"无产阶级每取得一个胜利，资产阶级就越接近最后灭亡。因此，他们必然地要作垂死的挣扎。陈丕显之流极力宣扬什么“阶级斗争熄灭论”，就是想使人们忘记阶级斗争，在“阶级斗争熄灭论”的烟幕下，麻痹无产阶级的革命意志，瓦解社会主义，颠覆无产阶级专政，以便达到其实现资本主义复辟的目的。"},{"type":"paragraph","text":"我们要牢牢记住毛主席“千万不要忘记阶级斗争”的教导，研究阶级斗争的新动向，识破阶级敌人的新花招，击退一切阶级敌人的新进攻。同时把阶级斗争提高到两条路线斗争的高度，坚持两条路线的斗争，坚持大批判，把中国赫鲁晓夫及其在上海的代理人陈丕显之流彻底批臭批倒，彻底肃清陈丕显之流散布的“阶级斗争熄灭论”流毒，把无产阶级文化大革命进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03fab2277a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
