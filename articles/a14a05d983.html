" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"给郭梓材的信","alias":"","parts":[{"type":"paragraph","text":"给郭梓材的信"},{"type":"paragraph","text":"（1950年8月29日）梓材学兄："},{"type":"paragraph","text":"来信收到，极为欣慰。北京人浮于事，吾兄工作问题，还以就当地熟悉吾兄情况的友人筹谋解决，较为适宜。愚见如此，尚祈甚酌。此复，顺致"},{"type":"paragraph","text":"敬意！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十九日刘天民先生同此致候。（刘先生来信没有收到）"},{"type":"paragraph","text":"[1]郭梓材（1897—1964），湖南韶山市韶山乡朝阳村人，曾同毛泽东在私垫学习，在湖南新军当兵。大革命时期曾参加韶山农民运动。新中国成立后曾在湖南湘潭建中猪厂工作。"},{"type":"paragraph","text":"[2]刘天民（1902—1977），湖南韶山市杨林乡善扶村人，郭梓材的妻子，和杨开慧关系密切。大革命时期曾从事学生运动和青年工作，后长期作教育工作。曾任湘潭市政协委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":8,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":118,"page_end":118},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a14a05d983"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
