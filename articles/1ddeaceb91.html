不许乱动的通报","authors":[],"dates":[{"year":1952,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"华北局关于县城“五反”斗争不经批准不许乱动的通报","type":"title"},{"text":"河北省委并各省委、内蒙分局并报中央：","type":"appellation"},{"text":"河北省委2月19日关于召集市、地委会议情况的报告阅悉。","type":"paragraph"},{"text":"（一）河北省在初步克服了右倾思想后，“三反”斗争已获显著成绩，截至2月20日止已捉虎5300余只（内大“老虎”190只）。暂定县以上各级捉虎10000只，内大“老虎”1000只的计划也是可以的。","type":"paragraph"},{"text":"（二）“五反”斗争先在4市、10镇及地委直接掌握展开的7个县城中进行，其他县城均严加控制不经批准不准乱动的决定也是正确的。近来有些地区在内部的“三反”斗争还未基本结束，准备工作极不充分的情况下，采用农民斗地主的办法斗资本家，甚至乱斗小商人都是错误的。请各省委、地委注意，县镇“五反”斗争应经地委批准，不许自由行动。","type":"paragraph"},{"text":"河北省委原报附后，供你们参考。","type":"paragraph"},{"text":" 华北局2月21日","type":"paragraph"}],"comments":[],"origin":"河北省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ddeaceb91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
