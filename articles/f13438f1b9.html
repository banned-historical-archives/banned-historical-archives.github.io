script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江苏盐阜大众报光荣的十五年刘少奇陈毅胡耀邦题词祝贺","authors":[],"dates":[{"year":1958,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社南京25日电】　江苏省盐阜大众报今天是创刊15周年纪念，中央和江苏省等方面负责同志最近都题辞祝贺。"},{"type":"paragraph","text":"中共中央副主席、全国人民代表大会常务委员会委员长刘少奇同志的祝辞:“热烈祝贺盐阜大众报的十五周年!热烈祝贺在过去革命斗争中有过光荣历史的盐阜区人民，在争取工农业生产大跃进的社会主义建设中，在根本改变我们祖国和盐阜区的经济文化面貌的斗争中，获得更大的光荣。盐阜大众报在这一伟大的改造自然界的历史性的斗争中，应当在各方面起积极促进的作用，鼓舞人民的干劲，力争上游，多快好省地进行一切社会主义的建设事业。”"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理兼外交部长陈毅的祝辞:“盐城地区曾经是苏北的抗战中心，今天应继承和发挥这一光荣传统，把盐城变为实行农业发展纲要四十条的先进地区。谨祝努力!”"},{"type":"paragraph","text":"共青团中央委员会书记处书记胡耀邦、国防部副部长黄克诚、中共江苏省委第一书记江渭清、上海市副市长曹荻秋等都题了祝辞。"},{"type":"paragraph","text":"盐阜大众报创刊于1943年4月25日，是江苏北部革命根据地出版历史最久的报纸之一。盐城曾是中共中央华中局和新四军军部所在地，盐阜大众报是以盐城为中心的盐城、阜宁地区党委的报纸，解放以后成为盐城地委的报纸。解放以前，盐阜大众报是四开四版，出过5日、3日、2日刊。现在报纸版面仍继承过去的传统，还是4开4版，每周出版6期，在盐城地区和江苏各地发行1万3千多份。盐阜大众报在党的领导下，在抗日战争、解放战争时期，在社会主义改造和社会主义建设中，积极发挥了集体组织者和集体宣传者的作用。盐阜大众报在贯彻大众化方针和开展群众性通讯运动等方面，具有优良的传统。"},{"type":"paragraph","text":"24日，盐阜大众报社举行纪念，中共盐城地委、盐城专署的领导干部，和工人、农民等各方面代表参加了祝贺。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f13438f1b9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
