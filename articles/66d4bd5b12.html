ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对薄一波关于私营轮船公司合营问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对薄一波关于私营轮船公司"},{"type":"paragraph","text":"合营问题的报告的批语"},{"type":"paragraph","text":"（1953年2月15日）周总理："},{"type":"paragraph","text":"此件请予处理。可以同意一波意见；但合营是不可免的，应于再贷款一次后，加紧准备合营的条件，主要是干部。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十五日[1]薄一波，当时任政务院财政经济委员会副主任兼财政部部长。"},{"type":"paragraph","text":"[2]指薄一波1953年2月14日关于私营轮船公司合营问题给毛泽东并中央的报告。报告说，上海及长江私营轮船公司现有船只9万吨，但大多因机构臃肿，货源缺乏，经营不善而不能维持，要求贷款合营。经中财委研究，认为这些轮船公司应该整理，但不应操之过急，假使我们号召在自愿原则下公私合营，可以肯定大多数私营轮船公司都会来的，而我们在千部和资金方面一时都准备不及，会陷于被动。因此，决定仍采取先贷款（但要派人监督其用款是否适当），过一时期后，再考虑合营。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":497,"page_end":497},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66d4bd5b12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
