ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"感谢泰国前总理比里·帕侬荣祝贺我国国庆的复信","alias":"","parts":[{"type":"paragraph","text":"感谢泰国前总理比里?帕侬荣"},{"type":"paragraph","text":"祝贺我国国庆的复信"},{"type":"paragraph","text":"（1960年10月3日、8日）国务院外事办公室："},{"type":"paragraph","text":"要复一信致谢。请你起草后，送我一阅，然后正发出。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月三日"},{"type":"paragraph","text":"二尊敬的比里·帕侬荣先生："},{"type":"paragraph","text":"感谢你对中华人民共和国成立十一周年的祝贺，感谢你对中国人民和我本人的良好祝愿。"},{"type":"paragraph","text":"中泰两国人民有着悠久的传统友谊。我们两国人民的根本利益是完全一致的。尽管目前在我们两国关系中还存在着来自美帝国主义及其仆从方面的严重障碍，但是，在两国人民的共同努力下，这种障碍必将消除，两国人民的友好关系必将得到发展。"},{"type":"paragraph","text":"感谢泰国前总理比里·帕侬荣祝贺我国国庆的复信"},{"type":"paragraph","text":"正如你指出的那样，目前形势十分有利于全世界人民。我相信，泰国人民决不会容忍外国侵略势力的长期压迫，他们终将把命运掌握在自己手里，同各国人民的斗争相配合，挣脱美帝国主义军事条约的锁链，获得完全的民族独立。"},{"type":"paragraph","text":"祝你身体健康，祝你在促进中泰两国人民友好、维护民族独立和世界和平的事业中获得成功。"},{"type":"paragraph","text":"毛泽东一九六〇年十月八日"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":10,"day":3},{"year":1960,"month":10,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":520,"page_end":521},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf216a78a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
