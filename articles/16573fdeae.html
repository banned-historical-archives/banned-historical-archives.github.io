art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的报告给我们增加了信心和力量","authors":[],"parts":[{"type":"paragraph","text":"本报记者19日报道 驻守在各地的我军广大官兵，怀着无比兴奋的心情收听和阅读了渴望已久的毛主席的报告——“关于正确处理人民内部矛盾的问题”，并且表示要很好地学习这个报告。"},{"type":"paragraph","text":"18日傍晚，南京部队很多单位的有线广播台，都转播了毛主席报告的全文。很多同志昨晚听了第一遍，今天早晨又听了第二遍。海防前线某部303舰的官兵，聚集在甲板上和住舱里的扩音器周围，全神贯注地收听了毛主席的报告的广播。"},{"type":"paragraph","text":"在收听和阅读了毛主席的报告以后，很多同志反映：正当我们进行整风和反击右派反社会主义言论的时候，这个报告给了我们新的思想武器，使我们眼睛更明亮了，是非界限更清楚了。南京部队空军某部刘炳南大尉说：“报告里关于什么是人民、什么是敌人，以及‘百花齐放、百家争鸣’的六条政治标准，又一次给我们指明了方向，使我们能够在右派分子利用整风机会向我党疯狂进攻中，更能站稳立场，分清是非界限，使我们在反击右派分子的斗争中，增加了信心和力量！”"},{"type":"paragraph","text":"303舰舰长张序三大尉说：人们可以用毛主席所指示的六条标准去鉴别什么是鲜花，什么是毒草。"},{"type":"paragraph","text":"为了使广大官兵进一步领会毛主席报告的精神实质，南京部队领导机关在即将发出的指示中要求各单位应根据具体情况，集中一定时间组织对这个报告的学习。"},{"type":"paragraph","text":"武汉部队政治部也发出了学习毛主席报告的指示，要求在“鸣放”告一段落后，以两周时间学习毛主席的报告。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16573fdeae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
