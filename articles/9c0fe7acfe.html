ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"给杨尚奎的信","alias":"","parts":[{"type":"paragraph","text":"给杨尚奎?的信"},{"type":"paragraph","text":"（1962年9月14日）杨尚奎同志："},{"type":"paragraph","text":"邵式平同志提出的几项意见？，请你与刘俊秀及其他在京同志谈一下，提出你们的意见。中央搞的农业和商业等文件，是否已将邵的某些意见包括进去了？《人民公社六十条》之外，是否还要搞一个《试办章程》？请将你们的意见告我为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十四日[1]杨尚奎，当时任中共江西省委第一书记。"},{"type":"paragraph","text":"[2]指江西省省长邵式平1962年8月7日对巩固农村集体经济问题提出的三条意见：（一）建议中央搞一个农村人民公社试办章程草案。在组织上要明确社员的权利、义务和人民公社的民主集中制。千部应由民主选举，要规定只有社员才能当选为公社干部。原则上必须由社员自己负责办好公社，社员有权选举干部，干部必须接受社员监督。不称职的干部，社员经过法定手续，可以罢免。这是当前巩固集体经济的必要措施。（二）交换问题。产品交换权与所有权要相适应。既然生产队是基本核算单位，基层供销社就应以公社为单位，以生产单位（集体所有）为交换单位，这对巩固集体经济是有好处的。（三）非农业人员下放到公社仍然是非农业人口，吃国家供应粮，这等于没有下放。城市人员转移，也等于没有下放。这样并没有因下放人员而减轻国家安排粮食困难的程度。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":9,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":247,"page_end":247},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c0fe7acfe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
