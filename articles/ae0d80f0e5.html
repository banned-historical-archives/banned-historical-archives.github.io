dates":[{"year":2001,"month":1,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德采取措施打击右翼极端分子"},{"type":"paragraph","text":"勃兰登堡州爆发反极右大游行"},{"type":"paragraph","text":"据新华社柏林1月6日电据将于7日发行的德国《星期日图片报》报道，为更有效地打击右翼极端分子的活动，德国在加强打击力度的同时将采取分化政策，孤立少数顽固不化的右翼极端分子。"},{"type":"paragraph","text":"报道说，德国内政部长席利宣布将对右翼分子采取一种给出路和立功者处罚从宽的政策。根据这项政策，那些真正希望改过的右翼分子将得到司法部门的保护，同时有关司法机构还将对其过去的不良记录进行保密，使其在上学、就业等方面不受影响。"},{"type":"paragraph","text":"另一措施是对那些在警方侦破右翼犯罪集团案件中确有立功表现的右翼刑事犯罪分子实行处罚从宽政策。"},{"type":"paragraph","text":"据新华社柏林1月7日电据此间媒体报道，德国东部勃兰登堡州的科特布斯市大约1万人7日举行示威活动，反对极右暴力行为，要求严惩极右分子。"},{"type":"paragraph","text":"勃兰登堡州州长曼弗雷德·施托尔佩在集会上说，此次示威活动表明，科特布斯并没有被愚蠢的纳粹发分子所左右，成千上万的居民愿意科城是一个向全世界开放的城市。"},{"type":"paragraph","text":"导致这次示威活动的直接原因是新年伊始科特布斯市就发生了两起排外事件：一对犹太夫妇受到右翼分子的死亡恐吓；5名光头党分子殴打外国人，致使2人受伤。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae0d80f0e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
