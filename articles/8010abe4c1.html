ors":[],"dates":[{"year":1956,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"对来电祝贺志愿军抗美援朝参战六周年表示感谢"},{"type":"paragraph","text":"毛泽东主席复电金日成首相"},{"type":"paragraph","text":"新华社28日讯　毛泽东主席给朝鲜民主主义人民共和国金日成首相的复电，全文如下：朝鲜民主主义人民共和国内阁首相金日成同志："},{"type":"paragraph","text":"在中国人民志愿军抗美援朝参战六周年之际，承来电祝贺，我代表中华人民共和国和中国人民向你，并且通过你向朝鲜民主主义人民共和国政府和朝鲜人民表示衷心的感谢和敬意。"},{"type":"paragraph","text":"中朝两国人民的兄弟友谊通过保卫和平的正义斗争和两国经济、文化关系的增进正日益巩固和发展。我们谨祝你们在恢复和发展国民经济和争取祖国和平统一的伟大事业中获得更大的成就。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1956年10月27日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8010abe4c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
