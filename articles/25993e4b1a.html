script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山西小麦征购工作进展迅速  灵石等县领导干部有右倾思想亟待纠正","authors":["商恺"],"dates":[{"year":1957,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"山西小麦征购工作进展迅速"},{"type":"paragraph","text":"灵石等县领导干部有右倾思想亟待纠正"},{"type":"paragraph","text":"本报太原9日电　记者商恺报道：山西省随着粮食问题大辩论，小麦征购工作进展迅速。截至8日为止，全省入库小麦已达总任务的71.3％。晋南地区进展最快，已达分配任务的84.7％。有部分县和不少农业社完成和超额完成了任务。临猗县超额二十万斤，万荣县超额六万三千斤。据估计，安邑、河津、高平等十六个县共超额四百多万斤。"},{"type":"paragraph","text":"从全省情况看，进展还很不平衡，部分地区党政领导干部在征购工作上还存在右倾情绪，不大力开展政策宣传和思想教育，片面叫喊“任务过大，有困难”。比如产麦较多成熟期又早的霍县，至今只完成征购任务的21％，灵石县只完成4.5％。"},{"type":"paragraph","text":"中共山西省委及省人民委员会为推动小麦征购工作迅速进展，于8月8日召开了电话会议，省委书记、代理省长卫恒要求各地区和城市党政负责干部，亲自抓征购工作，并动员全党，再接再厉，全力完成任务，不得有任何动摇和犹豫；为了克服一些农民的个人主义思想和一些干部的本位主义思想，必须组织各级干部学习人民日报有关粮食问题的社论及省委指示，认真讨论宣传粮食政策，对于已经完成和超额完成任务的农业社要进行表扬，反之则应进行督促检查。在销售方面，凡能压缩的应尽量压缩，大力提倡节约。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25993e4b1a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
