第一次席卷全国的电讯工人大罢工，罢工迅速扩展到四十二州","authors":[],"dates":[{"year":1968,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"给美国垄断资产阶级反动统治以新的冲击"},{"type":"paragraph","text":"美国二十多万电讯工人大罢工"},{"type":"paragraph","text":"这是二十多年来第一次席卷全国的电讯工人大罢工，罢工迅速扩展到四十二州"},{"type":"paragraph","text":"新华社十九日讯　华盛顿消息：在美国黑人空前规模的抗暴斗争给予美帝国主义以沉重的打击之后，美国四十二个州的二十多万电讯工人十八日掀起了全国范围的罢工斗争，给予美国垄断资产阶级的反动统治以新的冲击。"},{"type":"paragraph","text":"这次电讯工人大罢工是美国二十一年来第一次横扫全国的电讯工人大罢工。这次罢工斗争从亚拉巴马州开始，迅速扩展到全国四十二个州。由于美国的生活费用随着侵越战争的不断“升级”和军事开支的恶性膨胀正在急剧上涨，因此，罢工工人要求增加工资，增加加班费和夜班工资。"},{"type":"paragraph","text":"这次电讯工人大罢工也是美国在不到一年的时间里发生的第四次全国范围的罢工斗争。美国工人罢工斗争不断爆发的情况，说明美帝国主义对外扩张侵略、对内加紧剥削的反动政策，正日益引起美国劳动人民的强烈反抗。"},{"type":"paragraph","text":"不久前，二十三个州的六万多铜业工人大罢工从去年七月开始，一共坚持了九个月。这次罢工使美国铜的生产几乎全部停顿，使美国每星期损失四万吨铜，沉重地打击了美帝侵越战争的军火生产。"},{"type":"paragraph","text":"与铜业工人大罢工几乎同时爆发的美国战后第一次铁路工人全国大罢工，曾迫使美国百分之九十五以上的铁路运输陷于停顿，使许多重要工业部门停工待料，严重地打击了侵越战争的军事运输。"},{"type":"paragraph","text":"今年开年以来，连许多公教人员也冲破了约翰逊政府禁止公务人员罢工的种种“法律”的束缚，掀起了一次又一次的罢工浪潮。"},{"type":"paragraph","text":"随着美国国内阶级矛盾的日益尖锐，不仅深受压迫的美国黑人正在迅速觉醒，同样遭受压迫和剥削的美国白人中的劳动人民，也在积极开展斗争，美国统治集团正处在到处挨打、穷于应付的狼狈处境中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c101f026e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
