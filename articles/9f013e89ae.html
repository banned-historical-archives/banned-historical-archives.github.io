script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持四项基本原则　反对资产阶级自由化  邓小平有关论述汇编将出版","authors":[],"dates":[{"year":1989,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持四项基本原则　反对资产阶级自由化"},{"type":"paragraph","text":"邓小平有关论述汇编将出版"},{"type":"paragraph","text":"新华社北京６月２０日电  由中共中央文献研究室编辑的《邓小平同志关于坚持四项基本原则反对资产阶级自由化的论述》一书，即将由中央文献出版社出版，在全国新华书店陆续发行。"},{"type":"paragraph","text":"当前，全党、全军、全国各族人民，正在认真学习邓小平同志接见首都戒严部队军以上干部时发表的重要讲话。为了配合这次学习，中央文献研究室将十年来邓小平同志关于坚持四项基本原则反对资产阶级自由化的论述摘编成册，以便于大家联系过去历史，深入学习领会邓小平同志在这个基本问题上的一贯思想。"},{"type":"paragraph","text":"这本书共辑录了邓小平同志在党的十一届三中全会以后，自１９７９年３月至１９８９年３月，这一期间的３９段论述，其中最后四段是第一次公开发表。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f013e89ae"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
