rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"诗歌","authors":["张金栋苗长水〖HH/换行〗DW：八六四一部队"],"parts":[{"type":"paragraph","text":"沙海导航站"},{"type":"paragraph","text":"天线撑起一天飞沙流云，"},{"type":"paragraph","text":"红色小屋耸立中间，"},{"type":"paragraph","text":"这就是我们的导航站呵，"},{"type":"paragraph","text":"沙海里一枚赤色的玉环。"},{"type":"paragraph","text":"披文化大革命的战斗风雨，"},{"type":"paragraph","text":"我们来黄羊窝安家定点；"},{"type":"paragraph","text":"和沙鸡为邻，和野驼结亲，"},{"type":"paragraph","text":"挖一条清泉，开一片菜园。"},{"type":"paragraph","text":"穿天杨迎着暴风雨成长，"},{"type":"paragraph","text":"漠漠瀚海咆哮把战士考验，"},{"type":"paragraph","text":"多少次暴雪把天线折倒，"},{"type":"paragraph","text":"多少次狂风把帐篷掀翻。"},{"type":"paragraph","text":"千万条黄龙暴怒了，"},{"type":"paragraph","text":"一天，两天，三年，十年……"},{"type":"paragraph","text":"天线却日夜不停地转动，"},{"type":"paragraph","text":"辐射出巨大的电波射线。"},{"type":"paragraph","text":"中南海红灯亮在心头，"},{"type":"paragraph","text":"文化大革命催动征帆，"},{"type":"paragraph","text":"批林批孔，学习理论，反击右倾翻案风，"},{"type":"paragraph","text":"我们同亿万军民并肩作战。"},{"type":"paragraph","text":"十年啊，跟随时代洪流前进，"},{"type":"paragraph","text":"送一批批战鹰高飞、凯旋；"},{"type":"paragraph","text":"沙海里小小的导航站呵，"},{"type":"paragraph","text":"折射出文化大革命的万丈光焰！"},{"type":"paragraph","text":"八六○四一部队 张金栋"},{"type":"paragraph","text":"迎排长"},{"type":"paragraph","text":"听说排长出医院，"},{"type":"paragraph","text":"我驾马车迎下山；"},{"type":"paragraph","text":"拐过沙河三棵柳，"},{"type":"paragraph","text":"排长和我碰了面。"},{"type":"paragraph","text":"上车他夺鞭手中挥，"},{"type":"paragraph","text":"“得——驾”一声十里远："},{"type":"paragraph","text":"“嘿，党中央决议鼓人心，"},{"type":"paragraph","text":"病床怎能再住俺！”"},{"type":"paragraph","text":"话语落地响回声，"},{"type":"paragraph","text":"一团火花一道闪；"},{"type":"paragraph","text":"呵，你看那甩鞭挥臂热血沸，"},{"type":"paragraph","text":"多象冲锋攻前沿！"},{"type":"paragraph","text":"人唠嗑呀，车儿颠，"},{"type":"paragraph","text":"排长啊，他的话儿问不完："},{"type":"paragraph","text":"“毛主席指示学几次？"},{"type":"paragraph","text":"批邓高潮怎样掀？”"},{"type":"paragraph","text":"……大车踏踏进军营，"},{"type":"paragraph","text":"迎面走来指导员："},{"type":"paragraph","text":"“今晚批判邓小平，"},{"type":"paragraph","text":"哈，战斗又把猛将添！”"},{"type":"paragraph","text":"战士 苗长水"}],"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1489f857e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
