ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发华东军区党委关于打虎预算报告的批语","alias":"","parts":[{"type":"paragraph","text":"对华北局关于山西省打虎数目的指示的批语"},{"type":"paragraph","text":"（1952年1月30日）各同志："},{"type":"paragraph","text":"华北局和山西省委的文件“都很好。华北局提出像山西这样的省应有大小老虎一千个至一千三百个，其中应有大老虎一百个至一百三十个以上。我以为这个数目只是一个最低的估计，实际上可能大大超过此数。社会上即工商界中的老虎还不算在内。请各省市区党委根据自己的情况都作出一个打虎预算，报告中央局和中央。山西省委的几条打虎经验也是很好的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月三十日"},{"type":"paragraph","text":"[1]华北局的文件，指中共中央华北局1952年1月30日关于山西省应捉到1000个至1300个老虎，其中应有10%以上的大老虎的指示。山西省委的文件，指中共山西省委1952年1月28日关于山西省反贪污战果给华北局的报告。"},{"type":"paragraph","text":"[2]中共山西省委1月28日给华北局的报告中总结的打大中老虎的经验是：1.利用与控制罪恶不大、愿意改悔的私商，秘密帮助我们调查其他不法商人。2.派女同志做大中贪污分子家属的工作。3.集中力量，揭破贪污分子之间以及贪污分子与私商之间的“攻守同盟”，这是捉大中老虎的具有决定性的步骤。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":313,"page_end":313},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6788dfa1bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
