rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是世界人民最伟大最宝贵的财富人们掌握毛泽东思想；就最聪明最能干；充满战斗精神","authors":[],"parts":[{"type":"paragraph","text":"据新华社墨西哥城五日电 不久前访问中国后回国的墨西哥经济学家、著名社会活动家格拉谢拉·里格特四日在这里接见新华社记者时说，毛泽东思想不仅是中国人民最伟大、最卓越、最宝贵的财富，而且是拉丁美洲和全世界人民最伟大、最卓越、最宝贵的财富。"},{"type":"paragraph","text":"里格特在谈话中强调指出，毛泽东思想是放之四海而皆准的真理。他说，对毛主席著作，不仅是译成各国语文的问题，最重要的是根据每个国家的历史特点和具体情况运用毛泽东思想。他又说，毛主席有关社会各阶级的分析、有关农民运动和人民战争的著作对拉丁美洲人民目前的斗争有现实而深刻的指导意义，拉丁美洲人民无法解决的问题都可以在毛主席的著作里找到答案。"},{"type":"paragraph","text":"里格特说，中国人民革命的胜利和社会主义建设的成就都是由于有了伟大的毛泽东思想的领导。他赞扬中国人民热烈学习毛主席著作。他说，人们一旦掌握毛泽东思想，就成为最聪明、最能干、充满战斗精神的人，其证明就是中国人民在农业、工业和科学事业中取得的成就。"},{"type":"paragraph","text":"里格特最后说，他将更好地继续学习毛主席著作，把毛主席的著作作为唯一正确的指针。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22c49d3d12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
