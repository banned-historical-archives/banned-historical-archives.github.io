是两回事","authors":["王谨"],"dates":[{"year":1987,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吴文英在天津服装分中心成立大会上说"},{"type":"paragraph","text":"服装科研设计要勇于创新"},{"type":"paragraph","text":"美化生活与资产阶级自由化是两回事"},{"type":"paragraph","text":"本报讯　记者王谨报道：纺织部部长吴文英2月22日在天津服装分中心成立大会上指出：“七五”期间我国纺织工业被列为我国消费品工业发展的两个重点之一。纺织振兴要靠科技，同样服装工业要起飞，科学技术须先行。服装的科研和设计，一定要坚定不移地贯彻执行党的百家争鸣、百花齐放的方针，各种流派、各种风格相互借鉴、勇于创新。她指出，美化人民生活，是历史赋予服装工作者的责任。美化生活与资产阶级自由化是两回事，不容混淆。"},{"type":"paragraph","text":"随着我国服装工业的发展，服装科学研究已朝多方位的全国性网络发展。继中国服装研究设计中心大连、石家庄、新疆分中心和服装功能分中心成立之后，中国服装研究设计中心天津分中心2月22日正式成立。"},{"type":"paragraph","text":"天津是我国服装工业的重要基地之一，拥有近百个企业，年产服装四千五百万件，产值近六亿元，出口创汇近亿元。天津也是我国纺织工业门类齐全、基础较好的老基地之一。"},{"type":"paragraph","text":"中国服装研究设计中心天津分中心的成立，对于开展多方位的服装科学研究，充分发挥天津大纺织的综合优势，加强服装出口基地的建设，将起到积极的推动作用。"},{"type":"paragraph","text":"天津市政府、国家经委、国家科委有关负责人也到会对分中心成立表示祝贺。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"388b3cd421"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
