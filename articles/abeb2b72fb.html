script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"枣园人民怀念毛主席","authors":["恒群"],"dates":[{"year":1950,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"枣园人民怀念毛主席"},{"type":"paragraph","text":"恒群"},{"type":"paragraph","text":"我们带着毛主席最近的像片，去拜访延安枣园的人民。"},{"type":"paragraph","text":"在一位名叫王德会的窑洞前，我们坐下了。王老汉正在剥麻，看见我们来了，便用那亲切的眼光欢迎我们。他说：“院生，院生，拿水碗来！”“院生”这一小娃娃的名字，引起了我们的注意。于是话就拉开了。原来因为这孩子是在“中央医院”生的。王老汉说：“毛主席住在这里时，婆姨都到中央医院去生娃娃。”一提起毛主席，正在窑里做饭的婆姨也走出来了。她拍着院生的脑袋问：“你还记得毛主席不？”院生便睁大了他的眼睛，看着我们带去的新华日报上毛主席的像片。接着他又把报纸抢过去，嘴里嚷着“毛主席，毛主席！”地跑进窑里给别的娃娃看去了。婆姨向我们解释说：“毛主席在这里时，他还小呢，记不得了！”王老汉听着笑了，他说：“村里人差不多都见过毛主席。毛主席给我们老汉祝寿时，我看见了他，高高的大个子！”半天我们没有再拉话。王老汉的眼睛朝山下望着，他是在回想着毛主席哩！山下，是一片绿油油的庄稼。王老汉转回身子对我们说：“毛主席住在这里时，下边（他用手指着庄稼）都是水地，庄稼长得可好咧。胡宗南匪军来到以后，这一片水地全叫破坏了……今年天旱，庄稼长得不大好，要是水地就不用怕天旱了。”老百姓最关心的就是庄稼，而他们一提到这些，就马上想起毛主席来了。老汉接着又说：“毛主席在这里时很关心我们的生产，常常问我们有啥困难；老百姓一有病，一位姓周的医生就马上跑来。锄草和收割的时候，毛主席就派来好多干部帮助老百姓锄草或收割。他们就像咱们家里人一样，只是不吃我们的东西，做完就走。”老汉笑了，两眼望着我们的灰制服。"},{"type":"paragraph","text":"一九四七年胡宗南匪军进攻边区时，一下把枣园人民的好光景破坏了。人们逃走了一半多，只剩下十五、六户人家，种着七十多亩地。牲口全都被拉走了。现在光景又渐渐地恢复过来了。全村户数已增加到五十三户，共种地二千四百八十多亩，牛、驴、鸡、猪等也都渐渐增多起来。假使去年不遭冷子（雹）打，今年天不旱，村里的生产，便快赶上战前了。"},{"type":"paragraph","text":"歇晌以后，好多老乡围住了我们，争着看毛主席的像片。青年高能治说：“我大（父亲）见过毛主席，还和他在一个桌上吃过饭，拉过手。”于是一群老汉便谈起了毛主席过年请他们吃饭、看秧歌的事来。他们都从心底里流露出对毛主席的热爱。孙永聚是一位被毛主席祝过寿，和毛主席一起种过树的老汉。他说：“我们大家都想念着毛主席，因为老百姓的事他都知道，他都能帮助。敌人占领这村时，村里便人人盼着毛主席！”"},{"type":"paragraph","text":"枣园人民是怎样地热爱着毛主席啊！毛主席曾经住过的窑洞，亲手栽种的树，走过的小路……只要看到这一切，谁都会怀念起毛主席来。"},{"type":"paragraph","text":"人们离不开毛主席，忘不了毛主席！"},{"type":"paragraph","text":"九月二十九日寄自延安"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abeb2b72fb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
