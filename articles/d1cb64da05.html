art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席声明极大地鼓舞了日本工农群众他们决心结成更广泛的反美统一战线，发动更为猛烈的反美斗争","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十三日讯 据东方通讯社报道，毛主席发表支持美国黑人抗暴斗争的声明，给日本工人、农民和进步知识分子以极大的鼓舞，他们表示决心向世界人民的共同敌人美帝国主义展开持久的猛烈的斗争。"},{"type":"paragraph","text":"神奈川县相模原地区的工会运动领导人逸见直典说，毛主席在声明中指出：“可以肯定，殖民主义、帝国主义和一切剥削制度的彻底崩溃，世界上一切被压迫人民、被压迫民族的彻底翻身，已经为期不远了。”毛主席的这一英明论断，给予日本人民的反美斗争以无限勇气，使他们看到了胜利的前景。逸见说：美帝国主义越来越走投无路，国际形势对人民非常有利。日本人民要结成广泛的反美统一战线，发动比过去更为猛烈的反美斗争。"},{"type":"paragraph","text":"在美军厚木基地劳动的日本工人代表佐藤繁夫说，毛主席的声明不仅热情地支持了美国黑人的斗争，也给予日本工人的反美斗争以极大的鼓舞。在美军基地内劳动的日本工人，为了反对美帝侵略越南，曾经进行了多次罢工，打击了美帝国主义。我们决心继续展开反美运动，掀起持久的猛烈的斗争。"},{"type":"paragraph","text":"千叶县三里冢的一位农民运动领导人内田宽一说，毛主席发表支持美国黑人抗暴斗争的声明，使坚持了近两年的三里冢农民反对修建东京新国际机场的斗争增强了胜利的信心。他表示要为废除日美“安全条约”和把美帝赶出日本而奋斗。他说，毛泽东思想是使人民斗争获得胜利的保障。我们要用毛泽东思想武装自己的头脑。RW：毛泽东；声明"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1cb64da05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
