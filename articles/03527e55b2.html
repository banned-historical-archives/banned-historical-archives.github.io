" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"大字报——要求档案公开","authors":["四川","风声社"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——要求档案公开","type":"title"},{"text":"四川风声社","type":"authors"},{"text":"（“风声社”，时为成都铁路局的作者）","type":"subtitle"},{"text":"1．众所周知，人事处的工资大部在八、九十元以上，近水楼台先得月，就去年一个时期就提拔了8名主任，但我们都不知道这些“主任”们都发挥了那些作用？难道也能照例的按上一个“成绩是基本的吗”？试问，一个业务部门的主任还不如他们的主任吗？我们认为象黄虹、孙清源之类，根本不应受提拔，我们建议这次整风后应降低他们的工资，应与各业务处一样。","type":"paragraph"},{"text":"2．人事处是作人的工作的，他的一举一动，一纸命令都关系着每个人的前途和命运。我们要求大公无私的人来搞。但我局人事处，有着严重的宗派主义(具体例子可见各大字报)，自上至下都是清一色的党团员，当然三大主义在他们身上也就在所难免。我们要求人事处应有正直的、政治可靠的非党人士参加，以利监督。一纸公文，三言两语，吾辈命已定矣！张冠李戴借机报复更难胜数，为何档案要保密，冤屈何日清？要求档案公开，欲各兄弟社同意者，大大支持。","type":"paragraph"},{"text":" 来源：《四川省右派言论选辑5》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月30日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03527e55b2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
