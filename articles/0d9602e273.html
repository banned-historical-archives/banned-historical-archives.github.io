<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"同违背“三要三不要”原则的走资派作坚决斗争","authors":[],"dates":[{"year":1976,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共川沙县江镇公社委员会"},{"type":"paragraph","text":"最近，我们公社广大贫下中农、革命干部、赤脚医生认真学习了中共中央、人大常委会、国务院、中央军委关于建立伟大的领袖和导师毛泽东主席纪念堂的决定，中共中央关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定，一致认为中央这两项英明决定，表达了全国亿万人民的共同心愿，它对广大革命人民是一个巨大的鼓舞和教育。对那些背叛马列主义、毛泽东思想，篡改毛主席指示，搞修正主义、搞分裂、搞阴谋诡计的人来说，这是一个沉重的打击。我们坚决拥护中央这两项英明决定，决心最紧密地团结在以华国锋同志为首的党中央周围，继承毛主席的遗志，坚持毛主席提出的“三要三不要”的原则，同一切背叛马列主义、毛泽东思想，篡改毛主席指示的人，同一切搞修正主义、搞分裂、搞阴谋诡计的人作坚决的斗争，把毛主席开创的无产阶级革命事业进行到底。"},{"type":"paragraph","text":"我们深深体会到:“不斗争就不能进步。”我们的党，就是在伟大领袖毛主席的领导下，在同陈独秀、瞿秋白、李立三、罗章龙、王明、张国焘、高岗饶漱石、彭德怀、刘少奇、林彪、邓小平这些机会主义、修正主义者的斗争中发展起来的。只要社会上还存在阶级、阶级矛盾和阶级斗争，党内两条路线的斗争就会继续进行下去，就还会有人搞修正主义，搞阴谋诡计，就还会有人企图分裂我们党。毛主席曾经深刻地指出:“我们唱了五十年国际歌了，我们党有人搞了十次分裂。我看还可能搞十次、二十次、三十次，你们信不信?你们不信，反正我信。”两条路线斗争的历史和现实，充分证明了毛主席这一英明论断的无比正确。我们贫下中农、革命干部和赤脚医生决心树立同走资派长期作战的思想，以实际行动继承毛主席的遗志，一切听从以华国锋同志为首的党中央的指挥，进一步掀起学习马列主义、毛泽东思想的新高潮，深入批邓，继续反击右倾翻案风，旗帜鲜明，立场坚定，针锋相对地同一切背叛马列主义、毛泽东思想，篡改毛主席指示的人，同一切搞修正主义、搞分裂、搞阴谋诡计的野心家、阴谋家作坚决斗争。不管是什么人，只要他们反对和分裂以华国锋同志为首的党中央，我们就坚决与他们斗争到底!我们决心用鲜血和生命捍卫毛主席的无产阶级革命路线，捍卫以华国锋同志为首的党中央，维护和加强党的团结和统一。"},{"type":"paragraph","text":"我们公社是伟大的领袖和导师毛主席批示过的赤脚医生调查报告的地方。赤脚医生是毛主席亲手培育和扶植起来的，是在毛主席革命路线指引下成长壮大起来的。任何想利用工人阶级、贫下中农的创造，达到个人目的的野心家、阴谋家，最后必定会落得众叛亲离，彻底失败的可耻下场。我们决心坚决服从以华国锋同志为首的党中央的领导，进一步贯彻执行毛主席的无产阶级革命卫生路线，抓好赤脚医生队伍的建设，巩固和发展赤脚医生这一社会主义新生事物，保卫无产阶级文化大革命的伟大成果，夺取卫生革命的新胜利!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d9602e273"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
