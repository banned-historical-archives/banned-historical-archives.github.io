ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"《关于学习解放军加强政治工作的指示》的批示","alias":"","parts":[{"type":"paragraph","text":"《关于学习解放军加强政治工作的指示》的批示"},{"type":"paragraph","text":"（1964年）"},{"type":"paragraph","text":"现在全国学习解放军、学大庆，学校也要学习解放军。解放军好，是政治思想好，也要向全国城市、农业、工业、商业、教育的先进单位学习。"},{"type":"paragraph","text":"国家工业各部门，现在有人从上至下，即从部到厂矿都学习解放军。设政治部、政治处和政治指导员，实行四个第一和三八作风一看来不这样做是不行的，是不能提起整个工业部门（还有商业部门，还有农业部门）成百万成千万的干部和工人的革命精神的。"}],"authors":["毛泽东"],"dates":[{"year":1964}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":402,"page_end":402},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]},{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"《关于学习解放军加强政治工作的指示》的批示","alias":"","parts":[{"type":"paragraph","text":"六、男女关系上："},{"type":"paragraph","text":"对男女关系问题，说起来津津有味，不是严肃的研究讨论，而是求得知识上的快。要谈恋爱不是政治第一，而是感情第-一，甚至抱有自由主义态度。"},{"type":"paragraph","text":"七、团秸观点上："},{"type":"paragraph","text":"重视个人利签，固执已见，个人利益高于群众利益，领导能力强就服从，否则就看不起，发牢，分裂，你有一套，我也有一套，所谓文人相轻，行动自由，不管团结，允许不允许，就开路一马司。"},{"type":"paragraph","text":"八、在政治斗争上："},{"type":"paragraph","text":"夸大个人英雄主义作风，忽视了客观事物的发展规律，斗争性不强，不坚持原则和立场，易犯调和主义，不是过“左”就是过右。"},{"type":"paragraph","text":"九、群众观念上："},{"type":"paragraph","text":"喜欢爬在群众头上发号施今，不深入群众，对阶级没有明确的爱和恰，只是站在当中，对劳动大众可怜，对地主无所谓。"},{"type":"paragraph","text":"《关于学习解放军加强政治工作"},{"type":"paragraph","text":"的指示》的批示"},{"type":"paragraph","text":"（一九六四年）"},{"type":"paragraph","text":"现在全国学习解放军、学大庆，学校也要学习解放军。解放军好，是政治思想好，也要向全国城市、农业、工业、商业、教育的先进单位学习。"},{"type":"paragraph","text":"国家工业各部门，现在有人从上至下，即从部到厂矿都学习解放军。设政治部，政治处和政治指导员，实行四个第一和三八作风一看来不这样做是不行的，是不能提矩整个工业部门（还有商业部门，还有农业部门）成百万成干万的干部和工人的革命精种的。"},{"type":"paragraph","text":"·208·"}],"authors":["毛泽东"],"dates":[{"year":1964}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":221,"page_end":221},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eeed17cc0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
