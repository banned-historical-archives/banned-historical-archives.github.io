" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给文涧泉的信","alias":"","parts":[{"type":"paragraph","text":"给文涧泉的信"},{"type":"paragraph","text":"（1950年5月7日）涧泉表兄大鉴："},{"type":"paragraph","text":"一月十六日来信收到，甚以为慰。唐家托现在尚有多少人，有饭吃否，十哥、十七哥还在否，便时请你告我。文凯先生宜在湖南就近解决工作问题，不宜远游，弟亦未便直接为他作介，尚气谅之。运昌兄连来数信，已复一信寄白蚌口，不知他接到否？南松兄第二次来信已收到，感谢他的好意。此复，顺祝健康！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年五月七日[1]文涧泉，毛泽东的表兄。"},{"type":"paragraph","text":"[2]十哥，即文泮香，毛泽东的表兄。十七哥，即文枚清，毛泽东的表兄。"},{"type":"paragraph","text":"[3]文凯，与文润泉同宗。[4]运昌，即文运昌，毛泽东的表兄。[5]南松，即文南松，毛泽东的表兄。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":337,"page_end":337},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"569b44ccac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
