art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"罗总长接见黄顺玉和廖初江指出：对毛主席著作要有阶级感情，才能学好；只要象他们那样天天读，天天用，就一定能够把毛主席著作学好；","authors":["李书良"],"parts":[{"type":"paragraph","text":"指出：对毛主席著作要有阶级感情，才能学好。只要象他们那样天天读，天天用，就一定能够把毛主席著作学好。"},{"type":"paragraph","text":"本报十二日讯 国务院副总理兼人民解放军总参谋长罗瑞卿大将，今天下午接见了吉林省延吉县东盛人民公社东盛大队第十生产队的妇女队长黄顺玉和人民解放军某部三连副指导员廖初江，同他们进行了亲切的谈话。"},{"type":"paragraph","text":"罗总长对黄顺玉和廖初江勤奋刻苦学习毛主席著作的精神，表示赞扬，称赞他们是学习毛主席著作的模范。他说，对毛主席著作要有阶级感情，才能学好。雷锋、欧阳海、谢臣和你们都是在学习毛主席著作中成长起来的。凡是学习毛主席著作好的，思想就好，作风就好，工作就好。广大青年只要努力学习毛主席著作，就能够健康成长起来，就会出现更多的英雄模范。"},{"type":"paragraph","text":"罗总长对黄顺玉和廖初江说，我们要用你们学习毛主席著作的经验，在全军掀起新的学习毛主席著作的热潮。他说，黄顺玉和廖初江的文化程度很低，工作很忙，但他们学习得好。只要象黄顺玉和廖初江那样热爱毛主席著作，天天读，天天用，就一定能够把毛主席著作学好。"},{"type":"paragraph","text":"最后，罗总长勉励黄顺玉和廖初江要继续努力，相互学习，防止自满，把毛泽东思想真正学到手。"},{"type":"paragraph","text":"接见时在座的有许光达大将、刘志坚中将等。全国妇联副主席李德全、书记处书记董边也在座。"},{"type":"paragraph","text":"罗总长接见黄顺玉和廖初江的情形。 本报记者 李书良摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08ac9f0cf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
