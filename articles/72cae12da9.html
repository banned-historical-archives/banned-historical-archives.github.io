<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席“必须把布匹抓紧”的最新指示是战斗动员令　今年生产一定要超过历史最高水平是行动的口号全市纺织工人奋战第四季度战鼓擂响","authors":[],"dates":[{"year":1968,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　战鼓紧擂号角响，全市三十六万纺织工人奋战八十四天的激烈战斗打响了!他们决心用抓革命、促生产的出色成绩响应国棉十七厂等二十五个单位关于奋战第四季度，超额完成今年国家生产计划的倡议，欢迎赴京参加国庆观礼的上海工人代表的归来。毛主席“必须把布匹抓紧”的最新指示是他们的战斗动员令；今年的生产一定要超过历史最高水平是他们的行动口号。"},{"type":"paragraph","text":"在国棉十七厂等二十五个单位向全市工交战线提出抓革命、促生产倡议书的第二天，棉纺工业公司革委会就举办各厂革委会、造反队和生产组的第一把手紧急学习班。在学习班上大算“三本账”:总账、活账、政治账。大家越算劲头越高，越算潜力越大。国棉八厂原来只算死账和经济账，算来算去，最多也只能提前十五天超额完成今年计划、超过历史上最高的生产水平。“倡议书”把群众发动起来了，政治账一下子就把账算活了，预计可以提前一个月超额完成国家计划、超过历史上最高的生产水平。"},{"type":"paragraph","text":"昨天，棉纺工业公司所属的工厂又召开了高举毛泽东思想伟大红旗，鼓足干劲，力争上游，布机高速高效经验交流大会。会上由国棉二十八厂的纺织工人介绍突出无产阶级政治，大搞布机高速高效群众运动的经验，给兄弟厂的鼓舞极大。会上，一张张决心书飞向主席台。国棉三十一厂的代表跳上讲台大表决心，他们在九月份棉布单产达到建厂以来历史最高水平的基础上，决心向国棉二十八厂学习，十月份力争达到全国先进水平。"},{"type":"paragraph","text":"第一织布工业公司革委会在十月八日夜里，在色织一厂召开了全行业向毛主席献忠心，抓革命、促生产，响应倡议的警师大会。会上热气腾腾，呈现一派你追我赶的动人场面。手帕十厂一马当先。他们在九月份已出色超额完成生产计划，现在更是快马加鞭加油干，争取为全行业超过历史最高生产水平而贡献一切力量。会上，出现了比学赶帮，相互支持的热烈场面。染纱厂提出“织厂要染多少纱，我们就染多少”的响亮口号。专为色织厂整理色织布的色织整理厂也提出，织布厂的布来多少，我们吃多少。“老大难”单位决心后来居上。原来被称为全行业“老大难”的色织四厂，大找差距，急起直追。他们九月份已创造出比八月份提高百分之二十的新成绩，在此基础上，他们坚决表示，今年全年生产一定要超过一九六六年的生产水平。"},{"type":"paragraph","text":"第二织布工业公司革委会也召开了全行业技术、计划干部座谈会，大鼓干劲，大找差距，大订措施，克服右倾保守及“笃定”思想，保证在八十四天中打一场抓革命、促生产的漂亮胜仗。"},{"type":"paragraph","text":"毛巾被单工业公司，前天分地区举行抓革命、促生产的经验交流大会。这个公司小厂多，他们推广了毛巾九厂、十二厂等厂小志气高，革命干劲足，苦干加巧干的先进经验。这些单位大搞技术革新和技术革命，将二十三道工序减少到十五道工序，使得生产突飞猛进，为其他单位抓革命、促生产作出了榜样。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72cae12da9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
