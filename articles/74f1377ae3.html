uthors":[],"dates":[{"year":1987,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全军第二次毛泽东军事思想学术讨论会强调"},{"type":"paragraph","text":"把坚持与发展毛泽东军事思想统一起来"},{"type":"paragraph","text":"新华社大连8月17日电  8月15日在大连结束的全军第二次毛泽东军事思想学术讨论会强调，在国防现代化的伟大实践中必须把坚持与发展毛泽东军事思想统一起来。"},{"type":"paragraph","text":"与会人员在发言或论文中认为，我国国防现代化建设，既要体现当代军事领域的世界共性，又须具有中国特色。为此，必须把坚持与发展毛泽东军事思想贯穿在国防现代化进程的始终。运用毛泽东同志研究军事问题的立场、观点、方法，对国防建设和军队建设中出现的新问题做出创造性的回答。这既是坚持毛泽东思想，又是发展毛泽东思想，是在实践基础上把两者统一起来。"},{"type":"paragraph","text":"许多论文指出，邓小平同志在如何科学认识当代战争与和平问题，我国新时期国防建设的指导思想，军队革命化、现代化和正规化建设三者的关系，我军在新时期国家建设中的职能与作用等一系列问题上的论断和决策，是毛泽东军事思想的重大发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74f1377ae3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
