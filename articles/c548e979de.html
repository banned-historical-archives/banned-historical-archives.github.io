<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“泰国人民之声”号召掌握和运用毛主席人民战争理论指导斗争  泰共领导的人民武装在战斗中成长壮大  人民武装充分动员群众，依靠群众，得到群众大力支持和衷心爱护","authors":[],"dates":[{"year":1968,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“泰国人民之声”号召掌握和运用毛主席人民战争理论指导斗争"},{"type":"paragraph","text":"泰共领导的人民武装在战斗中成长壮大"},{"type":"paragraph","text":"人民武装充分动员群众，依靠群众，得到群众大力支持和衷心爱护"},{"type":"paragraph","text":"新华社十二日讯　“泰国人民之声”电台十日广播一篇文章，欢呼泰国人民武装在泰国共产党领导下，掌握和运用毛主席关于人民战争的光辉理论，在战斗中不断成长壮大。"},{"type":"paragraph","text":"文章说，美泰反动派对泰国人民革命武装斗争的迅速发展，非常害怕。它们企图以加强武力“围剿”来扑灭泰国人民的革命烈火。今年以来，美国—他侬集团出动大批武装军警，疯狂镇压各地人民武装。但是，敌人的野蛮镇压，无法阻挡人民武装斗争的发展。泰国东北部、北部和南部的人民和人民武装英勇地痛击敌人，粉碎敌人的反革命“围剿”，不断取得新的胜利。"},{"type":"paragraph","text":"文章指出，泰国人民武装所以越战越强，并且一次又一次地粉碎美国—他侬集团的反革命“围剿”，不断取得胜利，是由于泰国人民武装是在坚持马克思列宁主义、毛泽东思想的泰国共产党领导下的人民军队。这支人民武装队伍，坚决响应泰国共产党的号召，高举毛泽东思想伟大红旗，努力学习和运用毛主席关于人民战争的理论，并把这个理论同当地的实际情况相结合，指导自己的斗争。"},{"type":"paragraph","text":"文章说，人民武装运用了毛主席制定的“敌进我退，敌驻我扰，敌疲我打，敌退我追”这一游击战战术，掌握战斗的主动权，不断取得歼灭敌人的胜利。"},{"type":"paragraph","text":"文章说，泰国人民武装遵照毛泽东主席关于“革命战争是群众的战争，只有动员群众才能进行战争，只有依靠群众才能进行战争”的教导，从一开始就注意做群众工作。他们组织小分队深入农村，向农民进行宣传动员，使广大农民提高了政治觉悟，认识到美帝国主义侵略掠夺泰国和他侬—巴博集团祸国殃民的罪行。人民武装还积极组织和领导农民惩处卖国贼，反对恶霸地主和暗探特务，受到广大群众的热烈欢迎和支持。"},{"type":"paragraph","text":"文章说，人民武装的战士有高度的政治觉悟，他们走到一起来，不是为任何一个小集团的私利，而是为着最广大人民群众的利益。因此，这支人民武装队伍，打起仗来最勇敢，最聪明，最机智，最有力量。今年年初，北部难府人民武装的一个战士，在被敌人四面围困的情况下，他无所畏惧，沉着、勇敢、机智地利用有利的地形，同敌人周旋，取得了歼敌十名的出色战果。"},{"type":"paragraph","text":"文章指出，由于人民武装充分动员群众，坚决依靠群众，和群众打成一片，得到群众的大力支持和衷心爱护，所以耳目灵通，处处主动，发挥了人民战争的强大威力，使敌人防不胜防，处于被动挨打地位。"},{"type":"paragraph","text":"文章最后指出，泰国人民武装正在高歌猛进。尽管还要经历艰苦、曲折的道路，但是，在泰国共产党的正确领导下，泰国人民武装一定能够取得最后胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c548e979de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
