<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji6","name":"毛泽东全集第6卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"怎样分析农村阶级","alias":"","parts":[{"type":"paragraph","text":"怎样分析农村阶级！"},{"type":"paragraph","text":"（1933年10月）"},{"type":"paragraph","text":"一地主"},{"type":"paragraph","text":"占有土地，自己不劳动，或只有附带的劳动，而靠剥削农民为生的，叫做地主。地主剥削的方式，主要的是收取地租，此外或兼放债，或兼雇工，或兼营工商业。但对农民剥削地租是地主剥削的主要的方式。管公堂和收学租也是地租剥削的一类。"},{"type":"paragraph","text":"有些地主虽然已破产了，但破产之后仍不劳动，依靠欺骗、掠夺或亲友接济等方法为生，而其生活状况超过普通中农者，仍然算是地主。"},{"type":"paragraph","text":"军阀、官僚、土豪、劣绅是地主阶级的政治代表，是地主中特"},{"type":"paragraph","text":"[1]这个文件，是毛泽东1933年10月为纠正在土地改革工作中发生的偏向、正确地解决土地问题而写的，曾由当时中央工农民主政府通过，作为划分农村阶级成分的标准。"},{"type":"paragraph","text":"[2]旧中国农村中有许多的公共土地。有些是政治性的，例如一些区乡政府所有的土地。有些是宗族性的，例如各姓祠堂所有的土地。有些是宗教性的，例如佛教、道教、天主教、伊斯兰教的寺、观、教堂、清真寺所有的土地。有些是社会救济或者社会公益性的，例如义仓的土地和为修桥补路而设置的土地。有些是教育性的，例如学田。所有这些土地，大部分都掌握在别凶恶者。富农中亦常有较小的土豪、劣绅。"},{"type":"paragraph","text":"帮助地主收租管家，依靠地主剥削农民为主要的生活来源，其生活状况超过普通中农的一些人，应和地主一例看待。"},{"type":"paragraph","text":"依靠高利贷剥削为主要生活来源，其生活状况超过普通中农的人，称为高利贷者，应和地主一例看待。"},{"type":"paragraph","text":"二富农"},{"type":"paragraph","text":"富农一般占有土地。但也有自己占有一部分土地，另租入一部分土地的。也有自己全无土地，全部土地都是租入的。富农一般都占有比较优裕的生产工具和活动资本，自己参加劳动，但经常地依靠剥削为其生活来源的一部或大部。富农的剥削方式，主要是剥削雇佣劳动（请长工)。此外，或兼以一部土地出租剥削地租，或兼放债，或兼营工商业。富农多半还管公堂。有的占有相当多的优良土地，除自已劳动之外并不雇工，而另以地租债利等方式剥削农民，此种情况也应以富农看待。富农的剥削是经常的，许多富农的剥削收入在其全部收入中并且是主要的。"},{"type":"paragraph","text":"三中农"},{"type":"paragraph","text":"中农许多都占有土地。有些中农只占有一部分土地，另租入一部分土地。有些中农并无土地，全部土地都是租入的。中农自己都有相当的工具。中农的生活来源全靠自己劳动，或主要靠自己劳动。中农一般不剥削别人，许多中农还要受别人小部分地租债利等别人有轻微的剥削，但非经常的和主要的。"},{"type":"paragraph","text":"四贫农"},{"type":"paragraph","text":"贫农有些占有一部分土地和不完全的工具；有些全无土地，只有一些不完全的工具。一般都须租入土地来耕，受人地租、债利和小部分雇佣劳动的剥削。"},{"type":"paragraph","text":"中农一般不要出卖劳动力，贫农一般要出卖小部分的劳动力，这是区别中农和贫农的主要标准。"},{"type":"paragraph","text":"五工人"},{"type":"paragraph","text":"工人（雇农在内）一般全无土地和工具，有些工人有极小部分的土地和工具。工人完全地或主要地以出卖劳动力为生。土趣的富段一投估有上地"},{"type":"paragraph","text":"制的叫做地主士地，已不务助·成只有附地劳勤，喜筝制"},{"type":"paragraph","text":"急分板"},{"type":"paragraph","text":"文式主最悬以地租方式制刺规民生地财座"},{"type":"paragraph","text":"祝辣营蓝商菜，一但世有只估存一搬修土地，"},{"type":"paragraph","text":"全放"},{"type":"paragraph","text":"（月十日人民委具会批准）"},{"type":"paragraph","text":"回时骏民全部土招部楚租人站公发茶"},{"type":"paragraph","text":"紫新具南利资者工商社会埃对地主的政策，是议"},{"type":"paragraph","text":"mK"},{"type":"paragraph","text":"s另租入一部份"},{"type":"paragraph","text":"1"},{"type":"paragraph","text":"1933年10月，毛泽东撰写了《怎样分析阶级》一文，经中华苏维埃共和国临时中央政府批准，作为划分农村阶级成分的标准。图为《怎样分析阶级》(部分）。"},{"type":"paragraph","text":"便家森老会老馆指南壹田莲幼"},{"type":"paragraph","text":"此本文栏"},{"type":"paragraph","text":"关故存郎光中央苏区时期印行的《查田运动指南》，其中刊载了毛泽东撰写的《怎样"}],"authors":["毛泽东"],"dates":[{"year":1933,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":452,"page_end":456},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd0c2c40f7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
