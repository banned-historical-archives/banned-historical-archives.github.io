" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“肃反中党员是一群凶恶集团”","authors":["北京地质勘探学院","孙增垣"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“肃反中党员是一群凶恶集团”","type":"title"},{"text":"北京地质勘探学院孙增垣","type":"authors"},{"text":"「肃反闹得是满城风雨，人人自危，肃反中党员确实是一群凶恶集团。非常感谢恒俭先生以生动的形象的词句，给广大的人民说了一句公道话，替千千万万无辜受害者伸了冤，而且他也伸张了正义坚持了真理。」","type":"appellation"},{"text":"「肃反就是核心组搞的，指使同学斗。」","type":"appellation"},{"text":"「法院一向违反国际公法和人道准则，甚至向犯人施用肉刑，严刑逼供，肃反时打人是一种普遍现象（在全国范围内），在一个堂堂学府居然私设刑堂，拷打无辜人民，那么在法院中就不必提了。」","type":"appellation"},{"text":"「共产党为了维护自己的政权，甚至独裁和杀人，专政就是露骨的独裁，扼杀一切人民民主和自由。」","type":"appellation"},{"text":"「中国肃反是扩大化了，错杀了七十二万人。如果真错杀了七十二万人的话，还是小意思，可能杀的还不会这样少吧？」","type":"appellation"},{"text":"「肃反，党根据人口百分之五来印发逮捕证，以致一夜中就逮捕了三万二千人，造成了白色恐怖。」","type":"appellation"},{"text":"「肃反运动伤害了人的良心。肃反时对华侨的严重迫害是既破坏了统一战线，又损害了中华人民共和国公民的良心，以及严重的损害了作为—个人所应有的威严，每搞一次运动，都有许多无辜的被害者和自杀者，这些蒙难者都给作了政祭坛上的羔羊任人宰割，党的这种作法，是在精神上扼杀一个人，是在精神上给其判处死刑，是一种变态的残忍的肉欲的满足，一种性的呼喊，性的冲动和性的变态。建国以来至『肃反』为止，大批死难者的无辜者的数目亦相当可观。」","type":"appellation"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee0f6bbbe7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
