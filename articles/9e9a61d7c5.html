script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级法权","authors":[],"dates":[{"year":1972,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法权，是指社会的统治阶级为维护本阶级的利益，而提出和规定的一些法律原则，它是阶级意志的反映。资产阶级法权，就是资产阶级为维护其剥削制度，而提出的并强制人们必须遵守的法律原则，是资产阶级意志的反映。"},{"type":"paragraph","text":"资产阶级法权的特征，是以形式上的平等掩盖事实上的不平等，也就是说，作为资产阶级法律上所规定的所谓平等权利，都是以事实上的不平等为前提的。比如，在资本主义国家中，都有这样一条法律，宣称:“私有财产是神圣不可侵犯的权利。”这条法律在形式上几乎对于一切人都是平等地适用的，看起来好象公平得很。然而，工人一无所有，根本没有什么“神圣不可侵犯”的私有财产要保护。正如列宁所指出的，这种资产阶级的法权不过是为了保护资产阶级，“使其不受日益贫穷破产而变成除双手以外一无所有的无产者大众的侵犯。”"},{"type":"paragraph","text":"在社会主义社会里，无产阶级专政代替了资产阶级专政，资产阶级的国家机器连同它的法律制度都被粉碎了，生产资料公有制代替了资本主义私有制，从根本上消灭了人剥削人的制度。但是，社会主义社会“是刚刚从资本主义社会中产生出来的，因此它在各方面，在经济、道德和精神方面都还带着它脱胎出来的那个旧社会的痕迹。”例如，“各尽所能，按劳分配”这个社会主义分配原则，是在资本主义制度下绝对不可能实现的，但比起“各尽所能，按需分配”的共产主义分配原则来，它仍然不可避免地存在着某些资产阶级法权的残余。例如，有的劳动者已经结婚，有的还未婚；有的子女较多，有的子女较少；假定他们向社会提供的劳动相等，劳动报酬也相等，但实际生活的富裕程度却不相等。在这里，也存在着从平等的条件(对大家都实行按劳分配)出发，而结果却有事实上的不平等(生活富裕程度不同)的情况。消除资产阶级法权残余，单凭主观愿望是不行的，只有坚持无产阶级专政条件下的继续革命，创造条件，才能逐步加以消除。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e9a61d7c5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
