script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《中国出了个毛泽东》丛书出版 计32卷、600万字，江泽民为丛书题词 大型画册《毛泽东在延安》出版发行","authors":[],"dates":[{"year":1993,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京12月17日电　为纪念毛泽东诞辰100周年，经中宣部、新闻出版署批准，由毛岸青、邵华主编，海南出版社、江苏文艺出版社联合出版的大型纪实丛书《中国出了个毛泽东》和大型连环画册《中国出了个毛泽东画卷》今天正式出版发行。江泽民同志为这套丛书题词:“毛泽东同志永远活在人民心中”。杨尚昆同志为丛书写了序言。今天下午雷洁琼、李锡铭、程思远、赛福鼎·艾则孜、赵朴初等出席了在人民大会堂举行的出版座谈会。"},{"type":"paragraph","text":"这套丛书共32卷、计600万字，作者既有老一辈革命家，也有毛泽东的亲属、身边工作人员、著名老作家以及优秀中青年作家，他们或是同毛泽东有过直接接触，熟悉和了解毛泽东生平业绩，或是对毛泽东革命生涯以及党史、军史有过深入的研究。书中许多珍贵史料多为首次披露。"},{"type":"paragraph","text":"这套丛书是由中央文献出版社、中央党校出版社、军事科学出版社、海南出版社、江苏文艺出版社、中国少年儿童出版社联合出版的。"},{"type":"paragraph","text":"新华社西安12月17日电　据《陕西日报》报道:为纪念毛泽东诞辰100周年，由中共陕西省委宣传部主编、陕西旅游出版社出版的大型画册《毛泽东在延安》近日出版发行。中共中央总书记、国家主席江泽民为该画册题写了书名。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"472062a97c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
