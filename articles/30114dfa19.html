art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总政庆祝新中国成立54周年暨纪念毛泽东诞辰110周年书画作品展开幕徐才厚参观展览","authors":["王咸金/刘亚平"],"parts":[{"type":"paragraph","text":"本报北京9月27日讯王咸金、刘亚平报道：翰墨写忠诚，丹青映丹心。总政庆祝新中国成立54周年暨纪念毛泽东同志诞辰110周年书画作品展，26日在京开幕。中共中央书记处书记、中央军委委员、总政治部主任徐才厚参观了展览。"},{"type":"paragraph","text":"这次展览参展作品的作者主要是总政机关和直属单位的干部、战士、职工以及部分离退休老同志，他们当中既有享誉军内外的书画大师，也有“才露尖尖角”的新秀；年龄最大的98岁，最小的26岁。展览荟萃的161件作品，虽然风格各异，但都充分体现了广大官兵对伟大祖国的热爱和对毛泽东同志的深深缅怀之情，表达了人民军队忠于党的坚定信念，体现了广大书画爱好者弘扬民族先进文化的创作成果。"},{"type":"paragraph","text":"总政治部副主任唐天标、袁守芳、张树田出席开幕式并参观了展览，总政治部主任助理孙忠同在展览开幕式上致词。RW：徐才厚"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30114dfa19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
