" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji5","name":"毛泽东全集第5卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"攻击龙冈敌张辉部的命令","alias":"","parts":[{"type":"paragraph","text":"攻击龙冈敌张辉瓒部的命令!!"},{"type":"paragraph","text":"（1930年12月29日）"},{"type":"paragraph","text":"（一）敌张辉瓒师由南龙向我前进，本（二十九）日午前十时，其先头部队到达此三十里之龙冈圩（戴岳旅一○三团），后续部队不明。潭头有到敌说。"},{"type":"paragraph","text":"谭道源师仍在源头、上下潮。毛炳文师移到洛口、平田、东山坝一带。"},{"type":"paragraph","text":"（二）方面军决以左路军于明（三十）日攻击龙冈之敌，右路军则应派部协助歼灭该敌。"},{"type":"paragraph","text":"（三）第十二军（缺三十五师，包括六十四师在内）任左翼，应于明晨四时前出动，向表湖前进。应以一部分占领龙冈南端水西西端之万工山，以主力截断通南龙之大道（经兰石、茅坪），须于午前十时占领所要之阵地。"},{"type":"paragraph","text":"第三军任右翼，应于明晨五时出动，占领木坑以右地区及亭子岭之主要阵地，向龙冈攻击前进（须于午前九时半开始攻击)。右与"},{"type":"paragraph","text":"[1]这是1930年12月29日20时毛泽东和朱德在江西永丰县君埠街发出的红军第一方面军红字第十二号命令。"},{"type":"paragraph","text":"[2]张辉瓒师，指国民党军第九路军第十八师，师长张辉瓒。[3]戴岳旅，指国民党军第九路军第十八师第五十二旅，旅长戴岳。[4]谭道源师，指国民党军第九路军第五十二师，师长谭道源。右路军派出队确取联络，如右路军未派出部队，则应向右延伸特别注意右翼。"},{"type":"paragraph","text":"（四）总攻击龙冈时间为三十日午前十时。"},{"type":"paragraph","text":"（五）右路军应于明晨派出一部，经回龙到樊埠附近，左接第三军，右接第十二军，向龙冈之西北端（张家车附近）攻击前进，到达时须即向三军及总司令部取联络。如上固无敌，则以主力向樊埠、张家车之线攻击前进，而以小部警戒下固、潭头。"},{"type":"paragraph","text":"（六）各军小行李及伤兵收容所、绷带所等均自择地点位置，敌方俘虏招待所设小别。"},{"type":"paragraph","text":"（七）大行李仍位置于阳\"停止待命，如小布发现敌情则径向约溪移动。"},{"type":"paragraph","text":"（八）总司令部明日移到小别附近指挥。附记："},{"type":"paragraph","text":"1．明日出发前各部应集合官兵讲话，作政治鼓动，预备队亦应随时作政治鼓动。"},{"type":"paragraph","text":"2.十二军应注意竭力截断敌南龙之增援队。3.各军俘虏兵可向小别招待所转送。4.各军应注意相互间之联络及搜集情报。5.各部须注意搜集西药，无线电亦不准破坏。右令"},{"type":"paragraph","text":"总司令朱德政治委员毛泽东"}],"authors":["毛泽东"],"dates":[{"year":1930,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":239},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aac5ec880b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
