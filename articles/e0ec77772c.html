al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"五言排律·湘江漫游联句","alias":"","parts":[{"type":"paragraph","text":"五言排律·湘江漫游联句"},{"type":"paragraph","text":"（1914年）晚霭2峰间起，（萧瑜）归人江上行3。 (萧瑜)云流千里远，（萧瑜）人对一帆轻。 (毛泽东)落日荒林暗，（毛泽东）寒钟古寺生回。 (萧瑜)"},{"type":"paragraph","text":"深林归倦鸟，凹(萧瑜)"},{"type":"paragraph","text":"[1]此诗见于萧瑜《我和毛泽东的一段曲折经历》（昆仑出版社1989年版)。萧瑜（1894-1976)，字子升，又名旭东，湖南湘乡人，萧三的二哥。"},{"type":"paragraph","text":"[2]霭，云气。晚霭，傍晚时的云气。"},{"type":"paragraph","text":"[3]归人，回家的人。江上行，指乘船而行。唐代王建《送丘为下第归江东》：“五湖三亩宅，万里一归人。”"},{"type":"paragraph","text":"[4]云流，指云在天空中不断地随风飘动。[5]荒林，人迹罕至的树林。"},{"type":"paragraph","text":"[6]寒钟，听了令人产生寒意的钟声。古寺，古庙。生，发生。这里指敲钟发出声音。"},{"type":"paragraph","text":"[7]深林，茂密的树林。深林归倦鸟，即倦鸟归深林。宋代陈造《三月初晚晴寄高缙之》诗三首其三有“森木倦鸟归”之句。晋代陶渊明《归去来兮辞》中亦有“鸟倦飞而知还”之句。"},{"type":"paragraph","text":"高阁倚佳人川。（毛泽东）"},{"type":"paragraph","text":"1914年2月，湖南第四师范职员及预科学生合影。第五排左二为毛泽东。"},{"type":"paragraph","text":"[1]阁，旧时女子的住房。高阁，犹言高楼。倚，依靠，指身体靠在物体上。佳人，美人。高阁倚佳人，即佳人倚高阁。这里指少妇倚楼盼望远行的丈夫归来。"},{"type":"paragraph","text":"1915长沙岳麓山爱晚亭，毛泽东常和同学们到这里读书游玩。"}],"authors":["毛泽东"],"dates":[{"year":1914}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":165,"page_end":168},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0ec77772c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
