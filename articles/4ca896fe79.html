rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席啊，毛主席！您是我们蒙古族贫苦牧民的大救星","authors":[],"parts":[{"type":"paragraph","text":"在旧社会靠讨饭过日子的蒙古族老大娘仁钦，深深懂得今天的幸福生活来之不易。她衷心感谢毛主席，无限热爱毛主席。每当她抬头看到家里挂着的毛主席像，望着毛主席那伟大的光辉形象，她就含着激动的泪花，默默地向毛主席保证：“毛主席啊，毛主席！您是我们蒙古族贫苦牧民的大救星，我们世世代代永远忠于您，世世代代跟着您，革命到底意志坚，海枯石烂不变心。”"},{"type":"paragraph","text":"仁钦大娘是阿巴嘎旗白音查干公社贫协主任。她怀着对毛主席深厚的无产阶级感情，如饥似渴地学习毛主席著作，被评为公社活学活用毛泽东思想积极分子。一九六八年八月，一批北京知识青年响应毛主席的伟大号召，来到内蒙古大草原安家落户，仁钦大娘望着这些从毛主席身边来的“客人”，第一句话就问：“你们见过毛主席没有？毛主席的身体非常健康吧？”当知识青年告诉她毛主席身体非常非常健康时，她无比兴奋地说：“这是我们贫苦牧民的最大幸福！”"},{"type":"paragraph","text":"旧社会的折磨使仁钦大娘得了一身病。去年四月，她被批准到北京治疗。临行前，她几天没睡好觉。到北京后，乘汽车去医院，途经中南海，陪她来的知识青年告诉她，这就是毛主席居住的地方。返回时，她说什么也不坐车了，硬是步行七、八里到了中南海旁边。她坐在那里，凝视着中南海的大门，不停地用汉话祝福毛主席万寿无疆！"},{"type":"paragraph","text":"仁钦大娘的一家人都无限热爱毛主席，努力活学活用毛泽东思想。在阿巴嘎旗草原上，到处都流传着她一家人活学活用毛泽东思想的动人事迹。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ca896fe79"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
