script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命宝书握手中　万众欢呼毛泽东　长春五万多群众买到新出版的《毛泽东选集》《毛主席语录》　郑州三天发行十万多册《毛主席语录》和毛主席著作单行本","authors":[],"dates":[{"year":1966,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命宝书握手中　万众欢呼毛泽东"},{"type":"paragraph","text":"长春五万多群众买到新出版的《毛泽东选集》《毛主席语录》"},{"type":"paragraph","text":"郑州三天发行十万多册《毛主席语录》和毛主席著作单行本"},{"type":"paragraph","text":"据新华社长春十七日电　昨天，吉林省长春市有五万多名革命群众，买到了盼望已久的新出版的《毛泽东选集》和《毛主席语录》。他们心情万分激动，表示一定要更高地举起毛泽东思想伟大红旗，干一辈子革命，学习一辈子毛主席著作，让毛泽东思想世世代代传下去。"},{"type":"paragraph","text":"长春市的革命群众听说新华书店要发售《毛泽东选集》和《毛主席语录》，有不少人在头一天晚上就到书店门前排队。书店的同志为了满足大家的要求，提前开门售书。许多人拿着刚买到手的《毛泽东选集》，激动地高呼：“毛主席万岁！”“毛泽东思想万万岁！”他们还在书店留言簿上写下了自己对毛主席著作无限热爱的心情。第十一中学学生杨安云在留言簿上写道：“四卷金书握手中，万众欢呼毛泽东，革命真理传万代，狂风暴雨方向明。”"},{"type":"paragraph","text":"长春市的新华书店为了及时地把《毛泽东选集》和《毛主席语录》送到革命群众手中，今天还组织了流动供书站。"},{"type":"paragraph","text":"据新华社郑州十七日电　人们渴望已久的《毛主席语录》，已在河南省郑州市大量发行。三天内，已销售《毛主席语录》和毛主席著作单行本十万多册，买到《毛主席语录》的广大工农兵群众如获至宝，欢欣鼓舞，振臂高呼：“中国共产党万岁！”“毛主席万岁！”“无产阶级文化大革命万岁！”"},{"type":"paragraph","text":"《毛主席语录》大量发行的消息，像闪电一样传遍了全市，几天来，新华书店和新华书店在各处设立的服务部，从早到晚挤满了买书的人群，广大工农兵群众看到红光耀眼的《毛主席语录》，都激动地说，要不是开展无产阶级文化大革命，不知啥时候才能买到一本《毛主席语录》，这是我们无产阶级文化大革命的胜利！有的人买到了《毛主席语录》以后，高兴得跳起来，立即把书打开，放开嗓门，充满革命豪情地念了起来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f3255d9f7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
