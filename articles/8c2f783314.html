" crossorigin="">{"props":{"pageProps":{"books":[{"id":"dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4","name":"毛泽东思想万岁（1913-1943卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年武汉","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4.pdf"],"article":{"title":"电贺苏联红军第二十五周年","alias":"","parts":[{"type":"paragraph","text":"电贺苏联红车第二十五周年"},{"type":"paragraph","text":"（一九四三年二月二十二日）斯大林同志，联共中央和红军的将士们："},{"type":"paragraph","text":"中国共产党中央委员会代表全党同志与中国人民热烈地庆祝红军成立二十五周年到与红军反攻的胜利。"},{"type":"paragraph","text":"经过了二十五周年的奋斗，特别是经过由国际劳动群众的“狂欢节”发展成为全人类的“狂欢节”。五大洲一切民族爱好自由的人民，都已由亲身的经，一致公认红军和苏联人民是抵抗法西斯暴力的中流砥柱，是创造新的和平世界的急先。红军近三个月来的攻势，无疑是历史上空前的，并且其规模和速度还在不断加大，红军从十一月十九日在伏尔加河上的危城发动反攻，三个月后就一跃而至六万多公里以西的德湟泊河附近。红军将希特勒匪徒完全出国境，只是时间问题了。自从红军开始对德战争，世界形势就已经发生了显著的变化，现在由于红军的胜利，新世界未来面目已更加明朗，更加确定了。一切形式的法西斯制度和法西斯思想，已经在全世界永远失去存在的余地。民族的自由，政治的民主已经成为新世界的确定不够的原则，我们中国人民欢迎这个新的时代的到来，我们欢迎全世界一切反法西斯力量为争取这个新时代的团结和努力。与红军的胜利同时，英美在北非，美国在太平洋，也都得到重要的胜利，英美正在积极准备实践欧陆第二战綫的诺言，对于中国，美、英都废除了不平等条约。中国人民对于这个时代的首要任务就是更加团结自已，准备象红军瞩逐德国侵略者。我们相信，由于中国人民的团结奋斗，由于苏联、英、美的胜利和对于中国的援助，我们也一定能够转入反攻并最得最后胜利的。"},{"type":"paragraph","text":"红军和红军的最高统师斯大林万岁！反法西斯侵略战争的胜利万岁！中苏英美的团结万岁！"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"毛泽东关于共产国际解散问题"},{"type":"paragraph","text":"（一九四三年五月二十六日）"},{"type":"paragraph","text":"毛泽东同志子二十六日晚，在延安干部大会上的坛上出现时，全会场报以震动屋宇的掌声，会系由中国共产党中央书记处召集，传达共产国际执行主席团及中共中央关于解散共产国际问题的两个历史文件。任时同志宣布开会理由及李富春同志朗读两大文件后，毛泽东同志以中共中央政治局主席之资格，向大会作报告。"},{"type":"paragraph","text":"毛泽东同志首先指出共产国际的解散，正如美国通讯社所报导的是一件“划时代的大事”。现于四天以来全世界各国不是反法西斯阵营中的和法西斯侵略者阵营中的，不何党何派，对此间题都以极度注意，就可明这一点。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":2,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":313,"page_end":313},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c2f783314"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
