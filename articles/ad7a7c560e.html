script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用实际行动反击右倾翻案风","authors":["沈卫国","蒋韫玮"],"dates":[{"year":1976,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"培光中学七五届毕业生　沈卫国　蒋韫玮"},{"type":"paragraph","text":"我们学习了北京市应届高中毕业生上山下乡誓师大会《给伟大领袖毛主席的一封信》，心潮澎湃，豪情满怀。北京市应届高中毕业生说出了我们的心里话。我们是已经被批准到云南西双版纳插队落户的革命知识青年，我们决心到农村三大革命运动中滚一身泥巴，干一辈子革命。"},{"type":"paragraph","text":"前一时期，教育界刮起了一股右倾翻案风，叫嚷要恢复无产阶级文化大革命前的旧招生制度，“要挑中学生好的，要直接上大学”，妄图把学校教育重新拉回到十七年的修正主义老路上去，引诱学生脱离工农，脱离三大革命运动实践，闭门读书，去爬修正主义的那个“小宝塔”，走资产阶级精神贵族的道路。我们清楚地知道，文化大革命前，一些青年由于受了刘少奇修正主义教育路线的毒害，“两耳不闻窗外事，一心专读圣贤书”，削尖脑袋想进大学，进了大学就想做官当老爷，成为“一年土，二年洋，三年不认爹和娘”的资产阶级精神贵族，有的人甚至堕落成为资产阶级右派分子。这些惨痛的历史教训，我们决不能忘记。无产阶级文化大革命彻底摧毁了旧的教育体系。几年来，我们通过到工厂、农村、部队开门办学，接受了工农兵的再教育，也亲眼看到了许多中学生毕业后在农村广阔天地里茁壮成长的事实。他们的战斗历程和先进事迹，给了我们很大教育。我们深深体会到:农村也是大学，农村有学不完的知识，干不完的事业。因此，我们很早就立下了到农村去，到边疆去，到祖国最需要的地方去干一辈子革命的决心。如今，通过教育革命大辩论，我们更要以实际行动，痛击教育界出现的那些奇谈怪论!"},{"type":"paragraph","text":"我们是毛泽东时代的革命青年，是光荣的共青团员。人类解放我解放，实现共产主义是我们最崇高的理想。为了不使苏联变修的悲剧在中国重演，为了缩小三大差别，限制资产阶级法权，向共产主义的理想境界迈进，我们接过火红的战旗，向七四届毕业生胡兆禹、刘建萍学习，坚决走上山下乡的金光大道。今天，我们已经铁下一条心:紧跟领袖毛主席，迎着风浪向前闯，南国边疆把根扎，誓将青春献人民。"},{"type":"paragraph","text":"“世上无难事，只要肯登攀”。我们要用马列主义、毛泽东思想武装头脑，发扬“可上九天揽月，可下五洋捉鳖”的革命精神，以阶级斗争为纲，坚持党的基本路线，和贫下中农一起战天斗地学大寨，大批资本主义，大批修正主义，大干社会主义，永远朝着共产主义的高峰登攀。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad7a7c560e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
