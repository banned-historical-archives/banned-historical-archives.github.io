ear":1946,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生:"},{"type":"paragraph","text":"素闻贵报是人民的喉舌，且为人民解除一切疑难的问题，我现在有一件事奉告，并请代为怀疑。"},{"type":"paragraph","text":"战时的侨眷联济会，在广东四邑是个很活跃的救济团体，它作过很大的事实，救过很多的贫困四邑侨眷。但是终因它的宗旨不正，而被侨眷及华侨们在这肃奸的时候冠以“高利贷”的罪名检举了，控告了。他们满以为可以在中国贷国币，在美国收美金，却不意被那贤明的广东省政府罗主席批准了那侨眷们所要求的“借国币还国币，月息一分五厘”的公正办法，这真令我们感到快慰。"},{"type":"paragraph","text":"除了广东的侨眷联济会外，民三十四春在上海亦有大同小异的事情发生。不过这是个人的吧了。缘有若干粤侨富商，他们拥着巨量的股票，金条，及各种货币等投机致富的工具，但是他们总觉得这些东西在将来和平后是会贬值的，或者甚至会分文都不值的。同时看到随时会有战神降临的上海，益使他们感觉到自己财产的不稳固，所以他们也来一个“借伪币还美金”的法子，向那些困留在孤岛上的侨美华侨家眷们施行他们那玄妙的法术—高利贷，—在上海化去少数的伪币，而得到大量的美票存在美国。试看借一万元的伪币，就要还一百三十二元八角的美票，这是什么汇率啊!?简直是目无国法了。肤浅地看来，他们确是大慈大悲，救苦救难的大慈善家，却不知其居心的很毒呢!"},{"type":"paragraph","text":"现有问题一则上问，就是广东省政府罗主席所核准的那“借国币还国币，月息一分五厘”的办法，对于在上海的广东同乡是否能行?恳借贵栏一角予以披露为感并请"},{"type":"paragraph","text":"撰安　一个负债者谨上"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b79778fcc4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
