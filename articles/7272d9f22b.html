<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"孙大雨现形记——上海市人代会侧写","authors":["文汇报记者"],"dates":[{"year":1957,"month":8,"day":17}],"is_range_date":false,"parts":[{"text":"孙大雨现形记——上海市人代会侧写","type":"title"},{"text":"文汇报记者","type":"authors"},{"text":"文汇报18日讯：昨天下午，在上海市人代会江宁、榆林、东昌区大组会上，人民代表穷追猛打右派骨干分子孙大雨。复旦大学教师们和其他各组代表，纷纷来到这个战场助战。一条善于变色的蜥蜴的伪装，在十手所指、十目所视的形势下，被无情地一层层剥了下来!","type":"paragraph"},{"text":"孙大雨在全体代表一致严正的要求下，昨天来到了会场，并且作了四十分钟的交代。孙大雨开始空洞的承认自己是右派分子，他把自己比作唐·吉柯德，是反党反社会主义的大罪人。但他仍然拒绝交代具体的反党罪行，并且把自己打扮成为一个“一向反对中间路线”的进步分子。","type":"paragraph"},{"text":"被弥天大谎激怒了的人民代表们再也忍不住了。有三十五张条子递向主席台要求发言。全增嘏、漆琪生、苏步青、谈家桢、沈体兰……这些在民主斗争中和解放后几年来被孙大雨陷害和打击过的教授们，一个接着一个地起来揭露。孙大雨的原形现出来了……","type":"paragraph"},{"text":"孙大雨是民主教授，是进步分子吗?不，不是的!在民主革命斗争时期，孙大雨就已经是一个右派。漆琪生揭露说，抗战时，他就在国民党培养特务、反动分子的中央政治学校做事。解放以前，他又拜倒在特务头子陈雪屏门下，和孙科、梁寒操、朱家骅勾勾搭搭。","type":"paragraph"},{"text":"他进了民主教授的组织大教联，同时又参加了国民党操纵的与大教联相对抗的大教组织，脚踏两条船。","type":"paragraph"},{"text":"“我干过大教联的主席。”这是孙大雨的挡箭牌。沈体兰当场责问孙大雨:“你在大教联干了些什么?”沈体兰指出:第一，罗隆基提示要了，在好几次大教联会上和彭文应结成一气，主张走中间路线。第二，他以大教联代理主席的身份，带了用英文写成的材料去见杜鲁门的特使魏德迈，“申诉”中国知识分子的苦楚。第三，还怂恿沈体兰代表大教联去见司徒雷登……。人们可以清楚地看到，要走反动的第三条路线，三分反蒋、七分反共的，不是孙大雨是谁?","type":"paragraph"},{"text":"解放后，国家发生了根本变化，知识界面貌也日新月异，可是孙大雨不仅原封未动，反而变本加厉。人民代表们揭露:孙大雨一贯敌视新社会，仇视共产党，不务正业，造谣生事；最后竟然开出了一张污蔑五、六十位党内外人士为反革命的黑名单。人民代表追问:这张黑名单是怎样开出来的?是谁同谋、支持?漆琪生教授指出，这张黑名单是以孙大雨为主的右派集团的集体创作，彭文应、陆诒、赵文壁、王造时等都是同谋。这张黑名单通天通到罗隆基、曾昭抡。","type":"paragraph"},{"text":"在擦亮了眼睛的人民代表面前，任何乔装改扮都难以过关。苏步青教授面对孙大雨说:“两个月来我已经到各高校作了六次报告来揭露你。我的声音很宏亮，我要广为宣扬你们的罪行，直到你们完全投降为止!”","type":"paragraph"},{"text":" ——原载《文汇报》1957年8月18日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7272d9f22b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
