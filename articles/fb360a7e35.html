ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"给毛岸英的信","alias":"","parts":[{"type":"paragraph","text":"给毛岸英的信！！"},{"type":"paragraph","text":"（1946年12月26日）岸英儿："},{"type":"paragraph","text":"来信两封均收到。第二封信写得很好，这表示较之你初回国时不但文字有进步，思想品质也有进步。你的那些工作是好的。坚持读文章的计划，很有必要，再读一年也是好的。我身体比你走时更好些了。江青、李讷都如常。"},{"type":"paragraph","text":"祝你进步！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四六年十二月二十六日"},{"type":"paragraph","text":"[1]1946年11月，毛岸英随中宣部从延安撤退到瓦窑堡一带后，把自己的工作情况和学习心得写信告诉父亲。毛泽东收到信后，在12月26日他53岁生日的那一天给毛岸英回了这封信。1946年，毛泽东和毛岸英在延安。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":332,"page_end":333},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb360a7e35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
