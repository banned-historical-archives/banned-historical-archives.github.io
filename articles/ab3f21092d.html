art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"古巴总统再次参观我国展览会南汉宸赠给贵宾十二部毛主席著作西班牙文译本","authors":[],"parts":[{"type":"paragraph","text":"据新华社哈瓦那29日电 古巴总统多尔蒂科斯今天上午再次参观了中国经济建设成就展览会。"},{"type":"paragraph","text":"同多尔蒂科斯总统一起参观的，有古巴内政部长、国内贸易部长、司法部长、公共福利部长、国家银行行长、革命海军代理司令等"},{"type":"paragraph","text":"中国经济建设成就展览团团长南汉宸、中国驻古巴大使申健等陪同贵宾们进行了参观。"},{"type":"paragraph","text":"多尔蒂科斯总统在这次参观过程中，进一步了解了中国工农业的生产情况，并且就钢铁工业和机械工业的结合，现代化小高炉在发展钢铁生产方面的作用等问题提出了询问。"},{"type":"paragraph","text":"南汉宸团长赠送给贵宾们十二部毛泽东主席著作的西班牙文译本，其中包括“毛泽东主席和亚洲、非洲、拉丁美洲人士的几次重要谈话”、“战争和战略问题”、“抗日时期的经济问题和财政问题”。贵宾们非常高兴地接受了这些礼物。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab3f21092d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
