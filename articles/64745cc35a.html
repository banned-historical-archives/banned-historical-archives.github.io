的打虎总结报告的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":2}],"is_range_date":false,"parts":[{"text":"毛泽东转发李富春在中财委汇报会议上的打虎总结报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"中央和军委各部门，中央人民政府各党组；各中央局、大军区、志愿军，并转分局、省市区党委，各级军区和各军：","type":"appellation"},{"text":"（一）李富春同志这个报告很好，请你们仿照办理。（二）打虎必须从算帐入手，许多同志忽视算帐，专去逼供，这是不对的。（三）大老虎不限一亿元以上，富春报告中所说的六条都应算作大老虎。（四）跟着清查经济内奸的发展，必能清出许多政治内奸，有些经济内奸本人即是政治内奸，务请同志们注意这点。但目前打虎尚未深入，应引导人们的注意力集中于清查经济内奸，只将政治性的问题记上一笔帐，待到经济性的问题大体解决了，再将政治帐上所记的问题提出来作一次清理，解决政治性的问题。（五）富春同志的报告可发给各打虎组织的领导人阅看。","type":"paragraph"},{"text":" 毛泽东二月二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64745cc35a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
