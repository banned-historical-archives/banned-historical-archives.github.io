ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"毛泽东等祝贺胡志明七十寿辰的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺胡志明七十寿辰的电报！"},{"type":"paragraph","text":"（1960年5月18日）越南劳动党中央委员会主席兼总书记、越南民主共和国主席，敬爱的胡志明同志："},{"type":"paragraph","text":"欣逢你七十寿辰之际，我们谨代表中国共产党、中华人民共和国政府和中国人民向你一越南劳动党的创始者和领导者、越南人民最敬爱的领袖、国际共产主义运动杰出的战士和中国人民最亲密的朋友致热忧的、兄第般的祝贺。"},{"type":"paragraph","text":"数十年来，你以自己的全部精力和丰富的革命斗争经验，为越南劳动人民的彻底解放，为越南和平、统一、独立和民主的事业进行了长期的英勇不屈的斗争，并且取得了巨大的胜利。你对越南人民革命事业、国际共产主义运动和工人运动以及世界和平所作的卓越贡献，使你不仅受到越南人民，而且受到中国和世界各国人民的敬爱。"},{"type":"paragraph","text":"我们衷心地祝贺你健康和长寿。祝你在领导越南人民建设社会主义、争取越南和平统一、反对美帝国主义的战争政策和侵略政策"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国主席刘少奇、全国人民代表大会常务委员会委员长朱德、国务院总理周恩来联名给越南劳动党中央委员会主席兼总书记、越南民主共和国主席胡志明的电报。对胡志明的七十寿辰表示热忱的、兄弟般的祝贺。毛泽东全集第四十三卷和保卫远东和世界和平的斗争中取得更大更新的成就。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六〇年五月十八日"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":5,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":352,"page_end":353},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82c439b560"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
