ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"对《美军重视研究现代战争中“人的因素”》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对《美军重视研究现代战争中“人的因素”》一文的批语\""},{"type":"paragraph","text":"（1960年7月）此篇印发。"},{"type":"paragraph","text":"[1]中共中央宣传部1960年7月20日编印的《宣教动态》第五十四期上刊载的这篇文章说，美军鉴于侵朝战争中士气严重不振的失败教训，以及美国青少年的意志和体质日渐减弱，近几年来他们不断强调“人的因素”，强调人的作用的言论有显著增加。美军对现代战争中“人的因素”的研究，有一套庞大的机构，并且同一些大学、研究所互相联系、配合。此外，美军还着重研究战俘问题、诱骗官兵以军队为职业的问题和消除对核子战争的恐惧问题，并认为必须加强以下几个方面的工作：一、加强官兵和青年的“反共爱国教育”。二、提高军人的待遇。三、加强“核子信心教育”。[2]指印发给当时正在北戴河参加中共中央工作会议的同志。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":447,"page_end":447},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7748aceaf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
