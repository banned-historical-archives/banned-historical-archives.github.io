thors":[],"dates":[{"year":1966,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国都应该成为毛泽东思想的大学校"},{"type":"paragraph","text":"今日“抗大”——塔里木农垦大学"},{"type":"paragraph","text":"塔里木农垦大学高举毛泽东思想伟大红旗，坚决按照毛主席制定的无产阶级教育路线办学。他们始终以毛主席著作为主课，用毛泽东思想武装革命师生的头脑。这是农大的教师向同学们讲述毛主席《在延安文艺座谈会上的讲话》。"},{"type":"paragraph","text":"农垦大学把课堂搬向广阔的田野，使书本知识同生产实践紧密结合。这样做，大大提高了教学质量，培育了热爱劳动的新人。这是水利六五班学生在野外实习。"},{"type":"paragraph","text":"农垦大学的学生劳动归来。"},{"type":"paragraph","text":"时刻不忘学习毛主席著作。这是蚕桑站的工人利用劳动休息时间，在地头学习毛主席著作。"},{"type":"paragraph","text":"农垦大学一直保持着“抗大”的优良校风。他们做到了行动战斗化、生活集体化、组织军事化。学生一边学习政治和各种生产技能，一边苦练保卫祖国的过硬本领。这是他们进行着装竞赛。"},{"type":"paragraph","text":"来自上海的青年，有的人过去连棉田都没有到过。在农垦大学经过劳动锻炼，现在已能管理高标准的棉田。这是来自上海的三个青年在管理棉田。"},{"type":"paragraph","text":"农垦大学建校第一年，就收获了五十多万斤粮食，做到粮食全部自给。　本版照片是新华社稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7de29a8293"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
