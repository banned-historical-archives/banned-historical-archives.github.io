script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朵朵红花向阳开　千歌万曲献给党广大工农兵热情歌颂毛主席和中国共产党　本报庆祝中国共产党五十周年征文来稿踊跃，一个半月收到一万多件","authors":[],"dates":[{"year":1971,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在欢庆中国共产党诞生五十周年的日子里，本市和各地广大工农兵群众，纷纷写诗作文，纵情歌颂伟大、光荣、正确的党和伟大领袖毛主席，歌颂毛主席革命路线的伟大胜利，歌颂无产阶级文化大革命的伟大胜利。自本报为庆祝中国共产党诞生五十周年发起征文以来，一个半月内就收到来稿一万多件，表达了广大工农兵对党和毛主席的无限热爱、无限深情。"},{"type":"paragraph","text":"朵朵红花向阳开，千歌万曲献给党。广大工农兵群众用毛主席交给他们的笔写出了千万首颂歌。这里有整天站在车床旁、船坞上奋战的产业工人，有在田头流着汗战天斗地的贫下中农，有日夜守卫边疆的解放军战士，还有其他战线上活学活用毛泽东思想的积极分子，他们有的是服务员，有的是红卫兵，有的是机关干部，有的是医生、教员和手工业劳动者。许多同志还在来信中表达了他们写征文时的激动心情:“我是从未写过文章的普通工人，今天，经过无产阶级文化大革命的战斗洗礼，我们要拿起笔尽情歌颂党和毛主席”；“在迎接党诞生五十周年的大喜日子里，我们贫下中农翻身不忘共产党，幸福不忘毛主席，为了夺取夏熟作物的丰收庆祝党的光辉节日，我们战天斗地炼红心，涌现了大量的好人好事”；“千吨墨，万支笔，写不尽战士对党和毛主席的情和意”；“我抑制不住内心的革命激情，拿起笔来歌颂我们伟大的党，表达我们农垦战士对党的无限忠心”……这一封封信稿表达了广大工农兵对党和毛主席的无限敬爱的心情。"},{"type":"paragraph","text":"这些战斗在不同岗位上的广大工农兵群众，拿起笔杆，运用各种不同的形式表达了自己对党和毛主席的热情歌颂，对社会主义祖国的无比热爱。伟大领袖毛主席视察过的国棉一厂、江南造船厂、上海机床厂等单位的工人写文章表达了全厂工人对毛主席、对中国共产党的无限敬仰；毛主席批示过的好八连、川沙县江镇公社、上海县七一公社号上大队等单位同志写来的诗，表达了对毛主席的无限热爱；少数民族苦聪人写来文章表达了在政治、经济、文化上翻身后，对党和毛主席的深厚的阶级感情；医护工作者写文章反映他们遵循毛主席的教导，在无影灯下战斗获得不平凡的胜利。一切都证明:正是伟大领袖毛主席和伟大的中国共产党，使我们祖国面貌起了翻天覆地的变化，使我们几亿的中国劳动人民彻底地翻了身。"},{"type":"paragraph","text":"这次征文工作，还得到了工厂、农村、部队、机关、学校等各级党组织的大力支持。不少单位组织了征文写作小组，积极为报纸撰写和推荐稿件。上海铁路分局松江站区党委和民航上海虹桥航空站的负责同志，都亲自抓征文的写作工作。嘉定县南翔镇革委会、沪东造船厂、吴泾热电厂、上海航道局、中华印刷厂、海关等单位，都积极给报纸送来了不少稿件。"},{"type":"paragraph","text":"在大量的来稿中，最多的是歌颂伟大领袖毛主席和中国共产党的诗歌、散文和歌曲，它们写出了党在各个历史时期的胜利，写出了井冈山、遵义、延安这些革命根据地的战斗生活。也有不少作品，反映了工农业战线上学大庆、学大寨的生动事迹，叙述了解放军抓“四个第一”、走政治建军道路的故事。其他如知识青年上山下乡，医护工作者下乡为贫下中农服务，这一类题材的稿件也不少。来稿除了已经发表的外，我们准备继续选一些在报纸上发表。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f92135e86"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
