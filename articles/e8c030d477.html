ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"给吴玉章的信","alias":"","parts":[{"type":"paragraph","text":"给吴玉章的信"},{"type":"paragraph","text":"（1949年8月29日）玉章同志："},{"type":"paragraph","text":"来信已悉。当付郭、茅、马三先生审议，提出意见。现已接复信，特付上，请予考虑，并请回答你对于他们的意见之赞成，或反对，或修改的意见。如果你同意的话，请付范文澜、成仿吾、黎邵西三位一阅，或者座谈一次，以集体意见见告为盼！"},{"type":"paragraph","text":"此致敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十九日[1]吴玉章，中国文字改革的倡导者之一。当时任华北大学校长。[2]指吴玉章1949年8月25日写给毛泽东的关于文字改革问题的信。[3]郭、茅、马，指郭沫若、茅盾、马叙伦。"},{"type":"paragraph","text":"[4]范文澜，当时任华北大学副校长。成仿吾，当时任华北大学副校长。黎邵西，即黎锦熙，当时任北平师范大学校务委员会主席兼中文系主任。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"name":"范文澜","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8c030d477"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
