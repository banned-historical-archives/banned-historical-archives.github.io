{"year":1952,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东师大　李贻调"},{"type":"paragraph","text":"从我们学校里同学控诉资产阶级家庭对自己毒害的无数实例中，可以清楚地看到资产阶级对子女的毒害是非常严重的。他们的目的是“培养”儿子成为他的剥削事业的继承者，把女儿当为商品，作为“赚钱”的工具。他们一般的是采取以下步骤与方式来毒害子女的:"},{"type":"paragraph","text":"(一)培养实产阶级人生观:从小他们就对子女灌输资产阶级思想毒素，培养起子女的资产阶级的人生观。如有一位女同学说:慈母亲从小就告诉她:“亲戚朋友亲，没有铜钿亲”(应该说“父母子女亲，也没有钢钿亲”)，“人生在世，为来为去为钞票”，因此养成了她“金钱第一、享乐至上”的人生观。"},{"type":"paragraph","text":"(二)教以享受腐化的生活方式:有一位同学控诉:在位五、六岁时，他父亲使常带他到妓院、舞厅、戏院等场所去，从小就使他耳濡目染，接受资产阶级思想毒素。并且在与一批实本家吃喝玩乐时，命其在旁“见习”，并巡回敬酒，还无耻地向众人夸赞道:“别看他年纪小，长大了玩女人的斗槛比我们怕还要精得多哩!”"},{"type":"paragraph","text":"(三)教以投机取巧、损人利己的手腕:资产阶级为了使子女学会剥削人民的手段，不但叫自己的子女(在校读书的)无事时在店里或工厂里帮助记账、看店，教他与一般资本家来往，甚至叫他帮助自己贿赂干部。有一你同学控诉:他的父亲感到自己的“手段”还不高同，叫他到“暴发户”的表兄那里去“学习”，并且向他说:“你表兄三年就由一个小学徒爬到大老板，你能学到他那样的‘本事’，洋房、汽车都不用愁了。”后来他到那里“学习”了半年，连他表兄吃饭的姿势都学得来了，受毒之深，可以想见。"},{"type":"paragraph","text":"(四)控制子女，阻碍子女进步:资产阶级希望子女走他们的路，特别明显表现在阻止子女进步这一点。好多同学都控诉父母阻止参干、参加南下工作团以及其他革命工作。他们阻止的手段软硬兼施:硬的是打骂、恐吓，甚至以自杀相威胁；软的哭泣、表功、诉苦……；并以金钱、洋房、女人相引诱。也有的父母允许子女加入青年团，但那是为了想使他们爬得更高、更快，伟大而严肃的革命组织，在他们眼中成了投机取巧、向上爬的阶梯。"},{"type":"paragraph","text":"(五)以婚姻为交易，出卖子女幸福:在实产阶级眼中，女儿也是“商品”，婚姻也是“买卖”，一位女同学的母亲公同告诉她:“女孩子嫁人，为的就是吃、喝、穿。”还有一位女同学被她母亲以投机方式逼嫁给一个蒋匪军官，不久解放了，投机失败，她母亲认为女儿已丧失做“工具”的资格，继打骂她逼她离家，后来她历尽艰辛，才得以复学。这次她悲愤地控诉她家庭的罪恶和对她的毒害。她说:“过去我以为这一婚姻要怪我自己，不但不怨家庭，反而安慰母亲；现在我才认清我家庭的丑恶本质和狠毒手段，当我对他们有利的时候，就是他们的‘好女儿’，一旦对他们不起作用，个一脚踢开，今后我一定坚决与罪恶家庭断绝关系，并与反动丈夫离婚，恢复我的自由和幸福。”还有一个女同学也控诉她的家庭把她家境清贫的真正的爱人驱走，逼着她和一个实产阶级亲戚订婚，解放后婚姻法颁布，她才解除了婚约；她非常感激的说:“毛主席救了我”。"},{"type":"paragraph","text":"起先有的同学认为资产阶级毒害子女只是个别的，父母之爱子女，人之天性吓!却不知道所谓天性不是别的，正是资产阶级丑恶的“阶级性”:为了追求“利润、利润、更高的利润”，儿女也是他们的工具”和“商品”；一位女同学很深刻、很尖锐地指出了她父母对她的爱的本质，也应该说是一切实产阶级家庭对子女爱的本质——“过去我感到家庭很温暖，父母非常爱我，因为我从来没有违拗过他们的意思，完全照着他指给我的路走，如果我要参加革命要求自由，他们一定横加阻挠。今天，撕破了一层虚伪感情的外衣，我才看清了我家庭的丑恶本质，他们的爱是建筑在自私自利、唯利是图的阶级基础上的。”"},{"type":"paragraph","text":"现在，非常明显地摆在资产阶级家庭出身的同学而前的有两条路:一条路是眼看资产阶级走向黑暗、毁灭；另一条是跟着无产阶级走向光明大道。毫无疑问的，每一个爱国青年都会选择后面一条光明大道。因此我们必须在三反、五反斗争中认清资产阶级家庭的本质，与腐朽丑恶的资产阶级思想划清界限，站稳人民立场，清除一切实产阶级影响和毒素，为进一步开展全面的思想改造运动打下坚实的基础。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f277eee1c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
