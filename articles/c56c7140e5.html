script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"青年学生通过具体事例的教育决心和资产阶级的腐朽堕落思想割清界限","authors":["张新楼","方龙","甘兰丰"],"dates":[{"year":1952,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:读了华东师大李亦麟的“我的资产阶级的父母是怎样‘培养’和‘教育’我的?”以及南京中华女中潘\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523s0307AA.JPG\"\u003e的“控诉资产阶级家庭对我的迫害”二文后，使我对资产阶级的本质有了更深刻的认识。"},{"type":"paragraph","text":"过去我不从阶级立场出发，错误地认为父母子女之间的关系和感情总是真诚的，任何一个做父母的总是爱护自己的子女的。可是，今天铁的事实说明了，世界上确有这样的父母，他们会把自己的亲生儿女当作“资本”，藉此获取“利润”。这就是资产阶级的亲属关系，在他们身上简直间不到一点人的气味，根本谈不上什么“父母子女之情”、“骨肉之情”，自然更谈不上什么国家人民的利益。"},{"type":"paragraph","text":"今天在我们一般的学校中，还有着许多出身于资产阶级家庭的同学身受他们家庭的侵蚀而不自觉，对政治运动和人民大众的爱国行为采取轻视淡漠的态度，这实在使人看了替他们担忧。我希望他们好好地参加到实际斗争中去，和资产阶级划清思想界线。"},{"type":"paragraph","text":"上海医学院学生　甘兰丰"},{"type":"paragraph","text":"编辑同志:最近在报上连续看到许多资产阶级向青年学生猖狂进攻的罪恶行为，使我们极其愤怒；特别是看了你报三月廿三日的“资产阶级怎样腐蚀和毒害青年学生”一文后，我深深地体会到，资产阶级真是腐朽不堪的。他们千方百计地阻挠青年学生的进步，破坏革命组织和国防建设。甚至有些资本家把自己的女儿当作商店中的特殊“广告”，作为“吸引顾客”，“招来生意”的工具……这一连串的事实证明了资产阶级是十分无耻的!我保证要积极地投入以三反为中心的思想改造运动中去和省产阶级思想划清界限，好好地锻炼自己，培养自己，使自己成为一个才德兼备、体魄健全的祖国的建设者和保卫者。"},{"type":"paragraph","text":"华东交通专科学校学生　张新楼"},{"type":"paragraph","text":"编辑同志:我读了三月二十四日刊载的关于青岛“奸商李雪才、汪理群伤天害理，利用女学生腐蚀国家工作人员”的通讯以后，感到无比的愤怒和悲痛。资产阶级为了达成他们盗窃国家财产的无耻目的，不惜将纯洁的青年学生拖下泥坑。我们要求人民政府对这些蓄意陷害青年的大盗窃犯，严厉地加以制裁。同时，我们青年学生应当百倍警惕，严防奸商的诡计，以英雄的战斗姿态投身到轰轰烈烈的五反运动中来，为彻底打垮资产阶级的猖狂进攻而斗争到底。"},{"type":"paragraph","text":"安徽大学农艺系学生　方龙"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c56c7140e5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
