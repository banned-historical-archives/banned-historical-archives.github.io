ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"对《人民日报》社论稿《鼓起干劲，力争上游》的批语","alias":"","parts":[{"type":"paragraph","text":"对《人民日报》社论稿《鼓起干劲，"},{"type":"paragraph","text":"力争上游》的批语\""},{"type":"paragraph","text":"（1958年2月3日）退吴冷西同志。可用。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月三日一时"},{"type":"paragraph","text":"[1]《人民日报》这篇社论稿主要批评了1956年的反冒进，社论稿说：“1956年我国各项事业的大发展，尽管其中有个别的缺点，但仍然是一个基本上健康的大跃进。正确的态度应当是肯定跃进，肯定好的东西，同时采取适当的方式来调整和克服其中个别的缺点。但是有些人却分辨不出九个好指头和一个坏指头的区别，把个别当作一般，把支流当作主流，对整个形势作出了错误的估计，名为反‘冒进”，实际反跃进。惩前后，我们不应当再用这种错误的态度来对待当前新的跃进。”社论稿还说，我们的国家现在面临着一个全面跃进的新形势，“全国大部分地区应争取在三年内使当地的面貌基本改观”。这篇社论在1958年2月3日《人民日报》发表。"},{"type":"paragraph","text":"[2]吴冷西，当时任《人民日报》总编辑、新华通讯社社长。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":2,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":510,"page_end":510},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85840636ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
