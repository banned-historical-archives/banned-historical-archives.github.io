w.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/9646ca98-820c-44ef-b8ca-c656fd59b7fd.pdf"],"article":{"title":"在接见共青团八大部分代表时的讲话","alias":"","parts":[{"type":"paragraph","text":"反，反对合作化的文章，可以驳一驳。这不叫诱敌深入，叫自投罗网，孙大雨说人家是反革命，最好在报上登出来。胡风、铁托的文章在报上发表，就离群众，这也是帮助的一种办法。做政治工作要有一点办法，不怕发表，要驳他。"},{"type":"paragraph","text":"各省要交流经验，不要不相往来。"},{"type":"paragraph","text":"在接见共青团入大部分代表时的讲话"},{"type":"paragraph","text":"（一九五七年五月二十二日）"},{"type":"paragraph","text":"要做一个顶天立地的人，顶天就是能掌握马列主义，站得高，看得远；立地就是有坚实的群众基础，和群众打成一片。"},{"type":"paragraph","text":"接见共青团第三次全国代表大会代表时的指示"},{"type":"paragraph","text":"（一九五七年五月二十五日）"},{"type":"paragraph","text":"你们的会议开得很好。希望你们团结起来作为全国青年的领导核心。中国共产党是全中国人民的领导核心。没有这样一个核心，社会主义事业就不能胜利。"},{"type":"paragraph","text":"你们这个会议是一个团结的会议，对全中国青年会有很大的影响。我对你们表示祝贺。"},{"type":"paragraph","text":"同志们，团结起来。坚决地勇敢地为社会主义的伟大事业而奋斗。一切离开社会主义的言论行动是完全错误的。"},{"type":"paragraph","text":"约集各民主党派负青人和无党派民主人士谈话要"},{"type":"paragraph","text":"几年来都想整风，但找不到机会，现在找到了。凡是涉及许多人的事情，不搞运动，搞不起来。需要造成空气，没有一种空气是不行的。现在已造成批评的空气，这种空气应继续下去，以处理人民内部矛盾为题目，分析各个方面的矛盾。"},{"type":"paragraph","text":"过去在工业、农业、文教等方面有什么矛盾是盲目的，现在把矛盾排一个队，算一个。，过去好象一讲矛盾，就不得了，其实有什么不得了，蒋介石四百万军队，美国军队到了鸭江，也没有什么不得了。每天都在矛盾中生活，到处都是矛盾，都在唱对台戏，但是就不肯承认或者混淆两种矛盾。要承认它，然后分析它，找出解决办法。现在报纸天天在讨论"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":5,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":226,"page_end":226},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0eb74a90a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
