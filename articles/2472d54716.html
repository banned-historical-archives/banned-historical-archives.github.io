rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把活学活用毛泽东思想放在一切工作的首位","authors":[],"parts":[{"type":"paragraph","text":"株洲铁路地区机务段革委会一成立，工作千头万绪，首要的应该抓什么？军队代表文杰和叶正松同革委会其他成员一起，反复学习了林副主席关于活学活用毛主席著作，在“用”字上狠下功夫的指示，使大家认识到：革委会工作千条万条，抓好活学活用毛泽东思想是根本的一条。革委会召开的第一次会议，就研究怎样进一步把活学活用毛泽东思想的群众运动推向新阶段；作出的第一个决议，就要求革委会成员和广大革命群众争当活学活用毛泽东思想的模范。"},{"type":"paragraph","text":"军队代表文杰、叶正松都是活学活用毛主席著作积极分子。他们经常向革委会成员介绍自己活学活用毛泽东思想的体会，带头坚持活学活用毛主席著作。在他们的实际行动影响下，革委会形成这样一种好风气：哪个同志毛泽东思想学得好，用得活，大家就积极地向他学习；谁在这方面做得不够，大家就热情地帮助。革命群众代表、革委会副主任刘坚文，是个火车司机，工作踏踏实实，革命精神很强，但态度有些生硬，不能虚心听取群众意见。军队代表叶正松就找他谈心，并送他一条毛主席语录：“不要总是以为自己对，好象真理都在自己手里。不要总是认为只有自己才行，别人什么都不行，好象世界上没有自己，地球就不转了。”毛主席的教导启发教育了他。以后，他经常深入车间、班组，和同志们同吃、同住、同学习、同劳动，虚心向革命群众学习，甘当群众的小学生。同志们说：“老刘听毛主席的话，知错就改，给我们做出了活学活用毛泽东思想的好榜样。”"},{"type":"paragraph","text":"军队代表还和其他委员商量，根据乘务员流动性大的特点，举办了各种类型的毛泽东思想学习班。乘务员走到哪里，就把毛泽东思想学习班办到哪里。革委会还把车间、班组、机车室、宿舍、家庭都办成活学活用毛泽东思想的课堂，斗私批修的战场。在革委会的领导下，全段活学活用毛泽东思想的群众运动很快出现了蓬蓬勃勃的崭新局面。广大革命群众赞扬说：革委会千好万好，带领我们活学活用毛泽东思想是最大的好。"},{"type":"paragraph","text":"（6900部队供稿）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2472d54716"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
