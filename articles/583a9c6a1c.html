art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一八四医院不用公款给私人订报","authors":["杨荣林/林斌/郑宗群"],"parts":[{"type":"paragraph","text":"本报讯 三月一日，一八四医院政治处的同志到驻地邮局，退订了今年三月以后的七十三份报纸，共退回订阅费七百二十元。"},{"type":"paragraph","text":"多年来，一八四医院公费订阅的报纸都超过规定的份数，每年超支二百多元。按总政有关订阅报刊的规定，报刊供集体使用，不发个人，但医院处以上领导每人都有公费订阅的几份报纸。今年二月份，医院党委在学习邓小平同志《目前的形势和任务》的报告时，大家谈到，搞四个现代化必须大力发扬艰苦奋斗的精神，领导干部要带个好头。院长和政委首先提出将个人用公费订阅的报纸取消，党委集体订一套报纸放在党委会议室。这样一压缩，处以上领导就减少了二十四份报纸。"},{"type":"paragraph","text":"（杨荣林、林斌、郑宗群）"},{"type":"paragraph","text":"用公费给领导个人订报，是许多单位多年来形成的一条不成文的规定。一八四医院领导带头破了这个例，值得提倡。总政关于订阅报刊标准的通知规定，报刊供集体使用，不发个人，提倡干部自费订报。有章就要循，各部队应当严格执行这一规定，节减报刊费用。"},{"type":"paragraph","text":"——编者"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"583a9c6a1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
