":"中共中央组织部关于中央专案材料管理问题的通知","dates":[{"year":1979,"month":7,"day":20}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局，干审工作政策文件选编（下），1573-1574","tags":[{"name":"复查","type":"主题/事件"},{"name":"审查","type":"主题/事件"},{"name":"审干","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部关于中央专案材料管理问题的通知"},{"type":"subtitle","text":"1979年7月20日·〔79〕组通字31号"},{"type":"paragraph","text":"为了做好原中央专案材料的鉴定处理工作，对原中央专案一办、二办、三办和联办案件复查工作中有关档案材料的管理问题，作如下通知："},{"type":"paragraph","text":"一、各单位借去的原中央专案材料，在复查结案后，应将原借专案材料全部退还。"},{"type":"paragraph","text":"二、在这次复查中形成的复查报告、复查结论、新取得的调查证明材 料及中央和党委的批示等应立成复查卷。复查卷的原件存复查单位，复查卷的复制件移交我部。"},{"type":"paragraph","text":"三、如果复查报告、复查结论所依据的材料有引用原专案材料的内容，应将引用材料(某卷、某件、某页等)编制详细目录一式二份，一份由复查单位保存，一份放入移交我部的复查卷中，以便查考。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffa733c7af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
