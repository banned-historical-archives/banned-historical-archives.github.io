党","authors":["李杰"],"dates":[{"year":1985,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南乐县“文革”派性引起的枪杀案得到处理"},{"type":"paragraph","text":"原县委书记王文忠和原县农委主任崔书明被开除出党"},{"type":"paragraph","text":"本报讯　记者李杰报道：本报于今年4月26日以《南乐枪杀案发生的前前后后》为题披露的河南省南乐县一件触目惊心的反革命枪杀案已经得到处理。这是中纪委、河南省委和濮阳市委联合工作组长达十个月的深入调查之后作出的。原县委书记王文忠、原县农委主任崔书明被开除党籍，其他与此案有关的人员也分别得到处理。"},{"type":"paragraph","text":"南乐县枪杀案的发生是“文革”中所形成的派性没有得到彻底清算而引起的。5月9日，河南省纪委对此发出通报指出：当前，派性在河南省的一些地区、部门和单位还不同程度存在，“一派正确，一派错误”的错误观点仍有市场。"},{"type":"paragraph","text":"通报要求各级党委、纪委借鉴南乐的教训，把整党、改革和查处案件紧密结合起来，认真抓好彻底否定“文革”和增强党性的教育，消除派性，特别是要解决领导班子中的派性问题，把各级领导班子建设成党性强、作风正，适应现代化建设需要的战斗集体。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c532496899"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
