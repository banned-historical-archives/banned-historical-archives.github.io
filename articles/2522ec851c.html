rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"巴国防部长离京到上海访问陈毅、叶剑英等到机场热烈欢送","authors":[],"parts":[{"type":"paragraph","text":"据新华社一日讯 巴基斯坦国防部长阿夫扎尔·拉赫曼·汗海军中将和陪同前来的巴基斯坦外事秘书优素福等，由我国国防部副部长王树声等陪同，今天上午离开北京乘专机到上海参观访问。"},{"type":"paragraph","text":"国务院副总理陈毅，国防委员会副主席叶剑英，外交部副部长韩念龙，中国人民解放军各总部、各军种的负责人彭绍辉、袁子钦、张贤约、赵启民、常乾坤，以及中国人民解放军陆海空军指战员和首都红卫兵小将一千多人到机场热烈欢送。"},{"type":"paragraph","text":"一清早，欢送巴基斯坦贵宾的人们，就拿着红彤彤的《毛主席语录》，高举着“热烈欢送巴基斯坦伊斯兰共和国贵宾”等横幅标语，等候在机场。贵宾们由陈毅、叶剑英等陪同走进机场时，他们不断高呼“中巴两国人民友好万岁！”“毛主席万岁！”阿夫扎尔·拉赫曼·汗热情地挥手向欢送的人民解放军指战员和红卫兵小将致意。"},{"type":"paragraph","text":"巴基斯坦驻中国大使苏尔坦·穆·汗和大使馆武官卡尤姆，同机前往上海。"},{"type":"paragraph","text":"到机场送行的，还有巴基斯坦驻中国大使馆外交官员和一些国家驻中国大使馆的武官。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2522ec851c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
