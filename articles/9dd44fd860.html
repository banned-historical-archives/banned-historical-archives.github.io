{"year":1976,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼日利亚联邦军政府首脑奥巴桑乔致函"},{"type":"paragraph","text":"祝贺华主席为毛主席的当之无愧的接班人"},{"type":"paragraph","text":"毛里塔尼亚议长萨勒接见我大使赞扬中国粉碎“四人帮”"},{"type":"paragraph","text":"新华社一九七六年十二月二十九日讯　尼日利亚联邦军政府首脑奥巴桑乔写信给华国锋主席，诚挚地祝贺他就任中国共产党中央委员会主席和中央军事委员会主席。贺信全文如下：中国，北京中国共产党中央委员会主席、中央"},{"type":"paragraph","text":"军事委员会主席华国锋先生阁下亲爱的主席："},{"type":"paragraph","text":"我代表尼日利亚联邦军政府和全体人民，并以我个人的名义，就你任中国共产党中央委员会主席和中央军事委员会主席，向你致以衷心的敬意，并表示诚挚的祝贺。我们尼日利亚人怀着浓厚的兴趣密切注视着你们伟大国家中发生的事情；我们感到很高兴，中华人民共和国有了你作为伟大领袖和导师毛泽东主席的当之无愧的接班人。你的卓越的品德和丰富的经验使我们相信，你能够成功地带领伟大的中国人民沿着毛主席指引的道路前进，并取得符合你们伟大国家全体人民利益的越来越大的革命成就。我祝阁下健康和长寿，以便你能履行你所肩负的伟大职责，并祝我们两国间的友谊和亲密关系在今后的岁月里继续不断地得到加强。"},{"type":"paragraph","text":"顺致最崇高的敬意。"},{"type":"paragraph","text":"你最诚挚的，"},{"type":"paragraph","text":"尼日利亚联邦共和国联邦军"},{"type":"paragraph","text":"政府首脑、武装部队总司令"},{"type":"paragraph","text":"奥卢塞贡·奥巴桑乔中将"},{"type":"paragraph","text":"新华社努瓦克肖特一九七六年十二月十七日电　毛里塔尼亚国民议会议长萨勒十二月十六日在接见中国驻毛里塔尼亚大使康矛召时说：“中国人民在华主席领导下所取得的伟大成就证明了毛主席的英明。”"},{"type":"paragraph","text":"萨勒议长同康矛召大使进行了热情友好的谈话。他说：“毛里塔尼亚和其它第三世界国家特别关心在中国所发生的一切事情。华国锋被任命为中国共产党中央委员会主席和以华国锋主席为首的中国共产党中央委员会粉碎‘四人帮’反党集团，对我们来说也是一件幸运的事。毛主席在生前就不是偶然而是很好地选择了华国锋为他的接班人。”"},{"type":"paragraph","text":"他说：“在华主席的领导下，中国人民正在加速各方面的建设，以实现毛主席确定的伟大目标：使中国在本世纪末成为一个强大的社会主义国家。”"},{"type":"paragraph","text":"萨勒议长接着说：“不久前，中国的敌人和第三世界的敌人曾臆断中国将发生一场灾难。但是，事实证明，中国稳定而团结，一切都正常。这正是毛主席生前的愿望，这也是中国人民按照毛主席的教导所取得的伟大成就。”"},{"type":"paragraph","text":"萨勒议长最后表示希望看到中国人民和毛里塔尼亚人民之间的友谊进一步得到发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dd44fd860"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
