林"],"dates":[{"year":1985,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京市崇文区认真清理、归还“文革”中被查抄的私人财物"},{"type":"paragraph","text":"本报讯　记者赵兴林报道：北京市崇文区把落实查抄财物政策作为彻底否定“文革”的一项内容，收到良好的社会效果。到3月底，全区89％的“文革”期间被查抄户认领回自己的被抄财物。"},{"type":"paragraph","text":"为了做好落实查抄财物政策工作，崇文区组织专门力量，对“文革”期间查抄的财务进行清理，并认真调查核实曾被查抄对象的姓名、住址和工作单位，通知本人认领。他们还通过举办“查抄物品认领会”等形式，使数千件图书、文物、字画等物归原主。崇文区职工大学一位教师认领到自己的一套“二十四史”，工作人员当即帮她运回家。一位七十二岁的老人找到自己失离十九年的两部《古兰经》手抄本后，投书报社，称赞人民政府保护私人财产，贯彻落实民族政策和宗教政策。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e1fd877a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
