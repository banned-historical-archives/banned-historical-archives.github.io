art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿根廷工人罢工反对残酷剥削","authors":[],"parts":[{"type":"paragraph","text":"阿根廷最大的国营“拉普拉塔”炼油厂的七千八百名工人，不顾反动当局的威吓，目前继续坚持不定期罢工。"},{"type":"paragraph","text":"“拉普拉塔”炼油厂的工人为了抗议资方延长劳动时间等加紧剥削工人的措施，在九月二十五日开始举行不定期罢工。在罢工过程中，反动当局强行封闭“拉普拉塔”炼油厂的两个工会组织，出动大批步兵、警察、警犬、警车，甚至出动直升飞机在炼油厂一带低空盘旋，对工人进行镇压和威吓；同时，厂方解雇一百五十几名工人，企图以此来破坏罢工。但是，罢工工人并没有被吓倒，他们的斗争在继续坚持中。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"639631874d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
