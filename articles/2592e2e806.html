art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想武装起来","authors":["姜玉权/龙仁宗/王希贤/范梦绵"],"parts":[{"type":"paragraph","text":"洛阳工校学习毛主席著作形成热潮"},{"type":"paragraph","text":"本报讯 洛阳工校在政治理论教育中，坚决贯彻了以学习毛主席著作为主的方针。"},{"type":"paragraph","text":"他们确定：在社会主义教育方面，强调学习毛主席关于社会主义过渡时期的阶级斗争和正确处理人民内部矛盾的理论；关于不断革命和革命发展阶段的理论；关于高速度、按比例和一整套“两条腿走路”建设社会主义的理论；关于人民公社的理论；关于政治挂帅、大搞群众运动、充分发挥人的主观能动作用的理论；关于由社会主义向共产主义过渡的理论；等等。在学习中，要破除资产阶级思想，立共产主义思想。在哲学教育方面，强调学习毛主席关于辩证唯物论、世界观和思想方法论的学说，批判唯心主义、形而上学的主观片面的思想方法，立共产主义世界观。在军队政治工作课程方面，强调了学习党对军队的绝对领导，政治工作是我军的生命线等思想。现在，全校学习阅读毛主席著作的人越来越多，学习毛泽东思想已经形成了热潮。 （姜玉权）"},{"type":"paragraph","text":"昆明步校普遍写学习心得"},{"type":"paragraph","text":"本报讯 昆明步校为了通过“八个问题”的学习，掌握毛泽东思想，在阅读、讨论的基础上，普遍写了学习心得。"},{"type":"paragraph","text":"校党委书记李迅同志，带头写文章，在他的影响下，中心小组的成员都写了学习心得，一共写了十二篇。同志们写的“总路线是客观经济规律和主观能动作用功统一”、“高速度、按比例发展我国国民经济”、“总路线集中地反映了六亿五千万人民要求迅速摆脱‘一穷二白’状况的伟大意志”等文章，说明了这是毛主席把马克思列宁主义的普遍真理与中国革命和建设的具体实践结合起来，创造性地发展和丰富了马克思列宁主义。 （教研室）"},{"type":"paragraph","text":"为学好毛主席著作桂林步校集训政治理论教员"},{"type":"paragraph","text":"本报讯 桂林步校在1960年度教学中，继续开设了以学习毛主席著作为中心的中共党史、哲学、军队政治工作等政治理论课程。为了把这些课程教好，校党委根据教育者必先受教育的方针，集训了政治理论教员。"},{"type":"paragraph","text":"这次集训，以两个月的时间，分两个阶段进行。第一阶段，通过“八个问题”的学习，进一步掌握毛泽东思想，深刻认识党的总路线的实质和伟大意义。在学习中，要破除资产阶级思想，立共产主义思想。第二阶段，教员自己首先学好，然后进行备课。集训中，他们认真学习了毛主席关于社会主义革命和社会主义建设的理论；关于政给挂帅、大搞群众运动、充分发挥人的主观能动作用的理论；关于过渡时期的阶级斗争和正确处理人民内部矛盾的理论；等等。另外，教员们还深入连队进行思想调查，为教学中联系思想实际提供了丰富的材料。教员们经过学习，已写出了十五万字的讲搞。 （龙仁宗）"},{"type":"paragraph","text":"王希贤/范梦绵"},{"type":"paragraph","text":"① 0221部队工程指挥部参谋蔡其林同志，几年来坚持马克思列宁主义和毛泽东著作的学习。这是他在学习毛泽东著作的讨论会上谈学习心得。"},{"type":"paragraph","text":"王希贤/范梦绵"},{"type":"paragraph","text":"② 蔡其林同志提高了思想觉悟，在工作中发扬了敢想敢做的精神，利用库存旧料和废料代替好材料，为国家节约了资金。"},{"type":"paragraph","text":"（王希贤 范梦绵摄）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2592e2e806"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
