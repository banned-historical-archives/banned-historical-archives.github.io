<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"人民法庭组织通则","authors":[],"dates":[{"year":1950,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"人民法庭组织通则","type":"title"},{"text":"(一九五○年七月十四日政务院第四十一次政务会议通过)","type":"subtitle"},{"text":"一、为保障革命秩序与人民政府的土地改革政策法令的实施，省及省以上人民政府得视情况的需要，以命令成立或批准成立县（市）人民法庭。其任务是运用司法程序，惩治危害人民与国家利益、阴谋暴乱、破坏社会治安的恶霸、土匪、特务、反革命分子及违抗土地改革法令的罪犯，以巩固人民民主专政，顺利地完成土地改革。此外，关于土地改革中划分阶级成份的争执及其他有关土地改革的案件，亦均由人民法庭受理之。人民法庭任务完毕已无存在必要时，由省及省以上人民政府以命令撤销之。","type":"paragraph"},{"text":"二、人民法庭以县（市）为单位成立之。必要时得以区为单位或联合两个区以上设立分庭，县（市）人民法庭及其分庭均得实行巡回审判。","type":"paragraph"},{"text":"三、县（市）人民法庭及其分庭直接受县（市）人民政府的领导，同时又是县（市）人民法院的组成部分之一，其性质是县（市）人民法院之民事庭、刑事庭以外的特别法庭，普通民事刑事案件仍由民事庭、刑事庭受理。","type":"paragraph"},{"text":"四、县（市）人民法庭及其分庭均设审判委员会，由审判长一人，副审判长一人，审判员若干人组成之。县（市）人民法庭的正副审判长及半数审判员由县（市）人民政府遴选，其余半数审判员由县（市）各界人民代表会议或人民团体选举。分庭的正副审判长及半数审判员由县（市）人民政府遴选，其余半数审判员由设立地区的人民代表会议或人民团体（在农村中主要是农民代表会议或农民协会）选举。正副审判长和审判员均由县（市）人民政府报请直属上级人民政府审核加委。","type":"paragraph"},{"text":"五、县（市）人民法庭及其分庭受理案件后，应认真地进行调查证据，研究案情，严禁刑讯。在审判时，旁听的人经允许后可以发言，但必须保持法庭的秩序。","type":"paragraph"},{"text":"六、县（市）人民法庭及其分庭审判时，应保障被告有辩护及请人辩护的权利，但被告所请之辩护人，须经法庭认可后，方得出庭辩护。","type":"paragraph"},{"text":"七、县（市）人民法庭及其分庭有权逮捕、拘禁并判决被告死刑、徒刑、没收财产、劳役、当众悔过或宣告无罪。","type":"paragraph"},{"text":"县人民法庭及其分庭所判决之死刑、没收财产及五年以上徒刑的批准权，属于省人民政府（或省人民政府特令指定之专员公署），死刑由省人民政府主席（或省人民政府特令指定之专员）以命令执行之。不足五年的徒刑及宣告无罪之判决的批准权，属于县人民政府。","type":"paragraph"},{"text":"市人民法庭及其分庭之判决的批准权：属于大行政区直辖市者，前项规定的属于省人民政府的批准权，由大行政区人民政府（军政委员会）行使之，死刑由大行政区人民政府（军政委员会）主席以命令执行之；属于省辖市者，适用县之规定。","type":"paragraph"},{"text":"八、县（市）人民法庭及其分庭对匪特反革命分子之死刑的判决，按本通则第七条规定批准执行，不得上诉。","type":"paragraph"},{"text":"县（市）人民法庭及其分庭关于土地改革中划分阶级成份的争执案件，依土地改革法第三十一条规定之手续，判决后即须执行。","type":"paragraph"},{"text":"县（市）人民法庭及其分庭之其他的判决，被告或原告如有不服时，得于判决后十日内，要求县（市）人民政府指令县（市）人民法庭复审；对复审之判决如仍不服时，得提出上诉。","type":"paragraph"},{"text":"九、县（市）人民法庭及其分庭的人员，如有违法渎职情事，人民得举出证据检举之，经查明属实后，由县（市）人民政府或报请直属上级人民政府依法严惩。","type":"paragraph"},{"text":"十、县（市）人民法庭及其分庭之正副审判长、审判员，遇到与其本身有利害关系之案件，应行回避。","type":"paragraph"},{"text":"十一、县（市）人民法庭及其分庭的其他工作人员由县（市）人民政府、人民法院及人民团体工作人员中调用之。","type":"paragraph"},{"text":"十二、县（市）人民法庭及其分庭的经费由政务院另行规定。","type":"paragraph"},{"text":"十三、为适应地方具体情况，各大行政区或省，得根据本通则制定人民法庭条例，公布施行，并报请中央人民政府政务院备案。在本通则颁布前已制定人民法庭条例者，如有与本通则抵触之处，须根据本通则加以修正。","type":"paragraph"},{"text":"十四、本通则经中央人民政府政务院政务会议通过呈请中央人民政府主席批准后公布施行。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9452304f08"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
