<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"墨西哥著名人士里格特表示要更好地学习毛主席著作毛泽东思想是世界人民宝贵财富拉美人民无法解决的问题都可在毛主席著作中找到答案","authors":[],"dates":[{"year":1966,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社墨西哥城电　不久前访问中国后回国的墨西哥经济学家、著名社会活动家格拉谢拉·里格特四日在这里接见新华社记者时说，毛泽东思想不仅是中国人民最伟大、最卓越、最宝贵的财富，而且是拉丁美洲和全世界人民最伟大、最卓越、最宝贵的财富。"},{"type":"paragraph","text":"里格特在谈话中强调指出，毛泽东思想是放之四海而皆准的真理。她说，对毛主席著作，不仅是译成各国语文的问题，最重要的是根据每个国家的历史特点和具体情况运用毛泽东思想。她又说，毛主席有关社会各阶级的分析、有关农民运动和人民战争的著作对拉丁美洲人民目前的斗争有现实而深刻的指导意义，拉丁美洲人民无法解决的问题都可以在毛主席的著作里找到答案。"},{"type":"paragraph","text":"她又说，毛泽东主席所指出的美帝国主义是全世界人民的共同敌人的论点是一个颠扑不破的真理。拉丁美洲受压迫、受欺侮的各国人民也要团结起来一起为反对共同敌人美帝国主义而斗争。"},{"type":"paragraph","text":"里格特在谈到中国所执行的自力更生的方针时说，这个方针是毛泽东思想的产物。她说，一个国家不仅在建设中必须自力更生，而且也必须自力更生地去进行革命。她说，毛主席在《愚公移山》这篇文章里指出，愚公可以挖掉挡住愚公家出路的两座大山，那末拉丁美洲人民就一定可以挖掉阻碍他们前进的大山。里格特说，毛泽东的这一论点给了正在进行革命斗争的拉丁美洲国家人民以鼓舞和力量。"},{"type":"paragraph","text":"里格特说，中国人民革命的胜利和社会主义建设的成就都是由于有了伟大的毛泽东思想的领导。她赞扬中国人民热烈学习毛主席著作。她说，人们一旦掌握毛泽东思想，就成为最聪明、最能干、充满战斗精神的人，其证明就是中国人民在农业、工业和科学事业中取得的成就。里格特强调说，所有这一切，是用毛泽东思想提高了觉悟的人民所取得的。"},{"type":"paragraph","text":"里格特最后说，她将更好地继续学习毛主席著作，把毛主席的著作作为唯一正确的指针。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\06\\666k040301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e墨西哥人民热爱毛主席著作。图为墨西哥公众参观中国展览会上陈列的毛主席著作。\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fd9b9c389"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
