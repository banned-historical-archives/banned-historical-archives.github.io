抗议美国剥削计划","authors":[],"dates":[{"year":1960,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京27日电】　据拉丁美洲通讯社报道，巴拿马美国“联合果品公司”所属的码头工人在坚持进行罢工之后，已经迫使资方同意增加他们的工资。"},{"type":"paragraph","text":"美国“联合果品公司”所属的巴拿马博卡斯一德耳一托罗省的阿耳米生特码头、奇里基省太平洋沿岸码头和阿穆埃列斯港码头的工人，最近先后举行罢工，抗议资方不履行协议和拒绝签订提高工资的集体合同。"},{"type":"paragraph","text":"罢工的码头工人正在同资方就签订集体合同问题进行谈判。他们宣布，只有在签订集体合同以后，他们才同意复工。"},{"type":"paragraph","text":"【据新华社蒙得维的亚28日电】　乌拉圭全国工人今天举行二十四小时总罢工，抗议美国通过国际货币基金组织强使乌拉圭执行的所谓“稳定经济计划”，重申保卫工会民主权利，并表示支持已经坚持罢工近两月之久的烟草工人和其他行业工人提出的正当要求。"},{"type":"paragraph","text":"总罢工使乌拉圭全国陷于瘫痪，各地客运停顿，电影院关门，报纸也停止出版。"},{"type":"paragraph","text":"这次总罢工是最近六个月以来的第四次总罢工。参加这次总罢工的包括电力、治金、纺织、化学、制糖、羊毛、运输等各个行业的工人，全国90%的工会都参加了这一统一行动。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebadbed299"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
