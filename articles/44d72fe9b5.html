主、特务加紧报复破坏活动","authors":[],"dates":[{"year":1951,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"大张旗鼓镇压反革命后长沙专区发现地主、特务加紧报复破坏活动","type":"title"},{"text":"【新湖南报十九日讯】大张旗鼓镇压反革命后，很多反革命分子是服罪了、坦白了、老实了，但还有不少地主、特务分子正在各地加紧报复破坏活动。长沙专区已发现地主、特务利用各种方式进行破坏。湘阴十三区伪军官姚长修在水涨时，乘隙将河管开放，放水一天一夜，淹田二百多亩。浏阳二区横山乡发现特务放火烧山，醴陵、浏阳均发现坏分子纵火事件。各地陆续发现反动分子造谣、张贴反动标语。如平江八区有特务造谣说：抗美援朝抓壮丁，当兵没有饭吃，逃走砍脚根。其他并发现有地主反攻倒算，夺回财产，利用坏分子鼓动群众强借积谷的事情。","type":"paragraph"}],"comments":[],"origin":"1951年5月30日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44d72fe9b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
