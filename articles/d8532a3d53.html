"year":1952,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"肃清我的资产阶级思想残余"},{"type":"paragraph","text":"编辑同志：参加了中央公安部斗争大贪污犯宋德贵、刘玉泽的大会后，认识了资产阶级是如何阴毒地用卑鄙无耻的手段向我们进攻。我参加革命不久，觉悟不高，又出身于资产阶级。因之，我感到自己应该更提高警惕，彻底地改造思想，不然就很难抵抗资产阶级糖衣炮弹的进攻。"},{"type":"paragraph","text":"参加这次大会后，我想到我还没有认真地肃清自己残存的资产阶级的坏思想、坏作风，反而把这些坏思想、坏作风带到革命队伍中来。比如，我还有生活不检点，爱随便花钱，贪吃贪穿等资产阶级的“小姐作风”。在这次伟大的运动中，我一定要认真、彻底地检查自己，坚决向我的坏思想、坏作风进行斗争，彻底肃清自己身上的资产阶级思想残余。"},{"type":"paragraph","text":"李砚芬"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8532a3d53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
