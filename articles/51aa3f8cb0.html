script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"进行教育革命要依靠无产阶级革命派","alias":"","parts":[{"type":"paragraph","text":"关于按系统实现革命的大联合的指示"},{"type":"paragraph","text":"（一九六七年十月十七日）"},{"type":"paragraph","text":"各工厂、各学校、各部门、各企业单位，都必须在革命原则下，按照系统，按照行业，按照班级，实现革命的大联合，以利于促进革命三结合的建立，以利于大批判和各单位斗、批、改的进行，以利于抓革命、促生产、促工作、促战备。"},{"type":"paragraph","text":"（转引自1967年10月18日《人民日报》）对海军学习毛主席著作积极分子代表"},{"type":"paragraph","text":"大会代表的谈话"},{"type":"paragraph","text":"（一九六七年十一月十九日）"},{"type":"paragraph","text":"这个象章好（指海军学习毛主席著作积极分子代表大会敬献给毛主席的象章一编者)，有海军叉有空军，又有这么多群众，我就放心了。"},{"type":"paragraph","text":"进行教育革命要依靠无产阶级革命派"},{"type":"paragraph","text":"（一九六七年十月二十五日）"},{"type":"paragraph","text":"进行无产阶级教育革命，要依靠学校中广大革命的学生，革命的教员，革命的工人，要依他们中间的积极分子，即决心把无产阶级文化大革命进行到底的无产阶级革命派。"},{"type":"paragraph","text":"（转引自1967年10月27日《人民日报》在发表《关于教育革"},{"type":"paragraph","text":"命的几个初步方案》时所加的“编者按”）对《解放军报》1967年11月9日社"},{"type":"paragraph","text":"《抓好形势教育》的重要修改"},{"type":"paragraph","text":"（一九六七年十一月）"},{"type":"paragraph","text":"在社论的第三段，毛主席特地重新引1用了1938年10月他在中国共产党六届六中全会上的报告中的如下两段话：“当前的运动的特点是什么？它有什么规律性？如何指导这个运动？这些都是实际的问题。”“运动在发展中，又有新的东西在前头，新东西是层出不穷的。研究这个运动的全面及其发展，是我们要时刻注意的大课题。”"},{"type":"paragraph","text":"（见《中国共产党在民族战争中的地位》，《毛泽东选集》"},{"type":"paragraph","text":"第二卷第二版523页）"},{"type":"paragraph","text":"·341"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":354,"page_end":354},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51aa3f8cb0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
