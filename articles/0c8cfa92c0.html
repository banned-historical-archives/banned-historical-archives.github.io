al-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"给中共南方局转中央的信","alias":"","parts":[{"type":"paragraph","text":"给中共南方局转中央的信！"},{"type":"paragraph","text":"（1930年10月14日）"},{"type":"paragraph","text":"此次吉安暴动胜利，虽在军事上没有消灭敌人主力、缴获大批枪械，但政治上的收获却是不小的。吉安暴动胜利，无疑是赣西南豪绅、军阀、国民党统治的最后消灭，赣西南地方暴动的完成，是江西全省首先胜利的开始，猛烈扩大红军的好时机。"},{"type":"paragraph","text":"近来赣西南党呈一非常严重的危机，全党完全是富农路线领导，党团两特委机关、赣西南苏维埃政府、红军学校发现大批AB团分子，各级指导机关，无论内外多数为AB团富农所充塞领导机关。要肃清富农领导，肃清AB团，赣西南党非来一番根本改进，决不能挽救这一危机。"},{"type":"paragraph","text":"红一军团于十月十八日可抵清江与红五、红八军汇合，即行占领南浔路进攻南昌，在那一带将有大规模的决战。"},{"type":"paragraph","text":"[1]1930年10月14日，毛泽东在吉安以红一方面军总前委书记名义致信中共南方局转中央，报告攻克吉安的胜利和赣西南党组织状况等问题。这"}],"authors":["毛泽东"],"dates":[{"year":1930,"month":10,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":93,"page_end":93},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c8cfa92c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
