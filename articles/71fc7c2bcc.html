1976,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海染化二厂　乘征"},{"type":"paragraph","text":"伟大领袖毛主席亲自发动和领导的批判邓小平、反击右倾翻案风的斗争，已经取得了伟大的胜利。我们的胜利，是靠斗争得来的。以斗争取得的胜利，也必须用斗争来发展胜利。正如中央两报一刊编辑部重要文章《文化大革命永放光芒》所说的:“我们对于同走资派的斗争，对于在无产阶级专政下的继续革命，一定要有长期作战的思想准备。”"},{"type":"paragraph","text":"革命的辩证法告诉我们，在一定的条件下，矛盾统一体中两个互相对立的方面是可以转化的。“胜利”和“失败”就是这样。如果我们把已经取得的胜利看作是继续革命的动力，那末，我们就能够激励革命斗志，坚持以阶级斗争为纲，把无产阶级专政下的继续革命进行到底；相反，如果在胜利的形势下，丧失警惕，松懈斗志，飘飘然，昏昏然，那末，已经取得的胜利就会前功尽弃，毁于一旦。这种教训在历史上是屡见不鲜的。因此，我们在任何时候都不能忘记毛主席的教导:“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。所以，我们不能说最后的胜利。几十年都不能说这个话。不能丧失警惕。”征途上处处有阶级斗争，我们不仅要看到斗争后的胜利，更要迎接胜利后新的斗争。"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，特别是在粉碎了由邓小平一手挑起的天安门广场的反革命暴乱以后，我们已经取得了伟大的胜利。但是，斗争并没有结束，邓小平反革命的修正主义纲领、路线及其反动罪行还必须继续批判，斗争还在深入。如果我们不乘胜追击，以为反正邓小平问题的性质已经变为对抗性的矛盾，是“落水狗”了，“呒啥批头”了，那么失败了的阶级就会伺机反扑，卷土重来，继续同无产阶级较量、对此，我们切不可掉以轻心。"},{"type":"paragraph","text":"只要阶级、阶级矛盾和阶级斗争还存在，只要资产阶级法权还存在，只要资产阶级和国际帝国主义、修正主义的影响还存在，“走资派还在走”，将是长期的历史现象。我们一定要坚持以阶级斗争为纲，进一步认识和掌握社会主义条件下阶级斗争、路线斗争的规律和特点，总结同走资派斗争的经验，从而牢牢掌握斗争的主动权，乘胜前进，去夺取新的、更大的胜利。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71fc7c2bcc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
