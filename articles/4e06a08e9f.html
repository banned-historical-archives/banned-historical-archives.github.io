68,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向毛主席庄严宣誓"},{"type":"paragraph","text":"海军某部　黄建明快快擦去脸上的热泪，赶紧挥起欢乐的鼓槌。尽情地跳呀纵情地唱，西藏、新疆成立了革命委员会。呵！全国实现了一片红，战士放声高呼：毛主席万岁！万岁！万万岁！伟大统帅一声号令，祖国大地响彻春雷，文化大革命烈火四起，长城内外东风劲吹。工人阶级是领导阶级，搞斗、批、改是先锋队。工农兵主宰世界，顶天立地何所畏？全国军民紧跟毛主席的战略部署，把修正主义黑窝彻底砸碎。在毛主席革命路线的光辉指引下，全国各地诞生了革命委员会，毛主席亲手培育啊，得来这百花盛开春光媚。快快擦去脸上的热泪，赶紧挥起欢乐的鼓槌。在这无比欢乐的时刻，我们向毛主席庄严宣誓：永远做忠于您的好战士，坚决把革命委员会保卫，谁敢颠覆红色政权，就把他砸得粉碎！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e06a08e9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
