torical-archives/banned-historical-archives8/main/maoquanji4-1.pdf"],"article":{"title":"到安源时之报告","alias":"","parts":[{"type":"paragraph","text":"到安源时之报告"},{"type":"paragraph","text":"(1927年）"},{"type":"paragraph","text":"两湖的秋收暴动是我在中央时决定的。湖南指挥暴动的机关，分为两个：一个是前敌委员会，以毛泽东为书记，以各军事负责人为委员。一是行动委员会，以易礼容同志为书记，以各县负责同志为委员。长沙暴动以人力车工人及近郊农民为主力。·并可组织五百左右之伤兵。各县都已准备农民暴动，各地电线、铁路都已准备拆毁。我并带有中央介绍信，要贺、聂军队中调两团人来做暴动的武力，现在他们既绕道闽边，他们来了更好，希望潘心源同志将军队的情形作一详细报告，并开会讨论平、浏、醴、安各地的暴动布置工作。《伟大的进军》（油画）《向井冈山进军》（油画）《向井冈山进军》（油画）《向井冈山进军》（油画）荆竹山雷打石。1927年10月毛泽东在这里宣布了“三大纪律”。"},{"type":"paragraph","text":"1928《井冈山会师》(油画）"}],"authors":["毛泽东"],"dates":[{"year":1927}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f7d0dfc8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
