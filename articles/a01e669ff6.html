ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"普察英野战军有配合东北作战的任务","alias":"","parts":[{"type":"paragraph","text":"晋察冀野战军有配合东北作战的任务！！"},{"type":"paragraph","text":"（1948年4月22日）杨、罗、杨、耿："},{"type":"paragraph","text":"你们有配合东北作战的任务，主力三个纵队必须于辰初出动，辰删以前到达热河境内。因此，你们派赴门头沟²之一个纵队应立即收回，集结三个纵队于桑干河以南休息至辰冬左右为止，准备七天携粮并在政治上完成远出之一切准备工作，注意不要暴露企图，待命出动。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"卵养亥"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋察冀野战军司令员杨得志、第一政治委员罗瑞卿、第二政治委员杨成武和参谋长耿飚的电报。"},{"type":"paragraph","text":"[2]热河，旧省名，辖今河北省东北部、辽宁省西南部和内蒙古自治区东南部地区，1955年撤销。"},{"type":"paragraph","text":"[3]门头沟，今为北京市的一个区。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":230,"page_end":230},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a01e669ff6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
