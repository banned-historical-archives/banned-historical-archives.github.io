art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席的无产阶级政策武装群众","authors":["驻天津市红桥区支左部队"],"parts":[{"type":"paragraph","text":"在支左工作中，我们坚持用毛主席的无产阶级政策宣传群众、武装群众，推动了对敌斗争的深入发展。斗争实践使我们深深体会到，把毛主席的无产阶级政策交给群众，就能充分地调动广大革命群众对敌斗争的积极性，我们支左人员就是要善于把毛主席的各项无产阶级政策化为群众的革命实践。"},{"type":"paragraph","text":"去年四、五月份，红桥区清理阶级队伍工作正向纵深发展，形势一片大好。这时，一小撮阶级敌人极力混滑两类矛盾，煽动揪斗犯了错误的群众。正当我们想采取对策的时候，有的人说我们是“右倾”。针对这种情况，我们和广大革命群众一起反复学习了毛主席的教导：“政策和策略是党的生命，各级领导同志务必充分注意，万万不可粗心大意。”“要坚决相信大多数群众是好的，坏人是极少数。”毛主席的伟大指示，象光芒四射的灯塔，照亮了我们前进的航向。广大革命群众深深认识到，毛主席的各项无产阶级政策，代表了无产阶级和劳动人民的根本利益，是毛主席无产阶级革命路线的具体体现。保护人民还是镇压人民，这是毛主席无产阶级革命路线同刘少奇资产阶级反动路线的分界线。我们就是要坚决执行毛主席的革命路线，正确掌握毛主席的无产阶级政策，狠狠打击一小撮阶级敌人。广大革命群众提高了两条路线斗争觉悟，定准了对敌斗争的大方向，使清理阶级队伍的工作胜利地向前发展。"},{"type":"paragraph","text":"随着对敌斗争的深入发展，我们进一步加强了政策教育。这时，又有人说：“向群众交政策，会束缚群众的手脚”。针对这个问题，我们帮助群众大办毛泽东思想学习班，用毛主席关于对敌斗争的一系列指示和无产阶级政策，统一群众的思想，使大家认识到，用毛主席的无产阶级政策宣传群众、武装群众，不仅不会束缚群众的手脚，相反，会更加充分地调动群众对敌斗争的积极性。我们把讲政策和发动群众统一起来，有力地发挥了群众对敌斗争的巨大威力，极大地提高了对敌斗争的策略水平，稳、准、狠地打击了一小撮阶级敌人。在油脂储炼厂支左的同志，帮助革委会向革命群众广泛深入地宣传毛主席的无产阶级政策，充分地发动了群众，几天的时间，就揪出了五个隐藏很深的阶级敌人。"},{"type":"paragraph","text":"清理阶级队伍工作向着更深阶段胜利前进的时候，有的地方又出现“宁‘左’勿右”的苗头，我们认为，这种苗头是贯彻执行毛主席的各项无产阶级政策的绊脚石，不及时纠正，就会影响清理阶级队伍工作的顺利进行。于是，我们又一次大张旗鼓地宣传毛主席的无产阶级政策，引导大家活学活用毛泽东思想，检查对毛主席无产阶级政策的落实情况。有的同志检查了自己过去所以有“宁‘左’勿右”思想，是“私”字作怪，是对毛主席革命路线的不忠。大家说：斗私不狠，政策不准。要真正执行和捍卫毛主席的无产阶级政策，就必须活学活用毛泽东思想，不断破私立公。广大革命群众进一步提高了觉悟以后，更加自觉地掌握政策，团结了一切可以团结的人，使清理阶级队伍工作又出现了新局面。"},{"type":"paragraph","text":"毛主席曾经告诫我们：“现在敌人已经彻底孤立了。但是，敌人的孤立并不就等于我们的胜利。我们如果在政策上犯了错误，还是不能取得胜利。”在夺取文化大革命全面胜利的时刻，我们支左人员一定要更好地贯彻执行毛主席的各项无产阶级政策，用毛主席的各项无产阶级政策，宣传群众，武装群众。只有这样，才能稳、准、狠地打击一小撮阶级敌人，团结一切可以团结的力量，把文化大革命进行到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73c4688f36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
