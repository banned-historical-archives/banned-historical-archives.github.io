<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反抗垄断资产阶级迫害争取自由和解放　美国夏威夷人奋起斗争　夏威夷人的正义斗争得到美国各地人民的支持","authors":[],"dates":[{"year":1970,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反抗垄断资产阶级迫害争取自由和解放"},{"type":"paragraph","text":"美国夏威夷人奋起斗争"},{"type":"paragraph","text":"夏威夷人的正义斗争得到美国各地人民的支持"},{"type":"paragraph","text":"新华社二十日讯　檀香山消息：美国夏威夷州的夏威夷人不久前奋起反抗垄断资产阶级的迫害，开展争取自由解放的斗争。"},{"type":"paragraph","text":"七月初，夏威夷州两家垄断地产公司企图强行拆迁奥阿胡岛卡拉马河谷的一百多户夏威夷人（其中大多数是佃农）的住房，准备修建供垄断资本家玩乐的“娱乐场”。垄断资本的这一行径立即激起了当地居民的强烈反抗。不久，两家地产公司悍然派出压路机到卡拉马河谷，横冲直闯，开始摧毁居民住房。当地居民奋起斗争，他们聚集在压路机前的住房里，阻止压路机前进，在居民的抗议下，拆迁工作被迫暂停。"},{"type":"paragraph","text":"反动当局维护垄断企业的利益，当天无理逮捕了三名夏威夷人。第二个星期，压路机又企图来摧毁住房，居民们继续进行斗争，反动当局又无理逮捕了七名夏威夷人。在反动当局的支持下，垄断企业气焰嚣张，竟限期当地居民全部离开这个地区。"},{"type":"paragraph","text":"但是当地的夏威夷人不畏强暴坚持斗争。一位夏威夷人说：“和美国的印第安人一样，我们的土地被强占，我们的文化被摧残。我们的人民长期受到虐待、歧视和压迫。现在是夏威夷人民起来为争取解放和社会正义的时候了。”据报道，奥阿胡岛夏威夷人的正义斗争已得到美国各地人民的声援和支持。"},{"type":"paragraph","text":"夏威夷群岛由太平洋中的二十个岛组成，一八九八年被美国占领，一九○○年美国宣布为它的“领土”，一九五九年成立夏威夷州。奥阿胡岛是夏威夷群岛的主要岛屿，夏威夷州的首府檀香山就在这个岛上。目前全州共有人口七十多万，原来当地的夏威夷人现在不到十万人。长期以来，夏威夷州的垄断资本对夏威夷人进行残酷的迫害，强迫他们到类似美国印第安人“保留地”的贫瘠的“自耕地”去居住和生活，夏威夷人曾不断掀起反对美国垄断资本残酷统治的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"210428ec19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
