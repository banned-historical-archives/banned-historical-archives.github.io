ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"在欢迎叶挺大会上的讲话叫","alias":"","parts":[{"type":"paragraph","text":"在欢迎叶挺大会上的讲话！"},{"type":"paragraph","text":"（1937年10月）"},{"type":"paragraph","text":"我们今天为什么欢迎叶挺将军呢？因为他是大革命时代的北伐名将，因为他愿意担任我们新四军军长，因为他赞成我党的抗日民族统一战线的政策，所以我们欢迎他。"},{"type":"paragraph","text":"[1]叶挺在延安期间，毛泽东在抗大礼堂亲自主持了一次欢迎叶挺的大会。这是毛泽东在大会上讲话的一部分。叶挺受到党中央如此隆重的欢迎，心情十分激动。他在会上表示：“同志们欢迎我，实在不敢当。革命好比爬山，许多同志不怕山高，不怕路难，一直向上走。我有一段爬到半山腰又折回去了，现在又跟了上来。今后，一定遵照党所指示的道路走，在党和毛主席的正确领导下，坚持抗战到底。”"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":362,"page_end":362},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f47e5b3c92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
