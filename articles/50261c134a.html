ates":[{"year":1958,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资本家穷凶极恶"},{"type":"paragraph","text":"叫嚣利用经济衰退加强剥削工人"},{"type":"paragraph","text":"据新华社30日讯　据塔斯社纽约29日讯：美国金融工业界人士和反映他们的看法的资产阶级报刊公开叫嚷，要利用美国经济日益加深的衰退来进攻劳动人民的利益和加剧对他们的剥削。美国一家大机器制造公司的首脑戴维斯无耻地打着这种算盘，他最近就曾表示希望，可以利用衰退把“工业搞得更有效率、更有生命力。”"},{"type":"paragraph","text":"美国最大一家商业——工业公司“克罗格公司”董事长霍尔竟然认为不久以前的就业率“太高”了。他说：“如果没有一定的失业率，劳动市场也就不会有正常的条件。”"},{"type":"paragraph","text":"除了这些论调外，还有人公开叫嚷向工人的工资进攻。“幸福”杂志写道，当商人们说经济衰退是一种“健康的现象”的时候，“他们多半是指衰退可以制止工资的不断上升。”"},{"type":"paragraph","text":"美国著名的资产阶级经济学家斯里契特3月初在克里夫兰工厂主的会议上曾经教导这些工厂主们如何利用这次经济衰退的机会，来加紧剥削工人并对工会发动新的进攻。他说，“目前的经济衰退给予工厂主以修改劳动政策”，即侵犯工会的基本权利的“绝好的机会”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50261c134a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
