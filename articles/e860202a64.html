" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji39","name":"毛泽东全集第39卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"毛泽东等祝贺捷克斯洛伐克共和国国庆的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺捷克斯洛伐克共和国"},{"type":"paragraph","text":"国庆的电报"},{"type":"paragraph","text":"（1958年5月8日）捷克斯洛伐克共和国总统安·诺沃提尼同志，捷克斯洛伐克共和国国民议会主席兹·费林格同志，捷克斯洛伐克共和国总理威·西罗基同志："},{"type":"paragraph","text":"当捷克斯洛伐克共和国国庆十三周年纪念日的时候，我们谨代表中华人民共和国政府和人民向你们，并且通过你们，向捷克斯洛伐克政府和人民致以衷心的热烈的祝贺。中国人民非常高兴地看到：兄弟的捷克斯洛伐克人民在捷克斯洛伐克共产党的领导下，在建设社会主义的事业中，特别是在执行第二个五年计划方面取得了巨大成就，同时，对于巩固以苏联为首的社会主义大家庭的团结和维护欧洲和世界和平作出了重大贡献。最近一年来，我们两国在政治、经济和文化等方面的友好互助关系有了进一步的发展，我们两国人民之间的深厚友谊已经更加巩固和加深。"},{"type":"paragraph","text":"祝捷克斯洛伐克共和国日益繁荣和富强。"},{"type":"paragraph","text":"[1]这是毛泽东以中华人民共和国主席的名义和全国人民代表大会常务委员会委员长刘少奇、国务院总理周恩来联名给捷克斯洛伐克共和国总统安·诺沃提尼、捷克斯洛伐克共和国国民议会主席兹·费林格、捷克斯洛伐克共和国总理威·西罗基的电报。祝贺捷克斯洛伐克共和国国庆十三周年。毛泽东全集第三十九卷"},{"type":"paragraph","text":"祝中捷两国人民牢不可破的兄弟友谊日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九五八年五月八日"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":5,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":303,"page_end":304},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e860202a64"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
