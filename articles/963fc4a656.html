art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总结新经验，向伟大领袖毛主席作汇报","authors":[],"parts":[{"type":"paragraph","text":"中央军委决定明年春季召开全军学习毛主席著作积极分子代表大会，这是一件振奋全军的大喜事。是林副主席和中央军委对全军同志的巨大关怀和巨大鼓舞。我们热烈拥护中央军委这一决定，决心在“三支”“两军”工作中，为捍卫毛主席的无产阶级革命路线而学，为捍卫毛主席的无产阶级革命路线而用，以新的成绩迎接大会的召开，向毛主席和他的亲密战友林彪同志作汇报。"},{"type":"paragraph","text":"为了迎接全军学习毛主席著作积极分子代表大会的召开，我们要按照总政治部和沈阳部队政治部的指示精神，认真做好各项准备工作。一定要按照毛主席的教导：“我们的政策，不光要使领导者知道，干部知道，还要使广大的群众知道。”大张旗鼓地宣传这次会议的巨大意义，做到家喻户晓，深入人心，使军委的决定成为推动部队活学活用毛主席著作的巨大动力；更自觉地在两条路线斗争中活学活用毛主席著作，破大私，立大公，在改造世界观上狠下功夫，在头脑里树立毛泽东思想的绝对权威，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的无产阶级革命路线，更好地完成“三支”“两军”任务。要按照毛主席“实践、认识、再实践、再认识”的教导，放手发动群众，及时地、认真地总结经验。要把林副主席主持军委工作以来，部队在破私立公，搞好思想革命化，创造四好连队，加强战备，保卫国防，完成各项任务中活学活用毛主席著作的经验，特别是在文化大革命两个阶级、两条道路、两条路线斗争中活学活用毛主席著作的经验，通过讲用会、座谈会等方式，认真地加以总结，指导当前的斗争实践；再通过新的实践，创造新的经验，推动部队活学活用毛主席著作群众运动不断向前发展；促进各项工作任务胜利完成；促进部队更加革命化、更加战斗化的建设，把我军真正办成毛泽东思想大学校。"},{"type":"paragraph","text":"——《前进报》"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"963fc4a656"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
