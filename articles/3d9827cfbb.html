art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"布托总理和夫人等贵宾参观清华大学","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年五月二十七日讯 巴基斯坦伊斯兰共和国总理佐勒菲卡尔·阿里·布托和夫人以及其他巴基斯坦贵宾，今天上午参观了清华大学，受到师生员工们的热烈欢迎。"},{"type":"paragraph","text":"清华大学革命委员会主任迟群向贵宾们介绍了清华大学教育革命的情况和通过批判党内最大的不肯改悔的走资派邓小平、反击右倾翻案风斗争学校出现的新气象。贵宾们观看了清华大学的大字报，参观了校办工厂。"},{"type":"paragraph","text":"布托总理和夫人来到校办工厂参观时，工厂的工人和工农兵学员向贵宾们热情鼓掌。布托总理同在机器旁工作的工农兵学员亲切握手，询问他们学习的情况，并祝他们取得成功。"},{"type":"paragraph","text":"陪同巴基斯坦贵宾参观的有教育部负责人薛玉珊、清华大学革命委员会副主任谢静宜、中国驻巴基斯坦大使防维钊。"},{"type":"paragraph","text":"布托总理的夫人今天下午参观了北京儿童医院，部分随行人员参观了首都钢铁公司。"}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d9827cfbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
