ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"第四野战军主力应于四月一日前完成出发准备","alias":"","parts":[{"type":"paragraph","text":"第四野战军主力应于四月一日前"},{"type":"paragraph","text":"完成出发准备!]"},{"type":"paragraph","text":"（1949年3月17日）林、罗、刘："},{"type":"paragraph","text":"（一）华野中野两军决于四月十日渡江，向着湖口、芜湖、南京、镇江、上海之线及其以南地区国民党军六十个师举行攻击。（二）东野所负攻击武汉及湘鄂赣三省国民党军之任务业已确定，你们的两个军亦早于丑有出发，你们主力应于四月一日以前完成出发准备，于四月一日至四月十五日的半个月内，全军出发完毕，争取于五月三十一日全军到达南阳、信阳、固始之线及其以南地区，完成兵力展开任务。请你们按此时间标准，规定全军出发准备工作及出发计划报告我们。（三）关于行进路上粮草的准备及供应，你们应即与华北局及中原局协商确定，以免迟误。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"三月十七日"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给第四野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。刘达南信国始之及其有出意艺尿气力"},{"type":"paragraph","text":"端三都型格过路上撞草清情及再供应你例应"},{"type":"paragraph","text":"频华北局中原高协商磷定汉"},{"type":"paragraph","text":"只毛泽东为中共中央军委起草的《第四野战军主力应于四"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":3,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":208,"page_end":209},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5491b7b08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
