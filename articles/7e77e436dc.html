rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们的舞台","authors":["方忠"],"parts":[{"type":"paragraph","text":"湖南花鼓，上海沪剧，山东快书，广西彩调……多少次，竹板敲得星月醉，多少回，琴书唱得山水笑！"},{"type":"paragraph","text":"是革命样板戏的春风劲吹，拂开我们舞台新花朵朵娇，是革命样板戏的激越旋律，呼唤满山澎湃的风吼松涛！"},{"type":"paragraph","text":"自刻的竹笛虽然简陋，奏的乐曲却是那样自豪；自制的二胡虽然斑驳，但能拉出战士心中的音调！"},{"type":"paragraph","text":"每当风镐钻出胜利的喜讯，舞台上就也飞扬着张张捷报；每当新生事物在军营萌发，舞台上就为她高唱赞歌猛叫好！"},{"type":"paragraph","text":"不肯改悔的走资派邓小平，妄图把我们的舞台毁掉，什么“一花独放”？胡说八道！红色的舞台绝不能再披上茅草。"},{"type":"paragraph","text":"捍卫你，舞台上的鲜花朵朵，谁敢蹂躏你，请放心——战士有锋利的战笔，战士有雪亮的刺刀！（附图片）"},{"type":"paragraph","text":"（胡力国剪纸）（图片）"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e77e436dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
