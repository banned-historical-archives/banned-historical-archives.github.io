ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"对班禅额尔德尼祝贺新年电报的复电","alias":"","parts":[{"type":"paragraph","text":"对班禅额尔德尼祝贺新年电报的复电"},{"type":"paragraph","text":"（1956年1月21日）班禅额尔德尼："},{"type":"paragraph","text":"谢谢你的新年祝贺。过去一年内，日喀则地区的经济文化建设工作有进步，我们听到了都很高兴。现在由于全国人民的努力奋斗，我们的国家一年比一年繁荣兴旺，西藏地方和别的地方一样，都是要一年比一年兴旺起来的。在新的一年内，你们那里也将会有更大的进步。我祝你身体健康，学业精进，希望你在新的一年内为进一步加强民族团结，实现民族区域自治，做出重大的贡献。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五六年一月廿一日"},{"type":"paragraph","text":"[1]班禅额尔德尼，即班禅额尔德尼·确吉坚赞，西藏宗教领袖之一，当时任政协全国委员会副主席。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":1,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":176,"page_end":176},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb9c10daa3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
