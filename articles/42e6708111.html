" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"无题","authors":["北京大学","张志武"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"无题","type":"title"},{"text":"北京大学张志武","type":"authors"},{"text":"人民日报连续的社论使人无所适从，如果你坐在凳上则可看出趣事。看来党的缺点和错误是严重的，怕右派分子给宣扬出事，赶紧拿出“反社会主义”、“反党”的大帽子来，把这些敢说话能说话的人一下子扣死。","type":"paragraph"},{"text":"这些知识分子真是短见，叫你鸣，你也得有个分寸呀！哪能什么都说呢？满以为说的越厉害越是响应党的号召，越是起带头作用。结果作了典型。共产党这一招把右派分子打的可够呛，那些借机进行反党反社会主义的分子再也不敢了。原来有顾虑的人这回也看到了现身说法。这个场面看来不好收拾，今后人们都会更加小心了。说话要考虑，首先都要作自我的言行检查。","type":"paragraph"},{"text":"不出一个月，这前前后后都给人们看到了。人们对问题更有了清楚的认识。什么事情都有范围，都有局限性。顾虑不成其为顾虑了，它将变成分寸的出发点，想怎么的就怎么的不行。","type":"paragraph"},{"text":"自由、民主都有阶级性。我们有对党对社会主义歌功颂德的自由，有和风细雨批评的自由，我们有拥护社会主义的民主权力，有反对帝国主义的民主权利；没有想什么说什么的自由，没有不经领导批准的民主。共产党的领导不可怀疑，社会主义制度不可怀疑，我们现存政权也不可怀疑，即使你是以学术研究的态度，因为你可打着学术的旗号反党反人民。","type":"paragraph"},{"text":" 来源：北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42e6708111"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
