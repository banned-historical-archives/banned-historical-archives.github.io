同时发表","authors":[],"dates":[{"year":1963,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京4日电】　3月2日出版的《中国青年》学习雷锋同志专辑上，刊登了毛主席的题词。"},{"type":"paragraph","text":"毛主席题词的全文是:“向雷锋同志学习毛泽东”。"},{"type":"paragraph","text":"《中国青年》以《用雷锋的学习态度学习雷锋》为题发表了社论。社论说:毛主席的“向雷锋同志学习”的伟大号召，必将得到我国青年的热烈响应，把学习雷锋的热潮推向新的高峰。"},{"type":"paragraph","text":"这期《中国青年》还发表了周恩来总理的题词:“雷锋同志是劳动人民的好儿子，毛主席的好战士”，董必武、郭沫若、罗瑞卿、谢觉哉等写的诗和文章。此外，还有介绍雷锋生平事迹的通讯，近三万字的《雷锋日记摘抄》，以及雷锋遗诗等。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\03\\6336010101.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40df9ead94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
