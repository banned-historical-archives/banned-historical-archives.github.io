1967,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的书是行动指南"},{"type":"paragraph","text":"在南越中部地区的密林中有一位老游击战士，他是南越解放军某部的一位老团长。每当战斗一有间隙，他就拿出毛主席著作聚精会神地阅读起来，这已经成为他的习惯了。"},{"type":"paragraph","text":"老团长不仅自己热心读毛主席著作，而且经常对人宣传：“毛主席的书，是我们革命人民斗争的武器，行动的指南。它象茫茫大海里的灯塔，给世界上一切革命的人民照亮了前进的航道。”"},{"type":"paragraph","text":"老团长有四卷毛泽东选集。几年来，他带着这几卷宝书转战长山南北，走遍西部高原的密林。在战场上，为了消灭美帝国主义，南越解放军经常长途行军，边走边作战。老团长不管怎样累都不肯把毛主席的书放下。他总是这样说：“把毛主席他老人家的宝书放下，我怎么去指挥打仗呢！不管走到那里，累成什么样子，毛主席著作一定要带在身边！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d7f201d7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
