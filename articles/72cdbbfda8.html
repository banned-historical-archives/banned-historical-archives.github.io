<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"姜漱寰等隐匿敌伪财产价值十六亿多元","authors":["近宇"],"dates":[{"year":1952,"month":1,"day":31}],"is_range_date":false,"parts":[{"text":"姜漱寰等隐匿敌伪财产价值十六亿多元","type":"title"},{"text":"近宇","type":"authors"},{"text":"中华全国合作总社在反贪污、反浪费、反官僚主义的斗争中，揭发了姜漱寰等长期隐匿约值十六亿多元敌伪财产的罪行。这一案件中的主要贪污分子姜漱寰，还没有全部彻底坦白，仍在停职反省中；另一贪污分子权裕源，主动地交代了隐匿经过，并主动检举了姜漱寰等，现仍继续担任原工作。","type":"paragraph"},{"text":"这一长期隐匿敌伪财产的小集团是由姜漱寰主持的。这个小集团共十八个人，在全国合作总社工作的有姜漱寰、权裕源两人。","type":"paragraph"},{"text":"姜漱寰等远在一九四七年十月曾纠合权裕源等十八个人在南京成立所谓“第二公用住宅合作社”。姜漱寰利用她丈夫芦广绵担任伪善后救济总署赈衅厅厅长的职权，用伪社团的名义向伪善后救济总署取得约值五万美元的丝光卡机布、各色布匹、棉花、缝纫机头和蚊帐料等物资。当时他们用出卖部分物资的所得和拿这项物资作押品获得伪中央合作金库的贷款，购置楼房一所，建筑平房十二间。这些财产在姜漱寰于一九四八年四月出国去瑞士芦广绵处时（芦当时在瑞士）全部交由这个伪社团的另一负责人徐德著（徐德著系特务分子，解放后被捕交清河大队管训）代为主持。","type":"paragraph"},{"text":"一九四九年四月南京解放后，这个伪社团虽然因它的大部成员是反动分子而解体，但是它的约值十六亿六千四百余万元的财产（楼房一座、平房十二间、丝光卡机布九千八百五十四码、各种布匹四千九百七十三码、缝纫机头六部、蚊帐料一千零三十二码等）则隐藏起来，拒不交还人民。该伪社团另一负责人牛鼎鄂为了便于隐匿侵吞储存在上海外商安慎股份有限公司仓库的物资，并变更了存储的户头。","type":"paragraph"},{"text":"一九五○年五月姜漱寰由瑞士返国到北京。她为了继续侵占这批早应归还人民的财产，首先在北京灯市口北辰宫饭店召集在北京的曾参加这个舞弊案的人员集会计议；随后亲去南京、上海两地活动。她在上海盗卖了储存在外商仓库的卡机布三千多码，得款九千多万元。她在南京原拟进行欺骗政府、请求解除对该伪社团房产代管关系的活动，但没有如愿。","type":"paragraph"},{"text":"姜漱寰由上海返北京后，为了寻求个人的出路，混入革命大学政治研究院学习。由于她极端自私自利思想的支配，在进行“思想改造”的同时，还唆使分散各地已参加革命工作的和这事有关的人员向各服务部门骗取服务证明，希图朦蔽南京市人民政府，请求解除代管该伪社团房产的关系，进而攫为己有。这一企图因有关人员取得证件不齐而落空。","type":"paragraph"},{"text":"这批长期隐匿的敌伪财产，在一九五○年八月为上海、南京两地公安机关查觉而暂时冻结后，姜漱寰虽然知道这一情况，但是她还不肯向政府彻底交代；直到这次反贪污的斗争在全国合作总社展开后，她才随着同谋者权裕源的坦白而避重就轻地说出若干有关的事实。合作总社节约检查委员会对这件事正进一步追查。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1952年1月31日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72cdbbfda8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
