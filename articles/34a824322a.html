nth":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无产阶级文化大革命的浩荡东风吹拂着祖国的大地，大江南北处处呈现出一派生机勃勃的景象。你看!在社会主义文艺的百花园里，新花如锦，姹紫嫣红。一簇簇瑰丽的花朵，是对右倾翻案风的有力批判。面对这动人的景象，谁还会相信邓小平鼓吹的“今不如昔”之类的谰言?!"},{"type":"paragraph","text":"新的作品不断涌现，要求我们专业和业余文艺评论工作者悉心地扶植，认真地总结经验，这样才能使社会主义的文艺园地更加兴旺，更加繁荣。为此，我们开辟了《新花集》这一栏目，欢迎读者对新创作的各种形式的文艺作品展开评论，文章力求短小精悍，就其一点总结经验，发扬成绩，指出不足，更好提高。"},{"type":"paragraph","text":"愿我们共同努力，通过《新花集》这个阵地，从一个侧面反映出欣欣向荣的无产阶级文艺革命。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34a824322a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
