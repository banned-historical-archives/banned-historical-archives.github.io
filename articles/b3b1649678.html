ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"关于同意国家不为个人祝寿的建议的批语","alias":"","parts":[{"type":"paragraph","text":"关于同意国家不为个人祝寿的建议的批语！1"},{"type":"paragraph","text":"（1955年1月12日）退彭真。同意这样处理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十二日"},{"type":"paragraph","text":"[1]这个批语写在全国人大常委会副委员长彭真1955年1月3日给毛泽东、刘少奇、周恩来、陈云、邓小平的信上。信中说：黄炎培副委员长曾给全国人大常委会办公厅写信，提议国家不为个人祝寿。我觉得，借黄的提议，把国家做寿的例停止了为好，免得成了惯例，国家要一个接一个地为多人祝寿。如果中央决定接受黄的提议，废除已开之先例，我即把黄炎培的信在常委适当范围内传阅，并在和几个民主人士碰头时，用征求意见的方式作适当酝酿，非正式地和党外人士商得一致意见。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":419,"page_end":419},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3b1649678"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
