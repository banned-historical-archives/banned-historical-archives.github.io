art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席接见西哈努克亲王周总理欢宴柬埔寨王国国家代表团","authors":[],"parts":[{"type":"paragraph","text":"据新华社15日讯 中华人民共和国主席毛泽东，在15日下午5时20分接见了柬埔寨王国国家代表团团长、柬埔寨王国首相诺罗敦·西哈努克亲王殿下，和代表团团员、皇廷最高会议委员兰·涅特，钦·迪等人。接见时在座的，有全国人民代表大会常务委员会委员长刘少奇，国务院总理周恩来，全国人民代表大会常务委员会副委员长李济琛、沈钧儒、郭沫若、黄炎培、陈叔通，全国人民代表大会常务委员会副委员长、北京市市长彭真，国务院副总理彭德怀、陈毅，外交部副部长张闻天。"},{"type":"paragraph","text":"又讯 柬埔寨王国首相诺罗敦·西哈努克亲王殿下和他所率领的代表团全体人员，今晚8时应邀出席了我国国务院总理周恩来为欢迎他们而隆重举行的，有600人参加的宴会。当西哈努克亲王殿下和他所率领的代表团全体人员由刘少奇委员长和周恩来总理等陪同，进入大厅时，大厅里响起了长久的热烈的掌声。"},{"type":"paragraph","text":"周恩来总理和西哈努克亲王殿下在宴会上先后致词。在他们讲话的时候，全场不断报以暴风雨般的掌声。"},{"type":"paragraph","text":"又讯 我国国务院总理周恩来同柬埔寨王国首相诺罗敦·西哈努克亲王在15日下午2时举行会谈。"},{"type":"paragraph","text":"柬埔寨王国方面参加会谈的，有皇廷最高会议委员兰·涅特等；我国参加会谈的，有国务院副总理陈毅和外交部副部长张闻天等。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"张闻天","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36d61f4cba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
