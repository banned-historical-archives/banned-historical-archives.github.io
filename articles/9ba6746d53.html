,"authors":[],"dates":[{"year":1969,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利罢工浪潮汹涌澎湃席卷全国"},{"type":"paragraph","text":"许多行业的数百万工人纷纷起来斗争反对垄断资本剥削"},{"type":"paragraph","text":"新华社十七日讯　罗马消息：意大利广大工人反对垄断资本残酷剥削的斗争继续高涨，罢工浪潮席卷意大利全国各地。"},{"type":"paragraph","text":"一百多万冶金和机器制造业的工人，在十一日举行了总罢工以来，已经坚持了一个星期的罢工斗争。这一斗争使意大利全国上万家工厂继续陷于瘫痪。"},{"type":"paragraph","text":"意大利将近一百万建筑工人，在十二日和十三日连续举行全国范围的大罢工以后，在十七日再次举行二十四小时大罢工，强烈抗议垄断资本集团对他们的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"意大利二十万化学和制药工人以及二万四千名水泥工人十六日也为了提高工资而举行了罢工。"},{"type":"paragraph","text":"目前，意大利罢工斗争的浪潮正迅速扩展。国营冶金和机械制造业的三十万工人十六日也举行了罢工。铁路、邮电部门的工人已向政府提出了警告：如果政府不接受他们提高工资、改善劳动条件的要求，就要举行罢工。意大利的医务人员也向政府提出了类似的警告。"},{"type":"paragraph","text":"在意大利南部的西西里岛，农业工人为了抗议资本家的残酷剥削，最近一度占领了佩特拉利亚索塔纳的市政厅。在西西里的首府巴勒莫的运输工人，在十五日举行了罢工，使公共汽车和无轨电车被迫停驶。"},{"type":"paragraph","text":"在意大利北部的工业城市都灵，一百六十多名机场工作人员十六日在飞机跑道上举行示威，抗议机场当局无理关闭职工食堂。这次示威使许多班机无法按时起飞。"},{"type":"paragraph","text":"在意大利南部的大城塔兰托，全市工人在十三日举行了九十分钟的总罢工，强烈抗议资本家只顾赚钱，强迫工人在恶劣和危险的条件下工作，使工人工伤致死的事故日益增多。工人们还散发了传单，愤怒控诉并谴责资本家的这一罪行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ba6746d53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
