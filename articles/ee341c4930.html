"dates":[{"year":1995,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入10号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1995\\10\\95ar090401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e槐山\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我和妻都是“老三届”，文革时到了陕西永寿县的深山做民办教师，条件很差，终年劳苦，一贫如洗。那时我俩就憋了一口气:等有了孩子，一定得把他们“挤兑”成才，以使我俩破灭的梦幻在他们身上得到实现。"},{"type":"paragraph","text":"后来，为了这一宏愿，我俩在极端艰难的境遇下，仍竭力为孩子营造读书成才的环境。所遭磨难，一言难尽!"},{"type":"paragraph","text":"现在，三个子女已有两个大学毕业，一个(女儿)中专毕业后心中不服，工作三年后又在深造大学本科，结业在即。我和妻，足矣!"},{"type":"paragraph","text":"此照片摄于1979年夏，三个孩子于自家门前。"},{"type":"paragraph","text":"——槐山\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee341c4930"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
