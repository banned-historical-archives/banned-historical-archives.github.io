tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"河内举行歌舞表演欢迎我军事代表团叶剑英元帅和代表团全体成员出席观看","authors":[],"parts":[{"type":"paragraph","text":"新华社河内20日电 越南人民军总政治局文工团今天晚上在河内大戏院举行歌舞表演，庆祝人民军建军十七周年和欢迎中国军事友好代去团。"},{"type":"paragraph","text":"叶剑英元帅和中国军事友好代表团全体成员观看了今晚的表演。"},{"type":"paragraph","text":"陪同代表团观看演出的有：越南民主共和国副总理兼国防部长武元甲大将、人民军总参谋长文进勇上将、总政治局主任双豪中将、副总参谋长黄文泰中将等高级将领。"},{"type":"paragraph","text":"越南人民军总政治局文工团的艺术家们的精彩表演，博得全场一阵又一阵的掌声。演出结束后，叶剑英元帅和武元甲大将等上台向艺术家们赠送了花篮。"},{"type":"paragraph","text":"中国驻越南大使何伟以及随同中国军事友好代表团来越南访问的“八一”足球队和“八一”篮球队，也观看了今晚的演出。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c789573130"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
