<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削有罪，罪该万死","authors":["叶玉英"],"dates":[{"year":1968,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"剥削有罪，罪该万死"},{"type":"paragraph","text":"第六生产队女社员　叶玉英"},{"type":"paragraph","text":"毛主席教导我们说：“中国历代的农民，就在这种封建的经济剥削和封建的政治压迫之下，过着贫穷困苦的奴隶式的生活。”中国赫鲁晓夫完全站在地主、资本家的立场上，在我们要搞社会主义革命、消灭一切剥削制度的时候，胡说什么“剥削有功”，“剥削是救人”，真是反动透顶！"},{"type":"paragraph","text":"中国赫鲁晓夫鼓吹“剥削有功”，这明明是给剥削阶级当“吹鼓手”，让地主、富农、资本家长期骑在我们头上，任意剥削和压迫我们。这就完全暴露了他的反革命真面目。"},{"type":"paragraph","text":"我们贫下中农切身体会是：剥削有罪，罪该万死！解放前，我家世世代代都被高利贷、地租、雇工这三块大石头压得抬不起头来。直到我出生的时候，我家八口人，上无遮身片瓦，下无插针之土，租地主的屋住，佃地主的十四亩田种，一年到头，面向黄土，背朝青天，勤扒苦做，收点粮食，每年把租一交，就要借米下锅，甚至剥树皮，找野菜，挖观音土过日子。可是，地主还不满足，除了正租以外，还要巧立名目，额外加租，不把我们穷人的油榨干，血喝尽，他们不死心。后来，万恶的地主看到在我们身上再也榨不出一滴油来，就要把田抽回去给别人种。地主不劳而获，一年四季都是粮满仓，钱满柜，我们穷人的血汗把他们喂得肥头胖耳。中国赫鲁晓夫说“剥削有功”，功就在喂肥了地主、资本家这些吸血鬼；中国赫鲁晓夫说“剥削是救人”，救的是地主、资本家这群寄生虫。"},{"type":"paragraph","text":"伟大领袖毛主席领导我们打倒了三大敌人，消灭了人吃人的剥削制度，把我们从地租、高利贷、雇工的剥削压榨下面解放出来，走上了社会主义道路。我们贫下中农才真正翻了身，当了家，作了主。剥削阶级看到这种情况是不甘心的，他们时时刻刻都梦想着夺回他们失去的“天堂”。中国赫鲁晓夫这个剥削阶级的总代表，为了吸血鬼的利益，就大力宣扬“剥削有功”，千方百计为地主、富农和资本家复辟资本主义大造舆论，妄想搞垮社会主义，恢复人吃人的剥削制度，使我们贫下中农受二遍罪。中国赫鲁晓夫你听着：你完全是白日做梦，永远办不到！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"817702652c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
