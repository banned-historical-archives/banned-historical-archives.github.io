ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"对待反共派厚房的政策","alias":"","parts":[{"type":"paragraph","text":"对待反共派俘虏的政策！！"},{"type":"paragraph","text":"（1940年10月18日）"},{"type":"paragraph","text":"关于对待反共派俘虏问题，任何国内反共派向我进攻被我捕获之俘虏官兵、侦探人员、特务人员及叛徒分子，不论如何反动与罪大恶极，原则上一概不准杀害。这一政策是孤立与瓦解反共派的最好方法，应使全党全军从上至下有普遍深入的了解。其处置办法，凡反动分子及无用人员则优待释放之，凡可参加我军的士兵及有用人员则收留之，一律不准加以侮辱（如打骂及写悔过书等）或报复。如有关系紧要必须处决之个别分子，则须经过军中师以上及相当于师之机关，党内分局及区党委以上或各根据地最高政权机关之批准，旅以下、地委以下、专员以下没有批准杀人之权。关于此事之详细规定，中央另有通知，各地先照此一般规定通令实行。"},{"type":"paragraph","text":"中央书记处"},{"type":"paragraph","text":"一九四〇年十月十八日[1]这是毛泽东为中共中央书记处起草的发给中共中央华北局、华中"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":10,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":160,"page_end":160},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3aa59ee7ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
