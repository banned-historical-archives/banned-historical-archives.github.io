66,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们含着热泪，念完了关于蔡永祥烈士的英勇事迹的报道。又一支毛泽东思想的凯歌响彻我们耳际，又一个欧阳海式的共产主义战士的伟大形象矗立在我们面前。……"},{"type":"paragraph","text":"蔡永祥同志用自己的生命保卫了我们红卫兵战士，保卫了无产阶级文化大革命，保卫了我们的命根子——毛泽东思想。蔡永祥的大无畏的革命精神，永远是我们前进的动力。在当前这场尖锐复杂的无产阶级文化大革命中，我们尤其要学习这种大无畏的革命精神。"},{"type":"paragraph","text":"无产阶级文化大革命是关系到中国革命和世界革命前途的一场生死存亡的斗争，是夺权的斗争。一切反动阶级、一切人民的死敌，必然疯狂反抗。而资产阶级反动路线，正是他们赖以苟延残喘的基石。当前关键的关键，就是彻底批判资产阶级反动路线，誓死捍卫以毛主席为代表的无产阶级革命路线。我们是伟大领袖毛主席的红小兵，是革命的造反者，在这关键的时刻，就是要象蔡永祥同志那样，满怀对最敬爱领袖毛主席的无限热爱、无限忠诚，冲锋陷阵，“站在最前线!”不打倒走资本主义道路的当权派，不根除资产阶级反动路线，不树立起以毛主席为代表的无产阶级革命路线的绝对权威，我们死不瞑目!"},{"type":"paragraph","text":"蔡永祥同志说过:在无产阶级和资产阶级这场你死我活的斗争中，我要把自己的一切献给党和人民!蔡永祥同志的英勇事迹，大无畏的精神，正是他活学活用毛主席著作，不断破私立公，不断改造思想，树立无产阶级世界观的结果。只有无私才能无畏，只有用毛泽东思想武装起来，才能真正过得硬，天塌下来也敢顶，生死关头也敢冲!在这场触及人们灵魂的大革命中，我们一定要象蔡永祥同志那样，认真刻苦地活学活用毛主席著作，响应林彪同志的号召，把活学活用毛主席著作的群众运动推向一个新阶段。我们一定要象蔡永祥同志那样，以“老三篇”为座右铭，以张思德、白求恩、老愚公为榜样，毫不利己，专门利人，在灵魂深处大闹革命，全心全意为中国人民和世界人民服务。"},{"type":"paragraph","text":"我们是人民的儿子，是党和毛主席一手培养长大的。我们会说的第一句话，就是“毛主席万岁”；我们会唱的第一首歌，就是《东方红》；我们懂得的第一个道理，就是“没有共产党，没有毛主席，就没有新中国”。我们对毛主席无限热爱，无限忠诚，无限信仰，无限崇拜。谁反对毛主席，就打倒谁!"},{"type":"paragraph","text":"“成千成万的先烈，为着人民的利益，在我们的前头英勇地牺牲了，让我们高举起他们的旗帜，踏着他们的血迹前进吧!”一个蔡永祥倒下了，千万个蔡永祥在成长。敬爱的统帅毛主席，我们永远跟您在大风大浪中前进，在无产阶级文化大革命的隆隆炮声中，杀出一个红彤彤的毛泽东思想新世界!"},{"type":"paragraph","text":"红卫兵上海市大专"},{"type":"paragraph","text":"院校革命委员会"},{"type":"paragraph","text":"二战士"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"055188105f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
