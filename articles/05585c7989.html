authors":["西康省民政厅社会科"],"dates":[{"year":1952}],"is_range_date":false,"parts":[{"text":"盐源县一九五二年救灾工作总结","type":"title"},{"text":"西康省民政厅社会科","type":"authors"},{"text":"［…］全县总的来说饥荒是严重的,受灾人口约占总人口的30%,其中以三区最为严重,该区1810户人缺口粮的就占60%到70%,一般是添着野菜吃［…］p. 53","type":"paragraph"},{"text":"救济梁款使用情况,各区在使用救济粮款中,有下列几种情况:","type":"paragraph"},{"text":"积压:　积压救济粮不往下发这个情况很严重。第三区六个县上拨去了救济夏荒贷粮30000斤，到八月才发下去了一部分，其余完全未发，形成缺粮闹荒的现象。［…］","type":"paragraph"},{"text":"挪用:六月拨到第三区的救济款1000000元,他们挪在事务上用了。其他款也挪用了五十万，根本没用在救济上。［…］","type":"paragraph"},{"text":"贪污:　盐源一区五一年底拨给的救济粮二千斤被区事务陈友华贪污了［…］","type":"appellation"},{"text":"平均分配,普遍救济这个现象各去均存在,其中第三区最为严重,甚至还有平均发五,六斤救济粮的事。他们发救济粮款第一是无重点，救济面太宽所以解决不了群众的困难，有些灾民得了救济粮后有饿死了。[…]pp. 54-55","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05585c7989"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
