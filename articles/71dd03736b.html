],"dates":[{"year":1950,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新近返国的留美英加同学"},{"type":"paragraph","text":"赵忠尧等电毛主席拥护抗美援朝运动"},{"type":"paragraph","text":"【新华社讯】新近返国之原子物理学家赵忠尧教授及留美、英、加回国学生罗时钧、沈善炯等，近电毛泽东主席致敬，表示热诚拥护抗美援朝运动，并愿为革命建国事业努力。电文如下：中央人民政府敬爱的毛主席："},{"type":"paragraph","text":"我们以无限欢欣的心情回到祖国，谨向你致最崇高的敬意。我们的心在你的旗帜下，将各守岗位为革命建国伟业而努力。值此美帝侵朝之际，我们热诚拥护抗美援朝运动。"},{"type":"paragraph","text":"留美、英、加回国同学赵忠尧、罗时钧、沈善炯、黄克维、郑汝福、赵志华、赵华明、袁同功、姜文钊、张建候、朱征、朱诚、陈人英、张庆年、张宗明、蒲崇德、李彦如、方宗熙、黄大器、徐广华、雷树庄同叩。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71dd03736b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
