":[],"dates":[{"year":1950,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在疯狂的军备竞赛中"},{"type":"paragraph","text":"美公司加紧剥削工人"},{"type":"paragraph","text":"各地工人进行强烈抵抗"},{"type":"paragraph","text":"【新华社二十八日讯】塔斯社纽约二十七日讯：美国疯狂的军备竞赛，已促使工业企业和铁路方面的剥削变本加厉。据许多美国城市的消息显示，由于赶快制度和完全不顾安全措施的结果，工业中残废的人数大量增加。纽约工人日报报道说，在一年中美国有二万二千一百零五名铁路工人残废了。"},{"type":"paragraph","text":"大事违反现有的一点可怜的劳工法的现象，在美国本已司空见惯。但最近这种违反的情事还剧烈增加。甚至美国劳工部也不得不承认：单在九月份，纽约州和新泽西州就有一百三十六家公司的工厂被控违反关于工作日长度和工资等法律的情事。值得提醒的是有许多控诉是没有地方登记的，而且对于登记了的控诉也照例是不采取什么措施的。"},{"type":"paragraph","text":"报纸报道说，在底特律的通用汽车公司工厂和在巴尔的摩的钢铁工厂中，工人们正对厂主的进攻进行顽强的抵抗。在伯利恒钢铁公司的工厂中，工人进行罢工，抗议可怕的劳动条件。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e18c4f31c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
