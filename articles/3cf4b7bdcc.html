ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发华北局关于山西省直属机关审干情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发华北局关于山西省直属机关"},{"type":"paragraph","text":"审干情况报告的批语"},{"type":"paragraph","text":"（1951年6月19日）各中央局，并转分局，省市区党委及地委："},{"type":"paragraph","text":"兹将山西省直属机关六月七日审干情况的报告\"发给你们，这是一个极好的经验，请你们仿行。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十九日"},{"type":"paragraph","text":"[1]指中共中央华北局1951年6月18日转报的山西省直属机关一周审干情况报告。报告谈到山西省直机关审干运动的几点经验：一、加强对小组长的具体领导，更多地了解小组长的疑难问题，帮助小组长做好每个人的思想工作。二、放手使用积极分子，在实际工作中进行培养与锻炼。对积极分子的条件要求不能过高。对积极分子除思想教育外，必须经常分配给他们适当的工作。通过他们联系一批新干部，打破领导上的闭塞情况。三、选择坦白较好的作典型报告，并让大家来评判其彻底与否，这样做对大家的启发作用大。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":6,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":380,"page_end":380},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cf4b7bdcc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
