":1967,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界人民都爱读毛主席的书"},{"type":"paragraph","text":"有一次，一位伊朗朋友在北京机场候机室休息。服务员把一本刊登有毛主席照片的画报给他看，他很自豪地说：“我见到了伟大的领袖毛主席，毛主席和我握了手，在一起拍了照。毛主席身体非常健康，这是你们中国人民的最大幸福，也是世界人民的最大幸福。”"},{"type":"paragraph","text":"服务员深为他热爱毛主席的真挚感情所感动，送给他一本英文版的《毛主席语录》。他非常高兴，激动地对服务员们说：“你们读毛主席的书，听毛主席的话，你们是毛主席的好学生。不但你们中国人民读毛主席的书，我到过世界各地，我亲眼看到许多国家的人民都热爱毛主席，信仰毛泽东思想，都爱读毛主席的书。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"127e01ecd3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
