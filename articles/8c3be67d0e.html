<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1967,"month":4,"day":6}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席 千秋万代不变心","authors":["五好战士于乾卿"],"parts":[{"type":"paragraph","text":"对待毛主席和毛泽东思想的态度，是鉴别真革命、假革命，以至反革命的唯一标准。党内最大的走资本主义道路的当权派，不论是在一九三九年七月讲的《修养》，还是一九六二年修改过的《修养》中，都绝口不提学习毛泽东思想，做毛主席的好学生。在《修养》里，他还千方百计地影射和攻击毛主席，极力贬低和反对毛泽东思想。我们一定要把他的黑心挑开，把这颗埋在党内的最大的定时炸弹彻底挖出来，把这个最大的伪君子、野心家、阴谋家，斗倒斗垮斗臭！"},{"type":"paragraph","text":"中国革命的历史，充分证明了伟大领袖毛主席是我们劳动人民的大救星，是我们心中最红最红的红太阳；战无不胜的毛泽东思想，是我们的命根子，是战胜一切敌人最强大的武器。离开了毛主席和毛泽东思想，就没有我们劳动人民的一切，就没有社会主义和共产主义。回忆旧社会，我家祖祖辈辈给地主老财当牛做马，受尽了剥削和压迫，爷爷一年到头起早贪黑给地主拚死拚活地干，到头来，还是养不活一家人，奶奶只好领着父亲和叔叔到处讨饭。有一天，奶奶领着父亲讨饭，经过地主李大肚子的门前，这个吃人的豺狼硬说要饭的花子冲了他家的风水，放出狼狗把奶奶咬得遍体鳞伤，鲜血直流。父亲抱着受伤的奶奶痛哭，这个吃人不留骨头的豺狼又把父亲痛打了一顿。爷爷实在忍无可忍，就去告状。天下乌鸦一般黑，那时的官僚都是和地主一个鼻孔出气，哪里有穷人说理的地方。状没告成，爷爷反而被推进监狱里坐了三年黑牢，不久就死去了。是我们伟大的领袖毛主席，把中国人民从灾难深重的苦海中解救出来，建立了中华人民共和国。从此，劳动人民才扬眉吐气，当家作主。现在，我们伟大领袖毛主席又亲自发动和领导了史无前例的无产阶级文化大革命，中国变得更红了。毛主席不仅是中国人民最最敬爱的伟大领袖，也是世界革命人民最最伟大的导师。"},{"type":"paragraph","text":"对伟大的领袖毛主席，我们就是无限热爱、无限信仰、无限崇拜、无限忠诚。对战无不胜的毛泽东思想，我们就是坚信不疑、坚定不移。《修养》的炮制者恶毒攻击毛主席和毛泽东思想，我们一千个不答应！一万个不答应！我们一定要把这个反革命修正主义的总后台斗倒、斗臭，让毛泽东思想的万丈光芒永远普照大地！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c3be67d0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
