"authors":[],"dates":[{"year":1968,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河原崎长十郎热情赞颂中国无产阶级文化大革命"},{"type":"paragraph","text":"文化大革命进一步巩固了无产阶级专政"},{"type":"paragraph","text":"盛赞中国样板戏和钢琴伴唱《红灯记》是真正为工农兵服务的新文艺"},{"type":"paragraph","text":"新华社讯　东京消息：访问中国后不久前回到日本的日中文化交流协会常任理事河原崎长十郎在羽田机场的欢迎会上以及八月二十四日在东京举行的记者招待会上发表谈话，表达了他对世界革命人民的伟大导师毛主席无限热爱、无限崇敬的深厚感情，并且热情欢呼中国无产阶级文化大革命取得的伟大胜利。"},{"type":"paragraph","text":"河原崎幸福地回忆了他在去年中华人民共和国国庆节期间，在北京光荣地受到全世界革命人民心中最红最红的红太阳毛主席接见时的激动人心的情景。他说，毛主席身体非常非常健康。毛主席受到七亿中国人民的无限热爱和无限信仰。河原崎衷心祝福毛主席万寿无疆！"},{"type":"paragraph","text":"河原崎热情赞扬中国无产阶级文化大革命取得的辉煌胜利。他说，他深刻地认识到中国无产阶级文化大革命是在社会主义条件下进行的一场大革命，是一场极其尖锐复杂的阶级斗争。这一场大革命粉碎了中国赫鲁晓夫企图在中国复辟资本主义的罪恶阴谋，进一步巩固了无产阶级专政。河原崎强调指出，中国无产阶级文化大革命具有极为深远的意义。"},{"type":"paragraph","text":"河原崎热情赞扬中国人民活学活用伟大的毛泽东思想。他说，每当毛主席的最新指示发表时，中国革命群众无不欢欣鼓舞，表示衷心拥护，并努力学习和坚决贯彻执行。他说，他今后要更好地活学活用毛泽东思想，并且努力宣传毛泽东思想。"},{"type":"paragraph","text":"河原崎热烈欢呼在毛主席“洋为中用”的伟大思想指引下开放出来的中国革命文艺的又一朵美丽的鲜花——钢琴伴唱《红灯记》的诞生。河原崎强调指出，钢琴伴唱《红灯记》，与其他八个样板戏一样，是在中国无产阶级文化大革命中，在激烈的阶级斗争风暴中诞生的，它们是真正地为工农兵服务的新文艺。河原崎兴奋地说，一向被资产阶级捧为“音乐之王”的钢琴，今天在中国正变成为劳动人民服务的乐器了。"},{"type":"paragraph","text":"河原崎在谈到日中两国人民的友谊时指出，为了日本的独立与繁荣，必须增进日中两国人民的友好关系。这对日本人民的今天和未来，都是不可缺少的。"},{"type":"paragraph","text":"这一位坚持真理、勇敢地造了日共宫本修正主义集团的反的日本著名文化界人士，在谈话中表示坚决反对日共宫本修正主义集团的倒行逆施。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f677ad7e81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
