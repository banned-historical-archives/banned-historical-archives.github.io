s":[{"year":1964,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席和周恩来总理电贺阿拉伯国家首脑会议"},{"type":"paragraph","text":"新华社十三日讯　中华人民共和国主席刘少奇十二日打电报祝贺将在阿联首都开罗召开的阿拉伯国家首脑会议。电文如下：开罗阿拉伯国家首脑会议："},{"type":"paragraph","text":"值此阿拉伯国家首脑会议召开之际，我谨向会议表示祝贺。祝会议对于增强阿拉伯各国之间的团结取得成功，对于反对帝国主义的新阴谋和维护阿拉伯各国独立的斗争取得新的胜利。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"一九六四年一月十二日"},{"type":"paragraph","text":"新华社十三日讯　中华人民共和国国务院总理周恩来十二日打电报祝贺将在阿联首都开罗召开的阿拉伯国家首脑会议。电文如下：开罗阿拉伯国家首脑会议："},{"type":"paragraph","text":"值此阿拉伯国家首脑会议开会之际，我谨代表中华人民共和国政府和中国人民，并以我个人的名义，向会议表示祝贺。中国政府衷心地支持阿拉伯国家对以色列改道约旦河问题的立场。愿会议在促进阿拉伯国家的团结合作、反对帝国主义对阿拉伯国家的各种侵略阴谋和恢复巴勒斯坦阿拉伯人民的合法权利方面取得成果。我相信，这一会议的成功，必将对加强亚非团结和保卫世界和平作出有益的贡献。"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九六四年一月十二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1682dbf15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
