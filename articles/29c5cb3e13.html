rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们实现四化很有希望","authors":[],"parts":[{"type":"paragraph","text":"新华社6月5日讯 政协全国委员会主席邓小平今天上午会见了国际著名语言学家、美籍华人赵元任教授及其家属。"},{"type":"paragraph","text":"邓小平对赵元任教授不顾八十八岁高龄再次来中国访问表示欢迎。赵元任教授说，这次我到祖籍常州看了一下，家乡的目前情况确实比前几年好多了，取得了不少进步。邓小平说，常州的工业搞得不错。他接着向赵元任教授介绍了当前中国的情况。邓小平说，尽管我们还有不少困难，但我们实现四个现代化是很有希望的。"},{"type":"paragraph","text":"会见时在座的有：中国社会科学院副院长梅益，中国科学院副院长钱三强，中国社会科学院语言所所长吕叔湘等。"},{"type":"paragraph","text":"赵元任教授一行是应中国社会科学院的邀请于5月17日抵达中国的。"},{"type":"paragraph","text":"中国社会科学院院长胡乔木也曾会见了赵元任教授。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29c5cb3e13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
