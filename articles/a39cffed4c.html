ear":1977,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:读了这组旅客给上海站的信件，和铁路职工先进事迹的故事，令人精神舒畅，不由得从心底里发出一声赞赏:真好!"},{"type":"paragraph","text":"真好呵!我们敬爱的英明领袖华主席亲自抓了铁路，铁路面貌大变样，雷锋精神大发扬。上海铁路局上海铁路分局的职工，坚决贯彻落实第二次全国铁路工作会议精神，深揭狠批“四人帮”，认认真真学大庆，学雷锋，全心全意为人民服务，满怀阶级深情争做工农兵旅客的贴心人。这正是:车厢里温暖如春天，车站上处处逢亲人。"},{"type":"paragraph","text":"好了还要好，上游无止境。上海站和上海列车段的同志正乘全国工业学大庆会议的强劲东风，找差距，订规划，鼓干劲，把服务工作做得更深，更细，更好，为办成大庆式企业而狠下苦功。"},{"type":"paragraph","text":"我们期待着来自铁路的更大喜讯，更多动人的故事!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a39cffed4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
