art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英副主席会见并宴请美籍教授任之恭和夫人陶葆柽","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年五月十九日讯 中共中央副主席叶剑英今天下午会见并宴请美国籍物理学家任之恭教授和夫人陶葆柽，同他们进行了十分亲切的谈话。"},{"type":"paragraph","text":"参加会见和宴会的有关负责人和科学工作者有罗青长、李昌、熊向晖、王海容、周培源、钱三强、张文裕、施汝为、顾德欢、唐闻生、李光泽、王守江、王蒂chéng。"},{"type":"paragraph","text":"任之恭教授夫妇是于四月十五日来到中国的。他们曾在广州、上海、济南、青岛、北京等地参观访问、探望亲友。任之恭教授在北京给我国科学工作者作了学术报告，并进行了座谈。"},{"type":"paragraph","text":"任之恭教授夫妇还将去其它地方参观访问，然后返回美国。"},{"type":"paragraph","text":"中共中央副主席叶剑英五月十九日会见并宴请美国籍物理学家任之恭教授和夫人陶葆柽，同他们进行了十分亲切的谈话。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b382cdeba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
