art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"联系实际 加深理解高炮连在深入进行路线教育中认真学习毛主席的教导","authors":[],"parts":[{"type":"paragraph","text":"本报讯 济南部队某部高炮连在深入进行路线教育中，引导干部战士联系实际理解毛主席关于阶级斗争规律的教导的精神实质。他们体会到：这样学习，理论联系实际，好懂好记。"},{"type":"paragraph","text":"学习开始，党支部请工作组的领导干部介绍了历史上阶级斗争和两条路线斗争的情况。学习中，党支部又引导大家联系历史实际，加深对毛主席关于阶级斗争规律的教导的理解。六班有的同志对每隔几年就有一次大的斗争这一点，开始认识只是停留在字面上，理解不深。后来他们回顾了历史，分析了从一九五三年高岗饶漱石结成反党联盟垮台，到一九五九年彭德怀反党集团被粉碎，以后刘少奇一类骗子另立资产阶级司令部，遭到更惨重失败的斗争发展过程，懂得了每过几年牛鬼蛇神总要自己跳出来，这是对阶级斗争规律的科学总结，是我们识破和战胜敌人的有力武器。"},{"type":"paragraph","text":"这个连队还不断启发大家联系亲身参加文化大革命运动的斗争实践，理解毛主席关于阶级斗争规律的教导。二班战士杨树春回忆了他参加本大队文化大革命的情况。这个大队有个历史反革命分子，一直伪装老实。文化大革命中，他在后台指挥，指使儿子打着“造反派”的旗号，挑动群众斗群众，一时把大队搞得乌烟瘴气。后来，广大贫下中农在毛主席革命路线和政策的光辉照耀下，看清了他的反革命面貌，查清了他的历史罪恶，把他揭露了出来。广大贫下中农从中提高了觉悟，加强了革命团结，革命和生产出现了新面貌。杨树春一边回忆这段实践，一边认真学习毛主席的指示，越学越亲切，越琢磨理解越深。他说：“文化大革命的实践证明，阶级敌人总是要自己跳出来，革命人民总是要在战胜敌人的斗争中不断前进，这是历史的辩证法。”"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"869a191d2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
