script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"瑞典马列主义者共产主义联盟执委会发表声明指出苏修侵略捷克斯洛伐克只能加速自己垮台这次军事占领是在美帝国主义者默许下进行的。正象美国侵略越南一样，这是美国帝国主义者和苏联修正主义者企图一起瓜分世界的努力中的一部分。","authors":[],"dates":[{"year":1968,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社斯德哥尔摩二十四日电　瑞典马列主义者共产主义联盟执行委员会二十二日发表声明，强烈谴责苏修叛徒集团武装占领捷克斯洛伐克的侵略罪行。"},{"type":"paragraph","text":"声明说:苏联政府军事占领捷克斯洛伐克是大国沙文主义的行动，他们“口头上挂着的是马克思和列宁的学说，而在思想上和行动上却按资本家和帝国主义者那样行事。"},{"type":"paragraph","text":"“这次军事占钡是在美帝国主义者默许下进行的。正象美国侵略越南一样，这是美国帝国主义者和苏联修正主义者企图一起瓜分世界的努力中的一部分。正象美国帝国主义者野蛮侵略越南一样，这件事暴露了修正主义者和帝国主义者准备利用一切手段来维持他们对各国人民的压迫。但是这一行动也暴露了他们的软弱，以及他们不可避免的破产。”"},{"type":"paragraph","text":"声明说:“苏联领导人说，他们占领捷克斯洛伐克是为了防止那里复辟资本主义。多么无耻的谎言!”"},{"type":"paragraph","text":"声明指出，杜布切克集团是在致力于在捷克斯洛伐克复辟资本主义。但是，苏修绝不是去制止捷克斯洛伐克在诺沃提尼时代已经开始的走向资本主义的过程，因为他们本身正拼命致力于在苏联复辟资本主义。只有捷克斯洛伐克人民才能防止在其国内复辟资本主义。莫斯科的以及布拉格的修正主义者都是在践踏捷克斯洛伐克人民的利益。他们的利益只有靠捷克斯洛伐克的马克思列宁主义者来保障。"},{"type":"paragraph","text":"声明接着说:“那么，苏联修正主义领导人为什么要对捷克斯洛伐克实行军事占领呢?答案是:杜布切克企图效仿南斯拉夫的铁托，在摆脱苏修的经济、政治和军事控制的情况下复辟资本主义。这是对由苏修完全控制的华沙条约以及对苏修在捷克斯洛伐克和东欧其他国家经济特权的一个威胁。”"},{"type":"paragraph","text":"声明指出，苏联修正主义者及其傀儡们对捷克斯洛伐克实行军事占领，结果将是加速暴露他们的面目和加速他们的垮台。"},{"type":"paragraph","text":"声明强调说，瑞典马列主义者共产主义联盟谴责苏联修正主义者及其傀儡军事占领捷克斯洛伐克，并要求占领军立即撤走。"},{"type":"paragraph","text":"声明指出，瑞典马列主义者共产主义联盟的立场同资产阶级政党的立场毫无共同之处。这些政党表示反对军事占领捷克斯洛伐克，并不是因为它们支持捷克斯洛伐克人民，而是因为它们支持杜布切克对捷克斯洛伐克人民实行公开的资本主义统治。"},{"type":"paragraph","text":"声明最后说:“我们的口号是:一切军事占领部队从捷克斯洛伐克撤出去。全心全意地支持捷克斯洛伐克人民和捷克斯洛伐克马克思列宁主义者争取在不受外国干涉的情况下使他们的国家重新回到社会主义道路上去的斗争。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cfd266ebe"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
