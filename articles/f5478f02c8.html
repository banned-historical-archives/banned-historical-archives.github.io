art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的新式整军思想光芒万丈——广州部队某团干部战士赞“两忆三查”好","authors":[],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导说：“人民解放军用诉苦和三查方法进行了新式整军运动，将使自己无敌于天下。”林副主席指示说：“政治教育主要是抓阶级教育，抓活的教育。‘两忆三查’是最好的最深刻的政治教育，是提高部队阶级觉悟的好办法。”广州部队某团遵照毛主席的教导和林副主席的指示，在战备教育中普遍深入地开展“两忆三查”教育运动，个个诉苦情，人人挖苦根，一本本血泪账，一桩桩阶级仇、民族恨，进一步激发了干部战士对帝国主义、社会帝国主义和一切阶级敌人的刻骨仇恨，加深了对毛主席的深厚无产阶级感情，提高了无产阶级专政下继续革命的觉悟，从根本上增强了战备观念。干部战士赞扬说：“不忆不知道，一忆心开窍，继续革命斗志高，‘两忆三查’就是好！”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5478f02c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
