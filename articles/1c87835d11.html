year":1966,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"千万双手伸向毛主席"},{"type":"paragraph","text":"北京曲艺团"},{"type":"paragraph","text":"红旗高举，心情激荡，"},{"type":"paragraph","text":"步伐矫健，斗志昂扬，"},{"type":"paragraph","text":"我们奔向中南海去报喜，"},{"type":"paragraph","text":"要把决心汇报给毛主席、党中央。"},{"type":"paragraph","text":"我们坚决拥护无产阶级文化大革命的决定，"},{"type":"paragraph","text":"我们坚决执行十六条总纲。"},{"type":"paragraph","text":"总纲照亮了我们前进的方向，"},{"type":"paragraph","text":"总纲给我们带来信心、决心和力量。"},{"type":"paragraph","text":"我们要把自己的信心、决心和愿望，"},{"type":"paragraph","text":"早早地送到毛主席身旁。"},{"type":"paragraph","text":"亲爱的毛主席，我们一定站稳立场，"},{"type":"paragraph","text":"在阶级斗争中勇敢坚强。"},{"type":"paragraph","text":"当我们走近中南海门前，"},{"type":"paragraph","text":"猛然间一片欢声震天响："},{"type":"paragraph","text":"“毛主席来了，毛主席来了！”"},{"type":"paragraph","text":"激动的人群象奔腾的海洋。"},{"type":"paragraph","text":"看，果然是无比幸福从天降，"},{"type":"paragraph","text":"眼前出现了红太阳。"},{"type":"paragraph","text":"我们最最最敬爱的领袖毛主席来到群众接待站，"},{"type":"paragraph","text":"毛主席屹立在讲台上。"},{"type":"paragraph","text":"毛主席站在群众之中，"},{"type":"paragraph","text":"群众簇拥在主席身旁。"},{"type":"paragraph","text":"我们的伟大领袖身体十分健康，"},{"type":"paragraph","text":"精神焕发，满面红光。"},{"type":"paragraph","text":"人们心头涌起幸福的感受，"},{"type":"paragraph","text":"毛主席的健康是革命人民幸福的保障。"},{"type":"paragraph","text":"毛主席满腔热情向群众招手致意，"},{"type":"paragraph","text":"亲切的目光照得人们心情激荡。"},{"type":"paragraph","text":"毛主席说：“同志们好，同志们好！”"},{"type":"paragraph","text":"不断走向讲台两旁。"},{"type":"paragraph","text":"毛主席说：“你们要关心国家大事，要把无产阶级文化大革命进行到底！”"},{"type":"paragraph","text":"我们异口同声说：一定这样，一定这样！"},{"type":"paragraph","text":"千万人抬头仰望，"},{"type":"paragraph","text":"千万人沐浴着幸福的阳光，"},{"type":"paragraph","text":"千万双手伸向毛主席，"},{"type":"paragraph","text":"千万颗红心向太阳。"},{"type":"paragraph","text":"“万岁，万岁，万万岁！”"},{"type":"paragraph","text":"我们伟大的领袖万寿无疆！"},{"type":"paragraph","text":"毛主席，您最理解群众的愿望，"},{"type":"paragraph","text":"您的接待给了我们无穷力量，"},{"type":"paragraph","text":"您给了我们巨大的鼓舞，"},{"type":"paragraph","text":"您时刻给我们指引方向。"},{"type":"paragraph","text":"我们一定听您的话关心国家大事，"},{"type":"paragraph","text":"我们一定用您的思想把自己武装。"},{"type":"paragraph","text":"我们一定把文化大革命进行到底，"},{"type":"paragraph","text":"我们一定斗垮一切黑帮，"},{"type":"paragraph","text":"打倒党内走资本主义道路当权派，"},{"type":"paragraph","text":"把一切牛鬼蛇神横扫光，"},{"type":"paragraph","text":"改造世界观，清除旧思想，"},{"type":"paragraph","text":"树立无产阶级新风尚。"},{"type":"paragraph","text":"八月十日这个伟大日子，"},{"type":"paragraph","text":"我们永远永远记在心上。"},{"type":"paragraph","text":"我们永远记住您亲切的教导，"},{"type":"paragraph","text":"我们永远记着您鼓励的目光。"},{"type":"paragraph","text":"在革命斗争中敢当闯将，"},{"type":"paragraph","text":"火海敢闯，刀山敢上，"},{"type":"paragraph","text":"要做到亦工亦农亦文亦武，"},{"type":"paragraph","text":"在革命的大学校中锻炼成长。"},{"type":"paragraph","text":"永远高举着毛泽东思想伟大红旗，"},{"type":"paragraph","text":"向前，向前，跟着您奔向革命最前方！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c87835d11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
