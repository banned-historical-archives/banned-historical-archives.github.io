ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"立即将大部厚房补人部队","alias":"","parts":[{"type":"paragraph","text":"立即将大部俘虏补人部队“"},{"type":"paragraph","text":"（1948年12月22日）杨、罗、耿，并告林、罗、刘，杨、李，华北局："},{"type":"paragraph","text":"（一）二十二日十八时电悉。全歼新保安之敌甚慰。（二）望你们仿照刘邓陈粟?在徐蚌作战中即俘即查、即补即战方针，立即将最大部分俘虏补入部队，并迅速加以溶化。（三）休整十天，准备行动。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十二日二十二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第二兵团司令员杨得志、政治委员罗瑞卿和参谋长耿飚的电报。"},{"type":"paragraph","text":"[2]林、罗、刘，指林彪、罗荣桓、刘亚楼，当时分别任东北野战军司令员、政治委员和参谋长。杨、李，指杨成武、李天焕，当时分别任华北军区第三兵团司令员和副政治委员兼政治部主任。"},{"type":"paragraph","text":"[3]新保安，镇名，位于河北省怀来县西北。"},{"type":"paragraph","text":"[4]刘邓，指刘伯承、邓小平，当时分别任中原野战军司令员和政治委员。陈，指陈毅，当时任中原野战军第一副司令员、华东野战军司令员兼政治委员。粟，指粟裕，当时任华东野战军代司令员兼代政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":446,"page_end":446},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55d843c18f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
