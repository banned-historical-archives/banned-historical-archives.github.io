rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"决心在新长征中发挥先锋模范作用","authors":["吴志宏陈庆法"],"parts":[{"type":"paragraph","text":"本报讯 某部“自卫还击先锋连”的党员们，认真学习党的五中全会公报，决心在建设四化、保卫四化中发挥先锋模范作用。"},{"type":"paragraph","text":"五中全会公报发表后，“自卫还击先锋连”党支部召开支委扩大会，组织党员联系实际，认真学习领会五中全会关于坚持党的领导，改善党的领导，提高党的战斗力这个主题。在对越自卫还击战中，这个连的共产党员当尖刀，打头阵，许多同志立了功，全连六名一等功臣有五名是共产党员。战后，少数党员产生了居功骄傲情绪。一月下旬和二月中旬，党支部进行了两次思想纪律整顿，组织党员学习邓小平同志关于目前的形势和任务的报告，党内政治生活若干准则等文件，通过群众评议和个人检查，党员的精神振作了，模范作用加强了，推动了连队的训练。回顾连队这段经历，同志们对党员的作用与党的领导的关系认识更加深刻了。大家说：党的领导不是一句空话，它是通过每一个共产党员的模范作用和具体行动来体现的。"},{"type":"paragraph","text":"在学习讨论的基础上，这个连党支部制定了关于健全党的生活制度，坚持党管干部，加强党课教育等方面的措施。党支部还要求每一个党员经常用党员标准、用老连长刘建荣等献身精神对照检查自己，加强革命事业心，加强思想意识修养和组织纪律性。"},{"type":"paragraph","text":"（本报通讯员 吴志宏 本报特约通讯员 陈庆法）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4402094abe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
