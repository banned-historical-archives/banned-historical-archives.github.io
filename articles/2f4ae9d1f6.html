hors":[],"dates":[{"year":1957,"month":5,"day":22}],"is_range_date":false,"parts":[{"text":"李慎之:在社编委、党委扩大会议上的发言","type":"title"},{"text":"我个人对运动本身有怀疑。运动既起来，就要有坚强领导。","type":"paragraph"},{"text":"现在要领导人说话，还没有认真思考，不知谈什么是好。小问题不值得谈，大问题不能谈，中等问题要很深入，如我们与对外部的关系问题就不能谈。我们不能昧良心说话，如果要我同奚瑞森等人一起放，我是不干的；放，要有时间、有条件、有地点。大的领导要开始考虑大的问题；现在有些群众对业务方面的问题还不是很有兴趣，党员兴趣也不大。因此，应领导到这方向上去。大家对文件还未很好读，应读。部门应逐步转向排矛盾，要逐步收，对偏向要注意。现在党员不知如何讲话？应引导，应造成新的气氛，这是相当艰苦的事情。","type":"paragraph"},{"text":"墙报，前进报应掌握。大家的脑袋应冷静一些，制造成一种空气。","type":"paragraph"}],"comments":[],"origin":"《李慎之材料之五》（内部材料定期收回）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f4ae9d1f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
