":[],"dates":[{"year":1967,"month":8,"day":26}],"is_range_date":false,"parts":[{"text":"中央文化革命小组给昆明军区的电报","type":"title"},{"text":"昆明军区、云南军区并告八·二三和炮兵团的同志们：","type":"appellation"},{"text":"据报，最近昆明武斗严重，八·二三和砲兵团双方都向人民解放军夺枪，并互相开枪射击。我们向你们提出以下意见：","type":"paragraph"},{"text":"一、双方绝对禁止开枪；","type":"paragraph"},{"text":"二、双方都不许冲击军事领导机关；","type":"paragraph"},{"text":"三、人民解放军一切武器装备物资，任何团体与个人都不得侵犯与抢夺，双方都应在“拥军爱民”的口号下正确对待人民解放军；","type":"paragraph"},{"text":"四、双方的争执，应在中央既定方针下，议商解决，—定要坚决制止武斗。","type":"paragraph"},{"text":" 中央文化革命小组一九六七年八月二十六日","type":"paragraph"},{"text":"(原载云南八·二三《风展红旗》编《毛主席无限关怀云南人民——中央和中央首长对云南无产阶级文化大革命的指示(内部资料)》，1968年4月。)","type":"appellation"}],"comments":[],"origin":"原载云南八·二三《风展红旗》编《毛主席无限关怀云南人民——中央和中央首长对云南无产阶级文化大革命的指示(内部资料)》，1968年4月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"422df79127"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
