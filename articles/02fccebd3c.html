"month":8,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“天塌地陷何所惧，泰山压顶不弯腰，地大震，人大干，自力更生，重建家园!”"},{"type":"paragraph","text":"——唐山钢铁公司工人"},{"type":"paragraph","text":"“共产党员活着就要为毛主席的革命路线战斗，平时是这样，关键时刻更要这样!”"},{"type":"paragraph","text":"——唐山煤矿共产党员耿富安"},{"type":"paragraph","text":"“坚守战斗岗位，人在电话通!”"},{"type":"paragraph","text":"——唐山地区邮电局职工"},{"type":"paragraph","text":"“只要人在，就有阵地在，豁出我们的一切也要打通线路!”"},{"type":"paragraph","text":"——唐山市邮电局郊外站职工"},{"type":"paragraph","text":"“在抗震救灾的斗争中，我们要做冲锋陷阵的尖兵，千斤重担我们挑，最危急的地方我们上!”"},{"type":"paragraph","text":"——唐山市自行车厂广大共产党员"},{"type":"paragraph","text":"“困难面前有我们，我们面前没困难，十二级台风刮不倒，七级地震震不垮!”"},{"type":"paragraph","text":"——小靳庄大队党支部"},{"type":"paragraph","text":"“台风卷地眼不眨，七级地震震不垮，阶级斗争为纲牢记住，一张白纸绘新画!”"},{"type":"paragraph","text":"——小靳庄大队贫下中农"},{"type":"paragraph","text":"“学了毛主席的重要指示就照着办，批了邓小平的修正主义路线就和它对着干。我们要在抗震救灾中为人民作贡献，学人民受锻炼!”"},{"type":"paragraph","text":"——解放军指战员"},{"type":"paragraph","text":"“发生点地震算什么，我们的生产计划一斤一两不能少，国家交给我们的任务一定要完成!我们要以多出钢、出好钢的实际行动，深入批判邓小平，夺取反击右倾翻案风斗争的更大胜利!”"},{"type":"paragraph","text":"——首钢公司石钢炼钢厂炼钢车间广大工人"},{"type":"paragraph","text":"“天塌，我们社会主义大院敢顶!地陷，我们社会主义大院能填!我们社会主义大院要与地震争高低，决不向困难让寸分!”"},{"type":"paragraph","text":"——北京北新桥街道社会主义大院居民"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02fccebd3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
