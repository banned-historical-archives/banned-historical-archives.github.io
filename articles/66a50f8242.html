学院","张天健"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"党相信群众吗？","type":"title"},{"text":"四川师范学院张天健","type":"authors"},{"text":"（张天健，时为四川师范学院学生）","type":"subtitle"},{"text":"八年来，党的政策，全是暴力，对待人民群众全是暴力压服。举统购统销为例，我曾亲自参加过，农民是不服的，党采取了雷厉风行的压服政策。善于搬用苏联经济政策的干部，他们说，我们还不象苏联，苏联新经济政策饿死了几百万人。试问，我们硬要饿死人来学苏联经验吗？粮食的统购统销造成了非常紧张的气氛，造成了对党的极大不满。如果要农民衷心的说，那全是这样。党说以统购统销来抵死资本主义的发展，事实上我认为党是故作惊慌，故意造成压服的前提。中国农民很穷、受苦深，即如有资本主义的萌芽，暴力的手段是不行的。事实上，民怨日深，已经获得了证明。","type":"paragraph"},{"text":"共产党口口声声宣传信任群众，但是，几年党的好些措施，根本是不信任群众的。党是随时随地战战竞竞担心着自己的政权。请看全国的所有的报纸，被党统一了思想，从不报导社会的阴暗。昨天我听见同学说，山东农民穷得吃地瓜皮，我们的报纸却大肆报导山东富有，山东花生出口多少，试问：这是为什么？如果党是相信人民群众信任共产党的话，那就会报导出来。但是党怕由此而人民群众起来攻击党的政权。再说近一些，最近葛佩琦写了反社会主义文章，诚然言论是反动的，但是党匆忙的就来大作社论，声嘶力竭大喊重新估计新的阶级矛盾，马上搞出工人阶级来，党害怕这篇文章就引起群众来颠覆它的政权。这是党相信群众吗？我想如果群众真是不相信党的话，那尽管声势再虚张一些，也是无济于事的。几年来，我看够了太多的事情，一个人说了一句话，于是就捕风捉影，在运动中大肆施以压力、斗争，造成无数人精神上的抑郁。许多人就学会了言行和说话　(包括党员)，社会上没有真实，没有知心。人与人的关系、感情愈来愈冷酷，有人说共产党六亲不认，细细寻思，也是不无根据的。","type":"paragraph"},{"text":" 来源：《四川省右派言论选集》（内部文件，只供领导同志参考，请勿外传和翻印），中共四川省委宣传部办公室编，1957年7月20日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66a50f8242"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
