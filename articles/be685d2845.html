script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宫本集团中央书记处直属支部的大桥勇发表声明宣布同宫本修正主义集团断然决裂加入日共(左派)，为粉碎美日反动派、苏修和宫本集团而斗争","authors":[],"dates":[{"year":1970,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十二日电　东京消息:继今年五月日本北九州市小仓地区的四百多名日共党员宣布退党以后，最近，宫本集团中央书记处直属支部的大桥勇发表声明，宣布同宫本修正主义集团决裂，加入日本共产党(左派)行列。"},{"type":"paragraph","text":"大桥的声明说，十二年前我加入的日本共产党同现在的党完全不同。那时同志们对革命所具有的热情和信心、作为革命者的自豪和对同志的友爱，现在不知不觉地消失了。今天，党内存在着等级制度，向上爬的思想泛滥，党员之间疑神疑鬼，互相猜忌。这个党已经死气沉沉和腐败透顶，谈不上是一个革命党。它已完全堕落成为社会民主党。"},{"type":"paragraph","text":"声明还说，直到最近为止，我作为党中央总部书记处直属支部的一个成员，对“第十次代表大会”的路线尽管抱怀疑和批判的态度，但是仍旧诚心诚意地进行了工作。而且我还当过扩大党的力量的英雄，建立过几个工会组织，进行了斗争。但是，无论宫本怎样争辩，“第十一次代表大会的决议草案”是一条彻头彻尾的反革命路线，是与日本人民为敌的东西。我们相信，同宫本修正主义集团断然决裂并粉碎它的时刻已经来到了。我相信，不仅是我一个人，许多党员现在也是这样想的。"},{"type":"paragraph","text":"声明说，“第十一次代表大会”的背叛行径的特点之一，就是开了一次前所未闻的公开大会。他们的意图是，向美日反动派表示忠诚说:我们绝对不谈暴力革命。"},{"type":"paragraph","text":"声明说，宫本集团一心哀求残暴的美日反动势力只对宫本修正主义集团不宣布为非法和不行使暴力。他们从思想上和组织上实行了全面的投降。这是迄今为止在党的历史上从未有过的典型的背叛行为，甚至连考茨基也相形见绌。"},{"type":"paragraph","text":"声明说，“第十一次代表大会”的另一个背叛行为的特点是，他们同美日反动派一起，站在所谓“和平革命”论的立场上否定日本军国主义的全面复活，向反对复活日本军国主义的斗争大泼冷水。宫本修正主义集团说什么“日本有和平宪法，因为没有‘向海外派兵’和实行‘征兵制度’，所以军国主义没有复活”。但是，现在的日本“自卫队”拥有超过战前水平的兵力和供侵略用的现代化装备。正如去年十一月的日美联合公报表明的那样，把朝鲜、台湾、印度支那以及马六甲海峡都看成自己的势力范围；最近美帝国主义策划召开的雅加达会议、亚洲和太平洋理事会会议以及拼凑日、蒋、朴三个傀儡的“联络委员会”等，全由日本反动派扮演了主角。在美帝国主义的扶植下，极端反动的日本军国主义不仅已经复活，而且充当了美帝国主义在亚洲的“总管”。在富于侵略的军国主义已经复活的情况下，叫嚷什么通过议会能够完成“和平革命”，完全是幻想和自欺欺人的大骗局。"},{"type":"paragraph","text":"声明最后说，现在是时候了，让我们为粉碎美日反动派和苏修以及宫本修正主义集团而斗争!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be685d2845"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
