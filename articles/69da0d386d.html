article":{"title":"最高人民法院特别法庭第四次全体审判人员会议 (一九八一年一月二十日)","dates":[{"year":1981,"month":1,"day":20}],"is_range_date":false,"authors":["最高人民法院特别法庭"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院研究室，中华人民共和国最高人民法院特别法庭审判林彪江青反革命集团案主犯纪实，415-416","tags":[{"name":"江华","type":"主题/事件"},{"name":"江青","type":"主题/事件"},{"name":"林彪","type":"主题/事件"},{"name":"判决书","type":"主题/事件"},{"name":"特别法庭","type":"主题/事件"},{"name":"最高人民法院","type":"主题/事件"}],"parts":[{"type":"title","text":"一九八一年"},{"type":"paragraph","text":"一月二十日"},{"type":"paragraph","text":"最高人民法院特别法庭召开第四次全体审判人员会议，对林彪、江青反革命集团案判决书(草稿)进行了讨论。庭长江华和副庭长伍修权、曾汉周、黄玉昆出席了会议。审判员中除费孝通因事、范之因病请假外，都出席了会议。"},{"type":"paragraph","text":"最髙人民检察院特别检察厅副厅长喻屏、检察员江文，应邀列席会议。"},{"type":"paragraph","text":"江华庭长主持会议，他首先向会议说明判决书(草稿)是在各小组酝酿的基础上，经过反复修改撰写出来的，庭长、副庭长曾进行过几次讨论，今天发的是第二十六稿。对判决书(草稿)的审议，他强调要着重从认定的事实是否确凿、是否构成犯罪，和适用法律是否适当、合法，认真加以考虑，提出修改意见。他说：审判林彪、江青反革命集团这件重大案件，具有深远的历史意义，特别法庭做出的判决书是历史性文件，大家要认真讨论，仔细修改，力争使它成为一个好的案例。"},{"type":"paragraph","text":"会议充分发扬民主，听取各种意见，到会的审判员集思广益，对判决书（草案）逐段逐句进行了讨论。对判决书（草稿）认定的犯罪事实做了进一步订正，对有些用语改得更为确切。会上对有的被告人的罪行是否适用刑法第一百零一条的问题，进行了认真研究，由于意见一时不能统一，会议授权庭长裁决。江华庭长同意与副庭长研究后决定。会议对判决书（草稿）尚未讨论完毕，明日继续。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69da0d386d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
