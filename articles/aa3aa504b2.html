al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"给萧子升的信","alias":"","parts":[{"type":"paragraph","text":"给萧子升的信!"},{"type":"paragraph","text":"（1916年1月28日）子升仁兄大人执事："},{"type":"paragraph","text":"日来思念殊甚，想迁易新地，必多惬意。自徐先生去，无《甲寅》杂志可阅，特请吾兄以自己名义给暇向徐借《甲寅》第十一期第十二期3两本。弟准下星期日下午前来拜唔。即颂"},{"type":"paragraph","text":"教安。不一。"},{"type":"paragraph","text":"弟泽东叩"},{"type":"paragraph","text":"一月二十八日"},{"type":"paragraph","text":"[1]此信无写作年份。从信中所提想“向徐借《甲寅》第十一期第十二期”一事看，当写于1916年。"},{"type":"paragraph","text":"[2]似指徐遂良，1915年秋在一师任教育学教员。"},{"type":"paragraph","text":"[3]《甲寅》杂志，1914年5月创刊于日本东京，月刊，章士钊主编，共出10期。1915年10月停刊，第11、12期并未出版。毛泽东当时尚不知道这一情况。"}],"authors":["毛泽东"],"dates":[{"year":1916,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":217},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa3aa504b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
