49,"month":5,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英市长欢迎词"},{"type":"paragraph","text":"同胞们！今天让我来代表大家，同时，也代表北平市二百多万的人民来欢迎我们出国的代表团平安而胜利的回到了北平。我们欢迎和平代表团虽然遭受了法国反动政府的阻难，仍然能够在世界拥护和平大会上，把我们中国人民对于全世界人民所要说的话都坦白地说清楚了，使全世界人民明白地知道解放了的中国人民，不仅仅有拥护世界和平的诚意，而且有拥护和平的强大力量。"},{"type":"paragraph","text":"和平代表团全体代表们！你们向全世界人民表达了中国人民在中国共产党领导之下所进行的反帝、反封建、反官僚资本的人民革命及其胜利对人类和平有伟大的贡献；你们宣扬了人民解放军的英勇的战绩，宣布了以蒋介石为首的南京反动政府已经灭亡；今天你们胜利地回到了北平，又给我们人民带回来了世界和平民主阵营中的和谐、热烈、团结的精神，给我们相信以苏联为首的世界和平民主力量，一定可以粉碎任何帝国主义者敢于挑拨新战争的阴谋。"},{"type":"paragraph","text":"同胞们！今天是欢迎大会，同时又是庆祝大会，我们现在应该庆祝四月间在巴黎和布拉格两地同时召开的世界拥护和平大会的成功，大会上两千零五个代表，代表着七十二个国家八万万以上的人民一致的要求，要巩固和扩大以苏联为首的和平民主力量，坚决反对帝国主义者挑拨第三次世界大战的阴谋，反对疯狂地扩充军备，反对阻隔各国间正常的经济关系，反对独霸全世界的新法西斯主义，尊重各国的独立主权，并且成立了一个永久的机构，在所有参加大会的国家中同样要成立分会，把争取世界和平的工作，推广到全世界的城市和乡村中去，象和平大会这样的成功，无疑义地给世界战争的挑拨者以极大的打击，给全世界拥护和平民主的人民以极大的鼓舞，我们号召全北平的人民，要用自己的忠诚和力量，坚决拥护世界和平大会所通过的一切决定和措施，让我们来高呼全世界和平民主胜利万岁！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28dff8f228"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
