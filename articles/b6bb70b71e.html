产阶级军事路线","authors":[],"dates":[{"year":1974,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　最近，上海益民食品四厂、上钢三厂的工人同志分别和上海师大文艺系师生一起，举办了学习革命样板戏、批判林彪资产阶级军事路线的学习班。"},{"type":"paragraph","text":"益民食品四厂是普及革命样板戏工作开展得比较好的一个单位，学唱革命样板戏已在全厂蔚然成风。这次参加学习班的有“老妈妈演唱队”的老工人，也有新进厂的青年。通过学习和批判，大家认识到，革命样板戏是学习毛主席的无产阶级军事路线和军事思想的好教材。一些老工人说:‘过去学唱革命样板戏，只是为了做文艺的主人，现在通过学习，进一步认识到革命样板戏也是批判林彪资产阶级军事路线的强有力的思想武器。’"},{"type":"paragraph","text":"在这两个学习班上，大家以革命样板戏为武器，写出了一篇篇批判文章，口诛笔伐，更深入地批判了林彪在辽沈、平津战役中的罪行。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6bb70b71e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
