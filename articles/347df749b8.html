script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"划分左右切忌简单化对右派言论发出共鸣的，的确反映了有些人在思想上有右倾情绪；但不能由此得出结论说，凡是曾经发出共鸣的皆属右派。","authors":["李重"],"dates":[{"year":1957,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李重"},{"type":"paragraph","text":"罗东元同志认为:鸣放之中，凡对右派言论发出共鸣的，就是右派；凡对反击右派的言论发出共鸣的，就是左派。(刊于6月20日“社会大学”)事情真是这么简单吗?不是的。按照如此分析方法，有时也许可能给他说中，但是更有可能把不是右派的也划到右派中去了，这对反击右派的斗争是不利的。"},{"type":"paragraph","text":"对右派言论发出共鸣的，的确包括了所有的右派分子。所谓物以类聚、臭气相投是也。其实岂止右派分子而已，连台湾、香港的反动分子也大为喝采，遥相呼应。但是，我们并不能由此得出结论说，凡是曾经发出共鸣的皆属右派。不能忽视鸣放初期这样复杂的形势:当时，一方面出现了少数别有用心、想入非非的右派分子，他们采取鱼目混珠的手段来对社会主义、对共产党展开猖狂的进攻。他们到处放火，并竭力煽惑民主党派、知识分子、工商业者和青年学生跟着他们放火。另一方面，共产党根据群众的革命觉悟应该在斗争的风雨里培养而不应该在温室里培养的原则，因而对待右派暂时不给予回击，让群众充分认识右派的面目，以便增长见识，得到教训。于是，右派分子的头脑更热了，在右派的影响下，民主党派、知识分子、工商业者和青年学生内部有一部分社会主义立场不坚定的人，在短促的时间内，就附和了右派的言论，甚至也发表了类似右派的言论。怎样区分右派和非右派呢?这就必须采取谨慎态度，进行全面分析。并不是像罗东元所说的，单单看你在鸣放中说了些什么，对哪些言论发出共鸣就很轻易地下结论。必须依据毛主席“关于正确处理人民内部矛盾的问题”所提出的六项标准进行全面分析。"},{"type":"paragraph","text":"今天揭发出来的右派分子只是一小撮的人。他们在鸣放中得意忘形，太疯狂了，因而彻底暴露了真面目。现在已经有了许多事实证明，他们老早就对于中国走上社会主义道路是不甘心的。他们不但不赞成社会主义革命，而且也早就不赞成反帝反封建的彻底的民主革命。这也不是像罗东元所说的，仅仅是在鸣放中发表荒谬言论或对荒谬言论发出共鸣因而据此定罪的。有些右派的辩护士迄今还在为右派分子文过饰非，说什么右派分子只不过偶而在鸣放中说错几句话，你们为何攻之如此之猛，等等。这真是天大的谎话。如果我们划分左右界线采用简单化的办法适足以中他们的毒计，岂不危险?"},{"type":"paragraph","text":"如上所述，是说明在当前反右派的政治斗争中，不可以简单化地划分左右界线，必须谨慎地、全面地进行分析。一定要团结好绝大多数的人，共同起来打退绝少数的右派分子的猖狂进攻，从而提高这绝大多数的人的革命觉悟。当然，罗东元同志的文章中也有可取之处，这就是，作为一个短时间内曾经附和右派、向右派言论发出共鸣，但还不是右派的人应该接受这个惨痛教训:鸣放中对待右派态度如何，不能不是立场的考验。虽然不是右派，但是曾同情过右派，这是很危险的。如果不是共产党和工人阶级坚决回击右派的斗争教育了我们，陷到右派泥坑的人，也许就不会只是绝少数了。难道还不是极其清楚的事实吗?"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"347df749b8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
