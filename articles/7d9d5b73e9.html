,"dates":[{"year":1955,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"来信"},{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我是前年才从高中毕业的学生，又是青年团员，现在担任小学六年级班主任。本来我对于教育理论一无所知，自从参加教育工作后，才开始阅读一些从苏联翻译过来的有关教育学的书籍。对苏联的先进教育理论，我非常钦佩，并经常把它运用在实际工作中。目前我班儿童无论知识质量和品德，一般都是在水平以上的。因之我自己虽然不能说社会主义教育思想已经很巩固，但至少资产阶级唯心主义教育思想对我的影响是很少的。像杜威这样的人，我过去听都没有听说过，至于他的实用主义教育学说更是完全不知道了。"},{"type":"paragraph","text":"在这次学习中，我曾认真地想找寻自己有没有资产阶级唯心主义教育思想，但找来找去总找不到。我和别的同志谈起来，他们也同样感到不知什么是资产阶级唯心主义教育思想。编辑同志，我们究竟有没有资产阶级唯心主义教育思想呢?谁影响我们的呢?这些问题希望你们能公开解答一下!"},{"type":"paragraph","text":"读者　张丽娟"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d9d5b73e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
