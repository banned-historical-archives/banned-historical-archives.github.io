<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"中央转发罗瑞卿关于在公安系统开展反官僚主义、反命令主义、反违法乱纪斗争的报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发罗瑞卿关于在公安系统开展反官僚主义、反命令主义、反违法乱纪斗争的报告?的批语"},{"type":"paragraph","text":"（1953年2月14日）[1]罗瑞卿，当时任政务院政治法律委员会副主任兼公安部部长。"},{"type":"paragraph","text":"[2]指罗瑞卿1953年2月10日关于在公安系统开展反官僚主义、反命令主义、反违法乱纪斗争给毛泽东、中央并政府党组、政法委分党组的报告。报告说，3年来，全国各级人民公安机关，在镇压反革命的伟大斗争中，在三反运动中经受了严重的考验，从政治上组织上建设和整顿了自己。但是，镇反运动的伟大胜利，也掩盖着我们工作上和组织上不少严重的缺点和错误，也的确出现过和存在着不少坏人坏事。最突出的是存在着乱捕、乱押、刑讯逼供、夸大化、造假案和国民党旧警察作风等严重的违法乱纪现象。在农村的区乡公安人员中则存在着严重的强迫命令作风。这些严重情况之所以能够存在和发展，并长期得不到纠正，主要原因是各级公安领导机关有严重的官像主义，放松了政治领导、思想领导和组织工作，不深入基层，不了解情况。因此在公安系统内开展一个反对官僚主义、反对命令主义、反对违法乱纪的斗争十分必要。采取的具体措施是：第一，结合当前的各项工作开展反违法乱纪的斗争，并通过这个斗争揭露和克服领导机关的官僚主义。第二，凡是经过认真审查、经过上级批准确定的假案，均须迅速地严肃负责地加以平反和处理。第三，各级党委和各级公安机关，必须严格遵守捕人、杀人和管制的权限规定以及行使侦察权限的规定。第四，在公安系统内有计划地加强政策、纪律教育，严禁刑讯逼供。第五，各大区、各省市公安机关应于1953年4月间向中央公安部作一次反官僚主义、反命令主义、反违法乱纪的专题报告。"},{"type":"paragraph","text":"中央转发罗瑞卿的报告的批语各中央局、分局，并转各省市委，各公安机关；并告中央人民政府各党组："},{"type":"paragraph","text":"中央认为在公安系统内按照中央一月五日指示\"，有计划地开展反官僚主义、反命令主义、反违法乱纪的斗争是完全必要的，中央批准罗瑞卿同志二月十日的报告，并将此报告转给你们，望督促公安机关按照报告所述方针和步骤妥善实施之。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月十四日"},{"type":"paragraph","text":"[1]指中共中央1953年1月5日关于反对官僚主义、反对命令主义、反对违法乱纪的指示。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":494,"page_end":495},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发罗瑞卿关于在公安系统开展反官僚主义、反命令主义、反违法乱纪斗争的报告的批语","authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":14}],"is_range_date":false,"parts":[{"text":"中央转发罗瑞卿关于在公安系统开展反官僚主义、反命令主义、反违法乱纪斗争的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局、分局，并转各省市委，各公安机关；并告中央人民政府各党组：","type":"appellation"},{"text":"中央认为在公安系统内按照中央一月五日指示，有计划地开展反官僚主义、反命令主义、反违法乱纪的斗争是完全必要的，中央批准罗瑞卿同志二月十日的报告，并将此报告转给你们，望督促公安机关按照报告所述方针和步骤妥善实施之。","type":"paragraph"},{"text":" 中央二月十四日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be82b28b63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
