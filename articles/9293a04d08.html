script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各地红卫兵和革命师生决心当好毛泽东思想的红色宣传员模范地执行十六条　热情地宣传十六条用十六条武装革命群众，定能彻底揭露和斗倒斗垮斗臭一切牛鬼蛇神","authors":[],"dates":[{"year":1966,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京9日电　在当前无产阶级文化大革命正在向纵深发展的新高潮中，各地广大红卫兵和革命师生一致表示既要模范地执行毛主席亲自主持制定的十六条，又要满腔热情地宣传十六条，当好毛泽东思想和十六条的红色宣传员。"},{"type":"paragraph","text":"由各地到北京进行革命串连的红卫兵和革命师生，这些天来有更多的人继续星夜赶回了自己的战斗岗位。他们回去以后，纷纷向本校、本地的红卫兵和革命师生传达北京的革命经验，同大家一起结合斗争实际深入学习毛主席著作和十六条，总结自己的斗争经验。各地红卫兵和革命师生认为，只要他们在斗争中不折不扣地贯彻执行十六条，并且展开广泛深入的宣传，让十六条家喻户晓，把广大革命群众更充分地发动起来，就一定能够把本地区本单位的文化大革命搞深搞透。"},{"type":"paragraph","text":"连日来，天津市广大红卫兵和革命青少年听了赴京战友们的传达以后，掀起了一个活学活用十六条，大张旗鼓地宣传十六条的高潮。有一百多所大中学校的红卫兵和革命师生，组织了宣传队、宣传组、宣传站，广泛开展宣传十六条的活动。他们决心让十六条家喻户晓，深入人心。他们说:只要把十六条交给革命群众，用十六条武装起革命群众，使广大革命群众起来自己动手闹革命，就一定能够彻底地揭露和斗倒、斗垮、斗臭一切牛鬼蛇神。东方红战校的红卫兵们通过认真地学习十六条以后表示:要取得无产阶级文化大革命的彻底胜利，就一定要学习党的政策，熟悉党的政策，掌握党的政策，不折不扣地执行党的政策，只有这样才能把革命引向深入，同时使自己在阶级斗争的大风大浪里学会进行阶级斗争的本领。"},{"type":"paragraph","text":"上海许多赴京红卫兵和革命师生回去以后，满怀着革命的激情作报告，写大字报，把他们在北京学习到的革命经验向自己的战友作了详细传达。上海第一医学院、上海财经学院等学校的许多革命学生星夜赶回上海以后，一下火车就回到学校向同学们作传达。许多学校的革命师生纷纷表示，我们决不辜负党中央和毛主席的期望，一定要学好十六条，不折不扣地贯彻执行十六条和最热情地宣传十六条，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"沈阳市大中学校赴京红卫兵和革命师生返回沈阳后，坚决表示要成为十六条的模范执行者和宣传者，高举革命的火炬，“敢”字当头，冲破一切阻力，奋勇前进。有的学校赴京革命学生回到学院以后，每天早晨都同大家一起聚精会神地先学习毛主席著作和十六条，然后根据斗争形势制订一天的行动计划。一些学校革命小将们听过赴京战友的传达后，个个浑身是劲，纷纷表示一定要全部地彻底地贯彻执行林彪同志代表毛主席和党中央向大家发出的号召。他们人人随身携带《毛主席语录》和十六条，随时随地学习，随时随地作宣传。连日来，各学校从北京回来的革命小将们还走上街头撒传单，贴标语，作广播，向广大革命群众宣传十六条。"},{"type":"paragraph","text":"由北京回到广州的广东工学院红卫兵和革命学生，一下车就向广大群众调查了解广州市文化大革命进行的情况，回到学校后，马上和全校红卫兵、革命师生一起，对他们前一阶段的革命活动作了总结。湖北中医学院赴京红卫兵在返回武汉途中，把首都红卫兵的革命经验对照着本单位的实际情况逐条整理出来，回校后马上就向大家作了传达。这些学校的革命师生都表示要不折不扣地执行十六条和更好地宣传十六条，掀起文化大革命的新高潮。"},{"type":"paragraph","text":"成都市许多大专学校的红卫兵和革命师生，听了从北京回去的红卫兵的传达以后，都受到极大鼓舞，决心把毛主席的关怀变成取之不尽的力量源泉，在斗争中读毛主席的书，听毛主席的话，照毛主席的指示办事，不折不扣地贯彻十六条。他们还表示要充分利用大鸣大放大辩论大字报的武器，把本地区本单位的一切牛鬼蛇神斗倒、斗垮、斗臭。一些学校的红卫兵，连日来还组织宣传车、宣传队深入到火车站、汽车站、街头巷尾宣传十六条，受到了广大工农兵的热烈欢迎和积极支持。"},{"type":"paragraph","text":"郑州市许多大中学校由北京回去的红卫兵和革命师生，在向留校同学作传达时，都一致强调今后要更好地活学活用毛主席著作，模范地执行十六条，热情地宣传十六条，把本地区、本单位的文化大革命搞深搞透。许多红卫兵表示，要象首都许多革命同学那样，时时、事事、处处突出毛泽东思想，用毛泽东思想这个战无不胜的思想武器去识别一切，洞察一切，批判一切，改造一切，一辈子当毛泽东思想的红色宣传员。"},{"type":"paragraph","text":"从内蒙古自治区首府呼和浩特到北京进行革命串连的红卫兵和革命师生，连日来，也纷纷赶回原地，并且分别和留校的红卫兵、革命师生一起举行了座谈会、报告会和誓师大会。内蒙古医学院由北京回去的红卫兵们说:我们一定用毛泽东思想作为无产阶级文化大革命的指南，认真地、全面地、彻底地、不折不扣地贯彻执行十六条，把文化大革命推向新的高潮。我们一定要当好热情宣传毛泽东思想的红色宣传员，让毛泽东思想代代相传，照亮全球。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"内蒙古文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9293a04d08"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
