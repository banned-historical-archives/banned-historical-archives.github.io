" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国人民解放军财政部军事管制委员会中华人民共和国教育部关于高等学校1966年毕业生和1965年及其以前年度入学的研究生有关工资和其他经费开支问题的规定","authors":[],"dates":[{"year":1967,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"中国人民解放军财政部军事管制委员会中华人民共和国教育部关于高等学校1966年毕业生和1965年及其以前年度入学的研究生有关工资和其他经费开支问题的规定","type":"title"},{"text":"根据中共中央、国务院、中央军委、中央文化革命小组1967年9月7日“关于1966年大专院校毕业生分配问题的通知”，现对高等学校1966年毕业生和1965年及其以前年度入学的研究生有关工资和其他经费开支问题，作如下规定：","type":"paragraph"},{"text":"一、工资待遇：","type":"paragraph"},{"text":"（一）1966年毕业生（包括1965年毕业生尚留在学校没有分配的）和1965年入学的研究生，暂按国务院关于高等学校毕业生在见习期间的临时工资标准的规定（如修业4年以上毕业的，北京地区为46元）执行，从今年9月份开始发给临时工资（9月份发了助学金要扣回）。","type":"paragraph"},{"text":"（二）1964年入学的研究生，按结业研究生，即照国务院关于高等学校研究部毕业生在见习期间的临时工资标准的90%发给（如北京地区即按57元5的90%发给）；从今年9月份开始发给临时工资。","type":"paragraph"},{"text":"（三）1963年及以前年度入学的研究生，按照国务院关于高等学校研究部3年制毕业生在见习期间的临时工资标准的规定（如北京地区为57元5）执行，从今年9月份开始发给临时工资。","type":"paragraph"},{"text":"（四）关于调干毕业生工资待遇按1957年10月25日中华人民共和国国务院议字第57号关于高等学校和中等专业学校毕业生在见习期间的临时工资标准规定和1961年6月13日劳动部、内务部（61）中劳薪字第44号、（61）内人工字第25号关于高等学校和中等专业学校调干毕业生工资待遇问题的处理意见的规定执行。","type":"paragraph"},{"text":"（五）因病不能分配工作的毕业生，原则上参照1963年8月30日教育部、内务部、国家计委关于高等学校毕业生调配派遣暂行办法第7条第2项规定执行。","type":"paragraph"},{"text":"（六）有些学校目前不可能分配毕业生，或者接收单位目前不可能接收，这些学生可以暂时留校闹革命，从今年9月份开始由所在学校发给临时工资。列“高等教育支出款”“人民助学金目”。","type":"paragraph"},{"text":"（七）半工半读、半农半读高等学校毕业生仍按办学部门原来规定的办法分配，其待遇也按办学部门原来规定执行。","type":"appellation"},{"text":"二、凡按规定毕业的学生和研究生，在未分配到各部门前，临时参加各主管部门经批准统一组织到直属厂矿企业和基层单位“抓革命，促生产”的往返旅费由所在学校开支。到达生产、基层单位后因工作需要外出的差旅费和生产所需的劳保用品及其他有关费用，由生产、基层单位开支。","type":"paragraph"},{"text":"在生产、基层单位“抓革命，促生产”期间，一律不发给往勤费，但对生活确有困难的，可以比照1965年9月19日国务院“关于各级机关、企业、事业单位工作人员参加社会主义教育运动经费开支的补充规定”执行，给予适当补助。","type":"paragraph"},{"text":"三、凡由主管调配部门分配到各用人单位，继续实行劳动实习一年制度的1966年毕业生，其所有费用及开支办法，按财政部、高等教育部1964年10月6日（64）财文王字802号、（64）高学劳戴字165号“关于高等学校毕业生劳动实习期间有关经费开支问题的规定”执行。","type":"paragraph"},{"text":"四、毕业生前往工作单位报到的调遣费开支标准，按财政部、高等教育部1965年5月19日（65）财文行字253号、（65）高学调戴字231号“关于高等学校毕业生统一分配工作调遣费开支的补充通知”执行。但旅途生活费应按原定标准统一降低三分之一。","type":"paragraph"},{"text":" 1967年9月18日","type":"paragraph"}],"comments":[],"origin":"贵州省革命委员会毕业生工作领导小组办公室编印：《大中专毕业生分配工作文件选编》（内部文件、注意保存），1969年4月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15784dac03"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
