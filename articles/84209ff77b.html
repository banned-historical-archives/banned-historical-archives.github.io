ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"关于中央各部委干部参加劳动的批语","alias":"","parts":[{"type":"paragraph","text":"关于中央各部委干部参加劳动的批语！"},{"type":"paragraph","text":"（1958年6月15日）小平同志："},{"type":"paragraph","text":"这好像是一个彻底的办法。请你想一下，并和一些同志谈一下，有些党、政、军部委，或者多数部委，都仿农垦部做法，是否可以呢？三分之二下去，三分之一留家，下去四个月，似乎可以吧？究竟如何？请你酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十五日"},{"type":"paragraph","text":"[1]这个批语写在农垦部部长王震1958年6月13日给毛泽东、中央的报告上。报告说：“农垦部三分之二的干部已于五月底分赴密山、佳木斯等垦区参加劳动，一律下场四个月，进行现场整风，学习八大二次会议文件和帮助农场工作。我个人拟待十七日处理完下放任务后，也去密山、佳木斯垦区。”"},{"type":"paragraph","text":"[2]小平，即邓小平，当时任中共中央总书记、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":402,"page_end":402},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84209ff77b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
