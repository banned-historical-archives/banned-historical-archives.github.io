<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华北局向中央的报告关于解决国盐与土盐的矛盾和处理盐民生活问题的意见","authors":[],"dates":[{"year":1950,"month":6}],"is_range_date":false,"parts":[{"text":"华北局向中央的报告关于解决国盐与土盐的矛盾和处理盐民生活问题的意见","type":"title"},{"text":"（一）华北产土盐者一百二十余县，年产约二百万担，从业者约一百七十万人。而河北、平原两省盐区产量最大最多，其中一大部分群众长期依制盐为生。抗战以来，我党曾长期领导河北、平原两省广大盐民进行过反对国民党对土盐重税统制的斗争。抗战期间，为抵制日寇封锁，我们曾扶持和发展了土盐。在灾情严重地区，尤赖此为生。据保定专区十几个县的调查，土盐上市量高达百分之八十以上，芦盐上市量不足百分之二十。四月中旬，河北省及长芦盐务局，为贯彻盐务统管方针，保证盐税收入，奉政务院指示，在冀东、冀中、冀南、平原四个土盐区设立办事处，对熬制土盐采取了硬性限制办法，如：登记盐民，领发执照，限定产量和销量，不准逾产逾销，运销不得超过产地五十里，每户每次出售量不能超过十十斤，纳税百分之六十，领取盐票只限一日，并加强缉私工作。结果，明市减少，暗市增多，由白天活动转为夜晚活动。盐贩成群拒绝纳税，甚至用扁担抵抗缉私人员。昌黎五区人民拒绝区干部入境。滦南、乐亭等地盐民三五成群偷抢公盐，甚至有聚众骚动事件发生。盐民对我深感不满，认为和国民党的办法一样。","type":"paragraph"},{"text":"（二）各地土盐的发展，主要因为碱地未改良，不长庄稼，副业生产又无可干的；加之灾情严重，广大灾民只能靠熬土盐为生。次因芦盐与土盐价格悬殊太大。如清苑土盐每斤七百元至八百元，芦盐每斤二千元至二千二百元，相差两倍到三倍，故群众食土盐而不买芦盐。通县专区，去年一斤米换一斤四两盐，今年一斤十两米换一斤盐。保定战前粮盐比价一般是斗米斗盐，现在是一斗米换八斤盐。因而便造成了产盐区人民和食土盐的广大群众和政府、首先是和盐务局的尖锐对立。此种情况如不加以解决，将可能发生严重事件。","type":"paragraph"},{"text":"（三）我们认为盐务统管的方针是正确的，不如此不能保证国家盐税的收入与正当盐运商业的发展。但对土盐的管制与取缔，应当逐步实施。因此建议：（1）对盐民分别对待：对历史上有熬盐习惯地区和碱地一时不易改良、群众依制土盐为生的地区，应维持其生产，以免盐民失业、紊乱社会秩序和加大政府的救济任务；对生产救灾中新开的盐区，秋收后人民生活有了办法时再行取消；将熬盐当作副业生产者麦收后取消之。（2）政府要积极地为广大盐民想出更好的谋生之路。（3）划分芦盐与土盐市场，降低盐税，减低芦盐售价，逐渐缩小土盐市场。（4）严禁盐务工作人员、税收人员、缉私队等的强迫命令及违法乱纪法最行为。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f57cd278ee"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
