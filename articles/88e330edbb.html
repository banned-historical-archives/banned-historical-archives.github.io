ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"答普西北士绅问","alias":"","parts":[{"type":"paragraph","text":"答晋西北士绅问"},{"type":"paragraph","text":"（1942年7月9日）问：抗战何时能够胜利？"},{"type":"paragraph","text":"答：·...此次反侵略战争是世界历史上最大的战争，在欧洲战场，因为苏英美等国的亲密团结，今年可能打垮德国，在太平洋战场上，有中英美的团结，明年可望击溃日本。"},{"type":"paragraph","text":"问：抗战胜利后，国内团结问题如何？"},{"type":"paragraph","text":"答：·……….中国共产党，不仅在抗战中坚持团结抗日，在胜利之后，也是要坚持团结建国的。…..·以陕甘宁边区为例，人民普选的参议会，与三三制的民主政权，乃团结各个阶级共同抗日最好的政治形式，战后自然更须贯彻这种精神，团结各个阶级的人民，共同建设民主共和的新中国。"},{"type":"paragraph","text":"共产党只有与党外人士合作的义务，绝没有排挤别人的权利。"},{"type":"paragraph","text":"战后中国，必定是民主的中国，农工商学兵各界，都要继续团结，方能达此目的。"},{"type":"paragraph","text":"[1]晋西北士绅参观团是由兴县著名士绅牛友兰先生发起的。1942年牛友兰等一行16人组成参观团到延安进行参观，7月9日毛泽东会见参观团，毛泽东在延安和一位开明绅士交谈。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":7,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":102,"page_end":103},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88e330edbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
