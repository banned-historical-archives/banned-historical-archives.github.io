ear":1966,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:经过设计革命运动，设计人员中“三脱离”和迷信“本本”、受“框框”束缚的状况有了很大的改变。学习毛主席著作成风，下楼出院成风，调查研究成风。由于许多设计人员开始用毛泽东思想指导自己的设计工作，深入了实际，深入了现场，深入了工农，因而，设计工作中形而上学少了，从实际出发多了，出现了许多新气象。这里介绍的是设计人员用毛泽东思想指导设计工作的几个片断。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1670ec3420"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
