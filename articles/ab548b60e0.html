script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"清除思想上的资产阶级垃圾","authors":[],"dates":[{"year":1975,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一天下午，杨浦区清洁管理站里热气腾腾，老师傅们满腔热情地欢迎前来劳动锻炼的控江中学中二(9)班全体师生。不久，一辆辆垃圾车，整整齐齐地鱼贯出门。原来，控江中学中二(9)班的同学学习了伟大导师列宁的光辉著作《伟大的创举》后，决心到清洁管理站参加劳动，争当破除旧观念的尖兵。"},{"type":"paragraph","text":"红卫兵小包跟着师傅来到一只垃圾箱旁。她拿起扫帚，配合着师傅把箱内的垃圾装到车里。这时，走来了几个青年，只听到他们讲:“中学生扫垃圾，没出息。”小包听到后，脸上感到热辣辣的，紧握着扫把的手也松了下来……。她这一变化被师傅看到了，师傅笑着对她说:“不要小看这清洁工，它和建设社会主义关系可大呢!如果大家都不干这一行，想想这个城市将会变成什么样子?……”小包听着，频频点头，心里很不平静:“在破日立新的斗争中，作为一个红卫兵，怎么能在风言风语面前犹豫退缩呢?这不是自己头脑里资产阶级法权思想在作怪吗?”他决心好好向工人师傅学习。"},{"type":"paragraph","text":"不久天下起雨来。小包跟着师傅，推着车子来到自己家附近的垃圾箱边。听到小包推垃圾车，邻居们好奇地出来看，一些风言风语又一次吹进了小包的耳朵。小包想:“要扫清垃圾箱里的垃圾，得先清除自己头脑中的垃圾。”她紧握扫把，使劲扫着。地上湿了，垃圾粘住了地面，小包索性放下扫把，用手捧起来。"},{"type":"paragraph","text":"雨还在下着，可是中二(9)班的同学们个个精神抖擞，推着垃圾车昂首阔步地前进。"},{"type":"paragraph","text":"劳动后第二天，中二(9)班的同学们分成几个小小组，再次学习《伟大的创举》。小包和许多同学一样，用无产阶级专政的理论和这次参加劳动的切身体会，狠批林彪、孔老二的谬论，决心不断清除自己思想上的资产阶级垃圾，为共产主义而斗争。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab548b60e0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
