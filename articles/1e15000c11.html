ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"如平壤敌撤退则志愿军向三八线攻进","alias":"","parts":[{"type":"paragraph","text":"如平壤敌撤退则志愿军向三八线攻进"},{"type":"paragraph","text":"（1950年12月4日）彭、邓、朴、洪，并告高、贺，宋、陶："},{"type":"paragraph","text":"（一）平壤敌似正准备撤退。（二）请派出几个有力侦察队附电台迫近镇南浦、平壤、三登之线进行威力侦察，观察情况，并增加敌人恐慌。该敌现在一夕数惊，极为恐慌。（三）请指定人民军一个三千至五千人的师及党政人员位于接近平壤地点，准备于查明敌人确已撤退时进平壤维持秩序。（四）我志愿军休息五天后，如平壤敌未退则准备先打平壤附近之敌，然后包围平壤，研究攻城办法。如平敌已退，则向三八线攻进。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月四日十三时"},{"type":"paragraph","text":"[1]这是毛泽东给中国人民志愿军司令员兼政治委员彭德怀，副司令员兼副政治委员邓华、朴一禹，副司令员洪学智的电报。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":418,"page_end":418},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e15000c11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
