script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"揭露苏修剥削和奴役东欧国家","authors":[],"dates":[{"year":1976,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》发表文章"},{"type":"paragraph","text":"揭露苏修剥削和奴役东欧国家"},{"type":"paragraph","text":"坦桑报纸谴责苏联抢购粮食损害第三世界　新西兰报纸揭露苏美掠夺渔业资源"},{"type":"paragraph","text":"新华社地拉那一九七六年二月二十八日电　阿尔巴尼亚《人民之声报》二月二十八日发表署名文章，揭露苏联社会帝国主义对东欧国家进行新殖民主义剥削和奴役的罪行。"},{"type":"paragraph","text":"文章说，苏修利用一切方式和手段对东欧各国人民进行压迫和剥削，把东欧国家作为它的势力范围。苏联社会帝国主义为了攫取利润和掠夺更多的东西，把不平等的贸易关系强加于东欧各国。甚至破坏协定，提高向经互会其他成员国出口的原料价格，这是苏联社会帝国主义进行新殖民主义剥削的另一种方式。近十一年内，苏修通过提高石油、铁矿砂、焦煤、生铁和棉花等原料的价格，从它的东欧“庄园”榨取了四十二亿卢布的利润。"},{"type":"paragraph","text":"文章揭露说，东欧国家的数以万计的工人、专业人员和科学工作者正在苏联宗主国为社会帝国主义出卖劳动力，其中，仅保加利亚在西伯利亚森林里为苏修砍伐木材，或在中亚工地上干活的就有四万人。据苏联报刊透露，由经互会其他成员国在苏联国土上建设的工厂就有“几十座”。东欧国家为此不得不花费大量的物力、财力和劳力。"},{"type":"paragraph","text":"文章说，苏联社会帝国主义者为其掠夺东欧国家劳动力的行径百般辩解，还炮制了一系列“理论根据”，美其名为“劳动力的社会主义国际迁移”，说什么这是完全符合“每个国家的民族利益和个人利益”的。"},{"type":"paragraph","text":"文章说，苏联社会帝国主义这种做法是典型的新殖民主义奴役行为。它是压迫和剥削其他民族和人民的大俄罗斯沙文主义政策的产物。"},{"type":"paragraph","text":"新华社达累斯萨拉姆电　坦桑尼亚《星期日新闻》二月二十二日发表文章，谴责苏联在世界市场上大量抢购粮食，使第三世界国家受到严重影响。"},{"type":"paragraph","text":"文章指出，苏联一九七五年粮食产量为一亿三千七百万吨，比一九七二年的情景更坏。尽管苏联一九七五年已经在国外购买了二千五百万吨粮食，但它还必须再进口三千万吨来维持国内目前的粮食供应和牲口的需要。"},{"type":"paragraph","text":"文章说：“苏联正象一九七二年一样，再一次把它的收成危机向外输出。”一九七二年苏联粮食减产所造成的恶果，人们还记忆犹新。“早在外界还不知觉的时候，苏联当局知道它的粮食收成不会好，因此，就向世界市场进行突然袭击。”"},{"type":"paragraph","text":"文章指出，苏联悄悄地购买大批粮食，造成了一系列混乱和困难，使第三世界国家的粮价急剧上涨。文章说：“苏联一九七五年灾难性收成的影响，必将远远超出它本国的范围。”"},{"type":"paragraph","text":"新华社一九七六年三月二日讯　新西兰共产党机关刊物《人民之声》周报二月二十三日发表文章揭露，苏美两国正在加紧侵犯新西兰的捕鱼水域，洗劫新西兰的渔业资源。"},{"type":"paragraph","text":"这篇题为《帝国主义海盗频频侵犯新西兰捕鱼水域》的文章说：“帝国主义大国的海盗捕鱼队，包括颇有讽刺意味地飘扬着红旗的社会帝国主义的渔船对我国水域的加紧侵犯，正在加速洗劫我国的捕鱼区域。”文章说，美国也正在大肆捕捞新西兰水域里的金枪鱼。"},{"type":"paragraph","text":"据《人民之声》周报报道，惠灵顿拖网船员协会会长史蒂文斯说：“俄国人是海上恶霸。”他指出，苏联的工作船及其九艘拖网渔船的捕鱼量相当于九十艘新西兰捕鱼船正常情况下的捕鱼量。而更多的苏联渔船正在开来，这将使海上生态平衡受到不可弥补的损害，严重影响新西兰渔业工业的经济，破坏这个国家的捕鱼传统。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"132d927faa"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
