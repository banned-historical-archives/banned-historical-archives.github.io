:[{"year":1965,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希尔主席到北京"},{"type":"paragraph","text":"邓小平等同志到机场欢迎"},{"type":"paragraph","text":"新华社二十二日讯　澳大利亚共产党（马克思列宁主义者）主席爱·弗·希尔和他的夫人，应中国共产党中央委员会邀请来我国进行友好访问，于今天下午乘飞机到达北京。"},{"type":"paragraph","text":"到飞机场欢迎的，有中共中央总书记邓小平，中共中央委员刘宁一，中共中央候补委员赵毅敏，中共中央机关负责工作人员唐明照、俞志英、王文忠等。到飞机场欢迎的，还有正在北京的澳大利亚共产党（马克思列宁主义者）领导机构成员弗·罗素。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"希尔主席（右四）和夫人（左三）同前往欢迎的中共中央总书记邓小平等在机场合影。"},{"type":"paragraph","text":"新华社记者　刘庆瑞摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2782c268a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
