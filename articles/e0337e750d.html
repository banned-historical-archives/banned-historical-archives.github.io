是中国的内政。宣布邓副总理将于明年一月应邀访问美国。","authors":[],"dates":[{"year":1978,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十二月十六日电　中华人民共和国政府今天就中美两国建立外交关系发表一项声明，重申台湾是中国的一部分。解决台湾归回祖国、完成国家统一的方式，这完全是中国的内政。"},{"type":"paragraph","text":"声明宣布，邓小平副总理应美国政府邀请将于一九七九年一月份对美国进行正式访问。"},{"type":"paragraph","text":"声明全文如下:"},{"type":"paragraph","text":"中华人民共和国政府声明"},{"type":"paragraph","text":"中华人民共和国和美利坚合众国自一九七九年一月一日起互相承认并建立外交关系，从而结束了两国关系的长期不正常状态。这是中美两国关系中的历史性事件。"},{"type":"paragraph","text":"众所周知，中华人民共和国政府是中国的唯一合法政府，台湾是中国的一部分。台湾问题曾经是阻碍中美两国实现关系正常化的关键问题。根据上海公报的精神，经过中美双方的共同努力，现在这个问题在中美两国之间得到了解决，从而使中美两国人民热切期望的关系正常化得以实现。至于解决台湾归回祖国、完成国家统一的方式，这完全是中国的内政。"},{"type":"paragraph","text":"为促进中美两国人民的友谊和两国良好关系的进一步发展，应美国政府的邀请，中华人民共和国国务院副总理邓小平将于一九七九年一月份对美国进行正式访问。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\12\\78ch010401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中共中央主席、国务院总理华国锋十二月十六日上午举行中外记者招待会，宣布中美建交联合公报，并发表我国政府声明。"},{"type":"paragraph","text":"新华社记者钱嗣杰摄"},{"type":"paragraph","text":"(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0337e750d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
