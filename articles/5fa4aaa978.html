1,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"韩愈在《师说》中，提倡“不耻相师”，认为研究学问，必须谦虚好学，做到谁有学问，谁就是老师，就向谁学习。"},{"type":"paragraph","text":"“古之学者必有师”，古今中外，一切在事业上有成就的人，都具有这种“不耻相师”的谦虚精神。刘伯承同志曾在戎马倥偬中，翻译苏联红军卫国战争时期的作战经验，他说:“我在语文上拜了两位老师，中文请教邓小平同志，俄文请教左权同志。”还说:“找老师要看真心假心，假心找千里难寻，真心找眼前就是。”这种精神，当时曾受到部队干部的广泛赞扬。"},{"type":"paragraph","text":"“不耻相师”的精神之所以可贵，因为它是一种美德，只有那种浅陋无知，而又不懂装懂的人，才是真正可耻的。勇于“不耻相师”，就是坚持了对认识事物的实事求是的态度。因为，一个人的认识总是有限的，而人类的知识宝库却是无限的，要想在学识上不断有所长进，就离不开向别人请教。即使是在某种专业领域内有所研究的人，也免不了在其他专业方面处于无知或少知的状况；青年人阅历不广，知识不多，更需要虚心求教于人。"},{"type":"paragraph","text":"向一切有知识的人学习，不论对方的身份地位，也不分长辈幼辈，只要是“闻道在先”，或在某一方面比自己懂得多的，都应该向他学习，这是做学问的一条成功之道。我国有句古话:“入于泽而问牧童，入于水而问渔师。”这是说，凡是自己不懂的东西，要多向内行人请教，虚心向他们学习，恭恭敬敬地拜他们为老师。孔子曾说:“三人行，必有我师。”又说:“敏而好学，不耻下问。”我们应该发扬这种虚心好学，不耻相师的精神，为求得知识、增长本领而不倦地学习。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fa4aaa978"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
