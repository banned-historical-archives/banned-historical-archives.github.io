<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"是右派分子许京强扼杀了建筑系系会","authors":["张家璋","清华大学建9"],"dates":[{"year":1958,"month":1,"day":25}],"is_range_date":false,"parts":[{"text":"是右派分子许京强扼杀了建筑系系会","type":"title"},{"text":"清华大学建9张家璋","type":"authors"},{"text":"去年五六月间，右派分子许京强制造了一个建筑系系会集体辞职事件，向党猖狂地进攻。","type":"paragraph"},{"text":"5月29日许京强以建筑系系会主席的身份召开一系会核心会，提出三方面“意见”：①系会产生不民主，是由团总支内定；②总支包办学生会工作，要求系会工作独立；③要求扩大系会工作范围和职权，要求做思想工作和有关学习的工作。当晚召开全体干部会。会上有人提出“辞职”，许京强马上给以支持，决定先签名，后贴大字报辞职。会后由许等起草贴“辞职声明”。在该“声明”中，许京强极尽诬蔑团组织之能事，说系会是“徒具虚名而成为团总支的生活福利机构”，说团组织对学生会的领导是“包办代替”，若有其事地说系会的产生是不民主的，是“来路不明，问心有愧”，因此振振有词地提出要求“辞职”。","type":"paragraph"},{"text":"这一事件很快为其他右派分子利用起来，成为向党进攻的武器。庶民社转载了辞职声明，并要求其他系学生会辞职，同时也影响到北大，甚至影响到成都和哈尔滨等城市的高等学校。","type":"paragraph"},{"text":"许京强在他制造的系会“辞职”的事得逞以后，更狂妄企图要挟学生会全体辞职。为了达到这一卑鄙目的，他使用了两面派手法，未经建筑系其他三个学生会委员同意，就盗用集体名义，对学生会主席谭浩强施加压力，说什么“全系四个执委经过充分讨论，一致同意要求学生会辞职”，并提出紧急动议，要求立即召开学生会执委会，讨论全体学生会执委“辞职”问题。他这一瓦解党所领导的学生自己的革命组织的恶毒企图，在当时学生会主席的坚决反对下并未得逞。","type":"paragraph"},{"text":"许京强要挟学生会辞职是考虑的很周到的，是有目的有企图的。他说学生会执委“辞职”，第一可以发动群众；第二这会给党委施加很大压力；第三虽然可能为帝国主义利用，但影响也不大。又说什么“清华是高校的头，学生会辞职对全国影响很大，我们可以起带头作用”。","type":"paragraph"},{"text":"许京强还极力为其他右派分子呐喊助威。当冯国将在班上污蔑肃反成绩，说积极分子是“跟着喊的”，“是为了个人目的”时，许京强立即站起来说：“我就是跟着喊的，我头脑简单，党利用我们的信任，一声号召就冲出去了……。”并且向班内肃反被批判对象之一“道歉”。许京强不惜歪曲事实来为右派分子作证，使冯国将更加嚣张起来。在全校轰动一时所谓“黑名单”的问题上，许京强也用做过团支书的身分进行攻击，在班上说思想工作的分类方法是“造成对人固定的看法，老往坏处想，夸大别人的缺点。对这些同学分配工作和参加游园，都成了问题。在这工作中应当说明一些，不要不可告人”。许京强把自己打扮成知道“内情”，真正道出党内“黑暗”的角色，在当时大大迷惑了群众，也充分地暴露出了他反党反社会主义的坚决和阴险","type":"paragraph"},{"text":"许京强过去曾提出申请入党以一种积极的面目出现，但实际上，他的资产阶级投机、向上爬的思想严重，并且不愿改造，不能入党就对党不满，逐渐发展成仇视党。因此在整风的时候，他就猖狂向党攻击，想搞垮党，达到他个人目的，这是不可避免的必然的结果。","type":"paragraph"},{"text":" 来源：1958年1月25日《新清华》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41e4b4127c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
