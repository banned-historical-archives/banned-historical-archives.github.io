52,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5238020901.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e朱波　原文　钱予凡　改　杨锦文　编画"},{"type":"paragraph","text":"(二十一)还经常邀孙建国逛跳舞厅，吃女招待，想尽方法来奉承他。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5238020902.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二十二)在这种团团包围下，孙建国就帮助奸商做投机生意，临记洋行要孙出面把一百辆卡车卖给军委后勤部，共价一百十亿元，结果没有如期交货，被骗走廿六亿元，这次交易孙建国分了一亿五千万元的佣金。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5238020903.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二十三)另一次，奸商边裕民、高征等请孙建国当介绍人，卖给军委后勤部二十万条麻袋，孙分得佣金六千万元。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5238020904.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二十四)另外帮助天津新大、新中两建筑材料行和上海、广州的商人卖沥青给军委后勤部营房管理处，分着佣金二千五百万元。还帮助很多私商作违法勾当，国家财产因此受了很大损失。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e朱波,钱予凡,杨锦文\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3575b8831a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
