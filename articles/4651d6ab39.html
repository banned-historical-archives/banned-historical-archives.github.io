script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华国锋总理致电祝贺蒙博托再次当选扎伊尔总统","authors":[],"dates":[{"year":1977,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋总理致电祝贺蒙博托再次当选扎伊尔总统"},{"type":"paragraph","text":"新华社一九七七年十二月六日讯　中华人民共和国国务院总理华国锋十二月六日打电报给蒙博托，祝贺他再次当选为扎伊尔共和国总统。电报全文如下：金沙萨扎伊尔共和国总统蒙博托"},{"type":"paragraph","text":"·塞塞·塞科中将阁"},{"type":"paragraph","text":"下："},{"type":"paragraph","text":"在你再次当选为扎伊尔共和国总统的时候，我谨代表中国政府和人民，并以我个人的名义向你表示热烈的祝贺和良好的祝愿。"},{"type":"paragraph","text":"祝扎伊尔政府和人民在阁下领导下，在捍卫民族独立、国家主权和领土完整的斗争中，在发展民族经济和建设自己国家的事业中不断取得新的成就；并为非洲和第三世界团结反霸的斗争继续作出贡献。祝中、扎两国政府和人民之间的友好合作关系进一步发展。"},{"type":"paragraph","text":"中华人民共和国"},{"type":"paragraph","text":"国务院总理"},{"type":"paragraph","text":"华国锋"},{"type":"paragraph","text":"一九七七年十二月"},{"type":"paragraph","text":"六日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4651d6ab39"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
