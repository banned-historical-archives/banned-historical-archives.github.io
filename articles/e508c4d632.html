世界革命胜利地进行到底","authors":[],"dates":[{"year":1966,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十二日电　墨尔本消息:最近一期澳大利亚共产党(马克思列宁主义者)机关报《先锋报》发表文章，号召澳大利亚的共产主义者和进步人士认真学习毛泽东同志的三篇文章《为人民服务》、《纪念白求恩》、《愚公移山》和《毛主席语录》。"},{"type":"paragraph","text":"文章强调说，“老三篇”的“含意无穷，它们指明，一切立志成为真正的马克思列宁主义者和共产党人的人们，只有通过为人民服务和抛开一切自私的个人主义的实践才能够得到改造”。"},{"type":"paragraph","text":"文章把《毛主席语录》称为“具有巨大威力的红书”，并且强调说:“这些语录所体现的毛泽东思想，是当前帝国主义是向最后崩溃的时代的马克思列宁主义”。"},{"type":"paragraph","text":"文章赞扬说:“毛泽东著作的每一行都有着无穷的智慧；有着坚定的原则和坚决的斗争。对人民有着无限的信任，并且明确指出了人民战胜帝国主义剥削者的道路。不彻底学习毛泽东思想，就不能成功地打击当代的帝国主义和修正主义。”"},{"type":"paragraph","text":"文章最后说:“今天，毛泽东——我们时代的列宁——的思想正在成为全世界人民的财产。他们正在按照毛泽东思想行事，使美帝国主义为首的世界帝国主义和苏共领导集团为中心的现代修正主义遭受沉重失败。……全世界人民，按照毛泽东思想行事，定将把反对帝国主义的世界革命胜利地进行到底。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e508c4d632"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
