rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一连学习毛主席语录立竿见影施工中按照毛主席的话认识困难战胜困难","authors":["葛法均/袁良"],"parts":[{"type":"paragraph","text":"本报讯 某部一连在执行施工任务中，组织战士深入学习毛主席有关艰苦奋斗，战胜困难的语录，取得了立竿见影的效果。"},{"type":"paragraph","text":"年初，一连接受了施工任务。连队党支部针对时间紧迫，施工的各项准备工作不太充分，施工中会出现某些困难等情况，组织战士们学习了毛主席有关“承认困难，分析困难，向困难作斗争”的一段语录。他们首先本着毛主席“承认困难”和“宁肯把困难想得更多一些”的观点，把施工中存在的和可能出现的困难摆了出来。经过讨论，大家领会了毛主席这些话的实质：把困难摆出来，不是害怕困难；困难是事实，只有老老实实地承认它，才能认真地对待它。从而使人们进一步体会到毛主席实事求是的革命态度。"},{"type":"paragraph","text":"接着，领导上引导战士们分析了各种困难，进一步认识到承认困难和分析困难的目的，是为了向困难作斗争，认识到战胜困难的办法，就是要自己动手。于是，为了解决工具不足的困难，许多同志从附近的荒山野岭，找到了适合编筐用的树枝和树条。搓绳的材料难找，连长和指导员就深入访问老乡。听说积雪的北山坡上生长葛藤，连长便带着七名战士，到二十里路以外的山坡上去割。他们的鞋袜湿了，裤管破了也不在意，都说：“战胜困难就是胜利！”四班副班长赵振瑞，为了修好一个破风箱，满山沟里寻找鸡毛。就这样，他们自己动手，克服了施工中的不少困难，仅用十三天的时间，完成了一个月劈山修路五百米的任务。在他们的请求下，上级又分配给他们修路五百米的任务，又提前完成了。他们还主动支援了两个兄弟连队完成任务。一连这种艰苦奋斗战胜困难的精神，受到了上级和同志们的赞扬。"},{"type":"paragraph","text":"一连完成任务之后，党支部又组织大家回忆毛主席语录，加深认识。这样一来，战士们把毛主席“承认困难，分析困难，向困难作斗争……”的话刻在心里了。战士们说，毛主席关于战胜困难的话，在我的脑子里扎了根，一辈子也忘不了，任何时候遇到困难，都会用上边个法宝！              （葛法均、袁良）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cb7d60d32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
