art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"边疆战士心向毛主席","authors":["学习毛主席著作积极分子/某部军医蔡珍"],"parts":[{"type":"paragraph","text":"我们在巍峨的长白山，从收音机里听到了毛主席检阅文化革命大军的喜讯，听到了天安门广场上沸腾的欢呼声，我们兴奋得跳了起来。毛主席啊，毛主席！我们边疆战士白天盼，晚上盼，我们多么想见见您呀！今天，我们在银幕上见到了您老人家，我们的心激烈地跳动，幸福的热泪夺眶而出，千言万语也表达不了我们的高兴和激动。"},{"type":"paragraph","text":"银幕太小了，时间太短了，眼睛睁疼了，手掌拍疼了。我浑身都是热，浑身都是劲。当毛主席和群众握手的时候，我的手也伸了出去，好象我也在跟毛主席握手，手上感到热乎乎的。毛主席啊，毛主席！我真想跳上银幕去握一握您那温暖的大手，向您问好。作为您的一名战士，我是多么幸福啊！是您拯救了全中国人民，是您的光辉照亮了世界革命人民的心。您的恩情比天还大，比海还深。用长白山的青松当笔，用图们江的流水当墨，用宽阔的蓝天当纸，也表达不完我们对您的无限忠诚！"},{"type":"paragraph","text":"我们向您表决心：革命大旗我们扛，革命重担我们挑，革命火炬我们举。让革命的烈火烧得更旺，烧遍全中国，烧遍全世界，烧掉一切害人虫！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afeb8cfcb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
