<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"煤炭部党组抓住主要问题整改见成果　联系实际统一认识否定“文革”消除派性　解剖典型深入查处官僚主义和以权谋私","authors":[],"dates":[{"year":1984,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"煤炭部党组抓住主要问题整改见成果"},{"type":"paragraph","text":"联系实际统一认识否定“文革”消除派性"},{"type":"paragraph","text":"解剖典型深入查处官僚主义和以权谋私"},{"type":"paragraph","text":"据新华社北京8月30日电　煤炭部党组在整党对照检查的基础上，集中一段时间在部机关进行彻底否定“文革”、消除派性、增强党性的教育，接着又转入查处严重官僚主义和以权谋私问题的工作，都已取得明显的成效。"},{"type":"paragraph","text":"煤炭部在“文革”中是个重灾户，“文革”期间，形成了两派群众组织。他们从6月下旬开始，拿出一个多月的时间，集中进行彻底否定“文革”，消除派性，增强党性的教育。要求每个党员都要以《关于建国以来党的若干历史问题的决议》为准绳，总结自己在“文革”中的主要教训。凡是已经对照检查过的，要在这个教育活动中，主动补课；凡是尚未对照检查的，要把这个内容加上。消除派性，关键在于能不能联系实际。他们抓住一位老同志被迫害致死没有彻底平反昭雪的典型案件，和一位司局级干部坚持派性立场的错误事实，教育大家，打开了局面。接着，他们又让七名认识较好的同志作了典型发言，把这一教育引向深入。经过批评教育，那个司局级干部对自己的错误已有了认识，作了初步检查，表示愿意改正。"},{"type":"paragraph","text":"通过开展彻底否定“文革”，消除派性的教育，广大党员的思想认识有了很大提高，增强了机关内部的团结。广大党员联系个人在“文革”中的经历、表现，清理了“左”的影响，总结了经验教训，进行了自我批评。这次教育也推动了核查“三种人”工作的开展。"},{"type":"paragraph","text":"煤炭部党组从8月13日开始，集中一个月时间，深入查处造成国家经济上、政治上重大损失的严重官僚主义和利用职权谋取私利的问题。他们明确提出，这次揭摆的重点，一是本单位的严重官僚主义和以权谋私的问题；二是领导的官僚主义和以权谋私的问题。要把本单位误大事，使工作蒙受重大影响、经济上造成重大损失的严重官僚主义和以权谋私的问题，一件一件地摆出来。煤炭部目前已揭露出一批严重的官僚主义事件和以权谋私问题。办公厅信访处干部赵玉华，利用接待上访之机，乘人之危，奸污妇女，索要贿赂。现已决定开除赵玉华的党籍，并将提交司法部门依法加以惩处。信访处原来的一名处长和一名副处长，对赵玉华的问题，既不向上反映，又不作处理，本人也有其他问题，也受到了撤销领导职务的处分。对于信访处所发生的问题，办公厅领导上存在着严重的官僚主义。部里已责令办公厅领导干部作深刻检查。地质局供应处材料组组长王为，利用管物资供应工作之便，违反国家统配物资管理规定，弄虚作假，监守自盗，骗取国家统配煤炭一万三千多吨、钢材二百二十多吨转手倒卖，给国家造成严重经济损失，已查实接受贿赂六百多元。王为已被开除党籍，行政开除留用。地质局领导在王为问题上存在着严重的官僚主义错误，已责令他们作出检查。部直属大屯煤电公司徐沛铁路管理处助理工程师郝玉庆，利用工作之便，贪污公款四万六千多元。此案与领导的官僚主义和不正之风有直接关系，仅铁路管理处就涉及科、处级干部十二人。郝玉庆已被法院判处有期徒刑十五年。原综合利用局主要领导干部，在安排项目、使用资金上不调查，不研究，乱上项目，敞开口花钱，造成损失浪费五百三十八万元，部党组已成立调查组，对这个问题进行查处。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c98ccaa7eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
