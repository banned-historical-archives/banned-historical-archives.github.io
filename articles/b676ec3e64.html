":[{"year":1964,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京3日电】　中国共产党代表团和罗马尼亚工人党中央委员会代表团今天下午举行会谈。"},{"type":"paragraph","text":"中国方面参加会谈的有，中国共产党代表团团长、中共中央副主席刘少奇，代表团团员:中共中央总书记邓小平，政治局委员彭真，政治局候补委员康生。"},{"type":"paragraph","text":"罗马尼亚方面参加会谈的有，罗马尼亚工人党中央委员会代表团团长、罗马尼亚工人党中央委员会政治局委员扬·格·毛雷尔，代表团团员:罗马尼亚工人党中央委员会政治局委员埃·波德纳拉希、尼·齐奥塞斯库和基伏·斯托伊卡。"},{"type":"paragraph","text":"会谈在友好的气氛中进行。"},{"type":"paragraph","text":"【新华社北京3日电】　中国共产党中央委员会今晚举行宴会，热烈欢迎由罗马尼亚工人党中央委员会政治局委员扬·格·毛雷尔率领的罗马尼亚工人党中央委员会代表团。"},{"type":"paragraph","text":"中共中央副主席刘少奇，中央总书记邓小平出席了宴会。"},{"type":"paragraph","text":"出席宴会的罗马尼亚工人党中央委员会代表团团员，有罗马尼亚工人党中央委员会政治局委员埃·波德纳拉希、尼·齐奥塞斯库和基伏·斯托伊卡。代表团的全体工作人员，罗马尼亚驻中国大使杜米特鲁·乔治乌，也应邀出席了宴会。"},{"type":"paragraph","text":"在宴会上，宾主为中罗两党和两国的友好团结，为毛泽东同志和乔治乌-德治同志的健康干杯。"},{"type":"paragraph","text":"出席宴会的还有，中共中央政治局委员彭真、李富春，政治局候补委员陆定一、康生、薄一波，中央书记处书记罗瑞卿，中央书记处候补书记杨尚昆，中央委员廖承志、林枫、萧劲光、叶剑英、伍修权、王从吾，中央候补委员徐冰、赵毅敏。"},{"type":"paragraph","text":"出席宴会的还有各方面的负责人周荣鑫、夏衍、张致祥、张子意、冯铉、龚子荣、吴冷西、许立群、姚溱、陆平、马纯古等。中共北京市委书记处书记万里、冯基平也出席了宴会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b676ec3e64"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
