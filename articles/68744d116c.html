ors":["新华社"],"dates":[{"year":1957,"month":6,"day":15}],"is_range_date":false,"parts":[{"text":"民盟上海地方组织要求民盟中央表明态度","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社上海１５日电:民盟上海市委员会在今天举行的扩大会议上，通过一项谴责章伯钧、罗隆基等反社会主义的言论的决议。决议中说：“我们一致谴责盟中央部分领导人章伯钧、罗隆基等同志的荒谬言论，要求他们将盟组织进行认真的检查，并要求盟中央对章伯钧、罗隆基等同志的错误言论，明确表明态度。”决议中说：扩大会议的参加者一致认为民盟上海市副主任委员陈仁炳“一贯有对抗共产党的情绪和言行，在最近鸣放时期表现尤为突出，陈仁炳应该彻底认识自己所犯错误的严重性，认真进行深刻的检查。”","type":"paragraph"},{"text":"决议还号召上海市的全体民盟盟员，坚决与反对共产党反对社会主义的右派思想划清界限，坚决拥护党的领导，同一切反党反社会主义言论进行不调和的斗争。","type":"paragraph"},{"text":" ——原载《人民日报》1957年6月16日，原标题为“民盟北京上海等地方组织要求民盟中央表明态度，跟共产党走，还是跟章伯钧罗隆基走？民盟上海市委扩大会议  通过谴责章罗决议”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68744d116c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
