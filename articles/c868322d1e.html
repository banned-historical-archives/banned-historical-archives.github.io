rs":[],"dates":[{"year":1967,"month":10,"day":2}],"is_range_date":false,"parts":[{"text":"周总理、陈伯达同志关于厦门问题的指示","type":"title"},{"text":"厦门军管会并转促联、革联两派群众组织并告厦门调查组：","type":"appellation"},{"text":"据说由于厦门港和港务局分两派，无人检查入港英商船，致英国商船无法靠岸，而该船有3病号，吃喝均成问题，这种违反国法影响祖国信誉的行动是极端错误的，是绝对不能容忍的，望军管会、调查组接此电话后，立即向两派组织号召，对外的业务必须采取联合行动。如有那一派响应中央、主席的号召并见于行动，中央将通报表扬。如拒不执行，中央给于揭露，并命令军管会采取必要的措施，保护海港检查、靠岸装卸，那一派破坏这一行动，军管会应按6·6通令惩处该派的主使人和肇事头头。","type":"paragraph"},{"text":" 周恩来　陈伯达1967年10月2日3时","type":"paragraph"}],"comments":[],"origin":"福建省厦门革命到底联合总司令部八·二九厦门大学红卫兵独立团《挺进》编委会编《中央（首长）对厦门文化大革命问题的指示汇编》1969年4月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c868322d1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
