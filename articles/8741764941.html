的未来  日本朋友说文化大革命定会对全世界产生重大影响","authors":[],"dates":[{"year":1967,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"柬中友协副主席说中国无产阶级文化大革命必将取得彻底胜利"},{"type":"paragraph","text":"中国人民面前展现着光辉灿烂的未来"},{"type":"paragraph","text":"日本朋友说文化大革命定会对全世界产生重大影响"},{"type":"paragraph","text":"据新华社金边电　柬埔寨—中国友好协会副主席符宁不久前在柬埔寨《新电讯报》上发表文章，驳斥外国通讯社对中国无产阶级文化大革命的诽谤，并且指出，“毫无疑问，所有这些国外的谎言、特别是对中国及其伟大舵手毛泽东主席的猛烈攻击，更加证实了中国的事态发展对于中国人民和中国的社会主义革命都是极其有利的。中国人民完全有理由相信他们主席的这句话：‘凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对。’”"},{"type":"paragraph","text":"文章说：“中国的无产阶级文化大革命同十月革命的经验一样，是人类历史上没有先例的经验。”"},{"type":"paragraph","text":"文章说，中国无产阶级在他们伟大领袖的科学思想的指引下，联合所有革命同盟军展开目前这场文化大革命，“这只会加强无产阶级在中国的政权，并使无产阶级能够取得新的、辉煌的胜利。中国人民面前展现着光辉灿烂的未来。”"},{"type":"paragraph","text":"文章最后说：未来将告诉我们，这些话会得到科学的证实。尽管有人造谣、攻击和诬蔑，尽管有人破坏中国人民同其他国家人民的友谊，中国是永远不会后退的，中国正沿着社会主义的道路一往直前。"},{"type":"paragraph","text":"据新华社讯　据东方通讯社报道：日本国际贸易促进协会友好贸易访华代表团团长川濑一贯不久前在东京向新闻界发表谈话，热烈赞扬由毛主席亲自发动和领导的中国无产阶级文化大革命。"},{"type":"paragraph","text":"川濑说：用伟大的毛泽东思想武装起来的七亿中国人民，遵循毛主席的“抓革命，促生产”的指示，勤奋地战斗着，使工农业生产在无产阶级文化大革命中有了非常好的发展。"},{"type":"paragraph","text":"日本关西国际贸易促进协会专务理事木村一三发表谈话指出：无产阶级文化大革命已经取得了伟大的决定性的胜利。这将使中国的社会主义建设以震惊全世界的规模和速度向前发展，它肯定会对世界局势产生极其重大的影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8741764941"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
