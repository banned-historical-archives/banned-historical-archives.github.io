],"dates":[{"year":1966,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为祖国和毛主席站岗"},{"type":"paragraph","text":"——守卫在东海前线的一支英雄艇队"},{"type":"paragraph","text":"新海"},{"type":"paragraph","text":"有了毛泽东思想，"},{"type":"paragraph","text":"手中的刺刀永远闪红光；"},{"type":"paragraph","text":"有了毛泽东思想，"},{"type":"paragraph","text":"牛鬼蛇神休想兴风作浪！"},{"type":"paragraph","text":"这是参加过崇武海战的艇队指战员的豪言壮语。它体现了我军永远是个战斗队的光辉思想，表达了他们捍卫伟大的社会主义祖国、捍卫无产阶级文化大革命的坚强决心，也表达了他们对战无不胜的毛泽东思想的无限热爱。"},{"type":"paragraph","text":"这支英雄的艇队面对着敌占岛屿，长年和美蒋匪特的窜犯活动作斗争。这支艇队有时在雾海突然出现，有时在暗夜通宵巡行；有时迅猛地插到敌岛鼻子底下；有时潜藏在小岛背后，在渔民和民兵的配合下，出其不意地消灭破坏渔场的敌人。"},{"type":"paragraph","text":"战士们说得好：“汹涌的大海有平静的时候，在阶级社会里，阶级斗争却永远不会停息。”他们从自己的丰富的战斗生活中，深刻地领会了毛主席关于阶级和阶级斗争的伟大教导。他们越学越心明眼亮，斗志昂扬。这支艇队的许多艇只都有千次以上的巡逻、出击纪录，大多数同志都荣立过战功，一些中队和不少艇只都荣立过集体功，有的艇还被评为全海军的标兵。在他们的驾驶台上，常常可以看到新增添的标志着海战胜利的鲜红耀眼的五角星。"},{"type":"paragraph","text":"战士们对党和祖国的无限忠诚，突出地表现在坚决执行毛主席的教导：“对敌人要狠，要压倒它，要消灭它”。一个深夜，突然接到指挥部命令：某海区发现可疑目标。艇队立即像猛虎下山似地冲出海港，直扑目标。海面上一片漆黑，只有浪花隐隐闪光，可是，锻炼出一双千里眼的前主炮班长立即发现了几百米外有个状似礁石的黑点。对海区了如指掌的艇长立即断定：这里没有礁石，一定是敌人，准备战斗！指挥员的命令一下达，战艇飞速地切断了美蒋特务的退路，第一组炮弹就命中目标，再一组短点射，就把敌船打得粉身碎骨！"},{"type":"paragraph","text":"“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑”。指战员遵照毛主席的教导，百倍地提高警惕，坚守岗位。为了不失去一次战斗时机，他们一年三百六十五天，白天上岸不离舰艇一百米；夜晚，许多人和衣而睡，守着机器，只要一声令下，就立即启动去打击敌人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88317a5cea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
