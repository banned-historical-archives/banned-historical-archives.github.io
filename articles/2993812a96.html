ates":[{"year":1975,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大领袖毛主席亲笔题字的《西藏自治区画集》出版发行"},{"type":"paragraph","text":"新华社拉萨一九七五年九月六日电 我国各族人民的伟大领袖毛主席在一九六五年亲笔题字的《西藏自治区画集》，在党中央的亲切关怀下，在西藏自治区成立十周年前夕已经正式出版发行，受到广大工农兵群众的热烈欢迎。"},{"type":"paragraph","text":"这部大型精美画集，还刊登了毛主席对西藏工作的四次亲笔题词，毛主席及其他中央领导同志接见西藏各界代表的照片。画集共有二百多幅摄影作品，内容丰富多采，生动地记录了二十五年来西藏人民在毛主席、党中央的英明领导下，奋起摧毁封建农奴制度，跨越几个世纪进入社会主义的伟大历史进程。其中有筑路进军及和平解放西藏、平息达赖武装叛乱、开展民主改革、进行自卫反击战等重大历史事件的珍贵照片。"},{"type":"paragraph","text":"西藏人民看到这部画集，受到极大鼓舞，认为这是伟大领袖毛主席对西藏百万翻身农奴的巨大关怀。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2993812a96"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
