<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"人民来信反映甘肃和政县胭脂公社马集队粮食不够吃","authors":["甘肃和政县胭脂人民公社马集大队","郭万林"],"dates":[{"year":1959}],"is_range_date":false,"parts":[{"text":"人民来信反映甘肃和政县胭脂公社马集队粮食不够吃","type":"title"},{"text":"甘肃和政县胭脂人民公社马集大队郭万林","type":"authors"},{"text":"敬爱的毛主席、朱总司令、刘少奇副主席、周恩来外长：","type":"appellation"},{"text":"你们四位领袖同志，近来身体健康、工作忙学习好吗，你们为人民事业有积（极）大的贡献，给人民取得了幸福。","type":"paragraph"},{"text":"关于农村有不平凡的事件向你们谈一下，农业生产方面地方干部死吹牛，不讲实际据以往地里出不了那么多粮食，硬往高订产量，统购粮，弄的社员一天4两粮食能吃饱肚子吗，还是能劳动呢，食堂门关下还要不来粮食，大队干部还说发动社员到个人家里吃，私人粮食早就发动买光了，把面都卦给食堂了。社员们都说知道这样情况的话粮食该不买（卖）多好，现在国家又不供应，麸子都吃光了，不要说干活连路都走不动，有钱也买不到粮食。","type":"paragraph"},{"text":"再把解放前一垧最好的地才打4斗多粮食，一斗粮食150斤，一垧地2亩半最多超不过700斤，59年一亩要订1000斤以上，虽然现在新造（操）作技术也增产不了那么多，就是再好也要把社员口粮留够，因此上社员愿（怨）言很多，他们说现在不如18年，所以引起社员对社干不满，说共产党不编█（谎）迟（尽）编█（谎），地里出不了那多粮食硬说出下呢，现在没面吃再也不见干部的面了。社员们都说一天喝三顿菜汤，这些情况毛主席可能不知道，58年又不是受害年，苦下那么多粮食叫人饿肚子，还说是丰收。","type":"paragraph"},{"text":"家畜方面社员有自留地有粮食是汉民家家有猪，回民有羊，生活也能改善也有衣穿，同事能积很多肥料，对生产有须（许）多好处，现在发动养猪、羊就连个鸡都没办法养了，这样及（既）减少社员收入，积肥生产怎能丰收，生活怎能改善，党在口号提出要社员在节约的原则下不浪费要吃饱吃好，现在是否实现计划呢，也可以检讨一下，现在给生产小队长造成极大的困难，上级强调工作不起劲，下面去社员说肚子饿的干不动，那把那么多的粮食弄到哪里去了，再说的好，社员肚子吃不饱也是往（枉）然。","type":"paragraph"},{"text":"饲养问题，饲料留的不足1个牛1天 斤，本队牛苦下的不让本队的牛吃，乱搞由公社付业车拉到兰州买（卖）大价，结果因没种完饲料早完了，死亡生（牲）畜很多，自把饲养员收拾的一股劲实在没法可办。","type":"paragraph"},{"text":"敬爱的四位领袖，这些意见都是实实在在的及时要答负（复）和（研）究处理，不然明年一定有饿死人的现象呢。这都我向党说的老实话，如不信请你们祥（详）细调查。","type":"paragraph"},{"text":"再见","type":"paragraph"},{"text":"祝","type":"paragraph"},{"text":"你们各位领袖同志健康工作顺利。","type":"appellation"},{"text":" 甘肃和政县胭脂人民公社马集大队  郭万林","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80e7f05d11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
