r":1967,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《红旗》杂志发表了《毛泽东思想是办好新\u0026lt;文汇报\u0026gt;的灵魂》一文，并加了编者按。这是对我们最大的鞭策，最大的督促。本报全体革命同志一千遍、一万遍地热烈欢呼:我们最最敬爱的伟大领袖毛主席万岁!万万岁!"},{"type":"paragraph","text":"《文汇报》在伟大的“一月革命”中获得了新生后，我们最最敬爱的伟大领袖毛主席给了新《文汇报》以最大的关怀和支持，这也是对全上海无产阶级革命派的最大关怀和支持。《文汇报》能冲破资产阶级反动路线的重重阻力“杀”出来，靠的是毛泽东思想；《文汇报》新生后，能为无产阶级革命派做一点工作，靠的也是毛泽东思想。通过这段时间的斗争实践，我们越来越深刻地认识到:毛泽东思想是新《文汇报》的灵魂，是新《文汇报》的命根子。我们的任何一点成绩，都归功于我们心中最红最红的红太阳毛主席，归功于光焰无际的毛泽东思想。"},{"type":"paragraph","text":"无产阶级革命派是新《文汇报》的坚强后盾。报纸上要宣传什么，反对什么，有什么先进的典型经验需要介绍推广，革命派的战友们满腔热情地给我们出主意，提建议，写稿件。在报社受到某些人冲击、围攻的日子里，革命派的战友给了我们很大的支持和鼓励。我们在斗争中结下了深厚的战斗友谊。我们一定和战友们继续团结在一起，战斗在一起，胜利在一起!"},{"type":"paragraph","text":"新生的《文汇报》是两条路线斗争胜利的产物，是随着毛主席的革命路线的胜利而前进的。只有在以毛主席为首的无产阶级司令部的领导下，在上海市革命委员会的领导下，新《文汇报》才能在斗争中贡献她的力量。"},{"type":"paragraph","text":"我们深深感到，根据当前的斗争形势来看，我们做的工作还很不够；离开毛主席和党中央对我们的期望，还有很大的差距；在我们的工作中，还有这样那样的缺点和错误，需要广大无产阶级革命派同志和革命群众的批评和帮助。毛主席教导我们:“因为我们是为人民服务的，所以，我们如果有缺点，就不怕别人批评指出。不管是什么人，谁向我们指出都行。只要你说得对，我们就改正。你说的办法对人民有好处，我们就照你的办。”我们一定坚决、彻底、不折不扣地实行这条最高指示。"},{"type":"paragraph","text":"前一阶段，我们在毛主席的亲切关怀下，在无产阶级革命派的大力支持下，做了一些工作。但是，斗争的路程还很长很长，在我们前进的道路上，还有许多艰难险阻、礁石暗滩。但是，有了毛泽东思想，我们就能踏平难关，继续前进。"},{"type":"paragraph","text":"我们一定要永远忠于毛主席，永远忠于毛泽东思想，永远忠于以毛主席为代表的无产阶级革命路线；坚决一边倒，倒向无产阶级革命派一边，为新生事物鸣锣开道，为无产阶级革命派大喊大叫。"},{"type":"paragraph","text":"我们一定要牢牢记住毛主席“虚心使人进步，骄傲使人落后”，“我们应该谦虚，谨慎，戒骄，戒躁”的教导，在工作中突出政治，把活学活用毛主席著作放在一切工作的首位，横扫脑子里的“私”字，加速实现思想革命化，把新《文汇报》办成毛泽东思想的大学校。"},{"type":"paragraph","text":"我们永远紧跟毛主席在大风大浪中奋勇前进!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"137847aab9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
