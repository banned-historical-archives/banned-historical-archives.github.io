rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在新的岗位上争取更大的光荣吉林转业复员军人向彭德怀元帅表示决心","authors":[],"parts":[{"type":"paragraph","text":"本报讯 年前，吉林省转业复员军人代表会议的三百多名代表，接受全省转业复员军人的委托，给彭德怀元帅写了一封信，表示决心在建设社会主义的光荣岗位上，勤勤恳恳地劳动，兢兢业业地工作，在劳动战线上，为祖国作出新的贡献，为自己争取更大的光荣。"},{"type":"paragraph","text":"代表们在这封信里说：我们从部队里转业复员，不过是从一个光荣岗位转到另一个光荣岗位，从一个战线转到另一个战线。过去，我们在革命战争中执行光荣的战斗任务时，从来没有辜负党的期望；现在，我们在伟大的社会主义建设事业中执行新的光荣任务时，也决不辜负党的期望。"},{"type":"paragraph","text":"代表们在信里向彭德怀元帅保证，积极参加国防建设事业，传播人民解放军的光荣传统，成为民兵中的骨干分子。时刻保持高度的革命警惕性，同一切残余的反革命分子和企图破坏社会主义事业的违法犯罪分子进行不懈的斗争；并且随时准备响应祖国的召唤，重新拿起武器返回前线，保卫祖国。任何时候都牢牢地记住毛主席的教导，不居功、不骄傲，谦虚谨慎，艰苦朴素，遵守党的政策和政府法令，密切联系群众，勤俭办社、勤俭持家。"},{"type":"paragraph","text":"代表们请彭德怀元帅相信，尽管在社会主义建设道路上还有许多困难，但是他们会拿出同国内外阶级敌人战斗的精神去战胜它。代表们说：曾经在革命战争中亲手把胜利的旗帜插上敌人堡垒的革命战士，也一定能把社会主义红旗插上胜利的最高峰。"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af281740be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
