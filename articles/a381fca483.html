ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"中央转发华南分局关于军队干部参加地方领导工作的意见的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发华南分局关于军队干部参加地方领导工作的意见的批语"},{"type":"paragraph","text":"（1951年3月22日）华南分局，中南局，并告华东局，西南局，西北局："},{"type":"paragraph","text":"（一）华南分局三月十五日电报\"中所述的决定，我们认为是正确的，请中南军区对在粤各军发出指示，在指示中应指出军队干部必须和本地干部发生正确的关系，好好地帮助他们而不要看不起他们，这点极为重要。分局应召集有军队和地方两方干部在一起的会议，明确地指示任务和双方发生正确关系的重要性。（二）广东这种办法，请其他中央局考虑，是否在某些干部弱工作难于开展的地方，有采用广东办法的必要。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"三月廿二日"},{"type":"paragraph","text":"[1]指中共中央华南分局1951年3月15日关于军队干部参加地方领导工作的意见给中央并中南局、中南军区的电报。电报说，为加强地方工作的领导，在不变更现行区域及不太多牵动干部的情况下，决定成立粤东、粤西两区党委和三级军区。军队经营地方的实施方法，采取军队就地兼任与军队调出干部参加地方工作两种。各野战军除就地参加兼任地方工作外，另决定每军调出干部500名至700名专任地方工作。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":179,"page_end":179},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发华南分局关于军队干部参加地方领导工作的意见的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":22}],"is_range_date":false,"parts":[{"text":"中央转发华南分局关于军队干部参加地方领导工作的意见的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"华南分局，中南局，并告华东局，西南局，西北局：","type":"appellation"},{"text":"（一）华南分局三月十五日电报中所述的决定，我们认为是正确的，请中南军区对在粤各军发出指示，在指示中应指出军队干部必须和本地干部发生正确的关系，好好地帮助他们而不要看不起他们，这点极为重要。分局应召集有军队和地方两方干部在一起的会议，明确地指示任务和双方发生正确关系的重要性。（二）广东这种办法，请其他中央局考虑，是否在某些干部弱工作难于开展的地方，有采用广东办法的必要。","type":"paragraph"},{"text":" 中  央三月廿二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a381fca483"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body><
