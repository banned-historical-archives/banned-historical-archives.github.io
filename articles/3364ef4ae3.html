torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"为出版《长征记》征稿","alias":"","parts":[{"type":"paragraph","text":"为出版《长征记》征稿！"},{"type":"paragraph","text":"（1936年8月5日）"},{"type":"paragraph","text":"现有极好机会，在全国和外国举行扩大红军影响的宣传，募捐抗日经费，必须出版关于长征记载。为此，特发起编制一部集体作品。望各首长并动员与组织师团干部，就自己在长征中所经历的战斗、民情风俗、奇闻轶事，写成许多片断，于九月五日以前汇交总政治部。事关重要，切勿忽视。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"现因进行国际宣传，及在国内国外进行大规模的募捐运动，需要出版《长征记》，所以特发起集体创作，各人就自己所经历的战斗、行军、地方及部队工作，择其精彩有趣的写上若干片断。文字只求清通达意，不求钻研深奥，写上一段即是为红军作了募捐宣传，为红军扩大了国际影响。来稿请于九月五日以前寄到总政治部。备有薄酬，聊志谢意。"},{"type":"paragraph","text":"[1]这是毛泽东和杨尚昆为出版《长征记》征稿，发给各部队的电报和给参加长征同志的信。《长征记》后来在延安出版。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":40,"page_end":40},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3364ef4ae3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
