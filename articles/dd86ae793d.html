"year":1949,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一个外国记者(11月13日1版更正为“一个外国人”)，毫无利己的动机，把中国人民的解放事业，当作他自己的事业，这是什么精神?这是国际主义的精神，这是共产主义的精神，中国共产党员，每一个都要学习他这种精神。"},{"type":"paragraph","text":"从前线回来的人说到白求恩，没有一个不佩服的。晋冀察一带的军民，凡亲身受过白求恩医生治疗及亲眼看见过白求恩医生的工作的，无不为之感动。"},{"type":"paragraph","text":"我们大家要学习他毫无自私自利之心的精神，从这点出发，就可变为大有利于人民的人。一个人能力有大小，但只要有这种精神，就是一个高尚的人，一个纯粹的人，一个有道德的人。　毛泽东:学习白求恩"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd86ae793d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
