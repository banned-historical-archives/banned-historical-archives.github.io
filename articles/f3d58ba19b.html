art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的三大志愿","authors":[],"parts":[{"type":"paragraph","text":"1961年8月在庐山，毛主席和保卫人员聊天时，谈到他的三大志愿：一是要下放去搞一年工业，搞一年农业，搞半年商业，以便多调查研究，了解情况，不当官僚主义，对全国干部也是一个推动。二是要骑马到黄河、长江两岸进行实地考察；因为对地质方面缺少知识，所以要请一位地质学家、一位历史学家和一位文学家一起去。三是最后写一部书，把自己的一生写进去，把缺点、错误统统写进去，让世界人民去评论自己是好人还是坏人。毛主席还说：我这个人啊，好处占70％，坏处占30％，就很满足了。我不隐瞒自己的观点，我不是圣人。"},{"type":"paragraph","text":"《摘自《回忆毛泽东同志》一书）"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3d58ba19b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
