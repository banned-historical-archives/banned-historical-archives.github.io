dates":[{"year":1952,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"自然科学工作者应展开关于资产阶级观点的批判"},{"type":"paragraph","text":"编辑同志：最近我读了“米丘林生物学的基本原理”一书以后，认识到自己是一个很顽固的孟德耳主义者。当我读到米丘林学说对孟德耳遗传学说的批判时，不禁满身发热。因为我在一九五○年教书的时候，还向学生们传播反动的孟德耳学说。这对青年学生的危害是很大的。"},{"type":"paragraph","text":"据我所知，有不少研究自然科学的人，到现在还根本没有学习米丘林生物学，很多人即使听到了一些，也没有予以应有的注意。他们和我一样，错误地以为自然科学工作者不经过改造，一样可以为人民服务。现在我才明白，自然科学工作者必须进行思想改造，并对自然科学中的许多错误的学说，加以认真的批判。只有这样，自然科学工作者才能更好地为祖国的经济建设服务。　姜忠仁"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e57d85be94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
