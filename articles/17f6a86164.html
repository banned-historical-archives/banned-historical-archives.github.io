script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批倒资产阶级“权威”　打破夏季生产旧规  湖南橡胶厂胶鞋质量上升","authors":[],"dates":[{"year":1966,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批倒资产阶级“权威”　打破夏季生产旧规"},{"type":"paragraph","text":"湖南橡胶厂胶鞋质量上升"},{"type":"paragraph","text":"据新华社长沙十八日电　湖南橡胶厂革命职工用毛泽东思想批倒资产阶级技术“权威”，打破历年夏季胶鞋产量不正常、质量不稳定的旧规，从七月到现在，九个品种的胶鞋日产量和一等品率都稳步上升。九月上旬，长统球鞋等四个品种的一等品率，达到百分之九十八以上。"},{"type":"paragraph","text":"湖南橡胶厂主要产品之一的布面胶鞋，在每年夏季生产中都有胶与布粘合不好的现象（即附着力下降）。有些资产阶级技术“权威”，说这是天气炎热的关系，是无法改变的自然“规律”。当工人们带着这个问题活学活用毛主席著作时，资产阶级的技术“权威”们说：毛主席著作里面，没有橡胶制品的“配方”；说质量问题是工人偷工减料造成的。"},{"type":"paragraph","text":"资产阶级技术“权威”们这种谰言，激起了全厂革命职工无比的愤怒。他们连夜写大字报揭发批判资产阶级技术“权威”的反动思想和行为，更加努力地活学活用毛主席著作。职工们学习了毛主席教导的“人民群众有无限的创造力。他们可以组织起来，向一切可以发挥自己力量的地方和部门进军，向生产的深度和广度进军，……”一段话，明确了方向，坚定了斗争的决心和信心。他们成立了“破关”小组，找到了附着力在夏季不稳定的主要原因。他们又对胶浆反复作了不同配方和不同稀浓度的试验，终于找出了最适当的浓度。试验结果，附着力从原来的二点三公斤逐步提高到三点三公斤以上。从七月份开始，这种新胶浆已经在全厂推广使用。两个多月来，各种布面胶鞋的附着力都超过国家规定的标准。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17f6a86164"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
