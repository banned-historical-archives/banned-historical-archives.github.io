torical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"关于发动反对中国法西斯主义的宣传运动给董必武的电报","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1943,"month":8,"day":11}],"parts":[{"text":"关于发动反对中国法西斯主义的宣传运动给董必武的电报","type":"title"},{"type":"appellation","text":"董："},{"type":"paragraph","text":"甲、边区军事虽稍缓和，但国民党的武装准备并未放松，其宣传斗争则更加紧，各地参议会，新闻、文化、妇女等团体请解散中共电，已有十多处，中央社更发反共社论、专电动员舆论。不知重庆月来舆论如何？望电告。"},{"type":"paragraph","text":"乙、此间除继续广播评《中国之命运》各文外，拟于八、九两月发动反中国法西斯主义的运动，通电全国，主张取消各种特务组织，严禁传播法西斯主义思想，以揭穿蒋记国民党实质，并教育自己。不久将有通电、文章广播，请预为准备。"},{"type":"paragraph","text":"丙、渝、桂文化界反压迫抗议事可行，惟望注意：一、除少数知名之士外，不要暴露隐藏的文化人。二、发表的形式可采取多样的。三、尽量争取中间人，在中间刊物发表抗议。四、译成英文向美、英出版界揭露。五、新华、群众多登反法西斯主义文章，以开展思想斗争。"},{"type":"paragraph","text":"毛泽东周恩来"},{"type":"paragraph","text":"真延"}],"comment_pivots":[{"part_idx":0,"offset":22,"index":1},{"part_idx":3,"offset":74,"index":2},{"part_idx":4,"offset":101,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["董必武，当时任中共中央南方局副书记兼宣传部部长、统战部部长。","蒋，指蒋介石。","指《新华日报》和《群众》杂志。"],"page_start":75,"page_end":76,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a37365064"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
