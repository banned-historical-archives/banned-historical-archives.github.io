一六”的内容","authors":["周恩来"],"dates":[{"year":1969,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"周恩来对科学院哲学社会科学部两次谈话中有关清查“五·一六”的内容","type":"title"},{"text":"周恩来","type":"authors"},{"text":"6月28日和7月31日两次讲话摘录：","type":"subtitle"},{"text":"“五·一六”是利用1967年发表《5.16通知》搞起来的，他们抓的很快，主席抓的更快。姚文元9月份发表文章点“五·一六”是反动组织，主席8月份就抓住了，主席看的准……“五·一六”串连，小报上都透露了，主席很快就发现了，矛头不对。原来后台就是王、关、戚。起头，我们想分化他们，把戚本禹分出来，实际上他们是一伙。","type":"paragraph"},{"text":" （1969年6月28日接见学部宣传队和大联委时的讲话）","type":"paragraph"},{"text":"要先从提高思想、落实政策方面入手。","type":"paragraph"},{"text":"你们要把“五·一六”、大批判、清队、整党搞好。","type":"paragraph"},{"text":" （1969年7月31日接见学部宣传队和大联委时的讲话）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"084b3f9a02"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
