script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我领导人分别会见伊东","authors":[],"dates":[{"year":1980,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋总理，赵紫阳、谷牧副总理三日上午会见了日本外相伊东正义一行。华国锋向伊东介绍了正在召开的五届人大三次会议和将要作出的人事变动情况。他说，虽然我们将对人事安排作重大调整，但我们发展同日本友好的政策不变。他说，铃木首相和伊东外相曾多次表示要继承大平内阁的对外政策，中国政府和中国人民对此表示高兴。他表示相信，中日友好关系今后必将会发展得越来越好。"},{"type":"paragraph","text":"华国锋代表中国政府邀请铃木首相在适当的时候访问中国。伊东表示，回国后立即将这一邀请转达给铃木首相。"},{"type":"paragraph","text":"邓小平副总理四日上午会见日本外相伊东正义一行，他说，中国要坚定地把现行的对内对外政策贯彻下去。他说，前首相大平的逝世使中国失去了一位很好的朋友。我非常欣赏日本新内阁的现行对外政策。"},{"type":"paragraph","text":"伊东说，我们现在继承了大平内阁的外交路线，我们要为促进日中友好而继续努力。"},{"type":"paragraph","text":"伊东外相一行四日上午离京回国。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e14d728847"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
