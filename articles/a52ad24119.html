ors":[],"dates":[{"year":1967,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"白石凡宣布解散亚非作家会议日本联络委员会"},{"type":"paragraph","text":"坚决同日共修正主义分子决裂"},{"type":"paragraph","text":"据新华社讯　据东方通讯社报道：亚非作家会议日本联络委员会委员长白石凡，八月十二日向联络委员会全体会员发出一封公开信。"},{"type":"paragraph","text":"白石凡在公开信中宣布解散亚非作家会议日本联络委员会。"},{"type":"paragraph","text":"关于解散联络委员会的决定，是在七月三十日的委员会会议上由绝对多数的委员同意作出的。"},{"type":"paragraph","text":"以白石凡为首的亚非作家会议日本联络委员会中进步的委员们认为，为了进一步推进反帝反修的革命事业，应当同联络委员会内部的日共修正主义分子及其追随者划清界限，断绝关系。他们在连续召开的十二次委员会会议上同日共修正主义分子进行了激烈的斗争，终于排除了洼田精、霜多正次的阻挠，决定解散日本联络委员会。在七月三十日的会议上和白石凡等一起坚持原则斗争的委员有：中岛健藏、松冈洋子、佐藤正雄、坂本德松、依田义贤等。"},{"type":"paragraph","text":"委员中三宅艳子、内山敏、佐多科子等人也赞成解散。"},{"type":"paragraph","text":"洼田精、霜多正次在这次会上极力反对解散，并在八月五日的《赤旗报》上发表所谓“声明”，说什么“解散无效”。"},{"type":"paragraph","text":"白石凡的公开信指出，洼田、霜多两人打着“团结和统一”的招牌，阻碍事业的前进。公开信说，现在我们亚非作家已经到了这样的时候：必须下定决心，为了亚非拉各国人民的解放和自由而共同战斗！"},{"type":"paragraph","text":"白石凡的公开信说，目前，坚持反帝反修的日本进步作家们，正在为组成一个战斗的作家组织进行准备工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a52ad24119"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
