" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"四川省统计局关于隆昌县城关镇人口变动情况的调查报告","authors":[],"dates":[{"year":1960,"month":10}],"is_range_date":false,"parts":[{"text":"四川省统计局关于隆昌县城关镇人口变动情况的调查报告","type":"title"},{"text":"最近，我们根据中央和省委关于“立即开展一个以粮、钢为中心的增产节约运动”的指示精神，结合“五反”运动，对隆昌县城关镇人口的变动，劳动力的“盲流”情况进行了调查研究，现将情况简要报告如下：","type":"paragraph"},{"text":"隆昌县城关镇位于成渝铁路，辖区内主要是城市居民。该镇58年底共有人口27883人，59年底28997人，59年比58年增加1114人，增加5.7%，60年6月末共有人口29496人，比59年增加49人，增加1.73%。增加的人口主要是公共户口增加的，在人口总数中，58年公共户口共4440人，占总数的15.31%，59年为5555人，占19.15%，60年上半年为6203人，占21.03%，60年上半年公共户口比58年共增加1763人，增加40%。在城市居民中，手工业等非公共户口则有所减少。在人口的增加、减少的变动情况中，除受人口出生率降低、死亡率上升这一特殊因素影响人口有一定减少（如该镇60年出生率比58年下降6.31%，死亡率上升7.32%外，主要还由于对人口的管理不严和劳动力盲目流动也有一定的影响。","type":"paragraph"},{"text":"首先，是对人口的管理不严，未及时地进行清理和查对。由于对人口的变动未严格履行登记手续，人口的变化情况不能及时掌握，致使人口中有不少有户口无人和有人无户口的现象。如该镇58年以来有户口无人和有人无户口的达58人，占现有人口的2%，这就是说，千人中，就有2人无户口或有户口无人。有些居民已不在本镇的，也未及时注销，如该镇58年以来应征入伍，因故迁出、死亡、因犯罪被捕等应注销而未及时注销的人口达27人。出生或迁出后未履行登记手续仅60年上半年就有3人。此外，有些公共户口，特别是中央驻县的各单位，如铁路局机务段，川南矿务运输队等人口变动频繁，对变动情况未完全履行登记手续，（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"262d2ac7d8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
