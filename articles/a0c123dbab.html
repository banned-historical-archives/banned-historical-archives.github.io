"authors":[],"dates":[{"year":1967,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻西北欧国家使馆举行建军节招待会"},{"type":"paragraph","text":"许多朋友纷纷索取毛主席著作和《毛主席语录》"},{"type":"paragraph","text":"新华社三日讯　中国驻西欧和北欧国家的大使馆分别举行招待会，热烈庆祝中国人民解放军建军四十周年。"},{"type":"paragraph","text":"参加中国驻法国大使馆代理武官方文在七月三十一日举行的招待会的有六百多人。法国共产主义运动（马克思列宁主义）全国书记处书记弗朗索瓦·马尔蒂和雷蒙·卡萨特地从外地赶来参加招待会。他们代表中央委员会把一封贺信交给方文。"},{"type":"paragraph","text":"参加招待会的客人热烈赞扬毛主席亲手缔造的中国人民解放军四十年来在伟大的毛泽东思想指引下所取得的光辉成就。一位从法国东北部特地赶来参加招待会的退休工人说：“毛泽东主席是当代最伟大的马克思列宁主义者，他的每句话我都无限崇敬。”"},{"type":"paragraph","text":"中国驻英国临时代办沈平一日举行酒会，出席的有英国各界人士，在伦敦的亚洲、非洲和拉丁美洲的各国人士以及许多国家驻英国使节共三百多人。"},{"type":"paragraph","text":"许多朋友在酒会上热烈赞扬毛主席伟大的军事思想。他们说：毛主席关于“枪杆子里面出政权”的思想是真理。他们还热烈赞扬中国人民解放军在毛泽东思想的指引下，在无产阶级文化大革命中所建立的不朽功勋。"},{"type":"paragraph","text":"一些来自亚洲、非洲、拉丁美洲国家的朋友指出，拥有强大的人民解放军的中国是亚非拉人民强有力的、可靠的后盾。他们说，毛泽东思想不仅指引着中国人民的革命斗争，也指引着世界其他国家人民的革命斗争，毛泽东思想永远是指导他们斗争最有力的武器。"},{"type":"paragraph","text":"出席中国驻丹麦大使馆武官刘光继一日举行的招待会的有丹麦文化大臣博迪尔·科克夫人、内政大臣汉斯·海克鲁普等各界人士以及许多国家的外交使节。"},{"type":"paragraph","text":"中国驻芬兰大使馆临时代办李春田一日举行招待会，出席招待会的有芬兰外交部长卡尔亚莱宁、参谋总长阿里莫等芬兰政府和军队的高级官员、芬兰各界人士和许多国家驻芬兰的外交使节。"},{"type":"paragraph","text":"出席中国驻挪威大使馆一日举行的招待会的有挪威陆军副司令埃里克森等军政官员、各界人士及一些国家驻挪威的使节二百多人。"},{"type":"paragraph","text":"出席中国驻瑞典大使馆临时代办刘冀才一日举行的酒会的有各界人士二百多人。"},{"type":"paragraph","text":"中国驻瑞士大使馆代理武官王永政七月三十一日举行招待会，出席招待会的有各界人士二百五十多人。"},{"type":"paragraph","text":"许多外国朋友在中国驻西欧和北欧国家大使馆举行的招待会上，都纷纷索取毛主席著作和《毛主席语录》。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0c123dbab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
