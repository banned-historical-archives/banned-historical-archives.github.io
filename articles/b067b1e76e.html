rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平；张春桥；陈锡联；吴桂贤同志亲切会见台湾省体育代表团全体成员同他们进行了亲切的谈话，对他们冲破困难，远涉重洋和从祖国各地来到首都参加全运会，表示热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年九月六日讯 党和国家领导人邓小平、张春桥、陈锡联、吴桂贤，今天下午在人民大会堂亲切会见了参加第三届全国运动会的台湾省体育代表团的全体体育工作者和运动员。"},{"type":"paragraph","text":"会见中，邓小平等同志和台湾省体育代表团全体成员一起照了像，接着，同台湾省体育代表团团长蔡啸，副团长黄文钦、黄于燕，以及全团成员，进行了亲切的谈话，对他们冲破困难，远涉重洋和从祖国各地来到首都北京参加第三届全国运动会，表示热烈欢迎，祝贺他们在这次运动会中与各兄弟省、市、自治区体育代表团的体育工作者、运动员互相学习，共同提高，取得好的成绩。整个会见，充满了骨肉团聚的欢乐气氛。"},{"type":"paragraph","text":"有关方面的负责人廖承志、罗青长、庄则栋、马文波、田维新、于桑、丁国钰、林丽韫、李金德、赵正洪、路金栋，参加了会见。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"陈锡联","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b067b1e76e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
