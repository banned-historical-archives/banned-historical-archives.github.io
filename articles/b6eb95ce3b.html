s":[],"dates":[{"year":1955,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社上海讯】　上海市学术文化界胡适思想批判讨论会工作委员会，决定有计划地举行一系列的宣传马克思主义唯物主义思想的学术报告会。这个报告会将从三月五日开始，到四月底为止，陆续举行十次。第一次报告会已决定由上海市副市长刘季平主讲:为什么要批判资产阶级唯心主义?为什么要学习唯物主义世界观?"},{"type":"paragraph","text":"上海市学术文化界胡适思想批判讨论会的哲学、政治、历史、教育、文学等组，从一月下旬举行了第一次讨论会以来，已分别研究了如何深入开展批判胡适派资产阶级唯心论思想。哲学组已在日前举行了第二次讨论会，就“胡适实用主义‘经验论’的反动本质”进行了讨论。历史、文学等组的第二次讨论会也将陆续举行。各组第一次讨论会对胡适的哲学、政治、文学、历史等方面反动观点的批判和讨论，都已写成论文，先后在解放日报发表。从二月一日到二十五日，上海市学术文化界人士在解放日报和文汇报上发表的有关批判胡适反动思想的论文、小品文等已有十八篇。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6eb95ce3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
