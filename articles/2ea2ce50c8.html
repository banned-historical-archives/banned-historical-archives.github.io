":[{"year":1952,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　“毛泽东选集”第二卷出版后，已由新华书店在四月十日开始分批发售。兹有部份读者因故未能于指定时期内前往该店购买，纷纷请求展延购买时间，以便能购得这一伟大的著作。现悉新华书店上海分店为照顾读者具体困难，特决定自即日起，仍可凭“毛泽东选集”第二卷购书证前往各指定发售处购买(按原向南京西路一五九三号上海市私营图书业联合供应处购买的读者，改向南京东路三大四号新华书店上海分店读者服务科购买)。　(觉民)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ea2ce50c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
