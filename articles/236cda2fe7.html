<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"龙山中学革命学生按照毛主席“三　·七”指示办事耐心帮助犯错误教师投入教育革命分清敌我，批判极“左”思潮，团结了大多数","authors":[],"dates":[{"year":1968,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市龙山中学的红卫兵和革命学生坚决遵照伟大领袖毛主席“三·七”指示，对在运动中犯过错误的教师进行帮助，鼓励他们站出来工作，促进教师积极投入教育革命。"},{"type":"paragraph","text":"龙山中学约有三分之一的教师在运动中站错了队，有过这样那样的错误。因而，这些教师普遍存在着“四怕”、“三不愿意”思想:怕碰钉子、怕丢面子、怕同学不信任、怕再犯错误；不愿下班级、不愿接触学生、不愿讲课。去年，伟大的“三·七”指示在学校传达后，初一(五)班几个红卫兵立刻想到本班的一位教师。他在运动中站错了队，被叫做“钢杆老保”，一直处于“靠边”状态。红卫兵小将们说:“我们要无限忠于红司令毛主席，他老人家怎么说，我们就怎么办。”一连数天，他们主动找这位教师谈心，鼓励他站出来。开始，有的人对他们这种行动很不理解，说他们是“跟着‘老保’走”，称他们是“小保”。但是，他们毫不动摇地说:“我们不是跟着‘老保’走，我们是坚决按照毛主席‘三·七’指示的方向走。”他们用“解放全人类”的思想去发动班级同学，统一认识，终于帮助这位教师第一个站了出来。在初一(五)班红卫兵的带动下，其他年级的学生通过学习“三·七”指示，纷纷检查了怕老师“报复”，怕以后鉴定评语不好等等的私心杂念。他们表示，决不能用个人感情代替党的政策；决不能让“私”字妨碍自己执行毛主席的指示。在“三·七”指示的光辉照耀下，全校掀起了帮助犯过错误的教师站出来的高潮。"},{"type":"paragraph","text":"龙山中学的红卫兵学习了毛主席的“三·七”指示和有关干部政策后，确立了一个基本观点:必须相信绝大部分的教师是好的和比较好的。他们认为，对教师必须进行阶级分析，划清两种界限。首先是阶级界限，分清敌我，不能把同志当作敌人。其次划清成绩和缺点的界限，全面地历史地分析一个教师，决不能抓住某些缺点，无限上纲。一年来，龙山中学的红卫兵和教师中的无产阶级革命派，一方面狠抓阶级斗争，清理出了教师队伍中的一小撮坏人；另一方面大反“怀疑一切，打倒一切”的极“左”思潮，把所有犯错误的革命教师解放出来。"},{"type":"paragraph","text":"龙山中学不少班级的革命小将按照毛主席“共产党员对于落后的人们的态度，不是轻视他们，看不起他们，而是亲近他们，团结他们，说服他们，鼓励他们前进”的教导，亲自上门和教师交换意见，多次把老师请到班上来，开谈心会，讲真心话。有的小将还主动向老师作自我批评，使犯过错误的教师感动得热泪盈眶，深深感到小将的可敬可爱，值得自己学习。在这些活动中，小将们一方面帮助教师分析犯错误的原因，狠触灵魂，接受教训；另一方面，鼓励教师前进，有了错误改了就行，积极投入复课闹革命。"},{"type":"paragraph","text":"帮助犯错误的教师站出来，靠的是毛泽东思想。有的教师因为犯过错误背上了包袱，红卫兵小将就和他一起学习《学习和时局》，帮助他丢掉包袱，轻装前进；有的教师因为犯过错误而逍遥起来，红卫兵小将就和他一起学“老三篇”，帮助他树立“完全”、“彻底”“为人民服务”的思想；有的教师对革命造反派在感情上扭不过来，红卫兵小将就和他学习《湖南农民运动考察报告》，帮助他端正对革命群众运动的态度。革命小将以战无不胜的毛泽东思想为武器，有的放矢，帮助犯过错误的教师斗私批修，有效地促进了这些教师的思想革命化。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"236cda2fe7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
