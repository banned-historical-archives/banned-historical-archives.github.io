script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广东古代历史发展中有没有经过奴隶制","authors":[],"dates":[{"year":1961,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广东省考古工作者对省内各地发现的地下古代文物考古资料，作了初步探讨，并深入现场，进行分析研究。考古学者们从出土文物探讨到广东地区古代历史发展问题。在讨论到广东古代历史发展中有没有经过奴隶制的问题时，该省文管会和华南师院历史系的一些同志认为是肯定的。根据是:在翁源、广州、惠阳等地方都发现过青铜鼎、青铜工具、斧、剑、矛等武器和石器、硬陶共存，香港还发现过制作青铜斧的陶范，说明这些东西是本地制作的；其次，在不少文化遗址里还发现仿青铜器的石戈、矛、剑和圭、璋礼器以及具有浓厚的仿中原青铜器形制和花纹的陶器陶片。中山大学考古教研组、省文管会、市文管会的另一些同志则认为广东古代历史发展中没有经过奴隶制，而是在原始社会解体后直接过渡到封建社会。理由是:一、广东地区原始社会发展至濒临解体时，适逢秦汉封建王朝的政治、军事、文化和中原先进生产技术的影响，加速了解体过程。二、广东地区至今尚未发现足以说明奴隶制存在过的文化遗存，上述发现的青铜器的地层和共存关系尚未搞清楚，也不能确定为本地制作的。三、从海南岛黎族的社会历史调查资料来看，奴隶制的生产方式的残余也极不明显。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96eaace177"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
