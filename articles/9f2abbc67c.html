" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"以全歼当面之敌为目标是正确的","alias":"","parts":[{"type":"paragraph","text":"以全歼当面之敌为目标是正确的"},{"type":"paragraph","text":"（1950年10月30日）彭、邓，并告高："},{"type":"paragraph","text":"（一）庆祝你们歼灭伪八师四个营的胜利。（二）你们三十日九时的部署是很好的。我方对敌人数量、位置、战斗力和士气等项均已明了，我军已全部到齐展开，士气高涨，而敌人对我方情况则至今不明了（只模糊地知道我军有四方至六方人）。因此，你们以全部歼灭当面敌人伪一师、伪七师、英二十七旅、美二十四师及美骑"},{"type":"paragraph","text":"[1]彭、邓，指彭德怀、邓华，当时分别任中国人民志愿军司令员兼政治委员和副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]高，指高岗，当时任东北军区司令员兼政治委员。"},{"type":"paragraph","text":"[3]指1950年10月30日9时彭德怀、邓华、洪学智、韩先楚、解方给各军并报东北军区司令部和中共中央军委的电报。电报说：为歼灭下杏洞、龙应洞一带之敌，以便我能迅速插至球场以南，切断越过清川江敌之退路，部署如下：一、三十八军应以主力沿公路向下杏洞攻击前进。应以一部由东向西攻击，另以一个团轻装于公路东侧绕路向敌侧后插进，得手后迅速南下，务于31日或11月1日拂晓前进占球场以南院里、军隅里，截断进占云山、泰川敌退路。二、四十军一一九师应于31日拂晓前占领新兴洞（球场东北），截击南逃之敌。一二○师主力应歼灭龙应洞之敌。三、我一二五师应于30日晚至迟31日晚行动，经杏川洞插至德岘、长坪，阻击西进或北进之敌，并准备继续向南挺进，占领德川，钳制与调动敌人。"},{"type":"paragraph","text":"以全歼当面之敌为目标是正确的一师\"一部及伪六师、伪八师残部为目标是完全正确的。只要我三十八军全军及四十二军一个师能确实切断敌人清川江后路，其他各军师能勇敢穿插至各部分敌人的侧后，实行分割敌人而各个歼灭之，则胜利必能取得。（三）在大作战时请注意使用六十六军，以厚兵力。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月三十日二十时"},{"type":"paragraph","text":"[1]美骑一师，即美军骑兵第一师，建立于美国南北战争时期，虽已改编为机械化部队，仍保留了骑兵第一师的番号。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":317,"page_end":318},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f2abbc67c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
