script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议反动政府的法西斯法令　反对垄断资本的残酷剥削  西班牙二万多工人不畏强暴坚持罢工","authors":[],"dates":[{"year":1969,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议反动政府的法西斯法令　反对垄断资本的残酷剥削"},{"type":"paragraph","text":"西班牙二万多工人不畏强暴坚持罢工"},{"type":"paragraph","text":"新华社六日讯　马德里消息：西班牙主要工业区毕尔巴鄂地区工人为抗议垄断资本家残酷剥削而举行的罢工斗争，五日已经从钢铁企业扩展到造船、电机等企业，据报道，有一万五千多名工人参加了罢工。"},{"type":"paragraph","text":"最先从一月三十一日就开始罢工的比斯开钢铁公司的三家工厂的约一万名工人，五日仍在坚持斗争。公司当局四日曾发表声明，企图威胁工人复工，但是工人不怕威胁，迫使三家工厂继续关闭。据估计，工人的罢工使这家钢铁公司的资本家每天损失二十多万美元。"},{"type":"paragraph","text":"为了支持比斯开钢铁公司工人的斗争，毕尔巴鄂的西班牙通用电气公司（属美国通用电气公司）的五千名工人五日举行了罢工，毕尔巴鄂的主要造船厂和一家机械厂的工人也举行了罢工。"},{"type":"paragraph","text":"这一天下午，一部分罢工工人在毕尔巴鄂中央广场举行了示威。"},{"type":"paragraph","text":"毕尔巴鄂地区爆发的这次罢工是这一地区近年来最大的一次。这次罢工斗争发生在佛朗哥法西斯独裁政权一月初悍然宣布全国处于紧急状态以后不久，这是对佛朗哥独裁政权的有力反击。"},{"type":"paragraph","text":"新华社七日讯　马德里消息：西班牙主要工业区毕尔巴鄂地区工人的罢工浪潮继续高涨，六日二万五千名工人举行罢工，愤怒抗议西班牙佛朗哥法西斯当局悍然颁布全国处于紧急状态的反动法令，反对垄断资本家的残酷剥削。"},{"type":"paragraph","text":"毕尔巴鄂的比斯开钢铁公司、西班牙通用电气公司（属美国通用电气公司）以及一家机械厂和一家造船厂等四家工厂的工人，六日继续坚持罢工。"},{"type":"paragraph","text":"毕尔巴鄂反动当局派出大批警察前去镇压罢工的工人。但是，不畏强暴的工人对佛朗哥的法西斯统治展开了勇敢的斗争，他们蔑视警察的逮捕和威胁，成群结队地聚集在市中心，举行游行示威，散发传单。六日，毕尔巴鄂市呈现出一片战斗的气氛。"},{"type":"paragraph","text":"在毕尔巴鄂地区发生罢工的同时，西班牙最大的矿区阿斯图里亚斯、西班牙的大城市巴塞罗纳和圣·塞巴斯蒂安等地也发生了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e60661740f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
