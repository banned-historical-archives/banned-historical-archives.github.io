　约多严厉抨击了南斯拉夫修正主义集团和帝国主义","authors":[],"dates":[{"year":1963,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达7日电】　几千名印度尼西亚劳动人民昨晚在雅加达举行集会，庆祝印度尼西亚共产党机关报《人民日报》创刊十二周年。"},{"type":"paragraph","text":"在会上，印度尼西亚共产党副主席鲁克曼代表党中央委员会向《人民日报》全体工作人员表示祝贺。鲁克曼说，十二年来，《人民日报》取得了很大的成就，同时也遇到了不少困难和打击。但是《人民日报》却变得越来越强有力了。他说，依靠人民的和正确进行的斗争是世界上任何力量所不能击败的。"},{"type":"paragraph","text":"鲁克曼指出，印度尼西亚目前面临着三项任务，即:巩固已取得的胜利，特别是在民族统一战线方面所取得的胜利；解决经济上的困难和继续反对帝国主义和新殖民主义。"},{"type":"paragraph","text":"鲁克曼说，印度尼西亚共产党把1963年作为勇敢的一年。作为印度尼西亚共产党工具的《人民日报》，也必须有勇气提出人民的要求，并和人民斗争连系在一起。这样，《人民日报》就会继续得到发展。"},{"type":"paragraph","text":"印度尼西亚共产党副主席约多代表《人民日报》编委会讲了话。约多在讲话中严厉地批评了南斯拉夫修正主义集团和帝国主义。"},{"type":"paragraph","text":"会上宣读了中国、苏联和阿尔巴尼亚新闻界的贺信和贺电。包括印度尼西亚民族党主席阿里·沙斯特罗阿米佐约在内的印度尼西亚各政党的领导人、群众团体和具有各种倾向的报纸也写了信给《人民日报》表示祝贺。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cb31b5b03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
