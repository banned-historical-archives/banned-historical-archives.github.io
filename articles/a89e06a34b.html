art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席会见马拉总理同斐济贵宾进行了亲切友好的谈话 李先念副总理等参加了会见和谈话","authors":[],"parts":[{"type":"paragraph","text":"新华社六月十三日讯 中共中央主席、国务院总理华国锋今天下午会见斐济总理卡米塞塞·马拉和夫人及其随行人员。"},{"type":"paragraph","text":"华主席同马拉总理进行了亲切友好的谈话。华主席说，马拉总理亲自前来中国访问，这是对中国的信任和支持。中斐建交以来，两国关系的发展是令人满意的。我们希望中斐进一步发展友好关系，互相学习，互相帮助，互相支持。"},{"type":"paragraph","text":"马拉总理说，他非常赞赏中国人民对斐济人民的友谊，希望他对中国的访问将为加强两国的友好关系做出贡献。"},{"type":"paragraph","text":"参加会见和谈话的有马拉总理的随行人员：合作社国务部长利怀·纳西利瓦塔，外交部常任秘书吉奥吉·科托巴拉武。"},{"type":"paragraph","text":"李先念副总理、王海容副外长、郑拓彬和程飞副部长、米国钧大使，也参加了会见和谈话。"},{"type":"paragraph","text":"华主席同马拉总理亲切交谈。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a89e06a34b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
