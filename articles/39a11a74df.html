art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让刘少奇的“活命哲学”见鬼去吧","authors":["战斗英雄麦贤得"],"parts":[{"type":"paragraph","text":"在国内外一片大好形势下，有伟大历史意义的中国共产党第八届扩大的第十二次中央委员会全会胜利召开了。喜讯传来，我千遍万遍地欢呼：“伟大的、光荣的、正确的中国共产党万岁！”“伟大的领袖毛主席万岁！万万岁！”"},{"type":"paragraph","text":"全会一致通过决议，把叛徒、内奸、工贼刘少奇永远开除出党，撤消其党内外的一切职务，真是大快人心。刘少奇这个大叛徒，曾经宣扬什么“钟爱自己”的“活命哲学”，妄图瓦解我们的斗志，要我们象他那样在敌人面前屈膝投降，苟且偷生。他的这一罪恶阴谋，在毛泽东思想武装起来的革命战士面前，是永远办不到的。回想在炮火纷飞的“八·六”海战中，敌人的炮弹片打进了我的前额，当我从昏迷中醒来时，鲜血已经迷住了我的眼睛，右肢已经不听使唤。这时，我想起了毛主席的“这个军队具有一往无前的精神”的教导，顿时产生了无穷的力量，奋力站了起来，继续坚持战斗。全艇的同志个个英勇顽强，坚守战斗岗位，终于和兄弟艇一起击沉了敌舰，赢得了胜利。"},{"type":"paragraph","text":"这一铁的事实，充分显示了战无不胜的毛泽东思想的强大威力，给宣扬“钟爱自己”的党内头号走资派刘少奇一记最响亮的耳光。让叛徒刘少奇的“活命哲学”见鬼去吧。我们将永远沿着伟大统帅毛主席指引的革命航程奋勇前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39a11a74df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
