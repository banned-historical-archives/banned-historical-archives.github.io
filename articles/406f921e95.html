s":[{"year":1997,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社耶路撒冷12月30日电　以色列议会12月30日以47票反对、2票赞成和34票弃权的投票结果，否决了由极右翼势力提出的一项反对希伯伦协议的对政府不信任动议。"},{"type":"paragraph","text":"这项动议是由以色列反对党祖国党提出的。祖国党在这项动议中谴责以色列政府和巴勒斯坦即将达成的希伯伦协议危及居住在希伯伦的450名犹太人的安全。"},{"type":"paragraph","text":"30日，内塔尼亚胡总理呼吁支持即将签署的希伯伦协议。他强调，以色列将继续对犹太人定居点实施安全保护，犹太人不会在巴勒斯坦警察的火力范围之内。"},{"type":"paragraph","text":"有关以色列从希伯伦撤军的协议预计将于31日达成。有消息说，巴以最高层领导将出席签字仪式并举行会谈。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"406f921e95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
