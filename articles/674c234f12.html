rt":12,"page_end":12,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"日本前首相呼吁国民阻止政权右倾","authors":["郭一娜/朱超"],"parts":[{"type":"paragraph","text":"据新华社日本福冈9月5日电（记者郭一娜、朱超）日本前首相村山富市5日在福冈表示，日本国民有必要发出更响亮的反对声，阻止日本进一步右倾化。"},{"type":"paragraph","text":"村山当天在出席“九州日中友好交流大会”前接受了新华社记者专访。他表示，安倍政权正试图修改和平宪法、将自卫队定位为国防军、允许日本拥有集体自卫权，而这一系列举动助长了日本的右倾化。"},{"type":"paragraph","text":"针对日本首相安倍晋三曾在国会答辩时表示学术界和国际上对于“侵略”没有定论的说法，村山颇为愤怒。“一个国家以武力入侵另一个国家，这不是侵略是什么？怎么能说关于侵略没有定论呢？”"},{"type":"paragraph","text":"村山认为，安倍政权应该采取实际行动继承“村山谈话”精神。1995年8月，时任日本首相村山代表政府发表讲话，其核心内容是承认“日本过去实行错误的国策，其殖民统治和侵略给许多国家、特别是亚洲各国人民带来了巨大的损害和痛苦。日本要深刻反省历史、吸取历史教训。”"},{"type":"paragraph","text":"村山说，“村山谈话”是日本政府的正式见解。1995年正值二战结束50周年，内阁发表“村山谈话”是为了反省战争历史，与亚洲各国构筑信任关系。"},{"type":"paragraph","text":"对于安倍此前在国会答辩时表示“不能原原本本继承‘村山谈话’”，村山说，2006年安倍执政时曾说过继承“村山谈话”，这是对国际社会的承诺。安倍如果修改“村山谈话”，等于否定历代内阁继承“村山谈话”的正当性。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"674c234f12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
