tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"敬祝毛主席万寿无疆！","authors":[],"parts":[{"type":"paragraph","text":"在毛里塔尼亚工作的中国同志，收到两封毛里塔尼亚朋友写来的信。一封是一位中学生写的；一封是一位叫穆罕默德的朋友写的。中学生的信写道：“我抱着您一定能很快满足我的非常重要的要求的希望，给您写这封信，我殷切地盼望您能给我寄一本《毛主席语录》。如果可能的话，再给我的朋友寄五本来，他们也和我一样，热爱毛主席著作。”那位叫穆罕默德的朋友写道：“我很想得到毛主席的小红书。我一直关注着伟大的中国人民反对以美帝为首的帝国主义的斗争和中国人民在各方面所取得的重大成就。我认为只要遵循毛主席的教导，我们就必定能胜利，东风一定压倒西风。我们非洲人反对苏联修正主义。中国是我们的唯一希望。”信中最后写道：“如果您能给我寄一张毛主席像来，我要把毛主席像贴在我的房间里。毛主席是永远不落的太阳，我敬祝毛主席万寿无疆！万寿无疆！万寿无疆！”"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ba866e5d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
