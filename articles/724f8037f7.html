script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不堪忍受美国和智利资本家的残酷剥削  智利工人接连不断举行罢工","authors":[],"dates":[{"year":1969,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不堪忍受美国和智利资本家的残酷剥削"},{"type":"paragraph","text":"智利工人接连不断举行罢工"},{"type":"paragraph","text":"新华社八日讯　圣地亚哥消息：智利劳动人民不堪忍受美国和智利资本家对他们的残酷剥削，几天来不断举行罢工。"},{"type":"paragraph","text":"属于美国财团智利开发公司的丘基卡马塔铜矿的七千名工人，七日宣布举行两天的罢工，抗议这家美国公司不履行关于调整工资的协定。在这以前，丘基卡马塔铜矿的运输矿石的工人曾经举行罢工，抗议美国资本家强迫智利矿工在没有安全保障的条件下劳动。据报道，这个矿近来连续发生倒塌事件，矿工生命受到严重威胁。此外，智利首都圣地亚哥九家医院的工人七日也举行罢工，要求改革管理和增加工资。"},{"type":"paragraph","text":"智利劳动人民的罢工斗争是在生活费用不断上涨、美国和智利资本家进一步压榨人民的情况下发生的。据智利官方统计，去年生活费用上涨了百分之二十七点九，今年一月份同去年十二月份相比上涨了百分之四点九，其中涨价最多的是食品。"},{"type":"paragraph","text":"与此同时，近十三个月内，美国国内外电力公司在智利供电的价格也提高了一倍。智利农民在庄园主的残酷剥削和旱灾的影响下，生活更加困苦。目前仅在阿塔卡马省和科金博省，就有两万农民流离失所，无法谋生。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"724f8037f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
