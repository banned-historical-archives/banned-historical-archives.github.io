art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入开展宣传和学习王杰的活动 掀起活学活用毛主席著作新高潮济南部队、装甲兵党委分别作出决定","authors":[],"parts":[{"type":"paragraph","text":"本报讯 中共济南部队委员会在十一月三日作出决定，号召全区部队广泛深入地开展宣传和学习王杰同志的活动。"},{"type":"paragraph","text":"决定中说，王杰同志的一生是光辉的一生，他把自己的一切毫无保留地献给了壮丽的革命事业。王杰同志是雷锋式的革命战士，将永远活在大家的心上。"},{"type":"paragraph","text":"决定指出，王杰同志所以能够具有这种高尚的革命品德，能够在平凡的岗位上做出不平凡的事迹，最根本的是因为他学习毛主席著作，处处按照毛主席的教导办事，自觉地用毛泽东思想改造自己的思想，指导自己的行动。学习王杰同志，就是要象他那样反反复复地读毛主席的书，老老实实地听毛主席的话，时时刻刻按毛主席的指示办事，一心一意做毛主席的好战士。就是要象他那样对毛主席著作抱有深厚的阶级感情，自觉地学，如饥似渴地学，学得深，学得透，学一点，做一点，在“用”字上下功夫，更好地改造思想，牢固地树立无产阶级的革命人生观，做彻底的革命派，将中国革命进行到底，将世界革命进行到底，将自己的思想革命进行到底。"},{"type":"paragraph","text":"决定要求所属单位，把这一学习活动和当前的形势教育密切结合起来，和宣扬本部队的好人好事密切结合起来。进一步在全区部队掀起活学活用毛主席著作的新高潮，加速部队的革命化建设，从根本上突出政治，落实四好，加强战备，胜利地完成党和人民交给我们的一切任务！"},{"type":"paragraph","text":"本报讯 十一月二日，中共装甲兵委员会作出决定，在所属机关、部队、院校、工厂中，开展宣传和学习王杰同志的活动，掀起一个更加广泛、更加深入的活学活用毛主席著作的新高潮。"},{"type":"paragraph","text":"决定指出，王杰同志是我们伟大时代的又一个雷锋。他的英雄行为是毛泽东思想哺育的必然结果。"},{"type":"paragraph","text":"决定号召所属单位，学习王杰同志勤奋地活学活用毛主席著作；学习王杰同志心怀祖国，放眼世界的高尚品质；学习王杰同志全心全意为人民服务的精神。象他那样自觉改造思想，一切以革命利益为重，做毛主席的好战士。"},{"type":"paragraph","text":"决定要求所属单位开展这一活动要与当前的形势任务和部队思想情况紧密结合起来，要与创造四好运动紧密结合起来，并注意及时发现和宣扬本草单位好人好事，运用典型，推动工作。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb34653707"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
