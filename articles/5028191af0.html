script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"红卫兵和革命小将行动起来，围剿派性!打倒派性!本市部分红卫兵和革命小将笔谈打倒派性增强党性打倒资产阶级、小资产阶级派性!","authors":[],"dates":[{"year":1968,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"落实了毛主席的最新指示，“老大难”的问题就变得不难解决。普陀区原两大派工人组织的负责人，通过参加毛泽东思想学两班学习后，终于重新从思想上、组织上联合起来了，便是一个证明。这两大派之间的矛盾是革与保的矛盾牌?不是。这两大派之间的斗争是“路线斗争”吗?也不是。这两大派之间有根本的利害冲突吗?没有。那么，是什么东西阻碍了他们前进呢?工总司普陀区总指挥部十个常委说得好:“回顾这一年多来的时间，正是派性，正是‘私’字，阻碍了我们的前进”。公与私的斗争，随着无产阶级文化大革命的深入，在我抓每个人的头脑里，越来越尖锐了，“私”字的反动性，越来越明显了。你愿意成为一个真正的无产阶级革命派吗?你就应该成为一个破私立公的模范。"},{"type":"paragraph","text":"对于工人阶级来说，打倒派性增强党性的同时，必须把生产搞好。生产有没有上去，这也是检验派性有没有打倒的一个标准。现在，普陀区的工人阶级又重新联合起来了，我们相信，那里的生产，也一定会出现一个崭新的局面。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5028191af0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
