rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高温炼纯钢酷暑炼红心","authors":["铁道兵第二次学习毛主席著作积极分子代表大会代表/某部十六连指导员郑连章"],"parts":[{"type":"paragraph","text":"去年，我们连队在南方担负施工任务，住在一个两面高山耸立的河谷沙滩上。这里没有一棵树，不见一株草。夏天，炎炎烈日如火烧，砂石滚烫地皮焦，一盆凉水倒在地上也会腾起一股青烟来。住在帐篷里，浑身火辣辣的象跳进辣椒水里洗过澡似的。"},{"type":"paragraph","text":"炎热酷暑给施工带来了极大的困难。党支部就把战胜炎热酷暑当作磨炼斗志、改造思想的好战场。同志们豪迈地说：“高温熔炉炼纯钢，越热越好斗私心”，“为了建设社会主义，不要说工地闷热得像个蒸笼，就是油锅我们也敢下去打个滚！”大家打一排炮眼，推一车石碴，堵一次塌方，都对照“老三篇”狠斗一次私心，把施工的过程变成活学活用毛泽东思想、改造世界观的过程。"},{"type":"paragraph","text":"到掌子面扒碴是个最艰苦的活。有一次分工，领导一宣布：“谁到掌子面扒碴？”大家都争先报名。唯独有个新战士，等了一分多钟才举起手来。经过调查了解，这个新战士举手晚一分钟是因为怕热怕苦。由新战士举手晚一分钟这个事，我联想到自己近来到掌子面去的少了，因而思想工作也就做得不及时了。这不正说明自己头脑中也有个怕热怕苦的“私”字吗？毛主席教导我们：“共产党员的先锋作用和模范作用是十分重要的。”我决心到最艰苦的掌子面去，通过自己战酷暑、斗私心，带动全连。我和战士们一起扒碴，一起学习毛主席著作，一起亮私斗私，大大激发了全连同志的革命热情。许多同志表示，我们是毛主席的战士，为了建设社会主义，要勇于吃大苦，耐大劳。那个新战士也抢着干难活，争着挑重担了。他说，毛主席教导我们，要“下定决心，不怕牺牲，排除万难，去争取胜利”。炎热酷暑不可怕，可怕的是头脑里的“私”字，搬掉“私”字这座大山，才能更好地完成工程任务。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"217c2b0c3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
