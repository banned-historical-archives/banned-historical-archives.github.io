art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"不当大少爷、大小姐！380部文工团批判资产阶级生活作风","authors":[],"parts":[{"type":"paragraph","text":"本报讯 380部队文工团在最近开展的反浪费专题整改中，有力地揭发和批判了比吃、比穿、比花钱的大少爷、大小姐作风。"},{"type":"paragraph","text":"380队文工团有些同志，平日几乎是“零食不离嘴”，吃的是高级香糖和各种水果。有时在供销社买不到，就写信叫亲友寄来。许多人都备有“零食小仓库”。文工团成了供销社最大的主题。如王家高同志在某地学习时，经常跑到饭馆里吃喝，一次就花好几块钱。在穿的方面表现得更为严重，特别是某些女同志，一个人就有好几双高跟皮鞋，穿的衣服是一天三换，稍微旧一点就不要了。最时兴的穿戴是：潇洒的风衣、风帽、玻璃衬衣和半袒胸的“布拉吉”。日常用的也多是喷雾香水、指甲油，皮包、项链和手镯等高级化装品和装饰品。有些人花钱如流水，周月琴等两同志一次休假就花了八百元。文工团也有一些比较朴素的同志，但是他们却被称为“财迷”、“穷酸”。"},{"type":"paragraph","text":"现在，许多同志已经察觉到这种思想作风的严重性，意识到自己是在追求资产阶级的生活方式。如张琼范同志在大字报上这样检查自己：“过去我背帆布挎包，觉得还不错，但看见别人都有了皮包，自己就想买更好的。当看到其他同志有外衣时，心又动了，于是在去年休假时花了六十五元买了一件红呢外衣。”她的检讨实际上反映了许多人的内心活动。为什么几年来这个文工团为兵服务的思想减退了？追求资产阶级生活方式成了风气，就是主要原因之一。"},{"type":"paragraph","text":"（380部队整风办公室）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c51ff23ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
