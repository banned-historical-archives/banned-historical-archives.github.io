ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"致邓小平等电","alias":"","parts":[{"type":"paragraph","text":"致邓小平等电！"},{"type":"paragraph","text":"（1943年12月22日）"},{"type":"paragraph","text":"边区生产运动已普遍展开，农业（牲畜、粮、棉）手工业特别毛棉织物均有显著增加，变工扎工、劳动英雄起组织增产的重大作用。在贸易上出入口可平衡，经济上已开始建立了自给基础。惟财政开支过大，尚未做到收支平衡，因此本币仍低于法币，中央已在注意调节开支中。太行最主要入口是盐，出口是核桃、花椒。在敌人加紧经济封锁情形下，必须用一切办法开发冀南及南乐、清丰一带之小盐，经过群众及伪组织关系运太行。政府并须确实掌握调济市场，稳定粟价，推销花椒出口（怕封锁），换取必需物资入口（主要是盐）。至于核桃自己可以榨油，不怕封锁。胡麻是敌必需品，封锁与敌不利，目前封锁是表面现象。并请注意克服政府中某些同志手工业生产上的垄断思想。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、彭德怀关于陕甘宁边区生产与财政情况及对太"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":275,"page_end":275},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7ff639799"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
