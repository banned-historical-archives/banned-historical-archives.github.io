dates":[{"year":1958,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用毛主席学说作指导思想"},{"type":"paragraph","text":"武汉成立哲学社会科学各学会"},{"type":"paragraph","text":"新华社武汉18日电　武汉地区哲学、社会科学界在中共湖北省委组织下，一个月来分别成立了哲学学会、政治法律学会、历史学会、经济学会、教育学会和语言学会。已有一千多个研究人员、大专学校教授、讲师和有实际工作经验并爱好科学研究的机关工作人员分别参加了这些组织。"},{"type":"paragraph","text":"武汉大学校长、中国科学院哲学社会科学部委员李达在哲学学会成立大会上谈到成立这些组织的目的是：培植和壮大武汉地区的哲学社会科学的理论队伍，各学会的研究工作都特别强调运用毛主席关于两类矛盾学说，运用毛主席关于社会主义人民内部矛盾的学说作为哲学社会科学研究工作的指导思想，把湖北省的生产和各项工作中出现的经验和问题，能解释清楚，加以总结，提高到理论高度，从而推动实际工作和生产。"},{"type":"paragraph","text":"各学会已分别作出一年和五年工作纲要，根据厚今薄古的精神订出了研究题目，积极从事学术研究活动。如哲学学会订出“红安、麻城试验田”、“在社会主义制度下人民群众的积极性和创造性”等十九个题目。各学会还将组织定期和不定期的学术讨论会、座谈会、报告会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d51e2afb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
