":1975,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"钟山中学红卫兵团"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在深入学习毛主席关于理论问题重要指示的大好形势下，我们迎来了五四运动五十六周年纪念日。"},{"type":"paragraph","text":"“五四”时期的革命青年具有彻底的不妥协的斗争精神。他们不怕皮鞭、水龙、刺刀、枪炮，不信“文庙”、“圣像”、“三从四德”，披荆斩棘，奋勇向前，表现了中国青年敢于斗争的英勇气概。今天，我们虽然同五四青年面临着不同的革命任务，但仍然需要发扬这种彻底的不妥协的斗争精神。在无产阶级专政下，我们不仅要限制资产阶级法权，而且要批判资产阶级的法权思想，批判自发的资本主义倾向和旧的习惯势力。"},{"type":"paragraph","text":"在无产阶级文化大革命中，我校师生批判了修正主义教育路线，同资产阶级法权思想进行了坚持不懈的斗争。一九七二年，我校又出现了一股“智育第一”的妖风，部分红卫兵向全校贴出了公开信，强烈要求刹住这股风。在这些日子里，广大红卫兵战士团结在一起，不怕写“检查”，不怕“穿小鞋”，迎着风浪前进，揭露了“智育第一”的种种表现。我们红卫兵的这种反潮流精神，得到了学校党支部和有关方面的大力支持，《人民日报》刊登了部分红卫兵的公开信。在学习无产阶级专政理论的热潮中，我们全校红卫兵和革命学生在老师带领下，有组织有目的地走访了沪江机械厂、五角场人民公社、虹口区工商行政管理办公室等三十多个单位，进行广泛的社会调查，从理论和实践的结合上学好无产阶级专政的理论。同时，为了批判等级观念，与旧的传统观念决裂，我们组织了近千名红卫兵和同学，到清管站、服务站、生产队等行业参加义务劳动，培养劳动人民的思想感情。通过一段时间的学习和实\u003c/FONT\u003e践，大多数红卫兵和同学的思想认识有了提高，不少人表示，毕业后要到农村去，到最艰苦的地方去，为限制资产阶级法权、缩小三大差别献出自己的青春。今后，我们要进一步发扬“五四”革命精神，争做破除资产阶级法权思想的尖兵，为实现共产主义而斗争。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"反潮流","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0b53613a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
