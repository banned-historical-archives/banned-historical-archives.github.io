["林彪"],"dates":[{"year":1967,"month":4,"day":22}],"is_range_date":false,"parts":[{"text":"林彪对肖华同志口述的关于正确对待群众的电话指示的电话记录","type":"title"},{"text":"林彪","type":"authors"},{"text":"在这次会议上，我本来想讲一讲群众路线的问题，加强大家对于群众的作用的认识，能够正确地对待群众。解放以后，我军部队住在营房，干部住在机关，同群众的联系大大地减少了。这次突然介入地方文化大革命，大量的碰到的问题，就是如何对待群众的问题。对待群众的态度如果不正确，就不能很好地完成三支（支左、支工、支农）两军（军管、军训）的任务。这次发的十条命令，就是为了保证搞好军队同群众的关系。希望同志们注意这个问题，高举毛泽东思想伟大红旗，政治挂帅，坚持以毛主席为代表的无产阶级革命路线，彻底粉碎刘邓资产阶级反动路线，好好学习毛主席关于群众问题的文章，使全军都能对群众树立正确的态度。我本来想讲讲这个问题，但是现在感冒了，不能够讲了，所以不要安排我讲话的时间了。大家讲话以后， 请主席和同志们见见面，就可以结束这个会了。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72148077a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
