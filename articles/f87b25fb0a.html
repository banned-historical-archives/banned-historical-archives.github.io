script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江西地质九○八队革委会深入实际调查研究  用毛泽东思想总结推广典型经验  领导斗批改的群众运动深入发展","authors":[],"dates":[{"year":1969,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江西地质九○八队革委会深入实际调查研究"},{"type":"paragraph","text":"用毛泽东思想总结推广典型经验  领导斗批改的群众运动深入发展"},{"type":"paragraph","text":"据新华社南昌电　江西省地质九○八队革命委员会，在解放军支左人员的帮助下，遵照伟大领袖毛主席“认识从实践始，经过实践得到了理论的认识，还须再回到实践去”的教导，深入实际，深入群众，用毛泽东思想发现典型，培养典型，推广典型经验，在领导斗、批、改中，充分发挥了战斗指挥部的作用。"},{"type":"paragraph","text":"九○八队有一千多人，分散在九个县的十四个点上。清理阶级队伍工作刚开始，有的委员认识到，这是一场激烈的阶级斗争，应该放手发动群众。有的委员认为，清理阶级队伍主要是在已经掌握的材料的基础上进行调查了解，发动群众没有必要。革委会成员认识不统一，行动就不一致，清理阶级队伍的工作打不开局面。"},{"type":"paragraph","text":"在这种情况下，支左人员就帮助革委会成员认真学习毛主席有关清理阶级队伍的指示和“革命战争是群众的战争，只有动员群众才能进行战争，只有依靠群众才能进行战争”的教导，深入实际，调查研究，培养和总结了二连放手发动群众，开展一场清理阶级队伍的革命群众运动的经验。二连是个阶级斗争比较复杂的连队，开始，连队领导成员只靠少数人关起门来搞清理阶级队伍工作，结果运动搞得冷冷清清，阶级敌人很嚣张。后来，连队领导成员学习了毛主席有关群众路线的教导，对刘少奇的资产阶级反动路线开展了革命大批判，提高了两条路线斗争的觉悟。他们深入到各班组，用毛主席的各项无产阶级政策武装群众，发动群众都投入到运动中来，很快形成了对敌斗争高潮，在很短的时间里就挖出了一小撮阶级敌人。二连的经验使革委会成员受到了一次活生生的毛泽东思想的教育，进一步加深了对毛主席最新指示的理解，统一了认识。革委会立即召开现场会，推广二连的经验，革委会成员并分头发动群众开展清理阶级队伍的工作，使清理阶级队伍工作很快出现了高潮。"},{"type":"paragraph","text":"九○八队革委会在领导斗、批、改中还遇到这样的情况：革委会成员对于一个问题在会议上取得统一认识后，在抓落实工作时又出现步伐不一致的现象。在这种情况下，他们坚持在工作实践的过程中，及时用毛泽东思想总结典型经验，运用典型经验推动全面，做到统一步伐。伟大领袖毛主席关于对知识分子进行再教育的指示发表后，九○八队革委会在解放军支左人员的帮助下，连夜进行了学习，一致认识到毛主席的最新指示，是教育和改造知识分子的指路明灯。许多革委会成员连夜爬山越岭来到各个连队，狠抓毛主席指示的落实。但是抓了一段时间后，有些革委会成员对这项工作的认识和做法上，同其他成员出现了不一致，使队里仍然有部分单位对知识分子进行再教育的工作进展不大。支左人员就和革委会同志带着这个问题深入到落实毛主席指示比较好的三连进行调查研究，发现这个连队在对知识分子进行再教育的过程中，紧紧依靠老工人，充分发挥工人阶级的领导作用，狠抓两条路线斗争史的学习运动，大搞阶级教育，使全连三十多名知识分子在与工农相结合的道路上迈开了可喜的第一步。革委会又认真总结了三连的经验，统一了大家的认识，并且组织了由老工人、革命领导干部和改造较好的知识分子参加的三结合教育领导小组，深入到各连队传播经验，使全队很快就出现了工人阶级热情教育知识分子，知识分子自觉接受工人阶级再教育的新气象。"},{"type":"paragraph","text":"九○八队革委会在领导斗、批、改中，通过不断抓新的典型，来不断解决新的矛盾，从而使革委会在新的事物面前始终保持着战斗的统一。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f87b25fb0a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
