art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"英国进步群众举行示威反对苏修社会帝国主义示威群众举着马克思、恩格斯、列宁、斯大林的画像，举着毛主席的画像，在苏使馆前散发传单，愤怒谴责苏修背叛列宁主义、推行社会帝国主义和社会法西斯主义的罪行。","authors":[],"parts":[{"type":"paragraph","text":"新华社伦敦二十二日电 数十名英国工人、青年学生和亚非拉旅居英国的进步群众，二十二日下午在苏联驻英国大使馆前举行示威，愤怒谴责苏修叛徒集团背叛列宁主义、推行社会帝国主义和社会法西斯主义的罪行。"},{"type":"paragraph","text":"示威群众举着马克思、恩格斯、列宁、斯大林的画像，举着毛主席的画像，打着横幅和标语牌，聚集到苏联大使馆前。横幅和标语牌上写着：“马克思主义、列宁主义万岁”，“当代的列宁主义毛泽东思想万岁”，“毛主席是当代的列宁”。示威群众还高呼口号：“打倒苏联现代修正主义！”“列宁主义万岁！”“当代的列宁毛主席万岁！”"},{"type":"paragraph","text":"示威群众散发了传单，揭露苏修叛徒集团在苏联全面复辟资本主义和在国外推行社会帝国主义的反革命罪行。传单热烈欢呼毛主席关于在无产阶级专政下继续革命的理论是对马克思列宁主义的伟大发展。传单说：“我们必须更高地举起毛泽东思想红旗！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c7ce4e159"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
