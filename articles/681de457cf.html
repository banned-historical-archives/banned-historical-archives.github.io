" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"民盟陕西省西安市委员会关于给马宗申盟纪处理报告表","authors":[],"dates":[{"year":1959,"month":12}],"is_range_date":false,"parts":[{"text":"民盟陕西省西安市委员会关于给马宗申盟纪处理报告表","type":"title"},{"text":"","type":"paragraph"},{"text":"   姓名 马宗申 性别 男 年龄 40 籍贯 山东临城 入盟 年月 1952年1月   原有职务 盟内 民盟西北农学院支部委员 问题性质 右派分子   盟外 西北农学院农业经济系讲师                   ","type":"paragraph"},{"text":"   主要反动言行或反革命罪行： 1、反对党的领导。说：“不要被喊‘万岁’之声陶醉了，有政权，有帽子，群众不喊万岁有什么办法。”并说：“现在大家怕共产党甚于过去怕国民党，因为过去可以不理它，现在不行了，因有各种运动，会轮到你头上……这就是今天阿谀奉承、吹牛、拍马的原因。”攻击党员和积极分子。说：想入党，争取信任就要“唯唯诺诺才行”。在一些会上能作“打手”，就是“好党员”、“积极分子”。同意“党天下”的谬论。并说：“党员觉得国家就是我，我就是国家”。 2、挑拨党群关系。说党员在群众中的印象是：“穷人乍富，小心得志”，大有“飞扬跋扈”之势。又说“现在当一个非党群众很是困难，要得到共产党的好感那更不容易。要有权就非‘争’不可，‘争权’就会有许多帽子，不争也给你扣帽子，真是进也不是，退也不是，象骑在老虎背上，上不去，也下不来。” 3、反对各项运动。说：“人民惧怕的心理更是严重，因为搞运动多，小者批评，大者坐牢，不是任何事情与孰无关，今天人民对党员的惧怕比国民党员更过而甚之。” 4、歪曲整风方针和伟大的反右斗争。说：过去历次运动整别人，这次别人整他们（指党员）。认为批判章、罗完全是党搞的，是“共产党为了稳秩序才批判右派。”并说对右派批判“加深了党和知识分子的紧张关系，今后说话的人会少了”，“反右斗争共产党不应出面”。 5、认为苏联出兵是干涉他国内政，说铁托的文章有道理，南斯拉夫不是主观上的修正主义。认为廿大的做法好不好还值得考虑，波匈事件，章罗联盟，就是苏联的党内斗争，都是因此而引起的。并说斯大林的亲密战友现在基本上被排斥完了。“不单是苏联党内有派别斗争，就是各国共产党也都有派别存在。   交代态度 表示愿意悔改。   行政处分 撤销职务，监督劳动 组织处分 撤销支部委员职务，留盟察看   备注 ----   ","type":"paragraph"},{"text":" 民盟陕西省、西安市整风领导小组（盖章）","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"681de457cf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
