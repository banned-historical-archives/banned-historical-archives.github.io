":1980,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国务院副总理邓小平八日上午在人民大会堂会见由马来西亚文化、青年、体育部长阿卜杜勒·萨马德·宾·伊德里斯率领的马来西亚文化代表团，同他们进行了亲切友好的交谈。"},{"type":"paragraph","text":"邓小平说，中马两国相距很近，是友好邻国。我们的交往正在不断增多，两国的友好关系在不断发展。他说，中国同马来西亚和东盟其他国家的友好关系还要继续发展下去。"},{"type":"paragraph","text":"萨马德·伊德里斯说，自从去年邓小平副总理访问马来西亚以后，马中两国的友好关系和相互了解得到了加强。马来西亚人民高度重视邓副总理为发展两国关系所作出的努力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2de7414a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
