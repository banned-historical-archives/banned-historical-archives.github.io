dates":[{"year":1966,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:江苏省射阳县沟浜大队的民兵，在拿枪的敌人面前，敢打敢拼，不获全胜，决不收兵；在不拿枪的敌人面前，也善于识破敌人的丑恶面目，把敌人从各个角落揪出来。他们真是好样的。他们说:毛泽东思想是我们打击拿枪的敌人的武器，也是我们打击不拿枪的敌人的武器。他们以亲身体会说明，在阶级斗争中活学活用毛主席著作，最学得活，最学得好，一学就灵，一学就见效。我们希望有更多的同志能象沟浜大队的民兵那样，在无产阶级文化大革命中活学活用毛主席著作，和不拿枪的敌人作坚决的斗争，把他们统统打倒!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74705b2683"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
