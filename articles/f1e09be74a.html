,"dates":[{"year":1957,"month":9,"day":2}],"is_range_date":false,"parts":[{"text":"山东文联右派分子刘禹轩","type":"title"},{"text":"山东省文联执委、右派分子刘禹轩在大鸣大放时期，气焰嚣张，希望中国出现匈牙利反革命暴乱事件，他写了一篇题为“远离北京的地方”的文章投寄文汇报，文章说青岛春迟，不是由于和北京的地理上的距离而是心理上的距离。恶毒地说，气候上已是春天了，但思想上还是“乍暖还寒”。这个右派分子还在省文联内部座谈会上说:“党员有三种，有的专教育别人，有的专门记材料，有的专门做总结”。","type":"paragraph"},{"text":" ——原载《文汇报》1957年9月2日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1e09be74a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
