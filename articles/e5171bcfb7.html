script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都隆重公祭李克农同志周恩来同志主祭　罗瑞卿大将致悼词","authors":[],"dates":[{"year":1962,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京13日电】　首都各界人民两千五百多人，今天上午在中山公园中山堂隆重举行公祭，追悼中国人民卓越的革命战士——中共中央委员、中国人民解放军副总参谋长、中国人民解放军上将、全国人民代表大会代表、政协全国委员会常务委员李克农同志。"},{"type":"paragraph","text":"公祭大会由中共中央副主席、国务院总理周恩来主祭，陈云、邓小平、董必武、彭真、陈毅、李富春、李先念、谭震林、乌兰夫、陈伯达、罗瑞卿、习仲勋陪祭。"},{"type":"paragraph","text":"灵堂内李克农同志的遗象前布满了常青盆松和鲜花。灵台前面陈放着中国共产党中央委员会、国务院和国防部送的花圈，两侧摆着毛泽东、刘少奇、周恩来、朱德、宋庆龄、陈云、林彪、邓小平、董必武和党和国家其它领导人敬献的花圈。灵堂内外悬挂着许多挽联和挽幛。"},{"type":"paragraph","text":"公祭大会在上午十时开始。乐队奏哀乐后，主祭人周恩来向李克农同志的遗象敬献花圈，全场默念致哀。接着，中共中央委员、国务院副总理兼中国人民解放军总参谋长罗瑞卿大将致悼词。(全文另发)"},{"type":"paragraph","text":"参加今天公祭的，还有全国人民代表大会常务委员会副委员长李维汉、陈叔通、林枫，政协全国委员会副主席李四光，最高人民法院院长谢觉哉，中国人民解放军肖劲光海军大将、谭政大将王树声大将，中共中央和国务院各部门、各人民团体、各民主党派和北京市的负责人，中国人民解放军的将军、军官和士兵，以及首都的各方面人士和李克农同志的家属、亲友等。"},{"type":"paragraph","text":"公祭仪式结束后，在哀乐声中起灵。李克农同志的骨灰盒移置西郊八宝山革命公墓。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"陈云","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5171bcfb7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
