script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"同中国人民和全体被压迫被剥削人民一起追击美帝美国黑人学生决心反对“纸老虎”美帝是头“肮脏的野兽”将遭到更多更惨的失败，直到完蛋　佛罗里达州圣奥古斯丁市黑人群众反对种族歧视的斗争已进入第三周","authors":[],"dates":[{"year":1964,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社哈瓦那26日电】　目前在古巴访问的美国学生代表团中的九名黑人学生二十三日晚上发表声明说，美国黑人将同中国人民和全体被压迫、被剥削人民一起，“反对一切反动派和纸老虎”。"},{"type":"paragraph","text":"这九名黑人学生是在中国旅古学生为代表团举行的招待会上发表上述声明的。在古巴访问的中国篮球队员也出席了这次招待会。"},{"type":"paragraph","text":"声明说:“在这个为真理而战的时刻，我们彻底、坚决、全力支持中国人民。这是因为你们在为真理而战的时刻也是我们在为真理而战的时刻。”"},{"type":"paragraph","text":"声明谴责美帝国主义是头“肮脏的野兽”，它用炸弹和枪弹威胁中国人民，同时用种族主义的手威胁美国黑人。"},{"type":"paragraph","text":"声明指出，美帝国主义在轰炸老挝的同时，在南越散布细菌以及投掷凝固汽油弹，在委内瑞拉残酷地枪杀孩子，并且轰炸刚果的村庄。"},{"type":"paragraph","text":"声明说，“人们已经开始认识这头野兽的本性”。人们正在跟踪它的诡诈的行迹追击，“它将遭到更多更惨的失败，直到完蛋”。"},{"type":"paragraph","text":"【据新华社北京28日电】　华盛顿消息:不顾当局的镇压和种族主义分子的暴行，美国佛罗里达州圣奥古斯丁市黑人群众反对种族歧视的斗争已经进入了第三周。"},{"type":"paragraph","text":"二十五日晚上，这个市两百多名黑人群众举行反对种族歧视示威的时候，遭到了五百多名种族主义暴徒的野蛮攻击。这是自从本月上旬以来黑人示威者所遭到的一次最严重的暴力袭击。"},{"type":"paragraph","text":"这次冲突是在黑人示威队伍向奴隶市场广场进发的时候发生的。一边奔跑一边尖声怪叫的种族主义暴徒用石块、垃圾桶和铁棍攻击示威黑人。黑人在短暂的自卫还击后，退到了黑人居住区。警察没有干涉种族主义分子的暴行。在这次冲突中，至少有四十五人受伤。"},{"type":"paragraph","text":"在华盛顿，大约两千名黑人二十三日在美国司法部门口示威，抗议密西西比州种族主义分子的暴行和恐怖活动。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99bd157adb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
