,"dates":[{"year":1956,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见南青年足球队"},{"type":"paragraph","text":"陈毅副总理设宴欢送南青年足球队"},{"type":"paragraph","text":"新华社6日讯　中华人民共和国毛泽东主席在6日晚间11时15分接见了以勃·彼希契为首的南斯拉夫青年足球队全体人员。"},{"type":"paragraph","text":"接见的时候在座的，有全国人民代表大会常务委员会副委员长、北京市市长彭真，国务院副总理陈毅，体育运动委员会副主任蔡树藩、卢汉、黄琪翔、荣高棠，外交部副部长张闻天，全国人民代表大会常务委员会典礼局局长余心清，外交部礼宾司司长柯华。"},{"type":"paragraph","text":"接见的时候，南斯拉夫驻中国大使波波维奇和他的夫人、大使馆参赞米里切维奇和他的夫人也在座。"},{"type":"paragraph","text":"新华社6日讯　中华人民共和国国务院副总理陈毅6日晚设宴欢送南斯拉夫青年足球队全体人员。"},{"type":"paragraph","text":"南斯拉夫驻中国大使波波维奇和他的夫人应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会的还有体育运动委员会副主任蔡树藩、卢汉、黄琪翔、荣高棠和北京市体育运动委员会主任柴泽民等人。"},{"type":"paragraph","text":"陈毅在宴会上首先致词。他说，南斯拉夫青年足球队在中国作了10天亲切而友好的访问，在中、南两国人民体育来往的历史上写下了第一页。南斯拉夫青年足球队在中国表现的高超技术，使中国观众感到极大的兴趣。他感谢南斯拉夫青年足球队在增进中、南两国人民之间的了解和友谊，以及推动中国足球运动的发展和提高方面所作的有价值的活动。陈毅说，中国人民十分珍视中、南两国人民早已产生的兄弟友谊，并且愿意尽一切努力来巩固和加深这种友谊。"},{"type":"paragraph","text":"南斯拉夫青年足球队领队勃·彼希契接着讲话。他感谢中国人民给予他们的热诚的兄弟般的欢迎。他说，“我们将为我们在你们可爱的国家所度过的每一分钟而永远感到快乐。”他说，在南、中两国体育运动界的接触方面，已经获得良好的开端。他相信这种接触将得到进一步的发展和加强。他还说，他们为中国在体育运动方面和社会主义建设方面所获得的成就深深感动，因为这种成就是在从来没有过的这样短的时间内所获得的。"},{"type":"paragraph","text":"宴会以后，蔡树藩代表中华人民共和国体育运动委员会向南斯拉夫青年足球队全体人员赠送了礼品。勃·彼希契也代表南斯拉夫青年足球队向陈毅等人赠送了礼品。（附图片）"},{"type":"paragraph","text":"毛泽东主席接见南斯拉夫青年足球队全体人员的情形。新华社记者"},{"type":"paragraph","text":"钱嗣杰摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2200b2988d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
