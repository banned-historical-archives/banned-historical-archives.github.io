ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"为翻译《斯大林全集》给斯大林的电报","alias":"","parts":[{"type":"paragraph","text":"为翻译《斯大林全集》"},{"type":"paragraph","text":"给斯大林的电报"},{"type":"paragraph","text":"（1951年4月7日）菲里波夫同志："},{"type":"paragraph","text":"中共中央热烈地希望得到你的允许在北京将《斯大林全集》翻译为中文。我们认为这对于中国共产党和中国劳动人民是一个重大政治事件。"},{"type":"paragraph","text":"为了迅速地和正确无误地进行这个工作，我们准备采取下列步骤：（一）组织一个专门的翻译和校订的委员会担任这一工作。（二）与莫斯科外国文书籍出版局中文部密切合作，包括采取分工翻译互相校订的方法。（三）请联共中央指定在北京的适当的苏联同志帮助我们的工作。"},{"type":"paragraph","text":"如荷充许我们的要求，请即指定一位同志与我们联系，以解决各项技术问题。"},{"type":"paragraph","text":"毛泽东一九五一年四月七日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":223,"page_end":223},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d74a3c4d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
