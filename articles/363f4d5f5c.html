<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央宣部1956年工作计划要点","authors":[],"dates":[{"year":1956,"month":3,"day":9}],"is_range_date":false,"parts":[{"text":"中共中央宣部1956年工作计划要点","type":"title"},{"text":"面对着社会主义革命的高潮，经济建设和文化建设的高潮，党在思想战线上的任务就是鼓舞人民群众的社会主义热情，提高人民群众的社会主义觉悟，从思想上保证全党和全国人民用马克思列宁主义基础上的团结一致来完成社会主义建设和社会主义改造的事业中的各项迫切任务。党的各项宣传工作，必须紧密配合社会主义建设和社会主义改造的事业的进行，必须执行“全面规划，加强领导”的方针，必须加强马克思列宁主义的宣传和教育，必须加强时事政策的宣传和教育，必须加强对各项文化教育事业的政治领导和监督。","type":"paragraph"},{"text":"一、主要任务：","type":"subtitle"},{"text":"一、在宣传工作中继续贯彻执行“全面规划，加强领导”的方针：","type":"paragraph"},{"text":"1、继续检查和纠正宣传工作中的右倾保守主义的倾向；","type":"paragraph"},{"text":"2、提出党的宣传工作中某些可能规划的业务和干部工作的全面规划，同时协助和监督文教部门制定关于科学、文化、教育、卫生、体育等项工作的全面规划；","type":"paragraph"},{"text":"3、在宣传工作中发扬马克思列宁主义的领导方法，即进行调查研究，进行全面规划，采取基本措施，推广先进经验，批判和克服背上述原则的领导方法。","type":"paragraph"},{"text":"二、继续加强马克思列宁主义的宣传和教育，继续进行反对资产阶级唯心主义思想的斗争：","type":"paragraph"},{"text":"1、继续研究和制定理论教育的七年规划，继续大规模训练理论教员，发展初级和中级党校、业余政治学校，加强对在职干部、高级知识分子和工商业者的理论学习工作的领导；","type":"paragraph"},{"text":"2、继续研究和制定理论工作的十二年规划，在调集研究力量、编写教科书、出版古典和现代学术著作、培养干部等方面采取若干基本措施；","type":"paragraph"},{"text":"3、监督马恩列斯著作的继续出版，并且大力加强马克思列宁主义通俗著作的出版；","type":"paragraph"},{"text":"4、在学术界文艺界继续进行对于学术思想、文艺思想中的资产阶级唯心主义的批判，在干部和知识分子中继续进行关于宣传唯物主义和演讲工作，进一步开展和健全在人民群众中关于各种政治知识科学知识的演讲工作；","type":"paragraph"},{"text":"5、会同中央组织部采取一切必要措施，改进工矿和农村中的党员教育工作，就新党员教育、未能加初级组的党员的教育、区乡干部的教育等方面采取若干基本的措施，建立切实可行的制度，监督各省市委宣传部编写党员教育的教材，并选择其中较优秀的教材加以推广。","type":"paragraph"},{"text":"三、配合一九五六年的政治形势，继续在全党和人民群众中进行时事政策的宣传鼓动工作：","type":"paragraph"},{"text":"1、在全党和全国人民群众中的继续进行关于农业合作化、手工业合作化和资本主义工商业的社会主义改造的当前任务的宣传；","type":"paragraph"},{"text":"2、在全党和全国人民群众中继续进行关于提早完成第一个五年计划的宣传，关于全国农业发展纲要的宣传，关于工人和农民中的社会主义劳动竞赛的宣传；／3、在全党和全国人民群众中进行关于中国共产党的三十五周年的宣传，关于党的七届七中全会和党的第八次代表大会的宣传，关于苏联共产党第二十次代表大会的宣传；","type":"paragraph"},{"text":"4、在全党和全国人民群众中继续进行关于肃清反革命分子的宣传；","type":"paragraph"},{"text":"5、在全党和全国人民群众中继续进行关于解放台湾、揭露帝国主义战争政策和争取持久和平的斗争的宣传；","type":"paragraph"},{"text":"6、在力改进和发通俗读物的出版，特别是改进和发展供给农村的通俗读物的出版，并协助各地逐步创办党的县委机关报。","type":"paragraph"},{"text":"四、继续加强对文化教育工作的监督：","type":"paragraph"},{"text":"五、组织和监督各地有关部门贯彻执行中央关于知识分子问题的指示，在改善对知识分子的使用和安排、给予知识分子以应有的信任和支持、改善知识分子的工作条件和待遇、继续在知识分子中进行思想改造工作、为发展我国科学准备一切必要条件方面，采取若干基本措施。","type":"paragraph"},{"text":"六、贯彻执行一九五五年关于干部管理工作会议的方针，加强文教干部的管理工作，协助有关部门完成文教干部的审查工作，会同有关部门制定文教部门干部工作的长远计划和两年计划。","type":"paragraph"},{"text":"来源：上海市档案馆，A22-2-412，第1-4张","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"363f4d5f5c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
