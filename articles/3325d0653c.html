onth":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京讯】　去年各民族文工团在北京怀仁堂演出的时候，毛主席曾亲临观赏。柳亚子先生正好坐在毛主席的前排，毛主席高兴地说:‘这样的盛况，亚子先生为什么不填词以志盛?我来和。’亚子先生当场填词一首呈毛主席。毛主席第二日用毛笔写在宣纸上和了一首。亚子先生又和一首以呈。亚子先生把毛主席和的一首词裱了起来，配上镜框，挂在他自己的客厅里。兹将三首词抄录于左:"},{"type":"paragraph","text":"浣溪沙柳亚子"},{"type":"paragraph","text":"十月三日之夕，于怀仁堂观西南各民族文工团、新疆文工团、吉林省延边文工团、内蒙文工团联合演出歌舞晚会，毛主席命填是阕，用纪大团结之盛况云尔。"},{"type":"paragraph","text":"火树银花不夜天，弟兄姐妹舞翩间，歌声唱澈月儿圆。(新疆哈萨克族民间歌舞有圆月一歌云。)"},{"type":"paragraph","text":"不是一人能领导，那容百族共骈阗，良宵盛会喜空前。"},{"type":"paragraph","text":"毛主席和词"},{"type":"paragraph","text":"长夜难明赤县天，百年魔怪舞翩\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\01\\511N0105AA.JPG\"\u003e，人民五亿不团圆。"},{"type":"paragraph","text":"一唱雄鸡天下白，万方乐奏有于阗，诗人兴会更无前。"},{"type":"paragraph","text":"柳亚子又和毛主席词"},{"type":"paragraph","text":"落魄书生戴二天，每吟佳句舞翩\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\01\\511N0105AA.JPG\"\u003e，愿花长好月长圆。　平等自由成合作，匈奴南诏更于阗，骅骝开道着鞭前。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3325d0653c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
