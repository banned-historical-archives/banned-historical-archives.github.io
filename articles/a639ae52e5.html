ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中央转发外交部《关于接待日本田中首相访华的内部宣传提纲》的通知稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央转发外交部《关于接待日本田中首相访华的内部宣传提纲》“的通知稿的批语"},{"type":"paragraph","text":"（1972年9月）同意。"},{"type":"paragraph","text":"[1]中共中央1972年9月8日转发的这个宣传提纲指出，日本内阁首相田中角荣即将来华访问，与我国领导人谈判并解决中日邦交正常化问题，这是当前我国外交战线上的一个重大事件。田中首相访华，一是当前国际大好形势的反映，二是中国国际威望不断提高的标志，三是中日两国人民长期共同斗争的结果，四是日美、日苏矛盾进一步发展的表现。邀请田中首相访华，谈判并解决中日邦交正常化问题，是毛主席、党中央的一个重要战略部署。实现中日邦交正常化，有利于反对美苏两霸特别是反对苏修的斗争，有利于反对复活日本军国主义的斗争，有利于我国解放台湾的斗争，有利于缓和亚洲紧张局势。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":339,"page_end":339},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a639ae52e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
