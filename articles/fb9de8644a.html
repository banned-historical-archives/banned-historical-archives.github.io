art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"必须彻底否定“文化大革命”","authors":[],"parts":[{"type":"paragraph","text":"据新华社5月9日讯 昨天《光明日报》在第一版报道了安徽省委组织部就六安农校迫害校医事件召开座谈会吸取教训的情况，并且发表评论员文章《必须彻底否定“文化大革命”》。文章说：党的十一届六中全会通过的《关于建国以来党的若干历史问题的决议》已经对“文化大革命”作了全面的、彻底的否定，指出历史已经判明，“文化大革命”是一场给党、国家和各族人民带来严重灾难的内乱。“文革”无论从理论上还是方法上都是完全错误的。可是，有的人（其中包括有的领导干部）却对党中央的庄严决议置之不顾，他们仍然抱着“文革”的“左”倾错误“理论”和方法不放，一有机会，就把这套极“左”的东西拿出来，继续整人，特别是压制、迫害知识分子。六安农校的原领导就是这样的人。"},{"type":"paragraph","text":"文章说，六安农校迫害知识分子的严重事件，给了我们一个深刻的教训，就是要彻底否定“文革”，不但要否定“文革”的“左”倾错误“理论”，而且要否定“文革”的一套“左”倾错误方法。只有这样，才能真正落实党的十一届三中全会以来的路线、方针、政策，包括知识分子政策，才能使党的政策的春风吹遍祖国的各个地方。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb9de8644a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
