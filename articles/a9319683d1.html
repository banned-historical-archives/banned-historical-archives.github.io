,"dates":[{"year":1995,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海振宁实业公司诉上海手表厂“纪念毛泽东钻石女金表”购销合同纠纷上诉一案，已于近日在市高级法院主持下调解解决。"},{"type":"paragraph","text":"1993年10月19日，振宁公司与上海手表厂签订协议书和补充协议各一份，约定由振宁公司总经销上海手表厂生产的纪念表1万块，纪念表采用国际流行的贵族“\u003cIMG alt=请插入10号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1995\\11\\95BU0312AA.JPG\"\u003e”式表形，进口机芯、表壳、表带、表把均包24K金，表盘除镶有一枚纯金精制的毛泽东头像外，还镶满奥地利钻石，表盘时刻位置上镶有10颗名贵的蓝宝石，表面采用永不磨损蓝宝石水晶玻璃等。嗣后，振宁公司从上海手表厂提取4444块表，已销往京、辽、黑等省市，其余5千余块表未提取。"},{"type":"paragraph","text":"去年1月27日，振宁公司以上海手表厂未按协议约定的标准交货和纪念表质量存在“非钻石、非天然蓝宝石”等为由，向市中级法院起诉，要求上海手表厂退回预付款1030万元，并偿付违约金800万元。中院于去年9月6日一审判决认定，振宁公司将合同中约定的钻石理解为天然钻石缺乏依据，驳回振宁公司诉讼请求。"},{"type":"paragraph","text":"振宁公司不服上诉，请求确认纪念表质量问题并改判。市高级法院确认纪念表质量符合合同约定。振宁公司与上海手表厂于本月27日正式签收调解书。双方同意:上述4444块纪念表每块以4000元结算；振宁公司向上海手表厂支付中途退货违约金492480元。　(高经)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9319683d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
