" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对陆定一关于展开《红楼梦》研究问题的批判的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对陆定一关于展开《红楼梦》研究问题的批判的报告的批语"},{"type":"paragraph","text":"（1954年10月27日）"},{"type":"paragraph","text":"[1]中共中央宣传部副部长陆定一1954年10月27日关于展开《红楼梦》研究问题的批判给毛泽东并中央的报告中说，作家协会古典文学部于本月24日召开了关于《红楼梦》研究问题的讨论会，到会的有古典文学研究者、作家、文艺批评工作者和各报刊编辑等60多人，俞平伯在上午也到了会。会上，一致认为李希凡、蓝翎二人关于《（红楼梦》研究》和《（红楼梦）简论》的批评具有重要意义，并且认为消除胡适派资产阶级唯心主义观点在古典文学研究界的影响，是一场严重斗争，经过这个斗争，将使古典文学研究工作开始进入一个新的阶段。许多人准备写文章参加讨论，但也有一些古典文学研究者在发言中为俞平伯的考据劳绩辩护，主要是担心自己今后的考证工作会不被重视。关于这一点，我们在发言中适当地作了解释。这次讨论的目的，是要在关于《红楼梦》和古典文学研究方面与资产阶级唯心论划清界线，并进而运用马克思主义的观点和方法对《红楼梦》的思想性和艺术性作出较全面的分析和评价，以引导青年正确地认识《红楼梦》。报告提出，在讨论和批评中必须防止简单化的粗暴作风，充许发表不同的意见，只有经过充分的争论，正确的意见才能真正为多数人所接受。对那些缺乏正确观点的古典文学研究者，仍应采取团结的、教育的态度，使他们在这次讨论中得到益处，改进他们的研究方法。这次讨论不应该仅停止在《红楼梦》一本书和俞平伯一个人上，也不应仅限于古典文学研究的范围内，而应该发展到其他部门去，从哲学、历史学、教育学、语言学等方面彻底地批判胡适的资产阶级唯心论的影响。"},{"type":"paragraph","text":"对陆定一关于展开《红楼梦》研究问题的批判的报告的批语刘、周、陈、朱、邓阅，退陆定一照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月廿七日"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。陈，指陈云，当时任中共中央书记处书记。朱，指朱德。邓，指邓小平，当时任中共中央秘书长。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":10,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":322,"page_end":323},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12a91367c8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
