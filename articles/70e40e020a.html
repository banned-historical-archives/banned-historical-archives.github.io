ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"接受罗马尼亚驻华大使郭佐文呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受罗马尼亚驻华大使郭佐文"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1952年12月29日）大使同志："},{"type":"paragraph","text":"我很高兴地接受您所呈递的罗马尼亚人民共和国国民议会主席团的国书，并衷心感谢您的祝贺。"},{"type":"paragraph","text":"三年来中华人民共和国和罗马尼亚人民共和国之间的友好合作关系在政治、经济、文化各方面均获得了很大的发展。这种友好合作关系增进了中罗两国的繁荣以及两国人民之间的友谊，并且加强了以伟大苏联为首的世界和平民主阵营的力量。"},{"type":"paragraph","text":"在乔治乌-德治同志的领导下，罗马尼亚人民正在胜利地从事社会主义的建设，并已不断地获得了辉煌的成就。这些成就一向为中国人民所深切关怀与赞扬。"},{"type":"paragraph","text":"大使同志-我热烈地欢迎您出任罗马尼亚人民共和国驻中华人民共和国的特命全权大使。在您为巩固中罗两国友好合作的工作中，您将得到我和中华人民共和国政府的全力支持。"},{"type":"paragraph","text":"我谨祝您在工作中获得完全的成功。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":404,"page_end":404},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70e40e020a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
