" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"要求有关部门取消对记者的限制和对小报的歧视","authors":["云南","刘增羽"],"dates":[{"year":1957,"month":5,"day":26}],"is_range_date":false,"parts":[{"text":"要求有关部门取消对记者的限制和对小报的歧视","type":"title"},{"text":"云南刘增羽","type":"authors"},{"text":"(刘增羽：云南省《边疆青年报》副主编）","type":"subtitle"},{"text":"本报讯  昆明新闻界22日举行座谈会，抗议农业部部长助理左叶辱骂记者的行为。到会的各新闻单位的代表还揭发了我省某些机关、团体和企业的某些负责干部对记者辱骂、限制和歧视的恶劣行为。","type":"paragraph"},{"text":"云南日报、新华社云南分社和云南人民广播电台的记者说：3月28日下午，云南省人民委员会外事处办公室主任黄凤麟指着记者的鼻子破口大骂：“你们这些记者是干什么？坏事都坏在你们这些人身上！”记者去采访某些重要的宴会新闻，竟被黄凤麟污蔑为“食客”。记者们指出：黄凤麟一贯威风凛凛，盛气凌人，在记者面前经常摆官僚架子，指手划足，把记者当成呼之即来，挥之即去的手下小卒。到会的记者一致要求有关部门督促黄凤麟就此事作检查。记者们还揭发了某些单位对记者直接下命令的无理行为。","type":"paragraph"},{"text":"记者们谈到了许多部门对记者采访施行的许多无理限制。例如：省先进生产者代表会议展览馆不准记者凭先进生产者代表会议制发的记者证进行采访而要记者交报社介绍信。展览馆连公开展出的数字也要“保密”，不准摘记，弄得记者啼笑皆非。记者到一些部门了解情况，经常被这些部门的同志借口“保密”，躲躲闪闪不谈情况，或者干脆由秘书挡驾。对摄影记者的限制就更为“严格”。今年春节，云南青年报摄影记者携带报社介绍信在昆明工人文化宫拍摄化妆晚会，竟被带来警卫室盘问。新华社记者在云南纺织厂拍照片，不但限制手续繁多，而且保卫科还派警卫跟踪。昆明钢铁厂连摄影记者的相机镜头都要登记才准拍照。云南锡业公司要求中国青年报摄影记者“每个镜头只准拍一张”。开远电厂保卫科长甚至当场盘问摄影记者的政治历史。许多单位把摄影记者和坏分子联系起来。","type":"paragraph"},{"text":"会上，云南青年报和云南工人报的记者还说：他们报纸是“小报”，因此受到许多部门的歧视，他们报社的记者遭到的限制还更多。许多活动(其中又主要是外事活动)，许多他们应该参加的会议，他们都不得参加，主管部门甚至根本不通知他们。在出版、纸张分配、发行时间上，小报也受到了一些不应有的歧视。","type":"paragraph"},{"text":"到会记者要求对那些辱骂记者的同志进行严肃的批评教育，要求取消对记者的无理限制。要求把昆明大小各报看作独立的舆论机关而不加以任何歧视。","type":"paragraph"},{"text":"参加这次座谈会的，有云南日报、新华社云南分社、云南人民广播电台、云南工人报、云南农民报和云南青年报的记者数十人。","type":"paragraph"},{"text":" （原载云南青年报城市版63期、农村版233期合刊，1957.5.26)","type":"paragraph"}],"comments":[],"origin":"《揭穿右派分子的丑恶面目》（内部资料　注意保存，中共云南省委整风领导小组办公室编印，1957年9月3日）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d77b7231d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
