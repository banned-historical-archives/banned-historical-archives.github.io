["李富春"],"dates":[{"year":1967,"month":11}],"is_range_date":false,"parts":[{"text":"李富春对中共中央统战部的指示","type":"title"},{"text":"李富春","type":"authors"},{"text":"1、张经武放出来，交给群众，可以开中小型会，不要武斗。是认识问题还是立场问题，是被坏人利用还是陷进去，要由群众来决定。","type":"paragraph"},{"text":"2、三个组织都是革命群众组织。“东方红”要搞刘邓的材料，积极起来，要斗私批修。双方不要揭对方的疮疤。你们要联合，从思想上联合，要思想上解决问题。刘邓、洪涛揪出来了，孙超也算一个，要特别警惕，不要受坏人的挑动。","type":"paragraph"},{"text":"3、统战部的问题很严重，比团中央修得更透，李维汉是刘邓司令部的代理人。你们要把领导层摸清楚，要把领导层的阶级阵线搞清楚，并要摸索社会主义时期的统战工作，对当权派组织专案，当权派不能参加。","type":"paragraph"},{"text":"4、解放一批干部的问题要提到日程上来。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07794917bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
