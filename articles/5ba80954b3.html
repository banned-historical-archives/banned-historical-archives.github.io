al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"在抗大第一期开学典礼上的演讲","alias":"","parts":[{"type":"paragraph","text":"在抗大第一期开学典礼上的演讲"},{"type":"paragraph","text":"（1936年6月1日）"},{"type":"paragraph","text":"第一次大革命有一个黄埔军校。它的学生成为当时革命的主导力量，领导了北伐成功。但到现在它的革命任务尚未完成，我们的“红大”就要继承着黄埔的精神，要完成黄埔还未完成的任务，要在第二次大革命中也成为主导的力量，那就是要争取中华民族的独立解放。"},{"type":"paragraph","text":"前-个时期革命形势不好，弄得我们两只脚一走就是两万五千里。孙悟空会腾云驾雾，一个跟头能翻十万八千里。我们不会腾云驾雾，可也走了两万五。要是也会腾云驾雾，就不晓是会走到哪里去了。我们红军曾经有几十万，现在只剩下两万多人。要不是刘志丹帮我们安排这个好地方，我们还不知道要到哪里去呢。反正我是不到外国去。我们中国的地方大得很，东方不亮西方亮，黑了南方还有北方。《毛主席送我们上红大》（油画）"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":6,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":441,"page_end":442},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ba80954b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
