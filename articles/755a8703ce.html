script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持和发展“五爱”教育为庆祝《中国少年报》创刊三十周年而作","authors":["蒋南翔"],"dates":[{"year":1981,"month":11,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蒋南翔"},{"type":"paragraph","text":"如何把少年儿童培养、教育好，是关系到我们国家和民族前途的大事。"},{"type":"paragraph","text":"建国以后，我们在少年儿童中推行的“五爱”教育——爱祖国、爱人民、爱劳动、爱科学、爱护公共财物，卓有成效，积累了宝贵的经验。可惜在十年内乱中，“五爱”教育的传统遭受了惨重的破坏。粉碎“四人帮”以后，一九七八年，邓小平同志在全国教育大会上的讲话中指出，全国解放以后，“在很长的一段时间里，广大青少年好好学习，天天向上，爱祖国，爱人民，爱劳动，爱科学，爱护公共财物，英勇机智地同敌人、坏分子作斗争，树立了一代新风”，再次肯定了“五爱”教育的成绩。根据党的六中全会《决议》精神，必须继续拨乱反正，加强各级各类学校的思想政治教育工作。在少年儿童的教育中，亟须恢复并发展过去行之有效的“五爱”教育的优良传统。应当把“五爱”教育作为中小学校进行思想政治教育的基本内容。这同坚持四项基本原则的精神是一致的。"},{"type":"paragraph","text":"开展“五爱”教育，应当根据少年儿童的特点，结合当地的实际情况，采取各种生动活泼的形式来进行。"},{"type":"paragraph","text":"中小学校是培养、教育少年儿童的主要场所，为了办好中小学校，使全体在校学生的身心都得到健康的发展，教育部在一九七九年召开的全国中小学思想政治教育工作座谈会上曾明确提出，“面向全体学生”，“全面贯彻党的教育方针”的要求。两年来，不少学校在提高教育质量、减轻学生负担、促进学生全面发展等方面，已创造了不少好经验。这是值得高兴的。但是，我们应该说，今天仍然还有必要再次强调这个问题。"},{"type":"paragraph","text":"大家知道，中小学校是普及教育的性质，承担着双重任务，既要为高一级学校输送合格的学生，又要为四化建设输送具有一定文化知识的优良的劳动后备力量。因此，我们不能单看升学率的高低，更要看绝大多数学生的教育质量怎样，输送的劳动后备力量是否优良，毕业的学生在工作岗位上表现如何。一所好的学校，应当全面完成双重任务。在中小学分快慢班，只重视一部分快班学生的教学工作，增加作业，增加考试，这种做法对少数功课较好的学生，造成负担过重，影响全面发展；对大多数学生的教育采取放任自流的态度，挫伤了多数少年儿童的积极进取精神，这是不符合党的教育方针，不利于有效地进行“五爱”教育，促进我国少年儿童的健康成长的。"},{"type":"paragraph","text":"三十年来，《中国少年报》在宣传党的教育方针、引导少年儿童健康成长方面作了大量有益的工作。希望《中国少年报》和各级教育部门密切配合，在开展“五爱”教育和全面贯彻党的教育方针中作出更大的贡献。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"蒋南翔","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"755a8703ce"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
