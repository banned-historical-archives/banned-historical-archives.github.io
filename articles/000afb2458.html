script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削  英国五万美资汽车公司工人坚持罢工  两个月的斗争沉重打击了美英垄断资本","authors":[],"dates":[{"year":1971,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削"},{"type":"paragraph","text":"英国五万美资汽车公司工人坚持罢工"},{"type":"paragraph","text":"两个月的斗争沉重打击了美英垄断资本"},{"type":"paragraph","text":"据新华社伦敦电　英国美资福特汽车公司近五万名工人为反对垄断资本的残酷剥削、要求增加工资而进行的罢工斗争，到三月二十九日已经坚持了两个月。他们的斗争给美、英垄断资本以越来越沉重的打击。"},{"type":"paragraph","text":"这次罢工从一月二十九日开始以后，几天之内就席卷了福特公司在英国的二十二家工厂。这是这家美资垄断企业在英国的工厂工人四十年来所举行的规模最大、时间最长的一次罢工斗争。在利物浦、戴根纳姆、斯旺西、埃塞克斯等地，福特公司许多工厂的罢工工人一再举行有几千人或上万人参加的集会和示威游行，谴责这家美资垄断企业压榨工人的罪恶行径，抗议垄断资本家无理拒绝工人的合理要求，并决定坚持斗争。"},{"type":"paragraph","text":"福特公司工人的罢工得到了群众越来越广泛的支持。最近，英国许多汽车制造工人和其他一些行业的工人都从政治上和经济上支持福特公司工人的斗争，甚至福特公司在美国、西德、比利时和拉丁美洲国家不少工厂的工人也不断给予他们有力的声援。"},{"type":"paragraph","text":"在英国的福特汽车公司工人的罢工斗争，使美国垄断资本受到沉重的打击。两个月来，这家公司的二十二家工厂全部被迫关闭，汽车、卡车和配件、零件的生产完全停顿。到三月二十七日为止，这家公司已经损失了十二万一千辆车的产量（其中一半是预定要出口的），价值大约八千一百万镑。福特公司在英国各工厂的被迫停止生产，还使英国许多工商企业直接受到影响，英国钢铁公司某些产品的产量也因此下降，为福特公司制造配件的一些工厂被迫停产或减产。罢工还使福特汽车公司一些代销商的处境十分困难。同时，在英国的福特公司为这家美资公司在西欧大陆国家的企业生产汽车零件和配件，因此，它的停产又迫使在西欧大陆的一些福特公司工厂不得不减产或关闭。这种种情况使得美国垄断资本和英国统治集团越来越惊惶不安。美国福特公司的头目亨利·福特最近亲自跑到英国活动，对英国政府施加压力，要它进一步加紧破坏工人的罢工斗争。"},{"type":"paragraph","text":"面对着美、英垄断资本进一步勾结起来破坏工人斗争的前景，在英国的福特汽车公司的工人最近纷纷表示要加强团结，继续坚持斗争。（附图片）"},{"type":"paragraph","text":"英国伯明翰工人举行罢工和示威游行，强烈抗议保守党政府为了加紧镇压工人斗争而炮制的“劳资关系法案”。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"000afb2458"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
