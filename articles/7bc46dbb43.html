dates":[{"year":1981,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见桑布拉诺外长时指出"},{"type":"paragraph","text":"加强团结反对霸权主义"},{"type":"paragraph","text":"据新华社北京2月27日电 中共中央副主席邓小平今天上午会见了委内瑞拉外交部长何塞·阿尔维托·桑布拉诺·贝拉斯科博士及其一行。"},{"type":"paragraph","text":"邓小平对委内瑞拉贵宾说，中国与委内瑞拉虽然相距很远，但都面临一个问题，这就是反对霸权主义的侵略扩张。"},{"type":"paragraph","text":"邓小平指出，为了抵制霸权主义，中委两国需要加强团结，共同努力。"},{"type":"paragraph","text":"在谈到委内瑞拉总统将于今年来中国访问时，邓小平说，现在是多事的时代，我们友好国家领导人多接触，经常交换意见，对应付当前严峻局势很有益处。"},{"type":"paragraph","text":"桑布拉诺外长说，同中国一样，委内瑞拉也奉行一条要对世界和平和稳定作出贡献的对外政策。"},{"type":"paragraph","text":"国务院副总理兼外交部长黄华参加了会见。布雷利大使也参加了会见。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7bc46dbb43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
