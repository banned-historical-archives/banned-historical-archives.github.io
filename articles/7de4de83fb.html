art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席支持我支持","authors":["支左爱民模范排"],"parts":[{"type":"paragraph","text":"伟大导师毛主席发表的支持美国黑人抗暴斗争的声明，像春雷震撼着环球，像春风吹遍了世界。我们最热烈地拥护毛主席的声明，最坚决地支持美国黑人的抗暴斗争。"},{"type":"paragraph","text":"“美国黑人争取解放的斗争，是全世界人民反对美帝国主义的总斗争的一个组成部分，是当代世界革命的一个组成部分。”它如同一把锋利的尖刀，刺进了美帝国主义的胸膛，不管美帝国主义怎样企图垂死挣扎，也挽救不了它必将灭亡的命运。美帝国主义这只罪恶的野牛，必将被烧死在全世界人民反美斗争的火海里。美国黑人是英雄的人民，有着光荣的革命传统。最近席卷美国一百几十个城市的黑人抗暴斗争新风暴，充分显示了美国黑人的极其强大的革命力量。他们敢于战斗，不怕牺牲，一定能够最终取得自由和解放。"},{"type":"paragraph","text":"毛主席历来教导我们：“革命的中心任务和最高形式是武装夺取政权，是战争解决问题”，“枪杆子里面出政权”。美国黑人兄弟用革命的暴力反对反革命的暴力的斗争好得很！它吹响了整个被剥削、被压迫的美国人民反对垄断资产阶级残暴统治的胜利的号角，极大地支援了越南人民的反美正义斗争和世界各国人民的革命斗争。我们深信，在伟大领袖毛主席的伟大号召下，世界各国的工人、农民、革命知识分子和一切愿意反对美帝国主义的人们，必将立即行动起来，给予美国黑人兄弟的正义斗争以强大的声援，向美帝国主义及其帮凶们，发动持久的猛烈的进攻，把殖民主义、帝国主义和一切剥削制度打个落花流水。"},{"type":"paragraph","text":"毛主席热爱我热爱，毛主席支持我支持，毛主席指示我照办，毛主席挥手我前进！我们永远沿着毛主席指引的方向，冲锋陷阵，支持美国黑人的抗暴斗争，支持各国人民的反美正义斗争，同世界上一切革命人民紧密地团结在一起，向着一切阶级敌人发起猛烈的进攻，把中国革命和世界革命进行到底。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7de4de83fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
