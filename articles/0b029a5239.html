ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1940年9月25日）"},{"type":"paragraph","text":"各个根据地的中心问题，都是经济问题。整个经济工作要实行自给的原则，边区要实行六万五千人的自给，要把经济建设当作党与民众团体整个工作的中心，边区党委和政府工作的中心。今年公粮以决定征收九万担为好。在我们自己的区域，在革命战争时期，不能机械地执行工人八小时工作制，不能无条件地增加工资。官富民富是对的，但在党员中不要提发展私人经济的口号。在党内反对贪污腐化，反对发财思想是对的。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上讨论边区财政经济问题时讲话"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":9,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":139,"page_end":139},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b029a5239"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
