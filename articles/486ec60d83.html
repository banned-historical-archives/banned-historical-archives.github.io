ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"印发《苏联一些同志对我大跃进议论纷纷》的批语","alias":"","parts":[{"type":"paragraph","text":"印发《苏联一些同志对我大跃进"},{"type":"paragraph","text":"议论纷纷》的批语"},{"type":"paragraph","text":"（1959年7月19日）此件印发各同志研究。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十九日"},{"type":"paragraph","text":"[1]中国驻苏联大使馆1959年7月2日给外交部并中共中央的这一报告说，最近在苏联部分干部中，特别是在与我国有工作关系的某些干部中，相当普遍地流传着有关我国当前某些困难情况的说法，谈论我们没有公开过的某些具体数字。这些议论的基本特点是抛开问题的主要方面，对中国的成绩避而不谈，专讲毛病，结论是中国党犯了错误。但也有不少干部听了这些话后，表示怀疑或不同的看法。针对上述情况，我们建议领导上考虑是否有必要对我们的实际情况，由中央、外交部向兄弟国家党或驻华使馆作统一的说明和解释，以争取主动。毛泽东在批示印发这个材料时，将题目改为《苏联一些同志对我大跃进议论纷纷》。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":199,"page_end":199},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"486ec60d83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
