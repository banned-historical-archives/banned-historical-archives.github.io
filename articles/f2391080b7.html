rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿尔巴尼亚《战士报》刊登王杰日记编者按语指出；这部日记是王杰同志深入学习和运用毛泽东思想以提高无产阶级觉悟的一面镜子？","authors":[],"parts":[{"type":"paragraph","text":"新华社地拉那电 阿尔巴尼亚人民军机关报《战士报》二月二十七日在《一心为革命》的大字标题下，发表了中国人民解放军某部工兵一连班长王杰同志的日记片断，并刊登了王杰同志生前的一幅照片。"},{"type":"paragraph","text":"报纸在发表王杰同志的日记片断时加了编者按语。"},{"type":"paragraph","text":"编者按介绍了王杰同志英勇牺牲的事迹后说，王杰同志牺牲后，在他的遗物中，发现了一部从一九六三年开始写的十万多字的日记。编者按说，这部日记是王杰同志深入学习和运用毛泽东思想以提高无产阶级觉悟的一面镜子。在这部闪烁着光辉的材料中可以看到他是如何把自己的整个生命贡献给为人民服务的事业的。"},{"type":"paragraph","text":"王杰同志的日记将分几部分在《战士报》上陆续刊登，二十七日刊登了两部分，这两部分的标题是：《学习毛泽东主席的著作是革命战士的首要任务》、《党叫干啥就干啥》。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2391080b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
