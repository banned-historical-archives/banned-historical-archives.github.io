art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英、王震在广东省视察希望当地同志按中央方针政策把经济特区建设好","authors":[],"parts":[{"type":"paragraph","text":"新华社广州3月30日电 中共中央副主席、全国人大常委会委员长叶剑英和中共中央政治局委员王震，最近视察了广东省珠海市和中山县。视察时，中共珠海市委书记吴健民、中山县委书记李耀祺向他们汇报了工作。叶剑英去年4月间曾视察过珠海特区，他和王震对珠海特区一年来经济建设的发展，对中山县农业生产和旅游事业的发展，感到十分高兴。他们热情希望珠海市和中山县的同志继续努力，按照中央的方针、政策把经济特区建设好，把农业生产和各项工作搞好。"},{"type":"paragraph","text":"叶剑英和王震在中山县还专程赴翠亨村瞻仰了孙中山先生故居，在珠海县瞻仰了香洲烈士墓。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王震","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad45dd2b21"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
