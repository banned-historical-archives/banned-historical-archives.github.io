art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想大放光芒（对口词）","authors":["班长胡必高"],"parts":[{"type":"paragraph","text":"东风浩荡，"},{"type":"paragraph","text":"战歌嘹亮，"},{"type":"paragraph","text":"七亿神州，"},{"type":"paragraph","text":"红光万丈，"},{"type":"paragraph","text":"无产阶级文化大革命，"},{"type":"paragraph","text":"把五洲四海震荡。"},{"type":"paragraph","text":"毛主席的最新指示，"},{"type":"paragraph","text":"给我们指引出胜利的方向；"},{"type":"paragraph","text":"毛主席的最新指示，"},{"type":"paragraph","text":"给了我们无穷的力量；"},{"type":"paragraph","text":"毛主席的最新指示，"},{"type":"paragraph","text":"鼓舞着我们奋勇前进；"},{"type":"paragraph","text":"毛主席的最新指示，"},{"type":"paragraph","text":"唤起亿万革命群众斗志昂扬。"},{"type":"paragraph","text":"全世界进入毛泽东思想新时代，"},{"type":"paragraph","text":"文化大革命出现一片崭新景象。"},{"type":"paragraph","text":"整个形势空前大好，"},{"type":"paragraph","text":"人民群众觉悟提高。"},{"type":"paragraph","text":"每个地区急速变化，"},{"type":"paragraph","text":"每个家庭向前飞跃。"},{"type":"paragraph","text":"从白发苍苍的老人，"},{"type":"paragraph","text":"到系着红领巾的小姑娘；"},{"type":"paragraph","text":"从机器轰鸣的工厂，"},{"type":"paragraph","text":"到获得大丰收的村庄；"},{"type":"paragraph","text":"毛主席语录人人朗读，"},{"type":"paragraph","text":"革命歌曲处处欢唱，"},{"type":"paragraph","text":"毛主席像章佩戴胸前，"},{"type":"paragraph","text":"毛主席话儿铭刻心房。"},{"type":"paragraph","text":"毛泽东思想是雨露阳光，"},{"type":"paragraph","text":"哺育着无数英雄模范成长。"},{"type":"paragraph","text":"我们要大树特树毛主席的绝对权威，"},{"type":"paragraph","text":"我们要大树特树毛泽东思想的绝对权威。"},{"type":"paragraph","text":"在毛泽东思想统帅下，"},{"type":"paragraph","text":"劲往一处使，心往一处想，"},{"type":"paragraph","text":"火海敢冲，"},{"type":"paragraph","text":"刀山敢上，"},{"type":"paragraph","text":"红色的江山，"},{"type":"paragraph","text":"到处是批判中国赫鲁晓夫的战场。"},{"type":"paragraph","text":"党内一小撮走资派威风扫地，"},{"type":"paragraph","text":"牛鬼蛇神胆颤心慌。"},{"type":"paragraph","text":"摧毁了资产阶级黑宫殿，"},{"type":"paragraph","text":"粉碎了修正主义一枕黄梁。"},{"type":"paragraph","text":"毛主席的革命路线取得伟大胜利，"},{"type":"paragraph","text":"响彻云霄的凯歌传遍四面八方。"},{"type":"paragraph","text":"毛主席号召“抓革命，促生产”，"},{"type":"paragraph","text":"两副重担肩上扛，"},{"type":"paragraph","text":"毛主席号召要斗私，批修，"},{"type":"paragraph","text":"处处举办毛泽东思想大课堂。"},{"type":"paragraph","text":"看，革命大联合掀起新高潮，"},{"type":"paragraph","text":"听，教育革命奏出新乐章。"},{"type":"paragraph","text":"意气风发，"},{"type":"paragraph","text":"斗志昂扬，"},{"type":"paragraph","text":"处处是无产阶级革命的红旗，"},{"type":"paragraph","text":"处处是毛泽东思想的灿烂阳光。"},{"type":"paragraph","text":"纵情歌唱吧！"},{"type":"paragraph","text":"歌唱毛泽东思想大放光芒；"},{"type":"paragraph","text":"衷心敬祝呵，"},{"type":"paragraph","text":"敬祝伟大领袖毛主席万寿无疆！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6fa30be2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
