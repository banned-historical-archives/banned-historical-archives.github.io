art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用文艺的武器狠狠打击阶级敌人","authors":["4563部队毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"最近，我们重新学习了伟大领袖毛主席三次亲自审阅修改的《林彪同志委托江青同志召开的部队文艺工作座谈会纪要》。我们越读心越明，眼越亮，越读越热爱伟大领袖毛主席，越读越痛恨中国赫鲁晓夫和反革命修正主义分子周扬一伙。《座谈会纪要》具体地体现了伟大领袖毛主席光辉的思想，指引和鼓舞着我们将文化战线的两条路线斗争进行到底。"},{"type":"paragraph","text":"《座谈会纪要》明确指出：军队要“勇敢地、坚定不移地，为贯彻执行文艺为工农兵服务、为社会主义服务的方针而斗争”。并号召我军在文化革命中起重要作用。我们这个由战士、干部组成的毛泽东思想宣传队，就是在《座谈会纪要》的精神的指引下，沿着毛主席的革命文艺路线成长起来的。开始，有一些同志认为自己是个战士，粗手粗脚的，怕完不成任务。领导发现这些活思想后，就运用小整风的方法，组织我们学习《在延安文艺座谈会上的讲话》和《座谈会纪要》，学习江青同志顽强地同反革命修正主义文艺黑线作斗争，勇敢地捍卫毛泽东思想和毛主席的革命文艺路线的光辉事迹。通过学习，使大家认识到，运用文艺的形式宣传毛泽东思想，捍卫毛主席的革命路线，让毛泽东思想占领一切阵地，是我们革命战士毕生的战斗任务。同志们认识提高了，态度端正了，立即投入了宣传、捍卫毛主席革命文艺路线的战斗。伟大领袖毛主席发出了“人民解放军应该支持左派广大群众”的战斗号召，大家连夜编排节目，抄宣传稿，迎着风雪，奔向街头、农村，为广大群众宣传演出《坚决支持革命左派》等节目，深受群众欢迎。群众激动地说：“我们一定听毛主席的话，紧跟毛主席，把文化大革命进行到底。”我们在工厂演出《万炮齐轰中国赫鲁晓夫》等节目时，全场沸腾，“打倒中国赫鲁晓夫！”“毛主席万岁，万万岁！”的口号声经久不息。一年多来，我们以饱满的政治热情，歌颂伟大领袖毛主席，歌颂战无不胜的毛泽东思想，歌颂毛主席的革命路线，用文艺这个武器，狠狠地打击了阶级敌人，鼓舞了广大无产阶级革命派。"},{"type":"paragraph","text":"在纪念《座谈会纪要》发表一周年的时候，我们决心以江青同志为榜样，更高地举起毛泽东思想伟大红旗，活学活用毛泽东思想，一切想着毛主席，一切服从毛主席，一切紧跟毛主席，一切为着毛主席，永远做毛泽东思想红色宣传员。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c6ece610d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
