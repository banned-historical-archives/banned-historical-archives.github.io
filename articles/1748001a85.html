s":[],"dates":[{"year":1957,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"北京市委郑天翔传达邓小平整风报告","type":"title"},{"text":"[1957年7月5日传达]","type":"subtitle"},{"text":"一、反右派斗争的必要性(略)","type":"paragraph"},{"text":"二、现在反右派斗争的情况(略)","type":"paragraph"},{"text":"四、现在怎么办(略)","type":"paragraph"},{"text":"五、改的问题","type":"paragraph"},{"text":"改进工作，现在来看改的决心不够。整风就是为了克服官僚主义，宗派主义、主观主义，只有改进工作，才能提高党的威信，团结广大群众；改进工作以后，右派分子就没有资本，中间分子就会靠拢我们了。报上对我们所提出的意见，90％是正确的。是鲜花不是毒草，要诚恳接受，加以改进。团结中间分子是反右派斗争的关键，而团结中间分子，就必须狠狠地打击右派，和改进工作。现在来看，工作有些改进，但不够坚决。每个部门，每个单位必须坚决地去改进工作。","type":"paragraph"},{"text":"(抄者注：①此文件系上海二个人听传达的记录稿(邓小平的报告是在7月4日)文字不多，内容简单。②一、二、三、部分，因与邓小平的别的一些有关整风的报告内容重复，同时亦看不出有多大问题，故略去。只收第四部分，全文抄上。1967．2．19下午)","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1748001a85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
