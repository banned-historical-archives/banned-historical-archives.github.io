" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1471","name":"今后一般不再使用‘路线斗争’的提法","author":"中共中央宣传部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"今后一般不再使用‘路线斗争’的提法","dates":[{"year":1981,"month":7,"day":30}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态: 1981(选编), 226-228","tags":[{"name":"斗争","type":"主题/事件"},{"name":"路线","type":"主题/事件"},{"name":"提法","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"},{"name":"左倾","type":"主题/事件"}],"parts":[{"type":"title","text":"今后一般不再使用 “路线斗争”的提法"},{"type":"paragraph","text":"在《关于建国以来党的若干历史问题的决议》中，没有出现“错误路线”、“机会主义路线”、“路线斗争”一类的字眼。这是对过去习用的党内斗争提法的一个重要变动。"},{"type":"paragraph","text":"路线错误、路线斗争这些提法并没有明确的科学的含义。到底怎样才算路线斗争，它的标志是什么？究竟哪次算路线错误，哪次不算？在这些路线斗争中，谁们是正确路线，谁们是错误路线？每次错误路线什么时候起什么吋候止？这些问题都很难讲得清楚。即使是“路线”一词，我们党直到共产国际提出反立三路线以前也很少用过。自王明“左”倾冒险主义在党内取得统治以后才大用，并且用法愈来愈神圣化。"},{"type":"paragraph","text":"“文化大革命”中常说我党历史上发生过若干次路线斗争。认真分析一下，其中有些是不准确的。例如，瞿秋白同志在指导思想上的错误只有三个月时间，李立三同志的错误不到半年，都很快就纠正了，很难说已经形成了一条什么“错误路线”。有些所谓的“路线斗争”，实际上是批判了正确的意见，颠倒了是非。例如，对彭德怀等同志的所谓“右倾机会主义路线”的批判，对“彭罗陆杨”的批判，对所谓“刘邓路线”的批判，都是完全错误的，现在都已经推翻了。至于反对野心家高岗、饶漱石阴谋分裂党、篡夺党和国家最高权力的斗争，用所谓“路线斗争”来概括也并不准确。其性质要更为严重。"},{"type":"paragraph","text":"滥用“路线错误”、“路线斗争”等提法，在党内造成了很不好的后果。在过去一个长时间内，往往党内一有不同意见，就被说成是“路线问题”，轻率地上升到“路线斗争”的高度，并且进而把它说成是社会上阶级斗争的反映。谁一碰上这些问题，谁就不得翻身。 而且还要“上挂下联”，层层揪“代理人”，使一大批同志受到株连。"},{"type":"paragraph","text":"党内不同思想的分歧，正确思想和错误思想的矛盾，是经常发生的。我们一定要采取慎重的、实事求是的态度，具体问题具体分析。是什么性质就是什么性质，犯了什么错误就是什么错误，讲它的内容，不要把什么问题都提到路线上来。当然，不是说路线两个字一概不能用。有时在正面论述时，用路线两个字表达比较顺当、自然，而且一讲就明白，还是可以用的。例如，讲三中全会标志着党重新确立了马克思主义的思想路线、政治路线和组织路线等。至于在党内斗争中，今后一般不要再使用“路线错误”、“路线斗争”之类的提法。"},{"type":"subtitle","text":"(第39期，7月30日）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a59c20b51f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
