":1968,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席教导我们:“工人以工为主，也要兼学军事、政治、文化。也要搞社会主义教育运动，也要批判资产阶级。”今天，我们无产阶级革命派虽已夺了权，掌了权，但对于批判资产阶级还要继续进行，必须乘胜前进。我们要以“斗私，批修”为纲，狠抓大学习、大批判。革命的大批判搞得深不深，是对毛泽东思想学得好不好，对毛主席革命路线忠不忠的试金石，也是我们能不能把无产阶级文化大革命进行到底的关键。如果我们不把革命大批判深入持久地开展下去，不把修正主义路线从政治上、思想上、理论上彻底批倒、批臭，那末我们在组织上夺到的权就不能巩固。我们无产阶级革命派必须同这种右倾思想作坚决斗争，把批判资产阶级的斗争进行到底。只要资产阶级思想存在一天，我们就一天不停止地对它开展批判和斗争。"},{"type":"paragraph","text":"一车间乙班行车组"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcdc24b9d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
