rt":10,"page_end":10,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"珍藏毛主席像章1.5万枚","authors":["刘峰军"],"parts":[{"type":"paragraph","text":"七旬维吾尔族老人"},{"type":"paragraph","text":"珍藏毛主席像章1.5万枚"},{"type":"paragraph","text":"本报乌鲁木齐电刘峰军报道：家住新疆洛浦县布亚乡库木阿孜玛村的维吾尔族农民阿不都拉洪，有一份独特的收藏，那就是珍藏了30多年的1.5万枚毛泽东主席的像章。"},{"type":"paragraph","text":"今年已经70岁的阿不都拉洪老人4岁时父亲去世，在解放前受尽屈辱。解放后他当了小队的会计，真正翻身当了主人。阿不都拉洪从此决定把毛主席的像章和照片保存下来，让子孙后代永远记住共产党，记住毛主席。曾有不少人想出高价买他的收藏，都被阿不都拉洪断然拒绝。他说，“我虽然还不富，但是毛主席像是不会卖的。”"},{"type":"paragraph","text":"今年初，干部“三同”住进了村里。阿不都拉洪感到共产党干部的好作风又回来了，便拿出珍藏了30多年的毛主席像章和照片给工作组队员看，并且慷慨地把6300张毛主席照片赠送给乡里。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe6c234836"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
