为奸破坏群众运动的阴谋决不能得逞","authors":[],"dates":[{"year":1969,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社地拉那十九日电　阿尔巴尼亚《团结报》今天发表短评，热情赞扬资本主义国家里蓬勃发展的工人和学生的革命运动，揭露和谴责资产阶级及其仆从现代修正主义者破坏群众运动的罪行。"},{"type":"paragraph","text":"短评说，今年以来，在美国，被压迫的黑人正在继续开展反对残酷的种族歧视和种族压迫的斗争。意大利、美国、法国、英国的工人，在斗争中更加强烈地要求夺回被剥夺了的权利。日本和新西兰等许多国家的人民，对人类最野蛮的敌人美帝的掠夺政策和好战政策，表示强烈的愤慨。"},{"type":"paragraph","text":"短评接着说，最近，意大利、美国、日本、法国、西德等国的学生运动发展尤其迅猛。青年学生越来越清楚地认识到，诸如根本改变资产阶级腐朽教育制度的要求，在资本主义制度下是无法实现的。同时，在他们的思想里正在加强这样的信念:只有日益紧密地团结起来，在工人阶级的领导下共同进行斗争，才能把他们的事业向前推进。"},{"type":"paragraph","text":"短评指出，日益高涨的工人和学生运动清楚地证明了资本与劳动群众之间的矛盾的加剧；清楚地证明了千百万人民对由于资本主义统治所造成的苦难处境的日益不满。另一方面，阶级斗争的激化也使世界各地的反动派更加感到不安。他们正在采取一切措施，运用一切手段，企图镇压人民的反抗。在这方面，他们得到混入工人和学生队伍内部的现代修正主义工贼的帮忙。尽管如此，暴力是吓不倒资本主义国家里正在斗争的工人和学生的。相反，工人和学生以暴力来回答暴力。现代修正主义者同资产阶级进行紧密勾结，扮演了可耻的角色，更加清楚地暴露了他们的叛徒面目。"},{"type":"paragraph","text":"短评最后说，不管资产阶级和现代修正主义怎样煞费心机，他们的阴谋是不会得逞的。革命的烈火已经在世界各地点燃起来。这是对资本主义统治的愤怒和仇恨的烈火。任何力量都无法把它扑灭。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb0f38e465"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
