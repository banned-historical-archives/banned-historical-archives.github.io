art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"同修正主义卫生路线对着干","authors":[],"parts":[{"type":"paragraph","text":"某部医疗队的同志和赤脚医生一起，批判邓小平攻击、否定卫生革命，妄图为“城市老爷卫生部”翻案的罪行。这是他们正在搞大批判专栏。"},{"type":"paragraph","text":"总后勤部卫生部最近举办新针疗法“腕踝针”学习班，深入工厂、农村为工人、贫下中农服务。这是学习班学员在田头为社员治病。"},{"type":"paragraph","text":"一九六八年，某部医疗队为李秀英治好了聋哑病。这是李秀英入伍后，正在认真给孩子治聋哑病，用实际行动反击右倾翻案风。"},{"type":"paragraph","text":"某部医疗队在巡回医疗中积极帮助驻地公社培养赤脚医生上生理卫生课。"},{"type":"paragraph","text":"某部一四五医院医疗队，深入农村，积极宣传计划生育，帮助农村做好计划生育工作。这是他们在田间劳动休息时，向贫下中农宣传计划生育的好处。"},{"type":"paragraph","text":"某部一○五医院组织医疗小分队，同修正主义卫生路线对着干，深入驻偏僻山区的连队、哨所，为干部战士检查身体。这是他们在给干部战士做胸部透视。"},{"type":"paragraph","text":"（本组照片均为本报通讯员摄）（照片）"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83faf5a2f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
