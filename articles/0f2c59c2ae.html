ates":[{"year":1952,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北方交通大学京院某教师"},{"type":"paragraph","text":"应该彻底批判资产阶级思想"},{"type":"paragraph","text":"编辑同志：北方交通大学京院建筑系的一位副教授，有严重的资产阶级思想。"},{"type":"paragraph","text":"他时常卖弄他的“硕士”衔头，他说：“全国得到‘都市计划’硕士学位的，只有我们四个人。”当他还是讲师的时候，他说：“一年之内要是得不到副教授的职位，就自杀于爱人的跟前！”"},{"type":"paragraph","text":"他在课堂上向学生讲授些什么呢？他说：“贫民窟是罪犯的渊薮”，“铁路两旁肮脏，宜设贫民窟”，“都市过多的人口，可移到殖民地去”。他甚至还把“人种如何分黑白”、“酗酒肇祸”、“贫民窟的形成”等一套谬论也搬了出来。他教学生设计建筑物时要设计得“怪些”，说这样才能“成名”。"},{"type":"paragraph","text":"这位教师的思想这么腐朽肮脏，但是他却不愿在群众面前进行检讨，以便改造自己。在检讨中他还说，华侨在美国干的尽是“洗衣”、“烧饭”等"},{"type":"paragraph","text":"“下贱”工作，他们“不争气”，所以被美帝国主义歧视。他又把美帝国主义对我国的文化侵略说成是美帝国主义的“好意”。当同学对他所教的“都市计划”提出意见时，他便说：“真倒霉，我不该学建筑，要是学水利就好了。”这说明了他对思想改造的态度是非常错误的。我们恳切地希望这位教授端正自己的学习态度，深刻地批判自己的错误思想，彻底改造自己，只有这样，才能受到同学的欢迎。"},{"type":"paragraph","text":"北方交通大学通讯组"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f2c59c2ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
