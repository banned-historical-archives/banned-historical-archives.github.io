<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海化纤十一厂加工车间化保小组以党的基本路线为纲打好反击资产阶级思想腐蚀的进攻战","authors":[],"dates":[{"year":1973,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海化纤十一厂加工车间化保小组是一个刚建立不到两年的新班组，共有组员三十余人，其中青年工人占全组总人数的百分之四十。在批修整风运动中，这个小组在车间工代会的引导下，以党的基本路线为纲，在班组这个阶级斗争的前哨阵地上，积极主动地反击了资产阶级思想的腐蚀，推动了小组的学习和生产，取得了一定的成绩。"},{"type":"paragraph","text":"这个小组在开展意识形态领域的阶级斗争时，不仅敢于抓，而且善于抓。首先是发现苗子及时抓。前一段时期，这个小组调进了一个曾被专政机关拘留过的人，在小组里劳动改造。这个人表面上装得“老实”，暗地里却在腐蚀拉拢青年，使一些青年在某些方面犯了一些错误。发现这一苗子后，小组的领导就组织大家学习党的基本路线，狠批刘少奇一类骗子妄图在意识形态领域中搞“和平演变”、进而复辟资本主义的罪行，使犯错误的青年吸取了教训，提高了觉悟。有些青年的思想觉悟提高后，就大胆地站出来和大家一起揭开组内阶级斗争的盖子，有力地反击了资产阶级思想的腐蚀和侵袭。后来这些青年还报名参加了青年突击队，积极投入技术革新活动，作出了一定的成绩。"},{"type":"paragraph","text":"其次是耐心细致反复抓。有一个青年是工人子弟，过去有“自来红”思想，放松了自身改造，沾染了一些不良习气，小组同志对他帮助了几次，但没有转变过来。对于这样一个青年，他们没有疏远他，而是满腔热情地接近他，帮助他。共产党员老王师傅经常利用星期天从曹杨新村赶到静安寺，到他家同他谈心，以回忆对比的方法，帮助他提高阶级觉悟，使小王有了转变。以后小王主动地联系自己的思想，狠批刘少奇一类骗子散布的“阶级斗争熄灭论”，并启发其他同志自觉地抵制资产阶级思想的侵袭。最近他写了入团申请书，以实际行动争取加入共青团组织，受到了工人师傅的好评。"},{"type":"paragraph","text":"这个小组的领导利用各种形式引导全组同志逐步树立无产阶级世界观，对资产阶级思想不断打进攻战，而不是等问题成堆才去解决。他们组织大家认真学习马列著作和毛主席著作，学习党的基本路线，努力提高全组同志的阶级斗争和路线斗争的觉悟。他们针对阶级敌人用资产阶级生活方式腐蚀青年的手法，发动党员、团员和骨干同青年交朋友，经常开展谈心活动，帮助青年提高抵制资产阶级思想和生活方式腐蚀的能力。同时，还积极开展文体活动，组织青年用文艺形式写英雄、唱英雄、学英雄，以积极的态度抓紧反腐蚀的斗争，这样做效果较好。"},{"type":"paragraph","text":"这个小组通过狠抓思想领域里的阶级斗争，促进了革命和生产的发展。去年，他们超额完成了国家交给的安装任务，仅以七、八、九三个月为例，七月份按计划完成三台机器安装任务，八月份超产百分之四十，九月份超产百分之六十，与此同时，他们还大闹技术革新，把原来搬一台机器需要四十八工的时间缩短到三十二工，多快好省地完成了一九七二年的生产任务。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f74fa88bb4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
