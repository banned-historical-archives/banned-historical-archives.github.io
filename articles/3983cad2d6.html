icle":{"title":"胡耀邦同志在中央整党工作指导委员会第五次会议上的讲话（摘录）","dates":[{"year":1984,"month":1,"day":17}],"is_range_date":false,"authors":["中央整党工作指导委员会"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"成都军区整党办公室, 清理“三种人”工作文件摘编, 45-46","tags":[{"name":"老干部","type":"主题/事件"},{"name":"三种人","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"胡耀邦同志在中央整党工作指导委员会第五次会议上的讲话（摘录）"},{"type":"paragraph","text":"（一九八四年一月十七日）"},{"type":"paragraph","text":"……"},{"type":"paragraph","text":"六、关于清理“三种人”。这件事很重要，要抓紧抓好，多做少讲。多做少讲，就是工作要扎扎实实，但公开宣传要适当。报纸上这方面如果宣传太多，对党并不利，对国外影响也不好。还要注意批评和防止一部分领导干部只清反对过自己的那部分“三种人”，而不清保过自己的另一部分“三种人”。清理“三种人”，要按小平、陈云同志讲的，着重注意那些造反起家，比较年轻，潜伏下来的，对党危害大的人。至于那些年岁大了，已经清查和处理过了的而又没有发现新的或较大的问题的干部，我的意见一般地就不要再翻老账了。今后，我主张废除“新账旧账一起算”这个提法。一些老干部，这几年如未发现新问题，即使过去处理轻了也不要再处理了。当然有些人明显有错误而根本没有处理或把重要错误隐瞒现在被揭发出来了，都应实事求是地加以处理。有的人，这几年继续表现不好，还在反对党的十一届三中全会以来的路线，问题严重，确要处理的，那就处理这几年的问题，过去处理过的问题也不要重新搞了。“老账新账一起算”的做法不好，不得人心。"},{"type":"subtitle","text":"——摘自中央整党工作指导委员会，"},{"type":"subtitle","text":"中指发〔1984〕4号文件"}],"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3983cad2d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
