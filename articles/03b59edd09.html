rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华主席更高举起了毛泽东思想伟大旗帜","authors":[],"parts":[{"type":"paragraph","text":"新华社堪培拉一九七七年五月六日电 澳大利亚共产党（马克思列宁主义）机关报《先锋报》五月五日发表社论，赞扬以华主席为首的中国共产党更高地举起了毛泽东思想伟大旗帜。"},{"type":"paragraph","text":"社论说：“中国共产党在华国锋主席的英明领导下正在掀起一个社会主义建设的新高潮，粉碎‘四人帮’和消除‘四人帮’流毒的斗争取得了出乎人们预料的效果。”“农业学大寨、工业学大庆是以社会主义政治统帅社会主义建设的两个伟大的运动。”"},{"type":"paragraph","text":"社论说：“以华主席为首的中国共产党更高地举起了毛泽东思想伟大旗帜，以最快的速度组织了《毛泽东选集》第五卷的出版。它的出版加深了马克思、恩格斯、列宁、斯大林和毛泽东著作的整个研究工作。”"},{"type":"paragraph","text":"社论指出，“这部著作是对一切革命者的鼓舞和响亮的号召。”"},{"type":"paragraph","text":"社论最后说：“人民中国的伟大的社会主义成就象灯塔般照亮了全世界被压迫、被剥削人民前进的道路。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03b59edd09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
