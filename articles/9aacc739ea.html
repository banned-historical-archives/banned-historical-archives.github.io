rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"加强中委两国关系 反对大小霸权主义","authors":[],"parts":[{"type":"paragraph","text":"据新华社4月6日讯 中共中央副主席邓小平今天上午在会见委内瑞拉基督教社会党最高领导人拉斐尔·卡尔德拉和夫人时说，中国和委内瑞拉地处两个半球，但都面临着共同的问题，我们两国都要捍卫民族独立和维护国家尊严，反对霸权主义。我们不仅要反对大霸权主义，而且都有反对小霸权主义的问题。你们那里有一个古巴，我们这里也有一个“古巴”。我们两国应当加强友好关系。"},{"type":"paragraph","text":"邓小平说，现在国际上多事，我们很高兴能同拉美各国发展友好关系。我们对近年来中委两国关系的发展是满意的。"},{"type":"paragraph","text":"卡尔德拉说，我们感到要维护民族独立和国家主权，光说好话不行，必须要有明确的立场和态度。在这方面，中国的立场是明朗的。中国的立场有利于维持国际力量的平衡，有利于各国维护自主权。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9aacc739ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
