片的通知","authors":[],"dates":[{"year":1967,"month":11,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央、中央文革关于严禁私自翻印未发表过的毛主席照片的通知","type":"title"},{"text":"各省（市、自治区）革委会（筹备小组）、军管会、各级军区、各革命群众组织：","type":"appellation"},{"text":"最近，发现有些单位和个人私自翻印、出售未公开发表过的毛主席的照片（包括一些生活照片）和作品，严重地违背了党纪国法。对于这些利用翻印和出售毛主席照片和作品进行非法活动的单位和个人，必须严加追究。","type":"paragraph"},{"text":"毛主席是全中国人民和全世界革命人民的最伟大领袖。印刷、发表毛主席的照片和作品，是一个极其严肃的政治问题，决不能擅自行事，更不允许那些别有用心的人乘机捣乱。因此，中央决定：凡是未公开发表过的毛主席的照片和作品，不论个人或集体象，未经中央审查同意，一律不得私自翻印。此事以前业已通知过，现在再通知一次，望你们按此通知严格监督执行。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第五集）》， 北京：1968年1月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7dd8d1cc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
