art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"再次表示坚决反对修正主义","authors":[],"parts":[{"type":"paragraph","text":"据新华社索非亚28日电保加利亚和匈牙利两国党和政府代表团28日发表的会谈公报再一次表示两国同修正主义进行斗争的决心。公报说，两个兄弟党认为自己的首要任务是进行反对修正主义和机会主义以及反对任何歪曲马克思列宁主义理论的现象的斗争，它们的任务是：进行保卫马克思列宁主义学说思想纯洁性的斗争。"},{"type":"paragraph","text":"公报说，两党代表确认，共产党和工人党代表莫斯科会议的两项宣言的正确性和历史意义已经得到了完全的证实。目前，共产党和工人党的兄弟联盟和以苏联为首的社会主义阵营的团结更加加强了。"},{"type":"paragraph","text":"保加利亚人民赞同匈牙利法院对社会主义和匈牙利人民的叛徒纳吉·伊姆雷和他的叛国集团的判决，认为这表现了匈牙利工人阶级和劳动人民捍卫人民民主制度和自己的社会主义成果的决心。"},{"type":"paragraph","text":"公报强调指出，战争与和平的问题是目前国际关系的中心。目前，和平力量无疑胜过战争力量。但是，和平力量必须随时提高警惕，必须估计到，帝国主义势力总是企图恶化国际局势、挑拨各国间的关系。"},{"type":"paragraph","text":"公报指出，帝国主义集团企图把人民民主国家地位问题列入高级会议议程之内，这是一种粗暴地干涉这些国家内政的行为。公报说，我们这些主权国家决不允许任何人干涉它们的内政。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"402d0f61dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
