script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"川沙县江镇公社掀起大学习大批判新高潮把狠批修正主义建党路线作为当前首要任务广大贫下中农、革命干部边学习边批判，提高了思想认识和政治觉悟","authors":[],"dates":[{"year":1967,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　川沙县江镇公社广大贫下中农，牢牢掌握斗争大方向，掀起了一个大学大用毛主席建党思想，彻底批判中国赫鲁晓夫的修正主义建党路线的新高潮。"},{"type":"paragraph","text":"为了发动广大群众狠批中国赫鲁晓夫的建党路线，前几天，公社召开了三级干部会议，决定把大树特树毛主席的建党路线，大批特批中国赫鲁晓夫的修正主义建党路线，作为全公社当前的首要任务，以此推动各项工作的胜利开展。为了搞好这项工作，各个大队还建立了批判中国赫鲁晓夫建党路线的核心小组，全面领导各生产队进行大学习、大批判。"},{"type":"paragraph","text":"几天来，全公社广大贫下中农通过大学习、大批判，大大激发了对我们敬爱的伟大领袖毛主席的无限热爱和政治热情，进一步认识到中国共产党的伟大、光荣、正确。许多大队和生产队的贫下中农和革命干部，一边学习，一边批判，一边议论，既学习了毛主席光辉的建党思想，用毛泽东思想武装了自己的头脑，又对中国赫鲁晓夫那一套修正主义的建党路线进行了深刻的批判，从而提高了思想认识和政治觉悟。广大革命群众深有体会地说:这样的大学习、大批判好得很!只有广大群众都发动起来进行革命大批判，才能彻底肃清中国赫鲁晓夫修正主义建党路线的流毒。"},{"type":"paragraph","text":"广大贫下中农通过大学习、大批判，一致认识到，中国共产党应该是由无产阶级先进分子组成的。但中国赫鲁晓夫却大肆贩卖“全民党”的修正主义黑货。华路大队党支部书记姜顺福说，中国赫鲁晓夫阴谋把无产阶级先进分子组成的党变为“全民党”，就是想复辟资本主义。"},{"type":"paragraph","text":"目前，这个公社的大学习、大批判，已经深入到生产队的三组一校(田头学习组、宅头学习组、家庭学习组、学习毛泽东思想夜校)，广大贫下中农把三组一校变成大学毛主席建党思想的大课堂，狠批中国赫鲁晓夫修正主义建党路线的大战场。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93f3d76108"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
