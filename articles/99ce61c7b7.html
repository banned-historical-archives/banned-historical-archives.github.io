片）","authors":[],"dates":[{"year":1975,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的革命文艺路线胜利万岁"},{"type":"paragraph","text":"革命现代舞剧《沂蒙颂》、《草原儿女》彩色电影剧照"},{"type":"paragraph","text":"《沂蒙颂》：方排长负伤干渴垂危，山上又找不到水。英嫂突然想到乳汁可以救伤员。"},{"type":"paragraph","text":"《沂蒙颂》：方排长沉着机智地躲过敌人的搜捕。《沂蒙颂》：鸡汤送亲人，阶级情谊深。《沂蒙颂》：英嫂和春兰，涉浅溪，绕小路，去给伤员送汤饭。《沂蒙颂》：大军胜利返回沂蒙山，英嫂和乡亲们送康复的方排长归队。"},{"type":"paragraph","text":"《草原儿女》：斯琴急切地追赶羊群，丢失了靴子。她不顾艰难，顽强地在暴风雪中行进。《草原儿女》：小兄妹冒飞雪，战风暴，奋力护羊，拢羊入圈。《草原儿女》：草原儿女心向党，立志接好革命班。《草原儿女》：草原军民逮住了险恶的反动牧主巴彦。《草原儿女》：在斗争的风浪中锻炼成长的草原儿女，扬鞭策马，驰骋在辽阔的草原上。"},{"type":"paragraph","text":"（本版图片均为新华社稿）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99ce61c7b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
