<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本人民坚决反对美国核军舰停泊  举行大规模反美示威，同反动警察激烈搏斗  宫本修正主义集团竟然充当佐藤政府帮凶阻挠反美斗争","authors":[],"dates":[{"year":1968,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本人民坚决反对美国核军舰停泊"},{"type":"paragraph","text":"举行大规模反美示威，同反动警察激烈搏斗"},{"type":"paragraph","text":"宫本修正主义集团竟然充当佐藤政府帮凶阻挠反美斗争"},{"type":"paragraph","text":"据新华社二十一日讯  据东方通讯社报道：日本爱国工人和学生二十一日在佐世保掀起大规模的反美爱国斗争，继续坚决反对美帝国主义的核航空母舰“企业号”闯入佐世保。这场斗争吓得美帝国主义和佐藤反动政府胆战心惊。"},{"type":"paragraph","text":"佐藤政府一清早就调集大批警察和装甲车，封锁了通往佐世保美军基地的那条道路。下午，爱国学生一千五百人不顾反动政府的阻挠和镇压，在举行了抗议集会以后，涌向美军基地举行示威。他们和警察展开了激烈的搏斗。反动警察向他们喷射毒水，放毒气弹，用警棍殴打他们，打伤多人，逮捕十一人。但是，学生们继续英勇地坚持斗争。他们用棍棒进行还击，并且夺取了警察使用的两辆装甲车。一百名学生冲到美军基地周围。有两名学生越过铁丝网冲进了基地，被反动警察逮捕。"},{"type":"paragraph","text":"一万五千名工人大力支持爱国学生的英勇斗争。他们和学生一起向美军基地进军。福冈市的一些革命群众也赶来参加了这次斗争。在现场附近的二万多市民对佐藤反动政府指使警察镇压人民反美爱国斗争的暴行表示非常愤怒。他们声援工人和学生的行动，向反动警察猛烈地投掷石块。到下午五点，爱国工人、学生和市民还在通往美军基地的桥上向反动警察愤怒抗议。斗争坚持了六个小时，直到晚间七点才结束。"},{"type":"paragraph","text":"在日本人民群情激愤的抗议下，美军当局不得不下令禁止“企业号”的水兵上陆。"},{"type":"paragraph","text":"宫本修正主义集团又一次帮助日本反动政府镇压人民的反美爱国斗争。在反动警察的同意下，这个叛徒集团的分子使用暴力阻止爱国学生参加抗议集会。他们还要求警察去用暴力镇压学生。他们的卑鄙行为受到在现场的广大市民的严正谴责。"},{"type":"paragraph","text":"神奈川县、东京以及关东、东北地区的爱国工人和学生三千多人，二十一日在美国第七舰队基地横须贺举行了抗议集会。"},{"type":"paragraph","text":"大会结束后，全体与会者打着红旗，斗志昂扬地举行了游行示威。"},{"type":"paragraph","text":"东京的工人、学生、妇女、贸易界人士等约七千人二十日在东京日比谷公园举行集会，强烈反对“企业号”停泊，谴责佐藤反动政府对爱国学生的镇压。"},{"type":"paragraph","text":"与会者的头巾上写着：“美帝国主义从日本滚出去！”“打倒佐藤政府！”“毛泽东思想万岁！”会场上红旗林立，其中有写着“毛泽东思想万岁”的旗帜和越南南方民族解放阵线的旗帜。会场上洋溢着日本人民同中国人民和越南人民团结战斗的气氛，会后举行了示威游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1123b0f37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
