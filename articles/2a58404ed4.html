tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做毛主席的好战士","authors":[],"parts":[{"type":"paragraph","text":"想想雷锋同志在旧社会所遭受的残酷压迫，再看看他在新社会获得的新生，不能不引起我们内心的激动。是谁把走头无路的流浪儿——雷锋，从死亡的边沿救了回来？是谁使雷锋获得了幸福生活和受教育的机会？是谁哺育了雷锋，使他从少先队员到共青团员，终于成长为光荣的共产党员？不是别人，正是我们伟大的党和伟大的领袖毛主席。"},{"type":"paragraph","text":"雷锋从他切身的经历和被压迫阶级的本性出发，深深懂得巩固和保卫革命胜利果实的重大意义。他决心永远跟着党和毛主席走。他在日记上写道：“我要把自己永远忠于党、忠于人民赤诚的心，贡献给党的伟大事业，我要无愧地做一个毛主席的好战士。”"},{"type":"paragraph","text":"我们其他同志的经历，虽然和雷锋不尽相同，可是我们同雷锋却有着共同的思想。回想旧中国在帝国主义和国民党反动派统治之下，贫困落后，民不聊生；不要说幸福生活，人民连起码的生存权利也没有保障。再看看今天，社会主义革命和社会主义建设获得了一连串的伟大胜利，我们可爱的祖国日益繁荣富强，人民的生活逐步得到了改善。新旧社会鲜明对比之下，正如雷锋所说：没有党和毛主席领导革命，哪能有今天？因此，我们也同雷锋一样，衷心感谢党和毛主席的正确领导，决心做毛主席的好战士，保卫伟大的祖国和人民的幸福生活。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a58404ed4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
