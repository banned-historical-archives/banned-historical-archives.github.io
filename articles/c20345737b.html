hors":[],"dates":[{"year":1957,"month":7,"day":23}],"is_range_date":false,"parts":[{"text":"海外敌特机关派遣特务到上海收买反共分子","type":"title"},{"text":"新华社上海23日讯  最近，海外敌特机关派遣特务搜集有关我反右派斗争中的情报。蒋特情报局曾特别指示他们详细搜集受到批判的干部、民主人士的反应，从中物色“策反”对象，只要反共的就积极趁机收买他们参加组织，具体规定的策反对象有国营企业工程师、学校敎员、鉄路机车驾驶员、国家机关干部，甚至高级民主人士。（现已逮捕了九个特务）","type":"paragraph"},{"text":"另外各种敌对分子普遍地写信支持右派分子，甚至把汚蔑我党和政府的信寄给资本主义国家在上海的领事馆。一些在肃反中被审查的人还写信给英国驻沪参赞浦澜和印度、瑞士等国家领事馆，汚蔑我肃反运动。（鲁影）","type":"paragraph"}],"comments":[],"origin":"新华通訊社編：《内部参考》，第2266期，1957年7月25日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c20345737b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
