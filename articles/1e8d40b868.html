<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在阶级斗争风浪中培养接班人  密云县委热情帮助青年干部迅速成长，用老中青三结合领导班子日益发展巩固的事实，反击右倾翻案风","authors":[],"dates":[{"year":1976,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在阶级斗争风浪中培养接班人"},{"type":"paragraph","text":"密云县委热情帮助青年干部迅速成长，用老中青三结合领导班子日益发展巩固的事实，反击右倾翻案风"},{"type":"paragraph","text":"据新华社一九七六年三月十五日讯　中共北京市密云县委积极培养和选拔青年干部，热情帮助他们在斗争中锻炼成长。无产阶级文化大革命和批林批孔运动以来，这个县选拔到各级领导班子里的青年新干部共有九百七十多人，占县、公社和生产大队三级干部总数的百分之四十三点六。这些新干部在老、中、青三结合的各级领导班子中发挥了积极作用。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展以来，密云县委重温毛主席关于培养和造就千百万无产阶级革命事业接班人的教导，回顾了这些年来坚持培养和选拔新干部的斗争历程，总结了建立和巩固老、中、青三结合的各级领导班子的经验。他们决心在两个阶级、两条路线的斗争中进一步做好培养和选拔新干部的工作，巩固和发展无产阶级文化大革命和批林批孔运动的胜利成果，坚决反击右倾翻案风。"},{"type":"paragraph","text":"“无产阶级革命事业的接班人，是在群众斗争中产生的，是在革命大风大浪的锻炼中成长的。”密云县委遵照毛主席这一教导，按照毛主席提出的无产阶级革命事业接班人的五项条件，坚持在三大革命运动第一线培养和选拔青年干部。县委注意搞好调查研究，作出培养和选拔青年干部的规划和安排，有计划地分期分批地把青年干部放到群众斗争中经风雨，见世面，让他们在斗争中学习，在斗争中成长。现任密云县商业局党委副书记的陈伯伦，就是在无产阶级文化大革命中成长起来，经历了复杂的阶级斗争锻炼的青年干部。为了培养这个青年干部，县委曾经安排他到一个后进的生产大队去蹲点。这个大队阶级斗争十分尖锐复杂，是有名的“老大难”单位。陈伯伦到了这个大队后，在党的基本路线指引下，深入进行调查研究，抓住阶级斗争这个纲，紧密团结干部和群众，揭露和打击阶级敌人的破坏活动，批判资本主义倾向，迅速改变了这个大队的落后面貌。密云县各级领导班子里的新干部，大多经过这样的培养和锻炼。"},{"type":"paragraph","text":"在青年干部走上领导岗位之后，为了用马克思主义、列宁主义、毛泽东思想武装他们，县委和各级党委经常帮助和组织他们认真看书学习，不断提高理论水平和路线斗争觉悟。"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，密云县委用全县广大青年新干部健康成长，在各条战线上作出积极贡献和全县各级老、中、青三结合领导班子日益发展巩固的铁的事实，深入批判了党内那个不肯改悔的走资派否定无产阶级文化大革命，否定文化大革命中涌现出来的社会主义新生事物，攻击革命新生力量的谬论。他们决心坚持以阶级斗争为纲，把培养和选拔青年新干部的工作作为反修防修，巩固无产阶级专政，防止资本主义复辟的一件大事，进一步抓紧抓好，以实际行动回击右倾翻案风。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e8d40b868"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
