script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海警备区某警卫部队举行座谈会盛赞周总理　狠批“四人帮”","authors":[],"dates":[{"year":1977,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　曾经多次担负警卫周总理光荣任务的上海警备区某警卫部队的指战员们，怀着对周总理无比爱戴的心情，召开座谈会、报告会，热情赞颂周总理的光辉革命实践，愤怒声讨“四人帮”反对和迫害周总理的滔天罪行。"},{"type":"paragraph","text":"指战员们热情赞扬周总理热爱毛主席，为贯彻执行毛主席革命路线英勇战斗了一生的伟大革命精神。大家说，敬爱的周总理每次来上海，总是带着马列著作和毛主席著作，挤时间学习，而且关心我们的学习，多次询问我们的学习情况。他语重心长地教育我们，要听毛主席的话，多看马列和毛主席的书，提高政治觉悟。"},{"type":"paragraph","text":"干部、战士们满怀激情地说:我们敬爱的周总理处处以身作则，严格要求自己，生活十分俭朴。服务员发现总理那件衬衣已不经洗了，建议换件新的，周总理执意不肯，亲切地对服务员说:“还可以穿，不要添置了。”总理食用也很简单，伙食一再不准超过标准。对于庭院布置，总理更是要求革命化。三连副连长深情回顾说:“一次，总理看到一块新翻地没有种东西，就问我们种什么，我们告诉总理，准备搞成草坪，种些花草。总理听后微笑地说:种那些花草干什么，种上一些成材的树木，或者油料作物，减轻人民负担。”按照总理的指示，我们种上了花生，总理知道后十分满意。"},{"type":"paragraph","text":"抚今追昔，敬爱的周总理的光辉形象更加光彩夺目。警卫战士决心在英明领袖华主席为首的党中央领导下，把深入揭批王张江姚反党集团滔天罪行的斗争进行到底!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"459d04417f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
