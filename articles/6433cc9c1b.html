script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我怎样轻视劳动人民和追求资产阶级生活方式","authors":["倪墨炎"],"dates":[{"year":1952,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陆行中学学生　倪墨炎"},{"type":"paragraph","text":"我从小生长在农村中，爸爸是个小商人，我年幼的时候他就死了，对我影响不深。母亲是农家出身，刻苦耐劳，所以我的家庭成份，和农民是较接近的。但是在“五反”学习的时候，我发掘出了许多卑鄙腐朽的资产阶级思想，这是由于资产阶级的文艺书籍给我的影响；中毒最深的要算“风萧萧”(徐訏著)。"},{"type":"paragraph","text":"起初我对这本书中宣扬资产阶级荒淫的生活，是感到讨厌的，觉得农民们一天到晚的辛苦耕种，流血流汗，还吃不饱、穿不暖；而他们毫不劳动，却终天狂饮大吃，侈奢到了极点!但看到后面，作者告诉我:他们也是“抗日”的。等到把书读完，觉得他们既然也是“抗日”的，那末狂饮大喝也是可以的。所以我不但不再讨厌那种生活方式，反而由羡慕而甚至追求那种生活方式了。由这种思想指导下，所以当我担任学生会工作时，学生会派我到市区办事去，我不愿坐电车而要坐三轮车，有时还把公家的钱积下来，自己化用，认为我为同学服务，享受一下也呒啥关系。我读书也用功起来了，为的是以后可以多享受!"},{"type":"paragraph","text":"我还产生了“一鸣惊人”的思想。想做“出人头地”“与众不同”的人，让大家重视我。退课的时候，我突然怪叫几声；组织上有什么布置，我就发顿牢骚；后来我写通讯稿投到报纸上去刊登，也是为了要叫大家知道我是“不平凡”的人。"},{"type":"paragraph","text":"总之，我读了“风萧萧”和其它一些资产阶级的作品，开始改变。从靠近农民的我，变得在思想上靠近资产阶级的人了。"},{"type":"paragraph","text":"感谢“五反”学习对我的重大教育，使我发掘出了过去受资产阶级书籍的影响，给我指出了自我改造的方向。今后我要热烈地认真地投入思想改造运动，清除一切非无产阶级的思想，建立正确的人生欢，做一个名符其实的青年团员!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6433cc9c1b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
