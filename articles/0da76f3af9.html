art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底粉碎资产阶级反动路线的新反扑","authors":["福州部队学习毛主席著作积极分子王龙光"],"parts":[{"type":"paragraph","text":"我最坚决地拥护和响应中共中央、国务院、中央军委、中央文革小组的号召，学习上海市革命造反派的战斗精神，坚决保卫以毛主席为代表的无产阶级革命路线，坚决保卫毛主席。"},{"type":"paragraph","text":"正当以毛主席为代表的无产阶级革命路线，日益为广大群众所掌握，取得一个又一个的伟大胜利的时候，党内一小撮走资本主义道路的当权派，极少数坚持资产阶级反动路线的顽固分子，不甘心死亡，疯狂反扑。他们用经济收买的手段，腐蚀群众的革命意志，把政治斗争引向经济主义的歧途，来对抗毛主席，对抗党中央，企图扼杀无产阶级文化大革命。这些反动家伙，如同帝国主义和世界上的反动派一样，他们捣乱，失败，再捣乱，再失败，终究要自取灭亡。"},{"type":"paragraph","text":"这些反动家伙所玩弄的经济主义花招，就是提倡修正主义的物质刺激，以维护资本主义的私有制，这是彻头彻尾的反马克思列宁主义、反毛泽东思想、反社会主义的反革命修正主义货色。我们决不能让敌人的阴谋得逞。"},{"type":"paragraph","text":"“抓革命，促生产”是我们伟大领袖毛主席提出的正确方针。这个方针就是要“公”字当头，搞好人的思想革命化，从而促进生产，夺取文化大革命和生产双丰收，双胜利。因此，我们要坚决执行以毛主席为代表的无产阶级革命路线，站在革命造反派的一边，坚决反对经济主义，坚决打退资产阶级反动路线的新反扑，誓把无产阶级文化大革命进行到底。"}],"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0da76f3af9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
