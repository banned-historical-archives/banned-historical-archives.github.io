script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本剥削和压迫  反对资产阶级腐朽教育制度  意大利工人农民和学生愤怒上街示威","authors":[],"dates":[{"year":1969,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本剥削和压迫  反对资产阶级腐朽教育制度"},{"type":"paragraph","text":"意大利工人农民和学生愤怒上街示威"},{"type":"paragraph","text":"新华社二十一日讯　罗马消息：意大利工人、农民和学生连续举行罢工罢课和游行示威，反对垄断资产阶级的剥削和压迫，反对资产阶级腐朽的教育制度。"},{"type":"paragraph","text":"意大利工人从新年开始掀起的罢工浪潮正连绵不断地向前发展。前几天，墨西拿、阿格里琴托、拉古扎、那不勒斯等许多地方刚刚举行过要求增加工资的总罢工，二十日，意大利北部的科摩省，七万产业工人又举行了二十四小时的总罢工。二十一日，艾米利亚区和撒丁区的全部工厂开始停工四十八小时。罗马市公共交通运输部门的工人于十七日和二十一日也先后举行了第三次和第四次罢工，要求增加工资。"},{"type":"paragraph","text":"意大利农业工人反对地主资本家的残酷剥削，反对政府农业政策和要求改善他们困苦处境的斗争也在日益高涨。二十日，意大利的艾米利亚、托斯卡纳、乌姆布利亚、马尔凯、阿浦利亚和西西里区等所有最重要的农业地区的几十万农业工人和佃农举行了声势浩大的罢工。他们愤怒地走上街头，举行游行示威，以表示他们的抗议。"},{"type":"paragraph","text":"为了反对意大利当局腐朽的资产阶级教育制度，进步学生再次掀起了新的斗争浪潮。在过去几天中，学生们占领了米兰的工学院、特兰托的社会学院和彼萨的医学院。在意大利北部的萨沃纳和科摩等地，有数千名学生最近连续举行了罢课和示威游行。在西西里区的马尔萨拉，有三百名小学生也于十八日举行罢课，要求改善教学条件。罗马和其他一些城市的学生也一再举行示威游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e97551b3e9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
