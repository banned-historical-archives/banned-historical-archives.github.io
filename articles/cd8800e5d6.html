rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中越两国政府签订一九七四年中国给予越南无偿经济和军事援助协定黎笋；范文同；周恩来；叶剑英；张春桥同志参加签字仪式李先念副总理清毅副总理分别代表本国政府在协定上签字","authors":[],"parts":[{"type":"paragraph","text":"新华社北京一九七三年六月八日讯 为了在越南停战后医治战争创伤，恢复和发展国民经济，增强国防力量，进一步加强中、越两国人民之间的战斗友谊和团结，中华人民共和国政府和越南民主共和国政府今天在这里签订了关于一九七四年中国给予越南无偿经济和军事援助的协定。"},{"type":"paragraph","text":"越南劳动党中央委员会第一书记黎笋，越南劳动党中央委员会政治局委员、越南民主共和国政府总理范文同，中共中央政治局常委、国务院总理周恩来，中共中央政治局委员、中共中央军委副主席叶剑英，中共中央政治局委员张春桥，参加了签字仪式。"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理李先念和越南劳动党中央委员会政治局委员、越南民主共和国政府副总理黎清毅分别代表本国政府在协定上签字。"},{"type":"paragraph","text":"越南方面参加签字仪式的还有：李班、吴船、阮文广、黄文进、陈参、窦玉春、黄国勇、阮兴定、刘文利、黄宝山、阮玉苑、丁文簪、阮世庆、阮进等。"},{"type":"paragraph","text":"中国方面参加签字仪式的还有：耿飚、方毅、李强、韩念龙、张才千、苑化冰、王幼平、陆维钊、梁枫、朱传贤等。"},{"type":"paragraph","text":"图为中共中央政治局委员、国务院副总理李先念和越南劳动党中央委员会政治局委员、越南民主共和国政府副总理黎清毅分别代表本国政府在协定上签字。 新华社记者摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd8800e5d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
