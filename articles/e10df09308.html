tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苏联三名记者应离开中国苏记者长期进行反华报道；对我文化大革命极尽造谣诬蔑之能事；根据对等原则，苏方没有理由在中国保留六名记者","authors":[],"parts":[{"type":"paragraph","text":"新华社十六日讯 我国外交部新闻司副司长陈维帆今天召见苏联驻华大使馆临时代办拉兹杜霍夫，正式通知他：苏联驻我国六名记者中的三名应在十二月二十五日以前离开中国。"},{"type":"paragraph","text":"陈维帆副司长在召见苏联驻华大使馆临时代办拉兹杜霍夫时指出：长期以来，苏联驻华记者为了适应苏联修正主义领导集团反华的需要，利用我国政府和人民基于维护两国人民友好的愿望提供的各种方便，一贯进行反华报道，特别是最近一个时期，对我国无产阶级文化大革命极尽造谣诬蔑之能事。这种造谣诬蔑已经为以美国为首的帝国主义，提供了大量的反华宣传资料。我们绝对不能容忍这种蓄意挑拨和破坏中苏两国人民友谊的活动，绝对不能容忍对我国的公然挑衅。"},{"type":"paragraph","text":"陈维帆副司长提出：根据对等原则，苏联方面没有理由在中国保留六名记者，中国在苏联的记者也只有三人。为此，苏联驻我国六名记者中的三名应在十二月二十五日以前离开中国。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e10df09308"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
