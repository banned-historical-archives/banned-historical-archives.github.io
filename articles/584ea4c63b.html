rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席在军队里建党","authors":[],"parts":[{"type":"paragraph","text":"我军在初创时期，部队中没有普遍建立党的组织。为了适应部队建设的需要，巩固和提高部队的战斗力，毛主席亲自抓在军队里建党的工作，首先在秋收起义部队里着手进行。那时，每天行军，毛主席走在战士的行列中，今天到这个连，明天又到那个连，走到哪里就和哪里的战士们亲切交谈。毛主席问战士们在家里是做什么的？怎样参加革命队伍的？了解战士们对革命的认识，对目前形势的看法，还帮助炊事员挑担子。战士们知道这位身材魁梧、态度亲切的人是中央派来的毛委员时，都高兴得不得了，和毛主席更亲近了，纷纷向毛主席诉说自己的经历和心里话。就这样，毛主席通过深入细致的工作，调查研究了部队的政治和思想情况。一九二七年九月二十九日，毛主席率领部队进驻江西永新县的三湾村，进行了著名的“三湾改编”。三湾改编后，在湖南酃县水口，毛主席亲自主持在一个团里发展了六个共产党员。"},{"type":"paragraph","text":"在一个夜晚，党代表带新入党的同志去团部开会，举行入党宣誓。会议地点在靠近水口街的一个祠堂的阁楼上。毛主席也来了。等人到齐后，毛主席便站到桌旁宣布说：好吧，现在开会。大家的心激动地跳起来。先由各个入党介绍人介绍了新党员的简历。接着，毛主席便走到六个新党员面前，依次询问了很多问题。毛主席问一个同志：你为什么要求加入共产党？这个同志回答：“要翻身，要打倒土豪劣绅，要更坚决地革命！”毛主席点头说：很好，很好。接着，毛主席详细地解释了入党誓词，又亲自带领大家宣誓。他庄严、洪亮的声音在每个新党员的心里激荡。宣誓结束后，毛主席对大家说：从现在起，你们都是光荣的共产党员，今后要团结群众，发挥先锋模范作用，革命要坚决，要革命到底。"},{"type":"paragraph","text":"从这开始，在毛主席的亲自领导下，我军部队中建立了党的各级组织，确立了“支部建在连上”，营、团有党委，在连以上各级设置党代表的制度，使部队有了坚强的领导和团结的核心。我军在毛主席革命路线的指引和党的绝对领导下不断发展壮大，从胜利走向胜利。（根据革命回忆录编写）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"584ea4c63b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
