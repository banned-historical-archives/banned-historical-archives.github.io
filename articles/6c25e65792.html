script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"关于华北作战的战略意见","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1937,"month":9,"day":25}],"parts":[{"text":"关于华北作战的战略意见","type":"title"},{"type":"appellation","text":"朱、彭、任、周并告林彪："},{"type":"paragraph","text":"战略意见："},{"type":"paragraph","text":"甲、依据现时敌攻保定、代州并向石家庄、太原，对灵、涞、广、蔚四县似乎没有多兵据守的情况，依据蒋、阎谈决在保定取决战方针，在晋北取固守方针的情况，为阻敌南占太原、石家庄，支持华北的持久战起见，拟建议蒋、阎派何柱国骑兵军全部，另派桂军或中央军有力步兵一万五千至二万人，与我林师全部配合，受朱、彭指挥，在蔚、涞之敌向保定前进，灵、广之敌向代州前进确已深入之际，从灵、涞之间向北突击（反攻性质的中央突破），恢复灵、涞、广、蔚四县，然后向着大同、张家口、北平线，大同、太原线，北平、石家庄线，举行大规模的侧后袭击战，在灵、涞、广、蔚建立群众的及堡垒的根据地。如此着成功，还可用相当一部进出热河方向，如此或能造成华北战争的新局面，支持相当时期的持久战。请你们考虑之后向蒋、阎建议。"},{"type":"paragraph","text":"乙、不管蒋、阎协助与否，目前红军不宜过早暴露，尤不宜过早派遣战术支队，应候蔚、涞之敌脱离蔚、涞攻至满城附近，灵、广之敌脱离灵、广攻至繁峙附近，上述四县兵力极少之际（此时，涿州之敌当攻至徐水附近，大同之敌当攻至雁门关附近），然后使用我林师全部向北突出，依情况再分成无数小支或分成二三个集团，向着恒山山脉以东以西以北广大地区敌之空虚侧后，举行广泛的袭击战。若在敌之主力尚未集中于其主要的攻击点、敌之后方尚未十分空虚之时，暴露红军目标，引起敌人注意，那是不利的。若仅派遣战术支队，那是无益的。"},{"type":"paragraph","text":"丙、如同意上述意见，就请暂时把我军兵力一概隐蔽并养精蓄锐，待必要条件具备时实行，那时应以王震部位于策应前方、保持后路之地区。贺师在晋西北之使用同此原则。"},{"type":"paragraph","text":"丁、如出至敌后，须采取没收大地主政策，广泛发动群众，红军便不孤立。"},{"type":"paragraph","text":"戊、蒋、阎保定决战、晋北固守的方针（见蒋十九日部署电），完全是处在被动的挨打的姿势下，如无上述一支奇兵袭入敌后，决难持久，只有实行上述计划才能变被动为主动。现在仅仅剩下此一着活棋，应向蒋、阎极力建议（暂不说红军单独行动，只要求派兵协助）。"},{"type":"paragraph","text":"己、如能实现上述计划，即使保定、代州失守，也是不怕的。没有某些地方失守之代价，不能取得敌后活动的便利。"},{"type":"paragraph","text":"庚、实行上述计划，须在灵、涞、广、蔚敌军甚少之条件下，须有敌后方敌兵不易活动而我步兵易于活动之地形条件。"},{"type":"paragraph","text":"辛、以上作为一种提议，请考虑电复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二十五日"}],"comment_pivots":[{"part_idx":1,"offset":7,"index":1},{"part_idx":1,"offset":11,"index":2},{"part_idx":3,"offset":13,"index":3},{"part_idx":3,"offset":30,"index":4},{"part_idx":3,"offset":49,"index":5},{"part_idx":3,"offset":105,"index":6},{"part_idx":3,"offset":291,"index":7},{"part_idx":5,"offset":46,"index":8},{"part_idx":5,"offset":64,"index":9}],"is_range_date":false,"authors":["毛泽东"],"comments":["朱，指朱德。彭，指彭德怀，当时任八路军副总司令。任，指任弼时，当时任八路军政治部主任。周，指周恩来。","林彪，当时任八路军第一一五师师长。","代州，今代县。","指山西的灵丘、广灵和河北的涞源、蔚县。","蒋，指蒋介石。阎，指阎锡山，当时任国民党军第二战区司令长官。","何柱国（一八九七——一九八五），广西容县人。当时任国民党军骑兵第二军军长。","热河，指热河省，见本卷第5页注〔5〕。","王震，当时任八路军第一二○师第三五九旅副旅长。","贺师，指贺龙任师长的八路军第一二○师。"],"page_start":38,"page_end":40,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c25e65792"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
