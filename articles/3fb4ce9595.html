举行二十年来的第一次示威","authors":[],"dates":[{"year":1971,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本残酷剥削"},{"type":"paragraph","text":"法国几十万工人在全国各地罢工示威"},{"type":"paragraph","text":"巴黎地区一万多名建筑工人举行二十年来的第一次示威"},{"type":"paragraph","text":"新华社巴黎二十二日电　法国几十万建筑工人、冶金工人和其他行业工人二十一日在全国各地举行罢工、停工、游行和集会，抗议垄断资本的残酷剥削，要求增加工资和改善工作条件。"},{"type":"paragraph","text":"在巴黎地区，一万多名建筑工人举行了一个小时的示威游行。巴黎地区建筑工人的示威是二十年来第一次。"},{"type":"paragraph","text":"在上加龙省有二万二千名建筑工人举行了二十四小时的罢工。在波尔多有一千名工人举行了示威游行。在阿尔卑斯滨海省、卢瓦尔省、罗纳河口省、图卢兹、雷恩等地，成千上万的建筑工人也分别举行了罢工、集会和游行。"},{"type":"paragraph","text":"各地的冶金工人也举行了罢工、集会和游行。在布洛涅—比扬古约有二万名工人参加了罢工和集会。在阿登、瓦朗斯盆地、桑布尔河盆地、塞纳滨海省、罗纳河口省等地，都有数以万计的工人参加了罢工。在卡尔瓦多斯省有十个企业的一万七千名冶金工人也举行了时间不等的罢工。在里昂、圣艾蒂安工人举行了示威游行。三万二千名纸板厂工人也举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fb4ce9595"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
