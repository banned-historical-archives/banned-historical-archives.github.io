" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji11","name":"毛泽东全集第11卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"在统一战线中进一步执行独立自主原则","alias":"","parts":[{"type":"paragraph","text":"在统一战线中进一步执行独立自主原则"},{"type":"paragraph","text":"（1937年11日15日）周“，并告朱、彭、任："},{"type":"paragraph","text":"甲、周元亥电悉。"},{"type":"paragraph","text":"乙、目前山西工作原则是“在统一战线中进一步执行独立自主”，因为国民党及阎、黄、卫在日寇打击之下，已基本上丧失在"},{"type":"paragraph","text":"[1]周，指周恩来。[2]朱、彭、任，指朱德、彭德怀、任弼时。"},{"type":"paragraph","text":"[3]指周恩来1937年11月13日先后给毛泽东等的两份电报。前一份电报中说，沪、宁的求和空气渐浓，普局也危，建议：（一）以反对妥协求和、坚持华北抗战为一切动员的中心；（二）强调游击抗战，争取和影响友军同我们一致行动；（三）广泛发展游击战争，并训练干部，以坚持抗战；（四）扩大八路军，以增强主力的决定作用；（五）放手收容溃兵散枪及资财；（六）加强各军区工作；（七）实现地方政治民主化；（八）实行党的战区政策，并组织民众发动群众斗争；（九）加强反汉奸的斗争。后一份电报中说，华北随着由正规战转到游击战，八路军将取得领导地位。但目前我们仍以在取得南京当局和阎锡山的同意和接济的情况下布置华北游击战，较易于争取友军，扩大八路军，发展游击战争，电报还谈到同卫立煌、黄绍站商谈的情况，建议在同阎锡山、彭德怀商谈后再返延安。"},{"type":"paragraph","text":"[4]阎、黄、卫，指阎锡山、黄绍、卫立煌，当时分别任国民党军第二战区司令长官、副司令长官和第十四集团军总司令。山西继续支持的精神与能力。我们须自己作主，减少对于他们的希望与依靠，故“独立自主”之实行，须比较过去“进一步”，这是完全必要的。但仍然是在统一战线中的独立自主，不是绝对的独立自主。在大的方面仍应与国民党及阎、黄、卫商量，例如周电所述各条及朱、彭要求补充等是完全对的，仅仅不要希望与依靠他们，因为他们答应的东西很多不能兑现。我们计划要放在他们不答应不兑现不可靠时，我们还是能够干下去这样一个基点上。"},{"type":"paragraph","text":"丙、同意与朱彭任、阎黄卫见面后回延安，回时取道延长为宜，请朱、彭、任快点过汾河会商，以在县为宜。"},{"type":"paragraph","text":"毛泽东十五日十二时"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":390,"page_end":391},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1318457d70"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
