tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛泽东同志诞辰120周年全军书法作品展览开幕","authors":["王伟/安普忠"],"parts":[{"type":"paragraph","text":"本报北京12月25日电 王伟、记者安普忠报道：翰墨飘香，诗词雅韵。由总政宣传部与中国书法家协会联合举办的纪念毛泽东同志诞辰120周年全军书法作品展览，今天上午在中国革命军事博物馆开幕。"},{"type":"paragraph","text":"此次展览共征集作品2408件，经专家认真评审遴选，共评出一等奖作品10件，二等奖作品22件，三等奖作品30件，入展作品336件，组织工作奖6个。展出的近400件作品，主题鲜明，内容丰富，形式多样，深情赞颂毛泽东同志为中国革命和建设所作出的卓越贡献，真诚抒发部队官兵和人民群众对毛泽东等老一辈无产阶级革命家的崇敬之情，集中展示了军队书法创作的最新成果。除评选出的入展作品外，邀请军地书法名家专门创作的46件作品也一同展出，可谓名家荟萃、佳作迭出。这些作品真、草、隶、篆、行等风格迥异、各具特色，条幅、楹联、扇面、斗方等品种齐全、琳琅满目，充分展示出军队书法创作的蓬勃生机，是军队广大书法工作者和部队业余书法创作骨干向毛泽东同志诞辰120周年献上的一份厚礼。"},{"type":"paragraph","text":"总政治部副主任殷方龙出席开幕式并参观展览。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd387caac7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
