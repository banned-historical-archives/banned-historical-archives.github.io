script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"平壤一工厂庆祝朝中友好合作互助条约签订两周年  中朝两党两国人民永远并肩前进  为反对帝国主义和现代修正主义进行不调和的斗争","authors":[],"dates":[{"year":1963,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"平壤一工厂庆祝朝中友好合作互助条约签订两周年"},{"type":"paragraph","text":"中朝两党两国人民永远并肩前进"},{"type":"paragraph","text":"为反对帝国主义和现代修正主义进行不调和的斗争"},{"type":"paragraph","text":"新华社平壤八日电　平壤精密机械工厂职工今天晚上举行集会，热烈庆祝朝中友好合作互助条约签订两周年（七月十一日）。"},{"type":"paragraph","text":"朝中友好协会中央委员会副委员长、高等教育相金宗恒、机械工业省副相金炳秀、外务省三局副局长刘成进以及工厂党、行政领导人出席了集会。中国驻朝鲜大使馆临时代办刘祥纶、商务参赞李范如和其他外交官员应邀出席了集会。在平壤的中国专家也出席了集会。"},{"type":"paragraph","text":"平壤精密机械工厂厂长崔吉逢在会上讲话说，朝中友好合作互助条约的签订，更加促进了我们两国人民间的友谊，更加巩固了我们两国人民建立在马克思列宁主义和无产阶级国际主义基础上的伟大团结，沉重地打击了帝国主义和它的走狗——现代修正主义。"},{"type":"paragraph","text":"崔吉逢赞扬了朝中两国人民传统的战斗友谊和中国人民的建设成就。"},{"type":"paragraph","text":"崔吉逢说，现代修正主义者配合帝国主义者的步调，疯狂地掀起反华活动。但是，不管敌人怎样蠢动，在伟大的中国人民和整个社会主义阵营力量面前，它必将遭到可耻的惨败。"},{"type":"paragraph","text":"中国驻朝鲜大使馆临时代办刘祥纶在会上也讲了话。他在讲话中表示中国人民热烈欢呼并完全拥护中朝友好合作互助条约和今年六月间中朝两国领导人签署的联合声明，同时赞扬了朝鲜人民以自力更生精神、千里马运动在社会主义建设中取得的辉煌成就。"},{"type":"paragraph","text":"他指出：“中朝两党两国人民为反对帝国主义和现代修正主义进行着不调和的斗争。今后，仍将永远并肩前进。我们的团结力量是无敌的，我们的共同事业必定获得最后胜利！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db8cf90538"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
