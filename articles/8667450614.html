tes":[{"year":1949,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社广州廿六日电】　苏联电影工作小组一行五人，由鲁金斯基率领，已于二十四日下午一时由潖江口乘专车抵达广州市。到站欢迎者有人民解放军某兵团副司令员兼参谋长洪学智、政治部主任萧向荣等。晚间广州市军管会设宴欢迎。广东省人民政府主席广州市军管会主任兼市长叶剑英亲临参加。他代表中共中央华南分局，广州市军管会对苏联电影工作者来穗表示热烈欢迎。鲁金斯基亦代表电影工作组全体感谢主人的热忱招待。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8667450614"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
