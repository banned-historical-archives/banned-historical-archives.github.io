rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高举毛泽东思想伟大红旗继承和发扬我军光荣传统","authors":[],"parts":[{"type":"paragraph","text":"我军是一个毛泽东思想的大学校。读毛主席的书，是每个干部战士的必修课。这是某部二连召开活学活用毛主席著作讲用会。"},{"type":"paragraph","text":"我军是无产阶级专政的重要工具，我们一定要念念不忘阶级斗争。这是某部三连在无产阶级文化大革命中，口诛笔伐，向反党反社会主义反毛泽东思想的黑线开火。"},{"type":"paragraph","text":"勤俭创业、白手起家办工厂的某部修理连在炼铁、翻砂、浇铸配件。"},{"type":"paragraph","text":"以毛主席著作当教材，进行文化教育，既学了文化，提高了文化水平，又学了政治，促进了思想革命化。这是某部二连战士在上文化课，学习《为人民服务》。"},{"type":"paragraph","text":"毛主席规定，生产是我军的三大任务之一。军队进行工农业生产，不但创造物质财富，而且培养有社会主义觉悟的，能文、能武，又能劳动的共产主义新人。"},{"type":"paragraph","text":"这是把芦苇丛生的盐碱地，改造成稳产高产粮仓的某部柏各庄农场的战士们在劳动。"},{"type":"paragraph","text":"加强群众工作，虚心向地方学习，是我军的光荣传统。这是空军某部飞行员，在野营中向群众宣传毛泽东思想，宣传党的政策。"},{"type":"paragraph","text":"积极帮助各行各业民兵工作，帮助民兵学习毛主席著作，向民兵宣传人民战争思想，促进民兵工作三落实。这是某部坦克五连在训练民兵。"},{"type":"paragraph","text":"我军永远是一支战斗队，时刻保持高度警惕，随时为保卫祖国的安全和支援世界革命贡献一切力量。这是海军舰艇巡逻在祖国的海洋上。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80ca6a13ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
