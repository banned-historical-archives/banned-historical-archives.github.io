锡联、李伯秋，1968.4.7，沈阳日报联委会《曙光在前》翻印","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/eaefb094-86e6-4c5f-a190-46818d16ffa2/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/eaefb094-86e6-4c5f-a190-46818d16ffa2/2.jpg"],"article":{"title":"坚决打倒宋任穷的口号","alias":"","parts":[{"type":"title","text":"坚决打倒宋任穷的战斗口号"},{"type":"paragraph","text":"一、誓死保卫毛主席！"},{"type":"paragraph","text":"二、誓死保卫林副主席！"},{"type":"paragraph","text":"三、誓死保卫以毛主席为首的无产阶级司令部！"},{"type":"paragraph","text":"四、誓死保卫中央文革！"},{"type":"paragraph","text":"五、向江青同志学习！向江青同志致敬！"},{"type":"paragraph","text":"六、坚决打倒刘、邓、陶！"},{"type":"paragraph","text":"七、坚决打倒彭、罗、陆、杨！"},{"type":"paragraph","text":"八、坚决打倒杨成武、余立金、傅崇碧！"},{"type":"paragraph","text":"九、坚决打倒关锋、王力、戚本禹！斩断黑手！"},{"type":"paragraph","text":"十、宋任穷一贯反对毛主席罪该万死！"},{"type":"paragraph","text":"十一、宋任穷丧权辱国、里通外国罪该万死！"},{"type":"paragraph","text":"十二、宋任穷疯狂破坏无产阶级文化大革命罪该万死！"},{"type":"paragraph","text":"十三、宋任穷血腥镇压无产阶级革命派罪该万死！"},{"type":"paragraph","text":"十四、宋任穷猖狂反对中国人民解放军罪该万死！"},{"type":"paragraph","text":"十五、宋任穷炮制反革命“三点意见”罪该万死！"},{"type":"paragraph","text":"十六、宋任穷炮制反党小报《刘志丹》、《浏阳革命史》罪该万死！"},{"type":"paragraph","text":"十七、宋任穷炮制“干部还乡访问纪实”罪该万死！"},{"type":"paragraph","text":"十八、宋任穷策划反革命“二次辽沈战役”罪该万死！"},{"type":"paragraph","text":"十九、宋任穷为彭、高、饶反党集团翻案罪该万死！"},{"type":"paragraph","text":"二十、宋任穷为陆、李、张翻案罪该万死！"},{"type":"paragraph","text":"二十一、宋任穷为王、杜、宋翻案罪该万死！"},{"type":"paragraph","text":"二十二、宋任穷为“二月逆流”翻案罪该万死！"},{"type":"paragraph","text":"二十三、坚决打倒顽固不化走资派宋任穷！"},{"type":"paragraph","text":"二十四、坚决打倒反革命两面派、大阴谋家宋任穷！"},{"type":"paragraph","text":"二十五、坚决打倒刘邓在东北地区头号代理人宋任穷！"},{"type":"paragraph","text":"二十六、坚决打倒刘邓司令部黑干将宋任穷！"},{"type":"paragraph","text":"二十七、坚决打倒老牌机会主义分子宋任穷！"},{"type":"paragraph","text":"二十八、坚决打倒三反分子宋任穷！"},{"type":"paragraph","text":"二十九、坚决打倒东北地区反军逆流的黑后台宋任穷！"},{"type":"paragraph","text":"三十、坚决打倒欧、马、顾、喻、黄、徐！"},{"type":"paragraph","text":"三十一、坚决批倒、斗臭宋任穷！迎接辽宁革委会的诞生！"},{"type":"paragraph","text":"三十二、向伟大的中国人民解放军学习！向伟大的中国人民解放军致敬！"},{"type":"paragraph","text":"三十三、向英雄的沈阳部队、辽宁军区全体指战员学习！致敬！"},{"type":"paragraph","text":"三十四、坚决和英雄的沈阳部队、辽宁军区团结在一起、战斗在一起、胜利在一起！"},{"type":"paragraph","text":"三十五、毛主席的革命路线胜利万岁！"},{"type":"paragraph","text":"三十六、战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"三十七、无产阶级文化大革命全面胜利万岁！"},{"type":"paragraph","text":"三十八、伟大的中国人民解放军万岁！"},{"type":"paragraph","text":"三十九、无产阶级专政万岁！"},{"type":"paragraph","text":"四十、伟大的、光荣的、正确的中国共产党万岁！"},{"type":"paragraph","text":"四十一、伟大的导师、伟大的领袖、伟大的统帅、伟大的脱手，我们心中最红最红的红太阳毛主席万岁！万岁！万万岁！"}],"authors":[],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"沈阳日报联委会《曙光在前》翻印","page_start":2,"page_end":2},"tags":[{"name":"江青","type":"人物"},{"name":"宋任穷","type":"人物"},{"name":"二月逆流","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df8166d777"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
