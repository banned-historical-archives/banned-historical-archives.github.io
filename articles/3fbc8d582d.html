彪"],"dates":[{"year":1966,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"关于朱德问题的讲话","type":"title"},{"text":"林彪","type":"authors"},{"text":"彭德怀原来就是联合这个，联合那个，犯了这个错误又犯了那个错误，都是为了个人野心。对右倾机会主义分子必须彻底揭发斗争到底把他搞臭，否则不行。这样做对你对党都有好处，这样，你才可能改好，否则不可能。庐山会议揭发出来这个问题，解决这个问题，是一个很大的胜利。消灭党的一个最大的隐患。主席几次讲党有可能分裂，实际就指彭德怀──朱德。庐山会议也考虑到是否要彻底揭开，权衡利害，认为应该坚决揭开，消灭这一隐患，否则会继续发展，万一主席到百年之后，就会出现更大的问题。现在揭开，展开坚决斗争，保卫总路线，教育全党，巩固以毛主席为首的党中央，这是全党全军全国人民利益之所在。要揭发斗争到底，你改也好，不改也好。当然我们是希望你改的。","type":"paragraph"},{"text":"朱德你是有野心的，你检讨得很不够。有人当是他自己检讨的，不是的！是党中央决定让他脱裤子的，不检讨不行。你们是不知道的，陈毅批评他的并不过分。他也不服毛主席，他想当领袖。高岗事情，他也主张轮流，想当主席，自己本事行吗？","type":"paragraph"},{"text":"你一天都没做过总司令，南昌起义后，是无政府，乱走，是陈毅指挥到井冈山的；遵义会议前是李德指挥；以后是毛主席指挥；抗战时期在前方×指挥（按：也不是朱德指挥）。解放战争是主席指挥。你是不行的，但自以为还行。你脱离指挥，下井冈山向南打，三个营损失二个，打败仗无办法，还是主席接你回来的。","type":"paragraph"},{"text":"［林彪的上述讲话很可能是在中央政治局扩大会议上的讲话］","type":"paragraph"},{"text":"刊载于《高举毛泽东思想伟大红旗》（林彪文集），1967年4月编印，编印者不明。","type":"paragraph"}],"comments":[],"origin":"刊载于《高举毛泽东思想伟大红旗》（林彪文集），1967年4月编印，编印者不明。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"林彪","type":"人物"},{"name":"朱德","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fbc8d582d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
