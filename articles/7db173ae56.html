rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈祝贺我军建军32周年马利诺夫斯基元帅致电彭德怀元帅","authors":[],"parts":[{"type":"paragraph","text":"本报讯 苏联国防部长马利诺夫斯基元帅于7月31日致电我国防部长彭德怀元帅，祝贺我军建军三十二周年。电文如下："},{"type":"paragraph","text":"中华人民共和国国防部长"},{"type":"paragraph","text":"中华人民共和国元帅"},{"type":"paragraph","text":"彭德怀同志"},{"type":"paragraph","text":"亲爱的彭德怀同志："},{"type":"paragraph","text":"我谨代表苏联武装力量全体军人，并以我个人名义，向您，并通过您，向兄弟的中国人民解放军全体人员祝贺光荣的建军三十二周年纪念日。"},{"type":"paragraph","text":"苏联武装部队全体人员衷心地祝中国人民解放军全体军人在军事训练、政治教育及加强中华人民共和国国防威力中获得进一步成就。"},{"type":"paragraph","text":"祝苏中两国伟大人民之间牢不可破的友谊，祝我们两国军队和社会主义各国军队之间的战斗合作进一步巩固和发展。社会主义各国是和平及我们各国人民的安全的可靠保证，是完成社会主义建设的巨大任务获得进一步成就的可靠保证。"},{"type":"paragraph","text":"苏维埃社会主义共和国联盟国防部长"},{"type":"paragraph","text":"苏联元帅罗·雅·马利诺夫斯基"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7db173ae56"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
