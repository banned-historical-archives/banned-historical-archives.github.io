ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"给毛岸青的信","alias":"","parts":[{"type":"paragraph","text":"给毛岸青的信"},{"type":"paragraph","text":"(1960年）岸青我儿："},{"type":"paragraph","text":"前复一封信，谅收到了。甚念。听说你的病体好了很多，极为高兴。仍要听大夫同志和帮助你的其他同志们的意见，好生静养，以求全愈。千万不要性急。你的嫂嫂思齐？和她的妹妹少华来看你，她们十分关心你的病情，你应好好接待她们。听说你同少华通了许多信，是不是？你们是否有做朋友的意思？少华是个好孩子，你可以好好同她谈一谈。有信，交思齐、少华带回。以后时时如此，不要别人转。此外娇娇也可以转。对于帮助你的大连市市委同志，医疗组织各位同志们，一定要表示谢意，他们对你是很关怀的，很尽力的。此信给他们看一看，我向他们表示衷诚的谢意。"},{"type":"paragraph","text":"祝愉快！"},{"type":"paragraph","text":"父亲[1]毛岸青，毛泽东的次子，当时在大连治病。"},{"type":"paragraph","text":"[2]思齐，即刘思齐，现名刘松林，1949年10月同毛泽东的长子毛岸英结婚。"},{"type":"paragraph","text":"[3]少华，即张少华，现名邵华，1960年与毛岸青结婚。[4]娇娇，即李敏，毛泽东的女儿。"}],"authors":["毛泽东"],"dates":[{"year":1960}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":139,"page_end":139},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c18438fc68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
