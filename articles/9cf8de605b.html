"dates":[{"year":1949,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国学代大会在平揭幕"},{"type":"paragraph","text":"中共中央代表叶剑英将军亲临致贺"},{"type":"paragraph","text":"【新华社北平二日电】中华全国学生第十四届代表大会，于一日下午一时半在中国学生运动发祥地的北平隆重揭幕。出席这次大会的各地学生代表共有二百零四人，他们代表了中国解放区和国民党统治区的一百零二万学生。列席大会的有解放区青年联合会的代表五人。被邀到会的来宾中有中共中央代表叶剑英将军、中国人民解放军代表罗荣桓将军、中共北平市委代表赵毅敏、中华全国总工会代表许之福、中华全国妇女联合会筹委会代表李德全、中国解放区青年联合会代表冯文彬、各方民主人士李济深、沈钧儒（沙千里代）、马叙伦、郭沫若、许德珩等。来宾在讲话中对大会的开幕都表示了热烈的祝贺和鼓励。大会在宣读中国共产党中央委员会的贺电时，全场欢声雷动高呼“中国共产党万岁！”“祝毛主席、朱总司令健康！”等口号，延续数分钟之久。大会在北平、华北、东北、西北、华东、中原和国民党统治区上海、杭州、苏州、南京、广州、武汉等地区的学生代表献辞后，宣告休会。会后，中国解放区青年联合会设宴招待全体学生代表并举行娱乐晚会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cf8de605b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
