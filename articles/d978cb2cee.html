","authors":["李富春"],"dates":[{"year":1962,"month":7,"day":10}],"is_range_date":false,"parts":[{"text":"李富春就当前经济工作给中共中央的报告摘要","type":"title"},{"text":"李富春","type":"authors"},{"text":"“生产力破坏严重、群众对于集体经济失去信心的地区，除了说服农民和支援农民搞好集体经济外，也可以根据农民的意见采取某些过渡的办法，如安徽省的‘责任田’，河南省的‘借地’，等等。……有的地区，可以扩大自留地，如由占耕地的百分之七增加到百分之十。另外，也可以拨一些饲料地，以利于畜牧业的恢复和发展。","type":"paragraph"},{"text":"“凡是适于个人经营的树林、山场，可以分给个人经营。凡是适于归个人的农具，都可归农户所有。耕畜可以公有私养，也可以由户喂养，每户允许有一两头大牲畜。房屋和屋前屋后的宅地，可以确定所有权，归户所有。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"“要给产粮地区的农民留下一定的口粮。经济作物重点地区，要保证一定的口粮……国家征购粮食的总数应当适当减少……征购粮全部由国家统一掌握、统一调度。……生产队在完成国家的征购任务以后，农民自己分得的粮食、油料，可以根据各地不同情况进入自由市场销售。”","type":"paragraph"}],"comments":[],"origin":"《李富春传》(北京：中央文献出版社，2001)600-601页。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李富春","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d978cb2cee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
