<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发中南局关于在土改中保证工商业不受侵犯的办法","authors":[],"dates":[{"year":1951,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央转发中南局关于在土改中保证工商业不受侵犯的办法","type":"title"},{"text":"华东局、西南局、西北局：","type":"appellation"},{"text":"兹将中南局一月二十二日电转给你们，关于在土改中影响工商业问题，望各地予以充分注意。中南局所提各项办法，请加研究，并仿照执行。","type":"paragraph"},{"text":" 中  央一月二十七日","type":"paragraph"},{"text":"中南局致分局、各省市委、区党委并报中央〈电〉如下：","type":"appellation"},{"text":"目前各地土改中，已发现侵犯城市工商业现象，其中主要是退押、退租、追缴余粮、追缴变卖田产等。退押按折半清理后，应退押金有些（如有田面权的）尚等于该田四年租粮收入。退租有退至十年八年者者。追缴余粮有追索至三四年之多者。因此，有许多工商业者在土改中全部资金被算光，因而倒闭或分散资金、躲藏者。据汉口不完全统计，工商业中有百分之六十至七十五兼地主。这种清算对工商业及税收影响极大。汉口一月间税收比之十二月减少三分之二。固然原因甚多，但土改影响是重要原因。为了在土改中照顾农民要求，同时又保证工商业利益不受侵犯，已与湖北武汉党委商定如下限制办法：","type":"paragraph"},{"text":"（一）农民向工商业兼地主退租：只限于一九四九、一九五O两年应减而未减之租粮。长江以北之老区，则以三年为限，不得多退。","type":"paragraph"},{"text":"（二）退押按折半清理规定。但押金过重者，应退额以原田一年租粮收人为限，不得无限制清算。","type":"paragraph"},{"text":"（三）解放后变卖田亩者，将所得田价退还农协处理。个别卖田有曾经区政府批准查有实据者，可不再退，但只作为个别问题由政府处理，不公布。","type":"paragraph"},{"text":"（四）农民对工商业者兼地主之清算，以上列三项为限。其余不再扩大，以免过分影响工商业，对工人不利，对农民也不利。其有三项相加，足把商人资金搞光者，则应酌情减少或分期退。","type":"paragraph"},{"text":"（五）此项商定，拟由省市政府与市工商联共同会商决定公布，由工商业者按此规定分头向农民了结。其有纠纷者，则报城乡联络处调处之。","type":"paragraph"},{"text":"工商业家属于重要反革命分子及大恶霸者应予法办，不法地主逃入城市者应经规定手续令其返乡处理，当然不在此限。","type":"paragraph"},{"text":"上述办法，各地可仿照办理。特此通知。","type":"paragraph"},{"text":" 中南局一月二十二日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2edeae6fc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
