tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"努力学习毛主席的伟大革命实践坚决执行毛主席制定的革命路线","authors":[],"parts":[{"type":"paragraph","text":"本报讯 某团三连干部战士，座谈学习毛主席著作和毛主席伟大革命实践的体会，热情歌颂毛主席的伟大革命精神，更进一步增强了努力学习毛泽东思想的自觉性。"},{"type":"paragraph","text":"二班的同志讲的是一座山：井冈山。他们说：井冈山方圆不过数百里，人不过数千，粮不满万担。毛主席说：“星星之火，可以燎原”。就在这块小小的地方，他老人家领导人民闹革命。毛主席具有最坚定的无产阶级立场，最英明的无产阶级政治远见，在极端困难的时候，向革命人民指出了光明，指明了未来，把革命推向前进。"},{"type":"paragraph","text":"战士赵国信讲了一篇文章：《湖南农民运动考察报告》。他说：在这篇文章中，毛主席热情地赞扬革命的群众运动“好得很”，把革命的群众称为“革命先锋”，充分表现了伟大的无产阶级革命家相信群众，依靠群众，热情支持群众革命运动，站在群众运动前头，领导运动前进的革命精神，对于我们今天正在进行的无产阶级文化大革命，有着伟大的现实意义。"},{"type":"paragraph","text":"许多同志谈了一条路：长征的路。毛主席说：“长征是历史纪录上的第一次，长征是宣言书，长征是宣传队，长征是播种机。”大家畅谈毛主席在长征路上艰苦朴素、关心同志、处处表率、以身作则的伟大实践。在那样艰苦的情况下，毛主席说：“红军不怕远征难，万水千山只等闲。”大家越谈越感受到毛主席的无比崇高的品质和无比伟大的革命精神。"},{"type":"paragraph","text":"战士李清山谈的是一件事：重庆谈判。他说：“通过重庆谈判这件事，可以看出毛主席有最高的大无畏精神。为了人民的利益，毛主席把个人的安危置之度外，深入龙潭虎穴，去和蒋介石这个杀人魔王作斗争。”"},{"type":"paragraph","text":"十一班的同志讲的是一家人：毛主席的一家。他们说：毛主席不但把自己的一切献给了人民，而且把自己的一家都哺育成为最无私的人。在历次革命战争中，毛主席有六位亲人为革命牺牲了。有的在十年内战时期，为革命献出了宝贵的生命；有的在抗日战争和解放战争时期，为革命被敌人杀害了；还有的壮烈地牺牲在朝鲜战场上。毛主席的一家，是我们一切革命家庭学习的榜样。"},{"type":"paragraph","text":"大家越谈，感受越深。许多同志说：“毛主席的伟大，几天几夜、几月几年也说不完。”“喊一千个万岁，一万个万岁，也表达不尽我们无限崇敬的心情！”大家表示一定要永远读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士，永远执行以毛主席为代表的无产阶级革命路线。"}],"alias":""},"tags":[{"name":"重庆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d986d6d441"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
