art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席无产阶级医疗卫生路线威力大","authors":[],"parts":[{"type":"paragraph","text":"新华社六日讯 东京消息：日中友协（正统）总部发行的一期《日本和中国》周刊上，在《为人民服务的解放军治好小儿麻痹后遗症》的标题下，刊登了一组介绍中国人民解放军医务工作者在毛主席无产阶级医疗卫生路线指引下，成功地医治好小儿麻痹后遗症的先进事迹的照片，并加上了编者的按语。"},{"type":"paragraph","text":"编者按语热情地赞扬了中国人民解放军的医务工作人员，努力学习毛主席著作，把人民的疾苦当作自己的疾苦，通过艰苦努力，攻克小儿麻痹后遗症这个顽固堡垒的生动事迹。"},{"type":"paragraph","text":"编者按语指出，因患小儿麻痹后遗症而十年不能走路的孩子，仅仅经过半年的治疗便能自由地行走和跳跃，这在从前不可想象的事，而今天在中国的确实现了。"},{"type":"paragraph","text":"按语说，被各国医学“权威”判定为“不治之症”的小儿麻痹后遗症，不是靠“高明”的医生，而是由中国人民解放军的普通医务工作者治疗成功了，这是为什么呢？是医务工作人员解决了为什么人服务的问题，是无产阶级医疗路线与资产阶级医疗路线斗争的一个胜利。"},{"type":"paragraph","text":"按语说，中国人民解放军医务工作者治好小儿麻痹后遗症的先进事迹，充分证明了毛主席无产阶级医疗卫生路线的巨大威力。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f738482b4f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
