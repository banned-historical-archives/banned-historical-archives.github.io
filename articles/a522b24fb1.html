rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"推广廖初江丰福生黄祖示经验掀起学习毛主席著作的新高潮","authors":["高效先孙士旺陈家旺何人可吴江郑铨江明义"],"parts":[{"type":"paragraph","text":"空降兵某部六连"},{"type":"paragraph","text":"学习和当前工作结合"},{"type":"paragraph","text":"空降兵某部六连是个新建连队，训练基础较差，有的同志对伞降训练有些畏难情绪。在学习廖初江、丰福生、黄祖示的经验时，党支部诱导大家着重学习他们学用结合的经验。干部战士带着问题学习了《为人民服务》和《愚公移山》，树立了排除万难、掌握过硬本领的思想，自觉地勤学苦练。现在他们从气球跳伞到飞机跳伞，从徒手跳伞到全副武装跳伞，都跳得很好。 （高效先、孙士旺）"},{"type":"paragraph","text":"沈阳某部“红军团”"},{"type":"paragraph","text":"强调学是为了用"},{"type":"paragraph","text":"沈阳部队某部“红军团”各连学习廖、丰、黄三人和本团红九连的学习经验时，强调学是为了用。团首长和机关干部还分头下连检查了连队干部的学习情况，发现有的干部对重点文章学得不够深透，便提出学透了才能用得更好，要求干部们反复学习《为人民服务》、《纪念白求恩》《愚公移山》等文章。（陈家旺、何人可）"},{"type":"paragraph","text":"广州部队九五八仓库"},{"type":"paragraph","text":"研究怎样带着问题学"},{"type":"paragraph","text":"广州部队九五八仓库的同志们，用廖初江、丰福生、黄祖示的经验，对照了自己过去学习中带问题不够的缺点，决定以他们三人为榜样，用高标准要求自己，主动找问题。他们订出了五条找问题的措施：一、开动脑筋，养成天天想问题的习惯；二、对照英雄模范、五好战士，比出问题；三、分析工作情况，预见问题；四、经常学习国内外形势和党的政策，观察出问题；五、通过“一对红”互相提问题。订出措施后，大家身体力行，进一步推动了学习。 （吴江）"},{"type":"paragraph","text":"北京部队英雄八连"},{"type":"paragraph","text":"表扬坚持天天读的同志"},{"type":"paragraph","text":"北京部队某部英雄八连学习廖、丰、黄的经验以后，找到了“天天读”时紧时松的根本原因是，为革命而学，为改造思想、改进工作而学的目的性不够明确，学习的自觉性不够高。党支部还宣扬了本单位坚持“天天读”，不断克服困难，不断提高训练成绩的田良雨等同志的事迹，使干部战士认识到“天天读”就是天天向毛主席著作请教，就能及时解决问题。现在各班都做了语录牌，走到哪里学到哪里。 （郑铨）"},{"type":"paragraph","text":"昆明某部通信连"},{"type":"paragraph","text":"要求干部学习不松功"},{"type":"paragraph","text":"昆明部队某部通信连学习廖、丰、黄的经验，大家感到抓好干部的学习很重要。今年干部的学习有些放松，主要原因是，有的同志以为学得“差不多”了。大家决心学习他们三人为革命而学的自觉性，在成绩面前夸不倒，越忙越要学。党支部还宣扬了副指导员刘庭发利用训练空隙争分夺秒坚持学习的事迹。 （江明义）为学得“差不多”了。大家决心学习他们三人为革命而学的自觉性，在成绩面前夸不倒，越忙越要学。党支部还宣扬了副指导员刘庭发利用训练空隙争分夺秒坚持学习的事迹。 （江明义）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a522b24fb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
