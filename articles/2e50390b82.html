rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以毛主席最新指示为纲夺取新的伟大胜利","authors":["王杰生前所在班全体同志"],"parts":[{"type":"paragraph","text":"我们怀着万分激动的心情，收听了我们心中的红太阳毛主席接见部队代表的特大喜讯，和认真学习了《人民日报》、《红旗》杂志、《解放军报》一九六八年《迎接无产阶级文化大革命的全面胜利》的元旦社论，受到了巨大的鼓舞。这篇社论传达了毛主席一系列最新指示，提出了新的战略目标和战斗任务。毛主席的最新指示，我们句句照办，字字执行，条条落实。"},{"type":"paragraph","text":"毛主席教导我们：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。”又说：“再有几个月的时间，整个形势将会变得更好”。一年来无产阶级文化大革命的伟大胜利，充分证明毛主席的这一论断无比英明，无比正确。毛泽东思想学习班如雨后春笋，遍及全国各地；革命的大联合和革命的三结合的洪流，迅猛异常。全国到处是一片新气象。文化大革命的伟大胜利，就是毛主席一系列最新指示的伟大胜利。"},{"type":"paragraph","text":"去年，我们班能够不断前进，就是因为比较好地贯彻落实了毛主席的一系列最新指示，做到毛主席怎样说，我们就怎样做。毛主席发出开展革命大批判的战斗号令，我们就连夜召开座谈会、批判会、声讨大会，连夜写批判文章，用毛泽东思想狠批中国赫鲁晓夫。毛主席号召要斗私，批修，我们就狠斗“私”字，猛批“修”字，投入了斗私批修的战斗。毛主席教导我们“要保护左派”，我们就闻风而动，坚决执行，用左派的思想，左派的感情，对照自己，有错就改，自觉的和左派广大群众紧紧地团结在一起，战斗在一起，胜利在一起。通过条条落实毛主席的最新指示，全班同志对毛主席、毛泽东思想和毛主席无产阶级革命路线的阶级感情，从来没有像今天这样深；学习毛主席著作的空气，从来没有像今天这样浓；斗私批修的自觉性，从来没有像今天这样高；阶级斗争观念从来没有像今天这样牢固。"},{"type":"paragraph","text":"在伟大统帅毛主席的英明指挥下，新的战役开始了。我们一定更高地举起毛泽东思想伟大红旗，以毛主席的最新指示为纲，鼓足干劲，力争上游，再接再厉，做学习、执行、宣传、捍卫毛主席最新指示的模范。条条落实、全面落实毛主席一系列最新指示，从思想上、政治上、经济上、组织上夺取无产阶级文化大革命的全面胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e50390b82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
