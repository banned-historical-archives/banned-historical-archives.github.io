纷纷发表感想和心得","authors":[],"dates":[{"year":1962,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共政治局候补委员安斋库治撰文指出"},{"type":"paragraph","text":"日本读者欢迎“毛泽东选集”日文版"},{"type":"paragraph","text":"许多人读后纷纷发表感想和心得"},{"type":"paragraph","text":"本报讯　日共中央机关报“赤旗报”于六月十六日以“让我们学习毛泽东选集第四卷”为题，发表日共中央政治局候补委员安斋库治的文章，谈论毛泽东选集第四卷日文版发行后博得广大日本人民热爱的情况。"},{"type":"paragraph","text":"文章说，“毛泽东选集第四卷日文版（上册）由日本共产党出版部出版以来，为时不过两个星期。但是，毛泽东选集第四卷的销行情况非常好，在这两个星期里已经售出六千册。负责发行工作的新日本出版社，还源源不断地收到新的订货。”"},{"type":"paragraph","text":"文章说，读到毛泽东选集第四卷的人的“主要的反应是深受感动的声音：毛泽东同志是多么杰出的马克思列宁主义者；毛泽东同志多么正确地把马克思列宁主义的普遍真理运用到复杂的中国革命实践中去。”"},{"type":"paragraph","text":"文章提到，有的读者说：“作为革命家的毛泽东同志，他的伟大不仅在于他的革命性，实际上在于毛泽东同志（他不是脱离实践的“天上”的哲学家），善于在具体的现实和实践中运用马克思列宁主义的哲学——辩证唯物论。”还有一个读者说：“毛泽东选集第四卷是在中国的现实和革命实践中运用辩证唯物论的最杰出的典范。它实在是辩证唯物论的活教科书。”"},{"type":"paragraph","text":"文章作者说，“我完全赞同这些人的话。因为我自己阅读毛泽东选集第四卷时最强烈的感受之一，就是觉得贯穿整个毛泽东选集第四卷的是马克思列宁主义的世界观和方法论，是革命的辩证唯物论的理论。事实上，展开毛泽东选集第四卷，书中到处都能看到运用于现实和实践中的辩证唯物论的光辉。”"},{"type":"paragraph","text":"文章进一步以毛泽东选集第四卷的内容为例，阐述了毛泽东同志不仅把事物看作“对立物的统一”来分析帝国主义和一切反动派的两重性，并根据这种分析指出：在“以革命的两手对付反革命的两手”的同时“在战略上藐视敌人，在战术上重视敌人”，是战胜帝国主义和一切反动派的根本规律。”文章认为，“因此，企图变革事物的我们，无论如何必须正确地认识客观规律，抓住这个规律，促进事物的发展。因此，我们还必须在我们目前进行的竞选斗争及其它政治斗争中具体地研究如何贯彻这个规律。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c6f75235b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
