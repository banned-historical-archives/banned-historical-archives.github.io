ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对关于农村人民公社若干问题的一次座谈会记录的批语","alias":"","parts":[{"type":"paragraph","text":"对关于农村人民公社若干问题的"},{"type":"paragraph","text":"一次座谈会记录的批语"},{"type":"paragraph","text":"（1961年3月16日）"},{"type":"paragraph","text":"[1]指中共中央政治研究室主任、毛泽东的秘书陈伯达1961年3月15日报送的一个座谈会记录。记录中说，3月14、15日，广东省委和北京来的调查组，同新兴县里洞公社蒙坑大队党总支书记梁纪南、公社宣教委员苏品芳就有关人民公社的几个重要问题交换了意见。一、社队规模问题。蒙坑大队原来是两个高级社，一个收入高，一个收入低，公社化后合成一个基本核算单位，拉平了，原来收入高的很有意见。最近他们按原来高级社的规模，分为两个大队，解决了穷村同富村的矛盾，两边对生产、积肥都积极了，对耕牛、农具也都爱惜了。座谈中，对于其他大队内各小队之间的贫富差别，他们认为可以采取如下解决办法：（1）对富村的包产指标可以低些，使它能够多得超产奖励；（2）帮助穷村多搞些副业，增加收入；（3）中等村发展了生产，也能增加收入。他们认为，基本核算单位太小了也不好，理由是领导能力差，人少力量小，积累有限，不容易扩大再生产，不好搞多种经济，没有多大的发展前途。二、分配问题。过去搞三七开，事实上不劳动者也可以得食，因此可以考虑打破这个框框，全部实行按劳分配，用公益金和公益粮补贴困难户，这样就可以调动全体社员的劳动积极性。三、食堂问题。他们主张粮食分到户，农忙办食堂，这样生产队菜地就有可能给市场提供更多的菜，社员也能养猪、积肥。四、定征定购问题。征购粮要定下来，使农民心里有底，至少3年不变，能5年不变就更好。定征定购后，生产队的超产部分，可以留出一定的比例作为储备粮，要逐步使队队、社社、县县都有储备粮，同时也要逐步使家家户户都有粮食储备。"},{"type":"paragraph","text":"对关于农村人民公社若干问题的一次座谈会记录的批语一个重要文件，印发各同志讨论。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十六日上午一时[1]指当时正在广州参加中共中央工作会议的同志。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":210,"page_end":211},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dbf2df06f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
