主人士参加土改的经验的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":30}],"is_range_date":false,"parts":[{"text":"毛泽东转发川西区党委关于组织党外民主人士参加土改的经验的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"华东，中南，西南，西北，华北各中央局，并转分局，省委，区党委，大中市委及地委：","type":"appellation"},{"text":"除抗美援朝工作必须和各民主党派民主人士一起去做不必再说外，土改镇反两项工作，也必须使各民主党派民主人士参加，越多越好。请你们计划一下，在今年夏、秋、冬三季的土改工作和镇反工作，从各大城市中等城市分几十批组织各民主党派，民主人士，教授，教员，资本家下乡去参观，或参加工作。只要他们愿意去，就要欢迎他们去。不要怕他们去，不要向他们戒备，因为他们不是反动派。好的坏的，都让他们去看，让他们纷纷议论，自由发表意见，只有好处，没有坏处。至于城市中的镇反工作，更要让他们参加，整个城市的人民都要讨论镇反工作，大家注意对付反革命。下面是川西区党委的报告，请你们看一看。","type":"paragraph"},{"text":" 毛泽东三月三十日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3395bb08b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
