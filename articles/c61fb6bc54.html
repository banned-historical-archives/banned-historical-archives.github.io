script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平会见美籍学者陈树柏","authors":[],"dates":[{"year":1980,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见美籍学者陈树柏"},{"type":"paragraph","text":"新华社北京9月9日电　邓小平副总理今天在这里会见美籍学者陈树柏教授和夫人时说，凡是在海外的朋友愿意回国来参观、讲学，我们都热情欢迎。在台湾的朋友愿意回来看看，我们也同样欢迎。他希望在海外人士为祖国的统一大业作出贡献。"},{"type":"paragraph","text":"陈树柏是美国圣克勒拉大学电机工程和计算机工程系主任。他这次是应中国科学院邀请来北京研究生院讲授网络拓扑分析导论和线性网络及系统分析课程的。"},{"type":"paragraph","text":"在亲切的交谈中，陈树柏对邓小平说，我们在海外的中国人和华裔都希望能够看到祖国的统一，繁荣强盛。我们对中国正在进行四个现代化建设感到很高兴，并愿意为此作出自己的贡献。国务院副总理、中国科学院院长方毅，中国科学院副院长钱三强，参加了会见。（附图片）"},{"type":"paragraph","text":"邓小平会见美籍学者陈树柏教授和夫人。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平会见美籍学者陈树柏","authors":[],"dates":[{"year":1980,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理九日在北京会见美籍学者陈树柏教授和夫人时说，凡是在海外的朋友愿意回国来参观、讲学，我们都热情欢迎。在台湾的朋友愿意回来看看，我们也同样欢迎。他希望在海外人士为相国的统一大业作出贡献。"},{"type":"paragraph","text":"陈树柏是美国圣克勒拉大学电机工程和计算机工程系主任。他这次是应中国科学院邀请来北京研究生院讲授网络拓扑分析导论和线性网络及系统分析课程的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c61fb6bc54"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
