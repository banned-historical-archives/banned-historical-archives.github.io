52,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"接着前进的是一万名少年儿童队员的队伍。他们以一个战鼓队为前导，生气勃勃地向前行进。他们老远就热情地望着主席台，举着小手，欢呼毛主席万岁，斯大林万岁。当他们走过主席台前的时候，他们高高举起组成各种口号的字标和花束，他们在主席台前跳跃着、欢呼着，有一队放出一群鸽子，有一队高举着飞机的模型。新中国的儿童用这些来表示他们保卫祖国和人类和平的坚强意志。"},{"type":"paragraph","text":"从行进着的少年儿童队里走出来两个队员，走到主席台上，代表首都人民向毛主席敬献鲜花，表示全北京和全中国人民对自己的伟大领袖无限爱戴和感谢。这时全场响彻着雷鸣的掌声和热情的欢呼。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b740213892"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
