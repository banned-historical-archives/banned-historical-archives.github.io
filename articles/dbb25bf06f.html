art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"希望部队学好毛泽东著作、邓小平文选牢固树立革命人生观和献身国防事业的思想","authors":["赵顺昌"],"parts":[{"type":"paragraph","text":"总政基层工作座谈会于上午9时开始，余秋里主任，郭林祥、周克玉、朱云谦、周文元副主任等到会和各单位代表座谈基层工作情况。当有的同志谈到对干部进行为人民服务宗旨教育的情况时，余主任插话说，解决干部战士安心部队建设的问题，就要理直气壮地讲革命大道理。但通过什么方法、什么形式才能讲好，才能让群众乐于接受，都很有学问。毛主席的《为人民服务》，讲的是人民军队的建军宗旨，讲的是大道理，讲得很好。这时，余主任打开《毛泽东著作选读》，向与会同志全文宣读了《为人民服务》。接着，他强调说，毛主席的这篇著作，深入浅出，内容丰富，思想深刻，是引导我们树立革命人生观的重要著作。一个有经验的教育者，可以根据《为人民服务》上几天政治课。让大家把问题摆开，联系思想实际进行讨论；在讨论中加以正确引导，不断深化认识，这样就能有效地提高大家的思想觉悟，树立起献身国防事业的思想。"},{"type":"paragraph","text":"余主任接着说，军委邓主席历来强调学习马列主义、毛泽东思想。他首先提出并一贯倡导的“五种革命精神”，与《为人民服务》的思想是完全一致的，是把为人民服务的思想具体化了。我们学习《为人民服务》，学习毛泽东著作，要好好研读《邓小平文选》，把读毛主席的书、邓主席的书结合起来，我们部队的思想教育，政治工作，要很好地注意这个问题。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbb25bf06f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
