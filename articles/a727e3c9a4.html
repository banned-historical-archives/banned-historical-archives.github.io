<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"郑州私营华昌营造厂把头残酷剥削工人  郑州市人民法院已依法处理","authors":[],"dates":[{"year":1951,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"郑州私营华昌营造厂把头残酷剥削工人"},{"type":"paragraph","text":"郑州市人民法院已依法处理"},{"type":"paragraph","text":"郑州市私营华昌营造厂经理及把头对工人进行超经济的剥削，长期拖欠工人工资，引起工人游行示威事件，已经郑州市人民法院依法处理。华昌营造厂经理董世昌于一九五○年九月间，将营业牌照以一百袋面粉的代价，租借给包工头冯瑞亭，承包中南军区军需部驻郑州办事处工程一批（包工不包料），总价是一亿一千二百零四万元。九月十四日冯瑞亭领工款一亿零五百零四万元，占总价的百分之九十五强。冯即招雇木、泥、油工共九十七人，约定半月发薪一次。但九月十六号开工后，冯对工人生活漠不关心，不履行原来双方协议的规定，除第一次工资按规定发放外，余皆推诿不给，拖欠工人工资竟达四十六天，合人民币三千九百五十万余元。工人曾与包工头冯瑞亭商定于十一月十五日清理欠资，届时冯又延期不还。推拖达七次之多。至十二月十号前后，工人连伙食费也供给不上。十五号那天，工人一天只吃了两餐稀面条，有家属的工人更无办法。十六日早晨，木工、泥工和一部分小工找不到冯瑞亭，便到华昌营造厂讨要工资。当时经理不在，该厂会计侯万科竟出面斥责工人。工人忍无可忍，遂爆发了游行示威事件。"},{"type":"paragraph","text":"在事件发生以前，去年十二月二日，工人孙有礼曾向郑州市建筑工会说，要停工不作，但建筑工会对这件事并未重视。当时工会干部李作民曾经劝说工人不要停工，并给工人写了一封信，让工人选出代表，向包工头冯瑞亭交涉发放工资，并无任何效果。十一日工人又到工会商量，工会干部孟剑光又只给工人写了一封信，问题仍是不能解决。十五日工人伙食费用尽后，孙有礼又到工会，要求工会作主，向包工头索还欠资。孟剑光又是只给包工头冯瑞亭写了一个条子，要冯到工会算账。工人没有找到冯瑞亭，问题还是不能解决。当天晚上，工人又到工会，要求作主，孟剑光既未答复工人，也不向上级工会反映。建筑工会干部这种不关心工人疾苦的官僚主义作风，引起工人不满，都说工会不顶事。"},{"type":"paragraph","text":"游行示威事件发生以后，郑州市总工会当时认为工人这种举动不对，即将摘招牌、拿营业牌照喊口号的四个工人代表及包工头冯瑞亭、会计侯万科带到公安局；经四个工人代表说明情况后，当天即把工人代表释放，将冯、侯二人带劳动局处理。包工头冯瑞亭强调没有发放工资的原因，是中南军区军需部没有发给他欠资，并说应由军需部发放工资。其实冯欠工人工资三千九百五十万余元，而中南军区军需部郑州办事处仅欠冯七百万元，并且还有百分之二十的工程尚未完成。根据以上情况，冯显系一典型的封建把头，并又假借牌照，进行非法营业，向工人进行超经济的残酷剥削，是法律所不许可的。因此，当晚即将冯、侯二人送押法院，依法处理，翌日并将该厂经理董世昌传讯到案，一并扣押。经郑州市人民法院处理后，已追出欠资一千八百六十五万九千八百元，除工人停工期间伙食费七十一万五千元外，其余一千七百九十四万四千八百元清偿工资，已由法院会同工会分发给工人。下欠之工资二千一百五十五万三千九百六十元，除由铺保华昌营造厂和瑞丰新记于三月一日前清偿一千六百万元外，尚欠五百五十五万三千九百六十元，正由法院继续向董、冯二人追要中。"},{"type":"paragraph","text":"一读者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a727e3c9a4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
