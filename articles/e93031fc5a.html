ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对击沉国民党军“剑门”“章江”两舰战斗经验总结报告的批语","alias":"","parts":[{"type":"paragraph","text":"对击沉国民党军“剑门”“章江”两舰"},{"type":"paragraph","text":"战斗经验总结报告的批语\""},{"type":"paragraph","text":"（1965年8月15日）已阅。退林彪同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十五日"},{"type":"paragraph","text":"[1]这是毛泽东对中国人民解放军海军副司令员李作鹏、南海舰队司令员吴瑞林、南海舰队政治委员方正平1965年8月9日关于击沉国民党军“剑门”“章江”两舰战斗经验总结报告的批语。"},{"type":"paragraph","text":"[2]李作鹏、吴瑞林、方正平的报告说：这次战斗是近几年来海上作战最大的一次胜利，取得胜利的原因，主要是由于军委、总参和广州军区首长正确的指挥，决心果断，兄弟部队的大力支援、民兵的密切配合。参战部队充分发挥了人的因素，发扬了我军英勇顽强，近战、夜战的优良战斗作风，贯彻了集中优势兵力各个歼敌的思想。这次战斗的胜利也证明了小艇不仅能够打大舰，而且也能够击沉敌舰。1965年8月17日，毛泽东、刘少奇、周恩来等接见这次战斗的有功单位、有功人员代表。毛泽东说：“你们打得好。”“蚂蚁啃骨头，我们向来就是用这种方法消灭敌人的。”"},{"type":"paragraph","text":"[3]林彪，当时任中共中央副主席、中共中央军委副主席。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":8,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":166,"page_end":166},"tags":[{"name":"李作鹏","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e93031fc5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
