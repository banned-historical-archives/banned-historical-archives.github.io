art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为什么说“老干部是‘民主派’，‘民主派’就是‘走资派’”是“四人帮”的反革命政治纲领？","authors":[],"parts":[{"type":"paragraph","text":"答：一个纲领“是一面公开树立起来的旗帜”（《马克思恩格斯选集》第三卷第三一页）。政治纲领，就是一个政党或政治集团公开宣布的它的政治主张，它所要达到的政治目的。"},{"type":"paragraph","text":"党内的野心家、阴谋家、资产阶级代表人物的政治目的，都是要篡党夺权，颠覆无产阶级专政，复辟资本主义。但是，他们不敢公开打出这个旗号，以这个作为他们的政治纲领，而是以隐晦曲折的反革命两面手法，来实现这一反革命的政治目的。林彪反党集团以设国家主席作为政治纲领。所谓设国家主席，在当时的条件下，就是由林彪来当国家主席。实现了这一点，就可以达到他们篡党夺权，复辟资本主义的反革命目的。"},{"type":"paragraph","text":"“四人帮”则以“老干部是‘民主派’，‘民主派’就是‘走资派’”作为他们的政治纲领，打着同所谓“党内资产阶级”、同“走资派”作斗争的旗号，妄图打倒从中央到地方的一大批革命老干部。这个目的实现了，他们篡党夺权，颠覆无产阶级专政，复辟资本主义的反革命阴谋也就得逞了。"},{"type":"paragraph","text":"“老干部是‘民主派’，‘民主派’就是‘走资派’”，是“四人帮”反革命政治主张的一个基本点。它的矛头首先是指向担负各级主要领导职务的革命老干部的。这些革命老干部，是“四人帮”篡党夺权的最大障碍。“四人帮”竭力要置广大老干部于死地。同时，这一反动政治纲领的矛头也是指向广大革命群众的。因为，“四人帮”既然把担负各级领导职务的广大革命老干部诬蔑为“走资派”，那末，拥护这些老干部的广大干部和群众，当然也就成了他们所谓的“投降派”和“走资派”的“社会基础”，而象马天水、于会泳、迟群、张铁生、翁森鹤、陈阿大这样一些政治野心家、叛徒、新生资产阶级分子、流氓、打砸抢者，倒成了“先进分子”、“革命派”。这样一来，无产阶级专政下继续革命的性质、对象、任务，就从根本上被篡改了。毛主席说：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”“老干部是‘民主派’，‘民主派’就是‘走资派’”这面黑旗一举，就全面颠倒了社会主义的敌我关系。"},{"type":"paragraph","text":"“四人帮”长期以来的全部政治实践，都贯串着这个反革命政治纲领的黑线。在文化大革命中，“四人帮”伙同林彪煽动“全面内战”、“打倒一切”；在批林批孔中，“四人帮”不批林，不批孔，批“宰相”、批“现代大儒”，揪“孔老二的徒子徒孙”；在无产阶级专政理论的学习中，“四人帮”叫嚷以“反经验主义”为“纲”，打“土围子”，直至捏造党内有“一个资产阶级”，要层层揪“走资派”，揪“戴红领章红帽徽的走资派”。所有这一切，都是在“老干部是‘民主派’，‘民主派’就是‘走资派’”这个反革命政治纲领的思想指导下进行的。"},{"type":"paragraph","text":"英明领袖华主席在党的十一大的政治报告中，对“四人帮”抛出的“老干部是‘民主派’，‘民主派’就是‘走资派’”这一政治纲领的反动本质作了深刻的揭露和批判，我们要认真学习华主席的政治报告，继续深入揭批“四人帮”，把无产阶级专政下的继续革命进行到底。 （沈阳部队军政干校政治教研室）"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"333700b70c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
