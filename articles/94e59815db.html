script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"揭批“四人帮”斗争逐步深入　抓纲治钢初见成效全国冶金工业生产迅速赶上来了九月中旬以来，钢和铁的日产量一直保持前所未有的高水平，钢、钢材和八种有色金属提前完成全年计划","authors":[],"dates":[{"year":1977,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年十二月二十七日电　我国冶金工业抓纲治钢初见成效，呈现出一派欣欣向荣的新气象。"},{"type":"paragraph","text":"生产迅速赶上来了。随着揭批“四人帮”斗争的逐步深入，从今年二季度起，整个冶金生产开始节节上升。三季度战高温、斗雨季，创造了历史同期最好水平。进入四季度，生产更上一层楼，铁、钢、钢材相继突破了历史最好水平。从九月中旬起到年底止的一百多天时间里，钢和铁的日产量一直保持在历史上从未有过的高水平上。有色金属的生产水平也显著提高，八种有色金属的产量稳步上升。到十二月二十三日，钢、钢材和八种有色金属都提前完成了今年的国家计划。"},{"type":"paragraph","text":"基本建设加快了。冶金工业基本建设过去是“胡子”工程长得惊人，投资效果小得惊人。今年，这种状况已迅速改观。全年国家投资计划已超额完成。有五十个工程项目已经竣工投入生产，另外还有一批工程正在试车，即将交付使用。"},{"type":"paragraph","text":"大打矿山之仗取得了显著效果。黑色矿山的采矿、选矿、烧结都有较大进步。"},{"type":"paragraph","text":"有色金属矿山完成了二百七十条机械化作业线，超额完成了全年掘进计划。一些过去生产长期过不了关的矿山，今年生产有了较大的发展。攀钢矿山、邯邢矿山管理局和海南铁矿三个直属企业早在十月底就全面完成了国家计划。"},{"type":"paragraph","text":"新产品、新科研成果增多了。其中有大型钢板桩，槽邦钢，海绵铁竖炉，热压型焦，大型浮选机。脉冲式航测电磁仪器的试验，已取得了好效果。有一批新产品、新材料、新技术、新工艺，已为我国填补了空白。"},{"type":"paragraph","text":"亏损状况大大改变了。过去冶金战线亏损大，积累小。那时，人们说冶金企业的上交利润是“蜡烛化泪天天短”。如今，人们的说法改变了，称赞冶金工业上交利润是“芝麻开花节节高”了。进入今年下半年，冶金企业利润大幅度上升。四季度全国重点冶金企业月平均利润超过去年月平均水平一倍以上，一吨钢上交的利润比去年增加百分之三十以上。"},{"type":"paragraph","text":"冶金工业生产面貌的迅速改观，是冶金战线广大职工狠揭猛批“四人帮”的结果。今年以来，在各省、市、自治区党委和冶金工业部党组织的领导下，全国广大冶金职工怀着极大的无产阶级义愤，向“四人帮”及其资产阶级帮派体系展开了猛烈进攻。从冶金部机关到基层厂矿，从科研单位到生产现场，到处出现了千军万马齐上阵，千仇万恨批“四害”的场面。这场伟大的革命斗争，以雷霆万钧之势，把“四人帮”在冶金战线的亲信、骨干、党羽一个个揪了出来，夺回了被他们篡夺的那一部分权力，摧毁了他们经营多年的资产阶级帮派体系，沉重打击了受“四人帮”支持和纵容的打砸抢者、严重破坏社会治安的犯罪分子以及仇恨社会主义的地富反坏分子，极大地调动了广大职工大干社会主义的积极性。冶金战线的各级领导把群众的积极性及时引导到开展轰轰烈烈、扎扎实实的工业学大庆的群众运动中去。他们以大庆为榜样，狠抓领导班子的调整和职工队伍的建设，恢复和建立了以岗位责任制为中心内容的各项管理制度，并且带领职工展开了社会主义劳动竞赛，掀起了认真学习科学知识和提高技术水平的热潮。一度被“四人帮”搞得乱糟糟的鞍钢、武钢、本钢、太钢、马钢、重钢、攀钢、贵钢等重点企业，安阳、杭州、三明钢铁厂等中小企业，以及铜陵有色金属公司、白银有色金属公司、云南锡业公司等重点有色企业，都甩掉了“老大难”的帽子，迈开了新步伐。"},{"type":"paragraph","text":"冶金战线广大干部和群众并不满足现有的成绩。他们决心除恶务尽，继续深入揭批“四人帮”，破常规，战严寒，抓当前，打基础，进一步发展冶金工业的大好形势。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94e59815db"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
