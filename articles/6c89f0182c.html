r":1980,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见泰国大理院代表团"},{"type":"paragraph","text":"新华社北京六月二十日电  国务院副总理邓小平今天上午在人民大会堂会见了以院长巴博·提拉瓦为团长的泰国大理院（最高法院）代表团。"},{"type":"paragraph","text":"代表团是应对外友协邀请于六月十六日抵达北京的。"},{"type":"paragraph","text":"巴博院长是泰国司法界最高领导人，在司法界资深望重。"},{"type":"paragraph","text":"代表团中还有大理院副院长、司法部常务次长、高级法官等。"},{"type":"paragraph","text":"代表团在京期间曾同我国司法和法律工作者进行了座谈。"},{"type":"paragraph","text":"在亲切友好的交谈中，邓小平说，现在我国正在加强法制。你们前来同我国司法界交流经验，我表示感谢。"},{"type":"paragraph","text":"对外友协会长王炳南、副会长侯桐、泰国驻中国大使沙贡·瓦纳比沙，会见时在座。"},{"type":"paragraph","text":"代表团将于日内离京去上海、杭州、广州等地访问，然后回国。（附图片）"},{"type":"paragraph","text":"图为邓小平副总理同巴博·提拉瓦院长握手。"},{"type":"paragraph","text":"新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c89f0182c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
