dates":[{"year":1976,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市第二商业局广大职工以深入批邓为动力，迅速行动起来，为支援灾区作出贡献。"},{"type":"paragraph","text":"这场救灾斗争开展以来，这个局的干部和群众更加自觉地与邓小平对着干，干部和群众实行三同，并肩战斗。七月二十八日晚，食品一店接到了要为第一批医疗队立即发运干粮的任务，烟糖公司党委书记带领了公司六、七十名干部参加了战斗，不到一个小时，就拆听包装了八百九十包、四千四百多斤压缩饼干，使医疗队准时带着干粮出发。"},{"type":"paragraph","text":"七月三十日，禽蛋三厂党支部接到要立即抢装五十万只松花蛋的任务。他们先后召开了党员骨干会议和职工会议。大家听说是支援灾区的任务，立即投入战斗。经过努力，提前完成了任务，这一天的工作相当于平时三天的工作量。蔬菜公司参加押运的同志来不及打电话回家通知，就赶到机场，保证运输任务的完成。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4ffb04779"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
