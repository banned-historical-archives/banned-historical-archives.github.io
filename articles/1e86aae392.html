1976,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在斗争中前进"},{"type":"paragraph","text":"天津市宝坻县小靳庄大队党支部带领广大贫下中农，同邓小平刮起的右倾翻案风对着干，十二级台风刮不倒，发挥了战斗堡垒作用。这是党支部成员在学习毛主席的重要指示。"},{"type":"paragraph","text":"本报通讯员摄"},{"type":"paragraph","text":"辽宁柴河铅锌矿党委书记宿晓琴，带领党委“一班人”以阶级斗争为纲，坚决抵制邓小平抛出的“三项指示为纲”的修正主义纲领，成为顶“风”前进的带头人。这是他和青年矿工一起讨论如何同走资派作斗争的问题。            本报记者摄"},{"type":"paragraph","text":"武汉警备区某部六连九班长、共产党员李偃清，刻苦学习马克思主义，勇于同搞修正主义的“大人物”作斗争。这是他在愤怒批判邓小平宣扬的打硬仗就是“打钢仗”的谬论。"},{"type":"paragraph","text":"《解放军画报》供稿"},{"type":"paragraph","text":"当年的红卫兵小将、上海星火零件厂青年工人鲁新民，敢于反潮流，被人们誉为“批邓的英勇战士”。最近他光荣地加入了中国共产党。这是他和团员、青年交谈学习毛主席重要指示、深入批邓的体会。"},{"type":"paragraph","text":"《解放日报》记者摄"},{"type":"paragraph","text":"《孔丘教育思想批判》一书的作者、共产党员冯天瑜，是武汉教师进修学院的教师，是理论战线上的新兵。在批邓、反击右倾翻案风的斗争中，他以毛主席的一系列重要指示为武器，深入批邓，继续批孔，受到工农兵群众的好评。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"北京市崇文区修理管理处党委委员、修鞋女工杜宝荣，认真学习无产阶级专政的理论，同旧的传统观念实行彻底决裂，立志在平凡的岗位上为人民服务一辈子。             本报记者摄"},{"type":"paragraph","text":"江西省井冈山垦殖场茨萍生产队的老党员、老红军李珍珠，带领知识青年战天斗地，建设井冈山。他们决心以“可上九天揽月，可下五洋捉鳖”的英雄气概，在继续革命的征途上勇攀险峰。"},{"type":"paragraph","text":"《湖南日报》记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"反潮流","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e86aae392"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
