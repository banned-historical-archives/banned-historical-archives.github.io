<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿根廷报纸发表社论指出  苏美超级大国困难重重  第三世界日益壮大  圭亚那动力部长指出第三世界必须组织一个坚强的战线来反对大国剥削者","authors":[],"dates":[{"year":1974,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿根廷报纸发表社论指出"},{"type":"paragraph","text":"苏美超级大国困难重重  第三世界日益壮大"},{"type":"paragraph","text":"圭亚那动力部长指出第三世界必须组织一个坚强的战线来反对大国剥削者"},{"type":"paragraph","text":"新华社布宜诺斯艾利斯一九七四年四月二十日电　阿根廷《多数报》四月十八日发表社论指出，苏美两个超级大国在争夺世界的统治权中困难重重，第三世界日益壮大。"},{"type":"paragraph","text":"社论强烈谴责苏联推行的社会帝国主义政策。社论说，苏联很会用带有“社会主义”特别标签的一套陈词滥调来装饰这种政策。但是，目前它“困难重重，难以把组成它西部‘生命空间’的‘人民民主国家’和谐地捏拢在一起了。”"},{"type":"paragraph","text":"社论驳斥了美国国务卿基辛格最近在联合国大会特别会议上对发展中国家的无理指责。社论说，这是美国对这些国家所施加的威胁，"},{"type":"paragraph","text":"“这种威胁常常没有别的目的，仅是为了改善那些爱在谈判桌上进行威胁的人的地位”。"},{"type":"paragraph","text":"社论强调指出，然而现在的美国“无论在国内还是在国际权威方面都存在严重危机。”社论说，这种危机是为保持霸权而创造的“力量均衡”的世界体制的不可克服的总危机的一部分。“这个体制所包括的原则有，国际分工、强国对弱国实行政治、经济和文化殖民统治，以及国家命运纳入帝国核心的势力范围并根据帝国核心的利益来片面发展国民经济。帝国和垄断集团的整个这一套所谓体制正在走向衰亡”。"},{"type":"paragraph","text":"社论最后指出第三世界日益壮大，社论说，“在正在形成的政治力量的新格局中”，“民族国家不断形成，帝国的体系正在被自由的、渴望发展的国家集团所取代”。"},{"type":"paragraph","text":"新华社乔治敦一九七四年四月二十日电圭亚那动力和自然资源部长休伯特·杰克四月二十日在《新民族报》发表文章说，第三世界国家“必须组织一个坚强的战线来反对大国剥削者”。"},{"type":"paragraph","text":"文章指出，第三世界的人民觉醒到，富国的发达一直是依靠第三世界国家的不发达和贫穷取得的。当超级大国侈谈“援助”时，事实是，人类中很大一部分人从没有取得任何进步或发展，而是越来越贫困。"},{"type":"paragraph","text":"文章说，富国和穷国之间的差距正在增大，但是资本主义国家总是掩盖造成这种差距的原因。为不公平的分配世界财富进行辩解的人，企图把造成发展中国家的贫困的原因说成是并不在于发达国家和发展中国家之间现存的不平等关系。"},{"type":"paragraph","text":"文章说，在贸易领域里，“发达国家仍然是贱买贵卖。当这种状况继续存在时，不管发展中国家怎么‘努力或发展’，也不会很大地改变它们的命运。”"},{"type":"paragraph","text":"文章指出，正是由于认识到有必要改变剥削制度，越来越多的发展中国家采取措施，实行国有化，控制自己的经济，特别是控制自己的自然资源。"},{"type":"paragraph","text":"据新华社利马一九七四年四月十五日电　秘鲁《新纪事报》四月十五日就联合国大会特别会议发表社论指出，世界上的穷国越来越清楚地意识到自己的力量，并且开始团结起来。"},{"type":"paragraph","text":"社论指出：“在这种情况下，第三世界作出了捍卫自己利益的决定，成为一支足以被人听取和受人尊重的新的谈判力量。”"},{"type":"paragraph","text":"社论说，必须建立维护海洋资源的机构，人们在联合国会议上一再主张维护秘鲁和其它沿海国家的二百浬领海权。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b249c871a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
