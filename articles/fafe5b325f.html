tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入学习毛泽东思想坚定社会主义信念","authors":["罗昆禾"],"parts":[{"type":"paragraph","text":"西安政治学院历届党委都把延安精神教育作为学员入学的第一课。学员入学后，都由院部领导带队奔赴延安教学基地。广大青年学员通过参观革命遗址、听传统报告、瞻仰烈士陵园、访问农村等活动，身临其境地感受到老一辈无产阶级革命家坚定不移的信念和百折不挠的彻底革命精神，深深领悟到延安精神有着博大精深的内容，是马克思主义和中国革命实践相结合的思想宝库。"},{"type":"paragraph","text":"这个学院领导及时总结通过延安教学推动学习毛泽东思想的经验：即把学习延安精神同学习马列、毛泽东思想相结合，同增强党性、改造世界观相结合，同加强学院全面建设相结合。为此学院先后编辑出版了《延安岁月》、《圣地沉思录》和四集电视政论片《永恒的精神》，对引导学员从理论和实际的结合上坚定社会主义信念，起了很好的作用。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fafe5b325f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
