art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远做毛主席的好战士","authors":["王杰生前所在班全体战士"],"parts":[{"type":"paragraph","text":"毛主席啊，我们永远跟着您！"},{"type":"paragraph","text":"您是当代无产阶级最杰出的领袖，您是无产阶级文化大革命的最高司令，最高统帅。您最相信群众，最关心群众，最支持革命群众的革命运动。您的心和我们紧紧地联系在一起。"},{"type":"paragraph","text":"正当无产阶级文化大革命进行到关键的时刻，您亲自主持党的八届十一中全会，给我们制定了最伟大、最正确、最英明的决定；正当我们学习决定、熟悉决定、运用决定，向反党反社会主义反毛泽东思想的资产阶级当权派，向几千年遗留下来毒害人民的旧思想、旧文化、旧风俗、旧习惯猛烈开火的时候，您又和我们一起参加战斗，给我们指明了前进的方向！"},{"type":"paragraph","text":"有您的伟大思想武装我们，我们就天不怕，地不怕。不怕困难曲折，不怕阶级敌人捣乱，不怕资产阶级当权派，不怕资产阶级“权威”、“学者”、“祖师爷”，坚决完成一斗、二批、三改的革命任务，把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"敬爱的毛主席，您的战士——王杰生前所在班的全体同志向您宣誓：我们永远象王杰同志那样，您怎样说，我们就怎样做，一辈子读您的书，一辈子听您的话，一辈子照您的指示办事。大海航行靠舵手，我们一定更进一步地活学活用毛主席著作，更进一步加强思想革命化，提高警惕，加强战备，保卫无产阶级铁打的江山！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6025e6c74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
